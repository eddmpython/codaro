# Curriculum OS 분류 체계 (controlled vocabulary)
#
# - outcomes: 학생이 한 레슨을 마치고 얻는 능력 단위 (atomic capability).
#   ID 규칙: <도메인 prefix>.<능력명>, lowerCamelCase.
# - domains: 사용자가 실제로 달성하고자 하는 실무 목표.
#   targetOutcomes: 그 목표를 충족하기 위해 필요한 outcome 집합.
# - lessonOutcomes: <category>/<contentId> -> { outcomes, prerequisites, estimatedMinutes, practicalDomain }
#   레슨 YAML의 meta.outcomes/meta.prerequisites가 있으면 그쪽이 우선이고, 여기는 backfill 용도다.
#
# 새 레슨을 만들 때:
# 1) outcomes/domains에 없는 능력/목표가 필요하면 여기에 먼저 등록.
# 2) 레슨 meta에 outcomes/prerequisites/estimatedMinutes 등록(권장) 또는 lessonOutcomes에 등록.
# 3) tests/testCurriculumOs.py가 그래프 무결성을 검증한다.

