intro:
  emoji: 🏯
  goal: sklearn의 china 이미지를 자르고 회전하여 편집합니다.
  description: crop()으로 원하는 영역을 추출하고, rotate()로 각도 회전, transpose()로 뒤집기를 수행합니다. 이미지 편집의 기본 작업들을 익힙니다.
sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: china.jpg 로드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: sklearn의 china.jpg 이미지를 불러옵니다. 이전 프로젝트에서 배운 대로 NumPy 배열을 Pillow Image로 변환합니다. 중국 풍경 이미지로 자르기, 회전, 뒤집기 같은 편집 작업을 연습해봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    chinaArr = load_sample_image('china.jpg')
    photo = Image.fromarray(chinaArr)
    photo.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      chinaArr = load_sample_image('china.jpg')
      photo = Image.fromarray(chinaArr)
      photo.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_crop
  title: 2단계. 이미지 자르기
  structuredPrimary: true
  subtitle: crop()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    crop() 메서드는 이미지의 특정 영역을 잘라냅니다. (left, upper, right, lower) 튜플로 사각형 영역을 지정합니다. 좌표는 왼쪽 상단이 (0, 0)이고, right와 lower는 포함되지 않는 경계입니다.

    crop()은 (left, upper, right, lower) 순서입니다. left부터 right-1까지, upper부터 lower-1까지의 픽셀이 포함됩니다. 잘라낸 이미지의 크기는 (right-left, lower-upper)입니다.
  tips:
  - crop()은 (left, upper, right, lower) 순서입니다. left부터 right-1까지, upper부터 lower-1까지의 픽셀이 포함됩니다. 잘라낸 이미지의 크기는 (right-left, lower-upper)입니다.
  snippet: |-
    width, height = photo.size
    left = width // 4
    upper = height // 4
    right = width * 3 // 4
    lower = height * 3 // 4
    left, upper, right, lower
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      width, height = photo.size
      left = width // 4
      upper = height // 4
      right = width * 3 // 4
      lower = height * 3 // 4
      left, upper, right, lower
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_rotate
  title: 3단계. 이미지 회전
  structuredPrimary: true
  subtitle: rotate()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    rotate() 메서드는 이미지를 시계 반대 방향으로 회전합니다. 기본적으로 원본 크기를 유지하므로 모서리가 잘릴 수 있습니다. expand=True를 주면 회전된 이미지 전체가 보이도록 캔버스가 확장됩니다.

    expand=True를 사용하면 회전 후 이미지 전체가 보이도록 캔버스 크기가 자동으로 조정됩니다. 빈 공간은 검은색(또는 투명)으로 채워집니다.
  tips:
  - expand=True를 사용하면 회전 후 이미지 전체가 보이도록 캔버스 크기가 자동으로 조정됩니다. 빈 공간은 검은색(또는 투명)으로 채워집니다.
  snippet: |-
    rotated = cropped.rotate(45)
    rotated.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      rotated = cropped.rotate(45)
      rotated.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_transpose
  title: 4단계. 이미지 뒤집기
  structuredPrimary: true
  subtitle: transpose()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    transpose() 메서드는 이미지를 뒤집거나 90도 단위로 회전합니다. 미리 정의된 상수를 사용하며, FLIP_LEFT_RIGHT(좌우 반전), FLIP_TOP_BOTTOM(상하 반전), ROTATE_90(90도 회전) 등이 있습니다.

    transpose()는 정확한 변환을 수행합니다. ROTATE_90은 정확히 90도, ROTATE_180은 180도, ROTATE_270은 270도 회전입니다. rotate()와 달리 모서리 잘림이 없습니다.
  tips:
  - transpose()는 정확한 변환을 수행합니다. ROTATE_90은 정확히 90도, ROTATE_180은 180도, ROTATE_270은 270도 회전입니다. rotate()와 달리 모서리 잘림이 없습니다.
  snippet: |-
    flipped = photo.transpose(Image.FLIP_LEFT_RIGHT)
    flipped
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      flipped = photo.transpose(Image.FLIP_LEFT_RIGHT)
      flipped
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_combine
  title: 5단계. 변환 조합
  structuredPrimary: true
  subtitle: 메서드 체이닝
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Pillow의 변환 메서드들은 새 이미지를 반환하므로 체이닝이 가능합니다. 자르기 → 회전 → 리사이즈를 한 번에 연결할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    final = (photo
        .crop((100, 50, 500, 350))
        .rotate(15, expand=True)
        .resize((200, 200)))
    final.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      final = (photo
          .crop((100, 50, 500, 350))
          .rotate(15, expand=True)
          .resize((200, 200)))
      final.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 다양한 편집 적용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    flower 이미지에 자르기와 회전을 적용해봅시다. 위에서 배운 crop(), rotate(), transpose() 메서드를 조합하여 다양한 편집을 수행합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerData = load_sample_image('flower.jpg')
    flower = Image.fromarray(flowerData)
    flower.size
  exercise:
