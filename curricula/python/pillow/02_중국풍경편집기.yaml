meta:
  id: pillow_02
  title: 중국풍경편집기
  order: 2
  category: pillow
  difficulty: "⭐"
  badge: 입문
  tags: ["Pillow", "crop", "rotate", "transpose", "resize"]
  seo:
    title: "Pillow 입문 - 중국 풍경 편집기"
    description: "Pillow로 이미지를 자르고, 회전하고, 뒤집습니다. crop, rotate, transpose 메서드를 익힙니다."
    keywords: ["Pillow", "crop", "rotate", "transpose", "이미지편집", "회전"]

intro:
  emoji: "🏯"
  goal: sklearn의 china 이미지를 자르고 회전하여 편집합니다.
  description: crop()으로 원하는 영역을 추출하고, rotate()로 각도 회전, transpose()로 뒤집기를 수행합니다. 이미지 편집의 기본 작업들을 익힙니다.

sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  subtitle: china.jpg 로드
  blocks:
  - type: text
    content: sklearn의 china.jpg 이미지를 불러옵니다. 이전 프로젝트에서 배운 대로 NumPy 배열을 Pillow Image로 변환합니다. 중국 풍경 이미지로 자르기, 회전, 뒤집기 같은 편집 작업을 연습해봅니다.
  - type: code
    language: python
    title: 라이브러리와 이미지
    description: china 이미지를 로드합니다
    content: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      chinaArr = load_sample_image('china.jpg')
      photo = Image.fromarray(chinaArr)
      photo.size
  - type: code
    language: python
    title: 원본 이미지
    description: china 풍경 이미지입니다
    content: |-
      photo

- id: step2_crop
  title: 2단계. 이미지 자르기
  subtitle: crop()
  blocks:
  - type: text
    content: crop() 메서드는 이미지의 특정 영역을 잘라냅니다. (left, upper, right, lower) 튜플로 사각형 영역을 지정합니다. 좌표는 왼쪽 상단이 (0, 0)이고, right와 lower는 포함되지 않는 경계입니다.
  - type: code
    language: python
    title: 중앙 영역 자르기
    description: 이미지 중앙 부분을 추출합니다
    content: |-
      width, height = photo.size
      left = width // 4
      upper = height // 4
      right = width * 3 // 4
      lower = height * 3 // 4
      left, upper, right, lower
  - type: code
    language: python
    title: crop 실행
    description: 지정한 영역을 잘라냅니다
    content: |-
      cropped = photo.crop((left, upper, right, lower))
      cropped.size
  - type: tip
    content: crop()은 (left, upper, right, lower) 순서입니다. left부터 right-1까지, upper부터 lower-1까지의 픽셀이 포함됩니다. 잘라낸 이미지의 크기는 (right-left, lower-upper)입니다.
  - type: code
    language: python
    title: 자른 이미지
    description: 중앙 영역만 추출되었습니다
    content: |-
      cropped

- id: step3_rotate
  title: 3단계. 이미지 회전
  subtitle: rotate()
  blocks:
  - type: text
    content: rotate() 메서드는 이미지를 시계 반대 방향으로 회전합니다. 기본적으로 원본 크기를 유지하므로 모서리가 잘릴 수 있습니다. expand=True를 주면 회전된 이미지 전체가 보이도록 캔버스가 확장됩니다.
  - type: code
    language: python
    title: 45도 회전 (기본)
    description: 원본 크기 유지, 모서리 잘림
    content: |-
      rotated = cropped.rotate(45)
      rotated.size
  - type: code
    language: python
    title: 회전 결과 (기본)
    description: 모서리가 잘린 것을 확인합니다
    content: |-
      rotated
  - type: code
    language: python
    title: 45도 회전 (확장)
    description: expand=True로 전체 보이기
    content: |-
      expanded = cropped.rotate(45, expand=True)
      expanded.size
  - type: tip
    content: expand=True를 사용하면 회전 후 이미지 전체가 보이도록 캔버스 크기가 자동으로 조정됩니다. 빈 공간은 검은색(또는 투명)으로 채워집니다.
  - type: code
    language: python
    title: 확장 회전 결과
    description: 전체 이미지가 보입니다
    content: |-
      expanded

- id: step4_transpose
  title: 4단계. 이미지 뒤집기
  subtitle: transpose()
  blocks:
  - type: text
    content: transpose() 메서드는 이미지를 뒤집거나 90도 단위로 회전합니다. 미리 정의된 상수를 사용하며, FLIP_LEFT_RIGHT(좌우 반전), FLIP_TOP_BOTTOM(상하 반전), ROTATE_90(90도 회전) 등이 있습니다.
  - type: code
    language: python
    title: 좌우 반전
    description: 거울에 비친 것처럼 뒤집습니다
    content: |-
      flipped = photo.transpose(Image.FLIP_LEFT_RIGHT)
      flipped
  - type: code
    language: python
    title: 상하 반전
    description: 위아래를 뒤집습니다
    content: |-
      upsideDown = photo.transpose(Image.FLIP_TOP_BOTTOM)
      upsideDown
  - type: tip
    content: transpose()는 정확한 변환을 수행합니다. ROTATE_90은 정확히 90도, ROTATE_180은 180도, ROTATE_270은 270도 회전입니다. rotate()와 달리 모서리 잘림이 없습니다.
  - type: code
    language: python
    title: 90도 회전
    description: 시계 반대 방향 90도
    content: |-
      turned = photo.transpose(Image.ROTATE_90)
      turned.size

- id: step5_combine
  title: 5단계. 변환 조합
  subtitle: 메서드 체이닝
  blocks:
  - type: text
    content: Pillow의 변환 메서드들은 새 이미지를 반환하므로 체이닝이 가능합니다. 자르기 → 회전 → 리사이즈를 한 번에 연결할 수 있습니다.
  - type: code
    language: python
    title: 변환 조합
    description: 자르기 + 회전 + 리사이즈
    content: |-
      final = (photo
          .crop((100, 50, 500, 350))
          .rotate(15, expand=True)
          .resize((200, 200)))
      final.size
  - type: code
    language: python
    title: 최종 결과
    description: 모든 변환이 적용된 이미지
    content: |-
      final

- id: practice
  title: 실습
  subtitle: 다양한 편집 적용
  blocks:
  - type: text
    content: flower 이미지에 자르기와 회전을 적용해봅시다. 위에서 배운 crop(), rotate(), transpose() 메서드를 조합하여 다양한 편집을 수행합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: flower 중앙 자르기"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        from PIL import Image
        from sklearn.datasets import load_sample_image

        flowerData = load_sample_image('flower.jpg')
        flower = Image.fromarray(flowerData)
        flower.size
    - type: code
      title: "중앙 영역 계산"
      content: |-
        w, h = flower.size
        centerBox = (w//4, h//4, w*3//4, h*3//4)
        centerBox
    - type: code
      title: "자르기 실행"
      content: |-
        centerCrop = flower.crop(centerBox)
        centerCrop
  - type: expansion
    title: "미션2: 회전과 뒤집기 조합"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        from PIL import Image
        from sklearn.datasets import load_sample_image

        imgData = load_sample_image('china.jpg')
        scene = Image.fromarray(imgData)
        scene.size
    - type: code
      title: "좌우 반전 후 30도 회전"
      content: |-
        mirrored = scene.transpose(Image.FLIP_LEFT_RIGHT)
        tilted = mirrored.rotate(30, expand=True)
        tilted.size
    - type: code
      title: "결과 출력"
      content: |-
        tilted
