- id: workflow_validation
  title: 6단계. crop과 회전 검증 루프
  structuredPrimary: true
  subtitle: 편집 좌표와 출력 크기 확인
  goal: 6단계. crop과 회전 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: crop, rotate, flip은 눈으로 보면 쉬워 보이지만 좌표가 한 칸만 틀려도 결과물이 달라집니다. crop 박스가 원본 안에 있는지 먼저 검증하고,
    회전과 뒤집기 결과의 size를 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw

    landscapeImage = Image.new("RGB", (200, 120), (135, 190, 235))
    landscapeDraw = ImageDraw.Draw(landscapeImage)
    landscapeDraw.polygon([(0, 90), (60, 35), (120, 90)], fill=(70, 130, 95))
    landscapeDraw.polygon([(80, 95), (150, 30), (220, 95)], fill=(55, 115, 85))
    landscapeDraw.ellipse((145, 15, 180, 50), fill=(245, 210, 80))

    def validateCropBox(image, box):
        left, top, right, bottom = box
        if not (0 <= left < right <= image.size[0] and 0 <= top < bottom <= image.size[1]):
            raise ValueError(f"crop 범위가 이미지 밖입니다: {box}")
        return True

    cropBox = (40, 20, 160, 100)
    validateCropBox(landscapeImage, cropBox)
  exercise:
    prompt: 6단계. crop과 회전 검증 루프 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image, ImageDraw

      landscapeImage = Image.new("RGB", (200, 120), (135, 190, 235))
      landscapeDraw = ImageDraw.Draw(landscapeImage)
      landscapeDraw.polygon([(0, 90), (60, 35), (120, 90)], fill=(70, 130, 95))
      landscapeDraw.polygon([(80, 95), (150, 30), (220, 95)], fill=(55, 115, 85))
      landscapeDraw.ellipse((145, 15, 180, 50), fill=(245, 210, 80))

      def validateCropBox(image, box):
          left, top, right, bottom = box
          if not (0 <= left < right <= image.size[0] and 0 <= top < bottom <= image.size[1]):
              raise ValueError(f"crop 범위가 이미지 밖입니다: {box}")
          return True

      cropBox = (40, 20, 160, 100)
      validateCropBox(landscapeImage, cropBox)
    hints:
    - 6단계. crop과 회전 검증 루프 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. crop과 회전 검증 루프 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. crop과 회전 검증 루프에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
