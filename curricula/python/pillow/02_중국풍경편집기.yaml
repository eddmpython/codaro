sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: china.jpg 로드
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn의 china.jpg 이미지를 불러옵니다. 이전 프로젝트에서 배운 대로 NumPy 배열을 Pillow Image로 변환합니다. 중국 풍경 이미지로
    자르기, 회전, 뒤집기 같은 편집 작업을 연습해봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    chinaArr = load_sample_image('china.jpg')
    photo = Image.fromarray(chinaArr)
    photo.size
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      chinaArr = load_sample_image('china.jpg')
      photo = Image.fromarray(chinaArr)
      photo.size
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_crop
  title: 2단계. 이미지 자르기
  structuredPrimary: true
  subtitle: crop()
  goal: 2단계. 이미지 자르기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    crop() 메서드는 이미지의 특정 영역을 잘라냅니다. (left, upper, right, lower) 튜플로 사각형 영역을 지정합니다. 좌표는 왼쪽 상단이 (0, 0)이고, right와 lower는 포함되지 않는 경계입니다.

    crop()은 (left, upper, right, lower) 순서입니다. left부터 right-1까지, upper부터 lower-1까지의 픽셀이 포함됩니다. 잘라낸 이미지의 크기는 (right-left, lower-upper)입니다.
  tips:
  - crop()은 (left, upper, right, lower) 순서입니다. left부터 right-1까지, upper부터 lower-1까지의 픽셀이 포함됩니다. 잘라낸 이미지의
    크기는 (right-left, lower-upper)입니다.
  snippet: |-
    width, height = photo.size
    left = width // 4
    upper = height // 4
    right = width * 3 // 4
    lower = height * 3 // 4
    left, upper, right, lower
  exercise:
    prompt: 2단계. 이미지 자르기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      width, height = photo.size
      left = width // 4
      upper = height // 4
      right = width * 3 // 4
      lower = height * 3 // 4
      left, upper, right, lower
    hints:
    - 2단계. 이미지 자르기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 이미지 자르기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 이미지 자르기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_rotate
  title: 3단계. 이미지 회전
  structuredPrimary: true
  subtitle: rotate()
  goal: 3단계. 이미지 회전에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    rotate() 메서드는 이미지를 시계 반대 방향으로 회전합니다. 기본적으로 원본 크기를 유지하므로 모서리가 잘릴 수 있습니다. expand=True를 주면 회전된 이미지 전체가 보이도록 캔버스가 확장됩니다.

    expand=True를 사용하면 회전 후 이미지 전체가 보이도록 캔버스 크기가 자동으로 조정됩니다. 빈 공간은 검은색(또는 투명)으로 채워집니다.
  tips:
  - expand=True를 사용하면 회전 후 이미지 전체가 보이도록 캔버스 크기가 자동으로 조정됩니다. 빈 공간은 검은색(또는 투명)으로 채워집니다.
  snippet: |-
    rotated = cropped.rotate(45)
    rotated.size
  exercise:
    prompt: 3단계. 이미지 회전 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      rotated = cropped.rotate(45)
      rotated.size
    hints:
    - 3단계. 이미지 회전 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 이미지 회전 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 이미지 회전에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_transpose
  title: 4단계. 이미지 뒤집기
  structuredPrimary: true
  subtitle: transpose()
  goal: 4단계. 이미지 뒤집기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    transpose() 메서드는 이미지를 뒤집거나 90도 단위로 회전합니다. 미리 정의된 상수를 사용하며, FLIP_LEFT_RIGHT(좌우 반전), FLIP_TOP_BOTTOM(상하 반전), ROTATE_90(90도 회전) 등이 있습니다.

    transpose()는 정확한 변환을 수행합니다. ROTATE_90은 정확히 90도, ROTATE_180은 180도, ROTATE_270은 270도 회전입니다. rotate()와 달리 모서리 잘림이 없습니다.
  tips:
  - transpose()는 정확한 변환을 수행합니다. ROTATE_90은 정확히 90도, ROTATE_180은 180도, ROTATE_270은 270도 회전입니다. rotate()와
    달리 모서리 잘림이 없습니다.
  snippet: |-
    flipped = photo.transpose(Image.FLIP_LEFT_RIGHT)
    flipped
  exercise:
    prompt: 4단계. 이미지 뒤집기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      flipped = photo.transpose(Image.FLIP_LEFT_RIGHT)
      flipped
    hints:
    - 4단계. 이미지 뒤집기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 이미지 뒤집기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 이미지 뒤집기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_combine
  title: 5단계. 변환 조합
  structuredPrimary: true
  subtitle: 메서드 체이닝
  goal: 5단계. 변환 조합에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: Pillow의 변환 메서드들은 새 이미지를 반환하므로 체이닝이 가능합니다. 자르기 → 회전 → 리사이즈를 한 번에 연결할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    final = (photo
        .crop((100, 50, 500, 350))
        .rotate(15, expand=True)
        .resize((200, 200)))
    final.size
  exercise:
    prompt: 5단계. 변환 조합 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      final = (photo
          .crop((100, 50, 500, 350))
          .rotate(15, expand=True)
          .resize((200, 200)))
      final.size
    hints:
    - 5단계. 변환 조합 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 변환 조합 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 변환 조합에서 바꾼 입력값이 결과에 반영되어야 합니다.
