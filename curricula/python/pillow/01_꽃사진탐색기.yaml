    language: python
    title: 썸네일과 색상 검증
    description: thumbnail 결과 크기와 꽃 영역의 평균 색을 확인합니다.
    content: |-
      flowerThumb = flowerImage.copy()
      flowerThumb.thumbnail((90, 90))
      flowerStat = ImageStat.Stat(flowerImage)
      flowerChecks = {
          "thumbnailKeepsRatio": flowerThumb.size == (90, 60),
          "modeOk": flowerImage.mode == "RGB",
          "sizeOk": flowerImage.size == (180, 120),
          "redChannelDominant": flowerStat.mean[0] > flowerStat.mean[2] * 0.8,
          "errorOk": flowerErrorMessage == "이미지가 너무 작습니다: (40, 40)",
      }

      assert all(flowerChecks.values()), flowerChecks
      flowerChecks
