    starterCode: |-
      width, height = img.size
      width, height
    solution: |-
      width, height = img.size
      width, height
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Pillow Image 객체는 여러 속성을 제공합니다. size는 (너비, 높이) 튜플, mode는 색상 모드(RGB, L 등), format은 파일 포맷입니다. 배열에서 변환한 이미지는 format이
      None입니다.
  - type: code
    language: python
    title: 이미지 크기
    description: width와 height를 확인합니다
    content: |-
      width, height = img.size
      width, height
  - type: code
    language: python
    title: 색상 모드
    description: RGB, L, RGBA 등을 확인합니다
    content: img.mode
  - type: code
    language: python
    title: 이미지 포맷
    description: 파일에서 읽으면 JPEG, PNG 등이 표시됩니다
    content: img.format
- id: step3_thumbnail
  title: 3단계. 썸네일 생성
  structuredPrimary: true
  subtitle: thumbnail()
  goal: '3단계. 썸네일 생성: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 썸네일 생성: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    thumbnail() 메서드는 이미지를 지정한 크기 내에 맞게 축소합니다. 원본 비율을 유지하면서 최대 크기를 제한합니다. 주의할 점은 thumbnail()이 원본 이미지를 직접 수정한다는 것입니다. 원본을 보존하려면 copy()로 복사본을 만들어야 합니다.

    thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  tips:
  - thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    thumb = img.copy()
    thumb.size
  exercise:
    prompt: '3단계. 썸네일 생성: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      thumb = img.copy()
      thumb.size
    solution: |-
      thumb = img.copy()
      thumb.size
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: thumbnail() 메서드는 이미지를 지정한 크기 내에 맞게 축소합니다. 원본 비율을 유지하면서 최대 크기를 제한합니다. 주의할 점은 thumbnail()이 원본 이미지를 직접 수정한다는 것입니다.
      원본을 보존하려면 copy()로 복사본을 만들어야 합니다.
  - type: code
    language: python
    title: 복사본 생성
    description: 원본 보존을 위해 copy()합니다
    content: |-
      thumb = img.copy()
      thumb.size
  - type: code
    language: python
    title: 썸네일 만들기
    description: 최대 150x150 내로 축소합니다
    content: |-
      thumb.thumbnail((150, 150))
      thumb.size
  - type: tip
    content: thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  - type: code
    language: python
    title: 썸네일 확인
    description: 축소된 이미지를 출력합니다
    content: thumb
- id: step4_resize
  title: 4단계. 리사이즈
  structuredPrimary: true
  subtitle: resize()
  goal: '4단계. 리사이즈: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 리사이즈: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    resize()는 정확한 크기로 이미지를 변환합니다. thumbnail()과 달리 비율을 무시하고 지정한 크기로 변환합니다. resize()는 새 이미지를 반환하고 원본은 유지됩니다.

    resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를 사용하세요.
  tips:
  - resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를 사용하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    square = img.resize((200, 200))
    square.size
  exercise:
    prompt: '4단계. 리사이즈: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      square = img.resize((200, 200))
      square.size
    solution: |-
      square = img.resize((200, 200))
      square.size
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: resize()는 정확한 크기로 이미지를 변환합니다. thumbnail()과 달리 비율을 무시하고 지정한 크기로 변환합니다. resize()는 새 이미지를 반환하고 원본은 유지됩니다.
  - type: code
    language: python
    title: 정사각형으로 리사이즈
    description: 200x200으로 변환합니다
    content: |-
      square = img.resize((200, 200))
      square.size
  - type: code
    language: python
    title: 리사이즈 결과
    description: 비율이 변경된 이미지입니다
    content: square
  - type: tip
    content: resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를
      사용하세요.
