- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: china 이미지 탐색
  goal: '실습: 실행 가능한 Python 흐름으로 익힌다.'
  why: '실습: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    sklearn의 china.jpg 이미지를 불러와 정보를 확인하고 썸네일을 생성해봅시다. 위에서 배운 size, mode 속성 확인과 thumbnail(), resize() 메서드를 직접 적용해봅니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
