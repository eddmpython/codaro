sections:
- id: step1_import
  title: 1단계. 라이브러리와 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 내장 이미지
  goal: '1단계. 라이브러리와 이미지 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 라이브러리와 이미지 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    sklearn에는 학습용 샘플 이미지가 내장되어 있습니다. load_sample_image() 함수로 china.jpg와 flower.jpg를 불러올 수 있습니다. 이 이미지는 NumPy 배열로 반환되므로 Pillow의 Image.fromarray()로 변환합니다.

    load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  tips:
  - load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  - Image.fromarray()는 NumPy 배열을 Pillow Image 객체로 변환합니다. Jupyter/Codaro에서 Image 객체를 마지막 라인에 두면 이미지가 출력됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flowerArr.shape
  exercise:
    prompt: '1단계. 라이브러리와 이미지 불러오기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flowerArr.shape
    solution: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flowerArr.shape
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: sklearn에는 학습용 샘플 이미지가 내장되어 있습니다. load_sample_image() 함수로 china.jpg와 flower.jpg를 불러올 수 있습니다. 이 이미지는 NumPy 배열로
      반환되므로 Pillow의 Image.fromarray()로 변환합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: PIL과 sklearn에서 필요한 모듈을 임포트합니다
    content: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flowerArr.shape
  - type: tip
    content: load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  - type: code
    language: python
    title: NumPy 배열을 Pillow 이미지로
    description: Image.fromarray()로 변환합니다
    content: |-
      img = Image.fromarray(flowerArr)
      img
  - type: tip
    content: Image.fromarray()는 NumPy 배열을 Pillow Image 객체로 변환합니다. Jupyter/Codaro에서 Image 객체를 마지막 라인에 두면 이미지가 출력됩니다.
- id: step2_info
  title: 2단계. 이미지 정보 확인
  structuredPrimary: true
  subtitle: size, mode, format
  goal: '2단계. 이미지 정보 확인: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 이미지 정보 확인: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Pillow Image 객체는 여러 속성을 제공합니다. size는 (너비, 높이) 튜플, mode는 색상 모드(RGB, L 등), format은 파일 포맷입니다. 배열에서 변환한 이미지는 format이
    None입니다.
  tips:
