sections:
- id: step1_import
  title: 1단계. 라이브러리와 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 내장 이미지
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    sklearn에는 학습용 샘플 이미지가 내장되어 있습니다. load_sample_image() 함수로 china.jpg와 flower.jpg를 불러올 수 있습니다. 이 이미지는 NumPy 배열로 반환되므로 Pillow의 Image.fromarray()로 변환합니다.

    load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  tips:
  - load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flowerArr.shape
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flowerArr.shape
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_info
  title: 2단계. 이미지 정보 확인
  structuredPrimary: true
  subtitle: size, mode, format
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Pillow Image 객체는 여러 속성을 제공합니다. size는 (너비, 높이) 튜플, mode는 색상 모드(RGB, L 등), format은 파일 포맷입니다. 배열에서 변환한 이미지는 format이 None입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    width, height = img.size
    width, height
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      width, height = img.size
      width, height
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_thumbnail
  title: 3단계. 썸네일 생성
  structuredPrimary: true
  subtitle: thumbnail()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    thumbnail() 메서드는 이미지를 지정한 크기 내에 맞게 축소합니다. 원본 비율을 유지하면서 최대 크기를 제한합니다. 주의할 점은 thumbnail()이 원본 이미지를 직접 수정한다는 것입니다. 원본을 보존하려면 copy()로 복사본을 만들어야 합니다.

    thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  tips:
  - thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  snippet: |-
    thumb = img.copy()
    thumb.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      thumb = img.copy()
      thumb.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_resize
  title: 4단계. 리사이즈
  structuredPrimary: true
  subtitle: resize()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    resize()는 정확한 크기로 이미지를 변환합니다. thumbnail()과 달리 비율을 무시하고 지정한 크기로 변환합니다. resize()는 새 이미지를 반환하고 원본은 유지됩니다.

    resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를 사용하세요.
  tips:
  - resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를 사용하세요.
  snippet: |-
    square = img.resize((200, 200))
    square.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      square = img.resize((200, 200))
      square.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_display
  title: 5단계. 나란히 비교
  structuredPrimary: true
  subtitle: 원본과 썸네일
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 원본 이미지와 생성한 썸네일, 리사이즈 이미지를 비교해봅시다. 각각의 크기 차이를 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    original = img.size
    thumbSize = thumb.size
    squareSize = square.size
