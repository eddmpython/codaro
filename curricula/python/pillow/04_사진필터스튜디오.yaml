sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: sklearn에 내장된 샘플 이미지를 사용합니다. 필터 효과를 잘 확인할 수 있도록 꽃 이미지를 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageFilter
    from sklearn.datasets import load_sample_image

