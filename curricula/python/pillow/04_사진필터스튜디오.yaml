- id: workflow_validation
  title: 7단계. 필터 효과 검증 루프
  structuredPrimary: true
  subtitle: blur, sharpen, edge 수치 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 필터는 분위기 효과처럼 보이지만 자동화에서는 픽셀 분산과 경계 검출량을 확인해야 합니다. 반지름 입력을 검증하고 blur와 edge 결과를 수치로 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageFilter, ImageStat
    import numpy as np

    filterImage = Image.new("L", (140, 100), 80)
    filterDraw = ImageDraw.Draw(filterImage)
    filterDraw.rectangle((30, 25, 110, 75), fill=210)
    filterDraw.line((30, 25, 110, 75), fill=20, width=4)

    def validateBlurRadius(radius):
        if radius < 0:
            raise ValueError(f"blur radius는 0 이상이어야 합니다: {radius}")
        return True

    validateBlurRadius(2)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageDraw, ImageFilter, ImageStat
      import numpy as np

      filterImage = Image.new("L", (140, 100), 80)
      filterDraw = ImageDraw.Draw(filterImage)
      filterDraw.rectangle((30, 25, 110, 75), fill=210)
      filterDraw.line((30, 25, 110, 75), fill=20, width=4)

      def validateBlurRadius(radius):
          if radius < 0:
              raise ValueError(f"blur radius는 0 이상이어야 합니다: {radius}")
          return True

      validateBlurRadius(2)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
