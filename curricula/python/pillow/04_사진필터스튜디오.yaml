      emboss
    hints:
    - 5단계. 엠보스와 강조 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 엠보스와 강조 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 엠보스와 강조에서 바꾼 입력값이 결과에 반영되어야 합니다.
