sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn에 내장된 샘플 이미지를 사용합니다. 필터 효과를 잘 확인할 수 있도록 꽃 이미지를 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageFilter
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    canvas = Image.fromarray(flowerArr)
    canvas.size
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image, ImageFilter
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      canvas = Image.fromarray(flowerArr)
      canvas.size
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_blur
  title: 2단계. 블러 필터
  structuredPrimary: true
  subtitle: BLUR, GaussianBlur
  goal: 2단계. 블러 필터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    블러 필터는 이미지를 부드럽게 흐리게 만듭니다. BLUR는 기본 블러이고, GaussianBlur는 반경을 조절할 수 있는 가우시안 블러입니다. 블러는 노이즈 제거나 배경 처리에 자주 사용됩니다.

    filter() 메서드는 새 이미지를 반환하고 원본은 유지됩니다. ImageFilter.BLUR는 3x3 커널을 사용하는 기본 블러입니다.
  tips:
  - filter() 메서드는 새 이미지를 반환하고 원본은 유지됩니다. ImageFilter.BLUR는 3x3 커널을 사용하는 기본 블러입니다.
  snippet: |-
    blurred = canvas.filter(ImageFilter.BLUR)
    blurred
  exercise:
    prompt: 2단계. 블러 필터 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      blurred = canvas.filter(ImageFilter.BLUR)
      blurred
    hints:
    - 2단계. 블러 필터 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 블러 필터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 블러 필터에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_sharpen
  title: 3단계. 샤픈 필터
  structuredPrimary: true
  subtitle: SHARPEN, UnsharpMask
  goal: 3단계. 샤픈 필터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    샤픈 필터는 이미지의 경계를 강조하여 선명하게 만듭니다. SHARPEN은 기본 샤프닝이고, UnsharpMask는 더 정교한 조절이 가능합니다. 흐린 사진을 선명하게 보정할 때 사용합니다.

    UnsharpMask는 세 가지 파라미터를 가집니다. radius는 효과 범위, percent는 강도(100=보통, 200=2배), threshold는 적용 기준입니다. 사진 보정에서 가장 많이 쓰이는 샤프닝 기법입니다.
  tips:
  - UnsharpMask는 세 가지 파라미터를 가집니다. radius는 효과 범위, percent는 강도(100=보통, 200=2배), threshold는 적용 기준입니다. 사진
    보정에서 가장 많이 쓰이는 샤프닝 기법입니다.
  snippet: |-
    sharpened = canvas.filter(ImageFilter.SHARPEN)
    sharpened
  exercise:
    prompt: 3단계. 샤픈 필터 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      sharpened = canvas.filter(ImageFilter.SHARPEN)
      sharpened
    hints:
    - 3단계. 샤픈 필터 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 샤픈 필터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 샤픈 필터에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_edge
  title: 4단계. 윤곽선 필터
  structuredPrimary: true
  subtitle: CONTOUR, FIND_EDGES
  goal: 4단계. 윤곽선 필터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    윤곽선 필터는 이미지에서 경계선을 추출합니다. CONTOUR는 윤곽선만 남기고, FIND_EDGES는 에지(가장자리)를 검출합니다. 이미지 분석이나 아트 효과에 활용됩니다.

    FIND_EDGES는 소벨(Sobel) 연산자를 사용하여 밝기 변화가 급격한 곳을 검출합니다. 검은 배경에 흰 선으로 경계가 표시됩니다. 컴퓨터 비전에서 객체 검출의 기초가 됩니다.
  tips:
  - FIND_EDGES는 소벨(Sobel) 연산자를 사용하여 밝기 변화가 급격한 곳을 검출합니다. 검은 배경에 흰 선으로 경계가 표시됩니다. 컴퓨터 비전에서 객체 검출의 기초가 됩니다.
  snippet: |-
    contour = canvas.filter(ImageFilter.CONTOUR)
    contour
  exercise:
    prompt: 4단계. 윤곽선 필터 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      contour = canvas.filter(ImageFilter.CONTOUR)
      contour
    hints:
    - 4단계. 윤곽선 필터 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 윤곽선 필터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 윤곽선 필터에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_emboss
  title: 5단계. 엠보스와 강조
  structuredPrimary: true
  subtitle: EMBOSS, EDGE_ENHANCE
  goal: 5단계. 엠보스와 강조에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    EMBOSS는 양각 효과를 주어 입체감을 만듭니다. EDGE_ENHANCE는 경계선을 강조하여 이미지를 더 선명하게 보이게 합니다.

    EDGE_ENHANCE는 약한 강조, EDGE_ENHANCE_MORE는 강한 강조입니다. 선명도를 높이면서 자연스러움을 유지하고 싶을 때 EDGE_ENHANCE가 적합합니다.
  tips:
  - EDGE_ENHANCE는 약한 강조, EDGE_ENHANCE_MORE는 강한 강조입니다. 선명도를 높이면서 자연스러움을 유지하고 싶을 때 EDGE_ENHANCE가 적합합니다.
  snippet: |-
    emboss = canvas.filter(ImageFilter.EMBOSS)
    emboss
  exercise:
    prompt: 5단계. 엠보스와 강조 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
