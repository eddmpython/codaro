- id: step2_blur
  title: 2단계. 블러 필터
  structuredPrimary: true
  subtitle: BLUR, GaussianBlur
  goal: '2단계. 블러 필터: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 블러 필터: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    블러 필터는 이미지를 부드럽게 흐리게 만듭니다. BLUR는 기본 블러이고, GaussianBlur는 반경을 조절할 수 있는 가우시안 블러입니다. 블러는 노이즈 제거나 배경 처리에 자주 사용됩니다.

    filter() 메서드는 새 이미지를 반환하고 원본은 유지됩니다. ImageFilter.BLUR는 3x3 커널을 사용하는 기본 블러입니다.
  tips:
  - filter() 메서드는 새 이미지를 반환하고 원본은 유지됩니다. ImageFilter.BLUR는 3x3 커널을 사용하는 기본 블러입니다.
  - GaussianBlur의 radius가 클수록 더 강하게 흐려집니다. radius=2는 약한 블러, radius=10은 강한 블러입니다. 포토샵의 가우시안 블러와 동일한 알고리즘입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    blurred = canvas.filter(ImageFilter.BLUR)
    blurred
  exercise:
    prompt: '2단계. 블러 필터: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      blurred = canvas.filter(ImageFilter.BLUR)
      blurred
    solution: |-
      blurred = canvas.filter(ImageFilter.BLUR)
      blurred
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 블러 필터는 이미지를 부드럽게 흐리게 만듭니다. BLUR는 기본 블러이고, GaussianBlur는 반경을 조절할 수 있는 가우시안 블러입니다. 블러는 노이즈 제거나 배경 처리에 자주 사용됩니다.
  - type: code
    language: python
    title: 기본 블러
    description: BLUR 필터를 적용합니다
    content: |-
      blurred = canvas.filter(ImageFilter.BLUR)
      blurred
  - type: tip
    content: filter() 메서드는 새 이미지를 반환하고 원본은 유지됩니다. ImageFilter.BLUR는 3x3 커널을 사용하는 기본 블러입니다.
  - type: code
    language: python
    title: 가우시안 블러
    description: 반경을 조절할 수 있습니다
    content: |-
      gaussian = canvas.filter(ImageFilter.GaussianBlur(radius=5))
      gaussian
  - type: tip
    content: GaussianBlur의 radius가 클수록 더 강하게 흐려집니다. radius=2는 약한 블러, radius=10은 강한 블러입니다. 포토샵의 가우시안 블러와 동일한 알고리즘입니다.
- id: step3_sharpen
  title: 3단계. 샤픈 필터
  structuredPrimary: true
  subtitle: SHARPEN, UnsharpMask
  goal: '3단계. 샤픈 필터: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 샤픈 필터: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    샤픈 필터는 이미지의 경계를 강조하여 선명하게 만듭니다. SHARPEN은 기본 샤프닝이고, UnsharpMask는 더 정교한 조절이 가능합니다. 흐린 사진을 선명하게 보정할 때 사용합니다.

    UnsharpMask는 세 가지 파라미터를 가집니다. radius는 효과 범위, percent는 강도(100=보통, 200=2배), threshold는 적용 기준입니다. 사진 보정에서 가장 많이 쓰이는 샤프닝 기법입니다.
  tips:
  - UnsharpMask는 세 가지 파라미터를 가집니다. radius는 효과 범위, percent는 강도(100=보통, 200=2배), threshold는 적용 기준입니다. 사진 보정에서 가장 많이 쓰이는 샤프닝 기법입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    sharpened = canvas.filter(ImageFilter.SHARPEN)
    sharpened
  exercise:
    prompt: '3단계. 샤픈 필터: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      sharpened = canvas.filter(ImageFilter.SHARPEN)
      sharpened
    solution: |-
      sharpened = canvas.filter(ImageFilter.SHARPEN)
      sharpened
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 샤픈 필터는 이미지의 경계를 강조하여 선명하게 만듭니다. SHARPEN은 기본 샤프닝이고, UnsharpMask는 더 정교한 조절이 가능합니다. 흐린 사진을 선명하게 보정할 때 사용합니다.
  - type: code
    language: python
    title: 기본 샤픈
    description: SHARPEN 필터를 적용합니다
    content: |-
      sharpened = canvas.filter(ImageFilter.SHARPEN)
      sharpened
  - type: code
    language: python
    title: 언샵 마스크
    description: 전문적인 샤프닝 기법입니다
    content: |-
      unsharp = canvas.filter(ImageFilter.UnsharpMask(radius=2, percent=150, threshold=3))
      unsharp
  - type: tip
    content: UnsharpMask는 세 가지 파라미터를 가집니다. radius는 효과 범위, percent는 강도(100=보통, 200=2배), threshold는 적용 기준입니다. 사진 보정에서 가장 많이
      쓰이는 샤프닝 기법입니다.
