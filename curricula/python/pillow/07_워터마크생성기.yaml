  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: sklearn의 flower 이미지를 불러옵니다. 워터마크는 보통 사진의 저작권을 표시하거나 브랜드를 각인시키는 데 사용됩니다.
