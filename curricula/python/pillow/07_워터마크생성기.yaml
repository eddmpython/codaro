- id: workflow_validation
  title: 7단계. 워터마크 합성 검증 루프
  structuredPrimary: true
  subtitle: alpha와 위치 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 워터마크는 글자가 보이는지보다 원본 크기를 유지하면서 지정 위치의 픽셀이 실제로 변했는지 확인해야 합니다. alpha 범위를 검증하고 합성 전후 픽셀 차이를 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageChops

    watermarkBase = Image.new("RGBA", (180, 110), (80, 120, 170, 255))
    baseDraw = ImageDraw.Draw(watermarkBase)
    baseDraw.rectangle((20, 20, 160, 90), fill=(120, 170, 210, 255))

    def validateAlpha(alpha):
        if not (0 <= alpha <= 255):
            raise ValueError(f"alpha는 0~255 범위여야 합니다: {alpha}")
        return True

    validateAlpha(120)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageDraw, ImageChops

      watermarkBase = Image.new("RGBA", (180, 110), (80, 120, 170, 255))
      baseDraw = ImageDraw.Draw(watermarkBase)
      baseDraw.rectangle((20, 20, 160, 90), fill=(120, 170, 210, 255))

      def validateAlpha(alpha):
          if not (0 <= alpha <= 255):
              raise ValueError(f"alpha는 0~255 범위여야 합니다: {alpha}")
          return True

      validateAlpha(120)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
