- id: step2_simple_text
  title: 2단계. 기본 텍스트 삽입
  structuredPrimary: true
  subtitle: ImageDraw.text()
  goal: '2단계. 기본 텍스트 삽입: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 기본 텍스트 삽입: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    ImageDraw.Draw()로 그리기 객체를 생성하고 text() 메서드로 텍스트를 삽입합니다. 좌표, 텍스트, 색상을 지정할 수 있습니다. 기본 폰트를 사용하면 크기가 작습니다.

    text()의 첫 번째 인자는 (x, y) 좌표로 텍스트의 왼쪽 상단 위치입니다. fill은 텍스트 색상입니다. 색상은 'white', 'red' 같은 이름이나 (255, 255, 255) RGB 튜플로 지정합니다.
  tips:
  - text()의 첫 번째 인자는 (x, y) 좌표로 텍스트의 왼쪽 상단 위치입니다. fill은 텍스트 색상입니다. 색상은 'white', 'red' 같은 이름이나 (255, 255, 255) RGB 튜플로 지정합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    baseCopy = base.copy()
    draw = ImageDraw.Draw(baseCopy)
    type(draw)
  exercise:
    prompt: '2단계. 기본 텍스트 삽입: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      baseCopy = base.copy()
      draw = ImageDraw.Draw(baseCopy)
      type(draw)
    solution: |-
      baseCopy = base.copy()
      draw = ImageDraw.Draw(baseCopy)
      type(draw)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: ImageDraw.Draw()로 그리기 객체를 생성하고 text() 메서드로 텍스트를 삽입합니다. 좌표, 텍스트, 색상을 지정할 수 있습니다. 기본 폰트를 사용하면 크기가 작습니다.
  - type: code
    language: python
    title: 그리기 객체 생성
    description: 이미지에 그릴 준비를 합니다
    content: |-
      baseCopy = base.copy()
      draw = ImageDraw.Draw(baseCopy)
      type(draw)
  - type: code
    language: python
    title: 텍스트 삽입
    description: 왼쪽 상단에 텍스트를 넣습니다
    content: |-
      draw.text((10, 10), "Sample Watermark", fill='white')
      baseCopy
  - type: tip
    content: text()의 첫 번째 인자는 (x, y) 좌표로 텍스트의 왼쪽 상단 위치입니다. fill은 텍스트 색상입니다. 색상은 'white', 'red' 같은 이름이나 (255, 255, 255) RGB
      튜플로 지정합니다.
- id: step3_rgba
  title: 3단계. RGBA 모드
  structuredPrimary: true
  subtitle: 투명도 채널
  goal: '3단계. RGBA 모드: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. RGBA 모드: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    반투명 워터마크를 만들려면 RGBA 모드를 사용해야 합니다. RGBA는 RGB에 Alpha(투명도) 채널이 추가된 것입니다. Alpha 값이 0이면 완전 투명, 255면 완전 불투명입니다.

    Image.new('RGBA', size, (0, 0, 0, 0))은 완전 투명한 이미지를 생성합니다. 네 번째 값 0이 Alpha=0(투명)을 의미합니다. 이 투명 레이어 위에 워터마크를 그립니다.
  tips:
  - Image.new('RGBA', size, (0, 0, 0, 0))은 완전 투명한 이미지를 생성합니다. 네 번째 값 0이 Alpha=0(투명)을 의미합니다. 이 투명 레이어 위에 워터마크를 그립니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    baseRgba = base.convert('RGBA')
    baseRgba.mode
  exercise:
    prompt: '3단계. RGBA 모드: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      baseRgba = base.convert('RGBA')
      baseRgba.mode
    solution: |-
      baseRgba = base.convert('RGBA')
      baseRgba.mode
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 반투명 워터마크를 만들려면 RGBA 모드를 사용해야 합니다. RGBA는 RGB에 Alpha(투명도) 채널이 추가된 것입니다. Alpha 값이 0이면 완전 투명, 255면 완전 불투명입니다.
  - type: code
    language: python
    title: RGBA로 변환
    description: 투명도 채널을 추가합니다
    content: |-
      baseRgba = base.convert('RGBA')
      baseRgba.mode
  - type: code
    language: python
    title: 투명 레이어 생성
    description: 워터마크용 투명 이미지를 만듭니다
    content: |-
      watermark = Image.new('RGBA', base.size, (0, 0, 0, 0))
      watermark.mode, watermark.size
  - type: tip
    content: Image.new('RGBA', size, (0, 0, 0, 0))은 완전 투명한 이미지를 생성합니다. 네 번째 값 0이 Alpha=0(투명)을 의미합니다. 이 투명 레이어 위에 워터마크를 그립니다.
- id: step4_watermark_text
  title: 4단계. 워터마크 텍스트 그리기
  structuredPrimary: true
  subtitle: 반투명 텍스트
  goal: '4단계. 워터마크 텍스트 그리기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 워터마크 텍스트 그리기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    투명 레이어에 반투명 색상으로 텍스트를 그립니다. 색상의 네 번째 값이 Alpha입니다. (255, 255, 255, 128)은 50% 투명한 흰색입니다.

    Alpha 값 128은 약 50% 투명입니다. 값을 낮추면 더 투명해지고(흐릿), 높이면 더 불투명해집니다(선명). 워터마크는 보통 80~150 정도의 Alpha가 적당합니다.
  tips:
  - Alpha 값 128은 약 50% 투명입니다. 값을 낮추면 더 투명해지고(흐릿), 높이면 더 불투명해집니다(선명). 워터마크는 보통 80~150 정도의 Alpha가 적당합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    artist = ImageDraw.Draw(watermark)
    artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
    watermark
  exercise:
    prompt: '4단계. 워터마크 텍스트 그리기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      artist = ImageDraw.Draw(watermark)
      artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
      watermark
    solution: |-
      artist = ImageDraw.Draw(watermark)
      artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
      watermark
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 투명 레이어에 반투명 색상으로 텍스트를 그립니다. 색상의 네 번째 값이 Alpha입니다. (255, 255, 255, 128)은 50% 투명한 흰색입니다.
  - type: code
    language: python
    title: 워터마크 그리기
    description: 반투명 흰색 텍스트입니다
    content: |-
      artist = ImageDraw.Draw(watermark)
      artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
      watermark
  - type: code
    language: python
    title: 더 큰 워터마크
    description: 여러 위치에 그립니다
    content: |-
      positions = [(50, 50), (200, 150), (350, 250)]
      for pos in positions:
          artist.text(pos, "SAMPLE", fill=(255, 255, 255, 100))
      watermark
  - type: tip
    content: Alpha 값 128은 약 50% 투명입니다. 값을 낮추면 더 투명해지고(흐릿), 높이면 더 불투명해집니다(선명). 워터마크는 보통 80~150 정도의 Alpha가 적당합니다.
- id: step5_composite
