- id: step2_simple_text
  title: 2단계. 기본 텍스트 삽입
  structuredPrimary: true
  subtitle: ImageDraw.text()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ImageDraw.Draw()로 그리기 객체를 생성하고 text() 메서드로 텍스트를 삽입합니다. 좌표, 텍스트, 색상을 지정할 수 있습니다. 기본 폰트를 사용하면 크기가 작습니다.

    text()의 첫 번째 인자는 (x, y) 좌표로 텍스트의 왼쪽 상단 위치입니다. fill은 텍스트 색상입니다. 색상은 'white', 'red' 같은 이름이나 (255, 255, 255) RGB 튜플로 지정합니다.
  tips:
  - text()의 첫 번째 인자는 (x, y) 좌표로 텍스트의 왼쪽 상단 위치입니다. fill은 텍스트 색상입니다. 색상은 'white', 'red' 같은 이름이나 (255, 255, 255) RGB 튜플로 지정합니다.
  snippet: |-
    baseCopy = base.copy()
    draw = ImageDraw.Draw(baseCopy)
    type(draw)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      baseCopy = base.copy()
      draw = ImageDraw.Draw(baseCopy)
      type(draw)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_rgba
  title: 3단계. RGBA 모드
  structuredPrimary: true
  subtitle: 투명도 채널
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    반투명 워터마크를 만들려면 RGBA 모드를 사용해야 합니다. RGBA는 RGB에 Alpha(투명도) 채널이 추가된 것입니다. Alpha 값이 0이면 완전 투명, 255면 완전 불투명입니다.

    Image.new('RGBA', size, (0, 0, 0, 0))은 완전 투명한 이미지를 생성합니다. 네 번째 값 0이 Alpha=0(투명)을 의미합니다. 이 투명 레이어 위에 워터마크를 그립니다.
  tips:
  - Image.new('RGBA', size, (0, 0, 0, 0))은 완전 투명한 이미지를 생성합니다. 네 번째 값 0이 Alpha=0(투명)을 의미합니다. 이 투명 레이어 위에 워터마크를 그립니다.
  snippet: |-
    baseRgba = base.convert('RGBA')
    baseRgba.mode
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      baseRgba = base.convert('RGBA')
      baseRgba.mode
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_watermark_text
  title: 4단계. 워터마크 텍스트 그리기
  structuredPrimary: true
  subtitle: 반투명 텍스트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    투명 레이어에 반투명 색상으로 텍스트를 그립니다. 색상의 네 번째 값이 Alpha입니다. (255, 255, 255, 128)은 50% 투명한 흰색입니다.

    Alpha 값 128은 약 50% 투명입니다. 값을 낮추면 더 투명해지고(흐릿), 높이면 더 불투명해집니다(선명). 워터마크는 보통 80~150 정도의 Alpha가 적당합니다.
  tips:
  - Alpha 값 128은 약 50% 투명입니다. 값을 낮추면 더 투명해지고(흐릿), 높이면 더 불투명해집니다(선명). 워터마크는 보통 80~150 정도의 Alpha가 적당합니다.
  snippet: |-
    artist = ImageDraw.Draw(watermark)
    artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
    watermark
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      artist = ImageDraw.Draw(watermark)
      artist.text((50, 50), "WATERMARK", fill=(255, 255, 255, 128))
      watermark
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_composite
  title: 5단계. 이미지 합성
  structuredPrimary: true
  subtitle: alpha_composite()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    alpha_composite()는 두 RGBA 이미지를 투명도를 고려하여 합성합니다. paste()와 달리 Alpha 채널을 올바르게 처리합니다.

    alpha_composite()는 두 이미지 모두 RGBA 모드여야 합니다. paste()도 mask 인자로 투명도를 처리할 수 있지만, alpha_composite()가 더 직관적입니다.
  tips:
  - alpha_composite()는 두 이미지 모두 RGBA 모드여야 합니다. paste()도 mask 인자로 투명도를 처리할 수 있지만, alpha_composite()가 더 직관적입니다.
  snippet: |-
    combined = Image.alpha_composite(baseRgba, watermark)
    combined
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      combined = Image.alpha_composite(baseRgba, watermark)
      combined
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_corner
  title: 6단계. 코너 워터마크
  structuredPrimary: true
  subtitle: 위치 계산
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    워터마크를 오른쪽 하단 같은 특정 위치에 배치하려면 좌표를 계산해야 합니다. 이미지 크기와 텍스트 크기를 고려하여 위치를 정합니다.

    텍스트 크기를 정확히 알려면 draw.textbbox()나 draw.textlength()를 사용합니다. Codaro 로컬 Python에서는 기본 폰트만 사용 가능하므로 대략적인 추정치로 위치를 정합니다.
  tips:
  - 텍스트 크기를 정확히 알려면 draw.textbbox()나 draw.textlength()를 사용합니다. Codaro 로컬 Python에서는 기본 폰트만 사용 가능하므로 대략적인 추정치로 위치를 정합니다.
  snippet: |-
    cornerMark = Image.new('RGBA', base.size, (0, 0, 0, 0))
    pencil = ImageDraw.Draw(cornerMark)
    w, h = base.size
    w, h
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      cornerMark = Image.new('RGBA', base.size, (0, 0, 0, 0))
      pencil = ImageDraw.Draw(cornerMark)
      w, h = base.size
      w, h
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
