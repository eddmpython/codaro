    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실습 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실습에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: 7단계. 도형 렌더 검증 루프
  structuredPrimary: true
  subtitle: 좌표 계약과 픽셀 변화 확인
  goal: 7단계. 도형 렌더 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 도형 그리기는 좌표 계약을 잘못 잡으면 화면이 깨집니다. 사각형 박스와 다각형 점 개수를 검증하고, 그려진 픽셀 수와 주요 색상을 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw
    import numpy as np

