    hints:
    - 6단계. 도형 아트 생성 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 도형 아트 생성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 도형 아트 생성에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 도형 아트 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    자신만의 도형 아트를 만들어봅시다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image, ImageDraw

    chessBoard = Image.new('RGB', (320, 320), 'white')
    chessPen = ImageDraw.Draw(chessBoard)
    chessBoard.size
  exercise:
    prompt: 실습 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
