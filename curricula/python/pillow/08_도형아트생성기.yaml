intro:
  emoji: 🎨
  goal: ImageDraw로 다양한 도형을 그려 디지털 아트워크를 만듭니다.
  description: rectangle, ellipse, line, polygon 등 ImageDraw의 도형 그리기 메서드를 배웁니다. 합성 이미지 위에 도형을 그려 창의적인
    아트를 생성합니다.
  direction: 도형아트생성기에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - 도형아트생성기 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 캔버스 생성 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 사각형 그리기 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 원과 타원 그리기 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: 도형아트생성기 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: numpy, pillow 기준으로 로컬 Python 실행을 준비합니다.
    - label: 도형아트생성기 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 도형아트생성기 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
sections:
- id: step1_canvas
  title: 1단계. 캔버스 생성
  structuredPrimary: true
  subtitle: Image.new()
  goal: 1단계. 캔버스 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    도형을 그릴 빈 캔버스를 생성합니다. Image.new()로 원하는 크기와 배경색의 이미지를 만듭니다. 모드, 크기, 색상 순서로 인자를 전달합니다.

    Image.new()의 color는 'white', 'skyblue' 같은 이름이나 (255, 200, 100) RGB 튜플로 지정합니다. RGBA 모드면 (255, 200, 100, 255)처럼 네 값을 줍니다.
  tips:
  - Image.new()의 color는 'white', 'skyblue' 같은 이름이나 (255, 200, 100) RGB 튜플로 지정합니다. RGBA 모드면 (255, 200,
    100, 255)처럼 네 값을 줍니다.
  snippet: |-
    from PIL import Image, ImageDraw

    board = Image.new('RGB', (400, 300), color='white')
    board.size, board.mode
  exercise:
    prompt: 1단계. 캔버스 생성 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image, ImageDraw

      board = Image.new('RGB', (400, 300), color='white')
      board.size, board.mode
    hints:
    - 1단계. 캔버스 생성 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 캔버스 생성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 캔버스 생성에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_rectangle
  title: 2단계. 사각형 그리기
  structuredPrimary: true
  subtitle: rectangle()
  goal: 2단계. 사각형 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    rectangle() 메서드는 사각형을 그립니다. xy 파라미터로 좌상단과 우하단 좌표를 지정하고, fill은 채우기 색, outline은 테두리 색입니다.

    xy는 [(x1, y1), (x2, y2)] 또는 [x1, y1, x2, y2] 형식 모두 가능합니다. width는 테두리 두께입니다. fill과 outline을 동시에 지정하면 테두리가 있는 채워진 사각형이 됩니다.
  tips:
  - xy는 [(x1, y1), (x2, y2)] 또는 [x1, y1, x2, y2] 형식 모두 가능합니다. width는 테두리 두께입니다. fill과 outline을 동시에 지정하면
    테두리가 있는 채워진 사각형이 됩니다.
  snippet: |-
    canvas = Image.new('RGB', (400, 300), 'lightgray')
    artist = ImageDraw.Draw(canvas)
    type(artist)
  exercise:
    prompt: 2단계. 사각형 그리기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      canvas = Image.new('RGB', (400, 300), 'lightgray')
      artist = ImageDraw.Draw(canvas)
      type(artist)
    hints:
    - 2단계. 사각형 그리기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 사각형 그리기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 사각형 그리기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_ellipse
  title: 3단계. 원과 타원 그리기
  structuredPrimary: true
  subtitle: ellipse()
  goal: 3단계. 원과 타원 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    ellipse() 메서드는 원 또는 타원을 그립니다. 지정한 사각형에 내접하는 타원이 그려집니다. 정사각형을 지정하면 원이 됩니다.

    ellipse()도 rectangle()과 같은 좌표 형식을 사용합니다. 지정한 사각형의 경계에 맞춰 타원이 그려집니다. 정사각형이면 완벽한 원이 됩니다.
  tips:
  - ellipse()도 rectangle()과 같은 좌표 형식을 사용합니다. 지정한 사각형의 경계에 맞춰 타원이 그려집니다. 정사각형이면 완벽한 원이 됩니다.
  snippet: |-
    circleCanvas = Image.new('RGB', (400, 300), 'white')
    drawer = ImageDraw.Draw(circleCanvas)
    type(drawer)
  exercise:
    prompt: 3단계. 원과 타원 그리기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      circleCanvas = Image.new('RGB', (400, 300), 'white')
      drawer = ImageDraw.Draw(circleCanvas)
      type(drawer)
    hints:
    - 3단계. 원과 타원 그리기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 원과 타원 그리기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 원과 타원 그리기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_line
  title: 4단계. 선 그리기
  structuredPrimary: true
  subtitle: line()
  goal: 4단계. 선 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    line() 메서드는 여러 점을 연결하는 선을 그립니다. 두 점을 연결하면 직선, 여러 점을 연결하면 꺾은선이 됩니다.

    line()은 연결된 선분들을 그립니다. 닫힌 도형을 만들려면 마지막 점을 첫 점과 같게 하거나 polygon()을 사용합니다.
  tips:
  - line()은 연결된 선분들을 그립니다. 닫힌 도형을 만들려면 마지막 점을 첫 점과 같게 하거나 polygon()을 사용합니다.
  snippet: |-
    lineCanvas = Image.new('RGB', (400, 300), 'white')
    pen = ImageDraw.Draw(lineCanvas)
    pen.line([(50, 50), (350, 50)], fill='blue', width=3)
    lineCanvas
  exercise:
    prompt: 4단계. 선 그리기 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      lineCanvas = Image.new('RGB', (400, 300), 'white')
      pen = ImageDraw.Draw(lineCanvas)
      pen.line([(50, 50), (350, 50)], fill='blue', width=3)
      lineCanvas
    hints:
    - 4단계. 선 그리기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 선 그리기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 선 그리기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step5_polygon
  title: 5단계. 다각형 그리기
  structuredPrimary: true
  subtitle: polygon()
  goal: 5단계. 다각형 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    polygon() 메서드는 여러 점을 연결하여 닫힌 다각형을 그립니다. 삼각형, 오각형 등 원하는 모양을 만들 수 있습니다.

    polygon()은 자동으로 마지막 점과 첫 점을 연결하여 닫힌 도형을 만듭니다. 정다각형은 중심점과 반지름으로 각 꼭짓점 좌표를 계산하면 됩니다.
  tips:
  - polygon()은 자동으로 마지막 점과 첫 점을 연결하여 닫힌 도형을 만듭니다. 정다각형은 중심점과 반지름으로 각 꼭짓점 좌표를 계산하면 됩니다.
  snippet: |-
    polyCanvas = Image.new('RGB', (400, 300), 'white')
    brush = ImageDraw.Draw(polyCanvas)
    triangle = [(200, 50), (100, 200), (300, 200)]
    brush.polygon(triangle, fill='yellow', outline='black')
    polyCanvas
  exercise:
    prompt: 5단계. 다각형 그리기 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      polyCanvas = Image.new('RGB', (400, 300), 'white')
      brush = ImageDraw.Draw(polyCanvas)
      triangle = [(200, 50), (100, 200), (300, 200)]
      brush.polygon(triangle, fill='yellow', outline='black')
      polyCanvas
    hints:
    - 5단계. 다각형 그리기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 다각형 그리기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 다각형 그리기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step6_art
  title: 6단계. 도형 아트 생성
  structuredPrimary: true
  subtitle: 종합 활용
  goal: 6단계. 도형 아트 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 다양한 도형을 조합하여 추상 아트를 만들어봅시다. 랜덤 요소를 추가하면 매번 다른 결과가 나옵니다.
