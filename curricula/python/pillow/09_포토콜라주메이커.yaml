  - type: code
    language: python
    title: 그리드 오류 확인
    description: 3칸 그리드에 4장을 넣어 오류를 확인합니다.
    content: |-
      try:
          validateGrid(collageTiles, 1, 3)
      except ValueError as exc:
          collageErrorMessage = str(exc)

      collageErrorMessage
  - type: code
    language: python
    title: 콜라주 배치 검증
    description: padding을 포함한 캔버스 크기와 주요 좌표 색을 확인합니다.
    content: |-
      rows, cols, padding = 2, 2, 8
      tileWidth, tileHeight = 80, 60
      collageSize = (cols * tileWidth + (cols + 1) * padding, rows * tileHeight + (rows + 1) * padding)
      collageImage = Image.new("RGB", collageSize, (245, 245, 245))

      for index, tile in enumerate(collageTiles):
          row, col = divmod(index, cols)
          x = padding + col * (tileWidth + padding)
          y = padding + row * (tileHeight + padding)
          collageImage.paste(ImageOps.expand(tile, border=2, fill="white"), (x, y))

      collageChecks = {
          "sizeOk": collageImage.size == collageSize,
          "topLeftTileOk": collageImage.getpixel((20, 20)) == (220, 80, 80),
          "bottomRightTileOk": collageImage.getpixel((100, 80)) == (230, 190, 80),
          "errorOk": collageErrorMessage == "타일 수와 그리드가 맞지 않습니다: tiles=4, grid=1x3",
      }

      assert all(collageChecks.values()), collageChecks
      collageChecks
  - type: code
    language: python
    title: 실무 변주
    description: padding을 늘리면 전체 캔버스가 커지는지 확인합니다.
    content: |-
      largerPadding = 16
      largerSize = (cols * tileWidth + (cols + 1) * largerPadding, rows * tileHeight + (rows + 1) * largerPadding)

      assert largerSize[0] > collageSize[0]
      assert largerSize[1] > collageSize[1]
      collageSize, largerSize
