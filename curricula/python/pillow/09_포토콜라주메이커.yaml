    content: |-
      from PIL import Image, ImageOps

      collageTiles = [
          Image.new("RGB", (80, 60), color)
          for color in [(220, 80, 80), (80, 180, 120), (80, 120, 220), (230, 190, 80)]
      ]

      def validateGrid(tiles, rows, cols):
          if len(tiles) != rows * cols:
              raise ValueError(f"타일 수와 그리드가 맞지 않습니다: tiles={len(tiles)}, grid={rows}x{cols}")
          return True

