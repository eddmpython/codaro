sections:
- id: step1_images
  title: 1단계. 이미지 준비
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지 활용
  goal: '1단계. 이미지 준비: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 이미지 준비: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    sklearn 샘플 이미지를 다양하게 변형하여 콜라주용 이미지를 만듭니다. flower와 china 이미지를 크롭하고 리사이즈하여 네 장의 이미지를 준비합니다.

    한정된 이미지로도 crop()과 resize()를 활용하면 다양한 콜라주 소재를 만들 수 있습니다. 각기 다른 영역을 잘라내면 다른 이미지처럼 보입니다.
  tips:
  - 한정된 이미지로도 crop()과 resize()를 활용하면 다양한 콜라주 소재를 만들 수 있습니다. 각기 다른 영역을 잘라내면 다른 이미지처럼 보입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flower = Image.fromarray(load_sample_image('flower.jpg'))
    china = Image.fromarray(load_sample_image('china.jpg'))
    flower.size, china.size
  exercise:
    prompt: '1단계. 이미지 준비: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flower = Image.fromarray(load_sample_image('flower.jpg'))
      china = Image.fromarray(load_sample_image('china.jpg'))
      flower.size, china.size
    solution: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flower = Image.fromarray(load_sample_image('flower.jpg'))
      china = Image.fromarray(load_sample_image('china.jpg'))
      flower.size, china.size
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: sklearn 샘플 이미지를 다양하게 변형하여 콜라주용 이미지를 만듭니다. flower와 china 이미지를 크롭하고 리사이즈하여 네 장의 이미지를 준비합니다.
  - type: code
    language: python
    title: 라이브러리와 원본 이미지
    description: 두 개의 샘플 이미지를 로드합니다
    content: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flower = Image.fromarray(load_sample_image('flower.jpg'))
      china = Image.fromarray(load_sample_image('china.jpg'))
      flower.size, china.size
  - type: code
    language: python
    title: 콜라주용 이미지 준비
    description: 네 장으로 변형합니다
    content: |-
      size = (200, 200)
      img1 = flower.crop((0, 0, 400, 400)).resize(size)
      img2 = flower.crop((200, 100, 600, 500)).resize(size)
      img3 = china.crop((0, 0, 400, 400)).resize(size)
      img4 = china.crop((100, 50, 500, 450)).resize(size)
      img1.size, img2.size, img3.size, img4.size
  - type: tip
    content: 한정된 이미지로도 crop()과 resize()를 활용하면 다양한 콜라주 소재를 만들 수 있습니다. 각기 다른 영역을 잘라내면 다른 이미지처럼 보입니다.
