sections:
- id: step1_images
  title: 1단계. 이미지 준비
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    sklearn 샘플 이미지를 다양하게 변형하여 콜라주용 이미지를 만듭니다. flower와 china 이미지를 크롭하고 리사이즈하여 네 장의 이미지를 준비합니다.

    한정된 이미지로도 crop()과 resize()를 활용하면 다양한 콜라주 소재를 만들 수 있습니다. 각기 다른 영역을 잘라내면 다른 이미지처럼 보입니다.
  tips:
  - 한정된 이미지로도 crop()과 resize()를 활용하면 다양한 콜라주 소재를 만들 수 있습니다. 각기 다른 영역을 잘라내면 다른 이미지처럼 보입니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flower = Image.fromarray(load_sample_image('flower.jpg'))
    china = Image.fromarray(load_sample_image('china.jpg'))
    flower.size, china.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flower = Image.fromarray(load_sample_image('flower.jpg'))
      china = Image.fromarray(load_sample_image('china.jpg'))
      flower.size, china.size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_canvas
  title: 2단계. 콜라주 캔버스
  structuredPrimary: true
  subtitle: 전체 크기 계산
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 2x2 그리드의 콜라주 캔버스를 생성합니다. 각 이미지가 200x200이면 전체 캔버스는 400x400입니다. 여백을 추가하면 더 보기 좋습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    cellSize = 200
    gap = 10
    cols, rows = 2, 2
    totalW = cols * cellSize + (cols + 1) * gap
    totalH = rows * cellSize + (rows + 1) * gap
    totalW, totalH
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      cellSize = 200
      gap = 10
      cols, rows = 2, 2
      totalW = cols * cellSize + (cols + 1) * gap
      totalH = rows * cellSize + (rows + 1) * gap
      totalW, totalH
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_paste
  title: 3단계. 이미지 배치
  structuredPrimary: true
  subtitle: paste()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    paste() 메서드로 이미지를 캔버스의 특정 위치에 붙입니다. 위치는 (x, y) 좌표로 지정하며, 붙일 이미지의 왼쪽 상단이 해당 좌표에 배치됩니다.

    paste()는 원본 이미지를 직접 수정합니다. 반환값이 없으며, 원본을 보존하려면 copy() 후 paste()해야 합니다.
  tips:
  - paste()는 원본 이미지를 직접 수정합니다. 반환값이 없으며, 원본을 보존하려면 copy() 후 paste()해야 합니다.
  snippet: |-
    x1 = gap
    y1 = gap
    collage.paste(img1, (x1, y1))
    collage
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      x1 = gap
      y1 = gap
      collage.paste(img1, (x1, y1))
      collage
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_resize_fit
  title: 4단계. 크기 맞춤
  structuredPrimary: true
  subtitle: 다른 크기 이미지 처리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실제 이미지는 크기가 제각각입니다. sklearn 이미지를 콜라주에 넣으려면 resize()로 크기를 맞춰야 합니다.

    resize()는 비율을 무시하고 정확한 크기로 변환합니다. 비율을 유지하려면 thumbnail()을 사용하거나, 비율 계산 후 resize()합니다.
  tips:
  - resize()는 비율을 무시하고 정확한 크기로 변환합니다. 비율을 유지하려면 thumbnail()을 사용하거나, 비율 계산 후 resize()합니다.
  snippet: |-
    from sklearn.datasets import load_sample_image

    bloomArr = load_sample_image('flower.jpg')
    bloom = Image.fromarray(bloomArr)
    bloom.size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
