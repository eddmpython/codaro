- id: step6_border
  title: 6단계. 테두리 추가
  structuredPrimary: true
  subtitle: ImageDraw 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: ImageDraw로 각 이미지 주변에 테두리를 그려 콜라주를 더 세련되게 만듭니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import ImageDraw

    finalCollage = mixedCollage.copy()
    borderPen = ImageDraw.Draw(finalCollage)

    positions = [
        (gap, gap),
        (gap + cellSize + gap, gap),
        (gap, gap + cellSize + gap),
        (gap + cellSize + gap, gap + cellSize + gap)
    ]

    for x, y in positions:
        borderPen.rectangle([x-2, y-2, x+cellSize+1, y+cellSize+1], outline='black', width=2)

    finalCollage
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import ImageDraw

      finalCollage = mixedCollage.copy()
      borderPen = ImageDraw.Draw(finalCollage)

      positions = [
          (gap, gap),
          (gap + cellSize + gap, gap),
          (gap, gap + cellSize + gap),
          (gap + cellSize + gap, gap + cellSize + gap)
      ]

      for x, y in positions:
          borderPen.rectangle([x-2, y-2, x+cellSize+1, y+cellSize+1], outline='black', width=2)

      finalCollage
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 콜라주 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    다양한 레이아웃의 콜라주를 만들어봅시다. 위에서 배운 paste()와 좌표 계산을 활용하여 가로 스트립과 듀오 콜라주를 직접 구성합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    bloomImg = Image.fromarray(load_sample_image('flower.jpg'))
    sceneImg = Image.fromarray(load_sample_image('china.jpg'))

    stripSize = (150, 100)
    strip1 = bloomImg.crop((0, 0, 300, 200)).resize(stripSize)
    strip2 = bloomImg.crop((200, 150, 500, 350)).resize(stripSize)
    strip3 = sceneImg.crop((0, 0, 300, 200)).resize(stripSize)
    strip1
  exercise:
