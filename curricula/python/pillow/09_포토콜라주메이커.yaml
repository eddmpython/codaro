- id: workflow_validation
  title: 7단계. 콜라주 레이아웃 검증 루프
  structuredPrimary: true
  subtitle: grid, padding, paste 위치 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 콜라주는 이미지를 붙이는 과제가 아니라 레이아웃 계산 문제입니다. 이미지 개수와 그리드가 맞는지 검증하고, 각 타일이 의도한 좌표에 배치됐는지 픽셀로 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageOps

    collageTiles = [
        Image.new("RGB", (80, 60), color)
        for color in [(220, 80, 80), (80, 180, 120), (80, 120, 220), (230, 190, 80)]
    ]

    def validateGrid(tiles, rows, cols):
        if len(tiles) != rows * cols:
            raise ValueError(f"타일 수와 그리드가 맞지 않습니다: tiles={len(tiles)}, grid={rows}x{cols}")
        return True

    validateGrid(collageTiles, 2, 2)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageOps

      collageTiles = [
          Image.new("RGB", (80, 60), color)
          for color in [(220, 80, 80), (80, 180, 120), (80, 120, 220), (230, 190, 80)]
      ]

      def validateGrid(tiles, rows, cols):
          if len(tiles) != rows * cols:
              raise ValueError(f"타일 수와 그리드가 맞지 않습니다: tiles={len(tiles)}, grid={rows}x{cols}")
          return True

      validateGrid(collageTiles, 2, 2)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
