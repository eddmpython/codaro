- id: step6_overlay
  title: 6단계. 로고/워터마크 추가
  structuredPrimary: true
  subtitle: 이미지 합성
  goal: 6단계. 로고/워터마크 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 작은 로고나 워터마크를 추가합니다. 직접 도형으로 간단한 로고를 만들어봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    logo = Image.new('RGBA', (50, 50), (0, 0, 0, 0))
    logoDraw = ImageDraw.Draw(logo)
    logoDraw.ellipse([5, 5, 45, 45], fill=(255, 100, 100, 200))
    logoDraw.text((15, 18), "PY", fill=(255, 255, 255, 255))
    logo
  exercise:
    prompt: 6단계. 로고/워터마크 추가 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      logo = Image.new('RGBA', (50, 50), (0, 0, 0, 0))
      logoDraw = ImageDraw.Draw(logo)
      logoDraw.ellipse([5, 5, 45, 45], fill=(255, 100, 100, 200))
      logoDraw.text((15, 18), "PY", fill=(255, 255, 255, 255))
      logo
    hints:
    - 6단계. 로고/워터마크 추가 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 로고/워터마크 추가 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 로고/워터마크 추가에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
