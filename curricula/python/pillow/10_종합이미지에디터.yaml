  title: 2단계. 크기 편집
  structuredPrimary: true
  subtitle: 자르기와 리사이즈
  goal: '2단계. 크기 편집: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 크기 편집: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 이미지의 특정 영역을 추출하고 원하는 크기로 조절합니다. 이전 프로젝트에서 배운 crop()과 resize()를 활용합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    w, h = working.size
    marginW = int(w * 0.1)
    marginH = int(h * 0.1)
    cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
    cropped.size
  exercise:
    prompt: '2단계. 크기 편집: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      w, h = working.size
      marginW = int(w * 0.1)
      marginH = int(h * 0.1)
      cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
      cropped.size
    solution: |-
      w, h = working.size
      marginW = int(w * 0.1)
      marginH = int(h * 0.1)
      cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
      cropped.size
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 이미지의 특정 영역을 추출하고 원하는 크기로 조절합니다. 이전 프로젝트에서 배운 crop()과 resize()를 활용합니다.
  - type: code
    language: python
    title: 중앙 영역 추출
    description: 가로 80%, 세로 80% 영역을 자릅니다
    content: |-
      w, h = working.size
      marginW = int(w * 0.1)
      marginH = int(h * 0.1)
      cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
