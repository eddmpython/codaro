- id: workflow_validation
  title: 8단계. 종합 이미지 편집 검증 루프
  structuredPrimary: true
  subtitle: crop → resize → enhance → watermark
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 종합 이미지 에디터는 여러 기능을 이어 붙이는 데서 끝나지 않습니다. 편집 설정의 입력 계약을 검증하고, 최종 이미지 크기와 픽셀 변화, 워터마크 위치가 의도대로 나오는지 확인해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageEnhance, ImageFilter, ImageChops

    editorSource = Image.new("RGB", (220, 140), (90, 120, 150))
    editorDraw = ImageDraw.Draw(editorSource)
    editorDraw.rectangle((35, 30, 185, 110), fill=(160, 140, 100))
    editorDraw.ellipse((82, 42, 138, 98), fill=(230, 210, 130))

    editConfig = {
        "crop": (30, 20, 190, 120),
        "size": (160, 100),
        "brightness": 1.15,
        "contrast": 1.25,
        "watermarkAlpha": 110,
    }

    def validateEditConfig(image, config):
        left, top, right, bottom = config["crop"]
        if not (0 <= left < right <= image.size[0] and 0 <= top < bottom <= image.size[1]):
            raise ValueError(f"crop 설정 오류: {config['crop']}")
        if config["watermarkAlpha"] < 0 or config["watermarkAlpha"] > 255:
            raise ValueError(f"watermarkAlpha 범위 오류: {config['watermarkAlpha']}")
        return True

    validateEditConfig(editorSource, editConfig)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageDraw, ImageEnhance, ImageFilter, ImageChops

      editorSource = Image.new("RGB", (220, 140), (90, 120, 150))
      editorDraw = ImageDraw.Draw(editorSource)
      editorDraw.rectangle((35, 30, 185, 110), fill=(160, 140, 100))
      editorDraw.ellipse((82, 42, 138, 98), fill=(230, 210, 130))

      editConfig = {
          "crop": (30, 20, 190, 120),
          "size": (160, 100),
          "brightness": 1.15,
          "contrast": 1.25,
          "watermarkAlpha": 110,
      }

      def validateEditConfig(image, config):
          left, top, right, bottom = config["crop"]
          if not (0 <= left < right <= image.size[0] and 0 <= top < bottom <= image.size[1]):
              raise ValueError(f"crop 설정 오류: {config['crop']}")
          if config["watermarkAlpha"] < 0 or config["watermarkAlpha"] > 255:
              raise ValueError(f"watermarkAlpha 범위 오류: {config['watermarkAlpha']}")
          return True

      validateEditConfig(editorSource, editConfig)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
