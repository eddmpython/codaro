sections:
- id: step1_load
  title: 1단계. 이미지 로드
  structuredPrimary: true
  subtitle: 편집할 원본 준비
  goal: '1단계. 이미지 로드: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 이미지 로드: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: sklearn의 china 이미지를 원본으로 사용합니다. 편집 과정에서 원본을 보존하기 위해 copy()로 작업 이미지를 생성합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
    from sklearn.datasets import load_sample_image

    originalArr = load_sample_image('china.jpg')
    original = Image.fromarray(originalArr)
    original.size, original.mode
  exercise:
    prompt: '1단계. 이미지 로드: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
      from sklearn.datasets import load_sample_image

      originalArr = load_sample_image('china.jpg')
      original = Image.fromarray(originalArr)
      original.size, original.mode
    solution: |-
      from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
      from sklearn.datasets import load_sample_image

      originalArr = load_sample_image('china.jpg')
      original = Image.fromarray(originalArr)
      original.size, original.mode
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: sklearn의 china 이미지를 원본으로 사용합니다. 편집 과정에서 원본을 보존하기 위해 copy()로 작업 이미지를 생성합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: 모든 필요한 모듈을 임포트합니다
    content: |-
      from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
      from sklearn.datasets import load_sample_image

      originalArr = load_sample_image('china.jpg')
      original = Image.fromarray(originalArr)
      original.size, original.mode
  - type: code
    language: python
    title: 작업 이미지 생성
    description: 원본을 복사하여 편집합니다
    content: |-
      working = original.copy()
      working.size
  - type: code
    language: python
    title: 원본 확인
    description: 편집 전 상태입니다
    content: working
