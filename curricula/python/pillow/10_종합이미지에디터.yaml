- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 종합 에디터 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    flower 이미지에 전체 편집 파이프라인을 적용해봅시다. 위에서 배운 크기 조절, 필터, 색상 보정, 텍스트, 합성을 종합하여 완성도 높은 이미지를 만듭니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
    from sklearn.datasets import load_sample_image

    vintageArr = load_sample_image('flower.jpg')
    vintageBase = Image.fromarray(vintageArr)
    vintageBase
  exercise:
    prompt: 실습 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
      from sklearn.datasets import load_sample_image

      vintageArr = load_sample_image('flower.jpg')
      vintageBase = Image.fromarray(vintageArr)
      vintageBase
    hints:
    - 실습 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실습 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실습에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: 8단계. 종합 이미지 편집 검증 루프
  structuredPrimary: true
  subtitle: crop → resize → enhance → watermark
  goal: 8단계. 종합 이미지 편집 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 종합 이미지 에디터는 여러 기능을 이어 붙이는 데서 끝나지 않습니다. 편집 설정의 입력 계약을 검증하고, 최종 이미지 크기와 픽셀 변화, 워터마크 위치가 의도대로
    나오는지 확인해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageEnhance, ImageFilter, ImageChops

    editorSource = Image.new("RGB", (220, 140), (90, 120, 150))
    editorDraw = ImageDraw.Draw(editorSource)
    editorDraw.rectangle((35, 30, 185, 110), fill=(160, 140, 100))
    editorDraw.ellipse((82, 42, 138, 98), fill=(230, 210, 130))

    editConfig = {
        "crop": (30, 20, 190, 120),
        "size": (160, 100),
        "brightness": 1.15,
        "contrast": 1.25,
        "watermarkAlpha": 110,
    }

    def validateEditConfig(image, config):
        left, top, right, bottom = config["crop"]
        if not (0 <= left < right <= image.size[0] and 0 <= top < bottom <= image.size[1]):
            raise ValueError(f"crop 설정 오류: {config['crop']}")
        if config["watermarkAlpha"] < 0 or config["watermarkAlpha"] > 255:
            raise ValueError(f"watermarkAlpha 범위 오류: {config['watermarkAlpha']}")
        return True

    validateEditConfig(editorSource, editConfig)
  exercise:
    prompt: 8단계. 종합 이미지 편집 검증 루프 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
