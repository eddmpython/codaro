- id: step5_text
  title: 5단계. 텍스트 추가
  structuredPrimary: true
  subtitle: ImageDraw 활용
  goal: 5단계. 텍스트 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
