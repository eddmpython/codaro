intro:
  emoji: 🎬
  goal: 지금까지 배운 모든 Pillow 기능을 종합하여 이미지 에디터를 만듭니다.
  description: 이미지 로드, 크기 조절, 필터, 색상 조정, 텍스트 삽입, 합성까지 전체 편집 파이프라인을 구현합니다. 모든 개념을 실전에서 활용합니다.
  direction: 종합이미지에디터에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - 종합이미지에디터 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 이미지 로드 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 크기 편집 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 필터 적용 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: 종합이미지에디터 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: pillow, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 종합이미지에디터 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 종합이미지에디터 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
sections:
- id: step1_load
  title: 1단계. 이미지 로드
  structuredPrimary: true
  subtitle: 편집할 원본 준비
  goal: 1단계. 이미지 로드에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn의 china 이미지를 원본으로 사용합니다. 편집 과정에서 원본을 보존하기 위해 copy()로 작업 이미지를 생성합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
    from sklearn.datasets import load_sample_image

    originalArr = load_sample_image('china.jpg')
    original = Image.fromarray(originalArr)
    original.size, original.mode
  exercise:
    prompt: 1단계. 이미지 로드 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image, ImageFilter, ImageEnhance, ImageDraw
      from sklearn.datasets import load_sample_image

      originalArr = load_sample_image('china.jpg')
      original = Image.fromarray(originalArr)
      original.size, original.mode
    hints:
    - 1단계. 이미지 로드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 로드 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 로드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_crop_resize
  title: 2단계. 크기 편집
  structuredPrimary: true
  subtitle: 자르기와 리사이즈
  goal: 2단계. 크기 편집에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 이미지의 특정 영역을 추출하고 원하는 크기로 조절합니다. 이전 프로젝트에서 배운 crop()과 resize()를 활용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    w, h = working.size
    marginW = int(w * 0.1)
    marginH = int(h * 0.1)
    cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
    cropped.size
  exercise:
    prompt: 2단계. 크기 편집 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      w, h = working.size
      marginW = int(w * 0.1)
      marginH = int(h * 0.1)
      cropped = working.crop((marginW, marginH, w - marginW, h - marginH))
      cropped.size
    hints:
    - 2단계. 크기 편집 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 크기 편집 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 크기 편집에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_filter
  title: 3단계. 필터 적용
  structuredPrimary: true
  subtitle: ImageFilter 활용
  goal: 3단계. 필터 적용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 이미지에 필터를 적용하여 분위기를 바꿉니다. 여러 필터를 순차적으로 적용할 수도 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    filtered = resized.filter(ImageFilter.UnsharpMask(radius=2, percent=120))
    filtered
  exercise:
    prompt: 3단계. 필터 적용 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      filtered = resized.filter(ImageFilter.UnsharpMask(radius=2, percent=120))
      filtered
    hints:
    - 3단계. 필터 적용 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 필터 적용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 필터 적용에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_color
  title: 4단계. 색상 조정
  structuredPrimary: true
  subtitle: ImageEnhance 활용
  goal: 4단계. 색상 조정에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 밝기, 대비, 채도를 조절하여 이미지를 보정합니다. 각 조정은 순차적으로 적용됩니다.
  tips:
