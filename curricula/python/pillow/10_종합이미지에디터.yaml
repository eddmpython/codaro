    starterCode: |-
      edits = [
          "1. 10% 마진 자르기",
          "2. 800x600 리사이즈",
          "3. UnsharpMask + EdgeEnhance 필터",
          "4. 밝기 1.1x, 대비 1.15x, 채도 1.2x",
          "5. 하단 텍스트 배너",
          "6. 로고 워터마크"
      ]
      edits
    hints:
