  structuredPrimary: true
  subtitle: 원본과 편집본
  goal: 7단계. 결과 비교에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 원본 이미지와 최종 편집 결과를 비교합니다. 여러 단계의 편집이 적용된 결과를 확인합니다.
