- id: workflow_validation
  title: 6단계. 흑백 변환 검증 루프
  structuredPrimary: true
  subtitle: mode와 이진화 기준 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 흑백 변환은 convert('L') 한 줄로 끝나지 않습니다. 입력 mode를 확인하고, 이진화 결과가 실제로 0과 255만 가지는지, 임계값 변화가 전경 비율을 어떻게 바꾸는지 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw
    import numpy as np

    toneImage = Image.new("RGB", (160, 100), (40, 80, 130))
    toneDraw = ImageDraw.Draw(toneImage)
    toneDraw.rectangle((20, 20, 75, 80), fill=(230, 220, 170))
    toneDraw.rectangle((90, 20, 140, 80), fill=(120, 60, 40))

    def validateRgbSource(image):
        if image.mode != "RGB":
            raise ValueError(f"RGB 원본이 필요합니다: {image.mode}")
        return True

    validateRgbSource(toneImage)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageDraw
      import numpy as np

      toneImage = Image.new("RGB", (160, 100), (40, 80, 130))
      toneDraw = ImageDraw.Draw(toneImage)
      toneDraw.rectangle((20, 20, 75, 80), fill=(230, 220, 170))
      toneDraw.rectangle((90, 20, 140, 80), fill=(120, 60, 40))

      def validateRgbSource(image):
          if image.mode != "RGB":
              raise ValueError(f"RGB 원본이 필요합니다: {image.mode}")
          return True

      validateRgbSource(toneImage)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
