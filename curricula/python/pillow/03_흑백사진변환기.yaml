sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    네트워크 상태에 영향을 받지 않도록 sklearn에 내장된 샘플 이미지를 사용합니다. flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다.

    sklearn에는 flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다. load_sample_image()는 NumPy 배열을 반환하므로 Image.fromarray()로 PIL 이미지로 변환합니다.
  tips:
  - sklearn에는 flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다. load_sample_image()는 NumPy 배열을 반환하므로 Image.fromarray()로 PIL 이미지로 변환합니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    pic = Image.fromarray(flowerArr)
    pic.size, pic.mode
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      pic = Image.fromarray(flowerArr)
      pic.size, pic.mode
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_grayscale
  title: 2단계. 흑백 변환
  structuredPrimary: true
  subtitle: convert('L')
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    convert() 메서드는 이미지의 색상 모드를 변환합니다. 'L' 모드는 그레이스케일(흑백)을 의미합니다. RGB 세 채널이 하나의 밝기 채널로 합쳐집니다. 내부적으로 Y = 0.299R + 0.587G + 0.114B 공식이 사용됩니다.

    L 모드는 0(검정)부터 255(흰색)까지의 밝기 값 하나만 가집니다. 메모리 사용량이 RGB의 1/3입니다. 많은 이미지 처리 알고리즘이 흑백 이미지에서 더 빠르게 동작합니다.
  tips:
  - L 모드는 0(검정)부터 255(흰색)까지의 밝기 값 하나만 가집니다. 메모리 사용량이 RGB의 1/3입니다. 많은 이미지 처리 알고리즘이 흑백 이미지에서 더 빠르게 동작합니다.
  snippet: |-
    gray = pic.convert('L')
    gray.mode
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      gray = pic.convert('L')
      gray.mode
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_threshold
  title: 3단계. 이진화 (흑백 대비)
  structuredPrimary: true
  subtitle: point()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    point() 메서드는 각 픽셀에 함수를 적용합니다. 이진화는 특정 임계값을 기준으로 픽셀을 완전한 흑(0) 또는 백(255)으로 변환합니다. 마치 잉크 도장처럼 중간 톤이 없는 고대비 이미지가 됩니다.

    point()의 람다 함수는 각 픽셀 값(0-255)을 받아 새 값을 반환합니다. 이진화에서 임계값을 낮추면 더 많은 영역이 흰색이 되고, 높이면 더 많은 영역이 검은색이 됩니다.
  tips:
  - point()의 람다 함수는 각 픽셀 값(0-255)을 받아 새 값을 반환합니다. 이진화에서 임계값을 낮추면 더 많은 영역이 흰색이 되고, 높이면 더 많은 영역이 검은색이 됩니다.
  snippet: |-
    threshold = 128
    binary = gray.point(lambda x: 255 if x > threshold else 0)
    binary.mode
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      threshold = 128
      binary = gray.point(lambda x: 255 if x > threshold else 0)
      binary.mode
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_sepia
  title: 4단계. 세피아 효과
  structuredPrimary: true
  subtitle: 픽셀 연산
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    세피아는 오래된 사진 느낌을 주는 갈색 톤입니다. 흑백 이미지를 RGB로 다시 변환한 뒤, R/G/B 각 채널에 다른 계수를 곱해 세피아 톤을 만듭니다. split()으로 채널을 분리하고 merge()로 합칩니다.

    split()은 RGB 이미지를 세 개의 L 모드 이미지로 분리합니다. 흑백을 RGB로 변환하면 R=G=B가 동일한 값을 가집니다. 각 채널을 개별 조작한 뒤 merge()로 합칠 수 있습니다.
  tips:
  - split()은 RGB 이미지를 세 개의 L 모드 이미지로 분리합니다. 흑백을 RGB로 변환하면 R=G=B가 동일한 값을 가집니다. 각 채널을 개별 조작한 뒤 merge()로 합칠 수 있습니다.
  snippet: |-
    grayRgb = gray.convert('RGB')
    grayRgb.mode
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      grayRgb = gray.convert('RGB')
      grayRgb.mode
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
