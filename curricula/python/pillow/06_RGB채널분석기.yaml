sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn에 내장된 샘플 이미지를 사용합니다. RGB 채널 분석에는 색상이 풍부한 china 이미지가 적합합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    chinaArr = load_sample_image('china.jpg')
    source = Image.fromarray(chinaArr)
    source.size, source.mode
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      chinaArr = load_sample_image('china.jpg')
      source = Image.fromarray(chinaArr)
      source.size, source.mode
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_split
  title: 2단계. 채널 분리
  structuredPrimary: true
  subtitle: split()
  goal: 2단계. 채널 분리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    split() 메서드는 RGB 이미지를 세 개의 단일 채널(L 모드) 이미지로 분리합니다. 각 채널은 해당 색상의 밝기만 담고 있습니다. R 채널이 밝으면 그 부분에 빨간색이 많다는 의미입니다.

    split()이 반환하는 각 이미지는 L 모드(그레이스케일)입니다. 밝은 부분은 해당 색상이 강한 곳, 어두운 부분은 해당 색상이 약한 곳입니다.
  tips:
  - split()이 반환하는 각 이미지는 L 모드(그레이스케일)입니다. 밝은 부분은 해당 색상이 강한 곳, 어두운 부분은 해당 색상이 약한 곳입니다.
  snippet: |-
    red, green, blue = source.split()
    red.mode, green.mode, blue.mode
  exercise:
    prompt: 2단계. 채널 분리 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      red, green, blue = source.split()
      red.mode, green.mode, blue.mode
    hints:
    - 2단계. 채널 분리 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 채널 분리 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 채널 분리에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_visualize
  title: 3단계. 채널 시각화
  structuredPrimary: true
  subtitle: 색상으로 채널 표현
  goal: 3단계. 채널 시각화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    분리된 채널을 해당 색상으로 시각화하려면 다른 채널을 0으로 채운 이미지를 만들어야 합니다. Image.new()로 검은 이미지를 만들고 merge()로 합성합니다.

    merge('RGB', (r, g, b))는 세 개의 L 모드 이미지를 하나의 RGB 이미지로 합칩니다. 순서가 중요하며 반드시 R, G, B 순서로 전달해야 합니다.
  tips:
  - merge('RGB', (r, g, b))는 세 개의 L 모드 이미지를 하나의 RGB 이미지로 합칩니다. 순서가 중요하며 반드시 R, G, B 순서로 전달해야 합니다.
  snippet: |-
    empty = Image.new('L', source.size, 0)
    empty.mode, empty.size
  exercise:
    prompt: 3단계. 채널 시각화 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      empty = Image.new('L', source.size, 0)
      empty.mode, empty.size
    hints:
    - 3단계. 채널 시각화 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 채널 시각화 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 채널 시각화에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_histogram
  title: 4단계. 히스토그램 분석
  structuredPrimary: true
  subtitle: histogram()
  goal: 4단계. 히스토그램 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    histogram() 메서드는 각 밝기 값(0-255)에 해당하는 픽셀 수를 반환합니다. RGB 이미지는 768개(256×3) 값을 반환하며, 처음 256개가 R, 다음 256개가 G, 마지막 256개가 B입니다.

    히스토그램에서 높은 값이 있는 위치는 해당 밝기의 픽셀이 많다는 의미입니다. 0 근처에 집중되면 어두운 이미지, 255 근처에 집중되면 밝은 이미지입니다.
  tips:
  - 히스토그램에서 높은 값이 있는 위치는 해당 밝기의 픽셀이 많다는 의미입니다. 0 근처에 집중되면 어두운 이미지, 255 근처에 집중되면 밝은 이미지입니다.
  snippet: |-
    hist = source.histogram()
    len(hist)
  exercise:
    prompt: 4단계. 히스토그램 분석 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      hist = source.histogram()
      len(hist)
    hints:
    - 4단계. 히스토그램 분석 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 히스토그램 분석 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 히스토그램 분석에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_analysis
  title: 5단계. 색상 분포 분석
  structuredPrimary: true
  subtitle: 통계 추출
  goal: 5단계. 색상 분포 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    히스토그램에서 평균 밝기, 가장 많은 픽셀의 밝기 등을 계산할 수 있습니다. 이를 통해 이미지의 전반적인 색조를 파악합니다.

    평균값이 가장 높은 채널이 이미지의 전체적인 색조를 결정합니다. 풍경 사진은 보통 G와 B가 높고, 일몰 사진은 R이 높습니다.
  tips:
  - 평균값이 가장 높은 채널이 이미지의 전체적인 색조를 결정합니다. 풍경 사진은 보통 G와 B가 높고, 일몰 사진은 R이 높습니다.
  snippet: |-
    totalPixels = source.size[0] * source.size[1]
    avgR = sum(i * histR[i] for i in range(256)) / totalPixels
    avgG = sum(i * histG[i] for i in range(256)) / totalPixels
    avgB = sum(i * histB[i] for i in range(256)) / totalPixels
    round(avgR, 1), round(avgG, 1), round(avgB, 1)
  exercise:
    prompt: 5단계. 색상 분포 분석 예제에서 반복 대상이나 범위을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      totalPixels = source.size[0] * source.size[1]
      avgR = sum(i * histR[i] for i in range(256)) / totalPixels
      avgG = sum(i * histG[i] for i in range(256)) / totalPixels
      avgB = sum(i * histB[i] for i in range(256)) / totalPixels
      round(avgR, 1), round(avgG, 1), round(avgB, 1)
    hints:
    - 5단계. 색상 분포 분석 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 색상 분포 분석 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 색상 분포 분석에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step6_swap
  title: 6단계. 채널 교환
  structuredPrimary: true
  subtitle: 색상 효과
  goal: 6단계. 채널 교환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 채널 순서를 바꿔 독특한 색상 효과를 만들 수 있습니다. R↔B를 교환하면 파란 하늘이 주황색으로 바뀌는 등의 효과가 나타납니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    swapped = Image.merge('RGB', (blue, green, red))
    swapped
  exercise:
    prompt: 6단계. 채널 교환 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      swapped = Image.merge('RGB', (blue, green, red))
      swapped
    hints:
    - 6단계. 채널 교환 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 채널 교환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 채널 교환에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 채널 분석 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    sklearn 이미지의 채널을 분석하고 조작해봅시다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flower = Image.fromarray(flowerArr)
    flower
  exercise:
    prompt: 실습 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flower = Image.fromarray(flowerArr)
      flower
    hints:
    - 실습 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실습 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실습에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: 7단계. RGB 채널 검증 루프
  structuredPrimary: true
  subtitle: split, histogram, merge 확인
  goal: 7단계. RGB 채널 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: RGB 채널 분석은 채널을 분리해 보는 데서 끝나지 않습니다. 각 채널의 평균과 histogram 총합이 이미지 크기와 맞는지 확인하고, 채널 교환 결과가
    의도대로 바뀌는지 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageStat

    channelImage = Image.new("RGB", (120, 90))
