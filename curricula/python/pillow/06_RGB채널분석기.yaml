- id: workflow_validation
  title: 7단계. RGB 채널 검증 루프
  structuredPrimary: true
  subtitle: split, histogram, merge 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: RGB 채널 분석은 채널을 분리해 보는 데서 끝나지 않습니다. 각 채널의 평균과 histogram 총합이 이미지 크기와 맞는지 확인하고, 채널 교환 결과가 의도대로 바뀌는지 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageStat

    channelImage = Image.new("RGB", (120, 90))
    for x in range(120):
        for y in range(90):
            if x < 40:
                channelImage.putpixel((x, y), (220, 40, 40))
            elif x < 80:
                channelImage.putpixel((x, y), (40, 220, 40))
            else:
                channelImage.putpixel((x, y), (40, 40, 220))

    def validateRgbMode(image):
        if image.mode != "RGB":
            raise ValueError(f"RGB 이미지가 필요합니다: {image.mode}")
        return True

    validateRgbMode(channelImage)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageStat

      channelImage = Image.new("RGB", (120, 90))
      for x in range(120):
          for y in range(90):
              if x < 40:
                  channelImage.putpixel((x, y), (220, 40, 40))
              elif x < 80:
                  channelImage.putpixel((x, y), (40, 220, 40))
              else:
                  channelImage.putpixel((x, y), (40, 40, 220))

      def validateRgbMode(image):
          if image.mode != "RGB":
              raise ValueError(f"RGB 이미지가 필요합니다: {image.mode}")
          return True

      validateRgbMode(channelImage)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
