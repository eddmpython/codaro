      swapped
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 채널 분석 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    sklearn 이미지의 채널을 분석하고 조작해봅시다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flower = Image.fromarray(flowerArr)
