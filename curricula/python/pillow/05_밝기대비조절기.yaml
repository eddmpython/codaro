- id: step2_brightness
  title: 2단계. 밝기 조절
  structuredPrimary: true
  subtitle: Brightness
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Brightness 클래스는 이미지의 밝기를 조절합니다. enhance(1.0)은 원본, 0.0은 완전히 검은색, 2.0은 두 배 밝습니다. 어두운 사진을 밝게 보정하거나, 과노출 사진을 어둡게 할 때 사용합니다.

    enhance()의 factor가 1.0보다 작으면 어두워지고, 크면 밝아집니다. 0.0은 완전한 검정, 1.0은 원본, 2.0은 두 배 밝기입니다. 보통 0.7~1.3 범위에서 자연스러운 조절이 가능합니다.
  tips:
  - enhance()의 factor가 1.0보다 작으면 어두워지고, 크면 밝아집니다. 0.0은 완전한 검정, 1.0은 원본, 2.0은 두 배 밝기입니다. 보통 0.7~1.3 범위에서 자연스러운 조절이 가능합니다.
  snippet: |-
    brightener = ImageEnhance.Brightness(frame)
    type(brightener)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      brightener = ImageEnhance.Brightness(frame)
      type(brightener)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_contrast
  title: 3단계. 대비 조절
  structuredPrimary: true
  subtitle: Contrast
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Contrast 클래스는 이미지의 대비(명암 차이)를 조절합니다. 대비가 높으면 밝은 곳은 더 밝고 어두운 곳은 더 어두워집니다. 대비가 낮으면 전체적으로 회색빛이 됩니다.

    대비가 0.0이면 완전한 회색 이미지가 됩니다. 사진 보정에서 대비를 약간 높이면(1.1~1.3) 이미지가 더 선명해 보이는 효과가 있습니다.
  tips:
  - 대비가 0.0이면 완전한 회색 이미지가 됩니다. 사진 보정에서 대비를 약간 높이면(1.1~1.3) 이미지가 더 선명해 보이는 효과가 있습니다.
  snippet: |-
    contraster = ImageEnhance.Contrast(frame)
    type(contraster)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      contraster = ImageEnhance.Contrast(frame)
      type(contraster)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_color
  title: 4단계. 채도 조절
  structuredPrimary: true
  subtitle: Color
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Color 클래스는 이미지의 채도(색상의 선명함)를 조절합니다. 채도가 0이면 흑백, 높으면 색이 더 선명해집니다. 빈티지 효과나 팝아트 효과에 활용됩니다.

    Color.enhance(0.0)은 convert('L').convert('RGB')와 비슷한 결과를 줍니다. 채도 1.3~1.5 정도로 올리면 사진이 더 생동감 있어 보입니다. SNS 필터에서 자주 쓰이는 기법입니다.
  tips:
  - Color.enhance(0.0)은 convert('L').convert('RGB')와 비슷한 결과를 줍니다. 채도 1.3~1.5 정도로 올리면 사진이 더 생동감 있어 보입니다. SNS 필터에서 자주 쓰이는 기법입니다.
  snippet: |-
    saturator = ImageEnhance.Color(frame)
    type(saturator)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      saturator = ImageEnhance.Color(frame)
      type(saturator)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_sharpness
  title: 5단계. 선명도 조절
  structuredPrimary: true
  subtitle: Sharpness
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Sharpness 클래스는 이미지의 선명도를 조절합니다. 0.0은 블러 효과, 1.0은 원본, 2.0 이상은 샤프 효과입니다. ImageFilter.SHARPEN보다 정교한 조절이 가능합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    sharpener = ImageEnhance.Sharpness(frame)
