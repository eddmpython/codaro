    resultCheck: 출력 또는 assert 확인
- id: step6_combine
  title: 6단계. 조합 적용
  structuredPrimary: true
  subtitle: 여러 조정 연결
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    여러 조정을 순차적으로 적용하여 원하는 효과를 만들 수 있습니다. 각 enhance()가 새 이미지를 반환하므로 체이닝이 가능합니다.

    사진 보정의 일반적인 순서는 밝기 → 대비 → 채도 → 선명도입니다. 각 단계에서 작은 값(1.1~1.3)으로 조절하면 자연스러운 결과를 얻을 수 있습니다.
  tips:
  - 사진 보정의 일반적인 순서는 밝기 → 대비 → 채도 → 선명도입니다. 각 단계에서 작은 값(1.1~1.3)으로 조절하면 자연스러운 결과를 얻을 수 있습니다.
  snippet: |-
    step1 = ImageEnhance.Brightness(frame).enhance(1.2)
    step2 = ImageEnhance.Contrast(step1).enhance(1.3)
    final = ImageEnhance.Color(step2).enhance(1.1)
    final
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      step1 = ImageEnhance.Brightness(frame).enhance(1.2)
      step2 = ImageEnhance.Contrast(step1).enhance(1.3)
      final = ImageEnhance.Color(step2).enhance(1.1)
      final
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
