- id: workflow_validation
  title: 7단계. 보정 품질 검증 루프
  structuredPrimary: true
  subtitle: 밝기, 대비, 채도 factor 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 밝기와 대비 조정은 보기 좋은 값을 찾는 작업이지만, 자동화에서는 factor 범위와 평균 밝기 변화가 먼저 검증되어야 합니다. 잘못된 factor를 잡고 보정 전후 통계를 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageEnhance, ImageStat

    enhanceImage = Image.new("RGB", (150, 100), (70, 80, 95))
    enhanceDraw = ImageDraw.Draw(enhanceImage)
    enhanceDraw.rectangle((35, 25, 115, 75), fill=(150, 120, 80))

    def validateEnhanceFactor(factor):
        if factor <= 0:
            raise ValueError(f"보정 factor는 양수여야 합니다: {factor}")
        return True

    validateEnhanceFactor(1.2)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from PIL import Image, ImageDraw, ImageEnhance, ImageStat

      enhanceImage = Image.new("RGB", (150, 100), (70, 80, 95))
      enhanceDraw = ImageDraw.Draw(enhanceImage)
      enhanceDraw.rectangle((35, 25, 115, 75), fill=(150, 120, 80))

      def validateEnhanceFactor(factor):
          if factor <= 0:
              raise ValueError(f"보정 factor는 양수여야 합니다: {factor}")
          return True

      validateEnhanceFactor(1.2)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
