intro:
  emoji: ☀️
  goal: ImageEnhance 모듈로 이미지의 밝기, 대비, 채도, 선명도를 조절합니다.
  description: Brightness, Contrast, Color, Sharpness 네 가지 조정기를 사용해봅니다. 각 조정기의 enhance() 메서드로 수치를 조절합니다.
  direction: 밝기대비조절기에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 이미지 파일과 픽셀 값 확인 후 이미지 변환/합성/저장에 맞는 코드 입력을 고릅니다.
  - 밝기대비조절기 결과를 이미지 크기, 모드, 채널, 저장 파일 기준으로 즉시 점검합니다.
  - 완료한 코드를 이미지 일괄 처리 자동화에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 이미지 불러오기 입력 확인
      detail: 입력 기준(이미지 파일과 픽셀 값)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 밝기 조절 처리 실행
      detail: 이미지 변환/합성/저장 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 대비 조절 결과 검증
      detail: 이미지 크기, 모드, 채널, 저장 파일 기준으로 실행 결과를 비교합니다.
    - label: 밝기대비조절기 재사용
      detail: 완성 코드를 이미지 일괄 처리 자동화에 붙일 수 있게 정리합니다.
    runtime:
    - label: 이미지 처리 환경
      detail: pillow, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 밝기대비조절기 실행
      detail: 셀을 실행해 이미지 크기, 모드, 채널, 저장 파일와 예외 상태를 확인합니다.
    - label: 밝기대비조절기 완료
      detail: 검증된 코드를 이미지 일괄 처리 자동화로 남깁니다.
sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: ImageEnhance 준비
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: sklearn의 china 이미지를 불러옵니다. ImageEnhance 모듈의 각 클래스는 이미지를 받아 조정기 객체를 생성합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageEnhance
    from sklearn.datasets import load_sample_image

    chinaArr = load_sample_image('china.jpg')
    frame = Image.fromarray(chinaArr)
    frame.size
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      from PIL import Image, ImageEnhance
      from sklearn.datasets import load_sample_image

      chinaArr = load_sample_image('china.jpg')
      frame = Image.fromarray(chinaArr)
      frame.size
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 이미지 불러오기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 이미지 불러오기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_brightness
  title: 2단계. 밝기 조절
  structuredPrimary: true
  subtitle: Brightness
  goal: 2단계. 밝기 조절에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    Brightness 클래스는 이미지의 밝기를 조절합니다. enhance(1.0)은 원본, 0.0은 완전히 검은색, 2.0은 두 배 밝습니다. 어두운 사진을 밝게 보정하거나, 과노출 사진을 어둡게 할 때 사용합니다.

    enhance()의 factor가 1.0보다 작으면 어두워지고, 크면 밝아집니다. 0.0은 완전한 검정, 1.0은 원본, 2.0은 두 배 밝기입니다. 보통 0.7~1.3 범위에서 자연스러운 조절이 가능합니다.
  tips:
  - enhance()의 factor가 1.0보다 작으면 어두워지고, 크면 밝아집니다. 0.0은 완전한 검정, 1.0은 원본, 2.0은 두 배 밝기입니다. 보통 0.7~1.3 범위에서
    자연스러운 조절이 가능합니다.
  snippet: |-
    brightener = ImageEnhance.Brightness(frame)
    type(brightener)
  exercise:
    prompt: 2단계. 밝기 조절 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      brightener = ImageEnhance.Brightness(frame)
      type(brightener)
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 밝기 조절의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 밝기 조절 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_contrast
  title: 3단계. 대비 조절
  structuredPrimary: true
  subtitle: Contrast
  goal: 3단계. 대비 조절에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    Contrast 클래스는 이미지의 대비(명암 차이)를 조절합니다. 대비가 높으면 밝은 곳은 더 밝고 어두운 곳은 더 어두워집니다. 대비가 낮으면 전체적으로 회색빛이 됩니다.

    대비가 0.0이면 완전한 회색 이미지가 됩니다. 사진 보정에서 대비를 약간 높이면(1.1~1.3) 이미지가 더 선명해 보이는 효과가 있습니다.
  tips:
  - 대비가 0.0이면 완전한 회색 이미지가 됩니다. 사진 보정에서 대비를 약간 높이면(1.1~1.3) 이미지가 더 선명해 보이는 효과가 있습니다.
  snippet: |-
    contraster = ImageEnhance.Contrast(frame)
    type(contraster)
  exercise:
    prompt: 3단계. 대비 조절 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      contraster = ImageEnhance.Contrast(frame)
      type(contraster)
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 대비 조절의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 대비 조절 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_color
  title: 4단계. 채도 조절
  structuredPrimary: true
  subtitle: Color
  goal: 4단계. 채도 조절에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    Color 클래스는 이미지의 채도(색상의 선명함)를 조절합니다. 채도가 0이면 흑백, 높으면 색이 더 선명해집니다. 빈티지 효과나 팝아트 효과에 활용됩니다.

    Color.enhance(0.0)은 convert('L').convert('RGB')와 비슷한 결과를 줍니다. 채도 1.3~1.5 정도로 올리면 사진이 더 생동감 있어 보입니다. SNS 필터에서 자주 쓰이는 기법입니다.
  tips:
  - Color.enhance(0.0)은 convert('L').convert('RGB')와 비슷한 결과를 줍니다. 채도 1.3~1.5 정도로 올리면 사진이 더 생동감 있어 보입니다.
    SNS 필터에서 자주 쓰이는 기법입니다.
  snippet: |-
    saturator = ImageEnhance.Color(frame)
    type(saturator)
  exercise:
    prompt: 4단계. 채도 조절 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      saturator = ImageEnhance.Color(frame)
      type(saturator)
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 4단계. 채도 조절의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 채도 조절 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step5_sharpness
  title: 5단계. 선명도 조절
  structuredPrimary: true
  subtitle: Sharpness
  goal: 5단계. 선명도 조절에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: Sharpness 클래스는 이미지의 선명도를 조절합니다. 0.0은 블러 효과, 1.0은 원본, 2.0 이상은 샤프 효과입니다. ImageFilter.SHARPEN보다
    정교한 조절이 가능합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    sharpener = ImageEnhance.Sharpness(frame)
    type(sharpener)
  exercise:
    prompt: 5단계. 선명도 조절 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      sharpener = ImageEnhance.Sharpness(frame)
      type(sharpener)
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 선명도 조절의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 선명도 조절 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step6_combine
  title: 6단계. 조합 적용
  structuredPrimary: true
  subtitle: 여러 조정 연결
  goal: 6단계. 조합 적용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    여러 조정을 순차적으로 적용하여 원하는 효과를 만들 수 있습니다. 각 enhance()가 새 이미지를 반환하므로 체이닝이 가능합니다.

    사진 보정의 일반적인 순서는 밝기 → 대비 → 채도 → 선명도입니다. 각 단계에서 작은 값(1.1~1.3)으로 조절하면 자연스러운 결과를 얻을 수 있습니다.
  tips:
  - 사진 보정의 일반적인 순서는 밝기 → 대비 → 채도 → 선명도입니다. 각 단계에서 작은 값(1.1~1.3)으로 조절하면 자연스러운 결과를 얻을 수 있습니다.
  snippet: |-
    step1 = ImageEnhance.Brightness(frame).enhance(1.2)
    step2 = ImageEnhance.Contrast(step1).enhance(1.3)
    final = ImageEnhance.Color(step2).enhance(1.1)
    final
  exercise:
    prompt: 6단계. 조합 적용 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      step1 = ImageEnhance.Brightness(frame).enhance(1.2)
      step2 = ImageEnhance.Contrast(step1).enhance(1.3)
      final = ImageEnhance.Color(step2).enhance(1.1)
      final
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 6단계. 조합 적용의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 6단계. 조합 적용 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 사진 보정 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    flower 이미지에 다양한 보정을 적용해봅시다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image, ImageEnhance
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flower = Image.fromarray(flowerArr)
    flower
  exercise:
    prompt: 실습 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      from PIL import Image, ImageEnhance
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flower = Image.fromarray(flowerArr)
      flower
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
