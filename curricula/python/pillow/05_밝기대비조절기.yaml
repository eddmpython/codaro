sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: ImageEnhance 준비
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: sklearn의 china 이미지를 불러옵니다. ImageEnhance 모듈의 각 클래스는 이미지를 받아 조정기 객체를 생성합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageEnhance
    from sklearn.datasets import load_sample_image

    chinaArr = load_sample_image('china.jpg')
    frame = Image.fromarray(chinaArr)
    frame.size
