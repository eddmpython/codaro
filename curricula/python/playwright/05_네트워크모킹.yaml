        report
      hints:
        - 실패 분기 문자열, expect, report assert를 같은 문구로 맞추세요.
        - status=500은 의도적으로 실패 화면을 보기 위한 mock입니다.
    check:
      noError: 500 mock 응답과 fallback 문구 검증이 오류 없이 끝나야 합니다.
      resultCheck: report가 실패 응답을 사용자 안내 문구로 처리했음을 보여야 합니다.
