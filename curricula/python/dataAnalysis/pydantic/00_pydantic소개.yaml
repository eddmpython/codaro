    - emoji: 📊
      title: 데이터 파이프라인
      description: ETL 과정의 데이터 검증
    - emoji: 🧪
      title: 테스트 데이터
      description: 일관된 테스트 픽스처 생성
  goal: 💼 실전 활용 사례에서 외부 입력을 바꿨을 때 성공 모델과 오류 메시지가 어떻게 달라지는지 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
