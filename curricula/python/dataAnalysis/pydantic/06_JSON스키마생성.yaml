meta:
  packages:
  - pydantic
  id: pydantic_06
  title: JSON스키마생성
  order: 6
  category: pydantic
  difficulty: ⭐⭐
  badge: 기초
  tags:
  - pydantic
  - json-schema
  - OpenAPI
  - 문서화
  - API
  seo:
    title: Pydantic JSON Schema - API 문서화와 OpenAPI
    description: Pydantic 모델에서 JSON Schema를 생성합니다. OpenAPI 문서화, 스키마 커스터마이즈를 배웁니다.
    keywords:
    - pydantic
    - json-schema
    - OpenAPI
