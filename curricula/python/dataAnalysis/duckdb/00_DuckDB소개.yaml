  - type: note
    style: info
    title: SQL이란?
    content: Structured Query Language의 약자로, 데이터베이스와 대화하는 언어입니다. 1970년대 만들어져 지금도 표준으로 사용됩니다. 배워두면 모든 DB에서
      쓸 수 있어요.
