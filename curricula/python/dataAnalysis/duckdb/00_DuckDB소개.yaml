  blocks:
  - type: mainHeader
    emoji: 🦆
    title: DuckDB??
    subtitle: 오리가 데이터베이스라고?
  - type: hero
    emoji: 🚀
    title: 분석에 특화된 SQL 데이터베이스
    subtitle: uv 준비 후 바로 쓰는 초고속 분석 엔진
    points:
    - emoji: 💡
      title: uv 준비 후 SQL 한 줄
    - emoji: ⚡
      title: 분석 쿼리에 최적화
    - emoji: 🌐
      title: 로컬에서도 실행
    - emoji: 🐼
      title: pandas와 완벽 호환
  goal: DuckDB??에서 SQL 조건과 집계 결과가 어떻게 연결되는지 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
- id: what_is_duckdb
  blocks:
  - type: sectionHeader
    title: 🤔 DuckDB가 뭔가요?
    subtitle: 한마디로 분석용 SQLite
  - type: note
    style: info
    title: OLAP vs OLTP
    content: 데이터베이스는 크게 두 종류입니다. OLTP는 주문, 결제처럼 빠른 트랜잭션 처리용(MySQL, PostgreSQL). OLAP는 집계, 통계처럼 대량 데이터
      분석용(DuckDB, BigQuery). DuckDB는 OLAP에 특화된 데이터베이스입니다.
  - type: featureCards
    cards:
    - emoji: 📊
      title: 컬럼 기반 저장
      description: 행이 아닌 열 단위 저장으로 집계 쿼리 초고속
    - emoji: 💾
      title: 인메모리 처리
      description: 데이터를 메모리에 올려 빠른 연산
    - emoji: 🔌
      title: 서버 불필요
      description: 별도 서버 없이 파일 하나로 동작
    - emoji: 🆓
      title: 완전 무료
      description: 오픈소스, MIT 라이선스
  goal: 🤔 DuckDB가 뭔가요?에서 SQL 조건과 집계 결과가 어떻게 연결되는지 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
