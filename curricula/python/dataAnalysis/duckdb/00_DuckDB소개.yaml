      description: DataFrame을 SQL로 바로 분석
    - emoji: 🔒
      title: 로컬 처리
      description: 데이터가 외부로 안 나감
  goal: 🌟 왜 DuckDB가 인기일까요?에서 SQL 조건과 집계 결과가 어떻게 연결되는지 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
