  explanation: 지금까지 배운 IS NOT NULL, GROUP BY, HAVING, CASE WHEN, IN을 모두 활용한 종합 분석입니다. 객실 등급, 연령대, 성별 세
    가지 기준으로 다중 그룹화하고, 결측치를 제외하며, 충분한 표본(10명 이상)이 있는 그룹만 필터링합니다. 이런 복합 조건 분석을 통해 타이타닉 생존의 핵심 패턴을 도출할 수
