  explanation: HAVING에 AND를 사용해 여러 조건을 동시에 적용합니다. 승객 수 30명 이상이면서 생존율 50% 이상인 그룹을 찾습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
