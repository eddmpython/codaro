  explanation: 지금까지 배운 3가지 서브쿼리 패턴을 정리합니다. 스칼라 서브쿼리는 단일 값 반환, WHERE 서브쿼리는 조건 필터링, FROM 서브쿼리는 집계 결과를 테이블처럼
    사용합니다. 각 패턴의 특성을 이해하면 상황에 맞는 최적의 쿼리를 작성할 수 있습니다.
