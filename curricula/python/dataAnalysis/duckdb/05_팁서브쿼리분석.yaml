- id: step8_from_rank
  title: 8단계. FROM 서브쿼리 + 윈도우 함수
  structuredPrimary: true
  subtitle: 순위 매긴 후 조회
  goal: 8단계. FROM 서브쿼리 + 윈도우 함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
