  - 테이블과 SQL 쿼리 확인 후 SELECT/WHERE/GROUP BY/CTE에 맞는 코드 입력을 고릅니다.
  - 타이타닉생존통계 결과를 쿼리 결과 행, 컬럼, 집계값 기준으로 즉시 점검합니다.
  - 완료한 코드를 로컬 분석 SQL 리포트에 다시 사용할 수 있습니다.
