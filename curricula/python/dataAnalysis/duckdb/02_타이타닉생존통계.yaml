intro:
  emoji: 🚢
  goal: 타이타닉 승객 데이터에서 그룹별 생존율을 집계합니다.
  description: GROUP BY와 집계 함수로 객실 등급별, 성별, 연령대별 생존율을 분석합니다. SQL 집계의 핵심을 마스터합니다.
  direction: 타이타닉생존통계에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
