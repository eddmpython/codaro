- id: step8_titanic_survival
  title: 8단계. Titanic 생존율 분석
  structuredPrimary: true
  subtitle: 클래스별 생존 통계
  goal: 8단계. Titanic 생존율 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    타이타닉 데이터로 객실 등급(pclass)별 생존자와 사망자를 분석합니다. 전체 승객 수와 생존자 수를 각각 별도 CTE로 만든 후 JOIN하여 생존율을 계산하는 패턴입니다. 이 방식은 "전체 중 일부"를 분석할 때 매우 유용합니다. 예를 들어 전체 주문 중 완료된 주문, 전체 회원 중 활성 회원 등을 비율로 분석할 때 동일한 구조를 사용할 수 있습니다. CTE 덕분에 전체 집계와 조건부 집계를 명확히 분리하여 계산할 수 있습니다.

    두 CTE를 pclass로 JOIN하여 등급별 생존율을 계산했습니다. survived = 1 조건으로 생존자만 세고, 전체에서 생존자를 빼면 사망자 수가 됩니다. 100.0을 곱해 소수점을 유지한 후 나누는 것이 정확한 비율 계산 패턴입니다. 정수 나누기(/)는 소수점이 잘릴 수 있으므로 주의해야 합니다.
  tips:
  - 두 CTE를 pclass로 JOIN하여 등급별 생존율을 계산했습니다. survived = 1 조건으로 생존자만 세고, 전체에서 생존자를 빼면 사망자 수가 됩니다. 100.0을
    곱해 소수점을 유지한 후 나누는 것이 정확한 비율 계산 패턴입니다. 정수 나누기(/)는 소수점이 잘릴 수 있으므로 주의해야 합니다.
  snippet: |-
    duckdb.sql("""
        WITH
        totalByClass AS (
            SELECT pclass, COUNT(*) AS total
            FROM titanic
            GROUP BY pclass
        ),
        survivedByClass AS (
            SELECT pclass, COUNT(*) AS survived
            FROM titanic
            WHERE survived = 1
            GROUP BY pclass
        )
        SELECT t.pclass,
               t.total,
               s.survived,
               t.total - s.survived AS died,
               ROUND(s.survived * 100.0 / t.total, 1) AS survivalRate
        FROM totalByClass t
        INNER JOIN survivedByClass s ON t.pclass = s.pclass
        ORDER BY t.pclass
    """).show()
