- id: step6_join_intro
  title: 6단계. INNER JOIN 기본
  structuredPrimary: true
  subtitle: 두 테이블 합치기
  goal: 6단계. INNER JOIN 기본에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    INNER JOIN은 두 테이블을 공통 키(key)로 연결하여 합치는 연산입니다. 양쪽 테이블에 모두 존재하는 행만 결과에 포함되므로 교집합 개념과 같습니다. 예를 들어 "요일별 평균 결제금액" 테이블과 "요일별 평균 팁" 테이블을 요일(day) 컬럼으로 JOIN하면, 같은 요일의 두 통계를 나란히 비교할 수 있습니다. CTE와 함께 사용하면 각 집계를 별도 CTE로 만들고 JOIN으로 결합하여 복잡한 비교 분석이 가능합니다. LEFT JOIN, RIGHT JOIN도 있지만 INNER JOIN이 가장 기본이고 많이 사용됩니다.

    INNER JOIN ... ON 조건은 조건을 만족하는 행만 결합합니다. 한쪽에만 있는 데이터는 결과에서 제외됩니다. 예를 들어 d.day = t.day 조건은 '요일이 같은' 행끼리만 연결합니다. 테이블 별칭(d, t)을 사용하면 컬럼명이 겹칠 때 어느 테이블의 컬럼인지 명확하게 구분할 수 있습니다.
  tips:
  - INNER JOIN ... ON 조건은 조건을 만족하는 행만 결합합니다. 한쪽에만 있는 데이터는 결과에서 제외됩니다. 예를 들어 d.day = t.day 조건은 '요일이 같은'
    행끼리만 연결합니다. 테이블 별칭(d, t)을 사용하면 컬럼명이 겹칠 때 어느 테이블의 컬럼인지 명확하게 구분할 수 있습니다.
  snippet: |-
    duckdb.sql("""
        WITH
        daySummary AS (
            SELECT day, ROUND(AVG(total_bill), 2) AS avgBill
            FROM tips
            GROUP BY day
        ),
        dayTipSummary AS (
            SELECT day, ROUND(AVG(tip), 2) AS avgTip
            FROM tips
            GROUP BY day
        )
        SELECT d.day, d.avgBill, t.avgTip,
               ROUND(t.avgTip / d.avgBill * 100, 1) AS tipPercent
        FROM daySummary d
        INNER JOIN dayTipSummary t ON d.day = t.day
        ORDER BY tipPercent DESC
    """).show()
