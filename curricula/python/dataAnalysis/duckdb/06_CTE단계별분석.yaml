sections:
- id: step1_load
  title: 1단계. 데이터 준비
  structuredPrimary: true
  subtitle: tips + titanic
  goal: 1단계. 데이터 준비에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: 이번 프로젝트에서는 두 데이터셋을 불러와 CTE(Common Table Expression) 활용법을 학습합니다. tips 데이터는 레스토랑 팁 정보 120건,
    titanic 데이터는 타이타닉 승객 정보 891건을 담고 있습니다. DuckDB는 pandas DataFrame을 바로 SQL로 쿼리할 수 있어 데이터 분석이 매우 편리합니다.
    duckdb.from_df()로 DataFrame을 DuckDB 테이블로 변환하면 즉시 SQL 문법을 사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd
    from codaro.curriculum.localData import loadLocalDataset
    import duckdb

    dfTips = loadLocalDataset("tips")
    dfTitanic = loadLocalDataset("titanic")
    tips = duckdb.from_df(dfTips)
    titanic = duckdb.from_df(dfTitanic)
  exercise:
    prompt: 1단계. 데이터 준비 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import pandas as pd
      from codaro.curriculum.localData import loadLocalDataset
      import duckdb

      dfTips = loadLocalDataset("tips")
      dfTitanic = loadLocalDataset("titanic")
      tips = duckdb.from_df(dfTips)
      titanic = duckdb.from_df(dfTitanic)
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 1단계. 데이터 준비의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 1단계. 데이터 준비 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step2_cte_intro
  title: 2단계. CTE란?
  structuredPrimary: true
  subtitle: WITH 절 소개
  goal: 2단계. CTE란?에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    CTE(Common Table Expression)는 WITH 절로 시작하는 임시 결과 집합입니다. 복잡한 쿼리를 읽기 쉽게 만드는 핵심 도구로, 마치 요리할 때 재료를 미리 준비해두는 것과 같습니다. 서브쿼리는 괄호 안에 중첩되어 읽기 어렵지만, CTE는 위에서 아래로 단계별로 흐름이 명확합니다. 예를 들어 "팁이 5달러 이상인 데이터"를 highTips라는 이름으로 정의하면, 이후 쿼리에서 highTips를 일반 테이블처럼 사용할 수 있습니다. 디버깅할 때도 CTE 각 단계를 개별적으로 실행해볼 수 있어 문제를 찾기 쉽습니다.

    WITH name AS (SELECT ...)는 서브쿼리에 이름을 붙입니다. 이후 쿼리에서 name을 일반 테이블처럼 사용할 수 있습니다. 서브쿼리는 SELECT * FROM (SELECT ...) nested 형태로 괄호 속 괄호가 중첩되어 복잡하지만, CTE는 위에서 아래로 읽는 순서대로 작성되어 가독성이 훨씬 좋습니다. 실무에서는 3단계 이상 중첩되는 복잡한 쿼리에서 CTE를 필수적으로 사용합니다.
  tips:
  - WITH name AS (SELECT ...)는 서브쿼리에 이름을 붙입니다. 이후 쿼리에서 name을 일반 테이블처럼 사용할 수 있습니다. 서브쿼리는 SELECT * FROM
    (SELECT ...) nested 형태로 괄호 속 괄호가 중첩되어 복잡하지만, CTE는 위에서 아래로 읽는 순서대로 작성되어 가독성이 훨씬 좋습니다. 실무에서는 3단계 이상
    중첩되는 복잡한 쿼리에서 CTE를 필수적으로 사용합니다.
  snippet: |-
    duckdb.sql("""
        WITH highTips AS (
            SELECT *
            FROM tips
            WHERE tip > 5
        )
        SELECT day, COUNT(*) AS cnt, ROUND(AVG(tip), 2) AS avgTip
        FROM highTips
        GROUP BY day
        ORDER BY avgTip DESC
    """).show()
  exercise:
    prompt: 2단계. CTE란? 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH highTips AS (
              SELECT *
              FROM tips
              WHERE tip > 5
          )
          SELECT day, COUNT(*) AS cnt, ROUND(AVG(tip), 2) AS avgTip
          FROM highTips
          GROUP BY day
          ORDER BY avgTip DESC
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 2단계. CTE란?의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 2단계. CTE란? 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step3_cte_benefits
  title: 3단계. CTE의 장점
  structuredPrimary: true
  subtitle: 왜 CTE를 사용하나?
  goal: 3단계. CTE의 장점에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    CTE는 다음 3가지 이유로 서브쿼리보다 훨씬 우수합니다. 첫째, 가독성입니다. 서브쿼리는 안쪽부터 읽어야 하지만 CTE는 위에서 아래로 자연스럽게 읽힙니다. 둘째, 재사용성입니다. 같은 서브쿼리를 여러 번 작성할 필요 없이 CTE를 한 번 정의하면 여러 곳에서 참조할 수 있습니다. 셋째, 디버깅 용이성입니다. 복잡한 쿼리가 에러를 내면 어디가 문제인지 찾기 어렵지만, CTE는 각 단계를 개별적으로 실행해서 중간 결과를 확인할 수 있습니다. 실무에서 팀원들과 협업할 때 CTE로 작성된 쿼리가 훨씬 이해하기 쉽고 유지보수가 편합니다.

    CTE를 사용하면 복잡한 쿼리를 논리적 단계로 나눌 수 있습니다. 예를 들어 '필터링 → 집계 → 정렬' 순서를 각각 CTE로 만들면 각 단계의 의도가 명확해집니다. 서브쿼리로 작성하면 중첩이 깊어져 어디서 무엇을 하는지 파악하기 어렵습니다.
  tips:
  - CTE를 사용하면 복잡한 쿼리를 논리적 단계로 나눌 수 있습니다. 예를 들어 '필터링 → 집계 → 정렬' 순서를 각각 CTE로 만들면 각 단계의 의도가 명확해집니다. 서브쿼리로
    작성하면 중첩이 깊어져 어디서 무엇을 하는지 파악하기 어렵습니다.
  snippet: |-
    duckdb.sql("""
        WITH highTips AS (
            SELECT * FROM tips WHERE tip > 5
        )
        SELECT day, COUNT(*) AS highTipCount
        FROM highTips
        GROUP BY day
    """).show()
  exercise:
    prompt: 3단계. CTE의 장점 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH highTips AS (
              SELECT * FROM tips WHERE tip > 5
          )
          SELECT day, COUNT(*) AS highTipCount
          FROM highTips
          GROUP BY day
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 3단계. CTE의 장점의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 3단계. CTE의 장점 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step4_multi_cte
  title: 4단계. 여러 CTE 연결
  structuredPrimary: true
  subtitle: 콤마로 구분
  goal: 4단계. 여러 CTE 연결에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    한 번의 쿼리에서 여러 CTE를 콤마(,)로 구분하여 정의할 수 있습니다. 각 CTE는 독립적인 분석 단계를 나타내며, 마지막 SELECT에서 이들을 UNION이나 JOIN으로 결합합니다. 예를 들어 "요일별 통계"와 "시간대별 통계"를 각각 별도의 CTE로 만든 후, UNION ALL로 세로로 합쳐서 한 번에 비교할 수 있습니다. 이렇게 하면 같은 형식의 여러 집계 결과를 효율적으로 얻을 수 있습니다.

    WITH a AS (...), b AS (...)처럼 콤마로 여러 CTE를 정의합니다. 각 CTE는 독립적으로 실행되며, 최종 SELECT에서 원하는 CTE를 사용합니다.
  snippet: |-
    duckdb.sql("""
        WITH
        daySummary AS (
            SELECT day, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
            FROM tips
            GROUP BY day
        ),
        timeSummary AS (
            SELECT time, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
            FROM tips
            GROUP BY time
        )
        SELECT 'day' AS category, day AS name, cnt, ROUND(totalSales, 2) AS sales FROM daySummary
        UNION ALL
        SELECT 'time' AS category, time AS name, cnt, ROUND(totalSales, 2) AS sales FROM timeSummary
        ORDER BY category, sales DESC
    """).show()
  exercise:
    prompt: 4단계. 여러 CTE 연결 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH
          daySummary AS (
              SELECT day, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
              FROM tips
              GROUP BY day
          ),
          timeSummary AS (
              SELECT time, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
              FROM tips
              GROUP BY time
          )
          SELECT 'day' AS category, day AS name, cnt, ROUND(totalSales, 2) AS sales FROM daySummary
          UNION ALL
          SELECT 'time' AS category, time AS name, cnt, ROUND(totalSales, 2) AS sales FROM timeSummary
          ORDER BY category, sales DESC
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 4단계. 여러 CTE 연결의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 4단계. 여러 CTE 연결 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step5_cte_chain
  title: 5단계. CTE 체이닝
  structuredPrimary: true
  subtitle: 이전 CTE 참조하기
  goal: 5단계. CTE 체이닝에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    앞에서 정의한 CTE를 다음 CTE에서 참조할 수 있습니다. 이를 CTE 체이닝(chaining)이라고 하며, 복잡한 분석을 단계별로 쪼개는 핵심 기법입니다. 마치 레고 블록을 쌓듯이 step1 결과를 step2에서 사용하고, step2 결과를 step3에서 사용하는 방식입니다. 예를 들어 "집계 → 비율 계산 → 순위 매기기" 3단계를 각각 CTE로 분리하면 각 단계가 무엇을 하는지 명확해지고, 중간 결과도 쉽게 확인할 수 있습니다. 실무에서 10단계 이상의 복잡한 분석도 CTE 체이닝으로 관리 가능합니다.

    CTE 체이닝의 장점: 각 단계를 개별적으로 실행해서 중간 결과를 확인할 수 있습니다. 복잡한 쿼리를 디버깅할 때 매우 유용합니다.
  snippet: |-
    duckdb.sql("""
        WITH
        step1 AS (
            SELECT day, sex, COUNT(*) AS cnt, SUM(tip) AS totalTip
            FROM tips
            GROUP BY day, sex
        ),
        step2 AS (
            SELECT day, sex, cnt, totalTip,
                   ROUND(totalTip / cnt, 2) AS avgTip
            FROM step1
        ),
        step3 AS (
            SELECT *,
                   RANK() OVER(PARTITION BY day ORDER BY avgTip DESC) AS tipRank
            FROM step2
        )
        SELECT day, sex, cnt, ROUND(totalTip, 2) AS totalTip, avgTip, tipRank
        FROM step3
        WHERE tipRank = 1
        ORDER BY avgTip DESC
    """).show()
  exercise:
    prompt: 5단계. CTE 체이닝 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH
          step1 AS (
              SELECT day, sex, COUNT(*) AS cnt, SUM(tip) AS totalTip
              FROM tips
              GROUP BY day, sex
          ),
          step2 AS (
              SELECT day, sex, cnt, totalTip,
                     ROUND(totalTip / cnt, 2) AS avgTip
              FROM step1
          ),
          step3 AS (
              SELECT *,
                     RANK() OVER(PARTITION BY day ORDER BY avgTip DESC) AS tipRank
              FROM step2
          )
          SELECT day, sex, cnt, ROUND(totalTip, 2) AS totalTip, avgTip, tipRank
          FROM step3
          WHERE tipRank = 1
          ORDER BY avgTip DESC
      """).show()
