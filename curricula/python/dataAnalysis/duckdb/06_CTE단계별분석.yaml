        SELECT
            'WITH name AS (...)' AS pattern,
            '단일 CTE' AS usage,
            '서브쿼리에 이름 부여' AS benefit
        UNION ALL
        SELECT
            'WITH a AS (...), b AS (...)',
            '다중 CTE',
            '여러 단계 정의'
        UNION ALL
        SELECT
            'CTE1 → CTE2 → CTE3',
            'CTE 체이닝',
            '단계별 분석 + 디버깅 용이'
        UNION ALL
        SELECT
