- id: step7_tips_analysis
  title: 7단계. Tips 성별 비교 분석
  structuredPrimary: true
  subtitle: CTE + JOIN 실전
  goal: 7단계. Tips 성별 비교 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    남성과 여성의 요일별 팁 패턴을 비교하는 실전 분석입니다. 각 성별의 통계를 별도 CTE로 만든 후 JOIN으로 합쳐 나란히 비교합니다. 이렇게 하면 "남성은 어느 요일에 팁을 많이 주는가?", "여성과 비교하면 어떤 차이가 있는가?"를 한눈에 파악할 수 있습니다. 두 그룹을 따로 집계한 후 합치는 패턴은 A/B 테스트, 실험군/대조군 비교 등 실무에서 매우 자주 사용됩니다.

    WHERE 절로 필터링한 후 GROUP BY로 집계하는 패턴을 각 성별마다 별도 CTE로 만들었습니다. 이렇게 하면 남성/여성 통계를 독립적으로 계산한 후 JOIN으로 병합하여 차이(tipDiff)를 쉽게 계산할 수 있습니다. 한 쿼리에서 CASE WHEN으로 처리할 수도 있지만, CTE로 나누면 각 그룹의 중간 결과를 명확하게 볼 수 있어 디버깅과 검증이 훨씬 쉽습니다.
  tips:
  - WHERE 절로 필터링한 후 GROUP BY로 집계하는 패턴을 각 성별마다 별도 CTE로 만들었습니다. 이렇게 하면 남성/여성 통계를 독립적으로 계산한 후 JOIN으로 병합하여
    차이(tipDiff)를 쉽게 계산할 수 있습니다. 한 쿼리에서 CASE WHEN으로 처리할 수도 있지만, CTE로 나누면 각 그룹의 중간 결과를 명확하게 볼 수 있어 디버깅과
    검증이 훨씬 쉽습니다.
  snippet: |-
    duckdb.sql("""
        WITH
        maleStats AS (
            SELECT day,
                   COUNT(*) AS maleCnt,
                   ROUND(AVG(tip), 2) AS maleAvgTip
            FROM tips
            WHERE sex = 'Male'
            GROUP BY day
        ),
        femaleStats AS (
            SELECT day,
                   COUNT(*) AS femaleCnt,
                   ROUND(AVG(tip), 2) AS femaleAvgTip
            FROM tips
