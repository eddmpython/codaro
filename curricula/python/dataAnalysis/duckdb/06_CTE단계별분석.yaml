- id: step10_cte_join_combo
  title: 10단계. CTE와 JOIN 종합
  structuredPrimary: true
  subtitle: 모든 개념 결합
  goal: 10단계. CTE와 JOIN 종합에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    CTE, 윈도우 함수, JOIN, CASE WHEN을 모두 활용한 종합 분석입니다. 요일+시간대별 팁 통계를 계산하고, 이를 요일 전체 평균과 비교하여 "평균 이상인지 이하인지" 판단합니다. 첫 번째 CTE는 요일+시간대로 집계하고, 두 번째 CTE는 요일별 평균을 계산한 후, JOIN으로 두 결과를 결합하여 비교합니다. 이런 패턴은 "개별 값 vs 그룹 평균" 비교에 자주 사용되며, 예를 들어 개인 성과 vs 팀 평균, 지점 매출 vs 전체 평균 등을 분석할 때 유용합니다.

    CASE WHEN을 사용해 조건부 분류를 수행했습니다. t.avgTip > d.dayAvgTip 조건으로 '평균 이상'과 '평균 이하'를 구분합니다. 이렇게 숫자를 범주로 변환하면 데이터를 이해하기 쉽고, 시각화나 보고서 작성 시에도 유용합니다. CTE + JOIN + CASE의 조합은 실무에서 가장 자주 사용하는 분석 패턴 중 하나입니다.
  tips:
  - CASE WHEN을 사용해 조건부 분류를 수행했습니다. t.avgTip > d.dayAvgTip 조건으로 '평균 이상'과 '평균 이하'를 구분합니다. 이렇게 숫자를 범주로 변환하면
    데이터를 이해하기 쉽고, 시각화나 보고서 작성 시에도 유용합니다. CTE + JOIN + CASE의 조합은 실무에서 가장 자주 사용하는 분석 패턴 중 하나입니다.
  snippet: |-
    duckdb.sql("""
        WITH
        tipStats AS (
            SELECT day, time,
                   COUNT(*) AS cnt,
                   ROUND(AVG(tip), 2) AS avgTip
            FROM tips
            GROUP BY day, time
        ),
        dayAvg AS (
            SELECT day, ROUND(AVG(avgTip), 2) AS dayAvgTip
            FROM tipStats
            GROUP BY day
        )
        SELECT t.day, t.time, t.cnt, t.avgTip,
               d.dayAvgTip,
               CASE
                   WHEN t.avgTip > d.dayAvgTip THEN '평균 이상'
                   ELSE '평균 이하'
               END AS comparison
        FROM tipStats t
        INNER JOIN dayAvg d ON t.day = d.day
        ORDER BY t.day, t.time
    """).show()
  exercise:
    prompt: 10단계. CTE와 JOIN 종합 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
