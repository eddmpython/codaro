- id: step9_complex_analysis
  title: 9단계. Titanic 복합 분석
  structuredPrimary: true
  subtitle: 클래스-성별 생존율
  goal: 9단계. Titanic 복합 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    객실 등급과 성별을 동시에 고려한 복합 생존율 분석입니다. CTE 체이닝으로 "집계 → 비율 계산 → 순위 매기기" 3단계를 명확히 분리합니다. 첫 번째 CTE는 pclass와 sex로 그룹화하여 기본 집계를 수행하고, 두 번째 CTE는 생존율을 계산하며, 세 번째 CTE는 전체 순위를 매깁니다. 이렇게 단계를 나누면 각 단계의 로직이 단순해지고, 중간 결과를 확인하며 검증할 수 있습니다. 복잡한 비즈니스 로직을 CTE 체이닝으로 구조화하는 것이 실무의 핵심 패턴입니다.

    3단계 CTE 체이닝의 장점은 각 단계를 독립적으로 테스트할 수 있다는 것입니다. groupStats만 실행해보고, 그 다음 groupRates를 추가하고, 마지막으로 ranked를 추가하는 식으로 점진적으로 쿼리를 완성할 수 있습니다. 한 번에 복잡한 쿼리를 작성하면 에러가 나도 어디가 문제인지 찾기 어렵지만, CTE로 나누면 어느 단계에서 문제가 생겼는지 쉽게 파악할 수 있습니다.
  tips:
  - 3단계 CTE 체이닝의 장점은 각 단계를 독립적으로 테스트할 수 있다는 것입니다. groupStats만 실행해보고, 그 다음 groupRates를 추가하고, 마지막으로 ranked를
    추가하는 식으로 점진적으로 쿼리를 완성할 수 있습니다. 한 번에 복잡한 쿼리를 작성하면 에러가 나도 어디가 문제인지 찾기 어렵지만, CTE로 나누면 어느 단계에서 문제가 생겼는지
    쉽게 파악할 수 있습니다.
  snippet: |-
    duckdb.sql("""
        WITH
        groupStats AS (
            SELECT pclass, sex,
                   COUNT(*) AS total,
                   SUM(survived) AS survived
            FROM titanic
            GROUP BY pclass, sex
        ),
        groupRates AS (
            SELECT pclass, sex, total, survived,
                   ROUND(survived * 100.0 / total, 1) AS survivalRate
            FROM groupStats
        ),
        ranked AS (
            SELECT *,
                   RANK() OVER(ORDER BY survivalRate DESC) AS overallRank
            FROM groupRates
        )
        SELECT pclass, sex, total, survived, survivalRate, overallRank
        FROM ranked
        ORDER BY overallRank
    """).show()
