- id: step9_n_unique
  title: 9단계. 고유값 개수
  structuredPrimary: true
  subtitle: n_unique()
  goal: 9단계. 고유값 개수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    n_unique()는 컬럼의 고유값(중복을 제외한 값) 개수를 반환합니다. 범주형 데이터를 탐색할 때 매우 유용합니다. chas 컬럼은 강변 위치 여부를 나타내는 이진 변수로, 0(내륙)과 1(강변) 두 가지 값만 가집니다. 고유값 개수를 확인하면 해당 컬럼이 범주형인지, 얼마나 많은 카테고리가 있는지 빠르게 파악할 수 있습니다. 카디널리티(cardinality) 확인에 필수적입니다.

    n_unique()는 중복을 제외한 고유값 개수를 반환합니다. pandas의 nunique()와 동일한 기능입니다. 범주형 데이터의 카테고리 개수를 확인하거나, 컬럼이 고유 식별자(ID)로 사용 가능한지 판단할 때 유용합니다. value_counts()와 함께 사용하면 각 고유값의 빈도도 확인할 수 있습니다.
  tips:
