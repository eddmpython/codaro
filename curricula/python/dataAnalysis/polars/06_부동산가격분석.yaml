- id: step6_fill_null
  title: 6단계. null 값 채우기
  structuredPrimary: true
  subtitle: fill_null()
  goal: 6단계. null 값 채우기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    null 값을 제거하는 대신 다른 값으로 채우는 방법도 있습니다. 이를 imputation(결측치 대체)이라고 합니다. 평균값, 중앙값, 최빈값, 0, 특정 상수 등으로 채울 수 있습니다. 여기서는 rm 컬럼의 평균값으로 null을 채웁니다. item() 메서드는 단일 값을 스칼라로 추출합니다. fill_null()은 데이터를 보존하면서 분석을 계속할 수 있게 해주지만, 통계적 편향이 발생할 수 있으므로 신중하게 사용해야 합니다.

    fill_null(값)은 null을 지정한 값으로 채웁니다. item()은 DataFrame의 단일 값을 Python 스칼라로 추출하는 메서드입니다. fill_null(pl.col('다른컬럼').mean())처럼 표현식도 사용할 수 있지만, 여기서는 명확성을 위해 먼저 평균을 계산했습니다. forward_fill(), backward_fill()로 앞/뒤 값으로 채울 수도 있습니다.
  tips:
  - fill_null(값)은 null을 지정한 값으로 채웁니다. item()은 DataFrame의 단일 값을 Python 스칼라로 추출하는 메서드입니다. fill_null(pl.col('다른컬럼').mean())처럼
    표현식도 사용할 수 있지만, 여기서는 명확성을 위해 먼저 평균을 계산했습니다. forward_fill(), backward_fill()로 앞/뒤 값으로 채울 수도 있습니다.
  snippet: |-
    rmMean = housing.select(pl.col("rm").mean()).item()
    housingFilled = housingNull.with_columns(
        pl.col("rm").fill_null(rmMean)
    )
    housingFilled.select(pl.col("rm").is_null().sum())
