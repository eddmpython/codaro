  check:
    noError: 6단계. null 값 채우기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 6단계. null 값 채우기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step7_when_then
  title: 7단계. 조건부 값 변환
  structuredPrimary: true
  subtitle: when-then-otherwise
  goal: 7단계. 조건부 값 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    가격대별로 등급을 부여하여 데이터를 범주화합니다. when-then-otherwise 구문은 SQL의 CASE WHEN과 동일한 기능으로, 여러 조건을 순차적으로 검사하여 해당하는 값을 반환합니다. medv가 30 이상이면 고가, 20 이상이면 중가, 그 외는 저가로 분류합니다. 이렇게 연속형 변수를 범주형으로 변환하면 그룹별 비교 분석이 쉬워집니다. pl.lit()은 리터럴(상수) 값을 표현식으로 만들어줍니다.

    pl.when(조건).then(값1).when(조건2).then(값2).otherwise(기본값)은 여러 조건을 연결하는 표현식입니다. 조건은 위에서 아래로 순차적으로 평가되므로 순서가 중요합니다. pl.lit()는 상수 값을 표현식으로 변환하며, 문자열, 숫자 모두 사용 가능합니다. SQL의 CASE WHEN, pandas의 np.where()와 유사합니다.
  tips:
  - pl.when(조건).then(값1).when(조건2).then(값2).otherwise(기본값)은 여러 조건을 연결하는 표현식입니다. 조건은 위에서 아래로 순차적으로 평가되므로
    순서가 중요합니다. pl.lit()는 상수 값을 표현식으로 변환하며, 문자열, 숫자 모두 사용 가능합니다. SQL의 CASE WHEN, pandas의 np.where()와 유사합니다.
  snippet: |-
    housingGrade = housing.with_columns(
        pl.when(pl.col("medv") >= 30)
        .then(pl.lit("고가"))
        .when(pl.col("medv") >= 20)
        .then(pl.lit("중가"))
        .otherwise(pl.lit("저가"))
        .alias("priceGrade")
    )
    housingGrade.select(["medv", "priceGrade"]).head(10)
  exercise:
    prompt: 7단계. 조건부 값 변환 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
