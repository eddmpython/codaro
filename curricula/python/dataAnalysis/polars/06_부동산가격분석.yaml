          pl.when(pl.col("medv") >= 30)
          .then(pl.lit("고가"))
          .when(pl.col("medv") >= 20)
          .then(pl.lit("중가"))
          .otherwise(pl.lit("저가"))
          .alias("priceGrade")
      )
      housingGrade.select(["medv", "priceGrade"]).head(10)
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 7단계. 조건부 값 변환의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 7단계. 조건부 값 변환의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
