- id: step10_std
  title: 10단계. 표준편차 계산
  structuredPrimary: true
  subtitle: std()
  goal: 10단계. 표준편차 계산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    표준편차(standard deviation)는 데이터의 산포도, 즉 값들이 평균에서 얼마나 떨어져 있는지를 나타내는 지표입니다. 표준편차가 클수록 값들이 넓게 퍼져있고, 작을수록 평균 근처에 밀집되어 있습니다. 통계학에서 평균 ± 1표준편차 범위에 약 68%의 데이터가, ± 2표준편차 범위에 약 95%의 데이터가 포함됩니다. 주택 가격의 표준편차를 확인하면 가격 변동폭을 이해할 수 있습니다.

    std()는 표준편차를 계산합니다. 기본적으로 표본 표준편차(n-1로 나눔)를 사용하며, ddof=0 파라미터로 모집단 표준편차(n으로 나눔)를 계산할 수 있습니다. 표준편차는 평균과 함께 사용하여 데이터 분포를 이해하는 핵심 지표입니다. var()로 분산(표준편차의 제곱)도 계산할 수 있습니다.
  tips:
  - std()는 표준편차를 계산합니다. 기본적으로 표본 표준편차(n-1로 나눔)를 사용하며, ddof=0 파라미터로 모집단 표준편차(n으로 나눔)를 계산할 수 있습니다. 표준편차는
    평균과 함께 사용하여 데이터 분포를 이해하는 핵심 지표입니다. var()로 분산(표준편차의 제곱)도 계산할 수 있습니다.
  snippet: |-
    housing.select(
        pl.col("medv").mean().alias("mean"),
        pl.col("medv").std().alias("std"),
        pl.col("medv").min().alias("min"),
        pl.col("medv").max().alias("max")
    )
  exercise:
    prompt: 10단계. 표준편차 계산 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
