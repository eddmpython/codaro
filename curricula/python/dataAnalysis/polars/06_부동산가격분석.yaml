- id: step13_join
  title: 13단계. 데이터 조인
  structuredPrimary: true
  subtitle: join()
  goal: 13단계. 데이터 조인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    join()은 두 DataFrame을 공통 키(key) 컬럼을 기준으로 결합합니다. on 파라미터에 공통 컬럼명을 지정하고, how 파라미터로 조인 방식을 선택합니다. left join은 왼쪽(housing) 테이블의 모든 행을 유지하고, 오른쪽(regionInfo) 테이블에서 매칭되는 정보를 가져옵니다. SQL의 JOIN과 동일한 개념으로, inner, left, outer, cross 등 다양한 조인 방식을 지원합니다. 이제 각 주택에 지역명과 프리미엄 정보가 추가됩니다.

    join(df2, on='key', how='left')는 두 DataFrame을 결합합니다. on은 공통 키 컬럼, how는 조인 방식입니다. 'left'는 왼쪽 테이블 기준, 'inner'는 양쪽 모두 있는 것만, 'outer'는 모든 행 유지, 'cross'는 카티전 곱을 의미합니다. pandas의 merge()와 유사하지만 Polars는 더 빠릅니다.
  tips:
  - join(df2, on='key', how='left')는 두 DataFrame을 결합합니다. on은 공통 키 컬럼, how는 조인 방식입니다. 'left'는 왼쪽 테이블 기준,
    'inner'는 양쪽 모두 있는 것만, 'outer'는 모든 행 유지, 'cross'는 카티전 곱을 의미합니다. pandas의 merge()와 유사하지만 Polars는 더 빠릅니다.
  snippet: |-
    housingJoined = housing.join(
        regionInfo,
        on="chas",
        how="left"
    )
    housingJoined.select(["chas", "regionName", "premium", "medv"]).head(10)
  exercise:
