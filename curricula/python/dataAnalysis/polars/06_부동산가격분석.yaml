  title: 8단계. 등급별 통계
  structuredPrimary: true
  subtitle: group_by + agg
  goal: 8단계. 등급별 통계에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: 새로 만든 가격 등급별로 주택 개수와 평균 가격을 계산합니다. group_by()는 지정한 컬럼의 고유값별로 데이터를 그룹화하고, agg()는 각 그룹에 집계
    함수를 적용합니다. 이를 통해 고가, 중가, 저가 등급별로 몇 채의 주택이 있고 평균 가격이 얼마인지 한눈에 파악할 수 있습니다. Polars의 group_by는 pandas보다
