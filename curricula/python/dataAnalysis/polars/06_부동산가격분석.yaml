sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: Boston Housing 데이터
  goal: 1단계. 데이터 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    Boston 지역 506개 주택의 가격과 특성 정보를 불러옵니다. 이 데이터는 1970년대 보스턴 교외 지역 주택의 중간 가격(medv)과 이에 영향을 미치는 13개의 특성 변수를 포함합니다. 범죄율(crim), 방 개수(rm), 강변 위치 여부(chas), 저소득층 비율(lstat) 등 부동산 가격 결정 요인을 분석할 수 있는 실제 데이터입니다. Polars의 read_csv는 pandas보다 빠른 속도로 CSV 파일을 DataFrame으로 변환하며, 특히 대용량 데이터에서 성능 차이가 두드러집니다.

    pl.read_csv()는 CSV 파일을 Polars DataFrame으로 읽습니다. 이번 수업은 Codaro 로컬 데이터를 CSV 문자열로 변환해 읽고, 실제 업무에서는 같은 함수에 파일 경로나 내부 데이터 경로를 전달하면 됩니다.
  tips:
  - pl.read_csv()는 CSV 파일을 Polars DataFrame으로 읽습니다. 이번 수업은 Codaro 로컬 데이터를 CSV 문자열로 변환해 읽고, 실제 업무에서는 같은
    함수에 파일 경로나 내부 데이터 경로를 전달하면 됩니다.
  snippet: |-
    import polars as pl
    from io import StringIO
    from codaro.curriculum.localData import loadLocalDataset

    housingCsv = loadLocalDataset("boston_housing").to_csv(index=False)
    housing = pl.read_csv(StringIO(housingCsv))
    housing
  exercise:
    prompt: 1단계. 데이터 불러오기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import polars as pl
      from io import StringIO
      from codaro.curriculum.localData import loadLocalDataset

      housingCsv = loadLocalDataset("boston_housing").to_csv(index=False)
      housing = pl.read_csv(StringIO(housingCsv))
      housing
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 1단계. 데이터 불러오기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 1단계. 데이터 불러오기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step2_schema
  title: 2단계. 스키마 확인
  structuredPrimary: true
  subtitle: 컬럼별 타입
  goal: 2단계. 스키마 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    DataFrame의 스키마(schema)는 각 컬럼의 이름과 데이터 타입을 보여줍니다. Polars는 타입 시스템이 명확하여 Float64, Int64, Utf8(문자열) 등으로 표시됩니다. medv는 주택 중간 가격(1000달러 단위), rm은 평균 방 개수, crim은 범죄율, lstat은 저소득층 비율, chas는 강변 위치 여부(0 또는 1) 등을 의미합니다. 데이터 분석 전에 스키마를 확인하면 어떤 연산이 가능한지 미리 파악하고, 필요시 타입 변환을 계획할 수 있습니다. Polars는 타입에 엄격하여 잘못된 연산을 사전에 방지합니다.

    .schema는 DataFrame의 컬럼명과 타입을 딕셔너리 형태로 반환합니다. pandas의 .dtypes와 비슷하지만, Polars는 타입 정보가 더 명확하고 세분화되어 있습니다. Float64는 64비트 부동소수점, Int64는 64비트 정수를 의미하며, 이 정보로 메모리 사용량도 예측할 수 있습니다.
  tips:
  - .schema는 DataFrame의 컬럼명과 타입을 딕셔너리 형태로 반환합니다. pandas의 .dtypes와 비슷하지만, Polars는 타입 정보가 더 명확하고 세분화되어 있습니다.
    Float64는 64비트 부동소수점, Int64는 64비트 정수를 의미하며, 이 정보로 메모리 사용량도 예측할 수 있습니다.
  snippet: housing.schema
  exercise:
    prompt: 2단계. 스키마 확인 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: housing.schema
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 2단계. 스키마 확인의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 2단계. 스키마 확인의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step3_null_check
  title: 3단계. null 값 확인
  structuredPrimary: true
  subtitle: is_null() 사용
  goal: 3단계. null 값 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    실제 데이터 분석에서는 결측치(null 값) 처리가 매우 중요합니다. null 값이 있으면 평균, 합계 등의 통계 계산이 왜곡될 수 있고, 일부 연산에서는 에러가 발생합니다. Polars의 is_null() 표현식은 각 값이 null인지 Boolean(True/False)으로 반환하며, sum()과 조합하면 컬럼별 null 개수를 빠르게 계산할 수 있습니다. 이 데이터셋은 완전한 데이터이지만, 실무에서는 대부분의 데이터가 null을 포함하고 있어 적절한 처리 전략이 필수입니다. null 확인은 데이터 품질 점검의 첫 단계입니다.

    is_null()은 null 여부를 Boolean으로 반환하는 표현식입니다. pl.all()은 모든 컬럼을 선택하므로, pl.all().is_null().sum()은 각 컬럼의 null 개수를 한 번에 계산합니다. True는 1로, False는 0으로 계산되어 sum()으로 개수를 셀 수 있습니다. pandas의 df.isnull().sum()과 동일한 결과를 제공합니다.
  tips:
  - is_null()은 null 여부를 Boolean으로 반환하는 표현식입니다. pl.all()은 모든 컬럼을 선택하므로, pl.all().is_null().sum()은 각 컬럼의
    null 개수를 한 번에 계산합니다. True는 1로, False는 0으로 계산되어 sum()으로 개수를 셀 수 있습니다. pandas의 df.isnull().sum()과 동일한
    결과를 제공합니다.
  snippet: housing.select(pl.all().is_null().sum())
  exercise:
    prompt: 3단계. null 값 확인 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: housing.select(pl.all().is_null().sum())
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 3단계. null 값 확인의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 3단계. null 값 확인의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step4_null_sample
  title: 4단계. null 데이터 생성
  structuredPrimary: true
  subtitle: 실습을 위한 null 추가
  goal: 4단계. null 데이터 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    null 처리 기법을 연습하기 위해 일부 데이터에 인위적으로 null을 추가합니다. 방 개수(rm)가 5.5개 미만인 경우를 null로 변환합니다. 실무에서는 센서 오류, 입력 누락, 데이터 수집 실패 등 다양한 이유로 null이 발생합니다. when-then-otherwise 구문을 사용하면 조건에 따라 값을 null로 변환하거나 다른 값으로 대체할 수 있습니다.

    pl.when().then(None)은 조건에 해당하는 값을 null로 변환합니다. Python의 None은 Polars에서 null로 처리됩니다. with_columns()로 기존 컬럼을 같은 이름(rm)으로 덮어씌울 수 있으며, Codaro 환경에서는 새로운 변수명(housingNull)을 사용해야 합니다.
  tips:
  - pl.when().then(None)은 조건에 해당하는 값을 null로 변환합니다. Python의 None은 Polars에서 null로 처리됩니다. with_columns()로
    기존 컬럼을 같은 이름(rm)으로 덮어씌울 수 있으며, Codaro 환경에서는 새로운 변수명(housingNull)을 사용해야 합니다.
  snippet: |-
    housingNull = housing.with_columns(
        pl.when(pl.col("rm") < 5.5)
        .then(None)
        .otherwise(pl.col("rm"))
        .alias("rm")
    )
    housingNull.select(pl.col("rm").is_null().sum())
  exercise:
    prompt: 4단계. null 데이터 생성 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      housingNull = housing.with_columns(
          pl.when(pl.col("rm") < 5.5)
          .then(None)
          .otherwise(pl.col("rm"))
          .alias("rm")
      )
      housingNull.select(pl.col("rm").is_null().sum())
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 4단계. null 데이터 생성의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 4단계. null 데이터 생성의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step5_drop_nulls
  title: 5단계. null 행 제거
  structuredPrimary: true
  subtitle: drop_nulls()
  goal: 5단계. null 행 제거에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    null 값을 처리하는 첫 번째 방법은 해당 행을 완전히 제거하는 것입니다. drop_nulls() 메서드는 null이 있는 행을 삭제합니다. subset 파라미터로 특정 컬럼만 검사할 수 있어, 중요한 컬럼에만 null 제거 규칙을 적용할 수 있습니다. 하지만 이 방법은 데이터 손실을 유발하므로, null 비율이 낮을 때만 사용하는 것이 좋습니다. null이 많은 경우 대부분의 데이터를 잃을 수 있습니다.

    drop_nulls()는 null이 포함된 행을 제거합니다. subset=['컬럼명']으로 특정 컬럼만 검사할 수 있습니다. subset을 생략하면 모든 컬럼을 검사하여, 어느 하나라도 null이 있으면 해당 행이 제거됩니다. shape로 제거 전후 행 개수를 비교하면 얼마나 삭제되었는지 확인할 수 있습니다.
  tips:
  - drop_nulls()는 null이 포함된 행을 제거합니다. subset=['컬럼명']으로 특정 컬럼만 검사할 수 있습니다. subset을 생략하면 모든 컬럼을 검사하여, 어느
    하나라도 null이 있으면 해당 행이 제거됩니다. shape로 제거 전후 행 개수를 비교하면 얼마나 삭제되었는지 확인할 수 있습니다.
  snippet: |-
    housingClean = housingNull.drop_nulls(subset=["rm"])
    housingClean.shape
  exercise:
    prompt: 5단계. null 행 제거 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      housingClean = housingNull.drop_nulls(subset=["rm"])
      housingClean.shape
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
