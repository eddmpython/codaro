    - label: 2단계. 미리보기 처리 실행
      detail: 컬럼 선택/필터/집계 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 인기도 필터링 결과 검증
      detail: 행 수, 컬럼 값, 집계 결과 기준으로 실행 결과를 비교합니다.
    - label: 음악스트리밍분석 재사용
      detail: 완성 코드를 대용량 데이터 분석 파이프라인에 붙일 수 있게 정리합니다.
    runtime:
