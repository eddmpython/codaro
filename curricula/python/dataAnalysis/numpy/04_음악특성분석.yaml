      idx1 = np.unravel_index(np.argmax(upper), upper.shape)
      temp = matrix.copy()
      np.fill_diagonal(temp, 0)
      idx2 = np.unravel_index(np.argmin(temp), temp.shape)
      f"가장 강한 양의 상관: {cols[idx1[0]]} - {cols[idx1[1]]} ({matrix[idx1]:.3f})"
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 15단계. 강한 상관관계 찾기에서 `upper` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 15단계. 강한 상관관계 찾기 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 음악 특성 정규화와 결측 처리'
  structuredPrimary: true
  subtitle: nanmean, min-max scaling, corrcoef, 실패 케이스
  goal: '현업 흐름 검증: 음악 특성 정규화와 결측 처리에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    음악 특성처럼 단위가 섞인 배열은 먼저 정규화하고 결측값을 처리해야 합니다. 결측을 무시한 평균과 정규화 범위를 검증한 뒤 상관관계를 해석하세요.

    변주 실험
    템포 컬럼만 표준화(z-score)하고 나머지는 min-max로 유지하면 상관계수 해석이 달라지는지 비교하세요.
  tips:
  - 변주 실험 템포 컬럼만 표준화(z-score)하고 나머지는 min-max로 유지하면 상관계수 해석이 달라지는지 비교하세요.
  snippet: |-
    import numpy as np

    features = np.array([
        [0.8, 120.0, 0.6],
        [0.5, np.nan, 0.7],
        [0.9, 140.0, 0.4],
    ])

    columnMeans = np.nanmean(features, axis=0)
    filled = np.where(np.isnan(features), columnMeans, features)
    minimum = filled.min(axis=0)
    maximum = filled.max(axis=0)
    scaled = (filled - minimum) / (maximum - minimum)
    corr = np.corrcoef(scaled, rowvar=False)

    assert not np.isnan(filled).any()
    assert np.allclose(scaled.min(axis=0), [0.0, 0.0, 0.0])
    assert np.allclose(scaled.max(axis=0), [1.0, 1.0, 1.0])
    assert corr.shape == (3, 3)
  exercise:
    prompt: '현업 흐름 검증: 음악 특성 정규화와 결측 처리 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.'
