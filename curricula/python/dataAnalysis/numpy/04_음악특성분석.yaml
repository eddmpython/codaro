- id: step15_corr_extreme
  title: 15단계. 강한 상관관계 찾기
  structuredPrimary: true
  subtitle: np.triu(), unravel_index
  goal: 15단계. 강한 상관관계 찾기에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    상관계수 행렬에서 가장 강한 관계를 찾습니다. 대각선은 자기 자신과의 상관(항상 1)이므로 제외해야 합니다. np.triu(matrix, k=1)은 상삼각 부분만 남깁니다(대각선 위쪽). unravel_index는 1차원 인덱스를 2차원 위치(행, 열)로 변환합니다. 가장 높은 양의 상관과 음의 상관을 가진 특성 쌍을 찾을 수 있습니다.

    np.triu(arr, k=1)은 상삼각 행렬을 반환합니다. 대각선(k=0)을 제외하면 자기 자신과의 상관(1.0)이 제거됩니다.
  snippet: |-
    upper = np.triu(matrix, k=1)
    idx1 = np.unravel_index(np.argmax(upper), upper.shape)
    temp = matrix.copy()
    np.fill_diagonal(temp, 0)
    idx2 = np.unravel_index(np.argmin(temp), temp.shape)
    f"가장 강한 양의 상관: {cols[idx1[0]]} - {cols[idx1[1]]} ({matrix[idx1]:.3f})"
  exercise:
    prompt: 15단계. 강한 상관관계 찾기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
