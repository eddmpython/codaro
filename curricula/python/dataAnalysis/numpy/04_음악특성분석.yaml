sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: NumPy와 pandas를 불러옵니다. pandas는 CSV 로딩용으로만 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import numpy as np
    import pandas as pd
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: |-
      import numpy as np
      import pandas as pd
    hints:
    - 바꿀 지점은 배열 입력을 만드는 첫 줄과 벡터화 계산 줄에서 찾으세요.
    - 실행 뒤 shape와 수치 결과 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 실행 결과가 shape와 수치 결과 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step2_data
  title: 2단계. 데이터 로드
  structuredPrimary: true
  subtitle: Spotify 데이터셋
  goal: 2단계. 데이터 로드에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: 로컬 Spotify 샘플에는 144곡의 음악 특성이 담겨 있습니다. danceability(춤추기
    좋은 정도), energy(에너지), valence(밝고 긍정적인 정도) 등 Spotify가 자체 알고리즘으로 분석한 0~1 사이의 수치들입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from codaro.curriculum.localData import loadLocalDataset

    df = loadLocalDataset("spotify_songs")
    df.head()
  exercise:
    prompt: 2단계. 데이터 로드 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      from codaro.curriculum.localData import loadLocalDataset

      df = loadLocalDataset("spotify_songs")
      df.head()
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 2단계. 데이터 로드의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 2단계. 데이터 로드의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step3_extract
  title: 3단계. 특성 배열 추출
  structuredPrimary: true
  subtitle: 다중 컬럼
  goal: 3단계. 특성 배열 추출에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 여러 개의 열(컬럼)을 동시에 선택할 수 있습니다. df[['A', 'B', 'C']]처럼 열 이름 리스트를 전달하면 해당 열들만 추출됩니다. 9개 음악 특성을
    선택하면 144행 × 9열 크기의 2차원 배열이 만들어집니다. 각 행은 하나의 곡, 각 열은 하나의 특성입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    cols = ['danceability', 'energy', 'loudness', 'speechiness',
            'acousticness', 'instrumentalness', 'liveness', 'valence', 'tempo']
    features = df[cols].values
    features.shape
  exercise:
    prompt: 3단계. 특성 배열 추출 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      cols = ['danceability', 'energy', 'loudness', 'speechiness',
              'acousticness', 'instrumentalness', 'liveness', 'valence', 'tempo']
      features = df[cols].values
      features.shape
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 3단계. 특성 배열 추출에서 `cols` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 3단계. 특성 배열 추출 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step4_stats
  title: 4단계. 기본 통계
  structuredPrimary: true
  subtitle: axis=0
  goal: 4단계. 기본 통계에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: 각 특성의 평균과 표준편차를 계산합니다. axis=0으로 열 방향 연산을 수행합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    avg = np.mean(features, axis=0)
    std = np.std(features, axis=0)
    pd.DataFrame({'Feature': cols, 'Mean': np.round(avg, 2), 'Std': np.round(std, 2)})
  exercise:
    prompt: 4단계. 기본 통계 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      avg = np.mean(features, axis=0)
      std = np.std(features, axis=0)
      pd.DataFrame({'Feature': cols, 'Mean': np.round(avg, 2), 'Std': np.round(std, 2)})
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 4단계. 기본 통계의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 4단계. 기본 통계의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step5_nan_check
  title: 5단계. 결측값 확인
  structuredPrimary: true
  subtitle: np.isnan()
  goal: 5단계. 결측값 확인에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 배열 계산은 반복문 없이 많은 값을 빠르게 처리하는 분석 코드의 바탕입니다.
  explanation: |-
    NaN(Not a Number)은 '값이 없음'을 나타내는 특수한 표시입니다. 엑셀의 빈 셀과 비슷합니다. 실제 데이터에서는 측정 실패, 입력 누락 등으로 결측값이 자주 발생합니다. np.isnan()은 각 값이 NaN인지 확인해서 True/False 배열을 반환합니다. sum()으로 전체 NaN 개수를 셀 수 있습니다.

    np.isnan()은 NaN(결측값) 여부를 불리언 배열로 반환합니다. sum()으로 전체 NaN 개수를 확인할 수 있습니다.
  snippet: np.sum(np.isnan(features))
  exercise:
    prompt: 5단계. 결측값 확인 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: np.sum(np.isnan(features))
    hints:
    - 바꿀 지점은 배열 입력을 만드는 첫 줄과 벡터화 계산 줄에서 찾으세요.
    - 실행 뒤 shape와 수치 결과 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 5단계. 결측값 확인의 수정 코드가 벡터화 계산 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 5단계. 결측값 확인 실행 결과가 shape와 수치 결과 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step6_nan_remove
  title: 6단계. 결측값 제거
  structuredPrimary: true
  subtitle: np.any()
  goal: 6단계. 결측값 제거에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    any()는 '하나라도 있으면 True'를 반환합니다. np.any(np.isnan(features), axis=1)은 각 행(axis=1)에서 NaN이 하나라도 있으면 True입니다. 이 True/False 배열 앞에 ~(틸다)를 붙이면 반전되어, NaN이 없는 행만 True가 됩니다. 결과적으로 NaN이 없는 깨끗한 행들만 남습니다.

    np.any(arr, axis=1)은 각 행에서 하나라도 True가 있으면 True를 반환합니다. ~(틸다)는 불리언 배열을 반전시킵니다.
  snippet: |-
    mask = np.any(np.isnan(features), axis=1)
    clean = features[~mask]
    clean.shape
  exercise:
    prompt: 6단계. 결측값 제거 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      mask = np.any(np.isnan(features), axis=1)
      clean = features[~mask]
      clean.shape
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 6단계. 결측값 제거에서 `mask` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 6단계. 결측값 제거 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step7_minmax
  title: 7단계. Min-Max 정규화
  structuredPrimary: true
  subtitle: 0~1 범위
  goal: 7단계. MinMax 정규화에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    정규화(Normalization)는 서로 다른 단위의 데이터를 같은 범위로 맞추는 작업입니다. tempo(템포)는 50~200 범위이고 danceability는 0~1 범위라서 직접 비교하기 어렵습니다. Min-Max 정규화는 (값 - 최소) / (최대 - 최소)로 모든 값을 0~1 범위로 변환합니다. 브로드캐스팅 덕분에 for문 없이 한 줄로 전체 배열에 적용됩니다.

    Min-Max 정규화는 (값 - 최소) / (최대 - 최소)로 계산합니다. 브로드캐스팅 덕분에 반복문 없이 전체 배열에 연산이 적용됩니다.
  snippet: |-
    lo = np.min(clean, axis=0)
    hi = np.max(clean, axis=0)
    norm = (clean - lo) / (hi - lo)
    norm[:5]
  exercise:
    prompt: 7단계. MinMax 정규화 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      lo = np.min(clean, axis=0)
      hi = np.max(clean, axis=0)
      norm = (clean - lo) / (hi - lo)
      norm[:5]
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 7단계. MinMax 정규화에서 `lo` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 7단계. MinMax 정규화 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step8_norm_verify
  title: 8단계. 정규화 확인
  structuredPrimary: true
  subtitle: 범위 검증
  goal: 8단계. 정규화 확인에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: 정규화 후 모든 특성이 0~1 범위에 있는지 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    avg = np.mean(norm, axis=0)
    mins = np.min(norm, axis=0)
    maxs = np.max(norm, axis=0)
    pd.DataFrame({
        'Feature': cols,
        'Min': np.round(mins, 2),
        'Max': np.round(maxs, 2),
