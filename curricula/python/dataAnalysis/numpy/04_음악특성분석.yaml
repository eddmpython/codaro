  explanation: |-
    상관계수는 두 변수가 함께 변하는 정도를 -1에서 1 사이 숫자로 나타냅니다. 1에 가까우면 양의 상관(하나가 커지면 다른 것도 커짐), -1에 가까우면 음의 상관(하나가 커지면 다른 것은 작아짐), 0에 가까우면 관계가 없습니다. np.corrcoef()는 상관계수 행렬을 반환하는데, 2x2 행렬의 비대각선 값이 실제 상관계수입니다.

    np.corrcoef(x, y)는 피어슨 상관계수 행렬을 반환합니다. 대각선은 항상 1(자기 자신과의 상관), 비대각선이 두 변수 간 상관계수입니다.
  snippet: |-
    dance = clean[:, 0]
    energy = clean[:, 1]
    corr = np.corrcoef(dance, energy)
    corr
