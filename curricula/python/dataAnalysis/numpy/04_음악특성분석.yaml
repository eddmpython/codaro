  check:
    type: noError
    noError: '현업 흐름 검증: 음악 특성 정규화와 결측 처리에서 `features` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.'
    resultCheck: '현업 흐름 검증: 음악 특성 정규화와 결측 처리에서 기대값과 실제 결과가 같으면 검증이 통과하고, 다르면 실패해야 합니다.'
