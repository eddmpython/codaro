    - - Matplotlib
      - 플롯 데이터로 NumPy 배열 사용
    - - Scikit-learn
      - 모든 입출력이 NumPy 배열
    - - SciPy
      - NumPy 확장, 과학 계산 함수
    - - TensorFlow/PyTorch
      - 텐서와 NumPy 배열 상호 변환
  goal: 🌐 NumPy 생태계에서 배열 입력을 바꿨을 때 shape와 수치 결과가 어떻게 달라지는지 확인한다.
  why: 배열 계산은 반복문 없이 많은 값을 빠르게 처리하는 분석 코드의 바탕입니다.
