  blocks:
  - type: sectionHeader
    title: 🌐 NumPy 생태계
    subtitle: 데이터 과학의 기반
  - type: text
    content: NumPy는 파이썬 데이터 과학 생태계의 기반입니다. NumPy를 잘 이해하면 다른 라이브러리들도 쉽게 배울 수 있습니다.
  - type: table
    headers:
