  explanation: |-
    종합 분석은 여러 NumPy 기능을 이어 붙이는 만큼 중간 산출물을 검증해야 합니다. 표준화 평균, 위험 점수 shape, 구간별 환자 수를 단계별로 확인하세요.

    변주 실험
    가중치를 상관계수 기반으로 바꾼 점수와 수동 가중치 점수를 비교하고, 고위험군에 들어가는 사람이 달라지는지 확인하세요.
