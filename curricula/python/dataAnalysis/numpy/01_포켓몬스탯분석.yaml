  structuredPrimary: true
  subtitle: size
  goal: 7단계. 요소 개수 확인에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 배열 계산은 반복문 없이 많은 값을 빠르게 처리하는 분석 코드의 바탕입니다.
  explanation: size는 배열의 전체 요소 개수입니다. 2차원 배열의 경우 행 x 열 값과 같습니다.
