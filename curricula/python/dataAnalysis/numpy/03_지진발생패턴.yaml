    noError: 12단계. 고유값과 빈도의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 12단계. 고유값과 빈도 실행 결과가 shape와 수치 결과 기준으로 바꾼 열 이름이나 행 값을 반영해야 합니다.
