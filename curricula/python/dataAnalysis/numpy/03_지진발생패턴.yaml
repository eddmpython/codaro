  explanation: where 안에 또 다른 where를 넣어 3개 이상의 카테고리로 분류할 수 있습니다. 엑셀에서 IF 안에 IF를 넣는 중첩 IF와 같습니다. 규모 7.0
    이상은 Major, 6.0 이상은 Strong, 5.0 이상은 Moderate, 나머지는 Light로 4단계 분류가 가능합니다.
