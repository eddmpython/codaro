- id: step15_idxmax
  title: 15단계. 최대값 위치 찾기
  structuredPrimary: true
  subtitle: idxmax() 활용
  goal: 15단계. 최대값 위치 찾기에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    max()는 최대값 자체를 반환하지만, idxmax()는 최대값이 위치한 인덱스(행 번호)를 반환합니다. 이 인덱스를 loc과 함께 사용하면 최대값을 가진 행 전체를 가져올 수 있습니다. 예를 들어 가장 무거운 펭귄의 체중뿐만 아니라 그 펭귄의 종, 성별, 부리 길이 등 모든 정보를 확인할 수 있습니다. 데이터에서 극값(최대/최소)을 가진 케이스의 전체 정보를 파악할 때 매우 유용한 패턴입니다. 반대로 idxmin()은 최소값의 위치를 찾습니다.

    idxmax()와 idxmin()은 결측치(NaN)가 있으면 무시하고 계산합니다. 만약 결측치가 있는 행도 고려하려면 skipna=False 파라미터를 추가하면 됩니다. 예: penguins['body_mass_g'].idxmax(skipna=False)
  tips:
  - 'idxmax()와 idxmin()은 결측치(NaN)가 있으면 무시하고 계산합니다. 만약 결측치가 있는 행도 고려하려면 skipna=False 파라미터를 추가하면 됩니다. 예:
    penguins[''body_mass_g''].idxmax(skipna=False)'
  snippet: |-
    maxIdx = penguins['body_mass_g'].idxmax()
    penguins.loc[maxIdx]
  exercise:
    prompt: 15단계. 최대값 위치 찾기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      maxIdx = penguins['body_mass_g'].idxmax()
      penguins.loc[maxIdx]
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 15단계. 최대값 위치 찾기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 15단계. 최대값 위치 찾기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 종별 펭귄 특성 리포트'
  structuredPrimary: true
  subtitle: query, groupby, agg, idxmax, 실패 케이스
  goal: '현업 흐름 검증: 종별 펭귄 특성 리포트에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    그룹 비교는 평균만 보고 끝내면 약합니다. 필터링 조건, 그룹별 표본 수, 극값 행이 모두 기대와 맞는지 확인해야 리포트로 쓸 수 있습니다.

    변주 실험
    성별까지 groupby에 포함해 `species, sex` 조합별 평균을 만들고, 표본 수가 1개인 그룹을 리포트에서 제외할지 정책을 정하세요.
  tips:
  - 변주 실험 성별까지 groupby에 포함해 `species, sex` 조합별 평균을 만들고, 표본 수가 1개인 그룹을 리포트에서 제외할지 정책을 정하세요.
  snippet: |-
    import pandas as pd

    penguins = pd.DataFrame({
        "species": ["Adelie", "Adelie", "Gentoo", "Gentoo"],
        "sex": ["FEMALE", "MALE", "FEMALE", "MALE"],
        "body_mass_g": [3200, 3600, 4700, 5200],
    })

    female = penguins.query('sex == "FEMALE"')
    report = penguins.groupby("species").agg(
        count=("body_mass_g", "size"),
        avgMass=("body_mass_g", "mean"),
    )
    maxRow = penguins.loc[penguins["body_mass_g"].idxmax()]

    assert female["body_mass_g"].tolist() == [3200, 4700]
    assert report.loc["Gentoo", "avgMass"] == 4950
    assert maxRow["species"] == "Gentoo"
  exercise:
    prompt: '현업 흐름 검증: 종별 펭귄 특성 리포트 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.'
    starterCode: |-
      import pandas as pd

      penguins = pd.DataFrame({
          "species": ["Adelie", "Adelie", "Gentoo", "Gentoo"],
          "sex": ["FEMALE", "MALE", "FEMALE", "MALE"],
          "body_mass_g": [3200, 3600, 4700, 5200],
      })

      female = penguins.query('sex == "FEMALE"')
      report = penguins.groupby("species").agg(
          count=("body_mass_g", "size"),
          avgMass=("body_mass_g", "mean"),
      )
      maxRow = penguins.loc[penguins["body_mass_g"].idxmax()]

      assert female["body_mass_g"].tolist() == [3200, 4700]
      assert report.loc["Gentoo", "avgMass"] == 4950
      assert maxRow["species"] == "Gentoo"
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: '현업 흐름 검증: 종별 펭귄 특성 리포트의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.'
    resultCheck: '현업 흐름 검증: 종별 펭귄 특성 리포트의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.'
