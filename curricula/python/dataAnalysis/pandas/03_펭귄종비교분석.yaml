- id: summary
  title: 정리
  blocks:
  - type: text
    content: groupby의 핵심 개념을 배웠습니다. 반복적인 필터링 없이 그룹별 통계를 한 번에 계산하고, agg로 여러 함수를 조합하며, query로 간결한 필터링을 수행하는
      방법을 익혔습니다. 이 기술들은 실무 데이터 분석에서 필수적인 스킬입니다.
  - type: list
    items:
    - df.groupby('컬럼').mean() - 그룹별 평균 (Split-Apply-Combine)
    - df.groupby('컬럼').size() - 그룹별 개수
    - df.groupby(['컬럼1', '컬럼2']) - 여러 컬럼으로 그룹핑 (교차 분석)
    - df.groupby('컬럼').agg(['mean', 'max']) - 여러 통계 한번에
    - 'df.groupby(''컬럼'').agg({''컬럼1'': ''mean'', ''컬럼2'': ''max''}) - 컬럼별 다른 함수'
    - .reset_index() - 인덱스를 컬럼으로 복원
    - df.query('조건') - 간결한 필터링 (SQL WHERE 스타일)
    - df['컬럼'].idxmax() - 최대값 위치 찾기
  - type: text
    content: 다음 시간에는 붓꽃 데이터로 결측치 처리와 새 컬럼 만들기를 배웁니다. assign, apply, map 등 데이터 변환 기술을 익힙니다.
  goal: 정리에서 DataFrame 입력, 컬럼 선택, 결과 테이블을 연결해 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
