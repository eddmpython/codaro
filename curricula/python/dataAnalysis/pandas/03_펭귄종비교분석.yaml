- id: step3_5_describe
  title: 3.5단계. 전체 통계 복습
  structuredPrimary: true
  subtitle: describe()로 숫자 요약
  goal: 3.5단계. 전체 통계 복습에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    이전 프로젝트(01번, 02번)에서 배운 describe()를 다시 활용합니다. 펭귄의 체중, 날개 길이, 부리 치수 등 모든 숫자 컬럼의 통계를 한 번에 확인할 수 있습니다. 체중은 평균 약 4200g, 최소 2700g, 최대 6300g입니다. 날개 길이는 평균 약 201mm입니다. describe()는 데이터를 처음 접할 때 전체적인 범위와 분포를 빠르게 파악하는 데 필수적입니다.

    describe()는 pandas의 가장 기본적이면서도 강력한 메서드입니다. count(개수), mean(평균), std(표준편차), min(최소), 25%(1사분위), 50%(중앙값), 75%(3사분위), max(최대)를 자동으로 계산합니다. 이전 프로젝트에서 배운 개념을 계속 반복하면서 익숙해지는 것이 중요합니다.
  tips:
  - describe()는 pandas의 가장 기본적이면서도 강력한 메서드입니다. count(개수), mean(평균), std(표준편차), min(최소), 25%(1사분위), 50%(중앙값),
    75%(3사분위), max(최대)를 자동으로 계산합니다. 이전 프로젝트에서 배운 개념을 계속 반복하면서 익숙해지는 것이 중요합니다.
  snippet: penguins.describe()
  exercise:
    prompt: 3.5단계. 전체 통계 복습 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: penguins.describe()
