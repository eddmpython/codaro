    exercise:
      prompt: compare_numeric_groups(rows, group_key, value_key)를 완성해 그룹별 mean, minimum, maximum, missing을 반환하세요.
      starterCode: |-
        def compare_numeric_groups(rows, group_key, value_key):
            raise NotImplementedError
      solution: |
        def compare_numeric_groups(rows, group_key, value_key):
            grouped = {}
            for row in rows:
                bucket = grouped.setdefault(str(row[group_key]), {"values": [], "missing": 0})
                value = row.get(value_key)
                if value is None:
                    bucket["missing"] += 1
                else:
                    bucket["values"].append(value)
            result = {}
            for key, bucket in sorted(grouped.items()):
                values = bucket["values"]
                result[key] = {
                    "mean": round(sum(values) / len(values), 2) if values else None,
                    "minimum": min(values) if values else None,
                    "maximum": max(values) if values else None,
                    "missing": bucket["missing"],
                }
            return result
      hints: *id002
    check:
