- id: step5_groupby
  title: 5단계. groupby 기본
  structuredPrimary: true
  subtitle: 한 줄로 그룹별 통계
  goal: 5단계. groupby 기본에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    groupby는 데이터를 특정 기준으로 그룹으로 묶어서 각 그룹별로 계산을 수행하는 강력한 메서드입니다. "species 컬럼을 기준으로 그룹을 만들고, 각 그룹의 body_mass_g 평균을 계산해줘"라는 의미입니다. SQL의 GROUP BY와 동일한 개념으로, Split(분할) - Apply(적용) - Combine(결합) 세 단계를 자동으로 처리합니다. 3종의 평균 체중을 단 한 줄로 계산할 수 있습니다. Gentoo가 가장 무겁고(약 5076g), Chinstrap과 Adelie는 비슷합니다.

    groupby('컬럼')은 해당 컬럼의 고유한 값들로 그룹을 만듭니다. species에는 Adelie, Gentoo, Chinstrap 3개 값이 있으므로 3개 그룹이 생성됩니다. 각 그룹에 대해 뒤에 오는 집계 함수(mean, sum 등)가 적용됩니다.
  tips:
  - groupby('컬럼')은 해당 컬럼의 고유한 값들로 그룹을 만듭니다. species에는 Adelie, Gentoo, Chinstrap 3개 값이 있으므로 3개 그룹이 생성됩니다.
    각 그룹에 대해 뒤에 오는 집계 함수(mean, sum 등)가 적용됩니다.
  snippet: penguins.groupby('species')['body_mass_g'].mean()
  exercise:
    prompt: 5단계. groupby 기본 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: penguins.groupby('species')['body_mass_g'].mean()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 5단계. groupby 기본의 시퀀스 접근이 IndexError 없이 실행되어야 합니다.
    resultCheck: 5단계. groupby 기본 결과가 바꾼 리스트 값이나 인덱스 기준으로 달라져야 합니다.
