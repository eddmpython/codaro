  subtitle: size()로 개수
  goal: 7단계. 그룹 크기에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: size()는 각 그룹의 행 수를 세어줍니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: penguins.groupby('species').size()
  exercise:
    prompt: 7단계. 그룹 크기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: penguins.groupby('species').size()
    hints:
    - 바꿀 지점은 DataFrame 입력을 만드는 첫 줄과 정제와 집계 줄에서 찾으세요.
    - 실행 뒤 행/열 수와 요약값 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 7단계. 그룹 크기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 7단계. 그룹 크기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step8_reset_index
  title: 8단계. 인덱스 복원
  structuredPrimary: true
  subtitle: reset_index()
  goal: 8단계. 인덱스 복원에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    groupby 결과는 기본적으로 그룹 기준 컬럼이 인덱스가 됩니다. 즉, species가 행 이름이 되어버립니다. 이 결과를 일반 DataFrame처럼 다시 컬럼으로 만들려면 reset_index()를 사용합니다. 인덱스를 컬럼으로 복원하면 추가 분석이나 시각화를 할 때 더 편리합니다. 예를 들어 그래프를 그릴 때 species를 x축으로 사용하려면 컬럼이어야 합니다. reset_index()는 인덱스를 0, 1, 2...로 초기화하고, 기존 인덱스를 새 컬럼으로 추가합니다.

    reset_index()를 사용하지 않으면 결과가 Series 형태로 나옵니다. DataFrame으로 만들려면 reset_index()를 붙이거나, 처음부터 groupby('species')[['body_mass_g']].mean()처럼 2겹 대괄호를 사용하면 됩니다.
  tips:
  - reset_index()를 사용하지 않으면 결과가 Series 형태로 나옵니다. DataFrame으로 만들려면 reset_index()를 붙이거나, 처음부터 groupby('species')[['body_mass_g']].mean()처럼
    2겹 대괄호를 사용하면 됩니다.
  snippet: penguins.groupby('species')['body_mass_g'].mean().reset_index()
  exercise:
    prompt: 8단계. 인덱스 복원 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: penguins.groupby('species')['body_mass_g'].mean().reset_index()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 8단계. 인덱스 복원의 시퀀스 접근이 IndexError 없이 실행되어야 합니다.
    resultCheck: 8단계. 인덱스 복원 결과가 바꾼 리스트 값이나 인덱스 기준으로 달라져야 합니다.
- id: step9_multi_group
  title: 9단계. 여러 컬럼으로 그룹핑
  structuredPrimary: true
  subtitle: 종 + 성별
  goal: 9단계. 여러 컬럼으로 그룹핑에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    groupby는 하나의 컬럼뿐만 아니라 여러 컬럼을 동시에 기준으로 사용할 수 있습니다. 리스트 형태로 여러 컬럼을 전달하면 해당 컬럼들의 조합으로 그룹이 만들어집니다. 예를 들어 ['species', 'sex']로 그룹핑하면 (Adelie, MALE), (Adelie, FEMALE), (Gentoo, MALE), (Gentoo, FEMALE)... 이렇게 종과 성별의 모든 조합별로 그룹이 생성됩니다. 교차 분석이 필요할 때 매우 유용합니다. 같은 종 내에서도 수컷과 암컷의 체중 차이를 비교할 수 있습니다.

    여러 컬럼으로 그룹핑하면 결과의 인덱스가 MultiIndex(다층 인덱스)가 됩니다. reset_index()로 평평하게 만들거나, as_index=False 파라미터를 추가하면 처음부터 평평한 DataFrame을 얻을 수 있습니다.
  tips:
  - 여러 컬럼으로 그룹핑하면 결과의 인덱스가 MultiIndex(다층 인덱스)가 됩니다. reset_index()로 평평하게 만들거나, as_index=False 파라미터를 추가하면
    처음부터 평평한 DataFrame을 얻을 수 있습니다.
  snippet: penguins.groupby(['species', 'sex'])['body_mass_g'].mean()
  exercise:
    prompt: 9단계. 여러 컬럼으로 그룹핑 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: penguins.groupby(['species', 'sex'])['body_mass_g'].mean()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 9단계. 여러 컬럼으로 그룹핑의 시퀀스 접근이 IndexError 없이 실행되어야 합니다.
    resultCheck: 9단계. 여러 컬럼으로 그룹핑 결과가 바꾼 리스트 값이나 인덱스 기준으로 달라져야 합니다.
- id: step10_agg_list
  title: 10단계. 여러 통계 한번에
  structuredPrimary: true
  subtitle: agg() 리스트
  goal: 10단계. 여러 통계 한번에에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    지금까지는 mean(), max() 같은 함수를 하나씩만 적용했습니다. 하지만 agg(aggregate, 집계) 메서드를 사용하면 여러 통계 함수를 동시에 적용할 수 있습니다. 함수 이름을 리스트로 전달하면 각 함수의 결과가 컬럼으로 나란히 출력됩니다. 예를 들어 ['mean', 'min', 'max']를 전달하면 평균, 최소, 최대값을 한 번에 볼 수 있습니다. 데이터의 전체적인 분포를 파악하는 데 매우 효율적입니다. 한 줄로 종별 체중의 평균, 최소, 최대를 모두 확인할 수 있습니다.

    agg()에는 'mean', 'sum', 'min', 'max', 'std'(표준편차), 'count', 'median'(중앙값), 'var'(분산) 등 다양한 집계 함수를 사용할 수 있습니다. 사용자 정의 함수도 lambda나 def로 만들어 전달할 수 있습니다.
  tips:
  - agg()에는 'mean', 'sum', 'min', 'max', 'std'(표준편차), 'count', 'median'(중앙값), 'var'(분산) 등 다양한 집계 함수를 사용할
    수 있습니다. 사용자 정의 함수도 lambda나 def로 만들어 전달할 수 있습니다.
  snippet: penguins.groupby('species')['body_mass_g'].agg(['mean', 'min', 'max'])
  exercise:
    prompt: 10단계. 여러 통계 한번에 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: penguins.groupby('species')['body_mass_g'].agg(['mean', 'min', 'max'])
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 10단계. 여러 통계 한번에의 시퀀스 접근이 IndexError 없이 실행되어야 합니다.
    resultCheck: 10단계. 여러 통계 한번에 결과가 바꾼 리스트 값이나 인덱스 기준으로 달라져야 합니다.
- id: step11_agg_dict
  title: 11단계. 컬럼별 다른 함수
  structuredPrimary: true
  subtitle: agg() 딕셔너리
  goal: 11단계. 컬럼별 다른 함수에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    agg()의 진정한 강력함은 컬럼마다 다른 집계 함수를 적용할 수 있다는 것입니다. 딕셔너리 형태로 {'컬럼명': '함수'} 또는 {'컬럼명': ['함수1', '함수2']}처럼 작성하면 됩니다. 예를 들어 체중은 평균을 보고 싶고, 부리 길이는 최대값을 보고 싶다면 각각 다른 함수를 지정할 수 있습니다. 각 컬럼의 특성에 맞는 통계량을 선택적으로 계산할 수 있어 매우 유연합니다. 실무에서 리포트를 만들 때 자주 사용하는 패턴입니다.

    딕셔너리의 값으로 리스트를 주면 한 컬럼에 여러 함수를 적용할 수 있습니다. 예: {'body_mass_g': ['mean', 'std'], 'bill_length_mm': 'max'}처럼 작성하면 체중은 평균과 표준편차, 부리는 최대값을 계산합니다.
  tips:
  - '딕셔너리의 값으로 리스트를 주면 한 컬럼에 여러 함수를 적용할 수 있습니다. 예: {''body_mass_g'': [''mean'', ''std''], ''bill_length_mm'':
    ''max''}처럼 작성하면 체중은 평균과 표준편차, 부리는 최대값을 계산합니다.'
  snippet: |-
    penguins.groupby('species').agg({
        'body_mass_g': 'mean',
        'bill_length_mm': 'max'
    })
  exercise:
    prompt: 11단계. 컬럼별 다른 함수 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      penguins.groupby('species').agg({
          'body_mass_g': 'mean',
          'bill_length_mm': 'max'
      })
    hints:
    - 바꿀 지점은 DataFrame 입력을 만드는 첫 줄과 정제와 집계 줄에서 찾으세요.
    - 실행 뒤 행/열 수와 요약값 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 11단계. 컬럼별 다른 함수의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 11단계. 컬럼별 다른 함수의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step12_query
  title: 12단계. query 필터링
  structuredPrimary: true
  subtitle: 간결한 조건문
  goal: 12단계. query 필터링에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    query() 메서드는 기존의 DataFrame[조건] 방식보다 더 간결하고 읽기 쉬운 필터링을 제공합니다. 조건을 문자열로 작성하기 때문에 대괄호 중첩이 줄어들고, SQL의 WHERE 절처럼 직관적입니다. penguins[penguins['body_mass_g'] > 5000] 대신 penguins.query('body_mass_g > 5000')처럼 작성할 수 있습니다. 컬럼명을 따옴표로 감싸지 않아도 되고, 복잡한 조건을 and, or로 연결할 때 특히 편리합니다.

    query()는 내부적으로 문자열을 파싱해서 조건을 평가합니다. 비교 연산자(>, <, ==, !=)뿐만 아니라 and, or, not 같은 논리 연산자도 사용할 수 있습니다. 예: query('body_mass_g > 4000 and sex == "MALE"')
  tips:
  - 'query()는 내부적으로 문자열을 파싱해서 조건을 평가합니다. 비교 연산자(>, <, ==, !=)뿐만 아니라 and, or, not 같은 논리 연산자도 사용할 수 있습니다.
    예: query(''body_mass_g > 4000 and sex == "MALE"'')'
  snippet: penguins.query('body_mass_g > 5000')
  exercise:
    prompt: 12단계. query 필터링 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: penguins.query('body_mass_g > 5000')
    hints:
    - 바꿀 지점은 DataFrame 입력을 만드는 첫 줄과 정제와 집계 줄에서 찾으세요.
    - 실행 뒤 행/열 수와 요약값 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 12단계. query 필터링의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 12단계. query 필터링의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step13_query_string
  title: 13단계. query 문자열 조건
  structuredPrimary: true
  subtitle: 따옴표 사용법
  goal: 13단계. query 문자열 조건에서 정제와 집계 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    query()에서 문자열 값을 비교할 때는 따옴표 중첩에 주의해야 합니다. query 전체를 작은따옴표로 감싸고, 비교할 문자열 값은 큰따옴표로 감싸는 것이 일반적입니다. 즉, query('species == "Gentoo"') 형태입니다. 반대로 바깥을 큰따옴표, 안을 작은따옴표로 해도 되지만, 파이썬에서는 바깥 작은따옴표가 관례입니다. 이렇게 하면 문자열 비교 조건을 명확하게 작성할 수 있습니다.

    query() 안에서 여러 조건을 연결할 때: query('species == "Gentoo" and body_mass_g > 5000')처럼 and로 연결하거나, query('sex == "MALE" or sex == "FEMALE"')처럼 or를 사용할 수 있습니다. &, |도 가능하지만 and, or가 더 읽기 쉽습니다.
  tips:
  - 'query() 안에서 여러 조건을 연결할 때: query(''species == "Gentoo" and body_mass_g > 5000'')처럼 and로 연결하거나, query(''sex
    == "MALE" or sex == "FEMALE"'')처럼 or를 사용할 수 있습니다. &, |도 가능하지만 and, or가 더 읽기 쉽습니다.'
  snippet: penguins.query('species == "Gentoo"')
  exercise:
    prompt: 13단계. query 문자열 조건 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: penguins.query('species == "Gentoo"')
    hints:
    - 바꿀 지점은 DataFrame 입력을 만드는 첫 줄과 정제와 집계 줄에서 찾으세요.
