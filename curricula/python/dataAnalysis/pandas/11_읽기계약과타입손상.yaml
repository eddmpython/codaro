meta:
  id: pandas_11
  title: 읽기 계약과 타입 손상
  order: 11
  category: pandas
  difficulty: ⭐⭐
  badge: 심화
  packages:
    - pandas
  tags:
    - read_csv
    - dtype
    - 식별자
    - 데이터품질
