  snippet: |-
    import pandas as pd

    mpg = pd.DataFrame({
        "name": ["a", "b", "c", "d"],
        "mpg": [30, 22, 35, 18],
        "cylinders": [4, 6, 4, 8],
        "origin": ["japan", "usa", "japan", "usa"],
    })

    top = mpg.nlargest(2, "mpg")
    pivot = mpg.pivot_table(index="origin", values="mpg", aggfunc="mean")

    assert top["name"].tolist() == ["c", "a"]
    assert pivot.loc["japan", "mpg"] == 32.5
    assert pivot.loc["usa", "mpg"] == 20.0
