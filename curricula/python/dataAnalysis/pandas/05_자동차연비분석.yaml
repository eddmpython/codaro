  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    자동차 연비 분석은 정렬 결과와 그룹 평균이 맞는지 같이 봐야 합니다. 상위 차량 목록과 제조국별 피벗이 같은 원본에서 나왔는지 검증하세요.

    변주 실험
    제조국별 평균 대신 중앙값을 쓰면 순위가 달라지는지 pivot_table의 aggfunc만 바꿔 비교하세요.
