    복잡한 체이닝은 가독성을 위해 줄바꿈할 수 있습니다. mpg[mpg['cylinders'] >= 6] .nlargest(5, 'mpg') .[ ['name', 'mpg']]처럼 작성하면 각 단계가 명확해집니다. 또는 괄호로 감싸면 됩니다.
