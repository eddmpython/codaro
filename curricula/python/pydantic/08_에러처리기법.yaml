- id: nested
  title: 중첩 모델 에러
  structuredPrimary: true
  subtitle: 깊은 위치 추적
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 중첩 모델에서 에러가 발생하면 loc이 경로 전체를 포함합니다. 예를 들어 ('address', 'zipCode')는 address 필드 내의 zipCode에서 에러가 발생했음을 의미합니다. 리스트의 경우 ('items', 1, 'price')처럼 인덱스도 포함됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Address(BaseModel):
        city: str = Field(min_length=2)
        zipCode: str = Field(pattern=r'^\d{5}$')

    class Person(BaseModel):
        name: str
        address: Address

    try:
        badPerson = Person(name="Alice", address={"city": "S", "zipCode": "abc"})
    except ValidationError as e:
        nestedErr = e.errors()
        nestedErr
