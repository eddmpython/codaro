- id: custom
  title: 커스텀 에러 메시지
  structuredPrimary: true
  subtitle: field_validator 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: field_validator에서 ValueError를 발생시키면 커스텀 에러 메시지를 정의할 수 있습니다. 비즈니스 규칙에 맞는 친절한 한글 메시지를 제공하면 클라이언트가 문제를 쉽게 이해하고 수정할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Registration(BaseModel):
        username: str
        password: str
        age: int

        @field_validator('username')
        @classmethod
        def validateUsername(cls, v):
            if len(v) < 4:
                raise ValueError("사용자명은 4자 이상이어야 합니다")
            if not v.isalnum():
                raise ValueError("사용자명은 영문과 숫자만 허용됩니다")
            return v

        @field_validator('password')
        @classmethod
        def validatePassword(cls, v):
            if len(v) < 8:
                raise ValueError("비밀번호는 8자 이상이어야 합니다")
            if not any(c.isdigit() for c in v):
                raise ValueError("비밀번호에 숫자가 포함되어야 합니다")
            return v

    try:
        badReg = Registration(username="ab@", password="short", age=25)
    except ValidationError as e:
        customErr = e.errors()
        customErr
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
