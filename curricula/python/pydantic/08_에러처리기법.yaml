  explanation: ValidationError는 검증 실패 시 발생하는 예외입니다. errors() 메서드로 각 에러의 상세 정보를, error_count()로 에러 개수를, json()으로 JSON 형식의 에러 정보를 얻을 수 있습니다. 이 정보들을 조합하여 API 응답이나 로그를 구성합니다.
