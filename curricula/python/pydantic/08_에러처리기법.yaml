- id: nested
  title: 중첩 모델 에러
  structuredPrimary: true
  subtitle: 깊은 위치 추적
  goal: 중첩 모델 에러에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: 중첩 모델에서 에러가 발생하면 loc이 경로 전체를 포함합니다. 예를 들어 ('address', 'zipCode')는 address 필드 내의 zipCode에서
    에러가 발생했음을 의미합니다. 리스트의 경우 ('items', 1, 'price')처럼 인덱스도 포함됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Address(BaseModel):
        city: str = Field(min_length=2)
        zipCode: str = Field(pattern=r'^\d{5}$')

    class Person(BaseModel):
        name: str
        address: Address

    try:
        badPerson = Person(name="Alice", address={"city": "S", "zipCode": "abc"})
    except ValidationError as e:
        nestedErr = e.errors()
        nestedErr
  exercise:
    prompt: 중첩 모델 에러 예제에서 입력값을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Address(BaseModel):
          city: str = Field(min_length=2)
          zipCode: str = Field(pattern=r'^\d{5}$')

      class Person(BaseModel):
          name: str
          address: Address

      try:
          badPerson = Person(name="Alice", address={"city": "S", "zipCode": "abc"})
      except ValidationError as e:
          nestedErr = e.errors()
          nestedErr
    hints:
    - 중첩 모델 에러 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 중첩 모델 에러 코드가 예외 없이 끝나야 합니다.
    resultCheck: 중첩 모델 에러에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: json
  title: JSON 에러 응답
  structuredPrimary: true
  subtitle: API 응답 생성
  goal: JSON 에러 응답에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: |-
    json() 메서드는 에러 정보를 JSON 문자열로 반환합니다. 하지만 직접 API 응답 형식을 정의하면 더 유연하게 에러를 표현할 수 있습니다. 필드명을 점 표기법으로 변환하거나, 에러 메시지를 한글화하는 등의 가공이 가능합니다.

    loc은 튜플이므로 '.'.join()으로 'address.zipCode' 같은 점 표기법 경로로 변환합니다.
  tips:
  - loc은 튜플이므로 '.'.join()으로 'address.zipCode' 같은 점 표기법 경로로 변환합니다.
  snippet: |-
    errorJson = validationErr.json()
    errorJson
  exercise:
