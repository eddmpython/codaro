        name: str = Field(description="작성자 이름")

    class BlogPostRequest(BaseModel):
        model_config = {
            "json_schema_extra": {
                "examples": [{
                    "title": "Pydantic 시작하기",
                    "content": "Pydantic은 데이터 검증 라이브러리입니다...",
                    "tags": ["python", "pydantic"]
                }]
            }
