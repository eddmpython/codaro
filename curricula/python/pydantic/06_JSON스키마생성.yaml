intro:
  emoji: 📋
  goal: Pydantic 모델에서 REST API 문서화용 JSON Schema를 자동 생성합니다.
  description: API를 개발할 때 문서화는 필수입니다. 하지만 코드와 문서를 따로 관리하면 불일치가 생깁니다. Pydantic은 모델 정의에서 자동으로 JSON Schema를 생성하여 코드와 문서가 항상 동기화됩니다. FastAPI는 이 기능을 활용해 Swagger UI를 자동 생성합니다.
sections:
- id: load
  title: 라이브러리 로드
  structuredPrimary: true
  subtitle: Pydantic 설치 및 import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: JSON Schema는 JSON 데이터의 구조를 정의하는 표준입니다. Pydantic의 model_json_schema() 메서드는 모델 정의를 분석하여 자동으로 JSON Schema를 생성합니다. 이 스키마는 API 문서화, 폼 자동 생성, 클라이언트 코드 생성 등에 활용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import pydantic
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: import pydantic
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: basic
  title: 기본 스키마 생성
  structuredPrimary: true
  subtitle: model_json_schema
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    model_json_schema() 클래스 메서드를 호출하면 JSON Schema 딕셔너리가 반환됩니다. 기본 타입(str, int, float, bool)은 해당 JSON Schema 타입으로 매핑되고, 필수 필드와 선택 필드가 자동으로 구분됩니다.

    스키마의 'properties'에 필드 정보가, 'required'에 필수 필드 목록이 포함됩니다.
  tips:
  - 스키마의 'properties'에 필드 정보가, 'required'에 필수 필드 목록이 포함됩니다.
  snippet: |-
    class User(BaseModel):
        name: str
        age: int
        email: str

    userSchema = User.model_json_schema()
    userSchema
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class User(BaseModel):
          name: str
          age: int
          email: str

      userSchema = User.model_json_schema()
      userSchema
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: description
  title: 필드 설명 추가
  structuredPrimary: true
  subtitle: Field description
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Field의 description 파라미터로 필드에 설명을 추가하면 JSON Schema에 포함됩니다. API 문서를 보는 개발자가 각 필드의 의미와 용도를 이해할 수 있습니다. 제약조건(gt, le, min_length 등)도 스키마에 반영됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Product(BaseModel):
        productId: str = Field(description="고유 상품 식별자")
        name: str = Field(description="상품명", min_length=1, max_length=100)
        price: float = Field(description="상품 가격 (원)", gt=0)
        stock: int = Field(default=0, description="재고 수량", ge=0)

    productSchema = Product.model_json_schema()
    json.dumps(productSchema, indent=2, ensure_ascii=False)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Product(BaseModel):
          productId: str = Field(description="고유 상품 식별자")
          name: str = Field(description="상품명", min_length=1, max_length=100)
          price: float = Field(description="상품 가격 (원)", gt=0)
          stock: int = Field(default=0, description="재고 수량", ge=0)

      productSchema = Product.model_json_schema()
      json.dumps(productSchema, indent=2, ensure_ascii=False)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: examples
  title: 예시 값 추가
  structuredPrimary: true
  subtitle: examples 파라미터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Field의 examples 파라미터로 예시 값을 추가하면 API 문서에서 사용자가 필드 형식을 이해하기 쉬워집니다. json_schema_extra로 모델 전체에 예시 데이터를 추가할 수도 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Contact(BaseModel):
        name: str = Field(description="이름", examples=["홍길동", "김철수"])
        phone: str = Field(description="전화번호", examples=["010-1234-5678"])
        email: str = Field(description="이메일", examples=["user@example.com"])

    contactSchema = Contact.model_json_schema()
    contactSchema["properties"]["name"]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Contact(BaseModel):
          name: str = Field(description="이름", examples=["홍길동", "김철수"])
          phone: str = Field(description="전화번호", examples=["010-1234-5678"])
          email: str = Field(description="이메일", examples=["user@example.com"])

      contactSchema = Contact.model_json_schema()
      contactSchema["properties"]["name"]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: nested
  title: 중첩 모델 스키마
  structuredPrimary: true
  subtitle: $defs와 $ref
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 중첩된 모델은 JSON Schema의 $defs 섹션에 정의되고 $ref로 참조됩니다. 이 방식으로 복잡한 모델도 깔끔하게 표현되고, 같은 모델을 여러 곳에서 재사용할 때 중복을 피할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Author(BaseModel):
        authorId: str = Field(description="작성자 ID")
        name: str = Field(description="작성자 이름")

    class Article(BaseModel):
        title: str = Field(description="기사 제목")
        content: str = Field(description="기사 내용")
        author: Author

    articleSchema = Article.model_json_schema()
    json.dumps(articleSchema, indent=2, ensure_ascii=False)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Author(BaseModel):
          authorId: str = Field(description="작성자 ID")
          name: str = Field(description="작성자 이름")

      class Article(BaseModel):
          title: str = Field(description="기사 제목")
          content: str = Field(description="기사 내용")
          author: Author

      articleSchema = Article.model_json_schema()
      json.dumps(articleSchema, indent=2, ensure_ascii=False)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: optional
  title: Optional과 Union 스키마
  structuredPrimary: true
  subtitle: anyOf 표현
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Optional 타입은 해당 타입 또는 null을 허용하는 anyOf로 표현됩니다. Union 타입도 마찬가지로 여러 타입 중 하나를 허용하는 구조로 변환됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Profile(BaseModel):
        username: str
        bio: Optional[str] = None
        website: Optional[str] = None

    profileSchema = Profile.model_json_schema()
    profileSchema["properties"]["bio"]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Profile(BaseModel):
          username: str
          bio: Optional[str] = None
          website: Optional[str] = None

      profileSchema = Profile.model_json_schema()
      profileSchema["properties"]["bio"]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: enum
  title: Enum과 Literal 스키마
  structuredPrimary: true
  subtitle: 허용값 목록
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Enum과 Literal 타입은 허용되는 값 목록으로 스키마가 생성됩니다. API 문서에서 클라이언트 개발자가 어떤 값을 사용할 수 있는지 명확하게 알 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Status(str, Enum):
        PENDING = "pending"
        ACTIVE = "active"
        COMPLETED = "completed"

    class Task(BaseModel):
        taskId: str
        status: Status = Field(description="작업 상태")

    taskSchema = Task.model_json_schema()
    taskSchema["$defs"]["Status"]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Status(str, Enum):
          PENDING = "pending"
          ACTIVE = "active"
          COMPLETED = "completed"

      class Task(BaseModel):
          taskId: str
          status: Status = Field(description="작업 상태")

      taskSchema = Task.model_json_schema()
      taskSchema["$defs"]["Status"]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: list
  title: 리스트와 딕셔너리
  structuredPrimary: true
  subtitle: array와 object
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: list 타입은 JSON Schema의 array로, dict 타입은 object로 변환됩니다. 리스트와 딕셔너리의 요소 타입도 정확하게 스키마에 반영됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class TaggedItem(BaseModel):
        itemId: str
        tags: list[str] = Field(description="태그 목록")
        scores: list[int] = Field(default=[], description="점수 목록")

    taggedSchema = TaggedItem.model_json_schema()
    taggedSchema["properties"]["tags"]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class TaggedItem(BaseModel):
          itemId: str
          tags: list[str] = Field(description="태그 목록")
          scores: list[int] = Field(default=[], description="점수 목록")

      taggedSchema = TaggedItem.model_json_schema()
      taggedSchema["properties"]["tags"]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: mode
  title: 스키마 생성 모드
  structuredPrimary: true
  subtitle: validation vs serialization
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    model_json_schema()의 mode 파라미터로 용도에 맞는 스키마를 생성합니다. 'validation'은 입력 검증용(computed_field 미포함), 'serialization'은 출력용(computed_field 포함) 스키마입니다.

    validation 모드는 클라이언트가 보낼 데이터 형식을, serialization 모드는 서버가 응답할 데이터 형식을 정의합니다.
  tips:
  - validation 모드는 클라이언트가 보낼 데이터 형식을, serialization 모드는 서버가 응답할 데이터 형식을 정의합니다.
  snippet: |-
    class Item(BaseModel):
        name: str
        price: float

        @computed_field
        @property
        def formattedPrice(self) -> str:
            return f"₩{self.price:,.0f}"

    validationSchema = Item.model_json_schema(mode='validation')
    "formattedPrice" in validationSchema.get("properties", {})
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Item(BaseModel):
          name: str
          price: float

          @computed_field
          @property
          def formattedPrice(self) -> str:
              return f"₩{self.price:,.0f}"

      validationSchema = Item.model_json_schema(mode='validation')
      "formattedPrice" in validationSchema.get("properties", {})
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: custom
  title: 커스텀 스키마 수정
  structuredPrimary: true
  subtitle: json_schema_extra
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: json_schema_extra로 생성된 스키마에 추가 정보를 삽입할 수 있습니다. OpenAPI 확장 필드(x-), 버전 정보, 태그 등 표준 스키마에 없는 메타데이터를 추가할 때 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class CustomModel(BaseModel):
        model_config = {
            "json_schema_extra": {
                "x-api-version": "v1",
                "x-deprecated": False,
                "x-tags": ["users", "auth"]
            }
        }
        userId: str
        role: str

    customSchema = CustomModel.model_json_schema()
    customSchema.get("x-api-version"), customSchema.get("x-tags")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class CustomModel(BaseModel):
          model_config = {
              "json_schema_extra": {
                  "x-api-version": "v1",
                  "x-deprecated": False,
                  "x-tags": ["users", "auth"]
              }
          }
          userId: str
          role: str

      customSchema = CustomModel.model_json_schema()
      customSchema.get("x-api-version"), customSchema.get("x-tags")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: result
  title: REST API 스키마 시스템
  structuredPrimary: true
  subtitle: 요청/응답 스키마 완성
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 지금까지 배운 모든 기법을 종합하여 실제 REST API의 요청/응답 스키마를 생성합니다. FastAPI와 같은 프레임워크에서 이 스키마를 활용하여 자동으로 Swagger 문서를 생성합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class CreateUserRequest(BaseModel):
        model_config = {
            "json_schema_extra": {
                "examples": [{
                    "username": "alice",
                    "email": "alice@example.com",
                    "password": "secure123"
                }]
            }
        }
        username: str = Field(min_length=3, max_length=50, description="사용자명")
        email: str = Field(description="이메일 주소")
        password: str = Field(min_length=8, description="비밀번호")

    requestSchema = CreateUserRequest.model_json_schema()
    json.dumps(requestSchema, indent=2, ensure_ascii=False)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class CreateUserRequest(BaseModel):
          model_config = {
              "json_schema_extra": {
                  "examples": [{
                      "username": "alice",
                      "email": "alice@example.com",
                      "password": "secure123"
                  }]
              }
          }
