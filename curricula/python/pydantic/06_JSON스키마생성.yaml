  seo:
    title: Pydantic JSON Schema - API 문서화와 OpenAPI
    description: Pydantic 모델에서 JSON Schema를 생성합니다. OpenAPI 문서화, 스키마 커스터마이즈를 배웁니다.
    keywords:
    - pydantic
