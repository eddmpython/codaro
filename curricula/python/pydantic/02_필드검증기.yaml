    resultCheck: 출력 또는 assert 확인
- id: fieldvalidator
  title: 커스텀 필드 검증기
  structuredPrimary: true
  subtitle: field_validator 데코레이터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    field_validator 데코레이터로 커스텀 검증 로직을 구현합니다. 값을 정규화(소문자 변환, 공백 제거 등)하거나, 비즈니스 규칙에 맞지 않으면 ValueError를 발생시켜 검증을 실패시킬 수 있습니다. 하나의 검증기를 여러 필드에 적용하는 것도 가능합니다.

    field_validator는 반드시 @classmethod와 함께 사용해야 합니다. 첫 번째 인자는 cls, 두 번째가 검증할 값 v입니다.
  tips:
  - field_validator는 반드시 @classmethod와 함께 사용해야 합니다. 첫 번째 인자는 cls, 두 번째가 검증할 값 v입니다.
  snippet: |-
    class Person(BaseModel):
        name: str
        email: str

        @field_validator('name')
        @classmethod
        def normalizeName(cls, v):
            return v.strip().title()

        @field_validator('email')
        @classmethod
        def lowercaseEmail(cls, v):
            return v.lower()

    person = Person(name="  alice smith  ", email="ALICE@EXAMPLE.COM")
    person.name, person.email
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Person(BaseModel):
          name: str
          email: str

          @field_validator('name')
          @classmethod
          def normalizeName(cls, v):
              return v.strip().title()

          @field_validator('email')
          @classmethod
          def lowercaseEmail(cls, v):
              return v.lower()

      person = Person(name="  alice smith  ", email="ALICE@EXAMPLE.COM")
      person.name, person.email
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: modelvalidator
  title: 모델 검증기
  structuredPrimary: true
  subtitle: model_validator 데코레이터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: model_validator는 여러 필드를 동시에 검증합니다. 비밀번호와 비밀번호 확인이 일치하는지, 시작일이 종료일보다 앞서는지 등 필드 간 관계를 검사할 때 사용합니다. mode='after'는 개별 필드 검증이 완료된 후 실행됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Registration(BaseModel):
        email: str
        password: str = Field(min_length=8)
        confirmPassword: str

        @model_validator(mode='after')
        def checkPasswords(self):
            if self.password != self.confirmPassword:
                raise ValueError("비밀번호가 일치하지 않습니다")
            return self

    reg = Registration(email="test@test.com", password="secure123", confirmPassword="secure123")
    reg
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Registration(BaseModel):
          email: str
          password: str = Field(min_length=8)
          confirmPassword: str

          @model_validator(mode='after')
          def checkPasswords(self):
              if self.password != self.confirmPassword:
                  raise ValueError("비밀번호가 일치하지 않습니다")
              return self

      reg = Registration(email="test@test.com", password="secure123", confirmPassword="secure123")
      reg
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: computed
  title: 계산된 필드
  structuredPrimary: true
  subtitle: computed_field 데코레이터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: computed_field는 다른 필드 값을 기반으로 계산되는 읽기 전용 필드입니다. 예를 들어 firstName과 lastName에서 fullName을 자동 생성하거나, 가격과 수량에서 총액을 계산할 수 있습니다. 이 필드는 직렬화 시 자동으로 포함됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import computed_field

    class FullName(BaseModel):
        firstName: str
        lastName: str

        @computed_field
        @property
        def fullName(self) -> str:
            return f"{self.firstName} {self.lastName}"

    nameObj = FullName(firstName="John", lastName="Doe")
    nameObj.fullName
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from pydantic import computed_field

      class FullName(BaseModel):
          firstName: str
          lastName: str

          @computed_field
          @property
          def fullName(self) -> str:
              return f"{self.firstName} {self.lastName}"

      nameObj = FullName(firstName="John", lastName="Doe")
      nameObj.fullName
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: result
  title: 종합 회원가입 시스템
  structuredPrimary: true
  subtitle: 모든 검증 기법 통합
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 지금까지 배운 모든 검증 기법을 종합하여 실제 서비스에서 사용할 수 있는 회원가입 폼 검증 시스템을 완성합니다. 숫자 범위, 문자열 패턴, 커스텀 검증, 필드 간 관계 검사, 계산 필드까지 모두 활용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class SignupForm(BaseModel):
        username: str = Field(min_length=4, max_length=20, description="영문 숫자만")
        email: str = Field(pattern=r'^[\w.-]+@[\w.-]+\.\w+$')
        password: str = Field(min_length=8)
        confirmPw: str
        age: int = Field(ge=14, description="14세 이상만 가입 가능")

        @field_validator('username')
        @classmethod
        def alphanumeric(cls, v):
            if not v.isalnum():
                raise ValueError("영문과 숫자만 허용")
            return v.lower()

        @model_validator(mode='after')
        def passwordMatch(self):
            if self.password != self.confirmPw:
                raise ValueError("비밀번호 불일치")
            return self

    signup = SignupForm(
        username="Alice123",
        email="alice@mail.com",
        password="secure123",
        confirmPw="secure123",
        age=25
    )
    signup
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class SignupForm(BaseModel):
          username: str = Field(min_length=4, max_length=20, description="영문 숫자만")
          email: str = Field(pattern=r'^[\w.-]+@[\w.-]+\.\w+$')
          password: str = Field(min_length=8)
          confirmPw: str
          age: int = Field(ge=14, description="14세 이상만 가입 가능")

          @field_validator('username')
          @classmethod
          def alphanumeric(cls, v):
              if not v.isalnum():
                  raise ValueError("영문과 숫자만 허용")
              return v.lower()

          @model_validator(mode='after')
          def passwordMatch(self):
              if self.password != self.confirmPw:
                  raise ValueError("비밀번호 불일치")
              return self

      signup = SignupForm(
          username="Alice123",
          email="alice@mail.com",
          password="secure123",
          confirmPw="secure123",
          age=25
      )
      signup
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 검증 시스템 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    지금까지 배운 Field 제약조건, field_validator, model_validator, computed_field를 활용하여 다양한 도메인의 검증 시스템을 구축합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from pydantic import BaseModel, Field, field_validator, computed_field, ValidationError
    from typing import Optional

    class ProductForm(BaseModel):
        productName: str = Field(min_length=2, max_length=100)
        basePrice: float = Field(gt=0)
        discountRate: float = Field(ge=0, le=100, default=0)
        stock: int = Field(ge=0, default=0)
        category: str

        @field_validator('category')
        @classmethod
        def validCategory(cls, v):
            allowed = ['electronics', 'clothing', 'food', 'books']
            if v.lower() not in allowed:
                raise ValueError(f"허용 카테고리: {allowed}")
            return v.lower()

        @computed_field
        @property
        def finalPrice(self) -> float:
            return self.basePrice * (1 - self.discountRate / 100)

        @computed_field
        @property
        def inStock(self) -> bool:
            return self.stock > 0

    product = ProductForm(
        productName="노트북",
        basePrice=1000000,
        discountRate=10,
        stock=50,
        category="Electronics"
    )
    product
