- id: workflow_validation
  title: '현업 흐름 검증: 주문 입력 계약과 배치 검증'
  structuredPrimary: true
  subtitle: 예측 → 검증 실패 확인 → 정제 → 결과 검증 → 실무 변주
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Pydantic은 모델을 만드는 데서 끝나지 않고, 외부 입력을 업무 계약으로 바꾸고 실패 이유를 구조화하는 데서 가치가 큽니다. 여기서는 주문 입력을 검증하고, 잘못된 행을 분리한 뒤, 정상 데이터만 다음 단계로 넘기는 흐름을 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from typing import Literal
    from pydantic import BaseModel, Field, ValidationError, computed_field, field_validator

    class OrderInput(BaseModel):
        orderId: str
        customer: str
        amount: int = Field(gt=0)
        status: Literal['paid', 'pending', 'cancelled']

        @field_validator('orderId', 'customer')
        @classmethod
        def stripRequiredText(cls, value):
            cleaned = value.strip()
            if not cleaned:
                raise ValueError('text field must not be empty')
            return cleaned

        @computed_field
        @property
        def isRevenue(self) -> bool:
            return self.status == 'paid'

    validOrder = OrderInput.model_validate({
        'orderId': ' A-100 ',
        'customer': ' kim ',
        'amount': '120000',
        'status': 'paid',
    })

    assert validOrder.orderId == 'A-100'
    assert validOrder.amount == 120000
    assert validOrder.isRevenue is True
    validOrder.model_dump()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
