- id: alias
  title: 필드 별칭
  structuredPrimary: true
  subtitle: alias와 validation_alias
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 외부 API나 데이터베이스에서 snake_case를 사용하고 Python 코드에서는 camelCase를 사용하고 싶을 때 alias가 유용합니다. alias로 외부 이름을 지정하면 입력 시 alias로, Python 코드에서는 원래 필드명으로 접근할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class ApiResponse(BaseModel):
        userId: int = Field(alias="user_id")
        userName: str = Field(alias="user_name")
        createdAt: str = Field(alias="created_at")

    responseData = {"user_id": 1, "user_name": "Alice", "created_at": "2024-01-01"}
    apiResp = ApiResponse.model_validate(responseData)
    apiResp
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class ApiResponse(BaseModel):
          userId: int = Field(alias="user_id")
          userName: str = Field(alias="user_name")
          createdAt: str = Field(alias="created_at")

      responseData = {"user_id": 1, "user_name": "Alice", "created_at": "2024-01-01"}
      apiResp = ApiResponse.model_validate(responseData)
      apiResp
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
