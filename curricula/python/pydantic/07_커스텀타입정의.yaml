          max_length=50,
          pattern=r'^[a-z0-9]+(?:-[a-z0-9]+)*$',
          to_lower=True,
          strip_whitespace=True
      )]

      class Article(BaseModel):
          slug: SlugType

      article = Article(slug="  my-first-post  ")
      article.slug
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
