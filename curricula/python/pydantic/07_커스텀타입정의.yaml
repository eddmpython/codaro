intro:
  emoji: 🎨
  goal: 도메인 특화 커스텀 타입으로 한국형 비즈니스 데이터 검증 라이브러리를 구축합니다.
  description: 같은 검증 로직을 여러 모델에서 반복하면 유지보수가 어려워집니다. Annotated와 검증기를 조합하여 재사용 가능한 커스텀 타입을 정의하면, 전화번호, 사업자번호, 우편번호 등 도메인 특화 타입을 만들어 프로젝트 전체에서 일관되게 사용할 수 있습니다.
sections:
- id: load
  title: 라이브러리 로드
  structuredPrimary: true
  subtitle: Pydantic 설치 및 import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Annotated는 Python 타입 힌트에 메타데이터를 추가하는 표준 방법입니다. Pydantic은 Annotated에 Field나 검증기를 넣어 타입 자체에 검증 규칙을 포함시킵니다. 이렇게 만든 타입 별칭은 어떤 모델에서든 재사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import pydantic
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: import pydantic
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: annotated
  title: Annotated 기초
  structuredPrimary: true
  subtitle: 타입에 메타데이터 추가
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Annotated[타입, 메타데이터]로 기존 타입에 검증 규칙을 추가합니다. Field의 제약조건(gt, min_length 등)을 타입 자체에 포함시키면 모든 필드에서 동일한 규칙을 적용할 수 있습니다.

    PositiveInt를 사용하는 모든 필드에 gt=0 제약이 자동 적용됩니다. 규칙 변경 시 타입 정의만 수정하면 됩니다.
  tips:
  - PositiveInt를 사용하는 모든 필드에 gt=0 제약이 자동 적용됩니다. 규칙 변경 시 타입 정의만 수정하면 됩니다.
  snippet: |-
    PositiveInt = Annotated[int, Field(gt=0)]
    ShortString = Annotated[str, Field(max_length=50)]

    class Product(BaseModel):
        productId: PositiveInt
        name: ShortString
        price: PositiveInt

    product = Product(productId=1, name="Laptop", price=999)
    product
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      PositiveInt = Annotated[int, Field(gt=0)]
      ShortString = Annotated[str, Field(max_length=50)]

      class Product(BaseModel):
          productId: PositiveInt
          name: ShortString
          price: PositiveInt

      product = Product(productId=1, name="Laptop", price=999)
      product
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: aftervalidator
  title: AfterValidator
  structuredPrimary: true
  subtitle: 값 변환과 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: AfterValidator는 타입 변환 후 추가 검증이나 정규화를 수행합니다. 이메일 소문자 변환, 전화번호 형식 통일, 공백 제거 등에 활용합니다. 함수에서 ValueError를 발생시키면 검증 실패로 처리됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def normalizeEmail(v: str) -> str:
        return v.lower().strip()

    NormalizedEmail = Annotated[str, AfterValidator(normalizeEmail)]

    class User(BaseModel):
        email: NormalizedEmail

    user = User(email="  ALICE@EXAMPLE.COM  ")
    user.email
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def normalizeEmail(v: str) -> str:
          return v.lower().strip()

      NormalizedEmail = Annotated[str, AfterValidator(normalizeEmail)]

      class User(BaseModel):
          email: NormalizedEmail

      user = User(email="  ALICE@EXAMPLE.COM  ")
      user.email
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: beforevalidator
  title: BeforeValidator
  structuredPrimary: true
  subtitle: 사전 변환
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: BeforeValidator는 타입 변환 전에 실행됩니다. 다양한 형식의 입력을 통일하거나, 특수한 값을 처리할 때 유용합니다. 날짜 문자열을 여러 형식으로 받거나, yes/no를 bool로 변환하는 등에 활용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def parseBoolean(v):
        if isinstance(v, bool):
            return v
        if isinstance(v, str):
            if v.lower() in ('true', 'yes', '1', 'on', 'y'):
                return True
            if v.lower() in ('false', 'no', '0', 'off', 'n'):
                return False
        raise ValueError(f"불리언으로 변환 불가: {v}")

    FlexBool = Annotated[bool, BeforeValidator(parseBoolean)]

    class Settings(BaseModel):
        debug: FlexBool
        cache: FlexBool

    settings = Settings(debug="yes", cache="off")
    settings.debug, settings.cache
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def parseBoolean(v):
          if isinstance(v, bool):
              return v
          if isinstance(v, str):
              if v.lower() in ('true', 'yes', '1', 'on', 'y'):
                  return True
              if v.lower() in ('false', 'no', '0', 'off', 'n'):
                  return False
          raise ValueError(f"불리언으로 변환 불가: {v}")

      FlexBool = Annotated[bool, BeforeValidator(parseBoolean)]

      class Settings(BaseModel):
          debug: FlexBool
          cache: FlexBool

      settings = Settings(debug="yes", cache="off")
      settings.debug, settings.cache
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: combined
  title: 검증기 조합
  structuredPrimary: true
  subtitle: 다중 검증기 체인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 여러 검증기를 조합하여 복잡한 변환 파이프라인을 구성할 수 있습니다. BeforeValidator로 전처리하고, AfterValidator로 후처리하는 식으로 단계별 검증을 구현합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def stripWhitespace(v: str) -> str:
        return v.strip()

    def validateNotEmpty(v: str) -> str:
        if not v:
            raise ValueError("빈 문자열 불허")
        return v

    def capitalizeFirst(v: str) -> str:
        return v.capitalize()

    CleanName = Annotated[
        str,
        BeforeValidator(stripWhitespace),
        AfterValidator(validateNotEmpty),
        AfterValidator(capitalizeFirst)
    ]

    class Person(BaseModel):
        name: CleanName

    person = Person(name="  alice  ")
    person.name
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def stripWhitespace(v: str) -> str:
