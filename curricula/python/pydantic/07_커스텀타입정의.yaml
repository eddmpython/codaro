- id: string
  title: 문자열 제약
  structuredPrimary: true
  subtitle: StringConstraints
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: StringConstraints는 문자열에 대한 상세한 제약을 정의합니다. 길이, 패턴 외에도 자동 소문자 변환(to_lower), 공백 제거(strip_whitespace) 등의 변환도 포함할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import StringConstraints

    SlugType = Annotated[str, StringConstraints(
        min_length=3,
        max_length=50,
        pattern=r'^[a-z0-9]+(?:-[a-z0-9]+)*$',
        to_lower=True,
        strip_whitespace=True
    )]

    class Article(BaseModel):
        slug: SlugType

    article = Article(slug="  my-first-post  ")
    article.slug
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from pydantic import StringConstraints

