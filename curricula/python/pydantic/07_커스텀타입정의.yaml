- id: annotated
  title: Annotated 기초
  structuredPrimary: true
  subtitle: 타입에 메타데이터 추가
  goal: 'Annotated 기초: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Annotated 기초: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Annotated[타입, 메타데이터]로 기존 타입에 검증 규칙을 추가합니다. Field의 제약조건(gt, min_length 등)을 타입 자체에 포함시키면 모든 필드에서 동일한 규칙을 적용할 수 있습니다.

    PositiveInt를 사용하는 모든 필드에 gt=0 제약이 자동 적용됩니다. 규칙 변경 시 타입 정의만 수정하면 됩니다.
  tips:
  - PositiveInt를 사용하는 모든 필드에 gt=0 제약이 자동 적용됩니다. 규칙 변경 시 타입 정의만 수정하면 됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    PositiveInt = Annotated[int, Field(gt=0)]
    ShortString = Annotated[str, Field(max_length=50)]

    class Product(BaseModel):
        productId: PositiveInt
        name: ShortString
        price: PositiveInt

    product = Product(productId=1, name="Laptop", price=999)
    product
  exercise:
    prompt: 'Annotated 기초: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      PositiveInt = Annotated[int, Field(gt=0)]
      ShortString = Annotated[str, Field(max_length=50)]

      class Product(BaseModel):
          productId: PositiveInt
          name: ShortString
          price: PositiveInt

      product = Product(productId=1, name="Laptop", price=999)
      product
    solution: |-
      PositiveInt = Annotated[int, Field(gt=0)]
      ShortString = Annotated[str, Field(max_length=50)]

      class Product(BaseModel):
          productId: PositiveInt
          name: ShortString
          price: PositiveInt

      product = Product(productId=1, name="Laptop", price=999)
      product
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Annotated[타입, 메타데이터]로 기존 타입에 검증 규칙을 추가합니다. Field의 제약조건(gt, min_length 등)을 타입 자체에 포함시키면 모든 필드에서 동일한 규칙을 적용할 수
      있습니다.
  - type: code
    language: python
    title: 기본 제약 타입
    description: 양수, 짧은 문자열
    content: |-
      PositiveInt = Annotated[int, Field(gt=0)]
      ShortString = Annotated[str, Field(max_length=50)]

      class Product(BaseModel):
          productId: PositiveInt
          name: ShortString
          price: PositiveInt

      product = Product(productId=1, name="Laptop", price=999)
      product
  - type: tip
    content: PositiveInt를 사용하는 모든 필드에 gt=0 제약이 자동 적용됩니다. 규칙 변경 시 타입 정의만 수정하면 됩니다.
  - type: code
    language: python
    title: 제약조건 테스트
    description: 음수 값 거부
    content: |-
      try:
          badProduct = Product(productId=-1, name="Test", price=100)
      except ValidationError as e:
          annotatedErr = e.errors()
          annotatedErr
- id: aftervalidator
  title: AfterValidator
  structuredPrimary: true
  subtitle: 값 변환과 검증
  goal: 'AfterValidator: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'AfterValidator: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: AfterValidator는 타입 변환 후 추가 검증이나 정규화를 수행합니다. 이메일 소문자 변환, 전화번호 형식 통일, 공백 제거 등에 활용합니다. 함수에서 ValueError를 발생시키면
    검증 실패로 처리됩니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def normalizeEmail(v: str) -> str:
        return v.lower().strip()

    NormalizedEmail = Annotated[str, AfterValidator(normalizeEmail)]

    class User(BaseModel):
        email: NormalizedEmail

    user = User(email="  ALICE@EXAMPLE.COM  ")
    user.email
  exercise:
    prompt: 'AfterValidator: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
