    - type: code
      title: 주소 관련 타입
      content: |-
        from typing import Annotated
        from pydantic import BaseModel, Field, AfterValidator
        import re

        def validateKorPostal(v: str) -> str:
            cleaned = re.sub(r'[^0-9]', '', v)
            if len(cleaned) != 5:
                raise ValueError("우편번호는 5자리입니다")
            return cleaned

        def normalizeAddr(v: str) -> str:
            return re.sub(r'\s+', ' ', v.strip())

        KorPostalCode = Annotated[str, AfterValidator(validateKorPostal)]
        AddressLine = Annotated[str, AfterValidator(normalizeAddr), Field(min_length=5, max_length=200)]
        CityName = Annotated[str, Field(min_length=2, max_length=50)]

        class KoreanAddress(BaseModel):
            postalCode: KorPostalCode
            city: CityName
            district: str = Field(min_length=2)
            streetAddress: AddressLine
            detailAddress: AddressLine | None = None

            def formatFull(self) -> str:
                parts = [f"({self.postalCode})", self.city, self.district, self.streetAddress]
                if self.detailAddress:
                    parts.append(self.detailAddress)
                return " ".join(parts)

        address = KoreanAddress(
            postalCode="06234",
            city="서울특별시",
            district="강남구",
            streetAddress="테헤란로   123",
            detailAddress="  5층  501호  "
        )
        address
