- id: constrained
  title: 제약 타입
  structuredPrimary: true
  subtitle: constr, conint, confloat
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Pydantic은 자주 사용되는 제약 타입을 제공합니다. constr은 문자열 길이와 패턴을, conint와 confloat는 숫자 범위를 제한합니다. 간단한 제약에는 이들을 사용하고, 복잡한 로직은 AfterValidator를 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import constr, conint, confloat

    Username = constr(min_length=3, max_length=20, pattern=r'^[a-zA-Z0-9_]+$')
    Age = conint(ge=0, le=150)
    Price = confloat(gt=0, le=100000000)

    class Account(BaseModel):
        username: Username
        age: Age
        balance: Price

    account = Account(username="alice_123", age=25, balance=10000.50)
    account
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
