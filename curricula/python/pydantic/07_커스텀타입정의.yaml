      def validatePhone(v: str) -> str:
          cleaned = re.sub(r'[^0-9]', '', v)
          if len(cleaned) != 11 or not cleaned.startswith('010'):
              raise ValueError("유효한 휴대폰 번호가 아닙니다")
          return f"{cleaned[:3]}-{cleaned[3:7]}-{cleaned[7:]}"

      PhoneNumber = Annotated[str, AfterValidator(validatePhone)]

      class Contact(BaseModel):
          phone: PhoneNumber

      contact = Contact(phone="010 1234 5678")
      contact.phone
- id: beforevalidator
  title: BeforeValidator
  structuredPrimary: true
  subtitle: 사전 변환
  goal: 'BeforeValidator: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'BeforeValidator: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: BeforeValidator는 타입 변환 전에 실행됩니다. 다양한 형식의 입력을 통일하거나, 특수한 값을 처리할 때 유용합니다. 날짜 문자열을 여러 형식으로 받거나, yes/no를 bool로
    변환하는 등에 활용합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def parseBoolean(v):
        if isinstance(v, bool):
            return v
        if isinstance(v, str):
            if v.lower() in ('true', 'yes', '1', 'on', 'y'):
                return True
            if v.lower() in ('false', 'no', '0', 'off', 'n'):
                return False
        raise ValueError(f"불리언으로 변환 불가: {v}")

    FlexBool = Annotated[bool, BeforeValidator(parseBoolean)]

    class Settings(BaseModel):
        debug: FlexBool
        cache: FlexBool

    settings = Settings(debug="yes", cache="off")
    settings.debug, settings.cache
  exercise:
    prompt: 'BeforeValidator: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
