      settings.debug, settings.cache
  - type: code
    language: python
    title: 유연한 날짜
    description: 여러 형식 지원
    content: |-
      from datetime import date, datetime

      def parseDate(v):
          if isinstance(v, date):
              return v
          if isinstance(v, str):
              for fmt in ("%Y-%m-%d", "%Y/%m/%d", "%d.%m.%Y", "%Y년%m월%d일"):
                  try:
                      return datetime.strptime(v, fmt).date()
                  except ValueError:
                      continue
          raise ValueError(f"날짜 형식 인식 불가: {v}")

      FlexDate = Annotated[date, BeforeValidator(parseDate)]

      class Event(BaseModel):
          eventDate: FlexDate

      event = Event(eventDate="2024년03월15일")
      event.eventDate
- id: combined
  title: 검증기 조합
  structuredPrimary: true
  subtitle: 다중 검증기 체인
  goal: '검증기 조합: 실행 가능한 Python 흐름으로 익힌다.'
  why: '검증기 조합: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 여러 검증기를 조합하여 복잡한 변환 파이프라인을 구성할 수 있습니다. BeforeValidator로 전처리하고, AfterValidator로 후처리하는 식으로 단계별 검증을 구현합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def stripWhitespace(v: str) -> str:
        return v.strip()

    def validateNotEmpty(v: str) -> str:
        if not v:
            raise ValueError("빈 문자열 불허")
        return v

    def capitalizeFirst(v: str) -> str:
        return v.capitalize()

    CleanName = Annotated[
        str,
        BeforeValidator(stripWhitespace),
        AfterValidator(validateNotEmpty),
        AfterValidator(capitalizeFirst)
    ]

    class Person(BaseModel):
        name: CleanName

    person = Person(name="  alice  ")
    person.name
  exercise:
    prompt: '검증기 조합: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      def stripWhitespace(v: str) -> str:
          return v.strip()

      def validateNotEmpty(v: str) -> str:
          if not v:
              raise ValueError("빈 문자열 불허")
          return v

      def capitalizeFirst(v: str) -> str:
          return v.capitalize()

      CleanName = Annotated[
          str,
          BeforeValidator(stripWhitespace),
          AfterValidator(validateNotEmpty),
          AfterValidator(capitalizeFirst)
      ]

      class Person(BaseModel):
          name: CleanName

      person = Person(name="  alice  ")
      person.name
    solution: |-
      def stripWhitespace(v: str) -> str:
          return v.strip()

      def validateNotEmpty(v: str) -> str:
          if not v:
              raise ValueError("빈 문자열 불허")
          return v

