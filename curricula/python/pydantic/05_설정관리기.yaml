- id: prefix
  title: 환경변수 접두사
  structuredPrimary: true
  subtitle: env_prefix 설정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 여러 서비스가 같은 환경에서 실행될 때 환경변수 이름 충돌을 방지하려면 접두사를 사용합니다. model_config의 env_prefix로 모든 환경변수에 공통 접두사를 적용합니다. DB_HOST, DB_PORT처럼 의미있는 네이밍이 가능해집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class DbSettings(BaseSettings):
        model_config = {"env_prefix": "DB_"}

        host: str = "localhost"
        port: int = 5432
        name: str = "mydb"
        user: str = "admin"

    os.environ["DB_HOST"] = "production-db.example.com"
    os.environ["DB_PORT"] = "5433"
    os.environ["DB_NAME"] = "production_db"

    dbSettings = DbSettings()
    dbSettings
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class DbSettings(BaseSettings):
