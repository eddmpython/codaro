  explanation: 리스트나 딕셔너리 같은 복잡한 값도 JSON 문자열로 환경변수에 넣을 수 있습니다. BaseSettings가 자동으로 파싱하여 Python 객체로 변환합니다. CORS 허용 도메인 목록, 기능 플래그 등에 유용합니다.
