intro:
  emoji: ⚙️
  goal: pydantic-settings로 마이크로서비스 설정 시스템을 구축합니다.
  description: 실제 서비스에서 설정은 환경(개발/스테이징/운영)에 따라 달라집니다. 데이터베이스 주소, API 키, 포트 번호 등을 코드에 하드코딩하면 배포할 때마다 수정해야
    합니다. pydantic-settings는 환경변수에서 설정을 읽고, 타입 검증까지 해주어 안전하고 유연한 설정 관리를 가능하게 합니다.
  direction: 설정관리기에서 입력 스키마를 정의하고 검증된 데이터만 처리 흐름에 넘김합니다.
  benefits:
  - 외부 입력 확인 후 스키마 검증에 맞는 코드 입력을 고릅니다.
  - 설정관리기 결과를 성공 모델과 오류 메시지 기준으로 즉시 점검합니다.
  - 완료한 코드를 API/자동화 입력 계약에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 라이브러리 로드 입력 확인
      detail: 입력 기준(외부 입력)과 필요한 조건을 먼저 고정합니다.
    - label: 기본 설정 클래스 처리 실행
      detail: 스키마 검증 코드를 실행해 중간 결과를 확인합니다.
    - label: 환경변수 연동 결과 검증
      detail: 성공 모델과 오류 메시지 기준으로 실행 결과를 비교합니다.
    - label: 설정관리기 재사용
      detail: 완성 코드를 API/자동화 입력 계약에 붙일 수 있게 정리합니다.
    runtime:
    - label: 데이터 계약 환경
      detail: pydantic, pydanticsettings 기준으로 로컬 Python 실행을 준비합니다.
    - label: 설정관리기 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 설정관리기 완료
      detail: 검증된 코드를 API/자동화 입력 계약로 남깁니다.
sections:
- id: load
  title: 라이브러리 로드
  structuredPrimary: true
  subtitle: pydantic-settings 설치
  goal: 라이브러리 로드에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: pydantic-settings는 Pydantic V2에서 별도 패키지로 분리되었습니다. BaseSettings를 상속하면 환경변수에서 자동으로 값을 읽어오고,
    타입 힌트에 맞게 변환합니다. 환경변수 → .env 파일 → 기본값 순서로 값을 찾아 유연하게 설정을 관리할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pydantic
    import pydantic_settings
  exercise:
    prompt: 라이브러리 로드 예제에서 입력값을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import pydantic
      import pydantic_settings
    hints:
    - 라이브러리 로드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 라이브러리 로드 코드가 예외 없이 끝나야 합니다.
    resultCheck: 라이브러리 로드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: basic
  title: 기본 설정 클래스
  structuredPrimary: true
  subtitle: BaseSettings 상속
  goal: 기본 설정 클래스에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: |-
    BaseSettings를 상속한 클래스는 필드명과 같은 이름의 환경변수에서 자동으로 값을 읽습니다. 필드에 기본값을 지정하면 환경변수가 없을 때 사용됩니다. 타입 힌트에 따라 문자열 환경변수가 자동으로 int, bool 등으로 변환됩니다.

    BaseSettings는 대소문자를 구분하지 않습니다. appName 필드는 APPNAME, AppName, appname 등 어떤 형태의 환경변수도 읽습니다.
  tips:
  - BaseSettings는 대소문자를 구분하지 않습니다. appName 필드는 APPNAME, AppName, appname 등 어떤 형태의 환경변수도 읽습니다.
  snippet: |-
    class AppSettings(BaseSettings):
        appName: str = "MyApp"
        debug: bool = False
        port: int = 8000

    settings = AppSettings()
    settings
  exercise:
    prompt: 기본 설정 클래스 예제에서 입력값을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class AppSettings(BaseSettings):
          appName: str = "MyApp"
          debug: bool = False
          port: int = 8000

      settings = AppSettings()
      settings
    hints:
    - 기본 설정 클래스 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 기본 설정 클래스 코드가 예외 없이 끝나야 합니다.
    resultCheck: 기본 설정 클래스에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: environ
  title: 환경변수 연동
  structuredPrimary: true
  subtitle: os.environ 시뮬레이션
  goal: 환경변수 연동에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: 실제 서버에서는 환경변수로 설정을 주입합니다. os.environ으로 환경변수를 설정하면 BaseSettings가 자동으로 읽어옵니다. 이 패턴으로 Docker,
    Kubernetes 등에서 설정을 주입할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    os.environ["APPNAME"] = "ProductionApp"
    os.environ["DEBUG"] = "true"
    os.environ["PORT"] = "9000"

    prodSettings = AppSettings()
    prodSettings
  exercise:
    prompt: 환경변수 연동 예제에서 리스트 값을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      os.environ["APPNAME"] = "ProductionApp"
      os.environ["DEBUG"] = "true"
      os.environ["PORT"] = "9000"

      prodSettings = AppSettings()
      prodSettings
    hints:
    - 환경변수 연동 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 환경변수 연동 코드가 예외 없이 끝나야 합니다.
    resultCheck: 환경변수 연동에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: prefix
  title: 환경변수 접두사
  structuredPrimary: true
  subtitle: env_prefix 설정
  goal: 환경변수 접두사에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: 여러 서비스가 같은 환경에서 실행될 때 환경변수 이름 충돌을 방지하려면 접두사를 사용합니다. model_config의 env_prefix로 모든 환경변수에
    공통 접두사를 적용합니다. DB_HOST, DB_PORT처럼 의미있는 네이밍이 가능해집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class DbSettings(BaseSettings):
        model_config = {"env_prefix": "DB_"}

        host: str = "localhost"
        port: int = 5432
        name: str = "mydb"
        user: str = "admin"

    os.environ["DB_HOST"] = "production-db.example.com"
    os.environ["DB_PORT"] = "5433"
    os.environ["DB_NAME"] = "production_db"

    dbSettings = DbSettings()
    dbSettings
  exercise:
    prompt: 환경변수 접두사 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class DbSettings(BaseSettings):
          model_config = {"env_prefix": "DB_"}

          host: str = "localhost"
          port: int = 5432
          name: str = "mydb"
          user: str = "admin"

      os.environ["DB_HOST"] = "production-db.example.com"
      os.environ["DB_PORT"] = "5433"
      os.environ["DB_NAME"] = "production_db"

      dbSettings = DbSettings()
      dbSettings
    hints:
    - 환경변수 접두사 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 환경변수 접두사 코드가 예외 없이 끝나야 합니다.
    resultCheck: 환경변수 접두사에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: nested
  title: 중첩 설정
  structuredPrimary: true
  subtitle: 설정 그룹화
  goal: 중첩 설정에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: 복잡한 애플리케이션은 설정을 논리적으로 그룹화해야 합니다. 데이터베이스 설정, 캐시 설정, 로깅 설정 등을 별도 모델로 분리하고 메인 설정에서 조합합니다.
    중첩된 BaseModel은 JSON 환경변수로 설정할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class DatabaseConfig(BaseModel):
        host: str = "localhost"
        port: int = 5432
        name: str = "app_db"
        poolSize: int = 5

    class CacheConfig(BaseModel):
        enabled: bool = True
        ttl: int = 3600
        maxSize: int = 1000

    class FullSettings(BaseSettings):
        appName: str = "MyApp"
        database: DatabaseConfig = DatabaseConfig()
        cache: CacheConfig = CacheConfig()

    fullSettings = FullSettings()
    fullSettings
  exercise:
    prompt: 중첩 설정 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class DatabaseConfig(BaseModel):
          host: str = "localhost"
          port: int = 5432
          name: str = "app_db"
          poolSize: int = 5

      class CacheConfig(BaseModel):
          enabled: bool = True
          ttl: int = 3600
          maxSize: int = 1000

      class FullSettings(BaseSettings):
          appName: str = "MyApp"
          database: DatabaseConfig = DatabaseConfig()
          cache: CacheConfig = CacheConfig()

      fullSettings = FullSettings()
      fullSettings
    hints:
    - 중첩 설정 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 중첩 설정 코드가 예외 없이 끝나야 합니다.
    resultCheck: 중첩 설정에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: validation
  title: 설정 검증
  structuredPrimary: true
  subtitle: Field 제약조건
  goal: 설정 검증에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: BaseSettings도 일반 Pydantic 모델처럼 Field와 validator를 사용한 검증을 지원합니다. 포트 번호 범위, 타임아웃 최소값, 워커
    수 제한 등 비즈니스 규칙을 설정 단계에서 강제할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import field_validator

    class ServerSettings(BaseSettings):
        host: str = Field(default="0.0.0.0", min_length=1)
        port: int = Field(default=8000, ge=1, le=65535)
        workers: int = Field(default=4, ge=1, le=32)
        timeout: int = Field(default=30, ge=1)

        @field_validator('host')
        @classmethod
        def validateHost(cls, v):
            if v == "":
                raise ValueError("호스트는 비어있을 수 없습니다")
            return v

    serverSettings = ServerSettings()
    serverSettings
  exercise:
    prompt: 설정 검증 예제에서 인자나 반환값을 바꿔 실행하고, 성공 모델과 오류 메시지 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from pydantic import field_validator

      class ServerSettings(BaseSettings):
          host: str = Field(default="0.0.0.0", min_length=1)
          port: int = Field(default=8000, ge=1, le=65535)
          workers: int = Field(default=4, ge=1, le=32)
          timeout: int = Field(default=30, ge=1)

          @field_validator('host')
          @classmethod
          def validateHost(cls, v):
              if v == "":
                  raise ValueError("호스트는 비어있을 수 없습니다")
              return v

      serverSettings = ServerSettings()
      serverSettings
    hints:
    - 설정 검증 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 성공 모델과 오류 메시지 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 설정 검증 코드가 예외 없이 끝나야 합니다.
    resultCheck: 설정 검증에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: secret
  title: 비밀 값 관리
  structuredPrimary: true
  subtitle: SecretStr
  goal: 비밀 값 관리에서 스키마 검증 흐름을 코드로 실행하고 결과를 확인한다.
  why: 데이터 계약은 외부 입력을 안전하게 처리하고 오류를 빠르게 드러내는 실무 기준입니다.
  explanation: |-
    비밀번호, API 키 같은 민감한 정보는 로그에 노출되면 안 됩니다. SecretStr 타입을 사용하면 출력 시 자동으로 마스킹되고, get_secret_value()로만 실제 값에 접근할 수 있습니다. 디버깅 로그에서 비밀이 노출되는 것을 방지합니다.

    SecretStr은 repr에서 '**********'로 표시됩니다. 실제 값은 .get_secret_value() 메서드로 접근합니다.
  tips:
  - SecretStr은 repr에서 '**********'로 표시됩니다. 실제 값은 .get_secret_value() 메서드로 접근합니다.
  snippet: |-
    class AuthSettings(BaseSettings):
        model_config = {"env_prefix": "AUTH_"}

        apiKey: SecretStr
        dbPassword: SecretStr
        jwtSecret: SecretStr = SecretStr("default-secret")

    os.environ["AUTH_APIKEY"] = "super-secret-api-key-12345"
    os.environ["AUTH_DBPASSWORD"] = "db-password-xyz"

    authSettings = AuthSettings()
    authSettings
  exercise:
