- id: singleton
  title: 싱글톤 패턴
  structuredPrimary: true
  subtitle: lru_cache 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    설정을 매번 새로 로드하면 성능이 낭비됩니다. functools.lru_cache를 사용하면 설정 객체를 캐싱하여 애플리케이션 전체에서 동일한 인스턴스를 재사용합니다. FastAPI 등 프레임워크에서 권장하는 패턴입니다.

    lru_cache는 동일한 인자에 대해 같은 결과를 반환합니다. 설정을 변경하려면 getSettings.cache_clear()로 캐시를 비워야 합니다.
  tips:
  - lru_cache는 동일한 인자에 대해 같은 결과를 반환합니다. 설정을 변경하려면 getSettings.cache_clear()로 캐시를 비워야 합니다.
  snippet: |-
    from functools import lru_cache

    class AppConfig(BaseSettings):
        appName: str = "MyApp"
        version: str = "1.0.0"
        debug: bool = False

    @lru_cache
    def getSettings() -> AppConfig:
        return AppConfig()

    config1 = getSettings()
    config2 = getSettings()
    config1 is config2
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from functools import lru_cache

      class AppConfig(BaseSettings):
          appName: str = "MyApp"
          version: str = "1.0.0"
          debug: bool = False

      @lru_cache
      def getSettings() -> AppConfig:
          return AppConfig()

      config1 = getSettings()
      config2 = getSettings()
      config1 is config2
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: result
  title: 마이크로서비스 설정
  structuredPrimary: true
  subtitle: 종합 설정 시스템
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 지금까지 배운 모든 기법을 종합하여 실제 마이크로서비스에서 사용할 수 있는 설정 시스템을 완성합니다. 중첩 설정, 환경별 분리, 비밀 관리, 검증까지 모두 포함한 완전한 설정 관리 시스템입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from typing import Literal

    class DbConfig(BaseModel):
        host: str = "localhost"
        port: int = Field(default=5432, ge=1, le=65535)
        name: str = "app_db"
        poolMin: int = Field(default=2, ge=1)
        poolMax: int = Field(default=10, ge=1)

    class RedisConfig(BaseModel):
        host: str = "localhost"
        port: int = 6379
        db: int = 0

    class ServiceSettings(BaseSettings):
        model_config = {"env_prefix": "SVC_"}

        serviceName: str
        environment: Literal["dev", "staging", "prod"] = "dev"
        logLevel: Literal["DEBUG", "INFO", "WARNING", "ERROR"] = "INFO"
        database: DbConfig = DbConfig()
        redis: RedisConfig = RedisConfig()
        apiKey: SecretStr | None = None
        allowedOrigins: list[str] = ["http://localhost:3000"]

    os.environ["SVC_SERVICENAME"] = "user-service"
