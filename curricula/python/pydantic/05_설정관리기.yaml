- id: nested
  title: 중첩 설정
  structuredPrimary: true
  subtitle: 설정 그룹화
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 복잡한 애플리케이션은 설정을 논리적으로 그룹화해야 합니다. 데이터베이스 설정, 캐시 설정, 로깅 설정 등을 별도 모델로 분리하고 메인 설정에서 조합합니다. 중첩된 BaseModel은 JSON 환경변수로 설정할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class DatabaseConfig(BaseModel):
        host: str = "localhost"
        port: int = 5432
        name: str = "app_db"
        poolSize: int = 5

    class CacheConfig(BaseModel):
        enabled: bool = True
        ttl: int = 3600
        maxSize: int = 1000

    class FullSettings(BaseSettings):
        appName: str = "MyApp"
        database: DatabaseConfig = DatabaseConfig()
        cache: CacheConfig = CacheConfig()

    fullSettings = FullSettings()
    fullSettings
