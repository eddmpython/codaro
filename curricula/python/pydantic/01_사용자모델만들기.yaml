  structuredPrimary: true
  subtitle: Pydantic 설치 및 import
  goal: '라이브러리 로드: 실행 가능한 Python 흐름으로 익힌다.'
  why: '라이브러리 로드: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
