- id: define
  title: 기본 모델 정의
  structuredPrimary: true
  subtitle: 첫 번째 사용자 모델
  goal: '기본 모델 정의: 실행 가능한 Python 흐름으로 익힌다.'
  why: '기본 모델 정의: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    BaseModel을 상속받고 클래스 변수로 필드를 선언합니다. Python의 타입 힌트가 곧 검증 규칙이 됩니다. 필드에 타입만 지정하면 필수 필드가 되고, 기본값을 함께 지정하면 선택적 필드가 됩니다. 이 간단한 선언만으로 강력한 데이터 검증 시스템이 완성됩니다.

    인스턴스 생성 시 모든 필수 필드에 값을 제공해야 합니다. 누락되면 ValidationError가 발생하며, 어떤 필드가 누락되었는지 정확히 알려줍니다.
  tips:
  - 인스턴스 생성 시 모든 필수 필드에 값을 제공해야 합니다. 누락되면 ValidationError가 발생하며, 어떤 필드가 누락되었는지 정확히 알려줍니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    class User(BaseModel):
        name: str
        age: int
        email: str

    user = User(name="Alice", age=25, email="alice@example.com")
    user
  exercise:
    prompt: '기본 모델 정의: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      class User(BaseModel):
          name: str
          age: int
          email: str

      user = User(name="Alice", age=25, email="alice@example.com")
      user
    solution: |-
      class User(BaseModel):
          name: str
          age: int
          email: str

      user = User(name="Alice", age=25, email="alice@example.com")
      user
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: BaseModel을 상속받고 클래스 변수로 필드를 선언합니다. Python의 타입 힌트가 곧 검증 규칙이 됩니다. 필드에 타입만 지정하면 필수 필드가 되고, 기본값을 함께 지정하면 선택적 필드가
      됩니다. 이 간단한 선언만으로 강력한 데이터 검증 시스템이 완성됩니다.
  - type: code
    language: python
    title: User 모델
    description: 기본 사용자 모델 정의
    content: |-
      class User(BaseModel):
          name: str
          age: int
          email: str

      user = User(name="Alice", age=25, email="alice@example.com")
      user
  - type: tip
    content: 인스턴스 생성 시 모든 필수 필드에 값을 제공해야 합니다. 누락되면 ValidationError가 발생하며, 어떤 필드가 누락되었는지 정확히 알려줍니다.
  - type: code
    language: python
    title: 필드 접근
    description: 속성으로 값 읽기
    content: user.name, user.age, user.email
- id: coercion
  title: 타입 자동 변환
  structuredPrimary: true
  subtitle: 스마트 변환 기능
  goal: '타입 자동 변환: 실행 가능한 Python 흐름으로 익힌다.'
  why: '타입 자동 변환: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Pydantic의 강력한 기능 중 하나는 타입 강제 변환(coercion)입니다. 문자열 "30"을 int 필드에 넣으면 자동으로 정수 30으로 변환됩니다. 다만 Pydantic v2 기본 설정에서는 숫자 123을 str 필드에 넣는 변환은 허용하지 않습니다. 외부 데이터(JSON, CSV 등)를 유연하게 받되, 어떤 변환이 실제로 허용되는지는 실행으로 확인해야 합니다.

    변환이 불가능한 경우(예: "invalid"를 int로)에는 ValidationError가 발생합니다. Pydantic은 "스마트" 변환만 수행합니다.
  tips:
  - '변환이 불가능한 경우(예: "invalid"를 int로)에는 ValidationError가 발생합니다. Pydantic은 "스마트" 변환만 수행합니다.'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    converted = User(name="Bob", age="30", email="bob@test.com")
    converted.age, type(converted.age)
  exercise:
    prompt: '타입 자동 변환: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      converted = User(name="Bob", age="30", email="bob@test.com")
      converted.age, type(converted.age)
    solution: |-
      converted = User(name="Bob", age="30", email="bob@test.com")
      converted.age, type(converted.age)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Pydantic의 강력한 기능 중 하나는 타입 강제 변환(coercion)입니다. 문자열 "30"을 int 필드에 넣으면 자동으로 정수 30으로 변환됩니다. 다만 Pydantic v2 기본 설정에서는
      숫자 123을 str 필드에 넣는 변환은 허용하지 않습니다. 외부 데이터(JSON, CSV 등)를 유연하게 받되, 어떤 변환이 실제로 허용되는지는 실행으로 확인해야 합니다.
  - type: code
    language: python
    title: 문자열에서 정수로
    description: 자동 타입 변환
    content: |-
      converted = User(name="Bob", age="30", email="bob@test.com")
      converted.age, type(converted.age)
  - type: code
    language: python
    title: 숫자에서 문자열은 실패
    description: Pydantic v2 기본 검증
    content: |-
      from pydantic import ValidationError

      try:
          User(name=123, age=28, email="test@test.com")
      except ValidationError as exc:
          numNameError = exc.errors()[0]["type"]

      assert numNameError == "string_type"
      numNameError
  - type: tip
    content: '변환이 불가능한 경우(예: "invalid"를 int로)에는 ValidationError가 발생합니다. Pydantic은 "스마트" 변환만 수행합니다.'
- id: validation
  title: 검증 실패 처리
  structuredPrimary: true
  subtitle: ValidationError 이해하기
  goal: '검증 실패 처리: 실행 가능한 Python 흐름으로 익힌다.'
  why: '검증 실패 처리: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    변환할 수 없는 값이 들어오면 ValidationError가 발생합니다. 이 에러 객체는 어떤 필드에서 어떤 문제가 발생했는지 상세한 정보를 제공합니다. errors() 메서드로 구조화된 에러 정보를 얻을 수 있어 API 응답이나 로깅에 활용하기 좋습니다.

    errors() 리스트의 각 항목은 'loc'(필드 위치), 'msg'(메시지), 'type'(에러 타입), 'input'(입력값)을 포함합니다.
  tips:
  - errors() 리스트의 각 항목은 'loc'(필드 위치), 'msg'(메시지), 'type'(에러 타입), 'input'(입력값)을 포함합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from pydantic import ValidationError

    try:
        invalid = User(name="Charlie", age="not_a_number", email="c@c.com")
    except ValidationError as exc:
        errorInfo = exc.errors()
        errorInfo
  exercise:
    prompt: '검증 실패 처리: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from pydantic import ValidationError

      try:
          invalid = User(name="Charlie", age="not_a_number", email="c@c.com")
      except ValidationError as exc:
          errorInfo = exc.errors()
          errorInfo
    solution: |-
      from pydantic import ValidationError

      try:
          invalid = User(name="Charlie", age="not_a_number", email="c@c.com")
      except ValidationError as exc:
          errorInfo = exc.errors()
          errorInfo
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 변환할 수 없는 값이 들어오면 ValidationError가 발생합니다. 이 에러 객체는 어떤 필드에서 어떤 문제가 발생했는지 상세한 정보를 제공합니다. errors() 메서드로 구조화된 에러 정보를
      얻을 수 있어 API 응답이나 로깅에 활용하기 좋습니다.
  - type: code
    language: python
    title: 검증 실패 유도
    description: 잘못된 데이터 처리
    content: |-
      from pydantic import ValidationError

      try:
          invalid = User(name="Charlie", age="not_a_number", email="c@c.com")
      except ValidationError as exc:
          errorInfo = exc.errors()
          errorInfo
  - type: code
    language: python
    title: 에러 개수 확인
    description: error_count 메서드
    content: |-
      try:
          multiError = User(name="", age="bad", email="")
      except ValidationError as exc:
          errorCount = exc.error_count()
          errorCount
  - type: tip
    content: errors() 리스트의 각 항목은 'loc'(필드 위치), 'msg'(메시지), 'type'(에러 타입), 'input'(입력값)을 포함합니다.
- id: default
  title: 기본값과 Optional
  structuredPrimary: true
  subtitle: 선택적 필드 정의
  goal: '기본값과 Optional: 실행 가능한 Python 흐름으로 익힌다.'
  why: '기본값과 Optional: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 필드에 기본값을 지정하면 인스턴스 생성 시 해당 필드를 생략할 수 있습니다. Optional[T]는 T 또는 None을 허용하는 타입입니다. 기본값과 Optional을 조합하면 유연한 데이터
    모델을 설계할 수 있습니다. 주의할 점은 기본값이 있는 필드는 반드시 기본값이 없는 필드 뒤에 와야 한다는 것입니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    class Profile(BaseModel):
        username: str
        bio: Optional[str] = None
        age: int = 18
        active: bool = True

    minimal = Profile(username="dave")
    minimal
  exercise:
    prompt: '기본값과 Optional: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      class Profile(BaseModel):
          username: str
          bio: Optional[str] = None
          age: int = 18
          active: bool = True

      minimal = Profile(username="dave")
      minimal
    solution: |-
      class Profile(BaseModel):
          username: str
          bio: Optional[str] = None
          age: int = 18
          active: bool = True

      minimal = Profile(username="dave")
      minimal
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
