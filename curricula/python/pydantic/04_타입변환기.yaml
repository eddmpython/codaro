      strictData
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_field_strict
  title: 4단계. 필드별 엄격 모드
  structuredPrimary: true
  subtitle: Field(strict=True)
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 특정 필드만 엄격 모드로 설정할 수 있습니다.
  tips:
