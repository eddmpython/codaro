- id: step2_auto_coercion
  title: 2단계. 자동 타입 변환
  structuredPrimary: true
  subtitle: 기본 동작
  goal: '2단계. 자동 타입 변환: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 자동 타입 변환: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Pydantic v2는 문자열 숫자를 int/float로, 1/0 같은 값을 bool로 변환하지만 숫자를 문자열로 자동 변환하지는 않습니다. 문자열 필드는 실제 문자열을 넣어야 합니다.

    1, "1", "true", "yes", "on"은 True로, 0, "0", "false", "no", "off"는 False로 변환됩니다. int를 str로 받고 싶다면 직접 str(value)를 호출하거나 field_validator(mode='before')로 변환 규칙을 명시하세요.
  tips:
  - 1, "1", "true", "yes", "on"은 True로, 0, "0", "false", "no", "off"는 False로 변환됩니다. int를 str로 받고 싶다면 직접 str(value)를 호출하거나
    field_validator(mode='before')로 변환 규칙을 명시하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from pydantic import BaseModel

    class Data(BaseModel):
        intVal: int
        floatVal: float
        strVal: str
        boolVal: bool

    data1 = Data(intVal="123", floatVal="45.67", strVal="999", boolVal=1)
    data1
  exercise:
    prompt: '2단계. 자동 타입 변환: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from pydantic import BaseModel

      class Data(BaseModel):
          intVal: int
          floatVal: float
          strVal: str
          boolVal: bool

      data1 = Data(intVal="123", floatVal="45.67", strVal="999", boolVal=1)
      data1
    solution: |-
      from pydantic import BaseModel

      class Data(BaseModel):
          intVal: int
          floatVal: float
          strVal: str
          boolVal: bool

      data1 = Data(intVal="123", floatVal="45.67", strVal="999", boolVal=1)
      data1
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Pydantic v2는 문자열 숫자를 int/float로, 1/0 같은 값을 bool로 변환하지만 숫자를 문자열로 자동 변환하지는 않습니다. 문자열 필드는 실제 문자열을 넣어야 합니다.
  - type: code
    language: python
    title: 기본 모델
    description: 다양한 타입
    content: |-
      from pydantic import BaseModel

      class Data(BaseModel):
          intVal: int
          floatVal: float
          strVal: str
          boolVal: bool

      data1 = Data(intVal="123", floatVal="45.67", strVal="999", boolVal=1)
      data1
  - type: code
    language: python
    title: 변환 결과
    description: 타입 확인
    content: |-
      typeInfo = {
          "intVal": (data1.intVal, type(data1.intVal).__name__),
          "floatVal": (data1.floatVal, type(data1.floatVal).__name__),
          "strVal": (data1.strVal, type(data1.strVal).__name__),
          "boolVal": (data1.boolVal, type(data1.boolVal).__name__)
      }
      typeInfo
  - type: tip
    content: 1, "1", "true", "yes", "on"은 True로, 0, "0", "false", "no", "off"는 False로 변환됩니다. int를 str로 받고 싶다면 직접 str(value)를
      호출하거나 field_validator(mode='before')로 변환 규칙을 명시하세요.
