- id: step6_enum
  title: 6단계. Enum 타입
  structuredPrimary: true
  subtitle: 열거형 변환
  goal: '6단계. Enum 타입: 실행 가능한 Python 흐름으로 익힌다.'
  why: '6단계. Enum 타입: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Enum 타입은 문자열이나 값으로 자동 변환됩니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from enum import Enum

    class Status(str, Enum):
        PENDING = "pending"
        ACTIVE = "active"
        COMPLETED = "completed"

    class Task(BaseModel):
        taskId: str
        status: Status

    task1 = Task(taskId="T001", status="active")
    task1
  exercise:
    prompt: '6단계. Enum 타입: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
