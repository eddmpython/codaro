- id: step8_serializer
  title: 8단계. 필드 직렬화기
  structuredPrimary: true
  subtitle: field_serializer
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: field_serializer로 필드의 직렬화 방식을 커스터마이즈합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import field_serializer

    class Article(BaseModel):
        title: str
        publishedAt: datetime

        @field_serializer('publishedAt')
        def serializeDate(self, v: datetime) -> str:
            return v.strftime("%Y년 %m월 %d일")

    article1 = Article(title="뉴스 기사", publishedAt="2024-03-15T10:30:00")
    article1.model_dump()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from pydantic import field_serializer

      class Article(BaseModel):
          title: str
          publishedAt: datetime

          @field_serializer('publishedAt')
          def serializeDate(self, v: datetime) -> str:
              return v.strftime("%Y년 %m월 %d일")

      article1 = Article(title="뉴스 기사", publishedAt="2024-03-15T10:30:00")
      article1.model_dump()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_computed
  title: 9단계. 계산 필드 직렬화
  structuredPrimary: true
  subtitle: computed_field
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: computed_field로 다른 필드에서 계산된 값을 직렬화에 포함합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pydantic import computed_field

    class Invoice(BaseModel):
        itemPrice: float
        quantity: int
        taxRate: float = 10

        @computed_field
        @property
        def subtotal(self) -> float:
            return self.itemPrice * self.quantity

        @computed_field
        @property
        def tax(self) -> float:
            return self.subtotal * self.taxRate / 100

        @computed_field
        @property
        def total(self) -> float:
            return self.subtotal + self.tax

    invoice1 = Invoice(itemPrice=10000, quantity=3)
    invoice1.model_dump()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from pydantic import computed_field

      class Invoice(BaseModel):
          itemPrice: float
          quantity: int
          taxRate: float = 10

          @computed_field
          @property
          def subtotal(self) -> float:
              return self.itemPrice * self.quantity

          @computed_field
          @property
          def tax(self) -> float:
              return self.subtotal * self.taxRate / 100

          @computed_field
          @property
          def total(self) -> float:
              return self.subtotal + self.tax

      invoice1 = Invoice(itemPrice=10000, quantity=3)
      invoice1.model_dump()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step10_mode
  title: 10단계. 직렬화 모드
  structuredPrimary: true
