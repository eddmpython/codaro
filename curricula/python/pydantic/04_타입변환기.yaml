      class Status(str, Enum):
          PENDING = "pending"
          ACTIVE = "active"
          COMPLETED = "completed"

      class Task(BaseModel):
          taskId: str
          status: Status

      task1 = Task(taskId="T001", status="active")
      task1
    solution: |-
      from enum import Enum

      class Status(str, Enum):
          PENDING = "pending"
          ACTIVE = "active"
          COMPLETED = "completed"

      class Task(BaseModel):
