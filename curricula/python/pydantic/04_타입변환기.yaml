      from pydantic import BaseModel, Field, field_serializer, computed_field
      from datetime import datetime
      from enum import Enum
      from typing import Literal

      class PaymentStatus(str, Enum):
          PENDING = "pending"
          PROCESSING = "processing"
          COMPLETED = "completed"
          FAILED = "failed"

      class Payment(BaseModel):
          model_config = {"strict": False}

          paymentId: str
          amount: float = Field(gt=0)
          currency: Literal["KRW", "USD", "EUR"] = "KRW"
          status: PaymentStatus = PaymentStatus.PENDING
          createdAt: datetime
          processedAt: datetime | None = None

          @field_serializer('amount')
          def formatAmount(self, v: float) -> str:
              if self.currency == "KRW":
                  return f"₩{v:,.0f}"
              elif self.currency == "USD":
                  return f"${v:,.2f}"
              return f"€{v:,.2f}"

          @field_serializer('createdAt', 'processedAt')
          def formatDate(self, v: datetime | None) -> str | None:
              return v.strftime("%Y-%m-%d %H:%M") if v else None

          @computed_field
          @property
          def isPending(self) -> bool:
              return self.status == PaymentStatus.PENDING

      payment = Payment(
          paymentId="PAY-001",
          amount="150000",
          currency="KRW",
          status="completed",
          createdAt="2024-03-15T10:30:00",
          processedAt="2024-03-15T10:31:00"
      )
      paymentOutput = payment.model_dump()
      paymentOutput
