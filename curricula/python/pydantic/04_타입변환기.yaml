    language: python
    title: 배치 입력을 정상/오류로 분리
    description: 여러 입력 행을 한 번에 검증하고 다음 단계로 넘길 데이터만 남깁니다.
    content: |-
      rawOrders = [
          {'orderId': 'A-100', 'customer': 'kim', 'amount': '120000', 'status': 'paid'},
          {'orderId': 'A-101', 'customer': 'lee', 'amount': '20000', 'status': 'pending'},
          {'orderId': ' ', 'customer': 'park', 'amount': '50000', 'status': 'paid'},
          {'orderId': 'A-103', 'customer': 'choi', 'amount': '-1', 'status': 'paid'},
      ]

      def validateOrderBatch(rows):
          accepted = []
          rejected = []
          for index, row in enumerate(rows, start=1):
              try:
                  accepted.append(OrderInput.model_validate(row))
              except ValidationError as exc:
                  rejected.append({'rowNumber': index, 'errors': exc.errors()})
          return accepted, rejected

      acceptedOrders, rejectedOrders = validateOrderBatch(rawOrders)
      paidRevenue = sum(order.amount for order in acceptedOrders if order.isRevenue)

      assert len(acceptedOrders) == 2
      assert len(rejectedOrders) == 2
      assert paidRevenue == 120000
      acceptedOrders, rejectedOrders
  - type: code
    language: python
    title: '실무 변주: 최소 결제 금액 정책 바꾸기'
    description: 정상 주문 중 추가 업무 정책을 바꾸며 대상 수가 어떻게 달라지는지 확인합니다.
    content: |-
      def filterRevenueOrders(orders, minAmount):
          if minAmount <= 0:
              raise ValueError('minAmount must be positive')
          return [order for order in orders if order.isRevenue and order.amount >= minAmount]

      revenueOver50000 = filterRevenueOrders(acceptedOrders, 50000)
      revenueOver150000 = filterRevenueOrders(acceptedOrders, 150000)

      assert [order.orderId for order in revenueOver50000] == ['A-100']
      assert revenueOver150000 == []
      revenueOver50000, revenueOver150000
