  title: 8단계. 루뱅 알고리즘
  structuredPrimary: true
  subtitle: louvain_communities()
  goal: 8단계. 루뱅 알고리즘에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
