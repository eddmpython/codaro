  - 관계 데이터 확인 후 그래프 알고리즘에 맞는 코드 입력을 고릅니다.
  - 최단경로찾기 결과를 노드/엣지와 지표 값 기준으로 즉시 점검합니다.
  - 완료한 코드를 관계 분석 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(관계 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 기본 최단 경로 처리 실행
