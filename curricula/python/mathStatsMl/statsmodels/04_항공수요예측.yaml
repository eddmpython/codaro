      모델로 미래 12개월을 예측했으며, ACF/PACF로 최적 파라미터를 선택했습니다. 잔차 분석으로 모델 적합성을 확인하고, SARIMA로 계절성을 명시적으로 다루는 방법도
      배웠습니다. 이제 항공사 용량 계획, 스케줄 최적화, 인력 배치에 시계열 예측을 활용할 수 있습니다.
