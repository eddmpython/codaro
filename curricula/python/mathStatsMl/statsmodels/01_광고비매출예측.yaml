    resultCheck: 6단계. OLS 모델 준비 다음 셀에서 import한 이름을 사용할 수 있어야 합니다.
- id: step7_xy_split
  title: 7단계. X와 y 분리 및 상수항 추가
  structuredPrimary: true
  subtitle: 독립변수와 종속변수
  goal: 7단계. X와 y 분리 및 상수항 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    회귀분석은 X(독립변수)로 y(종속변수)를 예측합니다. TV 광고비가 X, 매출이 y입니다. statsmodels는 절편을 자동으로 추가하지 않으므로 add_constant()로 절편용 컬럼을 직접 추가해야 합니다.

    adData[['TV']]는 대괄호가 2개입니다. [](대괄호)는 리스트를 만드는 기호이며, 대괄호 1개 ['TV']는 Series(1차원 배열), 대괄호 2개 [['TV']]는 DataFrame(2차원 표)을 반환합니다. OLS는 DataFrame 형태를 요구하므로 2개를 사용합니다. add_constant()는 값이 모두 1인 'const' 컬럼을 추가하여 절편 계산에 사용되며, 절편(intercept, β₀)은 X=0일 때 y의 기본값으로 광고비가 0원일 때 기본 매출을 의미합니다. =(등호)는 할당 연산자로 왼쪽 변수에 오른쪽 값을 저장합니다. Codaro 환경에서는 변수 재할당이 불가하므로 XRaw → X로 새 변수를 만듭니다.
  tips:
  - adData[['TV']]는 대괄호가 2개입니다. [](대괄호)는 리스트를 만드는 기호이며, 대괄호 1개 ['TV']는 Series(1차원 배열), 대괄호 2개 [['TV']]는
    DataFrame(2차원 표)을 반환합니다. OLS는 DataFrame 형태를 요구하므로 2개를 사용합니다. add_constant()는 값이 모두 1인 'const' 컬럼을
    추가하여 절편 계산에 사용되며, 절편(intercept, β₀)은 X=0일 때 y의 기본값으로 광고비가 0원일 때 기본 매출을 의미합니다. =(등호)는 할당 연산자로 왼쪽 변수에
    오른쪽 값을 저장합니다. Codaro 환경에서는 변수 재할당이 불가하므로 XRaw → X로 새 변수를 만듭니다.
  snippet: |-
    XRaw = adData[['TV']]
    y = adData['Sales']
    X = sm.add_constant(XRaw)
    X.head()
  exercise:
    prompt: 7단계. X와 y 분리 및 상수항 추가 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      XRaw = adData[['TV']]
      y = adData['Sales']
      X = sm.add_constant(XRaw)
      X.head()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 7단계. X와 y 분리 및 상수항 추가에서 `XRaw` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 7단계. X와 y 분리 및 상수항 추가 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step8_fit_model
  title: 8단계. 모델 학습
  structuredPrimary: true
  subtitle: OLS 회귀 실행
  goal: 8단계. 모델 학습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    OLS(Ordinary Least Squares, 최소제곱법)는 회귀분석의 가장 기본적인 방법으로, 데이터 점들과 회귀선 사이의 수직 거리 제곱의 합을 최소화하는 직선을 찾습니다. sm.OLS(y, X)는 "y를 X로 예측하는 모델 객체를 만든다"는 뜻이고, .fit()은 "실제로 계산을 수행하여 최적의 절편과 기울기를 찾는다"는 의미입니다. fit() 후에야 params(계수), summary(통계량) 등을 확인할 수 있습니다. 이 과정은 건물을 짓는 것에 비유하면, OLS()는 설계도 작성, fit()은 실제 건축에 해당합니다.

    sm.OLS()는 모델의 "설계도"를 만드는 것이고, .fit()은 실제 "건물을 짓는" 과정입니다. OLS(y, X)에서 y는 종속변수(예측하려는 값), X는 독립변수(원인)입니다. statsmodels는 sklearn과 달리 y를 먼저 쓰는 것에 주의하세요. fit()은 내부적으로 수학 공식 β = (X'X)⁻¹X'y을 계산하여 최적의 계수를 찾습니다. =(등호)는 오른쪽 값을 왼쪽 변수에 저장하는 할당 연산자입니다.
  tips:
  - sm.OLS()는 모델의 "설계도"를 만드는 것이고, .fit()은 실제 "건물을 짓는" 과정입니다. OLS(y, X)에서 y는 종속변수(예측하려는 값), X는 독립변수(원인)입니다.
    statsmodels는 sklearn과 달리 y를 먼저 쓰는 것에 주의하세요. fit()은 내부적으로 수학 공식 β = (X'X)⁻¹X'y을 계산하여 최적의 계수를 찾습니다.
    =(등호)는 오른쪽 값을 왼쪽 변수에 저장하는 할당 연산자입니다.
  snippet: model = sm.OLS(y, X).fit()
  exercise:
    prompt: 8단계. 모델 학습 예제에서 `model` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: model = sm.OLS(y, X).fit()
    hints:
    - 바꿀 지점은 `model = ...` 오른쪽 값입니다.
    - 실행 뒤 `model` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 8단계. 모델 학습에서 `model` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 8단계. 모델 학습 실행 뒤 `model` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step9_summary
  title: 9단계. 결과 요약
  structuredPrimary: true
  subtitle: summary() 해석
  goal: 9단계. 결과 요약에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    summary()는 회귀분석의 모든 통계량을 한 화면에 보여주는 핵심 함수입니다. R²(결정계수)는 모델이 데이터를 얼마나 잘 설명하는지 0~1 사이 값으로 나타내며, 0.61이면 TV 광고비가 매출 변동의 61%를 설명한다는 뜻입니다. p-value(유의확률)는 변수가 실제로 영향을 미치는지 확인하는 지표로, 0.05보다 작으면 통계적으로 유의미합니다(우연이 아님). 회귀 계수(coefficient)는 독립변수가 1 증가할 때 종속변수가 얼마나 변하는지 나타내는 기울기 값입니다. 이 표를 읽는 법을 배우면 모델의 성능과 통계적 유의성을 정확히 판단할 수 있으며, 학술 논문이나 비즈니스 보고서에서 분석 결과를 전문적으로 제시할 수 있습니다.

    summary()의 주요 지표를 상세히 설명하면 다음과 같습니다. (1) R² (R-squared, 결정계수): 0~1 사이 값으로 모델의 설명력을 나타냅니다. 0.61이면 TV 광고비가 매출 변동의 61%를 설명한다는 뜻이며, 나머지 39%는 다른 요인(경쟁사, 계절성, 경제 상황 등)의 영향입니다. (2) p-value (P>|t| 컬럼): 0.05보다 작으면 통계적으로 유의미하며, 0.000이면 거의 확실히 영향을 미친다는 뜻입니다. (3) coef (계수, coefficient): TV의 계수가 0.048이면 TV 광고비 1천 달러 증가 시 매출이 48개(0.048 × 1000 단위) 증가합니다. const(절편)는 광고비가 0일 때 기본 매출을 의미합니다.
  tips:
  - 'summary()의 주요 지표를 상세히 설명하면 다음과 같습니다. (1) R² (R-squared, 결정계수): 0~1 사이 값으로 모델의 설명력을 나타냅니다. 0.61이면
    TV 광고비가 매출 변동의 61%를 설명한다는 뜻이며, 나머지 39%는 다른 요인(경쟁사, 계절성, 경제 상황 등)의 영향입니다. (2) p-value (P>|t| 컬럼): 0.05보다
    작으면 통계적으로 유의미하며, 0.000이면 거의 확실히 영향을 미친다는 뜻입니다. (3) coef (계수, coefficient): TV의 계수가 0.048이면 TV 광고비
    1천 달러 증가 시 매출이 48개(0.048 × 1000 단위) 증가합니다. const(절편)는 광고비가 0일 때 기본 매출을 의미합니다.'
  snippet: model.summary()
  exercise:
    prompt: 9단계. 결과 요약 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: model.summary()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 9단계. 결과 요약의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 9단계. 결과 요약 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step11_rsquared
  title: 11단계. R² 확인
  structuredPrimary: true
  subtitle: 모델 설명력
  goal: 11단계. R² 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: R²(결정계수, coefficient of determination)는 모델이 데이터의 변동성을 얼마나 잘 설명하는지 나타내는 0~1 사이의 지표입니다. 0.61이면
    TV 광고비가 매출 변동의 61%를 설명한다는 뜻으로, 100개 시장의 매출 차이 중 61개는 TV 광고비 차이로 설명되고 39개는 다른 요인 때문이라는 의미입니다. 나머지 39%는
    라디오 광고, 신문 광고, 경쟁사 프로모션, 계절적 요인, 지역 경제 상황 등 모델에 포함되지 않은 변수들의 영향입니다. R²가 1.0이면 완벽한 예측(모든 점이 회귀선 위에
    있음), 0.0이면 전혀 설명하지 못하는 모델입니다. 실무에서 R² 0.6 이상이면 비즈니스 의사결정에 충분히 활용할 수 있는 좋은 모델로 평가됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: model.rsquared
  exercise:
    prompt: 11단계. R² 확인 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: model.rsquared
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 11단계. R² 확인의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 11단계. R² 확인 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step12_params
  title: 12단계. 회귀 계수
  structuredPrimary: true
  subtitle: 절편과 기울기
  goal: 12단계. 회귀 계수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: params는 회귀식 y = β₀ + β₁X의 계수를 담고 있는 Series입니다. const는 절편(intercept, β₀)으로 X가 0일 때 y의 기본값을
    의미하고, TV는 기울기(slope, β₁)로 X가 1 증가할 때 y의 변화량입니다. TV 계수가 0.0475이면 TV 광고비 1천 달러 증가 시 매출이 47.5개 증가한다는
    뜻입니다. 예를 들어 TV 광고비를 100에서 150으로 50 증가시키면 매출은 0.0475 × 50 = 2.375천 개, 즉 2,375개 증가합니다. 이 계수는 마케팅 ROI
    계산에 직접 사용되며, TV 광고 1달러당 약 0.048개 판매를 창출한다는 의미로 해석할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: model.params
  exercise:
    prompt: 12단계. 회귀 계수 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: model.params
    hints:
