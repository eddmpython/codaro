    학습된 모델로 새로운 TV 광고비에 대한 예상 매출을 예측할 수 있습니다. 예를 들어 새로운 시장에 TV 광고비 150천 달러를 투입할 계획이라면 예상 매출을 미리 계산할 수 있습니다. predict() 함수는 학습 시 사용한 X와 동일한 형태(const, TV 컬럼)의 DataFrame을 입력받아야 합니다. 이 예측 기능은 마케팅 예산 계획 수립, 광고비 증액 시 기대 매출 계산, ROI 시뮬레이션 등 실무에서 매우 유용합니다.

    predict()는 학습된 계수로 y = β₀ + β₁X 수식을 계산합니다. newData는 X와 같은 컬럼(const, TV)을 가져야 하며, 컬럼 순서와 이름이 정확히 일치해야 합니다. DataFrame()으로 표를 만들 때 중괄호는 딕셔너리(키와 값 쌍), 대괄호는 리스트(값 목록)입니다. 점(.)은 메서드 호출로 객체에 연결된 함수를 실행하는 문법입니다.
