- id: step15_residual
  title: 15단계. 잔차 분석
  structuredPrimary: true
  subtitle: 모델 진단
  goal: 15단계. 잔차 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    잔차(residual)는 실제값과 예측값의 차이입니다. 잔차 플롯은 회귀 모델의 가정을 검증하는 핵심 진단 도구로, 잔차가 무작위로 흩어져 있으면 모델이 적합하고, 패턴이 보이면 모델에 문제가 있습니다. 예측값(fitted)을 X축에, 잔차를 Y축에 그려서 등분산성과 선형성 가정을 확인합니다. 만약 깔때기 모양이면 이분산성(heteroscedasticity), 곡선 패턴이면 비선형 관계를 나타냅니다.

    model.fittedvalues는 학습 데이터에 대한 예측값이고, model.resid는 잔차입니다. 빨간 점선은 잔차=0인 기준선입니다. 이상적으로는 점들이 기준선 위아래로 무작위하게 분포해야 합니다.
  tips:
  - model.fittedvalues는 학습 데이터에 대한 예측값이고, model.resid는 잔차입니다. 빨간 점선은 잔차=0인 기준선입니다. 이상적으로는 점들이 기준선 위아래로
    무작위하게 분포해야 합니다.
  snippet: |-
    import altair as alt

    residualDf = pd.DataFrame({
        'fitted': model.fittedvalues,
        'residual': model.resid
    })
    residualChart = alt.Chart(residualDf).mark_circle(size=60, opacity=0.6).encode(
        x=alt.X('fitted:Q', title='Fitted Values'),
        y=alt.Y('residual:Q', title='Residuals'),
        tooltip=['fitted', 'residual']
    ).properties(width=500, height=300, title='Residual Plot')

    zeroLine = alt.Chart(pd.DataFrame({'y': [0]})).mark_rule(color='red', strokeDash=[5, 5]).encode(y='y:Q')
    residualChart + zeroLine
  exercise:
    prompt: 15단계. 잔차 분석 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
