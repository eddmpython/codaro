- id: step14_visualize
  title: 14단계. 회귀선 그리기
  structuredPrimary: true
  subtitle: 예측 결과 시각화
  goal: 14단계. 회귀선 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    산점도에 회귀선을 추가하면 모델이 데이터를 얼마나 잘 설명하는지 시각적으로 확인할 수 있습니다. 회귀선은 y = β₀ + β₁X 수식을 그래프로 표현한 것으로, 모든 점과의 수직 거리 제곱의 합이 최소가 되도록 최적화된 직선입니다. 대부분의 점이 선 주변에 분포하면 모델이 데이터를 잘 맞추는 것이고, 점들이 선에서 멀리 떨어져 있으면 모델의 설명력이 낮다는 뜻입니다. 예를 들어 TV 광고비 200 지점을 보면 실제 매출은 조금 차이가 있지만, 회귀선은 평균적인 예상 매출을 보여줍니다. 이 시각화는 고객이나 경영진에게 분석 결과를 설명할 때 매우 효과적입니다.

    plotly.graph_objects는 go로 줄여서 사용하며, 더 세밀한 커스터마이징이 가능합니다. go.Figure()로 빈 캔버스를 만들고, add_trace()로 레이어를 추가합니다. mode='markers'는 점, mode='lines'는 선을 의미합니다. marker=dict()와 line=dict()로 색상, 크기, 투명도를 설정합니다. update_layout()으로 제목과 축 이름을 지정하며, 그래프를 마우스로 확대하면 특정 구간의 패턴을 자세히 분석할 수 있습니다.
  tips:
  - plotly.graph_objects는 go로 줄여서 사용하며, 더 세밀한 커스터마이징이 가능합니다. go.Figure()로 빈 캔버스를 만들고, add_trace()로 레이어를
    추가합니다. mode='markers'는 점, mode='lines'는 선을 의미합니다. marker=dict()와 line=dict()로 색상, 크기, 투명도를 설정합니다.
    update_layout()으로 제목과 축 이름을 지정하며, 그래프를 마우스로 확대하면 특정 구간의 패턴을 자세히 분석할 수 있습니다.
  snippet: |-
    import plotly.graph_objects as go

    lineFig = go.Figure()
    lineFig.add_trace(go.Scatter(x=adData['TV'], y=adData['Sales'],
