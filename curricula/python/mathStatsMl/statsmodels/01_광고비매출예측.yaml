      residualDf = pd.DataFrame({
          'fitted': model.fittedvalues,
          'residual': model.resid
      })
      residualChart = alt.Chart(residualDf).mark_circle(size=60, opacity=0.6).encode(
          x=alt.X('fitted:Q', title='Fitted Values'),
          y=alt.Y('residual:Q', title='Residuals'),
          tooltip=['fitted', 'residual']
      ).properties(width=500, height=300, title='Residual Plot')

      zeroLine = alt.Chart(pd.DataFrame({'y': [0]})).mark_rule(color='red', strokeDash=[5, 5]).encode(y='y:Q')
      residualChart + zeroLine
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 15단계. 잔차 분석의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 15단계. 잔차 분석의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step16_qq
  title: 16단계. QQ 플롯
  structuredPrimary: true
  subtitle: 정규성 검정
  goal: 16단계. QQ 플롯에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    QQ 플롯(Quantile-Quantile Plot)은 잔차가 정규분포를 따르는지 검사하는 그래프입니다. 회귀분석의 가정 중 하나가 오차의 정규성인데, 점들이 대각선에 가까우면 정규분포를 따르고, 대각선에서 벗어나면 정규성 가정이 위배됩니다. 양 끝에서 벗어나면 꼬리가 두꺼운 분포, S자 형태면 왜도가 있다는 뜻입니다.

    scipy.stats.norm.ppf()는 표준정규분포의 분위수를 계산합니다. 빨간 대각선은 완벽한 정규분포일 때 점들이 위치해야 하는 선입니다. 대부분의 점이 대각선 근처에 있으면 정규성 가정이 만족됩니다.
  tips:
  - scipy.stats.norm.ppf()는 표준정규분포의 분위수를 계산합니다. 빨간 대각선은 완벽한 정규분포일 때 점들이 위치해야 하는 선입니다. 대부분의 점이 대각선 근처에
    있으면 정규성 가정이 만족됩니다.
  snippet: |-
    import numpy as np
    from scipy import stats

    residuals = model.resid
    sortedResid = np.sort(residuals)
    theoreticalQ = stats.norm.ppf(np.linspace(0.01, 0.99, len(sortedResid)))

    qqDf = pd.DataFrame({'theoretical': theoreticalQ, 'sample': sortedResid})
    qqChart = alt.Chart(qqDf).mark_circle(size=50, opacity=0.6).encode(
        x=alt.X('theoretical:Q', title='Theoretical Quantiles'),
        y=alt.Y('sample:Q', title='Sample Quantiles'),
        tooltip=['theoretical', 'sample']
    ).properties(width=400, height=400, title='QQ Plot of Residuals')

    minVal = min(theoreticalQ.min(), sortedResid.min())
    maxVal = max(theoreticalQ.max(), sortedResid.max())
    diagLine = alt.Chart(pd.DataFrame({'x': [minVal, maxVal], 'y': [minVal, maxVal]})).mark_line(color='red', strokeDash=[5,5]).encode(x='x:Q', y='y:Q')
    qqChart + diagLine
  exercise:
    prompt: 16단계. QQ 플롯 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import numpy as np
      from scipy import stats

      residuals = model.resid
      sortedResid = np.sort(residuals)
      theoreticalQ = stats.norm.ppf(np.linspace(0.01, 0.99, len(sortedResid)))

      qqDf = pd.DataFrame({'theoretical': theoreticalQ, 'sample': sortedResid})
      qqChart = alt.Chart(qqDf).mark_circle(size=50, opacity=0.6).encode(
          x=alt.X('theoretical:Q', title='Theoretical Quantiles'),
          y=alt.Y('sample:Q', title='Sample Quantiles'),
          tooltip=['theoretical', 'sample']
      ).properties(width=400, height=400, title='QQ Plot of Residuals')

      minVal = min(theoreticalQ.min(), sortedResid.min())
      maxVal = max(theoreticalQ.max(), sortedResid.max())
      diagLine = alt.Chart(pd.DataFrame({'x': [minVal, maxVal], 'y': [minVal, maxVal]})).mark_line(color='red', strokeDash=[5,5]).encode(x='x:Q', y='y:Q')
      qqChart + diagLine
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 16단계. QQ 플롯의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 16단계. QQ 플롯의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
