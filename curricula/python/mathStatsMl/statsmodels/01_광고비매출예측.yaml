sections:
- id: step1_install
  title: 1단계. statsmodels 설치
  structuredPrimary: true
  subtitle: 통계 분석 라이브러리
  goal: 1단계. statsmodels 설치에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: |-
    statsmodels는 통계 분석을 위한 파이썬 라이브러리로, R 언어의 통계 기능을 파이썬으로 가져온 것입니다. 회귀분석은 변수 간의 인과관계를 수식으로 표현하여 예측 모델을 만드는 기법으로, 광고비를 투입하면 매출이 얼마나 증가할지 정량적으로 계산할 수 있습니다. 시계열 예측은 과거 데이터의 패턴을 학습하여 미래 값을 추정하고, 가설 검정은 두 집단의 차이가 우연인지 의미있는 차이인지 통계적으로 판단합니다. Codaro 로컬 환경에서는 필요한 패키지를 uv로 준비하고, 레슨 안에서는 import가 성공하는지 확인합니다. 이 라이브러리는 학술 연구와 비즈니스 분석 모두에서 널리 사용되며, 특히 경제학, 금융, 마케팅 분야에서 필수적인 도구입니다.

    Codaro는 YAML의 meta.packages와 로컬 Python 환경을 기준으로 필요한 패키지를 uv로 준비합니다. 레슨 안에서는 import가 성공하는지 확인하면 됩니다.
  tips:
  - Codaro는 YAML의 meta.packages와 로컬 Python 환경을 기준으로 필요한 패키지를 uv로 준비합니다. 레슨 안에서는 import가 성공하는지 확인하면 됩니다.
  snippet: import statsmodels.api as sm
  exercise:
    prompt: 1단계. statsmodels 설치 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: import statsmodels.api as sm
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 1단계. statsmodels 설치의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. statsmodels 설치 다음 셀에서 import한 이름을 사용할 수 있어야 합니다.
- id: step2_load
  title: 2단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: 200개 시장 광고비 데이터
  goal: 2단계. 데이터 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    Advertising 데이터셋은 200개 서로 다른 시장의 TV, 라디오, 신문 광고비와 매출을 담고 있는 실제 마케팅 데이터입니다. 각 시장은 도시나 지역을 의미하며, 동일한 제품을 판매하지만 광고비 투입 전략을 달리했을 때 매출이 어떻게 변했는지 기록되어 있습니다. 예를 들어 A 시장은 TV 광고에 230,000달러, B 시장은 150,000달러를 썼고, 그 결과 매출이 각각 22,000개와 15,000개로 나타났습니다. 이 데이터로 광고비와 매출의 인과관계를 분석하여 마케팅 예산 배분의 최적 전략을 수립할 수 있으며, 실제 기업에서는 이런 분석으로 광고 ROI(투자 대비 수익)를 계산하고 예산을 효율적으로 배분합니다.

    index_col=0은 첫 번째 컬럼을 인덱스로 사용한다는 의미입니다. 이 데이터는 첫 컬럼이 단순 행 번호이므로 인덱스로 설정합니다. shape은 (행 수, 열 수)를 반환합니다.
  tips:
  - index_col=0은 첫 번째 컬럼을 인덱스로 사용한다는 의미입니다. 이 데이터는 첫 컬럼이 단순 행 번호이므로 인덱스로 설정합니다. shape은 (행 수, 열 수)를 반환합니다.
  snippet: |-
    import pandas as pd
    from codaro.curriculum.localData import loadLocalDataset

    adData = loadLocalDataset("advertising")
    adData.shape
  exercise:
    prompt: 2단계. 데이터 불러오기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import pandas as pd
      from codaro.curriculum.localData import loadLocalDataset

      adData = loadLocalDataset("advertising")
      adData.shape
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 2단계. 데이터 불러오기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 2단계. 데이터 불러오기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step3_head
  title: 3단계. 데이터 미리보기
  structuredPrimary: true
  subtitle: 컬럼 구조 파악
  goal: 3단계. 데이터 미리보기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 데이터의 처음 몇 행을 보면 어떤 컬럼이 있는지 파악할 수 있습니다. TV, Radio, Newspaper는 각 매체의 광고비(천 달러 단위)이고, Sales는
    해당 시장의 매출(천 개 단위)입니다. 예를 들어 첫 번째 행의 TV=230.1은 TV 광고에 230,100달러를 투입했다는 뜻입니다. 우리는 이 중 TV 광고비로 매출을 예측하는
    단순선형회귀 모델을 만들 것이며, 나중에 다중회귀로 확장하면 세 매체의 시너지 효과도 분석할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: adData.head()
  exercise:
    prompt: 3단계. 데이터 미리보기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: adData.head()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 3단계. 데이터 미리보기의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 3단계. 데이터 미리보기 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step4_describe
  title: 4단계. 기초 통계량
  structuredPrimary: true
  subtitle: 데이터 범위 이해
  goal: 4단계. 기초 통계량에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: describe()는 각 컬럼의 평균, 표준편차, 최소/최대값을 보여주는 판다스 함수입니다. TV 광고비는 평균 147천 달러(최소 0.7, 최대 296.4),
    매출은 평균 14천 개(최소 1.6, 최대 27)입니다. 표준편차(std)는 데이터가 평균에서 얼마나 흩어져 있는지를 나타내며, TV의 std 85.8은 광고비 투입 전략이 시장마다
    크게 다르다는 것을 보여줍니다. 이상치나 스케일 차이를 미리 확인하면 회귀분석 결과 해석이 더 정확해집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: adData.describe()
  exercise:
    prompt: 4단계. 기초 통계량 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: adData.describe()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 4단계. 기초 통계량의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 4단계. 기초 통계량 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step5_scatter
  title: 5단계. 산점도 그리기
  structuredPrimary: true
  subtitle: 관계 시각화
  goal: 5단계. 산점도 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    데이터 분석의 첫 단계는 항상 시각화입니다. 산점도(scatter plot)는 두 변수 간의 관계를 점으로 표현한 그래프로, 각 점은 하나의 시장을 나타냅니다. X축은 TV 광고비, Y축은 매출을 의미하며, 광고비가 증가할 때 매출이 어떻게 변하는지 한눈에 파악할 수 있습니다. 만약 점들이 우상향 직선 패턴을 보이면 양의 상관관계(광고비 증가 → 매출 증가), 우하향이면 음의 상관관계, 무작위로 흩어져 있으면 상관관계가 없다는 뜻입니다. 예를 들어 이 데이터에서 TV 광고비를 100만원 더 쓸 때마다 매출이 평균적으로 얼마나 늘어나는지 패턴을 확인할 수 있어, 마케팅 예산을 효율적으로 배분하는 데 도움이 됩니다.

    plotly.express는 px로 줄여서 사용하며, 인터랙티브한 그래프를 쉽게 만듭니다. px.scatter()는 산점도를 그리는 함수로, x와 y에 컬럼명을 지정합니다. labels는 축 이름을 사용자 정의하고, opacity는 점의 투명도(0~1)로 겹치는 점을 확인할 수 있습니다. plotly 그래프는 마우스를 올리면 정확한 값을 볼 수 있고, 확대/축소가 가능하여 matplotlib보다 분석이 편리합니다.
  tips:
  - plotly.express는 px로 줄여서 사용하며, 인터랙티브한 그래프를 쉽게 만듭니다. px.scatter()는 산점도를 그리는 함수로, x와 y에 컬럼명을 지정합니다. labels는
    축 이름을 사용자 정의하고, opacity는 점의 투명도(0~1)로 겹치는 점을 확인할 수 있습니다. plotly 그래프는 마우스를 올리면 정확한 값을 볼 수 있고, 확대/축소가
    가능하여 matplotlib보다 분석이 편리합니다.
  snippet: |-
    import plotly.express as px

    scatterFig = px.scatter(adData, x='TV', y='Sales',
                            labels={'TV': 'TV Advertising ($1000)',
                                    'Sales': 'Sales (1000 units)'},
                            title='TV Advertising vs Sales',
                            opacity=0.6)
    scatterFig.show()
  exercise:
    prompt: 5단계. 산점도 그리기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import plotly.express as px

      scatterFig = px.scatter(adData, x='TV', y='Sales',
                              labels={'TV': 'TV Advertising ($1000)',
                                      'Sales': 'Sales (1000 units)'},
                              title='TV Advertising vs Sales',
                              opacity=0.6)
      scatterFig.show()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 산점도 그리기의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 5단계. 산점도 그리기의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step6_ols_import
  title: 6단계. OLS 모델 준비
  structuredPrimary: true
  subtitle: statsmodels 불러오기
  goal: 6단계. OLS 모델 준비에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: |-
    statsmodels.api는 회귀분석, 시계열, 가설검정 등 통계 모델을 제공하는 핵심 모듈입니다. OLS는 Ordinary Least Squares(최소제곱법)의 약자로, 가장 기본적이면서도 강력한 회귀분석 방법입니다. 관례적으로 sm이라는 짧은 이름으로 불러오며, sm.OLS(), sm.Logit() 등 다양한 모델에 접근할 수 있습니다. sklearn의 LinearRegression과 달리 p-value, 신뢰구간 등 상세한 통계량을 제공하여 학술 연구와 비즈니스 보고서에 적합합니다.

    import ... as ...는 모듈을 다른 이름으로 불러오는 방법입니다. statsmodels.api.OLS() 대신 sm.OLS()로 짧게 쓸 수 있습니다. pandas as pd, numpy as np도 같은 방식입니다.
  tips:
  - import ... as ...는 모듈을 다른 이름으로 불러오는 방법입니다. statsmodels.api.OLS() 대신 sm.OLS()로 짧게 쓸 수 있습니다. pandas
    as pd, numpy as np도 같은 방식입니다.
