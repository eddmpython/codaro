  explanation: |-
    Boxplot은 ANOVA 분석에 적합한 시각화로, 각 그룹의 중앙값, 사분위수, 이상치를 한눈에 보여줍니다. 직무만족도별 급여 분포를 비교하면 어떤 그룹이 급여가 낮은지 파악할 수 있습니다.

    녹색은 재직자, 빨간색은 퇴사자입니다. 박스 안의 선은 중앙값, 박스 상하는 25%-75% 범위입니다. 퇴사자의 급여가 전반적으로 낮다면 급여 불만족이 퇴사 원인일 수 있습니다.
  tips:
