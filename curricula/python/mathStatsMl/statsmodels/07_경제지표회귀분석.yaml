- id: step12_durbin_watson
  title: 12단계. 자기상관 검정
  structuredPrimary: true
  subtitle: Durbin-Watson 통계량
  goal: 12단계. 자기상관 검정에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    시계열 회귀에서 잔차의 자기상관(autocorrelation)은 중요한 진단 지표입니다. 자기상관이 있으면 표준오차가 과소추정되어 p-value가 부정확해지므로, 유의미하지 않은 변수를 유의미하다고 잘못 판단할 수 있습니다. Durbin-Watson 통계량은 이를 검정하는 도구로, 2에 가까우면 자기상관이 없고, 0에 가까우면 양의 자기상관(어제 오차가 양수면 오늘도 양수), 4에 가까우면 음의 자기상관을 의미합니다.

    DW 통계량이 1.5~2.5면 자기상관이 심각하지 않습니다. 0에 가까우면 양의 자기상관(어제 오차가 양수면 오늘도 양수일 가능성), 4에 가까우면 음의 자기상관입니다. 자기상관이 있으면 표준오차가 과소추정되어 p-value가 부정확해집니다.
  tips:
  - DW 통계량이 1.5~2.5면 자기상관이 심각하지 않습니다. 0에 가까우면 양의 자기상관(어제 오차가 양수면 오늘도 양수일 가능성), 4에 가까우면 음의 자기상관입니다. 자기상관이
    있으면 표준오차가 과소추정되어 p-value가 부정확해집니다.
  snippet: |-
    from statsmodels.stats.stattools import durbin_watson

    dwStat = durbin_watson(modelGdp.resid)
    f"Durbin-Watson: {dwStat:.3f}"
  exercise:
    prompt: 12단계. 자기상관 검정 예제에서 `dwStat` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      from statsmodels.stats.stattools import durbin_watson

      dwStat = durbin_watson(modelGdp.resid)
      f"Durbin-Watson: {dwStat:.3f}"
    hints:
    - 바꿀 지점은 `dwStat = ...` 오른쪽 값입니다.
    - 실행 뒤 `dwStat` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 12단계. 자기상관 검정에서 `dwStat` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 12단계. 자기상관 검정 실행 뒤 `dwStat` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step13_prediction
  title: 13단계. GDP 예측
