  explanation: |-
    특정 경제 시나리오에서 GDP를 예측합니다. 회귀 모델의 가장 큰 장점은 가상의 조건에서 결과를 예측할 수 있다는 점입니다. 실업률 6%, 인플레이션 3%, 실질금리 2%, CPI 200인 가상 시나리오를 설정하고 GDP를 예측해봅니다. 이런 시나리오 분석은 정책 결정, 투자 계획, 리스크 관리에서 다양한 상황에 대비하는 데 활용됩니다.

    has_constant='add'는 단일 행 데이터에도 상수항을 추가합니다. 03 프로젝트에서 배운 더미 변수 처리와 동일한 패턴입니다. 예측값이 현실적인 범위(5000-15000)인지 확인하세요.
  tips:
  - has_constant='add'는 단일 행 데이터에도 상수항을 추가합니다. 03 프로젝트에서 배운 더미 변수 처리와 동일한 패턴입니다. 예측값이 현실적인 범위(5000-15000)인지
