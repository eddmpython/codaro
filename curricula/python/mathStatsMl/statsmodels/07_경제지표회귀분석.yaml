sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: 미국 거시경제 데이터
  goal: 1단계. 데이터 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    statsmodels에 내장된 macrodata는 1959년 1분기부터 2009년 3분기까지 미국 거시경제 지표를 담고 있습니다. GDP, 소비, 투자, CPI, 실업률, 인플레이션 등 14개 변수가 분기별로 기록되어 있어 경제 분석에 최적입니다. 이 데이터는 50년간 미국 경제의 성장과 침체를 보여주며, 중앙은행, 투자기관, 정책연구소에서 거시경제 모델을 검증할 때 자주 사용하는 표준 데이터셋입니다. 외부 URL 없이 statsmodels 패키지에서 직접 불러올 수 있어 재현성이 보장됩니다.

    load_pandas()는 statsmodels 데이터셋을 pandas DataFrame으로 반환합니다. .data 속성으로 실제 데이터에 접근합니다. macrodata는 경제학 교과서에서 자주 사용되는 표준 시계열 데이터셋입니다.
  tips:
  - load_pandas()는 statsmodels 데이터셋을 pandas DataFrame으로 반환합니다. .data 속성으로 실제 데이터에 접근합니다. macrodata는 경제학
    교과서에서 자주 사용되는 표준 시계열 데이터셋입니다.
  snippet: |-
    import pandas as pd
    import numpy as np
    import statsmodels.api as sm
    import plotly.express as px
    import plotly.graph_objects as go

    macro = sm.datasets.macrodata.load_pandas().data
    macro.shape
  exercise:
    prompt: 1단계. 데이터 불러오기 예제에서 `macro` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      import pandas as pd
      import numpy as np
      import statsmodels.api as sm
      import plotly.express as px
      import plotly.graph_objects as go

      macro = sm.datasets.macrodata.load_pandas().data
      macro.shape
    hints:
    - 바꿀 지점은 `macro = ...` 오른쪽 값입니다.
    - 실행 뒤 `macro` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 1단계. 데이터 불러오기에서 `macro` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 1단계. 데이터 불러오기 실행 뒤 `macro` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step2_explore
  title: 2단계. 변수 탐색
  structuredPrimary: true
  subtitle: 경제 지표 이해하기
  goal: 2단계. 변수 탐색에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    데이터에는 실질GDP(realgdp), 소비(realcons), 투자(realinv), CPI(물가지수), 실업률(unemp), 인플레이션(infl), 실질금리(realint) 등이 포함됩니다. 이 변수들은 경제학 교과서에서 배우는 핵심 지표들로, GDP는 경제 규모를, CPI는 물가 수준을, 실업률은 노동시장 상황을 나타냅니다. 경제 변수들은 서로 밀접하게 연관되어 있어 다중회귀 분석에 적합하며, 실업률이 오르면 GDP가 감소하는 등의 관계를 정량적으로 분석할 수 있습니다.

    realgdp는 실질GDP(물가 조정 GDP), realcons는 실질소비, cpi는 소비자물가지수, unemp는 실업률(%), infl은 인플레이션율(%), tbilrate는 3개월 국채 금리입니다. 'real'이 붙은 변수는 인플레이션 효과를 제거한 실질 값입니다.
  tips:
  - realgdp는 실질GDP(물가 조정 GDP), realcons는 실질소비, cpi는 소비자물가지수, unemp는 실업률(%), infl은 인플레이션율(%), tbilrate는
    3개월 국채 금리입니다. 'real'이 붙은 변수는 인플레이션 효과를 제거한 실질 값입니다.
  snippet: macro.columns.tolist()
  exercise:
    prompt: 2단계. 변수 탐색 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: macro.columns.tolist()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 2단계. 변수 탐색의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 2단계. 변수 탐색 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step3_head
  title: 3단계. 데이터 미리보기
  structuredPrimary: true
  subtitle: 시계열 구조 확인
  goal: 3단계. 데이터 미리보기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: year와 quarter 컬럼으로 시간 정보를 확인할 수 있습니다. 1959년 1분기부터 2009년 3분기까지 203개 분기(약 50년) 데이터가 포함됩니다.
    경제 데이터는 월별, 분기별, 연간 단위로 발표되는데, 분기별 데이터는 월별보다 노이즈가 적고 연간보다 변화를 자세히 관찰할 수 있어 거시경제 분석에 많이 사용됩니다. 분기별
    데이터이므로 계절성보다는 장기 추세 분석이 핵심입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: macro.head()
  exercise:
    prompt: 3단계. 데이터 미리보기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: macro.head()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 3단계. 데이터 미리보기의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 3단계. 데이터 미리보기 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step4_time_index
  title: 4단계. 시간 인덱스 생성
  structuredPrimary: true
  subtitle: 날짜 형식 변환
  goal: 4단계. 시간 인덱스 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    시계열 분석을 위해 year와 quarter를 결합하여 날짜 인덱스를 생성합니다. 날짜 인덱스가 있으면 시계열 그래프를 그리거나 특정 기간을 필터링할 때 매우 편리합니다. 예를 들어 2008년 금융위기 전후 데이터만 추출하거나, 1970년대 오일쇼크 기간과 비교하는 분석이 가능해집니다. pandas의 DatetimeIndex는 분기 데이터에도 적용할 수 있어 경제 시계열 분석에 필수적인 도구입니다.

    분기를 월로 변환하려면 1분기=1월, 2분기=4월, 3분기=7월, 4분기=10월이므로 quarter * 3 - 2 공식을 사용합니다. pd.to_datetime()으로 문자열을 날짜로 변환하고, set_index()로 인덱스를 설정합니다. 04 프로젝트의 시계열 인덱스 개념을 복습합니다.
  tips:
  - 분기를 월로 변환하려면 1분기=1월, 2분기=4월, 3분기=7월, 4분기=10월이므로 quarter * 3 - 2 공식을 사용합니다. pd.to_datetime()으로 문자열을
    날짜로 변환하고, set_index()로 인덱스를 설정합니다. 04 프로젝트의 시계열 인덱스 개념을 복습합니다.
  snippet: |-
    macro['date'] = pd.to_datetime(macro['year'].astype(int).astype(str) + '-' + (macro['quarter'].astype(int) * 3 - 2).astype(str) + '-01')
    macro = macro.set_index('date')
    macro.index
  exercise:
    prompt: 4단계. 시간 인덱스 생성 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      macro['date'] = pd.to_datetime(macro['year'].astype(int).astype(str) + '-' + (macro['quarter'].astype(int) * 3 - 2).astype(str) + '-01')
      macro = macro.set_index('date')
      macro.index
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 4단계. 시간 인덱스 생성의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 4단계. 시간 인덱스 생성의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step5_gdp_trend
  title: 5단계. GDP 추세 시각화
  structuredPrimary: true
  subtitle: 50년 경제 성장
  goal: 5단계. GDP 추세 시각화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    1959-2009년 미국 GDP 추세를 시각화합니다. 50년간 실질GDP는 약 3조 달러에서 13조 달러로 4배 이상 성장했으며, 이 과정에서 여러 경기침체 시기를 겪었습니다. 1970년대 오일쇼크, 1980년대 초 스태그플레이션, 2001년 닷컴버블 붕괴, 2008년 글로벌 금융위기 등이 그래프에서 급락으로 나타납니다. 경제 분석에서 시각화는 숫자만으로는 보이지 않는 추세와 변곡점을 발견하게 해줍니다.

    reset_index()로 인덱스를 컬럼으로 변환해야 plotly에서 x축으로 사용할 수 있습니다. 그래프에서 1970년대 오일쇼크, 1980년대 초 경기침체, 2001년 닷컴버블, 2008년 금융위기 시기의 GDP 변동을 확인할 수 있습니다.
  tips:
  - reset_index()로 인덱스를 컬럼으로 변환해야 plotly에서 x축으로 사용할 수 있습니다. 그래프에서 1970년대 오일쇼크, 1980년대 초 경기침체, 2001년 닷컴버블,
    2008년 금융위기 시기의 GDP 변동을 확인할 수 있습니다.
  snippet: |-
    trendData = macro.drop(columns='date') if 'date' in macro.columns else macro
    trendData = trendData.reset_index()
    gdpFig = px.line(trendData, x='date', y='realgdp',
                     title='US Real GDP (1959-2009)',
                     labels={'date': 'Date', 'realgdp': 'Real GDP (Billions)'})
    gdpFig.show()
  exercise:
    prompt: 5단계. GDP 추세 시각화 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      trendData = macro.drop(columns='date') if 'date' in macro.columns else macro
      trendData = trendData.reset_index()
      gdpFig = px.line(trendData, x='date', y='realgdp',
                       title='US Real GDP (1959-2009)',
                       labels={'date': 'Date', 'realgdp': 'Real GDP (Billions)'})
      gdpFig.show()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 5단계. GDP 추세 시각화의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 5단계. GDP 추세 시각화의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step6_correlation
  title: 6단계. 변수 간 상관관계
  structuredPrimary: true
  subtitle: 경제 지표 연관성
  goal: 6단계. 변수 간 상관관계에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    GDP와 다른 경제 지표의 상관관계를 확인합니다. 상관분석은 회귀 모델에 어떤 변수를 넣을지 결정하는 첫 단계입니다. 소비(realcons)와 투자(realinv)는 GDP를 구성하는 요소이므로 0.99에 가까운 높은 상관을 보일 것입니다. 반면 실업률(unemp)은 경기가 좋으면 낮아지고 나쁘면 높아지므로 GDP와 음의 상관이 예상됩니다. 이런 경제적 직관을 데이터로 검증하는 것이 분석의 첫걸음입니다.

    corr()['realgdp']로 GDP와 각 변수의 상관계수만 추출합니다. realcons(소비)가 0.99로 거의 완벽한 양의 상관, unemp(실업률)가 음의 상관을 보입니다. cpi(물가)도 GDP와 양의 상관인데, 경제 성장과 물가가 함께 올라가는 경향을 반영합니다.
  tips:
  - corr()['realgdp']로 GDP와 각 변수의 상관계수만 추출합니다. realcons(소비)가 0.99로 거의 완벽한 양의 상관, unemp(실업률)가 음의 상관을 보입니다.
    cpi(물가)도 GDP와 양의 상관인데, 경제 성장과 물가가 함께 올라가는 경향을 반영합니다.
  snippet: |-
    targetVars = ['realgdp', 'realcons', 'realinv', 'unemp', 'cpi', 'infl', 'realint']
    macro[targetVars].corr()['realgdp'].sort_values(ascending=False)
  exercise:
    prompt: 6단계. 변수 간 상관관계 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      targetVars = ['realgdp', 'realcons', 'realinv', 'unemp', 'cpi', 'infl', 'realint']
      macro[targetVars].corr()['realgdp'].sort_values(ascending=False)
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 6단계. 변수 간 상관관계에서 `targetVars` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 6단계. 변수 간 상관관계 실행 뒤 `targetVars` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: step7_feature_selection
  title: 7단계. 독립변수 선택
  structuredPrimary: true
  subtitle: 외생변수 결정
  goal: 7단계. 독립변수 선택에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    GDP 예측 모델에 사용할 외생변수를 선택합니다. 외생변수(exogenous variable)란 모델 외부에서 결정되어 종속변수에 영향을 주는 변수입니다. 실업률, 인플레이션, 금리는 중앙은행 정책이나 노동시장 상황에 따라 결정되므로 GDP의 원인이 될 수 있습니다. 반면 소비(realcons)는 GDP의 구성요소여서 원인보다는 결과에 가깝습니다. 변수 선택 시 인과관계 방향을 고려해야 의미 있는 예측 모델을 만들 수 있습니다.

    외생변수(exogenous variable)는 모델 외부에서 결정되어 종속변수에 영향을 주는 변수입니다. 실업률 상승 → GDP 하락, 인플레이션 → GDP 변동 같은 인과관계를 분석할 수 있습니다. describe()로 각 변수의 범위와 분포를 확인합니다.
  tips:
  - 외생변수(exogenous variable)는 모델 외부에서 결정되어 종속변수에 영향을 주는 변수입니다. 실업률 상승 → GDP 하락, 인플레이션 → GDP 변동 같은 인과관계를
    분석할 수 있습니다. describe()로 각 변수의 범위와 분포를 확인합니다.
  snippet: |-
    exogVars = ['unemp', 'infl', 'realint', 'cpi']
    XRaw = macro[exogVars]
    y = macro['realgdp']
    XRaw.describe()
  exercise:
    prompt: 7단계. 독립변수 선택 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      exogVars = ['unemp', 'infl', 'realint', 'cpi']
      XRaw = macro[exogVars]
      y = macro['realgdp']
      XRaw.describe()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 7단계. 독립변수 선택에서 `exogVars` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 7단계. 독립변수 선택 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step8_scatter_matrix
  title: 8단계. 산점도 행렬
  structuredPrimary: true
  subtitle: 변수 관계 시각화
  goal: 8단계. 산점도 행렬에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    GDP와 외생변수의 관계를 산점도로 확인합니다. 산점도 행렬(scatter matrix)은 여러 변수 쌍의 관계를 한눈에 볼 수 있어 다변량 데이터 탐색에 효과적입니다. 실업률과 GDP 산점도에서 우하향 패턴이 보이면 음의 관계를, CPI와 GDP에서 우상향 패턴이 보이면 양의 관계를 의미합니다. 비선형 패턴이 발견되면 변환이나 다항 항을 고려해야 합니다.

    scatter_matrix()는 모든 변수 쌍의 산점도를 한 번에 그립니다. diagonal_visible=False로 대각선(자기 자신과의 관계)을 숨깁니다. unemp-realgdp 산점도에서 역U자 형태가 보이면 비선형 관계일 수 있습니다.
  tips:
  - scatter_matrix()는 모든 변수 쌍의 산점도를 한 번에 그립니다. diagonal_visible=False로 대각선(자기 자신과의 관계)을 숨깁니다. unemp-realgdp
    산점도에서 역U자 형태가 보이면 비선형 관계일 수 있습니다.
  snippet: |-
    scatterData = macro[['realgdp'] + exogVars].reset_index(drop=True)
    scatterFig = px.scatter_matrix(scatterData, dimensions=['realgdp', 'unemp', 'cpi'],
                                   title='GDP vs Unemployment vs CPI')
    scatterFig.update_traces(diagonal_visible=False)
    scatterFig.show()
  exercise:
    prompt: 8단계. 산점도 행렬 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      scatterData = macro[['realgdp'] + exogVars].reset_index(drop=True)
      scatterFig = px.scatter_matrix(scatterData, dimensions=['realgdp', 'unemp', 'cpi'],
                                     title='GDP vs Unemployment vs CPI')
      scatterFig.update_traces(diagonal_visible=False)
      scatterFig.show()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 8단계. 산점도 행렬의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 8단계. 산점도 행렬의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step9_multiple_regression
  title: 9단계. 다중회귀 모델
  structuredPrimary: true
  subtitle: 4개 외생변수 사용
  goal: 9단계. 다중회귀 모델에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    실업률, 인플레이션, 실질금리, CPI를 독립변수로 GDP를 예측하는 다중회귀 모델을 학습합니다. 다중회귀는 여러 요인이 결과에 미치는 개별 영향력을 분리하여 측정할 수 있어 정책 분석에 필수적입니다. 예를 들어 실업률 1%p 증가가 다른 조건이 같을 때 GDP에 미치는 순수 효과를 계수로 확인할 수 있습니다. R²가 높으면 선택한 경제 지표가 GDP 변동을 잘 설명한다는 의미입니다.

    R²가 높으면 선택한 경제 지표가 GDP 변동을 잘 설명합니다. 각 계수의 부호를 확인하세요. unemp 계수가 음수면 실업률 1%p 증가 시 GDP가 감소, cpi 계수가 양수면 물가와 GDP가 함께 증가하는 관계입니다.
  tips:
  - R²가 높으면 선택한 경제 지표가 GDP 변동을 잘 설명합니다. 각 계수의 부호를 확인하세요. unemp 계수가 음수면 실업률 1%p 증가 시 GDP가 감소, cpi 계수가 양수면
    물가와 GDP가 함께 증가하는 관계입니다.
  snippet: |-
    X = sm.add_constant(XRaw)
    modelGdp = sm.OLS(y, X).fit()
    modelGdp.summary()
  exercise:
    prompt: 9단계. 다중회귀 모델 예제에서 `X`, `modelGdp` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      X = sm.add_constant(XRaw)
      modelGdp = sm.OLS(y, X).fit()
      modelGdp.summary()
    hints:
    - 바꿀 지점은 `X = ...` 오른쪽 값입니다.
    - 실행 뒤 `X` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 9단계. 다중회귀 모델에서 `X` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 9단계. 다중회귀 모델 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step10_coefficient_interpret
  title: 10단계. 계수 해석
  structuredPrimary: true
  subtitle: 경제적 의미
  goal: 10단계. 계수 해석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    각 계수의 경제적 의미를 해석합니다. 회귀 계수는 '다른 변수가 고정되었을 때' 해당 변수 1단위 증가의 효과를 나타냅니다. 예를 들어 unemp 계수가 -100이면 인플레이션, 금리, 물가가 그대로일 때 실업률 1%p 증가 시 GDP가 100억 달러 감소한다는 의미입니다. 이 해석은 정책 효과를 분석할 때 핵심이며, p-value로 이 효과가 통계적으로 유의미한지도 함께 확인해야 합니다.

    p-value가 0.05 미만이면 해당 변수는 통계적으로 유의합니다. const(절편)는 모든 독립변수가 0일 때 GDP 기대값입니다. 계수의 부호가 경제 이론과 일치하는지 확인하세요. 실업률이 상승하면 GDP가 하락하는 것이 일반적입니다.
  tips:
  - p-value가 0.05 미만이면 해당 변수는 통계적으로 유의합니다. const(절편)는 모든 독립변수가 0일 때 GDP 기대값입니다. 계수의 부호가 경제 이론과 일치하는지 확인하세요.
    실업률이 상승하면 GDP가 하락하는 것이 일반적입니다.
  snippet: |-
    coefDf = pd.DataFrame({
        'Coefficient': modelGdp.params,
        'Std Error': modelGdp.bse,
        'p-value': modelGdp.pvalues
    }).round(4)
    coefDf
  exercise:
    prompt: 10단계. 계수 해석 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      coefDf = pd.DataFrame({
          'Coefficient': modelGdp.params,
          'Std Error': modelGdp.bse,
          'p-value': modelGdp.pvalues
      }).round(4)
      coefDf
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 10단계. 계수 해석의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 10단계. 계수 해석의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step11_residual_analysis
  title: 11단계. 잔차 분석
  structuredPrimary: true
  subtitle: 모델 진단
  goal: 11단계. 잔차 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    잔차 분석으로 모델의 적합성을 진단합니다. 잔차(residual)는 실제값과 예측값의 차이로, 모델이 설명하지 못한 부분입니다. 좋은 모델이라면 잔차가 무작위하게 0 주위에 분포해야 합니다. 시간에 따라 잔차가 커지거나 특정 패턴을 보이면 모델에 문제가 있습니다. 특히 시계열 데이터에서는 잔차의 자기상관(autocorrelation), 즉 이전 시점 오차가 현재 시점 오차에 영향을 주는지도 확인해야 합니다.

    잔차가 시간에 따라 증가하거나 감소하는 추세가 있으면 모델이 추세를 제대로 포착하지 못한 것입니다. 특정 시기에 잔차가 집중되면 구조적 변화가 있을 수 있습니다(2008년 금융위기 등). macro.index는 이미 DatetimeIndex이므로 바로 사용할 수 있습니다.
  tips:
  - 잔차가 시간에 따라 증가하거나 감소하는 추세가 있으면 모델이 추세를 제대로 포착하지 못한 것입니다. 특정 시기에 잔차가 집중되면 구조적 변화가 있을 수 있습니다(2008년 금융위기
    등). macro.index는 이미 DatetimeIndex이므로 바로 사용할 수 있습니다.
  snippet: |-
    residuals = modelGdp.resid
    residDf = pd.DataFrame({'Date': macro.index, 'Residuals': residuals})

    residFig = px.scatter(residDf, x='Date', y='Residuals',
                          title='Residuals Over Time',
                          opacity=0.6)
    residFig.add_hline(y=0, line_dash='dash', line_color='red')
    residFig.show()
  exercise:
    prompt: 11단계. 잔차 분석 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      residuals = modelGdp.resid
