- id: step15_time_effect
  title: 15단계. 시간 효과 추가
  structuredPrimary: true
  subtitle: 추세 변수 포함
  goal: 15단계. 시간 효과 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    경제는 기술 발전, 인구 증가, 생산성 향상으로 장기적으로 성장하는 추세가 있습니다. 이 추세를 무시하면 다른 변수들이 추세 효과까지 흡수하여 계수 해석이 왜곡됩니다. 시간 변수를 추가하면 추세 효과가 분리되어, 다른 변수 계수는 '추세를 제외한 순수 효과'로 바뀝니다. 시간 변수 추가 전후의 R², 계수, AIC를 비교하면 추세 효과의 크기를 확인할 수 있습니다.

    time 변수는 0, 1, 2, ... 순으로 증가하는 추세 변수입니다. 시간 변수를 추가하면 다른 변수의 계수는 "추세를 제외한 순수 효과"로 해석이 바뀝니다. R²와 Adj R² 차이가 크면 과적합 가능성이 있습니다.
  tips:
  - time 변수는 0, 1, 2, ... 순으로 증가하는 추세 변수입니다. 시간 변수를 추가하면 다른 변수의 계수는 "추세를 제외한 순수 효과"로 해석이 바뀝니다. R²와 Adj
    R² 차이가 크면 과적합 가능성이 있습니다.
  snippet: |-
    macro['time'] = range(len(macro))

    XWithTime = macro[exogVars + ['time']]
    XWithTimeConst = sm.add_constant(XWithTime)

    modelWithTime = sm.OLS(y, XWithTimeConst).fit()

    compareSummary = pd.DataFrame({
        'Model': ['Without Time', 'With Time'],
        'R²': [modelGdp.rsquared, modelWithTime.rsquared],
        'Adj R²': [modelGdp.rsquared_adj, modelWithTime.rsquared_adj],
        'AIC': [modelGdp.aic, modelWithTime.aic]
    })
    compareSummary
  exercise:
    prompt: 15단계. 시간 효과 추가 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      macro['time'] = range(len(macro))

      XWithTime = macro[exogVars + ['time']]
      XWithTimeConst = sm.add_constant(XWithTime)

      modelWithTime = sm.OLS(y, XWithTimeConst).fit()

      compareSummary = pd.DataFrame({
          'Model': ['Without Time', 'With Time'],
          'R²': [modelGdp.rsquared, modelWithTime.rsquared],
          'Adj R²': [modelGdp.rsquared_adj, modelWithTime.rsquared_adj],
          'AIC': [modelGdp.aic, modelWithTime.aic]
      })
      compareSummary
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 15단계. 시간 효과 추가의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 15단계. 시간 효과 추가의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step16_fitted_vs_actual
