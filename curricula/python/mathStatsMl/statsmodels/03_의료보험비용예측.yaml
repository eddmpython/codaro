  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    보험사 리스크 분석가가 되어 개인 특성별 보험료를 책정해봅시다. 각 미션은 데이터 로딩부터 로그 변환, 범주형 처리, 모델링, 예측까지 전체 과정을 독립적으로 수행합니다. 01 프로젝트의 OLS와 summary, 02 프로젝트의 다중회귀와 잔차 분석, 그리고 이번 프로젝트의 로그 변환과 범주형 변수 처리를 모두 활용합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
