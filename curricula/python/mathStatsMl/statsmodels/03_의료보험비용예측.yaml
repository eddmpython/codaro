    resultCheck: 8단계. 상수항 추가 실행 뒤 `XWithConst` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step9_fit_model
  title: 9단계. 회귀 모델 학습
  structuredPrimary: true
  subtitle: 로그 보험료 예측
  goal: 9단계. 회귀 모델 학습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: OLS(y, X).fit()으로 모델을 학습합니다. 종속변수가 logCharges(로그 변환된 보험료)이므로 예측값도 로그 스케일입니다. 로그 스케일은 log()
    함수를 적용한 값으로, 예를 들어 10,000달러는 log(10000) ≈ 9.2로 표현됩니다. 나중에 실제 보험료(달러 단위)로 변환하려면 로그의 역함수인 exp() 지수 함수를
    적용해야 합니다. exp(9.2) ≈ 10,000처럼 원래 값으로 되돌립니다. fit()은 01 프로젝트에서 배운 것처럼 최소제곱법으로 계수를 계산하는 과정입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: model = sm.OLS(y, XWithConst).fit()
