- id: step12_coef_viz
  title: 12단계. 계수 시각화
  structuredPrimary: true
  subtitle: 영향력 비교
  goal: 12단계. 계수 시각화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    계수를 막대 그래프로 시각화하면 각 변수의 영향력을 직관적으로 비교할 수 있습니다. 로그 모델에서 계수는 백분율 변화를 의미하므로, smoker_yes의 큰 계수는 흡연이 보험료에 압도적인 영향을 미친다는 것을 시각적으로 보여줍니다.

    녹색은 양의 계수(보험료 증가), 빨간색은 음의 계수(보험료 감소)입니다. smoker_yes가 다른 변수보다 압도적으로 크다는 것을 한눈에 알 수 있습니다.
  snippet: |-
    coefData = model.params.drop('const').reset_index()
    coefData.columns = ['variable', 'coefficient']
    coefData['abs_coef'] = coefData['coefficient'].abs()
    coefData = coefData.sort_values('abs_coef', ascending=False)

    coefChart = alt.Chart(coefData).mark_bar().encode(
        x=alt.X('coefficient:Q', title='Coefficient'),
        y=alt.Y('variable:N', sort='-x', title='Variable'),
        color=alt.condition(
            alt.datum.coefficient > 0,
            alt.value('#2ecc71'),
            alt.value('#e74c3c')
        ),
        tooltip=['variable', 'coefficient']
    ).properties(width=400, height=300, title='Regression Coefficients (Log Model)')
    coefChart
  exercise:
    prompt: 12단계. 계수 시각화 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      coefData = model.params.drop('const').reset_index()
      coefData.columns = ['variable', 'coefficient']
      coefData['abs_coef'] = coefData['coefficient'].abs()
      coefData = coefData.sort_values('abs_coef', ascending=False)

      coefChart = alt.Chart(coefData).mark_bar().encode(
          x=alt.X('coefficient:Q', title='Coefficient'),
          y=alt.Y('variable:N', sort='-x', title='Variable'),
          color=alt.condition(
              alt.datum.coefficient > 0,
              alt.value('#2ecc71'),
              alt.value('#e74c3c')
          ),
          tooltip=['variable', 'coefficient']
      ).properties(width=400, height=300, title='Regression Coefficients (Log Model)')
      coefChart
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 12단계. 계수 시각화의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 12단계. 계수 시각화의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
