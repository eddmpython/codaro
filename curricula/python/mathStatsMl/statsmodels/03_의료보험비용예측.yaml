    starterCode: insuranceData.head()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 2단계. 데이터 미리보기의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 2단계. 데이터 미리보기 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step3_describe
  title: 3단계. 기초 통계량
  structuredPrimary: true
  subtitle: 수치형 변수 분포
  goal: 3단계. 기초 통계량에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: charges(보험료)의 평균은 약 13,270달러이지만 최대값은 63,770달러로 편차가 매우 큽니다. 표준편차가 12,110달러로 평균에 근접하며, 이는
    데이터가 크게 흩어져 있음을 의미합니다. 중앙값(9,382달러)이 평균보다 낮은 것은 분포가 오른쪽으로 치우쳐 있다는(right-skewed) 강력한 신호입니다. 소수의 고위험군(흡연자,
    고령자)이 매우 높은 보험료를 내기 때문이며, 이런 비대칭 분포는 로그 변환으로 정규화하면 회귀 모델의 정규성 가정을 만족시켜 R²와 p-value의 정확도가 향상됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: insuranceData.describe()
  exercise:
    prompt: 3단계. 기초 통계량 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: insuranceData.describe()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 3단계. 기초 통계량의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 3단계. 기초 통계량 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step4_hist
  title: 4단계. 보험료 분포 확인
  structuredPrimary: true
  subtitle: 히스토그램
  goal: 4단계. 보험료 분포 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    charges(보험료)의 히스토그램을 그리면 오른쪽으로 긴 꼬리를 가진 비대칭 분포(right-skewed distribution)를 확인할 수 있습니다. 히스토그램은 데이터의 분포를 막대 그래프로 나타낸 것으로, 각 막대의 높이는 해당 구간에 속하는 데이터의 개수를 의미합니다. 이 데이터에서 대부분의 사람(약 70%)은 5,000~15,000달러의 낮은 보험료를 내지만, 일부 고위험군(흡연자, 고령자)은 40,000달러 이상의 매우 높은 보험료를 냅니다. 이런 비대칭 분포는 회귀분석의 정규성 가정을 위반하여 모델 성능을 저하시키므로, 로그 변환으로 분포를 대칭에 가깝게 만들어야 합니다. 정규성 가정이 위반되면 p-value가 부정확해지고 신뢰구간이 넓어집니다.

    plotly.express의 px.histogram()은 인터랙티브 히스토그램을 그립니다. nbins=30은 30개 구간으로 나눈다는 뜻으로, bins 개수가 많으면 세밀하지만 노이즈가 생기고, 적으면 패턴이 뭉개집니다. labels로 축 이름을 지정하며, 마우스를 올리면 각 막대의 정확한 개수와 범위를 확인할 수 있습니다. 정규분포는 종 모양(bell curve)이지만, 이 데이터는 왼쪽에 치우쳐 오른쪽 꼬리가 긴 형태입니다.
  tips:
  - plotly.express의 px.histogram()은 인터랙티브 히스토그램을 그립니다. nbins=30은 30개 구간으로 나눈다는 뜻으로, bins 개수가 많으면 세밀하지만
    노이즈가 생기고, 적으면 패턴이 뭉개집니다. labels로 축 이름을 지정하며, 마우스를 올리면 각 막대의 정확한 개수와 범위를 확인할 수 있습니다. 정규분포는 종 모양(bell
    curve)이지만, 이 데이터는 왼쪽에 치우쳐 오른쪽 꼬리가 긴 형태입니다.
  snippet: |-
    import plotly.express as px

    histFig = px.histogram(insuranceData, x='charges', nbins=30,
                           title='Original Distribution of Charges',
                           labels={'charges': 'Charges ($)', 'count': 'Frequency'})
    histFig.show()
  exercise:
    prompt: 4단계. 보험료 분포 확인 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import plotly.express as px

      histFig = px.histogram(insuranceData, x='charges', nbins=30,
                             title='Original Distribution of Charges',
                             labels={'charges': 'Charges ($)', 'count': 'Frequency'})
      histFig.show()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 4단계. 보험료 분포 확인의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 4단계. 보험료 분포 확인의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step5_log_transform
  title: 5단계. 로그 변환
  structuredPrimary: true
  subtitle: 분포 정규화
  goal: 5단계. 로그 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    로그 변환(logarithmic transformation)은 큰 값을 압축하고 작은 값을 상대적으로 확대하여 비대칭 분포를 대칭에 가깝게 만드는 데이터 변환 기법입니다. numpy의 log() 함수는 자연로그(밑이 e≈2.718인 로그)를 계산하며, 예를 들어 10,000달러는 log(10000)≈9.2, 50,000달러는 log(50000)≈10.8로 변환되어 차이가 40,000에서 1.6으로 줄어듭니다. 로그 변환 후 분포가 종 모양(bell curve)에 가까워지면 회귀 모델의 정규성 가정이 만족되어 R²가 향상되고 p-value가 정확해집니다. 로그 변환은 (1) 비대칭 분포를 대칭화, (2) 이상치(outlier)의 영향 감소, (3) 곱셈 관계를 덧셈 관계로 변환하는 효과가 있어, 금융 데이터(소득, 자산)나 생물학 데이터(세포 수)에서 필수적입니다.

    numpy.log()는 자연로그(밑이 e인 로그)를 계산하며, log10()은 상용로그(밑이 10)입니다. plotly의 make_subplots()는 여러 그래프를 나란히 배치하고, add_trace()로 각 위치에 그래프를 추가합니다. row=1, col=1은 첫 번째 위치, row=1, col=2는 두 번째 위치를 의미합니다. 로그 변환 후 오른쪽 그래프가 좌우 대칭에 가까워진 것을 확인할 수 있으며, 이는 회귀 모델의 성능을 크게 향상시킵니다.
  tips:
  - numpy.log()는 자연로그(밑이 e인 로그)를 계산하며, log10()은 상용로그(밑이 10)입니다. plotly의 make_subplots()는 여러 그래프를 나란히 배치하고,
    add_trace()로 각 위치에 그래프를 추가합니다. row=1, col=1은 첫 번째 위치, row=1, col=2는 두 번째 위치를 의미합니다. 로그 변환 후 오른쪽 그래프가
    좌우 대칭에 가까워진 것을 확인할 수 있으며, 이는 회귀 모델의 성능을 크게 향상시킵니다.
  snippet: |-
    import numpy as np
    import plotly.graph_objects as go
    from plotly.subplots import make_subplots

    insuranceData['logCharges'] = np.log(insuranceData['charges'])

    logCompFig = make_subplots(rows=1, cols=2, subplot_titles=['Original', 'Log Transformed'])
    logCompFig.add_trace(go.Histogram(x=insuranceData['charges'], nbinsx=30, name='Original'), row=1, col=1)
    logCompFig.add_trace(go.Histogram(x=insuranceData['logCharges'], nbinsx=30, name='Log'), row=1, col=2)
    logCompFig.update_xaxes(title_text='Charges ($)', row=1, col=1)
    logCompFig.update_xaxes(title_text='Log(Charges)', row=1, col=2)
    logCompFig.update_yaxes(title_text='Frequency', row=1, col=1)
    logCompFig.update_layout(showlegend=False, title_text='Original vs Log Transformed Distribution')
    logCompFig.show()
  exercise:
