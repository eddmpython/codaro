  goal: 2단계. 데이터 미리보기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 'age(나이), sex(성별: male/female), bmi(체질량지수: 몸무게kg ÷ 키m²), children(피부양 자녀 수), smoker(흡연
    여부: yes/no), region(미국 내 거주 지역: southeast, southwest 등), charges(연간 보험료, 달러)가 있습니다. sex, smoker, region은
    범주형 변수(카테고리)이고 나머지는 수치형 변수입니다. 범주형 변수는 문자열이므로 그대로 회귀에 사용할 수 없어, get_dummies()로 0/1 더미 변수로 변환해야 합니다.
    이 변환 과정은 통계 분석의 필수 전처리 단계입니다.'
