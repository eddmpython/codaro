- id: step6_dummies
  title: 6단계. 범주형 변수를 더미 변수로 변환
  structuredPrimary: true
  subtitle: get_dummies()
  goal: 6단계. 범주형 변수를 더미 변수로 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    sex, smoker, region은 문자열(male/female, yes/no 등)이므로 회귀에 직접 사용할 수 없습니다. get_dummies()로 0과 1로 이루어진 더미 변수(dummy variable)로 변환합니다. 예를 들어 smoker 컬럼은 smoker_yes(흡연자면 1, 아니면 0)로 변환됩니다. drop_first=True 옵션은 첫 번째 카테고리를 제거하여 다중공선성(multicollinearity)을 방지하며, 예를 들어 sex가 male/female 두 개면 sex_male만 생성하고 sex_female은 생략합니다(sex_female = 1 - sex_male로 완벽히 예측 가능하기 때문).

    get_dummies()는 범주형 변수(카테고리)를 더미 변수(dummy variable, 0/1)로 변환하는 pandas 함수입니다. drop_first=True는 다중공선성(multicollinearity)을 방지하기 위해 첫 번째 카테고리를 제거합니다. 예를 들어 sex가 male/female 두 개면 sex_male만 생성하며, 1=남성, 0=여성을 의미합니다. 만약 sex_male과 sex_female을 모두 포함하면 sex_female = 1 - sex_male로 완벽한 선형 관계(완벽한 다중공선성)가 발생하여 역행렬 계산이 불가능해지고 회귀가 실패합니다. k개 카테고리는 k-1개 더미 변수로 충분하며, 제거된 카테고리는 기준(reference) 그룹이 됩니다.
  tips:
  - get_dummies()는 범주형 변수(카테고리)를 더미 변수(dummy variable, 0/1)로 변환하는 pandas 함수입니다. drop_first=True는 다중공선성(multicollinearity)을
    방지하기 위해 첫 번째 카테고리를 제거합니다. 예를 들어 sex가 male/female 두 개면 sex_male만 생성하며, 1=남성, 0=여성을 의미합니다. 만약 sex_male과
    sex_female을 모두 포함하면 sex_female = 1 - sex_male로 완벽한 선형 관계(완벽한 다중공선성)가 발생하여 역행렬 계산이 불가능해지고 회귀가 실패합니다.
    k개 카테고리는 k-1개 더미 변수로 충분하며, 제거된 카테고리는 기준(reference) 그룹이 됩니다.
  snippet: |-
    insuranceDummies = pd.get_dummies(insuranceData, columns=['sex', 'smoker', 'region'], drop_first=True, dtype=int)
    insuranceDummies.head()
  exercise:
    prompt: 6단계. 범주형 변수를 더미 변수로 변환 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
