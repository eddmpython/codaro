    resultCheck: 7단계. X와 y 분리 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step8_add_constant
  title: 8단계. 상수항 추가
  structuredPrimary: true
  subtitle: 절편 계산
  goal: 8단계. 상수항 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 01, 02 프로젝트에서 배운 것처럼 add_constant()로 절편(intercept)용 컬럼을 추가합니다. 절편은 모든 독립변수가 0일 때의 기본 보험료를
    의미하며, 회귀식 y = β₀ + β₁X₁ + β₂X₂ + ...에서 β₀에 해당합니다. statsmodels는 sklearn과 달리 절편을 자동으로 추가하지 않으므로 이 단계가
    필수이며, 모든 회귀 모델(OLS, Logit, ARIMA 등)에 동일하게 적용됩니다.
  tips:
