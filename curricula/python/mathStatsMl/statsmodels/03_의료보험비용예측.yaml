- id: step15_predict_actual
  title: 15단계. 실제 보험료로 변환
  structuredPrimary: true
  subtitle: 지수 함수 적용
  goal: 15단계. 실제 보험료로 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    로그 보험료를 실제 달러 단위 보험료로 변환하려면 지수 함수 exp()를 적용합니다. log()와 exp()는 역함수 관계로, exp(log(x)) = x가 성립합니다. 예를 들어 예측된 로그 보험료가 8.5이면 exp(8.5) ≈ 4,914달러가 실제 예상 연간 보험료입니다. 이 변환은 비즈니스에서 실제 금액을 산출할 때 필수이며, 로그 모델의 최종 결과물입니다.

    numpy.exp()는 자연상수 e(≈2.718)의 거듭제곱을 계산하는 지수 함수입니다. exp(x)는 e^x를 의미하며, 예를 들어 exp(2) = e² ≈ 7.39입니다. log()와 exp()는 역함수 관계로, exp(log(x)) = x가 성립하여 서로 상쇄됩니다. 로그 변환 후 회귀한 경우 예측값이 로그 스케일이므로 반드시 exp()로 원래 스케일(실제 보험료)로 되돌려야 비즈니스에서 사용할 수 있습니다. np는 numpy를 짧게 줄인 별칭으로, import numpy as np로 선언했기 때문에 사용 가능합니다.
  tips:
  - numpy.exp()는 자연상수 e(≈2.718)의 거듭제곱을 계산하는 지수 함수입니다. exp(x)는 e^x를 의미하며, 예를 들어 exp(2) = e² ≈ 7.39입니다.
    log()와 exp()는 역함수 관계로, exp(log(x)) = x가 성립하여 서로 상쇄됩니다. 로그 변환 후 회귀한 경우 예측값이 로그 스케일이므로 반드시 exp()로 원래
    스케일(실제 보험료)로 되돌려야 비즈니스에서 사용할 수 있습니다. np는 numpy를 짧게 줄인 별칭으로, import numpy as np로 선언했기 때문에 사용 가능합니다.
  snippet: |-
    actualPredicted = np.exp(logPredicted)
    f"예측 보험료: ${actualPredicted:.2f}"
  exercise:
    prompt: 15단계. 실제 보험료로 변환 예제에서 `actualPredicted` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      actualPredicted = np.exp(logPredicted)
      f"예측 보험료: ${actualPredicted:.2f}"
    hints:
    - 바꿀 지점은 `actualPredicted = ...` 오른쪽 값입니다.
    - 실행 뒤 `actualPredicted` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 15단계. 실제 보험료로 변환에서 `actualPredicted` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 15단계. 실제 보험료로 변환 실행 뒤 `actualPredicted` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step16_smoker_comparison
  title: 16단계. 흡연자 vs 비흡연자
  structuredPrimary: true
  subtitle: 흡연 효과 비교
  goal: 16단계. 흡연자 vs 비흡연자에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 같은 조건(나이, 성별, BMI, 자녀 수, 지역)에서 흡연 여부만 바꿔서 보험료 차이를 확인합니다. 다른 변수는 고정하고 smoker_yes만 0에서 1로
    바꾸면 순수한 흡연 효과를 정량적으로 측정할 수 있습니다. 02 프로젝트에서 배운 '다른 변수 고정 시 순수 효과' 개념을 적용하며, 이는 인과관계 분석의 핵심입니다. 결과적으로
    흡연자는 비흡연자보다 약 3~4배 높은 보험료를 내며, 이 수치는 보험사의 흡연자 할증률 결정에 직접 활용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    newPersonSmoker = newPerson.copy()
    newPersonSmoker['smoker_yes'] = 1

    newPersonSmokerConst = sm.add_constant(newPersonSmoker, has_constant='add')

    nonSmokerCharge = np.exp(model.predict(newPersonWithConst)[0])
    smokerCharge = np.exp(model.predict(newPersonSmokerConst)[0])

    f"비흡연자 보험료: ${nonSmokerCharge:.2f}"
    f"흡연자 보험료: ${smokerCharge:.2f}"
    f"차이: ${smokerCharge - nonSmokerCharge:.2f}"
    f"비율: {smokerCharge / nonSmokerCharge:.2f}배"
  exercise:
    prompt: 16단계. 흡연자 vs 비흡연자 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      newPersonSmoker = newPerson.copy()
      newPersonSmoker['smoker_yes'] = 1

      newPersonSmokerConst = sm.add_constant(newPersonSmoker, has_constant='add')

      nonSmokerCharge = np.exp(model.predict(newPersonWithConst)[0])
      smokerCharge = np.exp(model.predict(newPersonSmokerConst)[0])

      f"비흡연자 보험료: ${nonSmokerCharge:.2f}"
      f"흡연자 보험료: ${smokerCharge:.2f}"
      f"차이: ${smokerCharge - nonSmokerCharge:.2f}"
      f"비율: {smokerCharge / nonSmokerCharge:.2f}배"
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 16단계. 흡연자 vs 비흡연자에서 `newPersonSmoker` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 16단계. 흡연자 vs 비흡연자 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
