    resultCheck: 9단계. 회귀 모델 학습 실행 뒤 `model` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step10_summary
  title: 10단계. 결과 요약
  structuredPrimary: true
  subtitle: summary 해석
  goal: 10단계. 결과 요약에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    R²는 약 0.75로, 선택한 변수들이 로그 보험료 변동의 75%를 설명합니다. 주목할 점은 smoker_yes의 계수가 1.51로 가장 크며, p-value가 0.000으로 통계적으로 매우 유의미합니다. 이는 흡연이 보험료에 압도적으로 큰 영향을 미친다는 강력한 증거입니다. age(나이)와 bmi(체질량지수)도 유의미한 양의 계수를 가지며, 나이가 많고 BMI가 높을수록 보험료가 증가합니다. 이 결과는 보험사의 위험 평가 기준과 일치합니다.

    로그 변환된 종속변수의 계수는 백분율 변화로 해석하며, 이는 일반 회귀와 다른 중요한 차이입니다. smoker_yes 계수가 1.51이면 exp(1.51) ≈ 4.53으로 변환하고, 흡연자는 비흡연자보다 보험료가 (4.53 - 1) × 100 = 353% 높다는 뜻입니다. 수식으로 설명하면 log(Y) = β₀ + β₁X 모델에서 β₁의 의미는 X가 1 증가할 때 Y가 exp(β₁)배 변한다는 것입니다. 예를 들어 age 계수가 0.034이면 나이 1세 증가 시 보험료는 exp(0.034) ≈ 1.035배, 즉 3.5% 증가합니다. 이 해석 방법은 경제학과 금융에서 널리 사용되며, 소득, 가격, 수익률 등 곱셈 효과가 있는 변수에 적합합니다.
  tips:
  - 로그 변환된 종속변수의 계수는 백분율 변화로 해석하며, 이는 일반 회귀와 다른 중요한 차이입니다. smoker_yes 계수가 1.51이면 exp(1.51) ≈ 4.53으로 변환하고,
    흡연자는 비흡연자보다 보험료가 (4.53 - 1) × 100 = 353% 높다는 뜻입니다. 수식으로 설명하면 log(Y) = β₀ + β₁X 모델에서 β₁의 의미는 X가 1 증가할
    때 Y가 exp(β₁)배 변한다는 것입니다. 예를 들어 age 계수가 0.034이면 나이 1세 증가 시 보험료는 exp(0.034) ≈ 1.035배, 즉 3.5% 증가합니다.
    이 해석 방법은 경제학과 금융에서 널리 사용되며, 소득, 가격, 수익률 등 곱셈 효과가 있는 변수에 적합합니다.
  snippet: model.summary()
  exercise:
    prompt: 10단계. 결과 요약 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: model.summary()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 10단계. 결과 요약의 수정 코드가 핵심 처리 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 10단계. 결과 요약 실행 결과가 출력과 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step11_residual_plot
  title: 11단계. 잔차 분석
  structuredPrimary: true
  subtitle: 모델 진단
  goal: 11단계. 잔차 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    02 프로젝트에서 배운 잔차 플롯으로 로그 변환 모델의 적합성을 진단합니다. 로그 변환 전에는 잔차가 깔때기 모양이었다면, 변환 후에는 더 균일하게 분포해야 합니다. 잔차가 0 주변에 무작위로 흩어져 있으면 좋은 모델입니다.

    로그 변환 후 잔차가 더 균일하게 분포한다면 변환이 효과적이라는 증거입니다. 깔때기 모양(이분산성)이 사라졌는지 확인하세요.
  snippet: |-
    import altair as alt

    residDf = pd.DataFrame({
        'fitted': model.fittedvalues,
        'residual': model.resid
    })
    residChart = alt.Chart(residDf).mark_circle(size=40, opacity=0.5).encode(
        x=alt.X('fitted:Q', title='Fitted Values (Log Scale)'),
        y=alt.Y('residual:Q', title='Residuals'),
        tooltip=['fitted', 'residual']
    ).properties(width=500, height=300, title='Residual Plot - Log Model')

    zeroRule = alt.Chart(pd.DataFrame({'y': [0]})).mark_rule(color='red', strokeDash=[5, 5]).encode(y='y:Q')
    residChart + zeroRule
