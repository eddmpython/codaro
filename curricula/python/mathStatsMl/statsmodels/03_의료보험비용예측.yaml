- id: step7_xy_split
  title: 7단계. X와 y 분리
  structuredPrimary: true
  subtitle: 독립변수와 종속변수
  goal: 7단계. X와 y 분리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    logCharges(로그 변환된 보험료)를 종속변수(y)로, 나머지 특성들을 독립변수(X)로 분리합니다. charges(원본 보험료)와 logCharges는 모두 종속변수이므로 X에서 제외합니다. 01, 02 프로젝트에서 배운 것처럼 회귀분석에서 X(원인)와 y(결과)를 명확히 분리하는 것은 필수입니다. drop() 메서드로 특정 컬럼을 제거하여 깔끔하게 분리할 수 있습니다.

    drop()은 컬럼을 제거합니다. axis=1은 컬럼 방향(가로)을 의미합니다. axis=0은 행 방향(세로)입니다. 리스트로 여러 컬럼을 한번에 제거할 수 있습니다.
  snippet: |-
    y = insuranceDummies['logCharges']
    X = insuranceDummies.drop(['charges', 'logCharges'], axis=1)
    X.head()
  exercise:
