    지금까지 배운 integrate, diff, solve를 모두 활용하여 실전 문제를 풀어봅시다. 미션1은 다항식, 삼각함수, 지수함수의 적분과 정적분 계산입니다. 미션2는 두 곡선의 교점을 찾고 그 사이 넓이를 계산합니다. 반원의 넓이를 적분으로 확인하는 문제도 포함되어 있습니다.

