      u = symbols('u', positive=True)

      baseU = 20 - 2*u
      volU = u * baseU * baseU
      dvolU = diff(volU, u)
      critU = solve(dvolU, u)
      critU
    hints:
    - 바꿀 지점은 symbols(), 수식 정의, solve/simplify/diff/integrate 인자입니다.
