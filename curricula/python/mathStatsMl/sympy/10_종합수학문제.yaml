  explanation: 테일러 급수는 복잡한 함수를 다항식으로 근사합니다. e^x = 1 + x + x²/2! + x³/3! + ...이므로 e^0.1 ≈ 1 + 0.1 + 0.005
    + ... ≈ 1.1052입니다. 계산기가 sin, cos, exp를 계산할 때 실제로 테일러 급수를 사용합니다. 항을 많이 포함할수록 정확도가 높아지지만 계산량도 증가합니다.
    근사의 오차 분석은 수치해석의 핵심 주제입니다.
  tips:
