  explanation: |-
    연립일차방정식은 행렬로 체계적으로 풀 수 있습니다. 2x+y=5, x+3y=8을 행렬로 표현하면 [[2,1],[1,3]][x,y]ᵀ = [5,8]ᵀ입니다. 해는 x = A⁻¹b로 구합니다. 변수가 많아져도 같은 방법으로 풀 수 있습니다. 역행렬이 존재하면(det≠0) 유일한 해가 있고, 존재하지 않으면 무한히 많거나 해가 없습니다.

