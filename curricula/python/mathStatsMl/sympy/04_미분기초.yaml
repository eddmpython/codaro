  explanation: 물리학에서 미분의 가장 직관적인 응용은 운동입니다. 위치 함수 s(t)를 시간 t로 미분하면 순간 속도 v(t) = ds/dt가 됩니다. 속도를 한 번 더
    미분하면 가속도 a(t) = dv/dt = d²s/dt²가 됩니다. s(t) = t³-6t²+9t일 때 속도 v(t) = 3t²-12t+9, 가속도 a(t) = 6t-12입니다.
    v(t)=0인 시점에서 물체가 정지합니다.
