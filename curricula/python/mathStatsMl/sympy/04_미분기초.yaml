- id: step10_velocity
  title: 10단계. 속도와 가속도
  structuredPrimary: true
  subtitle: 물리적 의미
  goal: 10단계. 속도와 가속도에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
