      axM1.plot(fprC, tprC, color="coral", linewidth=2)
      axM1.plot([0, 1], [0, 1], "k--")
      axM1.set_xlabel("False Positive Rate")
      axM1.set_ylabel("True Positive Rate")
      axM1.set_title(f"Breast Cancer ROC (AUC = {aucC:.4f})")
      figM1
