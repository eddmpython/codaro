    starterCode: |-
      import pandas as pd
      import numpy as np
      from sklearn.datasets import load_breast_cancer
      from sklearn.model_selection import train_test_split
      from sklearn.preprocessing import StandardScaler
      from sklearn.ensemble import GradientBoostingClassifier
      from sklearn.metrics import roc_auc_score, roc_curve
      import matplotlib.pyplot as plt

      cancer = load_breast_cancer()
      xCancer = pd.DataFrame(cancer.data, columns=cancer.feature_names)
      yCancer = cancer.target

      xTrC, xTeC, yTrC, yTeC = train_test_split(xCancer, yCancer, test_size=0.2, random_state=42)
      scalerC = StandardScaler()
      xTrCsc = scalerC.fit_transform(xTrC)
      xTeCsc = scalerC.transform(xTeC)

      gbC = GradientBoostingClassifier(n_estimators=100, random_state=42)
      gbC.fit(xTrCsc, yTrC)
      probaC = gbC.predict_proba(xTeCsc)[:, 1]
