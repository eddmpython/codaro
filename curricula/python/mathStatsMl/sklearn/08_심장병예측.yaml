- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: Boosting과 ROC-AUC
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    지금까지 배운 개념을 활용하여 미션을 수행해봅시다. 각 미션은 독립적으로 실행 가능합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import pandas as pd
    import numpy as np
    from sklearn.datasets import load_breast_cancer
    from sklearn.model_selection import train_test_split
    from sklearn.preprocessing import StandardScaler
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.metrics import roc_auc_score, roc_curve
    import matplotlib.pyplot as plt

    cancer = load_breast_cancer()
    xCancer = pd.DataFrame(cancer.data, columns=cancer.feature_names)
    yCancer = cancer.target

    xTrC, xTeC, yTrC, yTeC = train_test_split(xCancer, yCancer, test_size=0.2, random_state=42)
    scalerC = StandardScaler()
    xTrCsc = scalerC.fit_transform(xTrC)
    xTeCsc = scalerC.transform(xTeC)

    gbC = GradientBoostingClassifier(n_estimators=100, random_state=42)
    gbC.fit(xTrCsc, yTrC)
    probaC = gbC.predict_proba(xTeCsc)[:, 1]
    aucC = roc_auc_score(yTeC, probaC)
    fprC, tprC, _ = roc_curve(yTeC, probaC)

    figM1, axM1 = plt.subplots(figsize=(7, 6))
    axM1.fill_between(fprC, tprC, alpha=0.3, color="coral")
    axM1.plot(fprC, tprC, color="coral", linewidth=2)
    axM1.plot([0, 1], [0, 1], "k--")
    axM1.set_xlabel("False Positive Rate")
    axM1.set_ylabel("True Positive Rate")
    axM1.set_title(f"Breast Cancer ROC (AUC = {aucC:.4f})")
    figM1
  exercise:
