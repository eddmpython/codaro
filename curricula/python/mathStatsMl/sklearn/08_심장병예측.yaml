intro:
  emoji: ❤️
  goal: GradientBoosting으로 심장병을 예측하고 ROC-AUC로 모델 성능을 평가합니다.
  description: 심장병 데이터는 나이, 성별, 혈압, 콜레스테롤 등의 건강 지표로 구성됩니다. GradientBoosting은 이전 모델의 오차를 보완하는 방식으로 학습합니다.
    ROC-AUC는 임계값에 독립적인 분류 성능 지표입니다.
  direction: 심장병예측에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
