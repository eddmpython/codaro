  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    RandomForest(Bagging)와 GradientBoosting(Boosting)의 성능을 비교합니다.

    Bagging(RF)은 분산을 줄이고, Boosting(GB)은 편향을 줄입니다. 데이터 특성에 따라 적합한 방법이 다릅니다.
  tips:
  - Bagging(RF)은 분산을 줄이고, Boosting(GB)은 편향을 줄입니다. 데이터 특성에 따라 적합한 방법이 다릅니다.
  snippet: |-
    from sklearn.ensemble import RandomForestClassifier

    rf = RandomForestClassifier(n_estimators=100, random_state=42)
    rf.fit(xTrainSc, yTrain)
    rfProba = rf.predict_proba(xTestSc)[:, 1]
    rfAuc = roc_auc_score(yTest, rfProba)

    gbAuc = roc_auc_score(yTest, yProbaPos)

    fprRf, tprRf, _ = roc_curve(yTest, rfProba)

    figComp, axComp = plt.subplots(figsize=(7, 6))
    axComp.plot(fpr, tpr, label=f"GradientBoosting (AUC={gbAuc:.3f})", color="coral")
    axComp.plot(fprRf, tprRf, label=f"RandomForest (AUC={rfAuc:.3f})", color="steelblue")
    axComp.plot([0, 1], [0, 1], "k--")
    axComp.set_xlabel("False Positive Rate")
    axComp.set_ylabel("True Positive Rate")
    axComp.set_title("ROC Comparison: RF vs GB")
    axComp.legend()
    figComp
