  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    learning_rate는 각 트리의 기여도를 조절합니다. 낮을수록 많은 트리가 필요하지만 안정적입니다.

    learning_rate가 너무 높으면 과적합, 너무 낮으면 학습 부족(underfitting)이 발생합니다. 일반적으로 0.01~0.1 사이 값을 사용합니다.
  tips:
  - learning_rate가 너무 높으면 과적합, 너무 낮으면 학습 부족(underfitting)이 발생합니다. 일반적으로 0.01~0.1 사이 값을 사용합니다.
  snippet: |-
    lrList = [0.01, 0.05, 0.1, 0.2, 0.5]
    aucList = []
    for lr in lrList:
        gbTemp = GradientBoostingClassifier(n_estimators=100, learning_rate=lr, max_depth=3, random_state=42)
        gbTemp.fit(xTrainSc, yTrain)
        probaTemp = gbTemp.predict_proba(xTestSc)[:, 1]
        aucList.append(roc_auc_score(yTest, probaTemp))

