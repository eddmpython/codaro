  explanation: |-
    PCA(Principal Component Analysis)는 고차원 데이터를 저차원으로 압축합니다. 64차원 데이터를 2차원으로 축소하면 시각화할 수 있습니다. 정보 손실을 최소화하면서 차원을 줄입니다.

    PCA는 분산을 최대화하는 방향(주성분)을 찾습니다. 첫 번째 주성분이 가장 많은 분산을 설명하고, 두 번째가 그 다음입니다. n_components로 유지할 주성분 수를 지정합니다.
