  description: 소나 데이터는 60개 주파수 대역의 에너지 값으로 구성됩니다. RandomForest는 여러 결정트리를 결합한 앙상블 기법으로, 과적합에 강하고 특성 중요도를
    제공합니다.
  direction: 소나신호분류에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
