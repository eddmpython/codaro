  - 수치 입력 확인 후 최적화/적분/신호 처리에 맞는 코드 입력을 고릅니다.
  - scipy소개 결과를 오차와 결과 범위 기준으로 즉시 점검합니다.
  - 완료한 코드를 과학 계산 루틴에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 업무 흐름 검증 입력 확인
      detail: 입력 기준(수치 입력)과 필요한 조건을 먼저 고정합니다.
    - label: 최적화/적분/신호 처리 처리 실행
