          'Value': [f'{tempsHigh[maxIdx]:.1f}°C', f'{hoursHigh[maxIdx]:.1f}h', f'{tempsHigh[minIdx]:.1f}°C', f'{hoursHigh[minIdx]:.1f}h', f'{tempsHigh[maxIdx] - tempsHigh[minIdx]:.1f}°C']
