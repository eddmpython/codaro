  explanation: 2차 미분방정식은 1차 연립방정식으로 변환하여 풉니다. 조화진동자(스프링-질량 시스템)는 d²x/dt² = -ω²x로, 위치 x와 속도 v = dx/dt 두
    변수의 연립방정식으로 변환합니다.
  tips:
