sections:
- id: method_intro
  title: 리스트 메서드란?
  structuredPrimary: true
  subtitle: 리스트를 조작하는 내장 함수
  goal: 리스트 메서드란?에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    메서드(Method)는 객체가 가지고 있는 함수입니다. 리스트에는 요소를 추가, 삭제, 정렬하는 다양한 메서드가 내장되어 있습니다. 메서드는 리스트 이름 뒤에 점(.)을 찍고 메서드 이름을 쓰는 형식으로 사용합니다. 대부분의 리스트 메서드는 원본 리스트를 직접 변경하며 None을 반환합니다.

    메서드는 원본을 변경하므로 사용 후 리스트가 달라집니다.
  tips:
  - 메서드는 원본을 변경하므로 사용 후 리스트가 달라집니다.
  snippet: |-
    nums = [1, 2, 3]
    nums.append(4)
    nums
  exercise:
    prompt: 리스트 메서드란? 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = [1, 2, 3]
      nums.append(4)
      nums
    hints:
    - 리스트 메서드란? 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 리스트 메서드란? 코드가 예외 없이 끝나야 합니다.
    resultCheck: 리스트 메서드란?에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: append_method
  title: append() 메서드
  structuredPrimary: true
  subtitle: 리스트 끝에 요소 추가
  goal: append() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    append() 메서드는 리스트의 끝에 새로운 요소를 추가합니다. 괄호 안에 추가할 값을 넣으면 리스트 마지막에 그 값이 추가됩니다. 원본 리스트가 직접 변경되며, None을 반환합니다. 리스트를 점진적으로 만들어갈 때 가장 많이 사용하는 메서드입니다.

    append()는 한 번에 하나의 요소만 추가합니다.
  tips:
  - append()는 한 번에 하나의 요소만 추가합니다.
  snippet: |-
    fruits = ['사과', '바나나']
    fruits.append('오렌지')
    fruits.append('포도')
    fruits
  exercise:
    prompt: append() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      fruits = ['사과', '바나나']
      fruits.append('오렌지')
      fruits.append('포도')
      fruits
    hints:
    - append() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: append() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: append() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: insert_method
  title: insert() 메서드
  structuredPrimary: true
  subtitle: 원하는 위치에 요소 추가
  goal: insert() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    insert() 메서드는 리스트의 특정 위치에 요소를 추가합니다. 첫 번째 인수로 인덱스를, 두 번째 인수로 추가할 값을 받습니다. 그 위치에 값이 삽입되고, 기존 요소들은 뒤로 밀립니다. append()와 달리 원하는 위치에 정확히 추가할 수 있습니다.

    insert(0, 값)은 리스트 맨 앞에 추가합니다.
  tips:
  - insert(0, 값)은 리스트 맨 앞에 추가합니다.
  snippet: |-
    colors = ['빨강', '파랑']
    colors.insert(1, '초록')
    colors
  exercise:
    prompt: insert() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      colors = ['빨강', '파랑']
      colors.insert(1, '초록')
      colors
    hints:
    - insert() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: insert() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: insert() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: remove_method
  title: remove() 메서드
  structuredPrimary: true
  subtitle: 값으로 요소 삭제
  goal: remove() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    remove() 메서드는 리스트에서 특정 값을 찾아 삭제합니다. 괄호 안에 삭제할 값을 넣으면 그 값이 처음 나타나는 위치에서 제거됩니다. 같은 값이 여러 개 있어도 첫 번째 것만 삭제됩니다. 값이 리스트에 없으면 에러가 발생합니다.

    값이 여러 개 있어도 첫 번째 것만 삭제됩니다.
  tips:
  - 값이 여러 개 있어도 첫 번째 것만 삭제됩니다.
  snippet: |-
    items = ['사과', '바나나', '오렌지', '바나나']
    items.remove('바나나')
    items
  exercise:
    prompt: remove() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      items = ['사과', '바나나', '오렌지', '바나나']
      items.remove('바나나')
      items
    hints:
    - remove() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: remove() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: remove() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: pop_method
  title: pop() 메서드
  structuredPrimary: true
  subtitle: 인덱스로 요소 삭제하고 반환
  goal: pop() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    pop() 메서드는 리스트에서 특정 인덱스의 요소를 제거하고 그 값을 반환합니다. 괄호 안에 인덱스를 넣으면 그 위치의 요소가 삭제됩니다. 인덱스를 생략하면 마지막 요소가 삭제됩니다. remove()와 달리 삭제된 값을 받을 수 있어 유용합니다.

    pop()은 스택(stack) 자료구조 구현에 자주 사용됩니다.
  tips:
  - pop()은 스택(stack) 자료구조 구현에 자주 사용됩니다.
  snippet: |-
    nums = [10, 20, 30, 40, 50]
    nums.pop()
  exercise:
    prompt: pop() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = [10, 20, 30, 40, 50]
      nums.pop()
    hints:
    - pop() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: pop() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: pop() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: clear_method
  title: clear() 메서드
  structuredPrimary: true
  subtitle: 모든 요소 삭제
  goal: clear() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    clear() 메서드는 리스트의 모든 요소를 삭제하여 빈 리스트로 만듭니다. 리스트 자체는 그대로 유지되고 내용만 비워집니다. 리스트를 초기화할 때 사용합니다. 변수에 []를 할당하는 것과 비슷하지만, 같은 리스트를 참조하는 다른 변수가 있을 때 차이가 있습니다.

    clear()는 리스트를 재사용할 때 유용합니다.
  tips:
  - clear()는 리스트를 재사용할 때 유용합니다.
  snippet: |-
    nums = [1, 2, 3, 4, 5]
    nums.clear()
    nums
  exercise:
    prompt: clear() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = [1, 2, 3, 4, 5]
      nums.clear()
      nums
    hints:
    - clear() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: clear() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: clear() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: extend_method
  title: extend() 메서드
  structuredPrimary: true
  subtitle: 리스트 합치기
  goal: extend() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    extend() 메서드는 리스트에 다른 리스트의 모든 요소를 추가합니다. + 연산자와 비슷하지만, + 는 새 리스트를 만들고 extend()는 원본 리스트를 변경합니다. 여러 요소를 한 번에 추가할 때 append()를 반복하는 것보다 효율적입니다.

    append([4,5,6])은 리스트를 통째로 추가하지만, extend([4,5,6])은 요소들을 개별적으로 추가합니다.
  tips:
  - append([4,5,6])은 리스트를 통째로 추가하지만, extend([4,5,6])은 요소들을 개별적으로 추가합니다.
  snippet: |-
    base = [1, 2, 3]
    extra = [4, 5, 6]
    base.extend(extra)
    base
  exercise:
    prompt: extend() 메서드 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      base = [1, 2, 3]
      extra = [4, 5, 6]
      base.extend(extra)
      base
    hints:
    - extend() 메서드 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: extend() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: extend() 메서드에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: sort_method
  title: sort() 메서드
  structuredPrimary: true
  subtitle: 리스트 정렬
  goal: sort() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    sort() 메서드는 리스트의 요소를 오름차순으로 정렬합니다. 숫자는 작은 것부터, 문자열은 사전 순으로 정렬됩니다. reverse=True 인수를 주면 내림차순으로 정렬됩니다. 원본 리스트가 직접 변경되며, None을 반환합니다.

    sorted() 함수는 원본을 유지하고 정렬된 새 리스트를 반환합니다.
  tips:
  - sorted() 함수는 원본을 유지하고 정렬된 새 리스트를 반환합니다.
  snippet: |-
    data = [5, 2, 8, 1, 9]
    data.sort()
