      def fibonacciSequence(count):
          sequence = []
          prev = 0
          curr = 1
          for i in range(count):
              if i == 0:
                  sequence.append(0)
              elif i == 1:
                  sequence.append(1)
              else:
                  nextVal = prev + curr
                  sequence.append(nextVal)
                  prev = curr
                  curr = nextVal
          return sequence

      fibonacciSequence(10)
