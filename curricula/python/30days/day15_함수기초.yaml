      def getPrimes(maxNum):
          primes = []
          for candidate in range(2, maxNum + 1):
              isPrime = True
              for div in range(2, candidate):
                  if candidate % div == 0:
                      isPrime = False
                      break
              if isPrime:
                  primes.append(candidate)
          return primes

