- id: return_multiple
  title: 여러 값 반환
  structuredPrimary: true
  subtitle: 튜플로 반환
  goal: '여러 값 반환: 실행 가능한 Python 흐름으로 익힌다.'
  why: '여러 값 반환: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    함수는 여러 값을 반환할 수 있습니다. 쉼표로 구분하여 반환하면 튜플로 묶여서 반환됩니다. 호출한 곳에서 여러 변수로 받을 수 있습니다.

    여러 값을 반환하면 자동으로 튜플이 됩니다.
  tips:
  - 여러 값을 반환하면 자동으로 튜플이 됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    def minMax(a, b):
        if a < b:
            return a, b
        else:
            return b, a

    minMax(10, 5)
  exercise:
    prompt: '여러 값 반환: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      def minMax(a, b):
          if a < b:
              return a, b
          else:
              return b, a

      minMax(10, 5)
    solution: |-
      def minMax(a, b):
          if a < b:
              return a, b
          else:
              return b, a

      minMax(10, 5)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 함수는 여러 값을 반환할 수 있습니다. 쉼표로 구분하여 반환하면 튜플로 묶여서 반환됩니다. 호출한 곳에서 여러 변수로 받을 수 있습니다.
  - type: list
    items:
    - return 값1, 값2 형식
    - 튜플로 반환됨
    - 여러 변수로 받기 가능
    - 관련된 값 함께 반환
  - type: code
    language: python
    title: 두 값 반환
    description: 두 개의 값을 반환합니다.
    content: |-
      def minMax(a, b):
          if a < b:
              return a, b
          else:
              return b, a

      minMax(10, 5)
  - type: code
    language: python
    title: 계산 결과들
    description: 여러 계산 결과를 반환합니다.
    content: |-
      def calculate(num):
          double = num * 2
          triple = num * 3
          return double, triple

      calculate(5)
  - type: code
    language: python
    title: 분리해서 받기
    description: 반환된 값을 각각 변수에 저장합니다.
    content: |-
      def getInfo():
          name = 'Python'
          version = 3.9
          return name, version

      lang, ver = getInfo()
      lang
  - type: tip
    content: 여러 값을 반환하면 자동으로 튜플이 됩니다.
- id: no_parameter
  title: 매개변수 없는 함수
  structuredPrimary: true
  subtitle: 입력 없이 실행
