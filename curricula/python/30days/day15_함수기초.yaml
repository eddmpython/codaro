sections:
- id: def_basic
  title: 함수 정의
  structuredPrimary: true
  subtitle: def로 함수 만들기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수는 특정 작업을 수행하는 코드 블록입니다. def 함수명(): 형식으로 정의하며, 들여쓰기로 함수 본문을 작성합니다. 함수를 정의한 후 함수명()으로 호출하여 실행합니다.

    함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  tips:
  - 함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  snippet: |-
    def greet():
        msg = 'Hello'
        return msg

    greet()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def greet():
          msg = 'Hello'
          return msg

      greet()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: return_statement
  title: return 문
  structuredPrimary: true
  subtitle: 값 반환하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    return은 함수의 결과값을 반환합니다. return 값 형식으로 사용하며, 함수 실행을 즉시 종료하고 값을 호출한 곳으로 돌려줍니다. return이 없으면 None을 반환합니다.

    return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  tips:
  - return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  snippet: |-
    def add():
        answer = 10 + 20
        return answer

    add()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def add():
          answer = 10 + 20
          return answer

      add()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: parameter_one
  title: 매개변수 1개
  structuredPrimary: true
  subtitle: 값을 받는 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    매개변수는 함수가 받는 입력값입니다. def 함수명(매개변수): 형식으로 정의하며, 호출시 전달하는 값을 인자라고 합니다. 매개변수를 사용하면 함수를 더 유연하게 만들 수 있습니다.

    매개변수명은 함수 안에서만 유효한 지역 변수입니다.
  tips:
  - 매개변수명은 함수 안에서만 유효한 지역 변수입니다.
  snippet: |-
    def double(num):
        return num * 2

    double(5)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def double(num):
          return num * 2

      double(5)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: parameter_multiple
  title: 매개변수 여러 개
  structuredPrimary: true
  subtitle: 여러 값 받기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수는 여러 개의 매개변수를 받을 수 있습니다. 쉼표로 구분하여 나열하며, 호출시에도 같은 순서로 인자를 전달해야 합니다.

    매개변수 개수와 인자 개수가 일치해야 합니다.
  tips:
  - 매개변수 개수와 인자 개수가 일치해야 합니다.
  snippet: |-
    def addTwo(a, b):
        return a + b

    addTwo(10, 20)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def addTwo(a, b):
          return a + b

      addTwo(10, 20)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: return_multiple
  title: 여러 값 반환
  structuredPrimary: true
  subtitle: 튜플로 반환
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수는 여러 값을 반환할 수 있습니다. 쉼표로 구분하여 반환하면 튜플로 묶여서 반환됩니다. 호출한 곳에서 여러 변수로 받을 수 있습니다.

    여러 값을 반환하면 자동으로 튜플이 됩니다.
  tips:
  - 여러 값을 반환하면 자동으로 튜플이 됩니다.
  snippet: |-
    def minMax(a, b):
        if a < b:
            return a, b
        else:
            return b, a

    minMax(10, 5)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def minMax(a, b):
          if a < b:
              return a, b
          else:
              return b, a

      minMax(10, 5)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: no_parameter
  title: 매개변수 없는 함수
  structuredPrimary: true
  subtitle: 입력 없이 실행
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수는 매개변수가 없어도 됩니다. 항상 같은 값을 반환하거나 내부 로직만 실행하는 함수에 사용합니다. 호출시에도 괄호만 씁니다.

    상수값이나 기본 설정을 반환할 때 유용합니다.
  tips:
  - 상수값이나 기본 설정을 반환할 때 유용합니다.
  snippet: |-
    def getPi():
        return 3.14159

    getPi()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def getPi():
          return 3.14159

      getPi()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: no_return
  title: return 없는 함수
  structuredPrimary: true
  subtitle: 작업만 수행
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수는 return이 없어도 됩니다. return이 없으면 None을 반환합니다. 주로 작업만 수행하고 결과가 필요없을 때 사용합니다.

    반환값이 필요한 함수는 항상 return을 명시하는 것이 좋습니다.
  tips:
  - 반환값이 필요한 함수는 항상 return을 명시하는 것이 좋습니다.
  snippet: |-
    def doSomething():
        x = 10 + 20

    output = doSomething()
    output
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def doSomething():
          x = 10 + 20

      output = doSomething()
      output
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: function_conditional
  title: 함수와 조건문
  structuredPrimary: true
  subtitle: 조건에 따른 처리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수 안에서 조건문을 사용하여 매개변수에 따라 다른 결과를 반환할 수 있습니다. 함수의 유연성이 크게 증가합니다.

    조건문으로 다양한 입력에 대응할 수 있습니다.
  tips:
  - 조건문으로 다양한 입력에 대응할 수 있습니다.
  snippet: |-
    def getGrade(score):
        if score >= 90:
            return 'A'
        elif score >= 80:
            return 'B'
        elif score >= 70:
            return 'C'
        else:
            return 'F'

    getGrade(85)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def getGrade(score):
          if score >= 90:
              return 'A'
          elif score >= 80:
              return 'B'
          elif score >= 70:
              return 'C'
          else:
              return 'F'

      getGrade(85)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: function_loop
  title: 함수와 반복문
  structuredPrimary: true
  subtitle: 반복 처리 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수 안에서 반복문을 사용하여 리스트나 문자열을 처리할 수 있습니다. 반복 로직을 함수로 만들면 재사용이 쉬워집니다.

    복잡한 반복 로직을 함수로 만들면 코드가 깔끔해집니다.
  tips:
  - 복잡한 반복 로직을 함수로 만들면 코드가 깔끔해집니다.
  snippet: |-
    def sumList(numbers):
        acc = 0
        for num in numbers:
            acc = acc + num
        return acc

    sumList([1, 2, 3, 4, 5])
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def sumList(numbers):
          acc = 0
          for num in numbers:
              acc = acc + num
          return acc

      sumList([1, 2, 3, 4, 5])
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: function_reuse
  title: 함수 재사용
  structuredPrimary: true
  subtitle: 같은 함수 여러 번 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수의 가장 큰 장점은 재사용입니다. 한 번 정의한 함수를 여러 곳에서 다른 인자로 호출할 수 있습니다. 코드 중복을 줄이고 유지보수가 쉬워집니다.

    자주 사용하는 로직은 함수로 만들어 재사용하세요.
  tips:
  - 자주 사용하는 로직은 함수로 만들어 재사용하세요.
  snippet: |-
    def square(n):
        return n * n

    sq3 = square(3)
    sq5 = square(5)
    sq7 = square(7)
    sq3, sq5, sq7
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def square(n):
          return n * n

      sq3 = square(3)
      sq5 = square(5)
      sq7 = square(7)
      sq3, sq5, sq7
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: 실무 함수 설계 루프
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    업무 코드는 보통 숫자 하나를 출력하는 데서 끝나지 않습니다. 주문 금액처럼 규칙이 있는 계산을 함수로 감싸고, 실행 전에 결과를 예측한 뒤, 오류 메시지를 읽고 호출을 고치고, 마지막에 검증합니다.

    함수 학습은 def 문법을 외우는 데서 끝내지 말고, 예측 → 실행 → 오류 수정 → 검증 루프를 한 번씩 통과해야 실제 업무 코드로 이어집니다.
  tips:
  - 함수 학습은 def 문법을 외우는 데서 끝내지 말고, 예측 → 실행 → 오류 수정 → 검증 루프를 한 번씩 통과해야 실제 업무 코드로 이어집니다.
  snippet: |-
    order = {
        "items": [12000, 8000, 5000],
        "couponRate": 0.1,
        "deliveryFee": 3000,
    }

    def estimateOrderTotal(items, couponRate, deliveryFee):
        subtotal = sum(items)
        discount = int(subtotal * couponRate)
        total = subtotal - discount + deliveryFee
        return {
            "subtotal": subtotal,
            "discount": discount,
            "total": total,
        }

    estimateOrderTotal(order["items"], order["couponRate"], order["deliveryFee"])
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      order = {
          "items": [12000, 8000, 5000],
          "couponRate": 0.1,
          "deliveryFee": 3000,
      }

      def estimateOrderTotal(items, couponRate, deliveryFee):
          subtotal = sum(items)
          discount = int(subtotal * couponRate)
          total = subtotal - discount + deliveryFee
          return {
              "subtotal": subtotal,
              "discount": discount,
              "total": total,
          }

      estimateOrderTotal(order["items"], order["couponRate"], order["deliveryFee"])
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
