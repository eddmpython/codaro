sections:
- id: def_basic
  title: 함수 정의
  structuredPrimary: true
  subtitle: def로 함수 만들기
  goal: '함수 정의: 실행 가능한 Python 흐름으로 익힌다.'
  why: '함수 정의: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    함수는 특정 작업을 수행하는 코드 블록입니다. def 함수명(): 형식으로 정의하며, 들여쓰기로 함수 본문을 작성합니다. 함수를 정의한 후 함수명()으로 호출하여 실행합니다.

    함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  tips:
  - 함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    def greet():
        msg = 'Hello'
        return msg

    greet()
  exercise:
    prompt: '함수 정의: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      def greet():
          msg = 'Hello'
          return msg

      greet()
    solution: |-
      def greet():
          msg = 'Hello'
          return msg

      greet()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: '함수는 특정 작업을 수행하는 코드 블록입니다. def 함수명(): 형식으로 정의하며, 들여쓰기로 함수 본문을 작성합니다. 함수를 정의한 후 함수명()으로 호출하여 실행합니다.'
  - type: list
    items:
    - 'def 함수명(): 형식'
    - 들여쓰기로 본문 작성
    - 함수명()으로 호출
    - 코드 재사용 가능
  - type: code
    language: python
    title: 함수 정의
    description: 간단한 함수를 정의합니다.
    content: |-
      def greet():
          msg = 'Hello'
          return msg

      greet()
  - type: code
    language: python
    title: 함수 호출
    description: 함수를 여러 번 호출할 수 있습니다.
    content: |-
      def getMessage():
          return 'Welcome'

      first = getMessage()
      second = getMessage()
      first, second
  - type: code
    language: python
    title: 함수 결과 사용
    description: 함수 결과를 변수에 저장하고 사용합니다.
    content: |-
      def getNumber():
          return 42

      num = getNumber()
      twice = num * 2
      twice
  - type: tip
    content: 함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
- id: return_statement
  title: return 문
  structuredPrimary: true
  subtitle: 값 반환하기
  goal: 'return 문: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'return 문: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    return은 함수의 결과값을 반환합니다. return 값 형식으로 사용하며, 함수 실행을 즉시 종료하고 값을 호출한 곳으로 돌려줍니다. return이 없으면 None을 반환합니다.

    return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  tips:
  - return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    def add():
        answer = 10 + 20
        return answer

    add()
  exercise:
    prompt: 'return 문: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      def add():
          answer = 10 + 20
          return answer

      add()
    solution: |-
      def add():
          answer = 10 + 20
          return answer

      add()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: return은 함수의 결과값을 반환합니다. return 값 형식으로 사용하며, 함수 실행을 즉시 종료하고 값을 호출한 곳으로 돌려줍니다. return이 없으면 None을 반환합니다.
  - type: list
    items:
    - return 값 형식
    - 함수 결과 반환
    - 함수 즉시 종료
    - return 없으면 None
  - type: code
    language: python
    title: return 기본
    description: 계산 결과를 반환합니다.
    content: |-
      def add():
          answer = 10 + 20
          return answer

      add()
  - type: code
    language: python
    title: return 즉시
    description: 계산식을 바로 반환합니다.
    content: |-
      def multiply():
          return 5 * 6

      multiply()
  - type: code
    language: python
    title: 조건부 return
    description: 조건에 따라 다른 값을 반환합니다.
    content: |-
      def checkValue():
          value = 15
          if value > 10:
              return 'big'
          else:
              return 'small'

      checkValue()
  - type: tip
    content: return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
- id: parameter_one
