  - type: list
    items:
    - 'def 함수명(매개변수): 형식'
    - '매개변수: 함수가 받는 변수'
    - '인자: 호출시 전달하는 값'
    - 함수 유연성 증가
  - type: code
    language: python
    title: 매개변수 기본
    description: 매개변수를 받아 처리합니다.
    content: |-
      def double(num):
          return num * 2

      double(5)
  - type: code
    language: python
    title: 문자열 매개변수
    description: 문자열을 받아 처리합니다.
    content: |-
      def sayHi(name):
          return 'Hello ' + name

      sayHi('Alice')
  - type: code
    language: python
    title: 조건과 매개변수
    description: 매개변수를 조건문에서 사용합니다.
    content: |-
      def isAdult(age):
          if age >= 18:
              return True
          else:
              return False

      isAdult(25)
