- id: dict_keys_types
  title: 다양한 키 타입
  structuredPrimary: true
  subtitle: 문자열, 숫자, 튜플
  goal: 다양한 키 타입에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리의 키는 변경 불가능한(immutable) 타입이면 모두 사용 가능합니다. 문자열이 가장 많이 사용되지만, 숫자나 튜플도 키로 사용할 수 있습니다. 리스트, 딕셔너리, 집합은 변경 가능(mutable)하므로 키로 사용할 수 없습니다.

    튜플 키는 좌표나 날짜 같은 복합 키에 유용합니다.
  tips:
  - 튜플 키는 좌표나 날짜 같은 복합 키에 유용합니다.
  snippet: |-
    config = {'name': 'Python', 'version': '3.9'}
    config
  exercise:
    prompt: 다양한 키 타입 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
