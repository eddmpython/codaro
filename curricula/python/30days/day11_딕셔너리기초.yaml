      config
    hints:
    - 다양한 키 타입 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 다양한 키 타입 코드가 예외 없이 끝나야 합니다.
    resultCheck: 다양한 키 타입에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '검증 루프: 주문 레코드 만들고 필수 필드 확인'
  structuredPrimary: true
  subtitle: 딕셔너리를 업무 데이터의 작은 레코드로 사용하기
  goal: '검증 루프: 주문 레코드 만들고 필수 필드 확인에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 딕셔너리는 값을 담는 문법이 아니라, 이름이 붙은 업무 데이터를 표현하는 기본 단위입니다. 주문, 사용자, 설정, API 응답처럼 필드가 있는 데이터를 만들고,
    필요한 키가 없을 때 바로 실패하도록 검증해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    order = {
        'orderId': 'ORD-2026-001',
        'customer': '김고객',
        'item': '키보드',
        'quantity': 2,
        'unitPrice': 80000
    }
    order['totalPrice'] = order['quantity'] * order['unitPrice']
    order['status'] = 'ready'

    assert order['orderId'] == 'ORD-2026-001'
    assert order['totalPrice'] == 160000
    assert 'status' in order
    assert len(order) == 7
  exercise:
    prompt: '검증 루프: 주문 레코드 만들고 필수 필드 확인 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.'
    starterCode: |-
      storesByCoord = {
          (37, 127): '서울점',
          (35, 129): '부산점'
      }
      currentCoord = (37, 127)
      storeName = storesByCoord[currentCoord]

      assert storeName == '서울점'
      assert (33, 126) not in storesByCoord
      storeName
    hints:
    - '검증 루프: 주문 레코드 만들고 필수 필드 확인 코드에서 먼저 리스트 값 위치를 찾으세요.'
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: '검증 루프: 주문 레코드 만들고 필수 필드 확인 코드가 예외 없이 끝나야 합니다.'
    resultCheck: '검증 루프: 주문 레코드 만들고 필수 필드 확인에서 바꾼 리스트 값이 결과에 반영되어야 합니다.'
