sections:
- id: dict_intro
  title: 딕셔너리란?
  structuredPrimary: true
  subtitle: 키로 찾는 데이터 저장소
  goal: 딕셔너리란?에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리(Dictionary)는 키(Key)와 값(Value)을 쌍으로 저장하는 자료구조입니다. 중괄호 {}로 만들고, 키:값 형태로 데이터를 저장합니다. 실제 사전처럼 단어(키)로 뜻(값)을 찾듯이, 키를 사용하여 값을 빠르게 찾을 수 있습니다. 리스트는 인덱스(숫자)로 접근하지만, 딕셔너리는 의미있는 키(문자열, 숫자 등)로 접근합니다.

    딕셔너리는 순서를 보장하지 않았지만, Python 3.7부터는 입력 순서를 유지합니다.
  tips:
  - 딕셔너리는 순서를 보장하지 않았지만, Python 3.7부터는 입력 순서를 유지합니다.
  snippet: |-
    lang = {'name': 'Python', 'type': 'Language', 'year': 1991}
    lang
  exercise:
    prompt: 딕셔너리란? 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      lang = {'name': 'Python', 'type': 'Language', 'year': 1991}
      lang
    hints:
    - 딕셔너리란? 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 딕셔너리란? 코드가 예외 없이 끝나야 합니다.
    resultCheck: 딕셔너리란?에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: dict_create
  title: 딕셔너리 생성하기
  structuredPrimary: true
  subtitle: 다양한 방법으로 만들기
  goal: 딕셔너리 생성하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리는 중괄호로 직접 만들거나 dict() 함수를 사용합니다. 빈 딕셔너리는 {}나 dict()로 만듭니다. 키는 문자열, 숫자, 튜플 등 변경 불가능한(immutable) 타입이어야 합니다. 값은 어떤 타입이든 가능합니다.

    리스트는 키로 사용할 수 없지만, 튜플은 가능합니다.
  tips:
  - 리스트는 키로 사용할 수 없지만, 튜플은 가능합니다.
  snippet: |-
    person = {'name': '홍길동', 'age': 25, 'city': '서울'}
    person
  exercise:
    prompt: 딕셔너리 생성하기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      person = {'name': '홍길동', 'age': 25, 'city': '서울'}
      person
    hints:
    - 딕셔너리 생성하기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 딕셔너리 생성하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 딕셔너리 생성하기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: dict_access
  title: 키로 값 접근하기
  structuredPrimary: true
  subtitle: 대괄호 [] 사용
  goal: 키로 값 접근하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리에서 값을 가져올 때는 대괄호 [] 안에 키를 넣습니다. dict[key] 형식으로 사용하면 그 키에 해당하는 값을 반환합니다. 존재하지 않는 키를 사용하면 에러가 발생합니다. 리스트의 인덱스 접근과 비슷하지만, 숫자 대신 키를 사용합니다.

    키 이름을 정확히 입력해야 합니다. 대소문자도 구분합니다.
  tips:
  - 키 이름을 정확히 입력해야 합니다. 대소문자도 구분합니다.
  snippet: |-
    dev = {'name': '김철수', 'age': 30, 'job': 'developer'}
    dev['name']
  exercise:
    prompt: 키로 값 접근하기 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      dev = {'name': '김철수', 'age': 30, 'job': 'developer'}
      dev['name']
    hints:
    - 키로 값 접근하기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 키로 값 접근하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 키로 값 접근하기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: dict_modify
  title: 키로 값 수정하기
  structuredPrimary: true
  subtitle: 기존 값 변경
  goal: 키로 값 수정하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리의 값을 수정할 때는 접근과 동일하게 대괄호를 사용하고 새 값을 할당합니다. dict[key] = new_value 형식입니다. 리스트처럼 원본이 직접 변경됩니다. 이미 있는 키에 값을 할당하면 기존 값이 새 값으로 교체됩니다.

    같은 키에 할당하면 값이 변경됩니다.
  tips:
  - 같은 키에 할당하면 값이 변경됩니다.
  snippet: |-
    laptop = {'name': '노트북', 'price': 1000000, 'stock': 5}
    laptop['price'] = 1200000
    laptop
  exercise:
    prompt: 키로 값 수정하기 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      laptop = {'name': '노트북', 'price': 1000000, 'stock': 5}
      laptop['price'] = 1200000
      laptop
    hints:
    - 키로 값 수정하기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 키로 값 수정하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 키로 값 수정하기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: dict_add
  title: 새 키-값 쌍 추가하기
  structuredPrimary: true
  subtitle: 없는 키에 값 할당
  goal: 새 키값 쌍 추가하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    딕셔너리에 새로운 키-값 쌍을 추가할 때도 대괄호를 사용합니다. 존재하지 않는 키에 값을 할당하면 자동으로 새 항목이 추가됩니다. dict[new_key] = value 형식입니다. 리스트의 append()처럼 별도의 메서드 없이 간단히 추가할 수 있습니다.

    없는 키에 할당하면 추가, 있는 키에 할당하면 수정됩니다.
  tips:
  - 없는 키에 할당하면 추가, 있는 키에 할당하면 수정됩니다.
  snippet: |-
    member = {'name': '이영희', 'age': 28}
    member['city'] = '부산'
    member
  exercise:
    prompt: 새 키값 쌍 추가하기 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      member = {'name': '이영희', 'age': 28}
      member['city'] = '부산'
      member
    hints:
    - 새 키값 쌍 추가하기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 새 키값 쌍 추가하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 새 키값 쌍 추가하기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: dict_delete
  title: del로 키-값 삭제
  structuredPrimary: true
  subtitle: 항목 제거하기
  goal: del로 키값 삭제에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    del 키워드를 사용하여 딕셔너리에서 특정 키-값 쌍을 삭제할 수 있습니다. del dict[key] 형식으로 사용하며, 해당 키와 값이 함께 제거됩니다. 존재하지 않는 키를 삭제하려 하면 에러가 발생합니다.

    del은 변수 자체를 삭제할 때도 사용됩니다.
  tips:
  - del은 변수 자체를 삭제할 때도 사용됩니다.
  snippet: |-
    alpha = {'a': 1, 'b': 2, 'c': 3, 'd': 4}
    del alpha['b']
    alpha
  exercise:
    prompt: del로 키값 삭제 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      alpha = {'a': 1, 'b': 2, 'c': 3, 'd': 4}
      del alpha['b']
      alpha
    hints:
    - del로 키값 삭제 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: del로 키값 삭제 코드가 예외 없이 끝나야 합니다.
    resultCheck: del로 키값 삭제에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: dict_membership
  title: in/not in 연산자
  structuredPrimary: true
  subtitle: 키 존재 확인
  goal: in/not in 연산자에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    in과 not in 연산자로 딕셔너리에 특정 키가 있는지 확인할 수 있습니다. key in dict 형식으로 사용하며, 키의 존재 여부를 True/False로 반환합니다. 주의할 점은 키를 확인하는 것이지 값을 확인하는 것이 아닙니다.

    값의 존재를 확인하려면 values() 메서드를 사용해야 합니다(Day 12).
  tips:
  - 값의 존재를 확인하려면 values() 메서드를 사용해야 합니다(Day 12).
  snippet: |-
    grades = {'math': 85, 'english': 90, 'science': 88}
    'math' in grades
  exercise:
    prompt: in/not in 연산자 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      grades = {'math': 85, 'english': 90, 'science': 88}
      'math' in grades
    hints:
    - in/not in 연산자 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: in/not in 연산자 코드가 예외 없이 끝나야 합니다.
    resultCheck: in/not in 연산자에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: dict_length
  title: 딕셔너리 길이
  structuredPrimary: true
  subtitle: len() 함수
  goal: 딕셔너리 길이에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    len() 함수는 딕셔너리의 키-값 쌍 개수를 반환합니다. 리스트, 튜플, 집합과 동일하게 작동합니다. 딕셔너리가 몇 개의 항목을 가지고 있는지 알 수 있습니다.

    len()은 키의 개수를 셉니다. 값의 개수가 아닙니다.
  tips:
  - len()은 키의 개수를 셉니다. 값의 개수가 아닙니다.
  snippet: |-
    profile = {'name': '박민수', 'age': 35, 'city': '대구', 'job': 'teacher'}
    len(profile)
  exercise:
