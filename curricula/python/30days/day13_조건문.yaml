    starterCode: |-
      userAge = 25
      isMember = True
      if userAge >= 18 and isMember:
          rate = 0.2
      else:
          rate = 0
      rate
    solution: |-
      userAge = 25
      isMember = True
      if userAge >= 18 and isMember:
          rate = 0.2
      else:
          rate = 0
      rate
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: and 연산자는 양쪽 조건이 모두 True일 때만 True를 반환합니다. 여러 조건을 동시에 만족해야 할 때 사용합니다. 조건1 and 조건2 형식입니다.
  - type: list
    items:
    - 양쪽 모두 True일 때만 True
    - 하나라도 False면 False
    - 여러 조건 동시 검사
    - 조건1 and 조건2 형식
  - type: code
    language: python
