          orderStatus = 'rejected'
      else:
          orderStatus = 'confirmed'

      assert orderStatus == 'confirmed'
  - type: code
    language: python
    title: 조건 순서 오류 비교
    description: 고위험 주문은 재고가 있어도 먼저 검토로 보내야 합니다.
    content: |-
      stockCount = 5
      requestCount = 3
      paidAmount = 90000
      riskScore = 90

      if requestCount <= stockCount and paidAmount > 0:
          wrongStatus = 'confirmed'
      elif riskScore >= 80:
          wrongStatus = 'review'
      else:
          wrongStatus = 'rejected'

      if riskScore >= 80:
          rightStatus = 'review'
      elif requestCount <= stockCount and paidAmount > 0:
          rightStatus = 'confirmed'
      else:
          rightStatus = 'rejected'

      assert wrongStatus == 'confirmed'
      assert rightStatus == 'review'
  - type: code
    language: python
    title: 경계값 케이스 검증
    description: 조건문은 대표값뿐 아니라 경계값도 함께 확인해야 합니다.
    content: |-
      def decideOrder(stockCount, requestCount, paidAmount, riskScore):
          if riskScore >= 80:
              return 'review'
          if requestCount > stockCount:
              return 'rejected'
          if paidAmount <= 0:
              return 'rejected'
          return 'confirmed'


      assert decideOrder(5, 5, 10000, 79) == 'confirmed'
      assert decideOrder(5, 6, 10000, 10) == 'rejected'
      assert decideOrder(5, 1, 0, 10) == 'rejected'
      assert decideOrder(5, 1, 10000, 80) == 'review'
  - type: code
    language: python
    title: 잘못된 조건값을 먼저 실패시킨다
    description: 조건문에 들어가기 전에 음수 수량과 잘못된 위험 점수를 차단합니다.
    content: |-
      def decideOrderSafely(stockCount, requestCount, paidAmount, riskScore):
          if stockCount < 0 or requestCount < 0:
              raise ValueError('count must not be negative')
          if not 0 <= riskScore <= 100:
              raise ValueError('riskScore must be between 0 and 100')
          return decideOrder(stockCount, requestCount, paidAmount, riskScore)

      try:
          decideOrderSafely(5, -1, 10000, 10)
      except ValueError as exc:
          conditionInputError = str(exc)

      assert 'count' in conditionInputError
      conditionInputError
  - type: expansion
    title: '실무 변주: 알림 등급 결정'
