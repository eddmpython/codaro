sections:
- id: if_basic
  title: if 기본
  structuredPrimary: true
  subtitle: 조건이 참일 때 실행
  goal: 'if 기본: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'if 기본: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    if문은 조건이 True일 때만 코드를 실행합니다. if 조건: 형식으로 쓰며, 조건 뒤에 콜론(:)을 붙이고 실행할 코드는 들여쓰기합니다. 조건이 False면 if 블록을 건너뜁니다.

    if문의 조건은 비교 연산자, 논리 연산자, in 연산자 등을 사용할 수 있습니다.
  tips:
  - if문의 조건은 비교 연산자, 논리 연산자, in 연산자 등을 사용할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    age = 20
    if age >= 18:
        result = 'adult'
    result
  exercise:
    prompt: 'if 기본: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      age = 20
      if age >= 18:
          result = 'adult'
      result
    solution: |-
      age = 20
      if age >= 18:
          result = 'adult'
      result
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 'if문은 조건이 True일 때만 코드를 실행합니다. if 조건: 형식으로 쓰며, 조건 뒤에 콜론(:)을 붙이고 실행할 코드는 들여쓰기합니다. 조건이 False면 if 블록을 건너뜁니다.'
  - type: list
    items:
    - 'if 조건: 형식'
    - 조건이 True면 실행
    - 조건이 False면 건너뜀
    - 들여쓰기로 블록 구분
  - type: code
    language: python
    title: if 기본
    description: 조건이 참이면 실행됩니다.
    content: |-
      age = 20
      if age >= 18:
          result = 'adult'
      result
  - type: code
    language: python
    title: if 조건 거짓
    description: 조건이 거짓이면 건너뜁니다.
    content: |-
      score = 50
      if score >= 90:
          grade = 'A'
      score
  - type: code
    language: python
    title: if 변수 수정
    description: 조건에 따라 변수를 수정합니다.
    content: |-
      cost = 10000
      if cost > 5000:
          cost = cost - 1000
      cost
  - type: tip
    content: if문의 조건은 비교 연산자, 논리 연산자, in 연산자 등을 사용할 수 있습니다.
- id: if_else
  title: if-else
  structuredPrimary: true
  subtitle: 조건에 따른 양방향 분기
  goal: 'if-else: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'if-else: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    else는 if 조건이 False일 때 실행됩니다. if-else를 사용하면 조건에 따라 둘 중 하나가 반드시 실행됩니다. else 뒤에도 콜론(:)을 붙이고 들여쓰기합니다.

    if-else는 둘 중 하나를 반드시 선택해야 할 때 유용합니다.
  tips:
  - if-else는 둘 중 하나를 반드시 선택해야 할 때 유용합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    num = 7
    if num % 2 == 0:
        parity = 'even'
    else:
        parity = 'odd'
    parity
  exercise:
    prompt: 'if-else: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      num = 7
      if num % 2 == 0:
          parity = 'even'
      else:
          parity = 'odd'
      parity
    solution: |-
      num = 7
      if num % 2 == 0:
          parity = 'even'
      else:
          parity = 'odd'
      parity
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: else는 if 조건이 False일 때 실행됩니다. if-else를 사용하면 조건에 따라 둘 중 하나가 반드시 실행됩니다. else 뒤에도 콜론(:)을 붙이고 들여쓰기합니다.
  - type: list
    items:
    - if-else로 양방향 분기
    - 조건이 True면 if 블록
    - 조건이 False면 else 블록
    - 둘 중 하나는 반드시 실행
  - type: code
    language: python
    title: if-else 기본
    description: 조건에 따라 다른 값을 할당합니다.
    content: |-
      num = 7
      if num % 2 == 0:
          parity = 'even'
      else:
          parity = 'odd'
      parity
  - type: code
    language: python
    title: 성인 판별
    description: 나이에 따라 성인 여부를 판별합니다.
    content: |-
      years = 16
      if years >= 18:
          status = 'adult'
      else:
          status = 'minor'
      status
  - type: code
    language: python
    title: 할인 적용
    description: 가격에 따라 할인을 적용합니다.
    content: |-
      amount = 15000
      if amount >= 10000:
          final = amount - 2000
      else:
          final = amount
      final
  - type: tip
    content: if-else는 둘 중 하나를 반드시 선택해야 할 때 유용합니다.
- id: if_elif_else
  title: if-elif-else
  structuredPrimary: true
  subtitle: 다중 조건 분기
  goal: 'if-elif-else: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'if-elif-else: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    elif는 else if의 줄임말로, 여러 조건을 순차적으로 검사합니다. if-elif-else를 사용하면 3개 이상의 경우를 나눌 수 있습니다. 위에서부터 조건을 검사하여 처음 True인 블록만 실행됩니다.

    elif는 여러 개 사용할 수 있으며, else는 생략 가능합니다.
  tips:
  - elif는 여러 개 사용할 수 있으며, else는 생략 가능합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    point = 85
    if point >= 90:
        level = 'A'
    elif point >= 80:
        level = 'B'
    elif point >= 70:
        level = 'C'
    else:
        level = 'F'
    level
  exercise:
    prompt: 'if-elif-else: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      point = 85
      if point >= 90:
          level = 'A'
      elif point >= 80:
          level = 'B'
      elif point >= 70:
          level = 'C'
      else:
          level = 'F'
      level
    solution: |-
      point = 85
      if point >= 90:
          level = 'A'
      elif point >= 80:
          level = 'B'
      elif point >= 70:
          level = 'C'
      else:
          level = 'F'
      level
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: elif는 else if의 줄임말로, 여러 조건을 순차적으로 검사합니다. if-elif-else를 사용하면 3개 이상의 경우를 나눌 수 있습니다. 위에서부터 조건을 검사하여 처음 True인 블록만
      실행됩니다.
  - type: list
    items:
    - elif로 다중 조건 검사
    - 위에서부터 순서대로 검사
    - 첫 번째 True 블록만 실행
    - 모두 False면 else 실행
  - type: code
    language: python
    title: 성적 등급
    description: 점수에 따라 등급을 부여합니다.
    content: |-
      point = 85
      if point >= 90:
          level = 'A'
      elif point >= 80:
          level = 'B'
      elif point >= 70:
          level = 'C'
      else:
          level = 'F'
      level
  - type: code
    language: python
    title: 온도 분류
    description: 온도에 따라 분류합니다.
    content: |-
      temp = 25
      if temp >= 30:
          weather = 'hot'
      elif temp >= 20:
          weather = 'warm'
      elif temp >= 10:
          weather = 'cool'
      else:
          weather = 'cold'
      weather
  - type: code
    language: python
    title: 요금 계산
    description: 거리에 따라 요금을 계산합니다.
    content: |-
      distance = 15
      if distance <= 5:
          fare = 1000
      elif distance <= 10:
          fare = 2000
      elif distance <= 20:
          fare = 3000
      else:
          fare = 5000
      fare
  - type: tip
    content: elif는 여러 개 사용할 수 있으며, else는 생략 가능합니다.
- id: condition_compare
  title: 비교 연산자와 조건문
  structuredPrimary: true
  subtitle: 크기 비교로 조건 판별
  goal: '비교 연산자와 조건문: 실행 가능한 Python 흐름으로 익힌다.'
  why: '비교 연산자와 조건문: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    비교 연산자(==, !=, >, <, >=, <=)는 조건문에서 가장 많이 사용됩니다. 두 값을 비교하여 True/False를 반환하며, 이를 if문의 조건으로 사용합니다.

    문자열도 비교 연산자로 비교할 수 있습니다(사전 순서).
  tips:
  - 문자열도 비교 연산자로 비교할 수 있습니다(사전 순서).
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    password = '1234'
    if password == '1234':
        access = 'granted'
    else:
        access = 'denied'
    access
  exercise:
    prompt: '비교 연산자와 조건문: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      password = '1234'
      if password == '1234':
          access = 'granted'
      else:
          access = 'denied'
      access
    solution: |-
      password = '1234'
      if password == '1234':
          access = 'granted'
      else:
          access = 'denied'
      access
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 비교 연산자(==, !=, >, <, >=, <=)는 조건문에서 가장 많이 사용됩니다. 두 값을 비교하여 True/False를 반환하며, 이를 if문의 조건으로 사용합니다.
  - type: list
    items:
    - '==: 같음'
    - '!=: 다름'
    - '>, <: 크기 비교'
    - '>=, <=: 이상, 이하'
  - type: code
    language: python
    title: 같음 비교
    description: 값이 같은지 비교합니다.
    content: |-
      password = '1234'
      if password == '1234':
          access = 'granted'
      else:
          access = 'denied'
      access
  - type: code
    language: python
    title: 다름 비교
    description: 값이 다른지 비교합니다.
    content: |-
      stock = 0
      if stock != 0:
          available = True
      else:
          available = False
      available
  - type: code
    language: python
    title: 크기 비교
    description: 크기를 비교합니다.
    content: |-
      speed = 120
      if speed > 100:
          warning = 'overspeed'
      else:
          warning = 'normal'
      warning
  - type: tip
    content: 문자열도 비교 연산자로 비교할 수 있습니다(사전 순서).
- id: condition_and
  title: 논리 연산자 and
  structuredPrimary: true
  subtitle: 여러 조건을 모두 만족
  goal: '논리 연산자 and: 실행 가능한 Python 흐름으로 익힌다.'
  why: '논리 연산자 and: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    and 연산자는 양쪽 조건이 모두 True일 때만 True를 반환합니다. 여러 조건을 동시에 만족해야 할 때 사용합니다. 조건1 and 조건2 형식입니다.

    범위 검사는 50 <= value <= 100 형식으로도 가능합니다.
