      car1.model, car2.model
    hints:
    - 여러 인스턴스 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 여러 인스턴스 코드가 예외 없이 끝나야 합니다.
    resultCheck: 여러 인스턴스에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 주문 객체로 상태와 합계 관리하기'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '현업 흐름 검증: 주문 객체로 상태와 합계 관리하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 클래스의 핵심은 관련 데이터와 행동을 한 곳에 묶는 것입니다. 주문처럼 상태가 변하고 규칙이 붙는 데이터는 딕셔너리만으로 계속 다루면 실수가 늘어납니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Order:
        def __init__(self, orderId):
            self.orderId = orderId
            self.items = []
            self.status = "draft"

        def addItem(self, name, price, quantity=1):
            if price <= 0:
                raise ValueError("price must be positive")
            if quantity <= 0:
                raise ValueError("quantity must be positive")

            self.items.append({
                "name": name,
                "price": price,
                "quantity": quantity,
            })

        def total(self):
            amount = 0
            for item in self.items:
                amount += item["price"] * item["quantity"]
            return amount

        def markPaid(self):
            if not self.items:
                raise ValueError("empty order cannot be paid")
            self.status = "paid"

    firstOrder = Order("A-100")
    secondOrder = Order("A-101")

    firstOrder.addItem("keyboard", 50000, 1)
    firstOrder.addItem("mouse", 20000, 2)
    secondOrder.addItem("monitor", 180000, 1)

    assert firstOrder.total() == 90000
    assert secondOrder.total() == 180000
    assert firstOrder.items != secondOrder.items

    firstOrder.markPaid()
    assert firstOrder.status == "paid"
    assert secondOrder.status == "draft"

    try:
        secondOrder.addItem("broken item", -1000)
    except ValueError as exc:
        assert "price" in str(exc)

    print("주문 객체 흐름 통과")
  exercise:
    prompt: '현업 흐름 검증: 주문 객체로 상태와 합계 관리하기 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.'
    starterCode: |-
      class Order:
          def __init__(self, orderId):
              self.orderId = orderId
              self.items = []
              self.status = "draft"

          def addItem(self, name, price, quantity=1):
              if price <= 0:
                  raise ValueError("price must be positive")
              if quantity <= 0:
                  raise ValueError("quantity must be positive")

              self.items.append({
                  "name": name,
                  "price": price,
                  "quantity": quantity,
              })

          def total(self):
              amount = 0
              for item in self.items:
                  amount += item["price"] * item["quantity"]
              return amount

          def markPaid(self):
              if not self.items:
                  raise ValueError("empty order cannot be paid")
              self.status = "paid"

      firstOrder = Order("A-100")
      secondOrder = Order("A-101")

      firstOrder.addItem("keyboard", 50000, 1)
      firstOrder.addItem("mouse", 20000, 2)
      secondOrder.addItem("monitor", 180000, 1)

      assert firstOrder.total() == 90000
      assert secondOrder.total() == 180000
      assert firstOrder.items != secondOrder.items

      firstOrder.markPaid()
      assert firstOrder.status == "paid"
      assert secondOrder.status == "draft"

      try:
          secondOrder.addItem("broken item", -1000)
      except ValueError as exc:
          assert "price" in str(exc)

