sections:
- id: class_basic
  title: 클래스 정의
  structuredPrimary: true
  subtitle: class 키워드
  goal: 클래스 정의에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    클래스는 객체를 만드는 설계도입니다. class 키워드로 클래스를 정의하고, 클래스명()으로 인스턴스를 생성합니다. 클래스명은 대문자로 시작하는 것이 관례입니다.

    클래스는 데이터와 기능을 하나로 묶는 도구입니다.
  tips:
  - 클래스는 데이터와 기능을 하나로 묶는 도구입니다.
  snippet: |-
    class Dog:
        pass

    myDog = Dog()
    type(myDog)
  exercise:
    prompt: 클래스 정의 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Dog:
          pass

      myDog = Dog()
      type(myDog)
    hints:
    - 클래스 정의 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 클래스 정의 코드가 예외 없이 끝나야 합니다.
    resultCheck: 클래스 정의에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: init_method
  title: __init__ 메서드
  structuredPrimary: true
  subtitle: 초기화 메서드
  goal: init 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    __init__ 메서드는 인스턴스 생성 시 자동으로 호출되는 특별한 메서드입니다. 인스턴스의 초기 속성값을 설정하는 데 사용합니다. 첫 번째 매개변수는 항상 self입니다.

    __init__은 생성자처럼 동작하지만 엄밀히는 초기화 메서드입니다.
  tips:
  - __init__은 생성자처럼 동작하지만 엄밀히는 초기화 메서드입니다.
  snippet: |-
    class Employee:
        def __init__(self, name):
            self.name = name

    alice = Employee('Alice')
    alice.name
  exercise:
    prompt: init 메서드 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Employee:
          def __init__(self, name):
              self.name = name

      alice = Employee('Alice')
      alice.name
    hints:
    - init 메서드 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: init 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: init 메서드에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: self_parameter
  title: self 이해하기
  structuredPrimary: true
  subtitle: 인스턴스 자신을 가리키는 참조
  goal: self 이해하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    self는 인스턴스 자신을 가리키는 참조입니다. 메서드의 첫 번째 매개변수로 self를 받고, self.속성명으로 인스턴스 속성에 접근합니다. 메서드 호출 시 self는 자동으로 전달됩니다.

    self는 관례적인 이름이지만 다른 이름도 가능합니다. 하지만 self를 사용하는 것이 표준입니다.
  tips:
  - self는 관례적인 이름이지만 다른 이름도 가능합니다. 하지만 self를 사용하는 것이 표준입니다.
  snippet: |-
    class Tracker:
        def __init__(self):
            self.count = 0

    cnt = Tracker()
    cnt.count
  exercise:
    prompt: self 이해하기 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Tracker:
          def __init__(self):
              self.count = 0

      cnt = Tracker()
      cnt.count
    hints:
    - self 이해하기 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: self 이해하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: self 이해하기에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: instance_method
  title: 인스턴스 메서드
  structuredPrimary: true
  subtitle: 클래스의 함수
  goal: 인스턴스 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    인스턴스 메서드는 클래스 내부에 정의된 함수입니다. 첫 번째 매개변수로 self를 받고, 인스턴스.메서드명()으로 호출합니다. 메서드는 인스턴스의 속성을 사용하거나 수정할 수 있습니다.

    메서드는 인스턴스의 동작을 정의합니다.
  tips:
  - 메서드는 인스턴스의 동작을 정의합니다.
  snippet: |-
    class Greeter:
        def __init__(self, name):
            self.name = name

        def greet(self):
            return 'Hello, ' + self.name

    g = Greeter('Bob')
    g.greet()
  exercise:
    prompt: 인스턴스 메서드 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Greeter:
          def __init__(self, name):
              self.name = name

          def greet(self):
              return 'Hello, ' + self.name

      g = Greeter('Bob')
      g.greet()
    hints:
    - 인스턴스 메서드 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 인스턴스 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: 인스턴스 메서드에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: instance_attribute
  title: 인스턴스 속성
  structuredPrimary: true
  subtitle: 인스턴스의 데이터
  goal: 인스턴스 속성에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    인스턴스 속성은 각 인스턴스가 가지는 고유한 데이터입니다. self.속성명으로 정의하고 접근합니다. 각 인스턴스는 독립적인 속성값을 가집니다.

    속성은 인스턴스의 상태를 나타냅니다.
  tips:
  - 속성은 인스턴스의 상태를 나타냅니다.
  snippet: |-
    class User:
        def __init__(self, name, age):
            self.name = name
            self.age = age

    user1 = User('Alice', 25)
    user2 = User('Bob', 30)
    user1.age, user2.age
  exercise:
    prompt: 인스턴스 속성 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class User:
          def __init__(self, name, age):
              self.name = name
              self.age = age

      user1 = User('Alice', 25)
      user2 = User('Bob', 30)
      user1.age, user2.age
    hints:
    - 인스턴스 속성 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 인스턴스 속성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 인스턴스 속성에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: multiple_instances
  title: 여러 인스턴스
  structuredPrimary: true
  subtitle: 클래스로부터 여러 객체 생성
  goal: 여러 인스턴스에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    하나의 클래스로부터 여러 인스턴스를 생성할 수 있습니다. 각 인스턴스는 같은 구조를 가지지만 독립적인 데이터를 저장합니다. 클래스는 설계도이고 인스턴스는 실제 객체입니다.

    클래스는 재사용 가능한 코드 템플릿입니다.
  tips:
  - 클래스는 재사용 가능한 코드 템플릿입니다.
  snippet: |-
    class Car:
        def __init__(self, model, color):
            self.model = model
            self.color = color

    car1 = Car('Tesla', 'red')
    car2 = Car('BMW', 'blue')
    car1.model, car2.model
  exercise:
