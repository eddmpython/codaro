sections:
- id: for_list
  title: for 리스트 순회
  structuredPrimary: true
  subtitle: 리스트의 모든 요소 처리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    for문은 리스트의 요소를 하나씩 꺼내서 처리합니다. for 변수 in 리스트: 형식으로 쓰며, 리스트의 모든 요소에 대해 반복합니다. 들여쓰기로 반복할 코드 블록을 구분합니다.

    변수명은 의미있게 짓세요. for item in items보다 for fruit in fruits가 좋습니다.
  tips:
  - 변수명은 의미있게 짓세요. for item in items보다 for fruit in fruits가 좋습니다.
  snippet: |-
    numbers = [1, 2, 3, 4, 5]
    total = 0
    for num in numbers:
        total = total + num
    total
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      numbers = [1, 2, 3, 4, 5]
      total = 0
      for num in numbers:
          total = total + num
      total
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: for_string
  title: for 문자열 순회
  structuredPrimary: true
  subtitle: 문자열의 각 문자 처리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    for문은 문자열의 각 문자를 하나씩 꺼낼 수 있습니다. 문자열도 시퀀스이므로 리스트처럼 순회할 수 있습니다. 각 문자에 대해 반복 작업을 수행합니다.

    문자열은 변경 불가능하므로 새 문자열을 만들어야 합니다.
  tips:
  - 문자열은 변경 불가능하므로 새 문자열을 만들어야 합니다.
  snippet: |-
    msg = 'hello world'
    found = 0
    for char in msg:
        if char == 'o':
            found = found + 1
    found
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      msg = 'hello world'
      found = 0
      for char in msg:
          if char == 'o':
              found = found + 1
      found
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: for_dict
  title: for 딕셔너리 순회
  structuredPrimary: true
  subtitle: 키, 값, 아이템 순회
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    딕셔너리는 keys(), values(), items()로 순회할 수 있습니다. 기본적으로 for문은 키를 순회하며, items()를 사용하면 키-값 쌍을 튜플로 받을 수 있습니다.

    items()를 사용하면 키와 값을 동시에 받을 수 있어 편리합니다.
  tips:
  - items()를 사용하면 키와 값을 동시에 받을 수 있어 편리합니다.
  snippet: |-
    grades = {'math': 85, 'english': 90, 'science': 88}
    subjects = ''
    for subject in grades:
        subjects = subjects + subject + ' '
    subjects
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      grades = {'math': 85, 'english': 90, 'science': 88}
      subjects = ''
      for subject in grades:
          subjects = subjects + subject + ' '
      subjects
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: range_basic
  title: range() 함수
  structuredPrimary: true
  subtitle: 숫자 시퀀스 생성
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    range() 함수는 숫자 시퀀스를 생성합니다. range(끝), range(시작, 끝), range(시작, 끝, 간격) 형식으로 사용하며, list()로 변환하면 리스트로 볼 수 있습니다. 끝 값은 포함되지 않습니다.

    range()는 메모리 효율적입니다. 필요할 때만 값을 생성합니다.
  tips:
  - range()는 메모리 효율적입니다. 필요할 때만 값을 생성합니다.
  snippet: list(range(5))
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: list(range(5))
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: for_range
  title: range()와 for
  structuredPrimary: true
  subtitle: 정해진 횟수만큼 반복
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    range()와 for를 함께 사용하면 정해진 횟수만큼 반복할 수 있습니다. 인덱스를 이용한 순회나 n번 반복하는 작업에 유용합니다.

    리스트 순회시 인덱스가 필요없다면 for item in items를 사용하세요.
  tips:
  - 리스트 순회시 인덱스가 필요없다면 for item in items를 사용하세요.
  snippet: |-
    rangeSum = 0
    for i in range(1, 6):
        rangeSum = rangeSum + i
    rangeSum
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      rangeSum = 0
      for i in range(1, 6):
          rangeSum = rangeSum + i
      rangeSum
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: while_basic
  title: while 기본
  structuredPrimary: true
  subtitle: 조건이 참인 동안 반복
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    while문은 조건이 True인 동안 계속 반복합니다. while 조건: 형식으로 쓰며, 조건이 False가 되면 반복을 멈춥니다. 무한 루프에 주의해야 합니다.

    while문에서는 조건을 변경하는 코드를 반드시 포함해야 합니다.
  tips:
  - while문에서는 조건을 변경하는 코드를 반드시 포함해야 합니다.
  snippet: |-
    idx = 0
    acc = 0
    while idx < 5:
        acc = acc + idx
        idx = idx + 1
    acc
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      idx = 0
      acc = 0
      while idx < 5:
          acc = acc + idx
          idx = idx + 1
      acc
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: break_statement
  title: break 문
  structuredPrimary: true
  subtitle: 반복문 즉시 종료
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    break는 반복문을 즉시 종료합니다. 조건을 만족하면 더 이상 반복하지 않고 빠져나올 때 사용합니다. for와 while 모두에서 사용할 수 있습니다.

    break는 가장 가까운 반복문 하나만 종료합니다.
  tips:
  - break는 가장 가까운 반복문 하나만 종료합니다.
  snippet: |-
    seq = [1, 2, 3, 4, 5, 6, 7, 8]
    hit = 0
    for x in seq:
        if x > 5:
            hit = x
            break
    hit
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      seq = [1, 2, 3, 4, 5, 6, 7, 8]
      hit = 0
      for x in seq:
          if x > 5:
              hit = x
              break
      hit
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: continue_statement
  title: continue 문
  structuredPrimary: true
  subtitle: 현재 반복 건너뛰기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    continue는 현재 반복을 건너뛰고 다음 반복으로 넘어갑니다. 특정 조건에서 처리를 생략하고 싶을 때 사용합니다. 반복문 자체는 종료되지 않습니다.

    continue는 if-else 구조를 단순화할 때 유용합니다.
  tips:
  - continue는 if-else 구조를 단순화할 때 유용합니다.
  snippet: |-
    odd = 0
    for n in range(1, 11):
        if n % 2 == 0:
            continue
        odd = odd + n
    odd
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      odd = 0
      for n in range(1, 11):
          if n % 2 == 0:
              continue
          odd = odd + n
      odd
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: for_else
  title: for-else 절
  structuredPrimary: true
  subtitle: 정상 종료시 실행
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    for문은 else 절을 가질 수 있습니다. 반복이 break 없이 정상적으로 완료되면 else 블록이 실행됩니다. break로 중단되면 else는 실행되지 않습니다.

    for-else는 검색 작업에서 찾았는지 여부를 판별할 때 유용합니다.
  tips:
  - for-else는 검색 작업에서 찾았는지 여부를 판별할 때 유용합니다.
  snippet: |-
    arr1 = [1, 2, 3, 4, 5]
    for a in arr1:
        if a > 10:
            flag = 'found big'
            break
    else:
        flag = 'all small'
    flag
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      arr1 = [1, 2, 3, 4, 5]
      for a in arr1:
          if a > 10:
              flag = 'found big'
              break
      else:
          flag = 'all small'
      flag
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: while_else
  title: while-else 절
  structuredPrimary: true
  subtitle: 조건 거짓시 실행
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    while문도 else 절을 가질 수 있습니다. 조건이 False가 되어 정상 종료되면 else가 실행됩니다. break로 중단되면 else는 실행되지 않습니다.

    while-else는 제한 조건 검사에 유용합니다.
  tips:
  - while-else는 제한 조건 검사에 유용합니다.
  snippet: |-
    counter = 0
    while counter < 3:
        counter = counter + 1
    else:
        completion = 'done'
    completion
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      counter = 0
      while counter < 3:
          counter = counter + 1
      else:
          completion = 'done'
      completion
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: nested_loop
  title: 중첩 반복문
  structuredPrimary: true
  subtitle: 반복문 안의 반복문
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    반복문 안에 다시 반복문을 넣을 수 있습니다. 이를 중첩 반복문이라고 하며, 2차원 구조나 모든 조합을 처리할 때 사용합니다. 들여쓰기 단계가 늘어납니다.

    중첩이 깊어지면 성능에 영향을 줄 수 있으니 주의하세요.
  tips:
  - 중첩이 깊어지면 성능에 영향을 줄 수 있으니 주의하세요.
  snippet: |-
    colors = ['red', 'blue']
    sizes = ['S', 'M']
    combinations = ''
    for color in colors:
        for size in sizes:
            combinations = combinations + color + '-' + size + ' '
    combinations
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      colors = ['red', 'blue']
      sizes = ['S', 'M']
      combinations = ''
      for color in colors:
          for size in sizes:
              combinations = combinations + color + '-' + size + ' '
      combinations
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: 실무 반복 처리 루프
  structuredPrimary: true
  subtitle: 예측 → 누적 → 오류 확인 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    반복문은 리스트를 한 번 훑는 문법이 아니라, 업무 데이터를 규칙대로 걸러내고 누적하고 검증하는 도구입니다. 실행 전에는 어떤 주문이 합계에 들어갈지 예측하고, 누락된 컬럼이나 음수 금액 같은 오류를 반복문 안에서 확인해야 합니다.

    반복문은 많이 돌리는 것이 목표가 아닙니다. 어떤 건을 처리하고, 어떤 건을 건너뛰고, 언제 멈추며, 결과가 맞는지 검증하는 흐름까지 함께 설계해야 실제 업무 자동화가 됩니다.
  tips:
  - 반복문은 많이 돌리는 것이 목표가 아닙니다. 어떤 건을 처리하고, 어떤 건을 건너뛰고, 언제 멈추며, 결과가 맞는지 검증하는 흐름까지 함께 설계해야 실제 업무 자동화가 됩니다.
  snippet: |-
    dailyOrders = [
        {"id": "O-101", "status": "paid", "amount": 120000},
        {"id": "O-102", "status": "cancelled", "amount": 50000},
        {"id": "O-103", "status": "paid", "amount": 45000},
        {"id": "O-104", "status": "pending", "amount": 90000},
        {"id": "O-105", "status": "paid", "amount": 210000},
    ]

    len(dailyOrders)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      dailyOrders = [
          {"id": "O-101", "status": "paid", "amount": 120000},
          {"id": "O-102", "status": "cancelled", "amount": 50000},
