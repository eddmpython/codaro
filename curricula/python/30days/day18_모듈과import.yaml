sections:
- id: import_basic
  title: import 기본
  structuredPrimary: true
  subtitle: 모듈 가져오기
  goal: 'import 기본: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'import 기본: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    모듈은 함수와 변수를 담은 파이썬 파일입니다. import 모듈명으로 모듈을 가져오고, 모듈명.함수명()으로 사용합니다. 파이썬은 많은 표준 모듈을 제공합니다.

    처음에는 필요한 모듈을 노트북 위쪽 한 셀에 모아 import하면 흐름을 이해하기 쉽습니다.
  tips:
  - 처음에는 필요한 모듈을 노트북 위쪽 한 셀에 모아 import하면 흐름을 이해하기 쉽습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import math

    math.sqrt(16)
  exercise:
    prompt: 'import 기본: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import math

      math.sqrt(16)
    solution: |-
      import math

      math.sqrt(16)
