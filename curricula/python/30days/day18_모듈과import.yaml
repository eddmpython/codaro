- id: datetime_module
  title: datetime 모듈
  structuredPrimary: true
  subtitle: 날짜와 시간
  goal: 'datetime 모듈: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'datetime 모듈: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    datetime 모듈은 날짜와 시간을 다룹니다. datetime.now(현재 시각), date(날짜), time(시간), timedelta(시간 차이) 등을 제공합니다.

    datetime 객체는 여러 속성과 메서드를 제공합니다.
