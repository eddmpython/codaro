    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: as 키워드로 모듈이나 함수에 별칭을 붙일 수 있습니다. import 모듈명 as 별칭 또는 from 모듈명 import 함수명 as 별칭 형식입니다. 긴 이름을 짧게 만들거나 충돌을 피할 때 사용합니다.
  - type: list
    items:
    - as 별칭 형식
    - 긴 이름 단축
    - 이름 충돌 방지
    - 관습적 별칭 존재
  - type: code
    language: python
    title: 모듈 별칭
    description: 모듈에 짧은 별칭을 붙입니다.
    content: |-
      import math as m

      m.sqrt(36)
  - type: code
    language: python
    title: 함수 별칭
    description: 함수에 별칭을 붙입니다.
    content: |-
      from math import sqrt as sq

      sq(49)
  - type: code
    language: python
    title: 여러 별칭
    description: 여러 함수에 별칭을 붙입니다.
    content: |-
