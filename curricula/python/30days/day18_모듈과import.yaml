- id: from_import
  title: from import
  structuredPrimary: true
  subtitle: 특정 함수만 가져오기
  goal: 'from import: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'from import: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    from 모듈명 import 함수명으로 특정 함수만 가져올 수 있습니다. 모듈명 없이 함수명만으로 사용할 수 있습니다. 여러 함수를 쉼표로 구분하여 가져올 수 있습니다.

    필요한 함수만 가져오면 코드가 깔끔해집니다.
  tips:
  - 필요한 함수만 가져오면 코드가 깔끔해집니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from math import sqrt

    sqrt(25)
  exercise:
    prompt: 'from import: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from math import sqrt

      sqrt(25)
    solution: |-
      from math import sqrt

      sqrt(25)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: from 모듈명 import 함수명으로 특정 함수만 가져올 수 있습니다. 모듈명 없이 함수명만으로 사용할 수 있습니다. 여러 함수를 쉼표로 구분하여 가져올 수 있습니다.
  - type: list
    items:
    - from 모듈명 import 함수명
    - 모듈명 없이 사용
    - 쉼표로 여러 함수
    - 코드 간결화
  - type: code
    language: python
    title: 함수 직접 사용
    description: from import로 함수를 직접 사용합니다.
    content: |-
      from math import sqrt

      sqrt(25)
  - type: code
    language: python
    title: 여러 함수 가져오기
    description: 여러 함수를 한 번에 가져옵니다.
    content: |-
      from math import pi, ceil, floor

      ceil(3.2), floor(3.8)
  - type: code
    language: python
    title: 계산에 활용
    description: 가져온 함수와 상수를 계산에 사용합니다.
    content: |-
      from math import pi, pow

      r = 3
      volume = 4 / 3 * pi * pow(r, 3)
      volume
  - type: tip
    content: 필요한 함수만 가져오면 코드가 깔끔해집니다.
- id: import_as
