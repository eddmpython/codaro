- id: datetime_module
  title: datetime 모듈
  structuredPrimary: true
  subtitle: 날짜와 시간
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    datetime 모듈은 날짜와 시간을 다룹니다. datetime.now(현재 시각), date(날짜), time(시간), timedelta(시간 차이) 등을 제공합니다.

    datetime 객체는 여러 속성과 메서드를 제공합니다.
  tips:
