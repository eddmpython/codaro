  explanation: |-
    math 모듈은 수학 함수를 제공합니다. sqrt(제곱근), ceil(올림), floor(내림), pow(거듭제곱), pi(파이), e(자연상수) 등을 사용할 수 있습니다.

    math.pow는 실수를 반환하고, ** 연산자는 정수도 유지합니다.
  tips:
