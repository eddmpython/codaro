sections:
- id: open_file
  title: 파일 열기
  structuredPrimary: true
  subtitle: open() 함수
  goal: 파일 열기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    open() 함수로 파일을 엽니다. open(파일경로, 모드) 형식으로 쓰며, 파일 객체를 반환합니다. 사용 후에는 close()로 닫아야 합니다. 기본 모드는 읽기('r')입니다.

    파일은 반드시 close()로 닫아야 리소스가 해제됩니다. 노트북 환경에서는 파일 목록 패널에서 생성된 txt 파일을 확인할 수 있습니다.
  tips:
  - 파일은 반드시 close()로 닫아야 리소스가 해제됩니다. 노트북 환경에서는 파일 목록 패널에서 생성된 txt 파일을 확인할 수 있습니다.
  snippet: |-
    f = open('test.txt', 'w')
    f.write('Hello World')
    f.close()
    'File created'
  exercise:
    prompt: 파일 열기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      f = open('test.txt', 'w')
      f.write('Hello World')
      f.close()
      'File created'
    hints:
    - 파일 열기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파일 열기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파일 열기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: read_file
  title: 파일 읽기
  structuredPrimary: true
  subtitle: read() 메서드
  goal: 파일 읽기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    read() 메서드로 파일 내용을 읽습니다. 전체 내용을 문자열로 반환합니다. readline()은 한 줄씩, readlines()는 모든 줄을 리스트로 반환합니다.

    readlines()는 각 줄에 줄바꿈 문자(\n)를 포함합니다.
  tips:
  - readlines()는 각 줄에 줄바꿈 문자(\n)를 포함합니다.
  snippet: |-
    writer = open('data.txt', 'w')
    writer.write('Line 1\nLine 2\nLine 3')
    writer.close()

    reader = open('data.txt', 'r')
    text = reader.read()
    reader.close()
    text
  exercise:
    prompt: 파일 읽기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      writer = open('data.txt', 'w')
      writer.write('Line 1\nLine 2\nLine 3')
      writer.close()

      reader = open('data.txt', 'r')
      text = reader.read()
      reader.close()
      text
    hints:
    - 파일 읽기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파일 읽기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파일 읽기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: write_file
  title: 파일 쓰기
  structuredPrimary: true
  subtitle: write() 메서드
  goal: 파일 쓰기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    write() 메서드로 파일에 문자열을 씁니다. 'w' 모드는 기존 내용을 지우고, 'a' 모드는 끝에 추가합니다. write()는 쓴 문자 수를 반환합니다.

    'w' 모드는 기존 파일을 완전히 지우므로 주의하세요.
  tips:
  - '''w'' 모드는 기존 파일을 완전히 지우므로 주의하세요.'
  snippet: |-
    fileObj = open('message.txt', 'w')
    count = fileObj.write('Hello Python')
    fileObj.close()
    count
  exercise:
    prompt: 파일 쓰기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      fileObj = open('message.txt', 'w')
      count = fileObj.write('Hello Python')
      fileObj.close()
      count
    hints:
    - 파일 쓰기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파일 쓰기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파일 쓰기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: with_statement
  title: with 문
  structuredPrimary: true
  subtitle: 자동으로 닫기
  goal: with 문에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    with 문을 사용하면 파일을 자동으로 닫아줍니다. with open(경로, 모드) as 변수: 형식으로 쓰며, 블록이 끝나면 자동으로 close()가 호출됩니다. 안전하고 권장되는 방법입니다.

    with 문은 close()를 잊어버릴 걱정이 없어 안전합니다.
  tips:
  - with 문은 close()를 잊어버릴 걱정이 없어 안전합니다.
  snippet: |-
    with open('test.txt', 'w') as outFile:
        outFile.write('With statement')

    with open('test.txt', 'r') as inFile:
        data = inFile.read()

    data
  exercise:
    prompt: with 문 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      with open('test.txt', 'w') as outFile:
          outFile.write('With statement')

      with open('test.txt', 'r') as inFile:
          data = inFile.read()

      data
    hints:
    - with 문 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: with 문 코드가 예외 없이 끝나야 합니다.
    resultCheck: with 문에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: file_modes
  title: 파일 모드
  structuredPrimary: true
  subtitle: 읽기/쓰기/추가
  goal: 파일 모드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    파일 모드는 파일을 어떻게 열지 결정합니다. 'r'(읽기), 'w'(쓰기), 'a'(추가), 'r+'(읽기/쓰기) 등이 있습니다. 텍스트 모드가 기본이며, 'b'를 붙이면 바이너리 모드입니다.

    파일이 없을 때 'r'은 에러, 'w'와 'a'는 파일을 생성합니다.
  tips:
  - 파일이 없을 때 'r'은 에러, 'w'와 'a'는 파일을 생성합니다.
  snippet: |-
    with open('test.txt', 'w') as wf:
        wf.write('Read mode test')

    with open('test.txt', 'r') as rf:
        readData = rf.read()

    readData
  exercise:
    prompt: 파일 모드 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      with open('test.txt', 'w') as wf:
          wf.write('Read mode test')

      with open('test.txt', 'r') as rf:
          readData = rf.read()

      readData
    hints:
    - 파일 모드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파일 모드 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파일 모드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: line_iteration
  title: 줄 단위 순회
  structuredPrimary: true
  subtitle: for문으로 읽기
  goal: 줄 단위 순회에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    파일 객체는 for문으로 순회할 수 있습니다. 각 줄을 하나씩 가져오므로 메모리 효율적입니다. 큰 파일을 처리할 때 유용합니다.

    strip()으로 줄바꿈 문자를 제거할 수 있습니다.
  tips:
  - strip()으로 줄바꿈 문자를 제거할 수 있습니다.
  snippet: |-
    with open('items.txt', 'w') as creator:
        creator.write('Apple\nBanana\nCherry')

    with open('items.txt', 'r') as processor:
        lineCount = 0
        for line in processor:
            lineCount = lineCount + 1

    lineCount
  exercise:
    prompt: 줄 단위 순회 예제에서 반복 대상이나 범위을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      with open('items.txt', 'w') as creator:
          creator.write('Apple\nBanana\nCherry')

      with open('items.txt', 'r') as processor:
          lineCount = 0
          for line in processor:
              lineCount = lineCount + 1

      lineCount
    hints:
    - 줄 단위 순회 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 줄 단위 순회 코드가 예외 없이 끝나야 합니다.
    resultCheck: 줄 단위 순회에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기'
  structuredPrimary: true
  subtitle: 로컬 파일을 안전하게 쓰고 읽고 검증하기
  goal: '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 로컬 Python에서는 파일 입출력 제약이 줄어드는 대신, 현재 작업 폴더를 지저분하게 만들 위험이 생깁니다. 실습과 자동화 코드는 임시 작업 폴더나 명시한
    출력 폴더를 쓰고, 파일 내용까지 검증해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pathlib import Path
    import tempfile

    with tempfile.TemporaryDirectory() as tempDir:
        workDir = Path(tempDir)
        reportPath = workDir / 'dailyReport.txt'
        reportPath.write_text('orderId,total\nA-100,12000\nA-101,8000\n', encoding='utf-8')

        reportText = reportPath.read_text(encoding='utf-8')
        lines = reportText.strip().splitlines()

        assert reportPath.exists()
        assert lines[0] == 'orderId,total'
        assert len(lines) == 3
  exercise:
    prompt: '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.'
    starterCode: |-
      from pathlib import Path
      import tempfile

      with tempfile.TemporaryDirectory() as tempDir:
          workDir = Path(tempDir)
          sourcePath = workDir / 'raw.txt'
          resultPath = workDir / 'upper.txt'
          sourcePath.write_text('hello\npython\n', encoding='utf-8')

          upperLines = []
          for line in sourcePath.read_text(encoding='utf-8').splitlines():
              upperLines.append(line.upper())
          resultPath.write_text('\n'.join(upperLines), encoding='utf-8')

          assert resultPath.read_text(encoding='utf-8') == 'HELLO\nPYTHON'
          resultPath.name
    hints:
    - '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기 코드에서 먼저 리스트 값 위치를 찾으세요.'
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기 코드가 예외 없이 끝나야 합니다.'
    resultCheck: '검증 루프: 임시 작업 폴더에서 리포트 파일 만들기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.'
- id: practice
  title: Day 19 종합 복습
  structuredPrimary: true
  subtitle: 파일 입출력 마스터하기
  goal: Day 19 종합 복습에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: Day 19에서 배운 파일 입출력을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로
