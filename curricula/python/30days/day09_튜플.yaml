- id: workflow_validation
  title: '검증 루프: 변경되면 안 되는 설정값 다루기'
  structuredPrimary: true
  subtitle: 튜플의 불변성과 언패킹을 안전한 데이터 계약으로 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 튜플은 리스트의 불편한 버전이 아니라, 바뀌면 안 되는 값 묶음을 표현하는 방법입니다. 좌표, 색상, 설정값, 함수 반환값처럼 길이와 순서가 계약인 데이터를 다룰 때 튜플을 쓰면 실수로 수정되는 일을 막을 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    serverConfig = ('localhost', 8080, True)
    hostName, portNumber, secureMode = serverConfig

    endpoint = f'http://{hostName}:{portNumber}'
    if secureMode:
        endpoint = endpoint.replace('http://', 'https://')

    assert len(serverConfig) == 3
    assert hostName == 'localhost'
    assert portNumber == 8080
    assert endpoint == 'https://localhost:8080'
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      topLeft = (10, 20)
      bottomRight = (70, 95)
      left, top = topLeft
      right, bottom = bottomRight
      boxSize = (right - left, bottom - top)

      assert boxSize == (60, 75)
      assert topLeft == (10, 20)
      boxSize
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
