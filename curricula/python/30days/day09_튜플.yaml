- id: "practice"
  title: "Day 9 종합 복습"
  subtitle: "튜플 마스터하기"
  blocks:
  - type: "text"
    content: "Day 9에서 배운 튜플을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: "expansion"
    title: "🟢 기본1: 튜플 생성"
    code: |-
      tpl = (1, 2, 3, 4, 5)
      tpl

  - type: "expansion"
    title: "🟢 기본2: 튜플 인덱싱"
    code: |-
      colors = ('빨강', '초록', '파랑')
      first = colors[0]
      last = colors[-1]
      first, last

  - type: "expansion"
    title: "🟢 기본3: 튜플 슬라이싱"
    code: |-
      nums = (0, 1, 2, 3, 4, 5)
      slice = nums[1:4]
      slice

  - type: "expansion"
    title: "🟢 기본4: 튜플 패킹"
    code: |-
      packing = 10, 20, 30
      packing

  - type: "expansion"
    title: "🟢 기본5: 튜플 언패킹"
    code: |-
      point = (100, 200)
      x, y = point
      x, y

  - type: "expansion"
    title: "🟡 응용1: 좌표 시스템"
    blocks:
    - type: "code"
      title: "좌표1"
      content: |-
        start = 10, 20
        print('start:', start)
    - type: "code"
      title: "좌표2"
      content: |-
        end = 30, 40
        print('end:', end)
    - type: "code"
      title: "X 거리"
      content: |-
        origin = 10, 20
        dest = 30, 40
        ox, oy = origin
        dx, dy = dest
        distX = dx - ox
        print('distance_x:', distX)
    - type: "code"
      title: "Y 거리"
      content: |-
        from1 = 10, 20
        to = 30, 40
        fx, fy = from1
        tx, ty = to
        distY = ty - fy
        print('distance_y:', distY)

  - type: "expansion"
    title: "🟡 응용2: 사용자 정보"
    blocks:
    - type: "code"
      title: "사용자 튜플"
      content: |-
        profile = ('김철수', 25, '서울', 'developer')
        print('profile:', profile)
    - type: "code"
      title: "이름"
      content: |-
        member = ('김철수', 25, '서울', 'developer')
        name, age, city, job = member
        print('name:', name)
    - type: "code"
      title: "정보 문자열"
      content: |-
        account = ('김철수', 25, '서울', 'developer')
        nm, ag, ct, jb = account
        info = nm + ' ' + str(ag) + '세'
        print('info:', info)
    - type: "code"
      title: "튜플 길이"
      content: |-
        record = ('김철수', 25, '서울', 'developer')
        print('length:', len(record))

  - type: "expansion"
    title: "🟡 응용3: RGB 색상"
    blocks:
    - type: "code"
      title: "빨강"
      content: |-
        crimson = (255, 0, 0)
        print('crimson:', crimson)
    - type: "code"
      title: "초록"
      content: |-
        lime = (0, 255, 0)
        print('lime:', lime)
    - type: "code"
      title: "노랑 합성"
      content: |-
        ruby = (255, 0, 0)
        jade = (0, 255, 0)
        r, g, b = ruby
        rv, gv, bv = jade
        gold = (r, gv, 0)
        print('gold:', gold)

  - type: "expansion"
    title: "🟡 응용4: 시간 정보"
    blocks:
    - type: "code"
      title: "시간 튜플"
      content: |-
        clock = (14, 30, 45)
        print('clock:', clock)
    - type: "code"
      title: "시"
      content: |-
        moment = (14, 30, 45)
        hour, mn, sec = moment
        print('hour:', hour)
    - type: "code"
      title: "분"
      content: |-
        stamp = (14, 30, 45)
        hr, minute, sc = stamp
        print('minute:', minute)
    - type: "code"
      title: "총 초"
      content: |-
        elapsed = (14, 30, 45)
        hh, mm, ss = elapsed
        total = hh * 3600 + mm * 60 + ss
        print('total_seconds:', total)

  - type: "expansion"
    title: "🟡 응용5: 날짜 분석"
    blocks:
    - type: "code"
      title: "날짜 튜플"
      content: |-
        today = (2024, 12, 25)
        print('today:', today)
    - type: "code"
      title: "연도"
      content: |-
        calendar = (2024, 12, 25)
        year, month, day = calendar
        print('year:', year)
    - type: "code"
      title: "겨울 여부"
      content: |-
        xmas = (2024, 12, 25)
        yr, mon, dy = xmas
        winter = mon in (12, 1, 2)
        print('is_winter:', winter)
    - type: "code"
      title: "날짜 문자열"
      content: |-
        holiday = (2024, 12, 25)
        yy, mo, dd = holiday
        date = str(yy) + '-' + str(mo) + '-' + str(dd)
        print('date_str:', date)

  - type: "expansion"
    title: "🔴 심화1-1: 성적 데이터 분석"
    blocks:
    - type: "code"
      title: "점수"
      content: |-
        grades = (85, 90, 78, 92, 88)
        print('grades:', grades)
    - type: "code"
      title: "과목"
      content: |-
        subjects = ('국어', '영어', '수학', '과학', '사회')
        print('subjects:', subjects)
    - type: "code"
      title: "총점"
      content: |-
        marks = (85, 90, 78, 92, 88)
        kor, eng, math, sci, soc = marks
        total = kor + eng + math + sci + soc
        print('total:', total)
    - type: "code"
      title: "평균"
      content: |-
        results = (85, 90, 78, 92, 88)
        k, e, m, s, so = results
        sum1 = k + e + m + s + so
        avg = sum1 / len(results)
        print('average:', avg)

  - type: "expansion"
    title: "🔴 심화1-2: 성적 순위 분석"
    blocks:
    - type: "code"
      title: "상위 3개"
      content: |-
        scores = (85, 90, 78, 92, 88)
        top3 = scores[:3]
        print('top_3:', top3)
    - type: "code"
      title: "국어 인덱스"
      content: |-
        classes = ('국어', '영어', '수학', '과학', '사회')
        idx = classes.index('국어')
        print('korean_index:', idx)

  - type: "expansion"
    title: "🔴 심화2-1: 좌표 정보 추출"
    blocks:
    - type: "code"
      title: "전체 좌표"
      content: |-
        coords = ((0, 0), (10, 20), (30, 40), (50, 60))
        print('coords:', coords)
    - type: "code"
      title: "첫 좌표"
      content: |-
        vertices = ((0, 0), (10, 20), (30, 40), (50, 60))
        v1, v2, v3, v4 = vertices
        print('first:', v1)
    - type: "code"
      title: "마지막 좌표"
      content: |-
        nodes = ((0, 0), (10, 20), (30, 40), (50, 60))
        n1, n2, n3, n4 = nodes
        print('last:', n4)

  - type: "expansion"
    title: "🔴 심화2-2: 좌표 연산"
    blocks:
    - type: "code"
      title: "너비"
      content: |-
        left, top = 0, 0
        right, bottom = 50, 60
        width = right - left
        print('width:', width)
    - type: "code"
      title: "높이"
      content: |-
        minX, minY = 0, 0
        maxX, maxY = 50, 60
        height = maxY - minY
        print('height:', height)
    - type: "code"
      title: "중심점"
      content: |-
        ax, ay = 0, 0
        bx, by = 50, 60
        center = ((ax + bx) / 2, (ay + by) / 2)
        print('center:', center)

  - type: "expansion"
    title: "🔴 심화3-1: 상품 재고 정보"
    blocks:
    - type: "code"
      title: "상품1"
      content: |-
        laptop = ('노트북', 1200000, 5)
        print('laptop:', laptop)
    - type: "code"
      title: "상품2"
      content: |-
        mouse = ('마우스', 30000, 20)
        print('mouse:', mouse)
    - type: "code"
      title: "상품3"
      content: |-
        keyboard = ('키보드', 80000, 15)
        print('keyboard:', keyboard)

  - type: "expansion"
    title: "🔴 심화3-2: 상품 재고 가치 계산"
    blocks:
    - type: "code"
      title: "상품1 가치"
      content: |-
        gadget = ('노트북', 1200000, 5)
        nm, pr, qty = gadget
        worth = pr * qty
        print('worth:', worth)
    - type: "code"
      title: "전체 재고 가치"
      content: |-
        pc = ('노트북', 1200000, 5)
        clicker = ('마우스', 30000, 20)
        keys = ('키보드', 80000, 15)
        na, pa, qa = pc
        nb, pb, qb = clicker
        nc, pc1, qc = keys
        va = pa * qa
        vb = pb * qb
        vc = pc1 * qc
        total = va + vb + vc
        print('total_value:', total)

  - type: "expansion"
    title: "🔴 심화4: 값 교환과 정렬"
    blocks:
    - type: "code"
      title: "교환 후"
      content: |-
        x = 100
        y = 200
        z = 50
        x, y = y, x
        swapped = (x, y, z)
        print('after_swap:', swapped)
    - type: "code"
      title: "정렬"
      content: |-
        p = 100
        q = 200
        w = 50
        p, q = q, p
        raw = (p, q, w)
        lst = list(raw)
        lst.sort()
        ordered = tuple(lst)
        print('sorted:', ordered)
    - type: "code"
      title: "최대값"
      content: |-
        trio = (50, 100, 200)
        biggest = trio[-1]
        print('max:', biggest)
    - type: "code"
      title: "최소값"
      content: |-
        triple = (50, 100, 200)
        smallest = triple[0]
        print('min:', smallest)

  - type: "expansion"
    title: "🔴 심화5-1: 통계 기본 분석"
    blocks:
    - type: "code"
      title: "데이터"
      content: |-
        dataset = (10, 20, 30, 20, 40, 20, 50)
        print('dataset:', dataset)
    - type: "code"
      title: "20의 개수"
      content: |-
        numbers = (10, 20, 30, 20, 40, 20, 50)
        cnt20 = numbers.count(20)
        print('count_20:', cnt20)
    - type: "code"
      title: "30의 인덱스"
      content: |-
        metrics = (10, 20, 30, 20, 40, 20, 50)
        idx30 = metrics.index(30)
        print('index_30:', idx30)
    - type: "code"
      title: "길이"
      content: |-
        measure = (10, 20, 30, 20, 40, 20, 50)
        size = len(measure)
        print('length:', size)

  - type: "expansion"
    title: "🔴 심화5-2: 통계 슬라이싱 분석"
    blocks:
    - type: "code"
      title: "처음 3개"
      content: |-
        analysis = (10, 20, 30, 20, 40, 20, 50)
        head = analysis[:3]
        print('first_3:', head)
    - type: "code"
      title: "마지막 3개"
      content: |-
        survey = (10, 20, 30, 20, 40, 20, 50)
        tail = survey[-3:]
