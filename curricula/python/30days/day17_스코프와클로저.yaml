sections:
- id: local_scope
  title: 지역 변수
  structuredPrimary: true
  subtitle: 함수 내부 변수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수 안에서 만든 변수는 지역 변수입니다. 지역 변수는 함수 내부에서만 사용할 수 있고, 함수가 끝나면 사라집니다. 함수 밖에서는 접근할 수 없습니다.

    지역 변수는 함수의 독립성을 보장합니다.
  tips:
  - 지역 변수는 함수의 독립성을 보장합니다.
  snippet: |-
    def calculate():
        result = 10 + 20
        return result

    calculate()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def calculate():
          result = 10 + 20
          return result

      calculate()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: global_scope
  title: 전역 변수
  structuredPrimary: true
  subtitle: 함수 외부 변수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수 밖에서 만든 변수는 전역 변수입니다. 전역 변수는 어디서든 읽을 수 있지만, 함수 안에서 수정하려면 global 키워드가 필요합니다.

    전역 변수는 최소한으로 사용하는 것이 좋습니다.
  tips:
  - 전역 변수는 최소한으로 사용하는 것이 좋습니다.
  snippet: |-
    total = 100

    def showTotal():
        return total

    showTotal()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      total = 100

      def showTotal():
          return total

      showTotal()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: global_keyword
  title: global 키워드
  structuredPrimary: true
  subtitle: 전역 변수 수정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    global 키워드를 사용하면 함수 안에서 전역 변수를 수정할 수 있습니다. global 변수명 형식으로 선언하고 사용합니다. 전역 상태를 변경할 때 사용합니다.

    global은 필요할 때만 사용하고, 가급적 return으로 값을 전달하세요.
  tips:
  - global은 필요할 때만 사용하고, 가급적 return으로 값을 전달하세요.
  snippet: |-
    balance = 1000

    def deposit(amount):
        global balance
        balance = balance + amount
        return balance

    deposit(500)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      balance = 1000

      def deposit(amount):
          global balance
          balance = balance + amount
          return balance

      deposit(500)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: nested_function
  title: 중첩 함수
  structuredPrimary: true
  subtitle: 함수 안의 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수 안에 다른 함수를 정의할 수 있습니다. 내부 함수는 외부 함수의 변수에 접근할 수 있습니다. 외부 함수에서만 내부 함수를 호출할 수 있습니다.

    중첩 함수는 관련된 기능을 그룹화할 때 유용합니다.
  tips:
  - 중첩 함수는 관련된 기능을 그룹화할 때 유용합니다.
  snippet: |-
    def outer():
        msg = 'Hello'
        def inner():
            return msg + ' World'
        return inner()

    outer()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def outer():
          msg = 'Hello'
          def inner():
              return msg + ' World'
          return inner()

      outer()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: nonlocal_keyword
  title: nonlocal 키워드
  structuredPrimary: true
  subtitle: 외부 함수 변수 수정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    nonlocal 키워드를 사용하면 내부 함수에서 외부 함수의 변수를 수정할 수 있습니다. nonlocal 변수명 형식으로 선언합니다. 클로저를 만들 때 중요합니다.

    nonlocal은 가장 가까운 외부 함수의 변수를 참조합니다.
  tips:
  - nonlocal은 가장 가까운 외부 함수의 변수를 참조합니다.
  snippet: |-
    def outer():
        count = 0
        def increment():
            nonlocal count
            count = count + 1
            return count
        return increment()

    outer()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def outer():
          count = 0
          def increment():
              nonlocal count
              count = count + 1
              return count
          return increment()

      outer()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: closure_basic
  title: 클로저 기본
  structuredPrimary: true
  subtitle: 상태를 기억하는 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    클로저는 외부 함수가 끝난 후에도 외부 함수의 변수를 기억하는 내부 함수입니다. 외부 함수가 내부 함수를 반환하면 클로저가 됩니다. 각 클로저는 독립적인 상태를 유지합니다.

    클로저는 함수 팩토리 패턴을 구현할 때 유용합니다.
  tips:
  - 클로저는 함수 팩토리 패턴을 구현할 때 유용합니다.
  snippet: |-
    def makeAdder(n):
        def add(x):
            return x + n
        return add

    add5 = makeAdder(5)
    add5(10)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def makeAdder(n):
          def add(x):
              return x + n
          return add

      add5 = makeAdder(5)
      add5(10)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: closure_advanced
  title: 클로저 활용
  structuredPrimary: true
  subtitle: 상태를 가진 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    클로저를 사용하면 상태를 가진 함수를 만들 수 있습니다. nonlocal과 함께 사용하여 상태를 변경하고 유지할 수 있습니다. 카운터, 누적기 등을 구현할 때 유용합니다.

    클로저는 클래스 없이도 상태를 관리할 수 있게 해줍니다.
  tips:
  - 클로저는 클래스 없이도 상태를 관리할 수 있게 해줍니다.
  snippet: |-
    def makeCounter():
        cnt = 0
        def increment():
            nonlocal cnt
            cnt = cnt + 1
            return cnt
        return increment

    counter = makeCounter()
    counter(), counter(), counter()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def makeCounter():
          cnt = 0
          def increment():
              nonlocal cnt
              cnt = cnt + 1
              return cnt
          return increment

      counter = makeCounter()
      counter(), counter(), counter()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 고객별 누적 결제 상태 만들기'
  structuredPrimary: true
  subtitle: global 대신 클로저로 상태를 격리하고 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 스코프와 클로저는 시험용 문법이 아니라, 상태가 섞이면 안 되는 업무 흐름을 안전하게 나누는 도구입니다. 고객별 누적 결제 금액처럼 서로 독립이어야 하는 상태는 전역 변수보다 클로저로 관리하는 편이 안전합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def makePaymentTracker(customerId):
        totalPaid = 0
        paymentCount = 0

        def track(amount):
            nonlocal totalPaid, paymentCount
            if amount <= 0:
                raise ValueError('결제 금액은 양수여야 합니다')
            totalPaid = totalPaid + amount
            paymentCount = paymentCount + 1
            return {
                'customerId': customerId,
                'totalPaid': totalPaid,
                'paymentCount': paymentCount,
            }

        return track


    kimTracker = makePaymentTracker('kim')
    leeTracker = makePaymentTracker('lee')

    kimFirst = kimTracker(10000)
    kimSecond = kimTracker(5000)
    leeFirst = leeTracker(7000)

    assert kimSecond == {'customerId': 'kim', 'totalPaid': 15000, 'paymentCount': 2}
    assert leeFirst == {'customerId': 'lee', 'totalPaid': 7000, 'paymentCount': 1}
    assert kimFirst['totalPaid'] == 10000
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def makeStatusCounter(statusName):
          count = 0
          def mark():
              nonlocal count
              count = count + 1
              return {'status': statusName, 'count': count}
          return mark


      successCounter = makeStatusCounter('success')
      failedCounter = makeStatusCounter('failed')

      assert successCounter()['count'] == 1
      assert successCounter()['count'] == 2
      assert failedCounter() == {'status': 'failed', 'count': 1}
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
