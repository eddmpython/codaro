sections:
- id: property_basic
  title: 프로퍼티 기초
  structuredPrimary: true
  subtitle: '@property 데코레이터'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    프로퍼티는 메서드를 속성처럼 사용할 수 있게 해주는 기능입니다. @property 데코레이터를 메서드에 붙이면 obj.method() 대신 obj.method로 접근할 수 있습니다. 이를 통해 계산된 값을 속성처럼 제공하거나, 내부 속성에 대한 접근을 제어할 수 있습니다.

    프로퍼티는 읽기 전용 속성을 만들 때 매우 유용합니다.
  tips:
  - 프로퍼티는 읽기 전용 속성을 만들 때 매우 유용합니다.
  snippet: |-
    class Circle:
        def __init__(self, radius):
            self.radius = radius

        @property
        def area(self):
            return 3.14 * self.radius ** 2

    cir = Circle(5)
    cir.area
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Circle:
          def __init__(self, radius):
              self.radius = radius

          @property
          def area(self):
              return 3.14 * self.radius ** 2

      cir = Circle(5)
      cir.area
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: setter_deleter
  title: setter와 deleter
  structuredPrimary: true
  subtitle: 값 설정과 삭제 제어
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    프로퍼티는 getter뿐만 아니라 setter와 deleter도 정의할 수 있습니다. @프로퍼티명.setter는 값을 설정할 때, @프로퍼티명.deleter는 값을 삭제할 때 호출됩니다. 이를 통해 값의 유효성 검사나 부가 작업을 수행할 수 있습니다.

    setter를 사용하면 직접 속성에 접근하는 것처럼 보이지만 내부적으로 검증 로직을 실행할 수 있습니다.
  tips:
  - setter를 사용하면 직접 속성에 접근하는 것처럼 보이지만 내부적으로 검증 로직을 실행할 수 있습니다.
  snippet: |-
    class Temperature:
        def __init__(self):
            self._celsius = 0

        @property
        def celsius(self):
            return self._celsius

        @celsius.setter
        def celsius(self, value):
            if value < -273:
                self._celsius = -273
            else:
                self._celsius = value

    temp = Temperature()
    temp.celsius = -300
    temp.celsius
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Temperature:
          def __init__(self):
              self._celsius = 0

          @property
          def celsius(self):
              return self._celsius

          @celsius.setter
          def celsius(self, value):
              if value < -273:
                  self._celsius = -273
              else:
                  self._celsius = value

      temp = Temperature()
      temp.celsius = -300
      temp.celsius
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: staticmethod
  title: '@staticmethod'
  structuredPrimary: true
  subtitle: 정적 메서드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    정적 메서드는 클래스나 인스턴스와 무관하게 독립적으로 동작하는 메서드입니다. @staticmethod 데코레이터를 사용하며, self나 cls 매개변수를 받지 않습니다. 주로 유틸리티 함수나 헬퍼 함수를 클래스 내부에 정의할 때 사용합니다.

    정적 메서드는 클래스 내부에 관련 함수를 그룹화하여 네임스페이스를 깔끔하게 유지합니다.
  tips:
  - 정적 메서드는 클래스 내부에 관련 함수를 그룹화하여 네임스페이스를 깔끔하게 유지합니다.
  snippet: |-
    class Math:
        @staticmethod
        def add(a, b):
            return a + b

        @staticmethod
        def multiply(a, b):
            return a * b

    Math.add(3, 4)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Math:
          @staticmethod
          def add(a, b):
              return a + b

          @staticmethod
          def multiply(a, b):
              return a * b

      Math.add(3, 4)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: classmethod
  title: '@classmethod'
  structuredPrimary: true
  subtitle: 클래스 메서드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    클래스 메서드는 클래스 자체를 첫 번째 매개변수로 받는 메서드입니다. @classmethod 데코레이터를 사용하며, 첫 매개변수는 관례적으로 cls로 명명합니다. 주로 팩토리 메서드나 클래스 레벨의 작업을 수행할 때 사용합니다.

    클래스 메서드는 상속 시 자식 클래스의 타입을 자동으로 따릅니다.
  tips:
  - 클래스 메서드는 상속 시 자식 클래스의 타입을 자동으로 따릅니다.
  snippet: |-
    class Person:
        def __init__(self, name, age):
            self.name = name
            self.age = age

        @classmethod
        def fromBirthYear(cls, name, birthYear):
            age = 2024 - birthYear
            return cls(name, age)

    p = Person.fromBirthYear('Alice', 2000)
    p.age
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Person:
          def __init__(self, name, age):
              self.name = name
              self.age = age

          @classmethod
          def fromBirthYear(cls, name, birthYear):
              age = 2024 - birthYear
              return cls(name, age)

      p = Person.fromBirthYear('Alice', 2000)
      p.age
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: decorator_basic
  title: 데코레이터 기초
  structuredPrimary: true
  subtitle: 함수를 꾸미는 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    데코레이터는 다른 함수를 감싸서 기능을 추가하는 함수입니다. @데코레이터명 형태로 함수 위에 붙여 사용하며, 원래 함수의 동작을 변경하거나 확장할 수 있습니다. 로깅, 타이밍, 캐싱 등 다양한 용도로 활용됩니다.

    데코레이터는 아래에서 위로 적용됩니다. @addOne @triple은 triple을 먼저 적용하고 addOne을 나중에 적용합니다.
  tips:
  - 데코레이터는 아래에서 위로 적용됩니다. @addOne @triple은 triple을 먼저 적용하고 addOne을 나중에 적용합니다.
  snippet: |-
    def logger(func):
        def wrapper():
            msg = 'Calling ' + func.__name__
            result = func()
            return msg + ' -> ' + str(result)
        return wrapper

    @logger
    def greet():
        return 'Hello'

    greet()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def logger(func):
