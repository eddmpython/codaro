    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '현업 흐름 검증: 상품 입력값을 안전하게 객체로 만들기'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 프로퍼티와 데코레이터는 문법 장식이 아니라, 객체의 규칙을 코드 안에 고정하는 도구입니다. 상품 행 데이터를 객체로 만들고 가격 규칙을 검증해봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from functools import wraps

    class Product:
        def __init__(self, name, price):
            if not name.strip():
                raise ValueError("name is required")
            self.name = name.strip()
            self.price = price

        @property
        def price(self):
            return self._price

        @price.setter
        def price(self, value):
            if value <= 0:
                raise ValueError("price must be positive")
            self._price = value

        @property
        def taxIncludedPrice(self):
            return int(self.price * 1.1)

        @staticmethod
        def parsePrice(text):
            cleanedText = text.replace(",", "").replace("원", "").strip()
            return int(cleanedText)

        @classmethod
        def fromRow(cls, row):
            return cls(row["name"], cls.parsePrice(row["price"]))

    def auditCall(func):
        @wraps(func)
        def wrapper(*args, **kwargs):
            result = func(*args, **kwargs)
            return {"function": func.__name__, "result": result}
        return wrapper

    @auditCall
    def calculateMargin(salePrice, cost):
        if salePrice < cost:
            raise ValueError("sale price must be greater than or equal to cost")
        return salePrice - cost

    product = Product.fromRow({"name": "  keyboard ", "price": "50,000원"})

    assert product.name == "keyboard"
    assert product.price == 50000
    assert product.taxIncludedPrice == 55000

    product.price = 60000
    assert product.taxIncludedPrice == 66000

    auditedMargin = calculateMargin(product.price, 42000)
    assert auditedMargin == {"function": "calculateMargin", "result": 18000}
    assert calculateMargin.__name__ == "calculateMargin"

    try:
        product.price = 0
    except ValueError as exc:
        assert "price" in str(exc)

    print("상품 객체 검증 흐름 통과")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from functools import wraps

      class Product:
          def __init__(self, name, price):
              if not name.strip():
                  raise ValueError("name is required")
              self.name = name.strip()
              self.price = price

          @property
          def price(self):
              return self._price

          @price.setter
          def price(self, value):
              if value <= 0:
                  raise ValueError("price must be positive")
              self._price = value

          @property
          def taxIncludedPrice(self):
              return int(self.price * 1.1)

          @staticmethod
          def parsePrice(text):
              cleanedText = text.replace(",", "").replace("원", "").strip()
              return int(cleanedText)

          @classmethod
          def fromRow(cls, row):
              return cls(row["name"], cls.parsePrice(row["price"]))

      def auditCall(func):
          @wraps(func)
          def wrapper(*args, **kwargs):
              result = func(*args, **kwargs)
              return {"function": func.__name__, "result": result}
          return wrapper

      @auditCall
      def calculateMargin(salePrice, cost):
          if salePrice < cost:
              raise ValueError("sale price must be greater than or equal to cost")
          return salePrice - cost

      product = Product.fromRow({"name": "  keyboard ", "price": "50,000원"})

      assert product.name == "keyboard"
      assert product.price == 50000
      assert product.taxIncludedPrice == 55000

      product.price = 60000
      assert product.taxIncludedPrice == 66000

      auditedMargin = calculateMargin(product.price, 42000)
      assert auditedMargin == {"function": "calculateMargin", "result": 18000}
      assert calculateMargin.__name__ == "calculateMargin"

      try:
          product.price = 0
      except ValueError as exc:
          assert "price" in str(exc)

      print("상품 객체 검증 흐름 통과")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
