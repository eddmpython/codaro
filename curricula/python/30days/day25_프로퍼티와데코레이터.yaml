    resultCheck: 출력 또는 assert 확인
- id: practical_patterns
  title: 실전 패턴
  structuredPrimary: true
  subtitle: 프로퍼티와 데코레이터 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    프로퍼티와 데코레이터를 함께 사용하면 깔끔하고 유지보수하기 쉬운 코드를 작성할 수 있습니다. 캐싱, 유효성 검사, 접근 제어 등 다양한 패턴을 구현할 수 있습니다.

    프로퍼티와 데코레이터를 적절히 조합하면 파이썬스러운 깔끔한 코드를 작성할 수 있습니다.
  tips:
  - 프로퍼티와 데코레이터를 적절히 조합하면 파이썬스러운 깔끔한 코드를 작성할 수 있습니다.
  snippet: |-
    class Fibonacci:
        def __init__(self):
            self._cache = {}

        @property
        def tenth(self):
            if 10 not in self._cache:
                self._cache[10] = self._fib(10)
            return self._cache[10]

        def _fib(self, n):
            if n <= 1:
                return n
            return self._fib(n - 1) + self._fib(n - 2)

    fib = Fibonacci()
    fib.tenth
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Fibonacci:
