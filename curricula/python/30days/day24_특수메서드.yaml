  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: special_methods_practice
  title: 특수 메서드 실전
  structuredPrimary: true
  subtitle: 여러 특수 메서드 조합
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실제 클래스는 여러 특수 메서드를 함께 구현하여 파이썬 내장 타입처럼 동작하게 만듭니다. __str__, __len__, __getitem__ 등을 조합하면 강력하고 직관적인 인터페이스를 제공할 수 있습니다.

    특수 메서드를 잘 활용하면 사용자 정의 클래스가 파이썬 내장 타입만큼 자연스럽게 동작합니다.
  tips:
  - 특수 메서드를 잘 활용하면 사용자 정의 클래스가 파이썬 내장 타입만큼 자연스럽게 동작합니다.
  snippet: |-
    class TodoList:
        def __init__(self):
            self.tasks = []

        def add(self, task):
            self.tasks.append(task)

        def __len__(self):
            return len(self.tasks)

        def __getitem__(self, idx):
            return self.tasks[idx]

        def __str__(self):
            return str(len(self.tasks)) + ' tasks'

    todo = TodoList()
    todo.add('Study')
    todo.add('Code')
    len(todo), str(todo), todo[0]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class TodoList:
          def __init__(self):
