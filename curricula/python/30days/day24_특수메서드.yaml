    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '현업 흐름 검증: 장바구니를 파이썬답게 다루기'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 특수 메서드는 객체를 len(), 인덱싱, 비교, 더하기 같은 파이썬 기본 문법과 자연스럽게 연결합니다. 장바구니 예제로 동작을 검증해봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Money:
        def __init__(self, amount):
            if amount < 0:
                raise ValueError("amount must not be negative")
            self.amount = amount

        def __add__(self, other):
            if not isinstance(other, Money):
                raise TypeError("Money can only be added to Money")
            return Money(self.amount + other.amount)

        def __eq__(self, other):
            return isinstance(other, Money) and self.amount == other.amount

        def __repr__(self):
            return f"Money({self.amount})"

    class Cart:
        def __init__(self):
            self.lines = []

        def add(self, name, price):
            self.lines.append({"name": name, "price": Money(price)})

        def __len__(self):
            return len(self.lines)

        def __getitem__(self, index):
            return self.lines[index]

        def total(self):
            totalMoney = Money(0)
            for line in self.lines:
                totalMoney = totalMoney + line["price"]
            return totalMoney

        def __repr__(self):
            return f"Cart(lines={self.lines!r})"

    cart = Cart()
    cart.add("keyboard", 50000)
    cart.add("mouse", 20000)

    assert len(cart) == 2
    assert cart[0]["name"] == "keyboard"
    assert cart.total() == Money(70000)
    assert repr(cart).startswith("Cart(")

    try:
        Money(1000) + 500
    except TypeError as exc:
        assert "Money" in str(exc)

    print("장바구니 특수 메서드 흐름 통과")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Money:
          def __init__(self, amount):
              if amount < 0:
                  raise ValueError("amount must not be negative")
              self.amount = amount

          def __add__(self, other):
              if not isinstance(other, Money):
                  raise TypeError("Money can only be added to Money")
              return Money(self.amount + other.amount)

          def __eq__(self, other):
              return isinstance(other, Money) and self.amount == other.amount

          def __repr__(self):
              return f"Money({self.amount})"

      class Cart:
          def __init__(self):
              self.lines = []

          def add(self, name, price):
              self.lines.append({"name": name, "price": Money(price)})

          def __len__(self):
              return len(self.lines)

          def __getitem__(self, index):
              return self.lines[index]

          def total(self):
              totalMoney = Money(0)
              for line in self.lines:
                  totalMoney = totalMoney + line["price"]
              return totalMoney

          def __repr__(self):
              return f"Cart(lines={self.lines!r})"

      cart = Cart()
      cart.add("keyboard", 50000)
      cart.add("mouse", 20000)

      assert len(cart) == 2
      assert cart[0]["name"] == "keyboard"
      assert cart.total() == Money(70000)
      assert repr(cart).startswith("Cart(")

      try:
          Money(1000) + 500
      except TypeError as exc:
          assert "Money" in str(exc)

      print("장바구니 특수 메서드 흐름 통과")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
