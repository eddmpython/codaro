sections:
- id: str_method
  title: __str__ 메서드
  structuredPrimary: true
  subtitle: 사람이 읽기 쉬운 문자열 표현
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __str__ 메서드는 객체를 문자열로 변환할 때 호출됩니다. str(객체)나 print(객체)를 사용하면 자동으로 __str__이 호출되어 사람이 읽기 쉬운 형태로 출력됩니다. 이 메서드를 정의하지 않으면 기본적으로 객체의 메모리 주소가 출력됩니다.

    __str__은 최종 사용자를 위한 읽기 쉬운 출력을 만드는 데 사용합니다.
  tips:
  - __str__은 최종 사용자를 위한 읽기 쉬운 출력을 만드는 데 사용합니다.
  snippet: |-
    class Book:
        def __init__(self, title, author):
            self.title = title
            self.author = author

        def __str__(self):
            return self.title + ' by ' + self.author

    book = Book('Python Guide', 'Kim')
    str(book)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Book:
          def __init__(self, title, author):
              self.title = title
              self.author = author

          def __str__(self):
              return self.title + ' by ' + self.author

      book = Book('Python Guide', 'Kim')
      str(book)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: repr_method
  title: __repr__ 메서드
  structuredPrimary: true
  subtitle: 개발자를 위한 명확한 표현
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __repr__ 메서드는 객체의 공식적인 문자열 표현을 정의합니다. repr(객체)를 호출하거나 인터프리터에서 객체를 직접 입력하면 호출됩니다. 주로 디버깅이나 로깅에 사용되며, 가능하면 객체를 재생성할 수 있는 형태의 문자열을 반환해야 합니다.

    __str__이 없으면 __repr__이 대신 사용됩니다. 하나만 정의한다면 __repr__을 권장합니다.
  tips:
  - __str__이 없으면 __repr__이 대신 사용됩니다. 하나만 정의한다면 __repr__을 권장합니다.
  snippet: |-
    class Point:
        def __init__(self, x, y):
            self.x = x
            self.y = y

        def __repr__(self):
            return 'Point(' + str(self.x) + ', ' + str(self.y) + ')'

    pt = Point(3, 4)
    repr(pt)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Point:
          def __init__(self, x, y):
              self.x = x
              self.y = y

          def __repr__(self):
              return 'Point(' + str(self.x) + ', ' + str(self.y) + ')'

      pt = Point(3, 4)
      repr(pt)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: len_method
  title: __len__ 메서드
  structuredPrimary: true
  subtitle: 객체의 길이 정의
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __len__ 메서드는 객체의 길이를 정의합니다. len(객체)를 호출하면 자동으로 __len__이 호출되어 정수값을 반환합니다. 컬렉션 타입 클래스를 만들 때 매우 유용하며, 반드시 음이 아닌 정수를 반환해야 합니다.

    __len__은 bool() 판단에도 사용됩니다. len이 0이면 False, 아니면 True입니다.
  tips:
  - __len__은 bool() 판단에도 사용됩니다. len이 0이면 False, 아니면 True입니다.
  snippet: |-
    class Playlist:
        def __init__(self):
            self.songs = []

        def add(self, song):
            self.songs.append(song)

        def __len__(self):
            return len(self.songs)

    pl = Playlist()
    pl.add('Song A')
    pl.add('Song B')
    len(pl)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Playlist:
          def __init__(self):
              self.songs = []

          def add(self, song):
              self.songs.append(song)

          def __len__(self):
              return len(self.songs)

      pl = Playlist()
      pl.add('Song A')
      pl.add('Song B')
      len(pl)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: add_method
  title: __add__ 메서드
  structuredPrimary: true
  subtitle: + 연산자 구현
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __add__ 메서드는 + 연산자의 동작을 정의합니다. a + b를 실행하면 a.__add__(b)가 호출됩니다. 이를 통해 사용자 정의 클래스에서도 덧셈 연산을 의미있게 구현할 수 있습니다. 새로운 객체를 반환하는 것이 일반적입니다.

    __sub__, __mul__, __div__ 등으로 다른 연산자도 구현할 수 있습니다.
  tips:
  - __sub__, __mul__, __div__ 등으로 다른 연산자도 구현할 수 있습니다.
  snippet: |-
    class Vector:
        def __init__(self, x, y):
            self.x = x
            self.y = y

        def __add__(self, other):
            return Vector(self.x + other.x, self.y + other.y)

        def __repr__(self):
            return 'Vector(' + str(self.x) + ', ' + str(self.y) + ')'

    v1 = Vector(1, 2)
    v2 = Vector(3, 4)
    v3 = v1 + v2
    repr(v3)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Vector:
          def __init__(self, x, y):
              self.x = x
              self.y = y

          def __add__(self, other):
              return Vector(self.x + other.x, self.y + other.y)

          def __repr__(self):
              return 'Vector(' + str(self.x) + ', ' + str(self.y) + ')'

      v1 = Vector(1, 2)
      v2 = Vector(3, 4)
      v3 = v1 + v2
      repr(v3)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: eq_method
  title: __eq__ 메서드
  structuredPrimary: true
  subtitle: == 연산자 구현
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __eq__ 메서드는 == 연산자의 동작을 정의합니다. a == b를 실행하면 a.__eq__(b)가 호출됩니다. 기본적으로 객체는 같은 메모리 주소일 때만 같다고 판단하지만, __eq__를 정의하면 값 기반 비교가 가능합니다. True나 False를 반환해야 합니다.

    __ne__(!=), __lt__(<), __le__(<=), __gt__(>), __ge__(>=)도 구현할 수 있습니다.
  tips:
  - __ne__(!=), __lt__(<), __le__(<=), __gt__(>), __ge__(>=)도 구현할 수 있습니다.
  snippet: |-
    class Location:
        def __init__(self, x, y):
            self.x = x
            self.y = y

        def __eq__(self, other):
            return self.x == other.x and self.y == other.y

    loc1 = Location(1, 2)
    loc2 = Location(1, 2)
    loc1 == loc2
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Location:
          def __init__(self, x, y):
              self.x = x
              self.y = y

          def __eq__(self, other):
              return self.x == other.x and self.y == other.y

      loc1 = Location(1, 2)
      loc2 = Location(1, 2)
      loc1 == loc2
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: getitem_method
  title: __getitem__ 메서드
  structuredPrimary: true
  subtitle: 인덱싱과 슬라이싱 지원
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    __getitem__ 메서드는 객체[키] 형태의 인덱싱을 가능하게 합니다. obj[key]를 실행하면 obj.__getitem__(key)가 호출됩니다. 리스트처럼 동작하는 커스텀 컨테이너를 만들 때 필수적이며, 슬라이싱도 지원할 수 있습니다.

    __setitem__과 __delitem__으로 obj[key] = val과 del obj[key]도 구현할 수 있습니다.
  tips:
  - __setitem__과 __delitem__으로 obj[key] = val과 del obj[key]도 구현할 수 있습니다.
  snippet: |-
    class Items:
        def __init__(self):
            self.data = []

        def add(self, item):
            self.data.append(item)

        def __getitem__(self, idx):
            return self.data[idx]

    items = Items()
    items.add('first')
    items.add('second')
    items[0]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Items:
          def __init__(self):
              self.data = []

          def add(self, item):
              self.data.append(item)

          def __getitem__(self, idx):
              return self.data[idx]

      items = Items()
      items.add('first')
      items.add('second')
      items[0]
    hints:
