- id: workflow_validation
  title: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 중간 복습에서는 문법을 따로따로 외우는 것보다, 작은 업무 흐름을 끝까지 통과시키는지가 중요합니다. 아래 코드는 문자열 정제, 딕셔너리 검증, 함수 분리, 반복문, 예외 처리, 파일 입출력을 한 번에 연결합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pathlib import Path
    import tempfile

    rawOrders = [
        {"id": " A-100 ", "status": " PAID ", "amount": "12000"},
        {"id": "A-101", "status": "cancelled", "amount": "8000"},
        {"id": "A-102", "status": "paid", "amount": "15000"},
    ]

    def normalizeOrder(row):
        requiredKeys = {"id", "status", "amount"}
        missingKeys = sorted(requiredKeys - set(row))
        if missingKeys:
            raise KeyError(f"missing keys: {missingKeys}")

        orderId = row["id"].strip()
        status = row["status"].strip().lower()

        try:
            amount = int(row["amount"])
        except ValueError as exc:
            raise ValueError(f"invalid amount: {row['amount']}") from exc

        return {"id": orderId, "status": status, "amount": amount}

    def summarizePaidOrders(orders):
        paidIds = []
        paidAmount = 0

        for order in orders:
            if order["status"] != "paid":
                continue
            paidIds.append(order["id"])
            paidAmount += order["amount"]

        return {
            "paidCount": len(paidIds),
            "paidAmount": paidAmount,
            "paidIds": paidIds,
        }

    normalizedOrders = [normalizeOrder(row) for row in rawOrders]
    summary = summarizePaidOrders(normalizedOrders)

    assert summary["paidCount"] == 2
    assert summary["paidAmount"] == 27000
    assert summary["paidIds"] == ["A-100", "A-102"]

    try:
        normalizeOrder({"id": "A-999", "status": "paid", "amount": "twelve"})
    except ValueError as exc:
        assert "invalid amount" in str(exc)

    with tempfile.TemporaryDirectory() as tempDir:
        reportPath = Path(tempDir) / "midReviewReport.txt"
        reportPath.write_text(
            f"paidCount={summary['paidCount']}\npaidAmount={summary['paidAmount']}",
            encoding="utf-8",
        )
        loadedReport = reportPath.read_text(encoding="utf-8")

    assert "paidCount=2" in loadedReport
    assert "paidAmount=27000" in loadedReport
    print("중간 복습 흐름 통과")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from pathlib import Path
      import tempfile

      rawOrders = [
          {"id": " A-100 ", "status": " PAID ", "amount": "12000"},
          {"id": "A-101", "status": "cancelled", "amount": "8000"},
          {"id": "A-102", "status": "paid", "amount": "15000"},
      ]

      def normalizeOrder(row):
          requiredKeys = {"id", "status", "amount"}
          missingKeys = sorted(requiredKeys - set(row))
          if missingKeys:
              raise KeyError(f"missing keys: {missingKeys}")

          orderId = row["id"].strip()
          status = row["status"].strip().lower()

          try:
              amount = int(row["amount"])
          except ValueError as exc:
              raise ValueError(f"invalid amount: {row['amount']}") from exc

          return {"id": orderId, "status": status, "amount": amount}

      def summarizePaidOrders(orders):
          paidIds = []
          paidAmount = 0

          for order in orders:
              if order["status"] != "paid":
                  continue
              paidIds.append(order["id"])
              paidAmount += order["amount"]

          return {
              "paidCount": len(paidIds),
              "paidAmount": paidAmount,
              "paidIds": paidIds,
          }

      normalizedOrders = [normalizeOrder(row) for row in rawOrders]
      summary = summarizePaidOrders(normalizedOrders)

      assert summary["paidCount"] == 2
      assert summary["paidAmount"] == 27000
      assert summary["paidIds"] == ["A-100", "A-102"]

      try:
          normalizeOrder({"id": "A-999", "status": "paid", "amount": "twelve"})
      except ValueError as exc:
          assert "invalid amount" in str(exc)

      with tempfile.TemporaryDirectory() as tempDir:
          reportPath = Path(tempDir) / "midReviewReport.txt"
          reportPath.write_text(
              f"paidCount={summary['paidCount']}\npaidAmount={summary['paidAmount']}",
              encoding="utf-8",
          )
          loadedReport = reportPath.read_text(encoding="utf-8")

      assert "paidCount=2" in loadedReport
      assert "paidAmount=27000" in loadedReport
      print("중간 복습 흐름 통과")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
