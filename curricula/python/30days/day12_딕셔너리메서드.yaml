sections:
- id: method_get
  title: get() 메서드
  structuredPrimary: true
  subtitle: 안전한 값 접근
  goal: get() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    get() 메서드는 대괄호[] 접근의 안전한 대안입니다. 키가 없어도 에러 없이 None을 반환하며, 기본값을 지정할 수도 있습니다. dict.get(key) 또는 dict.get(key, default) 형식으로 사용합니다.

    get()은 설정값이나 옵션 처리에 매우 유용합니다.
  tips:
  - get()은 설정값이나 옵션 처리에 매우 유용합니다.
  snippet: |-
    config = {'host': 'localhost', 'port': 8080}
    config.get('host')
  exercise:
    prompt: get() 메서드 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      config = {'host': 'localhost', 'port': 8080}
      config.get('host')
    hints:
    - get() 메서드 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: get() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: get() 메서드에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
