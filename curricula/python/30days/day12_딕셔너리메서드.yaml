- id: method_update
  title: update() 메서드
  structuredPrimary: true
  subtitle: 딕셔너리 병합
  goal: update() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    update() 메서드는 다른 딕셔너리의 키-값 쌍을 현재 딕셔너리에 추가하거나 업데이트합니다. dict1.update(dict2) 형식으로 사용하며, dict2의 내용이 dict1에 병합됩니다. 같은 키가 있으면 값이 덮어씌워집니다.

    update()는 설정 병합이나 데이터 통합에 매우 유용합니다.
  tips:
  - update()는 설정 병합이나 데이터 통합에 매우 유용합니다.
  snippet: |-
    user = {'name': '김철수', 'age': 30}
    extra = {'city': '서울', 'job': 'developer'}
    user.update(extra)
    user
  exercise:
    prompt: update() 메서드 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      user = {'name': '김철수', 'age': 30}
      extra = {'city': '서울', 'job': 'developer'}
      user.update(extra)
      user
    hints:
    - update() 메서드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: update() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: update() 메서드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_pop
  title: pop() 메서드
  structuredPrimary: true
  subtitle: 키로 값 제거하고 반환
  goal: pop() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    pop() 메서드는 지정한 키의 값을 제거하고 그 값을 반환합니다. dict.pop(key) 형식으로 사용하며, 없는 키를 pop하면 에러가 발생합니다. dict.pop(key, default)로 기본값을 지정할 수 있습니다.

    pop()은 값을 꺼내면서 동시에 제거할 때 유용합니다.
  tips:
  - pop()은 값을 꺼내면서 동시에 제거할 때 유용합니다.
  snippet: |-
    stock = {'laptop': 10, 'mouse': 50, 'keyboard': 30}
    stock.pop('mouse')
  exercise:
    prompt: pop() 메서드 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      stock = {'laptop': 10, 'mouse': 50, 'keyboard': 30}
      stock.pop('mouse')
    hints:
    - pop() 메서드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: pop() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: pop() 메서드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_popitem
  title: popitem() 메서드
  structuredPrimary: true
  subtitle: 마지막 키-값 쌍 제거
  goal: popitem() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    popitem() 메서드는 딕셔너리의 마지막 키-값 쌍을 제거하고 (키, 값) 튜플로 반환합니다. dict.popitem() 형식으로 사용하며, 빈 딕셔너리에 사용하면 에러가 발생합니다.

    popitem()은 LIFO(후입선출) 스택 구현에 유용합니다.
  tips:
  - popitem()은 LIFO(후입선출) 스택 구현에 유용합니다.
  snippet: |-
    queue = {'first': 1, 'second': 2, 'third': 3}
    queue.popitem()
  exercise:
