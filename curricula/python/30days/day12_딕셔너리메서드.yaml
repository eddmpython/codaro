sections:
- id: method_get
  title: get() 메서드
  structuredPrimary: true
  subtitle: 안전한 값 접근
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    get() 메서드는 대괄호[] 접근의 안전한 대안입니다. 키가 없어도 에러 없이 None을 반환하며, 기본값을 지정할 수도 있습니다. dict.get(key) 또는 dict.get(key, default) 형식으로 사용합니다.

    get()은 설정값이나 옵션 처리에 매우 유용합니다.
  tips:
  - get()은 설정값이나 옵션 처리에 매우 유용합니다.
  snippet: |-
    config = {'host': 'localhost', 'port': 8080}
    config.get('host')
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      config = {'host': 'localhost', 'port': 8080}
      config.get('host')
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: method_keys
  title: keys() 메서드
  structuredPrimary: true
  subtitle: 모든 키 가져오기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    keys() 메서드는 딕셔너리의 모든 키를 dict_keys 객체로 반환합니다. list()로 변환하여 리스트로 사용할 수 있습니다. 키만 필요할 때 유용합니다.

    keys()는 딕셔너리 순회나 키 확인에 사용됩니다.
  tips:
  - keys()는 딕셔너리 순회나 키 확인에 사용됩니다.
  snippet: |-
    grade = {'math': 85, 'english': 90, 'science': 88}
    grade.keys()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      grade = {'math': 85, 'english': 90, 'science': 88}
      grade.keys()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
