    language: python
    title: 깨지는 연결식 확인
    description: + 연결은 숫자를 자동 변환하지 않으므로, 실패를 확인한 뒤 f-string으로 고칩니다.
    content: |-
      itemName = '노트'
      quantity = 3

      try:
          brokenLine = itemName + ' x ' + quantity
      except TypeError as exc:
          validationMessage = str(exc)
      else:
          raise AssertionError('문자열과 숫자 직접 연결은 실패해야 합니다')

      fixedLine = f'{itemName} x {quantity}'

      assert 'str' in validationMessage
      assert fixedLine == '노트 x 3'
  - type: code
    language: python
    title: 영수증 필수 줄 검증
    description: 출력 문자열에 합계 줄이 없으면 명확한 ValueError로 실패시킵니다.
    content: |-
      def requireReceiptTotal(receiptText):
          if '합계:' not in receiptText:
              raise ValueError('영수증에는 합계 줄이 필요합니다')
          return receiptText


      validReceipt = '코다로 문구\n노트 x 3\n합계: 7500원'
      assert requireReceiptTotal(validReceipt) == validReceipt

      try:
          requireReceiptTotal('코다로 문구\n노트 x 3')
      except ValueError as exc:
          errorMessage = str(exc)
      else:
          raise AssertionError('합계 줄이 없으면 실패해야 합니다')

      assert errorMessage == '영수증에는 합계 줄이 필요합니다'
