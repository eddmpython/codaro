    content: |-
      storeName = '코다로 문구'
      itemName = '노트'
      quantity = 3
      unitPrice = 2500
      totalPrice = quantity * unitPrice
      divider = '=' * 24

      receipt = (
          f'{divider}\n'
          f'{storeName}\n'
          f'{divider}\n'
          f'품목: {itemName}\n'
          f'수량: {quantity}\n'
          f'합계: {totalPrice}원'
      )

