    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 영수증 문자열을 안전하게 만들기'
  structuredPrimary: true
  subtitle: 문자열을 업무 출력물로 조립하고 검증하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 문자열 기초는 단어를 붙이는 데서 끝나지 않습니다. 실제 업무에서는 영수증, 알림 문구, 로그 메시지처럼 사람이 읽을 출력물을 만들고, 빠진 줄이나 잘못된 변환이 없는지 검증해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    storeName = '코다로 문구'
    itemName = '노트'
    quantity = 3
    unitPrice = 2500
    totalPrice = quantity * unitPrice
    divider = '=' * 24

    receipt = (
        f'{divider}\n'
        f'{storeName}\n'
        f'{divider}\n'
        f'품목: {itemName}\n'
        f'수량: {quantity}\n'
        f'합계: {totalPrice}원'
    )

    assert storeName in receipt
    assert f'합계: {totalPrice}원' in receipt
    assert receipt.count('\n') == 5
    print(receipt)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      level = 'INFO'
      action = 'order_created'
      orderId = 'ORD-2026-0007'
      logLine = f'[{level}] {action}: {orderId}'

      assert logLine.startswith('[INFO]')
      assert 'order_created' in logLine
      assert 'ERROR' not in logLine
      logLine
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
