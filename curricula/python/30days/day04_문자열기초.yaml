      print(lines)
    solution: |-
      lines = '첫 번째 줄\n두 번째 줄\n세 번째 줄'
      print(lines)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 이스케이프 문자는 백슬래시(\)로 시작하는 특수 문자입니다. \n은 줄바꿈을 의미하며, 문자열 중간에 사용하면 그 지점에서 줄이 바뀝니다. 여러 줄 출력에 유용합니다.
  - type: list
    items:
    - \n은 줄바꿈 문자
    - 백슬래시(\)로 시작
    - 문자열 중간에 삽입 가능
  - type: code
    language: python
    title: 줄바꿈 문자
    description: \n을 사용하여 줄을 바꿉니다.
    content: |-
