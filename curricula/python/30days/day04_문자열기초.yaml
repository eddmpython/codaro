  explanation: |-
    in 연산자는 문자열 안에 특정 문자나 단어가 포함되어 있는지 확인합니다. 포함되어 있으면 True, 없으면 False를 반환합니다.

    대소문자를 구분하므로 'python' in inCheckText는 False입니다.
  tips:
  - 대소문자를 구분하므로 'python' in inCheckText는 False입니다.
  snippet: |-
    phrase = 'Python Programming'
    'Python' in phrase
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      phrase = 'Python Programming'
      'Python' in phrase
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
