sections:
- id: string_concat
  title: 문자열 연결
  structuredPrimary: true
  subtitle: + 기호로 문자열 합치기
  goal: '문자열 연결: 실행 가능한 Python 흐름으로 익힌다.'
  why: '문자열 연결: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    문자열은 + 연산자로 연결할 수 있습니다. 두 개 이상의 문자열을 하나로 합칠 때 사용합니다. 숫자의 덧셈과 같은 기호지만 문자열에서는 연결의 의미입니다.

    공백을 넣으려면 ' ' 처럼 공백 문자열을 중간에 추가합니다.
  tips:
  - 공백을 넣으려면 ' ' 처럼 공백 문자열을 중간에 추가합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    first = 'Hello'
    second = 'World'
    first + ' ' + second
  exercise:
    prompt: '문자열 연결: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      first = 'Hello'
      second = 'World'
      first + ' ' + second
    solution: |-
      first = 'Hello'
      second = 'World'
      first + ' ' + second
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 문자열은 + 연산자로 연결할 수 있습니다. 두 개 이상의 문자열을 하나로 합칠 때 사용합니다. 숫자의 덧셈과 같은 기호지만 문자열에서는 연결의 의미입니다.
  - type: list
    items:
    - + 기호로 문자열 연결
    - 여러 문자열 연결 가능
    - 공백도 문자로 포함됨
  - type: code
    language: python
    title: 문자열 연결
    description: 두 문자열을 + 기호로 연결합니다.
    content: |-
      first = 'Hello'
      second = 'World'
      first + ' ' + second
  - type: tip
    content: 공백을 넣으려면 ' ' 처럼 공백 문자열을 중간에 추가합니다.
