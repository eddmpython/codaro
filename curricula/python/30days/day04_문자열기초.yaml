- id: workflow_validation
  title: '검증 루프: 영수증 문자열을 안전하게 만들기'
  structuredPrimary: true
  subtitle: 문자열을 업무 출력물로 조립하고 검증하기
  goal: '검증 루프: 영수증 문자열을 안전하게 만들기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '검증 루프: 영수증 문자열을 안전하게 만들기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 문자열 기초는 단어를 붙이는 데서 끝나지 않습니다. 실제 업무에서는 영수증, 알림 문구, 로그 메시지처럼 사람이 읽을 출력물을 만들고, 빠진 줄이나 잘못된 변환이 없는지 검증해야 합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    storeName = '코다로 문구'
    itemName = '노트'
    quantity = 3
    unitPrice = 2500
    totalPrice = quantity * unitPrice
    divider = '=' * 24

    receipt = (
        f'{divider}\n'
        f'{storeName}\n'
        f'{divider}\n'
        f'품목: {itemName}\n'
        f'수량: {quantity}\n'
        f'합계: {totalPrice}원'
