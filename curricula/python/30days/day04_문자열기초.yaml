- id: fstring
  title: f-string 포맷팅
  structuredPrimary: true
  subtitle: f-string으로 간편하게 문자열 만들기
  goal: 'f-string 포맷팅: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'f-string 포맷팅: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    f-string은 문자열 앞에 f를 붙여 변수를 직접 넣을 수 있는 방법입니다. + 연결이나 str() 변환 없이도 변수와 문자를 자연스럽게 조합할 수 있습니다. 중괄호 {} 안에 변수명이나 표현식을 넣으면 자동으로 문자열로 변환됩니다.

    중괄호 {} 안에는 변수뿐만 아니라 연산식(예: {age + 1})도 넣을 수 있습니다.
  tips:
  - '중괄호 {} 안에는 변수뿐만 아니라 연산식(예: {age + 1})도 넣을 수 있습니다.'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    name = '김철수'
    age = 25
    f'{name}님의 나이는 {age}세입니다'
  exercise:
    prompt: 'f-string 포맷팅: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      name = '김철수'
      age = 25
      f'{name}님의 나이는 {age}세입니다'
    solution: |-
      name = '김철수'
      age = 25
      f'{name}님의 나이는 {age}세입니다'
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: f-string은 문자열 앞에 f를 붙여 변수를 직접 넣을 수 있는 방법입니다. + 연결이나 str() 변환 없이도 변수와 문자를 자연스럽게 조합할 수 있습니다. 중괄호 {} 안에 변수명이나 표현식을
      넣으면 자동으로 문자열로 변환됩니다.
  - type: list
    items:
    - f'...' 형식으로 사용
    - '{변수명}으로 변수 삽입'
    - 자동으로 str() 변환
    - + 연결보다 읽기 쉬움
  - type: code
    language: python
    title: f-string 기본
    description: f-string으로 변수를 문자열에 삽입합니다.
    content: |-
      name = '김철수'
      age = 25
      f'{name}님의 나이는 {age}세입니다'
  - type: tip
    content: '중괄호 {} 안에는 변수뿐만 아니라 연산식(예: {age + 1})도 넣을 수 있습니다.'
- id: escape_newline
