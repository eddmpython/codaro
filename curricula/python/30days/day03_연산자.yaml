- id: workflow_validation
  title: '검증 루프: 주문 계산식과 승인 조건'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 연산자는 계산 결과를 맞히는 문법 문제가 아니라, 업무 규칙을 숫자와 조건식으로 정확히 옮기는 도구입니다. 실행 전에는 소계, 할인, 세금, 승인 여부를 먼저 예측하고, 괄호 하나가 결과를 어떻게 바꾸는지 검증해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    unitPrice = 12000
    quantity = 4
    discountRate = 10
    taxRate = 8

    subtotal = unitPrice * quantity
    discount = subtotal * discountRate / 100
    taxableAmount = subtotal - discount
    tax = taxableAmount * taxRate / 100
    total = taxableAmount + tax

    assert subtotal == 48000
    assert discount == 4800
    assert total == 46656
    total
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      unitPrice = 12000
      quantity = 4
      discountRate = 10
      taxRate = 8

      subtotal = unitPrice * quantity
      discount = subtotal * discountRate / 100
      taxableAmount = subtotal - discount
      tax = taxableAmount * taxRate / 100
      total = taxableAmount + tax

      assert subtotal == 48000
      assert discount == 4800
      assert total == 46656
      total
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
