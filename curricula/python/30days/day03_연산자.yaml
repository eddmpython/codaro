sections:
- id: add_operator
  title: 덧셈 연산자
  structuredPrimary: true
  subtitle: + 기호로 더하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    덧셈 연산자(+)는 두 숫자를 더합니다. 정수끼리, 소수끼리, 정수와 소수를 섞어서도 계산할 수 있습니다. 결과는 자동으로 화면에 표시됩니다.

    결과를 변수에 저장하려면 result = price + qty처럼 사용합니다.
  tips:
  - 결과를 변수에 저장하려면 result = price + qty처럼 사용합니다.
  snippet: |-
    itemA = 10
    itemB = 20
    itemA + itemB
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      itemA = 10
      itemB = 20
      itemA + itemB
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: sub_operator
  title: 뺄셈 연산자
  structuredPrimary: true
  subtitle: '- 기호로 빼기'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 뺄셈 연산자(-)는 앞 숫자에서 뒤 숫자를 뺍니다. 음수 결과도 가능하며, 순서가 중요합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    budget = 100
    spent = 35
    budget - spent
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      budget = 100
      spent = 35
      budget - spent
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: mul_operator
  title: 곱셈 연산자
  structuredPrimary: true
  subtitle: '* 기호로 곱하기'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 곱셈 연산자(*)는 두 숫자를 곱합니다. 수학에서는 ×를 사용하지만, 프로그래밍에서는 *를 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    width = 7
    height = 8
    width * height
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      width = 7
      height = 8
      width * height
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: div_operator
  title: 나눗셈 연산자
  structuredPrimary: true
  subtitle: / 기호로 나누기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    나눗셈 연산자(/)는 앞 숫자를 뒤 숫자로 나눕니다. 결과는 항상 소수(float)로 나옵니다. 정수 나누기 정수도 결과는 소수입니다.

    결과가 3.3333...처럼 소수로 나옵니다.
  tips:
  - 결과가 3.3333...처럼 소수로 나옵니다.
  snippet: |-
    dividend = 10
    divisor = 3
    dividend / divisor
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      dividend = 10
      divisor = 3
      dividend / divisor
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: floordiv_operator
  title: 몫 연산자
  structuredPrimary: true
  subtitle: // 기호로 몫 구하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 몫 연산자(//)는 나눗셈의 몫만 구합니다. 소수점 이하는 버리고 정수 부분만 반환합니다. 10 // 3 = 3 (나머지 1은 버림)
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    items = 17
    boxes = 5
    items // boxes
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      items = 17
      boxes = 5
      items // boxes
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: mod_operator
  title: 나머지 연산자
  structuredPrimary: true
  subtitle: '% 기호로 나머지 구하기'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    나머지 연산자(%)는 나눗셈의 나머지를 구합니다. 10 % 3 = 1 (10을 3으로 나누면 몫 3, 나머지 1) 짝수/홀수 판별, 배수 확인 등에 자주 사용됩니다.

    val % 2가 0이면 짝수, 1이면 홀수입니다.
  tips:
  - val % 2가 0이면 짝수, 1이면 홀수입니다.
  snippet: |-
    coins = 17
    slots = 5
    coins % slots
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      coins = 17
      slots = 5
      coins % slots
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: pow_operator
  title: 거듭제곱 연산자
  structuredPrimary: true
  subtitle: '** 기호로 제곱 계산'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 거듭제곱 연산자(**)는 앞 숫자를 뒤 숫자만큼 거듭제곱합니다. 2 ** 3 = 8 (2 × 2 × 2) 수학의 2³를 프로그래밍에서는 2 ** 3으로 씁니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    base = 2
    power = 10
    base ** power
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      base = 2
      power = 10
      base ** power
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: compare_equal
  title: 같음 비교 연산자
  structuredPrimary: true
  subtitle: == 기호로 같은지 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    같음 연산자(==)는 두 값이 같은지 비교합니다. 같으면 True, 다르면 False를 반환합니다. 주의: 대입(=)과 비교(==)는 다릅니다!

    = 하나는 대입, == 두 개는 비교입니다.
  tips:
  - = 하나는 대입, == 두 개는 비교입니다.
  snippet: |-
    left = 10
    right = 10
    left == right
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      left = 10
      right = 10
      left == right
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: compare_notequal
  title: 다름 비교 연산자
  structuredPrimary: true
  subtitle: '!= 기호로 다른지 확인'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 다름 연산자(!=)는 두 값이 다른지 비교합니다. 다르면 True, 같으면 False를 반환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    first = 5
    second = 8
    first != second
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      first = 5
      second = 8
      first != second
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: compare_greater
  title: 크기 비교 연산자
  structuredPrimary: true
  subtitle: '> < >= <= 기호로 크기 비교'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 크기 비교 연산자는 두 값의 대소를 비교합니다. > (크다), < (작다), >= (크거나 같다), <= (작거나 같다) 결과는 True 또는 False입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    val = 15
    target = 10
    val > target
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      val = 15
      target = 10
      val > target
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: logical_and
  title: and 논리 연산자
  structuredPrimary: true
  subtitle: 모두 참이어야 참
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: and 연산자는 양쪽 조건이 모두 True일 때만 True를 반환합니다. 하나라도 False면 결과는 False입니다. '그리고'의 의미입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    adult = True
    valid = True
    adult and valid
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      adult = True
      valid = True
      adult and valid
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: logical_or
  title: or 논리 연산자
  structuredPrimary: true
  subtitle: 하나만 참이어도 참
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: or 연산자는 양쪽 조건 중 하나만 True여도 True를 반환합니다. 둘 다 False일 때만 False입니다. '또는'의 의미입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    cash = True
    card = False
    cash or card
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      cash = True
      card = False
      cash or card
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: logical_not
  title: not 논리 연산자
  structuredPrimary: true
  subtitle: 참과 거짓 반전
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: not 연산자는 True를 False로, False를 True로 바꿉니다. 조건의 반대를 표현할 때 사용합니다. '아니다'의 의미입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    rain = True
    not rain
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      rain = True
      not rain
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: membership_in
  title: in 멤버십 연산자
  structuredPrimary: true
  subtitle: 포함 여부 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    in 연산자는 왼쪽 값이 오른쪽 문자열에 포함되어 있는지 확인합니다. 포함되어 있으면 True, 없으면 False를 반환합니다. 문자열에서 특정 문자나 단어를 찾을 때 사용합니다.

    'not in'을 사용하면 포함되지 않았는지 확인할 수 있습니다.
  tips:
  - '''not in''을 사용하면 포함되지 않았는지 확인할 수 있습니다.'
  snippet: |-
    lang = 'Python'
    'th' in lang
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      lang = 'Python'
      'th' in lang
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: compound_assign
  title: 복합 대입 연산자
  structuredPrimary: true
  subtitle: 연산과 대입을 한번에
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 복합 대입 연산자는 연산과 대입을 동시에 합니다. x += 5는 x = x + 5와 같은 의미입니다. 코드를 더 간결하게 만들어줍니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    balance = 50
    balance += 10
    balance
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      balance = 50
      balance += 10
      balance
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: operator_priority
  title: 연산자 우선순위
