  explanation: 곱셈 연산자(*)는 두 숫자를 곱합니다. 수학에서는 ×를 사용하지만, 프로그래밍에서는 *를 사용합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    width = 7
    height = 8
    width * height
  exercise:
    prompt: '곱셈 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      width = 7
      height = 8
      width * height
    solution: |-
      width = 7
      height = 8
      width * height
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 곱셈 연산자(*)는 두 숫자를 곱합니다. 수학에서는 ×를 사용하지만, 프로그래밍에서는 *를 사용합니다.
  - type: list
    items:
    - '* 기호로 곱셈'
    - 정수와 소수 모두 가능
    - 음수 곱셈도 가능
  - type: code
    language: python
    title: 곱셈 계산
    description: 7과 8을 곱한 결과입니다.
    content: |-
      width = 7
      height = 8
      width * height
- id: div_operator
  title: 나눗셈 연산자
  structuredPrimary: true
  subtitle: / 기호로 나누기
  goal: '나눗셈 연산자: 실행 가능한 Python 흐름으로 익힌다.'
  why: '나눗셈 연산자: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    나눗셈 연산자(/)는 앞 숫자를 뒤 숫자로 나눕니다. 결과는 항상 소수(float)로 나옵니다. 정수 나누기 정수도 결과는 소수입니다.

    결과가 3.3333...처럼 소수로 나옵니다.
  tips:
  - 결과가 3.3333...처럼 소수로 나옵니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    dividend = 10
    divisor = 3
    dividend / divisor
  exercise:
    prompt: '나눗셈 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      dividend = 10
      divisor = 3
      dividend / divisor
    solution: |-
      dividend = 10
      divisor = 3
      dividend / divisor
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 나눗셈 연산자(/)는 앞 숫자를 뒤 숫자로 나눕니다. 결과는 항상 소수(float)로 나옵니다. 정수 나누기 정수도 결과는 소수입니다.
  - type: list
    items:
    - / 기호로 나눗셈
    - 결과는 항상 소수
    - 0으로 나누면 에러
  - type: code
    language: python
    title: 나눗셈 계산
    description: 10을 3으로 나눈 결과입니다.
    content: |-
      dividend = 10
      divisor = 3
      dividend / divisor
  - type: tip
    content: 결과가 3.3333...처럼 소수로 나옵니다.
