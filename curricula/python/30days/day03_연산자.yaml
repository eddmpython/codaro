sections:
- id: add_operator
  title: 덧셈 연산자
  structuredPrimary: true
  subtitle: + 기호로 더하기
  goal: '덧셈 연산자: 실행 가능한 Python 흐름으로 익힌다.'
  why: '덧셈 연산자: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    덧셈 연산자(+)는 두 숫자를 더합니다. 정수끼리, 소수끼리, 정수와 소수를 섞어서도 계산할 수 있습니다. 결과는 자동으로 화면에 표시됩니다.

    결과를 변수에 저장하려면 result = price + qty처럼 사용합니다.
  tips:
  - 결과를 변수에 저장하려면 result = price + qty처럼 사용합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    itemA = 10
    itemB = 20
    itemA + itemB
  exercise:
    prompt: '덧셈 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      itemA = 10
      itemB = 20
      itemA + itemB
    solution: |-
      itemA = 10
      itemB = 20
      itemA + itemB
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 덧셈 연산자(+)는 두 숫자를 더합니다. 정수끼리, 소수끼리, 정수와 소수를 섞어서도 계산할 수 있습니다. 결과는 자동으로 화면에 표시됩니다.
  - type: list
    items:
    - 정수 덧셈 가능
    - 소수 덧셈 가능
    - 정수 + 소수 = 소수
  - type: code
    language: python
    title: 덧셈 계산
    description: 두 숫자를 더한 결과가 자동 출력됩니다.
    content: |-
      itemA = 10
      itemB = 20
      itemA + itemB
  - type: tip
    content: 결과를 변수에 저장하려면 result = price + qty처럼 사용합니다.
- id: sub_operator
  title: 뺄셈 연산자
  structuredPrimary: true
  subtitle: '- 기호로 빼기'
  goal: '뺄셈 연산자: 실행 가능한 Python 흐름으로 익힌다.'
  why: '뺄셈 연산자: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 뺄셈 연산자(-)는 앞 숫자에서 뒤 숫자를 뺍니다. 음수 결과도 가능하며, 순서가 중요합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    budget = 100
    spent = 35
    budget - spent
  exercise:
    prompt: '뺄셈 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      budget = 100
      spent = 35
      budget - spent
    solution: |-
      budget = 100
      spent = 35
      budget - spent
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 뺄셈 연산자(-)는 앞 숫자에서 뒤 숫자를 뺍니다. 음수 결과도 가능하며, 순서가 중요합니다.
  - type: list
    items:
    - 앞 숫자 - 뒤 숫자
    - 음수 결과 가능
    - 순서 바뀌면 결과도 바뀜
  - type: code
    language: python
    title: 뺄셈 계산
    description: 100에서 35를 뺀 결과입니다.
    content: |-
      budget = 100
      spent = 35
      budget - spent
- id: mul_operator
  title: 곱셈 연산자
  structuredPrimary: true
  subtitle: '* 기호로 곱하기'
  goal: '곱셈 연산자: 실행 가능한 Python 흐름으로 익힌다.'
