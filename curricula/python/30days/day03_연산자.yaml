    starterCode: |-
      items = 17
      boxes = 5
      items // boxes
    solution: |-
      items = 17
      boxes = 5
      items // boxes
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 몫 연산자(//)는 나눗셈의 몫만 구합니다. 소수점 이하는 버리고 정수 부분만 반환합니다. 10 // 3 = 3 (나머지 1은 버림)
  - type: list
    items:
    - // 기호로 몫 계산
    - 소수점 이하 버림
    - 정수 결과 반환
  - type: code
    language: python
    title: 몫 계산
    description: 17을 5로 나눈 몫을 구합니다.
    content: |-
      items = 17
      boxes = 5
      items // boxes
- id: mod_operator
  title: 나머지 연산자
  structuredPrimary: true
  subtitle: '% 기호로 나머지 구하기'
  goal: '나머지 연산자: 실행 가능한 Python 흐름으로 익힌다.'
  why: '나머지 연산자: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    나머지 연산자(%)는 나눗셈의 나머지를 구합니다. 10 % 3 = 1 (10을 3으로 나누면 몫 3, 나머지 1) 짝수/홀수 판별, 배수 확인 등에 자주 사용됩니다.

    val % 2가 0이면 짝수, 1이면 홀수입니다.
  tips:
  - val % 2가 0이면 짝수, 1이면 홀수입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    coins = 17
    slots = 5
    coins % slots
  exercise:
    prompt: '나머지 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      coins = 17
      slots = 5
      coins % slots
    solution: |-
      coins = 17
      slots = 5
      coins % slots
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 나머지 연산자(%)는 나눗셈의 나머지를 구합니다. 10 % 3 = 1 (10을 3으로 나누면 몫 3, 나머지 1) 짝수/홀수 판별, 배수 확인 등에 자주 사용됩니다.
  - type: list
    items:
    - '% 기호로 나머지 계산'
    - 나눗셈 후 남은 값
    - 짝수/홀수 판별에 유용
  - type: code
    language: python
    title: 나머지 계산
    description: 17을 5로 나눈 나머지를 구합니다.
    content: |-
      coins = 17
      slots = 5
      coins % slots
  - type: tip
    content: val % 2가 0이면 짝수, 1이면 홀수입니다.
- id: pow_operator
  title: 거듭제곱 연산자
  structuredPrimary: true
  subtitle: '** 기호로 제곱 계산'
  goal: '거듭제곱 연산자: 실행 가능한 Python 흐름으로 익힌다.'
  why: '거듭제곱 연산자: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 거듭제곱 연산자(**)는 앞 숫자를 뒤 숫자만큼 거듭제곱합니다. 2 ** 3 = 8 (2 × 2 × 2) 수학의 2³를 프로그래밍에서는 2 ** 3으로 씁니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    base = 2
    power = 10
    base ** power
  exercise:
    prompt: '거듭제곱 연산자: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      base = 2
      power = 10
      base ** power
    solution: |-
      base = 2
      power = 10
      base ** power
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
