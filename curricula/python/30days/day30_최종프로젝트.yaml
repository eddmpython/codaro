    def parseCSV(content):
        lines = content.strip().split('\n')
        header = lines[0].split(',')
        data = []
        for line in lines[1:]:
            values = line.split(',')
            row = dict(zip(header, values))
            data.append(row)
        return data

    csvContent = 'name,age\nAlice,25\nBob,30'
