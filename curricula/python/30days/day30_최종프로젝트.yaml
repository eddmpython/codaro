        seen = set()
        unique = []
        for item in arr:
            if item not in seen:
                seen.add(item)
                unique.append(item)
        return sorted(unique)

    mixedData = [3, 1, 4, 1, 5, 9, 2, 6, 5, 3]
    uniqueSorted(mixedData)
