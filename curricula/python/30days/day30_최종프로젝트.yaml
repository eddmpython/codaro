    def analyzeWords(text):
        words = text.lower().split()
        frequency = {}
        for word in words:
            cleaned = word.strip('.,!?')
            if cleaned:
                frequency[cleaned] = frequency.get(cleaned, 0) + 1
        return frequency

    sampleText = 'hello world hello python world'
    analyzeWords(sampleText)
