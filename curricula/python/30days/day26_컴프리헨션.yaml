- id: list_comprehension_basic
  title: 리스트 컴프리헨션 기초
  structuredPrimary: true
  subtitle: 간결한 리스트 생성
  goal: '리스트 컴프리헨션 기초: 실행 가능한 Python 흐름으로 익힌다.'
  why: '리스트 컴프리헨션 기초: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    리스트 컴프리헨션은 for 반복문을 한 줄로 압축하여 새로운 리스트를 만드는 방법입니다. [표현식 for 변수 in 시퀀스] 형태로 작성하며, 기존 반복문보다 간결하고 읽기 쉬운 코드를 만들 수 있습니다. 파이썬스러운 코드 작성의 핵심 기법입니다.

    리스트 컴프리헨션은 간결하지만, 너무 복잡하면 가독성이 떨어지니 적절히 사용하세요.
  tips:
  - 리스트 컴프리헨션은 간결하지만, 너무 복잡하면 가독성이 떨어지니 적절히 사용하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    nums = [1, 2, 3, 4, 5]
    squared = [x ** 2 for x in nums]
    squared
  exercise:
    prompt: '리스트 컴프리헨션 기초: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      nums = [1, 2, 3, 4, 5]
      squared = [x ** 2 for x in nums]
      squared
    solution: |-
      nums = [1, 2, 3, 4, 5]
      squared = [x ** 2 for x in nums]
      squared
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
