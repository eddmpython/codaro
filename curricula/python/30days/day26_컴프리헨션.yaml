    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 리스트 컴프리헨션은 for 반복문을 한 줄로 압축하여 새로운 리스트를 만드는 방법입니다. [표현식 for 변수 in 시퀀스] 형태로 작성하며, 기존 반복문보다 간결하고 읽기 쉬운 코드를 만들 수
      있습니다. 파이썬스러운 코드 작성의 핵심 기법입니다.
  - type: list
    items:
    - '[표현식 for 변수 in 시퀀스] 형식'
    - 한 줄로 리스트 생성
    - 반복문보다 간결
    - 파이썬스러운 코드
  - type: code
    language: python
    title: 기본 컴프리헨션
    description: 리스트의 각 요소를 제곱합니다.
    content: |-
      nums = [1, 2, 3, 4, 5]
      squared = [x ** 2 for x in nums]
      squared
  - type: code
    language: python
    title: 문자열 변환
    description: 문자열 리스트를 모두 대문자로 변환합니다.
    content: |-
      words = ['hello', 'world', 'python']
      upper = [w.upper() for w in words]
      upper
  - type: code
    language: python
    title: 계산 결과
    description: 범위의 각 수에 10을 곱합니다.
    content: |-
      multiplied = [n * 10 for n in range(5)]
