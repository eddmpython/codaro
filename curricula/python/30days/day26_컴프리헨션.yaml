- id: list_comprehension_advanced
  title: 고급 리스트 컴프리헨션
  structuredPrimary: true
  subtitle: 복잡한 표현식과 다중 조건
  goal: '고급 리스트 컴프리헨션: 실행 가능한 Python 흐름으로 익힌다.'
  why: '고급 리스트 컴프리헨션: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    리스트 컴프리헨션은 복잡한 표현식, if-else 구문, 다중 조건을 모두 지원합니다. 삼항 연산자를 활용하거나 여러 조건을 and/or로 연결할 수 있습니다. 다만 너무 복잡해지면 일반 반복문이 더 읽기 쉬울 수 있습니다.

    한 줄이 너무 길어지면 괄호 안에서 여러 줄로 나눌 수 있습니다.
  tips:
  - 한 줄이 너무 길어지면 괄호 안에서 여러 줄로 나눌 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    data = [1, 2, 3, 4, 5]
    result = [x if x % 2 == 1 else x * 2 for x in data]
    result
  exercise:
    prompt: '고급 리스트 컴프리헨션: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      data = [1, 2, 3, 4, 5]
      result = [x if x % 2 == 1 else x * 2 for x in data]
      result
    solution: |-
      data = [1, 2, 3, 4, 5]
      result = [x if x % 2 == 1 else x * 2 for x in data]
      result
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 리스트 컴프리헨션은 복잡한 표현식, if-else 구문, 다중 조건을 모두 지원합니다. 삼항 연산자를 활용하거나 여러 조건을 and/or로 연결할 수 있습니다. 다만 너무 복잡해지면 일반 반복문이
      더 읽기 쉬울 수 있습니다.
  - type: list
    items:
    - if-else 삼항 연산자
    - 다중 조건 결합
    - 복잡한 표현식
    - 가독성 고려 필수
  - type: code
    language: python
    title: if-else 사용
    description: 홀수는 그대로, 짝수는 2배로 만듭니다.
    content: |-
      data = [1, 2, 3, 4, 5]
      result = [x if x % 2 == 1 else x * 2 for x in data]
      result
  - type: code
    language: python
    title: 다중 조건
    description: 여러 조건을 만족하는 요소만 선택합니다.
    content: |-
      scores = [45, 55, 65, 75, 85, 95]
      passing = [s for s in scores if s >= 60 and s < 80]
      passing
  - type: code
    language: python
    title: 메서드 체이닝
    description: 여러 메서드를 연결하여 변환합니다.
    content: |-
      items = ['  Hello  ', '  World  ', '  Python  ']
      cleaned = [item.strip().lower() for item in items]
      cleaned
  - type: tip
    content: 한 줄이 너무 길어지면 괄호 안에서 여러 줄로 나눌 수 있습니다.
- id: dict_comprehension
  title: 딕셔너리 컴프리헨션
  structuredPrimary: true
  subtitle: 딕셔너리 생성과 변환
  goal: '딕셔너리 컴프리헨션: 실행 가능한 Python 흐름으로 익힌다.'
  why: '딕셔너리 컴프리헨션: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    딕셔너리 컴프리헨션은 리스트 컴프리헨션과 비슷하지만 중괄호를 사용하고 key: value 쌍을 생성합니다. {key: value for 변수 in 시퀀스} 형태로 작성하며, 기존 데이터를 딕셔너리로 변환하거나 딕셔너리를 필터링할 때 유용합니다.

    딕셔너리 컴프리헨션으로 두 리스트를 zip과 함께 사용하면 매핑을 쉽게 만들 수 있습니다.
  tips:
  - 딕셔너리 컴프리헨션으로 두 리스트를 zip과 함께 사용하면 매핑을 쉽게 만들 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    squares = {n: n ** 2 for n in range(5)}
    squares
  exercise:
    prompt: '딕셔너리 컴프리헨션: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      squares = {n: n ** 2 for n in range(5)}
      squares
    solution: |-
      squares = {n: n ** 2 for n in range(5)}
      squares
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: '딕셔너리 컴프리헨션은 리스트 컴프리헨션과 비슷하지만 중괄호를 사용하고 key: value 쌍을 생성합니다. {key: value for 변수 in 시퀀스} 형태로 작성하며, 기존 데이터를 딕셔너리로
      변환하거나 딕셔너리를 필터링할 때 유용합니다.'
  - type: list
    items:
    - '{key: value for 변수 in 시퀀스}'
    - key-value 쌍 생성
    - 딕셔너리 변환과 필터링
    - 간결한 매핑 생성
  - type: code
    language: python
    title: 기본 딕셔너리 생성
    description: 숫자와 그 제곱을 매핑합니다.
    content: |-
      squares = {n: n ** 2 for n in range(5)}
      squares
  - type: code
    language: python
    title: 리스트를 딕셔너리로
    description: 문자열 리스트를 길이와 매핑합니다.
    content: |-
      terms = ['cat', 'dog', 'elephant']
      lengths = {w: len(w) for w in terms}
      lengths
  - type: code
    language: python
    title: 딕셔너리 필터링
    description: 조건을 만족하는 항목만 선택합니다.
    content: |-
      prices = {'apple': 100, 'banana': 50, 'cherry': 200}
      expensive = {k: v for k, v in prices.items() if v >= 100}
      expensive
  - type: tip
    content: 딕셔너리 컴프리헨션으로 두 리스트를 zip과 함께 사용하면 매핑을 쉽게 만들 수 있습니다.
- id: set_comprehension
