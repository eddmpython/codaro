  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    except 예외타입 as 변수: 형식으로 예외 객체를 받을 수 있습니다. 예외 객체는 에러 메시지와 정보를 담고 있습니다.

    예외 메시지를 확인하면 문제를 파악하기 쉽습니다.
  tips:
  - 예외 메시지를 확인하면 문제를 파악하기 쉽습니다.
  snippet: |-
    try:
        bad = 10 / 0
    except ZeroDivisionError as err:
        bad = str(err)

    bad
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      try:
          bad = 10 / 0
      except ZeroDivisionError as err:
          bad = str(err)

      bad
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 실패를 설명하는 예외 처리'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 좋은 예외 처리는 프로그램을 조용히 살리는 것이 아니라, 어떤 입력이 왜 실패했는지 설명하고 필요한 곳에서만 복구하는 것입니다. 이 루프에서는 숫자 변환, 필수 필드 검증, 파일 읽기를 좁힌 예외로 처리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def parseQuantity(text):
        try:
            quantity = int(text)
        except ValueError as exc:
            raise ValueError(f'quantity must be integer: {text!r}') from exc

        if quantity <= 0:
            raise ValueError('quantity must be positive')
        return quantity

    assert parseQuantity('3') == 3

    try:
        parseQuantity('3개')
    except ValueError as exc:
        quantityProblem = str(exc)

    assert 'integer' in quantityProblem
    quantityProblem
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def parseQuantity(text):
          try:
              quantity = int(text)
          except ValueError as exc:
              raise ValueError(f'quantity must be integer: {text!r}') from exc

          if quantity <= 0:
              raise ValueError('quantity must be positive')
          return quantity

      assert parseQuantity('3') == 3

      try:
          parseQuantity('3개')
      except ValueError as exc:
          quantityProblem = str(exc)

      assert 'integer' in quantityProblem
      quantityProblem
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
