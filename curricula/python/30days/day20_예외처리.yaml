sections:
- id: try_except_basic
  title: try-except 기본
  structuredPrimary: true
  subtitle: 에러 처리하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    try-except 문으로 에러를 처리합니다. try 블록에서 에러가 발생하면 except 블록이 실행됩니다. 프로그램이 중단되지 않고 계속 실행됩니다.

    try-except는 예상되는 에러를 처리할 때 사용합니다.
  tips:
  - try-except는 예상되는 에러를 처리할 때 사용합니다.
  snippet: |-
    try:
        result = 10 / 0
    except ZeroDivisionError:
        result = 'Error occurred'

    result
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      try:
          result = 10 / 0
      except ZeroDivisionError:
          result = 'Error occurred'

      result
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: specific_exception
  title: 특정 예외 처리
  structuredPrimary: true
  subtitle: 예외 타입 지정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    except 뒤에 예외 타입을 지정할 수 있습니다. 특정 에러만 처리하고 다른 에러는 그대로 발생시킵니다. 더 정확한 에러 처리가 가능합니다.

    예외 타입을 지정하면 의도하지 않은 에러를 놓치지 않습니다.
  tips:
  - 예외 타입을 지정하면 의도하지 않은 에러를 놓치지 않습니다.
  snippet: |-
    try:
        num = 10 / 0
    except ZeroDivisionError:
        num = 'Cannot divide by zero'

    num
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      try:
          num = 10 / 0
      except ZeroDivisionError:
          num = 'Cannot divide by zero'

      num
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: multiple_except
  title: 여러 예외 처리
  structuredPrimary: true
  subtitle: 다양한 에러 대응
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    여러 except 블록으로 다양한 예외를 처리할 수 있습니다. 위에서부터 순서대로 검사하며, 처음 일치하는 except가 실행됩니다.

    구체적인 예외를 먼저, 일반적인 예외를 나중에 배치하세요.
  tips:
  - 구체적인 예외를 먼저, 일반적인 예외를 나중에 배치하세요.
  snippet: |-
    try:
        val = int('10')
        ans = val / 2
    except ValueError:
        ans = 'Invalid number'
    except ZeroDivisionError:
        ans = 'Cannot divide'

    ans
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      try:
          val = int('10')
          ans = val / 2
      except ValueError:
          ans = 'Invalid number'
      except ZeroDivisionError:
          ans = 'Cannot divide'

      ans
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: finally_clause
  title: finally 절
  structuredPrimary: true
  subtitle: 항상 실행되는 코드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    finally 블록은 예외 발생 여부와 관계없이 항상 실행됩니다. 파일 닫기, 리소스 해제 등 정리 작업에 사용합니다.

    with 문을 사용하면 finally 없이도 자동으로 정리됩니다.
  tips:
  - with 문을 사용하면 finally 없이도 자동으로 정리됩니다.
  snippet: |-
    try:
        calc = 10 / 2
    except ZeroDivisionError:
        calc = 0
    finally:
        status = 'Completed'

    calc, status
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      try:
          calc = 10 / 2
      except ZeroDivisionError:
          calc = 0
      finally:
          status = 'Completed'

      calc, status
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: raise_exception
  title: raise로 예외 발생
  structuredPrimary: true
  subtitle: 의도적으로 에러 발생
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    raise 키워드로 예외를 발생시킬 수 있습니다. 조건이 맞지 않을 때 강제로 에러를 내어 프로그램을 중단하거나 예외를 전달합니다.

    raise는 함수의 입력값 검증에 유용합니다.
  tips:
  - raise는 함수의 입력값 검증에 유용합니다.
  snippet: |-
    def checkAge(age):
        if age < 0:
            raise ValueError('Age cannot be negative')
        return age

    try:
        valid = checkAge(-5)
    except ValueError:
        valid = 'Invalid age'

    valid
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def checkAge(age):
          if age < 0:
              raise ValueError('Age cannot be negative')
          return age

      try:
          valid = checkAge(-5)
      except ValueError:
          valid = 'Invalid age'

      valid
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
