  - 파이썬 프로그램 실행 방법
  - print()로 텍스트 출력하기
  - 한 줄 주석과 여러 줄 설명 메모
  - 코드 작성 시 주석의 중요성
  direction: 헬로월드에서 입력값, 처리 로직, 출력 확인을 작은 스크립트로 연결합니다.
  benefits:
  - 문제에 필요한 값 확인 후 문법 요소에 맞는 코드 입력을 고릅니다.
  - 헬로월드 결과를 출력과 변수 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 반복 업무 스크립트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: Hello World 입력 확인
      detail: 입력 기준(문제에 필요한 값)과 필요한 조건을 먼저 고정합니다.
