      detail: 출력과 변수 상태 기준으로 실행 결과를 비교합니다.
    - label: 헬로월드 재사용
      detail: 완성 코드를 반복 업무 스크립트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 기초 자동화 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: 헬로월드 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 헬로월드 완료
      detail: 검증된 코드를 반복 업무 스크립트로 남깁니다.
sections:
- id: hello_world
  title: Hello World
  structuredPrimary: true
  subtitle: 첫 파이썬 프로그램
  goal: Hello World에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    프로그래밍을 처음 배울 때는 보통 'Hello World'를 화면에 출력합니다. 코드가 제대로 실행되는지 가장 작게 확인할 수 있기 때문입니다. 파이썬에서는 print()를 사용해 화면에 텍스트를 보여줍니다.

    작은따옴표('')와 큰따옴표("")는 기능상 차이가 없습니다. 편한 것을 사용하세요.
  tips:
  - 작은따옴표('')와 큰따옴표("")는 기능상 차이가 없습니다. 편한 것을 사용하세요.
  snippet: print('Hello World')
  exercise:
    prompt: Hello World 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print('Hello World')
    hints:
    - Hello World 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: Hello World 코드가 예외 없이 끝나야 합니다.
    resultCheck: Hello World에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: print_korean
  title: 한글 출력하기
  structuredPrimary: true
  subtitle: 파이썬은 모든 언어 지원
  goal: 한글 출력하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    파이썬은 영어뿐만 아니라 한글, 일본어, 중국어처럼 여러 언어의 글자를 출력할 수 있습니다. 지금은 어려운 원리를 외울 필요 없이, 따옴표 안에 넣은 글자가 화면에 보인다고 이해하면 됩니다.

    이모지도 출력할 수 있습니다: print('🐍 Python')
  tips:
  - '이모지도 출력할 수 있습니다: print(''🐍 Python'')'
  snippet: print('안녕하세요, 파이썬!')
  exercise:
    prompt: 한글 출력하기 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print('안녕하세요, 파이썬!')
    hints:
    - 한글 출력하기 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 한글 출력하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 한글 출력하기에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: print_multiple
  title: 여러 줄 출력하기
  structuredPrimary: true
  subtitle: print() 여러 번 사용
  goal: 여러 줄 출력하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 여러 줄의 텍스트를 출력하려면 print()를 여러 번 사용하면 됩니다. 각 print()는 자동으로 줄을 바꾸므로 다음 출력은 새 줄에서 시작됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    print('첫 번째 줄')
    print('두 번째 줄')
    print('세 번째 줄')
  exercise:
    prompt: 여러 줄 출력하기 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      print('첫 번째 줄')
      print('두 번째 줄')
      print('세 번째 줄')
    hints:
    - 여러 줄 출력하기 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 여러 줄 출력하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 여러 줄 출력하기에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: print_newline
  title: 줄바꿈 문자
  structuredPrimary: true
  subtitle: \n으로 한 번에 여러 줄 출력
  goal: 줄바꿈 문자에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    \n은 줄바꿈 문자로, 하나의 print() 안에서 여러 줄을 출력할 수 있게 해줍니다. \n을 만나면 그 지점에서 줄이 바뀝니다. 백슬래시(\)와 문자 n을 함께 써서 만듭니다.

    \n을 사용하면 print() 한 번으로 여러 줄을 출력할 수 있어 편리합니다.
  tips:
  - \n을 사용하면 print() 한 번으로 여러 줄을 출력할 수 있어 편리합니다.
  snippet: print('첫 번째 줄\n두 번째 줄\n세 번째 줄')
  exercise:
    prompt: 줄바꿈 문자 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print('첫 번째 줄\n두 번째 줄\n세 번째 줄')
    hints:
    - 줄바꿈 문자 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 줄바꿈 문자 코드가 예외 없이 끝나야 합니다.
    resultCheck: 줄바꿈 문자에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: comment_single
  title: 한 줄 주석
  structuredPrimary: true
  subtitle: 코드에 설명 추가하기
  goal: 한 줄 주석에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    주석(Comment)은 프로그램 실행에 영향을 주지 않는 메모입니다. 코드에 설명을 추가하여 나중에 다시 볼 때나 다른 사람이 볼 때 이해하기 쉽게 만듭니다. 파이썬에서 한 줄 주석은 # 기호로 시작합니다.

    주석은 코드를 이해하기 쉽게 만들지만, 과도한 주석은 오히려 가독성을 해칩니다.
  tips:
  - 주석은 코드를 이해하기 쉽게 만들지만, 과도한 주석은 오히려 가독성을 해칩니다.
  snippet: print('실행됩니다')
  exercise:
    prompt: 한 줄 주석 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print('실행됩니다')
    hints:
    - 한 줄 주석 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 한 줄 주석 코드가 예외 없이 끝나야 합니다.
    resultCheck: 한 줄 주석에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: comment_multi
  title: 여러 줄 설명 메모
  structuredPrimary: true
  subtitle: 삼중 따옴표를 조심해서 보기
  goal: 여러 줄 설명 메모에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    파이썬의 정식 주석은 #으로 시작하는 한 줄 주석입니다. 다만 삼중 따옴표(''' 또는 """)로 여러 줄 문자열을 만들어 설명 메모처럼 두는 코드도 자주 보입니다. 처음에는 '긴 설명을 여러 줄로 적는 방법' 정도로만 이해하면 됩니다.

    삼중 따옴표는 엄밀히 말하면 문자열입니다. 초보 단계에서는 일반 주석은 #으로 쓴다고 기억하세요.
  tips:
  - '삼중 따옴표는 엄밀히 말하면 문자열입니다. 초보 단계에서는 일반 주석은 #으로 쓴다고 기억하세요.'
  snippet: |-
    print('주석 전')
    '''
    이 부분은 여러 줄 설명 메모처럼 볼 수 있습니다.
    지금은 실행 결과에 보이지 않습니다.
    '''
    print('주석 후')
  exercise:
    prompt: 여러 줄 설명 메모 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      print('주석 전')
      '''
      이 부분은 여러 줄 설명 메모처럼 볼 수 있습니다.
      지금은 실행 결과에 보이지 않습니다.
      '''
      print('주석 후')
    hints:
    - 여러 줄 설명 메모 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 여러 줄 설명 메모 코드가 예외 없이 끝나야 합니다.
    resultCheck: 여러 줄 설명 메모에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: print_numbers
  title: 숫자 출력하기
  structuredPrimary: true
  subtitle: 따옴표 없이 숫자 출력
  goal: 숫자 출력하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    숫자를 출력할 때는 따옴표가 필요 없습니다. 따옴표로 감싸면 문자로 인식되고, 따옴표 없이 쓰면 숫자로 인식됩니다. 숫자는 계산에 사용할 수 있지만, 문자는 계산할 수 없습니다.

    print(123)은 숫자 123을, print('123')은 문자 '123'을 출력합니다.
  tips:
  - print(123)은 숫자 123을, print('123')은 문자 '123'을 출력합니다.
  snippet: print(123)
  exercise:
    prompt: 숫자 출력하기 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print(123)
    hints:
    - 숫자 출력하기 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 숫자 출력하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 숫자 출력하기에서 바꾼 출력 문자열이 결과에 반영되어야 합니다.
- id: print_calculation
  title: 계산 결과 출력하기
  structuredPrimary: true
  subtitle: 파이썬을 계산기처럼 사용
  goal: 계산 결과 출력하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: print() 안에서 직접 계산을 할 수 있습니다. 파이썬은 계산 결과를 자동으로 구한 후 출력합니다. 더하기(+), 빼기(-), 곱하기(*), 나누기(/)
    등 다양한 연산이 가능합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: print(10 + 20)
  exercise:
    prompt: 계산 결과 출력하기 예제에서 출력 문자열을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: print(10 + 20)
    hints:
    - 계산 결과 출력하기 코드에서 먼저 출력 문자열 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
