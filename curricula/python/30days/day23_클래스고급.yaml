meta:
  id: "day23"
  title: "클래스 고급"
  day: 23
  category: "30days"
  tags: []
  seo:
    title: "파이썬 클래스 고급 - 상속과 다형성"
    description: "상속, super(), 메서드 오버라이딩, 다중 상속을 배웁니다."
    keywords: ['상속', 'inheritance', 'super', '오버라이딩', '다중상속']

intro:
  emoji: "🎯"
  points:
  - "상속으로 클래스 확장"
  - "super()로 부모 메서드 호출"
  - "메서드 오버라이딩으로 재정의"
  - "다중 상속으로 여러 부모 활용"

sections:
- id: "inheritance_basic"
  title: "상속 기초"
  subtitle: "부모 클래스로부터 확장"
  blocks:
  - type: "text"
    content: "상속은 기존 클래스를 확장하여 새로운 클래스를 만드는 기능입니다. class 자식클래스(부모클래스): 형식으로 정의하며, 자식 클래스는 부모 클래스의 모든 속성과 메서드를 물려받습니다. 코드 재사용성이 높아지고 계층 구조를 표현할 수 있습니다."
  - type: "list"
    items:
    - "class 자식(부모): 형식"
    - "부모의 속성과 메서드 상속"
    - "코드 재사용"
    - "계층 구조 표현"
  - type: "code"
    language: "python"
    title: "기본 상속"
    description: "부모 클래스를 상속받는 자식 클래스를 만듭니다."
    content: |-
      class Animal:
          def __init__(self, name):
              self.name = name

          def speak(self):
              return 'Some sound'

      class Dog(Animal):
          pass

      myDog = Dog('Buddy')
      myDog.name
  - type: "code"
    language: "python"
    title: "상속받은 메서드 호출"
    description: "자식 클래스에서 부모의 메서드를 그대로 사용합니다."
    content: |-
      class Vehicle:
          def __init__(self, brand):
              self.brand = brand

          def start(self):
              return self.brand + ' starting'

      class Car(Vehicle):
          pass

      myCar = Car('Tesla')
      myCar.start()
  - type: "tip"
    content: "상속은 is-a 관계를 나타냅니다. Dog is an Animal, Car is a Vehicle."

- id: "inheritance_init"
  title: "상속과 __init__"
  subtitle: "자식 클래스의 초기화"
  blocks:
  - type: "text"
    content: "자식 클래스에서 __init__을 정의하지 않으면 부모의 __init__을 자동으로 사용합니다. 자식이 __init__을 정의하면 부모의 __init__은 자동으로 호출되지 않으므로 명시적으로 호출해야 합니다."
  - type: "list"
    items:
    - "__init__ 없으면 부모 것 사용"
    - "__init__ 정의하면 부모 것 덮어씀"
    - "명시적 호출 필요"
    - "추가 속성 정의 가능"
  - type: "code"
    language: "python"
    title: "부모 __init__ 그대로 사용"
    description: "자식이 __init__을 정의하지 않으면 부모의 것을 사용합니다."
    content: |-
      class Shape:
          def __init__(self, color):
              self.color = color

      class Square(Shape):
          pass

      sq = Square('red')
      sq.color
  - type: "code"
    language: "python"
    title: "부모 __init__ 명시적 호출"
    description: "자식 __init__에서 부모의 __init__을 직접 호출합니다."
    content: |-
      class Person:
          def __init__(self, name):
              self.name = name

      class Student(Person):
          def __init__(self, name, grade):
              Person.__init__(self, name)
              self.grade = grade

      alice = Student('Alice', 90)
      alice.name, alice.grade
  - type: "code"
    language: "python"
    title: "추가 속성 정의"
    description: "자식 클래스에서 새로운 속성을 추가합니다."
    content: |-
      class Device:
          def __init__(self, brand):
              self.brand = brand

      class Phone(Device):
          def __init__(self, brand, model):
              Device.__init__(self, brand)
              self.model = model

      ph = Phone('Samsung', 'Galaxy')
      ph.brand, ph.model
  - type: "tip"
    content: "자식 __init__에서 부모 __init__을 호출할 때는 self를 명시해야 합니다."

- id: "super_function"
  title: "super() 함수"
  subtitle: "부모 클래스 참조"
  blocks:
  - type: "text"
    content: "super()는 부모 클래스를 참조하는 함수입니다. super().__init__() 형태로 부모의 __init__을 호출할 수 있으며, 부모 클래스명을 직접 쓰는 것보다 유연하고 권장됩니다. 다중 상속 시 특히 유용합니다."
  - type: "list"
    items:
    - "super()로 부모 참조"
    - "super().__init__() 형태"
    - "클래스명 직접 쓰는 것보다 유연"
    - "다중 상속에서 유용"
  - type: "code"
    language: "python"
    title: "super()로 __init__ 호출"
    description: "super()를 사용하여 부모 __init__을 호출합니다."
    content: |-
      class Employee:
          def __init__(self, name):
              self.name = name

      class Manager(Employee):
          def __init__(self, name, department):
              super().__init__(name)
              self.department = department

      mgr = Manager('Bob', 'IT')
      mgr.name, mgr.department
  - type: "code"
    language: "python"
    title: "super()로 메서드 호출"
    description: "super()를 사용하여 부모의 다른 메서드도 호출할 수 있습니다."
    content: |-
      class Base:
          def greet(self):
              return 'Hello'

      class Derived(Base):
          def greet(self):
              parentGreet = super().greet()
              return parentGreet + ' from Derived'

      derived = Derived()
      derived.greet()
  - type: "code"
    language: "python"
    title: "super()의 장점"
    description: "부모 클래스명이 바뀌어도 코드 수정이 필요 없습니다."
    content: |-
      class Product:
          def __init__(self, name, price):
              self.name = name
              self.price = price

      class Book(Product):
          def __init__(self, name, price, author):
              super().__init__(name, price)
              self.author = author

      bk = Book('Python Guide', 30000, 'Kim')
      bk.name, bk.price, bk.author
  - type: "tip"
    content: "super()를 사용하면 상속 구조가 바뀌어도 코드 변경이 최소화됩니다."

- id: "method_override"
  title: "메서드 오버라이딩"
  subtitle: "부모 메서드 재정의"
  blocks:
  - type: "text"
    content: "메서드 오버라이딩은 자식 클래스에서 부모 클래스의 메서드를 재정의하는 것입니다. 같은 이름의 메서드를 자식 클래스에 정의하면 부모의 메서드를 덮어씁니다. 필요하면 super()로 부모 메서드를 호출한 후 추가 기능을 구현할 수 있습니다."
  - type: "list"
    items:
    - "같은 이름 메서드 재정의"
    - "부모 메서드를 덮어씀"
    - "super()로 부모 메서드 호출 가능"
    - "다형성 구현"
  - type: "code"
    language: "python"
    title: "기본 오버라이딩"
    description: "자식 클래스에서 부모 메서드를 재정의합니다."
    content: |-
      class Bird:
          def sound(self):
              return 'chirp'

      class Parrot(Bird):
          def sound(self):
              return 'squawk'

      myBird = Parrot()
      myBird.sound()
  - type: "code"
    language: "python"
    title: "부모 메서드 호출 후 확장"
    description: "super()로 부모 메서드를 호출하고 추가 기능을 구현합니다."
    content: |-
      class Rectangle:
          def __init__(self, width, height):
              self.width = width
              self.height = height

          def area(self):
              return self.width * self.height

      class ColoredRectangle(Rectangle):
          def __init__(self, width, height, color):
              super().__init__(width, height)
              self.color = color

          def area(self):
              baseArea = super().area()
              return baseArea

      cr = ColoredRectangle(5, 3, 'blue')
      cr.area()
  - type: "code"
    language: "python"
    title: "완전히 다른 구현"
    description: "부모 메서드를 완전히 다르게 재정의합니다."
    content: |-
      class Account:
          def __init__(self):
              self.balance = 0

          def withdraw(self, amount):
              self.balance = self.balance - amount
              return self.balance

      class SafeAccount(Account):
          def withdraw(self, amount):
              if self.balance >= amount:
                  self.balance = self.balance - amount
              return self.balance

      safe = SafeAccount()
      safe.balance = 1000
      safe.withdraw(1500)
  - type: "tip"
    content: "오버라이딩은 같은 인터페이스로 다른 동작을 구현하는 다형성의 핵심입니다."

- id: "multiple_inheritance"
  title: "다중 상속"
  subtitle: "여러 부모 클래스 상속"
  blocks:
  - type: "text"
    content: "다중 상속은 여러 부모 클래스를 동시에 상속받는 것입니다. class 자식(부모1, 부모2): 형식으로 정의하며, 모든 부모의 속성과 메서드를 상속받습니다. 메서드 이름이 겹치면 MRO 순서에 따라 왼쪽 부모가 우선입니다."
  - type: "list"
    items:
    - "class 자식(부모1, 부모2): 형식"
    - "모든 부모의 기능 상속"
    - "왼쪽 부모가 우선"
    - "MRO로 순서 결정"
  - type: "code"
    language: "python"
    title: "기본 다중 상속"
    description: "두 개의 부모 클래스를 동시에 상속받습니다."
    content: |-
      class Flyer:
          def fly(self):
              return 'flying'

      class Swimmer:
          def swim(self):
              return 'swimming'

      class Duck(Flyer, Swimmer):
          pass

      myDuck = Duck()
      myDuck.fly(), myDuck.swim()
  - type: "code"
    language: "python"
    title: "메서드 우선순위"
    description: "같은 이름의 메서드가 있으면 왼쪽 부모가 우선입니다."
    content: |-
      class First:
          def action(self):
              return 'first'

      class Second:
          def action(self):
              return 'second'

      class Child(First, Second):
          pass

      childObj = Child()
      childObj.action()
  - type: "code"
    language: "python"
    title: "순서 바꾸기"
    description: "상속 순서를 바꾸면 우선순위가 바뀝니다."
    content: |-
      class Left:
          def method(self):
              return 'left'

      class Right:
          def method(self):
              return 'right'

      class Combined(Right, Left):
          pass

      combined = Combined()
      combined.method()
  - type: "code"
    language: "python"
    title: "__init__과 다중 상속"
    description: "다중 상속 시 super()를 사용하여 모든 부모 __init__을 호출합니다."
    content: |-
      class Named:
          def __init__(self, name):
              self.name = name

      class Aged:
          def __init__(self, age):
              self.age = age

      class Human(Named):
          def __init__(self, name, age):
              super().__init__(name)
              self.age = age

      john = Human('John', 30)
      john.name, john.age
  - type: "tip"
    content: "다중 상속은 강력하지만 복잡할 수 있습니다. 신중하게 사용하세요."

- id: "inheritance_example"
  title: "상속 실전 예제"
  subtitle: "계층 구조 설계"
  blocks:
  - type: "text"
    content: "상속을 활용하여 실제 문제를 해결하는 예제를 살펴봅니다. 기본 클래스를 정의하고 여러 자식 클래스로 확장하여 코드 재사용성을 높입니다."
  - type: "code"
    language: "python"
    title: "도형 계층"
    description: "기본 도형 클래스와 여러 구체적인 도형 클래스를 만듭니다."
    content: |-
      class Polygon:
          def __init__(self, sides):
              self.sides = sides

      class Triangle(Polygon):
          def __init__(self):
              super().__init__(3)

      tri = Triangle()
      tri.sides
  - type: "code"
    language: "python"
    title: "직원 관리 시스템"
    description: "기본 직원 클래스를 상속받아 다양한 직급을 구현합니다."
    content: |-
      class Worker:
          def __init__(self, name, salary):
              self.name = name
              self.salary = salary

          def getSalary(self):
              return self.salary

      class Developer(Worker):
          def __init__(self, name, salary, language):
              super().__init__(name, salary)
              self.language = language

      dev = Developer('Alice', 5000, 'Python')
      dev.getSalary()
  - type: "code"
    language: "python"
    title: "보너스 계산"
    description: "메서드 오버라이딩으로 다른 보너스 계산 방식을 구현합니다."
    content: |-
      class Staff:
          def __init__(self, basePay):
              self.basePay = basePay

          def bonus(self):
              return self.basePay * 0.1

      class SeniorStaff(Staff):
          def bonus(self):
              return self.basePay * 0.2

      junior = Staff(3000)
      senior = SeniorStaff(3000)
      junior.bonus(), senior.bonus()
  - type: "tip"
    content: "상속은 비슷하지만 약간 다른 클래스들을 효율적으로 관리하는 도구입니다."

- id: "practice"
  title: "Day 23 종합 복습"
  subtitle: "클래스 고급 마스터하기"
  blocks:
  - type: "text"
    content: "Day 23에서 배운 클래스 고급 개념을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요."

  - type: "expansion"
    title: "🟢 기본1: 단순 상속"
    code: |-
      class Food:
          def __init__(self, name):
              self.name = name

      class Fruit(Food):
          pass

      apple = Fruit('Apple')
      apple.name

  - type: "expansion"
    title: "🟢 기본2: 부모 메서드 사용"
    code: |-
      class Appliance:
          def power(self):
              return 'on'

      class Fridge(Appliance):
          pass

      myFridge = Fridge()
      myFridge.power()

  - type: "expansion"
    title: "🟢 기본3: 자식 __init__ 없이"
    code: |-
      class Container:
          def __init__(self, capacity):
              self.capacity = capacity

      class Bottle(Container):
          pass

      bt = Bottle(500)
      bt.capacity

  - type: "expansion"
    title: "🟢 기본4: 부모 __init__ 직접 호출"
    code: |-
      class Machine:
          def __init__(self, brand):
              self.brand = brand

      class Printer(Machine):
          def __init__(self, brand, model):
              Machine.__init__(self, brand)
              self.model = model

      pr = Printer('HP', 'LaserJet')
      pr.brand

  - type: "expansion"
    title: "🟢 기본5: super() 기본"
    code: |-
      class Parent:
          def __init__(self, value):
              self.value = value

      class Child(Parent):
          def __init__(self, value, extra):
              super().__init__(value)
              self.extra = extra

      ch = Child(10, 20)
      ch.value, ch.extra

  - type: "expansion"
    title: "🟡 응용1: 메서드 오버라이딩"
    code: |-
      class Toy:
          def play(self):
              return 'playing'

      class Robot(Toy):
          def play(self):
              return 'robot playing'

      rb = Robot()
      rb.play()

  - type: "expansion"
    title: "🟡 응용2: super()로 메서드 확장"
    code: |-
      class Logger:
          def log(self, msg):
              return msg

      class AdvancedLogger(Logger):
          def log(self, msg):
              base = super().log(msg)
              return '[LOG] ' + base

      lg = AdvancedLogger()
      lg.log('test')

  - type: "expansion"
    title: "🟡 응용3: 속성 추가"
    code: |-
      class Item:
          def __init__(self, name):
              self.name = name

      class PricedItem(Item):
          def __init__(self, name, price):
              super().__init__(name)
              self.price = price

      pi = PricedItem('Shirt', 20000)
      pi.name, pi.price

  - type: "expansion"
    title: "🟡 응용4: 다중 상속 기본"
    code: |-
      class Walker:
          def walk(self):
              return 'walking'

      class Runner:
          def run(self):
              return 'running'

      class Athlete(Walker, Runner):
          pass

      ath = Athlete()
      ath.walk(), ath.run()

  - type: "expansion"
    title: "🟡 응용5: 우선순위 확인"
    code: |-
      class Alpha:
          def test(self):
              return 'alpha'

      class Beta:
          def test(self):
              return 'beta'

      class Gamma(Alpha, Beta):
          pass

      gm = Gamma()
      gm.test()

  - type: "expansion"
    title: "🔴 심화1: 계산 메서드 오버라이딩"
    code: |-
      class BasicCalc:
          def __init__(self, val):
              self.val = val

          def compute(self):
              return self.val * 2

      class AdvancedCalc(BasicCalc):
          def compute(self):
              return self.val * 3

      bc = BasicCalc(10)
      ac = AdvancedCalc(10)
      bc.compute(), ac.compute()

  - type: "expansion"
    title: "🔴 심화2: 체인 상속"
    code: |-
      class GrandParent:
          def __init__(self):
              self.level = 1

      class Parent(GrandParent):
          def __init__(self):
              super().__init__()
              self.level = self.level + 1

      class Descendant(Parent):
          def __init__(self):
              super().__init__()
              self.level = self.level + 1

      desc = Descendant()
      desc.level

  - type: "expansion"
    title: "🔴 심화3: 조건부 메서드"
    code: |-
      class BankAcct:
          def __init__(self):
              self.balance = 0

          def withdraw(self, amt):
              self.balance = self.balance - amt

      class SecureAcct(BankAcct):
          def withdraw(self, amt):
              if self.balance >= amt:
                  super().withdraw(amt)
              return self.balance

      sa = SecureAcct()
      sa.balance = 1000
      sa.withdraw(500)

  - type: "expansion"
    title: "🔴 심화4: 다중 상속 __init__"
    code: |-
      class Identified:
          def __init__(self, idNum):
              self.idNum = idNum

      class Valuable:
          def __init__(self, worth):
              self.worth = worth

      class Asset(Identified):
          def __init__(self, idNum, worth):
              super().__init__(idNum)
              self.worth = worth

      ast = Asset('A001', 50000)
