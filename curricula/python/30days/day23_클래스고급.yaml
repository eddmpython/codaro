sections:
- id: inheritance_basic
  title: 상속 기초
  structuredPrimary: true
  subtitle: 부모 클래스로부터 확장
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    상속은 기존 클래스를 확장하여 새로운 클래스를 만드는 기능입니다. class 자식클래스(부모클래스): 형식으로 정의하며, 자식 클래스는 부모 클래스의 모든 속성과 메서드를 물려받습니다. 코드 재사용성이 높아지고 계층 구조를 표현할 수 있습니다.

    상속은 is-a 관계를 나타냅니다. Dog is an Animal, Car is a Vehicle.
  tips:
  - 상속은 is-a 관계를 나타냅니다. Dog is an Animal, Car is a Vehicle.
  snippet: |-
    class Animal:
        def __init__(self, name):
            self.name = name

        def speak(self):
            return 'Some sound'

    class Dog(Animal):
        pass

    myDog = Dog('Buddy')
    myDog.name
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Animal:
          def __init__(self, name):
              self.name = name

          def speak(self):
              return 'Some sound'

      class Dog(Animal):
          pass

      myDog = Dog('Buddy')
      myDog.name
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: inheritance_init
  title: 상속과 __init__
  structuredPrimary: true
  subtitle: 자식 클래스의 초기화
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    자식 클래스에서 __init__을 정의하지 않으면 부모의 __init__을 자동으로 사용합니다. 자식이 __init__을 정의하면 부모의 __init__은 자동으로 호출되지 않으므로 명시적으로 호출해야 합니다.

    자식 __init__에서 부모 __init__을 호출할 때는 self를 명시해야 합니다.
  tips:
  - 자식 __init__에서 부모 __init__을 호출할 때는 self를 명시해야 합니다.
  snippet: |-
    class Shape:
        def __init__(self, color):
            self.color = color

    class Square(Shape):
        pass

    sq = Square('red')
    sq.color
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Shape:
          def __init__(self, color):
              self.color = color

      class Square(Shape):
          pass

      sq = Square('red')
      sq.color
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: super_function
  title: super() 함수
  structuredPrimary: true
  subtitle: 부모 클래스 참조
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    super()는 부모 클래스를 참조하는 함수입니다. super().__init__() 형태로 부모의 __init__을 호출할 수 있으며, 부모 클래스명을 직접 쓰는 것보다 유연하고 권장됩니다. 다중 상속 시 특히 유용합니다.

    super()를 사용하면 상속 구조가 바뀌어도 코드 변경이 최소화됩니다.
  tips:
  - super()를 사용하면 상속 구조가 바뀌어도 코드 변경이 최소화됩니다.
  snippet: |-
    class Employee:
        def __init__(self, name):
            self.name = name

    class Manager(Employee):
        def __init__(self, name, department):
            super().__init__(name)
            self.department = department

    mgr = Manager('Bob', 'IT')
    mgr.name, mgr.department
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Employee:
          def __init__(self, name):
              self.name = name

      class Manager(Employee):
          def __init__(self, name, department):
              super().__init__(name)
              self.department = department

      mgr = Manager('Bob', 'IT')
      mgr.name, mgr.department
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: method_override
  title: 메서드 오버라이딩
  structuredPrimary: true
  subtitle: 부모 메서드 재정의
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    메서드 오버라이딩은 자식 클래스에서 부모 클래스의 메서드를 재정의하는 것입니다. 같은 이름의 메서드를 자식 클래스에 정의하면 부모의 메서드를 덮어씁니다. 필요하면 super()로 부모 메서드를 호출한 후 추가 기능을 구현할 수 있습니다.

    오버라이딩은 같은 인터페이스로 다른 동작을 구현하는 다형성의 핵심입니다.
  tips:
  - 오버라이딩은 같은 인터페이스로 다른 동작을 구현하는 다형성의 핵심입니다.
  snippet: |-
    class Bird:
        def sound(self):
            return 'chirp'

    class Parrot(Bird):
        def sound(self):
            return 'squawk'

    myBird = Parrot()
    myBird.sound()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Bird:
          def sound(self):
              return 'chirp'

      class Parrot(Bird):
          def sound(self):
              return 'squawk'

      myBird = Parrot()
      myBird.sound()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: multiple_inheritance
  title: 다중 상속
  structuredPrimary: true
  subtitle: 여러 부모 클래스 상속
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    다중 상속은 여러 부모 클래스를 동시에 상속받는 것입니다. class 자식(부모1, 부모2): 형식으로 정의하며, 모든 부모의 속성과 메서드를 상속받습니다. 메서드 이름이 겹치면 MRO 순서에 따라 왼쪽 부모가 우선입니다.

    다중 상속은 강력하지만 복잡할 수 있습니다. 신중하게 사용하세요.
  tips:
  - 다중 상속은 강력하지만 복잡할 수 있습니다. 신중하게 사용하세요.
  snippet: |-
    class Flyer:
        def fly(self):
            return 'flying'

    class Swimmer:
        def swim(self):
            return 'swimming'

    class Duck(Flyer, Swimmer):
        pass

    myDuck = Duck()
    myDuck.fly(), myDuck.swim()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Flyer:
          def fly(self):
              return 'flying'

      class Swimmer:
          def swim(self):
              return 'swimming'

      class Duck(Flyer, Swimmer):
          pass

      myDuck = Duck()
      myDuck.fly(), myDuck.swim()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: inheritance_example
  title: 상속 실전 예제
  structuredPrimary: true
  subtitle: 계층 구조 설계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    상속을 활용하여 실제 문제를 해결하는 예제를 살펴봅니다. 기본 클래스를 정의하고 여러 자식 클래스로 확장하여 코드 재사용성을 높입니다.

    상속은 비슷하지만 약간 다른 클래스들을 효율적으로 관리하는 도구입니다.
  tips:
  - 상속은 비슷하지만 약간 다른 클래스들을 효율적으로 관리하는 도구입니다.
  snippet: |-
    class Polygon:
        def __init__(self, sides):
            self.sides = sides

    class Triangle(Polygon):
        def __init__(self):
            super().__init__(3)

    tri = Triangle()
    tri.sides
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Polygon:
          def __init__(self, sides):
              self.sides = sides

      class Triangle(Polygon):
          def __init__(self):
              super().__init__(3)

      tri = Triangle()
      tri.sides
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
