- id: method_strip
  title: 양쪽 공백 제거
  structuredPrimary: true
  subtitle: strip()으로 공백 정리
  goal: 양쪽 공백 제거에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: strip() 메서드는 문자열 양쪽 끝의 공백을 제거합니다. 사용자 입력을 정리하거나 데이터를 깔끔하게 만들 때 자주 사용됩니다. 문자열 중간의 공백은 제거하지
    않습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    raw = '   hello python   '
    raw.strip()
  exercise:
    prompt: 양쪽 공백 제거 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      raw = '   hello python   '
      raw.strip()
    hints:
    - 양쪽 공백 제거 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 양쪽 공백 제거 코드가 예외 없이 끝나야 합니다.
    resultCheck: 양쪽 공백 제거에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_lstrip_rstrip
  title: 한쪽 공백 제거
  structuredPrimary: true
  subtitle: lstrip(), rstrip()으로 한쪽만 제거
  goal: 한쪽 공백 제거에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: lstrip()은 왼쪽 공백만, rstrip()은 오른쪽 공백만 제거합니다. l은 left(왼쪽), r은 right(오른쪽)를 의미합니다. 특정 방향의 공백만
    제거할 때 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    left = '   hello   '
    left.lstrip()
  exercise:
    prompt: 한쪽 공백 제거 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      left = '   hello   '
      left.lstrip()
    hints:
    - 한쪽 공백 제거 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 한쪽 공백 제거 코드가 예외 없이 끝나야 합니다.
    resultCheck: 한쪽 공백 제거에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_replace
  title: 문자열 치환
  structuredPrimary: true
  subtitle: replace()로 문자 바꾸기
  goal: 문자열 치환에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: replace() 메서드는 문자열 안의 특정 부분을 다른 문자열로 바꿉니다. replace(찾을문자, 바꿀문자) 형태로 사용하며, 모든 일치하는 부분을 바꿉니다.
    원본은 변경되지 않습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    greeting = 'Hello World'
    greeting.replace('World', 'Python')
  exercise:
    prompt: 문자열 치환 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      greeting = 'Hello World'
      greeting.replace('World', 'Python')
    hints:
    - 문자열 치환 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 문자열 치환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 문자열 치환에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_replace_all
  title: 여러 개 치환
  structuredPrimary: true
  subtitle: 모든 일치 항목 바꾸기
  goal: 여러 개 치환에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: replace()는 기본적으로 일치하는 모든 부분을 바꿉니다. 같은 문자가 여러 번 나와도 모두 치환됩니다. 공백을 다른 문자로 바꾸거나 특정 패턴을 제거할
    때 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    allText = 'apple apple orange apple'
    allText.replace('apple', 'banana')
  exercise:
    prompt: 여러 개 치환 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      allText = 'apple apple orange apple'
      allText.replace('apple', 'banana')
    hints:
    - 여러 개 치환 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 여러 개 치환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 여러 개 치환에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_split
  title: 문자열 나누기
  structuredPrimary: true
  subtitle: split()으로 구분자 기준 분리
  goal: 문자열 나누기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: split() 메서드는 문자열을 특정 구분자 기준으로 나누어 리스트를 만듭니다. 쉼표로 구분된 CSV 한 줄, 공백으로 나뉜 단어, 하이픈이 들어간 코드처럼
    정해진 패턴을 데이터로 바꿀 때 자주 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    row = 'kim@example.com,paid,15000'
    row.split(',')
  exercise:
    prompt: 문자열 나누기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      row = 'kim@example.com,paid,15000'
      row.split(',')
    hints:
    - 문자열 나누기 코드에서 먼저 입력값 위치를 찾으세요.
