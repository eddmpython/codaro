sections:
- id: method_upper
  title: 대문자 변환
  structuredPrimary: true
  subtitle: upper()로 모두 대문자로
  goal: 대문자 변환에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: upper() 메서드는 문자열의 모든 문자를 대문자로 변환합니다. 영문자만 영향을 받으며, 숫자나 특수문자는 그대로 유지됩니다. 원본 문자열은 변경되지 않고
    새로운 문자열을 반환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    text = 'hello python'
    text.upper()
  exercise:
    prompt: 대문자 변환 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = 'hello python'
      text.upper()
    hints:
    - 대문자 변환 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 대문자 변환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 대문자 변환에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_lower
  title: 소문자 변환
  structuredPrimary: true
  subtitle: lower()로 모두 소문자로
  goal: 소문자 변환에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: lower() 메서드는 문자열의 모든 문자를 소문자로 변환합니다. 대소문자 구분 없이 비교할 때 자주 사용됩니다. 원본 문자열은 그대로 유지됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    msg = 'HELLO PYTHON'
    msg.lower()
  exercise:
    prompt: 소문자 변환 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      msg = 'HELLO PYTHON'
      msg.lower()
    hints:
    - 소문자 변환 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 소문자 변환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 소문자 변환에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: method_capitalize
  title: 첫 글자 대문자
  structuredPrimary: true
  subtitle: capitalize()로 첫 문자만 대문자
  goal: 첫 글자 대문자에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: capitalize() 메서드는 문자열의 첫 번째 문자만 대문자로 만들고 나머지는 모두 소문자로 변환합니다. 문장의 시작을 정리할 때 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    phrase = 'hello PYTHON'
    phrase.capitalize()
  exercise:
    prompt: 첫 글자 대문자 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      phrase = 'hello PYTHON'
      phrase.capitalize()
    hints:
    - 첫 글자 대문자 코드에서 먼저 입력값 위치를 찾으세요.
