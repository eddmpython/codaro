meta:
  id: "day10"
  title: "집합"
  day: 10
  category: "30days"
  tags: []
  seo:
    title: "파이썬 집합(Set) - 중복 없는 데이터 관리"
    description: "집합 자료구조와 합집합, 교집합, 차집합 연산을 배웁니다."
    keywords: ['집합', 'set', '중복제거', '합집합', '교집합', '차집합']

intro:
  emoji: "🎯"
  points:
  - "집합으로 중복 없는 데이터 관리"
  - "add/remove로 요소 추가/삭제"
  - "합집합, 교집합, 차집합 연산"
  - "수학의 집합 개념을 프로그래밍에"

sections:
- id: "set_intro"
  title: "집합이란?"
  subtitle: "중복 없고 순서 없는 자료구조"
  blocks:
  - type: "text"
    content: "집합(Set)은 중복을 허용하지 않고 순서가 없는 자료구조입니다. 중괄호 {}로 만들고, 쉼표로 값을 구분합니다. 같은 값을 여러 번 넣어도 하나만 저장됩니다. 인덱스가 없어서 특정 위치의 요소에 접근할 수 없습니다. 수학의 집합 개념과 동일하며, 집합 연산을 지원합니다."
  - type: "list"
    items:
    - "중괄호 {}로 생성"
    - "중복 자동 제거"
    - "순서가 없음 (인덱싱 불가)"
    - "수학의 집합 연산 지원"
  - type: "code"
    language: "python"
    title: "집합 만들기"
    description: "중괄호를 사용하여 집합을 만듭니다."
    content: |-
      nums = {1, 2, 3, 4, 5}
      nums
  - type: "tip"
    content: "빈 집합은 {}가 아닌 set()으로 만듭니다. {}는 빈 딕셔너리입니다."

- id: "set_create"
  title: "집합 생성하기"
  subtitle: "다양한 방법으로 만들기"
  blocks:
  - type: "text"
    content: "집합은 중괄호로 직접 만들거나 set() 함수를 사용합니다. set() 함수에 리스트, 튜플, 문자열을 넣으면 집합으로 변환됩니다. 빈 집합은 반드시 set()으로 만들어야 합니다. {}는 빈 딕셔너리를 만듭니다."
  - type: "list"
    items:
    - "중괄호 {1, 2, 3}로 생성"
    - "set(리스트)로 변환"
    - "빈 집합은 set()"
    - "{} 는 빈 딕셔너리"
  - type: "code"
    language: "python"
    title: "직접 생성"
    description: "중괄호로 집합을 직접 만듭니다."
    content: |-
      direct = {1, 2, 3, 4, 5}
      direct
  - type: "code"
    language: "python"
    title: "리스트에서 생성"
    description: "set() 함수로 리스트를 집합으로 변환합니다."
    content: |-
      items = set([1, 2, 3, 3, 4])
      items
  - type: "code"
    language: "python"
    title: "문자열에서 생성"
    description: "set() 함수로 문자열을 집합으로 변환합니다."
    content: |-
      chars = set('hello')
      chars
  - type: "code"
    language: "python"
    title: "빈 집합"
    description: "set()으로 빈 집합을 만듭니다."
    content: |-
      empty = set()
      empty
  - type: "tip"
    content: "set('hello')는 {'h', 'e', 'l', 'o'}가 됩니다. 'l'이 하나만 남습니다."

- id: "set_unique"
  title: "중복 제거 특성"
  subtitle: "자동으로 중복 삭제"
  blocks:
  - type: "text"
    content: "집합의 가장 큰 특징은 중복을 자동으로 제거한다는 것입니다. 같은 값을 여러 번 넣어도 하나만 유지됩니다. 이 특성을 이용하면 리스트의 중복을 쉽게 제거할 수 있습니다. 리스트를 집합으로 변환했다가 다시 리스트로 바꾸면 중복이 제거됩니다."
  - type: "list"
    items:
    - "중복 값 자동 제거"
    - "하나의 값만 유지"
    - "리스트 중복 제거에 유용"
    - "set(리스트) → list(집합)"
  - type: "code"
    language: "python"
    title: "집합 생성시 중복 제거"
    description: "집합을 만들 때 중복이 자동으로 제거됩니다."
    content: |-
      dups = {1, 2, 2, 3, 3, 3, 4}
      dups
  - type: "code"
    language: "python"
    title: "리스트 중복 제거"
    description: "리스트를 집합으로 변환하여 중복을 제거합니다."
    content: |-
      raw = [1, 2, 2, 3, 3, 3, 4]
      set(raw)
  - type: "code"
    language: "python"
    title: "다시 리스트로"
    description: "중복 제거된 집합을 리스트로 변환합니다."
    content: |-
      data = [1, 2, 2, 3, 3, 3, 4]
      unique = set(data)
      list(unique)
  - type: "tip"
    content: "집합은 순서를 보장하지 않으므로 정렬이 필요하면 sorted()를 사용하세요."

- id: "add_method"
  title: "add() 메서드"
  subtitle: "집합에 요소 추가"
  blocks:
  - type: "text"
    content: "add() 메서드는 집합에 새로운 요소를 추가합니다. 이미 있는 값을 추가하려고 해도 에러가 발생하지 않고 무시됩니다. 중복을 허용하지 않기 때문입니다. 원본 집합이 직접 변경됩니다."
  - type: "list"
    items:
    - "set.add(값) 형식"
    - "새 요소 추가"
    - "중복 값은 무시됨"
    - "원본 집합 직접 변경"
  - type: "code"
    language: "python"
    title: "add로 요소 추가"
    description: "집합에 새로운 요소를 추가합니다."
    content: |-
      fruits = {'사과', '바나나'}
      fruits.add('오렌지')
      fruits.add('사과')
      fruits
  - type: "tip"
    content: "이미 있는 값을 add()해도 에러 없이 무시됩니다."

- id: "remove_discard"
  title: "remove()와 discard()"
  subtitle: "집합에서 요소 삭제"
  blocks:
  - type: "text"
    content: "remove()와 discard() 모두 집합에서 요소를 삭제합니다. 차이점은 remove()는 없는 값을 삭제하려 하면 에러가 발생하지만, discard()는 에러 없이 무시한다는 것입니다. 안전하게 삭제하려면 discard()를 사용하는 것이 좋습니다."
  - type: "list"
    items:
    - "remove(값): 값 삭제, 없으면 에러"
    - "discard(값): 값 삭제, 없어도 에러 안남"
    - "둘 다 원본 직접 변경"
    - "안전한 삭제는 discard() 사용"
  - type: "code"
    language: "python"
    title: "remove 사용"
    description: "remove()로 값을 삭제합니다."
    content: |-
      nums = {1, 2, 3, 4, 5}
      nums.remove(3)
      nums
  - type: "code"
    language: "python"
    title: "discard 사용"
    description: "discard()로 안전하게 삭제합니다."
    content: |-
      vals = {1, 2, 3, 4, 5}
      vals.discard(3)
      vals.discard(10)
      vals
  - type: "tip"
    content: "존재 여부가 불확실하면 discard()를 사용하세요."

- id: "clear_method"
  title: "clear() 메서드"
  subtitle: "모든 요소 삭제"
  blocks:
  - type: "text"
    content: "clear() 메서드는 집합의 모든 요소를 삭제하여 빈 집합으로 만듭니다. 리스트와 동일하게 작동합니다. 집합을 재사용할 때 유용합니다."
  - type: "list"
    items:
    - "set.clear() 형식"
    - "모든 요소 삭제"
    - "빈 집합이 됨"
    - "집합 초기화에 사용"
  - type: "code"
    language: "python"
    title: "clear로 모두 삭제"
    description: "집합의 모든 요소를 삭제합니다."
    content: |-
      items = {1, 2, 3, 4, 5}
      items.clear()
      items
  - type: "tip"
    content: "clear() 후에는 빈 집합 set()이 됩니다."

- id: "union_method"
  title: "합집합 (union)"
  subtitle: "두 집합을 합치기"
  blocks:
  - type: "text"
    content: "합집합은 두 집합의 모든 요소를 포함하는 새 집합을 만듭니다. union() 메서드나 | 연산자를 사용합니다. 중복된 요소는 하나만 포함됩니다. 원본 집합은 변경되지 않고 새로운 집합이 생성됩니다."
  - type: "list"
    items:
    - "set1.union(set2) 또는 set1 | set2"
    - "두 집합의 모든 요소 포함"
    - "중복은 하나만"
    - "새로운 집합 반환"
  - type: "code"
    language: "python"
    title: "union 메서드"
    description: "union() 메서드로 합집합을 만듭니다."
    content: |-
      setA = {1, 2, 3}
      setB = {3, 4, 5}
      setA.union(setB)
  - type: "code"
    language: "python"
    title: "| 연산자"
    description: "| 연산자로 합집합을 만듭니다."
    content: |-
      left = {1, 2, 3}
      right = {3, 4, 5}
      left | right
  - type: "tip"
    content: "합집합은 A ∪ B를 의미하며, 모든 요소를 포함합니다."

- id: "intersection_method"
  title: "교집합 (intersection)"
  subtitle: "공통 요소만 추출"
  blocks:
  - type: "text"
    content: "교집합은 두 집합에 모두 있는 요소만 포함하는 새 집합을 만듭니다. intersection() 메서드나 & 연산자를 사용합니다. 두 집합의 공통 부분을 찾을 때 유용합니다. 원본 집합은 변경되지 않습니다."
  - type: "list"
    items:
    - "set1.intersection(set2) 또는 set1 & set2"
    - "두 집합에 모두 있는 요소"
    - "공통 부분만 추출"
    - "새로운 집합 반환"
  - type: "code"
    language: "python"
    title: "intersection 메서드"
    description: "intersection() 메서드로 교집합을 만듭니다."
    content: |-
      setA = {1, 2, 3, 4}
      setB = {3, 4, 5, 6}
      setA.intersection(setB)
  - type: "code"
    language: "python"
    title: "& 연산자"
    description: "& 연산자로 교집합을 만듭니다."
    content: |-
      left = {1, 2, 3, 4}
      right = {3, 4, 5, 6}
      left & right
  - type: "tip"
    content: "교집합은 A ∩ B를 의미하며, 공통 요소만 포함합니다."

- id: "difference_method"
  title: "차집합 (difference)"
  subtitle: "한쪽에만 있는 요소"
  blocks:
  - type: "text"
    content: "차집합은 첫 번째 집합에만 있고 두 번째 집합에는 없는 요소들을 포함하는 새 집합을 만듭니다. difference() 메서드나 - 연산자를 사용합니다. 순서가 중요하므로 A - B와 B - A는 다릅니다."
  - type: "list"
    items:
    - "set1.difference(set2) 또는 set1 - set2"
    - "set1에만 있는 요소"
    - "순서가 중요 (A-B ≠ B-A)"
    - "새로운 집합 반환"
  - type: "code"
    language: "python"
    title: "차집합 A-B"
    description: "첫 번째 집합에서 두 번째 집합을 뺍니다."
    content: |-
      setA = {1, 2, 3, 4, 5}
      setB = {4, 5, 6, 7}
      setA.difference(setB)
  - type: "code"
    language: "python"
    title: "차집합 B-A"
    description: "두 번째 집합에서 첫 번째 집합을 뺍니다."
    content: |-
      left = {1, 2, 3, 4, 5}
      right = {4, 5, 6, 7}
      right.difference(left)
  - type: "tip"
    content: "차집합은 A - B를 의미하며, A에만 있는 요소입니다."

- id: "symmetric_difference"
  title: "대칭차집합 (symmetric_difference)"
  subtitle: "한쪽에만 있는 모든 요소"
  blocks:
  - type: "text"
    content: "대칭차집합은 두 집합 중 한쪽에만 있는 요소들을 모두 포함하는 새 집합을 만듭니다. symmetric_difference() 메서드나 ^ 연산자를 사용합니다. 교집합을 제외한 나머지 모든 요소입니다. (A - B) ∪ (B - A)와 같습니다."
  - type: "list"
    items:
    - "set1.symmetric_difference(set2) 또는 set1 ^ set2"
    - "한쪽에만 있는 모든 요소"
    - "교집합 제외"
    - "새로운 집합 반환"
  - type: "code"
    language: "python"
    title: "symmetric_difference 메서드"
    description: "symmetric_difference() 메서드를 사용합니다."
    content: |-
      setA = {1, 2, 3, 4}
      setB = {3, 4, 5, 6}
      setA.symmetric_difference(setB)
  - type: "code"
    language: "python"
    title: "^ 연산자"
    description: "^ 연산자로 대칭차집합을 만듭니다."
    content: |-
      left = {1, 2, 3, 4}
      right = {3, 4, 5, 6}
      left ^ right
  - type: "tip"
    content: "대칭차집합은 A △ B를 의미하며, 공통 부분을 제외한 모든 요소입니다."

- id: "membership_method"
  title: "in/not in 연산자"
  subtitle: "요소 포함 확인"
  blocks:
  - type: "text"
    content: "in과 not in 연산자로 집합에 특정 값이 있는지 확인할 수 있습니다. 집합은 해시 테이블로 구현되어 있어 리스트보다 훨씬 빠르게 검색됩니다. 대량의 데이터에서 값을 찾을 때 집합을 사용하면 성능이 향상됩니다."
  - type: "list"
    items:
    - "값 in 집합으로 확인"
    - "값 not in 집합으로 미포함 확인"
    - "리스트보다 검색 속도 빠름"
    - "True/False 반환"
  - type: "code"
    language: "python"
    title: "값 포함 확인"
    description: "in 연산자로 값이 집합에 있는지 확인합니다."
    content: |-
      colors = {'빨강', '초록', '파랑'}
      '초록' in colors
  - type: "code"
    language: "python"
    title: "값 미포함 확인"
    description: "not in 연산자로 값이 집합에 없는지 확인합니다."
    content: |-
      palette = {'빨강', '초록', '파랑'}
      '검정' not in palette
  - type: "tip"
    content: "집합의 in 연산은 O(1) 시간복잡도로 매우 빠릅니다."

- id: "set_length"
  title: "집합 길이"
  subtitle: "len() 함수"
  blocks:
  - type: "text"
    content: "len() 함수는 집합의 요소 개수를 반환합니다. 리스트, 튜플과 동일하게 작동합니다. 중복이 제거된 후의 개수를 셉니다."
  - type: "list"
    items:
    - "len(집합)로 길이 확인"
    - "요소 개수 반환"
    - "중복 제거 후 개수"
    - "빈 집합은 0"
  - type: "code"
    language: "python"
    title: "집합 길이"
    description: "len() 함수로 집합 요소 개수를 확인합니다."
    content: |-
      sample = {1, 2, 3, 4, 5}
      len(sample)
  - type: "code"
    language: "python"
    title: "중복 제거 후 개수"
    description: "중복이 제거된 후의 개수를 셉니다."
    content: |-
      dups = set([1, 2, 2, 3, 3, 3])
      len(dups)
  - type: "tip"
    content: "set([1,2,2,3])의 길이는 3입니다. 중복이 제거되기 때문입니다."

- id: "practice"
  title: "Day 10 종합 복습"
  subtitle: "집합 마스터하기"
  blocks:
  - type: "text"
    content: "Day 10에서 배운 집합을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: "expansion"
    title: "🟢 기본1: 집합 생성"
    code: |-
      nums = {1, 2, 3, 4, 5}
      nums

  - type: "expansion"
    title: "🟢 기본2: 중복 제거"
    code: |-
      items = [1, 2, 2, 3, 3, 3, 4]
      unique = set(items)
      unique

  - type: "expansion"
    title: "🟢 기본3: add 사용"
    code: |-
      vals = {1, 2, 3}
      vals.add(4)
      vals.add(5)
      vals

  - type: "expansion"
    title: "🟢 기본4: 합집합"
    code: |-
      setA = {1, 2, 3}
      setB = {3, 4, 5}
      merged = setA | setB
      merged

  - type: "expansion"
    title: "🟢 기본5: 교집합"
    code: |-
      left = {1, 2, 3, 4}
