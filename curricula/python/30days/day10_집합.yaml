      detail: 검증된 코드를 반복 업무 스크립트로 남깁니다.
sections:
- id: set_intro
  title: 집합이란?
  structuredPrimary: true
  subtitle: 중복 없고 순서 없는 자료구조
  goal: 집합이란?에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    집합(Set)은 중복을 허용하지 않고 순서가 없는 자료구조입니다. 중괄호 {}로 만들고, 쉼표로 값을 구분합니다. 같은 값을 여러 번 넣어도 하나만 저장됩니다. 인덱스가 없어서 특정 위치의 요소에 접근할 수 없습니다. 수학의 집합 개념과 동일하며, 집합 연산을 지원합니다.

    빈 집합은 {}가 아닌 set()으로 만듭니다. {}는 빈 딕셔너리입니다.
  tips:
  - 빈 집합은 {}가 아닌 set()으로 만듭니다. {}는 빈 딕셔너리입니다.
  snippet: |-
    nums = {1, 2, 3, 4, 5}
    nums
  exercise:
    prompt: 집합이란? 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = {1, 2, 3, 4, 5}
      nums
    hints:
    - 집합이란? 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 집합이란? 코드가 예외 없이 끝나야 합니다.
    resultCheck: 집합이란?에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: set_create
  title: 집합 생성하기
  structuredPrimary: true
  subtitle: 다양한 방법으로 만들기
  goal: 집합 생성하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    집합은 중괄호로 직접 만들거나 set() 함수를 사용합니다. set() 함수에 리스트, 튜플, 문자열을 넣으면 집합으로 변환됩니다. 빈 집합은 반드시 set()으로 만들어야 합니다. {}는 빈 딕셔너리를 만듭니다.

    set('hello')는 {'h', 'e', 'l', 'o'}가 됩니다. 'l'이 하나만 남습니다.
  tips:
  - set('hello')는 {'h', 'e', 'l', 'o'}가 됩니다. 'l'이 하나만 남습니다.
  snippet: |-
    direct = {1, 2, 3, 4, 5}
    direct
  exercise:
    prompt: 집합 생성하기 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      direct = {1, 2, 3, 4, 5}
      direct
    hints:
    - 집합 생성하기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 집합 생성하기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 집합 생성하기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: set_unique
  title: 중복 제거 특성
  structuredPrimary: true
  subtitle: 자동으로 중복 삭제
  goal: 중복 제거 특성에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    집합의 가장 큰 특징은 중복을 자동으로 제거한다는 것입니다. 같은 값을 여러 번 넣어도 하나만 유지됩니다. 이 특성을 이용하면 리스트의 중복을 쉽게 제거할 수 있습니다. 리스트를 집합으로 변환했다가 다시 리스트로 바꾸면 중복이 제거됩니다.

    집합은 순서를 보장하지 않으므로 정렬이 필요하면 sorted()를 사용하세요.
  tips:
  - 집합은 순서를 보장하지 않으므로 정렬이 필요하면 sorted()를 사용하세요.
  snippet: |-
    dups = {1, 2, 2, 3, 3, 3, 4}
    dups
  exercise:
    prompt: 중복 제거 특성 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      dups = {1, 2, 2, 3, 3, 3, 4}
      dups
    hints:
    - 중복 제거 특성 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 중복 제거 특성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 중복 제거 특성에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: add_method
  title: add() 메서드
  structuredPrimary: true
  subtitle: 집합에 요소 추가
  goal: add() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    add() 메서드는 집합에 새로운 요소를 추가합니다. 이미 있는 값을 추가하려고 해도 에러가 발생하지 않고 무시됩니다. 중복을 허용하지 않기 때문입니다. 원본 집합이 직접 변경됩니다.

    이미 있는 값을 add()해도 에러 없이 무시됩니다.
  tips:
  - 이미 있는 값을 add()해도 에러 없이 무시됩니다.
  snippet: |-
    fruits = {'사과', '바나나'}
    fruits.add('오렌지')
    fruits.add('사과')
    fruits
  exercise:
    prompt: add() 메서드 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      fruits = {'사과', '바나나'}
      fruits.add('오렌지')
      fruits.add('사과')
      fruits
    hints:
    - add() 메서드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: add() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: add() 메서드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: remove_discard
  title: remove()와 discard()
  structuredPrimary: true
  subtitle: 집합에서 요소 삭제
  goal: remove()와 discard()에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    remove()와 discard() 모두 집합에서 요소를 삭제합니다. 차이점은 remove()는 없는 값을 삭제하려 하면 에러가 발생하지만, discard()는 에러 없이 무시한다는 것입니다. 안전하게 삭제하려면 discard()를 사용하는 것이 좋습니다.

    존재 여부가 불확실하면 discard()를 사용하세요.
  tips:
  - 존재 여부가 불확실하면 discard()를 사용하세요.
  snippet: |-
    nums = {1, 2, 3, 4, 5}
    nums.remove(3)
    nums
  exercise:
    prompt: remove()와 discard() 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = {1, 2, 3, 4, 5}
      nums.remove(3)
      nums
    hints:
    - remove()와 discard() 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: remove()와 discard() 코드가 예외 없이 끝나야 합니다.
    resultCheck: remove()와 discard()에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: clear_method
  title: clear() 메서드
  structuredPrimary: true
  subtitle: 모든 요소 삭제
  goal: clear() 메서드에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    clear() 메서드는 집합의 모든 요소를 삭제하여 빈 집합으로 만듭니다. 리스트와 동일하게 작동합니다. 집합을 재사용할 때 유용합니다.

    clear() 후에는 빈 집합 set()이 됩니다.
  tips:
  - clear() 후에는 빈 집합 set()이 됩니다.
  snippet: |-
    items = {1, 2, 3, 4, 5}
    items.clear()
    items
  exercise:
    prompt: clear() 메서드 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      items = {1, 2, 3, 4, 5}
      items.clear()
      items
    hints:
    - clear() 메서드 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: clear() 메서드 코드가 예외 없이 끝나야 합니다.
    resultCheck: clear() 메서드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: union_method
  title: 합집합 (union)
  structuredPrimary: true
  subtitle: 두 집합을 합치기
  goal: 합집합 (union)에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    합집합은 두 집합의 모든 요소를 포함하는 새 집합을 만듭니다. union() 메서드나 | 연산자를 사용합니다. 중복된 요소는 하나만 포함됩니다. 원본 집합은 변경되지 않고 새로운 집합이 생성됩니다.

    합집합은 A ∪ B를 의미하며, 모든 요소를 포함합니다.
  tips:
  - 합집합은 A ∪ B를 의미하며, 모든 요소를 포함합니다.
  snippet: |-
    setA = {1, 2, 3}
    setB = {3, 4, 5}
    setA.union(setB)
  exercise:
    prompt: 합집합 (union) 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      setA = {1, 2, 3}
      setB = {3, 4, 5}
      setA.union(setB)
    hints:
    - 합집합 (union) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 합집합 (union) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 합집합 (union)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: intersection_method
  title: 교집합 (intersection)
  structuredPrimary: true
  subtitle: 공통 요소만 추출
  goal: 교집합 (intersection)에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    교집합은 두 집합에 모두 있는 요소만 포함하는 새 집합을 만듭니다. intersection() 메서드나 & 연산자를 사용합니다. 두 집합의 공통 부분을 찾을 때 유용합니다. 원본 집합은 변경되지 않습니다.

    교집합은 A ∩ B를 의미하며, 공통 요소만 포함합니다.
  tips:
  - 교집합은 A ∩ B를 의미하며, 공통 요소만 포함합니다.
  snippet: |-
    setA = {1, 2, 3, 4}
    setB = {3, 4, 5, 6}
    setA.intersection(setB)
  exercise:
    prompt: 교집합 (intersection) 예제에서 입력값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      setA = {1, 2, 3, 4}
      setB = {3, 4, 5, 6}
      setA.intersection(setB)
    hints:
    - 교집합 (intersection) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 교집합 (intersection) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 교집합 (intersection)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: difference_method
  title: 차집합 (difference)
  structuredPrimary: true
  subtitle: 한쪽에만 있는 요소
