    starterCode: |-
      score = 80
      score = 95
      score
    solution: |-
      score = 80
      score = 95
      score
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: |-
      변수는 언제든지 새로운 값으로 변경할 수 있습니다.
      같은 변수에 새 값을 할당하면 이전 값은 사라지고 새 값으로 대체됩니다.
      이것이 "변수(Variable)"라는 이름의 의미입니다.
  - type: list
    items:
    - 같은 변수에 새 값 할당 가능
    - 이전 값은 사라지고 새 값으로 대체
    - 변할 수 있기에 "변수"
  - type: code
    language: python
    title: 변수 값 변경
    description: 변수에 새로운 값을 할당합니다.
    content: |-
      score = 80
      score = 95
      score
  - type: tip
    content: 변수는 최종적으로 할당된 값을 가집니다.
