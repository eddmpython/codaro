    blocks:
    - type: code
      title: 문자열 숫자
      content: |-
        text = '456'
        print('number_as_str:', text)
    - type: code
      title: 정수로 변환
      content: |-
        raw = '456'
        num = int(raw)
        print('number_as_int:', num)
    - type: code
      title: 변환된 타입
      content: |-
        source = '456'
        converted = int(source)
        kind = type(converted).__name__
        print('converted_type:', kind)
  - type: expansion
    title: '🔴 심화4-1: 학생 개별 과목 성적'
    blocks:
    - type: code
      title: 학생 이름
      content: |-
        student = '이학생'
        print('name:', student)
    - type: code
      title: 수학 성적
      content: |-
        math = 85
        print('math:', math)
    - type: code
      title: 영어 성적
      content: |-
        english = 90
        print('english:', english)
  - type: expansion
    title: '🔴 심화4-2: 학생 평균 성적'
    blocks:
    - type: code
      title: 과학 성적
      content: |-
        science = 88
        print('science:', science)
    - type: code
      title: 평균 계산
      content: |-
        math = 85
        eng = 90
        sci = 88
        avg = (math + eng + sci) / 3
        print('average:', avg)
  - type: expansion
    title: '🔴 심화5-1: 타입 변환 1단계'
    blocks:
    - type: code
      title: 원본 문자열
      content: |-
        origin = '99.5'
        print('original_str:', origin)
    - type: code
      title: 실수로 변환
      content: |-
        raw = '99.5'
        decimal = float(raw)
        print('to_float:', decimal)
    - type: code
      title: 정수로 변환
      content: |-
        src = '99.5'
        dec = float(src)
        num = int(dec)
        print('to_int:', num)
  - type: expansion
    title: '🔴 심화5-2: 타입 변환 2단계'
    blocks:
    - type: code
      title: 문자열로 변환
      content: |-
        num = 99
        text = str(num)
        print('back_to_str:', text)
    - type: code
      title: 최종 길이
      content: |-
        digit = 99
        text = str(digit)
        length = len(text)
        print('final_length:', length)
