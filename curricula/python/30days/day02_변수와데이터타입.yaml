- id: workflow_validation
  title: '검증 루프: 입력값을 업무 데이터로 바꾸기'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 변수와 타입은 값을 담는 문법이 아니라, 외부에서 들어온 문자열을 계산 가능한 데이터로 바꾸고 검증하는 출발점입니다. 실행 전에 어떤 값이 str/int/float/bool이 될지 예측하고, 변환 실패를 직접 확인한 뒤, 업무 리포트에 쓸 수 있는 구조로 정리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    rawProduct = "notebook"
    rawPrice = "1200000"
    rawQuantity = "2"
    rawMember = "yes"

    productName = rawProduct
    unitPrice = int(rawPrice)
    quantity = int(rawQuantity)
    isMember = rawMember == "yes"

    assert type(productName).__name__ == "str"
    assert type(unitPrice).__name__ == "int"
    assert type(quantity).__name__ == "int"
    assert type(isMember).__name__ == "bool"

    orderSubtotal = unitPrice * quantity
    orderSubtotal
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      rawProduct = "notebook"
      rawPrice = "1200000"
      rawQuantity = "2"
      rawMember = "yes"

      productName = rawProduct
      unitPrice = int(rawPrice)
      quantity = int(rawQuantity)
      isMember = rawMember == "yes"

      assert type(productName).__name__ == "str"
      assert type(unitPrice).__name__ == "int"
      assert type(quantity).__name__ == "int"
      assert type(isMember).__name__ == "bool"

      orderSubtotal = unitPrice * quantity
      orderSubtotal
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
