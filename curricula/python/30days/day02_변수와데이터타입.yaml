sections:
- id: variable_concept
  title: 변수란?
  structuredPrimary: true
  subtitle: 데이터를 저장하는 이름표
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    변수(Variable)는 데이터를 저장하는 메모리 공간에 붙인 이름표입니다. 마치 상자에 물건을 넣고 라벨을 붙이는 것과 같습니다. 변수를 사용하면 데이터를 저장했다가 나중에 다시 사용할 수 있습니다. = 기호는 수학의 "같다"가 아니라 "오른쪽 값을 왼쪽 변수에 저장한다"는 의미입니다.

    변수명은 영문자, 숫자, 밑줄(_)만 사용 가능하며, 숫자로 시작할 수 없습니다.
  tips:
  - 변수명은 영문자, 숫자, 밑줄(_)만 사용 가능하며, 숫자로 시작할 수 없습니다.
  snippet: |-
    msg = 'Python'
    msg
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      msg = 'Python'
      msg
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: naming_convention
  title: 변수명 작성 스타일
  structuredPrimary: true
  subtitle: 카멜케이스 vs 스네이크케이스
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    변수명을 지을 때 단어를 연결하는 방법에는 크게 두 가지 스타일이 있습니다. 카멜케이스(camelCase)는 첫 단어는 소문자로 시작하고 이후 단어의 첫 글자를 대문자로 쓰는 방식입니다. 스네이크케이스(snake_case)는 모든 단어를 소문자로 쓰고 밑줄(_)로 연결하는 방식입니다. 파이썬 공식 스타일 가이드(PEP 8)는 스네이크케이스를 권장하지만, 이 학습 컨텐츠는 작성자의 코딩 스타일에 따라 카멜케이스를 사용합니다.

    이 학습 컨텐츠는 카멜케이스로 작성되었지만, 여러분은 원하는 스타일을 선택하여 사용하세요. 중요한 것은 선택한 스타일을 일관되게 유지하는 것입니다.
  tips:
  - 이 학습 컨텐츠는 카멜케이스로 작성되었지만, 여러분은 원하는 스타일을 선택하여 사용하세요. 중요한 것은 선택한 스타일을 일관되게 유지하는 것입니다.
  snippet: |-
    userName = 'John Doe'
    user_name = 'Jane Smith'
    print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      userName = 'John Doe'
      user_name = 'Jane Smith'
      print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: variable_reassign
  title: 변수 값 변경하기
  structuredPrimary: true
  subtitle: 저장된 값을 새 값으로 교체
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    변수는 언제든지 새로운 값으로 변경할 수 있습니다. 같은 변수에 새 값을 할당하면 이전 값은 사라지고 새 값으로 대체됩니다. 이것이 "변수(Variable)"라는 이름의 의미입니다.

    변수는 최종적으로 할당된 값을 가집니다.
  tips:
  - 변수는 최종적으로 할당된 값을 가집니다.
  snippet: |-
    score = 80
    score = 95
    score
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      score = 80
      score = 95
      score
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_integer
  title: 정수 타입
  structuredPrimary: true
  subtitle: 소수점 없는 숫자
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 정수(Integer)는 소수점이 없는 숫자입니다. 1, 100, -5처럼 양수, 0, 음수 모두 정수입니다. 파이썬에서 정수 타입은 int로 표시됩니다. int는 integer(정수)의 줄임말입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    years = 25
    years
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      years = 25
      years
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_float
  title: 실수 타입
  structuredPrimary: true
  subtitle: 소수점 있는 숫자
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 실수(Float)는 소수점이 있는 숫자입니다. 3.14, 2.5, -1.5처럼 소수점을 포함한 숫자입니다. 파이썬에서 실수 타입은 float로 표시됩니다. float는 floating point(부동소수점)의 줄임말입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    pi = 3.14159
    pi
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      pi = 3.14159
      pi
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_string
  title: 문자열 타입
  structuredPrimary: true
  subtitle: 따옴표로 감싼 텍스트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 문자열(String)은 따옴표로 감싼 텍스트입니다. 'Hello', "Python"처럼 작은따옴표나 큰따옴표로 만듭니다. 문자 하나('A')도 문자열이고, 긴 문장도 문자열입니다. 파이썬에서 문자열 타입은 str로 표시됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    town = 'Seoul'
    town
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      town = 'Seoul'
      town
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_boolean
  title: 불린 타입
  structuredPrimary: true
  subtitle: 참과 거짓
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 불린(Boolean)은 참(True) 또는 거짓(False) 두 가지 값만 가지는 타입입니다. 영국 수학자 조지 불(George Boole)의 이름에서 유래했습니다. True와 False는 첫 글자가 반드시 대문자여야 합니다. 조건 판단, 비교 연산에서 주로 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    active = True
    active
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      active = True
      active
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_function
  title: type() 함수
  structuredPrimary: true
  subtitle: 데이터 타입 확인하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: type() 함수는 값이나 변수의 데이터 타입을 알려줍니다. 괄호 안에 변수나 값을 넣으면 그것의 타입을 반환합니다. 결과는 <class 'int'>, <class 'str'> 같은 형태로 표시됩니다. 디버깅이나 타입 확인에 매우 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    point = 100
    type(point)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      point = 100
      type(point)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: len_function
  title: len() 함수
  structuredPrimary: true
  subtitle: 문자열 길이 측정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    len() 함수는 문자열의 길이(문자 개수)를 반환합니다. len은 length(길이)의 줄임말입니다. 공백, 특수문자, 한글 모두 각각 1로 계산됩니다. 빈 문자열('')의 길이는 0입니다.

    'Hello World'의 길이는 11입니다. 공백도 문자로 계산됩니다.
  tips:
  - '''Hello World''의 길이는 11입니다. 공백도 문자로 계산됩니다.'
  snippet: |-
    email = 'python@example.com'
    len(email)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      email = 'python@example.com'
      len(email)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: convert_to_int
  title: int() 변환
  structuredPrimary: true
  subtitle: 정수로 변환하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: int() 함수는 다른 타입을 정수로 변환합니다. 문자열 '100'을 숫자 100으로 바꿀 수 있습니다. 단, 문자열은 숫자로만 이루어져 있어야 합니다. 실수를 정수로 변환하면 소수점 이하는 버려집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    text = '100'
    int(text)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      text = '100'
      int(text)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: convert_to_float
  title: float() 변환
  structuredPrimary: true
  subtitle: 실수로 변환하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: float() 함수는 다른 타입을 실수로 변환합니다. 정수 10을 실수 10.0으로 바꿀 수 있습니다. 문자열 '3.14'를 숫자 3.14로 변환할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    val = 42
    float(val)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      val = 42
      float(val)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: convert_to_str
  title: str() 변환
  structuredPrimary: true
  subtitle: 문자열로 변환하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: str() 함수는 어떤 값이든 문자열로 변환합니다. 숫자 25를 문자열 '25'로 바꿀 수 있습니다. 문자열 연결이나 출력 메시지를 만들 때 자주 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    code = 123
    str(code)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      code = 123
      str(code)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: multiple_assign
  title: 다중 변수 할당
  structuredPrimary: true
  subtitle: 한 줄로 여러 변수 선언
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 쉼표로 구분하여 한 줄에 여러 변수를 선언할 수 있습니다. 순서대로 매칭되므로 첫 번째 변수에 첫 번째 값이 저장됩니다. 코드를 더 간결하게 만들 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    name, age, city = 'Alice', 25, 'Seoul'
    name, age, city
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      name, age, city = 'Alice', 25, 'Seoul'
      name, age, city
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: same_value_assign
  title: 같은 값 할당
  structuredPrimary: true
