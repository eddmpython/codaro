sections:
- id: variable_concept
  title: 변수란?
  structuredPrimary: true
  subtitle: 데이터를 저장하는 이름표
  goal: '변수란?: 실행 가능한 Python 흐름으로 익힌다.'
  why: '변수란?: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    변수(Variable)는 데이터를 저장하는 메모리 공간에 붙인 이름표입니다. 마치 상자에 물건을 넣고 라벨을 붙이는 것과 같습니다. 변수를 사용하면 데이터를 저장했다가 나중에 다시 사용할 수 있습니다. = 기호는 수학의 "같다"가 아니라 "오른쪽 값을 왼쪽 변수에 저장한다"는 의미입니다.

    변수명은 영문자, 숫자, 밑줄(_)만 사용 가능하며, 숫자로 시작할 수 없습니다.
  tips:
  - 변수명은 영문자, 숫자, 밑줄(_)만 사용 가능하며, 숫자로 시작할 수 없습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    msg = 'Python'
    msg
  exercise:
    prompt: '변수란?: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      msg = 'Python'
      msg
    solution: |-
      msg = 'Python'
      msg
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: |-
      변수(Variable)는 데이터를 저장하는 메모리 공간에 붙인 이름표입니다.
      마치 상자에 물건을 넣고 라벨을 붙이는 것과 같습니다.
      변수를 사용하면 데이터를 저장했다가 나중에 다시 사용할 수 있습니다.
      = 기호는 수학의 "같다"가 아니라 "오른쪽 값을 왼쪽 변수에 저장한다"는 의미입니다.
  - type: list
    items:
    - 변수명 = 값 형태로 할당
    - 데이터를 저장하고 재사용
    - = 기호는 할당(assignment) 의미
    - 의미 있는 이름으로 가독성 향상
  - type: code
    language: python
    title: 변수 기본 사용
    description: 변수에 값을 저장하고 사용합니다.
    content: |-
      msg = 'Python'
      msg
  - type: tip
    content: 변수명은 영문자, 숫자, 밑줄(_)만 사용 가능하며, 숫자로 시작할 수 없습니다.
- id: naming_convention
  title: 변수명 작성 스타일
  structuredPrimary: true
  subtitle: 카멜케이스 vs 스네이크케이스
  goal: '변수명 작성 스타일: 실행 가능한 Python 흐름으로 익힌다.'
  why: '변수명 작성 스타일: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    변수명을 지을 때 단어를 연결하는 방법에는 크게 두 가지 스타일이 있습니다. 카멜케이스(camelCase)는 첫 단어는 소문자로 시작하고 이후 단어의 첫 글자를 대문자로 쓰는 방식입니다. 스네이크케이스(snake_case)는 모든 단어를 소문자로 쓰고 밑줄(_)로 연결하는 방식입니다. 파이썬 공식 스타일 가이드(PEP 8)는 스네이크케이스를 권장하지만, 이 학습 컨텐츠는 작성자의 코딩 스타일에 따라 카멜케이스를 사용합니다.

    이 학습 컨텐츠는 카멜케이스로 작성되었지만, 여러분은 원하는 스타일을 선택하여 사용하세요. 중요한 것은 선택한 스타일을 일관되게 유지하는 것입니다.
  tips:
  - 이 학습 컨텐츠는 카멜케이스로 작성되었지만, 여러분은 원하는 스타일을 선택하여 사용하세요. 중요한 것은 선택한 스타일을 일관되게 유지하는 것입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    userName = 'John Doe'
    user_name = 'Jane Smith'
    print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
  exercise:
    prompt: '변수명 작성 스타일: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      userName = 'John Doe'
      user_name = 'Jane Smith'
      print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
    solution: |-
      userName = 'John Doe'
      user_name = 'Jane Smith'
      print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 변수명을 지을 때 단어를 연결하는 방법에는 크게 두 가지 스타일이 있습니다. 카멜케이스(camelCase)는 첫 단어는 소문자로 시작하고 이후 단어의 첫 글자를 대문자로 쓰는 방식입니다. 스네이크케이스(snake_case)는
      모든 단어를 소문자로 쓰고 밑줄(_)로 연결하는 방식입니다. 파이썬 공식 스타일 가이드(PEP 8)는 스네이크케이스를 권장하지만, 이 학습 컨텐츠는 작성자의 코딩 스타일에 따라 카멜케이스를 사용합니다.
  - type: list
    items:
    - '카멜케이스: userName, totalPrice, isActive'
    - '스네이크케이스: user_name, total_price, is_active'
    - 파이썬 공식 가이드는 스네이크케이스 권장
    - 중요한 것은 한 프로젝트에서 일관성 유지
  - type: code
    language: python
    title: 두 가지 스타일 비교
    description: 카멜케이스와 스네이크케이스 모두 사용 가능합니다.
    content: |-
      userName = 'John Doe'
      user_name = 'Jane Smith'
      print('카멜케이스 : ', userName, '\n스네이크케이스 : ', user_name)
  - type: tip
    content: 이 학습 컨텐츠는 카멜케이스로 작성되었지만, 여러분은 원하는 스타일을 선택하여 사용하세요. 중요한 것은 선택한 스타일을 일관되게 유지하는 것입니다.
- id: variable_reassign
  title: 변수 값 변경하기
  structuredPrimary: true
  subtitle: 저장된 값을 새 값으로 교체
  goal: '변수 값 변경하기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '변수 값 변경하기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
