- id: practical_patterns
  title: 실전 패턴
  structuredPrimary: true
  subtitle: 컨텍스트 매니저 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컨텍스트 매니저는 실무에서 다양하게 활용됩니다. 타이머, 디렉토리 변경, 설정 임시 변경, 트랜잭션 관리 등 시작과 종료가 명확한 작업에 유용합니다. 코드의 안전성과 가독성을 동시에 향상시킵니다.

    컨텍스트 매니저는 '설정-작업-복원' 패턴에 이상적입니다.
  tips:
  - 컨텍스트 매니저는 '설정-작업-복원' 패턴에 이상적입니다.
  snippet: |-
    import time

    class Timer:
        def __enter__(self):
            self.start = time.time()
            return self

        def __exit__(self, excType, excVal, excTb):
            self.elapsed = time.time() - self.start
            return False

    timer = Timer()
    with timer:
        total = sum(range(1000))
    timer.elapsed > 0
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
