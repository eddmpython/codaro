      day28Scratch = Path(tempfile.mkdtemp(prefix='codaro_day28_'))
      testFile = day28Scratch / 'test.txt'
      content = ''
      with open(testFile, 'w') as f:
          f.write('Hello World')
          content = 'written'
      content
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: context_manager_protocol
  title: 컨텍스트 매니저 프로토콜
  structuredPrimary: true
  subtitle: __enter__와 __exit__
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컨텍스트 매니저는 __enter__와 __exit__ 메서드를 구현한 객체입니다. __enter__는 with 블록 진입시 호출되고, __exit__는 블록 종료시 호출됩니다. __exit__는 예외 정보를 받아 처리할 수 있으며, True를 반환하면 예외를 억제합니다.

    __exit__의 세 매개변수는 예외 타입, 예외 값, 트레이스백입니다.
  tips:
  - __exit__의 세 매개변수는 예외 타입, 예외 값, 트레이스백입니다.
  snippet: |-
    class SimpleContext:
        def __enter__(self):
            return 'entered'

        def __exit__(self, excType, excVal, excTb):
            return False

    with SimpleContext() as sc:
        result = sc
    result
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class SimpleContext:
          def __enter__(self):
              return 'entered'

          def __exit__(self, excType, excVal, excTb):
              return False

      with SimpleContext() as sc:
          result = sc
      result
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: resource_management
  title: 리소스 관리
  structuredPrimary: true
  subtitle: 파일과 연결 관리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컨텍스트 매니저의 주요 용도는 리소스 관리입니다. 파일, 네트워크 연결, 데이터베이스 커넥션 등 사용 후 반드시 정리해야 하는 리소스를 안전하게 처리합니다. with 문을 사용하면 예외 발생 여부와 관계없이 리소스가 정리됩니다.

    with 블록이 중첩되면 안쪽 블록부터 바깥쪽 순서로 __exit__가 호출됩니다.
  tips:
  - with 블록이 중첩되면 안쪽 블록부터 바깥쪽 순서로 __exit__가 호출됩니다.
  snippet: |-
    class FileManager:
        def __init__(self, filename, mode):
            self.filename = filename
            self.mode = mode
            self.fileObj = None

        def __enter__(self):
            self.fileObj = open(self.filename, self.mode)
            return self.fileObj

        def __exit__(self, excType, excVal, excTb):
            if self.fileObj:
                self.fileObj.close()
            return False

    with FileManager('resource.txt', 'w') as fm:
        fm.write('Resource managed')
    'completed'
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class FileManager:
          def __init__(self, filename, mode):
              self.filename = filename
              self.mode = mode
              self.fileObj = None

          def __enter__(self):
              self.fileObj = open(self.filename, self.mode)
              return self.fileObj

          def __exit__(self, excType, excVal, excTb):
              if self.fileObj:
                  self.fileObj.close()
              return False

      with FileManager('resource.txt', 'w') as fm:
          fm.write('Resource managed')
      'completed'
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: exception_handling
  title: 예외 처리
  structuredPrimary: true
  subtitle: 컨텍스트 매니저와 예외
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컨텍스트 매니저는 예외 처리에 강력합니다. __exit__ 메서드는 예외 정보를 받아 처리할 수 있으며, True를 반환하면 예외를 억제합니다. 이를 통해 정리 작업은 수행하되 예외 전파를 제어할 수 있습니다.

    __exit__가 True를 반환하면 예외가 억제되고, False나 None을 반환하면 예외가 전파됩니다.
  tips:
  - __exit__가 True를 반환하면 예외가 억제되고, False나 None을 반환하면 예외가 전파됩니다.
  snippet: |-
    class ExceptionSuppressor:
        def __enter__(self):
            return self

        def __exit__(self, excType, excVal, excTb):
            if excType is ZeroDivisionError:
                return True
            return False

    outcome = 'no error'
    with ExceptionSuppressor():
        outcome = 10 / 0
    outcome
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class ExceptionSuppressor:
          def __enter__(self):
              return self

          def __exit__(self, excType, excVal, excTb):
              if excType is ZeroDivisionError:
                  return True
              return False

      outcome = 'no error'
      with ExceptionSuppressor():
          outcome = 10 / 0
      outcome
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: multiple_context
  title: 다중 컨텍스트
