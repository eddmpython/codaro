sections:
- id: generator_basic
  title: 제너레이터 기초
  structuredPrimary: true
  subtitle: yield 키워드
  goal: 제너레이터 기초에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    제너레이터는 yield 키워드를 사용하여 값을 하나씩 생성하는 함수입니다. return과 달리 yield는 함수 실행을 일시 중지하고 값을 반환한 후, 다음 호출 시 중지된 지점부터 계속 실행됩니다. 모든 값을 메모리에 저장하지 않고 필요할 때마다 생성하므로 매우 효율적입니다.

    제너레이터는 한 번만 순회할 수 있습니다. 다시 순회하려면 새로 생성해야 합니다.
  tips:
  - 제너레이터는 한 번만 순회할 수 있습니다. 다시 순회하려면 새로 생성해야 합니다.
  snippet: |-
    def simpleGen():
        yield 1
        yield 2
        yield 3

    gen = simpleGen()
    next(gen), next(gen), next(gen)
  exercise:
    prompt: 제너레이터 기초 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def simpleGen():
          yield 1
          yield 2
          yield 3

      gen = simpleGen()
      next(gen), next(gen), next(gen)
    hints:
    - 제너레이터 기초 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 제너레이터 기초 코드가 예외 없이 끝나야 합니다.
    resultCheck: 제너레이터 기초에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: generator_expression
  title: 제너레이터 표현식
  structuredPrimary: true
  subtitle: 간결한 제너레이터 생성
  goal: 제너레이터 표현식에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    제너레이터 표현식은 리스트 컴프리헨션과 비슷하지만 괄호를 사용합니다. (표현식 for 변수 in 시퀀스) 형태로 작성하며, 리스트를 만들지 않고 제너레이터를 반환합니다. 대량의 데이터를 처리할 때 메모리를 절약할 수 있습니다.

    제너레이터 표현식은 sum(), max(), min() 같은 함수에 바로 전달할 수 있습니다.
  tips:
  - 제너레이터 표현식은 sum(), max(), min() 같은 함수에 바로 전달할 수 있습니다.
  snippet: |-
    squares = (x ** 2 for x in range(5))
    list(squares)
  exercise:
    prompt: 제너레이터 표현식 예제에서 반복 대상이나 범위을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      squares = (x ** 2 for x in range(5))
      list(squares)
    hints:
    - 제너레이터 표현식 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 제너레이터 표현식 코드가 예외 없이 끝나야 합니다.
    resultCheck: 제너레이터 표현식에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: iterator_basic
  title: 이터레이터 기초
  structuredPrimary: true
  subtitle: iter()와 next()
  goal: 이터레이터 기초에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    이터레이터는 순회 가능한 객체입니다. iter() 함수로 이터레이터를 생성하고, next() 함수로 다음 값을 가져옵니다. 리스트, 튜플, 문자열 등 모든 시퀀스는 iter()로 이터레이터를 만들 수 있으며, 더 이상 값이 없으면 StopIteration 예외가 발생합니다.

    for 루프는 내부적으로 iter()와 next()를 사용하여 순회합니다.
  tips:
  - for 루프는 내부적으로 iter()와 next()를 사용하여 순회합니다.
  snippet: |-
    nums = [1, 2, 3]
    it = iter(nums)
    next(it), next(it), next(it)
  exercise:
    prompt: 이터레이터 기초 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      nums = [1, 2, 3]
      it = iter(nums)
      next(it), next(it), next(it)
    hints:
    - 이터레이터 기초 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 이터레이터 기초 코드가 예외 없이 끝나야 합니다.
    resultCheck: 이터레이터 기초에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: iterator_protocol
  title: 이터레이터 프로토콜
  structuredPrimary: true
  subtitle: __iter__와 __next__ 구현
  goal: 이터레이터 프로토콜에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    이터레이터 프로토콜은 __iter__와 __next__ 메서드를 구현하여 객체를 순회 가능하게 만드는 규약입니다. __iter__는 self를 반환하고, __next__는 다음 값을 반환하거나 StopIteration을 발생시킵니다. 이를 통해 사용자 정의 객체를 for 루프에서 사용할 수 있습니다.

    제너레이터는 이터레이터 프로토콜을 자동으로 구현합니다.
  tips:
  - 제너레이터는 이터레이터 프로토콜을 자동으로 구현합니다.
  snippet: |-
    class Counter:
        def __init__(self, max):
            self.max = max
            self.current = 0

        def __iter__(self):
            return self

        def __next__(self):
            if self.current < self.max:
                self.current = self.current + 1
                return self.current
            raise StopIteration

    c = Counter(3)
    list(c)
  exercise:
    prompt: 이터레이터 프로토콜 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class Counter:
          def __init__(self, max):
              self.max = max
              self.current = 0

          def __iter__(self):
              return self

          def __next__(self):
              if self.current < self.max:
                  self.current = self.current + 1
                  return self.current
              raise StopIteration

      c = Counter(3)
      list(c)
    hints:
    - 이터레이터 프로토콜 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 이터레이터 프로토콜 코드가 예외 없이 끝나야 합니다.
    resultCheck: 이터레이터 프로토콜에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: generator_advanced
  title: 고급 제너레이터
  structuredPrimary: true
  subtitle: 실전 활용 패턴
  goal: 고급 제너레이터에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    제너레이터는 파일 읽기, 무한 시퀀스 생성, 파이프라인 처리 등 다양한 실전 상황에서 활용됩니다. 메모리를 효율적으로 사용하면서도 코드를 간결하게 유지할 수 있어 대용량 데이터 처리에 매우 유용합니다.

    여러 제너레이터를 연결하여 데이터 파이프라인을 만들 수 있습니다.
  tips:
  - 여러 제너레이터를 연결하여 데이터 파이프라인을 만들 수 있습니다.
  snippet: |-
    def fibonacci():
        a = 0
        b = 1
        while True:
            yield a
            a, b = b, a + b

    fib = fibonacci()
    sequence = []
    for i in range(10):
        sequence.append(next(fib))
    sequence
  exercise:
    prompt: 고급 제너레이터 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def fibonacci():
          a = 0
          b = 1
          while True:
              yield a
              a, b = b, a + b

      fib = fibonacci()
      sequence = []
      for i in range(10):
          sequence.append(next(fib))
      sequence
    hints:
    - 고급 제너레이터 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 고급 제너레이터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 고급 제너레이터에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: practical_patterns
  title: 실전 패턴
  structuredPrimary: true
  subtitle: 제너레이터와 이터레이터 활용
  goal: 실전 패턴에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    제너레이터와 이터레이터는 실무에서 대용량 파일 처리, 배치 처리, 스트리밍 데이터 처리 등에 활용됩니다. 메모리를 절약하면서도 깔끔한 코드를 작성할 수 있어 파이썬의 강력한 기능 중 하나입니다.

    제너레이터는 필요한 만큼만 값을 생성하므로 대용량 데이터 처리에 이상적입니다.
  tips:
  - 제너레이터는 필요한 만큼만 값을 생성하므로 대용량 데이터 처리에 이상적입니다.
  snippet: |-
    def batchGen(elements, size):
        chunk = []
        for item in elements:
            chunk.append(item)
            if len(chunk) == size:
                yield chunk
                chunk = []
        if chunk:
            yield chunk

    collection = [1, 2, 3, 4, 5, 6, 7]
    batches = list(batchGen(collection, 3))
    batches
  exercise:
    prompt: 실전 패턴 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def batchGen(elements, size):
          chunk = []
          for item in elements:
              chunk.append(item)
              if len(chunk) == size:
                  yield chunk
                  chunk = []
          if chunk:
              yield chunk

      collection = [1, 2, 3, 4, 5, 6, 7]
      batches = list(batchGen(collection, 3))
      batches
    hints:
    - 실전 패턴 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실전 패턴 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실전 패턴에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: 실무 스트리밍 처리 루프
  structuredPrimary: true
  subtitle: 예측 → 지연 처리 → 소진 확인 → 검증
  goal: 실무 스트리밍 처리 루프에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    제너레이터는 단순히 yield를 쓰는 문법이 아니라, 로그나 이벤트처럼 많은 데이터를 한 번에 메모리에 올리지 않고 필요한 만큼만 처리하는 방식입니다. 실행 전에는 어떤 이벤트가 통과할지 예측하고, 제너레이터가 한 번 소진되면 다시 쓸 수 없다는 점까지 검증해야 합니다.

    제너레이터는 대용량 데이터에서 강력하지만 한 번 흘러간 스트림은 다시 읽을 수 없습니다. 필요한 결과는 리스트나 파일로 남기고, 검증은 작은 샘플 스트림으로 먼저 통과시키세요.
