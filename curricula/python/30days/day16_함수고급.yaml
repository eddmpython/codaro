sections:
- id: default_parameter
  title: 기본값 매개변수
  structuredPrimary: true
  subtitle: 선택적 매개변수
  goal: 기본값 매개변수에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    매개변수에 기본값을 지정하면 인자를 생략할 수 있습니다. def 함수명(매개변수=기본값): 형식으로 쓰며, 호출시 인자를 주지 않으면 기본값이 사용됩니다. 필수 매개변수 뒤에 와야 합니다.

    기본값이 없는 매개변수는 기본값이 있는 매개변수보다 앞에 와야 합니다.
  tips:
  - 기본값이 없는 매개변수는 기본값이 있는 매개변수보다 앞에 와야 합니다.
  snippet: |-
    def greet(name='Guest'):
        return 'Hello ' + name

    greet()
  exercise:
    prompt: 기본값 매개변수 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def greet(name='Guest'):
          return 'Hello ' + name

      greet()
    hints:
    - 기본값 매개변수 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 기본값 매개변수 코드가 예외 없이 끝나야 합니다.
    resultCheck: 기본값 매개변수에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: keyword_argument
  title: 키워드 인자
  structuredPrimary: true
  subtitle: 이름으로 인자 전달
  goal: 키워드 인자에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    키워드 인자는 매개변수 이름을 명시하여 값을 전달합니다. 함수명(매개변수=값) 형식으로 쓰며, 순서와 관계없이 전달할 수 있습니다. 코드 가독성이 높아집니다.

    위치 인자는 키워드 인자보다 앞에 와야 합니다.
  tips:
  - 위치 인자는 키워드 인자보다 앞에 와야 합니다.
  snippet: |-
    def introduce(name, age, city):
        return name + ' ' + str(age) + ' ' + city

    introduce(name='Alice', age=25, city='Seoul')
  exercise:
    prompt: 키워드 인자 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def introduce(name, age, city):
          return name + ' ' + str(age) + ' ' + city

      introduce(name='Alice', age=25, city='Seoul')
    hints:
    - 키워드 인자 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 키워드 인자 코드가 예외 없이 끝나야 합니다.
    resultCheck: 키워드 인자에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: positional_keyword_mix
  title: 위치 인자와 키워드 혼용
  structuredPrimary: true
  subtitle: 유연한 호출 방식
  goal: 위치 인자와 키워드 혼용에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    위치 인자와 키워드 인자를 함께 사용할 수 있습니다. 위치 인자를 먼저 쓰고 키워드 인자를 뒤에 씁니다. 필수 매개변수는 위치로, 선택적 매개변수는 키워드로 전달하면 편리합니다.

    기본값이 있는 매개변수는 키워드로 전달하면 가독성이 좋습니다.
  tips:
  - 기본값이 있는 매개변수는 키워드로 전달하면 가독성이 좋습니다.
  snippet: |-
    def orderFood(menu, quantity=1, spicy=False):
        result = menu + ' x' + str(quantity)
        if spicy:
            result = result + ' (spicy)'
        return result

    orderFood('Pizza', quantity=2, spicy=True)
  exercise:
    prompt: 위치 인자와 키워드 혼용 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def orderFood(menu, quantity=1, spicy=False):
          result = menu + ' x' + str(quantity)
          if spicy:
              result = result + ' (spicy)'
          return result

      orderFood('Pizza', quantity=2, spicy=True)
    hints:
    - 위치 인자와 키워드 혼용 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 위치 인자와 키워드 혼용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 위치 인자와 키워드 혼용에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: args_basic
  title: '*args 기본'
  structuredPrimary: true
  subtitle: 가변 위치 인자
  goal: args 기본에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    *args는 임의 개수의 위치 인자를 받습니다. def 함수명(*args): 형식으로 쓰며, args는 튜플로 전달됩니다. 몇 개의 인자가 올지 모를 때 사용합니다.

    args는 관례적인 이름이며, 다른 이름을 사용해도 됩니다.
  tips:
  - args는 관례적인 이름이며, 다른 이름을 사용해도 됩니다.
  snippet: |-
    def sumAll(*args):
        total = 0
        for num in args:
            total = total + num
        return total

    sumAll(1, 2, 3, 4, 5)
  exercise:
    prompt: args 기본 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def sumAll(*args):
          total = 0
          for num in args:
              total = total + num
          return total

      sumAll(1, 2, 3, 4, 5)
    hints:
    - args 기본 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: args 기본 코드가 예외 없이 끝나야 합니다.
    resultCheck: args 기본에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: args_advanced
  title: '*args 활용'
  structuredPrimary: true
  subtitle: 일반 매개변수와 혼용
  goal: args 활용에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    *args는 일반 매개변수와 함께 사용할 수 있습니다. 일반 매개변수를 먼저 쓰고 *args를 뒤에 씁니다. 필수 인자와 선택적 인자를 함께 받을 때 유용합니다.

    *args 뒤에는 키워드 전용 매개변수만 올 수 있습니다.
  tips:
  - '*args 뒤에는 키워드 전용 매개변수만 올 수 있습니다.'
  snippet: |-
    def makeList(first, *rest):
        result = [first]
        for item in rest:
            result.append(item)
        return result

    makeList('a', 'b', 'c', 'd')
  exercise:
    prompt: args 활용 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def makeList(first, *rest):
          result = [first]
          for item in rest:
              result.append(item)
          return result

      makeList('a', 'b', 'c', 'd')
    hints:
    - args 활용 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: args 활용 코드가 예외 없이 끝나야 합니다.
    resultCheck: args 활용에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: kwargs_basic
  title: '**kwargs 기본'
  structuredPrimary: true
  subtitle: 가변 키워드 인자
  goal: kwargs 기본에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    **kwargs는 임의 개수의 키워드 인자를 받습니다. def 함수명(**kwargs): 형식으로 쓰며, kwargs는 딕셔너리로 전달됩니다. 키-값 쌍을 여러 개 받을 때 사용합니다.

    kwargs도 관례적인 이름이며, 다른 이름을 사용해도 됩니다.
  tips:
  - kwargs도 관례적인 이름이며, 다른 이름을 사용해도 됩니다.
  snippet: |-
    def printInfo(**kwargs):
        result = ''
        for key in kwargs:
            result = result + key + '=' + str(kwargs[key]) + ' '
        return result

    printInfo(name='Alice', age=25, city='Seoul')
  exercise:
    prompt: kwargs 기본 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def printInfo(**kwargs):
          result = ''
          for key in kwargs:
              result = result + key + '=' + str(kwargs[key]) + ' '
          return result

      printInfo(name='Alice', age=25, city='Seoul')
    hints:
    - kwargs 기본 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: kwargs 기본 코드가 예외 없이 끝나야 합니다.
    resultCheck: kwargs 기본에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: kwargs_advanced
  title: '**kwargs 활용'
  structuredPrimary: true
  subtitle: 일반 매개변수와 혼용
  goal: kwargs 활용에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    **kwargs는 일반 매개변수, *args와 함께 사용할 수 있습니다. 순서는 일반 매개변수, *args, **kwargs입니다. 매우 유연한 함수를 만들 수 있습니다.

    **kwargs는 설정이나 옵션을 받을 때 매우 유용합니다.
  tips:
  - '**kwargs는 설정이나 옵션을 받을 때 매우 유용합니다.'
  snippet: |-
    def createUser(userId, **options):
        info = 'User: ' + userId
        if 'name' in options:
            info = info + ' Name: ' + options['name']
        if 'email' in options:
            info = info + ' Email: ' + options['email']
        return info

    createUser('user123', name='Alice', email='alice@example.com')
  exercise:
    prompt: kwargs 활용 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def createUser(userId, **options):
          info = 'User: ' + userId
          if 'name' in options:
              info = info + ' Name: ' + options['name']
          if 'email' in options:
              info = info + ' Email: ' + options['email']
          return info

      createUser('user123', name='Alice', email='alice@example.com')
    hints:
    - kwargs 활용 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: kwargs 활용 코드가 예외 없이 끝나야 합니다.
    resultCheck: kwargs 활용에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: args_kwargs_together
  title: '*args와 **kwargs 함께'
  structuredPrimary: true
  subtitle: 모든 인자 받기
  goal: args와 kwargs 함께에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    *args와 **kwargs를 함께 사용하면 모든 종류의 인자를 받을 수 있습니다. def 함수명(*args, **kwargs): 형식으로 쓰며, 위치 인자는 args로, 키워드 인자는 kwargs로 전달됩니다.

    매우 유연하지만 과도한 사용은 코드 가독성을 해칠 수 있습니다.
  tips:
  - 매우 유연하지만 과도한 사용은 코드 가독성을 해칠 수 있습니다.
  snippet: |-
    def flexibleFunc(*args, **kwargs):
        posCount = len(args)
        kwCount = len(kwargs)
        return posCount, kwCount

    flexibleFunc(1, 2, 3, name='Alice', age=25)
  exercise:
