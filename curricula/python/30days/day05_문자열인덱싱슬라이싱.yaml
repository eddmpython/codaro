meta:
  id: day05
  title: 문자열 인덱싱/슬라이싱
  day: 5
  category: 30days
  tags:
  - 문자열
  - 인덱싱
  - 슬라이싱
  - 오프바이원
  - 전화번호
  - 검증
  seo:
    title: 파이썬 문자열 인덱싱과 슬라이싱 완벽 가이드
    description: 문자열 인덱싱, 음수 인덱싱, 슬라이싱, 스텝 슬라이싱을 배웁니다.
    keywords:
    - 인덱싱
    - indexing
    - 슬라이싱
    - slicing
    - 문자열
intro:
  emoji: 🔍
  points:
  - 인덱스로 문자열의 특정 위치 접근하기
  - 음수 인덱스로 뒤에서부터 접근하기
  - 슬라이싱으로 부분 문자열 추출하기
  - 스텝을 사용한 다양한 슬라이싱 패턴
  direction: 문자열 인덱싱/슬라이싱에서 입력값, 처리 로직, 출력 확인을 작은 스크립트로 연결합니다.
  benefits:
  - 문제에 필요한 값 확인 후 문법 요소에 맞는 코드 입력을 고릅니다.
  - 문자열 인덱싱/슬라이싱 결과를 출력과 변수 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 반복 업무 스크립트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 인덱싱 기초 입력 확인
      detail: 입력 기준(문제에 필요한 값)과 필요한 조건을 먼저 고정합니다.
    - label: 마지막 문자 접근 처리 실행
      detail: 문법 요소 코드를 실행해 중간 결과를 확인합니다.
    - label: 음수 인덱싱 결과 검증
      detail: 출력과 변수 상태 기준으로 실행 결과를 비교합니다.
    - label: 문자열 인덱싱/슬라이싱 재사용
      detail: 완성 코드를 반복 업무 스크립트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 기초 자동화 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: 문자열 인덱싱/슬라이싱 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 문자열 인덱싱/슬라이싱 완료
      detail: 검증된 코드를 반복 업무 스크립트로 남깁니다.
sections:
- id: index_basic
  title: 인덱싱 기초
  structuredPrimary: true
  subtitle: 0부터 시작하는 위치 접근
  goal: 인덱싱 기초에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 문자열의 각 문자는 인덱스(위치 번호)를 가집니다. 인덱스는 0부터 시작하며, 대괄호 []를 사용하여 특정 위치의 문자를 가져올 수 있습니다. 첫 번째 문자는
    [0], 두 번째 문자는 [1]입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    lang = 'Python'
    lang[0]
  exercise:
    prompt: 인덱싱 기초 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      lang = 'Python'
      lang[0]
    hints:
    - 인덱싱 기초 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 인덱싱 기초 코드가 예외 없이 끝나야 합니다.
    resultCheck: 인덱싱 기초에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: index_last
  title: 마지막 문자 접근
  structuredPrimary: true
  subtitle: 길이를 이용한 마지막 문자
  goal: 마지막 문자 접근에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 마지막 문자의 인덱스는 문자열 길이 - 1입니다. len() 함수를 사용하여 길이를 구한 후 1을 빼면 마지막 인덱스를 얻을 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    greet = 'Hello'
    greet[len(greet) - 1]
  exercise:
    prompt: 마지막 문자 접근 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      greet = 'Hello'
      greet[len(greet) - 1]
    hints:
    - 마지막 문자 접근 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 마지막 문자 접근 코드가 예외 없이 끝나야 합니다.
    resultCheck: 마지막 문자 접근에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: negative_index
  title: 음수 인덱싱
  structuredPrimary: true
  subtitle: 뒤에서부터 접근하기
  goal: 음수 인덱싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 음수 인덱스를 사용하면 문자열의 뒤에서부터 접근할 수 있습니다. -1은 마지막 문자, -2는 마지막에서 두 번째 문자입니다. 길이를 계산할 필요 없이 편리하게
    사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    word = 'Python'
    word[-1]
  exercise:
    prompt: 음수 인덱싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      word = 'Python'
      word[-1]
    hints:
    - 음수 인덱싱 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 음수 인덱싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: 음수 인덱싱에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_basic
  title: 슬라이싱 기초
  structuredPrimary: true
  subtitle: '[start:end]로 부분 문자열 추출'
  goal: 슬라이싱 기초에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: |-
    슬라이싱은 문자열의 일부분을 추출합니다. [start:end] 형태로 사용하며, start 인덱스부터 end-1 인덱스까지 가져옵니다. end 위치는 포함되지 않는다는 점에 주의해야 합니다.

    [0:6]은 인덱스 0부터 5까지, 총 6개의 문자를 가져옵니다.
  tips:
  - '[0:6]은 인덱스 0부터 5까지, 총 6개의 문자를 가져옵니다.'
  snippet: |-
    phrase = 'Python Programming'
    phrase[0:6]
  exercise:
    prompt: 슬라이싱 기초 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      phrase = 'Python Programming'
      phrase[0:6]
    hints:
    - 슬라이싱 기초 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 슬라이싱 기초 코드가 예외 없이 끝나야 합니다.
    resultCheck: 슬라이싱 기초에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_omit_start
  title: 시작 생략 슬라이싱
  structuredPrimary: true
  subtitle: '[:end]는 처음부터'
  goal: 시작 생략 슬라이싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 시작 인덱스를 생략하면 처음부터 추출합니다. [:end]는 [0:end]와 같은 의미입니다. 문자열의 앞부분을 가져올 때 편리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    msg = 'Hello World'
    msg[:5]
  exercise:
    prompt: 시작 생략 슬라이싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      msg = 'Hello World'
      msg[:5]
    hints:
    - 시작 생략 슬라이싱 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 시작 생략 슬라이싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: 시작 생략 슬라이싱에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_omit_end
  title: 끝 생략 슬라이싱
  structuredPrimary: true
  subtitle: '[start:]는 끝까지'
  goal: 끝 생략 슬라이싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 끝 인덱스를 생략하면 마지막까지 추출합니다. [start:]는 start 인덱스부터 문자열 끝까지 가져옵니다. 문자열의 뒷부분을 가져올 때 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    text = 'Hello World'
    text[6:]
  exercise:
    prompt: 끝 생략 슬라이싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = 'Hello World'
      text[6:]
    hints:
    - 끝 생략 슬라이싱 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 끝 생략 슬라이싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: 끝 생략 슬라이싱에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_both_omit
  title: 전체 슬라이싱
  structuredPrimary: true
  subtitle: '[:]는 전체 복사'
  goal: 전체 슬라이싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 시작과 끝을 모두 생략하면 전체 문자열을 복사합니다. [:]는 원본과 같은 내용의 새로운 문자열을 만듭니다. 문자열 전체를 복사할 때 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    source = 'Python'
    source[:]
  exercise:
    prompt: 전체 슬라이싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      source = 'Python'
      source[:]
    hints:
    - 전체 슬라이싱 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 전체 슬라이싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: 전체 슬라이싱에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_negative
  title: 음수 슬라이싱
  structuredPrimary: true
  subtitle: 음수 인덱스로 슬라이싱
  goal: 음수 슬라이싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 슬라이싱에서도 음수 인덱스를 사용할 수 있습니다. 뒤에서부터 계산하여 원하는 부분을 추출할 수 있습니다. [-5:-2]는 뒤에서 5번째부터 뒤에서 3번째까지입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    sentence = 'Python Programming'
    sentence[-11:-7]
  exercise:
    prompt: 음수 슬라이싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      sentence = 'Python Programming'
      sentence[-11:-7]
    hints:
    - 음수 슬라이싱 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 음수 슬라이싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: 음수 슬라이싱에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: slice_step
  title: 스텝 슬라이싱
  structuredPrimary: true
  subtitle: '[start:end:step]으로 간격 지정'
  goal: 스텝 슬라이싱에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 스텝을 지정하면 일정 간격으로 문자를 추출할 수 있습니다. [start:end:step] 형태로 사용하며, step은 간격을 의미합니다. [::2]는 처음부터
    끝까지 2칸씩 건너뛰며 추출합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    sample = 'Python Programming'
    sample[::2]
  exercise:
    prompt: 스텝 슬라이싱 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
