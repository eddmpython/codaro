- id: workflow_validation
  title: '검증 루프: 주문코드와 전화번호 파싱하기'
  structuredPrimary: true
  subtitle: 고정 형식 문자열을 잘라 업무 데이터로 바꾸기
  goal: '검증 루프: 주문코드와 전화번호 파싱하기에서 문법 요소 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 기초 문법은 나중에 자동화 스크립트의 입력과 결과를 안정적으로 다루는 기준이 됩니다.
  explanation: 인덱싱과 슬라이싱은 글자를 꺼내는 문법이 아니라, 주문코드·전화번호·파일명처럼 정해진 형식의 문자열을 데이터로 바꾸는 도구입니다. 특히 끝 인덱스가 포함되지
    않는 규칙 때문에 한 칸씩 밀리는 오류를 직접 확인해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    orderCode = 'ORD-2026-0007-KR'

    prefix = orderCode[:3]
    orderYear = orderCode[4:8]
    sequence = orderCode[9:13]
    country = orderCode[-2:]

    assert prefix == 'ORD'
    assert orderYear == '2026'
    assert sequence == '0007'
    assert country == 'KR'

    summary = f'{orderYear}년 주문 {sequence}번 ({country})'
    assert summary == '2026년 주문 0007번 (KR)'
    summary
  exercise:
    prompt: '검증 루프: 주문코드와 전화번호 파싱하기 예제에서 리스트 값을 바꿔 실행하고, 출력과 변수 상태 기준으로 달라진 결과를 확인하세요.'
    starterCode: |-
      fileName = 'sales_20260524.csv'
      datePart = fileName[6:14]
      year = datePart[:4]
      month = datePart[4:6]
      day = datePart[6:]

      assert datePart == '20260524'
      assert f'{year}-{month}-{day}' == '2026-05-24'
      f'{year}-{month}-{day}'
    hints:
    - '검증 루프: 주문코드와 전화번호 파싱하기 코드에서 먼저 리스트 값 위치를 찾으세요.'
    - 실행 후 출력과 변수 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: '검증 루프: 주문코드와 전화번호 파싱하기 코드가 예외 없이 끝나야 합니다.'
    resultCheck: '검증 루프: 주문코드와 전화번호 파싱하기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.'
