sections:
- id: list_intro
  title: 리스트란?
  structuredPrimary: true
  subtitle: 여러 값을 담는 상자
  goal: '리스트란?: 실행 가능한 Python 흐름으로 익힌다.'
  why: '리스트란?: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    리스트(List)는 여러 개의 값을 순서대로 담을 수 있는 자료구조입니다. 대괄호 []로 만들고, 쉼표로 값을 구분합니다. 숫자, 문자열, 불린 등 어떤 타입의 값도 담을 수 있습니다. 리스트는 순서가 있어서 첫 번째, 두 번째 같은 위치로 값에 접근할 수 있습니다.

    리스트는 프로그래밍에서 가장 많이 사용하는 자료구조 중 하나입니다.
  tips:
  - 리스트는 프로그래밍에서 가장 많이 사용하는 자료구조 중 하나입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    items = [1, 2, 3, 4, 5]
    items
  exercise:
    prompt: '리스트란?: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      items = [1, 2, 3, 4, 5]
      items
    solution: |-
      items = [1, 2, 3, 4, 5]
      items
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 리스트(List)는 여러 개의 값을 순서대로 담을 수 있는 자료구조입니다. 대괄호 []로 만들고, 쉼표로 값을 구분합니다. 숫자, 문자열, 불린 등 어떤 타입의 값도 담을 수 있습니다. 리스트는
      순서가 있어서 첫 번째, 두 번째 같은 위치로 값에 접근할 수 있습니다.
  - type: list
    items:
    - 대괄호 []로 생성
    - 여러 값을 쉼표로 구분
    - 순서가 있는 자료구조
    - 다양한 타입 저장 가능
  - type: code
    language: python
    title: 리스트 만들기
    description: 대괄호를 사용하여 리스트를 만듭니다.
    content: |-
      items = [1, 2, 3, 4, 5]
      items
  - type: tip
    content: 리스트는 프로그래밍에서 가장 많이 사용하는 자료구조 중 하나입니다.
- id: list_create
  title: 다양한 리스트 생성
  structuredPrimary: true
  subtitle: 타입 제한 없이 자유롭게
  goal: '다양한 리스트 생성: 실행 가능한 Python 흐름으로 익힌다.'
  why: '다양한 리스트 생성: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    리스트는 숫자만, 문자열만 담을 수도 있고, 여러 타입을 섞어서 담을 수도 있습니다. 빈 리스트도 만들 수 있습니다. 리스트 안에 리스트를 넣어 중첩 리스트도 만들 수 있습니다.

    빈 리스트는 나중에 값을 추가할 때 유용합니다.
  tips:
  - 빈 리스트는 나중에 값을 추가할 때 유용합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    nums = [10, 20, 30]
    nums
  exercise:
    prompt: '다양한 리스트 생성: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      nums = [10, 20, 30]
      nums
    solution: |-
      nums = [10, 20, 30]
      nums
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 리스트는 숫자만, 문자열만 담을 수도 있고, 여러 타입을 섞어서 담을 수도 있습니다. 빈 리스트도 만들 수 있습니다. 리스트 안에 리스트를 넣어 중첩 리스트도 만들 수 있습니다.
  - type: list
    items:
    - '숫자 리스트: [1, 2, 3]'
    - '문자열 리스트: [''a'', ''b'', ''c'']'
    - '혼합 리스트: [1, ''hello'', True]'
    - '빈 리스트: []'
  - type: code
    language: python
    title: 숫자 리스트
    description: 숫자만 담은 리스트를 만듭니다.
    content: |-
      nums = [10, 20, 30]
      nums
  - type: code
    language: python
    title: 문자열 리스트
    description: 문자열만 담은 리스트를 만듭니다.
    content: |-
      fruits = ['사과', '바나나', '오렌지']
      fruits
  - type: code
    language: python
    title: 혼합 리스트
    description: 여러 타입을 섞어서 리스트를 만듭니다.
    content: |-
      mixed = [1, 'hello', True, 3.14]
      mixed
  - type: code
    language: python
    title: 빈 리스트
    description: 빈 리스트를 만듭니다.
    content: |-
      empty = []
      empty
  - type: tip
    content: 빈 리스트는 나중에 값을 추가할 때 유용합니다.
- id: list_indexing
  title: 리스트 인덱싱
  structuredPrimary: true
  subtitle: 위치로 값 가져오기
  goal: '리스트 인덱싱: 실행 가능한 Python 흐름으로 익힌다.'
  why: '리스트 인덱싱: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    리스트의 각 요소는 인덱스(위치 번호)로 접근할 수 있습니다. 인덱스는 0부터 시작합니다. 첫 번째 요소는 [0], 두 번째는 [1], 세 번째는 [2]입니다. 리스트 이름 뒤에 대괄호를 쓰고 인덱스를 넣으면 그 위치의 값을 가져옵니다.

    리스트 길이보다 큰 인덱스를 사용하면 에러가 발생합니다.
  tips:
  - 리스트 길이보다 큰 인덱스를 사용하면 에러가 발생합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    basket = ['사과', '바나나', '오렌지', '포도']
    basket[0]
  exercise:
    prompt: '리스트 인덱싱: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      basket = ['사과', '바나나', '오렌지', '포도']
      basket[0]
    solution: |-
      basket = ['사과', '바나나', '오렌지', '포도']
      basket[0]
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 리스트의 각 요소는 인덱스(위치 번호)로 접근할 수 있습니다. 인덱스는 0부터 시작합니다. 첫 번째 요소는 [0], 두 번째는 [1], 세 번째는 [2]입니다. 리스트 이름 뒤에 대괄호를 쓰고 인덱스를
      넣으면 그 위치의 값을 가져옵니다.
  - type: list
    items:
    - 인덱스는 0부터 시작
    - list[0]은 첫 번째 요소
    - list[1]은 두 번째 요소
    - 대괄호 안에 인덱스 작성
  - type: code
    language: python
    title: 첫 번째 요소
    description: 인덱스 0으로 첫 번째 요소에 접근합니다.
    content: |-
      basket = ['사과', '바나나', '오렌지', '포도']
      basket[0]
  - type: code
    language: python
    title: 두 번째 요소
    description: 인덱스 1로 두 번째 요소에 접근합니다.
    content: |-
      produce = ['사과', '바나나', '오렌지', '포도']
      produce[1]
  - type: code
    language: python
    title: 세 번째 요소
    description: 인덱스 2로 세 번째 요소에 접근합니다.
    content: |-
      snacks = ['사과', '바나나', '오렌지', '포도']
      snacks[2]
  - type: tip
    content: 리스트 길이보다 큰 인덱스를 사용하면 에러가 발생합니다.
- id: list_negative
  title: 음수 인덱싱
  structuredPrimary: true
  subtitle: 뒤에서부터 접근하기
  goal: '음수 인덱싱: 실행 가능한 Python 흐름으로 익힌다.'
  why: '음수 인덱싱: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    음수 인덱스를 사용하면 리스트의 뒤에서부터 접근할 수 있습니다. -1은 마지막 요소, -2는 뒤에서 두 번째 요소, -3은 뒤에서 세 번째 요소입니다. 리스트가 길 때 마지막 요소에 접근하는 간편한 방법입니다.

    리스트 길이를 몰라도 [-1]로 마지막 요소에 접근할 수 있습니다.
  tips:
  - 리스트 길이를 몰라도 [-1]로 마지막 요소에 접근할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    values = [10, 20, 30, 40, 50]
    values[-1]
  exercise:
    prompt: '음수 인덱싱: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      values = [10, 20, 30, 40, 50]
      values[-1]
    solution: |-
      values = [10, 20, 30, 40, 50]
      values[-1]
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 음수 인덱스를 사용하면 리스트의 뒤에서부터 접근할 수 있습니다. -1은 마지막 요소, -2는 뒤에서 두 번째 요소, -3은 뒤에서 세 번째 요소입니다. 리스트가 길 때 마지막 요소에 접근하는 간편한
      방법입니다.
  - type: list
    items:
    - 음수 인덱스는 뒤에서부터 접근
    - list[-1]은 마지막 요소
    - list[-2]는 뒤에서 두 번째
    - 긴 리스트에서 유용
  - type: code
    language: python
    title: 마지막 요소
    description: 음수 인덱스 -1로 마지막 요소에 접근합니다.
    content: |-
      values = [10, 20, 30, 40, 50]
      values[-1]
  - type: code
    language: python
    title: 뒤에서 두 번째
    description: 음수 인덱스 -2로 뒤에서 두 번째 요소에 접근합니다.
    content: |-
      digits = [10, 20, 30, 40, 50]
      digits[-2]
  - type: code
    language: python
    title: 뒤에서 세 번째
    description: 음수 인덱스 -3으로 뒤에서 세 번째 요소에 접근합니다.
    content: |-
      counts = [10, 20, 30, 40, 50]
      counts[-3]
  - type: tip
    content: 리스트 길이를 몰라도 [-1]로 마지막 요소에 접근할 수 있습니다.
- id: list_slicing
  title: 리스트 슬라이싱
  structuredPrimary: true
  subtitle: 범위로 잘라내기
  goal: '리스트 슬라이싱: 실행 가능한 Python 흐름으로 익힌다.'
  why: '리스트 슬라이싱: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    슬라이싱은 리스트의 일부분을 잘라내어 새 리스트를 만듭니다. [시작:끝] 형식으로 사용하며, 시작 인덱스부터 끝 인덱스 직전까지 가져옵니다. 시작을 생략하면 처음부터, 끝을 생략하면 끝까지 가져옵니다.

    슬라이싱은 원본 리스트를 변경하지 않고 새 리스트를 만듭니다.
  tips:
  - 슬라이싱은 원본 리스트를 변경하지 않고 새 리스트를 만듭니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    rainbow = ['빨강', '주황', '노랑', '초록', '파랑', '남색', '보라']
    rainbow[:3]
  exercise:
    prompt: '리스트 슬라이싱: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      rainbow = ['빨강', '주황', '노랑', '초록', '파랑', '남색', '보라']
      rainbow[:3]
    solution: |-
      rainbow = ['빨강', '주황', '노랑', '초록', '파랑', '남색', '보라']
      rainbow[:3]
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
