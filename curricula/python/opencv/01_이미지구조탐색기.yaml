      roi = img[centerY-100:centerY+100, centerX-150:centerX+150]
      plt.figure(figsize=(6, 4))
      plt.imshow(roi)
      plt.title(f'ROI: {roi.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_draw
  title: 7단계. 기본 그리기
  structuredPrimary: true
  subtitle: 도형과 텍스트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    OpenCV의 그리기 함수들은 이미지를 직접 수정합니다. 복사본을 만들어서 작업하는 것이 좋습니다. BGR 색상을 사용해야 합니다.

    색상은 BGR 순서로 (B, G, R)입니다. (0, 255, 0)은 녹색, (0, 0, 255)는 빨강입니다. 두께 -1은 채우기를 의미합니다.
  tips:
  - 색상은 BGR 순서로 (B, G, R)입니다. (0, 255, 0)은 녹색, (0, 0, 255)는 빨강입니다. 두께 -1은 채우기를 의미합니다.
  snippet: |-
    canvas = bgr.copy()
