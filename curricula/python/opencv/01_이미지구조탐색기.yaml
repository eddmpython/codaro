- id: workflow_validation
  title: 8단계. 이미지 구조 검증 루프
  structuredPrimary: true
  subtitle: shape, dtype, 채널 순서 확인
  goal: 8단계. 이미지 구조 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 이미지 구조를 배울 때는 shape를 출력하는 데서 멈추지 말고, 업무 입력이 정말 BGR uint8 3채널인지 검증해야 합니다. 잘못된 흑백 입력을 일부러
    넣고 실패를 확인한 뒤, 채널 통계와 crop 결과를 assert로 점검합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    structureImage = np.zeros((80, 120, 3), dtype=np.uint8)
    structureImage[:, :40] = [255, 0, 0]
    structureImage[:, 40:80] = [0, 255, 0]
    structureImage[:, 80:] = [0, 0, 255]

    def validateStructureImage(image):
        if image.ndim != 3 or image.shape[2] != 3:
            raise ValueError(f"3채널 BGR 이미지가 아닙니다: {image.shape}")
        if image.dtype != np.uint8:
            raise ValueError(f"uint8 이미지가 아닙니다: {image.dtype}")
        return True

    validateStructureImage(structureImage)
  exercise:
    prompt: 8단계. 이미지 구조 검증 루프 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np

      structureImage = np.zeros((80, 120, 3), dtype=np.uint8)
      structureImage[:, :40] = [255, 0, 0]
      structureImage[:, 40:80] = [0, 255, 0]
      structureImage[:, 80:] = [0, 0, 255]

      def validateStructureImage(image):
          if image.ndim != 3 or image.shape[2] != 3:
              raise ValueError(f"3채널 BGR 이미지가 아닙니다: {image.shape}")
          if image.dtype != np.uint8:
              raise ValueError(f"uint8 이미지가 아닙니다: {image.dtype}")
          return True

      validateStructureImage(structureImage)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 8단계. 이미지 구조 검증 루프의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 8단계. 이미지 구조 검증 루프 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
