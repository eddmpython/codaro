sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 이미지를 OpenCV로
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    sklearn의 샘플 이미지는 RGB 순서의 NumPy 배열입니다. OpenCV는 BGR 순서를 사용하므로, 두 형식 간 변환을 이해하는 것이 중요합니다. 먼저 이미지를 로드하고 구조를 살펴봅시다.

    load_sample_image()는 NumPy ndarray를 반환합니다. 이 배열은 RGB 순서입니다. OpenCV 함수들은 BGR 순서를 기대하므로 변환이 필요합니다.
  tips:
  - load_sample_image()는 NumPy ndarray를 반환합니다. 이 배열은 RGB 순서입니다. OpenCV 함수들은 BGR 순서를 기대하므로 변환이 필요합니다.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    img = load_sample_image('flower.jpg')
    plt.figure(figsize=(8, 6))
    plt.imshow(img)
    plt.title(f'Flower Image: {type(img).__name__}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      img = load_sample_image('flower.jpg')
      plt.figure(figsize=(8, 6))
      plt.imshow(img)
      plt.title(f'Flower Image: {type(img).__name__}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 이미지 불러오기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 이미지 불러오기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_shape
  title: 2단계. 이미지 shape 확인
  structuredPrimary: true
  subtitle: 높이, 너비, 채널
  goal: 2단계. 이미지 shape 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    NumPy 배열의 shape은 이미지의 구조를 알려줍니다. (높이, 너비, 채널) 순서로, 채널이 3이면 컬러, 2차원이면 흑백입니다. 주의할 점은 높이가 먼저 온다는 것입니다.

    shape은 (높이, 너비, 채널) 순서입니다. (427, 640, 3)이면 세로 427픽셀, 가로 640픽셀, 3채널(RGB 또는 BGR)입니다. Pillow의 size는 (너비, 높이)로 순서가 반대입니다.
  tips:
  - shape은 (높이, 너비, 채널) 순서입니다. (427, 640, 3)이면 세로 427픽셀, 가로 640픽셀, 3채널(RGB 또는 BGR)입니다. Pillow의 size는 (너비,
    높이)로 순서가 반대입니다.
  snippet: |-
    height, width, channels = img.shape
    f"높이: {height}px, 너비: {width}px, 채널: {channels}"
  exercise:
    prompt: 2단계. 이미지 shape 확인 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      height, width, channels = img.shape
      f"높이: {height}px, 너비: {width}px, 채널: {channels}"
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 2단계. 이미지 shape 확인의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 이미지 shape 확인 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_dtype
  title: 3단계. 데이터 타입 확인
  structuredPrimary: true
  subtitle: dtype과 값 범위
  goal: 3단계. 데이터 타입 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    이미지 배열의 dtype(data type)은 보통 uint8입니다. uint8은 unsigned integer 8-bit의 약자로, 부호 없는 8비트 정수를 의미합니다. 8비트는 2^8 = 256가지 값(0~255)을 표현할 수 있어 픽셀 밝기를 저장하기에 적합합니다. 0은 완전한 검정, 255는 완전한 흰색(또는 해당 채널의 최대 강도)입니다.

    uint8은 unsigned 8-bit integer로 0-255 범위입니다. 일부 연산은 float32(0.0-1.0)를 사용하기도 합니다. dtype을 확인하고 필요시 변환해야 합니다.
  tips:
  - uint8은 unsigned 8-bit integer로 0-255 범위입니다. 일부 연산은 float32(0.0-1.0)를 사용하기도 합니다. dtype을 확인하고 필요시 변환해야
    합니다.
  snippet: img.dtype
  exercise:
    prompt: 3단계. 데이터 타입 확인 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: img.dtype
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 3단계. 데이터 타입 확인의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 데이터 타입 확인 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_bgr
  title: 4단계. BGR vs RGB
  structuredPrimary: true
  subtitle: 색순서 이해하기
  goal: 4단계. BGR vs RGB에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    OpenCV는 역사적 이유로 BGR(Blue-Green-Red) 순서를 사용합니다. 초기 카메라 하드웨어가 이 순서를 사용했기 때문입니다. 반면 sklearn, matplotlib, Pillow 등 대부분의 라이브러리는 RGB(Red-Green-Blue) 순서를 사용합니다. cvtColor()(convert color의 약자) 함수로 색상 순서를 변환합니다. 변환 없이 출력하면 빨강과 파랑이 뒤바뀌어 이상한 색으로 보입니다.

    cv2.COLOR_RGB2BGR는 RGB를 BGR로 변환합니다. 반대는 cv2.COLOR_BGR2RGB입니다. OpenCV 함수에 전달할 때는 BGR, matplotlib으로 출력할 때는 RGB를 사용합니다.
  tips:
  - cv2.COLOR_RGB2BGR는 RGB를 BGR로 변환합니다. 반대는 cv2.COLOR_BGR2RGB입니다. OpenCV 함수에 전달할 때는 BGR, matplotlib으로
    출력할 때는 RGB를 사용합니다.
  snippet: |-
    plt.figure(figsize=(8, 6))
    plt.imshow(img)
    plt.title('RGB (Original)')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. BGR vs RGB 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      plt.figure(figsize=(8, 6))
      plt.imshow(img)
      plt.title('RGB (Original)')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 4단계. BGR vs RGB의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 4단계. BGR vs RGB 실행 결과가 출력과 상태 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step5_pixel
  title: 5단계. 픽셀 접근
  structuredPrimary: true
  subtitle: 배열 인덱싱
  goal: 5단계. 픽셀 접근에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    NumPy 배열이므로 인덱싱으로 특정 픽셀에 접근할 수 있습니다. img[y, x]로 (x, y) 위치의 픽셀 값을 얻습니다. 주의할 점은 y(행)가 먼저 온다는 것입니다.

    img[y, x]에서 y는 행(세로 위치), x는 열(가로 위치)입니다. 반환되는 값은 [R, G, B] 또는 [B, G, R] 배열로, 이미지의 색순서에 따라 다릅니다.
  tips:
  - img[y, x]에서 y는 행(세로 위치), x는 열(가로 위치)입니다. 반환되는 값은 [R, G, B] 또는 [B, G, R] 배열로, 이미지의 색순서에 따라 다릅니다.
  snippet: |-
    pixel = img[100, 200]
    pixel
  exercise:
    prompt: 5단계. 픽셀 접근 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      pixel = img[100, 200]
      pixel
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 5단계. 픽셀 접근의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 픽셀 접근 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step6_slice
  title: 6단계. 영역 슬라이싱
  structuredPrimary: true
  subtitle: 이미지 일부 추출
  goal: 6단계. 영역 슬라이싱에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    NumPy 슬라이싱으로 이미지의 일부 영역을 추출할 수 있습니다. img[y1:y2, x1:x2]로 사각형 영역을 잘라냅니다. 이렇게 추출한 관심 영역을 ROI(Region of Interest)라고 부릅니다. ROI는 얼굴 인식에서 얼굴 영역, 문서 스캔에서 문서 영역처럼 분석하고자 하는 특정 부분을 의미합니다.

    ROI는 Region of Interest의 약자로 관심 영역을 의미합니다. 슬라이싱은 복사가 아닌 뷰를 반환하므로, 원본을 보존하려면 .copy()를 사용하세요.
  tips:
  - ROI는 Region of Interest의 약자로 관심 영역을 의미합니다. 슬라이싱은 복사가 아닌 뷰를 반환하므로, 원본을 보존하려면 .copy()를 사용하세요.
  snippet: |-
    centerY = height // 2
    centerX = width // 2
    roi = img[centerY-100:centerY+100, centerX-150:centerX+150]
    plt.figure(figsize=(6, 4))
    plt.imshow(roi)
    plt.title(f'ROI: {roi.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 6단계. 영역 슬라이싱 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      centerY = height // 2
      centerX = width // 2
      roi = img[centerY-100:centerY+100, centerX-150:centerX+150]
      plt.figure(figsize=(6, 4))
      plt.imshow(roi)
      plt.title(f'ROI: {roi.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 6단계. 영역 슬라이싱의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 6단계. 영역 슬라이싱 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step7_draw
  title: 7단계. 기본 그리기
  structuredPrimary: true
  subtitle: 도형과 텍스트
