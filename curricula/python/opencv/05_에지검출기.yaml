- id: step2_canny
  title: 2단계. Canny 에지 검출
  structuredPrimary: true
  subtitle: Canny()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Canny()는 1986년 John Canny가 개발한 다단계 에지 검출 알고리즘입니다. 노이즈 제거(가우시안 블러), 그래디언트 계산(Sobel), 비최대 억제(non-maximum suppression, 에지를 얇게 만듦), 이중 임계값(hysteresis thresholding) 단계를 거칩니다. 두 개의 임계값(threshold1, threshold2)으로 에지를 결정하는데, threshold2 이상은 강한 에지, threshold1 미만은 에지 아님, 그 사이는 강한 에지와 연결된 경우에만 에지로 판단합니다.

    Canny(image, threshold1, threshold2)에서 threshold1은 약한 에지 기준, threshold2는 강한 에지 기준입니다. threshold1 미만은 에지 아님, threshold2 이상은 확실한 에지입니다.
  tips:
  - Canny(image, threshold1, threshold2)에서 threshold1은 약한 에지 기준, threshold2는 강한 에지 기준입니다. threshold1 미만은 에지 아님, threshold2 이상은 확실한 에지입니다.
  snippet: |-
    canny = cv2.Canny(gray, 50, 150)
    plt.figure(figsize=(10, 6))
    plt.imshow(canny, cmap='gray')
    plt.title('Canny (50, 150)')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      canny = cv2.Canny(gray, 50, 150)
      plt.figure(figsize=(10, 6))
      plt.imshow(canny, cmap='gray')
      plt.title('Canny (50, 150)')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_sobel
  title: 3단계. Sobel 에지 검출
  structuredPrimary: true
  subtitle: Sobel()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Sobel()은 그래디언트(gradient, 기울기) 기반 에지 검출입니다. 그래디언트란 밝기가 변하는 방향과 크기를 나타내는 벡터입니다. Sobel은 x방향(수평)과 y방향(수직)의 1차 미분을 각각 계산합니다. x방향 미분은 수직 에지(좌우 밝기 차이)를, y방향 미분은 수평 에지(상하 밝기 차이)를 검출합니다. 두 결과를 합성하면 모든 방향의 에지를 얻을 수 있습니다.

    cv2.CV_64F는 64비트 부동소수점입니다. 미분 결과가 음수일 수 있어 CV_64F를 사용합니다. convertScaleAbs()로 절댓값을 취해 uint8로 변환합니다.
  tips:
  - cv2.CV_64F는 64비트 부동소수점입니다. 미분 결과가 음수일 수 있어 CV_64F를 사용합니다. convertScaleAbs()로 절댓값을 취해 uint8로 변환합니다.
  snippet: |-
    sobelX = cv2.Sobel(gray, cv2.CV_64F, 1, 0, ksize=3)
    sobelXAbs = cv2.convertScaleAbs(sobelX)
    plt.figure(figsize=(10, 6))
    plt.imshow(sobelXAbs, cmap='gray')
    plt.title('Sobel X (Vertical Edges)')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      sobelX = cv2.Sobel(gray, cv2.CV_64F, 1, 0, ksize=3)
      sobelXAbs = cv2.convertScaleAbs(sobelX)
      plt.figure(figsize=(10, 6))
      plt.imshow(sobelXAbs, cmap='gray')
      plt.title('Sobel X (Vertical Edges)')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_laplacian
  title: 4단계. Laplacian 에지 검출
  structuredPrimary: true
  subtitle: Laplacian()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Laplacian()은 라플라시안(Laplacian) 연산자로 2차 미분을 사용합니다. 1차 미분(Sobel)이 밝기 변화의 기울기를 측정한다면, 2차 미분은 기울기의 변화율, 즉 밝기 변화가 얼마나 급격한지를 측정합니다. x와 y 방향을 동시에 계산하여 모든 방향의 에지를 한 번에 검출합니다. 다만 2차 미분은 노이즈에 매우 민감하므로, 가우시안 블러로 노이즈를 줄인 후 적용하는 것이 일반적입니다. 이를 LoG(Laplacian of Gaussian)라고 합니다.

    Laplacian은 노이즈에 민감합니다. GaussianBlur로 노이즈를 줄인 후 적용하면 깔끔한 에지를 얻을 수 있습니다. 이를 LoG(Laplacian of Gaussian)라고 합니다.
  tips:
  - Laplacian은 노이즈에 민감합니다. GaussianBlur로 노이즈를 줄인 후 적용하면 깔끔한 에지를 얻을 수 있습니다. 이를 LoG(Laplacian of Gaussian)라고 합니다.
  snippet: |-
    laplacian = cv2.Laplacian(gray, cv2.CV_64F)
    laplacianAbs = cv2.convertScaleAbs(laplacian)
    plt.figure(figsize=(10, 6))
    plt.imshow(laplacianAbs, cmap='gray')
    plt.title('Laplacian')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      laplacian = cv2.Laplacian(gray, cv2.CV_64F)
      laplacianAbs = cv2.convertScaleAbs(laplacian)
      plt.figure(figsize=(10, 6))
      plt.imshow(laplacianAbs, cmap='gray')
      plt.title('Laplacian')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
