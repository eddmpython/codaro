- id: workflow_validation
  title: 7단계. 에지 검출 검증 루프
  structuredPrimary: true
  subtitle: 임계값과 에지 픽셀 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 에지 검출은 선이 보이는지보다 필요한 경계가 충분히 잡히는지를 검증해야 합니다. Canny 임계값 순서를 확인하고, 검출된 에지 픽셀 수로 결과를 평가합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    edgeImage = np.zeros((120, 160), dtype=np.uint8)
    cv2.rectangle(edgeImage, (30, 25), (130, 95), 255, -1)
    cv2.line(edgeImage, (35, 30), (125, 90), 0, 4)

    def validateCannyThresholds(low, high):
        if low <= 0 or high <= 0 or low >= high:
            raise ValueError(f"Canny 임계값 순서 오류: low={low}, high={high}")
        return True

    validateCannyThresholds(50, 150)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
      import numpy as np

      edgeImage = np.zeros((120, 160), dtype=np.uint8)
      cv2.rectangle(edgeImage, (30, 25), (130, 95), 255, -1)
      cv2.line(edgeImage, (35, 30), (125, 90), 0, 4)

      def validateCannyThresholds(low, high):
          if low <= 0 or high <= 0 or low >= high:
              raise ValueError(f"Canny 임계값 순서 오류: low={low}, high={high}")
          return True

      validateCannyThresholds(50, 150)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
