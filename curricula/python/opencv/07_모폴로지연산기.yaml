  - type: text
    content: 모폴로지 연산 효과를 명확하게 보기 위해 도형이 있는 합성 이미지를 생성합니다. 노이즈도 추가하여 제거 효과를 확인합니다.
  - type: code
    language: python
    title: 라이브러리와 기본 이미지
    description: 검은 배경에 흰색 도형을 그립니다
    content: |-
      import cv2
      import numpy as np
      import matplotlib.pyplot as plt

      base = np.zeros((300, 400), dtype=np.uint8)
      cv2.rectangle(base, (50, 50), (150, 150), 255, -1)
      cv2.circle(base, (280, 100), 60, 255, -1)
      cv2.rectangle(base, (100, 180), (300, 250), 255, -1)
      plt.figure(figsize=(8, 6))
      plt.imshow(base, cmap='gray')
      plt.title('Base Image')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 노이즈 추가
    description: salt-and-pepper 노이즈를 추가합니다
    content: |-
      noisy = base.copy()
      noise = np.random.random(base.shape)
      noisy[noise < 0.02] = 255
      noisy[noise > 0.98] = 0
      plt.figure(figsize=(8, 6))
      plt.imshow(noisy, cmap='gray')
      plt.title('Noisy Image')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 기본 이미지 출력
    description: 원본과 노이즈 이미지입니다
    content: |-
      figBase, axBase = plt.subplots(1, 2, figsize=(10, 4))
      axBase[0].imshow(base, cmap='gray')
      axBase[0].set_title('Original')
      axBase[0].axis('off')
      axBase[1].imshow(noisy, cmap='gray')
      axBase[1].set_title('Noisy')
      axBase[1].axis('off')
      plt.tight_layout()
- id: step2_kernel
  title: 2단계. 구조 요소
  structuredPrimary: true
  subtitle: getStructuringElement()
  goal: '2단계. 구조 요소: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 구조 요소: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    모폴로지 연산에는 커널(kernel) 또는 구조 요소(structuring element)가 필요합니다. 구조 요소는 연산이 적용되는 이웃 픽셀의 패턴을 정의합니다. 사각형, 타원형, 십자형 등 다양한 모양이 있으며, 크기와 모양에 따라 연산 결과가 달라집니다.

    MORPH_RECT는 사각형, MORPH_ELLIPSE는 타원형, MORPH_CROSS는 십자 모양입니다. 커널이 클수록 효과가 강해지지만 디테일이 손실됩니다.
  tips:
  - MORPH_RECT는 사각형, MORPH_ELLIPSE는 타원형, MORPH_CROSS는 십자 모양입니다. 커널이 클수록 효과가 강해지지만 디테일이 손실됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
    kernelSmall
  exercise:
    prompt: '2단계. 구조 요소: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
      kernelSmall
    solution: |-
      kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
      kernelSmall
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 모폴로지 연산에는 커널(kernel) 또는 구조 요소(structuring element)가 필요합니다. 구조 요소는 연산이 적용되는 이웃 픽셀의 패턴을 정의합니다. 사각형, 타원형, 십자형 등
      다양한 모양이 있으며, 크기와 모양에 따라 연산 결과가 달라집니다.
  - type: code
    language: python
    title: 사각형 커널
    description: 3x3 사각형 구조 요소입니다
    content: |-
      kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
      kernelSmall
  - type: code
    language: python
    title: 다양한 커널
    description: 여러 크기와 모양을 생성합니다
    content: |-
      kernelRect = cv2.getStructuringElement(cv2.MORPH_RECT, (5, 5))
      kernelEllipse = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
      kernelCross = cv2.getStructuringElement(cv2.MORPH_CROSS, (5, 5))
      figKern, axKern = plt.subplots(1, 3, figsize=(9, 3))
      axKern[0].imshow(kernelRect, cmap='gray')
      axKern[0].set_title('RECT')
      axKern[0].axis('off')
      axKern[1].imshow(kernelEllipse, cmap='gray')
      axKern[1].set_title('ELLIPSE')
      axKern[1].axis('off')
      axKern[2].imshow(kernelCross, cmap='gray')
      axKern[2].set_title('CROSS')
      axKern[2].axis('off')
      plt.tight_layout()
  - type: tip
    content: MORPH_RECT는 사각형, MORPH_ELLIPSE는 타원형, MORPH_CROSS는 십자 모양입니다. 커널이 클수록 효과가 강해지지만 디테일이 손실됩니다.
- id: step3_erode
  title: 3단계. 침식 연산
  structuredPrimary: true
  subtitle: erode()
  goal: '3단계. 침식 연산: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 침식 연산: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    erode()는 침식(erosion) 연산으로, 커널 영역 내 최소값으로 중심 픽셀을 대체합니다. 이진 이미지에서 커널 범위 안에 검은 픽셀(0)이 하나라도 있으면 중심이 검은색이 됩니다. 결과적으로 흰색 영역(전경)이 깎여나가며, 객체 경계가 안쪽으로 수축합니다. 작은 흰색 노이즈 제거나 붙어있는 객체 분리에 사용됩니다.

    iterations=2는 침식을 2번 반복합니다. 반복할수록 흰색 영역이 더 많이 축소됩니다. 큰 커널과 적은 반복 또는 작은 커널과 많은 반복을 선택할 수 있습니다.
  tips:
  - iterations=2는 침식을 2번 반복합니다. 반복할수록 흰색 영역이 더 많이 축소됩니다. 큰 커널과 적은 반복 또는 작은 커널과 많은 반복을 선택할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    eroded = cv2.erode(noisy, kernelSmall, iterations=1)
    plt.figure(figsize=(8, 6))
    plt.imshow(eroded, cmap='gray')
    plt.title('Eroded')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: '3단계. 침식 연산: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      eroded = cv2.erode(noisy, kernelSmall, iterations=1)
      plt.figure(figsize=(8, 6))
      plt.imshow(eroded, cmap='gray')
      plt.title('Eroded')
      plt.axis('off')
      plt.tight_layout()
    solution: |-
      eroded = cv2.erode(noisy, kernelSmall, iterations=1)
      plt.figure(figsize=(8, 6))
      plt.imshow(eroded, cmap='gray')
      plt.title('Eroded')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: erode()는 침식(erosion) 연산으로, 커널 영역 내 최소값으로 중심 픽셀을 대체합니다. 이진 이미지에서 커널 범위 안에 검은 픽셀(0)이 하나라도 있으면 중심이 검은색이 됩니다. 결과적으로
      흰색 영역(전경)이 깎여나가며, 객체 경계가 안쪽으로 수축합니다. 작은 흰색 노이즈 제거나 붙어있는 객체 분리에 사용됩니다.
  - type: code
    language: python
    title: 침식 적용
    description: 흰색 영역이 줄어듭니다
    content: |-
      eroded = cv2.erode(noisy, kernelSmall, iterations=1)
      plt.figure(figsize=(8, 6))
      plt.imshow(eroded, cmap='gray')
      plt.title('Eroded')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 반복 침식
    description: iterations로 반복 횟수를 지정합니다
    content: |-
      erodedTwice = cv2.erode(noisy, kernelSmall, iterations=2)
      erodedThrice = cv2.erode(noisy, kernelSmall, iterations=3)
      figEr, axEr = plt.subplots(1, 2, figsize=(10, 4))
      axEr[0].imshow(erodedTwice, cmap='gray')
      axEr[0].set_title('Erode x2')
      axEr[0].axis('off')
      axEr[1].imshow(erodedThrice, cmap='gray')
      axEr[1].set_title('Erode x3')
      axEr[1].axis('off')
      plt.tight_layout()
  - type: tip
    content: iterations=2는 침식을 2번 반복합니다. 반복할수록 흰색 영역이 더 많이 축소됩니다. 큰 커널과 적은 반복 또는 작은 커널과 많은 반복을 선택할 수 있습니다.
  - type: code
    language: python
    title: 침식 비교
    description: 반복 횟수에 따른 차이입니다
    content: |-
      figErode, axErode = plt.subplots(1, 4, figsize=(14, 4))
      axErode[0].imshow(noisy, cmap='gray')
      axErode[0].set_title('Noisy')
      axErode[0].axis('off')
      axErode[1].imshow(eroded, cmap='gray')
      axErode[1].set_title('Erode x1')
      axErode[1].axis('off')
      axErode[2].imshow(erodedTwice, cmap='gray')
      axErode[2].set_title('Erode x2')
      axErode[2].axis('off')
      axErode[3].imshow(erodedThrice, cmap='gray')
      axErode[3].set_title('Erode x3')
      axErode[3].axis('off')
      plt.tight_layout()
