          return np.ones((size, size), dtype=np.uint8)

      morphKernel = makeMorphKernel(5)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
