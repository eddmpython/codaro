      title: 모폴로지 적용
      content: |-
        krnl = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
        flowerOpen = cv2.morphologyEx(flowerBin, cv2.MORPH_OPEN, krnl)
        flowerClean = cv2.morphologyEx(flowerOpen, cv2.MORPH_CLOSE, krnl)
