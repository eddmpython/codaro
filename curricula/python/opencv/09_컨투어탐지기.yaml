      identified = board.copy()
      for cnt in contours:
          eps = 0.04 * cv2.arcLength(cnt, True)
          approxShape = cv2.approxPolyDP(cnt, eps, True)
          vertices = len(approxShape)
          momId = cv2.moments(cnt)
          if momId['m00'] != 0:
              idX = int(momId['m10'] / momId['m00'])
              idY = int(momId['m01'] / momId['m00'])
              if vertices == 3:
                  label = 'Tri'
              elif vertices == 4:
                  label = 'Rect'
              elif vertices == 5:
                  label = 'Pent'
              elif vertices > 6:
                  label = 'Circle'
              else:
                  label = str(vertices)
              cv2.putText(identified, label, (idX - 20, idY), cv2.FONT_HERSHEY_SIMPLEX, 0.6, (0, 255, 0), 2)
      plt.figure(figsize=(10, 6))
      plt.imshow(cv2.cvtColor(identified, cv2.COLOR_BGR2RGB))
      plt.title('Shape Identification')
      plt.axis('off')
      plt.tight_layout()
