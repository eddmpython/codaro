- id: step2_find
  title: 2단계. 컨투어 검출
  structuredPrimary: true
  subtitle: findContours()
  goal: '2단계. 컨투어 검출: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 컨투어 검출: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    findContours()는 이진 이미지에서 컨투어(윤곽선)를 검출합니다. 흰색(255) 영역과 검은색(0) 영역의 경계를 찾아 점들의 좌표 리스트로 반환합니다. 입력은 반드시 이진 이미지여야 하므로, 그레이스케일 변환 후 threshold나 Canny로 이진화합니다. 검출 모드(RETR_*)와 근사 방법(CHAIN_APPROX_*)에 따라 결과가 달라집니다.

    findContours()는 (contours, hierarchy)를 반환합니다. RETR_EXTERNAL은 외곽 컨투어만 검출합니다. CHAIN_APPROX_SIMPLE은 직선 부분의 끝점만 저장하여 메모리를 절약합니다.
  tips:
  - findContours()는 (contours, hierarchy)를 반환합니다. RETR_EXTERNAL은 외곽 컨투어만 검출합니다. CHAIN_APPROX_SIMPLE은 직선 부분의 끝점만 저장하여 메모리를
    절약합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
    ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
    plt.figure(figsize=(10, 6))
    plt.imshow(thresh, cmap='gray')
    plt.title('Binary Threshold')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: '2단계. 컨투어 검출: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
      ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
      plt.figure(figsize=(10, 6))
      plt.imshow(thresh, cmap='gray')
      plt.title('Binary Threshold')
      plt.axis('off')
      plt.tight_layout()
    solution: |-
      gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
      ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
      plt.figure(figsize=(10, 6))
      plt.imshow(thresh, cmap='gray')
      plt.title('Binary Threshold')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: findContours()는 이진 이미지에서 컨투어(윤곽선)를 검출합니다. 흰색(255) 영역과 검은색(0) 영역의 경계를 찾아 점들의 좌표 리스트로 반환합니다. 입력은 반드시 이진 이미지여야 하므로,
      그레이스케일 변환 후 threshold나 Canny로 이진화합니다. 검출 모드(RETR_*)와 근사 방법(CHAIN_APPROX_*)에 따라 결과가 달라집니다.
  - type: code
    language: python
    title: 이진화
    description: 컨투어 검출을 위해 이진화합니다
    content: |-
      gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
      ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
      plt.figure(figsize=(10, 6))
      plt.imshow(thresh, cmap='gray')
      plt.title('Binary Threshold')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 컨투어 검출
    description: findContours로 윤곽을 찾습니다
    content: |-
      contours, hierarchy = cv2.findContours(thresh, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
      len(contours)
  - type: tip
    content: findContours()는 (contours, hierarchy)를 반환합니다. RETR_EXTERNAL은 외곽 컨투어만 검출합니다. CHAIN_APPROX_SIMPLE은 직선 부분의 끝점만 저장하여
      메모리를 절약합니다.
  - type: code
    language: python
    title: 컨투어 정보
    description: 각 컨투어의 점 개수를 확인합니다
    content: |-
      cntInfo = [(i, len(cnt)) for i, cnt in enumerate(contours)]
      cntInfo
