intro:
  emoji: 🔍
  goal: findContours로 객체 윤곽을 검출하고 drawContours로 시각화합니다.
  description: 컨투어(contour)는 같은 색상이나 밝기를 가진 연속된 점들을 연결한 곡선으로, 객체의 윤곽선입니다. 객체 감지, 형태 분석, 면적 계산에 활용됩니다.
  direction: 컨투어탐지기에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 이미지 배열과 픽셀 값 확인 후 색공간/필터/검출 처리에 맞는 코드 입력을 고릅니다.
  - 컨투어탐지기 결과를 shape, dtype, 채널, 검출 개수 기준으로 즉시 점검합니다.
  - 완료한 코드를 비전 처리 파이프라인에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 테스트 이미지 생성 입력 확인
      detail: 입력 기준(이미지 배열과 픽셀 값)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 컨투어 검출 처리 실행
      detail: 색공간/필터/검출 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 컨투어 그리기 결과 검증
      detail: shape, dtype, 채널, 검출 개수 기준으로 실행 결과를 비교합니다.
    - label: 컨투어탐지기 재사용
      detail: 완성 코드를 비전 처리 파이프라인에 붙일 수 있게 정리합니다.
    runtime:
    - label: 컴퓨터 비전 환경
      detail: matplotlib, numpy, opencvpython, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 컨투어탐지기 실행
      detail: 셀을 실행해 shape, dtype, 채널, 검출 개수와 예외 상태를 확인합니다.
    - label: 컨투어탐지기 완료
      detail: 검증된 코드를 비전 처리 파이프라인로 남깁니다.
sections:
- id: step1_create
  title: 1단계. 테스트 이미지 생성
  structuredPrimary: true
  subtitle: 도형이 있는 이미지
  goal: 1단계. 테스트 이미지 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 컨투어 검출을 위한 테스트 이미지를 생성합니다. 여러 도형을 그려 다양한 컨투어를 검출해봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    import matplotlib.pyplot as plt

    board = np.zeros((400, 500, 3), dtype=np.uint8)
    cv2.rectangle(board, (50, 50), (150, 150), (255, 255, 255), -1)
    cv2.circle(board, (280, 100), 60, (255, 255, 255), -1)
    cv2.ellipse(board, (400, 100), (50, 30), 0, 0, 360, (255, 255, 255), -1)
    plt.figure(figsize=(10, 6))
    plt.imshow(cv2.cvtColor(board, cv2.COLOR_BGR2RGB))
    plt.title('Base Shapes')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 테스트 이미지 생성 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      import matplotlib.pyplot as plt

      board = np.zeros((400, 500, 3), dtype=np.uint8)
      cv2.rectangle(board, (50, 50), (150, 150), (255, 255, 255), -1)
      cv2.circle(board, (280, 100), 60, (255, 255, 255), -1)
      cv2.ellipse(board, (400, 100), (50, 30), 0, 0, 360, (255, 255, 255), -1)
      plt.figure(figsize=(10, 6))
      plt.imshow(cv2.cvtColor(board, cv2.COLOR_BGR2RGB))
      plt.title('Base Shapes')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 테스트 이미지 생성의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 테스트 이미지 생성 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_find
  title: 2단계. 컨투어 검출
  structuredPrimary: true
  subtitle: findContours()
  goal: 2단계. 컨투어 검출에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    findContours()는 이진 이미지에서 컨투어(윤곽선)를 검출합니다. 흰색(255) 영역과 검은색(0) 영역의 경계를 찾아 점들의 좌표 리스트로 반환합니다. 입력은 반드시 이진 이미지여야 하므로, 그레이스케일 변환 후 threshold나 Canny로 이진화합니다. 검출 모드(RETR_*)와 근사 방법(CHAIN_APPROX_*)에 따라 결과가 달라집니다.

    findContours()는 (contours, hierarchy)를 반환합니다. RETR_EXTERNAL은 외곽 컨투어만 검출합니다. CHAIN_APPROX_SIMPLE은 직선 부분의 끝점만 저장하여 메모리를 절약합니다.
  tips:
  - findContours()는 (contours, hierarchy)를 반환합니다. RETR_EXTERNAL은 외곽 컨투어만 검출합니다. CHAIN_APPROX_SIMPLE은 직선
    부분의 끝점만 저장하여 메모리를 절약합니다.
  snippet: |-
    gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
    ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
    plt.figure(figsize=(10, 6))
    plt.imshow(thresh, cmap='gray')
    plt.title('Binary Threshold')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 2단계. 컨투어 검출 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      gray = cv2.cvtColor(board, cv2.COLOR_BGR2GRAY)
      ret, thresh = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
      plt.figure(figsize=(10, 6))
      plt.imshow(thresh, cmap='gray')
      plt.title('Binary Threshold')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 컨투어 검출의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 컨투어 검출 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_draw
  title: 3단계. 컨투어 그리기
  structuredPrimary: true
  subtitle: drawContours()
  goal: 3단계. 컨투어 그리기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    drawContours()로 검출된 컨투어를 이미지에 그립니다. 특정 컨투어나 전체 컨투어를 그릴 수 있습니다.

    drawContours(image, contours, contourIdx, color, thickness)에서 contourIdx가 -1이면 모든 컨투어를 그립니다. 특정 인덱스를 지정하면 해당 컨투어만 그립니다.
  tips:
  - drawContours(image, contours, contourIdx, color, thickness)에서 contourIdx가 -1이면 모든 컨투어를 그립니다. 특정 인덱스를
    지정하면 해당 컨투어만 그립니다.
  snippet: |-
    drawn = board.copy()
    cv2.drawContours(drawn, contours, -1, (0, 255, 0), 2)
    plt.figure(figsize=(10, 6))
    plt.imshow(cv2.cvtColor(drawn, cv2.COLOR_BGR2RGB))
    plt.title('All Contours (Green)')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 컨투어 그리기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      drawn = board.copy()
      cv2.drawContours(drawn, contours, -1, (0, 255, 0), 2)
      plt.figure(figsize=(10, 6))
      plt.imshow(cv2.cvtColor(drawn, cv2.COLOR_BGR2RGB))
      plt.title('All Contours (Green)')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 컨투어 그리기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 컨투어 그리기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_area
  title: 4단계. 면적과 둘레
  structuredPrimary: true
  subtitle: contourArea, arcLength
  goal: 4단계. 면적과 둘레에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    contourArea()는 컨투어가 둘러싼 영역의 면적(픽셀 수)을 계산합니다. arcLength()는 컨투어의 둘레(perimeter) 길이를 계산합니다. 이 두 값으로 원형도(circularity = 4π×면적/둘레²)를 계산할 수 있는데, 완전한 원은 1에 가깝고 길쭉한 형태는 0에 가깝습니다. 객체 분류와 필터링에 유용합니다.

    arcLength(curve, closed)의 closed가 True이면 닫힌 곡선으로 계산합니다. 면적과 둘레를 이용해 원형도(circularity)나 종횡비를 계산할 수 있습니다.
  tips:
  - arcLength(curve, closed)의 closed가 True이면 닫힌 곡선으로 계산합니다. 면적과 둘레를 이용해 원형도(circularity)나 종횡비를 계산할 수 있습니다.
  snippet: |-
    areas = []
    for cnt in contours:
        area = cv2.contourArea(cnt)
        areas.append(area)
    areas
  exercise:
    prompt: 4단계. 면적과 둘레 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      areas = []
      for cnt in contours:
          area = cv2.contourArea(cnt)
          areas.append(area)
      areas
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 4단계. 면적과 둘레의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 4단계. 면적과 둘레 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step5_bound
  title: 5단계. 외접 도형
  structuredPrimary: true
  subtitle: boundingRect, minEnclosingCircle
  goal: 5단계. 외접 도형에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    외접 도형(bounding shape)은 컨투어를 감싸는 가장 작은 도형입니다. boundingRect()는 축에 평행한 사각형(AABB, Axis-Aligned Bounding Box)을, minEnclosingCircle()은 최소 외접원을 반환합니다. 객체 위치, 크기 추정, ROI(관심 영역) 추출에 사용됩니다.

    boundingRect()는 축에 평행한 사각형, minAreaRect()는 회전된 최소 면적 사각형을 반환합니다. 객체 방향 분석에는 minAreaRect가 유용합니다.
  tips:
  - boundingRect()는 축에 평행한 사각형, minAreaRect()는 회전된 최소 면적 사각형을 반환합니다. 객체 방향 분석에는 minAreaRect가 유용합니다.
  snippet: |-
    boxed = board.copy()
    for cnt in contours:
        bx, by, bw, bh = cv2.boundingRect(cnt)
        cv2.rectangle(boxed, (bx, by), (bx + bw, by + bh), (0, 255, 0), 2)
    plt.figure(figsize=(10, 6))
    plt.imshow(cv2.cvtColor(boxed, cv2.COLOR_BGR2RGB))
    plt.title('Bounding Rectangles')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 외접 도형 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      boxed = board.copy()
      for cnt in contours:
          bx, by, bw, bh = cv2.boundingRect(cnt)
          cv2.rectangle(boxed, (bx, by), (bx + bw, by + bh), (0, 255, 0), 2)
      plt.figure(figsize=(10, 6))
      plt.imshow(cv2.cvtColor(boxed, cv2.COLOR_BGR2RGB))
      plt.title('Bounding Rectangles')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 외접 도형의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 5단계. 외접 도형 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step6_approx
  title: 6단계. 컨투어 근사
  structuredPrimary: true
  subtitle: approxPolyDP
  goal: 6단계. 컨투어 근사에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    approxPolyDP()는 Douglas-Peucker 알고리즘으로 컨투어를 단순화합니다. 복잡한 곡선을 더 적은 꼭짓점으로 근사하여, 결과 꼭짓점 수로 도형을 분류할 수 있습니다(3개=삼각형, 4개=사각형, 많으면 원). epsilon 파라미터가 근사 정밀도를 결정하며, 작을수록 원본에 가깝습니다.

    epsilon은 근사 정밀도입니다. 작을수록 원본에 가깝고, 클수록 단순화됩니다. 둘레의 1-5% 정도를 사용합니다. 반환된 점 개수로 도형을 구분할 수 있습니다(3점=삼각형, 4점=사각형 등).
  tips:
  - epsilon은 근사 정밀도입니다. 작을수록 원본에 가깝고, 클수록 단순화됩니다. 둘레의 1-5% 정도를 사용합니다. 반환된 점 개수로 도형을 구분할 수 있습니다(3점=삼각형,
    4점=사각형 등).
  snippet: |-
    approxed = board.copy()
    for cnt in contours:
        epsilon = 0.02 * cv2.arcLength(cnt, True)
        approx = cv2.approxPolyDP(cnt, epsilon, True)
        cv2.drawContours(approxed, [approx], 0, (0, 255, 255), 2)
    plt.figure(figsize=(10, 6))
    plt.imshow(cv2.cvtColor(approxed, cv2.COLOR_BGR2RGB))
    plt.title('Approximated Contours')
    plt.axis('off')
    plt.tight_layout()
