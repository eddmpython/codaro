      contours, _ = cv2.findContours(contourMask, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
      contourAreas = [cv2.contourArea(contour) for contour in contours]
      largeContours = [contour for contour in contours if cv2.contourArea(contour) >= 500]
      boundingBoxes = [cv2.boundingRect(contour) for contour in largeContours]
      contourChecks = {
          "contourCountOk": len(contours) == 2,
          "areaFilterOk": len(largeContours) == 2,
          "boxesOk": all(width > 40 and height > 40 for _, _, width, height in boundingBoxes),
          "errorOk": contourErrorMessage == "최소 면적은 양수여야 합니다: 0",
      }

      assert all(contourChecks.values()), contourChecks
      contourChecks
