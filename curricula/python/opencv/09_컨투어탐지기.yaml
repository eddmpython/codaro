- id: workflow_validation
  title: 7단계. 컨투어 분석 검증 루프
  structuredPrimary: true
  subtitle: 객체 수, 면적, 필터 기준 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 컨투어 탐지는 윤곽선을 그리는 데서 끝나지 않습니다. 객체 수, 면적, 외접 박스가 업무 기준을 만족하는지 검증해야 합니다. 최소 면적 기준 오류를 먼저 확인하고 필터링 결과를 assert로 점검합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    contourMask = np.zeros((140, 180), dtype=np.uint8)
    cv2.rectangle(contourMask, (25, 30), (80, 95), 255, -1)
    cv2.circle(contourMask, (130, 70), 28, 255, -1)

    def validateMinArea(minArea):
        if minArea <= 0:
            raise ValueError(f"최소 면적은 양수여야 합니다: {minArea}")
        return True

    validateMinArea(500)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
      import numpy as np

      contourMask = np.zeros((140, 180), dtype=np.uint8)
      cv2.rectangle(contourMask, (25, 30), (80, 95), 255, -1)
      cv2.circle(contourMask, (130, 70), 28, 255, -1)

      def validateMinArea(minArea):
          if minArea <= 0:
              raise ValueError(f"최소 면적은 양수여야 합니다: {minArea}")
          return True

      validateMinArea(500)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
