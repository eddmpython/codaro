  snippet: |-
    import cv2
    import numpy as np

    rng = np.random.default_rng(42)
    cleanFilterImage = np.full((96, 128), 120, dtype=np.uint8)
    cv2.rectangle(cleanFilterImage, (32, 24), (96, 72), 190, -1)
    noise = rng.normal(0, 18, cleanFilterImage.shape).astype(np.int16)
    noisyFilterImage = np.clip(cleanFilterImage.astype(np.int16) + noise, 0, 255).astype(np.uint8)

    def validateOddKernel(kernelSize):
        if kernelSize <= 1 or kernelSize % 2 == 0:
            raise ValueError(f"커널 크기는 3 이상의 홀수여야 합니다: {kernelSize}")
        return True

    validateOddKernel(5)
