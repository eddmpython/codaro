- id: step3_gaussian
  title: 3단계. 가우시안 블러
  structuredPrimary: true
  subtitle: GaussianBlur()
  goal: '3단계. 가우시안 블러: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 가우시안 블러: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    GaussianBlur()는 가우시안(정규분포) 함수를 이용한 블러입니다. 평균 블러와 달리 중심에 가까운 픽셀에 더 큰 가중치를 부여합니다. 종 모양의 가우시안 분포처럼 중심이 높고 가장자리가 낮은 가중치를 사용하여 자연스러운 블러 효과를 만듭니다. 노이즈 제거와 에지 검출 전처리에 가장 많이 사용됩니다.

    GaussianBlur의 세 번째 인자 sigmaX는 가우시안 분포의 표준편차입니다. 0이면 커널 크기에서 자동 계산됩니다. 값이 클수록 블러가 강해집니다.
  tips:
  - GaussianBlur의 세 번째 인자 sigmaX는 가우시안 분포의 표준편차입니다. 0이면 커널 크기에서 자동 계산됩니다. 값이 클수록 블러가 강해집니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    gaussian5 = cv2.GaussianBlur(pic, (5, 5), 0)
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(gaussian5, cv2.COLOR_BGR2RGB))
    plt.title('Gaussian 5x5')
    plt.axis('off')
    plt.tight_layout()
