      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        china = load_sample_image('china.jpg')
        chinaBgr = cv2.cvtColor(china, cv2.COLOR_RGB2BGR)
        plt.imshow(china)
        plt.axis('off')
    - type: code
      title: 노이즈 추가
      content: |-
        chinaNoisy = chinaBgr.copy()
        noise = np.random.randint(-30, 30, chinaBgr.shape, dtype=np.int16)
        chinaNoisy = np.clip(chinaBgr.astype(np.int16) + noise, 0, 255).astype(np.uint8)
        plt.figure(figsize=(10, 6))
        plt.imshow(cv2.cvtColor(chinaNoisy, cv2.COLOR_BGR2RGB))
        plt.title('Noisy China')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: 필터 비교
      content: |-
        chinaGauss = cv2.GaussianBlur(chinaNoisy, (5, 5), 0)
        chinaMed = cv2.medianBlur(chinaNoisy, 5)
        chinaBilat = cv2.bilateralFilter(chinaNoisy, 9, 75, 75)
        figNoise, axNoise = plt.subplots(2, 2, figsize=(10, 8))
        axNoise[0, 0].imshow(cv2.cvtColor(chinaNoisy, cv2.COLOR_BGR2RGB))
        axNoise[0, 0].set_title('Noisy')
        axNoise[0, 0].axis('off')
        axNoise[0, 1].imshow(cv2.cvtColor(chinaGauss, cv2.COLOR_BGR2RGB))
        axNoise[0, 1].set_title('Gaussian')
        axNoise[0, 1].axis('off')
        axNoise[1, 0].imshow(cv2.cvtColor(chinaMed, cv2.COLOR_BGR2RGB))
        axNoise[1, 0].set_title('Median')
        axNoise[1, 0].axis('off')
        axNoise[1, 1].imshow(cv2.cvtColor(chinaBilat, cv2.COLOR_BGR2RGB))
        axNoise[1, 1].set_title('Bilateral')
        axNoise[1, 1].axis('off')
        plt.tight_layout()
