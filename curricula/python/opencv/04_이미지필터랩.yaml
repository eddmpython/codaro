- id: workflow_validation
  title: 7단계. 필터 품질 검증 루프
  structuredPrimary: true
  subtitle: 노이즈 감소와 커널 입력 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 필터는 흐리게 보이면 성공이 아니라, 노이즈가 줄면서 구조가 보존되는지 확인해야 합니다. 커널 크기 오류를 잡고, 필터 전후 표준편차를 비교해 품질을 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    rng = np.random.default_rng(42)
    cleanFilterImage = np.full((96, 128), 120, dtype=np.uint8)
    cv2.rectangle(cleanFilterImage, (32, 24), (96, 72), 190, -1)
    noise = rng.normal(0, 18, cleanFilterImage.shape).astype(np.int16)
    noisyFilterImage = np.clip(cleanFilterImage.astype(np.int16) + noise, 0, 255).astype(np.uint8)

    def validateOddKernel(kernelSize):
        if kernelSize <= 1 or kernelSize % 2 == 0:
            raise ValueError(f"커널 크기는 3 이상의 홀수여야 합니다: {kernelSize}")
        return True

    validateOddKernel(5)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
      import numpy as np

      rng = np.random.default_rng(42)
      cleanFilterImage = np.full((96, 128), 120, dtype=np.uint8)
      cv2.rectangle(cleanFilterImage, (32, 24), (96, 72), 190, -1)
      noise = rng.normal(0, 18, cleanFilterImage.shape).astype(np.int16)
      noisyFilterImage = np.clip(cleanFilterImage.astype(np.int16) + noise, 0, 255).astype(np.uint8)

      def validateOddKernel(kernelSize):
          if kernelSize <= 1 or kernelSize % 2 == 0:
              raise ValueError(f"커널 크기는 3 이상의 홀수여야 합니다: {kernelSize}")
          return True

      validateOddKernel(5)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
