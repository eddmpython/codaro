    content: blur()는 평균 블러(mean blur)입니다. 커널(kernel)은 이미지 위를 이동하며 연산을 수행하는 작은 행렬입니다. 3x3 커널이면 9개 픽셀의 평균으로 중심 픽셀을 대체합니다. 커널이
