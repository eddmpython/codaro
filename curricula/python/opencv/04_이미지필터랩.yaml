sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn에 내장된 샘플 이미지를 사용합니다. 필터링은 노이즈 제거, 이미지 부드럽게 만들기, 에지 검출 전처리 등에 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    flowerArr = load_sample_image('flower.jpg')
    pic = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
    plt.figure(figsize=(8, 6))
    plt.imshow(flowerArr)
    plt.title(f'Original: {pic.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flowerArr = load_sample_image('flower.jpg')
      pic = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
      plt.figure(figsize=(8, 6))
      plt.imshow(flowerArr)
      plt.title(f'Original: {pic.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step2_blur
  title: 2단계. 기본 블러
  structuredPrimary: true
  subtitle: blur()
  goal: 2단계. 기본 블러에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    blur()는 평균 블러(mean blur)입니다. 커널(kernel)은 이미지 위를 이동하며 연산을 수행하는 작은 행렬입니다. 3x3 커널이면 9개 픽셀의 평균으로 중심 픽셀을 대체합니다. 커널이 클수록 더 많은 픽셀을 평균하므로 더 흐려집니다. 이 과정을 컨볼루션(convolution)이라고 합니다.

    blur()의 두 번째 인자 (3, 3)은 커널 크기입니다. 홀수로 지정합니다. 커널이 클수록 블러 효과가 강해집니다. 연산 시간도 증가합니다.
  tips:
  - blur()의 두 번째 인자 (3, 3)은 커널 크기입니다. 홀수로 지정합니다. 커널이 클수록 블러 효과가 강해집니다. 연산 시간도 증가합니다.
  snippet: |-
    blurred3 = cv2.blur(pic, (3, 3))
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(blurred3, cv2.COLOR_BGR2RGB))
    plt.title('Blur 3x3')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 2단계. 기본 블러 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      blurred3 = cv2.blur(pic, (3, 3))
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(blurred3, cv2.COLOR_BGR2RGB))
      plt.title('Blur 3x3')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 2단계. 기본 블러 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 기본 블러 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 기본 블러에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step3_gaussian
  title: 3단계. 가우시안 블러
  structuredPrimary: true
  subtitle: GaussianBlur()
  goal: 3단계. 가우시안 블러에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    GaussianBlur()는 가우시안(정규분포) 함수를 이용한 블러입니다. 평균 블러와 달리 중심에 가까운 픽셀에 더 큰 가중치를 부여합니다. 종 모양의 가우시안 분포처럼 중심이 높고 가장자리가 낮은 가중치를 사용하여 자연스러운 블러 효과를 만듭니다. 노이즈 제거와 에지 검출 전처리에 가장 많이 사용됩니다.

    GaussianBlur의 세 번째 인자 sigmaX는 가우시안 분포의 표준편차입니다. 0이면 커널 크기에서 자동 계산됩니다. 값이 클수록 블러가 강해집니다.
  tips:
  - GaussianBlur의 세 번째 인자 sigmaX는 가우시안 분포의 표준편차입니다. 0이면 커널 크기에서 자동 계산됩니다. 값이 클수록 블러가 강해집니다.
  snippet: |-
    gaussian5 = cv2.GaussianBlur(pic, (5, 5), 0)
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(gaussian5, cv2.COLOR_BGR2RGB))
    plt.title('Gaussian 5x5')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 가우시안 블러 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      gaussian5 = cv2.GaussianBlur(pic, (5, 5), 0)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(gaussian5, cv2.COLOR_BGR2RGB))
      plt.title('Gaussian 5x5')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 3단계. 가우시안 블러 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 가우시안 블러 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 가우시안 블러에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step4_median
  title: 4단계. 미디언 블러
  structuredPrimary: true
  subtitle: medianBlur()
  goal: 4단계. 미디언 블러에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    medianBlur()는 커널 영역의 중앙값(median)을 사용합니다. 평균과 달리 중앙값은 극단적인 값에 영향을 받지 않습니다. salt-and-pepper 노이즈(소금-후추 잡음, 이미지에 흰점과 검은점이 무작위로 나타나는 노이즈)에 특히 효과적입니다. 커널 크기는 홀수만 가능합니다.

    medianBlur()의 커널 크기는 홀수 정수 하나만 지정합니다. (5, 5)가 아닌 5로 지정합니다. 중앙값 특성상 극단값(노이즈)이 결과에 영향을 주지 않습니다.
  tips:
  - medianBlur()의 커널 크기는 홀수 정수 하나만 지정합니다. (5, 5)가 아닌 5로 지정합니다. 중앙값 특성상 극단값(노이즈)이 결과에 영향을 주지 않습니다.
  snippet: |-
    noisy = pic.copy()
    numNoise = 3000
    coords = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
    noisy[coords[:, 0], coords[:, 1]] = [255, 255, 255]
    coords2 = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
    noisy[coords2[:, 0], coords2[:, 1]] = [0, 0, 0]
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(noisy, cv2.COLOR_BGR2RGB))
    plt.title('Noisy Image')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. 미디언 블러 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      noisy = pic.copy()
      numNoise = 3000
      coords = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
      noisy[coords[:, 0], coords[:, 1]] = [255, 255, 255]
      coords2 = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
      noisy[coords2[:, 0], coords2[:, 1]] = [0, 0, 0]
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(noisy, cv2.COLOR_BGR2RGB))
      plt.title('Noisy Image')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 4단계. 미디언 블러 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 미디언 블러 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 미디언 블러에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_bilateral
  title: 5단계. 양방향 필터
  structuredPrimary: true
  subtitle: bilateralFilter()
  goal: 5단계. 양방향 필터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    bilateralFilter()는 양방향 필터(bilateral filter)로, 에지를 보존하면서 블러를 적용합니다. 일반 블러는 에지(경계)까지 흐리게 만들지만, 양방향 필터는 색상이 비슷한 영역만 블러하고 색상 차이가 큰 에지는 유지합니다. 공간적 거리(spatial distance)와 색상 차이(color difference)를 모두 고려하기 때문입니다. 피부 보정(blemish 제거하면서 얼굴 윤곽 유지)이나 카툰 스타일화에 많이 사용됩니다.

    bilateralFilter(src, d, sigmaColor, sigmaSpace)에서 d는 필터 크기, sigmaColor는 색상 유사도 기준, sigmaSpace는 공간 거리 기준입니다. sigmaColor가 크면 더 넓은 색상 범위가 혼합됩니다.
  tips:
  - bilateralFilter(src, d, sigmaColor, sigmaSpace)에서 d는 필터 크기, sigmaColor는 색상 유사도 기준, sigmaSpace는 공간
    거리 기준입니다. sigmaColor가 크면 더 넓은 색상 범위가 혼합됩니다.
  snippet: |-
    bilateral = cv2.bilateralFilter(pic, 9, 75, 75)
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(bilateral, cv2.COLOR_BGR2RGB))
    plt.title('Bilateral Filter')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 양방향 필터 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      bilateral = cv2.bilateralFilter(pic, 9, 75, 75)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(bilateral, cv2.COLOR_BGR2RGB))
      plt.title('Bilateral Filter')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 5단계. 양방향 필터 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 양방향 필터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 양방향 필터에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step6_compare
  title: 6단계. 필터 종합 비교
  structuredPrimary: true
  subtitle: 4가지 필터 비교
  goal: 6단계. 필터 종합 비교에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    네 가지 블러 필터를 한눈에 비교해봅시다. 각 필터의 특성과 적합한 용도를 파악합니다.

    Average와 Gaussian은 일반 블러, Median은 노이즈 제거, Bilateral은 에지 보존에 적합합니다. 용도에 따라 선택하세요.
  tips:
  - Average와 Gaussian은 일반 블러, Median은 노이즈 제거, Bilateral은 에지 보존에 적합합니다. 용도에 따라 선택하세요.
  snippet: |-
    avgBlur = cv2.blur(pic, (7, 7))
    gaussBlur = cv2.GaussianBlur(pic, (7, 7), 0)
    medBlur = cv2.medianBlur(pic, 7)
    bilatBlur = cv2.bilateralFilter(pic, 7, 75, 75)
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(avgBlur, cv2.COLOR_BGR2RGB))
    plt.title('Average Blur 7x7')
    plt.axis('off')
    plt.tight_layout()
