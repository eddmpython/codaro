  goal: 7단계. 필터 품질 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 필터는 흐리게 보이면 성공이 아니라, 노이즈가 줄면서 구조가 보존되는지 확인해야 합니다. 커널 크기 오류를 잡고, 필터 전후 표준편차를 비교해 품질을 검증합니다.
  tips:
