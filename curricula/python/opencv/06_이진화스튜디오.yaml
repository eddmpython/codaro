- id: workflow_validation
  title: 7단계. 이진화 검증 루프
  structuredPrimary: true
  subtitle: 임계값, OTSU, 마스크 비율 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 이진화는 흑백 결과를 만드는 일이 아니라, 객체 픽셀과 배경 픽셀이 의도대로 분리되는지 확인하는 일입니다. 임계값 범위를 검증하고 전역 이진화와 OTSU 결과를 마스크 비율로 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    thresholdImage = np.full((100, 140), 70, dtype=np.uint8)
    cv2.rectangle(thresholdImage, (35, 25), (105, 75), 190, -1)
    cv2.circle(thresholdImage, (70, 50), 18, 230, -1)

    def validateThresholdValue(value):
        if not (0 <= value <= 255):
            raise ValueError(f"임계값은 0~255 범위여야 합니다: {value}")
        return True

    validateThresholdValue(120)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
      import numpy as np

      thresholdImage = np.full((100, 140), 70, dtype=np.uint8)
      cv2.rectangle(thresholdImage, (35, 25), (105, 75), 190, -1)
      cv2.circle(thresholdImage, (70, 50), 18, 230, -1)

      def validateThresholdValue(value):
          if not (0 <= value <= 255):
              raise ValueError(f"임계값은 0~255 범위여야 합니다: {value}")
          return True

