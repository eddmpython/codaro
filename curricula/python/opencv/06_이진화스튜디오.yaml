- id: step2_global
  title: 2단계. 전역 임계값
  structuredPrimary: true
  subtitle: threshold()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    threshold()는 전역 임계값(global threshold)으로 이진화합니다. 이미지 전체에 하나의 고정된 임계값을 적용하여, 임계값보다 큰 픽셀은 maxval(보통 255)로, 작거나 같으면 0으로 설정합니다. 조명이 균일한 이미지에서 잘 동작하지만, 조명이 고르지 않으면 일부 영역이 너무 밝거나 어둡게 처리될 수 있습니다.

    threshold()는 (ret, dst) 튜플을 반환합니다. ret은 사용된 임계값, dst는 이진화된 이미지입니다. THRESH_BINARY는 임계값 초과 시 maxval, 이하 시 0입니다.
  tips:
  - threshold()는 (ret, dst) 튜플을 반환합니다. ret은 사용된 임계값, dst는 이진화된 이미지입니다. THRESH_BINARY는 임계값 초과 시 maxval, 이하 시 0입니다.
  snippet: |-
    ret1, binary = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY)
    plt.figure(figsize=(10, 6))
    plt.imshow(binary, cmap='gray')
    plt.title(f'Binary (127): ret={ret1}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      ret1, binary = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY)
      plt.figure(figsize=(10, 6))
      plt.imshow(binary, cmap='gray')
      plt.title(f'Binary (127): ret={ret1}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_types
  title: 3단계. 이진화 유형
  structuredPrimary: true
  subtitle: BINARY vs BINARY_INV
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    THRESH_BINARY_INV는 결과를 반전합니다. 임계값보다 작은 픽셀이 maxval이 됩니다. 배경과 전경의 관계에 따라 적절한 방식을 선택합니다.

    THRESH_BINARY는 밝은 부분이 흰색, THRESH_BINARY_INV는 어두운 부분이 흰색입니다. 검은 배경에 흰 객체를 원하면 상황에 맞게 선택하세요.
  tips:
  - THRESH_BINARY는 밝은 부분이 흰색, THRESH_BINARY_INV는 어두운 부분이 흰색입니다. 검은 배경에 흰 객체를 원하면 상황에 맞게 선택하세요.
  snippet: |-
    ret4, binaryNorm = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY)
    ret5, binaryInv = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY_INV)
    figInv, axInv = plt.subplots(1, 2, figsize=(12, 5))
    axInv[0].imshow(binaryNorm, cmap='gray')
    axInv[0].set_title('BINARY')
    axInv[0].axis('off')
    axInv[1].imshow(binaryInv, cmap='gray')
    axInv[1].set_title('BINARY_INV')
    axInv[1].axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      ret4, binaryNorm = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY)
      ret5, binaryInv = cv2.threshold(mono, 127, 255, cv2.THRESH_BINARY_INV)
      figInv, axInv = plt.subplots(1, 2, figsize=(12, 5))
      axInv[0].imshow(binaryNorm, cmap='gray')
      axInv[0].set_title('BINARY')
      axInv[0].axis('off')
      axInv[1].imshow(binaryInv, cmap='gray')
      axInv[1].set_title('BINARY_INV')
      axInv[1].axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_otsu
  title: 4단계. OTSU 자동 임계값
  structuredPrimary: true
  subtitle: THRESH_OTSU
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    OTSU(오츠)는 1979년 오츠 노부유키가 개발한 자동 임계값 결정 알고리즘입니다. 히스토그램을 분석하여 이미지를 두 클래스(전경과 배경)로 나눌 때 클래스 간 분산(between-class variance)을 최대화하는 임계값을 찾습니다. 히스토그램이 두 개의 봉우리(bimodal)를 가질 때 가장 효과적입니다. 사용자가 임계값을 직접 지정하지 않아도 되어 자동화된 처리에 유용합니다.

    THRESH_OTSU를 사용할 때 임계값 인자는 무시됩니다(0으로 설정). 반환되는 ret 값이 OTSU가 계산한 최적 임계값입니다. 두 플래그를 + 연산자로 결합합니다.
  tips:
  - THRESH_OTSU를 사용할 때 임계값 인자는 무시됩니다(0으로 설정). 반환되는 ret 값이 OTSU가 계산한 최적 임계값입니다. 두 플래그를 + 연산자로 결합합니다.
  snippet: |-
    retOtsu, otsu = cv2.threshold(mono, 0, 255, cv2.THRESH_BINARY + cv2.THRESH_OTSU)
    plt.figure(figsize=(10, 6))
    plt.imshow(otsu, cmap='gray')
    plt.title(f'OTSU (thresh={retOtsu:.0f})')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      retOtsu, otsu = cv2.threshold(mono, 0, 255, cv2.THRESH_BINARY + cv2.THRESH_OTSU)
      plt.figure(figsize=(10, 6))
      plt.imshow(otsu, cmap='gray')
      plt.title(f'OTSU (thresh={retOtsu:.0f})')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_adaptive
  title: 5단계. 적응형 임계값
  structuredPrimary: true
  subtitle: adaptiveThreshold()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    adaptiveThreshold()는 적응형 임계값(adaptive threshold)으로, 픽셀마다 다른 임계값을 적용합니다. 각 픽셀 주변의 작은 영역(blockSize)에서 평균(MEAN_C) 또는 가우시안 가중 평균(GAUSSIAN_C)을 계산하고, 거기서 상수 C를 뺀 값을 해당 픽셀의 임계값으로 사용합니다. 조명이 고르지 않거나 그림자가 있는 이미지에서 전역 임계값보다 훨씬 좋은 결과를 얻을 수 있습니다.

    adaptiveThreshold(src, maxValue, adaptiveMethod, thresholdType, blockSize, C)에서 blockSize는 영역 크기(홀수), C는 평균에서 뺄 상수입니다. blockSize가 클수록 넓은 영역을 고려합니다.
  tips:
  - adaptiveThreshold(src, maxValue, adaptiveMethod, thresholdType, blockSize, C)에서 blockSize는 영역 크기(홀수), C는 평균에서 뺄 상수입니다. blockSize가 클수록 넓은 영역을 고려합니다.
  snippet: |-
    adaptMean = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_MEAN_C, cv2.THRESH_BINARY, 11, 2)
    plt.figure(figsize=(10, 6))
    plt.imshow(adaptMean, cmap='gray')
    plt.title('Adaptive Mean')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      adaptMean = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_MEAN_C, cv2.THRESH_BINARY, 11, 2)
      plt.figure(figsize=(10, 6))
      plt.imshow(adaptMean, cmap='gray')
      plt.title('Adaptive Mean')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_block
  title: 6단계. 블록 크기 영향
  structuredPrimary: true
  subtitle: blockSize 조절
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    적응형 임계값에서 blockSize는 중요한 파라미터입니다. 작으면 세부 디테일을 살리고, 크면 전체적인 구조를 유지합니다.

    blockSize가 작으면 노이즈가 많아질 수 있고, 크면 디테일이 사라집니다. 이미지 특성에 맞게 조절하세요. C 값도 결과에 영향을 줍니다.
  tips:
  - blockSize가 작으면 노이즈가 많아질 수 있고, 크면 디테일이 사라집니다. 이미지 특성에 맞게 조절하세요. C 값도 결과에 영향을 줍니다.
  snippet: |-
    adapt5 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 5, 2)
    adapt21 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 21, 2)
    adapt51 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 51, 2)
    figBlock, axBlock = plt.subplots(1, 3, figsize=(12, 4))
    axBlock[0].imshow(adapt5, cmap='gray')
    axBlock[0].set_title('Block 5')
    axBlock[0].axis('off')
    axBlock[1].imshow(adapt21, cmap='gray')
    axBlock[1].set_title('Block 21')
    axBlock[1].axis('off')
    axBlock[2].imshow(adapt51, cmap='gray')
    axBlock[2].set_title('Block 51')
    axBlock[2].axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      adapt5 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 5, 2)
      adapt21 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 21, 2)
      adapt51 = cv2.adaptiveThreshold(mono, 255, cv2.ADAPTIVE_THRESH_GAUSSIAN_C, cv2.THRESH_BINARY, 51, 2)
      figBlock, axBlock = plt.subplots(1, 3, figsize=(12, 4))
      axBlock[0].imshow(adapt5, cmap='gray')
      axBlock[0].set_title('Block 5')
      axBlock[0].axis('off')
      axBlock[1].imshow(adapt21, cmap='gray')
      axBlock[1].set_title('Block 21')
      axBlock[1].axis('off')
      axBlock[2].imshow(adapt51, cmap='gray')
      axBlock[2].set_title('Block 51')
      axBlock[2].axis('off')
      plt.tight_layout()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
