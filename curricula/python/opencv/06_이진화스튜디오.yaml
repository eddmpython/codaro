sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: 그레이스케일 준비
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: sklearn에 내장된 샘플 이미지를 사용합니다. 이진화는 그레이스케일 이미지에서 수행됩니다. 밝기 기준으로 픽셀을 분류합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    chinaArr = load_sample_image('china.jpg')
    source = cv2.cvtColor(chinaArr, cv2.COLOR_RGB2BGR)
    mono = cv2.cvtColor(source, cv2.COLOR_BGR2GRAY)
    plt.figure(figsize=(10, 6))
    plt.imshow(mono, cmap='gray')
    plt.title(f'Grayscale: {mono.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
