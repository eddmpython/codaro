      cv2.rectangle(visionImage, (110, 45), (155, 95), (0, 0, 230), -1)
      cv2.circle(visionImage, (20, 20), 3, (0, 0, 255), -1)

      def validateHsvRange(lower, upper):
          if len(lower) != 3 or len(upper) != 3:
              raise ValueError("HSV 범위는 길이 3이어야 합니다")
          if any(lo > hi for lo, hi in zip(lower, upper)):
              raise ValueError(f"HSV lower가 upper보다 큽니다: {lower} > {upper}")
          return True

