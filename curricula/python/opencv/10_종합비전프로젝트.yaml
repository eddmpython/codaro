sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: 분석 대상 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn의 flower 이미지를 불러옵니다. 꽃의 주황색 영역을 검출하는 파이프라인을 구축합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    flower = load_sample_image('flower.jpg')
    scene = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
    plt.figure(figsize=(10, 6))
    plt.imshow(flower)
    plt.title(f'Scene: {scene.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flower = load_sample_image('flower.jpg')
      scene = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
      plt.figure(figsize=(10, 6))
      plt.imshow(flower)
      plt.title(f'Scene: {scene.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step2_hsv
  title: 2단계. HSV 변환
  structuredPrimary: true
  subtitle: 색상 기반 분석 준비
  goal: 2단계. HSV 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    RGB에서는 "빨간색 계열"을 찾으려면 R, G, B 세 채널을 복잡하게 조합해야 하지만, HSV에서는 Hue(색상) 채널 하나만 보면 됩니다. Hue 값이 비슷하면 밝기나 채도와 관계없이 같은 색 계열입니다. 이러한 특성 때문에 HSV는 색상 기반 객체 검출에 널리 사용됩니다.

    OpenCV HSV에서 H는 0-179 범위입니다. 주황색은 대략 5-25, 노란색은 25-35, 녹색은 35-85 정도입니다. 정확한 값은 이미지마다 다르므로 확인이 필요합니다.
  tips:
  - OpenCV HSV에서 H는 0-179 범위입니다. 주황색은 대략 5-25, 노란색은 25-35, 녹색은 35-85 정도입니다. 정확한 값은 이미지마다 다르므로 확인이 필요합니다.
  snippet: |-
    hsv = cv2.cvtColor(scene, cv2.COLOR_BGR2HSV)
    hue, sat, val = cv2.split(hsv)
    plt.figure(figsize=(10, 6))
    plt.imshow(hsv)
    plt.title(f'HSV: {hsv.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 2단계. HSV 변환 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      hsv = cv2.cvtColor(scene, cv2.COLOR_BGR2HSV)
      hue, sat, val = cv2.split(hsv)
      plt.figure(figsize=(10, 6))
      plt.imshow(hsv)
      plt.title(f'HSV: {hsv.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 2단계. HSV 변환 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. HSV 변환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. HSV 변환에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step3_mask
  title: 3단계. 색상 마스킹
  structuredPrimary: true
  subtitle: inRange()
  goal: 3단계. 색상 마스킹에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    inRange()는 범위 필터링 함수로, 지정한 하한(lower)과 상한(upper) 사이의 픽셀만 흰색(255)으로, 나머지는 검은색(0)으로 만드는 이진 마스크를 생성합니다. HSV에서 [H_min, S_min, V_min]과 [H_max, S_max, V_max]를 지정하면 해당 색상 범위의 픽셀만 추출됩니다. 색상 기반 객체 분할의 핵심 함수입니다.

    inRange(src, lowerb, upperb)는 lowerb <= pixel <= upperb인 픽셀을 255로, 나머지를 0으로 설정합니다. HSV에서 [H, S, V] 순서로 범위를 지정합니다.
  tips:
  - inRange(src, lowerb, upperb)는 lowerb <= pixel <= upperb인 픽셀을 255로, 나머지를 0으로 설정합니다. HSV에서 [H, S, V]
    순서로 범위를 지정합니다.
  snippet: |-
    lowerOrange = np.array([5, 100, 100])
    upperOrange = np.array([25, 255, 255])
    mask = cv2.inRange(hsv, lowerOrange, upperOrange)
    plt.figure(figsize=(10, 6))
    plt.imshow(mask, cmap='gray')
    plt.title(f'Mask: {mask.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 색상 마스킹 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      lowerOrange = np.array([5, 100, 100])
      upperOrange = np.array([25, 255, 255])
      mask = cv2.inRange(hsv, lowerOrange, upperOrange)
      plt.figure(figsize=(10, 6))
      plt.imshow(mask, cmap='gray')
      plt.title(f'Mask: {mask.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 3단계. 색상 마스킹 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 색상 마스킹 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 색상 마스킹에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step4_morph
  title: 4단계. 마스크 정제
  structuredPrimary: true
  subtitle: 모폴로지 연산
  goal: 4단계. 마스크 정제에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 마스크에 노이즈가 있을 수 있습니다. 모폴로지 연산으로 작은 노이즈를 제거하고 구멍을 채웁니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
    maskOpen = cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)
    maskClean = cv2.morphologyEx(maskOpen, cv2.MORPH_CLOSE, kernel)
    plt.figure(figsize=(10, 6))
    plt.imshow(maskClean, cmap='gray')
    plt.title(f'Mask Clean: {maskClean.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. 마스크 정제 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
      maskOpen = cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)
      maskClean = cv2.morphologyEx(maskOpen, cv2.MORPH_CLOSE, kernel)
      plt.figure(figsize=(10, 6))
      plt.imshow(maskClean, cmap='gray')
      plt.title(f'Mask Clean: {maskClean.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 4단계. 마스크 정제 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 마스크 정제 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 마스크 정제에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_apply
  title: 5단계. 마스크 적용
  structuredPrimary: true
  subtitle: bitwise_and()
  goal: 5단계. 마스크 적용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    bitwise_and()는 비트 단위 AND 연산을 수행합니다. mask 파라미터를 사용하면 마스크가 흰색(255)인 픽셀만 연산 결과가 유지되고, 검은색(0)인 픽셀은 0이 됩니다. 이를 통해 원본 이미지에서 특정 영역만 추출하는 마스킹(masking) 효과를 얻습니다.

    bitwise_and(src1, src2, mask=mask)는 mask가 0이 아닌 픽셀에서만 연산을 수행합니다. src1과 src2가 같으면 마스킹 효과가 됩니다.
  tips:
  - bitwise_and(src1, src2, mask=mask)는 mask가 0이 아닌 픽셀에서만 연산을 수행합니다. src1과 src2가 같으면 마스킹 효과가 됩니다.
  snippet: |-
    masked = cv2.bitwise_and(scene, scene, mask=maskClean)
    plt.figure(figsize=(10, 6))
    plt.imshow(cv2.cvtColor(masked, cv2.COLOR_BGR2RGB))
    plt.title(f'Masked: {masked.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 마스크 적용 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      masked = cv2.bitwise_and(scene, scene, mask=maskClean)
      plt.figure(figsize=(10, 6))
      plt.imshow(cv2.cvtColor(masked, cv2.COLOR_BGR2RGB))
      plt.title(f'Masked: {masked.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 5단계. 마스크 적용 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 마스크 적용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 마스크 적용에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step6_contour
  title: 6단계. 컨투어 분석
  structuredPrimary: true
  subtitle: 객체 검출
  goal: 6단계. 컨투어 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 마스크에서 컨투어를 검출하여 객체를 분석합니다. 면적 기준으로 유의미한 영역만 필터링합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    contours, hierarchy = cv2.findContours(maskClean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
    len(contours)
  exercise:
    prompt: 6단계. 컨투어 분석 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      contours, hierarchy = cv2.findContours(maskClean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
      len(contours)
    hints:
    - 6단계. 컨투어 분석 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 컨투어 분석 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 컨투어 분석에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step7_result
  title: 7단계. 최종 결과
  structuredPrimary: true
  subtitle: 파이프라인 결과
  goal: 7단계. 최종 결과에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
