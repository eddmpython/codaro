  goal: 8단계. 종합 비전 파이프라인 검증에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 종합 비전 프로젝트는 색상 필터링, 마스크 정제, 컨투어 분석이 한 번에 이어지는 파이프라인입니다. HSV 범위 계약을 검증하고, 마스크 픽셀 수와 객체 면적을
    확인한 뒤, 기준을 바꾸는 실무 변주까지 점검합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    visionImage = np.zeros((140, 180, 3), dtype=np.uint8)
    visionImage[:] = [35, 35, 35]
    cv2.circle(visionImage, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(visionImage, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(visionImage, (20, 20), 3, (0, 0, 255), -1)

    def validateHsvRange(lower, upper):
        if len(lower) != 3 or len(upper) != 3:
            raise ValueError("HSV 범위는 길이 3이어야 합니다")
        if any(lo > hi for lo, hi in zip(lower, upper)):
            raise ValueError(f"HSV lower가 upper보다 큽니다: {lower} > {upper}")
        return True

    validateHsvRange((0, 80, 80), (10, 255, 255))
