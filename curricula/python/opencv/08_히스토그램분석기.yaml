  title: 7단계. 히스토그램 개선 검증 루프
  structuredPrimary: true
  subtitle: 대비 개선과 입력 채널 확인
  goal: 7단계. 히스토그램 개선 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 히스토그램 평활화는 대비가 좋아 보이는지보다 실제 동적 범위가 넓어졌는지 확인해야 합니다. 그레이스케일 입력을 검증하고 equalizeHist와 CLAHE
    결과를 수치로 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    histGradient = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(histGradient, (45, 25), (115, 75), 135, -1)

    def validateGrayImage(image):
        if image.ndim != 2:
            raise ValueError(f"히스토그램 평활화는 그레이스케일 입력이 필요합니다: {image.shape}")
        return True

    validateGrayImage(histGradient)
