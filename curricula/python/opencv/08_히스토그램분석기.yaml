sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: 히스토그램 분석 준비
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: sklearn의 flower 이미지를 불러옵니다. 히스토그램 분석은 이미지의 밝기 분포를 이해하는 데 도움이 됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    flower = load_sample_image('flower.jpg')
    original = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
    gray = cv2.cvtColor(original, cv2.COLOR_BGR2GRAY)
    plt.figure(figsize=(8, 6))
    plt.imshow(gray, cmap='gray')
    plt.title(f'Grayscale: {gray.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flower = load_sample_image('flower.jpg')
      original = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
      gray = cv2.cvtColor(original, cv2.COLOR_BGR2GRAY)
      plt.figure(figsize=(8, 6))
      plt.imshow(gray, cmap='gray')
      plt.title(f'Grayscale: {gray.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 이미지 불러오기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 이미지 불러오기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_calc
  title: 2단계. 히스토그램 계산
  structuredPrimary: true
  subtitle: calcHist()
  goal: 2단계. 히스토그램 계산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    calcHist()는 히스토그램을 계산하는 함수입니다. 히스토그램의 각 빈(bin)은 특정 밝기 범위에 속하는 픽셀 수를 나타냅니다. 256개 빈을 사용하면 각 밝기 값(0-255)별 픽셀 수를 얻습니다. 히스토그램의 분포를 보면 이미지가 어두운지(왼쪽에 집중), 밝은지(오른쪽에 집중), 대비가 낮은지(좁은 범위에 집중) 파악할 수 있습니다.

    calcHist([images], [channels], mask, [histSize], [ranges])에서 images와 channels는 리스트입니다. histSize는 빈(bin) 개수, ranges는 값 범위입니다. None 마스크는 전체 이미지를 사용합니다.
  tips:
  - calcHist([images], [channels], mask, [histSize], [ranges])에서 images와 channels는 리스트입니다. histSize는 빈(bin)
    개수, ranges는 값 범위입니다. None 마스크는 전체 이미지를 사용합니다.
  snippet: |-
    hist = cv2.calcHist([gray], [0], None, [256], [0, 256])
    plt.figure(figsize=(10, 4))
    plt.plot(hist, color='gray')
    plt.title(f'Histogram: {hist.shape}')
    plt.xlabel('Pixel Value')
    plt.ylabel('Frequency')
    plt.xlim([0, 256])
    plt.tight_layout()
  exercise:
    prompt: 2단계. 히스토그램 계산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      hist = cv2.calcHist([gray], [0], None, [256], [0, 256])
      plt.figure(figsize=(10, 4))
      plt.plot(hist, color='gray')
      plt.title(f'Histogram: {hist.shape}')
      plt.xlabel('Pixel Value')
      plt.ylabel('Frequency')
      plt.xlim([0, 256])
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 히스토그램 계산의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 히스토그램 계산 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_equalize
  title: 3단계. 히스토그램 평활화
  structuredPrimary: true
  subtitle: equalizeHist()
  goal: 3단계. 히스토그램 평활화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    equalizeHist()는 히스토그램 평활화(histogram equalization)를 수행합니다. 누적 분포 함수(CDF, Cumulative Distribution Function)를 이용해 픽셀 값을 재분배하여, 히스토그램이 0-255 전체 범위에 고르게 분포하도록 만듭니다. 이를 통해 대비(contrast)가 향상되어 어둡거나 흐릿한 이미지의 디테일이 살아납니다.

    평활화 후 히스토그램이 전체 범위에 걸쳐 더 고르게 분포합니다. 이는 대비 향상을 의미합니다. 하지만 과도한 평활화는 부자연스러울 수 있습니다.
  tips:
  - 평활화 후 히스토그램이 전체 범위에 걸쳐 더 고르게 분포합니다. 이는 대비 향상을 의미합니다. 하지만 과도한 평활화는 부자연스러울 수 있습니다.
  snippet: |-
    equalized = cv2.equalizeHist(gray)
    plt.figure(figsize=(8, 6))
    plt.imshow(equalized, cmap='gray')
    plt.title('Equalized')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 히스토그램 평활화 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      equalized = cv2.equalizeHist(gray)
      plt.figure(figsize=(8, 6))
      plt.imshow(equalized, cmap='gray')
      plt.title('Equalized')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 히스토그램 평활화의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 히스토그램 평활화 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_clahe
  title: 4단계. CLAHE
  structuredPrimary: true
  subtitle: 적응형 히스토그램 평활화
  goal: 4단계. CLAHE에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    CLAHE(Contrast Limited Adaptive Histogram Equalization, 대비 제한 적응형 히스토그램 평활화)는 이미지를 작은 타일(tile)로 나누어 각각 평활화합니다. 전역 평활화(equalizeHist)는 밝은 영역과 어두운 영역이 함께 있을 때 한쪽이 과도하게 변할 수 있지만, CLAHE는 지역별로 처리하므로 자연스럽습니다. clipLimit은 대비 증폭을 제한하여 노이즈 증가를 방지합니다.

    clipLimit은 대비 제한 값으로, 높으면 대비가 강해집니다. tileGridSize는 영역 분할 크기입니다. (8, 8)은 이미지를 8x8 블록으로 나눕니다.
  tips:
  - clipLimit은 대비 제한 값으로, 높으면 대비가 강해집니다. tileGridSize는 영역 분할 크기입니다. (8, 8)은 이미지를 8x8 블록으로 나눕니다.
  snippet: |-
    clahe = cv2.createCLAHE(clipLimit=2.0, tileGridSize=(8, 8))
    type(clahe)
  exercise:
    prompt: 4단계. CLAHE 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      clahe = cv2.createCLAHE(clipLimit=2.0, tileGridSize=(8, 8))
      type(clahe)
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 4단계. CLAHE의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 4단계. CLAHE 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step5_color
  title: 5단계. 컬러 이미지 평활화
  structuredPrimary: true
  subtitle: LAB 색공간 활용
  goal: 5단계. 컬러 이미지 평활화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    컬러 이미지에 평활화를 적용하려면 LAB 색공간을 사용합니다. L 채널(밝기)만 평활화하면 색상이 왜곡되지 않습니다.

    LAB 색공간에서 L은 밝기, A와 B는 색상 정보입니다. L만 처리하면 색상을 유지하면서 대비를 개선할 수 있습니다.
  tips:
  - LAB 색공간에서 L은 밝기, A와 B는 색상 정보입니다. L만 처리하면 색상을 유지하면서 대비를 개선할 수 있습니다.
  snippet: |-
    lab = cv2.cvtColor(original, cv2.COLOR_BGR2LAB)
    lCh, aCh, bCh = cv2.split(lab)
    plt.figure(figsize=(8, 6))
    plt.imshow(lCh, cmap='gray')
    plt.title(f'L Channel: {lCh.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 컬러 이미지 평활화 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      lab = cv2.cvtColor(original, cv2.COLOR_BGR2LAB)
      lCh, aCh, bCh = cv2.split(lab)
      plt.figure(figsize=(8, 6))
      plt.imshow(lCh, cmap='gray')
      plt.title(f'L Channel: {lCh.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 컬러 이미지 평활화의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 컬러 이미지 평활화 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step6_params
  title: 6단계. CLAHE 파라미터
  structuredPrimary: true
  subtitle: clipLimit와 tileGridSize
  goal: 6단계. CLAHE 파라미터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: CLAHE의 두 파라미터가 결과에 미치는 영향을 확인합니다. clipLimit은 대비 강도, tileGridSize는 지역성을 조절합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    claheLow = cv2.createCLAHE(clipLimit=1.0, tileGridSize=(8, 8))
    claheMid = cv2.createCLAHE(clipLimit=4.0, tileGridSize=(8, 8))
    claheHigh = cv2.createCLAHE(clipLimit=8.0, tileGridSize=(8, 8))
    enhLow = claheLow.apply(gray)
    enhMid = claheMid.apply(gray)
    enhHigh = claheHigh.apply(gray)
    figCl, axCl = plt.subplots(1, 3, figsize=(12, 4))
    axCl[0].imshow(enhLow, cmap='gray')
    axCl[0].set_title('clipLimit=1.0')
    axCl[0].axis('off')
    axCl[1].imshow(enhMid, cmap='gray')
    axCl[1].set_title('clipLimit=4.0')
    axCl[1].axis('off')
    axCl[2].imshow(enhHigh, cmap='gray')
    axCl[2].set_title('clipLimit=8.0')
    axCl[2].axis('off')
