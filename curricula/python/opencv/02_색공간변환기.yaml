      + 0.114B 공식을 사용하는데, 이는 인간의 눈이 녹색에 가장 민감하고 파란색에 가장 둔감하기 때문입니다. 에지 검출, 이진화, 히스토그램 분석 등 많은 이미지 처리가 그레이스케일에서 수행됩니다.
