- id: step3_hsv
  title: 3단계. HSV 색공간
  structuredPrimary: true
  subtitle: 색상, 채도, 명도
  goal: '3단계. HSV 색공간: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. HSV 색공간: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    HSV는 Hue(색상), Saturation(채도), Value(명도)로 색을 표현하는 색공간입니다. Hue는 색의 종류(빨강, 노랑, 초록 등)를 각도로 표현하고, Saturation은 색의 선명도(회색~원색), Value는 밝기(검정~밝음)를 나타냅니다. RGB에서는 "빨간색 계열"을 찾으려면 복잡한 조건이 필요하지만, HSV에서는 H 값만 보면 됩니다. 색상 기반 객체 추적, 크로마키(배경 제거) 등에 널리 사용됩니다.

    OpenCV의 HSV에서 H는 0-179 범위입니다(일반적인 0-360의 절반). S와 V는 0-255 범위입니다. H=0은 빨강, H=60은 초록, H=120은 파랑입니다.
  tips:
  - OpenCV의 HSV에서 H는 0-179 범위입니다(일반적인 0-360의 절반). S와 V는 0-255 범위입니다. H=0은 빨강, H=60은 초록, H=120은 파랑입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
    plt.figure(figsize=(10, 6))
    plt.imshow(hsv)
    plt.title(f'HSV: {hsv.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: '3단계. HSV 색공간: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
      plt.figure(figsize=(10, 6))
      plt.imshow(hsv)
      plt.title(f'HSV: {hsv.shape}')
      plt.axis('off')
      plt.tight_layout()
    solution: |-
      hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
      plt.figure(figsize=(10, 6))
      plt.imshow(hsv)
      plt.title(f'HSV: {hsv.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: HSV는 Hue(색상), Saturation(채도), Value(명도)로 색을 표현하는 색공간입니다. Hue는 색의 종류(빨강, 노랑, 초록 등)를 각도로 표현하고, Saturation은 색의 선명도(회색~원색),
      Value는 밝기(검정~밝음)를 나타냅니다. RGB에서는 "빨간색 계열"을 찾으려면 복잡한 조건이 필요하지만, HSV에서는 H 값만 보면 됩니다. 색상 기반 객체 추적, 크로마키(배경 제거) 등에 널리 사용됩니다.
  - type: code
    language: python
    title: HSV 변환
    description: BGR을 HSV로 변환합니다
    content: |-
      hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
      plt.figure(figsize=(10, 6))
      plt.imshow(hsv)
      plt.title(f'HSV: {hsv.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: HSV 채널 분리
    description: H, S, V를 개별 확인합니다
    content: |-
      hue, sat, val = cv2.split(hsv)
      figSplit, axSplit = plt.subplots(1, 3, figsize=(12, 4))
      axSplit[0].imshow(hue, cmap='hsv')
      axSplit[0].set_title(f'Hue: {hue.shape}')
      axSplit[0].axis('off')
      axSplit[1].imshow(sat, cmap='gray')
      axSplit[1].set_title(f'Saturation: {sat.shape}')
      axSplit[1].axis('off')
      axSplit[2].imshow(val, cmap='gray')
      axSplit[2].set_title(f'Value: {val.shape}')
      axSplit[2].axis('off')
      plt.tight_layout()
  - type: tip
    content: OpenCV의 HSV에서 H는 0-179 범위입니다(일반적인 0-360의 절반). S와 V는 0-255 범위입니다. H=0은 빨강, H=60은 초록, H=120은 파랑입니다.
  - type: code
    language: python
    title: HSV 채널 시각화
    description: 세 채널을 나란히 표시합니다
    content: |-
      figHsv, axHsv = plt.subplots(1, 3, figsize=(12, 4))
      axHsv[0].imshow(hue, cmap='hsv')
      axHsv[0].set_title('Hue (Color)')
      axHsv[0].axis('off')
      axHsv[1].imshow(sat, cmap='gray')
      axHsv[1].set_title('Saturation')
      axHsv[1].axis('off')
      axHsv[2].imshow(val, cmap='gray')
      axHsv[2].set_title('Value (Brightness)')
      axHsv[2].axis('off')
      plt.tight_layout()
- id: step4_lab
  title: 4단계. LAB 색공간
  structuredPrimary: true
  subtitle: 밝기와 색 분리
  goal: '4단계. LAB 색공간: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. LAB 색공간: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    LAB(또는 L*a*b*) 색공간은 L(Lightness, 밝기), A(녹색-빨강 축), B(파랑-노랑 축)로 구성됩니다. CIE(국제조명위원회)가 인간의 색 인지를 모델링하여 만든 색공간으로, 모든 인간이 볼 수 있는 색을 포함합니다. L 채널은 밝기만, A와 B 채널은 색상만 담당하여 완전히 분리됩니다. 이 특성 덕분에 L 채널에만 히스토그램 평활화를 적용하면 색상 왜곡 없이 대비를 개선할 수 있습니다.

    LAB의 L 채널은 그레이스케일과 유사하지만 인간의 시각 인지에 더 가깝게 설계되었습니다. A는 녹색(-) ~ 빨강(+), B는 파랑(-) ~ 노랑(+) 축입니다.
  tips:
  - LAB의 L 채널은 그레이스케일과 유사하지만 인간의 시각 인지에 더 가깝게 설계되었습니다. A는 녹색(-) ~ 빨강(+), B는 파랑(-) ~ 노랑(+) 축입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    lab = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2LAB)
    plt.figure(figsize=(10, 6))
    plt.imshow(lab)
    plt.title(f'LAB: {lab.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: '4단계. LAB 색공간: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
