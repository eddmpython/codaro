- id: step2_gray
  title: 2단계. 그레이스케일 변환
  structuredPrimary: true
  subtitle: COLOR_BGR2GRAY
  goal: '2단계. 그레이스케일 변환: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 그레이스케일 변환: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    그레이스케일(grayscale, 흑백) 변환은 가장 기본적인 색공간 변환입니다. 컬러 이미지의 3채널(R, G, B)을 1채널(밝기)로 변환합니다. 단순 평균이 아닌 Y = 0.299R + 0.587G + 0.114B 공식을 사용하는데, 이는 인간의 눈이 녹색에 가장 민감하고 파란색에 가장 둔감하기 때문입니다. 에지 검출, 이진화, 히스토그램 분석 등 많은 이미지 처리가 그레이스케일에서 수행됩니다.

    그레이스케일은 2차원 배열입니다. shape이 (높이, 너비)로 채널이 없습니다. Y = 0.299R + 0.587G + 0.114B 공식으로 밝기를 계산합니다.
  tips:
  - 그레이스케일은 2차원 배열입니다. shape이 (높이, 너비)로 채널이 없습니다. Y = 0.299R + 0.587G + 0.114B 공식으로 밝기를 계산합니다.
  - matplotlib에서 2D 배열을 imshow()하면 기본적으로 컬러맵이 적용됩니다. cmap='gray'를 지정해야 올바른 흑백으로 표시됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    gray = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2GRAY)
    plt.figure(figsize=(10, 6))
    plt.imshow(gray, cmap='gray')
    plt.title(f'Grayscale: {gray.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: '2단계. 그레이스케일 변환: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
