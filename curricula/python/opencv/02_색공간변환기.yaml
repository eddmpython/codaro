  blocks:
  - type: text
    content: LAB(또는 L*a*b*) 색공간은 L(Lightness, 밝기), A(녹색-빨강 축), B(파랑-노랑 축)로 구성됩니다. CIE(국제조명위원회)가 인간의 색 인지를 모델링하여 만든 색공간으로,
      모든 인간이 볼 수 있는 색을 포함합니다. L 채널은 밝기만, A와 B 채널은 색상만 담당하여 완전히 분리됩니다. 이 특성 덕분에 L 채널에만 히스토그램 평활화를 적용하면 색상 왜곡 없이 대비를 개선할 수 있습니다.
  - type: code
    language: python
    title: LAB 변환
    description: BGR을 LAB로 변환합니다
    content: |-
      lab = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2LAB)
      plt.figure(figsize=(10, 6))
      plt.imshow(lab)
      plt.title(f'LAB: {lab.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: LAB 채널 분리
    description: L, A, B를 분리합니다
    content: |-
      lCh, aCh, bCh = cv2.split(lab)
      plt.figure(figsize=(10, 6))
      plt.imshow(lCh, cmap='gray')
      plt.title(f'L Channel: {lCh.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: LAB의 L 채널은 그레이스케일과 유사하지만 인간의 시각 인지에 더 가깝게 설계되었습니다. A는 녹색(-) ~ 빨강(+), B는 파랑(-) ~ 노랑(+) 축입니다.
  - type: code
    language: python
    title: LAB 채널 시각화
    description: 세 채널을 나란히 표시합니다
    content: |-
      figLab, axLab = plt.subplots(1, 3, figsize=(12, 4))
      axLab[0].imshow(lCh, cmap='gray')
      axLab[0].set_title('L (Lightness)')
      axLab[0].axis('off')
      axLab[1].imshow(aCh, cmap='RdYlGn_r')
      axLab[1].set_title('A (Green-Red)')
      axLab[1].axis('off')
      axLab[2].imshow(bCh, cmap='YlGnBu_r')
      axLab[2].set_title('B (Blue-Yellow)')
      axLab[2].axis('off')
      plt.tight_layout()
