- id: workflow_validation
  title: 8단계. 색공간 변환 검증 루프
  structuredPrimary: true
  subtitle: BGR → HSV → 마스크 확인
  goal: 8단계. 색공간 변환 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 색공간 변환은 결과 이미지가 예쁘게 보이는지보다, 원하는 색이 안정적으로 분리되는지가 중요합니다. 기준 색 패치를 만들고 HSV 마스크 면적을 검증한 뒤,
    변환 코드 오류와 임계값 변주를 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    colorImage = np.zeros((90, 120, 3), dtype=np.uint8)
    colorImage[:, :60] = [0, 0, 255]
    colorImage[:, 60:] = [0, 180, 0]

    def validateColorImage(image):
        if image.ndim != 3 or image.shape[2] != 3:
            raise ValueError("색공간 변환에는 BGR 3채널 이미지가 필요합니다")
        return True

    validateColorImage(colorImage)
