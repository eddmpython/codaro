- id: step2_gray
  title: 2단계. 그레이스케일 변환
  structuredPrimary: true
  subtitle: COLOR_BGR2GRAY
  goal: 2단계. 그레이스케일 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    그레이스케일(grayscale, 흑백) 변환은 가장 기본적인 색공간 변환입니다. 컬러 이미지의 3채널(R, G, B)을 1채널(밝기)로 변환합니다. 단순 평균이 아닌 Y = 0.299R + 0.587G + 0.114B 공식을 사용하는데, 이는 인간의 눈이 녹색에 가장 민감하고 파란색에 가장 둔감하기 때문입니다. 에지 검출, 이진화, 히스토그램 분석 등 많은 이미지 처리가 그레이스케일에서 수행됩니다.

    그레이스케일은 2차원 배열입니다. shape이 (높이, 너비)로 채널이 없습니다. Y = 0.299R + 0.587G + 0.114B 공식으로 밝기를 계산합니다.
  tips:
  - 그레이스케일은 2차원 배열입니다. shape이 (높이, 너비)로 채널이 없습니다. Y = 0.299R + 0.587G + 0.114B 공식으로 밝기를 계산합니다.
  snippet: |-
    gray = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2GRAY)
    plt.figure(figsize=(10, 6))
    plt.imshow(gray, cmap='gray')
    plt.title(f'Grayscale: {gray.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 2단계. 그레이스케일 변환 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      gray = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2GRAY)
      plt.figure(figsize=(10, 6))
      plt.imshow(gray, cmap='gray')
      plt.title(f'Grayscale: {gray.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 2단계. 그레이스케일 변환 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 그레이스케일 변환 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 그레이스케일 변환에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step3_hsv
  title: 3단계. HSV 색공간
  structuredPrimary: true
  subtitle: 색상, 채도, 명도
  goal: 3단계. HSV 색공간에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    HSV는 Hue(색상), Saturation(채도), Value(명도)로 색을 표현하는 색공간입니다. Hue는 색의 종류(빨강, 노랑, 초록 등)를 각도로 표현하고, Saturation은 색의 선명도(회색~원색), Value는 밝기(검정~밝음)를 나타냅니다. RGB에서는 "빨간색 계열"을 찾으려면 복잡한 조건이 필요하지만, HSV에서는 H 값만 보면 됩니다. 색상 기반 객체 추적, 크로마키(배경 제거) 등에 널리 사용됩니다.

    OpenCV의 HSV에서 H는 0-179 범위입니다(일반적인 0-360의 절반). S와 V는 0-255 범위입니다. H=0은 빨강, H=60은 초록, H=120은 파랑입니다.
  tips:
  - OpenCV의 HSV에서 H는 0-179 범위입니다(일반적인 0-360의 절반). S와 V는 0-255 범위입니다. H=0은 빨강, H=60은 초록, H=120은 파랑입니다.
  snippet: |-
    hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
    plt.figure(figsize=(10, 6))
    plt.imshow(hsv)
    plt.title(f'HSV: {hsv.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. HSV 색공간 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      hsv = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2HSV)
      plt.figure(figsize=(10, 6))
      plt.imshow(hsv)
      plt.title(f'HSV: {hsv.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 3단계. HSV 색공간 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. HSV 색공간 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. HSV 색공간에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step4_lab
  title: 4단계. LAB 색공간
  structuredPrimary: true
  subtitle: 밝기와 색 분리
  goal: 4단계. LAB 색공간에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    LAB(또는 L*a*b*) 색공간은 L(Lightness, 밝기), A(녹색-빨강 축), B(파랑-노랑 축)로 구성됩니다. CIE(국제조명위원회)가 인간의 색 인지를 모델링하여 만든 색공간으로, 모든 인간이 볼 수 있는 색을 포함합니다. L 채널은 밝기만, A와 B 채널은 색상만 담당하여 완전히 분리됩니다. 이 특성 덕분에 L 채널에만 히스토그램 평활화를 적용하면 색상 왜곡 없이 대비를 개선할 수 있습니다.

    LAB의 L 채널은 그레이스케일과 유사하지만 인간의 시각 인지에 더 가깝게 설계되었습니다. A는 녹색(-) ~ 빨강(+), B는 파랑(-) ~ 노랑(+) 축입니다.
  tips:
  - LAB의 L 채널은 그레이스케일과 유사하지만 인간의 시각 인지에 더 가깝게 설계되었습니다. A는 녹색(-) ~ 빨강(+), B는 파랑(-) ~ 노랑(+) 축입니다.
  snippet: |-
    lab = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2LAB)
    plt.figure(figsize=(10, 6))
    plt.imshow(lab)
    plt.title(f'LAB: {lab.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. LAB 색공간 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      lab = cv2.cvtColor(photoBgr, cv2.COLOR_BGR2LAB)
      plt.figure(figsize=(10, 6))
      plt.imshow(lab)
      plt.title(f'LAB: {lab.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 4단계. LAB 색공간 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. LAB 색공간 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. LAB 색공간에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
