  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: BGR 변환 준비
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: sklearn의 china 이미지를 불러와 BGR로 변환합니다. OpenCV의 cvtColor() 함수는 BGR 이미지를 기준으로 다양한 색공간으로 변환합니다.
  tips:
