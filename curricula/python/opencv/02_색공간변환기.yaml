- id: step6_back
  title: 6단계. 역변환
  structuredPrimary: true
  subtitle: 색공간 복원
  goal: 6단계. 역변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    HSV나 LAB에서 수정 후 다시 BGR/RGB로 변환할 수 있습니다. 변환 과정에서 약간의 정보 손실이 있을 수 있습니다.

    색공간 변환은 대부분 가역적이지만, 양자화 오차로 완벽히 동일하지 않을 수 있습니다. 정밀한 작업에서는 이 점을 고려해야 합니다.
  tips:
  - 색공간 변환은 대부분 가역적이지만, 양자화 오차로 완벽히 동일하지 않을 수 있습니다. 정밀한 작업에서는 이 점을 고려해야 합니다.
  snippet: |-
    backBgr = cv2.cvtColor(hsv, cv2.COLOR_HSV2BGR)
    backRgb = cv2.cvtColor(backBgr, cv2.COLOR_BGR2RGB)
    plt.figure(figsize=(10, 6))
    plt.imshow(backRgb)
    plt.title(f'Restored: {backRgb.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 6단계. 역변환 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      backBgr = cv2.cvtColor(hsv, cv2.COLOR_HSV2BGR)
      backRgb = cv2.cvtColor(backBgr, cv2.COLOR_BGR2RGB)
      plt.figure(figsize=(10, 6))
