sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    네트워크 상태에 영향을 받지 않도록 sklearn에 내장된 샘플 이미지를 사용합니다.

    sklearn 샘플 이미지는 RGB 형식입니다. OpenCV는 BGR을 사용하므로 cvtColor()로 변환합니다. flower.jpg와 china.jpg 두 개의 샘플이 있습니다.
  tips:
  - sklearn 샘플 이미지는 RGB 형식입니다. OpenCV는 BGR을 사용하므로 cvtColor()로 변환합니다. flower.jpg와 china.jpg 두 개의 샘플이 있습니다.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image
    import matplotlib.pyplot as plt

    flowerArr = load_sample_image('flower.jpg')
    frame = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
    plt.figure(figsize=(8, 6))
    plt.imshow(flowerArr)
    plt.title(f'Original: {frame.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flowerArr = load_sample_image('flower.jpg')
      frame = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
      plt.figure(figsize=(8, 6))
      plt.imshow(flowerArr)
      plt.title(f'Original: {frame.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 1단계. 이미지 불러오기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 이미지 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 이미지 불러오기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step2_resize
  title: 2단계. 크기 조절
  structuredPrimary: true
  subtitle: resize()
  goal: 2단계. 크기 조절에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    resize()는 이미지 크기를 변경합니다. 크기를 바꿀 때 새로운 픽셀 값을 계산해야 하는데, 이 계산 방법을 보간법(interpolation)이라고 합니다. 이미지를 확대하면 원래 없던 픽셀을 만들어야 하고, 축소하면 여러 픽셀을 하나로 합쳐야 합니다. 보간법에 따라 처리 속도와 화질이 달라집니다.

    resize()의 dsize는 (너비, 높이) 순서입니다. shape은 (높이, 너비, 채널)이므로 순서가 반대입니다. 주의하세요.
  tips:
  - resize()의 dsize는 (너비, 높이) 순서입니다. shape은 (높이, 너비, 채널)이므로 순서가 반대입니다. 주의하세요.
  snippet: |-
    resized = cv2.resize(frame, (300, 200))
    plt.figure(figsize=(6, 4))
    plt.imshow(cv2.cvtColor(resized, cv2.COLOR_BGR2RGB))
    plt.title(f'Resized: {resized.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 2단계. 크기 조절 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      resized = cv2.resize(frame, (300, 200))
      plt.figure(figsize=(6, 4))
      plt.imshow(cv2.cvtColor(resized, cv2.COLOR_BGR2RGB))
      plt.title(f'Resized: {resized.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 2단계. 크기 조절 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 크기 조절 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 크기 조절에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step3_rotate
  title: 3단계. 이미지 회전
  structuredPrimary: true
  subtitle: rotate()
  goal: 3단계. 이미지 회전에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    cv2.rotate()는 90도 단위 회전을 수행합니다. 임의 각도 회전은 getRotationMatrix2D()와 warpAffine()을 사용합니다.

    cv2.rotate()는 ROTATE_90_CLOCKWISE, ROTATE_180, ROTATE_90_COUNTERCLOCKWISE 세 가지 옵션만 제공합니다. 임의 각도 회전은 아핀 변환을 사용해야 합니다.
  tips:
  - cv2.rotate()는 ROTATE_90_CLOCKWISE, ROTATE_180, ROTATE_90_COUNTERCLOCKWISE 세 가지 옵션만 제공합니다. 임의 각도 회전은
    아핀 변환을 사용해야 합니다.
  snippet: |-
    rotatedCw = cv2.rotate(frame, cv2.ROTATE_90_CLOCKWISE)
    plt.figure(figsize=(6, 8))
    plt.imshow(cv2.cvtColor(rotatedCw, cv2.COLOR_BGR2RGB))
    plt.title(f'90° CW: {rotatedCw.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 이미지 회전 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      rotatedCw = cv2.rotate(frame, cv2.ROTATE_90_CLOCKWISE)
      plt.figure(figsize=(6, 8))
      plt.imshow(cv2.cvtColor(rotatedCw, cv2.COLOR_BGR2RGB))
      plt.title(f'90° CW: {rotatedCw.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 3단계. 이미지 회전 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 이미지 회전 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 이미지 회전에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step4_flip
  title: 4단계. 이미지 뒤집기
  structuredPrimary: true
  subtitle: flip()
  goal: 4단계. 이미지 뒤집기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    flip()은 이미지를 거울처럼 뒤집는 함수입니다. 수평 뒤집기(좌우 반전)는 셀카를 거울처럼 보이게 할 때, 수직 뒤집기(상하 반전)는 물에 비친 반사 효과를 만들 때 사용합니다. flipCode 파라미터로 방향을 지정합니다.

    flipCode가 1이면 수평(좌우), 0이면 수직(상하), -1이면 양방향 뒤집기입니다. 양방향 뒤집기는 180도 회전과 동일한 결과입니다.
  tips:
  - flipCode가 1이면 수평(좌우), 0이면 수직(상하), -1이면 양방향 뒤집기입니다. 양방향 뒤집기는 180도 회전과 동일한 결과입니다.
  snippet: |-
    flippedH = cv2.flip(frame, 1)
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(flippedH, cv2.COLOR_BGR2RGB))
    plt.title('Horizontal Flip')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. 이미지 뒤집기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      flippedH = cv2.flip(frame, 1)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(flippedH, cv2.COLOR_BGR2RGB))
      plt.title('Horizontal Flip')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 4단계. 이미지 뒤집기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 이미지 뒤집기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 이미지 뒤집기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_crop
  title: 5단계. 이미지 자르기
  structuredPrimary: true
  subtitle: 배열 슬라이싱
  goal: 5단계. 이미지 자르기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    OpenCV에서 자르기는 NumPy 슬라이싱으로 수행합니다. img[y1:y2, x1:x2]로 사각형 영역을 추출합니다. y(행)가 먼저, x(열)가 나중입니다.

    슬라이싱은 뷰를 반환합니다. 원본을 수정하지 않으려면 .copy()를 사용하세요. cropped = frame[y1:y2, x1:x2].copy()
  tips:
  - 슬라이싱은 뷰를 반환합니다. 원본을 수정하지 않으려면 .copy()를 사용하세요. cropped = frame[y1:y2, x1:x2].copy()
  snippet: |-
    h, w = frame.shape[:2]
    y1, y2 = h // 4, h * 3 // 4
    x1, x2 = w // 4, w * 3 // 4
    cropped = frame[y1:y2, x1:x2]
    plt.figure(figsize=(8, 6))
    plt.imshow(cv2.cvtColor(cropped, cv2.COLOR_BGR2RGB))
    plt.title(f'Cropped: {cropped.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 이미지 자르기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      h, w = frame.shape[:2]
      y1, y2 = h // 4, h * 3 // 4
      x1, x2 = w // 4, w * 3 // 4
      cropped = frame[y1:y2, x1:x2]
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(cropped, cv2.COLOR_BGR2RGB))
      plt.title(f'Cropped: {cropped.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 5단계. 이미지 자르기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 이미지 자르기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 이미지 자르기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step6_combine
  title: 6단계. 변환 조합
  structuredPrimary: true
  subtitle: 여러 변환 연결
  goal: 6단계. 변환 조합에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 여러 기하학적 변환을 순차적으로 적용할 수 있습니다. 자르기 → 리사이즈 → 회전 순서로 적용해봅시다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    step1 = frame[50:350, 100:400]
    step2 = cv2.resize(step1, (200, 200))
    final = cv2.rotate(step2, cv2.ROTATE_90_CLOCKWISE)
    plt.figure(figsize=(6, 6))
    plt.imshow(cv2.cvtColor(final, cv2.COLOR_BGR2RGB))
    plt.title(f'Final: {final.shape}')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 6단계. 변환 조합 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      step1 = frame[50:350, 100:400]
      step2 = cv2.resize(step1, (200, 200))
      final = cv2.rotate(step2, cv2.ROTATE_90_CLOCKWISE)
      plt.figure(figsize=(6, 6))
      plt.imshow(cv2.cvtColor(final, cv2.COLOR_BGR2RGB))
      plt.title(f'Final: {final.shape}')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 6단계. 변환 조합 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 변환 조합 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 변환 조합에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 기하 변환 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    sklearn 이미지에 다양한 기하학적 변환을 적용해봅시다.

