- id: workflow_validation
  title: 7단계. 기하 변환 검증 루프
  structuredPrimary: true
  subtitle: 크기, 회전, crop 계약 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 기하학적 변환은 화면에 맞춰 보정하는 작업이지만, 실무에서는 출력 크기와 관심 영역이 정확한지가 더 중요합니다. 스케일 오류를 먼저 잡고 resize, rotate, crop 결과를 수치로 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    geoImage = np.zeros((80, 120, 3), dtype=np.uint8)
    cv2.rectangle(geoImage, (30, 20), (90, 60), (0, 255, 0), -1)

    def resizeByScale(image, scale):
        if scale <= 0:
            raise ValueError(f"scale은 양수여야 합니다: {scale}")
        return cv2.resize(image, None, fx=scale, fy=scale, interpolation=cv2.INTER_NEAREST)

    resizedGeo = resizeByScale(geoImage, 0.5)
    resizedGeo.shape
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import cv2
      import numpy as np

      geoImage = np.zeros((80, 120, 3), dtype=np.uint8)
      cv2.rectangle(geoImage, (30, 20), (90, 60), (0, 255, 0), -1)

      def resizeByScale(image, scale):
          if scale <= 0:
              raise ValueError(f"scale은 양수여야 합니다: {scale}")
          return cv2.resize(image, None, fx=scale, fy=scale, interpolation=cv2.INTER_NEAREST)

      resizedGeo = resizeByScale(geoImage, 0.5)
      resizedGeo.shape
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
