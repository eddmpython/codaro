- id: start
  blocks:
  - type: sectionHeader
    title: 🎯 시작하기
    subtitle: 첫 번째 프로젝트로
  - type: text
    content: OpenCV를 배우면 이미지를 단순히 보는 것을 넘어 분석하고 이해할 수 있습니다. 에지 검출로 물체의 경계를 찾고, 컨투어로 윤곽을 추출하고, 색상 필터링으로
      특정 영역을 분리하는 등 컴퓨터 비전의 핵심 기술을 익힐 수 있습니다. 첫 번째 프로젝트에서 이미지가 NumPy 배열로 어떻게 표현되는지 알아봅시다.
- id: workflow_validation
  title: 로컬 비전 검증 루프
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  goal: 로컬 비전 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    OpenCV는 화면에 이미지를 띄우는 도구가 아니라, 배열을 입력받아 검증 가능한 결과를 만드는 로컬 비전 파이프라인입니다. 먼저 입력 이미지의 형태와 dtype을 확인하고, 의도적으로 잘못된 입력을 넣어 오류를 확인한 뒤, 에지 검출 결과를 수치로 검증합니다.

    OpenCV 학습의 핵심은 이미지를 눈으로만 확인하지 않고 배열 계약과 결과 지표로 검증하는 습관입니다.
  tips:
  - OpenCV 학습의 핵심은 이미지를 눈으로만 확인하지 않고 배열 계약과 결과 지표로 검증하는 습관입니다.
  snippet: |-
    import cv2
    import numpy as np

    introImage = np.zeros((96, 144, 3), dtype=np.uint8)
