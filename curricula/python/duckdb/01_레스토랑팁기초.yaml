sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: pandas와 DuckDB 연동
  goal: 1단계. 데이터 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    DuckDB로 SQL 분석을 시작하기 전에 먼저 데이터를 준비해야 합니다. pandas로 CSV 파일을 읽어온 후, duckdb.from_df() 함수를 사용해 DuckDB 테이블로 변환합니다. 이렇게 변환된 테이블에서는 SQL 쿼리를 실행할 수 있습니다. DuckDB는 SQL 기반의 강력한 분석 엔진으로, pandas보다 대용량 데이터 처리가 빠르며 표준 SQL 문법을 그대로 사용할 수 있어 데이터베이스 경험이 있다면 매우 친숙합니다.

    DuckDB는 duckdb.read_csv('파일.csv')나 SQL의 read_csv_auto() 함수로 로컬 파일과 URL을 직접 읽을 수 있습니다. 이 레슨은 pandas로 데이터를 먼저 확인한 뒤 duckdb.from_df()로 넘기는 흐름을 보여주며, 로컬 파일을 다룰 때는 DuckDB의 직접 읽기 기능도 함께 활용할 수 있습니다.
  tips:
  - DuckDB는 duckdb.read_csv('파일.csv')나 SQL의 read_csv_auto() 함수로 로컬 파일과 URL을 직접 읽을 수 있습니다. 이 레슨은 pandas로
    데이터를 먼저 확인한 뒤 duckdb.from_df()로 넘기는 흐름을 보여주며, 로컬 파일을 다룰 때는 DuckDB의 직접 읽기 기능도 함께 활용할 수 있습니다.
  snippet: |-
    import pandas as pd
    from codaro.curriculum.localData import loadLocalDataset
    import duckdb

    df = loadLocalDataset("tips")
    tips = duckdb.from_df(df)
  exercise:
    prompt: 1단계. 데이터 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import pandas as pd
      from codaro.curriculum.localData import loadLocalDataset
      import duckdb

      df = loadLocalDataset("tips")
      tips = duckdb.from_df(df)
    hints:
    - 1단계. 데이터 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 데이터 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 데이터 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_select_all
  title: 2단계. 전체 데이터 조회
  structuredPrimary: true
  subtitle: SELECT * FROM
  goal: 2단계. 전체 데이터 조회에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    SQL의 가장 기본이 되는 SELECT 문을 배워봅니다. SELECT는 '선택하다'라는 뜻으로, 데이터베이스에서 원하는 데이터를 가져오는 명령입니다. *(별표, asterisk)는 '모든 열'을 의미하며, FROM 뒤에는 데이터를 가져올 테이블 이름을 지정합니다. 즉, "tips_table이라는 테이블에서 모든 열을 가져와라"라는 의미입니다. 이 쿼리는 pandas의 df 변수명만 입력하는 것과 비슷한 결과를 보여줍니다.

    SELECT * FROM 테이블명은 SQL의 가장 기본 구문입니다. *는 wildcard로 '모든 열'을 의미합니다. 실무에서는 필요한 열만 명시하는 것이 좋지만, 데이터 구조를 파악할 때는 *를 사용하면 편리합니다.
  tips:
  - SELECT * FROM 테이블명은 SQL의 가장 기본 구문입니다. *는 wildcard로 '모든 열'을 의미합니다. 실무에서는 필요한 열만 명시하는 것이 좋지만, 데이터 구조를
    파악할 때는 *를 사용하면 편리합니다.
  snippet: tips.query("tips_table", "SELECT * FROM tips_table")
  exercise:
    prompt: 2단계. 전체 데이터 조회 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: tips.query("tips_table", "SELECT * FROM tips_table")
    hints:
    - 2단계. 전체 데이터 조회 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 전체 데이터 조회 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 전체 데이터 조회에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_limit
  title: 3단계. 행 수 제한
  structuredPrimary: true
  subtitle: LIMIT
  goal: 3단계. 행 수 제한에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    데이터가 수백만 건일 때 전체를 다 출력하면 시간도 오래 걸리고 화면도 복잡해집니다. LIMIT 절은 출력할 행의 개수를 제한하는 역할을 합니다. 쿼리 끝에 LIMIT 5를 붙이면 상위 5개 행만 보여줍니다. 이는 pandas의 head() 메서드와 비슷한 기능입니다. 대용량 데이터를 다룰 때 데이터 구조를 빠르게 파악하거나, 쿼리가 제대로 작동하는지 테스트할 때 매우 유용합니다.

    LIMIT n은 결과의 상위 n개 행만 반환합니다. LIMIT는 쿼리의 가장 마지막에 위치하며, ORDER BY와 함께 사용하면 정렬된 결과에서 상위 n개를 가져올 수 있습니다. 일부 데이터베이스에서는 TOP n 또는 FETCH FIRST n ROWS 문법을 사용하기도 하지만, DuckDB는 LIMIT을 사용합니다.
  tips:
  - LIMIT n은 결과의 상위 n개 행만 반환합니다. LIMIT는 쿼리의 가장 마지막에 위치하며, ORDER BY와 함께 사용하면 정렬된 결과에서 상위 n개를 가져올 수 있습니다.
    일부 데이터베이스에서는 TOP n 또는 FETCH FIRST n ROWS 문법을 사용하기도 하지만, DuckDB는 LIMIT을 사용합니다.
  snippet: tips.query("tips_table", "SELECT * FROM tips_table LIMIT 5")
  exercise:
    prompt: 3단계. 행 수 제한 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: tips.query("tips_table", "SELECT * FROM tips_table LIMIT 5")
    hints:
    - 3단계. 행 수 제한 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 행 수 제한 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 행 수 제한에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_select_columns
  title: 4단계. 특정 열 선택
  structuredPrimary: true
  subtitle: SELECT col1, col2
  goal: 4단계. 특정 열 선택에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    항상 모든 열이 필요한 것은 아닙니다. 분석 목적에 따라 필요한 열만 선택하면 데이터 처리 속도가 빨라지고 결과도 깔끔해집니다. SELECT 뒤에 열 이름을 콤마(,)로 구분해서 나열하면 해당 열만 가져옵니다. 예를 들어 총 결제금액(total_bill)과 팁(tip)만 보고 싶다면 "SELECT total_bill, tip"이라고 작성합니다. 이는 pandas의 df[['total_bill', 'tip']] 문법과 비슷한 기능입니다.

    SELECT에서 열 이름을 직접 나열하면 해당 열만 반환됩니다. 열 순서도 나열한 순서대로 출력됩니다. 예를 들어 SELECT tip, total_bill로 순서를 바꾸면 팁 열이 먼저 나옵니다. 실무에서는 *보다 명시적인 열 선택이 권장됩니다.
  tips:
  - SELECT에서 열 이름을 직접 나열하면 해당 열만 반환됩니다. 열 순서도 나열한 순서대로 출력됩니다. 예를 들어 SELECT tip, total_bill로 순서를 바꾸면 팁
    열이 먼저 나옵니다. 실무에서는 *보다 명시적인 열 선택이 권장됩니다.
  snippet: tips.query("tips_table", "SELECT total_bill, tip FROM tips_table LIMIT 5")
  exercise:
    prompt: 4단계. 특정 열 선택 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: tips.query("tips_table", "SELECT total_bill, tip FROM tips_table LIMIT 5")
    hints:
    - 4단계. 특정 열 선택 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 특정 열 선택 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 특정 열 선택에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_alias
  title: 5단계. 별칭 지정
  structuredPrimary: true
  subtitle: AS alias
  goal: 5단계. 별칭 지정에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    SQL 쿼리 결과를 볼 때 열 이름이 영문이거나 복잡한 수식이면 이해하기 어렵습니다. AS 키워드를 사용하면 열에 별칭(alias)을 붙여 결과를 더 읽기 쉽게 만들 수 있습니다. 예를 들어 total_bill을 '총금액'이라는 한글 별칭으로 바꾸거나, 계산식의 결과에 의미 있는 이름을 붙일 수 있습니다. 별칭은 해당 쿼리 결과에만 적용되며 원본 테이블의 열 이름은 변경되지 않습니다. 이는 pandas의 df.rename()과 비슷하지만, SQL에서는 쿼리마다 동적으로 적용할 수 있어 더 유연합니다.

    AS는 열이나 테이블에 임시 이름(별칭)을 부여합니다. 'SELECT total_bill AS 총금액'처럼 사용하며, 결과 컬럼명이 총금액으로 표시됩니다. 계산식에도 사용할 수 있어 'SELECT tip * 2 AS 두배팁'처럼 표현할 수 있습니다. AS는 생략 가능하지만 가독성을 위해 쓰는 것이 좋습니다.
  tips:
  - AS는 열이나 테이블에 임시 이름(별칭)을 부여합니다. 'SELECT total_bill AS 총금액'처럼 사용하며, 결과 컬럼명이 총금액으로 표시됩니다. 계산식에도 사용할 수
    있어 'SELECT tip * 2 AS 두배팁'처럼 표현할 수 있습니다. AS는 생략 가능하지만 가독성을 위해 쓰는 것이 좋습니다.
  snippet: |-
    tips.query("tips_table", """
        SELECT
            total_bill AS 총금액,
            tip AS 팁
        FROM tips_table
        LIMIT 5
    """)
  exercise:
    prompt: 5단계. 별칭 지정 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      tips.query("tips_table", """
          SELECT
              total_bill AS 총금액,
              tip AS 팁
          FROM tips_table
          LIMIT 5
      """)
    hints:
    - 5단계. 별칭 지정 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 별칭 지정 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 별칭 지정에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step6_where_basic
  title: 6단계. 조건 필터링
  structuredPrimary: true
  subtitle: WHERE
  goal: 6단계. 조건 필터링에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    실제 분석에서는 전체 데이터가 아닌 특정 조건을 만족하는 데이터만 필요한 경우가 많습니다. WHERE 절은 조건을 지정해서 원하는 행만 필터링하는 역할을 합니다. 예를 들어 "저녁 시간대(Dinner) 데이터만 보고 싶다"면 WHERE time = 'Dinner'라고 조건을 지정합니다. WHERE는 FROM 뒤에 위치하며, 각 행을 하나씩 검사해서 조건이 참(True)인 행만 결과에 포함시킵니다. 이는 pandas의 df[df['time'] == 'Dinner'] 불린 인덱싱과 동일한 개념입니다.

    WHERE 절은 조건에 맞는 행만 필터링합니다. SQL 실행 순서상 FROM → WHERE → SELECT 순서로 처리되므로, WHERE는 SELECT보다 먼저 실행됩니다. 문자열 조건은 작은따옴표('')로 감싸야 하며, 대소문자를 구분합니다. WHERE time = 'dinner'는 매칭되지 않습니다.
  tips:
  - WHERE 절은 조건에 맞는 행만 필터링합니다. SQL 실행 순서상 FROM → WHERE → SELECT 순서로 처리되므로, WHERE는 SELECT보다 먼저 실행됩니다. 문자열
