- id: step13_round
  title: 13단계. 반올림
  structuredPrimary: true
  subtitle: ROUND
  goal: 13단계. 반올림에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    산술 연산 결과는 종종 소수점이 너무 길어서 보기 불편합니다. ROUND 함수를 사용하면 소수점 자릿수를 조절해 결과를 깔끔하게 만들 수 있습니다. ROUND(값, 자릿수) 형태로 사용하며, 첫 번째 인자는 반올림할 값(열이나 계산식), 두 번째 인자는 남길 소수점 자릿수입니다. 예를 들어 ROUND(3.14159, 2)는 3.14가 되고, ROUND(15.7, 0)은 16이 됩니다. 팁 비율처럼 퍼센트를 표시할 때는 소수점 1~2자리만 남기는 것이 일반적입니다.

    ROUND(값, 자릿수)는 반올림 함수입니다. 두 번째 인자로 소수점 자릿수를 지정합니다. ROUND(3.14159, 2)는 3.14, ROUND(3.14159, 0)은 3입니다. 자릿수를 음수로 하면 정수 부분을 반올림할 수도 있습니다. ROUND(1234, -2)는 1200입니다.
  tips:
  - ROUND(값, 자릿수)는 반올림 함수입니다. 두 번째 인자로 소수점 자릿수를 지정합니다. ROUND(3.14159, 2)는 3.14, ROUND(3.14159, 0)은 3입니다.
    자릿수를 음수로 하면 정수 부분을 반올림할 수도 있습니다. ROUND(1234, -2)는 1200입니다.
  snippet: |-
    tips.query("tips_table", """
        SELECT
            total_bill,
            tip,
            ROUND(tip / total_bill * 100, 1) AS tipPct
        FROM tips_table
        LIMIT 5
    """)
  exercise:
    prompt: 13단계. 반올림 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
