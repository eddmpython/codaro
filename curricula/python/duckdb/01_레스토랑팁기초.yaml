- id: step11_in
  title: 11단계. 목록 조건
  structuredPrimary: true
  subtitle: IN
  goal: 11단계. 목록 조건에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    특정 값 목록 중 하나와 일치하는 데이터를 선택할 때 IN 연산자를 사용합니다. 예를 들어 토요일과 일요일 데이터만 필요하다면 WHERE day = 'Sat' OR day = 'Sun'처럼 OR를 반복하는 대신, WHERE day IN ('Sat', 'Sun')으로 간결하게 표현할 수 있습니다. IN 뒤의 괄호 안에 값들을 콤마로 구분해서 나열하면, 컬럼 값이 목록 중 하나와 일치하는 모든 행이 선택됩니다. 값이 3개 이상일 때 특히 유용하며, 가독성이 크게 향상됩니다.

    IN (값1, 값2, ...)는 컬럼 값이 괄호 안 목록 중 하나와 일치하면 참입니다. WHERE day IN ('Sat', 'Sun', 'Fri')는 WHERE day = 'Sat' OR day = 'Sun' OR day = 'Fri'와 동일하지만 훨씬 간결합니다. NOT IN으로 목록에 없는 값을 선택할 수도 있습니다.
  tips:
  - IN (값1, 값2, ...)는 컬럼 값이 괄호 안 목록 중 하나와 일치하면 참입니다. WHERE day IN ('Sat', 'Sun', 'Fri')는 WHERE day = 'Sat'
    OR day = 'Sun' OR day = 'Fri'와 동일하지만 훨씬 간결합니다. NOT IN으로 목록에 없는 값을 선택할 수도 있습니다.
  snippet: |-
    tips.query("tips_table", """
        SELECT * FROM tips_table
        WHERE day IN ('Sat', 'Sun')
    """)
  exercise:
    prompt: 11단계. 목록 조건 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
