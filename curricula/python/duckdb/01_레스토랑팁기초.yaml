- id: step7_comparison
  title: 7단계. 비교 연산자
  structuredPrimary: true
  subtitle: =, !=, >, <, >=, <=
  goal: 7단계. 비교 연산자에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    WHERE 절에서 다양한 비교 연산자를 사용해 조건을 만들 수 있습니다. 숫자 데이터의 경우 크기 비교가 가능하며, 문자열은 같은지 다른지를 비교할 수 있습니다. SQL에서 사용하는 비교 연산자는 =(같다), !=(다르다), >(크다), <(작다), >=(크거나 같다), <=(작거나 같다)입니다. 주의할 점은 Python의 ==가 아닌 =를 사용한다는 것입니다. 팁이 5달러 이상인 고객을 찾으려면 WHERE tip >= 5라고 작성합니다.

    SQL 비교 연산자는 Python과 약간 다릅니다. Python은 ==를 사용하지만 SQL은 =를 사용합니다. != 대신 <>를 쓸 수도 있으며 둘 다 '같지 않다'를 의미합니다. 숫자 비교는 직관적이지만, 문자열 비교는 사전순으로 처리됩니다. 날짜/시간 타입도 비교 연산자로 범위를 지정할 수 있습니다.
  tips:
  - SQL 비교 연산자는 Python과 약간 다릅니다. Python은 ==를 사용하지만 SQL은 =를 사용합니다. != 대신 <>를 쓸 수도 있으며 둘 다 '같지 않다'를 의미합니다.
