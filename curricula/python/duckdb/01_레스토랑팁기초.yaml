        SELECT
            day AS 요일,
            total_bill AS 총금액,
            tip AS 팁,
            ROUND(tip / total_bill * 100, 1) AS 팁비율,
            size AS 인원
        FROM tips_table
        WHERE day IN ('Sat', 'Sun')
          AND time = 'Dinner'
          AND tip >= 5
          AND total_bill BETWEEN 20 AND 50
    """)
