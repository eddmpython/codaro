  explanation: 지금까지 배운 모든 SQL 기초 개념을 종합하여 실전 분석 쿼리를 작성해봅니다. SELECT로 필요한 열을 선택하고, AS로 한글 별칭을 붙이며, WHERE절에
    AND, IN, BETWEEN을 조합해 복합 조건을 설정합니다. 산술 연산으로 팁 비율을 계산하고 ROUND로 소수점을 정리합니다. 이런 식으로 여러 개념을 조합하면 복잡한 비즈니스
    요구사항도 하나의 SQL 쿼리로 해결할 수 있습니다. "주말 저녁에 20~50달러를 결제하고 5달러 이상 팁을 준 고객"같은 구체적인 분석이 가능합니다.
  tips:
