- id: step8_and
  title: 8단계. AND 연산자
  structuredPrimary: true
  subtitle: 여러 조건 모두 만족
  goal: 8단계. AND 연산자에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    실무에서는 하나의 조건만으로는 부족한 경우가 많습니다. "저녁 시간대이면서 팁이 5달러 이상인 데이터"처럼 여러 조건을 동시에 만족하는 데이터가 필요할 때 AND 연산자를 사용합니다. AND는 논리곱(logical AND)으로, 연결된 모든 조건이 참이어야 해당 행이 결과에 포함됩니다. 조건 1개만 거짓이어도 그 행은 제외됩니다. WHERE 조건1 AND 조건2 AND 조건3 형태로 여러 개를 연결할 수 있습니다. AND를 사용할수록 결과 범위가 좁아집니다.

    AND는 논리곱 연산자로, 모든 조건이 참(TRUE)일 때만 해당 행을 반환합니다. 조건을 추가할수록 결과 데이터는 줄어듭니다. 예를 들어 WHERE A AND B AND C는 A, B, C가 모두 참인 행만 선택합니다. pandas의 df[(조건1) & (조건2)]와 동일한 개념입니다.
  tips:
  - AND는 논리곱 연산자로, 모든 조건이 참(TRUE)일 때만 해당 행을 반환합니다. 조건을 추가할수록 결과 데이터는 줄어듭니다. 예를 들어 WHERE A AND B AND C는
    A, B, C가 모두 참인 행만 선택합니다. pandas의 df[(조건1) & (조건2)]와 동일한 개념입니다.
