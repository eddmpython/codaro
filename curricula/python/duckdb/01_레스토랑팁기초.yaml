          SELECT
              total_bill,
              tip,
              ROUND(tip / total_bill * 100, 1) AS tipPct
          FROM tips_table
          LIMIT 5
      """)
    hints:
    - 13단계. 반올림 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 13단계. 반올림 코드가 예외 없이 끝나야 합니다.
    resultCheck: 13단계. 반올림에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step14_final
  title: 14단계. 최종 결과물
  structuredPrimary: true
  subtitle: 조건별 팁 데이터 필터링
  goal: 14단계. 최종 결과물에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
