- id: step12_arithmetic
  title: 12단계. 산술 연산
  structuredPrimary: true
  subtitle: +, -, *, /
  goal: 12단계. 산술 연산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    SQL은 단순히 데이터를 조회하는 것뿐만 아니라 계산도 수행할 수 있습니다. SELECT 절에서 +, -, *, / 같은 산술 연산자를 사용해 새로운 값을 만들 수 있습니다. 예를 들어 팁이 전체 결제금액의 몇 퍼센트인지 계산하려면 tip / total_bill * 100 같은 수식을 작성합니다. 이렇게 계산된 결과는 새로운 열로 표시되며, AS로 의미 있는 별칭을 붙이면 결과를 이해하기 쉬워집니다. pandas의 df['new_col'] = df['col1'] / df['col2']와 비슷하지만, SQL은 원본 테이블을 변경하지 않고 쿼리 결과에만 나타납니다.

    SELECT 절에서 산술 연산자(+, -, *, /)를 사용해 열 간 계산을 수행할 수 있습니다. tip / total_bill * 100은 팁 비율을 퍼센트로 계산합니다. 계산 결과에는 반드시 AS로 별칭을 붙여주세요. 괄호로 연산 우선순위를 명확히 할 수 있습니다: (tip + 5) * 2
  tips:
  - 'SELECT 절에서 산술 연산자(+, -, *, /)를 사용해 열 간 계산을 수행할 수 있습니다. tip / total_bill * 100은 팁 비율을 퍼센트로 계산합니다.
    계산 결과에는 반드시 AS로 별칭을 붙여주세요. 괄호로 연산 우선순위를 명확히 할 수 있습니다: (tip + 5) * 2'
  snippet: |-
    tips.query("tips_table", """
        SELECT
            total_bill,
            tip,
            tip / total_bill * 100 AS tipPct
        FROM tips_table
        LIMIT 5
    """)
