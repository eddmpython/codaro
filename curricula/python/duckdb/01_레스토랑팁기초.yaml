- id: step10_between
  title: 10단계. 범위 조건
  structuredPrimary: true
  subtitle: BETWEEN
  goal: 10단계. 범위 조건에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    숫자 범위를 지정할 때 BETWEEN 키워드를 사용하면 코드가 간결해집니다. "총 결제 금액이 20달러 이상 30달러 이하"라는 조건을 WHERE total_bill >= 20 AND total_bill <= 30으로 쓸 수 있지만, BETWEEN을 사용하면 WHERE total_bill BETWEEN 20 AND 30으로 더 읽기 쉽게 표현할 수 있습니다. 중요한 점은 BETWEEN은 양 끝값을 포함(inclusive)한다는 것입니다. 즉, 20과 30도 결과에 포함됩니다. 날짜 범위 지정에도 자주 사용됩니다.

    BETWEEN a AND b는 a 이상(>=) b 이하(<=)를 의미합니다. 양 끝값이 포함되므로 BETWEEN 1 AND 10은 1, 2, ..., 10을 모두 포함합니다. WHERE col >= a AND col <= b와 완전히 동일하지만 BETWEEN이 더 간결합니다. NOT BETWEEN으로 범위 밖 값을 선택할 수도 있습니다.
  tips:
  - BETWEEN a AND b는 a 이상(>=) b 이하(<=)를 의미합니다. 양 끝값이 포함되므로 BETWEEN 1 AND 10은 1, 2, ..., 10을 모두 포함합니다.
    WHERE col >= a AND col <= b와 완전히 동일하지만 BETWEEN이 더 간결합니다. NOT BETWEEN으로 범위 밖 값을 선택할 수도 있습니다.
  snippet: |-
    tips.query("tips_table", """
        SELECT * FROM tips_table
        WHERE total_bill BETWEEN 20 AND 30
    """)
  exercise:
