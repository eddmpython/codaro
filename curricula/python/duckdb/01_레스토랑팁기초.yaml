- id: step9_or
  title: 9단계. OR 연산자
  structuredPrimary: true
  subtitle: 조건 중 하나라도 만족
  goal: 9단계. OR 연산자에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    AND와 반대로 OR 연산자는 여러 조건 중 하나라도 만족하면 결과에 포함시킵니다. "토요일이거나 일요일인 데이터"처럼 선택지를 넓힐 때 사용합니다. OR는 논리합(logical OR)으로, 연결된 조건 중 하나만 참이어도 해당 행이 선택됩니다. WHERE day = 'Sat' OR day = 'Sun'은 토요일 또는 일요일 데이터를 모두 가져옵니다. AND는 결과를 좁히고, OR는 결과를 넓힙니다. AND와 OR를 함께 사용할 때는 괄호로 우선순위를 명확히 하는 것이 좋습니다.

    OR는 논리합 연산자로, 조건 중 하나라도 참이면 해당 행을 반환합니다. WHERE A OR B는 A가 참이거나 B가 참인 모든 행을 선택합니다. AND와 OR를 혼합할 때는 괄호를 사용하세요. WHERE (A OR B) AND C는 (A 또는 B)이면서 C인 조건입니다.
  tips:
  - OR는 논리합 연산자로, 조건 중 하나라도 참이면 해당 행을 반환합니다. WHERE A OR B는 A가 참이거나 B가 참인 모든 행을 선택합니다. AND와 OR를 혼합할 때는
    괄호를 사용하세요. WHERE (A OR B) AND C는 (A 또는 B)이면서 C인 조건입니다.
  snippet: |-
    tips.query("tips_table", """
        SELECT * FROM tips_table
        WHERE day = 'Sat' OR day = 'Sun'
    """)
