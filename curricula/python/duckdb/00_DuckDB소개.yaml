meta:
  id: duckdb_00
  title: DuckDB소개
  order: 0
  category: duckdb
  badge: 소개
  source: eddmpython
  sourceUrl: https://eddmpython.com
  tags: ["DuckDB", "OLAP", "SQL", "분석용DB", "인메모리", "WASM"]
  seo:
    title: "DuckDB 입문 - 분석에 특화된 SQL 데이터베이스"
    description: "DuckDB로 빠른 데이터 분석을 시작하세요. 설치 없이 브라우저에서도 실행되는 분석용 SQL 데이터베이스입니다."
    keywords: ["DuckDB", "OLAP", "SQL", "데이터분석", "인메모리DB", "분석용데이터베이스"]

sections:
- id: intro
  blocks:
    - type: mainHeader
      emoji: "🦆"
      title: "DuckDB??"
      subtitle: "오리가 데이터베이스라고?"

    - type: hero
      emoji: "🚀"
      title: "분석에 특화된 SQL 데이터베이스"
      subtitle: "설치 없이 바로 쓰는 초고속 분석 엔진"
      points:
        - emoji: "💡"
          title: "설치 없이 pip 한 줄"
        - emoji: "⚡"
          title: "분석 쿼리에 최적화"
        - emoji: "🌐"
          title: "브라우저에서도 실행"
        - emoji: "🐼"
          title: "pandas와 완벽 호환"

- id: what_is_duckdb
  blocks:
    - type: sectionHeader
      title: "🤔 DuckDB가 뭔가요?"
      subtitle: "한마디로 분석용 SQLite"

    - type: note
      style: info
      title: "OLAP vs OLTP"
      content: "데이터베이스는 크게 두 종류입니다. OLTP는 주문, 결제처럼 빠른 트랜잭션 처리용(MySQL, PostgreSQL). OLAP는 집계, 통계처럼 대량 데이터 분석용(DuckDB, BigQuery). DuckDB는 OLAP에 특화된 데이터베이스입니다."

    - type: featureCards
      cards:
        - emoji: "📊"
          title: "컬럼 기반 저장"
          description: "행이 아닌 열 단위 저장으로 집계 쿼리 초고속"
        - emoji: "💾"
          title: "인메모리 처리"
          description: "데이터를 메모리에 올려 빠른 연산"
        - emoji: "🔌"
          title: "서버 불필요"
          description: "별도 서버 없이 파일 하나로 동작"
        - emoji: "🆓"
          title: "완전 무료"
          description: "오픈소스, MIT 라이선스"

- id: why_duckdb
  blocks:
    - type: sectionHeader
      title: "🌟 왜 DuckDB가 인기일까요?"
      subtitle: "데이터 분석가들이 열광하는 이유"

    - type: featureCards
      cards:
        - emoji: "⚡"
          title: "엄청 빠름"
          description: "pandas보다 10~100배 빠른 분석 쿼리 처리"
        - emoji: "📦"
          title: "설치가 간단"
          description: "pip install duckdb 한 줄이면 끝"
        - emoji: "🌐"
          title: "브라우저 실행"
          description: "WebAssembly로 웹에서도 동작"
        - emoji: "📁"
          title: "다양한 포맷"
          description: "CSV, Parquet, JSON, Excel 직접 쿼리"
        - emoji: "🐼"
          title: "pandas 호환"
          description: "DataFrame을 SQL로 바로 분석"
        - emoji: "🔒"
          title: "로컬 처리"
          description: "데이터가 외부로 안 나감"

- id: duckdb_vs_pandas
  blocks:
    - type: sectionHeader
      title: "🆚 DuckDB vs pandas"
      subtitle: "언제 뭘 써야 할까요?"

    - type: compare
      left:
        title: "pandas"
        subtitle: "Python 방식"
        icon: "🐼"
        color: "blue"
        items:
          - "Python 문법으로 분석"
          - "메서드 체이닝"
          - "유연한 데이터 조작"
          - "시각화 라이브러리 연동"
          - "ML 전처리에 최적"
        infoBox: "Python이 익숙하다면"
      right:
        title: "DuckDB"
        subtitle: "SQL 방식"
        icon: "🦆"
        color: "green"
        items:
          - "SQL 문법으로 분석"
          - "표준 SQL 지원"
          - "대용량에서 월등히 빠름"
          - "복잡한 집계 쿼리 간결"
          - "BI 도구 연동 쉬움"
        infoBox: "SQL이 익숙하다면"

    - type: note
      style: tip
      title: "둘 다 쓰면 됩니다!"
      content: "DuckDB는 pandas DataFrame을 직접 쿼리할 수 있습니다. pandas로 전처리하고 DuckDB로 분석하는 조합도 강력합니다. 상황에 맞게 섞어 쓰세요!"

- id: sql_intro
  blocks:
    - type: sectionHeader
      title: "📝 SQL 기초"
      subtitle: "DuckDB를 쓰려면 SQL을 알아야 합니다"

    - type: note
      style: info
      title: "SQL이란?"
      content: "Structured Query Language의 약자로, 데이터베이스와 대화하는 언어입니다. 1970년대 만들어져 지금도 표준으로 사용됩니다. 배워두면 모든 DB에서 쓸 수 있어요."

    - type: featureCards
      cards:
        - emoji: "🔍"
          title: "SELECT"
          description: "데이터 조회"
        - emoji: "🎯"
          title: "WHERE"
          description: "조건 필터링"
        - emoji: "📊"
          title: "GROUP BY"
          description: "그룹별 집계"
        - emoji: "🔗"
          title: "JOIN"
          description: "테이블 결합"

    - type: table
      headers: ["SQL", "pandas", "설명"]
      rows:
        - ["SELECT *", "df", "전체 조회"]
        - ["SELECT col1, col2", "df[['col1', 'col2']]", "컬럼 선택"]
        - ["WHERE x > 10", "df[df['x'] > 10]", "조건 필터"]
        - ["ORDER BY x", "df.sort_values('x')", "정렬"]
        - ["GROUP BY x", "df.groupby('x')", "그룹화"]

- id: use_cases
  blocks:
    - type: sectionHeader
      title: "🎯 DuckDB 활용 사례"
      subtitle: "이런 상황에서 DuckDB가 빛납니다"

    - type: featureCards
      cards:
        - emoji: "📊"
          title: "대용량 로그 분석"
          description: "수천만 행 로그를 SQL로 빠르게 집계"
        - emoji: "📁"
          title: "CSV/Parquet 직접 쿼리"
          description: "파일을 DB에 넣지 않고 바로 분석"
        - emoji: "🔄"
          title: "ETL 파이프라인"
          description: "데이터 변환/적재 자동화"
        - emoji: "📈"
          title: "BI 리포트"
          description: "복잡한 집계 쿼리로 리포트 생성"
        - emoji: "🧪"
          title: "데이터 탐색"
          description: "빠른 프로토타이핑으로 인사이트 발견"
        - emoji: "🌐"
          title: "웹 앱 분석"
          description: "WASM으로 브라우저 내 데이터 분석"

- id: wasm_intro
  blocks:
    - type: sectionHeader
      title: "🌐 브라우저에서 DuckDB"
      subtitle: "WebAssembly로 설치 없이 바로 실행"

    - type: note
      style: info
      title: "WebAssembly(WASM)란?"
      content: "브라우저에서 네이티브 수준의 성능으로 코드를 실행하는 기술입니다. DuckDB는 WASM으로 컴파일되어 있어서 웹 브라우저에서도 동작합니다. 서버 없이 클라이언트에서 데이터 분석이 가능해요!"

    - type: featureCards
      cards:
        - emoji: "🚫"
          title: "설치 불필요"
          description: "브라우저만 있으면 바로 실행"
        - emoji: "🔒"
          title: "데이터 보안"
          description: "데이터가 서버로 안 나감"
        - emoji: "⚡"
          title: "네이티브급 속도"
          description: "WASM으로 빠른 처리"

- id: comparison_table
  blocks:
    - type: sectionHeader
      title: "📊 데이터베이스 비교"
      subtitle: "어떤 상황에 어떤 도구?"

    - type: table
      headers: ["도구", "특징", "추천 상황"]
      rows:
        - ["DuckDB", "분석 특화, 컬럼 기반", "대용량 집계, 분석 쿼리"]
        - ["SQLite", "가벼운 OLTP", "간단한 앱, 임베디드"]
        - ["pandas", "Python DataFrame", "데이터 전처리, ML"]
        - ["PostgreSQL", "범용 RDBMS", "웹 서비스 백엔드"]
        - ["BigQuery", "클라우드 OLAP", "페타바이트급 분석"]

    - type: note
      style: tip
      title: "SQLite vs DuckDB"
      content: "둘 다 서버 없이 파일로 동작하지만, 목적이 다릅니다. SQLite는 트랜잭션 처리(행 기반), DuckDB는 분석 쿼리(열 기반)에 최적화되어 있어요."

- id: projects_preview
  blocks:
    - type: sectionHeader
      title: "🗺️ 앞으로 배울 내용"
      subtitle: "DuckDB로 이런 것들을 해봅니다"

    - type: table
      headers: ["단계", "프로젝트", "배울 내용"]
      rows:
        - ["입문", "기본 쿼리", "SELECT, WHERE, ORDER BY"]
        - ["입문", "집계 함수", "COUNT, SUM, AVG, GROUP BY"]
        - ["기초", "조인", "INNER JOIN, LEFT JOIN"]
        - ["기초", "서브쿼리", "중첩 쿼리, CTE"]
        - ["중급", "윈도우 함수", "RANK, LAG, LEAD"]
        - ["중급", "파일 직접 쿼리", "CSV, Parquet, JSON"]
        - ["심화", "pandas 연동", "DataFrame SQL 분석"]
        - ["심화", "성능 최적화", "인덱스, 쿼리 플랜"]

    - type: note
      style: info
      title: "실습 중심 학습"
      content: "각 프로젝트에서 실제 데이터를 SQL로 분석합니다. 이론만 배우는 게 아니라 직접 쿼리를 작성해보세요."

- id: resources
  blocks:
    - type: sectionHeader
      title: "📚 참고 자료"
      subtitle: "더 깊이 공부하고 싶다면"

    - type: links
      items:
        - text: DuckDB 공식 문서
          url: https://duckdb.org/docs/
          icon: "🔗"
        - text: DuckDB SQL 문법
          url: https://duckdb.org/docs/sql/introduction
          icon: "🔗"
        - text: DuckDB Python API
          url: https://duckdb.org/docs/api/python/overview
          icon: "🔗"

- id: next
  blocks:
    - type: hero
      emoji: "👉"
      title: "다음: 기본 SQL 쿼리"
      subtitle: "SELECT, WHERE로 데이터를 조회해봅니다"
