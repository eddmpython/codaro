          GROUP BY day, time
          ORDER BY avgTipRate DESC
      """).df()

      predictedBestSegment = tipRatePrediction.iloc[0]
      print(
          "예상 최고 팁 비율:",
          predictedBestSegment["day"],
          predictedBestSegment["time"],
          predictedBestSegment["avgTipRate"],
      )
