  check:
    noError: 12단계. 실무 CASE 리포트 검증의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 12단계. 실무 CASE 리포트 검증 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
