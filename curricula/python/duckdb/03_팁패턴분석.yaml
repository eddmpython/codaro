- id: summary
  title: 정리
  blocks:
  - type: text
    content: 조건부 분류와 복합 정렬을 마스터했습니다.
  - type: list
    items:
    - CASE WHEN 조건 THEN 값 ELSE 기본값 END - 조건부 값 생성
    - ORDER BY col1, col2 DESC - 다중 컬럼 정렬
    - GROUP BY + CASE WHEN - 조건부 집계
    - SUM(CASE WHEN ...) - 조건별 카운트
  - type: text
    content: 다음 시간에는 WHERE와 HAVING으로 조건 필터링을 배웁니다.
