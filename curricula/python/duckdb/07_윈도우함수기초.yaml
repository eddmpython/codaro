meta:
  id: duckdb_07
  title: 윈도우함수기초
  order: 7
  category: duckdb
  difficulty: "⭐⭐⭐"
  badge: 중급
  dataUrl: https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv
  tags: ["window", "ROW_NUMBER", "RANK", "PARTITION BY", "누적합계"]
  seo:
    title: "DuckDB 윈도우 함수 기초 - ROW_NUMBER, RANK, 누적합계"
    description: "레스토랑 팁 데이터로 SQL 윈도우 함수를 배웁니다. ROW_NUMBER, RANK, DENSE_RANK, PARTITION BY, 누적합계를 실습합니다."
    keywords: ["DuckDB window", "ROW_NUMBER", "RANK", "PARTITION BY", "SQL 윈도우함수"]

intro:
  emoji: "🏆"
  goal: 팁 데이터에서 요일별 순위와 누적 합계를 계산합니다.
  description: 윈도우 함수는 GROUP BY와 달리 행을 줄이지 않고 각 행에 집계 결과를 붙입니다. 순위 매기기, 누적 합계, 그룹 내 비교에 필수적인 기능입니다.

sections:
- id: step1_load
  title: 1단계. 데이터 준비
  subtitle: tips 데이터 로드
  blocks:
  - type: text
    content: 레스토랑 팁 데이터를 DuckDB로 불러옵니다. 이번 프로젝트에서는 윈도우 함수(Window Function)를 배우게 됩니다. 윈도우 함수는 SQL에서 가장 강력한 기능 중 하나로, 순위 매기기, 누적 합계, 이동 평균 등 고급 분석에 필수적입니다. pandas로 CSV 파일을 읽은 후 duckdb.from_df()로 DuckDB 테이블로 변환하면 즉시 SQL 쿼리를 실행할 수 있습니다. 244명의 레스토랑 손님 데이터로 요일별 팁 순위, 누적 합계 등 다양한 분석을 수행합니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: tips 데이터를 DuckDB로 변환
    content: |-
      import pandas as pd
      import duckdb

      baseUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master"
      df = pd.read_csv(f"{baseUrl}/tips.csv")
      tips = duckdb.from_df(df)

      duckdb.sql("SELECT * FROM tips LIMIT 5").show()

- id: step2_window_intro
  title: 2단계. 윈도우 함수란?
  subtitle: GROUP BY와의 차이
  blocks:
  - type: text
    content: 윈도우 함수는 GROUP BY와 완전히 다른 방식으로 동작합니다. GROUP BY는 그룹당 한 행으로 줄여버리지만, 윈도우 함수는 모든 행을 유지하면서 각 행에 집계 결과를 추가합니다. 예를 들어 GROUP BY day로 요일별 평균 팁을 구하면 7개 행만 나오지만, 윈도우 함수를 사용하면 244개 행 모두 유지하면서 각 행에 "전체 평균", "해당 요일 평균" 등을 추가할 수 있습니다. 이는 "원본 데이터 + 집계 정보"를 동시에 보고 싶을 때 매우 유용합니다. 윈도우 함수 없이는 서브쿼리나 JOIN으로 복잡하게 처리해야 합니다.
  - type: code
    language: python
    title: GROUP BY vs 윈도우 함수
    description: 차이점 비교
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              AVG(tip) OVER() AS avgAll,
              AVG(tip) OVER(PARTITION BY day) AS avgByDay
          FROM tips
          LIMIT 10
      """).show()
  - type: tip
    content: "OVER() 절이 윈도우 함수의 핵심입니다. AVG(tip) OVER()는 전체 데이터의 평균을, AVG(tip) OVER(PARTITION BY day)는 각 요일별 평균을 계산합니다. 괄호가 비어있으면 전체, PARTITION BY가 있으면 그룹별로 계산됩니다. 일반 집계 함수와 달리 행이 줄어들지 않고 모든 행에 결과가 추가됩니다."

- id: step3_row_number
  title: 3단계. ROW_NUMBER
  subtitle: 행 번호 매기기
  blocks:
  - type: text
    content: ROW_NUMBER()는 각 행에 순차적인 번호를 부여하는 윈도우 함수입니다. 1부터 시작하여 1씩 증가합니다. ORDER BY 절로 정렬 기준을 지정하면 그 순서대로 번호가 매겨집니다. 예를 들어 ORDER BY tip DESC는 팁이 높은 순서대로 1, 2, 3... 번호를 부여합니다. 동점(같은 값)이 있어도 ROW_NUMBER는 각 행에 고유한 번호를 부여하므로 중복이 없습니다. 페이지네이션(1-10위, 11-20위 등)이나 Top N 추출에 자주 사용됩니다.
  - type: code
    language: python
    title: 행 번호 부여
    description: ROW_NUMBER 기본
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              total_bill,
              ROW_NUMBER() OVER(ORDER BY tip DESC) AS rowNum
          FROM tips
          LIMIT 10
      """).show()
  - type: tip
    content: "ROW_NUMBER() OVER(ORDER BY col)은 col 기준으로 정렬한 후 순서대로 번호를 매깁니다. 동점이어도 각 행에 고유한 번호를 부여합니다. 예를 들어 팁이 5.0으로 같은 두 행이 있어도 하나는 1위, 다른 하나는 2위가 됩니다. 정렬 순서를 바꾸면 번호도 바뀔 수 있으므로 정렬 기준이 중요합니다."

- id: step4_partition_row_number
  title: 4단계. PARTITION BY + ROW_NUMBER
  subtitle: 그룹 내 순번
  blocks:
  - type: text
    content: PARTITION BY를 추가하면 그룹별로 윈도우가 나뉘어 각 그룹 내에서 번호가 1부터 다시 시작됩니다. 예를 들어 PARTITION BY day를 사용하면 월요일 그룹에서 1,2,3..., 화요일 그룹에서 다시 1,2,3... 이런 식으로 요일마다 독립적인 순위가 매겨집니다. 이는 "카테고리별 Top N"을 구할 때 핵심 패턴입니다. 전체 Top 10이 아니라 "각 요일의 Top 3", "각 제품군의 Top 5" 같은 분석에 필수적입니다. PARTITION BY가 없으면 전체 데이터에 대해 순위가 매겨집니다.
  - type: code
    language: python
    title: 요일별 팁 순위
    description: PARTITION BY day
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              total_bill,
              ROW_NUMBER() OVER(PARTITION BY day ORDER BY tip DESC) AS dayRank
          FROM tips
          ORDER BY day, dayRank
          LIMIT 16
      """).show()
  - type: tip
    content: PARTITION BY는 그룹을 나누고, ORDER BY는 그 안에서 정렬합니다. 각 요일마다 순위가 1부터 다시 시작됩니다.

- id: step5_rank
  title: 5단계. RANK
  subtitle: 동점 처리
  blocks:
  - type: text
    content: RANK()는 ROW_NUMBER와 달리 동점 처리가 가능한 순위 함수입니다. 같은 값을 가진 행들에게 같은 순위를 부여하고, 다음 순위는 건너뜁니다. 예를 들어 팁이 5.0으로 같은 두 행이 있으면 둘 다 1위가 되고, 다음 행은 3위가 됩니다(2위는 건너뜀). 이는 올림픽 메달 순위와 같은 방식입니다. 동점자가 2명이면 2등이 없고 1등 다음이 3등이 됩니다. 실제 순위를 매길 때는 ROW_NUMBER보다 RANK가 더 공정하고 자연스럽습니다.
  - type: code
    language: python
    title: RANK 사용
    description: 동점 시 같은 순위
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              ROW_NUMBER() OVER(PARTITION BY day ORDER BY tip DESC) AS rowNum,
              RANK() OVER(PARTITION BY day ORDER BY tip DESC) AS tipRank
          FROM tips
          WHERE tip >= 5
          ORDER BY day, tipRank
      """).show()
  - type: tip
    content: "RANK는 동점이면 같은 순위를 주고 다음 순위를 건너뜁니다. 예: 1, 2, 2, 4 (3등이 없음)"

- id: step6_dense_rank
  title: 6단계. DENSE_RANK
  subtitle: 순위 건너뛰기 없음
  blocks:
  - type: text
    content: DENSE_RANK()는 RANK와 비슷하지만 동점이 있어도 다음 순위를 건너뛰지 않습니다. 연속된 순위 번호를 원할 때 사용합니다. 예를 들어 1등이 2명 있으면 RANK는 1,1,3이 되지만, DENSE_RANK는 1,1,2가 됩니다. 순위 사이에 구멍이 없어서 "촘촘한(dense)" 순위라고 부릅니다. 리더보드나 등급 시스템에서 "몇 등급이 존재하는가"를 세고 싶을 때는 DENSE_RANK를 사용하고, "전체 몇 명 중 몇 등인가"를 표현할 때는 RANK를 사용합니다. 용도에 따라 적절히 선택하면 됩니다.
  - type: code
    language: python
    title: DENSE_RANK 비교
    description: RANK vs DENSE_RANK
    content: |-
      duckdb.sql("""
          SELECT
              day,
              ROUND(tip, 0) AS tipRounded,
              RANK() OVER(PARTITION BY day ORDER BY ROUND(tip, 0) DESC) AS rankVal,
              DENSE_RANK() OVER(PARTITION BY day ORDER BY ROUND(tip, 0) DESC) AS denseRankVal
          FROM tips
          WHERE tip >= 4
          ORDER BY day, tipRounded DESC
      """).show()
  - type: tip
    content: "DENSE_RANK는 동점이어도 순위를 건너뛰지 않습니다. 예: 1, 2, 2, 3 (3등이 있음)"

- id: step7_running_total
  title: 7단계. 누적 합계
  subtitle: SUM() OVER(ORDER BY)
  blocks:
  - type: text
    content: 누적 합계(Running Total)는 윈도우 함수의 강력한 활용 사례입니다. SUM()에 ORDER BY를 추가하면 정렬 순서대로 위에서부터 합계를 누적합니다. 예를 들어 첫 번째 행은 자기 자신만, 두 번째 행은 첫 번째+두 번째, 세 번째 행은 첫 번째+두 번째+세 번째... 이런 식으로 계속 누적됩니다. 매출 누적, 방문자 누적, 재고 누적 등 시계열 데이터에서 "지금까지 총 얼마인가"를 보여줄 때 필수적입니다. 일반 SUM은 전체 합계 하나만 나오지만, 윈도우 SUM은 각 행마다 "그 시점까지의 합계"를 보여줍니다.
  - type: code
    language: python
    title: 팁 누적 합계
    description: 누적 합계 계산
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              SUM(tip) OVER(ORDER BY tip) AS cumSum
          FROM tips
          WHERE day = 'Sun'
          ORDER BY tip
          LIMIT 15
      """).show()
  - type: tip
    content: "SUM() OVER(ORDER BY col)은 col 기준 정렬 후 위에서부터 합계를 누적합니다. 각 행에서 자신까지의 합계를 보여줍니다. ORDER BY가 없으면 전체 합계가 모든 행에 동일하게 나오지만, ORDER BY를 추가하면 누적 합계가 됩니다. 이는 엑셀의 '누계' 기능과 동일합니다."

- id: step8_partition_cumsum
  title: 8단계. 그룹별 누적 합계
  subtitle: PARTITION BY + ORDER BY
  blocks:
  - type: text
    content: PARTITION BY와 ORDER BY를 함께 사용하면 그룹별로 독립적인 누적 합계를 계산합니다. 각 그룹에서 누적 합계가 1부터 다시 시작됩니다. 예를 들어 PARTITION BY day를 추가하면 월요일은 월요일대로, 화요일은 화요일대로 누적 합계를 계산합니다. 요일이 바뀌면 누적이 리셋됩니다. 이는 "카테고리별 누적 현황"을 보고 싶을 때 유용합니다. 제품별 누적 판매량, 지역별 누적 매출 등 그룹마다 독립적으로 추적할 때 이 패턴을 사용합니다. PARTITION BY 없는 누적 합계와 비교하면 차이를 확실히 알 수 있습니다.
  - type: code
    language: python
    title: 요일별 누적 팁
    description: 그룹별 누적 합계
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              SUM(tip) OVER(PARTITION BY day ORDER BY tip) AS dayCumSum,
              SUM(tip) OVER(PARTITION BY day) AS dayTotal
          FROM tips
          ORDER BY day, tip
          LIMIT 20
      """).show()
  - type: tip
    content: "dayCumSum은 요일별로 누적 합계, dayTotal은 요일별 전체 합계입니다. 같은 요일 내에서는 dayCumSum이 계속 증가하다가 dayTotal에 도달하고, 다음 요일로 넘어가면 누적이 다시 0부터 시작됩니다. PARTITION BY 덕분에 각 요일이 독립적인 윈도우로 분리됩니다."

- id: step9_percent_rank
  title: 9단계. 비율 순위
  subtitle: 상위 몇 %?
  blocks:
  - type: text
    content: 누적 합계를 전체 합계로 나누면 누적 비율(Cumulative Percentage)을 구할 수 있습니다. 이는 "상위 몇 %가 전체의 몇 %를 차지하는가"를 분석하는 핵심 지표입니다. 예를 들어 팁이 높은 순서대로 누적하면 "상위 20%가 전체 팁의 50%를 차지한다" 같은 인사이트를 얻을 수 있습니다. 파레토 분석(80/20 법칙), ABC 분석 등에 활용됩니다. 두 개의 윈도우 함수를 나누기로 연결하는 패턴이며, 실무에서 고객 세그먼트 분석, VIP 고객 기여도 분석 등에 자주 사용됩니다.
  - type: code
    language: python
    title: 누적 비율 계산
    description: 누적 비율
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              SUM(tip) OVER(PARTITION BY day ORDER BY tip DESC) AS cumSum,
              SUM(tip) OVER(PARTITION BY day) AS dayTotal,
              ROUND(
                  SUM(tip) OVER(PARTITION BY day ORDER BY tip DESC) * 100.0 /
                  SUM(tip) OVER(PARTITION BY day),
                  1
              ) AS cumPct
          FROM tips
          ORDER BY day, tip DESC
          LIMIT 16
      """).show()
  - type: tip
    content: "100.0을 곱한 후 나누는 것이 정확한 퍼센트 계산 방법입니다. 정수 나누기는 소수점이 잘릴 수 있으므로 반드시 100.0처럼 실수로 만들어야 합니다. cumPct가 50이면 상위 n개 항목이 전체의 50%를 차지한다는 의미입니다."

- id: step10_top_n
  title: 10단계. 그룹별 Top N
  subtitle: 서브쿼리 활용
  blocks:
  - type: text
    content: 윈도우 함수 결과를 서브쿼리로 감싸서 그룹별 상위 N개를 추출하는 실전 패턴입니다. 윈도우 함수는 WHERE 절에서 직접 사용할 수 없으므로, 서브쿼리에서 순위를 먼저 계산한 후 외부 쿼리의 WHERE로 필터링합니다. 예를 들어 "각 요일의 Top 3 팁"을 구하려면 요일별 순위를 매긴 후 순위가 3 이하인 행만 선택합니다. 이 패턴은 "카테고리별 베스트 상품", "부서별 우수 사원", "지역별 인기 매장" 등 그룹 내 상위 항목을 찾을 때 필수적입니다. CTE를 사용하면 더 깔끔하게 작성할 수 있습니다.
  - type: code
    language: python
    title: 요일별 Top 3 팁
    description: 그룹별 상위 추출
    content: |-
      duckdb.sql("""
          SELECT day, tip, total_bill, dayRank
          FROM (
              SELECT
                  day,
                  tip,
                  total_bill,
                  ROW_NUMBER() OVER(PARTITION BY day ORDER BY tip DESC) AS dayRank
              FROM tips
          ) ranked
          WHERE dayRank <= 3
          ORDER BY day, dayRank
      """).show()
  - type: tip
    content: "서브쿼리 패턴은 (1) 내부 쿼리에서 윈도우 함수로 순위 계산 → (2) 외부 쿼리에서 WHERE로 필터링 순서입니다. WHERE dayRank <= 3은 1, 2, 3위만 선택합니다. DuckDB에서는 QUALIFY 절로 더 간단하게 작성할 수도 있지만, 서브쿼리 패턴이 표준 SQL이라 다른 DB에서도 호환됩니다."

- id: step11_final
  title: 11단계. 최종 결과물
  subtitle: 종합 분석
  blocks:
  - type: text
    content: 윈도우 함수를 종합 활용하여 요일별 팁 순위와 누적 통계를 한 번에 분석하는 최종 쿼리입니다. ROW_NUMBER로 순위를 매기고, SUM OVER(ORDER BY)로 누적 합계를 구하며, 비율 계산까지 한 쿼리에서 모두 수행합니다. 이렇게 여러 윈도우 함수를 조합하면 복잡한 분석도 간결하게 표현할 수 있습니다. 실무에서는 대시보드나 리포트를 위해 이런 종합 쿼리를 작성하게 됩니다. 윈도우 함수는 처음에는 어렵지만 익숙해지면 SQL의 표현력을 10배 이상 높여주는 강력한 도구입니다.
  - type: code
    language: python
    title: 종합 윈도우 분석
    description: 순위 + 누적 합계 + 비율
    content: |-
      duckdb.sql("""
          SELECT
              day,
              tip,
              total_bill,
              ROW_NUMBER() OVER(PARTITION BY day ORDER BY tip DESC) AS dayRank,
              ROUND(SUM(tip) OVER(PARTITION BY day ORDER BY tip DESC), 2) AS cumTip,
              ROUND(
                  SUM(tip) OVER(PARTITION BY day ORDER BY tip DESC) * 100.0 /
                  SUM(tip) OVER(PARTITION BY day),
                  1
              ) AS cumPct
          FROM tips
          ORDER BY day, dayRank
          LIMIT 20
      """).show()

- id: practice
  title: 실습
  subtitle: 윈도우 함수 프로젝트
  blocks:
  - type: text
    content: 윈도우 함수를 종합 활용하여 팁 데이터를 심층 분석해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 시간대별(time) 팁 순위 매기기"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl1 = duckdb.from_df(data)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                time,
                day,
                tip,
                RANK() OVER(PARTITION BY time ORDER BY tip DESC) AS rk
            FROM tbl1
            ORDER BY time, rk
            LIMIT 16
        """)
  - type: expansion
    title: "미션2: 요일별 총금액 누적 합계"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        frame = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl2 = duckdb.from_df(frame)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                day,
                total_bill AS bill,
                SUM(total_bill) OVER(PARTITION BY day ORDER BY total_bill) AS cumSum
            FROM tbl2
            ORDER BY day, bill
            LIMIT 20
        """)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: SQL 윈도우 함수의 기초를 마스터했습니다.
  - type: list
    items:
    - "ROW_NUMBER() OVER() - 순차 번호 부여"
    - "RANK() - 동점 시 같은 순위, 다음 순위 건너뜀"
    - "DENSE_RANK() - 동점 시 같은 순위, 건너뛰지 않음"
    - "OVER(PARTITION BY col) - 그룹별로 윈도우 적용"
    - "OVER(ORDER BY col) - 정렬 순서로 집계"
    - "SUM() OVER(ORDER BY) - 누적 합계 계산"
    - "윈도우 함수 vs GROUP BY - 행 유지 vs 행 축소"
  - type: text
    content: 다음 시간에는 LAG/LEAD, 이동 평균, QUALIFY 등 고급 윈도우 함수를 배웁니다.
