          SELECT
              name,
              TRIM(SPLIT_PART(SPLIT_PART(name, ',', 2), '.', 1)) AS title
          FROM titanic
          LIMIT 5
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
