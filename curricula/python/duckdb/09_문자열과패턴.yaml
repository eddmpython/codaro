- id: step10_split_part
  title: 10단계. SPLIT_PART - 문자열 분리
  structuredPrimary: true
  subtitle: 구분자로 나누기
  goal: 10단계. SPLITPART 문자열 분리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    SPLIT_PART(문자열, 구분자, 위치)는 구분자로 문자열을 나누고 특정 위치의 부분을 반환합니다. 예를 들어 'a,b,c'를 콤마로 나누면 SPLIT_PART(..., ',', 1)은 'a', SPLIT_PART(..., ',', 2)는 'b'를 반환합니다. 타이타닉 이름 데이터는 "성, 호칭. 이름" 형식이므로 콤마와 점으로 분리하여 호칭을 추출할 수 있습니다. CSV 파싱, 경로 분해, 구조화된 텍스트 추출에 매우 유용합니다.

    SPLIT_PART의 위치는 1부터 시작합니다. 존재하지 않는 위치를 지정하면 빈 문자열을 반환합니다. 여러 단계로 분리하려면 SPLIT_PART를 중첩합니다. 예: SPLIT_PART(SPLIT_PART(str, ',', 2), '.', 1)은 먼저 콤마로 나누고 그 결과를 점으로 다시 나눕니다.
  tips:
  - 'SPLIT_PART의 위치는 1부터 시작합니다. 존재하지 않는 위치를 지정하면 빈 문자열을 반환합니다. 여러 단계로 분리하려면 SPLIT_PART를 중첩합니다. 예: SPLIT_PART(SPLIT_PART(str,
    '','', 2), ''.'', 1)은 먼저 콤마로 나누고 그 결과를 점으로 다시 나눕니다.'
  snippet: |-
    duckdb.sql("""
        SELECT
            name,
            TRIM(SPLIT_PART(SPLIT_PART(name, ',', 2), '.', 1)) AS title
        FROM titanic
        LIMIT 5
    """).show()
  exercise:
    prompt: 10단계. SPLITPART 문자열 분리 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
