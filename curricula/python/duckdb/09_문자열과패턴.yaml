- id: step16_final
  title: 16단계. 최종 종합 분석
  structuredPrimary: true
  subtitle: 모든 문자열 기법 활용
  goal: 16단계. 최종 종합 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: SPLIT_PART로 호칭을 정교하게 추출하고, CASE WHEN으로 그룹화한 후 생존율을 분석하는 종합 쿼리입니다. 실무에서 이런 패턴으로 텍스트 데이터를
    정제하고 인사이트를 도출합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        WITH titleExtract AS (
            SELECT
                *,
                TRIM(SPLIT_PART(SPLIT_PART(name, ',', 2), '.', 1)) AS title
            FROM titanic
        ),
        titleGroup AS (
            SELECT
                CASE
                    WHEN title IN ('Mr', 'Mrs', 'Miss', 'Master') THEN title
                    WHEN title IN ('Dr', 'Rev') THEN '전문직'
                    WHEN title IN ('Col', 'Major', 'Capt') THEN '군인'
                    ELSE '귀족/기타'
                END AS titleCategory,
                survived,
                age,
                fare
            FROM titleExtract
        )
        SELECT
            titleCategory,
            COUNT(*) AS total,
            SUM(survived) AS survivors,
            ROUND(AVG(survived) * 100, 1) AS survivalRate,
            ROUND(AVG(age), 1) AS avgAge,
            ROUND(AVG(fare), 2) AS avgFare
        FROM titleGroup
        GROUP BY titleCategory
        ORDER BY survivalRate DESC
    """).show()
  exercise:
    prompt: 16단계. 최종 종합 분석 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH titleExtract AS (
              SELECT
                  *,
                  TRIM(SPLIT_PART(SPLIT_PART(name, ',', 2), '.', 1)) AS title
              FROM titanic
          ),
          titleGroup AS (
              SELECT
                  CASE
                      WHEN title IN ('Mr', 'Mrs', 'Miss', 'Master') THEN title
                      WHEN title IN ('Dr', 'Rev') THEN '전문직'
                      WHEN title IN ('Col', 'Major', 'Capt') THEN '군인'
                      ELSE '귀족/기타'
                  END AS titleCategory,
                  survived,
                  age,
                  fare
              FROM titleExtract
          )
          SELECT
              titleCategory,
              COUNT(*) AS total,
              SUM(survived) AS survivors,
              ROUND(AVG(survived) * 100, 1) AS survivalRate,
              ROUND(AVG(age), 1) AS avgAge,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titleGroup
          GROUP BY titleCategory
          ORDER BY survivalRate DESC
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 16단계. 최종 종합 분석의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 16단계. 최종 종합 분석 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
