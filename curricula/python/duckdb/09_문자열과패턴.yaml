sections:
- id: step1_load
  title: 1단계. 데이터 준비
  structuredPrimary: true
  subtitle: titanic 데이터 로드
  goal: 1단계. 데이터 준비에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: 타이타닉 승객 데이터를 불러옵니다. 이번 프로젝트에서는 name 컬럼의 텍스트 데이터를 분석합니다. 승객 이름에는 "Mr.", "Mrs.", "Miss."
    같은 호칭이 포함되어 있고, 이를 추출하여 생존율 등을 분석할 수 있습니다. 문자열 함수는 실무에서 데이터 정제, 전처리, 패턴 추출에 필수적입니다. 이메일에서 도메인 추출,
    주소에서 지역 분리, 상품명에서 브랜드 파싱 등 다양하게 활용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd
    from codaro.curriculum.localData import loadLocalDataset
    import duckdb

    dfTitanic = loadLocalDataset("titanic")
    if "name" not in dfTitanic.columns:
        titleCycle = ["Mr.", "Mrs.", "Miss.", "Master.", "Dr.", "Rev."]
        dfTitanic = dfTitanic.copy()
        dfTitanic["name"] = [
            f"Passenger{index:03d}, {titleCycle[index % len(titleCycle)]} Local"
            for index in range(len(dfTitanic))
        ]

    titanic = duckdb.from_df(dfTitanic)
  exercise:
    prompt: 1단계. 데이터 준비 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import pandas as pd
      from codaro.curriculum.localData import loadLocalDataset
      import duckdb

      dfTitanic = loadLocalDataset("titanic")
      if "name" not in dfTitanic.columns:
          titleCycle = ["Mr.", "Mrs.", "Miss.", "Master.", "Dr.", "Rev."]
          dfTitanic = dfTitanic.copy()
          dfTitanic["name"] = [
              f"Passenger{index:03d}, {titleCycle[index % len(titleCycle)]} Local"
              for index in range(len(dfTitanic))
          ]

      titanic = duckdb.from_df(dfTitanic)
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 1단계. 데이터 준비의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 1단계. 데이터 준비 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step2_like_intro
  title: 2단계. LIKE 패턴 매칭
  structuredPrimary: true
  subtitle: 문자열 검색의 기본
  goal: 2단계. LIKE 패턴 매칭에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    LIKE는 문자열 패턴을 검색하는 기본 연산자입니다. %는 임의 길이의 문자열(0개 이상), _는 정확히 1개의 문자를 의미합니다. 예를 들어 LIKE '%Mr.%'는 "Mr."이 포함된 모든 문자열을 찾습니다. LIKE는 간단한 패턴 검색에 유용하며, 정규표현식보다 성능이 좋고 직관적입니다. 이름, 주소, 상품명 등에서 특정 키워드를 찾을 때 자주 사용됩니다.

    LIKE '%pattern%'은 pattern이 문자열 어디든 포함되면 매칭됩니다. LIKE 'pattern%'은 pattern으로 시작, LIKE '%pattern'은 pattern으로 끝나는 문자열을 찾습니다. _ 는 정확히 1개 문자를 의미하므로 LIKE '___'은 정확히 3글자인 문자열을 찾습니다.
  tips:
  - LIKE '%pattern%'은 pattern이 문자열 어디든 포함되면 매칭됩니다. LIKE 'pattern%'은 pattern으로 시작, LIKE '%pattern'은 pattern으로
    끝나는 문자열을 찾습니다. _ 는 정확히 1개 문자를 의미하므로 LIKE '___'은 정확히 3글자인 문자열을 찾습니다.
  snippet: |-
    duckdb.sql("""
        SELECT name
        FROM titanic
        WHERE name LIKE '%Mr.%'
        LIMIT 5
    """).show()
  exercise:
    prompt: 2단계. LIKE 패턴 매칭 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT name
          FROM titanic
          WHERE name LIKE '%Mr.%'
          LIMIT 5
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 2단계. LIKE 패턴 매칭의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 2단계. LIKE 패턴 매칭 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step3_like_variants
  title: 3단계. 다양한 LIKE 패턴
  structuredPrimary: true
  subtitle: Mrs., Miss., Master.
  goal: 3단계. 다양한 LIKE 패턴에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: 타이타닉 이름 데이터에서 다양한 호칭을 검색합니다. Mrs.는 기혼 여성, Miss.는 미혼 여성, Master.는 소년을 나타냅니다. LIKE 패턴으로 각
    호칭을 가진 승객을 필터링할 수 있습니다. 여러 패턴을 OR로 연결하거나 CASE WHEN으로 분류할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            CASE
                WHEN name LIKE '%Mr.%' THEN 'Mr.'
                WHEN name LIKE '%Mrs.%' THEN 'Mrs.'
                WHEN name LIKE '%Miss.%' THEN 'Miss.'
                WHEN name LIKE '%Master.%' THEN 'Master.'
                ELSE 'Other'
            END AS title,
            COUNT(*) AS cnt
        FROM titanic
        GROUP BY title
        ORDER BY cnt DESC
    """).show()
  exercise:
    prompt: 3단계. 다양한 LIKE 패턴 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              CASE
                  WHEN name LIKE '%Mr.%' THEN 'Mr.'
                  WHEN name LIKE '%Mrs.%' THEN 'Mrs.'
                  WHEN name LIKE '%Miss.%' THEN 'Miss.'
                  WHEN name LIKE '%Master.%' THEN 'Master.'
                  ELSE 'Other'
              END AS title,
              COUNT(*) AS cnt
          FROM titanic
          GROUP BY title
          ORDER BY cnt DESC
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 3단계. 다양한 LIKE 패턴의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 3단계. 다양한 LIKE 패턴 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step4_concat_intro
  title: 4단계. CONCAT - 문자열 결합
  structuredPrimary: true
  subtitle: 여러 컬럼 합치기
  goal: 4단계. CONCAT 문자열 결합에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    CONCAT 함수는 여러 문자열을 하나로 합칩니다. CONCAT(a, b, c)는 a, b, c를 순서대로 연결합니다. || 연산자도 동일한 기능을 합니다. 예를 들어 성과 이름을 합치거나, 여러 컬럼을 조합하여 새로운 식별자를 만들 때 사용합니다. 실무에서는 보고서용 라벨 생성, 전체 주소 조합, ID 생성 등에 활용됩니다.

    CONCAT(a, b, c)는 a || b || c와 동일합니다. ||는 SQL 표준 문자열 연결 연산자입니다. NULL을 포함하면 결과도 NULL이 되므로 COALESCE로 기본값을 지정하는 것이 안전합니다. 예: CONCAT(COALESCE(col1, ''), col2)
  tips:
  - 'CONCAT(a, b, c)는 a || b || c와 동일합니다. ||는 SQL 표준 문자열 연결 연산자입니다. NULL을 포함하면 결과도 NULL이 되므로 COALESCE로
    기본값을 지정하는 것이 안전합니다. 예: CONCAT(COALESCE(col1, ''''), col2)'
  snippet: |-
    duckdb.sql("""
        SELECT
            CONCAT(class, ' - ', who) AS classInfo,
            name
        FROM titanic
        LIMIT 5
    """).show()
  exercise:
    prompt: 4단계. CONCAT 문자열 결합 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              CONCAT(class, ' - ', who) AS classInfo,
              name
          FROM titanic
          LIMIT 5
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 4단계. CONCAT 문자열 결합의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 4단계. CONCAT 문자열 결합 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step5_substr_intro
  title: 5단계. SUBSTR - 부분 문자열 추출
  structuredPrimary: true
  subtitle: 문자열 자르기
  goal: 5단계. SUBSTR 부분 문자열 추출에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    SUBSTR(문자열, 시작위치, 길이)는 문자열의 일부를 추출합니다. 시작위치는 1부터 시작하며(0이 아님), 길이만큼 잘라냅니다. 예를 들어 SUBSTR('Hello', 1, 2)는 'He'를 반환합니다. 긴 텍스트를 요약하거나 고정 길이 필드에서 특정 부분만 추출할 때 유용합니다. 주민등록번호에서 생년월일, 전화번호에서 지역번호 추출 등에 사용됩니다.

    SUBSTR(str, start, len)의 start는 1부터 시작합니다. SUBSTR(str, 1, 10)은 첫 10글자를 추출합니다. len을 생략하면 start부터 끝까지 모두 가져옵니다. SUBSTR(str, -5)는 뒤에서 5글자를 의미하는 DB도 있지만 DuckDB는 양수만 지원합니다.
  tips:
  - SUBSTR(str, start, len)의 start는 1부터 시작합니다. SUBSTR(str, 1, 10)은 첫 10글자를 추출합니다. len을 생략하면 start부터 끝까지
    모두 가져옵니다. SUBSTR(str, -5)는 뒤에서 5글자를 의미하는 DB도 있지만 DuckDB는 양수만 지원합니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            name,
            SUBSTR(name, 1, 20) AS shortName
        FROM titanic
        LIMIT 5
    """).show()
  exercise:
    prompt: 5단계. SUBSTR 부분 문자열 추출 예제에서 SQL 컬럼, WHERE 조건, 집계 기준 중 하나를 바꾸고 쿼리 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              name,
              SUBSTR(name, 1, 20) AS shortName
          FROM titanic
          LIMIT 5
      """).show()
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 5단계. SUBSTR 부분 문자열 추출의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 5단계. SUBSTR 부분 문자열 추출 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step6_upper_lower
  title: 6단계. UPPER, LOWER - 대소문자 변환
  structuredPrimary: true
  subtitle: 대소문자 통일
  goal: 6단계. UPPER, LOWER 대소문자 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    UPPER는 모든 문자를 대문자로, LOWER는 모든 문자를 소문자로 변환합니다. 대소문자 구분 없이 비교하거나 데이터를 정규화할 때 필수적입니다. 예를 들어 사용자 입력('seoul', 'Seoul', 'SEOUL')을 모두 소문자로 통일하면 비교가 쉬워집니다. 실무에서는 중복 제거, 그룹화, 검색 전처리에 자주 사용됩니다.

    UPPER와 LOWER는 영문자만 변환하고 숫자나 특수문자는 그대로 유지합니다. 대소문자 구분 없이 비교하려면 WHERE LOWER(col) = LOWER('pattern')처럼 양쪽을 모두 변환해야 합니다. 성능을 위해 WHERE 절에서는 함수 호출을 최소화하는 것이 좋습니다.
  tips:
  - UPPER와 LOWER는 영문자만 변환하고 숫자나 특수문자는 그대로 유지합니다. 대소문자 구분 없이 비교하려면 WHERE LOWER(col) = LOWER('pattern')처럼
    양쪽을 모두 변환해야 합니다. 성능을 위해 WHERE 절에서는 함수 호출을 최소화하는 것이 좋습니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            embark_town,
            UPPER(embark_town) AS upperTown,
            LOWER(embark_town) AS lowerTown
        FROM titanic
        WHERE embark_town IS NOT NULL
        LIMIT 5
    """).show()
