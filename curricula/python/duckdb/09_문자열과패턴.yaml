    noError: 10단계. SPLITPART 문자열 분리의 SQL 컬럼, 테이블명, 조건식이 쿼리 엔진에서 해석되어야 합니다.
    resultCheck: 10단계. SPLITPART 문자열 분리 쿼리 결과의 행 수, 컬럼명, 집계값이 바꾼 SQL 조건을 반영해야 합니다.
- id: step11_regexp_intro
  title: 11단계. 정규표현식 기초
  structuredPrimary: true
  subtitle: REGEXP_MATCHES 패턴 체크
  goal: 11단계. 정규표현식 기초에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: 11단계. 정규표현식 기초의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
