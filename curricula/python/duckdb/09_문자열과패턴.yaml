- id: step7_trim
  title: 7단계. TRIM - 공백 제거
  structuredPrimary: true
  subtitle: 앞뒤 공백 정리
  goal: 7단계. TRIM 공백 제거에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    TRIM은 문자열 앞뒤의 공백을 제거합니다. LTRIM은 왼쪽, RTRIM은 오른쪽만 제거합니다. 사용자 입력이나 파일에서 읽은 데이터는 불필요한 공백이 포함되는 경우가 많아 TRIM으로 정제해야 합니다. 공백 때문에 같은 값이 다르게 인식되는 문제를 방지할 수 있습니다. 실무 데이터 정제의 기본 단계입니다.

    TRIM은 공백(스페이스, 탭, 줄바꿈)을 제거합니다. TRIM(BOTH ' ' FROM col)처럼 제거할 문자를 명시할 수도 있습니다. 데이터를 비교하거나 그룹화하기 전에 TRIM을 적용하면 공백으로 인한 불일치를 방지할 수 있습니다.
  tips:
  - TRIM은 공백(스페이스, 탭, 줄바꿈)을 제거합니다. TRIM(BOTH ' ' FROM col)처럼 제거할 문자를 명시할 수도 있습니다. 데이터를 비교하거나 그룹화하기 전에
    TRIM을 적용하면 공백으로 인한 불일치를 방지할 수 있습니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            TRIM('  Hello World  ') AS trimmed,
            LTRIM('  Hello World  ') AS leftTrimmed,
            RTRIM('  Hello World  ') AS rightTrimmed
    """).show()
