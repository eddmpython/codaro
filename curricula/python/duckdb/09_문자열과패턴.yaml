- id: step9_replace
  title: 9단계. REPLACE - 문자열 치환
  structuredPrimary: true
  subtitle: 패턴 바꾸기
  goal: 9단계. REPLACE 문자열 치환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    REPLACE(문자열, 찾을값, 바꿀값)는 문자열 내 특정 패턴을 다른 값으로 치환합니다. 모든 일치 항목을 변경하므로 일괄 수정에 유용합니다. 예를 들어 전화번호 형식 변경, 특수문자 제거, 오타 일괄 수정 등에 사용됩니다. 데이터 정제와 표준화의 핵심 함수입니다.

    REPLACE는 대소문자를 구분합니다. 'Southampton'와 'southampton'은 다릅니다. 대소문자 구분 없이 치환하려면 LOWER나 UPPER로 먼저 변환해야 합니다. 여러 패턴을 치환하려면 REPLACE를 중첩하거나 REGEXP_REPLACE를 사용합니다.
  tips:
  - REPLACE는 대소문자를 구분합니다. 'Southampton'와 'southampton'은 다릅니다. 대소문자 구분 없이 치환하려면 LOWER나 UPPER로 먼저 변환해야 합니다.
    여러 패턴을 치환하려면 REPLACE를 중첩하거나 REGEXP_REPLACE를 사용합니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            embark_town,
            REPLACE(embark_town, 'Southampton', 'S-town') AS replaced
        FROM titanic
        WHERE embark_town IS NOT NULL
        LIMIT 5
    """).show()
