  explanation: 이름에서 호칭을 추출하여 호칭별 생존율을 분석합니다. 문자열 함수로 데이터를 정제한 후 GROUP BY로 집계하는 전형적인 실무 패턴입니다. 호칭은 나이와
    성별 정보를 내포하므로 생존율에 큰 영향을 미칩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
