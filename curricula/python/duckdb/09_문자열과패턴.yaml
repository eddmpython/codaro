- id: step12_regexp_extract
  title: 12단계. REGEXP_EXTRACT - 패턴 추출
  structuredPrimary: true
  subtitle: 정규표현식으로 값 뽑기
  goal: 12단계. REGEXPEXTRACT 패턴 추출에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: REGEXP_EXTRACT는 정규표현식 패턴에 일치하는 부분을 추출합니다. SPLIT_PART보다 복잡한 패턴을 다룰 수 있습니다. 괄호()로 그룹을 지정하면
    해당 부분만 추출할 수 있습니다. 실무에서 이메일 주소에서 도메인 추출, URL에서 파라미터 파싱, 로그에서 특정 값 추출 등에 활용됩니다.
  tips:
