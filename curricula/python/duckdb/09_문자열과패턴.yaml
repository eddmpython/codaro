- id: step8_length
  title: 8단계. LENGTH - 문자열 길이
  structuredPrimary: true
  subtitle: 글자 수 세기
  goal: 8단계. LENGTH 문자열 길이에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 쿼리 조건과 결과를 같이 확인해야 리포트나 집계 자동화에서 잘못된 행을 줄일 수 있습니다.
  explanation: |-
    LENGTH는 문자열의 길이(글자 수)를 반환합니다. 바이트가 아닌 문자 개수를 세므로 한글도 1글자로 계산됩니다. 문자열 검증(최소/최대 길이 확인), 정렬, 필터링에 사용됩니다. 예를 들어 비밀번호 길이 검증, 트윗 140자 제한, 상품명 길이 분석 등에 활용됩니다.

    LENGTH는 문자 개수를 반환합니다. 공백도 1글자로 계산됩니다. 바이트 길이가 필요하면 OCTET_LENGTH를 사용합니다. 한글, 이모지 등 멀티바이트 문자는 LENGTH와 OCTET_LENGTH가 다를 수 있습니다.
  tips:
  - LENGTH는 문자 개수를 반환합니다. 공백도 1글자로 계산됩니다. 바이트 길이가 필요하면 OCTET_LENGTH를 사용합니다. 한글, 이모지 등 멀티바이트 문자는 LENGTH와
    OCTET_LENGTH가 다를 수 있습니다.
  snippet: |-
