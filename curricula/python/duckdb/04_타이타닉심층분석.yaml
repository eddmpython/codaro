meta:
  id: duckdb_04
  title: 타이타닉심층분석
  order: 4
  category: duckdb
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["titanic", "HAVING", "NULL", "GROUP BY", "집계"]
  seo:
    title: "DuckDB HAVING과 NULL 처리 - 타이타닉 심층 분석"
    description: "타이타닉 데이터로 복합 조건 집계와 필터링을 학습합니다. HAVING, IS NULL, IS NOT NULL 사용법을 배웁니다."
    keywords: ["DuckDB", "HAVING", "IS NULL", "GROUP BY", "타이타닉", "SQL 집계"]

intro:
  emoji: "🚢"
  goal: 타이타닉 승객 데이터로 복합 조건 집계와 NULL 처리를 마스터합니다.
  description: GROUP BY로 그룹화한 결과를 HAVING으로 필터링하고, NULL 값을 올바르게 처리하는 방법을 배웁니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 타이타닉 데이터 준비
  blocks:
  - type: text
    content: 891명의 타이타닉 승객 데이터를 불러옵니다. 이번 프로젝트에서는 HAVING과 NULL 처리라는 두 가지 핵심 개념을 배웁니다. HAVING은 GROUP BY 결과를 필터링할 때 사용하고, NULL 처리는 실무 데이터에서 필수적인 결측값 처리 기법입니다. survived, pclass, sex, age, fare 등의 컬럼을 활용합니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: titanic.csv 로드
    content: |-
      import pandas as pd
      import duckdb

      baseUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master"
      df = pd.read_csv(f"{baseUrl}/titanic.csv")
      titanic = duckdb.from_df(df)

      duckdb.sql("SELECT * FROM titanic LIMIT 5").show()

- id: step2_null_check
  title: 2단계. NULL 값 확인
  subtitle: 결측값 탐색
  blocks:
  - type: text
    content: age 컬럼에 NULL 값이 있는지 확인합니다. 실제 데이터에서 결측값(NULL)은 매우 흔하며, 데이터 품질을 평가하는 첫 번째 단계입니다. COUNT(*)는 모든 행을 세고, COUNT(age)는 NULL을 제외한 행만 세므로 차이가 결측값 개수입니다. 타이타닉 데이터에서 약 177명의 나이 정보가 누락되어 있습니다.
  - type: code
    language: python
    title: NULL 개수 확인
    description: age가 NULL인 행 수 조회
    content: |-
      duckdb.sql("""
          SELECT
              COUNT(*) AS totalCount,
              COUNT(age) AS ageNotNull,
              COUNT(*) - COUNT(age) AS ageNull
          FROM titanic
      """).show()

- id: step3_is_null
  title: 3단계. IS NULL로 필터링
  subtitle: NULL 값만 선택
  blocks:
  - type: text
    content: IS NULL로 age가 없는 승객만 조회합니다. =로는 NULL을 비교할 수 없습니다. NULL은 '알 수 없는 값'이므로 age = NULL은 항상 FALSE를 반환합니다. 반드시 IS NULL 구문을 사용해야 합니다.
  - type: code
    language: python
    title: 나이 미상 승객 조회
    description: IS NULL 사용
    content: |-
      duckdb.sql("""
          SELECT pclass, sex, fare, embarked
          FROM titanic
          WHERE age IS NULL
          LIMIT 10
      """).show()
  - type: tip
    content: NULL은 '알 수 없음'을 의미합니다. age = NULL은 동작하지 않습니다. 반드시 IS NULL 또는 IS NOT NULL을 사용하세요.

- id: step4_is_not_null
  title: 4단계. IS NOT NULL로 필터링
  subtitle: NULL 제외
  blocks:
  - type: text
    content: IS NOT NULL로 age가 있는 승객만 조회합니다. 분석에서 결측값을 제외할 때 사용합니다. 평균, 최댓값 같은 통계 분석에서는 NULL을 제거하지 않으면 왜곡된 결과가 나올 수 있습니다.
  - type: code
    language: python
    title: 나이 정보가 있는 승객
    description: IS NOT NULL 사용
    content: |-
      duckdb.sql("""
          SELECT pclass, sex, age, fare
          FROM titanic
          WHERE age IS NOT NULL
          ORDER BY age
          LIMIT 10
      """).show()

- id: step5_group_avg
  title: 5단계. 그룹별 평균 계산
  subtitle: GROUP BY와 AVG
  blocks:
  - type: text
    content: 객실 등급(pclass)별 평균 나이와 평균 요금을 계산합니다. GROUP BY pclass로 등급별로 묶은 후 AVG 함수로 평균을 구합니다. WHERE age IS NOT NULL로 나이 정보가 있는 승객만 포함시켜 정확한 통계를 얻습니다.
  - type: code
    language: python
    title: 등급별 평균
    description: GROUP BY pclass
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              COUNT(*) AS passengerCount,
              ROUND(AVG(age), 1) AS avgAge,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          WHERE age IS NOT NULL
          GROUP BY pclass
          ORDER BY pclass
      """).show()

- id: step6_having_intro
  title: 6단계. HAVING 소개
  subtitle: 그룹 필터링
  blocks:
  - type: text
    content: HAVING은 GROUP BY 결과를 필터링합니다. WHERE가 개별 행을 필터링한다면, HAVING은 그룹을 필터링합니다.
  - type: code
    language: python
    title: 50명 이상 그룹만 조회
    description: HAVING 사용
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              COUNT(*) AS passengerCount,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          GROUP BY pclass, sex
          HAVING COUNT(*) >= 50
          ORDER BY avgFare DESC
      """).show()
  - type: tip
    content: HAVING은 GROUP BY 이후에 실행됩니다. WHERE는 그룹화 전, HAVING은 그룹화 후 필터링입니다. 집계 함수 결과로 필터링할 때는 HAVING을 사용하세요.

- id: step7_having_avg
  title: 7단계. 평균값으로 필터링
  subtitle: HAVING과 AVG
  blocks:
  - type: text
    content: 평균 요금이 30달러 이상인 그룹만 조회합니다. HAVING은 GROUP BY 이후 집계 결과로 필터링할 때 사용합니다. WHERE는 행 단위 필터이고, HAVING은 그룹 단위 필터입니다.
  - type: code
    language: python
    title: 평균 요금 30 이상 그룹
    description: HAVING AVG 조건
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              embarked,
              COUNT(*) AS passengerCount,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          WHERE embarked IS NOT NULL
          GROUP BY pclass, embarked
          HAVING AVG(fare) >= 30
          ORDER BY avgFare DESC
      """).show()

- id: step8_survival_analysis
  title: 8단계. 생존율 분석
  subtitle: CASE WHEN과 AVG
  blocks:
  - type: text
    content: survived는 1(생존) 또는 0(사망)입니다. AVG(survived)로 생존율을 계산합니다. 0과 1의 평균은 1의 비율과 같으므로, AVG(survived)에 100을 곱하면 퍼센트 생존율이 됩니다. 이 트릭은 이진 데이터의 비율 계산에 자주 사용됩니다.
  - type: code
    language: python
    title: 등급/성별 생존율
    description: 생존율 계산
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              COUNT(*) AS totalCount,
              SUM(survived) AS survivedCount,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          GROUP BY pclass, sex
          ORDER BY survivalRate DESC
      """).show()

- id: step9_in_filter
  title: 9단계. IN으로 다중 조건
  subtitle: 특정 값들 선택
  blocks:
  - type: text
    content: IN을 사용해 특정 탑승지(embarked)만 분석합니다. S(Southampton), C(Cherbourg)에서 탑승한 승객만 조회합니다.
  - type: code
    language: python
    title: 특정 탑승지 분석
    description: IN 조건 사용
    content: |-
      duckdb.sql("""
          SELECT
              embarked,
              pclass,
              COUNT(*) AS passengerCount,
              ROUND(AVG(fare), 2) AS avgFare,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          WHERE embarked IN ('S', 'C')
          GROUP BY embarked, pclass
          ORDER BY embarked, pclass
      """).show()

- id: step10_complex_having
  title: 10단계. 복합 HAVING 조건
  subtitle: AND로 다중 조건
  blocks:
  - type: text
    content: HAVING에 AND를 사용해 여러 조건을 동시에 적용합니다. 승객 수 30명 이상이면서 생존율 50% 이상인 그룹을 찾습니다.
  - type: code
    language: python
    title: 복합 조건 필터링
    description: HAVING AND
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              embarked,
              COUNT(*) AS passengerCount,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          WHERE age IS NOT NULL AND embarked IS NOT NULL
          GROUP BY pclass, sex, embarked
          HAVING COUNT(*) >= 30 AND AVG(survived) >= 0.5
          ORDER BY survivalRate DESC
      """).show()

- id: step11_case_category
  title: 11단계. CASE로 카테고리 생성
  subtitle: 나이 그룹 분류
  blocks:
  - type: text
    content: CASE WHEN으로 나이를 그룹화하고, 그룹별 생존율을 분석합니다. 연속형 변수인 나이를 범주형으로 변환하면 패턴을 파악하기 쉬워집니다. 미성년자, 성인, 노인 그룹의 생존율 차이를 명확히 비교할 수 있습니다.
  - type: code
    language: python
    title: 나이 그룹별 생존율
    description: CASE WHEN 분류
    content: |-
      duckdb.sql("""
          SELECT
              CASE
                  WHEN age < 18 THEN '미성년자'
                  WHEN age < 60 THEN '성인'
                  ELSE '노인'
              END AS ageGroup,
              COUNT(*) AS passengerCount,
              SUM(survived) AS survivedCount,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          WHERE age IS NOT NULL
          GROUP BY ageGroup
          ORDER BY survivalRate DESC
      """).show()

- id: step12_final
  title: 12단계. 종합 분석
  subtitle: 모든 개념 활용
  blocks:
  - type: text
    content: 지금까지 배운 IS NOT NULL, GROUP BY, HAVING, CASE WHEN, IN을 모두 활용한 종합 분석입니다. 객실 등급, 연령대, 성별 세 가지 기준으로 다중 그룹화하고, 결측치를 제외하며, 충분한 표본(10명 이상)이 있는 그룹만 필터링합니다. 이런 복합 조건 분석을 통해 타이타닉 생존의 핵심 패턴을 도출할 수 있습니다.
  - type: code
    language: python
    title: 타이타닉 종합 분석
    description: 최종 결과물
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              CASE
                  WHEN age < 18 THEN '미성년자'
                  WHEN age < 60 THEN '성인'
                  ELSE '노인'
              END AS ageGroup,
              sex,
              COUNT(*) AS passengerCount,
              ROUND(AVG(fare), 2) AS avgFare,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          WHERE age IS NOT NULL AND embarked IN ('S', 'C', 'Q')
          GROUP BY pclass, ageGroup, sex
          HAVING COUNT(*) >= 10
          ORDER BY survivalRate DESC, passengerCount DESC
      """).show()

- id: practice
  title: 실습
  subtitle: 타이타닉 심층 분석 프로젝트
  blocks:
  - type: text
    content: HAVING과 NULL 처리, CASE WHEN, IN 연산자를 활용해 타이타닉 데이터를 분석합니다. 실무에서는 결측치 처리와 그룹 필터링이 필수적이며, 이 미션을 통해 이러한 패턴을 연습합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: embarked가 NULL인 승객 정보 조회"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
        tbl1 = duckdb.from_df(data)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT pclass, sex, age, fare, survived
            FROM tbl1
            WHERE embarked IS NULL
        """)
  - type: expansion
    title: "미션2: 평균 나이가 30세 이상인 그룹 찾기"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        frame = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
        tbl2 = duckdb.from_df(frame)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                pclass,
                sex,
                COUNT(*) AS cnt,
                ROUND(AVG(age), 1) AS avgAge
            FROM tbl2
            WHERE age IS NOT NULL
            GROUP BY pclass, sex
            HAVING AVG(age) >= 30
            ORDER BY avgAge DESC
        """)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 복합 조건 집계와 NULL 처리를 마스터했습니다.
  - type: list
    items:
    - "IS NULL - NULL 값인 행 선택"
    - "IS NOT NULL - NULL이 아닌 행 선택"
    - "HAVING - GROUP BY 결과 필터링"
    - "HAVING COUNT(*) >= n - 행 수 조건"
    - "HAVING AVG(col) >= n - 평균값 조건"
    - "WHERE vs HAVING - 행 필터 vs 그룹 필터"
  - type: text
    content: 다음 시간에는 서브쿼리를 활용한 고급 필터링을 배웁니다.
