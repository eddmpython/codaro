    resultCheck: 출력 또는 assert 확인
- id: step5_group_avg
  title: 5단계. 그룹별 평균 계산
  structuredPrimary: true
  subtitle: GROUP BY와 AVG
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 객실 등급(pclass)별 평균 나이와 평균 요금을 계산합니다. GROUP BY pclass로 등급별로 묶은 후 AVG 함수로 평균을 구합니다. WHERE age IS NOT NULL로 나이 정보가 있는 승객만 포함시켜 정확한 통계를 얻습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            pclass,
            COUNT(*) AS passengerCount,
            ROUND(AVG(age), 1) AS avgAge,
            ROUND(AVG(fare), 2) AS avgFare
        FROM titanic
        WHERE age IS NOT NULL
        GROUP BY pclass
        ORDER BY pclass
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              pclass,
              COUNT(*) AS passengerCount,
              ROUND(AVG(age), 1) AS avgAge,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          WHERE age IS NOT NULL
          GROUP BY pclass
          ORDER BY pclass
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_having_intro
  title: 6단계. HAVING 소개
  structuredPrimary: true
  subtitle: 그룹 필터링
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    HAVING은 GROUP BY 결과를 필터링합니다. WHERE가 개별 행을 필터링한다면, HAVING은 그룹을 필터링합니다.

    HAVING은 GROUP BY 이후에 실행됩니다. WHERE는 그룹화 전, HAVING은 그룹화 후 필터링입니다. 집계 함수 결과로 필터링할 때는 HAVING을 사용하세요.
  tips:
  - HAVING은 GROUP BY 이후에 실행됩니다. WHERE는 그룹화 전, HAVING은 그룹화 후 필터링입니다. 집계 함수 결과로 필터링할 때는 HAVING을 사용하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            pclass,
            sex,
            COUNT(*) AS passengerCount,
            ROUND(AVG(fare), 2) AS avgFare
        FROM titanic
        GROUP BY pclass, sex
        HAVING COUNT(*) >= 50
        ORDER BY avgFare DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              COUNT(*) AS passengerCount,
              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          GROUP BY pclass, sex
          HAVING COUNT(*) >= 50
          ORDER BY avgFare DESC
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_having_avg
  title: 7단계. 평균값으로 필터링
  structuredPrimary: true
  subtitle: HAVING과 AVG
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 평균 요금이 30달러 이상인 그룹만 조회합니다. HAVING은 GROUP BY 이후 집계 결과로 필터링할 때 사용합니다. WHERE는 행 단위 필터이고, HAVING은 그룹 단위 필터입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            pclass,
            embarked,
            COUNT(*) AS passengerCount,
            ROUND(AVG(fare), 2) AS avgFare
        FROM titanic
        WHERE embarked IS NOT NULL
        GROUP BY pclass, embarked
        HAVING AVG(fare) >= 30
        ORDER BY avgFare DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
