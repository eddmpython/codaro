              ROUND(AVG(fare), 2) AS avgFare
          FROM titanic
          WHERE embarked IS NOT NULL
          GROUP BY pclass, embarked
          HAVING AVG(fare) >= 30
          ORDER BY avgFare DESC
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_survival_analysis
  title: 8단계. 생존율 분석
  structuredPrimary: true
  subtitle: CASE WHEN과 AVG
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: survived는 1(생존) 또는 0(사망)입니다. AVG(survived)로 생존율을 계산합니다. 0과 1의 평균은 1의 비율과 같으므로, AVG(survived)에 100을 곱하면 퍼센트 생존율이 됩니다. 이 트릭은 이진 데이터의 비율 계산에 자주 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            pclass,
            sex,
            COUNT(*) AS totalCount,
            SUM(survived) AS survivedCount,
            ROUND(AVG(survived) * 100, 1) AS survivalRate
        FROM titanic
        GROUP BY pclass, sex
        ORDER BY survivalRate DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
