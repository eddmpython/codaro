          FROM titanic
          GROUP BY pclass, sex
          ORDER BY survivalRate DESC
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_in_filter
  title: 9단계. IN으로 다중 조건
  structuredPrimary: true
  subtitle: 특정 값들 선택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: IN을 사용해 특정 탑승지(embarked)만 분석합니다. S(Southampton), C(Cherbourg)에서 탑승한 승객만 조회합니다.
  tips:
