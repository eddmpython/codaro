- id: step2_null_check
  title: 2단계. NULL 값 확인
  structuredPrimary: true
  subtitle: 결측값 탐색
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: age 컬럼에 NULL 값이 있는지 확인합니다. 실제 데이터에서 결측값(NULL)은 매우 흔하며, 데이터 품질을 평가하는 첫 번째 단계입니다. COUNT(*)는 모든 행을 세고, COUNT(age)는 NULL을 제외한 행만 세므로 차이가 결측값 개수입니다. 타이타닉 데이터에서 약 177명의 나이 정보가 누락되어 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            COUNT(*) AS totalCount,
            COUNT(age) AS ageNotNull,
            COUNT(*) - COUNT(age) AS ageNull
        FROM titanic
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              COUNT(*) AS totalCount,
              COUNT(age) AS ageNotNull,
              COUNT(*) - COUNT(age) AS ageNull
          FROM titanic
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_is_null
  title: 3단계. IS NULL로 필터링
  structuredPrimary: true
  subtitle: NULL 값만 선택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    IS NULL로 age가 없는 승객만 조회합니다. =로는 NULL을 비교할 수 없습니다. NULL은 '알 수 없는 값'이므로 age = NULL은 항상 FALSE를 반환합니다. 반드시 IS NULL 구문을 사용해야 합니다.

    NULL은 '알 수 없음'을 의미합니다. age = NULL은 동작하지 않습니다. 반드시 IS NULL 또는 IS NOT NULL을 사용하세요.
  tips:
  - NULL은 '알 수 없음'을 의미합니다. age = NULL은 동작하지 않습니다. 반드시 IS NULL 또는 IS NOT NULL을 사용하세요.
  snippet: |-
    duckdb.sql("""
        SELECT pclass, sex, fare, embarked
        FROM titanic
        WHERE age IS NULL
        LIMIT 10
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT pclass, sex, fare, embarked
          FROM titanic
          WHERE age IS NULL
          LIMIT 10
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_is_not_null
  title: 4단계. IS NOT NULL로 필터링
  structuredPrimary: true
  subtitle: NULL 제외
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: IS NOT NULL로 age가 있는 승객만 조회합니다. 분석에서 결측값을 제외할 때 사용합니다. 평균, 최댓값 같은 통계 분석에서는 NULL을 제거하지 않으면 왜곡된 결과가 나올 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT pclass, sex, age, fare
        FROM titanic
        WHERE age IS NOT NULL
        ORDER BY age
        LIMIT 10
    """).show()
