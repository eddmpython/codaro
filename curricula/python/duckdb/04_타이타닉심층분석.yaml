- id: step11_case_category
  title: 11단계. CASE로 카테고리 생성
  structuredPrimary: true
  subtitle: 나이 그룹 분류
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: CASE WHEN으로 나이를 그룹화하고, 그룹별 생존율을 분석합니다. 연속형 변수인 나이를 범주형으로 변환하면 패턴을 파악하기 쉬워집니다. 미성년자, 성인, 노인 그룹의 생존율 차이를 명확히 비교할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            CASE
                WHEN age < 18 THEN '미성년자'
                WHEN age < 60 THEN '성인'
                ELSE '노인'
            END AS ageGroup,
            COUNT(*) AS passengerCount,
            SUM(survived) AS survivedCount,
            ROUND(AVG(survived) * 100, 1) AS survivalRate
        FROM titanic
        WHERE age IS NOT NULL
        GROUP BY ageGroup
        ORDER BY survivalRate DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              CASE
                  WHEN age < 18 THEN '미성년자'
                  WHEN age < 60 THEN '성인'
                  ELSE '노인'
              END AS ageGroup,
              COUNT(*) AS passengerCount,
              SUM(survived) AS survivedCount,
              ROUND(AVG(survived) * 100, 1) AS survivalRate
          FROM titanic
          WHERE age IS NOT NULL
          GROUP BY ageGroup
          ORDER BY survivalRate DESC
      """).show()
