    language: python
    title: 수정 실험
    description: 요일 평균보다 얼마나 더 높은 주문만 볼지 기준을 바꿔 비교합니다.
    content: |-
      def countOrdersAboveDayAverage(minDiff):
          return duckdb.sql(f"""
              SELECT COUNT(*) AS cnt
              FROM tips t
              JOIN (
                  SELECT day, AVG(tip) AS avgTip
                  FROM tips
                  GROUP BY day
              ) AS dayAvg ON t.day = dayAvg.day
              WHERE t.tip - dayAvg.avgTip >= {minDiff}
          """).fetchone()[0]

      broadOrderCount = countOrdersAboveDayAverage(0.5)
      strictOrderCount = countOrdersAboveDayAverage(1.5)

      broadOrderCount, strictOrderCount
