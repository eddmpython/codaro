- id: step3_scalar_subquery
  title: 3단계. 스칼라 서브쿼리
  structuredPrimary: true
  subtitle: SELECT 절 안에 서브쿼리
  goal: '3단계. 스칼라 서브쿼리: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 스칼라 서브쿼리: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    스칼라 서브쿼리는 SELECT 절에 서브쿼리를 넣어 단일 값(1행 1열)을 가져옵니다. 각 행마다 전체 평균과 비교할 때 매우 유용합니다. 예를 들어 "이 고객의 팁이 전체 평균보다 높은가?"라는 질문에 답할 수 있습니다. 서브쿼리는 메인 쿼리가 실행될 때마다 평가되어 동적인 비교가 가능합니다.

    스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다.
  tips:
  - 스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            total_bill,
            tip,
            (SELECT AVG(tip) FROM tips) AS avgTip,
            tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
        FROM tips
        ORDER BY tip DESC
        LIMIT 10
    """).show()
  exercise:
    prompt: '3단계. 스칼라 서브쿼리: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      duckdb.sql("""
          SELECT
              total_bill,
              tip,
              (SELECT AVG(tip) FROM tips) AS avgTip,
              tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
          FROM tips
          ORDER BY tip DESC
          LIMIT 10
      """).show()
    solution: |-
      duckdb.sql("""
          SELECT
              total_bill,
              tip,
              (SELECT AVG(tip) FROM tips) AS avgTip,
              tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
          FROM tips
          ORDER BY tip DESC
          LIMIT 10
      """).show()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 스칼라 서브쿼리는 SELECT 절에 서브쿼리를 넣어 단일 값(1행 1열)을 가져옵니다. 각 행마다 전체 평균과 비교할 때 매우 유용합니다. 예를 들어 "이 고객의 팁이 전체 평균보다 높은가?"라는
      질문에 답할 수 있습니다. 서브쿼리는 메인 쿼리가 실행될 때마다 평가되어 동적인 비교가 가능합니다.
  - type: code
    language: python
    title: 전체 평균과 비교
    description: 각 행에 평균 추가
    content: |-
      duckdb.sql("""
          SELECT
              total_bill,
              tip,
              (SELECT AVG(tip) FROM tips) AS avgTip,
              tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
          FROM tips
          ORDER BY tip DESC
          LIMIT 10
      """).show()
  - type: tip
    content: 스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다.
- id: step4_scalar_tip_rate
  title: 4단계. 팁 비율 비교
  structuredPrimary: true
  subtitle: 스칼라 서브쿼리 활용
  goal: '4단계. 팁 비율 비교: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 팁 비율 비교: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 각 고객의 팁 비율을 전체 평균 팁 비율과 비교합니다. 평균보다 후하게 팁을 준 고객을 찾을 수 있습니다. 스칼라 서브쿼리는 매 행마다 평균값을 참조하여 개별 데이터와 전체 통계를 동시에 볼
    수 있게 해줍니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            day,
            total_bill,
            tip,
            ROUND(tip / total_bill * 100, 1) AS tipPct,
            ROUND((SELECT AVG(tip / total_bill) * 100 FROM tips), 1) AS avgTipPct
        FROM tips
        ORDER BY tipPct DESC
        LIMIT 10
    """).show()
