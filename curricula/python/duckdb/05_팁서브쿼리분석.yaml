- id: step2_subquery_intro
  title: 2단계. 서브쿼리란?
  structuredPrimary: true
  subtitle: 쿼리 안의 쿼리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 서브쿼리는 SELECT 문 안에 또 다른 SELECT 문을 넣는 것입니다. 크게 3가지 패턴이 있습니다. 1) 스칼라 서브쿼리 (SELECT 절에 사용), 2) WHERE 서브쿼리 (조건 필터링에 사용), 3) FROM 서브쿼리 (집계 결과를 테이블처럼 사용).
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT AVG(tip) AS avgTip
        FROM tips
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT AVG(tip) AS avgTip
          FROM tips
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_scalar_subquery
  title: 3단계. 스칼라 서브쿼리
  structuredPrimary: true
  subtitle: SELECT 절 안에 서브쿼리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    스칼라 서브쿼리는 SELECT 절에 서브쿼리를 넣어 단일 값(1행 1열)을 가져옵니다. 각 행마다 전체 평균과 비교할 때 매우 유용합니다. 예를 들어 "이 고객의 팁이 전체 평균보다 높은가?"라는 질문에 답할 수 있습니다. 서브쿼리는 메인 쿼리가 실행될 때마다 평가되어 동적인 비교가 가능합니다.

    스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다.
  tips:
  - 스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            total_bill,
            tip,
            (SELECT AVG(tip) FROM tips) AS avgTip,
            tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
        FROM tips
        ORDER BY tip DESC
        LIMIT 10
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              total_bill,
              tip,
              (SELECT AVG(tip) FROM tips) AS avgTip,
              tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
          FROM tips
          ORDER BY tip DESC
          LIMIT 10
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_scalar_tip_rate
  title: 4단계. 팁 비율 비교
  structuredPrimary: true
  subtitle: 스칼라 서브쿼리 활용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 각 고객의 팁 비율을 전체 평균 팁 비율과 비교합니다. 평균보다 후하게 팁을 준 고객을 찾을 수 있습니다. 스칼라 서브쿼리는 매 행마다 평균값을 참조하여 개별 데이터와 전체 통계를 동시에 볼 수 있게 해줍니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            day,
            total_bill,
            tip,
            ROUND(tip / total_bill * 100, 1) AS tipPct,
            ROUND((SELECT AVG(tip / total_bill) * 100 FROM tips), 1) AS avgTipPct
        FROM tips
        ORDER BY tipPct DESC
        LIMIT 10
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              day,
              total_bill,
              tip,
              ROUND(tip / total_bill * 100, 1) AS tipPct,
              ROUND((SELECT AVG(tip / total_bill) * 100 FROM tips), 1) AS avgTipPct
          FROM tips
          ORDER BY tipPct DESC
          LIMIT 10
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_where_subquery
  title: 5단계. WHERE 서브쿼리
  structuredPrimary: true
  subtitle: 동적 조건 필터링
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    WHERE 절에 서브쿼리를 사용하면 하드코딩 없이 동적으로 조건을 설정할 수 있습니다. 평균 이상인 데이터만 필터링해봅니다.

    WHERE 서브쿼리는 데이터 기반 필터링을 가능하게 합니다. WHERE tip > 3 대신 WHERE tip > (SELECT AVG(...))로 평균이 바뀌어도 자동 적용됩니다.
  tips:
  - WHERE 서브쿼리는 데이터 기반 필터링을 가능하게 합니다. WHERE tip > 3 대신 WHERE tip > (SELECT AVG(...))로 평균이 바뀌어도 자동 적용됩니다.
  snippet: |-
    duckdb.sql("""
        SELECT *
        FROM tips
        WHERE tip > (SELECT AVG(tip) FROM tips)
        ORDER BY tip DESC
        LIMIT 10
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT *
          FROM tips
          WHERE tip > (SELECT AVG(tip) FROM tips)
          ORDER BY tip DESC
          LIMIT 10
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_where_in
  title: 6단계. WHERE IN 서브쿼리
  structuredPrimary: true
  subtitle: 목록 필터링
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    WHERE IN 서브쿼리로 특정 조건을 만족하는 그룹의 데이터만 선택할 수 있습니다. 평균 팁이 3달러 이상인 요일의 데이터만 조회합니다.

    WHERE col IN (서브쿼리)는 서브쿼리 결과 목록에 포함된 값만 선택합니다. 서브쿼리는 단일 컬럼을 반환해야 합니다.
  tips:
  - WHERE col IN (서브쿼리)는 서브쿼리 결과 목록에 포함된 값만 선택합니다. 서브쿼리는 단일 컬럼을 반환해야 합니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            day,
            COUNT(*) AS cnt,
            ROUND(AVG(tip), 2) AS avgTip
        FROM tips
        WHERE day IN (
            SELECT day
            FROM tips
            GROUP BY day
            HAVING AVG(tip) > 3
        )
        GROUP BY day
        ORDER BY avgTip DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              day,
              COUNT(*) AS cnt,
              ROUND(AVG(tip), 2) AS avgTip
          FROM tips
          WHERE day IN (
              SELECT day
              FROM tips
              GROUP BY day
              HAVING AVG(tip) > 3
          )
          GROUP BY day
          ORDER BY avgTip DESC
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_from_subquery
  title: 7단계. FROM 서브쿼리
  structuredPrimary: true
  subtitle: 집계 결과를 테이블처럼 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    FROM 절에 서브쿼리를 넣으면 집계 결과를 마치 테이블처럼 사용할 수 있습니다. 복잡한 집계를 단계적으로 수행할 때 유용합니다.

    FROM 서브쿼리는 반드시 AS로 별칭을 지정해야 합니다. 별칭 없이는 컬럼을 참조할 수 없습니다.
  tips:
  - FROM 서브쿼리는 반드시 AS로 별칭을 지정해야 합니다. 별칭 없이는 컬럼을 참조할 수 없습니다.
  snippet: |-
    duckdb.sql("""
        SELECT
            sub.day,
            sub.avgTip,
            sub.maxTip,
            sub.cnt
        FROM (
            SELECT
                day,
                ROUND(AVG(tip), 2) AS avgTip,
                MAX(tip) AS maxTip,
                COUNT(*) AS cnt
            FROM tips
            GROUP BY day
        ) AS sub
        ORDER BY sub.avgTip DESC
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              sub.day,
              sub.avgTip,
              sub.maxTip,
              sub.cnt
          FROM (
              SELECT
                  day,
                  ROUND(AVG(tip), 2) AS avgTip,
                  MAX(tip) AS maxTip,
                  COUNT(*) AS cnt
              FROM tips
              GROUP BY day
          ) AS sub
          ORDER BY sub.avgTip DESC
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_from_rank
  title: 8단계. FROM 서브쿼리 + 윈도우 함수
  structuredPrimary: true
  subtitle: 순위 매긴 후 조회
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: FROM 서브쿼리와 윈도우 함수를 조합하면 순위를 매긴 후 특정 순위만 추출할 수 있습니다. 윈도우 함수는 WHERE 절에 직접 사용할 수 없으므로, FROM 서브쿼리로 한 번 감싸서 결과를 필터링합니다. 이 패턴은 'TOP N' 쿼리에서 자주 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            sub.day,
            sub.avgTip,
            sub.tipRank
        FROM (
            SELECT
                day,
                ROUND(AVG(tip), 2) AS avgTip,
                RANK() OVER(ORDER BY AVG(tip) DESC) AS tipRank
            FROM tips
            GROUP BY day
        ) AS sub
        ORDER BY sub.tipRank
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              sub.day,
              sub.avgTip,
              sub.tipRank
          FROM (
              SELECT
                  day,
                  ROUND(AVG(tip), 2) AS avgTip,
                  RANK() OVER(ORDER BY AVG(tip) DESC) AS tipRank
              FROM tips
              GROUP BY day
          ) AS sub
          ORDER BY sub.tipRank
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_complex_subquery
  title: 9단계. 복합 서브쿼리
  structuredPrimary: true
  subtitle: 그룹 평균과 비교
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 서브쿼리를 JOIN과 결합하면 각 그룹의 평균과 개별 값을 비교할 수 있습니다. 요일별 평균보다 높은 팁만 추출합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            t.day,
            t.total_bill,
            t.tip,
            dayAvg.avgTip AS dayAvgTip,
            ROUND(t.tip - dayAvg.avgTip, 2) AS diffFromDayAvg
        FROM tips t
        JOIN (
            SELECT day, AVG(tip) AS avgTip
            FROM tips
            GROUP BY day
        ) AS dayAvg ON t.day = dayAvg.day
        WHERE t.tip > dayAvg.avgTip
        ORDER BY diffFromDayAvg DESC
        LIMIT 10
    """).show()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      duckdb.sql("""
          SELECT
              t.day,
              t.total_bill,
              t.tip,
              dayAvg.avgTip AS dayAvgTip,
              ROUND(t.tip - dayAvg.avgTip, 2) AS diffFromDayAvg
          FROM tips t
          JOIN (
              SELECT day, AVG(tip) AS avgTip
              FROM tips
              GROUP BY day
          ) AS dayAvg ON t.day = dayAvg.day
          WHERE t.tip > dayAvg.avgTip
          ORDER BY diffFromDayAvg DESC
          LIMIT 10
      """).show()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step10_time_analysis
  title: 10단계. 시간대별 복합 분석
  structuredPrimary: true
  subtitle: 다중 서브쿼리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 전체 평균과 시간대별 평균을 동시에 비교하여 팁 성향을 분석합니다. 스칼라 서브쿼리와 FROM 서브쿼리를 함께 사용하면 여러 층위의 통계를 한 번에 비교할 수 있습니다. 개별 데이터가 그룹 평균 및 전체 평균과 어떻게 다른지 한눈에 파악할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        SELECT
            t.time,
            t.day,
            t.tip,
            (SELECT AVG(tip) FROM tips) AS totalAvg,
            timeAvg.avgTip AS timeAvgTip,
            CASE
                WHEN t.tip > timeAvg.avgTip THEN '평균 이상'
                ELSE '평균 이하'
            END AS category
        FROM tips t
        JOIN (
            SELECT time, AVG(tip) AS avgTip
            FROM tips
            GROUP BY time
        ) AS timeAvg ON t.time = timeAvg.time
        ORDER BY t.tip DESC
        LIMIT 12
    """).show()
