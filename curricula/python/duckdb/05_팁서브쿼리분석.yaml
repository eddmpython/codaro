  explanation: 서브쿼리는 SELECT 문 안에 또 다른 SELECT 문을 넣는 것입니다. 크게 3가지 패턴이 있습니다. 1) 스칼라 서브쿼리 (SELECT 절에 사용), 2) WHERE 서브쿼리 (조건 필터링에
    사용), 3) FROM 서브쿼리 (집계 결과를 테이블처럼 사용).
