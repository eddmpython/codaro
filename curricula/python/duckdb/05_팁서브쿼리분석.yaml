              COUNT(*) AS orderCount
          FROM tips
          GROUP BY day
          ORDER BY avgTip DESC
      """).df()

      aboveTotalAvgCount = duckdb.sql("""
          SELECT COUNT(*) AS cnt
          FROM tips
          WHERE tip > (SELECT AVG(tip) FROM tips)
      """).fetchone()[0]

      bestTipDay = dayTipSummary.iloc[0]["day"]
      bestTipDay, aboveTotalAvgCount, dayTipSummary.to_dict("records")
