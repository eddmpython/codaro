  goal: '5단계. WHERE 서브쿼리: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. WHERE 서브쿼리: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
