meta:
  id: duckdb_05
  title: 팁서브쿼리분석
  order: 5
  category: duckdb
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["tips", "서브쿼리", "스칼라", "WHERE IN", "FROM", "평균비교"]
  seo:
    title: "DuckDB 서브쿼리 기초 - 팁 서브쿼리 분석"
    description: "레스토랑 팁 데이터로 서브쿼리 패턴을 배웁니다. 스칼라 서브쿼리, WHERE 서브쿼리, FROM 서브쿼리를 실습합니다."
    keywords: ["DuckDB", "서브쿼리", "스칼라 서브쿼리", "WHERE IN", "SQL 중첩 쿼리"]

intro:
  emoji: "🔍"
  goal: 팁 데이터에서 서브쿼리로 전체 평균과 비교하고 고급 필터링을 수행합니다.
  description: 서브쿼리는 쿼리 안에 또 다른 쿼리를 넣는 기법입니다. 동적인 조건 필터링, 집계 결과 활용, 복잡한 비교 분석에 필수적입니다.

sections:
- id: step1_load
  title: 1단계. 데이터 준비
  subtitle: tips 데이터 로드
  blocks:
  - type: text
    content: 레스토랑 팁 데이터를 불러옵니다. 서브쿼리를 활용해 평균과 비교하고 고급 필터링을 수행합니다. 서브쿼리는 쿼리 안에 쿼리를 중첩하는 강력한 기법으로, 동적 조건 필터링과 복잡한 집계 분석을 가능하게 합니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: tips.csv 로드
    content: |-
      import pandas as pd
      import duckdb

      baseUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master"
      df = pd.read_csv(f"{baseUrl}/tips.csv")
      tips = duckdb.from_df(df)

      duckdb.sql("SELECT * FROM tips LIMIT 5").show()

- id: step2_subquery_intro
  title: 2단계. 서브쿼리란?
  subtitle: 쿼리 안의 쿼리
  blocks:
  - type: text
    content: 서브쿼리는 SELECT 문 안에 또 다른 SELECT 문을 넣는 것입니다. 크게 3가지 패턴이 있습니다. 1) 스칼라 서브쿼리 (SELECT 절에 사용), 2) WHERE 서브쿼리 (조건 필터링에 사용), 3) FROM 서브쿼리 (집계 결과를 테이블처럼 사용).
  - type: code
    language: python
    title: 전체 평균 팁 조회
    description: 기본 집계 쿼리
    content: |-
      duckdb.sql("""
          SELECT AVG(tip) AS avgTip
          FROM tips
      """).show()

- id: step3_scalar_subquery
  title: 3단계. 스칼라 서브쿼리
  subtitle: SELECT 절 안에 서브쿼리
  blocks:
  - type: text
    content: 스칼라 서브쿼리는 SELECT 절에 서브쿼리를 넣어 단일 값(1행 1열)을 가져옵니다. 각 행마다 전체 평균과 비교할 때 매우 유용합니다. 예를 들어 "이 고객의 팁이 전체 평균보다 높은가?"라는 질문에 답할 수 있습니다. 서브쿼리는 메인 쿼리가 실행될 때마다 평가되어 동적인 비교가 가능합니다.
  - type: code
    language: python
    title: 전체 평균과 비교
    description: 각 행에 평균 추가
    content: |-
      duckdb.sql("""
          SELECT
              total_bill,
              tip,
              (SELECT AVG(tip) FROM tips) AS avgTip,
              tip - (SELECT AVG(tip) FROM tips) AS diffFromAvg
          FROM tips
          ORDER BY tip DESC
          LIMIT 10
      """).show()
  - type: tip
    content: "스칼라 서브쿼리는 반드시 단일 값(1행 1열)을 반환해야 합니다. (SELECT AVG(...) FROM ...)처럼 집계 함수를 사용하면 안전합니다."

- id: step4_scalar_tip_rate
  title: 4단계. 팁 비율 비교
  subtitle: 스칼라 서브쿼리 활용
  blocks:
  - type: text
    content: 각 고객의 팁 비율을 전체 평균 팁 비율과 비교합니다. 평균보다 후하게 팁을 준 고객을 찾을 수 있습니다. 스칼라 서브쿼리는 매 행마다 평균값을 참조하여 개별 데이터와 전체 통계를 동시에 볼 수 있게 해줍니다.
  - type: code
    language: python
    title: 팁 비율 비교
    description: 개별 팁 비율 vs 평균 팁 비율
    content: |-
      duckdb.sql("""
          SELECT
              day,
              total_bill,
              tip,
              ROUND(tip / total_bill * 100, 1) AS tipPct,
              ROUND((SELECT AVG(tip / total_bill) * 100 FROM tips), 1) AS avgTipPct
          FROM tips
          ORDER BY tipPct DESC
          LIMIT 10
      """).show()

- id: step5_where_subquery
  title: 5단계. WHERE 서브쿼리
  subtitle: 동적 조건 필터링
  blocks:
  - type: text
    content: WHERE 절에 서브쿼리를 사용하면 하드코딩 없이 동적으로 조건을 설정할 수 있습니다. 평균 이상인 데이터만 필터링해봅니다.
  - type: code
    language: python
    title: 평균 이상 팁 필터링
    description: WHERE tip > (서브쿼리)
    content: |-
      duckdb.sql("""
          SELECT *
          FROM tips
          WHERE tip > (SELECT AVG(tip) FROM tips)
          ORDER BY tip DESC
          LIMIT 10
      """).show()
  - type: tip
    content: "WHERE 서브쿼리는 데이터 기반 필터링을 가능하게 합니다. WHERE tip > 3 대신 WHERE tip > (SELECT AVG(...))로 평균이 바뀌어도 자동 적용됩니다."

- id: step6_where_in
  title: 6단계. WHERE IN 서브쿼리
  subtitle: 목록 필터링
  blocks:
  - type: text
    content: WHERE IN 서브쿼리로 특정 조건을 만족하는 그룹의 데이터만 선택할 수 있습니다. 평균 팁이 3달러 이상인 요일의 데이터만 조회합니다.
  - type: code
    language: python
    title: 특정 요일 데이터만 필터링
    description: WHERE day IN (서브쿼리)
    content: |-
      duckdb.sql("""
          SELECT
              day,
              COUNT(*) AS cnt,
              ROUND(AVG(tip), 2) AS avgTip
          FROM tips
          WHERE day IN (
              SELECT day
              FROM tips
              GROUP BY day
              HAVING AVG(tip) > 3
          )
          GROUP BY day
          ORDER BY avgTip DESC
      """).show()
  - type: tip
    content: "WHERE col IN (서브쿼리)는 서브쿼리 결과 목록에 포함된 값만 선택합니다. 서브쿼리는 단일 컬럼을 반환해야 합니다."

- id: step7_from_subquery
  title: 7단계. FROM 서브쿼리
  subtitle: 집계 결과를 테이블처럼 사용
  blocks:
  - type: text
    content: FROM 절에 서브쿼리를 넣으면 집계 결과를 마치 테이블처럼 사용할 수 있습니다. 복잡한 집계를 단계적으로 수행할 때 유용합니다.
  - type: code
    language: python
    title: 집계 결과 재사용
    description: FROM (서브쿼리) AS 별칭
    content: |-
      duckdb.sql("""
          SELECT
              sub.day,
              sub.avgTip,
              sub.maxTip,
              sub.cnt
          FROM (
              SELECT
                  day,
                  ROUND(AVG(tip), 2) AS avgTip,
                  MAX(tip) AS maxTip,
                  COUNT(*) AS cnt
              FROM tips
              GROUP BY day
          ) AS sub
          ORDER BY sub.avgTip DESC
      """).show()
  - type: tip
    content: "FROM 서브쿼리는 반드시 AS로 별칭을 지정해야 합니다. 별칭 없이는 컬럼을 참조할 수 없습니다."

- id: step8_from_rank
  title: 8단계. FROM 서브쿼리 + 윈도우 함수
  subtitle: 순위 매긴 후 조회
  blocks:
  - type: text
    content: FROM 서브쿼리와 윈도우 함수를 조합하면 순위를 매긴 후 특정 순위만 추출할 수 있습니다. 윈도우 함수는 WHERE 절에 직접 사용할 수 없으므로, FROM 서브쿼리로 한 번 감싸서 결과를 필터링합니다. 이 패턴은 'TOP N' 쿼리에서 자주 사용됩니다.
  - type: code
    language: python
    title: 요일별 순위 분석
    description: 윈도우 함수 결과 활용
    content: |-
      duckdb.sql("""
          SELECT
              sub.day,
              sub.avgTip,
              sub.tipRank
          FROM (
              SELECT
                  day,
                  ROUND(AVG(tip), 2) AS avgTip,
                  RANK() OVER(ORDER BY AVG(tip) DESC) AS tipRank
              FROM tips
              GROUP BY day
          ) AS sub
          ORDER BY sub.tipRank
      """).show()

- id: step9_complex_subquery
  title: 9단계. 복합 서브쿼리
  subtitle: 그룹 평균과 비교
  blocks:
  - type: text
    content: 서브쿼리를 JOIN과 결합하면 각 그룹의 평균과 개별 값을 비교할 수 있습니다. 요일별 평균보다 높은 팁만 추출합니다.
  - type: code
    language: python
    title: 요일별 평균 초과 팁
    description: 서브쿼리 + JOIN
    content: |-
      duckdb.sql("""
          SELECT
              t.day,
              t.total_bill,
              t.tip,
              dayAvg.avgTip AS dayAvgTip,
              ROUND(t.tip - dayAvg.avgTip, 2) AS diffFromDayAvg
          FROM tips t
          JOIN (
              SELECT day, AVG(tip) AS avgTip
              FROM tips
              GROUP BY day
          ) AS dayAvg ON t.day = dayAvg.day
          WHERE t.tip > dayAvg.avgTip
          ORDER BY diffFromDayAvg DESC
          LIMIT 10
      """).show()

- id: step10_time_analysis
  title: 10단계. 시간대별 복합 분석
  subtitle: 다중 서브쿼리
  blocks:
  - type: text
    content: 전체 평균과 시간대별 평균을 동시에 비교하여 팁 성향을 분석합니다. 스칼라 서브쿼리와 FROM 서브쿼리를 함께 사용하면 여러 층위의 통계를 한 번에 비교할 수 있습니다. 개별 데이터가 그룹 평균 및 전체 평균과 어떻게 다른지 한눈에 파악할 수 있습니다.
  - type: code
    language: python
    title: 시간대별 종합 비교
    description: 스칼라 + FROM 서브쿼리 조합
    content: |-
      duckdb.sql("""
          SELECT
              t.time,
              t.day,
              t.tip,
              (SELECT AVG(tip) FROM tips) AS totalAvg,
              timeAvg.avgTip AS timeAvgTip,
              CASE
                  WHEN t.tip > timeAvg.avgTip THEN '평균 이상'
                  ELSE '평균 이하'
              END AS category
          FROM tips t
          JOIN (
              SELECT time, AVG(tip) AS avgTip
              FROM tips
              GROUP BY time
          ) AS timeAvg ON t.time = timeAvg.time
          ORDER BY t.tip DESC
          LIMIT 12
      """).show()

- id: step11_final
  title: 11단계. 최종 결과물
  subtitle: 서브쿼리 패턴 정리
  blocks:
  - type: text
    content: 지금까지 배운 3가지 서브쿼리 패턴을 정리합니다. 스칼라 서브쿼리는 단일 값 반환, WHERE 서브쿼리는 조건 필터링, FROM 서브쿼리는 집계 결과를 테이블처럼 사용합니다. 각 패턴의 특성을 이해하면 상황에 맞는 최적의 쿼리를 작성할 수 있습니다.
  - type: code
    language: python
    title: 서브쿼리 패턴 요약
    description: 3가지 패턴 비교
    content: |-
      duckdb.sql("""
          SELECT
              '스칼라' AS pattern,
              'SELECT (SELECT ...) FROM ...' AS syntax,
              '단일 값 반환' AS description
          UNION ALL
          SELECT
              'WHERE',
              'WHERE col IN/>/< (SELECT ...)',
              '조건 필터링'
          UNION ALL
          SELECT
              'FROM',
              'FROM (SELECT ...) AS sub',
              '집계 결과 테이블화'
      """).show()

- id: practice
  title: 실습
  subtitle: 서브쿼리 프로젝트
  blocks:
  - type: text
    content: 배운 서브쿼리 패턴을 활용해 팁 데이터를 분석합니다. 스칼라 서브쿼리로 전체 평균을 계산하고, WHERE 서브쿼리로 조건 비교를 수행합니다. 서브쿼리는 복잡한 비교 분석의 핵심 도구입니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 전체 평균 팁 비율보다 높은 팁을 준 손님 조회"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl1 = duckdb.from_df(data)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                day,
                time,
                total_bill AS bill,
                tip,
                ROUND(tip / total_bill * 100, 1) AS tipPct,
                ROUND((SELECT AVG(tip / total_bill) * 100 FROM tbl1), 1) AS avgPct
            FROM tbl1
            WHERE tip / total_bill > (SELECT AVG(tip / total_bill) FROM tbl1)
            ORDER BY tipPct DESC
            LIMIT 10
        """)
  - type: expansion
    title: "미션2: 평균 결제금액이 더 높은 시간대 데이터만 필터링"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        frame = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl2 = duckdb.from_df(frame)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT time, total_bill AS bill, tip
            FROM tbl2
            WHERE time = (
                SELECT time
                FROM tbl2
                GROUP BY time
                ORDER BY AVG(total_bill) DESC
                LIMIT 1
            )
            ORDER BY bill DESC
            LIMIT 10
        """)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 서브쿼리 3가지 패턴을 마스터했습니다.
  - type: list
    items:
    - "스칼라 서브쿼리 - SELECT (SELECT ...) : 단일 값 반환"
    - "WHERE 서브쿼리 - WHERE col > (SELECT ...) : 동적 필터링"
    - "WHERE IN 서브쿼리 - WHERE col IN (SELECT ...) : 목록 필터링"
    - "FROM 서브쿼리 - FROM (SELECT ...) AS sub : 집계 결과 재사용"
    - "서브쿼리 + JOIN - 그룹별 평균과 비교 분석"
  - type: text
    content: 다음 시간에는 CTE(WITH 절)로 더 가독성 높은 쿼리를 작성하는 방법을 배웁니다.
