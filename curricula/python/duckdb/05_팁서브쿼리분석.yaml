      aboveAverageOrders = duckdb.sql("""
          SELECT
              t.day,
              t.time,
              t.total_bill,
              t.tip,
              ROUND(t.tip - totalAvg.avgTip, 2) AS diffTotalAvg,
              ROUND(t.tip - dayAvg.avgTip, 2) AS diffDayAvg
          FROM tips t
          CROSS JOIN (
              SELECT AVG(tip) AS avgTip
              FROM tips
          ) AS totalAvg
          JOIN (
              SELECT day, AVG(tip) AS avgTip
              FROM tips
              GROUP BY day
          ) AS dayAvg ON t.day = dayAvg.day
          WHERE t.tip > totalAvg.avgTip
            AND t.tip > dayAvg.avgTip
          ORDER BY diffDayAvg DESC
          LIMIT 10
      """).df()

