- id: step3_cte_basic
  title: 3단계. CTE로 구조화
  structuredPrimary: true
  subtitle: WITH 절 활용
  goal: 3단계. CTE로 구조화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: CTE(Common Table Expression)로 복잡한 쿼리를 단계별로 분리합니다. WITH 절을 사용하면 쿼리를 논리적 단위로 나누어 가독성을 높이고
    재사용할 수 있습니다. 복잡한 비즈니스 로직을 명확하게 표현하는 핵심 기법입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        WITH dailyStats AS (
            SELECT
                day,
                COUNT(*) AS orderCount,
                SUM(total_bill) AS totalSales,
                AVG(tip) AS avgTip
            FROM tips
            GROUP BY day
        )
        SELECT
            day,
            orderCount,
            ROUND(totalSales, 2) AS totalSales,
            ROUND(avgTip, 2) AS avgTip
        FROM dailyStats
        ORDER BY totalSales DESC
    """)
  exercise:
    prompt: 3단계. CTE로 구조화 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH dailyStats AS (
              SELECT
                  day,
                  COUNT(*) AS orderCount,
                  SUM(total_bill) AS totalSales,
                  AVG(tip) AS avgTip
              FROM tips
              GROUP BY day
          )
          SELECT
              day,
              orderCount,
              ROUND(totalSales, 2) AS totalSales,
              ROUND(avgTip, 2) AS avgTip
          FROM dailyStats
          ORDER BY totalSales DESC
      """)
    hints:
    - 3단계. CTE로 구조화 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. CTE로 구조화 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. CTE로 구조화에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_multi_cte
  title: 4단계. 다중 CTE
  structuredPrimary: true
  subtitle: 여러 CTE 연결
  goal: 4단계. 다중 CTE에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 여러 CTE를 연결하여 단계별로 데이터를 가공합니다. 첫 번째 CTE에서 기본 집계를 하고, 두 번째 CTE에서 순위를 매기는 식으로 파이프라인을 구성합니다.
    각 단계가 명확히 분리되어 디버깅과 유지보수가 쉬워집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        WITH dailyStats AS (
            SELECT
                day,
                time,
                COUNT(*) AS orderCount,
                SUM(total_bill) AS totalSales
            FROM tips
            GROUP BY day, time
        ),
        ranked AS (
            SELECT
                *,
                RANK() OVER (PARTITION BY time ORDER BY totalSales DESC) AS salesRank
            FROM dailyStats
        )
        SELECT
            day,
            time,
            orderCount,
            ROUND(totalSales, 2) AS totalSales,
            salesRank
        FROM ranked
        WHERE salesRank <= 3
        ORDER BY time, salesRank
    """)
  exercise:
    prompt: 4단계. 다중 CTE 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH dailyStats AS (
              SELECT
                  day,
                  time,
                  COUNT(*) AS orderCount,
                  SUM(total_bill) AS totalSales
              FROM tips
              GROUP BY day, time
          ),
          ranked AS (
              SELECT
                  *,
                  RANK() OVER (PARTITION BY time ORDER BY totalSales DESC) AS salesRank
              FROM dailyStats
          )
          SELECT
              day,
              time,
              orderCount,
              ROUND(totalSales, 2) AS totalSales,
              salesRank
          FROM ranked
          WHERE salesRank <= 3
          ORDER BY time, salesRank
      """)
    hints:
    - 4단계. 다중 CTE 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
