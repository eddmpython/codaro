- id: step6_window_lag
  title: 6단계. LAG 함수
  structuredPrimary: true
  subtitle: 이전 값과 비교
  goal: 6단계. LAG 함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: LAG로 이전 행과 비교 분석합니다. titanic 데이터로 나이별 생존율 변화를 봅니다. LAG(컬럼, n)은 n행 앞의 값을 가져오며, 시계열 분석이나
    연속된 그룹 간 차이를 계산할 때 매우 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    duckdb.sql("""
        WITH ageGroup AS (
            SELECT
                CASE
                    WHEN age < 10 THEN '0-9'
                    WHEN age < 20 THEN '10-19'
                    WHEN age < 30 THEN '20-29'
                    WHEN age < 40 THEN '30-39'
                    WHEN age < 50 THEN '40-49'
                    ELSE '50+'
                END AS ageRange,
                survived
            FROM titanic
            WHERE age IS NOT NULL
        ),
        survivalRate AS (
            SELECT
                ageRange,
                COUNT(*) AS total,
                SUM(survived) AS survivors,
                ROUND(100.0 * SUM(survived) / COUNT(*), 1) AS rate
            FROM ageGroup
            GROUP BY ageRange
        )
        SELECT
            ageRange,
            total,
            survivors,
            rate,
            LAG(rate) OVER (ORDER BY ageRange) AS prevRate,
            ROUND(rate - LAG(rate) OVER (ORDER BY ageRange), 1) AS rateDiff
        FROM survivalRate
        ORDER BY ageRange
    """)
  exercise:
    prompt: 6단계. LAG 함수 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      duckdb.sql("""
          WITH ageGroup AS (
              SELECT
                  CASE
                      WHEN age < 10 THEN '0-9'
                      WHEN age < 20 THEN '10-19'
                      WHEN age < 30 THEN '20-29'
                      WHEN age < 40 THEN '30-39'
                      WHEN age < 50 THEN '40-49'
                      ELSE '50+'
                  END AS ageRange,
                  survived
              FROM titanic
              WHERE age IS NOT NULL
          ),
          survivalRate AS (
              SELECT
                  ageRange,
                  COUNT(*) AS total,
                  SUM(survived) AS survivors,
                  ROUND(100.0 * SUM(survived) / COUNT(*), 1) AS rate
              FROM ageGroup
              GROUP BY ageRange
          )
          SELECT
              ageRange,
              total,
              survivors,
              rate,
              LAG(rate) OVER (ORDER BY ageRange) AS prevRate,
              ROUND(rate - LAG(rate) OVER (ORDER BY ageRange), 1) AS rateDiff
          FROM survivalRate
          ORDER BY ageRange
      """)
    hints:
    - 6단계. LAG 함수 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
