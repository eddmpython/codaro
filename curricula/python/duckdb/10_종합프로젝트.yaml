              FROM tips

              UNION ALL

              SELECT
                  day AS category,
                  COUNT(*) AS count,
                  ROUND(SUM(total_bill), 2) AS totalSales,
                  ROUND(AVG(tip), 2) AS avgTip,
                  ROUND(100.0 * AVG(tip / total_bill), 1) AS avgTipRate
              FROM tips
              GROUP BY day
          )
          SELECT
              category,
              count,
              totalSales,
              avgTip,
              avgTipRate,
              ROUND(100.0 * totalSales / (SELECT SUM(total_bill) FROM tips), 1) AS salesShare
          FROM summary
          ORDER BY
              CASE WHEN category = '전체' THEN 0 ELSE 1 END,
              totalSales DESC
      """)
    hints:
    - 13단계. 최종 파이프라인 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 13단계. 최종 파이프라인 코드가 예외 없이 끝나야 합니다.
    resultCheck: 13단계. 최종 파이프라인에서 바꾼 입력값이 결과에 반영되어야 합니다.
