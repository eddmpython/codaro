                RANK() OVER (PARTITION BY pclass ORDER BY survivalRate DESC) AS classRank
            FROM survivalAnalysis
        )
        SELECT
            pclass,
            sex,
            ageGroup,
            fareClass,
            total,
            survivors,
            survivalRate,
            overallRank,
            classRank
