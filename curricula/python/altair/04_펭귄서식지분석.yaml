  explanation: Codaro 로컬 데이터셋에서 penguins 데이터를 불러옵니다. 남극 3개 섬에 사는 펭귄의 측정 데이터입니다. species(종), island(섬), bill_length_mm(부리 길이), bill_depth_mm(부리 깊이), flipper_length_mm(지느러미 길이), body_mass_g(체중), sex(성별) 컬럼이 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import altair as alt
    import pandas as pd
    import warnings
    warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
    from codaro.curriculum.localData import loadLocalDataset

    penguins = loadLocalDataset("penguins")
