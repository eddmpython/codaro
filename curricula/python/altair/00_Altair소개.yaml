    - emoji: 📊
      title: 차트 내 집계
      description: mean(), count() 등을 차트에서 바로
    - emoji: 🔗
      title: 인터랙션 내장
      description: 브러싱, 선택, 링킹 기본 제공
    - emoji: 🎯
      title: 타입 추론
