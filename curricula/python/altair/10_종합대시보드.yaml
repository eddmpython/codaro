- id: workflow_validation
  title: 10단계. Altair 대시보드 검증 루프
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    대시보드는 여러 차트를 묶는 만큼 입력 데이터, selection, concat 구조가 모두 맞아야 합니다. 완성 spec을 검사하는 루프를 추가합니다.

    Altair 대시보드의 품질은 concat과 selection이 spec으로 검증될 때 올라갑니다.
  tips:
  - Altair 대시보드의 품질은 concat과 selection이 spec으로 검증될 때 올라갑니다.
  snippet: |-
    import altair as alt
    from codaro.curriculum.localData import loadLocalDataset

    mpgDashboard = loadLocalDataset("mpg")
    requiredColumns = {"mpg", "horsepower", "weight", "origin", "model_year"}
    missingColumns = requiredColumns - set(mpgDashboard.columns)

    assert not missingColumns, f"필수 컬럼 누락: {missingColumns}"
    assert mpgDashboard[["mpg", "horsepower", "weight"]].gt(0).all().all()
    assert mpgDashboard["origin"].nunique() == 3
