sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: seaborn-data
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 'Codaro 로컬 데이터셋에서 mpg 데이터를 불러옵니다. 이 프로젝트는 Altair 과정의 최종 종합 프로젝트입니다. 지금까지 배운 모든 개념을 하나로 합칩니다: 마크(mark), 인코딩(encode), 인터랙션(selection), 차트 조합(|, &), 데이터 변환(transform), 레이어(layer) 등 모든 기능을 사용합니다. 완성된 대시보드에는 여러 차트가 동시에 표시되고, 사용자가 드롭다운과 브러싱으로 데이터를 필터링하며, 모든 차트가 서로 연동됩니다.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import altair as alt
    import pandas as pd
    import warnings
    warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
    from codaro.curriculum.localData import loadLocalDataset

    mpg = loadLocalDataset("mpg")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
      from codaro.curriculum.localData import loadLocalDataset

      mpg = loadLocalDataset("mpg")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_overview
  title: 2단계. 대시보드 구조
  structuredPrimary: true
  subtitle: 컴포넌트 설계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: '대시보드를 만들기 전에 먼저 전체 구조를 설계합니다. 4개의 차트를 배치할 것입니다: 1. 산점도: 마력 vs 연비 (중심 차트, 가장 크게) 2. 막대 차트: 생산국별 평균 연비 (비교용) 3. 라인 차트: 연도별 추이 (시간 흐름 보기) 4. 히스토그램: 연비 분포 (전체 분포 파악) 공통 selection을 먼저 만들어둡니다. brush는 드래그 선택, dropdown은 생산국 필터입니다. 이 두 가지를 모든 차트에서 공유하면 차트들이 연동됩니다.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    brush = alt.selection_interval(name='overviewBrush')

    origins = ['usa', 'europe', 'japan']
    dropdown = alt.binding_select(options=[None] + origins, labels=['전체'] + origins, name='생산국: ')
    originSelect = alt.param(name='origin_filter', bind=dropdown)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      brush = alt.selection_interval(name='overviewBrush')

      origins = ['usa', 'europe', 'japan']
      dropdown = alt.binding_select(options=[None] + origins, labels=['전체'] + origins, name='생산국: ')
      originSelect = alt.param(name='origin_filter', bind=dropdown)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_scatter
  title: 3단계. 메인 산점도
  structuredPrimary: true
  subtitle: 마력 vs 연비
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 메인 차트로 마력과 연비의 관계를 산점도로 표현합니다. 브러싱과 드롭다운 필터가 모두 적용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    scatterMain = alt.Chart(mpg).mark_circle(size=60).encode(
        x=alt.X('horsepower:Q', title='마력'),
        y=alt.Y('mpg:Q', title='연비 (MPG)'),
        color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray')),
        opacity=alt.when(
            (originSelect == None) | (alt.datum.origin == originSelect)
        ).then(alt.value(0.8)).otherwise(alt.value(0.1)),
        tooltip=['name', 'origin', 'horsepower', 'mpg', 'cylinders', 'model_year']
    ).add_params(brush, originSelect).properties(
        width=400,
        height=300,
        title='마력 vs 연비 (드래그로 선택)'
    )
    scatterMain
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      scatterMain = alt.Chart(mpg).mark_circle(size=60).encode(
          x=alt.X('horsepower:Q', title='마력'),
          y=alt.Y('mpg:Q', title='연비 (MPG)'),
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray')),
          opacity=alt.when(
              (originSelect == None) | (alt.datum.origin == originSelect)
          ).then(alt.value(0.8)).otherwise(alt.value(0.1)),
          tooltip=['name', 'origin', 'horsepower', 'mpg', 'cylinders', 'model_year']
      ).add_params(brush, originSelect).properties(
          width=400,
          height=300,
          title='마력 vs 연비 (드래그로 선택)'
      )
      scatterMain
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_bar
  title: 4단계. 생산국별 막대 차트
  structuredPrimary: true
  subtitle: 평균 연비 비교
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 생산국별 평균 연비를 막대 차트로 표현합니다. 산점도의 브러싱에 연동됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    barOrigin = alt.Chart(mpg).mark_bar().encode(
        x=alt.X('origin:N', title='생산국'),
        y=alt.Y('mean(mpg):Q', title='평균 연비'),
        color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
    ).properties(
        width=150,
        height=200,
        title='생산국별 평균 연비'
    )
    barOrigin
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      barOrigin = alt.Chart(mpg).mark_bar().encode(
          x=alt.X('origin:N', title='생산국'),
          y=alt.Y('mean(mpg):Q', title='평균 연비'),
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).properties(
          width=150,
          height=200,
          title='생산국별 평균 연비'
      )
      barOrigin
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_line
  title: 5단계. 연도별 라인 차트
  structuredPrimary: true
  subtitle: 연비 추이
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 연도별 평균 연비 추이를 라인 차트로 표현합니다. 시간에 따른 연비 개선 추세를 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    lineYear = alt.Chart(mpg).mark_line(point=True).encode(
        x=alt.X('model_year:O', title='연도'),
        y=alt.Y('mean(mpg):Q', title='평균 연비'),
        color='origin:N',
        opacity=alt.when(
            (originSelect == None) | (alt.datum.origin == originSelect)
        ).then(alt.value(1)).otherwise(alt.value(0.2))
    ).properties(
        width=350,
        height=200,
        title='연도별 평균 연비 추이'
    )
    lineYear
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      lineYear = alt.Chart(mpg).mark_line(point=True).encode(
          x=alt.X('model_year:O', title='연도'),
          y=alt.Y('mean(mpg):Q', title='평균 연비'),
          color='origin:N',
          opacity=alt.when(
              (originSelect == None) | (alt.datum.origin == originSelect)
          ).then(alt.value(1)).otherwise(alt.value(0.2))
      ).properties(
          width=350,
          height=200,
          title='연도별 평균 연비 추이'
      )
      lineYear
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_histogram
  title: 6단계. 연비 히스토그램
  structuredPrimary: true
  subtitle: 분포 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 연비 분포를 히스토그램으로 표현합니다. 브러싱으로 선택된 데이터의 분포를 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    histMpg = alt.Chart(mpg).mark_bar().encode(
        x=alt.X('mpg:Q', bin=alt.Bin(maxbins=20), title='연비'),
        y=alt.Y('count()', title='개수'),
        color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
    ).properties(
        width=200,
        height=150,
        title='연비 분포'
    )
    histMpg
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      histMpg = alt.Chart(mpg).mark_bar().encode(
          x=alt.X('mpg:Q', bin=alt.Bin(maxbins=20), title='연비'),
          y=alt.Y('count()', title='개수'),
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).properties(
          width=200,
          height=150,
          title='연비 분포'
      )
      histMpg
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_layer
  title: 7단계. 레이어 추가
  structuredPrimary: true
  subtitle: 평균선 표시
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 차트에 추가 정보를 겹쳐서 표시하는 방법을 배웁니다. 레이어(layer)는 "층"이라는 뜻으로, 여러 차트를 겹쳐 그립니다. mark_rule()은 기준선(수평선 또는 수직선)을 그리는 마크입니다. strokeDash=[5, 5]는 점선 스타일(5픽셀 그리고 5픽셀 비우기 반복)입니다. + 연산자로 두 차트를 겹칩니다. scatterMain + avgLine은 "산점도 위에 평균선을 겹쳐서 그려라"는 뜻입니다. 기준선이 있으면 데이터가 평균보다 높은지 낮은지 쉽게 비교할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    avgLine = alt.Chart(mpg).mark_rule(color='red', strokeDash=[5, 5]).encode(
        y='mean(mpg):Q'
    )

    scatterWithLine = scatterMain + avgLine
    scatterWithLine
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      avgLine = alt.Chart(mpg).mark_rule(color='red', strokeDash=[5, 5]).encode(
          y='mean(mpg):Q'
      )

      scatterWithLine = scatterMain + avgLine
      scatterWithLine
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_compose
  title: 8단계. 대시보드 조합
  structuredPrimary: true
  subtitle: hconcat + vconcat
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 이제 만든 차트들을 모두 조합해서 최종 레이아웃을 만듭니다. | 와 & 연산자를 사용합니다. topRow는 윗줄입니다. scatterWithLine(산점도+평균선)을 왼쪽에, barOrigin과 histMpg를 세로로 쌓아(&) 오른쪽에 배치합니다. 괄호 안을 먼저 계산하므로 막대와 히스토그램이 먼저 세로로 쌓이고, 그것이 산점도 옆에 붙습니다. bottomRow는 아랫줄로 lineYear(라인 차트)를 배치합니다. topRow & bottomRow로 윗줄과 아랫줄을 세로로 쌓으면 완성입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    topRow = scatterWithLine | (barOrigin & histMpg)
    bottomRow = lineYear

    dashboard = topRow & bottomRow
    dashboard
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      topRow = scatterWithLine | (barOrigin & histMpg)
      bottomRow = lineYear

      dashboard = topRow & bottomRow
      dashboard
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_final
  title: 9단계. 최종 결과물
  structuredPrimary: true
  subtitle: 완성된 대시보드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    모든 기능을 통합한 최종 대시보드를 완성합니다. 드롭다운, 브러싱, 레이어, 다중 차트가 모두 연동됩니다.

    완성된 대시보드에서: - 드롭다운으로 생산국 필터링 - 산점도 드래그로 영역 선택 - 선택된 데이터가 모든 차트에 연동 - 빨간 점선은 전체 평균 연비 - 연도별 추이로 개선 트렌드 확인
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    brushFinal = alt.selection_interval(name='dashboardBrush')
    originsFinal = ['usa', 'europe', 'japan']
    dropdownFinal = alt.binding_select(options=[None] + originsFinal, labels=['전체'] + originsFinal, name='생산국: ')
    originFinal = alt.param(name='origin', bind=dropdownFinal)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      brushFinal = alt.selection_interval(name='dashboardBrush')
      originsFinal = ['usa', 'europe', 'japan']
      dropdownFinal = alt.binding_select(options=[None] + originsFinal, labels=['전체'] + originsFinal, name='생산국: ')
      originFinal = alt.param(name='origin', bind=dropdownFinal)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 대시보드 확장 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
