- id: summary
  title: 정리
  blocks:
  - type: text
    content: Altair로 히트맵과 색상 스케일을 마스터했습니다!
  - type: list
    items:
    - mark_rect() - 사각형 마크로 히트맵 생성
    - mark_line() - 라인 차트로 시계열 표현
    - scale=alt.Scale(scheme='...') - 색상 팔레트 변경
    - legend=alt.Legend(title, orient) - 범례 커스터마이징
    - sort=[...] - 축 순서 지정
    - alt.Tooltip() - 툴팁 상세 설정
  - type: text
    content: 다음 프로젝트에서는 인터랙티브 필터와 선택 기능을 배웁니다.
- id: workflow_validation
  title: 10단계. 항공편 Heatmap 검증 루프
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    항공편 시계열은 연도와 월 조합이 정확해야 heatmap이 의미를 가집니다. 키 중복과 색상 인코딩을 함께 검증합니다.

    Heatmap은 예쁘게 보이기 전에 키 유일성과 색상 값의 의미를 검증해야 합니다.
  tips:
  - Heatmap은 예쁘게 보이기 전에 키 유일성과 색상 값의 의미를 검증해야 합니다.
  snippet: |-
    import altair as alt
    from codaro.curriculum.localData import loadLocalDataset

    flightFlow = loadLocalDataset("flights")
    requiredColumns = {"year", "month", "passengers"}
    missingColumns = requiredColumns - set(flightFlow.columns)

    assert not missingColumns, f"필수 컬럼 누락: {missingColumns}"
    assert flightFlow["month"].nunique() == 12
    assert flightFlow["year"].nunique() == 12
    assert flightFlow.groupby("year")["passengers"].sum().iloc[-1] > flightFlow.groupby("year")["passengers"].sum().iloc[0]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import altair as alt
