sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: seaborn-data
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Codaro 로컬 데이터셋에서 flights 데이터를 불러옵니다. 1949년부터 1960년까지 12년간 매월 비행기를 탄 사람 수를 기록한 데이터입니다. year는 연도(1949~1960), month는 월(Jan, Feb 등), passengers는 승객 수(천 명 단위)를 나타냅니다. 12년 × 12개월 = 총 144개 행이 있습니다. import는 라이브러리를 가져오는 명령어입니다. altair는 시각화, pandas는 데이터 처리, warnings는 경고 메시지 관리를 담당합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import altair as alt
    import pandas as pd
    import warnings
    warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
    from codaro.curriculum.localData import loadLocalDataset

    flights = loadLocalDataset("flights")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
      from codaro.curriculum.localData import loadLocalDataset

      flights = loadLocalDataset("flights")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_line_chart
  title: 2단계. 라인 차트
  structuredPrimary: true
  subtitle: mark_line()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    먼저 연도별 총 승객 수 추이를 라인 차트로 확인합니다. 라인 차트는 시간에 따른 변화를 선으로 연결해 보여주는 차트입니다. mark_line()은 "선 모양으로 그려라"는 뜻입니다. mark는 "표시하다", line은 "선"을 의미합니다. encode() 안에는 x축과 y축에 무엇을 표시할지 지정합니다. sum(passengers)는 "승객 수를 모두 더하라"는 의미입니다. 같은 연도의 모든 월 데이터를 합산합니다.

    year:O에서 :O는 "Ordinal(순서형)"이라는 뜻입니다. 연도는 숫자지만 1949, 1950, 1951처럼 순서가 있는 범주로 취급합니다. 콜론(:) 뒤에 데이터 타입을 적어주는 것이 Altair의 규칙입니다. :Q는 수량형, :N은 명목형, :O는 순서형입니다.
  tips:
  - year:O에서 :O는 "Ordinal(순서형)"이라는 뜻입니다. 연도는 숫자지만 1949, 1950, 1951처럼 순서가 있는 범주로 취급합니다. 콜론(:) 뒤에 데이터 타입을 적어주는 것이 Altair의 규칙입니다. :Q는 수량형, :N은 명목형, :O는 순서형입니다.
  snippet: |-
    chartLine = alt.Chart(flights).mark_line().encode(
        x='year:O',
        y='sum(passengers):Q'
    )
    chartLine
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartLine = alt.Chart(flights).mark_line().encode(
          x='year:O',
          y='sum(passengers):Q'
      )
      chartLine
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_multi_line
  title: 3단계. 다중 라인
  structuredPrimary: true
  subtitle: 월별 비교
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 이번에는 여러 개의 라인을 한 차트에 그려봅니다. color 인코딩을 추가하면 카테고리별로 색상을 달리해 여러 라인을 구분할 수 있습니다. color='month:N'은 "월(month)마다 다른 색상을 지정하라"는 의미입니다. 1월은 파란색, 2월은 주황색 이런 식으로 자동으로 색이 배정됩니다. 이렇게 하면 각 월이 연도별로 어떻게 변했는지 한눈에 비교할 수 있습니다. 예를 들어 7월 라인과 1월 라인을 보면 여름철이 겨울철보다 승객이 많다는 것을 알 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartMultiLine = alt.Chart(flights).mark_line().encode(
        x='year:O',
        y='passengers:Q',
        color='month:N'
    )
    chartMultiLine
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartMultiLine = alt.Chart(flights).mark_line().encode(
          x='year:O',
          y='passengers:Q',
          color='month:N'
      )
      chartMultiLine
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_heatmap_intro
  title: 4단계. 히트맵 기초
  structuredPrimary: true
  subtitle: mark_rect()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    히트맵은 2차원 데이터를 색상의 진하기로 표현하는 차트입니다. 숫자가 클수록 진한 색, 작을수록 옅은 색으로 표시됩니다. mark_rect()는 "사각형 모양으로 그려라"는 뜻입니다. rect는 rectangle(사각형)의 줄임말입니다. x축에 연도, y축에 월을 배치하고, color에 승객 수를 넣으면 각 칸의 색상이 승객 수에 따라 달라집니다. 이렇게 하면 어느 연도 어느 달에 승객이 많았는지 색상만으로도 한눈에 파악할 수 있습니다.

    히트맵은 2차원 데이터를 색상으로 표현합니다. 여름철(6-8월) 승객이 많고, 연도가 지날수록 전체 승객이 증가합니다.
  tips:
  - 히트맵은 2차원 데이터를 색상으로 표현합니다. 여름철(6-8월) 승객이 많고, 연도가 지날수록 전체 승객이 증가합니다.
  snippet: |-
    chartHeatmap = alt.Chart(flights).mark_rect().encode(
        x='year:O',
        y='month:O',
        color='passengers:Q'
    )
    chartHeatmap
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartHeatmap = alt.Chart(flights).mark_rect().encode(
          x='year:O',
          y='month:O',
          color='passengers:Q'
      )
      chartHeatmap
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_month_order
  title: 5단계. 월 순서 정렬
  structuredPrimary: true
  subtitle: sort 파라미터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 기본 히트맵을 보면 월 순서가 Apr, Aug, Dec... 처럼 알파벳 순서로 되어있습니다. 이것을 1월, 2월, 3월 순으로 정렬해야 읽기 쉽습니다. 리스트는 여러 값을 순서대로 담는 상자입니다. 대괄호 []로 만들며, 쉼표로 값을 구분합니다. monthOrder 변수에 1월부터 12월까지 순서대로 저장합니다. alt.Y()는 y축 설정을 세밀하게 조정할 때 사용합니다. 괄호 안에 첫 번째 인자로 컬럼명('month:O')을, sort 파라미터로 원하는 순서(monthOrder)를 지정하면 그 순서대로 표시됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    monthOrder = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                  'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

    chartOrdered = alt.Chart(flights).mark_rect().encode(
        x='year:O',
        y=alt.Y('month:O', sort=monthOrder),
        color='passengers:Q'
    )
    chartOrdered
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      monthOrder = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

      chartOrdered = alt.Chart(flights).mark_rect().encode(
          x='year:O',
          y=alt.Y('month:O', sort=monthOrder),
          color='passengers:Q'
      )
      chartOrdered
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_color_scale
  title: 6단계. 색상 스케일
  structuredPrimary: true
  subtitle: scale(scheme)
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    지금까지는 Altair가 자동으로 색상을 정해줬습니다. 이번에는 원하는 색상 조합(팔레트)을 직접 지정해봅니다. alt.Color()는 색상 설정을 세밀하게 조정할 때 사용합니다. 첫 번째 인자로 컬럼명('passengers:Q')을 주고, scale 파라미터에 alt.Scale()을 넣습니다. alt.Scale(scheme='viridis')에서 scheme은 "색상 조합"이라는 뜻입니다. viridis는 보라색에서 노란색으로 변하는 색상 조합으로, 데이터 분석에서 많이 사용됩니다.

    다른 팔레트: 'blues', 'greens', 'oranges', 'reds', 'purples', 'plasma', 'inferno', 'magma' 등이 있습니다.
  tips:
  - '다른 팔레트: ''blues'', ''greens'', ''oranges'', ''reds'', ''purples'', ''plasma'', ''inferno'', ''magma'' 등이 있습니다.'
  snippet: |-
    chartScale = alt.Chart(flights).mark_rect().encode(
        x='year:O',
        y=alt.Y('month:O', sort=monthOrder),
        color=alt.Color('passengers:Q', scale=alt.Scale(scheme='viridis'))
    )
    chartScale
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartScale = alt.Chart(flights).mark_rect().encode(
          x='year:O',
          y=alt.Y('month:O', sort=monthOrder),
          color=alt.Color('passengers:Q', scale=alt.Scale(scheme='viridis'))
      )
      chartScale
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_legend
  title: 7단계. 범례 커스터마이징
  structuredPrimary: true
  subtitle: legend 설정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 범례는 차트 옆에 나타나는 색상 설명 박스입니다. "이 색은 무엇을 의미하는가"를 알려주는 가이드 역할을 합니다. legend 파라미터로 범례를 커스터마이징할 수 있습니다. alt.Legend() 괄호 안에 title로 제목을, orient로 위치를 지정합니다. orient='bottom'은 "방향을 아래쪽으로"라는 뜻입니다. 범례가 차트 하단에 가로로 배치됩니다. 'right'로 바꾸면 오른쪽에 세로로 나타납니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartLegend = alt.Chart(flights).mark_rect().encode(
        x='year:O',
        y=alt.Y('month:O', sort=monthOrder),
        color=alt.Color(
            'passengers:Q',
            scale=alt.Scale(scheme='blues'),
            legend=alt.Legend(title='승객 수', orient='bottom')
        )
    )
    chartLegend
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartLegend = alt.Chart(flights).mark_rect().encode(
          x='year:O',
          y=alt.Y('month:O', sort=monthOrder),
          color=alt.Color(
              'passengers:Q',
              scale=alt.Scale(scheme='blues'),
              legend=alt.Legend(title='승객 수', orient='bottom')
          )
      )
      chartLegend
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_tooltip
  title: 8단계. 툴팁 추가
  structuredPrimary: true
  subtitle: 상세 정보
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: tooltip은 "툴팁", 즉 마우스를 올렸을 때 나타나는 작은 정보 상자입니다. 차트 위에 마우스를 가져가면 정확한 숫자를 볼 수 있습니다. tooltip에 리스트(대괄호 [])로 컬럼명들을 나열하면, 해당 정보들이 모두 툴팁에 표시됩니다. 히트맵은 색상으로 대략적인 크기를 보여주지만, 정확한 승객 수는 툴팁으로 확인해야 합니다. 예를 들어 1960년 7월에 정확히 몇 명이 탔는지 알 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartTooltip = alt.Chart(flights).mark_rect().encode(
        x='year:O',
        y=alt.Y('month:O', sort=monthOrder),
        color=alt.Color('passengers:Q', scale=alt.Scale(scheme='oranges')),
        tooltip=['year', 'month', 'passengers']
    )
    chartTooltip
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartTooltip = alt.Chart(flights).mark_rect().encode(
          x='year:O',
          y=alt.Y('month:O', sort=monthOrder),
          color=alt.Color('passengers:Q', scale=alt.Scale(scheme='oranges')),
          tooltip=['year', 'month', 'passengers']
      )
      chartTooltip
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_final
  title: 9단계. 최종 결과물
  structuredPrimary: true
  subtitle: 항공 승객 히트맵
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    이제 지금까지 배운 모든 개념을 하나로 합쳐 완성도 높은 히트맵을 만듭니다. 월 순서 정렬, 색상 팔레트, 범례, 툴팁이 모두 포함됩니다. properties() 메서드는 차트의 전체적인 속성을 설정합니다. title로 제목을, width와 height로 크기를 지정합니다. alt.Tooltip()을 사용하면 툴팁에 표시될 이름(title)도 바꿀 수 있습니다. 예를 들어 'year:O' 대신 '연도'라고 표시됩니다.

    1950년대 후반으로 갈수록 승객이 급증하고, 여름(7-8월)에 승객이 가장 많습니다. 항공 산업의 성장과 계절적 패턴이 명확히 보입니다.
