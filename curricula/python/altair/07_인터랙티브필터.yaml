      horsepower는 마력(엔진 힘), mpg는 연비(갤런당 주행거리), origin은 생산국(usa, europe, japan)을 나타냅니다. 이 데이터로 사용자가 클릭하고 드래그해서 조작할 수 있는 인터랙티브 차트를 만들어봅니다.

