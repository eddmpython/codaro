- id: step3_interval_selection
  title: 3단계. 영역 선택
  structuredPrimary: true
  subtitle: selection_interval
  goal: '3단계. 영역 선택: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 영역 선택: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    이제 차트에 인터랙션을 추가합니다. selection_interval()은 "마우스 드래그로 사각형 영역을 선택할 수 있게 하라"는 명령입니다. interval은 "구간"이라는 뜻으로, 차트에서 특정 구간을 드래그해서 선택할 수 있습니다. 이것을 브러싱(brushing, 붓질하듯 영역을 칠한다)이라고 부릅니다. brush 변수에 선택 기능을 저장한 뒤, add_params(brush)로 차트에 추가하면 드래그 기능이 활성화됩니다.

    alt.when().then().otherwise()는 조건문입니다. "만약 ~이면 이렇게 하고, 아니면 저렇게 하라"는 뜻입니다. when(brush)는 "brush로 선택되었으면", then('origin:N')은 "생산국 색상을 표시하고", otherwise(alt.value('lightgray'))는 "아니면 회색으로 표시하라"입니다. 결과적으로 드래그한 영역의 점만 색상이 유지되고, 나머지는 모두 회색으로 바뀌어 선택된 부분이 강조됩니다.
  tips:
  - alt.when().then().otherwise()는 조건문입니다. "만약 ~이면 이렇게 하고, 아니면 저렇게 하라"는 뜻입니다. when(brush)는 "brush로 선택되었으면", then('origin:N')은
    "생산국 색상을 표시하고", otherwise(alt.value('lightgray'))는 "아니면 회색으로 표시하라"입니다. 결과적으로 드래그한 영역의 점만 색상이 유지되고, 나머지는 모두 회색으로 바뀌어 선택된
    부분이 강조됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    brush = alt.selection_interval()

    chartBrush = alt.Chart(mpg).mark_point().encode(
        x='horsepower:Q',
        y='mpg:Q',
        color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
    ).add_params(brush).properties(
        width=500,
        height=300,
        title='드래그로 영역 선택하기'
    )
    chartBrush
  exercise:
    prompt: '3단계. 영역 선택: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      brush = alt.selection_interval()

      chartBrush = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).add_params(brush).properties(
          width=500,
          height=300,
          title='드래그로 영역 선택하기'
      )
      chartBrush
    solution: |-
      brush = alt.selection_interval()

      chartBrush = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).add_params(brush).properties(
          width=500,
          height=300,
          title='드래그로 영역 선택하기'
      )
      chartBrush
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: |-
      이제 차트에 인터랙션을 추가합니다. selection_interval()은 "마우스 드래그로 사각형 영역을 선택할 수 있게 하라"는 명령입니다.

      interval은 "구간"이라는 뜻으로, 차트에서 특정 구간을 드래그해서 선택할 수 있습니다. 이것을 브러싱(brushing, 붓질하듯 영역을 칠한다)이라고 부릅니다.

      brush 변수에 선택 기능을 저장한 뒤, add_params(brush)로 차트에 추가하면 드래그 기능이 활성화됩니다.
  - type: code
    language: python
    title: 브러싱 선택
    description: 드래그로 영역 선택
    content: |-
      brush = alt.selection_interval()

      chartBrush = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).add_params(brush).properties(
          width=500,
          height=300,
          title='드래그로 영역 선택하기'
      )
      chartBrush
  - type: tip
    content: |-
      alt.when().then().otherwise()는 조건문입니다. "만약 ~이면 이렇게 하고, 아니면 저렇게 하라"는 뜻입니다.

      when(brush)는 "brush로 선택되었으면", then('origin:N')은 "생산국 색상을 표시하고", otherwise(alt.value('lightgray'))는 "아니면 회색으로 표시하라"입니다.

      결과적으로 드래그한 영역의 점만 색상이 유지되고, 나머지는 모두 회색으로 바뀌어 선택된 부분이 강조됩니다.
- id: step4_point_selection
  title: 4단계. 클릭 선택
  structuredPrimary: true
  subtitle: selection_point
  goal: '4단계. 클릭 선택: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 클릭 선택: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    앞에서는 드래그로 영역을 선택했습니다. 이번에는 클릭으로 항목을 선택하는 방법을 배웁니다. selection_point()는 "마우스 클릭으로 개별 항목을 선택하게 하라"는 명령입니다. point는 "점"이라는 뜻입니다. fields=['origin'] 파라미터는 "origin(생산국) 필드 기준으로 선택하라"는 의미입니다. 범례에서 'usa'를 클릭하면 usa 자동차만 선택되고, 'japan'을 클릭하면 일본 자동차만 선택됩니다.

    opacity도 when().then().otherwise()로 조절합니다. 선택된 점은 불투명, 나머지는 반투명으로 표시됩니다.
  tips:
  - opacity도 when().then().otherwise()로 조절합니다. 선택된 점은 불투명, 나머지는 반투명으로 표시됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    click = alt.selection_point(fields=['origin'])

    chartClick = alt.Chart(mpg).mark_point().encode(
        x='horsepower:Q',
        y='mpg:Q',
        color=alt.when(click).then('origin:N').otherwise(alt.value('lightgray')),
        opacity=alt.when(click).then(alt.value(1)).otherwise(alt.value(0.2))
    ).add_params(click).properties(
        width=500,
        height=300,
        title='범례 클릭으로 생산국 선택'
    )
    chartClick
  exercise:
    prompt: '4단계. 클릭 선택: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      click = alt.selection_point(fields=['origin'])

      chartClick = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(click).then('origin:N').otherwise(alt.value('lightgray')),
          opacity=alt.when(click).then(alt.value(1)).otherwise(alt.value(0.2))
      ).add_params(click).properties(
          width=500,
          height=300,
          title='범례 클릭으로 생산국 선택'
      )
      chartClick
    solution: |-
      click = alt.selection_point(fields=['origin'])

      chartClick = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(click).then('origin:N').otherwise(alt.value('lightgray')),
          opacity=alt.when(click).then(alt.value(1)).otherwise(alt.value(0.2))
      ).add_params(click).properties(
          width=500,
          height=300,
          title='범례 클릭으로 생산국 선택'
