- id: step2_basic_chart
  title: 2단계. 기본 차트
  structuredPrimary: true
  subtitle: 인터랙션 없는 상태
  goal: '2단계. 기본 차트: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 기본 차트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 먼저 인터랙션이 없는 기본 산점도를 만들어 비교 기준을 마련합니다. 나중에 이 차트에 인터랙션을 추가할 것입니다. 마력(x축)과 연비(y축)의 관계를 점으로 표시하고, 생산국(origin)마다
    다른 색상을 부여합니다. 일반적으로 마력이 높을수록 연비는 낮아지는 경향을 볼 수 있습니다. properties()로 차트 크기를 지정합니다. width는 가로 길이, height는 세로 길이입니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    chartBasic = alt.Chart(mpg).mark_point().encode(
        x='horsepower:Q',
        y='mpg:Q',
        color='origin:N'
    ).properties(
        width=500,
        height=300
    )
    chartBasic
  exercise:
    prompt: '2단계. 기본 차트: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      chartBasic = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N'
      ).properties(
          width=500,
          height=300
      )
      chartBasic
    solution: |-
      chartBasic = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N'
      ).properties(
          width=500,
          height=300
      )
      chartBasic
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: |-
      먼저 인터랙션이 없는 기본 산점도를 만들어 비교 기준을 마련합니다. 나중에 이 차트에 인터랙션을 추가할 것입니다.

      마력(x축)과 연비(y축)의 관계를 점으로 표시하고, 생산국(origin)마다 다른 색상을 부여합니다. 일반적으로 마력이 높을수록 연비는 낮아지는 경향을 볼 수 있습니다.

