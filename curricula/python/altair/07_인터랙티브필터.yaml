  - type: code
    language: python
    title: 인터랙션 사양 검사 함수
    description: add_params 누락을 먼저 잡아내기
    content: |-
      def readTooltipFields(encoding):
          return {
              item["field"]
              for item in encoding.get("tooltip", [])
              if isinstance(item, dict) and "field" in item
          }


      def validateInteractiveChart(chart, expectedRows):
          spec = chart.to_dict()

          paramNames = {param.get("name") for param in spec.get("params", [])}
          requiredParams = {"workflowBrush", "workflowOrigin", "workflowHp"}
          missingParams = requiredParams - paramNames
          if missingParams:
              raise ValueError(f"인터랙션 파라미터가 차트에 연결되지 않았습니다: {sorted(missingParams)}")

          encoding = spec.get("encoding", {})
          requiredEncodings = {"x", "y", "color", "opacity", "tooltip"}
          missingEncodings = requiredEncodings - set(encoding)
          if missingEncodings:
              raise ValueError(f"차트 인코딩이 부족합니다: {sorted(missingEncodings)}")

          if "condition" not in encoding.get("opacity", {}):
              raise ValueError("opacity는 드롭다운과 슬라이더 조건으로 제어되어야 합니다.")

          requiredTooltips = {"name", "origin", "horsepower", "mpg", "cylinders"}
          missingTooltips = requiredTooltips - readTooltipFields(encoding)
          if missingTooltips:
              raise ValueError(f"툴팁 필드가 부족합니다: {sorted(missingTooltips)}")

          rowCount = sum(len(rows) for rows in spec.get("datasets", {}).values())
          if rowCount != expectedRows:
              raise ValueError(f"차트 데이터 행 수가 다릅니다: {rowCount} != {expectedRows}")

          return spec


      brokenInteractiveChart = alt.Chart(mpgFiltered).mark_circle(size=60).encode(
          x="horsepower:Q",
          y="mpg:Q",
          color="origin:N",
          opacity=alt.value(0.8),
          tooltip=["name", "origin", "horsepower", "mpg", "cylinders"],
      )

      try:
          validateInteractiveChart(brokenInteractiveChart, len(mpgFiltered))
      except ValueError as exc:
          print("의도한 오류 확인:", exc)
      else:
          raise AssertionError("인터랙션 파라미터가 빠진 차트를 통과시키면 안 됩니다.")
  - type: code
    language: python
    title: 완성 인터랙션 검증하기
    description: 브러싱·드롭다운·슬라이더 연결 확인
    content: |-
      workflowOrigins = sorted(mpgFiltered["origin"].unique().tolist())
      workflowOrigin = alt.param(
          name="workflowOrigin",
          bind=alt.binding_select(
              options=[None] + workflowOrigins,
              labels=["전체"] + workflowOrigins,
              name="생산국: ",
          ),
      )
      workflowHp = alt.param(
          name="workflowHp",
          value=80,
          bind=alt.binding_range(min=0, max=220, step=10, name="최소 마력: "),
      )
      workflowBrush = alt.selection_interval(name="workflowBrush")

      workflowInteractiveChart = alt.Chart(mpgFiltered).mark_circle(size=75).encode(
          x=alt.X("horsepower:Q", title="마력"),
          y=alt.Y("mpg:Q", title="연비 (MPG)"),
          color=alt.when(workflowBrush).then("origin:N").otherwise(alt.value("lightgray")),
          opacity=alt.when(
              ((workflowOrigin == None) | (alt.datum.origin == workflowOrigin)) &
              (alt.datum.horsepower >= workflowHp)
          ).then(alt.value(0.85)).otherwise(alt.value(0.12)),
          tooltip=["name", "origin", "horsepower", "mpg", "cylinders"],
      ).add_params(
          workflowBrush,
          workflowOrigin,
          workflowHp,
      ).properties(
          title="자동차 연비 인터랙션 검증 차트",
          width=550,
          height=350,
      )

      workflowSpec = validateInteractiveChart(workflowInteractiveChart, len(mpgFiltered))
      workflowParamNames = {param["name"] for param in workflowSpec["params"]}

      assert bestMpgOrigin == "europe"
      assert {"workflowBrush", "workflowOrigin", "workflowHp"} <= workflowParamNames

      print("검증 완료: 파라미터", sorted(workflowParamNames))
      workflowInteractiveChart
  - type: code
    language: python
    title: 필터 기준 실험하기
    description: 마력 기준이 올라갈수록 대상이 줄어드는지 확인
    content: |-
      def countInteractiveTarget(data, origin=None, minimumHorsepower=0):
          target = data[data["horsepower"] >= minimumHorsepower]
          if origin is not None:
              target = target[target["origin"] == origin]
          return len(target)


      allOver120 = countInteractiveTarget(mpgFiltered, minimumHorsepower=120)
      usaOver120 = countInteractiveTarget(mpgFiltered, origin="usa", minimumHorsepower=120)
      usaOver160 = countInteractiveTarget(mpgFiltered, origin="usa", minimumHorsepower=160)

      assert allOver120 >= usaOver120 >= usaOver160
      assert usaOver120 > 0

      print("전체 120마력 이상:", allOver120)
      print("미국 120마력 이상:", usaOver120)
      print("미국 160마력 이상:", usaOver160)
