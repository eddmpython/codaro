- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: seaborn-data
  goal: '1단계. 데이터 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 데이터 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Codaro 로컬 데이터셋에서 mpg(Miles Per Gallon, 연비) 데이터를 불러옵니다. 1970-1980년대 자동차들의 연비 정보가 담긴 데이터입니다. horsepower는 마력(엔진
    힘), mpg는 연비(갤런당 주행거리), origin은 생산국(usa, europe, japan)을 나타냅니다. 이 데이터로 사용자가 클릭하고 드래그해서 조작할 수 있는 인터랙티브 차트를 만들어봅니다. 인터랙티브는
    "상호작용하는"이라는 뜻으로, 마우스로 차트를 조작하면 차트가 반응하는 것을 의미합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
