      [None] + origins는 리스트 합치기입니다. None(전체)을 첫 번째 항목으로 추가하고, 그 뒤에 usa, europe, japan을 붙입니다. | 기호는 "또는"이라는 뜻으로, (조건1) | (조건2)는 "조건1이거나 조건2이면"을 의미합니다.
