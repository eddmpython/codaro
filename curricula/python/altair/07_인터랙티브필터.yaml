  subtitle: 예측 → 파라미터 오류 확인 → 사양 검증 → 기준 실험
  goal: '10단계. 실무 인터랙션 검증: 실행 가능한 Python 흐름으로 익힌다.'
  why: '10단계. 실무 인터랙션 검증: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
