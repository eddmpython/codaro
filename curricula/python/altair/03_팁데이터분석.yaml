sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: seaborn-data
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Codaro 로컬 데이터셋에서 tips 데이터를 불러옵니다. 레스토랑 결제와 팁 패턴을 담은 예제 데이터입니다. total_bill(총 금액), tip(팁), sex(성별), smoker(흡연여부), day(요일), time(시간대), size(인원수) 컬럼이 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import altair as alt
    import pandas as pd
    import warnings
    warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
    from codaro.curriculum.localData import loadLocalDataset

    tips = loadLocalDataset("tips")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
      from codaro.curriculum.localData import loadLocalDataset

      tips = loadLocalDataset("tips")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_count_bar
  title: 2단계. 개수 세기
  structuredPrimary: true
  subtitle: count() 집계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    막대 차트의 기본은 카테고리별 개수를 세는 것입니다. mark_bar()를 사용하면 막대 그래프를 그립니다. 요일(day)별로 데이터가 몇 건인지 막대 차트로 표현합니다. x축에 요일, y축에 개수를 배치합니다. y에 'count()'를 사용하면 자동으로 개수를 셉니다. count()는 집계 함수로, 데이터를 세어주는 역할을 합니다. 괄호 안이 비어있는 것은 "전체 개수를 세라"는 의미입니다.

    집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
  tips:
  - 집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
  snippet: |-
    chartCount = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='count()'
    )
    chartCount
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
      )
      chartCount
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_mean_bar
  title: 3단계. 평균 계산
  structuredPrimary: true
  subtitle: mean() 집계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    count() 외에도 mean(), sum(), median() 등 다양한 집계 함수를 사용할 수 있습니다. 요일별 평균 팁을 계산해봅니다. y에 'mean(tip)'을 지정하면 tip 컬럼의 평균값을 구합니다. mean() 괄호 안에 컬럼명을 넣으면 그 컬럼의 평균을 계산합니다. 'mean(tip):Q'처럼 :Q를 붙여 수량형 데이터임을 명시합니다.

    mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.
  tips:
  - mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.
  snippet: |-
    chartMean = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='mean(tip):Q'
    )
    chartMean
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartMean = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='mean(tip):Q'
      )
      chartMean
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_color_group
  title: 4단계. 색상으로 그룹 분리
  structuredPrimary: true
  subtitle: color 인코딩
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    막대 차트에도 color 인코딩을 적용할 수 있습니다. 요일별 건수를 성별(sex)로 구분해봅니다. 같은 요일 안에서 남녀 비율을 확인할 수 있습니다.

    color를 추가하면 스택(stacked) 막대 차트가 됩니다. 각 요일 막대 안에서 성별이 쌓여서 표시됩니다.
  tips:
  - color를 추가하면 스택(stacked) 막대 차트가 됩니다. 각 요일 막대 안에서 성별이 쌓여서 표시됩니다.
  snippet: |-
    chartGrouped = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='count()',
        color='sex:N'
    )
    chartGrouped
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartGrouped = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()',
          color='sex:N'
      )
      chartGrouped
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_ordinal
  title: 5단계. 순서형 데이터
  structuredPrimary: true
  subtitle: :O 타입
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    요일에는 자연스러운 순서가 있습니다. Thur → Fri → Sat → Sun 순으로 정렬하면 더 직관적입니다. :O(Ordinal, 순서형) 타입을 사용하면 순서가 있는 카테고리를 표현할 수 있습니다. :N(명목형)과 달리 :O는 순서를 지정할 수 있습니다. 먼저 dayOrder라는 변수에 요일 순서를 리스트로 저장합니다. 그다음 alt.X() 함수에서 sort=dayOrder로 이 순서를 적용합니다.

    같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막 줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  tips:
  - 같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막 줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  snippet: |-
    dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
    chartOrdered = alt.Chart(tips).mark_bar().encode(
        x=alt.X('day:O', sort=dayOrder),
        y='count()',
        color='sex:N'
    )
    chartOrdered
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
      chartOrdered = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=dayOrder),
          y='count()',
          color='sex:N'
      )
      chartOrdered
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_horizontal
  title: 6단계. 가로 막대 차트
  structuredPrimary: true
  subtitle: x와 y 교환
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: x와 y를 바꾸면 가로 막대 차트가 됩니다. x축에 숫자(평균 금액)를, y축에 카테고리(요일)를 배치합니다. 카테고리 이름이 길거나 항목이 많을 때 가로 막대가 읽기 쉽습니다. 여기서는 'mean(total_bill):Q'로 총 금액의 평균을 계산하고, time(시간대)으로 색상을 구분합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartHorizontal = alt.Chart(tips).mark_bar().encode(
        x='mean(total_bill):Q',
        y='day:O',
        color='time:N'
    )
    chartHorizontal
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartHorizontal = alt.Chart(tips).mark_bar().encode(
          x='mean(total_bill):Q',
          y='day:O',
          color='time:N'
      )
      chartHorizontal
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_properties
  title: 7단계. 차트 속성 설정
  structuredPrimary: true
  subtitle: properties()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: properties()로 차트 제목, 너비, 높이를 설정합니다. properties()는 차트 전체 속성을 조정하는 함수입니다. title 파라미터로 차트 상단에 표시될 제목을 지정합니다. 문자열(작은따옴표로 감싼 텍스트)로 전달합니다. width는 차트 너비, height는 차트 높이를 픽셀 단위로 지정합니다. 숫자만 쓰면 됩니다(따옴표 없이). 여기서는 alt.X()의 title 파라미터로 축 제목도 한글로 바꿨습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartStyled = alt.Chart(tips).mark_bar().encode(
        x=alt.X('day:O', sort=['Thur', 'Fri', 'Sat', 'Sun'], title='요일'),
        y=alt.Y('mean(tip):Q', title='평균 팁 ($)'),
        color='sex:N'
    ).properties(
        title='요일별 평균 팁 (성별 구분)',
        width=400,
        height=300
    )
    chartStyled
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartStyled = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=['Thur', 'Fri', 'Sat', 'Sun'], title='요일'),
          y=alt.Y('mean(tip):Q', title='평균 팁 ($)'),
          color='sex:N'
      ).properties(
          title='요일별 평균 팁 (성별 구분)',
          width=400,
          height=300
      )
      chartStyled
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_final
  title: 8단계. 최종 결과물
  structuredPrimary: true
  subtitle: 팁 분석 대시보드
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    지금까지 배운 내용을 종합해 팁 데이터 분석 차트를 완성합니다. 시간대(Lunch/Dinner)와 흡연 여부별 평균 금액을 비교합니다.

    Dinner 시간대의 평균 금액이 Lunch보다 높습니다. 흡연자와 비흡연자 간 차이도 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartFinal = alt.Chart(tips).mark_bar().encode(
        x=alt.X('time:N', title='시간대'),
        y=alt.Y('mean(total_bill):Q', title='평균 금액 ($)'),
        color=alt.Color('smoker:N', title='흡연 여부'),
        tooltip=['time', 'smoker', 'mean(total_bill)', 'count()']
    ).properties(title='시간대별 평균 금액 (흡연 여부)', width=350, height=300)
    chartFinal
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      chartFinal = alt.Chart(tips).mark_bar().encode(
          x=alt.X('time:N', title='시간대'),
          y=alt.Y('mean(total_bill):Q', title='평균 금액 ($)'),
          color=alt.Color('smoker:N', title='흡연 여부'),
          tooltip=['time', 'smoker', 'mean(total_bill)', 'count()']
      ).properties(title='시간대별 평균 금액 (흡연 여부)', width=350, height=300)
      chartFinal
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: 9단계. 실무 집계 검증 루프
  structuredPrimary: true
  subtitle: 예측 → spec 검증 → 오류 수정 → 기준 실험
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    업무용 차트는 막대가 그려졌다는 사실만으로 충분하지 않습니다. 원본 데이터 구조가 맞는지, 집계 결과가 예상한 방향인지, Altair spec에 집계 함수와 그룹 인코딩이 들어갔는지 확인해야 합니다. 이 단계에서는 Dinner의 평균 결제 금액이 Lunch보다 높을 것이라고 먼저 예측합니다. 그런 다음 pandas 집계와 Altair spec을 함께 검증해, 보고서에 넣을 수 있는 차트인지 확인합니다.

    집계 차트는 원본 데이터 계약, 집계 방향, 차트 spec을 함께 검증해야 합니다. 이렇게 만들면 수업 예제가 보고서 자동화 코드로도 이어집니다.
  tips:
  - 집계 차트는 원본 데이터 계약, 집계 방향, 차트 spec을 함께 검증해야 합니다. 이렇게 만들면 수업 예제가 보고서 자동화 코드로도 이어집니다.
  snippet: |-
    requiredColumns = {"total_bill", "tip", "sex", "smoker", "day", "time", "size"}
    missingColumns = requiredColumns - set(tips.columns)

    assert not missingColumns, f"필수 컬럼 누락: {missingColumns}"
