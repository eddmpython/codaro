- id: step5_ordinal
  title: 5단계. 순서형 데이터
  structuredPrimary: true
  subtitle: :O 타입
  goal: '5단계. 순서형 데이터: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 순서형 데이터: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    요일에는 자연스러운 순서가 있습니다. Thur → Fri → Sat → Sun 순으로 정렬하면 더 직관적입니다. :O(Ordinal, 순서형) 타입을 사용하면 순서가 있는 카테고리를 표현할 수 있습니다. :N(명목형)과 달리 :O는 순서를 지정할 수 있습니다. 먼저 dayOrder라는 변수에 요일 순서를 리스트로 저장합니다. 그다음 alt.X() 함수에서 sort=dayOrder로 이 순서를 적용합니다.

    같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막 줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  tips:
  - 같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막 줄에는 하나의 변수(chartOrdered)만
    써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
    chartOrdered = alt.Chart(tips).mark_bar().encode(
        x=alt.X('day:O', sort=dayOrder),
        y='count()',
        color='sex:N'
    )
    chartOrdered
  exercise:
    prompt: '5단계. 순서형 데이터: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
      chartOrdered = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=dayOrder),
          y='count()',
          color='sex:N'
      )
      chartOrdered
    solution: |-
