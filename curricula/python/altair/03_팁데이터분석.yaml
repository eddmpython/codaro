      chartCount
  - type: tip
    content: |-
      집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다.

      'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
- id: step3_mean_bar
  title: 3단계. 평균 계산
  structuredPrimary: true
  subtitle: mean() 집계
  goal: '3단계. 평균 계산: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 평균 계산: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    count() 외에도 mean(), sum(), median() 등 다양한 집계 함수를 사용할 수 있습니다. 요일별 평균 팁을 계산해봅니다. y에 'mean(tip)'을 지정하면 tip 컬럼의 평균값을 구합니다. mean() 괄호 안에 컬럼명을 넣으면 그 컬럼의 평균을 계산합니다. 'mean(tip):Q'처럼 :Q를 붙여 수량형 데이터임을 명시합니다.

    mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.
  tips:
  - mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    chartMean = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='mean(tip):Q'
