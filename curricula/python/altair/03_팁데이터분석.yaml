- id: step2_count_bar
  title: 2단계. 개수 세기
  structuredPrimary: true
  subtitle: count() 집계
  goal: '2단계. 개수 세기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 개수 세기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    막대 차트의 기본은 카테고리별 개수를 세는 것입니다. mark_bar()를 사용하면 막대 그래프를 그립니다. 요일(day)별로 데이터가 몇 건인지 막대 차트로 표현합니다. x축에 요일, y축에 개수를 배치합니다. y에 'count()'를 사용하면 자동으로 개수를 셉니다. count()는 집계 함수로, 데이터를 세어주는 역할을 합니다. 괄호 안이 비어있는 것은 "전체 개수를 세라"는 의미입니다.

    집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
  tips:
  - 집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로
    전달해야 Altair가 이것을 집계 함수로 인식합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    chartCount = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='count()'
    )
    chartCount
  exercise:
    prompt: '2단계. 개수 세기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
      )
      chartCount
    solution: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
      )
      chartCount
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: |-
      막대 차트의 기본은 카테고리별 개수를 세는 것입니다. mark_bar()를 사용하면 막대 그래프를 그립니다.

      요일(day)별로 데이터가 몇 건인지 막대 차트로 표현합니다. x축에 요일, y축에 개수를 배치합니다.

      y에 'count()'를 사용하면 자동으로 개수를 셉니다. count()는 집계 함수로, 데이터를 세어주는 역할을 합니다. 괄호 안이 비어있는 것은 "전체 개수를 세라"는 의미입니다.
  - type: code
    language: python
    title: 요일별 건수
    description: count()로 개수 집계
    content: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
