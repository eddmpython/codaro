meta:
  id: altair_03
  title: 팁데이터분석
  order: 3
  category: altair
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["mark_bar", "aggregate", "mean", "count", "properties"]
  seo:
    title: "Altair 막대 차트 - 팁 데이터 집계 분석"
    description: "Altair로 막대 차트를 만들고 집계 함수를 활용합니다. mark_bar, count, mean 등 집계 개념을 배웁니다."
    keywords: ["altair bar", "mark_bar", "aggregate", "count", "mean"]

intro:
  emoji: "💵"
  goal: 레스토랑 팁 데이터를 막대 차트로 시각화하고 집계 함수를 활용합니다.
  description: mark_bar()로 막대 차트를 만들고, count(), mean() 등 집계 함수로 데이터를 요약합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: seaborn-data
  blocks:
  - type: text
    content: |-
      GitHub에서 tips 데이터를 불러옵니다. 레스토랑에서 수집한 244건의 팁 데이터입니다.

      total_bill(총 금액), tip(팁), sex(성별), smoker(흡연여부), day(요일), time(시간대), size(인원수) 컬럼이 있습니다.
  - type: code
    language: python
    title: tips 데이터 불러오기
    description: pandas로 CSV 로드
    content: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')

      tipsUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
      tips = pd.read_csv(tipsUrl)
      tips.head()

- id: step2_count_bar
  title: 2단계. 개수 세기
  subtitle: count() 집계
  blocks:
  - type: text
    content: |-
      막대 차트의 기본은 카테고리별 개수를 세는 것입니다. mark_bar()를 사용하면 막대 그래프를 그립니다.

      요일(day)별로 데이터가 몇 건인지 막대 차트로 표현합니다. x축에 요일, y축에 개수를 배치합니다.

      y에 'count()'를 사용하면 자동으로 개수를 셉니다. count()는 집계 함수로, 데이터를 세어주는 역할을 합니다. 괄호 안이 비어있는 것은 "전체 개수를 세라"는 의미입니다.
  - type: code
    language: python
    title: 요일별 건수
    description: count()로 개수 집계
    content: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
      )
      chartCount
  - type: tip
    content: |-
      집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다.

      'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.

- id: step3_mean_bar
  title: 3단계. 평균 계산
  subtitle: mean() 집계
  blocks:
  - type: text
    content: |-
      count() 외에도 mean(), sum(), median() 등 다양한 집계 함수를 사용할 수 있습니다.

      요일별 평균 팁을 계산해봅니다. y에 'mean(tip)'을 지정하면 tip 컬럼의 평균값을 구합니다.

      mean() 괄호 안에 컬럼명을 넣으면 그 컬럼의 평균을 계산합니다. 'mean(tip):Q'처럼 :Q를 붙여 수량형 데이터임을 명시합니다.
  - type: code
    language: python
    title: 요일별 평균 팁
    description: mean()으로 평균 집계
    content: |-
      chartMean = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='mean(tip):Q'
      )
      chartMean
  - type: tip
    content: |-
      mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.

- id: step4_color_group
  title: 4단계. 색상으로 그룹 분리
  subtitle: color 인코딩
  blocks:
  - type: text
    content: |-
      막대 차트에도 color 인코딩을 적용할 수 있습니다.

      요일별 건수를 성별(sex)로 구분해봅니다. 같은 요일 안에서 남녀 비율을 확인할 수 있습니다.
  - type: code
    language: python
    title: 성별 구분 막대
    description: color로 성별 구분
    content: |-
      chartGrouped = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()',
          color='sex:N'
      )
      chartGrouped
  - type: tip
    content: |-
      color를 추가하면 스택(stacked) 막대 차트가 됩니다. 각 요일 막대 안에서 성별이 쌓여서 표시됩니다.

- id: step5_ordinal
  title: 5단계. 순서형 데이터
  subtitle: :O 타입
  blocks:
  - type: text
    content: |-
      요일에는 자연스러운 순서가 있습니다. Thur → Fri → Sat → Sun 순으로 정렬하면 더 직관적입니다.

      :O(Ordinal, 순서형) 타입을 사용하면 순서가 있는 카테고리를 표현할 수 있습니다. :N(명목형)과 달리 :O는 순서를 지정할 수 있습니다.

      먼저 dayOrder라는 변수에 요일 순서를 리스트로 저장합니다. 그다음 alt.X() 함수에서 sort=dayOrder로 이 순서를 적용합니다.
  - type: code
    language: python
    title: 요일 순서 지정
    description: :O와 sort로 정렬
    content: |-
      dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
      chartOrdered = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=dayOrder),
          y='count()',
          color='sex:N'
      )
      chartOrdered
  - type: tip
    content: |-
      같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다.

      하지만 마지막 줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.

- id: step6_horizontal
  title: 6단계. 가로 막대 차트
  subtitle: x와 y 교환
  blocks:
  - type: text
    content: |-
      x와 y를 바꾸면 가로 막대 차트가 됩니다. x축에 숫자(평균 금액)를, y축에 카테고리(요일)를 배치합니다.

      카테고리 이름이 길거나 항목이 많을 때 가로 막대가 읽기 쉽습니다.

      여기서는 'mean(total_bill):Q'로 총 금액의 평균을 계산하고, time(시간대)으로 색상을 구분합니다.
  - type: code
    language: python
    title: 가로 막대 차트
    description: x, y 위치 교환
    content: |-
      chartHorizontal = alt.Chart(tips).mark_bar().encode(
          x='mean(total_bill):Q',
          y='day:O',
          color='time:N'
      )
      chartHorizontal

- id: step7_properties
  title: 7단계. 차트 속성 설정
  subtitle: properties()
  blocks:
  - type: text
    content: |-
      properties()로 차트 제목, 너비, 높이를 설정합니다. properties()는 차트 전체 속성을 조정하는 함수입니다.

      title 파라미터로 차트 상단에 표시될 제목을 지정합니다. 문자열(작은따옴표로 감싼 텍스트)로 전달합니다.

      width는 차트 너비, height는 차트 높이를 픽셀 단위로 지정합니다. 숫자만 쓰면 됩니다(따옴표 없이).

      여기서는 alt.X()의 title 파라미터로 축 제목도 한글로 바꿨습니다.
  - type: code
    language: python
    title: 차트 속성 설정
    description: 제목과 크기 지정
    content: |-
      chartStyled = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=['Thur', 'Fri', 'Sat', 'Sun'], title='요일'),
          y=alt.Y('mean(tip):Q', title='평균 팁 ($)'),
          color='sex:N'
      ).properties(
          title='요일별 평균 팁 (성별 구분)',
          width=400,
          height=300
      )
      chartStyled

- id: step8_final
  title: 8단계. 최종 결과물
  subtitle: 팁 분석 대시보드
  blocks:
  - type: text
    content: |-
      지금까지 배운 내용을 종합해 팁 데이터 분석 차트를 완성합니다.

      시간대(Lunch/Dinner)와 흡연 여부별 평균 금액을 비교합니다.
  - type: code
    language: python
    title: 최종 팁 분석 차트
    description: 프로젝트 완성!
    content: |-
      chartFinal = alt.Chart(tips).mark_bar().encode(
          x=alt.X('time:N', title='시간대'),
          y=alt.Y('mean(total_bill):Q', title='평균 금액 ($)'),
          color=alt.Color('smoker:N', title='흡연 여부'),
          tooltip=['time', 'smoker', 'mean(total_bill)', 'count()']
      ).properties(title='시간대별 평균 금액 (흡연 여부)', width=350, height=300)
      chartFinal
  - type: text
    content: |-
      Dinner 시간대의 평균 금액이 Lunch보다 높습니다. 흡연자와 비흡연자 간 차이도 확인할 수 있습니다.

- id: practice
  title: 실습
  subtitle: 팁 데이터 막대 차트 프로젝트
  blocks:
  - type: text
    content: |-
      이 프로젝트에서 배운 내용을 정리합니다. mark_bar()로 막대 차트를 그렸습니다.

      count()로 개수를, mean()으로 평균을 계산했습니다. 집계 함수는 여러 데이터를 하나의 값으로 요약합니다.

      :O(순서형) 타입과 sort로 카테고리 순서를 지정했습니다. properties()로 차트 제목과 크기를 설정했습니다. 각 미션에서 이 개념들을 활용해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 인원수(size)별 건수 막대 차트"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        billUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
        bill = pd.read_csv(billUrl)
    - type: code
      title: "차트 생성"
      content: |-
        figSize = alt.Chart(bill).mark_bar().encode(
            x='size:O',
            y='count()',
            color='time:N'
        ).properties(
            title='인원수별 방문 건수'
        )
        figSize
  - type: expansion
    title: "미션2: 성별 평균 팁 비교 (가로 막대)"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        payUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
        pay = pd.read_csv(payUrl)
    - type: code
      title: "차트 생성"
      content: |-
        figSex = alt.Chart(pay).mark_bar().encode(
            x='mean(tip):Q',
            y='sex:N',
            color='smoker:N'
        ).properties(
            title='성별 평균 팁 (흡연 여부)'
        )
        figSex

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Altair로 막대 차트와 집계 함수를 마스터했습니다!
  - type: list
    items:
    - "mark_bar() - 막대 차트 마크"
    - "count() - 개수 세기 집계"
    - "mean(컬럼) - 평균 계산 집계"
    - "sum(컬럼), median(컬럼) - 합계, 중앙값"
    - ":O - 순서형(Ordinal) 데이터 타입"
    - "sort=[...] - 카테고리 정렬 순서 지정"
    - "properties(title, width, height) - 차트 속성 설정"
  - type: text
    content: 다음 프로젝트에서는 펭귄 데이터로 영역 차트와 스택 시각화를 배웁니다.
