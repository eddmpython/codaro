    starterCode: |-
      chartMultiFilter = alt.Chart(titanic).mark_bar().encode(
          x='pclass:O',
          y='count()',
          color='survived:N'
      ).transform_filter(
          (alt.datum.age >= 18) & (alt.datum.sex == 'female')
      ).properties(
          title='성인 여성 등급별 생존율'
