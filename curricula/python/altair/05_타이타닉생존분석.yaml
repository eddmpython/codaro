          x='survived:N',
          y='count()',
          color='survived:N'
      )
      chartSurvived
    solution: |-
      chartSurvived = alt.Chart(titanic).mark_bar().encode(
          x='survived:N',
          y='count()',
          color='survived:N'
      )
      chartSurvived
