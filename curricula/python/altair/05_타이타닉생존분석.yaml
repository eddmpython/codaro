- id: step2_basic_bar
  title: 2단계. 기본 막대 차트
  structuredPrimary: true
  subtitle: 생존자 수 집계
  goal: '2단계. 기본 막대 차트: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 기본 막대 차트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    survived 컬럼은 0(사망)과 1(생존)로 구성됩니다. 생존 여부별 승객 수를 막대 차트로 표현합니다.

    survived:N에서 :N은 명목형입니다. 0, 1 숫자지만 범주로 취급합니다.
  tips:
  - survived:N에서 :N은 명목형입니다. 0, 1 숫자지만 범주로 취급합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    chartSurvived = alt.Chart(titanic).mark_bar().encode(
        x='survived:N',
        y='count()',
        color='survived:N'
    )
    chartSurvived
  exercise:
    prompt: '2단계. 기본 막대 차트: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
