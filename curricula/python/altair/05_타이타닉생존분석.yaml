  - type: code
    language: python
    title: Facet spec 검증
    description: bar chart의 평균 집계와 column facet을 확인합니다
    content: |-
      survivalChart = alt.Chart(titanicFlow).mark_bar().encode(
          x="pclass:O",
          y="mean(survived):Q",
          color="sex:N",
          column="sex:N",
          tooltip=["pclass:O", "mean(survived):Q"],
      ).properties(title="Titanic survival by class and sex")
      survivalSpec = survivalChart.to_dict()
      encoding = survivalSpec["encoding"]

      assert survivalSpec["mark"]["type"] == "bar"
      assert encoding["y"]["aggregate"] == "mean"
      assert encoding["column"]["field"] == "sex"
      assert encoding["color"]["field"] == "sex"
      survivalChart
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: 생존 값이 0/1이 아니면 분석을 멈춥니다
    content: |-
      def validateSurvivalFrame(frame):
          values = set(frame["survived"].dropna().unique())
          if not values.issubset({0, 1}):
              raise ValueError(f"survived는 0/1이어야 합니다: {values}")
          assert frame["pclass"].between(1, 3).all()
          return True

      brokenTitanic = titanicFlow.copy()
      brokenTitanic.loc[brokenTitanic.index[0], "survived"] = 2
      try:
          validateSurvivalFrame(brokenTitanic)
      except ValueError as exc:
          print("검증 실패 확인:", exc)

      assert validateSurvivalFrame(titanicFlow)
  - type: code
    language: python
    title: 실무 변주 실험
    description: 객실 등급과 요금 기준을 바꿔 생존율 차이를 봅니다
    content: |-
      classSurvival = titanicFlow.groupby("pclass")["survived"].mean().sort_values(ascending=False)
      fareSurvival = titanicFlow.assign(highFare=titanicFlow["fare"] >= titanicFlow["fare"].median()).groupby("highFare")["survived"].mean()

      assert classSurvival.index[0] == 1
      assert fareSurvival[True] > fareSurvival[False]
      {"classSurvival": classSurvival.round(2).to_dict(), "fareSurvival": fareSurvival.round(2).to_dict()}
  - type: tip
    content: Facet은 비교 대상을 늘리는 기능이지만, 생존율의 기준과 표본 검증 없이는 결론을 강하게 말할 수 없습니다.
