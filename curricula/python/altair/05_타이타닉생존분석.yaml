- id: step3_row_encoding
  title: 3단계. 행 분할
  structuredPrimary: true
  subtitle: row 인코딩
  goal: '3단계. 행 분할: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 행 분할: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    row 인코딩으로 차트를 여러 행으로 분할합니다. encode() 괄호 안에 row='sex:N'을 추가하면 됩니다. 성별(sex)로 분할하면 남녀 생존율을 각각 따로 차트로 보여줍니다. 위아래로 두 개의 차트가 나열됩니다. 같은 차트를 여러 조건별로 나누어 보여주는 것을 "패싯(facet)"이라고 합니다.

    row는 "행"을 의미합니다. row='sex:N'은 성별 값(male, female)마다 행을 하나씩 만들어 차트를 위아래로 배치합니다. column은 "열"을 의미하며, 차트를 좌우로 배치합니다. row와 column을 함께 사용하면 2차원 그리드를 만들 수 있습니다.
  tips:
  - row는 "행"을 의미합니다. row='sex:N'은 성별 값(male, female)마다 행을 하나씩 만들어 차트를 위아래로 배치합니다. column은 "열"을 의미하며, 차트를 좌우로 배치합니다. row와 column을
    함께 사용하면 2차원 그리드를 만들 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    chartRow = alt.Chart(titanic).mark_bar().encode(
        x='survived:N',
        y='count()',
        color='survived:N',
        row='sex:N'
    )
    chartRow
  exercise:
    prompt: '3단계. 행 분할: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      chartRow = alt.Chart(titanic).mark_bar().encode(
          x='survived:N',
          y='count()',
          color='survived:N',
          row='sex:N'
      )
      chartRow
    solution: |-
      chartRow = alt.Chart(titanic).mark_bar().encode(
          x='survived:N',
          y='count()',
          color='survived:N',
          row='sex:N'
      )
      chartRow
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
