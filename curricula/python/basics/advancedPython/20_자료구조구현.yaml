              self.val = val
              self.next = None

      class LinkedList:
          def __init__(self):
              self.head = None

          def append(self, val):
              newNode = ListNode(val)
              if not self.head:
                  self.head = newNode
                  return
              curr = self.head
              while curr.next:
                  curr = curr.next
              curr.next = newNode

          def prepend(self, val):
              newNode = ListNode(val)
              newNode.next = self.head
              self.head = newNode

          def delete(self, val):
              if not self.head:
                  return
              if self.head.val == val:
                  self.head = self.head.next
                  return
              curr = self.head
              while curr.next and curr.next.val != val:
                  curr = curr.next
              if curr.next:
                  curr.next = curr.next.next

          def toList(self):
              result = []
              curr = self.head
              while curr:
                  result.append(curr.val)
                  curr = curr.next
