- id: heap
  title: 힙 구현
  structuredPrimary: true
  subtitle: 우선순위 기반 구조
  goal: 힙 구현에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    힙은 완전 이진 트리 기반의 우선순위 구조입니다. 최소 힙은 부모가 자식보다 작고, 최대 힙은 부모가 자식보다 큽니다. 삽입과 삭제는 O(log n), 최솟값/최댓값 조회는 O(1)입니다. 우선순위 큐, 힙 정렬에 사용됩니다.

    파이썬 heapq 모듈은 최소 힙을 제공합니다. 최대 힙은 값을 음수로 변환하여 사용합니다.
  snippet: |-
    class MinHeap:
        def __init__(self):
            self.heap = []

        def parent(self, i):
            return (i - 1) // 2

        def leftChild(self, i):
            return 2 * i + 1

        def rightChild(self, i):
            return 2 * i + 2

        def swap(self, i, j):
            self.heap[i], self.heap[j] = self.heap[j], self.heap[i]

        def insert(self, val):
            self.heap.append(val)
            self._heapifyUp(len(self.heap) - 1)

        def _heapifyUp(self, i):
            while i > 0 and self.heap[self.parent(i)] > self.heap[i]:
                self.swap(i, self.parent(i))
                i = self.parent(i)

        def extractMin(self):
            if not self.heap:
                return None
            if len(self.heap) == 1:
                return self.heap.pop()
            minVal = self.heap[0]
            self.heap[0] = self.heap.pop()
            self._heapifyDown(0)
            return minVal

        def _heapifyDown(self, i):
            smallest = i
            left = self.leftChild(i)
            right = self.rightChild(i)
            if left < len(self.heap) and self.heap[left] < self.heap[smallest]:
                smallest = left
            if right < len(self.heap) and self.heap[right] < self.heap[smallest]:
                smallest = right
            if smallest != i:
                self.swap(i, smallest)
                self._heapifyDown(smallest)

        def peek(self):
            return self.heap[0] if self.heap else None

    minHeap = MinHeap()
    for val in [5, 3, 8, 1, 2, 9]:
        minHeap.insert(val)
    heapMin = minHeap.peek()
    heapExtract = minHeap.extractMin()
    heapMinAfter = minHeap.peek()
    (heapMin, heapExtract, heapMinAfter)
  exercise:
    prompt: 힙 구현 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class MinHeap:
          def __init__(self):
              self.heap = []

          def parent(self, i):
              return (i - 1) // 2

          def leftChild(self, i):
              return 2 * i + 1

          def rightChild(self, i):
              return 2 * i + 2

          def swap(self, i, j):
              self.heap[i], self.heap[j] = self.heap[j], self.heap[i]

          def insert(self, val):
              self.heap.append(val)
              self._heapifyUp(len(self.heap) - 1)

          def _heapifyUp(self, i):
              while i > 0 and self.heap[self.parent(i)] > self.heap[i]:
                  self.swap(i, self.parent(i))
                  i = self.parent(i)

          def extractMin(self):
              if not self.heap:
                  return None
              if len(self.heap) == 1:
                  return self.heap.pop()
              minVal = self.heap[0]
              self.heap[0] = self.heap.pop()
              self._heapifyDown(0)
              return minVal

          def _heapifyDown(self, i):
              smallest = i
              left = self.leftChild(i)
              right = self.rightChild(i)
              if left < len(self.heap) and self.heap[left] < self.heap[smallest]:
                  smallest = left
              if right < len(self.heap) and self.heap[right] < self.heap[smallest]:
                  smallest = right
              if smallest != i:
                  self.swap(i, smallest)
                  self._heapifyDown(smallest)

          def peek(self):
              return self.heap[0] if self.heap else None

      minHeap = MinHeap()
      for val in [5, 3, 8, 1, 2, 9]:
          minHeap.insert(val)
      heapMin = minHeap.peek()
      heapExtract = minHeap.extractMin()
      heapMinAfter = minHeap.peek()
      (heapMin, heapExtract, heapMinAfter)
