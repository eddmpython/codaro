- id: linkedlist
  title: 연결 리스트
  structuredPrimary: true
  subtitle: 노드 기반 구조
  goal: 연결 리스트에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    연결 리스트는 노드들이 포인터로 연결된 구조입니다. 삽입/삭제가 O(1)이지만 탐색은 O(n)입니다. 단일 연결 리스트는 다음 노드만, 이중 연결 리스트는 이전/다음 노드를 모두 참조합니다.

    이중 연결 리스트는 LRU 캐시 구현에 자주 사용됩니다.
  snippet: |-
    class ListNode:
        def __init__(self, val):
            self.val = val
            self.next = None

    class LinkedList:
        def __init__(self):
            self.head = None

        def append(self, val):
            newNode = ListNode(val)
            if not self.head:
                self.head = newNode
                return
            curr = self.head
            while curr.next:
                curr = curr.next
            curr.next = newNode

        def prepend(self, val):
            newNode = ListNode(val)
            newNode.next = self.head
            self.head = newNode

        def delete(self, val):
            if not self.head:
                return
            if self.head.val == val:
                self.head = self.head.next
                return
            curr = self.head
            while curr.next and curr.next.val != val:
                curr = curr.next
            if curr.next:
                curr.next = curr.next.next

        def toList(self):
            result = []
            curr = self.head
            while curr:
                result.append(curr.val)
                curr = curr.next
            return result

    llist = LinkedList()
    llist.append(1)
    llist.append(2)
    llist.append(3)
    llist.prepend(0)
    llist.delete(2)
    llistResult = llist.toList()
    llistResult
  exercise:
    prompt: 연결 리스트 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
