    큐(FIFO), 힙(우선순위), 트리(계층), 그래프(관계)는 각각 다른 문제 유형에 최적화되어 있습니다. 🟢 기본 문제로 스택과 큐를 구현하고 괄호 검사, BFS 등에 적용해보세요.
