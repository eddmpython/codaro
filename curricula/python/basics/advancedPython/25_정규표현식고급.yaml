    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: '현업 흐름 검증: 주문 로그 파싱과 마스킹의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.'
    resultCheck: '현업 흐름 검증: 주문 로그 파싱과 마스킹 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
- id: practice
