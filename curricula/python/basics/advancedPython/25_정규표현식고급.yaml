sections:
- id: basic_review
  title: 기본 패턴 복습
  structuredPrimary: true
  subtitle: 정규표현식 기초 문법
  goal: 기본 패턴 복습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: 정규표현식 기본 문법 복습
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    reviewText = "Hello World 123 Python3.9"
    reviewDigits = re.findall(r'\d+', reviewText)
    reviewWords = re.findall(r'\w+', reviewText)
    reviewSplit = re.split(r'\s+', reviewText)
    reviewResult = (reviewDigits, reviewWords, reviewSplit)
    reviewResult
  exercise:
    prompt: 기본 패턴 복습 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      reviewText = "Hello World 123 Python3.9"
      reviewDigits = re.findall(r'\d+', reviewText)
      reviewWords = re.findall(r'\w+', reviewText)
      reviewSplit = re.split(r'\s+', reviewText)
      reviewResult = (reviewDigits, reviewWords, reviewSplit)
      reviewResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 기본 패턴 복습의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 기본 패턴 복습의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: groups_basic
  title: 그룹 기초
  structuredPrimary: true
  subtitle: 캡처 그룹으로 부분 추출
  goal: 그룹 기초에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: 괄호로 그룹을 만들면 매칭된 부분을 개별적으로 추출할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    dateStr = "2024-03-15"
    dateMatch = re.match(r'(\d{4})-(\d{2})-(\d{2})', dateStr)
    dateYear = dateMatch.group(1)
    dateMonth = dateMatch.group(2)
    dateDay = dateMatch.group(3)
    dateAll = dateMatch.groups()
    dateResult = (dateYear, dateMonth, dateDay, dateAll)
    dateResult
  exercise:
    prompt: 그룹 기초 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      dateStr = "2024-03-15"
      dateMatch = re.match(r'(\d{4})-(\d{2})-(\d{2})', dateStr)
      dateYear = dateMatch.group(1)
      dateMonth = dateMatch.group(2)
      dateDay = dateMatch.group(3)
      dateAll = dateMatch.groups()
      dateResult = (dateYear, dateMonth, dateDay, dateAll)
      dateResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 그룹 기초의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 그룹 기초의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: lookahead
  title: 룩어헤드
  structuredPrimary: true
  subtitle: 전방 탐색으로 조건부 매칭
  goal: 룩어헤드에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: '(?=...) 긍정 룩어헤드: 뒤에 패턴이 있어야 매칭. (?!...) 부정 룩어헤드: 뒤에 패턴이 없어야 매칭.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    laText = "foo123 bar456 foo789"
    laPattern = r'\w+(?=\d{3})'
    laFound = re.findall(laPattern, laText)
    laResult = laFound
    laResult
  exercise:
    prompt: 룩어헤드 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      laText = "foo123 bar456 foo789"
      laPattern = r'\w+(?=\d{3})'
      laFound = re.findall(laPattern, laText)
      laResult = laFound
      laResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 룩어헤드의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 룩어헤드의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: lookbehind
  title: 룩비하인드
  structuredPrimary: true
  subtitle: 후방 탐색으로 조건부 매칭
  goal: 룩비하인드에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: '(?<=...) 긍정 룩비하인드: 앞에 패턴이 있어야 매칭. (?<!...) 부정 룩비하인드: 앞에 패턴이 없어야 매칭.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    lbText = "Price: $100 and €50"
    lbDollar = re.findall(r'(?<=\$)\d+', lbText)
    lbEuro = re.findall(r'(?<=€)\d+', lbText)
    lbResult = (lbDollar, lbEuro)
    lbResult
  exercise:
    prompt: 룩비하인드 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      lbText = "Price: $100 and €50"
      lbDollar = re.findall(r'(?<=\$)\d+', lbText)
      lbEuro = re.findall(r'(?<=€)\d+', lbText)
      lbResult = (lbDollar, lbEuro)
      lbResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 룩비하인드의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 룩비하인드의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: backreference
  title: 백레퍼런스
  structuredPrimary: true
  subtitle: 캡처한 그룹을 다시 참조
  goal: 백레퍼런스에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: \1, \2 등으로 앞서 캡처한 그룹을 다시 매칭에 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    dupText = "hello hello world world world"
    dupPattern = r'\b(\w+)\s+\1\b'
    dupFound = re.findall(dupPattern, dupText)
    dupResult = dupFound
    dupResult
  exercise:
    prompt: 백레퍼런스 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      dupText = "hello hello world world world"
      dupPattern = r'\b(\w+)\s+\1\b'
      dupFound = re.findall(dupPattern, dupText)
      dupResult = dupFound
      dupResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 백레퍼런스의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 백레퍼런스의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: non_capture
  title: 비캡처 그룹
  structuredPrimary: true
  subtitle: 그룹화만 하고 캡처하지 않음
  goal: 비캡처 그룹에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: '(?:...) 비캡처 그룹: 그룹화는 하지만 결과에 포함되지 않습니다. 성능과 가독성 향상.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    ncText = "foobar foobaz"
    ncCapture = re.findall(r'(foo)(bar|baz)', ncText)
    ncNonCapture = re.findall(r'(?:foo)(bar|baz)', ncText)
    ncResult = (ncCapture, ncNonCapture)
    ncResult
  exercise:
    prompt: 비캡처 그룹 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      ncText = "foobar foobaz"
      ncCapture = re.findall(r'(foo)(bar|baz)', ncText)
      ncNonCapture = re.findall(r'(?:foo)(bar|baz)', ncText)
      ncResult = (ncCapture, ncNonCapture)
      ncResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 비캡처 그룹의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 비캡처 그룹의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: flags
  title: 플래그
  structuredPrimary: true
  subtitle: 매칭 동작 변경
  goal: 플래그에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: (?i) 대소문자 무시, (?m) 멀티라인, (?s) 점이 줄바꿈도 매칭, (?x) 확장 모드
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    flagText = "HELLO hello HeLLo"
    flagCaseInsensitive = re.findall(r'(?i)hello', flagText)
    flagMultiText = "start line1\nstart line2"
    flagMultiline = re.findall(r'(?m)^start', flagMultiText)
    flagResult = (flagCaseInsensitive, flagMultiline)
    flagResult
  exercise:
    prompt: 플래그 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      flagText = "HELLO hello HeLLo"
      flagCaseInsensitive = re.findall(r'(?i)hello', flagText)
      flagMultiText = "start line1\nstart line2"
      flagMultiline = re.findall(r'(?m)^start', flagMultiText)
      flagResult = (flagCaseInsensitive, flagMultiline)
      flagResult
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 플래그의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 플래그의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: substitution
  title: 치환
  structuredPrimary: true
  subtitle: 패턴 기반 문자열 변환
  goal: 치환에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: re.sub()로 패턴에 매칭되는 부분을 치환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    subText = "cat dog cat bird"
    subReplaced = re.sub(r'cat|dog', 'animal', subText)
    subHtml = "<b>bold</b> and <i>italic</i>"
    subStripped = re.sub(r'<[^>]+>', '', subHtml)
    subResult = (subReplaced, subStripped)
    subResult
  exercise:
    prompt: 치환 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      import re

      subText = "cat dog cat bird"
      subReplaced = re.sub(r'cat|dog', 'animal', subText)
      subHtml = "<b>bold</b> and <i>italic</i>"
