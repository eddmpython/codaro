          r"order=(?P<orderId>O-\d+) "
          r"status=(?P<status>paid|failed|draft) "
          r"amount=(?P<amount>\d+)"
      )

      def parseOrderLog(line):
          match = logPattern.fullmatch(line)
          if match is None:
              raise ValueError("invalid order log")
          data = match.groupdict()
          data["amount"] = int(data["amount"])
          return data

      line = "2026-05-24T09:30 INFO service=checkout order=O-100 status=paid amount=12000"
