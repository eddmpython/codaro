  goal: 종합 연습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: Day 25에서 배운 고급 정규표현식을 난이도별로 복습합니다. 룩어헤드와 룩비하인드는 패턴의 앞뒤 문맥을 검사하는 강력한 도구입니다. 그룹과 백레퍼런스는 복잡한
    텍스트 파싱과 치환에 필수적이며, 명명된 그룹은 가독성을 높입니다. 🟢 기본 문제로 이메일, 전화번호 등 실용적인 검증 패턴을 작성하고, 🟡 응용 문제로 룩어라운드와 조건부 매칭을
    연습하세요. 🔴 심화 문제에서는 프로그래밍 언어 토크나이저, 로그 파서 등 복잡한 파싱기를 직접 구현해봅니다. 정규표현식 숙달은 텍스트 처리 생산성을 10배 이상 높여줍니다.
  tips:
