      def logMethod(func):
          @wraps(func)
          def wrapper(self, *args, **kwargs):
              result = func(self, *args, **kwargs)
              return result
          return wrapper

      class Calculator:
          @logMethod
          def add(self, a, b):
              return a + b

      calc = Calculator()
      calc.add(3, 5)
