  retrievalVariants:
  - id: 35_concurrency-tool-choice-retrieval
    mode: retrieval
    unseen: true
    sourceSectionIds:
    - 35_concurrency-critical-section-transfer
    title: 동시성 도구 선택 기준 회상하기
    subtitle: concurrency tool recall
    goal: choose_concurrency_tool(need)를 완성해 작업 성격별 도구와 주의점을 반환한다.
    why: 동시성은 성능 개선 도구이면서 동시에 버그 증폭기입니다. IO, CPU, 공유 상태, 완료 순서, 직렬화 제약을 구분하는 판단이 학습의 핵심입니다.
    explanation: io-wait, cpu-bound, shared-counter, many-small-io, completed-order, pickleable-cpu-work 상황별 도구를 선택하세요.
    tips:
    - ThreadPoolExecutor는 IO 대기 숨기기에, ProcessPoolExecutor는 CPU 작업 병렬화에 더 적합합니다.
    - as_completed는 제출 순서가 아니라 완료 순서로 결과를 줍니다.
    exercise:
      prompt: choose_concurrency_tool(need)를 완성해 tool, useWhen, caution을 반환하세요.
      starterCode: |-
        def choose_concurrency_tool(need):
            raise NotImplementedError
      solution: |-
        def choose_concurrency_tool(need):
            table = {
                "io-wait": {
                    "tool": "threading-or-thread-pool",
                    "useWhen": "tasks mostly wait for network or disk",
                    "caution": "shared state still needs protection",
                },
                "cpu-bound": {
                    "tool": "process-pool",
                    "useWhen": "pure Python CPU work should bypass the GIL",
                    "caution": "functions and data must be pickleable",
                },
                "shared-counter": {
                    "tool": "Lock",
                    "useWhen": "multiple threads update one mutable value",
                    "caution": "keep critical sections small",
                },
                "many-small-io": {
                    "tool": "ThreadPoolExecutor",
                    "useWhen": "many blocking IO calls share one simple interface",
                    "caution": "limit max_workers to avoid overload",
                },
                "completed-order": {
                    "tool": "as_completed",
                    "useWhen": "results should be handled as soon as each future finishes",
                    "caution": "output order differs from submit order",
                },
                "pickleable-cpu-work": {
                    "tool": "ProcessPoolExecutor",
                    "useWhen": "top-level CPU functions can run in child processes",
                    "caution": "startup and IPC cost can dominate small jobs",
                },
            }
            if need not in table:
                raise ValueError("unknown concurrency need")
            return table[need]
      hints:
      - 먼저 병목이 IO 대기인지 CPU 계산인지 나누세요.
      - 공유 상태가 있으면 성능보다 정합성 보호가 먼저입니다.
    check:
      id: python.advanced.concurrency.tool-choice.retrieval.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.advanced.concurrency.empty.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
        directories:
        - input
        - output
        env:
          LANG: C.UTF-8
          TZ: UTC
        files: []
        stdin: []
      packageAssets: []
      payload:
        entry: choose_concurrency_tool
