          arguments:
          - value:
            - worker: A
              delta: 2
            - worker: B
              delta: 3
            - worker: A
              delta: -1
          expectedReturn:
            final: 4
            log:
            - A:0->2
            - B:2->5
            - A:5->4
        - id: rejects-non-integer-delta
          arguments:
