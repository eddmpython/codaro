  transferVariants:
  - id: 35_concurrency-critical-section-transfer
    mode: transfer
    unseen: true
    sourceSectionIds:
    - thread-basic
    - lock-race
    - thread-pool
    title: 공유 카운터 갱신을 critical section으로 모델링하기
    subtitle: lock contract transfer
    goal: simulate_locked_counter(operations)를 완성해 각 작업의 before와 after를 순서대로 기록하고 최종 값을 반환한다.
    why: 실제 race condition은 재현이 흔들릴 수 있으므로, 학습 단계에서는 lock이 보장해야 하는 원자적 갱신 계약을 결정적으로 검증합니다.
    explanation: 각 operation은 worker와 delta를 가집니다. delta는 int여야 하고, counter는 0에서 시작해 순서대로 갱신됩니다.
    tips:
    - critical section 안에서는 before를 읽고 after를 기록하는 사이에 다른 갱신이 끼어들면 안 됩니다.
    - 이 함수는 실제 thread 대신 lock이 보장해야 할 결과 모델을 검사합니다.
    exercise:
      prompt: simulate_locked_counter(operations)를 완성해 final과 log를 반환하세요.
      starterCode: |-
        def simulate_locked_counter(operations):
            raise NotImplementedError
      solution: |-
        def simulate_locked_counter(operations):
            counter = 0
            log = []
            for operation in operations:
                delta = operation["delta"]
                if not isinstance(delta, int):
                    raise TypeError("delta must be int")
                before = counter
                counter = before + delta
                log.append(f"{operation['worker']}:{before}->{counter}")
            return {"final": counter, "log": log}
      hints:
      - before와 after를 한 묶음으로 기록해야 갱신 순서가 보입니다.
      - delta가 숫자가 아니면 TypeError로 막으세요.
    check:
      id: python.advanced.concurrency.critical-section.transfer.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.advanced.concurrency.empty.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
        directories:
        - input
        - output
        env:
          LANG: C.UTF-8
          TZ: UTC
        files: []
        stdin: []
      packageAssets: []
      payload:
        entry: simulate_locked_counter
        cases:
