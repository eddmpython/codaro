- id: workflow_validation
  title: '현업 흐름 검증: functools로 리포트 유틸리티 구성하기'
  structuredPrimary: true
  subtitle: partial → cache → singledispatch → ordering 검증
  goal: '현업 흐름 검증: functools로 리포트 유틸리티 구성하기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    functools는 작은 함수형 도구를 실무 유틸리티로 묶을 때 유용합니다. 인자 고정, 캐싱, 타입별 포맷팅, 정렬 가능한 객체를 하나의 리포트 흐름에서 검증합니다.

    변주 실험
    `renderValue`에 list 렌더러를 추가하고, dict 안에 list가 들어가도 원하는 문자열로 렌더링되는지 assert를 추가하세요.
  tips:
  - 변주 실험 `renderValue`에 list 렌더러를 추가하고, dict 안에 list가 들어가도 원하는 문자열로 렌더링되는지 assert를 추가하세요.
  snippet: |-
    from functools import lru_cache, partial, singledispatch, total_ordering

    def formatCurrency(value, currency):
        return f"{currency}{value:,}"

    won = partial(formatCurrency, currency="₩")

    @lru_cache(maxsize=4)
    def taxIncluded(price, taxRate):
        return int(price * (1 + taxRate))

    @singledispatch
    def renderValue(value):
        return str(value)

    @renderValue.register
    def _(value: int):
        return won(value)

    @renderValue.register
    def _(value: dict):
        return ", ".join(f"{key}={renderValue(item)}" for key, item in sorted(value.items()))

    @total_ordering
    class ReportItem:
        def __init__(self, name, priority):
            self.name = name
            self.priority = priority

        def __eq__(self, other):
            return self.priority == other.priority

        def __lt__(self, other):
            return self.priority < other.priority

        def __repr__(self):
            return f"ReportItem({self.name!r}, {self.priority})"

    report = {
        "gross": taxIncluded(100000, 0.1),
        "net": 100000,
    }
    items = [ReportItem("later", 3), ReportItem("first", 1), ReportItem("middle", 2)]

    assert won(120000) == "₩120,000"
    assert taxIncluded(100000, 0.1) == 110000
    assert taxIncluded.cache_info().hits >= 0
    assert renderValue(report) == "gross=₩110,000, net=₩100,000"
    assert [item.name for item in sorted(items)] == ["first", "middle", "later"]

    try:
        taxIncluded([100000], 0.1)
    except TypeError as exc:
        assert "unhashable" in str(exc)

    print("functools 리포트 유틸리티 통과")
