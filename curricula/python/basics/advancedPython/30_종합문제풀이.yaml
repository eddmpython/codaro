          def handle(self, machine, event):
              pass

      class IdleState(MachineState):
          def handle(self, machine, event):
              if event == "start":
                  machine.transition(RunningState())
                  return "started"
              return "idle"

      class RunningState(MachineState):
          def handle(self, machine, event):
              if event == "pause":
                  machine.transition(PausedState())
                  return "paused"
              if event == "stop":
                  machine.transition(IdleState())
                  return "stopped"
              return "running"

      class PausedState(MachineState):
          def handle(self, machine, event):
              if event == "resume":
                  machine.transition(RunningState())
                  return "resumed"
              if event == "stop":
                  machine.transition(IdleState())
                  return "stopped"
              return "paused"

      class StateMachine:
          def __init__(self):
