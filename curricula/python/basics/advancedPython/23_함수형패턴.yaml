          {"id": "O-2", "status": "DRAFT", "amount": "8000"},
          {"id": "O-3", "status": "PAID", "amount": "5000"},
      ]

      summary = pipe(rawEvents, normalize, onlyPaid, summarize)

      assert summary == {"count": 2, "amount": 17000, "ids": ["O-1", "O-3"]}
