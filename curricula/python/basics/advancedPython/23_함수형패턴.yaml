- id: workflow_validation
  title: '현업 흐름 검증: 주문 이벤트 함수형 파이프라인'
  structuredPrimary: true
  subtitle: 순수 함수, 합성, 불변 입력, 오류 값을 함께 확인합니다
  goal: '현업 흐름 검증: 주문 이벤트 함수형 파이프라인에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    함수형 패턴은 어렵게 보이는 문법보다 데이터 흐름을 예측하기 쉬워지는지가 핵심입니다. 주문 이벤트를 정규화하고, 결제 완료 건만 골라 합계를 내는 과정을 순수 함수로 분리해보세요.

    변주 실험
    `onlyPaid` 대신 `amount`가 10,000 이상인 주문만 고르는 함수를 추가하고, 파이프라인 순서를 바꿨을 때 결과가 어떻게 달라지는지 확인하세요.
  tips:
  - 변주 실험 `onlyPaid` 대신 `amount`가 10,000 이상인 주문만 고르는 함수를 추가하고, 파이프라인 순서를 바꿨을 때 결과가 어떻게 달라지는지 확인하세요.
  snippet: |-
    from functools import reduce

    def pipe(value, *functions):
        return reduce(lambda current, function: function(current), functions, value)

    def normalize(events):
        return [
            {**event, "status": event["status"].lower(), "amount": int(event["amount"])}
            for event in events
        ]

    def onlyPaid(events):
        return [event for event in events if event["status"] == "paid"]

    def summarize(events):
        return {
            "count": len(events),
            "amount": sum(event["amount"] for event in events),
            "ids": [event["id"] for event in events],
        }

    rawEvents = [
        {"id": "O-1", "status": "PAID", "amount": "12000"},
        {"id": "O-2", "status": "DRAFT", "amount": "8000"},
        {"id": "O-3", "status": "PAID", "amount": "5000"},
    ]

    summary = pipe(rawEvents, normalize, onlyPaid, summarize)

    assert summary == {"count": 2, "amount": 17000, "ids": ["O-1", "O-3"]}
    assert rawEvents[0]["status"] == "PAID"
  exercise:
    prompt: '현업 흐름 검증: 주문 이벤트 함수형 파이프라인 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
