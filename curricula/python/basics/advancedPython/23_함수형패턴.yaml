    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 고차 함수의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 고차 함수 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: currying
  title: 커링과 부분 적용
  structuredPrimary: true
  subtitle: 함수 인자 분리
  goal: 커링과 부분 적용에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 커링은 여러 인자를 받는 함수를 단일 인자 함수들의 체인으로 변환합니다. 부분 적용은 일부 인자를 미리 고정한 새 함수를 만듭니다. functools.partial로
    쉽게 부분 적용을 구현합니다. 함수 재사용성을 높이고 특화된 함수를 쉽게 생성합니다. 함수형 프로그래밍의 핵심 기법입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def curry2(fn):
        def curried(a):
            def inner(b):
                return fn(a, b)
            return inner
        return curried

    def curry3(fn):
        def curried(a):
            def inner1(b):
                def inner2(c):
                    return fn(a, b, c)
                return inner2
            return inner1
        return curried

    @curry2
    def addTwo(a, b):
        return a + b

    @curry3
    def addThree(a, b, c):
        return a + b + c

    add5 = addTwo(5)
    curryResult1 = add5(3)
    curryResult2 = addThree(1)(2)(3)
    curryResults = (curryResult1, curryResult2)
    curryResults
  exercise:
    prompt: 커링과 부분 적용 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def curry2(fn):
          def curried(a):
              def inner(b):
                  return fn(a, b)
              return inner
          return curried

      def curry3(fn):
          def curried(a):
              def inner1(b):
                  def inner2(c):
                      return fn(a, b, c)
                  return inner2
              return inner1
          return curried

      @curry2
      def addTwo(a, b):
          return a + b

      @curry3
      def addThree(a, b, c):
          return a + b + c

      add5 = addTwo(5)
      curryResult1 = add5(3)
      curryResult2 = addThree(1)(2)(3)
      curryResults = (curryResult1, curryResult2)
      curryResults
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 커링과 부분 적용의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 커링과 부분 적용 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: composition
  title: 함수 합성
  structuredPrimary: true
  subtitle: 함수 조합
  goal: 함수 합성에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수 합성은 여러 함수를 조합하여 새로운 함수를 생성합니다. compose는 오른쪽에서 왼쪽으로, pipe는 왼쪽에서 오른쪽으로 실행합니다. reduce를
    활용하여 함수 체인을 구현합니다. 데이터 변환 파이프라인을 선언적으로 표현합니다. 코드 가독성과 재사용성이 향상됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from functools import reduce

    def composeAll(*funcs):
        def composed(x):
            return reduce(lambda acc, fn: fn(acc), reversed(funcs), x)
        return composed

    def pipeAll(*funcs):
        def piped(x):
            return reduce(lambda acc, fn: fn(acc), funcs, x)
        return piped

    trim = str.strip
    upper = str.upper
    addExclaim = lambda s: s + "!"

    processText = pipeAll(trim, upper, addExclaim)
    processResult = processText("  hello world  ")

    negate = lambda x: -x
    absolute = abs
    doubleNum = lambda x: x * 2

    processNum = composeAll(doubleNum, absolute, negate)
    numResult = processNum(-5)
    composeAllResults = (processResult, numResult)
    composeAllResults
  exercise:
    prompt: 함수 합성 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      from functools import reduce

      def composeAll(*funcs):
          def composed(x):
              return reduce(lambda acc, fn: fn(acc), reversed(funcs), x)
          return composed

      def pipeAll(*funcs):
          def piped(x):
              return reduce(lambda acc, fn: fn(acc), funcs, x)
          return piped

      trim = str.strip
      upper = str.upper
      addExclaim = lambda s: s + "!"

      processText = pipeAll(trim, upper, addExclaim)
      processResult = processText("  hello world  ")

      negate = lambda x: -x
      absolute = abs
      doubleNum = lambda x: x * 2

      processNum = composeAll(doubleNum, absolute, negate)
      numResult = processNum(-5)
      composeAllResults = (processResult, numResult)
      composeAllResults
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 함수 합성의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 함수 합성 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: monad
  title: 펑터와 모나드
  structuredPrimary: true
  subtitle: 컨텍스트 내 값 변환
  goal: 펑터와 모나드에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 모나드는 값을 감싸고 변환하는 컨테이너 패턴입니다. Maybe 모나드는 null 안전한 연산을 제공합니다. Either 모나드는 성공/실패를 명시적으로 표현합니다.
    map은 값을 변환하고, flatMap은 중첩된 모나드를 평탄화합니다. 에러 처리를 우아하게 체이닝할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Maybe:
        def __init__(self, value):
            self._value = value

        @staticmethod
        def just(value):
            return Maybe(value)

        @staticmethod
        def nothing():
            return Maybe(None)

        def isNothing(self):
            return self._value is None

        def map(self, fn):
            if self.isNothing():
                return Maybe.nothing()
            return Maybe.just(fn(self._value))

        def flatMap(self, fn):
            if self.isNothing():
                return Maybe.nothing()
            return fn(self._value)

        def getOrElse(self, default):
            return default if self.isNothing() else self._value

    def safeDivide(a, b):
        if b == 0:
            return Maybe.nothing()
        return Maybe.just(a / b)

    maybeResult1 = Maybe.just(10).map(lambda x: x * 2).map(lambda x: x + 5)
    maybeResult2 = Maybe.nothing().map(lambda x: x * 2)
    maybeResult3 = Maybe.just(10).flatMap(lambda x: safeDivide(x, 2))
    maybeResult4 = Maybe.just(10).flatMap(lambda x: safeDivide(x, 0))
    maybeResults = (maybeResult1.getOrElse(0), maybeResult2.getOrElse(0), maybeResult3.getOrElse(0), maybeResult4.getOrElse(0))
    maybeResults
  exercise:
    prompt: 펑터와 모나드 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
