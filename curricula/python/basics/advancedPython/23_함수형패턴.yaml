- id: utilities
  title: 함수형 유틸리티
  structuredPrimary: true
  subtitle: 실용적 헬퍼
  goal: 함수형 유틸리티에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수형 프로그래밍에서 자주 사용하는 유틸리티 함수들입니다. identity는 입력을 그대로 반환합니다. constant는 항상 같은 값을 반환하는 함수를 만듭니다.
    memoize는 함수 결과를 캐싱합니다. head, tail, take, drop 등 리스트 유틸리티도 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def identity(x):
        return x

    def constant(x):
        return lambda _: x

    def flip(fn):
        return lambda a, b: fn(b, a)

    def memoize(fn):
        cache = {}
        def memoized(*args):
            if args not in cache:
                cache[args] = fn(*args)
            return cache[args]
        return memoized

    @memoize
    def fibonacci(n):
        if n <= 1:
            return n
        return fibonacci(n - 1) + fibonacci(n - 2)

    identityResult = identity(42)
    alwaysFive = constant(5)
    constantResult = alwaysFive("anything")
    subtract = lambda a, b: a - b
    flippedSub = flip(subtract)
    flipResult = (subtract(10, 3), flippedSub(10, 3))
    fibResult = fibonacci(30)
    utilResults = (identityResult, constantResult, flipResult, fibResult)
    utilResults
  exercise:
