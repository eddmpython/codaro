sections:
- id: pure_function
  title: 순수 함수와 불변성
  structuredPrimary: true
  subtitle: 부작용 없는 함수
  goal: 순수 함수와 불변성에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    순수 함수는 동일한 입력에 항상 동일한 출력을 반환하고 외부 상태를 변경하지 않습니다. 불변성은 데이터를 변경하지 않고 새로운 데이터를 생성합니다. 순수 함수는 테스트가 쉽고 병렬 처리에 안전합니다. 디버깅이 쉽고 예측 가능한 코드를 작성할 수 있습니다. 파이썬에서는 deepcopy를 활용하여 불변성을 구현합니다.

    불변성을 유지하면 버그를 줄이고 상태 추적이 쉬워집니다.
  snippet: |-
    def pureAdd(a, b):
        return a + b

    def pureMultiply(nums, factor):
        return [n * factor for n in nums]

    def pureFilter(nums, predicate):
        return [n for n in nums if predicate(n)]

    addResult = pureAdd(3, 5)
    mulResult = pureMultiply([1, 2, 3], 2)
    filterResult = pureFilter([1, 2, 3, 4, 5], lambda x: x % 2 == 0)
    pureResults = (addResult, mulResult, filterResult)
    pureResults
  exercise:
    prompt: 순수 함수와 불변성 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def pureAdd(a, b):
          return a + b

      def pureMultiply(nums, factor):
          return [n * factor for n in nums]

      def pureFilter(nums, predicate):
          return [n for n in nums if predicate(n)]

      addResult = pureAdd(3, 5)
      mulResult = pureMultiply([1, 2, 3], 2)
      filterResult = pureFilter([1, 2, 3, 4, 5], lambda x: x % 2 == 0)
      pureResults = (addResult, mulResult, filterResult)
      pureResults
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 순수 함수와 불변성의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 순수 함수와 불변성 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: higher_order
  title: 고차 함수
  structuredPrimary: true
  subtitle: 함수를 다루는 함수
  goal: 고차 함수에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 고차 함수는 함수를 인자로 받거나 함수를 반환하는 함수입니다. map, filter, reduce가 대표적인 고차 함수입니다. 함수 합성과 파이프라인을 구성할
    수 있습니다. 클로저를 활용하여 함수 팩토리를 만들 수 있습니다. 코드 재사용성과 추상화 수준을 높입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def applyTwice(fn, x):
        return fn(fn(x))

    def compose(f, g):
        return lambda x: f(g(x))

    def pipe(*functions):
        def piped(value):
            result = value
            for fn in functions:
                result = fn(result)
            return result
        return piped

    double = lambda x: x * 2
    addOne = lambda x: x + 1

    twiceResult = applyTwice(double, 3)
    composed = compose(double, addOne)
    composeResult = composed(5)
    piped = pipe(addOne, double, addOne)
    pipeResult = piped(3)
    higherOrderResults = (twiceResult, composeResult, pipeResult)
    higherOrderResults
  exercise:
    prompt: 고차 함수 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
