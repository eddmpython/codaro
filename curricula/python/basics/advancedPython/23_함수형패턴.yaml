          def __init__(self, value):
              self._value = value

          @staticmethod
          def just(value):
              return Maybe(value)

          @staticmethod
          def nothing():
              return Maybe(None)

          def isNothing(self):
              return self._value is None

          def map(self, fn):
              if self.isNothing():
                  return Maybe.nothing()
              return Maybe.just(fn(self._value))

          def flatMap(self, fn):
              if self.isNothing():
                  return Maybe.nothing()
              return fn(self._value)

          def getOrElse(self, default):
              return default if self.isNothing() else self._value

      def safeDivide(a, b):
          if b == 0:
              return Maybe.nothing()
          return Maybe.just(a / b)

      maybeResult1 = Maybe.just(10).map(lambda x: x * 2).map(lambda x: x + 5)
      maybeResult2 = Maybe.nothing().map(lambda x: x * 2)
      maybeResult3 = Maybe.just(10).flatMap(lambda x: safeDivide(x, 2))
      maybeResult4 = Maybe.just(10).flatMap(lambda x: safeDivide(x, 0))
      maybeResults = (maybeResult1.getOrElse(0), maybeResult2.getOrElse(0), maybeResult3.getOrElse(0), maybeResult4.getOrElse(0))
      maybeResults
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 펑터와 모나드의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 펑터와 모나드 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: utilities
  title: 함수형 유틸리티
  structuredPrimary: true
  subtitle: 실용적 헬퍼
  goal: 함수형 유틸리티에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수형 프로그래밍에서 자주 사용하는 유틸리티 함수들입니다. identity는 입력을 그대로 반환합니다. constant는 항상 같은 값을 반환하는 함수를 만듭니다.
    memoize는 함수 결과를 캐싱합니다. head, tail, take, drop 등 리스트 유틸리티도 유용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def identity(x):
        return x

    def constant(x):
        return lambda _: x

    def flip(fn):
        return lambda a, b: fn(b, a)

    def memoize(fn):
        cache = {}
        def memoized(*args):
            if args not in cache:
                cache[args] = fn(*args)
            return cache[args]
        return memoized

    @memoize
    def fibonacci(n):
        if n <= 1:
            return n
        return fibonacci(n - 1) + fibonacci(n - 2)

    identityResult = identity(42)
    alwaysFive = constant(5)
    constantResult = alwaysFive("anything")
    subtract = lambda a, b: a - b
    flippedSub = flip(subtract)
    flipResult = (subtract(10, 3), flippedSub(10, 3))
    fibResult = fibonacci(30)
    utilResults = (identityResult, constantResult, flipResult, fibResult)
    utilResults
  exercise:
