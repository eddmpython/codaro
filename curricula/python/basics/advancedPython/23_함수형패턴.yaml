- id: practice
  title: 종합 연습
  structuredPrimary: true
  subtitle: 함수형 패턴 마스터
  goal: 종합 연습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: Day 23에서 배운 함수형 프로그래밍 패턴을 종합적으로 연습합니다. 순수 함수와 불변성은 부작용을 최소화하고, 커링과 부분 적용은 함수 재사용성을 극대화합니다.
    함수 합성과 파이프라인은 데이터 변환을 선언적으로 표현하는 강력한 도구입니다. 🟢 기본 문제로 map/filter/reduce와 고차 함수의 직접 구현을 익히고, 🟡 응용 문제로
    커링, 합성 패턴을 연습하세요. 🔴 심화 문제에서는 Maybe, Either 모나드와 함수형 에러 처리를 직접 구현해봅니다. 함수형 패턴은 React, Redux 등 현대 프레임워크의
    기반이므로 반드시 숙달해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def myMap(fn, iterable):
        return [fn(x) for x in iterable]

    def myFilter(predicate, iterable):
        return [x for x in iterable if predicate(x)]

    def myReduce(fn, iterable, initial):
        acc = initial
        for x in iterable:
            acc = fn(acc, x)
        return acc

    mapTest = myMap(lambda x: x ** 2, [1, 2, 3, 4])
    filterTest = myFilter(lambda x: x > 2, [1, 2, 3, 4])
    reduceTest = myReduce(lambda a, b: a + b, [1, 2, 3, 4], 0)
    ex1Result = (mapTest, filterTest, reduceTest)
    ex1Result
  exercise:
