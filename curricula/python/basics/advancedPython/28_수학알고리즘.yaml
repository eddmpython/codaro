- id: modular
  title: 모듈러 연산
  structuredPrimary: true
  subtitle: 빠른 거듭제곱
  goal: 모듈러 연산에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 큰 수의 거듭제곱을 효율적으로 계산. O(log n).
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def modPow(base, exp, mod):
        result = 1
        base = base % mod
        while exp > 0:
            if exp % 2 == 1:
                result = (result * base) % mod
            exp = exp >> 1
            base = (base * base) % mod
        return result

    MOD = 1000000007
    mpResult = modPow(2, 100, MOD)
    mpResult
  exercise:
    prompt: 모듈러 연산 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def modPow(base, exp, mod):
          result = 1
          base = base % mod
          while exp > 0:
              if exp % 2 == 1:
                  result = (result * base) % mod
              exp = exp >> 1
              base = (base * base) % mod
          return result

      MOD = 1000000007
      mpResult = modPow(2, 100, MOD)
      mpResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
