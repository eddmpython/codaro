    def isPerfect(n):
        if n < 2:
            return False
        divSum = 1
        i = 2
        while i * i <= n:
            if n % i == 0:
                divSum += i
                if i != n // i:
                    divSum += n // i
            i += 1
        return divSum == n

    ex1Result = [n for n in range(1, 1000) if isPerfect(n)]
    ex1Result
