- id: matrix
  title: 행렬 연산
  structuredPrimary: true
  subtitle: 행렬 곱셈과 거듭제곱
  goal: 행렬 연산에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 행렬 거듭제곱으로 피보나치를 O(log n)에 계산합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def matMul(a, b):
        rows = len(a)
        cols = len(b[0])
        inner = len(b)
        result = [[0] * cols for _ in range(rows)]
        for i in range(rows):
            for j in range(cols):
                for k in range(inner):
                    result[i][j] += a[i][k] * b[k][j]
        return result

    matA = [[1, 2], [3, 4]]
    matB = [[5, 6], [7, 8]]
    matMulResult = matMul(matA, matB)
    matMulResult
  exercise:
    prompt: 행렬 연산 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def matMul(a, b):
          rows = len(a)
          cols = len(b[0])
          inner = len(b)
          result = [[0] * cols for _ in range(rows)]
          for i in range(rows):
              for j in range(cols):
                  for k in range(inner):
                      result[i][j] += a[i][k] * b[k][j]
          return result

      matA = [[1, 2], [3, 4]]
      matB = [[5, 6], [7, 8]]
      matMulResult = matMul(matA, matB)
      matMulResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
