- id: practice
  title: 종합 복습
  structuredPrimary: true
  subtitle: 정렬 알고리즘 마스터하기
  goal: 종합 복습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: Day 17에서 배운 정렬 알고리즘을 난이도별로 복습합니다. 정렬은 데이터를 특정 순서로 배열하는 기본적이면서 중요한 알고리즘으로, 시간복잡도와 공간복잡도의
    트레이드오프를 이해하는 핵심 주제입니다. O(n²) 알고리즘(버블, 선택, 삽입)과 O(n log n) 알고리즘(병합, 퀵)의 차이를 체감해보세요. 🟢 기본 문제로 버블, 선택,
    삽입 정렬을 구현하고, 🟡 응용 문제로 병합 정렬과 퀵 정렬을 연습하세요. 🔴 심화 문제에서는 안정 정렬, 키 함수 정렬, 복합 정렬 조건 등 실무 패턴을 다룹니다. 실무에서는
    대부분 내장 sorted()를 사용하지만, 원리를 알면 최적화 판단에 도움이 됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def bubble(arr):
        n = len(arr)
        for i in range(n):
            for j in range(n - 1 - i):
                if arr[j] > arr[j+1]:
                    arr[j], arr[j+1] = arr[j+1], arr[j]
        return arr

    bubble([5, 3, 8, 4, 2])
  exercise:
    prompt: 종합 복습 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def bubble(arr):
          n = len(arr)
          for i in range(n):
              for j in range(n - 1 - i):
                  if arr[j] > arr[j+1]:
                      arr[j], arr[j+1] = arr[j+1], arr[j]
          return arr

      bubble([5, 3, 8, 4, 2])
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 종합 복습의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 종합 복습 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
