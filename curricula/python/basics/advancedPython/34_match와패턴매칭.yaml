intro:
  emoji: 🪢
  points:
  - 리터럴과 캡처로 단순 분기를 짧게 작성
  - 시퀀스/매핑 패턴으로 구조 분해
  - 클래스 패턴으로 객체 속성 매칭
  - guard 절로 추가 조건 표현
  - OR 패턴, wildcard, as 바인딩 활용
  direction: match와 패턴매칭에서 분기 조건을 if/elif 사슬 대신 구조 패턴으로 표현하고 가독성이 어떻게 달라지는지 확인합니다.
  benefits:
  - dict/tuple 구조 분해를 if 분기 없이 한 자리에서 처리합니다.
  - 클래스 인스턴스의 속성 매칭을 표준 문법으로 표현합니다.
  - guard와 OR 패턴으로 if 사슬에서 흩어지던 조건을 모읍니다.
  diagram:
    steps:
    - label: 패턴 매칭 입력 확인
      detail: subject(매칭 대상)와 각 case의 패턴 형태를 먼저 고정합니다.
    - label: case 우선순위 처리 실행
      detail: 위에서 아래로 첫 매치되는 case 본문이 실행됩니다.
    - label: 캡처 변수 결과 검증
      detail: 패턴 안 캡처 변수가 호출자 스코프에 노출되었는지 확인합니다.
    - label: 패턴 매칭 재사용
      detail: 메시지 파서, 응답 분기, AST 처리 같은 코드에 같은 패턴을 붙입니다.
    runtime:
    - label: Python 3.10+ 환경
      detail: 표준 문법으로 추가 패키지 없이 실행합니다.
    - label: match 실행
      detail: 셀을 실행해 case 별 캡처와 분기 흐름을 확인합니다.
    - label: match 완료
      detail: 검증된 코드를 분기 패턴 유틸리티로 남깁니다.
sections:
- id: literal-capture
  title: 리터럴과 캡처 패턴
  structuredPrimary: true
  subtitle: 가장 단순한 case 형태
  goal: 리터럴 패턴과 변수 캡처 패턴이 어떻게 다르게 동작하는지 확인합니다.
  why: match가 if/elif와 다른 첫 번째 지점이 바로 캡처입니다. 변수 이름은 자동으로 매칭되는 모든 값을 받아 본문에서 사용할 수 있게 합니다.
  explanation: 리터럴 패턴(숫자, 문자열, True/False/None)은 값이 정확히 같을 때만 매칭됩니다. 식별자 단독은 캡처 패턴으로 항상 매칭되며 매칭된 값을 같은 이름의 변수에 바인딩합니다. wildcard '_'는 매칭하되 캡처하지 않습니다.
  tips:
  - 캡처 패턴은 항상 모든 값을 받으므로 가장 마지막에 두는 것이 안전합니다.
  - 점이 있는 이름(Status.OK 같은)은 값 비교 패턴으로 해석됩니다.
  snippet: |-
    def classify(value):
        match value:
            case 0:
                return "zero"
            case 1 | 2 | 3:
                return "small"
            case n if n < 0:
                return f"negative:{n}"
            case _:
                return "other"

    [classify(value) for value in [-2, 0, 1, 3, 5, 10]]
  exercise:
    prompt: classify에 case "stop" 같은 문자열 리터럴 분기를 추가하고, 정수와 문자열 입력을 섞어 결과 리스트가 어떻게 나오는지 확인하세요.
    starterCode: |-
      def classify(value):
          match value:
              case 0:
                  return "zero"
              case "stop":
                  return "stop-token"
              case 1 | 2 | 3:
                  return "small"
              case int() as n if n < 0:
                  return f"negative:{n}"
              case _:
                  return "other"

      [classify(value) for value in [-2, 0, "stop", 1, 3, "skip", 10]]
    hints:
    - 리터럴 패턴은 값이 같을 때만 매칭됩니다.
    - 캡처 변수에 int() 타입 가드를 붙이면 문자열 입력은 자연스럽게 wildcard로 떨어집니다.
  check:
    type: noError
    noError: classify 정의와 case 분기가 NameError, SyntaxError 없이 실행되어야 합니다.
    resultCheck: 결과 리스트가 [negative:-2, zero, stop-token, small, small, other, other] 순서로 채워져야 합니다.
- id: sequence-pattern
  title: 시퀀스 패턴으로 구조 분해
  structuredPrimary: true
  subtitle: 리스트/튜플 분해를 case에서
  goal: 시퀀스 패턴으로 첫 항목과 나머지를 분리하거나 길이별 분기를 만듭니다.
  why: 튜플/리스트의 구조를 if isinstance + 인덱싱 조합으로 풀면 코드가 길어집니다. 시퀀스 패턴이 한 줄에 표현합니다.
  explanation: '[a, b, *rest] 같은 시퀀스 패턴은 리스트/튜플의 길이와 항목을 동시에 검사하고 캡처합니다. *rest는 0개 이상 항목을 받습니다. 빈 시퀀스는 [] 패턴으로 매칭합니다.'
  tips:
  - 시퀀스 패턴은 str을 매칭하지 않습니다. 문자열은 별도 case로 처리하세요.
  - '*_ 는 캡처 없이 나머지를 흡수합니다.'
  snippet: |-
    def summarize(items):
        match items:
            case []:
                return "empty"
            case [single]:
                return f"only:{single}"
            case [first, *rest] if len(rest) <= 2:
                return f"head:{first} rest:{rest}"
            case [first, *_, last]:
                return f"first:{first} last:{last}"
            case _:
                return "unknown"

    [summarize(seq) for seq in [[], [9], [1, 2], [1, 2, 3], [10, 20, 30, 40, 50]]]
  exercise:
    prompt: summarize에 정확히 두 항목인 case [a, b]를 추가해 결과가 [first:a second:b] 형태로 분기되도록 만들어 보세요.
    starterCode: |-
      def summarize(items):
          match items:
              case []:
                  return "empty"
              case [single]:
                  return f"only:{single}"
              case [first, second]:
                  return f"first:{first} second:{second}"
              case [first, *rest] if len(rest) <= 2:
                  return f"head:{first} rest:{rest}"
              case [first, *_, last]:
                  return f"first:{first} last:{last}"
              case _:
                  return "unknown"

      [summarize(seq) for seq in [[], [9], [1, 2], [1, 2, 3], [10, 20, 30, 40, 50]]]
    hints:
    - case 두 항목 패턴이 case [first, *rest]보다 위에 있어야 먼저 매칭됩니다.
    - case 순서가 결과를 바꿉니다.
  check:
    type: noError
    noError: summarize 정의와 시퀀스 패턴 분기가 NameError, SyntaxError 없이 실행되어야 합니다.
    resultCheck: 결과가 [empty, only:9, first:1 second:2, head:1 rest:[2, 3], first:10 last:50] 처럼 두 항목 case가 우선 매칭되어야 합니다.
- id: mapping-pattern
  title: 매핑 패턴과 JSON 분기
  structuredPrimary: true
  subtitle: dict 키 매칭과 값 캡처
  goal: dict 패턴으로 API 응답 같은 JSON 형태를 case별로 분기합니다.
  why: dict에 어떤 키가 있고 어떤 값이 들어 있는지 if 사슬로 검사하면 코드가 빠르게 길어집니다. 매핑 패턴이 그 흐름을 case로 정리합니다.
  explanation: '{ "key": pattern } 형태로 매핑 패턴을 만듭니다. 명시한 키만 매칭하면 매칭으로 보고 나머지 키는 무시합니다. **rest로 나머지 모든 항목을 캡처할 수 있습니다.'
  tips:
  - 키 자체는 리터럴이고, 값 자리에 패턴(리터럴/캡처/시퀀스/중첩 매핑)이 옵니다.
  - 키가 있어야 매칭이고, 키가 없으면 매칭 실패입니다(값이 None이라도).
  snippet: |-
    def routeMessage(message):
        match message:
            case {"type": "ping"}:
                return "pong"
            case {"type": "echo", "text": text}:
                return f"echo:{text}"
            case {"type": "error", "code": code, "detail": detail}:
                return f"error:{code}:{detail}"
            case {"type": kind, **rest}:
                return f"unknown:{kind} extra:{sorted(rest)}"
            case _:
                return "no match"

    samples = [
        {"type": "ping"},
        {"type": "echo", "text": "hi"},
        {"type": "error", "code": 500, "detail": "boom"},
        {"type": "user", "name": "alice"},
        ["not a dict"],
    ]
    [routeMessage(msg) for msg in samples]
  exercise:
    prompt: routeMessage에 case에서 echo의 text가 빈 문자열인 경우를 별도로 잡아 echo-empty를 돌려주도록 guard를 추가하세요.
    starterCode: |-
      def routeMessage(message):
          match message:
              case {"type": "ping"}:
                  return "pong"
              case {"type": "echo", "text": text} if not text:
                  return "echo-empty"
              case {"type": "echo", "text": text}:
                  return f"echo:{text}"
              case {"type": "error", "code": code, "detail": detail}:
                  return f"error:{code}:{detail}"
              case _:
                  return "no match"

      samples = [
          {"type": "ping"},
          {"type": "echo", "text": "hi"},
          {"type": "echo", "text": ""},
          {"type": "error", "code": 500, "detail": "boom"},
      ]
      [routeMessage(msg) for msg in samples]
    hints:
    - 더 좁은 case(빈 문자열)가 위에 있어야 먼저 매칭됩니다.
    - guard에는 not text나 len(text) == 0 둘 다 가능합니다.
  check:
    type: noError
    noError: routeMessage 정의와 매핑 패턴 분기가 NameError, SyntaxError 없이 실행되어야 합니다.
    resultCheck: 결과가 [pong, echo:hi, echo-empty, error:500:boom] 처럼 빈 문자열 분기가 echo 일반 분기보다 먼저 매칭되어야 합니다.
- id: class-pattern
  title: 클래스 패턴
  structuredPrimary: true
  subtitle: 객체 속성 매칭
  goal: dataclass나 일반 클래스의 인스턴스를 클래스 패턴으로 분기하고 속성을 캡처합니다.
  why: 타입 별 분기를 isinstance 사슬로 작성하면 속성 접근까지 같은 case에 묶이지 않습니다. 클래스 패턴은 둘을 한 자리에서 처리합니다.
  explanation: ClassName(attr=pattern, ...) 형태로 클래스 인스턴스를 매칭합니다. __match_args__가 정의되어 있으면 위치 인자 패턴도 가능합니다. dataclass는 자동으로 __match_args__를 생성합니다.
  tips:
  - dataclass와 같이 쓰면 가독성이 가장 좋습니다.
  - __match_args__가 없으면 키워드 형태(attr=value)만 가능합니다.
  snippet: |-
    from dataclasses import dataclass

    @dataclass
    class Move:
        direction: str
        steps: int

    @dataclass
    class Wait:
        seconds: float

    @dataclass
    class Quit:
        pass

    def describe(command):
        match command:
            case Move(direction="up", steps=steps):
                return f"upward x{steps}"
            case Move(direction=direction, steps=steps) if steps > 1:
                return f"big move:{direction} x{steps}"
            case Move(direction=direction, steps=1):
                return f"small move:{direction}"
            case Wait(seconds=seconds):
                return f"wait:{seconds}"
            case Quit():
                return "quit"
            case _:
                return "unknown command"

    commands = [Move("up", 3), Move("left", 4), Move("down", 1), Wait(0.5), Quit()]
    [describe(command) for command in commands]
  exercise:
    prompt: describe에 Move의 steps가 0인 경우를 잡아 idle을 돌려주는 case를 추가하고 결과 리스트에 idle이 나오는지 확인하세요.
    starterCode: |-
      from dataclasses import dataclass

      @dataclass
      class Move:
          direction: str
          steps: int

      def describe(command):
          match command:
              case Move(direction=_, steps=0):
                  return "idle"
              case Move(direction="up", steps=steps):
                  return f"upward x{steps}"
              case Move(direction=direction, steps=steps):
                  return f"move:{direction} x{steps}"
              case _:
                  return "unknown command"

      commands = [Move("up", 3), Move("left", 0), Move("down", 1)]
      [describe(command) for command in commands]
    hints:
    - steps=0 패턴이 일반 Move 분기보다 위에 있어야 먼저 매칭됩니다.
    - direction을 wildcard로 두면 방향과 무관하게 idle 처리가 됩니다.
  check:
    noError: dataclass 정의와 describe 분기가 NameError, SyntaxError 없이 실행되어야 합니다.
    resultCheck: 결과가 [upward x3, idle, move:down x1] 처럼 0 steps 분기가 일반 Move 분기보다 먼저 매칭되어야 합니다.
- id: as-binding-or
  title: as 바인딩과 OR 패턴 합성
  structuredPrimary: true
  subtitle: 복잡한 case 한 자리에 표현
  goal: as 바인딩으로 매칭된 값을 캡처하고 OR 패턴으로 여러 형태를 같은 case에 모읍니다.
  why: 여러 형태가 같은 처리로 분기되어야 할 때 if문에서 isinstance 사슬을 만들면 본문이 중복됩니다. OR 패턴이 그 중복을 합쳐 줍니다.
  explanation: 'pattern as name으로 매칭된 객체 전체를 캡처할 수 있습니다. pat1 | pat2 형태의 OR 패턴은 둘 중 하나라도 매칭되면 본문으로 진입합니다. OR 패턴의 두 쪽이 같은 캡처 변수를 가져야 본문에서 사용할 수 있습니다.'
  tips:
  - OR 패턴의 모든 분기가 같은 캡처 이름을 가져야 본문에서 그 이름을 쓸 수 있습니다.
  - as 바인딩은 매칭된 객체 전체에 이름을 붙이는 데 유용합니다.
  snippet: |-
    def normalize(value):
        match value:
            case {"data": {"items": list() as items}} | {"items": list() as items}:
                return [f"item:{x}" for x in items]
            case {"data": data} as wrapper if isinstance(data, dict):
                return f"wrapper-keys:{sorted(wrapper)}"
            case int() | float() as number:
                return f"number:{number}"
            case str() as text:
                return f"text:{text}"
            case _:
                return "other"

    samples = [
        {"data": {"items": [1, 2, 3]}},
        {"items": ["a", "b"]},
        {"data": {"meta": "x"}},
        42,
        "hello",
        None,
    ]
    [normalize(value) for value in samples]
  exercise:
    prompt: normalize에 list() as raw 단독 패턴을 추가해 raw 리스트 입력 [10, 20, 30]도 list-of-N 형태로 처리되도록 만들어 보세요.
    starterCode: |-
      def normalize(value):
          match value:
              case list() as raw:
                  return f"list-of-{len(raw)}"
              case {"items": list() as items}:
                  return [f"item:{x}" for x in items]
              case int() | float() as number:
                  return f"number:{number}"
              case str() as text:
                  return f"text:{text}"
              case _:
                  return "other"

      samples = [[10, 20, 30], {"items": ["a", "b"]}, 42, "hello"]
      [normalize(value) for value in samples]
    hints:
    - list() as raw는 raw에 매칭된 리스트 전체를 바인딩합니다.
    - case 순서가 결과를 바꿉니다. 더 좁은 dict case가 list case보다 아래로 가야 합니다.
  check:
    type: noError
    noError: normalize 정의와 match 분기가 NameError, SyntaxError 없이 실행되어야 합니다.
    resultCheck: 결과가 [list-of-3, [item:a, item:b], number:42, text:hello] 처럼 OR/as 패턴이 의도한 대로 매칭되어야 합니다.
assessment:
  masteryVariants:
  - id: 34_pattern_matching-learning-event-mastery
    mode: mastery
    unseen: true
    sourceSectionIds:
    - literal-capture
    - mapping-pattern
    - as-binding-or
    title: 학습 이벤트를 match로 구조 분기하기
    subtitle: structural event routing
    goal: route_learning_event(event)를 완성해 dict, list, guard 패턴을 사용해 학습 이벤트를 설명 문자열로 변환한다.
    why: 패턴 매칭의 가치는 값을 비교하는 데서 끝나지 않고, 입력 구조를 분해하면서 필요한 값만 안전하게 꺼내는 데 있습니다.
    explanation: run 성공, check 통과, navigate 명령, 숫자 progress, 그 외 입력을 서로 다른 문자열로 반환하세요.
    tips:
    - mapping pattern은 필요한 key가 없으면 다음 case로 넘어갑니다.
    - guard는 구조가 맞은 뒤 추가 조건을 확인할 때 씁니다.
    exercise:
      prompt: route_learning_event(event)를 완성해 이벤트 구조별 설명 문자열을 반환하세요.
      starterCode: |-
        def route_learning_event(event):
            raise NotImplementedError
      solution: |-
        def route_learning_event(event):
            match event:
                case {"type": "run", "lesson": lesson, "ok": True}:
                    return f"run-ok:{lesson}"
                case {"type": "check", "result": {"passed": True, "score": score}} if score >= 90:
                    return f"mastery:{score}"
                case ["navigate", target]:
                    return f"go:{target}"
                case int() | float() as progress:
                    return f"progress:{progress}"
                case _:
                    return "unhandled"
      hints:
      - check case는 score guard가 90 이상일 때만 mastery로 처리합니다.
      - list 명령은 ["navigate", target] 형태만 처리하세요.
    check:
      id: python.advanced.pattern-matching.learning-event.mastery.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.advanced.pattern-matching.empty.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
        directories:
        - input
        - output
        env:
          LANG: C.UTF-8
          TZ: UTC
        files: []
        stdin: []
      packageAssets: []
      payload:
        entry: route_learning_event
        cases:
        - id: routes-successful-run-event
