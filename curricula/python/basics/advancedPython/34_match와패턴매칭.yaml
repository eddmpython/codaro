  title: match와 패턴매칭
  day: 34
  category: advancedPython
  tags:
  - match
  - case
  - structural-pattern-matching
  - guard
  - python310
  seo:
    title: 파이썬 match/case 구조 패턴 매칭 (3.10+)
    description: 리터럴/시퀀스/매핑/클래스 패턴, guard, as 바인딩, OR 패턴으로 분기를 명확하게 표현합니다.
    keywords:
    - match case
