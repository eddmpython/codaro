          for i, val in enumerate(arr):
              if val == target:
                  return i
          return -1

      def binarySrch(arr, target):
          left, right = 0, len(arr) - 1
          while left <= right:
              mid = (left + right) // 2
              if arr[mid] == target:
                  return mid
              elif arr[mid] < target:
                  left = mid + 1
              else:
                  right = mid - 1
          return -1

      srchArr = list(range(1000))
      srchTarget = 750
      srchLinear = linearSrch(srchArr, srchTarget)
      srchBinary = binarySrch(srchArr, srchTarget)
      srchResult = (srchLinear, srchBinary)
      srchResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 알고리즘 선택의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 알고리즘 선택 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: caching
  title: 캐싱과 메모이제이션
  structuredPrimary: true
  subtitle: 반복 계산 방지
  goal: 캐싱과 메모이제이션에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 같은 입력에 대한 결과를 저장해두면 재계산을 피할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from functools import lru_cache

    def fibNoCache(n):
        if n <= 1:
            return n
        return fibNoCache(n - 1) + fibNoCache(n - 2)

    @lru_cache(maxsize=None)
    def fibCached(n):
        if n <= 1:
            return n
        return fibCached(n - 1) + fibCached(n - 2)

    fibNc = fibNoCache(20)
    fibC = fibCached(30)
    fibInfo = fibCached.cache_info()
    fibResult = (fibNc, fibC, fibInfo.hits)
    fibResult
  exercise:
    prompt: 캐싱과 메모이제이션 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      from functools import lru_cache

      def fibNoCache(n):
          if n <= 1:
              return n
          return fibNoCache(n - 1) + fibNoCache(n - 2)

      @lru_cache(maxsize=None)
      def fibCached(n):
          if n <= 1:
              return n
          return fibCached(n - 1) + fibCached(n - 2)

      fibNc = fibNoCache(20)
      fibC = fibCached(30)
      fibInfo = fibCached.cache_info()
      fibResult = (fibNc, fibC, fibInfo.hits)
      fibResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 캐싱과 메모이제이션의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 캐싱과 메모이제이션 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 중복 주문 탐지 최적화'
  structuredPrimary: true
  subtitle: 추측이 아니라 같은 결과와 작업량 비교로 최적화를 검증합니다
  goal: '현업 흐름 검증: 중복 주문 탐지 최적화에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    최적화는 빠를 것 같은 코드를 고르는 일이 아닙니다. 먼저 느린 기준 구현과 빠른 구현이 같은 결과를 내는지 확인하고, 반복 횟수나 캐시 hit처럼 측정 가능한 신호를 비교하세요.

    변주 실험
    주문 ID가 10만 개일 때도 결과가 같아야 합니다. 테스트 데이터 크기만 키워도 느린 구현과 빠른 구현의 작업량 차이가 어떻게 커지는지 확인하세요.
  tips:
  - 변주 실험 주문 ID가 10만 개일 때도 결과가 같아야 합니다. 테스트 데이터 크기만 키워도 느린 구현과 빠른 구현의 작업량 차이가 어떻게 커지는지 확인하세요.
  snippet: |-
    def findDuplicatesSlow(orderIds):
        duplicates = []
        comparisons = 0
        for index, orderId in enumerate(orderIds):
            for previous in orderIds[:index]:
                comparisons += 1
                if orderId == previous and orderId not in duplicates:
                    duplicates.append(orderId)
        return duplicates, comparisons

    def findDuplicatesFast(orderIds):
        if not isinstance(orderIds, list):
            raise TypeError("orderIds must be a list")
        seen = set()
        duplicates = []
        checks = 0
        for orderId in orderIds:
            checks += 1
            if orderId in seen and orderId not in duplicates:
                duplicates.append(orderId)
            seen.add(orderId)
        return duplicates, checks

    orderIds = ["O-1", "O-2", "O-3", "O-2", "O-4", "O-1"]
    slowResult, slowChecks = findDuplicatesSlow(orderIds)
    fastResult, fastChecks = findDuplicatesFast(orderIds)

    assert slowResult == fastResult == ["O-2", "O-1"]
    assert fastChecks == len(orderIds)
    assert slowChecks > fastChecks

    try:
        findDuplicatesFast("O-1,O-2")
    except TypeError as exc:
        message = str(exc)

    assert message == "orderIds must be a list"
