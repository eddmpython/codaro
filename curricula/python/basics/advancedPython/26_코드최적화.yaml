          return duplicates, comparisons

      def findDuplicatesFast(orderIds):
          if not isinstance(orderIds, list):
              raise TypeError("orderIds must be a list")
          seen = set()
          duplicates = []
          checks = 0
          for orderId in orderIds:
              checks += 1
              if orderId in seen and orderId not in duplicates:
                  duplicates.append(orderId)
              seen.add(orderId)
          return duplicates, checks

      orderIds = ["O-1", "O-2", "O-3", "O-2", "O-4", "O-1"]
      slowResult, slowChecks = findDuplicatesSlow(orderIds)
      fastResult, fastChecks = findDuplicatesFast(orderIds)

      assert slowResult == fastResult == ["O-2", "O-1"]
      assert fastChecks == len(orderIds)
      assert slowChecks > fastChecks

      try:
          findDuplicatesFast("O-1,O-2")
      except TypeError as exc:
          message = str(exc)

      assert message == "orderIds must be a list"
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
