sections:
- id: time_complexity
  title: 시간 복잡도 개선
  structuredPrimary: true
  subtitle: O(n²)에서 O(n)으로
  goal: 시간 복잡도 개선에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: Set을 활용하면 in 연산이 O(1)이 되어 전체 복잡도가 개선됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def findDupSlow(nums):
        dups = []
        for i in range(len(nums)):
            for j in range(i + 1, len(nums)):
                if nums[i] == nums[j] and nums[i] not in dups:
                    dups.append(nums[i])
        return dups

    def findDupFast(nums):
        seen = set()
        dups = set()
        for num in nums:
            if num in seen:
                dups.add(num)
            seen.add(num)
        return list(dups)

    tcNums = [1, 2, 3, 2, 4, 3, 5]
    tcSlow = findDupSlow(tcNums)
    tcFast = findDupFast(tcNums)
    tcResult = (tcSlow, tcFast)
    tcResult
  exercise:
    prompt: 시간 복잡도 개선 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def findDupSlow(nums):
          dups = []
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] == nums[j] and nums[i] not in dups:
                      dups.append(nums[i])
          return dups

      def findDupFast(nums):
          seen = set()
          dups = set()
          for num in nums:
              if num in seen:
                  dups.add(num)
              seen.add(num)
          return list(dups)

      tcNums = [1, 2, 3, 2, 4, 3, 5]
      tcSlow = findDupSlow(tcNums)
      tcFast = findDupFast(tcNums)
      tcResult = (tcSlow, tcFast)
      tcResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 시간 복잡도 개선의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 시간 복잡도 개선 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
