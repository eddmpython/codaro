- id: workflow_validation
  title: '현업 흐름 검증: 클로저로 요청 제한기와 캐시 만들기'
  structuredPrimary: true
  subtitle: 예측 → 상태 캡슐화 → 초과 오류 → 캐시 검증
  goal: '현업 흐름 검증: 클로저로 요청 제한기와 캐시 만들기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    클로저는 간단한 상태를 함수 안에 숨기고, 외부에서는 정해진 동작으로만 상태를 바꾸게 할 때 좋습니다. 요청 제한기와 계산 캐시를 만들어 상태가 기대대로 유지되는지 확인합니다.

    변주 실험
    요청 제한기를 사용자 ID별로 따로 동작하게 바꾸고, A 사용자의 초과가 B 사용자에게 영향을 주지 않는지 검증하세요.
  tips:
  - 변주 실험 요청 제한기를 사용자 ID별로 따로 동작하게 바꾸고, A 사용자의 초과가 B 사용자에게 영향을 주지 않는지 검증하세요.
  snippet: |-
    def makeRateLimiter(limit):
        if limit <= 0:
            raise ValueError("limit must be positive")

        used = 0

        def allowRequest():
            nonlocal used
            if used >= limit:
                raise RuntimeError("request limit exceeded")
            used += 1
            return {"allowed": True, "remaining": limit - used}

        return allowRequest

    def makeMemoizedSquare():
        cache = {}
        callCount = 0

        def square(value):
            nonlocal callCount
            if value not in cache:
                callCount += 1
                cache[value] = value * value
            return cache[value]

        def stats():
            return {"callCount": callCount, "cacheKeys": sorted(cache)}

        return square, stats

    limiter = makeRateLimiter(2)
    assert limiter() == {"allowed": True, "remaining": 1}
    assert limiter() == {"allowed": True, "remaining": 0}

    try:
        limiter()
    except RuntimeError as exc:
        assert "limit" in str(exc)

    square, stats = makeMemoizedSquare()
    assert [square(4), square(4), square(5)] == [16, 16, 25]
    assert stats() == {"callCount": 2, "cacheKeys": [4, 5]}

    try:
        makeRateLimiter(0)
    except ValueError as exc:
        assert "positive" in str(exc)

    print("클로저 상태 관리 흐름 통과")
  exercise:
