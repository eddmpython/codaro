sections:
- id: enum_basic
  title: Enum 기초
  structuredPrimary: true
  subtitle: 명명된 상수
  goal: Enum 기초에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Enum은 명명된 상수의 집합을 정의합니다. 관련된 상수들을 그룹화하고 타입 안전성을 제공합니다. 각 멤버는 이름(name)과 값(value)을 가집니다. Enum 멤버는 싱글톤으로 항상 동일한 객체입니다. 이름이나 값으로 멤버에 접근할 수 있습니다. 반복(iteration)과 비교 연산을 지원합니다.

    Enum 멤버는 is로 비교하는 것이 권장됩니다 (싱글톤).
  snippet: |-
    from enum import Enum

    class Color(Enum):
        RED = 1
        GREEN = 2
        BLUE = 3

    Color.RED, Color.RED.name, Color.RED.value
  exercise:
    prompt: Enum 기초 예제에서 `RED`, `GREEN`, `BLUE` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from enum import Enum

      class Color(Enum):
          RED = 1
          GREEN = 2
          BLUE = 3

      Color.RED, Color.RED.name, Color.RED.value
    hints:
    - 바꿀 지점은 `RED = ...` 오른쪽 값입니다.
    - 실행 뒤 `RED` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: Enum 기초에서 `RED` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: Enum 기초 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: intenum
  title: IntEnum
  structuredPrimary: true
  subtitle: 정수 호환
  goal: IntEnum에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    IntEnum은 정수와 호환되는 열거형입니다. int를 상속받아 정수 연산과 비교가 가능합니다. 정수가 필요한 곳에서 직접 사용할 수 있습니다. 일반 Enum은 정수와 비교하면 항상 False입니다. 기존 정수 상수를 Enum으로 마이그레이션할 때 유용합니다. 주의: 정수와의 암시적 비교가 가능해 타입 안전성이 다소 약해집니다.

    IntEnum 대신 Enum을 사용하고 .value로 정수를 얻는 것이 더 안전합니다.
  snippet: |-
    from enum import IntEnum

    class HTTPStatus(IntEnum):
        OK = 200
        NOT_FOUND = 404
        SERVER_ERROR = 500

    HTTPStatus.OK == 200, HTTPStatus.OK + 1, HTTPStatus.OK < 300
  exercise:
    prompt: IntEnum 예제에서 `OK`, `NOT_FOUND`, `SERVER_ERROR` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from enum import IntEnum

      class HTTPStatus(IntEnum):
          OK = 200
          NOT_FOUND = 404
          SERVER_ERROR = 500

      HTTPStatus.OK == 200, HTTPStatus.OK + 1, HTTPStatus.OK < 300
    hints:
    - 바꿀 지점은 `OK = ...` 오른쪽 값입니다.
    - 실행 뒤 `OK` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: IntEnum에서 `OK` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: IntEnum 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: strenum
  title: StrEnum
  structuredPrimary: true
  subtitle: 문자열 호환
  goal: StrEnum에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    StrEnum은 Python 3.11에서 도입된 문자열 호환 열거형입니다. str을 상속받아 문자열 연산이 가능합니다. 문자열이 필요한 곳에서 직접 사용할 수 있습니다. API 응답, 설정 값 등 문자열 상수에 유용합니다. Python 3.10 이하에서는 str과 Enum을 다중 상속하여 비슷하게 구현할 수 있습니다.

    StrEnum에서 auto()는 멤버 이름을 소문자로 변환한 값을 사용합니다.
  snippet: |-
    from enum import StrEnum

    class ContentType(StrEnum):
        JSON = "application/json"
        HTML = "text/html"
        XML = "application/xml"

    ContentType.JSON == "application/json", ContentType.JSON.upper()
  exercise:
    prompt: StrEnum 예제에서 `JSON`, `HTML`, `XML` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from enum import StrEnum

      class ContentType(StrEnum):
          JSON = "application/json"
          HTML = "text/html"
          XML = "application/xml"

      ContentType.JSON == "application/json", ContentType.JSON.upper()
    hints:
    - 바꿀 지점은 `JSON = ...` 오른쪽 값입니다.
    - 실행 뒤 `JSON` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: StrEnum에서 `JSON` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: StrEnum 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: flag
  title: Flag
  structuredPrimary: true
  subtitle: 비트 플래그
  goal: Flag에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Flag는 비트 연산으로 조합할 수 있는 열거형입니다. 각 멤버는 2의 거듭제곱(1, 2, 4, 8, ...)이어야 합니다. |, &, ~, ^ 연산자로 플래그를 조합하거나 검사합니다. 권한, 옵션, 상태 조합 등에 유용합니다. IntFlag는 정수와도 호환됩니다. auto()는 자동으로 2의 거듭제곱을 할당합니다.

    Flag(0)은 빈 플래그를 나타내며, 보통 NONE이라고 이름 짓습니다.
  snippet: |-
    from enum import Flag, auto

    class Permission(Flag):
        READ = auto()
        WRITE = auto()
        EXECUTE = auto()

    Permission.READ.value, Permission.WRITE.value, Permission.EXECUTE.value
  exercise:
    prompt: Flag 예제에서 `READ`, `WRITE`, `EXECUTE` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from enum import Flag, auto

      class Permission(Flag):
          READ = auto()
          WRITE = auto()
          EXECUTE = auto()

      Permission.READ.value, Permission.WRITE.value, Permission.EXECUTE.value
    hints:
    - 바꿀 지점은 `READ = ...` 오른쪽 값입니다.
    - 실행 뒤 `READ` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: Flag에서 `READ` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: Flag 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: auto
  title: auto()
  structuredPrimary: true
  subtitle: 자동 값 할당
  goal: auto()에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    auto()는 열거형 값을 자동으로 할당합니다. Enum에서는 1부터 시작하는 정수를 순차적으로 할당합니다. Flag에서는 1, 2, 4, 8, ... 2의 거듭제곱을 할당합니다. StrEnum에서는 멤버 이름의 소문자를 값으로 사용합니다. _generate_next_value_ 메서드를 오버라이드하여 커스터마이징할 수 있습니다.

    auto()와 명시적 값을 섞어 사용하면 예상치 못한 결과가 나올 수 있습니다.
  snippet: |-
    from enum import Enum, auto

    class Priority(Enum):
        LOW = auto()
        MEDIUM = auto()
        HIGH = auto()
        CRITICAL = auto()

    [(p.name, p.value) for p in Priority]
  exercise:
    prompt: auto() 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      from enum import Enum, auto

      class Priority(Enum):
          LOW = auto()
          MEDIUM = auto()
          HIGH = auto()
          CRITICAL = auto()

      [(p.name, p.value) for p in Priority]
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: auto()의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: auto() 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: practical_enum
  title: 실전 활용
  structuredPrimary: true
  subtitle: 상태 머신과 설정
  goal: 실전 활용에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    Enum은 상태 머신, 설정 관리, API 응답 등에 활용됩니다. 메서드를 추가하여 동작을 정의할 수 있습니다. @unique 데코레이터로 중복 값을 금지합니다. 값이 같은 멤버는 별칭(alias)이 됩니다. _missing_ 메서드로 없는 값 처리를 커스터마이징합니다. match 문(Python 3.10+)과 잘 어울립니다.

    Enum은 딕셔너리 키로 사용할 수 있어 상태별 처리 함수 매핑에 유용합니다.
  snippet: |-
    from enum import Enum

    class Planet(Enum):
        MERCURY = (3.303e+23, 2.4397e6)
        EARTH = (5.976e+24, 6.37814e6)
        MARS = (6.421e+23, 3.3972e6)

        def __init__(self, mass, radius):
            self.mass = mass
            self.radius = radius

        @property
        def surfaceGravity(self):
            G = 6.67e-11
            return G * self.mass / (self.radius ** 2)

    Planet.EARTH.surfaceGravity
  exercise:
    prompt: 실전 활용 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      from enum import Enum

      class Planet(Enum):
          MERCURY = (3.303e+23, 2.4397e6)
          EARTH = (5.976e+24, 6.37814e6)
          MARS = (6.421e+23, 3.3972e6)

          def __init__(self, mass, radius):
              self.mass = mass
              self.radius = radius

          @property
          def surfaceGravity(self):
              G = 6.67e-11
              return G * self.mass / (self.radius ** 2)

      Planet.EARTH.surfaceGravity
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 실전 활용 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 주문 상태 머신과 권한 플래그'
  structuredPrimary: true
  subtitle: StrEnum, IntEnum, Flag로 문자열 상수와 매직 넘버를 제거합니다
  goal: '현업 흐름 검증: 주문 상태 머신과 권한 플래그에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    Enum은 값 목록을 예쁘게 묶는 수준에서 끝나면 약합니다. 주문 상태 전이, 경고 심각도, 권한 조합처럼 실수 비용이 큰 규칙을 Enum으로 모델링하고 잘못된 값이 어디서 차단되는지 검증하세요.

    변주 실험
    `REFUND_REQUESTED` 상태와 `Permission.REFUND` 권한을 연결하고, 권한이 없는 사용자는 환불 전이를 실행할 수 없도록 함수를 확장하세요.
  tips:
  - 변주 실험 `REFUND_REQUESTED` 상태와 `Permission.REFUND` 권한을 연결하고, 권한이 없는 사용자는 환불 전이를 실행할 수 없도록 함수를 확장하세요.
  snippet: |-
    from enum import Flag, IntEnum, StrEnum, auto

    class OrderStatus(StrEnum):
        DRAFT = "draft"
        PAID = "paid"
        SHIPPED = "shipped"
        CANCELLED = "cancelled"

    class Severity(IntEnum):
        INFO = 1
        WARNING = 2
        CRITICAL = 3

    class Permission(Flag):
        READ = auto()
        WRITE = auto()
        REFUND = auto()

    allowedTransitions = {
        OrderStatus.DRAFT: {OrderStatus.PAID, OrderStatus.CANCELLED},
        OrderStatus.PAID: {OrderStatus.SHIPPED, OrderStatus.CANCELLED},
        OrderStatus.SHIPPED: set(),
        OrderStatus.CANCELLED: set(),
    }

    def transition(current: OrderStatus, nextStatus: OrderStatus) -> OrderStatus:
        if nextStatus not in allowedTransitions[current]:
            raise ValueError(f"cannot move {current.value} to {nextStatus.value}")
        return nextStatus

    operatorPermission = Permission.READ | Permission.WRITE

    assert transition(OrderStatus.DRAFT, OrderStatus.PAID) is OrderStatus.PAID
    assert Severity.CRITICAL > Severity.WARNING
    assert operatorPermission & Permission.WRITE
    assert not operatorPermission & Permission.REFUND
    assert OrderStatus("paid") is OrderStatus.PAID
  exercise:
    prompt: '현업 흐름 검증: 주문 상태 머신과 권한 플래그 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      from enum import Flag, IntEnum, StrEnum, auto

      class OrderStatus(StrEnum):
          DRAFT = "draft"
          PAID = "paid"
          SHIPPED = "shipped"
          CANCELLED = "cancelled"

      class Severity(IntEnum):
          INFO = 1
          WARNING = 2
          CRITICAL = 3

      class Permission(Flag):
          READ = auto()
          WRITE = auto()
          REFUND = auto()

      allowedTransitions = {
          OrderStatus.DRAFT: {OrderStatus.PAID, OrderStatus.CANCELLED},
          OrderStatus.PAID: {OrderStatus.SHIPPED, OrderStatus.CANCELLED},
          OrderStatus.SHIPPED: set(),
          OrderStatus.CANCELLED: set(),
      }

      def transition(current: OrderStatus, nextStatus: OrderStatus) -> OrderStatus:
          if nextStatus not in allowedTransitions[current]:
              raise ValueError(f"cannot move {current.value} to {nextStatus.value}")
          return nextStatus

      operatorPermission = Permission.READ | Permission.WRITE

      assert transition(OrderStatus.DRAFT, OrderStatus.PAID) is OrderStatus.PAID
      assert Severity.CRITICAL > Severity.WARNING
      assert operatorPermission & Permission.WRITE
      assert not operatorPermission & Permission.REFUND
      assert OrderStatus("paid") is OrderStatus.PAID
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: '현업 흐름 검증: 주문 상태 머신과 권한 플래그의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
