- id: workflow_validation
  title: '현업 흐름 검증: 내보내기 인터페이스 설계하기'
  structuredPrimary: true
  subtitle: 예측 → 명시 계약 → 구조적 타입 → 실패 확인
  goal: '현업 흐름 검증: 내보내기 인터페이스 설계하기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    ABC는 런타임 계약을 강제하고, Protocol은 구조적 타입으로 기존 객체와의 결합을 줄입니다. 리포트 내보내기 흐름에서 저장소는 ABC로 강제하고 포맷터는 Protocol로 유연하게 받습니다.

    변주 실험
    JSON 포맷터를 추가하고, 기존 `exportRows` 함수는 수정하지 않은 채 저장 결과만 assert로 추가하세요.
  tips:
  - 변주 실험 JSON 포맷터를 추가하고, 기존 `exportRows` 함수는 수정하지 않은 채 저장 결과만 assert로 추가하세요.
  snippet: |-
    from abc import ABC, abstractmethod
    from typing import Protocol, runtime_checkable

    @runtime_checkable
    class RowFormatter(Protocol):
        def render(self, rows: list[dict]) -> str:
            ...

    class ReportSink(ABC):
        @abstractmethod
        def write(self, name: str, content: str) -> str:
            pass

    class CsvFormatter:
        def render(self, rows):
            header = ",".join(rows[0])
            lines = [header]
            for row in rows:
                lines.append(",".join(str(row[key]) for key in rows[0]))
            return "\n".join(lines)

    class MemorySink(ReportSink):
        def __init__(self):
            self.files = {}

        def write(self, name, content):
            self.files[name] = content
            return name

    def exportRows(formatter: RowFormatter, sink: ReportSink, name: str, rows: list[dict]):
        if not isinstance(formatter, RowFormatter):
            raise TypeError("formatter must implement render")
        content = formatter.render(rows)
        return sink.write(name, content)

    rows = [{"id": "A-100", "amount": 12000}, {"id": "A-101", "amount": 9000}]
    sink = MemorySink()
    savedName = exportRows(CsvFormatter(), sink, "orders.csv", rows)

    assert savedName == "orders.csv"
    assert sink.files["orders.csv"] == "id,amount\nA-100,12000\nA-101,9000"
    assert isinstance(CsvFormatter(), RowFormatter)

    try:
        ReportSink()
    except TypeError as exc:
        assert "abstract" in str(exc)

    try:
        exportRows(object(), sink, "broken.csv", rows)
    except TypeError as exc:
        assert "formatter" in str(exc)

    print("ABC와 Protocol 내보내기 흐름 통과")
