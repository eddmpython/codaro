sections:
- id: with-basics
  title: with 문과 __enter__/__exit__ 직접 구현
  structuredPrimary: true
  subtitle: 클래스 기반 컨텍스트 매니저 만들기
  goal: 클래스에 __enter__/__exit__를 정의해 with 블록이 자원 정리를 보장하는 흐름을 확인합니다.
  why: try/finally를 반복하지 않고도 자원 해제를 한 자리에서 묶을 수 있어 누락 사고를 막습니다.
  explanation: with 문은 객체의 __enter__를 호출해 변수에 바인딩하고, 블록을 빠져나갈 때 (정상 종료든 예외든) __exit__를 호출합니다. __exit__이 받는 인자 (exc_type, exc_value, traceback)로 예외 정보를 검사할 수 있고, 반환값이 truthy면 예외가 억제됩니다.
  tips:
  - __exit__의 반환값을 명시적으로 False로 두면 예외가 그대로 전파됩니다.
  - 자원 해제는 __exit__ 안에서, 자원 사용은 __enter__가 돌려주는 객체로 하는 것이 관례입니다.
  snippet: |-
    class TraceContext:
        def __init__(self, label):
            self.label = label
            self.events = []

        def __enter__(self):
            self.events.append(f"enter:{self.label}")
            return self

        def __exit__(self, excType, excValue, traceback):
            self.events.append(f"exit:{self.label}:{excType.__name__ if excType else 'ok'}")
            return False

    trace = TraceContext("task")
    with trace as ctx:
        ctx.events.append("body")

    trace.events
  exercise:
    prompt: TraceContext 안에서 의도적으로 ValueError를 발생시키고 events 리스트에 어떤 항목이 쌓이는지 확인하세요.
    starterCode: |-
      class TraceContext:
          def __init__(self, label):
              self.label = label
              self.events = []

          def __enter__(self):
              self.events.append(f"enter:{self.label}")
              return self

          def __exit__(self, excType, excValue, traceback):
              self.events.append(f"exit:{self.label}:{excType.__name__ if excType else 'ok'}")
              return False

      trace = TraceContext("task")
      try:
          with trace as ctx:
              ctx.events.append("body")
              raise ValueError("boom")
      except ValueError:
          trace.events.append("caught")

      trace.events
    hints:
    - __exit__의 excType은 ValueError 클래스이고, excValue.args에 메시지가 들어 있습니다.
    - 반환값을 True로 바꾸면 예외가 with 바깥으로 나가지 않습니다.
  check:
    type: noError
    noError: TraceContext 클래스 정의와 with 블록이 NameError나 TypeError 없이 끝까지 실행되어야 합니다.
    resultCheck: events 리스트가 enter, body, exit 순서로 쌓이고 예외 경로에서는 exit 항목에 ValueError가 기록되어야 합니다.
- id: contextmanager-decorator
  title: '@contextmanager로 함수 스타일 컨텍스트 매니저'
  structuredPrimary: true
  subtitle: contextlib.contextmanager 데코레이터
  goal: 제너레이터 함수 한 개에 setup과 teardown을 모아 짧은 컨텍스트 매니저를 만듭니다.
  why: __enter__/__exit__ 클래스를 따로 만들 정도가 아닌 단순 자원에는 함수 한 개로 작성하는 편이 코드가 짧고 의도가 한눈에 보입니다.
  explanation: contextlib.contextmanager로 감싼 제너레이터는 yield 직전이 __enter__, yield 다음이 __exit__ 역할을 합니다. yield가 돌려주는 값이 as 절에 바인딩됩니다. teardown 코드는 try/finally로 묶어 예외 경로에서도 실행되도록 합니다.
  tips:
  - yield는 정확히 한 번만 호출해야 합니다. 두 번 yield하면 RuntimeError가 발생합니다.
  - teardown 코드는 finally 블록에 둬야 예외 경로에서도 실행됩니다.
  snippet: |-
    from contextlib import contextmanager

    @contextmanager
    def timedSection(label, sink):
        sink.append(f"start:{label}")
        try:
            yield sink
        finally:
            sink.append(f"end:{label}")

    log = []
    with timedSection("io", log) as bucket:
        bucket.append("read")
        bucket.append("write")

    log
  exercise:
    prompt: timedSection 안에서 RuntimeError를 발생시키고, finally의 end 로그가 그래도 기록되는지 확인하세요.
    starterCode: |-
      from contextlib import contextmanager

      @contextmanager
      def timedSection(label, sink):
          sink.append(f"start:{label}")
          try:
              yield sink
          finally:
              sink.append(f"end:{label}")

      log = []
      try:
          with timedSection("io", log) as bucket:
              bucket.append("read")
              raise RuntimeError("disk full")
      except RuntimeError:
          log.append("caught")

      log
    hints:
    - finally 안의 end 로그는 예외가 나도 항상 기록됩니다.
    - try를 빼면 예외 경로에서 end가 누락되는지 확인해 보세요.
  check:
    type: noError
    noError: timedSection 데코레이터와 with 블록이 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: log 리스트가 start, read, end, caught 순으로 채워져 예외 경로에서도 end가 보존되어야 합니다.
- id: exitstack-dynamic
  title: ExitStack으로 여러 자원 동적 관리
  structuredPrimary: true
  subtitle: 동적인 수의 자원을 한 with 블록에 모으기
  goal: 반복문으로 열어야 하는 자원을 ExitStack에 등록해 with 종료 시 한꺼번에 정리합니다.
  why: 자원 개수가 런타임에 결정될 때 중첩 with를 쌓으면 코드가 길어지고 누락이 쉽습니다. ExitStack이 정리 순서를 보장합니다.
  explanation: contextlib.ExitStack은 enter_context로 등록한 매니저를 LIFO 순서로 __exit__합니다. callback으로는 컨텍스트 매니저가 아닌 정리 함수도 등록할 수 있습니다. 한 자원의 __enter__가 실패해도 이미 등록된 자원은 정상적으로 닫힙니다.
  tips:
  - enter_context는 매니저의 __enter__ 반환값을 그대로 돌려줍니다.
  - 정리 순서가 중요하면 등록 순서를 의식적으로 잡아야 합니다 (LIFO).
  snippet: |-
    from contextlib import ExitStack, contextmanager

    @contextmanager
    def labeled(label, sink):
        sink.append(f"open:{label}")
        try:
            yield label
        finally:
            sink.append(f"close:{label}")

    events = []
    with ExitStack() as stack:
        opened = [stack.enter_context(labeled(name, events)) for name in ("a", "b", "c")]
        events.append(f"using:{opened}")

    events
  exercise:
    prompt: ExitStack에 callback으로 정리 함수를 추가 등록한 뒤 close 순서가 LIFO인지 events 리스트로 확인하세요.
    starterCode: |-
      from contextlib import ExitStack, contextmanager

      @contextmanager
      def labeled(label, sink):
          sink.append(f"open:{label}")
          try:
              yield label
          finally:
              sink.append(f"close:{label}")

      events = []
      with ExitStack() as stack:
          for name in ("a", "b", "c"):
              stack.enter_context(labeled(name, events))
          stack.callback(events.append, "cleanup:final")

      events
    hints:
    - callback은 with 블록을 빠져나갈 때 등록 역순으로 호출됩니다.
    - 정리 순서를 출력해 LIFO인지 직접 확인하세요.
  check:
    type: noError
    noError: ExitStack과 labeled 매니저가 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: events 리스트의 close 항목이 등록 역순(c, b, a)이고 callback이 가장 먼저 실행되어 cleanup이 close보다 앞에 보여야 합니다.
- id: exception-suppression
  title: '__exit__ 반환값으로 예외 억제'
  structuredPrimary: true
  subtitle: 컨텍스트 매니저가 특정 예외를 흡수하는 패턴
  goal: __exit__이 True를 돌려주면 예외가 with 바깥으로 나가지 않는 동작을 코드로 확인합니다.
  why: 특정 자원의 정리 실패를 본 흐름에서 격리해야 할 때 컨텍스트 매니저로 예외 경계를 만들 수 있습니다. 다만 남용하면 디버깅이 어려워지므로 의도가 분명해야 합니다.
  explanation: __exit__이 받은 excType이 특정 클래스이면 True를 돌려줘 예외를 흡수합니다. 흡수한 사실을 호출자에게 알리려면 컨텍스트 객체에 플래그로 남깁니다. contextlib.suppress가 이 패턴을 한 줄로 만든 표준 도구입니다.
  tips:
  - 모든 예외를 흡수하면 디버깅이 어렵습니다. 흡수 대상 클래스를 좁히세요.
  - 흡수했음을 호출자가 알 수 있도록 컨텍스트 객체에 표식을 남기는 패턴이 안전합니다.
  snippet: |-
    class SwallowKeyError:
        def __init__(self):
            self.suppressed = False

        def __enter__(self):
            return self

        def __exit__(self, excType, excValue, traceback):
            if excType is KeyError:
                self.suppressed = True
                return True
            return False

    data = {"name": "alice"}

    guard = SwallowKeyError()
    with guard:
        value = data["age"]

    {"suppressed": guard.suppressed, "data": data}
  exercise:
    prompt: SwallowKeyError 안에서 KeyError가 아닌 ValueError를 발생시켜 흡수되지 않고 with 바깥으로 나오는지 확인하세요.
    starterCode: |-
      class SwallowKeyError:
          def __init__(self):
              self.suppressed = False

          def __enter__(self):
              return self

          def __exit__(self, excType, excValue, traceback):
              if excType is KeyError:
                  self.suppressed = True
                  return True
              return False

      guard = SwallowKeyError()
      try:
          with guard:
              raise ValueError("not a key error")
      except ValueError as exc:
          captured = str(exc)
      else:
          captured = "no exception"

      {"suppressed": guard.suppressed, "captured": captured}
    hints:
    - __exit__이 False를 돌려주면 예외가 그대로 전파됩니다.
    - guard.suppressed는 KeyError에만 True가 되어야 합니다.
  check:
    type: noError
    noError: SwallowKeyError 정의와 with 블록이 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: KeyError는 흡수되어 suppressed가 True이고, ValueError는 흡수되지 않아 except 절에서 메시지가 captured에 담겨야 합니다.
- id: async-context
  title: 비동기 컨텍스트 매니저
  structuredPrimary: true
  subtitle: async with와 __aenter__/__aexit__
  goal: 비동기 자원에 async with를 적용해 await로 setup/teardown을 묶는 흐름을 확인합니다.
  why: 비동기 IO 자원(세션, 락, 트랜잭션)은 await가 필요한 정리 코드를 가지므로 동기 컨텍스트 매니저로는 부족합니다.
  explanation: __aenter__와 __aexit__는 코루틴이어야 하고 async with와 함께 사용합니다. 함수 스타일에서는 contextlib.asynccontextmanager로 같은 패턴을 짧게 작성합니다. asyncio.run이 이벤트 루프를 띄워 코루틴을 실행합니다.
  tips:
  - async with는 async def 함수 안에서만 사용할 수 있습니다.
  - 정리 코드 안에서도 await가 가능합니다 (예 - 비동기 connection.close()).
  snippet: |-
    import asyncio
    from contextlib import asynccontextmanager

    @asynccontextmanager
    async def asyncSection(label, sink):
        sink.append(f"open:{label}")
        try:
            yield label
        finally:
            sink.append(f"close:{label}")

    async def run():
        events = []
        async with asyncSection("task", events):
            events.append("body")
            await asyncio.sleep(0)
        return events

    asyncio.run(run())
  exercise:
    prompt: asyncSection 안에서 await asyncio.sleep을 호출한 뒤 events 리스트에 어떤 순서로 항목이 쌓이는지 확인하세요.
    starterCode: |-
      import asyncio
      from contextlib import asynccontextmanager

      @asynccontextmanager
      async def asyncSection(label, sink):
          sink.append(f"open:{label}")
          try:
              yield label
          finally:
              sink.append(f"close:{label}")

      async def run():
          events = []
          async with asyncSection("task", events):
              events.append("before-await")
              await asyncio.sleep(0)
              events.append("after-await")
          return events

      asyncio.run(run())
    hints:
    - asyncio.sleep(0)은 이벤트 루프에 제어를 양보하지만 즉시 돌아옵니다.
    - close는 finally 블록에서 호출되므로 마지막에 추가됩니다.
  check:
    type: noError
    noError: asyncSection과 asyncio.run이 NameError, TypeError, RuntimeError 없이 실행되어야 합니다.
    resultCheck: events 리스트가 open, before-await, after-await, close 순서로 쌓여 async with가 setup/teardown을 올바른 위치에 배치하는지 보여야 합니다.
