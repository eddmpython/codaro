sections:
- id: module_import
  title: pathlib 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: pathlib 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    pathlib는 파이썬의 객체지향 경로 처리 라이브러리입니다. Path 클래스를 통해 os.path보다 직관적인 API를 제공합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 Path 클래스를 사용할 수 있습니다.
  snippet: |-
    import tempfile
    from pathlib import Path

    currentPath = Path('.')
    currentPath
  exercise:
    prompt: pathlib 모듈 불러오기 예제에서 `currentPath` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      import tempfile
      from pathlib import Path

      currentPath = Path('.')
      currentPath
    hints:
    - 바꿀 지점은 `currentPath = ...` 오른쪽 값입니다.
    - 실행 뒤 `currentPath` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: pathlib 모듈 불러오기에서 `currentPath` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: pathlib 모듈 불러오기 실행 뒤 `currentPath` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: path_basics
  title: Path 객체 기초
  structuredPrimary: true
  subtitle: 경로 생성과 변환
  goal: Path 객체 기초에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Path 객체는 경로를 문자열이 아닌 객체로 다룹니다. 절대 경로 변환, 경로 구성요소 분리, 파일명과 확장자 추출 등 다양한 속성과 메서드를 제공합니다.

    parts는 경로를 튜플로 분리하며, parent는 바로 위 디렉토리, parents는 모든 상위 디렉토리를 반환합니다.
  snippet: |-
    absolutePath = Path('.').resolve()
    absolutePath
  exercise:
    prompt: Path 객체 기초 예제에서 `absolutePath` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      absolutePath = Path('.').resolve()
      absolutePath
    hints:
    - 바꿀 지점은 `absolutePath = ...` 오른쪽 값입니다.
    - 실행 뒤 `absolutePath` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: Path 객체 기초에서 `absolutePath` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: Path 객체 기초 실행 뒤 `absolutePath` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: path_operations
  title: 경로 조작
  structuredPrimary: true
  subtitle: 경로 결합과 변경
  goal: 경로 조작에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Path 객체는 / 연산자로 경로를 결합하고, with_name()과 with_suffix()로 파일명과 확장자를 변경할 수 있습니다. relative_to()로 상대 경로를 계산합니다.

    / 연산자와 joinpath()는 동일한 결과를 반환합니다. with_name()과 with_suffix()는 원본을 변경하지 않고 새 Path 객체를 반환합니다.
  snippet: |-
    basePath = Path('/home/user')
    newPath = basePath / 'documents' / 'file.txt'
    newPath
  exercise:
    prompt: 경로 조작 예제에서 `basePath`, `newPath` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      basePath = Path('/home/user')
      newPath = basePath / 'documents' / 'file.txt'
      newPath
    hints:
    - 바꿀 지점은 `basePath = ...` 오른쪽 값입니다.
    - 실행 뒤 `basePath` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 경로 조작에서 `basePath` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 경로 조작 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: path_checking
  title: 경로 확인
  structuredPrimary: true
  subtitle: 파일과 디렉토리 검증
  goal: 경로 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Path 객체는 경로의 존재 여부, 타입(파일/디렉토리), 절대 경로 여부 등을 확인하는 메서드를 제공합니다. 모든 메서드는 True/False를 반환합니다.

    Codaro 로컬 커널에서는 로컬 파일시스템 경로를 다룹니다. Windows에서 절대 경로는 C:\로 시작하고, Unix에서는 /로 시작합니다.
  snippet: |-
    checkPath = Path('.')
    checkPath.exists()
  exercise:
    prompt: 경로 확인 예제에서 `checkPath` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      checkPath = Path('.')
      checkPath.exists()
    hints:
    - 바꿀 지점은 `checkPath = ...` 오른쪽 값입니다.
    - 실행 뒤 `checkPath` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 경로 확인에서 `checkPath` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 경로 확인 실행 뒤 `checkPath` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: directory_navigation
  title: 디렉토리 탐색
  structuredPrimary: true
  subtitle: 파일 검색과 필터링
  goal: 디렉토리 탐색에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    Path 객체는 디렉토리의 내용을 나열하고, 패턴에 맞는 파일을 검색하는 강력한 기능을 제공합니다. iterdir()은 현재 디렉토리를, glob()과 rglob()은 패턴 매칭 검색을 수행합니다.

    glob()은 현재 디렉토리만 검색하고, rglob()은 **/ 패턴을 자동으로 적용하여 모든 하위 디렉토리를 검색합니다.
  snippet: |-
    currentDir = Path('.')
    [item.name for item in currentDir.iterdir()][:10]
  exercise:
    prompt: 디렉토리 탐색 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      currentDir = Path('.')
      [item.name for item in currentDir.iterdir()][:10]
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 디렉토리 탐색의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 디렉토리 탐색 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: file_operations
  title: 파일 읽기/쓰기
  structuredPrimary: true
  subtitle: 간편한 파일 처리
  goal: 파일 읽기/쓰기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Path 객체는 read_text(), write_text()로 텍스트 파일을, read_bytes(), write_bytes()로 바이너리 파일을 간단히 처리합니다. 파일을 자동으로 열고 닫아 안전합니다.

    Codaro 로컬 커널에서는 지정한 로컬 경로에 저장됩니다. write_text()와 write_bytes()는 기존 파일을 덮어쓰므로 실습용 경로에서 실행하세요.
  snippet: |-
    pathlibScratch = Path(tempfile.gettempdir()) / 'codaro_pathlib_scratch'
    pathlibScratch.mkdir(parents=True, exist_ok=True)
    textFile = pathlibScratch / 'sample.txt'
    textFile.write_text('Hello from pathlib!')
    textFile.read_text()
  exercise:
    prompt: 파일 읽기/쓰기 예제에서 `pathlibScratch`, `textFile` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      pathlibScratch = Path(tempfile.gettempdir()) / 'codaro_pathlib_scratch'
      pathlibScratch.mkdir(parents=True, exist_ok=True)
      textFile = pathlibScratch / 'sample.txt'
      textFile.write_text('Hello from pathlib!')
      textFile.read_text()
    hints:
    - 바꿀 지점은 `pathlibScratch = ...` 오른쪽 값입니다.
    - 실행 뒤 `pathlibScratch` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 파일 읽기/쓰기에서 `pathlibScratch` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 파일 읽기/쓰기 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: Path 기반 파일 파이프라인'
  structuredPrimary: true
  subtitle: 작업공간 격리, 파일 매니페스트, 경로 traversal 검증
  goal: '검증 루프: Path 기반 파일 파이프라인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    pathlib는 경로를 객체로 다루기 때문에 파일 파이프라인을 읽기 쉽게 만들 수 있습니다. 임시 작업공간에 데이터를 만들고, 매니페스트를 검증하고, 사용자 입력 경로가 작업공간 밖으로 나가지 않는지 확인합니다.

    변주 실험
    출력 파일명을 날짜별 하위 폴더로 바꾸고, `relative_to()` 결과가 여전히 `pipelineRoot` 아래에 있는지 검증하세요.
  tips:
  - 변주 실험 출력 파일명을 날짜별 하위 폴더로 바꾸고, `relative_to()` 결과가 여전히 `pipelineRoot` 아래에 있는지 검증하세요.
  snippet: |-
    pipelineRoot = Path(tempfile.mkdtemp(prefix='codaro_pathlib_workflow_'))
    inputPath = pipelineRoot / 'input'
    inputPath.mkdir(parents=True, exist_ok=True)

    (inputPath / 'sales.csv').write_text('id,amount\n1,100\n2,150\n', encoding='utf-8')
    (inputPath / 'README.md').write_text('# dataset\n', encoding='utf-8')
    (inputPath / 'errors.log').write_text('ERROR timeout\nINFO recovered\n', encoding='utf-8')

    def buildFileManifest(folder):
        return [
            {
                "name": path.name,
                "suffix": path.suffix,
                "size": path.stat().st_size,
            }
            for path in sorted(folder.iterdir())
            if path.is_file()
        ]

    manifest = buildFileManifest(inputPath)

    assert sorted(item["name"] for item in manifest) == ["README.md", "errors.log", "sales.csv"]
    assert sum(item["size"] for item in manifest) == sum(path.stat().st_size for path in inputPath.iterdir())

    manifest
  exercise:
    prompt: '검증 루프: Path 기반 파일 파이프라인 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      pipelineRoot = Path(tempfile.mkdtemp(prefix='codaro_pathlib_workflow_'))
      inputPath = pipelineRoot / 'input'
      inputPath.mkdir(parents=True, exist_ok=True)

      (inputPath / 'sales.csv').write_text('id,amount\n1,100\n2,150\n', encoding='utf-8')
      (inputPath / 'README.md').write_text('# dataset\n', encoding='utf-8')
      (inputPath / 'errors.log').write_text('ERROR timeout\nINFO recovered\n', encoding='utf-8')

      def buildFileManifest(folder):
          return [
              {
                  "name": path.name,
                  "suffix": path.suffix,
                  "size": path.stat().st_size,
              }
              for path in sorted(folder.iterdir())
              if path.is_file()
          ]

      manifest = buildFileManifest(inputPath)

      assert sorted(item["name"] for item in manifest) == ["README.md", "errors.log", "sales.csv"]
      assert sum(item["size"] for item in manifest) == sum(path.stat().st_size for path in inputPath.iterdir())

      manifest
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: '검증 루프: Path 기반 파일 파이프라인의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '검증 루프: Path 기반 파일 파이프라인 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
- id: practice
  title: pathlib 모듈 종합 복습
  structuredPrimary: true
  subtitle: Path 객체 마스터하기
  goal: pathlib 모듈 종합 복습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
