    noError: '검증 루프: 티켓 운영 집계의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '검증 루프: 티켓 운영 집계 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
