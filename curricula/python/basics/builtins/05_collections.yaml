sections:
- id: module_import
  title: collections 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: collections 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    collections은 파이썬 표준 라이브러리입니다. Counter, deque, defaultdict 등 특수 컨테이너를 제공하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 collections 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 collections 모듈을 사용할 수 있습니다.
  snippet: |-
    from collections import Counter, defaultdict, deque, namedtuple, ChainMap

    # 모듈 로드 확인
    'collections 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: collections 모듈 불러오기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      from collections import Counter, defaultdict, deque, namedtuple, ChainMap

      # 모듈 로드 확인
      'collections 모듈이 정상적으로 로드되었습니다'
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: collections 모듈 불러오기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: collections 모듈 불러오기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: counter
  title: Counter - 빈도 계산기
  structuredPrimary: true
  subtitle: 요소의 개수 세기
  goal: Counter 빈도 계산기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Counter는 요소의 등장 횟수를 세는 특수 딕셔너리입니다. most_common()으로 가장 많이 등장한 요소를 찾고, 산술 연산으로 카운터를 합치거나 뺄 수 있습니다. 투표 집계, 단어 빈도 분석, 통계 처리에 필수적입니다.

    Counter는 존재하지 않는 키에 대해 0을 반환합니다. KeyError가 발생하지 않습니다.
  tips:
  - Counter는 존재하지 않는 키에 대해 0을 반환합니다. KeyError가 발생하지 않습니다.
  snippet: |-
    fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
    fruitCount = Counter(fruits)
    fruitCount
  exercise:
    prompt: Counter 빈도 계산기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
      fruitCount = Counter(fruits)
      fruitCount
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: Counter 빈도 계산기에서 `fruits` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: Counter 빈도 계산기 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: defaultdict
  title: defaultdict - 기본값 딕셔너리
  structuredPrimary: true
  subtitle: KeyError 없는 딕셔너리
  goal: defaultdict 기본값 딕셔너리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    defaultdict는 존재하지 않는 키에 접근할 때 기본값을 자동으로 생성합니다. int, list, set 등을 기본 팩토리로 지정하면 초기화 없이 바로 사용할 수 있습니다. 그룹화, 집계, 인덱싱 작업을 간결하게 만듭니다.

    defaultdict(lambda: 값)으로 커스텀 기본값을 설정할 수 있습니다.
  tips:
  - 'defaultdict(lambda: 값)으로 커스텀 기본값을 설정할 수 있습니다.'
  snippet: |-
    scores = defaultdict(int)
    scores['alice'] += 10
    scores['bob'] += 5
    scores['alice'] += 3
    dict(scores)
  exercise:
    prompt: defaultdict 기본값 딕셔너리 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      scores = defaultdict(int)
      scores['alice'] += 10
      scores['bob'] += 5
      scores['alice'] += 3
      dict(scores)
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: defaultdict 기본값 딕셔너리에서 `scores` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: defaultdict 기본값 딕셔너리 실행 뒤 `scores` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: deque
  title: deque - 양방향 큐
  structuredPrimary: true
  subtitle: 빠른 양쪽 끝 삽입/삭제
  goal: deque 양방향 큐에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    deque는 양쪽 끝에서 빠르게 삽입과 삭제가 가능한 자료구조입니다. append()/pop()은 오른쪽, appendleft()/popleft()는 왼쪽에서 작동합니다. 리스트보다 양 끝 연산이 훨씬 빠르며, 큐, 스택, 슬라이딩 윈도우에 활용됩니다.

    deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  tips:
  - deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  snippet: |-
    dq = deque([1, 2, 3])
    dq.append(4)
    dq.appendleft(0)
    list(dq)
  exercise:
    prompt: deque 양방향 큐 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      dq = deque([1, 2, 3])
      dq.append(4)
      dq.appendleft(0)
      list(dq)
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: deque 양방향 큐에서 `dq` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: deque 양방향 큐 실행 뒤 `dq` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: namedtuple
  title: namedtuple - 이름있는 튜플
  structuredPrimary: true
  subtitle: 가독성 높은 불변 데이터
  goal: namedtuple 이름있는 튜플에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    namedtuple은 필드 이름으로 접근할 수 있는 튜플입니다. 인덱스 대신 속성명을 사용하여 코드 가독성을 높이고, 불변성으로 안전성을 보장합니다. 경량 데이터 클래스, 설정 객체, 반환값 구조화에 적합합니다.

    _asdict()로 namedtuple을 OrderedDict로 변환할 수 있습니다.
  tips:
  - _asdict()로 namedtuple을 OrderedDict로 변환할 수 있습니다.
  snippet: |-
    Point = namedtuple('Point', ['x', 'y'])
    p = Point(3, 4)
    p.x, p.y
  exercise:
    prompt: namedtuple 이름있는 튜플 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      Point = namedtuple('Point', ['x', 'y'])
      p = Point(3, 4)
      p.x, p.y
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: namedtuple 이름있는 튜플에서 `Point` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: namedtuple 이름있는 튜플 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: chainmap
  title: ChainMap - 딕셔너리 체인
  structuredPrimary: true
  subtitle: 여러 딕셔너리 통합 조회
  goal: ChainMap 딕셔너리 체인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    ChainMap은 여러 딕셔너리를 하나의 뷰로 묶습니다. 조회 시 첫 번째 딕셔너리부터 순서대로 검색하며, 설정 우선순위나 변수 스코프 구현에 유용합니다. 실제 병합 없이 논리적으로 합치므로 메모리 효율적입니다.

    ChainMap.maps로 내부 딕셔너리 리스트에 접근할 수 있습니다.
  tips:
  - ChainMap.maps로 내부 딕셔너리 리스트에 접근할 수 있습니다.
  snippet: |-
    defaults = {'color': 'red', 'size': 10}
    custom = {'size': 20}
    combined = ChainMap(custom, defaults)
    combined['color'], combined['size']
  exercise:
    prompt: ChainMap 딕셔너리 체인 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      defaults = {'color': 'red', 'size': 10}
      custom = {'size': 20}
      combined = ChainMap(custom, defaults)
      combined['color'], combined['size']
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: ChainMap 딕셔너리 체인에서 `defaults` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: ChainMap 딕셔너리 체인 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: collections 실무 패턴
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    실무에서 자주 사용하는 collections 활용 패턴을 살펴봅니다. 투표 집계, 로그 분석, 최근 항목 관리, 데이터 구조화 등 다양한 문제를 collections로 효율적으로 해결할 수 있습니다.

    OrderedDict는 Python 3.7+에서는 일반 dict도 순서를 유지하므로 특별한 경우를 제외하면 dict 사용을 권장합니다.
  tips:
  - OrderedDict는 Python 3.7+에서는 일반 dict도 순서를 유지하므로 특별한 경우를 제외하면 dict 사용을 권장합니다.
  snippet: |-
    votes = ['Alice', 'Bob', 'Alice', 'Charlie', 'Bob', 'Alice']
    voteCount = Counter(votes)
    winner = voteCount.most_common(1)[0]
    winner
  exercise:
    prompt: 실전 활용 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      votes = ['Alice', 'Bob', 'Alice', 'Charlie', 'Bob', 'Alice']
      voteCount = Counter(votes)
      winner = voteCount.most_common(1)[0]
      winner
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 실전 활용에서 `votes` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 실전 활용 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: 티켓 운영 집계'
  structuredPrimary: true
  subtitle: Counter, defaultdict, deque, ChainMap 조합
  goal: '검증 루프: 티켓 운영 집계에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    collections는 단일 함수 암기가 아니라 운영 데이터 구조를 깔끔하게 만드는 도구입니다. 티켓 로그를 집계하고, 누락 키 오류를 잡고, 최근 이벤트와 설정 우선순위를 함께 검증합니다.

    변주 실험
    최근 3개가 아니라 최근 5개 상태를 기준으로 에러율을 계산하고, 경보 기준을 50%에서 40%로 낮췄을 때 경보 횟수가 어떻게 달라지는지 비교하세요.
  tips:
  - 변주 실험 최근 3개가 아니라 최근 5개 상태를 기준으로 에러율을 계산하고, 경보 기준을 50%에서 40%로 낮췄을 때 경보 횟수가 어떻게 달라지는지 비교하세요.
  snippet: |-
    ticketRows = [
        {"ticketId": "T-101", "owner": "min", "category": "bug", "priority": "high"},
        {"ticketId": "T-102", "owner": "seo", "category": "billing", "priority": "medium"},
        {"ticketId": "T-103", "owner": "min", "category": "bug", "priority": "low"},
        {"ticketId": "T-104", "owner": "jin", "category": "feature", "priority": "medium"},
        {"ticketId": "T-105", "owner": "seo", "category": "bug", "priority": "high"},
    ]

    def summarizeTickets(rows):
        categoryCounts = Counter(row["category"] for row in rows)
        priorityCounts = Counter(row["priority"] for row in rows)
        ticketsByOwner = defaultdict(list)

        for row in rows:
            ticketsByOwner[row["owner"]].append(row["ticketId"])

        return {
            "categoryCounts": categoryCounts,
            "priorityCounts": priorityCounts,
            "ticketsByOwner": dict(ticketsByOwner),
            "topCategory": categoryCounts.most_common(1)[0],
        }

    ticketSummary = summarizeTickets(ticketRows)

    assert ticketSummary["categoryCounts"]["bug"] == 3
    assert ticketSummary["priorityCounts"]["high"] == 2
    assert ticketSummary["ticketsByOwner"]["min"] == ["T-101", "T-103"]
    assert ticketSummary["topCategory"] == ("bug", 3)

    ticketSummary
