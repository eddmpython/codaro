sections:
- id: module_import
  title: itertools 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: itertools 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    itertools은 파이썬 표준 라이브러리입니다. 효율적인 반복과 조합을 위한 이터레이터 도구를 제공하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 itertools 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 itertools 모듈을 사용할 수 있습니다.
  snippet: |-
    from itertools import count, cycle, repeat, islice, combinations, permutations, product, chain, zip_longest, tee, filterfalse, takewhile, dropwhile, groupby, accumulate, combinations_with_replacement

    # 모듈 로드 확인
    'itertools 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: itertools 모듈 불러오기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      from itertools import count, cycle, repeat, islice, combinations, permutations, product, chain, zip_longest, tee, filterfalse, takewhile, dropwhile, groupby, accumulate, combinations_with_replacement

      # 모듈 로드 확인
      'itertools 모듈이 정상적으로 로드되었습니다'
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: itertools 모듈 불러오기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: itertools 모듈 불러오기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: infinite_iterators
  title: 무한 이터레이터
  structuredPrimary: true
  subtitle: count, cycle, repeat
  goal: 무한 이터레이터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    itertools는 메모리 효율적인 이터레이터를 제공합니다. count()는 무한 카운터, cycle()은 순환 반복, repeat()는 값 반복을 생성합니다. 무한 시퀀스를 다룰 때는 반드시 종료 조건이나 제한이 필요합니다.

    무한 이터레이터는 for 루프에서 break 없이 사용하면 무한 루프가 됩니다.
  tips:
  - 무한 이터레이터는 for 루프에서 break 없이 사용하면 무한 루프가 됩니다.
  snippet: |-
    counter = count(0)
    first5 = list(islice(counter, 5))
    first5
  exercise:
    prompt: 무한 이터레이터 예제에서 `counter`, `first5` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      counter = count(0)
      first5 = list(islice(counter, 5))
      first5
    hints:
    - 바꿀 지점은 `counter = ...` 오른쪽 값입니다.
    - 실행 뒤 `counter` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 무한 이터레이터에서 `counter` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 무한 이터레이터 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: combinatorics
  title: 조합과 순열
  structuredPrimary: true
  subtitle: combinations, permutations, product
  goal: 조합과 순열에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    조합론 함수로 모든 가능한 조합과 순열을 생성합니다. combinations()는 순서 무관 조합, permutations()는 순서 있는 순열, product()는 데카르트 곱을 반환합니다. 경우의 수 계산, 완전 탐색에 활용됩니다.

    조합과 순열의 차이: combinations([1,2,3], 2)는 (1,2)만, permutations는 (1,2)와 (2,1) 모두 포함.
  tips:
  - '조합과 순열의 차이: combinations([1,2,3], 2)는 (1,2)만, permutations는 (1,2)와 (2,1) 모두 포함.'
  snippet: |-
    choices = ['A', 'B', 'C']
    pairs = list(combinations(choices, 2))
    pairs
  exercise:
    prompt: 조합과 순열 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      choices = ['A', 'B', 'C']
      pairs = list(combinations(choices, 2))
      pairs
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 조합과 순열에서 `choices` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 조합과 순열 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: chaining
  title: 이터레이터 연결
  structuredPrimary: true
  subtitle: chain, zip_longest, tee
  goal: 이터레이터 연결에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    여러 이터레이터를 연결하거나 복제할 수 있습니다. chain()은 여러 이터레이터를 순차 연결하고, zip_longest()는 길이가 다른 이터레이터를 짝짓습니다. tee()는 하나의 이터레이터를 여러 개로 복제합니다.

    tee로 복제한 이터레이터는 독립적이므로 하나를 소진해도 다른 것에 영향을 주지 않습니다.
  tips:
  - tee로 복제한 이터레이터는 독립적이므로 하나를 소진해도 다른 것에 영향을 주지 않습니다.
  snippet: |-
    list1 = [1, 2, 3]
    list2 = [4, 5, 6]
    combined = list(chain(list1, list2))
    combined
  exercise:
    prompt: 이터레이터 연결 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      list1 = [1, 2, 3]
      list2 = [4, 5, 6]
      combined = list(chain(list1, list2))
      combined
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 이터레이터 연결에서 `list1` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 이터레이터 연결 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: filtering
  title: 필터링과 슬라이싱
  structuredPrimary: true
  subtitle: islice, filterfalse, takewhile, dropwhile
  goal: 필터링과 슬라이싱에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    이터레이터를 조건에 따라 필터링하거나 슬라이싱할 수 있습니다. islice()는 인덱스 범위로 자르고, filterfalse()는 조건을 만족하지 않는 것만, takewhile()은 조건이 참인 동안만 가져옵니다.

    takewhile과 filter의 차이: takewhile은 조건이 거짓이 되면 즉시 중단하지만 filter는 끝까지 검사합니다.
  tips:
  - 'takewhile과 filter의 차이: takewhile은 조건이 거짓이 되면 즉시 중단하지만 filter는 끝까지 검사합니다.'
  snippet: |-
    numbers = range(10)
    sliced = list(islice(numbers, 2, 6))
    sliced
  exercise:
    prompt: 필터링과 슬라이싱 예제에서 `numbers`, `sliced` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      numbers = range(10)
      sliced = list(islice(numbers, 2, 6))
      sliced
    hints:
    - 바꿀 지점은 `numbers = ...` 오른쪽 값입니다.
    - 실행 뒤 `numbers` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 필터링과 슬라이싱에서 `numbers` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 필터링과 슬라이싱 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: grouping
  title: 그룹화와 누적
  structuredPrimary: true
  subtitle: groupby, accumulate
  goal: 그룹화와 누적에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    연속된 동일 요소를 그룹화하거나 누적값을 계산합니다. groupby()는 정렬된 데이터에서 연속된 같은 값을 묶고, accumulate()는 누적 합계나 누적 연산을 수행합니다. 데이터 집계, 통계 분석에 유용합니다.

    groupby는 반드시 정렬된 데이터에 사용해야 합니다. 정렬되지 않으면 같은 값이 여러 그룹으로 나뉩니다.
  tips:
  - groupby는 반드시 정렬된 데이터에 사용해야 합니다. 정렬되지 않으면 같은 값이 여러 그룹으로 나뉩니다.
  snippet: |-
    data = [1, 1, 2, 2, 2, 3, 1]
    grouped = [(k, len(list(g))) for k, g in groupby(data)]
    grouped
  exercise:
    prompt: 그룹화와 누적 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      data = [1, 1, 2, 2, 2, 3, 1]
      grouped = [(k, len(list(g))) for k, g in groupby(data)]
      grouped
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 그룹화와 누적의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 그룹화와 누적 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: itertools 실무 패턴
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    실무에서 자주 사용하는 itertools 활용 패턴을 살펴봅니다. 배치 처리, 윈도우 슬라이딩, 페이지네이션, 조합 탐색 등 다양한 문제를 itertools로 효율적으로 해결할 수 있습니다.

    itertools 함수들은 제너레이터를 반환하므로 메모리를 절약합니다. 필요한 만큼만 소비하세요.
  tips:
  - itertools 함수들은 제너레이터를 반환하므로 메모리를 절약합니다. 필요한 만큼만 소비하세요.
  snippet: |-
    def chunk(iterable, size):
        iterator = iter(iterable)
        while True:
            batch = list(islice(iterator, size))
            if not batch:
                break
            yield batch

    dataset = range(10)
    batches = list(chunk(dataset, 3))
    batches
  exercise:
    prompt: 실전 활용 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def chunk(iterable, size):
          iterator = iter(iterable)
          while True:
              batch = list(islice(iterator, size))
              if not batch:
                  break
              yield batch

      dataset = range(10)
      batches = list(chunk(dataset, 3))
      batches
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 실전 활용 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '검증 루프: 이터레이터 데이터 파이프라인'
  structuredPrimary: true
  subtitle: 배치, groupby 정렬, 조합 탐색 검증
  goal: '검증 루프: 이터레이터 데이터 파이프라인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    itertools는 메모리를 아끼는 대신 이터레이터가 한 번 소비된다는 점과 groupby의 정렬 조건을 반드시 이해해야 합니다. 여기서는 작은 주문 데이터를 배치 처리하고, 일부러 정렬 누락 버그를 잡은 뒤, 조합 탐색을 제한해 안전하게 검증합니다.

    변주 실험
    프로모션 후보를 전부 만들지 않고 `islice(product(...), 10)`으로 상위 10개만 검토하는 흐름으로 바꿔 메모리 사용을 비교하세요.
  tips:
  - 변주 실험 프로모션 후보를 전부 만들지 않고 `islice(product(...), 10)`으로 상위 10개만 검토하는 흐름으로 바꿔 메모리 사용을 비교하세요.
  snippet: |-
    orderRows = [
        {"orderId": "O-101", "region": "KR", "amount": 120},
        {"orderId": "O-102", "region": "US", "amount": 80},
        {"orderId": "O-103", "region": "KR", "amount": 150},
        {"orderId": "O-104", "region": "JP", "amount": 60},
        {"orderId": "O-105", "region": "US", "amount": 90},
    ]

    def chunkRecords(records, size):
        if size <= 0:
            raise ValueError("size must be positive")
        iterator = iter(records)
        while True:
            batch = list(islice(iterator, size))
            if not batch:
                break
            yield batch

    orderBatches = list(chunkRecords(orderRows, size=2))
    flattenedOrders = list(chain.from_iterable(orderBatches))

    assert [len(batch) for batch in orderBatches] == [2, 2, 1]
    assert flattenedOrders == orderRows
    assert sum(row["amount"] for row in flattenedOrders) == 500

    orderBatches
  exercise:
    prompt: '검증 루프: 이터레이터 데이터 파이프라인 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      orderRows = [
          {"orderId": "O-101", "region": "KR", "amount": 120},
          {"orderId": "O-102", "region": "US", "amount": 80},
          {"orderId": "O-103", "region": "KR", "amount": 150},
          {"orderId": "O-104", "region": "JP", "amount": 60},
          {"orderId": "O-105", "region": "US", "amount": 90},
      ]

      def chunkRecords(records, size):
          if size <= 0:
              raise ValueError("size must be positive")
          iterator = iter(records)
          while True:
              batch = list(islice(iterator, size))
              if not batch:
                  break
              yield batch

      orderBatches = list(chunkRecords(orderRows, size=2))
      flattenedOrders = list(chain.from_iterable(orderBatches))

      assert [len(batch) for batch in orderBatches] == [2, 2, 1]
      assert flattenedOrders == orderRows
      assert sum(row["amount"] for row in flattenedOrders) == 500

      orderBatches
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: '검증 루프: 이터레이터 데이터 파이프라인의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '검증 루프: 이터레이터 데이터 파이프라인 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
