sections:
- id: module_import
  title: math 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: math 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    math는 파이썬 표준 수학 라이브러리입니다. 삼각함수, 로그, 지수, 반올림 등 다양한 수학 함수를 제공합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 math 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 math 모듈을 사용할 수 있습니다.
  snippet: |-
    import math

    # 정상 로드 확인
    math.pi
  exercise:
    prompt: math 모듈 불러오기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      import math

      # 정상 로드 확인
      math.pi
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: math 모듈 불러오기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: math 모듈 불러오기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: basic_functions
  title: 기본 수학 함수
  structuredPrimary: true
  subtitle: 자주 사용하는 핵심 함수
  goal: 기본 수학 함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    math 모듈은 파이썬의 표준 수학 라이브러리입니다. 제곱근, 거듭제곱, 절댓값 등 기본적인 수학 계산부터 과학 계산까지 다양한 함수를 제공합니다. 모든 함수는 부동소수점 연산을 수행하며, 정확하고 빠른 계산을 보장합니다.

    sqrt()는 음수에 사용하면 ValueError가 발생합니다. 복소수 계산은 cmath 모듈을 사용하세요.
  tips:
  - sqrt()는 음수에 사용하면 ValueError가 발생합니다. 복소수 계산은 cmath 모듈을 사용하세요.
  snippet: |-
    squareRoot = math.sqrt(16)
    squareRoot
  exercise:
    prompt: 기본 수학 함수 예제에서 `squareRoot` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      squareRoot = math.sqrt(16)
      squareRoot
    hints:
    - 바꿀 지점은 `squareRoot = ...` 오른쪽 값입니다.
    - 실행 뒤 `squareRoot` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 기본 수학 함수에서 `squareRoot` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 기본 수학 함수 실행 뒤 `squareRoot` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: trigonometric
  title: 삼각함수
  structuredPrimary: true
  subtitle: 각도와 라디안 계산
  goal: 삼각함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    삼각함수는 각도를 다루는 계산에 필수적입니다. math 모듈의 삼각함수는 라디안 단위를 사용하므로, 도(degree)를 라디안으로 변환해야 합니다. sin, cos, tan 함수와 역삼각함수 asin, acos, atan을 제공합니다.

    파이썬의 삼각함수는 라디안을 사용합니다. 도 단위는 radians()로 변환하세요.
  tips:
  - 파이썬의 삼각함수는 라디안을 사용합니다. 도 단위는 radians()로 변환하세요.
  snippet: |-
    angleInRadians = math.radians(45)
    angleInRadians
  exercise:
    prompt: 삼각함수 예제에서 `angleInRadians` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      angleInRadians = math.radians(45)
      angleInRadians
    hints:
    - 바꿀 지점은 `angleInRadians = ...` 오른쪽 값입니다.
    - 실행 뒤 `angleInRadians` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 삼각함수에서 `angleInRadians` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 삼각함수 실행 뒤 `angleInRadians` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: logarithmic
  title: 로그와 지수
  structuredPrimary: true
  subtitle: 지수 및 로그 함수
  goal: 로그와 지수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    로그와 지수 함수는 과학 계산, 금융, 데이터 분석에서 자주 사용됩니다. math.log()는 자연로그(밑이 e), math.log10()은 상용로그(밑이 10)를 계산합니다. math.exp()는 e의 거듭제곱을 계산합니다.

    log(x, base)로 임의의 밑을 지정할 수 있습니다. 예: math.log(8, 2) = 3
  tips:
  - 'log(x, base)로 임의의 밑을 지정할 수 있습니다. 예: math.log(8, 2) = 3'
  snippet: |-
    exponential = math.exp(1)
    exponential
  exercise:
    prompt: 로그와 지수 예제에서 `exponential` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      exponential = math.exp(1)
      exponential
    hints:
    - 바꿀 지점은 `exponential = ...` 오른쪽 값입니다.
    - 실행 뒤 `exponential` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 로그와 지수에서 `exponential` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 로그와 지수 실행 뒤 `exponential` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: rounding
  title: 반올림과 정수 변환
  structuredPrimary: true
  subtitle: 올림, 내림, 반올림
  goal: 반올림과 정수 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    수를 정수로 변환하는 방법은 여러 가지입니다. ceil()은 올림, floor()는 내림, trunc()는 소수점 제거를 수행합니다. round()는 내장 함수로 반올림하지만, math.modf()는 정수부와 소수부를 분리합니다.

    음수에서 ceil()과 floor()의 동작에 주의하세요. ceil(-3.2) = -3, floor(-3.2) = -4
  tips:
  - 음수에서 ceil()과 floor()의 동작에 주의하세요. ceil(-3.2) = -3, floor(-3.2) = -4
  snippet: |-
    ceilingValue = math.ceil(3.2)
    ceilingValue
  exercise:
    prompt: 반올림과 정수 변환 예제에서 `ceilingValue` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      ceilingValue = math.ceil(3.2)
      ceilingValue
    hints:
    - 바꿀 지점은 `ceilingValue = ...` 오른쪽 값입니다.
    - 실행 뒤 `ceilingValue` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 반올림과 정수 변환에서 `ceilingValue` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 반올림과 정수 변환 실행 뒤 `ceilingValue` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: constants
  title: 수학 상수
  structuredPrimary: true
  subtitle: 파이와 자연상수
  goal: 수학 상수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    math 모듈은 중요한 수학 상수를 제공합니다. math.pi는 원주율(3.141592...), math.e는 자연상수(2.718281...), math.tau는 2π, math.inf는 무한대를 나타냅니다. 이 상수들은 과학 계산에 필수적입니다.

    math.tau는 2π로, 라디안 계산에서 더 직관적입니다. 한 바퀴는 tau 라디안입니다.
  tips:
  - math.tau는 2π로, 라디안 계산에서 더 직관적입니다. 한 바퀴는 tau 라디안입니다.
  snippet: |-
    radius = 5
    circleArea = math.pi * radius ** 2
    circleArea
  exercise:
    prompt: 수학 상수 예제에서 `radius`, `circleArea` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      radius = 5
      circleArea = math.pi * radius ** 2
      circleArea
    hints:
    - 바꿀 지점은 `radius = ...` 오른쪽 값입니다.
    - 실행 뒤 `radius` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 수학 상수에서 `radius` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 수학 상수 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 계산 예제
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    math 모듈을 실전에서 활용하는 예제를 살펴봅니다. 거리 계산, 각도 변환, 통계 계산 등 다양한 분야에서 수학 함수를 조합하여 복잡한 문제를 해결할 수 있습니다.

    hypot()는 여러 인자를 받을 수 있습니다. math.hypot(3, 4, 5)로 3차원 거리를 계산할 수 있습니다.
  tips:
  - hypot()는 여러 인자를 받을 수 있습니다. math.hypot(3, 4, 5)로 3차원 거리를 계산할 수 있습니다.
  snippet: |-
    hypotenuse = math.hypot(3, 4)
    hypotenuse
  exercise:
    prompt: 실전 활용 예제에서 `hypotenuse` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      hypotenuse = math.hypot(3, 4)
      hypotenuse
    hints:
    - 바꿀 지점은 `hypotenuse = ...` 오른쪽 값입니다.
    - 실행 뒤 `hypotenuse` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용에서 `hypotenuse` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 실전 활용 실행 뒤 `hypotenuse` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: 업무 계산 리포트'
  structuredPrimary: true
  subtitle: 오차 허용, 단위 확인, 운영 기준 계산
  goal: '검증 루프: 업무 계산 리포트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    실무 계산에서는 값이 출력되는 것보다 검증 기준이 더 중요합니다. 부동소수점 결과는 math.isclose()로 비교하고, 각도 단위처럼 자주 틀리는 입력은 일부러 깨뜨려 보면서 검증합니다.

    변주 실험
    거리 계산을 2차원 좌표에서 3차원 좌표로 바꾸고, `math.hypot(x, y, z)` 결과가 직접 제곱합을 계산한 값과 같은지 비교하세요.
  tips:
  - 변주 실험 거리 계산을 2차원 좌표에서 3차원 좌표로 바꾸고, `math.hypot(x, y, z)` 결과가 직접 제곱합을 계산한 값과 같은지 비교하세요.
  snippet: |-
    sites = [
        {"name": "warehouseA", "x": 0, "y": 0, "radius": 4},
        {"name": "warehouseB", "x": 3, "y": 4, "radius": 6},
        {"name": "warehouseC", "x": -5, "y": 12, "radius": 3},
    ]

    def buildSiteMathReport(siteRows):
        report = []
        for site in siteRows:
            distance = math.hypot(site["x"], site["y"])
            coverageArea = math.pi * site["radius"] ** 2
            report.append({
