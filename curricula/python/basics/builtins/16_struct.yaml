sections:
- id: module_import
  title: struct 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: struct 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    struct는 파이썬 표준 라이브러리입니다. Python 값과 C 구조체 형태의 바이너리 데이터 간 변환을 제공하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 struct 모듈을 사용할 수 있습니다.
  snippet: |-
    import struct
    import tempfile
    from pathlib import Path

    structScratch = Path(tempfile.gettempdir()) / 'codaro_struct_scratch'
    structScratch.mkdir(parents=True, exist_ok=True)

    'struct 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: struct 모듈 불러오기 예제에서 `structScratch` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      import struct
      import tempfile
      from pathlib import Path

      structScratch = Path(tempfile.gettempdir()) / 'codaro_struct_scratch'
      structScratch.mkdir(parents=True, exist_ok=True)

      'struct 모듈이 정상적으로 로드되었습니다'
    hints:
    - 바꿀 지점은 `structScratch = ...` 오른쪽 값입니다.
    - 실행 뒤 `structScratch` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: struct 모듈 불러오기에서 `structScratch` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: struct 모듈 불러오기 실행 뒤 `structScratch` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: basic_packing
  title: 바이너리로 변환
  structuredPrimary: true
  subtitle: pack으로 인코딩
  goal: 바이너리로 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    struct.pack()은 Python 값을 바이너리 데이터로 변환합니다. 포맷 문자열로 데이터 타입과 순서를 지정하면 C 구조체처럼 메모리에 바이트로 배치됩니다. 네트워크 프로토콜, 바이너리 파일 포맷, 임베디드 시스템 통신에 필수적입니다.

    포맷 문자: i=정수(4바이트), f=float(4바이트), d=double(8바이트), c=문자(1바이트)
  snippet: |-
    numberValue = 42
    packedInt = struct.pack('i', numberValue)
    packedInt
  exercise:
    prompt: 바이너리로 변환 예제에서 `numberValue`, `packedInt` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      numberValue = 42
      packedInt = struct.pack('i', numberValue)
      packedInt
    hints:
    - 바꿀 지점은 `numberValue = ...` 오른쪽 값입니다.
    - 실행 뒤 `numberValue` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 바이너리로 변환에서 `numberValue` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 바이너리로 변환 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: basic_unpacking
  title: 바이너리 읽기
  structuredPrimary: true
  subtitle: unpack으로 디코딩
  goal: 바이너리 읽기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    struct.unpack()은 바이너리 데이터를 Python 값으로 변환합니다. pack()과 동일한 포맷 문자열을 사용하여 바이트를 해석하고 튜플로 반환합니다. 바이너리 파일 읽기, 네트워크 패킷 파싱, 프로토콜 디코딩에 활용됩니다.

    unpack()은 항상 튜플을 반환하므로 단일 값도 [0]으로 접근해야 합니다.
  snippet: |-
    binaryData = struct.pack('i', 100)
    unpackedInt = struct.unpack('i', binaryData)
    unpackedInt[0]
  exercise:
    prompt: 바이너리 읽기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      binaryData = struct.pack('i', 100)
      unpackedInt = struct.unpack('i', binaryData)
      unpackedInt[0]
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 바이너리 읽기에서 `binaryData` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 바이너리 읽기 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: format_strings
  title: 포맷 문자열
  structuredPrimary: true
  subtitle: 데이터 타입 지정
  goal: 포맷 문자열에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    포맷 문자열은 데이터의 타입, 크기, 순서를 지정합니다. c는 1바이트 문자, h는 2바이트 정수, i는 4바이트 정수, f는 4바이트 실수입니다. 반복 횟수를 숫자로 지정할 수 있으며, 다양한 타입을 조합하여 복잡한 구조체를 표현합니다.

    포맷과 실제 데이터 개수가 일치하지 않으면 에러가 발생합니다.
  snippet: |-
    mixedData = struct.pack('cif', b'A', 42, 3.14)
    len(mixedData)
  exercise:
    prompt: 포맷 문자열 예제에서 `mixedData` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      mixedData = struct.pack('cif', b'A', 42, 3.14)
      len(mixedData)
    hints:
    - 바꿀 지점은 `mixedData = ...` 오른쪽 값입니다.
    - 실행 뒤 `mixedData` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 포맷 문자열에서 `mixedData` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 포맷 문자열 실행 뒤 `mixedData` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: byte_order
  title: 바이트 순서
  structuredPrimary: true
  subtitle: 엔디안 지정
  goal: 바이트 순서에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    바이트 순서는 다중 바이트 값을 메모리에 저장하는 방식입니다. 네이티브(@), 리틀엔디안(<), 빅엔디안(>)을 포맷 앞에 지정할 수 있습니다. 네트워크 프로토콜은 보통 빅엔디안을 사용하며, Intel CPU는 리틀엔디안입니다.

    네트워크 통신에는 '>' 또는 '!'를 사용하여 플랫폼에 관계없이 일관된 바이트 순서를 유지하세요.
  snippet: |-
    nativeBytes = struct.pack('@i', 1000)
    nativeBytes
  exercise:
    prompt: 바이트 순서 예제에서 `nativeBytes` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      nativeBytes = struct.pack('@i', 1000)
      nativeBytes
    hints:
    - 바꿀 지점은 `nativeBytes = ...` 오른쪽 값입니다.
    - 실행 뒤 `nativeBytes` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 바이트 순서에서 `nativeBytes` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 바이트 순서 실행 뒤 `nativeBytes` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: advanced_formats
  title: 고급 포맷
  structuredPrimary: true
  subtitle: 문자열과 패딩
  goal: 고급 포맷에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    struct는 고정 길이 문자열과 패딩을 지원합니다. s는 고정 길이 문자열, x는 패딩 바이트를 나타냅니다. 바이너리 파일 헤더나 고정 크기 레코드를 다룰 때 유용하며, 메모리 정렬을 맞추는 데도 사용됩니다.

    문자열은 바이트 객체여야 하며, 길이가 부족하면 null 바이트로 채워집니다.
  snippet: |-
    textBytes = struct.pack('10s', b'Hello')
    textBytes
  exercise:
    prompt: 고급 포맷 예제에서 `textBytes` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      textBytes = struct.pack('10s', b'Hello')
      textBytes
    hints:
    - 바꿀 지점은 `textBytes = ...` 오른쪽 값입니다.
    - 실행 뒤 `textBytes` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 고급 포맷에서 `textBytes` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 고급 포맷 실행 뒤 `textBytes` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 파일 헤더와 프로토콜
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    실무에서 자주 사용하는 struct 활용 패턴을 살펴봅니다. 바이너리 파일 헤더 읽기/쓰기, 네트워크 프로토콜 구현, 센서 데이터 파싱 등 다양한 시나리오에서 struct를 효과적으로 사용할 수 있습니다.

    바이너리 파일을 읽을 때는 정확한 포맷을 알아야 하므로, 파일 형식 문서를 잘 관리하세요.
  snippet: |-
    magicNumber = 0x12345678
    version = 1
    dataSize = 1024
    headerBytes = struct.pack('>III', magicNumber, version, dataSize)
    len(headerBytes)
  exercise:
    prompt: 실전 활용 예제에서 `magicNumber`, `version`, `dataSize` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      magicNumber = 0x12345678
      version = 1
      dataSize = 1024
      headerBytes = struct.pack('>III', magicNumber, version, dataSize)
      len(headerBytes)
    hints:
    - 바꿀 지점은 `magicNumber = ...` 오른쪽 값입니다.
    - 실행 뒤 `magicNumber` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용에서 `magicNumber` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 실전 활용 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: 바이너리 레코드 품질 게이트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: '검증 루프: 바이너리 레코드 품질 게이트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: struct는 바이트 길이와 엔디안이 하나만 어긋나도 데이터를 잘못 해석합니다. 여기서는 센서 패킷 포맷을 미리 정의하고, 잘린 패킷과 잘못된 매직 넘버를
    실패시킨 뒤, 정상 레코드를 파일로 저장하고 다시 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    structWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_struct_workflow_'))
    packetFormat = '>4sBIfH'
    packetSize = struct.calcsize(packetFormat)
    magicBytes = b'CDRO'

    def encodeSensorPacket(sensorId, temperature, humidity):
        assert 0 <= humidity <= 100, 'humidity는 0~100 범위여야 합니다'
        return struct.pack(packetFormat, magicBytes, 1, sensorId, temperature, humidity)

    def decodeSensorPacket(packet):
        assert len(packet) == packetSize, '패킷 길이가 포맷과 다릅니다'
        magic, version, sensorId, temperature, humidity = struct.unpack(packetFormat, packet)
        assert magic == magicBytes, '매직 넘버가 다릅니다'
        assert version == 1, '지원하지 않는 버전입니다'
        return {
            'sensorId': sensorId,
            'temperature': round(temperature, 2),
            'humidity': humidity
        }

    sensorPacket = encodeSensorPacket(7, 23.5, 45)
    decodedSensor = decodeSensorPacket(sensorPacket)
    assert decodedSensor['sensorId'] == 7
    decodedSensor
  exercise:
    prompt: '검증 루프: 바이너리 레코드 품질 게이트 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      structWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_struct_workflow_'))
      packetFormat = '>4sBIfH'
      packetSize = struct.calcsize(packetFormat)
      magicBytes = b'CDRO'

      def encodeSensorPacket(sensorId, temperature, humidity):
          assert 0 <= humidity <= 100, 'humidity는 0~100 범위여야 합니다'
          return struct.pack(packetFormat, magicBytes, 1, sensorId, temperature, humidity)

      def decodeSensorPacket(packet):
          assert len(packet) == packetSize, '패킷 길이가 포맷과 다릅니다'
          magic, version, sensorId, temperature, humidity = struct.unpack(packetFormat, packet)
          assert magic == magicBytes, '매직 넘버가 다릅니다'
          assert version == 1, '지원하지 않는 버전입니다'
          return {
              'sensorId': sensorId,
              'temperature': round(temperature, 2),
              'humidity': humidity
          }

      sensorPacket = encodeSensorPacket(7, 23.5, 45)
      decodedSensor = decodeSensorPacket(sensorPacket)
      assert decodedSensor['sensorId'] == 7
      decodedSensor
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: '검증 루프: 바이너리 레코드 품질 게이트의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '검증 루프: 바이너리 레코드 품질 게이트 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
