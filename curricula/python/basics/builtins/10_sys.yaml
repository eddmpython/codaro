meta:
  id: 10_sys
  title: sys - 시스템 파라미터
  category: builtins
  tags:
  - sys
  - 시스템
  - 버전
  - 경로
  - 인터프리터
  seo:
    title: 파이썬 sys 모듈 완전 정복
    description: sys 모듈로 시스템 정보, 모듈 경로, 표준 스트림을 배웁니다.
