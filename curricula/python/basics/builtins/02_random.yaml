    - label: random 난수 생성 재사용
      detail: 완성 코드를 표준 라이브러리 유틸리티에 붙일 수 있게 정리합니다.
    runtime:
    - label: 표준 라이브러리 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: random 난수 생성 실행
      detail: 셀을 실행해 반환값, stdout, 객체 상태와 예외 상태를 확인합니다.
    - label: random 난수 생성 완료
      detail: 검증된 코드를 표준 라이브러리 유틸리티로 남깁니다.
sections:
- id: module_import
  title: random 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: random 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    random은 파이썬 표준 라이브러리입니다. 난수를 생성하고 무작위 선택을 수행하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 random 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 random 모듈을 사용할 수 있습니다.
  snippet: |-
    import random

    # 모듈 로드 확인
    'random 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: random 모듈 불러오기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      import random

      # 모듈 로드 확인
      'random 모듈이 정상적으로 로드되었습니다'
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: random 모듈 불러오기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: random 모듈 불러오기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: basic_random
  title: 기본 난수 생성
  structuredPrimary: true
  subtitle: 실수와 정수 난수
  goal: 기본 난수 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    random 모듈은 난수를 생성하는 파이썬 표준 라이브러리입니다. random()은 0.0 이상 1.0 미만의 실수를 반환하고, randint()는 지정 범위의 정수를 반환합니다. uniform()은 특정 범위의 실수를 생성합니다. 게임, 시뮬레이션, 테스트 데이터 생성에 필수적입니다.

    randint(a, b)는 a와 b를 모두 포함하지만, randrange(a, b)는 b를 포함하지 않습니다.
  tips:
  - randint(a, b)는 a와 b를 모두 포함하지만, randrange(a, b)는 b를 포함하지 않습니다.
  snippet: |-
    randomFloat = random.random()
    randomFloat
  exercise:
    prompt: 기본 난수 생성 예제에서 `randomFloat` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      randomFloat = random.random()
      randomFloat
    hints:
    - 바꿀 지점은 `randomFloat = ...` 오른쪽 값입니다.
    - 실행 뒤 `randomFloat` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 기본 난수 생성에서 `randomFloat` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 기본 난수 생성 실행 뒤 `randomFloat` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: sequence_operations
  title: 시퀀스 무작위 선택
  structuredPrimary: true
  subtitle: 리스트에서 선택하기
  goal: 시퀀스 무작위 선택에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    시퀀스에서 무작위로 요소를 선택하는 함수들입니다. choice()는 하나를 선택하고, choices()는 여러 개를 중복 허용하여 선택합니다. sample()은 중복 없이 여러 개를 선택합니다. 이들은 추첨, 무작위 샘플링, 게임 구현에 유용합니다.

    sample()의 k는 모집단 크기를 초과할 수 없지만, choices()는 가능합니다.
  tips:
  - sample()의 k는 모집단 크기를 초과할 수 없지만, choices()는 가능합니다.
  snippet: |-
    fruits = ['apple', 'banana', 'cherry', 'date']
    chosen = random.choice(fruits)
    chosen
  exercise:
    prompt: 시퀀스 무작위 선택 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      fruits = ['apple', 'banana', 'cherry', 'date']
      chosen = random.choice(fruits)
      chosen
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 시퀀스 무작위 선택에서 `fruits` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 시퀀스 무작위 선택 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: shuffling
  title: 셔플과 섞기
  structuredPrimary: true
  subtitle: 순서 무작위화
  goal: 셔플과 섞기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    shuffle()은 리스트를 제자리에서 무작위로 섞습니다. 카드 게임, 플레이리스트 섞기, 데이터 무작위화에 사용됩니다. 원본 리스트가 변경되므로 주의해야 하며, 복사본을 만들어 섞는 것이 안전합니다.

    shuffle()은 반환값이 없습니다. shuffled = random.shuffle(list)는 None을 반환합니다.
  tips:
  - shuffle()은 반환값이 없습니다. shuffled = random.shuffle(list)는 None을 반환합니다.
  snippet: |-
    deck = [1, 2, 3, 4, 5]
    random.shuffle(deck)
    deck
  exercise:
    prompt: 셔플과 섞기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      deck = [1, 2, 3, 4, 5]
      random.shuffle(deck)
      deck
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    type: noError
    noError: 셔플과 섞기에서 `deck` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 셔플과 섞기 실행 뒤 `deck` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: distributions
  title: 확률 분포
  structuredPrimary: true
  subtitle: 통계적 난수 생성
  goal: 확률 분포에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    random 모듈은 다양한 확률 분포를 지원합니다. 정규분포(gauss), 삼각분포(triangular), 베타분포(betavariate) 등 통계적 시뮬레이션과 과학 계산에 사용되는 분포들을 제공합니다. 실제 데이터를 모방하는 테스트 데이터를 생성할 때 유용합니다.

    gauss()는 정규분포를, normalvariate()는 스레드 안전한 정규분포를 생성합니다.
  tips:
  - gauss()는 정규분포를, normalvariate()는 스레드 안전한 정규분포를 생성합니다.
  snippet: |-
    normalValue = random.gauss(100, 15)
    normalValue
  exercise:
    prompt: 확률 분포 예제에서 `normalValue` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      normalValue = random.gauss(100, 15)
      normalValue
    hints:
    - 바꿀 지점은 `normalValue = ...` 오른쪽 값입니다.
    - 실행 뒤 `normalValue` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 확률 분포에서 `normalValue` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 확률 분포 실행 뒤 `normalValue` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: seed_control
  title: 시드와 재현성
  structuredPrimary: true
  subtitle: 난수 제어하기
  goal: 시드와 재현성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    seed()는 난수 생성기의 시작점을 설정합니다. 같은 시드를 사용하면 항상 같은 난수 시퀀스가 생성되어 재현 가능한 결과를 얻을 수 있습니다. 디버깅, 테스트, 과학 실험에서 필수적입니다. getstate()와 setstate()로 난수 생성기 상태를 저장하고 복원할 수 있습니다.

    시드를 설정하지 않으면 시스템 시간을 기반으로 난수가 생성됩니다.
  tips:
  - 시드를 설정하지 않으면 시스템 시간을 기반으로 난수가 생성됩니다.
  snippet: |-
    random.seed(42)
    firstValue = random.randint(1, 100)
    random.seed(42)
    secondValue = random.randint(1, 100)
    firstValue, secondValue
  exercise:
    prompt: 시드와 재현성 예제에서 `firstValue`, `secondValue` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      random.seed(42)
      firstValue = random.randint(1, 100)
      random.seed(42)
      secondValue = random.randint(1, 100)
      firstValue, secondValue
    hints:
    - 바꿀 지점은 `firstValue = ...` 오른쪽 값입니다.
    - 실행 뒤 `firstValue` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 시드와 재현성에서 `firstValue` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 시드와 재현성 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical_applications
  title: 실전 활용
  structuredPrimary: true
  subtitle: 게임과 시뮬레이션
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    random 모듈의 실전 활용 예제를 살펴봅니다. 주사위 굴리기, 동전 던지기, 비밀번호 생성, 로또 번호 추첨 등 실생활 문제를 해결할 수 있습니다. 여러 함수를 조합하여 복잡한 무작위 작업을 구현합니다.

    보안이 중요한 경우 secrets 모듈을 사용하세요. random은 암호학적으로 안전하지 않습니다.
  tips:
  - 보안이 중요한 경우 secrets 모듈을 사용하세요. random은 암호학적으로 안전하지 않습니다.
  snippet: |-
    dice1 = random.randint(1, 6)
    dice2 = random.randint(1, 6)
    dice1, dice2, dice1 + dice2
  exercise:
    prompt: 실전 활용 예제에서 `dice1`, `dice2` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      dice1 = random.randint(1, 6)
      dice2 = random.randint(1, 6)
      dice1, dice2, dice1 + dice2
    hints:
    - 바꿀 지점은 `dice1 = ...` 오른쪽 값입니다.
    - 실행 뒤 `dice1` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용에서 `dice1` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 실전 활용 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: 재현 가능한 샘플링'
  structuredPrimary: true
  subtitle: seed, 원본 보호, 확률 분포 점검
  goal: '검증 루프: 재현 가능한 샘플링에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
