meta:
  id: 25_logging
  title: logging - 로깅
  category: builtins
  tags:
  - logging
  - 로그
  - logger
  - debug
  - handler
  description: 애플리케이션 실행 기록을 체계적으로 남기는 logging 표준 라이브러리
  keywords:
  - logging
  - 로그
  - logger
  - debug
  - handler
intro:
  emoji: 📝
  points:
  - 5단계 로그 레벨로 출력 필터링
  - basicConfig으로 루트 로거 한 번에 설정
  - Formatter로 시간/레벨/메시지 포맷 지정
  - Handler로 콘솔/파일/스트림 등 출력 대상 분리
  - getLogger 이름 계층으로 모듈별 로깅
  direction: logging으로 print 디버그를 대체해 운영에서 검색 가능한 로그를 남기는 흐름을 익힙니다.
  benefits:
  - 5단계 레벨로 개발과 운영에서 다른 로그만 보이게 필터링합니다.
  - StreamHandler에 StringIO를 연결해 테스트에서 로그 출력을 검증합니다.
  - Formatter로 시간, 레벨, 메시지를 표준 포맷으로 통일해 grep 가능한 로그를 만듭니다.
  - getLogger 이름 계층으로 모듈별 로거를 분리해 영향 범위를 좁힙니다.
  diagram:
    steps:
    - label: 로그 레벨 정하기
      detail: DEBUG, INFO, WARNING, ERROR, CRITICAL 중 어디까지 출력할지 결정합니다.
    - label: Formatter 구성
      detail: asctime, levelname, name, message 같은 필드로 한 줄 포맷을 만듭니다.
    - label: Handler 연결
      detail: StreamHandler/FileHandler에 Formatter를 붙여 출력 대상을 정합니다.
    - label: getLogger 호출
      detail: 이름 있는 로거에 Handler를 등록하고 record를 발생시킵니다.
    runtime:
    - label: 표준 라이브러리 환경
      detail: logging은 파이썬 표준이라 별도 설치 없이 import만 하면 됩니다.
    - label: StringIO로 검증
      detail: 파일/콘솔 대신 io.StringIO를 핸들러에 연결해 셀 안에서 로그 본문을 점검합니다.
    - label: handlers 정리
      detail: 같은 로거에 같은 핸들러를 두 번 붙이지 않도록 handlers.clear()로 시작합니다.
sections:
- id: module_import
  title: 모듈 임포트와 기본 출력
  structuredPrimary: true
  subtitle: import logging 한 줄로 시작
  goal: logging을 import하고 logging.warning 한 줄이 stderr에 그대로 찍히는 기본 동작을 확인합니다.
  why: print는 운영에서 무엇이 메시지인지 분류할 수 없습니다. logging은 메시지마다 레벨, 시간, 로거 이름을 붙여 줘 grep/조회 가능한 형태로 남깁니다.
  explanation: |-
    logging은 파이썬 표준 라이브러리라 import logging 한 줄이면 바로 사용할 수 있습니다.
    설정 없이 logging.warning(msg)/logging.error(msg)를 호출하면 stderr로 출력되고, 기본 포맷은 "LEVELNAME:logger:message" 형태입니다.
    notebook에서는 이 출력이 셀 stderr 영역에 표시되며, 셀 마지막 표현식의 반환값과는 독립입니다.
  tips:
  - 기본 루트 로거는 첫 record 직전에 자동으로 핸들러를 생성하므로, import 직후 한 번만 호출해도 출력이 나옵니다.
  - 출력은 stdout이 아닌 stderr이라 stdout 캡처 로직과는 분리해 다뤄야 합니다.
  snippet: |-
    import logging

    logging.warning('warmup warning')
    logging.error('warmup error')

    "logging module ready"
  exercise:
    prompt: logging.warning과 logging.error의 메시지 문자열을 각각 다른 값으로 바꿔 stderr에 두 줄이 나오는지 확인하세요.
    starterCode: |-
      import logging

      logging.warning('___')
      logging.error('___')

      "logging module ready"
    hints:
    - 메시지 자리에는 문자열 리터럴이 들어가야 합니다.
    - 마지막 표현식 "logging module ready"는 셀 결과로 그대로 반환됩니다.
    check:
      noError: logging.warning과 logging.error가 NameError 없이 실행되어야 합니다.
      resultCheck: 셀 반환값이 "logging module ready" 문자열이어야 합니다.
  check:
    type: noError
    noError: import logging과 warning/error 호출이 NameError 없이 끝나야 합니다.
    resultCheck: 셀 반환값이 "logging module ready"이고 stderr에 WARNING/ERROR 두 줄이 보여야 합니다.
- id: log_levels
  title: 로그 레벨과 필터링
  structuredPrimary: true
  subtitle: DEBUG ~ CRITICAL 5단계
  goal: basicConfig(level=...)로 루트 로거 레벨을 바꿔서 어떤 레벨까지 출력에 포함되는지 직접 확인합니다.
  why: 로그 레벨은 같은 코드를 개발에서는 DEBUG까지, 운영에서는 INFO/WARNING부터 보이게 만들어 줍니다. 레벨을 모르고 logging을 쓰면 운영 로그가 안 보이거나 너무 많이 보입니다.
  explanation: |-
    로그 레벨은 숫자값을 갖습니다: DEBUG=10, INFO=20, WARNING=30, ERROR=40, CRITICAL=50.
    로거에 설정된 레벨보다 같거나 높은 record만 핸들러로 전달됩니다. 기본 루트 로거 레벨은 WARNING이라 별 설정 없이는 DEBUG/INFO가 사라집니다.
    basicConfig(level=logging.DEBUG, force=True)는 한 번에 루트 로거 레벨과 기본 핸들러를 구성합니다. force=True는 같은 셀을 다시 실행해도 핸들러가 중복 등록되지 않게 합니다.
  tips:
  - basicConfig는 첫 호출에만 효과가 있어서 노트북에서 재실행 시 force=True가 필요합니다.
  - 운영 환경의 일반적인 기준은 INFO입니다. DEBUG는 진단용으로 한정합니다.
  snippet: |-
    import logging

    logging.basicConfig(level=logging.DEBUG, force=True)

    logging.debug('debug 메시지는 DEBUG 레벨에서만 보입니다')
    logging.info('info 메시지는 INFO 이상에서 보입니다')
    logging.warning('warning 메시지')
    logging.error('error 메시지')
    logging.critical('critical 메시지')

    [logging.DEBUG, logging.INFO, logging.WARNING, logging.ERROR, logging.CRITICAL]
  exercise:
    prompt: basicConfig의 level을 logging.WARNING으로 바꿔 같은 5줄 중 DEBUG/INFO가 사라지는지 확인하세요. 셀 반환값은 5개 정수 리스트 그대로 둡니다.
    starterCode: |-
      import logging

      logging.basicConfig(level=logging.___, force=True)

      logging.debug('debug')
      logging.info('info')
      logging.warning('warning')
      logging.error('error')
      logging.critical('critical')

      [logging.DEBUG, logging.INFO, logging.WARNING, logging.ERROR, logging.CRITICAL]
    hints:
    - level 값으로 logging.WARNING (=30)을 넣으면 DEBUG/INFO record는 핸들러로 가지 않습니다.
    - DEBUG가 가장 작은 숫자, CRITICAL이 가장 큰 숫자입니다.
    check:
      noError: basicConfig와 5개 로그 호출이 NameError 없이 끝나야 합니다.
      resultCheck: 셀 반환값이 [10, 20, 30, 40, 50] 리스트여야 합니다.
  check:
    type: noError
    noError: basicConfig(level=...) 호출이 끝나고 5개 로그 record가 발생해야 합니다.
    resultCheck: 셀 반환값이 [10, 20, 30, 40, 50]이고, 설정한 레벨 미만은 stderr에 보이지 않아야 합니다.
- id: formatters
  title: Formatter로 출력 포맷 지정
  structuredPrimary: true
  subtitle: asctime, levelname, name, message
  goal: logging.Formatter에 포맷 문자열과 datefmt을 넘겨 한 record의 출력 한 줄을 원하는 모양으로 만듭니다.
  why: 기본 포맷("LEVEL:logger:message")은 사람이 보기는 되지만 자동화/그렙에는 부족합니다. Formatter를 정의하면 시간, 모듈명, 메시지를 표준 위치에 두어 다음 단계의 로그 파이프라인이 다룰 수 있게 됩니다.
  explanation: |-
    Formatter는 LogRecord 객체를 받아 문자열을 만듭니다. 포맷 문자열은 "%(field)s" 스타일을 쓰며, 자주 쓰이는 필드는 asctime(시간), levelname(레벨 이름), name(로거 이름), message(메시지), funcName, lineno, pathname 등입니다.
    datefmt은 asctime을 strftime 형식으로 다시 포맷합니다. 지정하지 않으면 기본 ISO 비슷한 포맷이 나옵니다.
    Formatter는 보통 Handler에 setFormatter로 붙입니다. 같은 로거에 여러 핸들러가 있을 때 각각 다른 Formatter를 쓰는 것도 흔합니다.
  tips:
  - asctime을 쓰려면 Formatter가 자동으로 LogRecord.created를 strftime으로 변환합니다. 직접 시간 문자열을 만들 필요는 없습니다.
  - message에는 logger.info("a %s b", x) 형태의 lazy 포맷이 권장됩니다. f-string은 record 발생 시점에 즉시 평가되어 비싸지만, %-스타일은 핸들러 도달 시에만 평가됩니다.
  snippet: |-
    import io
    import logging

    formatterDemoStream = io.StringIO()
    formatterDemoHandler = logging.StreamHandler(formatterDemoStream)
    formatterDemoHandler.setFormatter(
        logging.Formatter(
            '%(asctime)s|%(levelname)s|%(name)s|%(message)s',
            datefmt='%H:%M:%S',
        )
    )

    formatterDemoLogger = logging.getLogger('codaro.formatter.demo')
    formatterDemoLogger.handlers.clear()
    formatterDemoLogger.propagate = False
    formatterDemoLogger.setLevel(logging.INFO)
    formatterDemoLogger.addHandler(formatterDemoHandler)

    formatterDemoLogger.info('포맷 적용 확인')

    sampleLine = formatterDemoStream.getvalue().strip()
    sampleLine.split('|')
  exercise:
    prompt: Formatter 포맷 문자열에서 levelname과 name 위치를 바꿔 sampleLine.split('|') 결과의 인덱스 1, 2 순서가 바뀌는지 확인하세요.
    starterCode: |-
      import io
      import logging

      swapStream = io.StringIO()
      swapHandler = logging.StreamHandler(swapStream)
      swapHandler.setFormatter(
          logging.Formatter(
              '%(asctime)s|%(___)s|%(___)s|%(message)s',
              datefmt='%H:%M:%S',
          )
      )

      swapLogger = logging.getLogger('codaro.formatter.swap')
      swapLogger.handlers.clear()
      swapLogger.propagate = False
      swapLogger.setLevel(logging.INFO)
      swapLogger.addHandler(swapHandler)

      swapLogger.info('순서 바꾸기')

      swapLine = swapStream.getvalue().strip().split('|')
      swapLine
    hints:
    - 첫 빈칸에는 name, 두 번째 빈칸에는 levelname을 넣어 보세요.
    - 결과 리스트 인덱스 1이 로거 이름, 인덱스 2가 레벨 이름이 되어야 합니다.
    check:
      noError: StringIO와 StreamHandler 설정이 NameError 없이 끝나야 합니다.
      resultCheck: swapLine이 4개 요소 리스트이고 인덱스 1이 'codaro.formatter.swap'이어야 합니다.
  check:
    type: noError
    noError: Formatter와 StreamHandler 구성이 NameError, AttributeError 없이 끝나야 합니다.
    resultCheck: sampleLine.split('|')이 4개 요소를 갖고 인덱스 1이 'INFO'여야 합니다.
- id: handlers
  title: Handler로 출력 대상 분리
  structuredPrimary: true
  subtitle: StreamHandler, StringIO, 파일 핸들러
  goal: 같은 로거에 두 개의 핸들러를 붙여 한 record가 두 곳으로 동시에 흘러가게 만듭니다.
  why: 운영에서는 흔히 콘솔에는 INFO 이상, 파일에는 DEBUG 전부 같은 식으로 출력 대상별로 다른 정책을 둡니다. Handler를 독립적으로 다루는 사고를 익히면 같은 로그를 여러 형태로 보낼 수 있습니다.
  explanation: |-
    Handler는 record를 받아 특정 대상으로 내보내는 객체입니다. StreamHandler(stream)은 stream.write으로 보내고, FileHandler(path)는 파일에 추가합니다.
    각 Handler에 setLevel을 따로 줄 수 있어서 같은 로거에 붙어 있어도 출력 대상마다 임계값이 다릅니다. 로거 레벨이 가장 큰 1차 필터, 핸들러 레벨이 2차 필터입니다.
    StringIO에 쓰는 핸들러는 테스트와 노트북 검증에 매우 유용합니다. 핸들러의 stream.getvalue()로 누적된 출력 전체를 검사할 수 있습니다.
  tips:
  - 노트북에서 같은 셀을 여러 번 실행하면 핸들러가 누적됩니다. 항상 logger.handlers.clear()로 시작하거나 if not logger.handlers 가드를 두세요.
  - logger.propagate = False로 두지 않으면 record가 루트 로거로 올라가 기본 핸들러를 한 번 더 거칩니다.
  snippet: |-
    import io
    import logging

    detailStream = io.StringIO()
    summaryStream = io.StringIO()

    detailHandler = logging.StreamHandler(detailStream)
    detailHandler.setLevel(logging.DEBUG)
    detailHandler.setFormatter(logging.Formatter('%(levelname)s|%(message)s'))

    summaryHandler = logging.StreamHandler(summaryStream)
    summaryHandler.setLevel(logging.WARNING)
    summaryHandler.setFormatter(logging.Formatter('%(message)s'))

    multiHandlerLogger = logging.getLogger('codaro.handlers.demo')
    multiHandlerLogger.handlers.clear()
    multiHandlerLogger.propagate = False
    multiHandlerLogger.setLevel(logging.DEBUG)
    multiHandlerLogger.addHandler(detailHandler)
    multiHandlerLogger.addHandler(summaryHandler)

    multiHandlerLogger.debug('상세에만 남는 디버그')
    multiHandlerLogger.warning('상세와 요약 모두에 남는 경고')

    detailLines = detailStream.getvalue().strip().splitlines()
    summaryLines = summaryStream.getvalue().strip().splitlines()

    {'detail': detailLines, 'summary': summaryLines}
  exercise:
    prompt: summaryHandler의 setLevel을 logging.ERROR로 바꿔 같은 WARNING record가 summary에서는 사라지고 detail에만 남는지 확인하세요.
    starterCode: |-
      import io
      import logging

      gateDetailStream = io.StringIO()
      gateSummaryStream = io.StringIO()

      gateDetailHandler = logging.StreamHandler(gateDetailStream)
      gateDetailHandler.setLevel(logging.DEBUG)
      gateDetailHandler.setFormatter(logging.Formatter('%(levelname)s|%(message)s'))

      gateSummaryHandler = logging.StreamHandler(gateSummaryStream)
      gateSummaryHandler.setLevel(logging.___)
      gateSummaryHandler.setFormatter(logging.Formatter('%(message)s'))

      gateLogger = logging.getLogger('codaro.handlers.gate')
      gateLogger.handlers.clear()
      gateLogger.propagate = False
      gateLogger.setLevel(logging.DEBUG)
      gateLogger.addHandler(gateDetailHandler)
      gateLogger.addHandler(gateSummaryHandler)

      gateLogger.warning('경고만 발생')

      {
          'detailLines': gateDetailStream.getvalue().strip().splitlines(),
          'summaryLines': gateSummaryStream.getvalue().strip().splitlines(),
      }
    hints:
    - 핸들러 레벨을 ERROR로 두면 WARNING record는 그 핸들러에서 걸러집니다.
    - detail은 DEBUG부터 받으므로 WARNING이 그대로 도착합니다.
    check:
      noError: 두 핸들러와 로거 구성이 NameError, AttributeError 없이 끝나야 합니다.
      resultCheck: 결과 dict의 detailLines가 1개 라인, summaryLines가 빈 리스트여야 합니다.
  check:
    type: noError
    noError: 두 StreamHandler를 같은 로거에 등록하고 record를 흘려보내는 흐름이 끝나야 합니다.
    resultCheck: 결과 dict의 detail에 2개 라인, summary에 1개 라인이 있어야 합니다.
- id: loggers
  title: getLogger 이름 계층
  structuredPrimary: true
  subtitle: 모듈별 로거 분리
  goal: getLogger("a.b.c")로 점 구분 이름 계층을 만들고 자식 로거가 부모 핸들러로 propagate되는 흐름을 확인합니다.
  why: 모듈마다 logging.getLogger(__name__)을 쓰면 코드 구조 그대로 로거 트리가 생깁니다. 운영 시 특정 모듈만 DEBUG로 올리거나 끄는 게 쉬워집니다.
  explanation: |-
    로거 이름에 점(.)이 들어가면 자동으로 부모-자식 관계가 형성됩니다. "codaro"는 "codaro.api"의 부모, "codaro.api"는 "codaro.api.auth"의 부모입니다.
    자식 로거에 핸들러가 없으면 record는 부모로 propagate되어 부모의 핸들러로 처리됩니다. propagate=False로 두면 거기서 멈춥니다.
    이 구조 덕에 보통 패키지 루트("codaro")에만 핸들러를 붙이고, 모듈에서는 getLogger(__name__)으로 record만 발생시키는 패턴이 표준입니다.
  tips:
  - 점 단위 부모 검색은 이름만으로 동작하므로, 부모 로거를 미리 만들지 않아도 됩니다. 첫 자식 record에서 자동 등록됩니다.
  - 같은 이름의 getLogger는 항상 같은 객체를 돌려줍니다(싱글톤). 두 번 부르고 결과를 비교하면 is로 같습니다.
  snippet: |-
    import io
    import logging

    rootCaptureStream = io.StringIO()
    rootCaptureHandler = logging.StreamHandler(rootCaptureStream)
    rootCaptureHandler.setFormatter(logging.Formatter('%(name)s|%(message)s'))

    rootDemoLogger = logging.getLogger('codaro.loggers.demo')
    rootDemoLogger.handlers.clear()
    rootDemoLogger.propagate = False
    rootDemoLogger.setLevel(logging.INFO)
    rootDemoLogger.addHandler(rootCaptureHandler)

    childLogger = logging.getLogger('codaro.loggers.demo.child')
    childLogger.info('자식이 직접 발생시킨 record')

    sameChild = logging.getLogger('codaro.loggers.demo.child')

    {
        'lines': rootCaptureStream.getvalue().strip().splitlines(),
        'sameInstance': childLogger is sameChild,
    }
  exercise:
    prompt: childLogger.propagate를 False로 바꿔 자식 record가 부모 핸들러에 도달하지 않아 lines가 빈 리스트가 되는지 확인하세요.
    starterCode: |-
      import io
      import logging

      blockStream = io.StringIO()
      blockHandler = logging.StreamHandler(blockStream)
      blockHandler.setFormatter(logging.Formatter('%(name)s|%(message)s'))

      blockParent = logging.getLogger('codaro.loggers.block')
      blockParent.handlers.clear()
      blockParent.propagate = False
      blockParent.setLevel(logging.INFO)
      blockParent.addHandler(blockHandler)

      blockChild = logging.getLogger('codaro.loggers.block.child')
      blockChild.propagate = ___

      blockChild.info('차단되는 record')

      blockStream.getvalue().strip().splitlines()
    hints:
    - propagate에는 True 또는 False가 들어갑니다.
    - propagate=False이면 record는 자식 단계에서 멈춰 부모 핸들러로 가지 않습니다.
    check:
      noError: 부모/자식 로거 구성이 NameError 없이 끝나야 합니다.
      resultCheck: 셀 반환값이 빈 리스트여야 합니다.
  check:
    type: noError
    noError: getLogger와 핸들러 등록 흐름이 NameError 없이 끝나야 합니다.
    resultCheck: 결과 dict의 lines가 1개 항목이고 sameInstance가 True여야 합니다.
- id: advanced_patterns
  title: 예외 트레이스와 extra 컨텍스트
  structuredPrimary: true
  subtitle: exc_info, extra, LoggerAdapter
  goal: try/except 안에서 logger.error(..., exc_info=True)로 스택 트레이스를 함께 남기고, extra dict로 record에 추가 필드를 붙입니다.
  why: 운영에서 에러 한 줄만 보면 어디서 났는지 알기 어렵습니다. exc_info로 트레이스가 같이 남고, extra로 requestId/userId 같은 컨텍스트가 붙으면 한 사건을 끝까지 추적할 수 있습니다.
  explanation: |-
    logger.error(msg, exc_info=True)는 현재 활성 예외 정보를 record에 첨부하고 Formatter가 트레이스를 같이 출력하게 합니다. logger.exception(msg)는 자동으로 exc_info=True를 켜 줍니다.
    extra=dict 인자는 record 객체에 그대로 속성으로 붙습니다. Formatter 포맷 문자열에서 %(requestId)s처럼 참조할 수 있고, 누락 시 KeyError가 나므로 기본값을 줄 LoggerAdapter나 getattr 패턴이 필요합니다.
    LoggerAdapter는 process(msg, kwargs)에서 매번 같은 컨텍스트를 추가해 줍니다. 함수 단위 컨텍스트 전파에 유용합니다.
  tips:
  - extra 키는 LogRecord의 예약 속성(name, msg, levelname 등)과 충돌하면 KeyError가 납니다. 대표적으로 'message', 'asctime'은 쓰지 않습니다.
  - 트레이스를 남기되 운영 로그 폭주가 걱정되면 logger.exception 대신 logger.warning(..., exc_info=False)와 별도 sentry/error tracker로 보내는 패턴이 흔합니다.
  snippet: |-
    import io
    import logging

    contextStream = io.StringIO()
    contextHandler = logging.StreamHandler(contextStream)
    contextHandler.setFormatter(
        logging.Formatter('%(levelname)s|%(requestId)s|%(message)s')
    )

    contextLogger = logging.getLogger('codaro.advanced.context')
    contextLogger.handlers.clear()
    contextLogger.propagate = False
    contextLogger.setLevel(logging.DEBUG)
    contextLogger.addHandler(contextHandler)

    try:
        10 / 0
    except ZeroDivisionError:
        contextLogger.exception('나누기 실패', extra={'requestId': 'req-001'})

    contextOutput = contextStream.getvalue()
    contextLines = [line for line in contextOutput.splitlines() if line]
    {
        'firstLine': contextLines[0],
        'hasTraceback': 'ZeroDivisionError' in contextOutput,
    }
  exercise:
    prompt: extra dict의 requestId를 다른 문자열로 바꾸고 firstLine 안에 그 문자열이 그대로 들어가는지 확인하세요.
    starterCode: |-
      import io
      import logging

      adapterStream = io.StringIO()
      adapterHandler = logging.StreamHandler(adapterStream)
      adapterHandler.setFormatter(
          logging.Formatter('%(levelname)s|%(requestId)s|%(message)s')
      )

      adapterLogger = logging.getLogger('codaro.advanced.adapter')
      adapterLogger.handlers.clear()
      adapterLogger.propagate = False
      adapterLogger.setLevel(logging.INFO)
      adapterLogger.addHandler(adapterHandler)

      adapterLogger.info('주문 처리 완료', extra={'requestId': '___'})

      firstAdapterLine = adapterStream.getvalue().strip().splitlines()[0]
      firstAdapterLine
    hints:
    - extra의 requestId 값이 Formatter의 %(requestId)s 자리로 들어갑니다.
    - firstAdapterLine은 "INFO|당신이 넣은 값|주문 처리 완료" 형태가 되어야 합니다.
    check:
      noError: extra dict 사용과 핸들러 출력이 KeyError 없이 끝나야 합니다.
      resultCheck: firstAdapterLine 안에 본인이 넣은 requestId 문자열이 포함되어야 합니다.
  check:
    type: noError
    noError: try/except, exception, extra 흐름이 KeyError 없이 끝나야 합니다.
    resultCheck: 결과 dict의 firstLine이 "ERROR|req-001|나누기 실패"이고 hasTraceback이 True여야 합니다.
- id: practical
  title: 실전 - API 호출 로깅
  structuredPrimary: true
  subtitle: 함수 한 개로 컨텍스트 묶기
  goal: API 호출을 흉내내는 함수 안에서 시작/성공/실패 record를 한 번에 남기고, 호출 직후 캡처된 로그 라인을 검증합니다.
  why: 실무 로깅은 함수 호출의 외곽에서 일관되게 일어나야 합니다. 같은 함수에서 시작/성공/실패가 각각 어떤 레벨로 어떤 메시지로 남는지가 운영 대시보드의 그림을 결정합니다.
  explanation: |-
    함수 단위로 보면 보통 진입 시 INFO 1줄, 결과/실패 시 INFO 또는 ERROR 1줄을 남기는 패턴이 표준입니다.
    함수에서 raise 대신 except에서 logger.exception을 호출하면 호출자 모르게 로그만 남기고 기본값을 돌려줄 수 있습니다. 본 예제는 status 키가 있는 dict를 항상 돌려줘 호출자가 별도 try를 둘 필요가 없게 만듭니다.
    실전에서는 같은 record에 latencyMs, statusCode, requestId 같은 필드를 extra로 함께 남기면 사후 분석이 쉽습니다.
  tips:
  - 함수 내부에서 매번 getLogger를 부르지 않고 모듈 상단에서 한 번 만들어 두는 게 표준입니다. 본 예제는 셀 격리를 위해 함수 안에서 만듭니다.
  - dict 반환을 늘 status 키로 통일하면 호출자가 패턴 매칭/조건 처리하기 쉽습니다.
  snippet: |-
    import io
    import logging

    callStream = io.StringIO()
    callHandler = logging.StreamHandler(callStream)
    callHandler.setFormatter(logging.Formatter('%(levelname)s|%(message)s'))

    apiLogger = logging.getLogger('codaro.practical.api')
    apiLogger.handlers.clear()
    apiLogger.propagate = False
    apiLogger.setLevel(logging.INFO)
    apiLogger.addHandler(callHandler)


    def callApi(endpoint: str, fail: bool = False) -> dict:
        apiLogger.info(f'request start {endpoint}')
        if fail:
            apiLogger.error(f'request failed {endpoint}')
            return {'status': 'error', 'endpoint': endpoint}
        apiLogger.info(f'request ok {endpoint}')
        return {'status': 'ok', 'endpoint': endpoint}


    okResult = callApi('/users')
    failResult = callApi('/orders', fail=True)

    callLines = callStream.getvalue().strip().splitlines()
    {
        'okResult': okResult,
        'failResult': failResult,
        'lineCount': len(callLines),
        'errorLines': [line for line in callLines if line.startswith('ERROR')],
    }
  exercise:
    prompt: callApi에 statusCode 매개변수(기본 200)를 추가해 메시지에 코드가 함께 남고, 반환 dict에도 statusCode가 들어가도록 바꾸세요.
    starterCode: |-
      import io
      import logging

      codeStream = io.StringIO()
      codeHandler = logging.StreamHandler(codeStream)
      codeHandler.setFormatter(logging.Formatter('%(levelname)s|%(message)s'))

      codeLogger = logging.getLogger('codaro.practical.code')
      codeLogger.handlers.clear()
      codeLogger.propagate = False
      codeLogger.setLevel(logging.INFO)
      codeLogger.addHandler(codeHandler)


      def callApiWithCode(endpoint: str, statusCode: int = 200) -> dict:
          codeLogger.info(f'request {endpoint} code={statusCode}')
          return {'status': 'ok', 'endpoint': endpoint, 'statusCode': statusCode}


      sampleResult = callApiWithCode('/health', statusCode=503)
      sampleLines = codeStream.getvalue().strip().splitlines()
      {'sampleResult': sampleResult, 'firstLine': sampleLines[0]}
    hints:
    - 반환 dict에 statusCode 키를 그대로 포함하면 됩니다.
    - 로그 메시지 f-string에 code={statusCode}를 끼워 넣으면 firstLine 끝에 'code=503'이 보입니다.
    check:
      noError: callApiWithCode 호출이 NameError 없이 끝나야 합니다.
      resultCheck: sampleResult의 statusCode가 503이고 firstLine에 'code=503'이 포함되어야 합니다.
  check:
    type: noError
    noError: callApi 정의와 두 번 호출이 NameError 없이 끝나야 합니다.
    resultCheck: lineCount가 3이고 errorLines가 정확히 1개 항목이며, failResult의 status가 'error'여야 합니다.
- id: workflow_validation
  title: 검증 루프 - 구조화 로그 품질 게이트
  structuredPrimary: true
  subtitle: JSON 한 줄로 운영 친화 포맷
  goal: 커스텀 Formatter로 record를 JSON 한 줄로 직렬화하고 그 JSON을 다시 파싱해 필수 필드가 빠지지 않았는지 검증합니다.
  why: 텍스트 로그는 사람이 읽기에는 좋지만, 운영 도구로 집계/검색하려면 JSON 같은 구조화 포맷이 훨씬 안정적입니다. 직접 직렬화 → 파싱 왕복을 거치며 형식이 깨지지 않았는지 같은 셀에서 확인합니다.
  explanation: |-
    logging.Formatter를 상속해 format(record)을 override하면 record의 어떤 필드든 골라 JSON으로 만들 수 있습니다.
    getattr(record, 'requestId', 'unknown')처럼 안전 접근을 쓰면 extra가 없는 record에서도 KeyError 없이 기본값이 들어갑니다.
    검증은 json.loads로 다시 파싱해 dict로 만들고 assert로 필요한 키와 값을 확인합니다. 이 패턴은 그대로 단위 테스트로 옮길 수 있습니다.
  tips:
  - record.getMessage()는 args가 있을 경우 lazy 포맷을 적용한 최종 문자열을 돌려줍니다. record.msg를 그대로 쓰면 포맷이 적용되지 않습니다.
  - json.dumps(data, ensure_ascii=False)는 한국어 메시지가 \\uXXXX 이스케이프로 나가지 않게 해 줍니다.
  snippet: |-
    import io
    import json
    import logging


    class WorkflowJsonFormatter(logging.Formatter):
        def format(self, record):
            data = {
                'level': record.levelname,
                'logger': record.name,
                'message': record.getMessage(),
                'requestId': getattr(record, 'requestId', 'unknown'),
            }
            return json.dumps(data, ensure_ascii=False, sort_keys=True)


    workflowStream = io.StringIO()
    workflowLogger = logging.getLogger('codaro.workflow.validation')
    workflowLogger.handlers.clear()
    workflowLogger.propagate = False
    workflowLogger.setLevel(logging.INFO)

    workflowHandler = logging.StreamHandler(workflowStream)
    workflowHandler.setFormatter(WorkflowJsonFormatter())
    workflowLogger.addHandler(workflowHandler)

    workflowLogger.info('lesson verified', extra={'requestId': 'req-101'})
    workflowLogger.warning('no requestId provided')

    parsedRecords = [
        json.loads(line) for line in workflowStream.getvalue().strip().splitlines()
    ]

    assert parsedRecords[0]['level'] == 'INFO'
    assert parsedRecords[0]['requestId'] == 'req-101'
    assert parsedRecords[1]['requestId'] == 'unknown'
    parsedRecords
  exercise:
    prompt: WorkflowJsonFormatter에 timestamp 키를 추가해 record.created를 ISO 형식 문자열로 직렬화하세요. 검증은 parsedRecords[0]에 timestamp 키가 있는지로 합니다.
    starterCode: |-
      import io
      import json
      import logging
      from datetime import datetime, timezone


      class TimestampedJsonFormatter(logging.Formatter):
          def format(self, record):
              data = {
                  'level': record.levelname,
                  'message': record.getMessage(),
                  'timestamp': datetime.fromtimestamp(record.___, tz=timezone.utc).isoformat(),
              }
              return json.dumps(data, ensure_ascii=False, sort_keys=True)


      timedStream = io.StringIO()
      timedLogger = logging.getLogger('codaro.workflow.timed')
      timedLogger.handlers.clear()
      timedLogger.propagate = False
      timedLogger.setLevel(logging.INFO)

      timedHandler = logging.StreamHandler(timedStream)
      timedHandler.setFormatter(TimestampedJsonFormatter())
      timedLogger.addHandler(timedHandler)

      timedLogger.info('timestamped record')

      timedParsed = [json.loads(line) for line in timedStream.getvalue().strip().splitlines()]
      timedParsed[0]
    hints:
    - LogRecord에는 created 속성이 float epoch 초로 들어 있습니다.
    - datetime.fromtimestamp(record.created, tz=timezone.utc)가 자연스러운 변환입니다.
    check:
      noError: TimestampedJsonFormatter 정의와 timedLogger.info 호출이 NameError 없이 끝나야 합니다.
      resultCheck: timedParsed[0]에 'timestamp' 키가 있고 그 값이 ISO 형식 문자열이어야 합니다.
  check:
    type: noError
    noError: WorkflowJsonFormatter 정의와 JSON 파싱이 KeyError/JSONDecodeError 없이 끝나야 합니다.
    resultCheck: parsedRecords가 2개 항목 리스트이고 첫 항목의 requestId가 'req-101'이어야 합니다.
- id: practice
  title: 종합 복습 - 로깅 미니 시스템
  structuredPrimary: true
  subtitle: configure 함수 한 개로 일관된 설정
  goal: configureLogger 함수가 이름, 레벨, 포맷을 받아 항상 같은 핸들러 1개를 반환하도록 만들고, 두 번 호출해도 핸들러가 중복되지 않는지 확인합니다.
  why: 실무 로깅 코드는 보통 "한 번 설정하고 어디서나 같은 로거를 가져온다"가 표준입니다. 핵심은 재호출에서 핸들러가 누적되지 않는 것이라, 그 안전장치를 직접 구현해 봅니다.
  explanation: |-
    configure 함수는 매번 getLogger → handlers.clear → setLevel → addHandler 흐름을 일관되게 수행해야 합니다. 핸들러 생성 직전 clear는 노트북/테스트 재실행 안전성의 핵심입니다.
    StringIO를 받아 두면 같은 셀에서 캡처한 로그를 검증할 수 있고, 운영에서는 sys.stderr이나 파일 경로로 바꿔 끼우면 됩니다.
    종합 흐름은 함수 정의 → 호출 → 로그 발생 → 캡처 검증의 네 단계입니다. 이 패턴은 그대로 다른 모듈로 가져갈 수 있는 베이스라인입니다.
  tips:
  - 핸들러 중복 방지는 logger.handlers.clear() 또는 if not logger.handlers 가드 두 가지가 흔합니다. 본 예제는 명시적인 clear를 채택합니다.
  - configure 함수의 반환값으로 (logger, stream) 튜플을 돌려주면 테스트에서 캡처 스트림 접근이 쉬워집니다.
  snippet: |-
    import io
    import logging


    def configureLogger(name: str, level: int, stream: io.StringIO) -> logging.Logger:
        logger = logging.getLogger(name)
        logger.handlers.clear()
        logger.propagate = False
        logger.setLevel(level)

        handler = logging.StreamHandler(stream)
        handler.setFormatter(logging.Formatter('%(levelname)s|%(name)s|%(message)s'))
        logger.addHandler(handler)
        return logger


    reviewStream = io.StringIO()
    reviewLogger = configureLogger('codaro.practice.review', logging.INFO, reviewStream)
    reviewLogger.info('first call')

    configureLogger('codaro.practice.review', logging.INFO, reviewStream)
    reviewLogger.info('second call after reconfigure')

    reviewLines = reviewStream.getvalue().strip().splitlines()
    {
        'handlerCount': len(reviewLogger.handlers),
        'lineCount': len(reviewLines),
        'lines': reviewLines,
    }
  exercise:
    prompt: configureLogger를 다시 호출해도 핸들러가 1개로 유지되는지 확인하고, 같은 로거를 두 번 설정한 뒤 record 한 줄을 더 발생시켜 lineCount가 의도한 값인지 검증하세요.
    starterCode: |-
      import io
      import logging


      def configureLogger(name: str, level: int, stream: io.StringIO) -> logging.Logger:
          logger = logging.getLogger(name)
          logger.handlers.___()
          logger.propagate = False
          logger.setLevel(level)

          handler = logging.StreamHandler(stream)
          handler.setFormatter(logging.Formatter('%(levelname)s|%(message)s'))
          logger.addHandler(handler)
          return logger


      guardStream = io.StringIO()
      guardLogger = configureLogger('codaro.practice.guard', logging.INFO, guardStream)
      configureLogger('codaro.practice.guard', logging.INFO, guardStream)
      guardLogger.info('after double configure')

      {
          'handlerCount': len(guardLogger.handlers),
          'lineCount': len(guardStream.getvalue().strip().splitlines()),
      }
    hints:
    - 빈칸에 들어갈 메서드 이름은 clear입니다.
    - record 한 번 발생 + 한 핸들러이면 lineCount는 1이 됩니다.
    check:
      noError: configureLogger 정의와 두 번 호출이 NameError 없이 끝나야 합니다.
      resultCheck: 결과 dict의 handlerCount가 1이고 lineCount가 1이어야 합니다.
  check:
    type: noError
    noError: configureLogger 정의와 두 번 호출이 NameError 없이 끝나야 합니다.
    resultCheck: 결과 dict의 handlerCount가 1, lineCount가 2여야 합니다.
assessment:
  masteryVariants:
  - id: 25_logging-operation-lines-mastery
    mode: mastery
    unseen: true
    sourceSectionIds:
    - workflow_validation
    - practice
    title: 운영 로그를 캡처해 레벨 필터와 handler 중복을 검증하기
    subtitle: StreamHandler, Formatter, logger level
    goal: 이벤트 목록을 logging record로 남기고 필터링된 lines, warning 이상 개수, handlerCount, loggerLevel을 반환한다.
    why: 숙달 검증은 로그 호출 여부가 아니라, 실제 캡처된 로그 줄이 레벨 정책과 handler 중복 방지 규칙을 만족하는지 확인합니다.
    explanation: capture_operation_logs(events, minimum_level="INFO")를 완성해 DEBUG는 필터링하고, WARNING 이상 record 수와 logger 설정 상태를
      반환하세요.
    tips:
    - logger.handlers.clear()를 호출해 재실행해도 handler가 누적되지 않게 하세요.
    - logger.log(level, "operation=%s status=%s", ...) 형태로 lazy formatting을 사용하세요.
    exercise:
      prompt: capture_operation_logs(events, minimum_level="INFO")를 완성해 logging output lines와 handler 상태를 반환하고 알 수 없는 level은
        ValueError로 막으세요.
      starterCode: |-
        def capture_operation_logs(events, minimum_level="INFO"):
            raise NotImplementedError
      solution: |-
        import io
        import logging

        def capture_operation_logs(events, minimum_level="INFO"):
            levels = {
                "DEBUG": logging.DEBUG,
                "INFO": logging.INFO,
                "WARNING": logging.WARNING,
                "ERROR": logging.ERROR,
                "CRITICAL": logging.CRITICAL,
            }
            if minimum_level not in levels:
                raise ValueError("unknown minimum level")
            stream = io.StringIO()
            handler = logging.StreamHandler(stream)
            handler.setFormatter(logging.Formatter("%(levelname)s|%(name)s|%(message)s"))
            logger = logging.getLogger("codaro.assessment.logging.operations")
            logger.handlers.clear()
            logger.propagate = False
            logger.setLevel(levels[minimum_level])
            logger.addHandler(handler)
            for event in events:
                level_name = event.get("level", "INFO")
                if level_name not in levels:
                    raise ValueError("unknown event level")
                logger.log(
                    levels[level_name],
                    "operation=%s status=%s",
                    event["operation"],
                    event["status"],
                )
            lines = stream.getvalue().strip().splitlines()
