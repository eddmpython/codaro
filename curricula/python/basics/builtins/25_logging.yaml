  retrievalVariants:
  - id: 25_logging-handler-reuse-retrieval
    mode: retrieval
    unseen: true
    sourceSectionIds:
    - 25_logging-json-records-transfer
    title: 로거 재설정 뒤에도 handler가 중복되지 않는지 회상 검증하기
    subtitle: handlers.clear와 StreamHandler
    goal: 같은 로거를 두 번 configure한 뒤 메시지를 남겨 handlerCount와 lineCount가 기대값인지 반환한다.
    why: 시간이 지나도 남아야 할 logging 감각은 노트북과 테스트 재실행에서 handler 중복으로 로그가 두 배씩 불어나는 문제를 막는 것입니다.
    explanation: configure_reusable_logger(name, messages)가 같은 logger를 재설정해도 handler 1개만 유지하고, 캡처된 lines를 반환하게 만드세요.
    tips:
    - configure 내부 첫 줄에서 logger.handlers.clear()를 호출하세요.
    - 같은 stream을 재사용하면 재설정 전후 로그가 모두 한 곳에 모입니다.
    exercise:
      prompt: configure_reusable_logger(name, messages)를 완성해 두 번 configure한 뒤에도 handlerCount 1과 누적 lines를 반환하세요.
      starterCode: |-
        def configure_reusable_logger(name, messages):
            raise NotImplementedError
      solution: |-
        import io
        import logging

        def configure_reusable_logger(name, messages):
            stream = io.StringIO()

            def configure():
                logger = logging.getLogger(name)
                logger.handlers.clear()
                logger.propagate = False
                logger.setLevel(logging.INFO)
                handler = logging.StreamHandler(stream)
                handler.setFormatter(logging.Formatter("%(levelname)s|%(message)s"))
                logger.addHandler(handler)
                return logger

            logger = configure()
            logger.info(messages[0])
            logger = configure()
            for message in messages[1:]:
                logger.info(message)
            lines = stream.getvalue().strip().splitlines()
            return {
                "handlerCount": len(logger.handlers),
                "lineCount": len(lines),
                "lines": lines,
            }
      hints:
      - 두 번째 configure 뒤에도 첫 번째 로그 line은 stream에 남아야 합니다.
      - handlerCount가 2가 되면 같은 record가 중복 출력될 위험이 있습니다.
