  transferVariants:
  - id: 25_logging-json-records-transfer
    mode: transfer
    unseen: true
    sourceSectionIds:
    - workflow_validation
    - formatters
    title: JSON 로그 record를 만들고 다시 파싱해 필수 필드 검증하기
    subtitle: custom Formatter와 extra
    goal: record 목록을 JSON line 로그로 출력하고 다시 파싱해 requestId 누락 수와 lineCount를 반환한다.
    why: 전이 과제에서는 사람이 읽는 text line에서 운영 도구가 집계할 수 있는 구조화 로그로 옮깁니다.
    explanation: format_structured_logs(records)가 custom Formatter를 붙인 logger로 JSON lines를 만들고, json.loads로 파싱한 records와 누락
      requestId 수를 반환하게 만드세요.
    tips:
    - record.getMessage()를 써야 logging lazy formatting이 적용된 최종 메시지를 얻습니다.
    - extra가 없는 record는 requestId를 "unknown"으로 채우세요.
    exercise:
      prompt: format_structured_logs(records)를 완성해 JSON line 로그를 만들고 records, missingRequestIds, lineCount를 반환하세요.
      starterCode: |-
        def format_structured_logs(records):
            raise NotImplementedError
      solution: |-
        import io
        import json
        import logging

        def format_structured_logs(records):
            class JsonFormatter(logging.Formatter):
                def format(self, record):
                    payload = {
                        "level": record.levelname,
                        "logger": record.name,
                        "message": record.getMessage(),
                        "requestId": getattr(record, "requestId", "unknown"),
                    }
                    return json.dumps(payload, ensure_ascii=False, sort_keys=True)

            stream = io.StringIO()
            handler = logging.StreamHandler(stream)
            handler.setFormatter(JsonFormatter())
            logger = logging.getLogger("codaro.assessment.logging.json")
            logger.handlers.clear()
            logger.propagate = False
            logger.setLevel(logging.INFO)
            logger.addHandler(handler)
            for item in records:
                extra = {"requestId": item["requestId"]} if item.get("requestId") else None
                logger.log(getattr(logging, item.get("level", "INFO")), item["message"], extra=extra)
            parsed = [json.loads(line) for line in stream.getvalue().strip().splitlines()]
            return {
                "records": parsed,
                "missingRequestIds": sum(record["requestId"] == "unknown" for record in parsed),
                "lineCount": len(parsed),
            }
      hints:
      - Formatter 안에서는 record.name, record.levelname, record.getMessage()를 사용할 수 있습니다.
      - requestId가 없는 입력은 extra를 넘기지 않아야 기본값 "unknown" 경로를 확인할 수 있습니다.
    check:
      id: python.builtins.logging.json-records.transfer.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.builtins.logging.empty.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
