sections:
- id: module_import
  title: time 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: time 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    time은 파이썬 표준 라이브러리입니다. 시간 측정과 제어를 담당하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 time 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 time 모듈을 사용할 수 있습니다.
  snippet: |-
    import time

    # 모듈 로드 확인
    'time 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: time 모듈 불러오기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      import time

      # 모듈 로드 확인
      'time 모듈이 정상적으로 로드되었습니다'
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: time 모듈 불러오기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: time 모듈 불러오기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: basic_time
  title: 기본 시간 함수
  structuredPrimary: true
  subtitle: time(), sleep(), perf_counter()
  goal: 기본 시간 함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    time 모듈은 시간 측정과 제어를 담당합니다. time()은 1970년 1월 1일 이후의 초를 반환하고, sleep()은 프로그램을 일시 정지하며, perf_counter()는 고정밀 시간 측정에 사용됩니다. 성능 분석, 타이머, 주기적 작업에 필수적입니다.

    perf_counter()는 sleep()과 시스템 시간 변경에 영향받지 않아 성능 측정에 이상적입니다.
  tips:
  - perf_counter()는 sleep()과 시스템 시간 변경에 영향받지 않아 성능 측정에 이상적입니다.
  snippet: |-
    timestamp = time.time()
    timestamp
  exercise:
    prompt: 기본 시간 함수 예제에서 `timestamp` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      timestamp = time.time()
      timestamp
    hints:
    - 바꿀 지점은 `timestamp = ...` 오른쪽 값입니다.
    - 실행 뒤 `timestamp` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 기본 시간 함수에서 `timestamp` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 기본 시간 함수 실행 뒤 `timestamp` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: time_formats
  title: 시간 형식 변환
  structuredPrimary: true
  subtitle: struct_time과 포맷팅
  goal: 시간 형식 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    타임스탬프를 읽기 쉬운 형식으로 변환할 수 있습니다. localtime()은 타임스탬프를 구조화된 시간으로 변환하고, strftime()은 원하는 형식의 문자열을 만듭니다. gmtime()은 UTC 시간을 반환합니다.

    로컬 시간과 UTC 시간의 차이는 time.timezone 변수로 확인할 수 있습니다.
  tips:
  - 로컬 시간과 UTC 시간의 차이는 time.timezone 변수로 확인할 수 있습니다.
  snippet: |-
    current = time.time()
    timeStruct = time.localtime(current)
    timeStruct.tm_year, timeStruct.tm_mon, timeStruct.tm_mday
  exercise:
    prompt: 시간 형식 변환 예제에서 `current`, `timeStruct` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      current = time.time()
      timeStruct = time.localtime(current)
      timeStruct.tm_year, timeStruct.tm_mon, timeStruct.tm_mday
    hints:
    - 바꿀 지점은 `current = ...` 오른쪽 값입니다.
    - 실행 뒤 `current` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 시간 형식 변환에서 `current` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 시간 형식 변환 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: performance_measurement
  title: 성능 측정
  structuredPrimary: true
  subtitle: 코드 실행 시간 분석
  goal: 성능 측정에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    프로그램의 성능을 측정하려면 perf_counter()를 사용합니다. 시작 시점과 종료 시점의 차이로 실행 시간을 계산할 수 있습니다. 알고리즘 비교, 병목 지점 발견, 최적화 효과 검증에 활용됩니다.

    timeit 모듈은 더 정확한 벤치마크를 제공하지만 간단한 측정은 perf_counter()로 충분합니다.
  tips:
  - timeit 모듈은 더 정확한 벤치마크를 제공하지만 간단한 측정은 perf_counter()로 충분합니다.
  snippet: |-
    start = time.perf_counter()
    result = [i * i for i in range(10000)]
    finish = time.perf_counter()
    executionTime = finish - start
    executionTime
  exercise:
    prompt: 성능 측정 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      start = time.perf_counter()
      result = [i * i for i in range(10000)]
      finish = time.perf_counter()
      executionTime = finish - start
      executionTime
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 성능 측정의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 성능 측정 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: timing_control
  title: 시간 제어와 대기
  structuredPrimary: true
  subtitle: sleep과 주기적 실행
  goal: 시간 제어와 대기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표준 라이브러리는 외부 의존성 없이 파일, 시간, 문자열, 직렬화 같은 업무 코드를 구성하는 기반입니다.
  explanation: |-
    sleep()은 지정된 시간만큼 프로그램을 일시 정지합니다. 초 단위로 지정하며 소수점으로 밀리초 단위도 가능합니다. API 호출 간격 조절, 폴링, 애니메이션 프레임 제어에 사용됩니다.

    정확한 주기를 원한다면 sleep 후 시간 오차를 보정해야 합니다.
  tips:
  - 정확한 주기를 원한다면 sleep 후 시간 오차를 보정해야 합니다.
  snippet: |-
    time.sleep(1)
    'Done'
  exercise:
    prompt: 시간 제어와 대기 예제에서 입력값을 바꾸고 마지막 확인 값이 달라지는지 확인하세요.
    starterCode: |-
      time.sleep(1)
      'Done'
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 시간 제어와 대기의 수정 코드가 모듈 함수 호출 단계의 마지막 확인 값까지 도달해야 합니다.
    resultCheck: 시간 제어와 대기 실행 결과가 반환값, stdout, 객체 상태 기준으로 바꾼 입력값을 반영해야 합니다.
- id: clock_types
  title: 다양한 시계
  structuredPrimary: true
  subtitle: monotonic, process_time
  goal: 다양한 시계에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Python은 여러 종류의 시계를 제공합니다. monotonic()은 항상 증가하는 시간, process_time()은 CPU 사용 시간, thread_time()은 스레드별 시간을 측정합니다. 각 시계는 특정 목적에 최적화되어 있습니다.

    sleep()은 process_time()에 포함되지 않습니다. CPU를 실제로 사용한 시간만 측정합니다.
  tips:
  - sleep()은 process_time()에 포함되지 않습니다. CPU를 실제로 사용한 시간만 측정합니다.
  snippet: |-
    tick = time.monotonic()
    time.sleep(1)
    tock = time.monotonic()
    interval = tock - tick
    interval
  exercise:
    prompt: 다양한 시계 예제에서 `tick`, `tock`, `interval` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      tick = time.monotonic()
      time.sleep(1)
      tock = time.monotonic()
      interval = tock - tick
      interval
    hints:
    - 바꿀 지점은 `tick = ...` 오른쪽 값입니다.
    - 실행 뒤 `tick` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 다양한 시계에서 `tick` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 다양한 시계 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 시간 측정 실무 패턴
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 조건 분기는 입력값에 따라 실행 경로가 바뀌므로 결과를 바로 확인해야 합니다.
  explanation: |-
    실무에서 자주 사용하는 시간 측정 패턴을 살펴봅니다. 타임아웃 구현, 진행률 표시, 재시도 로직, 성능 프로파일링 등 실생활 문제를 time 모듈로 해결할 수 있습니다.

    로그 파일에는 time.strftime()으로 읽기 쉬운 형식의 타임스탬프를 기록하세요.
  tips:
  - 로그 파일에는 time.strftime()으로 읽기 쉬운 형식의 타임스탬프를 기록하세요.
  snippet: |-
    limitSeconds = 3
    deadline = time.time() + limitSeconds
    finished = True if time.time() < deadline else False
    if finished:
        time.sleep(0.5)
    finished
  exercise:
    prompt: 실전 활용 예제에서 조건값을 바꾸고 선택되는 분기와 결과가 달라지는지 확인하세요.
    starterCode: |-
      limitSeconds = 3
      deadline = time.time() + limitSeconds
      finished = True if time.time() < deadline else False
      if finished:
          time.sleep(0.5)
      finished
    hints:
    - 바꿀 지점은 if 조건식에 들어가는 비교값이나 boolean 값에서 찾으세요.
    - 실행 뒤 true/false 분기 중 어떤 코드가 평가됐는지 출력이나 변수값으로 확인하세요.
  check:
    noError: 실전 활용의 조건식과 들여쓰기가 맞아 선택한 분기가 실행되어야 합니다.
    resultCheck: 실전 활용 분기 결과가 바꾼 조건값에 맞게 달라져야 합니다.
- id: workflow_validation
  title: '검증 루프: 시간 측정 운영 리포트'
  structuredPrimary: true
  subtitle: SLA, 재시도 간격, 타임스탬프 검증
  goal: '검증 루프: 시간 측정 운영 리포트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    시간 측정 코드는 출력값보다 기준이 중요합니다. 성능 측정에는 perf_counter()를 쓰고, 재시도 간격이나 SLA 판단은 계산 결과를 검증해야 운영 자동화에 안전하게 넣을 수 있습니다.

    변주 실험
