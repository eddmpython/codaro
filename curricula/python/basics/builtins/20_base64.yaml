- title: 표준 Base64 인코딩
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 표준 Base64 인코딩에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    b64encode와 b64decode
    표준 Base64 인코딩은 바이너리 데이터를 64개의 ASCII 문자로 표현합니다.

    바이트 변환
    base64는 bytes 객체를 입력받고 bytes를 반환합니다.
  tips:
  - 바이트 변환 base64는 bytes 객체를 입력받고 bytes를 반환합니다.
  snippet: |-
    message = "Hello World"
    messageBytes = message.encode('utf-8')
    encodedBytes = base64.b64encode(messageBytes)
    encodedStr = encodedBytes.decode('utf-8')
    encodedStr
  exercise:
    prompt: 표준 Base64 인코딩 예제에서 `message`, `messageBytes`, `encodedBytes` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      message = "Hello World"
      messageBytes = message.encode('utf-8')
      encodedBytes = base64.b64encode(messageBytes)
      encodedStr = encodedBytes.decode('utf-8')
      encodedStr
    hints:
    - 바꿀 지점은 `message = ...` 오른쪽 값입니다.
    - 실행 뒤 `message` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 표준 Base64 인코딩에서 `message` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 표준 Base64 인코딩 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
  name: standard_base64
- title: URL 안전 Base64
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: URL 안전 Base64에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    urlsafe_b64encode와 urlsafe_b64decode
    URL 안전 Base64는 +와 /를 -와 _로 대체하여 URL에 안전하게 사용할 수 있습니다.

    URL 파라미터
    URL 파라미터나 쿼리 스트링에 인코딩된 데이터를 포함할 때 유용합니다.
  tips:
  - URL 파라미터 URL 파라미터나 쿼리 스트링에 인코딩된 데이터를 포함할 때 유용합니다.
  snippet: |-
    data = "subject=test&value=123"
    dataBytes = data.encode('utf-8')

    standardEncoded = base64.b64encode(dataBytes).decode('utf-8')
    urlsafeEncoded = base64.urlsafe_b64encode(dataBytes).decode('utf-8')

    {
        "standard": standardEncoded,
        "urlsafe": urlsafeEncoded
    }
  exercise:
    prompt: URL 안전 Base64 예제에서 `data`, `dataBytes`, `standardEncoded` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      data = "subject=test&value=123"
      dataBytes = data.encode('utf-8')

      standardEncoded = base64.b64encode(dataBytes).decode('utf-8')
      urlsafeEncoded = base64.urlsafe_b64encode(dataBytes).decode('utf-8')

      {
          "standard": standardEncoded,
          "urlsafe": urlsafeEncoded
      }
    hints:
    - 바꿀 지점은 `data = ...` 오른쪽 값입니다.
    - 실행 뒤 `data` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: URL 안전 Base64에서 `data` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: URL 안전 Base64 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
  name: urlsafe_base64
- title: 기타 인코딩 방식
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 기타 인코딩 방식에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    Base32와 Base16
    Base32는 32개 문자를 사용하고, Base16은 16개 문자(hex)를 사용합니다.

    Base32 특징
    대소문자 구분 없이 사용할 수 있어 사용자 입력에 유용합니다.
  tips:
  - Base32 특징 대소문자 구분 없이 사용할 수 있어 사용자 입력에 유용합니다.
  snippet: |-
    data = "Hello"
    encoded = base64.b32encode(data.encode('utf-8'))
    decoded = base64.b32decode(encoded)

    {
        "original": data,
        "encoded": encoded.decode('utf-8'),
        "decoded": decoded.decode('utf-8')
    }
  exercise:
    prompt: 기타 인코딩 방식 예제에서 `data`, `encoded`, `decoded` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      data = "Hello"
      encoded = base64.b32encode(data.encode('utf-8'))
      decoded = base64.b32decode(encoded)

      {
          "original": data,
          "encoded": encoded.decode('utf-8'),
          "decoded": decoded.decode('utf-8')
      }
    hints:
    - 바꿀 지점은 `data = ...` 오른쪽 값입니다.
    - 실행 뒤 `data` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 기타 인코딩 방식에서 `data` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 기타 인코딩 방식 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
  name: other_encodings
