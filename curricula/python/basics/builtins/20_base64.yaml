- title: 실전 활용 예제
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: base64.b64encode로 바이너리 데이터를 텍스트로 인코딩하고 b64decode로 왕복해 원본과 비트 단위로 같은지 확인하는 실전 시나리오를 만듭니다.
  why: 이메일 첨부, JSON 안의 이진 데이터, JWT 페이로드 등 텍스트 채널로 바이너리를 옮기는 모든 곳에서 base64가 쓰입니다. 왕복이 정확히 동일한지 검증해야 데이터 손상이 없습니다.
  explanation: |-
    실무 시나리오
    base64를 활용한 실전 데이터 인코딩 예제를 다룹니다.

    보안 주의
    실제 인증에는 서명이나 암호화가 추가로 필요합니다.
  tips:
  - 보안 주의 실제 인증에는 서명이나 암호화가 추가로 필요합니다.
  snippet: |-
    def createDataUrl(imageBytes, mimeType="image/png"):
        encoded = base64.b64encode(imageBytes).decode('utf-8')
        dataUrl = f"data:{mimeType};base64,{encoded}"
        return dataUrl

    sampleImageData = bytes([137, 80, 78, 71, 13, 10, 26, 10])
    dataUrl = createDataUrl(sampleImageData)

    {
        "data_url_length": len(dataUrl),
        "preview": dataUrl[:50] + "..."
    }
  exercise:
    prompt: 실전 활용 예제 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def createDataUrl(imageBytes, mimeType="image/png"):
          encoded = base64.b64encode(imageBytes).decode('utf-8')
          dataUrl = f"data:{mimeType};base64,{encoded}"
          return dataUrl

      sampleImageData = bytes([137, 80, 78, 71, 13, 10, 26, 10])
      dataUrl = createDataUrl(sampleImageData)

      {
          "data_url_length": len(dataUrl),
          "preview": dataUrl[:50] + "..."
      }
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용 예제의 입력 데이터와 처리 인자가 다음 단계까지 도달해야 합니다.
    resultCheck: 실전 활용 예제 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
  name: practical
- title: '검증 루프: 안전한 텍스트 전송 페이로드'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '검증 루프: 안전한 텍스트 전송 페이로드에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    인코딩은 무결성 검증과 함께
    Base64는 암호화가 아니라 전송 형식입니다. 따라서 원본 복원, 유효성 검사, 패딩 복구, 크기 증가를 함께 확인해야 실무에서 안전하게 사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import json

    payload = {
        "lesson": "base64",
        "status": "verified",
        "scores": [95, 88, 91]
    }

    def encodePayload(data):
        raw = json.dumps(data, ensure_ascii=False, sort_keys=True).encode("utf-8")
