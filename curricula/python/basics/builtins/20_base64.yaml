- title: 인코딩 옵션
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 인코딩 옵션에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    고급 옵션
    인코딩 함수는 다양한 옵션을 제공하여 동작을 세밀하게 제어할 수 있습니다.

    altchars 용도
    특정 환경에 맞는 문자 세트를 사용할 수 있습니다.
  tips:
  - altchars 용도 특정 환경에 맞는 문자 세트를 사용할 수 있습니다.
  snippet: |-
    data = b"test data"

    standard = base64.b64encode(data)
    customChars = base64.b64encode(data, altchars=b'-_')

    {
        "standard": standard.decode('utf-8'),
        "custom": customChars.decode('utf-8')
    }
  exercise:
