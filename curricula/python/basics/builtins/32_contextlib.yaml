    tips:
    - ExitStack은 마지막에 등록한 항목부터 정리합니다.
    - callback을 마지막에 등록하면 close 이벤트보다 먼저 실행됩니다.
    exercise:
      prompt: manage_dynamic_resources(names, include_callback=True)를 완성해 ExitStack의 LIFO 정리 순서를 반환하세요.
      starterCode: |-
        def manage_dynamic_resources(names, include_callback=True):
            raise NotImplementedError
      solution: |-
        def manage_dynamic_resources(names, include_callback=True):
            from contextlib import ExitStack, contextmanager

            if not names:
                raise ValueError("names required")

            @contextmanager
            def resource(name, events):
                events.append(f"open:{name}")
                try:
                    yield name
                finally:
                    events.append(f"close:{name}")

            events = []
            with ExitStack() as stack:
                acquired = [
                    stack.enter_context(resource(name, events))
                    for name in names
                ]
                if include_callback:
                    stack.callback(events.append, "callback")
                events.append("using:" + ",".join(acquired))

            close_order = [
                event.split(":", 1)[1]
                for event in events
                if event.startswith("close:")
            ]
            return {
                "events": events,
                "closeOrder": close_order,
                "callbackBeforeFirstClose": (
                    "callback" in events
                    and events.index("callback") < next(index for index, event in enumerate(events) if event.startswith("close:"))
                ),
            }
      hints:
      - closeOrder는 names의 역순이어야 합니다.
      - callback 등록을 close 등록 뒤에 하면 가장 먼저 실행됩니다.
