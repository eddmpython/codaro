sections:
- id: contextmanager-decorator
  title: '@contextmanager로 함수 스타일 매니저'
  structuredPrimary: true
  subtitle: 제너레이터 한 개에 setup과 teardown 묶기
  goal: contextlib.contextmanager로 감싼 제너레이터 함수가 yield를 경계로 setup/teardown 역할을 하는 흐름을 확인합니다.
  why: __enter__/__exit__를 가진 클래스를 새로 만들 정도가 아닌 단순 자원에는 함수 한 개가 코드도 짧고 의도가 한눈에 보입니다.
  explanation: '@contextmanager는 yield 직전을 __enter__, yield 다음을 __exit__로 변환합니다. yield가 돌려주는 값이 as 절에 바인딩됩니다. teardown 코드는 try/finally로 감싸 예외 경로에서도 실행되도록 합니다.'
  tips:
  - yield는 정확히 한 번이어야 합니다. 두 번 yield하면 RuntimeError가 납니다.
  - teardown은 finally 안에 둬야 예외 경로에서도 실행됩니다.
  snippet: |-
    from contextlib import contextmanager

    @contextmanager
    def trace(label, log):
        log.append(f"open:{label}")
        try:
            yield label
        finally:
            log.append(f"close:{label}")

    events = []
    with trace("task", events) as bound:
        events.append(f"body:{bound}")

    events
  exercise:
    prompt: trace 안에서 RuntimeError를 발생시키고 finally의 close가 그래도 기록되는지 확인하세요.
    starterCode: |-
      from contextlib import contextmanager

      @contextmanager
      def trace(label, log):
          log.append(f"open:{label}")
          try:
              yield label
          finally:
              log.append(f"close:{label}")

      events = []
      try:
          with trace("task", events) as bound:
              events.append(f"body:{bound}")
              raise RuntimeError("boom")
      except RuntimeError:
          events.append("caught")

      events
    hints:
    - finally의 close는 정상/예외 경로 모두에서 실행됩니다.
    - try를 빼면 예외 경로에서 close가 누락되는지 확인해 보세요.
  check:
    type: noError
    noError: trace 데코레이터와 with 블록이 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: events 리스트가 open:task, body:task, close:task, caught 순서로 채워져 예외 경로에서도 close가 보존되어야 합니다.
- id: closing-cleanup
  title: closing으로 close() 보장
  structuredPrimary: true
  subtitle: with 미지원 객체에 표준 패턴 입히기
  goal: contextlib.closing으로 close() 메서드만 있는 객체를 with 블록에서 안전하게 사용합니다.
  why: 표준 라이브러리 객체나 외부 라이브러리 객체 중에는 close()만 노출하고 __enter__/__exit__가 없는 것이 많습니다. closing이 그 객체에 표준 with 패턴을 입혀줍니다.
  explanation: contextlib.closing(obj)는 with 종료 시 obj.close()를 호출하는 컨텍스트 매니저를 만듭니다. 사용자가 직접 try/finally를 작성할 필요가 없습니다.
  tips:
  - close() 메서드가 없는 객체에 closing을 쓰면 with 종료 시 AttributeError가 납니다.
  - 표준 라이브러리의 일부 객체(io 등)는 이미 with를 지원하므로 closing이 불필요합니다.
  snippet: |-
    from contextlib import closing

    class Resource:
        def __init__(self, name, log):
            self.name = name
            self.log = log
            self.closed = False
            log.append(f"open:{name}")

        def use(self):
            self.log.append(f"use:{self.name}")
            return f"data:{self.name}"

        def close(self):
            self.log.append(f"close:{self.name}")
            self.closed = True

    log = []
    with closing(Resource("alpha", log)) as resource:
        result = resource.use()

    {"log": log, "closed": resource.closed, "result": result}
  exercise:
    prompt: Resource.use에서 ValueError를 일부러 발생시키고 closing 덕분에 close가 호출되는지 검증하세요.
    starterCode: |-
      from contextlib import closing

      class Resource:
          def __init__(self, name, log):
              self.name = name
              self.log = log
              self.closed = False
              log.append(f"open:{name}")

          def use(self):
              self.log.append(f"use:{self.name}")
              raise ValueError("usage failed")

          def close(self):
              self.log.append(f"close:{self.name}")
              self.closed = True

      log = []
      resource = Resource("alpha", log)
      try:
          with closing(resource):
              resource.use()
      except ValueError:
          log.append("caught")

      {"log": log, "closed": resource.closed}
    hints:
    - closing은 with 종료 시 항상 close()를 호출합니다.
    - log의 close 항목은 caught 앞에 있어야 합니다(with가 먼저 정리되고 except가 실행됨).
  check:
    type: noError
    noError: closing과 Resource 정의가 NameError나 AttributeError 없이 실행되어야 합니다.
    resultCheck: log 리스트가 open, use, close, caught 순서로 채워지고 closed가 True여야 합니다.
- id: suppress
  title: suppress로 특정 예외 무시
  structuredPrimary: true
  subtitle: try/except pass 패턴 한 줄로 줄이기
  goal: contextlib.suppress로 지정한 예외만 흡수하고 코드 가독성을 높입니다.
  why: '`try: ... except SomeError: pass` 패턴은 자주 등장합니다. suppress가 같은 동작을 한 줄로 표현해 의도가 분명해집니다.'
  explanation: contextlib.suppress(*excTypes)는 with 본문에서 지정한 예외 클래스만 흡수합니다. 다른 예외는 그대로 전파됩니다. 흡수 대상이 너무 넓으면 (예 - Exception) 디버깅이 어려워지므로 좁게 지정해야 합니다.
  tips:
  - 흡수할 예외를 정확히 명시하세요. Exception 전체를 흡수하면 진짜 버그를 놓치기 쉽습니다.
  - 흡수했음을 호출자가 알 수 있게 별도 플래그나 로그를 남기는 패턴이 안전합니다.
  snippet: |-
    from contextlib import suppress

    data = {"name": "alice"}

    with suppress(KeyError):
        ageBefore = data["age"]

    try:
        ageAfter = data["age"]
    except KeyError as exc:
        ageAfter = f"missing:{exc.args[0]}"

    {"ageBefore": locals().get("ageBefore", "not assigned"), "ageAfter": ageAfter}
  exercise:
    prompt: suppress 범위 안에서 KeyError가 아닌 ValueError를 발생시켜 흡수되지 않고 with 바깥으로 전파되는지 검증하세요.
    starterCode: |-
      from contextlib import suppress

      log = []
      with suppress(KeyError):
          log.append("before-key")
          raise KeyError("nope")
          log.append("after-key")

      try:
          with suppress(KeyError):
              log.append("before-value")
              raise ValueError("not a key error")
      except ValueError as exc:
          log.append(f"caught:{exc}")

      log
    hints:
    - KeyError는 suppress가 흡수하므로 after 분기는 실행되지 않습니다.
    - ValueError는 흡수 대상이 아니므로 with 바깥의 except로 전파됩니다.
  check:
    type: noError
    noError: suppress 사용 코드가 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: log 리스트가 before-key, before-value, caught:not a key error 순서로 채워져 흡수 대상과 비대상의 분기가 분명히 드러나야 합니다.
- id: exitstack
  title: ExitStack으로 동적 자원 관리
  structuredPrimary: true
  subtitle: 자원 개수가 런타임에 결정될 때
  goal: ExitStack으로 반복문에서 열어야 하는 자원을 등록하고 with 종료 시 LIFO 순서로 정리합니다.
  why: 중첩 with는 자원 개수가 미리 정해진 경우에만 깔끔합니다. 런타임에 결정되는 자원에는 ExitStack이 필요합니다.
  explanation: contextlib.ExitStack은 enter_context로 컨텍스트 매니저를 등록하고, callback으로는 컨텍스트 매니저가 아닌 정리 함수도 등록할 수 있습니다. with 종료 시 모든 등록 항목이 LIFO 순서로 정리됩니다.
  tips:
  - enter_context는 매니저의 __enter__ 반환값을 그대로 돌려줍니다.
  - 한 항목 등록이 실패해도 이미 등록된 항목은 정상적으로 정리됩니다.
  snippet: |-
    from contextlib import ExitStack, contextmanager

    @contextmanager
    def labeled(label, log):
        log.append(f"open:{label}")
        try:
            yield label
        finally:
            log.append(f"close:{label}")

    events = []
    with ExitStack() as stack:
        names = [stack.enter_context(labeled(name, events)) for name in ("a", "b", "c")]
        events.append(f"using:{names}")

    events
  exercise:
    prompt: ExitStack에 callback으로 정리 함수를 등록하고, with 종료 시 callback이 모든 close 이후가 아니라 등록 역순(즉 callback이 가장 먼저) 실행되는지 검증하세요.
    starterCode: |-
      from contextlib import ExitStack, contextmanager

      @contextmanager
      def labeled(label, log):
          log.append(f"open:{label}")
          try:
              yield label
          finally:
              log.append(f"close:{label}")

      events = []
      with ExitStack() as stack:
          for name in ("a", "b", "c"):
              stack.enter_context(labeled(name, events))
          stack.callback(events.append, "callback-runs")

      events
    hints:
    - ExitStack은 등록 역순으로 정리합니다. callback이 가장 마지막에 등록되었으므로 가장 먼저 실행됩니다.
    - close 순서는 c, b, a 역순이어야 합니다.
  check:
    type: noError
    noError: ExitStack과 labeled 사용이 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: events 리스트에서 callback-runs가 close:c보다 앞에 나오고 close 순서가 c, b, a여야 LIFO 정리가 맞는 것입니다.
- id: nullcontext
  title: nullcontext로 조건부 컨텍스트
  structuredPrimary: true
  subtitle: 매니저가 필요 없는 경우의 자리 채우기
  goal: nullcontext로 같은 with 구문 안에서 자원을 쓰는 경우와 쓰지 않는 경우를 분기 없이 표현합니다.
  why: 동일 코드 경로에서 어떤 조건에서는 자원이 필요하고 어떤 조건에서는 필요 없을 때 if 분기로 매번 자원을 만들거나 안 만드는 것보다 nullcontext가 코드를 한 갈래로 유지합니다.
  explanation: contextlib.nullcontext(value)는 with 블록에서 아무것도 하지 않고 value를 as 절에 그대로 바인딩합니다. value가 None이면 as를 생략할 수 있습니다.
  tips:
  - 자원이 이미 호출자에서 만들어져 들어오면 nullcontext로 감싸 with 구문을 통일할 수 있습니다.
  - nullcontext는 enter/exit가 빈 동작이므로 자원 정리가 필요하면 진짜 매니저를 사용해야 합니다.
  snippet: |-
    from contextlib import contextmanager, nullcontext

    @contextmanager
    def realResource(label, log):
        log.append(f"open:{label}")
        try:
            yield label
        finally:
            log.append(f"close:{label}")

    def workflow(useResource, log):
        guard = realResource("disk", log) if useResource else nullcontext("no-resource")
        with guard as bound:
            log.append(f"body:{bound}")

    logA = []
    workflow(True, logA)

    logB = []
    workflow(False, logB)

    {"withResource": logA, "withoutResource": logB}
  exercise:
    prompt: nullcontext가 None을 기본값으로 두는 경우와 명시 값을 주는 경우의 차이를 코드로 확인하세요.
    starterCode: |-
      from contextlib import nullcontext

      def execute(maybeManager, log):
          with maybeManager as bound:
              log.append(f"bound:{bound}")

      defaultLog = []
      execute(nullcontext(), defaultLog)

      labelledLog = []
      execute(nullcontext("placeholder"), labelledLog)

      {"default": defaultLog, "labelled": labelledLog}
    hints:
    - nullcontext()는 기본값 None을 as 절에 바인딩합니다.
    - 명시 값으로 nullcontext("placeholder")를 호출하면 그 값이 그대로 들어옵니다.
  check:
    type: noError
    noError: nullcontext와 execute 호출이 NameError나 TypeError 없이 실행되어야 합니다.
    resultCheck: default 리스트는 bound:None이고 labelled 리스트는 bound:placeholder로 두 경우의 as 바인딩 차이가 드러나야 합니다.
assessment:
  masteryVariants:
  - id: 32_contextlib-finally-teardown-mastery
    mode: mastery
    unseen: true
    sourceSectionIds:
    - contextmanager-decorator
    - closing-cleanup
    title: '@contextmanager의 finally teardown 순서 증명하기'
    subtitle: open, body, close, caught
    goal: contextmanager로 만든 trace가 정상 경로와 예외 경로 모두에서 close 이벤트를 기록하는지 반환한다.
    why: contextlib 학습의 핵심은 with 문법이 아니라, 예외가 나도 정리 코드가 반드시 실행된다는 실행 순서를 몸에 붙이는 것입니다.
    explanation: trace_context_events(label, raise_in_body=False)를 완성해 open/body/close/caught 이벤트 순서를 반환하고 빈 label은 ValueError로
      막으세요.
    tips:
    - teardown 코드는 finally 안에 있어야 합니다.
    - close 이벤트는 caught보다 먼저 기록되어야 합니다.
    exercise:
      prompt: trace_context_events(label, raise_in_body=False)를 완성해 정상/예외 경로의 이벤트 순서를 반환하세요.
      starterCode: |-
        def trace_context_events(label, raise_in_body=False):
            raise NotImplementedError
      solution: |-
        def trace_context_events(label, raise_in_body=False):
            from contextlib import contextmanager

            if not label:
                raise ValueError("label required")

            @contextmanager
            def trace(name, events):
                events.append(f"open:{name}")
                try:
                    yield name
                finally:
                    events.append(f"close:{name}")

            events = []
            try:
                with trace(label, events) as bound:
                    events.append(f"body:{bound}")
                    if raise_in_body:
                        raise RuntimeError("boom")
            except RuntimeError:
                events.append("caught")

            return {
                "events": events,
                "closedBeforeCaught": "caught" not in events or events.index(f"close:{label}") < events.index("caught"),
                "lastEvent": events[-1],
            }
      hints:
      - try/except는 with 바깥에 두어 정리 뒤 caught가 기록되게 하세요.
      - events.index로 close와 caught 순서를 확인할 수 있습니다.
    check:
      id: python.builtins.contextlib.finally-teardown.mastery.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.builtins.contextlib.empty.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
        directories:
        - input
        - output
