    goal: 런타임에 주어진 자원 이름들을 ExitStack에 등록하고 callback과 close가 등록 역순으로 실행되는지 반환한다.
    why: 전이 과제에서는 고정된 with 중첩에서 동적인 자원 개수로 옮깁니다. 파일, 연결, 임시 자원 수가 실행 때 결정되는 자동화에 필요합니다.
