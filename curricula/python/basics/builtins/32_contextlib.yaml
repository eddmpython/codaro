    title: suppress가 지정 예외만 흡수한다는 점 회상하기
    subtitle: narrow exception handling
    goal: KeyError와 ValueError 흐름을 비교해 suppress(KeyError)가 KeyError만 흡수하고 ValueError는 전파시키는지 반환한다.
    why: 시간이 지나도 남아야 할 contextlib 감각은 suppress를 넓게 쓰면 버그를 숨기므로, 흡수할 예외를 좁게 지정해야 한다는 점입니다.
    explanation: simulate_suppress_flow(error_name)를 완성해 key, value, none 경로의 log와 흡수/전파 여부를 반환하세요.
    tips:
    - KeyError는 suppress(KeyError)가 흡수합니다.
    - ValueError는 suppress 대상이 아니므로 바깥 except로 이동합니다.
    exercise:
      prompt: simulate_suppress_flow(error_name)를 완성해 suppress(KeyError)의 흡수 대상과 비대상 흐름을 반환하세요.
      starterCode: |-
        def simulate_suppress_flow(error_name):
            raise NotImplementedError
      solution: |-
        def simulate_suppress_flow(error_name):
            from contextlib import suppress

            if error_name not in {"key", "value", "none"}:
                raise ValueError("unknown error flow")

            log = []
            try:
                with suppress(KeyError):
                    log.append("enter")
                    if error_name == "key":
                        raise KeyError("missing")
                    if error_name == "value":
                        raise ValueError("bad")
                    log.append("after")
            except ValueError as exc:
                log.append(f"caught:{exc}")

            return {
                "log": log,
                "suppressedKeyError": error_name == "key" and log == ["enter"],
                "propagatedValueError": any(item.startswith("caught:") for item in log),
            }
      hints:
      - suppress 안의 코드가 예외를 만나면 그 뒤 줄은 실행되지 않습니다.
      - ValueError는 바깥 except에서 caught 로그를 남기게 하세요.
