meta:
  id: 30_inspect
  title: inspect - 객체 검사
  category: builtins
  tags:
  - inspect
  - 검사
  - introspection
  - signature
  - 메타프로그래밍
  description: 런타임 객체 검사를 위한 inspect 모듈
  keywords:
  - inspect
  - 검사
  - introspection
  - signature
  - 메타프로그래밍
intro:
  emoji: 🔍
  points:
  - 객체 정보 추출
  - 함수 시그니처 확인
  - 소스 코드 조회
  - 메타프로그래밍 지원
  direction: inspect 객체 검사에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 작은 샘플 입력 확인 후 모듈 함수 호출에 맞는 코드 입력을 고릅니다.
  - inspect 객체 검사 결과를 반환값, stdout, 객체 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 표준 라이브러리 유틸리티에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 모듈 임포트 입력 확인
      detail: 입력 기준(작은 샘플 입력)과 필요한 조건을 먼저 고정합니다.
    - label: 타입 확인 처리 실행
      detail: 모듈 함수 호출 코드를 실행해 중간 결과를 확인합니다.
    - label: 함수 시그니처 결과 검증
      detail: 반환값, stdout, 객체 상태 기준으로 실행 결과를 비교합니다.
    - label: inspect 객체 검사 재사용
      detail: 완성 코드를 표준 라이브러리 유틸리티에 붙일 수 있게 정리합니다.
    runtime:
    - label: 표준 라이브러리 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: inspect 객체 검사 실행
      detail: 셀을 실행해 반환값, stdout, 객체 상태와 예외 상태를 확인합니다.
    - label: inspect 객체 검사 완료
      detail: 검증된 코드를 표준 라이브러리 유틸리티로 남깁니다.
sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: inspect 시작하기
  goal: 모듈 임포트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    inspect는 파이썬 표준 라이브러리입니다. 런타임에 객체의 정보를 검사하고 추출할 수 있습니다.

    inspect는 디버깅, 문서 자동 생성, 메타프로그래밍에 유용합니다. 객체의 내부 구조를 런타임에 파악할 수 있습니다.
  snippet: |-
    import inspect

    def greet(name):
        return f"Hello {name}"

    sig = inspect.signature(greet)
    str(sig)
  exercise:
    prompt: 모듈 임포트 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      def greet(name):
          return f"Hello {name}"

      sig = inspect.signature(greet)
      str(sig)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 모듈 임포트의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 모듈 임포트 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: type_checking
  title: 타입 확인
  structuredPrimary: true
  subtitle: 객체 종류 판별
  goal: 타입 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    inspect 모듈은 객체의 타입을 확인하는 다양한 함수를 제공합니다.

    isinstance()와 달리 inspect의 is* 함수들은 더 구체적인 타입을 확인합니다. 예: 함수 vs 메서드
  snippet: |-
    import inspect

    def myFunc():
        pass

    class MyClass:
        pass

    funcCheck = inspect.isfunction(myFunc)
    classCheck = inspect.isclass(MyClass)

    funcCheck, classCheck
  exercise:
    prompt: 타입 확인 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      def myFunc():
          pass

      class MyClass:
          pass

      funcCheck = inspect.isfunction(myFunc)
      classCheck = inspect.isclass(MyClass)

      funcCheck, classCheck
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 타입 확인의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 타입 확인 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: signatures
  title: 함수 시그니처
  structuredPrimary: true
  subtitle: 매개변수 정보
  goal: 함수 시그니처에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    signature()로 함수의 매개변수 정보를 추출할 수 있습니다.

    signature()는 문서 자동 생성이나 함수 래퍼 작성 시 매우 유용합니다. 동적으로 함수 호출 방법을 결정할 수 있습니다.
  snippet: |-
    import inspect

    def calculate(x, y, z=10):
        return x + y + z

    sig = inspect.signature(calculate)
    params = list(sig.parameters.keys())

    params
  exercise:
    prompt: 함수 시그니처 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      def calculate(x, y, z=10):
          return x + y + z

      sig = inspect.signature(calculate)
      params = list(sig.parameters.keys())

      params
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 함수 시그니처의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 함수 시그니처 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: members
  title: 멤버 조회
  structuredPrimary: true
  subtitle: getmembers 함수
  goal: 멤버 조회에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    getmembers()로 객체의 모든 속성과 메서드를 조회할 수 있습니다.

    getmembers()는 상속된 멤버도 포함하므로, 커스텀 속성만 보려면 __dict__를 사용하거나 이름 필터링을 하세요.
  snippet: |-
    import inspect

    class Person:
        species = 'Human'

        def __init__(self, name):
            self.name = name

        def greet(self):
            return f"Hi, I'm {self.name}"

    person = Person('Alice')
    members = inspect.getmembers(person)

    userDefined = [(n, type(v).__name__) for n, v in members if not n.startswith('_')]
    userDefined
  exercise:
    prompt: 멤버 조회 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      class Person:
          species = 'Human'

          def __init__(self, name):
              self.name = name

          def greet(self):
              return f"Hi, I'm {self.name}"

      person = Person('Alice')
      members = inspect.getmembers(person)

      userDefined = [(n, type(v).__name__) for n, v in members if not n.startswith('_')]
      userDefined
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 멤버 조회의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 멤버 조회 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: source_code
  title: 소스 코드 조회
  structuredPrimary: true
  subtitle: getsource 함수
  goal: 소스 코드 조회에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    getsource()로 함수나 클래스의 소스 코드를 문자열로 가져올 수 있습니다.

    getsource()는 인터랙티브 셸이나 동적으로 생성된 함수에서는 작동하지 않습니다. 파일에 정의된 객체만 가능합니다.
  snippet: |-
    import importlib.util
    import inspect
    import sys
    import tempfile
    import textwrap
    from pathlib import Path

    moduleCode = textwrap.dedent('''
    def fibonacci(n):
        if n <= 1:
            return n
        return fibonacci(n - 1) + fibonacci(n - 2)
    ''')

    with tempfile.TemporaryDirectory() as tempDir:
        modulePath = Path(tempDir) / 'math_tools.py'
        modulePath.write_text(moduleCode, encoding='utf-8')
        spec = importlib.util.spec_from_file_location('math_tools', modulePath)
        assert spec is not None and spec.loader is not None
        module = importlib.util.module_from_spec(spec)
        sys.modules[spec.name] = module
        spec.loader.exec_module(module)
        source = inspect.getsource(module.fibonacci)

    assert 'def fibonacci' in source
    source
  exercise:
    prompt: 소스 코드 조회 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import importlib.util
      import inspect
      import sys
      import tempfile
      import textwrap
      from pathlib import Path

      moduleCode = textwrap.dedent('''
      def fibonacci(n):
          if n <= 1:
              return n
          return fibonacci(n - 1) + fibonacci(n - 2)
      ''')

      with tempfile.TemporaryDirectory() as tempDir:
          modulePath = Path(tempDir) / 'math_tools.py'
          modulePath.write_text(moduleCode, encoding='utf-8')
          spec = importlib.util.spec_from_file_location('math_tools', modulePath)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)
          source = inspect.getsource(module.fibonacci)

      assert 'def fibonacci' in source
      source
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 소스 코드 조회의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 소스 코드 조회 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: advanced_inspection
  title: 고급 검사
  structuredPrimary: true
  subtitle: 프레임과 스택
  goal: 고급 검사에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    inspect는 현재 실행 중인 코드의 스택 정보도 조회할 수 있습니다.

    프레임 검사는 디버깅 도구나 로깅 프레임워크에서 호출 위치를 자동으로 기록하는데 사용됩니다.
  snippet: |-
    import inspect

    def currentFunction():
        frame = inspect.currentframe()
        return frame.f_code.co_name

    funcName = currentFunction()
    funcName
  exercise:
    prompt: 고급 검사 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      def currentFunction():
          frame = inspect.currentframe()
          return frame.f_code.co_name

      funcName = currentFunction()
      funcName
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 고급 검사의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 고급 검사 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 활용 사례
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    inspect 모듈을 활용한 실무 패턴들입니다.

    inspect는 프레임워크나 라이브러리 개발 시 매우 유용합니다. 사용자 정의 함수를 분석하여 자동으로 처리할 수 있습니다.
  snippet: |-
    import inspect

    def multiply(x: int, y: int) -> int:
        """두 수를 곱합니다."""
        return x * y

    sig = inspect.signature(multiply)
    doc = inspect.getdoc(multiply)

    documentation = {
        'name': multiply.__name__,
        'signature': str(sig),
        'docstring': doc,
        'parameters': list(sig.parameters.keys())
    }

    documentation
  exercise:
    prompt: 실전 활용 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import inspect

      def multiply(x: int, y: int) -> int:
          """두 수를 곱합니다."""
          return x * y

      sig = inspect.signature(multiply)
      doc = inspect.getdoc(multiply)

      documentation = {
          'name': multiply.__name__,
          'signature': str(sig),
          'docstring': doc,
          'parameters': list(sig.parameters.keys())
      }

      documentation
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 실전 활용의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 실전 활용 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '검증 루프: 플러그인 계약 검사'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: '검증 루프: 플러그인 계약 검사에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: inspect의 실무 가치는 런타임 객체를 들여다본 뒤 계약을 자동 검증하는 데 있습니다. 함수 시그니처, 타입 힌트, docstring, 공개 메서드 목록을
    검사하면 플러그인이나 자동화 훅을 실행 전에 걸러낼 수 있습니다.
  tips:
