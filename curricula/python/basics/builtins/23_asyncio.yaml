      async def fetchData():
          await asyncio.sleep(0.1)
          return "Data loaded"

      output = asyncio.run(fetchData())
      output
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
