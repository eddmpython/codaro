    - 첫 실패에서는 표시된 실제 반환값과 계약의 차이 한 가지부터 고치세요.
    exercise:
      prompt: count_word(text, word)가 공백으로 나눈 단어의 대소문자 무관 등장 횟수를 반환하도록 완성하세요.
      starterCode: |-
        def count_word(text, word):
