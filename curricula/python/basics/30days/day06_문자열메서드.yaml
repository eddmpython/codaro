    exercise:
      prompt: clean_csv(text)가 쉼표로 나눈 항목 공백을 지운 뒤 ', '로 다시 이어 반환하도록 완성하세요.
      starterCode: |-
        def clean_csv(text):
            raise NotImplementedError
      solution: |-
        def clean_csv(text):
            return ', '.join(part.strip() for part in text.split(','))
