      expectedError: ValueError
  check:
    type: noError
    noError: '현업 흐름 검증: 상품 입력값을 안전하게 객체로 만들기의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
