- id: workflow_validation
  title: '검증 루프: 변경되면 안 되는 설정값 다루기'
  structuredPrimary: true
  subtitle: 튜플의 불변성과 언패킹을 안전한 데이터 계약으로 사용
  goal: '검증 루프: 변경되면 안 되는 설정값 다루기에서 예상값과 실제 실행 결과를 비교하는 검증 흐름을 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: 튜플은 리스트의 불편한 버전이 아니라, 바뀌면 안 되는 값 묶음을 표현하는 방법입니다. 좌표, 색상, 설정값, 함수 반환값처럼 길이와 순서가 계약인 데이터를
    다룰 때 튜플을 쓰면 실수로 수정되는 일을 막을 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    serverConfig = ('localhost', 8080, True)
    hostName, portNumber, secureMode = serverConfig

    endpoint = f'http://{hostName}:{portNumber}'
    if secureMode:
        endpoint = endpoint.replace('http://', 'https://')

    assert len(serverConfig) == 3
    assert hostName == 'localhost'
    assert portNumber == 8080
    assert endpoint == 'https://localhost:8080'
  exercise:
    prompt: '검증 루프: 변경되면 안 되는 설정값 다루기 예제에서 기대 문자열이나 실제 출력 문구를 바꾸고 assert 비교가 맞는지 확인하세요.'
    starterCode: |-
      topLeft = (10, 20)
      bottomRight = (70, 95)
      left, top = topLeft
      right, bottom = bottomRight
      boxSize = (right - left, bottom - top)

      assert boxSize == (60, 75)
      assert topLeft == (10, 20)
      boxSize
    hints:
    - 바꿀 지점은 expected 값과 실제 print()/계산 호출입니다.
    - 실행 뒤 기대값과 실제 결과가 같을 때만 검증이 통과하는지 보세요.
    predict:
      prompt: 셀 마지막 표현식의 값은 어떻게 표시될까요?
      expectedValue: (직접 실행해 본 값을 적어주세요)
  check:
    type: noError
    noError: '검증 루프: 변경되면 안 되는 설정값 다루기에서 `topLeft` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.'
    resultCheck: '검증 루프: 변경되면 안 되는 설정값 다루기에서 기대값과 실제 결과가 같으면 검증이 통과하고, 다르면 실패해야 합니다.'
