sections:
- id: with_basic
  title: with 문 기초
  structuredPrimary: true
  subtitle: 자동 리소스 관리
  goal: with 문 기초에서 `day28Scratch` 값이 이후 출력이나 확인 결과와 어떻게 연결되는지 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    with 문은 리소스를 자동으로 정리하는 파이썬의 강력한 기능입니다. 파일을 열고 닫거나, 데이터베이스 연결을 관리할 때 사용합니다. with 블록이 끝나면 자동으로 정리 작업이 수행되므로 close()를 직접 호출할 필요가 없습니다.

    with 문을 사용하면 예외가 발생해도 리소스가 자동으로 정리됩니다.
  snippet: |-
    from pathlib import Path
    import tempfile

    day28Scratch = Path(tempfile.mkdtemp(prefix='codaro_day28_'))
    testFile = day28Scratch / 'test.txt'
    content = ''
    with open(testFile, 'w') as f:
        f.write('Hello World')
        content = 'written'
    content
  exercise:
    prompt: with 문 기초 예제에서 `day28Scratch`, `testFile`, `content` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from pathlib import Path
      import tempfile

      day28Scratch = Path(tempfile.mkdtemp(prefix='codaro_day28_'))
      testFile = day28Scratch / 'test.txt'
      content = ''
      with open(testFile, 'w') as f:
          f.write('Hello World')
          content = 'written'
      content
    hints:
    - 바꿀 지점은 `day28Scratch = ...` 오른쪽 값입니다.
    - 실행 뒤 `day28Scratch` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
    predict:
      prompt: 셀 마지막 표현식의 값은 어떻게 표시될까요?
      expectedValue: (직접 실행해 본 값을 적어주세요)
  check:
    noError: with 문 기초에서 `day28Scratch` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: with 문 기초 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: context_manager_protocol
  title: 컨텍스트 매니저 프로토콜
  structuredPrimary: true
  subtitle: __enter__와 __exit__
  goal: 컨텍스트 매니저 프로토콜에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    컨텍스트 매니저는 __enter__와 __exit__ 메서드를 구현한 객체입니다. __enter__는 with 블록 진입시 호출되고, __exit__는 블록 종료시 호출됩니다. __exit__는 예외 정보를 받아 처리할 수 있으며, True를 반환하면 예외를 억제합니다.

    __exit__의 세 매개변수는 예외 타입, 예외 값, 트레이스백입니다.
  snippet: |-
    class SimpleContext:
        def __enter__(self):
            return 'entered'

        def __exit__(self, excType, excVal, excTb):
            return False

    with SimpleContext() as sc:
        result = sc
    result
  exercise:
    prompt: 컨텍스트 매니저 프로토콜 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class SimpleContext:
          def __enter__(self):
              return 'entered'

          def __exit__(self, excType, excVal, excTb):
              return False

      with SimpleContext() as sc:
          result = sc
      result
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
    predict:
      prompt: 셀 마지막 표현식의 값은 어떻게 표시될까요?
      expectedValue: (직접 실행해 본 값을 적어주세요)
  check:
    type: noError
    noError: 컨텍스트 매니저 프로토콜의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 컨텍스트 매니저 프로토콜 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: resource_management
  title: 리소스 관리
  structuredPrimary: true
  subtitle: 파일과 연결 관리
  goal: 리소스 관리에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    컨텍스트 매니저의 주요 용도는 리소스 관리입니다. 파일, 네트워크 연결, 데이터베이스 커넥션 등 사용 후 반드시 정리해야 하는 리소스를 안전하게 처리합니다. with 문을 사용하면 예외 발생 여부와 관계없이 리소스가 정리됩니다.

    with 블록이 중첩되면 안쪽 블록부터 바깥쪽 순서로 __exit__가 호출됩니다.
  snippet: |-
    class FileManager:
        def __init__(self, filename, mode):
            self.filename = filename
            self.mode = mode
            self.fileObj = None

        def __enter__(self):
            self.fileObj = open(self.filename, self.mode)
            return self.fileObj

        def __exit__(self, excType, excVal, excTb):
            if self.fileObj:
                self.fileObj.close()
            return False

    with FileManager('resource.txt', 'w') as fm:
        fm.write('Resource managed')
    'completed'
  exercise:
    prompt: 리소스 관리 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class FileManager:
          def __init__(self, filename, mode):
              self.filename = filename
              self.mode = mode
              self.fileObj = None

          def __enter__(self):
              self.fileObj = open(self.filename, self.mode)
              return self.fileObj

          def __exit__(self, excType, excVal, excTb):
              if self.fileObj:
                  self.fileObj.close()
              return False

      with FileManager('resource.txt', 'w') as fm:
          fm.write('Resource managed')
      'completed'
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
    predict:
      prompt: 셀 마지막 줄의 문자열은 어떻게 표시될까요?
      expectedValue: 'completed'
      expectedDtype: str
  check:
    noError: 리소스 관리의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 리소스 관리 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: exception_handling
  title: 예외 처리
  structuredPrimary: true
  subtitle: 컨텍스트 매니저와 예외
  goal: 예외 처리에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    컨텍스트 매니저는 예외 처리에 강력합니다. __exit__ 메서드는 예외 정보를 받아 처리할 수 있으며, True를 반환하면 예외를 억제합니다. 이를 통해 정리 작업은 수행하되 예외 전파를 제어할 수 있습니다.

    __exit__가 True를 반환하면 예외가 억제되고, False나 None을 반환하면 예외가 전파됩니다.
  snippet: |-
    class ExceptionSuppressor:
        def __enter__(self):
            return self

        def __exit__(self, excType, excVal, excTb):
            if excType is ZeroDivisionError:
                return True
            return False

    outcome = 'no error'
    with ExceptionSuppressor():
        outcome = 10 / 0
    outcome
  exercise:
    prompt: 예외 처리 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class ExceptionSuppressor:
          def __enter__(self):
              return self

          def __exit__(self, excType, excVal, excTb):
              if excType is ZeroDivisionError:
                  return True
              return False

      outcome = 'no error'
      with ExceptionSuppressor():
          outcome = 10 / 0
      outcome
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
    predict:
      prompt: 셀 마지막 표현식의 값은 어떻게 표시될까요?
      expectedValue: (직접 실행해 본 값을 적어주세요)
  check:
    type: noError
    noError: 예외 처리의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 예외 처리 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: multiple_context
  title: 다중 컨텍스트
  structuredPrimary: true
  subtitle: 여러 컨텍스트 매니저 사용
  goal: 다중 컨텍스트에서 `sourceFile` 값이 이후 출력이나 확인 결과와 어떻게 연결되는지 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    하나의 with 문에서 여러 컨텍스트 매니저를 사용할 수 있습니다. 콤마로 구분하여 나열하며, 왼쪽부터 오른쪽 순서로 __enter__가 호출되고, 오른쪽부터 왼쪽 순서로 __exit__가 호출됩니다.

    다중 컨텍스트는 with a, b, c: 형태로 작성하며, 중첩 with와 동일하게 동작합니다.
  snippet: |-
    sourceFile = day28Scratch / 'source.txt'
    destFile = day28Scratch / 'dest.txt'
    with open(sourceFile, 'w') as src, open(destFile, 'w') as dst:
        src.write('source')
        dst.write('destination')
        combined = 'both written'
    combined
  exercise:
    prompt: 다중 컨텍스트 예제에서 `sourceFile`, `destFile`, `combined` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      sourceFile = day28Scratch / 'source.txt'
      destFile = day28Scratch / 'dest.txt'
      with open(sourceFile, 'w') as src, open(destFile, 'w') as dst:
          src.write('source')
          dst.write('destination')
          combined = 'both written'
      combined
    hints:
    - 바꿀 지점은 `sourceFile = ...` 오른쪽 값입니다.
    - 실행 뒤 `sourceFile` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
    predict:
      prompt: 셀 마지막 표현식의 값은 어떻게 표시될까요?
      expectedValue: (직접 실행해 본 값을 적어주세요)
  check:
    noError: 다중 컨텍스트에서 `sourceFile` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 다중 컨텍스트 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical_patterns
  title: 실전 패턴
  structuredPrimary: true
  subtitle: 컨텍스트 매니저 활용
  goal: 실전 패턴에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    컨텍스트 매니저는 실무에서 다양하게 활용됩니다. 타이머, 디렉토리 변경, 설정 임시 변경, 트랜잭션 관리 등 시작과 종료가 명확한 작업에 유용합니다. 코드의 안전성과 가독성을 동시에 향상시킵니다.

    컨텍스트 매니저는 '설정-작업-복원' 패턴에 이상적입니다.
  snippet: |-
    import time

    class Timer:
        def __enter__(self):
            self.start = time.time()
            return self

        def __exit__(self, excType, excVal, excTb):
            self.elapsed = time.time() - self.start
            return False

    timer = Timer()
    with timer:
        total = sum(range(1000))
    timer.elapsed > 0
  exercise:
    prompt: 실전 패턴 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import time

      class Timer:
          def __enter__(self):
              self.start = time.time()
              return self

          def __exit__(self, excType, excVal, excTb):
              self.elapsed = time.time() - self.start
              return False

      timer = Timer()
      with timer:
          total = sum(range(1000))
      timer.elapsed > 0
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
    predict:
      prompt: 셀을 실행하면 출력 영역과 마지막 표현식에 무엇이 표시될까요?
      expectedValue: (직접 실행해 본 결과를 적어주세요)
  check:
    type: noError
    noError: 실전 패턴의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 실전 패턴 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 리포트 파일을 안전하게 쓰고 복원하기'
  structuredPrimary: true
  subtitle: 예측 → 리소스 열기 → 오류 처리 → 정리 검증
  goal: '현업 흐름 검증: 리포트 파일을 안전하게 쓰고 복원하기에서 예상값과 실제 실행 결과를 비교하는 검증 흐름을 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    고급 문법은 멋진 문법을 쓰는 것이 아니라, 열고 닫아야 하는 리소스와 실패 시 복원해야 하는 상태를 안전하게 다루는 데서 가치가 생깁니다. 여기서는 리포트 파일 컨텍스트 매니저를 직접 만들고 정상 기록, 오류, 정리 상태를 검증합니다.

    실무 변주: ReportWriter에 append 모드와 dryRun 옵션을 추가하고, 실패 시 기존 파일이 유지되는지까지 검증해 보세요.
  snippet: |-
    from pathlib import Path
    import tempfile

    class ReportWriter:
        def __init__(self, root, filename):
            self.root = Path(root)
            self.path = self.root / filename
            self.fileObj = None

        def __enter__(self):
            self.root.mkdir(parents=True, exist_ok=True)
            self.fileObj = self.path.open('w', encoding='utf-8')
            return self

        def writeLine(self, text):
            if not text.strip():
                raise ValueError('report line must not be empty')
            self.fileObj.write(text.strip() + '\n')

        def __exit__(self, excType, excValue, traceback):
            self.fileObj.close()
            return False

    with tempfile.TemporaryDirectory() as tempDir:
        with ReportWriter(tempDir, 'dailyReport.txt') as report:
            report.writeLine('paidCount=2')
            report.writeLine('paidRevenue=230000')
            reportClosedInside = report.fileObj.closed
            reportPath = report.path

        savedReport = reportPath.read_text(encoding='utf-8')
        reportClosedAfter = report.fileObj.closed

    assert reportClosedInside is False
    assert reportClosedAfter is True
    assert 'paidRevenue=230000' in savedReport
    savedReport
  exercise:
    prompt: '현업 흐름 검증: 리포트 파일을 안전하게 쓰고 복원하기 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      from pathlib import Path
      import tempfile

      class ReportWriter:
          def __init__(self, root, filename):
              self.root = Path(root)
              self.path = self.root / filename
              self.fileObj = None

          def __enter__(self):
              self.root.mkdir(parents=True, exist_ok=True)
              self.fileObj = self.path.open('w', encoding='utf-8')
              return self

          def writeLine(self, text):
              if not text.strip():
                  raise ValueError('report line must not be empty')
              self.fileObj.write(text.strip() + '\n')

          def __exit__(self, excType, excValue, traceback):
              self.fileObj.close()
              return False

      with tempfile.TemporaryDirectory() as tempDir:
          with ReportWriter(tempDir, 'dailyReport.txt') as report:
              report.writeLine('paidCount=2')
              report.writeLine('paidRevenue=230000')
              reportClosedInside = report.fileObj.closed
              reportPath = report.path

          savedReport = reportPath.read_text(encoding='utf-8')
          reportClosedAfter = report.fileObj.closed

      assert reportClosedInside is False
      assert reportClosedAfter is True
      assert 'paidRevenue=230000' in savedReport
      savedReport
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
    predict:
      prompt: 이 코드를 실행하면 어떤 예외가 발생할까요?
      expectedError: ValueError
  check:
    type: noError
    noError: '현업 흐름 검증: 리포트 파일을 안전하게 쓰고 복원하기의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '현업 흐름 검증: 리포트 파일을 안전하게 쓰고 복원하기 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
