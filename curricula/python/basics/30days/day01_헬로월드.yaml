sections:
- id: hello_world
  title: Hello World
  structuredPrimary: true
  subtitle: 첫 파이썬 프로그램
  goal: Hello World에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    프로그래밍을 처음 배울 때는 보통 'Hello World'를 화면에 출력합니다. 코드가 제대로 실행되는지 가장 작게 확인할 수 있기 때문입니다. 파이썬에서는 print()를 사용해 화면에 텍스트를 보여줍니다.

    작은따옴표('')와 큰따옴표("")는 기능상 차이가 없습니다. 편한 것을 사용하세요.
  tips:
  - 작은따옴표('')와 큰따옴표("")는 기능상 차이가 없습니다. 편한 것을 사용하세요.
  snippet: print('Hello World')
  exercise:
    prompt: Hello World 예제에서 따옴표 안 문구나 출력 변수를 바꾸고 출력이 그대로 바뀌는지 확인하세요.
    starterCode: print('Hello World')
    hints:
    - 바꿀 지점은 print() 안의 문자열, 변수명, 쉼표로 연결된 값입니다.
    - 실행 뒤 출력 영역에 수정한 문구나 값이 빠짐없이 보이는지 확인하세요.
  check:
    type: noError
    noError: Hello World의 print() 호출이 따옴표와 괄호 조건을 만족하고 출력되어야 합니다.
    resultCheck: Hello World 출력 영역에 직접 바꾼 문자열이나 값이 그대로 나타나야 합니다.
- id: print_korean
  title: 한글 출력하기
  structuredPrimary: true
  subtitle: 파이썬은 모든 언어 지원
  goal: 한글 출력하기에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    파이썬은 영어뿐만 아니라 한글, 일본어, 중국어처럼 여러 언어의 글자를 출력할 수 있습니다. 지금은 어려운 원리를 외울 필요 없이, 따옴표 안에 넣은 글자가 화면에 보인다고 이해하면 됩니다.

    이모지도 출력할 수 있습니다: print('🐍 Python')
  tips:
  - '이모지도 출력할 수 있습니다: print(''🐍 Python'')'
  snippet: print('안녕하세요, 파이썬!')
  exercise:
    prompt: 한글 출력하기 예제에서 따옴표 안 문구나 출력 변수를 바꾸고 출력이 그대로 바뀌는지 확인하세요.
    starterCode: print('안녕하세요, 파이썬!')
    hints:
    - 바꿀 지점은 print() 안의 문자열, 변수명, 쉼표로 연결된 값입니다.
    - 실행 뒤 출력 영역에 수정한 문구나 값이 빠짐없이 보이는지 확인하세요.
  check:
    type: noError
    noError: 한글 출력하기의 print() 호출이 따옴표와 괄호 조건을 만족하고 출력되어야 합니다.
    resultCheck: 한글 출력하기 출력 영역에 직접 바꾼 문자열이나 값이 그대로 나타나야 합니다.
- id: print_multiple
  title: 여러 줄 출력하기
  structuredPrimary: true
  subtitle: print() 여러 번 사용
  goal: 여러 줄 출력하기에서 여러 print() 호출의 출력 순서와 줄 수를 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: 여러 줄의 텍스트를 출력하려면 print()를 여러 번 사용하면 됩니다. 각 print()는 자동으로 줄을 바꾸므로 다음 출력은 새 줄에서 시작됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    print('첫 번째 줄')
    print('두 번째 줄')
    print('세 번째 줄')
  exercise:
    prompt: 여러 줄 출력하기 예제에서 출력 문장 하나를 바꾸고 출력 줄 순서와 바뀐 줄을 확인하세요.
    starterCode: |-
      print('첫 번째 줄')
      print('두 번째 줄')
      print('세 번째 줄')
    hints:
    - 바꿀 지점은 각 print()의 따옴표 안 문구나 출력 변수에서 찾으세요.
    - 실행 뒤 줄 수와 순서가 유지되고, 수정한 줄만 의도대로 바뀌었는지 보세요.
  check:
    type: noError
    noError: 여러 줄 출력하기의 각 print() 호출이 따옴표와 괄호 조건을 만족하고 순서대로 출력되어야 합니다.
    resultCheck: 여러 줄 출력하기 출력 줄 수와 순서가 유지되고, 바꾼 줄의 문구가 출력 영역에 나타나야 합니다.
- id: print_newline
  title: 줄바꿈 문자
  structuredPrimary: true
  subtitle: \n으로 한 번에 여러 줄 출력
  goal: 줄바꿈 문자에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    \n은 줄바꿈 문자로, 하나의 print() 안에서 여러 줄을 출력할 수 있게 해줍니다. \n을 만나면 그 지점에서 줄이 바뀝니다. 백슬래시(\)와 문자 n을 함께 써서 만듭니다.

    \n을 사용하면 print() 한 번으로 여러 줄을 출력할 수 있어 편리합니다.
  tips:
  - \n을 사용하면 print() 한 번으로 여러 줄을 출력할 수 있어 편리합니다.
  snippet: print('첫 번째 줄\n두 번째 줄\n세 번째 줄')
  exercise:
    prompt: 줄바꿈 문자 예제에서 따옴표 안 문구나 출력 변수를 바꾸고 출력이 그대로 바뀌는지 확인하세요.
    starterCode: print('첫 번째 줄\n두 번째 줄\n세 번째 줄')
    hints:
    - 바꿀 지점은 print() 안의 문자열, 변수명, 쉼표로 연결된 값입니다.
    - 실행 뒤 출력 영역에 수정한 문구나 값이 빠짐없이 보이는지 확인하세요.
  check:
    type: noError
    noError: 줄바꿈 문자의 print() 호출이 따옴표와 괄호 조건을 만족하고 출력되어야 합니다.
    resultCheck: 줄바꿈 문자 출력 영역에 직접 바꾼 문자열이나 값이 그대로 나타나야 합니다.
- id: comment_single
  title: 한 줄 주석
  structuredPrimary: true
  subtitle: 코드에 설명 추가하기
  goal: 한 줄 주석에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    주석(Comment)은 프로그램 실행에 영향을 주지 않는 메모입니다. 코드에 설명을 추가하여 나중에 다시 볼 때나 다른 사람이 볼 때 이해하기 쉽게 만듭니다. 파이썬에서 한 줄 주석은 # 기호로 시작합니다.

    주석은 코드를 이해하기 쉽게 만들지만, 과도한 주석은 오히려 가독성을 해칩니다.
  tips:
  - 주석은 코드를 이해하기 쉽게 만들지만, 과도한 주석은 오히려 가독성을 해칩니다.
  snippet: print('실행됩니다')
  exercise:
    prompt: 한 줄 주석 예제에서 따옴표 안 문구나 출력 변수를 바꾸고 출력이 그대로 바뀌는지 확인하세요.
    starterCode: print('실행됩니다')
    hints:
    - 바꿀 지점은 print() 안의 문자열, 변수명, 쉼표로 연결된 값입니다.
    - 실행 뒤 출력 영역에 수정한 문구나 값이 빠짐없이 보이는지 확인하세요.
  check:
    type: noError
    noError: 한 줄 주석의 print() 호출이 따옴표와 괄호 조건을 만족하고 출력되어야 합니다.
    resultCheck: 한 줄 주석 출력 영역에 직접 바꾼 문자열이나 값이 그대로 나타나야 합니다.
- id: comment_multi
  title: 여러 줄 설명 메모
  structuredPrimary: true
  subtitle: 삼중 따옴표를 조심해서 보기
  goal: 여러 줄 설명 메모에서 여러 print() 호출의 출력 순서와 줄 수를 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    파이썬의 정식 주석은 #으로 시작하는 한 줄 주석입니다. 다만 삼중 따옴표(''' 또는 """)로 여러 줄 문자열을 만들어 설명 메모처럼 두는 코드도 자주 보입니다. 처음에는 '긴 설명을 여러 줄로 적는 방법' 정도로만 이해하면 됩니다.

    삼중 따옴표는 엄밀히 말하면 문자열입니다. 초보 단계에서는 일반 주석은 #으로 쓴다고 기억하세요.
  tips:
  - '삼중 따옴표는 엄밀히 말하면 문자열입니다. 초보 단계에서는 일반 주석은 #으로 쓴다고 기억하세요.'
  snippet: |-
    print('주석 전')
    '''
    이 부분은 여러 줄 설명 메모처럼 볼 수 있습니다.
    지금은 실행 결과에 보이지 않습니다.
    '''
    print('주석 후')
  exercise:
    prompt: 여러 줄 설명 메모 예제에서 출력 문장 하나를 바꾸고 출력 줄 순서와 바뀐 줄을 확인하세요.
    starterCode: |-
      print('주석 전')
      '''
      이 부분은 여러 줄 설명 메모처럼 볼 수 있습니다.
      지금은 실행 결과에 보이지 않습니다.
      '''
      print('주석 후')
    hints:
    - 바꿀 지점은 각 print()의 따옴표 안 문구나 출력 변수에서 찾으세요.
    - 실행 뒤 줄 수와 순서가 유지되고, 수정한 줄만 의도대로 바뀌었는지 보세요.
  check:
    type: noError
    noError: 여러 줄 설명 메모의 각 print() 호출이 따옴표와 괄호 조건을 만족하고 순서대로 출력되어야 합니다.
    resultCheck: 여러 줄 설명 메모 출력 줄 수와 순서가 유지되고, 바꾼 줄의 문구가 출력 영역에 나타나야 합니다.
- id: print_numbers
  title: 숫자 출력하기
  structuredPrimary: true
  subtitle: 따옴표 없이 숫자 출력
  goal: 숫자 출력하기에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: |-
    숫자를 출력할 때는 따옴표가 필요 없습니다. 따옴표로 감싸면 문자로 인식되고, 따옴표 없이 쓰면 숫자로 인식됩니다. 숫자는 계산에 사용할 수 있지만, 문자는 계산할 수 없습니다.

    print(123)은 숫자 123을, print('123')은 문자 '123'을 출력합니다.
  tips:
  - print(123)은 숫자 123을, print('123')은 문자 '123'을 출력합니다.
  snippet: print(123)
  exercise:
    prompt: 숫자 출력하기 예제에서 출력 숫자를 바꾸고 출력 영역 숫자가 그대로 바뀌는지 확인하세요.
    starterCode: print(123)
    hints:
    - 바꿀 지점은 print() 괄호 안의 숫자 리터럴입니다.
    - 실행 뒤 출력된 숫자가 입력한 숫자와 정확히 같은지 보세요.
  check:
    type: noError
    noError: 숫자 출력하기의 숫자 print() 호출이 SyntaxError 없이 출력되어야 합니다.
    resultCheck: 숫자 출력하기 출력 값이 직접 바꾼 숫자와 정확히 일치해야 합니다.
- id: print_calculation
  title: 계산 결과 출력하기
  structuredPrimary: true
  subtitle: 파이썬을 계산기처럼 사용
  goal: 계산 결과 출력하기에서 print() 입력값이 출력 영역에 어떻게 표시되는지 확인한다.
  why: 출력 확인은 코드가 의도대로 실행됐는지 가장 작게 점검하는 방법입니다.
  explanation: print() 안에서 직접 계산을 할 수 있습니다. 파이썬은 계산 결과를 자동으로 구한 후 출력합니다. 더하기(+), 빼기(-), 곱하기(*), 나누기(/)
    등 다양한 연산이 가능합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: print(10 + 20)
  exercise:
    prompt: 계산 결과 출력하기 예제에서 계산식의 숫자나 연산자를 바꾸고 출력 숫자가 새 계산 결과와 맞는지 확인하세요.
    starterCode: print(10 + 20)
    hints:
