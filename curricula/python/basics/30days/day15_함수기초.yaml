sections:
- id: def_basic
  title: 함수 정의
  structuredPrimary: true
  subtitle: def로 함수 만들기
  goal: 함수 정의에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수는 특정 작업을 수행하는 코드 블록입니다. def 함수명(): 형식으로 정의하며, 들여쓰기로 함수 본문을 작성합니다. 함수를 정의한 후 함수명()으로 호출하여 실행합니다.

    함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  tips:
  - 함수명은 소문자와 언더스코어를 사용하거나 카멜케이스를 사용합니다.
  snippet: |-
    def greet():
        msg = 'Hello'
        return msg

    greet()
  exercise:
    prompt: 함수 정의 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def greet():
          msg = 'Hello'
          return msg

      greet()
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 함수 정의의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 함수 정의 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: return_statement
  title: return 문
  structuredPrimary: true
  subtitle: 값 반환하기
  goal: return 문에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    return은 함수의 결과값을 반환합니다. return 값 형식으로 사용하며, 함수 실행을 즉시 종료하고 값을 호출한 곳으로 돌려줍니다. return이 없으면 None을 반환합니다.

    return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  tips:
  - return을 만나면 함수가 즉시 종료되므로 위치에 주의하세요.
  snippet: |-
    def add():
        answer = 10 + 20
        return answer

    add()
  exercise:
    prompt: return 문 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def add():
          answer = 10 + 20
          return answer

      add()
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: return 문의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: return 문 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: parameter_one
  title: 매개변수 1개
  structuredPrimary: true
  subtitle: 값을 받는 함수
  goal: 매개변수 1개에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    매개변수는 함수가 받는 입력값입니다. def 함수명(매개변수): 형식으로 정의하며, 호출시 전달하는 값을 인자라고 합니다. 매개변수를 사용하면 함수를 더 유연하게 만들 수 있습니다.

    매개변수명은 함수 안에서만 유효한 지역 변수입니다.
  tips:
  - 매개변수명은 함수 안에서만 유효한 지역 변수입니다.
  snippet: |-
    def double(num):
        return num * 2

    double(5)
  exercise:
    prompt: 매개변수 1개 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def double(num):
          return num * 2

      double(5)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 매개변수 1개의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 매개변수 1개 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: parameter_multiple
  title: 매개변수 여러 개
  structuredPrimary: true
  subtitle: 여러 값 받기
  goal: 매개변수 여러 개에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수는 여러 개의 매개변수를 받을 수 있습니다. 쉼표로 구분하여 나열하며, 호출시에도 같은 순서로 인자를 전달해야 합니다.

    매개변수 개수와 인자 개수가 일치해야 합니다.
  tips:
  - 매개변수 개수와 인자 개수가 일치해야 합니다.
  snippet: |-
    def addTwo(a, b):
        return a + b

    addTwo(10, 20)
  exercise:
    prompt: 매개변수 여러 개 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def addTwo(a, b):
          return a + b

      addTwo(10, 20)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 매개변수 여러 개의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 매개변수 여러 개 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: return_multiple
  title: 여러 값 반환
  structuredPrimary: true
  subtitle: 튜플로 반환
  goal: 여러 값 반환에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수는 여러 값을 반환할 수 있습니다. 쉼표로 구분하여 반환하면 튜플로 묶여서 반환됩니다. 호출한 곳에서 여러 변수로 받을 수 있습니다.

    여러 값을 반환하면 자동으로 튜플이 됩니다.
  tips:
  - 여러 값을 반환하면 자동으로 튜플이 됩니다.
  snippet: |-
    def minMax(a, b):
        if a < b:
            return a, b
        else:
            return b, a

    minMax(10, 5)
  exercise:
    prompt: 여러 값 반환 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def minMax(a, b):
          if a < b:
              return a, b
          else:
              return b, a

      minMax(10, 5)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 여러 값 반환의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 여러 값 반환 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: no_parameter
  title: 매개변수 없는 함수
  structuredPrimary: true
  subtitle: 입력 없이 실행
  goal: 매개변수 없는 함수에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수는 매개변수가 없어도 됩니다. 항상 같은 값을 반환하거나 내부 로직만 실행하는 함수에 사용합니다. 호출시에도 괄호만 씁니다.

    상수값이나 기본 설정을 반환할 때 유용합니다.
  tips:
  - 상수값이나 기본 설정을 반환할 때 유용합니다.
  snippet: |-
    def getPi():
        return 3.14159

    getPi()
  exercise:
    prompt: 매개변수 없는 함수 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def getPi():
          return 3.14159

      getPi()
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 매개변수 없는 함수의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 매개변수 없는 함수 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: no_return
  title: return 없는 함수
  structuredPrimary: true
  subtitle: 작업만 수행
  goal: return 없는 함수에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수는 return이 없어도 됩니다. return이 없으면 None을 반환합니다. 주로 작업만 수행하고 결과가 필요없을 때 사용합니다.

    반환값이 필요한 함수는 항상 return을 명시하는 것이 좋습니다.
  tips:
  - 반환값이 필요한 함수는 항상 return을 명시하는 것이 좋습니다.
  snippet: |-
    def doSomething():
        x = 10 + 20

    output = doSomething()
    output
  exercise:
    prompt: return 없는 함수 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def doSomething():
          x = 10 + 20

      output = doSomething()
      output
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: return 없는 함수의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: return 없는 함수 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: function_conditional
  title: 함수와 조건문
  structuredPrimary: true
  subtitle: 조건에 따른 처리
  goal: 함수와 조건문에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: |-
    함수 안에서 조건문을 사용하여 매개변수에 따라 다른 결과를 반환할 수 있습니다. 함수의 유연성이 크게 증가합니다.

    조건문으로 다양한 입력에 대응할 수 있습니다.
  tips:
  - 조건문으로 다양한 입력에 대응할 수 있습니다.
  snippet: |-
    def getGrade(score):
        if score >= 90:
            return 'A'
        elif score >= 80:
            return 'B'
        elif score >= 70:
            return 'C'
        else:
            return 'F'

    getGrade(85)
  exercise:
    prompt: 함수와 조건문 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def getGrade(score):
          if score >= 90:
              return 'A'
          elif score >= 80:
              return 'B'
          elif score >= 70:
              return 'C'
          else:
              return 'F'

      getGrade(85)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
