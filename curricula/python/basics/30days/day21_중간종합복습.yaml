sections:
- id: data_structures_review
  title: 자료구조 복습
  structuredPrimary: true
  subtitle: 문자열, 리스트, 튜플, 집합, 딕셔너리
  goal: 자료구조 복습에서 `phrase` 값이 이후 출력이나 확인 결과와 어떻게 연결되는지 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 파이썬의 5가지 핵심 자료구조를 복습합니다. 문자열(str), 리스트(list), 튜플(tuple), 집합(set), 딕셔너리(dict)의 특징과 메서드를
    다시 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    phrase = "Python Programming"
    phrase.lower().replace('p', 'J')
  exercise:
    prompt: 자료구조 복습 예제에서 `phrase` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      phrase = "Python Programming"
      phrase.lower().replace('p', 'J')
    hints:
    - 바꿀 지점은 `phrase = ...` 오른쪽 값입니다.
    - 실행 뒤 `phrase` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 자료구조 복습에서 `phrase` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 자료구조 복습 실행 뒤 `phrase` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: control_flow_review
  title: 제어문 복습
  structuredPrimary: true
  subtitle: 조건문과 반복문
  goal: 제어문 복습에서 조건값이 선택되는 분기와 결과를 어떻게 바꾸는지 확인한다.
  why: 조건 분기는 입력값에 따라 실행 경로가 바뀌므로 결과를 바로 확인해야 합니다.
  explanation: 조건문(if, elif, else)과 반복문(for, while)을 복습합니다. break, continue, else절을 활용하여 프로그램의 흐름을 제어할
    수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    score = 85
    'A' if score >= 90 else 'B' if score >= 80 else 'C'
  exercise:
    prompt: 제어문 복습 예제에서 조건값을 바꾸고 선택되는 분기와 결과가 달라지는지 확인하세요.
    starterCode: |-
      score = 85
      'A' if score >= 90 else 'B' if score >= 80 else 'C'
    hints:
    - 바꿀 지점은 if 조건식에 들어가는 비교값이나 boolean 값에서 찾으세요.
    - 실행 뒤 true/false 분기 중 어떤 코드가 평가됐는지 출력이나 변수값으로 확인하세요.
  check:
    type: noError
    noError: 제어문 복습의 조건식과 들여쓰기가 맞아 선택한 분기가 실행되어야 합니다.
    resultCheck: 제어문 복습 분기 결과가 바꾼 조건값에 맞게 달라져야 합니다.
- id: function_review
  title: 함수 복습
  structuredPrimary: true
  subtitle: def, return, 매개변수, 인자
  goal: 함수 복습에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수의 정의(def), 반환(return), 매개변수와 인자를 복습합니다. 기본 매개변수, 키워드 인자, *args, **kwargs, lambda까지 다양한
    함수 기법을 활용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def multiply(a, b):
        return a * b

    multiply(7, 8)
  exercise:
    prompt: 함수 복습 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def multiply(a, b):
          return a * b

      multiply(7, 8)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 함수 복습의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 함수 복습 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: module_file_review
  title: 모듈과 파일 복습
  structuredPrimary: true
  subtitle: import, 파일 입출력
  goal: 모듈과 파일 복습에서 `radius` 값이 이후 출력이나 확인 결과와 어떻게 연결되는지 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 모듈 가져오기(import, from, as)와 파일 입출력(open, read, write, with)을 복습합니다. math, random, datetime
    같은 표준 모듈을 활용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from math import sqrt, pi

    radius = 4
    area = pi * radius ** 2
    area
  exercise:
    prompt: 모듈과 파일 복습 예제에서 `radius`, `area` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      from math import sqrt, pi

      radius = 4
      area = pi * radius ** 2
      area
    hints:
    - 바꿀 지점은 `radius = ...` 오른쪽 값입니다.
    - 실행 뒤 `radius` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    type: noError
    noError: 모듈과 파일 복습에서 `radius` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 모듈과 파일 복습 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: exception_review
  title: 예외 처리 복습
  structuredPrimary: true
  subtitle: try, except, finally, raise
  goal: 예외 처리 복습에서 함수 입력과 반환값이 호출 결과로 연결되는지 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 예외 처리를 통해 오류를 안전하게 처리하는 방법을 복습합니다. try, except, finally, raise를 활용하여 안정적인 프로그램을 작성할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def safeDivide(a, b):
        try:
            return a / b
        except ZeroDivisionError:
            return 'Cannot divide by zero'

    safeDivide(10, 0)
  exercise:
    prompt: 예외 처리 복습 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def safeDivide(a, b):
          try:
              return a / b
          except ZeroDivisionError:
              return 'Cannot divide by zero'

      safeDivide(10, 0)
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    type: noError
    noError: 예외 처리 복습의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 예외 처리 복습 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: integrated_practice
  title: 통합 실전 문제
  structuredPrimary: true
  subtitle: 여러 개념을 종합적으로 활용
  goal: 통합 실전 문제에서 반복 대상과 반복 결과의 개수나 값 변화를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    여러 개념을 함께 활용하는 실전 문제들입니다. 자료구조, 제어문, 함수, 모듈을 통합적으로 사용하여 문제를 해결합니다.

    여러 개념을 함께 사용하면 더 강력한 프로그램을 만들 수 있습니다.
  snippet: |-
    sentence = "python is fun python is powerful"
    words = sentence.split()
    freq = {}
    for word in words:
        freq[word] = freq.get(word, 0) + 1
    freq
  exercise:
    prompt: 통합 실전 문제 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      sentence = "python is fun python is powerful"
      words = sentence.split()
      freq = {}
      for word in words:
          freq[word] = freq.get(word, 0) + 1
      freq
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 통합 실전 문제의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 통합 실전 문제 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기에서 예상값과 실제 실행 결과를 비교하는 검증 흐름을 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: 중간 복습에서는 문법을 따로따로 외우는 것보다, 작은 업무 흐름을 끝까지 통과시키는지가 중요합니다. 아래 코드는 문자열 정제, 딕셔너리 검증, 함수 분리,
    반복문, 예외 처리, 파일 입출력을 한 번에 연결합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from pathlib import Path
    import tempfile

    rawOrders = [
        {"id": " A-100 ", "status": " PAID ", "amount": "12000"},
        {"id": "A-101", "status": "cancelled", "amount": "8000"},
        {"id": "A-102", "status": "paid", "amount": "15000"},
    ]

    def normalizeOrder(row):
        requiredKeys = {"id", "status", "amount"}
        missingKeys = sorted(requiredKeys - set(row))
        if missingKeys:
            raise KeyError(f"missing keys: {missingKeys}")

        orderId = row["id"].strip()
        status = row["status"].strip().lower()

        try:
            amount = int(row["amount"])
        except ValueError as exc:
            raise ValueError(f"invalid amount: {row['amount']}") from exc

        return {"id": orderId, "status": status, "amount": amount}

    def summarizePaidOrders(orders):
        paidIds = []
        paidAmount = 0

        for order in orders:
            if order["status"] != "paid":
                continue
            paidIds.append(order["id"])
            paidAmount += order["amount"]

        return {
            "paidCount": len(paidIds),
            "paidAmount": paidAmount,
            "paidIds": paidIds,
        }

    normalizedOrders = [normalizeOrder(row) for row in rawOrders]
    summary = summarizePaidOrders(normalizedOrders)

    assert summary["paidCount"] == 2
    assert summary["paidAmount"] == 27000
    assert summary["paidIds"] == ["A-100", "A-102"]

    try:
        normalizeOrder({"id": "A-999", "status": "paid", "amount": "twelve"})
    except ValueError as exc:
        assert "invalid amount" in str(exc)

    with tempfile.TemporaryDirectory() as tempDir:
        reportPath = Path(tempDir) / "midReviewReport.txt"
        reportPath.write_text(
            f"paidCount={summary['paidCount']}\npaidAmount={summary['paidAmount']}",
            encoding="utf-8",
        )
        loadedReport = reportPath.read_text(encoding="utf-8")

    assert "paidCount=2" in loadedReport
    assert "paidAmount=27000" in loadedReport
    print("중간 복습 흐름 통과")
  exercise:
    prompt: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      from pathlib import Path
      import tempfile

      rawOrders = [
          {"id": " A-100 ", "status": " PAID ", "amount": "12000"},
          {"id": "A-101", "status": "cancelled", "amount": "8000"},
          {"id": "A-102", "status": "paid", "amount": "15000"},
      ]

      def normalizeOrder(row):
          requiredKeys = {"id", "status", "amount"}
          missingKeys = sorted(requiredKeys - set(row))
          if missingKeys:
              raise KeyError(f"missing keys: {missingKeys}")

          orderId = row["id"].strip()
          status = row["status"].strip().lower()

          try:
              amount = int(row["amount"])
          except ValueError as exc:
              raise ValueError(f"invalid amount: {row['amount']}") from exc

          return {"id": orderId, "status": status, "amount": amount}

      def summarizePaidOrders(orders):
          paidIds = []
          paidAmount = 0

          for order in orders:
              if order["status"] != "paid":
                  continue
              paidIds.append(order["id"])
              paidAmount += order["amount"]

          return {
              "paidCount": len(paidIds),
              "paidAmount": paidAmount,
              "paidIds": paidIds,
          }

      normalizedOrders = [normalizeOrder(row) for row in rawOrders]
      summary = summarizePaidOrders(normalizedOrders)

      assert summary["paidCount"] == 2
      assert summary["paidAmount"] == 27000
      assert summary["paidIds"] == ["A-100", "A-102"]

      try:
          normalizeOrder({"id": "A-999", "status": "paid", "amount": "twelve"})
      except ValueError as exc:
          assert "invalid amount" in str(exc)

      with tempfile.TemporaryDirectory() as tempDir:
          reportPath = Path(tempDir) / "midReviewReport.txt"
          reportPath.write_text(
              f"paidCount={summary['paidCount']}\npaidAmount={summary['paidAmount']}",
              encoding="utf-8",
          )
          loadedReport = reportPath.read_text(encoding="utf-8")

