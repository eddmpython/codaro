      starterCode: |-
        def group_totals(rows):
            raise NotImplementedError
      solution: |-
        def group_totals(rows):
            totals = {}
            for row in rows:
                category = row['category']
                totals[category] = totals.get(category, 0) + row['amount']
            return totals
      hints:
      - 반환값의 타입과 순서가 문제의 계약과 같은지 먼저 확인하세요.
