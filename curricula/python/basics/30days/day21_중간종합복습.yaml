    type: noError
    noError: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '현업 흐름 검증: 주문 데이터를 정제하고 리포트 만들기 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
