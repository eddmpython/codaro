    exercise:
      prompt: normalize_records(records)가 (name, score)를 score 내림차순의 'name:score' 목록으로 반환하도록 완성하세요.
      starterCode: |-
        def normalize_records(records):
            raise NotImplementedError
      solution: |-
        def normalize_records(records):
            ordered = sorted(records, key=lambda item: item[1], reverse=True)
            return [f"{name}:{score}" for name, score in ordered]
      hints:
      - 반환값의 타입과 순서가 문제의 계약과 같은지 먼저 확인하세요.
