      def fitRiskModel(model, features, labels):
          if features.shape[0] != len(labels):
              raise ValueError("특성 행 수와 타깃 길이가 다릅니다.")
          if len(set(labels)) < 2:
              raise ValueError("분류 모델은 최소 두 개 이상의 클래스가 필요합니다.")
          try:
              return model.fit(features, labels)
          except ValueError as exc:
              raise ValueError("모델 학습 입력을 다시 확인하세요.") from exc

      trainedRiskModel = fitRiskModel(riskPipeline, xTrain, yTrain)
