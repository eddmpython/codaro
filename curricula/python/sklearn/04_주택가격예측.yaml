    title: '미션2: 상위 3개 특성만으로 모델 성능 비교'
    code: |-
      from sklearn.model_selection import train_test_split, cross_val_score
      from sklearn.preprocessing import StandardScaler
      from sklearn.linear_model import LinearRegression
      from sklearn.metrics import r2_score
      from codaro.curriculum.localData import loadLocalDataset
      import pandas as pd
      import numpy as np

      housing = loadLocalDataset("boston_housing")
      xFull = housing.drop(columns=["medv"])
      yFull = housing["medv"]
      featureNamesFull = xFull.columns.tolist()

      xTrF, xTeF, yTrF, yTeF = train_test_split(xFull, yFull, test_size=0.2, random_state=42)
      scF = StandardScaler()
      modelF = LinearRegression()
      modelF.fit(scF.fit_transform(xTrF), yTrF)

      coefAbs = pd.Series(np.abs(modelF.coef_), index=featureNamesFull)
      top3 = coefAbs.nlargest(3).index.tolist()

      xTop3 = xFull[top3]
      xTr3, xTe3, yTr3, yTe3 = train_test_split(xTop3, yFull, test_size=0.2, random_state=42)
      sc3 = StandardScaler()
      model3 = LinearRegression()

      cvFull = cross_val_score(modelF, scF.fit_transform(xTrF), yTrF, cv=5, scoring='r2')
      cv3 = cross_val_score(model3, sc3.fit_transform(xTr3), yTr3, cv=5, scoring='r2')

      pd.DataFrame({
          'Model': ['All 8 Features', f'Top 3: {top3}'],
          'CV R² mean': [cvFull.mean(), cv3.mean()],
          'CV R² std': [cvFull.std(), cv3.std()]
      })
