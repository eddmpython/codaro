      import pandas as pd
      import numpy as np
      from sklearn.datasets import load_wine
      from sklearn.model_selection import train_test_split
      from sklearn.preprocessing import StandardScaler
      from sklearn.ensemble import RandomForestClassifier
      from sklearn.metrics import classification_report
      import matplotlib.pyplot as plt

      wine = load_wine()
      xWine = pd.DataFrame(wine.data, columns=wine.feature_names)
      yWine = wine.target

      xTrW, xTeW, yTrW, yTeW = train_test_split(xWine, yWine, test_size=0.2, random_state=42)
      scalerW = StandardScaler()
      xTrWsc = scalerW.fit_transform(xTrW)
      xTeWsc = scalerW.transform(xTeW)

      rfWine = RandomForestClassifier(n_estimators=100, random_state=42)
      rfWine.fit(xTrWsc, yTrW)
      predW = rfWine.predict(xTeWsc)
      print(classification_report(yTeW, predW, target_names=wine.target_names))

      impW = pd.DataFrame({"feature": xWine.columns, "importance": rfWine.feature_importances_})
      impW = impW.sort_values("importance", ascending=False).head(10)
      figM2, axM2 = plt.subplots(figsize=(10, 5))
      axM2.barh(impW["feature"][::-1], impW["importance"][::-1], color="purple")
      axM2.set_xlabel("Importance")
      axM2.set_title("Wine Top 10 Feature Importances")
      figM2
