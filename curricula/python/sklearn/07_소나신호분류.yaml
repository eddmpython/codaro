- id: step6_cm
  title: 6단계. 혼동행렬
  structuredPrimary: true
  subtitle: 오분류 분석
  goal: '6단계. 혼동행렬: 실행 가능한 Python 흐름으로 익힌다.'
  why: '6단계. 혼동행렬: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
