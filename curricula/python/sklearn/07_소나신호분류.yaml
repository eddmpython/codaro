          ("scaler", StandardScaler()),
          ("classifier", LogisticRegression(max_iter=1000, random_state=42)),
      ])
      xTrain.shape, xTest.shape
  - type: code
    language: python
    title: 입력 검증이 있는 학습 함수
    description: 행 수 불일치나 단일 클래스 데이터를 학습 전에 차단합니다.
    content: |-
      def fitRiskModel(model, features, labels):
          if features.shape[0] != len(labels):
              raise ValueError("특성 행 수와 타깃 길이가 다릅니다.")
          if len(set(labels)) < 2:
              raise ValueError("분류 모델은 최소 두 개 이상의 클래스가 필요합니다.")
          try:
              return model.fit(features, labels)
          except ValueError as exc:
              raise ValueError("모델 학습 입력을 다시 확인하세요.") from exc

      trainedRiskModel = fitRiskModel(riskPipeline, xTrain, yTrain)
      trainedRiskModel
  - type: code
    language: python
    title: 예측과 지표 계산
    description: 실행 전에는 정확도와 F1이 0.8 이상일 것으로 예측하고 확인합니다.
    content: |-
      # 예측: class_sep이 충분히 커서 정확도와 F1이 모두 0.8 이상일 가능성이 높습니다.
      riskPred = trainedRiskModel.predict(xTest)
      riskAccuracy = accuracy_score(yTest, riskPred)
      riskF1 = f1_score(yTest, riskPred)

      round(riskAccuracy, 3), round(riskF1, 3)
  - type: code
    language: python
    title: 운영 배포 전 품질 검증
    description: 최소 성능과 예측 라벨 범위를 assert로 고정합니다.
    content: |-
      modelChecks = {
          "accuracy_gate": riskAccuracy >= 0.80,
          "f1_gate": riskF1 >= 0.80,
          "prediction_labels_are_valid": set(riskPred).issubset({0, 1}),
          "test_rows_preserved": len(riskPred) == len(yTest),
      }

      assert all(modelChecks.values()), modelChecks
      modelChecks
  - type: expansion
    title: '실무 변주: 정규화 강도를 바꾸면 안정성이 유지될까?'
    blocks:
    - type: code
      language: python
      title: 하이퍼파라미터 변경 비교
      content: |-
        conservativePipeline = Pipeline([
            ("scaler", StandardScaler()),
            ("classifier", LogisticRegression(C=0.3, max_iter=1000, random_state=42)),
        ])
        conservativeModel = fitRiskModel(conservativePipeline, xTrain, yTrain)
        conservativePred = conservativeModel.predict(xTest)
        conservativeAccuracy = accuracy_score(yTest, conservativePred)
        conservativeF1 = f1_score(yTest, conservativePred)

        assert conservativeAccuracy >= 0.75
        {
            "baselineAccuracy": round(riskAccuracy, 3),
            "baselineF1": round(riskF1, 3),
            "conservativeAccuracy": round(conservativeAccuracy, 3),
            "conservativeF1": round(conservativeF1, 3),
            "accuracyDelta": round(conservativeAccuracy - riskAccuracy, 3),
        }
