    title: '미션2: digits KNN 튜닝'
    code: |-
      import pandas as pd
      import numpy as np
      from sklearn.datasets import load_digits
      from sklearn.model_selection import train_test_split, GridSearchCV
      from sklearn.preprocessing import StandardScaler
      from sklearn.neighbors import KNeighborsClassifier
      from sklearn.metrics import accuracy_score
      import matplotlib.pyplot as plt

      digits = load_digits()
      xD = digits.data
      yD = digits.target
      xTrD, xTeD, yTrD, yTeD = train_test_split(xD, yD, test_size=0.2, random_state=42)
      scalerD = StandardScaler()
      xTrDsc = scalerD.fit_transform(xTrD)
      xTeDsc = scalerD.transform(xTeD)

      paramD = {"n_neighbors": [3, 5, 7, 9], "weights": ["uniform", "distance"], "metric": ["euclidean", "manhattan"]}
      gridD = GridSearchCV(KNeighborsClassifier(), paramD, cv=5)
      gridD.fit(xTrDsc, yTrD)
      print(f"Best Params: {gridD.best_params_}")
      print(f"Best CV Score: {gridD.best_score_:.4f}")

      resD = pd.DataFrame(gridD.cv_results_)
      top5 = resD.nsmallest(5, "rank_test_score")
      figM2, axM2 = plt.subplots(figsize=(10, 4))
      labels = [f"k={r['param_n_neighbors']}, {r['param_weights']}" for _, r in top5.iterrows()]
      axM2.barh(labels[::-1], top5["mean_test_score"].values[::-1], color="teal")
      axM2.set_xlabel("Mean CV Accuracy")
      axM2.set_title("Top 5 KNN Configurations")
      figM2
