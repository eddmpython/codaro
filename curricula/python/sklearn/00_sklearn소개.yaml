    - 배울 내용
    - 비즈니스 가치
    rows:
    - - 입문
      - 와인 품질 분류
      - train_test_split, 다중분류, 스케일링
      - 품질 자동 분류
    - - 입문
      - 유방암 진단
      - 이진분류, 정밀도/재현율, F1
      - 의료 진단 자동화
    - - 기초
      - 당뇨병 진행도 예측
      - LinearRegression, MSE, R²
      - 건강 위험도 예측
    - - 기초
      - 주택 가격 예측
      - 다중특성 회귀, 교차검증
      - 부동산 가격 책정
    - - 기초
      - 손글씨 숫자 인식
      - 이미지 분류, PCA 시각화
      - OCR 기초
    - - 중급
      - 고객 세분화
      - KMeans, 엘보우, 실루엣
      - 마케팅 세분화
    - - 중급
      - 소나 신호 분류
      - RandomForest, 특성 중요도
      - 신호 탐지 자동화
    - - 중급
      - 심장병 예측
      - GradientBoosting, ROC-AUC
      - 건강 관리 시스템
    - - 심화
      - 신호 탐지 최적화
      - GridSearchCV, 하이퍼파라미터
      - 레이더 시스템
    - - 심화
      - 종합 ML 파이프라인
      - Pipeline, 모든 개념 종합
      - 실전 ML 시스템
  - type: note
    style: info
    title: 프로젝트 기반 학습
