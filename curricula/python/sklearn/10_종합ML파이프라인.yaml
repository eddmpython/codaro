    code: |-
      import pandas as pd
      import numpy as np
      from sklearn.datasets import load_iris
      from sklearn.model_selection import train_test_split, cross_val_score
      from sklearn.preprocessing import StandardScaler
      from sklearn.pipeline import Pipeline
      from sklearn.svm import SVC
      from sklearn.ensemble import RandomForestClassifier
      from sklearn.neighbors import KNeighborsClassifier
      import matplotlib.pyplot as plt

      iris = load_iris()
      xIris = pd.DataFrame(iris.data, columns=iris.feature_names)
      yIris = iris.target
      xTrI, xTeI, yTrI, yTeI = train_test_split(xIris, yIris, test_size=0.2, random_state=42)

      modelsI = {
          "SVM": SVC(random_state=42),
          "RandomForest": RandomForestClassifier(n_estimators=100, random_state=42),
          "KNN": KNeighborsClassifier(n_neighbors=5)
      }

      resultsI = {}
      for name, model in modelsI.items():
          pipeI = Pipeline([("scaler", StandardScaler()), ("clf", model)])
          scoresI = cross_val_score(pipeI, xTrI, yTrI, cv=5)
          resultsI[name] = scoresI.mean()
          print(f"{name}: {scoresI.mean():.4f}")

      figM2, axM2 = plt.subplots(figsize=(7, 4))
      axM2.bar(resultsI.keys(), resultsI.values(), color=["coral", "steelblue", "forestgreen"])
      axM2.set_ylabel("Accuracy")
      axM2.set_title("Iris Classification: Model Comparison")
      axM2.set_ylim(0.9, 1.0)
      figM2
