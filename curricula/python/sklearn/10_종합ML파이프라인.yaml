    타이타닉 데이터는 Pclass(좌석등급), Sex(성별), Age(나이), SibSp(형제자매), Parch(부모자녀), Fare(요금), Embarked(승선항) 등으로 Survived(생존) 여부를 예측합니다.
  tips:
  - 타이타닉 데이터는 Pclass(좌석등급), Sex(성별), Age(나이), SibSp(형제자매), Parch(부모자녀), Fare(요금), Embarked(승선항) 등으로 Survived(생존) 여부를 예측합니다.
