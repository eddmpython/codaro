- id: step9_errors
  title: 9단계. 오분류 분석
  structuredPrimary: true
  subtitle: 잘못 예측한 이미지
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 모델이 잘못 예측한 이미지를 확인합니다. 사람도 헷갈릴 수 있는 필체인지, 모델의 한계인지 파악합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    errors = np.where(yPred != yTest)[0]
    fig, axes = plt.subplots(2, 5, figsize=(12, 5))
    for i, ax in enumerate(axes.flat):
        if i < len(errors):
            idx = errors[i]
            img = xTest[idx].reshape(8, 8)
            ax.imshow(img, cmap='gray')
            ax.set_title(f'True: {yTest[idx]}, Pred: {yPred[idx]}')
        ax.axis('off')
    fig.suptitle('Misclassified Samples')
    fig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      errors = np.where(yPred != yTest)[0]
      fig, axes = plt.subplots(2, 5, figsize=(12, 5))
      for i, ax in enumerate(axes.flat):
          if i < len(errors):
              idx = errors[i]
              img = xTest[idx].reshape(8, 8)
              ax.imshow(img, cmap='gray')
              ax.set_title(f'True: {yTest[idx]}, Pred: {yPred[idx]}')
          ax.axis('off')
      fig.suptitle('Misclassified Samples')
      fig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
