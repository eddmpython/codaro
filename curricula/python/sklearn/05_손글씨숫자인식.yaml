- id: step8_confusion
  title: 8단계. 혼동행렬
  structuredPrimary: true
  subtitle: 오분류 패턴
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 10x10 혼동행렬로 어떤 숫자가 어떤 숫자로 잘못 인식되는지 확인합니다. 예를 들어 8과 3이 혼동되는 경우가 많습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    cm = confusion_matrix(yTest, yPred)
    fig, ax = plt.subplots(figsize=(10, 8))
    sns.heatmap(cm, annot=True, fmt='d', cmap='Blues', ax=ax)
    ax.set_xlabel('Predicted')
    ax.set_ylabel('Actual')
    ax.set_title('Confusion Matrix - Digits')
    fig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
