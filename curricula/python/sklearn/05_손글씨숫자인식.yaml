  title: 2단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: load_digits()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    손글씨 숫자 데이터셋은 8x8 픽셀 이미지 1,797개를 담고 있습니다. 각 픽셀은 0~16 사이의 밝기값입니다. 이미지가 64차원 벡터로 펼쳐져 있습니다.

    8x8=64 픽셀이 1차원으로 펼쳐져 있습니다. digits.images를 사용하면 (1797, 8, 8) 형태의 원래 이미지를 볼 수 있습니다.
  tips:
