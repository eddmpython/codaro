  - type: expansion
    title: '미션2: 가장 혼동이 많은 숫자 쌍 분석'
    code: |-
      from sklearn.datasets import load_digits
      from sklearn.model_selection import train_test_split
      from sklearn.preprocessing import StandardScaler
      from sklearn.linear_model import LogisticRegression
      from sklearn.metrics import confusion_matrix
      import pandas as pd
      import numpy as np

      digits = load_digits()
      xData = digits.data
      yData = digits.target

      xTr, xTe, yTr, yTe = train_test_split(xData, yData, test_size=0.2, random_state=42)
      sc = StandardScaler()

      model = LogisticRegression(max_iter=1000)
      model.fit(sc.fit_transform(xTr), yTr)
      pred = model.predict(sc.transform(xTe))

      cm = confusion_matrix(yTe, pred)
      np.fill_diagonal(cm, 0)

      pairs = []
      for i in range(10):
          for j in range(10):
              if i != j and cm[i, j] > 0:
                  pairs.append({'True': i, 'Predicted': j, 'Count': cm[i, j]})

      pairDf = pd.DataFrame(pairs).sort_values('Count', ascending=False)
      pairDf.head(10)
