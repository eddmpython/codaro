- id: step10_pca_intro
  title: 10단계. PCA 소개
  structuredPrimary: true
  subtitle: 차원 축소
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    PCA(Principal Component Analysis)는 고차원 데이터를 저차원으로 압축합니다. 64차원 데이터를 2차원으로 축소하면 시각화할 수 있습니다. 정보 손실을 최소화하면서 차원을 줄입니다.

    PCA는 분산을 최대화하는 방향(주성분)을 찾습니다. 첫 번째 주성분이 가장 많은 분산을 설명하고, 두 번째가 그 다음입니다. n_components로 유지할 주성분 수를 지정합니다.
  tips:
  - PCA는 분산을 최대화하는 방향(주성분)을 찾습니다. 첫 번째 주성분이 가장 많은 분산을 설명하고, 두 번째가 그 다음입니다. n_components로 유지할 주성분 수를 지정합니다.
  snippet: |-
    pca = PCA(n_components=2)
    xPca = pca.fit_transform(xTrainSc)
    xPca.shape
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      pca = PCA(n_components=2)
      xPca = pca.fit_transform(xTrainSc)
      xPca.shape
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step11_pca_visualize
  title: 11단계. PCA 시각화
  structuredPrimary: true
  subtitle: 2D 산점도
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    2차원으로 축소된 데이터를 산점도로 시각화합니다. 같은 숫자끼리 군집을 이루는지, 어떤 숫자가 겹치는지 확인합니다.

    explained_variance_ratio_는 각 주성분이 전체 분산의 몇 %를 설명하는지 나타냅니다. 2개 주성분으로 약 20~30%를 설명하면, 나머지 70~80%의 정보가 손실됩니다.
  tips:
  - explained_variance_ratio_는 각 주성분이 전체 분산의 몇 %를 설명하는지 나타냅니다. 2개 주성분으로 약 20~30%를 설명하면, 나머지 70~80%의 정보가 손실됩니다.
  snippet: |-
    fig, ax = plt.subplots(figsize=(10, 8))
    scatter = ax.scatter(xPca[:, 0], xPca[:, 1], c=yTrain, cmap='tab10', alpha=0.6)
    ax.set_xlabel('PC1')
    ax.set_ylabel('PC2')
    ax.set_title('Digits in 2D (PCA)')
    cbar = plt.colorbar(scatter, ax=ax)
    cbar.set_label('Digit')
    fig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      fig, ax = plt.subplots(figsize=(10, 8))
      scatter = ax.scatter(xPca[:, 0], xPca[:, 1], c=yTrain, cmap='tab10', alpha=0.6)
      ax.set_xlabel('PC1')
      ax.set_ylabel('PC2')
      ax.set_title('Digits in 2D (PCA)')
      cbar = plt.colorbar(scatter, ax=ax)
      cbar.set_label('Digit')
      fig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step12_pca_components
  title: 12단계. 적정 차원 수
  structuredPrimary: true
