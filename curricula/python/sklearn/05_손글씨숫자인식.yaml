- id: step6_model
  title: 6단계. 모델 학습
  structuredPrimary: true
  subtitle: LogisticRegression
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    10개 클래스(0~9)를 분류하는 다중 분류 문제입니다. LogisticRegression은 자동으로 다중 분류를 처리합니다.

    LogisticRegression은 기본적으로 OvR(One-vs-Rest) 방식으로 다중 분류를 처리합니다. 각 클래스에 대해 이진 분류기를 학습하고, 가장 높은 확률의 클래스를 선택합니다.
  tips:
  - LogisticRegression은 기본적으로 OvR(One-vs-Rest) 방식으로 다중 분류를 처리합니다. 각 클래스에 대해 이진 분류기를 학습하고, 가장 높은 확률의 클래스를 선택합니다.
  snippet: |-
    model = LogisticRegression(max_iter=1000)
    model.fit(xTrainSc, yTrain)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
