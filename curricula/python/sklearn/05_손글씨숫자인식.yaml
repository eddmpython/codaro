- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 숫자 인식 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    OCR 개발자가 되어 숫자 인식 시스템을 구축합니다. 각 미션은 데이터 로딩부터 모델 학습, 평가까지 전 과정을 독립적으로 수행합니다. train_test_split, StandardScaler, LogisticRegression, PCA, confusion_matrix를 모두 활용합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from sklearn.datasets import load_digits
    from sklearn.model_selection import train_test_split
    from sklearn.preprocessing import StandardScaler
    from sklearn.decomposition import PCA
    from sklearn.linear_model import LogisticRegression
    from sklearn.metrics import accuracy_score
    import pandas as pd

    data = load_digits()
    xData = data.data
    yData = data.target

    xTr, xTe, yTr, yTe = train_test_split(xData, yData, test_size=0.2, random_state=42)
    sc = StandardScaler()
    xTrSc = sc.fit_transform(xTr)
    xTeSc = sc.transform(xTe)

    dims = [2, 5, 10, 20, 30, 64]
    results = []

    for d in dims:
        if d < 64:
            pca = PCA(n_components=d)
            xTrPca = pca.fit_transform(xTrSc)
            xTePca = pca.transform(xTeSc)
        else:
            xTrPca, xTePca = xTrSc, xTeSc

        model = LogisticRegression(max_iter=1000)
        model.fit(xTrPca, yTr)
        pred = model.predict(xTePca)
        results.append({'Dimensions': d, 'Accuracy': accuracy_score(yTe, pred)})

    pd.DataFrame(results)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
