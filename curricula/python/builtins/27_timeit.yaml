    prompt: 'Timer 클래스: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import timeit

      timer = timeit.Timer('x = [i for i in range(100)]')
      execution = timer.timeit(number=10000)
      execution
    solution: |-
      import timeit

      timer = timeit.Timer('x = [i for i in range(100)]')
      execution = timer.timeit(number=10000)
      execution
