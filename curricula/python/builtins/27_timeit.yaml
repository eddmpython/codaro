- id: repeat_timing
  title: 반복 측정
  structuredPrimary: true
  subtitle: repeat 함수
  goal: '반복 측정: 실행 가능한 Python 흐름으로 익힌다.'
  why: '반복 측정: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    repeat() 함수로 여러 번 측정하여 최솟값을 얻을 수 있습니다. 이는 시스템 노이즈의 영향을 최소화합니다.

    시스템 부하나 다른 프로세스의 영향으로 측정값이 달라질 수 있으므로, 평균보다 최솟값을 사용하는 것이 권장됩니다.
  tips:
  - 시스템 부하나 다른 프로세스의 영향으로 측정값이 달라질 수 있으므로, 평균보다 최솟값을 사용하는 것이 권장됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import timeit

    results = timeit.repeat('[x**2 for x in range(10)]', repeat=5, number=10000)
    results
  exercise:
    prompt: '반복 측정: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import timeit

      results = timeit.repeat('[x**2 for x in range(10)]', repeat=5, number=10000)
      results
    solution: |-
      import timeit

      results = timeit.repeat('[x**2 for x in range(10)]', repeat=5, number=10000)
      results
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: repeat() 함수로 여러 번 측정하여 최솟값을 얻을 수 있습니다. 이는 시스템 노이즈의 영향을 최소화합니다.
  - type: list
    items:
    - 'repeat: 측정 반복 횟수'
    - 'number: 각 측정당 실행 횟수'
    - 'min(): 최솟값 선택 권장'
    - 평균보다 최솟값이 더 정확
  - type: code
    language: python
    title: 기본 repeat
    description: 여러 번 측정
    content: |-
      import timeit

      results = timeit.repeat('[x**2 for x in range(10)]', repeat=5, number=10000)
      results
  - type: code
    language: python
    title: 최솟값 선택
    description: 가장 빠른 시간
    content: |-
      import timeit

      measurements = timeit.repeat('"-".join(str(n) for n in range(10))', repeat=3, number=10000)
      bestTime = min(measurements)
      bestTime
  - type: code
    language: python
    title: 평균과 최솟값 비교
    description: 통계 계산
    content: |-
      import timeit

      times = timeit.repeat('list(range(100))', repeat=5, number=10000)
      avgTime = sum(times) / len(times)
      minTime = min(times)

      avgTime, minTime
  - type: tip
    content: 시스템 부하나 다른 프로세스의 영향으로 측정값이 달라질 수 있으므로, 평균보다 최솟값을 사용하는 것이 권장됩니다.
- id: timer_class
  title: Timer 클래스
  structuredPrimary: true
  subtitle: 재사용 가능한 타이머
  goal: 'Timer 클래스: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Timer 클래스: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Timer 클래스로 타이머 객체를 만들어 여러 번 재사용할 수 있습니다.

    Timer 객체는 같은 코드를 여러 번 측정할 때 유용합니다. 한 번 생성하고 여러 번 재사용할 수 있습니다.
  tips:
  - Timer 객체는 같은 코드를 여러 번 측정할 때 유용합니다. 한 번 생성하고 여러 번 재사용할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import timeit

    timer = timeit.Timer('x = [i for i in range(100)]')
    execution = timer.timeit(number=10000)
    execution
