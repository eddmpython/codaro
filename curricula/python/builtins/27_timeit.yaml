- id: repeat_timing
  title: 반복 측정
  structuredPrimary: true
  subtitle: repeat 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    repeat() 함수로 여러 번 측정하여 최솟값을 얻을 수 있습니다. 이는 시스템 노이즈의 영향을 최소화합니다.

    시스템 부하나 다른 프로세스의 영향으로 측정값이 달라질 수 있으므로, 평균보다 최솟값을 사용하는 것이 권장됩니다.
  tips:
  - 시스템 부하나 다른 프로세스의 영향으로 측정값이 달라질 수 있으므로, 평균보다 최솟값을 사용하는 것이 권장됩니다.
  snippet: |-
    import timeit

    results = timeit.repeat('[x**2 for x in range(10)]', repeat=5, number=10000)
    results
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
