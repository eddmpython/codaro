  - type: list
    items:
    - 'stmt: 측정할 코드'
    - 'setup: 사전 설정 코드'
    - 'number: 반복 횟수 (기본 1,000,000)'
    - 'globals: 전역 네임스페이스'
  - type: code
    language: python
    title: 문자열 코드 측정
    description: 간단한 연산 측정
    content: |-
      import timeit

      addTime = timeit.timeit('sum([1, 2, 3, 4, 5])', number=100000)
      addTime
