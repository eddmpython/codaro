    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Timer 클래스로 타이머 객체를 만들어 여러 번 재사용할 수 있습니다.
  - type: list
    items:
    - 'Timer(stmt, setup): 타이머 생성'
    - 'timeit(number): 측정 실행'
    - 'repeat(repeat, number): 반복 측정'
    - 재사용 가능
  - type: code
    language: python
    title: Timer 객체 생성
    description: 재사용 가능한 타이머
    content: |-
      import timeit

      timer = timeit.Timer('x = [i for i in range(100)]')
      execution = timer.timeit(number=10000)
      execution
  - type: code
    language: python
    title: Timer로 repeat
    description: 타이머 객체 반복 실행
    content: |-
      import timeit

      myTimer = timeit.Timer(stmt='sorted([3, 1, 4, 1, 5])')
      runs = myTimer.repeat(repeat=3, number=10000)
      runs
  - type: code
    language: python
    title: setup과 함께
    description: 초기화 코드 포함
    content: |-
      import timeit

      timerWithSetup = timeit.Timer(
          stmt='result = x * 2',
          setup='x = 42'
      )
      setupTime = timerWithSetup.timeit(number=100000)
      setupTime
  - type: tip
    content: Timer 객체는 같은 코드를 여러 번 측정할 때 유용합니다. 한 번 생성하고 여러 번 재사용할 수 있습니다.
- id: comparing_code
  title: 코드 비교
  structuredPrimary: true
  subtitle: 성능 차이 측정
