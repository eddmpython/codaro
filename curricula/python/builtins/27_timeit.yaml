- id: best_practices
  title: 모범 사례
  structuredPrimary: true
  subtitle: 정확한 측정을 위한 팁
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    정확하고 신뢰할 수 있는 성능 측정을 위한 모범 사례들입니다.

    너무 빠른 코드는 number를 크게, 느린 코드는 작게 설정하여 측정 시간이 0.1초 이상이 되도록 조정하세요.
  tips:
  - 너무 빠른 코드는 number를 크게, 느린 코드는 작게 설정하여 측정 시간이 0.1초 이상이 되도록 조정하세요.
  snippet: |-
    import timeit

    testData = [1, 2, 3, 4, 5]

    def processData(items):
        return [x * 2 for x in items]

    withGlobals = timeit.timeit(
        'processData(testData)',
        globals=globals(),
        number=10000
    )
    withGlobals
