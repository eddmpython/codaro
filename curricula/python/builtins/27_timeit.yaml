    title: '🔴 심화10: 전체 활용 - 성능 프로파일'
    code: |-
      import timeit

      implementations = {
          'list_comp': '[x**2 for x in range(100)]',
          'map_lambda': 'list(map(lambda x: x**2, range(100)))',
          'generator': 'list(x**2 for x in range(100))'
      }

      profile = {}
      for name, code in implementations.items():
          measurements = timeit.repeat(code, repeat=3, number=1000)
          bestRun = min(measurements)
          avgRun = sum(measurements) / len(measurements)
          profile[name] = {
              'best': round(bestRun * 1000, 3),
              'avg': round(avgRun * 1000, 3)
          }

      profile
