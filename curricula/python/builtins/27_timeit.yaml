  why: '코드 비교: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    여러 구현 방법의 성능을 비교하여 최적의 방법을 선택할 수 있습니다.

    비교할 때는 동일한 number와 repeat를 사용하고, 비율로 얼마나 빠른지 표현하면 이해하기 쉽습니다.
  tips:
  - 비교할 때는 동일한 number와 repeat를 사용하고, 비율로 얼마나 빠른지 표현하면 이해하기 쉽습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import timeit

    listTime = timeit.timeit('[x**2 for x in range(100)]', number=10000)
    genTime = timeit.timeit('list(x**2 for x in range(100))', number=10000)

    listTime, genTime
  exercise:
    prompt: '코드 비교: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import timeit

      listTime = timeit.timeit('[x**2 for x in range(100)]', number=10000)
      genTime = timeit.timeit('list(x**2 for x in range(100))', number=10000)

      listTime, genTime
    solution: |-
      import timeit

      listTime = timeit.timeit('[x**2 for x in range(100)]', number=10000)
      genTime = timeit.timeit('list(x**2 for x in range(100))', number=10000)

      listTime, genTime
