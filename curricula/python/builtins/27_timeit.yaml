    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 여러 구현 방법의 성능을 비교하여 최적의 방법을 선택할 수 있습니다.
  - type: list
    items:
    - 동일한 number로 측정
    - 비율 계산으로 비교
    - 여러 번 반복 측정
    - 공정한 비교 환경
  - type: code
    language: python
    title: 리스트 vs 제너레이터
    description: 두 방법 비교
    content: |-
      import timeit

      listTime = timeit.timeit('[x**2 for x in range(100)]', number=10000)
      genTime = timeit.timeit('list(x**2 for x in range(100))', number=10000)

      listTime, genTime
  - type: code
    language: python
    title: 문자열 결합 방법 비교
    description: join vs +
    content: |-
      import timeit

      plusMethod = timeit.timeit(
          'result = ""; [result := result + str(i) for i in range(100)]',
          number=1000
      )
      joinMethod = timeit.timeit(
          '"".join(str(i) for i in range(100))',
          number=1000
      )

      ratio = plusMethod / joinMethod
      ratio
  - type: code
    language: python
    title: 정렬 알고리즘 비교
