  why: '검증 루프: 재현 가능한 벤치마크 리포트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: timeit는 한 번 빠르게 나온 숫자를 믿는 도구가 아닙니다. 같은 입력, 같은 반복 횟수, 여러 번의 측정, 최솟값 선택, 비율 검증이 함께 있어야 업무에서 설득력 있는 성능 비교가 됩니다.
