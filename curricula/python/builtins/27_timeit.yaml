sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: timeit 시작하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    timeit는 파이썬 표준 라이브러리입니다. 작은 코드 조각의 실행 시간을 정확하게 측정할 수 있습니다.

    timeit는 가비지 컬렉션을 일시적으로 비활성화하여 더 정확한 측정을 합니다. number 파라미터로 반복 횟수를 지정합니다.
  tips:
  - timeit는 가비지 컬렉션을 일시적으로 비활성화하여 더 정확한 측정을 합니다. number 파라미터로 반복 횟수를 지정합니다.
  snippet: |-
    import timeit

    duration = timeit.timeit('x = 2 + 2', number=100000)
    duration
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import timeit

      duration = timeit.timeit('x = 2 + 2', number=100000)
      duration
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: basic_timing
  title: 기본 측정
  structuredPrimary: true
  subtitle: timeit 함수 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    timeit() 함수로 간단하게 코드의 실행 시간을 측정할 수 있습니다.

    number를 크게 설정하면 더 정확한 측정이 가능하지만, 실행 시간이 길어집니다. 적절한 균형을 찾으세요.
  tips:
  - number를 크게 설정하면 더 정확한 측정이 가능하지만, 실행 시간이 길어집니다. 적절한 균형을 찾으세요.
  snippet: |-
    import timeit

    addTime = timeit.timeit('sum([1, 2, 3, 4, 5])', number=100000)
    addTime
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
