- id: workflow_validation
  title: '검증 루프: 업무 계산 리포트'
  structuredPrimary: true
  subtitle: 오차 허용, 단위 확인, 운영 기준 계산
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실무 계산에서는 값이 출력되는 것보다 검증 기준이 더 중요합니다. 부동소수점 결과는 math.isclose()로 비교하고, 각도 단위처럼 자주 틀리는 입력은 일부러 깨뜨려 보면서 검증합니다.

    변주 실험
    거리 계산을 2차원 좌표에서 3차원 좌표로 바꾸고, `math.hypot(x, y, z)` 결과가 직접 제곱합을 계산한 값과 같은지 비교하세요.
  tips:
  - 변주 실험 거리 계산을 2차원 좌표에서 3차원 좌표로 바꾸고, `math.hypot(x, y, z)` 결과가 직접 제곱합을 계산한 값과 같은지 비교하세요.
  snippet: |-
    sites = [
        {"name": "warehouseA", "x": 0, "y": 0, "radius": 4},
        {"name": "warehouseB", "x": 3, "y": 4, "radius": 6},
        {"name": "warehouseC", "x": -5, "y": 12, "radius": 3},
    ]

    def buildSiteMathReport(siteRows):
        report = []
        for site in siteRows:
            distance = math.hypot(site["x"], site["y"])
            coverageArea = math.pi * site["radius"] ** 2
            report.append({
                "name": site["name"],
                "distanceFromOrigin": distance,
                "coverageArea": coverageArea,
            })
        return report

    siteReport = buildSiteMathReport(sites)

    assert math.isclose(siteReport[1]["distanceFromOrigin"], 5.0)
    assert math.isclose(siteReport[2]["distanceFromOrigin"], 13.0)
    assert math.isclose(siteReport[0]["coverageArea"], 50.26548245743669)

    siteReport
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      sites = [
          {"name": "warehouseA", "x": 0, "y": 0, "radius": 4},
          {"name": "warehouseB", "x": 3, "y": 4, "radius": 6},
          {"name": "warehouseC", "x": -5, "y": 12, "radius": 3},
      ]

      def buildSiteMathReport(siteRows):
          report = []
          for site in siteRows:
              distance = math.hypot(site["x"], site["y"])
              coverageArea = math.pi * site["radius"] ** 2
              report.append({
                  "name": site["name"],
                  "distanceFromOrigin": distance,
                  "coverageArea": coverageArea,
              })
          return report

      siteReport = buildSiteMathReport(sites)

      assert math.isclose(siteReport[1]["distanceFromOrigin"], 5.0)
      assert math.isclose(siteReport[2]["distanceFromOrigin"], 13.0)
      assert math.isclose(siteReport[0]["coverageArea"], 50.26548245743669)

      siteReport
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
