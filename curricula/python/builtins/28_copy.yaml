    content: |-
      def buildJobConfig(template, *, owner, schedule, retries):
          config = copy.deepcopy(template)
          config['owner'] = owner
          config['schedule'] = schedule
          config['retry']['max'] = retries

          assert config is not template
          assert config['retry'] is not template['retry']
          assert config['steps'] is not template['steps']
          assert isinstance(config['retry']['max'], int) and config['retry']['max'] >= 0
          return config

      nightlyJob = buildJobConfig(
          baseJob,
          owner='data-platform',
          schedule='0 2 * * *',
          retries=4
      )

      assert baseJob['owner'] == 'analytics'
      assert baseJob['retry']['max'] == 2
      assert nightlyJob['owner'] == 'data-platform'
      nightlyJob
  - type: code
    language: python
    title: 잘못된 복사 방식을 검증에서 잡는다
    description: 내부 가변 객체가 공유되면 배포 전에 실패하게 만듭니다.
    content: |-
      def assertIndependentJob(template, candidate):
          assert candidate is not template, '최상위 객체가 같습니다'
          assert candidate['retry'] is not template['retry'], 'retry 설정이 공유됩니다'
          assert candidate['steps'] is not template['steps'], 'steps 목록이 공유됩니다'

      unsafeJob = copy.copy(baseJob)

      try:
          assertIndependentJob(baseJob, unsafeJob)
      except AssertionError as exc:
          copyProblem = str(exc)

      assert '공유' in copyProblem
      copyProblem
  - type: code
    language: python
    title: '실무 변주: 원본 보존 전처리'
    description: 입력 행을 훼손하지 않고 계산 컬럼을 붙입니다.
    content: |-
      rawRows = [
          {'id': 1, 'scores': [82, 90, 88]},
          {'id': 2, 'scores': [71, 77, 80]}
      ]

      def enrichRows(rows):
          result = copy.deepcopy(rows)
          for row in result:
              row['total'] = sum(row['scores'])
              row['passed'] = min(row['scores']) >= 70
          return result

      enrichedRows = enrichRows(rawRows)

      assert 'total' not in rawRows[0]
      assert enrichedRows[0]['total'] == 260
      assert enrichedRows[1]['passed'] is True
      enrichedRows
