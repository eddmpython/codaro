  explanation: copy를 배울 때 핵심은 copy()와 deepcopy() 이름을 외우는 것이 아니라, 원본 데이터가 언제 오염되는지 먼저 예측하고 검증으로 막는 것입니다. 설정, 작업 큐, 데이터 전처리처럼
