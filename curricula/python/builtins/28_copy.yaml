sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: copy 시작하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    copy는 파이썬 표준 라이브러리입니다. 객체의 얕은 복사와 깊은 복사를 제공합니다.

    단순 할당(=)은 참조를 복사하고, copy()는 새 객체를 만들지만 내부 요소는 참조를 공유합니다. deepcopy()는 모든 것을 재귀적으로 복사합니다.
  tips:
  - 단순 할당(=)은 참조를 복사하고, copy()는 새 객체를 만들지만 내부 요소는 참조를 공유합니다. deepcopy()는 모든 것을 재귀적으로 복사합니다.
  snippet: |-
    import copy

    original = [1, 2, 3]
    duplicated = copy.copy(original)

    original, duplicated
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      original = [1, 2, 3]
      duplicated = copy.copy(original)

      original, duplicated
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: shallow_copy
  title: 얕은 복사
  structuredPrimary: true
  subtitle: copy() 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    얕은 복사는 객체의 최상위 레벨만 새로 생성하고, 내부 객체는 참조를 공유합니다.

    얕은 복사는 중첩된 가변 객체(리스트 안의 리스트)에서 예상치 못한 동작을 일으킬 수 있습니다. 이런 경우 deepcopy()를 사용하세요.
  tips:
  - 얕은 복사는 중첩된 가변 객체(리스트 안의 리스트)에서 예상치 못한 동작을 일으킬 수 있습니다. 이런 경우 deepcopy()를 사용하세요.
  snippet: |-
    import copy

    source = [1, 2, 3, 4, 5]
    cloned = copy.copy(source)

    cloned.append(6)

    source, cloned
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      source = [1, 2, 3, 4, 5]
      cloned = copy.copy(source)

      cloned.append(6)

      source, cloned
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: deep_copy
  title: 깊은 복사
  structuredPrimary: true
  subtitle: deepcopy() 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    깊은 복사는 객체와 그 안의 모든 객체를 재귀적으로 복사하여 완전히 독립적인 복제본을 만듭니다.

    deepcopy()는 모든 레벨을 재귀적으로 복사하므로 메모리와 시간이 더 소요됩니다. 필요한 경우에만 사용하세요.
  tips:
  - deepcopy()는 모든 레벨을 재귀적으로 복사하므로 메모리와 시간이 더 소요됩니다. 필요한 경우에만 사용하세요.
  snippet: |-
    import copy

    original = [[1, 2], [3, 4]]
    deepClone = copy.deepcopy(original)

    deepClone[0].append(999)

    original, deepClone
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      original = [[1, 2], [3, 4]]
      deepClone = copy.deepcopy(original)

      deepClone[0].append(999)

      original, deepClone
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: assignment_vs_copy
  title: 할당 vs 복사
  structuredPrimary: true
  subtitle: 참조와 복제의 차이
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    단순 할당(=)은 객체를 복사하지 않고 같은 객체를 가리키는 참조만 만듭니다.

    가변 객체(리스트, 딕셔너리)를 함수 인자로 전달할 때 의도치 않은 수정을 방지하려면 복사본을 전달하세요.
  tips:
  - 가변 객체(리스트, 딕셔너리)를 함수 인자로 전달할 때 의도치 않은 수정을 방지하려면 복사본을 전달하세요.
  snippet: |-
    import copy

    listA = [1, 2, 3]
    listB = listA

    listB.append(4)

    listA, listB
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      listA = [1, 2, 3]
      listB = listA

      listB.append(4)

      listA, listB
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: mutable_immutable
  title: 가변 vs 불변 객체
  structuredPrimary: true
  subtitle: 복사 동작의 차이
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    불변 객체(int, str, tuple)는 복사가 필요 없지만, 가변 객체(list, dict, set)는 복사가 중요합니다.

    튜플은 불변이지만 내부에 가변 객체를 포함할 수 있습니다. 이 경우 deepcopy()로 내부 가변 객체도 복사해야 합니다.
  tips:
  - 튜플은 불변이지만 내부에 가변 객체를 포함할 수 있습니다. 이 경우 deepcopy()로 내부 가변 객체도 복사해야 합니다.
  snippet: |-
    import copy

    immutableStr = "hello"
    copiedStr = copy.copy(immutableStr)

    sameObject = id(immutableStr) == id(copiedStr)
    sameObject
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      immutableStr = "hello"
      copiedStr = copy.copy(immutableStr)

      sameObject = id(immutableStr) == id(copiedStr)
      sameObject
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: custom_objects
  title: 커스텀 객체 복사
  structuredPrimary: true
  subtitle: 클래스 인스턴스
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    사용자 정의 클래스의 인스턴스도 copy와 deepcopy로 복사할 수 있습니다.

    클래스에 __copy__()와 __deepcopy__() 메서드를 정의하면 복사 동작을 커스터마이징할 수 있습니다.
  tips:
  - 클래스에 __copy__()와 __deepcopy__() 메서드를 정의하면 복사 동작을 커스터마이징할 수 있습니다.
  snippet: |-
    import copy

    class Person:
        def __init__(self, name, age):
            self.name = name
            self.age = age

    person1 = Person('Alice', 30)
    person2 = copy.copy(person1)

    person2.age = 31

    person1.age, person2.age
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      class Person:
          def __init__(self, name, age):
              self.name = name
              self.age = age

      person1 = Person('Alice', 30)
      person2 = copy.copy(person1)

      person2.age = 31

      person1.age, person2.age
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 복사 패턴
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실제 프로그래밍에서 자주 사용되는 복사 패턴들입니다.

    원본 데이터를 보존해야 할 때는 항상 복사본을 만들어 작업하세요. 특히 설정, 상태, 데이터 변환에서 중요합니다.
  tips:
  - 원본 데이터를 보존해야 할 때는 항상 복사본을 만들어 작업하세요. 특히 설정, 상태, 데이터 변환에서 중요합니다.
  snippet: |-
    import copy

    defaultConfig = {
        'host': 'localhost',
        'port': 8080,
        'features': ['auth', 'cache']
    }

    customConfig = copy.deepcopy(defaultConfig)
    customConfig['port'] = 3000
    customConfig['features'].append('logging')

    defaultConfig, customConfig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      defaultConfig = {
          'host': 'localhost',
          'port': 8080,
          'features': ['auth', 'cache']
      }

      customConfig = copy.deepcopy(defaultConfig)
      customConfig['port'] = 3000
      customConfig['features'].append('logging')

      defaultConfig, customConfig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 원본을 지키는 복사 전략'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: copy를 배울 때 핵심은 copy()와 deepcopy() 이름을 외우는 것이 아니라, 원본 데이터가 언제 오염되는지 먼저 예측하고 검증으로 막는 것입니다. 설정, 작업 큐, 데이터 전처리처럼 원본 보존이 중요한 흐름에서는 독립성 검사가 함께 있어야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import copy

    baseJob = {
        'name': 'daily-sales-report',
        'owner': 'analytics',
        'retry': {'max': 2, 'delaySeconds': 30},
        'steps': ['extract', 'validate', 'publish']
    }

    shallowJob = copy.copy(baseJob)
    shallowJob['steps'].append('notify')

    leakedToOriginal = 'notify' in baseJob['steps']

    assert shallowJob is not baseJob
    assert shallowJob['steps'] is baseJob['steps']
    assert leakedToOriginal is True
    {'risk': 'nested list is shared', 'leakedToOriginal': leakedToOriginal}
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import copy

      baseJob = {
          'name': 'daily-sales-report',
          'owner': 'analytics',
          'retry': {'max': 2, 'delaySeconds': 30},
          'steps': ['extract', 'validate', 'publish']
      }

      shallowJob = copy.copy(baseJob)
      shallowJob['steps'].append('notify')

      leakedToOriginal = 'notify' in baseJob['steps']

      assert shallowJob is not baseJob
      assert shallowJob['steps'] is baseJob['steps']
      assert leakedToOriginal is True
      {'risk': 'nested list is shared', 'leakedToOriginal': leakedToOriginal}
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
