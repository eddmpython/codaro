sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: copy 시작하기
  goal: '모듈 임포트: 실행 가능한 Python 흐름으로 익힌다.'
  why: '모듈 임포트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    copy는 파이썬 표준 라이브러리입니다. 객체의 얕은 복사와 깊은 복사를 제공합니다.

    단순 할당(=)은 참조를 복사하고, copy()는 새 객체를 만들지만 내부 요소는 참조를 공유합니다. deepcopy()는 모든 것을 재귀적으로 복사합니다.
  tips:
  - 단순 할당(=)은 참조를 복사하고, copy()는 새 객체를 만들지만 내부 요소는 참조를 공유합니다. deepcopy()는 모든 것을 재귀적으로 복사합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import copy

    original = [1, 2, 3]
    duplicated = copy.copy(original)

    original, duplicated
  exercise:
    prompt: '모듈 임포트: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import copy

      original = [1, 2, 3]
      duplicated = copy.copy(original)

      original, duplicated
    solution: |-
      import copy

      original = [1, 2, 3]
      duplicated = copy.copy(original)

      original, duplicated
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: copy는 파이썬 표준 라이브러리입니다. 객체의 얕은 복사와 깊은 복사를 제공합니다.
  - type: list
    items:
    - 'copy(): 얕은 복사'
    - 'deepcopy(): 깊은 복사'
    - 가변 객체 복제
    - 중첩 구조 독립 복사
  - type: code
    language: python
    title: 기본 임포트
    description: copy 모듈 임포트 및 기본 사용법
    content: |-
      import copy

      original = [1, 2, 3]
      duplicated = copy.copy(original)

      original, duplicated
  - type: note
    content: 단순 할당(=)은 참조를 복사하고, copy()는 새 객체를 만들지만 내부 요소는 참조를 공유합니다. deepcopy()는 모든 것을 재귀적으로 복사합니다.
- id: shallow_copy
  title: 얕은 복사
  structuredPrimary: true
  subtitle: copy() 함수
  goal: '얕은 복사: 실행 가능한 Python 흐름으로 익힌다.'
  why: '얕은 복사: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    얕은 복사는 객체의 최상위 레벨만 새로 생성하고, 내부 객체는 참조를 공유합니다.

    얕은 복사는 중첩된 가변 객체(리스트 안의 리스트)에서 예상치 못한 동작을 일으킬 수 있습니다. 이런 경우 deepcopy()를 사용하세요.
  tips:
  - 얕은 복사는 중첩된 가변 객체(리스트 안의 리스트)에서 예상치 못한 동작을 일으킬 수 있습니다. 이런 경우 deepcopy()를 사용하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import copy

    source = [1, 2, 3, 4, 5]
    cloned = copy.copy(source)

    cloned.append(6)

    source, cloned
  exercise:
    prompt: '얕은 복사: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import copy

      source = [1, 2, 3, 4, 5]
      cloned = copy.copy(source)

      cloned.append(6)

      source, cloned
    solution: |-
      import copy

      source = [1, 2, 3, 4, 5]
      cloned = copy.copy(source)

      cloned.append(6)

      source, cloned
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 얕은 복사는 객체의 최상위 레벨만 새로 생성하고, 내부 객체는 참조를 공유합니다.
  - type: list
    items:
    - 'copy.copy(): 얕은 복사'
    - '리스트.copy(): 리스트 메서드'
    - 'list(), dict(): 생성자 복사'
    - 최상위만 독립, 내부는 공유
  - type: code
    language: python
    title: 기본 얕은 복사
    description: 리스트 복사
    content: |-
      import copy

      source = [1, 2, 3, 4, 5]
      cloned = copy.copy(source)

      cloned.append(6)

      source, cloned
  - type: code
    language: python
    title: 중첩 리스트 문제
    description: 내부 리스트는 공유됨
    content: |-
      import copy

      nested = [[1, 2], [3, 4]]
      shallowCopy = copy.copy(nested)

      shallowCopy[0].append(999)

      nested, shallowCopy
  - type: code
    language: python
    title: 딕셔너리 얕은 복사
    description: dict.copy() 사용
    content: |-
      import copy

      data = {'a': 1, 'b': 2, 'c': 3}
      copied = data.copy()

      copied['d'] = 4

      data, copied
  - type: tip
    content: 얕은 복사는 중첩된 가변 객체(리스트 안의 리스트)에서 예상치 못한 동작을 일으킬 수 있습니다. 이런 경우 deepcopy()를 사용하세요.
- id: deep_copy
  title: 깊은 복사
  structuredPrimary: true
  subtitle: deepcopy() 함수
  goal: '깊은 복사: 실행 가능한 Python 흐름으로 익힌다.'
  why: '깊은 복사: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    깊은 복사는 객체와 그 안의 모든 객체를 재귀적으로 복사하여 완전히 독립적인 복제본을 만듭니다.

    deepcopy()는 모든 레벨을 재귀적으로 복사하므로 메모리와 시간이 더 소요됩니다. 필요한 경우에만 사용하세요.
  tips:
  - deepcopy()는 모든 레벨을 재귀적으로 복사하므로 메모리와 시간이 더 소요됩니다. 필요한 경우에만 사용하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import copy

    original = [[1, 2], [3, 4]]
    deepClone = copy.deepcopy(original)

    deepClone[0].append(999)

    original, deepClone
  exercise:
    prompt: '깊은 복사: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import copy

      original = [[1, 2], [3, 4]]
      deepClone = copy.deepcopy(original)

      deepClone[0].append(999)

      original, deepClone
    solution: |-
      import copy

      original = [[1, 2], [3, 4]]
      deepClone = copy.deepcopy(original)

      deepClone[0].append(999)

      original, deepClone
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 깊은 복사는 객체와 그 안의 모든 객체를 재귀적으로 복사하여 완전히 독립적인 복제본을 만듭니다.
  - type: list
    items:
    - 'copy.deepcopy(): 깊은 복사'
    - 재귀적 복사
    - 완전 독립적 객체
    - 순환 참조 처리
  - type: code
    language: python
    title: 중첩 리스트 깊은 복사
    description: 완전히 독립적인 복사
    content: |-
      import copy

      original = [[1, 2], [3, 4]]
      deepClone = copy.deepcopy(original)

      deepClone[0].append(999)

      original, deepClone
  - type: code
    language: python
    title: 복잡한 구조 복사
    description: 딕셔너리 내 리스트
    content: |-
      import copy

      complexData = {'users': ['Alice', 'Bob'], 'scores': [100, 200]}
      fullCopy = copy.deepcopy(complexData)

      fullCopy['users'].append('Charlie')

      complexData, fullCopy
  - type: code
    language: python
    title: 다층 중첩 구조
    description: 3단계 중첩
    content: |-
      import copy

      multilevel = [[[1, 2], [3, 4]], [[5, 6], [7, 8]]]
      deepMulti = copy.deepcopy(multilevel)

      deepMulti[0][0].append(99)

      multilevel, deepMulti
  - type: tip
    content: deepcopy()는 모든 레벨을 재귀적으로 복사하므로 메모리와 시간이 더 소요됩니다. 필요한 경우에만 사용하세요.
- id: assignment_vs_copy
  title: 할당 vs 복사
  structuredPrimary: true
  subtitle: 참조와 복제의 차이
  goal: '할당 vs 복사: 실행 가능한 Python 흐름으로 익힌다.'
  why: '할당 vs 복사: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    단순 할당(=)은 객체를 복사하지 않고 같은 객체를 가리키는 참조만 만듭니다.

    가변 객체(리스트, 딕셔너리)를 함수 인자로 전달할 때 의도치 않은 수정을 방지하려면 복사본을 전달하세요.
  tips:
  - 가변 객체(리스트, 딕셔너리)를 함수 인자로 전달할 때 의도치 않은 수정을 방지하려면 복사본을 전달하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import copy

    listA = [1, 2, 3]
    listB = listA

    listB.append(4)

    listA, listB
  exercise:
    prompt: '할당 vs 복사: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import copy

      listA = [1, 2, 3]
      listB = listA

      listB.append(4)

      listA, listB
    solution: |-
      import copy

      listA = [1, 2, 3]
      listB = listA

      listB.append(4)

      listA, listB
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 단순 할당(=)은 객체를 복사하지 않고 같은 객체를 가리키는 참조만 만듭니다.
  - type: list
    items:
    - '할당(=): 참조 복사'
    - 'copy(): 얕은 복사'
    - 'deepcopy(): 깊은 복사'
    - id() 함수로 확인
  - type: code
    language: python
    title: 할당은 참조
    description: 같은 객체를 가리킴
    content: |-
      import copy

      listA = [1, 2, 3]
      listB = listA

      listB.append(4)

      listA, listB
  - type: code
    language: python
    title: 얕은 복사는 새 객체
    description: 최상위만 독립
    content: |-
      import copy

      listX = [1, 2, 3]
      listY = copy.copy(listX)

      listY.append(4)

      listX, listY
  - type: code
    language: python
    title: ID 비교
    description: 객체 식별자 확인
    content: |-
      import copy

      base = [1, 2, 3]
      reference = base
      shallow = copy.copy(base)
      deep = copy.deepcopy(base)

      sameAsBase = id(reference) == id(base)
      differentShallow = id(shallow) != id(base)
      differentDeep = id(deep) != id(base)

      sameAsBase, differentShallow, differentDeep
  - type: tip
    content: 가변 객체(리스트, 딕셔너리)를 함수 인자로 전달할 때 의도치 않은 수정을 방지하려면 복사본을 전달하세요.
- id: mutable_immutable
  title: 가변 vs 불변 객체
  structuredPrimary: true
  subtitle: 복사 동작의 차이
  goal: '가변 vs 불변 객체: 실행 가능한 Python 흐름으로 익힌다.'
  why: '가변 vs 불변 객체: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    불변 객체(int, str, tuple)는 복사가 필요 없지만, 가변 객체(list, dict, set)는 복사가 중요합니다.

    튜플은 불변이지만 내부에 가변 객체를 포함할 수 있습니다. 이 경우 deepcopy()로 내부 가변 객체도 복사해야 합니다.
  tips:
  - 튜플은 불변이지만 내부에 가변 객체를 포함할 수 있습니다. 이 경우 deepcopy()로 내부 가변 객체도 복사해야 합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import copy

    immutableStr = "hello"
    copiedStr = copy.copy(immutableStr)

    sameObject = id(immutableStr) == id(copiedStr)
    sameObject
  exercise:
    prompt: '가변 vs 불변 객체: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import copy

      immutableStr = "hello"
      copiedStr = copy.copy(immutableStr)

      sameObject = id(immutableStr) == id(copiedStr)
      sameObject
    solution: |-
      import copy

      immutableStr = "hello"
      copiedStr = copy.copy(immutableStr)

      sameObject = id(immutableStr) == id(copiedStr)
      sameObject
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 불변 객체(int, str, tuple)는 복사가 필요 없지만, 가변 객체(list, dict, set)는 복사가 중요합니다.
  - type: list
    items:
    - '불변: int, str, tuple, frozenset'
    - '가변: list, dict, set'
    - 불변 객체는 복사 불필요
    - 가변 객체는 deepcopy 필요할 수 있음
  - type: code
    language: python
    title: 불변 객체
    description: 복사 불필요
    content: |-
      import copy

