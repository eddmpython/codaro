sections:
- id: module_import
  title: json 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: 'json 모듈 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'json 모듈 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    json은 파이썬 표준 라이브러리입니다. JSON(JavaScript Object Notation) 데이터를 처리하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 json 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 json 모듈을 사용할 수 있습니다.
  - Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import json
    import tempfile
    from pathlib import Path

    jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
    jsonScratch.mkdir(parents=True, exist_ok=True)

    'json 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: 'json 모듈 불러오기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import json
      import tempfile
      from pathlib import Path

      jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
      jsonScratch.mkdir(parents=True, exist_ok=True)

      'json 모듈이 정상적으로 로드되었습니다'
    solution: |-
      import json
      import tempfile
      from pathlib import Path

      jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
      jsonScratch.mkdir(parents=True, exist_ok=True)

      'json 모듈이 정상적으로 로드되었습니다'
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: json은 파이썬 표준 라이브러리입니다. JSON(JavaScript Object Notation) 데이터를 처리하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.
  - type: note
    content: 이 섹션을 먼저 실행하면 아래 모든 예제에서 json 모듈을 사용할 수 있습니다.
  - type: code
    language: python
    title: json 모듈 불러오기
    description: json 모듈을 불러옵니다.
    content: |-
      import json
      import tempfile
      from pathlib import Path

      jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
      jsonScratch.mkdir(parents=True, exist_ok=True)

      'json 모듈이 정상적으로 로드되었습니다'
  - type: tip
    content: Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
- id: basic_serialization
  title: 기본 직렬화
  structuredPrimary: true
  subtitle: dumps와 loads
  goal: '기본 직렬화: 실행 가능한 Python 흐름으로 익힌다.'
  why: '기본 직렬화: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    json 모듈은 Python 객체와 JSON 문자열 간 변환을 제공합니다. dumps()는 Python 객체를 JSON 문자열로 직렬화하고, loads()는 JSON 문자열을 Python 객체로 역직렬화합니다. API 통신, 설정 파일, 데이터 교환에 필수적입니다.

    JSON의 true/false는 Python의 True/False로, null은 None으로 자동 변환됩니다.
  tips:
  - JSON의 true/false는 Python의 True/False로, null은 None으로 자동 변환됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
    jsonString = json.dumps(userData)
    jsonString
  exercise:
    prompt: '기본 직렬화: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
      jsonString = json.dumps(userData)
      jsonString
    solution: |-
      userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
      jsonString = json.dumps(userData)
      jsonString
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: json 모듈은 Python 객체와 JSON 문자열 간 변환을 제공합니다. dumps()는 Python 객체를 JSON 문자열로 직렬화하고, loads()는 JSON 문자열을 Python 객체로
      역직렬화합니다. API 통신, 설정 파일, 데이터 교환에 필수적입니다.
  - type: list
    items:
    - 'dumps(): Python → JSON 문자열'
    - 'loads(): JSON 문자열 → Python'
    - 딕셔너리, 리스트, 문자열, 숫자, 불린, None 지원
    - 튜플은 리스트로 변환됨
  - type: code
    language: python
    title: 딕셔너리를 JSON으로
    description: Python 딕셔너리를 JSON 문자열로 변환합니다.
    content: |-
      userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
      jsonString = json.dumps(userData)
      jsonString
  - type: code
    language: python
    title: JSON을 딕셔너리로
    description: JSON 문자열을 Python 딕셔너리로 변환합니다.
    content: |-
      jsonText = '{"product": "laptop", "price": 1200, "available": true}'
      productData = json.loads(jsonText)
      productData
  - type: code
    language: python
    title: 리스트 직렬화
    description: Python 리스트를 JSON 배열로 변환합니다.
    content: |-
      numberList = [1, 2, 3, 4, 5]
      jsonArray = json.dumps(numberList)
      jsonArray
  - type: tip
    content: JSON의 true/false는 Python의 True/False로, null은 None으로 자동 변환됩니다.
- id: file_operations
  title: 파일 읽기와 쓰기
  structuredPrimary: true
  subtitle: dump와 load
  goal: '파일 읽기와 쓰기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '파일 읽기와 쓰기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    dump()는 Python 객체를 JSON 파일로 저장하고, load()는 JSON 파일을 Python 객체로 읽어옵니다. 설정 파일, 데이터 캐싱, 영속성 저장에 활용됩니다. 파일 핸들을 직접 전달하여 효율적으로 처리합니다.

    대용량 데이터는 dump/load가 dumps/loads보다 메모리 효율적입니다.
  tips:
  - 대용량 데이터는 dump/load가 dumps/loads보다 메모리 효율적입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
    with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
        json.dump(configData, f)
    'config.json 저장 완료'
  exercise:
    prompt: '파일 읽기와 쓰기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
      with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
          json.dump(configData, f)
      'config.json 저장 완료'
    solution: |-
      configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
      with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
          json.dump(configData, f)
      'config.json 저장 완료'
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: dump()는 Python 객체를 JSON 파일로 저장하고, load()는 JSON 파일을 Python 객체로 읽어옵니다. 설정 파일, 데이터 캐싱, 영속성 저장에 활용됩니다. 파일 핸들을 직접
      전달하여 효율적으로 처리합니다.
  - type: list
    items:
    - 'dump(obj, file): 객체를 파일로 저장'
    - 'load(file): 파일에서 객체 읽기'
    - '파일 모드: ''w''(쓰기), ''r''(읽기)'
    - 자동으로 파일 인코딩 처리
  - type: code
    language: python
    title: JSON 파일로 저장
    description: 딕셔너리를 JSON 파일로 저장합니다.
    content: |-
      configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
      with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
          json.dump(configData, f)
      'config.json 저장 완료'
  - type: code
    language: python
    title: JSON 파일 읽기
    description: JSON 파일을 읽어서 Python 객체로 변환합니다.
    content: |-
      with open(jsonScratch / 'config.json', 'r', encoding='utf-8') as f:
          loadedConfig = json.load(f)
      loadedConfig
  - type: code
    language: python
    title: 복잡한 데이터 저장
    description: 중첩된 딕셔너리와 리스트를 JSON 파일로 저장합니다.
    content: |-
      complexData = {
          'users': [
              {'id': 1, 'name': 'Alice', 'active': True},
              {'id': 2, 'name': 'Bob', 'active': False}
          ],
          'total': 2
      }
      with open(jsonScratch / 'users.json', 'w', encoding='utf-8') as f:
          json.dump(complexData, f)
      'users.json 저장 완료'
  - type: tip
    content: 대용량 데이터는 dump/load가 dumps/loads보다 메모리 효율적입니다.
- id: formatting
  title: 포맷팅 옵션
  structuredPrimary: true
  subtitle: indent, sort_keys, separators
  goal: '포맷팅 옵션: 실행 가능한 Python 흐름으로 익힌다.'
  why: '포맷팅 옵션: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    JSON 출력을 사람이 읽기 쉽게 포맷팅할 수 있습니다. indent는 들여쓰기 수준을 지정하고, sort_keys는 키를 정렬하며, separators는 구분자를 커스터마이즈합니다. 디버깅, 로그, 설정 파일 작성에 유용합니다.

    ensure_ascii=False를 사용하면 한글, 이모지 등이 \uXXXX 형태로 변환되지 않습니다.
  tips:
  - ensure_ascii=False를 사용하면 한글, 이모지 등이 \uXXXX 형태로 변환되지 않습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
    prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
    prettyJson
  exercise:
    prompt: '포맷팅 옵션: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
      prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
      prettyJson
    solution: |-
      studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
      prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
      prettyJson
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: JSON 출력을 사람이 읽기 쉽게 포맷팅할 수 있습니다. indent는 들여쓰기 수준을 지정하고, sort_keys는 키를 정렬하며, separators는 구분자를 커스터마이즈합니다. 디버깅, 로그,
      설정 파일 작성에 유용합니다.
  - type: list
    items:
    - 'indent=4: 4칸 들여쓰기'
    - 'sort_keys=True: 키 알파벳 정렬'
    - 'separators: 구분자 커스터마이즈'
    - 'ensure_ascii=False: 유니코드 유지'
  - type: code
    language: python
    title: 들여쓰기 적용
    description: JSON을 읽기 쉽게 들여쓰기합니다.
    content: |-
      studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
      prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
      prettyJson
  - type: code
    language: python
    title: 키 정렬
    description: 딕셔너리 키를 알파벳 순으로 정렬하여 출력합니다.
    content: |-
      unsortedData = {'zebra': 1, 'apple': 2, 'mango': 3}
      sortedJson = json.dumps(unsortedData, sort_keys=True, indent=2)
      sortedJson
  - type: code
    language: python
    title: 압축 포맷
    description: 공백을 제거하여 최소 크기로 압축합니다.
    content: |-
      dataToCompress = {'a': 1, 'b': 2, 'c': 3}
      compactJson = json.dumps(dataToCompress, separators=(',', ':'))
      compactJson
  - type: tip
    content: ensure_ascii=False를 사용하면 한글, 이모지 등이 \uXXXX 형태로 변환되지 않습니다.
- id: data_types
  title: 지원 데이터 타입
  structuredPrimary: true
  subtitle: Python ↔ JSON 변환
  goal: '지원 데이터 타입: 실행 가능한 Python 흐름으로 익힌다.'
  why: '지원 데이터 타입: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    JSON은 제한된 데이터 타입만 지원합니다. Python의 일부 타입은 JSON으로 직렬화할 수 없거나 변환 시 타입이 바뀝니다. 딕셔너리, 리스트, 문자열, 숫자, 불린, None만 직접 지원되며, 날짜나 집합 등은 커스텀 처리가 필요합니다.

    set, datetime, custom 객체는 기본적으로 직렬화할 수 없습니다. 커스텀 인코더가 필요합니다.
  tips:
  - set, datetime, custom 객체는 기본적으로 직렬화할 수 없습니다. 커스텀 인코더가 필요합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    mixedData = {
        'text': 'Hello',
        'number': 42,
        'decimal': 3.14,
        'flag': True,
        'empty': None,
        'items': [1, 2, 3]
    }
    convertedJson = json.dumps(mixedData, indent=2)
    convertedJson
