          assert isinstance(config['limits'].get('maxUsers'), int), 'limits.maxUsers는 정수여야 합니다'

          publicConfig = {key: value for key, value in config.items() if key not in {'password', 'token'}}
          publicConfig['features'] = sorted(publicConfig['features'])
          return publicConfig

      normalizedConfig = normalizeConfig(rawConfig)
      assert 'token' not in normalizedConfig
      normalizedConfig
  - type: code
    language: python
    title: 실패 케이스를 먼저 확인
    description: 깨진 JSON과 스키마 오류를 좁힌 예외로 분리합니다.
    content: |-
      brokenJsonText = '{app: "Codaro"}'
      try:
          json.loads(brokenJsonText)
      except json.JSONDecodeError as exc:
          jsonParseProblem = f'{exc.lineno}:{exc.colno}'

      invalidConfig = {
          'app': {'name': 'Codaro'},
          'features': 'curriculum',
          'limits': {}
      }
      try:
          normalizeConfig(invalidConfig)
      except AssertionError as exc:
          schemaProblem = str(exc)

      assert jsonParseProblem
      assert 'features' in schemaProblem or 'version' in schemaProblem
      jsonParseProblem, schemaProblem
  - type: code
    language: python
    title: 저장 후 다시 읽어 검증
    description: 파일에 저장한 JSON이 다시 읽어도 같은 구조인지 확인합니다.
    content: |-
      workflowConfigPath = jsonWorkflowRoot / 'app_config.json'
      with open(workflowConfigPath, 'w', encoding='utf-8') as f:
          json.dump(normalizedConfig, f, ensure_ascii=False, indent=2, sort_keys=True)

      with open(workflowConfigPath, 'r', encoding='utf-8') as f:
          loadedWorkflowConfig = json.load(f)

      assert loadedWorkflowConfig == normalizedConfig
      assert loadedWorkflowConfig['features'] == ['automation', 'curriculum']
      loadedWorkflowConfig
  - type: code
    language: python
    title: JSONL 로그 실무 변주
    description: 여러 이벤트를 한 줄씩 저장하고 오류 건수와 민감 정보 제거를 검증합니다.
    content: |-
      events = [
          {'level': 'info', 'message': 'started', 'token': 'remove-me'},
          {'level': 'error', 'message': 'missing field', 'retry': True},
          {'level': 'info', 'message': 'finished'}
      ]
      jsonlPath = jsonWorkflowRoot / 'events.jsonl'
      with open(jsonlPath, 'w', encoding='utf-8') as f:
          for event in events:
              safeEvent = {key: value for key, value in event.items() if key != 'token'}
              f.write(json.dumps(safeEvent, ensure_ascii=False) + '\n')

      with open(jsonlPath, 'r', encoding='utf-8') as f:
          loadedEvents = [json.loads(line) for line in f]

      assert sum(event['level'] == 'error' for event in loadedEvents) == 1
      assert all('token' not in event for event in loadedEvents)
      loadedEvents
