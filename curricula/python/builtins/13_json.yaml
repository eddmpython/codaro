sections:
- id: module_import
  title: json 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: json 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    json은 파이썬 표준 라이브러리입니다. JSON(JavaScript Object Notation) 데이터를 처리하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 json 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 json 모듈을 사용할 수 있습니다.
  snippet: |-
    import json
    import tempfile
    from pathlib import Path

    jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
    jsonScratch.mkdir(parents=True, exist_ok=True)

    'json 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: json 모듈 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import json
      import tempfile
      from pathlib import Path

      jsonScratch = Path(tempfile.gettempdir()) / 'codaro_json_scratch'
      jsonScratch.mkdir(parents=True, exist_ok=True)

      'json 모듈이 정상적으로 로드되었습니다'
    hints:
    - json 모듈 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: json 모듈 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: json 모듈 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: basic_serialization
  title: 기본 직렬화
  structuredPrimary: true
  subtitle: dumps와 loads
  goal: 기본 직렬화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    json 모듈은 Python 객체와 JSON 문자열 간 변환을 제공합니다. dumps()는 Python 객체를 JSON 문자열로 직렬화하고, loads()는 JSON 문자열을 Python 객체로 역직렬화합니다. API 통신, 설정 파일, 데이터 교환에 필수적입니다.

    JSON의 true/false는 Python의 True/False로, null은 None으로 자동 변환됩니다.
  tips:
  - JSON의 true/false는 Python의 True/False로, null은 None으로 자동 변환됩니다.
  snippet: |-
    userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
    jsonString = json.dumps(userData)
    jsonString
  exercise:
    prompt: 기본 직렬화 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      userData = {'name': 'Alice', 'age': 30, 'city': 'Seoul'}
      jsonString = json.dumps(userData)
      jsonString
    hints:
    - 기본 직렬화 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 기본 직렬화 코드가 예외 없이 끝나야 합니다.
    resultCheck: 기본 직렬화에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: file_operations
  title: 파일 읽기와 쓰기
  structuredPrimary: true
  subtitle: dump와 load
  goal: 파일 읽기와 쓰기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    dump()는 Python 객체를 JSON 파일로 저장하고, load()는 JSON 파일을 Python 객체로 읽어옵니다. 설정 파일, 데이터 캐싱, 영속성 저장에 활용됩니다. 파일 핸들을 직접 전달하여 효율적으로 처리합니다.

    대용량 데이터는 dump/load가 dumps/loads보다 메모리 효율적입니다.
  tips:
  - 대용량 데이터는 dump/load가 dumps/loads보다 메모리 효율적입니다.
  snippet: |-
    configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
    with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
        json.dump(configData, f)
    'config.json 저장 완료'
  exercise:
    prompt: 파일 읽기와 쓰기 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      configData = {'theme': 'dark', 'language': 'ko', 'notifications': True}
      with open(jsonScratch / 'config.json', 'w', encoding='utf-8') as f:
          json.dump(configData, f)
      'config.json 저장 완료'
    hints:
    - 파일 읽기와 쓰기 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파일 읽기와 쓰기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파일 읽기와 쓰기에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: formatting
  title: 포맷팅 옵션
  structuredPrimary: true
  subtitle: indent, sort_keys, separators
  goal: 포맷팅 옵션에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    JSON 출력을 사람이 읽기 쉽게 포맷팅할 수 있습니다. indent는 들여쓰기 수준을 지정하고, sort_keys는 키를 정렬하며, separators는 구분자를 커스터마이즈합니다. 디버깅, 로그, 설정 파일 작성에 유용합니다.

    ensure_ascii=False를 사용하면 한글, 이모지 등이 \uXXXX 형태로 변환되지 않습니다.
  tips:
  - ensure_ascii=False를 사용하면 한글, 이모지 등이 \uXXXX 형태로 변환되지 않습니다.
  snippet: |-
    studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
    prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
    prettyJson
  exercise:
    prompt: 포맷팅 옵션 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      studentData = {'name': '김철수', 'grade': 'A', 'score': 95}
      prettyJson = json.dumps(studentData, indent=2, ensure_ascii=False)
      prettyJson
    hints:
    - 포맷팅 옵션 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 포맷팅 옵션 코드가 예외 없이 끝나야 합니다.
    resultCheck: 포맷팅 옵션에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: data_types
  title: 지원 데이터 타입
  structuredPrimary: true
  subtitle: Python ↔ JSON 변환
  goal: 지원 데이터 타입에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    JSON은 제한된 데이터 타입만 지원합니다. Python의 일부 타입은 JSON으로 직렬화할 수 없거나 변환 시 타입이 바뀝니다. 딕셔너리, 리스트, 문자열, 숫자, 불린, None만 직접 지원되며, 날짜나 집합 등은 커스텀 처리가 필요합니다.

    set, datetime, custom 객체는 기본적으로 직렬화할 수 없습니다. 커스텀 인코더가 필요합니다.
  tips:
  - set, datetime, custom 객체는 기본적으로 직렬화할 수 없습니다. 커스텀 인코더가 필요합니다.
  snippet: |-
    mixedData = {
        'text': 'Hello',
        'number': 42,
        'decimal': 3.14,
        'flag': True,
        'empty': None,
        'items': [1, 2, 3]
    }
    convertedJson = json.dumps(mixedData, indent=2)
    convertedJson
  exercise:
    prompt: 지원 데이터 타입 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      mixedData = {
          'text': 'Hello',
          'number': 42,
          'decimal': 3.14,
          'flag': True,
          'empty': None,
          'items': [1, 2, 3]
      }
      convertedJson = json.dumps(mixedData, indent=2)
      convertedJson
    hints:
    - 지원 데이터 타입 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 지원 데이터 타입 코드가 예외 없이 끝나야 합니다.
    resultCheck: 지원 데이터 타입에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: custom_encoding
  title: 커스텀 인코딩
  structuredPrimary: true
  subtitle: default와 object_hook
  goal: 커스텀 인코딩에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    기본 지원되지 않는 타입을 JSON으로 변환하려면 default 함수를 사용합니다. 역직렬화 시 커스텀 변환은 object_hook으로 구현합니다. 날짜, 집합, 사용자 정의 클래스 등을 JSON으로 처리할 수 있습니다.

    복잡한 객체는 __dict__를 사용하여 딕셔너리로 변환한 후 직렬화할 수 있습니다.
  tips:
  - 복잡한 객체는 __dict__를 사용하여 딕셔너리로 변환한 후 직렬화할 수 있습니다.
  snippet: |-
    def customEncoder(obj):
        if isinstance(obj, set):
            return list(obj)
        raise TypeError(f'{type(obj)} not serializable')

    dataWithSet = {'tags': {'python', 'json', 'tutorial'}}
    encodedSet = json.dumps(dataWithSet, default=customEncoder)
    encodedSet
  exercise:
    prompt: 커스텀 인코딩 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def customEncoder(obj):
          if isinstance(obj, set):
              return list(obj)
          raise TypeError(f'{type(obj)} not serializable')

      dataWithSet = {'tags': {'python', 'json', 'tutorial'}}
      encodedSet = json.dumps(dataWithSet, default=customEncoder)
      encodedSet
    hints:
    - 커스텀 인코딩 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 커스텀 인코딩 코드가 예외 없이 끝나야 합니다.
    resultCheck: 커스텀 인코딩에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: API, 설정 파일, 로그
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    실무에서 자주 사용하는 JSON 활용 패턴을 살펴봅니다. API 응답 처리, 설정 파일 관리, 로그 저장, 데이터 교환 등 다양한 시나리오에서 JSON을 효과적으로 사용할 수 있습니다.

    JSON 파일은 주석을 지원하지 않습니다. 설명이 필요하면 '_comment' 키를 사용하세요.
  tips:
  - JSON 파일은 주석을 지원하지 않습니다. 설명이 필요하면 '_comment' 키를 사용하세요.
  snippet: |-
    apiResponse = '{"status": "success", "data": {"users": 150, "active": 120}}'
    parsedResponse = json.loads(apiResponse)
    totalUsers = parsedResponse['data']['users']
    totalUsers
  exercise:
    prompt: 실전 활용 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      apiResponse = '{"status": "success", "data": {"users": 150, "active": 120}}'
      parsedResponse = json.loads(apiResponse)
      totalUsers = parsedResponse['data']['users']
      totalUsers
    hints:
    - 실전 활용 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실전 활용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실전 활용에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '검증 루프: JSON 설정 품질 게이트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: '검증 루프: JSON 설정 품질 게이트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
