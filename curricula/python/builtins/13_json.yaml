- id: workflow_validation
  title: '검증 루프: JSON 설정 품질 게이트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 실무 JSON은 읽고 쓰는 것보다 구조를 검증하고 민감 정보를 제거한 뒤, 다시 읽어도 같은 데이터인지 확인하는 과정이 중요합니다. 여기서는 잘못된 JSON, 누락된 필드, 저장 후 재검증을 한 흐름으로 묶습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    jsonWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_json_workflow_'))
    rawConfig = {
        'app': {'name': 'Codaro', 'version': '1.0.0'},
        'features': ['curriculum', 'automation'],
        'limits': {'maxUsers': 25},
        'token': 'secret-token'
    }

    def normalizeConfig(config):
        assert isinstance(config.get('app'), dict), 'app 설정은 딕셔너리여야 합니다'
        assert isinstance(config['app'].get('name'), str), 'app.name이 필요합니다'
        assert isinstance(config['app'].get('version'), str), 'app.version이 필요합니다'
        assert isinstance(config.get('features'), list), 'features는 리스트여야 합니다'
        assert isinstance(config.get('limits'), dict), 'limits 설정이 필요합니다'
        assert isinstance(config['limits'].get('maxUsers'), int), 'limits.maxUsers는 정수여야 합니다'

        publicConfig = {key: value for key, value in config.items() if key not in {'password', 'token'}}
        publicConfig['features'] = sorted(publicConfig['features'])
        return publicConfig

    normalizedConfig = normalizeConfig(rawConfig)
    assert 'token' not in normalizedConfig
    normalizedConfig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      jsonWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_json_workflow_'))
      rawConfig = {
          'app': {'name': 'Codaro', 'version': '1.0.0'},
          'features': ['curriculum', 'automation'],
          'limits': {'maxUsers': 25},
          'token': 'secret-token'
      }

      def normalizeConfig(config):
          assert isinstance(config.get('app'), dict), 'app 설정은 딕셔너리여야 합니다'
          assert isinstance(config['app'].get('name'), str), 'app.name이 필요합니다'
          assert isinstance(config['app'].get('version'), str), 'app.version이 필요합니다'
          assert isinstance(config.get('features'), list), 'features는 리스트여야 합니다'
          assert isinstance(config.get('limits'), dict), 'limits 설정이 필요합니다'
          assert isinstance(config['limits'].get('maxUsers'), int), 'limits.maxUsers는 정수여야 합니다'

          publicConfig = {key: value for key, value in config.items() if key not in {'password', 'token'}}
          publicConfig['features'] = sorted(publicConfig['features'])
          return publicConfig

      normalizedConfig = normalizeConfig(rawConfig)
      assert 'token' not in normalizedConfig
      normalizedConfig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
