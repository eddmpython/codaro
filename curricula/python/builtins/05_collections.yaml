  goal: '검증 루프: 티켓 운영 집계: 실행 가능한 Python 흐름으로 익힌다.'
  why: '검증 루프: 티켓 운영 집계: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    collections는 단일 함수 암기가 아니라 운영 데이터 구조를 깔끔하게 만드는 도구입니다. 티켓 로그를 집계하고, 누락 키 오류를 잡고, 최근 이벤트와 설정 우선순위를 함께 검증합니다.

    변주 실험
    최근 3개가 아니라 최근 5개 상태를 기준으로 에러율을 계산하고, 경보 기준을 50%에서 40%로 낮췄을 때 경보 횟수가 어떻게 달라지는지 비교하세요.
  tips:
  - 변주 실험 최근 3개가 아니라 최근 5개 상태를 기준으로 에러율을 계산하고, 경보 기준을 50%에서 40%로 낮췄을 때 경보 횟수가 어떻게 달라지는지 비교하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    ticketRows = [
        {"ticketId": "T-101", "owner": "min", "category": "bug", "priority": "high"},
        {"ticketId": "T-102", "owner": "seo", "category": "billing", "priority": "medium"},
        {"ticketId": "T-103", "owner": "min", "category": "bug", "priority": "low"},
        {"ticketId": "T-104", "owner": "jin", "category": "feature", "priority": "medium"},
        {"ticketId": "T-105", "owner": "seo", "category": "bug", "priority": "high"},
    ]

    def summarizeTickets(rows):
        categoryCounts = Counter(row["category"] for row in rows)
        priorityCounts = Counter(row["priority"] for row in rows)
        ticketsByOwner = defaultdict(list)

        for row in rows:
            ticketsByOwner[row["owner"]].append(row["ticketId"])

        return {
            "categoryCounts": categoryCounts,
            "priorityCounts": priorityCounts,
            "ticketsByOwner": dict(ticketsByOwner),
            "topCategory": categoryCounts.most_common(1)[0],
        }

    ticketSummary = summarizeTickets(ticketRows)

    assert ticketSummary["categoryCounts"]["bug"] == 3
    assert ticketSummary["priorityCounts"]["high"] == 2
    assert ticketSummary["ticketsByOwner"]["min"] == ["T-101", "T-103"]
    assert ticketSummary["topCategory"] == ("bug", 3)

    ticketSummary
