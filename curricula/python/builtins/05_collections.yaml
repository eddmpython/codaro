  - type: code
    language: python
    title: 슬라이딩 에러율 계산
    description: deque로 최근 N개 상태의 에러율을 추적합니다.
    content: |-
      def rollingErrorRates(statuses, windowSize):
          window = deque(maxlen=windowSize)
          rates = []
          for status in statuses:
              window.append(status)
              if len(window) == windowSize:
                  failures = Counter(window)["fail"]
                  rates.append(failures / windowSize)
          return rates

      errorRates = rollingErrorRates(
          ["ok", "fail", "ok", "fail", "fail", "ok"],
          windowSize=3,
      )

      assert errorRates == [1 / 3, 2 / 3, 2 / 3, 2 / 3]
      assert max(errorRates) > 0.5

      errorRates
  - type: tip
    title: 변주 실험
