- id: counter
  title: Counter - 빈도 계산기
  structuredPrimary: true
  subtitle: 요소의 개수 세기
  goal: 'Counter - 빈도 계산기: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Counter - 빈도 계산기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Counter는 요소의 등장 횟수를 세는 특수 딕셔너리입니다. most_common()으로 가장 많이 등장한 요소를 찾고, 산술 연산으로 카운터를 합치거나 뺄 수 있습니다. 투표 집계, 단어 빈도 분석, 통계 처리에 필수적입니다.

    Counter는 존재하지 않는 키에 대해 0을 반환합니다. KeyError가 발생하지 않습니다.
  tips:
  - Counter는 존재하지 않는 키에 대해 0을 반환합니다. KeyError가 발생하지 않습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
    fruitCount = Counter(fruits)
    fruitCount
  exercise:
    prompt: 'Counter - 빈도 계산기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
      fruitCount = Counter(fruits)
      fruitCount
    solution: |-
      fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
      fruitCount = Counter(fruits)
      fruitCount
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Counter는 요소의 등장 횟수를 세는 특수 딕셔너리입니다. most_common()으로 가장 많이 등장한 요소를 찾고, 산술 연산으로 카운터를 합치거나 뺄 수 있습니다. 투표 집계, 단어 빈도
      분석, 통계 처리에 필수적입니다.
  - type: list
    items:
    - 'Counter(리스트): 빈도 딕셔너리 생성'
    - 'most_common(n): 상위 n개'
    - '산술 연산: +, -, &, |'
    - 'elements(): 원소 반복자'
  - type: code
    language: python
    title: 기본 카운팅
    description: 리스트의 각 요소가 몇 번 등장하는지 셉니다.
    content: |-
      fruits = ['apple', 'banana', 'apple', 'cherry', 'banana', 'apple']
      fruitCount = Counter(fruits)
      fruitCount
  - type: code
    language: python
    title: 가장 많이 등장한 요소
    description: 가장 빈도가 높은 상위 2개를 찾습니다.
    content: |-
      letters = ['a', 'b', 'c', 'a', 'b', 'a']
      letterCount = Counter(letters)
      topTwo = letterCount.most_common(2)
      topTwo
  - type: code
    language: python
    title: 문자열 카운팅
    description: 문자열의 각 문자 빈도를 셉니다.
    content: |-
      text = 'hello world'
      charFreq = Counter(text)
      charFreq
  - type: tip
    content: Counter는 존재하지 않는 키에 대해 0을 반환합니다. KeyError가 발생하지 않습니다.
- id: defaultdict
  title: defaultdict - 기본값 딕셔너리
  structuredPrimary: true
  subtitle: KeyError 없는 딕셔너리
  goal: 'defaultdict - 기본값 딕셔너리: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'defaultdict - 기본값 딕셔너리: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    defaultdict는 존재하지 않는 키에 접근할 때 기본값을 자동으로 생성합니다. int, list, set 등을 기본 팩토리로 지정하면 초기화 없이 바로 사용할 수 있습니다. 그룹화, 집계, 인덱싱 작업을 간결하게 만듭니다.

    defaultdict(lambda: 값)으로 커스텀 기본값을 설정할 수 있습니다.
  tips:
  - 'defaultdict(lambda: 값)으로 커스텀 기본값을 설정할 수 있습니다.'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    scores = defaultdict(int)
    scores['alice'] += 10
    scores['bob'] += 5
    scores['alice'] += 3
    dict(scores)
  exercise:
    prompt: 'defaultdict - 기본값 딕셔너리: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      scores = defaultdict(int)
      scores['alice'] += 10
      scores['bob'] += 5
      scores['alice'] += 3
      dict(scores)
    solution: |-
      scores = defaultdict(int)
      scores['alice'] += 10
      scores['bob'] += 5
      scores['alice'] += 3
      dict(scores)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: defaultdict는 존재하지 않는 키에 접근할 때 기본값을 자동으로 생성합니다. int, list, set 등을 기본 팩토리로 지정하면 초기화 없이 바로 사용할 수 있습니다. 그룹화, 집계,
      인덱싱 작업을 간결하게 만듭니다.
  - type: list
    items:
    - 'defaultdict(int): 기본값 0'
    - 'defaultdict(list): 기본값 빈 리스트'
    - 'defaultdict(set): 기본값 빈 집합'
    - 자동 초기화로 코드 간소화
  - type: code
    language: python
    title: int 기본값
    description: 존재하지 않는 키는 자동으로 0으로 초기화됩니다.
    content: |-
      scores = defaultdict(int)
      scores['alice'] += 10
      scores['bob'] += 5
      scores['alice'] += 3
      dict(scores)
  - type: code
    language: python
    title: list 기본값
    description: 키마다 빈 리스트가 자동 생성되어 append 가능합니다.
    content: |-
      groups = defaultdict(list)
      groups['fruits'].append('apple')
      groups['fruits'].append('banana')
      groups['vegetables'].append('carrot')
      dict(groups)
  - type: code
    language: python
    title: 단어 길이별 그룹화
    description: 단어를 길이별로 분류합니다.
    content: |-
      words = ['cat', 'dog', 'elephant', 'ant']
      byLength = defaultdict(list)
      for word in words:
          byLength[len(word)].append(word)
      dict(byLength)
  - type: tip
    content: 'defaultdict(lambda: 값)으로 커스텀 기본값을 설정할 수 있습니다.'
- id: deque
  title: deque - 양방향 큐
  structuredPrimary: true
  subtitle: 빠른 양쪽 끝 삽입/삭제
  goal: 'deque - 양방향 큐: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'deque - 양방향 큐: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    deque는 양쪽 끝에서 빠르게 삽입과 삭제가 가능한 자료구조입니다. append()/pop()은 오른쪽, appendleft()/popleft()는 왼쪽에서 작동합니다. 리스트보다 양 끝 연산이 훨씬 빠르며, 큐, 스택, 슬라이딩 윈도우에 활용됩니다.

    deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  tips:
  - deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    dq = deque([1, 2, 3])
    dq.append(4)
    dq.appendleft(0)
    list(dq)
  exercise:
    prompt: 'deque - 양방향 큐: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      dq = deque([1, 2, 3])
      dq.append(4)
      dq.appendleft(0)
      list(dq)
    solution: |-
      dq = deque([1, 2, 3])
      dq.append(4)
      dq.appendleft(0)
      list(dq)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: deque는 양쪽 끝에서 빠르게 삽입과 삭제가 가능한 자료구조입니다. append()/pop()은 오른쪽, appendleft()/popleft()는 왼쪽에서 작동합니다. 리스트보다 양 끝 연산이
      훨씬 빠르며, 큐, 스택, 슬라이딩 윈도우에 활용됩니다.
  - type: list
    items:
    - 'append(x): 오른쪽에 추가'
    - 'appendleft(x): 왼쪽에 추가'
    - 'pop(): 오른쪽에서 제거'
    - 'popleft(): 왼쪽에서 제거'
  - type: code
    language: python
    title: 양방향 추가
    description: 양쪽 끝에서 요소를 추가합니다.
    content: |-
      dq = deque([1, 2, 3])
      dq.append(4)
      dq.appendleft(0)
      list(dq)
  - type: code
    language: python
    title: 양방향 제거
    description: 양쪽 끝에서 요소를 제거합니다.
    content: |-
      queue = deque([1, 2, 3, 4, 5])
      rightItem = queue.pop()
      leftItem = queue.popleft()
      rightItem, leftItem, list(queue)
  - type: code
    language: python
    title: 회전
    description: 요소를 오른쪽으로 회전시킵니다.
    content: |-
      rotated = deque([1, 2, 3, 4, 5])
      rotated.rotate(2)
      list(rotated)
  - type: tip
    content: deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
- id: namedtuple
  title: namedtuple - 이름있는 튜플
  structuredPrimary: true
  subtitle: 가독성 높은 불변 데이터
  goal: 'namedtuple - 이름있는 튜플: 실행 가능한 Python 흐름으로 익힌다.'
