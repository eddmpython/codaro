- id: chainmap
  title: ChainMap - 딕셔너리 체인
  structuredPrimary: true
  subtitle: 여러 딕셔너리 통합 조회
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ChainMap은 여러 딕셔너리를 하나의 뷰로 묶습니다. 조회 시 첫 번째 딕셔너리부터 순서대로 검색하며, 설정 우선순위나 변수 스코프 구현에 유용합니다. 실제 병합 없이 논리적으로 합치므로 메모리 효율적입니다.

    ChainMap.maps로 내부 딕셔너리 리스트에 접근할 수 있습니다.
  tips:
  - ChainMap.maps로 내부 딕셔너리 리스트에 접근할 수 있습니다.
  snippet: |-
    defaults = {'color': 'red', 'size': 10}
    custom = {'size': 20}
    combined = ChainMap(custom, defaults)
    combined['color'], combined['size']
