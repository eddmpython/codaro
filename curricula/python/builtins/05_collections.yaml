      scores['bob'] += 5
      scores['alice'] += 3
      dict(scores)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: deque
  title: deque - 양방향 큐
  structuredPrimary: true
  subtitle: 빠른 양쪽 끝 삽입/삭제
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    deque는 양쪽 끝에서 빠르게 삽입과 삭제가 가능한 자료구조입니다. append()/pop()은 오른쪽, appendleft()/popleft()는 왼쪽에서 작동합니다. 리스트보다 양 끝 연산이 훨씬 빠르며, 큐, 스택, 슬라이딩 윈도우에 활용됩니다.

    deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  tips:
  - deque(maxlen=n)으로 크기 제한 큐를 만들면 자동으로 오래된 요소가 제거됩니다.
  snippet: |-
    dq = deque([1, 2, 3])
    dq.append(4)
    dq.appendleft(0)
    list(dq)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      dq = deque([1, 2, 3])
      dq.append(4)
      dq.appendleft(0)
      list(dq)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: namedtuple
  title: namedtuple - 이름있는 튜플
  structuredPrimary: true
  subtitle: 가독성 높은 불변 데이터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    namedtuple은 필드 이름으로 접근할 수 있는 튜플입니다. 인덱스 대신 속성명을 사용하여 코드 가독성을 높이고, 불변성으로 안전성을 보장합니다. 경량 데이터 클래스, 설정 객체, 반환값 구조화에 적합합니다.

    _asdict()로 namedtuple을 OrderedDict로 변환할 수 있습니다.
  tips:
  - _asdict()로 namedtuple을 OrderedDict로 변환할 수 있습니다.
