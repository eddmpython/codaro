    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  name: text_dedenting
  blocks:
  - type: content
    title: dedent() 함수
    content: |-
      dedent()는 모든 줄에서 공통 선행 공백을 제거합니다.
      주로 함수 내 docstring이나 여러 줄 문자열에서 사용됩니다.
  - type: code
    language: python
    title: 기본 dedent
    description: 들여쓰기된 텍스트에서 공통 공백을 제거합니다.
    content: |-
      indentedText = """
          Hello World
          This is indented
          All lines have common spacing
      """
      dedentedText = textwrap.dedent(indentedText)
      dedentedText
  - type: tip
    title: dedent 사용 시기
    content: 코드 내에서 여러 줄 문자열을 깔끔하게 작성할 때 유용합니다.
  - type: code
    language: python
    title: 함수 내 문자열 정리
    description: 함수 내에서 들여쓰기된 문자열을 정리합니다.
    content: |-
      def getMessage():
          message = """
              Welcome to our application!
              Please follow these steps:
              1. Login
              2. Select a project
              3. Start working
          """
          return textwrap.dedent(message).strip()

      cleanMessage = getMessage()
      cleanMessage
  - type: code
    language: python
    title: 부분 들여쓰기 처리
    description: 공통 들여쓰기만 제거됩니다.
    content: |-
      mixedIndent = """
          First level
              Second level
                  Third level
          Back to first
      """
      result = textwrap.dedent(mixedIndent)
      result
