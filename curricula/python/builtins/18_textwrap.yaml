  name: text_indenting
  blocks:
  - type: content
    title: indent() 함수
    content: indent()는 각 줄의 시작 부분에 지정된 문자열을 추가합니다.
  - type: code
    language: python
    title: 기본 indent
    description: 모든 줄에 들여쓰기를 추가합니다.
    content: |-
      text = "Line 1\nLine 2\nLine 3"
      indentedText = textwrap.indent(text, "    ")
      indentedText
  - type: tip
    title: prefix 문자열
    content: 공백뿐만 아니라 다른 문자열도 prefix로 사용할 수 있습니다.
  - type: code
    language: python
    title: 커스텀 prefix
    description: 다양한 prefix를 사용하여 들여쓰기합니다.
    content: |-
      codeLines = "def hello():\n    print('Hello')\n    return True"

      commentStyle = textwrap.indent(codeLines, "# ")
      bulletStyle = textwrap.indent(codeLines, "  - ")

      {
          "comment": commentStyle,
          "bullet": bulletStyle
      }
  - type: code
    language: python
    title: 조건부 들여쓰기
    description: predicate 함수로 특정 줄만 들여쓰기합니다.
    content: |-
      text = "Header\nContent line 1\nContent line 2\nFooter"

      def notHeader(line):
          return not line.startswith("Header")

      result = textwrap.indent(text, "    ", predicate=notHeader)
      result
  - type: tip
    title: predicate 활용
    content: predicate로 빈 줄 제외, 특정 패턴 제외 등을 구현할 수 있습니다.
