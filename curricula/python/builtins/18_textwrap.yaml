    starterCode: |-
      text = "Python textwrap module provides convenient functions for formatting text."
      result = textwrap.fill(text, width=30)
      result
    solution: |-
      text = "Python textwrap module provides convenient functions for formatting text."
      result = textwrap.fill(text, width=30)
      result
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  name: practice
  blocks:
  - type: expansion
    title: 🟢 기본 래핑
    blocks:
    - type: code
      language: python
      title: 문제
      description: 텍스트를 30자 너비로 래핑하세요
      content: |-
        text = "Python textwrap module provides convenient functions for formatting text."
        result = textwrap.fill(text, width=30)
        result
  - type: expansion
    title: 🟢 들여쓰기 제거
    blocks:
    - type: code
      language: python
      title: 문제
      description: 들여쓰기된 텍스트에서 공통 공백을 제거하세요
      content: |-
        text = """
            Hello
            World
            Python
        """
        result = textwrap.dedent(text).strip()
        result
  - type: expansion
    title: 🟢 들여쓰기 추가
    blocks:
    - type: code
      language: python
      title: 문제
      description: 각 줄에 4칸 들여쓰기를 추가하세요
      content: |-
        text = "Line 1\nLine 2\nLine 3"
        result = textwrap.indent(text, "    ")
        result
  - type: expansion
    title: 🟢 텍스트 축약
    blocks:
    - type: code
      language: python
      title: 문제
      description: 텍스트를 25자로 축약하세요
      content: |-
        text = "This is a long sentence that needs to be shortened."
        result = textwrap.shorten(text, width=25)
        result
  - type: expansion
    title: 🟢 리스트로 래핑
    blocks:
    - type: code
      language: python
      title: 문제
      description: 텍스트를 40자 너비로 래핑하여 리스트로 반환하세요
      content: |-
        text = "The quick brown fox jumps over the lazy dog. This is a test sentence."
        result = textwrap.wrap(text, width=40)
        result
  - type: expansion
    title: 🟡 초기 들여쓰기
    blocks:
    - type: code
      language: python
      title: 문제
      description: 첫 줄에만 '> '를 추가하고 나머지는 '  '로 들여쓰기하세요
      content: |-
        wrapper = textwrap.TextWrapper(
            width=40,
            initial_indent="> ",
            subsequent_indent="  "
        )
        text = "This is a quoted text that will span multiple lines when wrapped."
        result = wrapper.fill(text)
        result
  - type: expansion
    title: 🟡 커스텀 placeholder
    blocks:
    - type: code
      language: python
      title: 문제
      description: 텍스트를 30자로 축약하고 '...'를 사용하세요
      content: |-
        text = "Python is a powerful programming language used for many applications."
        result = textwrap.shorten(text, width=30, placeholder="...")
        result
  - type: expansion
    title: 🟡 조건부 들여쓰기
    blocks:
    - type: code
      language: python
      title: 문제
      description: 빈 줄이 아닌 줄에만 '  '를 추가하세요
      content: |-
        text = "Line 1\n\nLine 2\nLine 3"
        result = textwrap.indent(text, "  ", predicate=lambda line: line.strip())
        result
  - type: expansion
    title: 🟡 긴 단어 처리
    blocks:
    - type: code
      language: python
      title: 문제
      description: 너비 15에서 긴 단어를 강제로 분리하세요
      content: |-
        wrapper = textwrap.TextWrapper(width=15, break_long_words=True)
        text = "supercalifragilisticexpialidocious"
        result = wrapper.fill(text)
        result
  - type: expansion
    title: 🟡 최대 줄 수 제한
    blocks:
    - type: code
      language: python
      title: 문제
      description: 최대 2줄로 제한하고 '...'로 표시하세요
      content: |-
        wrapper = textwrap.TextWrapper(width=30, max_lines=2, placeholder="...")
        text = "This is a very long text that will be limited to only two lines with a placeholder at the end."
        result = wrapper.fill(text)
        result
  - type: expansion
    title: 🔴 도움말 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 명령어와 설명을 정렬된 도움말 형식으로 포맷팅하세요
      content: |-
        def formatHelp(cmd, desc):
            wrapper = textwrap.TextWrapper(
                width=60,
                initial_indent=f"  {cmd:<12} ",
                subsequent_indent=" " * 14
            )
            return wrapper.fill(desc)

        result = formatHelp("install", "Install packages from the package manager with automatic dependency resolution")
        result
  - type: expansion
    title: 🔴 코드 주석 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 긴 주석을 여러 줄로 나누고 각 줄에 '# '를 추가하세요
      content: |-
        comment = "This function performs complex calculations using advanced algorithms to optimize performance"

        wrapper = textwrap.TextWrapper(
            width=50,
            initial_indent="# ",
            subsequent_indent="# "
        )

        result = wrapper.fill(comment)
        result
  - type: expansion
    title: 🔴 번호 있는 리스트
    blocks:
    - type: code
      language: python
      title: 문제
      description: 아이템을 번호 있는 리스트로 포맷팅하세요
      content: |-
        items = [
            "Install required dependencies",
            "Configure environment variables",
            "Run database migrations"
        ]

        formatted = []
        for i, item in enumerate(items, 1):
            wrapper = textwrap.TextWrapper(
                width=40,
                initial_indent=f"{i}. ",
                subsequent_indent="   "
            )
            formatted.append(wrapper.fill(item))

        result = "\n".join(formatted)
        result
  - type: expansion
    title: 🔴 단락 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 여러 단락을 각각 래핑하고 빈 줄로 구분하세요
      content: |-
        paragraphs = [
            "First paragraph with some long text that needs wrapping.",
            "Second paragraph also with long text that should be formatted nicely."
        ]

        wrapper = textwrap.TextWrapper(width=35)
        formatted = [wrapper.fill(p) for p in paragraphs]
        result = "\n\n".join(formatted)
        result
  - type: expansion
    title: 🔴 인용문 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 인용문을 '| '로 시작하는 형식으로 포맷팅하세요
      content: |-
        quote = "The only way to do great work is to love what you do. If you haven't found it yet, keep looking."

        wrapper = textwrap.TextWrapper(
            width=45,
            initial_indent="| ",
            subsequent_indent="| "
        )

        result = wrapper.fill(quote)
        result
  - type: expansion
    title: 🔴 다단계 리스트
    blocks:
    - type: code
      language: python
      title: 문제
      description: 중첩된 리스트를 계층적으로 들여쓰기하세요
      content: |-
        mainItem = "Main topic"
        subItems = ["Subtopic 1", "Subtopic 2"]

        lines = [mainItem]
        for item in subItems:
            lines.append(textwrap.indent(f"- {item}", "  "))

        result = "\n".join(lines)
        result
  - type: expansion
    title: 🔴 테이블 셀 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 긴 텍스트를 테이블 셀 너비에 맞게 래핑하세요
      content: |-
        cellContent = "This is a very long cell content that needs to fit in a table"

        wrapper = textwrap.TextWrapper(width=20)
        lines = wrapper.wrap(cellContent)

        rows = [f"| {line:<20} |" for line in lines]
        result = "\n".join(rows)
        result
  - type: expansion
    title: 🔴 로그 레벨 포맷팅
    blocks:
    - type: code
      language: python
      title: 문제
      description: 로그 메시지에 레벨과 타임스탬프를 추가하여 포맷팅하세요
      content: |-
        level = "ERROR"
        message = "Failed to connect to database server after multiple retry attempts"

        prefix = f"[{level}] "
        wrapper = textwrap.TextWrapper(
            width=60,
            initial_indent=prefix,
            subsequent_indent=" " * len(prefix)
        )

        result = wrapper.fill(message)
        result
  - type: expansion
    title: 🔴 설명이 있는 옵션
    blocks:
    - type: code
      language: python
      title: 문제
      description: 명령줄 옵션과 설명을 정렬하여 포맷팅하세요
      content: |-
        option = "--verbose"
        description = "Enable verbose output mode to display detailed information about the process"

        wrapper = textwrap.TextWrapper(
            width=70,
            initial_indent=f"  {option:<15} ",
            subsequent_indent=" " * 17
        )

        result = wrapper.fill(description)
        result
  - type: expansion
    title: 🔴 여러 줄 docstring
    blocks:
    - type: code
      language: python
      title: 문제
      description: 함수 docstring을 정리하고 포맷팅하세요
      content: |-
        docstring = """
            Calculate the factorial of a number.

            This function uses recursion to compute the factorial.
            Returns None for negative numbers.
        """

        cleaned = textwrap.dedent(docstring).strip()
        result = cleaned
        result
