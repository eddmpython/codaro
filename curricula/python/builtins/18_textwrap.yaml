  snippet: |-
    indentedText = """
        Hello World
        This is indented
        All lines have common spacing
    """
    dedentedText = textwrap.dedent(indentedText)
    dedentedText
  exercise:
    prompt: 들여쓰기 제거 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
