    content: |-
      text = "Python is a powerful and versatile programming language used worldwide."

      defaultShort = textwrap.shorten(text, width=40)
      customShort = textwrap.shorten(text, width=40, placeholder="...")
      emojiShort = textwrap.shorten(text, width=40, placeholder=" 👉")

      {
          "default": defaultShort,
          "custom": customShort,
          "emoji": emojiShort
