    description: shorten()은 단어 경계에서 잘라냅니다.
    content: |-
      sentence = "The quick brown fox jumps over the lazy dog"

      results = {
          f"width_{w}": textwrap.shorten(sentence, width=w)
          for w in [20, 30, 40]
      }
      results
