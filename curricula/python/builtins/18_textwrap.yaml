  - type: code
    language: python
    title: 코드 블록 포맷팅
    description: 코드 블록에 들여쓰기와 테두리를 추가합니다.
    content: |-
      def formatCodeBlock(code, language="python"):
          dedentedCode = textwrap.dedent(code).strip()
          indentedCode = textwrap.indent(dedentedCode, "    ")

          header = f"```{language}"
          footer = "```"

          return f"{header}\n{indentedCode}\n{footer}"

      sampleCode = """
          def factorial(n):
              if n <= 1:
                  return 1
              return n * factorial(n - 1)
      """

      formatted = formatCodeBlock(sampleCode)
      formatted
  - type: code
    language: python
    title: 이메일 본문 포맷팅
    description: 이메일 본문을 보기 좋게 포맷팅합니다.
    content: |-
      def formatEmailBody(greeting, body, signature, width=60):
          wrapper = textwrap.TextWrapper(width=width)

          parts = [
              greeting,
              "",
              wrapper.fill(body),
              "",
              signature
          ]

          return "\n".join(parts)

      email = formatEmailBody(
          greeting="Dear Customer,",
          body="We are pleased to inform you that your order has been processed and will be shipped within 2-3 business days. You will receive a tracking number once the package is dispatched.",
          signature="Best regards,\nCustomer Service Team"
      )

      email
  - type: code
    language: python
    title: 로그 메시지 포맷팅
    description: 로그 메시지에 타임스탬프와 레벨을 추가합니다.
    content: |-
      from datetime import datetime

      def formatLogMessage(level, message, width=80):
          timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          prefix = f"[{timestamp}] {level:<7} "

          wrapper = textwrap.TextWrapper(
              width=width,
              initial_indent=prefix,
              subsequent_indent=" " * len(prefix)
          )

          return wrapper.fill(message)

      logs = [
          formatLogMessage("INFO", "Application started successfully"),
          formatLogMessage("WARNING", "Database connection pool is running low on available connections"),
          formatLogMessage("ERROR", "Failed to process request due to invalid input data format")
      ]

      "\n".join(logs)
  - type: code
    language: python
    title: 마크다운 리스트 포맷팅
    description: 마크다운 형식의 리스트를 생성합니다.
    content: |-
      def formatMarkdownList(items, ordered=False, width=70):
          formatted = []

          for i, item in enumerate(items, 1):
              prefix = f"{i}. " if ordered else "- "
              wrapper = textwrap.TextWrapper(
                  width=width,
                  initial_indent=prefix,
                  subsequent_indent="  " if not ordered else "   "
              )
              formatted.append(wrapper.fill(item))

          return "\n".join(formatted)

      tasks = [
          "Review and update the project documentation with latest API changes",
          "Implement unit tests for the new authentication module",
          "Deploy the application to staging environment for QA testing"
      ]

      unordered = formatMarkdownList(tasks, ordered=False)
      ordered = formatMarkdownList(tasks, ordered=True)

      {
          "unordered": unordered,
          "ordered": ordered
      }
  - type: code
    language: python
    title: 다단계 들여쓰기
    description: 계층 구조를 표현하는 텍스트를 포맷팅합니다.
    content: |-
      def formatHierarchy(items, level=0):
          indent = "  " * level
          result = []

          for item in items:
              if isinstance(item, dict):
                  for key, value in item.items():
                      result.append(f"{indent}- {key}")
                      if isinstance(value, list):
                          result.extend(formatHierarchy(value, level + 1))
              else:
                  result.append(f"{indent}- {item}")

          return result

      structure = [
          {"Project Root": [
              {"src": ["main.py", "utils.py", "config.py"]},
              {"tests": ["test_main.py", "test_utils.py"]},
              "README.md"
          ]}
      ]

      hierarchy = "\n".join(formatHierarchy(structure))
      hierarchy
