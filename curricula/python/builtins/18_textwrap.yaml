  name: basic_wrapping
  blocks:
  - type: content
    title: wrap()과 fill() 함수
    content: wrap()는 텍스트를 리스트로 반환하고, fill()은 하나의 문자열로 반환합니다.
  - type: code
    language: python
    title: wrap() - 리스트로 래핑
    description: 긴 텍스트를 지정된 너비로 나누어 리스트로 반환합니다.
    content: |-
      longText = "Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation."
      wrappedLines = textwrap.wrap(longText, width=40)
      wrappedLines
  - type: tip
    title: wrap() 반환값
    content: wrap()는 각 줄을 요소로 하는 리스트를 반환합니다.
  - type: code
    language: python
    title: fill() - 문자열로 래핑
    description: 긴 텍스트를 지정된 너비로 래핑하여 하나의 문자열로 반환합니다.
    content: |-
      longText = "Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation."
      filledText = textwrap.fill(longText, width=40)
      filledText
  - type: tip
    title: fill()과 wrap()의 차이
    content: fill()은 wrap()의 결과를 개행문자로 join한 것과 같습니다.
  - type: code
    language: python
    title: 너비 조정
    description: 다양한 너비로 텍스트를 래핑합니다.
    content: |-
      text = "The quick brown fox jumps over the lazy dog. This is a sample sentence for testing text wrapping."

      width30 = textwrap.fill(text, width=30)
      width50 = textwrap.fill(text, width=50)
      width70 = textwrap.fill(text, width=70)

      {
          "width_30": width30,
          "width_50": width50,
          "width_70": width70
      }
