intro:
- type: content
  title: textwrap 모듈이란?
  content: |-
    textwrap 모듈은 텍스트를 특정 너비로 래핑하거나 들여쓰기를 조정하는 기능을 제공합니다.
    터미널 출력, 문서 생성, 코드 포맷팅 등에서 유용하게 사용됩니다.
