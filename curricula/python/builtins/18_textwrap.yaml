- title: 실전 활용 예제
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 실전 활용 예제에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    실무 시나리오
    textwrap를 활용한 실전 텍스트 포맷팅 예제를 다룹니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def formatHelpMessage(command, description, width=70):
        wrapper = textwrap.TextWrapper(
            width=width,
            initial_indent=f"  {command:<15} ",
            subsequent_indent=" " * 17
        )
        return wrapper.fill(description)

    commands = [
        ("start", "Start the application server with default configuration"),
        ("stop", "Stop the running application server gracefully"),
        ("restart", "Restart the application server by stopping and starting it again")
    ]

    helpText = "\n".join([
        formatHelpMessage(cmd, desc)
        for cmd, desc in commands
    ])

    helpText
  exercise:
    prompt: 실전 활용 예제 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def formatHelpMessage(command, description, width=70):
          wrapper = textwrap.TextWrapper(
              width=width,
              initial_indent=f"  {command:<15} ",
              subsequent_indent=" " * 17
          )
          return wrapper.fill(description)

      commands = [
          ("start", "Start the application server with default configuration"),
          ("stop", "Stop the running application server gracefully"),
          ("restart", "Restart the application server by stopping and starting it again")
      ]

      helpText = "\n".join([
          formatHelpMessage(cmd, desc)
          for cmd, desc in commands
      ])

      helpText
    hints:
    - 실전 활용 예제 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
