          ("stop", "Stop the running application server gracefully"),
          ("restart", "Restart the application server by stopping and starting it again")
      ]

      helpText = "\n".join([
          formatHelpMessage(cmd, desc)
          for cmd, desc in commands
      ])

      helpText
    hints:
