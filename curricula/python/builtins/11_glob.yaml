  goal: 'glob 모듈 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'glob 모듈 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: glob 모듈 불러오기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 glob 모듈을 사용할 수 있습니다.
  - Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
