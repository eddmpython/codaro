    content: Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
- id: basic_patterns
  title: 기본 패턴
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '기본 패턴: 실행 가능한 Python 흐름으로 익힌다.'
  why: '기본 패턴: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 기본 패턴의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - Codaro 로컬 커널에서는 현재 작업 디렉터리와 지정한 로컬 경로를 검색합니다. 패턴에 맞는 파일이 없으면 빈 리스트가 반환됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    patternPy = '*.py'
    resultFiles = glob.glob(patternPy)
    resultFiles
  exercise:
    prompt: '기본 패턴: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      patternPy = '*.py'
      resultFiles = glob.glob(patternPy)
      resultFiles
    solution: |-
      patternPy = '*.py'
      resultFiles = glob.glob(patternPy)
      resultFiles
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: glob는 Unix 셸 스타일의 와일드카드를 지원합니다. *는 모든 문자, ?는 단일 문자, []는 문자 범위를 나타냅니다. 이를 조합하여 다양한 파일 검색 패턴을 만들 수 있습니다.
  - type: list
    items:
    - '*: 모든 문자 매칭'
    - '?: 단일 문자 매칭'
    - '[]: 문자 범위 매칭'
    - 'glob.glob(): 패턴으로 파일 검색'
  - type: code
    language: python
    title: 모든 텍스트 파일 검색
    description: '*.txt 패턴으로 현재 디렉토리의 모든 텍스트 파일을 찾습니다.'
    content: |-
      patternPy = '*.py'
      resultFiles = glob.glob(patternPy)
      resultFiles
  - type: code
    language: python
    title: 단일 문자 매칭
    description: data?.csv 패턴으로 data 뒤에 한 글자가 있는 CSV 파일을 찾습니다.
    content: |-
      singleCharPattern = 'data?.csv'
      singleCharPattern
  - type: code
    language: python
    title: 숫자 범위 매칭
    description: file[0-9].txt 패턴으로 숫자가 포함된 파일을 찾습니다.
    content: |-
      numberPattern = 'file[0-9].txt'
      numberPattern
  - type: tip
    content: Codaro 로컬 커널에서는 현재 작업 디렉터리와 지정한 로컬 경로를 검색합니다. 패턴에 맞는 파일이 없으면 빈 리스트가 반환됩니다.
- id: recursive_search
  title: 재귀 검색
  structuredPrimary: true
  subtitle: 하위 디렉토리까지 검색
  goal: '재귀 검색: 실행 가능한 Python 흐름으로 익힌다.'
  why: '재귀 검색: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    **/ 패턴과 recursive=True 옵션을 사용하면 현재 디렉토리뿐만 아니라 모든 하위 디렉토리까지 검색할 수 있습니다. 대규모 프로젝트에서 특정 확장자 파일을 모두 찾을 때 유용합니다.

    재귀 검색은 파일이 많을 경우 시간이 걸릴 수 있습니다. 가능하면 검색 범위를 제한하세요.
  tips:
  - 재귀 검색은 파일이 많을 경우 시간이 걸릴 수 있습니다. 가능하면 검색 범위를 제한하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    recursivePattern = '**/*.py'
    allPyFiles = glob.glob(recursivePattern, recursive=True)
    allPyFiles
  exercise:
    prompt: '재귀 검색: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      recursivePattern = '**/*.py'
      allPyFiles = glob.glob(recursivePattern, recursive=True)
      allPyFiles
    solution: |-
      recursivePattern = '**/*.py'
      allPyFiles = glob.glob(recursivePattern, recursive=True)
      allPyFiles
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: '**/ 패턴과 recursive=True 옵션을 사용하면 현재 디렉토리뿐만 아니라 모든 하위 디렉토리까지 검색할 수 있습니다. 대규모 프로젝트에서 특정 확장자 파일을 모두 찾을 때 유용합니다.'
  - type: list
    items:
    - '**/: 모든 하위 디렉토리'
    - 'recursive=True: 재귀 검색 활성화'
    - '**/*.ext: 모든 하위의 특정 확장자'
    - 'path/**/file: 특정 경로 하위 검색'
  - type: code
    language: python
    title: 모든 파이썬 파일 검색
    description: '**/*.py 패턴으로 모든 하위 디렉토리의 파이썬 파일을 찾습니다.'
    content: |-
      recursivePattern = '**/*.py'
      allPyFiles = glob.glob(recursivePattern, recursive=True)
      allPyFiles
  - type: code
    language: python
    title: YAML 파일 재귀 검색
    description: '**/*.yaml 패턴으로 모든 YAML 파일을 검색합니다.'
    content: |-
      yamlPattern = '**/*.yaml'
      yamlFiles = glob.glob(yamlPattern, recursive=True)
      yamlFiles
  - type: code
    language: python
    title: 테스트 파일 검색
    description: '**/test_*.py 패턴으로 모든 테스트 파일을 찾습니다.'
    content: |-
      testPattern = '**/test_*.py'
      testFiles = glob.glob(testPattern, recursive=True)
      testFiles
  - type: tip
    content: 재귀 검색은 파일이 많을 경우 시간이 걸릴 수 있습니다. 가능하면 검색 범위를 제한하세요.
- id: iglob
  title: 이터레이터 버전
  structuredPrimary: true
  subtitle: 메모리 효율적인 검색
  goal: '이터레이터 버전: 실행 가능한 Python 흐름으로 익힌다.'
  why: '이터레이터 버전: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    glob.iglob()는 glob.glob()의 이터레이터 버전입니다. 파일 목록을 한 번에 메모리에 로드하지 않고 순차적으로 처리할 수 있어 메모리 효율적입니다. 대량의 파일을 다룰 때 유용합니다.

    이터레이터는 한 번만 순회할 수 있습니다. 다시 사용하려면 새로 생성해야 합니다.
  tips:
  - 이터레이터는 한 번만 순회할 수 있습니다. 다시 사용하려면 새로 생성해야 합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    logPattern = '*.log'
    logIterator = glob.iglob(logPattern)
    logIterator
  exercise:
    prompt: '이터레이터 버전: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      logPattern = '*.log'
      logIterator = glob.iglob(logPattern)
      logIterator
    solution: |-
      logPattern = '*.log'
      logIterator = glob.iglob(logPattern)
      logIterator
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: glob.iglob()는 glob.glob()의 이터레이터 버전입니다. 파일 목록을 한 번에 메모리에 로드하지 않고 순차적으로 처리할 수 있어 메모리 효율적입니다. 대량의 파일을 다룰 때 유용합니다.
  - type: list
    items:
    - 'iglob(): 이터레이터 반환'
    - 'list(): 이터레이터를 리스트로 변환'
    - '메모리 효율: 대용량 파일 처리'
    - '한 번만 순회: 재사용 불가'
  - type: code
    language: python
    title: 로그 파일 이터레이터
    description: '*.log 패턴으로 iglob 이터레이터를 생성합니다.'
    content: |-
      logPattern = '*.log'
      logIterator = glob.iglob(logPattern)
      logIterator
  - type: code
    language: python
    title: 이터레이터를 리스트로 변환
    description: iglob 이터레이터를 리스트로 변환하여 사용합니다.
    content: |-
      txtPattern = '*.txt'
      txtIterator = glob.iglob(txtPattern)
      txtList = list(txtIterator)
      txtList
  - type: code
    language: python
    title: 재귀 iglob
    description: '**/*.json 패턴으로 재귀 검색 이터레이터를 생성합니다.'
    content: |-
      jsonPattern = '**/*.json'
      jsonIter = glob.iglob(jsonPattern, recursive=True)
      jsonIter
  - type: tip
    content: 이터레이터는 한 번만 순회할 수 있습니다. 다시 사용하려면 새로 생성해야 합니다.
