    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: glob는 파일 패턴 매칭을 위한 파이썬 표준 라이브러리입니다. 와일드카드(*, ?, [])를 사용하여 파일을 검색할 수 있습니다. Unix 스타일의 경로명 패턴 확장을 지원합니다.
  - type: note
    content: 이 섹션을 먼저 실행하면 아래 모든 예제에서 glob 모듈을 사용할 수 있습니다.
