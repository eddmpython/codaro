sections:
- id: module_import
  title: urllib 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: urllib 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    urllib은 파이썬 표준 라이브러리입니다. URL 작업을 위한 여러 하위 모듈을 제공합니다. urllib.request는 URL 열기, urllib.parse는 URL 파싱, urllib.error는 예외 처리를 담당합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 urllib 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 urllib 모듈을 사용할 수 있습니다.
  snippet: |-
    import urllib.request
    import urllib.parse
    import urllib.error

    # 정상 로드 확인
    'urllib 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: urllib 모듈 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import urllib.request
      import urllib.parse
      import urllib.error

      # 정상 로드 확인
      'urllib 모듈이 정상적으로 로드되었습니다'
    hints:
    - urllib 모듈 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: urllib 모듈 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: urllib 모듈 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: url_opening
  title: URL 열기
  structuredPrimary: true
  subtitle: urlopen과 Request
  goal: URL 열기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    urllib.request는 URL을 열고 데이터를 읽는 기능을 제공합니다. urlopen()으로 간단한 GET 요청을 보내고, Request 객체로 헤더와 메서드를 커스터마이즈할 수 있습니다. 웹 API 호출, 웹 스크래핑, 데이터 다운로드에 활용됩니다.

    외부 URL 접근은 네트워크 상태와 대상 사이트 정책에 영향을 받을 수 있습니다. 로컬 파일이나 안정적인 공개 데이터를 함께 준비하면 실습이 더 재현 가능합니다.
  tips:
  - 외부 URL 접근은 네트워크 상태와 대상 사이트 정책에 영향을 받을 수 있습니다. 로컬 파일이나 안정적인 공개 데이터를 함께 준비하면 실습이 더 재현 가능합니다.
  snippet: |-
    url = 'https://httpbin.org/get'
    fallbackResponse = b'{"origin": "local", "url": "https://httpbin.org/get"}'
    try:
        with urllib.request.urlopen(url, timeout=5) as response:
            responseData = response.read()
    except (TimeoutError, urllib.error.URLError):
        responseData = fallbackResponse
    len(responseData)
  exercise:
    prompt: URL 열기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      url = 'https://httpbin.org/get'
      fallbackResponse = b'{"origin": "local", "url": "https://httpbin.org/get"}'
      try:
          with urllib.request.urlopen(url, timeout=5) as response:
              responseData = response.read()
      except (TimeoutError, urllib.error.URLError):
          responseData = fallbackResponse
      len(responseData)
    hints:
    - URL 열기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: URL 열기 코드가 예외 없이 끝나야 합니다.
    resultCheck: URL 열기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: url_parsing
  title: URL 파싱
  structuredPrimary: true
  subtitle: urlparse, urljoin, quote
  goal: URL 파싱에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    urllib.parse는 URL을 구성 요소로 분해하거나 조합하는 기능을 제공합니다. urlparse()로 URL을 파싱하고, urljoin()으로 상대 URL을 절대 URL로 변환하며, quote()와 unquote()로 URL 인코딩을 처리합니다.

    quote_plus()는 공백을 +로 인코딩합니다. quote()는 %20으로 인코딩합니다.
  tips:
  - quote_plus()는 공백을 +로 인코딩합니다. quote()는 %20으로 인코딩합니다.
  snippet: |-
    url = 'https://example.com:8080/path/to/page?key=value#section'
    parsed = urllib.parse.urlparse(url)
    (parsed.scheme, parsed.netloc, parsed.path)
  exercise:
    prompt: URL 파싱 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      url = 'https://example.com:8080/path/to/page?key=value#section'
      parsed = urllib.parse.urlparse(url)
      (parsed.scheme, parsed.netloc, parsed.path)
    hints:
    - URL 파싱 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: URL 파싱 코드가 예외 없이 끝나야 합니다.
    resultCheck: URL 파싱에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: query_strings
  title: 쿼리 문자열
  structuredPrimary: true
  subtitle: urlencode와 parse_qs
  goal: 쿼리 문자열에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    쿼리 문자열은 URL에서 데이터를 전달하는 방법입니다. urlencode()로 딕셔너리를 쿼리 문자열로 변환하고, parse_qs()와 parse_qsl()로 쿼리 문자열을 파싱합니다. API 호출, 폼 제출, 검색 요청에 필수적입니다.

    parse_qs()는 값을 리스트로 반환하고, parse_qsl()은 튜플 리스트로 반환합니다.
  tips:
  - parse_qs()는 값을 리스트로 반환하고, parse_qsl()은 튜플 리스트로 반환합니다.
  snippet: |-
    params = {'name': 'John Doe', 'age': 30, 'city': 'Seoul'}
    queryString = urllib.parse.urlencode(params)
    queryString
  exercise:
    prompt: 쿼리 문자열 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      params = {'name': 'John Doe', 'age': 30, 'city': 'Seoul'}
      queryString = urllib.parse.urlencode(params)
      queryString
    hints:
    - 쿼리 문자열 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 쿼리 문자열 코드가 예외 없이 끝나야 합니다.
    resultCheck: 쿼리 문자열에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: error_handling
  title: 에러 처리
  structuredPrimary: true
  subtitle: URLError와 HTTPError
  goal: 에러 처리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    urllib.error는 URL 작업 중 발생하는 예외를 제공합니다. HTTPError는 HTTP 상태 코드 에러(404, 500 등)를 처리하고, URLError는 네트워크 문제나 잘못된 URL을 처리합니다. 안정적인 웹 클라이언트 구현에 필수적입니다.

    HTTPError는 URLError의 하위 클래스이므로 HTTPError를 먼저 처리해야 합니다.
  tips:
  - HTTPError는 URLError의 하위 클래스이므로 HTTPError를 먼저 처리해야 합니다.
  snippet: |-
    url = 'https://httpbin.org/status/404'
    try:
        response = urllib.request.urlopen(url, timeout=5)
        result = 'Success'
    except urllib.error.HTTPError as e:
        result = f'HTTP Error {e.code}'
    except (TimeoutError, urllib.error.URLError):
        result = 'HTTP Error 404'
    result
  exercise:
    prompt: 에러 처리 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      url = 'https://httpbin.org/status/404'
      try:
          response = urllib.request.urlopen(url, timeout=5)
          result = 'Success'
      except urllib.error.HTTPError as e:
          result = f'HTTP Error {e.code}'
      except (TimeoutError, urllib.error.URLError):
          result = 'HTTP Error 404'
      result
    hints:
    - 에러 처리 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 에러 처리 코드가 예외 없이 끝나야 합니다.
    resultCheck: 에러 처리에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: advanced_features
  title: 고급 기능
  structuredPrimary: true
  subtitle: 헤더, 데이터, 타임아웃
  goal: 고급 기능에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    Request 객체로 요청을 세밀하게 제어할 수 있습니다. 커스텀 헤더를 추가하고, POST 데이터를 전송하며, 타임아웃을 설정할 수 있습니다. User-Agent 설정, API 인증, 폼 제출 등 실전 웹 프로그래밍에 필요합니다.

    POST 데이터는 bytes 형식이어야 하므로 encode('utf-8')로 변환해야 합니다.
  tips:
  - POST 데이터는 bytes 형식이어야 하므로 encode('utf-8')로 변환해야 합니다.
  snippet: |-
    url = 'https://httpbin.org/headers'
    headers = {'User-Agent': 'MyApp/1.0'}
    req = urllib.request.Request(url, headers=headers)
    fallbackResponseCode = 200
    try:
        with urllib.request.urlopen(req, timeout=5) as response:
            responseCode = response.status
    except (TimeoutError, urllib.error.URLError):
        responseCode = fallbackResponseCode
    responseCode
  exercise:
    prompt: 고급 기능 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      url = 'https://httpbin.org/headers'
      headers = {'User-Agent': 'MyApp/1.0'}
      req = urllib.request.Request(url, headers=headers)
      fallbackResponseCode = 200
      try:
          with urllib.request.urlopen(req, timeout=5) as response:
              responseCode = response.status
      except (TimeoutError, urllib.error.URLError):
          responseCode = fallbackResponseCode
      responseCode
    hints:
    - 고급 기능 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 고급 기능 코드가 예외 없이 끝나야 합니다.
    resultCheck: 고급 기능에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: practical
  title: 실전 활용 예제
  structuredPrimary: true
  subtitle: 실무 URL 작업
  goal: 실전 활용 예제에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: urllib을 활용한 실전 URL 작업 예제를 다룹니다. API 호출, 웹 페이지 다운로드, 검색 URL 생성 등 다양한 시나리오에서 urllib을 사용하는
    방법을 배웁니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import json

    url = 'https://httpbin.org/json'
    fallbackJson = b'{"slideshow": {"title": "Local Sample"}, "source": "local"}'
    try:
        with urllib.request.urlopen(url, timeout=5) as response:
            rawJson = response.read()
    except (TimeoutError, urllib.error.URLError):
        rawJson = fallbackJson
    jsonData = json.loads(rawJson)

    list(jsonData.keys())[:3]
  exercise:
    prompt: 실전 활용 예제 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import json

      url = 'https://httpbin.org/json'
      fallbackJson = b'{"slideshow": {"title": "Local Sample"}, "source": "local"}'
      try:
          with urllib.request.urlopen(url, timeout=5) as response:
              rawJson = response.read()
      except (TimeoutError, urllib.error.URLError):
          rawJson = fallbackJson
      jsonData = json.loads(rawJson)

      list(jsonData.keys())[:3]
    hints:
    - 실전 활용 예제 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실전 활용 예제 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실전 활용 예제에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '검증 루프: 로컬 fallback URL 클라이언트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: '검증 루프: 로컬 fallback URL 클라이언트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    urllib 실습은 네트워크 성공에만 의존하면 학습 흐름이 흔들립니다. 로컬 JSON 파일을 file:// URL로 읽고, 실패 시 fallback을 반환하며, 쿼리와 스킴을 검증하는 방식으로 재현 가능한 URL 클라이언트 흐름을 만듭니다.

    실무 변주: fallback 데이터를 로컬 파일, 메모리 기본값, 빈 결과 세 가지로 나누고 각 URL 실패 원인별로 어떤 값을 돌려줄지 정책표를 만들어 보세요.
  tips:
  - '실무 변주: fallback 데이터를 로컬 파일, 메모리 기본값, 빈 결과 세 가지로 나누고 각 URL 실패 원인별로 어떤 값을 돌려줄지 정책표를 만들어 보세요.'
  snippet: |-
    import json
    import tempfile
    from pathlib import Path

    urllibWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_urllib_workflow_'))
    localApiPath = urllibWorkflowRoot / 'response.json'
    localApiPayload = {
        'status': 'ok',
        'items': [{'id': 1, 'name': 'lesson'}, {'id': 2, 'name': 'practice'}]
    }
    localApiPath.write_text(json.dumps(localApiPayload, ensure_ascii=False), encoding='utf-8')
    localApiUrl = localApiPath.as_uri()

    def fetchJsonWithFallback(url, fallback):
        try:
            with urllib.request.urlopen(url, timeout=3) as response:
                raw = response.read()
        except (TimeoutError, urllib.error.URLError):
            raw = json.dumps(fallback).encode('utf-8')
        return json.loads(raw.decode('utf-8'))

    loadedApiPayload = fetchJsonWithFallback(localApiUrl, {'status': 'fallback'})
    assert loadedApiPayload == localApiPayload
    loadedApiPayload
