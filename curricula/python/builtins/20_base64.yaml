  explanation: |-
    urlsafe_b64encode와 urlsafe_b64decode
    URL 안전 Base64는 +와 /를 -와 _로 대체하여 URL에 안전하게 사용할 수 있습니다.

    URL 파라미터
    URL 파라미터나 쿼리 스트링에 인코딩된 데이터를 포함할 때 유용합니다.
  tips:
  - URL 파라미터 URL 파라미터나 쿼리 스트링에 인코딩된 데이터를 포함할 때 유용합니다.
  snippet: |-
    data = "subject=test&value=123"
    dataBytes = data.encode('utf-8')

    standardEncoded = base64.b64encode(dataBytes).decode('utf-8')
    urlsafeEncoded = base64.urlsafe_b64encode(dataBytes).decode('utf-8')

    {
        "standard": standardEncoded,
        "urlsafe": urlsafeEncoded
    }
  exercise:
    prompt: URL 안전 Base64 예제에서 `data`, `dataBytes`, `standardEncoded` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      data = "subject=test&value=123"
      dataBytes = data.encode('utf-8')

      standardEncoded = base64.b64encode(dataBytes).decode('utf-8')
      urlsafeEncoded = base64.urlsafe_b64encode(dataBytes).decode('utf-8')

      {
          "standard": standardEncoded,
          "urlsafe": urlsafeEncoded
      }
    hints:
    - 바꿀 지점은 `data = ...` 오른쪽 값입니다.
    - 실행 뒤 `data` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
