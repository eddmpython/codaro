- title: '검증 루프: 안전한 텍스트 전송 페이로드'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '검증 루프: 안전한 텍스트 전송 페이로드에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    인코딩은 무결성 검증과 함께
    Base64는 암호화가 아니라 전송 형식입니다. 따라서 원본 복원, 유효성 검사, 패딩 복구, 크기 증가를 함께 확인해야 실무에서 안전하게 사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import json

    payload = {
        "lesson": "base64",
        "status": "verified",
        "scores": [95, 88, 91]
    }

    def encodePayload(data):
        raw = json.dumps(data, ensure_ascii=False, sort_keys=True).encode("utf-8")
        encoded = base64.urlsafe_b64encode(raw).decode("ascii").rstrip("=")
        return encoded

    def decodePayload(encoded):
        padding = (-len(encoded)) % 4
        restored = encoded + ("=" * padding)
        raw = base64.urlsafe_b64decode(restored.encode("ascii"))
        return json.loads(raw.decode("utf-8"))

    encodedPayload = encodePayload(payload)
    decodedPayload = decodePayload(encodedPayload)
    assert decodedPayload == payload
    encodedPayload
  exercise:
    prompt: '검증 루프: 안전한 텍스트 전송 페이로드 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      import json

      payload = {
          "lesson": "base64",
          "status": "verified",
          "scores": [95, 88, 91]
      }

      def encodePayload(data):
          raw = json.dumps(data, ensure_ascii=False, sort_keys=True).encode("utf-8")
          encoded = base64.urlsafe_b64encode(raw).decode("ascii").rstrip("=")
          return encoded

      def decodePayload(encoded):
          padding = (-len(encoded)) % 4
          restored = encoded + ("=" * padding)
          raw = base64.urlsafe_b64decode(restored.encode("ascii"))
          return json.loads(raw.decode("utf-8"))

      encodedPayload = encodePayload(payload)
      decodedPayload = decodePayload(encodedPayload)
      assert decodedPayload == payload
      encodedPayload
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: '검증 루프: 안전한 텍스트 전송 페이로드의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '검증 루프: 안전한 텍스트 전송 페이로드 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
  name: workflow_validation
