- title: 표준 Base64 인코딩
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 표준 Base64 인코딩에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    b64encode와 b64decode
    표준 Base64 인코딩은 바이너리 데이터를 64개의 ASCII 문자로 표현합니다.

    바이트 변환
    base64는 bytes 객체를 입력받고 bytes를 반환합니다.
  tips:
  - 바이트 변환 base64는 bytes 객체를 입력받고 bytes를 반환합니다.
  snippet: |-
    message = "Hello World"
    messageBytes = message.encode('utf-8')
    encodedBytes = base64.b64encode(messageBytes)
    encodedStr = encodedBytes.decode('utf-8')
    encodedStr
  exercise:
    prompt: 표준 Base64 인코딩 예제에서 `message`, `messageBytes`, `encodedBytes` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      message = "Hello World"
      messageBytes = message.encode('utf-8')
      encodedBytes = base64.b64encode(messageBytes)
      encodedStr = encodedBytes.decode('utf-8')
      encodedStr
    hints:
    - 바꿀 지점은 `message = ...` 오른쪽 값입니다.
    - 실행 뒤 `message` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 표준 Base64 인코딩에서 `message` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 표준 Base64 인코딩 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
