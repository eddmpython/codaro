      len(defaultBytes)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: multiple_objects
  title: 다중 객체 처리
  structuredPrimary: true
  subtitle: 여러 객체 저장과 복원
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    하나의 파일에 여러 객체를 순차적으로 저장하고 복원할 수 있습니다. dump()를 여러 번 호출하여 저장하고, load()를 반복하여 순서대로 불러옵니다. 관련된 여러 데이터를 한 파일에 묶어 관리할 때 유용합니다.

    관련된 여러 객체는 리스트나 딕셔너리로 묶어서 한 번에 저장하는 것이 더 편리합니다.
  tips:
  - 관련된 여러 객체는 리스트나 딕셔너리로 묶어서 한 번에 저장하는 것이 더 편리합니다.
  snippet: |-
    obj1 = {'type': 'config', 'value': 100}
    obj2 = ['item1', 'item2', 'item3']
    obj3 = (1, 2, 3)
    with open(pickleScratch / 'multi.pkl', 'wb') as f:
        pickle.dump(obj1, f)
        pickle.dump(obj2, f)
        pickle.dump(obj3, f)
    'multi.pkl 저장 완료'
