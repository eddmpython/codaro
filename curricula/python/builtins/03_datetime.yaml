    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: '검증 루프: 일정 데이터 품질 코드가 예외 없이 끝나야 합니다.'
    resultCheck: '검증 루프: 일정 데이터 품질에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.'
