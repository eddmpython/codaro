      date2 = date(2024, 12, 31)
      isEarlier = date1 < date2
      isEarlier
    hints:
    - 날짜 비교 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 날짜 비교 코드가 예외 없이 끝나야 합니다.
    resultCheck: 날짜 비교에서 바꾼 입력값이 결과에 반영되어야 합니다.
