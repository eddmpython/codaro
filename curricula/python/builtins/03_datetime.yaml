  explanation: |-
    실무에서 자주 사용하는 날짜 처리 패턴을 살펴봅니다. D-day 계산, 나이 계산, 영업일 계산, 월말/월초 처리 등 실생활 문제를 datetime으로 해결할 수 있습니다.

    calendar 모듈과 함께 사용하면 월말일, 윤년 등을 쉽게 처리할 수 있습니다.
  tips:
