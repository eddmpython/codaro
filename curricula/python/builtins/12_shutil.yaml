sections:
- id: module_import
  title: shutil 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: shutil 모듈 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: shutil은 파일과 디렉토리를 고수준으로 다루는 모듈입니다. 복사, 이동, 삭제, 압축 등의 작업을 간단하게 수행할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import shutil
  exercise:
    prompt: shutil 모듈 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: import shutil
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: shutil 모듈 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: shutil 모듈 불러오기 다음 셀에서 import한 이름을 사용할 수 있어야 합니다.
- id: file_operations
  title: 파일 복사/이동
  structuredPrimary: true
  subtitle: 파일 단위 작업
  goal: 파일 복사/이동에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: copy는 파일을 복사하고, copy2는 메타데이터도 복사합니다. move는 파일을 이동하거나 이름을 변경합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import shutil
    import tempfile
    import os

    tempDir = tempfile.mkdtemp()
    sourceFile = os.path.join(tempDir, "source.txt")
    with open(sourceFile, "w") as f:
        f.write("Original content")

    destFile = os.path.join(tempDir, "dest.txt")
    shutil.copy(sourceFile, destFile)
    os.path.exists(destFile)
  exercise:
    prompt: 파일 복사/이동 예제에서 `tempDir`, `sourceFile`, `destFile` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceFile = os.path.join(tempDir, "source.txt")
      with open(sourceFile, "w") as f:
          f.write("Original content")

      destFile = os.path.join(tempDir, "dest.txt")
      shutil.copy(sourceFile, destFile)
      os.path.exists(destFile)
    hints:
    - 바꿀 지점은 `tempDir = ...` 오른쪽 값입니다.
    - 실행 뒤 `tempDir` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 파일 복사/이동에서 `tempDir` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 파일 복사/이동 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: directory_operations
  title: 디렉토리 작업
  structuredPrimary: true
  subtitle: 디렉토리 단위 작업
  goal: 디렉토리 작업에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: copytree는 디렉토리를 재귀적으로 복사합니다. rmtree는 디렉토리와 내용을 모두 삭제합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import shutil
    import tempfile
    import os

    tempDir = tempfile.mkdtemp()
    srcDir = os.path.join(tempDir, "source")
    os.makedirs(srcDir)
    with open(os.path.join(srcDir, "file.txt"), "w") as f:
        f.write("Data")

    dstDir = os.path.join(tempDir, "destination")
    shutil.copytree(srcDir, dstDir)
    os.path.exists(dstDir)
  exercise:
    prompt: 디렉토리 작업 예제에서 `tempDir`, `srcDir`, `dstDir` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
