    - 실행 뒤 `usageInfo` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 디스크 사용량에서 `usageInfo` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
