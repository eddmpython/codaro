    language: python
    title: 삭제 대신 _backup 이동
    description: 정리 대상 폴더를 삭제하지 않고 _backup 아래로 이동합니다.
    content: |-
      cleanupTarget = os.path.join(backupRoot, 'old_output')
      os.makedirs(cleanupTarget, exist_ok=True)
      with open(os.path.join(cleanupTarget, 'result.txt'), 'w', encoding='utf-8') as file:
          file.write('old result')

      backupShelf = os.path.join(backupRoot, '_backup')
      os.makedirs(backupShelf, exist_ok=True)
      archivedTarget = os.path.join(backupShelf, 'old_output')

      if os.path.exists(archivedTarget):
          raise FileExistsError(f"이미 백업 대상이 있습니다: {archivedTarget}")

      shutil.move(cleanupTarget, archivedTarget)

      assert not os.path.exists(cleanupTarget)
      assert os.path.exists(os.path.join(archivedTarget, 'result.txt'))
      assert os.path.commonpath([backupShelf, archivedTarget]) == backupShelf

      archivedTarget
