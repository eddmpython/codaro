    language: python
    title: 백업 이름 오류 확인
    description: 경로 구분자가 들어간 백업 이름은 작업공간 밖 이동 위험이 있어 차단합니다.
    content: |-
      def validateBackupName(name):
          if os.path.basename(name) != name:
              raise ValueError("backup name must not contain path separators")
          return name

      try:
          validateBackupName("../old_output")
      except ValueError as exc:
          backupNameMessage = str(exc)

      assert backupNameMessage == "backup name must not contain path separators"
      assert validateBackupName("old_output") == "old_output"
