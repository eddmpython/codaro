- id: archive_operations
  title: 압축 파일
  structuredPrimary: true
  subtitle: 압축 생성 및 해제
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: make_archive는 압축 파일을 생성합니다. unpack_archive는 압축 파일을 해제합니다. Codaro 로컬 커널에서는 임시 디렉터리에서 안전하게 생성과 해제를 실습할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import shutil
    import tempfile
    import os

    tempDir = tempfile.mkdtemp()
    sourceDir = os.path.join(tempDir, "data")
    os.makedirs(sourceDir)
    with open(os.path.join(sourceDir, "file.txt"), "w") as f:
        f.write("Archive me")

    archivePath = os.path.join(tempDir, "archive")
    result = shutil.make_archive(archivePath, 'zip', sourceDir)
    os.path.exists(result)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceDir = os.path.join(tempDir, "data")
      os.makedirs(sourceDir)
      with open(os.path.join(sourceDir, "file.txt"), "w") as f:
          f.write("Archive me")

      archivePath = os.path.join(tempDir, "archive")
      result = shutil.make_archive(archivePath, 'zip', sourceDir)
      os.path.exists(result)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
