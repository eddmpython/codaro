- id: workflow_validation
  title: '검증 루프: 안전한 백업 파이프라인'
  structuredPrimary: true
  subtitle: 복사, 압축, 검증, _backup 이동
  goal: '검증 루프: 안전한 백업 파이프라인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    shutil은 실제 파일을 복사·이동·삭제할 수 있으므로 실무에서는 작업공간을 먼저 격리하고, 복사 전후 파일 수와 압축 결과를 검증해야 합니다. 삭제 대신 _backup 이동 패턴을 사용하면 되돌릴 여지도 남길 수 있습니다.

    변주 실험
    압축 파일 이름에 날짜를 붙이고, 같은 이름이 이미 있으면 덮어쓰기 대신 새 버전을 만들도록 백업 정책을 확장하세요.
  tips:
  - 변주 실험 압축 파일 이름에 날짜를 붙이고, 같은 이름이 이미 있으면 덮어쓰기 대신 새 버전을 만들도록 백업 정책을 확장하세요.
  snippet: |-
    import os
    import shutil
    import tempfile

    backupRoot = tempfile.mkdtemp(prefix='codaro_shutil_workflow_')
    projectDir = os.path.join(backupRoot, 'project')
    os.makedirs(os.path.join(projectDir, 'src'), exist_ok=True)
    os.makedirs(os.path.join(projectDir, 'data'), exist_ok=True)

    projectFiles = {
        os.path.join(projectDir, 'src', 'main.py'): "print('hello')\n",
        os.path.join(projectDir, 'src', 'utils.py'): "VALUE = 42\n",
        os.path.join(projectDir, 'data', 'sample.csv'): "id,value\n1,10\n",
    }

    for path, content in projectFiles.items():
        with open(path, 'w', encoding='utf-8') as file:
            file.write(content)

    def countFiles(folder):
        total = 0
        for root, dirs, files in os.walk(folder):
            total += len(files)
        return total

    sourceFileCount = countFiles(projectDir)

    assert sourceFileCount == 3
    assert os.path.exists(os.path.join(projectDir, 'src', 'main.py'))

    sourceFileCount
  exercise:
    prompt: '검증 루프: 안전한 백업 파이프라인 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      import os
      import shutil
      import tempfile

      backupRoot = tempfile.mkdtemp(prefix='codaro_shutil_workflow_')
      projectDir = os.path.join(backupRoot, 'project')
      os.makedirs(os.path.join(projectDir, 'src'), exist_ok=True)
      os.makedirs(os.path.join(projectDir, 'data'), exist_ok=True)

      projectFiles = {
          os.path.join(projectDir, 'src', 'main.py'): "print('hello')\n",
          os.path.join(projectDir, 'src', 'utils.py'): "VALUE = 42\n",
          os.path.join(projectDir, 'data', 'sample.csv'): "id,value\n1,10\n",
      }

      for path, content in projectFiles.items():
          with open(path, 'w', encoding='utf-8') as file:
              file.write(content)

      def countFiles(folder):
          total = 0
          for root, dirs, files in os.walk(folder):
              total += len(files)
          return total

      sourceFileCount = countFiles(projectDir)

      assert sourceFileCount == 3
      assert os.path.exists(os.path.join(projectDir, 'src', 'main.py'))

      sourceFileCount
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
