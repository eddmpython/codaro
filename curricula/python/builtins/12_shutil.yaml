          f.write("Archive me")

      archivePath = os.path.join(tempDir, "archive")
      result = shutil.make_archive(archivePath, 'zip', sourceDir)
      os.path.exists(result)
    hints:
    - 바꿀 지점은 `tempDir = ...` 오른쪽 값입니다.
    - 실행 뒤 `tempDir` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 압축 파일에서 `tempDir` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 압축 파일 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: disk_usage
  title: 디스크 사용량
  structuredPrimary: true
  subtitle: 디스크 정보 확인
  goal: 디스크 사용량에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: disk_usage는 디스크 사용량 정보를 반환합니다. total, used, free 값을 튜플로 제공하며, Codaro 로컬 커널에서는 지정한 로컬 경로가
    위치한 디스크 기준으로 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
