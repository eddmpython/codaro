    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: make_archive는 압축 파일을 생성합니다. unpack_archive는 압축 파일을 해제합니다. Codaro 로컬 커널에서는 임시 디렉터리에서 안전하게 생성과 해제를 실습할 수 있습니다.
  - type: code
    language: python
    title: 압축 파일 생성
    description: 디렉토리를 zip으로 압축합니다.
    content: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceDir = os.path.join(tempDir, "data")
      os.makedirs(sourceDir)
      with open(os.path.join(sourceDir, "file.txt"), "w") as f:
          f.write("Archive me")

      archivePath = os.path.join(tempDir, "archive")
      result = shutil.make_archive(archivePath, 'zip', sourceDir)
      os.path.exists(result)
  - type: code
    language: python
    title: 압축 파일명 확인
    description: 생성된 압축 파일명을 확인합니다.
    content: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      dataDir = os.path.join(tempDir, "mydata")
      os.makedirs(dataDir)
      with open(os.path.join(dataDir, "info.txt"), "w") as f:
          f.write("Info")

      archiveName = os.path.join(tempDir, "myarchive")
      shutil.make_archive(archiveName, 'zip', dataDir)
      os.path.basename(archiveName + '.zip')
  - type: code
    language: python
    title: 압축 해제
    description: zip 파일을 해제합니다.
    content: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      contentDir = os.path.join(tempDir, "content")
      os.makedirs(contentDir)
      with open(os.path.join(contentDir, "doc.txt"), "w") as f:
          f.write("Document")

      zipPath = os.path.join(tempDir, "backup")
      shutil.make_archive(zipPath, 'zip', contentDir)
      extractDir = os.path.join(tempDir, "extracted")
      shutil.unpack_archive(zipPath + '.zip', extractDir)
      os.path.exists(extractDir)
  - type: code
    language: python
    title: 압축 해제 후 파일 확인
    description: 압축 해제 후 내부 파일을 확인합니다.
    content: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      filesDir = os.path.join(tempDir, "files")
      os.makedirs(filesDir)
      with open(os.path.join(filesDir, "test.txt"), "w") as f:
