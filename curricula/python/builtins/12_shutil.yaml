      srcDir = os.path.join(tempDir, "source")
      os.makedirs(srcDir)
      with open(os.path.join(srcDir, "file.txt"), "w") as f:
          f.write("Data")

      dstDir = os.path.join(tempDir, "destination")
      shutil.copytree(srcDir, dstDir)
      os.path.exists(dstDir)
    hints:
    - 바꿀 지점은 `tempDir = ...` 오른쪽 값입니다.
    - 실행 뒤 `tempDir` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 디렉토리 작업에서 `tempDir` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 디렉토리 작업 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: archive_operations
  title: 압축 파일
  structuredPrimary: true
  subtitle: 압축 생성 및 해제
  goal: 압축 파일에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: make_archive는 압축 파일을 생성합니다. unpack_archive는 압축 파일을 해제합니다. Codaro 로컬 커널에서는 임시 디렉터리에서 안전하게
    생성과 해제를 실습할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import shutil
    import tempfile
    import os

    tempDir = tempfile.mkdtemp()
    sourceDir = os.path.join(tempDir, "data")
    os.makedirs(sourceDir)
    with open(os.path.join(sourceDir, "file.txt"), "w") as f:
        f.write("Archive me")

    archivePath = os.path.join(tempDir, "archive")
    result = shutil.make_archive(archivePath, 'zip', sourceDir)
    os.path.exists(result)
  exercise:
