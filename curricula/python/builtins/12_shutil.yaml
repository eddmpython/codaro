  structuredPrimary: true
  subtitle: 파일 연산 마스터하기
  goal: 'shutil 모듈 종합 복습: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'shutil 모듈 종합 복습: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 지금까지 배운 shutil 모듈의 모든 기능을 복습합니다. 🟢 기초 5개, 🟡 중급 5개, 🔴 고급 10개 문제를 풀어보세요.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    import shutil
    import tempfile
    import os

    tempDir = tempfile.mkdtemp()
    sourceFile = os.path.join(tempDir, "source.txt")
    with open(sourceFile, "w") as f:
        f.write("data")

    backupFile = os.path.join(tempDir, "backup.txt")
    shutil.copy(sourceFile, backupFile)
    os.path.exists(backupFile)
  exercise:
    prompt: 'shutil 모듈 종합 복습: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceFile = os.path.join(tempDir, "source.txt")
      with open(sourceFile, "w") as f:
          f.write("data")

      backupFile = os.path.join(tempDir, "backup.txt")
      shutil.copy(sourceFile, backupFile)
      os.path.exists(backupFile)
    solution: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceFile = os.path.join(tempDir, "source.txt")
      with open(sourceFile, "w") as f:
          f.write("data")

      backupFile = os.path.join(tempDir, "backup.txt")
      shutil.copy(sourceFile, backupFile)
      os.path.exists(backupFile)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 지금까지 배운 shutil 모듈의 모든 기능을 복습합니다. 🟢 기초 5개, 🟡 중급 5개, 🔴 고급 10개 문제를 풀어보세요.
  - type: expansion
    title: '🟢 기초1: 파일 복사'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      sourceFile = os.path.join(tempDir, "source.txt")
      with open(sourceFile, "w") as f:
          f.write("data")

      backupFile = os.path.join(tempDir, "backup.txt")
      shutil.copy(sourceFile, backupFile)
      os.path.exists(backupFile)
  - type: expansion
    title: '🟢 기초2: 파일 이동'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      oldFile = os.path.join(tempDir, "old.txt")
      with open(oldFile, "w") as f:
          f.write("content")

      newFile = os.path.join(tempDir, "new.txt")
      shutil.move(oldFile, newFile)
      os.path.exists(newFile)
  - type: expansion
    title: '🟢 기초3: 디렉토리 삭제'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      removeDir = os.path.join(tempDir, "temp")
      os.makedirs(removeDir)
      shutil.rmtree(removeDir)
      os.path.exists(removeDir)
  - type: expansion
    title: '🟢 기초4: 디스크 사용량 확인'
    code: |-
      import shutil
      usage = shutil.disk_usage("/")
      usage.total > 0
  - type: expansion
    title: '🟢 기초5: 압축 형식 개수'
    code: |-
      import shutil
      formats = shutil.get_archive_formats()
      len(formats) >= 5
  - type: expansion
    title: '🟡 중급1: 디렉토리 복사'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      srcDir = os.path.join(tempDir, "src")
      os.makedirs(srcDir)
      with open(os.path.join(srcDir, "file.txt"), "w") as f:
          f.write("data")

      dstDir = os.path.join(tempDir, "dst")
      shutil.copytree(srcDir, dstDir)
      os.path.exists(os.path.join(dstDir, "file.txt"))
  - type: expansion
    title: '🟡 중급2: 메타데이터 복사'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      origFile = os.path.join(tempDir, "original.txt")
      with open(origFile, "w") as f:
          f.write("metadata")

      copiedFile = os.path.join(tempDir, "copied.txt")
      shutil.copy2(origFile, copiedFile)
      os.path.exists(copiedFile)
  - type: expansion
    title: '🟡 중급3: 디렉토리 압축'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      dataDir = os.path.join(tempDir, "data")
      os.makedirs(dataDir)
      with open(os.path.join(dataDir, "info.txt"), "w") as f:
          f.write("info")

      archiveName = os.path.join(tempDir, "archive")
      result = shutil.make_archive(archiveName, 'zip', dataDir)
      os.path.exists(result)
  - type: expansion
    title: '🟡 중급4: 여유 공간 확인'
    code: |-
      import shutil
      diskInfo = shutil.disk_usage(".")
      diskInfo.free >= 0
  - type: expansion
    title: '🟡 중급5: 복사 후 원본 유지'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      originalPath = os.path.join(tempDir, "original.txt")
      with open(originalPath, "w") as f:
          f.write("keep")

      copyPath = os.path.join(tempDir, "copy.txt")
      shutil.copy(originalPath, copyPath)
      os.path.exists(originalPath)
  - type: expansion
    title: '🔴 고급1: 백업 시스템'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      projectDir = os.path.join(tempDir, "project")
      os.makedirs(projectDir)
      with open(os.path.join(projectDir, "main.py"), "w") as f:
          f.write("print('hello')")
      with open(os.path.join(projectDir, "config.json"), "w") as f:
          f.write("{}")

      backupBase = os.path.join(tempDir, "backup")
      shutil.copytree(projectDir, backupBase + "_copy")
      result = shutil.make_archive(backupBase, 'zip', backupBase + "_copy")
      os.path.exists(result)
  - type: expansion
    title: '🔴 고급2: 로그 정리 압축'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      logsDir = os.path.join(tempDir, "logs")
      os.makedirs(logsDir)
      logFiles = []
      for i in range(5):
          logPath = os.path.join(logsDir, f"app{i}.log")
          with open(logPath, "w") as f:
              f.write(f"log entry {i}")
          logFiles.append(logPath)

      archiveDest = os.path.join(tempDir, "logs_archive")
      shutil.make_archive(archiveDest, 'zip', logsDir)
      shutil.rmtree(logsDir)
      os.path.exists(archiveDest + '.zip') and not os.path.exists(logsDir)
  - type: expansion
    title: '🔴 고급3: 압축 해제 검증'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      contentDir = os.path.join(tempDir, "content")
      os.makedirs(contentDir)
      targetFile = os.path.join(contentDir, "target.txt")
      with open(targetFile, "w") as f:
          f.write("important data")

      zipPath = os.path.join(tempDir, "package")
      shutil.make_archive(zipPath, 'zip', contentDir)

      extractDir = os.path.join(tempDir, "extracted")
      shutil.unpack_archive(zipPath + '.zip', extractDir)
      os.path.exists(os.path.join(extractDir, "target.txt"))
  - type: expansion
    title: '🔴 고급4: 디렉토리 이동 검증'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      oldLocation = os.path.join(tempDir, "old")
      os.makedirs(oldLocation)
      for i in range(3):
          with open(os.path.join(oldLocation, f"file{i}.txt"), "w") as f:
              f.write(str(i))

      newLocation = os.path.join(tempDir, "new")
      shutil.move(oldLocation, newLocation)
      len(os.listdir(newLocation))
  - type: expansion
    title: '🔴 고급5: 중첩 구조 복사'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      deepDir = os.path.join(tempDir, "level1", "level2", "level3")
      os.makedirs(deepDir)
      deepFile = os.path.join(deepDir, "deep.txt")
      with open(deepFile, "w") as f:
          f.write("deep content")

      copyRoot = os.path.join(tempDir, "copied")
      shutil.copytree(os.path.join(tempDir, "level1"), copyRoot)
      os.path.exists(os.path.join(copyRoot, "level2", "level3", "deep.txt"))
  - type: expansion
    title: '🔴 고급6: 캐시 정리 패턴'
    code: |-
      import shutil
      import tempfile
      import os

      baseDir = tempfile.mkdtemp()
      cacheDir = os.path.join(baseDir, "cache")
      os.makedirs(cacheDir)
      for i in range(10):
          with open(os.path.join(cacheDir, f"cache{i}.tmp"), "w") as f:
              f.write("temp data")
      fileCount = len(os.listdir(cacheDir))
      shutil.rmtree(cacheDir)
      fileCount == 10 and not os.path.exists(cacheDir)
  - type: expansion
    title: '🔴 고급7: 배포 패키징'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      buildDir = os.path.join(tempDir, "build")
      os.makedirs(buildDir)
      with open(os.path.join(buildDir, "app.exe"), "w") as f:
          f.write("binary")
      with open(os.path.join(buildDir, "readme.txt"), "w") as f:
          f.write("instructions")

      releaseDir = os.path.join(tempDir, "release")
      finalArchive = os.path.join(tempDir, "release_v1")
      shutil.copytree(buildDir, releaseDir)
      result = shutil.make_archive(finalArchive, 'zip', releaseDir)
      os.path.exists(result) and os.path.exists(releaseDir)
  - type: expansion
    title: '🔴 고급8: 디스크 사용률 계산'
    code: |-
      import shutil
      diskStats = shutil.disk_usage("/")
      usagePercent = (diskStats.used / diskStats.total) * 100
      0 <= usagePercent <= 100
  - type: expansion
    title: '🔴 고급9: 복사 후 삭제'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      srcFile = os.path.join(tempDir, "source.dat")
      with open(srcFile, "w") as f:
          f.write("data to move")

      dstFile = os.path.join(tempDir, "destination.dat")
      shutil.copy(srcFile, dstFile)
      os.remove(srcFile)
      os.path.exists(dstFile) and not os.path.exists(srcFile)
  - type: expansion
    title: '🔴 고급10: 다중 백업 버전'
    code: |-
      import shutil
      import tempfile
      import os

      tempDir = tempfile.mkdtemp()
      dataDir = os.path.join(tempDir, "data")
      os.makedirs(dataDir)
      with open(os.path.join(dataDir, "important.txt"), "w") as f:
          f.write("critical data")

      backupNames = []
      for version in range(3):
          backupPath = os.path.join(tempDir, f"backup_v{version}")
          backupNames.append(backupPath + '.zip')
      for version in range(3):
          archivePath = os.path.join(tempDir, f"backup_v{version}")
          shutil.make_archive(archivePath, 'zip', dataDir)
      all(os.path.exists(name) for name in backupNames)
