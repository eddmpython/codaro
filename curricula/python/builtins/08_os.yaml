  - type: code
    language: python
    title: 안전한 경로 결합
    description: 사용자 입력 경로가 기준 폴더 밖으로 나가지 못하게 검증합니다.
    content: |-
      def safeJoin(baseDir, userPath):
          basePath = os.path.abspath(baseDir)
          targetPath = os.path.abspath(os.path.join(basePath, userPath))
          if os.path.commonpath([basePath, targetPath]) != basePath:
              raise ValueError(f"허용된 작업공간 밖입니다: {userPath}")
          return targetPath

      safeReportPath = safeJoin(inputDir, 'reports/result.txt')

      try:
          safeJoin(inputDir, '../../secrets.txt')
      except ValueError as exc:
          pathProblem = str(exc)

      assert safeReportPath.endswith(os.path.join('reports', 'result.txt'))
      assert '허용된 작업공간 밖입니다' in pathProblem

      safeReportPath, pathProblem
  - type: code
    language: python
    title: 환경 변수 기본값 검증
    description: 환경 변수가 없을 때 안전한 기본값을 사용하는지 확인합니다.
    content: |-
      previousMode = os.environ.get('CODARO_ENV')
      if 'CODARO_ENV' in os.environ:
          del os.environ['CODARO_ENV']

      modeWithDefault = os.getenv('CODARO_ENV', 'local')
      os.environ['CODARO_ENV'] = 'test'
      modeFromEnv = os.getenv('CODARO_ENV', 'local')

      if previousMode is not None:
          os.environ['CODARO_ENV'] = previousMode
      else:
          del os.environ['CODARO_ENV']

      assert modeWithDefault == 'local'
      assert modeFromEnv == 'test'

      modeWithDefault, modeFromEnv
  - type: code
    language: python
    title: 일괄 이름 변경 계획
    description: rename 실행 전에 변경 계획을 만들고 충돌 여부를 검증합니다.
    content: |-
      renameDir = os.path.join(workspaceDir, 'rename')
      os.makedirs(renameDir, exist_ok=True)
      for filename in ['raw_01.tmp', 'raw_02.tmp', 'keep.txt']:
          with open(os.path.join(renameDir, filename), 'w', encoding='utf-8') as file:
              file.write(filename)

      renamePlan = []
      for filename in os.listdir(renameDir):
          if filename.endswith('.tmp'):
              source = os.path.join(renameDir, filename)
              target = os.path.join(renameDir, filename.replace('.tmp', '.bak'))
              renamePlan.append((source, target))

      assert len(renamePlan) == 2
      assert all(os.path.commonpath([renameDir, source]) == renameDir for source, target in renamePlan)
      assert all(not os.path.exists(target) for source, target in renamePlan)

      for source, target in renamePlan:
          os.rename(source, target)

      renamedFiles = sorted(name for name in os.listdir(renameDir) if name.endswith('.bak'))
      assert renamedFiles == ['raw_01.bak', 'raw_02.bak']

      renamedFiles
  - type: tip
    title: 변주 실험
    content: 이름 변경을 실제 실행하지 않고 dry-run 목록만 출력하는 모드를 추가하고, 충돌 파일이 있을 때 실행을 중단하는 검증을 붙이세요.
