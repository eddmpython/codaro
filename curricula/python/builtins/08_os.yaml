- id: module_import
  title: os 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: 'os 모듈 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'os 모듈 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    os는 파이썬 표준 라이브러리입니다. 운영체제 인터페이스를 제공하는 모듈입니다. 파일 시스템 조작, 경로 처리, 환경 변수 관리 등 다양한 기능을 제공합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 os 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 os 모듈을 사용할 수 있습니다.
  - Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import os
    import tempfile

    # 정상 로드 확인
    os.name
  exercise:
    prompt: 'os 모듈 불러오기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import os
      import tempfile

      # 정상 로드 확인
      os.name
    solution: |-
      import os
      import tempfile

      # 정상 로드 확인
      os.name
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: os는 파이썬 표준 라이브러리입니다. 운영체제 인터페이스를 제공하는 모듈입니다. 파일 시스템 조작, 경로 처리, 환경 변수 관리 등 다양한 기능을 제공합니다. 별도 설치 없이 import만으로 사용할
      수 있습니다.
  - type: note
    content: 이 섹션을 먼저 실행하면 아래 모든 예제에서 os 모듈을 사용할 수 있습니다.
  - type: code
    language: python
    title: os 모듈 불러오기
    description: os 모듈을 불러오고 정상 작동을 확인합니다.
    content: |-
      import os
      import tempfile

      # 정상 로드 확인
      os.name
  - type: tip
    content: Codaro에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다.
- id: path_manipulation
  title: 경로 조작
  structuredPrimary: true
  subtitle: join, dirname, basename, split
  goal: '경로 조작: 실행 가능한 Python 흐름으로 익힌다.'
  why: '경로 조작: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    os.path는 경로 문자열을 조작하는 함수들을 제공합니다. join()으로 경로를 결합하고, dirname()과 basename()으로 경로를 분해합니다. 플랫폼에 관계없이 올바른 경로 구분자를 사용하므로 크로스 플랫폼 코드 작성에 필수적입니다.

    os.path.join()은 운영체제에 맞는 경로 구분자(Windows: \, Unix: /)를 자동으로 사용합니다.
  tips:
  - 'os.path.join()은 운영체제에 맞는 경로 구분자(Windows: \, Unix: /)를 자동으로 사용합니다.'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    folderPath = os.path.join('home', 'user', 'documents')
    folderPath
  exercise:
    prompt: '경로 조작: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      folderPath = os.path.join('home', 'user', 'documents')
      folderPath
    solution: |-
      folderPath = os.path.join('home', 'user', 'documents')
      folderPath
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: os.path는 경로 문자열을 조작하는 함수들을 제공합니다. join()으로 경로를 결합하고, dirname()과 basename()으로 경로를 분해합니다. 플랫폼에 관계없이 올바른 경로 구분자를
      사용하므로 크로스 플랫폼 코드 작성에 필수적입니다.
  - type: list
    items:
    - 'join(): 경로 결합'
    - 'dirname(): 디렉토리 부분'
    - 'basename(): 파일명 부분'
    - 'split(): 경로 분리'
    - 'splitext(): 확장자 분리'
  - type: code
    language: python
    title: 경로 결합
    description: 여러 경로 요소를 결합합니다.
    content: |-
      folderPath = os.path.join('home', 'user', 'documents')
      folderPath
  - type: code
    language: python
    title: 디렉토리와 파일명 분리
    description: 경로에서 디렉토리와 파일명을 추출합니다.
    content: |-
      fullPath = '/home/user/file.txt'
      directory = os.path.dirname(fullPath)
      filename = os.path.basename(fullPath)
      (directory, filename)
  - type: code
    language: python
    title: 경로 분리
    description: 경로를 디렉토리와 파일명으로 분리합니다.
    content: |-
      targetPath = '/var/log/app.log'
      pathParts = os.path.split(targetPath)
      pathParts
  - type: code
    language: python
    title: 확장자 분리
    description: 파일명에서 확장자를 분리합니다.
    content: |-
      documentFile = 'report.pdf'
      nameWithoutExt, extension = os.path.splitext(documentFile)
      (nameWithoutExt, extension)
  - type: tip
    content: 'os.path.join()은 운영체제에 맞는 경로 구분자(Windows: \, Unix: /)를 자동으로 사용합니다.'
- id: path_checking
  title: 경로 확인
  structuredPrimary: true
  subtitle: exists, isdir, isfile, isabs
  goal: '경로 확인: 실행 가능한 Python 흐름으로 익힌다.'
  why: '경로 확인: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    경로의 존재 여부와 타입을 확인하는 함수들입니다. exists()로 존재 확인, isdir()과 isfile()로 타입 확인, isabs()로 절대경로 여부를 판단합니다. 파일 작업 전 반드시 확인하여 에러를 방지합니다.

    Codaro 로컬 커널에서는 현재 작업 디렉터리와 권한이 허용된 로컬 경로를 다룰 수 있습니다. 예제는 안전한 임시 경로 중심으로 진행합니다.
  tips:
  - Codaro 로컬 커널에서는 현재 작업 디렉터리와 권한이 허용된 로컬 경로를 다룰 수 있습니다. 예제는 안전한 임시 경로 중심으로 진행합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    rootExists = os.path.exists('/')
    rootExists
  exercise:
    prompt: '경로 확인: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      rootExists = os.path.exists('/')
      rootExists
    solution: |-
      rootExists = os.path.exists('/')
      rootExists
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 경로의 존재 여부와 타입을 확인하는 함수들입니다. exists()로 존재 확인, isdir()과 isfile()로 타입 확인, isabs()로 절대경로 여부를 판단합니다. 파일 작업 전 반드시 확인하여
      에러를 방지합니다.
  - type: list
    items:
    - 'exists(): 존재 확인'
    - 'isdir(): 디렉토리 여부'
    - 'isfile(): 파일 여부'
    - 'isabs(): 절대경로 여부'
    - 'abspath(): 절대경로 변환'
  - type: code
    language: python
    title: 경로 존재 확인
    description: 경로가 존재하는지 확인합니다.
    content: |-
      rootExists = os.path.exists('/')
      rootExists
  - type: code
    language: python
    title: 디렉토리 여부 확인
    description: 경로가 디렉토리인지 확인합니다.
    content: |-
      isRootDir = os.path.isdir('/')
      isRootDir
  - type: code
    language: python
    title: 파일 여부 확인
    description: 경로가 파일인지 확인합니다.
    content: |-
      checkFile = os.path.isfile('/etc/hosts')
      checkFile
  - type: code
    language: python
    title: 절대경로 여부
    description: 경로가 절대경로인지 확인합니다.
    content: |-
      relativePath = 'docs/file.txt'
      absolutePath = '/home/user/file.txt'
      isRelative = os.path.isabs(relativePath)
      isAbsolute = os.path.isabs(absolutePath)
      (isRelative, isAbsolute)
  - type: code
    language: python
    title: 절대경로 변환
    description: 상대경로를 절대경로로 변환합니다.
    content: |-
      relPath = 'test.txt'
      absPath = os.path.abspath(relPath)
      absPath
  - type: tip
    content: Codaro 로컬 커널에서는 현재 작업 디렉터리와 권한이 허용된 로컬 경로를 다룰 수 있습니다. 예제는 안전한 임시 경로 중심으로 진행합니다.
