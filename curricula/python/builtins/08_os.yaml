      currentDir = os.getcwd()
      currentDir
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 디렉토리를 탐색하고 조작하는 함수들입니다. listdir()로 내용을 확인하고, getcwd()로 현재 디렉토리를 얻으며, mkdir()과 rmdir()로 디렉토리를 생성하고 삭제합니다. 파일 관리
      스크립트의 핵심 기능입니다.
  - type: list
    items:
    - 'listdir(): 디렉토리 내용 조회'
    - 'getcwd(): 현재 작업 디렉토리'
    - 'chdir(): 디렉토리 변경'
    - 'mkdir(): 디렉토리 생성'
    - 'rmdir(): 디렉토리 삭제'
  - type: code
    language: python
    title: 현재 디렉토리
    description: 현재 작업 디렉토리를 확인합니다.
    content: |-
      currentDir = os.getcwd()
      currentDir
  - type: code
    language: python
    title: 디렉토리 내용
    description: 디렉토리 내 파일과 폴더 목록을 가져옵니다.
    content: |-
      rootContents = os.listdir('/')
      rootContents[:5]
  - type: code
    language: python
    title: 디렉토리 생성
    description: 새 디렉토리를 생성합니다.
    content: |-
      testDir = os.path.join(tempfile.gettempdir(), 'codaro_os_test_folder')
      if not os.path.exists(testDir):
          os.mkdir(testDir)
      dirCreated = os.path.exists(testDir)
      dirCreated
  - type: code
    language: python
    title: 디렉토리 삭제
    description: 빈 디렉토리를 삭제합니다.
    content: |-
      removeDir = os.path.join(tempfile.gettempdir(), 'codaro_os_test_folder')
      os.makedirs(removeDir, exist_ok=True)
      os.rmdir(removeDir)
      dirRemoved = not os.path.exists(removeDir)
      dirRemoved
  - type: note
    content: Codaro 로컬 커널에서 mkdir/rmdir은 실제 로컬 임시 디렉터리에 적용됩니다. 실습용 경로를 먼저 만들고 삭제 대상을 확인한 뒤 실행하세요.
- id: file_operations
  title: 파일 작업
  structuredPrimary: true
  subtitle: remove, rename, stat
  goal: '파일 작업: 실행 가능한 Python 흐름으로 익힌다.'
  why: '파일 작업: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    파일을 관리하는 함수들입니다. remove()로 파일을 삭제하고, rename()으로 이름을 변경하며, stat()으로 파일 정보를 확인합니다. 파일 크기, 수정 시간 등 메타데이터 접근이 가능합니다.

    remove()는 파일만, rmdir()은 빈 디렉토리만 삭제합니다. 디렉토리와 내용을 함께 삭제하려면 shutil.rmtree()를 사용하세요.
  tips:
