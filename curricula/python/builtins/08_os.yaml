  - type: expansion
    title: '🔴 심화4: 파일 이름 일괄 변경'
    code: |-
      renameFolder = os.path.join(tempfile.gettempdir(), 'codaro_os_rename_test')
      os.makedirs(renameFolder, exist_ok=True)
      for name in ['data1.tmp', 'data2.tmp', 'keep.txt']:
          open(os.path.join(renameFolder, name), 'w').close()
      tmpFiles = [f for f in os.listdir(renameFolder) if f.endswith('.tmp')]
      for oldFile in tmpFiles:
          oldPath = os.path.join(renameFolder, oldFile)
          newPath = os.path.join(renameFolder, oldFile.replace('.tmp', '.bak'))
          if os.path.exists(newPath):
              os.remove(newPath)
          os.rename(oldPath, newPath)
      bakFiles = [f for f in os.listdir(renameFolder) if f.endswith('.bak')]
      bakFiles
