intro:
  emoji: 🎨
  points:
  - 읽기 쉬운 데이터 출력
  - 중첩 구조 들여쓰기
  - 폭과 깊이 제어
  - 디버깅과 로깅에 유용
  direction: pprint 예쁜 출력에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 작은 샘플 입력 확인 후 모듈 함수 호출에 맞는 코드 입력을 고릅니다.
  - pprint 예쁜 출력 결과를 반환값, stdout, 객체 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 표준 라이브러리 유틸리티에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 모듈 임포트 입력 확인
      detail: 입력 기준(작은 샘플 입력)과 필요한 조건을 먼저 고정합니다.
    - label: 기본 출력 처리 실행
      detail: 모듈 함수 호출 코드를 실행해 중간 결과를 확인합니다.
    - label: 폭과 깊이 제어 결과 검증
      detail: 반환값, stdout, 객체 상태 기준으로 실행 결과를 비교합니다.
    - label: pprint 예쁜 출력 재사용
      detail: 완성 코드를 표준 라이브러리 유틸리티에 붙일 수 있게 정리합니다.
    runtime:
    - label: 표준 라이브러리 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: pprint 예쁜 출력 실행
      detail: 셀을 실행해 반환값, stdout, 객체 상태와 예외 상태를 확인합니다.
    - label: pprint 예쁜 출력 완료
      detail: 검증된 코드를 표준 라이브러리 유틸리티로 남깁니다.
sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: pprint 시작하기
  goal: 모듈 임포트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    pprint는 파이썬 표준 라이브러리입니다. 복잡한 데이터 구조를 읽기 쉽게 포맷팅하여 출력합니다.

    Codaro 환경에서는 pformat()을 사용하여 문자열로 반환합니다. 일반 Python에서는 pprint()가 직접 콘솔에 출력합니다.
  tips:
  - Codaro 환경에서는 pformat()을 사용하여 문자열로 반환합니다. 일반 Python에서는 pprint()가 직접 콘솔에 출력합니다.
  snippet: |-
    import pprint

    data = {'name': 'Alice', 'age': 30, 'skills': ['Python', 'JavaScript', 'SQL']}

    formatted = pprint.pformat(data)
    formatted
  exercise:
    prompt: 모듈 임포트 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      import pprint

      data = {'name': 'Alice', 'age': 30, 'skills': ['Python', 'JavaScript', 'SQL']}

      formatted = pprint.pformat(data)
      formatted
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 모듈 임포트에서 `data` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 모듈 임포트 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: basic_pprint
  title: 기본 출력
  structuredPrimary: true
  subtitle: pformat 함수
  goal: 기본 출력에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    pformat()은 데이터 구조를 보기 좋게 포맷팅한 문자열을 반환합니다.

    pformat()은 객체를 수정하지 않고 문자열만 반환하므로, 로그 파일이나 디버그 메시지에 안전하게 사용할 수 있습니다.
  tips:
  - pformat()은 객체를 수정하지 않고 문자열만 반환하므로, 로그 파일이나 디버그 메시지에 안전하게 사용할 수 있습니다.
  snippet: |-
    import pprint

    numbers = list(range(1, 21))
    prettyList = pprint.pformat(numbers)
    prettyList
  exercise:
    prompt: 기본 출력 예제에서 `numbers`, `prettyList` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      import pprint

      numbers = list(range(1, 21))
      prettyList = pprint.pformat(numbers)
      prettyList
    hints:
    - 바꿀 지점은 `numbers = ...` 오른쪽 값입니다.
    - 실행 뒤 `numbers` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 기본 출력에서 `numbers` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 기본 출력 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: width_depth
  title: 폭과 깊이 제어
  structuredPrimary: true
  subtitle: 출력 형식 조정
  goal: 폭과 깊이 제어에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    width와 depth 파라미터로 출력 형식을 세밀하게 제어할 수 있습니다.

    width를 좁게 설정하면 더 많은 줄바꿈이 발생하여 세로로 긴 출력이 됩니다. 터미널 폭에 맞춰 조정하세요.
  tips:
  - width를 좁게 설정하면 더 많은 줄바꿈이 발생하여 세로로 긴 출력이 됩니다. 터미널 폭에 맞춰 조정하세요.
  snippet: |-
    import pprint

    items = [f'item_{i}' for i in range(20)]

    narrow = pprint.pformat(items, width=40)
    wide = pprint.pformat(items, width=120)

    narrow, wide
  exercise:
    prompt: 폭과 깊이 제어 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      import pprint

      items = [f'item_{i}' for i in range(20)]

      narrow = pprint.pformat(items, width=40)
      wide = pprint.pformat(items, width=120)

      narrow, wide
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 폭과 깊이 제어의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 폭과 깊이 제어 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: prettyprinter
  title: PrettyPrinter 클래스
  structuredPrimary: true
  subtitle: 재사용 가능한 프린터
  goal: PrettyPrinter 클래스에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    PrettyPrinter 객체를 생성하면 동일한 설정으로 여러 번 사용할 수 있습니다.

    PrettyPrinter 객체를 만들면 동일한 포맷 설정을 여러 곳에서 재사용할 수 있어 일관성을 유지하기 좋습니다.
  tips:
  - PrettyPrinter 객체를 만들면 동일한 포맷 설정을 여러 곳에서 재사용할 수 있어 일관성을 유지하기 좋습니다.
  snippet: |-
    import pprint

    printer = pprint.PrettyPrinter(width=60, indent=4)

    data1 = {'a': 1, 'b': 2, 'c': 3}
    data2 = ['x', 'y', 'z']

    result1 = printer.pformat(data1)
    result2 = printer.pformat(data2)

    result1, result2
  exercise:
    prompt: PrettyPrinter 클래스 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      import pprint

      printer = pprint.PrettyPrinter(width=60, indent=4)

      data1 = {'a': 1, 'b': 2, 'c': 3}
      data2 = ['x', 'y', 'z']

      result1 = printer.pformat(data1)
      result2 = printer.pformat(data2)

      result1, result2
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: PrettyPrinter 클래스에서 `printer` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: PrettyPrinter 클래스 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: sorting
  title: 정렬과 정리
  structuredPrimary: true
  subtitle: 키 정렬
  goal: 정렬과 정리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    딕셔너리 키를 정렬하여 출력하면 일관된 순서로 데이터를 확인할 수 있습니다.

    sort_dicts=True는 딕셔너리 비교나 디버깅 시 유용합니다. 동일한 데이터가 항상 같은 순서로 출력됩니다.
  tips:
  - sort_dicts=True는 딕셔너리 비교나 디버깅 시 유용합니다. 동일한 데이터가 항상 같은 순서로 출력됩니다.
  snippet: |-
    import pprint

    unordered = {'z': 1, 'a': 2, 'm': 3, 'b': 4}

    sortedOutput = pprint.pformat(unordered, sort_dicts=True)
    unsorted = pprint.pformat(unordered, sort_dicts=False)

    sortedOutput, unsorted
  exercise:
    prompt: 정렬과 정리 예제에서 `unordered`, `sortedOutput`, `unsorted` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      import pprint

      unordered = {'z': 1, 'a': 2, 'm': 3, 'b': 4}

      sortedOutput = pprint.pformat(unordered, sort_dicts=True)
      unsorted = pprint.pformat(unordered, sort_dicts=False)

      sortedOutput, unsorted
    hints:
    - 바꿀 지점은 `unordered = ...` 오른쪽 값입니다.
    - 실행 뒤 `unordered` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 정렬과 정리에서 `unordered` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 정렬과 정리 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: debugging
  title: 디버깅 활용
  structuredPrimary: true
  subtitle: 실무 활용 패턴
  goal: 디버깅 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    pprint는 복잡한 데이터 구조를 디버깅하고 로그에 기록할 때 매우 유용합니다.

    디버깅 시 pformat()을 로깅 메시지에 포함하면 복잡한 객체의 상태를 쉽게 추적할 수 있습니다.
  tips:
  - 디버깅 시 pformat()을 로깅 메시지에 포함하면 복잡한 객체의 상태를 쉽게 추적할 수 있습니다.
  snippet: |-
    import pprint

    apiResponse = {
        'status': 200,
        'data': {
            'users': [
                {'id': 1, 'name': 'Alice', 'active': True},
                {'id': 2, 'name': 'Bob', 'active': False}
            ],
            'pagination': {'page': 1, 'total': 100}
        }
    }

    readable = pprint.pformat(apiResponse, indent=2)
    readable
  exercise:
    prompt: 디버깅 활용 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      import pprint

      apiResponse = {
          'status': 200,
          'data': {
              'users': [
                  {'id': 1, 'name': 'Alice', 'active': True},
                  {'id': 2, 'name': 'Bob', 'active': False}
              ],
              'pagination': {'page': 1, 'total': 100}
          }
      }

      readable = pprint.pformat(apiResponse, indent=2)
      readable
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 디버깅 활용에서 `apiResponse` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 디버깅 활용 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 사용 사례
  goal: 실전 활용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    실제 프로젝트에서 pprint를 활용하는 다양한 패턴들입니다.

    pprint는 JSON과 달리 파이썬 객체 그대로 출력하므로, None, True, False 등이 파이썬 형식으로 표시됩니다.
  tips:
  - pprint는 JSON과 달리 파이썬 객체 그대로 출력하므로, None, True, False 등이 파이썬 형식으로 표시됩니다.
  snippet: |-
    import pprint

    environment = {
        'APP_NAME': 'MyApp',
        'DEBUG': True,
        'DATABASE_URL': 'postgresql://localhost/mydb',
        'FEATURES': {
            'auth': True,
            'cache': True,
            'logging': {'level': 'INFO', 'file': 'app.log'}
        }
    }

    envDump = pprint.pformat(environment, indent=2, width=70)
    envDump
  exercise:
    prompt: 실전 활용 예제에서 `environment`, `envDump` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      import pprint

      environment = {
          'APP_NAME': 'MyApp',
          'DEBUG': True,
          'DATABASE_URL': 'postgresql://localhost/mydb',
          'FEATURES': {
              'auth': True,
              'cache': True,
              'logging': {'level': 'INFO', 'file': 'app.log'}
          }
      }

      envDump = pprint.pformat(environment, indent=2, width=70)
      envDump
    hints:
    - 바꿀 지점은 `environment = ...` 오른쪽 값입니다.
    - 실행 뒤 `environment` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 실전 활용에서 `environment` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 실전 활용 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: workflow_validation
  title: '검증 루프: 안전한 진단 리포트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: '검증 루프: 안전한 진단 리포트에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: pprint는 보기 좋은 출력만 만드는 도구가 아닙니다. 운영 진단 리포트에서는 읽기 쉬운 줄 길이, 안정적인 키 순서, 민감정보 마스킹까지 검증해야 업무
    로그로 쓸 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
