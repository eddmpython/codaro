    import pprint

    diagnosticPayload = {
        'service': 'billing-api',
        'health': {'database': 'ok', 'queue': 'slow'},
        'credentials': {
            'user': 'service-account',
            'password': 'plain-text-password',
            'token': 'secret-token'
        },
        'recentErrors': [
            {'code': 'QUEUE_LAG', 'count': 3},
            {'code': 'TIMEOUT', 'count': 1}
        ]
    }

    sensitiveKeys = {'password', 'token', 'api_key'}

    def redactSecrets(value):
        if isinstance(value, dict):
            return {
                key: '***' if key.lower() in sensitiveKeys else redactSecrets(item)
                for key, item in value.items()
            }
        if isinstance(value, list):
            return [redactSecrets(item) for item in value]
        return value

    safePayload = redactSecrets(diagnosticPayload)
    reportText = pprint.pformat(safePayload, sort_dicts=True, width=72)

    assert 'plain-text-password' not in reportText
    assert 'secret-token' not in reportText
    assert "'password': '***'" in reportText
    reportText
