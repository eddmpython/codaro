      diff = difflib.unified_diff(
          text1,
          text2,
          fromfile="original.txt",
          tofile="modified.txt",
          lineterm=""
      )

      diffOutput = "\n".join(diff)
      diffOutput
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
