- title: '검증 루프: 변경 리포트 품질 게이트'
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    diff를 리포트로 연결하기
    difflib는 차이를 보여주는 데서 끝나면 실무 가치가 약합니다. 변경 유형을 요약하고, 위험한 대규모 변경을 감지하고, 사람이 읽을 수 있는 diff까지 함께 만드는 흐름으로 익혀야 코드 리뷰와 문서 검토에 바로 쓸 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    oldDocument = [
        "title: Codaro\n",
        "runtime: remote-sandbox\n",
        "lesson: constrained-ui\n",
        "status: draft\n"
    ]
    newDocument = [
        "title: Codaro\n",
        "runtime: local-python\n",
        "lesson: local workflow\n",
        "status: reviewed\n",
        "validation: required\n"
    ]

    def buildChangeReport(oldLines, newLines, threshold=0.2):
        matcher = difflib.SequenceMatcher(None, oldLines, newLines)
        similarity = matcher.ratio()
        assert similarity >= threshold, "변경 폭이 너무 커서 수동 리뷰가 필요합니다"

        changes = [
            {
                "type": tag,
                "old": f"{i1 + 1}-{i2}",
                "new": f"{j1 + 1}-{j2}"
            }
            for tag, i1, i2, j1, j2 in matcher.get_opcodes()
            if tag != "equal"
        ]
        unified = list(difflib.unified_diff(
            oldLines,
            newLines,
            fromfile="before.yaml",
            tofile="after.yaml",
            lineterm=""
        ))
        return {
            "similarity": round(similarity, 2),
            "changeCount": len(changes),
            "changes": changes,
            "diff": unified
        }

    changeReport = buildChangeReport(oldDocument, newDocument)
    assert changeReport["changeCount"] >= 1
    changeReport
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      oldDocument = [
          "title: Codaro\n",
          "runtime: remote-sandbox\n",
          "lesson: constrained-ui\n",
          "status: draft\n"
      ]
      newDocument = [
          "title: Codaro\n",
          "runtime: local-python\n",
          "lesson: local workflow\n",
          "status: reviewed\n",
          "validation: required\n"
      ]

      def buildChangeReport(oldLines, newLines, threshold=0.2):
          matcher = difflib.SequenceMatcher(None, oldLines, newLines)
          similarity = matcher.ratio()
          assert similarity >= threshold, "변경 폭이 너무 커서 수동 리뷰가 필요합니다"

          changes = [
              {
                  "type": tag,
                  "old": f"{i1 + 1}-{i2}",
                  "new": f"{j1 + 1}-{j2}"
              }
              for tag, i1, i2, j1, j2 in matcher.get_opcodes()
              if tag != "equal"
          ]
          unified = list(difflib.unified_diff(
              oldLines,
              newLines,
              fromfile="before.yaml",
              tofile="after.yaml",
              lineterm=""
          ))
          return {
              "similarity": round(similarity, 2),
              "changeCount": len(changes),
              "changes": changes,
              "diff": unified
          }

      changeReport = buildChangeReport(oldDocument, newDocument)
      assert changeReport["changeCount"] >= 1
      changeReport
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
  name: workflow_validation
