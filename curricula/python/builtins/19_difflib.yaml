    SequenceMatcher 클래스
    SequenceMatcher는 두 시퀀스를 비교하고 유사도를 계산하는 클래스입니다.

    ratio() 반환값
    ratio()는 0.0~1.0 사이의 값을 반환하며, 1.0은 완전히 동일함을 의미합니다.
  tips:
