intro:
- type: content
  title: difflib 모듈이란?
  content: |-
    difflib 모듈은 시퀀스(특히 텍스트)를 비교하고 차이점을 찾는 기능을 제공합니다.
    버전 관리, 텍스트 비교, 유사도 측정 등에 유용하게 사용됩니다.
