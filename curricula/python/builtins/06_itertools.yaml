    resultCheck: 출력 또는 assert 확인
- id: grouping
  title: 그룹화와 누적
  structuredPrimary: true
  subtitle: groupby, accumulate
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    연속된 동일 요소를 그룹화하거나 누적값을 계산합니다. groupby()는 정렬된 데이터에서 연속된 같은 값을 묶고, accumulate()는 누적 합계나 누적 연산을 수행합니다. 데이터 집계, 통계 분석에 유용합니다.

    groupby는 반드시 정렬된 데이터에 사용해야 합니다. 정렬되지 않으면 같은 값이 여러 그룹으로 나뉩니다.
  tips:
  - groupby는 반드시 정렬된 데이터에 사용해야 합니다. 정렬되지 않으면 같은 값이 여러 그룹으로 나뉩니다.
  snippet: |-
    data = [1, 1, 2, 2, 2, 3, 1]
    grouped = [(k, len(list(g))) for k, g in groupby(data)]
    grouped
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      data = [1, 1, 2, 2, 2, 3, 1]
      grouped = [(k, len(list(g))) for k, g in groupby(data)]
      grouped
    hints:
