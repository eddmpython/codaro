    resultCheck: 출력 또는 assert 확인
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: itertools 실무 패턴
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실무에서 자주 사용하는 itertools 활용 패턴을 살펴봅니다. 배치 처리, 윈도우 슬라이딩, 페이지네이션, 조합 탐색 등 다양한 문제를 itertools로 효율적으로 해결할 수 있습니다.

    itertools 함수들은 제너레이터를 반환하므로 메모리를 절약합니다. 필요한 만큼만 소비하세요.
  tips:
  - itertools 함수들은 제너레이터를 반환하므로 메모리를 절약합니다. 필요한 만큼만 소비하세요.
  snippet: |-
    def chunk(iterable, size):
        iterator = iter(iterable)
        while True:
            batch = list(islice(iterator, size))
            if not batch:
                break
            yield batch

    dataset = range(10)
    batches = list(chunk(dataset, 3))
    batches
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def chunk(iterable, size):
          iterator = iter(iterable)
          while True:
              batch = list(islice(iterator, size))
              if not batch:
                  break
              yield batch

      dataset = range(10)
      batches = list(chunk(dataset, 3))
      batches
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 이터레이터 데이터 파이프라인'
  structuredPrimary: true
  subtitle: 배치, groupby 정렬, 조합 탐색 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    itertools는 메모리를 아끼는 대신 이터레이터가 한 번 소비된다는 점과 groupby의 정렬 조건을 반드시 이해해야 합니다. 여기서는 작은 주문 데이터를 배치 처리하고, 일부러 정렬 누락 버그를 잡은 뒤, 조합 탐색을 제한해 안전하게 검증합니다.

    변주 실험
    프로모션 후보를 전부 만들지 않고 `islice(product(...), 10)`으로 상위 10개만 검토하는 흐름으로 바꿔 메모리 사용을 비교하세요.
  tips:
  - 변주 실험 프로모션 후보를 전부 만들지 않고 `islice(product(...), 10)`으로 상위 10개만 검토하는 흐름으로 바꿔 메모리 사용을 비교하세요.
  snippet: |-
    orderRows = [
        {"orderId": "O-101", "region": "KR", "amount": 120},
        {"orderId": "O-102", "region": "US", "amount": 80},
        {"orderId": "O-103", "region": "KR", "amount": 150},
        {"orderId": "O-104", "region": "JP", "amount": 60},
        {"orderId": "O-105", "region": "US", "amount": 90},
    ]

    def chunkRecords(records, size):
        if size <= 0:
            raise ValueError("size must be positive")
        iterator = iter(records)
        while True:
            batch = list(islice(iterator, size))
            if not batch:
                break
            yield batch

    orderBatches = list(chunkRecords(orderRows, size=2))
    flattenedOrders = list(chain.from_iterable(orderBatches))

    assert [len(batch) for batch in orderBatches] == [2, 2, 1]
    assert flattenedOrders == orderRows
    assert sum(row["amount"] for row in flattenedOrders) == 500

    orderBatches
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      orderRows = [
          {"orderId": "O-101", "region": "KR", "amount": 120},
          {"orderId": "O-102", "region": "US", "amount": 80},
          {"orderId": "O-103", "region": "KR", "amount": 150},
          {"orderId": "O-104", "region": "JP", "amount": 60},
          {"orderId": "O-105", "region": "US", "amount": 90},
      ]

      def chunkRecords(records, size):
          if size <= 0:
              raise ValueError("size must be positive")
          iterator = iter(records)
          while True:
              batch = list(islice(iterator, size))
              if not batch:
                  break
              yield batch

      orderBatches = list(chunkRecords(orderRows, size=2))
      flattenedOrders = list(chain.from_iterable(orderBatches))

      assert [len(batch) for batch in orderBatches] == [2, 2, 1]
      assert flattenedOrders == orderRows
      assert sum(row["amount"] for row in flattenedOrders) == 500

      orderBatches
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
