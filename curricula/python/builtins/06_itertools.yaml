- id: infinite_iterators
  title: 무한 이터레이터
  structuredPrimary: true
  subtitle: count, cycle, repeat
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    itertools는 메모리 효율적인 이터레이터를 제공합니다. count()는 무한 카운터, cycle()은 순환 반복, repeat()는 값 반복을 생성합니다. 무한 시퀀스를 다룰 때는 반드시 종료 조건이나 제한이 필요합니다.

    무한 이터레이터는 for 루프에서 break 없이 사용하면 무한 루프가 됩니다.
  tips:
  - 무한 이터레이터는 for 루프에서 break 없이 사용하면 무한 루프가 됩니다.
  snippet: |-
    counter = count(0)
    first5 = list(islice(counter, 5))
    first5
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      counter = count(0)
      first5 = list(islice(counter, 5))
      first5
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: combinatorics
  title: 조합과 순열
  structuredPrimary: true
  subtitle: combinations, permutations, product
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    조합론 함수로 모든 가능한 조합과 순열을 생성합니다. combinations()는 순서 무관 조합, permutations()는 순서 있는 순열, product()는 데카르트 곱을 반환합니다. 경우의 수 계산, 완전 탐색에 활용됩니다.

    조합과 순열의 차이: combinations([1,2,3], 2)는 (1,2)만, permutations는 (1,2)와 (2,1) 모두 포함.
  tips:
  - '조합과 순열의 차이: combinations([1,2,3], 2)는 (1,2)만, permutations는 (1,2)와 (2,1) 모두 포함.'
  snippet: |-
    choices = ['A', 'B', 'C']
    pairs = list(combinations(choices, 2))
    pairs
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      choices = ['A', 'B', 'C']
      pairs = list(combinations(choices, 2))
      pairs
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: chaining
  title: 이터레이터 연결
  structuredPrimary: true
  subtitle: chain, zip_longest, tee
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    여러 이터레이터를 연결하거나 복제할 수 있습니다. chain()은 여러 이터레이터를 순차 연결하고, zip_longest()는 길이가 다른 이터레이터를 짝짓습니다. tee()는 하나의 이터레이터를 여러 개로 복제합니다.

    tee로 복제한 이터레이터는 독립적이므로 하나를 소진해도 다른 것에 영향을 주지 않습니다.
  tips:
  - tee로 복제한 이터레이터는 독립적이므로 하나를 소진해도 다른 것에 영향을 주지 않습니다.
  snippet: |-
    list1 = [1, 2, 3]
    list2 = [4, 5, 6]
    combined = list(chain(list1, list2))
    combined
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      list1 = [1, 2, 3]
      list2 = [4, 5, 6]
      combined = list(chain(list1, list2))
      combined
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: filtering
  title: 필터링과 슬라이싱
  structuredPrimary: true
  subtitle: islice, filterfalse, takewhile, dropwhile
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    이터레이터를 조건에 따라 필터링하거나 슬라이싱할 수 있습니다. islice()는 인덱스 범위로 자르고, filterfalse()는 조건을 만족하지 않는 것만, takewhile()은 조건이 참인 동안만 가져옵니다.

    takewhile과 filter의 차이: takewhile은 조건이 거짓이 되면 즉시 중단하지만 filter는 끝까지 검사합니다.
  tips:
  - 'takewhile과 filter의 차이: takewhile은 조건이 거짓이 되면 즉시 중단하지만 filter는 끝까지 검사합니다.'
  snippet: |-
    numbers = range(10)
    sliced = list(islice(numbers, 2, 6))
    sliced
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      numbers = range(10)
