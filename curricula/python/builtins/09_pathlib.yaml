          ]

      manifest = buildFileManifest(inputPath)

      assert sorted(item["name"] for item in manifest) == ["README.md", "errors.log", "sales.csv"]
      assert sum(item["size"] for item in manifest) == sum(path.stat().st_size for path in inputPath.iterdir())

      manifest
  - type: code
    language: python
    title: 경로 traversal 오류 잡기
    description: relative_to()로 안전한 작업공간 내부 경로인지 검증합니다.
    content: |-
      def safePipelinePath(basePath, userPath):
          resolvedBase = basePath.resolve()
          resolvedTarget = (resolvedBase / userPath).resolve()
          try:
              resolvedTarget.relative_to(resolvedBase)
          except ValueError as exc:
              raise ValueError(f"작업공간 밖 경로입니다: {userPath}") from exc
          return resolvedTarget

      safeOutput = safePipelinePath(pipelineRoot, 'output/report.txt')

      try:
          safePipelinePath(pipelineRoot, '../secret.txt')
      except ValueError as exc:
          pathlibProblem = str(exc)

      assert safeOutput.parent.name == 'output'
      assert '작업공간 밖 경로입니다' in pathlibProblem

      safeOutput, pathlibProblem
  - type: code
    language: python
    title: 필수 파일 검증
    description: 파이프라인에 필요한 파일이 없으면 명확한 오류로 잡습니다.
    content: |-
      def requireFiles(folder, requiredNames):
          existingNames = {path.name for path in folder.iterdir() if path.is_file()}
          missingNames = sorted(set(requiredNames) - existingNames)
          if missingNames:
              raise FileNotFoundError(f"필수 파일 누락: {missingNames}")
          return sorted(existingNames)

      existingFiles = requireFiles(inputPath, ['sales.csv', 'README.md'])

      try:
          requireFiles(inputPath, ['sales.csv', 'customers.csv'])
      except FileNotFoundError as exc:
          missingFileProblem = str(exc)

      assert existingFiles == ["README.md", "errors.log", "sales.csv"]
      assert "customers.csv" in missingFileProblem

      missingFileProblem
  - type: code
    language: python
    title: 출력 리포트 작성
    description: 검증된 경로에 매니페스트 요약 리포트를 저장합니다.
    content: |-
      outputReport = safePipelinePath(pipelineRoot, 'output/manifest_summary.txt')
      outputReport.parent.mkdir(parents=True, exist_ok=True)

      reportLines = [
          f"{item['name']}: {item['size']} bytes"
          for item in manifest
      ]
      outputReport.write_text('\n'.join(reportLines), encoding='utf-8')

      assert outputReport.exists()
      assert outputReport.read_text(encoding='utf-8').count('bytes') == 3
      assert outputReport.relative_to(pipelineRoot).parts == ('output', 'manifest_summary.txt')

      outputReport.read_text(encoding='utf-8')
