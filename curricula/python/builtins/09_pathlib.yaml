- id: module_import
  title: pathlib 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: 'pathlib 모듈 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'pathlib 모듈 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    pathlib는 파이썬의 객체지향 경로 처리 라이브러리입니다. Path 클래스를 통해 os.path보다 직관적인 API를 제공합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 Path 클래스를 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 Path 클래스를 사용할 수 있습니다.
  - Codaro 로컬 커널에서는 현재 작업 디렉터리와 권한이 허용된 로컬 경로에서 작동합니다. Path 객체는 경로를 문자열 대신 객체로 관리합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import tempfile
    from pathlib import Path

    currentPath = Path('.')
    currentPath
  exercise:
    prompt: 'pathlib 모듈 불러오기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import tempfile
      from pathlib import Path

      currentPath = Path('.')
      currentPath
    solution: |-
      import tempfile
      from pathlib import Path

      currentPath = Path('.')
      currentPath
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: pathlib는 파이썬의 객체지향 경로 처리 라이브러리입니다. Path 클래스를 통해 os.path보다 직관적인 API를 제공합니다. 별도 설치 없이 import만으로 사용할 수 있습니다.
  - type: note
    content: 이 섹션을 먼저 실행하면 아래 모든 예제에서 Path 클래스를 사용할 수 있습니다.
  - type: code
    language: python
    title: Path 클래스 가져오기
    description: pathlib의 Path 클래스를 불러오고 정상 작동을 확인합니다.
    content: |-
      import tempfile
      from pathlib import Path

      currentPath = Path('.')
      currentPath
  - type: tip
    content: Codaro 로컬 커널에서는 현재 작업 디렉터리와 권한이 허용된 로컬 경로에서 작동합니다. Path 객체는 경로를 문자열 대신 객체로 관리합니다.
- id: path_basics
  title: Path 객체 기초
  structuredPrimary: true
  subtitle: 경로 생성과 변환
  goal: 'Path 객체 기초: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Path 객체 기초: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Path 객체는 경로를 문자열이 아닌 객체로 다룹니다. 절대 경로 변환, 경로 구성요소 분리, 파일명과 확장자 추출 등 다양한 속성과 메서드를 제공합니다.

    parts는 경로를 튜플로 분리하며, parent는 바로 위 디렉토리, parents는 모든 상위 디렉토리를 반환합니다.
  tips:
  - parts는 경로를 튜플로 분리하며, parent는 바로 위 디렉토리, parents는 모든 상위 디렉토리를 반환합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    absolutePath = Path('.').resolve()
    absolutePath
  exercise:
    prompt: 'Path 객체 기초: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      absolutePath = Path('.').resolve()
      absolutePath
    solution: |-
      absolutePath = Path('.').resolve()
      absolutePath
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Path 객체는 경로를 문자열이 아닌 객체로 다룹니다. 절대 경로 변환, 경로 구성요소 분리, 파일명과 확장자 추출 등 다양한 속성과 메서드를 제공합니다.
  - type: list
    items:
    - 'Path(): 경로 객체 생성'
    - 'resolve(): 절대 경로 변환'
    - 'parts: 경로 구성요소 분리'
    - 'name, stem, suffix: 파일명 분석'
  - type: code
    language: python
    title: 절대 경로로 변환
    description: 상대 경로를 절대 경로로 변환합니다.
    content: |-
      absolutePath = Path('.').resolve()
      absolutePath
  - type: code
    language: python
    title: 경로 구성요소 분리
    description: 경로를 각 디렉토리와 파일명으로 분리합니다.
    content: |-
      samplePath = Path('/home/user/docs/report.txt')
      samplePath.parts
  - type: code
    language: python
    title: 파일명과 확장자
    description: 파일명, 확장자 제외 이름, 확장자만 추출합니다.
    content: |-
      filePath = Path('report.txt')
      {'name': filePath.name, 'stem': filePath.stem, 'suffix': filePath.suffix}
  - type: code
    language: python
    title: 부모 디렉토리
    description: 바로 위 디렉토리와 모든 상위 디렉토리를 확인합니다.
    content: |-
      docPath = Path('/home/user/docs/report.txt')
      {'parent': docPath.parent, 'parents': list(docPath.parents)}
  - type: code
    language: python
    title: 경로 나누기
    description: parts, parent, name을 조합하여 경로를 완전히 분해합니다.
    content: |-
      fullPath = Path('/var/log/app/debug.log')
      {'parts': fullPath.parts, 'parent': fullPath.parent, 'name': fullPath.name}
  - type: tip
    content: parts는 경로를 튜플로 분리하며, parent는 바로 위 디렉토리, parents는 모든 상위 디렉토리를 반환합니다.
- id: path_operations
  title: 경로 조작
  structuredPrimary: true
  subtitle: 경로 결합과 변경
  goal: '경로 조작: 실행 가능한 Python 흐름으로 익힌다.'
  why: '경로 조작: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Path 객체는 / 연산자로 경로를 결합하고, with_name()과 with_suffix()로 파일명과 확장자를 변경할 수 있습니다. relative_to()로 상대 경로를 계산합니다.

    / 연산자와 joinpath()는 동일한 결과를 반환합니다. with_name()과 with_suffix()는 원본을 변경하지 않고 새 Path 객체를 반환합니다.
  tips:
  - / 연산자와 joinpath()는 동일한 결과를 반환합니다. with_name()과 with_suffix()는 원본을 변경하지 않고 새 Path 객체를 반환합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    basePath = Path('/home/user')
    newPath = basePath / 'documents' / 'file.txt'
    newPath
  exercise:
    prompt: '경로 조작: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      basePath = Path('/home/user')
      newPath = basePath / 'documents' / 'file.txt'
      newPath
    solution: |-
      basePath = Path('/home/user')
      newPath = basePath / 'documents' / 'file.txt'
      newPath
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Path 객체는 / 연산자로 경로를 결합하고, with_name()과 with_suffix()로 파일명과 확장자를 변경할 수 있습니다. relative_to()로 상대 경로를 계산합니다.
  - type: list
    items:
    - '/: 경로 결합 연산자'
    - 'joinpath(): 여러 경로 결합'
    - 'with_name(): 파일명 변경'
    - 'with_suffix(): 확장자 변경'
  - type: code
    language: python
    title: 경로 결합
    description: / 연산자로 경로를 직관적으로 결합합니다.
    content: |-
      basePath = Path('/home/user')
      newPath = basePath / 'documents' / 'file.txt'
      newPath
  - type: code
    language: python
    title: joinpath 메서드
    description: 여러 경로 요소를 한번에 결합합니다.
    content: |-
      rootPath = Path('/var')
      combinedPath = rootPath.joinpath('log', 'app', 'error.log')
      combinedPath
  - type: code
    language: python
    title: 파일명 변경
    description: with_name()으로 파일명만 교체한 새 경로를 생성합니다.
    content: |-
      originalPath = Path('/docs/report.txt')
      renamedPath = originalPath.with_name('summary.txt')
      renamedPath
  - type: code
    language: python
    title: 확장자 변경
    description: with_suffix()로 확장자만 교체합니다. 점을 포함해야 합니다.
    content: |-
      textFile = Path('/data/report.txt')
      pdfFile = textFile.with_suffix('.pdf')
      pdfFile
  - type: code
    language: python
    title: 상대 경로 계산
    description: relative_to()로 기준 경로로부터의 상대 경로를 계산합니다.
    content: |-
      fullPath = Path('/home/user/projects/app/main.py')
      basePath = Path('/home/user')
      relativePath = fullPath.relative_to(basePath)
      relativePath
  - type: code
    language: python
    title: 확장자 없애기
    description: 빈 문자열로 확장자를 제거한 Path 객체를 반환합니다.
    content: |-
      configFile = Path('settings.json')
      noExtension = configFile.with_suffix('')
      noExtension
  - type: tip
    content: / 연산자와 joinpath()는 동일한 결과를 반환합니다. with_name()과 with_suffix()는 원본을 변경하지 않고 새 Path 객체를 반환합니다.
- id: path_checking
  title: 경로 확인
  structuredPrimary: true
  subtitle: 파일과 디렉토리 검증
  goal: '경로 확인: 실행 가능한 Python 흐름으로 익힌다.'
  why: '경로 확인: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Path 객체는 경로의 존재 여부, 타입(파일/디렉토리), 절대 경로 여부 등을 확인하는 메서드를 제공합니다. 모든 메서드는 True/False를 반환합니다.

    Codaro 로컬 커널에서는 로컬 파일시스템 경로를 다룹니다. Windows에서 절대 경로는 C:\로 시작하고, Unix에서는 /로 시작합니다.
  tips:
  - Codaro 로컬 커널에서는 로컬 파일시스템 경로를 다룹니다. Windows에서 절대 경로는 C:\로 시작하고, Unix에서는 /로 시작합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    checkPath = Path('.')
    checkPath.exists()
  exercise:
    prompt: '경로 확인: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      checkPath = Path('.')
      checkPath.exists()
    solution: |-
      checkPath = Path('.')
      checkPath.exists()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Path 객체는 경로의 존재 여부, 타입(파일/디렉토리), 절대 경로 여부 등을 확인하는 메서드를 제공합니다. 모든 메서드는 True/False를 반환합니다.
  - type: list
    items:
    - 'exists(): 경로 존재 확인'
    - 'is_dir(): 디렉토리 확인'
    - 'is_file(): 파일 확인'
    - 'is_absolute(): 절대 경로 확인'
  - type: code
    language: python
    title: 경로 존재 확인
    description: exists()로 파일 또는 디렉토리의 존재 여부를 확인합니다.
    content: |-
      checkPath = Path('.')
      checkPath.exists()
  - type: code
    language: python
    title: 디렉토리 확인
    description: is_dir()로 디렉토리인지 확인합니다. 파일이면 False입니다.
    content: |-
      dirPath = Path('.')
      dirPath.is_dir()
  - type: code
    language: python
    title: 파일 확인
    description: is_file()로 일반 파일인지 확인합니다. 디렉토리나 존재하지 않으면 False입니다.
    content: |-
      filePath = Path('test.txt')
      filePath.is_file()
  - type: code
    language: python
    title: 절대 경로 확인
    description: is_absolute()로 절대 경로 여부를 확인합니다.
    content: |-
      relPath = Path('docs/file.txt')
      absPath = Path('/home/user/file.txt')
      {'relative': relPath.is_absolute(), 'absolute': absPath.is_absolute()}
  - type: code
    language: python
    title: 심볼릭 링크 확인
    description: is_symlink()로 심볼릭 링크 여부를 확인합니다.
    content: |-
      linkPath = Path('data') / 'latest'
      linkPath.is_symlink()
  - type: code
    language: python
    title: 경로 타입 종합 확인
    description: 여러 확인 메서드를 조합하여 경로 특성을 완전히 파악합니다.
    content: |-
      testPath = Path('.')
      {'exists': testPath.exists(), 'is_dir': testPath.is_dir(), 'is_file': testPath.is_file(), 'is_absolute': testPath.is_absolute()}
  - type: tip
    content: Codaro 로컬 커널에서는 로컬 파일시스템 경로를 다룹니다. Windows에서 절대 경로는 C:\로 시작하고, Unix에서는 /로 시작합니다.
- id: directory_navigation
  title: 디렉토리 탐색
  structuredPrimary: true
  subtitle: 파일 검색과 필터링
  goal: '디렉토리 탐색: 실행 가능한 Python 흐름으로 익힌다.'
  why: '디렉토리 탐색: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Path 객체는 디렉토리의 내용을 나열하고, 패턴에 맞는 파일을 검색하는 강력한 기능을 제공합니다. iterdir()은 현재 디렉토리를, glob()과 rglob()은 패턴 매칭 검색을 수행합니다.

