sections:
- id: module_import
  title: 모듈 임포트
  structuredPrimary: true
  subtitle: inspect 시작하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    inspect는 파이썬 표준 라이브러리입니다. 런타임에 객체의 정보를 검사하고 추출할 수 있습니다.

    inspect는 디버깅, 문서 자동 생성, 메타프로그래밍에 유용합니다. 객체의 내부 구조를 런타임에 파악할 수 있습니다.
  tips:
  - inspect는 디버깅, 문서 자동 생성, 메타프로그래밍에 유용합니다. 객체의 내부 구조를 런타임에 파악할 수 있습니다.
  snippet: |-
    import inspect

    def greet(name):
        return f"Hello {name}"

    sig = inspect.signature(greet)
    str(sig)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      def greet(name):
          return f"Hello {name}"

      sig = inspect.signature(greet)
      str(sig)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: type_checking
  title: 타입 확인
  structuredPrimary: true
  subtitle: 객체 종류 판별
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    inspect 모듈은 객체의 타입을 확인하는 다양한 함수를 제공합니다.

    isinstance()와 달리 inspect의 is* 함수들은 더 구체적인 타입을 확인합니다. 예: 함수 vs 메서드
  tips:
  - 'isinstance()와 달리 inspect의 is* 함수들은 더 구체적인 타입을 확인합니다. 예: 함수 vs 메서드'
  snippet: |-
    import inspect

    def myFunc():
        pass

    class MyClass:
        pass

    funcCheck = inspect.isfunction(myFunc)
    classCheck = inspect.isclass(MyClass)

    funcCheck, classCheck
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      def myFunc():
          pass

      class MyClass:
          pass

      funcCheck = inspect.isfunction(myFunc)
      classCheck = inspect.isclass(MyClass)

      funcCheck, classCheck
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: signatures
  title: 함수 시그니처
  structuredPrimary: true
  subtitle: 매개변수 정보
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    signature()로 함수의 매개변수 정보를 추출할 수 있습니다.

    signature()는 문서 자동 생성이나 함수 래퍼 작성 시 매우 유용합니다. 동적으로 함수 호출 방법을 결정할 수 있습니다.
  tips:
  - signature()는 문서 자동 생성이나 함수 래퍼 작성 시 매우 유용합니다. 동적으로 함수 호출 방법을 결정할 수 있습니다.
  snippet: |-
    import inspect

    def calculate(x, y, z=10):
        return x + y + z

    sig = inspect.signature(calculate)
    params = list(sig.parameters.keys())

    params
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      def calculate(x, y, z=10):
          return x + y + z

      sig = inspect.signature(calculate)
      params = list(sig.parameters.keys())

      params
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: members
  title: 멤버 조회
  structuredPrimary: true
  subtitle: getmembers 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    getmembers()로 객체의 모든 속성과 메서드를 조회할 수 있습니다.

    getmembers()는 상속된 멤버도 포함하므로, 커스텀 속성만 보려면 __dict__를 사용하거나 이름 필터링을 하세요.
  tips:
  - getmembers()는 상속된 멤버도 포함하므로, 커스텀 속성만 보려면 __dict__를 사용하거나 이름 필터링을 하세요.
  snippet: |-
    import inspect

    class Person:
        species = 'Human'

        def __init__(self, name):
            self.name = name

        def greet(self):
            return f"Hi, I'm {self.name}"

    person = Person('Alice')
    members = inspect.getmembers(person)

    userDefined = [(n, type(v).__name__) for n, v in members if not n.startswith('_')]
    userDefined
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      class Person:
          species = 'Human'

          def __init__(self, name):
              self.name = name

          def greet(self):
              return f"Hi, I'm {self.name}"

      person = Person('Alice')
      members = inspect.getmembers(person)

      userDefined = [(n, type(v).__name__) for n, v in members if not n.startswith('_')]
      userDefined
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: source_code
  title: 소스 코드 조회
  structuredPrimary: true
  subtitle: getsource 함수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    getsource()로 함수나 클래스의 소스 코드를 문자열로 가져올 수 있습니다.

    getsource()는 인터랙티브 셸이나 동적으로 생성된 함수에서는 작동하지 않습니다. 파일에 정의된 객체만 가능합니다.
  tips:
  - getsource()는 인터랙티브 셸이나 동적으로 생성된 함수에서는 작동하지 않습니다. 파일에 정의된 객체만 가능합니다.
  snippet: |-
    import importlib.util
    import inspect
    import sys
    import tempfile
    import textwrap
    from pathlib import Path

    moduleCode = textwrap.dedent('''
    def fibonacci(n):
        if n <= 1:
            return n
        return fibonacci(n - 1) + fibonacci(n - 2)
    ''')

    with tempfile.TemporaryDirectory() as tempDir:
        modulePath = Path(tempDir) / 'math_tools.py'
        modulePath.write_text(moduleCode, encoding='utf-8')
        spec = importlib.util.spec_from_file_location('math_tools', modulePath)
        assert spec is not None and spec.loader is not None
        module = importlib.util.module_from_spec(spec)
        sys.modules[spec.name] = module
        spec.loader.exec_module(module)
        source = inspect.getsource(module.fibonacci)

    assert 'def fibonacci' in source
    source
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import importlib.util
      import inspect
      import sys
      import tempfile
      import textwrap
      from pathlib import Path

      moduleCode = textwrap.dedent('''
      def fibonacci(n):
          if n <= 1:
              return n
          return fibonacci(n - 1) + fibonacci(n - 2)
      ''')

      with tempfile.TemporaryDirectory() as tempDir:
          modulePath = Path(tempDir) / 'math_tools.py'
          modulePath.write_text(moduleCode, encoding='utf-8')
          spec = importlib.util.spec_from_file_location('math_tools', modulePath)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)
          source = inspect.getsource(module.fibonacci)

      assert 'def fibonacci' in source
      source
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: advanced_inspection
  title: 고급 검사
  structuredPrimary: true
  subtitle: 프레임과 스택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    inspect는 현재 실행 중인 코드의 스택 정보도 조회할 수 있습니다.

    프레임 검사는 디버깅 도구나 로깅 프레임워크에서 호출 위치를 자동으로 기록하는데 사용됩니다.
  tips:
  - 프레임 검사는 디버깅 도구나 로깅 프레임워크에서 호출 위치를 자동으로 기록하는데 사용됩니다.
  snippet: |-
    import inspect

    def currentFunction():
        frame = inspect.currentframe()
        return frame.f_code.co_name

    funcName = currentFunction()
    funcName
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      def currentFunction():
          frame = inspect.currentframe()
          return frame.f_code.co_name

      funcName = currentFunction()
      funcName
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 활용 사례
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    inspect 모듈을 활용한 실무 패턴들입니다.

    inspect는 프레임워크나 라이브러리 개발 시 매우 유용합니다. 사용자 정의 함수를 분석하여 자동으로 처리할 수 있습니다.
  tips:
  - inspect는 프레임워크나 라이브러리 개발 시 매우 유용합니다. 사용자 정의 함수를 분석하여 자동으로 처리할 수 있습니다.
  snippet: |-
    import inspect

    def multiply(x: int, y: int) -> int:
        """두 수를 곱합니다."""
        return x * y

    sig = inspect.signature(multiply)
    doc = inspect.getdoc(multiply)

    documentation = {
        'name': multiply.__name__,
        'signature': str(sig),
        'docstring': doc,
        'parameters': list(sig.parameters.keys())
    }

    documentation
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect

      def multiply(x: int, y: int) -> int:
          """두 수를 곱합니다."""
          return x * y

      sig = inspect.signature(multiply)
      doc = inspect.getdoc(multiply)

      documentation = {
          'name': multiply.__name__,
          'signature': str(sig),
          'docstring': doc,
          'parameters': list(sig.parameters.keys())
      }

      documentation
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '검증 루프: 플러그인 계약 검사'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: inspect의 실무 가치는 런타임 객체를 들여다본 뒤 계약을 자동 검증하는 데 있습니다. 함수 시그니처, 타입 힌트, docstring, 공개 메서드 목록을 검사하면 플러그인이나 자동화 훅을 실행 전에 걸러낼 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import inspect
    from typing import get_type_hints

    def validateAction(func):
        sig = inspect.signature(func)
        parameters = list(sig.parameters.values())
        hints = get_type_hints(func)

        assert len(parameters) >= 2, 'payload와 context 인자가 필요합니다'
        assert parameters[0].name == 'payload', '첫 번째 인자는 payload여야 합니다'
        assert parameters[1].name == 'context', '두 번째 인자는 context여야 합니다'
        assert hints.get('payload') is dict, 'payload 타입 힌트는 dict여야 합니다'
        assert hints.get('context') is dict, 'context 타입 힌트는 dict여야 합니다'
        assert hints.get('return') is dict, '반환 타입 힌트는 dict여야 합니다'

        return {
            'name': func.__name__,
            'signature': str(sig),
            'requiredParameters': [param.name for param in parameters[:2]]
        }

    def normalizeOrder(payload: dict, context: dict) -> dict:
        return {'orderId': payload['id'], 'source': context['source']}

    actionReport = validateAction(normalizeOrder)

    assert actionReport['requiredParameters'] == ['payload', 'context']
    actionReport
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import inspect
      from typing import get_type_hints

      def validateAction(func):
          sig = inspect.signature(func)
          parameters = list(sig.parameters.values())
          hints = get_type_hints(func)

          assert len(parameters) >= 2, 'payload와 context 인자가 필요합니다'
          assert parameters[0].name == 'payload', '첫 번째 인자는 payload여야 합니다'
          assert parameters[1].name == 'context', '두 번째 인자는 context여야 합니다'
          assert hints.get('payload') is dict, 'payload 타입 힌트는 dict여야 합니다'
          assert hints.get('context') is dict, 'context 타입 힌트는 dict여야 합니다'
          assert hints.get('return') is dict, '반환 타입 힌트는 dict여야 합니다'

          return {
              'name': func.__name__,
              'signature': str(sig),
              'requiredParameters': [param.name for param in parameters[:2]]
          }

      def normalizeOrder(payload: dict, context: dict) -> dict:
          return {'orderId': payload['id'], 'source': context['source']}

      actionReport = validateAction(normalizeOrder)

      assert actionReport['requiredParameters'] == ['payload', 'context']
      actionReport
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
