- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 테스트 패턴
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실제 프로젝트에서 자주 사용되는 테스트 패턴들입니다.

    실제 프로젝트에서는 테스트 파일을 tests/ 디렉토리에 분리하고, python -m unittest discover로 자동 실행합니다.
  tips:
  - 실제 프로젝트에서는 테스트 파일을 tests/ 디렉토리에 분리하고, python -m unittest discover로 자동 실행합니다.
  snippet: |-
    import unittest

    class Calculator:
        def add(self, a, b):
            return a + b
        def subtract(self, a, b):
            return a - b

    class CalculatorTest(unittest.TestCase):
        def setUp(self):
            self.calc = Calculator()

        def testAdd(self):
            self.assertEqual(self.calc.add(2, 3), 5)

        def testSubtract(self):
            self.assertEqual(self.calc.subtract(10, 3), 7)

    loader16 = unittest.TestLoader().loadTestsFromTestCase(CalculatorTest)
    runner16 = unittest.TextTestRunner(verbosity=0)
    result16 = runner16.run(loader16)

    result16.wasSuccessful()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
