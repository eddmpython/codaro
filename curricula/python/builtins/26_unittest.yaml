                  normalizeEmail('missing-domain')

      passResult, passOutput = runTestCase(EmailValidationPassTest)
      assert passResult.wasSuccessful()
      assert passResult.testsRun == 2
      passResult.wasSuccessful()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
