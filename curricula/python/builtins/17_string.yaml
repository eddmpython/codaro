  explanation: |-
    string은 파이썬 표준 라이브러리입니다. 문자열 처리에 유용한 상수와 도구를 제공하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 string 모듈을 사용할 수 있습니다.
  tips:
