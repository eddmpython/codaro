    실무에서 자주 사용하는 string 모듈 활용 패턴을 살펴봅니다. 비밀번호 생성, 입력 검증, 이메일 템플릿, 식별자 생성 등 다양한 시나리오에서 string을 효과적으로 사용할 수 있습니다.

    보안이 중요한 비밀번호 생성은 secrets.choice()를 사용하세요.
