      class WorkflowJsonFormatter(logging.Formatter):
          def format(self, record):
              data = {
                  'level': record.levelname,
                  'logger': record.name,
                  'message': record.getMessage(),
                  'requestId': getattr(record, 'requestId', 'unknown')
              }
              return json.dumps(data, ensure_ascii=False, sort_keys=True)

      logStream = io.StringIO()
      workflowLogger = logging.getLogger('codaro.curriculum.workflow')
      workflowLogger.handlers.clear()
      workflowLogger.propagate = False
      workflowLogger.setLevel(logging.INFO)

      streamHandler = logging.StreamHandler(logStream)
      streamHandler.setFormatter(WorkflowJsonFormatter())
      workflowLogger.addHandler(streamHandler)

      workflowLogger.info('lesson verified', extra={'requestId': 'req-001'})
      firstLogLine = logStream.getvalue().strip()
      parsedLog = json.loads(firstLogLine)

      assert parsedLog['level'] == 'INFO'
      assert parsedLog['requestId'] == 'req-001'
      parsedLog
