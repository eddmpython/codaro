- id: advanced_patterns
  title: 고급 패턴
  structuredPrimary: true
  subtitle: 실전 로깅 기법
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실무에서 자주 사용되는 로깅 패턴과 기법들입니다.

    exc_info=True를 사용하면 예외의 전체 스택 트레이스가 자동으로 로그에 기록됩니다.
  tips:
  - exc_info=True를 사용하면 예외의 전체 스택 트레이스가 자동으로 로그에 기록됩니다.
  snippet: |-
    import logging

    exceptionLogger = logging.getLogger('exception')
    exceptionLogger.setLevel(logging.ERROR)

    handler4 = logging.StreamHandler()
    handler4.setFormatter(logging.Formatter('%(levelname)s: %(message)s'))
    exceptionLogger.addHandler(handler4)

    try:
        result = 10 / 0
    except ZeroDivisionError:
        exceptionLogger.error('나누기 에러', exc_info=True)

    "Exception logged"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import logging

      exceptionLogger = logging.getLogger('exception')
      exceptionLogger.setLevel(logging.ERROR)

      handler4 = logging.StreamHandler()
      handler4.setFormatter(logging.Formatter('%(levelname)s: %(message)s'))
      exceptionLogger.addHandler(handler4)

      try:
          result = 10 / 0
      except ZeroDivisionError:
          exceptionLogger.error('나누기 에러', exc_info=True)

      "Exception logged"
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practical
  title: 실전 활용
  structuredPrimary: true
  subtitle: 실무 로깅 시나리오
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    실제 애플리케이션에서 사용되는 로깅 패턴들입니다.

    구조화된 로그(JSON)는 로그 분석 도구에서 파싱하기 쉽고, 검색과 집계가 용이합니다.
  tips:
  - 구조화된 로그(JSON)는 로그 분석 도구에서 파싱하기 쉽고, 검색과 집계가 용이합니다.
  snippet: |-
    import logging

    apiLogger = logging.getLogger('api')
    apiLogger.setLevel(logging.INFO)

    handler6 = logging.StreamHandler()
    handler6.setFormatter(logging.Formatter('[%(asctime)s] %(levelname)s: %(message)s'))
    apiLogger.addHandler(handler6)

    def apiCall(endpoint, method='GET'):
        apiLogger.info(f'{method} {endpoint}')
        apiLogger.debug(f'Headers: {{"Authorization": "Bearer xxx"}}')
        return {'status': 200}

    response = apiCall('/users', 'GET')
    response
  exercise:
