- id: loggers
  title: 로거 계층
  structuredPrimary: true
  subtitle: 모듈별 로거 관리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    getLogger()로 이름별 로거를 생성하여 모듈이나 기능별로 로그를 분리 관리할 수 있습니다.

    로거 이름은 보통 __name__을 사용하여 모듈명을 자동으로 설정합니다: logging.getLogger(__name__)
  tips:
  - '로거 이름은 보통 __name__을 사용하여 모듈명을 자동으로 설정합니다: logging.getLogger(__name__)'
  snippet: |-
    import logging

    appLogger = logging.getLogger('app')
    appLogger.setLevel(logging.INFO)

    handler1 = logging.StreamHandler()
    handler1.setFormatter(logging.Formatter('APP: %(message)s'))
    appLogger.addHandler(handler1)

    appLogger.info('애플리케이션 로그')

    "Named logger"
