sections:
- id: module_import
  title: struct 모듈 불러오기
  structuredPrimary: true
  subtitle: ⚠️ 가장 먼저 실행하세요
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    struct는 파이썬 표준 라이브러리입니다. Python 값과 C 구조체 형태의 바이너리 데이터 간 변환을 제공하는 모듈입니다. 별도 설치 없이 import만으로 사용할 수 있습니다.

    이 섹션을 먼저 실행하면 아래 모든 예제에서 struct 모듈을 사용할 수 있습니다.
  tips:
  - 이 섹션을 먼저 실행하면 아래 모든 예제에서 struct 모듈을 사용할 수 있습니다.
  snippet: |-
    import struct
    import tempfile
    from pathlib import Path

    structScratch = Path(tempfile.gettempdir()) / 'codaro_struct_scratch'
    structScratch.mkdir(parents=True, exist_ok=True)

    'struct 모듈이 정상적으로 로드되었습니다'
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import struct
      import tempfile
      from pathlib import Path

      structScratch = Path(tempfile.gettempdir()) / 'codaro_struct_scratch'
      structScratch.mkdir(parents=True, exist_ok=True)

      'struct 모듈이 정상적으로 로드되었습니다'
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: basic_packing
  title: 바이너리로 변환
  structuredPrimary: true
  subtitle: pack으로 인코딩
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    struct.pack()은 Python 값을 바이너리 데이터로 변환합니다. 포맷 문자열로 데이터 타입과 순서를 지정하면 C 구조체처럼 메모리에 바이트로 배치됩니다. 네트워크 프로토콜, 바이너리 파일 포맷, 임베디드 시스템 통신에 필수적입니다.

    포맷 문자: i=정수(4바이트), f=float(4바이트), d=double(8바이트), c=문자(1바이트)
  tips:
  - '포맷 문자: i=정수(4바이트), f=float(4바이트), d=double(8바이트), c=문자(1바이트)'
  snippet: |-
    numberValue = 42
    packedInt = struct.pack('i', numberValue)
    packedInt
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      numberValue = 42
      packedInt = struct.pack('i', numberValue)
      packedInt
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: basic_unpacking
  title: 바이너리 읽기
  structuredPrimary: true
  subtitle: unpack으로 디코딩
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    struct.unpack()은 바이너리 데이터를 Python 값으로 변환합니다. pack()과 동일한 포맷 문자열을 사용하여 바이트를 해석하고 튜플로 반환합니다. 바이너리 파일 읽기, 네트워크 패킷 파싱, 프로토콜 디코딩에 활용됩니다.

    unpack()은 항상 튜플을 반환하므로 단일 값도 [0]으로 접근해야 합니다.
  tips:
  - unpack()은 항상 튜플을 반환하므로 단일 값도 [0]으로 접근해야 합니다.
  snippet: |-
    binaryData = struct.pack('i', 100)
    unpackedInt = struct.unpack('i', binaryData)
    unpackedInt[0]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      binaryData = struct.pack('i', 100)
      unpackedInt = struct.unpack('i', binaryData)
      unpackedInt[0]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: format_strings
  title: 포맷 문자열
  structuredPrimary: true
  subtitle: 데이터 타입 지정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    포맷 문자열은 데이터의 타입, 크기, 순서를 지정합니다. c는 1바이트 문자, h는 2바이트 정수, i는 4바이트 정수, f는 4바이트 실수입니다. 반복 횟수를 숫자로 지정할 수 있으며, 다양한 타입을 조합하여 복잡한 구조체를 표현합니다.

    포맷과 실제 데이터 개수가 일치하지 않으면 에러가 발생합니다.
  tips:
  - 포맷과 실제 데이터 개수가 일치하지 않으면 에러가 발생합니다.
  snippet: |-
    mixedData = struct.pack('cif', b'A', 42, 3.14)
    len(mixedData)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      mixedData = struct.pack('cif', b'A', 42, 3.14)
      len(mixedData)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: byte_order
  title: 바이트 순서
  structuredPrimary: true
  subtitle: 엔디안 지정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    바이트 순서는 다중 바이트 값을 메모리에 저장하는 방식입니다. 네이티브(@), 리틀엔디안(<), 빅엔디안(>)을 포맷 앞에 지정할 수 있습니다. 네트워크 프로토콜은 보통 빅엔디안을 사용하며, Intel CPU는 리틀엔디안입니다.

    네트워크 통신에는 '>' 또는 '!'를 사용하여 플랫폼에 관계없이 일관된 바이트 순서를 유지하세요.
  tips:
  - 네트워크 통신에는 '>' 또는 '!'를 사용하여 플랫폼에 관계없이 일관된 바이트 순서를 유지하세요.
  snippet: |-
    nativeBytes = struct.pack('@i', 1000)
    nativeBytes
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      nativeBytes = struct.pack('@i', 1000)
      nativeBytes
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: advanced_formats
  title: 고급 포맷
  structuredPrimary: true
  subtitle: 문자열과 패딩
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    struct는 고정 길이 문자열과 패딩을 지원합니다. s는 고정 길이 문자열, x는 패딩 바이트를 나타냅니다. 바이너리 파일 헤더나 고정 크기 레코드를 다룰 때 유용하며, 메모리 정렬을 맞추는 데도 사용됩니다.

    문자열은 바이트 객체여야 하며, 길이가 부족하면 null 바이트로 채워집니다.
  tips:
  - 문자열은 바이트 객체여야 하며, 길이가 부족하면 null 바이트로 채워집니다.
  snippet: |-
    textBytes = struct.pack('10s', b'Hello')
    textBytes
  exercise:
