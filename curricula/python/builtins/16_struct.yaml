- id: workflow_validation
  title: '검증 루프: 바이너리 레코드 품질 게이트'
  structuredPrimary: true
  subtitle: 예측 → 실행 → 오류 수정 → 검증
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: struct는 바이트 길이와 엔디안이 하나만 어긋나도 데이터를 잘못 해석합니다. 여기서는 센서 패킷 포맷을 미리 정의하고, 잘린 패킷과 잘못된 매직 넘버를 실패시킨 뒤, 정상 레코드를 파일로 저장하고 다시 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    structWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_struct_workflow_'))
    packetFormat = '>4sBIfH'
    packetSize = struct.calcsize(packetFormat)
    magicBytes = b'CDRO'

    def encodeSensorPacket(sensorId, temperature, humidity):
        assert 0 <= humidity <= 100, 'humidity는 0~100 범위여야 합니다'
        return struct.pack(packetFormat, magicBytes, 1, sensorId, temperature, humidity)

    def decodeSensorPacket(packet):
        assert len(packet) == packetSize, '패킷 길이가 포맷과 다릅니다'
        magic, version, sensorId, temperature, humidity = struct.unpack(packetFormat, packet)
        assert magic == magicBytes, '매직 넘버가 다릅니다'
        assert version == 1, '지원하지 않는 버전입니다'
        return {
            'sensorId': sensorId,
            'temperature': round(temperature, 2),
            'humidity': humidity
        }

    sensorPacket = encodeSensorPacket(7, 23.5, 45)
    decodedSensor = decodeSensorPacket(sensorPacket)
    assert decodedSensor['sensorId'] == 7
    decodedSensor
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      structWorkflowRoot = Path(tempfile.mkdtemp(prefix='codaro_struct_workflow_'))
      packetFormat = '>4sBIfH'
      packetSize = struct.calcsize(packetFormat)
      magicBytes = b'CDRO'

      def encodeSensorPacket(sensorId, temperature, humidity):
          assert 0 <= humidity <= 100, 'humidity는 0~100 범위여야 합니다'
          return struct.pack(packetFormat, magicBytes, 1, sensorId, temperature, humidity)

      def decodeSensorPacket(packet):
          assert len(packet) == packetSize, '패킷 길이가 포맷과 다릅니다'
          magic, version, sensorId, temperature, humidity = struct.unpack(packetFormat, packet)
          assert magic == magicBytes, '매직 넘버가 다릅니다'
          assert version == 1, '지원하지 않는 버전입니다'
          return {
              'sensorId': sensorId,
              'temperature': round(temperature, 2),
              'humidity': humidity
          }

      sensorPacket = encodeSensorPacket(7, 23.5, 45)
      decodedSensor = decodeSensorPacket(sensorPacket)
      assert decodedSensor['sensorId'] == 7
      decodedSensor
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
