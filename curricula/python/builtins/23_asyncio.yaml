  blocks:
  - type: text
    content: asyncio.gather()와 asyncio.create_task()로 여러 비동기 작업을 동시에 실행할 수 있습니다.
  - type: list
    items:
    - 'gather(): 여러 코루틴 동시 실행'
    - 'create_task(): Task 객체 생성'
    - 'wait(): 완료 대기 (다양한 옵션)'
    - 'as_completed(): 완료되는 순서대로 처리'
  - type: code
    language: python
    title: gather로 동시 실행
    description: 여러 작업 한번에 실행
    content: |-
      import asyncio

      async def taskA():
          await asyncio.sleep(0.1)
          return "A done"

      async def taskB():
          await asyncio.sleep(0.1)
          return "B done"

      async def taskC():
          await asyncio.sleep(0.1)
          return "C done"

      async def runAllTasks():
