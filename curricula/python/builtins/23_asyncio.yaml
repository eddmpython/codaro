    content: |-
      import asyncio

      class AsyncCounter:
          def __init__(self, limit):
              self.limit = limit
              self.current = 0

          def __aiter__(self):
              return self

          async def __anext__(self):
              if self.current >= self.limit:
                  raise StopAsyncIteration
              await asyncio.sleep(0.01)
              self.current += 1
              return self.current

      async def iterateAsync():
          values = []
          async for num in AsyncCounter(5):
              values.append(num)
          return values

      iterResult = asyncio.run(iterateAsync())
      iterResult
