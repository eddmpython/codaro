      async def retryAsyncOperation(maxAttempts=4):
          attempts = []
          for attempt in range(1, maxAttempts + 1):
              try:
                  attempts.append(attempt)
                  if attempt < 3:
                      raise ConnectionError('temporary failure')
                  return {'status': 'ok', 'attempt': attempt, 'attempts': attempts}
              except ConnectionError:
                  if attempt == maxAttempts:
                      return {'status': 'failed', 'attempt': attempt, 'attempts': attempts}
                  await asyncio.sleep(0.01)

      retryCheck = asyncio.run(retryAsyncOperation())
      assert retryCheck['status'] == 'ok'
      assert retryCheck['attempt'] == 3
      retryCheck
