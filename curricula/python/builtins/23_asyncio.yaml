  - type: code
    language: python
    title: create_task 사용
    description: Task 객체로 제어
    content: |-
      import asyncio

      async def worker(name, delay):
          await asyncio.sleep(delay)
          return f"{name} completed"

      async def runTasks():
          task1 = asyncio.create_task(worker("Worker1", 0.1))
          task2 = asyncio.create_task(worker("Worker2", 0.05))

          result1 = await task1
          result2 = await task2
          return result1, result2

      taskResults = asyncio.run(runTasks())
      taskResults
  - type: code
    language: python
    title: as_completed 사용
    description: 완료 순서대로 처리
    content: |-
      import asyncio

      async def jobTask(jobId, duration):
          await asyncio.sleep(duration)
          return f"Job {jobId}"

      async def processJobs():
          jobs = [
              jobTask(1, 0.15),
              jobTask(2, 0.05),
              jobTask(3, 0.10)
          ]

          completedJobs = []
          for coro in asyncio.as_completed(jobs):
              result = await coro
              completedJobs.append(result)

          return completedJobs

      jobResults = asyncio.run(processJobs())
      jobResults
  - type: tip
    content: gather()는 모든 작업이 완료될 때까지 기다리고, as_completed()는 완료되는 순서대로 결과를 받을 수 있습니다.
- id: timeout_cancel
  title: 타임아웃과 취소
  structuredPrimary: true
  subtitle: 작업 제어
  goal: '타임아웃과 취소: 실행 가능한 Python 흐름으로 익힌다.'
  why: '타임아웃과 취소: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    asyncio.wait_for()로 타임아웃을 설정하고, task.cancel()로 작업을 취소할 수 있습니다.

    타임아웃은 네트워크 요청이나 외부 서비스 호출 시 필수적입니다. 무한 대기를 방지할 수 있습니다.
  tips:
  - 타임아웃은 네트워크 요청이나 외부 서비스 호출 시 필수적입니다. 무한 대기를 방지할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import asyncio

    async def slowOperation():
        await asyncio.sleep(1)
        return "Done"

    async def withTimeout():
        try:
            result = await asyncio.wait_for(slowOperation(), timeout=0.1)
            return result
        except asyncio.TimeoutError:
            return "Timeout occurred"

    timeoutResult = asyncio.run(withTimeout())
    timeoutResult
  exercise:
    prompt: '타임아웃과 취소: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
