- id: concurrent_tasks
  title: 동시 실행
  structuredPrimary: true
  subtitle: 여러 작업 병렬 처리
  goal: '동시 실행: 실행 가능한 Python 흐름으로 익힌다.'
  why: '동시 실행: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    asyncio.gather()와 asyncio.create_task()로 여러 비동기 작업을 동시에 실행할 수 있습니다.

    gather()는 모든 작업이 완료될 때까지 기다리고, as_completed()는 완료되는 순서대로 결과를 받을 수 있습니다.
  tips:
  - gather()는 모든 작업이 완료될 때까지 기다리고, as_completed()는 완료되는 순서대로 결과를 받을 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import asyncio

    async def taskA():
        await asyncio.sleep(0.1)
        return "A done"

    async def taskB():
        await asyncio.sleep(0.1)
        return "B done"

    async def taskC():
        await asyncio.sleep(0.1)
        return "C done"

    async def runAllTasks():
        return await asyncio.gather(taskA(), taskB(), taskC())

    results = asyncio.run(runAllTasks())
    results
  exercise:
    prompt: '동시 실행: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
