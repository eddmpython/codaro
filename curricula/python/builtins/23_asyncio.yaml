- id: timeout_cancel
  title: 타임아웃과 취소
  structuredPrimary: true
  subtitle: 작업 제어
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    asyncio.wait_for()로 타임아웃을 설정하고, task.cancel()로 작업을 취소할 수 있습니다.

    타임아웃은 네트워크 요청이나 외부 서비스 호출 시 필수적입니다. 무한 대기를 방지할 수 있습니다.
  tips:
  - 타임아웃은 네트워크 요청이나 외부 서비스 호출 시 필수적입니다. 무한 대기를 방지할 수 있습니다.
  snippet: |-
    import asyncio

    async def slowOperation():
        await asyncio.sleep(1)
        return "Done"

    async def withTimeout():
        try:
            result = await asyncio.wait_for(slowOperation(), timeout=0.1)
            return result
        except asyncio.TimeoutError:
            return "Timeout occurred"

    timeoutResult = asyncio.run(withTimeout())
    timeoutResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import asyncio

      async def slowOperation():
          await asyncio.sleep(1)
          return "Done"

      async def withTimeout():
          try:
              result = await asyncio.wait_for(slowOperation(), timeout=0.1)
              return result
          except asyncio.TimeoutError:
              return "Timeout occurred"

      timeoutResult = asyncio.run(withTimeout())
      timeoutResult
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: async_context
  title: 비동기 컨텍스트
  structuredPrimary: true
  subtitle: async with와 async for
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    async with로 비동기 컨텍스트 매니저를, async for로 비동기 이터레이터를 사용할 수 있습니다.

    async with와 async for는 파일 I/O, 데이터베이스 연결, 스트리밍 데이터 처리에 유용합니다.
  tips:
  - async with와 async for는 파일 I/O, 데이터베이스 연결, 스트리밍 데이터 처리에 유용합니다.
  snippet: |-
    import asyncio

    class AsyncResource:
        async def __aenter__(self):
            await asyncio.sleep(0.01)
            return "Resource acquired"

        async def __aexit__(self, exc_type, exc_val, exc_tb):
            await asyncio.sleep(0.01)
            return False

    async def useResource():
        async with AsyncResource() as res:
            return res

    resourceResult = asyncio.run(useResource())
    resourceResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import asyncio

      class AsyncResource:
          async def __aenter__(self):
              await asyncio.sleep(0.01)
              return "Resource acquired"

          async def __aexit__(self, exc_type, exc_val, exc_tb):
              await asyncio.sleep(0.01)
              return False

      async def useResource():
          async with AsyncResource() as res:
              return res

      resourceResult = asyncio.run(useResource())
      resourceResult
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
