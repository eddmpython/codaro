  - type: code
    language: python
    title: 작업 취소
    description: 실행 중인 작업 중단
    content: |-
      import asyncio

      async def longTask():
          try:
              await asyncio.sleep(1)
              return "Completed"
          except asyncio.CancelledError:
              return "Cancelled"

      async def cancelDemo():
          task = asyncio.create_task(longTask())
          await asyncio.sleep(0.05)
          task.cancel()

          try:
              result = await task
          except asyncio.CancelledError:
              result = "Task was cancelled"

          return result

      cancelResult = asyncio.run(cancelDemo())
      cancelResult
  - type: tip
    content: 타임아웃은 네트워크 요청이나 외부 서비스 호출 시 필수적입니다. 무한 대기를 방지할 수 있습니다.
- id: async_context
  title: 비동기 컨텍스트
  structuredPrimary: true
  subtitle: async with와 async for
  goal: '비동기 컨텍스트: 실행 가능한 Python 흐름으로 익힌다.'
  why: '비동기 컨텍스트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    async with로 비동기 컨텍스트 매니저를, async for로 비동기 이터레이터를 사용할 수 있습니다.

    async with와 async for는 파일 I/O, 데이터베이스 연결, 스트리밍 데이터 처리에 유용합니다.
  tips:
  - async with와 async for는 파일 I/O, 데이터베이스 연결, 스트리밍 데이터 처리에 유용합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import asyncio

    class AsyncResource:
        async def __aenter__(self):
            await asyncio.sleep(0.01)
            return "Resource acquired"

        async def __aexit__(self, exc_type, exc_val, exc_tb):
            await asyncio.sleep(0.01)
            return False

    async def useResource():
        async with AsyncResource() as res:
            return res

    resourceResult = asyncio.run(useResource())
    resourceResult
