      async def taskA():
          await asyncio.sleep(0.1)
          return "A done"

      async def taskB():
          await asyncio.sleep(0.1)
          return "B done"

      async def taskC():
          await asyncio.sleep(0.1)
          return "C done"

      async def runAllTasks():
          return await asyncio.gather(taskA(), taskB(), taskC())

      results = asyncio.run(runAllTasks())
      results
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
