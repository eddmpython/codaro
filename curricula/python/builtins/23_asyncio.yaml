- id: basic_async
  title: 기본 비동기 함수
  structuredPrimary: true
  subtitle: async/await 문법
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    async def로 비동기 함수를 정의하고 await로 비동기 작업을 대기합니다.

    await는 async 함수 내부에서만 사용하고, 로컬 스크립트에서는 asyncio.run()으로 시작 함수를 실행하면 재현성이 좋습니다.
  tips:
  - await는 async 함수 내부에서만 사용하고, 로컬 스크립트에서는 asyncio.run()으로 시작 함수를 실행하면 재현성이 좋습니다.
  snippet: |-
    import asyncio

    async def fetchData():
        await asyncio.sleep(0.1)
        return "Data loaded"

    output = asyncio.run(fetchData())
    output
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
