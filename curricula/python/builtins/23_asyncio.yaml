- id: concurrent_tasks
  title: 동시 실행
  structuredPrimary: true
  subtitle: 여러 작업 병렬 처리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    asyncio.gather()와 asyncio.create_task()로 여러 비동기 작업을 동시에 실행할 수 있습니다.

    gather()는 모든 작업이 완료될 때까지 기다리고, as_completed()는 완료되는 순서대로 결과를 받을 수 있습니다.
  tips:
  - gather()는 모든 작업이 완료될 때까지 기다리고, as_completed()는 완료되는 순서대로 결과를 받을 수 있습니다.
  snippet: |-
    import asyncio

    async def taskA():
        await asyncio.sleep(0.1)
        return "A done"

    async def taskB():
        await asyncio.sleep(0.1)
        return "B done"

    async def taskC():
        await asyncio.sleep(0.1)
        return "C done"

    async def runAllTasks():
        return await asyncio.gather(taskA(), taskB(), taskC())

    results = asyncio.run(runAllTasks())
    results
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
