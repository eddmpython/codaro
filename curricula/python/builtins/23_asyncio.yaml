- id: error_handling
  title: 예외 처리
  structuredPrimary: true
  subtitle: 비동기 에러 핸들링
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    비동기 함수에서도 일반적인 try-except 문법을 사용하여 예외를 처리할 수 있습니다.

    return_exceptions=True를 사용하면 예외가 발생해도 다른 작업이 계속 실행되고, 예외는 결과 리스트에 포함됩니다.
  tips:
  - return_exceptions=True를 사용하면 예외가 발생해도 다른 작업이 계속 실행되고, 예외는 결과 리스트에 포함됩니다.
  snippet: |-
    import asyncio

    async def riskyOperation(shouldFail):
        await asyncio.sleep(0.01)
        if shouldFail:
            raise ValueError("Operation failed")
        return "Success"

    async def handleError():
        try:
            result = await riskyOperation(True)
            return result
        except ValueError as e:
            return f"Error: {e}"

    errorResult = asyncio.run(handleError())
    errorResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
