  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 종합 연습
  structuredPrimary: true
  subtitle: 수학 알고리즘 실습
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Day 28에서 배운 수학 알고리즘을 난이도별로 복습합니다. GCD, 소수 판별, 에라토스테네스의 체는 정수론의 기초이며, 모듈러 연산과 빠른 거듭제곱은 암호학의 기반입니다. 조합론과 확률은 경우의 수 문제와 시뮬레이션에 필수적입니다. 🟢 기본 문제로 완전수, 약수 합, 소인수분해 등을 구현하고, 🟡 응용 문제로 확장 유클리드, 중국인의 나머지 정리를 연습하세요. 🔴 심화 문제에서는 밀러-라빈 소수 판별, 폴라드 로 인수분해 등 고급 알고리즘을 직접 구현해봅니다. 수학 알고리즘은 코딩 테스트와 암호학에서 핵심 역할을 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def isPerfect(n):
        if n < 2:
            return False
        divSum = 1
        i = 2
        while i * i <= n:
            if n % i == 0:
                divSum += i
                if i != n // i:
                    divSum += n // i
            i += 1
        return divSum == n

    ex1Result = [n for n in range(1, 1000) if isPerfect(n)]
    ex1Result
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
