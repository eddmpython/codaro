    resultCheck: 출력 또는 assert 확인
- id: matrix
  title: 행렬 연산
  structuredPrimary: true
  subtitle: 행렬 곱셈과 거듭제곱
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 행렬 거듭제곱으로 피보나치를 O(log n)에 계산합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def matMul(a, b):
        rows = len(a)
        cols = len(b[0])
        inner = len(b)
        result = [[0] * cols for _ in range(rows)]
        for i in range(rows):
            for j in range(cols):
                for k in range(inner):
                    result[i][j] += a[i][k] * b[k][j]
        return result

    matA = [[1, 2], [3, 4]]
    matB = [[5, 6], [7, 8]]
    matMulResult = matMul(matA, matB)
    matMulResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
