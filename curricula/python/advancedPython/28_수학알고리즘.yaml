- id: gcd_lcm
  title: GCD와 LCM
  structuredPrimary: true
  subtitle: 유클리드 알고리즘
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: '유클리드 알고리즘: gcd(a, b) = gcd(b, a % b), b가 0이면 a 반환.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def gcd(a, b):
        while b:
            a, b = b, a % b
        return a

    def lcm(a, b):
        return a * b // gcd(a, b)

    gcdVal = gcd(48, 18)
    lcmVal = lcm(12, 18)
    glResult = (gcdVal, lcmVal)
    glResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def gcd(a, b):
          while b:
              a, b = b, a % b
          return a

      def lcm(a, b):
          return a * b // gcd(a, b)

      gcdVal = gcd(48, 18)
      lcmVal = lcm(12, 18)
      glResult = (gcdVal, lcmVal)
      glResult
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: combinatorics
  title: 조합론
  structuredPrimary: true
  subtitle: 순열, 조합, 이항계수
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: nPr = n!/(n-r)!, nCr = n!/r!(n-r)!
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def factorial(n):
        if n <= 1:
            return 1
        result = 1
        for i in range(2, n + 1):
            result *= i
        return result

    def perm(n, r):
        return factorial(n) // factorial(n - r)

    def comb(n, r):
        return factorial(n) // (factorial(r) * factorial(n - r))

    factVal = factorial(10)
    permVal = perm(5, 3)
    combVal = comb(10, 3)
    combResult = (factVal, permVal, combVal)
    combResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
