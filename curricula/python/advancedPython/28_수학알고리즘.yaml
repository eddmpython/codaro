- id: modular
  title: 모듈러 연산
  structuredPrimary: true
  subtitle: 빠른 거듭제곱
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 큰 수의 거듭제곱을 효율적으로 계산. O(log n).
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def modPow(base, exp, mod):
        result = 1
        base = base % mod
        while exp > 0:
            if exp % 2 == 1:
                result = (result * base) % mod
            exp = exp >> 1
            base = (base * base) % mod
        return result

    MOD = 1000000007
    mpResult = modPow(2, 100, MOD)
    mpResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def modPow(base, exp, mod):
          result = 1
          base = base % mod
          while exp > 0:
              if exp % 2 == 1:
                  result = (result * base) % mod
              exp = exp >> 1
              base = (base * base) % mod
          return result

      MOD = 1000000007
      mpResult = modPow(2, 100, MOD)
      mpResult
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
