- id: algorithm
  title: 알고리즘 선택
  structuredPrimary: true
  subtitle: 문제에 맞는 최적 알고리즘
  goal: '알고리즘 선택: 실행 가능한 Python 흐름으로 익힌다.'
  why: '알고리즘 선택: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 정렬된 배열에서는 이진 탐색 O(log n)이 선형 탐색 O(n)보다 빠릅니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def linearSrch(arr, target):
        for i, val in enumerate(arr):
            if val == target:
                return i
        return -1

    def binarySrch(arr, target):
        left, right = 0, len(arr) - 1
        while left <= right:
            mid = (left + right) // 2
            if arr[mid] == target:
                return mid
            elif arr[mid] < target:
                left = mid + 1
            else:
                right = mid - 1
        return -1

    srchArr = list(range(1000))
    srchTarget = 750
    srchLinear = linearSrch(srchArr, srchTarget)
    srchBinary = binarySrch(srchArr, srchTarget)
    srchResult = (srchLinear, srchBinary)
    srchResult
  exercise:
    prompt: '알고리즘 선택: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
