      def filterLoop(nums):
          result = []
          for n in nums:
              if n % 2 == 0:
                  result.append(n ** 2)
          return result

      def filterComp(nums):
          return [n ** 2 for n in nums if n % 2 == 0]

      ex3Nums = list(range(20))
