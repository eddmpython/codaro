      def processSlow(data):
          filtered = []
          for item in data:
              if item > 0:
                  filtered.append(item)
          squared = []
          for item in filtered:
              squared.append(item ** 2)
          total = 0
          for item in squared:
              total += item
          return total

      def processFast(data):
          return sum(x ** 2 for x in data if x > 0)

      ex15Data = [-5, 3, -2, 7, 0, 4, -1, 8]
