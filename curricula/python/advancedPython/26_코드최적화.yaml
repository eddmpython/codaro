- id: algorithm
  title: 알고리즘 선택
  structuredPrimary: true
  subtitle: 문제에 맞는 최적 알고리즘
  goal: 알고리즘 선택에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 정렬된 배열에서는 이진 탐색 O(log n)이 선형 탐색 O(n)보다 빠릅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def linearSrch(arr, target):
        for i, val in enumerate(arr):
            if val == target:
                return i
        return -1

    def binarySrch(arr, target):
        left, right = 0, len(arr) - 1
        while left <= right:
            mid = (left + right) // 2
            if arr[mid] == target:
                return mid
            elif arr[mid] < target:
                left = mid + 1
            else:
                right = mid - 1
        return -1

    srchArr = list(range(1000))
    srchTarget = 750
    srchLinear = linearSrch(srchArr, srchTarget)
    srchBinary = binarySrch(srchArr, srchTarget)
    srchResult = (srchLinear, srchBinary)
    srchResult
  exercise:
    prompt: 알고리즘 선택 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def linearSrch(arr, target):
          for i, val in enumerate(arr):
              if val == target:
                  return i
          return -1

      def binarySrch(arr, target):
          left, right = 0, len(arr) - 1
          while left <= right:
              mid = (left + right) // 2
              if arr[mid] == target:
                  return mid
              elif arr[mid] < target:
                  left = mid + 1
              else:
                  right = mid - 1
          return -1

      srchArr = list(range(1000))
      srchTarget = 750
      srchLinear = linearSrch(srchArr, srchTarget)
      srchBinary = binarySrch(srchArr, srchTarget)
      srchResult = (srchLinear, srchBinary)
      srchResult
    hints:
    - 알고리즘 선택 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
