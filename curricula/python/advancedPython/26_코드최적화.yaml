      def maxSumSlow(arr, k):
          maxSum = float('-inf')
          for i in range(len(arr) - k + 1):
              windowSum = sum(arr[i:i+k])
              maxSum = max(maxSum, windowSum)
          return maxSum

      def maxSumFast(arr, k):
          windowSum = sum(arr[:k])
          maxSum = windowSum
          for i in range(k, len(arr)):
              windowSum = windowSum - arr[i-k] + arr[i]
              maxSum = max(maxSum, windowSum)
          return maxSum

