    code: |-
      def maxSumSlow(nums, k):
          maxVal = float('-inf')
          for i in range(len(nums) - k + 1):
              maxVal = max(maxVal, sum(nums[i:i + k]))
          return maxVal

      def maxSumFast(nums, k):
          winSum = sum(nums[:k])
          maxVal = winSum
          for i in range(k, len(nums)):
              winSum = winSum - nums[i - k] + nums[i]
              maxVal = max(maxVal, winSum)
          return maxVal

      ex7Nums = [1, 4, 2, 10, 23, 3, 1, 0, 20]
      ex7Slow = maxSumSlow(ex7Nums, 4)
      ex7Fast = maxSumFast(ex7Nums, 4)
      ex7Result = (ex7Slow, ex7Fast)
      ex7Result
