    resultCheck: 알고리즘 선택에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: caching
  title: 캐싱과 메모이제이션
  structuredPrimary: true
  subtitle: 반복 계산 방지
  goal: 캐싱과 메모이제이션에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 같은 입력에 대한 결과를 저장해두면 재계산을 피할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from functools import lru_cache

    def fibNoCache(n):
        if n <= 1:
            return n
        return fibNoCache(n - 1) + fibNoCache(n - 2)

    @lru_cache(maxsize=None)
    def fibCached(n):
        if n <= 1:
            return n
        return fibCached(n - 1) + fibCached(n - 2)

    fibNc = fibNoCache(20)
    fibC = fibCached(30)
    fibInfo = fibCached.cache_info()
    fibResult = (fibNc, fibC, fibInfo.hits)
    fibResult
  exercise:
    prompt: 캐싱과 메모이제이션 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
