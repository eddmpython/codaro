- id: time_complexity
  title: 시간 복잡도 개선
  structuredPrimary: true
  subtitle: O(n²)에서 O(n)으로
  goal: '시간 복잡도 개선: 실행 가능한 Python 흐름으로 익힌다.'
  why: '시간 복잡도 개선: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Set을 활용하면 in 연산이 O(1)이 되어 전체 복잡도가 개선됩니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
