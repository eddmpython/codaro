      def dedupSlow(lst):
          result = []
          for item in lst:
              if item not in result:
                  result.append(item)
          return result

      def dedupFast(lst):
          seen = set()
          result = []
          for item in lst:
              if item not in seen:
                  seen.add(item)
                  result.append(item)
          return result

      ex1Data = [1, 2, 2, 3, 3, 3, 4]
      ex1Slow = dedupSlow(ex1Data)
      ex1Fast = dedupFast(ex1Data)
      ex1Result = (ex1Slow, ex1Fast)
      ex1Result
