      def searchSlow(arr, target):
          for i, val in enumerate(arr):
              if val == target:
                  return i
          return -1

      def searchFast(arr, target):
          left, right = 0, len(arr) - 1
          while left <= right:
              mid = (left + right) // 2
              if arr[mid] == target:
                  return mid
              elif arr[mid] < target:
                  left = mid + 1
              else:
                  right = mid - 1
          return -1

      ex19Arr = list(range(0, 10000, 2))
      ex19Slow = searchSlow(ex19Arr, 8888)
      ex19Fast = searchFast(ex19Arr, 8888)
      ex19Result = (ex19Slow, ex19Fast)
      ex19Result
