      def rangeSumSlow(nums, queries):
          results = []
          for start, end in queries:
              results.append(sum(nums[start:end + 1]))
          return results

      def rangeSumFast(nums, queries):
          prefix = [0]
          for num in nums:
              prefix.append(prefix[-1] + num)
          results = []
          for start, end in queries:
              results.append(prefix[end + 1] - prefix[start])
          return results

      ex6Nums = [1, 2, 3, 4, 5]
      ex6Queries = [(0, 2), (1, 3), (0, 4)]
      ex6Slow = rangeSumSlow(ex6Nums, ex6Queries)
      ex6Fast = rangeSumFast(ex6Nums, ex6Queries)
      ex6Result = (ex6Slow, ex6Fast)
      ex6Result
