sections:
- id: time_complexity
  title: 시간 복잡도 개선
  structuredPrimary: true
  subtitle: O(n²)에서 O(n)으로
  goal: 시간 복잡도 개선에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: Set을 활용하면 in 연산이 O(1)이 되어 전체 복잡도가 개선됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def findDupSlow(nums):
        dups = []
        for i in range(len(nums)):
            for j in range(i + 1, len(nums)):
                if nums[i] == nums[j] and nums[i] not in dups:
                    dups.append(nums[i])
        return dups

    def findDupFast(nums):
        seen = set()
        dups = set()
        for num in nums:
            if num in seen:
                dups.add(num)
            seen.add(num)
        return list(dups)

    tcNums = [1, 2, 3, 2, 4, 3, 5]
    tcSlow = findDupSlow(tcNums)
    tcFast = findDupFast(tcNums)
    tcResult = (tcSlow, tcFast)
    tcResult
  exercise:
    prompt: 시간 복잡도 개선 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def findDupSlow(nums):
          dups = []
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] == nums[j] and nums[i] not in dups:
                      dups.append(nums[i])
          return dups

      def findDupFast(nums):
          seen = set()
          dups = set()
          for num in nums:
              if num in seen:
                  dups.add(num)
              seen.add(num)
          return list(dups)

      tcNums = [1, 2, 3, 2, 4, 3, 5]
      tcSlow = findDupSlow(tcNums)
      tcFast = findDupFast(tcNums)
      tcResult = (tcSlow, tcFast)
      tcResult
    hints:
    - 시간 복잡도 개선 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 시간 복잡도 개선 코드가 예외 없이 끝나야 합니다.
    resultCheck: 시간 복잡도 개선에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
