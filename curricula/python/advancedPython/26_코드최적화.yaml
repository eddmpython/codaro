      def pairSumSlow(arr, target):
          for i in range(len(arr)):
              for j in range(i + 1, len(arr)):
                  if arr[i] + arr[j] == target:
                      return [i, j]
          return []

      def pairSumFast(arr, target):
          left, right = 0, len(arr) - 1
          while left < right:
              total = arr[left] + arr[right]
              if total == target:
                  return [left, right]
              elif total < target:
                  left += 1
              else:
                  right -= 1
          return []

      ex8Arr = [1, 2, 3, 4, 5, 6, 7, 8, 9]
      ex8Slow = pairSumSlow(ex8Arr, 10)
      ex8Fast = pairSumFast(ex8Arr, 10)
      ex8Result = (ex8Slow, ex8Fast)
      ex8Result
