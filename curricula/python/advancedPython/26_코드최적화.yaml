  why: '현업 흐름 검증: 중복 주문 탐지 최적화: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    최적화는 빠를 것 같은 코드를 고르는 일이 아닙니다. 먼저 느린 기준 구현과 빠른 구현이 같은 결과를 내는지 확인하고, 반복 횟수나 캐시 hit처럼 측정 가능한 신호를 비교하세요.

    변주 실험
    주문 ID가 10만 개일 때도 결과가 같아야 합니다. 테스트 데이터 크기만 키워도 느린 구현과 빠른 구현의 작업량 차이가 어떻게 커지는지 확인하세요.
  tips:
  - 변주 실험 주문 ID가 10만 개일 때도 결과가 같아야 합니다. 테스트 데이터 크기만 키워도 느린 구현과 빠른 구현의 작업량 차이가 어떻게 커지는지 확인하세요.
