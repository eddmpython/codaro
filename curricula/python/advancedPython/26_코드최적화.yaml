      def climbSlow(n):
          if n <= 2:
              return n
          return climbSlow(n - 1) + climbSlow(n - 2)

      def climbFast(n):
          if n <= 2:
              return n
          prev2, prev1 = 1, 2
          for _ in range(3, n + 1):
              curr = prev2 + prev1
              prev2 = prev1
              prev1 = curr
          return prev1

      ex10Fast = climbFast(20)
      ex10Result = ex10Fast
      ex10Result
