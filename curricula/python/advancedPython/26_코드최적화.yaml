      def groupSlow(items, keyFn):
          result = {}
          for item in items:
              key = keyFn(item)
              if key not in result:
                  result[key] = []
              result[key].append(item)
          return result

      from collections import defaultdict
      def groupFast(items, keyFn):
          result = defaultdict(list)
          for item in items:
              result[keyFn(item)].append(item)
          return dict(result)

      ex13Words = ["apple", "banana", "apricot", "blueberry"]
      ex13Slow = groupSlow(ex13Words, lambda x: x[0])
      ex13Fast = groupFast(ex13Words, lambda x: x[0])
      ex13Result = (ex13Slow, ex13Fast)
      ex13Result
