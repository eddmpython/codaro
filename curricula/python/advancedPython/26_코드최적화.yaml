    title: Two Sum 최적화
    description: 해시맵으로 보수 찾기
    content: |-
      def twoSumSlow(nums, target):
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] + nums[j] == target:
                      return [i, j]
          return []

      def twoSumFast(nums, target):
          numMap = {}
          for i, num in enumerate(nums):
              comp = target - num
              if comp in numMap:
                  return [numMap[comp], i]
              numMap[num] = i
          return []

      tsArr = [2, 7, 11, 15]
      tsSlow = twoSumSlow(tsArr, 9)
      tsFast = twoSumFast(tsArr, 9)
      tsResult = (tsSlow, tsFast)
      tsResult
