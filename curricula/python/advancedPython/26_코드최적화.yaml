      def countPairsSlow(arr, target):
          count = 0
          for i in range(len(arr)):
              for j in range(i+1, len(arr)):
                  if arr[i] + arr[j] == target:
                      count += 1
          return count

      from collections import Counter
      def countPairsFast(arr, target):
          count = 0
          seen = Counter()
          for num in arr:
              complement = target - num
              count += seen[complement]
              seen[num] += 1
          return count

      ex18Arr = [1, 5, 7, 1, 5, 3, 3, 2]
      ex18Slow = countPairsSlow(ex18Arr, 6)
      ex18Fast = countPairsFast(ex18Arr, 6)
