                comparisons += 1
                if orderId == previous and orderId not in duplicates:
                    duplicates.append(orderId)
        return duplicates, comparisons

    def findDuplicatesFast(orderIds):
        if not isinstance(orderIds, list):
            raise TypeError("orderIds must be a list")
        seen = set()
        duplicates = []
        checks = 0
        for orderId in orderIds:
            checks += 1
            if orderId in seen and orderId not in duplicates:
                duplicates.append(orderId)
            seen.add(orderId)
        return duplicates, checks

