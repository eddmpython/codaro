- id: hashtable
  title: 해시 테이블
  structuredPrimary: true
  subtitle: 키-값 저장소
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    해시 테이블은 키를 해시 함수로 변환하여 값을 저장합니다. 평균 O(1) 시간에 조회/삽입/삭제가 가능합니다. 충돌은 체이닝 또는 개방 주소법으로 해결합니다. LRU 캐시는 해시 테이블과 연결 리스트를 조합합니다.

    functools.lru_cache 데코레이터로 함수 결과를 캐싱할 수 있습니다.
  tips:
  - functools.lru_cache 데코레이터로 함수 결과를 캐싱할 수 있습니다.
  snippet: |-
    class HashTable:
        def __init__(self, size=10):
            self.size = size
            self.buckets = [[] for _ in range(size)]

        def _hash(self, key):
            return hash(key) % self.size

        def put(self, key, value):
            idx = self._hash(key)
            for i, (k, v) in enumerate(self.buckets[idx]):
                if k == key:
                    self.buckets[idx][i] = (key, value)
                    return
            self.buckets[idx].append((key, value))

        def get(self, key):
            idx = self._hash(key)
            for k, v in self.buckets[idx]:
                if k == key:
                    return v
            return None

        def remove(self, key):
            idx = self._hash(key)
            for i, (k, v) in enumerate(self.buckets[idx]):
                if k == key:
                    del self.buckets[idx][i]
                    return True
            return False

    htable = HashTable()
    htable.put("name", "Alice")
    htable.put("age", 30)
    htable.put("city", "Seoul")
    htGet1 = htable.get("name")
    htGet2 = htable.get("age")
    htable.remove("age")
    htGet3 = htable.get("age")
    (htGet1, htGet2, htGet3)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class HashTable:
          def __init__(self, size=10):
              self.size = size
              self.buckets = [[] for _ in range(size)]

          def _hash(self, key):
              return hash(key) % self.size

          def put(self, key, value):
              idx = self._hash(key)
              for i, (k, v) in enumerate(self.buckets[idx]):
                  if k == key:
                      self.buckets[idx][i] = (key, value)
                      return
              self.buckets[idx].append((key, value))

          def get(self, key):
              idx = self._hash(key)
              for k, v in self.buckets[idx]:
                  if k == key:
                      return v
              return None

          def remove(self, key):
              idx = self._hash(key)
              for i, (k, v) in enumerate(self.buckets[idx]):
                  if k == key:
                      del self.buckets[idx][i]
                      return True
              return False

      htable = HashTable()
      htable.put("name", "Alice")
      htable.put("age", 30)
      htable.put("city", "Seoul")
      htGet1 = htable.get("name")
      htGet2 = htable.get("age")
      htable.remove("age")
      htGet3 = htable.get("age")
      (htGet1, htGet2, htGet3)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
