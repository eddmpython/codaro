- id: queue
  title: 큐 구현
  structuredPrimary: true
  subtitle: FIFO 구조
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    큐는 선입선출(FIFO) 구조입니다. enqueue로 삽입하고 dequeue로 제거합니다. BFS, 작업 스케줄링, 버퍼 등에 사용됩니다. 덱(Deque)은 양쪽 끝에서 삽입/삭제가 가능합니다.

    collections.deque는 O(1) 양방향 연산을 제공합니다.
  tips:
  - collections.deque는 O(1) 양방향 연산을 제공합니다.
  snippet: |-
    class Queue:
        def __init__(self):
            self.items = []

        def enqueue(self, item):
            self.items.append(item)

        def dequeue(self):
            if not self.isEmpty():
                return self.items.pop(0)
            return None

        def front(self):
            if not self.isEmpty():
                return self.items[0]
            return None

        def isEmpty(self):
            return len(self.items) == 0

        def size(self):
            return len(self.items)

    que = Queue()
    que.enqueue('A')
    que.enqueue('B')
    que.enqueue('C')
    queFront = que.front()
    queDeq = que.dequeue()
    queSize = que.size()
    (queFront, queDeq, queSize)
  exercise:
