sections:
- id: stack
  title: 스택 구현
  structuredPrimary: true
  subtitle: LIFO 구조
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    스택은 후입선출(LIFO) 구조입니다. push로 삽입하고 pop으로 제거합니다. 함수 호출 스택, 괄호 검사, Undo 기능 등에 사용됩니다. O(1) 시간에 삽입/삭제가 가능합니다.

    MinStack은 보조 스택을 사용해 최소값을 추적합니다.
  tips:
  - MinStack은 보조 스택을 사용해 최소값을 추적합니다.
  snippet: |-
    class Stack:
        def __init__(self):
            self.items = []

        def push(self, item):
            self.items.append(item)

        def pop(self):
            if not self.isEmpty():
                return self.items.pop()
            return None

        def peek(self):
            if not self.isEmpty():
                return self.items[-1]
            return None

        def isEmpty(self):
            return len(self.items) == 0

        def size(self):
            return len(self.items)

    stk = Stack()
    stk.push(10)
    stk.push(20)
    stk.push(30)
    stkPeek = stk.peek()
    stkPop = stk.pop()
    stkSize = stk.size()
    (stkPeek, stkPop, stkSize)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
