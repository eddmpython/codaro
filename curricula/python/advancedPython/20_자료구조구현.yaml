  snippet: |-
    class ParenStack:
        def __init__(self):
            self.items = []

        def push(self, item):
            self.items.append(item)

        def pop(self):
            return self.items.pop() if self.items else None

        def isEmpty(self):
            return len(self.items) == 0

    def isValidParens(s):
        pstack = ParenStack()
        pairs = {')': '(', '}': '{', ']': '['}
        for ch in s:
            if ch in '({[':
                pstack.push(ch)
            elif ch in ')}]':
                if pstack.pop() != pairs[ch]:
                    return False
        return pstack.isEmpty()

    ex1Result = isValidParens("({[]})")
    ex1Result
