- id: heap
  title: 힙 구현
  structuredPrimary: true
  subtitle: 우선순위 기반 구조
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    힙은 완전 이진 트리 기반의 우선순위 구조입니다. 최소 힙은 부모가 자식보다 작고, 최대 힙은 부모가 자식보다 큽니다. 삽입과 삭제는 O(log n), 최솟값/최댓값 조회는 O(1)입니다. 우선순위 큐, 힙 정렬에 사용됩니다.

    파이썬 heapq 모듈은 최소 힙을 제공합니다. 최대 힙은 값을 음수로 변환하여 사용합니다.
  tips:
  - 파이썬 heapq 모듈은 최소 힙을 제공합니다. 최대 힙은 값을 음수로 변환하여 사용합니다.
  snippet: |-
    class MinHeap:
        def __init__(self):
            self.heap = []

        def parent(self, i):
            return (i - 1) // 2

        def leftChild(self, i):
            return 2 * i + 1

        def rightChild(self, i):
            return 2 * i + 2

        def swap(self, i, j):
            self.heap[i], self.heap[j] = self.heap[j], self.heap[i]

        def insert(self, val):
            self.heap.append(val)
            self._heapifyUp(len(self.heap) - 1)

        def _heapifyUp(self, i):
            while i > 0 and self.heap[self.parent(i)] > self.heap[i]:
                self.swap(i, self.parent(i))
                i = self.parent(i)

        def extractMin(self):
            if not self.heap:
                return None
            if len(self.heap) == 1:
                return self.heap.pop()
            minVal = self.heap[0]
            self.heap[0] = self.heap.pop()
            self._heapifyDown(0)
            return minVal

        def _heapifyDown(self, i):
            smallest = i
            left = self.leftChild(i)
            right = self.rightChild(i)
            if left < len(self.heap) and self.heap[left] < self.heap[smallest]:
                smallest = left
            if right < len(self.heap) and self.heap[right] < self.heap[smallest]:
                smallest = right
            if smallest != i:
                self.swap(i, smallest)
                self._heapifyDown(smallest)

        def peek(self):
            return self.heap[0] if self.heap else None

    minHeap = MinHeap()
    for val in [5, 3, 8, 1, 2, 9]:
        minHeap.insert(val)
    heapMin = minHeap.peek()
    heapExtract = minHeap.extractMin()
    heapMinAfter = minHeap.peek()
    (heapMin, heapExtract, heapMinAfter)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
