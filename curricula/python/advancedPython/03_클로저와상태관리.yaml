sections:
- id: closure_definition
  title: 클로저 정의
  structuredPrimary: true
  subtitle: 자유 변수를 기억하는 함수
  goal: 클로저 정의에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    클로저(Closure)는 자신이 정의된 스코프의 변수를 기억하는 함수입니다. 내부 함수가 외부 함수의 지역 변수를 참조하면, 외부 함수가 종료되어도 그 변수가 메모리에 유지됩니다. 이렇게 내부 함수에 의해 참조되는 외부 변수를 '자유 변수(free variable)'라고 합니다. 파이썬에서 클로저는 함수 객체의 __closure__ 속성에 셀(cell) 객체로 자유 변수를 저장합니다. 클로저는 데이터를 함수와 함께 묶어두는 방법으로, 객체지향의 인스턴스와 유사한 역할을 할 수 있습니다.

    클로저는 함수가 일급 객체인 언어에서 강력한 패턴입니다. 데코레이터도 클로저를 활용합니다.
  tips:
  - 클로저는 함수가 일급 객체인 언어에서 강력한 패턴입니다. 데코레이터도 클로저를 활용합니다.
  snippet: |-
    def outer(x):
        def inner(y):
            return x + y
        return inner

    addFive = outer(5)
    addFive(3)
  exercise:
    prompt: 클로저 정의 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def outer(x):
          def inner(y):
              return x + y
          return inner

      addFive = outer(5)
      addFive(3)
    hints:
    - 클로저 정의 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 클로저 정의 코드가 예외 없이 끝나야 합니다.
    resultCheck: 클로저 정의에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: state_encapsulation
  title: 상태 캡슐화
  structuredPrimary: true
  subtitle: 프라이빗 변수 흉내내기
  goal: 상태 캡슐화에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    클로저를 사용하면 외부에서 직접 접근할 수 없는 '프라이빗' 상태를 만들 수 있습니다. 외부 함수의 지역 변수는 반환된 내부 함수를 통해서만 접근하거나 수정할 수 있습니다. 이 패턴은 데이터 은닉(data hiding)을 구현하는 함수형 프로그래밍 방식입니다. 클래스의 프라이빗 속성과 유사하지만 더 간결하게 표현할 수 있습니다. 카운터, 누산기, 토글 등 간단한 상태 관리에 자주 사용됩니다.

    복잡한 상태 관리가 필요하면 클래스를 사용하세요. 클로저는 간단한 경우에 적합합니다.
  tips:
  - 복잡한 상태 관리가 필요하면 클래스를 사용하세요. 클로저는 간단한 경우에 적합합니다.
  snippet: |-
    def makeCounter():
        count = 0
        def counter():
            nonlocal count
            count += 1
            return count
        return counter

    counter1 = makeCounter()
    counter1(), counter1(), counter1()
  exercise:
    prompt: 상태 캡슐화 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def makeCounter():
          count = 0
          def counter():
              nonlocal count
              count += 1
              return count
          return counter

      counter1 = makeCounter()
      counter1(), counter1(), counter1()
    hints:
    - 상태 캡슐화 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 상태 캡슐화 코드가 예외 없이 끝나야 합니다.
    resultCheck: 상태 캡슐화에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: factory_pattern
  title: 팩토리 패턴
  structuredPrimary: true
  subtitle: 함수 생성기
  goal: 팩토리 패턴에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    클로저는 특정 설정이 적용된 함수를 생성하는 팩토리로 활용됩니다. 외부 함수가 설정값을 받아 그 값이 적용된 함수를 반환합니다. 이 패턴은 비슷한 동작을 하지만 세부 설정이 다른 여러 함수를 만들 때 유용합니다. 예를 들어 특정 진법으로 변환하는 함수, 특정 형식으로 포맷팅하는 함수 등을 팩토리로 생성할 수 있습니다. 팩토리 패턴은 코드 재사용성을 높이고 설정의 분리를 가능하게 합니다.

    functools.partial도 비슷한 역할을 하지만, 클로저는 더 복잡한 로직을 캡슐화할 수 있습니다.
  tips:
  - functools.partial도 비슷한 역할을 하지만, 클로저는 더 복잡한 로직을 캡슐화할 수 있습니다.
  snippet: |-
    def makeFormatter(template):
        def formatter(value):
            return template.format(value=value)
        return formatter

    dollarFormat = makeFormatter("${value:.2f}")
    percentFormat = makeFormatter("{value:.1%}")
    dollarFormat(1234.5), percentFormat(0.856)
  exercise:
    prompt: 팩토리 패턴 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def makeFormatter(template):
          def formatter(value):
              return template.format(value=value)
          return formatter

      dollarFormat = makeFormatter("${value:.2f}")
      percentFormat = makeFormatter("{value:.1%}")
      dollarFormat(1234.5), percentFormat(0.856)
    hints:
    - 팩토리 패턴 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 팩토리 패턴 코드가 예외 없이 끝나야 합니다.
    resultCheck: 팩토리 패턴에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: memoization
  title: 메모이제이션
  structuredPrimary: true
  subtitle: 결과 캐싱으로 성능 최적화
  goal: 메모이제이션에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    메모이제이션(Memoization)은 함수 호출 결과를 저장하여 같은 인자로 다시 호출될 때 저장된 결과를 반환하는 최적화 기법입니다. 클로저를 사용하면 캐시를 함수와 함께 캡슐화할 수 있습니다. 재귀 함수에서 특히 효과적이며, 피보나치 수열 같은 중복 계산이 많은 알고리즘의 성능을 극적으로 향상시킵니다. 실제로는 functools.lru_cache를 사용하는 것이 더 편리하지만, 원리를 이해하는 것이 중요합니다.

    실무에서는 @functools.lru_cache를 사용하세요. 스레드 안전하고 더 많은 기능을 제공합니다.
  tips:
  - 실무에서는 @functools.lru_cache를 사용하세요. 스레드 안전하고 더 많은 기능을 제공합니다.
  snippet: |-
    def memoize(func):
        cache = {}
        def wrapper(*args):
            if args not in cache:
                cache[args] = func(*args)
            return cache[args]
        wrapper.cache = cache
        return wrapper

    @memoize
    def slowAdd(a, b):
        return a + b

    slowAdd(1, 2), slowAdd(1, 2), slowAdd.cache
  exercise:
    prompt: 메모이제이션 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def memoize(func):
          cache = {}
          def wrapper(*args):
              if args not in cache:
                  cache[args] = func(*args)
              return cache[args]
          wrapper.cache = cache
          return wrapper

      @memoize
      def slowAdd(a, b):
          return a + b

      slowAdd(1, 2), slowAdd(1, 2), slowAdd.cache
    hints:
    - 메모이제이션 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 메모이제이션 코드가 예외 없이 끝나야 합니다.
    resultCheck: 메모이제이션에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: nonlocal_keyword
  title: nonlocal 키워드
  structuredPrimary: true
  subtitle: 외부 스코프 변수 수정
  goal: nonlocal 키워드에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    nonlocal 키워드는 내부 함수에서 외부 함수의 지역 변수를 수정할 때 사용합니다. 파이썬에서 변수에 값을 할당하면 기본적으로 가장 가까운 스코프에 새 변수를 생성합니다. nonlocal을 사용하면 바깥 스코프의 기존 변수를 참조하여 수정할 수 있습니다. global은 모듈 수준의 전역 변수를, nonlocal은 감싸고 있는 함수의 지역 변수를 수정합니다. 클로저에서 상태를 변경해야 할 때 필수적입니다.

    nonlocal 없이도 리스트나 딕셔너리 같은 가변 객체의 내용은 수정할 수 있습니다.
  tips:
  - nonlocal 없이도 리스트나 딕셔너리 같은 가변 객체의 내용은 수정할 수 있습니다.
  snippet: |-
    def outerBad():
        count = 0
        def inner():
            count = count + 1
            return count
        return inner

    try:
        badCounter = outerBad()
        badCounter()
    except UnboundLocalError as e:
        str(e)[:50]
  exercise:
    prompt: nonlocal 키워드 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def outerBad():
          count = 0
          def inner():
              count = count + 1
              return count
          return inner

      try:
          badCounter = outerBad()
          badCounter()
      except UnboundLocalError as e:
          str(e)[:50]
    hints:
    - nonlocal 키워드 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: nonlocal 키워드 코드가 예외 없이 끝나야 합니다.
    resultCheck: nonlocal 키워드에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: closure_vs_class
  title: 클로저 vs 클래스
  structuredPrimary: true
  subtitle: 언제 무엇을 사용할까
  goal: 클로저 vs 클래스에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    클로저와 클래스는 둘 다 상태를 캡슐화할 수 있습니다. 클로저는 단일 동작과 간단한 상태에 적합하고, 클래스는 여러 메서드와 복잡한 상태에 적합합니다. 클로저는 코드가 더 간결하고 함수형 스타일에 맞지만, 디버깅이 어려울 수 있습니다. 클래스는 명시적이고 확장성이 좋으며, 타입 힌팅과 IDE 지원이 더 좋습니다. 콜백이나 데코레이터처럼 함수를 인자로 전달해야 하는 경우에는 클로저가 자연스럽습니다.

    상태가 하나이고 동작도 하나라면 클로저, 그 외에는 클래스를 고려하세요.
  tips:
  - 상태가 하나이고 동작도 하나라면 클로저, 그 외에는 클래스를 고려하세요.
  snippet: |-
    def makeClosureCounter():
        value = 0
        def increment():
            nonlocal value
            value += 1
            return value
        def get():
            return value
        return increment, get

    inc, get = makeClosureCounter()
    inc(), inc(), get()
  exercise:
