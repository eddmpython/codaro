    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: '현업 흐름 검증: 주문 금액 계산 리팩토링의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '현업 흐름 검증: 주문 금액 계산 리팩토링 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
