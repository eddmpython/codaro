- id: workflow_validation
  title: '현업 흐름 검증: 주문 금액 계산 리팩토링'
  structuredPrimary: true
  subtitle: 이름, 책임 분리, 실패 조건, 회귀 테스트를 함께 확인합니다
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    클린 코드는 예쁜 코드가 아니라 변경할 때 덜 깨지는 코드입니다. 계산 규칙을 작은 함수로 나누고, 정상 케이스와 실패 케이스를 assert로 묶어 리팩토링 전후의 동작을 지키세요.

    변주 실험
    배송비 정책이 추가될 때 `calculateOrderTotal`이 너무 커지지 않도록 `calculateShippingFee`를 분리하고, 기존 assert가 그대로 통과하는지 확인하세요.
  tips:
  - 변주 실험 배송비 정책이 추가될 때 `calculateOrderTotal`이 너무 커지지 않도록 `calculateShippingFee`를 분리하고, 기존 assert가 그대로 통과하는지 확인하세요.
  snippet: |-
    TAX_RATE = 0.1

    def calculateSubtotal(items):
        subtotal = 0
        for item in items:
            if item["quantity"] <= 0:
                raise ValueError("quantity must be positive")
            subtotal += item["unitPrice"] * item["quantity"]
        return subtotal

    def applyDiscount(amount, discountRate):
        if not 0 <= discountRate <= 1:
            raise ValueError("discountRate must be between 0 and 1")
        return round(amount * (1 - discountRate))

    def addTax(amount):
        return round(amount * (1 + TAX_RATE))

    def calculateOrderTotal(order):
        subtotal = calculateSubtotal(order["items"])
        discounted = applyDiscount(subtotal, order.get("discountRate", 0))
        return addTax(discounted)

    order = {
        "items": [
            {"unitPrice": 10_000, "quantity": 2},
            {"unitPrice": 5_000, "quantity": 1},
        ],
        "discountRate": 0.1,
    }

    assert calculateSubtotal(order["items"]) == 25_000
    assert calculateOrderTotal(order) == 24_750
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      TAX_RATE = 0.1

      def calculateSubtotal(items):
          subtotal = 0
          for item in items:
              if item["quantity"] <= 0:
                  raise ValueError("quantity must be positive")
              subtotal += item["unitPrice"] * item["quantity"]
          return subtotal

      def applyDiscount(amount, discountRate):
          if not 0 <= discountRate <= 1:
              raise ValueError("discountRate must be between 0 and 1")
          return round(amount * (1 - discountRate))

      def addTax(amount):
          return round(amount * (1 + TAX_RATE))

      def calculateOrderTotal(order):
          subtotal = calculateSubtotal(order["items"])
          discounted = applyDiscount(subtotal, order.get("discountRate", 0))
          return addTax(discounted)

      order = {
          "items": [
              {"unitPrice": 10_000, "quantity": 2},
              {"unitPrice": 5_000, "quantity": 1},
          ],
          "discountRate": 0.1,
      }

      assert calculateSubtotal(order["items"]) == 25_000
      assert calculateOrderTotal(order) == 24_750
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 종합 연습
  structuredPrimary: true
  subtitle: 클린 코드 실습
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Day 29에서 배운 클린 코드 원칙을 난이도별로 복습합니다. 명확한 변수명과 함수명은 코드의 의도를 드러내고, 단일 책임 원칙은 유지보수성을 높입니다. SOLID 원칙과 DRY, KISS는 좋은 설계의 기초이며, 리팩토링은 기술 부채를 줄이는 핵심 활동입니다. 🟢 기본 문제로 변수명 개선, 매직 넘버 제거 등 기초 리팩토링을 연습하고, 🟡 응용 문제로 함수 분리, 클래스 추출을 수행합니다. 🔴 심화 문제에서는 레거시 코드를 SOLID 원칙에 맞게 전면 리팩토링해봅니다. 클린 코드는 읽기 쉽고, 테스트하기 쉽고, 변경하기 쉬운 코드를 만드는 기술입니다.
