sections:
- id: naming
  title: 명명법
  structuredPrimary: true
  subtitle: 의미 있고 명확한 이름
  goal: 명명법에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 변수명만 보고도 용도를 알 수 있어야 합니다. 매직 넘버를 상수로, 불리언은 is/has/can 접두사로.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    badData = [1, 2, 3]
    userAges = [25, 30, 35]

    x = 86400
    SECONDS_PER_DAY = 86400

    flag = True
    isUserLoggedIn = True
    hasPermission = False
    canEdit = True

    namingResult = {
        "bad": "d, x, flag",
        "good": "userAges, SECONDS_PER_DAY, isLoggedIn"
    }
    namingResult
  exercise:
    prompt: 명명법 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      badData = [1, 2, 3]
      userAges = [25, 30, 35]

      x = 86400
      SECONDS_PER_DAY = 86400

      flag = True
      isUserLoggedIn = True
      hasPermission = False
      canEdit = True

      namingResult = {
          "bad": "d, x, flag",
          "good": "userAges, SECONDS_PER_DAY, isLoggedIn"
      }
      namingResult
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 명명법에서 `badData` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 명명법 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: function_design
  title: 함수 설계
  structuredPrimary: true
  subtitle: 단일 책임과 작은 함수
  goal: 함수 설계에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수는 한 가지 일만 해야 합니다. 큰 함수는 작은 함수로 분리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def normalizeEmail(email):
        return email.lower().strip()

    def normalizeName(name):
        return name.strip().title()

    def isAdultAge(age):
        return isinstance(age, int) and age >= 18

    def processUser(user):
        if user.get("email"):
            user["email"] = normalizeEmail(user["email"])
        if user.get("name"):
            user["name"] = normalizeName(user["name"])
        if user.get("age"):
            user["isAdult"] = isAdultAge(user["age"])
        return user

    testUser = {"email": "  TEST@EMAIL.COM  ", "name": "  john doe  ", "age": 25}
    processedResult = processUser(testUser.copy())
    processedResult
  exercise:
    prompt: 함수 설계 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def normalizeEmail(email):
          return email.lower().strip()

      def normalizeName(name):
          return name.strip().title()

      def isAdultAge(age):
          return isinstance(age, int) and age >= 18

      def processUser(user):
          if user.get("email"):
              user["email"] = normalizeEmail(user["email"])
          if user.get("name"):
              user["name"] = normalizeName(user["name"])
          if user.get("age"):
              user["isAdult"] = isAdultAge(user["age"])
          return user

      testUser = {"email": "  TEST@EMAIL.COM  ", "name": "  john doe  ", "age": 25}
      processedResult = processUser(testUser.copy())
      processedResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 함수 설계의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 함수 설계 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: conditionals
  title: 조건문 단순화
  structuredPrimary: true
  subtitle: 중첩을 평탄화하기
  goal: 조건문 단순화에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 조기 반환(guard clause)으로 중첩을 줄입니다. 전략 패턴으로 if-else 체인을 제거합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def isValidUserBad(user):
        if user is not None:
            if user.get("email") is not None:
                if "@" in user["email"]:
                    if user.get("age") is not None:
                        if user["age"] >= 18:
                            return True
        return False

    def isValidUser(user):
        if not user:
            return False
        if not user.get("email") or "@" not in user["email"]:
            return False
        if not user.get("age") or user["age"] < 18:
            return False
        return True

    testValid = {"email": "test@test.com", "age": 25}
    testInvalid = {"email": "invalid", "age": 15}
    validResult = (isValidUser(testValid), isValidUser(testInvalid))
    validResult
  exercise:
    prompt: 조건문 단순화 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def isValidUserBad(user):
          if user is not None:
              if user.get("email") is not None:
                  if "@" in user["email"]:
                      if user.get("age") is not None:
                          if user["age"] >= 18:
                              return True
          return False

      def isValidUser(user):
          if not user:
              return False
          if not user.get("email") or "@" not in user["email"]:
              return False
          if not user.get("age") or user["age"] < 18:
              return False
          return True

      testValid = {"email": "test@test.com", "age": 25}
      testInvalid = {"email": "invalid", "age": 15}
      validResult = (isValidUser(testValid), isValidUser(testInvalid))
      validResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 조건문 단순화의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 조건문 단순화 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: error_handling
  title: 에러 처리
  structuredPrimary: true
  subtitle: 의미 있는 예외 처리
  goal: 에러 처리에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 커스텀 예외로 에러 정보를 명확히. Result 패턴으로 예외 대신 반환값 사용.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class UserNotFoundError(Exception):
        def __init__(self, userId):
            self.userId = userId
            super().__init__(f"User not found: {userId}")

    class InvalidEmailError(Exception):
        def __init__(self, email):
            self.email = email
            super().__init__(f"Invalid email: {email}")

    def findUser(userId, users):
        user = users.get(userId)
        if not user:
            raise UserNotFoundError(userId)
        return user

    users = {"user1": {"name": "Alice"}}
    errorResult = []
    try:
        findUser("user1", users)
        errorResult.append("found")
    except UserNotFoundError as e:
        errorResult.append(str(e))
    errorResult
  exercise:
    prompt: 에러 처리 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class UserNotFoundError(Exception):
          def __init__(self, userId):
              self.userId = userId
              super().__init__(f"User not found: {userId}")

      class InvalidEmailError(Exception):
          def __init__(self, email):
              self.email = email
              super().__init__(f"Invalid email: {email}")

      def findUser(userId, users):
          user = users.get(userId)
          if not user:
              raise UserNotFoundError(userId)
          return user

      users = {"user1": {"name": "Alice"}}
      errorResult = []
      try:
          findUser("user1", users)
          errorResult.append("found")
      except UserNotFoundError as e:
          errorResult.append(str(e))
      errorResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 에러 처리의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 에러 처리 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: structure
  title: 코드 구조화
  structuredPrimary: true
  subtitle: 의존성 주입과 모듈화
  goal: 코드 구조화에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 의존성 주입으로 테스트 용이성 확보. 리포지토리 패턴으로 데이터 접근 추상화.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class EmailService:
        def send(self, to, subject, body):
            return f"Sent to {to}: {subject}"

    class NotificationService:
        def __init__(self, emailSvc):
            self.emailSvc = emailSvc

        def notifyByEmail(self, to, subject, body):
            return self.emailSvc.send(to, subject, body)

    emailSvc = EmailService()
    notifySvc = NotificationService(emailSvc)
    notifyResult = notifySvc.notifyByEmail("user@test.com", "Hello", "Welcome!")
    notifyResult
  exercise:
    prompt: 코드 구조화 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      class EmailService:
          def send(self, to, subject, body):
              return f"Sent to {to}: {subject}"

      class NotificationService:
          def __init__(self, emailSvc):
              self.emailSvc = emailSvc

          def notifyByEmail(self, to, subject, body):
              return self.emailSvc.send(to, subject, body)

      emailSvc = EmailService()
      notifySvc = NotificationService(emailSvc)
      notifyResult = notifySvc.notifyByEmail("user@test.com", "Hello", "Welcome!")
      notifyResult
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 코드 구조화의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 코드 구조화 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: refactoring
  title: 리팩토링 기법
  structuredPrimary: true
  subtitle: 코드 품질 개선
  goal: 리팩토링 기법에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: 함수 추출, 클래스 분리로 단일 책임 원칙 적용.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def calculateSubtotal(items):
        return sum(item["price"] * item["qty"] for item in items)

    def applyDiscount(amount, percent):
        return amount * (1 - percent / 100)

    def addTax(amount, rate=0.1):
        return amount * (1 + rate)

    def calculateOrderTotal(order):
        subtotal = calculateSubtotal(order["items"])
        afterDisc = applyDiscount(subtotal, order.get("discountPct", 0))
        total = addTax(afterDisc)
        return total

    testOrder = {
        "items": [{"price": 100, "qty": 2}, {"price": 50, "qty": 1}],
        "discountPct": 10
    }
    orderTotal = calculateOrderTotal(testOrder)
    orderTotal
  exercise:
    prompt: 리팩토링 기법 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def calculateSubtotal(items):
          return sum(item["price"] * item["qty"] for item in items)

      def applyDiscount(amount, percent):
          return amount * (1 - percent / 100)

      def addTax(amount, rate=0.1):
          return amount * (1 + rate)

      def calculateOrderTotal(order):
          subtotal = calculateSubtotal(order["items"])
          afterDisc = applyDiscount(subtotal, order.get("discountPct", 0))
          total = addTax(afterDisc)
          return total

      testOrder = {
          "items": [{"price": 100, "qty": 2}, {"price": 50, "qty": 1}],
          "discountPct": 10
      }
      orderTotal = calculateOrderTotal(testOrder)
      orderTotal
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 리팩토링 기법의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 리팩토링 기법 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 주문 금액 계산 리팩토링'
  structuredPrimary: true
  subtitle: 이름, 책임 분리, 실패 조건, 회귀 테스트를 함께 확인합니다
  goal: '현업 흐름 검증: 주문 금액 계산 리팩토링에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    클린 코드는 예쁜 코드가 아니라 변경할 때 덜 깨지는 코드입니다. 계산 규칙을 작은 함수로 나누고, 정상 케이스와 실패 케이스를 assert로 묶어 리팩토링 전후의 동작을 지키세요.

    변주 실험
    배송비 정책이 추가될 때 `calculateOrderTotal`이 너무 커지지 않도록 `calculateShippingFee`를 분리하고, 기존 assert가 그대로 통과하는지 확인하세요.
  tips:
  - 변주 실험 배송비 정책이 추가될 때 `calculateOrderTotal`이 너무 커지지 않도록 `calculateShippingFee`를 분리하고, 기존 assert가 그대로
    통과하는지 확인하세요.
  snippet: |-
    TAX_RATE = 0.1

    def calculateSubtotal(items):
        subtotal = 0
        for item in items:
            if item["quantity"] <= 0:
                raise ValueError("quantity must be positive")
            subtotal += item["unitPrice"] * item["quantity"]
        return subtotal

    def applyDiscount(amount, discountRate):
        if not 0 <= discountRate <= 1:
            raise ValueError("discountRate must be between 0 and 1")
        return round(amount * (1 - discountRate))

    def addTax(amount):
        return round(amount * (1 + TAX_RATE))

    def calculateOrderTotal(order):
        subtotal = calculateSubtotal(order["items"])
        discounted = applyDiscount(subtotal, order.get("discountRate", 0))
        return addTax(discounted)

    order = {
        "items": [
            {"unitPrice": 10_000, "quantity": 2},
            {"unitPrice": 5_000, "quantity": 1},
        ],
        "discountRate": 0.1,
    }

    assert calculateSubtotal(order["items"]) == 25_000
    assert calculateOrderTotal(order) == 24_750
  exercise:
    prompt: '현업 흐름 검증: 주문 금액 계산 리팩토링 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
