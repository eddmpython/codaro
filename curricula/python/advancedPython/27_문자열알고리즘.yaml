- id: kmp
  title: KMP 알고리즘
  structuredPrimary: true
  subtitle: O(n+m) 패턴 매칭
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 실패 함수(LPS)를 이용해 불필요한 비교를 건너뜁니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def computeLps(pattern):
        patLen = len(pattern)
        lps = [0] * patLen
        length = 0
        i = 1
        while i < patLen:
            if pattern[i] == pattern[length]:
                length += 1
                lps[i] = length
                i += 1
            else:
                if length != 0:
                    length = lps[length - 1]
                else:
                    lps[i] = 0
                    i += 1
        return lps

    lpsPattern = "AABAACAAB"
    lpsResult = computeLps(lpsPattern)
    lpsResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
