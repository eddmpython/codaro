- id: brute_force
  title: 브루트 포스 매칭
  structuredPrimary: true
  subtitle: 기본 문자열 패턴 매칭
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 가장 단순한 방법은 모든 위치에서 패턴을 비교하는 것입니다. O(nm) 시간복잡도.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def bfSearch(text, pattern):
        textLen = len(text)
        patLen = len(pattern)
        positions = []
        for i in range(textLen - patLen + 1):
            match = True
            for j in range(patLen):
                if text[i + j] != pattern[j]:
                    match = False
                    break
            if match:
                positions.append(i)
        return positions

    bfText = "AABAACAADAABAAABAA"
    bfPattern = "AABA"
    bfResult = bfSearch(bfText, bfPattern)
    bfResult
