- id: string_processing
  title: 문자열 처리
  structuredPrimary: true
  subtitle: 실용적인 문자열 알고리즘
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 공통 접두사, 팰린드롬 등 자주 사용되는 문자열 처리 기법.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def longestCommonPrefix(strs):
        if not strs:
            return ""
        shortest = min(strs, key=len)
        for i, char in enumerate(shortest):
            for s in strs:
                if s[i] != char:
                    return shortest[:i]
        return shortest

    lcpStrs = ["flower", "flow", "flight"]
    lcpResult = longestCommonPrefix(lcpStrs)
    lcpResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
