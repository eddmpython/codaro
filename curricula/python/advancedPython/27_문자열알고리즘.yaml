- id: trie
  title: Trie 자료구조
  structuredPrimary: true
  subtitle: 접두사 트리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 문자열 삽입/검색 O(m). 자동완성, 사전 검색에 활용.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class TrieNode:
        def __init__(self):
            self.children = {}
            self.isEnd = False

    class Trie:
        def __init__(self):
            self.root = TrieNode()

        def insert(self, word):
            node = self.root
            for char in word:
                if char not in node.children:
                    node.children[char] = TrieNode()
                node = node.children[char]
            node.isEnd = True

        def search(self, word):
            node = self.root
            for char in word:
                if char not in node.children:
                    return False
                node = node.children[char]
            return node.isEnd

        def startsWith(self, prefix):
            node = self.root
            for char in prefix:
                if char not in node.children:
                    return False
                node = node.children[char]
            return True

    trie = Trie()
    trieWords = ["apple", "app", "banana"]
    for w in trieWords:
        trie.insert(w)
    trieSearch = trie.search("app")
    triePrefix = trie.startsWith("ban")
    trieMiss = trie.search("ap")
    trieResult = (trieSearch, triePrefix, trieMiss)
    trieResult
  exercise:
