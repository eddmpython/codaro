      class AutoPropertyMeta(type):
          def __new__(mcs, name, bases, ns):
              slots = ns.get("__slots__", ())
              for slot in slots:
                  if not slot.startswith("_"):
                      privateName = f"_{slot}"
                      ns[slot] = property(
                          lambda self, n=privateName: getattr(self, n, None),
                          lambda self, v, n=privateName: setattr(self, n, v)
                      )
              return super().__new__(mcs, name, bases, ns)

