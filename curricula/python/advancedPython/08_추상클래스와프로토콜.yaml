    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: duck_typing
  title: 덕 타이핑
  structuredPrimary: true
  subtitle: 타입보다 행동
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    덕 타이핑(duck typing)은 '오리처럼 걷고 꽥꽥거리면 오리다'라는 원칙입니다. 객체의 타입보다 객체가 어떤 메서드를 가지고 있는지가 중요합니다. 파이썬은 동적 타이핑 언어로 덕 타이핑을 자연스럽게 지원합니다. isinstance 검사 대신 hasattr이나 EAFP(허락보다 용서가 쉽다) 스타일을 사용합니다. 덕 타이핑은 유연하지만 런타임에 오류가 발생할 수 있습니다. ABC와 덕 타이핑은 상호 보완적입니다.

    LBYL(Look Before You Leap)보다 EAFP가 파이썬에서 권장됩니다.
  tips:
  - LBYL(Look Before You Leap)보다 EAFP가 파이썬에서 권장됩니다.
  snippet: |-
    class Duck:
        def quack(self):
            return "Quack!"

        def walk(self):
            return "Walking"

    class Person:
        def quack(self):
            return "I'm quacking like a duck!"

        def walk(self):
            return "Walking like a duck"

    def makeQuack(thing):
        return thing.quack()

    makeQuack(Duck()), makeQuack(Person())
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      class Duck:
          def quack(self):
              return "Quack!"

          def walk(self):
              return "Walking"

      class Person:
          def quack(self):
              return "I'm quacking like a duck!"

          def walk(self):
              return "Walking like a duck"

      def makeQuack(thing):
          return thing.quack()

      makeQuack(Duck()), makeQuack(Person())
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: protocol_typing
  title: typing.Protocol
  structuredPrimary: true
  subtitle: 구조적 서브타이핑
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    typing.Protocol은 Python 3.8에서 도입된 구조적 서브타이핑입니다. 명시적으로 상속하지 않아도 필요한 메서드를 가지면 타입 검사를 통과합니다. 덕 타이핑을 정적 타입 검사와 결합합니다. runtime_checkable 데코레이터를 추가하면 isinstance로도 검사할 수 있습니다. Protocol은 ABC와 달리 상속이 필요 없어 기존 클래스와의 호환성이 좋습니다.

    Protocol은 타입 힌팅용이며, runtime_checkable은 메서드 존재만 확인하고 시그니처는 검사하지 않습니다.
  tips:
  - Protocol은 타입 힌팅용이며, runtime_checkable은 메서드 존재만 확인하고 시그니처는 검사하지 않습니다.
  snippet: |-
    from typing import Protocol

    class Drawable(Protocol):
        def draw(self) -> str:
            ...

    class Circle:
        def draw(self) -> str:
            return "Drawing circle"

    class Square:
        def draw(self) -> str:
            return "Drawing square"

    def render(shape: Drawable) -> str:
        return shape.draw()

    render(Circle()), render(Square())
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from typing import Protocol

      class Drawable(Protocol):
          def draw(self) -> str:
              ...

      class Circle:
          def draw(self) -> str:
              return "Drawing circle"

      class Square:
          def draw(self) -> str:
              return "Drawing square"

      def render(shape: Drawable) -> str:
          return shape.draw()

      render(Circle()), render(Square())
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practical_abc
  title: 실전 ABC
  structuredPrimary: true
  subtitle: 플러그인과 전략 패턴
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ABC는 플러그인 시스템이나 전략 패턴 구현에 유용합니다. 플러그인 시스템에서 모든 플러그인이 구현해야 할 인터페이스를 ABC로 정의합니다. 전략 패턴에서 다양한 알고리즘을 같은 인터페이스로 교체할 수 있습니다. 의존성 주입(Dependency Injection)에서도 인터페이스를 ABC로 정의합니다. register 메서드로 기존 클래스를 가상 서브클래스로 등록할 수 있습니다.

    가상 서브클래스는 isinstance를 통과하지만 실제로 추상 메서드 구현을 강제하지는 않습니다.
  tips:
  - 가상 서브클래스는 isinstance를 통과하지만 실제로 추상 메서드 구현을 강제하지는 않습니다.
  snippet: |-
    from abc import ABC, abstractmethod

    class Plugin(ABC):
        @property
        @abstractmethod
        def name(self) -> str:
            pass

        @abstractmethod
        def execute(self, data: dict) -> dict:
            pass

    class ValidationPlugin(Plugin):
        @property
        def name(self) -> str:
            return "validator"

        def execute(self, data: dict) -> dict:
            data["validated"] = True
            return data

    class LoggingPlugin(Plugin):
        @property
        def name(self) -> str:
            return "logger"

        def execute(self, data: dict) -> dict:
            data["logged"] = True
            return data

    plugins = [ValidationPlugin(), LoggingPlugin()]
    result = {"value": 42}
    for p in plugins:
        result = p.execute(result)
    result
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from abc import ABC, abstractmethod

      class Plugin(ABC):
          @property
          @abstractmethod
          def name(self) -> str:
              pass

          @abstractmethod
          def execute(self, data: dict) -> dict:
              pass

      class ValidationPlugin(Plugin):
          @property
          def name(self) -> str:
              return "validator"

          def execute(self, data: dict) -> dict:
              data["validated"] = True
              return data

      class LoggingPlugin(Plugin):
          @property
          def name(self) -> str:
              return "logger"

          def execute(self, data: dict) -> dict:
              data["logged"] = True
              return data

      plugins = [ValidationPlugin(), LoggingPlugin()]
      result = {"value": 42}
      for p in plugins:
          result = p.execute(result)
      result
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: '현업 흐름 검증: 내보내기 인터페이스 설계하기'
  structuredPrimary: true
  subtitle: 예측 → 명시 계약 → 구조적 타입 → 실패 확인
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ABC는 런타임 계약을 강제하고, Protocol은 구조적 타입으로 기존 객체와의 결합을 줄입니다. 리포트 내보내기 흐름에서 저장소는 ABC로 강제하고 포맷터는 Protocol로 유연하게 받습니다.

    변주 실험
    JSON 포맷터를 추가하고, 기존 `exportRows` 함수는 수정하지 않은 채 저장 결과만 assert로 추가하세요.
  tips:
  - 변주 실험 JSON 포맷터를 추가하고, 기존 `exportRows` 함수는 수정하지 않은 채 저장 결과만 assert로 추가하세요.
  snippet: |-
    from abc import ABC, abstractmethod
    from typing import Protocol, runtime_checkable

    @runtime_checkable
    class RowFormatter(Protocol):
        def render(self, rows: list[dict]) -> str:
            ...

    class ReportSink(ABC):
        @abstractmethod
        def write(self, name: str, content: str) -> str:
            pass

    class CsvFormatter:
        def render(self, rows):
            header = ",".join(rows[0])
            lines = [header]
            for row in rows:
                lines.append(",".join(str(row[key]) for key in rows[0]))
            return "\n".join(lines)

    class MemorySink(ReportSink):
        def __init__(self):
            self.files = {}

        def write(self, name, content):
            self.files[name] = content
            return name

    def exportRows(formatter: RowFormatter, sink: ReportSink, name: str, rows: list[dict]):
        if not isinstance(formatter, RowFormatter):
            raise TypeError("formatter must implement render")
        content = formatter.render(rows)
        return sink.write(name, content)

    rows = [{"id": "A-100", "amount": 12000}, {"id": "A-101", "amount": 9000}]
    sink = MemorySink()
    savedName = exportRows(CsvFormatter(), sink, "orders.csv", rows)

    assert savedName == "orders.csv"
    assert sink.files["orders.csv"] == "id,amount\nA-100,12000\nA-101,9000"
    assert isinstance(CsvFormatter(), RowFormatter)

    try:
        ReportSink()
    except TypeError as exc:
        assert "abstract" in str(exc)

    try:
        exportRows(object(), sink, "broken.csv", rows)
    except TypeError as exc:
        assert "formatter" in str(exc)

    print("ABC와 Protocol 내보내기 흐름 통과")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from abc import ABC, abstractmethod
      from typing import Protocol, runtime_checkable

      @runtime_checkable
      class RowFormatter(Protocol):
          def render(self, rows: list[dict]) -> str:
              ...

      class ReportSink(ABC):
          @abstractmethod
          def write(self, name: str, content: str) -> str:
              pass

      class CsvFormatter:
          def render(self, rows):
              header = ",".join(rows[0])
              lines = [header]
              for row in rows:
                  lines.append(",".join(str(row[key]) for key in rows[0]))
              return "\n".join(lines)

      class MemorySink(ReportSink):
          def __init__(self):
              self.files = {}

          def write(self, name, content):
              self.files[name] = content
              return name

      def exportRows(formatter: RowFormatter, sink: ReportSink, name: str, rows: list[dict]):
          if not isinstance(formatter, RowFormatter):
              raise TypeError("formatter must implement render")
          content = formatter.render(rows)
          return sink.write(name, content)

      rows = [{"id": "A-100", "amount": 12000}, {"id": "A-101", "amount": 9000}]
      sink = MemorySink()
      savedName = exportRows(CsvFormatter(), sink, "orders.csv", rows)

      assert savedName == "orders.csv"
      assert sink.files["orders.csv"] == "id,amount\nA-100,12000\nA-101,9000"
      assert isinstance(CsvFormatter(), RowFormatter)

      try:
          ReportSink()
      except TypeError as exc:
          assert "abstract" in str(exc)

      try:
          exportRows(object(), sink, "broken.csv", rows)
      except TypeError as exc:
          assert "formatter" in str(exc)

      print("ABC와 Protocol 내보내기 흐름 통과")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 종합 복습
  structuredPrimary: true
  subtitle: ABC와 Protocol 마스터하기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Day 8에서 배운 추상 클래스와 프로토콜을 난이도별로 복습합니다. ABC(Abstract Base Class)는 인터페이스를 강제하는 명목적 서브타이핑을, Protocol은 구조적 서브타이핑(덕 타이핑)을 제공합니다. 둘 다 코드의 타입 안전성과 설계 명확성을 높이는 도구입니다. 🟢 기본 문제로 ABC와 abstractmethod, Protocol 정의를 익히고, 🟡 응용 문제로 추상 프로퍼티, runtime_checkable 패턴을 연습하세요. 🔴 심화 문제에서는 믹스인, 가상 서브클래스, 제네릭 Protocol 등 고급 인터페이스 설계를 다룹니다. 대규모 프로젝트에서 명확한 인터페이스 정의는 유지보수성의 핵심입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Greeter(ABC):
        @abstractmethod
        def greet(self):
            pass

    class Hello(Greeter):
        def greet(self):
            return "Hello!"

    Hello().greet()
