sections:
- id: abc_module
  title: abc 모듈
  structuredPrimary: true
  subtitle: 추상 클래스 기초
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ABC(Abstract Base Class)는 인스턴스화할 수 없는 추상 클래스입니다. abc 모듈의 ABC 클래스를 상속하거나 metaclass=ABCMeta를 지정합니다. @abstractmethod로 데코레이트된 메서드는 서브클래스에서 반드시 구현해야 합니다. 추상 메서드를 구현하지 않으면 서브클래스도 인스턴스화할 수 없습니다. ABC는 인터페이스 계약을 강제하여 API 일관성을 보장합니다. collections.abc에는 Iterable, Mapping 등 유용한 추상 클래스가 정의되어 있습니다.

    ABC 자체를 인스턴스화하려고 하면 TypeError: Can't instantiate abstract class가 발생합니다.
  tips:
  - 'ABC 자체를 인스턴스화하려고 하면 TypeError: Can''t instantiate abstract class가 발생합니다.'
  snippet: |-
    from abc import ABC, abstractmethod

    class Shape(ABC):
        @abstractmethod
        def area(self):
            pass

        @abstractmethod
        def perimeter(self):
            pass

    class Rectangle(Shape):
        def __init__(self, width, height):
            self.width = width
            self.height = height

        def area(self):
            return self.width * self.height

        def perimeter(self):
            return 2 * (self.width + self.height)

    Rectangle(3, 4).area()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from abc import ABC, abstractmethod

      class Shape(ABC):
          @abstractmethod
          def area(self):
              pass

          @abstractmethod
          def perimeter(self):
              pass

      class Rectangle(Shape):
          def __init__(self, width, height):
              self.width = width
              self.height = height

          def area(self):
              return self.width * self.height

          def perimeter(self):
              return 2 * (self.width + self.height)

      Rectangle(3, 4).area()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: abstract_property
  title: 추상 프로퍼티
  structuredPrimary: true
  subtitle: '@property + @abstractmethod'
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    추상 프로퍼티는 서브클래스에서 반드시 정의해야 하는 속성입니다. @property와 @abstractmethod를 함께 사용합니다. Python 3.3 이전에는 @abstractproperty가 있었지만 이제는 데코레이터를 조합합니다. @abstractmethod는 가장 안쪽(아래쪽)에 위치해야 합니다. 추상 classmethod와 staticmethod도 같은 방식으로 정의합니다. 추상 프로퍼티는 설정자(setter)나 삭제자(deleter)도 추상화할 수 있습니다.

    Python 3.3+에서는 @abstractproperty 대신 @property + @abstractmethod를 사용합니다.
  tips:
  - Python 3.3+에서는 @abstractproperty 대신 @property + @abstractmethod를 사용합니다.
  snippet: |-
    from abc import ABC, abstractmethod

    class Sized(ABC):
        @property
        @abstractmethod
        def size(self):
            pass

    class MyList(Sized):
        def __init__(self, items):
            self._items = items

        @property
        def size(self):
            return len(self._items)

    MyList([1, 2, 3]).size
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from abc import ABC, abstractmethod

      class Sized(ABC):
          @property
          @abstractmethod
          def size(self):
              pass

      class MyList(Sized):
          def __init__(self, items):
              self._items = items

          @property
          def size(self):
              return len(self._items)

      MyList([1, 2, 3]).size
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: interface_design
  title: 인터페이스 설계
  structuredPrimary: true
  subtitle: 명시적 계약
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    ABC를 사용한 인터페이스 설계는 명시적인 계약을 만듭니다. 인터페이스를 상속받는 클래스는 정해진 메서드를 반드시 구현해야 합니다. 이는 팀 협업이나 대규모 프로젝트에서 API 일관성을 보장합니다. 추상 클래스에 docstring을 작성하면 인터페이스 문서화도 됩니다. 기본 구현을 제공하면서 일부만 추상화할 수도 있습니다. 추상 메서드 안에도 코드를 작성할 수 있으며 super()로 호출할 수 있습니다.

    register() 메서드로 기존 클래스를 ABC의 가상 서브클래스로 등록할 수 있습니다.
  tips:
  - register() 메서드로 기존 클래스를 ABC의 가상 서브클래스로 등록할 수 있습니다.
  snippet: |-
    from abc import ABC, abstractmethod

    class Repository(ABC):
        """데이터 저장소 인터페이스."""

        @abstractmethod
        def find(self, id):
            """ID로 항목을 찾습니다.

            Args:
                id: 검색할 항목의 ID

            Returns:
                찾은 항목 또는 None
            """
            pass

        @abstractmethod
        def save(self, item):
            """항목을 저장합니다."""
            pass

    class MemoryRepository(Repository):
        def __init__(self):
            self._data = {}

        def find(self, id):
            return self._data.get(id)

        def save(self, item):
            self._data[item["id"]] = item

    repo = MemoryRepository()
    repo.save({"id": 1, "name": "test"})
    repo.find(1)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from abc import ABC, abstractmethod

      class Repository(ABC):
          """데이터 저장소 인터페이스."""

          @abstractmethod
          def find(self, id):
              """ID로 항목을 찾습니다.

              Args:
                  id: 검색할 항목의 ID

              Returns:
                  찾은 항목 또는 None
              """
              pass

          @abstractmethod
          def save(self, item):
              """항목을 저장합니다."""
              pass

      class MemoryRepository(Repository):
          def __init__(self):
