meta:
  id: "14"
  title: "enum과 상수 관리"
  day: 14
  category: "advancedPython"
  tags: ["Enum", "IntEnum", "Flag", "auto", "StrEnum"]
  seo:
    title: "파이썬 Enum 완벽 가이드 - 열거형과 상수 관리"
    description: "Enum으로 명명된 상수를 관리합니다. IntEnum, StrEnum, Flag, auto() 완벽 이해."
    keywords: ["Enum", "IntEnum", "Flag", "auto", "상수"]

intro:
  emoji: "🏷️"
  points:
  - "Enum으로 명명된 상수 집합"
  - "IntEnum, StrEnum으로 타입 호환"
  - "Flag로 비트 플래그 조합"
  - "auto()로 자동 값 할당"

sections:
- id: "enum_basic"
  title: "Enum 기초"
  subtitle: "명명된 상수"
  blocks:
  - type: "text"
    content: "Enum은 명명된 상수의 집합을 정의합니다. 관련된 상수들을 그룹화하고 타입 안전성을 제공합니다. 각 멤버는 이름(name)과 값(value)을 가집니다. Enum 멤버는 싱글톤으로 항상 동일한 객체입니다. 이름이나 값으로 멤버에 접근할 수 있습니다. 반복(iteration)과 비교 연산을 지원합니다."
  - type: "list"
    items:
    - "class MyEnum(Enum): 정의"
    - "member.name: 이름"
    - "member.value: 값"
    - "Enum['NAME']: 이름으로 접근"
    - "Enum(value): 값으로 접근"
  - type: "code"
    language: "python"
    title: "기본 Enum"
    description: "색상 열거형을 정의합니다."
    content: |-
      from enum import Enum

      class Color(Enum):
          RED = 1
          GREEN = 2
          BLUE = 3

      Color.RED, Color.RED.name, Color.RED.value
  - type: "code"
    language: "python"
    title: "접근 방법"
    description: "이름과 값으로 멤버에 접근합니다."
    content: |-
      from enum import Enum

      class Status(Enum):
          PENDING = "pending"
          ACTIVE = "active"
          COMPLETED = "completed"

      Status['PENDING'], Status('active')
  - type: "code"
    language: "python"
    title: "반복과 비교"
    description: "Enum을 반복하고 비교합니다."
    content: |-
      from enum import Enum

      class Priority(Enum):
          LOW = 1
          MEDIUM = 2
          HIGH = 3

      members = [(p.name, p.value) for p in Priority]
      isHigh = Priority.HIGH is Priority.HIGH
      notEqual = Priority.LOW != Priority.HIGH
      members, isHigh, notEqual
  - type: "tip"
    content: "Enum 멤버는 is로 비교하는 것이 권장됩니다 (싱글톤)."

- id: "intenum"
  title: "IntEnum"
  subtitle: "정수 호환"
  blocks:
  - type: "text"
    content: "IntEnum은 정수와 호환되는 열거형입니다. int를 상속받아 정수 연산과 비교가 가능합니다. 정수가 필요한 곳에서 직접 사용할 수 있습니다. 일반 Enum은 정수와 비교하면 항상 False입니다. 기존 정수 상수를 Enum으로 마이그레이션할 때 유용합니다. 주의: 정수와의 암시적 비교가 가능해 타입 안전성이 다소 약해집니다."
  - type: "list"
    items:
    - "IntEnum: int 상속"
    - "정수 연산/비교 가능"
    - "int가 필요한 곳에 사용"
    - "Enum보다 타입 안전성 약함"
  - type: "code"
    language: "python"
    title: "IntEnum 기본"
    description: "정수 호환 열거형입니다."
    content: |-
      from enum import IntEnum

      class HTTPStatus(IntEnum):
          OK = 200
          NOT_FOUND = 404
          SERVER_ERROR = 500

      HTTPStatus.OK == 200, HTTPStatus.OK + 1, HTTPStatus.OK < 300
  - type: "code"
    language: "python"
    title: "Enum vs IntEnum"
    description: "일반 Enum과 IntEnum의 차이입니다."
    content: |-
      from enum import Enum, IntEnum

      class NormalStatus(Enum):
          OK = 200

      class IntStatus(IntEnum):
          OK = 200

      NormalStatus.OK == 200, IntStatus.OK == 200
  - type: "code"
    language: "python"
    title: "리스트 인덱싱"
    description: "IntEnum을 인덱스로 사용합니다."
    content: |-
      from enum import IntEnum

      class Index(IntEnum):
          FIRST = 0
          SECOND = 1
          THIRD = 2

      items = ['a', 'b', 'c']
      items[Index.SECOND]
  - type: "tip"
    content: "IntEnum 대신 Enum을 사용하고 .value로 정수를 얻는 것이 더 안전합니다."

- id: "strenum"
  title: "StrEnum"
  subtitle: "문자열 호환"
  blocks:
  - type: "text"
    content: "StrEnum은 Python 3.11에서 도입된 문자열 호환 열거형입니다. str을 상속받아 문자열 연산이 가능합니다. 문자열이 필요한 곳에서 직접 사용할 수 있습니다. API 응답, 설정 값 등 문자열 상수에 유용합니다. Python 3.10 이하에서는 str과 Enum을 다중 상속하여 비슷하게 구현할 수 있습니다."
  - type: "list"
    items:
    - "StrEnum: str 상속 (Python 3.11+)"
    - "문자열 연산/비교 가능"
    - "str이 필요한 곳에 사용"
    - "API, 설정에 유용"
  - type: "code"
    language: "python"
    title: "StrEnum 기본"
    description: "문자열 호환 열거형입니다."
    content: |-
      from enum import StrEnum

      class ContentType(StrEnum):
          JSON = "application/json"
          HTML = "text/html"
          XML = "application/xml"

      ContentType.JSON == "application/json", ContentType.JSON.upper()
  - type: "code"
    language: "python"
    title: "auto()와 StrEnum"
    description: "auto()는 소문자 이름을 값으로 사용합니다."
    content: |-
      from enum import StrEnum, auto

      class Color(StrEnum):
          RED = auto()
          GREEN = auto()
          BLUE = auto()

      Color.RED, Color.GREEN, Color.BLUE
  - type: "code"
    language: "python"
    title: "Python 3.10 이하 대안"
    description: "str과 Enum 다중 상속입니다."
    content: |-
      from enum import Enum

      class StrEnumCompat(str, Enum):
          pass

      class Status(StrEnumCompat):
          ACTIVE = "active"
          INACTIVE = "inactive"

      Status.ACTIVE == "active"
  - type: "tip"
    content: "StrEnum에서 auto()는 멤버 이름을 소문자로 변환한 값을 사용합니다."

- id: "flag"
  title: "Flag"
  subtitle: "비트 플래그"
  blocks:
  - type: "text"
    content: "Flag는 비트 연산으로 조합할 수 있는 열거형입니다. 각 멤버는 2의 거듭제곱(1, 2, 4, 8, ...)이어야 합니다. |, &, ~, ^ 연산자로 플래그를 조합하거나 검사합니다. 권한, 옵션, 상태 조합 등에 유용합니다. IntFlag는 정수와도 호환됩니다. auto()는 자동으로 2의 거듭제곱을 할당합니다."
  - type: "list"
    items:
    - "Flag: 비트 조합 가능"
    - "값은 2의 거듭제곱"
    - "|: 결합, &: 교집합, ~: 보수"
    - "IntFlag: int 호환"
  - type: "code"
    language: "python"
    title: "Flag 기본"
    description: "권한 플래그를 정의합니다."
    content: |-
      from enum import Flag, auto

      class Permission(Flag):
          READ = auto()
          WRITE = auto()
          EXECUTE = auto()

      Permission.READ.value, Permission.WRITE.value, Permission.EXECUTE.value
  - type: "code"
    language: "python"
    title: "플래그 조합"
    description: "여러 플래그를 조합합니다."
    content: |-
      from enum import Flag, auto

      class Perm(Flag):
          R = auto()
          W = auto()
          X = auto()
          RW = R | W
          RWX = R | W | X

      user = Perm.R | Perm.W
      Perm.R in user, Perm.X in user, user
  - type: "code"
    language: "python"
    title: "플래그 검사"
    description: "플래그 포함 여부를 검사합니다."
    content: |-
      from enum import Flag, auto

      class Feature(Flag):
          DARK_MODE = auto()
          NOTIFICATIONS = auto()
          AUTOSAVE = auto()

      settings = Feature.DARK_MODE | Feature.AUTOSAVE

      def hasFeature(settings, feature):
          return feature in settings

      hasFeature(settings, Feature.DARK_MODE), hasFeature(settings, Feature.NOTIFICATIONS)
  - type: "tip"
    content: "Flag(0)은 빈 플래그를 나타내며, 보통 NONE이라고 이름 짓습니다."

- id: "auto"
  title: "auto()"
  subtitle: "자동 값 할당"
  blocks:
  - type: "text"
    content: "auto()는 열거형 값을 자동으로 할당합니다. Enum에서는 1부터 시작하는 정수를 순차적으로 할당합니다. Flag에서는 1, 2, 4, 8, ... 2의 거듭제곱을 할당합니다. StrEnum에서는 멤버 이름의 소문자를 값으로 사용합니다. _generate_next_value_ 메서드를 오버라이드하여 커스터마이징할 수 있습니다."
  - type: "list"
    items:
    - "auto(): 자동 값 생성"
    - "Enum: 1, 2, 3, ..."
    - "Flag: 1, 2, 4, 8, ..."
    - "StrEnum: 소문자 이름"
  - type: "code"
    language: "python"
    title: "Enum에서 auto()"
    description: "순차적인 정수를 자동 할당합니다."
    content: |-
      from enum import Enum, auto

      class Priority(Enum):
          LOW = auto()
          MEDIUM = auto()
          HIGH = auto()
          CRITICAL = auto()

      [(p.name, p.value) for p in Priority]
  - type: "code"
    language: "python"
    title: "Flag에서 auto()"
    description: "2의 거듭제곱을 자동 할당합니다."
    content: |-
      from enum import Flag, auto

      class Option(Flag):
          A = auto()
          B = auto()
          C = auto()
          D = auto()

      [(o.name, o.value) for o in Option]
  - type: "code"
    language: "python"
    title: "커스텀 auto"
    description: "_generate_next_value_를 오버라이드합니다."
    content: |-
      from enum import Enum, auto

      class AutoName(Enum):
          @staticmethod
          def _generate_next_value_(name, start, count, last_values):
              return name.lower()

      class Color(AutoName):
          RED = auto()
          GREEN = auto()
          BLUE = auto()

      Color.RED.value, Color.GREEN.value
  - type: "tip"
    content: "auto()와 명시적 값을 섞어 사용하면 예상치 못한 결과가 나올 수 있습니다."

- id: "practical_enum"
  title: "실전 활용"
  subtitle: "상태 머신과 설정"
  blocks:
  - type: "text"
    content: "Enum은 상태 머신, 설정 관리, API 응답 등에 활용됩니다. 메서드를 추가하여 동작을 정의할 수 있습니다. @unique 데코레이터로 중복 값을 금지합니다. 값이 같은 멤버는 별칭(alias)이 됩니다. _missing_ 메서드로 없는 값 처리를 커스터마이징합니다. match 문(Python 3.10+)과 잘 어울립니다."
  - type: "list"
    items:
    - "메서드 추가 가능"
    - "@unique: 중복 값 금지"
    - "별칭: 같은 값 다른 이름"
    - "match 문과 함께 사용"
  - type: "code"
    language: "python"
    title: "메서드 추가"
    description: "Enum에 메서드를 추가합니다."
    content: |-
      from enum import Enum

      class Planet(Enum):
          MERCURY = (3.303e+23, 2.4397e6)
          EARTH = (5.976e+24, 6.37814e6)
          MARS = (6.421e+23, 3.3972e6)

          def __init__(self, mass, radius):
              self.mass = mass
              self.radius = radius

          @property
          def surfaceGravity(self):
              G = 6.67e-11
              return G * self.mass / (self.radius ** 2)

      Planet.EARTH.surfaceGravity
  - type: "code"
    language: "python"
    title: "@unique"
    description: "중복 값을 금지합니다."
    content: |-
      from enum import Enum, unique

      @unique
      class Status(Enum):
          ACTIVE = 1
          INACTIVE = 2
          DELETED = 3

      list(Status)
  - type: "code"
    language: "python"
    title: "match 문"
    description: "Enum과 match 문을 함께 사용합니다."
    content: |-
      from enum import Enum

      class Command(Enum):
          START = "start"
          STOP = "stop"
          PAUSE = "pause"

      def execute(cmd: Command) -> str:
          match cmd:
              case Command.START:
                  return "Starting..."
              case Command.STOP:
                  return "Stopping..."
              case Command.PAUSE:
                  return "Pausing..."

      execute(Command.START), execute(Command.PAUSE)
  - type: "tip"
    content: "Enum은 딕셔너리 키로 사용할 수 있어 상태별 처리 함수 매핑에 유용합니다."

- id: "practice"
  title: "종합 복습"
  subtitle: "Enum 마스터하기"
  blocks:
  - type: "text"
    content: "Day 14에서 배운 Enum을 난이도별로 복습합니다. Enum은 명명된 상수의 집합을 정의하여 타입 안전성과 코드 가독성을 높이는 도구입니다. IntEnum, StrEnum으로 기본 타입과 호환되고, Flag로 비트 플래그 조합을 표현합니다. 🟢 기본 문제로 Enum 정의, auto(), 멤버 접근을 익히고, 🟡 응용 문제로 Flag 조합, 메서드 추가를 연습하세요. 🔴 심화 문제에서는 상태 머신, 권한 시스템, JSON 직렬화 등 실무 패턴을 다룹니다. 매직 넘버나 문자열 상수 대신 Enum을 사용하면 버그를 예방하고 IDE 자동완성의 도움을 받을 수 있습니다."

  - type: "expansion"
    title: "🟢 기본1: 기본 Enum"
    code: |-
      from enum import Enum

      class Day(Enum):
          MON = 1
          TUE = 2
          WED = 3

      Day.MON, Day.MON.value

  - type: "expansion"
    title: "🟢 기본2: 이름으로 접근"
    code: |-
      from enum import Enum

      class Color(Enum):
          RED = "#FF0000"
          GREEN = "#00FF00"
          BLUE = "#0000FF"

      Color['RED'], Color('0000FF')

  - type: "expansion"
    title: "🟢 기본3: 반복"
    code: |-
      from enum import Enum

      class Size(Enum):
          S = "Small"
          M = "Medium"
          L = "Large"

      [(s.name, s.value) for s in Size]

  - type: "expansion"
    title: "🟢 기본4: auto()"
    code: |-
      from enum import Enum, auto

      class Level(Enum):
          DEBUG = auto()
          INFO = auto()
          WARNING = auto()
          ERROR = auto()

      [(l.name, l.value) for l in Level]

  - type: "expansion"
    title: "🟢 기본5: IntEnum"
    code: |-
      from enum import IntEnum

      class Score(IntEnum):
          LOW = 10
          MEDIUM = 50
          HIGH = 100

      Score.HIGH > 75, Score.LOW + Score.MEDIUM

  - type: "expansion"
    title: "🟡 응용1: Flag 조합"
    code: |-
      from enum import Flag, auto

      class Access(Flag):
          READ = auto()
          WRITE = auto()
          DELETE = auto()

      admin = Access.READ | Access.WRITE | Access.DELETE
      guest = Access.READ

      Access.WRITE in admin, Access.WRITE in guest

  - type: "expansion"
    title: "🟡 응용2: StrEnum"
    code: |-
      from enum import StrEnum

      class MediaType(StrEnum):
          JSON = "application/json"
          XML = "application/xml"
          TEXT = "text/plain"

      f"Content-Type: {MediaType.JSON}"

  - type: "expansion"
    title: "🟡 응용3: 메서드 추가"
    code: |-
      from enum import Enum

      class HTTPMethod(Enum):
          GET = "GET"
          POST = "POST"
          PUT = "PUT"
          DELETE = "DELETE"

          def isIdempotent(self):
              return self in (HTTPMethod.GET, HTTPMethod.PUT, HTTPMethod.DELETE)

      HTTPMethod.GET.isIdempotent(), HTTPMethod.POST.isIdempotent()

  - type: "expansion"
    title: "🟡 응용4: 별칭"
    code: |-
      from enum import Enum

      class Status(Enum):
          RUNNING = 1
          ACTIVE = 1
          STOPPED = 2
          INACTIVE = 2

      Status.RUNNING is Status.ACTIVE, list(Status)

  - type: "expansion"
    title: "🟡 응용5: @unique"
    code: |-
      from enum import Enum, unique

      @unique
      class ErrorCode(Enum):
          NOT_FOUND = 404
          SERVER_ERROR = 500
          BAD_REQUEST = 400

      len(ErrorCode)

  - type: "expansion"
    title: "🔴 심화1: 상태 머신"
    code: |-
      from enum import Enum, auto

      class State(Enum):
          IDLE = auto()
          RUNNING = auto()
          PAUSED = auto()
          STOPPED = auto()

          def transitions(self):
              return {
                  State.IDLE: [State.RUNNING],
                  State.RUNNING: [State.PAUSED, State.STOPPED],
                  State.PAUSED: [State.RUNNING, State.STOPPED],
                  State.STOPPED: [State.IDLE]
              }.get(self, [])

      State.RUNNING.transitions()

  - type: "expansion"
    title: "🔴 심화2: Flag 권한 시스템"
    code: |-
      from enum import Flag, auto

      class Permission(Flag):
          NONE = 0
          READ = auto()
          WRITE = auto()
          EXECUTE = auto()
          ADMIN = READ | WRITE | EXECUTE

      def canPerform(user: Permission, required: Permission) -> bool:
          return (user & required) == required

      user = Permission.READ | Permission.WRITE
      canPerform(user, Permission.READ), canPerform(user, Permission.EXECUTE)

  - type: "expansion"
    title: "🔴 심화3: 커스텀 auto"
    code: |-
      from enum import Enum, auto

      class UpperName(Enum):
          @staticmethod
          def _generate_next_value_(name, start, count, last_values):
              return name.upper()

      class Command(UpperName):
          start = auto()
          stop = auto()
          restart = auto()

      Command.start.value, Command.stop.value

  - type: "expansion"
    title: "🔴 심화4: _missing_ 처리"
    code: |-
      from enum import Enum

      class Fuzzy(Enum):
          LOW = 1
          MEDIUM = 2
          HIGH = 3

          @classmethod
          def _missing_(cls, value):
              if isinstance(value, str):
                  for member in cls:
                      if member.name.lower() == value.lower():
                          return member
              return None

      Fuzzy('low'), Fuzzy('HIGH')

  - type: "expansion"
    title: "🔴 심화5: 딕셔너리 매핑"
    code: |-
      from enum import Enum

      class Action(Enum):
          CREATE = "create"
          UPDATE = "update"
          DELETE = "delete"

      handlers = {
          Action.CREATE: lambda: "Creating",
          Action.UPDATE: lambda: "Updating",
          Action.DELETE: lambda: "Deleting"
      }

      handlers[Action.CREATE](), handlers[Action.DELETE]()

  - type: "expansion"
    title: "🔴 심화6: 비교 가능 Enum"
    code: |-
      from enum import Enum
      from functools import total_ordering

      @total_ordering
      class Priority(Enum):
          LOW = 1
          MEDIUM = 2
          HIGH = 3

          def __lt__(self, other):
              if isinstance(other, Priority):
                  return self.value < other.value
              return NotImplemented

      sorted([Priority.HIGH, Priority.LOW, Priority.MEDIUM])

  - type: "expansion"
    title: "🔴 심화7: Enum과 dataclass"
    code: |-
      from enum import Enum, auto
      from dataclasses import dataclass

      class TaskStatus(Enum):
          TODO = auto()
          IN_PROGRESS = auto()
          DONE = auto()

      @dataclass
      class Task:
          title: str
          status: TaskStatus = TaskStatus.TODO

      task = Task("Write code", TaskStatus.IN_PROGRESS)
      task

  - type: "expansion"
    title: "🔴 심화8: JSON 직렬화"
    code: |-
      from enum import Enum
      import json

      class Status(Enum):
          ACTIVE = "active"
          INACTIVE = "inactive"

      class EnumEncoder(json.JSONEncoder):
          def default(self, obj):
              if isinstance(obj, Enum):
                  return obj.value
              return super().default(obj)

      data = {"status": Status.ACTIVE, "count": 10}
      json.dumps(data, cls=EnumEncoder)

  - type: "expansion"
    title: "🔴 심화9: 동적 Enum"
    code: |-
      from enum import Enum

      def createEnum(name, members):
          return Enum(name, members)

      Colors = createEnum('Colors', ['RED', 'GREEN', 'BLUE'])
      Sizes = createEnum('Sizes', {'SMALL': 1, 'MEDIUM': 2, 'LARGE': 3})

      Colors.RED, Sizes.LARGE.value

  - type: "expansion"
    title: "🔴 심화10: match와 Enum"
    code: |-
      from enum import Enum, auto

      class Shape(Enum):
          CIRCLE = auto()
          SQUARE = auto()
          TRIANGLE = auto()

      def describe(shape: Shape) -> str:
          match shape:
              case Shape.CIRCLE:
                  return "Round shape"
              case Shape.SQUARE:
                  return "Four equal sides"
              case Shape.TRIANGLE:
                  return "Three sides"
              case _:
                  return "Unknown"

      [describe(s) for s in Shape]
