    title: "🔴 심화8: 팩토리 패턴"
    code: |-
      from dataclasses import dataclass
      from typing import ClassVar

      @dataclass
      class Counter:
          id: int
          value: int = 0
          _nextId: ClassVar[int] = 1

          @classmethod
          def create(cls, value: int = 0) -> 'Counter':
              instance = cls(cls._nextId, value)
              cls._nextId += 1
              return instance

      Counter.create(10), Counter.create(20)

  - type: "expansion"
    title: "🔴 심화9: match_args"
    code: |-
      from dataclasses import dataclass

      @dataclass
      class Point:
          x: int
          y: int

      def describe(p):
          match p:
              case Point(0, 0):
                  return "origin"
              case Point(0, y):
                  return f"on y-axis at {y}"
              case Point(x, 0):
                  return f"on x-axis at {x}"
              case Point(x, y):
                  return f"at ({x}, {y})"

      describe(Point(0, 0)), describe(Point(3, 4))

