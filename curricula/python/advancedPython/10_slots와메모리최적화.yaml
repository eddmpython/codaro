  explanation: Day 10에서 배운 __slots__와 메모리 최적화를 난이도별로 복습합니다. __slots__는 인스턴스 속성을 고정하여 __dict__ 생성을 막고 메모리를
    절약하는 기법입니다. 수만~수백만 개의 객체를 생성할 때 효과적이며, 속성 접근 속도도 약간 빨라집니다. 🟢 기본 문제로 __slots__ 정의와 메모리 비교를 익히고, 🟡 응용
