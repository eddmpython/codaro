sections:
- id: bubble_sort
  title: 버블 정렬
  structuredPrimary: true
  subtitle: 인접 요소 교환
  goal: 버블 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    버블 정렬은 인접한 두 요소를 비교하여 교환하는 가장 단순한 정렬입니다. 가장 큰 값이 거품처럼 맨 뒤로 떠오릅니다. 시간 복잡도는 최악/평균 O(n²), 최선 O(n)입니다. 공간 복잡도는 O(1)로 제자리(in-place) 정렬입니다. 안정(stable) 정렬로 같은 값의 순서가 유지됩니다. 교육용으로는 좋지만 실무에서는 거의 사용하지 않습니다.

    n개 요소의 버블 정렬은 최대 n(n-1)/2번 비교합니다.
  tips:
  - n개 요소의 버블 정렬은 최대 n(n-1)/2번 비교합니다.
  snippet: |-
    def bubbleSort(arr):
        n = len(arr)
        for i in range(n):
            for j in range(n - 1 - i):
                if arr[j] > arr[j + 1]:
                    arr[j], arr[j + 1] = arr[j + 1], arr[j]
        return arr

    bubbleSort([64, 34, 25, 12, 22, 11, 90])
  exercise:
    prompt: 버블 정렬 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def bubbleSort(arr):
          n = len(arr)
          for i in range(n):
              for j in range(n - 1 - i):
                  if arr[j] > arr[j + 1]:
                      arr[j], arr[j + 1] = arr[j + 1], arr[j]
          return arr

      bubbleSort([64, 34, 25, 12, 22, 11, 90])
    hints:
    - 버블 정렬 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 버블 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 버블 정렬에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: selection_sort
  title: 선택 정렬
  structuredPrimary: true
  subtitle: 최솟값 선택
  goal: 선택 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    선택 정렬은 남은 요소 중 최솟값을 찾아 현재 위치에 놓습니다. 각 패스에서 정확히 하나의 요소가 정렬됩니다. 시간 복잡도는 항상 O(n²)입니다. 공간 복잡도는 O(1)입니다. 교환 횟수가 적어 쓰기 비용이 높을 때 유리합니다. 불안정(unstable) 정렬로 같은 값의 순서가 바뀔 수 있습니다.

    선택 정렬은 교환이 O(n)으로 버블 정렬보다 적습니다.
  tips:
  - 선택 정렬은 교환이 O(n)으로 버블 정렬보다 적습니다.
  snippet: |-
    def selectionSort(arr):
        n = len(arr)
        for i in range(n):
            minIdx = i
            for j in range(i + 1, n):
                if arr[j] < arr[minIdx]:
                    minIdx = j
            arr[i], arr[minIdx] = arr[minIdx], arr[i]
        return arr

    selectionSort([64, 25, 12, 22, 11])
  exercise:
    prompt: 선택 정렬 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def selectionSort(arr):
          n = len(arr)
          for i in range(n):
              minIdx = i
              for j in range(i + 1, n):
                  if arr[j] < arr[minIdx]:
                      minIdx = j
              arr[i], arr[minIdx] = arr[minIdx], arr[i]
          return arr

      selectionSort([64, 25, 12, 22, 11])
    hints:
    - 선택 정렬 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 선택 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 선택 정렬에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: insertion_sort
  title: 삽입 정렬
  structuredPrimary: true
  subtitle: 정렬된 부분에 삽입
  goal: 삽입 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    삽입 정렬은 각 요소를 이미 정렬된 부분의 올바른 위치에 삽입합니다. 카드 게임에서 손에 든 카드를 정렬하는 방식과 같습니다. 시간 복잡도는 최악 O(n²), 최선 O(n)입니다. 거의 정렬된 데이터에서 매우 효율적입니다. 안정 정렬이며 작은 데이터셋에 적합합니다. Timsort의 구성 요소로 사용됩니다.

    삽입 정렬은 온라인 알고리즘으로 스트리밍 데이터에도 사용할 수 있습니다.
  tips:
  - 삽입 정렬은 온라인 알고리즘으로 스트리밍 데이터에도 사용할 수 있습니다.
  snippet: |-
    def insertionSort(arr):
        for i in range(1, len(arr)):
            key = arr[i]
            j = i - 1
            while j >= 0 and arr[j] > key:
                arr[j + 1] = arr[j]
                j -= 1
            arr[j + 1] = key
        return arr

    insertionSort([12, 11, 13, 5, 6])
  exercise:
    prompt: 삽입 정렬 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def insertionSort(arr):
          for i in range(1, len(arr)):
              key = arr[i]
              j = i - 1
              while j >= 0 and arr[j] > key:
                  arr[j + 1] = arr[j]
                  j -= 1
              arr[j + 1] = key
          return arr

      insertionSort([12, 11, 13, 5, 6])
    hints:
    - 삽입 정렬 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 삽입 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 삽입 정렬에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: merge_sort
  title: 병합 정렬
  structuredPrimary: true
  subtitle: 분할정복 O(n log n)
  goal: 병합 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    병합 정렬은 분할정복 방식의 효율적인 정렬입니다. 배열을 반으로 나누고, 각각 정렬한 후, 병합합니다. 시간 복잡도는 항상 O(n log n)입니다. 공간 복잡도는 O(n)으로 추가 메모리가 필요합니다. 안정 정렬이며 연결 리스트에 적합합니다. 대용량 데이터의 외부 정렬에도 사용됩니다.

    병합 정렬은 예측 가능한 성능이 필요할 때 좋습니다.
  tips:
  - 병합 정렬은 예측 가능한 성능이 필요할 때 좋습니다.
  snippet: |-
    def mergeSort(arr):
        if len(arr) <= 1:
            return arr
        mid = len(arr) // 2
        left = mergeSort(arr[:mid])
        right = mergeSort(arr[mid:])
        return merge(left, right)

    def merge(left, right):
        result = []
        i = j = 0
        while i < len(left) and j < len(right):
            if left[i] <= right[j]:
                result.append(left[i])
                i += 1
            else:
                result.append(right[j])
                j += 1
        result.extend(left[i:])
        result.extend(right[j:])
        return result

    mergeSort([38, 27, 43, 3, 9, 82, 10])
  exercise:
    prompt: 병합 정렬 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def mergeSort(arr):
          if len(arr) <= 1:
              return arr
          mid = len(arr) // 2
          left = mergeSort(arr[:mid])
          right = mergeSort(arr[mid:])
          return merge(left, right)

      def merge(left, right):
          result = []
          i = j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i += 1
              else:
                  result.append(right[j])
                  j += 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result

      mergeSort([38, 27, 43, 3, 9, 82, 10])
    hints:
    - 병합 정렬 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 병합 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 병합 정렬에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: quick_sort
  title: 퀵 정렬
  structuredPrimary: true
  subtitle: 피벗 기반 분할
  goal: 퀵 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    퀵 정렬은 피벗을 기준으로 작은 값과 큰 값을 분할합니다. 평균 시간 복잡도 O(n log n), 최악 O(n²)입니다. 공간 복잡도는 O(log n) 스택 공간입니다. 제자리 정렬이며 캐시 효율이 좋습니다. 피벗 선택이 성능에 큰 영향을 미칩니다. 불안정 정렬이지만 실무에서 가장 빠른 경우가 많습니다.

    정렬된 배열에서 첫/끝 피벗은 O(n²)가 됩니다. 중간 또는 랜덤 피벗을 사용하세요.
  tips:
  - 정렬된 배열에서 첫/끝 피벗은 O(n²)가 됩니다. 중간 또는 랜덤 피벗을 사용하세요.
  snippet: |-
    def quickSort(arr):
        if len(arr) <= 1:
            return arr
        pivot = arr[len(arr) // 2]
        left = [x for x in arr if x < pivot]
        middle = [x for x in arr if x == pivot]
        right = [x for x in arr if x > pivot]
        return quickSort(left) + middle + quickSort(right)

    quickSort([3, 6, 8, 10, 1, 2, 1])
  exercise:
    prompt: 퀵 정렬 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def quickSort(arr):
          if len(arr) <= 1:
              return arr
          pivot = arr[len(arr) // 2]
          left = [x for x in arr if x < pivot]
          middle = [x for x in arr if x == pivot]
          right = [x for x in arr if x > pivot]
          return quickSort(left) + middle + quickSort(right)

      quickSort([3, 6, 8, 10, 1, 2, 1])
    hints:
    - 퀵 정렬 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 퀵 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 퀵 정렬에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: python_sort
  title: 파이썬 정렬
  structuredPrimary: true
  subtitle: Timsort와 활용
  goal: 파이썬 정렬에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    파이썬의 sort()와 sorted()는 Timsort를 사용합니다. Timsort는 병합 정렬과 삽입 정렬의 하이브리드입니다. 시간 복잡도는 최악 O(n log n), 최선 O(n)입니다. 안정 정렬이며 실세계 데이터에 최적화되어 있습니다. key 함수로 정렬 기준을 지정합니다. reverse=True로 내림차순 정렬합니다.

    operator.itemgetter, operator.attrgetter로 key 함수를 더 효율적으로 만들 수 있습니다.
  tips:
  - operator.itemgetter, operator.attrgetter로 key 함수를 더 효율적으로 만들 수 있습니다.
  snippet: |-
    numbers = [3, 1, 4, 1, 5, 9, 2, 6]
    sortedNums = sorted(numbers)
    numbers.sort(reverse=True)
    sortedNums, numbers
  exercise:
    prompt: 파이썬 정렬 예제에서 리스트 값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      numbers = [3, 1, 4, 1, 5, 9, 2, 6]
      sortedNums = sorted(numbers)
      numbers.sort(reverse=True)
      sortedNums, numbers
    hints:
    - 파이썬 정렬 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 파이썬 정렬 코드가 예외 없이 끝나야 합니다.
    resultCheck: 파이썬 정렬에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 주문 처리 우선순위 정렬하기'
  structuredPrimary: true
  subtitle: 안정 정렬, key 함수, 입력 검증을 업무 데이터로 확인합니다
  goal: '현업 흐름 검증: 주문 처리 우선순위 정렬하기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    실무 정렬은 알고리즘을 직접 구현하는 것보다 기준을 틀리지 않는 것이 중요합니다. 접수 시간으로 한 번 정렬한 뒤 SLA로 다시 정렬하면 Python의 안정 정렬 때문에 같은 SLA 안에서는 접수 순서가 유지됩니다.

    변주 실험
    환불 요청은 금액보다 생성 시간이 중요하다는 규칙을 추가하고, 정렬 기준 함수만 바꿔 기대 순서가 바뀌는지 검증하세요.
  tips:
  - 변주 실험 환불 요청은 금액보다 생성 시간이 중요하다는 규칙을 추가하고, 정렬 기준 함수만 바꿔 기대 순서가 바뀌는지 검증하세요.
  snippet: |-
    orders = [
        {"id": "O-3", "sla": 2, "createdAt": "09:20", "amount": 80_000},
        {"id": "O-1", "sla": 1, "createdAt": "09:00", "amount": 30_000},
        {"id": "O-2", "sla": 2, "createdAt": "09:05", "amount": 120_000},
        {"id": "O-4", "sla": 1, "createdAt": "09:10", "amount": 40_000},
    ]

    byCreated = sorted(orders, key=lambda order: order["createdAt"])
    bySlaStable = sorted(byCreated, key=lambda order: order["sla"])

    assert [order["id"] for order in bySlaStable] == ["O-1", "O-4", "O-2", "O-3"]
  exercise:
    prompt: '현업 흐름 검증: 주문 처리 우선순위 정렬하기 예제에서 반복 대상이나 범위을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.'
    starterCode: |-
      orders = [
          {"id": "O-3", "sla": 2, "createdAt": "09:20", "amount": 80_000},
          {"id": "O-1", "sla": 1, "createdAt": "09:00", "amount": 30_000},
          {"id": "O-2", "sla": 2, "createdAt": "09:05", "amount": 120_000},
          {"id": "O-4", "sla": 1, "createdAt": "09:10", "amount": 40_000},
      ]

      byCreated = sorted(orders, key=lambda order: order["createdAt"])
      bySlaStable = sorted(byCreated, key=lambda order: order["sla"])

      assert [order["id"] for order in bySlaStable] == ["O-1", "O-4", "O-2", "O-3"]
    hints:
    - '현업 흐름 검증: 주문 처리 우선순위 정렬하기 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.'
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: '현업 흐름 검증: 주문 처리 우선순위 정렬하기 코드가 예외 없이 끝나야 합니다.'
    resultCheck: '현업 흐름 검증: 주문 처리 우선순위 정렬하기에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.'
- id: practice
  title: 종합 복습
  structuredPrimary: true
  subtitle: 정렬 알고리즘 마스터하기
  goal: 종합 복습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: Day 17에서 배운 정렬 알고리즘을 난이도별로 복습합니다. 정렬은 데이터를 특정 순서로 배열하는 기본적이면서 중요한 알고리즘으로, 시간복잡도와 공간복잡도의
    트레이드오프를 이해하는 핵심 주제입니다. O(n²) 알고리즘(버블, 선택, 삽입)과 O(n log n) 알고리즘(병합, 퀵)의 차이를 체감해보세요. 🟢 기본 문제로 버블, 선택,
    삽입 정렬을 구현하고, 🟡 응용 문제로 병합 정렬과 퀵 정렬을 연습하세요. 🔴 심화 문제에서는 안정 정렬, 키 함수 정렬, 복합 정렬 조건 등 실무 패턴을 다룹니다. 실무에서는
    대부분 내장 sorted()를 사용하지만, 원리를 알면 최적화 판단에 도움이 됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def bubble(arr):
        n = len(arr)
        for i in range(n):
            for j in range(n - 1 - i):
                if arr[j] > arr[j+1]:
                    arr[j], arr[j+1] = arr[j+1], arr[j]
        return arr

    bubble([5, 3, 8, 4, 2])
  exercise:
    prompt: 종합 복습 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def bubble(arr):
          n = len(arr)
          for i in range(n):
              for j in range(n - 1 - i):
                  if arr[j] > arr[j+1]:
                      arr[j], arr[j+1] = arr[j+1], arr[j]
          return arr

      bubble([5, 3, 8, 4, 2])
    hints:
    - 종합 복습 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 종합 복습 코드가 예외 없이 끝나야 합니다.
    resultCheck: 종합 복습에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
