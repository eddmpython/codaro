sections:
- id: metaclass_basics
  title: 메타클래스 기초
  structuredPrimary: true
  subtitle: 클래스를 생성하는 클래스
  goal: 메타클래스 기초에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 클래스를 생성하는 클래스 - 메타클래스
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class SimpleMeta(type):
        def __new__(mcs, name, bases, namespace):
            namespace['created_by'] = 'SimpleMeta'
            return super().__new__(mcs, name, bases, namespace)

    class MyClass(metaclass=SimpleMeta):
        pass

    metaInstance = MyClass()
    metaCreatedBy = MyClass.created_by
    metaType = type(MyClass)
    metaResult = (metaCreatedBy, metaType.__name__)
    metaResult
  exercise:
    prompt: 메타클래스 기초 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class SimpleMeta(type):
          def __new__(mcs, name, bases, namespace):
              namespace['created_by'] = 'SimpleMeta'
              return super().__new__(mcs, name, bases, namespace)

      class MyClass(metaclass=SimpleMeta):
          pass

      metaInstance = MyClass()
      metaCreatedBy = MyClass.created_by
      metaType = type(MyClass)
      metaResult = (metaCreatedBy, metaType.__name__)
      metaResult
    hints:
    - 메타클래스 기초 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 메타클래스 기초 코드가 예외 없이 끝나야 합니다.
    resultCheck: 메타클래스 기초에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: metaclass_patterns
  title: 메타클래스 활용
  structuredPrimary: true
  subtitle: 싱글톤, 등록, 검증 패턴
  goal: 메타클래스 활용에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 싱글톤, 등록, 검증 등 메타클래스 활용 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class SingletonMeta(type):
        _instances = {}

        def __call__(cls, *args, **kwargs):
            if cls not in cls._instances:
                cls._instances[cls] = super().__call__(*args, **kwargs)
            return cls._instances[cls]

    class DatabaseConn(metaclass=SingletonMeta):
        def __init__(self):
            self.connected = True

    dbConn1 = DatabaseConn()
    dbConn2 = DatabaseConn()
    singletonCheck = dbConn1 is dbConn2
    singletonCheck
  exercise:
    prompt: 메타클래스 활용 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class SingletonMeta(type):
          _instances = {}

          def __call__(cls, *args, **kwargs):
              if cls not in cls._instances:
                  cls._instances[cls] = super().__call__(*args, **kwargs)
              return cls._instances[cls]

      class DatabaseConn(metaclass=SingletonMeta):
          def __init__(self):
              self.connected = True

      dbConn1 = DatabaseConn()
      dbConn2 = DatabaseConn()
      singletonCheck = dbConn1 is dbConn2
      singletonCheck
    hints:
    - 메타클래스 활용 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 메타클래스 활용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 메타클래스 활용에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: descriptors
  title: 디스크립터
  structuredPrimary: true
  subtitle: 속성 접근 제어
  goal: 디스크립터에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 속성 접근을 제어하는 디스크립터 프로토콜
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class TypedProperty:
        def __init__(self, name, expectedType):
            self.name = name
            self.expectedType = expectedType

        def __get__(self, obj, objType=None):
            if obj is None:
                return self
            return obj.__dict__.get(self.name)

        def __set__(self, obj, value):
            if not isinstance(value, self.expectedType):
                raise TypeError(f"Expected {self.expectedType.__name__}")
            obj.__dict__[self.name] = value

    class Person:
        name = TypedProperty('name', str)
        age = TypedProperty('age', int)

        def __init__(self, name, age):
            self.name = name
            self.age = age

    typedPerson = Person("Alice", 30)
    typedName = typedPerson.name
    typedAge = typedPerson.age
    typedResult = (typedName, typedAge)
    typedResult
  exercise:
    prompt: 디스크립터 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class TypedProperty:
          def __init__(self, name, expectedType):
              self.name = name
              self.expectedType = expectedType

          def __get__(self, obj, objType=None):
              if obj is None:
                  return self
              return obj.__dict__.get(self.name)

          def __set__(self, obj, value):
              if not isinstance(value, self.expectedType):
                  raise TypeError(f"Expected {self.expectedType.__name__}")
              obj.__dict__[self.name] = value

      class Person:
          name = TypedProperty('name', str)
          age = TypedProperty('age', int)

          def __init__(self, name, age):
              self.name = name
              self.age = age

      typedPerson = Person("Alice", 30)
      typedName = typedPerson.name
      typedAge = typedPerson.age
      typedResult = (typedName, typedAge)
      typedResult
    hints:
    - 디스크립터 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 디스크립터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 디스크립터에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: dynamic_attrs
  title: 동적 속성
  structuredPrimary: true
  subtitle: __getattr__, __setattr__ 활용
  goal: 동적 속성에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: __getattr__, __setattr__, __getattribute__ 활용
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class DynamicAttrs:
        def __init__(self):
            self._data = {}

        def __getattr__(self, name):
            if name.startswith('_'):
                raise AttributeError(name)
            return self._data.get(name, f"<undefined:{name}>")

        def __setattr__(self, name, value):
            if name.startswith('_'):
                super().__setattr__(name, value)
            else:
                self._data[name] = value

        def __delattr__(self, name):
            if name in self._data:
                del self._data[name]

    dynamicObj = DynamicAttrs()
    dynamicObj.foo = "bar"
    dynamicObj.count = 42
    dynamicFoo = dynamicObj.foo
    dynamicCount = dynamicObj.count
    dynamicUndef = dynamicObj.undefined
    dynamicResult = (dynamicFoo, dynamicCount, dynamicUndef)
    dynamicResult
  exercise:
    prompt: 동적 속성 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class DynamicAttrs:
          def __init__(self):
              self._data = {}

          def __getattr__(self, name):
              if name.startswith('_'):
                  raise AttributeError(name)
              return self._data.get(name, f"<undefined:{name}>")

          def __setattr__(self, name, value):
              if name.startswith('_'):
                  super().__setattr__(name, value)
              else:
                  self._data[name] = value

          def __delattr__(self, name):
              if name in self._data:
                  del self._data[name]

      dynamicObj = DynamicAttrs()
      dynamicObj.foo = "bar"
      dynamicObj.count = 42
      dynamicFoo = dynamicObj.foo
      dynamicCount = dynamicObj.count
      dynamicUndef = dynamicObj.undefined
      dynamicResult = (dynamicFoo, dynamicCount, dynamicUndef)
      dynamicResult
    hints:
    - 동적 속성 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 동적 속성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 동적 속성에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: new_init
  title: __new__와 __init__
  structuredPrimary: true
  subtitle: 객체 생성 과정 제어
  goal: new와 init에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 객체 생성 과정 제어하기
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class ImmutablePoint:
        def __new__(cls, x, y):
            instance = super().__new__(cls)
            object.__setattr__(instance, 'x', x)
            object.__setattr__(instance, 'y', y)
            return instance

        def __setattr__(self, name, value):
            raise AttributeError("ImmutablePoint is immutable")

        def __repr__(self):
            return f"ImmutablePoint({self.x}, {self.y})"

    immutablePt = ImmutablePoint(3, 4)
    ptX = immutablePt.x
    ptY = immutablePt.y
    ptRepr = repr(immutablePt)
    immutableResult = (ptX, ptY, ptRepr)
    immutableResult
  exercise:
    prompt: new와 init 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      class ImmutablePoint:
          def __new__(cls, x, y):
              instance = super().__new__(cls)
              object.__setattr__(instance, 'x', x)
              object.__setattr__(instance, 'y', y)
              return instance

          def __setattr__(self, name, value):
              raise AttributeError("ImmutablePoint is immutable")

          def __repr__(self):
              return f"ImmutablePoint({self.x}, {self.y})"

      immutablePt = ImmutablePoint(3, 4)
      ptX = immutablePt.x
      ptY = immutablePt.y
      ptRepr = repr(immutablePt)
      immutableResult = (ptX, ptY, ptRepr)
      immutableResult
    hints:
    - new와 init 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: new와 init 코드가 예외 없이 끝나야 합니다.
    resultCheck: new와 init에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: dynamic_class
  title: 동적 클래스 생성
  structuredPrimary: true
  subtitle: type()으로 클래스 생성
  goal: 동적 클래스 생성에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: type()을 사용한 동적 클래스 생성
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def makeClass(className, **attrs):
        def initMethod(self, **kwargs):
            for key, value in kwargs.items():
                setattr(self, key, value)

        def reprMethod(self):
            attrs = ', '.join(f"{k}={v!r}" for k, v in self.__dict__.items())
            return f"{self.__class__.__name__}({attrs})"

        namespace = {
            '__init__': initMethod,
            '__repr__': reprMethod,
            **attrs
        }
        return type(className, (), namespace)

    DynamicUser = makeClass('DynamicUser', role='user')
    dynUser = DynamicUser(name="Alice", age=30)
    dynUserRepr = repr(dynUser)
    dynUserRole = DynamicUser.role
    dynamicClassResult = (dynUserRepr, dynUserRole)
    dynamicClassResult
  exercise:
    prompt: 동적 클래스 생성 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def makeClass(className, **attrs):
          def initMethod(self, **kwargs):
              for key, value in kwargs.items():
                  setattr(self, key, value)

          def reprMethod(self):
              attrs = ', '.join(f"{k}={v!r}" for k, v in self.__dict__.items())
              return f"{self.__class__.__name__}({attrs})"

          namespace = {
              '__init__': initMethod,
              '__repr__': reprMethod,
              **attrs
          }
          return type(className, (), namespace)

      DynamicUser = makeClass('DynamicUser', role='user')
      dynUser = DynamicUser(name="Alice", age=30)
      dynUserRepr = repr(dynUser)
      dynUserRole = DynamicUser.role
      dynamicClassResult = (dynUserRepr, dynUserRole)
      dynamicClassResult
    hints:
    - 동적 클래스 생성 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 동적 클래스 생성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 동적 클래스 생성에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 선언형 주문 모델 만들기'
  structuredPrimary: true
  subtitle: descriptor와 metaclass로 필드 계약을 자동 수집하고 검증합니다
  goal: '현업 흐름 검증: 선언형 주문 모델 만들기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    메타프로그래밍은 신기한 문법이 아니라 프레임워크가 반복 규칙을 대신 적용하게 만드는 방법입니다. 필드 정의를 클래스 선언에 적으면 메타클래스가 필드를 모으고, 디스크립터가 타입 검증을 수행하는 흐름을 확인하세요.

    변주 실험
