      class PluginSystem:
          _plugins = {}
          _hooks = {}

          @classmethod
          def register(cls, name):
              def decorator(pluginCls):
                  cls._plugins[name] = pluginCls()
                  return pluginCls
              return decorator

          @classmethod
          def hook(cls, hookName):
              def decorator(fn):
                  if hookName not in cls._hooks:
                      cls._hooks[hookName] = []
                  cls._hooks[hookName].append(fn)
                  return fn
              return decorator

          @classmethod
          def trigger(cls, hookName, *args, **kwargs):
              results = []
              for fn in cls._hooks.get(hookName, []):
                  results.append(fn(*args, **kwargs))
              return results

          @classmethod
          def getPlugin(cls, name):
              return cls._plugins.get(name)

