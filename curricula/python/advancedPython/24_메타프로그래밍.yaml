      class CachingMeta(type):
          def __new__(mcs, name, bases, namespace):
              for attrName, attr in namespace.items():
                  if callable(attr) and getattr(attr, '_cached', False):
                      namespace[attrName] = mcs.makeCached(attr)
              return super().__new__(mcs, name, bases, namespace)

          @staticmethod
          def makeCached(fn):
              cache = {}
              def wrapped(self, *args):
                  key = args
                  if key not in cache:
                      cache[key] = fn(self, *args)
                  return cache[key]
              wrapped._cache = cache
              return wrapped

      def cached(fn):
          fn._cached = True
          return fn

      class Fibonacci(metaclass=CachingMeta):
          callCount = 0

          @cached
          def compute(self, n):
              Fibonacci.callCount += 1
              if n <= 1:
                  return n
              return self.compute(n - 1) + self.compute(n - 2)

