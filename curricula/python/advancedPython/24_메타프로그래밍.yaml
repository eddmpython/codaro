      class ContractMeta(type):
          def __new__(mcs, name, bases, namespace):
              for attrName, attr in namespace.items():
                  if callable(attr) and hasattr(attr, '_preconditions'):
                      namespace[attrName] = mcs.wrapWithContract(attr)
              return super().__new__(mcs, name, bases, namespace)

          @staticmethod
          def wrapWithContract(fn):
              def wrapped(*args, **kwargs):
                  for pre in fn._preconditions:
                      if not pre(*args, **kwargs):
                          raise ValueError(f"Precondition failed")
                  result = fn(*args, **kwargs)
                  for post in getattr(fn, '_postconditions', []):
                      if not post(result):
                          raise ValueError(f"Postcondition failed")
                  return result
              return wrapped

      def precondition(*conditions):
          def decorator(fn):
              fn._preconditions = conditions
              return fn
          return decorator

      def postcondition(*conditions):
          def decorator(fn):
              fn._postconditions = conditions
              return fn
          return decorator

      class Calculator(metaclass=ContractMeta):
          @precondition(lambda self, a, b: b != 0)
          @postcondition(lambda result: result is not None)
          def divide(self, a, b):
              return a / b

