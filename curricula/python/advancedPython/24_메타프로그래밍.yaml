      class ChainableMeta(type):
          def __new__(mcs, name, bases, namespace):
              for attrName, attr in namespace.items():
                  if callable(attr) and not attrName.startswith('_') and attrName != 'build':
                      namespace[attrName] = mcs.makeChainable(attr)
              return super().__new__(mcs, name, bases, namespace)

          @staticmethod
          def makeChainable(fn):
              def wrapped(self, *args, **kwargs):
                  result = fn(self, *args, **kwargs)
                  if result is None:
                      return self
                  return result
              return wrapped

      class QueryBuilder(metaclass=ChainableMeta):
          def __init__(self):
              self._table = None
              self._conditions = []
              self._limit = None

          def table(self, name):
              self._table = name

          def where(self, condition):
              self._conditions.append(condition)

          def limit(self, n):
              self._limit = n

          def build(self):
              query = f"SELECT * FROM {self._table}"
              if self._conditions:
                  query += " WHERE " + " AND ".join(self._conditions)
              if self._limit:
                  query += f" LIMIT {self._limit}"
              return query

