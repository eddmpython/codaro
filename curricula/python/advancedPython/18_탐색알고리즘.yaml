- id: workflow_validation
  title: '현업 흐름 검증: 재고 조회와 장애 경로 찾기'
  structuredPrimary: true
  subtitle: 정렬 데이터 이진 탐색과 그래프 BFS를 각각 맞는 문제에 적용합니다
  goal: '현업 흐름 검증: 재고 조회와 장애 경로 찾기에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.'
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    탐색 알고리즘은 데이터 모양을 먼저 봐야 합니다. 정렬된 재고 목록은 이진 탐색으로 찾고, 서비스 의존성처럼 관계가 얽힌 문제는 BFS로 최단 경로를 찾습니다.

    변주 실험
    재고가 품절인 SKU만 set으로 만들고, 주문 목록을 돌며 품절 SKU가 포함되어 있는지 O(1) 멤버십으로 검사하세요.
  tips:
  - 변주 실험 재고가 품절인 SKU만 set으로 만들고, 주문 목록을 돌며 품절 SKU가 포함되어 있는지 O(1) 멤버십으로 검사하세요.
  snippet: |-
    from bisect import bisect_left

    def findSku(rows, sku):
        keys = [row["sku"] for row in rows]
        if keys != sorted(keys):
            raise ValueError("rows must be sorted by sku")
        index = bisect_left(keys, sku)
        if index < len(rows) and rows[index]["sku"] == sku:
            return rows[index]
        return None

    inventory = [
        {"sku": "A-100", "stock": 5},
        {"sku": "B-200", "stock": 0},
        {"sku": "C-300", "stock": 12},
    ]

    assert findSku(inventory, "C-300")["stock"] == 12
    assert findSku(inventory, "D-400") is None
  exercise:
    prompt: '현업 흐름 검증: 재고 조회와 장애 경로 찾기 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.'
    starterCode: |-
      from bisect import bisect_left

      def findSku(rows, sku):
          keys = [row["sku"] for row in rows]
          if keys != sorted(keys):
              raise ValueError("rows must be sorted by sku")
          index = bisect_left(keys, sku)
          if index < len(rows) and rows[index]["sku"] == sku:
              return rows[index]
          return None

      inventory = [
          {"sku": "A-100", "stock": 5},
          {"sku": "B-200", "stock": 0},
          {"sku": "C-300", "stock": 12},
      ]

      assert findSku(inventory, "C-300")["stock"] == 12
      assert findSku(inventory, "D-400") is None
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: '현업 흐름 검증: 재고 조회와 장애 경로 찾기의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.'
    resultCheck: '현업 흐름 검증: 재고 조회와 장애 경로 찾기 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.'
- id: practice
  title: 종합 복습
  structuredPrimary: true
  subtitle: 탐색 알고리즘 마스터하기
  goal: 종합 복습에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 함수 입력과 반환값을 작게 확인하면 이후 코드에서 같은 동작을 안전하게 재사용할 수 있습니다.
  explanation: Day 18에서 배운 탐색 알고리즘을 난이도별로 복습합니다. 탐색은 데이터에서 원하는 값을 찾는 기본 연산으로, 선형 탐색 O(n)과 이진 탐색 O(log
    n)의 성능 차이를 이해하는 것이 핵심입니다. 해시 탐색은 O(1)을 제공하며, 그래프 탐색(BFS, DFS)은 복잡한 구조 탐색의 기반입니다. 🟢 기본 문제로 선형 탐색, 최댓값/최솟값
    찾기를 익히고, 🟡 응용 문제로 이진 탐색, 해시 탐색을 연습하세요. 🔴 심화 문제에서는 BFS/DFS, 경로 찾기, bisect 모듈 활용 등 고급 탐색을 다룹니다. 탐색 알고리즘
    선택은 데이터 정렬 여부, 크기, 접근 패턴에 따라 달라집니다.
