          visitedDfs.add(node)
          orderDfs = [node]
          for neighbor in graph[node]:
              if neighbor not in visitedDfs:
                  orderDfs.extend(dfsRecursive(graph, neighbor, visitedDfs))
          return orderDfs

      graphDfs = {
          'A': ['B', 'C'], 'B': ['A', 'D', 'E'],
          'C': ['A', 'F'], 'D': ['B'], 'E': ['B', 'F'], 'F': ['C', 'E']
      }
      dfsResult = dfsRecursive(graphDfs, 'A')
      f"DFS 순서 (재귀): {' -> '.join(dfsResult)}"
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: hash_search
  title: 해시 탐색
  structuredPrimary: true
  subtitle: O(1) 상수 시간
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    해시 탐색은 해시 함수를 사용하여 평균 O(1) 시간에 탐색하는 방법입니다. 파이썬의 dict와 set이 해시 테이블로 구현되어 있습니다. 해시 충돌이 많으면 최악 O(n)이 될 수 있습니다. 키 존재 여부 확인, 빈도 카운팅, 중복 제거에 최적입니다. 메모리를 더 사용하지만 탐색 속도가 매우 빠릅니다.

    리스트에서 in 연산은 O(n), set에서는 O(1)입니다. 반복 탐색은 set을 사용하세요.
  tips:
  - 리스트에서 in 연산은 O(n), set에서는 O(1)입니다. 반복 탐색은 set을 사용하세요.
  snippet: |-
    employeeDict = {
        'E001': {'name': '김철수', 'dept': '개발팀'},
        'E002': {'name': '이영희', 'dept': '기획팀'},
        'E003': {'name': '박지민', 'dept': '디자인팀'}
    }
    foundEmployee = employeeDict.get('E002')
    f"E002 정보: {foundEmployee}"
  exercise:
