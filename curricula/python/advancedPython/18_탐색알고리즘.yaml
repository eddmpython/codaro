  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Day 18에서 배운 탐색 알고리즘을 난이도별로 복습합니다. 탐색은 데이터에서 원하는 값을 찾는 기본 연산으로, 선형 탐색 O(n)과 이진 탐색 O(log n)의 성능 차이를 이해하는 것이 핵심입니다. 해시 탐색은 O(1)을 제공하며, 그래프 탐색(BFS, DFS)은 복잡한 구조 탐색의 기반입니다. 🟢 기본 문제로 선형 탐색, 최댓값/최솟값 찾기를 익히고, 🟡 응용 문제로 이진 탐색, 해시 탐색을 연습하세요. 🔴 심화 문제에서는 BFS/DFS, 경로 찾기, bisect 모듈 활용 등 고급 탐색을 다룹니다. 탐색 알고리즘 선택은 데이터 정렬 여부, 크기, 접근 패턴에 따라 달라집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def findMaxIndex(arr):
        if not arr:
            return -1
        maxIdx = 0
        for i in range(1, len(arr)):
            if arr[i] > arr[maxIdx]:
                maxIdx = i
        return maxIdx

    ex1Nums = [3, 7, 2, 9, 4, 6, 8, 1, 5]
    ex1Result = findMaxIndex(ex1Nums)
    f"최댓값 {ex1Nums[ex1Result]}의 인덱스: {ex1Result}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def findMaxIndex(arr):
          if not arr:
              return -1
          maxIdx = 0
          for i in range(1, len(arr)):
              if arr[i] > arr[maxIdx]:
                  maxIdx = i
          return maxIdx

      ex1Nums = [3, 7, 2, 9, 4, 6, 8, 1, 5]
      ex1Result = findMaxIndex(ex1Nums)
      f"최댓값 {ex1Nums[ex1Result]}의 인덱스: {ex1Result}"
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
