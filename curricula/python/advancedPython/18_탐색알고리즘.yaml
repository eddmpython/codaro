    resultCheck: 출력 또는 assert 확인
- id: dfs
  title: 깊이 우선 탐색 (DFS)
  structuredPrimary: true
  subtitle: 경로 우선 탐색
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    DFS(Depth-First Search)는 한 경로를 끝까지 탐색한 후 되돌아오는 알고리즘입니다. 스택 또는 재귀를 사용하여 구현합니다. 시간 복잡도는 O(V + E)로 BFS와 동일합니다. 최단 경로를 보장하지 않지만 모든 경로 탐색에 유리합니다. 사이클 탐지, 위상 정렬, 백트래킹 등에 사용됩니다.

    파이썬 기본 재귀 한도는 1000입니다. 깊은 그래프는 스택 버전을 사용하세요.
  tips:
  - 파이썬 기본 재귀 한도는 1000입니다. 깊은 그래프는 스택 버전을 사용하세요.
  snippet: |-
    def dfsRecursive(graph, node, visitedDfs=None):
        if visitedDfs is None:
            visitedDfs = set()
        visitedDfs.add(node)
        orderDfs = [node]
        for neighbor in graph[node]:
            if neighbor not in visitedDfs:
                orderDfs.extend(dfsRecursive(graph, neighbor, visitedDfs))
        return orderDfs

    graphDfs = {
        'A': ['B', 'C'], 'B': ['A', 'D', 'E'],
        'C': ['A', 'F'], 'D': ['B'], 'E': ['B', 'F'], 'F': ['C', 'E']
    }
    dfsResult = dfsRecursive(graphDfs, 'A')
    f"DFS 순서 (재귀): {' -> '.join(dfsResult)}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def dfsRecursive(graph, node, visitedDfs=None):
          if visitedDfs is None:
