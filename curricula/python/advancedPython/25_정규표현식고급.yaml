      import re

      def parseDate(text):
          patterns = [
              (r'(?P<y>\d{4})-(?P<m>\d{2})-(?P<d>\d{2})', 'ISO'),
              (r'(?P<m>\d{2})/(?P<d>\d{2})/(?P<y>\d{4})', 'US'),
              (r'(?P<d>\d{2})\.(?P<m>\d{2})\.(?P<y>\d{4})', 'EU'),
          ]
          for pat, fmt in patterns:
              m = re.match(pat, text)
              if m:
                  return {'format': fmt, **m.groupdict()}
          return None

