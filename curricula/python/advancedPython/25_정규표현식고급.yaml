- id: backreference
  title: 백레퍼런스
  structuredPrimary: true
  subtitle: 캡처한 그룹을 다시 참조
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: \1, \2 등으로 앞서 캡처한 그룹을 다시 매칭에 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
