      import re

      def findNested(text, openChar='(', closeChar=')'):
          result = []
          depth = 0
          start = -1
          for i, c in enumerate(text):
              if c == openChar:
                  if depth == 0:
                      start = i
                  depth += 1
              elif c == closeChar:
                  depth -= 1
                  if depth == 0 and start != -1:
                      result.append(text[start:i+1])
                      start = -1
          return result

      ex16Text = "calc((a+b)*(c+d))+((e))"
      ex16Result = findNested(ex16Text)
      ex16Result
