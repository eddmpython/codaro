- id: non_capture
  title: 비캡처 그룹
  structuredPrimary: true
  subtitle: 그룹화만 하고 캡처하지 않음
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: '(?:...) 비캡처 그룹: 그룹화는 하지만 결과에 포함되지 않습니다. 성능과 가독성 향상.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    ncText = "foobar foobaz"
    ncCapture = re.findall(r'(foo)(bar|baz)', ncText)
    ncNonCapture = re.findall(r'(?:foo)(bar|baz)', ncText)
    ncResult = (ncCapture, ncNonCapture)
    ncResult
