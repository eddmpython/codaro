      import re

      def maskMail(match):
          local = match.group(1)
          domain = match.group(2)
          masked = local[0] + '*' * (len(local) - 1)
          return f"{masked}@{domain}"

      mailText = "Contact: john@example.com"
      mailMasked = re.sub(r'(\w+)@([\w.]+)', maskMail, mailText)
      mailResult = mailMasked
      mailResult
