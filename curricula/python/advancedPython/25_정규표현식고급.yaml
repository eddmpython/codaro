      import re

      class RxBuilder:
          def __init__(self):
              self.pat = ""

          def literal(self, text):
              self.pat += re.escape(text)
              return self

          def digit(self, n=1):
              self.pat += r'\d' if n == 1 else rf'\d{{{n}}}'
              return self

          def group(self, pattern, name=None):
              self.pat += f'(?P<{name}>{pattern})' if name else f'({pattern})'
              return self

          def build(self):
              return self.pat

      phoneRx = RxBuilder().group(r'\d{3}', 'area').literal('-').group(r'\d{4}', 'mid').literal('-').group(r'\d{4}', 'last').build()
      ex15Match = re.match(phoneRx, "010-1234-5678")
      ex15Result = (phoneRx, ex15Match.groupdict() if ex15Match else None)
      ex15Result
