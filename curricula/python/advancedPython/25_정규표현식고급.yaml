  - type: code
    language: python
    title: 명명된 그룹
    description: 이름으로 그룹 접근
    content: |-
      import re

      logLine = "ERROR [2024-03-15 10:30:45] Connection failed"
      logPattern = r'(?P<level>\w+) \[(?P<date>\d{4}-\d{2}-\d{2}) (?P<time>\d{2}:\d{2}:\d{2})\] (?P<msg>.*)'
      logMatch = re.match(logPattern, logLine)
      logLevel = logMatch.group('level')
      logDate = logMatch.group('date')
      logDict = logMatch.groupdict()
      logResult = (logLevel, logDate, logDict)
      logResult
- id: lookahead
  title: 룩어헤드
  structuredPrimary: true
  subtitle: 전방 탐색으로 조건부 매칭
  goal: '룩어헤드: 실행 가능한 Python 흐름으로 익힌다.'
  why: '룩어헤드: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: '(?=...) 긍정 룩어헤드: 뒤에 패턴이 있어야 매칭. (?!...) 부정 룩어헤드: 뒤에 패턴이 없어야 매칭.'
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    import re

    laText = "foo123 bar456 foo789"
    laPattern = r'\w+(?=\d{3})'
    laFound = re.findall(laPattern, laText)
    laResult = laFound
    laResult
