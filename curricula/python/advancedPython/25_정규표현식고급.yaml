- id: flags
  title: 플래그
  structuredPrimary: true
  subtitle: 매칭 동작 변경
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: (?i) 대소문자 무시, (?m) 멀티라인, (?s) 점이 줄바꿈도 매칭, (?x) 확장 모드
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    flagText = "HELLO hello HeLLo"
    flagCaseInsensitive = re.findall(r'(?i)hello', flagText)
    flagMultiText = "start line1\nstart line2"
    flagMultiline = re.findall(r'(?m)^start', flagMultiText)
    flagResult = (flagCaseInsensitive, flagMultiline)
    flagResult
  exercise:
