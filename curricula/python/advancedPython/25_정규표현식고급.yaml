    code: |-
      import re

      TOKEN_SPEC = [
          ('NUMBER', r'\d+(?:\.\d+)?'),
          ('OP', r'[+\-*/]'),
          ('PAREN', r'[()]'),
          ('ID', r'[a-zA-Z_]\w*'),
          ('WS', r'\s+'),
      ]

      def tokenize(code):
          pattern = '|'.join(f'(?P<{name}>{regex})' for name, regex in TOKEN_SPEC)
          tokens = []
          for m in re.finditer(pattern, code):
              kind = m.lastgroup
              value = m.group()
              if kind != 'WS':
                  tokens.append((kind, value))
          return tokens

      ex17Code = "x + 42 * (y - 3.14)"
      ex17Result = tokenize(ex17Code)
      ex17Result
