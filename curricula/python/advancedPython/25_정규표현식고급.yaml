- id: lookahead
  title: 룩어헤드
  structuredPrimary: true
  subtitle: 전방 탐색으로 조건부 매칭
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: '(?=...) 긍정 룩어헤드: 뒤에 패턴이 있어야 매칭. (?!...) 부정 룩어헤드: 뒤에 패턴이 없어야 매칭.'
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    laText = "foo123 bar456 foo789"
    laPattern = r'\w+(?=\d{3})'
    laFound = re.findall(laPattern, laText)
    laResult = laFound
    laResult
