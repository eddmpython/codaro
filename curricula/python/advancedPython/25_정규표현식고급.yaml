  - type: code
    language: python
    title: 검증 패턴
    description: 이메일, 전화번호 검증
    content: |-
      import re

      validEmail = "user@example.com"
      validPhone = "010-1234-5678"
      emailOk = bool(re.match(r'^[\w.-]+@[\w.-]+\.\w+$', validEmail))
      phoneOk = bool(re.match(r'^\d{3}-\d{4}-\d{4}$', validPhone))
      validResult = (emailOk, phoneOk)
      validResult
- id: groups_basic
  title: 그룹 기초
