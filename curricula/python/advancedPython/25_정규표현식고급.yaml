- id: substitution
  title: 치환
  structuredPrimary: true
  subtitle: 패턴 기반 문자열 변환
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: re.sub()로 패턴에 매칭되는 부분을 치환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    subText = "cat dog cat bird"
    subReplaced = re.sub(r'cat|dog', 'animal', subText)
    subHtml = "<b>bold</b> and <i>italic</i>"
    subStripped = re.sub(r'<[^>]+>', '', subHtml)
    subResult = (subReplaced, subStripped)
    subResult
  exercise:
