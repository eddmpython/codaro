      laPattern = r'\w+(?=\d{3})'
      laFound = re.findall(laPattern, laText)
      laResult = laFound
      laResult
  - type: code
    language: python
    title: 비밀번호 검증
    description: 룩어헤드로 조건 검사
    content: |-
      import re

      pwdText = "Passw0rd!"
      pwdHasUpper = bool(re.search(r'(?=.*[A-Z])', pwdText))
      pwdHasLower = bool(re.search(r'(?=.*[a-z])', pwdText))
      pwdHasDigit = bool(re.search(r'(?=.*\d)', pwdText))
      pwdHasSpecial = bool(re.search(r'(?=.*[!@#$%^&*])', pwdText))
      pwdResult = (pwdHasUpper, pwdHasLower, pwdHasDigit, pwdHasSpecial)
      pwdResult
- id: lookbehind
