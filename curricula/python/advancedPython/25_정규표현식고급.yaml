- id: groups_basic
  title: 그룹 기초
  structuredPrimary: true
  subtitle: 캡처 그룹으로 부분 추출
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 괄호로 그룹을 만들면 매칭된 부분을 개별적으로 추출할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    dateStr = "2024-03-15"
    dateMatch = re.match(r'(\d{4})-(\d{2})-(\d{2})', dateStr)
    dateYear = dateMatch.group(1)
    dateMonth = dateMatch.group(2)
    dateDay = dateMatch.group(3)
    dateAll = dateMatch.groups()
    dateResult = (dateYear, dateMonth, dateDay, dateAll)
    dateResult
  exercise:
