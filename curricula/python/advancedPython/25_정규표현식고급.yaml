      import re

      swapName = "John Smith"
      swapped = re.sub(r'(\w+) (\w+)', r'\2 \1', swapName)
      reformatDate = "2024-03-15"
      reformatted = re.sub(r'(\d{4})-(\d{2})-(\d{2})', r'\2/\3/\1', reformatDate)
      backrefResult = (swapped, reformatted)
      backrefResult
- id: non_capture
  title: 비캡처 그룹
  structuredPrimary: true
  subtitle: 그룹화만 하고 캡처하지 않음
  goal: '비캡처 그룹: 실행 가능한 Python 흐름으로 익힌다.'
  why: '비캡처 그룹: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: '(?:...) 비캡처 그룹: 그룹화는 하지만 결과에 포함되지 않습니다. 성능과 가독성 향상.'
  tips:
