    description: 잘못된 통화와 누락 키가 다른 예외로 드러나는지 확인합니다.
    content: |-
      from typing import Final, Literal, TypedDict, get_args

      Currency = Literal["KRW", "USD"]
      Method = Literal["card", "bank"]
      MAX_AMOUNT: Final[int] = 1_000_000

      class PaymentPayload(TypedDict):
          orderId: str
          amount: int
          currency: Currency
          method: Method

      def validatePayment(payload: PaymentPayload) -> PaymentPayload:
          required = {"orderId", "amount", "currency", "method"}
          missing = required - payload.keys()
          if missing:
              raise KeyError(f"missing keys: {sorted(missing)}")
          if payload["currency"] not in get_args(Currency):
              raise ValueError("unsupported currency")
          if payload["method"] not in get_args(Method):
              raise ValueError("unsupported method")
          if not 0 < payload["amount"] <= MAX_AMOUNT:
              raise ValueError("amount out of range")
          return payload

      try:
          validatePayment({"orderId": "O-101", "amount": 10_000, "currency": "EUR", "method": "card"})
      except ValueError as exc:
          currencyMessage = str(exc)

      try:
          validatePayment({"orderId": "O-102", "amount": 10_000, "currency": "KRW"})
      except KeyError as exc:
          missingMessage = str(exc)

      assert currencyMessage == "unsupported currency"
      assert "method" in missingMessage
  - type: tip
    title: 변주 실험
    content: '`refund` 메서드를 추가할 때 허용 통화와 금액 범위를 어떻게 바꿔야 하는지 `Literal`과 검증 함수를 같이 수정한 뒤 실패 케이스를 먼저 작성하세요.'
