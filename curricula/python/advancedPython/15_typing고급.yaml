sections:
- id: literal
  title: Literal
  structuredPrimary: true
  subtitle: 특정 값만 허용
  goal: 'Literal: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Literal: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Literal은 특정 리터럴 값만 허용하는 타입입니다. 문자열, 정수, 불리언, None 등의 리터럴을 지정할 수 있습니다. 함수 인자나 반환 타입을 특정 값으로 제한합니다. @overload와 함께 사용하면 값에 따른 반환 타입을 정확히 표현할 수 있습니다. 타입 체커가 허용되지 않은 값을 감지합니다. 설정 옵션, 모드 선택 등에 유용합니다.

    Literal[True]와 Literal[False]를 사용하면 불리언 값에 따른 조건부 타입을 표현할 수 있습니다.
  tips:
  - Literal[True]와 Literal[False]를 사용하면 불리언 값에 따른 조건부 타입을 표현할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from typing import Literal

    def setMode(mode: Literal['read', 'write', 'append']) -> str:
        return f"Mode set to {mode}"

    setMode('read'), setMode('write')
  exercise:
    prompt: 'Literal: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from typing import Literal

      def setMode(mode: Literal['read', 'write', 'append']) -> str:
          return f"Mode set to {mode}"

      setMode('read'), setMode('write')
    solution: |-
      from typing import Literal

      def setMode(mode: Literal['read', 'write', 'append']) -> str:
          return f"Mode set to {mode}"

      setMode('read'), setMode('write')
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Literal은 특정 리터럴 값만 허용하는 타입입니다. 문자열, 정수, 불리언, None 등의 리터럴을 지정할 수 있습니다. 함수 인자나 반환 타입을 특정 값으로 제한합니다. @overload와
      함께 사용하면 값에 따른 반환 타입을 정확히 표현할 수 있습니다. 타입 체커가 허용되지 않은 값을 감지합니다. 설정 옵션, 모드 선택 등에 유용합니다.
  - type: list
    items:
    - 'Literal[''a'', ''b'']: ''a'' 또는 ''b''만'
    - 문자열, 정수, bool, None 지원
    - 허용되지 않은 값은 타입 에러
    - '@overload와 함께 정밀한 타입'
  - type: code
    language: python
    title: Literal 기본
    description: 특정 문자열만 허용합니다.
    content: |-
      from typing import Literal

      def setMode(mode: Literal['read', 'write', 'append']) -> str:
          return f"Mode set to {mode}"

      setMode('read'), setMode('write')
  - type: code
    language: python
    title: Literal과 overload
    description: 값에 따라 반환 타입이 다릅니다.
    content: |-
      from typing import Literal, overload, List

      @overload
      def fetch(many: Literal[False]) -> dict: ...
      @overload
      def fetch(many: Literal[True]) -> List[dict]: ...

      def fetch(many: bool = False):
          if many:
              return [{"id": 1}, {"id": 2}]
          return {"id": 1}

      fetch(False), fetch(True)
  - type: code
    language: python
    title: 숫자 Literal
    description: 특정 정수만 허용합니다.
    content: |-
      from typing import Literal

      def setVerbosity(level: Literal[0, 1, 2, 3]) -> str:
          return f"Verbosity: {level}"

      setVerbosity(0), setVerbosity(2)
  - type: tip
    content: Literal[True]와 Literal[False]를 사용하면 불리언 값에 따른 조건부 타입을 표현할 수 있습니다.
- id: final
  title: Final
  structuredPrimary: true
  subtitle: 상수 표시
  goal: 'Final: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Final: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Final은 변수나 속성이 재할당되어서는 안 된다는 것을 표시합니다. 타입 체커가 재할당 시도를 감지합니다. 클래스 속성에 사용하면 오버라이드도 금지합니다. @final 데코레이터는 메서드나 클래스의 상속/오버라이드를 금지합니다. 상수를 명시적으로 표시하여 의도를 전달합니다. 런타임에는 아무 효과가 없습니다.

    Final은 문서화 역할도 하여 코드를 읽는 사람에게 의도를 전달합니다.
  tips:
  - Final은 문서화 역할도 하여 코드를 읽는 사람에게 의도를 전달합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from typing import Final

    MAX_SIZE: Final[int] = 100
    API_URL: Final = "https://api.example.com"

    MAX_SIZE, API_URL
  exercise:
    prompt: 'Final: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from typing import Final

      MAX_SIZE: Final[int] = 100
      API_URL: Final = "https://api.example.com"

      MAX_SIZE, API_URL
    solution: |-
      from typing import Final

      MAX_SIZE: Final[int] = 100
      API_URL: Final = "https://api.example.com"

      MAX_SIZE, API_URL
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Final은 변수나 속성이 재할당되어서는 안 된다는 것을 표시합니다. 타입 체커가 재할당 시도를 감지합니다. 클래스 속성에 사용하면 오버라이드도 금지합니다. @final 데코레이터는 메서드나 클래스의
      상속/오버라이드를 금지합니다. 상수를 명시적으로 표시하여 의도를 전달합니다. 런타임에는 아무 효과가 없습니다.
  - type: list
    items:
    - 'Final[T]: 재할당 금지'
    - '@final: 상속/오버라이드 금지'
    - 타입 체커가 위반 감지
    - 런타임에는 영향 없음
  - type: code
    language: python
    title: Final 변수
    description: 상수를 선언합니다.
    content: |-
      from typing import Final

      MAX_SIZE: Final[int] = 100
      API_URL: Final = "https://api.example.com"

      MAX_SIZE, API_URL
  - type: code
    language: python
    title: 클래스에서 Final
    description: 클래스 상수와 인스턴스 상수입니다.
    content: |-
      from typing import Final

      class Config:
          VERSION: Final[str] = "1.0.0"

          def __init__(self, name: str):
              self.name: Final = name

      Config.VERSION
  - type: code
    language: python
    title: '@final 데코레이터'
    description: 상속이나 오버라이드를 금지합니다.
    content: |-
      from typing import final

      class Base:
          @final
          def criticalMethod(self) -> str:
              return "Cannot override"

      @final
      class FinalClass:
          pass

      Base().criticalMethod()
  - type: tip
    content: Final은 문서화 역할도 하여 코드를 읽는 사람에게 의도를 전달합니다.
- id: typeddict
  title: TypedDict
  structuredPrimary: true
  subtitle: 타입 있는 딕셔너리
  goal: 'TypedDict: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'TypedDict: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    TypedDict는 키 이름과 값 타입을 지정한 딕셔너리 타입입니다. API 응답, 설정 파일 등 구조화된 딕셔너리에 유용합니다. 필수 키와 선택적 키를 구분할 수 있습니다. total=False로 모든 키를 선택적으로 만들 수 있습니다. NotRequired와 Required로 개별 키의 필수 여부를 지정합니다. 런타임에는 일반 dict로 동작합니다.

    TypedDict는 상속도 지원합니다. class Admin(User): role: str
  tips:
  - 'TypedDict는 상속도 지원합니다. class Admin(User): role: str'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from typing import TypedDict

    class User(TypedDict):
        id: int
        name: str
        email: str

    user: User = {"id": 1, "name": "Alice", "email": "alice@example.com"}
    user
  exercise:
    prompt: 'TypedDict: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from typing import TypedDict

      class User(TypedDict):
          id: int
          name: str
          email: str

      user: User = {"id": 1, "name": "Alice", "email": "alice@example.com"}
      user
    solution: |-
      from typing import TypedDict

      class User(TypedDict):
          id: int
          name: str
          email: str

      user: User = {"id": 1, "name": "Alice", "email": "alice@example.com"}
      user
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: TypedDict는 키 이름과 값 타입을 지정한 딕셔너리 타입입니다. API 응답, 설정 파일 등 구조화된 딕셔너리에 유용합니다. 필수 키와 선택적 키를 구분할 수 있습니다. total=False로
      모든 키를 선택적으로 만들 수 있습니다. NotRequired와 Required로 개별 키의 필수 여부를 지정합니다. 런타임에는 일반 dict로 동작합니다.
  - type: list
    items:
    - 'TypedDict: 키별 타입 지정'
    - 'total=False: 모든 키 선택적'
    - 'NotRequired, Required: 개별 지정'
    - 런타임에는 일반 dict
  - type: code
    language: python
    title: TypedDict 기본
    description: 키별 타입을 지정합니다.
    content: |-
      from typing import TypedDict

      class User(TypedDict):
          id: int
          name: str
          email: str

      user: User = {"id": 1, "name": "Alice", "email": "alice@example.com"}
      user
  - type: code
    language: python
    title: 선택적 키
    description: NotRequired로 선택적 키를 지정합니다.
    content: |-
      from typing import TypedDict, NotRequired

      class Config(TypedDict):
          host: str
          port: int
          debug: NotRequired[bool]
          timeout: NotRequired[int]

      config: Config = {"host": "localhost", "port": 8080}
      config
  - type: code
    language: python
    title: total=False
    description: 모든 키를 선택적으로 만듭니다.
    content: |-
      from typing import TypedDict, Required

      class PartialUser(TypedDict, total=False):
          id: Required[int]
          name: str
          email: str

      user: PartialUser = {"id": 1}
      user
  - type: tip
    content: 'TypedDict는 상속도 지원합니다. class Admin(User): role: str'
- id: annotated
  title: Annotated
  structuredPrimary: true
  subtitle: 메타데이터 추가
  goal: 'Annotated: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'Annotated: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Annotated는 타입에 추가 메타데이터를 첨부합니다. Annotated[T, metadata1, metadata2, ...]로 사용합니다. 타입 체커는 첫 번째 인자(T)만 사용하고 나머지는 무시합니다. 메타데이터는 런타임에 접근할 수 있습니다. 검증 라이브러리(Pydantic 등)에서 제약 조건을 표현하는 데 사용됩니다. 문서화, 직렬화 힌트 등 다양한 용도로 활용됩니다.

    Pydantic v2는 Annotated를 적극 활용하여 Field 정보를 표현합니다.
  tips:
  - Pydantic v2는 Annotated를 적극 활용하여 Field 정보를 표현합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    from typing import Annotated

    PositiveInt = Annotated[int, "must be positive"]
    EmailStr = Annotated[str, "valid email format"]

    def createUser(age: PositiveInt, email: EmailStr) -> dict:
        return {"age": age, "email": email}

    createUser(25, "user@example.com")
  exercise:
    prompt: 'Annotated: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from typing import Annotated

      PositiveInt = Annotated[int, "must be positive"]
      EmailStr = Annotated[str, "valid email format"]

      def createUser(age: PositiveInt, email: EmailStr) -> dict:
          return {"age": age, "email": email}

      createUser(25, "user@example.com")
    solution: |-
      from typing import Annotated

      PositiveInt = Annotated[int, "must be positive"]
      EmailStr = Annotated[str, "valid email format"]

      def createUser(age: PositiveInt, email: EmailStr) -> dict:
          return {"age": age, "email": email}

      createUser(25, "user@example.com")
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Annotated는 타입에 추가 메타데이터를 첨부합니다. Annotated[T, metadata1, metadata2, ...]로 사용합니다. 타입 체커는 첫 번째 인자(T)만 사용하고 나머지는
      무시합니다. 메타데이터는 런타임에 접근할 수 있습니다. 검증 라이브러리(Pydantic 등)에서 제약 조건을 표현하는 데 사용됩니다. 문서화, 직렬화 힌트 등 다양한 용도로 활용됩니다.
  - type: list
    items:
    - Annotated[T, metadata, ...]
    - 타입 체커는 T만 사용
    - 메타데이터는 런타임 접근 가능
    - 검증, 문서화 등에 활용
  - type: code
    language: python
    title: Annotated 기본
    description: 타입에 메타데이터를 추가합니다.
    content: |-
      from typing import Annotated

      PositiveInt = Annotated[int, "must be positive"]
      EmailStr = Annotated[str, "valid email format"]

      def createUser(age: PositiveInt, email: EmailStr) -> dict:
          return {"age": age, "email": email}

      createUser(25, "user@example.com")
  - type: code
    language: python
    title: 제약 조건 클래스
    description: 제약 조건을 클래스로 표현합니다.
    content: |-
      from typing import Annotated
      from dataclasses import dataclass

      @dataclass
      class Range:
          min: int
          max: int

      @dataclass
      class MaxLength:
          length: int

      Score = Annotated[int, Range(0, 100)]
      Username = Annotated[str, MaxLength(20)]

      def validate(score: Score, name: Username) -> bool:
          return True

      validate(85, "alice")
