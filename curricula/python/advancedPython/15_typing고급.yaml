    title: '🔴 심화4: Annotated 검증'
    code: |-
      from typing import Annotated, get_type_hints, get_origin, get_args

      class Positive:
          pass

      class Max:
          def __init__(self, value: int):
              self.value = value

      Score = Annotated[int, Positive(), Max(100)]

      def validate(func, **kwargs):
          hints = get_type_hints(func, include_extras=True)
          for name, value in kwargs.items():
              hint = hints.get(name)
              if get_origin(hint) is Annotated:
                  for meta in get_args(hint)[1:]:
                      if isinstance(meta, Max) and value > meta.value:
                          return False
          return True

      def setScore(score: Score) -> int:
          return score

      validate(setScore, score=85), validate(setScore, score=150)
