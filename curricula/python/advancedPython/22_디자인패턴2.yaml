    content: |-
      from abc import ABC, abstractmethod

      class SortStrategy(ABC):
          @abstractmethod
          def sort(self, data):
              pass

      class BubbleSort(SortStrategy):
          def sort(self, data):
              arr = data.copy()
              n = len(arr)
              for i in range(n):
                  for j in range(0, n - i - 1):
                      if arr[j] > arr[j + 1]:
                          arr[j], arr[j + 1] = arr[j + 1], arr[j]
              return arr

      class QuickSortStrategy(SortStrategy):
          def sort(self, data):
              if len(data) <= 1:
                  return data
              pivot = data[len(data) // 2]
              left = [x for x in data if x < pivot]
              middle = [x for x in data if x == pivot]
              right = [x for x in data if x > pivot]
              return self.sort(left) + middle + self.sort(right)

      class Sorter:
          def __init__(self, strategy):
              self.strategy = strategy

          def setStrategy(self, strategy):
              self.strategy = strategy

          def sort(self, data):
              return self.strategy.sort(data)

      testData = [64, 34, 25, 12, 22, 11, 90]
      sorter = Sorter(BubbleSort())
      bubbleResult = sorter.sort(testData)
      sorter.setStrategy(QuickSortStrategy())
      quickResult = sorter.sort(testData)
      sortResult = (bubbleResult, quickResult)
      sortResult
- id: command_pattern
  title: 커맨드 패턴
  structuredPrimary: true
  subtitle: 요청 캡슐화
  goal: '커맨드 패턴: 실행 가능한 Python 흐름으로 익힌다.'
  why: '커맨드 패턴: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 요청을 객체로 캡슐화하여 매개변수화하는 패턴
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Command(ABC):
        @abstractmethod
        def execute(self):
            pass

        @abstractmethod
        def undo(self):
            pass

    class Light:
        def __init__(self):
            self.isOn = False

        def turnOn(self):
            self.isOn = True
            return "Light is ON"

        def turnOff(self):
            self.isOn = False
            return "Light is OFF"

    class LightOnCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOn()

        def undo(self):
            return self.light.turnOff()

    class LightOffCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOff()

        def undo(self):
            return self.light.turnOn()

    class RemoteControl:
        def __init__(self):
            self.history = []

        def submit(self, command):
            result = command.execute()
            self.history.append(command)
            return result

        def undoLast(self):
            if self.history:
                return self.history.pop().undo()
            return "Nothing to undo"

    light = Light()
    remote = RemoteControl()
    cmdResult1 = remote.submit(LightOnCommand(light))
    cmdResult2 = remote.submit(LightOffCommand(light))
    cmdResult3 = remote.undoLast()
    commandResult = (cmdResult1, cmdResult2, cmdResult3, light.isOn)
    commandResult
