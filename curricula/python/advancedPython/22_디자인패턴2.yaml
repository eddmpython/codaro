    content: |-
      from abc import ABC, abstractmethod

      class GameAI(ABC):
          def turn(self):
              resources = self.collectResources()
              units = self.buildUnits(resources)
              structures = self.buildStructures(resources)
              attack = self.attack(units)
              return {"resources": resources, "units": units, "structures": structures, "attack": attack}

          def collectResources(self):
              return 100

          @abstractmethod
          def buildUnits(self, resources):
              pass

          @abstractmethod
          def buildStructures(self, resources):
              pass

          def attack(self, units):
              return f"Attacking with {units}"

      class OrcsAI(GameAI):
          def buildUnits(self, resources):
              return f"Built {resources // 10} Orcs"

          def buildStructures(self, resources):
              return "Built Barracks"

      class MonstersAI(GameAI):
          def collectResources(self):
              return 50

          def buildUnits(self, resources):
              return f"Spawned {resources // 5} Monsters"

          def buildStructures(self, resources):
              return "Built Lair"

      orcsAI = OrcsAI()
      monstersAI = MonstersAI()
      orcsTurn = orcsAI.turn()
      monstersTurn = monstersAI.turn()
      gameResult = (orcsTurn["units"], monstersTurn["units"])
