    language: python
    title: 텍스트 에디터 커맨드
    description: Undo/Redo 기능을 구현합니다.
    content: |-
      from abc import ABC, abstractmethod

      class TextCommand(ABC):
          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def undo(self):
              pass

      class TextEditor:
          def __init__(self):
              self.content = ""

          def write(self, text):
              self.content += text

          def delete(self, count):
              deleted = self.content[-count:]
              self.content = self.content[:-count]
              return deleted

          def getContent(self):
              return self.content

      class WriteCommand(TextCommand):
          def __init__(self, editor, text):
              self.editor = editor
              self.text = text

          def execute(self):
              self.editor.write(self.text)

          def undo(self):
              self.editor.delete(len(self.text))

      class DeleteCommand(TextCommand):
          def __init__(self, editor, count):
              self.editor = editor
              self.count = count
              self.deleted = ""

          def execute(self):
              self.deleted = self.editor.delete(self.count)

          def undo(self):
              self.editor.write(self.deleted)

      class CommandManager:
          def __init__(self):
              self.undoStack = []
              self.redoStack = []

          def execute(self, command):
              command.execute()
              self.undoStack.append(command)
              self.redoStack.clear()

          def undo(self):
              if self.undoStack:
                  command = self.undoStack.pop()
                  command.undo()
                  self.redoStack.append(command)

          def redo(self):
              if self.redoStack:
                  command = self.redoStack.pop()
                  command.execute()
                  self.undoStack.append(command)

      textEditor = TextEditor()
      cmdManager = CommandManager()
      cmdManager.execute(WriteCommand(textEditor, "Hello "))
      cmdManager.execute(WriteCommand(textEditor, "World"))
      contentAfterWrite = textEditor.getContent()
      cmdManager.undo()
      contentAfterUndo = textEditor.getContent()
      cmdManager.redo()
      contentAfterRedo = textEditor.getContent()
      textCmdResult = (contentAfterWrite, contentAfterUndo, contentAfterRedo)
      textCmdResult
