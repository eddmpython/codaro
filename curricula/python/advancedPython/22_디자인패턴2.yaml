      class ChatRoom:
          def __init__(self):
              self.users = {}
              self.messages = []

          def register(self, user):
              self.users[user.name] = user
              user.chatRoom = self

          def send(self, message, sender, receiver=None):
              if receiver:
                  if receiver in self.users:
                      self.users[receiver].receive(message, sender)
              else:
                  for name, user in self.users.items():
                      if name != sender:
                          user.receive(message, sender)
              self.messages.append(f"{sender}: {message}")

      class ChatUser:
          def __init__(self, name):
              self.name = name
              self.chatRoom = None
              self.inbox = []

          def send(self, message, receiver=None):
              self.chatRoom.send(message, self.name, receiver)

          def receive(self, message, sender):
              self.inbox.append(f"From {sender}: {message}")

      chatRoom = ChatRoom()
      userAlice = ChatUser("Alice")
      userBob = ChatUser("Bob")
      userCharlie = ChatUser("Charlie")
      chatRoom.register(userAlice)
      chatRoom.register(userBob)
      chatRoom.register(userCharlie)
      userAlice.send("Hello everyone!")
      userBob.send("Hi Alice!", "Alice")
      ex7Result = (userBob.inbox, userAlice.inbox)
      ex7Result
