    title: 주문 상태
    description: 주문의 상태 전이를 구현합니다.
    content: |-
      from abc import ABC, abstractmethod

      class OrderState(ABC):
          @abstractmethod
          def next(self, order):
              pass

          @abstractmethod
          def prev(self, order):
              pass

          @abstractmethod
          def getStatus(self):
              pass

      class PendingState(OrderState):
          def next(self, order):
              order.setState(ProcessingState())

          def prev(self, order):
              pass

          def getStatus(self):
              return "Pending"

      class ProcessingState(OrderState):
          def next(self, order):
              order.setState(ShippedState())

          def prev(self, order):
              order.setState(PendingState())

          def getStatus(self):
              return "Processing"

      class ShippedState(OrderState):
          def next(self, order):
              order.setState(DeliveredState())

          def prev(self, order):
              order.setState(ProcessingState())

          def getStatus(self):
              return "Shipped"

      class DeliveredState(OrderState):
          def next(self, order):
              pass

          def prev(self, order):
              pass

          def getStatus(self):
              return "Delivered"

      class Order:
          def __init__(self):
              self.state = PendingState()

          def setState(self, state):
              self.state = state

          def nextState(self):
              self.state.next(self)

          def prevState(self):
              self.state.prev(self)

          def getStatus(self):
              return self.state.getStatus()

      order = Order()
      orderStatus1 = order.getStatus()
      order.nextState()
      orderStatus2 = order.getStatus()
      order.nextState()
      orderStatus3 = order.getStatus()
      order.prevState()
      orderStatus4 = order.getStatus()
      orderResult = (orderStatus1, orderStatus2, orderStatus3, orderStatus4)
      orderResult
