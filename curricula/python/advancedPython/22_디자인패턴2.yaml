          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def undo(self):
              pass

      class Light:
          def __init__(self):
              self.isOn = False

          def turnOn(self):
              self.isOn = True
              return "Light is ON"

          def turnOff(self):
              self.isOn = False
              return "Light is OFF"

      class LightOnCommand(Command):
          def __init__(self, light):
              self.light = light

          def execute(self):
