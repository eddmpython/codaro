      class Middleware:
          def __init__(self):
              self._next = None

          def setNext(self, middleware):
              self._next = middleware
              return middleware

          def handle(self, request):
              if self._next:
                  return self._next.handle(request)
              return request

      class LoggingMiddleware(Middleware):
          def handle(self, request):
              request["logs"] = request.get("logs", [])
              request["logs"].append("Logged request")
              return super().handle(request)

      class AuthMiddleware(Middleware):
          def handle(self, request):
              if not request.get("token"):
                  request["error"] = "Unauthorized"
                  return request
              request["authenticated"] = True
              return super().handle(request)

      class ValidationMiddleware(Middleware):
          def handle(self, request):
              if not request.get("data"):
                  request["error"] = "No data provided"
                  return request
              request["validated"] = True
              return super().handle(request)

      logging = LoggingMiddleware()
      auth = AuthMiddleware()
      validation = ValidationMiddleware()
      logging.setNext(auth).setNext(validation)
      validReq = {"token": "abc123", "data": {"name": "test"}}
      invalidReq = {"data": {"name": "test"}}
      ex15Valid = logging.handle(validReq.copy())
      ex15Invalid = logging.handle(invalidReq.copy())
      ex15Result = (ex15Valid.get("validated"), ex15Invalid.get("error"))
      ex15Result
