    title: 전략으로 배송비 교체
    description: 배송 정책만 바꾸고 주문 계산 코드는 그대로 둡니다.
    content: |-
      class StandardShippingPolicy:
          def calculate(self, order):
              return 3000 if order["amount"] < 50000 else 0

      class ExpressShippingPolicy:
          def calculate(self, order):
              return 8000

      class OrderCheckout:
          def __init__(self, shippingPolicy=None):
              self.shippingPolicy = shippingPolicy

          def setShippingPolicy(self, shippingPolicy):
              self.shippingPolicy = shippingPolicy

          def quote(self, order):
              if self.shippingPolicy is None:
                  raise ValueError("shipping policy is required")
              shippingFee = self.shippingPolicy.calculate(order)
              return {
                  "amount": order["amount"],
                  "shippingFee": shippingFee,
                  "total": order["amount"] + shippingFee,
              }

      checkout = OrderCheckout(StandardShippingPolicy())
      standardQuote = checkout.quote(order)
      checkout.setShippingPolicy(ExpressShippingPolicy())
      expressQuote = checkout.quote(order)

      assert standardQuote == {"amount": 120000, "shippingFee": 0, "total": 120000}
      assert expressQuote == {"amount": 120000, "shippingFee": 8000, "total": 128000}
