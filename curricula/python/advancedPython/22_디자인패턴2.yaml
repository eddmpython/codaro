- id: command_pattern
  title: 커맨드 패턴
  structuredPrimary: true
  subtitle: 요청 캡슐화
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 요청을 객체로 캡슐화하여 매개변수화하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Command(ABC):
        @abstractmethod
        def execute(self):
            pass

        @abstractmethod
        def undo(self):
            pass

    class Light:
        def __init__(self):
            self.isOn = False

        def turnOn(self):
            self.isOn = True
            return "Light is ON"

        def turnOff(self):
            self.isOn = False
            return "Light is OFF"

    class LightOnCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOn()

        def undo(self):
            return self.light.turnOff()

    class LightOffCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOff()

        def undo(self):
            return self.light.turnOn()

    class RemoteControl:
        def __init__(self):
            self.history = []

        def submit(self, command):
            result = command.execute()
            self.history.append(command)
            return result

        def undoLast(self):
            if self.history:
                return self.history.pop().undo()
            return "Nothing to undo"

    light = Light()
    remote = RemoteControl()
    cmdResult1 = remote.submit(LightOnCommand(light))
    cmdResult2 = remote.submit(LightOffCommand(light))
    cmdResult3 = remote.undoLast()
    commandResult = (cmdResult1, cmdResult2, cmdResult3, light.isOn)
    commandResult
