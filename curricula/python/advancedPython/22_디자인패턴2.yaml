      class AsyncEventEmitter:
          def __init__(self):
              self.handlers = {}
              self.pending = []

          def on(self, event, handler):
              if event not in self.handlers:
                  self.handlers[event] = []
              self.handlers[event].append(handler)

          def emit(self, event, data):
              if event in self.handlers:
                  for handler in self.handlers[event]:
                      self.pending.append((handler, data))

          def process(self):
              results = []
              while self.pending:
                  handler, data = self.pending.pop(0)
                  results.append(handler(data))
              return results

      asyncEmitter = AsyncEventEmitter()
      processedItems = []
      asyncEmitter.on("data", lambda d: processedItems.append(f"Processed: {d}"))
      asyncEmitter.on("data", lambda d: processedItems.append(f"Logged: {d}"))
      asyncEmitter.emit("data", "Item1")
      asyncEmitter.emit("data", "Item2")
      asyncEmitter.process()
      ex17Result = processedItems
