- id: command_pattern
  title: 커맨드 패턴
  structuredPrimary: true
  subtitle: 요청 캡슐화
  goal: 커맨드 패턴에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 요청을 객체로 캡슐화하여 매개변수화하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Command(ABC):
        @abstractmethod
        def execute(self):
            pass

        @abstractmethod
        def undo(self):
            pass

    class Light:
        def __init__(self):
            self.isOn = False

        def turnOn(self):
            self.isOn = True
            return "Light is ON"

        def turnOff(self):
            self.isOn = False
            return "Light is OFF"

    class LightOnCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOn()

        def undo(self):
            return self.light.turnOff()

    class LightOffCommand(Command):
        def __init__(self, light):
            self.light = light

        def execute(self):
            return self.light.turnOff()

        def undo(self):
            return self.light.turnOn()

    class RemoteControl:
        def __init__(self):
            self.history = []

        def submit(self, command):
            result = command.execute()
            self.history.append(command)
            return result

        def undoLast(self):
            if self.history:
                return self.history.pop().undo()
            return "Nothing to undo"

    light = Light()
    remote = RemoteControl()
    cmdResult1 = remote.submit(LightOnCommand(light))
    cmdResult2 = remote.submit(LightOffCommand(light))
    cmdResult3 = remote.undoLast()
    commandResult = (cmdResult1, cmdResult2, cmdResult3, light.isOn)
    commandResult
  exercise:
    prompt: 커맨드 패턴 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
