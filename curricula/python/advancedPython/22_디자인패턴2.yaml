          def __init__(self, freeShippingThreshold):
              self.freeShippingThreshold = freeShippingThreshold

          def calculate(self, order):
              return 0 if order["amount"] >= self.freeShippingThreshold else 5000

      checkout.setShippingPolicy(PromotionShippingPolicy(150000))
      strictPromotionQuote = checkout.quote(order)
      checkout.setShippingPolicy(PromotionShippingPolicy(100000))
      loosePromotionQuote = checkout.quote(order)

      assert strictPromotionQuote["total"] == 125000
      assert loosePromotionQuote["total"] == 120000
