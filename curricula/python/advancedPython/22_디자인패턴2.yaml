    description: 티켓 우선순위에 따른 처리 체인입니다.
    content: |-
      from abc import ABC, abstractmethod

      class SupportHandler(ABC):
          def __init__(self):
              self._next = None
              self.level = 0

          def setNext(self, handler):
              self._next = handler
              return handler

          def handle(self, ticket):
              if ticket["priority"] <= self.level:
                  return self.resolve(ticket)
              elif self._next:
                  return self._next.handle(ticket)
              return "Ticket escalated to management"

          @abstractmethod
          def resolve(self, ticket):
              pass

      class FrontDesk(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 1

          def resolve(self, ticket):
              return f"Front desk resolved: {ticket['issue']}"

      class TechSupport(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 2

          def resolve(self, ticket):
              return f"Tech support resolved: {ticket['issue']}"

      class Engineer(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 3

          def resolve(self, ticket):
              return f"Engineer resolved: {ticket['issue']}"

      frontDesk = FrontDesk()
      techSupport = TechSupport()
      engineer = Engineer()
      frontDesk.setNext(techSupport).setNext(engineer)
      ticket1 = {"issue": "Password reset", "priority": 1}
      ticket2 = {"issue": "Software bug", "priority": 2}
      ticket3 = {"issue": "System crash", "priority": 3}
      ticket4 = {"issue": "Critical failure", "priority": 4}
      supportResult = (frontDesk.handle(ticket1), frontDesk.handle(ticket2), frontDesk.handle(ticket3), frontDesk.handle(ticket4))
      supportResult
