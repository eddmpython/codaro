      class AlphabetIterator:
          def __init__(self, start='a', end='z'):
              self.current = ord(start)
              self.end = ord(end)

          def __iter__(self):
              return self

          def __next__(self):
              if self.current > self.end:
                  raise StopIteration
              char = chr(self.current)
              self.current += 1
              return char

      class AlphabetCollection:
          def __init__(self, start='a', end='z'):
              self.start = start
              self.end = end

          def __iter__(self):
              return AlphabetIterator(self.start, self.end)

      alphabetCol = AlphabetCollection('a', 'e')
      ex6Letters = [letter for letter in alphabetCol]
      ex6Result = ex6Letters
      ex6Result
