    content: |-
      class OrderRecord:
          def __init__(self, orderId, status):
              self.orderId = orderId
              self.status = status

      class ChangeOrderStatusCommand:
          def __init__(self, orderRecord, nextStatus):
              self.orderRecord = orderRecord
              self.nextStatus = nextStatus
              self.previousStatus = orderRecord.status

          def execute(self):
              self.orderRecord.status = self.nextStatus
              return self.orderRecord.status

          def undo(self):
              self.orderRecord.status = self.previousStatus
              return self.orderRecord.status

      orderRecord = OrderRecord("O-1001", "paid")
      shipCommand = ChangeOrderStatusCommand(orderRecord, "shipping")
      shippedStatus = shipCommand.execute()
      restoredStatus = shipCommand.undo()

      assert (shippedStatus, restoredStatus, orderRecord.status) == ("shipping", "paid", "paid")
