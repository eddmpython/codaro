      from abc import ABC, abstractmethod

      class ShapeVisitor(ABC):
          @abstractmethod
          def visitCircle(self, circle):
              pass

          @abstractmethod
          def visitRectangle(self, rectangle):
              pass

      class ShapeElement(ABC):
          @abstractmethod
          def accept(self, visitor):
              pass

      class CircleElement(ShapeElement):
          def __init__(self, radius):
              self.radius = radius

          def accept(self, visitor):
              return visitor.visitCircle(self)

      class RectangleElement(ShapeElement):
          def __init__(self, width, height):
              self.width = width
              self.height = height

          def accept(self, visitor):
              return visitor.visitRectangle(self)

      class AreaCalculator(ShapeVisitor):
          def visitCircle(self, circle):
              return 3.14159 * circle.radius ** 2

          def visitRectangle(self, rectangle):
              return rectangle.width * rectangle.height

      class PerimeterCalculator(ShapeVisitor):
          def visitCircle(self, circle):
              return 2 * 3.14159 * circle.radius

          def visitRectangle(self, rectangle):
              return 2 * (rectangle.width + rectangle.height)

      circleShape = CircleElement(5)
      rectangleShape = RectangleElement(4, 6)
      areaCalc = AreaCalculator()
      perimeterCalc = PerimeterCalculator()
      circleArea = circleShape.accept(areaCalc)
      rectPerimeter = rectangleShape.accept(perimeterCalc)
      ex9Result = (round(circleArea, 2), rectPerimeter)
      ex9Result
