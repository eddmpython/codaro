      from abc import ABC, abstractmethod

      class DiscountStrategy(ABC):
          @abstractmethod
          def calculate(self, price):
              pass

      class NoDiscount(DiscountStrategy):
          def calculate(self, price):
              return price

      class PercentDiscount(DiscountStrategy):
          def __init__(self, percent):
              self.percent = percent

          def calculate(self, price):
              return price * (1 - self.percent / 100)

      class FixedDiscount(DiscountStrategy):
          def __init__(self, amount):
              self.amount = amount

          def calculate(self, price):
              return max(0, price - self.amount)

      class DiscountFactory:
          @staticmethod
          def create(discountType, value=0):
              if discountType == "none":
                  return NoDiscount()
              elif discountType == "percent":
                  return PercentDiscount(value)
              elif discountType == "fixed":
                  return FixedDiscount(value)
              return NoDiscount()

      originalPrice = 100
      noDiscStrategy = DiscountFactory.create("none")
      percentStrategy = DiscountFactory.create("percent", 20)
      fixedStrategy = DiscountFactory.create("fixed", 15)
      ex12Result = (noDiscStrategy.calculate(originalPrice), percentStrategy.calculate(originalPrice), fixedStrategy.calculate(originalPrice))
      ex12Result
