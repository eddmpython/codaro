      class EventSystem:
          def __init__(self):
              self.listeners = {}

          def subscribe(self, eventType, listener, priority=0):
              if eventType not in self.listeners:
                  self.listeners[eventType] = []
              self.listeners[eventType].append((priority, listener))
              self.listeners[eventType].sort(key=lambda x: -x[0])

          def unsubscribe(self, eventType, listener):
              if eventType in self.listeners:
                  self.listeners[eventType] = [(p, l) for p, l in self.listeners[eventType] if l != listener]

          def emit(self, eventType, data):
              results = []
              if eventType in self.listeners:
                  for _, listener in self.listeners[eventType]:
                      results.append(listener(data))
              return results

      eventSys = EventSystem()
      logResults = []
      eventSys.subscribe("user.login", lambda d: logResults.append(f"Low: {d['user']}"), 1)
      eventSys.subscribe("user.login", lambda d: logResults.append(f"High: {d['user']}"), 10)
      eventSys.emit("user.login", {"user": "Alice"})
      ex11Result = logResults
      ex11Result
