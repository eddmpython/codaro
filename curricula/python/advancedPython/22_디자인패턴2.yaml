    language: python
    title: 이벤트 이미터
    description: 이벤트 기반 옵저버 패턴입니다.
    content: |-
      class EventEmitter:
          def __init__(self):
              self._events = {}

          def on(self, event, callback):
              if event not in self._events:
                  self._events[event] = []
              self._events[event].append(callback)

          def off(self, event, callback):
              if event in self._events:
                  self._events[event].remove(callback)

          def emit(self, event, *args):
              results = []
              if event in self._events:
                  for callback in self._events[event]:
                      results.append(callback(*args))
              return results

      emitter = EventEmitter()
      clickResults = []
      hoverResults = []
      emitter.on("click", lambda x, y: clickResults.append(f"Clicked at ({x}, {y})"))
      emitter.on("hover", lambda x, y: hoverResults.append(f"Hovered at ({x}, {y})"))
      emitter.emit("click", 100, 200)
      emitter.emit("hover", 50, 75)
      emitterResult = (clickResults, hoverResults)
      emitterResult
- id: strategy_pattern
  title: 전략 패턴
  structuredPrimary: true
  subtitle: 알고리즘 캡슐화
  goal: '전략 패턴: 실행 가능한 Python 흐름으로 익힌다.'
  why: '전략 패턴: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 알고리즘을 캡슐화하여 교체 가능하게 하는 패턴
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class PaymentStrategy(ABC):
        @abstractmethod
        def pay(self, amount):
            pass

    class CreditCardPayment(PaymentStrategy):
        def __init__(self, cardNumber):
            self.cardNumber = cardNumber

        def pay(self, amount):
            return f"Paid ${amount} with card ending {self.cardNumber[-4:]}"

    class PayPalPayment(PaymentStrategy):
        def __init__(self, email):
            self.email = email

        def pay(self, amount):
            return f"Paid ${amount} via PayPal ({self.email})"

    class CryptoPayment(PaymentStrategy):
        def __init__(self, wallet):
            self.wallet = wallet

        def pay(self, amount):
            return f"Paid ${amount} in crypto to {self.wallet[:8]}..."

    class ShoppingCart:
        def __init__(self):
            self.items = []
            self.paymentStrategy = None

        def addItem(self, item, price):
            self.items.append((item, price))

        def setPaymentStrategy(self, strategy):
            self.paymentStrategy = strategy

        def checkout(self):
            total = sum(price for _, price in self.items)
            return self.paymentStrategy.pay(total)

    cart = ShoppingCart()
    cart.addItem("Book", 20)
    cart.addItem("Pen", 5)
    cart.setPaymentStrategy(CreditCardPayment("1234567890123456"))
    payResult1 = cart.checkout()
    cart.setPaymentStrategy(PayPalPayment("user@email.com"))
    payResult2 = cart.checkout()
    strategyResult = (payResult1, payResult2)
    strategyResult
