sections:
- id: observer_pattern
  title: 옵저버 패턴
  structuredPrimary: true
  subtitle: 상태 변화 통지
  goal: 옵저버 패턴에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: 객체 상태 변화를 다른 객체에 통지하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Observer(ABC):
        @abstractmethod
        def update(self, message):
            pass

    class Subject:
        def __init__(self):
            self._observers = []

        def attach(self, observer):
            self._observers.append(observer)

        def detach(self, observer):
            self._observers.remove(observer)

        def notify(self, message):
            for observer in self._observers:
                observer.update(message)

    class EmailSubscriber(Observer):
        def __init__(self, name):
            self.name = name
            self.messages = []

        def update(self, message):
            self.messages.append(message)

    class SMSSubscriber(Observer):
        def __init__(self, phone):
            self.phone = phone
            self.messages = []

        def update(self, message):
            self.messages.append(f"SMS: {message}")

    newsPublisher = Subject()
    emailSub = EmailSubscriber("Alice")
    smsSub = SMSSubscriber("123-456")
    newsPublisher.attach(emailSub)
    newsPublisher.attach(smsSub)
    newsPublisher.notify("Breaking News!")
    observerResult = (emailSub.messages, smsSub.messages)
    observerResult
  exercise:
    prompt: 옵저버 패턴 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from abc import ABC, abstractmethod

      class Observer(ABC):
