  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Day 22에서 배운 행동 디자인 패턴을 난이도별로 복습합니다. 옵저버 패턴은 이벤트 시스템, 전략 패턴은 알고리즘 교체, 커맨드 패턴은 실행 취소/재실행에 핵심입니다. 상태 패턴은 복잡한 상태 전이를 객체로 캡슐화하고, 템플릿 메서드는 알고리즘의 골격을 정의합니다. 🟢 기본 문제로 각 패턴의 핵심 인터페이스를 구현하고, 🟡 응용 문제로 여러 패턴을 조합해봅니다. 🔴 심화 문제에서는 GUI 프레임워크, 게임 엔진 등에서 사용되는 복합 행동 패턴을 직접 설계합니다. 행동 패턴은 객체 간 책임 분배와 통신 방식을 결정하는 핵심 도구입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class NewsAgency:
        def __init__(self):
            self.subscribers = []
            self.latestNews = None

        def subscribe(self, subscriber):
            self.subscribers.append(subscriber)

        def unsubscribe(self, subscriber):
            self.subscribers.remove(subscriber)

        def publish(self, news):
            self.latestNews = news
            for subscriber in self.subscribers:
                subscriber.receive(news)

    class NewsReader:
        def __init__(self, name):
            self.name = name
            self.news = []

        def receive(self, news):
            self.news.append(news)

    agency = NewsAgency()
    reader1 = NewsReader("Alice")
    reader2 = NewsReader("Bob")
    agency.subscribe(reader1)
    agency.subscribe(reader2)
    agency.publish("Breaking: New discovery!")
    ex1Result = (reader1.news, reader2.news)
    ex1Result
