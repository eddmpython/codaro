      class StateMachine:
          def __init__(self, initialState, transitions):
              self.state = initialState
              self.transitions = transitions
              self.history = [initialState]

          def trigger(self, event):
              key = (self.state, event)
              if key in self.transitions:
                  self.state = self.transitions[key]
                  self.history.append(self.state)
                  return True
              return False

          def getState(self):
              return self.state

          def getHistory(self):
              return self.history

      transitionTable = {
          ("idle", "start"): "running",
          ("running", "pause"): "paused",
          ("paused", "resume"): "running",
          ("running", "stop"): "idle",
          ("paused", "stop"): "idle"
      }

      machine = StateMachine("idle", transitionTable)
      machine.trigger("start")
      machine.trigger("pause")
      machine.trigger("resume")
      machine.trigger("stop")
      ex14Result = (machine.getState(), machine.getHistory())
      ex14Result
