              return f"GZIP[{len(data)} bytes]"

          def getExtension(self):
              return ".gz"

      class CompressionContext:
          def __init__(self):
              self.strategies = {
                  "small": ZipCompression(),
                  "large": GzipCompression()
              }

          def compress(self, data):
              size = len(data)
              strategy = self.strategies["large"] if size > 100 else self.strategies["small"]
              return {"result": strategy.compress(data), "extension": strategy.getExtension()}

