sections:
- id: dp_intro
  title: 동적 프로그래밍 개념
  structuredPrimary: true
  subtitle: DP의 핵심 원리
  goal: 동적 프로그래밍 개념에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    동적 프로그래밍(DP)은 복잡한 문제를 작은 하위 문제로 나누어 해결하는 알고리즘 기법입니다. 핵심은 중복되는 하위 문제의 결과를 저장하여 재계산을 방지하는 것입니다. DP가 적용되려면 두 가지 조건이 필요합니다. 첫째, 최적 부분구조(Optimal Substructure) - 큰 문제의 최적해가 작은 문제의 최적해로 구성됩니다. 둘째, 중복 부분문제(Overlapping Subproblems) - 같은 하위 문제가 여러 번 계산됩니다.

    재귀 피보나치는 O(2^n), DP 피보나치는 O(n)입니다. 30번째 값도 즉시 계산됩니다.
  tips:
  - 재귀 피보나치는 O(2^n), DP 피보나치는 O(n)입니다. 30번째 값도 즉시 계산됩니다.
  snippet: |-
    def fibRecursive(n):
        if n <= 1:
            return n
        return fibRecursive(n - 1) + fibRecursive(n - 2)

    def fibDP(n, memo=None):
        if memo is None:
            memo = {}
        if n in memo:
            return memo[n]
        if n <= 1:
            return n
        memo[n] = fibDP(n - 1, memo) + fibDP(n - 2, memo)
        return memo[n]

    f"DP 피보나치(30): {fibDP(30)}"
  exercise:
    prompt: 동적 프로그래밍 개념 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def fibRecursive(n):
          if n <= 1:
              return n
          return fibRecursive(n - 1) + fibRecursive(n - 2)

      def fibDP(n, memo=None):
          if memo is None:
              memo = {}
          if n in memo:
              return memo[n]
          if n <= 1:
              return n
          memo[n] = fibDP(n - 1, memo) + fibDP(n - 2, memo)
          return memo[n]

      f"DP 피보나치(30): {fibDP(30)}"
    hints:
    - 동적 프로그래밍 개념 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 동적 프로그래밍 개념 코드가 예외 없이 끝나야 합니다.
    resultCheck: 동적 프로그래밍 개념에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: memoization
  title: 메모이제이션
  structuredPrimary: true
  subtitle: Top-down 방식
  goal: 메모이제이션에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    메모이제이션은 재귀 함수의 결과를 캐시에 저장하여 중복 계산을 방지하는 기법입니다. 위에서 아래로(Top-down) 문제를 해결하며, 필요한 하위 문제만 계산합니다. 파이썬의 functools.lru_cache 데코레이터로 쉽게 구현할 수 있습니다. 딕셔너리를 사용한 수동 구현도 가능합니다.

    lru_cache는 해시 가능한 인자만 캐싱합니다. 리스트는 튜플로 변환하세요.
  tips:
  - lru_cache는 해시 가능한 인자만 캐싱합니다. 리스트는 튜플로 변환하세요.
  snippet: |-
    from functools import lru_cache

    @lru_cache(maxsize=None)
    def fibMemo(n):
        if n <= 1:
            return n
        return fibMemo(n - 1) + fibMemo(n - 2)

    fibMemoResult = [fibMemo(i) for i in range(15)]
    f"피보나치 수열: {fibMemoResult}"
  exercise:
    prompt: 메모이제이션 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from functools import lru_cache

      @lru_cache(maxsize=None)
      def fibMemo(n):
          if n <= 1:
              return n
          return fibMemo(n - 1) + fibMemo(n - 2)

      fibMemoResult = [fibMemo(i) for i in range(15)]
      f"피보나치 수열: {fibMemoResult}"
    hints:
    - 메모이제이션 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 메모이제이션 코드가 예외 없이 끝나야 합니다.
    resultCheck: 메모이제이션에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: tabulation
  title: 타뷸레이션
  structuredPrimary: true
  subtitle: Bottom-up 방식
  goal: 타뷸레이션에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    타뷸레이션은 작은 문제부터 차례로 해결하여 테이블을 채워나가는 방식입니다. 아래에서 위로(Bottom-up) 진행하며 반복문을 사용합니다. 재귀 호출 오버헤드가 없어 일반적으로 더 빠릅니다. 모든 하위 문제를 계산하므로 필요 없는 계산이 포함될 수 있습니다.

    이전 상태만 필요하면 전체 테이블 대신 변수 몇 개만 사용하세요.
  tips:
  - 이전 상태만 필요하면 전체 테이블 대신 변수 몇 개만 사용하세요.
  snippet: |-
    def fibTable(n):
        if n <= 1:
            return n
        dp = [0] * (n + 1)
        dp[1] = 1
        for i in range(2, n + 1):
            dp[i] = dp[i - 1] + dp[i - 2]
        return dp[n]

    fibTableResult = fibTable(30)
    f"타뷸레이션 피보나치(30): {fibTableResult}"
  exercise:
    prompt: 타뷸레이션 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def fibTable(n):
          if n <= 1:
              return n
          dp = [0] * (n + 1)
          dp[1] = 1
          for i in range(2, n + 1):
              dp[i] = dp[i - 1] + dp[i - 2]
          return dp[n]

      fibTableResult = fibTable(30)
      f"타뷸레이션 피보나치(30): {fibTableResult}"
    hints:
    - 타뷸레이션 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 타뷸레이션 코드가 예외 없이 끝나야 합니다.
    resultCheck: 타뷸레이션에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: classic_problems
  title: 클래식 DP 문제
  structuredPrimary: true
  subtitle: 계단 오르기와 배낭 문제
  goal: 클래식 DP 문제에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    DP의 대표적인 문제들을 살펴봅니다. 계단 오르기는 1칸 또는 2칸씩 오를 때 가능한 경우의 수를 구합니다. 0/1 배낭 문제는 제한된 용량에서 최대 가치를 구합니다. 동전 교환 문제는 최소 동전 개수를 구합니다. 이 문제들은 상태 전이 방정식을 설계하는 좋은 예시입니다.

    배낭 문제는 1차원 DP로 공간 최적화할 수 있습니다. 역순으로 순회하세요.
  tips:
  - 배낭 문제는 1차원 DP로 공간 최적화할 수 있습니다. 역순으로 순회하세요.
  snippet: |-
    def climbStairs(n):
        if n <= 2:
            return n
        dp = [0] * (n + 1)
        dp[1] = 1
        dp[2] = 2
        for i in range(3, n + 1):
            dp[i] = dp[i - 1] + dp[i - 2]
        return dp[n]

    stairsResult = climbStairs(10)
    f"10계단 오르기 경우의 수: {stairsResult}"
  exercise:
    prompt: 클래식 DP 문제 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def climbStairs(n):
          if n <= 2:
              return n
          dp = [0] * (n + 1)
          dp[1] = 1
          dp[2] = 2
          for i in range(3, n + 1):
              dp[i] = dp[i - 1] + dp[i - 2]
          return dp[n]

      stairsResult = climbStairs(10)
      f"10계단 오르기 경우의 수: {stairsResult}"
    hints:
    - 클래식 DP 문제 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 클래식 DP 문제 코드가 예외 없이 끝나야 합니다.
    resultCheck: 클래식 DP 문제에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: string_dp
  title: 문자열 DP
  structuredPrimary: true
  subtitle: LCS와 편집 거리
  goal: 문자열 DP에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    문자열 관련 DP 문제는 2차원 테이블을 사용합니다. LCS(최장 공통 부분수열)는 두 문자열의 공통 부분수열 중 가장 긴 것을 찾습니다. 편집 거리(Levenshtein Distance)는 한 문자열을 다른 문자열로 변환하는 최소 연산 횟수입니다. 두 문제 모두 dp[i][j]로 부분 문자열의 결과를 저장합니다.

    편집 거리는 맞춤법 검사, DNA 서열 비교 등에 활용됩니다.
  tips:
  - 편집 거리는 맞춤법 검사, DNA 서열 비교 등에 활용됩니다.
  snippet: |-
    def lcsLength(s1, s2):
        m, n = len(s1), len(s2)
        dp = [[0] * (n + 1) for _ in range(m + 1)]
        for i in range(1, m + 1):
            for j in range(1, n + 1):
                if s1[i - 1] == s2[j - 1]:
                    dp[i][j] = dp[i - 1][j - 1] + 1
                else:
                    dp[i][j] = max(dp[i - 1][j], dp[i][j - 1])
        return dp[m][n]

    strA = "ABCDGH"
    strB = "AEDFHR"
    lcsResult = lcsLength(strA, strB)
    f"LCS 길이: {lcsResult}"
  exercise:
    prompt: 문자열 DP 예제에서 인자나 반환값을 바꿔 실행하고, 호출 결과와 예외 경계 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      def lcsLength(s1, s2):
          m, n = len(s1), len(s2)
          dp = [[0] * (n + 1) for _ in range(m + 1)]
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  if s1[i - 1] == s2[j - 1]:
                      dp[i][j] = dp[i - 1][j - 1] + 1
                  else:
                      dp[i][j] = max(dp[i - 1][j], dp[i][j - 1])
          return dp[m][n]

      strA = "ABCDGH"
      strB = "AEDFHR"
      lcsResult = lcsLength(strA, strB)
      f"LCS 길이: {lcsResult}"
    hints:
    - 문자열 DP 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 호출 결과와 예외 경계 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 문자열 DP 코드가 예외 없이 끝나야 합니다.
    resultCheck: 문자열 DP에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: advanced_dp
  title: 고급 DP 패턴
  structuredPrimary: true
  subtitle: LIS와 구간 DP
  goal: 고급 DP 패턴에서 추상화 패턴 흐름을 코드로 실행하고 결과를 확인한다.
  why: 고급 문법은 복잡한 코드를 더 작고 검증 가능한 단위로 나누는 데 필요합니다.
  explanation: |-
    최장 증가 부분수열(LIS)은 배열에서 순서를 유지하며 증가하는 가장 긴 부분수열입니다. 이진 탐색으로 O(n log n)에 해결할 수 있습니다. 구간 DP는 구간을 분할하여 최적해를 구하는 패턴입니다. 행렬 체인 곱셈, 버스트 풍선 등이 대표적인 예시입니다.

    구간 DP는 대각선 방향으로 테이블을 채웁니다. 작은 구간부터 큰 구간으로 확장합니다.
  tips:
