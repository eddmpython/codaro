- id: decorator_pattern
  title: 데코레이터 패턴
  structuredPrimary: true
  subtitle: 동적 기능 추가
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 객체에 동적으로 기능을 추가하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Coffee(ABC):
        @abstractmethod
        def cost(self):
            pass

        @abstractmethod
        def description(self):
            pass

    class SimpleCoffee(Coffee):
        def cost(self):
            return 2.0

        def description(self):
            return "Simple Coffee"

    class CoffeeDecorator(Coffee):
        def __init__(self, coffee):
            self._coffee = coffee

        def cost(self):
            return self._coffee.cost()

        def description(self):
            return self._coffee.description()

    class MilkDecorator(CoffeeDecorator):
        def cost(self):
            return self._coffee.cost() + 0.5

        def description(self):
            return self._coffee.description() + ", Milk"

    class SugarDecorator(CoffeeDecorator):
        def cost(self):
            return self._coffee.cost() + 0.2

        def description(self):
            return self._coffee.description() + ", Sugar"

    simpleCoffee = SimpleCoffee()
    milkCoffee = MilkDecorator(simpleCoffee)
    sweetMilkCoffee = SugarDecorator(milkCoffee)
    coffeeResult = (sweetMilkCoffee.description(), sweetMilkCoffee.cost())
    coffeeResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
