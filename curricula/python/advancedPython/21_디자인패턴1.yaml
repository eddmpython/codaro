- id: factory
  title: 팩토리 패턴
  structuredPrimary: true
  subtitle: 객체 생성 위임
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 객체 생성을 서브클래스에 위임하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from abc import ABC, abstractmethod

    class Animal(ABC):
        @abstractmethod
        def speak(self):
            pass

    class Dog(Animal):
        def speak(self):
            return "Woof!"

    class Cat(Animal):
        def speak(self):
            return "Meow!"

    class AnimalFactory:
        @staticmethod
        def create(animalType):
            if animalType == "dog":
                return Dog()
            elif animalType == "cat":
                return Cat()
            raise ValueError(f"Unknown type: {animalType}")

    factoryDog = AnimalFactory.create("dog")
    factoryCat = AnimalFactory.create("cat")
    factoryResult = (factoryDog.speak(), factoryCat.speak())
    factoryResult
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
