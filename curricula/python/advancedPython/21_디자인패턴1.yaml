- id: builder
  title: 빌더 패턴
  structuredPrimary: true
  subtitle: 복잡한 객체 단계적 생성
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 복잡한 객체를 단계적으로 생성하는 패턴
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    class Pizza:
        def __init__(self):
            self.size = None
            self.cheese = False
            self.pepperoni = False
            self.mushrooms = False

        def __str__(self):
            toppings = []
            if self.cheese:
                toppings.append("cheese")
            if self.pepperoni:
                toppings.append("pepperoni")
            if self.mushrooms:
                toppings.append("mushrooms")
            return f"{self.size} pizza with {', '.join(toppings)}"

    class PizzaBuilder:
        def __init__(self):
            self.pizza = Pizza()

        def setSize(self, size):
            self.pizza.size = size
            return self

        def addCheese(self):
            self.pizza.cheese = True
            return self

        def addPepperoni(self):
            self.pizza.pepperoni = True
            return self

        def addMushrooms(self):
            self.pizza.mushrooms = True
            return self

        def build(self):
            return self.pizza

    pizzaBuilt = PizzaBuilder().setSize("large").addCheese().addPepperoni().build()
    pizzaStr = str(pizzaBuilt)
    pizzaStr
  exercise:
