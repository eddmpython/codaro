- id: step12_loc
  title: 12단계. loc 사용
  structuredPrimary: true
  subtitle: 조건 + 컬럼 동시 선택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    loc은 DataFrame에서 행과 열을 동시에 선택할 수 있는 강력한 인덱서입니다. .loc[행조건, 열선택] 형태로 사용하며, 행은 Boolean 조건식으로, 열은 컬럼명이나 리스트로 지정합니다. 지금까지는 titanic[조건]['컬럼'] 형태로 두 번 선택했지만, loc을 사용하면 한 번에 처리할 수 있어 더 효율적입니다. 생존자의 나이만 뽑아내는 것처럼 특정 조건의 특정 컬럼을 분석할 때 매우 유용합니다.

    loc[행조건, 열선택]에서 열을 리스트로 주면 여러 컬럼을 동시에 선택할 수 있습니다. 예: titanic.loc[titanic['survived'] == 1, ['age', 'sex', 'pclass']]처럼 사용하면 생존자의 나이, 성별, 등급을 한번에 볼 수 있습니다.
  tips:
  - 'loc[행조건, 열선택]에서 열을 리스트로 주면 여러 컬럼을 동시에 선택할 수 있습니다. 예: titanic.loc[titanic[''survived''] == 1, [''age'', ''sex'', ''pclass'']]처럼 사용하면 생존자의 나이, 성별, 등급을 한번에 볼 수 있습니다.'
