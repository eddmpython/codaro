meta:
  id: pandas_02
  title: 타이타닉생존분석
  order: 2
  category: pandas
  difficulty: "⭐⭐"
  badge: 입문
  dataUrl: https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv
  tags: ["titanic", "필터링", "loc", "iloc", "value_counts"]
  seo:
    title: "pandas 타이타닉 생존분석 - 조건 필터링, loc, iloc"
    description: "타이타닉 데이터로 조건 필터링을 배웁니다. 생존자/사망자 필터링, value_counts, loc/iloc으로 데이터 선택하는 방법을 실습합니다."
    keywords: ["pandas 필터링", "loc iloc", "value_counts", "타이타닉 데이터", "조건 선택"]

intro:
  emoji: "🚢"
  goal: 타이타닉 승객 데이터에서 "누가 생존했는가?"를 분석합니다.
  description: 조건 필터링을 배웁니다. "생존자만", "1등석만"처럼 원하는 데이터만 골라내는 방법을 익힙니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 타이타닉 승객 데이터
  blocks:
  - type: text
    content: 타이타닉 데이터셋은 1912년 4월 15일 침몰한 타이타닉호 승객 891명의 정보를 담고 있습니다. 이 데이터는 데이터 분석 교육에서 가장 널리 사용되는 클래식 데이터셋으로, 실제 역사적 사건을 바탕으로 생존 요인을 분석할 수 있습니다. 15개의 컬럼에는 승객의 나이, 성별, 객실 등급, 운임, 가족 관계 등 다양한 정보가 포함되어 있습니다. survived 컬럼이 1이면 생존, 0이면 사망을 의미하며, 이번 분석의 핵심 타겟 변수입니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: 타이타닉 승객 데이터를 불러옵니다
    content: |-
      import pandas as pd

      url = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv"
      titanic = pd.read_csv(url)
      titanic.shape

- id: step2_head
  title: 2단계. 미리보기
  subtitle: head()로 구조 파악
  blocks:
  - type: text
    content: head() 메서드로 데이터의 처음 몇 행을 미리 확인합니다. 이 단계에서 각 컬럼의 데이터 타입과 실제 값들이 어떻게 저장되어 있는지 파악할 수 있습니다. pclass는 객실 등급(1등석, 2등석, 3등석), sex는 성별, age는 나이, sibsp는 함께 탑승한 형제자매/배우자 수, parch는 부모/자녀 수, fare는 운임, embarked는 탑승 항구를 의미합니다. 데이터를 분석하기 전에 전체적인 구조를 이해하는 것이 매우 중요합니다.
  - type: code
    language: python
    title: 처음 5행
    description: 데이터가 어떻게 생겼는지
    content: |-
      titanic.head()

- id: step3_single
  title: 3단계. 컬럼 하나 선택
  subtitle: 대괄호 사용
  blocks:
  - type: text
    content: DataFrame에서 특정 컬럼 하나만 선택하려면 대괄호 []를 사용합니다. 대괄호 안에 컬럼명을 문자열로 입력하면 해당 컬럼의 모든 값을 Series 형태로 가져올 수 있습니다. 여기서는 생존 여부를 나타내는 survived 컬럼을 선택합니다. 이 컬럼은 이진 변수로, 0과 1 두 가지 값만 가지며 생존자 분석의 핵심 변수입니다.
  - type: code
    language: python
    title: survived 컬럼
    description: 생존 여부 컬럼만 선택
    content: |-
      titanic['survived']

  - type: tip
    content: "DataFrame['컬럼명'] 형태로 선택하면 Series를 반환합니다. Series는 pandas의 1차원 데이터 구조로, 하나의 열을 나타냅니다. 컬럼명은 반드시 따옴표로 감싸야 하며, 대소문자를 정확히 구분해야 합니다."

- id: step4_multi
  title: 4단계. 컬럼 여러 개 선택
  subtitle: 대괄호 2겹
  blocks:
  - type: text
    content: 여러 컬럼을 동시에 선택하려면 대괄호를 2겹으로 사용합니다. 바깥 대괄호는 DataFrame 선택을 의미하고, 안쪽 대괄호는 컬럼명 리스트를 의미합니다. 즉, DataFrame[ [컬럼1, 컬럼2, ...] ] 형태입니다. 결과는 Series가 아닌 DataFrame으로 반환되며, 선택한 컬럼들만 포함하는 새로운 표를 만듭니다. 분석에 필요한 핵심 컬럼만 추출해서 보기 쉽게 만들 수 있습니다.
  - type: code
    language: python
    title: 여러 컬럼 선택
    description: 대괄호 2겹으로 여러 컬럼을 선택합니다
    content: |-
      titanic[['survived', 'pclass', 'sex', 'age']]

  - type: tip
    content: "대괄호 1겹 vs 2겹의 차이: titanic['survived']는 Series를 반환하고, titanic[['survived']]는 DataFrame을 반환합니다. 여러 컬럼을 선택할 때는 반드시 2겹으로 작성해야 합니다."

- id: step5_condition
  title: 5단계. 조건 만들기
  subtitle: == 비교 연산자
  blocks:
  - type: text
    content: "데이터 필터링의 핵심은 조건식을 만드는 것입니다. ==는 '같은가?'를 확인하는 비교 연산자로, 각 값이 조건을 만족하면 True, 만족하지 않으면 False를 반환합니다. titanic['survived'] == 1은 각 승객이 생존했는지(survived가 1인지) 확인하는 조건식입니다. 결과는 891개의 True/False 값으로 이루어진 Boolean Series가 됩니다. 이 Boolean Series를 다음 단계에서 필터링에 사용합니다."
  - type: code
    language: python
    title: 조건 확인
    description: 각 행이 조건을 만족하는지 True/False로 표시됩니다
    content: |-
      titanic['survived'] == 1

  - type: tip
    content: "비교 연산자는 == (같다), != (다르다), > (크다), < (작다), >= (크거나 같다), <= (작거나 같다) 등이 있습니다. 주의: 할당(=)과 비교(==)를 구분해야 합니다. x = 5는 값을 대입하고, x == 5는 같은지 비교합니다."

- id: step6_filter
  title: 6단계. 생존자 필터링
  subtitle: 조건이 True인 행만
  blocks:
  - type: text
    content: 이제 조건식을 DataFrame의 대괄호 안에 넣어서 실제 필터링을 수행합니다. DataFrame[조건식] 형태로 작성하면 조건이 True인 행만 선택되고, False인 행은 자동으로 제외됩니다. 이를 Boolean Indexing이라고 부릅니다. len() 함수로 개수를 세어보면 891명 중 342명이 생존한 것을 확인할 수 있습니다. 생존율은 약 38%입니다.
  - type: code
    language: python
    title: 생존자만 필터링
    description: 조건이 True인 행만 골라냅니다
    content: |-
      survivors = titanic[titanic['survived'] == 1]
      len(survivors)

  - type: tip
    content: "필터링 결과를 새 변수에 저장하면 추가 분석을 할 수 있습니다. len()은 행의 개수를 세는 함수입니다. .shape[0]이나 .count()를 사용해도 같은 결과를 얻을 수 있습니다."

- id: step7_firstclass
  title: 7단계. 1등석 필터링
  subtitle: 다른 조건 적용
  blocks:
  - type: text
    content: 같은 방식으로 다른 조건을 적용해봅니다. pclass(passenger class)는 객실 등급을 나타내며, 1이 1등석, 2가 2등석, 3이 3등석입니다. 타이타닉에서는 객실 등급이 생존에 큰 영향을 미쳤는데, 상류층이 탑승한 1등석은 구명보트 접근이 용이했기 때문입니다. 1등석 승객은 216명이었습니다.
  - type: code
    language: python
    title: 1등석만
    description: pclass가 1인 행만
    content: |-
      first = titanic[titanic['pclass'] == 1]
      len(first)

- id: step8_value_counts
  title: 8단계. 값별 개수
  subtitle: value_counts()
  blocks:
  - type: text
    content: value_counts() 메서드는 범주형 데이터의 각 값이 몇 번 등장하는지 자동으로 세어줍니다. 일일이 필터링해서 개수를 셀 필요 없이 한 줄로 전체 분포를 파악할 수 있어 매우 편리합니다. 기본적으로 개수가 많은 순서대로 정렬되어 출력됩니다. 타이타닉 데이터에서는 549명이 사망(0), 342명이 생존(1)했습니다. 사망자가 생존자보다 약 1.6배 많았습니다.
  - type: code
    language: python
    title: 생존 여부 개수
    description: 0(사망)과 1(생존)이 각각 몇 명인지
    content: |-
      titanic['survived'].value_counts()

  - type: tip
    content: "value_counts()는 기본적으로 결측치(NaN)를 제외합니다. 결측치도 포함하려면 dropna=False를 추가하면 됩니다. 또한 sort=False를 추가하면 정렬하지 않고 원래 순서대로 보여줍니다."

- id: step8_5_describe
  title: 8.5단계. 숫자 통계 복습
  subtitle: describe()로 전체 파악
  blocks:
  - type: text
    content: 이전 프로젝트(01번)에서 배운 describe()를 복습합니다. 숫자 컬럼들의 평균, 표준편차, 최소/최대값 등을 한눈에 확인할 수 있습니다. 나이(age)는 평균 약 30세, 운임(fare)은 평균 약 $32, 최대 운임은 $512입니다. describe()는 데이터를 처음 볼 때 전체적인 분포를 빠르게 파악하는 데 매우 유용합니다.
  - type: code
    language: python
    title: 숫자 컬럼 통계
    description: describe()로 전체 통계 확인
    content: |-
      titanic.describe()
  - type: tip
    content: "describe()는 01번 프로젝트에서 처음 배운 메서드입니다. count(개수), mean(평균), std(표준편차), min(최소), 25%(1사분위), 50%(중앙값), 75%(3사분위), max(최대)를 자동으로 계산해줍니다."

- id: step9_normalize
  title: 9단계. 비율로 보기
  subtitle: normalize=True
  blocks:
  - type: text
    content: value_counts()에 normalize=True 파라미터를 추가하면 개수 대신 비율(백분율)을 보여줍니다. 전체에서 각 값이 차지하는 상대적 비중을 파악할 때 유용합니다. 개수만 보면 절대적 규모를 알 수 있지만, 비율을 보면 전체 대비 어느 정도 비중인지 직관적으로 이해할 수 있습니다. 3등석이 약 55%, 1등석이 약 24%, 2등석이 약 21%를 차지합니다.
  - type: code
    language: python
    title: 등급별 비율
    description: 비율로 표시
    content: |-
      titanic['pclass'].value_counts(normalize=True)

  - type: tip
    content: "normalize=True의 결과는 0에서 1 사이의 소수로 표시됩니다. 백분율(%)로 보려면 * 100을 곱하면 됩니다. 예: value_counts(normalize=True) * 100"

- id: step10_survival_rate
  title: 10단계. 1등석 생존율
  subtitle: 필터링 + 통계 조합
  blocks:
  - type: text
    content: 이제 필터링과 통계를 조합해서 더 깊이 있는 분석을 수행합니다. 1등석 승객만 필터링한 후, survived 컬럼의 평균을 구하면 생존율을 계산할 수 있습니다. survived가 0(사망)과 1(생존)로 이루어져 있기 때문에, 평균값이 곧 생존한 사람의 비율이 됩니다. 1등석 생존율은 약 63%로, 전체 생존율 38%보다 훨씬 높습니다. 메서드 체이닝을 통해 여러 작업을 한 줄로 연결할 수 있습니다.
  - type: code
    language: python
    title: 1등석 생존율
    description: 필터링 후 평균
    content: |-
      titanic[titanic['pclass'] == 1]['survived'].mean()

  - type: tip
    content: "0과 1로 이루어진 이진 변수의 평균은 1의 비율과 같습니다. 예를 들어 [1, 0, 1, 1, 0]의 평균은 0.6인데, 이는 60%가 1이라는 의미입니다. 이 트릭은 생존율, 합격률, 성공률 등을 쉽게 계산할 때 자주 사용됩니다."

- id: step11_female
  title: 11단계. 여성 생존율
  subtitle: 성별로 비교
  blocks:
  - type: text
    content: 타이타닉 침몰 당시 "여성과 어린이 먼저(Women and children first)" 원칙이 실제로 적용되었는지 데이터로 확인해봅니다. 여성 승객만 필터링한 후 생존율을 계산하면 약 74%가 나옵니다. 이는 전체 생존율 38%, 남성 생존율 약 19%와 비교하면 압도적으로 높은 수치입니다. 실제로 구명보트 우선순위가 성별에 따라 달랐음을 데이터가 입증합니다.
  - type: code
    language: python
    title: 여성 생존율
    description: 여성만 필터링 후 평균
    content: |-
      titanic[titanic['sex'] == 'female']['survived'].mean()

- id: step12_loc
  title: 12단계. loc 사용
  subtitle: 조건 + 컬럼 동시 선택
  blocks:
  - type: text
    content: loc은 DataFrame에서 행과 열을 동시에 선택할 수 있는 강력한 인덱서입니다. .loc[행조건, 열선택] 형태로 사용하며, 행은 Boolean 조건식으로, 열은 컬럼명이나 리스트로 지정합니다. 지금까지는 titanic[조건]['컬럼'] 형태로 두 번 선택했지만, loc을 사용하면 한 번에 처리할 수 있어 더 효율적입니다. 생존자의 나이만 뽑아내는 것처럼 특정 조건의 특정 컬럼을 분석할 때 매우 유용합니다.
  - type: code
    language: python
    title: 생존자의 나이만
    description: 조건 + 컬럼 동시 선택
    content: |-
      titanic.loc[titanic['survived'] == 1, 'age'].head()

  - type: tip
    content: "loc[행조건, 열선택]에서 열을 리스트로 주면 여러 컬럼을 동시에 선택할 수 있습니다. 예: titanic.loc[titanic['survived'] == 1, ['age', 'sex', 'pclass']]처럼 사용하면 생존자의 나이, 성별, 등급을 한번에 볼 수 있습니다."

- id: step13_iloc
  title: 13단계. iloc 사용
  subtitle: 번호로 선택
  blocks:
  - type: text
    content: loc이 레이블(이름)로 선택한다면, iloc은 정수 위치(integer location)로 선택합니다. iloc은 0부터 시작하는 인덱스 번호로 행과 열을 선택하며, 파이썬의 리스트 인덱싱과 동일하게 작동합니다. iloc[0]은 첫 번째 행, iloc[1]은 두 번째 행을 의미합니다. 컬럼명이나 조건과 무관하게 순수하게 위치만으로 데이터를 선택할 때 사용합니다.
  - type: code
    language: python
    title: 첫 번째 행
    description: iloc[0]
    content: |-
      titanic.iloc[0]

  - type: tip
    content: "loc vs iloc의 차이: loc은 레이블(컬럼명, 인덱스명)로 선택하고, iloc은 정수 위치로 선택합니다. loc[0]은 인덱스 이름이 0인 행을, iloc[0]은 첫 번째 행을 의미합니다. 조건 기반 필터링에는 loc, 위치 기반 선택에는 iloc을 사용하세요."

- id: step14_iloc_range
  title: 14단계. iloc 범위 선택
  subtitle: 행과 열 범위 지정
  blocks:
  - type: text
    content: iloc은 슬라이싱을 지원하여 범위로 선택할 수 있습니다. iloc[행시작:행끝, 열시작:열끝] 형태로 사용하며, 파이썬 슬라이싱 규칙을 따릅니다. 시작 인덱스는 포함되고 끝 인덱스는 제외됩니다. 예를 들어 0:3은 0, 1, 2 세 개의 행을 선택합니다. 행과 열을 동시에 범위 지정하면 데이터의 특정 부분만 추출할 수 있습니다. 대용량 데이터에서 일부만 샘플링할 때 유용합니다.
  - type: code
    language: python
    title: 처음 3행, 처음 4열
    description: 범위로 선택
    content: |-
      titanic.iloc[0:3, 0:4]

  - type: tip
    content: "슬라이싱에서 콜론(:)만 쓰면 전체를 의미합니다. iloc[:5]는 처음 5행 전체 컬럼, iloc[:, :3]은 전체 행의 처음 3개 컬럼을 선택합니다. iloc[-1]은 마지막 행, iloc[-5:]는 마지막 5개 행을 선택합니다."

- id: practice
  title: 실습
  subtitle: 타이타닉 생존 분석 프로젝트
  blocks:
  - type: text
    content: 배운 내용으로 타이타닉 생존 요인을 분석해봅시다.
  - type: tip
    content: "각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다."
  - type: expansion
    title: "미션1: 등급별 생존율 비교 + 어린이 생존율"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
    - type: code
      title: "분석 수행"
      content: |-
        class1Rate = data[data['pclass'] == 1]['survived'].mean()
        class2Rate = data[data['pclass'] == 2]['survived'].mean()
        class3Rate = data[data['pclass'] == 3]['survived'].mean()
        childRate = data[data['age'] < 20]['survived'].mean()
        (class1Rate, class2Rate, class3Rate, childRate)
  - type: expansion
    title: "미션2: 성별 생존자 수 비교 + iloc 활용"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        df = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
    - type: code
      title: "분석 수행"
      content: |-
        maleCount = df[df['sex'] == 'male']['survived'].value_counts()
        femaleCount = df[df['sex'] == 'female']['survived'].value_counts()
        first10 = df.iloc[0:10, [1, 2]]
        (maleCount, femaleCount, first10)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 조건 필터링의 핵심 개념을 배웠습니다. Boolean Indexing을 통해 원하는 조건의 데이터만 골라내고, loc/iloc을 사용해서 행과 열을 효율적으로 선택하는 방법을 익혔습니다. 이 기술들은 실제 데이터 분석에서 가장 많이 사용되는 필수 스킬입니다.
  - type: list
    items:
    - "df[['컬럼1', '컬럼2']] - 여러 컬럼 선택 (2겹 대괄호)"
    - "df[df['컬럼'] == 값] - 조건 필터링 (Boolean Indexing)"
    - "df['컬럼'].value_counts() - 값별 개수 세기"
    - "df['컬럼'].value_counts(normalize=True) - 비율로 보기"
    - "df.loc[조건, '컬럼'] - 조건 + 컬럼 동시 선택 (레이블)"
    - "df.iloc[번호] - 위치로 선택 (정수 인덱스)"
  - type: text
    content: 다음 시간에는 펭귄 데이터로 groupby를 배웁니다. 그룹별로 통계를 한 번에 구하는 강력한 기능입니다.
