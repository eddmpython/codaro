- id: step13_iloc
  title: 13단계. iloc 사용
  structuredPrimary: true
  subtitle: 번호로 선택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    loc이 레이블(이름)로 선택한다면, iloc은 정수 위치(integer location)로 선택합니다. iloc은 0부터 시작하는 인덱스 번호로 행과 열을 선택하며, 파이썬의 리스트 인덱싱과 동일하게 작동합니다. iloc[0]은 첫 번째 행, iloc[1]은 두 번째 행을 의미합니다. 컬럼명이나 조건과 무관하게 순수하게 위치만으로 데이터를 선택할 때 사용합니다.

    loc vs iloc의 차이: loc은 레이블(컬럼명, 인덱스명)로 선택하고, iloc은 정수 위치로 선택합니다. loc[0]은 인덱스 이름이 0인 행을, iloc[0]은 첫 번째 행을 의미합니다. 조건 기반 필터링에는 loc, 위치 기반 선택에는 iloc을 사용하세요.
  tips:
  - 'loc vs iloc의 차이: loc은 레이블(컬럼명, 인덱스명)로 선택하고, iloc은 정수 위치로 선택합니다. loc[0]은 인덱스 이름이 0인 행을, iloc[0]은 첫 번째 행을 의미합니다. 조건 기반 필터링에는 loc, 위치 기반 선택에는 iloc을 사용하세요.'
  snippet: titanic.iloc[0]
