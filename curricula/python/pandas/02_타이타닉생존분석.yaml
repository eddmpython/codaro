sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: 타이타닉 승객 데이터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 타이타닉 데이터셋은 1912년 4월 15일 침몰한 타이타닉호 승객 891명의 정보를 담고 있습니다. 이 데이터는 데이터 분석 교육에서 가장 널리 사용되는 클래식 데이터셋으로, 실제 역사적 사건을 바탕으로 생존 요인을 분석할 수 있습니다. 15개의 컬럼에는 승객의 나이, 성별, 객실 등급, 운임, 가족 관계 등 다양한 정보가 포함되어 있습니다. survived 컬럼이 1이면 생존, 0이면 사망을 의미하며, 이번 분석의 핵심 타겟 변수입니다. 로컬 실행에서는 네트워크가 없어도 필터링 흐름을 연습할 수 있도록 핵심 컬럼을 가진 샘플 데이터를 함께 사용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd
    from codaro.curriculum.localData import loadLocalDataset

    titanic = loadLocalDataset("titanic")
    titanic.shape
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import pandas as pd
      from codaro.curriculum.localData import loadLocalDataset

      titanic = loadLocalDataset("titanic")
      titanic.shape
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_head
  title: 2단계. 미리보기
  structuredPrimary: true
  subtitle: head()로 구조 파악
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: head() 메서드로 데이터의 처음 몇 행을 미리 확인합니다. 이 단계에서 각 컬럼의 데이터 타입과 실제 값들이 어떻게 저장되어 있는지 파악할 수 있습니다. pclass는 객실 등급(1등석, 2등석, 3등석), sex는 성별, age는 나이, sibsp는 함께 탑승한 형제자매/배우자 수, parch는 부모/자녀 수, fare는 운임, embarked는 탑승 항구를 의미합니다. 데이터를 분석하기 전에 전체적인 구조를 이해하는 것이 매우 중요합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: titanic.head()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic.head()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_single
  title: 3단계. 컬럼 하나 선택
  structuredPrimary: true
  subtitle: 대괄호 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    DataFrame에서 특정 컬럼 하나만 선택하려면 대괄호 []를 사용합니다. 대괄호 안에 컬럼명을 문자열로 입력하면 해당 컬럼의 모든 값을 Series 형태로 가져올 수 있습니다. 여기서는 생존 여부를 나타내는 survived 컬럼을 선택합니다. 이 컬럼은 이진 변수로, 0과 1 두 가지 값만 가지며 생존자 분석의 핵심 변수입니다.

    DataFrame['컬럼명'] 형태로 선택하면 Series를 반환합니다. Series는 pandas의 1차원 데이터 구조로, 하나의 열을 나타냅니다. 컬럼명은 반드시 따옴표로 감싸야 하며, 대소문자를 정확히 구분해야 합니다.
  tips:
  - DataFrame['컬럼명'] 형태로 선택하면 Series를 반환합니다. Series는 pandas의 1차원 데이터 구조로, 하나의 열을 나타냅니다. 컬럼명은 반드시 따옴표로 감싸야 하며, 대소문자를 정확히 구분해야 합니다.
  snippet: titanic['survived']
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic['survived']
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_multi
  title: 4단계. 컬럼 여러 개 선택
  structuredPrimary: true
  subtitle: 대괄호 2겹
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    여러 컬럼을 동시에 선택하려면 대괄호를 2겹으로 사용합니다. 바깥 대괄호는 DataFrame 선택을 의미하고, 안쪽 대괄호는 컬럼명 리스트를 의미합니다. 즉, DataFrame[ [컬럼1, 컬럼2, ...] ] 형태입니다. 결과는 Series가 아닌 DataFrame으로 반환되며, 선택한 컬럼들만 포함하는 새로운 표를 만듭니다. 분석에 필요한 핵심 컬럼만 추출해서 보기 쉽게 만들 수 있습니다.

    대괄호 1겹 vs 2겹의 차이: titanic['survived']는 Series를 반환하고, titanic[['survived']]는 DataFrame을 반환합니다. 여러 컬럼을 선택할 때는 반드시 2겹으로 작성해야 합니다.
  tips:
  - '대괄호 1겹 vs 2겹의 차이: titanic[''survived'']는 Series를 반환하고, titanic[[''survived'']]는 DataFrame을 반환합니다. 여러 컬럼을 선택할 때는 반드시 2겹으로 작성해야 합니다.'
  snippet: titanic[['survived', 'pclass', 'sex', 'age']]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic[['survived', 'pclass', 'sex', 'age']]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_condition
  title: 5단계. 조건 만들기
  structuredPrimary: true
  subtitle: == 비교 연산자
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    데이터 필터링의 핵심은 조건식을 만드는 것입니다. ==는 '같은가?'를 확인하는 비교 연산자로, 각 값이 조건을 만족하면 True, 만족하지 않으면 False를 반환합니다. titanic['survived'] == 1은 각 승객이 생존했는지(survived가 1인지) 확인하는 조건식입니다. 결과는 891개의 True/False 값으로 이루어진 Boolean Series가 됩니다. 이 Boolean Series를 다음 단계에서 필터링에 사용합니다.

    비교 연산자는 == (같다), != (다르다), > (크다), < (작다), >= (크거나 같다), <= (작거나 같다) 등이 있습니다. 주의: 할당(=)과 비교(==)를 구분해야 합니다. x = 5는 값을 대입하고, x == 5는 같은지 비교합니다.
  tips:
  - '비교 연산자는 == (같다), != (다르다), > (크다), < (작다), >= (크거나 같다), <= (작거나 같다) 등이 있습니다. 주의: 할당(=)과 비교(==)를 구분해야 합니다. x = 5는 값을 대입하고, x == 5는 같은지 비교합니다.'
  snippet: titanic['survived'] == 1
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic['survived'] == 1
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_filter
  title: 6단계. 생존자 필터링
  structuredPrimary: true
  subtitle: 조건이 True인 행만
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    이제 조건식을 DataFrame의 대괄호 안에 넣어서 실제 필터링을 수행합니다. DataFrame[조건식] 형태로 작성하면 조건이 True인 행만 선택되고, False인 행은 자동으로 제외됩니다. 이를 Boolean Indexing이라고 부릅니다. len() 함수로 개수를 세어보면 891명 중 342명이 생존한 것을 확인할 수 있습니다. 생존율은 약 38%입니다.

    필터링 결과를 새 변수에 저장하면 추가 분석을 할 수 있습니다. len()은 행의 개수를 세는 함수입니다. .shape[0]이나 .count()를 사용해도 같은 결과를 얻을 수 있습니다.
  tips:
  - 필터링 결과를 새 변수에 저장하면 추가 분석을 할 수 있습니다. len()은 행의 개수를 세는 함수입니다. .shape[0]이나 .count()를 사용해도 같은 결과를 얻을 수 있습니다.
  snippet: |-
    survivors = titanic[titanic['survived'] == 1]
    len(survivors)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      survivors = titanic[titanic['survived'] == 1]
      len(survivors)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_firstclass
  title: 7단계. 1등석 필터링
  structuredPrimary: true
  subtitle: 다른 조건 적용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 같은 방식으로 다른 조건을 적용해봅니다. pclass(passenger class)는 객실 등급을 나타내며, 1이 1등석, 2가 2등석, 3이 3등석입니다. 타이타닉에서는 객실 등급이 생존에 큰 영향을 미쳤는데, 상류층이 탑승한 1등석은 구명보트 접근이 용이했기 때문입니다. 1등석 승객은 216명이었습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    first = titanic[titanic['pclass'] == 1]
    len(first)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      first = titanic[titanic['pclass'] == 1]
      len(first)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_value_counts
  title: 8단계. 값별 개수
  structuredPrimary: true
  subtitle: value_counts()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    value_counts() 메서드는 범주형 데이터의 각 값이 몇 번 등장하는지 자동으로 세어줍니다. 일일이 필터링해서 개수를 셀 필요 없이 한 줄로 전체 분포를 파악할 수 있어 매우 편리합니다. 기본적으로 개수가 많은 순서대로 정렬되어 출력됩니다. 타이타닉 데이터에서는 549명이 사망(0), 342명이 생존(1)했습니다. 사망자가 생존자보다 약 1.6배 많았습니다.

    value_counts()는 기본적으로 결측치(NaN)를 제외합니다. 결측치도 포함하려면 dropna=False를 추가하면 됩니다. 또한 sort=False를 추가하면 정렬하지 않고 원래 순서대로 보여줍니다.
  tips:
  - value_counts()는 기본적으로 결측치(NaN)를 제외합니다. 결측치도 포함하려면 dropna=False를 추가하면 됩니다. 또한 sort=False를 추가하면 정렬하지 않고 원래 순서대로 보여줍니다.
  snippet: titanic['survived'].value_counts()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic['survived'].value_counts()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_5_describe
  title: 8.5단계. 숫자 통계 복습
  structuredPrimary: true
  subtitle: describe()로 전체 파악
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    이전 프로젝트(01번)에서 배운 describe()를 복습합니다. 숫자 컬럼들의 평균, 표준편차, 최소/최대값 등을 한눈에 확인할 수 있습니다. 나이(age)는 평균 약 30세, 운임(fare)은 평균 약 $32, 최대 운임은 $512입니다. describe()는 데이터를 처음 볼 때 전체적인 분포를 빠르게 파악하는 데 매우 유용합니다.

    describe()는 01번 프로젝트에서 처음 배운 메서드입니다. count(개수), mean(평균), std(표준편차), min(최소), 25%(1사분위), 50%(중앙값), 75%(3사분위), max(최대)를 자동으로 계산해줍니다.
  tips:
  - describe()는 01번 프로젝트에서 처음 배운 메서드입니다. count(개수), mean(평균), std(표준편차), min(최소), 25%(1사분위), 50%(중앙값), 75%(3사분위), max(최대)를 자동으로 계산해줍니다.
  snippet: titanic.describe()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: titanic.describe()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_normalize
  title: 9단계. 비율로 보기
  structuredPrimary: true
  subtitle: normalize=True
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
