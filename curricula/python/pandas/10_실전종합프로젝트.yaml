  explanation: 분석 목적에 맞는 컬럼만 선택합니다. number(이슈 번호), title(제목), state(상태), created_at(생성일), comments(댓글 수) 5가지를 선택합니다. copy()를 붙여서 원본과 분리된 새 DataFrame을 만듭니다. 이렇게 필요한 데이터만 추출하면 메모리를 절약하고 분석이 명확해집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    clean = issues[['number', 'title', 'state', 'created_at', 'comments']].copy()
    clean.head()
