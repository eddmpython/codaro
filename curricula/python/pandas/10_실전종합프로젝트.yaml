  tips:
  - str.len()은 문자열 길이를 반환합니다. Series에 .str을 붙이면 각 행에 문자열 메서드를 적용할 수 있습니다. str.upper(), str.lower(), str.contains() 등 다양한 문자열 처리 메서드를 사용할 수 있습니다.
  snippet: |-
