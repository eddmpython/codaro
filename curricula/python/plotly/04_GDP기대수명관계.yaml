- id: step2_basic_scatter
  title: 2단계. 기본 산점도
  structuredPrimary: true
  subtitle: px.scatter() 복습
  goal: '2단계. 기본 산점도: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 기본 산점도: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: GDP와 기대수명 사이에 어떤 관계가 있는지 기본 산점도로 먼저 확인합니다. 이전 프로젝트에서 배운 px.scatter() 함수를 복습하며, 두 변수의 기본적인 패턴을 파악합니다. 일반적으로
    GDP가 높은 국가일수록 기대수명도 높은 경향을 보이지만, 산점도로 시각화하면 이 관계가 선형인지 비선형인지, 예외적인 국가가 있는지 등을 직관적으로 확인할 수 있습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
