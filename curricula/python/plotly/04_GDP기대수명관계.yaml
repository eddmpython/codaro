    log_x=True는 x축을 로그 스케일(밑이 10인 로그)로 변환합니다. log_y=True는 y축을 로그 스케일로 변환합니다. 로그 스케일에서는 100, 1000, 10000이 균등 간격으로 표시됩니다. 이는 10^2, 10^3, 10^4를 의미하며, 지수가 1씩 증가할 때마다 같은 간격으로 배치됩니다. 데이터 범위가 넓거나(몇 자릿수 차이), 비율 관계가 중요하거나, 지수 성장을 표현할 때 사용합니다. 금융(주가), 생물학(세포 수), 지질학(지진 규모) 등에서 필수적입니다. 시각적으로 선형 패턴이 보이면 실제로는 지수 관계라는 의미입니다.
