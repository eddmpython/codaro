- id: step9_legend
  title: 9단계. 범례 위치 조정
  structuredPrimary: true
  subtitle: legend 설정
  goal: 9단계. 범례 위치 조정에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
