    language: python
    title: 의도한 오류 고치기
    description: 로그 스케일과 대륙 색상이 빠진 차트를 검증 함수가 잡아내는지 확인합니다
    content: |-
      brokenFigure = px.scatter(
          df2007,
          x="gdpPercap",
          y="lifeExp",
          size="pop",
          hover_name="country",
          title="2007년 세계 발전 현황"
      )

      try:
          validateBubbleFigure(brokenFigure, expectedContinents)
      except AssertionError as exc:
          print("검증 실패 확인:", exc)

      fixedFigure = px.scatter(
          df2007,
          x="gdpPercap",
          y="lifeExp",
          color="continent",
          size="pop",
          hover_name="country",
          log_x=True,
          size_max=60,
          title="2007년 세계 발전 현황"
      )
      fixedFigure.update_layout(
          xaxis_title="1인당 GDP (USD, 로그 스케일)",
          yaxis_title="기대수명 (년)"
      )

      assert validateBubbleFigure(fixedFigure, expectedContinents)
