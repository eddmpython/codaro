  explanation: |-
    버블차트는 여러 변수를 한 화면에 넣기 때문에 축, 색상, 크기, hover, 로그 스케일 중 하나만 빠져도 해석이 달라집니다. 이 단계에서는 GDP가 높을수록 기대수명이 높아지는 양의 관계가 있을 것이라고 먼저 예측하고, 데이터 요약과 Plotly Figure 구조를 함께 검증합니다.

    실무 버블차트는 데이터 관계와 Figure 구조를 함께 검증해야 합니다. 특히 로그축과 색상 그룹은 해석을 바꾸므로 테스트로 고정해두는 편이 안전합니다.
  tips:
  - 실무 버블차트는 데이터 관계와 Figure 구조를 함께 검증해야 합니다. 특히 로그축과 색상 그룹은 해석을 바꾸므로 테스트로 고정해두는 편이 안전합니다.
