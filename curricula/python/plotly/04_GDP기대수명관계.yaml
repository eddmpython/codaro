sections:
- id: step1_import
  title: 1단계. 데이터 준비
  structuredPrimary: true
  subtitle: gapminder 2007년 필터
  goal: 1단계. 데이터 준비에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: Plotly Express에 내장된 gapminder 데이터셋은 Hans Rosling의 유명한 세계 발전 지표 데이터로, 1952년부터 2007년까지 각국의
    경제와 건강 지표를 담고 있습니다. 전체 시계열 데이터를 모두 사용하면 복잡하므로, 가장 최근인 2007년 데이터만 필터링하여 특정 시점의 스냅샷을 분석합니다. 이렇게 하면 현재
    시점의 국가별 발전 수준을 한눈에 비교할 수 있으며, 경제 수준(GDP)과 건강 수준(기대수명)의 관계를 명확히 파악할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import plotly.express as px
    import pandas as pd
    gapminder = px.data.gapminder()
    df2007 = gapminder[gapminder['year'] == 2007]
    df2007.head()
  exercise:
    prompt: 1단계. 데이터 준비 예제에서 리스트 값을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import plotly.express as px
      import pandas as pd
      gapminder = px.data.gapminder()
      df2007 = gapminder[gapminder['year'] == 2007]
      df2007.head()
    hints:
    - 1단계. 데이터 준비 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 툴팁과 선택 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 데이터 준비 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 데이터 준비에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step2_basic_scatter
  title: 2단계. 기본 산점도
  structuredPrimary: true
  subtitle: px.scatter() 복습
  goal: 2단계. 기본 산점도에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: GDP와 기대수명 사이에 어떤 관계가 있는지 기본 산점도로 먼저 확인합니다. 이전 프로젝트에서 배운 px.scatter() 함수를 복습하며, 두 변수의 기본적인
    패턴을 파악합니다. 일반적으로 GDP가 높은 국가일수록 기대수명도 높은 경향을 보이지만, 산점도로 시각화하면 이 관계가 선형인지 비선형인지, 예외적인 국가가 있는지 등을 직관적으로
    확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figBasicScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', title='GDP와 기대수명')
    figBasicScatter
  exercise:
    prompt: 2단계. 기본 산점도 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figBasicScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', title='GDP와 기대수명')
      figBasicScatter
    hints:
    - 2단계. 기본 산점도 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 툴팁과 선택 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 기본 산점도 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 기본 산점도에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step3_color
  title: 3단계. 대륙별 색상
  structuredPrimary: true
  subtitle: color 복습
  goal: 3단계. 대륙별 색상에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: color 파라미터를 추가하여 대륙별로 점의 색상을 구분하면 지리적 패턴을 파악할 수 있습니다. 이전 프로젝트에서 배운 color 파라미터를 복습하며, 같은
    대륙 국가들이 산점도에서 어떤 클러스터를 형성하는지 확인합니다. 예를 들어 아프리카 국가들은 대체로 왼쪽 아래(낮은 GDP, 낮은 기대수명)에 모여있고, 유럽 국가들은 오른쪽
    위(높은 GDP, 높은 기대수명)에 위치하는 패턴을 시각적으로 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figColorScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', title='대륙별 GDP와 기대수명')
    figColorScatter
  exercise:
    prompt: 3단계. 대륙별 색상 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figColorScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', title='대륙별 GDP와 기대수명')
      figColorScatter
    hints:
    - 3단계. 대륙별 색상 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 툴팁과 선택 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 대륙별 색상 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 대륙별 색상에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step4_bubble
  title: 4단계. 버블차트
  structuredPrimary: true
  subtitle: size로 인구 표현
  goal: 4단계. 버블차트에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: |-
    size 파라미터를 추가하면 점의 크기가 데이터 값에 비례하여 변하면서 일반 산점도가 버블차트로 진화합니다. 여기서는 인구를 버블 크기로 매핑하여, GDP(x축), 기대수명(y축), 대륙(색상), 인구(크기) 총 4차원의 정보를 하나의 2D 평면에 표현합니다. 큰 버블은 중국이나 인도처럼 인구가 많은 국가를, 작은 버블은 룩셈부르크나 아이슬란드처럼 인구가 적은 국가를 나타냅니다. 이렇게 다차원 정보를 한 차트에 담으면 복잡한 관계를 직관적으로 이해할 수 있습니다.

    버블차트란?
    버블차트는 산점도의 확장입니다. x, y에 더해 세 번째 변수를 점의 크기로 표현합니다. px.scatter()에 size를 추가하면 됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figBubbleScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', size='pop', title='국가별 발전 현황')
    figBubbleScatter
  exercise:
    prompt: 4단계. 버블차트 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figBubbleScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', size='pop', title='국가별 발전 현황')
      figBubbleScatter
    hints:
    - 4단계. 버블차트 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 툴팁과 선택 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 버블차트 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 버블차트에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_hover
  title: 5단계. 호버 정보
  structuredPrimary: true
  subtitle: hover_name, hover_data 복습
  goal: 5단계. 호버 정보에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: hover_name 파라미터에 'country' 컬럼을 지정하면 버블에 마우스를 올렸을 때 국가 이름이 호버 툴팁의 제목으로 표시됩니다. 버블차트는 많은 점이
    밀집되어 있어 어떤 점이 어느 국가인지 구분하기 어려운데, 호버 기능으로 마우스만 올려도 즉시 확인할 수 있어 사용자 경험이 크게 향상됩니다. 특히 이상치(outlier)를 발견했을
    때 어느 국가인지 바로 확인할 수 있어, 데이터 탐색과 분석이 훨씬 효율적으로 이루어집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figHoverScatter = px.scatter(
        df2007, x='gdpPercap', y='lifeExp',
        color='continent', size='pop',
        hover_name='country',
        title='국가별 발전 현황'
    )
    figHoverScatter
  exercise:
    prompt: 5단계. 호버 정보 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figHoverScatter = px.scatter(
          df2007, x='gdpPercap', y='lifeExp',
          color='continent', size='pop',
          hover_name='country',
          title='국가별 발전 현황'
      )
      figHoverScatter
    hints:
    - 5단계. 호버 정보 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 툴팁과 선택 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 호버 정보 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 호버 정보에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step6_log_x
  title: 6단계. 로그 스케일
  structuredPrimary: true
  subtitle: log_x 파라미터
  goal: 6단계. 로그 스케일에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: |-
    GDP는 국가간 차이가 매우 큽니다. 가장 가난한 나라는 수백 달러, 가장 부유한 나라는 수만 달러로 100배 이상 차이가 납니다. 이렇게 범위가 넓은 데이터를 일반 스케일로 표시하면 대부분의 국가가 왼쪽에 몰려 패턴을 파악하기 어렵습니다. 로그 스케일을 적용하면 배수 관계를 균등 간격으로 표시하여 전체 패턴을 명확히 볼 수 있습니다. 예를 들어 100달러, 1000달러, 10000달러가 동일한 간격으로 배치되어 저소득 국가와 고소득 국가를 모두 공평하게 비교할 수 있습니다. 경제 데이터, 인구 데이터, 코로나 확진자 수 등 지수적으로 증가하는 데이터에 매우 유용합니다.

    log_x=True는 x축을 로그 스케일(밑이 10인 로그)로 변환합니다. log_y=True는 y축을 로그 스케일로 변환합니다. 로그 스케일에서는 100, 1000, 10000이 균등 간격으로 표시됩니다. 이는 10^2, 10^3, 10^4를 의미하며, 지수가 1씩 증가할 때마다 같은 간격으로 배치됩니다. 데이터 범위가 넓거나(몇 자릿수 차이), 비율 관계가 중요하거나, 지수 성장을 표현할 때 사용합니다. 금융(주가), 생물학(세포 수), 지질학(지진 규모) 등에서 필수적입니다. 시각적으로 선형 패턴이 보이면 실제로는 지수 관계라는 의미입니다.
  tips:
  - log_x=True는 x축을 로그 스케일(밑이 10인 로그)로 변환합니다. log_y=True는 y축을 로그 스케일로 변환합니다. 로그 스케일에서는 100, 1000, 10000이
    균등 간격으로 표시됩니다. 이는 10^2, 10^3, 10^4를 의미하며, 지수가 1씩 증가할 때마다 같은 간격으로 배치됩니다. 데이터 범위가 넓거나(몇 자릿수 차이), 비율
    관계가 중요하거나, 지수 성장을 표현할 때 사용합니다. 금융(주가), 생물학(세포 수), 지질학(지진 규모) 등에서 필수적입니다. 시각적으로 선형 패턴이 보이면 실제로는 지수
    관계라는 의미입니다.
  snippet: |-
