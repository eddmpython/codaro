      yearComparison = gapminder[gapminder["year"].isin([1952, 2007])].groupby("year").agg(
          medianLife=("lifeExp", "median"),
          medianGdp=("gdpPercap", "median"),
          countryCount=("country", "count"),
      ).round(2)

