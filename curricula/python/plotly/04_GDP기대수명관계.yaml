- id: step4_bubble
  title: 4단계. 버블차트
  structuredPrimary: true
  subtitle: size로 인구 표현
  goal: '4단계. 버블차트: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 버블차트: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    size 파라미터를 추가하면 점의 크기가 데이터 값에 비례하여 변하면서 일반 산점도가 버블차트로 진화합니다. 여기서는 인구를 버블 크기로 매핑하여, GDP(x축), 기대수명(y축), 대륙(색상), 인구(크기) 총 4차원의 정보를 하나의 2D 평면에 표현합니다. 큰 버블은 중국이나 인도처럼 인구가 많은 국가를, 작은 버블은 룩셈부르크나 아이슬란드처럼 인구가 적은 국가를 나타냅니다. 이렇게 다차원 정보를 한 차트에 담으면 복잡한 관계를 직관적으로 이해할 수 있습니다.

    버블차트란?
    버블차트는 산점도의 확장입니다. x, y에 더해 세 번째 변수를 점의 크기로 표현합니다. px.scatter()에 size를 추가하면 됩니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    figBubbleScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', size='pop', title='국가별 발전 현황')
    figBubbleScatter
  exercise:
    prompt: '4단계. 버블차트: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      figBubbleScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', size='pop', title='국가별 발전 현황')
      figBubbleScatter
    solution: |-
      figBubbleScatter = px.scatter(df2007, x='gdpPercap', y='lifeExp', color='continent', size='pop', title='국가별 발전 현황')
      figBubbleScatter
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: size 파라미터를 추가하면 점의 크기가 데이터 값에 비례하여 변하면서 일반 산점도가 버블차트로 진화합니다. 여기서는 인구를 버블 크기로 매핑하여, GDP(x축), 기대수명(y축), 대륙(색상),
      인구(크기) 총 4차원의 정보를 하나의 2D 평면에 표현합니다. 큰 버블은 중국이나 인도처럼 인구가 많은 국가를, 작은 버블은 룩셈부르크나 아이슬란드처럼 인구가 적은 국가를 나타냅니다. 이렇게 다차원 정보를
      한 차트에 담으면 복잡한 관계를 직관적으로 이해할 수 있습니다.
  - type: tip
