sections:
- id: step1_import
  title: 1단계. 데이터 준비
  structuredPrimary: true
  subtitle: gapminder 2007년 필터
  goal: '1단계. 데이터 준비: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 데이터 준비: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Plotly Express에 내장된 gapminder 데이터셋은 Hans Rosling의 유명한 세계 발전 지표 데이터로, 1952년부터 2007년까지 각국의 경제와 건강 지표를 담고 있습니다.
    전체 시계열 데이터를 모두 사용하면 복잡하므로, 가장 최근인 2007년 데이터만 필터링하여 특정 시점의 스냅샷을 분석합니다. 이렇게 하면 현재 시점의 국가별 발전 수준을 한눈에 비교할 수 있으며, 경제 수준(GDP)과
    건강 수준(기대수명)의 관계를 명확히 파악할 수 있습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    import plotly.express as px
    import pandas as pd
    gapminder = px.data.gapminder()
    df2007 = gapminder[gapminder['year'] == 2007]
    df2007.head()
  exercise:
    prompt: '1단계. 데이터 준비: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import plotly.express as px
      import pandas as pd
      gapminder = px.data.gapminder()
      df2007 = gapminder[gapminder['year'] == 2007]
      df2007.head()
    solution: |-
      import plotly.express as px
      import pandas as pd
      gapminder = px.data.gapminder()
      df2007 = gapminder[gapminder['year'] == 2007]
      df2007.head()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Plotly Express에 내장된 gapminder 데이터셋은 Hans Rosling의 유명한 세계 발전 지표 데이터로, 1952년부터 2007년까지 각국의 경제와 건강 지표를 담고 있습니다.
      전체 시계열 데이터를 모두 사용하면 복잡하므로, 가장 최근인 2007년 데이터만 필터링하여 특정 시점의 스냅샷을 분석합니다. 이렇게 하면 현재 시점의 국가별 발전 수준을 한눈에 비교할 수 있으며, 경제 수준(GDP)과
      건강 수준(기대수명)의 관계를 명확히 파악할 수 있습니다.
  - type: code
    language: python
    title: 데이터 로드
    description: gapminder 2007년
    content: |-
