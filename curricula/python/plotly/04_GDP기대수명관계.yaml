    description: 최종 차트의 trace, 축, 범례, 제목을 확인합니다
    content: |-
      def validateBubbleFigure(fig, expectedContinents):
          traceNames = [trace.name for trace in fig.data]

          assert len(fig.data) == len(expectedContinents)
          assert set(traceNames) == set(expectedContinents)
          assert all(trace.type == "scatter" for trace in fig.data)
          assert all(trace.mode == "markers" for trace in fig.data)
          assert all(len(trace.marker.size) > 0 for trace in fig.data)
          assert fig.layout.xaxis.type == "log"
          assert "GDP" in fig.layout.xaxis.title.text
          assert "기대수명" in fig.layout.yaxis.title.text
          assert "2007" in fig.layout.title.text

          return traceNames

      expectedContinents = sorted(df2007["continent"].unique())
      traceNames = validateBubbleFigure(figFinal, expectedContinents)
