- id: summary
  title: 정리
  blocks:
  - type: text
    content: Plotly 버블차트와 레이아웃 커스텀을 배웠습니다.
  - type: list
    items:
    - px.scatter() + size - 버블차트 생성
    - color - 범주별 색상 구분
    - hover_name - 호버 시 이름 표시
    - log_x, log_y - 로그 스케일 적용
    - size_max - 버블 최대 크기 조정
    - update_layout() - 제목, 축 라벨, 범례 커스텀
