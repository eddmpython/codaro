  explanation: update_layout() 메서드를 사용하면 범례의 위치와 스타일을 세밀하게 조정할 수 있습니다. 기본적으로 범례는 차트 오른쪽 외부에 배치되지만, legend=dict()를
    사용하면 차트 내부 원하는 위치에 배치할 수 있습니다. xanchor와 yanchor는 범례의 기준점을, x와 y는 실제 위치(0~1 사이 비율)를 지정합니다. 예를 들어 x=0.99,
    xanchor='right'는 차트 오른쪽 끝에 범례의 오른쪽을 맞춘다는 의미입니다. 차트 내부 여백이 많을 때 범례를 안쪽에 배치하면 공간을 효율적으로 사용할 수 있습니다.
