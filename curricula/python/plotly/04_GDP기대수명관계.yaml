- id: step3_color
  title: 3단계. 대륙별 색상
  structuredPrimary: true
  subtitle: color 복습
  goal: '3단계. 대륙별 색상: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 대륙별 색상: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: color 파라미터를 추가하여 대륙별로 점의 색상을 구분하면 지리적 패턴을 파악할 수 있습니다. 이전 프로젝트에서 배운 color 파라미터를 복습하며, 같은 대륙 국가들이 산점도에서 어떤 클러스터를
    형성하는지 확인합니다. 예를 들어 아프리카 국가들은 대체로 왼쪽 아래(낮은 GDP, 낮은 기대수명)에 모여있고, 유럽 국가들은 오른쪽 위(높은 GDP, 높은 기대수명)에 위치하는 패턴을 시각적으로 확인할 수 있습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
