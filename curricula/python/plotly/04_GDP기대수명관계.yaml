- id: step8_update_layout
  title: 8단계. 레이아웃 커스텀
  structuredPrimary: true
  subtitle: update_layout()
  goal: 8단계. 레이아웃 커스텀에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: |-
    px.scatter()로 생성한 차트는 기본 스타일로 제공되지만, 실무에서는 더 세밀한 조정이 필요한 경우가 많습니다. update_layout() 메서드는 차트 생성 후 제목 위치, 축 라벨, 범례 스타일, 여백, 배경색 등을 추가로 변경할 수 있게 해줍니다. px 함수의 파라미터로 설정할 수 없는 고급 옵션들을 제어할 수 있어, 프레젠테이션이나 논문에 사용할 완성도 높은 차트를 만들 수 있습니다. 특히 여러 차트를 일관된 스타일로 만들 때 유용하며, 회사 브랜드 색상이나 폰트를 적용할 수도 있습니다.

    update_layout()은 Plotly Figure 객체의 레이아웃을 수정하는 메서드입니다. 차트를 변수에 저장한 후 fig.update_layout(...)처럼 호출합니다. 주요 파라미터로는 title(제목), xaxis_title/yaxis_title(축 라벨), template(전체 테마), font(폰트 설정), margin(여백), width/height(크기) 등이 있습니다. 메서드 체이닝도 가능하여 fig.update_layout(...).update_traces(...)처럼 연결할 수 있습니다. 이 메서드는 원본 Figure 객체를 수정하고 자기 자신을 반환하므로, 같은 변수에 다시 할당할 필요는 없습니다.
  tips:
  - update_layout()은 Plotly Figure 객체의 레이아웃을 수정하는 메서드입니다. 차트를 변수에 저장한 후 fig.update_layout(...)처럼 호출합니다.
    주요 파라미터로는 title(제목), xaxis_title/yaxis_title(축 라벨), template(전체 테마), font(폰트 설정), margin(여백), width/height(크기)
    등이 있습니다. 메서드 체이닝도 가능하여 fig.update_layout(...).update_traces(...)처럼 연결할 수 있습니다. 이 메서드는 원본 Figure 객체를
    수정하고 자기 자신을 반환하므로, 같은 변수에 다시 할당할 필요는 없습니다.
  snippet: |-
    figBubble = px.scatter(
        df2007, x='gdpPercap', y='lifeExp',
        color='continent', size='pop',
        hover_name='country',
        log_x=True,
        size_max=60
    )
    figBubble.update_layout(
        title='2007년 세계 발전 현황',
        xaxis_title='1인당 GDP (USD, 로그 스케일)',
        yaxis_title='기대수명 (년)'
    )
    figBubble
  exercise:
    prompt: 8단계. 레이아웃 커스텀 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 툴팁과 선택 상태 기준으로 달라진 결과를 확인하세요.
