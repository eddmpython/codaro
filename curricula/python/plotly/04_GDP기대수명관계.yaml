    assert sorted(df2007["continent"].unique()) == ["Africa", "Americas", "Asia", "Europe", "Oceania"]

    logGdp = df2007["gdpPercap"].map(math.log10)
    gdpLifeCorrelation = logGdp.corr(df2007["lifeExp"])
    topPopulationCountry = df2007.nlargest(1, "pop").iloc[0]["country"]

