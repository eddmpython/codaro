meta:
  id: plotly_09
  title: 주식시계열분석
  order: 9
  category: plotly
  difficulty: "⭐⭐⭐⭐"
  badge: 심화
  tags: ["주식", "시계열", "line", "template", "subplots", "update_traces"]
  seo:
    title: "Plotly 주식 시계열 분석 - 다중 주식 비교 차트 만들기"
    description: "주식 데이터로 시계열 분석을 배웁니다. px.line, make_subplots, update_traces, template을 활용한 다중 주식 비교 차트를 만듭니다."
    keywords: ["Plotly", "주식 분석", "시계열", "line chart", "subplots", "template"]

intro:
  emoji: "📈"
  goal: 주식 데이터로 다중 주식 비교 차트를 만듭니다.
  description: px.data.stocks() 데이터로 여러 종목의 주가 추이를 비교 분석합니다. 선 그래프, 서브플롯, 템플릿 스타일링을 활용합니다.

sections:
- id: step1_import
  title: 1단계. 데이터 준비
  subtitle: 주식 가격 데이터 로드
  blocks:
  - type: text
    content: px.data.stocks()는 6개 기술주(GOOG, AAPL, AMZN, FB, NFLX, MSFT)의 2018~2020년 일별 주가 데이터입니다. 총 505행, 7컬럼(date + 6종목)으로 구성되어 있습니다. 주가 데이터는 2018년 1월 1일을 기준(1.0)으로 정규화된 상대 가격으로, 각 종목의 수익률을 공정하게 비교할 수 있게 합니다. 예를 들어 값이 1.5면 기준 시점 대비 50% 상승, 0.8이면 20% 하락을 의미합니다. 시계열 데이터 시각화는 금융, 판매, 웹 트래픽, 센서 데이터 등 시간에 따른 변화를 분석하는 모든 분야에서 필수적이며, 추세, 계절성, 이상치를 발견하는 데 핵심 도구입니다.
  - type: code
    language: python
    title: 주식 데이터 로드
    description: GOOG, AAPL, AMZN, FB, NFLX, MSFT 6종목
    content: |-
      import plotly.express as px
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots
      import pandas as pd

      stocks = px.data.stocks()
      stocks.shape

- id: step2_head
  title: 2단계. 데이터 확인
  subtitle: 종목별 주가
  blocks:
  - type: text
    content: 데이터 구조를 확인하면 date 컬럼과 6개 종목 컬럼이 있습니다. 시계열 분석에서는 데이터 형식 확인이 매우 중요하며, 특히 date 컬럼이 문자열인지 datetime 타입인지 확인해야 합니다. 값은 2018년 1월 1일을 1.0으로 정규화한 상대 가격으로, 절대 가격이 다른 종목들을 동일한 기준선에서 비교할 수 있게 합니다. 예를 들어 아마존 주가가 3000달러, 애플이 150달러라도 수익률로 비교하면 공정합니다. head(10)으로 처음 10행을 보면 초기 데이터가 모두 1.0 근처인 것을 확인할 수 있으며, 시간이 지남에 따라 값이 변화하는 패턴을 관찰할 수 있습니다.
  - type: code
    language: python
    title: 미리보기
    description: 처음 10행
    content: |-
      stocks.head(10)

- id: step3_basic_line
  title: 3단계. 기본 선 그래프
  subtitle: px.line()
  blocks:
  - type: text
    content: px.line()은 시계열 데이터 시각화의 기본 도구입니다. x축에 시간(date), y축에 값(GOOG 주가)을 지정하면 시간에 따른 변화 추이를 선으로 연결하여 보여줍니다. 선 그래프는 산점도와 달리 데이터 포인트를 순서대로 선으로 연결하여 연속성을 강조하며, 추세, 계절성, 이상치를 발견하는 데 매우 효과적입니다. 주가, 매출, 웹 트래픽, 센서 데이터 등 시간에 따라 변하는 모든 데이터에 사용되며, 실무에서는 시계열 분석의 첫 단계로 선 그래프를 그려 전체적인 패턴을 파악합니다.
  - type: note
    style: tip
    title: px.line() 핵심
    content: "x축에 시간, y축에 값을 넣으면 시계열 차트가 됩니다. scatter와 달리 점을 선으로 연결합니다."
  - type: code
    language: python
    title: GOOG 주가 추이
    description: 단일 종목 선 그래프
    content: |-
      px.line(stocks, x='date', y='GOOG', title='구글 주가 추이')

- id: step4_multi_line
  title: 4단계. 다중 선 그래프
  subtitle: 여러 종목 비교
  blocks:
  - type: text
    content: 여러 종목을 한 차트에 표시하려면 데이터를 긴 형태(long format)로 변환해야 합니다. pandas의 melt() 함수는 넓은 형태(wide format)의 데이터프레임을 긴 형태로 재구조화하며, id_vars='date'는 유지할 컬럼, var_name='stock'은 종목명을 저장할 새 컬럼명, value_name='price'는 주가를 저장할 새 컬럼명을 지정합니다. 변환 후 color='stock'을 지정하면 Plotly가 각 종목을 다른 색상의 선으로 자동 구분하여 그려줍니다. 이렇게 하면 6개 종목의 수익률을 직접 비교하여 어느 종목이 더 높은 성과를 냈는지, 변동성은 어떤지를 한눈에 파악할 수 있으며, 실무에서는 여러 지표, 여러 지역, 여러 제품의 시계열을 비교할 때 동일한 방법을 사용합니다.
  - type: code
    language: python
    title: 6종목 비교
    description: 모든 종목 한 차트에
    content: |-
      stocksMelted = stocks.melt(id_vars='date', var_name='stock', value_name='price')
      px.line(stocksMelted, x='date', y='price', color='stock', title='6개 종목 주가 비교')

- id: step5_facet
  title: 5단계. 패싯 분리
  subtitle: facet_col 활용
  blocks:
  - type: text
    content: 종목별로 차트를 분리하면 각 종목의 추세를 더 명확히 볼 수 있습니다. facet_col='stock'은 stock 컬럼의 각 고유값(종목)마다 별도의 차트를 생성하여 가로로 배치하며, facet_col_wrap=3은 한 행에 최대 3개 차트를 배치한 후 다음 행으로 넘어가도록 설정합니다. 하나의 차트에 6개 선이 겹치면 개별 패턴이 흐려지지만, 패싯으로 분리하면 각 종목의 고유한 변동성과 추세를 독립적으로 분석할 수 있습니다. 실무에서는 제품별, 지역별, 고객 세그먼트별 시계열을 비교할 때 패싯을 활용하며, 특히 패턴이 크게 다른 여러 그룹을 동시에 분석할 때 필수적입니다.
  - type: code
    language: python
    title: 종목별 분리 차트
    description: facet_col로 종목 분리
    content: |-
      px.line(
          stocksMelted,
          x='date',
          y='price',
          facet_col='stock',
          facet_col_wrap=3,
          title='종목별 주가 추이'
      )

- id: step6_update_layout
  title: 6단계. 레이아웃 수정
  subtitle: update_layout()
  blocks:
  - type: text
    content: update_layout()으로 차트 크기, 범례 위치, 배경색 등을 조정하여 가독성과 전문성을 높입니다. legend 파라미터를 딕셔너리로 전달하면 범례의 방향(orientation='h'는 가로 배치), 세로 위치(yanchor='bottom', y=1.02는 차트 상단 바로 위), 가로 위치(xanchor='center', x=0.5는 중앙 정렬)를 세밀하게 제어할 수 있습니다. 범례를 차트 외부 상단에 배치하면 차트 영역을 최대한 활용하면서도 종목 구분을 명확히 할 수 있으며, xaxis_title과 yaxis_title로 축 제목을 명시하여 독자가 데이터를 쉽게 이해하도록 돕습니다. 실무에서는 회사 브랜드 가이드에 맞춰 폰트, 색상, 여백을 조정하며, 프레젠테이션용과 보고서용으로 각기 다른 레이아웃을 적용합니다.
  - type: code
    language: python
    title: 레이아웃 커스터마이징
    description: 높이, 범례 위치 조정
    content: |-
      figLayout = px.line(stocksMelted, x='date', y='price', color='stock')
      figLayout.update_layout(
          title='기술주 주가 비교 (2018-2020)',
          height=500,
          legend=dict(
              orientation='h',
              yanchor='bottom',
              y=1.02,
              xanchor='center',
              x=0.5
          ),
          xaxis_title='날짜',
          yaxis_title='상대 가격'
      )
      figLayout

- id: step7_update_traces
  title: 7단계. 트레이스 수정
  subtitle: update_traces()
  blocks:
  - type: text
    content: update_traces()로 선 스타일을 변경합니다. 선 두께, 점 표시 여부 등을 조정합니다.
  - type: note
    style: tip
    title: update_traces() 핵심
    content: "모든 트레이스(선)의 스타일을 한번에 변경합니다. line_width로 두께, mode로 선+점 표시를 설정합니다."
  - type: code
    language: python
    title: 선 스타일 변경
    description: 선 두께, 점 표시
    content: |-
      figTraces = px.line(stocksMelted, x='date', y='price', color='stock')
      figTraces.update_traces(
          line=dict(width=2),
          mode='lines+markers',
          marker=dict(size=3)
      )
      figTraces.update_layout(title='선 스타일 커스터마이징')
      figTraces

- id: step8_template
  title: 8단계. 템플릿 적용
  subtitle: 차트 테마 변경
  blocks:
  - type: text
    content: template으로 차트 전체 테마를 변경합니다. plotly_dark는 어두운 배경의 금융 차트 스타일입니다.
  - type: note
    style: tip
    title: template 종류
    content: "plotly, plotly_white, plotly_dark, ggplot2, seaborn, simple_white 등이 있습니다. 금융 차트는 plotly_dark가 인기있습니다."
  - type: code
    language: python
    title: 다크 테마 적용
    description: 금융 차트 스타일
    content: |-
      figDark = px.line(
          stocksMelted,
          x='date',
          y='price',
          color='stock',
          template='plotly_dark',
          title='기술주 주가 (다크 테마)'
      )
      figDark

- id: step9_subplots
  title: 9단계. 서브플롯 생성
  subtitle: make_subplots()
  blocks:
  - type: text
    content: make_subplots()로 여러 개의 차트를 하나의 Figure에 배치하여 종합 대시보드를 만듭니다. rows=2, cols=3으로 2행 3열 격자를 정의하고, subplot_titles로 각 서브플롯의 제목(종목명)을 리스트로 지정합니다. enumerate()와 인덱스 계산(row = i // 3 + 1, col = i % 3 + 1)으로 반복문 내에서 각 종목의 차트를 올바른 위치에 배치하며, go.Scatter는 px.line보다 세밀한 제어가 가능한 저수준 객체입니다. 이렇게 하면 6개 종목을 격자 형태로 나란히 배치하여 한 화면에서 모든 종목의 추이를 비교할 수 있으며, 실무에서는 다양한 지표, 다양한 시점, 다양한 관점의 차트를 하나의 대시보드로 통합하여 의사결정을 지원합니다.
  - type: code
    language: python
    title: 2x3 서브플롯
    description: 종목별 개별 차트
    content: |-
      stockList = ['GOOG', 'AAPL', 'AMZN', 'FB', 'NFLX', 'MSFT']

      figSubplots = make_subplots(rows=2, cols=3, subplot_titles=stockList)

      for i, stock in enumerate(stockList):
          row = i // 3 + 1
          col = i % 3 + 1
          figSubplots.add_trace(
              go.Scatter(x=stocks['date'], y=stocks[stock], name=stock, mode='lines'),
              row=row, col=col
          )

      figSubplots.update_layout(height=600, title_text='종목별 주가 추이')
      figSubplots

- id: step10_subplots_styled
  title: 10단계. 스타일링된 서브플롯
  subtitle: 템플릿 + 서브플롯
  blocks:
  - type: text
    content: 서브플롯에도 템플릿과 레이아웃 설정을 적용하여 전문적인 대시보드를 완성합니다. 각 종목마다 고유한 색상(colors 리스트)을 지정하여 시각적 구분을 명확히 하고, line=dict(color=colors[i], width=2)로 선 색상과 두께를 개별 제어합니다. template='plotly_dark'는 어두운 배경의 금융 차트 스타일을 적용하여 선이 더 선명하게 보이도록 하며, showlegend=False는 각 서브플롯에 제목이 있어 범례가 불필요하므로 공간을 절약합니다. vertical_spacing=0.12는 행 간격을 조정하여 차트들이 너무 붙지 않도록 하며, 실무에서는 이처럼 색상, 템플릿, 간격을 세밀하게 조정하여 브랜드 정체성을 반영하고 가독성을 극대화합니다.
  - type: code
    language: python
    title: 스타일 적용 서브플롯
    description: 다크 테마 + 커스텀 레이아웃
    content: |-
      colors = ['#00D4FF', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7']

      figStyled = make_subplots(rows=2, cols=3, subplot_titles=stockList, vertical_spacing=0.12)

      for i, stock in enumerate(stockList):
          row = i // 3 + 1
          col = i % 3 + 1
          figStyled.add_trace(
              go.Scatter(
                  x=stocks['date'],
                  y=stocks[stock],
                  name=stock,
                  mode='lines',
                  line=dict(color=colors[i], width=2)
              ),
              row=row, col=col
          )

      figStyled.update_layout(
          height=600,
          title_text='기술주 주가 비교 대시보드',
          template='plotly_dark',
          showlegend=False
      )
      figStyled

- id: step11_result
  title: 11단계. 최종 결과물
  subtitle: 다중 주식 비교 차트
  blocks:
  - type: text
    content: 모든 개념을 종합한 최종 비교 차트입니다. 정규화된 가격으로 수익률을 비교합니다.
  - type: code
    language: python
    title: 최종 비교 차트
    description: 수익률 기반 비교
    content: |-
      figFinal = make_subplots(
          rows=2, cols=1,
          subplot_titles=['주가 추이 비교', '종목별 개별 추이'],
          row_heights=[0.6, 0.4],
          vertical_spacing=0.15
      )

      for i, stock in enumerate(stockList):
          figFinal.add_trace(
              go.Scatter(
                  x=stocks['date'],
                  y=(stocks[stock] - 1) * 100,
                  name=stock,
                  mode='lines',
                  line=dict(width=2)
              ),
              row=1, col=1
          )

      for i, stock in enumerate(stockList):
          figFinal.add_trace(
              go.Scatter(
                  x=stocks['date'],
                  y=stocks[stock],
                  name=stock,
                  mode='lines',
                  line=dict(width=1),
                  showlegend=False
              ),
              row=2, col=1
          )

      figFinal.update_layout(
          height=800,
          title_text='기술주 시계열 분석 대시보드',
          template='plotly_dark',
          legend=dict(orientation='h', yanchor='bottom', y=1.02, xanchor='center', x=0.5)
      )
      figFinal.update_yaxes(title_text='수익률 (%)', row=1, col=1)
      figFinal.update_yaxes(title_text='상대 가격', row=2, col=1)
      figFinal

- id: practice
  title: 실습
  subtitle: 주식 분석 프로젝트
  blocks:
  - type: text
    content: 배운 내용으로 주식 시계열 분석을 해봅시다. 각 미션은 템플릿 변경, 패싯 활용, 레이아웃 커스터마이징, 서브플롯 비교 등 실전에서 자주 사용하는 기법들을 종합합니다. 완성하면 다양한 스타일의 시계열 차트를 만들고, 여러 종목을 효과적으로 비교 분석할 수 있게 되며, 실무 금융 대시보드 제작에 필요한 모든 스킬을 갖추게 됩니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: AAPL vs MSFT 비교 차트"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import plotly.express as px
        import pandas as pd

        priceData = px.data.stocks()
        twoStock = priceData.melt(id_vars='date', value_vars=['AAPL', 'MSFT'], var_name='stock', value_name='price')
    - type: code
      title: "차트 생성"
      content: |-
        chart = px.line(twoStock, x='date', y='price', color='stock', template='simple_white', title='AAPL vs MSFT')
        chart.update_traces(line=dict(width=3))
        chart
  - type: expansion
    title: "미션2: 종목별 패싯 차트"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import plotly.express as px
        import pandas as pd

        allStock = px.data.stocks()
        meltedStock = allStock.melt(id_vars='date', var_name='stock', value_name='price')
    - type: code
      title: "차트 생성"
      content: |-
        canvas = px.line(
            meltedStock,
            x='date',
            y='price',
            facet_col='stock',
            facet_col_wrap=3,
            template='plotly_dark',
            title='종목별 패싯 차트'
        )
        canvas.update_layout(height=500)
        canvas

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Plotly 주식 시계열 분석을 배웠습니다. px.line으로 시계열 기본을 익히고, 데이터 변환(melt)과 패싯으로 다중 종목 비교를 마스터했으며, update_layout과 update_traces로 세밀한 스타일링을 구현했습니다. 특히 template을 활용한 테마 변경과 make_subplots를 통한 대시보드 구성은 실무 금융 분석에서 필수적인 기술이며, 이 개념들은 주식뿐 아니라 매출, 트래픽, 센서 데이터 등 모든 시계열 분석에 동일하게 적용됩니다.
  - type: list
    items:
    - "px.line() - 시계열 선 그래프"
    - "facet_col - 종목별 분리 차트"
    - "update_layout() - 레이아웃 커스터마이징"
    - "update_traces() - 선 스타일 변경"
    - "template - 차트 테마 적용"
    - "make_subplots() - 여러 차트 배치"
  - type: text
    content: 다음 시간에는 모든 개념을 종합한 대시보드 프로젝트를 진행합니다.
