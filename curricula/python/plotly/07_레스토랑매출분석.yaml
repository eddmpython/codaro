        rows=2, cols=2,
        subplot_titles=[
            '요일별 평균 팁',
            '시간대별 팁 분포',
            '성별 팁 비교',
            '결제금액-팁 관계'
        ],
        specs=[
            [{'type': 'xy'}, {'type': 'xy'}],
            [{'type': 'xy'}, {'type': 'xy'}]
        ]
    )

    tipsByDay = tips.groupby('day', as_index=False)['tip'].mean()
    dashboard.add_trace(
        go.Bar(x=tipsByDay['day'], y=tipsByDay['tip'], marker_color='steelblue'),
        row=1, col=1
    )

    for time in ['Lunch', 'Dinner']:
        timeData = tips[tips['time'] == time]['tip']
        dashboard.add_trace(
            go.Box(y=timeData, name=time),
            row=1, col=2
        )

    for sex in ['Male', 'Female']:
        sexData = tips[tips['sex'] == sex]['tip']
        dashboard.add_trace(
            go.Box(y=sexData, name=sex),
            row=2, col=1
        )

    dashboard.add_trace(
        go.Histogram2d(
            x=tips['total_bill'],
            y=tips['tip'],
            nbinsx=20,
            nbinsy=20,
            colorscale='Blues'
        ),
        row=2, col=2
    )

    dashboard.update_layout(
