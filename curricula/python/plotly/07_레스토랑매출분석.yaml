- id: step9_layout_polish
  title: 9단계. 레이아웃 다듬기
  structuredPrimary: true
  subtitle: update_layout 심화 (반복)
  goal: 9단계. 레이아웃 다듬기에서 인터랙티브 시각화 흐름을 코드로 실행하고 결과를 확인한다.
  why: 인터랙티브 차트는 사용자가 직접 데이터를 탐색할 수 있는 분석 화면을 만듭니다.
  explanation: 대시보드에 배경색, 폰트, 여백 등을 추가하여 전문성과 가독성을 높입니다. 기본 스타일만으로는 브랜드 정체성을 표현하거나 프레젠테이션용으로 사용하기 어렵기
    때문입니다. title을 딕셔너리 형태로 지정하여 텍스트, 가로 정렬(x=0.5, 중앙), 폰트 크기를 한번에 설정하며, 문자열 대신 딕셔너리로 전달하면 더 많은 옵션을 제어할
    수 있습니다. plot_bgcolor는 차트 영역(그래프 내부)의 배경색, paper_bgcolor는 전체 캔버스(차트 외부 여백 포함)의 배경색입니다. font로 전체 폰트
    패밀리(Arial, Helvetica 등)와 기본 크기를 지정하고, margin으로 상하좌우(t, b, l, r) 여백을 픽셀 단위로 조정합니다. update_xaxes와 update_yaxes는
    모든 서브플롯의 축에 일괄 적용되며, showgrid=True, gridcolor='lightgray'로 격자선을 추가하면 눈금을 따라 값을 읽기 쉬워집니다. 실무에서는 회사
    브랜드 컬러를 배경색에 적용하고, 공식 폰트를 사용하며, 프레젠테이션 템플릿에 맞춘 여백을 설정하여 일관성 있는 전문적인 대시보드를 제작합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    dashboard.update_layout(
        title={
            'text': '레스토랑 팁 분석 대시보드',
            'x': 0.5,
            'font': {'size': 20}
        },
        plot_bgcolor='white',
        paper_bgcolor='#f8f9fa',
        font={'family': 'Arial', 'size': 12},
        margin={'t': 100, 'b': 50, 'l': 50, 'r': 50}
    )
    dashboard.update_xaxes(showgrid=True, gridcolor='lightgray')
    dashboard.update_yaxes(showgrid=True, gridcolor='lightgray')
    dashboard
  exercise:
