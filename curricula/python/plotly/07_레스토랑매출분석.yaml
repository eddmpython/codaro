  explanation: 대시보드는 차트 여러 개를 붙였다고 끝나지 않습니다. 실무에서는 핵심 지표가 빠지지 않았는지, trace 수와 타입이 맞는지, 분석 기준을 바꿔도 결과가 말이
    되는지 확인해야 합니다. 이번 단계에서는 매출이 가장 높은 요일과 시간대를 먼저 예상합니다. 그다음 일부 trace가 빠진 대시보드를 일부러 실패시킨 뒤, 완성 대시보드의 trace
    타입과 데이터 구성을 검증합니다.
