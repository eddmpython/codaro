    requiredColumns = {"total_bill", "tip", "day", "time", "sex", "smoker", "size"}
    missingColumns = requiredColumns - set(tips.columns)
    if missingColumns:
        raise ValueError(f"tips 데이터에 필요한 컬럼이 없습니다: {sorted(missingColumns)}")

    revenueByDay = (
        tips.groupby("day", as_index=False)["total_bill"]
        .sum()
        .sort_values("total_bill", ascending=False)
    )
    revenueByTime = (
        tips.groupby("time", as_index=False)["total_bill"]
        .sum()
        .sort_values("total_bill", ascending=False)
    )

    bestRevenueDay = revenueByDay.iloc[0]["day"]
    bestRevenueTime = revenueByTime.iloc[0]["time"]

