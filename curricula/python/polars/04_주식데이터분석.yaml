          pl.col("dailyReturn").cum_sum().alias("cumReturn")
      )
      final.tail(10)
    hints:
    - 10단계. 누적 수익률 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
