intro:
  direction: Polars소개에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - Polars소개 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 업무 흐름 검증 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 핵심 처리 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 출력과 상태 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: Polars소개 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: polars 기준으로 로컬 Python 실행을 준비합니다.
    - label: Polars소개 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: Polars소개 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
