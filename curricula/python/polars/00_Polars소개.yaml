    - emoji: 🔗
      title: join
      description: 테이블 결합
- id: lazy_vs_eager
  blocks:
  - type: sectionHeader
    title: 💤 Lazy vs Eager
    subtitle: 두 가지 실행 모드
  - type: compare
    left:
      title: Eager Mode
      subtitle: 즉시 실행
      icon: ▶️
      color: blue
      items:
      - 코드 작성 즉시 실행
      - 결과 바로 확인
      - 디버깅에 편리
      - 소규모 데이터에 적합
      infoBox: pl.read_csv()
    right:
      title: Lazy Mode
      subtitle: 최적화 후 실행
      icon: 💤
      color: green
      items:
      - collect() 호출 시 실행
      - 쿼리 플랜 최적화
      - 불필요한 연산 제거
      - 대용량 데이터에 최적
