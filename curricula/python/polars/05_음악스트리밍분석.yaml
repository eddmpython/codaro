  - type: code
    language: python
    title: 주문 데이터와 입력 검증
    description: 필수 컬럼, 수량, 단가 조건을 로컬에서 검증합니다.
    content: |-
      import polars as pl

      orderFrame = pl.DataFrame({
          "orderId": [1001, 1002, 1003, 1004, 1005, 1006],
          "channel": ["web", "store", "web", "partner", "store", "web"],
          "quantity": [3, 2, 5, 1, 4, 2],
          "unitPrice": [12000, 18000, 9000, 40000, 15000, 22000],
          "refund": [0, 0, 1, 0, 0, 0],
      })

      def validateOrderFrame(frame: pl.DataFrame) -> bool:
          requiredColumns = {"orderId", "channel", "quantity", "unitPrice", "refund"}
          missingColumns = requiredColumns - set(frame.columns)
          if missingColumns:
              raise ValueError(f"필수 컬럼 누락: {sorted(missingColumns)}")
          if frame.select((pl.col("quantity") <= 0).any()).item():
              raise ValueError("quantity는 0보다 커야 합니다.")
          if frame.select((pl.col("unitPrice") <= 0).any()).item():
              raise ValueError("unitPrice는 0보다 커야 합니다.")
          return True

      validateOrderFrame(orderFrame)
      orderFrame
  - type: code
    language: python
    title: 예측 후 채널별 매출 집계
    description: store 채널이 가장 클 것이라고 예측하고 집계로 확인합니다.
    content: |-
      # 예측: store는 주문 수는 적지만 단가가 높아 순매출 1위일 가능성이 큽니다.
      expectedTopChannel = "store"
      revenueByChannel = (
          orderFrame
          .with_columns((pl.col("quantity") * pl.col("unitPrice") * (1 - pl.col("refund"))).alias("netRevenue"))
          .group_by("channel")
          .agg([
              pl.len().alias("orders"),
              pl.sum("netRevenue").alias("netRevenue"),
              pl.mean("quantity").round(2).alias("avgQuantity"),
          ])
          .sort("netRevenue", descending=True)
      )

      topChannel = revenueByChannel.row(0, named=True)["channel"]
      revenueByChannel
  - type: code
    language: python
    title: 실패 입력을 잡는 오류 처리
    description: 수량이 0인 주문을 검증 함수가 거부하는지 확인합니다.
    content: |-
      brokenOrderFrame = orderFrame.with_columns(
          pl.when(pl.col("orderId") == 1001).then(0).otherwise(pl.col("quantity")).alias("quantity")
      )

      try:
          validateOrderFrame(brokenOrderFrame)
      except ValueError as exc:
          validationMessage = str(exc)

      assert "quantity" in validationMessage
      validationMessage
  - type: code
    language: python
    title: 업무 기준 검증
    description: 집계 결과가 보고서에 들어갈 수 있는 상태인지 assert로 확인합니다.
    content: |-
      pipelineChecks = {
          "top_channel_matches_prediction": topChannel == expectedTopChannel,
          "net_revenue_positive": revenueByChannel.select((pl.col("netRevenue") > 0).all()).item(),
          "all_channels_present": revenueByChannel.height == orderFrame.select(pl.col("channel").n_unique()).item(),
          "refund_removed_from_revenue": revenueByChannel.filter(pl.col("channel") == "web").row(0, named=True)["netRevenue"] == 80000,
      }

      assert all(pipelineChecks.values()), pipelineChecks
      pipelineChecks
