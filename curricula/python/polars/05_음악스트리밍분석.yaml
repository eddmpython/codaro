  explanation: 아티스트별 평균 인기도를 계산합니다. 이전에 배운 group_by와 mean을 복습하며, sort로 내림차순 정렬하면 가장 인기 있는 아티스트 순으로 볼 수 있습니다. 꾸준히 높은 인기도를 유지하는
    아티스트가 상위에 위치합니다.
