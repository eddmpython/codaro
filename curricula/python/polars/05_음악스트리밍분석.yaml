      ).filter(pl.col("artistRank") == 1).sort("track_popularity", descending=True).head(10)
    hints:
    - 11단계. 그룹 내 순위 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
