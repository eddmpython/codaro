- id: step8_over
  title: 8단계. 윈도우 함수 소개
  structuredPrimary: true
  subtitle: over()
  goal: '8단계. 윈도우 함수 소개: 실행 가능한 Python 흐름으로 익힌다.'
  why: '8단계. 윈도우 함수 소개: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    over()는 이번 프로젝트의 핵심 개념입니다. group_by()는 그룹별 통계를 계산하지만 행 수가 줄어듭니다(그룹 개수만큼만 남음). 하지만 때로는 "그룹별 평균을 계산하되, 원본 데이터는 그대로 유지"하고 싶을 때가 있습니다. over()는 이 문제를 해결합니다. pl.col("값").mean().over("그룹")은 그룹별 평균을 계산한 후 그 값을 해당 그룹의 모든 행에 붙여줍니다. SQL의 윈도우 함수(Window Function)와 동일한 개념으로, 매우 강력한 기능입니다.

    over("그룹")은 그룹별 계산을 하되 행 수를 유지합니다. group_by()는 그룹 개수만큼 행이 줄지만, over()는 원본 행 수 그대로 유지하면서 각 행에 그룹 통계를 추가합니다. "개별 값과 그룹 평균을 동시에 보고 싶을 때" 필수적인 기능입니다.
  tips:
  - over("그룹")은 그룹별 계산을 하되 행 수를 유지합니다. group_by()는 그룹 개수만큼 행이 줄지만, over()는 원본 행 수 그대로 유지하면서 각 행에 그룹 통계를 추가합니다. "개별 값과 그룹 평균을
    동시에 보고 싶을 때" 필수적인 기능입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    spotify.select(
        "track_name",
        "playlist_genre",
        "track_popularity",
        pl.col("track_popularity").mean().over("playlist_genre").alias("genreAvg")
    ).head(10)
  exercise:
    prompt: '8단계. 윈도우 함수 소개: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
