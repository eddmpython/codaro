    - pl.col("값").mean().over("그룹") - 그룹별 계산 (행 유지)
    - pl.col("값").rank().over("그룹") - 그룹 내 순위
  - type: text
    content: 다음 시간에는 부동산 데이터로 조건부 변환(when-then)과 조인을 배웁니다.
