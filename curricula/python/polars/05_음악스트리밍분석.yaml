      그대로 유지"하고 싶을 때가 있습니다. over()는 이 문제를 해결합니다. pl.col("값").mean().over("그룹")은 그룹별 평균을 계산한 후 그 값을 해당 그룹의 모든 행에 붙여줍니다. SQL의
