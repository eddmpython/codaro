    수 있습니다. 다중 정렬도 가능하여 ["genre", "rating"]으로 정렬하면 "장르별로 그룹화되고, 각 장르 내에서는 평점 순"으로 정렬됩니다. tail()은 하위 N개를
    추출합니다. 정렬은 데이터 탐색과 리포트 생성에 필수적이며, 상위/하위 항목을 찾는 것은 의사결정에 직접 활용됩니다. 실무에서는 "Top 10 고객", "하위 5% 제품" 같은
