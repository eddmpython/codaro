        pl.col("boxOffice").sum().alias("totalRevenue"),
        pl.col("boxOffice").mean().alias("avgRevenue"),
        pl.col("rating").mean().alias("avgRating"),
        pl.len().alias("movieCount")
    ]).sort("totalRevenue", descending=True)
    genreStats
