meta:
  id: polars_01
  title: 영화평점분석
  order: 1
  category: polars
  difficulty: "⭐"
  badge: 입문
  tags: ["IMDB", "read_csv", "select", "filter", "group_by", "mean", "DataFrame"]
  seo:
    title: "Polars 입문 - 영화 평점 데이터 분석"
    description: "IMDB 영화 데이터로 장르별 평균 평점을 분석합니다. pl.read_csv, select, filter, group_by, mean 사용법을 배웁니다."
    keywords: ["polars", "pl.read_csv", "select", "filter", "group_by", "mean", "영화분석"]

intro:
  emoji: "🎬"
  goal: 장르별 평균 평점을 DataFrame으로 분석합니다.
  description: IMDB 영화 데이터로 Polars 기본 문법을 익힙니다. 데이터 로드 → 탐색 → 집계 → 결과 확인의 흐름을 경험합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import polars as pl
  blocks:
  - type: text
    content: Polars는 pandas와 유사한 DataFrame 라이브러리지만, 성능에 특화되어 있습니다. Rust 언어로 작성되어 메모리 효율이 뛰어나고 병렬 처리를 기본으로 지원합니다. pl이라는 짧은 이름으로 불러와서 사용하는 것이 관례입니다. pandas가 pd인 것처럼 Polars는 pl로 시작합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: polars를 pl로 불러옵니다
    content: |-
      import polars as pl
  - type: tip
    content: "import polars as pl은 Polars의 표준 관례입니다. pandas의 pd처럼 짧게 사용하여 pl.read_csv(), pl.col() 등의 함수를 호출합니다. Polars는 Rust 기반으로 pandas보다 10~100배 빠르며, 메모리 사용량도 적습니다."

- id: step2_load
  title: 2단계. 데이터 불러오기
  subtitle: pl.read_csv()
  blocks:
  - type: text
    content: IMDB(Internet Movie Database) 영화 데이터를 불러옵니다. 이 데이터셋에는 2006년부터 2016년까지의 인기 영화 1000개에 대한 정보가 포함되어 있습니다. 영화 제목, 장르, 감독, 배우, 평점, 수익 등 다양한 정보를 담고 있어 데이터 분석 연습에 적합합니다. pl.read_csv()는 CSV 파일을 읽어 Polars DataFrame으로 변환합니다. pandas의 pd.read_csv()와 사용법이 거의 동일하지만, 내부적으로는 훨씬 빠른 성능을 제공합니다.
  - type: code
    language: python
    title: 데이터 로드
    description: pl.read_csv로 CSV 파일을 불러옵니다
    content: |-
      baseUrl = "https://raw.githubusercontent.com"
      movies = pl.read_csv(f"{baseUrl}/LearnDataSci/articles/master/Python%20Pandas%20Tutorial%20A%20Complete%20Introduction%20for%20Beginners/IMDB-Movie-Data.csv")
  - type: tip
    content: "pl.read_csv()는 CSV 파일을 DataFrame으로 변환합니다. URL이나 로컬 파일 경로 모두 지원하며, pandas와 달리 자동으로 멀티스레드를 활용하여 큰 파일도 빠르게 읽습니다. f-string으로 URL을 조합하면 가독성이 좋아집니다."

- id: step3_schema
  title: 3단계. 스키마 확인
  subtitle: schema
  blocks:
  - type: text
    content: 스키마(schema)는 DataFrame의 설계도입니다. 각 컬럼의 이름과 데이터 타입이 무엇인지 한눈에 보여줍니다. 데이터 분석을 시작할 때는 어떤 컬럼이 있고, 각 컬럼이 숫자인지 문자인지 날짜인지 파악하는 것이 중요합니다. Polars는 Int64(정수), Float64(실수), Utf8(문자열) 등 명확한 타입 시스템을 가지고 있어 타입 관련 오류를 미리 방지할 수 있습니다.
  - type: code
    language: python
    title: 스키마 확인
    description: 컬럼명과 데이터 타입을 확인합니다
    content: |-
      movies.schema
  - type: tip
    content: "schema는 딕셔너리 형태로 {컬럼명: 타입}을 반환합니다. pandas의 dtypes와 비슷하지만 더 읽기 쉬운 형태입니다. Polars는 타입을 명확히 구분하여 Int64(64비트 정수), Float64(64비트 실수), Utf8(문자열), Date(날짜) 등으로 표시합니다."

- id: step4_preview
  title: 4단계. 데이터 미리보기
  subtitle: head()
  blocks:
  - type: text
    content: head() 메서드로 데이터의 처음 몇 행을 확인합니다. 전체 데이터를 다 보면 너무 길기 때문에 대표적인 샘플만 보는 것입니다. 기본적으로 5행을 보여주며, head(10)처럼 괄호 안에 숫자를 넣으면 원하는 개수만큼 볼 수 있습니다. 데이터의 실제 값들을 보면서 각 컬럼이 어떤 정보를 담고 있는지 감을 잡을 수 있습니다.
  - type: code
    language: python
    title: 미리보기
    description: 처음 5행을 확인합니다
    content: |-
      movies.head()
  - type: tip
    content: "head()는 기본적으로 5행을 보여줍니다. head(10)처럼 숫자를 넣으면 원하는 개수만큼 확인할 수 있습니다. 반대로 tail()을 사용하면 마지막 행부터 볼 수 있습니다. 데이터 탐색의 첫 단계로 자주 사용됩니다."

- id: step5_select
  title: 5단계. 필요한 컬럼 선택
  subtitle: select, pl.col
  blocks:
  - type: text
    content: 데이터에 너무 많은 컬럼이 있으면 분석이 복잡해집니다. select()로 필요한 컬럼만 골라서 작업할 수 있습니다. Polars에서는 pl.col()이라는 표현식(expression)을 사용하여 컬럼을 지정합니다. 이것은 Polars의 핵심 개념으로, 단순히 컬럼을 선택하는 것뿐만 아니라 나중에 다양한 연산과 변환에도 사용됩니다. pandas의 df["Title"]과 비슷하지만 더 강력하고 유연한 기능을 제공합니다.
  - type: code
    language: python
    title: 컬럼 선택
    description: select로 필요한 컬럼만 가져옵니다
    content: |-
      movies.select(
          pl.col("Title"),
          pl.col("Genre"),
          pl.col("Rating")
      )
  - type: tip
    content: "pl.col()은 Polars의 핵심 표현식입니다. 컬럼을 참조하는 것뿐만 아니라 나중에 필터링, 변환, 집계 등 모든 작업에 사용됩니다. select() 안에 여러 pl.col()을 나열하면 해당 컬럼들만 선택한 새로운 DataFrame을 반환합니다. 원본은 변경되지 않습니다."

- id: step6_filter
  title: 6단계. 조건 필터링
  subtitle: filter
  blocks:
  - type: text
    content: 모든 영화를 분석하는 것보다 특정 조건에 맞는 영화만 선택하는 것이 더 의미 있을 때가 많습니다. filter()는 조건에 맞는 행만 추출하는 함수입니다. 여기서는 평점 7.0 이상인 고평점 영화만 선택합니다. pandas의 불린 인덱싱(df[df["Rating"] >= 7.0])과 비슷하지만, Polars는 filter() 메서드로 더 명확하게 표현합니다. shape 속성으로 필터링 결과 몇 개의 행이 남았는지 확인할 수 있습니다.
  - type: code
    language: python
    title: 필터링
    description: 평점 7.0 이상 영화만 선택합니다
    content: |-
      highRated = movies.filter(pl.col("Rating") >= 7.0)
      highRated.shape
  - type: tip
    content: "filter()는 조건에 맞는 행만 남깁니다. pl.col(\"컬럼명\") >= 값 형태로 조건을 작성하며, >=, <=, ==, != 등의 비교 연산자를 사용합니다. shape로 (행 수, 열 수)를 확인할 수 있습니다. pandas의 df[조건]보다 읽기 쉽고 메서드 체이닝에 적합합니다."

- id: step7_genre
  title: 7단계. 장르 분리하기
  subtitle: 문자열 처리와 with_columns
  blocks:
  - type: text
    content: 실제 데이터는 깔끔하지 않은 경우가 많습니다. 이 데이터의 Genre 컬럼은 "Action,Adventure,Sci-Fi"처럼 여러 장르가 쉼표로 연결되어 있습니다. 분석을 위해 주요 장르 하나만 추출하겠습니다. str.split(",")으로 쉼표 기준으로 문자열을 나누고, list.first()로 첫 번째 값만 가져옵니다. with_columns()는 새로운 컬럼을 추가하는 메서드이며, alias()로 새 컬럼의 이름을 지정합니다. 이것은 Polars의 메서드 체이닝(method chaining) 스타일입니다.
  - type: code
    language: python
    title: 주요 장르 추출
    description: 쉼표로 분리 후 첫 번째 장르 선택
    content: |-
      moviesWithGenre = movies.with_columns(
          pl.col("Genre").str.split(",").list.first().alias("MainGenre")
      )
      moviesWithGenre.select("Title", "Genre", "MainGenre", "Rating").head()
  - type: tip
    content: "str.split()은 문자열을 나누어 리스트로 만들고, list.first()는 리스트의 첫 번째 요소를 가져옵니다. with_columns()는 기존 DataFrame에 새 컬럼을 추가하며, alias()로 컬럼명을 지정합니다. 이러한 메서드 체이닝은 Polars의 핵심 스타일입니다."

- id: step8_groupby
  title: 8단계. 장르별 평균 계산
  subtitle: group_by와 agg
  blocks:
  - type: text
    content: 이제 프로젝트의 핵심 목표인 "장르별 평균 평점"을 계산합니다. group_by()는 지정한 컬럼의 값이 같은 행들을 하나의 그룹으로 묶습니다. 예를 들어 MainGenre가 "Action"인 모든 영화를 하나의 그룹으로, "Comedy"인 영화를 또 다른 그룹으로 묶는 것입니다. agg()는 각 그룹에 대해 집계 함수를 적용합니다. mean()으로 평균을 구하고, alias()로 결과 컬럼명을 "AvgRating"으로 지정합니다. sort()로 평균 평점이 높은 순으로 정렬하여 어떤 장르의 평점이 가장 높은지 확인합니다.
  - type: code
    language: python
    title: 장르별 평균 평점
    description: group_by로 그룹화하고 mean으로 평균 계산
    content: |-
      genreRating = moviesWithGenre.group_by("MainGenre").agg(
          pl.col("Rating").mean().alias("AvgRating")
      ).sort("AvgRating", descending=True)
      genreRating
  - type: tip
    content: "group_by(\"컬럼\")은 해당 컬럼 값이 같은 행끼리 그룹을 만듭니다. agg() 안에 집계 함수를 넣어 각 그룹별 통계를 계산합니다. mean()(평균), sum()(합계), count()(개수), max()(최대), min()(최소) 등을 사용할 수 있습니다. sort(descending=True)로 내림차순 정렬합니다."

- id: step9_result
  title: 9단계. 결과 확인
  subtitle: DataFrame 출력
  blocks:
  - type: text
    content: 정렬된 DataFrame 결과를 확인합니다. 평균 평점이 높은 순으로 장르가 나열됩니다.
  - type: code
    language: python
    title: 결과 DataFrame 확인
    description: 장르별 평균 평점 결과 확인
    content: |-
      genreRating

- id: step10_final
  title: 10단계. 추가 분석
  subtitle: 여러 집계 동시에
  blocks:
  - type: text
    content: agg() 안에 여러 집계 함수를 리스트로 전달하면 한 번에 여러 통계를 계산할 수 있습니다. 장르별 평균 평점뿐만 아니라 해당 장르의 영화가 몇 개인지도 함께 확인하면 더 의미 있는 분석이 됩니다. 예를 들어 평균 평점이 높아도 영화가 1개뿐이면 신뢰도가 낮을 수 있습니다. count()로 각 장르의 영화 개수를 세고, mean()으로 평균 평점을 구합니다. 이렇게 여러 지표를 함께 보면 데이터를 더 정확하게 이해할 수 있습니다.
  - type: code
    language: python
    title: 장르별 통계
    description: 평균 평점과 영화 개수를 함께 확인
    content: |-
      genreStats = moviesWithGenre.group_by("MainGenre").agg([
          pl.col("Rating").mean().alias("AvgRating"),
          pl.col("Rating").count().alias("MovieCount")
      ]).sort("AvgRating", descending=True)
      genreStats
  - type: tip
    content: "agg() 안에 여러 집계를 리스트로 묶으면 한 번에 여러 통계를 계산합니다. 각 집계마다 alias()로 의미 있는 컬럼명을 지정하세요. 이렇게 하면 평균, 개수, 합계 등을 동시에 구할 수 있어 효율적입니다."

- id: practice
  title: 실습
  subtitle: IMDB 영화 데이터 분석 프로젝트
  blocks:
  - type: text
    content: 지금까지 배운 select, filter, group_by, mean을 활용하여 다양한 분석을 해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 2015년 이후 액션 영화 감독별 평균 평점"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        srcUrl = "https://raw.githubusercontent.com"
        imdb = pl.read_csv(f"{srcUrl}/LearnDataSci/articles/master/Python%20Pandas%20Tutorial%20A%20Complete%20Introduction%20for%20Beginners/IMDB-Movie-Data.csv")
    - type: code
      title: "필터링 및 집계"
      content: |-
        directorStats = imdb.filter(
            (pl.col("Year") >= 2015) & (pl.col("Genre").str.contains("Action"))
        ).group_by("Director").agg(
            pl.col("Rating").mean().alias("AvgRating"),
            pl.col("Title").count().alias("MovieCount")
        ).filter(pl.col("MovieCount") >= 2).sort("AvgRating", descending=True)
        directorStats
  - type: expansion
    title: "미션2: 연도별 평균 평점과 영화 수 추이"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        csvUrl = "https://raw.githubusercontent.com"
        film = pl.read_csv(f"{csvUrl}/LearnDataSci/articles/master/Python%20Pandas%20Tutorial%20A%20Complete%20Introduction%20for%20Beginners/IMDB-Movie-Data.csv")
    - type: code
      title: "연도별 집계"
      content: |-
        yearlyStats = film.group_by("Year").agg(
            pl.col("Rating").mean().alias("AvgRating"),
            pl.col("Rating").count().alias("MovieCount"),
            pl.col("Revenue (Millions)").mean().alias("AvgRevenue")
        ).sort("Year")
        yearlyStats

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Polars로 첫 데이터 분석을 완료했습니다.
  - type: list
    items:
    - "pl.read_csv() - CSV 파일 읽기"
    - "schema - 컬럼명과 타입 확인"
    - "select(pl.col()) - 원하는 컬럼 선택"
    - "filter(조건) - 조건에 맞는 행 필터링"
    - "group_by().agg() - 그룹별 집계"
    - "mean() - 평균 계산"
  - type: text
    content: 다음 시간에는 날씨 데이터로 with_columns와 날짜 처리를 배웁니다.
