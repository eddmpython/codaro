meta:
  id: "xlwings01"
  title: "xlwings란"
  order: 1
  category: "excel"
  tags: ["xlwings", "엑셀자동화", "파이썬"]
  seo:
    title: "xlwings란? - 파이썬으로 엑셀 자동화하기"
    description: "xlwings로 파이썬과 엑셀을 연결하세요. VBA 없이 파이썬으로 엑셀을 제어하고 업무를 자동화할 수 있습니다."
    keywords: ["xlwings", "엑셀 자동화", "파이썬 엑셀", "Excel Python", "업무 자동화"]

sections:
  - id: "whatIsXlwings"
    title: "xlwings 소개"
    blocks:
      - type: mainHeader
        emoji: "📊"
        title: "xlwings?? 엑셀을 파이썬으로 조종한다고??"
        subtitle: "엑셀과 파이썬의 만남, 업무 자동화의 혁신!"
        gradient: "from-green-600 via-blue-600 to-purple-600"

      - type: video
        platform: youtube
        videoId: "amCCEbJ39W8"
        autoplay: true

      - type: hero
        emoji: "💫"
        title: "xlwings는 엑셀과 파이썬을 완벽하게 연결해주는 브릿지예요!"
        subtitle: "복잡한 엑셀 작업을 파이썬으로 자동화하고, 실시간으로 데이터를 주고받을 수 있어요!"
        highlights:
          - emoji: "⚡"
            title: "강력한 자동화"
          - emoji: "🐍"
            title: "파이썬 연동"
          - emoji: "📈"
            title: "실시간 처리"
          - emoji: "🚀"
            title: "생산성 극대화"

      - type: compare
        left:
          title: "수작업 엑셀"
          subtitle: "손목이 아파요..."
          icon: "😫"
          color: "red"
          items:
            - icon: "→"
              text: "수십 개 파일 일일이 열기"
            - icon: "→"
              text: "마우스로 복사 붙여넣기"
            - icon: "→"
              text: "수식 하나씩 입력하기"
            - icon: "→"
              text: "차트 수동으로 생성"
            - icon: "→"
              text: "매일 반복되는 고된 작업"
          infoBox: "😭 단순 반복 작업에 하루 종일 시간 소모"
        right:
          title: "xlwings 자동화 방식"
          subtitle: "버튼 한번으로 끝!"
          icon: "🚀"
          color: "green"
          items:
            - icon: "✅"
              text: "파이썬으로 모든 파일 자동 처리"
            - icon: "✅"
              text: "데이터 실시간 분석"
            - icon: "✅"
              text: "복잡한 계산 즉시 완료"
            - icon: "✅"
              text: "아름다운 차트 자동 생성"
            - icon: "✅"
              text: "하루 8시간 → 5분 컷!!"
          infoBox: "🎉 한번 만들면 영원히 자동화!"

  - id: "xlwingsVsLite"
    title: "xlwings vs xlwings Lite"
    blocks:
      - type: sectionHeader
        title: "🆚 xlwings vs xlwings Lite"
        subtitle: "설치형과 웹확장형, 어떤 것을 선택할까요? 상황에 맞는 최적의 선택을 해보세요!"

      - type: hero
        emoji: "🎯"
        title: "xlwings는 두 가지 방식을 선택할 수 있는데요"
        subtitle: "상황에 맞는 최적의 솔루션을 찾아보자구요!!!!"
        highlights:
          - emoji: "🏗️"
            title: "설치형"
          - emoji: "✨"
            title: "웹 확장형"
          - emoji: "🤔"
            title: "어떤 걸 선택할까?"
        gradient: "from-blue-500 via-green-500 to-purple-500"

