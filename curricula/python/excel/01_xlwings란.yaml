sections:
- id: intro
  title: 1단계. 로컬 Excel 자동화의 기준
  subtitle: 앱 제어 대신 파일 기반 자동화
  blocks:
  - type: text
    content: |-
      로컬 Python 커리큘럼에서는 Excel 프로그램을 직접 조종하기보다, xlsx 파일을 코드로 생성하고 검증하는 흐름을 먼저 배웁니다. 이 방식은 CI와 서버에서도 재현 가능하고, 사용자가 같은 파일을 업무에 바로 가져갈 수 있습니다.
  - type: tip
    content: "Excel 앱 제어가 필요한 특수 업무는 나중에 선택지로 다루고, 기본 커리큘럼은 openpyxl/pandas 파일 자동화를 기준으로 잡습니다."

- id: create_workbook
  title: 2단계. 워크북 만들기
  subtitle: Workbook과 Worksheet
  blocks:
  - type: code
    language: python
    title: 매출 워크북 생성
    description: 임시 폴더에 xlsx 파일을 만들고 기본 데이터를 씁니다
    content: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook, load_workbook

      excelTemp = TemporaryDirectory()
      excelRoot = Path(excelTemp.name)
      salesPath = excelRoot / "sales_report.xlsx"

      workbook = Workbook()
      sheet = workbook.active
      sheet.title = "sales"
      sheet.append(["date", "region", "product", "amount"])
      sheet.append(["2026-05-01", "Seoul", "Notebook", 1250000])
      sheet.append(["2026-05-02", "Busan", "Monitor", 420000])
      sheet.append(["2026-05-03", "Seoul", "Keyboard", 180000])
      workbook.save(salesPath)

      assert salesPath.exists()
      salesPath
  - type: code
    language: python
    title: 워크북 구조 검증
    description: 시트명, 헤더, 행 수를 assert로 확인합니다
    content: |-
      loadedWorkbook = load_workbook(salesPath, data_only=True)
      loadedSheet = loadedWorkbook["sales"]
      headers = [cell.value for cell in loadedSheet[1]]
      rows = list(loadedSheet.iter_rows(min_row=2, values_only=True))

      assert headers == ["date", "region", "product", "amount"]
      assert len(rows) == 3
      assert sum(row[3] for row in rows) == 1850000
      rows

- id: workflow_validation
  title: 3단계. 워크북 검증 루프
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  blocks:
  - type: text
    content: |-
      엑셀 자동화는 파일이 만들어졌다는 사실보다, 사용자가 열었을 때 믿을 수 있는 구조인지가 중요합니다. 필수 컬럼과 금액 규칙을 검증하고, 잘못된 금액이 들어왔을 때 명확하게 실패시키는 흐름을 만듭니다.
  - type: code
    language: python
    title: 데이터 계약 검증
    description: 필수 헤더와 금액 양수 조건을 함수로 확인합니다
    content: |-
      def validateSalesWorksheet(worksheet):
          headers = [cell.value for cell in worksheet[1]]
          requiredHeaders = ["date", "region", "product", "amount"]
          if headers != requiredHeaders:
              raise ValueError(f"헤더가 다릅니다: {headers}")
          amounts = [row[3] for row in worksheet.iter_rows(min_row=2, values_only=True)]
          assert all(amount > 0 for amount in amounts)
          return {"rowCount": len(amounts), "totalAmount": sum(amounts)}

      salesValidation = validateSalesWorksheet(loadedSheet)
      assert salesValidation["rowCount"] == 3
      salesValidation
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: 음수 금액을 넣은 워크북을 실패시킵니다
    content: |-
      brokenWorkbook = Workbook()
      brokenSheet = brokenWorkbook.active
      brokenSheet.title = "sales"
      brokenSheet.append(["date", "region", "product", "amount"])
      brokenSheet.append(["2026-05-04", "Seoul", "Mouse", -50000])

      try:
          validateSalesWorksheet(brokenSheet)
      except AssertionError as exc:
          print("검증 실패 확인:", exc)

      fixedAmount = 50000
      brokenSheet["D2"] = fixedAmount
      assert validateSalesWorksheet(brokenSheet)["totalAmount"] == fixedAmount
  - type: code
    language: python
    title: 실무 변주 실험
    description: 지역별 합계를 계산해 보고서 기준을 바꿉니다
    content: |-
      regionTotals = {}
      for _, region, _product, amount in rows:
          regionTotals[region] = regionTotals.get(region, 0) + amount

      minimumReportAmount = 300000
      reportRegions = {region: total for region, total in regionTotals.items() if total >= minimumReportAmount}

      assert reportRegions["Seoul"] > reportRegions["Busan"]
      assert set(reportRegions) == {"Seoul", "Busan"}
      reportRegions

- id: summary
  title: 정리
  subtitle: 파일 자동화의 기본 완주 조건
  blocks:
  - type: text
    content: |-
      이번 레슨에서는 로컬 xlsx 파일을 만들고, 시트 구조와 금액 규칙을 검증하고, 기준을 바꿔 지역별 요약을 만드는 흐름을 완성했습니다.
