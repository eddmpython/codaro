intro:
  direction: Excel 로컬 자동화 입문에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - Excel 로컬 자동화 입문 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 필요한 라이브러리는 레슨을 열 때 uv로 준비하고, 첫 실행에서 import와 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
  diagram:
    steps:
    - label: 목표
      detail: 완료 후 만들 산출물을 먼저 확인
    - label: 준비
      detail: meta.packages 기반 uv 준비와 import 확인
    - label: 실습
      detail: 예제 스니펫을 바꿔 직접 실행
    - label: 검증
      detail: assert와 결과 비교로 완료 판단
    runtime:
    - label: 패키지
      detail: packages-check -> packages-install(누락 시) -> cell-call
    - label: 첫 실행
      detail: import 확인과 assert 검증
    - label: 완료
      detail: 리포트/자동화/검증 루틴으로 재사용
sections:
- id: intro
  title: 1단계. 로컬 Excel 자동화의 기준
  subtitle: 앱 제어 대신 파일 기반 자동화
  blocks:
  - type: text
    content: 로컬 Python 커리큘럼에서는 Excel 프로그램을 직접 조종하기보다, xlsx 파일을 코드로 생성하고 검증하는 흐름을 먼저 배웁니다. 이 방식은 CI와 서버에서도 재현 가능하고, 사용자가 같은
      파일을 업무에 바로 가져갈 수 있습니다.
  - type: tip
    content: Excel 앱 제어가 필요한 특수 업무는 나중에 선택지로 다루고, 기본 커리큘럼은 openpyxl/pandas 파일 자동화를 기준으로 잡습니다.
- id: create_workbook
  title: 2단계. 워크북 만들기
  structuredPrimary: true
  subtitle: Workbook과 Worksheet
  goal: '2단계. 워크북 만들기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 워크북 만들기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 2단계. 워크북 만들기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook, load_workbook

    excelTemp = TemporaryDirectory()
    excelRoot = Path(excelTemp.name)
    salesPath = excelRoot / "sales_report.xlsx"

    workbook = Workbook()
    sheet = workbook.active
    sheet.title = "sales"
    sheet.append(["date", "region", "product", "amount"])
    sheet.append(["2026-05-01", "Seoul", "Notebook", 1250000])
    sheet.append(["2026-05-02", "Busan", "Monitor", 420000])
    sheet.append(["2026-05-03", "Seoul", "Keyboard", 180000])
    workbook.save(salesPath)

    assert salesPath.exists()
    salesPath
  exercise:
    prompt: '2단계. 워크북 만들기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook, load_workbook

      excelTemp = TemporaryDirectory()
      excelRoot = Path(excelTemp.name)
      salesPath = excelRoot / "sales_report.xlsx"

      workbook = Workbook()
      sheet = workbook.active
      sheet.title = "sales"
      sheet.append(["date", "region", "product", "amount"])
      sheet.append(["2026-05-01", "Seoul", "Notebook", 1250000])
      sheet.append(["2026-05-02", "Busan", "Monitor", 420000])
      sheet.append(["2026-05-03", "Seoul", "Keyboard", 180000])
      workbook.save(salesPath)

      assert salesPath.exists()
      salesPath
    solution: |-
      from pathlib import Path
