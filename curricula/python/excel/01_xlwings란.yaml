            advantages:
              - icon: "🚀"
                title: "최고 성능"
                desc: "로컬 환경에서 최적화된 속도"
              - icon: "🔥"
                title: "완전한 엑셀 제어"
                desc: "엑셀의 모든 기능에 접근 가능"
              - icon: "📊"
                title: "대용량 처리"
                desc: "수십만 행 데이터도 빠르게 처리"
              - icon: "🔧"
                title: "VBA 완전 대체"
                desc: "복잡한 VBA 매크로를 파이썬으로"
            requirements:
              - icon: "🐍"
                title: "Python 설치"
                desc: "로컬 파이썬 환경 설치 필요"
              - icon: "📦"
                title: "xlwings 패키지"
                desc: "pip install xlwings 설치"
              - icon: "🖥️"
                title: "데스크탑 엑셀"
                desc: "Windows/macOS 엑셀 설치 필요"
              - icon: "💎"
                title: "PRO 기능 유료"
                desc: "일부 고급 기능은 유료 라이선스"
            buttonText: "📖 설치 가이드 보기"
            buttonLink: "/study/엑셀자동화/xlwings설치"
            gradient: "from-blue-500 to-indigo-500"
