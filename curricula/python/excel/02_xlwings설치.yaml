- id: cleaning_flow
  title: 2단계. 파생 컬럼과 요약
  structuredPrimary: true
  subtitle: amount 계산
  goal: '2단계. 파생 컬럼과 요약: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 파생 컬럼과 요약: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 2단계. 파생 컬럼과 요약의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    orders = orders.assign(amount=orders["quantity"] * orders["unit_price"])
    regionSummary = orders.groupby("region", as_index=False)["amount"].sum().sort_values("amount", ascending=False)

    assert orders["amount"].sum() == 745000
    assert regionSummary.iloc[0]["region"] == "Seoul"
    regionSummary
  exercise:
    prompt: '2단계. 파생 컬럼과 요약: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
