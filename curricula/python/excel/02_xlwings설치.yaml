sections:
- id: intro
  title: 1단계. 업무 파일을 DataFrame으로 읽기
  subtitle: read_excel과 계약 확인
  blocks:
  - type: text
    content: |-
      실무 엑셀 파일은 사람이 만들기 때문에 헤더 누락, 음수 값, 불필요한 시트가 자주 생깁니다. pandas로 읽은 뒤 컬럼 계약을 먼저 확인하는 습관을 만듭니다.
  - type: code
    language: python
    title: 샘플 주문 파일 생성
    description: openpyxl로 입력 파일을 만들고 pandas로 읽습니다
    content: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook
      import pandas as pd

      excelTemp = TemporaryDirectory()
      excelRoot = Path(excelTemp.name)
      ordersPath = excelRoot / "orders.xlsx"

      workbook = Workbook()
      sheet = workbook.active
      sheet.title = "orders"
      sheet.append(["order_id", "region", "quantity", "unit_price"])
      sheet.append(["A001", "Seoul", 3, 120000])
      sheet.append(["A002", "Busan", 2, 80000])
      sheet.append(["A003", "Seoul", 5, 45000])
      workbook.save(ordersPath)

      orders = pd.read_excel(ordersPath, sheet_name="orders")
      assert list(orders.columns) == ["order_id", "region", "quantity", "unit_price"]
      orders

- id: cleaning_flow
  title: 2단계. 파생 컬럼과 요약
  subtitle: amount 계산
  blocks:
  - type: code
    language: python
    title: 주문 금액 계산
    description: 수량과 단가로 amount 컬럼을 만듭니다
    content: |-
      orders = orders.assign(amount=orders["quantity"] * orders["unit_price"])
      regionSummary = orders.groupby("region", as_index=False)["amount"].sum().sort_values("amount", ascending=False)

      assert orders["amount"].sum() == 745000
      assert regionSummary.iloc[0]["region"] == "Seoul"
      regionSummary
  - type: code
    language: python
    title: 요약 시트 저장
    description: 정제 결과와 요약을 새 파일로 저장합니다
    content: |-
      cleanPath = excelRoot / "orders_clean.xlsx"
      with pd.ExcelWriter(cleanPath, engine="openpyxl") as writer:
          orders.to_excel(writer, sheet_name="orders", index=False)
          regionSummary.to_excel(writer, sheet_name="summary", index=False)

      assert cleanPath.exists()
      writtenSheets = pd.ExcelFile(cleanPath).sheet_names
      assert writtenSheets == ["orders", "summary"]
      writtenSheets

- id: workflow_validation
  title: 3단계. 정제 파이프라인 검증 루프
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  blocks:
  - type: text
    content: |-
      엑셀 정제 파이프라인은 읽기, 계산, 저장이 모두 맞아야 합니다. 입력 컬럼을 검증하고, 잘못된 수량을 잡고, 집계 기준을 바꿔 결과가 어떻게 달라지는지 확인합니다.
  - type: code
    language: python
    title: 입력 DataFrame 검증
    description: 필수 컬럼과 양수 수량/단가를 검사합니다
    content: |-
      def validateOrders(frame):
          requiredColumns = {"order_id", "region", "quantity", "unit_price"}
          missingColumns = requiredColumns - set(frame.columns)
          if missingColumns:
              raise ValueError(f"주문 파일 필수 컬럼 누락: {sorted(missingColumns)}")
          assert frame["quantity"].gt(0).all()
          assert frame["unit_price"].gt(0).all()
          return True

      assert validateOrders(orders)
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: 수량이 0인 주문을 실패시키고 수정합니다
    content: |-
      brokenOrders = orders.copy()
      brokenOrders.loc[brokenOrders.index[0], "quantity"] = 0
      try:
          validateOrders(brokenOrders)
      except AssertionError as exc:
          print("검증 실패 확인:", exc)

      brokenOrders.loc[brokenOrders.index[0], "quantity"] = 3
      assert validateOrders(brokenOrders)
  - type: code
    language: python
    title: 실무 변주 실험
    description: 최소 주문금액 기준을 바꿔 처리 대상만 남깁니다
    content: |-
      thresholdReport = []
      for minimumAmount in [100000, 200000, 300000]:
          target = orders[orders["amount"] >= minimumAmount]
          thresholdReport.append({"minimumAmount": minimumAmount, "rows": int(len(target)), "totalAmount": int(target["amount"].sum())})

      assert thresholdReport[0]["rows"] >= thresholdReport[1]["rows"] >= thresholdReport[2]["rows"]
      assert thresholdReport[0]["totalAmount"] >= thresholdReport[-1]["totalAmount"]
      thresholdReport

- id: summary
  title: 정리
  subtitle: 읽기-정제-저장 완주
  blocks:
  - type: text
    content: |-
      이번 레슨에서는 xlsx 입력을 DataFrame으로 읽고, 파생 컬럼을 만들고, 정제 결과와 요약을 여러 시트로 저장했습니다.
