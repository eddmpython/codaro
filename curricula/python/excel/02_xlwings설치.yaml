intro:
  direction: Excel 데이터 읽기와 정제에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - Excel 데이터 읽기와 정제 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 필요한 라이브러리는 레슨을 열 때 uv로 준비하고, 첫 실행에서 import와 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
  diagram:
    steps:
    - label: 목표
      detail: 완료 후 만들 산출물을 먼저 확인
    - label: 준비
      detail: meta.packages 기반 uv 준비와 import 확인
    - label: 실습
      detail: 예제 스니펫을 바꿔 직접 실행
    - label: 검증
      detail: assert와 결과 비교로 완료 판단
    runtime:
    - label: 패키지
      detail: packages-check -> packages-install(누락 시) -> cell-call
    - label: 첫 실행
      detail: import 확인과 assert 검증
    - label: 완료
      detail: 리포트/자동화/검증 루틴으로 재사용
sections:
- id: intro
  title: 1단계. 업무 파일을 DataFrame으로 읽기
  structuredPrimary: true
  subtitle: read_excel과 계약 확인
  goal: '1단계. 업무 파일을 DataFrame으로 읽기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 업무 파일을 DataFrame으로 읽기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 실무 엑셀 파일은 사람이 만들기 때문에 헤더 누락, 음수 값, 불필요한 시트가 자주 생깁니다. pandas로 읽은 뒤 컬럼 계약을 먼저 확인하는 습관을 만듭니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook
    import pandas as pd

    excelTemp = TemporaryDirectory()
    excelRoot = Path(excelTemp.name)
    ordersPath = excelRoot / "orders.xlsx"

    workbook = Workbook()
    sheet = workbook.active
    sheet.title = "orders"
    sheet.append(["order_id", "region", "quantity", "unit_price"])
    sheet.append(["A001", "Seoul", 3, 120000])
    sheet.append(["A002", "Busan", 2, 80000])
    sheet.append(["A003", "Seoul", 5, 45000])
    workbook.save(ordersPath)

    orders = pd.read_excel(ordersPath, sheet_name="orders")
    assert list(orders.columns) == ["order_id", "region", "quantity", "unit_price"]
    orders
  exercise:
    prompt: '1단계. 업무 파일을 DataFrame으로 읽기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook
      import pandas as pd

      excelTemp = TemporaryDirectory()
      excelRoot = Path(excelTemp.name)
      ordersPath = excelRoot / "orders.xlsx"

      workbook = Workbook()
      sheet = workbook.active
      sheet.title = "orders"
      sheet.append(["order_id", "region", "quantity", "unit_price"])
      sheet.append(["A001", "Seoul", 3, 120000])
      sheet.append(["A002", "Busan", 2, 80000])
      sheet.append(["A003", "Seoul", 5, 45000])
      workbook.save(ordersPath)

      orders = pd.read_excel(ordersPath, sheet_name="orders")
      assert list(orders.columns) == ["order_id", "region", "quantity", "unit_price"]
      orders
    solution: |-
