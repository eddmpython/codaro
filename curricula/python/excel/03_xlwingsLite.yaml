intro:
  direction: Excel 리포트 자동 생성에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - Excel 리포트 자동 생성 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 필요한 라이브러리는 레슨을 열 때 uv로 준비하고, 첫 실행에서 import와 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
  diagram:
    steps:
    - label: 목표
      detail: 완료 후 만들 산출물을 먼저 확인
    - label: 준비
      detail: meta.packages 기반 uv 준비와 import 확인
    - label: 실습
      detail: 예제 스니펫을 바꿔 직접 실행
    - label: 검증
      detail: assert와 결과 비교로 완료 판단
    runtime:
    - label: 패키지
      detail: packages-check -> packages-install(누락 시) -> cell-call
    - label: 첫 실행
      detail: import 확인과 assert 검증
    - label: 완료
      detail: 리포트/자동화/검증 루틴으로 재사용
sections:
- id: intro
  title: 1단계. 보고서 파일의 목표
  structuredPrimary: true
  subtitle: 데이터 + 요약 + 차트
  goal: '1단계. 보고서 파일의 목표: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 보고서 파일의 목표: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 자동화된 Excel 리포트는 원본 데이터, 요약 표, 차트가 한 파일 안에 일관되게 들어 있어야 합니다. 이번 레슨은 pandas와 openpyxl을 함께 사용해 보고서 파일을 생성하고 구조를
    검증합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    from pathlib import Path
    from tempfile import TemporaryDirectory
    import pandas as pd
    from openpyxl import load_workbook
    from openpyxl.chart import BarChart, Reference
    from codaro.curriculum.localData import loadLocalDataset

    excelTemp = TemporaryDirectory()
    excelRoot = Path(excelTemp.name)
    reportPath = excelRoot / "tips_report.xlsx"

    tips = loadLocalDataset("tips")
    tipsReport = tips.assign(tip_rate=tips["tip"] / tips["total_bill"])
    summary = tipsReport.groupby("time", as_index=False).agg(order_count=("tip", "size"), avg_tip=("tip", "mean"), avg_tip_rate=("tip_rate", "mean"))

    assert set(summary["time"]) == {"Lunch", "Dinner"}
    summary.round(3)
  exercise:
