meta:
  id: excel_03
  title: Excel 리포트 자동 생성
  order: 3
  category: excel
  badge: 리포트
  packages:
    - openpyxl
    - pandas
  tags: ["excel","openpyxl","pandas","리포트","차트"]
  seo:
    title: "Excel 리포트 자동 생성 - 로컬 Python 엑셀 자동화"
    description: "openpyxl과 pandas로 로컬 Excel 파일을 만들고 검증하는 실무형 커리큘럼입니다."
    keywords: ["excel","openpyxl","pandas","리포트","차트"]

sections:
- id: intro
  title: 1단계. 보고서 파일의 목표
  subtitle: 데이터 + 요약 + 차트
  blocks:
  - type: text
    content: |-
      자동화된 Excel 리포트는 원본 데이터, 요약 표, 차트가 한 파일 안에 일관되게 들어 있어야 합니다. 이번 레슨은 pandas와 openpyxl을 함께 사용해 보고서 파일을 생성하고 구조를 검증합니다.
  - type: code
    language: python
    title: 로컬 데이터 준비
    description: tips 데이터로 Excel 리포트 입력을 만듭니다
    content: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pandas as pd
      from openpyxl import load_workbook
      from openpyxl.chart import BarChart, Reference
      from codaro.curriculum.localData import loadLocalDataset

      excelTemp = TemporaryDirectory()
      excelRoot = Path(excelTemp.name)
      reportPath = excelRoot / "tips_report.xlsx"

      tips = loadLocalDataset("tips")
      tipsReport = tips.assign(tip_rate=tips["tip"] / tips["total_bill"])
      summary = tipsReport.groupby("time", as_index=False).agg(order_count=("tip", "size"), avg_tip=("tip", "mean"), avg_tip_rate=("tip_rate", "mean"))

      assert set(summary["time"]) == {"Lunch", "Dinner"}
      summary.round(3)

- id: build_report
  title: 2단계. 리포트 파일 만들기
  subtitle: 시트와 차트
  blocks:
  - type: code
    language: python
    title: 여러 시트 저장
    description: 원본 데이터와 요약 시트를 같은 파일에 씁니다
    content: |-
      with pd.ExcelWriter(reportPath, engine="openpyxl") as writer:
          tipsReport.to_excel(writer, sheet_name="raw_data", index=False)
          summary.to_excel(writer, sheet_name="summary", index=False)

      assert reportPath.exists()
      workbook = load_workbook(reportPath)
      assert workbook.sheetnames == ["raw_data", "summary"]
  - type: code
    language: python
    title: 요약 차트 추가
    description: openpyxl BarChart를 summary 시트에 붙입니다
    content: |-
      summarySheet = workbook["summary"]
      chart = BarChart()
      chart.title = "Average tip by time"
      chart.y_axis.title = "Average tip"
      chart.x_axis.title = "Time"
      data = Reference(summarySheet, min_col=3, min_row=1, max_row=summarySheet.max_row)
      categories = Reference(summarySheet, min_col=1, min_row=2, max_row=summarySheet.max_row)
      chart.add_data(data, titles_from_data=True)
      chart.set_categories(categories)
      summarySheet.add_chart(chart, "E2")
      workbook.save(reportPath)

      reloadedWorkbook = load_workbook(reportPath)
      assert len(reloadedWorkbook["summary"]._charts) == 1
      reportPath

- id: workflow_validation
  title: 3단계. 리포트 검증 루프
  subtitle: 예측 → 실행 → 오류 수정 → 검증 → 실무 변주
  blocks:
  - type: text
    content: |-
      리포트 자동화는 파일 생성보다 검증이 중요합니다. 시트 구성, 요약 행 수, 차트 존재를 확인하고, 잘못된 리포트 구조를 명확하게 실패시킵니다.
  - type: code
    language: python
    title: 리포트 구조 검증
    description: 필수 시트와 차트, 요약 컬럼을 확인합니다
    content: |-
      def validateExcelReport(path):
          workbook = load_workbook(path, data_only=True)
          requiredSheets = {"raw_data", "summary"}
          missingSheets = requiredSheets - set(workbook.sheetnames)
          if missingSheets:
              raise ValueError(f"리포트 필수 시트 누락: {sorted(missingSheets)}")
          summarySheet = workbook["summary"]
          headers = [cell.value for cell in summarySheet[1]]
          assert {"time", "order_count", "avg_tip", "avg_tip_rate"}.issubset(set(headers))
          assert len(workbook["summary"]._charts) == 1
          return {"sheetCount": len(workbook.sheetnames), "summaryRows": summarySheet.max_row - 1}

      reportValidation = validateExcelReport(reportPath)
      assert reportValidation["summaryRows"] == 2
      reportValidation
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: summary 시트가 빠진 리포트를 실패시킵니다
    content: |-
      brokenReportPath = excelRoot / "broken_report.xlsx"
      with pd.ExcelWriter(brokenReportPath, engine="openpyxl") as writer:
          tipsReport.to_excel(writer, sheet_name="raw_data", index=False)

      try:
          validateExcelReport(brokenReportPath)
      except ValueError as exc:
          print("검증 실패 확인:", exc)

      assert validateExcelReport(reportPath)["sheetCount"] == 2
  - type: code
    language: python
    title: 실무 변주 실험
    description: 요일별 리포트로 집계 기준을 바꿉니다
    content: |-
      daySummary = tipsReport.groupby("day", as_index=False).agg(order_count=("tip", "size"), revenue=("total_bill", "sum"), avg_tip_rate=("tip_rate", "mean"))
      minimumRevenue = 800
      selectedDays = daySummary[daySummary["revenue"] >= minimumRevenue]

      assert len(selectedDays) <= len(daySummary)
      assert selectedDays["revenue"].min() >= minimumRevenue
      selectedDays.sort_values("revenue", ascending=False)

- id: summary
  title: 정리
  subtitle: Excel 리포트 자동화 완주
  blocks:
  - type: text
    content: |-
      이번 레슨에서는 로컬 데이터로 Excel 리포트 파일을 만들고, 여러 시트와 차트가 들어 있는지 검증하고, 집계 기준을 바꾸는 변주까지 완성했습니다.
