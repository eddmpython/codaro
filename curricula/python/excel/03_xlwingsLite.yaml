      reportValidation = validateExcelReport(reportPath)
      assert reportValidation["summaryRows"] == 2
      reportValidation
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: summary 시트가 빠진 리포트를 실패시킵니다
    content: |-
      brokenReportPath = excelRoot / "broken_report.xlsx"
      with pd.ExcelWriter(brokenReportPath, engine="openpyxl") as writer:
          tipsReport.to_excel(writer, sheet_name="raw_data", index=False)

      try:
          validateExcelReport(brokenReportPath)
      except ValueError as exc:
          print("검증 실패 확인:", exc)

      assert validateExcelReport(reportPath)["sheetCount"] == 2
  - type: code
    language: python
    title: 실무 변주 실험
    description: 요일별 리포트로 집계 기준을 바꿉니다
    content: |-
      daySummary = tipsReport.groupby("day", as_index=False).agg(order_count=("tip", "size"), revenue=("total_bill", "sum"), avg_tip_rate=("tip_rate", "mean"))
      minimumRevenue = 800
      selectedDays = daySummary[daySummary["revenue"] >= minimumRevenue]

      assert len(selectedDays) <= len(daySummary)
      assert selectedDays["revenue"].min() >= minimumRevenue
      selectedDays.sort_values("revenue", ascending=False)
- id: summary
  title: 정리
  subtitle: Excel 리포트 자동화 완주
  blocks:
  - type: text
    content: 이번 레슨에서는 로컬 데이터로 Excel 리포트 파일을 만들고, 여러 시트와 차트가 들어 있는지 검증하고, 집계 기준을 바꾸는 변주까지 완성했습니다.
