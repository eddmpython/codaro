  title: Keypoint R-CNN 포즈 추정
  order: 7
  category: deepVision
  difficulty: ⭐⭐⭐⭐
  badge: 중급
  packages:
  - matplotlib
  - numpy
  - scikit-learn
  - torch
  - torchvision
  tags:
  - torchvision
  - 포즈추정
  - keypoint
  - COCO
