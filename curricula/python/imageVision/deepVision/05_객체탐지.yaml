meta:
  id: deepVision_05
  title: Faster R-CNN 객체 탐지
  order: 5
  category: deepVision
  difficulty: ⭐⭐⭐⭐
  badge: 중급
  packages:
  - matplotlib
  - numpy
  - scikit-learn
  - torch
  - torchvision
  tags:
  - torchvision
  - 객체탐지
  - FasterRCNN
  - bbox
  - COCO
  seo:
    title: 딥러닝 비전 - Faster R-CNN 객체 탐지
    description: torchvision의 사전학습 Faster R-CNN으로 사진에서 객체 박스를 검출합니다.
