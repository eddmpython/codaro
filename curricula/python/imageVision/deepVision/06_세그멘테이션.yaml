meta:
  id: deepVision_06
  title: DeepLabV3 세맨틱 세그멘테이션
  order: 6
  category: deepVision
  difficulty: ⭐⭐⭐⭐
  badge: 중급
  packages:
  - matplotlib
  - numpy
  - scikit-learn
  - torch
  - torchvision
  tags:
  - torchvision
  - 세그멘테이션
  - DeepLabV3
  - 픽셀분류
  seo:
    title: 딥러닝 비전 - DeepLabV3 세맨틱 세그멘테이션
    description: torchvision DeepLabV3로 사진 픽셀마다 클래스를 예측해 세그 마스크를 만듭니다.
