meta:
  id: deepVision_03
  title: 임베딩 벡터 추출
  order: 3
  category: deepVision
  difficulty: ⭐⭐⭐
  badge: 기초
  packages:
  - matplotlib
  - numpy
  - pillow
  - scikit-learn
  - torch
  - torchvision
  tags:
  - torchvision
  - ResNet
  - 임베딩
  - feature
  - 특징벡터
  seo:
    title: 딥러닝 비전 - 임베딩 벡터 추출
    description: ResNet의 마지막 분류층을 제거하고 사진을 512차원 특징 벡터로 인코딩합니다.
    keywords:
    - 임베딩
    - feature
    - ResNet
    - 특징벡터
