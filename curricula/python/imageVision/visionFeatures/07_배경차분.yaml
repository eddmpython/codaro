intro:
  emoji: 🚦
  goal: 영상에서 움직이는 영역만 골라내는 두 가지 방법을 비교합니다.
  description: |-
    감시 카메라, 행동 검출, 영상 통계 같은 응용은 모두 "이전 프레임과 무엇이 달라졌는지"에서 출발합니다. 이 강의는 단순 차분(absdiff)부터 통계적 배경 모델(MOG2)까지 두 방법을 직접 비교하며 움직임 검출의 기본을 익힙니다.
  direction: 두 프레임의 차이를 임곗값으로 마스크화하고, MOG2 모델로 같은 영상에서 더 정교한 결과를 얻습니다.
  benefits:
  - 두 프레임의 차이를 한 줄로 마스크화할 수 있습니다.
  - MOG2 객체로 자기 적응적인 배경 모델을 만들 수 있습니다.
  - 두 방법의 장단점을 한 영상에서 비교할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 영상 준비
      detail: 움직이는 원이 포함된 합성 영상을 준비합니다.
    - label: 2단계. 두 프레임 absdiff
      detail: 인접 프레임의 차이로 마스크를 만듭니다.
    - label: 3단계. 임곗값 이진화
      detail: 노이즈를 거르는 임곗값을 정합니다.
    - label: 4단계. MOG2 배경 모델
      detail: 한 줄로 통계 기반 마스크를 얻습니다.
    - label: 5단계. 결과 비교
      detail: 두 방법의 마스크를 시간순으로 그립니다.
    runtime:
    - label: 비전 환경
      detail: opencv-python의 absdiff와 BackgroundSubtractorMOG2를 사용합니다.
    - label: 검증 흐름
      detail: assert와 시각 비교로 학습 결과가 기대값과 같은지 확인합니다.
sections:
- id: prepare_video
  title: 1단계. 영상 준비
  structuredPrimary: true
  subtitle: 6강에서 만든 영상 재사용
  goal: 6강에서 만든 codaro_demo.mp4를 그대로 사용해 환경을 준비합니다.
  why: 같은 데이터로 다른 알고리즘을 비교하려면 공통 입력이 필요합니다.
  explanation: |-
    파일이 존재하지 않으면 즉석에서 같은 형식의 합성 영상을 다시 만듭니다. 강의 6의 흐름과 호환되도록 같은 경로와 같은 해상도를 사용합니다.

    영상의 움직이는 객체는 노란 원입니다. 원의 위치가 프레임마다 4픽셀씩 우측으로 이동하므로 차분 마스크에 띠 모양이 나타나야 합니다.
  tips:
  - 합성 영상을 항상 같은 코드로 재생산할 수 있게 두면 학습 환경이 안정됩니다.
  snippet: |-
    import cv2
    import numpy as np
    import matplotlib.pyplot as plt
    import tempfile
    from pathlib import Path

    videoPath = Path(tempfile.gettempdir()) / 'codaro_demo.mp4'
    if not videoPath.exists():
        width, height = 320, 240
        fps = 24
        fourcc = cv2.VideoWriter_fourcc(*'mp4v')
        writer = cv2.VideoWriter(str(videoPath), fourcc, fps, (width, height))
        for idx in range(60):
            frame = np.zeros((height, width, 3), dtype=np.uint8)
            intensity = int(255 * idx / 59)
            frame[:] = (intensity, 100, 255 - intensity)
            cv2.circle(frame, (60 + idx * 4, 120), 20, (0, 255, 255), -1)
            writer.write(frame)
        writer.release()
    videoPath.exists()
  exercise:
    prompt: VideoCapture로 영상의 총 프레임 수를 다시 확인하세요.
    starterCode: |-
      cap = cv2.VideoCapture(str(videoPath))
      totalFrames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))
      cap.___()
      totalFrames
    hints:
    - VideoCapture 사용 후 release를 호출하세요.
    - 강의 6에서 만든 영상은 60 프레임입니다.
  check:
    noError: 영상 준비와 메타데이터 조회가 오류 없이 끝나야 합니다.
    resultCheck: videoPath.exists() 가 True여야 합니다.
- id: absdiff
  title: 2단계. 두 프레임 absdiff
  structuredPrimary: true
  subtitle: 인접 프레임의 차이
  goal: cv2.absdiff로 두 프레임의 절댓값 차이를 계산해 움직임 마스크를 만듭니다.
  why: 가장 단순한 방법이며 동작이 직관적이라 차분 결과를 해석하기 좋습니다.
  explanation: |-
    `cv2.absdiff(frame1, frame2)` 는 두 이미지의 픽셀별 절댓값 차이를 반환합니다. 같으면 0, 다르면 큰 값이 됩니다.

    그레이로 변환한 뒤 차분하면 노이즈가 줄어들고 연산이 빠릅니다. 컬러 차분은 색이 약간만 변해도 큰 값이 나오므로 일반적으로는 그레이 차분을 씁니다.
  tips:
  - absdiff의 결과 dtype은 입력과 같습니다. uint8 두 장의 차분 결과도 uint8입니다.
  snippet: |-
    cap = cv2.VideoCapture(str(videoPath))
    ok, prev = cap.read()
    ok, current = cap.read()
    cap.release()
    grayPrev = cv2.cvtColor(prev, cv2.COLOR_BGR2GRAY)
    grayCur = cv2.cvtColor(current, cv2.COLOR_BGR2GRAY)
    diff = cv2.absdiff(grayPrev, grayCur)
    diff.shape, diff.max()
  exercise:
    prompt: 두 프레임 차분의 평균과 최댓값을 출력하세요.
    starterCode: |-
      diffMean = float(diff.___())
      diffMax = int(diff.___())
      diffMean, diffMax
    hints:
    - 빈칸은 메서드 이름 한 단어입니다.
    - 평균은 작고 최댓값은 큰 분포가 일반적입니다.
  check:
    noError: absdiff와 통계가 오류 없이 끝나야 합니다.
    resultCheck: diff가 (높이, 너비) shape의 uint8 배열이어야 합니다.
- id: binarize
  title: 3단계. 임곗값 이진화
  structuredPrimary: true
  subtitle: 노이즈 거르는 한 줄
  goal: 차분 마스크에 임곗값을 적용해 움직임 영역만 흰색으로 남깁니다.
  why: 차분 결과는 회색 톤이므로 그대로 쓰면 노이즈가 섞입니다. 임곗값 한 줄이 마스크를 명확하게 만듭니다.
  explanation: |-
    `cv2.threshold(diff, 25, 255, cv2.THRESH_BINARY)` 는 25 미만은 0, 이상은 255로 만듭니다. 임곗값을 낮추면 미세한 움직임도 잡지만 노이즈가 같이 들어옵니다.

    적절한 임곗값은 영상마다 다릅니다. 차분 분포를 보고 데이터에 맞게 정합니다.
  tips:
  - threshold의 첫 반환값은 이진화에 사용된 임곗값 자체입니다.
  snippet: |-
    _, motionMask = cv2.threshold(diff, 25, 255, cv2.THRESH_BINARY)
    motionMask.sum() / 255
  exercise:
    prompt: 임곗값을 10과 80으로 각각 적용해 마스크의 흰색 픽셀 개수를 비교하세요.
    starterCode: |-
      _, lowMask = cv2.threshold(diff, ___, 255, cv2.THRESH_BINARY)
      _, highMask = cv2.threshold(diff, ___, 255, cv2.THRESH_BINARY)
      lowMask.sum() / 255, highMask.sum() / 255
    hints:
    - 10이 낮은 임곗값, 80이 높은 임곗값입니다.
    - 낮을수록 마스크가 커집니다.
  check:
    noError: 두 임곗값 적용이 오류 없이 끝나야 합니다.
    resultCheck: motionMask가 (높이, 너비) shape의 uint8 배열이어야 합니다.
- id: mog2
  title: 4단계. MOG2 배경 모델
  structuredPrimary: true
  subtitle: 한 줄로 적응형 마스크
  goal: cv2.createBackgroundSubtractorMOG2로 통계 기반 배경 마스크를 만듭니다.
  why: MOG2는 시간이 지나면서 배경을 학습해 카메라가 흔들리거나 조명이 변해도 적응합니다.
  explanation: |-
    `bs = cv2.createBackgroundSubtractorMOG2(history=30, varThreshold=16, detectShadows=False)` 로 객체를 만든 뒤 매 프레임마다 `mask = bs.apply(frame)` 을 호출합니다. 처음 몇 프레임은 배경 학습 중이라 마스크가 정확하지 않습니다.

    detectShadows=True 이면 그림자를 별도 회색 값으로 표시합니다. 학습용으로는 False가 깔끔합니다.
  tips:
  - MOG2는 객체 내부가 다 채워지지 않는 경우가 있습니다. 후처리로 닫힘 연산을 적용하면 깔끔해집니다.
  snippet: |-
    bs = cv2.createBackgroundSubtractorMOG2(history=30, varThreshold=16, detectShadows=False)
    cap = cv2.VideoCapture(str(videoPath))
    mogMasks = []
    while True:
        ok, frame = cap.read()
        if not ok:
            break
        mask = bs.apply(frame)
        mogMasks.append(mask)
    cap.release()
    len(mogMasks), mogMasks[-1].shape
  exercise:
    prompt: 마지막 프레임의 MOG2 마스크를 시각화하세요.
    starterCode: |-
      finalMask = mogMasks[___]
      fig = plt.figure(figsize=(5, 4))
      plt.imshow(finalMask, cmap='gray')
      plt.title('MOG2 last frame mask')
      plt.axis('off')
      fig
    hints:
    - "-1 은 마지막 인덱스입니다."
    - 마스크는 흑백입니다.
  check:
    noError: MOG2 적용이 오류 없이 끝나야 합니다.
    resultCheck: len(mogMasks) 가 60 정도여야 합니다.
- id: compare
  title: 5단계. 두 방법 비교
  structuredPrimary: true
  subtitle: 마스크 시계열 그리기
  goal: absdiff 기반 마스크와 MOG2 마스크를 같은 프레임에서 비교합니다.
  why: 두 방법의 강약점은 같은 입력에서 비교해야 분명히 보입니다.
  explanation: |-
    같은 프레임 인덱스에서 두 마스크를 나란히 두면 어떤 방법이 어떤 종류의 노이즈에 약한지 시각적으로 명확합니다.

    합성 영상에서는 두 방법 모두 잘 동작하지만 실제 영상에서는 MOG2가 보통 우위입니다.
  tips:
  - 합성 영상에서 두 결과가 너무 비슷하면 임곗값을 바꿔 차이를 만들어 보세요.
  snippet: |-
    cap = cv2.VideoCapture(str(videoPath))
    absMasks = []
    prevGray = None
    while True:
        ok, frame = cap.read()
        if not ok:
            break
        cur = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)
        if prevGray is None:
            absMasks.append(np.zeros_like(cur))
        else:
            d = cv2.absdiff(prevGray, cur)
            _, m = cv2.threshold(d, 25, 255, cv2.THRESH_BINARY)
            absMasks.append(m)
        prevGray = cur
    cap.release()
    len(absMasks)
  exercise:
    prompt: '동일 인덱스(예: 30, 45)에서 두 마스크를 2x2 그리드로 비교 출력하세요.'
    starterCode: |-
      fig, axes = plt.subplots(2, 2, figsize=(8, 6))
      for axis, (idx, label) in zip(axes.ravel(), [(30, 'absdiff'), (30, 'MOG2'), (45, 'absdiff'), (45, 'MOG2')]):
          mask = absMasks[idx] if label == 'absdiff' else mogMasks[idx]
          axis.imshow(mask, cmap='gray')
          axis.set_title(f'{label} frame {idx}')
          axis.axis('off')
      fig
    hints:
    - zip의 두 번째 인자가 라벨 리스트입니다.
    - 같은 프레임의 두 마스크가 다를 수 있습니다.
  check:
    noError: 비교 시각화가 오류 없이 끝나야 합니다.
    resultCheck: len(absMasks) 가 len(mogMasks) 와 같아야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 움직임 면적 시계열
  goal: 영상 전체에 걸쳐 마스크의 흰색 면적을 시간순으로 그래프로 그립니다.
  why: 면적 시계열은 어떤 시점에 객체가 움직였는지를 한눈에 보여줍니다.
  explanation: |-
    각 미션은 import문부터 시작하지만, 위 예제를 실행했다면 import는 생략해도 됩니다.
  tips:
  - 면적 시계열은 후속 강의의 트래커가 언제 시작·종료해야 하는지 결정하는 단서로도 쓰입니다.
  snippet: |-
    absAreas = np.array([m.sum() / 255 for m in absMasks])
    mogAreas = np.array([m.sum() / 255 for m in mogMasks])
    fig = plt.figure(figsize=(8, 3))
    plt.plot(absAreas, label='absdiff', alpha=0.8)
    plt.plot(mogAreas, label='MOG2', alpha=0.8)
    plt.xlabel('frame')
    plt.ylabel('motion pixels')
    plt.legend()
    fig
  exercise:
    prompt: "미션1: MOG2 마스크의 첫·중간·마지막 프레임을 1x3 그리드로 그리세요. 미션2: absMasks와 mogMasks의 평균 면적을 비교 출력하세요."
    starterCode: |-
      fig, axes = plt.subplots(1, 3, figsize=(12, 4))
      indexes = [0, len(mogMasks) // 2, len(mogMasks) - 1]
      for axis, idx in zip(axes, indexes):
          axis.imshow(mogMasks[idx], cmap='gray')
          axis.set_title(f'MOG2 frame {idx}')
          axis.axis('off')
      fig
    hints:
    - "indexes = [0, mid, last] 패턴으로 깔끔하게 나열할 수 있습니다."
    - 평균 면적은 .mean() 한 줄입니다.
  check:
    noError: 면적 계산과 그리기가 오류 없이 끝나야 합니다.
    resultCheck: absAreas와 mogAreas의 길이가 같아야 합니다.
assessment:
  schemaVersion: 1
  performanceClaim: 웹에서는 외부 패키지 없이 분석 판단과 데이터 계약을 검증하고, 실제 패키지 API와 산출물은 lesson Run 및 Local 실습 증거로 분리합니다.
  tierParity:
    web: portable-concept
    local: package-practice-and-artifact
  supportPolicy: 첫 실패는 실제 반환값과 계약 차이를 inline으로 보여주고 정답 전체는 자동 노출하지 않습니다.
  authoring:
    source: curated-blueprint
    solutionVerification: required
    independentReview: pending
  masteryVariants:
  - id: visionFeatures_07-background_subtraction-contract-audit-mastery
    mode: mastery
    unseen: true
    claimScope: portable-concept
    reviewStatus: machine-verified-pending-independent-review
    sourceSectionIds:
    - prepare_video
    - practice
    title: 배경 차분 입력 계약 감사하기
    subtitle: 새 입력으로 핵심 분석 재현
    goal: history·variance threshold·shadow 정책을 검증한다.
    why: worked example을 복사하지 않고 새 레코드에서 같은 분석 판단을 재현해야 개념 숙달을 확인할 수 있습니다.
    explanation: 브라우저의 격리된 Python Worker가 보이지 않던 정상·경계·오류 입력으로 함수를 다시 호출합니다.
    tips: &id001
    - 이미지를 실행하기 전에 shape·dtype·좌표·threshold 계약을 데이터로 검증하세요.
    - Web에서는 불변식 판단을 실행하고 Local에서는 실제 픽셀·렌더 artifact를 확인하세요.
    exercise:
      prompt: audit_background_subtraction_contract(value)를 완성해 주제별 입력 불변식 위반을 반환하세요.
      starterCode: |-
        def audit_background_subtraction_contract(value):
            raise NotImplementedError
      solution: |
        def audit_background_subtraction_contract(value):
            required = ['history', 'varThreshold', 'detectShadows', 'warmupFrames']
            rules = [{'id': 'history', 'field': 'history', 'kind': 'range', 'min': 1, 'max': 100000}, {'id': 'variance', 'field': 'varThreshold', 'kind': 'positive'}, {'id': 'shadows', 'field': 'detectShadows', 'kind': 'enum', 'values': [True, False]}, {'id': 'warmup', 'field': 'warmupFrames', 'kind': 'range', 'min': 0, 'max': 10000}]
            missing = sorted(field for field in required if field not in value)
            violations = []
            for rule in rules:
                field = rule["field"]
                current = value.get(field)
                kind = rule["kind"]
                failed = False
                if kind == "range":
                    failed = not isinstance(current, (int, float)) or isinstance(current, bool) or current < rule["min"] or current > rule["max"]
                elif kind == "enum":
                    failed = current not in rule["values"]
                elif kind == "odd":
                    failed = not isinstance(current, int) or isinstance(current, bool) or current <= 0 or current % 2 == 0
                elif kind == "positive":
                    failed = not isinstance(current, (int, float)) or isinstance(current, bool) or current <= 0
                elif kind == "unit-interval":
                    failed = not isinstance(current, (int, float)) or isinstance(current, bool) or current < 0 or current > 1
                elif kind == "not-equal":
                    failed = current == value.get(rule["other"])
                elif kind == "ordered":
                    other = value.get(rule["other"])
                    failed = not isinstance(current, (int, float)) or isinstance(current, bool) or not isinstance(other, (int, float)) or isinstance(other, bool) or current >= other
                elif kind == "length":
                    failed = not isinstance(current, (list, tuple)) or len(current) != rule["value"]
                elif kind == "divisible":
                    failed = not isinstance(current, int) or isinstance(current, bool) or current % rule["value"] != 0
                elif kind == "nonempty":
                    failed = not isinstance(current, (str, list, tuple, dict)) or len(current) == 0
                if failed:
                    violations.append(rule["id"])
            violations.sort()
