      {'shortMsg': shortMsg, 'hasLengthHint': '4-tuple' in shortMsg}
    hints:
    - 3원소 튜플이라 세 번째 원소만 넣습니다.
    - 빈칸에는 30이 들어갑니다.
    check:
      noError: validateShapeCoords 정의가 끝나야 합니다.
      resultCheck: hasLengthHint가 True여야 합니다.
  check:
