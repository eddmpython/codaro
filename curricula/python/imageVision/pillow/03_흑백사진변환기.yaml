intro:
  emoji: 🎞️
  goal: Lorem Picsum 이미지를 흑백과 세피아 톤으로 변환합니다.
  description: convert() 메서드로 색상 모드를 변환하고, 픽셀 단위 연산으로 세피아 효과를 구현합니다. 이미지의 색상 구조를 이해합니다.
  direction: 흑백사진변환기에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 이미지 파일과 픽셀 값 확인 후 이미지 변환/합성/저장에 맞는 코드 입력을 고릅니다.
  - 흑백사진변환기 결과를 이미지 크기, 모드, 채널, 저장 파일 기준으로 즉시 점검합니다.
  - 완료한 코드를 이미지 일괄 처리 자동화에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 이미지 불러오기 입력 확인
      detail: 입력 기준(이미지 파일과 픽셀 값)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 흑백 변환 처리 실행
      detail: 이미지 변환/합성/저장 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 이진화 (흑백 대비) 결과 검증
      detail: 이미지 크기, 모드, 채널, 저장 파일 기준으로 실행 결과를 비교합니다.
    - label: 흑백사진변환기 재사용
      detail: 완성 코드를 이미지 일괄 처리 자동화에 붙일 수 있게 정리합니다.
    runtime:
    - label: 이미지 처리 환경
      detail: numpy, pillow, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 흑백사진변환기 실행
      detail: 셀을 실행해 이미지 크기, 모드, 채널, 저장 파일와 예외 상태를 확인합니다.
    - label: 흑백사진변환기 완료
      detail: 검증된 코드를 이미지 일괄 처리 자동화로 남깁니다.
sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 샘플 이미지
  goal: 1단계. 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    네트워크 상태에 영향을 받지 않도록 sklearn에 내장된 샘플 이미지를 사용합니다. flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다.

    sklearn에는 flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다. load_sample_image()는 NumPy 배열을 반환하므로 Image.fromarray()로 PIL 이미지로 변환합니다.
  tips:
  - sklearn에는 flower.jpg와 china.jpg 두 개의 샘플 이미지가 있습니다. load_sample_image()는 NumPy 배열을 반환하므로 Image.fromarray()로
    PIL 이미지로 변환합니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    pic = Image.fromarray(flowerArr)
    pic.size, pic.mode
  exercise:
    prompt: 1단계. 이미지 불러오기 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      pic = Image.fromarray(flowerArr)
      pic.size, pic.mode
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 이미지 불러오기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 이미지 불러오기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_grayscale
  title: 2단계. 흑백 변환
  structuredPrimary: true
  subtitle: convert('L')
  goal: 2단계. 흑백 변환에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    convert() 메서드는 이미지의 색상 모드를 변환합니다. 'L' 모드는 그레이스케일(흑백)을 의미합니다. RGB 세 채널이 하나의 밝기 채널로 합쳐집니다. 내부적으로 Y = 0.299R + 0.587G + 0.114B 공식이 사용됩니다.

    L 모드는 0(검정)부터 255(흰색)까지의 밝기 값 하나만 가집니다. 메모리 사용량이 RGB의 1/3입니다. 많은 이미지 처리 알고리즘이 흑백 이미지에서 더 빠르게 동작합니다.
  tips:
  - L 모드는 0(검정)부터 255(흰색)까지의 밝기 값 하나만 가집니다. 메모리 사용량이 RGB의 1/3입니다. 많은 이미지 처리 알고리즘이 흑백 이미지에서 더 빠르게 동작합니다.
  snippet: |-
    gray = pic.convert('L')
    gray.mode
  exercise:
    prompt: 2단계. 흑백 변환 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      gray = pic.convert('L')
      gray.mode
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 흑백 변환의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 흑백 변환 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_threshold
  title: 3단계. 이진화 (흑백 대비)
  structuredPrimary: true
  subtitle: point()
  goal: 3단계. 이진화 (흑백 대비)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    point() 메서드는 각 픽셀에 함수를 적용합니다. 이진화는 특정 임계값을 기준으로 픽셀을 완전한 흑(0) 또는 백(255)으로 변환합니다. 마치 잉크 도장처럼 중간 톤이 없는 고대비 이미지가 됩니다.

    point()의 람다 함수는 각 픽셀 값(0-255)을 받아 새 값을 반환합니다. 이진화에서 임계값을 낮추면 더 많은 영역이 흰색이 되고, 높이면 더 많은 영역이 검은색이 됩니다.
  tips:
  - point()의 람다 함수는 각 픽셀 값(0-255)을 받아 새 값을 반환합니다. 이진화에서 임계값을 낮추면 더 많은 영역이 흰색이 되고, 높이면 더 많은 영역이 검은색이 됩니다.
  snippet: |-
    threshold = 128
    binary = gray.point(lambda x: 255 if x > threshold else 0)
    binary.mode
  exercise:
    prompt: 3단계. 이진화 (흑백 대비) 예제에서 조건값을 바꾸고 선택되는 분기와 결과가 달라지는지 확인하세요.
    starterCode: |-
      threshold = 128
      binary = gray.point(lambda x: 255 if x > threshold else 0)
      binary.mode
    hints:
    - 바꿀 지점은 if 조건식에 들어가는 비교값이나 boolean 값에서 찾으세요.
    - 실행 뒤 true/false 분기 중 어떤 코드가 평가됐는지 출력이나 변수값으로 확인하세요.
  check:
    noError: 3단계. 이진화 (흑백 대비)의 조건식과 들여쓰기가 맞아 선택한 분기가 실행되어야 합니다.
    resultCheck: 3단계. 이진화 (흑백 대비) 분기 결과가 바꾼 조건값에 맞게 달라져야 합니다.
- id: step4_sepia
  title: 4단계. 세피아 효과
  structuredPrimary: true
  subtitle: 픽셀 연산
  goal: 4단계. 세피아 효과에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    세피아는 오래된 사진 느낌을 주는 갈색 톤입니다. 흑백 이미지를 RGB로 다시 변환한 뒤, R/G/B 각 채널에 다른 계수를 곱해 세피아 톤을 만듭니다. split()으로 채널을 분리하고 merge()로 합칩니다.

    split()은 RGB 이미지를 세 개의 L 모드 이미지로 분리합니다. 흑백을 RGB로 변환하면 R=G=B가 동일한 값을 가집니다. 각 채널을 개별 조작한 뒤 merge()로 합칠 수 있습니다.
  tips:
  - split()은 RGB 이미지를 세 개의 L 모드 이미지로 분리합니다. 흑백을 RGB로 변환하면 R=G=B가 동일한 값을 가집니다. 각 채널을 개별 조작한 뒤 merge()로
    합칠 수 있습니다.
  snippet: |-
    grayRgb = gray.convert('RGB')
    grayRgb.mode
  exercise:
    prompt: 4단계. 세피아 효과 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      grayRgb = gray.convert('RGB')
      grayRgb.mode
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 4단계. 세피아 효과의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 세피아 효과 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step5_compare
  title: 5단계. 결과 비교
  structuredPrimary: true
  subtitle: 변환 전후
  goal: 5단계. 결과 비교에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 원본, 흑백, 이진화, 세피아 네 가지 버전을 비교해봅시다. 각 변환이 이미지의 분위기를 어떻게 바꾸는지 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    modes = {
        'original': pic.mode,
        'gray': gray.mode,
        'binary': binary.mode,
        'sepia': sepia.mode
    }
    modes
  exercise:
    prompt: 5단계. 결과 비교 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      modes = {
          'original': pic.mode,
          'gray': gray.mode,
          'binary': binary.mode,
          'sepia': sepia.mode
      }
      modes
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 결과 비교의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 결과 비교 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 색상 변환 응용
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    sklearn 이미지에 흑백과 세피아 변환을 적용해봅시다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

