  exercise:
    prompt: 실습 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      bloomArr = load_sample_image('flower.jpg')
      bloom = Image.fromarray(bloomArr)
      bloom.mode
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 실습의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 실습 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: workflow_validation
  title: 6단계. 흑백 변환 검증 루프
  structuredPrimary: true
  subtitle: mode와 이진화 기준 확인
  goal: 6단계. 흑백 변환 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 흑백 변환은 convert('L') 한 줄로 끝나지 않습니다. 입력 mode를 확인하고, 이진화 결과가 실제로 0과 255만 가지는지, 임계값 변화가 전경
    비율을 어떻게 바꾸는지 검증합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw
    import numpy as np

    toneImage = Image.new("RGB", (160, 100), (40, 80, 130))
    toneDraw = ImageDraw.Draw(toneImage)
    toneDraw.rectangle((20, 20, 75, 80), fill=(230, 220, 170))
    toneDraw.rectangle((90, 20, 140, 80), fill=(120, 60, 40))

    def validateRgbSource(image):
        if image.mode != "RGB":
            raise ValueError(f"RGB 원본이 필요합니다: {image.mode}")
        return True

    validateRgbSource(toneImage)
  exercise:
