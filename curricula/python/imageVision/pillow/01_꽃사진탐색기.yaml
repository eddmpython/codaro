  goal: 5단계. 나란히 비교에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 원본 이미지와 생성한 썸네일, 리사이즈 이미지를 비교해봅시다. 각각의 크기 차이를 확인할 수 있습니다.
  tips:
