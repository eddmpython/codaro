intro:
  emoji: 🌸
  goal: sklearn의 꽃 이미지를 열어 기본 정보를 확인하고 썸네일을 생성합니다.
  description: 이미지 파일을 열고, 크기(size), 색상 모드(mode), 포맷(format)을 확인합니다. 또한 thumbnail() 메서드로 작은 미리보기 이미지를
    만들어봅니다.
  direction: 꽃사진탐색기에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 이미지 파일과 픽셀 값 확인 후 이미지 변환/합성/저장에 맞는 코드 입력을 고릅니다.
  - 꽃사진탐색기 결과를 이미지 크기, 모드, 채널, 저장 파일 기준으로 즉시 점검합니다.
  - 완료한 코드를 이미지 일괄 처리 자동화에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리와 이미지 입력 확인
      detail: 입력 기준(이미지 파일과 픽셀 값)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 이미지 정보 확인 처리 실행
      detail: 이미지 변환/합성/저장 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 썸네일 생성 결과 검증
      detail: 이미지 크기, 모드, 채널, 저장 파일 기준으로 실행 결과를 비교합니다.
    - label: 꽃사진탐색기 재사용
      detail: 완성 코드를 이미지 일괄 처리 자동화에 붙일 수 있게 정리합니다.
    runtime:
    - label: 이미지 처리 환경
      detail: pillow, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 꽃사진탐색기 실행
      detail: 셀을 실행해 이미지 크기, 모드, 채널, 저장 파일와 예외 상태를 확인합니다.
    - label: 꽃사진탐색기 완료
      detail: 검증된 코드를 이미지 일괄 처리 자동화로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리와 이미지 불러오기
  structuredPrimary: true
  subtitle: sklearn 내장 이미지
  goal: 1단계. 라이브러리와 이미지 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    sklearn에는 학습용 샘플 이미지가 내장되어 있습니다. load_sample_image() 함수로 china.jpg와 flower.jpg를 불러올 수 있습니다. 이 이미지는 NumPy 배열로 반환되므로 Pillow의 Image.fromarray()로 변환합니다.

    load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB 3채널입니다.
  tips:
  - load_sample_image()는 NumPy 배열(height, width, 3)을 반환합니다. shape은 (427, 640, 3)으로 높이 427, 너비 640, RGB
    3채널입니다.
  snippet: |-
    from PIL import Image
    from sklearn.datasets import load_sample_image

    flowerArr = load_sample_image('flower.jpg')
    flowerArr.shape
  exercise:
    prompt: 1단계. 라이브러리와 이미지 불러오기 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      from PIL import Image
      from sklearn.datasets import load_sample_image

      flowerArr = load_sample_image('flower.jpg')
      flowerArr.shape
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 라이브러리와 이미지 불러오기의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 라이브러리와 이미지 불러오기 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_info
  title: 2단계. 이미지 정보 확인
  structuredPrimary: true
  subtitle: size, mode, format
  goal: 2단계. 이미지 정보 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: Pillow Image 객체는 여러 속성을 제공합니다. size는 (너비, 높이) 튜플, mode는 색상 모드(RGB, L 등), format은 파일 포맷입니다.
    배열에서 변환한 이미지는 format이 None입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    width, height = img.size
    width, height
  exercise:
    prompt: 2단계. 이미지 정보 확인 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      width, height = img.size
      width, height
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 2단계. 이미지 정보 확인의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 이미지 정보 확인 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_thumbnail
  title: 3단계. 썸네일 생성
  structuredPrimary: true
  subtitle: thumbnail()
  goal: 3단계. 썸네일 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    thumbnail() 메서드는 이미지를 지정한 크기 내에 맞게 축소합니다. 원본 비율을 유지하면서 최대 크기를 제한합니다. 주의할 점은 thumbnail()이 원본 이미지를 직접 수정한다는 것입니다. 원본을 보존하려면 copy()로 복사본을 만들어야 합니다.

    thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를 사용하세요.
  tips:
  - thumbnail()은 비율을 유지합니다. (150, 150)을 지정해도 원본이 640x427이면 결과는 150x100 정도가 됩니다. 정확한 크기가 필요하면 resize()를
    사용하세요.
  snippet: |-
    thumb = img.copy()
    thumb.size
  exercise:
    prompt: 3단계. 썸네일 생성 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      thumb = img.copy()
      thumb.size
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 썸네일 생성의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 썸네일 생성 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_resize
  title: 4단계. 리사이즈
  structuredPrimary: true
  subtitle: resize()
  goal: 4단계. 리사이즈에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    resize()는 정확한 크기로 이미지를 변환합니다. thumbnail()과 달리 비율을 무시하고 지정한 크기로 변환합니다. resize()는 새 이미지를 반환하고 원본은 유지됩니다.

    resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율 계산 후 resize()를 사용하세요.
  tips:
  - resize()는 원본 비율을 무시합니다. 원본이 640x427인데 200x200으로 변환하면 가로가 압축되어 찌그러집니다. 비율 유지가 필요하면 thumbnail()이나 비율
    계산 후 resize()를 사용하세요.
  snippet: |-
    square = img.resize((200, 200))
    square.size
  exercise:
    prompt: 4단계. 리사이즈 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      square = img.resize((200, 200))
      square.size
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 4단계. 리사이즈의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 리사이즈 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
