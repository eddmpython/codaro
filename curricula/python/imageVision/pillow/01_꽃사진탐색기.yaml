  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    sklearn의 china.jpg 이미지를 불러와 정보를 확인하고 썸네일을 생성해봅시다. 위에서 배운 size, mode 속성 확인과 thumbnail(), resize() 메서드를 직접 적용해봅니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
