    resultCheck: 실습 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: workflow_validation
  title: 6단계. 이미지 메타데이터 검증 루프
  structuredPrimary: true
  subtitle: size, mode, thumbnail 확인
  goal: 6단계. 이미지 메타데이터 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 이미지를 여는 법을 배웠다면 다음 단계는 입력 이미지가 기대한 크기와 mode인지 검증하는 것입니다. 로컬에서 꽃 모양 이미지를 만들고 썸네일 생성 규칙을
    assert로 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from PIL import Image, ImageDraw, ImageStat

    flowerImage = Image.new("RGB", (180, 120), (235, 245, 255))
    flowerDraw = ImageDraw.Draw(flowerImage)
    for box in [(55, 20, 95, 60), (85, 20, 125, 60), (55, 55, 95, 95), (85, 55, 125, 95)]:
        flowerDraw.ellipse(box, fill=(238, 90, 150))
    flowerDraw.ellipse((75, 45, 105, 75), fill=(245, 210, 70))

    def validateImageInfo(image):
        if image.mode != "RGB":
            raise ValueError(f"RGB 이미지가 아닙니다: {image.mode}")
        if image.size[0] < 100 or image.size[1] < 80:
            raise ValueError(f"이미지가 너무 작습니다: {image.size}")
        return True

    validateImageInfo(flowerImage)
  exercise:
    prompt: 6단계. 이미지 메타데이터 검증 루프 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      from PIL import Image, ImageDraw, ImageStat

      flowerImage = Image.new("RGB", (180, 120), (235, 245, 255))
      flowerDraw = ImageDraw.Draw(flowerImage)
      for box in [(55, 20, 95, 60), (85, 20, 125, 60), (55, 55, 95, 95), (85, 55, 125, 95)]:
          flowerDraw.ellipse(box, fill=(238, 90, 150))
      flowerDraw.ellipse((75, 45, 105, 75), fill=(245, 210, 70))

      def validateImageInfo(image):
