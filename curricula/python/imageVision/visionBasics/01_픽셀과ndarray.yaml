  title: 픽셀과 ndarray
  order: 1
  category: visionBasics
  difficulty: ⭐
  badge: 입문
  packages:
  - matplotlib
  - numpy
  tags:
  - numpy
  - ndarray
  - uint8
  - 픽셀
  - 이미지구조
  seo:
    title: 이미지 비전 기초 - 픽셀과 ndarray
    description: 이미지가 numpy 배열로 어떻게 표현되는지 배웁니다. dtype, shape, 채널 수를 직접 만들고 확인합니다.
    keywords:
    - numpy
