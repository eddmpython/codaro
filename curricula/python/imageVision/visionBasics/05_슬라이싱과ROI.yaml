meta:
  id: visionBasics_05
  title: 슬라이싱과 ROI
  order: 5
  category: visionBasics
  difficulty: ⭐⭐
  badge: 기초
  packages:
  - matplotlib
  - numpy
  - scikit-learn
  tags:
  - numpy
  - 슬라이싱
  - ROI
  - 영역추출
  - 합성
  seo:
    title: 이미지 비전 기초 - 슬라이싱과 ROI
    description: 슬라이싱으로 이미지의 관심 영역을 추출하고 다른 위치에 붙입니다. view와 copy의 차이도 정리합니다.
    keywords:
    - numpy
    - 슬라이싱
    - ROI
