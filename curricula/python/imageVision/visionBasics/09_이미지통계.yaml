    - label: 5단계. 노출 진단
      detail: 통계로 사진의 노출 상태를 분류합니다.
    runtime:
    - label: numpy 통계 함수
      detail: numpy의 mean, std, percentile, histogram을 로컬 Python에서 호출합니다.
    - label: 검증 흐름
      detail: 통계 결과와 자동 임계값을 assert와 시각 비교로 확인합니다.
sections:
- id: mean_std
  title: 1단계. 평균과 표준편차
  structuredPrimary: true
  subtitle: 사진의 밝기와 대비를 숫자로
  goal: 사진 전체의 평균(밝기)과 표준편차(대비)를 한 줄로 계산합니다.
  why: 사진을 숫자 두 개로 요약할 수 있으면 보정 전후 비교가 객관화됩니다.
  explanation: |-
    `img.mean()` 은 전체 픽셀의 평균이고 `img.std()` 는 표준편차입니다. 평균이 낮으면 어두운 사진, 표준편차가 낮으면 대비가 부족한 사진입니다.

    컬러 이미지에 그대로 적용하면 모든 채널이 함께 평균됩니다. 채널별로 보려면 `axis=(0, 1)` 을 지정합니다.
  tips:
  - 평균과 표준편차는 numpy의 가장 기본 함수입니다. 비전 코드에서 무엇보다 자주 호출됩니다.
  snippet: |-
    import numpy as np
    import matplotlib.pyplot as plt
    from sklearn.datasets import load_sample_image

    china = load_sample_image('china.jpg')
    overallMean = china.mean()
    overallStd = china.std()
    overallMean, overallStd
  exercise:
    prompt: flower 이미지의 평균과 표준편차를 계산하고 china와 비교하세요.
    starterCode: |-
      flower = load_sample_image('flower.jpg')
      flowerMean = flower.___()
      flowerStd = flower.___()
      flowerMean, flowerStd
    hints:
    - 빈칸은 모두 메서드 이름 한 단어입니다.
    - 두 결과를 비교하면 사진의 분위기 차이가 숫자로 보입니다.
  check:
    noError: 메서드 호출이 오류 없이 끝나야 합니다.
    resultCheck: 두 값이 모두 0보다 큰 float이어야 합니다.
- id: channel_stats
  title: 2단계. 채널별 통계
  structuredPrimary: true
  subtitle: R/G/B 평균으로 색 균형 보기
  goal: 채널별 평균을 비교해 사진의 색 편향을 진단합니다.
  why: 사진이 누렇거나 푸르스름한지는 채널 평균 차이를 보면 즉시 알 수 있습니다.
  explanation: |-
    `img.mean(axis=(0, 1))` 는 마지막 차원(채널)만 남기고 평균을 냅니다. 결과는 길이 3 배열로 R, G, B 평균이 차례로 들어 있습니다.

    어느 채널이 두드러지게 크거나 작으면 그 색이 사진을 지배합니다. 화이트밸런스의 직접적인 진단 지표입니다.
  tips:
  - axis=(0, 1) 은 두 축 모두를 따라 평균을 의미합니다. 마지막 축이 남는 것이 특징입니다.
  snippet: |-
    channelMean = china.mean(axis=(0, 1))
    channelStd = china.std(axis=(0, 1))
    {"mean": channelMean.tolist(), "std": channelStd.tolist()}
  exercise:
    prompt: flower의 채널별 평균을 구해 어떤 색이 가장 두드러지는지 확인하세요.
    starterCode: |-
      flowerChannelMean = flower.mean(axis=(___, ___))
      flowerChannelMean.tolist()
    hints:
    - axis 인자는 튜플입니다.
    - 결과가 [R, G, B] 순서임을 기억하세요.
  check:
    noError: 평균 계산이 오류 없이 끝나야 합니다.
    resultCheck: flowerChannelMean의 길이가 3이어야 합니다.
- id: histogram
  title: 3단계. 히스토그램
  structuredPrimary: true
  subtitle: 픽셀 분포 보기
  goal: np.histogram과 plt.hist로 픽셀 값 분포를 그립니다.
  why: 히스토그램은 노출과 대비 진단의 표준 도구입니다. 한 장의 그림이 평균 한 줄보다 많은 정보를 줍니다.
  explanation: |-
    `np.histogram(img.ravel(), bins=256, range=(0, 256))` 는 0~255 각 값의 개수를 반환합니다. plt.hist는 이를 시각화합니다.

    히스토그램이 왼쪽으로 몰리면 어두운 사진, 오른쪽으로 몰리면 밝은 사진, 양 끝 모두에 있으면 대비가 강한 사진입니다.
  tips:
  - 히스토그램을 보면 보정 방향이 정해집니다. 자료를 그래프로 그리는 한 줄을 항상 먼저 실행하세요.
  snippet: |-
    gray = (china.astype(np.float32) * np.array([0.299, 0.587, 0.114])).sum(axis=2).astype(np.uint8)
    fig = plt.figure(figsize=(6, 3))
    plt.hist(gray.ravel(), bins=64, range=(0, 256), color='gray')
    plt.title('gray histogram')
    plt.xlabel('value')
    plt.ylabel('count')
    fig
  exercise:
    prompt: 세 채널의 히스토그램을 동일 차트에 빨강·녹색·파랑 색으로 그리세요.
    starterCode: |-
      fig2 = plt.figure(figsize=(6, 3))
      colors = ['red', 'green', 'blue']
      for idx, name in enumerate(colors):
          plt.hist(china[:, :, idx].ravel(), bins=64, range=(0, 256), color=name, alpha=___)
      plt.title('RGB histograms')
      fig2
    hints:
    - 투명도 alpha를 0.4 정도 두면 겹친 히스토그램이 보입니다.
    - ravel은 다차원 배열을 1차원으로 폅니다.
  check:
    noError: 히스토그램 그리기가 오류 없이 끝나야 합니다.
    resultCheck: figure가 마지막 줄에 평가되어야 합니다.
- id: percentile_threshold
  title: 4단계. percentile 자동 임계값
  structuredPrimary: true
  subtitle: 사진마다 적합한 임계값을 자동으로
  goal: percentile로 사진별 자동 임계값을 정해 이진화합니다.
  why: 사진마다 적절한 임계값이 다르므로 고정값으로는 잘 안 됩니다. percentile은 분포 기반으로 자동 조정합니다.
  explanation: |-
    `np.percentile(gray, 90)` 은 상위 10% 픽셀이 시작하는 값을 반환합니다. 이 값을 임계값으로 쓰면 상위 10%만 흰색으로 남는 이진화가 됩니다.

    임계값 90 percentile은 밝은 영역 강조에, 50 percentile은 평균 분할에 어울립니다. 사진마다 자동으로 적응합니다.
  tips:
  - percentile은 정렬된 값에서 지정한 비율 위치의 값을 반환합니다. 50은 중앙값과 같습니다.
  snippet: |-
    p90 = np.percentile(gray, 90)
    autoBinary = (gray > p90).astype(np.uint8) * 255
    fig = plt.figure(figsize=(5, 4))
    plt.imshow(autoBinary, cmap='gray')
    plt.title(f'>p90 ({p90:.1f})')
    plt.axis('off')
    fig
  exercise:
    prompt: 30 percentile 임계값으로 어두운 영역만 추출하는 darkBinary를 만드세요(임계값 미만이 흰색).
    starterCode: |-
      p30 = np.percentile(gray, ___)
      darkBinary = (gray ___ p30).astype(np.uint8) * 255
      fig2 = plt.figure(figsize=(5, 4))
      plt.imshow(darkBinary, cmap='gray')
      plt.title(f'<p30 ({p30:.1f})')
      plt.axis('off')
      fig2
    hints:
    - 어두운 영역은 임계값 미만입니다.
    - percentile 30은 분포의 하위 30% 경계입니다.
  check:
    noError: percentile과 이진화가 오류 없이 끝나야 합니다.
    resultCheck: p30이 p90보다 작은 값이어야 합니다.
- id: diagnose
  title: 5단계. 노출 진단
  structuredPrimary: true
  subtitle: 통계로 사진 분류
  goal: 평균과 표준편차로 사진의 노출 상태를 자동 분류합니다.
  why: 진단 규칙을 코드로 표현해 두면 대량 사진을 자동으로 분류할 수 있습니다.
  explanation: |-
    평균이 100 미만이면 어두운 사진, 200 초과이면 너무 밝은 사진, 표준편차가 40 미만이면 대비 부족 사진으로 분류할 수 있습니다. 이런 규칙은 데이터셋 정제에서 자주 쓰입니다.

    실제 서비스에서는 더 정교한 임계값과 percentile을 조합하지만, 기본 아이디어는 단순한 if-elif입니다.
  tips:
  - 진단 함수에 사진 한 장과 결과 한 줄을 입력·출력으로 정의해 두면 배치 처리 코드에 그대로 이식할 수 있습니다.
  snippet: |-
    def diagnose(img):
        flat = img.mean(axis=2) if img.ndim == 3 else img
        avg = flat.mean()
        spread = flat.std()
        if avg < 80:
            tag = "어두움"
        elif avg > 200:
            tag = "밝음"
        elif spread < 30:
            tag = "대비부족"
        else:
            tag = "정상"
        return {"mean": float(avg), "std": float(spread), "tag": tag}

    diagnose(china)
  exercise:
    prompt: flower 이미지를 진단하고, 같은 사진을 임의로 (밝기 +80, 대비 0.5배)로 망친 뒤 다시 진단해 보세요.
    starterCode: |-
      flowerDiag = diagnose(flower)
      broken = ((flower.astype(np.float32) - 128) * ___ + 128 + 80).clip(0, 255).astype(np.uint8)
      brokenDiag = diagnose(broken)
      flowerDiag, brokenDiag
    hints:
    - 대비 0.5배는 mid 128을 기준으로 픽셀을 모으는 효과입니다.
    - 같은 진단 함수를 두 번 호출하면 됩니다.
  check:
    noError: 함수 정의와 호출이 오류 없이 끝나야 합니다.
    resultCheck: brokenDiag의 mean이 flowerDiag의 mean보다 커야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 통계로 풀기
  goal: 통계와 임계값 기반의 종합 미션을 풉니다.
  why: 평균·표준편차·percentile을 한 화면에 모으면 사진 분석 보고서 한 장이 됩니다.
  explanation: |-
    각 미션은 import문부터 시작하지만, 위 예제를 실행했다면 import는 생략해도 됩니다.
  tips:
  - 통계만으로도 단순 보정 도구를 만들 수 있다는 점이 이 강의의 결론입니다.
  snippet: |-
    flower = load_sample_image('flower.jpg')

    p5 = np.percentile(gray, 5)
    p95 = np.percentile(gray, 95)
    stretched = ((gray.astype(np.float32) - p5) / max(p95 - p5, 1.0) * 255).clip(0, 255).astype(np.uint8)
    fig = plt.figure(figsize=(5, 4))
    plt.imshow(stretched, cmap='gray')
    plt.axis('off')
    fig
  exercise:
    prompt: "미션1: flower 이미지의 채널별 평균을 막대 그래프로 그리세요(R, G, B 한 칸씩). 미션2: 위 stretched 패턴(percentile 5~95 정규화)을 함수 stretch(img) 로 만들고 china와 flower에 각각 적용해 비교 출력하세요."
    starterCode: |-
      def stretch(img):
          flat = img if img.ndim == 2 else (img.astype(np.float32) * np.array([0.299, 0.587, 0.114])).sum(axis=2)
          lo = np.percentile(flat, 5)
          hi = np.percentile(flat, 95)
          out = ((flat.astype(np.float32) - lo) / max(hi - lo, 1.0) * 255).clip(0, 255).astype(np.uint8)
          return out

      chinaStretch = stretch(china)
      flowerStretch = stretch(flower)
      fig, axes = plt.subplots(1, 2, figsize=(10, 4))
      axes[0].imshow(chinaStretch, cmap='gray')
      axes[0].set_title('china stretched')
      axes[1].imshow(flowerStretch, cmap='gray')
      axes[1].set_title('flower stretched')
      for axis in axes:
          axis.axis('off')
      fig
    hints:
    - max(hi - lo, 1.0) 은 분모가 0이 되는 것을 막는 안전 장치입니다.
    - "막대 그래프는 plt.bar(['R', 'G', 'B'], channelMean) 한 줄입니다."
  check:
    noError: stretch 함수 정의와 호출이 오류 없이 끝나야 합니다.
    resultCheck: chinaStretch.dtype 이 uint8여야 합니다.
