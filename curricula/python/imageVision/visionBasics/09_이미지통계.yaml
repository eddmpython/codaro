intro:
  emoji: 📊
  goal: 이미지의 통계량을 직접 계산해 자동 임계값과 노출 진단의 기초를 만듭니다.
  description: |-
    "이 사진이 너무 어둡다", "콘트라스트가 부족하다" 같은 직관도 숫자로 표현할 수 있습니다. 평균은 전체 밝기, 표준편차는 대비, percentile은 분포의 양 끝을 알려 줍니다. 이 강의는 numpy 통계 함수로 사진을 분석하고, 통계 기반으로 자동 임계값을 정하는 패턴을 배웁니다.
  direction: 평균·표준편차·히스토그램·percentile을 직접 계산해 사진 한 장을 숫자로 진단합니다.
  benefits:
  - 사진의 밝기와 대비를 숫자 한두 개로 표현할 수 있습니다.
  - 히스토그램을 보고 노출 부족·과다·콘트라스트 부족을 구분할 수 있습니다.
  - percentile로 자동 임계값을 정해 사용자 입력 없이 이진화할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 평균과 표준편차
      detail: 사진의 밝기와 대비 지표를 계산합니다.
    - label: 2단계. 채널별 통계
      detail: R/G/B 각각의 평균으로 색 균형을 봅니다.
    - label: 3단계. 히스토그램
