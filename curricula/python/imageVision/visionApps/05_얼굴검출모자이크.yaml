    exercise:
      prompt: reconcile_face_mosaic_result(expected, observed)를 완성하세요.
      starterCode: |-
        def reconcile_face_mosaic_result(expected, observed):
            raise NotImplementedError
      solution: |
        def reconcile_face_mosaic_result(expected, observed):
            identity = ['sourceHash', 'detectorHash', 'consentId']
            metrics = {'redactedFaceCount': 0}
            required = set(identity) | set(metrics)
            missing = sorted(required - set(observed))
            identity_mismatch = sorted(field for field in identity if field in observed and observed[field] != expected.get(field))
            metric_drift = []
            for field, tolerance in metrics.items():
                if field not in observed:
                    continue
                actual = observed[field]
                target = expected.get(field)
                if not isinstance(actual, (int, float)) or isinstance(actual, bool) or not isinstance(target, (int, float)) or isinstance(target, bool) or abs(actual - target) > tolerance:
                    metric_drift.append(field)
            metric_drift.sort()
            return {"passed": not missing and not identity_mismatch and not metric_drift, "topic": 'face_mosaic', "missing": missing, "identityMismatch": identity_mismatch, "metricDrift": metric_drift}
