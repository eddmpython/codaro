    - label: 컴퓨터 비전 환경
      detail: matplotlib, numpy, opencvpython, scikitlearn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 모폴로지연산기 실행
      detail: 셀을 실행해 shape, dtype, 채널, 검출 개수와 예외 상태를 확인합니다.
    - label: 모폴로지연산기 완료
      detail: 검증된 코드를 비전 처리 파이프라인로 남깁니다.
sections:
- id: step1_create
  title: 1단계. 테스트 이미지 생성
  structuredPrimary: true
  subtitle: 합성 이미지
  goal: 1단계. 테스트 이미지 생성에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 모폴로지 연산 효과를 명확하게 보기 위해 도형이 있는 합성 이미지를 생성합니다. 노이즈도 추가하여 제거 효과를 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np
    import matplotlib.pyplot as plt

    base = np.zeros((300, 400), dtype=np.uint8)
    cv2.rectangle(base, (50, 50), (150, 150), 255, -1)
    cv2.circle(base, (280, 100), 60, 255, -1)
    cv2.rectangle(base, (100, 180), (300, 250), 255, -1)
    plt.figure(figsize=(8, 6))
    plt.imshow(base, cmap='gray')
    plt.title('Base Image')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 1단계. 테스트 이미지 생성 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np
      import matplotlib.pyplot as plt

      base = np.zeros((300, 400), dtype=np.uint8)
      cv2.rectangle(base, (50, 50), (150, 150), 255, -1)
      cv2.circle(base, (280, 100), 60, 255, -1)
      cv2.rectangle(base, (100, 180), (300, 250), 255, -1)
      plt.figure(figsize=(8, 6))
      plt.imshow(base, cmap='gray')
      plt.title('Base Image')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 1단계. 테스트 이미지 생성의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 1단계. 테스트 이미지 생성 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step2_kernel
  title: 2단계. 구조 요소
  structuredPrimary: true
  subtitle: getStructuringElement()
  goal: 2단계. 구조 요소에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    모폴로지 연산에는 커널(kernel) 또는 구조 요소(structuring element)가 필요합니다. 구조 요소는 연산이 적용되는 이웃 픽셀의 패턴을 정의합니다. 사각형, 타원형, 십자형 등 다양한 모양이 있으며, 크기와 모양에 따라 연산 결과가 달라집니다.

    MORPH_RECT는 사각형, MORPH_ELLIPSE는 타원형, MORPH_CROSS는 십자 모양입니다. 커널이 클수록 효과가 강해지지만 디테일이 손실됩니다.
  tips:
  - MORPH_RECT는 사각형, MORPH_ELLIPSE는 타원형, MORPH_CROSS는 십자 모양입니다. 커널이 클수록 효과가 강해지지만 디테일이 손실됩니다.
  snippet: |-
    kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
    kernelSmall
  exercise:
    prompt: 2단계. 구조 요소 예제에서 이미지 크기, 색상, 임계값, 필터 설정 중 하나를 바꾸고 결과 배열을 확인하세요.
    starterCode: |-
      kernelSmall = cv2.getStructuringElement(cv2.MORPH_RECT, (3, 3))
      kernelSmall
    hints:
    - 바꿀 지점은 이미지 로드, resize, 색공간 변환, threshold/filter 인자입니다.
    - 실행 뒤 shape, dtype, 채널 수, 검출 개수, 저장 파일이 바뀐 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 구조 요소의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 구조 요소 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step3_erode
  title: 3단계. 침식 연산
  structuredPrimary: true
  subtitle: erode()
  goal: 3단계. 침식 연산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    erode()는 침식(erosion) 연산으로, 커널 영역 내 최소값으로 중심 픽셀을 대체합니다. 이진 이미지에서 커널 범위 안에 검은 픽셀(0)이 하나라도 있으면 중심이 검은색이 됩니다. 결과적으로 흰색 영역(전경)이 깎여나가며, 객체 경계가 안쪽으로 수축합니다. 작은 흰색 노이즈 제거나 붙어있는 객체 분리에 사용됩니다.

    iterations=2는 침식을 2번 반복합니다. 반복할수록 흰색 영역이 더 많이 축소됩니다. 큰 커널과 적은 반복 또는 작은 커널과 많은 반복을 선택할 수 있습니다.
  tips:
  - iterations=2는 침식을 2번 반복합니다. 반복할수록 흰색 영역이 더 많이 축소됩니다. 큰 커널과 적은 반복 또는 작은 커널과 많은 반복을 선택할 수 있습니다.
  snippet: |-
    eroded = cv2.erode(noisy, kernelSmall, iterations=1)
    plt.figure(figsize=(8, 6))
    plt.imshow(eroded, cmap='gray')
    plt.title('Eroded')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 3단계. 침식 연산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      eroded = cv2.erode(noisy, kernelSmall, iterations=1)
      plt.figure(figsize=(8, 6))
      plt.imshow(eroded, cmap='gray')
      plt.title('Eroded')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 침식 연산의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 침식 연산 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step4_dilate
  title: 4단계. 팽창 연산
  structuredPrimary: true
  subtitle: dilate()
  goal: 4단계. 팽창 연산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: dilate()는 팽창(dilation) 연산으로, 커널 영역 내 최대값으로 중심 픽셀을 대체합니다. 이진 이미지에서 커널 범위 안에 흰 픽셀(255)이 하나라도
    있으면 중심이 흰색이 됩니다. 결과적으로 흰색 영역(전경)이 바깥으로 확장됩니다. 끊어진 선 연결, 작은 구멍 채우기, 객체 강조에 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    dilated = cv2.dilate(noisy, kernelSmall, iterations=1)
    plt.figure(figsize=(8, 6))
    plt.imshow(dilated, cmap='gray')
    plt.title('Dilated')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 4단계. 팽창 연산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      dilated = cv2.dilate(noisy, kernelSmall, iterations=1)
      plt.figure(figsize=(8, 6))
      plt.imshow(dilated, cmap='gray')
      plt.title('Dilated')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 4단계. 팽창 연산의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 팽창 연산 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step5_open
  title: 5단계. 열기 연산
  structuredPrimary: true
  subtitle: MORPH_OPEN
  goal: 5단계. 열기 연산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    열기(Opening)는 침식(erode) 후 팽창(dilate)을 수행하는 연산입니다. 먼저 침식으로 작은 흰색 노이즈를 제거한 후, 팽창으로 원래 객체 크기를 복원합니다. 노이즈는 사라지고 큰 객체는 유지됩니다. 이름의 유래는 연산 후 객체 사이의 좁은 연결이 '열리기(open)' 때문입니다.

    morphologyEx()는 다양한 모폴로지 연산을 수행합니다. MORPH_OPEN은 erode 후 dilate와 동일합니다. 한 번의 호출로 두 연산을 처리합니다.
  tips:
  - morphologyEx()는 다양한 모폴로지 연산을 수행합니다. MORPH_OPEN은 erode 후 dilate와 동일합니다. 한 번의 호출로 두 연산을 처리합니다.
  snippet: |-
    opened = cv2.morphologyEx(noisy, cv2.MORPH_OPEN, kernelSmall)
    plt.figure(figsize=(8, 6))
    plt.imshow(opened, cmap='gray')
    plt.title('Opened')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 5단계. 열기 연산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      opened = cv2.morphologyEx(noisy, cv2.MORPH_OPEN, kernelSmall)
      plt.figure(figsize=(8, 6))
      plt.imshow(opened, cmap='gray')
      plt.title('Opened')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 열기 연산의 이미지 입력, 배열 shape, 처리 인자가 변환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 열기 연산 결과의 크기, 모드, 채널, 검출 개수, 저장 파일이 바꾼 설정을 반영해야 합니다.
- id: step6_close
  title: 6단계. 닫기 연산
  structuredPrimary: true
  subtitle: MORPH_CLOSE
  goal: 6단계. 닫기 연산에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: |-
    닫기(Closing)는 팽창(dilate) 후 침식(erode)을 수행하는 연산입니다. 먼저 팽창으로 작은 구멍이나 틈을 채운 후, 침식으로 원래 객체 크기를 복원합니다. 객체 내부의 검은 구멍이 사라집니다. 이름의 유래는 연산 후 객체 내부의 작은 구멍이 '닫히기(close)' 때문입니다.

    열기로 외부 노이즈를 제거하고 닫기로 내부 구멍을 메우면 깔끔한 결과를 얻습니다. 순서에 따라 결과가 달라질 수 있습니다.
  tips:
  - 열기로 외부 노이즈를 제거하고 닫기로 내부 구멍을 메우면 깔끔한 결과를 얻습니다. 순서에 따라 결과가 달라질 수 있습니다.
  snippet: |-
    closed = cv2.morphologyEx(noisy, cv2.MORPH_CLOSE, kernelSmall)
    plt.figure(figsize=(8, 6))
    plt.imshow(closed, cmap='gray')
    plt.title('Closed')
    plt.axis('off')
    plt.tight_layout()
  exercise:
    prompt: 6단계. 닫기 연산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      closed = cv2.morphologyEx(noisy, cv2.MORPH_CLOSE, kernelSmall)
      plt.figure(figsize=(8, 6))
      plt.imshow(closed, cmap='gray')
      plt.title('Closed')
      plt.axis('off')
      plt.tight_layout()
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
