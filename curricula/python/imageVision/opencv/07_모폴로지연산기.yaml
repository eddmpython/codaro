  goal: 8단계. 모폴로지 검증 루프에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 이미지 처리는 크기, 채널, 저장 결과를 바로 확인해야 잘못된 변환을 빨리 찾을 수 있습니다.
  explanation: 모폴로지는 형태를 다루는 연산이라 결과가 조금 달라 보여도 좋은지 나쁜지 판단하기 어렵습니다. 노이즈 제거와 구멍 메우기를 픽셀 수로 검증하고, 커널 크기
    오류를 먼저 잡습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import cv2
    import numpy as np

    morphMask = np.zeros((100, 130), dtype=np.uint8)
    cv2.rectangle(morphMask, (30, 25), (100, 75), 255, -1)
    cv2.circle(morphMask, (65, 50), 10, 0, -1)
    morphMask[10, 10] = 255
    morphMask[90, 120] = 255

    def makeMorphKernel(size):
        if size <= 1 or size % 2 == 0:
            raise ValueError(f"커널 크기는 3 이상의 홀수여야 합니다: {size}")
        return np.ones((size, size), dtype=np.uint8)

    morphKernel = makeMorphKernel(5)
