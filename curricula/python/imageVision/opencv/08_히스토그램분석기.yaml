- id: step6_params
  title: 6단계. CLAHE 파라미터 효과
  structuredPrimary: true
  subtitle: clipLimit 1/4/8 비교
  goal: 같은 입력에 clipLimit을 1/4/8 세 값으로 두고 결과 표준편차가 증가하는 단조성을 확인합니다.
  why: clipLimit이 높을수록 대비가 강해지지만 노이즈도 함께 증폭됩니다. 단순히 큰 값이 좋은 게 아니라 입력의 노이즈 수준과 사용 용도에 따라 절충해야 합니다. 세 값을 한 번에 비교해 보면 감각이 잡힙니다.
  explanation: |-
    clipLimit=1.0은 거의 평활화 효과가 없습니다. 노이즈 증가도 거의 없지만 대비 향상도 약합니다.
    clipLimit=4.0은 일반적인 시작점입니다. 대비 향상이 명확하면서 노이즈 증가는 허용 범위 안입니다.
    clipLimit=8.0은 강한 평활화입니다. 저대비 의료/위성 영상 같은 특수 경우에 쓰이고, 일반 사진에는 노이즈가 두드러져 부적합한 경우가 많습니다.
    표준편차의 단조성(작은 clipLimit < 큰 clipLimit)이 알고리즘이 의도대로 동작하는지의 직관적 회귀 테스트입니다.
  tips:
  - clipLimit은 float입니다. 정수만 받는 것이 아닙니다. 1.5, 2.5 같은 값도 자주 씁니다.
  - 같은 clipLimit에 tileGridSize를 (4, 4) → (16, 16)으로 키워도 결과가 달라집니다. 둘 다 실험할 가치가 있습니다.
  snippet: |-
    import cv2
    import numpy as np

    paramCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(paramCanvas, (45, 25), (115, 75), 135, -1)

    claheLow = cv2.createCLAHE(clipLimit=1.0, tileGridSize=(8, 8)).apply(paramCanvas)
    claheMid = cv2.createCLAHE(clipLimit=4.0, tileGridSize=(8, 8)).apply(paramCanvas)
    claheHigh = cv2.createCLAHE(clipLimit=8.0, tileGridSize=(8, 8)).apply(paramCanvas)

    {
        'stdLow': round(float(claheLow.std()), 2),
        'stdMid': round(float(claheMid.std()), 2),
        'stdHigh': round(float(claheHigh.std()), 2),
        'monotonicGrowth': float(claheLow.std()) <= float(claheMid.std()) <= float(claheHigh.std()),
    }
  exercise:
    prompt: clipLimit은 4.0 고정으로 두고 tileGridSize를 (4, 4)와 (16, 16) 두 값으로 바꿔 결과 표준편차가 어떻게 달라지는지 확인하세요.
    starterCode: |-
