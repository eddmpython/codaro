- id: workflow_validation
  title: 7단계. 입력 채널 가드와 대비 개선 검증
  structuredPrimary: true
  subtitle: 그레이스케일 강제 + std 비교
  goal: validateGrayImage 함수가 컬러 입력을 ValueError로 차단하고, 정상 입력에서는 평활화 후 표준편차가 명확히 증가하는지 회귀 테스트로 확인합니다.
  why: equalizeHist는 컬러 입력에 ndim 오류 같은 명확하지 않은 메시지로 실패합니다. 함수 입구에서 "그레이스케일이 아니면 ValueError"로 명시하면 호출자가 즉시 원인을 안다. 그리고 평활화의 본질인 대비 증가가 정말 일어났는지 한 줄로 검증합니다.
  explanation: |-
    validateGrayImage는 image.ndim != 2를 검사합니다. 메시지에 실제 shape를 포함시켜 호출자가 무엇이 잘못됐는지 즉시 알 수 있게 합니다.
    회귀 테스트는 enhanced.std() > original.std() 한 줄입니다. 평활화의 본질은 대비 증가이므로 이 부등식이 깨지면 알고리즘이 의도와 다르게 동작한 신호입니다.
    이 두 가드를 결합한 패턴이 평활화 코드를 다른 사람이 안전하게 호출할 수 있는 인터페이스를 만듭니다.
  tips:
  - 컬러 입력을 평활화하고 싶다면 LAB의 L 채널에 적용하는 5단계 패턴을 함수 안에 포함시키는 게 표준입니다.
  - 표준편차 비교는 절대값보다 비율(after / before)이 더 안정적인 회귀 테스트입니다.
  snippet: |-
    import cv2
    import numpy as np


    def validateGrayImage(image: np.ndarray) -> bool:
        if image.ndim != 2:
            raise ValueError(f"히스토그램 평활화는 그레이스케일 입력이 필요합니다: shape {image.shape}")
        return True


    def safeEqualize(image: np.ndarray) -> dict:
        validateGrayImage(image)
        enhanced = cv2.equalizeHist(image)
        return {
            'originalStd': round(float(image.std()), 2),
            'enhancedStd': round(float(enhanced.std()), 2),
            'contrastImproved': float(enhanced.std()) > float(image.std()),
        }


    safeCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(safeCanvas, (45, 25), (115, 75), 135, -1)

    okResult = safeEqualize(safeCanvas)

    try:
        safeEqualize(np.zeros((50, 50, 3), dtype=np.uint8))
        colorMessage = 'unexpected pass'
    except ValueError as exc:
        colorMessage = str(exc)

    {
        'okResult': okResult,
        'colorMessage': colorMessage,
    }
  exercise:
    prompt: safeEqualize에 1차원 ndarray(np.zeros(100, dtype=np.uint8))를 넘기면 ndim 오류 메시지가 나오는지, 그 메시지에 '(100,)' shape 단서가 포함되는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np


      def validateGrayImage(image: np.ndarray) -> bool:
          if image.ndim != 2:
              raise ValueError(f"히스토그램 평활화는 그레이스케일 입력이 필요합니다: shape {image.shape}")
          return True


      try:
          validateGrayImage(np.zeros(100, dtype=np.uint8))
          oneDimMessage = 'unexpected pass'
      except ValueError as exc:
          oneDimMessage = str(exc)

      {'oneDimMessage': oneDimMessage, 'hasShapeHint': '(___,)' in oneDimMessage}
    hints:
    - 1차원 100원소 ndarray의 shape는 (100,)입니다.
    - 빈칸에는 100이 들어갑니다.
    check:
      noError: validateGrayImage 정의가 끝나야 합니다.
      resultCheck: hasShapeHint가 True여야 합니다.
  check:
    noError: validateGrayImage와 safeEqualize 정의가 끝나야 합니다.
    resultCheck: okResult의 contrastImproved가 True이고 colorMessage에 'shape' 단서가 포함되어야 합니다.
