          clahe = cv2.createCLAHE(clipLimit=clipLimit, tileGridSize=(8, 8))
          return cv2.cvtColor(cv2.merge([clahe.apply(lCh), aCh, bCh]), cv2.COLOR_LAB2BGR)


      weakBase = makeLowContrastBgr(cv2.cvtColor(load_sample_image('china.jpg'), cv2.COLOR_RGB2BGR))
      weakResult = claheEnhanceBgr(weakBase, clipLimit=___)
      weakLAfter = cv2.cvtColor(weakResult, cv2.COLOR_BGR2LAB)[..., 0]
      weakLBefore = cv2.cvtColor(weakBase, cv2.COLOR_BGR2LAB)[..., 0]
      {'beforeStd': round(float(weakLBefore.std()), 2), 'afterStd': round(float(weakLAfter.std()), 2)}
    hints:
    - clipLimit 1.0은 매우 약한 평활화입니다.
    - 빈칸에는 1.0이 들어갑니다.
