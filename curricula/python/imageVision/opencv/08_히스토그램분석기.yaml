intro:
  emoji: 📊
  goal: calcHist로 밝기 분포를 측정하고 equalizeHist/CLAHE로 대비를 향상시킨 뒤 표준편차 같은 수치 지표로 개선 정도를 정량 평가합니다.
  description: 히스토그램은 이미지의 "밝기 가구 분포"입니다. 평활화는 그 분포를 0~255에 고르게 펴서 대비를 키우는 작업입니다.
  direction: 합성 저대비 입력에서 평활화 전후 표준편차를 비교하고, LAB 색공간을 거쳐 컬러 이미지에 안전하게 적용하는 흐름을 다룹니다.
  benefits:
  - calcHist의 256-bin 출력이 (256, 1) shape로 나오는 형식을 직접 확인합니다.
  - equalizeHist 전후 표준편차로 대비 향상이 정말 일어났는지 검증합니다.
  - CLAHE의 clipLimit과 tileGridSize가 결과에 어떻게 작용하는지 비교합니다.
  - 컬러 평활화는 LAB의 L 채널에만 적용하는 패턴을 손으로 구현합니다.
  diagram:
    steps:
    - label: 그레이스케일 입력 준비
      detail: sklearn flower RGB → BGR → GRAY 흐름으로 단채널 입력을 만듭니다.
    - label: calcHist
      detail: 256-bin 히스토그램을 계산해 분포 dict로 정리합니다.
    - label: equalizeHist
      detail: 전역 평활화로 표준편차가 늘어나는지 측정합니다.
    - label: CLAHE
      detail: 적응형 평활화로 지역 대비를 살리며 전역 평활화의 과도함을 피합니다.
    - label: LAB 컬러 적용
      detail: 컬러 입력은 L 채널만 평활화하고 다시 BGR로 되돌립니다.
    runtime:
    - label: opencv-python 패키지
      detail: meta.packages의 opencv-python이 가상환경에 있어야 calcHist/equalizeHist/createCLAHE가 import됩니다.
    - label: 단채널 입력
      detail: equalizeHist와 CLAHE는 단채널만 받습니다. 컬러는 LAB의 L에 적용한 뒤 merge합니다.
    - label: 합성 저대비 입력
      detail: 95~155 같은 좁은 범위에 모인 합성 입력으로 평활화 효과를 정량적으로 비교합니다.
sections:
- id: step1_load
  title: 1단계. 저대비 합성 입력
  structuredPrimary: true
  subtitle: 95~155 좁은 범위
  goal: linspace(95, 155, 160)을 100행 반복해 가로 그래디언트 + 한가운데 직사각형이 있는 저대비 흑백 입력을 만들고 픽셀 범위/표준편차를 확인합니다.
  why: 평활화 효과는 입력의 동적 범위가 좁을 때 가장 잘 보입니다. 0~255 전 범위에 펴진 입력은 이미 대비가 좋아 평활화 효과가 약합니다. 좁은 범위 합성 입력으로 시작하면 알고리즘의 작동을 명확히 볼 수 있습니다.
  explanation: |-
    np.tile(np.linspace(95, 155, 160), (100, 1))는 (100, 160) 모양으로 95~155 값이 가로로 균일하게 펼쳐진 ndarray입니다. 거기에 한가운데 직사각형을 그려서 살짝 다른 영역을 만듭니다.
    이 입력의 표준편차는 약 17 정도로 낮습니다. 평활화 후에는 60~70대까지 늘어나는 게 일반적입니다. 표준편차의 변화량이 대비 향상의 정량 지표입니다.
    실무에서는 이런 저대비 사진(흐린 날, 안개, 저조도)에 평활화를 자주 씁니다. 합성 입력으로 알고리즘 동작을 검증한 뒤 실제 사진으로 일반화합니다.
  tips:
  - np.linspace(start, stop, num)은 균등 간격 ndarray를 만듭니다. dtype을 명시하지 않으면 float64가 기본입니다.
  - np.tile(a, reps)은 ndarray를 reps만큼 반복해 더 큰 ndarray를 만듭니다.
  snippet: |-
    import cv2
    import numpy as np

    histCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(histCanvas, (45, 25), (115, 75), 135, -1)

    {
        'shape': histCanvas.shape,
        'dtype': str(histCanvas.dtype),
        'minMax': (int(histCanvas.min()), int(histCanvas.max())),
        'std': round(float(histCanvas.std()), 2),
    }
  exercise:
    prompt: 같은 패턴으로 더 좁은 110~140 범위 입력을 만들어 표준편차가 step1보다 작은지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np

      narrowCanvas = np.tile(np.linspace(110, ___, 160, dtype=np.uint8), (100, 1))
      cv2.rectangle(narrowCanvas, (45, 25), (115, 75), 130, -1)

      {'minMax': (int(narrowCanvas.min()), int(narrowCanvas.max())), 'std': round(float(narrowCanvas.std()), 2)}
    hints:
    - 범위는 110~140이라 stop은 140입니다.
    - 빈칸에는 140이 들어갑니다.
    check:
      noError: linspace와 rectangle 호출이 끝나야 합니다.
      resultCheck: minMax의 두 값이 110~140 범위 안에 있고 std가 양수여야 합니다.
  check:
    noError: linspace와 rectangle 호출이 끝나야 합니다.
    resultCheck: shape가 (100, 160), minMax가 (95, 155) 범위 안에 있어야 합니다.
- id: step2_calc
  title: 2단계. calcHist 256-bin
  structuredPrimary: true
  subtitle: 분포 측정 한 함수
  goal: 합성 입력에 cv2.calcHist를 적용해 (256, 1) shape의 히스토그램을 얻고, 가장 빈도가 높은 bin 인덱스와 빈도 합계가 전체 픽셀 수와 같은지 확인합니다.
  why: 평활화 알고리즘이 어떻게 작동하는지 이해하려면 입력 분포를 먼저 정확히 알아야 합니다. calcHist는 그 분포를 256-bin 배열로 돌려줘 분석의 기본 도구입니다.
  explanation: |-
    cv2.calcHist([images], [channels], mask, [histSize], [ranges])는 리스트로 인자를 받는 게 특징입니다. 단일 이미지여도 [image] 같이 감싸야 합니다.
    histSize=[256]이면 256개 bin으로 나눠 0~255 각 값의 픽셀 수를 셉니다. 결과 shape은 (256, 1)이라 squeeze로 (256,)로 만드는 게 다루기 편합니다.
    히스토그램의 합(.sum())은 항상 전체 픽셀 수와 같습니다. 이 관계가 깨지면 mask 인자가 의도와 다르게 작동한 신호입니다.
  tips:
  - calcHist는 mask 인자로 일부 영역만 분석할 수 있습니다. None은 전체 이미지를 의미합니다.
  - np.histogram(image, bins=256, range=(0, 256))도 비슷한 결과를 줍니다. OpenCV는 더 빠르고 다채널 처리가 직관적입니다.
  snippet: |-
    import cv2
    import numpy as np

    calcCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(calcCanvas, (45, 25), (115, 75), 135, -1)

    hist = cv2.calcHist([calcCanvas], [0], None, [256], [0, 256])

    {
        'histShape': hist.shape,
        'totalPixelsFromHist': int(hist.sum()),
        'totalPixelsFromSize': int(calcCanvas.size),
        'dominantBin': int(np.argmax(hist.squeeze())),
    }
  exercise:
    prompt: mask 인자로 직사각형 영역(50:75, 50:110)만 분석한 히스토그램의 dominantBin을 확인하세요. 직사각형 값이 135이므로 결과는 135 부근이 됩니다.
    starterCode: |-
      import cv2
      import numpy as np

      maskCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
      cv2.rectangle(maskCanvas, (45, 25), (115, 75), 135, -1)

      maskOnly = np.zeros_like(maskCanvas)
      maskOnly[30:70, 50:110] = ___

      maskedHist = cv2.calcHist([maskCanvas], [0], maskOnly, [256], [0, 256])
      maskedDominant = int(np.argmax(maskedHist.squeeze()))
      {'maskedDominant': maskedDominant, 'isNearRect': abs(maskedDominant - 135) <= 5}
    hints:
    - mask는 0 또는 255 값을 가집니다. 0이 아닌 픽셀만 히스토그램에 포함됩니다.
    - 빈칸에는 255가 들어갑니다.
    check:
      noError: calcHist 호출이 끝나야 합니다.
      resultCheck: isNearRect가 True이고 maskedDominant가 130~140 범위에 있어야 합니다.
  check:
    noError: calcHist 호출과 통계 계산이 끝나야 합니다.
    resultCheck: histShape가 (256, 1)이고 totalPixelsFromHist == totalPixelsFromSize여야 합니다.
- id: step3_equalize
  title: 3단계. equalizeHist로 전역 평활화
  structuredPrimary: true
  subtitle: 표준편차 변화 측정
  goal: 저대비 입력에 cv2.equalizeHist를 적용해 결과의 표준편차가 원본보다 크게 늘어나고 min/max 범위가 0~255로 펴지는지 확인합니다.
  why: 평활화의 효과를 "보기에 좋아졌다"가 아니라 표준편차와 범위라는 수치로 검증해야 알고리즘이 정말 동작했는지 확신할 수 있습니다. 표준편차는 픽셀 값의 흩어짐 정도라 대비의 직관적 지표입니다.
  explanation: |-
    cv2.equalizeHist(src)는 단채널 uint8 입력을 받아 같은 크기 결과를 돌려줍니다. 내부적으로 누적분포함수(CDF)를 계산해 픽셀 값을 0~255 전 범위에 고르게 재분배합니다.
    저대비 입력(95~155 좁은 범위)이 평활화 후 보통 0~255 전체로 펴집니다. 표준편차는 약 3~4배 늘어나는 게 일반적입니다.
    원본 분포의 형태(직사각형, 봉우리, 가우시안 등)는 결과에 영향을 줍니다. 단봉우리 분포가 가장 자연스럽게 평활화됩니다.
  tips:
  - equalizeHist는 컬러 입력을 직접 받지 않습니다. 채널별로 분리해서 적용하면 색이 왜곡되니 LAB의 L에 적용하는 게 표준입니다(5단계 참고).
  - 결과의 min은 거의 항상 0, max는 거의 항상 255가 됩니다. 입력 분포의 양끝 픽셀이 양끝 값으로 매핑됩니다.
  snippet: |-
    import cv2
    import numpy as np

    eqCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(eqCanvas, (45, 25), (115, 75), 135, -1)

    eqResult = cv2.equalizeHist(eqCanvas)

    {
        'beforeStd': round(float(eqCanvas.std()), 2),
        'afterStd': round(float(eqResult.std()), 2),
        'beforeRange': (int(eqCanvas.min()), int(eqCanvas.max())),
        'afterRange': (int(eqResult.min()), int(eqResult.max())),
        'stdIncreased': float(eqResult.std()) > float(eqCanvas.std()),
    }
  exercise:
    prompt: 결과의 max가 정확히 255가 되는지, min이 0에 가까운지 확인하세요. 평활화는 입력의 양끝을 0과 255에 매핑하는 성질이 있습니다.
    starterCode: |-
      import cv2
      import numpy as np

      maxCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
      cv2.rectangle(maxCanvas, (45, 25), (115, 75), 135, -1)
      maxResult = cv2.equalizeHist(maxCanvas)

      {'min': int(maxResult.min()), 'max': int(maxResult.___()), 'isFullRange': int(maxResult.max()) == 255}
    hints:
    - ndarray의 최댓값 메서드는 .max()입니다.
    - 빈칸에는 max가 들어갑니다.
    check:
      noError: equalizeHist 호출이 끝나야 합니다.
      resultCheck: isFullRange가 True여야 합니다.
  check:
    noError: equalizeHist 호출이 끝나야 합니다.
    resultCheck: stdIncreased가 True이고 afterStd > beforeStd * 2여야 합니다.
- id: step4_clahe
  title: 4단계. CLAHE 적응형 평활화
  structuredPrimary: true
  subtitle: createCLAHE + .apply
  goal: 같은 입력에 cv2.createCLAHE로 만든 CLAHE 객체의 .apply를 호출해 결과를 얻고, equalizeHist와 표준편차/범위를 비교합니다.
  why: 전역 평활화(equalizeHist)는 입력 전체 분포 한 번으로 결정해 지역 변화에 둔감합니다. CLAHE는 작은 타일별로 평활화해 지역 대비를 살리면서도 clipLimit으로 과도한 증폭을 막아 일반적으로 더 자연스럽습니다.
  explanation: |-
    cv2.createCLAHE(clipLimit, tileGridSize)는 CLAHE 객체를 만듭니다. .apply(image)로 실제 적용합니다.
    clipLimit은 한 bin의 픽셀 수가 그 값을 넘으면 자르고 나머지 bin에 재분배합니다. 값이 클수록 대비가 강해지고 노이즈가 같이 증폭됩니다. 보통 2~4가 안전한 시작점입니다.
    tileGridSize는 이미지를 분할할 격자 크기입니다. (8, 8)은 이미지를 8×8 영역으로 나눠 각 영역의 평활화를 따로 합니다. 영역 경계에서는 bilinear 보간으로 자연스럽게 이어집니다.
  tips:
  - "CLAHE 객체는 한 번 만들면 여러 이미지에 재사용할 수 있어 효율적입니다."
  - tileGridSize가 너무 작으면(예 (2, 2)) 전역 평활화에 가까워집니다. 너무 크면 노이즈가 증폭됩니다.
  snippet: |-
    import cv2
    import numpy as np

    claheCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
    cv2.rectangle(claheCanvas, (45, 25), (115, 75), 135, -1)

    eqResult = cv2.equalizeHist(claheCanvas)
    claheObject = cv2.createCLAHE(clipLimit=2.0, tileGridSize=(8, 8))
    claheResult = claheObject.apply(claheCanvas)

    {
        'beforeStd': round(float(claheCanvas.std()), 2),
        'eqStd': round(float(eqResult.std()), 2),
        'claheStd': round(float(claheResult.std()), 2),
        'eqRange': (int(eqResult.min()), int(eqResult.max())),
        'claheRange': (int(claheResult.min()), int(claheResult.max())),
        'bothIncreasedContrast': float(eqResult.std()) > float(claheCanvas.std()) and float(claheResult.std()) > float(claheCanvas.std()),
    }
  exercise:
    prompt: clipLimit을 4.0으로 더 강하게 주면 같은 입력에서 결과 표준편차가 clipLimit=2.0보다 커지는지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np

      strongCanvas = np.tile(np.linspace(95, 155, 160, dtype=np.uint8), (100, 1))
      cv2.rectangle(strongCanvas, (45, 25), (115, 75), 135, -1)

      strongClahe = cv2.createCLAHE(clipLimit=___, tileGridSize=(8, 8))
      strongResult = strongClahe.apply(strongCanvas)

      {'strongStd': round(float(strongResult.std()), 2)}
    hints:
    - clipLimit 인자에 4.0을 넣습니다.
    - 빈칸에는 4.0이 들어갑니다.
    check:
      noError: createCLAHE와 .apply 호출이 끝나야 합니다.
      resultCheck: strongStd가 원본 표준편차(약 17)보다 명백히 커야 합니다.
  check:
    noError: createCLAHE와 .apply 호출이 끝나야 합니다.
    resultCheck: bothIncreasedContrast가 True이고 eqStd, claheStd 모두 beforeStd보다 커야 합니다.
- id: step5_color
  title: 5단계. LAB 색공간 컬러 평활화
  structuredPrimary: true
  subtitle: L 채널에만 적용
  goal: flower 컬러 이미지를 BGR→LAB으로 변환해 L 채널만 평활화한 뒤 다시 BGR로 되돌려 색이 왜곡되지 않으면서 대비가 향상되는지 확인합니다.
  why: 컬러 이미지의 각 채널(B/G/R)에 따로 평활화를 적용하면 채널 균형이 깨져 색이 부자연스럽게 변합니다. LAB 색공간에서 L(밝기)만 평활화하면 색상(a, b)이 유지되어 색은 그대로지만 대비가 향상됩니다.
  explanation: |-
    cv2.split(labImage)로 L, a, b 세 채널을 분리합니다. L에만 cv2.equalizeHist 또는 CLAHE를 적용합니다.
    수정된 L과 원래 a, b를 cv2.merge로 다시 합칩니다. 그 결과를 LAB→BGR로 변환하면 색은 거의 그대로지만 밝기 분포가 평활화된 결과를 얻습니다.
    검증은 원본과 결과의 채널별 평균을 비교합니다. L 채널은 변하지만 a, b 채널의 평균은 거의 동일해야 합니다. 비교는 보통 ±2 이내면 색 왜곡이 미미하다고 봅니다.
  tips:
  - 컬러 평활화에는 LAB가 표준입니다. HSV의 V도 가능하지만 LAB가 인지적으로 더 자연스럽다고 알려져 있습니다.
  - 채널별로 따로 평활화하면 빨강과 파랑 영역의 균형이 깨져 색이 푸르거나 붉게 보입니다.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image

    colorBgr = cv2.cvtColor(load_sample_image('flower.jpg'), cv2.COLOR_RGB2BGR)
    colorLab = cv2.cvtColor(colorBgr, cv2.COLOR_BGR2LAB)
    lCh, aCh, bCh = cv2.split(colorLab)

    lEqualized = cv2.equalizeHist(lCh)
    mergedLab = cv2.merge([lEqualized, aCh, bCh])
    enhancedBgr = cv2.cvtColor(mergedLab, cv2.COLOR_LAB2BGR)

    enhancedLab = cv2.cvtColor(enhancedBgr, cv2.COLOR_BGR2LAB)
    _, aChAfter, bChAfter = cv2.split(enhancedLab)

    {
        'shape': enhancedBgr.shape,
        'lStdBefore': round(float(lCh.std()), 2),
        'lStdAfter': round(float(lEqualized.std()), 2),
        'aMeanDiff': round(abs(float(aCh.mean()) - float(aChAfter.mean())), 2),
        'bMeanDiff': round(abs(float(bCh.mean()) - float(bChAfter.mean())), 2),
        'lImproved': float(lEqualized.std()) > float(lCh.std()),
    }
