      cv2.rectangle(tileCanvas, (45, 25), (115, 75), 135, -1)

      claheSmall = cv2.createCLAHE(clipLimit=4.0, tileGridSize=(4, 4)).apply(tileCanvas)
      claheLarge = cv2.createCLAHE(clipLimit=4.0, tileGridSize=(___, 16)).apply(tileCanvas)

      {'stdSmall': round(float(claheSmall.std()), 2), 'stdLarge': round(float(claheLarge.std()), 2)}
    hints:
    - 정사각 격자라 두 인자 모두 16입니다.
    - 빈칸에는 16이 들어갑니다.
    check:
      noError: 두 CLAHE 호출이 끝나야 합니다.
      resultCheck: stdSmall과 stdLarge 모두 양수여야 합니다.
  check:
    noError: 세 CLAHE 호출이 끝나야 합니다.
    resultCheck: monotonicGrowth가 True이고 stdHigh가 stdLow보다 명백히 커야 합니다.
- id: practice
  title: 실습 - china 사진 대비 향상
  structuredPrimary: true
  subtitle: 컬러 LAB CLAHE
  goal: china 컬러 사진의 L 채널을 저대비 범위로 압축한 뒤 LAB 색공간에서 CLAHE를 적용해, 색 보존과 대비 회복 여부를 검증합니다.
  why: 원본 china 사진은 이미 L 채널 표준편차가 커서 CLAHE 뒤 표준편차가 내려갈 수 있습니다. 학습용으로는 같은 사진의 색상 구조를 유지하되 L 채널만 저대비로 눌러, CLAHE가 어떤 입력에서 효과를 내는지 분명히 보여 줘야 합니다.
  explanation: |-
    먼저 china 사진의 LAB L 채널을 95~155 범위로 압축해 저대비 입력을 만듭니다. 그 뒤 L 채널에 CLAHE를 적용하면 지역 대비가 회복되고, a/b 색상 채널은 그대로 유지됩니다.
    검증은 저대비 입력과 결과의 L 채널 표준편차를 비교합니다. 이 비교는 원본 사진이 아니라 CLAHE를 적용하기 직전의 저대비 입력을 기준으로 해야 합니다.
    실무에서는 이 패턴을 함수로 묶어 두고 새 사진마다 호출합니다. 병렬 처리에서는 공유 객체의 안전성을 가정하지 말고 함수 안이나 워커별로 CLAHE 객체를 만듭니다.
  tips:
  - 병렬 처리에서는 CLAHE 객체를 워커별로 만들거나 함수 안에서 생성해 공유 상태를 피하세요.
  - 사진의 노이즈 수준이 높으면 clipLimit을 낮춰 노이즈 증폭을 피합니다.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image


    def makeLowContrastBgr(bgr: np.ndarray) -> np.ndarray:
        lab = cv2.cvtColor(bgr, cv2.COLOR_BGR2LAB)
        lCh, aCh, bCh = cv2.split(lab)
        lLow = cv2.normalize(lCh, None, 95, 155, cv2.NORM_MINMAX).astype(np.uint8)
        return cv2.cvtColor(cv2.merge([lLow, aCh, bCh]), cv2.COLOR_LAB2BGR)


    def claheEnhanceBgr(bgr: np.ndarray, clipLimit: float = 2.0) -> np.ndarray:
        lab = cv2.cvtColor(bgr, cv2.COLOR_BGR2LAB)
        lCh, aCh, bCh = cv2.split(lab)
        clahe = cv2.createCLAHE(clipLimit=clipLimit, tileGridSize=(8, 8))
        return cv2.cvtColor(cv2.merge([clahe.apply(lCh), aCh, bCh]), cv2.COLOR_LAB2BGR)


    chinaBgr = makeLowContrastBgr(cv2.cvtColor(load_sample_image('china.jpg'), cv2.COLOR_RGB2BGR))
    enhancedChinaBgr = claheEnhanceBgr(chinaBgr, clipLimit=3.0)

    originalLChannel = cv2.cvtColor(chinaBgr, cv2.COLOR_BGR2LAB)[..., 0]
    enhancedLChannel = cv2.cvtColor(enhancedChinaBgr, cv2.COLOR_BGR2LAB)[..., 0]

    {
        'originalLStd': round(float(originalLChannel.std()), 2),
        'enhancedLStd': round(float(enhancedLChannel.std()), 2),
        'shapePreserved': enhancedChinaBgr.shape == chinaBgr.shape,
        'contrastImproved': float(enhancedLChannel.std()) > float(originalLChannel.std()),
    }
  exercise:
