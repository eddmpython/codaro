      {'circleAreaPixel': invMasked[70, 55].tolist(), 'backgroundPixel': invMasked[5, 5].tolist()}
    hints:
    - 비트 NOT 함수는 cv2.bitwise_not입니다.
    - 빈칸에는 _not이 들어갑니다.
    check:
      noError: bitwise_not과 bitwise_and 호출이 끝나야 합니다.
