- id: practice
  title: 실습 — flower 사진 빨강 검출
  structuredPrimary: true
  subtitle: 실제 사진 일반화
  goal: flower 사진에 detectColorObjects를 적용해 빨강 영역(0, 80, 80)~(10, 255, 255)을 찾고, 결과 boxes 중 가장 큰 객체의 면적을 정수로 확인합니다.
  why: 합성 입력에서 검증한 함수가 실제 사진에서 어떻게 동작하는지 보는 마지막 단계입니다. flower 사진은 꽃 일부가 분홍-빨강 계열이라 일부 빨강 객체가 검출됩니다.
  explanation: |-
    flower 사진은 분홍과 빨강이 섞인 꽃이 가운데에 있고 배경은 녹색입니다. 빨강 마스크는 꽃잎 일부만 잡고 큰 객체로 보고됩니다.
    함수 인터페이스가 합성 입력과 동일해 새 사진을 받아도 결과 dict의 키와 형식이 같습니다. 자동화 코드에서 if-else 없이 같은 처리 흐름이 적용됩니다.
    가장 큰 객체의 면적을 확인해 검출이 합리적 결과를 냈는지 sanity check합니다. 면적이 0이면 임계값을 다시 조정해야 한다는 신호입니다.
  tips:
  - 실제 사진의 빨강 범위는 합성 입력보다 폭을 넓혀야 잘 잡힙니다. (0, 60, 60)~(15, 255, 255) 같은 완화된 범위가 시작점입니다.
  - 빨강은 H가 양 끝(0과 179)에 있어 정확한 검출에는 두 마스크의 OR이 필요합니다.
  snippet: |-
    import cv2
    import numpy as np
    from sklearn.datasets import load_sample_image


    def detectColorObjects(bgr: np.ndarray, lower: tuple, upper: tuple, minArea: int = 0) -> dict:
        hsv = cv2.cvtColor(bgr, cv2.COLOR_BGR2HSV)
        mask = cv2.inRange(hsv, lower, upper)
        kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
        clean = cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)
        contours, _ = cv2.findContours(clean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
        boxes = sorted(
            [
                tuple(int(v) for v in cv2.boundingRect(c))
                for c in contours
                if cv2.contourArea(c) >= minArea
            ],
            key=lambda b: b[2] * b[3],
            reverse=True,
        )
        return {'objectCount': len(boxes), 'boxes': boxes}


    flowerBgr = cv2.cvtColor(load_sample_image('flower.jpg'), cv2.COLOR_RGB2BGR)
    flowerResult = detectColorObjects(flowerBgr, (0, 60, 60), (15, 255, 255), minArea=100)

