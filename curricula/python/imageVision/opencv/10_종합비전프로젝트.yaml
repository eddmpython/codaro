- id: step7_result
  title: 7단계. detectColorObjects 종합 함수
  structuredPrimary: true
  subtitle: 한 함수로 파이프라인 묶기
  goal: 위 단계 5개를 detectColorObjects(bgr, lower, upper) 한 함수로 묶고, 합성 입력에서 결과 dict가 객체 수 2와 정렬된 boxes를 돌려주는지 확인합니다.
  why: 검출 파이프라인은 매번 같은 흐름이라 함수로 묶어야 재사용 가능합니다. 한 함수가 lower/upper만 받으면 빨강/녹색/파랑 등 어떤 색이든 같은 인터페이스로 검출할 수 있습니다.
  explanation: |-
    detectColorObjects 함수는 BGR 이미지와 HSV 범위를 받아 보고용 dict를 돌려줍니다. dict 내부 키는 일관되게 두어 어떤 색 검출 결과든 같은 형식으로 사용할 수 있습니다.
    함수 안에서 BGR→HSV 변환, inRange, OPEN, findContours, boundingRect를 순서대로 수행합니다. 5단계의 흐름과 정확히 같습니다.
    결과 dict에는 objectCount, boxes(정렬된), maskPixels 세 키가 들어가 자동화 코드에서 즉시 활용 가능합니다.
  tips:
  - 함수 시그니처를 (bgr, lower, upper, minArea=0)으로 두면 면적 필터링도 함께 처리할 수 있어 실무에서 유연합니다.
  - 결과 dict 형식을 일관되게 유지하면 두 검출기의 결과를 같은 코드로 비교할 수 있습니다.
  snippet: |-
    import cv2
    import numpy as np


    def detectColorObjects(bgr: np.ndarray, lower: tuple, upper: tuple) -> dict:
        hsv = cv2.cvtColor(bgr, cv2.COLOR_BGR2HSV)
        mask = cv2.inRange(hsv, lower, upper)
        kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
        clean = cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)
        contours, _ = cv2.findContours(clean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
        boxes = sorted(
            [tuple(int(v) for v in cv2.boundingRect(c)) for c in contours],
            key=lambda b: b[2] * b[3],
            reverse=True,
        )
        return {
            'objectCount': len(boxes),
            'boxes': boxes,
            'maskPixels': int((clean == 255).sum()),
        }


    finalCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(finalCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(finalCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(finalCanvas, (20, 20), 3, (0, 0, 255), -1)

    detection = detectColorObjects(finalCanvas, (0, 80, 80), (10, 255, 255))
    detection
