intro:
  emoji: 🎯
  goal: HSV 변환 → inRange 마스킹 → 모폴로지 정제 → 컨투어 분석 → 외접 사각형 시각화까지 색상 기반 객체 검출 파이프라인을 함수 한 개로 묶어 만듭니다.
  description: 02~09에서 익힌 색공간, 모폴로지, 컨투어를 결합해 "특정 색의 객체를 찾아 위치와 크기를 알려주는" 한 함수를 완성합니다.
  direction: 합성 입력에서 정답을 미리 계산하고 파이프라인 결과를 dict로 검증한 뒤, flower 사진에 일반화하는 흐름.
  benefits:
  - HSV inRange 마스크의 결과를 픽셀 수로 검증합니다.
  - 모폴로지 OPEN으로 점 노이즈를 정리하고 변화량을 측정합니다.
  - findContours + boundingRect로 객체 위치/크기를 정량 추출합니다.
  - detectColorObjects 종합 함수가 dict 한 개로 검출 결과를 보고합니다.
  diagram:
    steps:
    - label: 합성 입력 만들기
      detail: 어두운 배경 + 빨강 원 두 개 + 점 노이즈로 검출 정답을 정합니다.
    - label: HSV 변환과 inRange
      detail: 빨강 범위 (0, 80, 80)~(10, 255, 255)로 색 마스크를 만듭니다.
    - label: 모폴로지 정제
      detail: OPEN으로 점 노이즈를 제거해 정답 객체 두 개만 남깁니다.
    - label: 컨투어 + 외접 사각형
      detail: findContours + boundingRect로 객체 위치와 크기를 추출합니다.
    - label: 종합 함수
      detail: detectColorObjects 함수 한 개에 위 흐름을 묶어 새 입력에 바로 적용 가능하게 만듭니다.
    runtime:
    - label: opencv-python 패키지
      detail: meta.packages의 opencv-python이 가상환경에 있어야 cv2 호출이 가능합니다.
    - label: 합성 → 사진 일반화
      detail: 합성 입력에서 알고리즘을 검증한 뒤 실제 사진(flower)에 같은 함수를 적용합니다.
    - label: 함수 인터페이스 통일
      detail: detectColorObjects가 dict 한 개로 결과를 돌려줘 자동화 코드에서 그대로 활용 가능.
sections:
- id: step1_load
  title: 1단계. 합성 비전 입력
  structuredPrimary: true
  subtitle: 빨강 두 객체 + 점 노이즈
  goal: 어두운 배경에 빨강 원과 사각형 두 객체, 그리고 작은 점 노이즈가 있는 BGR 합성 입력을 만듭니다.
  why: 종합 파이프라인의 정답(객체 수 2개, 노이즈 1개)을 사람이 미리 알 수 있어야 검증이 됩니다. 합성 입력은 이런 정답을 명확히 가집니다.
  explanation: |-
    어두운 회색([35, 35, 35]) 배경에 BGR 빨강([0, 0, 255]) 두 도형을 그리고, 한쪽에 작은 점 노이즈([0, 0, 255])를 박습니다. 이렇게 만든 입력은 "큰 빨강 객체 2개 + 작은 빨강 점 1개" 정답을 가집니다.
    종합 파이프라인의 목표는 "큰 빨강 객체 2개"를 정확히 찾아내고 점 노이즈는 모폴로지로 정리하는 것입니다.
    이 입력 한 개가 이후 모든 셀의 공통 입력이라 변수 이름을 정확히 지정해 둡니다.
  tips:
  - 배경을 완전한 검정이 아닌 회색으로 둬서 색상 마스크가 배경에 영향받지 않는지 검증합니다.
  - 점 노이즈는 단일 픽셀이라 (3, 3) 또는 (5, 5) OPEN으로 충분히 정리됩니다.
  snippet: |-
    import cv2
    import numpy as np

    sceneCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(sceneCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(sceneCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(sceneCanvas, (20, 20), 3, (0, 0, 255), -1)

    {
        'shape': sceneCanvas.shape,
        'dtype': str(sceneCanvas.dtype),
        'isBgr': sceneCanvas.shape[2] == 3,
        'cornerColor': sceneCanvas[5, 5].tolist(),
    }
  exercise:
    prompt: 같은 캔버스에 점 노이즈를 한 개 더 추가하고(예 (130, 5) 위치) shape와 cornerColor가 그대로인지 확인하세요.
    starterCode: |-
      import cv2
      import numpy as np

      addCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
      cv2.circle(addCanvas, (55, 70), 24, (0, 0, 255), -1)
      cv2.rectangle(addCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
      cv2.circle(addCanvas, (20, 20), 3, (0, 0, 255), -1)
      cv2.circle(addCanvas, (130, 5), 3, (0, 0, ___), -1)

      {'shape': addCanvas.shape, 'cornerColor': addCanvas[5, 5].tolist()}
    hints:
    - BGR 빨강은 (0, 0, 255)입니다.
    - 빈칸에는 255가 들어갑니다.
    check:
      noError: cv2.circle 추가 호출이 끝나야 합니다.
      resultCheck: shape가 (140, 180, 3)이고 cornerColor가 [35, 35, 35]여야 합니다.
  check:
    noError: 합성 입력 생성과 dict 구성이 끝나야 합니다.
    resultCheck: shape가 (140, 180, 3), isBgr이 True, cornerColor가 [35, 35, 35]여야 합니다.
- id: step2_hsv
  title: 2단계. BGR → HSV 변환
  structuredPrimary: true
  subtitle: 색상 기반 필터링 준비
  goal: 합성 입력을 cv2.COLOR_BGR2HSV로 변환하고 H/S/V 채널별 통계로 입력의 색 분포를 점검합니다.
  why: 색상 기반 객체 검출은 HSV에서 H 채널 하나만 필터링하면 끝납니다. 변환 후 H 값 분포를 확인하면 어느 임계값이 의미 있는지가 명확해집니다.
  explanation: |-
    cv2.cvtColor(bgr, cv2.COLOR_BGR2HSV)는 (H, W, 3) HSV uint8을 돌려줍니다. OpenCV의 H는 0~179 범위로 압축되어 있습니다.
    BGR 빨강(0, 0, 255)은 HSV에서 H=0, S=255, V=255가 됩니다. 어두운 회색(35, 35, 35)은 H=0(아무 색이나 가능), S=0, V=35입니다.
    H 채널만 보면 빨강과 회색이 둘 다 H=0이라 구분이 안 됩니다. 그래서 inRange로 S와 V 하한도 함께 줘야 합니다. S>=80, V>=80 정도가 일반적인 시작점입니다.
  tips:
  - HSV의 H 값은 0~179이고 S, V는 0~255입니다. 다른 라이브러리(matplotlib 등)와 H 범위가 달라 헷갈리기 쉽습니다.
  - 무채색(회색, 흰색, 검정) 픽셀의 H 값은 의미가 없습니다. S가 0이라 모든 H 값이 같은 색을 가리킵니다.
  snippet: |-
    import cv2
    import numpy as np

    hsvCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(hsvCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(hsvCanvas, (110, 45), (155, 95), (0, 0, 230), -1)

    hsvImage = cv2.cvtColor(hsvCanvas, cv2.COLOR_BGR2HSV)

    {
        'shape': hsvImage.shape,
        'redCirclePixel': hsvImage[70, 55].tolist(),
        'rectPixel': hsvImage[70, 130].tolist(),
        'backgroundPixel': hsvImage[5, 5].tolist(),
    }
  exercise:
    prompt: 빨강 영역의 평균 H 값을 측정하고 0 근처(0~10)에 있는지 확인하세요. cv2.inRange로 H<=10 마스크를 만들어 빨강 픽셀만 골라낼 수 있습니다.
    starterCode: |-
      import cv2
      import numpy as np

      meanCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
      cv2.circle(meanCanvas, (55, 70), 24, (0, 0, 255), -1)

      meanHsv = cv2.cvtColor(meanCanvas, cv2.COLOR_BGR2HSV)
      redMask = (meanHsv[..., 2] >= 200)
      redHueMean = float(meanHsv[..., 0][redMask].mean()) if redMask.any() else -1.0
      {'redHueMean': round(redHueMean, 1), 'isNearZero': redHueMean ___ 10.0}
    hints:
    - "빨강의 H 값은 0 근처이므로 redHueMean이 10보다 작아야 합니다."
    - 빈칸에는 < 또는 <= 부등호가 들어갑니다.
    check:
      noError: cvtColor와 마스크 계산이 끝나야 합니다.
      resultCheck: isNearZero가 True여야 합니다.
  check:
    noError: cvtColor와 픽셀 조회가 끝나야 합니다.
    resultCheck: shape가 (140, 180, 3)이고 redCirclePixel의 S, V가 모두 80 이상이어야 합니다.
- id: step3_mask
  title: 3단계. inRange로 빨강 마스크
  structuredPrimary: true
  subtitle: 색상 범위 필터
  goal: HSV 입력에 (0, 80, 80)~(10, 255, 255) 범위 inRange를 적용해 빨강 픽셀만 255인 단채널 마스크를 만들고 픽셀 수가 도형 면적의 합 정도인지 확인합니다.
  why: inRange는 색공간에서 색 추출의 표준 도구입니다. lower/upper 범위 안의 픽셀만 255로 표시한 단채널 마스크가 후속 모폴로지/컨투어의 입력이 됩니다.
  explanation: |-
    cv2.inRange(image, lower, upper)는 각 채널이 동시에 lower~upper 범위 안에 있는 픽셀만 255로 표시합니다. HSV에서 lower=[H_min, S_min, V_min], upper=[H_max, S_max, V_max] 형식입니다.
    빨강은 H가 0과 179 양 끝에 있어, 정확히 다루려면 두 범위(0~10과 170~179)의 마스크를 따로 만들어 OR로 합쳐야 합니다. 본 예제는 단순화를 위해 0~10 한쪽만 사용합니다.
    S_min, V_min을 함께 둬야 회색 픽셀이 잘못 잡히지 않습니다. S>=80, V>=80은 채색이 강하고 어둡지 않은 영역만 통과시키는 안전 기준입니다.
  tips:
  - 결과 마스크의 픽셀 수는 도형 면적의 합과 거의 같지만 약간 차이가 납니다. 도형 가장자리 픽셀이 보간되어 색이 살짝 달라질 수 있어서입니다.
  - inRange는 ndarray뿐 아니라 튜플도 lower/upper로 받습니다. (0, 80, 80) 같은 형식도 가능.
  snippet: |-
    import cv2
    import numpy as np

    maskCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(maskCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(maskCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(maskCanvas, (20, 20), 3, (0, 0, 255), -1)

    maskHsv = cv2.cvtColor(maskCanvas, cv2.COLOR_BGR2HSV)
    redMask = cv2.inRange(maskHsv, (0, 80, 80), (10, 255, 255))

    expectedRedArea = round(3.14159 * 24 * 24) + (155 - 110) * (95 - 45) + round(3.14159 * 3 * 3)

    {
        'maskShape': redMask.shape,
        'maskedPixels': int((redMask == 255).sum()),
        'expectedApprox': expectedRedArea,
        'closeToExpected': abs(int((redMask == 255).sum()) - expectedRedArea) < 100,
    }
  exercise:
    prompt: S와 V 하한을 (200, 200)으로 매우 엄격하게 주면 두 도형 모두 잡히는지 확인하세요. 도형 색이 진하므로 통과해야 합니다.
    starterCode: |-
      import cv2
      import numpy as np

      strictCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
      cv2.circle(strictCanvas, (55, 70), 24, (0, 0, 255), -1)
      cv2.rectangle(strictCanvas, (110, 45), (155, 95), (0, 0, 230), -1)

      strictHsv = cv2.cvtColor(strictCanvas, cv2.COLOR_BGR2HSV)
      strictMask = cv2.inRange(strictHsv, (0, ___, 200), (10, 255, 255))
      {'strictPixels': int((strictMask == 255).sum()), 'hasMatches': int((strictMask == 255).sum()) > 0}
    hints:
    - S 하한 200을 넣습니다.
    - 빈칸에는 200이 들어갑니다.
    check:
      noError: inRange 호출이 끝나야 합니다.
      resultCheck: hasMatches가 True이고 strictPixels가 양의 정수여야 합니다.
  check:
    noError: HSV 변환과 inRange 호출이 끝나야 합니다.
    resultCheck: maskShape가 (140, 180), closeToExpected가 True여야 합니다.
- id: step4_morph
  title: 4단계. 모폴로지로 마스크 정제
  structuredPrimary: true
  subtitle: OPEN으로 점 노이즈 제거
  goal: 빨강 마스크에 (5, 5) MORPH_OPEN을 적용해 점 노이즈를 제거하고, 정제 후 객체 수가 정확히 2(큰 도형 두 개)가 되는지 findContours로 확인합니다.
  why: inRange만으로는 점 노이즈가 마스크에 그대로 남습니다. OPEN으로 점 노이즈를 정리하면 다음 단계의 findContours가 정답 객체 수만 잡습니다.
  explanation: |-
    cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)는 erode → dilate를 한 번에 적용합니다. 점 노이즈는 erode에서 사라지고 큰 도형은 dilate로 원래 크기에 가까워집니다.
    합성 입력의 점 노이즈는 단일 픽셀과 작은 원(반지름 3)이라 (5, 5) OPEN으로 충분히 정리됩니다.
    정제 효과는 findContours 결과의 객체 수로 검증합니다. 정제 전에는 3 (큰 두 개 + 점 노이즈), 정제 후에는 2가 나와야 합니다.
  tips:
  - OPEN 커널 크기가 너무 크면 큰 객체도 사라질 수 있습니다. 노이즈 크기보다 약간 큰 정도가 적절합니다.
  - OPEN 후 CLOSE를 추가로 적용하면 큰 객체의 내부 구멍도 메워집니다. 본 합성 입력에는 구멍이 없어 CLOSE는 생략합니다.
  snippet: |-
    import cv2
    import numpy as np

    morphCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(morphCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(morphCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(morphCanvas, (20, 20), 3, (0, 0, 255), -1)

    morphHsv = cv2.cvtColor(morphCanvas, cv2.COLOR_BGR2HSV)
    rawMask = cv2.inRange(morphHsv, (0, 80, 80), (10, 255, 255))
    morphKernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
    cleanMask = cv2.morphologyEx(rawMask, cv2.MORPH_OPEN, morphKernel)

    rawContours, _ = cv2.findContours(rawMask, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
    cleanContours, _ = cv2.findContours(cleanMask, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)

    {
        'rawObjectCount': len(rawContours),
        'cleanObjectCount': len(cleanContours),
        'noiseRemoved': len(cleanContours) == 2,
        'rawWhite': int((rawMask == 255).sum()),
        'cleanWhite': int((cleanMask == 255).sum()),
    }
  exercise:
    prompt: OPEN 대신 더 큰 (9, 9) 커널을 쓰면 정제 후 객체 수가 변하는지 확인하세요. 큰 도형은 여전히 살아남는지가 핵심입니다.
    starterCode: |-
      import cv2
      import numpy as np

      bigKernelCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
      cv2.circle(bigKernelCanvas, (55, 70), 24, (0, 0, 255), -1)
      cv2.rectangle(bigKernelCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
      cv2.circle(bigKernelCanvas, (20, 20), 3, (0, 0, 255), -1)

      bigHsv = cv2.cvtColor(bigKernelCanvas, cv2.COLOR_BGR2HSV)
      bigRaw = cv2.inRange(bigHsv, (0, 80, 80), (10, 255, 255))
      bigKernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (___, 9))
      bigClean = cv2.morphologyEx(bigRaw, cv2.MORPH_OPEN, bigKernel)
      bigCounts, _ = cv2.findContours(bigClean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)

      {'bigObjectCount': len(bigCounts), 'isTwo': len(bigCounts) == 2}
    hints:
    - 정사각 커널이므로 두 인자 모두 9입니다.
    - 빈칸에는 9가 들어갑니다.
    check:
      noError: morphologyEx와 findContours가 끝나야 합니다.
      resultCheck: isTwo가 True여야 합니다.
  check:
    noError: 모폴로지와 findContours 호출이 끝나야 합니다.
    resultCheck: rawObjectCount가 3, cleanObjectCount가 2, noiseRemoved가 True여야 합니다.
- id: step5_apply
  title: 5단계. bitwise_and로 ROI 추출
  structuredPrimary: true
  subtitle: 마스크 영역만 원본 색 유지
  goal: cv2.bitwise_and로 원본 이미지의 빨강 영역만 색이 유지된 결과를 만들고, 마스크 밖 픽셀이 검정인지 확인합니다.
  why: 마스크 적용은 객체 영역만 추출해 다음 단계로 넘기는 표준 패턴입니다. 색이 유지된 ROI 이미지는 분류 모델의 입력이나 사용자에게 보여줄 시각화에 그대로 활용됩니다.
  explanation: |-
    cv2.bitwise_and(src1, src2, mask)는 mask가 0인 픽셀의 결과를 0으로 만듭니다. src1과 src2가 같은 이미지면 mask 영역의 원본 색이 그대로 유지되고 나머지는 검정이 됩니다.
    결과 이미지의 모양은 (H, W, 3)으로 입력과 같습니다. 마스크는 단채널이지만 OpenCV가 자동으로 채널마다 같은 마스크를 적용합니다.
    검증은 마스크 밖 픽셀(예 코너 [5, 5])이 [0, 0, 0]인지로 합니다. 마스크 안 픽셀은 원본의 빨강 색이 그대로 유지되어야 합니다.
  tips:
  - "bitwise_and의 mask 인자는 키워드로 줘야 합니다: cv2.bitwise_and(src1, src2, mask=mask)."
  - 마스크 적용 결과를 사진처럼 보려면 BGR을 RGB로 변환해 plt.imshow에 넘기는 게 표준입니다.
  snippet: |-
    import cv2
    import numpy as np

    bitCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(bitCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(bitCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(bitCanvas, (20, 20), 3, (0, 0, 255), -1)

    bitHsv = cv2.cvtColor(bitCanvas, cv2.COLOR_BGR2HSV)
    bitMask = cv2.inRange(bitHsv, (0, 80, 80), (10, 255, 255))
    bitKernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
    bitClean = cv2.morphologyEx(bitMask, cv2.MORPH_OPEN, bitKernel)

    bitMasked = cv2.bitwise_and(bitCanvas, bitCanvas, mask=bitClean)

    {
        'maskedShape': bitMasked.shape,
        'cornerOutsideMask': bitMasked[5, 5].tolist(),
        'centerOfCircle': bitMasked[70, 55].tolist(),
        'cornerIsBlack': bitMasked[5, 5].tolist() == [0, 0, 0],
        'circleColorPreserved': bitMasked[70, 55].tolist() == [0, 0, 255],
    }
  exercise:
    prompt: bitwise_not으로 마스크를 반전한 뒤 같은 bitwise_and를 적용하면 빨강 객체는 검정이 되고 배경은 원본 색이 유지되는지 확인하세요.
