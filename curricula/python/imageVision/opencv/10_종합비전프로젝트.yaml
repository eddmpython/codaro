- id: workflow_validation
  title: 8단계. HSV 범위 가드 + 결과 sanity
  structuredPrimary: true
  subtitle: validateHsvRange + 결과 검증
  goal: validateHsvRange 함수가 잘못된 길이나 반전된 범위를 ValueError로 차단하고, detectColorObjects의 결과 dict가 정상 형식을 가지는지 회귀 테스트로 확인합니다.
  why: HSV 범위는 사람이 자주 실수합니다. 길이 2 튜플을 잘못 넣거나, lower와 upper를 바꾸어 넣는 경우 inRange는 조용히 빈 결과를 돌려줍니다. 함수 입구에서 차단하면 디버깅 시간이 크게 줄어듭니다.
  explanation: |-
    validateHsvRange는 (1) 두 튜플 모두 길이 3, (2) lower의 모든 채널이 upper 이하라는 두 조건을 검사합니다. 둘 중 하나라도 깨지면 ValueError를 던집니다.
    회귀 테스트는 detectColorObjects의 결과 dict가 'objectCount', 'boxes' 두 키를 모두 가지는지 확인합니다. dict 구조가 바뀌면 자동화 코드가 깨질 수 있어 인터페이스 유지의 회귀 테스트로 쓰입니다.
    이 가드 두 가지를 결합하면 잘못된 호출과 잘못된 결과 모두 한 셀에서 감지됩니다.
  tips:
  - HSV의 H는 0~179, S/V는 0~255라는 범위도 함께 검증할 수 있습니다. 본 예제는 단순화를 위해 길이와 순서만 검증합니다.
  - dict 키 검증은 sorted(result.keys()) 같은 결정적 비교가 회귀 테스트로 좋습니다.
  snippet: |-
    import cv2
    import numpy as np


    def validateHsvRange(lower: tuple, upper: tuple) -> bool:
        if len(lower) != 3 or len(upper) != 3:
            raise ValueError(f"HSV 범위는 길이 3이어야 합니다: lower={lower}, upper={upper}")
        if any(lo > hi for lo, hi in zip(lower, upper)):
            raise ValueError(f"HSV lower가 upper보다 큼: lower={lower}, upper={upper}")
        return True


    def safeDetect(bgr: np.ndarray, lower: tuple, upper: tuple) -> dict:
        validateHsvRange(lower, upper)
        hsv = cv2.cvtColor(bgr, cv2.COLOR_BGR2HSV)
        mask = cv2.inRange(hsv, lower, upper)
        kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
        clean = cv2.morphologyEx(mask, cv2.MORPH_OPEN, kernel)
        contours, _ = cv2.findContours(clean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
