- id: step6_contour
  title: 6단계. 컨투어 + 외접 사각형
  structuredPrimary: true
  subtitle: 위치와 크기 추출
  goal: 정제된 마스크에 findContours + boundingRect를 적용해 객체별 (x, y, w, h)를 추출하고 면적순으로 정렬한 리스트를 만듭니다.
  why: 객체의 위치와 크기는 검출 결과의 표준 출력 형식입니다. (x, y, w, h) 4-tuple은 그대로 자동화 보고서, 시각화, 후속 분류 모델의 입력이 됩니다.
  explanation: |-
    findContours로 객체별 점 리스트를 얻고, 각각에 boundingRect로 외접 사각형을 계산합니다. boundingRect는 (x, y, w, h) 4-tuple을 돌려줍니다.
    면적은 w * h로 계산할 수도, contourArea로 정확히 계산할 수도 있습니다. boundingRect의 면적은 사각형이라 컨투어 면적보다 약간 크고, 정렬에는 둘 다 쓸 수 있습니다.
    면적순 정렬은 "가장 큰 객체가 가장 중요"라는 가정에 기반합니다. 작은 객체가 더 중요한 경우에는 다른 정렬 기준이 필요합니다.
  tips:
  - "sorted(boxes, key=lambda b: b[2] * b[3], reverse=True)로 면적순 내림차순 정렬합니다."
  - 객체 ID를 만들고 싶다면 정렬 후 enumerate로 인덱스를 붙입니다. 이 ID는 추적/연결에 활용됩니다.
  snippet: |-
    import cv2
    import numpy as np

    rectCanvas = np.full((140, 180, 3), 35, dtype=np.uint8)
    cv2.circle(rectCanvas, (55, 70), 24, (0, 0, 255), -1)
    cv2.rectangle(rectCanvas, (110, 45), (155, 95), (0, 0, 230), -1)
    cv2.circle(rectCanvas, (20, 20), 3, (0, 0, 255), -1)

    rectHsv = cv2.cvtColor(rectCanvas, cv2.COLOR_BGR2HSV)
    rectMask = cv2.inRange(rectHsv, (0, 80, 80), (10, 255, 255))
    rectKernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
    rectClean = cv2.morphologyEx(rectMask, cv2.MORPH_OPEN, rectKernel)

    rectContours, _ = cv2.findContours(rectClean, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
    boxes = [tuple(int(v) for v in cv2.boundingRect(c)) for c in rectContours]
    sortedBoxes = sorted(boxes, key=lambda b: b[2] * b[3], reverse=True)

