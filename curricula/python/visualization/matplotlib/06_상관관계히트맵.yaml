  - 시각화할 데이터 확인 후 차트 구성에 맞는 코드 입력을 고릅니다.
  - 상관관계히트맵 결과를 축/범례/파일 출력 기준으로 즉시 점검합니다.
  - 완료한 코드를 보고서 차트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(시각화할 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 11단계. 한글 폰트 설정 처리 실행
      detail: 차트 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 2단계. 데이터 로드 및 상관 결과 검증
      detail: 축/범례/파일 출력 기준으로 실행 결과를 비교합니다.
    - label: 상관관계히트맵 재사용
      detail: 완성 코드를 보고서 차트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 시각 리포트 환경
      detail: matplotlib, numpy, pandas, seaborn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 상관관계히트맵 실행
      detail: 셀을 실행해 축/범례/파일 출력와 예외 상태를 확인합니다.
    - label: 상관관계히트맵 완료
      detail: 검증된 코드를 보고서 차트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: |-
    iris 데이터의 4가지 수치형 변수(꽃받침 길이/너비, 꽃잎 길이/너비) 간의 상관관계를 분석합니다. 상관계수는 -1에서 1 사이의 값으로, 1에 가까울수록 강한 양의 상관, -1에 가까울수록 강한 음의 상관을 나타냅니다.

    import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, numpy는 np로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  tips:
  - import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, numpy는
    np로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  snippet: |-
    import matplotlib.pyplot as plt
    import seaborn as sns
    from codaro.curriculum.localData import loadLocalDataset
    import numpy as np
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import matplotlib.pyplot as plt
      import seaborn as sns
      from codaro.curriculum.localData import loadLocalDataset
      import numpy as np
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 1단계. 라이브러리 불러오기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 실행 결과가 축/범례/파일 출력 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step1_font
  title: 1-1단계. 한글 폰트 설정
  structuredPrimary: true
  subtitle: Codaro 로컬 Python 환경 폰트
  goal: 11단계. 한글 폰트 설정에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    Codaro 로컬 Python에서는 실행 환경에 따라 기본 폰트에 한글 글리프가 없을 수 있습니다. CDN 또는 로컬 폰트 파일을 matplotlib에 등록하는 방식으로 해결합니다. Pretendard는 무료 오픈소스 폰트로, 한글과 영문 모두 깔끔하게 표시됩니다.

    font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스 기호가 깨지는 것을 방지합니다.
  tips:
  - font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스
    기호가 깨지는 것을 방지합니다.
  snippet: |-
    from matplotlib import font_manager

    fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
    availableFonts = {font.name for font in font_manager.fontManager.ttflist}
    for fontName in fontCandidates:
        if fontName in availableFonts:
            plt.rcParams["font.family"] = fontName
            break
    plt.rcParams["axes.unicode_minus"] = False
  exercise:
    prompt: 11단계. 한글 폰트 설정 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      from matplotlib import font_manager

      fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
      availableFonts = {font.name for font in font_manager.fontManager.ttflist}
      for fontName in fontCandidates:
          if fontName in availableFonts:
              plt.rcParams["font.family"] = fontName
              break
      plt.rcParams["axes.unicode_minus"] = False
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 11단계. 한글 폰트 설정의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 11단계. 한글 폰트 설정 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step2_data
  title: 2단계. 데이터 로드 및 상관행렬
  structuredPrimary: true
  subtitle: corr()
  goal: 2단계. 데이터 로드 및 상관행렬에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: iris 데이터를 불러오고 수치형 컬럼만 선택하여 상관행렬을 계산합니다. pandas의 corr() 메서드는 피어슨 상관계수를 계산합니다. 결과는 4x4 대칭
    행렬로, 대각선은 항상 1입니다(자기 자신과의 상관).
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from codaro.curriculum.localData import loadLocalDataset

    iris = loadLocalDataset('iris')
    numericCols = ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
    corrMatrix = iris[numericCols].corr()
    corrMatrix
  exercise:
    prompt: 2단계. 데이터 로드 및 상관행렬 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      from codaro.curriculum.localData import loadLocalDataset

      iris = loadLocalDataset('iris')
      numericCols = ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
      corrMatrix = iris[numericCols].corr()
      corrMatrix
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 2단계. 데이터 로드 및 상관행렬의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 2단계. 데이터 로드 및 상관행렬의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step3_imshow
  title: 3단계. 기본 히트맵
  structuredPrimary: true
  subtitle: ax.imshow()
  goal: 3단계. 기본 히트맵에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    imshow()는 2차원 배열을 이미지로 표시하는 함수입니다. 상관행렬을 imshow()에 전달하면 각 셀의 값에 따라 색상이 지정됩니다. 기본 컬러맵은 viridis로, 낮은 값은 보라색, 높은 값은 노란색으로 표시됩니다.

    ax.imshow(2D배열)로 히트맵을 그립니다. 반환값(im)은 이미지 객체로, 나중에 컬러바를 추가할 때 사용합니다. 기본적으로 배열의 값 범위에 맞춰 색상이 자동으로 매핑됩니다.
  snippet: |-
    figHeat, axHeat = plt.subplots(figsize=(8, 6))
    im = axHeat.imshow(corrMatrix)
    axHeat.set_title('Iris 변수 간 상관관계', fontsize=14)
    figHeat
  exercise:
    prompt: 3단계. 기본 히트맵 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figHeat, axHeat = plt.subplots(figsize=(8, 6))
      im = axHeat.imshow(corrMatrix)
      axHeat.set_title('Iris 변수 간 상관관계', fontsize=14)
      figHeat
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 3단계. 기본 히트맵의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 3단계. 기본 히트맵의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step4_cmap
  title: 4단계. 컬러맵 설정
  structuredPrimary: true
  subtitle: cmap 파라미터
  goal: 4단계. 컬러맵 설정에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    컬러맵(colormap)은 수치를 색상으로 변환하는 규칙입니다. 상관관계에는 발산형(diverging) 컬러맵이 적합합니다. 'coolwarm'은 음수는 파란색, 양수는 빨간색으로 표시하여 상관관계의 방향을 직관적으로 보여줍니다.

    cmap으로 컬러맵을 지정합니다. 상관관계에 적합한 발산형 컬러맵: 'coolwarm', 'RdBu_r', 'seismic'. vmin, vmax로 색상 매핑 범위를 지정합니다. 상관계수는 -1~1이므로 vmin=-1, vmax=1로 설정합니다.
  tips:
  - 'cmap으로 컬러맵을 지정합니다. 상관관계에 적합한 발산형 컬러맵: ''coolwarm'', ''RdBu_r'', ''seismic''. vmin, vmax로 색상 매핑 범위를
    지정합니다. 상관계수는 -1~1이므로 vmin=-1, vmax=1로 설정합니다.'
  snippet: |-
    figCmap, axCmap = plt.subplots(figsize=(8, 6))
    im = axCmap.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
    axCmap.set_title('Iris 변수 간 상관관계', fontsize=14)
    figCmap
  exercise:
    prompt: 4단계. 컬러맵 설정 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figCmap, axCmap = plt.subplots(figsize=(8, 6))
      im = axCmap.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      axCmap.set_title('Iris 변수 간 상관관계', fontsize=14)
      figCmap
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 4단계. 컬러맵 설정의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 4단계. 컬러맵 설정의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step5_colorbar
  title: 5단계. 컬러바 추가
  structuredPrimary: true
  subtitle: plt.colorbar()
  goal: 5단계. 컬러바 추가에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    컬러바는 색상과 수치의 관계를 보여주는 범례입니다. 히트맵을 해석할 때 어떤 색이 어떤 값을 나타내는지 알 수 있습니다. plt.colorbar()에 이미지 객체와 축을 전달하여 추가합니다.

    plt.colorbar(im, ax=ax)로 컬러바를 추가합니다. im은 imshow()의 반환값, ax는 히트맵이 그려진 축입니다. label로 컬러바 제목을 설정합니다. shrink 파라미터로 컬러바 크기를 조절할 수 있습니다.
  tips:
  - plt.colorbar(im, ax=ax)로 컬러바를 추가합니다. im은 imshow()의 반환값, ax는 히트맵이 그려진 축입니다. label로 컬러바 제목을 설정합니다. shrink
    파라미터로 컬러바 크기를 조절할 수 있습니다.
  snippet: |-
    figColorbar, axColorbar = plt.subplots(figsize=(9, 6))
    im = axColorbar.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
