intro:
  emoji: 💎
  goal: diamonds 데이터로 캐럿, 컷 등급별 가격 분포를 다양한 분포 차트로 분석합니다.
  description: diamonds 로컬 데이터셋은 약 5,400개 다이아몬드의 캐럿, 컷, 색상, 투명도, 가격 정보를 담고 있습니다. displot()과 kdeplot()을
    활용하여 분포를 분석합니다. 이전에 배운 relplot, heatmap, lineplot 개념을 함께 활용합니다.
  direction: 다이아몬드가격분석에서 정리된 데이터를 통계 차트로 보고 분포와 관계를 검증합니다.
  benefits:
  - 분석용 테이블 확인 후 통계 차트 구성에 맞는 코드 입력을 고릅니다.
  - 다이아몬드가격분석 결과를 분포, 그룹, 관계 패턴 기준으로 즉시 점검합니다.
  - 완료한 코드를 탐색 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(분석용 테이블)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 기본 히스토그램 처리 실행
      detail: 통계 차트 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 컷 등급별 구분 결과 검증
      detail: 분포, 그룹, 관계 패턴 기준으로 실행 결과를 비교합니다.
    - label: 다이아몬드가격분석 재사용
      detail: 완성 코드를 탐색 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 통계 시각화 환경
      detail: matplotlib, pandas, seaborn 기준으로 로컬 Python 실행을 준비합니다.
    - label: 다이아몬드가격분석 실행
      detail: 셀을 실행해 분포, 그룹, 관계 패턴와 예외 상태를 확인합니다.
    - label: 다이아몬드가격분석 완료
      detail: 검증된 코드를 탐색 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    seaborn과 matplotlib을 불러옵니다. diamonds 데이터는 carat(캐럿), cut(컷 등급), color(색상 등급), clarity(투명도), price(가격) 등을 포함합니다.

    diamonds 데이터는 carat(캐럿), cut(컷 등급), color(색상 등급), clarity(투명도), price(가격) 등을 포함합니다. cut은 Fair < Good < Very Good < Premium < Ideal 순서입니다.
  tips:
  - diamonds 데이터는 carat(캐럿), cut(컷 등급), color(색상 등급), clarity(투명도), price(가격) 등을 포함합니다. cut은 Fair < Good
    < Very Good < Premium < Ideal 순서입니다.
  snippet: |-
    import seaborn as sns
    from codaro.curriculum.localData import loadLocalDataset
    import matplotlib.pyplot as plt
    import pandas as pd

    diamonds = loadLocalDataset('diamonds')
    diamonds
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import seaborn as sns
      from codaro.curriculum.localData import loadLocalDataset
      import matplotlib.pyplot as plt
      import pandas as pd

      diamonds = loadLocalDataset('diamonds')
      diamonds
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    type: noError
    noError: 1단계. 라이브러리 불러오기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step2_histplot_basic
  title: 2단계. 기본 히스토그램
  structuredPrimary: true
  subtitle: sns.histplot()
  goal: 2단계. 기본 히스토그램에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: 가격 분포를 히스토그램으로 확인합니다. bins 파라미터로 구간 수를 조절합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figHist, axHist = plt.subplots(figsize=(10, 5))
    sns.histplot(data=diamonds, x='price', bins=50, ax=axHist)
    axHist.set_title('Diamond Price Distribution')
    figHist
  exercise:
    prompt: 2단계. 기본 히스토그램 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figHist, axHist = plt.subplots(figsize=(10, 5))
      sns.histplot(data=diamonds, x='price', bins=50, ax=axHist)
      axHist.set_title('Diamond Price Distribution')
      figHist
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 2단계. 기본 히스토그램의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 2단계. 기본 히스토그램 실행 결과가 분포, 그룹, 관계 패턴 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step3_histplot_hue
  title: 3단계. 컷 등급별 구분
  structuredPrimary: true
  subtitle: hue 파라미터
  goal: 3단계. 컷 등급별 구분에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: 컷 등급별로 색상을 구분합니다. 여러 그룹의 분포를 한 차트에서 비교할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figHistHue, axHistHue = plt.subplots(figsize=(10, 5))
    sns.histplot(data=diamonds, x='price', hue='cut', bins=50, ax=axHistHue)
    axHistHue.set_title('Price Distribution by Cut')
    figHistHue
  exercise:
    prompt: 3단계. 컷 등급별 구분 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figHistHue, axHistHue = plt.subplots(figsize=(10, 5))
      sns.histplot(data=diamonds, x='price', hue='cut', bins=50, ax=axHistHue)
      axHistHue.set_title('Price Distribution by Cut')
      figHistHue
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 3단계. 컷 등급별 구분의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 3단계. 컷 등급별 구분 실행 결과가 분포, 그룹, 관계 패턴 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step4_multiple
  title: 4단계. 누적 히스토그램
  structuredPrimary: true
  subtitle: multiple 파라미터
  goal: 4단계. 누적 히스토그램에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    multiple 파라미터로 히스토그램 표시 방식을 변경합니다. 'stack'은 그룹을 누적하여 표시합니다.

    multiple 옵션으로 여러 그룹의 히스토그램 표시 방식을 결정합니다. 'layer'(기본값, 겹침), 'stack'(누적), 'dodge'(나란히), 'fill'(비율 채움) 중 선택할 수 있습니다.
  tips:
  - multiple 옵션으로 여러 그룹의 히스토그램 표시 방식을 결정합니다. 'layer'(기본값, 겹침), 'stack'(누적), 'dodge'(나란히), 'fill'(비율 채움)
    중 선택할 수 있습니다.
  snippet: |-
    figStack, axStack = plt.subplots(figsize=(10, 5))
    sns.histplot(data=diamonds, x='price', hue='cut', bins=50, multiple='stack', ax=axStack)
    axStack.set_title('Stacked Price Distribution by Cut')
    figStack
  exercise:
    prompt: 4단계. 누적 히스토그램 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figStack, axStack = plt.subplots(figsize=(10, 5))
      sns.histplot(data=diamonds, x='price', hue='cut', bins=50, multiple='stack', ax=axStack)
      axStack.set_title('Stacked Price Distribution by Cut')
      figStack
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 4단계. 누적 히스토그램의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 4단계. 누적 히스토그램 실행 결과가 분포, 그룹, 관계 패턴 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step5_kdeplot
  title: 5단계. KDE 분포
  structuredPrimary: true
  subtitle: sns.kdeplot()
  goal: 5단계. KDE 분포에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    KDE(커널 밀도 추정)로 부드러운 분포를 그립니다. 히스토그램보다 연속적인 분포 형태를 파악하기 좋습니다.

    kdeplot()은 히스토그램을 부드러운 곡선으로 표현합니다. 데이터의 연속적인 분포 형태를 파악하기 좋습니다. 실제 빈도가 아닌 밀도를 보여주므로 서로 다른 크기의 그룹도 비교 가능합니다.
  tips:
  - kdeplot()은 히스토그램을 부드러운 곡선으로 표현합니다. 데이터의 연속적인 분포 형태를 파악하기 좋습니다. 실제 빈도가 아닌 밀도를 보여주므로 서로 다른 크기의 그룹도 비교
    가능합니다.
  snippet: |-
    figKde, axKde = plt.subplots(figsize=(10, 5))
    sns.kdeplot(data=diamonds, x='price', hue='cut', ax=axKde)
    axKde.set_title('Price KDE by Cut')
    figKde
  exercise:
    prompt: 5단계. KDE 분포 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figKde, axKde = plt.subplots(figsize=(10, 5))
      sns.kdeplot(data=diamonds, x='price', hue='cut', ax=axKde)
      axKde.set_title('Price KDE by Cut')
      figKde
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 5단계. KDE 분포의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 5단계. KDE 분포 실행 결과가 분포, 그룹, 관계 패턴 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step6_kdeplot_fill
  title: 6단계. 영역 채우기
  structuredPrimary: true
  subtitle: fill 파라미터
  goal: 6단계. 영역 채우기에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: KDE에서 fill로 영역을 채웁니다. alpha로 투명도를 조절하여 겹치는 영역을 구분합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figKdeFill, axKdeFill = plt.subplots(figsize=(10, 5))
    sns.kdeplot(data=diamonds, x='price', hue='cut', fill=True, alpha=0.5, ax=axKdeFill)
    axKdeFill.set_title('Filled KDE by Cut')
    figKdeFill
  exercise:
    prompt: 6단계. 영역 채우기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      figKdeFill, axKdeFill = plt.subplots(figsize=(10, 5))
      sns.kdeplot(data=diamonds, x='price', hue='cut', fill=True, alpha=0.5, ax=axKdeFill)
      axKdeFill.set_title('Filled KDE by Cut')
      figKdeFill
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    type: noError
    noError: 6단계. 영역 채우기의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 6단계. 영역 채우기 실행 결과가 분포, 그룹, 관계 패턴 기준으로 바꾼 데이터 값이나 축 설정을 반영해야 합니다.
- id: step7_displot
  title: 7단계. displot 기본
  structuredPrimary: true
  subtitle: Figure-level 분포
  goal: 7단계. displot 기본에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    displot()으로 Figure-level 분포 차트를 그립니다. kind로 히스토그램, KDE, ECDF 중 선택합니다.

