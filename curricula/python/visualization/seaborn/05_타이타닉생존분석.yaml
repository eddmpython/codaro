    sns.catplot()은 Figure-level 함수입니다. kind='bar'/'count'/'box'/'violin'/'strip'/'swarm'/'point' 중 선택합니다. col='변수'로 패널을 분할합니다. height와 aspect로 크기를 조절합니다.
