  subtitle: 예측 → 오류 수정 → 검증 → 실무 변주
  goal: 12단계. 생존율 비교 검증 루프에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
