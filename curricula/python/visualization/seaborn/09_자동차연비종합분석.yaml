    - label: 3단계. 그룹별 pairplo 결과 검증
      detail: 분포, 그룹, 관계 패턴 기준으로 실행 결과를 비교합니다.
    - label: 자동차연비종합분석 재사용
      detail: 완성 코드를 탐색 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 통계 시각화 환경
