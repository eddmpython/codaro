    전체적인 분포 패턴을 보여주고, 그 안의 박스는 중앙값과 사분위수라는 정확한 수치를 제공하여 두 가지 장점을 결합합니다. 이렇게 하면 분포가 단봉인지 다봉인지 보면서도 정확한
