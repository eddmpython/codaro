          x='count()',
          y=alt.Y('species:N', title='품종'),
          color=alt.when(brushFinal).then('species:N').otherwise(alt.value('lightgray'))
      ).properties(
          width=350,
          height=100,
          title='품종별 개수'
      ).add_params(brushFinal)

      chartFinal = scatterFinal & barFinal
