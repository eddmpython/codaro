- id: workflow_validation
  title: 9단계. 실무 집계 검증 루프
  structuredPrimary: true
  subtitle: 예측 → spec 검증 → 오류 수정 → 기준 실험
  goal: 9단계. 실무 집계 검증 루프에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: |-
    업무용 차트는 막대가 그려졌다는 사실만으로 충분하지 않습니다. 원본 데이터 구조가 맞는지, 집계 결과가 예상한 방향인지, Altair spec에 집계 함수와 그룹 인코딩이 들어갔는지 확인해야 합니다. 이 단계에서는 Dinner의 평균 결제 금액이 Lunch보다 높을 것이라고 먼저 예측합니다. 그런 다음 pandas 집계와 Altair spec을 함께 검증해, 보고서에 넣을 수 있는 차트인지 확인합니다.

    집계 차트는 원본 데이터 계약, 집계 방향, 차트 spec을 함께 검증해야 합니다. 이렇게 만들면 수업 예제가 보고서 자동화 코드로도 이어집니다.
  snippet: |-
    requiredColumns = {"total_bill", "tip", "sex", "smoker", "day", "time", "size"}
    missingColumns = requiredColumns - set(tips.columns)

    assert not missingColumns, f"필수 컬럼 누락: {missingColumns}"
    assert tips.shape == (120, 7)
    assert set(tips["time"].unique()) == {"Lunch", "Dinner"}

    timeSummary = tips.groupby("time")["total_bill"].agg(["mean", "count"]).round(2)

    predictedHigherTime = "Dinner"
    actualHigherTime = timeSummary["mean"].idxmax()

    assert actualHigherTime == predictedHigherTime
    assert timeSummary.loc["Dinner", "count"] > timeSummary.loc["Lunch", "count"]

    timeSummary
  exercise:
    prompt: 9단계. 실무 집계 검증 루프 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      requiredColumns = {"total_bill", "tip", "sex", "smoker", "day", "time", "size"}
      missingColumns = requiredColumns - set(tips.columns)

      assert not missingColumns, f"필수 컬럼 누락: {missingColumns}"
      assert tips.shape == (120, 7)
      assert set(tips["time"].unique()) == {"Lunch", "Dinner"}

      timeSummary = tips.groupby("time")["total_bill"].agg(["mean", "count"]).round(2)

      predictedHigherTime = "Dinner"
      actualHigherTime = timeSummary["mean"].idxmax()

      assert actualHigherTime == predictedHigherTime
      assert timeSummary.loc["Dinner", "count"] > timeSummary.loc["Lunch", "count"]

      timeSummary
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 9단계. 실무 집계 검증 루프에서 `requiredColumns` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 9단계. 실무 집계 검증 루프에서 기대값과 실제 결과가 같으면 검증이 통과하고, 다르면 실패해야 합니다.
