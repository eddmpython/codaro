    - label: 3단계. 평균 계산 결과 검증
      detail: 스케일과 마크 매핑 기준으로 실행 결과를 비교합니다.
    - label: 팁데이터분석 재사용
      detail: 완성 코드를 선언형 대시보드에 붙일 수 있게 정리합니다.
