    - label: 선언형 차트 환경
      detail: altair, pandas 기준으로 로컬 Python 실행을 준비합니다.
    - label: 팁데이터분석 실행
      detail: 셀을 실행해 스케일과 마크 매핑와 예외 상태를 확인합니다.
    - label: 팁데이터분석 완료
      detail: 검증된 코드를 선언형 대시보드로 남깁니다.
sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: seaborn-data
  goal: 1단계. 데이터 불러오기에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: Codaro 로컬 데이터셋에서 tips 데이터를 불러옵니다. 레스토랑 결제와 팁 패턴을 담은 예제 데이터입니다. total_bill(총 금액), tip(팁),
    sex(성별), smoker(흡연여부), day(요일), time(시간대), size(인원수) 컬럼이 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import altair as alt
    import pandas as pd
    import warnings
    warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
    from codaro.curriculum.localData import loadLocalDataset

    tips = loadLocalDataset("tips")
  exercise:
    prompt: 1단계. 데이터 불러오기 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')
      from codaro.curriculum.localData import loadLocalDataset

      tips = loadLocalDataset("tips")
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 1단계. 데이터 불러오기의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 1단계. 데이터 불러오기의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step2_count_bar
  title: 2단계. 개수 세기
  structuredPrimary: true
  subtitle: count() 집계
  goal: 2단계. 개수 세기에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    막대 차트의 기본은 카테고리별 개수를 세는 것입니다. mark_bar()를 사용하면 막대 그래프를 그립니다. 요일(day)별로 데이터가 몇 건인지 막대 차트로 표현합니다. x축에 요일, y축에 개수를 배치합니다. y에 'count()'를 사용하면 자동으로 개수를 셉니다. count()는 집계 함수로, 데이터를 세어주는 역할을 합니다. 괄호 안이 비어있는 것은 "전체 개수를 세라"는 의미입니다.

    집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로 감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
  tips:
  - 집계 함수는 여러 데이터를 하나로 요약하는 함수입니다. count()는 개수를 세고, mean()은 평균을 구하고, sum()은 합계를 구합니다. 'count()'는 작은따옴표로
    감싸야 합니다. 문자열(텍스트)로 전달해야 Altair가 이것을 집계 함수로 인식합니다.
  snippet: |-
    chartCount = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='count()'
    )
    chartCount
  exercise:
    prompt: 2단계. 개수 세기 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      chartCount = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()'
      )
      chartCount
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 2단계. 개수 세기의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 2단계. 개수 세기의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step3_mean_bar
  title: 3단계. 평균 계산
  structuredPrimary: true
  subtitle: mean() 집계
  goal: 3단계. 평균 계산에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    count() 외에도 mean(), sum(), median() 등 다양한 집계 함수를 사용할 수 있습니다. 요일별 평균 팁을 계산해봅니다. y에 'mean(tip)'을 지정하면 tip 컬럼의 평균값을 구합니다. mean() 괄호 안에 컬럼명을 넣으면 그 컬럼의 평균을 계산합니다. 'mean(tip):Q'처럼 :Q를 붙여 수량형 데이터임을 명시합니다.

    mean(tip)은 tip 컬럼의 평균을 계산합니다. sum(tip)은 합계, median(tip)은 중앙값, min(tip)/max(tip)은 최솟값/최댓값입니다.
  snippet: |-
    chartMean = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='mean(tip):Q'
    )
    chartMean
  exercise:
    prompt: 3단계. 평균 계산 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      chartMean = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='mean(tip):Q'
      )
      chartMean
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 3단계. 평균 계산의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 3단계. 평균 계산의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step4_color_group
  title: 4단계. 색상으로 그룹 분리
  structuredPrimary: true
  subtitle: color 인코딩
  goal: 4단계. 색상으로 그룹 분리에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    막대 차트에도 color 인코딩을 적용할 수 있습니다. 요일별 건수를 성별(sex)로 구분해봅니다. 같은 요일 안에서 남녀 비율을 확인할 수 있습니다.

    color를 추가하면 스택(stacked) 막대 차트가 됩니다. 각 요일 막대 안에서 성별이 쌓여서 표시됩니다.
  snippet: |-
    chartGrouped = alt.Chart(tips).mark_bar().encode(
        x='day:N',
        y='count()',
        color='sex:N'
    )
    chartGrouped
  exercise:
    prompt: 4단계. 색상으로 그룹 분리 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      chartGrouped = alt.Chart(tips).mark_bar().encode(
          x='day:N',
          y='count()',
          color='sex:N'
      )
      chartGrouped
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 4단계. 색상으로 그룹 분리의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 4단계. 색상으로 그룹 분리의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step5_ordinal
  title: 5단계. 순서형 데이터
  structuredPrimary: true
  subtitle: :O 타입
  goal: 5단계. 순서형 데이터에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    요일에는 자연스러운 순서가 있습니다. Thur → Fri → Sat → Sun 순으로 정렬하면 더 직관적입니다. :O(Ordinal, 순서형) 타입을 사용하면 순서가 있는 카테고리를 표현할 수 있습니다. :N(명목형)과 달리 :O는 순서를 지정할 수 있습니다. 먼저 dayOrder라는 변수에 요일 순서를 리스트로 저장합니다. 그다음 alt.X() 함수에서 sort=dayOrder로 이 순서를 적용합니다.

    같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막 줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  tips:
  - 같은 셀 안에서 변수를 여러 개 만들 수 있습니다. dayOrder = [...] 후 chartOrdered = alt.Chart(...)처럼 두 변수를 선언합니다. 하지만 마지막
    줄에는 하나의 변수(chartOrdered)만 써야 그것이 출력됩니다. dayOrder를 쓰면 요일 리스트가, chartOrdered를 쓰면 차트가 출력됩니다.
  snippet: |-
    dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
    chartOrdered = alt.Chart(tips).mark_bar().encode(
        x=alt.X('day:O', sort=dayOrder),
        y='count()',
        color='sex:N'
    )
    chartOrdered
  exercise:
    prompt: 5단계. 순서형 데이터 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
      chartOrdered = alt.Chart(tips).mark_bar().encode(
          x=alt.X('day:O', sort=dayOrder),
          y='count()',
          color='sex:N'
      )
      chartOrdered
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 5단계. 순서형 데이터의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 5단계. 순서형 데이터의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step6_horizontal
  title: 6단계. 가로 막대 차트
  structuredPrimary: true
  subtitle: x와 y 교환
  goal: 6단계. 가로 막대 차트에서 채널 인코딩 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: x와 y를 바꾸면 가로 막대 차트가 됩니다. x축에 숫자(평균 금액)를, y축에 카테고리(요일)를 배치합니다. 카테고리 이름이 길거나 항목이 많을 때 가로
    막대가 읽기 쉽습니다. 여기서는 'mean(total_bill):Q'로 총 금액의 평균을 계산하고, time(시간대)으로 색상을 구분합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    chartHorizontal = alt.Chart(tips).mark_bar().encode(
        x='mean(total_bill):Q',
        y='day:O',
        color='time:N'
    )
    chartHorizontal
  exercise:
    prompt: 6단계. 가로 막대 차트 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      chartHorizontal = alt.Chart(tips).mark_bar().encode(
          x='mean(total_bill):Q',
          y='day:O',
          color='time:N'
      )
      chartHorizontal
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 6단계. 가로 막대 차트의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 6단계. 가로 막대 차트의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step7_properties
  title: 7단계. 차트 속성 설정
  structuredPrimary: true
  subtitle: properties()
