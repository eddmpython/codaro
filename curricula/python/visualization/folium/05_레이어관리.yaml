intro:
  emoji: 📚
  goal: 여러 레이어를 그룹으로 관리하고 토글합니다.
  description: 지도에 많은 요소가 있으면 관리가 어렵습니다. FeatureGroup으로 요소를 그룹화하고 LayerControl로 켜고 끌 수 있게 합니다. 카테고리별로
    마커를 분류하고 사용자가 원하는 것만 표시합니다.
  direction: 레이어 관리에서 위치 데이터를 지도 레이어로 배치하고 마커/영역 표시를 검증합니다.
  benefits:
  - 위도/경도 데이터 확인 후 지도 레이어 구성에 맞는 코드 입력을 고릅니다.
  - 레이어 관리 결과를 마커와 저장 HTML 기준으로 즉시 점검합니다.
  - 완료한 코드를 위치 기반 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(위도/경도 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. FeatureGrou 처리 실행
      detail: 지도 레이어 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 여러 그룹 만들기 결과 검증
      detail: 마커와 저장 HTML 기준으로 실행 결과를 비교합니다.
    - label: 레이어 관리 재사용
      detail: 완성 코드를 위치 기반 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 지도 시각화 환경
      detail: folium 기준으로 로컬 Python 실행을 준비합니다.
    - label: 레이어 관리 실행
      detail: 셀을 실행해 마커와 저장 HTML와 예외 상태를 확인합니다.
    - label: 레이어 관리 완료
      detail: 검증된 코드를 위치 기반 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: folium과 Codaro를 불러옵니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import folium
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: import folium
    hints:
    - 바꿀 지점은 위도/경도 데이터을 만드는 첫 줄과 지도 레이어 구성 줄에서 찾으세요.
    - 실행 뒤 마커와 저장 HTML 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 실행 결과가 마커와 저장 HTML 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step2_feature_group
  title: 2단계. FeatureGroup 생성
  structuredPrimary: true
  subtitle: FeatureGroup()
  goal: 2단계. FeatureGroup 생성에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    FeatureGroup()은 여러 요소를 하나의 그룹으로 묶습니다. 그룹 단위로 표시/숨김을 제어할 수 있습니다.

    마커를 그룹에 추가하고(add_to(group)), 그룹을 지도에 추가합니다(add_to(map)).
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=13)

    cafeGroup = folium.FeatureGroup(name="카페")

    cafes = [
        [37.5665, 126.9780],
        [37.5700, 126.9750],
        [37.5630, 126.9820]
    ]

    for loc in cafes:
        folium.Marker(
            location=loc,
            icon=folium.Icon(color="cadetblue", icon="cloud")
        ).add_to(cafeGroup)

    cafeGroup.add_to(m1)

    m1
  exercise:
    prompt: 2단계. FeatureGroup 생성 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=13)

      cafeGroup = folium.FeatureGroup(name="카페")

      cafes = [
          [37.5665, 126.9780],
          [37.5700, 126.9750],
          [37.5630, 126.9820]
      ]

      for loc in cafes:
          folium.Marker(
              location=loc,
              icon=folium.Icon(color="cadetblue", icon="cloud")
          ).add_to(cafeGroup)

      cafeGroup.add_to(m1)

      m1
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 2단계. FeatureGroup 생성의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 2단계. FeatureGroup 생성 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step3_multiple_groups
  title: 3단계. 여러 그룹 만들기
  structuredPrimary: true
  subtitle: 카테고리별 분류
  goal: 3단계. 여러 그룹 만들기에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    여러 FeatureGroup을 만들어 카테고리별로 마커를 분류합니다.

    그룹별로 아이콘 색상을 다르게 하면 구분하기 쉽습니다.
  snippet: |-
    m2 = folium.Map(location=seoulCenter, zoom_start=13)

    restaurantGroup = folium.FeatureGroup(name="음식점")
    cafeGroup2 = folium.FeatureGroup(name="카페")

    restaurants = [
        {"name": "한식당", "loc": [37.5680, 126.9760]},
        {"name": "일식당", "loc": [37.5650, 126.9800]},
        {"name": "양식당", "loc": [37.5620, 126.9750]}
    ]

    cafes2 = [
        {"name": "스타벅스", "loc": [37.5670, 126.9820]},
        {"name": "투썸", "loc": [37.5640, 126.9770]},
        {"name": "이디야", "loc": [37.5690, 126.9790]}
    ]

    for r in restaurants:
        folium.Marker(
            location=r["loc"],
            popup=r["name"],
            icon=folium.Icon(color="red", icon="cutlery")
        ).add_to(restaurantGroup)

    for c in cafes2:
        folium.Marker(
            location=c["loc"],
            popup=c["name"],
            icon=folium.Icon(color="blue", icon="cloud")
        ).add_to(cafeGroup2)

    restaurantGroup.add_to(m2)
    cafeGroup2.add_to(m2)

    m2
  exercise:
    prompt: 3단계. 여러 그룹 만들기 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=13)

      restaurantGroup = folium.FeatureGroup(name="음식점")
      cafeGroup2 = folium.FeatureGroup(name="카페")

      restaurants = [
          {"name": "한식당", "loc": [37.5680, 126.9760]},
          {"name": "일식당", "loc": [37.5650, 126.9800]},
          {"name": "양식당", "loc": [37.5620, 126.9750]}
      ]

      cafes2 = [
          {"name": "스타벅스", "loc": [37.5670, 126.9820]},
          {"name": "투썸", "loc": [37.5640, 126.9770]},
          {"name": "이디야", "loc": [37.5690, 126.9790]}
      ]

      for r in restaurants:
          folium.Marker(
              location=r["loc"],
              popup=r["name"],
              icon=folium.Icon(color="red", icon="cutlery")
          ).add_to(restaurantGroup)

      for c in cafes2:
          folium.Marker(
              location=c["loc"],
              popup=c["name"],
              icon=folium.Icon(color="blue", icon="cloud")
          ).add_to(cafeGroup2)

      restaurantGroup.add_to(m2)
      cafeGroup2.add_to(m2)

      m2
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 3단계. 여러 그룹 만들기의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 3단계. 여러 그룹 만들기 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step4_layer_control
  title: 4단계. LayerControl 추가
  structuredPrimary: true
  subtitle: LayerControl()
  goal: 4단계. LayerControl 추가에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    LayerControl()을 추가하면 우측 상단에 레이어 토글 버튼이 생깁니다.

    우측 상단 아이콘을 클릭하면 레이어 목록이 나타납니다. 체크박스로 레이어를 켜고 끌 수 있습니다.
  snippet: |-
    m3 = folium.Map(location=seoulCenter, zoom_start=13)

    restaurantGroup2 = folium.FeatureGroup(name="음식점")
    cafeGroup3 = folium.FeatureGroup(name="카페")

    for r in restaurants:
        folium.Marker(
            location=r["loc"],
            popup=r["name"],
            icon=folium.Icon(color="red", icon="cutlery")
        ).add_to(restaurantGroup2)

    for c in cafes2:
        folium.Marker(
            location=c["loc"],
            popup=c["name"],
            icon=folium.Icon(color="blue", icon="cloud")
        ).add_to(cafeGroup3)

    restaurantGroup2.add_to(m3)
    cafeGroup3.add_to(m3)

    folium.LayerControl().add_to(m3)

    m3
  exercise:
    prompt: 4단계. LayerControl 추가 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      m3 = folium.Map(location=seoulCenter, zoom_start=13)

      restaurantGroup2 = folium.FeatureGroup(name="음식점")
      cafeGroup3 = folium.FeatureGroup(name="카페")

      for r in restaurants:
          folium.Marker(
              location=r["loc"],
              popup=r["name"],
              icon=folium.Icon(color="red", icon="cutlery")
          ).add_to(restaurantGroup2)

      for c in cafes2:
          folium.Marker(
              location=c["loc"],
              popup=c["name"],
              icon=folium.Icon(color="blue", icon="cloud")
          ).add_to(cafeGroup3)

      restaurantGroup2.add_to(m3)
      cafeGroup3.add_to(m3)

      folium.LayerControl().add_to(m3)

      m3
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 4단계. LayerControl 추가의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 4단계. LayerControl 추가 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step5_overlay_vs_base
  title: 5단계. 오버레이 vs 베이스 레이어
  structuredPrimary: true
  subtitle: 레이어 종류
  goal: 5단계. 오버레이 vs 베이스 레이어에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    베이스 레이어는 라디오 버튼(하나만 선택), 오버레이는 체크박스(다중 선택)입니다. FeatureGroup은 기본적으로 오버레이입니다.

    타일 레이어는 베이스(라디오), FeatureGroup은 오버레이(체크박스)로 표시됩니다.
  snippet: |-
    m4 = folium.Map(location=seoulCenter, zoom_start=13, tiles=None)

    folium.TileLayer("OpenStreetMap", name="기본 지도").add_to(m4)
    folium.TileLayer("CartoDB Positron", name="심플 지도").add_to(m4)

    markerGroup = folium.FeatureGroup(name="마커")
    folium.Marker(seoulCenter, popup="시청").add_to(markerGroup)
    markerGroup.add_to(m4)

    circleGroup = folium.FeatureGroup(name="영역")
    folium.Circle(seoulCenter, radius=500, color="blue").add_to(circleGroup)
    circleGroup.add_to(m4)

    folium.LayerControl().add_to(m4)

    m4
  exercise:
    prompt: 5단계. 오버레이 vs 베이스 레이어 예제에서 `m4`, `markerGroup`, `circleGroup` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=13, tiles=None)

      folium.TileLayer("OpenStreetMap", name="기본 지도").add_to(m4)
      folium.TileLayer("CartoDB Positron", name="심플 지도").add_to(m4)

      markerGroup = folium.FeatureGroup(name="마커")
      folium.Marker(seoulCenter, popup="시청").add_to(markerGroup)
      markerGroup.add_to(m4)

      circleGroup = folium.FeatureGroup(name="영역")
      folium.Circle(seoulCenter, radius=500, color="blue").add_to(circleGroup)
      circleGroup.add_to(m4)

      folium.LayerControl().add_to(m4)

      m4
    hints:
    - 바꿀 지점은 `m4 = ...` 오른쪽 값입니다.
    - 실행 뒤 `m4` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 5단계. 오버레이 vs 베이스 레이어에서 `m4` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 5단계. 오버레이 vs 베이스 레이어 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step6_show_option
  title: 6단계. 기본 표시 설정
  structuredPrimary: true
  subtitle: show 파라미터
  goal: 6단계. 기본 표시 설정에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    show=False로 설정하면 처음에는 숨겨진 상태로 시작합니다.

    선택적 정보(주차장, 화장실 등)는 show=False로 숨겨두면 지도가 깔끔합니다.
  snippet: |-
    m5 = folium.Map(location=seoulCenter, zoom_start=13)

    visibleGroup = folium.FeatureGroup(name="기본 표시", show=True)
    hiddenGroup = folium.FeatureGroup(name="숨김 시작", show=False)

    folium.Marker(
        [37.5665, 126.9750],
        popup="항상 보임",
        icon=folium.Icon(color="green")
    ).add_to(visibleGroup)

    folium.Marker(
        [37.5665, 126.9810],
        popup="레이어 켜야 보임",
        icon=folium.Icon(color="gray")
    ).add_to(hiddenGroup)

    visibleGroup.add_to(m5)
    hiddenGroup.add_to(m5)

    folium.LayerControl().add_to(m5)

    m5
  exercise:
    prompt: 6단계. 기본 표시 설정 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      m5 = folium.Map(location=seoulCenter, zoom_start=13)

      visibleGroup = folium.FeatureGroup(name="기본 표시", show=True)
      hiddenGroup = folium.FeatureGroup(name="숨김 시작", show=False)

      folium.Marker(
          [37.5665, 126.9750],
          popup="항상 보임",
          icon=folium.Icon(color="green")
      ).add_to(visibleGroup)

      folium.Marker(
          [37.5665, 126.9810],
          popup="레이어 켜야 보임",
          icon=folium.Icon(color="gray")
      ).add_to(hiddenGroup)

      visibleGroup.add_to(m5)
      hiddenGroup.add_to(m5)

