      restaurantAreas = [
          [37.5636, 126.9869],
          [37.5701, 126.9995],
          [37.5660, 126.9910]
      ]

      for area in restaurantAreas:
          for i in range(20):
              lat = area[0] + random.uniform(-0.006, 0.006)
              lon = area[1] + random.uniform(-0.006, 0.006)
              folium.Marker(
                  location=[lat, lon],
                  popup=f"맛집 {i+1}",
                  icon=folium.Icon(color="orange", icon="cutlery")
              ).add_to(restaurantCluster)

      restaurantCluster.add_to(tourMap)

      tourMap
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 5단계. 음식점 클러스터의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 5단계. 음식점 클러스터 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step6_heatmap
  title: 6단계. 관광객 밀도 히트맵
  structuredPrimary: true
  subtitle: HeatMap
  goal: 6단계. 관광객 밀도 히트맵에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    관광객 밀도를 히트맵으로 시각화합니다.

    히트맵도 FeatureGroup에 넣으면 레이어 컨트롤로 제어됩니다.
  snippet: |-
    densityGroup = folium.FeatureGroup(name="관광객 밀도", show=False)

    densityData = []

    hotspots = [
        {"loc": [37.5796, 126.9770], "weight": 1.0},
        {"loc": [37.5636, 126.9869], "weight": 0.9},
        {"loc": [37.5512, 126.9882], "weight": 0.8},
        {"loc": [37.5563, 126.9236], "weight": 0.7}
    ]

    for hs in hotspots:
        for _ in range(50):
            lat = hs["loc"][0] + random.uniform(-0.01, 0.01)
            lon = hs["loc"][1] + random.uniform(-0.01, 0.01)
            densityData.append([lat, lon, hs["weight"]])

    HeatMap(
        densityData,
        radius=20,
        blur=15,
        gradient={0.4: "blue", 0.6: "lime", 0.8: "yellow", 1: "red"}
    ).add_to(densityGroup)

    densityGroup.add_to(tourMap)

    tourMap
  exercise:
    prompt: 6단계. 관광객 밀도 히트맵 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      densityGroup = folium.FeatureGroup(name="관광객 밀도", show=False)

      densityData = []

      hotspots = [
          {"loc": [37.5796, 126.9770], "weight": 1.0},
          {"loc": [37.5636, 126.9869], "weight": 0.9},
          {"loc": [37.5512, 126.9882], "weight": 0.8},
          {"loc": [37.5563, 126.9236], "weight": 0.7}
      ]

      for hs in hotspots:
          for _ in range(50):
              lat = hs["loc"][0] + random.uniform(-0.01, 0.01)
              lon = hs["loc"][1] + random.uniform(-0.01, 0.01)
              densityData.append([lat, lon, hs["weight"]])

      HeatMap(
          densityData,
          radius=20,
          blur=15,
          gradient={0.4: "blue", 0.6: "lime", 0.8: "yellow", 1: "red"}
      ).add_to(densityGroup)

      densityGroup.add_to(tourMap)

      tourMap
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
