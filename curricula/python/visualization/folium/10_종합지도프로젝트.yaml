- id: workflow_validation
  title: 11단계. 종합 지도 품질 검증
  structuredPrimary: true
  subtitle: 데이터 계약과 레이어 렌더 확인
  goal: 11단계. 종합 지도 품질 검증에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
