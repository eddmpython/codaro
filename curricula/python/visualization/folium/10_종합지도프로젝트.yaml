      solution: |
        def audit_map_project_release(candidate):
            expected = {'mark': 'map-dashboard', 'x': 'longitude', 'y': 'latitude', 'group': 'layer', 'transforms': ['export-fallback', 'fit-bounds', 'layer-policy', 'quality-gate'], 'interaction': 'layer-filter'}
            errors = []
            for name in ["mark", "x", "y", "group", "transforms", "interaction"]:
                actual = sorted(candidate.get(name, [])) if name == "transforms" else candidate.get(name)
                if actual != expected[name]:
                    errors.append(name)
            if not str(candidate.get("description", "")).strip():
                errors.append("description")
            return {"valid": not errors, "errors": errors, "encoding": expected}
