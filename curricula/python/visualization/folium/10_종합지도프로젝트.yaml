intro:
  emoji: 🏆
  goal: 모든 기능을 종합한 인터랙티브 지도를 제작합니다.
  description: 지금까지 배운 모든 내용을 활용합니다. 마커, 클러스터, 히트맵, GeoJSON, 레이어 컨트롤을 조합하여 완성도 높은 지도를 만듭니다. 서울 관광 종합 지도를
    예제로 구현합니다.
  direction: 종합 지도 프로젝트에서 위치 데이터를 지도 레이어로 배치하고 마커/영역 표시를 검증합니다.
  benefits:
  - 위도/경도 데이터 확인 후 지도 레이어 구성에 맞는 코드 입력을 고릅니다.
  - 종합 지도 프로젝트 결과를 마커와 저장 HTML 기준으로 즉시 점검합니다.
  - 완료한 코드를 위치 기반 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(위도/경도 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 베이스 맵 설정 처리 실행
      detail: 지도 레이어 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 주요 랜드마크 결과 검증
      detail: 마커와 저장 HTML 기준으로 실행 결과를 비교합니다.
    - label: 종합 지도 프로젝트 재사용
      detail: 완성 코드를 위치 기반 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 지도 시각화 환경
      detail: branca, folium 기준으로 로컬 Python 실행을 준비합니다.
    - label: 종합 지도 프로젝트 실행
      detail: 셀을 실행해 마커와 저장 HTML와 예외 상태를 확인합니다.
    - label: 종합 지도 프로젝트 완료
      detail: 검증된 코드를 위치 기반 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: 모든 플러그인 import
  goal: 1단계. 라이브러리 불러오기에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: 필요한 모든 라이브러리와 플러그인을 불러옵니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import folium
    from folium.plugins import HeatMap, MarkerCluster
    import branca.colormap as cm
    import random
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: |-
      import folium
      from folium.plugins import HeatMap, MarkerCluster
      import branca.colormap as cm
      import random
    hints:
    - 바꿀 지점은 위도/경도 데이터을 만드는 첫 줄과 지도 레이어 구성 줄에서 찾으세요.
    - 실행 뒤 마커와 저장 HTML 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 실행 결과가 마커와 저장 HTML 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step2_base_map
  title: 2단계. 베이스 맵 설정
  structuredPrimary: true
  subtitle: 기본 지도
  goal: 2단계. 베이스 맵 설정에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    다중 타일 레이어를 지원하는 베이스 맵을 만듭니다.

    여러 타일을 추가하면 LayerControl에서 전환할 수 있습니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]

    tourMap = folium.Map(
        location=seoulCenter,
        zoom_start=12,
        tiles=None
    )

    folium.TileLayer(
        "CartoDB Positron",
        name="밝은 지도"
    ).add_to(tourMap)

    folium.TileLayer(
        "CartoDB Dark_Matter",
        name="어두운 지도"
    ).add_to(tourMap)

    folium.TileLayer(
        "OpenStreetMap",
        name="상세 지도"
    ).add_to(tourMap)

    tourMap
  exercise:
    prompt: 2단계. 베이스 맵 설정 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]

      tourMap = folium.Map(
          location=seoulCenter,
          zoom_start=12,
          tiles=None
      )

      folium.TileLayer(
          "CartoDB Positron",
          name="밝은 지도"
      ).add_to(tourMap)

      folium.TileLayer(
          "CartoDB Dark_Matter",
          name="어두운 지도"
      ).add_to(tourMap)

      folium.TileLayer(
          "OpenStreetMap",
          name="상세 지도"
      ).add_to(tourMap)

      tourMap
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 2단계. 베이스 맵 설정에서 `seoulCenter` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 2단계. 베이스 맵 설정 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step3_landmark_markers
  title: 3단계. 주요 랜드마크
  structuredPrimary: true
  subtitle: 개별 마커
  goal: 3단계. 주요 랜드마크에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    주요 랜드마크는 개별 마커로 강조합니다.

    중요한 위치는 개별 마커로 표시하여 클러스터에 묻히지 않게 합니다.
  snippet: |-
    landmarks = [
        {"name": "경복궁", "loc": [37.5796, 126.9770], "desc": "조선 왕궁", "icon": "tower"},
        {"name": "남산타워", "loc": [37.5512, 126.9882], "desc": "서울 랜드마크", "icon": "signal"},
        {"name": "광화문", "loc": [37.5760, 126.9769], "desc": "조선 정문", "icon": "flag"},
        {"name": "동대문DDP", "loc": [37.5673, 127.0095], "desc": "디자인플라자", "icon": "th-large"}
    ]
    landmarks
  exercise:
    prompt: 3단계. 주요 랜드마크 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      landmarks = [
          {"name": "경복궁", "loc": [37.5796, 126.9770], "desc": "조선 왕궁", "icon": "tower"},
          {"name": "남산타워", "loc": [37.5512, 126.9882], "desc": "서울 랜드마크", "icon": "signal"},
          {"name": "광화문", "loc": [37.5760, 126.9769], "desc": "조선 정문", "icon": "flag"},
          {"name": "동대문DDP", "loc": [37.5673, 127.0095], "desc": "디자인플라자", "icon": "th-large"}
      ]
      landmarks
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 3단계. 주요 랜드마크에서 `landmarks` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 3단계. 주요 랜드마크 실행 뒤 `landmarks` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: step4_cafe_cluster
  title: 4단계. 카페 클러스터
  structuredPrimary: true
  subtitle: MarkerCluster
  goal: 4단계. 카페 클러스터에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    카페 위치를 클러스터로 표시합니다. 대량 데이터를 효율적으로 관리합니다.

    60개 카페가 클러스터로 깔끔하게 표시됩니다.
  snippet: |-
    cafeCluster = MarkerCluster(name="카페")

    cafeAreas = [
        [37.5796, 126.9770],
        [37.5636, 126.9869],
        [37.5563, 126.9236],
        [37.4979, 127.0276]
    ]

    for area in cafeAreas:
        for i in range(15):
            lat = area[0] + random.uniform(-0.008, 0.008)
            lon = area[1] + random.uniform(-0.008, 0.008)
            folium.Marker(
                location=[lat, lon],
                popup=f"카페 {i+1}",
                icon=folium.Icon(color="cadetblue", icon="cloud")
            ).add_to(cafeCluster)

    cafeCluster.add_to(tourMap)

    tourMap
  exercise:
    prompt: 4단계. 카페 클러스터 예제에서 반복 대상의 항목이나 범위를 바꾸고 반복 결과가 같이 바뀌는지 확인하세요.
    starterCode: |-
      cafeCluster = MarkerCluster(name="카페")

      cafeAreas = [
          [37.5796, 126.9770],
          [37.5636, 126.9869],
          [37.5563, 126.9236],
          [37.4979, 127.0276]
      ]

      for area in cafeAreas:
          for i in range(15):
              lat = area[0] + random.uniform(-0.008, 0.008)
              lon = area[1] + random.uniform(-0.008, 0.008)
              folium.Marker(
                  location=[lat, lon],
                  popup=f"카페 {i+1}",
                  icon=folium.Icon(color="cadetblue", icon="cloud")
              ).add_to(cafeCluster)

      cafeCluster.add_to(tourMap)

      tourMap
    hints:
    - 바꿀 지점은 for 오른쪽의 리스트, range(), 슬라이스, 조건에서 찾으세요.
    - 실행 뒤 반복 횟수, 누적값, 만들어진 리스트 길이가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 4단계. 카페 클러스터의 반복 대상과 들여쓰기가 맞아 루프가 끝까지 실행되어야 합니다.
    resultCheck: 4단계. 카페 클러스터 반복 결과의 개수나 누적값이 바꾼 반복 대상 기준으로 달라져야 합니다.
- id: step5_restaurant_cluster
  title: 5단계. 음식점 클러스터
  structuredPrimary: true
  subtitle: 별도 클러스터
  goal: 5단계. 음식점 클러스터에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 반복 결과를 확인하면 빠진 항목이나 잘못된 누적을 초기에 잡을 수 있습니다.
  explanation: |-
    음식점용 별도 클러스터를 만들어 카테고리를 분리합니다.

    show=False로 기본 숨김 상태입니다. LayerControl에서 켤 수 있습니다.
  snippet: |-
    restaurantCluster = MarkerCluster(name="음식점", show=False)

    restaurantAreas = [
        [37.5636, 126.9869],
        [37.5701, 126.9995],
        [37.5660, 126.9910]
