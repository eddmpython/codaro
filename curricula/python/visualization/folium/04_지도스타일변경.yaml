meta:
  packages:
  - folium
  id: folium_04
  title: 지도 스타일 변경
  order: 4
  category: folium
  difficulty: ⭐⭐
  badge: 기초
  tags:
  - folium
  - tiles
  - TileLayer
  - 스타일
  - 테마
  seo:
    title: Folium 지도 스타일 - 타일 레이어 변경
    description: Folium으로 지도 스타일을 변경합니다. OpenStreetMap, CartoDB, OpenTopoMap 등 다양한 타일을 사용합니다.
    keywords:
    - folium
    - tiles
    - TileLayer
    - CartoDB
    - OpenTopoMap
