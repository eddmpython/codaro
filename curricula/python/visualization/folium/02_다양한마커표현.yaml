meta:
  packages:
  - folium
  id: folium_02
  title: 다양한마커표현
  order: 2
  category: folium
  difficulty: ⭐
  badge: 입문
  tags:
  - folium
  - Marker
  - Icon
  - popup
  - tooltip
  - HTML
  seo:
    title: Folium 마커 커스터마이징 - 아이콘과 팝업
    description: Folium에서 다양한 마커 스타일을 사용합니다. 커스텀 아이콘, HTML 팝업, 툴팁을 배웁니다.
    keywords:
    - folium
    - Marker
    - Icon
    - DivIcon
