    마커 표현은 디자인 문제가 아니라 데이터 계약 문제입니다. 카테고리 매핑, 좌표 범위, 팝업 핵심 정보, 위험도 기준을 코드로 검증하면 지도 결과물을 업무 리포트로 믿고 사용할 수 있습니다.
