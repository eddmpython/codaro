- id: step8_circle_marker
  title: 8단계. CircleMarker
  structuredPrimary: true
  subtitle: 원형 마커
  goal: 8단계. CircleMarker에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    CircleMarker()는 크기가 고정된 원형 마커입니다. 줌 레벨에 상관없이 같은 크기로 표시됩니다.

    CircleMarker의 radius는 픽셀 단위입니다. Circle()의 radius는 미터 단위라서 줌에 따라 크기가 변합니다.
  snippet: |-
    m8 = folium.Map(location=seoulLoc, zoom_start=14)

    folium.CircleMarker(
        location=[37.5665, 126.9780],
        radius=10,
        color="red",
        fill=True,
        fill_color="red",
        fill_opacity=0.7,
        popup="작은 원"
    ).add_to(m8)

    folium.CircleMarker(
        location=[37.5600, 126.9850],
        radius=20,
        color="blue",
        fill=True,
        fill_color="blue",
        fill_opacity=0.5,
        popup="중간 원"
    ).add_to(m8)

    folium.CircleMarker(
        location=[37.5700, 126.9700],
        radius=30,
        color="green",
        fill=True,
        fill_color="green",
        fill_opacity=0.3,
        popup="큰 원"
    ).add_to(m8)

    m8
  exercise:
