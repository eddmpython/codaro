- id: loop
  title: ''
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 'loop: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'loop: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    반복문 - 같은 일을 여러 번 자동으로!

    운동장 10바퀴 뛰기! 하나하나 세지 말고 컴퓨터가 알아서 반복하게 하자
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: 이제 반복문으로 효율적인 프로그램을 만들어보세요. 구구단, 별 찍기, 리스트 처리 등 다양한 실습을 해보세요!
  exercise:
    prompt: 'loop: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: 이제 반복문으로 효율적인 프로그램을 만들어보세요. 구구단, 별 찍기, 리스트 처리 등 다양한 실습을 해보세요!
    solution: 이제 반복문으로 효율적인 프로그램을 만들어보세요. 구구단, 별 찍기, 리스트 처리 등 다양한 실습을 해보세요!
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: sectionTitle
    emoji: 🔄
    title: 반복문 - 같은 일을 여러 번 자동으로!
  - type: centerText
    emoji: 🏃‍♂️
    text: 운동장 10바퀴 뛰기! 하나하나 세지 말고 컴퓨터가 알아서 반복하게 하자
    endEmoji: 💪
  - type: threeColumnCards
    cards:
    - title: 반복문이란?
      content: 같은 작업을 여러 번 반복해서 실행하는 문법이에요. 손으로 하나하나 쓰지 말고 컴퓨터가 알아서!
      points:
      - 'for문: 정해진 횟수만큼 반복 (가장 많이 사용)'
      - 'while문: 조건이 참인 동안 계속 반복'
      - 리스트, 문자열 등을 하나씩 처리할 때 유용
      - 반복 작업의 효율성을 극대화!
    - title: for문 사용하기
      content: 가장 자주 사용하는 for문으로 반복을 마스터해보세요!
      code: |
        # 1부터 5까지 출력
        for i in range(1, 6):
            print(f"{i}번째 반복")

        # 리스트의 각 항목 처리
        fruits = ["사과", "바나나", "오렌지"]
        for fruit in fruits:
            print(f"맛있는 {fruit}")
    - title: range() 함수
      content: 숫자 범위를 만들어주는 유용한 함수예요.
      code: |
        range(5)        # 0, 1, 2, 3, 4
        range(1, 6)     # 1, 2, 3, 4, 5
        range(0, 10, 2) # 0, 2, 4, 6, 8

        # while문도 있어요!
        count = 0
        while count < 3:
            print(count)
            count += 1
  - type: practiceCard
