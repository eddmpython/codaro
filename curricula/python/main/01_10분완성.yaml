  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: 이제 상황에 따라 다르게 반응하는 프로그램을 만들어보세요. 아래 에디터에서 다양한 조건문을 실험해보세요!
  exercise:
