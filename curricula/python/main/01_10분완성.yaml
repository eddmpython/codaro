meta:
  id: main01
  title: 파이썬 10분 완성
  order: 1
  category: main
  tags:
  - 파이썬
  - 입문
  - 10분
  - 기초문법
intro:
  direction: 파이썬 10분 완성에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - 파이썬 10분 완성 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 추가 패키지 없이 로컬 Python에서 바로 실행하고, 첫 실행에서 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
  diagram:
    steps:
    - label: 목표
      detail: 완료 후 만들 산출물을 먼저 확인
    - label: 준비
      detail: 표준 라이브러리 또는 기본 Python 실행 확인
    - label: 실습
      detail: 예제 스니펫을 바꿔 직접 실행
    - label: 검증
      detail: assert와 결과 비교로 완료 판단
    runtime:
    - label: 패키지
      detail: 표준 라이브러리 확인 -> cell-call -> assert 검증
    - label: 첫 실행
      detail: import 확인과 assert 검증
    - label: 완료
      detail: 리포트/자동화/검증 루틴으로 재사용
sections:
- id: printFunction
  title: ''
  blocks:
  - type: sectionTitle
    emoji: 📢
    title: print() 함수 - 파이썬에서 첫번째로 하는것
  - type: centerText
    emoji: 🤔
    text: 몇년째 print("hello world")만 해본사람 있다? 없다?
    endEmoji: 😅
  - type: threeColumnCards
    cards:
    - title: print() 함수란?
      content: 화면에 텍스트나 값을 출력하는 가장 기본적인 함수입니다.
      points:
      - 파이썬을 배우면 제일 먼저 만나는 친구
      - 컴퓨터와 대화할 때 꼭 필요한 도구
      - 사용법이 정말 간단해요!
    - title: 기본 사용법
      content: print() 함수의 다양한 사용 예시를 확인해보세요.
      code: |
        print("Hello, World!")
        print(42+52)
        print(0.01+0.05)
    - title: 직접 실습해보세요!
      content: 아래 에디터에서 print() 함수를 사용해보세요.
      footer:
        icon: keyboard
        text: '실행 방법: Ctrl + Enter 또는 Shift + Enter'
  - type: video
    url: study/print.mp4
  - type: localWorkbench
- id: variable
  title: ''
  blocks:
  - type: sectionTitle
    emoji: 📦
    title: 변수 - 데이터 또는 데이터 더미 들의 이름표!
  - type: centerText
    emoji: 🤷‍♂️
    text: 변수가 뭔지 모르겠다고? 그냥 내맘대로 붙이는 이름표!!
    endEmoji: 📝
  - type: threeColumnCards
    cards:
    - title: 변수란?
      content: 데이터에 붙여주는 이름표입니다. 데이터는 그냥 있고, 우리가 이름을 붙여서 나중에 찾아 쓸 수 있어요.
      points:
      - 숫자 25에 "나이"라는 이름표를 붙이는 거예요
      - 이름표만 부르면 그 데이터를 가져올 수 있어요
      - 같은 데이터에 여러 이름표도 붙일 수 있어요!
    - title: 변수 만들기
      content: 변수를 만드는 방법은 정말 간단해요!
      code: |
        name = "홍길동"
        age = 25
        height = 175.5
        print(name, age, height)
    - title: 직접 만들어보세요!
      content: 아래 에디터에서 나만의 변수를 만들어보세요.
      footer:
        icon: keyboard
        text: '실행 방법: Ctrl + Enter 또는 Shift + Enter'
  - type: video
    url: study/variable.mp4
  - type: localWorkbench
- id: dataType
  title: ''
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 'dataType: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'dataType: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    자료형 - 데이터의 종류와 성질

    모든 데이터는 고유한 자료형을 가져요! 파이썬은 다양한 자료형을 제공합니다
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: 이제 직접 다양한 자료형을 사용해보고, 각각의 특성을 확인해보세요. 아래 코드 에디터에서 실습할 수 있어요!
  exercise:
    prompt: 'dataType: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: 이제 직접 다양한 자료형을 사용해보고, 각각의 특성을 확인해보세요. 아래 코드 에디터에서 실습할 수 있어요!
    solution: 이제 직접 다양한 자료형을 사용해보고, 각각의 특성을 확인해보세요. 아래 코드 에디터에서 실습할 수 있어요!
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: sectionTitle
    emoji: 🏷️
    title: 자료형 - 데이터의 종류와 성질
  - type: centerText
    emoji: 🔍
    text: 모든 데이터는 고유한 자료형을 가져요! 파이썬은 다양한 자료형을 제공합니다
    endEmoji: 📊
  - type: threeColumnCards
    minWidth: 350px
    cards:
    - title: 자료형이란?
      content: 데이터를 분류하는 기준이에요! 파이썬에서는 모든 데이터가 고유한 자료형을 가지고 있습니다.
      points:
      - '기본 자료형: 정수(int), 실수(float), 문자열(str), 불린(bool)'
      - '컬렉션 자료형: 리스트(list), 딕셔너리(dict), 튜플(tuple), 세트(set)'
      - '고급 자료형: 함수(function), 클래스(class), 모듈(module) 등'
      - 자료형마다 고유한 특성과 사용 가능한 기능들이 달라요
      - 파이썬은 자동으로 자료형을 판단해서 할당해줘요 (동적 타이핑)
      - 같은 변수에 다른 자료형의 데이터를 다시 저장할 수 있어요
    - title: 주요 자료형들
      content: 파이썬에서 자주 사용하는 자료형들과 그 특징을 알아보세요.
      code: |
        age = 25           # int - 정수, 사칙연산 가능
        height = 175.5     # float - 실수, 소수점 계산
        name = "김철수"     # str - 문자열, 텍스트 처리
        is_student = True  # bool - 논리값, 조건문에 활용
        scores = [85, 90, 78]  # list - 순서있는 목록
        info = {"이름": "김철수", "나이": 25}  # dict - 키-값 쌍
    - title: 자료형 확인하기
      content: type() 함수를 사용해서 데이터의 자료형을 확인할 수 있어요.
      code: |
        print(type(42))        # <class 'int'>
        print(type(3.14))      # <class 'float'>
        print(type("안녕"))     # <class 'str'>
        print(type([1,2,3]))   # <class 'list'>
  - type: practiceCard
    icon: code
    title: 자료형을 만들어 봅시다!
    content: 이제 직접 다양한 자료형을 사용해보고, 각각의 특성을 확인해보세요. 아래 코드 에디터에서 실습할 수 있어요!
    footer:
      icon: play_arrow
      text: 변수를 만들고 type()으로 자료형을 확인해보세요
  - type: video
    url: study/dataType.mp4
  - type: localWorkbench
- id: conditional
  title: ''
  structuredPrimary: true
