  goal: 'conditional: 실행 가능한 Python 흐름으로 익힌다.'
  why: 'conditional: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    조건문 - 상황에 따라 다르게 행동하기

    빨간불이면 멈추고, 초록불이면 가고! 컴퓨터도 상황을 판단할 수 있어요
  tips:
