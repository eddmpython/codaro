    starterCode: 이제 상황에 따라 다르게 반응하는 프로그램을 만들어보세요. 아래 에디터에서 다양한 조건문을 실험해보세요!
    solution: 이제 상황에 따라 다르게 반응하는 프로그램을 만들어보세요. 아래 에디터에서 다양한 조건문을 실험해보세요!
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: sectionTitle
    emoji: 🤔
    title: 조건문 - 상황에 따라 다르게 행동하기
  - type: centerText
    emoji: 🚦
    text: 빨간불이면 멈추고, 초록불이면 가고! 컴퓨터도 상황을 판단할 수 있어요
    endEmoji: ⚡
  - type: threeColumnCards
    cards:
    - title: 조건문이란?
      content: 상황에 따라 다른 행동을 하도록 하는 문법이에요. 만약 ~라면 이렇게 하고, 아니면 저렇게 해!
      points:
      - 'if: 만약 조건이 참이면 실행'
      - 'elif: 다른 조건을 추가로 확인'
      - 'else: 모든 조건이 거짓일 때 실행'
      - 일상생활의 판단과 똑같아요!
    - title: 조건문 사용하기
      content: 실생활 예시로 조건문을 이해해보세요!
      code: |
        score = 85
        if score >= 90:
            print("A학점! 훌륭해요!")
        elif score >= 80:
            print("B학점! 잘했어요!")
        else:
            print("더 열심히 해봐요!")
    - title: 비교 연산자
      content: 조건을 만들 때 사용하는 기호들이에요.
      code: |
        ==  # 같다
        !=  # 다르다
        >   # 크다
        <   # 작다
        >=  # 크거나 같다
        <=  # 작거나 같다
