meta:
  id: main01
  title: 파이썬 10분 완성
  order: 1
  category: main
  tags:
  - 파이썬
  - 입문
  - 10분
  - 기초문법
intro:
  direction: 파이썬 10분 완성에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - 파이썬 10분 완성 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 추가 패키지 없이 로컬 Python에서 바로 실행하고, 첫 실행에서 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
  diagram:
    steps:
    - label: 목표
      detail: 완료 후 만들 산출물을 먼저 확인
    - label: 준비
      detail: 표준 라이브러리 또는 기본 Python 실행 확인
    - label: 실습
      detail: 예제 스니펫을 바꿔 직접 실행
    - label: 검증
      detail: assert와 결과 비교로 완료 판단
    runtime:
    - label: 패키지
      detail: 표준 라이브러리 확인 -> cell-call -> assert 검증
    - label: 첫 실행
      detail: import 확인과 assert 검증
    - label: 완료
      detail: 리포트/자동화/검증 루틴으로 재사용
sections:
- id: printFunction
  title: ''
  blocks:
  - type: sectionTitle
    emoji: 📢
    title: print() 함수 - 파이썬에서 첫번째로 하는것
  - type: centerText
    emoji: 🤔
    text: 몇년째 print("hello world")만 해본사람 있다? 없다?
    endEmoji: 😅
  - type: threeColumnCards
    cards:
    - title: print() 함수란?
      content: 화면에 텍스트나 값을 출력하는 가장 기본적인 함수입니다.
      points:
      - 파이썬을 배우면 제일 먼저 만나는 친구
      - 컴퓨터와 대화할 때 꼭 필요한 도구
      - 사용법이 정말 간단해요!
    - title: 기본 사용법
      content: print() 함수의 다양한 사용 예시를 확인해보세요.
      code: |
        print("Hello, World!")
        print(42+52)
        print(0.01+0.05)
    - title: 직접 실습해보세요!
      content: 아래 에디터에서 print() 함수를 사용해보세요.
      footer:
        icon: keyboard
        text: '실행 방법: Ctrl + Enter 또는 Shift + Enter'
  - type: video
    url: study/print.mp4
  - type: localWorkbench
- id: variable
  title: ''
  blocks:
  - type: sectionTitle
    emoji: 📦
    title: 변수 - 데이터 또는 데이터 더미 들의 이름표!
  - type: centerText
    emoji: 🤷‍♂️
    text: 변수가 뭔지 모르겠다고? 그냥 내맘대로 붙이는 이름표!!
    endEmoji: 📝
  - type: threeColumnCards
    cards:
    - title: 변수란?
      content: 데이터에 붙여주는 이름표입니다. 데이터는 그냥 있고, 우리가 이름을 붙여서 나중에 찾아 쓸 수 있어요.
      points:
      - 숫자 25에 "나이"라는 이름표를 붙이는 거예요
      - 이름표만 부르면 그 데이터를 가져올 수 있어요
      - 같은 데이터에 여러 이름표도 붙일 수 있어요!
    - title: 변수 만들기
      content: 변수를 만드는 방법은 정말 간단해요!
      code: |
        name = "홍길동"
        age = 25
        height = 175.5
        print(name, age, height)
    - title: 직접 만들어보세요!
      content: 아래 에디터에서 나만의 변수를 만들어보세요.
      footer:
        icon: keyboard
        text: '실행 방법: Ctrl + Enter 또는 Shift + Enter'
  - type: video
    url: study/variable.mp4
  - type: localWorkbench
