    keywords: ["statsmodels", "로그변환", "범주형변수", "더미변수", "보험료예측", "get_dummies"]

intro:
  emoji: "🏥"
  goal: 나이, BMI, 흡연 여부 등으로 의료보험 비용을 예측합니다.
  description: 1,338명의 보험 가입자 데이터로 개인 특성에 따른 보험료를 예측합니다. 보험 상품 가격 책정과 리스크 평가에 활용할 수 있습니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 의료보험 데이터셋
  blocks:
  - type: text
    content: "Insurance 데이터셋은 1,338명의 미국 의료보험 가입자 정보로, 나이, 성별, BMI(체질량지수), 자녀 수, 흡연 여부, 거주 지역, 연간 보험료를 담고 있습니다. 이 데이터로 개인 특성(위험 요인)이 보험료에 미치는 영향을 정량적으로 분석할 수 있으며, charges(보험료)가 예측할 종속변수입니다. 실제 보험사에서는 이런 분석으로 가입자의 리스크를 평가하고 공정한 보험료를 산출하며, 어떤 요인이 의료비 증가에 가장 큰 영향을 미치는지 파악합니다."
  - type: code
    language: python
    title: 데이터 불러오기
    description: CSV 파일 로드
    content: |-
      import pandas as pd
      import statsmodels.api as sm

      url = "https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv"
      insuranceData = pd.read_csv(url)
      insuranceData.shape

- id: step2_head
  title: 2단계. 데이터 미리보기
  subtitle: 컬럼 구조 확인
  blocks:
  - type: text
    content: "age(나이), sex(성별: male/female), bmi(체질량지수: 몸무게kg ÷ 키m²), children(피부양 자녀 수), smoker(흡연 여부: yes/no), region(미국 내 거주 지역: southeast, southwest 등), charges(연간 보험료, 달러)가 있습니다. sex, smoker, region은 범주형 변수(카테고리)이고 나머지는 수치형 변수입니다. 범주형 변수는 문자열이므로 그대로 회귀에 사용할 수 없어, get_dummies()로 0/1 더미 변수로 변환해야 합니다. 이 변환 과정은 통계 분석의 필수 전처리 단계입니다."
  - type: code
    language: python
    title: 처음 5행 확인
    description: 컬럼 타입 파악
    content: |-
      insuranceData.head()

- id: step3_describe
  title: 3단계. 기초 통계량
  subtitle: 수치형 변수 분포
  blocks:
  - type: text
    content: "charges(보험료)의 평균은 약 13,270달러이지만 최대값은 63,770달러로 편차가 매우 큽니다. 표준편차가 12,110달러로 평균에 근접하며, 이는 데이터가 크게 흩어져 있음을 의미합니다. 중앙값(9,382달러)이 평균보다 낮은 것은 분포가 오른쪽으로 치우쳐 있다는(right-skewed) 강력한 신호입니다. 소수의 고위험군(흡연자, 고령자)이 매우 높은 보험료를 내기 때문이며, 이런 비대칭 분포는 로그 변환으로 정규화하면 회귀 모델의 정규성 가정을 만족시켜 R²와 p-value의 정확도가 향상됩니다."
  - type: code
    language: python
    title: 기초 통계량
    description: 평균, 표준편차, 범위
    content: |-
      insuranceData.describe()

- id: step4_hist
  title: 4단계. 보험료 분포 확인
  subtitle: 히스토그램
  blocks:
  - type: text
    content: charges(보험료)의 히스토그램을 그리면 오른쪽으로 긴 꼬리를 가진 비대칭 분포(right-skewed distribution)를 확인할 수 있습니다. 히스토그램은 데이터의 분포를 막대 그래프로 나타낸 것으로, 각 막대의 높이는 해당 구간에 속하는 데이터의 개수를 의미합니다. 이 데이터에서 대부분의 사람(약 70%)은 5,000~15,000달러의 낮은 보험료를 내지만, 일부 고위험군(흡연자, 고령자)은 40,000달러 이상의 매우 높은 보험료를 냅니다. 이런 비대칭 분포는 회귀분석의 정규성 가정을 위반하여 모델 성능을 저하시키므로, 로그 변환으로 분포를 대칭에 가깝게 만들어야 합니다. 정규성 가정이 위반되면 p-value가 부정확해지고 신뢰구간이 넓어집니다.
  - type: code
    language: python
    title: 보험료 히스토그램
    description: 분포 확인
    content: |-
      import plotly.express as px

      histFig = px.histogram(insuranceData, x='charges', nbins=30,
                             title='Original Distribution of Charges',
                             labels={'charges': 'Charges ($)', 'count': 'Frequency'})
      histFig.show()
  - type: tip
    content: plotly.express의 px.histogram()은 인터랙티브 히스토그램을 그립니다. nbins=30은 30개 구간으로 나눈다는 뜻으로, bins 개수가 많으면 세밀하지만 노이즈가 생기고, 적으면 패턴이 뭉개집니다. labels로 축 이름을 지정하며, 마우스를 올리면 각 막대의 정확한 개수와 범위를 확인할 수 있습니다. 정규분포는 종 모양(bell curve)이지만, 이 데이터는 왼쪽에 치우쳐 오른쪽 꼬리가 긴 형태입니다.

- id: step5_log_transform
  title: 5단계. 로그 변환
  subtitle: 분포 정규화
  blocks:
  - type: text
    content: 로그 변환(logarithmic transformation)은 큰 값을 압축하고 작은 값을 상대적으로 확대하여 비대칭 분포를 대칭에 가깝게 만드는 데이터 변환 기법입니다. numpy의 log() 함수는 자연로그(밑이 e≈2.718인 로그)를 계산하며, 예를 들어 10,000달러는 log(10000)≈9.2, 50,000달러는 log(50000)≈10.8로 변환되어 차이가 40,000에서 1.6으로 줄어듭니다. 로그 변환 후 분포가 종 모양(bell curve)에 가까워지면 회귀 모델의 정규성 가정이 만족되어 R²가 향상되고 p-value가 정확해집니다. 로그 변환은 (1) 비대칭 분포를 대칭화, (2) 이상치(outlier)의 영향 감소, (3) 곱셈 관계를 덧셈 관계로 변환하는 효과가 있어, 금융 데이터(소득, 자산)나 생물학 데이터(세포 수)에서 필수적입니다.
  - type: code
    language: python
    title: 로그 변환
    description: log(charges) 계산
    content: |-
      import numpy as np
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots

      insuranceData['logCharges'] = np.log(insuranceData['charges'])

      logCompFig = make_subplots(rows=1, cols=2, subplot_titles=['Original', 'Log Transformed'])
      logCompFig.add_trace(go.Histogram(x=insuranceData['charges'], nbinsx=30, name='Original'), row=1, col=1)
      logCompFig.add_trace(go.Histogram(x=insuranceData['logCharges'], nbinsx=30, name='Log'), row=1, col=2)
      logCompFig.update_xaxes(title_text='Charges ($)', row=1, col=1)
      logCompFig.update_xaxes(title_text='Log(Charges)', row=1, col=2)
      logCompFig.update_yaxes(title_text='Frequency', row=1, col=1)
      logCompFig.update_layout(showlegend=False, title_text='Original vs Log Transformed Distribution')
      logCompFig.show()
  - type: tip
    content: numpy.log()는 자연로그(밑이 e인 로그)를 계산하며, log10()은 상용로그(밑이 10)입니다. plotly의 make_subplots()는 여러 그래프를 나란히 배치하고, add_trace()로 각 위치에 그래프를 추가합니다. row=1, col=1은 첫 번째 위치, row=1, col=2는 두 번째 위치를 의미합니다. 로그 변환 후 오른쪽 그래프가 좌우 대칭에 가까워진 것을 확인할 수 있으며, 이는 회귀 모델의 성능을 크게 향상시킵니다.

- id: step6_dummies
  title: 6단계. 범주형 변수를 더미 변수로 변환
  subtitle: get_dummies()
  blocks:
  - type: text
    content: "sex, smoker, region은 문자열(male/female, yes/no 등)이므로 회귀에 직접 사용할 수 없습니다. get_dummies()로 0과 1로 이루어진 더미 변수(dummy variable)로 변환합니다. 예를 들어 smoker 컬럼은 smoker_yes(흡연자면 1, 아니면 0)로 변환됩니다. drop_first=True 옵션은 첫 번째 카테고리를 제거하여 다중공선성(multicollinearity)을 방지하며, 예를 들어 sex가 male/female 두 개면 sex_male만 생성하고 sex_female은 생략합니다(sex_female = 1 - sex_male로 완벽히 예측 가능하기 때문)."
  - type: code
    language: python
    title: 더미 변수 변환
    description: 범주형 → 0/1 변수
    content: |-
      insuranceDummies = pd.get_dummies(insuranceData, columns=['sex', 'smoker', 'region'], drop_first=True, dtype=int)
      insuranceDummies.head()
  - type: tip
    content: get_dummies()는 범주형 변수(카테고리)를 더미 변수(dummy variable, 0/1)로 변환하는 pandas 함수입니다. drop_first=True는 다중공선성(multicollinearity)을 방지하기 위해 첫 번째 카테고리를 제거합니다. 예를 들어 sex가 male/female 두 개면 sex_male만 생성하며, 1=남성, 0=여성을 의미합니다. 만약 sex_male과 sex_female을 모두 포함하면 sex_female = 1 - sex_male로 완벽한 선형 관계(완벽한 다중공선성)가 발생하여 역행렬 계산이 불가능해지고 회귀가 실패합니다. k개 카테고리는 k-1개 더미 변수로 충분하며, 제거된 카테고리는 기준(reference) 그룹이 됩니다.

- id: step7_xy_split
  title: 7단계. X와 y 분리
  subtitle: 독립변수와 종속변수
  blocks:
  - type: text
    content: "logCharges(로그 변환된 보험료)를 종속변수(y)로, 나머지 특성들을 독립변수(X)로 분리합니다. charges(원본 보험료)와 logCharges는 모두 종속변수이므로 X에서 제외합니다. 01, 02 프로젝트에서 배운 것처럼 회귀분석에서 X(원인)와 y(결과)를 명확히 분리하는 것은 필수입니다. drop() 메서드로 특정 컬럼을 제거하여 깔끔하게 분리할 수 있습니다."
  - type: code
    language: python
    title: X와 y 분리
    description: 독립/종속 변수
    content: |-
      y = insuranceDummies['logCharges']
      X = insuranceDummies.drop(['charges', 'logCharges'], axis=1)
      X.head()
  - type: tip
    content: drop()은 컬럼을 제거합니다. axis=1은 컬럼 방향(가로)을 의미합니다. axis=0은 행 방향(세로)입니다. 리스트로 여러 컬럼을 한번에 제거할 수 있습니다.

- id: step8_add_constant
  title: 8단계. 상수항 추가
  subtitle: 절편 계산
  blocks:
  - type: text
    content: "01, 02 프로젝트에서 배운 것처럼 add_constant()로 절편(intercept)용 컬럼을 추가합니다. 절편은 모든 독립변수가 0일 때의 기본 보험료를 의미하며, 회귀식 y = β₀ + β₁X₁ + β₂X₂ + ...에서 β₀에 해당합니다. statsmodels는 sklearn과 달리 절편을 자동으로 추가하지 않으므로 이 단계가 필수이며, 모든 회귀 모델(OLS, Logit, ARIMA 등)에 동일하게 적용됩니다."
  - type: code
    language: python
    title: 상수항 추가
    description: const 컬럼 추가
    content: |-
      XWithConst = sm.add_constant(X)

- id: step9_fit_model
  title: 9단계. 회귀 모델 학습
  subtitle: 로그 보험료 예측
  blocks:
  - type: text
    content: OLS(y, X).fit()으로 모델을 학습합니다. 종속변수가 logCharges(로그 변환된 보험료)이므로 예측값도 로그 스케일입니다. 로그 스케일은 log() 함수를 적용한 값으로, 예를 들어 10,000달러는 log(10000) ≈ 9.2로 표현됩니다. 나중에 실제 보험료(달러 단위)로 변환하려면 로그의 역함수인 exp() 지수 함수를 적용해야 합니다. exp(9.2) ≈ 10,000처럼 원래 값으로 되돌립니다. fit()은 01 프로젝트에서 배운 것처럼 최소제곱법으로 계수를 계산하는 과정입니다.
  - type: code
    language: python
    title: 회귀 모델 학습
    description: 로그 보험료 예측
    content: |-
      model = sm.OLS(y, XWithConst).fit()

- id: step10_summary
  title: 10단계. 결과 요약
  subtitle: summary 해석
  blocks:
  - type: text
    content: "R²는 약 0.75로, 선택한 변수들이 로그 보험료 변동의 75%를 설명합니다. 주목할 점은 smoker_yes의 계수가 1.51로 가장 크며, p-value가 0.000으로 통계적으로 매우 유의미합니다. 이는 흡연이 보험료에 압도적으로 큰 영향을 미친다는 강력한 증거입니다. age(나이)와 bmi(체질량지수)도 유의미한 양의 계수를 가지며, 나이가 많고 BMI가 높을수록 보험료가 증가합니다. 이 결과는 보험사의 위험 평가 기준과 일치합니다."
  - type: code
    language: python
    title: 회귀 결과 요약
    description: R², p-value, 계수
    content: |-
      model.summary()
  - type: tip
    content: "로그 변환된 종속변수의 계수는 백분율 변화로 해석하며, 이는 일반 회귀와 다른 중요한 차이입니다. smoker_yes 계수가 1.51이면 exp(1.51) ≈ 4.53으로 변환하고, 흡연자는 비흡연자보다 보험료가 (4.53 - 1) × 100 = 353% 높다는 뜻입니다. 수식으로 설명하면 log(Y) = β₀ + β₁X 모델에서 β₁의 의미는 X가 1 증가할 때 Y가 exp(β₁)배 변한다는 것입니다. 예를 들어 age 계수가 0.034이면 나이 1세 증가 시 보험료는 exp(0.034) ≈ 1.035배, 즉 3.5% 증가합니다. 이 해석 방법은 경제학과 금융에서 널리 사용되며, 소득, 가격, 수익률 등 곱셈 효과가 있는 변수에 적합합니다."

- id: step11_residual_plot
  title: 11단계. 잔차 분석
  subtitle: 모델 진단
  blocks:
  - type: text
    content: 02 프로젝트에서 배운 잔차 플롯으로 로그 변환 모델의 적합성을 진단합니다. 로그 변환 전에는 잔차가 깔때기 모양이었다면, 변환 후에는 더 균일하게 분포해야 합니다. 잔차가 0 주변에 무작위로 흩어져 있으면 좋은 모델입니다.
  - type: code
    language: python
    title: 잔차 플롯
    description: 예측값 vs 잔차
    content: |-
      import altair as alt

      residDf = pd.DataFrame({
          'fitted': model.fittedvalues,
          'residual': model.resid
      })
      residChart = alt.Chart(residDf).mark_circle(size=40, opacity=0.5).encode(
          x=alt.X('fitted:Q', title='Fitted Values (Log Scale)'),
          y=alt.Y('residual:Q', title='Residuals'),
          tooltip=['fitted', 'residual']
      ).properties(width=500, height=300, title='Residual Plot - Log Model')

      zeroRule = alt.Chart(pd.DataFrame({'y': [0]})).mark_rule(color='red', strokeDash=[5, 5]).encode(y='y:Q')
      residChart + zeroRule
  - type: tip
    content: 로그 변환 후 잔차가 더 균일하게 분포한다면 변환이 효과적이라는 증거입니다. 깔때기 모양(이분산성)이 사라졌는지 확인하세요.

- id: step12_coef_viz
  title: 12단계. 계수 시각화
  subtitle: 영향력 비교
  blocks:
  - type: text
    content: 계수를 막대 그래프로 시각화하면 각 변수의 영향력을 직관적으로 비교할 수 있습니다. 로그 모델에서 계수는 백분율 변화를 의미하므로, smoker_yes의 큰 계수는 흡연이 보험료에 압도적인 영향을 미친다는 것을 시각적으로 보여줍니다.
  - type: code
    language: python
    title: 계수 막대 그래프
    description: 변수별 영향력
    content: |-
      coefData = model.params.drop('const').reset_index()
      coefData.columns = ['variable', 'coefficient']
      coefData['abs_coef'] = coefData['coefficient'].abs()
      coefData = coefData.sort_values('abs_coef', ascending=False)

      coefChart = alt.Chart(coefData).mark_bar().encode(
          x=alt.X('coefficient:Q', title='Coefficient'),
          y=alt.Y('variable:N', sort='-x', title='Variable'),
          color=alt.condition(
              alt.datum.coefficient > 0,
              alt.value('#2ecc71'),
              alt.value('#e74c3c')
          ),
          tooltip=['variable', 'coefficient']
      ).properties(width=400, height=300, title='Regression Coefficients (Log Model)')
      coefChart
  - type: tip
    content: 녹색은 양의 계수(보험료 증가), 빨간색은 음의 계수(보험료 감소)입니다. smoker_yes가 다른 변수보다 압도적으로 크다는 것을 한눈에 알 수 있습니다.

- id: step13_top_coefficients
  title: 13단계. 주요 영향 요인
  subtitle: 계수 크기 비교
  blocks:
  - type: text
    content: "계수의 절대값이 클수록 로그 보험료(즉 백분율 변화)에 미치는 영향이 큽니다. smoker_yes(1.51), age(0.034), bmi(0.013) 순으로 영향력이 큽니다. 로그 모델에서 계수는 백분율 변화로 해석하며, smoker_yes 1.51은 흡연자가 비흡연자보다 exp(1.51) ≈ 4.5배, 즉 약 350% 높은 보험료를 낸다는 의미입니다. 이 분석으로 보험사는 흡연자 할증률을 정당화하고, 가입자는 금연의 경제적 이점을 이해할 수 있습니다."
  - type: code
    language: python
    title: 영향력 큰 변수 TOP 5
    description: 절대값 기준 정렬
    content: |-
      coefficients = model.params.drop('const')
      coefficients.abs().sort_values(ascending=False).head(5)

- id: step14_predict_log
  title: 14단계. 로그 보험료 예측
  subtitle: 새로운 사람 입력
  blocks:
  - type: text
    content: "30세, 남성, BMI 25, 자녀 1명, 비흡연자, southeast 지역인 사람의 로그 보험료를 예측합니다. 더미 변수는 해당 조건에 맞으면 1, 아니면 0으로 입력합니다. 예를 들어 sex_male=1(남성), smoker_yes=0(비흡연자), region_southeast=0(southeast가 아님, drop_first로 제거됨)입니다. 01, 02 프로젝트에서 배운 predict() 사용법을 적용하며, 학습 데이터와 동일한 컬럼 순서와 이름을 맞춰야 합니다."
  - type: code
    language: python
    title: 로그 보험료 예측
    description: 새로운 사람 데이터
    content: |-
      newPersonData = {col: [0] for col in X.columns}
      newPersonData['age'] = [30]
      newPersonData['bmi'] = [25]
      newPersonData['children'] = [1]
      newPersonData['sex_male'] = [1]

      newPerson = pd.DataFrame(newPersonData)[X.columns]
      newPersonWithConst = sm.add_constant(newPerson, has_constant='add')
      logPredicted = model.predict(newPersonWithConst)[0]
      f"예측 로그 보험료: {logPredicted:.3f}"

- id: step15_predict_actual
  title: 15단계. 실제 보험료로 변환
  subtitle: 지수 함수 적용
  blocks:
  - type: text
    content: "로그 보험료를 실제 달러 단위 보험료로 변환하려면 지수 함수 exp()를 적용합니다. log()와 exp()는 역함수 관계로, exp(log(x)) = x가 성립합니다. 예를 들어 예측된 로그 보험료가 8.5이면 exp(8.5) ≈ 4,914달러가 실제 예상 연간 보험료입니다. 이 변환은 비즈니스에서 실제 금액을 산출할 때 필수이며, 로그 모델의 최종 결과물입니다."
  - type: code
    language: python
    title: 실제 보험료 계산
    description: exp(로그값) = 실제값
    content: |-
      actualPredicted = np.exp(logPredicted)
      f"예측 보험료: ${actualPredicted:.2f}"
  - type: tip
    content: numpy.exp()는 자연상수 e(≈2.718)의 거듭제곱을 계산하는 지수 함수입니다. exp(x)는 e^x를 의미하며, 예를 들어 exp(2) = e² ≈ 7.39입니다. log()와 exp()는 역함수 관계로, exp(log(x)) = x가 성립하여 서로 상쇄됩니다. 로그 변환 후 회귀한 경우 예측값이 로그 스케일이므로 반드시 exp()로 원래 스케일(실제 보험료)로 되돌려야 비즈니스에서 사용할 수 있습니다. np는 numpy를 짧게 줄인 별칭으로, import numpy as np로 선언했기 때문에 사용 가능합니다.

- id: step16_smoker_comparison
  title: 16단계. 흡연자 vs 비흡연자
  subtitle: 흡연 효과 비교
  blocks:
  - type: text
    content: "같은 조건(나이, 성별, BMI, 자녀 수, 지역)에서 흡연 여부만 바꿔서 보험료 차이를 확인합니다. 다른 변수는 고정하고 smoker_yes만 0에서 1로 바꾸면 순수한 흡연 효과를 정량적으로 측정할 수 있습니다. 02 프로젝트에서 배운 '다른 변수 고정 시 순수 효과' 개념을 적용하며, 이는 인과관계 분석의 핵심입니다. 결과적으로 흡연자는 비흡연자보다 약 3~4배 높은 보험료를 내며, 이 수치는 보험사의 흡연자 할증률 결정에 직접 활용됩니다."
  - type: code
    language: python
    title: 흡연 효과 계산
    description: 흡연자 보험료 비교
    content: |-
      newPersonSmoker = newPerson.copy()
      newPersonSmoker['smoker_yes'] = 1

      newPersonSmokerConst = sm.add_constant(newPersonSmoker, has_constant='add')

      nonSmokerCharge = np.exp(model.predict(newPersonWithConst)[0])
      smokerCharge = np.exp(model.predict(newPersonSmokerConst)[0])

      f"비흡연자 보험료: ${nonSmokerCharge:.2f}"
      f"흡연자 보험료: ${smokerCharge:.2f}"
      f"차이: ${smokerCharge - nonSmokerCharge:.2f}"
      f"비율: {smokerCharge / nonSmokerCharge:.2f}배"


- id: practice
  title: 실습
  subtitle: 보험료 책정 프로젝트
  blocks:
  - type: text
    content: 보험사 리스크 분석가가 되어 개인 특성별 보험료를 책정해봅시다. 각 미션은 데이터 로딩부터 로그 변환, 범주형 처리, 모델링, 예측까지 전체 과정을 독립적으로 수행합니다. 01 프로젝트의 OLS와 summary, 02 프로젝트의 다중회귀와 잔차 분석, 그리고 이번 프로젝트의 로그 변환과 범주형 변수 처리를 모두 활용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 로그 변환 모델"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import pandas as pd
        import statsmodels.api as sm
        import numpy as np

        logUrl = "https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv"
        logData = pd.read_csv(logUrl)
        logData.shape
    - type: code
      title: "모델 학습"
      content: |-
        logY = np.log(logData['charges'])
        logX = pd.get_dummies(logData[['age', 'sex', 'bmi', 'children', 'smoker', 'region']], drop_first=True, dtype=int)
        logXConst = sm.add_constant(logX)
        logModel = sm.OLS(logY, logXConst).fit()
        logModel.summary()
    - type: code
      title: "잔차 플롯"
      content: |-
        import plotly.express as px

        logResidDf = pd.DataFrame({'Fitted': logModel.fittedvalues, 'Residuals': logModel.resid})
        logResidFig = px.scatter(logResidDf, x='Fitted', y='Residuals', title='Residual Plot', opacity=0.5)
        logResidFig.add_hline(y=0, line_dash='dash', line_color='red')
        logResidFig
  - type: expansion
    title: "미션2: 흡연 효과 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 모델"
      content: |-
        import pandas as pd
        import statsmodels.api as sm
        import numpy as np

        smkUrl = "https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv"
        smkData = pd.read_csv(smkUrl)
        smkY = np.log(smkData['charges'])
        smkX = pd.get_dummies(smkData[['age', 'sex', 'bmi', 'children', 'smoker', 'region']], drop_first=True, dtype=int)
        smkXConst = sm.add_constant(smkX)
        smkModel = sm.OLS(smkY, smkXConst).fit()
    - type: code
      title: "흡연자 비교"
      content: |-
        baseData = {col: [0] for col in smkX.columns}
        baseData['age'] = [30]
        baseData['bmi'] = [25]
        baseData['children'] = [1]

        nonSmkDf = pd.DataFrame(baseData)[smkX.columns]
        smkDf = nonSmkDf.copy()
        smkDf['smoker_yes'] = 1

        nonSmkCharge = np.exp(smkModel.predict(sm.add_constant(nonSmkDf, has_constant='add'))[0])
        smkCharge = np.exp(smkModel.predict(sm.add_constant(smkDf, has_constant='add'))[0])

        pd.DataFrame({'흡연': ['비흡연', '흡연'], '보험료': [nonSmkCharge, smkCharge], '비율': [1.0, smkCharge/nonSmkCharge]})


- id: summary
  title: 정리
  subtitle: 세 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 의료보험 데이터로 나이, BMI, 흡연 여부 등으로 보험료를 예측했습니다. 로그 변환으로 비대칭 분포를 정규화하여 R² 0.75를 달성했고, get_dummies()로 범주형 변수를 처리했습니다. 흡연자는 비흡연자보다 보험료가 약 3.5배 높다는 것을 확인했으며, 이 모델로 개인별 공정한 보험료를 책정하고 리스크 요인을 파악할 수 있습니다.
  - type: list
    items:
    - "로그 변환 - 비대칭 분포를 정규화하여 모델 성능 개선"
    - "get_dummies() - 범주형 변수를 0/1 더미 변수로 변환"
    - "drop_first=True - 다중공선성 방지"
    - "exp() - 로그 예측값을 실제값으로 변환"
    - "계수 해석 - 로그 모델은 백분율 변화"
    - "요인 비교 - 다른 변수 고정 시 순수 효과 측정"
  - type: text
    content: 다음 프로젝트에서는 항공 수요 데이터로 시계열 분석을 시작합니다. ARIMA 모델로 월별 승객 수를 예측하고 계절성을 분해해봅니다.
