- id: step13_coef_plot
  title: 13단계. 계수 시각화
  structuredPrimary: true
  subtitle: 신뢰구간 포함
  goal: 13단계. 계수 시각화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    회귀 계수를 막대그래프로 시각화하면 각 변수의 영향력을 한눈에 비교할 수 있습니다. 신뢰구간(confidence interval)을 함께 표시하면 계수의 불확실성도 확인할 수 있습니다. 신뢰구간이 0을 포함하면 그 변수는 통계적으로 유의하지 않을 수 있습니다. seaborn의 barplot과 에러바를 사용해 직관적인 시각화를 만듭니다.

    model.conf_int()는 95% 신뢰구간의 하한과 상한을 반환합니다. 녹색은 양의 계수(가격 상승), 빨간색은 음의 계수(가격 하락)입니다. 에러바가 0을 지나지 않으면 통계적으로 유의미합니다.
  tips:
  - model.conf_int()는 95% 신뢰구간의 하한과 상한을 반환합니다. 녹색은 양의 계수(가격 상승), 빨간색은 음의 계수(가격 하락)입니다. 에러바가 0을 지나지 않으면
    통계적으로 유의미합니다.
  snippet: |-
    import seaborn as sns
    import matplotlib.pyplot as plt

    coefDf = pd.DataFrame({
        'variable': model.params.index[1:],
        'coef': model.params.values[1:],
        'lower': model.conf_int()[0].values[1:],
        'upper': model.conf_int()[1].values[1:]
    })
    coefDf['error'] = coefDf['upper'] - coefDf['coef']

    coefFig, coefAx = plt.subplots(figsize=(8, 5))
    colors = ['#2ecc71' if c > 0 else '#e74c3c' for c in coefDf['coef']]
    coefAx.barh(coefDf['variable'], coefDf['coef'], xerr=coefDf['error'], color=colors, capsize=5)
    coefAx.axvline(x=0, color='black', linestyle='--', linewidth=1)
    coefAx.set_xlabel('Coefficient')
    coefAx.set_title('Regression Coefficients with 95% CI')
    plt.tight_layout()
    coefFig
