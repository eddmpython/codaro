  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: OLS(y, X).fit()으로 다중회귀 모델을 학습합니다. 다중회귀(multiple regression)는 여러 독립변수(X1, X2, X3...)를 동시에
    사용하여 종속변수(y)를 예측하는 방법으로, 단순회귀가 "직선"을 찾는다면 다중회귀는 "평면" 또는 "고차원 공간"을 찾습니다. 사용법은 단순회귀와 같지만, X가 여러 컬럼을
    가진 DataFrame이라는 차이가 있습니다. 최소제곱법으로 각 변수의 회귀 계수를 동시에 계산하며, 수식은 y = β₀ + β₁X₁ + β₂X₂ + ... 형태입니다. 예를
    들어 집값 = 절편 + (방개수 계수 × 방개수) + (범죄율 계수 × 범죄율)로 표현됩니다.
  tips:
