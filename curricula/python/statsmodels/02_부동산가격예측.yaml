- id: step9_rsquared
  title: 9단계. R² 확인
  structuredPrimary: true
  subtitle: 모델 설명력
  goal: 9단계. R² 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    R² 0.69는 5개 변수가 가격 변동의 69%를 설명한다는 뜻으로, 01 프로젝트의 TV 광고비 단일 변수(R² 0.61)보다 높은 설명력을 보입니다. 그러나 변수를 추가하면 실제 성능 향상과 무관하게 R²는 항상 증가하는 문제가 있습니다. 따라서 Adjusted R²(수정 결정계수)를 함께 확인해야 합니다. Adjusted R²는 변수 개수에 페널티를 부여하여, 쓸모없는 변수를 추가하면 오히려 감소합니다. 두 값의 차이가 크면 불필요한 변수가 포함되었을 가능성이 있습니다.

    Adjusted R²는 변수 개수를 고려한 R²입니다. 변수를 추가해도 모델 성능이 실제로 개선되지 않으면 Adjusted R²는 오히려 감소합니다. 변수 선택 시 Adjusted R²를 기준으로 판단하는 것이 더 정확합니다.
  tips:
  - Adjusted R²는 변수 개수를 고려한 R²입니다. 변수를 추가해도 모델 성능이 실제로 개선되지 않으면 Adjusted R²는 오히려 감소합니다. 변수 선택 시 Adjusted
    R²를 기준으로 판단하는 것이 더 정확합니다.
  snippet: |-
    f"R²: {model.rsquared:.3f}"
    f"Adjusted R²: {model.rsquared_adj:.3f}"
  exercise:
