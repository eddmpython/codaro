sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  structuredPrimary: true
  subtitle: 보스턴 주택 데이터셋
  goal: 1단계. 데이터 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: Boston Housing 데이터셋은 1970년대 보스턴 지역 506개 주택의 13개 특성(방 개수, 범죄율, 세금, 학생-교사 비율 등)과 중앙값 가격(MEDV)을
    담고 있습니다. 통계학과 머신러닝 교육에서 가장 많이 사용되는 대표적인 벤치마크 데이터셋입니다. 이 데이터로 어떤 요인이 집값에 가장 큰 영향을 미치는지 분석하면, 부동산 가격
    책정, 투자 의사결정, 도시 계획 정책 수립에 활용할 수 있습니다. 실제 부동산 회사에서도 유사한 분석으로 적정 가격을 산출합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd
    import statsmodels.api as sm
    from codaro.curriculum.localData import loadLocalDataset

    bostonData = loadLocalDataset("boston_housing")
    bostonData.shape
  exercise:
    prompt: 1단계. 데이터 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import pandas as pd
      import statsmodels.api as sm
      from codaro.curriculum.localData import loadLocalDataset

      bostonData = loadLocalDataset("boston_housing")
      bostonData.shape
    hints:
    - 1단계. 데이터 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 데이터 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 데이터 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_head
  title: 2단계. 데이터 미리보기
  structuredPrimary: true
  subtitle: 컬럼 확인
  goal: 2단계. 데이터 미리보기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 주요 컬럼은 CRIM(인구 1인당 범죄율), RM(평균 방 개수), TAX(10,000달러당 재산세율), LSTAT(저소득층 인구 비율), MEDV(주택 가격
    중앙값, 천 달러 단위)입니다. MEDV가 종속변수(예측할 값)이고 나머지 13개가 독립변수(예측에 사용할 값)입니다. 각 컬럼의 의미를 정확히 이해해야 회귀 계수를 올바르게
    해석할 수 있으며, 예를 들어 RM 계수가 양수이면 방이 많을수록 집값이 비싸다는 것을 의미합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: bostonData.head()
  exercise:
    prompt: 2단계. 데이터 미리보기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: bostonData.head()
    hints:
    - 2단계. 데이터 미리보기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 데이터 미리보기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 데이터 미리보기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_describe
  title: 3단계. 기초 통계량
  structuredPrimary: true
  subtitle: 데이터 범위 확인
  goal: 3단계. 기초 통계량에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: describe()로 각 변수의 평균, 표준편차, 최소/최대값을 확인합니다. RM(방 개수)의 평균은 6.3개, MEDV(가격)의 평균은 22.5천 달러입니다.
    주목할 점은 변수들의 스케일이 크게 다르다는 것입니다. CRIM은 0에서 89까지, RM은 3에서 9까지, TAX는 187에서 711까지 범위가 다릅니다. 회귀 계수 크기를 직접
    비교하려면 표준화가 필요하지만, OLS 회귀 자체는 스케일에 영향받지 않아 표준화 없이도 정확한 예측이 가능합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: bostonData.describe()
  exercise:
    prompt: 3단계. 기초 통계량 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: bostonData.describe()
    hints:
    - 3단계. 기초 통계량 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 기초 통계량 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 기초 통계량에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_corr
  title: 4단계. 상관관계 분석
  structuredPrimary: true
  subtitle: 변수 간 관계 파악
  goal: 4단계. 상관관계 분석에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    다중회귀분석을 하기 전에 변수 간 상관관계(correlation)를 확인하는 것은 필수 단계입니다. 상관계수는 -1에서 1 사이 값으로 두 변수가 함께 움직이는 정도를 나타내며, 1에 가까우면 강한 양의 상관(한 변수 증가 → 다른 변수도 증가), -1에 가까우면 강한 음의 상관(한 변수 증가 → 다른 변수 감소)입니다. 이 데이터에서 RM(방 개수)과 MEDV(가격)는 +0.7의 양의 상관관계를 보여 방이 많을수록 집값이 비싸고, LSTAT(저소득층 비율)과 MEDV는 -0.74의 음의 상관관계로 저소득층이 많은 지역일수록 집값이 쌉니다. 상관관계가 너무 높은 독립변수들끼리는(예로 0.9 이상) 다중공선성(multicollinearity) 문제를 일으켜 계수 해석이 불안정해지므로, 하나를 제거하거나 주성분 분석으로 결합해야 합니다.

    corr()는 상관계수 행렬을 반환합니다. -1~1 사이 값으로, 1에 가까우면 강한 양의 상관, -1에 가까우면 강한 음의 상관입니다. ['MEDV']로 MEDV와 다른 변수들의 상관관계만 추출했습니다.
  tips:
  - corr()는 상관계수 행렬을 반환합니다. -1~1 사이 값으로, 1에 가까우면 강한 양의 상관, -1에 가까우면 강한 음의 상관입니다. ['MEDV']로 MEDV와 다른 변수들의
    상관관계만 추출했습니다.
  snippet: bostonData.corr()['medv'].sort_values(ascending=False)
  exercise:
    prompt: 4단계. 상관관계 분석 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: bostonData.corr()['medv'].sort_values(ascending=False)
    hints:
    - 4단계. 상관관계 분석 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 상관관계 분석 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 상관관계 분석에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step5_select_features
  title: 5단계. 주요 변수 선택
  structuredPrimary: true
  subtitle: 상관관계 기반 특성 선택
  goal: 5단계. 주요 변수 선택에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    모든 13개 변수를 사용할 수도 있지만, 먼저 MEDV와 상관관계가 높은 5개 변수로 시작합니다. RM(방 개수, +0.70), LSTAT(저소득층 비율, -0.74), PTRATIO(학생-교사 비율, -0.51), INDUS(비소매 비즈니스 비율, -0.48), TAX(재산세, -0.47)를 선택합니다. 변수를 줄이면 모델 해석이 쉬워지고, 불필요한 변수를 포함했을 때 발생하는 과적합(overfitting)을 방지할 수 있습니다. 실무에서도 모든 변수를 투입하기보다 비즈니스 의미가 있는 핵심 변수를 선별하는 것이 중요합니다.

    리스트 ['RM', 'LSTAT', ...]는 대괄호 []로 여러 값을 묶은 것으로, 여러 컬럼 이름을 한번에 지정할 때 사용합니다. bostonData[['RM', 'LSTAT']]처럼 DataFrame에 리스트를 넣으면 해당 컬럼들만 추출하며, 결과는 자동으로 DataFrame(2차원 표)이 됩니다. features = [...] 형태로 변수에 저장하면 나중에 재사용할 수 있어 코드가 깔끔해집니다. =(등호)는 할당 연산자로 오른쪽 값을 왼쪽 변수에 저장합니다.
  tips:
  - 리스트 ['RM', 'LSTAT', ...]는 대괄호 []로 여러 값을 묶은 것으로, 여러 컬럼 이름을 한번에 지정할 때 사용합니다. bostonData[['RM', 'LSTAT']]처럼
    DataFrame에 리스트를 넣으면 해당 컬럼들만 추출하며, 결과는 자동으로 DataFrame(2차원 표)이 됩니다. features = [...] 형태로 변수에 저장하면 나중에
    재사용할 수 있어 코드가 깔끔해집니다. =(등호)는 할당 연산자로 오른쪽 값을 왼쪽 변수에 저장합니다.
  snippet: |-
    features = ['rm', 'lstat', 'ptratio', 'indus', 'tax']
    X = bostonData[features]
    y = bostonData['medv']
  exercise:
    prompt: 5단계. 주요 변수 선택 예제에서 리스트 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      features = ['rm', 'lstat', 'ptratio', 'indus', 'tax']
      X = bostonData[features]
      y = bostonData['medv']
    hints:
    - 5단계. 주요 변수 선택 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 주요 변수 선택 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 주요 변수 선택에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step6_add_constant
  title: 6단계. 상수항 추가
  structuredPrimary: true
  subtitle: 절편 계산
  goal: 6단계. 상수항 추가에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 01 프로젝트에서 배운 것처럼 statsmodels는 절편(intercept)을 자동으로 추가하지 않습니다. add_constant()로 값이 모두 1인 const
    컬럼을 추가해야 절편이 계산됩니다. 절편은 모든 독립변수가 0일 때의 기본 집값을 의미하며, 회귀식 y = β₀ + β₁X₁ + β₂X₂ + ...에서 β₀에 해당합니다. sklearn과
    달리 statsmodels는 이 과정을 명시적으로 수행해야 하며, 이는 통계적 투명성을 위한 설계입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
