- id: step11_residual_plot
  title: 11단계. 잔차 플롯
  structuredPrimary: true
  subtitle: 모델 진단
  goal: 11단계. 잔차 플롯에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    잔차(residual)는 실제값과 예측값의 차이(오차)로, 모델이 설명하지 못한 부분입니다. 잔차 플롯은 예측값(X축)과 잔차(Y축)를 그린 그래프로, 모델의 적합성을 진단하는 핵심 도구입니다. 이상적인 잔차 플롯은 (1) 잔차가 0 주변에 랜덤하게 분포하고, (2) 특정 패턴이나 추세가 없으며, (3) 분산이 일정해야 합니다. 만약 잔차가 깔때기 모양을 보이면 이분산성(heteroscedasticity), 곡선 패턴을 보이면 비선형 관계를 의미하여 모델 개선이 필요합니다. 예를 들어 고가 주택(예측값 30 이상)에서 잔차가 커지면 고가 주택 예측이 불안정하다는 뜻이므로, 로그 변환이나 추가 변수 투입을 고려해야 합니다.

    model.resid는 잔차(실제값 - 예측값), model.fittedvalues는 예측값입니다. plotly의 add_hline()은 y=0에 수평선을 그리며, line_dash='dash'로 점선 스타일을 지정합니다. 잔차가 0 주변에 고르게 분포하고 특정 패턴이 없으면 좋은 모델이며, 깔때기 모양이나 곡선 패턴이 보이면 모델 가정을 위반하는 것입니다. 마우스를 올리면 특정 점의 예측값과 잔차를 확인할 수 있어 이상치(outlier)를 쉽게 찾을 수 있습니다.
  tips:
  - model.resid는 잔차(실제값 - 예측값), model.fittedvalues는 예측값입니다. plotly의 add_hline()은 y=0에 수평선을 그리며, line_dash='dash'로
    점선 스타일을 지정합니다. 잔차가 0 주변에 고르게 분포하고 특정 패턴이 없으면 좋은 모델이며, 깔때기 모양이나 곡선 패턴이 보이면 모델 가정을 위반하는 것입니다. 마우스를 올리면
    특정 점의 예측값과 잔차를 확인할 수 있어 이상치(outlier)를 쉽게 찾을 수 있습니다.
  snippet: |-
    import plotly.express as px

    residuals = model.resid
    fittedValues = model.fittedvalues

    residualDf = pd.DataFrame({'Fitted': fittedValues, 'Residuals': residuals})
    residualFig = px.scatter(residualDf, x='Fitted', y='Residuals',
                             title='Residual Plot',
                             labels={'Fitted': 'Fitted values', 'Residuals': 'Residuals'},
                             opacity=0.6)
    residualFig.add_hline(y=0, line_dash='dash', line_color='red')
    residualFig.show()
  exercise:
    prompt: 11단계. 잔차 플롯 예제에서 열 이름이나 행 값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import plotly.express as px

      residuals = model.resid
      fittedValues = model.fittedvalues

      residualDf = pd.DataFrame({'Fitted': fittedValues, 'Residuals': residuals})
      residualFig = px.scatter(residualDf, x='Fitted', y='Residuals',
                               title='Residual Plot',
                               labels={'Fitted': 'Fitted values', 'Residuals': 'Residuals'},
                               opacity=0.6)
      residualFig.add_hline(y=0, line_dash='dash', line_color='red')
      residualFig.show()
    hints:
    - 11단계. 잔차 플롯 코드에서 먼저 열 이름이나 행 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 11단계. 잔차 플롯 코드가 예외 없이 끝나야 합니다.
    resultCheck: 11단계. 잔차 플롯에서 바꾼 열 이름이나 행 값이 결과에 반영되어야 합니다.
- id: step12_qq_plot
  title: 12단계. Q-Q 플롯
  structuredPrimary: true
  subtitle: 정규성 검정
  goal: 12단계. QQ 플롯에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    Q-Q 플롯(Quantile-Quantile plot)은 잔차의 분위수와 이론적 정규분포의 분위수를 비교하여 정규성을 확인하는 진단 도구입니다. X축은 이론적 정규분포의 분위수, Y축은 실제 잔차의 분위수를 나타내며, 점들이 45도 대각선에 가까우면 잔차가 정규분포를 따른다는 뜻입니다. 선형 회귀분석은 잔차가 평균 0, 일정한 분산의 정규분포를 따른다고 가정하므로(정규성 가정), Q-Q 플롯으로 이 가정을 검증합니다. 양 끝에서 약간 벗어나는 것은 정상이지만, 중간 부분이 S자 곡선을 그리거나 크게 벗어나면 정규성을 위반하는 것이므로 로그 변환이나 Box-Cox 변환을 고려해야 합니다. 정규성이 심하게 위반되면 p-value와 신뢰구간이 부정확해집니다.

    scipy.stats.probplot()은 Q-Q 플롯 데이터를 계산하며, quantiles는 이론적 분위수, ordered_residuals는 정렬된 잔차입니다. slope와 intercept로 정규분포 기준선을 그립니다. dist="norm"은 정규분포와 비교한다는 뜻입니다. 점들이 빨간 대각선을 따라 분포하면 정규성을 만족하고, S자 곡선이나 큰 이탈이 보이면 변환이 필요합니다. 정규성 위반은 특히 작은 샘플(n<30)에서 문제가 되므로, 큰 데이터셋에서는 약간의 이탈은 허용됩니다.
  tips:
  - scipy.stats.probplot()은 Q-Q 플롯 데이터를 계산하며, quantiles는 이론적 분위수, ordered_residuals는 정렬된 잔차입니다. slope와
    intercept로 정규분포 기준선을 그립니다. dist="norm"은 정규분포와 비교한다는 뜻입니다. 점들이 빨간 대각선을 따라 분포하면 정규성을 만족하고, S자 곡선이나 큰
    이탈이 보이면 변환이 필요합니다. 정규성 위반은 특히 작은 샘플(n<30)에서 문제가 되므로, 큰 데이터셋에서는 약간의 이탈은 허용됩니다.
  snippet: |-
    import plotly.graph_objects as go
    import scipy.stats as stats
    import numpy as np

    (quantiles, ordered_residuals), (slope, intercept, r) = stats.probplot(residuals, dist="norm")

    qqFig = go.Figure()
    qqFig.add_trace(go.Scatter(x=quantiles, y=ordered_residuals,
                                mode='markers', name='Residuals',
                                marker=dict(size=6, opacity=0.6)))
    qqFig.add_trace(go.Scatter(x=quantiles, y=slope * quantiles + intercept,
                                mode='lines', name='Normal line',
                                line=dict(color='red', width=2)))
    qqFig.update_layout(title='Q-Q Plot',
                        xaxis_title='Theoretical Quantiles',
                        yaxis_title='Sample Quantiles')
    qqFig.show()
  exercise:
