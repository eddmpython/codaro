- id: step8_summary
  title: 8단계. 결과 요약
  structuredPrimary: true
  subtitle: summary 해석
  goal: 8단계. 결과 요약에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    summary()에서 R²는 약 0.69로, 선택한 5개 변수가 주택 가격 변동의 69%를 설명합니다. 각 변수의 P>|t| 값(p-value)이 0.05보다 작으면 해당 변수가 통계적으로 유의미하게 가격에 영향을 미친다는 뜻입니다. coef(계수)는 다른 변수를 고정했을 때의 순수 영향력을 나타내며, 예를 들어 RM 계수가 4.09이면 다른 조건이 같을 때 방 1개 추가 시 집값이 4,090달러 상승한다는 의미입니다.

    다중회귀에서 계수 해석은 "다른 변수가 일정할 때"라는 조건이 붙습니다. RM 계수가 4.09이면 "다른 조건이 같을 때 방 1개 증가 시 가격이 4.09천 달러 증가"합니다. 단순회귀와 달리 다른 변수의 영향을 통제한 순수 효과입니다.
  tips:
