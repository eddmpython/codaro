  explanation: |-
    브로드캐스팅(Broadcasting)은 NumPy의 핵심 기능입니다. 배열에 하나의 숫자(스칼라)를 곱하면, NumPy가 자동으로 배열의 모든 요소에 그 연산을 적용합니다. inch * 0.0254 한 줄로 10,000개 값 모두가 인치에서 미터로 변환됩니다. for문을 쓸 필요가 없습니다.

    NumPy 배열에 스칼라 값을 곱하면 모든 요소에 자동으로 연산이 적용됩니다. 이것이 브로드캐스팅의 가장 기본적인 형태입니다.
  tips:
  - NumPy 배열에 스칼라 값을 곱하면 모든 요소에 자동으로 연산이 적용됩니다. 이것이 브로드캐스팅의 가장 기본적인 형태입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    meter = inch * 0.0254
    meter[:10]
