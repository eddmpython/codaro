- id: step7_bmi
  title: 7단계. BMI 계산
  structuredPrimary: true
  subtitle: 벡터 연산
  goal: '7단계. BMI 계산: 실행 가능한 Python 흐름으로 익힌다.'
  why: '7단계. BMI 계산: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    BMI(Body Mass Index, 체질량지수)는 비만도를 측정하는 지표입니다. 공식은 체중(kg) ÷ 키(m)²입니다. NumPy에서는 배열끼리의 연산도 요소별로 자동 적용됩니다. kg 배열과 meter 배열의 같은 위치 값들끼리 계산되어 10,000명의 BMI가 한 번에 계산됩니다. 이를 벡터 연산(vectorization)이라 합니다.

    배열 간 연산도 요소별로 자동 적용됩니다. kg / meter ** 2는 각 사람의 BMI를 한 번에 계산합니다.
  tips:
  - 배열 간 연산도 요소별로 자동 적용됩니다. kg / meter ** 2는 각 사람의 BMI를 한 번에 계산합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    bmi = kg / (meter ** 2)
    bmi[:10]
  exercise:
    prompt: '7단계. BMI 계산: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      bmi = kg / (meter ** 2)
      bmi[:10]
    solution: |-
      bmi = kg / (meter ** 2)
      bmi[:10]
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
