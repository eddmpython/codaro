    - type: code
      title: 목표 체중 분석
      content: |-
        bmi = weight / (height ** 2)
        goal = 22 * (height ** 2)
        diff = weight - goal
        loss = diff > 0
        gain = diff < 0
        pd.DataFrame({
            'Status': ['Needs Weight Loss', 'Needs Weight Gain', 'At Target (+/-2kg)'],
            'Count': [np.sum(loss), np.sum(gain), np.sum(np.abs(diff) <= 2)],
            'Avg Diff (kg)': [np.mean(diff[loss]).round(1),
                             np.mean(diff[gain]).round(1),
                             np.mean(diff[np.abs(diff) <= 2]).round(1)]
        })
  - type: expansion
    title: '미션2: 성별/체중상태 교차 분석'
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import numpy as np
        import pandas as pd

        df = pd.DataFrame({
            'Gender': ['Male', 'Female', 'Male', 'Female', 'Male',
                       'Female', 'Male', 'Female', 'Male', 'Female'],
            'Height': [70.0, 64.0, 68.5, 62.0, 72.0, 66.5, 69.0, 63.5, 74.0, 61.5],
            'Weight': [180.0, 135.0, 165.0, 120.0, 210.0, 150.0, 175.0, 128.0, 230.0, 112.0],
        })
        ht = df['Height'].values * 0.0254
        wt = df['Weight'].values * 0.453592
        sex = df['Gender'].values
    - type: code
      title: 교차 분석
      content: |-
        bmi = wt / (ht ** 2)
        cat = np.where(bmi < 18.5, 'Underweight',
              np.where(bmi < 25, 'Normal',
              np.where(bmi < 30, 'Overweight', 'Obese')))
        rows = []
        for g in ['Male', 'Female']:
            mask1 = sex == g
            for c in ['Underweight', 'Normal', 'Overweight', 'Obese']:
                mask2 = cat == c
                n = np.sum(mask1 & mask2)
                pct = n / np.sum(mask1) * 100
                rows.append([g, c, n, round(pct, 1)])
        pd.DataFrame(rows, columns=['Gender', 'BMI Category', 'Count', 'Ratio (%)'])
