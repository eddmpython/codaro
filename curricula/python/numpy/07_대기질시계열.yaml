- id: step6_mean_nan
  title: 6단계. 일반 mean의 문제
  structuredPrimary: true
  subtitle: NaN 전파
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: NaN은 '전파(propagation)'되는 특성이 있습니다. 어떤 숫자와 NaN을 연산하면 결과도 NaN이 됩니다. 1 + NaN = NaN, NaN × 5 = NaN 입니다. 따라서 배열에 NaN이 하나라도 있으면 np.mean()의 결과도 NaN이 되어버립니다. 이 문제를 해결하려면 NaN을 무시하는 특별한 함수가 필요합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    avg = np.mean(ozone)
    f"일반 mean: {avg}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
