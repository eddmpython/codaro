  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_nanmean
  title: 7단계. nanmean
  structuredPrimary: true
  subtitle: NaN 무시 평균
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    np.nanmean()은 NaN 값을 건너뛰고 유효한 값들만으로 평균을 계산합니다. nan이 붙은 함수들(nansum, nanstd, nanmax, nanmin 등)은 모두 NaN을 무시합니다. 결측값이 있는 실제 데이터를 다룰 때 필수적인 함수들입니다.

    np.nanmean(), np.nansum(), np.nanstd(), np.nanmax(), np.nanmin() 등은 NaN을 무시하고 계산합니다. 결측값이 있는 데이터에서 필수적입니다.
  tips:
  - np.nanmean(), np.nansum(), np.nanstd(), np.nanmax(), np.nanmin() 등은 NaN을 무시하고 계산합니다. 결측값이 있는 데이터에서 필수적입니다.
  snippet: |-
    clean = np.nanmean(ozone)
    f"nanmean: {clean:.2f}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      clean = np.nanmean(ozone)
      f"nanmean: {clean:.2f}"
    hints:
