- id: step5_replace_nan
  title: 5단계. 0을 NaN으로
  structuredPrimary: true
  subtitle: np.where()
  goal: '5단계. 0을 NaN으로: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 0을 NaN으로: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: Glucose, BloodPressure, SkinThickness, Insulin, BMI의 0값은 결측값이므로 NaN으로 변환합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    idx = [1, 2, 3, 4, 5]
    clean = X.astype(float).copy()
    for i in idx:
        clean[:, i] = np.where(clean[:, i] == 0, np.nan, clean[:, i])
    np.sum(np.isnan(clean), axis=0)
