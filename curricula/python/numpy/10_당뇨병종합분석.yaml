    content: |-
      import numpy as np

      def standardize(values):
          values = np.asarray(values, dtype=float)
          std = values.std(axis=0)
          if np.any(std == 0):
              raise ValueError("constant feature cannot be standardized")
          return (values - values.mean(axis=0)) / std

      try:
          standardize([[1, 2], [1, 3]])
      except ValueError as exc:
          message = str(exc)

      assert message == "constant feature cannot be standardized"
