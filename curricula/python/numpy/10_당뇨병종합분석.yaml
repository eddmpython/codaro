- id: step4_zero_check
  title: 4단계. 결측값 확인
  structuredPrimary: true
  subtitle: 0값 처리
  goal: '4단계. 결측값 확인: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 결측값 확인: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 이 데이터셋의 특이점은 결측값이 NaN 대신 0으로 기록되어 있다는 것입니다. 하지만 혈당(Glucose)이나 혈압(BloodPressure)이 0이라는 것은 생물학적으로 불가능합니다. 살아있는
    사람의 혈당이 0일 수는 없죠. 따라서 이런 0값들은 실제로는 '측정하지 못함'을 의미하는 결측값입니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    zeros = np.sum(X == 0, axis=0)
    ratio = zeros / len(X) * 100
    pd.DataFrame({'Feature': cols, 'ZeroCount': zeros, 'ZeroRatio': ratio.round(1)})
