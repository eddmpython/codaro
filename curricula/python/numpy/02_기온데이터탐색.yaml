- id: step6_linspace
  title: 6단계. linspace로 균등 분할
  structuredPrimary: true
  subtitle: np.linspace()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    linspace는 'linear space(선형 공간)'의 줄임말로, 시작점과 끝점 사이를 균등하게 나눈 배열을 생성합니다. arange가 '간격'을 지정하는 반면, linspace는 '개수'를 지정합니다. 예를 들어 linspace(0, 1, 11)은 0부터 1까지를 11개 점으로 균등하게 나누어 0, 0.1, 0.2, ..., 1.0을 만듭니다. 그래프를 그릴 때 x축 값을 만들거나 실험 구간을 나눌 때 유용합니다.

    np.linspace(start, stop, num)은 start부터 stop까지 num개의 균등한 간격의 숫자를 생성합니다. arange와 달리 stop이 포함됩니다.
  tips:
  - np.linspace(start, stop, num)은 start부터 stop까지 num개의 균등한 간격의 숫자를 생성합니다. arange와 달리 stop이 포함됩니다.
  snippet: |-
    space = np.linspace(0, 1, 11)
    space
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      space = np.linspace(0, 1, 11)
      space
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
