- id: step4_arange
  title: 4단계. arange로 배열 생성
  structuredPrimary: true
  subtitle: np.arange()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    np.arange()는 연속된 숫자 배열을 자동으로 생성하는 함수입니다. 일일이 [1880, 1881, 1882, ...]를 타이핑하는 대신 np.arange(1880, 2025)라고 쓰면 1880부터 2024까지 145개의 숫자가 담긴 배열이 만들어집니다. 파이썬의 range()와 비슷하지만 NumPy 배열을 반환해서 바로 수학 연산에 활용할 수 있습니다.

    np.arange(start, stop, step)은 start부터 stop 미만까지 step 간격으로 배열을 생성합니다. 파이썬 range()와 비슷하지만 NumPy 배열을 반환합니다.
  tips:
  - np.arange(start, stop, step)은 start부터 stop 미만까지 step 간격으로 배열을 생성합니다. 파이썬 range()와 비슷하지만 NumPy 배열을 반환합니다.
  snippet: |-
    years = np.arange(1880, 2025)
    years
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      years = np.arange(1880, 2025)
      years
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
