- id: step2_data
  title: 2단계. 데이터 로드
  structuredPrimary: true
  subtitle: 전지구 기온 데이터
  goal: 2단계. 데이터 로드에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: |-
    1880년부터 현재까지 약 140년간의 전 지구 월평균 기온 편차 데이터를 로드합니다. '편차'란 기준 기간(1951-1980) 평균 기온과의 차이를 말합니다. Mean 값이 +0.5라면 기준 기간보다 0.5도 더 따뜻했다는 뜻이고, -0.3이라면 0.3도 더 추웠다는 뜻입니다. 이렇게 편차로 표현하면 지구 온난화 추세를 명확하게 볼 수 있습니다.

    이 데이터는 기준 기간(1951-1980) 대비 기온 편차(anomaly)를 나타냅니다. Mean 값이 양수면 기준보다 따뜻했고, 음수면 추웠습니다.
  tips:
  - 이 데이터는 기준 기간(1951-1980) 대비 기온 편차(anomaly)를 나타냅니다. Mean 값이 양수면 기준보다 따뜻했고, 음수면 추웠습니다.
  snippet: |-
    from codaro.curriculum.localData import loadLocalDataset

    temps = loadLocalDataset("global_temp")
    temps.head()
  exercise:
    prompt: 2단계. 데이터 로드 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      from codaro.curriculum.localData import loadLocalDataset

      temps = loadLocalDataset("global_temp")
      temps.head()
    hints:
    - 바꿀 지점은 데이터 생성/로드 줄이나 컬럼 선택 줄에서 찾으세요.
    - 실행 뒤 shape, 컬럼 목록, head()/집계 결과 중 하나가 바뀐 입력을 반영하는지 보세요.
  check:
    noError: 2단계. 데이터 로드의 DataFrame 입력, 컬럼 참조, 행 길이 조건이 맞아야 합니다.
    resultCheck: 2단계. 데이터 로드의 shape, 컬럼 목록, head()/집계 결과가 바꾼 데이터 조건을 반영해야 합니다.
- id: step3_extract
  title: 3단계. 배열 추출
  structuredPrimary: true
  subtitle: GCAG 소스
  goal: 3단계. 배열 추출에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 이 데이터에는 두 가지 출처(Source)의 측정값이 있습니다. GCAG는 미국 해양대기청(NOAA)의 'Global Component of Climate
    at a Glance' 데이터입니다. 필터링이란 전체 데이터에서 특정 조건을 만족하는 행만 골라내는 것입니다. temps['Source'] == 'GCAG'로 GCAG 출처만
    선택하고, .values로 NumPy 배열로 변환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    gcag = temps[temps['Source'] == 'GCAG']
    arr = gcag['Mean'].values
    arr.shape
  exercise:
    prompt: 3단계. 배열 추출 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      gcag = temps[temps['Source'] == 'GCAG']
      arr = gcag['Mean'].values
      arr.shape
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 3단계. 배열 추출에서 `gcag` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 3단계. 배열 추출 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step4_arange
  title: 4단계. arange로 배열 생성
  structuredPrimary: true
  subtitle: np.arange()
  goal: 4단계. arange로 배열 생성에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    np.arange()는 연속된 숫자 배열을 자동으로 생성하는 함수입니다. 일일이 [1880, 1881, 1882, ...]를 타이핑하는 대신 np.arange(1880, 2025)라고 쓰면 1880부터 2024까지 145개의 숫자가 담긴 배열이 만들어집니다. 파이썬의 range()와 비슷하지만 NumPy 배열을 반환해서 바로 수학 연산에 활용할 수 있습니다.

    np.arange(start, stop, step)은 start부터 stop 미만까지 step 간격으로 배열을 생성합니다. 파이썬 range()와 비슷하지만 NumPy 배열을 반환합니다.
  tips:
  - np.arange(start, stop, step)은 start부터 stop 미만까지 step 간격으로 배열을 생성합니다. 파이썬 range()와 비슷하지만 NumPy 배열을
    반환합니다.
  snippet: |-
    years = np.arange(1880, 2025)
    years
  exercise:
    prompt: 4단계. arange로 배열 생성 예제에서 `years` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      years = np.arange(1880, 2025)
      years
    hints:
    - 바꿀 지점은 `years = ...` 오른쪽 값입니다.
    - 실행 뒤 `years` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 4단계. arange로 배열 생성에서 `years` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 4단계. arange로 배열 생성 실행 뒤 `years` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step5_arange_step
  title: 5단계. step 간격 지정
  structuredPrimary: true
  subtitle: 10년 단위
  goal: 5단계. step 간격 지정에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: step을 지정해 특정 간격의 배열을 만들 수 있습니다. 10년 단위 연도를 생성해봅시다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    decades = np.arange(1880, 2030, 10)
    decades
  exercise:
    prompt: 5단계. step 간격 지정 예제에서 `decades` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      decades = np.arange(1880, 2030, 10)
      decades
    hints:
    - 바꿀 지점은 `decades = ...` 오른쪽 값입니다.
    - 실행 뒤 `decades` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 5단계. step 간격 지정에서 `decades` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 5단계. step 간격 지정 실행 뒤 `decades` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step6_linspace
  title: 6단계. linspace로 균등 분할
  structuredPrimary: true
  subtitle: np.linspace()
  goal: 6단계. linspace로 균등 분할에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    linspace는 'linear space(선형 공간)'의 줄임말로, 시작점과 끝점 사이를 균등하게 나눈 배열을 생성합니다. arange가 '간격'을 지정하는 반면, linspace는 '개수'를 지정합니다. 예를 들어 linspace(0, 1, 11)은 0부터 1까지를 11개 점으로 균등하게 나누어 0, 0.1, 0.2, ..., 1.0을 만듭니다. 그래프를 그릴 때 x축 값을 만들거나 실험 구간을 나눌 때 유용합니다.

    np.linspace(start, stop, num)은 start부터 stop까지 num개의 균등한 간격의 숫자를 생성합니다. arange와 달리 stop이 포함됩니다.
  tips:
  - np.linspace(start, stop, num)은 start부터 stop까지 num개의 균등한 간격의 숫자를 생성합니다. arange와 달리 stop이 포함됩니다.
  snippet: |-
    space = np.linspace(0, 1, 11)
    space
  exercise:
    prompt: 6단계. linspace로 균등 분할 예제에서 `space` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      space = np.linspace(0, 1, 11)
      space
    hints:
    - 바꿀 지점은 `space = ...` 오른쪽 값입니다.
    - 실행 뒤 `space` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 6단계. linspace로 균등 분할에서 `space` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 6단계. linspace로 균등 분할 실행 뒤 `space` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step7_indexing
  title: 7단계. 기본 인덱싱
  structuredPrimary: true
  subtitle: 요소 접근
  goal: 7단계. 기본 인덱싱에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 배열 계산은 반복문 없이 많은 값을 빠르게 처리하는 분석 코드의 바탕입니다.
  explanation: |-
    NumPy 배열의 인덱싱은 파이썬 리스트와 같습니다. 0부터 시작하며, 음수 인덱스는 뒤에서부터 접근합니다.

    NumPy 배열의 인덱싱은 파이썬 리스트와 같습니다. 0부터 시작하며, 음수 인덱스는 뒤에서부터 접근합니다.
  tips:
  - NumPy 배열의 인덱싱은 파이썬 리스트와 같습니다. 0부터 시작하며, 음수 인덱스는 뒤에서부터 접근합니다.
  snippet: arr[0]
  exercise:
    prompt: 7단계. 기본 인덱싱 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: arr[0]
    hints:
