- id: step9_slicing
  title: 9단계. 슬라이싱
  structuredPrimary: true
  subtitle: 범위 선택
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    슬라이싱(slicing)은 배열을 '잘라서' 일부분만 꺼내는 기능입니다. 빵을 슬라이스하듯이 원하는 구간만 선택합니다. [시작:끝] 형태로 쓰며, 끝 위치는 포함되지 않습니다. [:12]는 '처음부터 12번째 직전까지', 즉 0~11번 인덱스(12개)를 선택합니다. 월별 데이터에서 처음 12개는 첫 해(1880년) 1월~12월 데이터입니다.

    [start:stop]은 start부터 stop-1까지의 요소를 선택합니다. start를 생략하면 처음부터, stop을 생략하면 끝까지 선택합니다.
  tips:
  - '[start:stop]은 start부터 stop-1까지의 요소를 선택합니다. start를 생략하면 처음부터, stop을 생략하면 끝까지 선택합니다.'
  snippet: |-
    first = arr[:12]
    first
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      first = arr[:12]
      first
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
