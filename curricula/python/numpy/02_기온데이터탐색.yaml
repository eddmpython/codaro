    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 7단계. 기본 인덱싱의 시퀀스 접근이 IndexError 없이 실행되어야 합니다.
    resultCheck: 7단계. 기본 인덱싱 결과가 바꾼 리스트 값이나 인덱스 기준으로 달라져야 합니다.
- id: step8_negative
  title: 8단계. 음수 인덱싱
  structuredPrimary: true
  subtitle: 마지막 요소
  goal: 8단계. 음수 인덱싱에서 벡터화 계산 흐름을 코드로 실행하고 결과를 확인한다.
  why: 배열 계산은 반복문 없이 많은 값을 빠르게 처리하는 분석 코드의 바탕입니다.
