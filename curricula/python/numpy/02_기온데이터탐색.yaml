- id: step12_reshape
  title: 12단계. reshape로 형태 변경
  structuredPrimary: true
  subtitle: 2차원 배열
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: reshape는 배열의 '형태를 바꾸는' 기능입니다. 현재 기온 데이터는 1740개 숫자가 일렬로 나열된 1차원 배열입니다. 이것을 reshape(145, 12)로 바꾸면 145행 × 12열의 표(2차원 배열)가 됩니다. 각 행이 1년치(12개월) 데이터가 되어, 연도별 비교가 훨씬 쉬워집니다. 총 개수(145×12=1740)는 변하지 않고 배치만 바뀝니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    n = len(arr) // 12
    matrix = arr[:n * 12].reshape(n, 12)
    matrix.shape
