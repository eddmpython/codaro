meta:
  id: numpy_02
  title: 기온데이터탐색
  order: 2
  category: numpy
  difficulty: "⭐"
  badge: 입문
  tags: ["numpy", "arange", "linspace", "indexing", "slicing", "reshape"]
  seo:
    title: "NumPy 인덱싱/슬라이싱 - 기온 데이터 탐색"
    description: "NumPy 배열의 인덱싱과 슬라이싱을 배우며 전 세계 기온 변화 데이터를 탐색합니다."
    keywords: ["numpy", "arange", "linspace", "인덱싱", "슬라이싱", "기온데이터"]

intro:
  emoji: "🌡️"
  goal: 전 세계 기온 변화 데이터로 인덱싱과 슬라이싱을 익힙니다.
  description: arange와 linspace로 배열을 생성하고, 다양한 인덱싱과 슬라이싱으로 원하는 데이터를 추출합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: NumPy와 pandas를 불러옵니다. pandas는 CSV 파일 로딩용으로만 사용하며, pandas 자체는 나중에 Pandas 코스에서 배웁니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: numpy와 pandas를 불러옵니다
    content: |-
      import numpy as np
      import pandas as pd

- id: step2_data
  title: 2단계. 데이터 로드
  subtitle: 전지구 기온 데이터
  blocks:
  - type: text
    content: "1880년부터 현재까지 약 140년간의 전 지구 월평균 기온 편차 데이터를 로드합니다. '편차'란 기준 기간(1951-1980) 평균 기온과의 차이를 말합니다. Mean 값이 +0.5라면 기준 기간보다 0.5도 더 따뜻했다는 뜻이고, -0.3이라면 0.3도 더 추웠다는 뜻입니다. 이렇게 편차로 표현하면 지구 온난화 추세를 명확하게 볼 수 있습니다."
  - type: code
    language: python
    title: 기온 데이터 로드
    description: GitHub에서 기온 데이터를 불러옵니다
    content: |-
      url = "https://raw.githubusercontent.com"
      temps = pd.read_csv(f"{url}/datasets/global-temp/master/data/monthly.csv")
      temps.head()
  - type: tip
    content: 이 데이터는 기준 기간(1951-1980) 대비 기온 편차(anomaly)를 나타냅니다. Mean 값이 양수면 기준보다 따뜻했고, 음수면 추웠습니다.

- id: step3_extract
  title: 3단계. 배열 추출
  subtitle: GCAG 소스
  blocks:
  - type: text
    content: "이 데이터에는 두 가지 출처(Source)의 측정값이 있습니다. GCAG는 미국 해양대기청(NOAA)의 'Global Component of Climate at a Glance' 데이터입니다. 필터링이란 전체 데이터에서 특정 조건을 만족하는 행만 골라내는 것입니다. temps['Source'] == 'GCAG'로 GCAG 출처만 선택하고, .values로 NumPy 배열로 변환합니다."
  - type: code
    language: python
    title: 기온 배열 추출
    description: GCAG 소스의 Mean 값을 배열로 추출합니다
    content: |-
      gcag = temps[temps['Source'] == 'GCAG']
      arr = gcag['Mean'].values
      arr.shape

- id: step4_arange
  title: 4단계. arange로 배열 생성
  subtitle: np.arange()
  blocks:
  - type: text
    content: "np.arange()는 연속된 숫자 배열을 자동으로 생성하는 함수입니다. 일일이 [1880, 1881, 1882, ...]를 타이핑하는 대신 np.arange(1880, 2025)라고 쓰면 1880부터 2024까지 145개의 숫자가 담긴 배열이 만들어집니다. 파이썬의 range()와 비슷하지만 NumPy 배열을 반환해서 바로 수학 연산에 활용할 수 있습니다."
  - type: code
    language: python
    title: 연도 배열 생성
    description: 1880년부터 2024년까지의 연도 배열을 생성합니다
    content: |-
      years = np.arange(1880, 2025)
      years
  - type: tip
    content: np.arange(start, stop, step)은 start부터 stop 미만까지 step 간격으로 배열을 생성합니다. 파이썬 range()와 비슷하지만 NumPy 배열을 반환합니다.

- id: step5_arange_step
  title: 5단계. step 간격 지정
  subtitle: 10년 단위
  blocks:
  - type: text
    content: step을 지정해 특정 간격의 배열을 만들 수 있습니다. 10년 단위 연도를 생성해봅시다.
  - type: code
    language: python
    title: 10년 단위 연도
    description: 10년 간격으로 연도 배열을 생성합니다
    content: |-
      decades = np.arange(1880, 2030, 10)
      decades

- id: step6_linspace
  title: 6단계. linspace로 균등 분할
  subtitle: np.linspace()
  blocks:
  - type: text
    content: "linspace는 'linear space(선형 공간)'의 줄임말로, 시작점과 끝점 사이를 균등하게 나눈 배열을 생성합니다. arange가 '간격'을 지정하는 반면, linspace는 '개수'를 지정합니다. 예를 들어 linspace(0, 1, 11)은 0부터 1까지를 11개 점으로 균등하게 나누어 0, 0.1, 0.2, ..., 1.0을 만듭니다. 그래프를 그릴 때 x축 값을 만들거나 실험 구간을 나눌 때 유용합니다."
  - type: code
    language: python
    title: 균등 분할 배열
    description: 0부터 1까지 11개로 균등 분할합니다
    content: |-
      space = np.linspace(0, 1, 11)
      space
  - type: tip
    content: np.linspace(start, stop, num)은 start부터 stop까지 num개의 균등한 간격의 숫자를 생성합니다. arange와 달리 stop이 포함됩니다.

- id: step7_indexing
  title: 7단계. 기본 인덱싱
  subtitle: 요소 접근
  blocks:
  - type: text
    content: NumPy 배열의 인덱싱은 파이썬 리스트와 같습니다. 0부터 시작하며, 음수 인덱스는 뒤에서부터 접근합니다.
  - type: code
    language: python
    title: 첫 번째 요소
    description: 첫 번째 기온 데이터를 확인합니다
    content: |-
      arr[0]
  - type: tip
    content: NumPy 배열의 인덱싱은 파이썬 리스트와 같습니다. 0부터 시작하며, 음수 인덱스는 뒤에서부터 접근합니다.

- id: step8_negative
  title: 8단계. 음수 인덱싱
  subtitle: 마지막 요소
  blocks:
  - type: text
    content: 음수 인덱스로 뒤에서부터 접근합니다. -1은 마지막 요소입니다.
  - type: code
    language: python
    title: 마지막 요소
    description: 가장 최근 기온 데이터를 확인합니다
    content: |-
      arr[-1]

- id: step9_slicing
  title: 9단계. 슬라이싱
  subtitle: 범위 선택
  blocks:
  - type: text
    content: "슬라이싱(slicing)은 배열을 '잘라서' 일부분만 꺼내는 기능입니다. 빵을 슬라이스하듯이 원하는 구간만 선택합니다. [시작:끝] 형태로 쓰며, 끝 위치는 포함되지 않습니다. [:12]는 '처음부터 12번째 직전까지', 즉 0~11번 인덱스(12개)를 선택합니다. 월별 데이터에서 처음 12개는 첫 해(1880년) 1월~12월 데이터입니다."
  - type: code
    language: python
    title: 첫 1년 데이터
    description: 처음 12개월 데이터를 추출합니다
    content: |-
      first = arr[:12]
      first
  - type: tip
    content: "[start:stop]은 start부터 stop-1까지의 요소를 선택합니다. start를 생략하면 처음부터, stop을 생략하면 끝까지 선택합니다."

- id: step10_last
  title: 10단계. 최근 데이터 추출
  subtitle: 마지막 12개월
  blocks:
  - type: text
    content: 음수 인덱스와 슬라이싱을 조합하면 마지막 N개 요소를 쉽게 추출할 수 있습니다.
  - type: code
    language: python
    title: 최근 1년 데이터
    description: 마지막 12개월 데이터를 추출합니다
    content: |-
      last = arr[-12:]
      last

- id: step11_step
  title: 11단계. step 슬라이싱
  subtitle: 간격 지정
  blocks:
  - type: text
    content: step을 사용해 특정 간격으로 추출합니다. 매년 1월(12개월마다) 데이터만 추출해봅시다.
  - type: code
    language: python
    title: 매년 1월 데이터
    description: 12개월마다 데이터를 추출합니다
    content: |-
      jan = arr[::12]
      jan[:10]
  - type: tip
    content: "[start:stop:step]에서 step은 간격입니다. [::12]는 처음부터 끝까지 12개 간격으로 선택합니다."

- id: step12_reshape
  title: 12단계. reshape로 형태 변경
  subtitle: 2차원 배열
  blocks:
  - type: text
    content: "reshape는 배열의 '형태를 바꾸는' 기능입니다. 현재 기온 데이터는 1740개 숫자가 일렬로 나열된 1차원 배열입니다. 이것을 reshape(145, 12)로 바꾸면 145행 × 12열의 표(2차원 배열)가 됩니다. 각 행이 1년치(12개월) 데이터가 되어, 연도별 비교가 훨씬 쉬워집니다. 총 개수(145×12=1740)는 변하지 않고 배치만 바뀝니다."
  - type: code
    language: python
    title: 연도별 2D 배열
    description: 월별 데이터를 연도x월 형태로 변환합니다
    content: |-
      n = len(arr) // 12
      matrix = arr[:n * 12].reshape(n, 12)
      matrix.shape

- id: step13_2d_index
  title: 13단계. 2D 배열 인덱싱
  subtitle: 특정 연도 선택
  blocks:
  - type: text
    content: 2차원 배열에서 특정 행(연도)의 데이터를 추출합니다. 첫 번째 행은 1880년 데이터입니다.
  - type: code
    language: python
    title: 1880년 데이터
    description: 첫 번째 연도(1880년) 데이터를 추출합니다
    content: |-
      matrix[0]

- id: step14_column
  title: 14단계. 특정 월 선택
  subtitle: 열 인덱싱
  blocks:
  - type: text
    content: 특정 월의 모든 연도 데이터를 추출합니다. 7월(인덱스 6) 데이터를 확인해봅시다.
  - type: code
    language: python
    title: 모든 7월 데이터
    description: 7월(인덱스 6)의 모든 연도 데이터를 추출합니다
    content: |-
      july = matrix[:, 6]
      july[:10]
  - type: tip
    content: "2차원 배열에서 [행, 열] 형태로 인덱싱합니다. [:, 6]은 모든 행의 6번째 열을 선택합니다."

- id: step15_yearly_mean
  title: 15단계. 연도별 평균
  subtitle: axis=1
  blocks:
  - type: text
    content: 연도별 평균 기온 편차를 계산하고, 최근 10년과 과거 10년을 비교합니다.
  - type: code
    language: python
    title: 연도별 평균
    description: 각 연도의 평균 기온 편차를 계산합니다
    content: |-
      yearly = np.mean(matrix, axis=1)
      recent = yearly[-10:]
      past = yearly[:10]
      avg1 = np.mean(recent)
      avg2 = np.mean(past)
      f"최근 10년 평균: {avg1:.3f}, 과거 10년 평균: {avg2:.3f}, 차이: {avg1 - avg2:.3f}"

- id: practice
  title: 실습
  subtitle: 기온 데이터 분석
  blocks:
  - type: text
    content: 지금까지 배운 개념을 활용하여 미션을 수행해봅시다. 각 미션은 독립적으로 실행 가능합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 가장 더웠던 해 찾기"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import numpy as np
        import pandas as pd

        url = "https://raw.githubusercontent.com"
        data = pd.read_csv(f"{url}/datasets/global-temp/master/data/monthly.csv")
        gcag = data[data['Source'] == 'GCAG']
        temps = gcag['Mean'].values
    - type: code
      title: "분석 수행"
      content: |-
        n = len(temps) // 12
        arr = temps[:n * 12].reshape(n, 12)
        annual = np.mean(arr, axis=1)
        idx = np.argmax(annual)
        year = 1880 + idx
        top = np.max(annual)
        f"가장 더웠던 해: {year}년, 평균 편차: {top:.3f}C"
  - type: expansion
    title: "미션2: 10년 단위 평균 기온 변화 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import numpy as np
        import pandas as pd

        src = "https://raw.githubusercontent.com"
        df = pd.read_csv(f"{src}/datasets/global-temp/master/data/monthly.csv")
        raw = df[df['Source'] == 'GCAG']
        vals = raw['Mean'].values
    - type: code
      title: "10년 단위 분석"
      content: |-
        n = len(vals) // 12
        matrix = vals[:n * 12].reshape(n, 12)
        yearly = np.mean(matrix, axis=1)
        decades = np.arange(1880, 2020, 10)
        avgs = []
        for start in decades:
            i = start - 1880
            end = i + 10
            if end <= len(yearly):
                avgs.append(np.mean(yearly[i:end]))
        result = np.array(avgs)
        pd.DataFrame({
            'Decade': [f"{y}s" for y in decades[:len(result)]],
            'Mean Temp': np.round(result, 3)
        })
