- id: numpy_history
  blocks:
    - type: sectionHeader
      title: "🏛️ NumPy의 탄생"
      subtitle: "파이썬 과학 계산의 시작"

    - type: text
      content: |-
        NumPy(Numerical Python)는 2005년 Travis Oliphant가 개발했습니다. 기존에 있던 Numeric과 Numarray를 통합하여 만들어졌으며, 현재 파이썬 데이터 과학 생태계의 기반이 되는 핵심 라이브러리입니다. Pandas, Scikit-learn, TensorFlow, PyTorch 등 거의 모든 데이터 과학 라이브러리가 NumPy를 기반으로 구축되어 있습니다.

    - type: featureCards
      cards:
        - emoji: "🎯"
          title: "핵심 자료구조"
          description: "ndarray(N-dimensional array)라는 다차원 배열 자료구조를 제공합니다"
        - emoji: "⚡"
          title: "고성능"
          description: "C로 구현되어 파이썬 리스트보다 수십 배 빠른 연산 속도를 제공합니다"
        - emoji: "🔧"
          title: "범용성"
          description: "과학 계산, 데이터 분석, 머신러닝 등 모든 수치 연산의 기초입니다"

- id: why_numpy
  blocks:
    - type: sectionHeader
      title: "🚀 왜 NumPy인가?"
      subtitle: "파이썬 리스트의 한계를 넘어서"

    - type: text
      content: |-
        파이썬 리스트로 100만 개의 숫자를 더하려면 반복문이 필요하고 느립니다. NumPy 배열은 같은 연산을 반복문 없이 한 줄로 작성하고, 수십 배 빠르게 실행합니다.

    - type: note
      title: "벡터화(Vectorization)"
      content: "NumPy의 핵심 개념입니다. 반복문 없이 배열 전체에 연산을 적용하는 것을 벡터화라고 합니다. arr * 2라고 쓰면 배열의 모든 요소에 2가 곱해집니다. 이는 코드를 간결하게 만들고, 내부적으로 최적화된 C 코드가 실행되어 매우 빠릅니다."

- id: ndarray
  blocks:
    - type: sectionHeader
      title: "📦 ndarray 자료구조"
      subtitle: "NumPy의 핵심"

    - type: text
      content: |-
        NumPy의 핵심 자료구조는 ndarray(N-dimensional array)입니다. 다차원 배열을 의미하며, 파이썬 리스트와 달리 모든 요소가 동일한 데이터 타입을 가집니다. 이 제약 덕분에 메모리를 효율적으로 사용하고 빠른 연산이 가능합니다.

    - type: note
      title: "파이썬 리스트 vs NumPy 배열"
      content: "파이썬 리스트는 서로 다른 타입의 요소를 담을 수 있고 크기가 동적으로 변합니다. NumPy 배열은 동일 타입만 저장하고 크기가 고정됩니다. 이런 제약이 오히려 장점이 되어, 연속된 메모리에 데이터를 저장하고 CPU 캐시를 효율적으로 활용할 수 있습니다."

- id: features
  blocks:
    - type: sectionHeader
      title: "🛠️ NumPy의 주요 기능"
      subtitle: "수치 연산의 모든 것"

    - type: text
      content: |-
        NumPy가 제공하는 주요 기능을 살펴봅시다. 단순히 배열을 만드는 것을 넘어 다양한 수학적, 통계적 연산을 지원합니다.

    - type: table
      headers:
        - 기능
        - 설명
        - 예시
      rows:
        - - 배열 생성
          - 다양한 방법으로 배열 생성
          - array(), zeros(), ones(), arange(), linspace()
        - - 인덱싱/슬라이싱
          - 배열 요소 접근 및 부분 선택
          - "arr[0], arr[1:5], arr[arr > 0]"
        - - 수학 연산
          - 산술, 삼각함수, 지수/로그
          - "+, -, *, /, np.sin(), np.exp()"
        - - 통계 함수
          - 평균, 표준편차, 최대/최소
          - mean(), std(), max(), min()
        - - 배열 변형
          - 형태 변경, 결합, 분할
          - reshape(), concatenate(), split()
        - - 선형대수
          - 행렬 연산, 역행렬, 고유값
          - dot(), linalg.inv(), linalg.eig()
        - - 브로드캐스팅
          - 크기가 다른 배열 간 연산
          - 자동으로 크기 맞춤

- id: broadcasting
  blocks:
    - type: sectionHeader
      title: "📡 브로드캐스팅"
      subtitle: "크기가 다른 배열 간 연산"

    - type: text
      content: |-
        브로드캐스팅은 NumPy의 강력한 기능 중 하나입니다. 크기가 다른 배열 간에도 연산이 가능하도록 자동으로 배열을 확장합니다. 예를 들어 (3, 3) 행렬에 스칼라 값을 더하거나, (3, 1) 배열과 (1, 3) 배열을 더하면 자동으로 (3, 3) 결과가 나옵니다.

    - type: note
      title: "브로드캐스팅 규칙"
      content: "두 배열의 차원을 오른쪽부터 비교합니다. 각 차원이 같거나, 둘 중 하나가 1이면 브로드캐스팅이 가능합니다. 예를 들어 (5, 3)과 (3,)은 호환되고, (5, 3)과 (1, 3)도 호환됩니다. 하지만 (5, 3)과 (4,)는 호환되지 않습니다."

- id: datatype
  blocks:
    - type: sectionHeader
      title: "🏷️ 데이터 타입"
      subtitle: "dtype으로 메모리와 정밀도 제어"

    - type: text
      content: |-
        NumPy 배열은 명시적인 데이터 타입(dtype)을 가집니다. 정수, 실수, 복소수, 불리언 등 다양한 타입을 지원하며, 메모리 크기를 직접 지정할 수도 있습니다.

    - type: table
      headers:
        - 타입
        - 설명
        - 범위/정밀도
      rows:
        - - int32
          - 32비트 정수
          - "-2^31 ~ 2^31-1"
        - - int64
          - 64비트 정수
          - "-2^63 ~ 2^63-1"
        - - float32
          - 32비트 실수
          - 약 7자리 정밀도
        - - float64
          - 64비트 실수 (기본값)
          - 약 15자리 정밀도
        - - bool
          - 불리언
          - True/False
        - - complex128
          - 복소수
          - 실수부+허수부 각 64비트

- id: comparison
  blocks:
    - type: sectionHeader
      title: "⚖️ NumPy vs Pandas vs 리스트"
      subtitle: "상황에 맞는 도구 선택"

    - type: text
      content: |-
        NumPy는 다른 데이터 처리 도구들과 어떻게 다를까요? 각 도구의 특성을 이해하면 상황에 맞는 도구를 선택할 수 있습니다.

    - type: table
      headers:
        - 특성
        - NumPy
        - Pandas
        - 파이썬 리스트
      rows:
        - - 주요 용도
          - 수치 연산
          - 테이블 데이터 분석
          - 범용 자료구조
        - - 데이터 타입
          - 동일 타입만
          - 컬럼별 다른 타입
          - 혼합 가능
        - - 인덱싱
          - 정수/불리언
          - 정수/라벨/불리언
          - 정수만
        - - 속도
          - 매우 빠름
          - 빠름 (NumPy 기반)
          - 느림
        - - 메모리
          - 효율적
          - 보통
          - 비효율적

- id: ecosystem
  blocks:
    - type: sectionHeader
      title: "🌐 NumPy 생태계"
      subtitle: "데이터 과학의 기반"

    - type: text
      content: |-
        NumPy는 파이썬 데이터 과학 생태계의 기반입니다. NumPy를 잘 이해하면 다른 라이브러리들도 쉽게 배울 수 있습니다.

    - type: table
      headers:
        - 라이브러리
        - NumPy 활용
      rows:
        - - Pandas
          - DataFrame 내부가 NumPy 배열, .values로 접근
        - - Matplotlib
          - 플롯 데이터로 NumPy 배열 사용
        - - Scikit-learn
          - 모든 입출력이 NumPy 배열
        - - SciPy
          - NumPy 확장, 과학 계산 함수
        - - TensorFlow/PyTorch
          - 텐서와 NumPy 배열 상호 변환

- id: usecases
  blocks:
    - type: sectionHeader
      title: "💡 활용 분야"
      subtitle: "NumPy가 사용되는 곳"

    - type: text
      content: |-
        NumPy는 다양한 분야에서 활용됩니다. 데이터 전처리부터 과학 시뮬레이션까지 수치 계산이 필요한 거의 모든 곳에서 NumPy를 만날 수 있습니다.

    - type: table
      headers:
        - 분야
        - 활용 예시
      rows:
        - - 데이터 분석
          - 통계 계산, 데이터 정규화, 특성 엔지니어링
        - - 머신러닝
          - 특성 행렬 구성, 가중치 연산, 손실 함수 계산
        - - 이미지 처리
          - 픽셀 데이터 조작, 필터 적용, 변환
        - - 신호 처리
          - FFT, 필터링, 스펙트럼 분석
        - - 과학 시뮬레이션
          - 물리 시뮬레이션, 수치 해석, 미분방정식
        - - 금융
          - 포트폴리오 분석, 리스크 계산, 시계열 분석

- id: pandas_notice
  blocks:
    - type: sectionHeader
      title: "📋 pandas 사용 안내"
      subtitle: "데이터 로딩용으로만 사용"

    - type: note
      title: "pandas는 나중에 배워요"
      content: "이 커리큘럼에서 pandas(pd)가 등장하지만, 데이터 로딩용으로만 사용합니다. pd.read_csv()로 CSV 파일을 불러온 뒤 .values로 NumPy 배열을 추출합니다. pandas의 기능은 Pandas 코스에서 자세히 배우니, 지금은 '데이터 불러오는 도구'로만 이해하세요."

- id: curriculum
  blocks:
    - type: sectionHeader
      title: "📚 커리큘럼"
      subtitle: "10개 프로젝트로 마스터"

    - type: text
      content: |-
        이 커리큘럼에서는 실제 데이터셋을 활용한 10개의 프로젝트를 통해 NumPy를 배웁니다.

    - type: table
      headers:
        - 프로젝트
        - 데이터셋
        - 핵심 개념
      rows:
        - - "01. 포켓몬 스탯 분석"
          - Pokemon
          - 배열 생성, 기본 통계
        - - "02. 기온 데이터 탐색"
          - Global Temperature
          - 인덱싱, 슬라이싱
        - - "03. 지진 발생 패턴"
          - Earthquakes
          - 불리언 인덱싱, 조건 선택
        - - "04. 음악 특성 분석"
          - Spotify Songs
          - 정규화, 상관관계
        - - "05. BMI 계산기"
          - Weight-Height
          - 브로드캐스팅, 벡터 연산
        - - "06. 심장병 위험 분석"
          - Heart Disease
          - 정렬, 누적 연산
        - - "07. 대기질 시계열"
          - Air Quality
          - 결측값 처리
        - - "08. 행복지수 국가 비교"
          - World Happiness
          - 순위, 선형대수 기초
        - - "09. 전복 나이 예측"
          - Abalone
          - 선형대수, 회귀
        - - "10. 당뇨병 종합 분석"
          - Pima Diabetes
          - 전체 개념 종합

- id: start
  blocks:
    - type: sectionHeader
      title: "🎯 시작하기"
      subtitle: "첫 번째 프로젝트로"

    - type: text
      content: |-
        NumPy를 배우면 파이썬으로 수치 계산을 효율적으로 수행할 수 있습니다. 반복문 없이 간결한 코드로 빠른 연산이 가능해지고, 데이터 과학과 머신러닝의 기초를 탄탄하게 다질 수 있습니다. 첫 번째 프로젝트에서 포켓몬 스탯 데이터를 분석하며 NumPy 배열의 기본을 익혀봅시다.
