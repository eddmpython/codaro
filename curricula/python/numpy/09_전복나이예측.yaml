- id: step10_error
  title: 10단계. 오차 계산
  structuredPrimary: true
  subtitle: MSE, RMSE
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: MSE(Mean Squared Error, 평균제곱오차)는 예측 오차의 제곱을 평균한 값입니다. 제곱하는 이유는 양수/음수 오차가 상쇄되지 않게 하고, 큰 오차에 더 큰 페널티를 주기 위함입니다. RMSE(Root MSE)는 MSE에 루트를 씌운 값으로, 원래 단위(년)로 해석할 수 있어 더 직관적입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    errors = age - agePred
    mse = np.mean(errors ** 2)
    rmse = np.sqrt(mse)
    f"MSE: {mse:.3f}, RMSE: {rmse:.3f}년"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      errors = age - agePred
      mse = np.mean(errors ** 2)
      rmse = np.sqrt(mse)
      f"MSE: {mse:.3f}, RMSE: {rmse:.3f}년"
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step11_rsquared
  title: 11단계. 결정계수
  structuredPrimary: true
  subtitle: R²
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: R²(결정계수)는 모델이 데이터 변동의 몇 %를 설명하는지 나타냅니다. 0~1 사이 값으로, 1에 가까울수록 모델이 데이터를 잘 설명합니다. R²=0.5면 '나이 변동의 50%를 특성들로 설명할 수 있다'는 의미입니다. 단순히 평균만 예측하는 모델은 R²=0입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    ssTot = np.sum((age - np.mean(age)) ** 2)
    ssRes = np.sum(errors ** 2)
    rSquared = 1 - ssRes / ssTot
    f"R²: {rSquared:.4f}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      ssTot = np.sum((age - np.mean(age)) ** 2)
      ssRes = np.sum(errors ** 2)
      rSquared = 1 - ssRes / ssTot
      f"R²: {rSquared:.4f}"
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step12_polyfit
  title: 12단계. 다항 피팅
  structuredPrimary: true
  subtitle: np.polyfit()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    다항 회귀는 y = ax² + bx + c 같은 곡선 관계를 찾습니다. 선형 회귀(직선)보다 복잡한 패턴을 표현할 수 있습니다. np.polyfit(x, y, deg=2)는 2차 다항식의 계수 [a, b, c]를 찾습니다. 껍질 무게와 나이의 관계가 직선이 아닐 수 있으므로 다항식으로 시도해봅니다.

    np.polyfit(x, y, deg)는 deg차 다항식으로 데이터를 피팅합니다. 반환되는 계수는 최고차항부터 상수항 순서입니다.
  tips:
  - np.polyfit(x, y, deg)는 deg차 다항식으로 데이터를 피팅합니다. 반환되는 계수는 최고차항부터 상수항 순서입니다.
  snippet: |-
    shellWeight = X[:, 6]
    polyCoeffs = np.polyfit(shellWeight, age, deg=2)
    polyCoeffs.round(3)
