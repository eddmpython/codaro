- id: step14_region
  title: 14단계. 지역 필터링
  structuredPrimary: true
  subtitle: 태평양 불의 고리
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 태평양 불의 고리(Ring of Fire)는 태평양을 둘러싼 지역으로, 전 세계 지진과 화산의 약 75%가 이곳에서 발생합니다. 한국, 일본, 인도네시아, 칠레, 미국 서부 등이 포함됩니다. 경도가 120° 이상이거나 -60° 이하이고(|로 연결), 위도가 60° 이내인 조건을 &로 결합해 이 지역의 지진을 필터링합니다.
  tips:
