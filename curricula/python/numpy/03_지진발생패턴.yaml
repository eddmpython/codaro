        ranges = [(4.0, 5.0), (5.0, 6.0), (6.0, 7.0), (7.0, 8.0), (8.0, 10.0)]
        rows = []
        for low, high in ranges:
            mask = (mag >= low) & (mag < high)
            n = np.sum(mask)
            avg = np.mean(mag[mask]) if n > 0 else 0
            rows.append({'Range': f"{low}-{high}", 'Count': n, 'Mean': round(avg, 2)})
        pd.DataFrame(rows)
