      assert eventIds[topOrder[:2]].tolist() == ["E-5", "E-3"]
  - type: code
    language: python
    title: 배열 길이 불일치 차단
    description: 규모와 깊이 배열 길이가 다르면 조건 결합 전에 멈춥니다.
    content: |-
      import numpy as np

      def validateEarthquakeArrays(magnitude, depth):
          if len(magnitude) != len(depth):
              raise ValueError("magnitude and depth must have the same length")
          return np.array(magnitude), np.array(depth)

      try:
          validateEarthquakeArrays([5.0, 6.0], [10])
      except ValueError as exc:
          message = str(exc)

      assert message == "magnitude and depth must have the same length"
