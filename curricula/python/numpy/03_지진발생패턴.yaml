        import numpy as np
        import pandas as pd

        df = pd.DataFrame({
            'Date': ['2026-01-01', '2026-01-03', '2026-01-05', '2026-01-07',
                     '2026-01-09', '2026-01-11', '2026-01-13', '2026-01-15'],
            'Latitude': [35.2, -6.1, 38.4, -12.7, 52.1, 19.4, -3.2, 41.7],
            'Longitude': [139.1, 106.8, -122.3, -77.0, -168.4, -155.2, 142.1, 29.0],
            'Magnitude': [4.8, 5.6, 3.2, 6.1, 7.0, 4.2, 5.9, 6.5],
            'Depth': [35, 12, 8, 70, 25, 18, 45, 10],
        })
        mag = df['Magnitude'].values
        lat = df['Latitude'].values
    - type: code
      title: 반구별 비교
      content: |-
        north = lat >= 0
        south = lat < 0
        arr1 = mag[north]
        arr2 = mag[south]
        cnt1 = np.sum(arr1 >= 6.0)
        cnt2 = np.sum(arr2 >= 6.0)
        pd.DataFrame({
            'Hemisphere': ['Northern', 'Southern'],
            'Total': [len(arr1), len(arr2)],
            'Mean Mag': [np.mean(arr1).round(2), np.mean(arr2).round(2)],
            'Strong (>=6.0)': [cnt1, cnt2],
            'Max': [np.max(arr1), np.max(arr2)]
        })
