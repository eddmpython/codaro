- id: step15_risk_score
  title: 15단계. 위험 점수 분석
  structuredPrimary: true
  subtitle: 종합 분석
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 여러 위험 요인을 종합한 점수를 만들어 분석합니다. 불리언 배열에 .astype(int)를 적용하면 True는 1, False는 0으로 변환됩니다. 콜레스테롤 > 200, 혈압 > 130, 나이 > 55 세 가지 조건을 더하면 0~3점의 위험 점수가 됩니다. 점수가 높을수록 심장병 발생률이 높아지는지 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    score = (chol > 200).astype(int) + (bp > 130).astype(int) + (age > 55).astype(int)
    levels, counts = np.unique(score, return_counts=True)
    rows = []
    for r in levels:
        mask = score == r
        rate = np.mean(target[mask])
        rows.append([r, np.sum(mask), round(rate * 100, 1)])
    pd.DataFrame(rows, columns=['RiskScore', 'Count', 'DiseaseRate(%)'])
