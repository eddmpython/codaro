  benefits:
  - 도구 사용 루프와 JSON 강제 출력을 같은 호출에 결합하는 패턴을 익힌다.
  - 캐시된 시스템 프롬프트로 반복 호출 비용을 줄인다.
  - 자동화에서 재사용 가능한 분석 봇 클래스를 만든다.
  - 결과 사전 한 개로 다른 단계(저장, 시각화)로 넘기는 흐름을 잡는다.
  diagram:
    steps:
    - label: 1단계. 데이터 도구 묶음
      detail: load_dataset, summarize, group_mean 세 도구를 등록한다.
    - label: 2단계. 캐시된 분석 시스템
      detail: 분석 정책 시스템 프롬프트를 캐싱한다.
    - label: 3단계. JSON 분석 결과
      detail: 응답을 분석 결과 JSON으로 강제한다.
    - label: 4단계. AnalysisBot 클래스
      detail: 한 메서드 호출로 자연어 → JSON 분석 결과를 만드는 봇을 만든다.
    runtime:
    - label: LLM 호출 환경
      detail: anthropic, pandas와 ANTHROPIC_API_KEY가 준비된 로컬 Python에서 실행한다.
    - label: 데이터분석봇 실행
      detail: tips 데이터셋에서 자연어 분석 요청을 끝까지 처리한다.
    - label: 데이터분석봇 완료
      detail: LLM 통합 트랙 전체 흐름이 하나의 봇으로 정리된다.
sections:
- id: data_tools
  title: 1단계. 데이터 도구 묶음 등록
  structuredPrimary: true
  subtitle: load_dataset / summarize / group_mean
  goal: tips 데이터셋을 다루는 세 도구를 ToolKit에 등록한다.
  why: 데이터 분석 자동화에서는 "데이터 로드 → 요약 → 그룹 집계"가 가장 흔한 패턴입니다. 세 도구로 분리하면 모델이 흐름을 따라가기 쉽습니다.
  explanation: load_dataset은 데이터셋 이름을 받아 행 수와 컬럼 목록을 돌려줍니다. summarize는 데이터 행/평균/주요 컬럼 요약을 돌려줍니다. group_mean은
    분류 컬럼과 측정 컬럼을 받아 그룹 평균을 돌려줍니다. 모든 결과는 JSON 문자열로 통일합니다.
  tips:
  - 도구 결과는 항상 JSON 문자열로 통일해 두면 모델이 도구 결과를 한 방식으로 다룹니다.
  snippet: |-
    import json
    from typing import Callable
    from codaro.curriculum.localData import loadLocalDataset

    class DataToolKit:
        def __init__(self) -> None:
            self.schemas: list[dict] = []
            self.handlers: dict[str, Callable[[dict], str]] = {}

        def register(self, schema: dict, handler: Callable[[dict], str]) -> None:
            self.schemas.append(schema)
            self.handlers[schema["name"]] = handler

        def dispatch(self, name: str, payload: dict) -> str:
            if name not in self.handlers:
                return json.dumps({"error": f"unknown tool {name}"})
            try:
                return self.handlers[name](payload)
            except (KeyError, ValueError, TypeError) as exc:
                return json.dumps({"error": str(exc)})

    def handleLoad(payload: dict) -> str:
        frame = loadLocalDataset(payload["name"])
        return json.dumps({"rows": int(frame.shape[0]), "columns": list(frame.columns)})

    def handleSummarize(payload: dict) -> str:
        frame = loadLocalDataset(payload["name"])
        numeric = frame.select_dtypes(include="number")
        means = numeric.mean().round(3).to_dict()
        return json.dumps({"rows": int(frame.shape[0]), "numeric_means": means})

    def handleGroupMean(payload: dict) -> str:
        frame = loadLocalDataset(payload["name"])
        grouped = frame.groupby(payload["group"])[payload["target"]].mean().round(3)
        return json.dumps({"group": payload["group"], "target": payload["target"], "values": grouped.to_dict()})

    kit = DataToolKit()
    kit.register(
        {
            "name": "load_dataset",
            "description": "Codaro 로컬 데이터셋의 행 수와 컬럼 이름을 돌려준다.",
            "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
        },
        handleLoad,
    )
    kit.register(
        {
            "name": "summarize",
            "description": "데이터셋의 수치 컬럼 평균과 행 수를 돌려준다.",
            "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
        },
        handleSummarize,
    )
    kit.register(
        {
            "name": "group_mean",
            "description": "데이터셋에서 그룹별 측정 컬럼 평균을 돌려준다.",
            "input_schema": {
                "type": "object",
                "properties": {
                    "name": {"type": "string"},
                    "group": {"type": "string"},
                    "target": {"type": "string"},
                },
                "required": ["name", "group", "target"],
            },
        },
        handleGroupMean,
    )
    (len(kit.schemas), kit.dispatch("load_dataset", {"name": "tips"}))
  exercise:
    prompt: kit에 top_rows 도구를 추가해 데이터셋의 첫 N행을 JSON 문자열로 돌려주도록 만드세요.
    starterCode: |-
      import json
      from typing import Callable
      from codaro.curriculum.localData import loadLocalDataset

      class DataToolKit:
          def __init__(self) -> None:
              self.schemas: list[dict] = []
              self.handlers: dict[str, Callable[[dict], str]] = {}

          def register(self, schema: dict, handler: Callable[[dict], str]) -> None:
              self.schemas.append(schema)
              self.handlers[schema["name"]] = handler

          def dispatch(self, name: str, payload: dict) -> str:
              if name not in self.handlers:
                  return json.dumps({"error": f"unknown tool {name}"})
              try:
                  return self.handlers[name](payload)
              except (KeyError, ValueError, TypeError) as exc:
                  return json.dumps({"error": str(exc)})

      def handleLoad(payload: dict) -> str:
          frame = loadLocalDataset(payload["name"])
          return json.dumps({"rows": int(frame.shape[0]), "columns": list(frame.columns)})

      def handleSummarize(payload: dict) -> str:
          frame = loadLocalDataset(payload["name"])
          numeric = frame.select_dtypes(include="number")
          means = numeric.mean().round(3).to_dict()
          return json.dumps({"rows": int(frame.shape[0]), "numeric_means": means})

      def handleGroupMean(payload: dict) -> str:
          frame = loadLocalDataset(payload["name"])
          grouped = frame.groupby(payload["group"])[payload["target"]].mean().round(3)
          return json.dumps({"group": payload["group"], "target": payload["target"], "values": grouped.to_dict()})

      kit = DataToolKit()
      kit.register(
          {
              "name": "load_dataset",
              "description": "Codaro 로컬 데이터셋의 행 수와 컬럼 이름을 돌려준다.",
              "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
          },
          handleLoad,
      )
      kit.register(
          {
              "name": "summarize",
              "description": "데이터셋의 수치 컬럼 평균과 행 수를 돌려준다.",
              "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
          },
          handleSummarize,
      )
      kit.register(
          {
              "name": "group_mean",
              "description": "데이터셋에서 그룹별 측정 컬럼 평균을 돌려준다.",
              "input_schema": {
                  "type": "object",
                  "properties": {
                      "name": {"type": "string"},
                      "group": {"type": "string"},
                      "target": {"type": "string"},
                  },
                  "required": ["name", "group", "target"],
              },
          },
          handleGroupMean,
      )
      (len(kit.schemas), kit.dispatch("load_dataset", {"name": "tips"}))
    hints:
    - handleTopRows(payload)가 frame.head(payload["count"]).to_dict(orient="records")를 json.dumps로 감싸 돌려주도록 만듭니다.
    - 스키마는 name(데이터셋)과 count(정수) 두 인자를 받습니다.
  check:
    noError: ToolKit 정의와 모든 등록, dispatch 호출이 정상 실행되어야 합니다.
    resultCheck: kit.schemas 길이가 3 이상이고 load_dataset 호출이 행/컬럼 정보를 돌려줘야 합니다.
- id: cached_system
  title: 2단계. 캐시된 분석 시스템
  structuredPrimary: true
  subtitle: 분석 정책을 캐싱
  goal: 분석 봇의 시스템 프롬프트를 캐시 마킹된 블록 리스트로 만든다.
  why: 분석 봇은 한 세션 안에 여러 호출을 받습니다. 시스템 프롬프트가 캐시되면 두 번째 호출부터 비용이 크게 줄어듭니다.
  explanation: 시스템 프롬프트는 (1) 봇 정체성 (2) 사용 가능한 도구 목록 (3) 출력 형식 세 부분으로 구성합니다. 도구 목록은 ToolKit에서 자동 생성한 텍스트를
    그대로 넣고, cache_control로 5분 ephemeral 캐시에 저장합니다.
  tips:
  - 도구 목록 문자열을 시스템에 넣어 두면 모델이 도구 description을 모두 보고 더 정확한 라우팅을 합니다.
  snippet: |-
    def describeKit(toolkit) -> str:
        lines = [f"- {schema['name']}: {schema['description']}" for schema in toolkit.schemas]
        return "\n".join(lines)

    def buildAnalysisSystem(toolkit) -> list[dict]:
        body = (
            "너는 Codaro 데이터 분석 봇이다. 다음 규칙을 모두 따른다.\n"
            "- 한국어로만 응답한다.\n"
            "- 분석에는 등록된 도구를 적극 사용한다.\n"
            "- 최종 응답은 valid JSON 한 개로 끝낸다. 코드 블록 마크다운, 추가 설명 금지.\n"
            "- JSON의 키는 정확히 question, dataset, insight, metrics 네 개를 사용한다.\n\n"
            "사용 가능한 도구 목록:\n"
            f"{describeKit(toolkit)}"
        )
        return [{"type": "text", "text": body, "cache_control": {"type": "ephemeral"}}]

    sampleKit = type("Stub", (), {"schemas": [{"name": "load_dataset", "description": "데이터셋 로드"}]})()
    sampleSystem = buildAnalysisSystem(sampleKit)
    (sampleSystem[0]["text"][:60], "cache_control" in sampleSystem[0])
  exercise:
    prompt: buildAnalysisSystem이 두 번째 블록(usage examples)을 캐싱 없이 추가하도록 확장하세요.
    starterCode: |-
      def describeKit(toolkit) -> str:
          lines = [f"- {schema['name']}: {schema['description']}" for schema in toolkit.schemas]
          return "\n".join(lines)

      def buildAnalysisSystem(toolkit) -> list[dict]:
          body = (
              "너는 Codaro 데이터 분석 봇이다. 다음 규칙을 모두 따른다.\n"
              "- 한국어로만 응답한다.\n"
              "- 분석에는 등록된 도구를 적극 사용한다.\n"
              "- 최종 응답은 valid JSON 한 개로 끝낸다. 코드 블록 마크다운, 추가 설명 금지.\n"
              "- JSON의 키는 정확히 question, dataset, insight, metrics 네 개를 사용한다.\n\n"
              "사용 가능한 도구 목록:\n"
              f"{describeKit(toolkit)}"
          )
          return [{"type": "text", "text": body, "cache_control": {"type": "ephemeral"}}]

      sampleKit = type("Stub", (), {"schemas": [{"name": "load_dataset", "description": "데이터셋 로드"}]})()
      sampleSystem = buildAnalysisSystem(sampleKit)
      (sampleSystem[0]["text"][:60], "cache_control" in sampleSystem[0])
    hints:
    - 두 번째 블록은 사용 예시 문장을 담은 type=text 사전으로 추가합니다.
    - cache_control을 두지 않으면 캐싱 대상이 아닙니다.
  check:
    noError: 함수 정의가 정상 실행되어야 합니다.
    resultCheck: sampleSystem이 cache_control 키를 가진 사전을 첫 항목으로 가져야 합니다.
- id: json_finish
  title: 3단계. JSON 강제 출력
  structuredPrimary: true
  subtitle: 최종 응답을 JSON으로 prefill
  goal: 도구 루프 종료 후 마지막 호출에서 assistant prefill로 JSON 출력을 강제한다.
  why: 분석 봇의 결과는 코드의 다음 단계가 받습니다. 응답이 JSON이어야 자동화가 다음 단계로 안전하게 넘어갑니다.
  explanation: 도구 루프 마지막 호출 시 messages 끝에 assistant 메시지를 "{"로 추가합니다. 모델이 JSON을 이어 작성하고 호출 측에서 "{"를 다시 붙여
    json.loads합니다. 파싱 실패 시 한 번 재시도하는 안전망까지 둡니다.
  tips:
  - 도구 루프가 진행 중일 때는 prefill을 넣지 않습니다. 도구가 끝난 마지막 라운드에만 prefill을 적용합니다.
  snippet: |-
    import json
    import anthropic

    def runFinalWithJson(client, system, history) -> dict:
        attempts = 0
        while attempts < 2:
            result = client.messages.create(
                model="claude-haiku-4-5",
                max_tokens=400,
                system=system,
                messages=history + [{"role": "assistant", "content": "{"}],
            )
            raw = "".join(block.text for block in result.content if block.type == "text")
            try:
                return json.loads("{" + raw)
            except json.JSONDecodeError:
                attempts += 1
        raise ValueError("failed to produce JSON after retries")

    sampleSystem = [{"type": "text", "text": "JSON 형식 강제 시스템", "cache_control": {"type": "ephemeral"}}]
    runFinalWithJson
  exercise:
    prompt: runFinalWithJson이 attempts 횟수를 호출자에게 알려주도록 결과 사전에 _attempts 키를 추가하세요.
    starterCode: |-
      import json
      import anthropic

      def runFinalWithJson(client, system, history) -> dict:
          attempts = 0
          while attempts < 2:
              result = client.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=400,
                  system=system,
                  messages=history + [{"role": "assistant", "content": "{"}],
              )
              raw = "".join(block.text for block in result.content if block.type == "text")
              try:
                  return json.loads("{" + raw)
              except json.JSONDecodeError:
                  attempts += 1
          raise ValueError("failed to produce JSON after retries")

      sampleSystem = [{"type": "text", "text": "JSON 형식 강제 시스템", "cache_control": {"type": "ephemeral"}}]
      runFinalWithJson
    hints:
    - 성공 시 parsed["_attempts"] = attempts + 1로 표시하고 돌려줍니다.
    - 자동화 측에서 재시도가 일어났는지 확인할 수 있습니다.
  check:
    noError: 함수 정의가 정상 평가되어야 합니다.
    resultCheck: runFinalWithJson이 함수 객체로 평가되어야 합니다.
- id: analysis_bot
  title: 4단계. AnalysisBot 클래스
  structuredPrimary: true
  subtitle: 한 메서드 호출로 자연어 → JSON 분석 결과
  goal: AnalysisBot.ask(question) 한 번 호출로 도구 사용·JSON 출력·캐시 적용까지 모두 합쳐진 응답을 얻는다.
  why: 자동화 클라이언트가 한 줄 호출로 분석 결과를 받을 수 있어야 다른 코드와 결합하기 쉽습니다.
  explanation: AnalysisBot은 ToolKit과 system 블록을 보관합니다. ask 메서드는 도구 사용 루프를 돌리고 마지막 라운드에서 JSON prefill로 결과를
    강제합니다. 결과 사전은 question/dataset/insight/metrics 네 키를 가집니다.
  tips:
  - ask 호출마다 새로운 history를 만들어 봇이 단일 호출 단위로 동작하도록 합니다. 멀티턴은 상위 호출자가 관리합니다.
  snippet: |-
    import json
    import anthropic
    from typing import Callable
    from codaro.curriculum.localData import loadLocalDataset

    class DataToolKit:
        def __init__(self) -> None:
            self.schemas: list[dict] = []
            self.handlers: dict[str, Callable[[dict], str]] = {}

        def register(self, schema: dict, handler: Callable[[dict], str]) -> None:
            self.schemas.append(schema)
            self.handlers[schema["name"]] = handler

        def dispatch(self, name: str, payload: dict) -> str:
            if name not in self.handlers:
                return json.dumps({"error": f"unknown tool {name}"})
            try:
                return self.handlers[name](payload)
            except (KeyError, ValueError, TypeError) as exc:
                return json.dumps({"error": str(exc)})

    def describeKit(toolkit) -> str:
        return "\n".join(f"- {schema['name']}: {schema['description']}" for schema in toolkit.schemas)

    class AnalysisBot:
        def __init__(self, toolkit: DataToolKit, model: str = "claude-haiku-4-5") -> None:
            self.client = anthropic.Anthropic()
            self.toolkit = toolkit
            self.model = model
            self.system = [
                {
                    "type": "text",
                    "text": (
                        "너는 Codaro 데이터 분석 봇이다. 다음 규칙을 따른다.\n"
                        "- 도구를 적극 사용한다.\n"
                        "- 최종 응답은 valid JSON 한 개만. 코드 블록·추가 설명 금지.\n"
                        "- 키는 question, dataset, insight, metrics 네 개만.\n\n"
                        f"사용 가능한 도구:\n{describeKit(toolkit)}"
                    ),
                    "cache_control": {"type": "ephemeral"},
                }
            ]

        def ask(self, question: str, maxRounds: int = 5) -> dict:
            history: list[dict] = [{"role": "user", "content": question}]
            for _ in range(maxRounds):
                result = self.client.messages.create(
                    model=self.model,
                    max_tokens=600,
                    system=self.system,
                    tools=self.toolkit.schemas,
                    messages=history,
                )
                if result.stop_reason != "tool_use":
                    break
                history.append({"role": "assistant", "content": result.content})
                blockResults = []
                for block in result.content:
                    if block.type != "tool_use":
                        continue
                    blockResults.append({
                        "type": "tool_result",
                        "tool_use_id": block.id,
                        "content": self.toolkit.dispatch(block.name, dict(block.input)),
                    })
                history.append({"role": "user", "content": blockResults})
            for attempt in range(2):
                finalResult = self.client.messages.create(
                    model=self.model,
                    max_tokens=400,
                    system=self.system,
                    tools=self.toolkit.schemas,
                    messages=history + [{"role": "assistant", "content": "{"}],
                )
                rawText = "".join(block.text for block in finalResult.content if block.type == "text")
                try:
                    return json.loads("{" + rawText)
                except json.JSONDecodeError:
                    if attempt == 1:
                        raise ValueError(f"AnalysisBot JSON failed: {rawText[:120]}")
            return {}

    def buildKit() -> DataToolKit:
        kit = DataToolKit()
        kit.register(
            {
                "name": "load_dataset",
                "description": "Codaro 로컬 데이터셋의 행 수와 컬럼 이름을 돌려준다.",
                "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
            },
            lambda payload: json.dumps({
                "rows": int(loadLocalDataset(payload["name"]).shape[0]),
                "columns": list(loadLocalDataset(payload["name"]).columns),
            }),
        )
        kit.register(
            {
                "name": "summarize",
                "description": "데이터셋의 수치 컬럼 평균과 행 수를 돌려준다.",
                "input_schema": {"type": "object", "properties": {"name": {"type": "string"}}, "required": ["name"]},
            },
            lambda payload: json.dumps({
                "rows": int(loadLocalDataset(payload["name"]).shape[0]),
                "numeric_means": loadLocalDataset(payload["name"]).select_dtypes(include="number").mean().round(3).to_dict(),
            }),
        )
        kit.register(
            {
                "name": "group_mean",
                "description": "데이터셋에서 그룹 컬럼별 측정 컬럼 평균을 돌려준다.",
                "input_schema": {
                    "type": "object",
                    "properties": {
                        "name": {"type": "string"},
                        "group": {"type": "string"},
                        "target": {"type": "string"},
                    },
                    "required": ["name", "group", "target"],
                },
            },
            lambda payload: json.dumps({
                "values": loadLocalDataset(payload["name"])
                    .groupby(payload["group"])[payload["target"]]
                    .mean()
                    .round(3)
                    .to_dict()
            }),
        )
        return kit

    bot = AnalysisBot(buildKit())
    bot
  exercise:
    prompt: AnalysisBot.ask가 결과 dict에 호출 비용도 함께 담아 돌려주도록 totalUsage 누적 필드를 추가하세요.
    starterCode: |-
      # 위 snippet과 같은 AnalysisBot 구조를 그대로 두고 ask 메서드 안에서
      # totalUsage 사전에 input_tokens / output_tokens를 누적해 마지막 반환 사전에 함께 담으세요.
      "see snippet"
    hints:
    - 메서드 시작에서 totalUsage 사전을 input_tokens 0과 output_tokens 0으로 초기화합니다.
    - 모든 호출 직후 result.usage 값을 누적하고 마지막 반환 사전에 _usage 키로 함께 돌려줍니다.
  check:
    noError: AnalysisBot 클래스 정의가 정상 평가되어야 합니다.
    resultCheck: bot 변수가 AnalysisBot 인스턴스로 평가되어야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 자연어 분석 요청 → JSON 결과'
  structuredPrimary: true
  subtitle: tips 데이터셋에서 그룹별 팁 비교
  goal: bot.ask로 tips 데이터셋의 day별 tip 평균을 자연어로 묻고 결과 JSON이 정확한 키를 갖는지 검증한다.
  why: 종합 봇의 가치는 자연어 요청 한 줄로 끝나는 데 있습니다. 결과 모양을 검증하면 자동화 다음 단계가 안전하게 받아갑니다.
  explanation: 자연어 질문에 데이터셋(tips)과 분석 키워드(요일별 팁 평균)를 명시합니다. bot.ask 결과 사전이 question/dataset/insight/metrics
    네 키를 모두 가지는지, metrics가 숫자 사전인지 assertion으로 확인합니다.
  tips:
  - 자연어 질문에 데이터셋 이름과 분석 차원을 명시하면 도구 호출이 안정적으로 됩니다.
  snippet: |-
    # 위 4단계의 AnalysisBot 정의가 이미 실행되어 있다고 가정합니다.
    insight = bot.ask("tips 데이터셋에서 요일(day)별 tip 평균을 비교해 줘.")
    assert isinstance(insight, dict)
    assert set(insight.keys()) >= {"question", "dataset", "insight", "metrics"}
    assert isinstance(insight["metrics"], dict)
    assert len(insight["metrics"]) > 0
    insight
  exercise:
    prompt: 같은 봇으로 다른 분석 요청("시간대(time)별 total_bill 평균")을 한 번 더 보내 두 결과의 키 집합이 같은지 확인하세요.
    starterCode: |-
      insightTwo = bot.ask("tips 데이터셋에서 시간대(time)별 total_bill 평균을 비교해 줘.")
      assert set(insight.keys()) == set(insightTwo.keys())
      insightTwo
    hints:
    - 변수명이 insight과 겹치지 않도록 insightTwo 같은 다른 이름을 씁니다.
    - 두 응답 모두 question/dataset/insight/metrics 네 키를 가져야 합니다.
  check:
    noError: bot.ask 호출과 assertion이 모두 정상 실행되어야 합니다.
    resultCheck: insight 사전이 네 키를 가지고 metrics가 비어 있지 않아야 합니다.
