meta:
  packages:
  - anthropic
  id: llmBasics_07
  title: 프롬프트캐싱
  order: 7
  category: llmBasics
  difficulty: ⭐⭐⭐
  badge: 중급
  tags:
  - anthropic
  - prompt_caching
  - cache_control
  - 비용절감
  seo:
    title: Claude 프롬프트 캐싱 - 시스템 프롬프트 캐시로 비용 절감
    description: cache_control로 긴 시스템 프롬프트를 캐싱하고 cache_read_input_tokens로 적중률을 측정해 비용을 줄입니다.
    keywords:
    - prompt caching
    - cache_control
    - cache_read_input_tokens
    - Claude caching
intro:
  emoji: 💾
  goal: cache_control로 시스템 프롬프트를 캐시해 반복 호출 비용을 줄인다.
  description: 같은 시스템 프롬프트를 여러 번 보내는 자동화에서 캐싱은 비용·지연을 크게 줄입니다. 캐시 적중을 코드로 측정하는 흐름을 만듭니다.
  direction: 캐싱 없는 baseline → 캐시 시스템 적용 → 적중률 측정 → 캐싱 단가까지 반영한 비용 계산기 순으로 발전시킨다.
  benefits:
  - cache_control 파라미터가 어디에 들어가는지 정확히 익힌다.
  - cache_creation_input_tokens와 cache_read_input_tokens 두 필드 의미를 분명히 한다.
  - 캐싱이 비용에 미치는 영향을 코드로 직접 측정한다.
  - 캐싱 단가까지 반영한 비용 계산기를 만든다.
  diagram:
    steps:
    - label: 1단계. 캐싱 없는 baseline
      detail: 긴 시스템 프롬프트로 두 번 호출해 input_tokens가 매번 동일하게 청구되는지 본다.
    - label: 2단계. cache_control 적용
      detail: 시스템 프롬프트 블록에 cache_control을 추가해 캐시 마킹한다.
    - label: 3단계. 적중률 측정
      detail: cache_creation/cache_read 필드로 첫·둘째 호출의 캐시 거동을 확인한다.
    - label: 4단계. 캐싱 단가 비용 계산기
      detail: 캐시 생성·읽기 토큰을 별도 단가로 처리하는 비용 계산기를 만든다.
    runtime:
    - label: LLM 호출 환경
      detail: anthropic 패키지와 ANTHROPIC_API_KEY가 준비된 로컬 Python에서 실행한다.
    - label: 프롬프트캐싱 실행
      detail: 같은 시스템 프롬프트로 두 번 호출해 캐시 적중을 본다.
    - label: 프롬프트캐싱 완료
      detail: 종합 자동화 강의에서 캐시된 시스템 프롬프트를 그대로 재사용한다.
sections:
- id: noncached_baseline
  title: 1단계. 캐싱 없는 baseline
  structuredPrimary: true
  subtitle: 긴 시스템 프롬프트 두 번 호출
  goal: 동일한 긴 시스템 프롬프트로 두 번 호출해 input_tokens가 매번 동일하게 청구되는지 확인한다.
  why: 캐싱 효과를 측정하려면 캐싱 없는 baseline의 비용 패턴을 먼저 알아야 합니다. 동일 시스템이 매번 청구된다는 점이 baseline의 핵심입니다.
  explanation: 시스템 프롬프트를 일부러 길게 만들어 캐싱 효과가 잘 보이도록 합니다. 두 번의 호출이 동일한 input_tokens를 청구하는 모양을 봐 둡니다. 7번 강의의
    핵심은 이 두 호출이 어떻게 줄어드는지입니다.
  tips:
  - 캐싱 효과는 시스템 프롬프트가 1024 토큰 이상일 때 안정적으로 나타납니다. 짧은 시스템으로는 캐시가 만들어지지 않을 수 있습니다.
  snippet: |-
    import anthropic

    longSystem = (
        "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
        + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
        + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
        + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
        + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
    )

    client = anthropic.Anthropic()
    first = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=120,
        system=longSystem,
        messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
    )
    second = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=120,
        system=longSystem,
        messages=[{"role": "user", "content": "내일 학습 팁 하나만 알려줘."}],
    )
    (first.usage.input_tokens, second.usage.input_tokens)
  exercise:
    prompt: longSystem의 반복 횟수를 5번으로 줄여 짧게 만들고 두 호출의 input_tokens가 얼마나 줄어드는지 비교하세요.
    starterCode: |-
      import anthropic

      longSystem = (
          "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
          + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
          + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
          + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
          + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
      )

      client = anthropic.Anthropic()
      first = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=120,
          system=longSystem,
          messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
      )
      second = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=120,
          system=longSystem,
          messages=[{"role": "user", "content": "내일 학습 팁 하나만 알려줘."}],
      )
      (first.usage.input_tokens, second.usage.input_tokens)
    hints:
    - 반복 횟수를 줄이면 input_tokens가 비례해서 줄어듭니다.
    - 짧은 시스템으로는 캐시가 효과적으로 만들어지지 않습니다.
  check:
    noError: 두 호출이 모두 정상 실행되어야 합니다.
    resultCheck: 두 호출의 input_tokens가 서로 비슷한 양수여야 합니다.
- id: cache_control_on
  title: 2단계. cache_control로 캐시 마킹
  structuredPrimary: true
  subtitle: system 블록을 리스트로 변환
  goal: system을 텍스트 블록 리스트로 바꾸고 cache_control을 추가해 캐시 마킹한다.
  why: 캐싱은 자동으로 켜지지 않습니다. 명시적으로 캐시 대상 블록을 지정해야 활성화됩니다.
  explanation: system 인자는 문자열 대신 텍스트 블록 사전들의 리스트도 받습니다. 각 블록은 type, text, cache_control 키를 가지며, cache_control을
    단 블록은 5분 ephemeral 캐시에 저장되고 같은 내용으로 다시 호출하면 캐시에서 읽힙니다.
  tips:
  - cache_control 대상 블록의 텍스트는 최소 1024 토큰 정도 이상이어야 캐시가 만들어집니다.
  snippet: |-
    import anthropic

    cacheText = (
        "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
        + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
        + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
        + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
        + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
    )

    cachedSystem = [
        {
            "type": "text",
            "text": cacheText,
            "cache_control": {"type": "ephemeral"},
        }
    ]

    client = anthropic.Anthropic()
    firstCachedResult = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=120,
        system=cachedSystem,
        messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
    )
    firstCachedResult.usage.model_dump()
  exercise:
    prompt: cachedSystem에 두 번째 블록(type=text)을 추가하고 두 번째 블록은 cache_control 없이 둬 보세요. 둘 중 캐싱되는 블록이 어느 쪽인지 보세요.
    starterCode: |-
      import anthropic

      cacheText = (
          "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
          + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
          + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
          + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
          + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
      )

      cachedSystem = [
          {
              "type": "text",
              "text": cacheText,
              "cache_control": {"type": "ephemeral"},
          }
      ]

      client = anthropic.Anthropic()
      firstCachedResult = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=120,
          system=cachedSystem,
          messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
      )
      firstCachedResult.usage.model_dump()
    hints:
    - 두 번째 블록은 짧은 안내문이어도 됩니다.
    - cache_control이 없는 블록은 캐시되지 않습니다.
  check:
    noError: 캐시 마킹된 호출이 정상 실행되어야 합니다.
    resultCheck: usage에 cache_creation_input_tokens 또는 cache_read_input_tokens 키가 있어야 합니다.
- id: cache_hit_measurement
  title: 3단계. 캐시 적중 측정
  structuredPrimary: true
  subtitle: 첫·둘째 호출 비교
  goal: 같은 cachedSystem으로 두 번 호출해 두 번째에서 cache_read_input_tokens가 생기는지 확인한다.
  why: 캐시는 측정해야 가치가 보입니다. 코드로 적중률을 보면 시스템이 진짜 캐시되었는지 명확합니다.
  explanation: 첫 호출은 cache_creation_input_tokens에 큰 값이 들어가고, 두 번째 호출은 cache_read_input_tokens가 그 자리를 대신합니다.
    cache_read는 cache_creation보다 단가가 훨씬 낮아 비용이 크게 줄어듭니다.
  tips:
  - 두 호출 사이가 5분 이내여야 ephemeral 캐시가 살아 있습니다. 학습 셀에서 바로 이어 호출하면 안정적입니다.
  snippet: |-
    import anthropic

    cacheText = (
        "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
        + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
        + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
        + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
        + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
    )
    cachedSystem = [
        {"type": "text", "text": cacheText, "cache_control": {"type": "ephemeral"}}
    ]

    client = anthropic.Anthropic()
    coldResult = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=120,
        system=cachedSystem,
        messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
    )
    warmResult = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=120,
        system=cachedSystem,
        messages=[{"role": "user", "content": "내일 학습 팁 하나만 알려줘."}],
    )
    cacheStats = {
        "cold": coldResult.usage.model_dump(),
        "warm": warmResult.usage.model_dump(),
    }
    cacheStats
  exercise:
    prompt: warmResult를 한 번 더 만들어(warmResult2) 캐시 읽기가 여러 번 가능한지 확인하세요. 변수명은 새 이름을 써야 합니다.
    starterCode: |-
      import anthropic

      cacheText = (
          "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
          + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
          + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
          + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
          + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
      )
      cachedSystem = [
          {"type": "text", "text": cacheText, "cache_control": {"type": "ephemeral"}}
      ]

      client = anthropic.Anthropic()
      coldResult = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=120,
          system=cachedSystem,
          messages=[{"role": "user", "content": "오늘 학습 팁 하나만 알려줘."}],
      )
      warmResult = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=120,
          system=cachedSystem,
          messages=[{"role": "user", "content": "내일 학습 팁 하나만 알려줘."}],
      )
      cacheStats = {
          "cold": coldResult.usage.model_dump(),
          "warm": warmResult.usage.model_dump(),
      }
      cacheStats
    hints:
    - 같은 변수 client를 재사용해도 클라이언트는 stateless이므로 캐시는 서버 측에 있습니다.
    - 새 호출 변수명은 다른 이름을 써야 합니다.
  check:
    noError: 두 호출이 모두 정상 실행되어야 합니다.
    resultCheck: cacheStats가 cold와 warm 키를 가진 사전이어야 합니다.
- id: cached_pricing
  title: 4단계. 캐싱 단가 반영 비용 계산기
  structuredPrimary: true
  subtitle: cache_creation·cache_read 별도 처리
  goal: 캐싱 단가 사전을 만들고 추정 비용 함수가 캐시 토큰을 별도 단가로 처리하도록 확장한다.
  why: 캐싱 효과를 비용에 정확히 반영하려면 단가 분기가 필요합니다. 캐시 적중 비율에 따라 호출 비용이 크게 달라집니다.
  explanation: 캐시 생성 토큰은 일반 입력 토큰보다 살짝 비싸고(보통 25% 가산) 캐시 읽기 토큰은 훨씬 저렴(보통 90% 할인)합니다. 정확한 단가는 공식 문서에서 확인하고,
    여기서는 학습용 비율을 사용해 비용 계산 함수의 모양만 만듭니다.
  tips:
  - cache_read 단가는 input_per_million의 10% 정도가 일반적입니다. 실제 단가는 모델·지역마다 다르므로 공식 문서 확인이 필요합니다.
  snippet: |-
    pricing = {
        "claude-haiku-4-5": {
            "input_per_million": 1.0,
            "cache_creation_per_million": 1.25,
            "cache_read_per_million": 0.1,
            "output_per_million": 5.0,
        },
    }

    def estimateCostCached(usage, modelName: str, table: dict) -> float:
        rate = table[modelName]
        inputCost = usage.input_tokens * rate["input_per_million"] / 1_000_000
        creationCost = (
            (usage.cache_creation_input_tokens or 0)
            * rate["cache_creation_per_million"]
            / 1_000_000
        )
        readCost = (
            (usage.cache_read_input_tokens or 0)
            * rate["cache_read_per_million"]
            / 1_000_000
        )
        outputCost = usage.output_tokens * rate["output_per_million"] / 1_000_000
        return round(inputCost + creationCost + readCost + outputCost, 6)

    estimateCostCached
  exercise:
    prompt: estimateCostCached가 호출별 세부 항목(input/creation/read/output)을 함께 돌려주는 버전을 만들어 보세요.
    starterCode: |-
      pricing = {
          "claude-haiku-4-5": {
              "input_per_million": 1.0,
              "cache_creation_per_million": 1.25,
              "cache_read_per_million": 0.1,
              "output_per_million": 5.0,
          },
      }

      def estimateCostCached(usage, modelName: str, table: dict) -> float:
          rate = table[modelName]
          inputCost = usage.input_tokens * rate["input_per_million"] / 1_000_000
          creationCost = (
              (usage.cache_creation_input_tokens or 0)
              * rate["cache_creation_per_million"]
              / 1_000_000
          )
          readCost = (
              (usage.cache_read_input_tokens or 0)
              * rate["cache_read_per_million"]
              / 1_000_000
          )
          outputCost = usage.output_tokens * rate["output_per_million"] / 1_000_000
          return round(inputCost + creationCost + readCost + outputCost, 6)

      estimateCostCached
    hints:
    - 함수가 float 대신 dict를 돌려주도록 바꾸고 각 비용 항목을 키로 만듭니다.
    - 총합 키 "total"도 함께 두면 호출 측이 편합니다.
  check:
    noError: 함수 정의가 정상 실행되어야 합니다.
    resultCheck: estimateCostCached가 함수 객체로 평가되어야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 캐시 적용 전후 비용 비교 종합 결과'
  structuredPrimary: true
  subtitle: 두 시스템 모드로 호출해 비용 차이 측정
  goal: 캐싱 없는 모드와 있는 모드로 두 번씩 호출해 두 모드의 총 비용 차이를 데이터로 측정한다.
  why: 캐싱 비용 절감 효과는 호출이 반복될수록 커집니다. 두 모드 비교를 코드로 박아 두면 실무 의사결정이 빨라집니다.
  explanation: 동일한 긴 시스템 텍스트를 (1) 캐싱 없이 문자열로 (2) 캐싱 마킹된 블록으로 두 번씩 호출합니다. 4개 호출의 비용을 합산해 cached/uncached 두
    합계를 비교합니다. cached 합계가 uncached 합계보다 작으면 캐싱이 의미 있게 동작한 것입니다.
  tips:
  - 짧은 시스템에서는 캐시 효과가 안 보일 수 있습니다. 시스템을 충분히 길게 만들어야 합니다.
  snippet: |-
    import anthropic

    pricing = {
        "claude-haiku-4-5": {
            "input_per_million": 1.0,
            "cache_creation_per_million": 1.25,
            "cache_read_per_million": 0.1,
            "output_per_million": 5.0,
        },
    }

    def costOf(usage, modelName: str, table: dict) -> float:
        rate = table[modelName]
        return round(
            usage.input_tokens * rate["input_per_million"] / 1_000_000
            + (usage.cache_creation_input_tokens or 0) * rate["cache_creation_per_million"] / 1_000_000
            + (usage.cache_read_input_tokens or 0) * rate["cache_read_per_million"] / 1_000_000
            + usage.output_tokens * rate["output_per_million"] / 1_000_000,
            6,
        )

    longText = (
        "너는 데이터 분석 자동화 도구야. 다음 규칙을 모두 따른다.\n"
        + ("- 응답은 반드시 한국어로만 작성한다.\n" * 20)
        + ("- 응답에는 추가 설명이나 코드 블록 마크다운을 절대 포함하지 않는다.\n" * 20)
        + ("- 응답은 가능한 한 짧고 명확하게 작성하고, 핵심만 전달한다.\n" * 20)
        + "- 사용자가 묻는 한 가지 질문에만 정확히 답한다."
    )
    plainSystem = longText
    cachedSystemBlocks = [
        {"type": "text", "text": longText, "cache_control": {"type": "ephemeral"}}
    ]

    questions = ["오늘 학습 팁 하나만 알려줘.", "내일 학습 팁 하나만 알려줘."]

    client = anthropic.Anthropic()
    uncachedTotal = 0.0
    for question in questions:
        plainResult = client.messages.create(
            model="claude-haiku-4-5",
            max_tokens=120,
            system=plainSystem,
            messages=[{"role": "user", "content": question}],
        )
        uncachedTotal += costOf(plainResult.usage, "claude-haiku-4-5", pricing)

    cachedTotal = 0.0
    for question in questions:
        cachedResult = client.messages.create(
            model="claude-haiku-4-5",
            max_tokens=120,
            system=cachedSystemBlocks,
            messages=[{"role": "user", "content": question}],
        )
        cachedTotal += costOf(cachedResult.usage, "claude-haiku-4-5", pricing)

    assert uncachedTotal > 0
    assert cachedTotal > 0
    {"uncached": round(uncachedTotal, 6), "cached": round(cachedTotal, 6), "saved": round(uncachedTotal - cachedTotal, 6)}
  exercise:
    prompt: 두 모드 호출 횟수를 3개씩으로 늘려 캐시 효과가 더 크게 보이는지 측정하세요.
    starterCode: |-
