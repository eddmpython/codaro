    why: 구조화 출력은 모델 응답을 그대로 믿는 것이 아니라 코드가 받을 수 있는 사전으로 확정하는 단계까지 포함합니다.
    explanation: 응답 문자열을 json.loads로 파싱한 뒤 orderId, customer, amount, currency 네 키를 검사합니다. amount는 다음 계산 단계에서 쓸 수 있도록 int로
