intro:
  emoji: 📦
  goal: JSON만 출력하도록 모델을 유도하고 안전하게 파싱한다.
  description: 자동화의 다음 단계가 코드라면 응답은 JSON이어야 합니다. 프롬프트 설계, prefill, 파싱 검증, 재시도까지 한 흐름으로 묶습니다.
  direction: 자유 응답 → JSON 강제 system → assistant prefill → 검증·재시도 함수 순으로 발전시킨다.
  benefits:
  - JSON만 출력하도록 system 프롬프트를 작성하는 패턴을 익힌다.
  - assistant prefill로 응답 시작 토큰을 고정해 적중률을 올린다.
  - json.loads 실패에 대비하는 검증·재시도 함수를 만든다.
  - 자동화 파이프라인에서 다음 단계 코드로 바로 넘길 수 있는 사전을 만든다.
  diagram:
    steps:
    - label: 1단계. 자유 응답 baseline
      detail: 자연어 응답에 JSON 비슷한 문자열이 섞이는 모양을 본다.
    - label: 2단계. JSON 강제 system
      detail: system에 키 목록과 출력 형식을 명시한다.
    - label: 3단계. assistant prefill
      detail: messages 마지막에 assistant 빈 시작을 넣어 응답을 JSON으로 강제한다.
    - label: 4단계. 검증과 재시도
      detail: json.loads 실패 시 한 번 재시도하는 함수를 만든다.
    runtime:
    - label: LLM 호출 환경
      detail: anthropic 패키지와 ANTHROPIC_API_KEY가 준비된 로컬 Python에서 실행한다.
    - label: JSON구조화출력 실행
      detail: 응답이 JSON으로 파싱되는지 한 단계씩 확인한다.
    - label: JSON구조화출력 완료
      detail: 도구 사용·종합 자동화에서 바로 재사용 가능한 파서 함수를 갖춘다.
sections:
- id: free_form_baseline
  title: 1단계. 자유 응답 baseline
  structuredPrimary: true
  subtitle: JSON 강제 없이 부탁만 해보기
  goal: JSON으로 답해 달라는 자연어 부탁만으로 보낸 응답에서 파싱이 어떻게 깨질 수 있는지 본다.
  why: 강제 없이 부탁만 하면 모델이 종종 자연어 설명을 함께 답합니다. json.loads가 실패하는 모양을 직접 보면 prefill의 가치가 분명해집니다.
  explanation: user 메시지에 JSON 출력 요청만 넣고 시스템 프롬프트는 비웁니다. 응답은 보통 JSON 비슷한 모양이지만 코드 블록 마크다운(```json) 또는 앞뒤
    설명이 붙기도 합니다. 첫 try-except로 파싱이 깨질 수 있다는 사실을 코드로 확인합니다.
  tips:
  - json.loads는 마크다운 코드 블록을 그대로 받아 ValueError를 냅니다. 파싱 실패 처리가 필수입니다.
  snippet: |-
    import json
    import anthropic

    client = anthropic.Anthropic()
    request = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        messages=[{"role": "user", "content": "주문 정보 한 건을 JSON으로 만들어 줘. 키는 orderId, customer, amount."}],
    )
    rawText = "".join(block.text for block in request.content if block.type == "text")
    try:
        parsed = json.loads(rawText)
        parseStatus = "ok"
    except json.JSONDecodeError as exc:
        parsed = None
        parseStatus = f"fail: {exc.msg}"
    (parseStatus, rawText[:80])
  exercise:
    prompt: 같은 호출을 두세 번 반복해 rawText 모양이 매번 같은지 본다.
    starterCode: |-
      import json
      import anthropic

      client = anthropic.Anthropic()
      request = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          messages=[{"role": "user", "content": "주문 정보 한 건을 JSON으로 만들어 줘. 키는 orderId, customer, amount."}],
      )
      rawText = "".join(block.text for block in request.content if block.type == "text")
      try:
          parsed = json.loads(rawText)
          parseStatus = "ok"
      except json.JSONDecodeError as exc:
          parsed = None
          parseStatus = f"fail: {exc.msg}"
      (parseStatus, rawText[:80])
    hints:
    - 매번 ok가 나오기도 하고 fail이 나오기도 합니다. 그게 강제가 필요한 이유입니다.
    - 응답 변수명은 호출마다 다른 이름을 사용해야 합니다.
  check:
    noError: 호출과 파싱 시도가 예외 없이 끝까지 완료되어야 합니다.
    resultCheck: rawText가 비어있지 않은 문자열이고 parseStatus가 "ok" 또는 "fail:..."이어야 합니다.
- id: strict_system
  title: 2단계. JSON 강제 system 프롬프트
  structuredPrimary: true
  subtitle: 키 목록과 출력 형식 명시
  goal: system에 출력 키 목록과 "JSON 외 텍스트 금지"를 명시해 응답이 JSON으로만 오도록 유도한다.
  why: 형식 강제는 코드 자동화의 안전장치입니다. 한 번 system을 잘 써 두면 호출 코드는 단순해지고 적중률이 높아집니다.
  explanation: system에 "응답은 valid JSON 한 줄만, 코드 블록 마크다운 금지, 추가 설명 금지"라고 명시합니다. 키 목록은 마지막 줄에 명시해 모델이 마지막
    지시를 강하게 받아들이도록 합니다. 적중률이 매우 높아지지만 100%는 아니므로 다음 단계의 prefill과 검증이 필요합니다.
  tips:
  - system은 입력 토큰 비용을 늘립니다. 7번 강의의 캐싱이 이 비용을 줄여줍니다.
  snippet: |-
    import json
    import anthropic

    strictSystem = (
        "너는 데이터 추출 도구야. "
        "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운(```json) 또는 추가 설명을 절대 넣지 마. "
        "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
    )

    client = anthropic.Anthropic()
    strictResult = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        system=strictSystem,
        messages=[{"role": "user", "content": "주문 정보 한 건을 만들어 줘."}],
    )
    strictText = "".join(block.text for block in strictResult.content if block.type == "text")
    try:
        strictParsed = json.loads(strictText)
        strictStatus = "ok"
    except json.JSONDecodeError as exc:
        strictParsed = None
        strictStatus = f"fail: {exc.msg}"
    (strictStatus, strictText[:120])
  exercise:
    prompt: strictSystem에 "amount는 1000 이상의 정수" 같은 제약을 추가하고 응답이 그 제약을 따르는지 확인하세요.
    starterCode: |-
      import json
      import anthropic

      strictSystem = (
          "너는 데이터 추출 도구야. "
          "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운(```json) 또는 추가 설명을 절대 넣지 마. "
          "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
      )

      client = anthropic.Anthropic()
      strictResult = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          system=strictSystem,
          messages=[{"role": "user", "content": "주문 정보 한 건을 만들어 줘."}],
      )
      strictText = "".join(block.text for block in strictResult.content if block.type == "text")
      try:
          strictParsed = json.loads(strictText)
          strictStatus = "ok"
      except json.JSONDecodeError as exc:
          strictParsed = None
          strictStatus = f"fail: {exc.msg}"
      (strictStatus, strictText[:120])
    hints:
    - 새 system은 변수명을 strictSystemPlus 같은 다른 이름으로 만들어 비교하면 좋습니다.
    - 제약을 명시할수록 모델 적중률이 높아지지만 토큰도 살짝 늘어납니다.
  check:
    noError: 호출과 파싱 시도가 정상 실행되어야 합니다.
    resultCheck: strictStatus가 "ok"일 가능성이 높고 strictText가 JSON 모양 문자열이어야 합니다.
- id: assistant_prefill
  title: 3단계. assistant prefill로 응답 시작 고정
  structuredPrimary: true
  subtitle: messages 마지막에 빈 assistant 넣기
  goal: messages 마지막에 assistant 메시지를 빈 "{"로 시작해 응답이 그 자리부터 이어지도록 강제한다.
  why: prefill은 가장 강력한 형식 강제 도구입니다. 모델이 그 시작 토큰부터 이어 쓰기 때문에 JSON 모양이 거의 깨지지 않습니다.
  explanation: Messages API는 마지막 메시지의 역할이 user이든 assistant이든 모두 받습니다. 마지막을 assistant로 주고 content를 "{"로 채우면
    모델은 그 자리부터 이어 씁니다. 응답은 "{"가 빠진 상태로 오므로 호출 측에서 "{"를 다시 붙여 json.loads에 넘깁니다.
  tips:
  - prefill 응답은 "{ ... }" 시작이 빠진 형태로 옵니다. raw 응답에 "{"를 다시 prepend하는 게 핵심입니다.
  snippet: |-
    import json
    import anthropic

    strictSystem = (
        "너는 데이터 추출 도구야. "
        "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운 또는 추가 설명을 절대 넣지 마. "
        "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
    )

    client = anthropic.Anthropic()
    prefillResult = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        system=strictSystem,
        messages=[
            {"role": "user", "content": "주문 정보 한 건을 만들어 줘."},
            {"role": "assistant", "content": "{"},
        ],
    )
    prefillRaw = "".join(block.text for block in prefillResult.content if block.type == "text")
    prefillJsonText = "{" + prefillRaw
    prefillParsed = json.loads(prefillJsonText)
    prefillParsed
  exercise:
    prompt: prefill을 "{\"orderId\":" 형태로 키 하나까지 미리 채워 응답이 그 자리부터 시작되는지 확인하세요.
    starterCode: |-
      import json
      import anthropic

      strictSystem = (
          "너는 데이터 추출 도구야. "
          "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운 또는 추가 설명을 절대 넣지 마. "
          "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
      )

      client = anthropic.Anthropic()
      prefillResult = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          system=strictSystem,
          messages=[
              {"role": "user", "content": "주문 정보 한 건을 만들어 줘."},
              {"role": "assistant", "content": "{"},
          ],
      )
      prefillRaw = "".join(block.text for block in prefillResult.content if block.type == "text")
      prefillJsonText = "{" + prefillRaw
      prefillParsed = json.loads(prefillJsonText)
      prefillParsed
    hints:
    - assistant content를 "{\"orderId\": \""로 두면 모델이 그 자리부터 이어 씁니다.
    - 응답에 prefill 텍스트를 다시 붙여 완전한 JSON 문자열을 만듭니다.
  check:
    noError: prefill 호출과 json.loads가 정상 실행되어야 합니다.
    resultCheck: prefillParsed가 dict이고 orderId, customer, amount 키를 포함해야 합니다.
- id: parse_retry
  title: 4단계. 검증과 한 번 재시도
  structuredPrimary: true
  subtitle: 파싱 실패 시 재호출
  goal: extractJson 함수로 파싱 실패 시 한 번 재호출하는 안전한 흐름을 만든다.
  why: 모델 적중률이 99%여도 자동화에서는 1%가 시스템을 멈춥니다. 재시도 한 번이 안정성을 크게 올립니다.
  explanation: 첫 호출이 json.loads에 실패하면 같은 system/prompt로 한 번 더 호출합니다. 두 번째도 실패하면 raw 응답을 함께 ValueError로
    던져 호출자가 알 수 있게 합니다. 재시도는 최대 한 번으로 제한해 무한 반복을 막습니다.
  tips:
  - 재시도 전에 system에 "직전 응답이 JSON 파싱에 실패했다"는 힌트를 추가하면 재시도 성공률이 올라갑니다.
  snippet: |-
    import json
    import anthropic

    strictSystem = (
        "너는 데이터 추출 도구야. "
        "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운 또는 추가 설명을 절대 넣지 마. "
        "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
    )

    def extractJson(client, userText: str) -> dict:
        for attempt in range(2):
            result = client.messages.create(
                model="claude-haiku-4-5",
                max_tokens=200,
                system=strictSystem,
                messages=[
                    {"role": "user", "content": userText},
                    {"role": "assistant", "content": "{"},
                ],
            )
            raw = "".join(block.text for block in result.content if block.type == "text")
            try:
                return json.loads("{" + raw)
            except json.JSONDecodeError:
                if attempt == 1:
                    raise ValueError(f"failed twice to parse JSON: {raw[:120]}")
        return {}

    client = anthropic.Anthropic()
    extracted = extractJson(client, "성공한 결제 한 건을 만들어 줘.")
    assert isinstance(extracted, dict)
    assert "orderId" in extracted
    extracted
  exercise:
    prompt: extractJson에 maxRetries 인자를 추가해 호출자가 재시도 횟수를 정할 수 있게 만드세요. 기본값은 1입니다.
    starterCode: |-
      import json
      import anthropic

      strictSystem = (
          "너는 데이터 추출 도구야. "
          "응답은 valid JSON 객체 한 개만 출력하고, 코드 블록 마크다운 또는 추가 설명을 절대 넣지 마. "
          "JSON의 키는 정확히 orderId, customer, amount 세 개만 사용해."
      )

      def extractJson(client, userText: str) -> dict:
          for attempt in range(2):
              result = client.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=200,
                  system=strictSystem,
                  messages=[
                      {"role": "user", "content": userText},
                      {"role": "assistant", "content": "{"},
                  ],
              )
              raw = "".join(block.text for block in result.content if block.type == "text")
              try:
                  return json.loads("{" + raw)
              except json.JSONDecodeError:
                  if attempt == 1:
                      raise ValueError(f"failed twice to parse JSON: {raw[:120]}")
          return {}

      client = anthropic.Anthropic()
      extracted = extractJson(client, "성공한 결제 한 건을 만들어 줘.")
      assert isinstance(extracted, dict)
      assert "orderId" in extracted
      extracted
    hints:
    - 함수 시그니처에 maxRetries=1을 추가하고 for 루프 한계를 maxRetries+1로 둡니다.
    - 마지막 시도에서만 ValueError를 던지도록 조건을 정합니다.
  check:
    noError: 함수 정의와 호출이 정상 실행되어야 합니다.
    resultCheck: extracted가 dict이고 필수 키 orderId를 포함해야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 사용자 설명 → 구조화 주문 변환'
  structuredPrimary: true
  subtitle: 자연어를 안전한 JSON으로
  goal: 민준이가 12만원짜리 책을 결제했다는 자연어 한 줄을 JSON 주문 한 건으로 변환하는 함수를 만든다.
  why: 자연어 → 구조화 데이터 변환은 LLM 자동화의 핵심 패턴입니다. 작은 함수 한 개로 완성해 두면 어디든 붙입니다.
  explanation: 입력은 자연어 한 줄, 출력은 orderId/customer/amount 세 키를 가진 사전입니다. system 강제 + prefill + 재시도로 함수를 만들고
    assert로 결과 모양을 고정합니다.
  tips:
  - amount가 문자열로 올 수 있으니 int 변환을 마지막에 합니다.
  snippet: |-
    import json
    import anthropic

    def parseOrderText(rawSentence: str) -> dict:
        agent = anthropic.Anthropic()
        system = (
            "너는 자연어를 JSON 주문으로 바꾸는 추출기야. "
            "응답은 정확히 키 orderId, customer, amount를 가진 JSON 한 개만. "
            "amount는 숫자만 적어. 코드 블록이나 추가 설명 금지."
        )
        for attempt in range(2):
            result = agent.messages.create(
                model="claude-haiku-4-5",
                max_tokens=200,
                system=system,
                messages=[
                    {"role": "user", "content": rawSentence},
                    {"role": "assistant", "content": "{"},
                ],
            )
            rawText = "".join(block.text for block in result.content if block.type == "text")
            try:
                parsed = json.loads("{" + rawText)
                parsed["amount"] = int(parsed["amount"])
                return parsed
            except (json.JSONDecodeError, KeyError, ValueError, TypeError):
                if attempt == 1:
                    raise ValueError(f"parseOrderText failed: {rawText[:120]}")
        return {}

    order = parseOrderText("민준이가 12만원짜리 책 결제했어. 주문번호는 A-100이야.")
    assert order["amount"] >= 100000
    assert "민준" in order["customer"]
    order
  exercise:
    prompt: parseOrderText의 system에 currency 키를 추가해 통화 단위를 포함시키고 amount 통화를 함께 검증하세요.
    starterCode: |-
      import json
      import anthropic

      def parseOrderText(rawSentence: str) -> dict:
          agent = anthropic.Anthropic()
          system = (
              "너는 자연어를 JSON 주문으로 바꾸는 추출기야. "
              "응답은 정확히 키 orderId, customer, amount를 가진 JSON 한 개만. "
              "amount는 숫자만 적어. 코드 블록이나 추가 설명 금지."
          )
          for attempt in range(2):
              result = agent.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=200,
                  system=system,
                  messages=[
                      {"role": "user", "content": rawSentence},
                      {"role": "assistant", "content": "{"},
                  ],
              )
              rawText = "".join(block.text for block in result.content if block.type == "text")
              try:
                  parsed = json.loads("{" + rawText)
                  parsed["amount"] = int(parsed["amount"])
                  return parsed
              except (json.JSONDecodeError, KeyError, ValueError, TypeError):
                  if attempt == 1:
                      raise ValueError(f"parseOrderText failed: {rawText[:120]}")
          return {}

      order = parseOrderText("민준이가 12만원짜리 책 결제했어. 주문번호는 A-100이야.")
      assert order["amount"] >= 100000
      assert "민준" in order["customer"]
      order
    hints:
    - system 문장에 currency 키를 정확히 KRW로 적어 달라고 추가합니다.
    - 검증 assertion에 order["currency"] == "KRW" 같은 항목을 추가합니다.
  check:
    noError: 함수 정의와 호출, assertion이 모두 정상 실행되어야 합니다.
    resultCheck: order가 amount, customer 정보를 정확히 추출해야 합니다.
