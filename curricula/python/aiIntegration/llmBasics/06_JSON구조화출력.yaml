    tips:
    - json.JSONDecodeError는 그대로 두지 말고 ValueError로 감싸면 호출부의 에러 처리가 단순해집니다.
    - 필수 키 누락과 타입 오류는 같은 실패 흐름으로 처리해도 충분합니다.
    exercise:
      prompt: parse_order_json(text)를 완성해 검증된 주문 사전을 반환하세요.
      starterCode: |-
