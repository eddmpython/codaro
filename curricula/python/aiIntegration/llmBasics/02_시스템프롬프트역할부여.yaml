meta:
  packages:
  - anthropic
  id: llmBasics_02
  title: 시스템프롬프트역할부여
  order: 2
  category: llmBasics
  difficulty: ⭐
  badge: 입문
  tags:
  - anthropic
  - system_prompt
  - 역할
  - 어조
  seo:
    title: Claude 시스템 프롬프트 - 역할과 어조 제어
    description: Messages API의 system 인자로 Claude에게 역할·어조·응답 형식을 지시하는 패턴을 익힙니다.
    keywords:
    - system prompt
    - Claude 역할
    - 어조 제어
    - persona
intro:
  emoji: 🎭
  goal: system 인자로 Claude의 역할과 어조를 지정해 응답을 통제한다.
  description: 같은 질문이라도 system 프롬프트가 어떻게 응답의 톤과 형식을 바꾸는지 코드로 확인합니다.
  direction: 빈 system → 짧은 system → 형식 강제 system 순으로 변주해 응답이 어떻게 변하는지 시각화하고, 자동화에서 재사용할 수 있는 system 빌더 함수를 만든다.
  benefits:
  - system 인자가 첫 메시지가 아니라 별도 슬롯이라는 점을 분명히 한다.
  - 어조·역할·형식 지시를 하나씩 누적하며 변화를 본다.
  - 응답 형식을 강제하는 system 작성 감각을 만든다.
  - 자동화에서 재사용하는 system 빌더 함수 패턴을 익힌다.
  diagram:
    steps:
    - label: 1단계. 기본 호출 baseline
      detail: system 없이 호출해 응답의 자연스러운 모양을 본다.
    - label: 2단계. 어조 지시 system
      detail: 한 문장 system으로 응답 톤을 통제한다.
    - label: 3단계. 형식 강제 system
      detail: 출력 형식(불릿, 문장 수)을 명시해 응답 구조를 잡는다.
    - label: 4단계. system 빌더 함수화
      detail: 역할·어조·형식 슬롯을 받는 함수로 system을 합성한다.
    runtime:
    - label: LLM 호출 환경
      detail: anthropic 패키지와 ANTHROPIC_API_KEY가 준비된 로컬 Python에서 실행한다.
    - label: 시스템프롬프트역할부여 실행
      detail: system을 단계적으로 추가하며 응답이 어떻게 달라지는지 본다.
    - label: 시스템프롬프트역할부여 완료
      detail: 다음 강의의 멀티턴 대화에서 system을 일관되게 유지하는 패턴으로 이어진다.
sections:
- id: baseline
  title: 1단계. system 없이 호출
  structuredPrimary: true
  subtitle: 기본 응답을 본다
  goal: system 인자 없이 messages만 보내 baseline 응답을 받는다.
  why: system을 바꿔가며 비교하려면 기준선이 필요합니다. 첫 응답이 자연스러운 자유 응답이라는 점을 먼저 확인합니다.
  explanation: messages.create에 system을 넘기지 않으면 Claude는 모델 기본 어조로 응답합니다. 이 baseline 응답이 이후 system 추가의 비교 대상이
    됩니다. 같은 user 메시지에 다른 system을 주면 응답 모양이 어떻게 달라지는지 확인하는 흐름이 핵심입니다.
  tips:
  - 한 강의에서 같은 user 질문을 여러 번 보낼 때 다양한 변수명을 써야 합니다. 셀 간 변수 재할당이 금지되기 때문입니다.
  snippet: |-
    import anthropic

    client = anthropic.Anthropic()
    baseResponse = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        messages=[{"role": "user", "content": "재귀 함수가 무엇인지 알려줘."}],
    )
    baseAnswer = "".join(block.text for block in baseResponse.content if block.type == "text")
    baseAnswer
  exercise:
    prompt: 같은 질문을 두 번 호출해 baseAnswer가 미세하게 다른지 확인하세요. 결과 객체 변수명은 다른 이름을 사용해야 합니다.
    starterCode: |-
      import anthropic

      client = anthropic.Anthropic()
      baseResponse = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          messages=[{"role": "user", "content": "재귀 함수가 무엇인지 알려줘."}],
      )
      baseAnswer = "".join(block.text for block in baseResponse.content if block.type == "text")
      baseAnswer
    hints:
    - 두 번째 호출은 secondResponse 같은 이름으로 새 변수를 만듭니다.
    - 모델 응답은 결정론적이지 않아 표현이 달라질 수 있습니다.
  check:
    noError: 호출과 텍스트 추출이 예외 없이 끝까지 완료되어야 합니다.
    resultCheck: baseAnswer가 비어있지 않은 문자열이어야 합니다.
- id: tone_system
  title: 2단계. 어조 지시 system
  structuredPrimary: true
  subtitle: system 한 문장으로 톤 잡기
  goal: system 인자에 짧은 톤 지시를 넣어 응답 어조가 달라지는지 본다.
  why: 어조는 자동화의 사용자 경험을 좌우합니다. system 한 문장만 잘 써도 친근체/존댓말/전문가체로 통제할 수 있습니다.
  explanation: system 인자는 문자열 한 줄을 받습니다. 짧은 지시 한 줄이 응답 톤을 바꾸는 데 의외로 효과적입니다. 예를 들어 "친근한 말투로 짧게 답해줘"라는 system은
    응답을 부드럽고 간결하게 만듭니다. 같은 user 질문 + 다른 system 조합으로 비교 실험을 합니다.
  tips:
  - system은 매 호출마다 다시 보낼 수 있습니다. 호출 사이에 상태로 저장되지 않으므로 명시적으로 전달해야 합니다.
  snippet: |-
    import anthropic

    client = anthropic.Anthropic()
    toneResponse = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        system="너는 코딩을 막 시작한 사람에게 친근하게 설명하는 선배 개발자야. 비유를 적극 활용해서 짧게 답해.",
        messages=[{"role": "user", "content": "재귀 함수가 무엇인지 알려줘."}],
    )
    toneAnswer = "".join(block.text for block in toneResponse.content if block.type == "text")
    toneAnswer
  exercise:
    prompt: system 문장을 "엄격한 시니어 개발자처럼 격식 있는 한국어로 답해" 등으로 바꿔 응답의 톤이 어떻게 변하는지 비교하세요.
    starterCode: |-
      import anthropic

      client = anthropic.Anthropic()
      toneResponse = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          system="너는 코딩을 막 시작한 사람에게 친근하게 설명하는 선배 개발자야. 비유를 적극 활용해서 짧게 답해.",
          messages=[{"role": "user", "content": "재귀 함수가 무엇인지 알려줘."}],
      )
      toneAnswer = "".join(block.text for block in toneResponse.content if block.type == "text")
      toneAnswer
    hints:
    - system 문장이 길어지면 어조뿐 아니라 형식까지 통제됩니다.
    - 한 문장에 "어조 + 길이 제한"을 함께 넣으면 응답 모양이 안정됩니다.
  check:
    noError: system 인자가 포함된 호출이 정상 실행되어야 합니다.
    resultCheck: toneAnswer가 baseAnswer보다 어조나 길이에서 명확히 다른 모양이어야 합니다.
- id: format_system
  title: 3단계. 형식 강제 system
  structuredPrimary: true
  subtitle: 출력 모양까지 잡기
  goal: system에 출력 형식(불릿 개수, 문장 길이)을 강제해 응답 구조를 통제한다.
  why: 자동화는 일정한 형식의 응답이 필요합니다. 후처리 코드가 의존하는 출력 모양을 system이 만들어 주면 파서가 단순해집니다.
  explanation: system에 "정확히 3개의 불릿으로", "한 줄 30자 이내" 같은 명령을 넣으면 응답이 그 형식을 따릅니다. 100% 보장은 아니지만 적중률이 매우 높아지고,
    뒤에 검증 코드를 짧게 붙이면 안전합니다. 6번 강의의 JSON 구조화 출력은 이 형식 강제의 극단형입니다.
  tips:
  - 형식 명령은 system의 끝에 두면 모델이 마지막 지시를 더 잘 따르는 경향이 있습니다.
  snippet: |-
    import anthropic

    client = anthropic.Anthropic()
    formatResponse = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        system="너는 학습 자료 작가야. 답은 정확히 3개의 불릿(- )으로만 작성하고, 각 불릿은 60자 이내로 끊어.",
        messages=[{"role": "user", "content": "재귀 함수를 처음 배우는 사람에게 알려줘."}],
    )
    formatAnswer = "".join(block.text for block in formatResponse.content if block.type == "text")
    bulletCount = formatAnswer.count("\n-") + (1 if formatAnswer.lstrip().startswith("-") else 0)
    (formatAnswer, bulletCount)
  exercise:
    prompt: 불릿 개수를 5개로 바꿔 형식 명령을 수정하고 bulletCount가 거의 그대로 따라오는지 확인하세요.
    starterCode: |-
      import anthropic

      client = anthropic.Anthropic()
      formatResponse = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          system="너는 학습 자료 작가야. 답은 정확히 3개의 불릿(- )으로만 작성하고, 각 불릿은 60자 이내로 끊어.",
          messages=[{"role": "user", "content": "재귀 함수를 처음 배우는 사람에게 알려줘."}],
      )
      formatAnswer = "".join(block.text for block in formatResponse.content if block.type == "text")
      bulletCount = formatAnswer.count("\n-") + (1 if formatAnswer.lstrip().startswith("-") else 0)
      (formatAnswer, bulletCount)
    hints:
    - 모델이 형식 명령을 따르지 않으면 system 문장을 명확히 끝에 두는지 확인합니다.
    - bulletCount가 정확히 일치하지 않을 수 있으니 ±1 정도의 여유로 검증합니다.
  check:
    noError: 호출과 카운팅이 예외 없이 끝까지 완료되어야 합니다.
    resultCheck: bulletCount가 양의 정수이고 formatAnswer가 불릿 문자열을 포함해야 합니다.
- id: system_builder
  title: 4단계. system 빌더 함수
  structuredPrimary: true
  subtitle: 역할 + 어조 + 형식을 합성
  goal: 역할·어조·형식 세 슬롯을 인자로 받아 system 문자열을 합성하는 함수를 만든다.
  why: 자동화에서 system은 자주 재구성됩니다. 인자만 바꿔 다른 페르소나를 만들 수 있는 빌더가 있으면 실험이 빨라집니다.
  explanation: 입력은 역할(role), 어조(tone), 형식(format) 세 문자열입니다. 출력은 세 부분을 줄바꿈으로 이어붙인 system 문자열입니다. 이 함수를
    호출 자리에서 사용하면 system 변경이 한 줄 변경으로 끝납니다.
  tips:
  - 빌더에서 공백/None 슬롯을 정리해 두면 어떤 슬롯이 비어도 깨끗한 system이 나옵니다.
  snippet: |-
    import anthropic

    def buildSystem(role: str, tone: str, formatRule: str) -> str:
        parts = [section.strip() for section in (role, tone, formatRule) if section and section.strip()]
        return "\n".join(parts)

    client = anthropic.Anthropic()
    composed = buildSystem(
        role="너는 Python 학습 멘토야.",
        tone="따뜻한 어조로 격려하면서 설명해.",
        formatRule="답은 항상 '1) ...\n2) ...\n3) ...' 형태의 번호 매김 3줄로만 작성해.",
    )
    builderResponse = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=200,
        system=composed,
        messages=[{"role": "user", "content": "재귀 함수를 어떻게 연습해야 잘하게 될까?"}],
    )
    builderAnswer = "".join(block.text for block in builderResponse.content if block.type == "text")
    (composed, builderAnswer)
  exercise:
    prompt: buildSystem에 emoji 슬롯을 하나 더 추가해 system 끝에 붙이고, 응답에 이모지가 따라오는지 확인하세요.
    starterCode: |-
      import anthropic

      def buildSystem(role: str, tone: str, formatRule: str) -> str:
          parts = [section.strip() for section in (role, tone, formatRule) if section and section.strip()]
          return "\n".join(parts)

      client = anthropic.Anthropic()
      composed = buildSystem(
          role="너는 Python 학습 멘토야.",
          tone="따뜻한 어조로 격려하면서 설명해.",
          formatRule="답은 항상 '1) ...\n2) ...\n3) ...' 형태의 번호 매김 3줄로만 작성해.",
      )
      builderResponse = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=200,
          system=composed,
          messages=[{"role": "user", "content": "재귀 함수를 어떻게 연습해야 잘하게 될까?"}],
      )
      builderAnswer = "".join(block.text for block in builderResponse.content if block.type == "text")
      (composed, builderAnswer)
    hints:
    - parts 리스트 마지막에 emoji 같은 추가 슬롯을 합치는 인자를 추가합니다.
    - 빈 슬롯은 if section and section.strip() 조건으로 자동 제외됩니다.
  check:
    noError: 함수 정의와 호출이 모두 예외 없이 끝까지 완료되어야 합니다.
    resultCheck: composed가 줄바꿈으로 합쳐진 문자열이고 builderAnswer가 비어 있지 않아야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 동일 질문 다중 페르소나 비교'
  structuredPrimary: true
  subtitle: 예측 → 호출 → 응답 차이 검증
  goal: 한 질문에 대해 세 가지 system 페르소나를 돌려 응답 길이/톤의 차이가 코드로 측정되는지 확인한다.
  why: 페르소나 비교는 자동화 도구의 응답 톤을 정하기 위한 표준 실험 절차입니다. 코드로 차이를 측정하면 어떤 페르소나가 어떤 길이/톤을 만드는지 데이터로 본다.
  explanation: 세 가지 system(짧은 멘토, 깊이 설명하는 강사, 한 줄 요약 마스터)을 같은 질문에 적용합니다. 각 응답의 길이를 비교하고 첫 글자만 추출해 톤 차이를 본다.
    자동화에서는 이런 작은 실험을 반복해 본인 워크플로에 맞는 페르소나를 고릅니다.
  tips:
  - max_tokens는 일정하게 유지해야 길이 차이가 모델의 자율 길이 조절 때문이 됩니다.
  snippet: |-
    import anthropic

    client = anthropic.Anthropic()
    personas = {
        "shortMentor": "너는 코드를 짧게 설명하는 멘토야. 한 문단 이내로 답해.",
        "deepLecturer": "너는 깊이 있게 가르치는 강사야. 단계별로 자세히 설명해.",
        "oneLineMaster": "너는 모든 답을 정확히 한 문장으로만 끝내는 사람이야.",
    }

    question = "데코레이터가 무엇인지 알려줘."
    responses = {}
    for name, systemText in personas.items():
        result = client.messages.create(
            model="claude-haiku-4-5",
            max_tokens=200,
            system=systemText,
            messages=[{"role": "user", "content": question}],
        )
        responses[name] = "".join(block.text for block in result.content if block.type == "text")

    lengths = {name: len(text) for name, text in responses.items()}
    assert all(value > 0 for value in lengths.values())
    assert lengths["oneLineMaster"] <= max(lengths["deepLecturer"], lengths["shortMentor"])
    lengths
  exercise:
    prompt: personas 사전에 본인이 디자인한 새 페르소나를 하나 추가하고 lengths에 그 항목이 따라오는지 확인하세요.
    starterCode: |-
      import anthropic

      client = anthropic.Anthropic()
      personas = {
          "shortMentor": "너는 코드를 짧게 설명하는 멘토야. 한 문단 이내로 답해.",
          "deepLecturer": "너는 깊이 있게 가르치는 강사야. 단계별로 자세히 설명해.",
          "oneLineMaster": "너는 모든 답을 정확히 한 문장으로만 끝내는 사람이야.",
      }

      question = "데코레이터가 무엇인지 알려줘."
      responses = {}
      for name, systemText in personas.items():
          result = client.messages.create(
              model="claude-haiku-4-5",
              max_tokens=200,
              system=systemText,
              messages=[{"role": "user", "content": question}],
          )
          responses[name] = "".join(block.text for block in result.content if block.type == "text")

      lengths = {name: len(text) for name, text in responses.items()}
      assert all(value > 0 for value in lengths.values())
      assert lengths["oneLineMaster"] <= max(lengths["deepLecturer"], lengths["shortMentor"])
      lengths
    hints:
    - personas 사전에 새 키와 system 문자열을 추가합니다.
    - 추가 페르소나의 length가 0보다 크면 호출이 잘 된 것입니다.
  check:
    noError: 모든 페르소나 호출이 정상 실행되어야 합니다.
    resultCheck: lengths의 모든 값이 양의 정수여야 합니다.
