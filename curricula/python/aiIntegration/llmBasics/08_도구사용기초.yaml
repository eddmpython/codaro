meta:
  packages:
  - anthropic
  id: llmBasics_08
  title: 도구사용기초
  order: 8
  category: llmBasics
  difficulty: ⭐⭐⭐
  badge: 중급
  tags:
  - anthropic
  - tool_use
  - function_calling
  - 자동화
  seo:
    title: Claude 도구 사용 기초 - tool_use와 tool_result 루프
    description: tools 인자로 함수 시그니처를 정의하고 tool_use→tool_result 루프로 Claude가 코드 함수를 호출하도록 만듭니다.
    keywords:
    - Claude tool use
    - function calling
    - tool_use
