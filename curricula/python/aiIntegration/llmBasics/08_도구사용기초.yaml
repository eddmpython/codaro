    starterCode: |-
      import anthropic

      weatherTool = {
          "name": "get_weather",
          "description": "특정 도시의 현재 날씨를 조회한다.",
          "input_schema": {
              "type": "object",
              "properties": {"city": {"type": "string"}},
              "required": ["city"],
          },
      }

      def fakeWeather(city: str) -> str:
          catalog = {"서울": "맑음 12도", "부산": "흐림 15도"}
          return catalog.get(city, "데이터 없음")

      def runToolLoopWithTrace(client, prompt: str, maxRounds: int = 5) -> dict:
          history = [{"role": "user", "content": prompt}]
          callTrace: list[str] = []
          for _ in range(maxRounds):
              result = client.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=400,
                  tools=[weatherTool],
                  messages=history,
              )
              if result.stop_reason != "tool_use":
                  text = "".join(block.text for block in result.content if block.type == "text")
                  return {"text": text, "calls": callTrace}
              history.append({"role": "assistant", "content": result.content})
              blockResults = []
              for block in result.content:
                  if block.type != "tool_use":
                      continue
                  callTrace.append(block.input.get("city", ""))
                  outcome = fakeWeather(block.input["city"]) if block.name == "get_weather" else "도구 없음"
                  blockResults.append({
                      "type": "tool_result",
                      "tool_use_id": block.id,
                      "content": outcome,
                  })
              history.append({"role": "user", "content": blockResults})
          return {"text": "max rounds reached", "calls": callTrace}

      client = anthropic.Anthropic()
      outcome = runToolLoopWithTrace(client, "서울과 부산 날씨를 한 문장으로 비교해 줘.")
      assert len(outcome["calls"]) >= 2
      assert "서울" in outcome["text"]
      assert "부산" in outcome["text"]
      outcome
