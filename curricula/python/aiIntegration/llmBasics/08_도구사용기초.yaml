intro:
  emoji: 🛠️
  goal: tools 인자와 tool_use→tool_result 루프로 Claude가 코드 함수를 호출하게 한다.
  description: 도구 사용은 LLM 자동화의 핵심입니다. 한 개의 도구를 등록하고 응답에서 도구 호출을 받아 실행하고 결과를 다시 모델에 넘기는 표준 루프를 만듭니다.
  direction: 도구 스키마 정의 → 첫 tool_use 받기 → tool_result 회신 → 루프 함수화 순으로 발전시킨다.
  benefits:
  - tools 인자의 스키마(name, description, input_schema) 형태를 분명히 익힌다.
  - 응답의 stop_reason="tool_use"가 무엇을 의미하는지 분명히 한다.
  - tool_result 메시지의 정확한 형식을 익힌다.
  - runToolLoop 함수로 자동화 코드에서 재사용 가능한 루프를 만든다.
  diagram:
    steps:
    - label: 1단계. 도구 스키마 정의
      detail: get_weather 도구를 JSON 스키마로 만든다.
    - label: 2단계. tool_use 받기
      detail: stop_reason="tool_use"와 ToolUseBlock 구조를 확인한다.
    - label: 3단계. tool_result 회신
      detail: 도구 실행 결과를 messages에 추가해 두 번째 호출을 보낸다.
    - label: 4단계. runToolLoop 함수화
      detail: 모든 tool_use를 자동으로 처리하는 루프를 만든다.
    runtime:
    - label: LLM 호출 환경
      detail: anthropic 패키지와 ANTHROPIC_API_KEY가 준비된 로컬 Python에서 실행한다.
    - label: 도구사용기초 실행
      detail: 한 도구만 등록해 루프 한 라운드를 끝까지 본다.
    - label: 도구사용기초 완료
      detail: 다음 강의의 멀티 도구 라우팅과 종합 자동화의 기반이 된다.
sections:
- id: define_tool
  title: 1단계. 도구 스키마 정의
  structuredPrimary: true
  subtitle: name, description, input_schema
  goal: get_weather 도구를 JSON 스키마로 정의하고 tools 리스트에 담는다.
  why: 도구 스키마는 Claude가 도구를 언제·어떻게 호출할지 결정하는 정보입니다. 정확한 스키마가 도구 사용의 첫 단계입니다.
  explanation: tools 인자는 도구 사전의 리스트입니다. 각 도구는 name(고유 식별자), description(언제 사용하는지), input_schema(JSON Schema
    형식의 인자) 세 필드를 갖습니다. description은 도구 호출 결정을 좌우하므로 한 문장으로 명확하게 씁니다.
  tips:
  - 도구 이름은 lowerCamel이 아닌 snake_case가 컨벤션입니다. Anthropic 문서 예제와 일치시킵니다.
  snippet: |-
    weatherTool = {
        "name": "get_weather",
        "description": "특정 도시의 현재 날씨를 조회한다. 도시 이름을 받아 섭씨 기온과 날씨 상태를 돌려준다.",
        "input_schema": {
            "type": "object",
            "properties": {
                "city": {
                    "type": "string",
                    "description": "조회할 도시의 한국어 또는 영어 이름.",
                },
            },
            "required": ["city"],
        },
    }
    tools = [weatherTool]
    tools[0]["name"]
  exercise:
    prompt: weatherTool의 input_schema에 unit 인자(섭씨/화씨)를 추가해 보세요.
    starterCode: |-
      weatherTool = {
          "name": "get_weather",
          "description": "특정 도시의 현재 날씨를 조회한다. 도시 이름을 받아 섭씨 기온과 날씨 상태를 돌려준다.",
          "input_schema": {
              "type": "object",
              "properties": {
                  "city": {
                      "type": "string",
                      "description": "조회할 도시의 한국어 또는 영어 이름.",
                  },
              },
              "required": ["city"],
          },
      }
      tools = [weatherTool]
      tools[0]["name"]
    hints:
    - properties에 "unit" 키를 추가하고 type은 "string", enum은 ["celsius","fahrenheit"]로 둡니다.
    - required에 unit을 넣을지는 선택입니다. 선택이면 기본값을 코드에서 처리합니다.
  check:
    noError: 사전 정의가 정상 평가되어야 합니다.
    resultCheck: tools가 길이 1의 리스트이고 첫 항목이 get_weather여야 합니다.
- id: tool_use_response
  title: 2단계. tool_use 응답 받기
  structuredPrimary: true
  subtitle: stop_reason과 ToolUseBlock
  goal: tools 인자를 포함해 호출하고 stop_reason="tool_use"와 ToolUseBlock 구조를 확인한다.
  why: 모델이 도구를 호출하기로 결정하면 응답이 일반 텍스트가 아닌 ToolUseBlock으로 옵니다. 이 모양을 알아야 다음 단계에서 결과를 회신할 수 있습니다.
  explanation: messages.create에 tools를 넘기면 모델이 tool_use를 결정할 수 있습니다. 응답의 stop_reason이 "tool_use"가 되고 content
    리스트에 ToolUseBlock(type="tool_use")이 포함됩니다. ToolUseBlock의 name, id, input이 도구 호출 정보입니다.
  tips:
  - 도구 호출이 일어나지 않으면 stop_reason은 평소처럼 "end_turn"입니다. 두 갈래 모두 처리해야 합니다.
  snippet: |-
    import anthropic

    weatherTool = {
        "name": "get_weather",
        "description": "특정 도시의 현재 날씨를 조회한다.",
        "input_schema": {
            "type": "object",
            "properties": {"city": {"type": "string"}},
            "required": ["city"],
        },
    }

    client = anthropic.Anthropic()
    initial = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=300,
        tools=[weatherTool],
        messages=[{"role": "user", "content": "서울 날씨 알려줘."}],
    )

    toolBlocks = [block for block in initial.content if block.type == "tool_use"]
    (initial.stop_reason, [(tb.name, tb.input) for tb in toolBlocks])
  exercise:
    prompt: 사용자 메시지를 "오늘 날씨와 상관없이 한 문장으로 인사해 줘"로 바꿔 stop_reason이 "end_turn"이 되는지 확인하세요.
    starterCode: |-
      import anthropic

      weatherTool = {
          "name": "get_weather",
          "description": "특정 도시의 현재 날씨를 조회한다.",
          "input_schema": {
              "type": "object",
              "properties": {"city": {"type": "string"}},
              "required": ["city"],
          },
      }

      client = anthropic.Anthropic()
      initial = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=300,
          tools=[weatherTool],
          messages=[{"role": "user", "content": "서울 날씨 알려줘."}],
      )

      toolBlocks = [block for block in initial.content if block.type == "tool_use"]
      (initial.stop_reason, [(tb.name, tb.input) for tb in toolBlocks])
    hints:
    - 인사 요청에는 모델이 도구 호출이 필요 없다고 판단합니다.
    - stop_reason이 "end_turn"이면 toolBlocks 리스트는 비어 있습니다.
  check:
    noError: tools 포함 호출이 정상 실행되어야 합니다.
    resultCheck: stop_reason이 "tool_use" 또는 "end_turn" 둘 중 하나여야 합니다.
- id: tool_result_back
  title: 3단계. tool_result로 결과 회신
  structuredPrimary: true
  subtitle: 두 번째 호출에 도구 결과 넣기
  goal: 도구를 실제 실행한 결과를 tool_result 메시지로 만들어 두 번째 호출을 보낸다.
  why: tool_use는 도구 실행을 요청한 상태입니다. 결과를 다시 보내야 모델이 사용자에게 자연어 응답을 마무리합니다.
  explanation: 두 번째 호출의 messages에는 (1) 원래 user (2) assistant content(첫 응답 그대로) (3) user role의 tool_result 블록이
    들어갑니다. tool_result는 tool_use_id로 어떤 호출에 대한 결과인지 지정하고 content에 결과 문자열을 담습니다. 모델은 결과를 보고 자연어 응답을 만듭니다.
  tips:
  - assistant content는 첫 응답의 content 리스트를 그대로 넣어야 합니다. 새로 만들지 마세요.
  snippet: |-
    import anthropic

    weatherTool = {
        "name": "get_weather",
        "description": "특정 도시의 현재 날씨를 조회한다.",
        "input_schema": {
            "type": "object",
            "properties": {"city": {"type": "string"}},
            "required": ["city"],
        },
    }

    def fakeWeather(city: str) -> str:
        catalog = {"서울": "맑음 12도", "부산": "흐림 15도", "도쿄": "비 9도"}
        return catalog.get(city, "데이터 없음")

    client = anthropic.Anthropic()
    history = [{"role": "user", "content": "서울 날씨 알려줘."}]
    initial = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=300,
        tools=[weatherTool],
        messages=history,
    )

    toolBlock = next(block for block in initial.content if block.type == "tool_use")
    weather = fakeWeather(toolBlock.input["city"])

    history.append({"role": "assistant", "content": initial.content})
    history.append({
        "role": "user",
        "content": [
            {
                "type": "tool_result",
                "tool_use_id": toolBlock.id,
                "content": weather,
            }
        ],
    })

    final = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=300,
        tools=[weatherTool],
        messages=history,
    )
    finalText = "".join(block.text for block in final.content if block.type == "text")
    finalText
  exercise:
    prompt: fakeWeather 사전을 확장해 더 많은 도시 데이터를 넣고 다른 도시 질문을 던져 보세요.
    starterCode: |-
      import anthropic

      weatherTool = {
          "name": "get_weather",
          "description": "특정 도시의 현재 날씨를 조회한다.",
          "input_schema": {
              "type": "object",
              "properties": {"city": {"type": "string"}},
              "required": ["city"],
          },
      }

      def fakeWeather(city: str) -> str:
          catalog = {"서울": "맑음 12도", "부산": "흐림 15도", "도쿄": "비 9도"}
          return catalog.get(city, "데이터 없음")

      client = anthropic.Anthropic()
      history = [{"role": "user", "content": "서울 날씨 알려줘."}]
      initial = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=300,
          tools=[weatherTool],
          messages=history,
      )

      toolBlock = next(block for block in initial.content if block.type == "tool_use")
      weather = fakeWeather(toolBlock.input["city"])

      history.append({"role": "assistant", "content": initial.content})
      history.append({
          "role": "user",
          "content": [
              {
                  "type": "tool_result",
                  "tool_use_id": toolBlock.id,
                  "content": weather,
              }
          ],
      })

      final = client.messages.create(
          model="claude-haiku-4-5",
          max_tokens=300,
          tools=[weatherTool],
          messages=history,
      )
      finalText = "".join(block.text for block in final.content if block.type == "text")
      finalText
    hints:
    - catalog 사전에 뉴욕 키와 짧은 날씨 문자열 값을 가진 항목을 하나 추가합니다.
    - 도시 이름은 user 메시지와 같은 표현이어야 catalog가 적중합니다.
  check:
    noError: 두 번의 호출과 결과 회신이 정상 실행되어야 합니다.
    resultCheck: finalText가 weather 내용을 반영한 자연어 응답이어야 합니다.
- id: tool_loop
  title: 4단계. runToolLoop 함수화
  structuredPrimary: true
  subtitle: 도구 호출이 끝날 때까지 반복
  goal: stop_reason이 더 이상 "tool_use"가 아닐 때까지 도구 호출을 처리하는 함수를 만든다.
  why: 한 번의 사용자 질문이 여러 도구 호출을 만들 수 있습니다. 자동화에서는 끝날 때까지 자동으로 처리하는 루프가 필요합니다.
  explanation: while 루프로 stop_reason이 "tool_use"인 동안 ToolUseBlock을 모두 실행하고 tool_result를 messages에 추가합니다.
    한 라운드가 여러 도구 호출을 포함할 수 있으니 toolBlocks를 리스트로 처리합니다. 종료 조건은 stop_reason이 "end_turn" 등으로 바뀌는 시점입니다.
  tips:
  - 무한 루프 방지를 위해 maxRounds 인자로 횟수 상한을 두면 안전합니다.
  snippet: |-
    import anthropic

    weatherTool = {
        "name": "get_weather",
        "description": "특정 도시의 현재 날씨를 조회한다.",
        "input_schema": {
            "type": "object",
            "properties": {"city": {"type": "string"}},
            "required": ["city"],
        },
    }

    def fakeWeather(city: str) -> str:
        catalog = {"서울": "맑음 12도", "부산": "흐림 15도"}
        return catalog.get(city, "데이터 없음")

    def runToolLoop(client, prompt: str, maxRounds: int = 5) -> str:
        history = [{"role": "user", "content": prompt}]
        for _ in range(maxRounds):
            result = client.messages.create(
                model="claude-haiku-4-5",
                max_tokens=400,
                tools=[weatherTool],
                messages=history,
            )
            if result.stop_reason != "tool_use":
                return "".join(block.text for block in result.content if block.type == "text")
            history.append({"role": "assistant", "content": result.content})
            toolResults = []
            for block in result.content:
                if block.type != "tool_use":
                    continue
                outcome = fakeWeather(block.input["city"]) if block.name == "get_weather" else "도구 없음"
                toolResults.append({
                    "type": "tool_result",
                    "tool_use_id": block.id,
                    "content": outcome,
                })
            history.append({"role": "user", "content": toolResults})
        return "max rounds reached"

    client = anthropic.Anthropic()
    answer = runToolLoop(client, "서울과 부산 날씨를 비교해 한 문장으로 알려줘.")
    answer
  exercise:
    prompt: runToolLoop가 호출 횟수와 마지막 stop_reason을 함께 돌려주도록 반환을 dict로 바꿔 보세요.
    starterCode: |-
      import anthropic

      weatherTool = {
          "name": "get_weather",
          "description": "특정 도시의 현재 날씨를 조회한다.",
          "input_schema": {
              "type": "object",
              "properties": {"city": {"type": "string"}},
              "required": ["city"],
          },
      }

      def fakeWeather(city: str) -> str:
          catalog = {"서울": "맑음 12도", "부산": "흐림 15도"}
          return catalog.get(city, "데이터 없음")

      def runToolLoop(client, prompt: str, maxRounds: int = 5) -> str:
          history = [{"role": "user", "content": prompt}]
          for _ in range(maxRounds):
              result = client.messages.create(
                  model="claude-haiku-4-5",
                  max_tokens=400,
                  tools=[weatherTool],
                  messages=history,
              )
              if result.stop_reason != "tool_use":
                  return "".join(block.text for block in result.content if block.type == "text")
              history.append({"role": "assistant", "content": result.content})
              toolResults = []
              for block in result.content:
                  if block.type != "tool_use":
                      continue
                  outcome = fakeWeather(block.input["city"]) if block.name == "get_weather" else "도구 없음"
                  toolResults.append({
                      "type": "tool_result",
                      "tool_use_id": block.id,
                      "content": outcome,
                  })
              history.append({"role": "user", "content": toolResults})
          return "max rounds reached"

      client = anthropic.Anthropic()
      answer = runToolLoop(client, "서울과 부산 날씨를 비교해 한 문장으로 알려줘.")
      answer
    hints:
    - 함수가 dict를 돌려주도록 바꾸고 rounds, stop_reason, text 세 키를 둡니다.
    - max rounds 도달 시도 같은 모양의 dict를 돌려줍니다.
  check:
    noError: runToolLoop 함수 정의와 호출이 정상 실행되어야 합니다.
    resultCheck: answer가 비어있지 않은 문자열이고 도시 정보를 반영해야 합니다.
- id: workflow_validation
  title: '현업 흐름 검증: 도구로 외부 데이터 답변 만들기'
  structuredPrimary: true
  subtitle: 도구가 실제 데이터를 가져오는지 검증
  goal: 두 도시 비교 요청에 대해 도구가 두 번 호출되었는지 코드로 확인하고 응답에 두 도시 정보가 모두 포함되었는지 검증한다.
  why: 자동화에서 도구 호출 횟수와 결과 반영을 검증하지 않으면 모델이 도구를 무시하고 자기 지식으로 답해도 알아차리지 못합니다.
  explanation: runToolLoop 안에서 도구 호출 횟수를 카운트하도록 인자를 받습니다. 호출 후 totalToolCalls가 2 이상인지, finalText에 두 도시 이름이
    모두 포함되었는지 assertion으로 확인합니다.
  tips:
  - 도구 호출 횟수를 외부 리스트에 누적하면 함수 내부 상태를 들여다보기 쉽습니다.
  snippet: |-
    import anthropic

    weatherTool = {
        "name": "get_weather",
        "description": "특정 도시의 현재 날씨를 조회한다.",
        "input_schema": {
            "type": "object",
            "properties": {"city": {"type": "string"}},
            "required": ["city"],
        },
    }

    def fakeWeather(city: str) -> str:
        catalog = {"서울": "맑음 12도", "부산": "흐림 15도"}
        return catalog.get(city, "데이터 없음")

    def runToolLoopWithTrace(client, prompt: str, maxRounds: int = 5) -> dict:
        history = [{"role": "user", "content": prompt}]
        callTrace: list[str] = []
        for _ in range(maxRounds):
            result = client.messages.create(
                model="claude-haiku-4-5",
                max_tokens=400,
