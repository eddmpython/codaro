  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    loadLocalDataset() 함수로 tips 데이터를 불러옵니다. 이 데이터셋은 레스토랑 결제 기록을 담고 있으며, 팁 예측 모델이나 고객 분석에 자주 사용됩니다. 인터넷 연결 없이 같은 실습 흐름을 재현할 수 있습니다.

