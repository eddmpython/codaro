- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    penguins(펭귄) 데이터셋은 남극 펭귄 3종의 신체 측정 데이터입니다. 아델리(Adelie), 친스트랩(Chinstrap), 젠투(Gentoo) 펭귄의 부리 길이, 부리 깊이, 날개 길이, 체중 등이 포함되어 있습니다. iris 데이터와 유사하게 분류 문제에 자주 사용됩니다.

    import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  tips:
  - import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  snippet: |-
    import matplotlib.pyplot as plt
    import seaborn as sns
    from codaro.curriculum.localData import loadLocalDataset
    import pandas as pd
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
