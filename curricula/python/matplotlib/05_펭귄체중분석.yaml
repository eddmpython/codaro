  explanation: |-
    스파인(spine)은 차트 영역의 테두리입니다. 불필요한 스파인을 제거하면 더 깔끔하고 현대적인 디자인이 됩니다. 보통 상단과 우측 스파인을 제거하고, 좌측과 하단만 남깁니다.

    ax.spines['위치'].set_visible(False)로 스파인을 숨깁니다. 위치는 'top', 'bottom', 'left', 'right' 중 하나입니다. set_color(), set_linewidth()로 스파인 스타일도 변경할 수 있습니다.
