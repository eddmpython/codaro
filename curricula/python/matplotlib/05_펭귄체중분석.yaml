    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 데이터 로드 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 데이터 로드에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_explore
  title: 3단계. 종별 통계
  structuredPrimary: true
  subtitle: groupby 집계
  goal: 3단계. 종별 통계에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: 각 펭귄 종별로 체중의 기본 통계를 확인합니다. groupby와 agg를 사용하면 여러 통계량을 한 번에 계산할 수 있습니다. 젠투 펭귄이 가장 무겁고, 친스트랩
    펭귄이 가장 가벼운 것을 알 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: penguins.groupby('species')['body_mass_g'].agg(['mean', 'std', 'min', 'max'])
  exercise:
    prompt: 3단계. 종별 통계 예제에서 리스트 값을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: penguins.groupby('species')['body_mass_g'].agg(['mean', 'std', 'min', 'max'])
    hints:
    - 3단계. 종별 통계 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 종별 통계 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 종별 통계에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step4_boxplot
  title: 4단계. 종별 박스플롯
  structuredPrimary: true
  subtitle: 그룹별 boxplot
  goal: 4단계. 종별 박스플롯에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: 이전에 배운 박스플롯을 종별로 그려봅니다. 여러 그룹의 박스플롯을 한 번에 그리려면 각 그룹의 데이터를 리스트로 전달합니다. labels로 각 박스에 라벨을
    지정합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figBox, axBox = plt.subplots(figsize=(10, 6))

    speciesBox = ['Adelie', 'Chinstrap', 'Gentoo']
    weightBox = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesBox]

    axBox.boxplot(weightBox, labels=speciesBox)
    axBox.set_title('펭귄 종별 체중 분포', fontsize=14)
    axBox.set_xlabel('종', fontsize=12)
    axBox.set_ylabel('체중 (g)', fontsize=12)
    axBox.grid(True, axis='y', alpha=0.3)
    figBox
  exercise:
    prompt: 4단계. 종별 박스플롯 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figBox, axBox = plt.subplots(figsize=(10, 6))

      speciesBox = ['Adelie', 'Chinstrap', 'Gentoo']
      weightBox = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesBox]

      axBox.boxplot(weightBox, labels=speciesBox)
      axBox.set_title('펭귄 종별 체중 분포', fontsize=14)
      axBox.set_xlabel('종', fontsize=12)
      axBox.set_ylabel('체중 (g)', fontsize=12)
      axBox.grid(True, axis='y', alpha=0.3)
      figBox
    hints:
    - 4단계. 종별 박스플롯 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 종별 박스플롯 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 종별 박스플롯에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_violin
  title: 5단계. 바이올린 플롯
  structuredPrimary: true
  subtitle: ax.violinplot()
  goal: 5단계. 바이올린 플롯에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    바이올린 플롯은 박스플롯과 커널 밀도 추정(KDE)을 결합한 차트입니다. 분포의 형태를 시각적으로 보여주어 박스플롯보다 더 풍부한 정보를 제공합니다. 데이터가 어디에 집중되어 있는지, 양봉 분포인지 등을 파악할 수 있습니다.

    ax.violinplot(데이터리스트)로 바이올린 플롯을 그립니다. showmeans=True는 평균선, showmedians=True는 중앙값선을 표시합니다. positions로 x축 위치를 지정합니다. 반환값(parts)으로 각 요소의 스타일을 커스터마이징할 수 있습니다.
  tips:
  - ax.violinplot(데이터리스트)로 바이올린 플롯을 그립니다. showmeans=True는 평균선, showmedians=True는 중앙값선을 표시합니다. positions로
    x축 위치를 지정합니다. 반환값(parts)으로 각 요소의 스타일을 커스터마이징할 수 있습니다.
  snippet: |-
    figViolin, axViolin = plt.subplots(figsize=(10, 6))

    speciesViolin = ['Adelie', 'Chinstrap', 'Gentoo']
    weightViolin = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesViolin]

    partsViolin = axViolin.violinplot(weightViolin, positions=[1, 2, 3], showmeans=True, showmedians=True)
    axViolin.set_xticks([1, 2, 3])
    axViolin.set_xticklabels(speciesViolin)
    axViolin.set_title('펭귄 종별 체중 분포 (바이올린 플롯)', fontsize=14)
    axViolin.set_xlabel('종', fontsize=12)
    axViolin.set_ylabel('체중 (g)', fontsize=12)
    axViolin.grid(True, axis='y', alpha=0.3)
    figViolin
  exercise:
    prompt: 5단계. 바이올린 플롯 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      figViolin, axViolin = plt.subplots(figsize=(10, 6))

      speciesViolin = ['Adelie', 'Chinstrap', 'Gentoo']
      weightViolin = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesViolin]

      partsViolin = axViolin.violinplot(weightViolin, positions=[1, 2, 3], showmeans=True, showmedians=True)
      axViolin.set_xticks([1, 2, 3])
      axViolin.set_xticklabels(speciesViolin)
      axViolin.set_title('펭귄 종별 체중 분포 (바이올린 플롯)', fontsize=14)
      axViolin.set_xlabel('종', fontsize=12)
