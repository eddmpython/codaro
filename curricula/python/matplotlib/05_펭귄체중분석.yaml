- id: step7_sharex
  title: 7단계. 축 공유 서브플롯
  structuredPrimary: true
  subtitle: sharex, sharey
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    박스플롯과 바이올린 플롯을 같은 y축 범위로 비교하면 두 차트의 차이점을 명확하게 볼 수 있습니다. sharey=True로 y축을 공유하면 스케일이 동일하게 유지됩니다.

    plt.subplots(sharex=True)는 x축을, sharey=True는 y축을 공유합니다. 같은 데이터를 다른 방식으로 시각화할 때 스케일을 통일하여 정확한 비교가 가능합니다. patch_artist=True로 박스플롯에 색상을 채울 수 있습니다.
  tips:
  - plt.subplots(sharex=True)는 x축을, sharey=True는 y축을 공유합니다. 같은 데이터를 다른 방식으로 시각화할 때 스케일을 통일하여 정확한 비교가 가능합니다. patch_artist=True로 박스플롯에 색상을 채울 수 있습니다.
  snippet: |-
    figShare, (axBoxShare, axViolinShare) = plt.subplots(1, 2, figsize=(14, 6), sharey=True)

    speciesShare = ['Adelie', 'Chinstrap', 'Gentoo']
    colorsShare = ['#E74C3C', '#27AE60', '#3498DB']
    weightShare = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesShare]

    bpShare = axBoxShare.boxplot(weightShare, labels=speciesShare, patch_artist=True)
    for patch, color in zip(bpShare['boxes'], colorsShare):
        patch.set_facecolor(color)
        patch.set_alpha(0.7)
    axBoxShare.set_title('박스플롯', fontsize=12)
    axBoxShare.set_xlabel('종')
    axBoxShare.set_ylabel('체중 (g)')
    figShare
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figShare, (axBoxShare, axViolinShare) = plt.subplots(1, 2, figsize=(14, 6), sharey=True)

      speciesShare = ['Adelie', 'Chinstrap', 'Gentoo']
      colorsShare = ['#E74C3C', '#27AE60', '#3498DB']
      weightShare = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesShare]

      bpShare = axBoxShare.boxplot(weightShare, labels=speciesShare, patch_artist=True)
      for patch, color in zip(bpShare['boxes'], colorsShare):
          patch.set_facecolor(color)
          patch.set_alpha(0.7)
      axBoxShare.set_title('박스플롯', fontsize=12)
      axBoxShare.set_xlabel('종')
      axBoxShare.set_ylabel('체중 (g)')
      figShare
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_spines
  title: 8단계. 스파인 제거
  structuredPrimary: true
  subtitle: spines 설정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    스파인(spine)은 차트 영역의 테두리입니다. 불필요한 스파인을 제거하면 더 깔끔하고 현대적인 디자인이 됩니다. 보통 상단과 우측 스파인을 제거하고, 좌측과 하단만 남깁니다.

    ax.spines['위치'].set_visible(False)로 스파인을 숨깁니다. 위치는 'top', 'bottom', 'left', 'right' 중 하나입니다. set_color(), set_linewidth()로 스파인 스타일도 변경할 수 있습니다.
  tips:
  - ax.spines['위치'].set_visible(False)로 스파인을 숨깁니다. 위치는 'top', 'bottom', 'left', 'right' 중 하나입니다. set_color(), set_linewidth()로 스파인 스타일도 변경할 수 있습니다.
  snippet: |-
    figSpines, axSpines = plt.subplots(figsize=(10, 6))

    speciesSpines = ['Adelie', 'Chinstrap', 'Gentoo']
    colorsSpines = ['#E74C3C', '#27AE60', '#3498DB']
    weightSpines = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesSpines]

    partsSpines = axSpines.violinplot(weightSpines, positions=[1, 2, 3], showmeans=True)
    for idx, body in enumerate(partsSpines['bodies']):
        body.set_facecolor(colorsSpines[idx])
        body.set_alpha(0.7)
    figSpines
