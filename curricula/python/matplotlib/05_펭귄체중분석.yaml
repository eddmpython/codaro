      bpShare = axBoxShare.boxplot(weightShare, labels=speciesShare, patch_artist=True)
      for patch, color in zip(bpShare['boxes'], colorsShare):
          patch.set_facecolor(color)
          patch.set_alpha(0.7)
      axBoxShare.set_title('박스플롯', fontsize=12)
      axBoxShare.set_xlabel('종')
      axBoxShare.set_ylabel('체중 (g)')
      figShare
