- id: step4_boxplot
  title: 4단계. 종별 박스플롯
  structuredPrimary: true
  subtitle: 그룹별 boxplot
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 이전에 배운 박스플롯을 종별로 그려봅니다. 여러 그룹의 박스플롯을 한 번에 그리려면 각 그룹의 데이터를 리스트로 전달합니다. labels로 각 박스에 라벨을 지정합니다.
  tips:
