- id: step5_violin
  title: 5단계. 바이올린 플롯
  structuredPrimary: true
  subtitle: ax.violinplot()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    바이올린 플롯은 박스플롯과 커널 밀도 추정(KDE)을 결합한 차트입니다. 분포의 형태를 시각적으로 보여주어 박스플롯보다 더 풍부한 정보를 제공합니다. 데이터가 어디에 집중되어 있는지, 양봉 분포인지 등을 파악할 수 있습니다.

    ax.violinplot(데이터리스트)로 바이올린 플롯을 그립니다. showmeans=True는 평균선, showmedians=True는 중앙값선을 표시합니다. positions로 x축 위치를 지정합니다. 반환값(parts)으로 각 요소의 스타일을 커스터마이징할 수 있습니다.
  tips:
  - ax.violinplot(데이터리스트)로 바이올린 플롯을 그립니다. showmeans=True는 평균선, showmedians=True는 중앙값선을 표시합니다. positions로 x축 위치를 지정합니다. 반환값(parts)으로 각 요소의 스타일을 커스터마이징할 수 있습니다.
  snippet: |-
    figViolin, axViolin = plt.subplots(figsize=(10, 6))

    speciesViolin = ['Adelie', 'Chinstrap', 'Gentoo']
    weightViolin = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesViolin]

    partsViolin = axViolin.violinplot(weightViolin, positions=[1, 2, 3], showmeans=True, showmedians=True)
    axViolin.set_xticks([1, 2, 3])
    axViolin.set_xticklabels(speciesViolin)
    axViolin.set_title('펭귄 종별 체중 분포 (바이올린 플롯)', fontsize=14)
    axViolin.set_xlabel('종', fontsize=12)
    axViolin.set_ylabel('체중 (g)', fontsize=12)
    axViolin.grid(True, axis='y', alpha=0.3)
    figViolin
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figViolin, axViolin = plt.subplots(figsize=(10, 6))

      speciesViolin = ['Adelie', 'Chinstrap', 'Gentoo']
      weightViolin = [penguins[penguins['species'] == sp]['body_mass_g'] for sp in speciesViolin]

      partsViolin = axViolin.violinplot(weightViolin, positions=[1, 2, 3], showmeans=True, showmedians=True)
      axViolin.set_xticks([1, 2, 3])
      axViolin.set_xticklabels(speciesViolin)
      axViolin.set_title('펭귄 종별 체중 분포 (바이올린 플롯)', fontsize=14)
      axViolin.set_xlabel('종', fontsize=12)
      axViolin.set_ylabel('체중 (g)', fontsize=12)
      axViolin.grid(True, axis='y', alpha=0.3)
      figViolin
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
