- id: figure_axes
  blocks:
    - type: sectionHeader
      title: "🖼️ Figure와 Axes 이해하기"
      subtitle: "Matplotlib의 핵심 구조"

    - type: text
      content: |-
        Matplotlib을 제대로 사용하려면 Figure와 Axes의 관계를 이해해야 합니다.

        Figure는 전체 그림판입니다. 도화지 한 장이라고 생각하세요. Axes는 실제 차트가 그려지는 영역입니다. 하나의 Figure에 여러 개의 Axes를 배치할 수 있습니다.

    - type: featureCards
