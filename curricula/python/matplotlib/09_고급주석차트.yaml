sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    주가 데이터를 생성하고 주요 이벤트를 표시하는 고급 차트를 만듭니다. annotate로 화살표와 설명을 추가하고, LaTeX로 수식을 표현하며, bbox로 텍스트를 강조합니다.

    import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. numpy는 np로, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  tips:
  - import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. numpy는 np로, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  snippet: |-
    import matplotlib.pyplot as plt
    import numpy as np
    import pandas as pd
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import matplotlib.pyplot as plt
      import numpy as np
      import pandas as pd
    hints:
