- id: step4_figure
  title: 4단계. Figure 생성
  structuredPrimary: true
  subtitle: plt.figure()
  goal: 4단계. Figure 생성에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    Matplotlib에서 Figure는 전체 그림판입니다. figsize로 크기를 지정할 수 있으며, 단위는 인치입니다. (10, 6)은 가로 10인치, 세로 6인치를 의미합니다. Figure를 먼저 생성하고 그 위에 차트를 그리는 것이 Matplotlib의 기본 워크플로우입니다. ⚠️ 주의 : 아무것도 없는 그림판입니다. 당황하지 마세요!

    plt.figure(figsize=(가로, 세로))로 Figure의 크기를 설정합니다. 기본값은 (6.4, 4.8)입니다. 프레젠테이션용은 (12, 8), 논문용은 (8, 6) 정도가 적당합니다. dpi 파라미터로 해상도도 설정할 수 있습니다.
  tips:
  - plt.figure(figsize=(가로, 세로))로 Figure의 크기를 설정합니다. 기본값은 (6.4, 4.8)입니다. 프레젠테이션용은 (12, 8), 논문용은 (8, 6)
    정도가 적당합니다. dpi 파라미터로 해상도도 설정할 수 있습니다.
  snippet: |-
    fig = plt.figure(figsize=(10, 6))
    fig
  exercise:
    prompt: 4단계. Figure 생성 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      fig = plt.figure(figsize=(10, 6))
      fig
    hints:
    - 4단계. Figure 생성 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. Figure 생성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. Figure 생성에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step5_plot
  title: 5단계. 선 그래프 그리기
  structuredPrimary: true
  subtitle: plt.plot()
  goal: 5단계. 선 그래프 그리기에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    plt.plot()은 가장 기본적인 선 그래프 함수입니다. x축에 날짜, y축에 주가를 배치합니다. label 파라미터를 지정하면 나중에 범례에 표시됩니다. 여러 선을 그릴 때는 plt.plot()을 여러 번 호출하면 됩니다. 각 선은 자동으로 다른 색상이 지정됩니다.

    plt.subplots()는 Figure와 Axes를 동시에 생성합니다. fig는 전체 그림판, ax는 실제 차트가 그려지는 영역입니다. ax.plot(x, y, label='이름')으로 선을 추가합니다. label은 범례에 표시될 이름입니다.
  tips:
  - plt.subplots()는 Figure와 Axes를 동시에 생성합니다. fig는 전체 그림판, ax는 실제 차트가 그려지는 영역입니다. ax.plot(x, y, label='이름')으로
    선을 추가합니다. label은 범례에 표시될 이름입니다.
  snippet: |-
    fig1, ax1 = plt.subplots(figsize=(10, 6))
    ax1.plot(stockData.index, stockData['A사'], label='A사')
    ax1.plot(stockData.index, stockData['B사'], label='B사')
    ax1.plot(stockData.index, stockData['C사'], label='C사')
