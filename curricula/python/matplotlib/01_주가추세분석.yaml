sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    Matplotlib은 파이썬에서 가장 오래되고 널리 사용되는 시각화 라이브러리입니다. pyplot 모듈은 MATLAB 스타일의 인터페이스를 제공하여 간단한 명령으로 차트를 만들 수 있습니다. numpy는 수치 계산을 위한 라이브러리로, 주가 데이터를 생성하는 데 사용합니다. pandas는 데이터프레임을 다루기 위해 함께 불러옵니다. 이 세 라이브러리는 데이터 분석의 기본 조합으로, 대부분의 프로젝트에서 함께 사용됩니다. ⚠️ 처음 실행 시 "Matplotlib is building the font cache"라는 메시지가 나올 수 있습니다. 폰트 캐시를 만드는 정상 동작이며, 한 번만 발생하니 당황하지 마세요!

    import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. plt.plot(), plt.figure()처럼 간결하게 사용할 수 있습니다. numpy는 np, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  tips:
  - import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. plt.plot(), plt.figure()처럼
    간결하게 사용할 수 있습니다. numpy는 np, pandas는 pd로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  snippet: |-
    import matplotlib.pyplot as plt
    import numpy as np
    import pandas as pd
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 입력값을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import matplotlib.pyplot as plt
      import numpy as np
      import pandas as pd
    hints:
    - 1단계. 라이브러리 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 라이브러리 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step1_font
  title: 1-1단계. 한글 폰트 설정
  structuredPrimary: true
  subtitle: Codaro 로컬 Python 환경 폰트
  goal: 11단계. 한글 폰트 설정에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    Codaro 로컬 Python에서는 실행 환경에 따라 기본 폰트에 한글 글리프가 없을 수 있습니다. CDN 또는 로컬 폰트 파일을 matplotlib에 등록하는 방식으로 해결합니다. Pretendard는 무료 오픈소스 폰트로, 한글과 영문 모두 깔끔하게 표시됩니다.

    font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스 기호가 깨지는 것을 방지합니다.
  tips:
  - font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스
    기호가 깨지는 것을 방지합니다.
  snippet: |-
    from matplotlib import font_manager

    fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
    availableFonts = {font.name for font in font_manager.fontManager.ttflist}
    for fontName in fontCandidates:
        if fontName in availableFonts:
            plt.rcParams["font.family"] = fontName
            break
    plt.rcParams["axes.unicode_minus"] = False
  exercise:
    prompt: 11단계. 한글 폰트 설정 예제에서 데이터 값이나 축 설정을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from matplotlib import font_manager

      fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
      availableFonts = {font.name for font in font_manager.fontManager.ttflist}
      for fontName in fontCandidates:
          if fontName in availableFonts:
              plt.rcParams["font.family"] = fontName
              break
      plt.rcParams["axes.unicode_minus"] = False
    hints:
    - 11단계. 한글 폰트 설정 코드에서 먼저 데이터 값이나 축 설정 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 11단계. 한글 폰트 설정 코드가 예외 없이 끝나야 합니다.
    resultCheck: 11단계. 한글 폰트 설정에서 바꾼 데이터 값이나 축 설정이 결과에 반영되어야 합니다.
- id: step2_data
  title: 2단계. 주가 데이터 생성
  structuredPrimary: true
  subtitle: 시뮬레이션 데이터
  goal: 2단계. 주가 데이터 생성에서 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 시각화는 데이터 결과를 사람이 검토하고 의사결정에 쓰기 위한 산출물입니다.
  explanation: |-
    실제 주식 API를 사용하지 않고, 학습 목적으로 가상의 주가 데이터를 생성합니다. 랜덤 워크(Random Walk)는 주가 변동을 시뮬레이션하는 대표적인 방법입니다. 누적합(cumsum)을 사용하면 매일 랜덤한 변화가 누적되어 실제 주가처럼 움직이는 시계열을 만들 수 있습니다. 시드(seed)를 고정하면 매번 같은 결과가 나와서 학습에 유리합니다.

    np.random.seed(42)는 난수 생성기의 시드를 고정하여 매번 같은 난수가 생성되도록 합니다. 42는 관례적으로 많이 사용하는 숫자입니다. cumsum()은 누적합을 계산하는 함수로, [1, 2, 3]이면 [1, 3, 6]을 반환합니다.
  tips:
  - np.random.seed(42)는 난수 생성기의 시드를 고정하여 매번 같은 난수가 생성되도록 합니다. 42는 관례적으로 많이 사용하는 숫자입니다. cumsum()은 누적합을
    계산하는 함수로, [1, 2, 3]이면 [1, 3, 6]을 반환합니다.
  snippet: |-
    np.random.seed(42)
    days = 60
    dateRange = pd.date_range('2024-01-01', periods=days, freq='D')
    priceA = 100 + np.random.randn(days).cumsum()
    priceB = 120 + np.random.randn(days).cumsum() * 1.2
    priceC = 80 + np.random.randn(days).cumsum() * 0.8
  exercise:
    prompt: 2단계. 주가 데이터 생성 예제에서 열 이름이나 행 값을 바꿔 실행하고, 축/범례/파일 출력 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      np.random.seed(42)
      days = 60
      dateRange = pd.date_range('2024-01-01', periods=days, freq='D')
      priceA = 100 + np.random.randn(days).cumsum()
      priceB = 120 + np.random.randn(days).cumsum() * 1.2
      priceC = 80 + np.random.randn(days).cumsum() * 0.8
    hints:
    - 2단계. 주가 데이터 생성 코드에서 먼저 열 이름이나 행 값 위치를 찾으세요.
    - 실행 후 축/범례/파일 출력 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 주가 데이터 생성 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 주가 데이터 생성에서 바꾼 열 이름이나 행 값이 결과에 반영되어야 합니다.
