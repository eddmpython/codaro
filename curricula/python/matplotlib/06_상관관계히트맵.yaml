sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    iris 데이터의 4가지 수치형 변수(꽃받침 길이/너비, 꽃잎 길이/너비) 간의 상관관계를 분석합니다. 상관계수는 -1에서 1 사이의 값으로, 1에 가까울수록 강한 양의 상관, -1에 가까울수록 강한 음의 상관을 나타냅니다.

    import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, numpy는 np로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  tips:
  - import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, numpy는 np로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.
  snippet: |-
    import matplotlib.pyplot as plt
    import seaborn as sns
    from codaro.curriculum.localData import loadLocalDataset
    import numpy as np
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import matplotlib.pyplot as plt
      import seaborn as sns
      from codaro.curriculum.localData import loadLocalDataset
      import numpy as np
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step1_font
  title: 1-1단계. 한글 폰트 설정
  structuredPrimary: true
  subtitle: Codaro 로컬 Python 환경 폰트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Codaro 로컬 Python에서는 실행 환경에 따라 기본 폰트에 한글 글리프가 없을 수 있습니다. CDN 또는 로컬 폰트 파일을 matplotlib에 등록하는 방식으로 해결합니다. Pretendard는 무료 오픈소스 폰트로, 한글과 영문 모두 깔끔하게 표시됩니다.

    font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스 기호가 깨지는 것을 방지합니다.
  tips:
  - font_manager로 현재 환경의 폰트 목록을 확인하고, 사용 가능한 한글 폰트를 rcParams에 설정합니다. axes.unicode_minus = False는 마이너스 기호가 깨지는 것을 방지합니다.
  snippet: |-
    from matplotlib import font_manager

    fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
    availableFonts = {font.name for font in font_manager.fontManager.ttflist}
    for fontName in fontCandidates:
        if fontName in availableFonts:
            plt.rcParams["font.family"] = fontName
            break
    plt.rcParams["axes.unicode_minus"] = False
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from matplotlib import font_manager

      fontCandidates = ["Malgun Gothic", "AppleGothic", "NanumGothic", "DejaVu Sans"]
      availableFonts = {font.name for font in font_manager.fontManager.ttflist}
      for fontName in fontCandidates:
          if fontName in availableFonts:
              plt.rcParams["font.family"] = fontName
              break
      plt.rcParams["axes.unicode_minus"] = False
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_data
  title: 2단계. 데이터 로드 및 상관행렬
  structuredPrimary: true
  subtitle: corr()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: iris 데이터를 불러오고 수치형 컬럼만 선택하여 상관행렬을 계산합니다. pandas의 corr() 메서드는 피어슨 상관계수를 계산합니다. 결과는 4x4 대칭 행렬로, 대각선은 항상 1입니다(자기 자신과의 상관).
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from codaro.curriculum.localData import loadLocalDataset

    iris = loadLocalDataset('iris')
    numericCols = ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
    corrMatrix = iris[numericCols].corr()
    corrMatrix
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from codaro.curriculum.localData import loadLocalDataset

      iris = loadLocalDataset('iris')
      numericCols = ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
      corrMatrix = iris[numericCols].corr()
      corrMatrix
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_imshow
  title: 3단계. 기본 히트맵
  structuredPrimary: true
  subtitle: ax.imshow()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    imshow()는 2차원 배열을 이미지로 표시하는 함수입니다. 상관행렬을 imshow()에 전달하면 각 셀의 값에 따라 색상이 지정됩니다. 기본 컬러맵은 viridis로, 낮은 값은 보라색, 높은 값은 노란색으로 표시됩니다.

    ax.imshow(2D배열)로 히트맵을 그립니다. 반환값(im)은 이미지 객체로, 나중에 컬러바를 추가할 때 사용합니다. 기본적으로 배열의 값 범위에 맞춰 색상이 자동으로 매핑됩니다.
  tips:
  - ax.imshow(2D배열)로 히트맵을 그립니다. 반환값(im)은 이미지 객체로, 나중에 컬러바를 추가할 때 사용합니다. 기본적으로 배열의 값 범위에 맞춰 색상이 자동으로 매핑됩니다.
  snippet: |-
    figHeat, axHeat = plt.subplots(figsize=(8, 6))
    im = axHeat.imshow(corrMatrix)
    axHeat.set_title('Iris 변수 간 상관관계', fontsize=14)
    figHeat
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figHeat, axHeat = plt.subplots(figsize=(8, 6))
      im = axHeat.imshow(corrMatrix)
      axHeat.set_title('Iris 변수 간 상관관계', fontsize=14)
      figHeat
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_cmap
  title: 4단계. 컬러맵 설정
  structuredPrimary: true
  subtitle: cmap 파라미터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컬러맵(colormap)은 수치를 색상으로 변환하는 규칙입니다. 상관관계에는 발산형(diverging) 컬러맵이 적합합니다. 'coolwarm'은 음수는 파란색, 양수는 빨간색으로 표시하여 상관관계의 방향을 직관적으로 보여줍니다.

    cmap으로 컬러맵을 지정합니다. 상관관계에 적합한 발산형 컬러맵: 'coolwarm', 'RdBu_r', 'seismic'. vmin, vmax로 색상 매핑 범위를 지정합니다. 상관계수는 -1~1이므로 vmin=-1, vmax=1로 설정합니다.
  tips:
  - 'cmap으로 컬러맵을 지정합니다. 상관관계에 적합한 발산형 컬러맵: ''coolwarm'', ''RdBu_r'', ''seismic''. vmin, vmax로 색상 매핑 범위를 지정합니다. 상관계수는 -1~1이므로 vmin=-1, vmax=1로 설정합니다.'
  snippet: |-
    figCmap, axCmap = plt.subplots(figsize=(8, 6))
    im = axCmap.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
    axCmap.set_title('Iris 변수 간 상관관계', fontsize=14)
    figCmap
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figCmap, axCmap = plt.subplots(figsize=(8, 6))
      im = axCmap.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      axCmap.set_title('Iris 변수 간 상관관계', fontsize=14)
      figCmap
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_colorbar
  title: 5단계. 컬러바 추가
  structuredPrimary: true
  subtitle: plt.colorbar()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    컬러바는 색상과 수치의 관계를 보여주는 범례입니다. 히트맵을 해석할 때 어떤 색이 어떤 값을 나타내는지 알 수 있습니다. plt.colorbar()에 이미지 객체와 축을 전달하여 추가합니다.

    plt.colorbar(im, ax=ax)로 컬러바를 추가합니다. im은 imshow()의 반환값, ax는 히트맵이 그려진 축입니다. label로 컬러바 제목을 설정합니다. shrink 파라미터로 컬러바 크기를 조절할 수 있습니다.
  tips:
  - plt.colorbar(im, ax=ax)로 컬러바를 추가합니다. im은 imshow()의 반환값, ax는 히트맵이 그려진 축입니다. label로 컬러바 제목을 설정합니다. shrink 파라미터로 컬러바 크기를 조절할 수 있습니다.
  snippet: |-
    figColorbar, axColorbar = plt.subplots(figsize=(9, 6))
    im = axColorbar.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
    plt.colorbar(im, ax=axColorbar, label='상관계수')
    axColorbar.set_title('Iris 변수 간 상관관계', fontsize=14)
    figColorbar
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figColorbar, axColorbar = plt.subplots(figsize=(9, 6))
      im = axColorbar.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axColorbar, label='상관계수')
      axColorbar.set_title('Iris 변수 간 상관관계', fontsize=14)
      figColorbar
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_ticks
  title: 6단계. 축 눈금 설정
  structuredPrimary: true
  subtitle: set_xticks(), set_xticklabels()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    히트맵의 x축과 y축에 변수명을 표시해야 어떤 변수 간의 상관관계인지 알 수 있습니다. set_xticks()로 눈금 위치를 설정하고, set_xticklabels()로 라벨을 지정합니다. 한글 라벨로 변경하면 가독성이 높아집니다.

    set_xticks(range(n))로 0, 1, 2, ...의 위치에 눈금을 설정합니다. set_xticklabels(리스트)로 각 눈금에 표시할 텍스트를 지정합니다. 라벨에 줄바꿈(\\n)을 사용하면 긴 라벨도 깔끔하게 표시됩니다.
  tips:
  - set_xticks(range(n))로 0, 1, 2, ...의 위치에 눈금을 설정합니다. set_xticklabels(리스트)로 각 눈금에 표시할 텍스트를 지정합니다. 라벨에 줄바꿈(\\n)을 사용하면 긴 라벨도 깔끔하게 표시됩니다.
  snippet: |-
    figTicks, axTicks = plt.subplots(figsize=(9, 7))
    im = axTicks.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
    plt.colorbar(im, ax=axTicks, label='상관계수')
    figTicks
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figTicks, axTicks = plt.subplots(figsize=(9, 7))
      im = axTicks.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axTicks, label='상관계수')
      figTicks
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_text
  title: 7단계. 셀에 값 표시
  structuredPrimary: true
  subtitle: ax.text()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 각 셀에 상관계수 값을 직접 표시하면 정확한 수치를 파악할 수 있습니다. 이중 for 루프로 모든 셀을 순회하며 text()로 값을 추가합니다. 배경색에 따라 텍스트 색상을 조절하면 가독성이 높아집니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    figText, axText = plt.subplots(figsize=(9, 7))
    im = axText.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
    plt.colorbar(im, ax=axText, label='상관계수')

    labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
    axText.set_xticks(range(len(labelsKr)))
    axText.set_yticks(range(len(labelsKr)))
    axText.set_xticklabels(labelsKr)
    axText.set_yticklabels(labelsKr)
    figText
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      figText, axText = plt.subplots(figsize=(9, 7))
      im = axText.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axText, label='상관계수')

      labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
      axText.set_xticks(range(len(labelsKr)))
      axText.set_yticks(range(len(labelsKr)))
      axText.set_xticklabels(labelsKr)
      axText.set_yticklabels(labelsKr)
      figText
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_annotate
  title: 8단계. 상관관계 해석
  structuredPrimary: true
  subtitle: 패턴 분석
