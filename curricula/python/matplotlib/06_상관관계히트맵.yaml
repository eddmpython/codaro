- id: summary
  title: 정리
  blocks:
  - type: text
    content: 히트맵으로 변수 간 상관관계를 분석했습니다.
  - type: list
    items:
    - ax.imshow(2D배열) - 행렬 데이터를 히트맵으로 시각화
    - cmap='coolwarm' - 발산형 컬러맵으로 양/음의 상관 구분
    - vmin, vmax - 색상 매핑 범위 설정
    - plt.colorbar(im, ax) - 색상 범례 추가
    - set_xticks(), set_xticklabels() - 축 눈금과 라벨 설정
    - ax.text() - 셀에 값 표시
    - df.corr() - pandas 상관행렬 계산
  - type: text
    content: 다음 시간에는 이중 축 차트로 시계열 데이터를 분석합니다.
- id: workflow_validation
  title: 업무 흐름 검증
  structuredPrimary: true
  subtitle: 보고서 차트 품질 게이트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: Matplotlib 학습은 차트를 그리는 데서 끝나면 부족합니다. 업무용 차트는 입력 데이터가 맞는지 검증하고, 잘못된 컬럼이나 음수 금액을 오류로 막고, 제목·축·범례·기준선이 실제 보고서 기준을 만족하는지 확인해야 합니다. 마지막에는 목표선을 바꾸는 변주로 메시지가 어떻게 달라지는지 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd
    import matplotlib.pyplot as plt

    reportData = pd.DataFrame({
        "month": ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
        "revenue": [82, 91, 105, 112, 121, 130],
        "cost": [55, 58, 62, 64, 68, 72],
        "target": [100, 100, 100, 100, 100, 100],
    })

    def validateChartFrame(frame: pd.DataFrame) -> bool:
        requiredColumns = {"month", "revenue", "cost", "target"}
        missingColumns = requiredColumns - set(frame.columns)
        if missingColumns:
            raise ValueError(f"필수 컬럼 누락: {sorted(missingColumns)}")
        if frame[["revenue", "cost", "target"]].lt(0).any().any():
            raise ValueError("금액 컬럼은 음수가 될 수 없습니다.")
        return True

    validateChartFrame(reportData)
    reportData
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      targetScenario = pd.DataFrame({"target": [95, 100, 115]}).assign(
          monthsPassed=lambda frame: frame["target"].map(lambda target: int((reportData["revenue"] >= target).sum()))
      )

      assert targetScenario["monthsPassed"].is_monotonic_decreasing
      targetScenario
    solution: |-
      import pandas as pd
      import matplotlib.pyplot as plt

      reportData = pd.DataFrame({
          "month": ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
          "revenue": [82, 91, 105, 112, 121, 130],
          "cost": [55, 58, 62, 64, 68, 72],
          "target": [100, 100, 100, 100, 100, 100],
      })

      def validateChartFrame(frame: pd.DataFrame) -> bool:
          requiredColumns = {"month", "revenue", "cost", "target"}
          missingColumns = requiredColumns - set(frame.columns)
          if missingColumns:
              raise ValueError(f"필수 컬럼 누락: {sorted(missingColumns)}")
          if frame[["revenue", "cost", "target"]].lt(0).any().any():
              raise ValueError("금액 컬럼은 음수가 될 수 없습니다.")
          return True

      validateChartFrame(reportData)
      reportData
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
