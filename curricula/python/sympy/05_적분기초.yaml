- id: step2_indefinite
  title: 2단계. 부정적분
  structuredPrimary: true
  subtitle: 원시함수 찾기
  goal: '2단계. 부정적분: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 부정적분: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    부정적분(indefinite integral)은 미분하면 원래 함수가 되는 원시함수(antiderivative)를 찾습니다. ∫x²dx = x³/3 + C인데, SymPy는 적분상수 C를 생략합니다. 적분 결과를 미분하면 원래 함수가 되어야 하므로, diff(F, x) == f인지 확인하면 검증할 수 있습니다. 부정적분은 정적분의 기초가 됩니다.

    ∫xⁿdx = xⁿ⁺¹/(n+1)입니다. x²을 적분하면 x³/3이 됩니다. 적분상수 +C는 SymPy에서 생략합니다.
  tips:
  - ∫xⁿdx = xⁿ⁺¹/(n+1)입니다. x²을 적분하면 x³/3이 됩니다. 적분상수 +C는 SymPy에서 생략합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: x = symbols('x')
  exercise:
    prompt: '2단계. 부정적분: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: x = symbols('x')
    solution: x = symbols('x')
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 부정적분(indefinite integral)은 미분하면 원래 함수가 되는 원시함수(antiderivative)를 찾습니다. ∫x²dx = x³/3 + C인데, SymPy는 적분상수 C를 생략합니다.
      적분 결과를 미분하면 원래 함수가 되어야 하므로, diff(F, x) == f인지 확인하면 검증할 수 있습니다. 부정적분은 정적분의 기초가 됩니다.
  - type: code
    language: python
    title: 기호 정의
    description: 변수 x를 정의합니다
    content: x = symbols('x')
  - type: code
    language: python
    title: 다항식 적분
    description: x²을 적분합니다
    content: |-
      f = x**2
      F = integrate(f, x)
      F
  - type: code
    language: python
    title: 적분 검증
    description: 미분하면 원래 함수가 됩니다
    content: |-
      check = diff(F, x)
      check
  - type: tip
    content: ∫xⁿdx = xⁿ⁺¹/(n+1)입니다. x²을 적분하면 x³/3이 됩니다. 적분상수 +C는 SymPy에서 생략합니다.
- id: step3_power
  title: 3단계. 거듭제곱 적분
  structuredPrimary: true
  subtitle: 다항식
  goal: '3단계. 거듭제곱 적분: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 거듭제곱 적분: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 거듭제곱 함수 xⁿ의 적분은 xⁿ⁺¹/(n+1)입니다(n≠-1). 다항식은 각 항을 따로 적분하고 더합니다. 3x² + 2x + 1을 적분하면 x³ + x² + x가 됩니다. 음의 거듭제곱 1/x²도
    같은 규칙으로 -1/x가 됩니다. 제곱근 √x = x^(1/2)도 (2/3)x^(3/2)로 적분됩니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    poly = 3*x**2 + 2*x + 1
    ipoly = integrate(poly, x)
    ipoly
  exercise:
    prompt: '3단계. 거듭제곱 적분: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      poly = 3*x**2 + 2*x + 1
      ipoly = integrate(poly, x)
      ipoly
    solution: |-
      poly = 3*x**2 + 2*x + 1
      ipoly = integrate(poly, x)
      ipoly
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 거듭제곱 함수 xⁿ의 적분은 xⁿ⁺¹/(n+1)입니다(n≠-1). 다항식은 각 항을 따로 적분하고 더합니다. 3x² + 2x + 1을 적분하면 x³ + x² + x가 됩니다. 음의 거듭제곱 1/x²도
      같은 규칙으로 -1/x가 됩니다. 제곱근 √x = x^(1/2)도 (2/3)x^(3/2)로 적분됩니다.
  - type: code
    language: python
    title: 다항식 적분
    description: 3x² + 2x + 1을 적분합니다
    content: |-
      poly = 3*x**2 + 2*x + 1
      ipoly = integrate(poly, x)
      ipoly
  - type: code
    language: python
    title: 음의 거듭제곱
    description: 1/x²를 적분합니다
    content: |-
      frac = 1/x**2
      ifrac = integrate(frac, x)
      ifrac
  - type: code
    language: python
    title: 제곱근
    description: √x를 적분합니다
    content: |-
      rootX = sqrt(x)
      iroot = integrate(rootX, x)
      iroot
- id: step4_special
  title: 4단계. 특수 함수 적분
  structuredPrimary: true
  subtitle: sin, cos, exp, 1/x
  goal: '4단계. 특수 함수 적분: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 특수 함수 적분: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    삼각함수와 지수함수의 적분은 미분의 역과정입니다. ∫sin(x)dx = -cos(x), ∫cos(x)dx = sin(x)입니다(미분의 부호가 바뀝니다). ∫eˣdx = eˣ로 지수함수는 자기 자신이 적분입니다. ∫(1/x)dx = ln|x|로 역수의 적분은 자연로그가 됩니다. 이 공식들은 미분 공식과 쌍을 이루어 암기해야 합니다.

    ∫sin x dx = -cos x, ∫cos x dx = sin x, ∫eˣdx = eˣ, ∫(1/x)dx = ln|x|입니다. 미분의 역입니다.
  tips:
  - ∫sin x dx = -cos x, ∫cos x dx = sin x, ∫eˣdx = eˣ, ∫(1/x)dx = ln|x|입니다. 미분의 역입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    isin = integrate(sin(x), x)
    icos = integrate(cos(x), x)
    isin, icos
  exercise:
    prompt: '4단계. 특수 함수 적분: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      isin = integrate(sin(x), x)
      icos = integrate(cos(x), x)
      isin, icos
    solution: |-
      isin = integrate(sin(x), x)
      icos = integrate(cos(x), x)
      isin, icos
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 삼각함수와 지수함수의 적분은 미분의 역과정입니다. ∫sin(x)dx = -cos(x), ∫cos(x)dx = sin(x)입니다(미분의 부호가 바뀝니다). ∫eˣdx = eˣ로 지수함수는 자기 자신이
      적분입니다. ∫(1/x)dx = ln|x|로 역수의 적분은 자연로그가 됩니다. 이 공식들은 미분 공식과 쌍을 이루어 암기해야 합니다.
  - type: code
    language: python
    title: 삼각함수 적분
    description: sin, cos을 적분합니다
    content: |-
      isin = integrate(sin(x), x)
      icos = integrate(cos(x), x)
      isin, icos
  - type: code
    language: python
    title: 지수함수 적분
    description: eˣ를 적분합니다
    content: |-
      iexp = integrate(exp(x), x)
      iexp
  - type: code
    language: python
    title: 역수 적분
    description: 1/x를 적분합니다
    content: |-
      ilog = integrate(1/x, x)
      ilog
  - type: tip
    content: ∫sin x dx = -cos x, ∫cos x dx = sin x, ∫eˣdx = eˣ, ∫(1/x)dx = ln|x|입니다. 미분의 역입니다.
- id: step5_definite
  title: 5단계. 정적분
  structuredPrimary: true
  subtitle: 구간 적분
  goal: '5단계. 정적분: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 정적분: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    정적분(definite integral)은 구간 [a, b]에서 곡선 아래의 넓이를 계산합니다. integrate(f, (x, a, b))로 구간을 지정합니다. 미적분학의 기본 정리에 따라 ∫[a,b]f(x)dx = F(b) - F(a)입니다. 물리학에서 속도를 시간에 대해 정적분하면 이동거리, 힘을 거리에 대해 정적분하면 일(work)이 됩니다.

    정적분 ∫[a,b] f(x)dx = F(b) - F(a)입니다. integrate(f, (x, a, b))로 계산합니다. 결과는 수치입니다.
  tips:
  - 정적분 ∫[a,b] f(x)dx = F(b) - F(a)입니다. integrate(f, (x, a, b))로 계산합니다. 결과는 수치입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    dint = integrate(x**2, (x, 0, 1))
    dint
  exercise:
    prompt: '5단계. 정적분: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      dint = integrate(x**2, (x, 0, 1))
      dint
    solution: |-
      dint = integrate(x**2, (x, 0, 1))
      dint
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 정적분(definite integral)은 구간 [a, b]에서 곡선 아래의 넓이를 계산합니다. integrate(f, (x, a, b))로 구간을 지정합니다. 미적분학의 기본 정리에 따라 ∫[a,b]f(x)dx
      = F(b) - F(a)입니다. 물리학에서 속도를 시간에 대해 정적분하면 이동거리, 힘을 거리에 대해 정적분하면 일(work)이 됩니다.
  - type: code
    language: python
    title: 정적분 기본
    description: x²을 0에서 1까지 적분합니다
    content: |-
      dint = integrate(x**2, (x, 0, 1))
