    language: python
    title: 두 함수
    description: y = x²와 y = x
    content: |-
      from sympy import solve
      f1 = x**2
      f2 = x
      f1, f2
  - type: code
    language: python
    title: 교점 찾기
    description: 두 함수가 만나는 점
    content: |-
      intersect = solve(f1 - f2, x)
      intersect
  - type: code
    language: python
    title: 넓이 계산
    description: 위 - 아래 적분
    content: |-
      between = integrate(f2 - f1, (x, 0, 1))
      between
  - type: tip
    content: 두 곡선 사이 넓이 = ∫[a,b] |f(x) - g(x)| dx입니다. 위쪽 함수에서 아래쪽 함수를 빼고 적분합니다.
