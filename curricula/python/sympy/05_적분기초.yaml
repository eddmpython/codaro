intro:
  emoji: 📊
  goal: integrate()로 부정적분과 정적분을 계산하고 넓이를 구합니다.
  description: 적분은 미분의 역연산이자 '누적'의 개념입니다. 속도를 적분하면 이동거리, 밀도를 적분하면 질량이 됩니다. 부정적분은 미분하면 원래 함수가 되는 원시함수를 찾고, 정적분은 곡선 아래의 넓이를
    정확하게 계산합니다. 손으로 적분하면 치환, 부분적분 등 복잡한 기법을 적용해야 하지만, SymPy의 integrate()는 이 모든 과정을 자동으로 처리합니다. 이 프로젝트를 완료하면 넓이, 부피, 두 곡선 사이
    넓이까지 구할 수 있게 됩니다.
