  check:
    noError: 9단계. 이중적분 코드가 예외 없이 끝나야 합니다.
    resultCheck: 9단계. 이중적분에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step10_area
  title: 10단계. 곡선 사이 넓이
  structuredPrimary: true
  subtitle: 응용 문제
  goal: 10단계. 곡선 사이 넓이에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    두 곡선 y=f(x)와 y=g(x) 사이의 넓이는 ∫[a,b](위쪽-아래쪽)dx로 계산합니다. 먼저 solve(f-g, x)로 교점을 구해 적분 구간 [a,b]를 결정합니다. y=x²와 y=x의 교점은 x=0, x=1이고, 그 사이 넓이는 ∫[0,1](x-x²)dx = 1/6입니다. 경제학에서 소비자잉여, 생산자잉여 계산에 이 기법을 사용합니다.

    두 곡선 사이 넓이 = ∫[a,b] |f(x) - g(x)| dx입니다. 위쪽 함수에서 아래쪽 함수를 빼고 적분합니다.
  tips:
  - 두 곡선 사이 넓이 = ∫[a,b] |f(x) - g(x)| dx입니다. 위쪽 함수에서 아래쪽 함수를 빼고 적분합니다.
  snippet: |-
    from sympy import solve
    f1 = x**2
    f2 = x
    f1, f2
  exercise:
    prompt: 10단계. 곡선 사이 넓이 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from sympy import solve
      f1 = x**2
      f2 = x
      f1, f2
    hints:
    - 10단계. 곡선 사이 넓이 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 10단계. 곡선 사이 넓이 코드가 예외 없이 끝나야 합니다.
    resultCheck: 10단계. 곡선 사이 넓이에서 바꾼 입력값이 결과에 반영되어야 합니다.
