meta:
  id: sympy_05
  title: 적분기초
  order: 5
  category: sympy
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["sympy", "integrate", "적분", "정적분", "부정적분", "넓이"]
  seo:
    title: "SymPy 적분 - integrate 사용법과 넓이 계산"
    description: "SymPy로 부정적분과 정적분을 계산합니다. integrate()로 넓이와 부피를 구하는 방법을 배웁니다."
    keywords: ["sympy", "integrate", "적분", "정적분", "부정적분", "넓이"]

intro:
  emoji: "📊"
  goal: integrate()로 부정적분과 정적분을 계산하고 넓이를 구합니다.
  description: "적분은 미분의 역연산이자 '누적'의 개념입니다. 속도를 적분하면 이동거리, 밀도를 적분하면 질량이 됩니다. 부정적분은 미분하면 원래 함수가 되는 원시함수를 찾고, 정적분은 곡선 아래의 넓이를 정확하게 계산합니다. 손으로 적분하면 치환, 부분적분 등 복잡한 기법을 적용해야 하지만, SymPy의 integrate()는 이 모든 과정을 자동으로 처리합니다. 이 프로젝트를 완료하면 넓이, 부피, 두 곡선 사이 넓이까지 구할 수 있게 됩니다."

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: "적분에 필요한 함수들을 불러옵니다. integrate()가 핵심 함수이며, diff()로 적분 결과를 검증할 수 있습니다. oo는 무한대(infinity)를 나타내며 이상적분에 사용합니다. Rational은 분수 계수를 정확하게 표현합니다."
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: sympy 함수들을 불러옵니다
    content: |-
      from sympy import symbols, integrate, diff, simplify, expand
      from sympy import sin, cos, exp, log, sqrt, pi, oo, Rational
      from sympy import init_printing
      init_printing()

- id: step2_indefinite
  title: 2단계. 부정적분
  subtitle: 원시함수 찾기
  blocks:
  - type: text
    content: "부정적분(indefinite integral)은 미분하면 원래 함수가 되는 원시함수(antiderivative)를 찾습니다. ∫x²dx = x³/3 + C인데, SymPy는 적분상수 C를 생략합니다. 적분 결과를 미분하면 원래 함수가 되어야 하므로, diff(F, x) == f인지 확인하면 검증할 수 있습니다. 부정적분은 정적분의 기초가 됩니다."
  - type: code
    language: python
    title: 기호 정의
    description: 변수 x를 정의합니다
    content: |-
      x = symbols('x')
  - type: code
    language: python
    title: 다항식 적분
    description: x²을 적분합니다
    content: |-
      f = x**2
      F = integrate(f, x)
      F
  - type: code
    language: python
    title: 적분 검증
    description: 미분하면 원래 함수가 됩니다
    content: |-
      check = diff(F, x)
      check
  - type: tip
    content: ∫xⁿdx = xⁿ⁺¹/(n+1)입니다. x²을 적분하면 x³/3이 됩니다. 적분상수 +C는 SymPy에서 생략합니다.

- id: step3_power
  title: 3단계. 거듭제곱 적분
  subtitle: 다항식
  blocks:
  - type: text
    content: "거듭제곱 함수 xⁿ의 적분은 xⁿ⁺¹/(n+1)입니다(n≠-1). 다항식은 각 항을 따로 적분하고 더합니다. 3x² + 2x + 1을 적분하면 x³ + x² + x가 됩니다. 음의 거듭제곱 1/x²도 같은 규칙으로 -1/x가 됩니다. 제곱근 √x = x^(1/2)도 (2/3)x^(3/2)로 적분됩니다."
  - type: code
    language: python
    title: 다항식 적분
    description: 3x² + 2x + 1을 적분합니다
    content: |-
      poly = 3*x**2 + 2*x + 1
      ipoly = integrate(poly, x)
      ipoly
  - type: code
    language: python
    title: 음의 거듭제곱
    description: 1/x²를 적분합니다
    content: |-
      frac = 1/x**2
      ifrac = integrate(frac, x)
      ifrac
  - type: code
    language: python
    title: 제곱근
    description: √x를 적분합니다
    content: |-
      rootX = sqrt(x)
      iroot = integrate(rootX, x)
      iroot

- id: step4_special
  title: 4단계. 특수 함수 적분
  subtitle: sin, cos, exp, 1/x
  blocks:
  - type: text
    content: "삼각함수와 지수함수의 적분은 미분의 역과정입니다. ∫sin(x)dx = -cos(x), ∫cos(x)dx = sin(x)입니다(미분의 부호가 바뀝니다). ∫eˣdx = eˣ로 지수함수는 자기 자신이 적분입니다. ∫(1/x)dx = ln|x|로 역수의 적분은 자연로그가 됩니다. 이 공식들은 미분 공식과 쌍을 이루어 암기해야 합니다."
  - type: code
    language: python
    title: 삼각함수 적분
    description: sin, cos을 적분합니다
    content: |-
      isin = integrate(sin(x), x)
      icos = integrate(cos(x), x)
      isin, icos
  - type: code
    language: python
    title: 지수함수 적분
    description: eˣ를 적분합니다
    content: |-
      iexp = integrate(exp(x), x)
      iexp
  - type: code
    language: python
    title: 역수 적분
    description: 1/x를 적분합니다
    content: |-
      ilog = integrate(1/x, x)
      ilog
  - type: tip
    content: ∫sin x dx = -cos x, ∫cos x dx = sin x, ∫eˣdx = eˣ, ∫(1/x)dx = ln|x|입니다. 미분의 역입니다.

- id: step5_definite
  title: 5단계. 정적분
  subtitle: 구간 적분
  blocks:
  - type: text
    content: "정적분(definite integral)은 구간 [a, b]에서 곡선 아래의 넓이를 계산합니다. integrate(f, (x, a, b))로 구간을 지정합니다. 미적분학의 기본 정리에 따라 ∫[a,b]f(x)dx = F(b) - F(a)입니다. 물리학에서 속도를 시간에 대해 정적분하면 이동거리, 힘을 거리에 대해 정적분하면 일(work)이 됩니다."
  - type: code
    language: python
    title: 정적분 기본
    description: x²을 0에서 1까지 적분합니다
    content: |-
      dint = integrate(x**2, (x, 0, 1))
      dint
  - type: code
    language: python
    title: 넓이 계산
    description: 구간의 넓이를 구합니다
    content: |-
      area1 = integrate(x, (x, 0, 2))
      area1
  - type: code
    language: python
    title: 삼각함수 정적분
    description: sin x를 0에서 π까지 적분합니다
    content: |-
      area2 = integrate(sin(x), (x, 0, pi))
      area2
  - type: tip
    content: "정적분 ∫[a,b] f(x)dx = F(b) - F(a)입니다. integrate(f, (x, a, b))로 계산합니다. 결과는 수치입니다."

- id: step6_improper
  title: 6단계. 이상적분
  subtitle: 무한 구간
  blocks:
  - type: text
    content: "이상적분(improper integral)은 적분 구간이 무한대까지 확장된 경우입니다. oo를 사용하여 ∫[0,∞]e⁻ˣdx = 1처럼 계산합니다. 함수가 충분히 빨리 0으로 감소해야 수렴하여 유한한 값이 나옵니다. 가우스 적분 ∫[-∞,∞]e⁻ˣ²dx = √π는 확률론과 통계학의 기초가 되는 유명한 결과입니다."
  - type: code
    language: python
    title: 무한 구간 적분
    description: e⁻ˣ를 0에서 ∞까지 적분합니다
    content: |-
      improper1 = integrate(exp(-x), (x, 0, oo))
      improper1
  - type: code
    language: python
    title: 가우스 적분
    description: e⁻ˣ²를 -∞에서 ∞까지 적분합니다
    content: |-
      gauss = integrate(exp(-x**2), (x, -oo, oo))
      gauss
  - type: tip
    content: e⁻ˣ² 의 적분은 √π입니다. 이것은 유명한 가우스 적분으로, 확률론과 통계학에서 중요합니다.

- id: step7_substitution
  title: 7단계. 치환적분
  subtitle: 합성함수 적분
  blocks:
  - type: text
    content: "치환적분(substitution)은 합성함수 형태를 적분하는 기법입니다. ∫2x·e^(x²)dx에서 u=x²로 치환하면 ∫eᵘdu = eᵘ = e^(x²)가 됩니다. 손으로 하면 u=..., du/dx=... 과정이 복잡하지만, SymPy는 자동으로 적절한 치환을 찾아 적용합니다. 1/(1+x²)의 적분은 arctan(x)로, 역삼각함수가 등장합니다."
  - type: code
    language: python
    title: 치환적분 예
    description: 2x×e^(x²)를 적분합니다
    content: |-
      subst1 = 2*x * exp(x**2)
      intSubst1 = integrate(subst1, x)
      intSubst1
  - type: code
    language: python
    title: 삼각 치환
    description: sin(x)cos(x)를 적분합니다
    content: |-
      subst2 = sin(x) * cos(x)
      intSubst2 = integrate(subst2, x)
      intSubst2
  - type: code
    language: python
    title: 역함수 치환
    description: 1/(1+x²)를 적분합니다
    content: |-
      subst3 = 1/(1 + x**2)
      intSubst3 = integrate(subst3, x)
      intSubst3
  - type: tip
    content: 1/(1+x²)의 적분은 arctan(x)입니다. SymPy에서는 atan(x)로 표시됩니다. 역삼각함수의 미분과 연결됩니다.

- id: step8_parts
  title: 8단계. 부분적분
  subtitle: 곱의 적분
  blocks:
  - type: text
    content: "부분적분(integration by parts)은 곱의 적분 기법입니다. ∫u·dv = uv - ∫v·du 공식을 적용합니다. ∫x·eˣdx처럼 다항식×지수함수, ∫x·sin(x)dx처럼 다항식×삼각함수 형태에 유용합니다. ∫ln(x)dx는 u=ln(x), dv=dx로 놓아 x·ln(x)-x가 됩니다. SymPy는 적절한 u와 dv를 자동으로 선택합니다."
  - type: code
    language: python
    title: x×eˣ 적분
    description: 부분적분으로 계산합니다
    content: |-
      parts1 = x * exp(x)
      intParts1 = integrate(parts1, x)
      intParts1
  - type: code
    language: python
    title: x×sin(x) 적분
    description: 삼각함수와 다항식 곱
    content: |-
      parts2 = x * sin(x)
      intParts2 = integrate(parts2, x)
      intParts2
  - type: code
    language: python
    title: ln(x) 적분
    description: 로그함수 적분
    content: |-
      intLnx = integrate(log(x), x)
      intLnx

- id: step9_double
  title: 9단계. 이중적분
  subtitle: 넓이와 부피
  blocks:
  - type: text
    content: "이중적분(double integral)은 두 변수에 대해 연속으로 적분합니다. ∬f(x,y)dxdy로 평면 영역의 넓이나 3D 입체의 부피를 계산합니다. integrate(f, (x, a, b), (y, c, d))는 먼저 x로 적분(내부)하고 그 결과를 y로 적분(외부)합니다. 단위원의 넓이 ∬1 dA = π를 이중적분으로 확인할 수 있습니다."
  - type: code
    language: python
    title: 두 변수 정의
    description: x, y를 정의합니다
    content: |-
      y = symbols('y')
  - type: code
    language: python
    title: 이중적분 기본
    description: xy를 적분합니다
    content: |-
      double1 = integrate(x*y, (x, 0, 1), (y, 0, 2))
      double1
  - type: code
    language: python
    title: 원의 넓이
    description: x² + y² ≤ 1인 영역
    content: |-
      circle = integrate(1, (y, -sqrt(1 - x**2), sqrt(1 - x**2)), (x, -1, 1))
      circle
  - type: tip
    content: integrate(f, (x, a, b), (y, c, d))는 먼저 x로, 다음 y로 적분합니다. 순서대로 내부에서 외부로 계산합니다.

- id: step10_area
  title: 10단계. 곡선 사이 넓이
  subtitle: 응용 문제
  blocks:
  - type: text
    content: "두 곡선 y=f(x)와 y=g(x) 사이의 넓이는 ∫[a,b](위쪽-아래쪽)dx로 계산합니다. 먼저 solve(f-g, x)로 교점을 구해 적분 구간 [a,b]를 결정합니다. y=x²와 y=x의 교점은 x=0, x=1이고, 그 사이 넓이는 ∫[0,1](x-x²)dx = 1/6입니다. 경제학에서 소비자잉여, 생산자잉여 계산에 이 기법을 사용합니다."
  - type: code
    language: python
    title: 두 함수
    description: y = x²와 y = x
    content: |-
      from sympy import solve
      f1 = x**2
      f2 = x
      f1, f2
  - type: code
    language: python
    title: 교점 찾기
    description: 두 함수가 만나는 점
    content: |-
      intersect = solve(f1 - f2, x)
      intersect
  - type: code
    language: python
    title: 넓이 계산
    description: 위 - 아래 적분
    content: |-
      between = integrate(f2 - f1, (x, 0, 1))
      between
  - type: tip
    content: 두 곡선 사이 넓이 = ∫[a,b] |f(x) - g(x)| dx입니다. 위쪽 함수에서 아래쪽 함수를 빼고 적분합니다.

- id: practice
  title: 실습
  subtitle: 적분 연습
  blocks:
  - type: text
    content: "지금까지 배운 integrate, diff, solve를 모두 활용하여 실전 문제를 풀어봅시다. 미션1은 다항식, 삼각함수, 지수함수의 적분과 정적분 계산입니다. 미션2는 두 곡선의 교점을 찾고 그 사이 넓이를 계산합니다. 반원의 넓이를 적분으로 확인하는 문제도 포함되어 있습니다."
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 다양한 적분 계산"
    blocks:
    - type: code
      title: "다항식 적분"
      content: |-
        from sympy import symbols, integrate, sin, cos, exp, sqrt, pi

        r = symbols('r')

        poly = integrate(r**3 - 2*r + 1, r)
        poly
    - type: code
      title: "삼각함수 적분"
      content: |-
        trig = integrate(sin(r)**2, r)
        trig
    - type: code
      title: "정적분 계산"
      content: |-
        definite = integrate(exp(-r), (r, 0, 5))
        definite.evalf()
  - type: expansion
    title: "미션2: 넓이 계산"
    blocks:
    - type: code
      title: "교점 찾기"
      content: |-
        from sympy import symbols, integrate, solve, sqrt

        s = symbols('s')

        parabola = 4 - s**2
        linear = s + 2
        intersect = solve(parabola - linear, s)
        intersect
    - type: code
      title: "두 곡선 사이 넓이"
      content: |-
        lo, hi = intersect[0], intersect[1]
        region = integrate(parabola - linear, (s, lo, hi))
        region
    - type: code
      title: "반원 넓이"
      content: |-
        semicircle = integrate(sqrt(4 - s**2), (s, -2, 2))
        semicircle
