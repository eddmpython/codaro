- id: step2_limit_basic
  title: 2단계. 기본 극한
  structuredPrimary: true
  subtitle: limit()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    limit(f, x, a)는 x가 a에 가까워질 때 f(x)의 극한값을 계산합니다. x=a에서 함수값이 정의되지 않아도 극한은 존재할 수 있습니다. (x²-1)/(x-1)에 x=1을 대입하면 0/0이지만, 인수분해하면 x+1이 되어 극한값은 2입니다. limit()는 이런 부정형을 자동으로 처리합니다.

    (x²-1)/(x-1)에 x=1을 대입하면 0/0이지만, 인수분해하면 x+1이 되어 극한값은 2입니다. limit()가 자동 처리합니다.
  tips:
  - (x²-1)/(x-1)에 x=1을 대입하면 0/0이지만, 인수분해하면 x+1이 되어 극한값은 2입니다. limit()가 자동 처리합니다.
  snippet: x = symbols('x')
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: x = symbols('x')
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_infinity
  title: 3단계. 무한대 극한
  structuredPrimary: true
  subtitle: x → ∞
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: x가 무한대로 갈 때의 극한은 함수의 장기적 행동을 보여줍니다. limit(1/x, x, oo) = 0으로 x가 커지면 1/x는 0에 가까워집니다. 유리함수 (2x+1)/(x+3)의 극한은 최고차항 계수의 비인 2입니다. 발산하는 경우 oo 또는 -oo가 반환됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    lim3 = limit(1/x, x, oo)
    lim3
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      lim3 = limit(1/x, x, oo)
      lim3
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_sided
  title: 4단계. 좌극한과 우극한
  structuredPrimary: true
  subtitle: 방향 지정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수가 불연속인 점에서는 왼쪽에서 접근하는 값(좌극한)과 오른쪽에서 접근하는 값(우극한)이 다를 수 있습니다. 1/x의 x→0 극한은 오른쪽에서 +∞, 왼쪽에서 -∞입니다. limit(f, x, a, '+')는 우극한, limit(f, x, a, '-')는 좌극한입니다. 좌극한과 우극한이 같을 때만 극한이 존재합니다.

    dir='+' 또는 '+'는 오른쪽(양의 방향)에서 접근합니다. dir='-' 또는 '-'는 왼쪽(음의 방향)에서 접근합니다.
  tips:
  - dir='+' 또는 '+'는 오른쪽(양의 방향)에서 접근합니다. dir='-' 또는 '-'는 왼쪽(음의 방향)에서 접근합니다.
  snippet: |-
    lright = limit(1/x, x, 0, '+')
    lright
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      lright = limit(1/x, x, 0, '+')
      lright
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_special
  title: 5단계. 특수 극한
  structuredPrimary: true
  subtitle: 유명한 극한
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 미적분에서 반복적으로 등장하는 유명한 극한들이 있습니다. lim[x→0] sin(x)/x = 1은 삼각함수 미분의 기초입니다. lim[n→∞] (1+1/n)ⁿ = e는 자연상수 e의 정의입니다. lim[x→0] (eˣ-1)/x = 1은 지수함수 미분에 사용됩니다. 이 극한들은 암기할 가치가 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    lsin = limit(sin(x)/x, x, 0)
    lsin
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      lsin = limit(sin(x)/x, x, 0)
      lsin
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_series
  title: 6단계. 테일러 급수
  structuredPrimary: true
  subtitle: series()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    테일러 급수(Taylor series)는 함수를 다항식으로 근사합니다. eˣ = 1 + x + x²/2! + x³/3! + ..., sin(x) = x - x³/6 + x⁵/120 - ...입니다. series(f, x, 0, n)은 x=0에서 n항까지 전개합니다. 결과에 O(xⁿ)은 오차항을 나타냅니다. 컴퓨터가 삼각함수를 계산할 때 실제로 테일러 급수를 사용합니다.

    series(f, x, 0, n)은 x=0에서 n항까지 전개합니다. O(x^n)은 나머지 오차항입니다. removeO()로 제거할 수 있습니다.
  tips:
  - series(f, x, 0, n)은 x=0에서 n항까지 전개합니다. O(x^n)은 나머지 오차항입니다. removeO()로 제거할 수 있습니다.
  snippet: |-
    sexp = series(exp(x), x, 0, 6)
    sexp
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      sexp = series(exp(x), x, 0, 6)
      sexp
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_remove_o
  title: 7단계. 급수 활용
  structuredPrimary: true
  subtitle: 다항식 추출
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    series() 결과에서 removeO()를 호출하면 오차항 O(xⁿ)을 제거하고 순수한 다항식을 얻습니다. 이 다항식으로 원래 함수를 근사할 수 있습니다. sin(0.5)의 정확한 값 0.479...과 테일러 다항식의 근사값을 비교하면 매우 가깝습니다. 항이 많을수록 더 넓은 범위에서 정확하게 근사합니다.

    테일러 다항식은 중심 근처에서 원래 함수를 잘 근사합니다. 항이 많을수록 더 넓은 범위에서 정확합니다.
  tips:
  - 테일러 다항식은 중심 근처에서 원래 함수를 잘 근사합니다. 항이 많을수록 더 넓은 범위에서 정확합니다.
  snippet: |-
    spoly = series(sin(x), x, 0, 7).removeO()
    spoly
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      spoly = series(sin(x), x, 0, 7).removeO()
      spoly
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_summation
  title: 8단계. 급수 합
  structuredPrimary: true
  subtitle: summation()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    summation()은 Σ 기호로 표현되는 급수의 합을 계산합니다. summation(k, (k, 1, 10))은 1+2+...+10 = 55입니다. 변수 n을 사용하면 1+2+...+n = n(n+1)/2 같은 공식을 유도합니다. 무한급수도 수렴하면 정확한 값을 반환합니다. 기하급수 Σ(1/2)ᵏ = 2입니다.

    summation(f, (k, a, b))는 k=a부터 k=b까지의 합입니다. b=oo로 무한급수를 계산합니다. 수렴하면 값을 반환합니다.
  tips:
  - summation(f, (k, a, b))는 k=a부터 k=b까지의 합입니다. b=oo로 무한급수를 계산합니다. 수렴하면 값을 반환합니다.
  snippet: |-
    n, k = symbols('n k')
    fsum = summation(k, (k, 1, 10))
    fsum
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      n, k = symbols('n k')
      fsum = summation(k, (k, 1, 10))
      fsum
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_famous
  title: 9단계. 유명한 급수
  structuredPrimary: true
  subtitle: 바젤 문제 등
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 수학사에서 중요한 급수들을 SymPy로 검증합니다. 바젤 문제 Σ(1/n²)은 1735년 오일러가 π²/6임을 증명하여 수학계를 놀라게 했습니다. 조화급수 Σ(1/n)은 발산하여 무한대가 됩니다. 1/n²은 수렴하는데 1/n은 발산하는 이유는 항의 감소 속도 차이 때문입니다. 교대급수 Σ((-1)ⁿ/n)은 ln(2)에 수렴합니다. 이런 급수들은 해석학의 기초 예제로 널리 사용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    basel = summation(1/n**2, (n, 1, oo))
    basel
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      basel = summation(1/n**2, (n, 1, oo))
      basel
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step10_combine
  title: 10단계. 극한과 급수 연결
  structuredPrimary: true
  subtitle: 종합
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 극한과 급수는 미적분학의 근간입니다. 미분의 정의 f'(x) = lim[h→0] (f(x+h)-f(x))/h는 극한으로 정의됩니다. x=2에서 x²의 미분값 4를 극한 정의로 계산하면 limit((f(2+h)-f(2))/h, h, 0) = 4입니다. 자연상수 e도 급수 Σ(1/n!)으로 정의됩니다. SymPy는 미분을 극한 정의 없이 diff()로 바로 계산하지만, 극한 정의를 이해하면 미분의 본질을 알 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from sympy import diff
    h = symbols('h')
    f = x**2
    ddef = limit((f.subs(x, 2+h) - f.subs(x, 2))/h, h, 0)
    ddef
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      from sympy import diff
      h = symbols('h')
      f = x**2
      ddef = limit((f.subs(x, 2+h) - f.subs(x, 2))/h, h, 0)
      ddef
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 극한과 급수 연습
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    이제 limit(), series(), summation()을 종합적으로 활용합니다. 미션1에서는 다양한 부정형 극한을 계산합니다. (1-cos(u))/u²은 0/0형태이고, u·log(u)는 0·(-∞)형태입니다. 미션2에서는 ln(1+v)와 √(1+v)의 테일러 급수를 구하고, 1/k⁴의 무한합이 π⁴/90임을 확인합니다. 이런 계산은 물리학의 근사 계산, 수치해석의 오차 분석에 필수적입니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
