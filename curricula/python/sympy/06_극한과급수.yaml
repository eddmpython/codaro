intro:
  emoji: ∞
  goal: limit()로 극한값을 계산하고 series()로 급수 전개를 수행합니다.
  description: 극한(limit)은 해석학의 기초로, 함수가 특정 점에 가까워질 때의 값을 정의합니다. (x²-1)/(x-1)은 x=1에서 0/0이지만 극한값은 2입니다. 급수(series)는 무한 합을 다루고, 테일러 급수는 sin(x), eˣ 같은 함수를 다항식으로 근사합니다. 이 개념들은 미분과 적분의 엄밀한 정의, 함수의 근사, 수치 계산의 기초가 됩니다. 이 프로젝트를 완료하면 극한값 계산, 급수 전개, 무한급수의 합까지 다룰 수 있게 됩니다.
