      특이행렬로 역행렬이 없습니다. 역행렬 A⁻¹은 A*A⁻¹ = A⁻¹*A = I를 만족합니다. 연립방정식 Ax=b의 해는 x=A⁻¹b로 구할 수 있습니다.
  - type: code
    language: python
