    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 특수 행렬은 선형대수에서 중요한 역할을 합니다. 단위행렬 I = eye(n)은 곱해도 원래 행렬이 변하지 않는 항등원입니다. AI = IA = A입니다. zeros(m,n)은 영행렬로 덧셈의 항등원입니다.
      diag(1,2,3)은 대각선에만 값이 있는 대각행렬로, 스케일링 변환을 표현합니다. 대각행렬의 행렬식은 대각 원소의 곱입니다.
  - type: code
    language: python
    title: 단위행렬
    description: 3×3 단위행렬
    content: |-
      identity = eye(3)
      identity
  - type: code
    language: python
    title: 영행렬
    description: 2×3 영행렬
    content: |-
      zero = zeros(2, 3)
      zero
  - type: code
    language: python
    title: 대각행렬
    description: 대각 원소 지정
    content: |-
      diagonal = diag(1, 2, 3)
      diagonal
- id: step4_operations
  title: 4단계. 기본 연산
  structuredPrimary: true
  subtitle: 덧셈, 곱셈
  goal: '4단계. 기본 연산: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 기본 연산: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    행렬 연산은 원소별이 아닌 선형대수 규칙을 따릅니다. 덧셈 A+B는 같은 크기의 행렬끼리만 가능하고 원소별로 더합니다. 스칼라곱 2A는 모든 원소에 2를 곱합니다. 행렬곱 AB는 A의 열 수와 B의 행 수가 같아야 합니다. 중요한 것은 AB ≠ BA로 교환법칙이 성립하지 않습니다. 이 비교환성이 행렬만의 특성입니다.

    행렬 곱 AB ≠ BA입니다. 행렬 곱은 교환법칙이 성립하지 않습니다. 곱셈 순서에 주의하세요.
  tips:
  - 행렬 곱 AB ≠ BA입니다. 행렬 곱은 교환법칙이 성립하지 않습니다. 곱셈 순서에 주의하세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    matA = Matrix([[1, 2], [3, 4]])
    matB = Matrix([[5, 6], [7, 8]])
    matA, matB
  exercise:
    prompt: '4단계. 기본 연산: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      matA = Matrix([[1, 2], [3, 4]])
      matB = Matrix([[5, 6], [7, 8]])
      matA, matB
    solution: |-
      matA = Matrix([[1, 2], [3, 4]])
      matB = Matrix([[5, 6], [7, 8]])
      matA, matB
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 행렬 연산은 원소별이 아닌 선형대수 규칙을 따릅니다. 덧셈 A+B는 같은 크기의 행렬끼리만 가능하고 원소별로 더합니다. 스칼라곱 2A는 모든 원소에 2를 곱합니다. 행렬곱 AB는 A의 열 수와 B의
      행 수가 같아야 합니다. 중요한 것은 AB ≠ BA로 교환법칙이 성립하지 않습니다. 이 비교환성이 행렬만의 특성입니다.
  - type: code
    language: python
    title: 두 행렬 정의
    description: 연산할 행렬 생성
    content: |-
      matA = Matrix([[1, 2], [3, 4]])
      matB = Matrix([[5, 6], [7, 8]])
      matA, matB
  - type: code
    language: python
    title: 행렬 덧셈
    description: A + B
    content: |-
      msum = matA + matB
      msum
  - type: code
    language: python
    title: 스칼라 곱
    description: 2 × A
    content: |-
      scaled = 2 * matA
      scaled
  - type: code
    language: python
    title: 행렬 곱
    description: A × B
    content: |-
      prod = matA * matB
      prod
  - type: tip
    content: 행렬 곱 AB ≠ BA입니다. 행렬 곱은 교환법칙이 성립하지 않습니다. 곱셈 순서에 주의하세요.
- id: step5_transpose
  title: 5단계. 전치와 거듭제곱
  structuredPrimary: true
  subtitle: T, **n
  goal: '5단계. 전치와 거듭제곱: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 전치와 거듭제곱: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 전치행렬 Aᵀ는 행과 열을 바꾼 행렬입니다. 2×3 행렬의 전치는 3×2가 됩니다. .T 속성으로 접근합니다. (AB)ᵀ = BᵀAᵀ 규칙이 중요합니다. 거듭제곱 A²는 A*A, A³는 A*A*A입니다.
    정사각행렬만 거듭제곱이 가능합니다. A⁻¹은 역행렬로 A*A⁻¹ = I입니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    mat3 = Matrix([[1, 2, 3], [4, 5, 6]])
    transposed = mat3.T
    transposed
  exercise:
    prompt: '5단계. 전치와 거듭제곱: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      mat3 = Matrix([[1, 2, 3], [4, 5, 6]])
      transposed = mat3.T
      transposed
    solution: |-
      mat3 = Matrix([[1, 2, 3], [4, 5, 6]])
      transposed = mat3.T
      transposed
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
