  structuredPrimary: true
  subtitle: import
  goal: '1단계. 라이브러리 불러오기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 라이브러리 불러오기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 행렬 작업에 필요한 함수들을 불러옵니다. Matrix()는 행렬을 생성하는 핵심 클래스입니다. eye(n)은 n×n 단위행렬, zeros(m,n)은 m×n 영행렬, ones(m,n)은 모든 원소가
    1인 행렬입니다. diag()는 대각행렬을 생성합니다. 이 함수들은 NumPy와 유사하지만 기호 연산이 가능합니다.
