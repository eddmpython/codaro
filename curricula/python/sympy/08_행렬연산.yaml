- id: step6_det_inv
  title: 6단계. 행렬식과 역행렬
  structuredPrimary: true
  subtitle: det(), inv()
  goal: '6단계. 행렬식과 역행렬: 실행 가능한 Python 흐름으로 익힌다.'
