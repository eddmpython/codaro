  blocks:
  - type: text
    content: 고유값 λ와 고유벡터 v는 Av = λv를 만족합니다. 이는 행렬 A가 벡터 v를 λ배로 스케일링만 한다는 의미입니다. 고유값은 특성방정식 det(A-λI)=0을 풀어 구합니다. eigenvals()는
      고유값과 중복도를, eigenvects()는 고유벡터까지 반환합니다. diagonalize()는 P⁻¹AP=D 형태로 대각화하여 거듭제곱 계산을 간단하게 합니다. 이 개념은 PCA, 진동 분석에 핵심입니다.
  - type: code
    language: python
    title: 고유값
    description: 고유값 계산
