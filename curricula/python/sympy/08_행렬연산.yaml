- id: step2_create
  title: 2단계. 행렬 생성
  structuredPrimary: true
  subtitle: Matrix()
  goal: '2단계. 행렬 생성: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 행렬 생성: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Matrix()는 중첩 리스트로 행렬을 생성합니다. Matrix([[1,2],[3,4]])는 2×2 행렬로, 첫 번째 리스트 [1,2]가 첫 번째 행, [3,4]가 두 번째 행입니다. Matrix([1,2,3])처럼 1차원 리스트를 전달하면 3×1 열벡터가 됩니다. 행렬의 크기는 .shape으로, 개별 원소는 [i,j] 인덱싱으로 접근합니다.

    Matrix([[a, b], [c, d]])는 2×2 행렬입니다. Matrix([a, b, c])는 3×1 열벡터입니다.
  tips:
  - Matrix([[a, b], [c, d]])는 2×2 행렬입니다. Matrix([a, b, c])는 3×1 열벡터입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    mat1 = Matrix([[1, 2], [3, 4]])
    mat1
  exercise:
    prompt: '2단계. 행렬 생성: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      mat1 = Matrix([[1, 2], [3, 4]])
      mat1
    solution: |-
      mat1 = Matrix([[1, 2], [3, 4]])
      mat1
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Matrix()는 중첩 리스트로 행렬을 생성합니다. Matrix([[1,2],[3,4]])는 2×2 행렬로, 첫 번째 리스트 [1,2]가 첫 번째 행, [3,4]가 두 번째 행입니다. Matrix([1,2,3])처럼
      1차원 리스트를 전달하면 3×1 열벡터가 됩니다. 행렬의 크기는 .shape으로, 개별 원소는 [i,j] 인덱싱으로 접근합니다.
  - type: code
    language: python
    title: 2×2 행렬
    description: 2행 2열 행렬 생성
    content: |-
      mat1 = Matrix([[1, 2], [3, 4]])
      mat1
  - type: code
    language: python
    title: 3×3 행렬
    description: 3행 3열 행렬 생성
    content: |-
      mat2 = Matrix([[1, 2, 3], [4, 5, 6], [7, 8, 9]])
      mat2
  - type: code
    language: python
    title: 열벡터
    description: 3×1 열벡터
    content: |-
      vec = Matrix([1, 2, 3])
