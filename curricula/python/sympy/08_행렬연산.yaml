  structuredPrimary: true
  subtitle: eye, zeros, ones
  goal: '3단계. 특수 행렬: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 특수 행렬: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 특수 행렬은 선형대수에서 중요한 역할을 합니다. 단위행렬 I = eye(n)은 곱해도 원래 행렬이 변하지 않는 항등원입니다. AI = IA = A입니다. zeros(m,n)은 영행렬로 덧셈의
    항등원입니다. diag(1,2,3)은 대각선에만 값이 있는 대각행렬로, 스케일링 변환을 표현합니다. 대각행렬의 행렬식은 대각 원소의 곱입니다.
  tips:
