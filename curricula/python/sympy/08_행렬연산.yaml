intro:
  emoji: 🔢
  goal: Matrix()로 행렬을 다루고 선형대수 계산을 수행합니다.
  description: 행렬은 선형대수의 핵심으로, 데이터 과학, 머신러닝, 컴퓨터 그래픽스의 기초입니다. 2×2 행렬 [[a,b],[c,d]]는 2차원 공간의 선형 변환을 표현하고, 3×3 행렬은 3D 회전과 스케일링에
    사용됩니다. 역행렬 A⁻¹은 변환의 취소, 행렬식 det(A)는 변환의 스케일 팩터를 의미합니다. 고유값과 고유벡터는 주성분 분석(PCA)의 기초가 됩니다. 이 프로젝트를 완료하면 행렬 연산, 연립방정식 풀이,
    고유값 분석까지 다룰 수 있게 됩니다.
