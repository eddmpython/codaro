- id: step3_multiple
  title: 3단계. 여러 함수
  structuredPrimary: true
  subtitle: 동시 그리기
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 여러 함수를 한 그래프에 비교하면 관계가 명확해집니다. plot(f1, f2, f3, (x, a, b))로 여러 함수를 동시에 그립니다. legend=True로 범례를 표시하고, p[0].label로 각 함수에 이름을 붙입니다. sin(x)와 cos(x)를 비교하면 π/2의 위상차를 볼 수 있고, x, x², x³을 비교하면 거듭제곱에 따른 성장 속도 차이를 확인합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    p2 = plot(sin(x), cos(x), (x, -2*pi, 2*pi), legend=True, show=False)
    p2[0].label = 'sin(x)'
    p2[1].label = 'cos(x)'
    p2.show()
