  emoji: 📊
  goal: SymPy의 plot()으로 함수 그래프를 그리고 matplotlib과 연동합니다.
  description: 수학 수식을 시각화하면 추상적인 개념이 직관적으로 다가옵니다. 2차 함수 x²은 포물선, sin(x)는 파동, e^x는 폭발적 성장 곡선입니다. SymPy의 plot()은 기호 함수를 바로 그래프로 변환합니다. 도함수를 함께 그리면 기울기 변화를 볼 수 있고, 적분 영역을 색칠하면 넓이의 의미를 이해합니다. 접선을 그리면 미분의 기하적 의미가 보입니다. 이 프로젝트를 완료하면 함수 그래프, 미적분 시각화, 3D 곡면까지 다룰 수 있게 됩니다.
