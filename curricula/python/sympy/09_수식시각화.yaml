- id: step5_matplotlib
  title: 5단계. Matplotlib 연동
  structuredPrimary: true
  subtitle: 더 세밀한 제어
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    SymPy 플롯의 기능이 부족할 때는 matplotlib과 연동합니다. backend를 통해 matplotlib의 Figure와 Axes 객체에 접근할 수 있습니다. ax.grid(True)로 격자를 추가하고, ax.annotate()로 주석을 달고, ax.axhline()으로 보조선을 그립니다. matplotlib의 모든 기능을 활용하여 출판 품질의 그래프를 만들 수 있습니다.

    backend를 통해 matplotlib의 Figure와 Axes 객체에 접근할 수 있습니다. grid, annotation 등을 추가할 수 있습니다.
  tips:
  - backend를 통해 matplotlib의 Figure와 Axes 객체에 접근할 수 있습니다. grid, annotation 등을 추가할 수 있습니다.
  snippet: |-
    p6 = plot(x**2, (x, -3, 3), show=False)
    backend = p6.backend(p6)
    backend.process_series()
    fig = backend.fig
    ax = backend.ax[0]
    ax.set_title('Parabola with Matplotlib')
    ax.grid(True)
    fig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      p6 = plot(x**2, (x, -3, 3), show=False)
      backend = p6.backend(p6)
      backend.process_series()
      fig = backend.fig
      ax = backend.ax[0]
      ax.set_title('Parabola with Matplotlib')
      ax.grid(True)
      fig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_parametric
  title: 6단계. 매개변수 플롯
  structuredPrimary: true
  subtitle: plot_parametric()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    매개변수 곡선은 x(t), y(t)로 정의됩니다. plot_parametric(x(t), y(t), (t, a, b))로 그립니다. 원 x=cos(t), y=sin(t)는 가장 기본적인 예입니다. 리사주 곡선 x=sin(3t), y=sin(2t)은 진동수 비율에 따라 아름다운 패턴을 만듭니다. 매개변수 곡선은 물리학의 운동 궤적, 컴퓨터 그래픽스의 곡선 표현에 널리 사용됩니다.

    매개변수 플롯은 시간에 따른 운동 궤적, 복잡한 곡선 등을 표현할 때 유용합니다.
  tips:
  - 매개변수 플롯은 시간에 따른 운동 궤적, 복잡한 곡선 등을 표현할 때 유용합니다.
  snippet: |-
    t = symbols('t')
    pcircle = plot_parametric(cos(t), sin(t), (t, 0, 2*pi), title='Circle', show=False)
    pcircle.show()
    pcircle
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      t = symbols('t')
      pcircle = plot_parametric(cos(t), sin(t), (t, 0, 2*pi), title='Circle', show=False)
      pcircle.show()
      pcircle
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_derivative_plot
  title: 7단계. 도함수 시각화
  structuredPrimary: true
  subtitle: 미분 결과
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    함수와 도함수를 함께 그리면 미분의 의미가 시각적으로 드러납니다. f(x) = x³-3x의 도함수 f'(x) = 3x²-3입니다. 도함수가 0인 x = ±1에서 원래 함수는 극값을 가집니다. 도함수가 양수인 구간에서 원래 함수는 증가하고, 음수인 구간에서 감소합니다. 그래프에서 이 관계를 직접 확인할 수 있습니다.

    도함수가 0인 점에서 원래 함수는 극값을 가집니다. 그래프에서 교차점을 확인해보세요.
  tips:
  - 도함수가 0인 점에서 원래 함수는 극값을 가집니다. 그래프에서 교차점을 확인해보세요.
  snippet: |-
    func = x**3 - 3*x
    dfunc = diff(func, x)
    func, dfunc
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      func = x**3 - 3*x
      dfunc = diff(func, x)
      func, dfunc
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_integral_plot
  title: 8단계. 적분 영역
  structuredPrimary: true
  subtitle: 넓이 시각화
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 정적분 ∫[a,b] f(x)dx는 곡선 y=f(x)와 x축 사이의 넓이입니다. matplotlib의 fill_between()으로 이 영역을 색칠하면 적분의 기하적 의미가 명확해집니다. ∫[0,2] x²dx = 8/3은 포물선 아래 넓이입니다. 시각화와 수치 계산을 비교하면 적분의 개념이 직관적으로 이해됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import numpy as np

    xarr = np.linspace(0, 2, 100)
    yarr = xarr**2

    fig, ax = plt.subplots(figsize=(8, 5))
    ax.plot(xarr, yarr, 'b-', linewidth=2, label='y = x^2')
    ax.fill_between(xarr, yarr, alpha=0.3, color='blue')
    ax.set_xlabel('x')
    ax.set_ylabel('y')
    ax.set_title('Area under y = x^2 from 0 to 2')
    ax.legend()
    fig
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import numpy as np

      xarr = np.linspace(0, 2, 100)
      yarr = xarr**2

      fig, ax = plt.subplots(figsize=(8, 5))
      ax.plot(xarr, yarr, 'b-', linewidth=2, label='y = x^2')
      ax.fill_between(xarr, yarr, alpha=0.3, color='blue')
      ax.set_xlabel('x')
      ax.set_ylabel('y')
      ax.set_title('Area under y = x^2 from 0 to 2')
      ax.legend()
      fig
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_tangent_plot
  title: 9단계. 접선 시각화
  structuredPrimary: true
  subtitle: 미분의 기하적 의미
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 미분값 f'(a)는 점 (a, f(a))에서 접선의 기울기입니다. 접선 방정식은 y - f(a) = f'(a)(x - a)입니다. x=1에서 y=x²의 접선은 기울기 2로, y = 2(x-1) + 1 = 2x - 1입니다. 곡선과 접선을 함께 그리면 접선이 곡선에 '접하는' 모습을 볼 수 있습니다. 이것이 미분의 기하적 의미입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    curve = x**2
    dcurve = diff(curve, x)
    pt = 1
    yval = curve.subs(x, pt)
    slope = dcurve.subs(x, pt)
    tangent = slope * (x - pt) + yval
    curve, tangent
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      curve = x**2
      dcurve = diff(curve, x)
      pt = 1
      yval = curve.subs(x, pt)
      slope = dcurve.subs(x, pt)
      tangent = slope * (x - pt) + yval
      curve, tangent
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step10_3d
  title: 10단계. 3D 플롯
  structuredPrimary: true
  subtitle: plot3d()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 두 변수 함수 z = f(x, y)는 3D 곡면으로 표현됩니다. plot3d(f, (x, a, b), (y, c, d))로 그립니다. z = x² + y²은 원뿔 모양의 포물면으로 최솟값이 원점에 있습니다. z = x² - y²은 안장면(saddle surface)으로 한 방향에서 극소, 다른 방향에서 극대입니다. 다변수 함수의 극값 분석에서 3D 시각화는 필수적입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: y = symbols('y')
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
