  explanation: 시각화에 필요한 함수들을 불러옵니다. sympy.plotting의 plot()은 2D 함수 그래프, plot_parametric()은 매개변수 곡선, plot3d()는 3D 곡면을 그립니다. matplotlib.pyplot은 더 세밀한 커스터마이징에 사용합니다. SymPy 플롯은 기호 함수를 직접 받아들이므로 변환 없이 바로 그릴 수 있습니다.
