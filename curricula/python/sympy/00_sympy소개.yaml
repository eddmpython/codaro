- id: sympy_history
  blocks:
  - type: sectionHeader
    title: 🏛️ SymPy란?
    subtitle: 기호 수학의 세계
  - type: text
    content: SymPy(Symbolic Python)는 2006년 Ondřej Čertík가 개발한 파이썬 기호 수학 라이브러리입니다. 일반 계산기가 3+5=8처럼 숫자 결과를 주는 것과 달리, SymPy는
      x+y 같은 수식 자체를 다룹니다. (x+1)²을 전개하면 x²+2x+1이 되고, 이를 다시 인수분해할 수 있습니다.
  - type: featureCards
    cards:
    - emoji: 🔣
      title: 기호 계산
      description: x, y 같은 변수를 값 없이 수식으로 조작합니다
    - emoji: ✨
      title: 정확한 결과
      description: √2를 1.414...가 아닌 정확한 기호로 유지합니다
    - emoji: 🐍
      title: 순수 파이썬
      description: 외부 의존성 없이 어디서나 실행됩니다
- id: numeric_vs_symbolic
  blocks:
  - type: sectionHeader
    title: ⚖️ 숫자 vs 기호
    subtitle: 근본적인 차이
  - type: text
    content: 숫자 계산(Numeric)은 구체적인 값으로 결과를 얻습니다. sqrt(2)를 계산하면 1.4142...라는 근삿값이 나옵니다. 반면 기호 계산(Symbolic)은 √2 그 자체를 유지하며, 정확한
      값을 보존합니다.
  - type: table
    headers:
    - 구분
    - 숫자 계산
    - 기호 계산
    rows:
    - - √2
      - 1.41421356...
      - √2
    - - π
      - 3.14159265...
      - π
    - - (x+1)²
      - x 값 필요
      - x² + 2x + 1
    - - 미분
      - 수치 근사
      - 정확한 도함수
  - type: note
    title: 왜 기호 계산이 필요한가?
    content: 수치 계산은 반올림 오차가 누적됩니다. 기호 계산은 정확한 수식을 유지하므로 오차가 없습니다. 미분, 적분 같은 수학적 조작은 기호로 해야 정확한 결과를 얻습니다.
- id: features
  blocks:
  - type: sectionHeader
    title: 🛠️ SymPy 주요 기능
    subtitle: 대학 수학의 모든 것
  - type: text
    content: SymPy는 대학 수학 과정의 거의 모든 내용을 다룰 수 있습니다. 기초 대수부터 고급 미적분, 선형대수, 미분방정식까지 폭넓게 지원합니다.
  - type: table
    headers:
    - 분야
    - 기능
    - 예시
    rows:
    - - 대수학
      - 전개, 인수분해, 방정식
      - factor(x²-1) → (x+1)(x-1)
    - - 미적분
      - 미분, 적분, 극한
      - diff(x³) → 3x²
    - - 급수
      - 테일러 급수, 합
      - series(sin(x)) → x - x³/6 + ...
    - - 선형대수
      - 행렬, 역행렬, 고유값
      - Matrix([[1,2],[3,4]]).det()
    - - 삼각함수
      - 항등식, 변환
      - trigsimp(sin²+cos²) → 1
