  direction: SymPy소개에서 실제 코드 흐름을 작게 실행하고 검증하는 능력을 만든다.
  benefits:
  - SymPy소개 핵심 기능으로 데이터를 처리, 분석, 자동화할 수 있다.
  - 필요한 라이브러리는 레슨을 열 때 uv로 준비하고, 첫 실행에서 import와 assert로 확인한다.
  - 완료 후 작은 리포트, 검증 루틴, 자동화 조각으로 재사용할 수 있다.
