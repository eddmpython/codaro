- id: workflow_validation
  title: '현업 흐름 검증: 손익분기 수식을 기호로 검증하기'
  structuredPrimary: true
  subtitle: 예측 → 수식 구성 → 오류 수정 → 결과 검증 → 실무 변주
  goal: '현업 흐름 검증: 손익분기 수식을 기호로 검증하기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '현업 흐름 검증: 손익분기 수식을 기호로 검증하기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: SymPy는 계산기를 대신하는 도구가 아니라, 업무 규칙을 수식으로 고정하고 전제 조건을 검증하는 도구입니다. 여기서는 고정비와 단위 이익으로 손익분기점을 구하고, 잘못된 계수를 먼저 실패시킨
    뒤, 기준 변경 실험을 수행합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    import sympy as sp

    x = sp.symbols('x', nonnegative=True)
    fixedCost = 120000
    unitPrice = 5000
    unitCost = 2000

    revenueExpr = unitPrice * x
    costExpr = fixedCost + unitCost * x
    profitExpr = sp.simplify(revenueExpr - costExpr)
    breakEvenQuantity = sp.solve(sp.Eq(profitExpr, 0), x)[0]

    assert profitExpr == 3000 * x - 120000
    assert breakEvenQuantity == 40
    profitExpr, breakEvenQuantity
  exercise:
    prompt: '현업 흐름 검증: 손익분기 수식을 기호로 검증하기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      import sympy as sp

      x = sp.symbols('x', nonnegative=True)
      fixedCost = 120000
      unitPrice = 5000
      unitCost = 2000

      revenueExpr = unitPrice * x
      costExpr = fixedCost + unitCost * x
      profitExpr = sp.simplify(revenueExpr - costExpr)
      breakEvenQuantity = sp.solve(sp.Eq(profitExpr, 0), x)[0]

      assert profitExpr == 3000 * x - 120000
      assert breakEvenQuantity == 40
      profitExpr, breakEvenQuantity
    solution: |-
      import sympy as sp

      x = sp.symbols('x', nonnegative=True)
      fixedCost = 120000
      unitPrice = 5000
      unitCost = 2000

      revenueExpr = unitPrice * x
      costExpr = fixedCost + unitCost * x
      profitExpr = sp.simplify(revenueExpr - costExpr)
      breakEvenQuantity = sp.solve(sp.Eq(profitExpr, 0), x)[0]

      assert profitExpr == 3000 * x - 120000
      assert breakEvenQuantity == 40
      profitExpr, breakEvenQuantity
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: SymPy는 계산기를 대신하는 도구가 아니라, 업무 규칙을 수식으로 고정하고 전제 조건을 검증하는 도구입니다. 여기서는 고정비와 단위 이익으로 손익분기점을 구하고, 잘못된 계수를 먼저 실패시킨 뒤,
      기준 변경 실험을 수행합니다.
  - type: code
    language: python
    title: 손익분기 수식 만들기
    description: 수량 x에 대한 매출, 비용, 이익 수식을 만들고 해를 예측합니다.
    content: |-
      import sympy as sp

      x = sp.symbols('x', nonnegative=True)
      fixedCost = 120000
      unitPrice = 5000
      unitCost = 2000

      revenueExpr = unitPrice * x
      costExpr = fixedCost + unitCost * x
      profitExpr = sp.simplify(revenueExpr - costExpr)
      breakEvenQuantity = sp.solve(sp.Eq(profitExpr, 0), x)[0]

      assert profitExpr == 3000 * x - 120000
      assert breakEvenQuantity == 40
      profitExpr, breakEvenQuantity
  - type: code
    language: python
    title: 잘못된 수식 전제를 먼저 실패시킨다
    description: 단위 이익이 0 이하이면 손익분기점을 계산할 수 없게 차단합니다.
    content: |-
      def buildProfitExpression(quantitySymbol, fixedCost, unitPrice, unitCost):
          unitMargin = unitPrice - unitCost
          if unitMargin <= 0:
              raise ValueError('unit margin must be positive')
          return sp.simplify(unitMargin * quantitySymbol - fixedCost)

      try:
          buildProfitExpression(x, 120000, 2000, 2000)
      except ValueError as exc:
          sympyModelError = str(exc)

      assert sympyModelError == 'unit margin must be positive'
      sympyModelError
  - type: code
    language: python
    title: 대입값과 미분으로 결과 검증
    description: 해를 대입하면 이익이 0이고, 이익 함수의 기울기는 단위 이익과 같아야 합니다.
    content: |-
      profitAtBreakEven = profitExpr.subs(x, breakEvenQuantity)
      profitSlope = sp.diff(profitExpr, x)

      assert profitAtBreakEven == 0
      assert profitSlope == unitPrice - unitCost
      profitAtBreakEven, profitSlope
  - type: code
    language: python
    title: '실무 변주: 가격 정책 바꾸기'
    description: 가격을 바꾸면 손익분기 수량이 어떻게 달라지는지 비교합니다.
    content: |-
      premiumProfitExpr = buildProfitExpression(x, fixedCost, 6500, unitCost)
      premiumBreakEven = sp.solve(sp.Eq(premiumProfitExpr, 0), x)[0]

      assert premiumBreakEven < breakEvenQuantity
      assert premiumBreakEven == sp.Rational(80, 3)
      premiumProfitExpr, premiumBreakEven
