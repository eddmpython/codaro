- id: step9_product
  title: 9단계. 곱을 합으로
  structuredPrimary: true
  subtitle: 적분 기법
  goal: 9단계. 곱을 합으로에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 삼각함수의 곱을 합차로 변환하면 적분이 쉬워집니다. sin(a)cos(b) = (sin(a+b) + sin(a-b))/2, cos(a)cos(b) = (cos(a+b)
    + cos(a-b))/2입니다. sin(x)sin(2x)의 적분은 직접 하기 어렵지만, 곱을 합으로 변환하면 각 항을 개별 적분할 수 있습니다. cos²x의 적분도 반각공식 (1+cos(2x))/2를
    사용하면 x/2 + sin(2x)/4가 됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    prod = sin(a)*cos(b)
    expanded = expand_trig(prod)
    expanded
  exercise:
    prompt: 9단계. 곱을 합으로 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      prod = sin(a)*cos(b)
      expanded = expand_trig(prod)
      expanded
    hints:
    - 9단계. 곱을 합으로 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
