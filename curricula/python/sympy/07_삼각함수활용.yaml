    resultCheck: 9단계. 곱을 합으로에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step10_applications
  title: 10단계. 응용 문제
  structuredPrimary: true
  subtitle: 물리와 공학
  goal: 10단계. 응용 문제에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 삼각함수는 물리학의 진동과 파동을 수학적으로 표현합니다. 단진동 x(t) = A·sin(ωt)에서 속도 v = Aω·cos(ωt), 가속도 a = -Aω²·sin(ωt)
    = -ω²x입니다. 가속도가 위치에 비례하고 반대 방향인 것이 진동의 특성입니다. sin(x) + cos(x) = √2·sin(x + π/4)로 합성하면 진폭과 위상을 알 수
    있습니다. 이 원리는 전자회로, 음향공학, 구조역학에 널리 적용됩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    t, A, omega = symbols('t A omega', positive=True)
    position = A*sin(omega*t)
    velocity = diff(position, t)
    accel = diff(velocity, t)
    position, velocity, simplify(accel)
  exercise:
    prompt: 10단계. 응용 문제 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      t, A, omega = symbols('t A omega', positive=True)
      position = A*sin(omega*t)
      velocity = diff(position, t)
      accel = diff(velocity, t)
      position, velocity, simplify(accel)
    hints:
    - 10단계. 응용 문제 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 10단계. 응용 문제 코드가 예외 없이 끝나야 합니다.
    resultCheck: 10단계. 응용 문제에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 삼각함수 연습
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    이제 삼각함수의 항등식, 방정식, 미적분을 종합적으로 연습합니다. 미션1에서는 피타고라스 항등식의 변형들을 정리합니다. (1-cos²θ)/sinθ = sinθ임을 확인하고, sin⁴θ - cos⁴θ가 간단히 정리됨을 봅니다. 미션2에서는 sin(φ)+cos(φ)=0인 방정식을 풀고, sin³φ를 미분하고, sinφ·cos²φ를 적분합니다. 이 연습들은 물리학과 공학 문제의 기초가 됩니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    from sympy import symbols, sin, cos, tan, trigsimp, expand_trig, simplify

    theta = symbols('theta')

    form1 = (1 - cos(theta)**2)/sin(theta)
    simp1 = trigsimp(form1)
    simp1
  exercise:
    prompt: 실습 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
