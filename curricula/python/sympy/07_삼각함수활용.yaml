intro:
  emoji: 📐
  goal: 삼각함수 항등식을 정리하고 삼각방정식을 풀어봅니다.
  description: 삼각함수는 주기적인 현상(파동, 진동, 회전)을 수학적으로 표현하는 핵심 도구입니다. sin, cos, tan은 각도를 입력받아 비율을 반환하고, 역삼각함수는
    그 반대입니다. SymPy는 sin²x + cos²x = 1 같은 항등식을 자동으로 적용하여 복잡한 수식을 간소화합니다. 덧셈정리 sin(a+b) = sin(a)cos(b) +
    cos(a)sin(b), 배각공식 sin(2x) = 2sin(x)cos(x)도 자동 처리됩니다. 이 프로젝트를 완료하면 삼각함수 수식 정리, 삼각방정식 풀이, 삼각함수 미적분까지
    다룰 수 있게 됩니다.
  direction: 삼각함수활용에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - 삼각함수활용 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 기본 삼각함수 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 피타고라스 항등식 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: 삼각함수활용 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: sympy 기준으로 로컬 Python 실행을 준비합니다.
    - label: 삼각함수활용 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 삼각함수활용 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 삼각함수 작업에 필요한 함수들을 불러옵니다. sin, cos, tan은 기본 삼각함수이고, cot, sec, csc는 역수 관계입니다. asin, acos,
    atan은 역삼각함수로 각도를 구합니다. trigsimp()는 sin²+cos²=1 같은 항등식을 적용하여 수식을 간소화하고, expand_trig()는 sin(a+b) 같은
    합성을 풀어헤칩니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    from sympy import symbols, sin, cos, tan, cot, sec, csc
    from sympy import asin, acos, atan, atan2
    from sympy import pi, sqrt, Rational, simplify
    from sympy import trigsimp, expand_trig, solve, diff, integrate
    from sympy import init_printing
    init_printing()
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      from sympy import symbols, sin, cos, tan, cot, sec, csc
      from sympy import asin, acos, atan, atan2
      from sympy import pi, sqrt, Rational, simplify
      from sympy import trigsimp, expand_trig, solve, diff, integrate
      from sympy import init_printing
      init_printing()
    hints:
    - 1단계. 라이브러리 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 라이브러리 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_basic
  title: 2단계. 기본 삼각함수
  structuredPrimary: true
  subtitle: sin, cos, tan
  goal: 2단계. 기본 삼각함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    sin, cos, tan은 직각삼각형의 변의 비율로 정의됩니다. 30°(π/6), 45°(π/4), 60°(π/3) 같은 특수각의 삼각비는 √2, √3을 포함한 정확한 값으로 표현됩니다. sin(π/6) = 1/2, cos(π/4) = √2/2, tan(π/3) = √3입니다. SymPy는 이 값들을 소수가 아닌 기호로 정확하게 표현합니다. tan(x) = sin(x)/cos(x) 관계도 자동으로 인식합니다.

    sin(π/6) = 1/2, cos(π/4) = √2/2, tan(π/3) = √3입니다. SymPy는 정확한 값을 기호로 표현합니다.
  tips:
  - sin(π/6) = 1/2, cos(π/4) = √2/2, tan(π/3) = √3입니다. SymPy는 정확한 값을 기호로 표현합니다.
  snippet: x = symbols('x')
  exercise:
    prompt: 2단계. 기본 삼각함수 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: x = symbols('x')
    hints:
    - 2단계. 기본 삼각함수 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 기본 삼각함수 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 기본 삼각함수에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_identity
  title: 3단계. 피타고라스 항등식
  structuredPrimary: true
  subtitle: sin² + cos² = 1
  goal: 3단계. 피타고라스 항등식에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    피타고라스 항등식 sin²x + cos²x = 1은 단위원에서 유도되는 가장 기본적인 관계입니다. 모든 x에 대해 성립하며, 이를 변형하면 tan²x + 1 = sec²x, 1 + cot²x = csc²x도 얻습니다. trigsimp()는 이 항등식을 자동으로 적용합니다. sin⁴x + 2sin²x·cos²x + cos⁴x = (sin²x + cos²x)² = 1도 계산합니다.

    trigsimp()는 삼각함수 수식을 간소화합니다. 피타고라스 항등식을 적용하여 sin²+cos²=1로 변환합니다.
  tips:
  - trigsimp()는 삼각함수 수식을 간소화합니다. 피타고라스 항등식을 적용하여 sin²+cos²=1로 변환합니다.
  snippet: |-
    identity = sin(x)**2 + cos(x)**2
    result = trigsimp(identity)
    result
  exercise:
    prompt: 3단계. 피타고라스 항등식 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      identity = sin(x)**2 + cos(x)**2
      result = trigsimp(identity)
      result
    hints:
    - 3단계. 피타고라스 항등식 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 피타고라스 항등식 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 피타고라스 항등식에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_addition
  title: 4단계. 덧셈정리
  structuredPrimary: true
  subtitle: sin(a+b), cos(a+b)
  goal: 4단계. 덧셈정리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    덧셈정리는 두 각의 합/차에 대한 삼각함수를 개별 각의 삼각함수로 표현합니다. sin(a+b) = sin(a)cos(b) + cos(a)sin(b), cos(a+b) = cos(a)cos(b) - sin(a)sin(b)입니다. expand_trig()는 합성 각을 분리하고, trigsimp()는 분리된 형태를 다시 합칩니다. 이 공식은 벡터의 회전, 신호 처리, 푸리에 분석의 기초가 됩니다.

    sin(a+b) = sin(a)cos(b) + cos(a)sin(b), cos(a+b) = cos(a)cos(b) - sin(a)sin(b)입니다. expand_trig()가 자동 적용합니다.
  tips:
  - sin(a+b) = sin(a)cos(b) + cos(a)sin(b), cos(a+b) = cos(a)cos(b) - sin(a)sin(b)입니다. expand_trig()가
    자동 적용합니다.
  snippet: a, b = symbols('a b')
  exercise:
    prompt: 4단계. 덧셈정리 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: a, b = symbols('a b')
    hints:
    - 4단계. 덧셈정리 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 덧셈정리 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 덧셈정리에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_double
  title: 5단계. 배각공식
  structuredPrimary: true
  subtitle: sin(2x), cos(2x)
  goal: 5단계. 배각공식에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 배각공식은 덧셈정리에서 a=b=x를 대입하여 유도됩니다. sin(2x) = 2sin(x)cos(x), cos(2x) = cos²x - sin²x = 2cos²x
    - 1 = 1 - 2sin²x입니다. 3배각, 4배각 공식도 expand_trig()로 전개됩니다. 반각공식 cos²x = (1+cos(2x))/2는 적분에서 자주 사용됩니다.
    이 공식들은 적분 계산과 삼각방정식 풀이에 필수적입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    s2x = expand_trig(sin(2*x))
    c2x = expand_trig(cos(2*x))
    s2x, c2x
  exercise:
    prompt: 5단계. 배각공식 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      s2x = expand_trig(sin(2*x))
      c2x = expand_trig(cos(2*x))
      s2x, c2x
    hints:
    - 5단계. 배각공식 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 배각공식 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 배각공식에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step6_inverse
  title: 6단계. 역삼각함수
  structuredPrimary: true
  subtitle: asin, acos, atan
  goal: 6단계. 역삼각함수에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    역삼각함수는 비율로부터 각도를 구합니다. asin(1/2)는 sin(θ)=1/2인 θ=π/6을 반환합니다. asin의 범위는 [-π/2, π/2], acos는 [0, π], atan은 (-π/2, π/2)입니다. sin(asin(x)) = x는 항상 성립하지만, asin(sin(x)) = x는 범위 내에서만 성립합니다. 역삼각함수의 미분 d/dx asin(x) = 1/√(1-x²)은 적분에서 자주 등장합니다.

    asin(1/2) = π/6, acos(√2/2) = π/4, atan(1) = π/4입니다. 역삼각함수의 미분은 1/√(1-x²) 형태입니다.
  tips:
  - asin(1/2) = π/6, acos(√2/2) = π/4, atan(1) = π/4입니다. 역삼각함수의 미분은 1/√(1-x²) 형태입니다.
  snippet: |-
    asin1 = asin(Rational(1, 2))
    acos1 = acos(sqrt(2)/2)
    atan1 = atan(1)
    asin1, acos1, atan1
  exercise:
    prompt: 6단계. 역삼각함수 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      asin1 = asin(Rational(1, 2))
      acos1 = acos(sqrt(2)/2)
      atan1 = atan(1)
      asin1, acos1, atan1
    hints:
    - 6단계. 역삼각함수 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 역삼각함수 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 역삼각함수에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step7_equations
  title: 7단계. 삼각방정식
  structuredPrimary: true
  subtitle: solve() 활용
  goal: 7단계. 삼각방정식에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    삼각방정식 sin(x) = 1/2의 해는 x = π/6 + 2nπ 또는 x = 5π/6 + 2nπ로 무한히 많습니다. solve()는 주기성을 제외한 주값(principal value)을 반환합니다. 복합 방정식 2sin(x)cos(x) = 1은 sin(2x) = 1로 변환되어 x = π/4가 됩니다. SymPy는 항등식을 활용하여 복잡한 삼각방정식도 풉니다.

    삼각방정식의 해는 주기성이 있어 무한히 많습니다. SymPy는 주값(principal value)을 반환합니다.
  tips:
  - 삼각방정식의 해는 주기성이 있어 무한히 많습니다. SymPy는 주값(principal value)을 반환합니다.
  snippet: |-
    sol1 = solve(sin(x) - Rational(1, 2), x)
    sol1
  exercise:
    prompt: 7단계. 삼각방정식 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      sol1 = solve(sin(x) - Rational(1, 2), x)
      sol1
    hints:
