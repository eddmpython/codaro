- id: step8_calculus
  title: 8단계. 삼각함수 미적분
  structuredPrimary: true
  subtitle: 미분과 적분
  goal: 8단계. 삼각함수 미적분에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 삼각함수의 미분은 순환 패턴을 따릅니다. (sin x)' = cos x, (cos x)' = -sin x, (-sin x)' = -cos x, (-cos x)'
    = sin x입니다. (tan x)' = sec²x = 1/cos²x입니다. 적분은 미분의 역과정으로 ∫sin(x)dx = -cos(x), ∫cos(x)dx = sin(x)입니다.
    이 패턴을 이해하면 복잡한 삼각함수 미적분도 쉽게 풀 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    dsin = diff(sin(x), x)
    dcos = diff(cos(x), x)
    dtan = diff(tan(x), x)
    dsin, dcos, simplify(dtan)
  exercise:
    prompt: 8단계. 삼각함수 미적분 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      dsin = diff(sin(x), x)
      dcos = diff(cos(x), x)
      dtan = diff(tan(x), x)
      dsin, dcos, simplify(dtan)
    hints:
