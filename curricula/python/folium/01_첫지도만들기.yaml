      ]

      def validateKoreaCoordinate(site):
          lat, lon = site["loc"]
          if not (33 <= lat <= 39 and 124 <= lon <= 132):
              raise ValueError(f"좌표 범위 오류: {site['name']}")
          return True

      validationResult = [validateKoreaCoordinate(site) for site in branchSites]
