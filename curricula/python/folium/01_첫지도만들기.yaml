  blocks:
  - type: text
    content: 줌 레벨에 따라 지도의 상세도가 달라집니다. 용도에 맞는 줌 레벨을 선택하세요.
  - type: code
    language: python
    title: 줌 레벨 10 (광역)
    description: 서울 전체가 보이는 레벨
