  description: Folium의 기본인 지도 생성을 배웁니다. Map()으로 지도를 만들고 location과 zoom_start로 초기 화면을 설정합니다. Marker()로 특정 위치에 점을 찍고 popup으로 정보를 표시합니다.
sections:
