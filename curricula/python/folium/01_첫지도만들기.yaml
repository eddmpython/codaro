- id: step6_tooltip
  title: 6단계. 툴팁 추가
  structuredPrimary: true
  subtitle: tooltip vs popup
  goal: '6단계. 툴팁 추가: 실행 가능한 Python 흐름으로 익힌다.'
  why: '6단계. 툴팁 추가: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    tooltip은 마우스를 올리면 나타나고, popup은 클릭해야 나타납니다. 둘 다 사용할 수 있습니다.

    tooltip은 빠른 미리보기, popup은 상세 정보에 적합합니다. 보통 tooltip에 이름, popup에 상세 정보를 넣습니다.
  tips:
  - tooltip은 빠른 미리보기, popup은 상세 정보에 적합합니다. 보통 tooltip에 이름, popup에 상세 정보를 넣습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m7 = folium.Map(location=seoulCenter, zoom_start=14)
    folium.Marker(
        location=seoulCenter,
        popup="클릭하면 보여요",
        tooltip="마우스 올리면 보여요"
    ).add_to(m7)
    m7
  exercise:
    prompt: '6단계. 툴팁 추가: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      m7 = folium.Map(location=seoulCenter, zoom_start=14)
      folium.Marker(
          location=seoulCenter,
          popup="클릭하면 보여요",
