- id: step4_marker
  title: 4단계. 마커 추가
  structuredPrimary: true
  subtitle: Marker()
  goal: '4단계. 마커 추가: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 마커 추가: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Marker()로 특정 위치에 마커를 추가합니다. add_to(지도)로 지도에 붙입니다.

    popup은 마커를 클릭하면 나타나는 말풍선입니다. 문자열이나 HTML을 넣을 수 있습니다.
  tips:
  - popup은 마커를 클릭하면 나타나는 말풍선입니다. 문자열이나 HTML을 넣을 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m4 = folium.Map(location=seoulCenter, zoom_start=14)
    folium.Marker(location=seoulCenter).add_to(m4)
    m4
  exercise:
    prompt: '4단계. 마커 추가: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=14)
      folium.Marker(location=seoulCenter).add_to(m4)
      m4
    solution: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=14)
      folium.Marker(location=seoulCenter).add_to(m4)
      m4
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: Marker()로 특정 위치에 마커를 추가합니다. add_to(지도)로 지도에 붙입니다.
  - type: code
    language: python
    title: 마커 하나 추가
    description: 서울시청에 마커 표시
    content: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=14)
      folium.Marker(location=seoulCenter).add_to(m4)
      m4
  - type: code
    language: python
    title: 팝업 추가
    description: 마커 클릭 시 텍스트 표시
    content: |-
      m5 = folium.Map(location=seoulCenter, zoom_start=14)
      folium.Marker(
          location=seoulCenter,
          popup="서울시청"
      ).add_to(m5)
      m5
  - type: tip
    content: popup은 마커를 클릭하면 나타나는 말풍선입니다. 문자열이나 HTML을 넣을 수 있습니다.
- id: step5_multiple_markers
  title: 5단계. 여러 마커 추가
  structuredPrimary: true
  subtitle: 반복문 활용
  goal: '5단계. 여러 마커 추가: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 여러 마커 추가: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    여러 위치에 마커를 추가합니다. 좌표와 이름 리스트를 만들고 반복문으로 추가합니다.

    딕셔너리 리스트로 데이터를 관리하면 확장하기 쉽습니다. 나중에 주소, 카테고리 등을 추가할 수 있습니다.
  tips:
  - 딕셔너리 리스트로 데이터를 관리하면 확장하기 쉽습니다. 나중에 주소, 카테고리 등을 추가할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    places = [
        {"name": "서울시청", "loc": [37.5665, 126.9780]},
        {"name": "강남역", "loc": [37.4979, 127.0276]},
        {"name": "홍대입구", "loc": [37.5563, 126.9236]},
        {"name": "명동", "loc": [37.5636, 126.9869]},
        {"name": "여의도", "loc": [37.5219, 126.9245]}
    ]

    m6 = folium.Map(location=seoulCenter, zoom_start=12)
    for place in places:
        folium.Marker(
            location=place["loc"],
            popup=place["name"]
        ).add_to(m6)
    m6
  exercise:
    prompt: '5단계. 여러 마커 추가: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
