intro:
  emoji: 🔢
  goal: 대량의 마커를 클러스터로 효율적으로 표시합니다.
  description: 마커가 많으면 지도가 느려지고 보기 어렵습니다. MarkerCluster는 가까운 마커들을 숫자로 그룹화하고, 줌인하면 개별 마커가 나타납니다. 수천 개의
    위치도 깔끔하게 표시할 수 있습니다.
  direction: 마커 클러스터에서 위치 데이터를 지도 레이어로 배치하고 마커/영역 표시를 검증합니다.
  benefits:
  - 위도/경도 데이터 확인 후 지도 레이어 구성에 맞는 코드 입력을 고릅니다.
  - 마커 클러스터 결과를 마커와 저장 HTML 기준으로 즉시 점검합니다.
  - 완료한 코드를 위치 기반 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(위도/경도 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 기본 클러스터 처리 실행
      detail: 지도 레이어 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 대량 데이터 결과 검증
      detail: 마커와 저장 HTML 기준으로 실행 결과를 비교합니다.
    - label: 마커 클러스터 재사용
      detail: 완성 코드를 위치 기반 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 지도 시각화 환경
      detail: folium 기준으로 로컬 Python 실행을 준비합니다.
    - label: 마커 클러스터 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 마커 클러스터 완료
      detail: 검증된 코드를 위치 기반 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: folium과 MarkerCluster 플러그인을 불러옵니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import folium
    from folium.plugins import MarkerCluster
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 입력값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import folium
      from folium.plugins import MarkerCluster
    hints:
    - 1단계. 라이브러리 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 라이브러리 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_basic_cluster
  title: 2단계. 기본 클러스터
  structuredPrimary: true
  subtitle: MarkerCluster()
  goal: 2단계. 기본 클러스터에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    MarkerCluster를 생성하고 마커를 추가합니다. 마커들이 자동으로 그룹화됩니다.

    클러스터에 표시된 숫자는 그룹에 포함된 마커 수입니다. 클릭하거나 줌인하면 분리됩니다.
  tips:
  - 클러스터에 표시된 숫자는 그룹에 포함된 마커 수입니다. 클릭하거나 줌인하면 분리됩니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=12)

    markerCluster = MarkerCluster().add_to(m1)

    locations = [
        [37.5665, 126.9780],
        [37.5670, 126.9785],
        [37.5660, 126.9775],
        [37.5700, 126.9750],
        [37.5710, 126.9760],
        [37.5720, 126.9770],
        [37.5500, 126.9900],
        [37.5510, 126.9910],
        [37.5490, 126.9890]
    ]

    for loc in locations:
        folium.Marker(location=loc).add_to(markerCluster)

    m1
  exercise:
    prompt: 2단계. 기본 클러스터 예제에서 반복 대상이나 범위을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=12)

      markerCluster = MarkerCluster().add_to(m1)

      locations = [
          [37.5665, 126.9780],
          [37.5670, 126.9785],
          [37.5660, 126.9775],
          [37.5700, 126.9750],
          [37.5710, 126.9760],
          [37.5720, 126.9770],
          [37.5500, 126.9900],
          [37.5510, 126.9910],
          [37.5490, 126.9890]
      ]

      for loc in locations:
          folium.Marker(location=loc).add_to(markerCluster)

      m1
    hints:
    - 2단계. 기본 클러스터 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 기본 클러스터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 기본 클러스터에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step3_large_data
  title: 3단계. 대량 데이터
  structuredPrimary: true
  subtitle: 많은 마커
  goal: 3단계. 대량 데이터에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    수백 개의 마커를 클러스터로 효율적으로 표시합니다.

    200개 마커도 클러스터로 표시하면 지도가 깔끔합니다. 줌인해서 개별 마커를 확인하세요.
  tips:
  - 200개 마커도 클러스터로 표시하면 지도가 깔끔합니다. 줌인해서 개별 마커를 확인하세요.
  snippet: |-
    import random

    m2 = folium.Map(location=seoulCenter, zoom_start=11)
    cluster2 = MarkerCluster().add_to(m2)

    for _ in range(200):
        lat = 37.5 + random.uniform(-0.1, 0.1)
        lon = 127.0 + random.uniform(-0.1, 0.1)
        folium.Marker([lat, lon]).add_to(cluster2)

    m2
  exercise:
    prompt: 3단계. 대량 데이터 예제에서 반복 대상이나 범위을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import random

      m2 = folium.Map(location=seoulCenter, zoom_start=11)
      cluster2 = MarkerCluster().add_to(m2)

      for _ in range(200):
          lat = 37.5 + random.uniform(-0.1, 0.1)
          lon = 127.0 + random.uniform(-0.1, 0.1)
          folium.Marker([lat, lon]).add_to(cluster2)

      m2
    hints:
    - 3단계. 대량 데이터 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 대량 데이터 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 대량 데이터에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step4_popup_tooltip
  title: 4단계. 팝업과 툴팁
  structuredPrimary: true
  subtitle: 마커 정보
  goal: 4단계. 팝업과 툴팁에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    클러스터 내 마커에도 팝업과 툴팁을 추가할 수 있습니다.

    줌인해서 개별 마커를 클릭하면 팝업이 표시됩니다.
  tips:
  - 줌인해서 개별 마커를 클릭하면 팝업이 표시됩니다.
  snippet: |-
    m3 = folium.Map(location=seoulCenter, zoom_start=13)
    cluster3 = MarkerCluster().add_to(m3)

    stores = [
        {"name": "강남점", "loc": [37.4979, 127.0276]},
        {"name": "홍대점", "loc": [37.5563, 126.9236]},
        {"name": "명동점", "loc": [37.5636, 126.9869]},
        {"name": "시청점", "loc": [37.5665, 126.9780]},
        {"name": "여의도점", "loc": [37.5219, 126.9245]},
        {"name": "잠실점", "loc": [37.5133, 127.1001]}
    ]

    for store in stores:
        folium.Marker(
            location=store["loc"],
            popup=f"<b>{store['name']}</b>",
            tooltip=store["name"]
        ).add_to(cluster3)

    m3
  exercise:
    prompt: 4단계. 팝업과 툴팁 예제에서 반복 대상이나 범위을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m3 = folium.Map(location=seoulCenter, zoom_start=13)
      cluster3 = MarkerCluster().add_to(m3)

      stores = [
          {"name": "강남점", "loc": [37.4979, 127.0276]},
          {"name": "홍대점", "loc": [37.5563, 126.9236]},
          {"name": "명동점", "loc": [37.5636, 126.9869]},
          {"name": "시청점", "loc": [37.5665, 126.9780]},
          {"name": "여의도점", "loc": [37.5219, 126.9245]},
          {"name": "잠실점", "loc": [37.5133, 127.1001]}
      ]

      for store in stores:
          folium.Marker(
              location=store["loc"],
              popup=f"<b>{store['name']}</b>",
              tooltip=store["name"]
          ).add_to(cluster3)

      m3
    hints:
    - 4단계. 팝업과 툴팁 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 팝업과 툴팁 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 팝업과 툴팁에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step5_custom_icon
  title: 5단계. 커스텀 아이콘
  structuredPrimary: true
  subtitle: Icon 적용
  goal: 5단계. 커스텀 아이콘에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    클러스터 내 마커에 커스텀 아이콘을 적용합니다.

    클러스터 아이콘(숫자 원)은 자동 생성되고, 개별 마커는 지정한 아이콘으로 표시됩니다.
  tips:
  - 클러스터 아이콘(숫자 원)은 자동 생성되고, 개별 마커는 지정한 아이콘으로 표시됩니다.
  snippet: |-
    m4 = folium.Map(location=seoulCenter, zoom_start=12)
    cluster4 = MarkerCluster().add_to(m4)

    cafes = [
        {"name": "스타벅스 강남", "loc": [37.4979, 127.0276]},
        {"name": "스타벅스 홍대", "loc": [37.5563, 126.9236]},
        {"name": "스타벅스 명동", "loc": [37.5636, 126.9869]},
        {"name": "스타벅스 시청", "loc": [37.5665, 126.9780]},
        {"name": "스타벅스 을지로", "loc": [37.5660, 126.9910]}
    ]

    for cafe in cafes:
        folium.Marker(
            location=cafe["loc"],
            popup=cafe["name"],
            icon=folium.Icon(color="green", icon="cloud")
        ).add_to(cluster4)

    m4
  exercise:
    prompt: 5단계. 커스텀 아이콘 예제에서 반복 대상이나 범위을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=12)
      cluster4 = MarkerCluster().add_to(m4)

      cafes = [
          {"name": "스타벅스 강남", "loc": [37.4979, 127.0276]},
          {"name": "스타벅스 홍대", "loc": [37.5563, 126.9236]},
          {"name": "스타벅스 명동", "loc": [37.5636, 126.9869]},
          {"name": "스타벅스 시청", "loc": [37.5665, 126.9780]},
          {"name": "스타벅스 을지로", "loc": [37.5660, 126.9910]}
      ]

      for cafe in cafes:
          folium.Marker(
              location=cafe["loc"],
              popup=cafe["name"],
              icon=folium.Icon(color="green", icon="cloud")
          ).add_to(cluster4)

      m4
    hints:
    - 5단계. 커스텀 아이콘 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 커스텀 아이콘 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 커스텀 아이콘에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step6_multiple_clusters
  title: 6단계. 여러 클러스터
  structuredPrimary: true
  subtitle: 카테고리별 분류
  goal: 6단계. 여러 클러스터에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    카테고리별로 별도의 클러스터를 만들어 분류합니다.

    LayerControl로 카테고리별 클러스터를 켜고 끌 수 있습니다.
  tips:
  - LayerControl로 카테고리별 클러스터를 켜고 끌 수 있습니다.
  snippet: |-
    m5 = folium.Map(location=seoulCenter, zoom_start=12)

    cafeCluster = MarkerCluster(name="카페").add_to(m5)
    restaurantCluster = MarkerCluster(name="음식점").add_to(m5)

    cafeLocations = [
        [37.5665, 126.9780],
        [37.5670, 126.9790],
        [37.5660, 126.9770],
        [37.5700, 126.9750]
    ]

    restaurantLocations = [
        [37.5600, 126.9850],
        [37.5610, 126.9860],
        [37.5590, 126.9840],
        [37.5620, 126.9870]
    ]

    for loc in cafeLocations:
        folium.Marker(
            location=loc,
            icon=folium.Icon(color="cadetblue", icon="cloud")
        ).add_to(cafeCluster)

    for loc in restaurantLocations:
        folium.Marker(
            location=loc,
            icon=folium.Icon(color="red", icon="cutlery")
        ).add_to(restaurantCluster)

    folium.LayerControl().add_to(m5)

    m5
  exercise:
    prompt: 6단계. 여러 클러스터 예제에서 반복 대상이나 범위을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m5 = folium.Map(location=seoulCenter, zoom_start=12)

      cafeCluster = MarkerCluster(name="카페").add_to(m5)
      restaurantCluster = MarkerCluster(name="음식점").add_to(m5)

      cafeLocations = [
