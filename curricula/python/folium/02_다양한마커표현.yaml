- id: step2_icon_colors
  title: 2단계. 아이콘 색상
  structuredPrimary: true
  subtitle: Icon(color=)
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Icon()의 color 파라미터로 마커 색상을 지정합니다. 18가지 색상을 사용할 수 있습니다.

    카테고리별로 색상을 다르게 하면 한눈에 구분할 수 있습니다. 음식점은 빨강, 카페는 파랑 등으로 구분하세요.
  tips:
  - 카테고리별로 색상을 다르게 하면 한눈에 구분할 수 있습니다. 음식점은 빨강, 카페는 파랑 등으로 구분하세요.
  snippet: |-
    seoulLoc = [37.5665, 126.9780]
    colorList = ["red", "blue", "green", "purple", "orange",
                 "darkred", "lightred", "beige", "darkblue", "darkgreen",
                 "cadetblue", "darkpurple", "white", "pink", "lightblue",
                 "lightgreen", "gray", "black"]

    m1 = folium.Map(location=seoulLoc, zoom_start=13)

    for i, clr in enumerate(colorList):
        offset = [seoulLoc[0] + (i // 6) * 0.01, seoulLoc[1] + (i % 6) * 0.01]
        folium.Marker(
            location=offset,
            popup=clr,
            icon=folium.Icon(color=clr)
        ).add_to(m1)

    m1
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      seoulLoc = [37.5665, 126.9780]
      colorList = ["red", "blue", "green", "purple", "orange",
                   "darkred", "lightred", "beige", "darkblue", "darkgreen",
                   "cadetblue", "darkpurple", "white", "pink", "lightblue",
                   "lightgreen", "gray", "black"]

      m1 = folium.Map(location=seoulLoc, zoom_start=13)

      for i, clr in enumerate(colorList):
          offset = [seoulLoc[0] + (i // 6) * 0.01, seoulLoc[1] + (i % 6) * 0.01]
          folium.Marker(
              location=offset,
              popup=clr,
              icon=folium.Icon(color=clr)
          ).add_to(m1)

      m1
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_icon_types
  title: 3단계. 아이콘 종류
  structuredPrimary: true
  subtitle: Icon(icon=)
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    icon 파라미터로 마커 안의 아이콘을 변경합니다. Glyphicon과 Font Awesome 아이콘을 사용할 수 있습니다.

    Font Awesome 아이콘을 사용하려면 prefix='fa'를 추가하세요. 더 다양한 아이콘을 사용할 수 있습니다.
  tips:
  - Font Awesome 아이콘을 사용하려면 prefix='fa'를 추가하세요. 더 다양한 아이콘을 사용할 수 있습니다.
  snippet: |-
    glyphicons = ["home", "star", "heart", "cloud", "music",
                  "camera", "user", "glass", "flag", "gift"]

    m2 = folium.Map(location=seoulLoc, zoom_start=14)

    for i, icn in enumerate(glyphicons):
        offset = [seoulLoc[0] + (i // 5) * 0.008, seoulLoc[1] + (i % 5) * 0.008]
        folium.Marker(
            location=offset,
            popup=icn,
            icon=folium.Icon(color="blue", icon=icn)
        ).add_to(m2)

    m2
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      glyphicons = ["home", "star", "heart", "cloud", "music",
                    "camera", "user", "glass", "flag", "gift"]

      m2 = folium.Map(location=seoulLoc, zoom_start=14)

      for i, icn in enumerate(glyphicons):
          offset = [seoulLoc[0] + (i // 5) * 0.008, seoulLoc[1] + (i % 5) * 0.008]
          folium.Marker(
              location=offset,
              popup=icn,
              icon=folium.Icon(color="blue", icon=icn)
          ).add_to(m2)

      m2
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_html_popup
  title: 4단계. HTML 팝업
  structuredPrimary: true
  subtitle: 풍부한 정보 표시
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    popup에 HTML을 넣어 이미지, 링크, 표 등을 표시할 수 있습니다.

    Popup() 객체를 사용하면 max_width로 팝업 너비를 조절할 수 있습니다.
  tips:
  - Popup() 객체를 사용하면 max_width로 팝업 너비를 조절할 수 있습니다.
  snippet: |-
    htmlContent = """
    <div style="font-family: Arial; width: 200px;">
        <h4 style="color: #2E86AB;">서울시청</h4>
        <p style="margin: 5px 0;">주소: 서울특별시 중구 태평로1가</p>
        <p style="margin: 5px 0;">전화: 02-120</p>
        <hr>
        <small>클릭하여 상세 정보 확인</small>
    </div>
    """

    m4 = folium.Map(location=seoulLoc, zoom_start=15)
    folium.Marker(
        location=seoulLoc,
        popup=folium.Popup(htmlContent, max_width=250),
        icon=folium.Icon(color="red", icon="info-sign")
    ).add_to(m4)

    m4
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      htmlContent = """
      <div style="font-family: Arial; width: 200px;">
          <h4 style="color: #2E86AB;">서울시청</h4>
          <p style="margin: 5px 0;">주소: 서울특별시 중구 태평로1가</p>
          <p style="margin: 5px 0;">전화: 02-120</p>
          <hr>
          <small>클릭하여 상세 정보 확인</small>
      </div>
      """

      m4 = folium.Map(location=seoulLoc, zoom_start=15)
      folium.Marker(
          location=seoulLoc,
          popup=folium.Popup(htmlContent, max_width=250),
          icon=folium.Icon(color="red", icon="info-sign")
      ).add_to(m4)

      m4
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_tooltip_style
  title: 5단계. 툴팁 스타일
  structuredPrimary: true
  subtitle: Tooltip()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Tooltip() 객체로 툴팁을 더 세밀하게 제어할 수 있습니다.

    permanent=True로 설정하면 마우스를 올리지 않아도 항상 툴팁이 표시됩니다.
  tips:
  - permanent=True로 설정하면 마우스를 올리지 않아도 항상 툴팁이 표시됩니다.
  snippet: |-
    m5 = folium.Map(location=seoulLoc, zoom_start=14)

    folium.Marker(
        location=[37.5665, 126.9780],
        tooltip=folium.Tooltip("항상 표시", permanent=True),
        icon=folium.Icon(color="blue")
    ).add_to(m5)

    folium.Marker(
        location=[37.5665, 126.9880],
        tooltip=folium.Tooltip("<b>HTML 툴팁</b><br>여러 줄 가능"),
        icon=folium.Icon(color="green")
    ).add_to(m5)

    m5
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m5 = folium.Map(location=seoulLoc, zoom_start=14)

      folium.Marker(
          location=[37.5665, 126.9780],
          tooltip=folium.Tooltip("항상 표시", permanent=True),
          icon=folium.Icon(color="blue")
      ).add_to(m5)

      folium.Marker(
          location=[37.5665, 126.9880],
          tooltip=folium.Tooltip("<b>HTML 툴팁</b><br>여러 줄 가능"),
          icon=folium.Icon(color="green")
      ).add_to(m5)

      m5
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_divicon
  title: 6단계. DivIcon
  structuredPrimary: true
  subtitle: 완전 커스텀 마커
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    DivIcon()으로 HTML/CSS를 사용한 완전한 커스텀 마커를 만들 수 있습니다.

    DivIcon은 아무 HTML이나 마커로 사용할 수 있어 자유도가 높습니다. 로고, 이모지, 커스텀 디자인 모두 가능합니다.
  tips:
  - DivIcon은 아무 HTML이나 마커로 사용할 수 있어 자유도가 높습니다. 로고, 이모지, 커스텀 디자인 모두 가능합니다.
  snippet: |-
    spots = [
        {"name": "1번", "loc": [37.5665, 126.9780]},
        {"name": "2번", "loc": [37.5600, 126.9850]},
        {"name": "3번", "loc": [37.5700, 126.9900]}
    ]

    m6 = folium.Map(location=seoulLoc, zoom_start=14)

    for i, spot in enumerate(spots, 1):
        folium.Marker(
            location=spot["loc"],
            popup=spot["name"],
            icon=folium.DivIcon(
                html=f"""
                <div style="
                    background-color: #E74C3C;
                    color: white;
                    width: 25px;
                    height: 25px;
                    border-radius: 50%;
                    text-align: center;
                    line-height: 25px;
                    font-weight: bold;
                    font-size: 14px;
                    border: 2px solid white;
                    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                ">{i}</div>
                """
            )
        ).add_to(m6)

    m6
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      spots = [
          {"name": "1번", "loc": [37.5665, 126.9780]},
          {"name": "2번", "loc": [37.5600, 126.9850]},
          {"name": "3번", "loc": [37.5700, 126.9900]}
      ]

      m6 = folium.Map(location=seoulLoc, zoom_start=14)

      for i, spot in enumerate(spots, 1):
          folium.Marker(
              location=spot["loc"],
              popup=spot["name"],
              icon=folium.DivIcon(
                  html=f"""
                  <div style="
                      background-color: #E74C3C;
                      color: white;
                      width: 25px;
                      height: 25px;
                      border-radius: 50%;
                      text-align: center;
                      line-height: 25px;
                      font-weight: bold;
                      font-size: 14px;
                      border: 2px solid white;
                      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                  ">{i}</div>
                  """
              )
          ).add_to(m6)

      m6
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_emoji_marker
  title: 7단계. 이모지 마커
  structuredPrimary: true
  subtitle: DivIcon으로 이모지 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    DivIcon으로 이모지를 마커로 사용할 수 있습니다.

    이모지 마커는 직관적이고 귀엽습니다. 카테고리별로 다른 이모지를 사용하면 구분이 쉽습니다.
  tips:
  - 이모지 마커는 직관적이고 귀엽습니다. 카테고리별로 다른 이모지를 사용하면 구분이 쉽습니다.
  snippet: |-
    emojiSpots = [
        {"name": "카페", "loc": [37.5665, 126.9780], "emoji": "☕"},
        {"name": "음식점", "loc": [37.5600, 126.9750], "emoji": "🍽️"},
        {"name": "쇼핑", "loc": [37.5630, 126.9850], "emoji": "🛍️"},
        {"name": "공원", "loc": [37.5700, 126.9800], "emoji": "🌳"},
        {"name": "호텔", "loc": [37.5580, 126.9900], "emoji": "🏨"}
    ]

    m7 = folium.Map(location=seoulLoc, zoom_start=14)

    for spot in emojiSpots:
        folium.Marker(
            location=spot["loc"],
            popup=spot["name"],
            icon=folium.DivIcon(
                html=f'<div style="font-size: 24px;">{spot["emoji"]}</div>'
            )
        ).add_to(m7)

    m7
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      emojiSpots = [
          {"name": "카페", "loc": [37.5665, 126.9780], "emoji": "☕"},
          {"name": "음식점", "loc": [37.5600, 126.9750], "emoji": "🍽️"},
          {"name": "쇼핑", "loc": [37.5630, 126.9850], "emoji": "🛍️"},
          {"name": "공원", "loc": [37.5700, 126.9800], "emoji": "🌳"},
          {"name": "호텔", "loc": [37.5580, 126.9900], "emoji": "🏨"}
      ]

      m7 = folium.Map(location=seoulLoc, zoom_start=14)

      for spot in emojiSpots:
          folium.Marker(
              location=spot["loc"],
              popup=spot["name"],
              icon=folium.DivIcon(
                  html=f'<div style="font-size: 24px;">{spot["emoji"]}</div>'
              )
          ).add_to(m7)

      m7
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_circle_marker
  title: 8단계. CircleMarker
  structuredPrimary: true
  subtitle: 원형 마커
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    CircleMarker()는 크기가 고정된 원형 마커입니다. 줌 레벨에 상관없이 같은 크기로 표시됩니다.

    CircleMarker의 radius는 픽셀 단위입니다. Circle()의 radius는 미터 단위라서 줌에 따라 크기가 변합니다.
  tips:
  - CircleMarker의 radius는 픽셀 단위입니다. Circle()의 radius는 미터 단위라서 줌에 따라 크기가 변합니다.
  snippet: |-
    m8 = folium.Map(location=seoulLoc, zoom_start=14)

    folium.CircleMarker(
        location=[37.5665, 126.9780],
        radius=10,
        color="red",
        fill=True,
        fill_color="red",
        fill_opacity=0.7,
        popup="작은 원"
    ).add_to(m8)

    folium.CircleMarker(
        location=[37.5600, 126.9850],
        radius=20,
        color="blue",
        fill=True,
        fill_color="blue",
        fill_opacity=0.5,
        popup="중간 원"
    ).add_to(m8)

    folium.CircleMarker(
        location=[37.5700, 126.9700],
        radius=30,
        color="green",
        fill=True,
        fill_color="green",
        fill_opacity=0.3,
        popup="큰 원"
    ).add_to(m8)

    m8
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m8 = folium.Map(location=seoulLoc, zoom_start=14)

      folium.CircleMarker(
          location=[37.5665, 126.9780],
          radius=10,
          color="red",
          fill=True,
          fill_color="red",
          fill_opacity=0.7,
          popup="작은 원"
      ).add_to(m8)

      folium.CircleMarker(
          location=[37.5600, 126.9850],
          radius=20,
          color="blue",
          fill=True,
          fill_color="blue",
          fill_opacity=0.5,
          popup="중간 원"
      ).add_to(m8)

      folium.CircleMarker(
          location=[37.5700, 126.9700],
          radius=30,
          color="green",
          fill=True,
          fill_color="green",
          fill_opacity=0.3,
          popup="큰 원"
      ).add_to(m8)

      m8
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
