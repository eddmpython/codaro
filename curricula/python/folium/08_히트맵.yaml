- id: step2_basic_heatmap
  title: 2단계. 기본 히트맵
  structuredPrimary: true
  subtitle: HeatMap()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    HeatMap은 좌표 리스트를 받아 밀도를 시각화합니다. 좌표가 많이 모인 곳이 더 진하게 표시됩니다.

    좌표가 밀집된 곳(시청 근처)이 더 진한 색으로 표시됩니다.
  tips:
  - 좌표가 밀집된 곳(시청 근처)이 더 진한 색으로 표시됩니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=13)

    heatData = [
        [37.5665, 126.9780],
        [37.5670, 126.9785],
        [37.5660, 126.9775],
        [37.5668, 126.9782],
        [37.5663, 126.9778],
        [37.5700, 126.9750],
        [37.5705, 126.9755],
        [37.5630, 126.9820],
        [37.5632, 126.9825]
    ]

    HeatMap(heatData).add_to(m1)

    m1
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=13)

      heatData = [
          [37.5665, 126.9780],
          [37.5670, 126.9785],
          [37.5660, 126.9775],
          [37.5668, 126.9782],
          [37.5663, 126.9778],
          [37.5700, 126.9750],
          [37.5705, 126.9755],
          [37.5630, 126.9820],
          [37.5632, 126.9825]
      ]

      HeatMap(heatData).add_to(m1)

      m1
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_radius_blur
  title: 3단계. radius와 blur
  structuredPrimary: true
  subtitle: 크기 조절
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    radius는 각 포인트의 영향 범위, blur는 경계의 부드러움을 조절합니다.

    radius를 크게 하면 넓게 퍼지고, blur를 높이면 경계가 부드러워집니다. 기본값은 radius=25, blur=15입니다.
  tips:
  - radius를 크게 하면 넓게 퍼지고, blur를 높이면 경계가 부드러워집니다. 기본값은 radius=25, blur=15입니다.
  snippet: |-
    m2 = folium.Map(location=seoulCenter, zoom_start=13)

    HeatMap(
        heatData,
        radius=25
    ).add_to(m2)

    m2
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=13)

      HeatMap(
          heatData,
          radius=25
      ).add_to(m2)

      m2
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_gradient
  title: 4단계. 색상 그라데이션
  structuredPrimary: true
  subtitle: gradient
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    gradient로 색상 구간을 지정합니다. 0~1 사이 값에 색상을 매핑합니다.

    gradient 키는 0~1 사이 값이고, 밀도가 높을수록 1에 가까운 색상이 적용됩니다.
  tips:
  - gradient 키는 0~1 사이 값이고, 밀도가 높을수록 1에 가까운 색상이 적용됩니다.
  snippet: |-
    m4 = folium.Map(location=seoulCenter, zoom_start=13)

    customGradient = {
        0.2: "blue",
        0.4: "lime",
        0.6: "yellow",
        0.8: "orange",
        1.0: "red"
    }

    HeatMap(
        heatData,
        gradient=customGradient,
        radius=25
    ).add_to(m4)

    m4
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=13)

      customGradient = {
          0.2: "blue",
          0.4: "lime",
          0.6: "yellow",
          0.8: "orange",
          1.0: "red"
      }

      HeatMap(
          heatData,
          gradient=customGradient,
          radius=25
      ).add_to(m4)

      m4
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_weighted_heatmap
  title: 5단계. 가중치 히트맵
  structuredPrimary: true
  subtitle: weight
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    좌표에 가중치를 추가하면 특정 포인트를 더 강조할 수 있습니다. [위도, 경도, 가중치] 형태로 데이터를 전달합니다.

    가중치가 1에 가까울수록 더 진하게 표시됩니다. 매출액, 인구수 등을 가중치로 사용합니다.
  tips:
  - 가중치가 1에 가까울수록 더 진하게 표시됩니다. 매출액, 인구수 등을 가중치로 사용합니다.
  snippet: |-
    m6 = folium.Map(location=seoulCenter, zoom_start=13)

    weightedData = [
        [37.5665, 126.9780, 1.0],
        [37.5670, 126.9785, 0.8],
        [37.5660, 126.9775, 0.5],
        [37.5700, 126.9750, 0.3],
        [37.5630, 126.9820, 0.2]
    ]

    HeatMap(weightedData, radius=30).add_to(m6)

    m6
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m6 = folium.Map(location=seoulCenter, zoom_start=13)

      weightedData = [
          [37.5665, 126.9780, 1.0],
          [37.5670, 126.9785, 0.8],
          [37.5660, 126.9775, 0.5],
          [37.5700, 126.9750, 0.3],
          [37.5630, 126.9820, 0.2]
      ]

      HeatMap(weightedData, radius=30).add_to(m6)

      m6
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_min_opacity
  title: 6단계. 최소 투명도
  structuredPrimary: true
  subtitle: min_opacity
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    min_opacity로 낮은 밀도 영역의 최소 투명도를 설정합니다.

    min_opacity를 높이면 낮은 밀도 영역도 보입니다. 기본값은 0.5입니다.
  tips:
  - min_opacity를 높이면 낮은 밀도 영역도 보입니다. 기본값은 0.5입니다.
  snippet: |-
    m7 = folium.Map(location=seoulCenter, zoom_start=13)

    HeatMap(
        heatData,
        min_opacity=0.3,
        radius=25
    ).add_to(m7)

    m7
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
