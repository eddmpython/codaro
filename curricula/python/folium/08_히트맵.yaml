    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_max_zoom
  title: 7단계. 줌 레벨 설정
  structuredPrimary: true
  subtitle: max_zoom
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    max_zoom으로 히트맵이 표시되는 최대 줌 레벨을 설정합니다. 높은 줌에서는 포인트가 분산됩니다.

    줌을 많이 확대하면 포인트들이 분산되어 히트맵 효과가 줄어듭니다.
  tips:
  - 줌을 많이 확대하면 포인트들이 분산되어 히트맵 효과가 줄어듭니다.
  snippet: |-
    m8 = folium.Map(location=seoulCenter, zoom_start=13)

    HeatMap(
        heatData,
        max_zoom=15,
        radius=25
    ).add_to(m8)

    m8
