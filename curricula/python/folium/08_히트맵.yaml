meta:
  packages:
    - folium
  id: folium_08
  title: 히트맵
  order: 8
  category: folium
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["folium", "HeatMap", "히트맵", "밀도", "시각화"]
  seo:
    title: "Folium HeatMap - 밀도 시각화"
    description: "Folium으로 히트맵을 만듭니다. 포인트 데이터의 밀도를 색상으로 시각화합니다."
    keywords: ["folium", "HeatMap", "히트맵", "밀도", "gradient"]

intro:
  emoji: "🔥"
  goal: 포인트 데이터를 히트맵으로 시각화합니다.
  description: 히트맵은 데이터의 밀집도를 색상으로 표현합니다. 많은 포인트가 모인 곳은 빨갛게, 적은 곳은 파랗게 표시됩니다. 인구 밀도, 매장 분포, 범죄 발생 지역 등을 시각화할 때 사용합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: folium과 HeatMap 플러그인을 불러옵니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: HeatMap 플러그인 포함
    content: |-
      import folium
      from folium.plugins import HeatMap
- id: step2_basic_heatmap
  title: 2단계. 기본 히트맵
  subtitle: HeatMap()
  blocks:
  - type: text
    content: HeatMap은 좌표 리스트를 받아 밀도를 시각화합니다. 좌표가 많이 모인 곳이 더 진하게 표시됩니다.
  - type: code
    language: python
    title: 기본 히트맵
    description: 좌표 데이터
    content: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=13)

      heatData = [
          [37.5665, 126.9780],
          [37.5670, 126.9785],
          [37.5660, 126.9775],
          [37.5668, 126.9782],
          [37.5663, 126.9778],
          [37.5700, 126.9750],
          [37.5705, 126.9755],
          [37.5630, 126.9820],
          [37.5632, 126.9825]
      ]

      HeatMap(heatData).add_to(m1)

      m1
  - type: tip
    content: 좌표가 밀집된 곳(시청 근처)이 더 진한 색으로 표시됩니다.

- id: step3_radius_blur
  title: 3단계. radius와 blur
  subtitle: 크기 조절
  blocks:
  - type: text
    content: radius는 각 포인트의 영향 범위, blur는 경계의 부드러움을 조절합니다.
  - type: code
    language: python
    title: radius 조절
    description: 영향 범위
    content: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=13)

      HeatMap(
          heatData,
          radius=25
      ).add_to(m2)

      m2
  - type: code
    language: python
    title: blur 조절
    description: 부드러움
    content: |-
      m3 = folium.Map(location=seoulCenter, zoom_start=13)

      HeatMap(
          heatData,
          radius=20,
          blur=15
      ).add_to(m3)

      m3
  - type: tip
    content: radius를 크게 하면 넓게 퍼지고, blur를 높이면 경계가 부드러워집니다. 기본값은 radius=25, blur=15입니다.

- id: step4_gradient
  title: 4단계. 색상 그라데이션
  subtitle: gradient
  blocks:
  - type: text
    content: gradient로 색상 구간을 지정합니다. 0~1 사이 값에 색상을 매핑합니다.
  - type: code
    language: python
    title: 커스텀 그라데이션
    description: 색상 변경
    content: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=13)

      customGradient = {
          0.2: "blue",
          0.4: "lime",
          0.6: "yellow",
          0.8: "orange",
          1.0: "red"
      }

      HeatMap(
          heatData,
          gradient=customGradient,
          radius=25
      ).add_to(m4)

      m4
  - type: code
    language: python
    title: 단색 계열
    description: 파랑 계열
    content: |-
      m5 = folium.Map(location=seoulCenter, zoom_start=13)

      blueGradient = {
          0.4: "#eff3ff",
          0.6: "#9ecae1",
          0.8: "#3182bd",
          1.0: "#08519c"
      }

      HeatMap(
          heatData,
          gradient=blueGradient,
          radius=25
      ).add_to(m5)

      m5
  - type: tip
    content: gradient 키는 0~1 사이 값이고, 밀도가 높을수록 1에 가까운 색상이 적용됩니다.

- id: step5_weighted_heatmap
  title: 5단계. 가중치 히트맵
  subtitle: weight
  blocks:
  - type: text
    content: 좌표에 가중치를 추가하면 특정 포인트를 더 강조할 수 있습니다. [위도, 경도, 가중치] 형태로 데이터를 전달합니다.
  - type: code
    language: python
    title: 가중치 데이터
    description: 중요도 반영
    content: |-
      m6 = folium.Map(location=seoulCenter, zoom_start=13)

      weightedData = [
          [37.5665, 126.9780, 1.0],
          [37.5670, 126.9785, 0.8],
          [37.5660, 126.9775, 0.5],
          [37.5700, 126.9750, 0.3],
          [37.5630, 126.9820, 0.2]
      ]

      HeatMap(weightedData, radius=30).add_to(m6)

      m6
  - type: tip
    content: 가중치가 1에 가까울수록 더 진하게 표시됩니다. 매출액, 인구수 등을 가중치로 사용합니다.

- id: step6_min_opacity
  title: 6단계. 최소 투명도
  subtitle: min_opacity
  blocks:
  - type: text
    content: min_opacity로 낮은 밀도 영역의 최소 투명도를 설정합니다.
  - type: code
    language: python
    title: 투명도 조절
    description: 희미한 영역 강조
    content: |-
      m7 = folium.Map(location=seoulCenter, zoom_start=13)

      HeatMap(
          heatData,
          min_opacity=0.3,
          radius=25
      ).add_to(m7)

      m7
  - type: tip
    content: min_opacity를 높이면 낮은 밀도 영역도 보입니다. 기본값은 0.5입니다.

- id: step7_max_zoom
  title: 7단계. 줌 레벨 설정
  subtitle: max_zoom
  blocks:
  - type: text
    content: max_zoom으로 히트맵이 표시되는 최대 줌 레벨을 설정합니다. 높은 줌에서는 포인트가 분산됩니다.
  - type: code
    language: python
    title: max_zoom 설정
    description: 줌 레벨 제한
    content: |-
      m8 = folium.Map(location=seoulCenter, zoom_start=13)

      HeatMap(
          heatData,
          max_zoom=15,
          radius=25
      ).add_to(m8)

      m8
  - type: tip
    content: 줌을 많이 확대하면 포인트들이 분산되어 히트맵 효과가 줄어듭니다.

- id: step8_large_data
  title: 8단계. 대량 데이터
  subtitle: 많은 포인트
  blocks:
  - type: text
    content: 히트맵은 대량의 포인트 데이터에서 진가를 발휘합니다. 랜덤 데이터로 테스트합니다.
  - type: code
    language: python
    title: 랜덤 포인트 생성
    description: 100개 포인트
    content: |-
      import random

      m9 = folium.Map(location=seoulCenter, zoom_start=12)

      largeData = []
      for _ in range(100):
          lat = 37.5 + random.uniform(-0.05, 0.05)
          lon = 126.95 + random.uniform(-0.05, 0.05)
          largeData.append([lat, lon])

      for _ in range(50):
          lat = 37.5665 + random.uniform(-0.01, 0.01)
          lon = 126.9780 + random.uniform(-0.01, 0.01)
          largeData.append([lat, lon])

      HeatMap(largeData, radius=15).add_to(m9)

      m9
  - type: tip
    content: 특정 위치에 포인트를 집중시키면 그 영역이 더 진하게 표시됩니다.

- id: step9_with_markers
  title: 9단계. 마커와 조합
  subtitle: 히트맵 + 마커
  blocks:
  - type: text
    content: 히트맵 위에 마커를 추가하여 주요 위치를 강조합니다.
  - type: code
    language: python
    title: 매장 밀도 + 본사
    description: 조합 예제
    content: |-
      m10 = folium.Map(location=seoulCenter, zoom_start=13, tiles="CartoDB Positron")

      storeLocations = []
      for _ in range(30):
          lat = 37.5665 + random.uniform(-0.02, 0.02)
          lon = 126.9780 + random.uniform(-0.02, 0.02)
          storeLocations.append([lat, lon])

      for _ in range(20):
          lat = 37.5500 + random.uniform(-0.01, 0.01)
          lon = 126.9900 + random.uniform(-0.01, 0.01)
          storeLocations.append([lat, lon])

      HeatMap(
          storeLocations,
          radius=20,
          gradient={0.4: "yellow", 0.6: "orange", 1: "red"}
      ).add_to(m10)

      folium.Marker(
          seoulCenter,
          popup="본사",
          icon=folium.Icon(color="blue", icon="home")
      ).add_to(m10)

      m10
  - type: tip
    content: 밝은 배경(CartoDB Positron)에서 히트맵이 더 잘 보입니다.

- id: step10_complete
  title: 10단계. 완성 예제
  subtitle: 인구 밀도 지도
  blocks:
  - type: text
    content: 서울 주요 지역의 인구 밀도를 히트맵으로 시각화합니다.
  - type: code
    language: python
    title: 서울 인구 밀도
    description: 종합 예제
    content: |-
      import random

      densityMap = folium.Map(
          location=[37.55, 126.98],
          zoom_start=12,
          tiles="CartoDB Dark_Matter"
      )

      densityData = []

      gangnam = [37.4979, 127.0276]
      for _ in range(80):
          lat = gangnam[0] + random.uniform(-0.015, 0.015)
          lon = gangnam[1] + random.uniform(-0.015, 0.015)
          densityData.append([lat, lon, 0.8])

      myeongdong = [37.5636, 126.9869]
      for _ in range(60):
          lat = myeongdong[0] + random.uniform(-0.01, 0.01)
          lon = myeongdong[1] + random.uniform(-0.01, 0.01)
          densityData.append([lat, lon, 0.9])

      hongdae = [37.5563, 126.9236]
      for _ in range(50):
          lat = hongdae[0] + random.uniform(-0.012, 0.012)
          lon = hongdae[1] + random.uniform(-0.012, 0.012)
          densityData.append([lat, lon, 0.7])

      for _ in range(100):
          lat = 37.55 + random.uniform(-0.08, 0.08)
          lon = 126.98 + random.uniform(-0.08, 0.08)
          densityData.append([lat, lon, 0.2])

      densityGradient = {
          0.2: "#0000ff",
          0.4: "#00ffff",
          0.6: "#00ff00",
          0.8: "#ffff00",
          1.0: "#ff0000"
      }

      HeatMap(
          densityData,
          radius=25,
          blur=20,
          gradient=densityGradient,
          min_opacity=0.4
      ).add_to(densityMap)

      hotspots = [
          {"name": "강남", "loc": gangnam},
          {"name": "명동", "loc": myeongdong},
          {"name": "홍대", "loc": hongdae}
      ]

      for spot in hotspots:
          folium.Marker(
              location=spot["loc"],
              popup=spot["name"],
              icon=folium.Icon(color="white", icon="star")
          ).add_to(densityMap)

      densityMap

- id: step11_workflow
  title: 11단계. 실무 히트맵 검증
  subtitle: 예측 → 데이터 오류 확인 → 렌더 검증 → 기준 실험
  blocks:
  - type: text
    content: 히트맵은 색이 진한 곳을 보는 도구지만, 실무에서는 그 색이 믿을 만한 데이터에서 나온 것인지가 먼저입니다. 좌표 범위, 가중치 범위, 권역별 합계, 렌더 결과를 검증한 뒤 radius와 임계값을 바꿔 해석이 어떻게 달라지는지 실험해야 합니다.
  - type: list
    items:
    - "실행 전에는 어느 권역이 가장 뜨거운 지역으로 보일지 먼저 예측합니다."
    - "가중치가 0보다 작거나 1보다 크면 히트맵 색 해석이 무너지는 오류입니다."
    - "지도 HTML에는 분석 기준을 설명하는 마커와 권역명이 들어갔는지 확인합니다."
    - "가중치 기준을 바꾸면 고위험 권역 목록이 어떻게 달라지는지 실험합니다."
  - type: code
    language: python
    title: 민원 히트맵 데이터 준비
    description: 권역별 민원 위치와 심각도 가중치를 준비합니다.
    content: |-
      complaintHeatRows = [
          {"district": "강남", "loc": [37.4979, 127.0276], "weight": 0.95, "type": "배송지연"},
          {"district": "강남", "loc": [37.5010, 127.0310], "weight": 0.80, "type": "재고부족"},
          {"district": "강남", "loc": [37.4930, 127.0240], "weight": 0.70, "type": "배송지연"},
          {"district": "홍대", "loc": [37.5563, 126.9236], "weight": 0.65, "type": "응대지연"},
          {"district": "홍대", "loc": [37.5580, 126.9255], "weight": 0.55, "type": "응대지연"},
          {"district": "여의도", "loc": [37.5219, 126.9245], "weight": 0.45, "type": "배송지연"},
          {"district": "여의도", "loc": [37.5260, 126.9290], "weight": 0.35, "type": "문의증가"},
      ]

      districtHeatScore = {}
      for row in complaintHeatRows:
          districtHeatScore[row["district"]] = districtHeatScore.get(row["district"], 0) + row["weight"]

      hottestDistrict = max(districtHeatScore, key=districtHeatScore.get)
      hottestDistrict, round(districtHeatScore[hottestDistrict], 2)
  - type: code
    language: python
    title: 히트맵 데이터 검증 함수
    description: 좌표와 가중치가 업무 기준 안에 있는지 확인합니다.
    content: |-
      def validateHeatRow(row):
          lat, lon = row["loc"]
          if not (33 <= lat <= 39 and 124 <= lon <= 132):
              raise ValueError(f"좌표 범위 오류: {row['district']}")
          if not (0 <= row["weight"] <= 1):
              raise ValueError(f"가중치 범위 오류: {row['district']}={row['weight']}")
          return True

      heatValidation = [validateHeatRow(row) for row in complaintHeatRows]
      heatValidation
  - type: code
    language: python
    title: 가중치 오류 확인
    description: 잘못된 심각도 값을 일부러 넣고 오류를 확인합니다.
    content: |-
      brokenHeatRow = {"district": "강남", "loc": [37.50, 127.03], "weight": 1.4, "type": "오입력"}

      try:
          validateHeatRow(brokenHeatRow)
      except ValueError as exc:
          heatWeightError = str(exc)

      heatWeightError
  - type: code
    language: python
    title: 민원 히트맵 만들기
    description: 검증된 좌표와 가중치로 히트맵을 만들고 권역 설명 마커를 추가합니다.
    content: |-
      complaintHeatMap = folium.Map(location=[37.52, 126.98], zoom_start=12, tiles="CartoDB Positron")
      heatInput = [[row["loc"][0], row["loc"][1], row["weight"]] for row in complaintHeatRows]

      HeatMap(
          heatInput,
          radius=28,
          blur=18,
          min_opacity=0.35,
          gradient={0.2: "#2c7bb6", 0.5: "#ffffbf", 0.8: "#fdae61", 1.0: "#d7191c"},
      ).add_to(complaintHeatMap)

      districtCenters = {
          "강남": [37.4979, 127.0276],
          "홍대": [37.5563, 126.9236],
          "여의도": [37.5219, 126.9245],
      }
      for district, score in districtHeatScore.items():
          folium.CircleMarker(
              location=districtCenters[district],
              radius=7,
              color="black",
              fill=True,
              popup=f"{district} 민원 가중합 {score:.2f}",
              tooltip=f"{district} 민원 밀도",
          ).add_to(complaintHeatMap)

      complaintHeatMap
  - type: code
    language: python
    title: 렌더 결과 검증
    description: 권역명, 히트맵 레이어, 오류 메시지가 예상대로 준비됐는지 점검합니다.
    content: |-
      heatHtml = complaintHeatMap.get_root().render()
      heatChecks = {
          "districtsRendered": all(district in heatHtml for district in districtHeatScore),
          "heatLayerRendered": "heatLayer" in heatHtml,
          "weightErrorOk": heatWeightError == "가중치 범위 오류: 강남=1.4",
          "hottestPredictionOk": hottestDistrict == "강남",
          "validationOk": all(heatValidation),
      }

      assert all(heatChecks.values()), heatChecks
      heatChecks
  - type: code
    language: python
    title: 수정 실험
    description: 고위험 기준을 낮추면 어떤 권역이 추가되는지 비교합니다.
    content: |-
      def selectHotDistricts(scoreByDistrict, threshold):
          return sorted(district for district, score in scoreByDistrict.items() if score >= threshold)

      strictHotDistricts = selectHotDistricts(districtHeatScore, 2.0)
      relaxedHotDistricts = selectHotDistricts(districtHeatScore, 1.0)

      strictHotDistricts, relaxedHotDistricts
  - type: tip
    content: 히트맵은 색보다 데이터 계약이 먼저입니다. 좌표, 가중치, 권역 합계, 렌더 결과를 검증하면 밀도 지도를 업무 리포트의 근거로 사용할 수 있습니다.

- id: practice
  title: 실습
  subtitle: 히트맵
  blocks:
  - type: text
    content: 지금까지 배운 내용을 활용하여 미션을 수행해봅시다.
  - type: expansion
    title: "미션1: 사건 발생 히트맵"
    blocks:
    - type: code
      title: 데이터 준비
      content: |-
        import folium
        from folium.plugins import HeatMap
        import random
        incidentData = []
        hotspot1 = [37.57, 126.98]
        for _ in range(40):
            lat = hotspot1[0] + random.uniform(-0.008, 0.008)
            lon = hotspot1[1] + random.uniform(-0.008, 0.008)
            incidentData.append([lat, lon])

        hotspot2 = [37.56, 126.99]
        for _ in range(25):
            lat = hotspot2[0] + random.uniform(-0.006, 0.006)
            lon = hotspot2[1] + random.uniform(-0.006, 0.006)
            incidentData.append([lat, lon])

        len(incidentData)
    - type: code
      title: 지도 생성
      content: |-
        incidentMap = folium.Map(location=[37.565, 126.985], zoom_start=14)

        incidentGradient = {
            0.3: "green",
            0.5: "yellow",
            0.7: "orange",
            1.0: "red"
        }

        HeatMap(
            incidentData,
            radius=20,
            blur=15,
            gradient=incidentGradient
        ).add_to(incidentMap)

        incidentMap
  - type: expansion
    title: "미션2: 매장 밀집도"
    blocks:
    - type: code
      title: 데이터 준비
      content: |-
        import folium
        from folium.plugins import HeatMap
        import random
        storeData = []
        areas = [
            {"center": [37.5665, 126.9780], "count": 30, "weight": 1.0},
            {"center": [37.4979, 127.0276], "count": 25, "weight": 0.8},
            {"center": [37.5563, 126.9236], "count": 20, "weight": 0.6}
        ]

        for area in areas:
            for _ in range(area["count"]):
                lat = area["center"][0] + random.uniform(-0.01, 0.01)
                lon = area["center"][1] + random.uniform(-0.01, 0.01)
                storeData.append([lat, lon, area["weight"]])

        len(storeData)
    - type: code
      title: 지도 생성
      content: |-
        storeMap = folium.Map(
            location=[37.53, 126.98],
            zoom_start=12,
            tiles="CartoDB Positron"
        )

        HeatMap(
            storeData,
            radius=25,
            blur=18,
            gradient={0.4: "#fee5d9", 0.6: "#fc9272", 0.8: "#de2d26", 1.0: "#a50f15"},
            min_opacity=0.5
        ).add_to(storeMap)

        for area in areas:
            folium.CircleMarker(
                location=area["center"],
                radius=5,
                color="black",
                fill=True,
                popup=f"매장 {area['count']}개"
            ).add_to(storeMap)

        storeMap
