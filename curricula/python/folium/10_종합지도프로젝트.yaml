- id: step2_base_map
  title: 2단계. 베이스 맵 설정
  structuredPrimary: true
  subtitle: 기본 지도
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    다중 타일 레이어를 지원하는 베이스 맵을 만듭니다.

    여러 타일을 추가하면 LayerControl에서 전환할 수 있습니다.
  tips:
  - 여러 타일을 추가하면 LayerControl에서 전환할 수 있습니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]

    tourMap = folium.Map(
        location=seoulCenter,
        zoom_start=12,
        tiles=None
    )

    folium.TileLayer(
        "CartoDB Positron",
        name="밝은 지도"
    ).add_to(tourMap)

    folium.TileLayer(
        "CartoDB Dark_Matter",
        name="어두운 지도"
    ).add_to(tourMap)

    folium.TileLayer(
        "OpenStreetMap",
        name="상세 지도"
    ).add_to(tourMap)

    tourMap
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]

      tourMap = folium.Map(
          location=seoulCenter,
          zoom_start=12,
          tiles=None
      )

      folium.TileLayer(
          "CartoDB Positron",
          name="밝은 지도"
      ).add_to(tourMap)

      folium.TileLayer(
          "CartoDB Dark_Matter",
          name="어두운 지도"
      ).add_to(tourMap)

      folium.TileLayer(
          "OpenStreetMap",
          name="상세 지도"
      ).add_to(tourMap)

      tourMap
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
