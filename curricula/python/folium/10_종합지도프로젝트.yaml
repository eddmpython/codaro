- id: step4_cafe_cluster
  title: 4단계. 카페 클러스터
  structuredPrimary: true
  subtitle: MarkerCluster
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    카페 위치를 클러스터로 표시합니다. 대량 데이터를 효율적으로 관리합니다.

    60개 카페가 클러스터로 깔끔하게 표시됩니다.
  tips:
  - 60개 카페가 클러스터로 깔끔하게 표시됩니다.
  snippet: |-
    cafeCluster = MarkerCluster(name="카페")

    cafeAreas = [
        [37.5796, 126.9770],
        [37.5636, 126.9869],
        [37.5563, 126.9236],
        [37.4979, 127.0276]
    ]

    for area in cafeAreas:
        for i in range(15):
            lat = area[0] + random.uniform(-0.008, 0.008)
            lon = area[1] + random.uniform(-0.008, 0.008)
            folium.Marker(
                location=[lat, lon],
                popup=f"카페 {i+1}",
                icon=folium.Icon(color="cadetblue", icon="cloud")
            ).add_to(cafeCluster)

    cafeCluster.add_to(tourMap)

    tourMap
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      cafeCluster = MarkerCluster(name="카페")

      cafeAreas = [
          [37.5796, 126.9770],
          [37.5636, 126.9869],
          [37.5563, 126.9236],
          [37.4979, 127.0276]
      ]

      for area in cafeAreas:
          for i in range(15):
              lat = area[0] + random.uniform(-0.008, 0.008)
              lon = area[1] + random.uniform(-0.008, 0.008)
              folium.Marker(
                  location=[lat, lon],
                  popup=f"카페 {i+1}",
                  icon=folium.Icon(color="cadetblue", icon="cloud")
              ).add_to(cafeCluster)

      cafeCluster.add_to(tourMap)

      tourMap
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_restaurant_cluster
  title: 5단계. 음식점 클러스터
  structuredPrimary: true
  subtitle: 별도 클러스터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    음식점용 별도 클러스터를 만들어 카테고리를 분리합니다.

    show=False로 기본 숨김 상태입니다. LayerControl에서 켤 수 있습니다.
  tips:
  - show=False로 기본 숨김 상태입니다. LayerControl에서 켤 수 있습니다.
  snippet: |-
    restaurantCluster = MarkerCluster(name="음식점", show=False)

    restaurantAreas = [
        [37.5636, 126.9869],
        [37.5701, 126.9995],
        [37.5660, 126.9910]
    ]

    for area in restaurantAreas:
        for i in range(20):
            lat = area[0] + random.uniform(-0.006, 0.006)
            lon = area[1] + random.uniform(-0.006, 0.006)
            folium.Marker(
                location=[lat, lon],
                popup=f"맛집 {i+1}",
                icon=folium.Icon(color="orange", icon="cutlery")
            ).add_to(restaurantCluster)

    restaurantCluster.add_to(tourMap)

