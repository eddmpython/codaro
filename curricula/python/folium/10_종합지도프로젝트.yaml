- id: step8_routes
  title: 8단계. 관광 코스
  structuredPrimary: true
  subtitle: PolyLine
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    추천 관광 코스를 경로로 표시합니다.

    실선과 점선으로 코스를 구분합니다.
  tips:
  - 실선과 점선으로 코스를 구분합니다.
  snippet: |-
    routeGroup = folium.FeatureGroup(name="추천 코스", show=False)

    palaceRoute = [
        [37.5796, 126.9770],
        [37.5794, 126.9910],
        [37.5826, 126.9831],
        [37.5760, 126.9769]
    ]

    folium.PolyLine(
        locations=palaceRoute,
        color="purple",
        weight=5,
        opacity=0.8,
        popup="궁궐 투어 (2시간)"
    ).add_to(routeGroup)

    shoppingRoute = [
        [37.5636, 126.9869],
        [37.5673, 127.0095],
        [37.5701, 126.9995]
    ]

    folium.PolyLine(
        locations=shoppingRoute,
        color="pink",
        weight=5,
        opacity=0.8,
        dash_array="10",
        popup="쇼핑 투어 (3시간)"
    ).add_to(routeGroup)

    routeGroup.add_to(tourMap)

    tourMap
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      routeGroup = folium.FeatureGroup(name="추천 코스", show=False)

      palaceRoute = [
          [37.5796, 126.9770],
          [37.5794, 126.9910],
          [37.5826, 126.9831],
          [37.5760, 126.9769]
      ]

      folium.PolyLine(
