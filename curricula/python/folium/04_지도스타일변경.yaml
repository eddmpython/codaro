- id: step4_custom_tiles
  title: 4단계. 커스텀 타일
  structuredPrimary: true
  subtitle: attribution 있는 외부 타일
  goal: '4단계. 커스텀 타일: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 커스텀 타일: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    외부 타일 서버를 사용할 때는 URL과 attribution을 함께 지정합니다. attribution이 없으면 최신 Folium에서는 실행 오류가 납니다.

    외부 타일은 attr이 필수입니다. 기본 제공 이름이 아닌 URL 템플릿을 쓸 때는 저작권 표시를 반드시 넣으세요.
  tips:
  - 외부 타일은 attr이 필수입니다. 기본 제공 이름이 아닌 URL 템플릿을 쓸 때는 저작권 표시를 반드시 넣으세요.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m5 = folium.Map(location=[37.6608, 126.9933], zoom_start=12)

    folium.TileLayer(
        tiles="https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
        attr="Map data: OpenStreetMap contributors, SRTM | Map style: OpenTopoMap",
        name="OpenTopoMap 지형도"
    ).add_to(m5)

    m5
  exercise:
    prompt: '4단계. 커스텀 타일: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      m5 = folium.Map(location=[37.6608, 126.9933], zoom_start=12)

      folium.TileLayer(
          tiles="https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
          attr="Map data: OpenStreetMap contributors, SRTM | Map style: OpenTopoMap",
          name="OpenTopoMap 지형도"
      ).add_to(m5)

      m5
    solution: |-
      m5 = folium.Map(location=[37.6608, 126.9933], zoom_start=12)

      folium.TileLayer(
          tiles="https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
          attr="Map data: OpenStreetMap contributors, SRTM | Map style: OpenTopoMap",
          name="OpenTopoMap 지형도"
      ).add_to(m5)

      m5
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 외부 타일 서버를 사용할 때는 URL과 attribution을 함께 지정합니다. attribution이 없으면 최신 Folium에서는 실행 오류가 납니다.
  - type: code
    language: python
    title: OpenTopoMap 지형도
    description: 지형 강조
    content: |-
