    - LayerControl에 업무용 레이어 이름이 모두 들어갔는지 검증합니다.
    - 목적을 바꾸는 실험으로 타일 선택 기준이 어떻게 달라지는지 비교합니다.
  - type: code
    language: python
    title: 타일 프로필 정의
    description: 운영 지도에서 사용할 타일 후보와 권장 용도를 구조화합니다.
    content: |-
      tileProfiles = {
          "operations": {"name": "운영 기본", "tiles": "OpenStreetMap", "attr": None, "useCase": "현장 위치 확인"},
          "report": {"name": "리포트 배경", "tiles": "CartoDB Positron", "attr": None, "useCase": "데이터 시각화"},
          "night": {"name": "야간 관제", "tiles": "CartoDB Dark_Matter", "attr": None, "useCase": "야간 대시보드"},
          "terrain": {
              "name": "지형 점검",
              "tiles": "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
              "attr": "Map data: OpenStreetMap contributors, SRTM | Map style: OpenTopoMap",
              "useCase": "산악/고도 맥락",
          },
      }

      recommendedProfile = tileProfiles["report"]
      recommendedProfile["name"], recommendedProfile["useCase"]
  - type: code
    language: python
    title: 타일 프로필 검증 함수
    description: URL 타일에는 attribution이 있는지 확인합니다.
    content: |-
      def validateTileProfile(profileKey, profile):
          tileValue = profile["tiles"]
          isCustomUrl = isinstance(tileValue, str) and tileValue.startswith("http")
          if isCustomUrl and not profile.get("attr"):
              raise ValueError(f"타일 attribution 누락: {profileKey}")
          return True

      tileValidation = [
          validateTileProfile(profileKey, profile)
          for profileKey, profile in tileProfiles.items()
      ]
      tileValidation
  - type: code
    language: python
    title: attribution 오류 확인
    description: 커스텀 URL에서 attribution을 뺀 프로필을 검증해 오류를 읽습니다.
    content: |-
      brokenTileProfile = {
          "name": "깨진 외부 타일",
          "tiles": "https://example.com/{z}/{x}/{y}.png",
          "attr": "",
          "useCase": "오류 확인",
      }

      try:
          validateTileProfile("broken", brokenTileProfile)
      except ValueError as exc:
          tileAttributionError = str(exc)

      tileAttributionError
  - type: code
    language: python
    title: 업무용 타일 레이어 지도
    description: 검증된 타일 프로필을 LayerControl에 모두 등록합니다.
    content: |-
      tileAuditMap = folium.Map(location=seoulCenter, zoom_start=12, tiles=None)

      for profileKey, profile in tileProfiles.items():
          validateTileProfile(profileKey, profile)
          layerArgs = {"tiles": profile["tiles"], "name": profile["name"]}
          if profile["attr"]:
              layerArgs["attr"] = profile["attr"]
          folium.TileLayer(**layerArgs).add_to(tileAuditMap)

      folium.Marker(
          seoulCenter,
          popup="타일 레이어 검증 기준점",
          tooltip="서울 중심",
          icon=folium.Icon(color="red", icon="ok-sign"),
      ).add_to(tileAuditMap)
      folium.LayerControl().add_to(tileAuditMap)

      tileAuditMap
  - type: code
    language: python
    title: 렌더 결과 검증
    description: 레이어 이름, attribution 오류, 추천 프로필이 예상대로 준비됐는지 확인합니다.
    content: |-
      tileAuditHtml = tileAuditMap.get_root().render()

      import json

      def renderedTextExists(text, html):
          escapedText = json.dumps(text, ensure_ascii=True).strip('"')
          return text in html or escapedText in html

      tileChecks = {
          "layersRendered": all(renderedTextExists(profile["name"], tileAuditHtml) for profile in tileProfiles.values()),
          "markerRendered": renderedTextExists("타일 레이어 검증 기준점", tileAuditHtml),
          "attributionErrorOk": tileAttributionError == "타일 attribution 누락: broken",
          "recommendationOk": recommendedProfile["name"] == "리포트 배경",
          "validationOk": all(tileValidation),
      }

      assert all(tileChecks.values()), tileChecks
      tileChecks
  - type: code
    language: python
    title: 수정 실험
    description: 업무 목적을 바꾸면 어떤 타일 프로필을 선택하는지 비교합니다.
    content: |-
      def recommendTileProfile(goal):
          goalToProfile = {
              "field": "operations",
              "report": "report",
              "night": "night",
              "mountain": "terrain",
          }
          profileKey = goalToProfile[goal]
          return tileProfiles[profileKey]["name"]

      reportTile = recommendTileProfile("report")
      mountainTile = recommendTileProfile("mountain")

      reportTile, mountainTile
  - type: tip
    content: 타일 선택은 보기 좋은 배경 고르기가 아닙니다. 데이터 대비, 업무 목적, attribution, LayerControl 렌더링을 함께 검증해야 로컬에서 반복 실행 가능한 지도 커리큘럼이 됩니다.
