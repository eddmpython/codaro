- id: step3_cartodb
  title: 3단계. CartoDB 타일
  structuredPrimary: true
  subtitle: Positron, DarkMatter
  goal: '3단계. CartoDB 타일: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. CartoDB 타일: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    CartoDB는 깔끔한 스타일의 타일을 제공합니다. Positron은 밝은 테마, DarkMatter는 어두운 테마입니다.

    Positron은 데이터 시각화 배경으로 적합합니다. 마커와 도형이 잘 보입니다. DarkMatter는 야간 모드나 밝은 색 데이터에 적합합니다.
  tips:
  - Positron은 데이터 시각화 배경으로 적합합니다. 마커와 도형이 잘 보입니다. DarkMatter는 야간 모드나 밝은 색 데이터에 적합합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m3 = folium.Map(
        location=seoulCenter,
        zoom_start=12,
        tiles="CartoDB Positron"
    )
    m3
  exercise:
    prompt: '3단계. CartoDB 타일: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      m3 = folium.Map(
          location=seoulCenter,
          zoom_start=12,
          tiles="CartoDB Positron"
      )
      m3
    solution: |-
      m3 = folium.Map(
          location=seoulCenter,
          zoom_start=12,
          tiles="CartoDB Positron"
      )
      m3
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: CartoDB는 깔끔한 스타일의 타일을 제공합니다. Positron은 밝은 테마, DarkMatter는 어두운 테마입니다.
