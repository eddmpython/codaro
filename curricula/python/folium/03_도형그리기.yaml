    title: 운영 도형 지도 만들기
    description: Polygon, Circle, PolyLine을 조합해 점검 구역과 이동 경로를 표시합니다.
    content: |-
      zoneMap = folium.Map(location=[37.56, 126.96], zoom_start=12)

      for zone in serviceZones:
          validateServiceZone(zone)
          zoneColor = "red" if zone["incidents"] >= 15 else "blue"
          folium.Polygon(
              locations=zone["polygon"],
              color=zoneColor,
              fill=True,
              fill_color=zoneColor,
              fill_opacity=0.18,
              popup=f"{zone['name']} / 사고 {zone['incidents']}건",
          ).add_to(zoneMap)
          folium.Circle(
              location=zone["center"],
              radius=zone["radiusMeters"],
              color=zoneColor,
              fill=False,
              popup=f"{zone['name']} 서비스 반경 {zone['radiusMeters']}m",
          ).add_to(zoneMap)
          folium.CircleMarker(
              location=zone["center"],
              radius=7,
              color="black",
              fill=True,
              popup=zone["name"],
          ).add_to(zoneMap)

      folium.PolyLine(
          locations=inspectionRoute,
          color="purple",
          weight=4,
          dash_array="8, 6",
          tooltip="점검 이동 경로",
      ).add_to(zoneMap)
      zoneMap.fit_bounds([point for zone in serviceZones for point in zone["polygon"]])

      zoneMap
  - type: code
    language: python
    title: 렌더 결과 검증
    description: 구역명, 반경, 경로, 오류 메시지가 결과 HTML과 변수에 들어갔는지 확인합니다.
    content: |-
      zoneHtml = zoneMap.get_root().render()
      shapeChecks = {
          "allZonesRendered": all(zone["name"] in zoneHtml for zone in serviceZones),
          "radiusRendered": all(str(zone["radiusMeters"]) in zoneHtml for zone in serviceZones),
          "routeRendered": "점검 이동 경로" in zoneHtml,
          "shapeErrorOk": shapeErrorMessage == "다각형 꼭짓점 부족: 임시 오류구역",
          "priorityPredictionOk": priorityZoneNames == ["북부 점검구역", "남부 점검구역"],
          "validationOk": all(zoneValidation),
      }

      assert all(shapeChecks.values()), shapeChecks
      shapeChecks
  - type: code
    language: python
    title: 수정 실험
    description: 우선 점검 기준을 바꾸면 어떤 구역이 위험 등급으로 바뀌는지 비교합니다.
    content: |-
      def selectPriorityZones(zones, incidentThreshold, radiusThreshold):
          return [
              zone["name"]
              for zone in zones
              if zone["incidents"] >= incidentThreshold or zone["radiusMeters"] >= radiusThreshold
          ]

      defaultPriority = selectPriorityZones(serviceZones, incidentThreshold=15, radiusThreshold=1500)
      strictPriority = selectPriorityZones(serviceZones, incidentThreshold=20, radiusThreshold=1800)

      defaultPriority, strictPriority
  - type: tip
    content: 도형 지도는 시각화와 검증을 분리하지 않습니다. 구역 다각형, 실제 반경, 이동 경로, 기준 변경 실험이 함께 있어야 운영자가 믿고 쓰는 지도 학습이 됩니다.
