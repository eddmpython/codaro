    title: 도형 데이터 검증 함수
    description: 지도에 그리기 전에 좌표 범위, 다각형 꼭짓점 수, 반경 값을 점검합니다.
    content: |-
      def validateMapCoordinate(point, label):
          lat, lon = point
          if not (33 <= lat <= 39 and 124 <= lon <= 132):
              raise ValueError(f"좌표 범위 오류: {label}")
          return True

      def validateServiceZone(zone):
          if len(zone["polygon"]) < 3:
              raise ValueError(f"다각형 꼭짓점 부족: {zone['name']}")
          if zone["radiusMeters"] <= 0:
              raise ValueError(f"반경 오류: {zone['name']}")
          for index, point in enumerate(zone["polygon"]):
              validateMapCoordinate(point, f"{zone['name']} 꼭짓점 {index + 1}")
          validateMapCoordinate(zone["center"], f"{zone['name']} 중심")
          return True

      zoneValidation = [validateServiceZone(zone) for zone in serviceZones]
      zoneValidation
  - type: code
    language: python
    title: 도형 오류 확인
    description: 꼭짓점이 부족한 구역을 일부러 넣고 검증 오류를 읽습니다.
    content: |-
      brokenZone = {
          "name": "임시 오류구역",
          "polygon": [[37.56, 126.95], [37.57, 126.96]],
          "center": [37.565, 126.955],
          "radiusMeters": 500,
          "incidents": 3,
      }

      try:
          validateServiceZone(brokenZone)
      except ValueError as exc:
          shapeErrorMessage = str(exc)

      shapeErrorMessage
