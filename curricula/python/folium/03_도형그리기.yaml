- id: step4_circle_style
  title: 4단계. 원 스타일링
  structuredPrimary: true
  subtitle: color, fill, weight
  goal: '4단계. 원 스타일링: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 원 스타일링: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    원의 외곽선과 채우기 색상, 투명도, 두께를 설정합니다.

    weight는 외곽선 두께(픽셀)입니다. fill=False면 테두리만 그립니다.
  tips:
  - weight는 외곽선 두께(픽셀)입니다. fill=False면 테두리만 그립니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
