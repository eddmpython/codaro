      m1 = folium.Map(location=seoulCenter, zoom_start=14)

      folium.Circle(
          location=seoulCenter,
          radius=500,
          color="blue",
          fill=True,
          fill_opacity=0.3
      ).add_to(m1)

      m1
    solution: |-
