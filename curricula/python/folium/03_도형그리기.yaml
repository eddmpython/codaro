    m4 = folium.Map(location=seoulCenter, zoom_start=13)

    folium.Circle(
        location=[37.5665, 126.9700],
        radius=400,
        color="green",
        weight=2,
        fill=True,
        fill_color="lightgreen",
        fill_opacity=0.4,
        popup="녹지 영역"
    ).add_to(m4)

    folium.Circle(
        location=[37.5665, 126.9860],
        radius=300,
        color="red",
        weight=5,
        fill=False,
        popup="경계만 표시"
