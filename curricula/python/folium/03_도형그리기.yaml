- id: step2_circle
  title: 2단계. Circle 그리기
  structuredPrimary: true
  subtitle: Circle()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Circle()은 실제 거리(미터) 기준으로 원을 그립니다. radius는 미터 단위입니다.

    Circle의 radius는 미터 단위입니다. 500이면 반경 500m입니다. 줌 레벨을 바꿔도 실제 크기는 동일합니다.
  tips:
  - Circle의 radius는 미터 단위입니다. 500이면 반경 500m입니다. 줌 레벨을 바꿔도 실제 크기는 동일합니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=14)

    folium.Circle(
        location=seoulCenter,
        radius=500,
        color="blue",
        fill=True,
        fill_opacity=0.3
    ).add_to(m1)

    m1
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=14)

      folium.Circle(
          location=seoulCenter,
          radius=500,
          color="blue",
          fill=True,
          fill_opacity=0.3
      ).add_to(m1)

      m1
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_circle_marker
  title: 3단계. CircleMarker 그리기
  structuredPrimary: true
  subtitle: CircleMarker()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    CircleMarker()는 픽셀 기준으로 원을 그립니다. 줌 레벨이 바뀌어도 화면상 크기가 동일합니다.

    Circle은 실제 영역 표시(반경 1km 배달 범위)에, CircleMarker는 데이터 포인트 크기 표시(인구수 비례)에 적합합니다.
  tips:
  - Circle은 실제 영역 표시(반경 1km 배달 범위)에, CircleMarker는 데이터 포인트 크기 표시(인구수 비례)에 적합합니다.
  snippet: |-
    m2 = folium.Map(location=seoulCenter, zoom_start=14)

    folium.CircleMarker(
        location=seoulCenter,
        radius=30,
        color="red",
        fill=True,
        fill_color="red",
        fill_opacity=0.5,
        popup="시청"
    ).add_to(m2)

    m2
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=14)

      folium.CircleMarker(
          location=seoulCenter,
          radius=30,
          color="red",
          fill=True,
          fill_color="red",
          fill_opacity=0.5,
          popup="시청"
      ).add_to(m2)

      m2
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_circle_style
  title: 4단계. 원 스타일링
  structuredPrimary: true
  subtitle: color, fill, weight
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    원의 외곽선과 채우기 색상, 투명도, 두께를 설정합니다.

    weight는 외곽선 두께(픽셀)입니다. fill=False면 테두리만 그립니다.
  tips:
  - weight는 외곽선 두께(픽셀)입니다. fill=False면 테두리만 그립니다.
  snippet: |-
    m4 = folium.Map(location=seoulCenter, zoom_start=13)

    folium.Circle(
        location=[37.5665, 126.9700],
        radius=400,
        color="green",
        weight=2,
        fill=True,
        fill_color="lightgreen",
        fill_opacity=0.4,
        popup="녹지 영역"
    ).add_to(m4)

    folium.Circle(
        location=[37.5665, 126.9860],
        radius=300,
        color="red",
        weight=5,
        fill=False,
        popup="경계만 표시"
    ).add_to(m4)

    m4
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m4 = folium.Map(location=seoulCenter, zoom_start=13)

      folium.Circle(
          location=[37.5665, 126.9700],
          radius=400,
          color="green",
          weight=2,
          fill=True,
          fill_color="lightgreen",
          fill_opacity=0.4,
          popup="녹지 영역"
      ).add_to(m4)

      folium.Circle(
          location=[37.5665, 126.9860],
          radius=300,
          color="red",
          weight=5,
          fill=False,
          popup="경계만 표시"
      ).add_to(m4)

      m4
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_rectangle
  title: 5단계. Rectangle 그리기
  structuredPrimary: true
  subtitle: Rectangle()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Rectangle()은 두 모서리 좌표로 사각형을 그립니다. bounds에 [[남서], [북동]] 좌표를 전달합니다.

    bounds는 [[남서쪽 위도, 경도], [북동쪽 위도, 경도]] 순서입니다. 좌하단과 우상단 좌표입니다.
  tips:
  - bounds는 [[남서쪽 위도, 경도], [북동쪽 위도, 경도]] 순서입니다. 좌하단과 우상단 좌표입니다.
  snippet: |-
    m5 = folium.Map(location=[37.5725, 126.9768], zoom_start=16)

    bounds = [[37.5700, 126.9755], [37.5750, 126.9785]]

    folium.Rectangle(
        bounds=bounds,
        color="purple",
        weight=3,
        fill=True,
        fill_color="purple",
        fill_opacity=0.2,
        popup="광화문 광장"
    ).add_to(m5)

    m5
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m5 = folium.Map(location=[37.5725, 126.9768], zoom_start=16)

      bounds = [[37.5700, 126.9755], [37.5750, 126.9785]]

      folium.Rectangle(
          bounds=bounds,
          color="purple",
          weight=3,
          fill=True,
          fill_color="purple",
          fill_opacity=0.2,
          popup="광화문 광장"
      ).add_to(m5)

      m5
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_polyline
  title: 6단계. PolyLine 그리기
  structuredPrimary: true
  subtitle: PolyLine()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    PolyLine()은 좌표 리스트를 연결한 선을 그립니다. 경로, 도로, 노선 표시에 사용합니다.

    locations는 [위도, 경도] 좌표의 리스트입니다. 순서대로 선이 연결됩니다.
  tips:
  - locations는 [위도, 경도] 좌표의 리스트입니다. 순서대로 선이 연결됩니다.
  snippet: |-
    m7 = folium.Map(location=[37.5283, 126.9340], zoom_start=14)

    walkRoute = [
        [37.5283, 126.9240],
        [37.5300, 126.9300],
        [37.5320, 126.9350],
        [37.5310, 126.9400],
        [37.5280, 126.9440]
    ]

    folium.PolyLine(
        locations=walkRoute,
        color="blue",
        weight=4,
        opacity=0.8,
        popup="한강 산책로"
    ).add_to(m7)

    m7
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m7 = folium.Map(location=[37.5283, 126.9340], zoom_start=14)

      walkRoute = [
          [37.5283, 126.9240],
          [37.5300, 126.9300],
          [37.5320, 126.9350],
          [37.5310, 126.9400],
          [37.5280, 126.9440]
      ]

      folium.PolyLine(
          locations=walkRoute,
          color="blue",
          weight=4,
          opacity=0.8,
          popup="한강 산책로"
      ).add_to(m7)

      m7
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_polyline_style
  title: 7단계. PolyLine 스타일
  structuredPrimary: true
  subtitle: dash_array, weight
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    선의 스타일을 다양하게 변경합니다. dash_array로 점선을 만들 수 있습니다.

    dash_array="10"은 10픽셀 선, 10픽셀 공백입니다. "10, 20"은 10픽셀 선, 20픽셀 공백입니다.
  tips:
  - dash_array="10"은 10픽셀 선, 10픽셀 공백입니다. "10, 20"은 10픽셀 선, 20픽셀 공백입니다.
  snippet: |-
    m9 = folium.Map(location=seoulCenter, zoom_start=13)

    route1 = [[37.5665, 126.9680], [37.5700, 126.9780], [37.5665, 126.9880]]
    route2 = [[37.5600, 126.9680], [37.5635, 126.9780], [37.5600, 126.9880]]
    route3 = [[37.5535, 126.9680], [37.5570, 126.9780], [37.5535, 126.9880]]

    folium.PolyLine(
        locations=route1,
        color="blue",
        weight=4,
        popup="실선"
    ).add_to(m9)

    folium.PolyLine(
        locations=route2,
        color="red",
        weight=4,
        dash_array="10",
        popup="점선"
    ).add_to(m9)

    folium.PolyLine(
        locations=route3,
        color="green",
        weight=4,
        dash_array="10, 20",
        popup="긴 점선"
    ).add_to(m9)

    m9
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m9 = folium.Map(location=seoulCenter, zoom_start=13)

      route1 = [[37.5665, 126.9680], [37.5700, 126.9780], [37.5665, 126.9880]]
      route2 = [[37.5600, 126.9680], [37.5635, 126.9780], [37.5600, 126.9880]]
      route3 = [[37.5535, 126.9680], [37.5570, 126.9780], [37.5535, 126.9880]]

      folium.PolyLine(
          locations=route1,
          color="blue",
          weight=4,
          popup="실선"
      ).add_to(m9)

      folium.PolyLine(
          locations=route2,
          color="red",
          weight=4,
          dash_array="10",
          popup="점선"
      ).add_to(m9)

      folium.PolyLine(
          locations=route3,
          color="green",
          weight=4,
          dash_array="10, 20",
          popup="긴 점선"
      ).add_to(m9)

      m9
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_polygon
  title: 8단계. Polygon 그리기
  structuredPrimary: true
  subtitle: Polygon()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Polygon()은 좌표 리스트로 닫힌 다각형을 그립니다. 시작점과 끝점이 자동으로 연결됩니다.

    Polygon은 자동으로 첫 점과 마지막 점을 연결합니다. PolyLine처럼 열린 선이 아닙니다.
  tips:
  - Polygon은 자동으로 첫 점과 마지막 점을 연결합니다. PolyLine처럼 열린 선이 아닙니다.
  snippet: |-
    m10 = folium.Map(location=seoulCenter, zoom_start=14)

    triangle = [
        [37.5700, 126.9780],
        [37.5630, 126.9700],
        [37.5630, 126.9860]
    ]

    folium.Polygon(
        locations=triangle,
        color="orange",
        weight=3,
        fill=True,
        fill_color="orange",
        fill_opacity=0.4,
        popup="삼각 구역"
    ).add_to(m10)

    m10
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      m10 = folium.Map(location=seoulCenter, zoom_start=14)

      triangle = [
          [37.5700, 126.9780],
          [37.5630, 126.9700],
          [37.5630, 126.9860]
      ]

      folium.Polygon(
          locations=triangle,
          color="orange",
          weight=3,
          fill=True,
          fill_color="orange",
          fill_opacity=0.4,
          popup="삼각 구역"
      ).add_to(m10)

      m10
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_multiple_shapes
  title: 9단계. 여러 도형 조합
  structuredPrimary: true
  subtitle: 도형 혼합 사용
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    원, 사각형, 선, 다각형을 조합하여 복잡한 지도를 만듭니다.

    여러 도형을 겹쳐 그릴 때 투명도를 적절히 조절하세요. fill_opacity가 너무 높으면 겹친 부분이 안 보입니다.
  tips:
  - 여러 도형을 겹쳐 그릴 때 투명도를 적절히 조절하세요. fill_opacity가 너무 높으면 겹친 부분이 안 보입니다.
  snippet: |-
    storeLocation = [37.5665, 126.9780]
    m12 = folium.Map(location=storeLocation, zoom_start=14)

    folium.Marker(
        location=storeLocation,
        popup="매장",
        icon=folium.Icon(color="red", icon="home")
    ).add_to(m12)

    folium.Circle(
        location=storeLocation,
        radius=1000,
        color="green",
        fill=True,
        fill_opacity=0.1,
        popup="1km 배달 가능"
    ).add_to(m12)

    folium.Circle(
        location=storeLocation,
        radius=2000,
        color="orange",
        fill=True,
        fill_opacity=0.1,
        popup="2km 배달 가능 (추가요금)"
    ).add_to(m12)

    folium.Circle(
        location=storeLocation,
        radius=3000,
        color="red",
        fill=False,
        popup="3km 배달 불가"
    ).add_to(m12)

    m12
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      storeLocation = [37.5665, 126.9780]
      m12 = folium.Map(location=storeLocation, zoom_start=14)

      folium.Marker(
          location=storeLocation,
          popup="매장",
          icon=folium.Icon(color="red", icon="home")
      ).add_to(m12)

      folium.Circle(
          location=storeLocation,
          radius=1000,
          color="green",
          fill=True,
          fill_opacity=0.1,
          popup="1km 배달 가능"
      ).add_to(m12)

      folium.Circle(
          location=storeLocation,
          radius=2000,
          color="orange",
          fill=True,
          fill_opacity=0.1,
          popup="2km 배달 가능 (추가요금)"
      ).add_to(m12)

      folium.Circle(
          location=storeLocation,
          radius=3000,
          color="red",
          fill=False,
          popup="3km 배달 불가"
      ).add_to(m12)

      m12
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
