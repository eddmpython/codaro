- id: step5_rectangle
  title: 5단계. Rectangle 그리기
  structuredPrimary: true
  subtitle: Rectangle()
  goal: '5단계. Rectangle 그리기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. Rectangle 그리기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Rectangle()은 두 모서리 좌표로 사각형을 그립니다. bounds에 [[남서], [북동]] 좌표를 전달합니다.

    bounds는 [[남서쪽 위도, 경도], [북동쪽 위도, 경도]] 순서입니다. 좌하단과 우상단 좌표입니다.
  tips:
  - bounds는 [[남서쪽 위도, 경도], [북동쪽 위도, 경도]] 순서입니다. 좌하단과 우상단 좌표입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m5 = folium.Map(location=[37.5725, 126.9768], zoom_start=16)

    bounds = [[37.5700, 126.9755], [37.5750, 126.9785]]

    folium.Rectangle(
        bounds=bounds,
        color="purple",
        weight=3,
        fill=True,
        fill_color="purple",
        fill_opacity=0.2,
        popup="광화문 광장"
    ).add_to(m5)

    m5
