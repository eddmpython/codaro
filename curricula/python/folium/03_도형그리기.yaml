- id: step2_circle
  title: 2단계. Circle 그리기
  structuredPrimary: true
  subtitle: Circle()
  goal: '2단계. Circle 그리기: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. Circle 그리기: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Circle()은 실제 거리(미터) 기준으로 원을 그립니다. radius는 미터 단위입니다.

    Circle의 radius는 미터 단위입니다. 500이면 반경 500m입니다. 줌 레벨을 바꿔도 실제 크기는 동일합니다.
  tips:
  - Circle의 radius는 미터 단위입니다. 500이면 반경 500m입니다. 줌 레벨을 바꿔도 실제 크기는 동일합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=14)

    folium.Circle(
        location=seoulCenter,
        radius=500,
        color="blue",
        fill=True,
        fill_opacity=0.3
    ).add_to(m1)

    m1
  exercise:
    prompt: '2단계. Circle 그리기: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
