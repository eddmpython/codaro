          radius=30,
          color="red",
          fill=True,
          fill_color="red",
          fill_opacity=0.5,
          popup="시청"
      ).add_to(m2)

      m2
    solution: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=14)

      folium.CircleMarker(
          location=seoulCenter,
          radius=30,
          color="red",
          fill=True,
          fill_color="red",
          fill_opacity=0.5,
          popup="시청"
      ).add_to(m2)

      m2
