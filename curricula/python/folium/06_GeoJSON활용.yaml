- id: step5_style_function
  title: 5단계. 스타일 함수
  structuredPrimary: true
  subtitle: style_function
  goal: '5단계. 스타일 함수: 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 스타일 함수: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    style_function으로 GeoJSON 요소의 스타일을 지정합니다. 함수는 feature를 받아 스타일 딕셔너리를 반환합니다.

    feature["properties"]로 속성에 접근합니다. 값에 따라 다른 색상을 반환하면 데이터 시각화가 됩니다.
  tips:
  - feature["properties"]로 속성에 접근합니다. 값에 따라 다른 색상을 반환하면 데이터 시각화가 됩니다.
