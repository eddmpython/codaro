- id: step2_geojson_structure
  title: 2단계. GeoJSON 구조
  structuredPrimary: true
  subtitle: 기본 형식
  goal: '2단계. GeoJSON 구조: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. GeoJSON 구조: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    GeoJSON은 type, geometry, properties로 구성됩니다. geometry에 좌표 정보가 있고, properties에 속성 정보가 있습니다.

    주의: GeoJSON은 [경도, 위도] 순서입니다. Folium의 [위도, 경도]와 반대입니다.
  tips:
  - '주의: GeoJSON은 [경도, 위도] 순서입니다. Folium의 [위도, 경도]와 반대입니다.'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    pointGeo = {
        "type": "Feature",
        "geometry": {
            "type": "Point",
            "coordinates": [126.9780, 37.5665]
        },
        "properties": {
            "name": "서울시청"
        }
    }
    pointGeo
