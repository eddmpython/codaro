  - type: text
    content: GeoJSON 업무에서 가장 흔한 오류는 지도가 안 그려지는 문제가 아니라, 그럴듯하게 그려졌지만 좌표 순서나 속성 키가 틀린 상태입니다. 실행 전에 [경도, 위도] 순서를 예측하고, 폴리곤이 닫혔는지,
      필수 속성이 있는지 검증해야 합니다.
  - type: list
    items:
    - GeoJSON 좌표는 [경도, 위도] 순서입니다.
    - Polygon의 첫 좌표와 마지막 좌표는 같아야 합니다.
    - 업무 지도에 필요한 properties 키는 렌더 전에 검증합니다.
    - 경계 수정 실험은 면적/구역 수/HTML 렌더 결과를 함께 확인합니다.
