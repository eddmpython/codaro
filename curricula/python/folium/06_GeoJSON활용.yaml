intro:
  emoji: 🗾
  goal: GeoJSON 데이터로 지역 경계를 표시합니다.
  description: GeoJSON은 지리 정보를 표현하는 표준 형식입니다. 도시 경계, 행정구역, 도로 등을 표현합니다. Folium의 GeoJson()으로 이 데이터를 지도에
    표시하고 스타일을 적용합니다.
  direction: GeoJSON 활용에서 위치 데이터를 지도 레이어로 배치하고 마커/영역 표시를 검증합니다.
  benefits:
  - 위도/경도 데이터 확인 후 지도 레이어 구성에 맞는 코드 입력을 고릅니다.
  - GeoJSON 활용 결과를 마커와 저장 HTML 기준으로 즉시 점검합니다.
  - 완료한 코드를 위치 기반 리포트에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(위도/경도 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. GeoJSON 구조 처리 실행
      detail: 지도 레이어 구성 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 폴리곤 GeoJSON 결과 검증
      detail: 마커와 저장 HTML 기준으로 실행 결과를 비교합니다.
    - label: GeoJSON 활용 재사용
      detail: 완성 코드를 위치 기반 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 지도 시각화 환경
      detail: folium 기준으로 로컬 Python 실행을 준비합니다.
    - label: GeoJSON 활용 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: GeoJSON 활용 완료
      detail: 검증된 코드를 위치 기반 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: folium과 Codaro를 불러옵니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import folium
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 입력값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: import folium
    hints:
    - 1단계. 라이브러리 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 라이브러리 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_geojson_structure
  title: 2단계. GeoJSON 구조
  structuredPrimary: true
  subtitle: 기본 형식
  goal: 2단계. GeoJSON 구조에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    GeoJSON은 type, geometry, properties로 구성됩니다. geometry에 좌표 정보가 있고, properties에 속성 정보가 있습니다.

    주의: GeoJSON은 [경도, 위도] 순서입니다. Folium의 [위도, 경도]와 반대입니다.
  tips:
  - '주의: GeoJSON은 [경도, 위도] 순서입니다. Folium의 [위도, 경도]와 반대입니다.'
  snippet: |-
    pointGeo = {
        "type": "Feature",
        "geometry": {
            "type": "Point",
            "coordinates": [126.9780, 37.5665]
        },
        "properties": {
            "name": "서울시청"
        }
    }
    pointGeo
  exercise:
    prompt: 2단계. GeoJSON 구조 예제에서 리스트 값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      pointGeo = {
          "type": "Feature",
          "geometry": {
              "type": "Point",
              "coordinates": [126.9780, 37.5665]
          },
          "properties": {
              "name": "서울시청"
          }
      }
      pointGeo
    hints:
    - 2단계. GeoJSON 구조 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. GeoJSON 구조 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. GeoJSON 구조에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step3_polygon_geojson
  title: 3단계. 폴리곤 GeoJSON
  structuredPrimary: true
  subtitle: 영역 데이터
  goal: 3단계. 폴리곤 GeoJSON에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    Polygon 타입으로 영역을 표현합니다. 좌표 리스트의 리스트 형태이고, 시작점과 끝점이 같아야 합니다.

    Polygon 좌표는 이중 리스트입니다. 외곽선과 내부 구멍을 표현하기 위함입니다.
  tips:
  - Polygon 좌표는 이중 리스트입니다. 외곽선과 내부 구멍을 표현하기 위함입니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=14)

    areaGeo = {
        "type": "Feature",
        "geometry": {
            "type": "Polygon",
            "coordinates": [[
                [126.9730, 37.5630],
                [126.9830, 37.5630],
                [126.9830, 37.5700],
                [126.9730, 37.5700],
                [126.9730, 37.5630]
            ]]
        },
        "properties": {
            "name": "시청 주변"
        }
    }

    folium.GeoJson(areaGeo).add_to(m1)

    m1
  exercise:
    prompt: 3단계. 폴리곤 GeoJSON 예제에서 리스트 값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]
      m1 = folium.Map(location=seoulCenter, zoom_start=14)

      areaGeo = {
          "type": "Feature",
          "geometry": {
              "type": "Polygon",
              "coordinates": [[
                  [126.9730, 37.5630],
                  [126.9830, 37.5630],
                  [126.9830, 37.5700],
                  [126.9730, 37.5700],
                  [126.9730, 37.5630]
              ]]
          },
          "properties": {
              "name": "시청 주변"
          }
      }

      folium.GeoJson(areaGeo).add_to(m1)

      m1
    hints:
    - 3단계. 폴리곤 GeoJSON 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 폴리곤 GeoJSON 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 폴리곤 GeoJSON에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step4_feature_collection
  title: 4단계. FeatureCollection
  structuredPrimary: true
  subtitle: 여러 도형 묶기
  goal: 4단계. FeatureCollection에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    FeatureCollection으로 여러 Feature를 하나로 묶습니다. 대부분의 GeoJSON 파일은 이 형태입니다.

    properties에 원하는 속성을 추가할 수 있습니다. name, value, category 등 다양한 정보를 담습니다.
  tips:
  - properties에 원하는 속성을 추가할 수 있습니다. name, value, category 등 다양한 정보를 담습니다.
  snippet: |-
    m2 = folium.Map(location=seoulCenter, zoom_start=13)

    areasGeo = {
        "type": "FeatureCollection",
        "features": [
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.9730, 37.5630],
                        [126.9780, 37.5630],
                        [126.9780, 37.5680],
                        [126.9730, 37.5680],
                        [126.9730, 37.5630]
                    ]]
                },
                "properties": {"name": "A구역", "value": 100}
            },
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.9780, 37.5630],
                        [126.9830, 37.5630],
                        [126.9830, 37.5680],
                        [126.9780, 37.5680],
                        [126.9780, 37.5630]
                    ]]
                },
                "properties": {"name": "B구역", "value": 80}
            },
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.9730, 37.5680],
                        [126.9780, 37.5680],
                        [126.9780, 37.5730],
                        [126.9730, 37.5730],
                        [126.9730, 37.5680]
                    ]]
                },
                "properties": {"name": "C구역", "value": 60}
            }
        ]
    }

    folium.GeoJson(areasGeo).add_to(m2)

    m2
  exercise:
    prompt: 4단계. FeatureCollection 예제에서 리스트 값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m2 = folium.Map(location=seoulCenter, zoom_start=13)

      areasGeo = {
          "type": "FeatureCollection",
          "features": [
              {
                  "type": "Feature",
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.9730, 37.5630],
                          [126.9780, 37.5630],
                          [126.9780, 37.5680],
                          [126.9730, 37.5680],
                          [126.9730, 37.5630]
                      ]]
                  },
                  "properties": {"name": "A구역", "value": 100}
              },
              {
                  "type": "Feature",
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.9780, 37.5630],
                          [126.9830, 37.5630],
                          [126.9830, 37.5680],
                          [126.9780, 37.5680],
                          [126.9780, 37.5630]
                      ]]
                  },
                  "properties": {"name": "B구역", "value": 80}
              },
              {
                  "type": "Feature",
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.9730, 37.5680],
                          [126.9780, 37.5680],
                          [126.9780, 37.5730],
                          [126.9730, 37.5730],
                          [126.9730, 37.5680]
                      ]]
                  },
                  "properties": {"name": "C구역", "value": 60}
              }
          ]
      }

      folium.GeoJson(areasGeo).add_to(m2)

      m2
    hints:
    - 4단계. FeatureCollection 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. FeatureCollection 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. FeatureCollection에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step5_style_function
  title: 5단계. 스타일 함수
  structuredPrimary: true
  subtitle: style_function
  goal: 5단계. 스타일 함수에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    style_function으로 GeoJSON 요소의 스타일을 지정합니다. 함수는 feature를 받아 스타일 딕셔너리를 반환합니다.

    feature["properties"]로 속성에 접근합니다. 값에 따라 다른 색상을 반환하면 데이터 시각화가 됩니다.
  tips:
  - feature["properties"]로 속성에 접근합니다. 값에 따라 다른 색상을 반환하면 데이터 시각화가 됩니다.
  snippet: |-
    m3 = folium.Map(location=seoulCenter, zoom_start=13)

    def styleFunc(feature):
        return {
            "fillColor": "green",
            "color": "darkgreen",
            "weight": 2,
            "fillOpacity": 0.4
        }

    folium.GeoJson(
        areasGeo,
        style_function=styleFunc
    ).add_to(m3)

    m3
  exercise:
    prompt: 5단계. 스타일 함수 예제에서 인자나 반환값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m3 = folium.Map(location=seoulCenter, zoom_start=13)

      def styleFunc(feature):
          return {
              "fillColor": "green",
              "color": "darkgreen",
              "weight": 2,
              "fillOpacity": 0.4
          }

      folium.GeoJson(
          areasGeo,
          style_function=styleFunc
      ).add_to(m3)

      m3
    hints:
    - 5단계. 스타일 함수 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 스타일 함수 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 스타일 함수에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: step6_popup_tooltip
  title: 6단계. 팝업과 툴팁
  structuredPrimary: true
  subtitle: GeoJsonPopup, GeoJsonTooltip
  goal: 6단계. 팝업과 툴팁에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    GeoJsonPopup과 GeoJsonTooltip으로 클릭/호버 시 정보를 표시합니다. fields에 표시할 속성을 지정합니다.

    aliases로 표시되는 라벨을 변경할 수 있습니다. fields와 같은 순서로 지정합니다.
  tips:
  - aliases로 표시되는 라벨을 변경할 수 있습니다. fields와 같은 순서로 지정합니다.
  snippet: |-
    m5 = folium.Map(location=seoulCenter, zoom_start=13)

    folium.GeoJson(
        areasGeo,
        style_function=lambda x: {"fillColor": "blue", "fillOpacity": 0.3},
        popup=folium.GeoJsonPopup(fields=["name", "value"])
    ).add_to(m5)

    m5
  exercise:
    prompt: 6단계. 팝업과 툴팁 예제에서 리스트 값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m5 = folium.Map(location=seoulCenter, zoom_start=13)

      folium.GeoJson(
          areasGeo,
          style_function=lambda x: {"fillColor": "blue", "fillOpacity": 0.3},
          popup=folium.GeoJsonPopup(fields=["name", "value"])
      ).add_to(m5)

      m5
    hints:
    - 6단계. 팝업과 툴팁 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 팝업과 툴팁 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 팝업과 툴팁에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step7_highlight
  title: 7단계. 하이라이트 효과
  structuredPrimary: true
  subtitle: highlight_function
  goal: 7단계. 하이라이트 효과에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    highlight_function으로 마우스 호버 시 스타일을 변경합니다.

    하이라이트는 인터랙티브 지도에서 사용자 경험을 향상시킵니다.
  tips:
