- id: step9_seoul_gu
  title: 9단계. 서울 구 경계 예제
  structuredPrimary: true
  subtitle: 행정구역
  goal: '9단계. 서울 구 경계 예제: 실행 가능한 Python 흐름으로 익힌다.'
  why: '9단계. 서울 구 경계 예제: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    서울의 구 경계를 간단한 GeoJSON으로 표현합니다.

    실제 행정구역 GeoJSON은 data.seoul.go.kr 등에서 다운로드할 수 있습니다.
  tips:
  - 실제 행정구역 GeoJSON은 data.seoul.go.kr 등에서 다운로드할 수 있습니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    m9 = folium.Map(location=[37.56, 126.98], zoom_start=12)

    seoulGu = {
        "type": "FeatureCollection",
        "features": [
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.58],
                        [127.00, 37.58],
                        [127.00, 37.61],
                        [126.96, 37.61],
                        [126.96, 37.58]
                    ]]
                },
                "properties": {"name": "종로구", "population": 150000}
            },
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.55],
                        [127.00, 37.55],
                        [127.00, 37.58],
                        [126.96, 37.58],
                        [126.96, 37.55]
                    ]]
                },
                "properties": {"name": "중구", "population": 130000}
            },
            {
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.52],
                        [127.00, 37.52],
                        [127.00, 37.55],
                        [126.96, 37.55],
                        [126.96, 37.52]
                    ]]
                },
                "properties": {"name": "용산구", "population": 230000}
            }
        ]
    }

    def popStyle(feature):
        pop = feature["properties"]["population"]
        if pop >= 200000:
            return {"fillColor": "red", "fillOpacity": 0.5, "color": "black", "weight": 2}
        elif pop >= 150000:
            return {"fillColor": "orange", "fillOpacity": 0.5, "color": "black", "weight": 2}
        else:
            return {"fillColor": "green", "fillOpacity": 0.5, "color": "black", "weight": 2}

    folium.GeoJson(
        seoulGu,
        style_function=popStyle,
        tooltip=folium.GeoJsonTooltip(
            fields=["name", "population"],
            aliases=["구:", "인구:"]
        )
    ).add_to(m9)

