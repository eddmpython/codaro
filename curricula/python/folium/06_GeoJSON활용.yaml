    FeatureCollection으로 여러 Feature를 하나로 묶습니다. 대부분의 GeoJSON 파일은 이 형태입니다.

    properties에 원하는 속성을 추가할 수 있습니다. name, value, category 등 다양한 정보를 담습니다.
