- id: step3_polygon_geojson
  title: 3단계. 폴리곤 GeoJSON
  structuredPrimary: true
  subtitle: 영역 데이터
  goal: '3단계. 폴리곤 GeoJSON: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 폴리곤 GeoJSON: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Polygon 타입으로 영역을 표현합니다. 좌표 리스트의 리스트 형태이고, 시작점과 끝점이 같아야 합니다.

    Polygon 좌표는 이중 리스트입니다. 외곽선과 내부 구멍을 표현하기 위함입니다.
  tips:
  - Polygon 좌표는 이중 리스트입니다. 외곽선과 내부 구멍을 표현하기 위함입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]
    m1 = folium.Map(location=seoulCenter, zoom_start=14)

    areaGeo = {
        "type": "Feature",
        "geometry": {
            "type": "Polygon",
            "coordinates": [[
                [126.9730, 37.5630],
                [126.9830, 37.5630],
                [126.9830, 37.5700],
                [126.9730, 37.5700],
                [126.9730, 37.5630]
            ]]
        },
        "properties": {
            "name": "시청 주변"
        }
    }

    folium.GeoJson(areaGeo).add_to(m1)

    m1
