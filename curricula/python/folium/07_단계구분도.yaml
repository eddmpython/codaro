        voteMap = folium.Map(location=[37.555, 126.98], zoom_start=12)

        voteColormap = cm.StepColormap(
            colors=["#fee5d9", "#fcae91", "#fb6a4a", "#cb181d"],
            index=[50, 60, 70, 80],
            vmin=50,
            vmax=80,
            caption="투표율(%)"
        )

        def voteHighlight(feature):
            return {"fillColor": "yellow", "fillOpacity": 0.9, "weight": 3}

        folium.GeoJson(
            voteGeo,
            style_function=lambda f: {
                "fillColor": voteColormap(f["properties"]["turnout"]),
                "color": "black",
                "weight": 1,
                "fillOpacity": 0.7
            },
            highlight_function=voteHighlight,
            tooltip=folium.GeoJsonTooltip(
                fields=["district", "turnout"],
                aliases=["선거구:", "투표율:"]
            )
        ).add_to(voteMap)

        voteColormap.add_to(voteMap)

        voteMap
