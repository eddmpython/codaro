- id: step2_choropleth_basics
  title: 2단계. Choropleth 기본
  structuredPrimary: true
  subtitle: Choropleth()
  goal: 2단계. Choropleth 기본에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    Choropleth()는 GeoJSON과 데이터를 연결하여 색상을 자동 매핑합니다. key_on으로 GeoJSON 속성을, columns로 데이터 컬럼을 지정합니다.

    GeoJSON의 properties에 있는 id와 데이터의 키를 매칭시킵니다.
  tips:
  - GeoJSON의 properties에 있는 id와 데이터의 키를 매칭시킵니다.
  snippet: |-
    seoulCenter = [37.5665, 126.9780]

    guGeo = {
        "type": "FeatureCollection",
        "features": [
            {
                "type": "Feature",
                "properties": {"id": "jongno", "name": "종로구"},
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.57], [127.00, 37.57],
                        [127.00, 37.60], [126.96, 37.60], [126.96, 37.57]
                    ]]
                }
            },
            {
                "type": "Feature",
                "properties": {"id": "jung", "name": "중구"},
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.54], [127.00, 37.54],
                        [127.00, 37.57], [126.96, 37.57], [126.96, 37.54]
                    ]]
                }
            },
            {
                "type": "Feature",
                "properties": {"id": "yongsan", "name": "용산구"},
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [[
                        [126.96, 37.51], [127.00, 37.51],
                        [127.00, 37.54], [126.96, 37.54], [126.96, 37.51]
                    ]]
                }
            }
        ]
    }

    guData = {
        "jongno": 150000,
        "jung": 130000,
        "yongsan": 230000
    }
    guData
  exercise:
    prompt: 2단계. Choropleth 기본 예제에서 리스트 값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      seoulCenter = [37.5665, 126.9780]

      guGeo = {
          "type": "FeatureCollection",
          "features": [
              {
                  "type": "Feature",
                  "properties": {"id": "jongno", "name": "종로구"},
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.96, 37.57], [127.00, 37.57],
                          [127.00, 37.60], [126.96, 37.60], [126.96, 37.57]
                      ]]
                  }
              },
              {
                  "type": "Feature",
                  "properties": {"id": "jung", "name": "중구"},
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.96, 37.54], [127.00, 37.54],
                          [127.00, 37.57], [126.96, 37.57], [126.96, 37.54]
                      ]]
                  }
              },
              {
                  "type": "Feature",
                  "properties": {"id": "yongsan", "name": "용산구"},
                  "geometry": {
                      "type": "Polygon",
                      "coordinates": [[
                          [126.96, 37.51], [127.00, 37.51],
                          [127.00, 37.54], [126.96, 37.54], [126.96, 37.51]
                      ]]
                  }
              }
          ]
      }

      guData = {
          "jongno": 150000,
          "jung": 130000,
          "yongsan": 230000
      }
      guData
    hints:
    - 2단계. Choropleth 기본 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. Choropleth 기본 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. Choropleth 기본에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step3_simple_choropleth
  title: 3단계. 간단한 Choropleth
  structuredPrimary: true
  subtitle: GeoJson + style_function
  goal: 3단계. 간단한 Choropleth에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    Choropleth 클래스 대신 GeoJson에 style_function을 사용하면 더 유연하게 구현할 수 있습니다.

    getColor 함수에서 값에 따라 색상을 반환합니다. 임계값을 조절하여 구간을 설정합니다.
  tips:
  - getColor 함수에서 값에 따라 색상을 반환합니다. 임계값을 조절하여 구간을 설정합니다.
  snippet: |-
    m1 = folium.Map(location=[37.555, 126.98], zoom_start=12)

    def getColor(value):
        if value >= 200000:
            return "#e74c3c"
        elif value >= 150000:
            return "#f39c12"
        else:
            return "#27ae60"

    def choroplethStyle(feature):
        guId = feature["properties"]["id"]
        value = guData.get(guId, 0)
        return {
            "fillColor": getColor(value),
            "color": "white",
            "weight": 2,
            "fillOpacity": 0.7
        }

    folium.GeoJson(
        guGeo,
        style_function=choroplethStyle,
        tooltip=folium.GeoJsonTooltip(fields=["name"])
    ).add_to(m1)

    m1
  exercise:
    prompt: 3단계. 간단한 Choropleth 예제에서 인자나 반환값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      m1 = folium.Map(location=[37.555, 126.98], zoom_start=12)

      def getColor(value):
          if value >= 200000:
              return "#e74c3c"
          elif value >= 150000:
              return "#f39c12"
          else:
              return "#27ae60"

      def choroplethStyle(feature):
          guId = feature["properties"]["id"]
          value = guData.get(guId, 0)
          return {
              "fillColor": getColor(value),
              "color": "white",
              "weight": 2,
              "fillOpacity": 0.7
          }

      folium.GeoJson(
          guGeo,
          style_function=choroplethStyle,
          tooltip=folium.GeoJsonTooltip(fields=["name"])
      ).add_to(m1)

      m1
    hints:
    - 3단계. 간단한 Choropleth 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 간단한 Choropleth 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 간단한 Choropleth에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: step4_color_scale
  title: 4단계. 컬러 스케일
  structuredPrimary: true
  subtitle: 연속적 색상
  goal: 4단계. 컬러 스케일에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    branca 라이브러리로 연속적인 컬러 스케일을 만들 수 있습니다. Folium에 포함되어 있습니다.

    LinearColormap은 값에 따라 색상을 선형으로 보간합니다. 최소~최대 범위를 자동으로 매핑합니다.
  tips:
  - LinearColormap은 값에 따라 색상을 선형으로 보간합니다. 최소~최대 범위를 자동으로 매핑합니다.
  snippet: |-
    import branca.colormap as cm

    m2 = folium.Map(location=[37.555, 126.98], zoom_start=12)

    values = list(guData.values())
    minVal = min(values)
    maxVal = max(values)

    colormap = cm.LinearColormap(
        colors=["green", "yellow", "red"],
        vmin=minVal,
        vmax=maxVal
    )

    def scaleStyle(feature):
        guId = feature["properties"]["id"]
        value = guData.get(guId, minVal)
        return {
            "fillColor": colormap(value),
            "color": "black",
            "weight": 1,
            "fillOpacity": 0.7
        }

    folium.GeoJson(
        guGeo,
        style_function=scaleStyle,
        tooltip=folium.GeoJsonTooltip(fields=["name"])
    ).add_to(m2)

    m2
  exercise:
    prompt: 4단계. 컬러 스케일 예제에서 인자나 반환값을 바꿔 실행하고, 마커와 저장 HTML 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import branca.colormap as cm

      m2 = folium.Map(location=[37.555, 126.98], zoom_start=12)

      values = list(guData.values())
      minVal = min(values)
      maxVal = max(values)

      colormap = cm.LinearColormap(
          colors=["green", "yellow", "red"],
          vmin=minVal,
          vmax=maxVal
      )

      def scaleStyle(feature):
          guId = feature["properties"]["id"]
          value = guData.get(guId, minVal)
          return {
              "fillColor": colormap(value),
              "color": "black",
              "weight": 1,
              "fillOpacity": 0.7
          }

      folium.GeoJson(
          guGeo,
          style_function=scaleStyle,
          tooltip=folium.GeoJsonTooltip(fields=["name"])
      ).add_to(m2)

      m2
    hints:
    - 4단계. 컬러 스케일 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 마커와 저장 HTML 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 컬러 스케일 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 컬러 스케일에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
- id: step5_add_legend
  title: 5단계. 범례 추가
  structuredPrimary: true
  subtitle: ColorMap 범례
  goal: 5단계. 범례 추가에서 지도 레이어 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 지도 시각화는 위치가 중요한 데이터를 실제 공간 맥락으로 검토하게 해줍니다.
  explanation: |-
    ColorMap에 caption을 추가하고 지도에 add_to()하면 범례가 표시됩니다.

    caption은 범례 제목입니다. 범례는 지도 우측 하단에 표시됩니다.
  tips:
  - caption은 범례 제목입니다. 범례는 지도 우측 하단에 표시됩니다.
  snippet: |-
    m3 = folium.Map(location=[37.555, 126.98], zoom_start=12)

    legendColormap = cm.LinearColormap(
        colors=["#2ecc71", "#f1c40f", "#e74c3c"],
        vmin=100000,
        vmax=250000,
        caption="인구수"
    )

    def legendStyle(feature):
        guId = feature["properties"]["id"]
        value = guData.get(guId, 100000)
        return {
            "fillColor": legendColormap(value),
            "color": "white",
            "weight": 2,
            "fillOpacity": 0.7
        }

    folium.GeoJson(
        guGeo,
        style_function=legendStyle,
        tooltip=folium.GeoJsonTooltip(fields=["name"])
    ).add_to(m3)

    legendColormap.add_to(m3)

    m3
  exercise:
