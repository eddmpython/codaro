      patterns = {
          "긍정 후방 (?<=test)": r"(?<=test)\d+",
          "부정 후방 (?<!test)": r"(?<!test)\d+",
          "긍정 전방 (?=abc)": r"\d+(?=abc)",
          "부정 전방 (?!abc)": r"\d+(?!abc)"
      }

      {name: re.findall(pattern, text) for name, pattern in patterns.items()}
    solution: |-
      text = "test123abc"

      patterns = {
          "긍정 후방 (?<=test)": r"(?<=test)\d+",
