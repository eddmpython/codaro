- id: step10_summary
  title: 10단계. Lookaround 정리
  structuredPrimary: true
  subtitle: 4가지 패턴 비교
  goal: '10단계. Lookaround 정리: 실행 가능한 Python 흐름으로 익힌다.'
  why: '10단계. Lookaround 정리: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    Lookaround 패턴을 한눈에 정리합니다.

    Lookaround 4종 정리
    | 이름 | 문법 | 의미 | |------|------|------| | 긍정 후방탐색 | (?<=X)Y | X 뒤의 Y | | 부정 후방탐색 | (?<!X)Y | X가 아닌 것 뒤의 Y | | 긍정 전방탐색 | Y(?=X) | X 앞의 Y | | 부정 전방탐색 | Y(?!X) | X가 아닌 것 앞의 Y |
  tips:
  - Lookaround 4종 정리 | 이름 | 문법 | 의미 | |------|------|------| | 긍정 후방탐색 | (?<=X)Y | X 뒤의 Y | | 부정 후방탐색 | (?<!X)Y | X가 아닌 것
    뒤의 Y | | 긍정 전방탐색 | Y(?=X) | X 앞의 Y | | 부정 전방탐색 | Y(?!X) | X가 아닌 것 앞의 Y |
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    text = "test123abc"

    patterns = {
        "긍정 후방 (?<=test)": r"(?<=test)\d+",
        "부정 후방 (?<!test)": r"(?<!test)\d+",
        "긍정 전방 (?=abc)": r"\d+(?=abc)",
        "부정 전방 (?!abc)": r"\d+(?!abc)"
    }

    {name: re.findall(pattern, text) for name, pattern in patterns.items()}
  exercise:
    prompt: '10단계. Lookaround 정리: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
