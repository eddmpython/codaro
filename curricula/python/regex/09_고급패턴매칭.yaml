  - type: code
    language: python
    title: 패턴 오류와 빈 입력을 먼저 실패시킨다
    description: 컴파일이 깨지는 패턴과 추출 결과가 없는 입력을 구분합니다.
    content: |-
      try:
          re.compile(r'([A-Z]+')
      except re.error as exc:
          regexCompileError = str(exc)

      def extractRequiredEmails(text):
          found = emailPattern.findall(text)
          if not found:
              raise ValueError('email not found')
          return found

      try:
          extractRequiredEmails('no contact here')
      except ValueError as exc:
          emailExtractError = str(exc)

      assert regexCompileError
      assert emailExtractError == 'email not found'
      regexCompileError, emailExtractError
  - type: code
    language: python
    title: 정제 결과를 업무 구조로 검증
    description: 추출한 값을 마스킹 리포트와 도메인 집계로 바꿉니다.
    content: |-
      def maskEmail(email):
          name, domain = email.split('@')
          return name[0] + '***@' + domain

      contactReport = [
          {'email': email, 'masked': maskEmail(email), 'domain': email.split('@')[1]}
          for email in emails
      ]
      domainCounts = {row['domain']: 0 for row in contactReport}
      for row in contactReport:
          domainCounts[row['domain']] += 1

      assert contactReport[0]['masked'] == 'k***@example.com'
      assert domainCounts == {'example.com': 1, 'company.co.kr': 1}
      contactReport
  - type: code
    language: python
    title: '실무 변주: 허용 도메인 정책 바꾸기'
    description: 회사 도메인만 남기는 정책으로 결과가 어떻게 달라지는지 확인합니다.
    content: |-
      def filterAllowedDomains(report, allowedDomains):
          if not allowedDomains:
              raise ValueError('allowedDomains must not be empty')
          return [row for row in report if row['domain'] in allowedDomains]

      companyOnly = filterAllowedDomains(contactReport, {'company.co.kr'})
      assert [row['email'] for row in companyOnly] == ['lee@company.co.kr']
      companyOnly
