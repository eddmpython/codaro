- id: step3_positive_lookbehind
  title: 3단계. 긍정 후방탐색 (?<=...)
  structuredPrimary: true
  subtitle: 뒤를 보되 포함하지 않기
  goal: '3단계. 긍정 후방탐색 (?<=...): 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 긍정 후방탐색 (?<=...): 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    긍정 후방탐색 (?<=패턴)은 앞에 특정 패턴이 있는 위치를 찾되, 그 패턴 자체는 결과에 포함하지 않습니다. 제로폭 단언(zero-width assertion)이라고도 하며, 위치만 확인하고 문자를 소비하지 않는 특수한 기능입니다.

    결과: ['100', '200', '300'] - 완벽합니다!
  tips:
  - '긍정 후방탐색: (?<=...) **(?<=패턴)매칭**: - "앞에 패턴이 있는" 매칭을 찾음 - 하지만 패턴 자체는 결과에 포함하지 않음 - **제로폭 단언**: 위치만 확인, 문자 소비 안 함 예: `(?<=@)\w+`
    → @ 뒤의 단어 (@ 제외)'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    pattern = r"(?<=\$)\d+"

    prices = re.findall(pattern, text)
    prices
  exercise:
    prompt: '3단계. 긍정 후방탐색 (?<=...): 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      pattern = r"(?<=\$)\d+"

      prices = re.findall(pattern, text)
      prices
    solution: |-
      pattern = r"(?<=\$)\d+"

      prices = re.findall(pattern, text)
      prices
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 긍정 후방탐색 (?<=패턴)은 앞에 특정 패턴이 있는 위치를 찾되, 그 패턴 자체는 결과에 포함하지 않습니다. 제로폭 단언(zero-width assertion)이라고도 하며, 위치만 확인하고 문자를
      소비하지 않는 특수한 기능입니다.
  - type: code
    language: python
    title: 긍정 후방탐색 사용
    description: $ 뒤의 숫자만 추출
    content: |-
      pattern = r"(?<=\$)\d+"

      prices = re.findall(pattern, text)
      prices
  - type: text
    content: '결과: [''100'', ''200'', ''300''] - 완벽합니다!'
  - type: note
    style: tip
    title: '긍정 후방탐색: (?<=...)'
    content: |-
      **(?<=패턴)매칭**:
      - "앞에 패턴이 있는" 매칭을 찾음
      - 하지만 패턴 자체는 결과에 포함하지 않음
      - **제로폭 단언**: 위치만 확인, 문자 소비 안 함

      예: `(?<=@)\w+` → @ 뒤의 단어 (@ 제외)
- id: step4_positive_lookahead
  title: 4단계. 긍정 전방탐색 (?=...)
  structuredPrimary: true
  subtitle: 앞을 보되 포함하지 않기
  goal: '4단계. 긍정 전방탐색 (?=...): 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 긍정 전방탐색 (?=...): 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    긍정 전방탐색 (?=패턴)은 뒤에 특정 패턴이 있는 위치를 찾되, 그 패턴은 결과에 포함하지 않습니다. 후방탐색과 반대 방향으로 작동합니다. 예를 들어 퍼센트 기호 앞의 숫자만 추출할 때 유용합니다.

    결과: ['10', '20', '30'] - % 기호는 제외!
  tips:
  - '긍정 전방탐색: (?=...) **매칭(?=패턴)**: - "뒤에 패턴이 있는" 매칭을 찾음 - 패턴은 결과에 포함하지 않음 예: `\w+(?=@)` → @ 앞의 단어 (@ 제외)'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    text = "할인율: 10%, 20%, 30%"

    pattern = r"\d+(?=%)"

    discounts = re.findall(pattern, text)
    discounts
  exercise:
    prompt: '4단계. 긍정 전방탐색 (?=...): 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      text = "할인율: 10%, 20%, 30%"

      pattern = r"\d+(?=%)"

      discounts = re.findall(pattern, text)
      discounts
    solution: |-
      text = "할인율: 10%, 20%, 30%"

      pattern = r"\d+(?=%)"

      discounts = re.findall(pattern, text)
      discounts
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 긍정 전방탐색 (?=패턴)은 뒤에 특정 패턴이 있는 위치를 찾되, 그 패턴은 결과에 포함하지 않습니다. 후방탐색과 반대 방향으로 작동합니다. 예를 들어 퍼센트 기호 앞의 숫자만 추출할 때 유용합니다.
  - type: code
    language: python
    title: 긍정 전방탐색 사용
    description: '% 앞의 숫자만 추출'
    content: |-
      text = "할인율: 10%, 20%, 30%"

      pattern = r"\d+(?=%)"

      discounts = re.findall(pattern, text)
      discounts
  - type: text
    content: '결과: [''10'', ''20'', ''30''] - % 기호는 제외!'
  - type: note
    style: tip
    title: '긍정 전방탐색: (?=...)'
    content: |-
      **매칭(?=패턴)**:
      - "뒤에 패턴이 있는" 매칭을 찾음
      - 패턴은 결과에 포함하지 않음

      예: `\w+(?=@)` → @ 앞의 단어 (@ 제외)
- id: step5_negative_lookbehind
  title: 5단계. 부정 후방탐색 (?<!...)
  structuredPrimary: true
  subtitle: 뒤에 패턴이 없을 때
  goal: '5단계. 부정 후방탐색 (?<!...): 실행 가능한 Python 흐름으로 익힌다.'
  why: '5단계. 부정 후방탐색 (?<!...): 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    부정 후방탐색 (?<!패턴)은 앞에 특정 패턴이 없을 때만 매칭합니다. 긍정 후방탐색의 반대 개념으로, 특정 접두사가 없는 패턴을 찾을 때 사용합니다. 예를 들어 달러 기호가 없는 숫자만 찾을 수 있습니다.

    결과: ['200'] - $ 없는 숫자만 찾았습니다!
  tips:
  - '부정 후방탐색: (?<!...) **(?<!패턴)매칭**: - "앞에 패턴이 없는" 매칭만 찾음 - 특정 문맥을 제외할 때 유용 예: `(?<!un)\w+` → un으로 시작하지 않는 단어'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    text = "금액: $100 또는 200 또는 $300"

    pattern = r"(?<!\$)\b\d+"

    numbers = re.findall(pattern, text)
    numbers
  exercise:
    prompt: '5단계. 부정 후방탐색 (?<!...): 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      text = "금액: $100 또는 200 또는 $300"

      pattern = r"(?<!\$)\b\d+"

      numbers = re.findall(pattern, text)
      numbers
    solution: |-
      text = "금액: $100 또는 200 또는 $300"

      pattern = r"(?<!\$)\b\d+"

      numbers = re.findall(pattern, text)
      numbers
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 부정 후방탐색 (?<!패턴)은 앞에 특정 패턴이 없을 때만 매칭합니다. 긍정 후방탐색의 반대 개념으로, 특정 접두사가 없는 패턴을 찾을 때 사용합니다. 예를 들어 달러 기호가 없는 숫자만 찾을 수
      있습니다.
  - type: code
    language: python
    title: 부정 후방탐색 사용
    description: $ 기호가 없는 숫자만 찾기
    content: |-
      text = "금액: $100 또는 200 또는 $300"

      pattern = r"(?<!\$)\b\d+"

      numbers = re.findall(pattern, text)
      numbers
  - type: text
    content: '결과: [''200''] - $ 없는 숫자만 찾았습니다!'
  - type: note
    style: tip
    title: '부정 후방탐색: (?<!...)'
    content: |-
      **(?<!패턴)매칭**:
      - "앞에 패턴이 없는" 매칭만 찾음
      - 특정 문맥을 제외할 때 유용

