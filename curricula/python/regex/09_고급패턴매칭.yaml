- id: step2_problem
  title: 2단계. 문제 상황
  structuredPrimary: true
  subtitle: 일반 패턴의 한계
  goal: '2단계. 문제 상황: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 문제 상황: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    가격에서 숫자만 추출하고 싶은 상황을 생각해봅시다. $100, $200처럼 달러 기호 뒤의 숫자를 찾고 싶지만, $ 기호 자체는 결과에 포함하고 싶지 않습니다. 일반 패턴으로는 이런 조건부 매칭이 어렵습니다.

    결과: ['$100', '$200', '$300'] - $ 기호가 포함되었습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    text = "가격: $100, $200, $300"

    pattern = r"\$\d+"
    re.findall(pattern, text)
  exercise:
