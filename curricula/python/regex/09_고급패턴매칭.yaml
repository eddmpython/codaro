intro:
  emoji: 🔬
  goal: Lookahead와 Lookbehind로 복잡한 조건 매칭을 마스터합니다.
  description: 정규표현식의 최고 난이도 기능입니다. "앞/뒤를 보되 포함하지 않는" 제로폭 단언(zero-width assertion)을 배웁니다.
  direction: 고급패턴매칭에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - 고급패턴매칭 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 문제 상황 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 긍정 후방탐색 (?< 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: 고급패턴매칭 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: 고급패턴매칭 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: 고급패턴매칭 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 1단계. 라이브러리 불러오기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import re
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: import re
    hints:
    - 1단계. 라이브러리 불러오기 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 1단계. 라이브러리 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step2_problem
  title: 2단계. 문제 상황
  structuredPrimary: true
  subtitle: 일반 패턴의 한계
  goal: 2단계. 문제 상황에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    가격에서 숫자만 추출하고 싶은 상황을 생각해봅시다. $100, $200처럼 달러 기호 뒤의 숫자를 찾고 싶지만, $ 기호 자체는 결과에 포함하고 싶지 않습니다. 일반 패턴으로는 이런 조건부 매칭이 어렵습니다.

    결과: ['$100', '$200', '$300'] - $ 기호가 포함되었습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    text = "가격: $100, $200, $300"

    pattern = r"\$\d+"
    re.findall(pattern, text)
  exercise:
    prompt: 2단계. 문제 상황 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "가격: $100, $200, $300"

      pattern = r"\$\d+"
      re.findall(pattern, text)
    hints:
    - 2단계. 문제 상황 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 문제 상황 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 문제 상황에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step3_positive_lookbehind
  title: 3단계. 긍정 후방탐색 (?<=...)
  structuredPrimary: true
  subtitle: 뒤를 보되 포함하지 않기
  goal: 3단계. 긍정 후방탐색 (?<=...)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    긍정 후방탐색 (?<=패턴)은 앞에 특정 패턴이 있는 위치를 찾되, 그 패턴 자체는 결과에 포함하지 않습니다. 제로폭 단언(zero-width assertion)이라고도 하며, 위치만 확인하고 문자를 소비하지 않는 특수한 기능입니다.

    결과: ['100', '200', '300'] - 완벽합니다!
  tips:
  - '긍정 후방탐색: (?<=...) **(?<=패턴)매칭**: - "앞에 패턴이 있는" 매칭을 찾음 - 하지만 패턴 자체는 결과에 포함하지 않음 - **제로폭 단언**: 위치만
    확인, 문자 소비 안 함 예: `(?<=@)\w+` → @ 뒤의 단어 (@ 제외)'
  snippet: |-
    pattern = r"(?<=\$)\d+"

    prices = re.findall(pattern, text)
    prices
  exercise:
    prompt: 3단계. 긍정 후방탐색 (?<=...) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      pattern = r"(?<=\$)\d+"

      prices = re.findall(pattern, text)
      prices
    hints:
    - 3단계. 긍정 후방탐색 (?<=...) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 긍정 후방탐색 (?<=...) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 긍정 후방탐색 (?<=...)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_positive_lookahead
  title: 4단계. 긍정 전방탐색 (?=...)
  structuredPrimary: true
  subtitle: 앞을 보되 포함하지 않기
  goal: 4단계. 긍정 전방탐색 (?=...)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    긍정 전방탐색 (?=패턴)은 뒤에 특정 패턴이 있는 위치를 찾되, 그 패턴은 결과에 포함하지 않습니다. 후방탐색과 반대 방향으로 작동합니다. 예를 들어 퍼센트 기호 앞의 숫자만 추출할 때 유용합니다.

    결과: ['10', '20', '30'] - % 기호는 제외!
  tips:
  - '긍정 전방탐색: (?=...) **매칭(?=패턴)**: - "뒤에 패턴이 있는" 매칭을 찾음 - 패턴은 결과에 포함하지 않음 예: `\w+(?=@)` → @ 앞의 단어 (@
    제외)'
  snippet: |-
    text = "할인율: 10%, 20%, 30%"

    pattern = r"\d+(?=%)"

    discounts = re.findall(pattern, text)
    discounts
  exercise:
    prompt: 4단계. 긍정 전방탐색 (?=...) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "할인율: 10%, 20%, 30%"

      pattern = r"\d+(?=%)"

      discounts = re.findall(pattern, text)
      discounts
    hints:
    - 4단계. 긍정 전방탐색 (?=...) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 긍정 전방탐색 (?=...) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 긍정 전방탐색 (?=...)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_negative_lookbehind
  title: 5단계. 부정 후방탐색 (?<!...)
  structuredPrimary: true
  subtitle: 뒤에 패턴이 없을 때
  goal: 5단계. 부정 후방탐색 (?<!...)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    부정 후방탐색 (?<!패턴)은 앞에 특정 패턴이 없을 때만 매칭합니다. 긍정 후방탐색의 반대 개념으로, 특정 접두사가 없는 패턴을 찾을 때 사용합니다. 예를 들어 달러 기호가 없는 숫자만 찾을 수 있습니다.

    결과: ['200'] - $ 없는 숫자만 찾았습니다!
  tips:
  - '부정 후방탐색: (?<!...) **(?<!패턴)매칭**: - "앞에 패턴이 없는" 매칭만 찾음 - 특정 문맥을 제외할 때 유용 예: `(?<!un)\w+` → un으로 시작하지
    않는 단어'
  snippet: |-
    text = "금액: $100 또는 200 또는 $300"

    pattern = r"(?<!\$)\b\d+"

    numbers = re.findall(pattern, text)
    numbers
  exercise:
    prompt: 5단계. 부정 후방탐색 (?<!...) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "금액: $100 또는 200 또는 $300"

      pattern = r"(?<!\$)\b\d+"

      numbers = re.findall(pattern, text)
      numbers
    hints:
    - 5단계. 부정 후방탐색 (?<!...) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. 부정 후방탐색 (?<!...) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. 부정 후방탐색 (?<!...)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step6_negative_lookahead
  title: 6단계. 부정 전방탐색 (?!...)
  structuredPrimary: true
  subtitle: 앞에 패턴이 없을 때
  goal: 6단계. 부정 전방탐색 (?!...)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    (?!패턴) : "뒤에 패턴이 없으면" 매칭합니다.

    .com이 아닌 이메일만 추출되었습니다!
  tips:
  - '부정 전방탐색: (?!...) **매칭(?!패턴)**: - "뒤에 패턴이 없는" 매칭만 찾음 - 특정 경우를 제외할 때 사용 예: `\d+(?!%)` → % 로 끝나지 않는
    숫자'
  snippet: |-
    text = "이메일: user@site.com, admin@service.org, info@shop.net"

    pattern = r"\S+@\S+\.(?!com)\w+"

    nonComEmails = re.findall(pattern, text)
    nonComEmails
  exercise:
    prompt: 6단계. 부정 전방탐색 (?!...) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "이메일: user@site.com, admin@service.org, info@shop.net"

      pattern = r"\S+@\S+\.(?!com)\w+"

      nonComEmails = re.findall(pattern, text)
      nonComEmails
    hints:
    - 6단계. 부정 전방탐색 (?!...) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 부정 전방탐색 (?!...) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 부정 전방탐색 (?!...)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step7_combination
  title: 7단계. 조합 사용
  structuredPrimary: true
  subtitle: Lookaround 여러 개
  goal: 7단계. 조합 사용에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    Lookahead와 Lookbehind를 동시에 사용하여 복잡한 조건을 만듭니다.

    결과: ['100'] - $ 뒤에 있고 % 앞에 있는 숫자만!
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    text = "예산: $100%, 매출: $200, 목표: 300%"

    pattern = r"(?<=\$)\d+(?=%)"

    result = re.findall(pattern, text)
    result
  exercise:
    prompt: 7단계. 조합 사용 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "예산: $100%, 매출: $200, 목표: 300%"

      pattern = r"(?<=\$)\d+(?=%)"

      result = re.findall(pattern, text)
      result
    hints:
    - 7단계. 조합 사용 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 7단계. 조합 사용 코드가 예외 없이 끝나야 합니다.
    resultCheck: 7단계. 조합 사용에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step8_password_validation
  title: 8단계. 비밀번호 검증
  structuredPrimary: true
  subtitle: 실전 활용
  goal: 8단계. 비밀번호 검증에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    Lookahead로 "8자 이상, 대문자 포함, 숫자 포함" 조건을 동시에 검증합니다.

    복수 조건 검증
    `^(?=.*[A-Z])(?=.*\d).{8,}$`: - `(?=.*[A-Z])` : 대문자가 있는지 확인 - `(?=.*\d)` : 숫자가 있는지 확인 - `.{8,}` : 8자 이상 각 조건이 독립적으로 검증됩니다!
  tips:
  - '복수 조건 검증 `^(?=.*[A-Z])(?=.*\d).{8,}$`: - `(?=.*[A-Z])` : 대문자가 있는지 확인 - `(?=.*\d)` : 숫자가 있는지 확인 -
    `.{8,}` : 8자 이상 각 조건이 독립적으로 검증됩니다!'
  snippet: |-
    def validatePassword(password):
        pattern = r"^(?=.*[A-Z])(?=.*\d).{8,}$"
        return re.match(pattern, password) is not None

    passwords = ["weak", "Weak123", "STRONG456", "Good1Pass"]

    results = {pwd: validatePassword(pwd) for pwd in passwords}
    results
