- id: step10_summary
  title: 10단계. Lookaround 정리
  structuredPrimary: true
  subtitle: 4가지 패턴 비교
  goal: 10단계. Lookaround 정리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    Lookaround 패턴을 한눈에 정리합니다.

    Lookaround 4종 정리
    | 이름 | 문법 | 의미 | |------|------|------| | 긍정 후방탐색 | (?<=X)Y | X 뒤의 Y | | 부정 후방탐색 | (?<!X)Y | X가 아닌 것 뒤의 Y | | 긍정 전방탐색 | Y(?=X) | X 앞의 Y | | 부정 전방탐색 | Y(?!X) | X가 아닌 것 앞의 Y |
  tips:
  - Lookaround 4종 정리 | 이름 | 문법 | 의미 | |------|------|------| | 긍정 후방탐색 | (?<=X)Y | X 뒤의 Y | | 부정 후방탐색
    | (?<!X)Y | X가 아닌 것 뒤의 Y | | 긍정 전방탐색 | Y(?=X) | X 앞의 Y | | 부정 전방탐색 | Y(?!X) | X가 아닌 것 앞의 Y |
  snippet: |-
    text = "test123abc"

    patterns = {
        "긍정 후방 (?<=test)": r"(?<=test)\d+",
        "부정 후방 (?<!test)": r"(?<!test)\d+",
        "긍정 전방 (?=abc)": r"\d+(?=abc)",
        "부정 전방 (?!abc)": r"\d+(?!abc)"
    }

    {name: re.findall(pattern, text) for name, pattern in patterns.items()}
  exercise:
    prompt: 10단계. Lookaround 정리 예제에서 반복 대상이나 범위을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      text = "test123abc"

      patterns = {
          "긍정 후방 (?<=test)": r"(?<=test)\d+",
          "부정 후방 (?<!test)": r"(?<!test)\d+",
          "긍정 전방 (?=abc)": r"\d+(?=abc)",
          "부정 전방 (?!abc)": r"\d+(?!abc)"
      }

      {name: re.findall(pattern, text) for name, pattern in patterns.items()}
    hints:
    - 10단계. Lookaround 정리 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 10단계. Lookaround 정리 코드가 예외 없이 끝나야 합니다.
    resultCheck: 10단계. Lookaround 정리에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 고급 패턴 매칭 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    정규표현식 전문가가 되어 복잡한 조건 매칭을 수행합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import re

    text = "가격: 1000원, 2000원, 만원, 3000원"

