    hints:
    - 2단계. 데이터 불러오기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 데이터 불러오기 코드가 예외 없이 끝나야 합니다.
    resultCheck: 2단계. 데이터 불러오기에서 바꾼 리스트 값이 결과에 반영되어야 합니다.
- id: step3_create_full_url
  title: 3단계. 완전한 URL 만들기
  structuredPrimary: true
  subtitle: 테스트 데이터 준비
  goal: 3단계. 완전한 URL 만들기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 3단계. 완전한 URL 만들기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
