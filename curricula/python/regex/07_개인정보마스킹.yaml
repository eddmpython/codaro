meta:
  id: regex_07
  title: 개인정보마스킹
  order: 7
  category: regex
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["개인정보", "마스킹", "역참조", "보안", "GDPR"]
  seo:
    title: "정규표현식 중급 - 개인정보 마스킹"
    description: "정규표현식으로 주민번호, 카드번호, 계좌번호를 자동 마스킹합니다. 역참조, 부분 치환을 배웁니다."
    keywords: ["정규표현식", "regex", "개인정보", "마스킹", "역참조"]

intro:
  emoji: "🔐"
  goal: 주민번호, 카드번호, 계좌번호를 자동으로 마스킹합니다.
  description: GDPR, 개인정보보호법 준수를 위한 필수 기술입니다. 역참조로 일부만 남기고 나머지를 마스킹하는 방법을 배웁니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: 정규표현식 모듈
    content: |-
      import re

- id: step2_sample_data
  title: 2단계. 개인정보 샘플 데이터
  subtitle: 가상의 개인정보
  blocks:
  - type: text
    content: 실습을 위한 가상의 개인정보 데이터를 준비합니다. 실제 서비스에서는 절대 실제 개인정보를 사용하면 안 됩니다. 로그 파일, 개발 환경, 테스트 데이터에도 가상의 정보만 사용해야 개인정보보호법을 준수할 수 있습니다.
  - type: code
    language: python
    title: 개인정보 샘플
    description: 주민번호, 카드번호, 계좌번호 포함
    content: |-
      personalData = """
      이름: 김철수
      주민번호: 901225-1234567
      카드번호: 1234-5678-9012-3456
      계좌번호: 110-123-456789
      전화번호: 010-1234-5678

      이름: 이영희
      주민번호: 850315-2345678
      카드번호: 9876-5432-1098-7654
      계좌번호: 020-987-654321
      전화번호: 010-9876-5432
      """
      personalData
  - type: note
    style: warning
    title: "개인정보 보호의 중요성"
    content: |-
      실제 서비스에서는 개인정보를 로그, 화면에 노출하면 안 됩니다.
      - 로그 파일에 기록 전 자동 마스킹
      - 화면 표시 시 일부만 표시
      - 개발/테스트 환경에서도 실제 데이터 사용 금지

- id: step3_mask_resident
  title: 3단계. 주민번호 마스킹
  subtitle: 뒷자리 전체 숨기기
  blocks:
  - type: text
    content: 주민번호 뒷자리 7자리를 모두 *로 마스킹합니다. 주민번호는 XXXXXX-YYYYYYY 형식으로, 앞 6자리는 생년월일, 뒷 7자리는 성별과 고유번호입니다. 뒷자리를 마스킹하면 생년월일 정보는 유지하면서 개인 식별을 방지할 수 있습니다.
  - type: code
    language: python
    title: 주민번호 패턴
    description: 앞자리-뒷자리 형식 인식
    content: |-
      pattern = r"(\d{6})-(\d{7})"

      test = "주민번호: 901225-1234567"
      re.findall(pattern, test)
  - type: code
    language: python
    title: 뒷자리 마스킹
    description: 뒷자리를 *******로 치환
    content: |-
      pattern = r"(\d{6})-(\d{7})"
      replacement = r"\1-*******"

      masked = re.sub(pattern, replacement, personalData)
      masked[:200]
  - type: note
    style: tip
    title: "역참조로 부분 유지"
    content: |-
      - `\1` : 첫 번째 그룹(앞자리 6자리) 유지
      - `-*******` : 하이픈 + 별표 7개
      - 앞자리는 그대로, 뒷자리만 마스킹

- id: step4_mask_card
  title: 4단계. 카드번호 마스킹
  subtitle: 중간 2개 그룹 숨기기
  blocks:
  - type: text
    content: 카드번호는 첫 4자리와 마지막 4자리만 표시합니다. 카드번호는 16자리로, 처음 6자리는 카드사 식별번호(BIN), 마지막 4자리는 확인용으로 노출해도 비교적 안전합니다. 중간 8자리를 마스킹하면 결제 영수증이나 알림에 사용할 수 있습니다.
  - type: code
    language: python
    title: 카드번호 마스킹
    description: 1234-****-****-3456 형식
    content: |-
      pattern = r"(\d{4})-(\d{4})-(\d{4})-(\d{4})"
      replacement = r"\1-****-****-\4"

      test = "카드: 1234-5678-9012-3456"
      re.sub(pattern, replacement, test)
  - type: note
    style: tip
    title: "여러 그룹 참조"
    content: |-
      - `\1` : 첫 번째 그룹 (1234)
      - `****` : 별표로 대체
      - `\4` : 네 번째 그룹 (3456)

      그룹 2, 3은 사용하지 않고 별표로 대체!

- id: step5_mask_account
  title: 5단계. 계좌번호 마스킹
  subtitle: 마지막 3자리만 표시
  blocks:
  - type: text
    content: 계좌번호는 마지막 3자리만 남기고 마스킹합니다.
  - type: code
    language: python
    title: 계좌번호 마스킹
    description: XXX-XXX-XXX789 형식
    content: |-
      pattern = r"(\d{3})-(\d{3})-(\d{3})(\d{3})"
      replacement = r"***-***-***\4"

      test = "계좌: 110-123-456789"
      re.sub(pattern, replacement, test)
  - type: text
    content: "결과: 계좌: ***-***-***789"

- id: step6_backreference
  title: 6단계. 역참조 심화
  subtitle: 반복 패턴 찾기
  blocks:
  - type: text
    content: 역참조는 같은 패턴이 반복될 때도 사용할 수 있습니다.
  - type: code
    language: python
    title: 반복 단어 찾기
    description: 같은 단어가 연속으로 나올 때
    content: |-
      pattern = r"\b(\w+)\s+\1\b"

      test = "정말 정말 중요한 사항입니다. 반드시 반드시 확인하세요."
      matches = re.findall(pattern, test)
      matches
  - type: note
    style: tip
    title: 역참조 사용
    content: |-
      **패턴: \\1**
      `\b(\w+)\s+\1\b`:
      - `(\w+)` : 단어를 그룹 1로 캡처
      - `\s+` : 공백 1개 이상
      - `\1` : 그룹 1과 **동일한** 단어
      - `\b` : 단어 경계

      "정말 정말", "반드시 반드시" 같은 반복을 찾습니다!

- id: step7_complete_masking
  title: 7단계. 완성된 마스킹 함수
  subtitle: 모든 개인정보 자동 마스킹
  blocks:
  - type: text
    content: 배운 패턴을 모두 합쳐 완성된 마스킹 함수를 만듭니다.
  - type: code
    language: python
    title: 개인정보 마스킹 함수
    description: 주민번호, 카드, 계좌, 전화번호 자동 마스킹
    content: |-
      def maskPersonalInfo(text):
          text = re.sub(r"(\d{6})-(\d{7})", r"\1-*******", text)

          text = re.sub(r"(\d{4})-(\d{4})-(\d{4})-(\d{4})", r"\1-****-****-\4", text)

          text = re.sub(r"(\d{3})-(\d{3})-(\d{3})(\d{3})", r"***-***-***\4", text)

          text = re.sub(r"(\d{3})-(\d{3,4})-(\d{4})", r"\1-****-\3", text)

          return text

      maskedData = maskPersonalInfo(personalData)
      maskedData

- id: step8_selective_masking
  title: 8단계. 선택적 마스킹
  subtitle: 필요한 부분만 마스킹
  blocks:
  - type: text
    content: 상황에 따라 다르게 마스킹할 수 있습니다.
  - type: code
    language: python
    title: 이름 부분 마스킹
    description: 성은 그대로, 이름만 *로
    content: |-
      pattern = r"이름: (\S)(\S+)"
      replacement = r"이름: \1" + "*" * 2

      test = "이름: 김철수"
      re.sub(pattern, replacement, test)
  - type: text
    content: "결과: 이름: 김** (성만 표시)"

- id: step9_log_masking
  title: 9단계. 로그 자동 마스킹
  subtitle: 실전 활용
  blocks:
  - type: text
    content: 로그 파일에 개인정보가 실수로 기록되는 것을 방지합니다.
  - type: code
    language: python
    title: 로그 마스킹 예제
    description: 로그 기록 전 자동 마스킹
    content: |-
      def safeLog(message):
          masked = maskPersonalInfo(message)
          return f"[LOG] {masked}"

      logMessages = [
          "사용자 로그인: 주민번호 901225-1234567",
          "결제 완료: 카드 1234-5678-9012-3456",
          "계좌 이체: 110-123-456789 → 020-987-654321"
      ]

      safeLogs = [safeLog(msg) for msg in logMessages]
      safeLogs
  - type: text
    content: 모든 개인정보가 자동으로 마스킹되어 안전하게 로그에 기록됩니다!

- id: practice
  title: 실습
  subtitle: 개인정보 마스킹 프로젝트
  blocks:
  - type: text
    content: 보안 담당자가 되어 개인정보를 안전하게 마스킹합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 이메일 아이디 마스킹"
    blocks:
    - type: code
      title: "이메일 마스킹 함수"
      content: |-
        import re

        text = """
        담당자: john.doe@company.com
        CC: admin@service.org
        수신: contact.person@shop.co.kr
        """

        def mask(match):
            user = match.group(1)
            domain = match.group(2)
            if len(user) <= 2:
                out = user[0] + "*"
            else:
                out = user[:2] + "*" * (len(user) - 2)
            return f"{out}@{domain}"

        pat = re.compile(r"([\w.]+)@([\w.]+)")
        result = pat.sub(mask, text)
        result
  - type: expansion
    title: "미션2: 종합 개인정보 마스킹"
    blocks:
    - type: code
      title: "마스킹 함수 정의"
      content: |-
        import re

        raw = """
        이름: 홍길동
        주민번호: 901225-1234567
        카드번호: 1234-5678-9012-3456
        전화번호: 010-1234-5678
        """

        def hide(text):
            text = re.sub(r"(\d{6})-(\d{7})", r"\1-*******", text)
            text = re.sub(r"(\d{4})-(\d{4})-(\d{4})-(\d{4})", r"\1-****-****-\4", text)
            text = re.sub(r"(\d{3})-(\d{3,4})-(\d{4})", r"\1-****-\3", text)
            return text

        out = hide(raw)
        out

- id: summary
  title: 정리
  subtitle: 일곱 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 역참조로 개인정보를 마스킹하는 방법을 배웠습니다. GDPR, 개인정보보호법 준수에 필수적인 기술입니다.
  - type: list
    items:
    - "\\1, \\2 - 그룹 역참조"
    - "부분 마스킹 - 일부는 유지, 나머지는 *로"
    - "함수로 복잡한 마스킹 처리"
    - "re.compile() - 패턴 재사용"
  - type: text
    content: 다음 프로젝트에서는 LLM 전처리를 위한 텍스트 정제와 토큰화를 배웁니다!
