- id: summary
  title: 정리
  subtitle: 첫 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 정규표현식의 기본을 배웠습니다. re.findall()로 패턴과 일치하는 모든 문자열을 추출하는 방법을 익혔고, 문자 클래스를 사용해 다양한 이메일 형식을 처리하는 패턴을 만들었습니다. 이 기법은 이메일뿐 아니라 전화번호, URL, 날짜 등 형식이 있는 모든 데이터 추출에 응용할 수 있습니다.
  - type: list
    items:
    - \w - 단어 문자 (문자, 숫자, _)
    - + - 1개 이상 반복
    - '[\w.] - 문자 클래스 (단어 문자 또는 마침표)'
    - \. - 마침표 리터럴 (이스케이프 필수)
    - re.findall() - 모든 매칭 결과를 리스트로 반환
  - type: text
    content: 다음 프로젝트에서는 전화번호 형식을 통일하는 방법을 배웁니다!
- id: workflow_validation
  title: '현업 흐름 검증: 연락처 텍스트 정제 파이프라인'
  structuredPrimary: true
  subtitle: 예측 → 패턴 실행 → 오류 수정 → 검증 → 실무 변주
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 정규표현식은 한 번 매칭되면 끝나는 문법이 아니라, 입력 텍스트를 정제하고 실패 패턴을 확인한 뒤 결과를 검증하는 반복 작업입니다. 여기서는 이메일과 전화번호를 추출하고, 잘못된 패턴과 빈 입력을 안전하게 처리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import re

    contactText = '''
    김개발 <kim@example.com> 010-1234-5678
    lee@company.co.kr / 02-987-6543
    잘못된 주소: hello@ / 번호: 12345
    '''

    emailPattern = re.compile(r'[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}')
    phonePattern = re.compile(r'(?:010-\d{4}-\d{4}|02-\d{3}-\d{4})')

    emails = emailPattern.findall(contactText)
    phones = phonePattern.findall(contactText)

    assert emails == ['kim@example.com', 'lee@company.co.kr']
    assert phones == ['010-1234-5678', '02-987-6543']
    emails, phones
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import re

      contactText = '''
      김개발 <kim@example.com> 010-1234-5678
      lee@company.co.kr / 02-987-6543
      잘못된 주소: hello@ / 번호: 12345
      '''

      emailPattern = re.compile(r'[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}')
      phonePattern = re.compile(r'(?:010-\d{4}-\d{4}|02-\d{3}-\d{4})')

      emails = emailPattern.findall(contactText)
      phones = phonePattern.findall(contactText)

      assert emails == ['kim@example.com', 'lee@company.co.kr']
      assert phones == ['010-1234-5678', '02-987-6543']
      emails, phones
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
