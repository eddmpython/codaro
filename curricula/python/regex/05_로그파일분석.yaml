    - label: 2단계. 로그 데이터 준비 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 에러 로그만 추출 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: 로그파일분석 재사용
