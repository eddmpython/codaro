          flags=re.MULTILINE,
      )

      parsedLogs = [match.groupdict() for match in logPattern.finditer(serverLog)]
      errorLogs = [log for log in parsedLogs if log["level"] == "ERROR"]

      def validateParsedLogs(logs):
          levelCounts = {}
