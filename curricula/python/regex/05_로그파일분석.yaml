          assert len(logs) == 7, f"파싱된 로그 수가 다릅니다: {len(logs)}"
          assert levelCounts == {"INFO": 3, "ERROR": 3, "WARNING": 1}, levelCounts
          assert len(errorLogs) == 3, f"ERROR 로그 수가 다릅니다: {len(errorLogs)}"
