- id: step3_wrong_pattern
  title: 3단계. 잘못된 패턴 (탐욕적 매칭)
  structuredPrimary: true
  subtitle: .* 의 함정
  goal: 3단계. 잘못된 패턴 (탐욕적 매칭)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    직관적으로 생각하면 < 와 > 사이의 모든 문자를 찾으면 될 것 같습니다. 하지만 정규표현식의 기본 동작은 우리의 예상과 다를 수 있습니다. 이 문제를 통해 탐욕적 매칭이라는 중요한 개념을 배워봅시다.

    결과: ['<div>안녕</div><span>하세요</span>'] - 전체가 하나로 매칭되었습니다!
  tips:
  - '탐욕적 매칭의 문제 `.*`는 **탐욕적(greedy)**입니다. 가능한 한 많이 매칭하려고 합니다. `<.*>` 는: 1. 첫 번째 `<` 를 찾고 2. 마지막 `>` 까지
    최대한 많이 매칭 3. 중간의 모든 것을 다 포함 우리가 원하는 건 각 태그를 개별적으로 찾는 것입니다!'
  snippet: |-
    wrongPattern = r"<.*>"

    testHtml = "<div>안녕</div><span>하세요</span>"
    re.findall(wrongPattern, testHtml)
  exercise:
    prompt: 3단계. 잘못된 패턴 (탐욕적 매칭) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      wrongPattern = r"<.*>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(wrongPattern, testHtml)
    hints:
    - 3단계. 잘못된 패턴 (탐욕적 매칭) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 잘못된 패턴 (탐욕적 매칭) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 잘못된 패턴 (탐욕적 매칭)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step4_non_greedy
  title: 4단계. 올바른 패턴 (비탐욕적 매칭)
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: 4단계. 올바른 패턴 (비탐욕적 매칭)에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 4단계. 올바른 패턴 (비탐욕적 매칭)의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    correctPattern = r"<.*?>"

    testHtml = "<div>안녕</div><span>하세요</span>"
    re.findall(correctPattern, testHtml)
  exercise:
    prompt: 4단계. 올바른 패턴 (비탐욕적 매칭) 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      correctPattern = r"<.*?>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(correctPattern, testHtml)
    hints:
    - 4단계. 올바른 패턴 (비탐욕적 매칭) 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 4단계. 올바른 패턴 (비탐욕적 매칭) 코드가 예외 없이 끝나야 합니다.
    resultCheck: 4단계. 올바른 패턴 (비탐욕적 매칭)에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step5_remove_tags
  title: 5단계. HTML 태그 제거
  structuredPrimary: true
  subtitle: re.sub로 치환
  goal: 5단계. HTML 태그 제거에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    이제 모든 HTML 태그를 빈 문자열로 치환하여 제거합니다.

    태그는 사라졌지만 여러 줄의 공백이 남아있네요. 추가 정제가 필요합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    pattern = r"<.*?>"

    cleanText = re.sub(pattern, "", htmlText)
    cleanText
  exercise:
    prompt: 5단계. HTML 태그 제거 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      pattern = r"<.*?>"

      cleanText = re.sub(pattern, "", htmlText)
      cleanText
    hints:
    - 5단계. HTML 태그 제거 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 5단계. HTML 태그 제거 코드가 예외 없이 끝나야 합니다.
    resultCheck: 5단계. HTML 태그 제거에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step6_clean_whitespace
  title: 6단계. 공백 정리
  structuredPrimary: true
  subtitle: 연속된 공백 제거
  goal: 6단계. 공백 정리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    연속된 공백, 탭, 개행을 하나의 공백으로 통일합니다.

    공백 패턴
    **패턴: \\s+** - `\s` : 공백 문자 (스페이스, 탭, 개행 등) - `\s+` : 공백 문자 1개 이상 - `.strip()` : 양 끝 공백 제거 LLM 전처리에서 매우 자주 사용하는 패턴입니다!
  tips:
  - '공백 패턴 **패턴: \\s+** - `\s` : 공백 문자 (스페이스, 탭, 개행 등) - `\s+` : 공백 문자 1개 이상 - `.strip()` : 양 끝 공백 제거
    LLM 전처리에서 매우 자주 사용하는 패턴입니다!'
  snippet: |-
    cleanText = re.sub(r"\s+", " ", cleanText)
    cleanText = cleanText.strip()
    cleanText
  exercise:
    prompt: 6단계. 공백 정리 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      cleanText = re.sub(r"\s+", " ", cleanText)
      cleanText = cleanText.strip()
      cleanText
    hints:
    - 6단계. 공백 정리 코드에서 먼저 입력값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 6단계. 공백 정리 코드가 예외 없이 끝나야 합니다.
    resultCheck: 6단계. 공백 정리에서 바꾼 입력값이 결과에 반영되어야 합니다.
- id: step7_dotall_flag
  title: 7단계. re.DOTALL 플래그
  structuredPrimary: true
  subtitle: . 이 개행 포함하기
  goal: 7단계. re.DOTALL 플래그에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    기본적으로 . 은 개행(\n)을 매칭하지 않습니다. 여러 줄에 걸친 태그를 처리하려면 플래그가 필요합니다.

    re.DOTALL (re.S)
    **re.DOTALL** 또는 **re.S** 플래그: - `.` 이 개행 문자도 매칭하게 만듭니다 - 여러 줄에 걸친 패턴을 찾을 때 필수 - `flags=re.DOTALL` 또는 `flags=re.S` 로 사용
  tips:
  - 're.DOTALL (re.S) **re.DOTALL** 또는 **re.S** 플래그: - `.` 이 개행 문자도 매칭하게 만듭니다 - 여러 줄에 걸친 패턴을 찾을 때 필수 -
    `flags=re.DOTALL` 또는 `flags=re.S` 로 사용'
  snippet: |-
    multilineHtml = """
    <div
        class="container"
        id="main">
    내용
    </div>
    """
  exercise:
    prompt: 7단계. re.DOTALL 플래그 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      multilineHtml = """
      <div
          class="container"
          id="main">
      내용
      </div>
      """
