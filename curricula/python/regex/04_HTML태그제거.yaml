    solution: |-
      import re

      raw = """
      <html>
      <head>
          <style>.red { color: red; }</style>
          <script>console.log('test');</script>
      </head>
      <body>
          <p>실제 내용입니다</p>
      </body>
      </html>
      """

      def strip(html):
          out = re.sub(r"<script.*?</script>", "", html, flags=re.DOTALL)
          out = re.sub(r"<style.*?</style>", "", out, flags=re.DOTALL)
          out = re.sub(r"<.*?>", "", out, flags=re.DOTALL)
          out = re.sub(r"\s+", " ", out)
          return out.strip()

      strip(raw)
