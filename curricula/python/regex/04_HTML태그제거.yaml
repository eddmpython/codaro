- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: HTML 정제 프로젝트
  goal: '실습: 실행 가능한 Python 흐름으로 익힌다.'
  why: '실습: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    웹 개발자가 되어 다양한 HTML 문서를 정제합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import re

    raw = """
    <html>
    <head>
        <style>.red { color: red; }</style>
        <script>console.log('test');</script>
    </head>
    <body>
        <p>실제 내용입니다</p>
    </body>
    </html>
    """

    def strip(html):
        out = re.sub(r"<script.*?</script>", "", html, flags=re.DOTALL)
        out = re.sub(r"<style.*?</style>", "", out, flags=re.DOTALL)
        out = re.sub(r"<.*?>", "", out, flags=re.DOTALL)
        out = re.sub(r"\s+", " ", out)
        return out.strip()

    strip(raw)
