- id: step3_wrong_pattern
  title: 3단계. 잘못된 패턴 (탐욕적 매칭)
  structuredPrimary: true
  subtitle: .* 의 함정
  goal: '3단계. 잘못된 패턴 (탐욕적 매칭): 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 잘못된 패턴 (탐욕적 매칭): 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    직관적으로 생각하면 < 와 > 사이의 모든 문자를 찾으면 될 것 같습니다. 하지만 정규표현식의 기본 동작은 우리의 예상과 다를 수 있습니다. 이 문제를 통해 탐욕적 매칭이라는 중요한 개념을 배워봅시다.

    결과: ['<div>안녕</div><span>하세요</span>'] - 전체가 하나로 매칭되었습니다!
  tips:
  - '탐욕적 매칭의 문제 `.*`는 **탐욕적(greedy)**입니다. 가능한 한 많이 매칭하려고 합니다. `<.*>` 는: 1. 첫 번째 `<` 를 찾고 2. 마지막 `>` 까지 최대한 많이 매칭 3. 중간의 모든
    것을 다 포함 우리가 원하는 건 각 태그를 개별적으로 찾는 것입니다!'
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    wrongPattern = r"<.*>"

    testHtml = "<div>안녕</div><span>하세요</span>"
    re.findall(wrongPattern, testHtml)
  exercise:
    prompt: '3단계. 잘못된 패턴 (탐욕적 매칭): 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      wrongPattern = r"<.*>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(wrongPattern, testHtml)
    solution: |-
      wrongPattern = r"<.*>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(wrongPattern, testHtml)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 직관적으로 생각하면 < 와 > 사이의 모든 문자를 찾으면 될 것 같습니다. 하지만 정규표현식의 기본 동작은 우리의 예상과 다를 수 있습니다. 이 문제를 통해 탐욕적 매칭이라는 중요한 개념을 배워봅시다.
  - type: code
    language: python
    title: 탐욕적 패턴
    description: < 와 > 사이를 찾아봅니다
    content: |-
      wrongPattern = r"<.*>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(wrongPattern, testHtml)
  - type: text
    content: '결과: [''<div>안녕</div><span>하세요</span>''] - 전체가 하나로 매칭되었습니다!'
  - type: note
    style: warning
    title: 탐욕적 매칭의 문제
    content: |-
      `.*`는 **탐욕적(greedy)**입니다. 가능한 한 많이 매칭하려고 합니다.

      `<.*>` 는:
      1. 첫 번째 `<` 를 찾고
      2. 마지막 `>` 까지 최대한 많이 매칭
      3. 중간의 모든 것을 다 포함

      우리가 원하는 건 각 태그를 개별적으로 찾는 것입니다!
- id: step4_non_greedy
  title: 4단계. 올바른 패턴 (비탐욕적 매칭)
  structuredPrimary: true
  subtitle: 작게 실행하고 결과를 확인하는 단계
  goal: '4단계. 올바른 패턴 (비탐욕적 매칭): 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 올바른 패턴 (비탐욕적 매칭): 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 4단계. 올바른 패턴 (비탐욕적 매칭)의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    correctPattern = r"<.*?>"

    testHtml = "<div>안녕</div><span>하세요</span>"
    re.findall(correctPattern, testHtml)
  exercise:
    prompt: '4단계. 올바른 패턴 (비탐욕적 매칭): 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      correctPattern = r"<.*?>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(correctPattern, testHtml)
    solution: |-
      correctPattern = r"<.*?>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(correctPattern, testHtml)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: '탐욕적 매칭을 비탐욕적으로 만들려면 ? 를 붙입니다: .*?'
  - type: code
    language: python
    title: 비탐욕적 패턴
    description: .*? 로 최소 매칭합니다
    content: |-
      correctPattern = r"<.*?>"

      testHtml = "<div>안녕</div><span>하세요</span>"
      re.findall(correctPattern, testHtml)
  - type: text
    content: '결과: [''<div>'', ''</div>'', ''<span>'', ''</span>''] - 각 태그가 개별적으로 찾아졌습니다!'
  - type: note
    style: tip
    title: '비탐욕적 매칭: *?'
    content: |-
      - `*` : 0개 이상 (탐욕적)
      - `*?` : 0개 이상 (비탐욕적) **(신규)**
      - `+?` : 1개 이상 (비탐욕적) **(신규)**
      - `??` : 0 또는 1개 (비탐욕적) **(신규)**

      비탐욕적은 조건을 만족하는 최소한만 매칭합니다.
