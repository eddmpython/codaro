- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: HTML 정제 프로젝트
  goal: 실습에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    웹 개발자가 되어 다양한 HTML 문서를 정제합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import re

    raw = """
    <html>
    <head>
        <style>.red { color: red; }</style>
        <script>console.log('test');</script>
    </head>
    <body>
        <p>실제 내용입니다</p>
    </body>
    </html>
    """

    def strip(html):
        out = re.sub(r"<script.*?</script>", "", html, flags=re.DOTALL)
        out = re.sub(r"<style.*?</style>", "", out, flags=re.DOTALL)
        out = re.sub(r"<.*?>", "", out, flags=re.DOTALL)
        out = re.sub(r"\s+", " ", out)
        return out.strip()

    strip(raw)
  exercise:
    prompt: 실습 예제에서 인자나 반환값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      import re

      raw = """
      <html>
      <head>
          <style>.red { color: red; }</style>
          <script>console.log('test');</script>
      </head>
      <body>
          <p>실제 내용입니다</p>
      </body>
      </html>
      """

      def strip(html):
          out = re.sub(r"<script.*?</script>", "", html, flags=re.DOTALL)
          out = re.sub(r"<style.*?</style>", "", out, flags=re.DOTALL)
          out = re.sub(r"<.*?>", "", out, flags=re.DOTALL)
          out = re.sub(r"\s+", " ", out)
          return out.strip()

      strip(raw)
    hints:
    - 실습 코드에서 먼저 인자나 반환값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 실습 코드가 예외 없이 끝나야 합니다.
    resultCheck: 실습에서 바꾼 인자나 반환값이 결과에 반영되어야 합니다.
