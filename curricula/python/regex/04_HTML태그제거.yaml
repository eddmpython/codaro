intro:
  emoji: 🏷️
  goal: HTML 문서에서 모든 태그를 제거하고 순수 텍스트만 추출합니다.
  description: 웹 크롤링 후 가장 많이 하는 작업입니다. 탐욕적 vs 비탐욕적 매칭의 차이를 배우고, LLM 전처리의 첫 단계를 경험합니다.
  direction: HTML태그제거에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 입력 데이터 확인 후 핵심 처리에 맞는 코드 입력을 고릅니다.
  - HTML태그제거 결과를 출력과 상태 기준으로 즉시 점검합니다.
  - 완료한 코드를 업무 자동화 조각에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(입력 데이터)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 데이터 불러오기 처리 실행
      detail: 핵심 처리 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. 잘못된 패턴 (탐욕적 결과 검증
      detail: 출력과 상태 기준으로 실행 결과를 비교합니다.
    - label: HTML태그제거 재사용
      detail: 완성 코드를 업무 자동화 조각에 붙일 수 있게 정리합니다.
    runtime:
    - label: 업무 코드 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: HTML태그제거 실행
      detail: 셀을 실행해 출력, 변수, 예외 상태를 확인합니다.
    - label: HTML태그제거 완료
      detail: 검증된 코드를 업무 자동화 조각로 남깁니다.
