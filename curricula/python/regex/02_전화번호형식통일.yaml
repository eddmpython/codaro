- id: step3_explore
  title: 3단계. 전화번호 형식 탐색
  structuredPrimary: true
  subtitle: 다양한 형식 확인
  goal: 3단계. 전화번호 형식 탐색에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: |-
    실제 데이터에는 전화번호가 여러 형식으로 저장되어 있습니다. 하이픈으로 구분된 형식, 마침표로 구분된 형식, 괄호가 포함된 형식, 확장번호가 붙은 형식 등 다양합니다. 정규표현식으로 이런 모든 형식을 하나로 통일하려면 먼저 어떤 패턴들이 있는지 파악해야 합니다.

    확인된 형식들: - `010-1234-5678` (하이픈 구분) - `010.9876.5432 x102` (마침표 + 확장번호) - `(010)5555-1122` (괄호 + 하이픈) - `010 3333 4444` (공백 구분) 우리의 목표: 모두 `010-XXXX-XXXX` 형식으로 통일
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    phones = [user['phone'] for user in usersData[:5]]
    phones
  exercise:
    prompt: 3단계. 전화번호 형식 탐색 예제에서 반복 대상이나 범위을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      phones = [user['phone'] for user in usersData[:5]]
      phones
    hints:
    - 3단계. 전화번호 형식 탐색 코드에서 먼저 반복 대상이나 범위 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 3단계. 전화번호 형식 탐색 코드가 예외 없이 끝나야 합니다.
    resultCheck: 3단계. 전화번호 형식 탐색에서 바꾼 반복 대상이나 범위이 결과에 반영되어야 합니다.
- id: step4_pattern_with_groups
  title: 4단계. 그룹으로 패턴 만들기
  structuredPrimary: true
  subtitle: ( ) 로 부분 캡처
  goal: 4단계. 그룹으로 패턴 만들기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 작게 실행하고 검증하는 흐름은 코드를 업무에 가져가기 위한 기본 조건입니다.
  explanation: 4단계. 그룹으로 패턴 만들기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    testText = """
    010-1234-5678
    010.9876.5432 x102
    (010)5555-1122
    010 3333 4444
    010-777-8888 x45
    """
  exercise:
    prompt: 4단계. 그룹으로 패턴 만들기 예제에서 입력값을 바꿔 실행하고, 출력과 상태 기준으로 달라진 결과를 확인하세요.
    starterCode: |-
      testText = """
      010-1234-5678
      010.9876.5432 x102
