    hints:
    - 2단계. 데이터 불러오기 코드에서 먼저 리스트 값 위치를 찾으세요.
    - 실행 후 출력과 상태 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 2단계. 데이터 불러오기 코드가 예외 없이 끝나야 합니다.
