    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 전화번호의 각 부분을 그룹으로 나누어 캡처합니다. 그룹은 소괄호 ( )로 만들며, 캡처된 내용은 나중에 치환할 때 재사용할 수 있습니다. 예를 들어 첫 번째 그룹은 \1, 두 번째 그룹은 \2로
      참조합니다. 이 기능이 정규표현식을 단순 검색에서 강력한 변환 도구로 만들어줍니다.
  - type: code
    language: python
    title: 테스트 텍스트 준비
    description: 다양한 전화번호 형식을 테스트합니다
    content: |-
      testText = """
      010-1234-5678
      010.9876.5432 x102
      (010)5555-1122
      010 3333 4444
      010-777-8888 x45
      """
  - type: code
    language: python
    title: 그룹 패턴 작성
    description: 전화번호를 3개 그룹으로 나눕니다
    content: |-
      pattern = r"[\(]?(\d{3})[\)\-\.]?\s?(\d{3,4})[\s\-\.](\d{4})"

      matches = re.findall(pattern, testText)
      matches
  - type: note
    style: tip
    title: 패턴 해석
    content: |-
      **패턴: [\\(]?(\\d{3})[\\)\\-\\.]?**
      - `[\(]?` : 괄호 ( 가 있을 수도 없을 수도 (? = 0 또는 1개)
      - `(\d{3})` : **그룹 1** - 숫자 정확히 3개
      - `[\)\-\.]?` : 괄호 ), 하이픈, 마침표 중 하나가 0 또는 1개
      - `(\d{3,4})` : **그룹 2** - 숫자 3~4개
      - `[\s\-\.]` : 공백, 하이픈, 마침표 중 하나
      - `(\d{4})` : **그룹 3** - 숫자 정확히 4개

      확장번호(x102)는 다음 단계에서 제거합니다.
  - type: text
    content: findall은 패턴에 그룹이 있으면 전체 매칭이 아닌 그룹만 튜플로 반환합니다. 예를 들어 ('010', '1234', '5678')처럼 각 그룹의 내용만 추출됩니다. 이 특성을 이용하면 복잡한
      텍스트에서 원하는 부분만 정확하게 추출할 수 있습니다.
