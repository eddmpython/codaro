      이번 단계에서는 기존 단순 치환이 놓치는 문제를 먼저 확인합니다. 그다음 엄격한 정규화 함수를 만들어 정상 번호와 검토 번호를 나누고, 운영 기준을 완화했을 때 결과가 어떻게 달라지는지 실험합니다.
  - type: code
    language: python
    title: 목표 형식과 예상 검토 건수 정하기
    description: 010-XXXX-XXXX 형식 검증 준비
    content: |-
      targetPhonePattern = re.compile(r"^010-\d{4}-\d{4}$")
      rawPhones = [user["phone"] for user in usersData]

      expectedReviewCount = 1
      print("예상: 중간 번호 3자리 값은 검토 대상으로 분리합니다.")
      rawPhones
  - type: code
    language: python
    title: 단순 치환의 실패 확인
    description: 3자리 중간 번호를 통과시키는 문제 잡기
    content: |-
      unsafeCleaned = cleanPhone("010-777-8888 x45")

      try:
          if targetPhonePattern.fullmatch(unsafeCleaned) is None:
              raise ValueError(f"목표 형식이 아닙니다: {unsafeCleaned}")
      except ValueError as exc:
          print("의도한 오류 확인:", exc)
      else:
          raise AssertionError("010-777-8888은 010-XXXX-XXXX 검증을 통과하면 안 됩니다.")
  - type: code
    language: python
    title: 검증 가능한 정규화 함수 만들기
    description: 정상 값과 검토 값을 분리
    content: |-
      phonePattern = re.compile(
          r"^\s*\(?(\d{3})\)?[\s.-]?(\d{3,4})[\s.-](\d{4})(?:\s+x\d+)?\s*$",
          re.IGNORECASE,
      )


      def normalizePhone(phone, allowThreeDigitMiddle=False):
          match = phonePattern.fullmatch(phone)
          if match is None:
              raise ValueError(f"전화번호 패턴과 맞지 않습니다: {phone}")

          areaCode, middleNumber, lastNumber = match.groups()
          if areaCode != "010":
              raise ValueError(f"010 번호만 정제 대상입니다: {phone}")

          if len(middleNumber) != 4:
              if not allowThreeDigitMiddle:
                  raise ValueError(f"중간 번호가 4자리가 아닙니다: {phone}")
              middleNumber = middleNumber.zfill(4)

          normalized = f"{areaCode}-{middleNumber}-{lastNumber}"
          if targetPhonePattern.fullmatch(normalized) is None:
              raise ValueError(f"정규화 결과가 목표 형식이 아닙니다: {normalized}")
          return normalized


      validPhones = []
      reviewPhones = []
      for user in usersData:
          try:
              validPhones.append({
                  "name": user["name"],
                  "phone": normalizePhone(user["phone"]),
              })
          except ValueError as exc:
              reviewPhones.append({
                  "name": user["name"],
                  "phone": user["phone"],
                  "reason": str(exc),
              })

      assert len(reviewPhones) == expectedReviewCount
      assert all(targetPhonePattern.fullmatch(item["phone"]) for item in validPhones)

      {
          "validCount": len(validPhones),
          "reviewPhones": reviewPhones,
      }
  - type: code
    language: python
    title: 운영 기준 실험
    description: 3자리 중간 번호 허용 여부 비교
    content: |-
      def normalizePhoneBatch(phones, allowThreeDigitMiddle=False):
          result = {"valid": [], "review": []}
          for phone in phones:
              try:
                  result["valid"].append(normalizePhone(phone, allowThreeDigitMiddle))
              except ValueError as exc:
                  result["review"].append({"phone": phone, "reason": str(exc)})
          return result


      strictBatch = normalizePhoneBatch(rawPhones, allowThreeDigitMiddle=False)
      relaxedBatch = normalizePhoneBatch(rawPhones, allowThreeDigitMiddle=True)

      assert len(relaxedBatch["valid"]) >= len(strictBatch["valid"])
      assert len(relaxedBatch["review"]) <= len(strictBatch["review"])
      assert len(relaxedBatch["review"]) == 0

      {
          "strictValid": len(strictBatch["valid"]),
          "strictReview": len(strictBatch["review"]),
          "relaxedValid": len(relaxedBatch["valid"]),
          "relaxedReview": len(relaxedBatch["review"]),
      }
