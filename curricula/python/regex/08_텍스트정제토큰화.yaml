    resultCheck: 출력 또는 assert 확인
- id: step8_ngrams
  title: 8단계. N-gram 추출
  structuredPrimary: true
  subtitle: 연속된 단어 조합
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    문맥 분석을 위해 연속된 2~3개 단어를 추출합니다.

    N-gram의 활용
    N-gram은 문맥을 유지하면서 텍스트를 분석할 때 사용: - Bigram (2-gram): 연속된 2개 단어 - Trigram (3-gram): 연속된 3개 단어 검색, 추천, 자동 완성 등에 활용
  tips:
  - 'N-gram의 활용 N-gram은 문맥을 유지하면서 텍스트를 분석할 때 사용: - Bigram (2-gram): 연속된 2개 단어 - Trigram (3-gram): 연속된 3개 단어 검색, 추천, 자동 완성 등에 활용'
  snippet: |-
    words = lowercaseText.split()[:50]

    bigrams = [f"{words[i]} {words[i+1]}" for i in range(len(words)-1)]
    bigrams[:10]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      words = lowercaseText.split()[:50]

      bigrams = [f"{words[i]} {words[i+1]}" for i in range(len(words)-1)]
      bigrams[:10]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_complete_pipeline
  title: 9단계. 완성된 전처리 파이프라인
  structuredPrimary: true
  subtitle: 모든 단계 통합
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 배운 모든 기법을 합쳐 완성된 파이프라인을 만듭니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def preprocessText(text):
        text = re.sub(r"[^a-zA-Z\s]", "", text)

        text = re.sub(r"\s+", " ", text)
        text = text.strip()

        text = text.lower()

        tokens = re.split(r"\s+", text)

        return {
            "clean_text": text,
            "tokens": tokens,
            "token_count": len(tokens)
        }

    result = preprocessText(rawText)
    f"토큰 수: {result['token_count']}\n처음 10개 토큰: {result['tokens'][:10]}"
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def preprocessText(text):
          text = re.sub(r"[^a-zA-Z\s]", "", text)

          text = re.sub(r"\s+", " ", text)
          text = text.strip()

