      assert tipsFlow["tip"].between(0, tipsFlow["total_bill"]).all()

      timeTipMean = tipsFlow.groupby("time")["tip"].mean()
      assert timeTipMean["Dinner"] > timeTipMean["Lunch"]
      timeTipMean.round(2)
    hints:
