- id: step4_countplot_hue
  title: 4단계. countplot + hue
  structuredPrimary: true
  subtitle: 생존 여부 구분
  goal: '4단계. countplot + hue: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. countplot + hue: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: hue 파라미터로 생존 여부를 색상으로 구분합니다. 각 등급에서 생존자와 사망자의 비율을 시각적으로 비교할 수 있습니다. 1등급 승객이 3등급보다 생존율이 높은 것을 볼 수 있습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    figHue, axHue = plt.subplots(figsize=(8, 6))
    sns.countplot(data=titanic, x='pclass', hue='survived', palette='Set2', ax=axHue)
    axHue.set_title('Survival by Class')
    axHue.set_xlabel('Class')
    axHue.set_ylabel('Count')
    axHue.legend(title='Survived', labels=['No', 'Yes'])
    figHue
