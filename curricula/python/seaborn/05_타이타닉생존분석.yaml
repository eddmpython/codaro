  explanation: 지금까지 배운 모든 요소를 종합하여 타이타닉 생존 분석 대시보드를 완성합니다. countplot, barplot, pointplot, boxplot을 조합하여 다양한 관점에서 데이터를 분석합니다.
  tips:
