    language: python
    title: 실무 변주 실험
    description: 성별 대신 객실 등급을 기준으로 리스크가 큰 집단을 찾습니다
    content: |-
      classSurvival = titanicFlow.groupby("pclass")["survived"].mean().sort_values(ascending=False)
      fareBand = titanicFlow.assign(fareBand=titanicFlow["fare"] >= titanicFlow["fare"].median()).groupby("fareBand")["survived"].mean()

      assert classSurvival.index[0] == 1
      assert fareBand[True] > fareBand[False]
      {"classSurvival": classSurvival.round(2).to_dict(), "fareBand": fareBand.round(2).to_dict()}
  - type: tip
    content: 범주형 시각화는 비율, 표본 수, 기준 집단을 함께 봐야 의사결정에 쓸 수 있습니다.
