    axesFinal[1, 0].set_title('Survival Rate Trend')

    sns.boxplot(data=titanic, x='pclass', y='age', hue='survived', palette='Set2', ax=axesFinal[1, 1])
    axesFinal[1, 1].set_title('Age Distribution by Class and Survival')

