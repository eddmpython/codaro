meta:
  id: seaborn_05
  title: 타이타닉생존분석
  order: 5
  category: seaborn
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["seaborn", "barplot", "countplot", "catplot", "titanic", "생존분석"]
  seo:
    title: "Seaborn 범주형 차트 - 타이타닉 생존율 분석"
    description: "Seaborn barplot, countplot, catplot으로 타이타닉 생존율을 분석합니다. estimator와 col 파라미터 활용법을 배웁니다."
    keywords: ["seaborn", "barplot", "countplot", "catplot", "titanic", "생존분석"]

intro:
  emoji: "🚢"
  goal: 타이타닉 승객의 클래스/성별 생존율을 범주형 차트로 분석합니다.
  description: barplot으로 평균값과 신뢰구간을, countplot으로 빈도를 시각화합니다. catplot으로 다중 패널을 만들고, estimator로 통계량을 조절합니다. 이전에 배운 scatterplot, histplot, boxplot, regplot 개념을 함께 활용합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: seaborn과 matplotlib을 불러옵니다. titanic 데이터는 1912년 타이타닉호 침몰 사고의 승객 정보입니다. 생존 여부, 객실 등급, 성별, 나이 등이 기록되어 있어 생존율 분석에 적합합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: seaborn과 matplotlib을 불러옵니다
    content: |-
      import seaborn as sns
      import matplotlib.pyplot as plt

- id: step2_data
  title: 2단계. 데이터 로드
  subtitle: titanic 데이터셋
  blocks:
  - type: text
    content: titanic 데이터셋은 891명의 승객 정보입니다. survived(생존:1, 사망:0), pclass(객실등급:1,2,3), sex(성별), age(나이), sibsp(형제/배우자 수), parch(부모/자녀 수), fare(요금), embarked(탑승항) 등의 컬럼이 있습니다.
  - type: code
    language: python
    title: titanic 데이터 로드
    description: 타이타닉 승객 데이터를 불러옵니다
    content: |-
      titanic = sns.load_dataset('titanic')
      titanic.head()

- id: step3_countplot
  title: 3단계. 카운트 플롯
  subtitle: countplot()
  blocks:
  - type: text
    content: countplot()은 범주형 변수의 빈도를 막대 그래프로 표시합니다. 각 카테고리에 몇 개의 데이터가 있는지 한눈에 파악할 수 있습니다. 객실 등급별 승객 수를 확인해봅니다.
  - type: code
    language: python
    title: 객실 등급별 승객 수
    description: 등급별 승객 수를 막대로 표시합니다
    content: |-
      fig, ax = plt.subplots(figsize=(8, 6))
      sns.countplot(data=titanic, x='pclass', ax=ax)
      ax.set_title('Passengers by Class')
      ax.set_xlabel('Class')
      ax.set_ylabel('Count')
      fig
  - type: tip
    content: sns.countplot(data, x='범주형')은 각 카테고리의 개수를 세어 막대로 표시합니다. histplot(discrete=True)와 비슷하지만 범주형 데이터에 더 적합합니다.

- id: step4_countplot_hue
  title: 4단계. countplot + hue
  subtitle: 생존 여부 구분
  blocks:
  - type: text
    content: hue 파라미터로 생존 여부를 색상으로 구분합니다. 각 등급에서 생존자와 사망자의 비율을 시각적으로 비교할 수 있습니다. 1등급 승객이 3등급보다 생존율이 높은 것을 볼 수 있습니다.
  - type: code
    language: python
    title: 생존 여부 구분
    description: hue로 생존 여부를 색상으로 표시합니다
    content: |-
      figHue, axHue = plt.subplots(figsize=(8, 6))
      sns.countplot(data=titanic, x='pclass', hue='survived', palette='Set2', ax=axHue)
      axHue.set_title('Survival by Class')
      axHue.set_xlabel('Class')
      axHue.set_ylabel('Count')
      axHue.legend(title='Survived', labels=['No', 'Yes'])
      figHue

- id: step5_barplot
  title: 5단계. 막대 그래프
  subtitle: barplot()
  blocks:
  - type: text
    content: barplot()은 범주별 평균값과 신뢰구간을 표시합니다. countplot이 개수를 세는 것과 달리, barplot은 연속형 변수의 통계량을 계산합니다. 등급별 평균 생존율을 확인해봅니다. survived는 0과 1이므로 평균이 곧 생존율입니다.
  - type: code
    language: python
    title: 등급별 생존율
    description: 등급별 평균 생존율을 막대로 표시합니다
    content: |-
      figBar, axBar = plt.subplots(figsize=(8, 6))
      sns.barplot(data=titanic, x='pclass', y='survived', ax=axBar)
      axBar.set_title('Survival Rate by Class')
      axBar.set_xlabel('Class')
      axBar.set_ylabel('Survival Rate')
      figBar
  - type: tip
    content: sns.barplot(data, x='범주형', y='연속형')은 범주별 y의 평균과 95% 신뢰구간을 표시합니다. 기본적으로 estimator=np.mean이 적용됩니다. 에러바는 부트스트랩으로 계산됩니다.

- id: step6_barplot_hue
  title: 6단계. barplot + hue
  subtitle: 성별 추가
  blocks:
  - type: text
    content: hue로 성별을 추가하면 등급과 성별의 교차 효과를 확인할 수 있습니다. 모든 등급에서 여성의 생존율이 남성보다 높은 것을 볼 수 있습니다. "여성과 어린이 먼저" 원칙이 적용된 것으로 해석됩니다.
  - type: code
    language: python
    title: 성별 추가
    description: hue로 성별을 색상으로 구분합니다
    content: |-
      figSex, axSex = plt.subplots(figsize=(10, 6))
      sns.barplot(data=titanic, x='pclass', y='survived', hue='sex', palette='Set1', ax=axSex)
      axSex.set_title('Survival Rate by Class and Sex')
      axSex.set_xlabel('Class')
      axSex.set_ylabel('Survival Rate')
      axSex.legend(title='Sex')
      figSex

- id: step7_estimator
  title: 7단계. estimator 변경
  subtitle: 통계량 커스터마이징
  blocks:
  - type: text
    content: estimator 파라미터로 평균 대신 다른 통계량을 사용할 수 있습니다. sum, median, count 등을 지정할 수 있습니다. errorbar 파라미터로 신뢰구간 대신 표준편차(sd)나 표준오차(se)를 표시할 수 있습니다.
  - type: code
    language: python
    title: 통계량 변경
    description: 합계와 다른 에러바를 사용합니다
    content: |-
      import numpy as np

      figEst, (axMean, axMedian) = plt.subplots(1, 2, figsize=(14, 5))

      sns.barplot(data=titanic, x='pclass', y='survived', estimator='mean', ax=axMean)
      axMean.set_title('Mean (default)')
      axMean.set_ylabel('Survival Rate')

      sns.barplot(data=titanic, x='pclass', y='fare', estimator='median', errorbar='sd', ax=axMedian)
      axMedian.set_title('Median Fare (SD)')
      axMedian.set_ylabel('Fare ($)')

      plt.tight_layout()
      figEst
  - type: tip
    content: "estimator='mean'(기본), 'sum', 'median', 'count' 또는 함수를 지정합니다. errorbar=('ci', 95), 'sd'(표준편차), 'se'(표준오차), None 중 선택합니다."

- id: step8_pointplot
  title: 8단계. 포인트 플롯
  subtitle: pointplot()
  blocks:
  - type: text
    content: pointplot()은 barplot과 같은 통계량을 점과 선으로 표시합니다. 여러 그룹의 추세를 비교하기 좋습니다. 선으로 연결되어 있어 패턴을 파악하기 쉽습니다.
  - type: code
    language: python
    title: 포인트 플롯
    description: 점과 선으로 생존율 추세를 표시합니다
    content: |-
      figPoint, axPoint = plt.subplots(figsize=(10, 6))
      sns.pointplot(data=titanic, x='pclass', y='survived', hue='sex', palette='Set1', ax=axPoint)
      axPoint.set_title('Survival Rate Trend')
      axPoint.set_xlabel('Class')
      axPoint.set_ylabel('Survival Rate')
      figPoint
  - type: tip
    content: pointplot()은 barplot과 같은 통계를 점으로 표시합니다. hue를 사용하면 선으로 연결되어 그룹 간 추세 비교에 효과적입니다. markers와 linestyles로 스타일을 변경할 수 있습니다.

- id: step9_catplot
  title: 9단계. catplot 다중 패널
  subtitle: Figure-level 함수
  blocks:
  - type: text
    content: catplot()은 Figure-level 함수로, col과 row 파라미터로 다중 패널을 쉽게 만들 수 있습니다. kind 파라미터로 strip, swarm, box, violin, bar, count, point 중 선택합니다. 탑승항별로 패널을 분할해봅니다.
  - type: code
    language: python
    title: catplot 다중 패널
    description: col로 탑승항별 패널을 만듭니다
    content: |-
      catEmbarked = sns.catplot(data=titanic, x='pclass', y='survived', hue='sex',
                      col='embarked', kind='bar', palette='Set1', height=4, aspect=1)
      catEmbarked.set_axis_labels('Class', 'Survival Rate')
      catEmbarked.set_titles('Embarked: {col_name}')
      catEmbarked.figure
  - type: tip
    content: "sns.catplot()은 Figure-level 함수입니다. kind='bar'/'count'/'box'/'violin'/'strip'/'swarm'/'point' 중 선택합니다. col='변수'로 패널을 분할합니다. height와 aspect로 크기를 조절합니다."

- id: step10_catplot_count
  title: 10단계. catplot count
  subtitle: 빈도 다중 패널
  blocks:
  - type: text
    content: catplot에서 kind='count'를 사용하면 countplot의 다중 패널 버전을 만들 수 있습니다. 성별로 패널을 분할하여 남녀 승객의 등급별 분포를 비교합니다.
  - type: code
    language: python
    title: count 다중 패널
    description: 성별로 분할한 등급별 승객 수
    content: |-
      catSex = sns.catplot(data=titanic, x='pclass', hue='survived',
                      col='sex', kind='count', palette='Set2', height=4, aspect=1.2)
      catSex.set_axis_labels('Class', 'Count')
      catSex.set_titles('{col_name}')
      catSex.figure

- id: step11_final
  title: 11단계. 최종 분석 대시보드
  subtitle: 종합 시각화
  blocks:
  - type: text
    content: 지금까지 배운 모든 요소를 종합하여 타이타닉 생존 분석 대시보드를 완성합니다. countplot, barplot, pointplot, boxplot을 조합하여 다양한 관점에서 데이터를 분석합니다.
  - type: code
    language: python
    title: 분석 대시보드
    description: 타이타닉 생존 분석 종합 대시보드
    content: |-
      figFinal, axesFinal = plt.subplots(2, 2, figsize=(14, 10))

      sns.countplot(data=titanic, x='pclass', hue='survived', palette='Set2', ax=axesFinal[0, 0])
      axesFinal[0, 0].set_title('Survival Count by Class')
      axesFinal[0, 0].legend(title='Survived', labels=['No', 'Yes'])

      sns.barplot(data=titanic, x='pclass', y='survived', hue='sex', palette='Set1', ax=axesFinal[0, 1])
      axesFinal[0, 1].set_title('Survival Rate by Class and Sex')

      sns.pointplot(data=titanic, x='pclass', y='survived', hue='sex', palette='Set1', ax=axesFinal[1, 0])
      axesFinal[1, 0].set_title('Survival Rate Trend')

      sns.boxplot(data=titanic, x='pclass', y='age', hue='survived', palette='Set2', ax=axesFinal[1, 1])
      axesFinal[1, 1].set_title('Age Distribution by Class and Survival')

      plt.tight_layout()
      figFinal

- id: practice
  title: 실습
  subtitle: 범주형 분석 프로젝트
  blocks:
  - type: text
    content: 지금까지 배운 barplot, countplot, pointplot, catplot을 활용해서 다양한 범주형 분석을 해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: tips 데이터 요일/시간대별 팁 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import seaborn as sns
        import matplotlib.pyplot as plt

        data = sns.load_dataset('tips')
    - type: code
      title: "차트 생성"
      content: |-
        chart, (plot1, plot2) = plt.subplots(1, 2, figsize=(14, 5))

        sns.barplot(data=data, x='day', y='tip', hue='time', palette='Set1', ax=plot1)
        plot1.set_title('Average Tip by Day and Time')
        plot1.set_ylabel('Tip ($)')

        sns.countplot(data=data, x='day', hue='time', palette='Set1', ax=plot2)
        plot2.set_title('Order Count by Day and Time')
        plot2.set_ylabel('Count')

        plt.tight_layout()
        chart
  - type: expansion
    title: "미션2: 펭귄 데이터 종/섬별 catplot 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import seaborn as sns
        import matplotlib.pyplot as plt

        df = sns.load_dataset('penguins').dropna()
    - type: code
      title: "차트 생성"
      content: |-
        canvas = sns.catplot(data=df, x='species', y='body_mass_g',
                             hue='sex', col='island', kind='bar',
                             palette='Set2', height=4, aspect=1)
        canvas.set_axis_labels('Species', 'Body Mass (g)')
        canvas.set_titles('Island: {col_name}')

        canvas.figure

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Seaborn barplot, countplot, catplot으로 타이타닉 생존율을 분석했습니다.
  - type: list
    items:
    - "sns.countplot() - 범주별 빈도 막대 그래프"
    - "sns.barplot() - 범주별 평균값 + 신뢰구간"
    - "sns.pointplot() - 평균값을 점과 선으로 표시"
    - "hue로 다중 그룹 비교"
    - "estimator로 통계량 변경 (mean, sum, median)"
    - "sns.catplot() - Figure-level, col/row로 다중 패널"
  - type: text
    content: 다음 시간에는 heatmap과 lineplot으로 항공편 시계열을 분석합니다.
