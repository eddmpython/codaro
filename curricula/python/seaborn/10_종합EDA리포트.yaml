- id: step16_context
  title: 16단계. 컨텍스트 비교
  structuredPrimary: true
  subtitle: plotting_context()
  goal: 16단계. 컨텍스트 비교에서 통계 차트 구성 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
