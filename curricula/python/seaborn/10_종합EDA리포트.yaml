    content: |-
      import matplotlib.pyplot as plt
      import seaborn as sns

      numericColumns = ["bill_length_mm", "bill_depth_mm", "flipper_length_mm", "body_mass_g"]
      corrFlow = edaPenguins[numericColumns].corr()
      figEdaHeat, axEdaHeat = plt.subplots(figsize=(7, 6))
      sns.heatmap(corrFlow, annot=True, fmt=".2f", cmap="vlag", center=0, ax=axEdaHeat)
      axEdaHeat.set_title("Penguin measurement correlations")

      assert corrFlow.shape == (4, 4)
      assert "Penguin measurement" in axEdaHeat.get_title()
      assert len(axEdaHeat.collections) >= 1
      figEdaHeat
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: 리포트 필수 컬럼 누락을 초기에 잡습니다
    content: |-
      def validateEdaInput(frame):
          missing = requiredColumns - set(frame.columns)
          if missing:
              raise ValueError(f"EDA 리포트 필수 컬럼 누락: {sorted(missing)}")
          assert len(frame) >= 50
          return True

      brokenEda = edaPenguins.drop(columns=["island"])
      try:
          validateEdaInput(brokenEda)
      except ValueError as exc:
          print("검증 실패 확인:", exc)

      assert validateEdaInput(edaPenguins)
  - type: code
    language: python
    title: 실무 변주 실험
    description: 보고서 질문을 바꿔도 핵심 관계가 유지되는지 확인합니다
    content: |-
      reportVariants = []
      for metric in ["body_mass_g", "flipper_length_mm", "bill_length_mm"]:
          speciesMean = edaPenguins.groupby("species")[metric].mean().sort_values(ascending=False)
          reportVariants.append({"metric": metric, "leader": speciesMean.index[0], "spread": round(float(speciesMean.max() - speciesMean.min()), 2)})

      assert reportVariants[0]["leader"] == "Gentoo"
      assert all(item["spread"] > 0 for item in reportVariants)
      reportVariants
