- id: step1_import
  title: 1단계. 라이브러리와 테마 설정
  structuredPrimary: true
  subtitle: set_theme()
  goal: '1단계. 라이브러리와 테마 설정: 실행 가능한 Python 흐름으로 익힌다.'
  why: '1단계. 라이브러리와 테마 설정: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    데이터를 로드하고 Seaborn 테마를 설정합니다. set_theme()으로 전역 스타일을 지정합니다.

    set_theme()은 전역 스타일을 설정합니다. style은 'white', 'dark', 'whitegrid', 'darkgrid', 'ticks' 중 선택합니다. palette는 색상 팔레트, font_scale은 글꼴 크기 배율입니다.
  tips:
  - set_theme()은 전역 스타일을 설정합니다. style은 'white', 'dark', 'whitegrid', 'darkgrid', 'ticks' 중 선택합니다. palette는 색상 팔레트, font_scale은
    글꼴 크기 배율입니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    import seaborn as sns
    from codaro.curriculum.localData import loadLocalDataset
    import matplotlib.pyplot as plt
    import pandas as pd

    sns.set_theme(style='whitegrid', palette='Set2', font_scale=1.1)
    penguins = loadLocalDataset('penguins').dropna()
    penguins
  exercise:
    prompt: '1단계. 라이브러리와 테마 설정: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
