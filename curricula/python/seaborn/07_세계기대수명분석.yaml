    resultCheck: 출력 또는 assert 확인
- id: step4_scatter_hue
  title: 4단계. 대륙별 구분
  structuredPrimary: true
  subtitle: hue 파라미터
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 대륙별로 색상을 구분합니다. hue로 범주형 변수를 지정하면 그룹별 패턴을 비교할 수 있습니다.
  tips:
