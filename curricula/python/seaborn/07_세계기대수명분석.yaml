  explanation: |-
    Gapminder 산점도는 GDP, 기대수명, 인구, 대륙을 한 번에 보여 줍니다. 로그 축을 쓰기 전 양수 조건을 확인하고, 최신 연도 기준으로 해석을 고정합니다.

    다차원 차트는 멋있지만, 로그 축과 size 의미가 데이터 조건을 만족해야 해석 가능한 보고서가 됩니다.
