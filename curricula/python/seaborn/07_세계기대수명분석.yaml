meta:
  id: seaborn_07
  title: 세계기대수명분석
  order: 7
  category: seaborn
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["seaborn", "relplot", "scatterplot", "gapminder", "다차원분석"]
  seo:
    title: "Seaborn relplot - 세계 기대수명 다차원 분석"
    description: "Seaborn relplot으로 Gapminder 데이터의 GDP, 기대수명, 인구를 다차원으로 시각화합니다. col, size, style 파라미터 활용법을 배웁니다."
    keywords: ["seaborn", "relplot", "scatterplot", "gapminder", "다차원분석"]

intro:
  emoji: "🌍"
  goal: Gapminder 데이터로 대륙별 GDP와 기대수명의 관계를 다차원으로 분석합니다.
  description: Gapminder 데이터셋은 전 세계 국가들의 인구, GDP, 기대수명 정보를 담고 있습니다. relplot()을 활용하여 다차원 데이터를 시각화합니다. 이전에 배운 heatmap, lineplot, barplot 개념을 함께 활용합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: seaborn과 matplotlib을 불러옵니다. Gapminder 데이터는 Hans Rosling 교수가 유명하게 만든 데이터로, 국가별 인구, GDP, 기대수명, 대륙 정보를 포함합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: seaborn과 matplotlib을 불러옵니다
    content: |-
      import seaborn as sns
      import matplotlib.pyplot as plt
      import pandas as pd

      baseUrl = "https://raw.githubusercontent.com"
      gapminder = pd.read_csv(f"{baseUrl}/plotly/datasets/master/gapminder_unfiltered.csv")
      gapminder
  - type: tip
    content: Gapminder 데이터는 Hans Rosling 교수가 유명하게 만든 데이터로, 국가별 인구(pop), 1인당 GDP(gdpPercap), 기대수명(lifeExp), 대륙(continent) 정보를 포함합니다.

- id: step2_filter
  title: 2단계. 데이터 필터링
  subtitle: 2007년 데이터
  blocks:
  - type: text
    content: 2007년 최신 데이터만 필터링합니다. 최신 데이터를 사용하면 현재 상황에 가까운 분석이 가능합니다.
  - type: code
    language: python
    title: 2007년 필터링
    description: 2007년 데이터만 추출합니다
    content: |-
      gap2007 = gapminder[gapminder['year'] == 2007].copy()
      gap2007

- id: step3_scatter_basic
  title: 3단계. 기본 산점도
  subtitle: sns.scatterplot()
  blocks:
  - type: text
    content: GDP와 기대수명의 관계를 산점도로 확인합니다. 두 변수 간의 상관관계를 한눈에 파악할 수 있습니다.
  - type: code
    language: python
    title: GDP vs 기대수명
    description: GDP와 기대수명의 관계를 확인합니다
    content: |-
      figScatter, axScatter = plt.subplots(figsize=(10, 6))
      sns.scatterplot(data=gap2007, x='gdpPercap', y='lifeExp', ax=axScatter)
      axScatter.set_title('GDP vs Life Expectancy (2007)')
      figScatter

- id: step4_scatter_hue
  title: 4단계. 대륙별 구분
  subtitle: hue 파라미터
  blocks:
  - type: text
    content: 대륙별로 색상을 구분합니다. hue로 범주형 변수를 지정하면 그룹별 패턴을 비교할 수 있습니다.
  - type: code
    language: python
    title: 대륙별 산점도
    description: 대륙별로 색상을 구분합니다
    content: |-
      figHue, axHue = plt.subplots(figsize=(10, 6))
      sns.scatterplot(data=gap2007, x='gdpPercap', y='lifeExp', hue='continent', palette='Set1', ax=axHue)
      axHue.set_title('GDP vs Life Expectancy by Continent')
      figHue

- id: step5_scatter_size
  title: 5단계. 인구 크기 표현
  subtitle: size 파라미터
  blocks:
  - type: text
    content: 인구 크기를 점 크기로 표현합니다. 3개의 차원(GDP, 기대수명, 인구)을 동시에 시각화합니다.
  - type: code
    language: python
    title: 인구 크기 산점도
    description: 인구를 점 크기로 표현합니다
    content: |-
      figSize, axSize = plt.subplots(figsize=(12, 7))
      sns.scatterplot(data=gap2007, x='gdpPercap', y='lifeExp', hue='continent', size='pop', sizes=(20, 1000), palette='Set1', alpha=0.7, ax=axSize)
      axSize.legend(bbox_to_anchor=(1.02, 1), loc='upper left')
      axSize.set_title('GDP vs Life Expectancy (Size = Population)')
      figSize
  - type: tip
    content: size 파라미터로 연속형 변수를 점 크기에 매핑합니다. sizes=(최소, 최대)로 크기 범위를 지정합니다. alpha는 투명도(0~1)로 겹치는 점을 구분하는 데 도움이 됩니다.

- id: step6_relplot_basic
  title: 6단계. relplot 기본
  subtitle: Figure-level 함수
  blocks:
  - type: text
    content: relplot()을 사용하여 Figure-level 산점도를 그립니다. relplot은 자체 Figure를 생성하며 다중 패널을 쉽게 만들 수 있습니다.
  - type: code
    language: python
    title: relplot 산점도
    description: relplot으로 산점도를 그립니다
    content: |-
      gRel = sns.relplot(data=gap2007, x='gdpPercap', y='lifeExp', hue='continent', size='pop', sizes=(20, 500), palette='Set1', alpha=0.7, height=5, aspect=1.5)
      gRel.figure.suptitle('GDP vs Life Expectancy (relplot)', y=1.02)
      gRel.figure
  - type: tip
    content: relplot()은 Figure-level 함수로 자체 Figure를 생성합니다. height와 aspect로 크기를 조절합니다. Axes-level인 scatterplot()과 달리 ax 파라미터가 없고 col, row로 다중 패널을 만들 수 있습니다.

- id: step7_relplot_col
  title: 7단계. 대륙별 패널
  subtitle: col 파라미터
  blocks:
  - type: text
    content: 대륙별로 패널을 분리하여 비교합니다. col 파라미터로 범주별 패널을 생성합니다.
  - type: code
    language: python
    title: 대륙별 패널
    description: 대륙별로 패널을 분리합니다
    content: |-
      gCol = sns.relplot(data=gap2007, x='gdpPercap', y='lifeExp', hue='continent', size='pop', sizes=(20, 500), col='continent', col_wrap=3, palette='Set1', alpha=0.7, height=4)
      gCol.figure.suptitle('GDP vs Life Expectancy by Continent', y=1.02)
      gCol.figure
  - type: tip
    content: col 파라미터로 범주별 패널을 생성합니다. col_wrap은 한 줄에 표시할 패널 수를 지정합니다. 각 패널이 독립적인 스케일을 가지므로 대륙별 패턴을 자세히 볼 수 있습니다.

- id: step8_relplot_line
  title: 8단계. 선 그래프
  subtitle: "kind='line'"
  blocks:
  - type: text
    content: 시간에 따른 변화를 선 그래프로 확인합니다. relplot에서 kind='line'으로 선 그래프를 그립니다.
  - type: code
    language: python
    title: 기대수명 추이
    description: 시간에 따른 기대수명 변화를 확인합니다
    content: |-
      continentAvg = gapminder.groupby(['year', 'continent'])[['lifeExp', 'gdpPercap']].mean().reset_index()
      gLine = sns.relplot(data=continentAvg, x='year', y='lifeExp', hue='continent', kind='line', palette='Set1', height=5, aspect=1.5, marker='o')
      gLine.figure.suptitle('Life Expectancy Trend by Continent', y=1.02)
      gLine.figure
  - type: tip
    content: relplot()에서 kind='line'으로 선 그래프를 그립니다. marker='o'로 데이터 포인트를 표시합니다. kind 기본값은 'scatter'입니다.

- id: step9_style
  title: 9단계. 스타일 구분
  subtitle: style 파라미터
  blocks:
  - type: text
    content: 스타일로 추가 차원을 표현합니다. style 파라미터로 선 스타일이나 마커 모양을 구분합니다.
  - type: code
    language: python
    title: 아시아 국가 비교
    description: 아시아 주요 국가의 기대수명 추이를 비교합니다
    content: |-
      gapAsia = gapminder[(gapminder['continent'] == 'Asia') & (gapminder['country'].isin(['Korea, Rep.', 'Japan', 'China', 'India']))].copy()
      gStyle = sns.relplot(data=gapAsia, x='year', y='lifeExp', hue='country', style='country', kind='line', markers=True, palette='Dark2', height=5, aspect=1.5)
      gStyle.figure.suptitle('Life Expectancy in Asian Countries', y=1.02)
      gStyle.figure
  - type: tip
    content: style 파라미터로 선 스타일(실선, 점선 등)이나 마커 모양을 구분합니다. hue와 style에 같은 변수를 지정하면 색상과 스타일 모두로 구분되어 흑백 인쇄에서도 구분 가능합니다.

- id: step10_col_year
  title: 10단계. 연도별 패널
  subtitle: 시간 비교
  blocks:
  - type: text
    content: GDP와 기대수명 관계를 연도별 패널로 비교합니다. 시간에 따른 변화를 직관적으로 확인할 수 있습니다.
  - type: code
    language: python
    title: 연도별 패널
    description: 연도별 GDP-기대수명 관계를 비교합니다
    content: |-
      gapDecade = gapminder[gapminder['year'].isin([1967, 1987, 2007])].copy()
      gYear = sns.relplot(data=gapDecade, x='gdpPercap', y='lifeExp', hue='continent', size='pop', sizes=(20, 500), col='year', palette='Set1', alpha=0.7, height=4)
      gYear.figure.suptitle('GDP vs Life Expectancy Over Decades', y=1.02)
      gYear.figure

- id: step11_log_scale
  title: 11단계. 로그 스케일
  subtitle: xscale='log'
  blocks:
  - type: text
    content: x축을 로그 스케일로 변환하여 분포를 개선합니다. GDP처럼 넓은 범위의 데이터에 적합합니다.
  - type: code
    language: python
    title: 로그 스케일
    description: x축을 로그 스케일로 변환합니다
    content: |-
      gLog = sns.relplot(data=gap2007, x='gdpPercap', y='lifeExp', hue='continent', size='pop', sizes=(20, 500), palette='Set1', alpha=0.7, height=5, aspect=1.5)
      gLog.set(xscale='log')
      gLog.figure.suptitle('GDP (Log Scale) vs Life Expectancy', y=1.02)
      gLog.figure
  - type: tip
    content: g.set()으로 축 속성을 일괄 설정합니다. xscale='log'는 로그 스케일로 변환하여 넓은 범위의 데이터를 효과적으로 표시합니다. GDP처럼 기하급수적으로 분포하는 데이터에 적합합니다.

- id: practice
  title: 실습
  subtitle: 다차원 시각화
  blocks:
  - type: text
    content: 지금까지 배운 개념을 활용하여 미션을 수행해봅시다. 각 미션은 독립적으로 실행 가능합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: penguins 섬별 부리/날개 관계 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import seaborn as sns
        import matplotlib.pyplot as plt

        data = sns.load_dataset('penguins').dropna()
    - type: code
      title: "차트 생성"
      content: |-
        chart = sns.relplot(data=data, x='bill_length_mm', y='flipper_length_mm', hue='species', size='body_mass_g', sizes=(20, 300), col='island', palette='Set2', alpha=0.7, height=4)
        chart.figure.suptitle('Penguin Bill vs Flipper by Island', y=1.02)
        chart.figure
  - type: expansion
    title: "미션2: mpg 연도별 연비 추이 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import seaborn as sns
        import matplotlib.pyplot as plt

        df = sns.load_dataset('mpg').dropna()
    - type: code
      title: "차트 생성"
      content: |-
        canvas = sns.relplot(data=df, x='model_year', y='mpg', hue='origin', style='origin', kind='line', markers=True, palette='Dark2', height=5, aspect=1.3)
        canvas.figure.suptitle('MPG Trend by Origin', y=1.02)
        canvas.figure
