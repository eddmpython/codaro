    language: python
    title: 다차원 차트 검증
    description: scatterplot이 hue와 size 의미를 모두 가지는지 확인합니다
    content: |-
      import matplotlib.pyplot as plt
      import seaborn as sns

      figGap, axGap = plt.subplots(figsize=(9, 6))
      sns.scatterplot(data=gapLatest, x="gdpPercap", y="lifeExp", hue="continent", size="pop", sizes=(60, 500), ax=axGap)
      axGap.set_xscale("log")
      axGap.set_title(f"Life expectancy and GDP in {latestYear}")
      axGap.set_xlabel("GDP per capita")

      assert axGap.get_xscale() == "log"
      assert axGap.get_xlabel() == "GDP per capita"
      assert axGap.get_legend() is not None
      assert len(axGap.collections) >= 1
      figGap
  - type: code
    language: python
    title: 의도한 오류 고치기
    description: 로그 축에 맞지 않는 0 이하 GDP를 사전에 막습니다
    content: |-
      def validateGapminderForLog(frame):
          if not frame["gdpPercap"].gt(0).all():
              raise ValueError("로그 축에는 0 이하 GDP를 사용할 수 없습니다")
          assert frame["lifeExp"].between(30, 90).all()
          return True

      brokenGap = gapLatest.copy()
      brokenGap.loc[brokenGap.index[0], "gdpPercap"] = 0
      try:
          validateGapminderForLog(brokenGap)
      except ValueError as exc:
          print("검증 실패 확인:", exc)

      assert validateGapminderForLog(gapLatest)
  - type: code
    language: python
    title: 실무 변주 실험
    description: 최신 연도와 1952년의 대륙별 기대수명 격차를 비교합니다
    content: |-
      continentLife = gapFlow.groupby(["year", "continent"])["lifeExp"].mean().unstack()
      lifeChange = continentLife.loc[latestYear] - continentLife.loc[continentLife.index.min()]

      assert lifeChange.min() > 0
      assert lifeChange.sort_values(ascending=False).index[0] in set(gapFlow["continent"])
      lifeChange.round(1).sort_values(ascending=False)
  - type: tip
    content: 다차원 차트는 멋있지만, 로그 축과 size 의미가 데이터 조건을 만족해야 해석 가능한 보고서가 됩니다.
