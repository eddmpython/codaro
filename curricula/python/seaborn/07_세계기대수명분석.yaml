- id: step6_relplot_basic
  title: 6단계. relplot 기본
  structuredPrimary: true
  subtitle: Figure-level 함수
  goal: '6단계. relplot 기본: 실행 가능한 Python 흐름으로 익힌다.'
  why: '6단계. relplot 기본: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
