- id: step2_sample_graph
  title: 2단계. 샘플 그래프
  structuredPrimary: true
  subtitle: 분석용 네트워크
  goal: '2단계. 샘플 그래프: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 샘플 그래프: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 중심성 분석을 위한 샘플 네트워크를 생성합니다. 이 그래프는 두 개의 밀집된 영역이 브릿지 노드로 연결된 구조입니다. 왼쪽에는 A를 중심으로 한 허브 구조가, 오른쪽에는 F, G, H, I로
    이루어진 클러스터가 있습니다. E와 F가 두 영역을 연결하는 브릿지 역할을 합니다. 이 구조에서 각 중심성 지표가 어떤 노드를 '중요'하다고 평가하는지 비교해봅니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    G = nx.Graph()
    G.add_edges_from([
        ("A", "B"), ("A", "C"), ("A", "D"), ("A", "E"),
        ("B", "C"), ("D", "E"),
        ("E", "F"), ("F", "G"), ("F", "H"),
        ("G", "H"), ("G", "I"), ("H", "I")
    ])
    G.number_of_nodes(), G.number_of_edges()
