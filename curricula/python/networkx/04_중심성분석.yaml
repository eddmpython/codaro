    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 중심성 분석을 위한 샘플 네트워크를 생성합니다. 이 그래프는 두 개의 밀집된 영역이 브릿지 노드로 연결된 구조입니다. 왼쪽에는 A를 중심으로 한 허브 구조가, 오른쪽에는 F, G, H, I로 이루어진
      클러스터가 있습니다. E와 F가 두 영역을 연결하는 브릿지 역할을 합니다. 이 구조에서 각 중심성 지표가 어떤 노드를 '중요'하다고 평가하는지 비교해봅니다.
  - type: code
    language: python
    title: 샘플 그래프 생성
    description: 분석용 네트워크
    content: |-
      G = nx.Graph()
      G.add_edges_from([
          ("A", "B"), ("A", "C"), ("A", "D"), ("A", "E"),
          ("B", "C"), ("D", "E"),
          ("E", "F"), ("F", "G"), ("F", "H"),
          ("G", "H"), ("G", "I"), ("H", "I")
