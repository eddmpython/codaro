    starterCode: |-
      G = nx.Graph()
      G.add_edges_from([
          ("A", "B"), ("A", "C"), ("A", "D"), ("A", "E"),
          ("B", "C"), ("D", "E"),
          ("E", "F"), ("F", "G"), ("F", "H"),
          ("G", "H"), ("G", "I"), ("H", "I")
      ])
      G.number_of_nodes(), G.number_of_edges()
    solution: |-
      G = nx.Graph()
      G.add_edges_from([
          ("A", "B"), ("A", "C"), ("A", "D"), ("A", "E"),
          ("B", "C"), ("D", "E"),
          ("E", "F"), ("F", "G"), ("F", "H"),
          ("G", "H"), ("G", "I"), ("H", "I")
      ])
      G.number_of_nodes(), G.number_of_edges()
