      expectedNodes = {"sales", "support", "ops", "finance", "engineering", "infra", "customer_success"}
      if set(workflowGraph.nodes()) != expectedNodes:
          raise ValueError("인수인계 네트워크의 부서 목록이 예상과 다릅니다.")
      if any(data["weight"] <= 0 for _, _, data in workflowGraph.edges(data=True)):
          raise ValueError("인수인계 비용은 0보다 커야 합니다.")

      workflowGraph.number_of_nodes(), workflowGraph.number_of_edges()
  - type: code
    language: python
    title: 병목 예측과 중심성 확인
    description: 실행 전에 ops가 병목일 것이라고 예측하고 중심성으로 확인합니다.
    content: |-
      # 예측: ops는 재무와 엔지니어링으로 갈라지는 지점이라 병목 가능성이 가장 높습니다.
      betweenness = nx.betweenness_centrality(workflowGraph, weight="weight")
      degreeMap = dict(workflowGraph.degree())
      rankedBottlenecks = sorted(betweenness.items(), key=lambda item: item[1], reverse=True)

      topBottleneck = rankedBottlenecks[0][0]
      topBottleneck, round(betweenness[topBottleneck], 3), degreeMap[topBottleneck]
  - type: code
    language: python
    title: 오류 수정 가능한 경로 함수
    description: 존재하지 않는 부서와 끊어진 경로를 명확한 오류로 바꿉니다.
    content: |-
      def shortestWorkflowPath(graph, start, end):
          if start not in graph:
              raise ValueError(f"출발 부서를 찾을 수 없습니다: {start}")
          if end not in graph:
              raise ValueError(f"도착 부서를 찾을 수 없습니다: {end}")
          try:
              return nx.shortest_path(graph, start, end, weight="weight")
          except nx.NetworkXNoPath as exc:
              raise ValueError(f"연결된 인수인계 경로가 없습니다: {start} -> {end}") from exc

      salesToFinancePath = shortestWorkflowPath(workflowGraph, "sales", "finance")
      salesToFinanceCost = nx.shortest_path_length(workflowGraph, "sales", "finance", weight="weight")
      salesToFinancePath, salesToFinanceCost
  - type: code
    language: python
    title: 분석 결과 검증
    description: 예측과 경로 계산이 업무 기준을 만족하는지 확인합니다.
    content: |-
      workflowChecks = {
          "ops_is_top_bottleneck": topBottleneck == "ops",
          "sales_to_finance_path": salesToFinancePath == ["sales", "support", "ops", "finance"],
          "sales_to_finance_cost": salesToFinanceCost == 4,
          "all_departments_reachable": nx.is_connected(workflowGraph),
      }

      assert all(workflowChecks.values()), workflowChecks
      workflowChecks
  - type: expansion
    title: '실무 변주: 직접 연결을 추가하면 병목이 줄어들까?'
    blocks:
    - type: code
      language: python
      title: 개선안 비교
      content: |-
        experimentGraph = workflowGraph.copy()
        experimentGraph.add_edge("sales", "finance", weight=2)

        improvedCost = nx.shortest_path_length(experimentGraph, "sales", "finance", weight="weight")
        improvedBetweenness = nx.betweenness_centrality(experimentGraph, weight="weight")
        improvement = salesToFinanceCost - improvedCost

        assert improvement > 0
        {
            "beforeCost": salesToFinanceCost,
            "afterCost": improvedCost,
            "costImprovement": improvement,
            "opsBetweennessBefore": round(betweenness["ops"], 3),
            "opsBetweennessAfter": round(improvedBetweenness["ops"], 3),
        }
