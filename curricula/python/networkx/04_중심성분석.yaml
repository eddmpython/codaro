  - type: code
    language: python
    title: 그래프 시각화
    description: 네트워크 구조 확인
    content: |-
      pos = nx.spring_layout(G, seed=42)
      fig1, ax1 = plt.subplots(figsize=(8, 6))
      nx.draw(G, pos=pos, with_labels=True, node_color='lightblue',
              node_size=800, font_size=12, ax=ax1)
      ax1.set_title('Sample Network')
      fig1
- id: step3_degree
  title: 3단계. 연결 중심성
  structuredPrimary: true
  subtitle: degree_centrality()
  goal: '3단계. 연결 중심성: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 연결 중심성: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    연결 중심성(Degree Centrality)은 가장 직관적인 중심성 지표입니다. 노드의 연결 수(degree)를 전체 노드 수 - 1로 나누어 0~1 사이로 정규화합니다. 많은 이웃과 직접 연결된 노드가 높은 값을 가집니다. 소셜 네트워크에서 '친구가 많은 사람', 공항 네트워크에서 '노선이 많은 공항'을 찾을 때 유용합니다.

    연결 중심성 = (연결 수) / (노드 수 - 1)입니다. 0과 1 사이 값으로 정규화됩니다.
  tips:
  - 연결 중심성 = (연결 수) / (노드 수 - 1)입니다. 0과 1 사이 값으로 정규화됩니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    degCent = nx.degree_centrality(G)
    degCent
  exercise:
    prompt: '3단계. 연결 중심성: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      degCent = nx.degree_centrality(G)
      degCent
    solution: |-
      degCent = nx.degree_centrality(G)
      degCent
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 연결 중심성(Degree Centrality)은 가장 직관적인 중심성 지표입니다. 노드의 연결 수(degree)를 전체 노드 수 - 1로 나누어 0~1 사이로 정규화합니다. 많은 이웃과 직접 연결된
      노드가 높은 값을 가집니다. 소셜 네트워크에서 '친구가 많은 사람', 공항 네트워크에서 '노선이 많은 공항'을 찾을 때 유용합니다.
  - type: code
    language: python
    title: 연결 중심성 계산
    description: 각 노드의 연결 중심성
    content: |-
      degCent = nx.degree_centrality(G)
      degCent
  - type: code
    language: python
    title: 상위 노드
    description: 연결 중심성 순위
    content: |-
      sortedDeg = sorted(degCent.items(), key=lambda x: x[1], reverse=True)
      sortedDeg
  - type: tip
    content: 연결 중심성 = (연결 수) / (노드 수 - 1)입니다. 0과 1 사이 값으로 정규화됩니다.
- id: step4_betweenness
  title: 4단계. 매개 중심성
  structuredPrimary: true
