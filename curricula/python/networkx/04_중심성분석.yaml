      경로에 얼마나 자주 포함되는지를 집계합니다. 서로 다른 그룹을 연결하는 브릿지 역할의 노드가 높은 값을 가집니다. 조직에서 부서 간 소통을 담당하는 사람, 네트워크의 병목점을 찾을 때 유용합니다.
