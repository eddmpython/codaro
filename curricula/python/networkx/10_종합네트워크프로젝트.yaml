- id: step4_centrality
  title: 4단계. 중심성 분석
  structuredPrimary: true
  subtitle: 주요 인물 찾기
  goal: '4단계. 중심성 분석: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 중심성 분석: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 다양한 중심성 지표로 소설의 핵심 인물들을 찾습니다. 연결 중심성은 가장 많은 인물과 관계를 가진 사람, 매개 중심성은 서로 다른 그룹을 연결하는 중요한 위치의 인물, 근접 중심성은 모든 인물에게
    빠르게 도달할 수 있는 중앙에 위치한 인물, 고유벡터 중심성은 중요한 인물들과 연결된 인물을 찾아냅니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    degCent = nx.degree_centrality(G)
    betCent = nx.betweenness_centrality(G)
    closeCent = nx.closeness_centrality(G)
    eigCent = nx.eigenvector_centrality(G)
  exercise:
    prompt: '4단계. 중심성 분석: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      degCent = nx.degree_centrality(G)
      betCent = nx.betweenness_centrality(G)
      closeCent = nx.closeness_centrality(G)
      eigCent = nx.eigenvector_centrality(G)
    solution: |-
      degCent = nx.degree_centrality(G)
      betCent = nx.betweenness_centrality(G)
      closeCent = nx.closeness_centrality(G)
      eigCent = nx.eigenvector_centrality(G)
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 다양한 중심성 지표로 소설의 핵심 인물들을 찾습니다. 연결 중심성은 가장 많은 인물과 관계를 가진 사람, 매개 중심성은 서로 다른 그룹을 연결하는 중요한 위치의 인물, 근접 중심성은 모든 인물에게
      빠르게 도달할 수 있는 중앙에 위치한 인물, 고유벡터 중심성은 중요한 인물들과 연결된 인물을 찾아냅니다.
  - type: code
    language: python
    title: 중심성 계산
    description: 4가지 중심성
    content: |-
      degCent = nx.degree_centrality(G)
      betCent = nx.betweenness_centrality(G)
      closeCent = nx.closeness_centrality(G)
      eigCent = nx.eigenvector_centrality(G)
  - type: code
    language: python
    title: 연결 중심성 상위
    description: 가장 많이 연결된 인물
    content: |-
      topDegree = sorted(degCent.items(), key=lambda x: x[1], reverse=True)[:5]
      topDegree
  - type: code
    language: python
    title: 매개 중심성 상위
    description: 다리 역할 인물
    content: |-
      topBetween = sorted(betCent.items(), key=lambda x: x[1], reverse=True)[:5]
      topBetween
  - type: code
    language: python
    title: 종합 중심성 순위
    description: 모든 지표 통합
    content: |-
      topNodes = set()
      for cent in [degCent, betCent, closeCent, eigCent]:
          topNodes.update([n for n, v in sorted(cent.items(), key=lambda x: x[1], reverse=True)[:5]])

      centralityRank = {}
      for n in topNodes:
          centralityRank[n] = {
              'degree': round(degCent[n], 3),
              'betweenness': round(betCent[n], 3),
              'closeness': round(closeCent[n], 3),
              'eigenvector': round(eigCent[n], 3)
          }
      centralityRank
