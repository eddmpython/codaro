  - type: code
    language: python
    title: 커뮤니티 색상
    description: 그룹별 색상 매핑
    content: |-
      colorPalette = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00',
                      '#ffff33', '#a65628', '#f781bf', '#999999', '#66c2a5']
      nodeColors = [colorPalette[nodeComm[n] % len(colorPalette)] for n in G.nodes()]
  - type: code
    language: python
    title: 종합 시각화
    description: 4패널 대시보드
    content: |-
      fig, axes = plt.subplots(2, 2, figsize=(16, 14))

      nodeSizes1 = [3000 * degCent[n] for n in G.nodes()]
      nx.draw(G, pos=pos, node_color=nodeColors, node_size=nodeSizes1,
              edge_color='lightgray', alpha=0.8, ax=axes[0, 0])
      axes[0, 0].set_title('Community + Degree Centrality')

      nodeSizes2 = [5000 * betCent[n] + 50 for n in G.nodes()]
      nx.draw(G, pos=pos, node_color=nodeColors, node_size=nodeSizes2,
              edge_color='lightgray', alpha=0.8, ax=axes[0, 1])
      axes[0, 1].set_title('Community + Betweenness Centrality')

      clustCoeffs = nx.clustering(G)
      clustColors = [clustCoeffs[n] for n in G.nodes()]
      nodes3 = nx.draw_networkx_nodes(G, pos=pos, node_color=clustColors,
                                       cmap=plt.cm.YlOrRd, node_size=100, ax=axes[1, 0])
      nx.draw_networkx_edges(G, pos=pos, edge_color='lightgray', ax=axes[1, 0])
      plt.colorbar(nodes3, ax=axes[1, 0], label='Clustering')
      axes[1, 0].set_title('Clustering Coefficient')

      degreeList = [d for n, d in G.degree()]
      axes[1, 1].hist(degreeList, bins=20, color='steelblue', edgecolor='black')
      axes[1, 1].set_xlabel('Degree')
      axes[1, 1].set_ylabel('Count')
      axes[1, 1].set_title('Degree Distribution')

      fig.suptitle('Les Misérables Network Analysis Dashboard', fontsize=16)
      fig.tight_layout()
      fig
