  - type: text
    content: 네트워크의 기본 통계량을 계산합니다. 밀도는 전체 가능한 연결 중 실제 연결의 비율, 평균 차수는 인물당 평균 관계 수, 지름은 가장 먼 두 인물 사이의 거리, 클러스터링은 친구의 친구가 친구인
      정도를 나타냅니다. 이 지표들로 네트워크의 전반적인 특성을 파악합니다.
