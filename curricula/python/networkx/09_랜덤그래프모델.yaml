- id: workflow_validation
  title: 업무 흐름 검증
  structuredPrimary: true
  subtitle: 인수인계 네트워크
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 실무 네트워크 분석은 그래프를 그리는 데서 끝나지 않습니다. 먼저 병목 후보를 예측하고, 로컬 Python에서 실행한 뒤, 잘못된 노드나 끊어진 경로를 예외로 처리하고, 핵심 지표를 assert로 검증해야 합니다. 아래 흐름은 영업, 지원, 운영, 재무, 엔지니어링 사이의 인수인계 비용을 네트워크로 보고 개선안을 비교합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import networkx as nx

    handoffEdges = [
        ("sales", "support", 1),
        ("support", "ops", 2),
        ("ops", "finance", 1),
        ("ops", "engineering", 1),
        ("engineering", "infra", 2),
        ("support", "customer_success", 2),
    ]

    workflowGraph = nx.Graph()
    workflowGraph.add_weighted_edges_from(handoffEdges)

    expectedNodes = {"sales", "support", "ops", "finance", "engineering", "infra", "customer_success"}
    if set(workflowGraph.nodes()) != expectedNodes:
        raise ValueError("인수인계 네트워크의 부서 목록이 예상과 다릅니다.")
    if any(data["weight"] <= 0 for _, _, data in workflowGraph.edges(data=True)):
        raise ValueError("인수인계 비용은 0보다 커야 합니다.")

    workflowGraph.number_of_nodes(), workflowGraph.number_of_edges()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
