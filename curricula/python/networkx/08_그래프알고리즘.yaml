- id: step2_bfs
  title: 2단계. 너비우선탐색
  structuredPrimary: true
  subtitle: BFS
  goal: '2단계. 너비우선탐색: 실행 가능한 Python 흐름으로 익힌다.'
  why: '2단계. 너비우선탐색: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    너비우선탐색(Breadth-First Search, BFS)은 시작 노드에서 가까운 노드부터 차례로 방문합니다. 마치 물결이 퍼지듯이 레벨(거리) 순서로 탐색합니다. 큐(Queue) 자료구조를 사용하며, 가중치가 없는 그래프에서 최단 경로를 찾는 데 사용됩니다. 소셜 네트워크에서 '친구의 친구' 찾기, 웹 크롤링 등에 활용됩니다.

    BFS는 최단 경로 찾기에 사용됩니다. 가중치가 없는 그래프에서 최단 경로를 보장합니다.
  tips:
  - BFS는 최단 경로 찾기에 사용됩니다. 가중치가 없는 그래프에서 최단 경로를 보장합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    G = nx.Graph()
    G.add_edges_from([
        (1, 2), (1, 3), (2, 4), (2, 5),
        (3, 6), (3, 7), (4, 8), (5, 8)
    ])
    G.number_of_nodes(), G.number_of_edges()
  exercise:
    prompt: '2단계. 너비우선탐색: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      G = nx.Graph()
      G.add_edges_from([
          (1, 2), (1, 3), (2, 4), (2, 5),
          (3, 6), (3, 7), (4, 8), (5, 8)
      ])
      G.number_of_nodes(), G.number_of_edges()
    solution: |-
      G = nx.Graph()
      G.add_edges_from([
          (1, 2), (1, 3), (2, 4), (2, 5),
          (3, 6), (3, 7), (4, 8), (5, 8)
      ])
      G.number_of_nodes(), G.number_of_edges()
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 너비우선탐색(Breadth-First Search, BFS)은 시작 노드에서 가까운 노드부터 차례로 방문합니다. 마치 물결이 퍼지듯이 레벨(거리) 순서로 탐색합니다. 큐(Queue) 자료구조를 사용하며,
      가중치가 없는 그래프에서 최단 경로를 찾는 데 사용됩니다. 소셜 네트워크에서 '친구의 친구' 찾기, 웹 크롤링 등에 활용됩니다.
  - type: code
    language: python
    title: 샘플 그래프
    description: BFS 탐색용
    content: |-
      G = nx.Graph()
      G.add_edges_from([
          (1, 2), (1, 3), (2, 4), (2, 5),
          (3, 6), (3, 7), (4, 8), (5, 8)
      ])
      G.number_of_nodes(), G.number_of_edges()
  - type: code
    language: python
    title: BFS 엣지
    description: 탐색 순서
    content: |-
      bfsEdges = list(nx.bfs_edges(G, source=1))
      bfsEdges
  - type: code
    language: python
    title: BFS 순서
    description: 노드 방문 순서
    content: |-
      bfsNodes = [1] + [v for u, v in bfsEdges]
      bfsNodes
  - type: tip
    content: BFS는 최단 경로 찾기에 사용됩니다. 가중치가 없는 그래프에서 최단 경로를 보장합니다.
- id: step3_dfs
  title: 3단계. 깊이우선탐색
  structuredPrimary: true
  subtitle: DFS
  goal: '3단계. 깊이우선탐색: 실행 가능한 Python 흐름으로 익힌다.'
  why: '3단계. 깊이우선탐색: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: |-
    깊이우선탐색(Depth-First Search, DFS)은 한 방향으로 가능한 깊이 들어간 후, 막히면 되돌아와서 다른 경로를 탐색합니다. 스택(Stack) 또는 재귀 호출로 구현됩니다. 미로 찾기, 퍼즐 풀이, 사이클 탐지, 위상정렬 등에 사용됩니다. BFS와 달리 최단 경로를 보장하지 않지만, 메모리 사용량이 적습니다.

    BFS는 레벨 순서(1→2,3→4,5,6,7→8), DFS는 한 가지를 깊이 탐색(1→2→4→8→5→3→6→7)합니다.
  tips:
  - BFS는 레벨 순서(1→2,3→4,5,6,7→8), DFS는 한 가지를 깊이 탐색(1→2→4→8→5→3→6→7)합니다.
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  snippet: |-
    dfsEdges = list(nx.dfs_edges(G, source=1))
    dfsEdges
  exercise:
    prompt: '3단계. 깊이우선탐색: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      dfsEdges = list(nx.dfs_edges(G, source=1))
      dfsEdges
    solution: |-
      dfsEdges = list(nx.dfs_edges(G, source=1))
      dfsEdges
    hints:
    - 처음에는 예제 스니펫을 그대로 실행해 기준 결과를 확인하세요.
    - 값 하나만 바꾸고 다시 실행해 차이를 비교하세요.
    - 오류가 나면 import와 변수 이름부터 확인하세요.
    check:
      noError: 실행 오류가 없어야 한다.
      resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  check:
    noError: 실행 오류가 없어야 한다.
    resultCheck: 출력 또는 assert 결과로 의도한 변화를 확인한다.
  blocks:
  - type: text
    content: 깊이우선탐색(Depth-First Search, DFS)은 한 방향으로 가능한 깊이 들어간 후, 막히면 되돌아와서 다른 경로를 탐색합니다. 스택(Stack) 또는 재귀 호출로 구현됩니다. 미로 찾기,
      퍼즐 풀이, 사이클 탐지, 위상정렬 등에 사용됩니다. BFS와 달리 최단 경로를 보장하지 않지만, 메모리 사용량이 적습니다.
  - type: code
    language: python
    title: DFS 엣지
    description: 탐색 순서
    content: |-
      dfsEdges = list(nx.dfs_edges(G, source=1))
      dfsEdges
  - type: code
    language: python
    title: DFS 순서
    description: 노드 방문 순서
    content: |-
      dfsNodes = [1] + [v for u, v in dfsEdges]
      dfsNodes
  - type: code
    language: python
    title: BFS vs DFS 비교
    description: 방문 순서 차이
    content: |-
      comparison = {
          'BFS': bfsNodes,
          'DFS': dfsNodes
      }
      comparison
  - type: tip
    content: BFS는 레벨 순서(1→2,3→4,5,6,7→8), DFS는 한 가지를 깊이 탐색(1→2→4→8→5→3→6→7)합니다.
- id: step4_visualize_traversal
  title: 4단계. 탐색 시각화
  structuredPrimary: true
  subtitle: 방문 순서 표시
  goal: '4단계. 탐색 시각화: 실행 가능한 Python 흐름으로 익힌다.'
  why: '4단계. 탐색 시각화: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: BFS와 DFS 탐색 과정을 시각화하면 두 알고리즘의 차이를 직관적으로 이해할 수 있습니다. 노드에 방문 순서를 표시하고, 탐색에 사용된 엣지를 강조합니다. BFS는 너비 방향으로 균등하게 퍼져나가고,
    DFS는 한 가지를 따라 깊이 들어가는 패턴을 확인할 수 있습니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    posG = nx.spring_layout(G, seed=42)

    fig1, ax1 = plt.subplots(figsize=(8, 6))
    nx.draw(G, pos=posG, with_labels=False, node_color='lightgray',
            node_size=500, edge_color='lightgray', ax=ax1)
    nx.draw_networkx_edges(G, pos=posG, edgelist=bfsEdges,
                            edge_color='blue', width=2, ax=ax1)

    labels = {n: str(i) for i, n in enumerate(bfsNodes)}
    nx.draw_networkx_labels(G, pos=posG, labels=labels, font_size=12, ax=ax1)
    ax1.set_title('BFS Traversal Order')
    fig1
  exercise:
    prompt: '4단계. 탐색 시각화: 예제를 실행한 뒤 입력값이나 변수 하나를 바꿔 결과 변화를 확인하세요.'
    starterCode: |-
      posG = nx.spring_layout(G, seed=42)

      fig1, ax1 = plt.subplots(figsize=(8, 6))
      nx.draw(G, pos=posG, with_labels=False, node_color='lightgray',
              node_size=500, edge_color='lightgray', ax=ax1)
      nx.draw_networkx_edges(G, pos=posG, edgelist=bfsEdges,
                              edge_color='blue', width=2, ax=ax1)

      labels = {n: str(i) for i, n in enumerate(bfsNodes)}
      nx.draw_networkx_labels(G, pos=posG, labels=labels, font_size=12, ax=ax1)
      ax1.set_title('BFS Traversal Order')
      fig1
    solution: |-
      posG = nx.spring_layout(G, seed=42)

      fig1, ax1 = plt.subplots(figsize=(8, 6))
      nx.draw(G, pos=posG, with_labels=False, node_color='lightgray',
