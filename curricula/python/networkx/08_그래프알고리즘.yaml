    title: '미션1: 네트워크 케이블링'
    blocks:
    - type: code
      title: 네트워크 생성
      content: |-
        import networkx as nx
        import matplotlib.pyplot as plt

        data = nx.Graph()
        data.add_edge("Server", "Switch1", weight=10)
        data.add_edge("Server", "Switch2", weight=15)
        data.add_edge("Switch1", "Switch2", weight=5)
        data.add_edge("Switch1", "PC1", weight=3)
        data.add_edge("Switch1", "PC2", weight=4)
        data.add_edge("Switch2", "PC3", weight=6)
        data.add_edge("Switch2", "PC4", weight=7)
        data.add_edge("PC1", "PC2", weight=2)
        data.edges(data=True)
    - type: code
      title: MST 계산
      content: |-
        mstData = nx.minimum_spanning_tree(data)
        mstCost = sum(d['weight'] for u, v, d in mstData.edges(data=True))
        list(mstData.edges(data=True)), mstCost
    - type: code
      title: 시각화
      content: |-
        posData = nx.spring_layout(data, seed=42)
        mstEdgeList = list(mstData.edges())

        chart, plot = plt.subplots(figsize=(10, 8))
        nx.draw(data, pos=posData, with_labels=True, node_color='lightblue',
                node_size=800, edge_color='lightgray', ax=plot)
        nx.draw_networkx_edges(data, pos=posData, edgelist=mstEdgeList,
                                edge_color='green', width=3, ax=plot)
        labels = nx.get_edge_attributes(data, 'weight')
        nx.draw_networkx_edge_labels(data, pos=posData, edge_labels=labels, ax=plot)
        plot.set_title(f'Network Cabling MST (Cost: {mstCost})')
        chart
  - type: expansion
    title: '미션2: 빌드 순서'
    blocks:
    - type: code
      title: 의존성 정의
      content: |-
        import networkx as nx
        import matplotlib.pyplot as plt

        df = nx.DiGraph()
        df.add_edge("utils", "core")
        df.add_edge("config", "core")
        df.add_edge("core", "services")
        df.add_edge("core", "models")
        df.add_edge("services", "api")
        df.add_edge("models", "api")
        df.add_edge("api", "main")
        df.edges()
    - type: code
      title: 빌드 순서
      content: |-
        buildOrder = list(nx.topological_sort(df))
        buildOrder
    - type: code
      title: 시각화
      content: |-
        posDf = nx.spring_layout(df, seed=42)
        orderLabels = {n: f"{i+1}.{n}" for i, n in enumerate(buildOrder)}

        canvas, panel = plt.subplots(figsize=(10, 7))
        nx.draw(df, pos=posDf, labels=orderLabels, node_color='lightyellow',
                node_size=1000, font_size=9, arrows=True, arrowsize=15, ax=panel)
        panel.set_title('Build Order (Topological Sort)')
        canvas
- id: workflow_validation
  title: 업무 흐름 검증
  structuredPrimary: true
  subtitle: 인수인계 네트워크
  goal: '업무 흐름 검증: 실행 가능한 Python 흐름으로 익힌다.'
  why: '업무 흐름 검증: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 실무 네트워크 분석은 그래프를 그리는 데서 끝나지 않습니다. 먼저 병목 후보를 예측하고, 로컬 Python에서 실행한 뒤, 잘못된 노드나 끊어진 경로를 예외로 처리하고, 핵심 지표를 assert로
    검증해야 합니다. 아래 흐름은 영업, 지원, 운영, 재무, 엔지니어링 사이의 인수인계 비용을 네트워크로 보고 개선안을 비교합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    import networkx as nx

    handoffEdges = [
        ("sales", "support", 1),
        ("support", "ops", 2),
        ("ops", "finance", 1),
        ("ops", "engineering", 1),
        ("engineering", "infra", 2),
        ("support", "customer_success", 2),
    ]

    workflowGraph = nx.Graph()
    workflowGraph.add_weighted_edges_from(handoffEdges)

    expectedNodes = {"sales", "support", "ops", "finance", "engineering", "infra", "customer_success"}
    if set(workflowGraph.nodes()) != expectedNodes:
        raise ValueError("인수인계 네트워크의 부서 목록이 예상과 다릅니다.")
    if any(data["weight"] <= 0 for _, _, data in workflowGraph.edges(data=True)):
        raise ValueError("인수인계 비용은 0보다 커야 합니다.")

    workflowGraph.number_of_nodes(), workflowGraph.number_of_edges()
