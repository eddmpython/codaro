  check:
    noError: 9단계. 조상과 후손에서 `ancestorsE` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 9단계. 조상과 후손 실행 뒤 `ancestorsE` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
