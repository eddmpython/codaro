intro:
  emoji: 🌐
  goal: 그래프를 생성하고 노드/엣지를 추가하여 시각화합니다.
  description: NetworkX의 기본인 그래프 생성을 배웁니다. Graph() 객체를 만들고, add_node()와 add_edge()로 노드와 엣지를 추가합니다. nodes()와
    edges()로 그래프를 탐색하고, nx.draw()로 시각화합니다.
  direction: 첫그래프만들기에서 노드와 엣지를 모델링하고 경로, 중심성, 연결 구조를 검증합니다.
