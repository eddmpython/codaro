sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: NetworkX와 시각화를 위한 matplotlib을 불러옵니다. networkx는 관례적으로 nx라는 별칭으로 임포트합니다. 이 별칭은 공식 문서와 대부분의 튜토리얼에서 사용하는 표준이므로 그대로 따르는 것이 좋습니다. matplotlib.pyplot은 그래프를 그림으로 그릴 때 필요합니다. NetworkX 자체는 그래프 데이터 구조와 알고리즘을 제공하고, 실제 시각화는 matplotlib이 담당합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import networkx as nx
    import matplotlib.pyplot as plt
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import networkx as nx
      import matplotlib.pyplot as plt
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step2_create
  title: 2단계. 빈 그래프 생성
  structuredPrimary: true
  subtitle: Graph()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    nx.Graph()를 호출하면 빈 무방향 그래프 객체가 생성됩니다. 이 시점에서는 노드도 엣지도 없는 빈 컨테이너입니다. 변수명은 관례적으로 대문자 G를 사용하지만, 여러 그래프를 다룰 때는 의미 있는 이름(friends, network, road 등)을 사용하는 것이 좋습니다. 무방향 그래프는 엣지에 방향이 없어서 A-B 연결이 있으면 A에서 B로, B에서 A로 모두 이동 가능합니다.

    Graph()는 무방향 그래프입니다. 방향 그래프는 DiGraph()를 사용합니다. 다음 프로젝트에서 배웁니다.
  tips:
  - Graph()는 무방향 그래프입니다. 방향 그래프는 DiGraph()를 사용합니다. 다음 프로젝트에서 배웁니다.
  snippet: |-
    G = nx.Graph()
    G
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G = nx.Graph()
      G
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step3_add_nodes
  title: 3단계. 노드 추가
  structuredPrimary: true
  subtitle: add_node()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    add_node() 메서드로 그래프에 노드를 하나씩 추가합니다. 노드는 해시 가능한(hashable) 모든 파이썬 객체가 될 수 있습니다. 정수(1, 2, 3), 문자열('Alice', 'Bob'), 튜플((0, 1)) 등을 노드로 사용할 수 있습니다. 다만 리스트나 딕셔너리처럼 변경 가능한(mutable) 객체는 노드가 될 수 없습니다. 실무에서는 사람 이름, 도시 이름, 제품 ID 등 의미 있는 식별자를 노드로 사용합니다.

    add_nodes_from()은 리스트나 이터러블을 받아 여러 노드를 한번에 추가합니다.
  tips:
  - add_nodes_from()은 리스트나 이터러블을 받아 여러 노드를 한번에 추가합니다.
  snippet: |-
    G1 = nx.Graph()
    G1.add_node(1)
    G1.add_node(2)
    G1.add_node("A")
    list(G1.nodes())
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G1 = nx.Graph()
      G1.add_node(1)
      G1.add_node(2)
      G1.add_node("A")
      list(G1.nodes())
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step4_add_edges
  title: 4단계. 엣지 추가
  structuredPrimary: true
  subtitle: add_edge()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    add_edge(u, v) 메서드로 노드 u와 노드 v 사이에 엣지(연결)를 추가합니다. 네트워크 분석에서 엣지는 관계를 나타냅니다. 친구 관계, 도로 연결, 협업 관계 등이 엣지가 됩니다. add_edge()의 편리한 점은 노드가 아직 존재하지 않아도 자동으로 생성해준다는 것입니다. 노드를 먼저 추가하지 않고 바로 엣지를 추가해도 됩니다. 여러 엣지를 한번에 추가할 때는 add_edges_from()에 튜플 리스트를 전달합니다.

    엣지를 추가할 때 노드가 없으면 자동 생성됩니다. 노드를 먼저 추가하지 않아도 됩니다.
  tips:
  - 엣지를 추가할 때 노드가 없으면 자동 생성됩니다. 노드를 먼저 추가하지 않아도 됩니다.
  snippet: |-
    G3 = nx.Graph()
    G3.add_edge(1, 2)
    G3.add_edge(2, 3)
    G3.add_edge(1, 3)
    list(G3.edges())
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G3 = nx.Graph()
      G3.add_edge(1, 2)
      G3.add_edge(2, 3)
      G3.add_edge(1, 3)
      list(G3.edges())
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step5_explore
  title: 5단계. 그래프 탐색
  structuredPrimary: true
  subtitle: nodes(), edges(), degree()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    그래프를 생성했으면 그 구조를 탐색해야 합니다. nodes()는 모든 노드를, edges()는 모든 엣지를 반환합니다. degree(노드)는 해당 노드의 차수, 즉 연결된 엣지의 개수를 반환합니다. 차수가 높은 노드는 많은 관계를 가진 중요한 노드입니다. neighbors(노드)는 해당 노드와 직접 연결된 이웃 노드들을 반환합니다. 이 기본 메서드들로 네트워크의 구조를 파악하고, 특정 노드의 연결 상태를 확인할 수 있습니다.

    degree(노드)는 해당 노드의 연결 수입니다. neighbors(노드)는 연결된 이웃 노드 목록입니다.
  tips:
  - degree(노드)는 해당 노드의 연결 수입니다. neighbors(노드)는 연결된 이웃 노드 목록입니다.
  snippet: |-
    G5 = nx.Graph()
    G5.add_edges_from([(1, 2), (1, 3), (1, 4), (2, 3)])
    nodeList = list(G5.nodes())
    edgeList5 = list(G5.edges())
    nodeList, edgeList5
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G5 = nx.Graph()
      G5.add_edges_from([(1, 2), (1, 3), (1, 4), (2, 3)])
      nodeList = list(G5.nodes())
      edgeList5 = list(G5.edges())
      nodeList, edgeList5
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step6_visualize
  title: 6단계. 그래프 시각화
  structuredPrimary: true
  subtitle: nx.draw()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    nx.draw() 함수로 그래프를 시각적으로 표현합니다. 노드는 원으로, 엣지는 선으로 그려집니다. with_labels=True를 설정하면 노드 안에 라벨(노드 이름)이 표시됩니다. node_color로 노드 색상, node_size로 노드 크기, edge_color로 엣지 색상을 지정할 수 있습니다. matplotlib의 Figure와 Axes를 사용하면 더 세밀한 제어가 가능합니다. 시각화는 네트워크 구조를 직관적으로 이해하는 데 매우 유용합니다.

    with_labels=True로 노드 라벨을 표시합니다. node_color, node_size, edge_color 등으로 스타일을 지정합니다.
  tips:
  - with_labels=True로 노드 라벨을 표시합니다. node_color, node_size, edge_color 등으로 스타일을 지정합니다.
  snippet: |-
    G6 = nx.Graph()
    G6.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4)])

    fig1, ax1 = plt.subplots(figsize=(6, 4))
    nx.draw(G6, with_labels=True, ax=ax1)
    ax1.set_title('Simple Graph')
    fig1
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G6 = nx.Graph()
      G6.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4)])

      fig1, ax1 = plt.subplots(figsize=(6, 4))
      nx.draw(G6, with_labels=True, ax=ax1)
      ax1.set_title('Simple Graph')
      fig1
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step7_layout
  title: 7단계. 레이아웃
  structuredPrimary: true
  subtitle: 노드 위치 결정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    레이아웃(layout)은 2D 평면에서 노드의 위치를 결정하는 알고리즘입니다. spring_layout은 물리적인 스프링 시뮬레이션을 사용합니다. 연결된 노드 사이에는 인력이, 모든 노드 사이에는 척력이 작용한다고 가정하여 균형 위치를 찾습니다. 결과적으로 연결된 노드는 가까이, 연결되지 않은 노드는 멀리 배치됩니다. circular_layout은 모든 노드를 원형으로 배치합니다. 레이아웃 함수는 노드 이름을 키로, 좌표를 값으로 하는 딕셔너리를 반환합니다.

    seed 파라미터를 설정하면 매번 같은 레이아웃을 얻습니다. 재현성을 위해 seed를 지정하세요.
  tips:
  - seed 파라미터를 설정하면 매번 같은 레이아웃을 얻습니다. 재현성을 위해 seed를 지정하세요.
  snippet: |-
    G7 = nx.Graph()
    G7.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4), (4, 5), (5, 6)])

    pos7 = nx.spring_layout(G7, seed=42)
    fig3, ax3 = plt.subplots(figsize=(6, 4))
    nx.draw(G7, pos=pos7, with_labels=True, node_color='lightgreen',
            node_size=600, ax=ax3)
    ax3.set_title('Spring Layout')
    fig3
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      G7 = nx.Graph()
      G7.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4), (4, 5), (5, 6)])

      pos7 = nx.spring_layout(G7, seed=42)
      fig3, ax3 = plt.subplots(figsize=(6, 4))
      nx.draw(G7, pos=pos7, with_labels=True, node_color='lightgreen',
              node_size=600, ax=ax3)
      ax3.set_title('Spring Layout')
      fig3
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step8_friends
  title: 8단계. 친구 네트워크 만들기
  structuredPrimary: true
  subtitle: 실습 예제
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 지금까지 배운 내용을 종합하여 실제 친구 관계 네트워크를 만들어봅시다. 사람 이름을 노드로, 친구 관계를 엣지로 표현합니다. 먼저 노드(사람들)를 추가하고, 친구 관계를 엣지로 연결합니다. 그런 다음 시각화하여 누가 누구와 연결되어 있는지 한눈에 확인합니다. 마지막으로 각 사람의 친구 수(차수)를 분석하여 가장 인기 있는 사람을 찾아봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    friends = nx.Graph()
    friendNames = ["Alice", "Bob", "Carol", "David", "Eve"]
    friends.add_nodes_from(friendNames)

    friendships = [
        ("Alice", "Bob"),
        ("Alice", "Carol"),
        ("Bob", "Carol"),
        ("Bob", "David"),
        ("Carol", "Eve"),
        ("David", "Eve")
    ]
    friends.add_edges_from(friendships)
    friends.number_of_nodes(), friends.number_of_edges()
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      friends = nx.Graph()
      friendNames = ["Alice", "Bob", "Carol", "David", "Eve"]
      friends.add_nodes_from(friendNames)

      friendships = [
          ("Alice", "Bob"),
          ("Alice", "Carol"),
          ("Bob", "Carol"),
          ("Bob", "David"),
          ("Carol", "Eve"),
          ("David", "Eve")
      ]
      friends.add_edges_from(friendships)
      friends.number_of_nodes(), friends.number_of_edges()
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: step9_check
  title: 9단계. 연결 확인
  structuredPrimary: true
  subtitle: has_node(), has_edge()
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    그래프에 특정 노드나 엣지가 있는지 확인해야 할 때가 있습니다. has_node(노드)는 해당 노드가 그래프에 존재하면 True, 없으면 False를 반환합니다. has_edge(u, v)는 노드 u와 v 사이에 엣지가 있으면 True를 반환합니다. 이 메서드들은 조건문과 함께 사용하여 노드나 엣지가 있을 때만 특정 작업을 수행하도록 할 수 있습니다. 존재하지 않는 노드에 접근하면 에러가 발생하므로 사전 확인이 중요합니다.

    has_node()와 has_edge()는 True/False를 반환합니다. 노드나 연결 존재 여부를 빠르게 확인할 수 있습니다.
  tips:
