      detail: 노드/엣지와 지표 값 기준으로 실행 결과를 비교합니다.
    - label: 첫그래프만들기 재사용
      detail: 완성 코드를 관계 분석 리포트에 붙일 수 있게 정리합니다.
    runtime:
    - label: 그래프 분석 환경
      detail: matplotlib, networkx 기준으로 로컬 Python 실행을 준비합니다.
    - label: 첫그래프만들기 실행
      detail: 셀을 실행해 노드/엣지와 지표 값와 예외 상태를 확인합니다.
    - label: 첫그래프만들기 완료
      detail: 검증된 코드를 관계 분석 리포트로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: NetworkX와 시각화를 위한 matplotlib을 불러옵니다. networkx는 관례적으로 nx라는 별칭으로 임포트합니다. 이 별칭은 공식 문서와 대부분의
    튜토리얼에서 사용하는 표준이므로 그대로 따르는 것이 좋습니다. matplotlib.pyplot은 그래프를 그림으로 그릴 때 필요합니다. NetworkX 자체는 그래프 데이터 구조와
    알고리즘을 제공하고, 실제 시각화는 matplotlib이 담당합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import networkx as nx
    import matplotlib.pyplot as plt
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: |-
      import networkx as nx
      import matplotlib.pyplot as plt
    hints:
    - 바꿀 지점은 관계 데이터을 만드는 첫 줄과 그래프 알고리즘 줄에서 찾으세요.
    - 실행 뒤 노드/엣지와 지표 값 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 실행 결과가 노드/엣지와 지표 값 기준으로 바꾼 입력값을 반영해야 합니다.
- id: step2_create
  title: 2단계. 빈 그래프 생성
  structuredPrimary: true
  subtitle: Graph()
  goal: 2단계. 빈 그래프 생성에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    nx.Graph()를 호출하면 빈 무방향 그래프 객체가 생성됩니다. 이 시점에서는 노드도 엣지도 없는 빈 컨테이너입니다. 변수명은 관례적으로 대문자 G를 사용하지만, 여러 그래프를 다룰 때는 의미 있는 이름(friends, network, road 등)을 사용하는 것이 좋습니다. 무방향 그래프는 엣지에 방향이 없어서 A-B 연결이 있으면 A에서 B로, B에서 A로 모두 이동 가능합니다.

    Graph()는 무방향 그래프입니다. 방향 그래프는 DiGraph()를 사용합니다. 다음 프로젝트에서 배웁니다.
  tips:
  - Graph()는 무방향 그래프입니다. 방향 그래프는 DiGraph()를 사용합니다. 다음 프로젝트에서 배웁니다.
  snippet: |-
    G = nx.Graph()
    G
  exercise:
    prompt: 2단계. 빈 그래프 생성 예제에서 `G` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      G = nx.Graph()
      G
    hints:
    - 바꿀 지점은 `G = ...` 오른쪽 값입니다.
    - 실행 뒤 `G` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 2단계. 빈 그래프 생성에서 `G` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 2단계. 빈 그래프 생성 실행 뒤 `G` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step3_add_nodes
  title: 3단계. 노드 추가
  structuredPrimary: true
  subtitle: add_node()
  goal: 3단계. 노드 추가에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    add_node() 메서드로 그래프에 노드를 하나씩 추가합니다. 노드는 해시 가능한(hashable) 모든 파이썬 객체가 될 수 있습니다. 정수(1, 2, 3), 문자열('Alice', 'Bob'), 튜플((0, 1)) 등을 노드로 사용할 수 있습니다. 다만 리스트나 딕셔너리처럼 변경 가능한(mutable) 객체는 노드가 될 수 없습니다. 실무에서는 사람 이름, 도시 이름, 제품 ID 등 의미 있는 식별자를 노드로 사용합니다.

    add_nodes_from()은 리스트나 이터러블을 받아 여러 노드를 한번에 추가합니다.
  tips:
  - add_nodes_from()은 리스트나 이터러블을 받아 여러 노드를 한번에 추가합니다.
  snippet: |-
    G1 = nx.Graph()
    G1.add_node(1)
    G1.add_node(2)
    G1.add_node("A")
    list(G1.nodes())
  exercise:
    prompt: 3단계. 노드 추가 예제에서 `G1` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      G1 = nx.Graph()
      G1.add_node(1)
      G1.add_node(2)
      G1.add_node("A")
      list(G1.nodes())
    hints:
    - 바꿀 지점은 `G1 = ...` 오른쪽 값입니다.
    - 실행 뒤 `G1` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 3단계. 노드 추가에서 `G1` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 3단계. 노드 추가 실행 뒤 `G1` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step4_add_edges
  title: 4단계. 엣지 추가
  structuredPrimary: true
  subtitle: add_edge()
  goal: 4단계. 엣지 추가에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    add_edge(u, v) 메서드로 노드 u와 노드 v 사이에 엣지(연결)를 추가합니다. 네트워크 분석에서 엣지는 관계를 나타냅니다. 친구 관계, 도로 연결, 협업 관계 등이 엣지가 됩니다. add_edge()의 편리한 점은 노드가 아직 존재하지 않아도 자동으로 생성해준다는 것입니다. 노드를 먼저 추가하지 않고 바로 엣지를 추가해도 됩니다. 여러 엣지를 한번에 추가할 때는 add_edges_from()에 튜플 리스트를 전달합니다.

    엣지를 추가할 때 노드가 없으면 자동 생성됩니다. 노드를 먼저 추가하지 않아도 됩니다.
  tips:
  - 엣지를 추가할 때 노드가 없으면 자동 생성됩니다. 노드를 먼저 추가하지 않아도 됩니다.
  snippet: |-
    G3 = nx.Graph()
    G3.add_edge(1, 2)
    G3.add_edge(2, 3)
    G3.add_edge(1, 3)
    list(G3.edges())
  exercise:
    prompt: 4단계. 엣지 추가 예제에서 `G3` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      G3 = nx.Graph()
      G3.add_edge(1, 2)
      G3.add_edge(2, 3)
      G3.add_edge(1, 3)
      list(G3.edges())
    hints:
    - 바꿀 지점은 `G3 = ...` 오른쪽 값입니다.
    - 실행 뒤 `G3` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 4단계. 엣지 추가에서 `G3` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 4단계. 엣지 추가 실행 뒤 `G3` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: step5_explore
  title: 5단계. 그래프 탐색
  structuredPrimary: true
  subtitle: nodes(), edges(), degree()
  goal: 5단계. 그래프 탐색에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    그래프를 생성했으면 그 구조를 탐색해야 합니다. nodes()는 모든 노드를, edges()는 모든 엣지를 반환합니다. degree(노드)는 해당 노드의 차수, 즉 연결된 엣지의 개수를 반환합니다. 차수가 높은 노드는 많은 관계를 가진 중요한 노드입니다. neighbors(노드)는 해당 노드와 직접 연결된 이웃 노드들을 반환합니다. 이 기본 메서드들로 네트워크의 구조를 파악하고, 특정 노드의 연결 상태를 확인할 수 있습니다.

    degree(노드)는 해당 노드의 연결 수입니다. neighbors(노드)는 연결된 이웃 노드 목록입니다.
  tips:
  - degree(노드)는 해당 노드의 연결 수입니다. neighbors(노드)는 연결된 이웃 노드 목록입니다.
  snippet: |-
    G5 = nx.Graph()
    G5.add_edges_from([(1, 2), (1, 3), (1, 4), (2, 3)])
    nodeList = list(G5.nodes())
    edgeList5 = list(G5.edges())
    nodeList, edgeList5
  exercise:
    prompt: 5단계. 그래프 탐색 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      G5 = nx.Graph()
      G5.add_edges_from([(1, 2), (1, 3), (1, 4), (2, 3)])
      nodeList = list(G5.nodes())
      edgeList5 = list(G5.edges())
      nodeList, edgeList5
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 5단계. 그래프 탐색에서 `G5` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 5단계. 그래프 탐색 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step6_visualize
  title: 6단계. 그래프 시각화
  structuredPrimary: true
  subtitle: nx.draw()
  goal: 6단계. 그래프 시각화에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    nx.draw() 함수로 그래프를 시각적으로 표현합니다. 노드는 원으로, 엣지는 선으로 그려집니다. with_labels=True를 설정하면 노드 안에 라벨(노드 이름)이 표시됩니다. node_color로 노드 색상, node_size로 노드 크기, edge_color로 엣지 색상을 지정할 수 있습니다. matplotlib의 Figure와 Axes를 사용하면 더 세밀한 제어가 가능합니다. 시각화는 네트워크 구조를 직관적으로 이해하는 데 매우 유용합니다.

    with_labels=True로 노드 라벨을 표시합니다. node_color, node_size, edge_color 등으로 스타일을 지정합니다.
  tips:
  - with_labels=True로 노드 라벨을 표시합니다. node_color, node_size, edge_color 등으로 스타일을 지정합니다.
  snippet: |-
    G6 = nx.Graph()
    G6.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4)])

    fig1, ax1 = plt.subplots(figsize=(6, 4))
    nx.draw(G6, with_labels=True, ax=ax1)
    ax1.set_title('Simple Graph')
    fig1
  exercise:
    prompt: 6단계. 그래프 시각화 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      G6 = nx.Graph()
      G6.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4)])

      fig1, ax1 = plt.subplots(figsize=(6, 4))
      nx.draw(G6, with_labels=True, ax=ax1)
      ax1.set_title('Simple Graph')
      fig1
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 6단계. 그래프 시각화의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 6단계. 그래프 시각화의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step7_layout
  title: 7단계. 레이아웃
  structuredPrimary: true
  subtitle: 노드 위치 결정
  goal: 7단계. 레이아웃에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 차트는 데이터와 표시 설정을 함께 확인해야 보고서에서 잘못된 해석을 줄일 수 있습니다.
  explanation: |-
    레이아웃(layout)은 2D 평면에서 노드의 위치를 결정하는 알고리즘입니다. spring_layout은 물리적인 스프링 시뮬레이션을 사용합니다. 연결된 노드 사이에는 인력이, 모든 노드 사이에는 척력이 작용한다고 가정하여 균형 위치를 찾습니다. 결과적으로 연결된 노드는 가까이, 연결되지 않은 노드는 멀리 배치됩니다. circular_layout은 모든 노드를 원형으로 배치합니다. 레이아웃 함수는 노드 이름을 키로, 좌표를 값으로 하는 딕셔너리를 반환합니다.

    seed 파라미터를 설정하면 매번 같은 레이아웃을 얻습니다. 재현성을 위해 seed를 지정하세요.
  tips:
  - seed 파라미터를 설정하면 매번 같은 레이아웃을 얻습니다. 재현성을 위해 seed를 지정하세요.
  snippet: |-
    G7 = nx.Graph()
    G7.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4), (4, 5), (5, 6)])

    pos7 = nx.spring_layout(G7, seed=42)
    fig3, ax3 = plt.subplots(figsize=(6, 4))
    nx.draw(G7, pos=pos7, with_labels=True, node_color='lightgreen',
            node_size=600, ax=ax3)
    ax3.set_title('Spring Layout')
    fig3
  exercise:
    prompt: 7단계. 레이아웃 예제에서 데이터 값이나 축/마크 설정을 바꾸고 차트 표현이 달라지는지 확인하세요.
    starterCode: |-
      G7 = nx.Graph()
      G7.add_edges_from([(1, 2), (1, 3), (2, 3), (3, 4), (4, 5), (5, 6)])

      pos7 = nx.spring_layout(G7, seed=42)
      fig3, ax3 = plt.subplots(figsize=(6, 4))
      nx.draw(G7, pos=pos7, with_labels=True, node_color='lightgreen',
              node_size=600, ax=ax3)
      ax3.set_title('Spring Layout')
      fig3
    hints:
    - 바꿀 지점은 x/y 데이터, 색상, 축 제목, 마크 설정 줄에서 찾으세요.
    - 실행 뒤 축, 범례, 표시 범위, 저장 결과가 바꾼 설정을 반영하는지 보세요.
  check:
    noError: 7단계. 레이아웃의 차트 객체와 축/마크 설정이 생성 단계까지 도달해야 합니다.
    resultCheck: 7단계. 레이아웃의 축, 범례, 마크, 저장 결과가 바꾼 데이터나 설정을 반영해야 합니다.
- id: step8_friends
  title: 8단계. 친구 네트워크 만들기
  structuredPrimary: true
  subtitle: 실습 예제
  goal: 8단계. 친구 네트워크 만들기에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: 지금까지 배운 내용을 종합하여 실제 친구 관계 네트워크를 만들어봅시다. 사람 이름을 노드로, 친구 관계를 엣지로 표현합니다. 먼저 노드(사람들)를 추가하고,
    친구 관계를 엣지로 연결합니다. 그런 다음 시각화하여 누가 누구와 연결되어 있는지 한눈에 확인합니다. 마지막으로 각 사람의 친구 수(차수)를 분석하여 가장 인기 있는 사람을 찾아봅니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    friends = nx.Graph()
    friendNames = ["Alice", "Bob", "Carol", "David", "Eve"]
    friends.add_nodes_from(friendNames)

    friendships = [
        ("Alice", "Bob"),
        ("Alice", "Carol"),
        ("Bob", "Carol"),
        ("Bob", "David"),
        ("Carol", "Eve"),
        ("David", "Eve")
    ]
    friends.add_edges_from(friendships)
    friends.number_of_nodes(), friends.number_of_edges()
  exercise:
    prompt: 8단계. 친구 네트워크 만들기 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      friends = nx.Graph()
      friendNames = ["Alice", "Bob", "Carol", "David", "Eve"]
      friends.add_nodes_from(friendNames)

      friendships = [
          ("Alice", "Bob"),
          ("Alice", "Carol"),
          ("Bob", "Carol"),
          ("Bob", "David"),
          ("Carol", "Eve"),
          ("David", "Eve")
      ]
      friends.add_edges_from(friendships)
      friends.number_of_nodes(), friends.number_of_edges()
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 8단계. 친구 네트워크 만들기에서 `friends` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 8단계. 친구 네트워크 만들기 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step9_check
  title: 9단계. 연결 확인
  structuredPrimary: true
  subtitle: has_node(), has_edge()
  goal: 9단계. 연결 확인에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    그래프에 특정 노드나 엣지가 있는지 확인해야 할 때가 있습니다. has_node(노드)는 해당 노드가 그래프에 존재하면 True, 없으면 False를 반환합니다. has_edge(u, v)는 노드 u와 v 사이에 엣지가 있으면 True를 반환합니다. 이 메서드들은 조건문과 함께 사용하여 노드나 엣지가 있을 때만 특정 작업을 수행하도록 할 수 있습니다. 존재하지 않는 노드에 접근하면 에러가 발생하므로 사전 확인이 중요합니다.

    has_node()와 has_edge()는 True/False를 반환합니다. 노드나 연결 존재 여부를 빠르게 확인할 수 있습니다.
  tips:
  - has_node()와 has_edge()는 True/False를 반환합니다. 노드나 연결 존재 여부를 빠르게 확인할 수 있습니다.
  snippet: |-
    hasAlice = friends.has_node("Alice")
    hasFrank = friends.has_node("Frank")
    hasAlice, hasFrank
  exercise:
    prompt: 9단계. 연결 확인 예제에서 `hasAlice`, `hasFrank` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      hasAlice = friends.has_node("Alice")
      hasFrank = friends.has_node("Frank")
      hasAlice, hasFrank
    hints:
    - 바꿀 지점은 `hasAlice = ...` 오른쪽 값입니다.
    - 실행 뒤 `hasAlice` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 9단계. 연결 확인에서 `hasAlice` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 9단계. 연결 확인 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: step10_remove
  title: 10단계. 노드/엣지 삭제
  structuredPrimary: true
  subtitle: remove_node(), remove_edge()
  goal: 10단계. 노드/엣지 삭제에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    그래프에서 노드나 엣지를 삭제할 수 있습니다. remove_edge(u, v)는 두 노드 사이의 연결만 끊고 노드는 그대로 남깁니다. remove_node(노드)는 해당 노드를 삭제하는데, 이때 그 노드와 연결된 모든 엣지도 자동으로 함께 삭제됩니다. 예를 들어 친구 네트워크에서 한 사람을 삭제하면 그 사람과의 모든 친구 관계도 사라집니다. 삭제 작업은 원본 그래프를 직접 수정하므로 주의가 필요합니다.

    노드를 삭제하면 해당 노드와 연결된 모든 엣지가 자동으로 삭제됩니다.
  tips:
  - 노드를 삭제하면 해당 노드와 연결된 모든 엣지가 자동으로 삭제됩니다.
  snippet: |-
    G8 = nx.Graph()
    G8.add_edges_from([(1, 2), (2, 3), (3, 1)])
    G8.remove_edge(1, 2)
    list(G8.edges())
  exercise:
    prompt: 10단계. 노드/엣지 삭제 예제에서 리스트 항목이나 인덱스를 바꾸고 선택 결과가 달라지는지 확인하세요.
    starterCode: |-
      G8 = nx.Graph()
      G8.add_edges_from([(1, 2), (2, 3), (3, 1)])
      G8.remove_edge(1, 2)
      list(G8.edges())
    hints:
    - 바꿀 지점은 대괄호 안의 항목, 인덱스, 슬라이스 범위입니다.
    - 실행 뒤 선택된 값, 길이, 순서가 바꾼 리스트 기준과 맞는지 보세요.
  check:
    noError: 10단계. 노드/엣지 삭제에서 `G8` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 10단계. 노드/엣지 삭제 실행 뒤 `G8` 값, 출력, 또는 type() 확인이 바꾼 리스트 값을 반영해야 합니다.
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 그래프 만들기
  goal: 실습에서 그래프 알고리즘 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    지금까지 배운 그래프 생성, 노드/엣지 추가, 탐색, 시각화 기능을 활용하여 미션을 수행해봅시다. 미션1에서는 팀 조직도를 네트워크로 표현하고, 미션2에서는 중심 노드와 외곽 노드로 구성된 별 모양 그래프를 만듭니다. 각 미션은 독립적으로 실행 가능하며, 앞에서 배운 모든 개념을 종합적으로 활용합니다.

    각 미션은 import문부터 시작합니다. 위 예제를 실행했다면 import는 생략해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작합니다. 위 예제를 실행했다면 import는 생략해도 됩니다.
  snippet: |-
    import networkx as nx
    import matplotlib.pyplot as plt

    team = nx.Graph()
    members = ["Leader", "Dev1", "Dev2", "Designer", "PM"]
