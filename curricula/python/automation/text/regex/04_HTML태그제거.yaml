meta:
  id: regex_04
  title: HTML태그제거
  order: 4
  category: regex
  difficulty: ⭐⭐
  badge: 기초
  tags:
  - HTML
  - 비탐욕적
  - DOTALL
  - 태그 제거
  - 텍스트 정제
  seo:
    title: 정규표현식 기초 - HTML 태그 제거
    description: 정규표현식으로 HTML에서 순수 텍스트만 추출합니다. 비탐욕적 매칭, re.DOTALL 플래그를 배웁니다.
    keywords:
    - 정규표현식
    - regex
    - HTML 파싱
    - 태그 제거
