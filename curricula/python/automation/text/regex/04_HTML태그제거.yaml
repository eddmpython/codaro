  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: 로컬 게시글 샘플에 HTML 태그를 추가해 크롤링 결과와 비슷한 입력을 만듭니다. 실제 웹 데이터에는 본문, 제목, 작성자 정보와 함께 태그가 섞여 있으므로
