- id: step9_complete_pipeline
  title: 9단계. 완성된 전처리 파이프라인
  structuredPrimary: true
  subtitle: 모든 단계 통합
  goal: 9단계. 완성된 전처리 파이프라인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
