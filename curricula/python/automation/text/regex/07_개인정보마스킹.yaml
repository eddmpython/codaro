sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: 1단계. 라이브러리 불러오기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import re
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: import re
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    type: noError
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 다음 셀에서 import한 이름을 사용할 수 있어야 합니다.
- id: step2_sample_data
  title: 2단계. 개인정보 샘플 데이터
  structuredPrimary: true
  subtitle: 가상의 개인정보
  goal: 2단계. 개인정보 샘플 데이터에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    실습을 위한 가상의 개인정보 데이터를 준비합니다. 실제 서비스에서는 절대 실제 개인정보를 사용하면 안 됩니다. 로그 파일, 개발 환경, 테스트 데이터에도 가상의 정보만 사용해야 개인정보보호법을 준수할 수 있습니다.

    개인정보 보호의 중요성
    실제 서비스에서는 개인정보를 로그, 화면에 노출하면 안 됩니다. - 로그 파일에 기록 전 자동 마스킹 - 화면 표시 시 일부만 표시 - 개발/테스트 환경에서도 실제 데이터 사용 금지
  tips:
  - 개인정보 보호의 중요성 실제 서비스에서는 개인정보를 로그, 화면에 노출하면 안 됩니다. - 로그 파일에 기록 전 자동 마스킹 - 화면 표시 시 일부만 표시 - 개발/테스트 환경에서도
    실제 데이터 사용 금지
  snippet: |-
    personalData = """
    이름: 김철수
    주민번호: 901225-1234567
    카드번호: 1234-5678-9012-3456
    계좌번호: 110-123-456789
    전화번호: 010-1234-5678

    이름: 이영희
    주민번호: 850315-2345678
    카드번호: 9876-5432-1098-7654
    계좌번호: 020-987-654321
    전화번호: 010-9876-5432
    """
    personalData
  exercise:
    prompt: 2단계. 개인정보 샘플 데이터 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      personalData = """
      이름: 김철수
      주민번호: 901225-1234567
      카드번호: 1234-5678-9012-3456
      계좌번호: 110-123-456789
      전화번호: 010-1234-5678

      이름: 이영희
      주민번호: 850315-2345678
      카드번호: 9876-5432-1098-7654
      계좌번호: 020-987-654321
      전화번호: 010-9876-5432
      """
      personalData
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 2단계. 개인정보 샘플 데이터의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 개인정보 샘플 데이터의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step3_mask_resident
  title: 3단계. 주민번호 마스킹
  structuredPrimary: true
  subtitle: 뒷자리 전체 숨기기
  goal: 3단계. 주민번호 마스킹에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    주민번호 뒷자리 7자리를 모두 *로 마스킹합니다. 주민번호는 XXXXXX-YYYYYYY 형식으로, 앞 6자리는 생년월일, 뒷 7자리는 성별과 고유번호입니다. 뒷자리를 마스킹하면 생년월일 정보는 유지하면서 개인 식별을 방지할 수 있습니다.

    역참조로 부분 유지
    - `\1` : 첫 번째 그룹(앞자리 6자리) 유지 - `-*******` : 하이픈 + 별표 7개 - 앞자리는 그대로, 뒷자리만 마스킹
  tips:
  - '역참조로 부분 유지 - `\1` : 첫 번째 그룹(앞자리 6자리) 유지 - `-*******` : 하이픈 + 별표 7개 - 앞자리는 그대로, 뒷자리만 마스킹'
  snippet: |-
    pattern = r"(\d{6})-(\d{7})"

    test = "주민번호: 901225-1234567"
    re.findall(pattern, test)
  exercise:
    prompt: 3단계. 주민번호 마스킹 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"(\d{6})-(\d{7})"

      test = "주민번호: 901225-1234567"
      re.findall(pattern, test)
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 3단계. 주민번호 마스킹의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 3단계. 주민번호 마스킹의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step4_mask_card
  title: 4단계. 카드번호 마스킹
  structuredPrimary: true
  subtitle: 중간 2개 그룹 숨기기
  goal: 4단계. 카드번호 마스킹에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    카드번호는 첫 4자리와 마지막 4자리만 표시합니다. 카드번호는 16자리로, 처음 6자리는 카드사 식별번호(BIN), 마지막 4자리는 확인용으로 노출해도 비교적 안전합니다. 중간 8자리를 마스킹하면 결제 영수증이나 알림에 사용할 수 있습니다.

    여러 그룹 참조
    - `\1` : 첫 번째 그룹 (1234) - `****` : 별표로 대체 - `\4` : 네 번째 그룹 (3456) 그룹 2, 3은 사용하지 않고 별표로 대체!
  tips:
  - '여러 그룹 참조 - `\1` : 첫 번째 그룹 (1234) - `****` : 별표로 대체 - `\4` : 네 번째 그룹 (3456) 그룹 2, 3은 사용하지 않고 별표로 대체!'
  snippet: |-
    pattern = r"(\d{4})-(\d{4})-(\d{4})-(\d{4})"
    replacement = r"\1-****-****-\4"

    test = "카드: 1234-5678-9012-3456"
    re.sub(pattern, replacement, test)
  exercise:
    prompt: 4단계. 카드번호 마스킹 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"(\d{4})-(\d{4})-(\d{4})-(\d{4})"
      replacement = r"\1-****-****-\4"

      test = "카드: 1234-5678-9012-3456"
      re.sub(pattern, replacement, test)
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 4단계. 카드번호 마스킹의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 카드번호 마스킹의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step5_mask_account
  title: 5단계. 계좌번호 마스킹
  structuredPrimary: true
  subtitle: 마지막 3자리만 표시
  goal: 5단계. 계좌번호 마스킹에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    계좌번호는 마지막 3자리만 남기고 마스킹합니다.

    결과: 계좌: ***-***-***789
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    pattern = r"(\d{3})-(\d{3})-(\d{3})(\d{3})"
    replacement = r"***-***-***\4"

    test = "계좌: 110-123-456789"
    re.sub(pattern, replacement, test)
  exercise:
    prompt: 5단계. 계좌번호 마스킹 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"(\d{3})-(\d{3})-(\d{3})(\d{3})"
      replacement = r"***-***-***\4"

      test = "계좌: 110-123-456789"
      re.sub(pattern, replacement, test)
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    type: noError
    noError: 5단계. 계좌번호 마스킹의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 5단계. 계좌번호 마스킹의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step6_backreference
  title: 6단계. 역참조 심화
  structuredPrimary: true
  subtitle: 반복 패턴 찾기
  goal: 6단계. 역참조 심화에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    역참조는 같은 패턴이 반복될 때도 사용할 수 있습니다.

    역참조 사용
    **패턴: \\1** `\b(\w+)\s+\1\b`: - `(\w+)` : 단어를 그룹 1로 캡처 - `\s+` : 공백 1개 이상 - `\1` : 그룹 1과 **동일한** 단어 - `\b` : 단어 경계 "정말 정말", "반드시 반드시" 같은 반복을 찾습니다!
  tips:
  - '역참조 사용 **패턴: \\1** `\b(\w+)\s+\1\b`: - `(\w+)` : 단어를 그룹 1로 캡처 - `\s+` : 공백 1개 이상 - `\1` : 그룹 1과 **동일한**
    단어 - `\b` : 단어 경계 "정말 정말", "반드시 반드시" 같은 반복을 찾습니다!'
  snippet: |-
    pattern = r"\b(\w+)\s+\1\b"

    test = "정말 정말 중요한 사항입니다. 반드시 반드시 확인하세요."
    matches = re.findall(pattern, test)
    matches
  exercise:
    prompt: 6단계. 역참조 심화 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"\b(\w+)\s+\1\b"

