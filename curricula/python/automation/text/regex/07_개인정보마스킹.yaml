- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 개인정보 마스킹 프로젝트
  goal: 보안 담당자가 되어 이름/이메일/전화번호/주민번호 같은 개인정보를 정규식 치환으로 마스킹하는 미션을 풀어 봅니다.
  why: 로그/덤프/분석 데이터에 개인정보가 그대로 남으면 컴플라이언스 사고가 됩니다. 정규식 마스킹은 가장 가볍고 빠른 첫 방어선이라 손에 익혀 둬야 합니다.
  explanation: |-
    보안 담당자가 되어 개인정보를 안전하게 마스킹합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import re

    text = """
    담당자: john.doe@company.com
    CC: admin@service.org
    수신: contact.person@shop.co.kr
    """

    def mask(match):
        user = match.group(1)
        domain = match.group(2)
        if len(user) <= 2:
            out = user[0] + "*"
        else:
            out = user[:2] + "*" * (len(user) - 2)
        return f"{out}@{domain}"

    pat = re.compile(r"([\w.]+)@([\w.]+)")
    result = pat.sub(mask, text)
    result
  exercise:
