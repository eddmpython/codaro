  goal: 데이터 정제 담당자가 되어 다양한 형식의 날짜를 통일된 ISO 형식(YYYY-MM-DD)으로 정규화하는 미션을 풀어 봅니다.
  why: 실무 데이터는 한 컬럼에 여러 날짜 포맷이 섞여 들어옵니다. 정규식 패턴 한 세트로 모두를 한 형식으로 환산할 수 있어야 다음 분석 단계가 흔들리지 않습니다.
  explanation: |-
    데이터 정제 담당자가 되어 다양한 형식의 데이터를 통일합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import re

    text = """
    회의: 2:30 PM
    점심: 12:00 PM
    기상: 7:15 AM
    취침: 11:45 PM
    """

    def convert(match):
        h = int(match.group(1))
        m = match.group(2)
        p = match.group(3)
        if p == "PM" and h != 12:
            h += 12
        elif p == "AM" and h == 12:
            h = 0
        return f"{h:02d}:{m}"

    pat = re.compile(r"(\d{1,2}):(\d{2}) (AM|PM)")
    result = pat.sub(convert, text)
    result
  exercise:
    prompt: 실습 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      import re

      text = """
      회의: 2:30 PM
      점심: 12:00 PM
      기상: 7:15 AM
      취침: 11:45 PM
      """

      def convert(match):
          h = int(match.group(1))
          m = match.group(2)
          p = match.group(3)
          if p == "PM" and h != 12:
              h += 12
          elif p == "AM" and h == 12:
              h = 0
          return f"{h:02d}:{m}"

      pat = re.compile(r"(\d{1,2}):(\d{2}) (AM|PM)")
      result = pat.sub(convert, text)
      result
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 실습의 정규식 패턴이 컴파일되고 입력 텍스트가 매치 단계까지 도달해야 합니다.
    resultCheck: 실습 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
- id: summary
  title: 정리
  subtitle: 여섯 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 re.compile과 함수 치환을 배웠습니다. 다양한 날짜 형식을 통일된 형식으로 변환할 수 있습니다.
  - type: list
    items:
    - re.compile() - 패턴 미리 컴파일
    - re.sub(패턴, 함수) - 함수로 치환
    - \d{1,2} - 1~2자리 숫자
    - \3-\2-\1 - 그룹 순서 변경
  - type: text
    content: 다음 프로젝트에서는 개인정보를 자동으로 마스킹하는 방법을 배웁니다!
