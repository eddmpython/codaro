- id: step9_complete_converter
  title: 9단계. 완성된 날짜 변환기
  structuredPrimary: true
  subtitle: 모든 형식 처리
  goal: 9단계. 완성된 날짜 변환기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: 배운 모든 패턴을 합쳐 완성된 변환기를 만듭니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    MONTH_NAME_PATTERN = r"Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec"
    monthMap = {
        "Jan": "01", "Feb": "02", "Mar": "03", "Apr": "04",
        "May": "05", "Jun": "06", "Jul": "07", "Aug": "08",
        "Sep": "09", "Oct": "10", "Nov": "11", "Dec": "12",
    }

    def formatDate(year, month, day):
        return f"{int(year):04d}-{int(month):02d}-{int(day):02d}"

    def convertAllDates(text):
        text = re.sub(
            r"(\d{4})/(\d{1,2})/(\d{1,2})",
            lambda match: formatDate(match.group(1), match.group(2), match.group(3)),
            text,
        )
        text = re.sub(
            r"(\d{1,2})\.(\d{1,2})\.(\d{4})",
            lambda match: formatDate(match.group(3), match.group(2), match.group(1)),
            text,
        )
        text = re.sub(
            r"(\d{1,2})-(\d{1,2})-(\d{4})",
            lambda match: formatDate(match.group(3), match.group(2), match.group(1)),
            text,
        )
        text = re.sub(
            r"(\d{4})\.(\d{1,2})\.(\d{1,2})",
            lambda match: formatDate(match.group(1), match.group(2), match.group(3)),
            text,
        )
        text = re.sub(
            r"(\d{1,2})/(\d{1,2})/(\d{4})",
            lambda match: formatDate(match.group(3), match.group(2), match.group(1)),
            text,
        )
        text = re.sub(
            rf"({MONTH_NAME_PATTERN}) (\d{{1,2}}), (\d{{4}})",
            lambda match: formatDate(match.group(3), monthMap[match.group(1)], match.group(2)),
            text,
        )
        text = re.sub(
            rf"(\d{{1,2}}) ({MONTH_NAME_PATTERN}) (\d{{4}})",
            lambda match: formatDate(match.group(3), monthMap[match.group(2)], match.group(1)),
            text,
        )
        text = re.sub(
            r"(\d{4})년 (\d{1,2})월 (\d{1,2})일",
            lambda match: formatDate(match.group(1), match.group(2), match.group(3)),
            text,
        )
        text = re.sub(
            r"(\d{4})-(\d{1,2})-(\d{1,2})",
            lambda match: formatDate(match.group(1), match.group(2), match.group(3)),
            text,
        )
        return text

    result = convertAllDates(mixedDates)
    result
