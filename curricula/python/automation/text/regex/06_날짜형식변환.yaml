intro:
  emoji: 📅
  goal: 10가지 날짜 형식을 YYYY-MM-DD로 통일합니다.
  description: 실무에서 가장 골치아픈 작업 중 하나가 날짜 형식 통일입니다. 여러 패턴을 조합하고 re.compile로 최적화하는 방법을 배웁니다.
  direction: 날짜형식변환에서 입력, 처리, 검증을 하나의 실행 가능한 코드 흐름으로 연결합니다.
  benefits:
  - 샘플 문자열 확인 후 패턴 매칭과 치환에 맞는 코드 입력을 고릅니다.
  - 날짜형식변환 결과를 매치 그룹, 추출 목록, 치환 결과 기준으로 즉시 점검합니다.
  - 완료한 코드를 로그/문서 정제 자동화에 다시 사용할 수 있습니다.
  diagram:
    steps:
    - label: 1단계. 라이브러리 불러오기 입력 확인
      detail: 입력 기준(샘플 문자열)과 필요한 조건을 먼저 고정합니다.
    - label: 2단계. 다양한 날짜 형식 확 처리 실행
      detail: 패턴 매칭과 치환 코드를 실행해 중간 결과를 확인합니다.
    - label: 3단계. YYYYMMDD 형식 결과 검증
      detail: 매치 그룹, 추출 목록, 치환 결과 기준으로 실행 결과를 비교합니다.
    - label: 날짜형식변환 재사용
      detail: 완성 코드를 로그/문서 정제 자동화에 붙일 수 있게 정리합니다.
    runtime:
    - label: 텍스트 정제 환경
      detail: 표준 라이브러리 기준으로 로컬 Python 실행을 준비합니다.
    - label: 날짜형식변환 실행
      detail: 셀을 실행해 매치 그룹, 추출 목록, 치환 결과와 예외 상태를 확인합니다.
    - label: 날짜형식변환 완료
      detail: 검증된 코드를 로그/문서 정제 자동화로 남깁니다.
sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  structuredPrimary: true
  subtitle: import
  goal: 1단계. 라이브러리 불러오기에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: 1단계. 라이브러리 불러오기의 핵심 흐름을 예제 코드로 확인하고, 같은 구조를 직접 실행해 결과를 검증한다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: import re
  exercise:
    prompt: 1단계. 라이브러리 불러오기 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: import re
    hints:
    - 바꿀 지점은 입력 데이터을 만드는 첫 줄과 핵심 처리 줄에서 찾으세요.
    - 실행 뒤 출력과 상태 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 1단계. 라이브러리 불러오기의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 1단계. 라이브러리 불러오기 다음 셀에서 import한 이름을 사용할 수 있어야 합니다.
- id: step2_date_formats
  title: 2단계. 다양한 날짜 형식 확인
  structuredPrimary: true
  subtitle: 실제 데이터의 혼란
  goal: 2단계. 다양한 날짜 형식 확인에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    실제 데이터에서는 날짜가 온갖 형식으로 저장되어 있습니다. 미국식(MM/DD/YYYY), 유럽식(DD.MM.YYYY), 아시아식(YYYY-MM-DD), 한국어(2024년 1월 1일), 영문 월명(Jan 1, 2024) 등 다양한 형식이 혼재합니다. 이런 데이터를 분석하거나 DB에 저장하려면 반드시 형식을 통일해야 합니다.

    YYYY-MM-DD, YYYY/MM/DD, DD.MM.YYYY, 영문 월 등 10가지 형식이 섞여 있습니다. ISO 8601 표준인 YYYY-MM-DD 형식으로 통일하면 정렬, 비교, 저장이 모두 쉬워집니다. 하나씩 패턴을 만들어 변환해봅시다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    mixedDates = """
    생년월일: 1990-12-25
    입사일: 2020/03/15
    계약일: 12.05.2023
    만료일: 25-12-2025
    등록일: Dec 25, 2024
    방문일: 2024년 11월 30일
    신청일: 15/08/2023
    발행일: 2023-7-9
    갱신일: 2024.1.5
    종료일: 31 Dec 2025
    """
    mixedDates
  exercise:
    prompt: 2단계. 다양한 날짜 형식 확인 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      mixedDates = """
      생년월일: 1990-12-25
      입사일: 2020/03/15
      계약일: 12.05.2023
      만료일: 25-12-2025
      등록일: Dec 25, 2024
      방문일: 2024년 11월 30일
      신청일: 15/08/2023
      발행일: 2023-7-9
      갱신일: 2024.1.5
      종료일: 31 Dec 2025
      """
      mixedDates
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    noError: 2단계. 다양한 날짜 형식 확인의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 2단계. 다양한 날짜 형식 확인의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step3_pattern1_yyyymmdd
  title: 3단계. YYYY-MM-DD 형식 처리
  structuredPrimary: true
  subtitle: 가장 표준적인 형식
  goal: 3단계. YYYYMMDD 형식 처리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    먼저 이미 표준 형식인 YYYY-MM-DD 날짜들을 찾습니다. 변환이 필요 없는 데이터를 먼저 확인하면 어떤 형식들을 추가로 처리해야 하는지 파악할 수 있습니다. 수량자 {1,2}를 사용하면 한 자리 월/일도 매칭할 수 있습니다.

    수량자 사용 이유
    **패턴: \\d{1,2}** - `\d{2}` : 정확히 2자리 (01, 02, 12만 매칭) - `\d{1,2}` : 1~2자리 (1, 9, 01, 12 모두 매칭) 실제 데이터는 선행 0이 없을 수 있으므로 {1,2} 사용!
  tips:
  - '수량자 사용 이유 **패턴: \\d{1,2}** - `\d{2}` : 정확히 2자리 (01, 02, 12만 매칭) - `\d{1,2}` : 1~2자리 (1, 9, 01, 12
    모두 매칭) 실제 데이터는 선행 0이 없을 수 있으므로 {1,2} 사용!'
  snippet: |-
    pattern = r"\d{4}-\d{1,2}-\d{1,2}"

    matches = re.findall(pattern, mixedDates)
    matches
  exercise:
    prompt: 3단계. YYYYMMDD 형식 처리 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"\d{4}-\d{1,2}-\d{1,2}"

      matches = re.findall(pattern, mixedDates)
      matches
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    noError: 3단계. YYYYMMDD 형식 처리의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 3단계. YYYYMMDD 형식 처리의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step4_pattern2_slash
  title: 4단계. 슬래시(/) 형식 처리
  structuredPrimary: true
  subtitle: YYYY/MM/DD 변환
  goal: 4단계. 슬래시(/) 형식 처리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    슬래시로 구분된 날짜를 하이픈으로 변환합니다. YYYY/MM/DD 형식은 연도가 앞에 있어 순서는 같고 구분자만 바꾸면 됩니다. 그룹 캡처 후 동일한 순서로 재조합하되 구분자를 하이픈으로 변경합니다.

    2020/03/15 → 2020-03-15 로 변환되었습니다!
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    pattern = r"(\d{4})/(\d{1,2})/(\d{1,2})"
    replacement = r"\1-\2-\3"

    result = re.sub(pattern, replacement, "입사일: 2020/03/15")
    result
  exercise:
    prompt: 4단계. 슬래시(/) 형식 처리 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"(\d{4})/(\d{1,2})/(\d{1,2})"
      replacement = r"\1-\2-\3"

      result = re.sub(pattern, replacement, "입사일: 2020/03/15")
      result
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    noError: 4단계. 슬래시(/) 형식 처리의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 4단계. 슬래시(/) 형식 처리의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step5_pattern3_dotdmy
  title: 5단계. DD.MM.YYYY 형식 처리
  structuredPrimary: true
  subtitle: 유럽식 날짜 순서 변경
  goal: 5단계. DD.MM.YYYY 형식 처리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: |-
    유럽에서 많이 쓰는 DD.MM.YYYY 형식은 일-월-년 순서입니다. YYYY-MM-DD로 변환하려면 그룹의 순서를 역순으로 바꿔야 합니다. 치환 문자열에서 \\3-\\2-\\1처럼 그룹 순서를 바꿔 참조하면 됩니다.

    그룹 순서 바꾸기
    - 원본: `(\d{1,2})\.(\d{1,2})\.(\d{4})` → 그룹 1, 2, 3 - 치환: `\3-\2-\1` → 그룹 3, 2, 1 순서로 재배치 날짜 순서를 바꿀 때 매우 유용합니다!
  tips:
  - '그룹 순서 바꾸기 - 원본: `(\d{1,2})\.(\d{1,2})\.(\d{4})` → 그룹 1, 2, 3 - 치환: `\3-\2-\1` → 그룹 3, 2, 1 순서로 재배치
    날짜 순서를 바꿀 때 매우 유용합니다!'
  snippet: |-
    pattern = r"(\d{1,2})\.(\d{1,2})\.(\d{4})"
    replacement = r"\3-\2-\1"

    result = re.sub(pattern, replacement, "계약일: 12.05.2023")
    result
  exercise:
    prompt: 5단계. DD.MM.YYYY 형식 처리 예제에서 패턴이나 샘플 문자열을 바꾸고 추출/치환 결과가 달라지는지 확인하세요.
    starterCode: |-
      pattern = r"(\d{1,2})\.(\d{1,2})\.(\d{4})"
      replacement = r"\3-\2-\1"

      result = re.sub(pattern, replacement, "계약일: 12.05.2023")
      result
    hints:
    - 바꿀 지점은 정규식 패턴, 그룹, re.search/findall/sub의 입력 문자열입니다.
    - 실행 뒤 매치 그룹, 추출 목록, 치환 문자열이 바꾼 패턴과 맞는지 보세요.
  check:
    noError: 5단계. DD.MM.YYYY 형식 처리의 정규식 패턴과 입력 문자열 처리가 컴파일/치환 단계까지 도달해야 합니다.
    resultCheck: 5단계. DD.MM.YYYY 형식 처리의 실행 결과가 본문 기대값과 일치해야 합니다.
- id: step6_multiple_patterns
  title: 6단계. 여러 패턴 한 번에 처리
  structuredPrimary: true
  subtitle: 순차적 치환
  goal: 6단계. 여러 패턴 한 번에 처리에서 핵심 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 패턴 처리는 샘플 문자열 결과를 즉시 확인해야 과도한 매칭이나 누락을 줄일 수 있습니다.
  explanation: 모든 패턴을 함수로 만들어 순차적으로 적용합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def normalizeDates(text):
        text = re.sub(r"(\d{4})/(\d{1,2})/(\d{1,2})", r"\1-\2-\3", text)

        text = re.sub(r"(\d{1,2})\.(\d{1,2})\.(\d{4})", r"\3-\2-\1", text)

        text = re.sub(r"(\d{1,2})-(\d{1,2})-(\d{4})", r"\3-\2-\1", text)

        text = re.sub(r"(\d{4})\.(\d{1,2})\.(\d{1,2})", r"\1-\2-\3", text)

        text = re.sub(r"(\d{1,2})/(\d{1,2})/(\d{4})", r"\3-\2-\1", text)

        return text

    result = normalizeDates(mixedDates)
    result[:300]
  exercise:
    prompt: 6단계. 여러 패턴 한 번에 처리 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def normalizeDates(text):
          text = re.sub(r"(\d{4})/(\d{1,2})/(\d{1,2})", r"\1-\2-\3", text)

          text = re.sub(r"(\d{1,2})\.(\d{1,2})\.(\d{4})", r"\3-\2-\1", text)

          text = re.sub(r"(\d{1,2})-(\d{1,2})-(\d{4})", r"\3-\2-\1", text)

          text = re.sub(r"(\d{4})\.(\d{1,2})\.(\d{1,2})", r"\1-\2-\3", text)

          text = re.sub(r"(\d{1,2})/(\d{1,2})/(\d{4})", r"\3-\2-\1", text)

          return text

      result = normalizeDates(mixedDates)
      result[:300]
    hints:
