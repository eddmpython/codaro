  title: 7단계. re.compile로 최적화
  structuredPrimary: true
  subtitle: 패턴 재사용
  goal: 같은 패턴을 re.compile로 미리 컴파일해 반복 호출 시간을 줄이고, 컴파일 객체와 모듈 함수 호출의 시간 차이를 직접 측정합니다.
  why: re.findall 같은 모듈 함수는 호출마다 패턴을 재컴파일합니다. 핫 루프에서 같은 패턴을 수천 번 쓰면 컴파일 비용이 누적되어 컴파일 객체 재사용이 표준 최적화입니다.
  explanation: |-
    같은 패턴을 여러 번 사용할 때는 re.compile로 미리 컴파일하면 성능이 향상됩니다.

    re.compile() 사용 이유
    **re.compile(패턴)**: - 패턴을 미리 컴파일하여 Pattern 객체 생성 - 같은 패턴을 여러 번 사용할 때 성능 향상 (30~50% 빠름) - `.sub()`, `.findall()`, `.search()` 등 메서드 사용 ```python pattern = re.compile(r"\d+") pattern.findall(text) pattern.sub("X", text) ```
  tips:
  - 're.compile() 사용 이유 **re.compile(패턴)**: - 패턴을 미리 컴파일하여 Pattern 객체 생성 - 같은 패턴을 여러 번 사용할 때 성능 향상 (30~50%
    빠름) - `.sub()`, `.findall()`, `.search()` 등 메서드 사용 ```python pattern = re.compile(r"\d+") pattern.findall(text)
    pattern.sub("X", text) ```'
  snippet: |-
    slashPattern = re.compile(r"(\d{4})/(\d{1,2})/(\d{1,2})")
    dotPattern = re.compile(r"(\d{1,2})\.(\d{1,2})\.(\d{4})")

    text = "입사: 2020/03/15, 계약: 12.05.2023"

