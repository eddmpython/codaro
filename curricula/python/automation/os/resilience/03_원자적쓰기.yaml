meta:
  id: resilience_03
  title: 원자적 쓰기
  order: 3
  category: resilience
  difficulty: easy
  audience: 리포트·상태 파일을 주기적으로 덮어쓰는 자동화를 만드는 Python 학습자
  packages: []
