        - dict 키 이름은 skipped를 그대로 사용해 안정성을 비교한다.
      check:
        noError: 세 번의 syncOnce 호출이 격리 공간에서 끝나야 한다.
        resultCheck: summary 딕셔너리의 모든 키가 종합 결과로 멱등성을 확인해야 한다.
