        def syncOnce(source: Path, backup: Path) -> dict:
            report = {"added": [], "updated": [], "skipped": []}
            backup.mkdir(exist_ok=True)
            for src in sorted(source.rglob("*")):
                if src.is_dir():
                    continue
                relative = src.relative_to(source)
                dst = backup / relative
