  transferVariants:
  - id: zip-prefix-extract-transfer
    mode: transfer
    unseen: true
    sourceSectionIds:
    - zip-selected-members-mastery
    - integrity-summary
    title: ZIP에서 지정한 폴더만 골라 풀기
    subtitle: archive 읽기를 선택적 복원에 적용
    goal: 안전한 member 가운데 prefix 아래 파일만 별도 출력 폴더로 복원한다.
    why: 실제 백업 복구는 archive 전체를 덮어쓰는 대신 필요한 영역만 골라 검토 가능한 위치에 풀어야 한다.
    explanation: 하나의 unseen archive에서 reports와 images를 서로 다른 출력 폴더로 복원하고 생성 경로까지 검사한다.
    tips:
    - member 이름을 PurePosixPath로 검사하고 absolute와 ..을 거부하세요.
    - extract 대신 destination을 직접 만들고 zf.read bytes를 쓰면 경계가 선명합니다.
    exercise:
      prompt: extract_prefix(base, archive_name, prefix, output_dir)가 prefix 아래 안전한 파일만 풀고 출력 폴더 기준 상대 경로를 반환하도록 완성하세요.
      starterCode: |-
        import zipfile
        from pathlib import Path, PurePosixPath

        def extract_prefix(base, archive_name, prefix, output_dir):
            raise NotImplementedError
      solution: |-
        import zipfile
        from pathlib import Path, PurePosixPath

        def extract_prefix(base, archive_name, prefix, output_dir):
            base = Path(base)
            target_root = base / output_dir
            extracted = []
            with zipfile.ZipFile(base / archive_name) as zf:
                for name in zf.namelist():
                    member = PurePosixPath(name)
                    if member.is_absolute() or ".." in member.parts:
                        raise ValueError("안전하지 않은 member입니다")
                    if not name.startswith(prefix.rstrip("/") + "/"):
                        continue
                    relative = PurePosixPath(*member.parts[1:])
                    destination = target_root.joinpath(*relative.parts)
                    destination.parent.mkdir(parents=True, exist_ok=True)
                    destination.write_bytes(zf.read(name))
                    extracted.append(relative.as_posix())
            return sorted(extracted)
      hints:
      - prefix 뒤에 /를 붙여 같은 글자로 시작하는 다른 폴더를 제외하세요.
      - 첫 path 조각을 뺀 member를 output_dir 아래에 직접 기록하세요.
