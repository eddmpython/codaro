    title: 하루 뒤 ZIP 안전성 보고서 만들기
    subtitle: member 경계와 중복 검사를 기억에서 복원
    goal: archive의 손상, 중복 이름, unsafe member를 읽기 전 보고서로 정리한다.
    why: 시간이 지나도 압축 해제 전에 archive 내용을 검사하는 순서를 기억해야 traversal과 덮어쓰기를 예방할 수 있다.
    explanation: 정상, 상위 폴더 이동, 중복 member를 가진 서로 다른 archive 세 개로 같은 함수를 호출한다.
    tips:
    - namelist의 이름별 개수를 세어 두 번 이상 나온 이름을 찾으세요.
    - PurePosixPath가 absolute이거나 parts에 ..이 있으면 unsafe 목록에 넣으세요.
    exercise:
      prompt: inspect_archive(base, archive_name)가 names, duplicates, unsafeNames, corrupted를 가진 dict를 반환하도록 완성하세요.
      starterCode: |-
        import zipfile
        from pathlib import Path, PurePosixPath

        def inspect_archive(base, archive_name):
            raise NotImplementedError
      solution: |-
        import zipfile
        from collections import Counter
        from pathlib import Path, PurePosixPath

        def inspect_archive(base, archive_name):
            with zipfile.ZipFile(Path(base) / archive_name) as zf:
                names = zf.namelist()
                counts = Counter(names)
                unsafe = [
                    name for name in names
                    if PurePosixPath(name).is_absolute() or ".." in PurePosixPath(name).parts
                ]
                return {
                    "names": sorted(names),
                    "duplicates": sorted(name for name, count in counts.items() if count > 1),
                    "unsafeNames": sorted(unsafe),
                    "corrupted": zf.testzip(),
                }
      hints:
      - Counter(namelist())에서 count가 1보다 큰 key만 고르세요.
      - testzip은 손상 파일 이름 또는 None을 반환합니다.
