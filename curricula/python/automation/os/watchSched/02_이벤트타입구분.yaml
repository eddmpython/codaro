        - 두 write_text 모두 daily.log 동일 파일에 대해 호출되어야 한다.
        - 첫 write는 created를, 두 번째 write는 modified를 발생시킨다.
      check:
        noError: 두 번의 write_text와 Observer 정리가 끝나야 한다.
