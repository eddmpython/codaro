        report = runOnce([4, 5])

        assert report == {"jobCount": 2, "results": [40, 50]}
        report
      solution: |-
        import time

        from apscheduler.schedulers.background import BackgroundScheduler


        def runOnce(items: list[int]) -> dict:
            collected: list[int] = []

            def job(value: int) -> None:
