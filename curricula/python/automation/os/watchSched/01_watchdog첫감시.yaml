            base = Path(td)
            observer = Observer()
            observer.schedule(CreatedCollector(sink), str(base), recursive=___)
            observer.start()
            try:
                (base / "second.txt").write_text("ok", encoding="utf-8")
                time.sleep(0.5)
            finally:
                observer.stop()
                observer.join()

        assert "second.txt" in sink
        sink
      solution: |-
