                if not event.is_directory:
                    self.sink.append(Path(event.src_path).name)


        sink = []
        with tempfile.TemporaryDirectory() as td:
            base = Path(td)
            observer = Observer()
            observer.schedule(CreatedCollector(sink), str(base), recursive=___)
            observer.start()
            try:
