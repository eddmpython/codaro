  masteryVariants:
  - id: watchSched_08-persistent-job-record-mastery
    mode: mastery
    unseen: true
    claimScope: portable-concept
    reviewStatus: machine-verified-pending-independent-review
    sourceSectionIds:
    - schedule-shape
