meta:
  id: inputCtl_04
  title: 키보드 입력 계획
  order: 4
  category: inputCtl
  difficulty: easy
  audience: GUI 자동화에 입문하는 Python 학습자
  packages: []
  tags:
    - keyboard
    - hotkey
    - automation
intro:
  direction: 키보드 자동화 입력을 명령 dict로 표현해 단일 키, 문자열 입력, 단축키 조합, 종합 시퀀스를 단계적으로 만든다.
  benefits:
    - type, key, text 같은 표준 키로 키보드 명령을 표현한다.
    - 한 줄 문자열 입력을 type=text 명령으로 표현한다.
    - 단축키 조합을 keys 리스트로 표현한다.
    - 종합 시퀀스가 자동화 의도를 사람이 읽기 좋게 정리한다.
  diagram:
    steps:
      - label: 단일 키 명령
        detail: type=press와 key 값을 가진 dict로 한 키 입력을 표현한다.
      - label: 문자열 입력 명령
        detail: type=text와 text 값으로 여러 글자를 한 번에 입력한다.
      - label: 단축키 조합
        detail: type=hotkey와 keys 리스트로 ctrl+s 같은 조합을 표현한다.
      - label: 종합 시퀀스
        detail: 위 명령들을 리스트로 묶어 자동화 의도를 명시한다.
    runtime:
      - label: 표준 라이브러리만
        detail: 명령 표현은 dict만 사용하므로 외부 패키지가 필요 없다.
      - label: assert 기반 검증
        detail: 시퀀스 구조와 키 값을 assert로 비교한다.
sections:
  - id: press-key
    title: 단일 키 명령
    structuredPrimary: true
    subtitle: type=press
    goal: 한 키 입력 명령을 type과 key 두 키로 표현한다.
    why: 단일 키 입력은 키보드 자동화의 가장 작은 단위이므로 첫 단계로 표기 합의가 필요하다.
    explanation: press 명령은 type 키와 key 키를 가진다. key 값은 "enter", "tab", "esc" 같은 표준 이름이다. 자동화 코드는 이 표기를 신뢰해 실행기에 그대로 넘긴다.
    tips:
      - key 이름은 표준 영문 이름으로 통일한다.
      - enter는 줄바꿈, tab은 다음 칸 이동에 가장 흔히 쓰인다.
    snippet: |-
      command = {"type": "press", "key": "enter"}

      assert command["type"] == "press"
      assert command["key"] == "enter"
      command
    exercise:
      prompt: tab 키 입력 명령을 만들고 두 키 값이 정확한지 검증하세요.
      starterCode: |-
        command = {"type": "press", "key": "___"}

        assert command["type"] == "press"
        assert command["key"] == "tab"
        command
      solution: |-
        command = {"type": "press", "key": "tab"}

        assert command["type"] == "press"
        assert command["key"] == "tab"
        command
      hints:
        - key 값은 짧은 영문 문자열 tab이다.
        - press 타입은 단일 키 입력을 의미한다.
      check:
        noError: 단일 키 명령 dict 구성이 끝나야 한다.
        resultCheck: command의 key가 "tab"이어야 한다.
    check:
      noError: dict 구성이 끝나야 한다.
      resultCheck: command의 type이 press이고 key가 enter여야 한다.
  - id: type-text
    title: 문자열 입력 명령
    structuredPrimary: true
    subtitle: type=text
    goal: 여러 글자를 한 번에 입력하는 명령을 type=text와 text 값으로 표현한다.
    why: 문자열 입력은 폼 자동화에서 가장 자주 쓰이는 명령이므로 표준 형태로 정리한다.
    explanation: text 명령은 type과 text 두 키를 가진다. text 값은 입력할 문자열이다. 자동화 실행기는 이 문자열을 한 글자씩 키보드로 보낸다. 한글도 입력 가능하지만 일부 환경에서는 IME 동작에 따라 결과가 달라질 수 있다.
    tips:
      - 한글 입력은 운영체제 IME 설정에 따라 달라질 수 있으므로 운영 환경에서 사전 검증한다.
      - 매우 긴 문자열은 짧은 단위로 나누어 입력하는 편이 안전하다.
    snippet: |-
      command = {"type": "text", "text": "codaro automation"}

      assert command["type"] == "text"
      assert command["text"] == "codaro automation"
      command
    exercise:
      prompt: '"Hello Codaro" 문자열을 입력하는 text 명령을 만들고 키 값이 정확한지 검증하세요.'
      starterCode: |-
        command = {"type": "text", "text": "___"}

        assert command["type"] == "text"
        assert command["text"] == "Hello Codaro"
        command
      solution: |-
        command = {"type": "text", "text": "Hello Codaro"}

        assert command["type"] == "text"
        assert command["text"] == "Hello Codaro"
        command
      hints:
        - text 값은 "Hello Codaro" 문자열이다.
        - 대소문자와 공백을 정확히 일치시킨다.
      check:
        noError: text 명령 dict 구성이 끝나야 한다.
        resultCheck: command의 text가 "Hello Codaro"여야 한다.
    check:
      noError: text 명령 dict 구성이 끝나야 한다.
      resultCheck: command의 text 값이 본문에서 지정한 문자열과 같아야 한다.
  - id: hotkey-combo
    title: 단축키 조합
    structuredPrimary: true
    subtitle: type=hotkey
    goal: ctrl+s 같은 단축키 조합을 keys 리스트로 표현한다.
    why: 자동화는 단축키를 자주 사용하므로 조합 표기를 명확히 합의해 둔다.
    explanation: hotkey 명령은 type 키와 keys 리스트를 가진다. keys 리스트의 순서는 동시에 누르는 키 목록이다. 자동화 실행기는 첫 키를 누른 채 다음 키들을 차례로 누른 뒤 모두 놓는다.
    tips:
      - 키 이름은 항상 소문자 영문 표준으로 둔다.
      - 단축키는 대상 앱마다 동작이 다를 수 있어 사전 검증이 중요하다.
    snippet: |-
      command = {"type": "hotkey", "keys": ["ctrl", "s"]}

      assert command["keys"] == ["ctrl", "s"]
      command
    exercise:
      prompt: ctrl+shift+t 단축키 조합을 만들고 keys 리스트가 정확히 세 키를 본문 순서대로 담는지 검증하세요.
      starterCode: |-
        command = {"type": "hotkey", "keys": ["ctrl", "___", "t"]}

        assert command["keys"] == ["ctrl", "shift", "t"]
        command
      solution: |-
        command = {"type": "hotkey", "keys": ["ctrl", "shift", "t"]}

        assert command["keys"] == ["ctrl", "shift", "t"]
        command
      hints:
        - 가운데 키 이름은 shift다.
        - 키 리스트 순서는 자동화 실행기가 그대로 따른다.
      check:
        noError: hotkey 명령 dict 구성이 끝나야 한다.
        resultCheck: keys 리스트가 세 키를 본문 순서대로 담아야 한다.
    check:
      noError: hotkey 명령 구성이 끝나야 한다.
      resultCheck: keys 리스트가 ctrl과 s 두 키를 정확히 담아야 한다.
  - id: keyboard-summary
    title: 종합 키보드 시퀀스
    structuredPrimary: true
    subtitle: 자동화 의도를 묶기
    goal: 단일 키, 문자열, 단축키를 한 시퀀스로 묶어 자동화 실행기 입력의 표준 형태를 완성한다.
    why: 종합 키보드 시퀀스는 운영자가 검토하기 쉽고 실행기가 단순한 입력 형태로 받아 실행이 안정적이다.
    explanation: 마지막 섹션은 위 세 명령을 한 시퀀스 리스트로 묶는다. 시퀀스는 자동화 실행기에 그대로 들어가는 입력이며 같은 형태를 두 번 사용해도 안전하다. types 리스트로 전체 흐름을 운영자가 한눈에 확인할 수 있다.
    tips:
      - 시퀀스 길이가 길어지면 단계별 주석이나 name 키를 더할 수 있다.
      - 종합 시퀀스는 자동화의 영속 형태로 JSON에 그대로 저장된다.
    snippet: |-
      sequence = [
          {"type": "text", "text": "주문 1234"},
          {"type": "press", "key": "tab"},
          {"type": "hotkey", "keys": ["ctrl", "s"]},
      ]
      types = [step["type"] for step in sequence]

      assert types == ["text", "press", "hotkey"]
      types
    exercise:
      prompt: 같은 형식으로 password 입력, enter 입력, ctrl+r 단축키를 한 종합 시퀀스로 만들고 types 리스트가 ["text", "press", "hotkey"]인지 검증하세요.
      starterCode: |-
        sequence = [
            {"type": "text", "text": "password"},
            {"type": "press", "key": "enter"},
            {"type": "hotkey", "keys": ["ctrl", "___"]},
        ]
        types = [step["type"] for step in sequence]

        assert types == ["text", "press", "hotkey"]
        types
      solution: |-
        sequence = [
            {"type": "text", "text": "password"},
            {"type": "press", "key": "enter"},
            {"type": "hotkey", "keys": ["ctrl", "r"]},
        ]
        types = [step["type"] for step in sequence]

        assert types == ["text", "press", "hotkey"]
        types
      hints:
        - 단축키 두 번째 키는 r이다.
        - 시퀀스 type 값은 각각 text, press, hotkey 순이다.
      check:
        noError: 종합 시퀀스 구성과 types 추출이 끝나야 한다.
        resultCheck: types 리스트가 ["text", "press", "hotkey"]여야 한다.
    check:
      noError: 종합 시퀀스 구성이 끝나야 한다.
      resultCheck: types 리스트가 ["text", "press", "hotkey"]로 종합 흐름을 보여야 한다.
