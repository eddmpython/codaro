meta:
  id: inputCtl_06
  title: 이미지 매치로 위치 찾기
  order: 6
  category: inputCtl
  difficulty: medium
  audience: GUI 자동화에 입문하는 Python 학습자
  packages:
    - pyautogui
    - pillow
  tags:
    - pyautogui
    - locate
    - automation
intro:
  direction: PIL로 합성 이미지를 만들고 pyautogui.locate로 부분 이미지를 찾아 GUI 자동화의 이미지 매치 흐름을 실제로 실행해 본다.
  benefits:
    - PIL.Image.new와 draw로 검색 대상 이미지를 합성한다.
    - 합성 이미지에서 needle 영역을 잘라 검색 대상으로 사용한다.
    - pyautogui.locate로 needle을 haystack에서 찾는다.
    - 종합 검색 함수가 매치 결과 Box를 dict로 보고한다.
  diagram:
    steps:
      - label: 합성 haystack 만들기
        detail: PIL.Image.new로 단색 캔버스에 표식을 그려 큰 이미지를 만든다.
      - label: needle 자르기
        detail: Image.crop으로 haystack에서 알려진 좌표의 작은 영역을 잘라낸다.
      - label: 매치 실행
        detail: pyautogui.locate(needle, haystack)을 호출해 Box namedtuple을 받는다.
      - label: 종합 검색 함수
        detail: 매치 결과의 좌표와 크기를 dict로 묶어 자동화 보고를 만든다.
    runtime:
      - label: pyautogui와 pillow 패키지 필요
        detail: meta.packages의 두 라이브러리가 로컬에 준비돼야 한다.
      - label: 메모리 안 매치
        detail: snippet은 파일 입출력 없이 PIL.Image 객체끼리 매치해 학습 결정성을 유지한다.
sections:
  - id: build-haystack
    title: 합성 haystack 만들기
    structuredPrimary: true
    subtitle: PIL.Image.new
    goal: PIL.Image.new와 ImageDraw로 단색 배경에 사각형 표식을 가진 haystack 이미지를 합성한다.
    why: 실제 자동화 학습에서는 외부 이미지 의존성을 피하면서도 매치 흐름을 검증할 수 있는 합성 이미지가 가장 안전한 입력이다.
    explanation: PIL.Image.new(mode, size, color)는 단색 이미지를 만든다. ImageDraw.Draw(image)로 그리기 객체를 얻고 rectangle으로 색이 다른 사각형을 그리면 매치 알고리즘이 식별할 수 있는 표식이 생긴다. 결과 이미지는 메모리에만 존재해 디스크를 어지럽히지 않는다.
    tips:
      - 표식은 배경과 충분히 대비되는 색으로 둬야 매치 정확도가 높다.
      - 합성 이미지 학습은 외부 스크린샷 없이도 매치 흐름을 검증한다.
    snippet: |-
      from PIL import Image, ImageDraw

      haystack = Image.new("RGB", (120, 80), "white")
      drawer = ImageDraw.Draw(haystack)
      drawer.rectangle((20, 20, 40, 40), fill="black")

      assert haystack.size == (120, 80)
      assert haystack.getpixel((30, 30)) == (0, 0, 0)
      haystack.size
    exercise:
      prompt: 200x150 흰색 캔버스에 (50, 50)-(70, 70) 검정 사각형을 그리고 (60, 60) 픽셀이 검정인지 검증하세요.
      starterCode: |-
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (200, 150), "white")
        drawer = ImageDraw.Draw(haystack)
        drawer.___((50, 50, 70, 70), fill="black")

        assert haystack.size == (200, 150)
        assert haystack.getpixel((60, 60)) == (0, 0, 0)
        haystack.size
      solution: |-
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (200, 150), "white")
        drawer = ImageDraw.Draw(haystack)
        drawer.rectangle((50, 50, 70, 70), fill="black")

        assert haystack.size == (200, 150)
        assert haystack.getpixel((60, 60)) == (0, 0, 0)
        haystack.size
      hints:
        - ImageDraw 메서드 이름은 rectangle이다.
        - 사각형 인자는 (left, top, right, bottom) 형식이다.
      check:
        noError: PIL 이미지 합성이 끝나야 한다.
        resultCheck: haystack의 (60, 60) 픽셀이 검정이어야 한다.
    check:
      noError: PIL 이미지 합성이 끝나야 한다.
      resultCheck: haystack의 (30, 30) 픽셀이 검정이고 크기가 (120, 80)이어야 한다.
  - id: crop-needle
    title: needle 자르기
    structuredPrimary: true
    subtitle: Image.crop()
    goal: 합성 haystack에서 표식을 포함한 작은 영역을 Image.crop으로 잘라 검색에 쓸 needle 이미지를 만든다.
    why: 검색 대상 needle은 haystack 안에 정확히 존재하는 이미지여야 매치가 보장된다.
    explanation: Image.crop((left, top, right, bottom))은 사각 영역을 잘라 새 Image를 돌려준다. 자른 needle 안에 표식이 포함되면 같은 haystack에서 다시 찾을 수 있다. 좌표는 픽셀 단위 정수다.
    tips:
      - crop의 인자는 (left, top, right, bottom) tuple이며 right, bottom이 결과 크기를 결정한다.
      - needle이 너무 크면 매치 시간이 늘어나므로 필요한 만큼만 자른다.
    snippet: |-
      from PIL import Image, ImageDraw

      haystack = Image.new("RGB", (120, 80), "white")
      ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
      needle = haystack.crop((18, 18, 42, 42))

      assert needle.size == (24, 24)
      assert needle.getpixel((12, 12)) == (0, 0, 0)
      needle.size
    exercise:
      prompt: 같은 패턴으로 (18, 18, 42, 42) 영역을 needle로 잘라 needle.size가 (24, 24)이고 중앙 픽셀이 검정인지 검증하세요.
      starterCode: |-
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
        needle = haystack.___((18, 18, 42, 42))

        assert needle.size == (24, 24)
        assert needle.getpixel((12, 12)) == (0, 0, 0)
        needle.size
      solution: |-
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
        needle = haystack.crop((18, 18, 42, 42))

        assert needle.size == (24, 24)
        assert needle.getpixel((12, 12)) == (0, 0, 0)
        needle.size
      hints:
        - PIL.Image 메서드 이름은 crop이다.
        - crop tuple의 right-left가 결과 너비다.
      check:
        noError: crop 호출이 끝나야 한다.
        resultCheck: needle.size가 (24, 24)이어야 한다.
    check:
      noError: crop 호출이 끝나야 한다.
      resultCheck: needle.size가 (24, 24)여야 한다.
  - id: locate-needle
    title: needle 찾기
    structuredPrimary: true
    subtitle: pyautogui.locate()
    goal: pyautogui.locate(needle, haystack)으로 needle을 haystack 안에서 찾고 Box의 좌표가 자른 위치와 일치하는지 확인한다.
    why: 자동화는 화면 안 특정 요소를 좌표로 잡아야 클릭이나 입력 위치를 정할 수 있어 이미지 매치가 핵심 도구다.
    explanation: pyautogui.locate(needle, haystack)는 Box(left, top, width, height) namedtuple을 돌려준다. 최신 pyautogui는 매치가 없으면 None 대신 pyautogui.ImageNotFoundException을 던지므로, 실패 가능성이 있으면 try/except로 감싼다. Box.left와 top은 needle을 찾은 좌표다. 합성 이미지처럼 정확한 매치가 보장되면 Box가 반드시 돌아온다.
    tips:
      - locate는 needle과 haystack 모두 PIL.Image 객체로 받을 수 있다.
      - 실제 자동화에서는 locateOnScreen이 화면에서 직접 찾는다.
    snippet: |-
      import pyautogui
      from PIL import Image, ImageDraw

      haystack = Image.new("RGB", (120, 80), "white")
      ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
      needle = haystack.crop((18, 18, 42, 42))
      box = pyautogui.locate(needle, haystack)

      assert box is not None
      assert (box.left, box.top) == (18, 18)
      (box.left, box.top, box.width, box.height)
    exercise:
      prompt: pyautogui.locate로 needle을 haystack에서 찾고 Box의 left, top이 (18, 18)인지 검증하세요.
      starterCode: |-
        import pyautogui
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
        needle = haystack.crop((18, 18, 42, 42))
        box = pyautogui.___(needle, haystack)

        assert box is not None
        assert (box.left, box.top) == (18, 18)
        (box.left, box.top)
      solution: |-
        import pyautogui
        from PIL import Image, ImageDraw

        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((20, 20, 40, 40), fill="black")
        needle = haystack.crop((18, 18, 42, 42))
        box = pyautogui.locate(needle, haystack)

        assert box is not None
        assert (box.left, box.top) == (18, 18)
        (box.left, box.top)
      hints:
        - 매치 함수 이름은 locate다.
        - Box 객체는 left, top, width, height 네 필드를 가진다.
      check:
        noError: locate 호출이 끝나야 한다.
        resultCheck: box의 left, top이 (18, 18)이어야 한다.
    check:
      noError: pyautogui.locate 호출이 끝나야 한다.
      resultCheck: box가 None이 아니고 좌표가 자른 위치와 같아야 한다.
  - id: locate-report
    title: 종합 매치 보고
    structuredPrimary: true
    subtitle: Box를 dict로
    goal: 매치 결과 Box를 dict로 변환해 found, left, top, width, height 키를 가진 자동화 보고를 만든다.
    why: 종합 매치 보고는 자동화가 어떤 좌표에서 요소를 찾았는지 운영자가 한눈에 검토하게 만들고 매치 실패도 명확히 드러낸다.
    explanation: locateOrReport 함수는 needle과 haystack을 받아 pyautogui.locate를 호출하고 결과 Box를 dict로 풀어 돌려준다. 매치가 없으면 pyautogui가 ImageNotFoundException을 던지므로 try/except로 잡아 box를 None으로 두고, found 키를 False로, 좌표 키들은 None으로 채워 호출 측이 단일 형태로 분기할 수 있다. 같은 함수는 매치 성공과 실패 모두 안전한 dict 구조를 보장한다.
    tips:
      - 보고 dict의 found 키는 자동화 분기의 표준 신호다.
      - 매치 실패 시 좌표 키를 None으로 두면 다음 단계 코드가 단순해진다.
    snippet: |-
      import pyautogui
      from PIL import Image, ImageDraw


      def locateOrReport(needle: Image.Image, haystack: Image.Image) -> dict:
          try:
              box = pyautogui.locate(needle, haystack)
          except pyautogui.ImageNotFoundException:
              box = None
          if box is None:
              return {"found": False, "left": None, "top": None, "width": None, "height": None}
          return {
              "found": True,
              "left": box.left,
              "top": box.top,
              "width": box.width,
              "height": box.height,
          }


      haystack = Image.new("RGB", (120, 80), "white")
      ImageDraw.Draw(haystack).rectangle((30, 30, 50, 50), fill="black")
      needle = haystack.crop((28, 28, 52, 52))
      missing = Image.new("RGB", (10, 10), "red")
      hit = locateOrReport(needle, haystack)
      miss = locateOrReport(missing, haystack)

      assert hit["found"] is True
      assert hit["left"] == 28 and hit["top"] == 28
      assert miss["found"] is False
      (hit["found"], miss["found"])
    exercise:
      prompt: locateOrReport에 needle과 haystack을 넘기면 found=True이고 left/top이 needle을 자른 좌표와 같은지 종합 검증하세요.
      starterCode: |-
        import pyautogui
        from PIL import Image, ImageDraw


        def locateOrReport(needle: Image.Image, haystack: Image.Image) -> dict:
            try:
                box = pyautogui.locate(needle, haystack)
            except pyautogui.ImageNotFoundException:
                box = None
            if box is None:
                return {"found": False, "left": None, "top": None, "width": None, "height": None}
            return {
                "found": True,
                "left": box.left,
                "top": box.top,
                "width": box.width,
                "height": box.height,
            }


        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((30, 30, 50, 50), fill="black")
        needle = haystack.crop((28, 28, 52, 52))
        hit = locateOrReport(needle, haystack)

        assert hit["___"] is True
        assert (hit["left"], hit["top"]) == (28, 28)
        hit
      solution: |-
        import pyautogui
        from PIL import Image, ImageDraw


        def locateOrReport(needle: Image.Image, haystack: Image.Image) -> dict:
            try:
                box = pyautogui.locate(needle, haystack)
            except pyautogui.ImageNotFoundException:
                box = None
            if box is None:
                return {"found": False, "left": None, "top": None, "width": None, "height": None}
            return {
                "found": True,
                "left": box.left,
                "top": box.top,
                "width": box.width,
                "height": box.height,
            }


        haystack = Image.new("RGB", (120, 80), "white")
        ImageDraw.Draw(haystack).rectangle((30, 30, 50, 50), fill="black")
        needle = haystack.crop((28, 28, 52, 52))
        hit = locateOrReport(needle, haystack)

        assert hit["found"] is True
        assert (hit["left"], hit["top"]) == (28, 28)
        hit
      hints:
        - dict 키 이름은 found다.
        - 잘라낸 좌표 (28, 28)이 매치 결과의 left, top과 같다.
      check:
        noError: locateOrReport 호출이 종합 결과를 돌려줘야 한다.
        resultCheck: hit의 found가 True이고 (left, top)이 (28, 28)이어야 한다.
    check:
      noError: locateOrReport 두 호출이 끝나야 한다.
      resultCheck: hit는 found True, miss는 found False여야 한다.
