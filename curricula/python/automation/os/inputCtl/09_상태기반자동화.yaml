meta:
  id: inputCtl_09
  title: 상태 기반 자동화 분기
  order: 9
  category: inputCtl
  difficulty: easy
  audience: GUI 자동화에 입문하는 Python 학습자
  packages: []
  tags:
    - state
    - branch
    - automation
intro:
  direction: 현재 상태 dict를 받아 다음 액션 시퀀스를 결정하는 결정 함수를 만들어 GUI 자동화의 분기 흐름을 학습한다.
  benefits:
    - 상태 dict를 입력으로 받는 결정 함수를 표준화한다.
    - if/elif로 상태에 따라 다른 시퀀스를 선택한다.
    - 알 수 없는 상태는 안전한 기본 분기로 처리한다.
    - 종합 결정 결과를 dict로 보고해 자동화 표준 입력을 만든다.
  diagram:
    steps:
      - label: 상태 dict 정의
        detail: status 키로 현재 화면 상태를 표현한다.
      - label: 분기 함수 작성
        detail: if/elif로 상태에 따라 다른 시퀀스를 돌려준다.
      - label: 기본 분기 처리
        detail: 알 수 없는 상태는 빈 시퀀스로 안전하게 처리한다.
      - label: 종합 결정 dict
        detail: 결정 결과를 status, action, sequence 키를 가진 dict로 묶는다.
    runtime:
      - label: 표준 라이브러리만
        detail: dict와 list 연산만 사용한다.
      - label: assert 기반 검증
        detail: 분기별 결과 시퀀스를 assert로 비교한다.
sections:
  - id: state-shape
    title: 상태 dict 정의
    structuredPrimary: true
    subtitle: status, payload 두 키
    goal: 현재 화면 상태를 status와 payload 두 키로 표현한다.
    why: 상태 표기를 통일하면 결정 함수가 같은 dict 형태를 신뢰하고 자동화 코드가 깨끗해진다.
    explanation: 상태 dict는 status에 짧은 영문 이름, payload에 부가 정보를 둔다. payload는 빈 dict일 수도 있다. 자동화 결정 함수는 status 값만 보고 분기한다.
    tips:
      - status 이름은 idle, ready, error 같은 짧은 영문이 표준이다.
      - payload는 후속 함수에 추가 정보를 전달하는 자유로운 영역이다.
    snippet: |-
      state = {"status": "ready", "payload": {"target": "orderForm"}}

      assert state["status"] == "ready"
      state
    exercise:
      prompt: 'status="error", payload={"message": "timeout"}인 상태 dict를 만들고 status가 error인지 검증하세요.'
      starterCode: |-
        state = {"status": "___", "payload": {"message": "timeout"}}

        assert state["status"] == "error"
        state
      solution: |-
        state = {"status": "error", "payload": {"message": "timeout"}}

        assert state["status"] == "error"
        state
      hints:
        - status 값은 짧은 영문 error다.
        - payload는 message 키를 가진 dict다.
      check:
        noError: 상태 dict 구성이 끝나야 한다.
        resultCheck: state의 status가 "error"여야 한다.
    check:
      noError: dict 구성이 끝나야 한다.
      resultCheck: state의 status가 "ready"여야 한다.
  - id: branch-function
    title: 분기 결정 함수
    structuredPrimary: true
    subtitle: if elif 분기
    goal: 상태에 따라 다른 액션 시퀀스를 돌려주는 결정 함수를 만든다.
    why: 자동화 결정 함수가 같은 시그니처로 여러 상태를 다루면 후속 단계가 단순해진다.
    explanation: decideAction 함수는 상태 dict를 받아 status에 따라 다른 시퀀스 리스트를 돌려준다. ready 상태는 폼 입력 시퀀스, error 상태는 재시도 시퀀스를 만든다. 함수의 결과는 자동화 실행기에 그대로 입력된다.
    tips:
      - elif는 자동화 결정 함수에서 가장 명확한 분기 도구다.
      - 각 분기는 빈 리스트라도 명시적으로 돌려주면 호출 측이 안전하다.
    snippet: |-
      def decideAction(state: dict) -> list:
          if state["status"] == "ready":
              return [{"type": "click"}, {"type": "text", "text": "ok"}]
          if state["status"] == "error":
              return [{"type": "press", "key": "esc"}]
          return []


      ready = decideAction({"status": "ready", "payload": {}})
      error = decideAction({"status": "error", "payload": {}})

      assert ready[0] == {"type": "click"}
      assert error[0] == {"type": "press", "key": "esc"}
      [len(ready), len(error)]
    exercise:
      prompt: decideAction을 status="ready" 상태로 호출하면 두 액션이 돌아오는지 검증하세요.
      starterCode: |-
        def decideAction(state: dict) -> list:
            if state["status"] == "ready":
                return [{"type": "click"}, {"type": "text", "text": "ok"}]
            if state["status"] == "error":
                return [{"type": "press", "key": "esc"}]
            return ___


        actions = decideAction({"status": "ready", "payload": {}})

        assert len(actions) == 2
        actions
      solution: |-
        def decideAction(state: dict) -> list:
            if state["status"] == "ready":
                return [{"type": "click"}, {"type": "text", "text": "ok"}]
            if state["status"] == "error":
                return [{"type": "press", "key": "esc"}]
            return []


        actions = decideAction({"status": "ready", "payload": {}})

        assert len(actions) == 2
        actions
      hints:
        - 기본 분기는 빈 리스트 []를 돌려준다.
        - ready 상태는 두 액션을 돌려준다.
      check:
        noError: decideAction 호출이 정상적으로 끝나야 한다.
        resultCheck: actions 길이가 2여야 한다.
    check:
      noError: decideAction 두 번 호출이 끝나야 한다.
      resultCheck: 두 결과의 첫 액션이 본문 기대값과 같아야 한다.
  - id: default-branch
    title: 알 수 없는 상태 기본 분기
    structuredPrimary: true
    subtitle: 안전한 빈 시퀀스
    goal: 알 수 없는 status는 빈 시퀀스를 돌려 자동화가 잘못된 동작을 하지 않게 한다.
    why: 새 상태가 등장했을 때 자동화 코드가 임의의 액션을 실행하지 않고 빈 시퀀스로 안전하게 정지해야 사고가 적다.
    explanation: 결정 함수는 if/elif로 알려진 상태를 처리한 뒤 마지막 return []으로 안전 분기를 둔다. 빈 시퀀스를 받은 호출 측은 운영자에게 알림을 보낼 수 있다. 자동화 정책으로 이 패턴이 표준이다.
    tips:
      - 빈 시퀀스는 다음 단계의 조용한 NOP을 의미한다.
      - 알 수 없는 상태가 자주 등장하면 분기를 보강한다.
    snippet: |-
      def decideAction(state: dict) -> list:
          if state["status"] == "ready":
              return [{"type": "click"}]
          return []


      unknown = decideAction({"status": "loading", "payload": {}})

      assert unknown == []
      unknown
    exercise:
      prompt: 같은 함수에 status="paused" 상태를 넘기면 빈 리스트가 돌아오는지 검증하세요.
      starterCode: |-
        def decideAction(state: dict) -> list:
            if state["status"] == "ready":
                return [{"type": "click"}]
            return ___


        unknown = decideAction({"status": "paused", "payload": {}})

        assert unknown == []
        unknown
      solution: |-
        def decideAction(state: dict) -> list:
            if state["status"] == "ready":
                return [{"type": "click"}]
            return []


        unknown = decideAction({"status": "paused", "payload": {}})

        assert unknown == []
        unknown
      hints:
        - 기본 분기는 빈 리스트 [] 를 그대로 돌려준다.
        - 정의되지 않은 상태도 안전한 NOP으로 처리된다.
      check:
        noError: decideAction 호출이 KeyError 없이 끝나야 한다.
        resultCheck: unknown이 빈 리스트여야 한다.
    check:
      noError: decideAction 호출이 끝나야 한다.
      resultCheck: unknown이 빈 리스트여야 한다.
  - id: decision-summary
    title: 종합 결정 보고
    structuredPrimary: true
    subtitle: status, action, sequence 묶기
    goal: 결정 함수의 입력 상태와 결과 시퀀스를 한 dict로 묶어 자동화 표준 결정 보고를 만든다.
    why: 종합 결정 보고는 운영자가 자동화 분기의 의도와 실제 결과를 한눈에 검토할 수 있게 만든다.
    explanation: decideReport 함수는 상태 dict를 받아 status, action 카테고리, sequence 결과를 dict로 돌려준다. action 키는 inputForm 또는 retry 같은 사람이 읽기 좋은 이름이다. 같은 입력은 같은 결정 결과를 만든다.
    tips:
      - 종합 보고는 자동화 화면에 한 줄로 표시되도록 짧게 둔다.
      - action 이름은 운영자가 의미를 즉시 알 수 있는 단어로 둔다.
    snippet: |-
      def decideReport(state: dict) -> dict:
          if state["status"] == "ready":
              return {"status": state["status"], "action": "inputForm", "sequence": [{"type": "click"}]}
          if state["status"] == "error":
              return {"status": state["status"], "action": "retry", "sequence": [{"type": "press", "key": "esc"}]}
          return {"status": state["status"], "action": "noop", "sequence": []}


      report = decideReport({"status": "ready", "payload": {}})

      assert report == {"status": "ready", "action": "inputForm", "sequence": [{"type": "click"}]}
      report
    exercise:
      prompt: decideReport를 status="error" 상태로 호출하면 action이 "retry"이고 sequence가 [press esc] 한 항목이 되는지 종합 검증하세요.
      starterCode: |-
        def decideReport(state: dict) -> dict:
            if state["status"] == "ready":
                return {"status": state["status"], "action": "inputForm", "sequence": [{"type": "click"}]}
            if state["status"] == "error":
                return {"status": state["status"], "action": "___", "sequence": [{"type": "press", "key": "esc"}]}
            return {"status": state["status"], "action": "noop", "sequence": []}


        report = decideReport({"status": "error", "payload": {}})

        assert report == {"status": "error", "action": "retry", "sequence": [{"type": "press", "key": "esc"}]}
        report
      solution: |-
        def decideReport(state: dict) -> dict:
            if state["status"] == "ready":
                return {"status": state["status"], "action": "inputForm", "sequence": [{"type": "click"}]}
            if state["status"] == "error":
                return {"status": state["status"], "action": "retry", "sequence": [{"type": "press", "key": "esc"}]}
            return {"status": state["status"], "action": "noop", "sequence": []}


        report = decideReport({"status": "error", "payload": {}})

        assert report == {"status": "error", "action": "retry", "sequence": [{"type": "press", "key": "esc"}]}
        report
      hints:
        - error 상태의 action 이름은 retry다.
        - 시퀀스는 press esc 한 항목을 가진다.
      check:
        noError: decideReport 호출이 종합 정리 흐름으로 끝나야 한다.
        resultCheck: report가 status, action, sequence 세 키를 본문 기대값으로 담아야 한다.
    check:
      noError: 종합 결정 보고 함수 호출이 끝나야 한다.
      resultCheck: report dict가 status, action, sequence 세 키를 정확히 담아야 한다.
