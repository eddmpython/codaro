meta:
  id: inputCtl_05
  title: 스크린샷 영역 정의
  order: 5
  category: inputCtl
  difficulty: easy
  audience: GUI 자동화에 입문하는 Python 학습자
  packages: []
  tags:
    - screenshot
    - region
    - automation
intro:
  direction: 스크린샷 영역을 사전 정의 dict로 정리하고 tempfile 안에 PNG 파일을 직접 만들어 영역 기반 저장 흐름을 학습한다.
  benefits:
    - region tuple과 영역 dict 표기를 자유롭게 변환한다.
    - 화면 한 영역을 PNG 파일로 저장하는 시나리오를 표현한다.
    - 같은 영역에 대해 여러 번 캡처해도 같은 파일 이름이 생성된다.
    - 종합 시나리오로 영역 캡처 자동화를 표준화한다.
  diagram:
    steps:
      - label: 영역 dict 정의
        detail: left, top, width, height 네 키로 영역을 표현한다.
      - label: region tuple 변환
        detail: 영역 dict를 (left, top, width, height) tuple로 바꾼다.
      - label: 가상 PNG 만들기
        detail: tempfile 안에 작은 PNG 바이트를 직접 저장해 캡처 결과를 흉내 낸다.
      - label: 종합 시나리오
        detail: 영역 정의와 저장 경로를 한 dict로 묶어 자동화 표준 입력을 만든다.
    runtime:
      - label: 표준 라이브러리만
        detail: tempfile, pathlib만 사용한다.
      - label: assert 기반 검증
        detail: region tuple과 저장 결과 파일 크기를 assert로 비교한다.
sections:
  - id: region-dict
    title: 영역 dict 정의
    structuredPrimary: true
    subtitle: 네 키 표기
    goal: 영역을 left, top, width, height 네 키로 정의해 자동화 시나리오 입력의 표준 형태를 만든다.
    why: 자동화 시나리오는 영역 표기를 통일해 호출자와 실행기 사이의 결합을 단순화해야 한다.
    explanation: 영역 dict는 단일 사각형을 표현한다. left와 top은 좌상단 좌표, width와 height는 크기다. 이 표기는 pyautogui screenshot의 region 인자와 호환된다.
    tips:
      - 영역 dict는 사람이 읽기 좋고 자동화 코드에서 쉽게 다룰 수 있다.
      - 키 이름은 영문 소문자로 통일해 직렬화 호환성을 유지한다.
    snippet: |-
      region = {"left": 100, "top": 50, "width": 300, "height": 200}

      assert region["width"] == 300
      assert region["height"] == 200
      region
    exercise:
      prompt: left=0, top=0, width=1920, height=1080 영역 dict를 만들고 두 크기 값이 정확한지 검증하세요.
      starterCode: |-
        region = {"left": 0, "top": 0, "width": ___, "height": 1080}

        assert region["width"] == 1920
        assert region["height"] == 1080
        region
      solution: |-
        region = {"left": 0, "top": 0, "width": 1920, "height": 1080}

        assert region["width"] == 1920
        assert region["height"] == 1080
        region
      hints:
        - width 값은 정수 1920이다.
        - 1920과 1080은 흔한 모니터 해상도 값이다.
      check:
        noError: dict 구성이 끝나야 한다.
        resultCheck: region의 width와 height가 본문 기대값과 같아야 한다.
    check:
      noError: 영역 dict 구성이 끝나야 한다.
      resultCheck: region의 width 300, height 200이 정확해야 한다.
  - id: to-tuple
    title: region tuple 변환
    structuredPrimary: true
    subtitle: pyautogui 호환 형식
    goal: 영역 dict를 (left, top, width, height) tuple로 바꿔 외부 API 호출에 사용한다.
    why: pyautogui 같은 외부 라이브러리는 region 인자를 tuple로 받으므로 두 표기 사이의 변환이 빈번하다.
    explanation: regionTuple 함수는 영역 dict를 받아 키 순서대로 정수 tuple을 만든다. 결과는 길이 4의 tuple이며 외부 API가 그대로 받는다. 같은 함수의 역방향 변환도 단순한 분해 할당으로 가능하다.
    tips:
      - tuple 순서는 항상 left, top, width, height다.
      - 함수가 단순할수록 호출 측에서 안심하고 사용할 수 있다.
    snippet: |-
      def regionTuple(rect: dict) -> tuple:
          return (rect["left"], rect["top"], rect["width"], rect["height"])


      packed = regionTuple({"left": 10, "top": 20, "width": 100, "height": 50})

      assert packed == (10, 20, 100, 50)
      packed
    exercise:
      prompt: left=5, top=15, width=300, height=200 영역을 tuple로 바꿔 (5, 15, 300, 200)이 나오는지 검증하세요.
      starterCode: |-
        def regionTuple(rect: dict) -> tuple:
            return (rect["left"], rect["top"], rect["width"], rect["___"])


        packed = regionTuple({"left": 5, "top": 15, "width": 300, "height": 200})

        assert packed == (5, 15, 300, 200)
        packed
      solution: |-
        def regionTuple(rect: dict) -> tuple:
            return (rect["left"], rect["top"], rect["width"], rect["height"])


        packed = regionTuple({"left": 5, "top": 15, "width": 300, "height": 200})

        assert packed == (5, 15, 300, 200)
        packed
      hints:
        - 마지막 키 이름은 height다.
        - tuple 순서는 left, top, width, height다.
      check:
        noError: regionTuple 함수 호출이 끝나야 한다.
        resultCheck: packed가 정확히 (5, 15, 300, 200)이어야 한다.
    check:
      noError: 변환 함수 호출이 끝나야 한다.
      resultCheck: packed가 (10, 20, 100, 50)이어야 한다.
  - id: save-stub
    title: 가상 PNG 저장
    structuredPrimary: true
    subtitle: tempfile 안 작은 파일
    goal: 임시 폴더 안에 작은 PNG 바이트를 직접 저장해 실제 캡처 없이도 저장 흐름을 학습한다.
    why: 실제 스크린샷 없이도 저장 경로와 파일 크기를 직접 검증할 수 있어야 자동화 시나리오를 학습할 수 있다.
    explanation: 8바이트 PNG signature와 짧은 가짜 데이터를 write_bytes로 저장하면 실제 캡처 라이브러리가 없는 환경에서도 흐름을 검증할 수 있다. tempfile 컨텍스트가 끝나면 자동으로 정리된다.
    tips:
      - PNG 시그니처는 b"\x89PNG\r\n\x1a\n"으로 표준화되어 있다.
      - 실제 자동화에서는 pyautogui.screenshot이 같은 경로에 저장한다.
    snippet: |-
      import tempfile
      from pathlib import Path

      with tempfile.TemporaryDirectory() as td:
          target = Path(td) / "snap.png"
          target.write_bytes(b"\x89PNG\r\n\x1a\nfake")
          size = target.stat().st_size

      assert size > 0
      size
    exercise:
      prompt: 같은 폴더에 region_capture.png를 만들어 파일 크기가 양수이고 PNG 시그니처가 포함되는지 검증하세요.
      starterCode: |-
        import tempfile
        from pathlib import Path

        with tempfile.TemporaryDirectory() as td:
            target = Path(td) / "region_capture.png"
            target.write_bytes(b"\x89PNG\r\n\x1a\nstub")
            data = target.read_bytes()
            size = target.stat().___

        assert size > 0
        assert data.startswith(b"\x89PNG")
        size
      solution: |-
        import tempfile
        from pathlib import Path

        with tempfile.TemporaryDirectory() as td:
            target = Path(td) / "region_capture.png"
            target.write_bytes(b"\x89PNG\r\n\x1a\nstub")
            data = target.read_bytes()
            size = target.stat().st_size

        assert size > 0
        assert data.startswith(b"\x89PNG")
        size
      hints:
        - stat 객체의 크기 속성 이름은 st_size다.
        - PNG 파일은 \x89PNG로 시작한다.
      check:
        noError: write_bytes와 stat 호출이 정상적으로 끝나야 한다.
        resultCheck: size가 0 초과이고 PNG 시그니처가 포함되어야 한다.
    check:
      noError: 임시 PNG 작성과 stat 조회가 끝나야 한다.
      resultCheck: size 변수가 0 초과여야 한다.
  - id: scenario-summary
    title: 종합 영역 시나리오
    structuredPrimary: true
    subtitle: 영역과 경로를 묶기
    goal: 영역 dict와 저장 경로를 한 dict로 묶어 자동화 실행기의 표준 입력을 만든다.
    why: 종합 자동화 시나리오는 사람이 한눈에 검토할 수 있어야 GUI 작업에서 사고를 줄일 수 있다.
    explanation: regionPlan 함수는 영역 dict와 파일 이름을 받아 region tuple, savePath, generatedAt을 묶어 dict로 돌려준다. 결과 dict는 자동화 실행기에 그대로 들어가는 표준 입력 형태다. 같은 함수는 두 번 호출해도 같은 dict 구조를 유지한다.
    tips:
      - savePath는 tempfile.TemporaryDirectory가 만든 절대 경로를 그대로 사용한다.
      - 종합 함수의 dict는 자동화 보고서의 한 행으로 그대로 들어간다.
    snippet: |-
      import tempfile
      from datetime import UTC, datetime
      from pathlib import Path


      def regionPlan(rect: dict, filename: str, base: Path) -> dict:
          return {
              "region": (rect["left"], rect["top"], rect["width"], rect["height"]),
              "savePath": str(base / filename),
              "generatedAt": datetime.now(UTC).isoformat(timespec="seconds"),
          }


      with tempfile.TemporaryDirectory() as td:
          plan = regionPlan({"left": 0, "top": 0, "width": 200, "height": 150}, "snap.png", Path(td))

      assert plan["region"] == (0, 0, 200, 150)
      assert plan["savePath"].endswith("snap.png")
      assert "generatedAt" in plan
      plan["region"]
    exercise:
      prompt: regionPlan에 left=10, top=20, width=300, height=400 영역과 capture.png 이름을 넘기면 region tuple과 savePath가 정확히 본문 기대값을 담는지 종합 검증하세요.
      starterCode: |-
        import tempfile
        from datetime import UTC, datetime
        from pathlib import Path


        def regionPlan(rect: dict, filename: str, base: Path) -> dict:
            return {
                "region": (rect["left"], rect["top"], rect["width"], rect["height"]),
                "savePath": str(base / filename),
                "generatedAt": datetime.now(UTC).isoformat(timespec="seconds"),
            }


        with tempfile.TemporaryDirectory() as td:
            plan = regionPlan({"left": 10, "top": 20, "width": 300, "height": 400}, "___", Path(td))

        assert plan["region"] == (10, 20, 300, 400)
        assert plan["savePath"].endswith("capture.png")
        assert "generatedAt" in plan
        plan["region"]
      solution: |-
        import tempfile
        from datetime import UTC, datetime
        from pathlib import Path


        def regionPlan(rect: dict, filename: str, base: Path) -> dict:
            return {
                "region": (rect["left"], rect["top"], rect["width"], rect["height"]),
                "savePath": str(base / filename),
                "generatedAt": datetime.now(UTC).isoformat(timespec="seconds"),
            }


        with tempfile.TemporaryDirectory() as td:
            plan = regionPlan({"left": 10, "top": 20, "width": 300, "height": 400}, "capture.png", Path(td))

        assert plan["region"] == (10, 20, 300, 400)
        assert plan["savePath"].endswith("capture.png")
        assert "generatedAt" in plan
        plan["region"]
      hints:
        - 파일 이름은 capture.png다.
        - region tuple은 (10, 20, 300, 400)이 된다.
      check:
        noError: regionPlan 호출이 종합 결과를 만들어야 한다.
        resultCheck: plan의 region이 본문 기대값이고 savePath가 capture.png로 끝나야 한다.
    check:
      noError: 종합 시나리오 함수 호출이 끝나야 한다.
      resultCheck: plan의 region이 (0, 0, 200, 150)이고 savePath가 snap.png로 끝나야 한다.
