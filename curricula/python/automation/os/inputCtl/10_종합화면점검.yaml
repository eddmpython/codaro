        - reportPath는 reports/last.json 형태로 끝난다.
        - error 상태의 sequence는 [press esc] 한 항목이다.
      check:
        noError: runMacro 호출이 종합 사이클로 끝나야 한다.
        resultCheck: report의 sequence가 [press esc]이고 reportPath가 last.json으로 끝나야 한다.
    check:
      noError: 종합 매크로 사이클이 격리 공간에서 끝나야 한다.
