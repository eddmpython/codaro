      hints:
        - "dict {'who': '박과장', 'what': 'QA', 'due': '2026-05-31'}."
    check:
      noError: "리스트 원소는 dict."
      resultCheck: "출력 3."

  - id: validation
    title: "3단계. 검증 - 회의록 통합 검증"
    structuredPrimary: true
    subtitle: "단락 + 표 + 머리말 일괄 assert"
    goal: "buildMinutes 결과의 모든 요소를 한 셀에서 검증."
    snippet: |-
      from pathlib import Path
