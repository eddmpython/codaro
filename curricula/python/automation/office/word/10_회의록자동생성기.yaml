          "title": "주간 동기화",
          "date": "2026-05-28",
          "location": "회의실 A",
          "attendees": [{"name": "김대리", "role": "기획"}, {"name": "박과장", "role": "개발"}],
          "decisions": ["신기능 5월 31일 출시", "마케팅 6월 1일"],
