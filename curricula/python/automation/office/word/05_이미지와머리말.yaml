meta:
  id: word_05
  title: 이미지와 머리말
  order: 5
  category: word
  difficulty: ⭐⭐
  badge: 기초
  packages:
    - python-docx
    - docx
    - pillow
  tags:
    - add_picture
    - sections
    - header
    - footer
  outcomes:
    - automation.word.media
  prerequisites:
    - automation.word.paragraphs
  estimatedMinutes: 45
  seo:
    title: "Word 이미지와 머리말 — add_picture, sections.header/footer"
    description: "회사 로고와 페이지 머리말·꼬리말을 코드로 적용. 한국 공문서 양식의 핵심."
