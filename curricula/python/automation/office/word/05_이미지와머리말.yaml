  estimatedMinutes: 45
  seo:
    title: "Word 이미지와 머리말 - add_picture, sections.header/footer"
    description: "회사 로고와 페이지 머리말·꼬리말을 코드로 적용. 한국 공문서 양식의 핵심."
    keywords:
      - python-docx add_picture
