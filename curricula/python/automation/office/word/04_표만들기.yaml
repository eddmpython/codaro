    steps:
      - label: "1. add_table"
        detail: "doc.add_table(rows, cols, style)로 빈 표 생성."
      - label: "2. cell 채우기"
        detail: "table.cell(i, j).text = value 또는 cell의 paragraphs[0].add_run."
      - label: "3. merge_cells"
        detail: "cell1.merge(cell2)로 셀 병합."
    runtime:
      - label: "표준 스타일"
