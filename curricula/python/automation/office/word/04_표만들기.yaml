intro:
  direction: "보고서·계약서에 들어가는 비교표를 코드로 만든다. 셀 병합과 헤더 강조까지."
  benefits:
    - "직원 명단·결재라인·견적 항목 표 자동 생성 - 30분 손작업이 5초."
    - "table.cell(i, j).text 패턴으로 모든 셀 데이터를 깔끔히 채움."
    - "10강 회의록의 참석자·결정사항 표 패턴이 본 강의에서 정착."
