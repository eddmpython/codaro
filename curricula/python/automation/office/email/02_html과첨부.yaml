        from email.message import EmailMessage
        from reportlab.pdfgen.canvas import Canvas

        def buildEmailWithAttachment(toAddr, subject, htmlBody, pdfPath, filename, csvPath=None, csvFilename=None):
            msg = EmailMessage()
