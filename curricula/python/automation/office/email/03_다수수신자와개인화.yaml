meta:
  id: email_03
  title: 다수 수신자와 개인화
  order: 3
  category: email
  difficulty: ⭐⭐
  badge: 기초
  packages: []
  tags:
    - To
    - CC
    - BCC
    - Template
    - mail merge
  outcomes:
    - automation.email.bulk
  prerequisites:
    - automation.email.send
  estimatedMinutes: 50
  seo:
    title: "다수 수신자와 개인화 - CSV → 100명 안내 메일"
    description: "string.Template로 본문을 치환해 CSV 명단에서 100명에게 개인화 메일을 일괄 발송. dryRun으로 안전 검증."
    keywords:
      - 메일 mail merge
