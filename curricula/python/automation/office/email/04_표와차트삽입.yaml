meta:
  id: email_04
  title: 표와 차트가 들어간 일일 메일
  order: 4
  category: email
  difficulty: ⭐⭐
  badge: 기초
  packages:
    - pandas
    - matplotlib
  tags:
    - DataFrame.to_html
    - Content-ID
    - inline image
  outcomes:
    - automation.email.attachments
  prerequisites:
    - automation.email.attachments
  estimatedMinutes: 50
  seo:
    title: "표와 차트가 들어간 일일 메일 — DataFrame.to_html + 인라인 이미지"
    description: "운영팀 일일 보고 메일을 DataFrame.to_html 표 + matplotlib png 인라인 이미지로 자동화. 100분/주 작업이 10초로 줄어든다."
