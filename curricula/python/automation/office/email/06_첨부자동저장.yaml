meta:
  id: email_06
  title: 첨부 자동 저장
  order: 6
  category: email
  difficulty: ⭐⭐⭐
  badge: 중급
  packages:
    - reportlab
  tags:
    - email.parser
    - BytesParser
    - walk
    - 첨부 저장
  outcomes:
    - automation.email.classify
  prerequisites:
    - automation.email.receive
  estimatedMinutes: 50
  seo:
    title: "메일 첨부 자동 저장 — BytesParser + walk + disposition"
    description: "받은 메일의 첨부 파일을 자동으로 폴더에 분류 저장한다. 사장님의 매주 150분 첨부 정리가 8초로."
