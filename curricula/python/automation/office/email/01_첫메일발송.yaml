  title: 첫 메일 발송
  order: 1
  category: email
  difficulty: ⭐
  badge: 입문
  packages: []
  tags:
    - smtplib
    - EmailMessage
    - dryRun
  outcomes:
    - automation.email.send
  prerequisites:
    - automation.email.intro
  estimatedMinutes: 40
  seo:
    title: "smtplib 첫 메일 발송 — EmailMessage + dryRun 안전 패턴"
    description: "smtplib.SMTP_SSL과 EmailMessage로 자기 자신에게 메일을 보낸다. dryRun 안전 패턴으로 학습 중 오발송 차단."
    keywords:
