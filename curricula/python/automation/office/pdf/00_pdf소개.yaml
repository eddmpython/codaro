    description: "받은 PDF에서 텍스트·표를 뽑고, 새 PDF로 만들고, 묶고·자르고·잠그는 흐름을 로컬 Python으로 완결한다. 10개 프로젝트 학습 흐름과 한글 폰트 정책을 정리한다."
