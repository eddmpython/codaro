sections:
  - id: step1_make_table_pdf
    title: "1단계. 표가 들어간 PDF 만들기"
    structuredPrimary: true
    subtitle: "reportlab Platypus Table"
    goal: "선이 있는 3×4 표가 들어간 한 페이지 PDF를 만든다."
    why: "표 추출을 실험하려면 표가 있는 PDF가 먼저 필요합니다. 외부 다운로드 의존을 없애기 위해 reportlab으로 즉석 생성합니다."
    explanation: |-
      Platypus의 Table은 list-of-lists를 받아 표를 그립니다. TableStyle로 선과 헤더 굵기를 지정합니다. SimpleDocTemplate.build로 표가 들어간 PDF를 한 번에 저장합니다.
    tips:
      - "Platypus Table은 콘텐츠 분량이 페이지를 넘으면 자동으로 다음 페이지로 잘립니다. 본 강의는 한 페이지 안에 들어가게 작게 만듭니다."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from reportlab.lib import colors
      from reportlab.lib.pagesizes import A4
      from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

      def buildTablePdf(path):
          rows = [
              ["region", "q1", "q2", "q3"],
              ["Seoul", "120", "135", "150"],
              ["Busan", "80", "78", "92"],
              ["Daegu", "60", "65", "70"],
          ]
          doc = SimpleDocTemplate(str(path), pagesize=A4)
          tbl = Table(rows)
          tbl.setStyle(TableStyle([
              ("GRID", (0, 0), (-1, -1), 0.5, colors.black),
              ("FONTNAME", (0, 0), (-1, 0), "Helvetica-Bold"),
          ]))
          doc.build([tbl])

      workdir = TemporaryDirectory()
      pdfPath = Path(workdir.name) / "table.pdf"
      buildTablePdf(pdfPath)
      pdfPath.stat().st_size > 0
    exercise:
      prompt: "표 행을 5개로 늘리고(Incheon, Daejeon 추가) PDF 크기가 양수인지 확인하세요."
      starterCode: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        from reportlab.lib import colors
        from reportlab.lib.pagesizes import A4
        from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

        def buildTablePdf(path):
            rows = [
                ["region", "q1", "q2", "q3"],
                ["Seoul", "120", "135", "150"],
                ["Busan", "80", "78", "92"],
                ["Daegu", "60", "65", "70"],
                [___, "55", "60", "62"],
                [___, "50", "52", "58"],
            ]
            doc = SimpleDocTemplate(str(path), pagesize=A4)
            tbl = Table(rows)
            tbl.setStyle(TableStyle([
                ("GRID", (0, 0), (-1, -1), 0.5, colors.black),
            ]))
            doc.build([tbl])

        workdir = TemporaryDirectory()
        pdfPath = Path(workdir.name) / "t.pdf"
        buildTablePdf(pdfPath)
        pdfPath.stat().st_size > 0
      hints:
        - "도시 이름 문자열 두 개 추가."
    check:
      noError: "리스트 행 길이가 모두 같아야 합니다."
      resultCheck: "True 출력."

  - id: step2_extract_basic
    title: "2단계. extract_tables 기본"
    structuredPrimary: true
    subtitle: "pdfplumber.open + page.extract_tables()"
    goal: "1단계의 표 PDF를 추출해 리스트 of 리스트로 확인한다."
    why: "추출 결과의 구조를 먼저 봐야 후처리 전략이 보입니다. raw 결과가 어떤 모양인지 손에 익히는 게 본 단계의 목적입니다."
    explanation: |-
      pdfplumber.open(path)를 with로 열고 page.extract_tables()를 호출하면 [[row, row, ...]] 형태의 리스트 of 리스트가 나옵니다. 단일 표 PDF는 첫 원소를 쓰면 됩니다.
    tips:
      - "extract_tables 결과는 모두 문자열입니다. 숫자 변환은 후처리 단계에서 따로 해야 합니다."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pdfplumber
      from reportlab.lib import colors
      from reportlab.lib.pagesizes import A4
      from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

      def buildTablePdf(path):
          rows = [
              ["region", "q1", "q2", "q3"],
              ["Seoul", "120", "135", "150"],
              ["Busan", "80", "78", "92"],
          ]
          doc = SimpleDocTemplate(str(path), pagesize=A4)
          tbl = Table(rows)
          tbl.setStyle(TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)]))
          doc.build([tbl])

      workdir = TemporaryDirectory()
      pdfPath = Path(workdir.name) / "t.pdf"
      buildTablePdf(pdfPath)

      with pdfplumber.open(pdfPath) as doc:
          tables = doc.pages[0].extract_tables()
      len(tables), len(tables[0]), len(tables[0][0])
    exercise:
      prompt: "extract_tables의 첫 표에서 두 번째 행의 첫 컬럼이 'Seoul'인지 확인하세요."
      starterCode: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        import pdfplumber
        from reportlab.lib import colors
        from reportlab.lib.pagesizes import A4
        from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

        def buildTablePdf(path):
            rows = [
                ["region", "q1", "q2", "q3"],
                ["Seoul", "120", "135", "150"],
                ["Busan", "80", "78", "92"],
            ]
            doc = SimpleDocTemplate(str(path), pagesize=A4)
            tbl = Table(rows)
            tbl.setStyle(TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)]))
            doc.build([tbl])

        workdir = TemporaryDirectory()
        pdfPath = Path(workdir.name) / "t.pdf"
        buildTablePdf(pdfPath)

        with pdfplumber.open(pdfPath) as doc:
