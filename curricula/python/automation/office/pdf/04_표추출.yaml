        tables[0][___][___] == "Seoul"
      hints:
        - "두 번째 행은 index 1, 첫 컬럼은 index 0."
    check:
      noError: "with 블록 안에서 결과를 변수에 저장한 후 밖에서 사용해야 합니다."
      resultCheck: "True 출력."

  - id: step3_to_dataframe
    title: "3단계. DataFrame과 CSV"
    structuredPrimary: true
    subtitle: "pandas.DataFrame + to_csv"
    goal: "추출한 표를 pandas DataFrame으로 만들고 CSV로 저장한 뒤 다시 읽어 확인한다."
    why: "추출의 진짜 가치는 DataFrame이나 CSV로 다른 도구로 넘기는 데 있습니다. pandas로 변환되는 순간 분석·시각화·openpyxl로 연결됩니다."
    explanation: |-
      tables[0]의 첫 행을 컬럼명으로, 나머지를 데이터로 사용해 DataFrame을 만듭니다. to_csv로 임시 폴더에 저장하고 pd.read_csv로 다시 읽어 행 수가 보존되는지 확인합니다.
    tips:
      - "to_csv에 index=False를 주지 않으면 자동 인덱스가 컬럼으로 들어갑니다. 표 데이터는 보통 index=False가 안전합니다."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pandas as pd
      import pdfplumber
      from reportlab.lib import colors
      from reportlab.lib.pagesizes import A4
      from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

      def buildTablePdf(path):
          rows = [
              ["region", "q1", "q2", "q3"],
              ["Seoul", "120", "135", "150"],
              ["Busan", "80", "78", "92"],
              ["Daegu", "60", "65", "70"],
          ]
          doc = SimpleDocTemplate(str(path), pagesize=A4)
          tbl = Table(rows)
          tbl.setStyle(TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)]))
          doc.build([tbl])

      workdir = TemporaryDirectory()
      base = Path(workdir.name)
      pdfPath = base / "t.pdf"
      csvPath = base / "t.csv"
      buildTablePdf(pdfPath)

      with pdfplumber.open(pdfPath) as doc:
          rawTable = doc.pages[0].extract_tables()[0]
      df = pd.DataFrame(rawTable[1:], columns=rawTable[0])
      df.to_csv(csvPath, index=False)
      reloaded = pd.read_csv(csvPath)
      df.shape, reloaded.shape
    exercise:
      prompt: "df의 'q1' 컬럼을 정수로 변환한 뒤 합계를 확인하세요."
      starterCode: |-
