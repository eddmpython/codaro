  - id: step4_tuning_limits
    title: "4단계. 튜닝과 한계"
    structuredPrimary: true
    subtitle: "table_settings로 선 없는 표 처리"
    goal: "선이 없는 표는 vertical_strategy='text'로, 병합 셀은 후처리로 다룬다."
    why: "한국 정부 PDF의 표 대부분은 선 없는 텍스트 정렬 기반입니다. 기본 옵션으로는 잡히지 않고 table_settings 튜닝이 필요합니다."
    explanation: |-
      pdfplumber.Page.extract_tables(table_settings={'vertical_strategy': 'text', 'horizontal_strategy': 'text'})는 선이 아니라 텍스트 위치를 기준으로 표를 잡습니다. 완벽하지 않지만 선이 없는 PDF에 첫 시도로 적합합니다. 결과가 어긋날 때는 손이 더 빠른 케이스도 인정합니다.
    tips:
      - "튜닝 옵션이 무력한 PDF도 있습니다. 그런 경우 PDF를 텍스트로 추출한 뒤 정규식으로 표 형태를 복원하는 게 더 빠를 수 있습니다."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pdfplumber
      from reportlab.pdfgen.canvas import Canvas

      def buildTextTablePdf(path):
          canvas = Canvas(str(path))
          canvas.setFont("Helvetica", 11)
          rows = [
              ["region", "q1", "q2", "q3"],
              ["Seoul", "120", "135", "150"],
              ["Busan", "80", "78", "92"],
          ]
          yPos = 750
          for row in rows:
              for colIdx, value in enumerate(row):
                  canvas.drawString(72 + colIdx * 80, yPos, value)
              yPos -= 20
          canvas.showPage()
          canvas.save()

      workdir = TemporaryDirectory()
      pdfPath = Path(workdir.name) / "txt_table.pdf"
      buildTextTablePdf(pdfPath)

      with pdfplumber.open(pdfPath) as doc:
          textTables = doc.pages[0].extract_tables(table_settings={
              "vertical_strategy": "text",
              "horizontal_strategy": "text",
          })
      textTables[0][0] if textTables else None
    exercise:
      prompt: "위 함수의 strategy 두 값을 모두 'text'로 두고 첫 표의 첫 행이 빈 리스트가 아닌지 확인하세요."
      starterCode: |-
