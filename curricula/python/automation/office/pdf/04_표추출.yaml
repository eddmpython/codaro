      hints:
        - "두 값 모두 'text' 문자열."
    check:
      noError: "strategy 값은 문자열."
      resultCheck: "True 출력."

  - id: validation
    title: "5단계. 검증 루프 — 추출 → DataFrame → CSV 왕복"
    structuredPrimary: true
    subtitle: "shape·합계·CSV 재오픈 통합 assert"
    goal: "추출 → DataFrame → CSV 저장 → 재오픈까지 한 셀에서 자동 검증한다."
    why: "표 추출은 round-trip 검증이 핵심입니다. 추출만 되면 사람이 일일이 비교해야 하지만, CSV 재오픈까지 자동으로 비교하면 회귀가 사전에 잡힙니다."
    explanation: |-
      df.shape, 합계, CSV 재오픈 결과까지 모두 assert로 묶습니다. 이 패턴이 10강 청구서 생성기의 데이터 검증 골격이 됩니다.
    tips:
      - "CSV는 dtype 정보가 사라집니다. 재오픈 후 합계 비교는 직접 astype으로 강제하세요."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pandas as pd
      import pdfplumber
      from reportlab.lib import colors
      from reportlab.lib.pagesizes import A4
      from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

      def buildAndExtract(path, csvPath):
          rows = [
              ["region", "q1", "q2", "q3"],
              ["Seoul", "120", "135", "150"],
              ["Busan", "80", "78", "92"],
              ["Daegu", "60", "65", "70"],
          ]
          doc = SimpleDocTemplate(str(path), pagesize=A4)
          tbl = Table(rows)
          tbl.setStyle(TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)]))
          doc.build([tbl])
          with pdfplumber.open(path) as document:
              raw = document.pages[0].extract_tables()[0]
          df = pd.DataFrame(raw[1:], columns=raw[0])
          df.to_csv(csvPath, index=False)
          return df

      vault = TemporaryDirectory()
      base = Path(vault.name)
      pdfPath = base / "vault.pdf"
      csvPath = base / "vault.csv"
      df = buildAndExtract(pdfPath, csvPath)

      assert df.shape == (3, 4)
      reloaded = pd.read_csv(csvPath)
      assert reloaded.shape == df.shape
      assert reloaded["q1"].astype(int).sum() == 260
      df.shape, reloaded.shape
    exercise:
      prompt: "행을 한 개 추가(Incheon 55/60/62)하고 shape와 q1 합계 검증을 그대로 통과시키세요."
      starterCode: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        import pandas as pd
        import pdfplumber
        from reportlab.lib import colors
        from reportlab.lib.pagesizes import A4
        from reportlab.platypus import SimpleDocTemplate, Table, TableStyle

        def buildAndExtract(path, csvPath):
            rows = [
                ["region", "q1", "q2", "q3"],
                ["Seoul", "120", "135", "150"],
                ["Busan", "80", "78", "92"],
                ["Daegu", "60", "65", "70"],
                [___, ___, ___, ___],
            ]
            doc = SimpleDocTemplate(str(path), pagesize=A4)
            tbl = Table(rows)
            tbl.setStyle(TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)]))
            doc.build([tbl])
            with pdfplumber.open(path) as document:
                raw = document.pages[0].extract_tables()[0]
            df = pd.DataFrame(raw[1:], columns=raw[0])
            df.to_csv(csvPath, index=False)
            return df

        vault = TemporaryDirectory()
        base = Path(vault.name)
        pdfPath = base / "v.pdf"
        csvPath = base / "v.csv"
        df = buildAndExtract(pdfPath, csvPath)
