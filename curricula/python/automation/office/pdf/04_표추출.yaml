        assert df["q1"].astype(int).sum() == 315
        df.shape
      hints:
        - "Incheon의 q1은 55."
    check:
      noError: "행 길이가 헤더와 같아야 합니다."
      resultCheck: "출력이 (4, 4)이어야 합니다."

  - id: misconception
    title: "6단계. 흔한 오개념 차단"
    subtitle: "extract_tables는 모든 표를 잡는다?"
    goal: "선이 없거나 셀이 병합된 표에서 결과가 어긋날 수 있다는 점을 인지한다."
    why: "한국 공공기관 PDF의 표는 선 없거나 헤더가 세로 병합된 경우가 많습니다. 결과가 어긋나면 자동화의 신뢰가 깨집니다."
    explanation: |-
      세로 병합 셀의 경우 첫 행에만 값이 들어가고 이어지는 행은 빈 문자열이 됩니다. 후처리로 ffill (forward fill)을 적용하면 일반 표 형태로 정규화할 수 있습니다. 손이 더 빠른 경우도 인정하고, 단순 일회성 작업은 손으로 가는 것도 자동화의 한 선택입니다.
    tips:
      - "df.fillna(method='ffill')는 deprecation 됐고 df.ffill()를 권장합니다."
    snippet: |-
      import pandas as pd

      raw = [
          ["region", "metric", "value"],
          ["Seoul", "q1", "120"],
          ["",       "q2", "135"],
          ["Busan",  "q1", "80"],
          ["",       "q2", "78"],
      ]
      df = pd.DataFrame(raw[1:], columns=raw[0])
      df["region"] = df["region"].replace("", pd.NA).ffill()
      df
    exercise:
      prompt: "Daegu 행 두 개를 더해(q1 60, q2 65) ffill 후 빈 region이 없는지 확인하세요."
      starterCode: |-
        import pandas as pd

        raw = [
            ["region", "metric", "value"],
            ["Seoul", "q1", "120"],
            ["",       "q2", "135"],
            ["Busan",  "q1", "80"],
            ["",       "q2", "78"],
            ["Daegu",  "q1", ___],
            ["",       "q2", ___],
        ]
        df = pd.DataFrame(raw[1:], columns=raw[0])
        df["region"] = df["region"].replace("", pd.NA).ffill()
        df["region"].isna().sum() == 0
      hints:
        - "숫자 문자열 두 개. 예: '60', '65'."
    check:
      noError: "리스트 원소는 문자열."
      resultCheck: "True 출력."

  - id: practice
    title: "실습 — 종합 미션 2개"
    subtitle: "표 PDF → CSV 도구"
    goal: "표 추출과 후처리 패턴을 결합한 실용 함수 두 개를 작성한다."
    why: "표 추출은 데이터 분석의 시작 지점입니다. 손으로 옮기지 않게 만드는 게 모든 후속 작업의 시간을 줄입니다."
    explanation: |-
      미션1은 여러 표가 포함된 PDF에서 모든 표를 추출해 DataFrame 리스트로 돌려주는 함수, 미션2는 한 PDF의 모든 표를 한 CSV에 누적해 저장하는 함수입니다.
    tips:
      - "미션 변수 prefix: multi*(미션1), agg*(미션2)."
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import pandas as pd
      import pdfplumber
    exercise:
      prompt: "두 미션을 직접 작성한 뒤 expansion 정답과 비교하세요."
      starterCode: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        import pandas as pd
        import pdfplumber

        ___
      hints:
        - "미션1: extractAllAsFrames(path) -> list[DataFrame]"
        - "미션2: extractToOneCsv(path, csvPath) -> DataFrame"
    check:
      noError: "함수가 정의되고 호출되어야 합니다."
      resultCheck: "미션1은 list, 미션2는 DataFrame 반환."
    blocks:
      - type: tip
        content: "extract_tables는 페이지마다 호출해야 합니다. 모든 페이지를 순회하면서 결과를 누적하세요."
      - type: expansion
        title: "미션1: 여러 표를 DataFrame 리스트로"
        blocks:
          - type: code
            title: "데이터 준비"
            content: |-
              from pathlib import Path
              from tempfile import TemporaryDirectory
              import pdfplumber
              from reportlab.lib import colors
              from reportlab.lib.pagesizes import A4
              from reportlab.platypus import SimpleDocTemplate, Table, TableStyle, Spacer

              def buildMultiTablePdf(path):
                  table1 = [["region", "q1"], ["Seoul", "120"], ["Busan", "80"]]
                  table2 = [["product", "price"], ["A", "10"], ["B", "20"], ["C", "30"]]
                  doc = SimpleDocTemplate(str(path), pagesize=A4)
                  style = TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)])
                  flows = [Table(table1, style=style), Spacer(1, 12), Table(table2, style=style)]
                  doc.build(flows)

              multiDir = TemporaryDirectory()
              multiPath = Path(multiDir.name) / "multi.pdf"
              buildMultiTablePdf(multiPath)
              multiPath.stat().st_size > 0
          - type: code
            title: "함수 정의와 검증"
            content: |-
              import pandas as pd

              def extractAllAsFrames(path):
                  frames = []
                  with pdfplumber.open(path) as document:
                      for page in document.pages:
                          for raw in page.extract_tables():
                              if raw:
                                  frames.append(pd.DataFrame(raw[1:], columns=raw[0]))
                  return frames

              frames = extractAllAsFrames(multiPath)
              assert len(frames) == 2
              assert frames[0].shape == (2, 2)
              assert frames[1].shape == (3, 2)
              [f.shape for f in frames]
      - type: expansion
        title: "미션2: 한 PDF의 모든 표를 한 CSV로"
        blocks:
          - type: code
            title: "데이터 준비"
            content: |-
              from pathlib import Path
              from tempfile import TemporaryDirectory
              import pdfplumber
              from reportlab.lib import colors
              from reportlab.lib.pagesizes import A4
              from reportlab.platypus import SimpleDocTemplate, Table, TableStyle, Spacer

              def buildAggPdf(path):
                  table1 = [["region", "value"], ["Seoul", "120"], ["Busan", "80"]]
                  table2 = [["region", "value"], ["Daegu", "60"], ["Incheon", "55"]]
                  doc = SimpleDocTemplate(str(path), pagesize=A4)
                  style = TableStyle([("GRID", (0, 0), (-1, -1), 0.5, colors.black)])
                  doc.build([Table(table1, style=style), Spacer(1, 12), Table(table2, style=style)])

              aggDir = TemporaryDirectory()
              aggPath = Path(aggDir.name) / "agg.pdf"
              aggCsv = Path(aggDir.name) / "agg.csv"
              buildAggPdf(aggPath)
              aggPath.stat().st_size > 0
          - type: code
            title: "함수 정의와 검증"
            content: |-
              import pandas as pd

              def extractToOneCsv(path, csvPath):
                  frames = []
                  with pdfplumber.open(path) as document:
                      for page in document.pages:
                          for raw in page.extract_tables():
                              if raw:
                                  frames.append(pd.DataFrame(raw[1:], columns=raw[0]))
                  combined = pd.concat(frames, ignore_index=True)
                  combined.to_csv(csvPath, index=False)
                  return combined

              combined = extractToOneCsv(aggPath, aggCsv)
              assert combined.shape == (4, 2)
              reloaded = pd.read_csv(aggCsv)
              assert reloaded.shape == (4, 2)
              combined

