meta:
  id: pdf_03
  title: PDF 텍스트 추출
  order: 3
  category: pdf
  difficulty: ⭐⭐
  badge: 기초
  packages:
    - pypdf
    - pdfplumber
    - reportlab
  tags:
    - extract_text
    - pdfplumber
    - 회의록
  outcomes:
    - automation.pdf.extract
  prerequisites:
    - automation.pdf.read
    - python.strings
  estimatedMinutes: 50
  seo:
    title: "PDF 텍스트 추출 - pypdf와 pdfplumber 비교"
    description: "회의록 PDF에서 본문 텍스트를 뽑아 마크다운으로 정리한다. pypdf.extract_text와 pdfplumber.open 두 방식의 강점·약점을 직접 비교한다."
    keywords:
      - PDF 텍스트 추출
