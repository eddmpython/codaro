        styles = getSampleStyleSheet()
        data = [["region", "amount"], ["Seoul", "120"], ["Busan", "80"]]
        doc = SimpleDocTemplate(str(pdfPath), pagesize=A4)
        doc.build([
            Image(str(imgPath), width=120, height=40),
            Paragraph("Monthly Sales", styles["Heading1"]),
