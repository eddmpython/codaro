  outcomes:
    - automation.pdf.layout
  prerequisites:
    - automation.pdf.create
  estimatedMinutes: 60
  seo:
    title: "reportlab Platypus - 표와 이미지가 들어간 한글 PDF 보고서"
    description: "Platypus Table, Image, SimpleDocTemplate로 데이터 표와 로고가 들어간 보고서를 만든다. colWidths 의무화로 페이지 밖으로 나가는 사고를 막는다."
