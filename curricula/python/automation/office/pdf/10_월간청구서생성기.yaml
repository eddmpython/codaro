            ])

        workdir = TemporaryDirectory()
        pdfPath = Path(workdir.name) / "inv.pdf"
        sample = {
            "customer": "Acme",
            "items": [{"item": "Sub", "qty": 1, "unit_price": ___, "amount": ___}],
