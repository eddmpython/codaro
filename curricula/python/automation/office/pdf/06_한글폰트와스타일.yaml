  seo:
    title: "reportlab 한글 PDF - TTFont 등록과 Paragraph 스타일"
    description: "한글이 □로 깨지는 PDF를 시스템 폰트 등록으로 해결한다. OS별 폴백 헬퍼와 Paragraph·getSampleStyleSheet로 단락 스타일까지 다룬다."
