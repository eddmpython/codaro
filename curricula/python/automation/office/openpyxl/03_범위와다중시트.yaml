- id: practice
  title: 실습 - 종합 미션 2개
  structuredPrimary: true
  subtitle: import부터 검증까지 독립 실행
  goal: iter_rows·범위 슬라이스·다중 시트 분리·셀 병합 네 가지를 두 가지 시나리오에 결합한다.
  why: 영역 단위 사고는 한 강의에서 모든 패턴을 한 번에 결합해 봐야 손에 잡힙니다.
  explanation: |-
    미션1은 학생 성적 표를 학년-반(grade-class) 기준 다중 시트로 분리하고 분리 전후 합계 동일성을 검증합니다. 미션2는 헤더 영역을 병합한 보고서를 만들고 iter_rows로 각 컬럼 합계를 구합니다.
  tips:
  - 각 미션은 import문부터 시작합니다. 위 예제를 실행했다면 import는 생략해도 됩니다.
  - 변수 prefix는 `score*`(미션1), `merge*`(미션2)로 격리됩니다.
  snippet: |-
    from collections import defaultdict
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook, load_workbook
  exercise:
    prompt: 두 미션을 직접 작성해 본 뒤 expansion 정답과 비교하세요.
    starterCode: |-
      from collections import defaultdict
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook, load_workbook

      workdir = TemporaryDirectory()
      target = Path(workdir.name) / "mission.xlsx"
      ___
    hints:
    - 미션1은 grade별 시트 + 분리합과 원본합 일치. 미션2는 A1:D1 병합 + iter_rows로 컬럼 합계.
    - 시트 이름에 콜론/슬래시 같은 금지 문자가 들어가지 않도록 grade를 문자열로 정제.
  check:
    noError: 분리/병합 모두 시트와 영역 좌표가 유효해야 합니다.
    resultCheck: 미션1은 합계 동일성, 미션2는 컬럼별 합계 assert가 모두 통과해야 합니다.
  blocks:
  - type: tip
    content: 미션별 변수 prefix가 다릅니다. 두 미션을 같은 노트북에서 차례로 실행해도 충돌이 없습니다.
  - type: expansion
    title: "미션1: 학년별 성적 시트 분리 + 합계 일치 검증"
    blocks:
    - type: code
      title: 분리와 저장
      content: |-
        from collections import defaultdict
        from pathlib import Path
        from tempfile import TemporaryDirectory
        from openpyxl import Workbook, load_workbook

        scoreDir = TemporaryDirectory()
        scorePath = Path(scoreDir.name) / "scores.xlsx"
        scoreRows = [
            ("Alice", "1", 88),
            ("Bob", "1", 72),
            ("Carol", "2", 95),
            ("Dan", "2", 60),
            ("Eve", "3", 78),
            ("Frank", "3", 85),
        ]

        scoreBook = Workbook()
        scoreRaw = scoreBook.active
        scoreRaw.title = "raw"
        scoreRaw.append(["name", "grade", "score"])
        for row in scoreRows:
            scoreRaw.append(list(row))

        scoreGroups = defaultdict(list)
        for row in scoreRows:
            scoreGroups[f"grade_{row[1]}"].append(row)
        for sheetName in sorted(scoreGroups):
            sheet = scoreBook.create_sheet(sheetName)
            sheet.append(["name", "grade", "score"])
            for row in scoreGroups[sheetName]:
                sheet.append(list(row))
        scoreBook.save(scorePath)
        scoreBook.sheetnames
    - type: code
      title: 분리합 = 원본합 검증
      content: |-
        scoreReopen = load_workbook(scorePath)
        originalSum = sum(row[2] for row in scoreRows)
        splitSum = 0
        for name in scoreReopen.sheetnames:
            if name == "raw":
                continue
            sheetBack = scoreReopen[name]
            splitSum += sum(row[2] for row in sheetBack.iter_rows(min_row=2, values_only=True))
        assert originalSum == splitSum
        originalSum, splitSum
  - type: expansion
    title: "미션2: 병합 헤더 + iter_rows 컬럼 합계"
    blocks:
    - type: code
      title: 병합 헤더와 데이터 작성
      content: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        from openpyxl import Workbook, load_workbook

        mergeDir = TemporaryDirectory()
        mergePath = Path(mergeDir.name) / "merged.xlsx"

        mergeBook = Workbook()
        mergeSheet = mergeBook.active
        mergeSheet.title = "monthly"
        mergeSheet["A1"] = "2026년 5월 매출 보고서"
        mergeSheet.merge_cells("A1:D1")
        mergeSheet.append([])
        mergeSheet.append(["date", "Seoul", "Busan", "Daegu"])
        mergeRows = [
            ("05-01", 120000, 80000, 30000),
            ("05-02", 95000, 60000, 45000),
            ("05-03", 110000, 70000, 28000),
        ]
        for row in mergeRows:
            mergeSheet.append(list(row))
        mergeBook.save(mergePath)
        list(mergeSheet.merged_cells.ranges)
    - type: code
      title: iter_rows로 컬럼 합계
      content: |-
        mergeReopen = load_workbook(mergePath)
        mergeBack = mergeReopen["monthly"]
        seoulSum, busanSum, daeguSum = 0, 0, 0
        for row in mergeBack.iter_rows(min_row=4, max_col=4, values_only=True):
            seoulSum += row[1]
            busanSum += row[2]
            daeguSum += row[3]
        assert seoulSum == 325000
        assert busanSum == 210000
        assert daeguSum == 103000
        seoulSum, busanSum, daeguSum
