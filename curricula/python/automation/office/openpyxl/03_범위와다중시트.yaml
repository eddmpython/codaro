intro:
  direction: 시트의 셀들을 행·열·범위 단위로 순회하고, 카테고리 기준으로 다중 시트로 분리합니다. 보고서가 여러 시트를 갖는 진짜 이유를 이 강의에서 만든다.
  benefits:
  - iter_rows의 min_row/max_row/values_only 조합으로 원하는 영역만 정확히 읽습니다.
  - 셀 병합과 해제로 보고서의 헤더 영역을 깔끔하게 만듭니다.
  - 하나의 표를 카테고리별 다중 시트로 자동 분리하는 패턴을 손에 익힙니다.
  diagram:
    steps:
    - label: 순회 패턴
      detail: iter_rows / iter_cols 두 방향 모두 다룬다.
    - label: 범위 슬라이스
      detail: "ws['A1:C3']로 사각 범위를 한 번에 잡는다."
    - label: 시트 분리
      detail: groupby 결과를 시트로 자동 생성한다.
    - label: 병합
      detail: merge_cells로 헤더 영역을 만들고 unmerge_cells로 푼다.
    runtime:
    - label: openpyxl 패키지 준비
      detail: openpyxl만 import해도 iter_rows/iter_cols/병합이 동작한다. uv run python에서 즉시 실행 가능.
    - label: 분리 결과 합 검증
      detail: load_workbook으로 재오픈해 모든 region 시트 합과 원본 합이 일치하는지 assert로 확인한다.
sections:
- id: step1_iter_rows_basic
  title: 1단계. iter_rows로 행 순회
  structuredPrimary: true
  subtitle: min_row, max_row, values_only
  goal: 헤더를 제외한 데이터 영역만 정확히 잡아 순회한다.
  why: "for row in ws만 쓰면 항상 1행부터 도므로 헤더와 데이터가 섞입니다. min_row/max_row 지정이 모든 정확한 자동화의 시작입니다."
  explanation: |-
    `ws.iter_rows(min_row=2, max_row=ws.max_row, values_only=True)`는 2행부터 마지막 행까지의 값만 튜플로 돌려줍니다. `values_only=False`(기본값)는 Cell 객체를 돌려주므로 값을 얻으려면 `.value`를 더 써야 합니다. 값만 빠르게 꺼낼 때는 항상 `values_only=True`를 쓰세요.
  tips:
  - iter_rows에 min_col/max_col을 추가하면 세로 영역도 잘라낼 수 있습니다. 큰 시트에서 일부 컬럼만 읽을 때 성능이 크게 좋아집니다.
  snippet: |-
    from openpyxl import Workbook

    book = Workbook()
    sheet = book.active
    sheet.append(["date", "region", "amount"])
    sheet.append(["2026-05-01", "Seoul", 120000])
    sheet.append(["2026-05-02", "Busan", 80000])
    sheet.append(["2026-05-03", "Seoul", 45000])

    list(sheet.iter_rows(min_row=2, values_only=True))
  exercise:
    prompt: amount 컬럼(C)만 읽고 싶다면 min_col/max_col에 어떤 값을 주어야 할지 채워 보세요.
    starterCode: |-
      from openpyxl import Workbook

      book = Workbook()
      sheet = book.active
      sheet.append(["date", "region", "amount"])
      sheet.append(["2026-05-01", "Seoul", 120000])
      sheet.append(["2026-05-02", "Busan", 80000])
      sheet.append(["2026-05-03", "Seoul", 45000])

      list(sheet.iter_rows(min_row=2, min_col=___, max_col=___, values_only=True))
    hints:
    - amount는 3번째 컬럼입니다. min_col과 max_col 모두 같은 값을 줘야 한 컬럼만 잘립니다.
  check:
    noError: min_row/max_row/min_col/max_col은 모두 1 이상 정수여야 합니다.
    resultCheck: 결과 튜플이 한 요소(amount)만 가져야 합니다.
- id: step2_iter_cols
  title: 2단계. iter_cols로 열 순회
  structuredPrimary: true
  subtitle: 열 단위 집계
  goal: 같은 데이터를 열 방향으로 순회하며 컬럼별 집계가 자연스러운 경우를 익힌다.
  why: 행은 "한 건의 사실", 열은 "같은 종류의 값"입니다. 열 단위 집계는 합계, 평균, 최대값을 한 번에 구할 때 유리합니다.
  explanation: |-
    `ws.iter_cols(min_row=2, min_col=3, max_col=3, values_only=True)`는 C열의 2행부터 마지막 행까지를 단 하나의 튜플로 돌려줍니다. 그 튜플에 sum/min/max를 바로 적용하면 컬럼 단위 통계가 한 줄로 끝납니다.
  tips:
  - iter_cols는 컬럼 하나당 튜플 하나를 만듭니다. 컬럼 여러 개를 동시에 순회하면 컬럼 수만큼 튜플이 나옵니다.
  snippet: |-
    from openpyxl import Workbook

    book = Workbook()
    sheet = book.active
    sheet.append(["date", "region", "amount"])
    sheet.append(["2026-05-01", "Seoul", 120000])
    sheet.append(["2026-05-02", "Busan", 80000])
    sheet.append(["2026-05-03", "Seoul", 45000])

    amountColumn = next(sheet.iter_cols(min_row=2, min_col=3, max_col=3, values_only=True))
    sum(amountColumn), max(amountColumn), min(amountColumn)
  exercise:
    prompt: amount의 평균을 한 줄로 구해 보세요. (힌트 - sum/len 또는 statistics.mean)
    starterCode: |-
      from openpyxl import Workbook
      from statistics import mean

      book = Workbook()
      sheet = book.active
      sheet.append(["date", "region", "amount"])
      sheet.append(["2026-05-01", "Seoul", 120000])
      sheet.append(["2026-05-02", "Busan", 80000])
      sheet.append(["2026-05-03", "Seoul", 45000])

      amountColumn = next(sheet.iter_cols(min_row=2, min_col=3, max_col=3, values_only=True))
      averageAmount = ___
      averageAmount
    hints:
    - mean(amountColumn) 한 줄이면 평균이 나옵니다.
  check:
    noError: amountColumn이 비어 있지 않아야 mean 호출에서 StatisticsError가 안 납니다.
    resultCheck: 평균이 81666.66... 부근 숫자여야 합니다.
- id: step3_range_slice
  title: 3단계. 사각 범위 슬라이스
  structuredPrimary: true
  subtitle: "ws['A1:C3']"
  goal: 좌상단:우하단 좌표 한 번으로 영역을 잡아 표의 부분만 읽는다.
  why: iter_rows의 범위 인자를 매번 적기 귀찮을 때, "A1:C10" 같은 직관적 슬라이스가 코드를 짧게 만듭니다.
  explanation: |-
    `ws['A1:C3']`은 행 단위 튜플들의 튜플을 돌려줍니다. 각 요소는 Cell 객체이므로 값에 접근하려면 `.value`가 필요합니다. iter_rows와 결과 형태가 같지만, 영역을 좌표 문자열 한 줄로 표현할 수 있어 가독성이 좋습니다.
  tips:
  - 범위 슬라이스는 values_only 같은 옵션이 없습니다. 값만 빠르게 꺼내려면 iter_rows가 여전히 유리합니다. 좌표 직관 vs 성능의 트레이드오프입니다.
  snippet: |-
    from openpyxl import Workbook

    book = Workbook()
    sheet = book.active
    sheet.append(["date", "region", "amount"])
    sheet.append(["2026-05-01", "Seoul", 120000])
    sheet.append(["2026-05-02", "Busan", 80000])
    sheet.append(["2026-05-03", "Seoul", 45000])

    [[cell.value for cell in row] for row in sheet["A1:C4"]]
  exercise:
    prompt: 데이터만(헤더 제외) 잡고 싶다면 범위 문자열을 어떻게 바꿔야 할까요?
    starterCode: |-
      from openpyxl import Workbook

      book = Workbook()
      sheet = book.active
      sheet.append(["date", "region", "amount"])
      sheet.append(["2026-05-01", "Seoul", 120000])
      sheet.append(["2026-05-02", "Busan", 80000])
      sheet.append(["2026-05-03", "Seoul", 45000])

      [[cell.value for cell in row] for row in sheet[___]]
    hints:
    - 데이터는 2행부터 4행까지 있습니다. 좌상단을 A2, 우하단을 C4로 잡으면 헤더가 빠집니다.
  check:
    noError: 범위 문자열이 "좌상단:우하단" 형식이어야 합니다.
    resultCheck: 결과의 외부 리스트 길이가 3(헤더 제외 데이터 행 수)이어야 합니다.
- id: step4_split_to_sheets
  title: 4단계. 카테고리별 다중 시트로 분리
  structuredPrimary: true
  subtitle: collections.defaultdict + create_sheet
  goal: 한 표의 데이터를 카테고리 기준으로 시트별로 나눠 보고서를 만든다.
  why: 전체 표 한 장보다 카테고리별 시트 묶음이 의사결정자에게 훨씬 효과적인 경우가 많습니다.
  explanation: |-
    원본 데이터를 한 시트로 받아 defaultdict로 region별 행을 모은 뒤, region 하나당 create_sheet로 시트를 만들고 그 안에 헤더와 데이터를 append합니다. 원본 시트(`raw`)와 분리 시트들이 함께 들어 있는 워크북이 결과입니다.
  tips:
  - 시트 이름에는 ":", "/", "\\", "?", "*", "[", "]" 같은 문자가 들어가지 못합니다. 카테고리 값을 그대로 시트 이름으로 쓰기 전에 정제 단계를 만드세요.
  snippet: |-
    from collections import defaultdict
    from openpyxl import Workbook

    rawRows = [
        ("2026-05-01", "Seoul", 120000),
        ("2026-05-02", "Busan", 80000),
        ("2026-05-03", "Seoul", 45000),
        ("2026-05-04", "Daegu", 30000),
        ("2026-05-05", "Busan", 60000),
    ]

    book = Workbook()
    raw = book.active
    raw.title = "raw"
    raw.append(["date", "region", "amount"])
    for row in rawRows:
        raw.append(list(row))

    grouped = defaultdict(list)
    for row in rawRows:
        grouped[row[1]].append(row)

    for region in sorted(grouped):
        regionSheet = book.create_sheet(region)
        regionSheet.append(["date", "region", "amount"])
        for row in grouped[region]:
            regionSheet.append(list(row))

    book.sheetnames
  exercise:
    prompt: rawRows에 ("2026-05-06", "Daegu", 50000)을 추가하고, 결과 시트 이름 리스트가 어떻게 변하는지 확인하세요.
    starterCode: |-
      from collections import defaultdict
      from openpyxl import Workbook

      rawRows = [
          ("2026-05-01", "Seoul", 120000),
          ("2026-05-02", "Busan", 80000),
          ("2026-05-03", "Seoul", 45000),
          ("2026-05-04", "Daegu", 30000),
          ("2026-05-05", "Busan", 60000),
          ___,
      ]

      book = Workbook()
      raw = book.active
      raw.title = "raw"
      raw.append(["date", "region", "amount"])
      for row in rawRows:
          raw.append(list(row))

      grouped = defaultdict(list)
      for row in rawRows:
          grouped[row[1]].append(row)

      for region in sorted(grouped):
          regionSheet = book.create_sheet(region)
          regionSheet.append(["date", "region", "amount"])
          for row in grouped[region]:
              regionSheet.append(list(row))

      book.sheetnames
    hints:
    - 새 region이 등장하면 시트 하나가 더 생기지만, 이미 있는 region이면 시트 수는 그대로입니다.
  check:
    noError: rawRows의 모든 항목이 3개 컬럼 튜플이어야 unpack 에러가 안 납니다.
    resultCheck: book.sheetnames에 raw와 모든 region이 포함되어야 합니다.
- id: step5_merge
  title: 5단계. 셀 병합과 해제
  structuredPrimary: true
  subtitle: merge_cells / unmerge_cells
  goal: 헤더 영역의 시각적 정렬을 위해 셀을 병합하고, 필요할 때 풀 수 있다.
  why: 보고서의 상단 타이틀이나 카테고리 헤더는 병합된 영역으로 표현할 때가 많습니다. 코드로 다루지 못하면 매번 사람 손이 들어갑니다.
  explanation: |-
    `ws.merge_cells('A1:C1')`은 A1~C1을 한 셀처럼 병합합니다. 병합 영역의 값은 좌상단(A1)에만 존재하고, 나머지는 None입니다. `ws.unmerge_cells('A1:C1')`은 병합을 해제합니다. 병합된 셀에 값을 쓰려면 항상 좌상단 좌표를 사용하세요.
  tips:
  - "병합된 셀에 다른 좌표(B1, C1)로 값을 쓰면 openpyxl이 조용히 그 값을 무시합니다. None만 남는 이유가 보통 이것입니다."
  snippet: |-
    from openpyxl import Workbook

    book = Workbook()
    sheet = book.active
    sheet["A1"] = "2026년 5월 매출 보고서"
    sheet.merge_cells("A1:C1")
    sheet.append([])
    sheet.append(["date", "region", "amount"])
    sheet.append(["2026-05-01", "Seoul", 120000])
    list(sheet.merged_cells.ranges)
  exercise:
    prompt: 병합을 한 번 해제하고, merged_cells.ranges가 빈 리스트가 되는지 확인하세요.
    starterCode: |-
      from openpyxl import Workbook

      book = Workbook()
      sheet = book.active
      sheet["A1"] = "2026년 5월 매출 보고서"
      sheet.merge_cells("A1:C1")
      sheet.___(___)
      list(sheet.merged_cells.ranges)
    hints:
    - 해제 함수 이름은 unmerge_cells이고, merge_cells와 같은 범위 문자열을 인자로 받습니다.
  check:
    noError: 병합과 해제 범위 문자열이 같아야 합니다.
    resultCheck: 해제 후 merged_cells.ranges가 빈 시퀀스여야 합니다.
- id: validation
  title: 6단계. 검증 루프 - 다중 시트 보고서의 계약
  structuredPrimary: true
  subtitle: 예측 → 실행 → 검증
  goal: 카테고리 분리 함수가 만든 보고서를 다시 열어 시트별 행 수와 합계가 원본과 일치하는지 자동 검증한다.
  why: 다중 시트 분리는 데이터 손실이 가장 자주 발생하는 지점입니다. "분리한 모든 시트의 합 = 원본의 합" 항등식을 항상 가둬 둬야 합니다.
  explanation: |-
    원본 합계와 분리 결과 합계를 비교하는 계약 한 줄이 모든 자동화의 안전망입니다. 변주 실험으로 새 region을 추가해도 같은 assert가 통과하는지 확인하세요.
  tips:
  - 합계가 어긋나면 거의 항상 (1) 빈 셀이 0이 아니라 None이거나 (2) 분리 키가 대소문자나 공백 차이로 다르게 인식된 경우입니다.
  snippet: |-
    from collections import defaultdict
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook, load_workbook

    def buildRegionReport(path, rows):
        book = Workbook()
        raw = book.active
        raw.title = "raw"
        raw.append(["date", "region", "amount"])
        for row in rows:
            raw.append(list(row))
        grouped = defaultdict(list)
        for row in rows:
            grouped[row[1]].append(row)
        for region in sorted(grouped):
            sheet = book.create_sheet(region)
            sheet.append(["date", "region", "amount"])
            for row in grouped[region]:
                sheet.append(list(row))
        book.save(path)
        return path

    workdir = TemporaryDirectory()
    samples = [
        ("2026-05-01", "Seoul", 120000),
        ("2026-05-02", "Busan", 80000),
        ("2026-05-03", "Seoul", 45000),
        ("2026-05-04", "Daegu", 30000),
        ("2026-05-05", "Busan", 60000),
    ]
    reportPath = buildRegionReport(Path(workdir.name) / "region_report.xlsx", samples)

    reopened = load_workbook(reportPath)
    originalTotal = sum(row[2] for row in samples)
    rebuiltTotal = 0
    for name in reopened.sheetnames:
        if name == "raw":
            continue
        sheet = reopened[name]
        rebuiltTotal += sum(row[2] for row in sheet.iter_rows(min_row=2, values_only=True))
    assert originalTotal == rebuiltTotal
    originalTotal, rebuiltTotal
  exercise:
    prompt: samples에 ("2026-05-06", "Daegu", 99000)을 추가해도 동일 assert가 통과하는지 확인하세요.
    starterCode: |-
      from collections import defaultdict
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook, load_workbook

      def buildRegionReport(path, rows):
          book = Workbook()
          raw = book.active
          raw.title = "raw"
          raw.append(["date", "region", "amount"])
          for row in rows:
              raw.append(list(row))
          grouped = defaultdict(list)
          for row in rows:
              grouped[row[1]].append(row)
          for region in sorted(grouped):
              sheet = book.create_sheet(region)
              sheet.append(["date", "region", "amount"])
              for row in grouped[region]:
                  sheet.append(list(row))
          book.save(path)
          return path

      workdir = TemporaryDirectory()
      samples = [
          ("2026-05-01", "Seoul", 120000),
          ("2026-05-02", "Busan", 80000),
          ("2026-05-03", "Seoul", 45000),
          ("2026-05-04", "Daegu", 30000),
          ("2026-05-05", "Busan", 60000),
          ___,
      ]
      reportPath = buildRegionReport(Path(workdir.name) / "region_report.xlsx", samples)

      reopened = load_workbook(reportPath)
      originalTotal = sum(row[2] for row in samples)
      rebuiltTotal = 0
      for name in reopened.sheetnames:
          if name == "raw":
              continue
          sheet = reopened[name]
          rebuiltTotal += sum(row[2] for row in sheet.iter_rows(min_row=2, values_only=True))
      assert originalTotal == rebuiltTotal
      originalTotal, rebuiltTotal
    hints:
    - "(날짜, region, 금액) 3-튜플이면 됩니다. region이 기존이든 새것이든 합은 일치해야 합니다."
  check:
    noError: buildRegionReport가 ValueError 없이 끝나야 합니다.
