  seo:
    title: openpyxl 수식과 이름 영역 - SUM/IF/VLOOKUP·DefinedName·data_only 차이
    description: 셀에 수식 문자열을 쓰는 방법, 캐시된 계산 결과를 data_only로 읽는 차이, DefinedName으로 가독성을 높이는 패턴까지 정리합니다.
