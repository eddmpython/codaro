  seo:
    title: openpyxl 표와 데이터 검증 - Table·DataValidation·freeze_panes·AutoFilter
    description: 정렬 가능한 표, 드롭다운 데이터 검증, 행 고정, 자동 필터까지 - 입력 양식의 무결성을 코드로 잠그는 패턴을 정리합니다.
