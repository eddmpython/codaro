meta:
  id: openpyxl_02
  title: 셀 읽기와 쓰기
  order: 2
  category: openpyxl
  difficulty: ⭐
  badge: 입문
  packages:
  - openpyxl
  tags:
  - openpyxl
  - 셀
  - append
  - 좌표변환
  - 검증
  seo:
    title: openpyxl 셀 읽기와 쓰기 - cell·['A1']·append 정확하게 다루기
    description: 셀 좌표(A1·R1C1) 두 표기법, ws.cell(row, column, value), ws.append, get_column_letter 등 셀 접근의 모든 경로와 함정을 정리합니다.
    keywords:
    - openpyxl cell
