  - 검증
  seo:
    title: openpyxl 워크북과 시트 만들기 - 다중 시트 파일 생성
    description: Workbook과 Worksheet 객체로 시트를 만들고 이름을 바꾸고 저장한 뒤 load_workbook으로 다시 열어 구조를 검증합니다.
