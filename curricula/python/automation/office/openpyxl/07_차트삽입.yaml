meta:
  id: openpyxl_07
  title: 차트 삽입
  order: 7
  category: openpyxl
  difficulty: ⭐⭐⭐
  badge: 중급
  packages:
  - openpyxl
  tags:
  - openpyxl
  - 차트
  - BarChart
  - LineChart
  - PieChart
  - Reference
  seo:
    title: openpyxl 차트 삽입 - BarChart·LineChart·PieChart·Reference
    description: 데이터 영역을 Reference로 잡아 BarChart/LineChart/PieChart를 만들고 시트에 anchor로 배치합니다. 축 제목, 범례, 데이터 라벨까지 다룹니다.
    keywords:
    - openpyxl chart
    - BarChart LineChart
    - Reference
    - add_chart
intro:
  direction: 표 데이터를 Reference로 잡아 막대·선·파이 차트를 만들고 시트에 위치 좌표로 배치합니다. 차트 제목, 축 라벨, 범례, 데이터 라벨까지 코드로 제어합니다.
  benefits:
  - 데이터 영역과 카테고리 영역을 Reference로 정확히 표현합니다.
  - 같은 데이터로 BarChart/LineChart/PieChart를 골라 만들어 적합한 표현을 선택합니다.
  - 한 워크북 안에 표와 차트를 함께 배치하는 보고서 패턴을 손에 익힙니다.
  diagram:
    steps:
    - label: 데이터 영역
      detail: Reference(ws, min_col/max_col/min_row/max_row)로 영역을 잡는다.
    - label: 차트 생성
      detail: BarChart/LineChart/PieChart 중 선택해 add_data/set_categories.
    - label: 시트에 배치
      detail: ws.add_chart(chart, anchor) - anchor는 차트 좌상단 셀 좌표.
    - label: 차트 보존 재오픈
      detail: 재오픈 후 ws._charts 리스트에 의도한 개수와 제목이 보존되는지 assert로 확인.
    runtime:
    - label: openpyxl 패키지 준비
      detail: openpyxl.chart 모듈의 BarChart/LineChart/PieChart/Reference를 import해 즉시 차트를 만든다.
    - label: 차트 보존 재오픈
      detail: 저장한 파일을 load_workbook으로 다시 열어 _charts 길이와 각 차트의 title을 assert로 확인한다.
sections:
- id: step1_bar_chart
  title: 1단계. 막대 차트
  structuredPrimary: true
  subtitle: BarChart + Reference
  goal: 지역별 매출을 막대 차트로 만들어 시트에 배치한다.
  why: 카테고리 비교(지역·상품·요일)는 막대 차트가 가장 직관적입니다. 자동 보고서의 90%는 막대로 충분합니다.
  explanation: |-
    데이터 영역은 `Reference(ws, min_col=2, min_row=1, max_col=2, max_row=5)`로 잡습니다. min_row=1로 잡고 chart.add_data(data, titles_from_data=True)를 쓰면 첫 행이 시리즈 이름으로 인식됩니다. 카테고리(가로축 라벨)는 `set_categories(Reference(ws, min_col=1, min_row=2, max_row=5))`로 따로 줍니다.
  tips:
  - "titles_from_data=True 옵션을 잊으면 첫 데이터 행이 시리즈 이름으로 안 잡혀, 범례에 'Series1'처럼 자동 이름이 나옵니다."
  snippet: |-
    from openpyxl import Workbook
    from openpyxl.chart import BarChart, Reference

    book = Workbook()
    sheet = book.active
    sheet.append(["region", "amount"])
    for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000), ("Incheon", 65000)]:
        sheet.append([region, amount])

    chart = BarChart()
    chart.title = "지역별 매출"
    chart.x_axis.title = "지역"
    chart.y_axis.title = "금액"

    dataRef = Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=5)
    categoryRef = Reference(sheet, min_col=1, min_row=2, max_row=5)
    chart.add_data(dataRef, titles_from_data=True)
    chart.set_categories(categoryRef)

    sheet.add_chart(chart, "D2")
    len(sheet._charts), chart.title
  exercise:
    prompt: chart.title을 "5월 매출"로, x_axis.title을 "Region"으로 바꾸세요.
    starterCode: |-
      from openpyxl import Workbook
      from openpyxl.chart import BarChart, Reference

      book = Workbook()
      sheet = book.active
      sheet.append(["region", "amount"])
      for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000), ("Incheon", 65000)]:
          sheet.append([region, amount])

      chart = BarChart()
      chart.title = ___
      chart.x_axis.title = ___
      dataRef = Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=5)
      categoryRef = Reference(sheet, min_col=1, min_row=2, max_row=5)
      chart.add_data(dataRef, titles_from_data=True)
      chart.set_categories(categoryRef)
      sheet.add_chart(chart, "D2")
      chart.title, chart.x_axis.title
    hints:
    - chart.title과 x_axis.title은 문자열을 바로 받습니다. 내부에서 자동으로 RichText로 변환됩니다.
  check:
    noError: Reference 인자의 행/열 범위가 데이터와 일치해야 합니다.
    resultCheck: 차트의 title과 x_axis.title이 입력 문자열과 같아야 합니다.
- id: step2_line_chart
  title: 2단계. 선 차트
  structuredPrimary: true
  subtitle: LineChart + 시계열
  goal: 일자별 매출을 선 차트로 그려 추세를 보여 준다.
  why: 시간의 흐름은 선이 가장 자연스럽습니다. 막대로 그리면 점들 간의 연속성이 깨져 인지 부하가 큽니다.
  explanation: |-
    `from openpyxl.chart import LineChart`. 데이터/카테고리 설정은 BarChart와 같습니다. LineChart는 `chart.style = 13` 같은 미리 정의된 스타일 번호로 색을 통째로 바꿀 수 있어 빠르게 보기 좋게 만들 수 있습니다.
  tips:
  - chart.style은 1~48 사이 정수입니다. 차트 종류별로 의미가 다릅니다. 마음에 드는 번호를 한 번 정해 두면 자동 보고서 전체에서 통일감이 생깁니다.
  snippet: |-
    from openpyxl import Workbook
    from openpyxl.chart import LineChart, Reference

    book = Workbook()
    sheet = book.active
    sheet.append(["date", "amount"])
    for day, amount in [("05-01", 120000), ("05-02", 80000), ("05-03", 95000), ("05-04", 130000), ("05-05", 110000)]:
        sheet.append([day, amount])

    chart = LineChart()
    chart.title = "5월 매출 추세"
    chart.style = 13
    chart.x_axis.title = "날짜"
    chart.y_axis.title = "금액"
    chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=6), titles_from_data=True)
    chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=6))
    sheet.add_chart(chart, "D2")
    chart.style, chart.title
  exercise:
    prompt: 데이터를 하루 더 추가하고(예 "05-06", 95000), Reference의 max_row를 7로 늘려 차트가 6일 데이터를 모두 포함하도록 하세요.
    starterCode: |-
      from openpyxl import Workbook
      from openpyxl.chart import LineChart, Reference

      book = Workbook()
      sheet = book.active
      sheet.append(["date", "amount"])
      data = [("05-01", 120000), ("05-02", 80000), ("05-03", 95000), ("05-04", 130000), ("05-05", 110000), ___]
      for day, amount in data:
          sheet.append([day, amount])

      chart = LineChart()
      chart.title = "5월 매출 추세"
      chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=___), titles_from_data=True)
      chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=___))
      sheet.add_chart(chart, "D2")
      sheet.max_row
    hints:
    - "데이터 6개 + 헤더 1 = 7행. data Reference는 max_row=7, category는 max_row=7."
  check:
    noError: Reference의 max_row가 실제 데이터 행 범위 안에 있어야 합니다.
    resultCheck: sheet.max_row가 7이어야 합니다.
- id: step3_pie_chart
  title: 3단계. 파이 차트
  structuredPrimary: true
  subtitle: PieChart + 데이터 라벨
  goal: "전체에 대한 부분 비율을 파이로 보여 주고, 슬라이스에 퍼센트 라벨을 표시한다."
  why: 한 카테고리 안의 비율 구성을 보여주는 데는 파이가 직관적입니다. 단, 카테고리가 7개를 넘으면 파이는 가독성이 급격히 떨어집니다. 5개 이하 권장.
  explanation: |-
    `PieChart`도 BarChart와 같은 API입니다. 슬라이스에 퍼센트를 표시하려면 `DataLabelList(showPercent=True)`를 chart.dataLabels에 대입합니다.
  tips:
  - 파이 차트의 첫 슬라이스를 12시 방향에 두려면 chart.firstSliceAng=0(기본)을 유지하세요. 90을 주면 시계 방향으로 90도 회전합니다.
  snippet: |-
    from openpyxl import Workbook
    from openpyxl.chart import PieChart, Reference
    from openpyxl.chart.label import DataLabelList

    book = Workbook()
    sheet = book.active
    sheet.append(["region", "amount"])
    for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000), ("Incheon", 65000)]:
        sheet.append([region, amount])

    chart = PieChart()
    chart.title = "지역 매출 비중"
    chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=5), titles_from_data=True)
    chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=5))
    chart.dataLabels = DataLabelList(showPercent=True)
    sheet.add_chart(chart, "D2")
    chart.dataLabels.showPercent
  exercise:
    prompt: 카테고리 이름도 함께 보이도록 DataLabelList에 showCatName=True를 추가하세요.
    starterCode: |-
      from openpyxl import Workbook
      from openpyxl.chart import PieChart, Reference
      from openpyxl.chart.label import DataLabelList

      book = Workbook()
      sheet = book.active
      sheet.append(["region", "amount"])
      for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000), ("Incheon", 65000)]:
          sheet.append([region, amount])

      chart = PieChart()
      chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=5), titles_from_data=True)
      chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=5))
      chart.dataLabels = DataLabelList(showPercent=True, showCatName=___)
      sheet.add_chart(chart, "D2")
      chart.dataLabels.showPercent, chart.dataLabels.showCatName
    hints:
    - showCatName은 불리언입니다.
  check:
    noError: DataLabelList의 옵션 이름이 정확해야 합니다(camelCase 주의).
    resultCheck: 두 옵션 모두 True여야 합니다.
- id: step4_anchor_layout
  title: 4단계. 차트 위치와 크기
  structuredPrimary: true
  subtitle: anchor 셀과 width/height
  goal: 차트의 좌상단 좌표를 정확히 지정하고, 차트 크기도 cm 단위로 조정한다.
  why: 보고서의 표와 차트를 같이 보려면 차트 위치를 의도적으로 잡아야 합니다. 자동 배치는 항상 어딘가 어색합니다.
  explanation: |-
    `ws.add_chart(chart, anchor)`의 anchor는 차트 좌상단 셀 좌표 문자열입니다. chart.width와 chart.height는 cm 단위입니다(기본 약 15×7.5cm).
  tips:
  - 차트가 표를 가리면 anchor를 옆 컬럼으로 옮기거나 너비를 줄이세요. 자동 보고서 디버깅에서 가장 흔한 시각 이슈입니다.
  snippet: |-
    from openpyxl import Workbook
    from openpyxl.chart import BarChart, Reference

    book = Workbook()
    sheet = book.active
    sheet.append(["region", "amount"])
    for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000)]:
        sheet.append([region, amount])

    chart = BarChart()
    chart.title = "지역 매출"
    chart.width = 20
    chart.height = 10
    chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=4), titles_from_data=True)
    chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=4))
    sheet.add_chart(chart, "E2")
    chart.width, chart.height
  exercise:
    prompt: 차트를 위에서 두 칸 아래(E4)로 옮기고 width를 25로 키우세요.
    starterCode: |-
      from openpyxl import Workbook
      from openpyxl.chart import BarChart, Reference

      book = Workbook()
      sheet = book.active
      sheet.append(["region", "amount"])
      for region, amount in [("Seoul", 120000), ("Busan", 80000), ("Daegu", 30000)]:
          sheet.append([region, amount])

      chart = BarChart()
      chart.title = "지역 매출"
      chart.width = ___
      chart.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=4), titles_from_data=True)
      chart.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=4))
      sheet.add_chart(chart, ___)
      chart.width
    hints:
    - anchor는 셀 좌표 문자열 그대로입니다 ("E4").
  check:
    noError: anchor 문자열은 유효한 셀 좌표여야 합니다.
    resultCheck: chart.width가 25여야 합니다.
- id: validation
  title: 5단계. 검증 루프 - 차트 보존 확인
  structuredPrimary: true
  subtitle: 저장 → 재오픈 → _charts 길이 비교
  goal: 차트를 추가한 보고서를 저장 후 다시 열어 차트가 보존되는지 자동으로 확인한다.
  why: 차트 객체는 시트 내부의 _charts 리스트에 들어 있습니다. 잘못된 Reference나 anchor를 쓰면 저장 시 묵음 실패할 수 있어 재오픈 검증이 안전합니다.
  explanation: |-
    `buildSalesReport`는 표 + 막대 차트 + 선 차트를 한 시트에 묶어 만듭니다. 다시 열어 차트 개수와 제목을 모두 확인합니다.
  tips:
  - "ws._charts는 private이지만 차트 보존 확인의 가장 직접적인 경로입니다. 길이와 각 차트의 title로 충분한 계약을 만들 수 있습니다."
  snippet: |-
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook, load_workbook
    from openpyxl.chart import BarChart, LineChart, Reference

    def buildSalesReport(path, rows):
        book = Workbook()
        sheet = book.active
        sheet.title = "sales"
        sheet.append(["date", "amount"])
        for row in rows:
            sheet.append(list(row))
        endRow = len(rows) + 1

        bar = BarChart()
        bar.title = "일자별 매출 (막대)"
        bar.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
        bar.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=endRow))
        sheet.add_chart(bar, "D2")

        line = LineChart()
        line.title = "일자별 매출 (선)"
        line.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
        line.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=endRow))
        sheet.add_chart(line, "D20")

        book.save(path)
        return path

    workdir = TemporaryDirectory()
    salesPath = buildSalesReport(
        Path(workdir.name) / "sales.xlsx",
        [("05-01", 120000), ("05-02", 80000), ("05-03", 95000), ("05-04", 130000)],
    )

    reopened = load_workbook(salesPath)
    sales = reopened["sales"]
    chartTitles = []
    for chart in sales._charts:
        chartTitles.append(chart.title.tx.rich.p[0].r[0].t)
    assert len(sales._charts) == 2
    assert "막대" in chartTitles[0]
    assert "선" in chartTitles[1]
    chartTitles
  exercise:
    prompt: PieChart를 하나 더 추가해 보고서에 차트 3개가 들어가도록 만들고 assert를 3으로 바꿔 보세요.
    starterCode: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      from openpyxl import Workbook, load_workbook
      from openpyxl.chart import BarChart, LineChart, PieChart, Reference

      def buildSalesReport(path, rows):
          book = Workbook()
          sheet = book.active
          sheet.title = "sales"
          sheet.append(["date", "amount"])
          for row in rows:
              sheet.append(list(row))
          endRow = len(rows) + 1

          bar = BarChart()
          bar.title = "일자별 매출 (막대)"
          bar.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
          bar.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=endRow))
          sheet.add_chart(bar, "D2")

          line = LineChart()
          line.title = "일자별 매출 (선)"
          line.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
          line.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=endRow))
          sheet.add_chart(line, "D20")

          pie = PieChart()
          pie.title = "일자별 매출 (파이)"
          pie.add_data(Reference(sheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
          pie.set_categories(Reference(sheet, min_col=1, min_row=2, max_row=endRow))
          sheet.add_chart(pie, ___)

          book.save(path)
          return path

      workdir = TemporaryDirectory()
      salesPath = buildSalesReport(
          Path(workdir.name) / "sales.xlsx",
          [("05-01", 120000), ("05-02", 80000), ("05-03", 95000), ("05-04", 130000)],
      )
      reopened = load_workbook(salesPath)
      assert len(reopened["sales"]._charts) == ___
      len(reopened["sales"]._charts)
    hints:
    - "anchor 문자열은 비어 있지 않은 셀 좌표여야 합니다. 'D38' 같이 다른 차트 아래로 보내세요."
  check:
    noError: PieChart 영역이 BarChart와 같은 데이터를 정확한 Reference로 잡아야 합니다.
    resultCheck: _charts 길이가 3이어야 합니다.
- id: practice
  title: 실습 - 종합 미션 2개
  structuredPrimary: true
  subtitle: import부터 검증까지 독립 실행
  goal: BarChart·LineChart·PieChart를 두 가지 보고서 시나리오에 결합한다.
  why: 차트는 한 시트에 표·막대·선이 함께 들어갔을 때 비로소 보고서다워집니다.
  explanation: |-
    미션1은 주간 매출 데이터를 BarChart + LineChart 두 차트로 한 시트에 배치합니다. 미션2는 분기별 매출 비중을 PieChart로 만들고 카테고리 이름과 퍼센트 라벨을 함께 표시합니다.
  tips:
  - 각 미션은 import문부터 시작합니다. 위 예제를 실행했다면 import는 생략해도 됩니다.
  - 변수 prefix는 `week*`(미션1), `pie*`(미션2)로 격리됩니다.
  snippet: |-
    from pathlib import Path
    from tempfile import TemporaryDirectory
    from openpyxl import Workbook, load_workbook
