    - 미션2 DataLabelList에 showPercent=True, showCatName=True.
  check:
    noError: Reference 영역이 데이터 범위와 일치해야 합니다.
    resultCheck: 재오픈 후 미션1은 _charts 길이 2, 미션2는 PieChart 1개 + 라벨 옵션 보존.
  blocks:
  - type: tip
    content: 두 차트를 같은 시트에 배치할 때는 anchor 셀을 충분히 떨어뜨려 둬야 시각적으로 겹치지 않습니다.
  - type: expansion
    title: "미션1: 주간 매출 - BarChart + LineChart 한 시트"
    blocks:
    - type: code
      title: 데이터 + 두 차트
      content: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        from openpyxl import Workbook, load_workbook
        from openpyxl.chart import BarChart, LineChart, Reference

        weekDir = TemporaryDirectory()
        weekPath = Path(weekDir.name) / "weekly.xlsx"

        weekBook = Workbook()
        weekSheet = weekBook.active
        weekSheet.title = "weekly"
        weekSheet.append(["day", "amount"])
        weekRows = [("Mon", 120000), ("Tue", 95000), ("Wed", 130000), ("Thu", 110000), ("Fri", 140000)]
        for row in weekRows:
            weekSheet.append(list(row))
        endRow = len(weekRows) + 1

        weekBar = BarChart()
        weekBar.title = "주간 매출 (막대)"
        weekBar.add_data(Reference(weekSheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
        weekBar.set_categories(Reference(weekSheet, min_col=1, min_row=2, max_row=endRow))
        weekSheet.add_chart(weekBar, "D2")

        weekLine = LineChart()
        weekLine.title = "주간 매출 (선)"
        weekLine.add_data(Reference(weekSheet, min_col=2, min_row=1, max_col=2, max_row=endRow), titles_from_data=True)
        weekLine.set_categories(Reference(weekSheet, min_col=1, min_row=2, max_row=endRow))
        weekSheet.add_chart(weekLine, "D20")
        weekBook.save(weekPath)
        len(weekSheet._charts)
    - type: code
      title: 차트 보존 검증
      content: |-
        weekReopen = load_workbook(weekPath)
        weekBack = weekReopen["weekly"]
        assert len(weekBack._charts) == 2
        len(weekBack._charts)
  - type: expansion
    title: "미션2: 분기별 비중 PieChart + 카테고리/퍼센트 라벨"
    blocks:
    - type: code
      title: 파이 차트 생성
      content: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        from openpyxl import Workbook, load_workbook
        from openpyxl.chart import PieChart, Reference
        from openpyxl.chart.label import DataLabelList

        pieDir = TemporaryDirectory()
        piePath = Path(pieDir.name) / "pie.xlsx"

        pieBook = Workbook()
        pieSheet = pieBook.active
        pieSheet.title = "quarter"
        pieSheet.append(["quarter", "amount"])
        for quarter, amount in [("Q1", 12500000), ("Q2", 18200000), ("Q3", 14700000), ("Q4", 21000000)]:
            pieSheet.append([quarter, amount])

        pieChart = PieChart()
        pieChart.title = "분기 매출 비중"
        pieChart.add_data(Reference(pieSheet, min_col=2, min_row=1, max_col=2, max_row=5), titles_from_data=True)
        pieChart.set_categories(Reference(pieSheet, min_col=1, min_row=2, max_row=5))
        pieChart.dataLabels = DataLabelList(showPercent=True, showCatName=True)
        pieSheet.add_chart(pieChart, "D2")
        pieBook.save(piePath)
        pieChart.dataLabels.showPercent, pieChart.dataLabels.showCatName
    - type: code
      title: 라벨 옵션 보존 검증
      content: |-
        pieReopen = load_workbook(piePath)
        pieBack = pieReopen["quarter"]
        assert len(pieBack._charts) == 1
        assert pieBack._charts[0].dataLabels.showPercent is True
        assert pieBack._charts[0].dataLabels.showCatName is True
        len(pieBack._charts), pieBack._charts[0].dataLabels.showPercent
- id: summary
  title: 정리
  subtitle: 차트는 표의 시각적 결론
  blocks:
  - type: text
    content: |-
      한 워크북 안에 표와 차트가 함께 있을 때 보고서는 완성됩니다. 데이터를 보는 시간이 줄고, 결론을 보는 시간이 늘어납니다. 다음 강의에서는 같은 보고서에 이미지와 하이퍼링크를 더해 양식을 완성합니다.
  - type: list
    style: bullet
    items:
    - "Reference(ws, min_col, min_row, max_col, max_row)로 데이터·카테고리 영역을 잡는다."
    - "titles_from_data=True로 첫 행을 시리즈 이름으로 자동 인식."
    - BarChart=카테고리 비교, LineChart=시간 흐름, PieChart=비율 구성.
    - DataLabelList(showPercent, showCatName)로 슬라이스 라벨 제어.
    - "ws.add_chart(chart, anchor) - anchor는 좌상단 셀 좌표 문자열."
