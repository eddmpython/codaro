    - 매일 같은 코드를 호출해 새 운동 데이터로 보고서를 재생성하는 자동화 사이클을 완성한다.
    - 트랙의 마지막 산출물로 본인의 실무 자동화에 그대로 가져갈 수 있는 템플릿을 확보한다.
  diagram:
