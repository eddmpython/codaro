meta:
  id: xlwings_01
  title: 첫 Excel 연결과 셀 R/W
  order: 1
  category: xlwings
  badge: 입문
  difficulty: easy
  audience: xlwings 소개를 마치고 라이브 Excel 제어를 시작하는 학습자
  packages:
    - xlwings
  tags:
    - xlwings
    - App
    - Book
    - Range
    - 셀읽기쓰기
    - 컨텍스트매니저
  seo:
    title: 첫 Excel 연결 - xlwings로 백그라운드 Excel 제어 시작
    description: with xw.App 컨텍스트로 백그라운드 Excel을 띄우고 셀 값을 안전하게 읽고 쓰는 첫 xlwings 프로젝트.
    keywords:
      - xlwings
