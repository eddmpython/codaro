    explanation: 브라우저의 격리된 Python Worker가 보이지 않던 정상·경계·오류 입력으로 함수를 다시 호출합니다.
    tips: &id001
    - PID와 정규화된 절대 workbook path를 함께 비교하세요.
    - 일치 항목이 정확히 하나가 아니면 자동화를 시작하지 마세요.
    exercise:
      prompt: select_excel_session(sessions, expected_pid, expected_path)를 완성하세요.
      starterCode: |-
        def select_excel_session(sessions, expected_pid, expected_path):
            raise NotImplementedError
      solution: |
        def select_excel_session(sessions, expected_pid, expected_path):
            matches = [item for item in sessions if item.get("pid") == expected_pid and item.get("workbookPath", "").lower() == expected_path.lower()]
            if len(matches) != 1:
                return {"selected": None, "matchCount": len(matches), "ready": False}
            selected = matches[0]
            return {"selected": {"pid": selected["pid"], "workbookPath": selected["workbookPath"]}, "matchCount": 1, "ready": True}
      hints: *id001
    check:
      id: python.xlwings.xlwings_01.excel-session-identity.mastery.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
