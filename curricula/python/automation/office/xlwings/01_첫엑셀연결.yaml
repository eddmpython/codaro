      solution: |
        def choose_session_evidence(stage):
            table = {'select': {'action': 'match pid and absolute workbook path', 'evidence': 'single target record', 'risk': 'wrong workbook'}, 'own': {'action': 'record who created app and workbook', 'evidence': 'ownership flags', 'risk': 'closing user work'}, 'cleanup': {'action': 'close only owned resources', 'evidence': 'ordered cleanup log', 'risk': 'orphan Excel process'}}
            if stage not in table:
                raise ValueError('unknown stage')
            return table[stage]
