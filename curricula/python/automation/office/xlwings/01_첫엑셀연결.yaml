          arguments:
          - value:
            - pid: 10
              workbookPath: C:/work/report.xlsx
          - value: 10
          - value: c:/work/report.xlsx
          expectedReturn:
            selected:
              pid: 10
              workbookPath: C:/work/report.xlsx
