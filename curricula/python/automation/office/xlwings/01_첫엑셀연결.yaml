intro:
  direction: with xw.App 컨텍스트로 백그라운드 Excel을 띄우고, 워크북을 만들고, 셀 한 칸과 가로 한 줄을 안전하게 읽고 쓰는 흐름을 완성한다.
  benefits:
    - "App → Book → Sheet → Range로 이어지는 xlwings 4단계 계층을 변수로 잡고 이해한다."
    - 좀비 Excel 프로세스 없이 자동화를 끝내는 컨텍스트 매니저 패턴을 첫 코드부터 굳힌다.
    - 단일 셀과 가로 한 줄(리스트)을 한 번에 쓰는 두 가지 R/W 방식을 비교해 다음 레슨의 2D 일괄 입력으로 이어진다.
    - 저장한 워크북을 다시 열어 값이 같은지 검증하는 round-trip 패턴을 첫 프로젝트부터 적용한다.
  diagram:
    steps:
      - label: 1단계. 워크북과 시트 계약 고정
        detail: 어떤 시트 이름, 어떤 셀 좌표, 어떤 값이 들어가야 하는지를 변수와 dict로 먼저 적는다.
      - label: 2단계. 백그라운드 App 띄우고 워크북 만들기
        detail: with xw.App(visible=False)로 Excel을 띄우고 books.add()로 새 워크북, sheet 이름 변경까지 한 번에.
      - label: 3단계. 셀 한 칸과 한 줄 쓰기
        detail: 단일 셀과 가로 한 줄 리스트 두 방식을 같은 시트에 써서 R/W의 차이를 직접 확인한다.
      - label: 4단계. 저장 후 다시 열어 round-trip 검증
        detail: 워크북을 닫은 뒤 다른 App에서 다시 열어 같은 값이 살아 있는지 assert로 비교한다.
    runtime:
      - label: xlwings 환경 확인
        detail: meta.packages의 xlwings가 import 가능해야 하고, Excel 본체가 설치되어 있어야 한다.
      - label: 임시 저장 경로 준비
        detail: TemporaryDirectory()로 학습용 xlsx 파일을 만들고 끝나면 자동 삭제되도록 한다.
      - label: 백그라운드 실행 확인
        detail: visible=False로 화면 가림 없이 실행하고 with 블록 종료 시 Excel 프로세스가 정리되었는지 확인한다.
sections:
  - id: lesson-contract
    title: 1단계. 워크북 계약 고정
    structuredPrimary: true
    subtitle: 시트 이름, 셀 좌표, 들어갈 값
    goal: 워크북에 어떤 시트가 있고 어떤 셀에 무엇이 들어가는지를 contract 딕셔너리로 먼저 적어 자동화의 기대값을 코드로 고정한다.
    why: 자동화 코드를 바로 작성하면 "값이 다른데 어디가 틀렸는지" 모르게 된다. 기대값을 먼저 변수로 두면 실패 위치가 명확해진다.
    explanation: |-
      좋은 자동화는 코드보다 계약(contract)이 먼저입니다. 계약은 "이 시트는 이 이름이어야 하고, A1에는 이 값이, 가로 한 줄에는 이 리스트가 들어가야 한다"는 기대값의 모음입니다.
      이 단계에서 작성한 contract는 이후 3단계에서 실제로 쓴 값과 비교하는 기준이 되고, 4단계의 round-trip 검증에서도 그대로 사용됩니다. 자동화가 실패하면 항상 "코드와 계약 중 어느 쪽이 맞는가"를 따져서 원인을 좁힐 수 있습니다.
    tips:
      - 계약은 가능한 한 작게 시작하세요. 첫 프로젝트는 셀 1개와 한 줄 1개로 충분합니다.
      - 시트 이름은 한국어, 영문, 공백 모두 가능하지만 첫 학습에서는 영문으로 두면 디버깅이 쉽습니다.
    snippet: |-
      contract = {
          "sheetName": "smoke",
          "titleCell": "A1",
          "titleValue": "xlwings 첫 연결",
          "headerCells": "B1:D1",
          "headerValues": ["product", "qty", "price"],
      }

      assert contract["titleCell"] == "A1"
      assert len(contract["headerValues"]) == 3
      contract
    exercise:
      prompt: 계약의 titleValue를 본인의 보고서 제목으로 바꾸고, headerValues에 컬럼 하나를 추가해 4개로 만드세요.
      starterCode: |-
        contract = {
            "sheetName": "smoke",
            "titleCell": "A1",
            "titleValue": "___",
            "headerCells": "B1:___",
            "headerValues": ["product", "qty", "price", "___"],
        }

        assert contract["titleValue"] == "___"
        assert len(contract["headerValues"]) == 4
        contract
      solution: |-
        contract = {
            "sheetName": "smoke",
            "titleCell": "A1",
            "titleValue": "2026 5월 매출 보고서",
            "headerCells": "B1:E1",
            "headerValues": ["product", "qty", "price", "amount"],
        }

        assert contract["titleValue"] == "2026 5월 매출 보고서"
        assert len(contract["headerValues"]) == 4
        contract
      hints:
        - headerValues가 4개가 되면 headerCells도 B1:E1으로 늘려야 가로 범위가 맞습니다.
        - titleValue 문자열과 assert 오른쪽 문자열은 정확히 같아야 합니다.
    check:
      noError: contract 딕셔너리와 두 assert가 KeyError나 IndexError 없이 평가되어야 합니다.
      resultCheck: headerValues의 길이가 headerCells 범위와 일치하고, titleValue가 계약 기준값과 같아야 합니다.

  - id: open-and-write
    title: 2단계. 백그라운드 App과 셀 쓰기
    structuredPrimary: true
    subtitle: with xw.App + books.add() + Range.value
    goal: with xw.App(visible=False) 컨텍스트로 백그라운드 Excel을 띄우고, 새 워크북에 시트 이름을 바꾼 뒤 단일 셀과 가로 한 줄을 같이 쓴다.
    why: 첫 자동화에서 컨텍스트 매니저 패턴을 굳히면 이후 모든 레슨에서 좀비 Excel 프로세스가 발생하지 않는다.
    explanation: |-
      xw.App(visible=False)은 화면에 창을 띄우지 않고 Excel 프로세스를 시작합니다. with 블록을 빠져나오는 순간 자동으로 app.quit()이 호출되어 프로세스가 정리되므로, 학습 단계에서 가장 안전한 방법입니다.
      app.books.add()는 새 빈 워크북을 만들고 활성 시트는 book.sheets.active로 접근합니다. sheet.name = "..."로 시트 이름을 바꾸고, sheet["A1"].value = ...로 단일 셀에 값을 씁니다.
      가로 한 줄을 쓸 때는 sheet["B1:D1"].value에 리스트를 통째로 대입하면 xlwings가 각 셀에 자동 분배합니다. 셀 하나씩 쓰는 것보다 훨씬 빠르고, 다음 레슨의 2D 일괄 입력으로 자연스럽게 이어집니다.
    tips:
      - sheet["A1"].value는 셀 한 칸을 읽고 쓰는 가장 짧은 표현입니다. sheet.range("A1").value도 같은 동작이지만 학습 단계에서는 짧은 쪽이 좋습니다.
      - 리스트를 가로 한 줄에 쓸 때 길이가 범위보다 짧으면 남은 셀이 None이 되니, 범위 폭과 리스트 길이를 맞추세요.
    snippet: |-
      import xlwings as xw

      contract = {
          "sheetName": "smoke",
          "titleCell": "A1",
          "titleValue": "xlwings 첫 연결",
          "headerCells": "B1:D1",
          "headerValues": ["product", "qty", "price"],
      }

      with xw.App(visible=False) as writeApp:
          writeBook = writeApp.books.add()
          writeSheet = writeBook.sheets.active
          writeSheet.name = contract["sheetName"]
          writeSheet[contract["titleCell"]].value = contract["titleValue"]
          writeSheet[contract["headerCells"]].value = contract["headerValues"]
          actualTitle = writeSheet[contract["titleCell"]].value
          actualHeaders = writeSheet[contract["headerCells"]].value

      assert actualTitle == contract["titleValue"]
      assert actualHeaders == contract["headerValues"]
      actualHeaders
    exercise:
      prompt: 계약을 본인 보고서 기준으로 바꾼 뒤, 시트 이름과 헤더 셀 위치를 바꿔 같은 가로 한 줄을 다른 행에 쓰세요.
      starterCode: |-
        import xlwings as xw

        contract = {
            "sheetName": "___",
            "titleCell": "A1",
            "titleValue": "___",
            "headerCells": "B___:D___",
            "headerValues": ["product", "qty", "price"],
        }

        with xw.App(visible=False) as writeApp:
            writeBook = writeApp.books.add()
            writeSheet = writeBook.sheets.active
            writeSheet.name = contract["sheetName"]
            writeSheet[contract["titleCell"]].value = contract["titleValue"]
            writeSheet[contract["headerCells"]].value = contract["headerValues"]
            actualTitle = writeSheet[contract["titleCell"]].value
            actualHeaders = writeSheet[contract["headerCells"]].value

        assert actualTitle == contract["titleValue"]
        assert actualHeaders == contract["headerValues"]
        actualHeaders
      solution: |-
        import xlwings as xw

        contract = {
            "sheetName": "report",
            "titleCell": "A1",
            "titleValue": "2026 5월 매출 보고서",
            "headerCells": "B3:D3",
            "headerValues": ["product", "qty", "price"],
        }

        with xw.App(visible=False) as writeApp:
            writeBook = writeApp.books.add()
            writeSheet = writeBook.sheets.active
            writeSheet.name = contract["sheetName"]
            writeSheet[contract["titleCell"]].value = contract["titleValue"]
            writeSheet[contract["headerCells"]].value = contract["headerValues"]
            actualTitle = writeSheet[contract["titleCell"]].value
            actualHeaders = writeSheet[contract["headerCells"]].value

        assert actualTitle == contract["titleValue"]
        assert actualHeaders == contract["headerValues"]
        actualHeaders
      hints:
        - headerCells 범위의 가로 폭이 headerValues 리스트 길이와 같아야 합니다.
        - 시트 이름은 영문 또는 한국어 문자열이면 되며, 다른 셀에 영향을 주지 않습니다.
    check:
      noError: with 블록 안의 sheet R/W가 NameError나 AttributeError 없이 끝나야 합니다.
      resultCheck: 셀에서 다시 읽은 값(actualTitle, actualHeaders)이 계약에 적은 기대값과 정확히 같아야 합니다.

  - id: save-and-reopen
    title: 3단계. 저장 후 다시 열어 round-trip 검증
    structuredPrimary: true
    subtitle: book.save → 새 App에서 books.open → 같은 값 확인
    goal: 워크북을 임시 경로에 저장하고, 다른 App에서 다시 열어 셀 값이 그대로 유지되는지 round-trip으로 검증한다.
    why: 자동화의 마지막 단계는 "프로세스가 끝난 뒤에도 결과가 살아있는지"다. 저장 직후 다시 열어 비교하면 인코딩 문제나 저장 실패를 가장 빠르게 잡을 수 있다.
    explanation: |-
      Excel 자동화에서 가장 신뢰할 수 있는 검증은 round-trip입니다. 같은 프로세스의 메모리에서 읽으면 당연히 같은 값이 나오지만, 파일로 저장한 뒤 새 프로세스에서 다시 열어 같은 값이 나와야 진짜로 자동화가 성공한 것입니다.
      book.save(path)는 워크북을 지정 경로에 저장하고, app.books.open(path)는 같은 또는 다른 App 인스턴스에서 그 파일을 엽니다. 학습 단계에서는 TemporaryDirectory를 써서 실습 후 자동으로 정리되도록 합니다.
      두 단계 모두 with xw.App() 블록 안에서 끝내야 두 번째 Excel 프로세스도 정리됩니다.
    tips:
      - 임시 경로는 Path(tempDir.name) / "smoke.xlsx"처럼 명확한 파일 이름을 붙이세요. 디버깅이 쉬워집니다.
      - book.save 뒤에 book.close()를 명시하지 않아도 with 블록이 정리하지만, 같은 App에서 여러 워크북을 다룰 때는 명시하는 편이 안전합니다.
    snippet: |-
      from pathlib import Path
      from tempfile import TemporaryDirectory
      import xlwings as xw

      contract = {
          "sheetName": "smoke",
          "titleCell": "A1",
          "titleValue": "xlwings 첫 연결",
          "headerCells": "B1:D1",
          "headerValues": ["product", "qty", "price"],
      }

      smokeTemp = TemporaryDirectory()
      smokePath = Path(smokeTemp.name) / "first_connect.xlsx"

      with xw.App(visible=False) as writeApp:
          writeBook = writeApp.books.add()
          writeSheet = writeBook.sheets.active
          writeSheet.name = contract["sheetName"]
          writeSheet[contract["titleCell"]].value = contract["titleValue"]
          writeSheet[contract["headerCells"]].value = contract["headerValues"]
          writeBook.save(str(smokePath))

      with xw.App(visible=False) as readApp:
          readBook = readApp.books.open(str(smokePath))
          readSheet = readBook.sheets[contract["sheetName"]]
          reopenedTitle = readSheet[contract["titleCell"]].value
          reopenedHeaders = readSheet[contract["headerCells"]].value
          readBook.close()

      assert smokePath.exists()
      assert reopenedTitle == contract["titleValue"]
      assert reopenedHeaders == contract["headerValues"]
      reopenedHeaders
    exercise:
      prompt: 저장 경로의 파일 이름을 본인이 자주 쓰는 보고서 이름으로 바꾸고, round-trip 후 같은 값이 나오는지 확인하세요.
      starterCode: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        import xlwings as xw

        contract = {
            "sheetName": "smoke",
            "titleCell": "A1",
            "titleValue": "xlwings 첫 연결",
            "headerCells": "B1:D1",
            "headerValues": ["product", "qty", "price"],
        }

        smokeTemp = TemporaryDirectory()
        smokePath = Path(smokeTemp.name) / "___.xlsx"

        with xw.App(visible=False) as writeApp:
            writeBook = writeApp.books.add()
            writeSheet = writeBook.sheets.active
            writeSheet.name = contract["sheetName"]
            writeSheet[contract["titleCell"]].value = contract["titleValue"]
            writeSheet[contract["headerCells"]].value = contract["headerValues"]
            writeBook.save(str(smokePath))

        with xw.App(visible=False) as readApp:
            readBook = readApp.books.open(str(smokePath))
            readSheet = readBook.sheets[contract["sheetName"]]
            reopenedTitle = readSheet[contract["titleCell"]].value
            reopenedHeaders = readSheet[contract["headerCells"]].value
            readBook.close()

        assert smokePath.exists()
        assert reopenedTitle == contract["titleValue"]
        assert reopenedHeaders == contract["headerValues"]
        reopenedHeaders
      solution: |-
        from pathlib import Path
        from tempfile import TemporaryDirectory
        import xlwings as xw

        contract = {
            "sheetName": "smoke",
            "titleCell": "A1",
            "titleValue": "xlwings 첫 연결",
            "headerCells": "B1:D1",
            "headerValues": ["product", "qty", "price"],
        }

        smokeTemp = TemporaryDirectory()
        smokePath = Path(smokeTemp.name) / "monthly_sales.xlsx"

        with xw.App(visible=False) as writeApp:
            writeBook = writeApp.books.add()
            writeSheet = writeBook.sheets.active
            writeSheet.name = contract["sheetName"]
            writeSheet[contract["titleCell"]].value = contract["titleValue"]
            writeSheet[contract["headerCells"]].value = contract["headerValues"]
            writeBook.save(str(smokePath))

        with xw.App(visible=False) as readApp:
            readBook = readApp.books.open(str(smokePath))
            readSheet = readBook.sheets[contract["sheetName"]]
            reopenedTitle = readSheet[contract["titleCell"]].value
            reopenedHeaders = readSheet[contract["headerCells"]].value
            readBook.close()

        assert smokePath.exists()
        assert reopenedTitle == contract["titleValue"]
        assert reopenedHeaders == contract["headerValues"]
        reopenedHeaders
      hints:
        - 파일 이름은 확장자 .xlsx를 그대로 유지하세요. xlwings는 확장자로 저장 형식을 판별합니다.
        - 같은 시트 이름으로 다시 열기 때문에 sheets[contract["sheetName"]] 호출이 KeyError 없이 동작해야 합니다.
    check:
      noError: 두 with 블록과 books.open, sheets 접근이 FileNotFoundError나 KeyError 없이 끝나야 합니다.
      resultCheck: round-trip 후 읽은 값이 처음에 쓴 값과 정확히 같고, 파일이 실제로 디스크에 존재해야 합니다.

  - id: practice
    title: 4단계. 실습
    subtitle: 연결-쓰기-저장-검증 사이클 직접 만들기
    blocks:
      - type: text
        content: |-
          앞에서 익힌 컨텍스트 매니저 패턴과 round-trip 검증을 본인 시나리오에 적용해 봅니다. 두 미션 모두 독립적으로 실행 가능하며, 각각 다른 contract와 시트 이름을 사용합니다.
      - type: tip
        content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되어 있으므로 import문은 생략해도 됩니다.
      - type: expansion
        title: "미션1: 매출 보고서 헤더 입력"
        blocks:
          - type: code
            title: 계약과 저장 경로 준비
            content: |-
              from pathlib import Path
              from tempfile import TemporaryDirectory
              import xlwings as xw

              salesContract = {
                  "sheetName": "sales",
                  "titleCell": "A1",
                  "titleValue": "2026 5월 매출 보고서",
                  "headerCells": "A3:D3",
                  "headerValues": ["date", "region", "product", "amount"],
              }
              salesTemp = TemporaryDirectory()
              salesPath = Path(salesTemp.name) / "sales_report.xlsx"
              salesPath
          - type: code
            title: 백그라운드 Excel에 쓰고 저장
            content: |-
              with xw.App(visible=False) as salesWriteApp:
                  salesBook = salesWriteApp.books.add()
                  salesSheet = salesBook.sheets.active
                  salesSheet.name = salesContract["sheetName"]
                  salesSheet[salesContract["titleCell"]].value = salesContract["titleValue"]
                  salesSheet[salesContract["headerCells"]].value = salesContract["headerValues"]
                  salesBook.save(str(salesPath))
              salesPath.exists()
          - type: code
            title: round-trip 검증
            content: |-
              with xw.App(visible=False) as salesReadApp:
                  salesReadBook = salesReadApp.books.open(str(salesPath))
                  salesReadSheet = salesReadBook.sheets[salesContract["sheetName"]]
                  salesTitle = salesReadSheet[salesContract["titleCell"]].value
                  salesHeaders = salesReadSheet[salesContract["headerCells"]].value
                  salesReadBook.close()

              assert salesTitle == salesContract["titleValue"]
              assert salesHeaders == salesContract["headerValues"]
              {"title": salesTitle, "headers": salesHeaders}
      - type: expansion
        title: "미션2: 재고 점검 시트 두 번 갱신"
        blocks:
          - type: code
            title: 첫 입력과 저장
            content: |-
              from pathlib import Path
              from tempfile import TemporaryDirectory
              import xlwings as xw

              stockContract = {
                  "sheetName": "stock",
                  "titleCell": "A1",
                  "titleValue": "재고 점검",
                  "headerCells": "A3:C3",
                  "headerValues": ["sku", "qty", "checked"],
              }
              stockTemp = TemporaryDirectory()
              stockPath = Path(stockTemp.name) / "stock_check.xlsx"

              with xw.App(visible=False) as stockApp:
                  stockBook = stockApp.books.add()
                  stockSheet = stockBook.sheets.active
                  stockSheet.name = stockContract["sheetName"]
                  stockSheet[stockContract["titleCell"]].value = stockContract["titleValue"]
                  stockSheet[stockContract["headerCells"]].value = stockContract["headerValues"]
                  stockBook.save(str(stockPath))
              stockPath.exists()
          - type: code
            title: 같은 파일을 다시 열어 첫 데이터 한 줄 추가
            content: |-
              firstRow = ["A001", 12, "ok"]
              with xw.App(visible=False) as stockReopen:
                  stockReBook = stockReopen.books.open(str(stockPath))
                  stockReSheet = stockReBook.sheets[stockContract["sheetName"]]
                  stockReSheet["A4:C4"].value = firstRow
                  stockReBook.save()
                  stockReBook.close()
              firstRow
          - type: code
            title: 다시 열어 한 줄과 헤더가 같이 있는지 확인
            content: |-
              with xw.App(visible=False) as stockVerifyApp:
                  stockVerifyBook = stockVerifyApp.books.open(str(stockPath))
                  stockVerifySheet = stockVerifyBook.sheets[stockContract["sheetName"]]
                  verifiedHeaders = stockVerifySheet[stockContract["headerCells"]].value
                  verifiedRow = stockVerifySheet["A4:C4"].value
                  stockVerifyBook.close()

              assert verifiedHeaders == stockContract["headerValues"]
              assert verifiedRow == firstRow
              {"headers": verifiedHeaders, "row": verifiedRow}

  - id: summary
    title: 정리
    subtitle: 다음 레슨으로 이어지는 R/W 감각
    blocks:
      - type: text
        content: |-
          이번 레슨에서 컨텍스트 매니저 → books.add → sheet rename → 셀과 가로 한 줄 쓰기 → save → 다른 App에서 round-trip 검증으로 이어지는 가장 기본적인 xlwings 사이클을 완성했습니다.
          다음 레슨에서는 같은 패턴 위에 2D 데이터(리스트 안의 리스트)를 한 번에 Range에 쓰는 일괄 입력으로 확장합니다. 가로 한 줄을 쓰는 방법을 익혔으므로, 세로 방향으로 여러 줄을 한 번에 쓰는 변형이 자연스럽게 이어집니다.
    goal: 계약-쓰기-저장-검증의 4단계 사이클을 한 번 완성한 채로 다음 레슨에 진입한다.
    why: 자동화 사이클을 첫 레슨에 굳히면 이후 10개 프로젝트 내내 같은 골격에 새 개념만 추가하면 된다.
