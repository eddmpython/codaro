intro:
  direction: 올림픽 종목별로 시트가 나뉜 워크북을 만들고, sheets 컬렉션을 순회하며 각 종목의 메달 표를 자동 인식한 뒤 국가별 메달 집계 시트를 추가한다.
  benefits:
    - "sheets 컬렉션을 순회·추가·삭제하는 방법을 익혀 여러 시트가 있는 워크북을 다룰 수 있다."
    - "expand(\"table\")을 sheets 순회와 결합해 종목마다 다른 행 수의 표를 자동으로 읽는다."
    - 종목별 메달을 모아 국가별 통합 집계 시트를 자동 생성하는 패턴을 실무 자동화의 기본 형태로 익힌다.
    - 다음 레슨의 pandas DataFrame 왕복으로 자연스럽게 연결되는 데이터 구조를 만든다.
  diagram:
    steps:
      - label: 1단계. 종목별 메달 시트 3개 생성
        detail: 수영·육상·체조 세 종목의 국가별 금/은/동 메달 수를 각 시트에 입력한다.
      - label: 2단계. sheets 컬렉션 순회
        detail: book.sheets를 for 루프로 순회하며 각 시트 이름과 expand로 인식한 영역을 확인한다.
      - label: 3단계. 종목별 메달 합을 국가별로 묶기
        detail: 각 종목의 행을 모아 국가별 총 메달 수를 계산하고 새 시트에 입력한다.
      - label: 4단계. round-trip 검증
        detail: 저장 후 다시 열어 sheets 목록과 통합 시트의 합계가 그대로 살아 있는지 확인한다.
    runtime:
      - label: xlwings 패키지 확인
        detail: meta.packages의 xlwings가 import 가능해야 한다.
      - label: 종목별 데이터 정의
        detail: 3개 종목, 각 종목당 3-4개국의 메달 수를 list-of-lists로 준비한다.
      - label: 임시 저장 경로
        detail: TemporaryDirectory에 olympics.xlsx를 만들고 끝나면 자동 삭제한다.
sections:
  - id: build-events
    title: 1단계. 종목별 메달 시트 3개 생성
    structuredPrimary: true
    subtitle: sheets.add와 dict 순회
    goal: 종목별 메달 데이터를 dict로 잡고, sheets.add로 각 종목 시트를 만든 뒤 2D 일괄 입력으로 채운다.
    why: 올림픽 결과처럼 한 워크북에 여러 카테고리가 들어가는 데이터는 시트 단위로 분리하는 것이 가장 자연스럽다. dict + for 루프가 그 자동화의 기본형이다.
    explanation: |-
      app.books.add()로 만든 새 워크북에는 기본 시트가 하나 있습니다. book.sheets.add(name)으로 시트를 추가할 수 있고, 이미 같은 이름의 시트가 있으면 ValueError가 납니다.
      이번 단계에서는 종목명을 키, 메달 표를 값으로 갖는 dict를 만들고, dict를 for 루프로 순회하며 시트를 추가합니다. 첫 번째 시트는 워크북에 이미 있는 기본 시트를 이름만 바꿔 재활용합니다.
      각 시트에는 헤더 한 줄(country, gold, silver, bronze)과 국가별 메달 수 데이터 행을 2D 리스트로 한 번에 입력합니다.
    tips:
      - 기본 시트는 sheets[0] 또는 sheets.active로 접근합니다. 첫 종목에만 재활용하고, 나머지는 sheets.add로 추가합니다.
      - 시트 이름은 book 안에서 unique해야 합니다. 같은 이름으로 추가하면 ValueError가 발생합니다.
      - 종목별로 참가 국가 수가 다른 것이 정상입니다. 이후 expand가 행 수를 자동 처리하므로 데이터 그대로 입력하면 됩니다.
    snippet: |-
      import xlwings as xw

      eventMedals = {
          "swimming": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 9, 8, 7],
              ["Australia", 7, 4, 6],
              ["China", 2, 3, 1],
          ],
          "athletics": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 14, 11, 9],
              ["Kenya", 4, 2, 5],
              ["Jamaica", 1, 3, 2],
              ["Ethiopia", 1, 1, 2],
          ],
          "gymnastics": [
              ["country", "gold", "silver", "bronze"],
              ["China", 3, 3, 2],
              ["Japan", 2, 3, 2],
              ["USA", 1, 2, 4],
          ],
      }

      with xw.App(visible=False) as eventApp:
          eventBook = eventApp.books.add()
          eventNames = list(eventMedals.keys())
          firstEvent = eventNames[0]
          eventBook.sheets[0].name = firstEvent
          eventBook.sheets[firstEvent]["A1"].value = eventMedals[firstEvent]
          for laterEvent in eventNames[1:]:
              addedSheet = eventBook.sheets.add(laterEvent, after=eventBook.sheets[-1])
              addedSheet["A1"].value = eventMedals[laterEvent]
          sheetNames = [s.name for s in eventBook.sheets]

      assert sheetNames == ["swimming", "athletics", "gymnastics"]
      sheetNames
    exercise:
      prompt: eventMedals에 "cycling" 종목을 추가하고, 워크북의 시트가 4개로 늘어났는지 확인하세요.
      starterCode: |-
        import xlwings as xw

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
            "gymnastics": [
                ["country", "gold", "silver", "bronze"],
                ["China", 3, 3, 2],
            ],
            "cycling": [
                ["country", "gold", "silver", "bronze"],
                ["___", ___, ___, ___],
            ],
        }

        with xw.App(visible=False) as eventApp:
            eventBook = eventApp.books.add()
            eventNames = list(eventMedals.keys())
            firstEvent = eventNames[0]
            eventBook.sheets[0].name = firstEvent
            eventBook.sheets[firstEvent]["A1"].value = eventMedals[firstEvent]
            for laterEvent in eventNames[1:]:
                eventBook.sheets.add(laterEvent, after=eventBook.sheets[-1])["A1"].value = eventMedals[laterEvent]
            sheetNames = [s.name for s in eventBook.sheets]

        assert len(sheetNames) == 4
        assert "cycling" in sheetNames
        sheetNames
      solution: |-
        import xlwings as xw

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
            "gymnastics": [
                ["country", "gold", "silver", "bronze"],
                ["China", 3, 3, 2],
            ],
            "cycling": [
                ["country", "gold", "silver", "bronze"],
                ["Netherlands", 5, 4, 3],
            ],
        }

        with xw.App(visible=False) as eventApp:
            eventBook = eventApp.books.add()
            eventNames = list(eventMedals.keys())
            firstEvent = eventNames[0]
            eventBook.sheets[0].name = firstEvent
            eventBook.sheets[firstEvent]["A1"].value = eventMedals[firstEvent]
            for laterEvent in eventNames[1:]:
                eventBook.sheets.add(laterEvent, after=eventBook.sheets[-1])["A1"].value = eventMedals[laterEvent]
            sheetNames = [s.name for s in eventBook.sheets]

        assert len(sheetNames) == 4
        assert "cycling" in sheetNames
        sheetNames
      hints:
        - dict의 키 순서가 시트 추가 순서가 됩니다. cycling이 마지막 키이면 가장 오른쪽 시트가 됩니다.
        - 새 종목의 행 데이터에는 헤더와 같은 컬럼 수(4개)가 들어가야 합니다.
    check:
      noError: sheets.add와 dict 순회가 ValueError 없이 끝나야 합니다.
      resultCheck: 시트 이름 목록이 dict의 키 순서와 같고 새 종목이 포함되어야 합니다.

  - id: iterate-and-expand
    title: 2단계. sheets 순회와 expand로 영역 자동 인식
    structuredPrimary: true
    subtitle: book.sheets for 루프
    goal: book.sheets를 순회하며 각 시트의 "A1".expand("table")로 영역을 자동 인식하고 종목별 참가 국가 수와 금메달 합을 계산한다.
    why: 종목마다 참가 국가 수가 다르다. expand와 sheets 순회를 합치면 종목 수와 국가 수가 달라도 같은 코드가 동작한다.
    explanation: |-
      book.sheets는 시트 컬렉션이고, for sheet in book.sheets: 처럼 직접 순회할 수 있습니다. 각 시트에서 ["A1"].expand("table")로 표 영역을 잡으면 종목별로 다른 국가 수가 자동 처리됩니다.
      읽은 값은 헤더 한 줄과 데이터 N줄로 구성된 list-of-lists입니다. 헤더를 빼고 데이터 행에서 두 번째 컬럼(gold)만 모아 합을 계산하면 종목별 총 금메달 수가 나옵니다.
      모든 처리를 with xw.App 블록 안에서 끝내야 Excel 프로세스가 정리됩니다.
    tips:
      - sheets[name] 접근과 for sheet in sheets는 모두 가능합니다. 순회 시에는 후자가 더 짧습니다.
      - 데이터 행에서 특정 컬럼만 뽑는 [row[N] for row in dataRows] 패턴은 자주 쓰입니다.
    snippet: |-
      import xlwings as xw

      eventMedals = {
          "swimming": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 9, 8, 7],
              ["Australia", 7, 4, 6],
              ["China", 2, 3, 1],
          ],
          "athletics": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 14, 11, 9],
              ["Kenya", 4, 2, 5],
              ["Jamaica", 1, 3, 2],
              ["Ethiopia", 1, 1, 2],
          ],
          "gymnastics": [
              ["country", "gold", "silver", "bronze"],
              ["China", 3, 3, 2],
              ["Japan", 2, 3, 2],
              ["USA", 1, 2, 4],
          ],
      }

      with xw.App(visible=False) as scanApp:
          scanBook = scanApp.books.add()
          scanNames = list(eventMedals.keys())
          scanBook.sheets[0].name = scanNames[0]
          scanBook.sheets[scanNames[0]]["A1"].value = eventMedals[scanNames[0]]
          for later in scanNames[1:]:
              scanBook.sheets.add(later)["A1"].value = eventMedals[later]

          eventStats = {}
          for sheet in scanBook.sheets:
              tableValues = sheet["A1"].expand("table").value
              dataRows = tableValues[1:]
              goldTotal = sum(row[1] for row in dataRows)
              eventStats[sheet.name] = {"participants": len(dataRows), "goldTotal": int(goldTotal)}

      assert eventStats["swimming"]["participants"] == 3
      assert eventStats["athletics"]["goldTotal"] == 20
      eventStats
    exercise:
      prompt: 코드를 수정해 각 종목의 동메달(bronze) 합도 같이 계산해서 eventStats에 "bronzeTotal" 키로 추가하세요. dict 합치는 패턴을 직접 다뤄봅니다.
      starterCode: |-
        import xlwings as xw

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
        }

        with xw.App(visible=False) as scanApp:
            scanBook = scanApp.books.add()
            scanNames = list(eventMedals.keys())
            scanBook.sheets[0].name = scanNames[0]
            scanBook.sheets[scanNames[0]]["A1"].value = eventMedals[scanNames[0]]
            for later in scanNames[1:]:
                scanBook.sheets.add(later)["A1"].value = eventMedals[later]

            eventStats = {}
            for sheet in scanBook.sheets:
                tableValues = sheet["A1"].expand("table").value
                dataRows = tableValues[1:]
                eventStats[sheet.name] = {
                    "participants": len(dataRows),
                    "goldTotal": int(sum(row[1] for row in dataRows)),
                    "bronzeTotal": int(sum(row[___] for row in dataRows)),
                }

        assert eventStats["swimming"]["bronzeTotal"] == 13
        assert eventStats["athletics"]["bronzeTotal"] == 14
        eventStats
      solution: |-
        import xlwings as xw

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
        }

        with xw.App(visible=False) as scanApp:
            scanBook = scanApp.books.add()
            scanNames = list(eventMedals.keys())
            scanBook.sheets[0].name = scanNames[0]
            scanBook.sheets[scanNames[0]]["A1"].value = eventMedals[scanNames[0]]
            for later in scanNames[1:]:
                scanBook.sheets.add(later)["A1"].value = eventMedals[later]

            eventStats = {}
            for sheet in scanBook.sheets:
                tableValues = sheet["A1"].expand("table").value
                dataRows = tableValues[1:]
                eventStats[sheet.name] = {
                    "participants": len(dataRows),
                    "goldTotal": int(sum(row[1] for row in dataRows)),
                    "bronzeTotal": int(sum(row[3] for row in dataRows)),
                }

        assert eventStats["swimming"]["bronzeTotal"] == 13
        assert eventStats["athletics"]["bronzeTotal"] == 14
        eventStats
      hints:
        - 컬럼 순서가 [country, gold, silver, bronze]이므로 bronze는 인덱스 3입니다.
        - row[3]으로 동메달 수를 뽑아 합치면 됩니다.
    check:
      noError: sheets 순회와 expand 호출이 KeyError 없이 끝나야 합니다.
      resultCheck: 각 종목의 participants가 데이터 행 수와 같고, goldTotal/bronzeTotal이 실제 합과 일치해야 합니다.

  - id: cross-event-summary
    title: 3단계. 국가별 통합 메달 집계 시트
    structuredPrimary: true
    subtitle: defaultdict로 종목 가로지르기
    goal: 모든 종목 시트를 합쳐 국가별 총 메달 수(금/은/동)를 계산하고, 새 "summary" 시트에 정렬된 표로 입력한다.
    why: 자동화의 최종 산출물은 보통 "통합 요약"이다. 각 시트의 부분 결과를 한 곳에 모으는 패턴이 실무 자동화의 80%를 차지한다.
    explanation: |-
      종목별 시트에는 "어떤 종목에서 어떤 국가가 몇 개"의 메달을 땄는지가 들어 있습니다. 통합 집계 시트는 "한 국가가 모든 종목에서 총 몇 개"의 메달을 땄는지 보여줘야 합니다.
      이번에는 collections.defaultdict를 써서 국가별 메달 수를 누적합니다. 모든 시트를 순회하며 각 행에서 country를 키로 잡고 gold/silver/bronze를 누적합니다.
      마지막으로 dict를 [국가, 금, 은, 동] 행으로 변환하고 gold 기준으로 정렬한 뒤 새 시트에 입력합니다.
    tips:
      - "defaultdict(lambda: [0, 0, 0])으로 시작하면 처음 보는 국가도 자동으로 [0,0,0]에서 시작합니다."
      - "sorted(items, key=lambda x: -x[1][0])로 gold 내림차순 정렬."
      - "sheets.add(name, after=sheets[-1])로 마지막 위치에 추가."
    snippet: |-
      import xlwings as xw
      from collections import defaultdict

      eventMedals = {
          "swimming": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 9, 8, 7],
              ["Australia", 7, 4, 6],
              ["China", 2, 3, 1],
          ],
          "athletics": [
              ["country", "gold", "silver", "bronze"],
              ["USA", 14, 11, 9],
              ["Kenya", 4, 2, 5],
              ["Jamaica", 1, 3, 2],
          ],
          "gymnastics": [
              ["country", "gold", "silver", "bronze"],
              ["China", 3, 3, 2],
              ["Japan", 2, 3, 2],
              ["USA", 1, 2, 4],
          ],
      }

      with xw.App(visible=False) as summaryApp:
          summaryBook = summaryApp.books.add()
          eventList = list(eventMedals.keys())
          summaryBook.sheets[0].name = eventList[0]
          summaryBook.sheets[eventList[0]]["A1"].value = eventMedals[eventList[0]]
          for later in eventList[1:]:
              summaryBook.sheets.add(later)["A1"].value = eventMedals[later]

          countryMedals = defaultdict(lambda: [0, 0, 0])
          for sheet in summaryBook.sheets:
              for row in sheet["A1"].expand("table").value[1:]:
                  country, g, s, b = row[0], int(row[1]), int(row[2]), int(row[3])
                  countryMedals[country][0] += g
                  countryMedals[country][1] += s
                  countryMedals[country][2] += b

          sortedRows = sorted(countryMedals.items(), key=lambda x: -x[1][0])
          summaryTable = [["country", "gold", "silver", "bronze"]] + [[c, *medals] for c, medals in sortedRows]

          summarySheet = summaryBook.sheets.add("summary", after=summaryBook.sheets[-1])
          summarySheet["A1"].value = summaryTable
          readBack = summarySheet["A1"].expand("table").value

      assert readBack[0] == ["country", "gold", "silver", "bronze"]
      assert readBack[1][0] == "USA"
      assert int(readBack[1][1]) == 24
      readBack
    exercise:
      prompt: 통합 표의 가장 아래에 "TOTAL" 행을 추가해서 모든 국가의 금/은/동 합계가 한 줄에 보이도록 만드세요.
      starterCode: |-
        import xlwings as xw
        from collections import defaultdict

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
        }

        with xw.App(visible=False) as summaryApp:
            summaryBook = summaryApp.books.add()
            eventList = list(eventMedals.keys())
            summaryBook.sheets[0].name = eventList[0]
            summaryBook.sheets[eventList[0]]["A1"].value = eventMedals[eventList[0]]
            for later in eventList[1:]:
                summaryBook.sheets.add(later)["A1"].value = eventMedals[later]

            countryMedals = defaultdict(lambda: [0, 0, 0])
            for sheet in summaryBook.sheets:
                for row in sheet["A1"].expand("table").value[1:]:
                    country, g, s, b = row[0], int(row[1]), int(row[2]), int(row[3])
                    countryMedals[country][0] += g
                    countryMedals[country][1] += s
                    countryMedals[country][2] += b

            sortedRows = sorted(countryMedals.items(), key=lambda x: -x[1][0])
            goldGrand = sum(m[0] for m in countryMedals.values())
            silverGrand = sum(m[1] for m in countryMedals.values())
            bronzeGrand = sum(m[2] for m in countryMedals.values())
            summaryTable = (
                [["country", "gold", "silver", "bronze"]]
                + [[c, *medals] for c, medals in sortedRows]
                + [["___", goldGrand, silverGrand, bronzeGrand]]
            )

            summarySheet = summaryBook.sheets.add("summary", after=summaryBook.sheets[-1])
            summarySheet["A1"].value = summaryTable
            readBack = summarySheet["A1"].expand("table").value

        assert readBack[-1][0] == "TOTAL"
        assert int(readBack[-1][1]) == goldGrand
        readBack
      solution: |-
        import xlwings as xw
        from collections import defaultdict

        eventMedals = {
            "swimming": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 9, 8, 7],
                ["Australia", 7, 4, 6],
            ],
            "athletics": [
                ["country", "gold", "silver", "bronze"],
                ["USA", 14, 11, 9],
                ["Kenya", 4, 2, 5],
            ],
        }

        with xw.App(visible=False) as summaryApp:
            summaryBook = summaryApp.books.add()
            eventList = list(eventMedals.keys())
            summaryBook.sheets[0].name = eventList[0]
            summaryBook.sheets[eventList[0]]["A1"].value = eventMedals[eventList[0]]
            for later in eventList[1:]:
                summaryBook.sheets.add(later)["A1"].value = eventMedals[later]

            countryMedals = defaultdict(lambda: [0, 0, 0])
            for sheet in summaryBook.sheets:
                for row in sheet["A1"].expand("table").value[1:]:
                    country, g, s, b = row[0], int(row[1]), int(row[2]), int(row[3])
                    countryMedals[country][0] += g
                    countryMedals[country][1] += s
                    countryMedals[country][2] += b

            sortedRows = sorted(countryMedals.items(), key=lambda x: -x[1][0])
            goldGrand = sum(m[0] for m in countryMedals.values())
            silverGrand = sum(m[1] for m in countryMedals.values())
            bronzeGrand = sum(m[2] for m in countryMedals.values())
            summaryTable = (
                [["country", "gold", "silver", "bronze"]]
                + [[c, *medals] for c, medals in sortedRows]
                + [["TOTAL", goldGrand, silverGrand, bronzeGrand]]
            )

            summarySheet = summaryBook.sheets.add("summary", after=summaryBook.sheets[-1])
            summarySheet["A1"].value = summaryTable
            readBack = summarySheet["A1"].expand("table").value

        assert readBack[-1][0] == "TOTAL"
        assert int(readBack[-1][1]) == goldGrand
        readBack
      hints:
        - 합계 행의 첫 컬럼에 "TOTAL"을 넣고, 나머지 세 컬럼에 누적 금/은/동을 넣습니다.
        - sum(m[0] for m in countryMedals.values())은 모든 국가의 금메달 합입니다.
    check:
      noError: defaultdict와 sort, 합계 행 추가가 ValueError 없이 끝나야 합니다.
      resultCheck: summary 시트의 마지막 행에 TOTAL 라벨과 누적 금/은/동이 들어가 있고, 모든 시트의 합과 일치해야 합니다.

  - id: practice
    title: 4단계. 실습
    subtitle: 시트 탐색과 통합 요약 직접 만들기
    blocks:
      - type: text
        content: |-
          이번 두 미션은 sheets 컬렉션을 활용한 두 가지 자동화 패턴을 다룹니다. 각 미션은 다른 시나리오를 독립적으로 다룹니다.
      - type: tip
        content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되어 있으므로 import문은 생략해도 됩니다.
      - type: expansion
        title: "미션1: 도시별 날씨 측정치 통합"
        blocks:
          - type: code
            title: 도시별 데이터와 시트 생성
            content: |-
              import xlwings as xw
              from pathlib import Path
              from tempfile import TemporaryDirectory

              cityWeather = {
                  "seoul": [
                      ["date", "tempC", "rainMm"],
                      ["2026-05-01", 22.4, 0.0],
                      ["2026-05-02", 23.1, 1.2],
                      ["2026-05-03", 19.8, 8.4],
                  ],
                  "busan": [
                      ["date", "tempC", "rainMm"],
                      ["2026-05-01", 21.9, 0.0],
                      ["2026-05-02", 24.5, 0.0],
                  ],
                  "jeju": [
                      ["date", "tempC", "rainMm"],
                      ["2026-05-01", 23.8, 2.1],
                      ["2026-05-02", 22.6, 5.8],
                      ["2026-05-03", 21.4, 12.3],
                      ["2026-05-04", 24.1, 0.0],
                  ],
              }
              cityTemp = TemporaryDirectory()
              cityPath = Path(cityTemp.name) / "city_weather.xlsx"

              with xw.App(visible=False) as cityApp:
                  cityBook = cityApp.books.add()
                  cityNames = list(cityWeather.keys())
                  cityBook.sheets[0].name = cityNames[0]
                  cityBook.sheets[cityNames[0]]["A1"].value = cityWeather[cityNames[0]]
                  for nm in cityNames[1:]:
                      cityBook.sheets.add(nm)["A1"].value = cityWeather[nm]
                  cityBook.save(str(cityPath))
              cityPath.exists()
          - type: code
            title: 다시 열어 도시별 강수량 합계
            content: |-
              with xw.App(visible=False) as cityReadApp:
                  cityReadBook = cityReadApp.books.open(str(cityPath))
                  cityRainfall = {}
                  for citySheet in cityReadBook.sheets:
                      cityRows = citySheet["A1"].expand("table").value[1:]
                      cityRainfall[citySheet.name] = round(sum(r[2] for r in cityRows), 1)
                  cityReadBook.close()

              assert cityRainfall["seoul"] == 9.6
              assert cityRainfall["jeju"] == 20.2
              cityRainfall
      - type: expansion
        title: "미션2: 시트 삭제와 재정렬"
        blocks:
          - type: code
            title: 시트 5개 만들고 일부 삭제 + 재정렬
            content: |-
              import xlwings as xw

              with xw.App(visible=False) as orderApp:
                  orderBook = orderApp.books.add()
                  for name in ["draft", "review", "final", "archive", "notes"]:
                      if orderBook.sheets[0].name in {"Sheet1", "Sheet"}:
                          orderBook.sheets[0].name = name
                      else:
                          orderBook.sheets.add(name)
                  orderBook.sheets["notes"].delete()
                  orderBook.sheets["draft"].delete()
                  orderBook.sheets["final"].api.Move(Before=orderBook.sheets[0].api)
                  finalNames = [s.name for s in orderBook.sheets]

              assert finalNames[0] == "final"
              assert "notes" not in finalNames
              assert "draft" not in finalNames
              finalNames

  - id: summary
    title: 정리
    subtitle: 여러 시트를 다루는 감각
    blocks:
      - type: text
        content: |-
          이번 레슨에서 dict + sheets.add로 여러 시트를 한 번에 만들고, sheets 순회 + expand로 각 시트의 표를 동적으로 읽고, defaultdict로 국가별 통합 집계 시트를 만드는 자동화 패턴을 완성했습니다.
          다음 레슨에서는 같은 데이터를 pandas DataFrame과 양방향으로 변환하는 options() 컨버터를 배웁니다. list-of-lists로 다루던 표를 진짜 분석 가능한 DataFrame으로 끌어올립니다.
    goal: 다중 시트 워크북을 만들고 요약하는 패턴을 한 번 완성한 채로 다음 레슨에 진입한다.
    why: 이 패턴은 월별 보고서, 부서별 정산, 종목별 통계 등 실무 자동화의 가장 흔한 모양이다.
