        def choose_monthly_merge_evidence(stage):
            table = {'admit': {'action': 'validate hash period schema', 'evidence': 'source admission ledger', 'risk': 'duplicate or stale input'}, 'merge': {'action': 'preserve source identity per row', 'evidence': 'row provenance', 'risk': 'untraceable records'}, 'reconcile': {'action': 'compare rows totals source hashes', 'evidence': 'merge report', 'risk': 'silent omission'}}
