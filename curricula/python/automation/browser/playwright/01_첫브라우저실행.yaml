    title: 첫 탐색의 status·origin·redirect 증거 판정하기
    subtitle: 새 입력으로 핵심 분석 재현
    goal: 응답 연쇄에서 최종 URL과 HTTP 실패, origin 이탈을 함께 찾는다.
    why: worked example을 복사하지 않고 새 레코드에서 같은 분석 판단을 재현해야 개념 숙달을 확인할 수 있습니다.
    explanation: 브라우저의 격리된 Python Worker가 보이지 않던 정상·경계·오류 입력으로 함수를 다시 호출합니다.
    tips: &id001
    - page가 열렸다는 사실 외에 response status와 최종 origin을 검사하세요.
    - 허용한 redirect chain과 의도하지 않은 외부 이동을 구분하세요.
    exercise:
      prompt: audit_navigation(responses, allowed_origins)를 완성하세요.
      starterCode: |-
        def audit_navigation(responses, allowed_origins):
            raise NotImplementedError
      solution: |
        def audit_navigation(responses, allowed_origins):
            from urllib.parse import urlsplit
            if not responses:
                raise ValueError("empty response chain")
            failures = []
            hops = []
            for response in responses:
                url = response["url"]
                parts = urlsplit(url)
                origin = f"{parts.scheme}://{parts.netloc}"
                hops.append({"url": url, "status": response["status"], "origin": origin})
                if response["status"] >= 400:
                    failures.append(f"http-{response['status']}")
                if origin not in allowed_origins:
                    failures.append("origin")
            final = hops[-1]
            return {"ok": not failures, "finalUrl": final["url"], "finalStatus": final["status"], "hops": len(hops), "failures": failures}
      hints: *id001
    check:
      id: python.playwright.playwright_01.navigation-result-audit.mastery.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.playwright.playwright_01.navigation-result-audit.mastery.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
