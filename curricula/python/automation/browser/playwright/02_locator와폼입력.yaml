      hints:
        - fill, expect, assert 안의 이름을 모두 같은 값으로 맞춥니다.
        - completed는 폼 자동화가 끝났다는 완료 신호입니다.
    check:
      noError: 담당자 입력, 저장 클릭, report 생성이 오류 없이 끝나야 합니다.
      resultCheck: report의 owner 값이 입력한 담당자 이름과 같아야 합니다.
