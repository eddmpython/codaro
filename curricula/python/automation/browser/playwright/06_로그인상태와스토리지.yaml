        - completion은 파일 존재와 세션 복원 두 조건을 모두 확인합니다.
    check:
      noError: storage_state 저장과 새 context 복원이 오류 없이 완료되어야 합니다.
      resultCheck: completion이 상태 파일 존재와 세션 쿠키 복원을 모두 True로 보여야 합니다.
assessment:
  schemaVersion: 1
  performanceClaim: 웹에서는 외부 패키지 없이 분석 판단과 데이터 계약을 검증하고, 실제 패키지 API와 산출물은 lesson Run 및 Local 실습 증거로 분리합니다.
  tierParity:
    web: portable-concept
    local: package-practice-and-artifact
  supportPolicy: 첫 실패는 실제 반환값과 계약 차이를 inline으로 보여주고 정답 전체는 자동 노출하지 않습니다.
  authoring:
    source: curated-blueprint
    solutionVerification: required
    independentReview: pending
  masteryVariants:
  - id: playwright_06-storage-state-redaction-mastery
    mode: mastery
    unseen: true
    claimScope: portable-concept
    reviewStatus: machine-verified-pending-independent-review
    sourceSectionIds:
    - cookie-state
    - reuse-state-completion
    title: 로그인 storage state에서 비밀값 제거하기
    subtitle: 새 입력으로 핵심 분석 재현
    goal: cookie와 local storage의 민감한 이름을 보존 가능한 redacted 값으로 바꾼다.
    why: worked example을 복사하지 않고 새 레코드에서 같은 분석 판단을 재현해야 개념 숙달을 확인할 수 있습니다.
    explanation: 브라우저의 격리된 Python Worker가 보이지 않던 정상·경계·오류 입력으로 함수를 다시 호출합니다.
    tips: &id001
    - storage state 파일을 screenshot이나 trace보다 먼저 민감 정보로 취급하세요.
    - 값을 삭제해 구조를 숨기기보다 redacted marker로 검토 가능성을 남기세요.
    exercise:
      prompt: redact_storage_state(state, secret_names)를 완성하세요.
      starterCode: |-
        def redact_storage_state(state, secret_names):
            raise NotImplementedError
      solution: |
        def redact_storage_state(state, secret_names):
            secrets = {name.lower() for name in secret_names}
            cookies = []
            redacted = 0
            for cookie in state.get("cookies", []):
                item = dict(cookie)
                if item.get("name", "").lower() in secrets:
                    item["value"] = "[REDACTED]"
                    redacted += 1
                cookies.append(item)
            origins = []
            for origin in state.get("origins", []):
                item = {"origin": origin["origin"], "localStorage": []}
                for value in origin.get("localStorage", []):
                    stored = dict(value)
                    if stored.get("name", "").lower() in secrets:
