  id: requests_11
  title: 사업자등록 상태조회 - 세금계산서 발행 차단 리스트 자동화
  order: 11
  category: requests
  difficulty: ⭐⭐
  badge: 실전
  packages:
    - requests
  tags:
    - 국세청
    - 사업자등록
    - 진위확인
    - 상태조회
    - 공공데이터포털
  outcomes:
    - automation.webApi.businessStatus
  prerequisites:
    - automation.webApi.get
  estimatedMinutes: 45
  seo:
    title: "사업자등록 상태조회 자동화 - 국세청 Open API로 휴폐업·과세유형 일괄 확인"
    description: "공공데이터포털 국세청 사업자등록 상태조회 Open API를 requests로 호출해 거래처 휴업·폐업·면세·미등록을 일괄 분류하고, 세금계산서 발행 차단 리스트를 자동 생성한다."
