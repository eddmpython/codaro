      solution: |-
        import csv
        import io

        STATUS_BY_CODE = {"01": "계속", "02": "휴업", "03": "폐업"}

        vendorCsv = "b_no,name\n1234567890,정상상사\n2345678901,폐업상사\n4567890123,면세상사\n"
        sampleData = [
            {"b_no": "1234567890", "b_stt_cd": "03", "tax_type": "부가가치세 일반과세자"},
            {"b_no": "2345678901", "b_stt_cd": "03", "tax_type": "부가가치세 일반과세자"},
            {"b_no": "4567890123", "b_stt_cd": "01", "tax_type": "부가가치세 면세사업자"},
        ]
        statusByNo = {record["b_no"]: record for record in sampleData}

        blocked = []
        for row in csv.DictReader(io.StringIO(vendorCsv)):
            info = statusByNo[row["b_no"]]
            state = STATUS_BY_CODE.get(info["b_stt_cd"], "미등록")
            taxFree = "면세" in info["tax_type"]
            if state != "계속" or taxFree:
                reason = "면세" if (state == "계속" and taxFree) else state
                blocked.append({"b_no": row["b_no"], "name": row["name"], "reason": reason})

        assert len(blocked) == 3
        len(blocked)
      hints:
        - "정상상사를 폐업으로 바꾸려면 b_stt_cd를 '03'으로."
        - "세 거래처 모두 차단되어 건수는 3이다."
      check:
        type: noError
        noError: "전체 파이프라인이 예외 없이 끝나야 한다."
        resultCheck: "차단 건수가 3이어야 한다."
    check:
      noError: "거래처 CSV → 차단 CSV 파이프라인이 끝나야 한다."
      resultCheck: "폐업·면세 두 거래처가 차단 리스트에 잡힌다."

    blocks:
      - type: tip
        content: "흔한 오개념: data.go.kr 키가 'URL Encoded'인지 '디코딩'인지 헷갈려 401이 난다. requests의 params=로 넘기면 자동 인코딩되므로 디코딩 키를 쓴다. 또 상태조회(번호만)와 진위확인(번호+대표자명+개업일자 3개 일치)은 다른 엔드포인트다."
      - type: list
        style: bullet
        items:
          - "진위확인(/validate)으로 확장: 사업자번호 + 대표자명 + 개업일자가 실제로 일치하는지 검증(거래 개시 전 실사)."
          - "차단 리스트를 openpyxl로 조건부 서식(빨강 강조) 엑셀로 산출."
          - "분기 마감마다 watchSched로 자동 실행하고 결과를 email 트랙으로 담당자에게 발송."
          - "100건 초과 거래처는 b_no를 100개씩 끊어 배치 호출(일 100만건 한도 내)."
          - "조회 결과를 거래처 마스터와 대사해 신규 폐업 거래처만 변화분으로 통보."
