    description: "한국수출입은행 환율 Open API의 매매기준율(deal_bas_r)을 requests로 받아 decimal로 100단위 통화 보정과 ROUND_HALF_UP 반올림까지 정확히 원화로 환산한다. 무역·해외결제·회계 마감을 자동화한다."
