      solution: |-
        import csv
        import io
        from decimal import Decimal, ROUND_HALF_UP

        def toKrw(amount, rate, unitSize):
            won = Decimal(str(amount)) * rate / Decimal(unitSize)
            return won.quantize(Decimal("1"), rounding=ROUND_HALF_UP)

        rateByCode = {
            "USD": {"rate": Decimal("1389.5"), "unitSize": 1},
            "JPY": {"rate": Decimal("913.45"), "unitSize": 100},
            "EUR": {"rate": Decimal("1502.1"), "unitSize": 1},
        }

        invoiceCsv = "invoice_no,currency,amount\nINV-1,USD,1250\nINV-2,JPY,30000\nINV-3,EUR,800\n"
        rows = []
        for row in csv.DictReader(io.StringIO(invoiceCsv)):
            info = rateByCode[row["currency"]]
            krw = toKrw(row["amount"], info["rate"], info["unitSize"])
            rows.append({"invoice_no": row["invoice_no"], "krw": str(krw)})

        total = sum((Decimal(item["krw"]) for item in rows), Decimal(0))

        assert rows[1]["krw"] == "274035"
        assert total == Decimal("3212590")
        str(total)
      hints:
        - "빈칸에 30000을 넣는다."
        - "30,000엔=274,035원, 합계는 1,736,875+274,035+1,201,680=3,212,590원."
      check:
        type: noError
        noError: "전체 파이프라인이 예외 없이 끝나야 한다."
        resultCheck: "INV-2가 274,035원, 합계가 3,212,590원이어야 한다."
    check:
      noError: "인보이스 CSV → 원화 CSV 파이프라인이 끝나야 한다."
      resultCheck: "달러·엔·유로 세 인보이스가 원화로 환산되고 합계 3,395,280원이 나온다."

    blocks:
      - type: tip
        content: "흔한 오개념: ① 돈을 float으로 계산해 1원씩 어긋난다 - Decimal로 한다. ② JPY·IDR 같은 100단위 통화를 1단위로 곱해 100배 틀린다 - cur_unit의 (100)을 보고 나눈다. ③ 환율은 24시간 갱신이 아니다 - 영업일 09:00경 고시되고 주말·공휴일은 직전 영업일 값이라, 주말 searchdate는 빈 배열이 와서 직전 영업일로 재조회해야 한다."
      - type: list
        style: bullet
        items:
          - "주말·공휴일 searchdate면 12강의 영업일 계산으로 직전 영업일을 구해 재조회."
          - "환율을 날짜별로 캐시(원자적 쓰기 트랙과 결합)해 같은 날 반복 호출을 줄인다."
          - "ttb(받으실 때)·tts(보내실 때)까지 함께 받아 송금 수수료 시나리오를 구분."
          - "원화 환산 결과를 openpyxl로 통화별 소계·총계 엑셀로 산출."
          - "월말 외화자산 평가: 보유 외화 잔액 × 말일 매매기준율로 평가액을 자동 산출."
