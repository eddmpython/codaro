  tierParity:
    web: portable-concept
    local: package-practice-and-artifact
  supportPolicy: 첫 실패는 실제 반환값과 계약 차이를 inline으로 보여주고 정답 전체는 자동 노출하지 않습니다.
  authoring:
    source: curated-blueprint
    solutionVerification: required
    independentReview: pending
  masteryVariants:
  - id: requests_01-get-response-audit-mastery
    mode: mastery
    unseen: true
    claimScope: portable-concept
    reviewStatus: machine-verified-pending-independent-review
    sourceSectionIds:
    - step1_first_get
    - extensions
    title: 첫 GET 응답의 status·content type·schema 판정하기
    subtitle: 새 입력으로 핵심 분석 재현
    goal: 200 여부뿐 아니라 JSON content type과 필수 필드를 함께 검사한다.
    why: worked example을 복사하지 않고 새 레코드에서 같은 분석 판단을 재현해야 개념 숙달을 확인할 수 있습니다.
    explanation: 브라우저의 격리된 Python Worker가 보이지 않던 정상·경계·오류 입력으로 함수를 다시 호출합니다.
    tips: &id001
    - '`response.json()` 호출 전에 status와 content type을 검사하세요.'
    - JSON 파싱 성공과 업무 schema 충족을 별도 판정으로 남기세요.
    exercise:
      prompt: audit_get_response(response, required_fields)를 완성하세요.
      starterCode: |-
        def audit_get_response(response, required_fields):
            raise NotImplementedError
      solution: |
        def audit_get_response(response, required_fields):
            failures = []
            if response.get("status") != 200:
                failures.append("status")
            content_type = response.get("headers", {}).get("content-type", "").split(";", 1)[0].strip().lower()
            if content_type != "application/json":
                failures.append("content-type")
            body = response.get("json")
            if not isinstance(body, dict):
                failures.append("json-object")
                missing = sorted(required_fields)
            else:
                missing = sorted(set(required_fields) - set(body))
                if missing:
                    failures.append("schema")
            return {"accepted": not failures, "failures": failures, "missingFields": missing, "contentType": content_type}
      hints: *id001
    check:
      id: python.requests.requests_01.get-response-audit.mastery.behavior.v1
      version: 1
      kind: behavior
      strength: strong
      executor: browser-worker
      timeoutMs: 8000
      fixtureId: python.requests.requests_01.get-response-audit.mastery.behavior.v1.fixture
      fixtureHash: sha256-5H2hz41NNRiQqR7gqqk7c7FuxPecIr+coT1+YyQEi2s=
      fixture:
        directories:
        - input
        - output
        env:
          LANG: C.UTF-8
          TZ: UTC
        files: []
        stdin: []
      packageAssets: []
      payload:
        entry: audit_get_response
        cases:
        - id: accepts-json-schema
          arguments:
          - value:
              status: 200
              headers:
                content-type: application/json; charset=utf-8
              json:
                id: 1
                name: A
          - value:
            - id
            - name
          expectedReturn:
            accepted: true
            failures: []
            missingFields: []
            contentType: application/json
        - id: reports-html-error-page
          arguments:
          - value:
              status: 503
              headers:
                content-type: text/html
              text: down
          - value:
            - id
          expectedReturn:
            accepted: false
            failures:
            - status
            - content-type
            - json-object
            missingFields:
            - id
            contentType: text/html
        - id: reports-schema-gap
          arguments:
          - value:
              status: 200
              headers:
                content-type: application/json
              json:
                id: 1
          - value:
            - id
            - name
          expectedReturn:
            accepted: false
            failures:
            - schema
            missingFields:
