- id: metrics
  title: 포트폴리오 지표
  structuredPrimary: true
  subtitle: 수익률, 위험, 샤프비율
  goal: '포트폴리오 지표: 실행 가능한 Python 흐름으로 익힌다.'
  why: '포트폴리오 지표: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 포트폴리오 수익률은 각 자산 수익률의 가중평균입니다. 위험(표준편차)은 공분산을 고려하여 계산합니다. 샤프 비율은 (수익률 - 무위험수익률) / 위험으로, 위험 대비 초과수익을 측정합니다. 샤프
    비율이 높을수록 효율적인 투자입니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def portfolioReturn(weights, rets):
        return np.dot(weights, rets)

    def portfolioRisk(weights, cov):
        return np.sqrt(np.dot(weights.T, np.dot(cov, weights)))

    def sharpeRatio(weights, rets, cov, riskFree=0.02):
        pRet = portfolioReturn(weights, rets)
        pRisk = portfolioRisk(weights, cov)
        return (pRet - riskFree) / pRisk
