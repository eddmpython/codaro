- id: minrisk
  title: 최소위험 포트폴리오
  structuredPrimary: true
  subtitle: 변동성 최소화
  goal: '최소위험 포트폴리오: 실행 가능한 Python 흐름으로 익힌다.'
  why: '최소위험 포트폴리오: 이후 분석, 자동화, 검증 루틴을 만들 때 반복해서 쓰이는 기본 단위다.'
  explanation: 가장 보수적인 전략은 위험(변동성)을 최소화하는 것입니다. 수익률과 무관하게 변동성만 최소화합니다. 이 포트폴리오는 효율적 프론티어의 가장 왼쪽 끝에 위치하며, 리스크 회피 투자자에게 적합합니다.
  tips:
  - 한 번에 많이 바꾸지 말고 작은 입력부터 실행하세요.
  - 실행 결과는 출력, 변수 값, assert 중 하나로 바로 검증하세요.
  snippet: |-
    def negRisk(weights):
        return portfolioRisk(weights, covMatrix)

    minRiskResult = optimize.minimize(
        negRisk,
        initWeights,
        method='SLSQP',
        bounds=bounds,
        constraints=constraints
    )

    minRiskW = minRiskResult.x
    minRiskRet = portfolioReturn(minRiskW, returns)
    minRiskVol = portfolioRisk(minRiskW, covMatrix)
    minRiskSharpe = sharpeRatio(minRiskW, returns, covMatrix)

    minRiskDf = pd.DataFrame({
        'Asset': assets,
        'Weight': [f'{w*100:.1f}%' for w in minRiskW]
    })
    minRiskDf
