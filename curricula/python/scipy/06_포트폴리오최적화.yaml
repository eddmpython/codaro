        optGoal = optimize.minimize(minRisk5, init5, method='SLSQP', bounds=bnds5, constraints=consGoal)

        goalRet = pReturn5(optGoal.x)
        goalRisk = pRisk5(optGoal.x)

        goalDf = pd.DataFrame({
            'Metric': ['Target Return', 'Achieved Return', 'Minimum Risk'],
            'Value': [f'{targetGoal*100:.1f}%', f'{goalRet*100:.2f}%', f'{goalRisk*100:.2f}%']
        })
        goalDf
