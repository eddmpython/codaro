    - 실행 후 오차와 결과 범위 기준이 바뀐 입력을 반영하는지 확인하세요.
  check:
    noError: 최소위험 포트폴리오 코드가 예외 없이 끝나야 합니다.
    resultCheck: 최소위험 포트폴리오에서 바꾼 열 이름이나 행 값이 결과에 반영되어야 합니다.
- id: maxsharpe
  title: 최대샤프 포트폴리오
  structuredPrimary: true
  subtitle: 위험대비 수익 최대화
  goal: 최대샤프 포트폴리오에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 과학 계산은 수학 모델을 코드로 실행하고 결과 신뢰도를 확인하는 과정입니다.
  explanation: 샤프 비율을 최대화하면 위험 대비 가장 효율적인 포트폴리오를 찾습니다. minimize 함수는 최소화만 하므로, 음수 샤프 비율을 최소화하여 최대화 효과를
    냅니다. 이 포트폴리오가 일반적으로 가장 추천되는 배분입니다.
