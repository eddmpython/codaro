  explanation: 효율적 프론티어는 주어진 위험 수준에서 달성 가능한 최대 수익의 집합입니다. 목표 수익률을 변화시키며 각 수준에서 최소 위험 포트폴리오를 찾으면 프론티어를 그릴 수 있습니다. 프론티어 위의 점만이
    효율적인 투자입니다.
