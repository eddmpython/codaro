sections:
- id: load
  title: 라이브러리 및 데이터 로드
  structuredPrimary: true
  subtitle: scipy.stats
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    A/B 테스트는 두 버전을 무작위로 배정하여 어느 것이 더 효과적인지 비교하는 실험입니다. 웹사이트 버튼 색상, 이메일 제목, 가격 정책 등 다양한 요소를 테스트할 수 있습니다. scipy.stats의 ttest_ind 함수는 두 독립 표본의 평균 차이가 통계적으로 유의미한지 검정합니다. 이 프로젝트에서는 가상의 이커머스 A/B 테스트 데이터를 생성하여 분석합니다.

    Control 그룹은 기존 버전(파란 버튼), Treatment 그룹은 새 버전(녹색 버튼)입니다. 평균 차이 $3가 실제 효과인지 우연인지 통계적으로 판단합니다.
  tips:
  - Control 그룹은 기존 버전(파란 버튼), Treatment 그룹은 새 버전(녹색 버튼)입니다. 평균 차이 $3가 실제 효과인지 우연인지 통계적으로 판단합니다.
  snippet: |-
    import scipy

    import numpy as np
    from scipy import stats
    import matplotlib.pyplot as plt
    import pandas as pd

    np.random.seed(42)
    controlGroup = np.random.normal(loc=50, scale=15, size=1000)
    treatmentGroup = np.random.normal(loc=53, scale=15, size=1000)
  exercise:
