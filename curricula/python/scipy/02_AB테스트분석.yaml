- id: ttest
  title: t-검정 실행
  structuredPrimary: true
  subtitle: ttest_ind
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    t-검정은 두 그룹의 평균 차이가 우연으로 발생했을 확률을 계산합니다. 귀무가설(H0)은 '두 그룹에 차이가 없다'입니다. p-value가 유의수준(보통 0.05) 미만이면 귀무가설을 기각하고, 실제 차이가 있다고 결론 내립니다. ttest_ind는 독립표본 t-검정으로, 서로 다른 사람들로 구성된 두 그룹을 비교할 때 사용합니다.

    t통계량은 평균 차이를 표준오차로 나눈 값입니다. 절대값이 클수록 차이가 크다는 의미입니다. p-value는 귀무가설이 참일 때 이 정도 차이가 우연히 나올 확률입니다.
  tips:
  - t통계량은 평균 차이를 표준오차로 나눈 값입니다. 절대값이 클수록 차이가 크다는 의미입니다. p-value는 귀무가설이 참일 때 이 정도 차이가 우연히 나올 확률입니다.
  snippet: |-
    tStat, pValue = stats.ttest_ind(controlGroup, treatmentGroup)
    tStat, pValue
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      tStat, pValue = stats.ttest_ind(controlGroup, treatmentGroup)
      tStat, pValue
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: effect_size
  title: 효과 크기 분석
  structuredPrimary: true
  subtitle: Cohen's d
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    Cohen's d는 두 그룹 평균 차이를 표준편차 단위로 표현합니다. d가 0.2면 작은 효과, 0.5면 중간 효과, 0.8 이상이면 큰 효과로 해석합니다. p-value가 유의미해도 효과 크기가 작으면 실무적 가치가 낮을 수 있습니다. 반대로 효과 크기가 커도 샘플이 작으면 p-value가 유의미하지 않을 수 있습니다. 두 지표를 함께 보는 것이 중요합니다.

    실무에서 Cohen's d가 0.2 미만이면 효과가 미미하여 변경 비용 대비 가치가 낮을 수 있습니다. 통계적 유의성과 실무적 유의성은 다른 개념입니다.
  tips:
  - 실무에서 Cohen's d가 0.2 미만이면 효과가 미미하여 변경 비용 대비 가치가 낮을 수 있습니다. 통계적 유의성과 실무적 유의성은 다른 개념입니다.
  snippet: |-
    pooledStd = np.sqrt((controlGroup.std()**2 + treatmentGroup.std()**2) / 2)
    cohensD = (treatmentGroup.mean() - controlGroup.mean()) / pooledStd

    def interpretEffect(d):
        absD = abs(d)
        if absD < 0.2:
            return "negligible"
        elif absD < 0.5:
            return "small"
        elif absD < 0.8:
            return "medium"
        else:
            return "large"

    effectInterpret = interpretEffect(cohensD)
    cohensD, effectInterpret
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      pooledStd = np.sqrt((controlGroup.std()**2 + treatmentGroup.std()**2) / 2)
      cohensD = (treatmentGroup.mean() - controlGroup.mean()) / pooledStd

      def interpretEffect(d):
          absD = abs(d)
          if absD < 0.2:
              return "negligible"
          elif absD < 0.5:
              return "small"
          elif absD < 0.8:
              return "medium"
          else:
              return "large"

      effectInterpret = interpretEffect(cohensD)
      cohensD, effectInterpret
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: confidence
  title: 신뢰구간 분석
  structuredPrimary: true
  subtitle: 95% CI
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 95% 신뢰구간은 모집단의 실제 평균 차이가 95% 확률로 포함되는 범위입니다. 신뢰구간이 0을 포함하지 않으면 통계적으로 유의미합니다. 신뢰구간의 너비는 추정의 정밀도를 나타냅니다. 좁을수록 더 정확한 추정입니다. 비즈니스 보고서에서는 p-value보다 신뢰구간이 더 직관적인 경우가 많습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    meanDiff = treatmentGroup.mean() - controlGroup.mean()
    seDiff = np.sqrt(controlGroup.var()/len(controlGroup) + treatmentGroup.var()/len(treatmentGroup))
    ciLower = meanDiff - 1.96 * seDiff
    ciUpper = meanDiff + 1.96 * seDiff

    ciDf = pd.DataFrame({
        'Metric': ['Mean Difference', '95% CI Lower', '95% CI Upper', 'Contains Zero'],
        'Value': [f'${meanDiff:.2f}', f'${ciLower:.2f}', f'${ciUpper:.2f}', 'No' if ciLower > 0 or ciUpper < 0 else 'Yes']
    })
    ciDf
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      meanDiff = treatmentGroup.mean() - controlGroup.mean()
      seDiff = np.sqrt(controlGroup.var()/len(controlGroup) + treatmentGroup.var()/len(treatmentGroup))
      ciLower = meanDiff - 1.96 * seDiff
      ciUpper = meanDiff + 1.96 * seDiff

      ciDf = pd.DataFrame({
          'Metric': ['Mean Difference', '95% CI Lower', '95% CI Upper', 'Contains Zero'],
          'Value': [f'${meanDiff:.2f}', f'${ciLower:.2f}', f'${ciUpper:.2f}', 'No' if ciLower > 0 or ciUpper < 0 else 'Yes']
      })
      ciDf
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: result
  title: 최종 분석 보고서
  structuredPrimary: true
  subtitle: 비즈니스 의사결정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: A/B 테스트 분석 결과를 종합하여 비즈니스 의사결정을 내립니다. 통계적 유의성(p-value), 효과 크기(Cohen's d), 신뢰구간을 모두 고려합니다. 단순히 p < 0.05라고 바로 채택하는 것이 아니라, 효과 크기가 실무적으로 의미 있는지, 구현 비용 대비 가치가 있는지도 함께 판단해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    reportDf = pd.DataFrame({
        'Metric': [
            'Control Mean',
            'Treatment Mean',
            'Difference',
            'Effect Size',
            'p-value',
            'Significant (α=0.05)',
            '95% CI',
            'Recommendation'
        ],
        'Value': [
            f'${controlGroup.mean():.2f}',
            f'${treatmentGroup.mean():.2f}',
            f'${meanDiff:.2f} (+{meanDiff/controlGroup.mean()*100:.1f}%)',
            f'{cohensD:.3f} ({effectInterpret})',
            f'{pValue:.6f}',
            'Yes' if pValue < 0.05 else 'No',
            f'[${ciLower:.2f}, ${ciUpper:.2f}]',
            'Implement Treatment' if pValue < 0.05 and cohensD > 0.1 else 'Keep Control'
        ]
    })
    reportDf
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      reportDf = pd.DataFrame({
          'Metric': [
              'Control Mean',
              'Treatment Mean',
              'Difference',
              'Effect Size',
              'p-value',
              'Significant (α=0.05)',
              '95% CI',
              'Recommendation'
          ],
          'Value': [
              f'${controlGroup.mean():.2f}',
              f'${treatmentGroup.mean():.2f}',
              f'${meanDiff:.2f} (+{meanDiff/controlGroup.mean()*100:.1f}%)',
              f'{cohensD:.3f} ({effectInterpret})',
              f'{pValue:.6f}',
              'Yes' if pValue < 0.05 else 'No',
              f'[${ciLower:.2f}, ${ciUpper:.2f}]',
              'Implement Treatment' if pValue < 0.05 and cohensD > 0.1 else 'Keep Control'
          ]
      })
      reportDf
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: workflow_validation
  title: 실무 A/B 테스트 의사결정 검증
  structuredPrimary: true
  subtitle: 예측 → 오류 확인 → 통계 검증 → 기준 실험
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: A/B 테스트는 p-value 하나로 끝내면 위험합니다. 데이터가 비어 있거나 NaN이 섞인 상태를 먼저 막고, 평균 차이·신뢰구간·효과 크기·최소 실무 효과 기준을 함께 봐야 합니다. 이번 단계에서는 Treatment가 Control보다 높을 것이라고 먼저 예상하고, 잘못된 입력을 일부러 실패시킵니다. 그다음 검증 가능한 분석 함수를 만들고, 최소 기대 매출 상승 기준을 바꿔 채택 판단이 어떻게 달라지는지 실험합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def validateAbSamples(control, treatment):
        control = np.asarray(control, dtype=float)
        treatment = np.asarray(treatment, dtype=float)

        if len(control) < 2 or len(treatment) < 2:
            raise ValueError("각 그룹에는 최소 2개 이상의 관측값이 필요합니다.")
        if np.isnan(control).any() or np.isnan(treatment).any():
            raise ValueError("A/B 테스트 표본에 결측값이 있으면 먼저 정제해야 합니다.")

        return control, treatment


    try:
        validateAbSamples([50.0], [52.0, 53.0])
    except ValueError as exc:
        print("의도한 오류 확인:", exc)
    else:
        raise AssertionError("관측값이 부족한 테스트를 통과시키면 안 됩니다.")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def validateAbSamples(control, treatment):
          control = np.asarray(control, dtype=float)
          treatment = np.asarray(treatment, dtype=float)

          if len(control) < 2 or len(treatment) < 2:
              raise ValueError("각 그룹에는 최소 2개 이상의 관측값이 필요합니다.")
          if np.isnan(control).any() or np.isnan(treatment).any():
              raise ValueError("A/B 테스트 표본에 결측값이 있으면 먼저 정제해야 합니다.")

          return control, treatment


      try:
          validateAbSamples([50.0], [52.0, 53.0])
      except ValueError as exc:
          print("의도한 오류 확인:", exc)
      else:
          raise AssertionError("관측값이 부족한 테스트를 통과시키면 안 됩니다.")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
