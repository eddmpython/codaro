  subtitle: A/B 테스트 분석 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    지금까지 배운 t-검정, 효과 크기, 신뢰구간 분석을 활용하여 다양한 A/B 테스트를 분석합니다. 미션1은 랜딩 페이지 전환율 비교로 비율 검정을 사용합니다. 미션2는 앱 사용시간 비교로 Welch's t-검정을 사용합니다. 각 미션은 데이터 생성, 통계 검정, 시각화, 해석을 포함합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import numpy as np
    from scipy import stats
    import pandas as pd

    np.random.seed(789)
    pageA = np.random.binomial(1, 0.12, 5000)
    pageB = np.random.binomial(1, 0.14, 5000)

    convA = pageA.mean()
    convB = pageB.mean()
    convA, convB
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import numpy as np
      from scipy import stats
      import pandas as pd

      np.random.seed(789)
      pageA = np.random.binomial(1, 0.12, 5000)
      pageB = np.random.binomial(1, 0.14, 5000)

      convA = pageA.mean()
      convB = pageB.mean()
      convA, convB
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
