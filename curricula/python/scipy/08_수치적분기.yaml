- id: ode
  title: 미분방정식 풀이
  structuredPrimary: true
  subtitle: odeint
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 미분방정식은 변화율을 정의합니다. odeint로 초기값 문제를 수치적으로 풉니다. 가장 간단한 예는 지수 감쇠 dy/dt = -ky로, 방사성 붕괴나 RC 회로 방전을 모델링합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def decay(y, tVal, k):
        return -k * y

    y0 = 100
    kDecay = 0.3
    tSpan = np.linspace(0, 20, 100)

    solution = integrate.odeint(decay, y0, tSpan, args=(kDecay,))
    analyticalSol = y0 * np.exp(-kDecay * tSpan)

    figDecay, axDecay = plt.subplots(figsize=(10, 6))
    axDecay.plot(tSpan, solution, 'b-', linewidth=2, label='Numerical (odeint)')
    axDecay.plot(tSpan, analyticalSol, 'r--', linewidth=2, label='Analytical')
    axDecay.set_xlabel('Time')
    axDecay.set_ylabel('y')
    axDecay.set_title("Exponential Decay: dy/dt = -0.3y")
    axDecay.legend()
    axDecay.grid(True, alpha=0.3)
    figDecay
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def decay(y, tVal, k):
          return -k * y

      y0 = 100
      kDecay = 0.3
      tSpan = np.linspace(0, 20, 100)

      solution = integrate.odeint(decay, y0, tSpan, args=(kDecay,))
      analyticalSol = y0 * np.exp(-kDecay * tSpan)

      figDecay, axDecay = plt.subplots(figsize=(10, 6))
      axDecay.plot(tSpan, solution, 'b-', linewidth=2, label='Numerical (odeint)')
      axDecay.plot(tSpan, analyticalSol, 'r--', linewidth=2, label='Analytical')
      axDecay.set_xlabel('Time')
      axDecay.set_ylabel('y')
      axDecay.set_title("Exponential Decay: dy/dt = -0.3y")
      axDecay.legend()
      axDecay.grid(True, alpha=0.3)
      figDecay
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
