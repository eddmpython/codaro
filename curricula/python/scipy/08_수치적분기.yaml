  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: dblquad는 2차원 영역에서 적분을 수행합니다. 부피 계산, 2차원 확률 밀도 적분, 질량 중심 계산 등에 사용됩니다. 적분 순서는 안쪽(y)부터 계산한 후 바깥쪽(x)을 계산합니다.
  tips:
