- id: quad
  title: 기본 정적분
  structuredPrimary: true
  subtitle: integrate.quad
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    quad 함수는 1차원 정적분을 계산합니다. 적분할 함수, 하한, 상한을 입력하면 적분값과 추정 오차를 반환합니다. 적응형 구적법을 사용하여 함수가 급격히 변하는 곳에서 더 많은 점을 샘플링합니다.

    quad는 적응형 Gauss-Kronrod 구적법을 사용합니다. 반환되는 error는 추정 오차이며, 대부분의 경우 매우 작습니다.
  tips:
  - quad는 적응형 Gauss-Kronrod 구적법을 사용합니다. 반환되는 error는 추정 오차이며, 대부분의 경우 매우 작습니다.
  snippet: |-
    def f1(x):
        return x ** 2

    result1, error1 = integrate.quad(f1, 0, 1)
    analyticalResult = 1/3

    quadDf = pd.DataFrame({
        'Method': ['Numerical (quad)', 'Analytical'],
        'Result': [result1, analyticalResult],
        'Error': [abs(result1 - analyticalResult), 0]
    })
    quadDf
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def f1(x):
          return x ** 2

      result1, error1 = integrate.quad(f1, 0, 1)
      analyticalResult = 1/3

      quadDf = pd.DataFrame({
          'Method': ['Numerical (quad)', 'Analytical'],
          'Result': [result1, analyticalResult],
          'Error': [abs(result1 - analyticalResult), 0]
      })
      quadDf
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: trig
  title: 삼각함수 적분
  structuredPrimary: true
  subtitle: 양수/음수 영역
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 삼각함수의 적분에서는 양수 영역과 음수 영역이 상쇄될 수 있습니다. 한 주기(0~2π)에 대한 sin 적분은 0이 됩니다. 절대값 적분이 필요한 경우 별도로 처리해야 합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    sinHalf, _ = integrate.quad(np.sin, 0, np.pi)
    sinFull, _ = integrate.quad(np.sin, 0, 2 * np.pi)

    sinDf = pd.DataFrame({
