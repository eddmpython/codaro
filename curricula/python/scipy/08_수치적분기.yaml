    resultCheck: 출력 또는 assert 확인
- id: oscillator
  title: 조화진동자
  structuredPrimary: true
  subtitle: 2차 미분방정식
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 2차 미분방정식은 1차 연립방정식으로 변환하여 풉니다. 조화진동자(스프링-질량 시스템)는 d²x/dt² = -ω²x로, 위치 x와 속도 v = dx/dt 두 변수의 연립방정식으로 변환합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def harmonic(state, tVal, omega):
        x, v = state
        dxdt = v
        dvdt = -omega**2 * x
        return [dxdt, dvdt]

    omegaH = 2
    initState = [1, 0]
    tOsc = np.linspace(0, 10, 500)

    oscSol = integrate.odeint(harmonic, initState, tOsc, args=(omegaH,))
    xOsc = oscSol[:, 0]
    vOsc = oscSol[:, 1]
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def harmonic(state, tVal, omega):
          x, v = state
          dxdt = v
          dvdt = -omega**2 * x
          return [dxdt, dvdt]

      omegaH = 2
      initState = [1, 0]
      tOsc = np.linspace(0, 10, 500)

      oscSol = integrate.odeint(harmonic, initState, tOsc, args=(omegaH,))
      xOsc = oscSol[:, 0]
      vOsc = oscSol[:, 1]
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: solveivp
  title: solve_ivp
  structuredPrimary: true
  subtitle: 최신 ODE 솔버
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: solve_ivp는 odeint보다 현대적인 인터페이스를 제공하며 다양한 솔버를 지원합니다. 감쇠 진동자와 같은 복잡한 시스템을 시뮬레이션할 때 더 유연하게 사용할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def dampedOsc(tVal, state, omega, gamma):
        x, v = state
        dxdt = v
        dvdt = -omega**2 * x - 2 * gamma * v
        return [dxdt, dvdt]

    omegaD = 2
    gammaD = 0.2
    tSpanIvp = (0, 15)
    tEvalIvp = np.linspace(0, 15, 300)

    solIvp = integrate.solve_ivp(
        dampedOsc, tSpanIvp, [1, 0],
        args=(omegaD, gammaD),
        t_eval=tEvalIvp,
        method='RK45'
    )

    figDamp, axDamp = plt.subplots(figsize=(12, 5))
    axDamp.plot(solIvp.t, solIvp.y[0], 'b-', linewidth=2, label='Position')
    axDamp.plot(solIvp.t, np.exp(-gammaD * solIvp.t), 'r--', linewidth=1.5, alpha=0.7, label='Envelope')
    axDamp.plot(solIvp.t, -np.exp(-gammaD * solIvp.t), 'r--', linewidth=1.5, alpha=0.7)
    axDamp.set_xlabel('Time')
    axDamp.set_ylabel('Position')
    axDamp.set_title('Damped Harmonic Oscillator')
    axDamp.legend()
    axDamp.grid(True, alpha=0.3)
    figDamp
