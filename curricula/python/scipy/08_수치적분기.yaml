- id: gaussian
  title: 가우스 적분
  structuredPrimary: true
  subtitle: 정규분포 확률
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 정규분포의 확률밀도함수를 적분하면 확률을 계산할 수 있습니다. 68-95-99.7 법칙은 ±1σ, ±2σ, ±3σ 범위에 각각 약 68%, 95%, 99.7%의 데이터가 포함됨을 의미합니다. quad로 이를 직접 확인할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def normalPdf(x, mu=0, sigma=1):
        return (1 / (sigma * np.sqrt(2 * np.pi))) * np.exp(-0.5 * ((x - mu) / sigma) ** 2)

    prob1Sig, _ = integrate.quad(normalPdf, -1, 1)
    prob2Sig, _ = integrate.quad(normalPdf, -2, 2)
    prob3Sig, _ = integrate.quad(normalPdf, -3, 3)

    probDf = pd.DataFrame({
        'Range': ['±1σ', '±2σ', '±3σ'],
        'Probability': [f'{prob1Sig:.4%}', f'{prob2Sig:.4%}', f'{prob3Sig:.4%}'],
        'Expected': ['~68%', '~95%', '~99.7%']
    })
    probDf
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
