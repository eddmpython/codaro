- id: workflow_validation
  title: 실무 확률분포 리포트 검증
  structuredPrimary: true
  subtitle: 예측 → 오류 확인 → 면적 검증 → 기준 실험
  goal: 실무 확률분포 리포트 검증에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 예상값과 실제 결과를 코드로 비교하면 눈으로만 확인하는 실수를 줄일 수 있습니다.
  explanation: 분포 함수는 숫자가 나오기 때문에 맞아 보이기 쉽습니다. 하지만 표준편차가 0 이하이거나, 상위 비율을 0~1 범위 밖으로 넣으면 리포트 자체가 잘못됩니다.
    이번 단계에서는 합격률과 상위권 컷오프를 먼저 예상하고, 잘못된 입력을 일부러 실패시킨 뒤, PDF 면적과 CDF/PPF 결과를 검증합니다. 마지막에는 합격 기준과 상위권 기준을
    바꾸며 의사결정이 어떻게 달라지는지 실험합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def validateScoreModel(meanScore, stdScore, passScore, topRate):
        if stdScore <= 0:
            raise ValueError("표준편차는 0보다 커야 합니다.")
        if not 0 < topRate < 1:
            raise ValueError("상위 비율은 0과 1 사이여야 합니다.")
        if passScore < 0 or passScore > 100:
            raise ValueError("합격 기준은 0~100점 범위 안에 있어야 합니다.")

        return stats.norm(loc=meanScore, scale=stdScore)


    try:
        validateScoreModel(meanScore=70, stdScore=0, passScore=60, topRate=0.1)
    except ValueError as exc:
        print("의도한 오류 확인:", exc)
    else:
        raise AssertionError("표준편차가 0인 분포는 통과시키면 안 됩니다.")
  exercise:
    prompt: 실무 확률분포 리포트 검증 예제에서 함수 인자나 return 식을 바꾸고 같은 호출이 다른 값을 돌려주는지 확인하세요.
    starterCode: |-
      def validateScoreModel(meanScore, stdScore, passScore, topRate):
          if stdScore <= 0:
              raise ValueError("표준편차는 0보다 커야 합니다.")
          if not 0 < topRate < 1:
              raise ValueError("상위 비율은 0과 1 사이여야 합니다.")
          if passScore < 0 or passScore > 100:
              raise ValueError("합격 기준은 0~100점 범위 안에 있어야 합니다.")

          return stats.norm(loc=meanScore, scale=stdScore)


      try:
          validateScoreModel(meanScore=70, stdScore=0, passScore=60, topRate=0.1)
      except ValueError as exc:
          print("의도한 오류 확인:", exc)
      else:
          raise AssertionError("표준편차가 0인 분포는 통과시키면 안 됩니다.")
    hints:
    - 바꿀 지점은 def 줄의 매개변수, 함수 본문, 함수 호출 인자에서 찾으세요.
    - 실행 뒤 반환값이나 출력값이 바꾼 인자/계산식과 맞는지 보세요.
  check:
    noError: 실무 확률분포 리포트 검증의 함수 정의, 매개변수, 호출 인자가 NameError나 TypeError 조건을 피해야 합니다.
    resultCheck: 실무 확률분포 리포트 검증 함수 호출 결과가 바꾼 인자나 반환식 기준으로 달라져야 합니다.
