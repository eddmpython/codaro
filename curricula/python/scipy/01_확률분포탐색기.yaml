- id: create_dist
  title: 정규분포 생성
  structuredPrimary: true
  subtitle: stats.norm
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    정규분포(Normal Distribution)는 통계학에서 가장 중요한 분포입니다. 종 모양 곡선으로 유명하며, 자연현상의 많은 데이터가 이 분포를 따릅니다. 키, 몸무게, IQ, 시험 점수 등이 대표적입니다. scipy.stats.norm()으로 정규분포 객체를 생성하며, loc은 평균(중심 위치), scale은 표준편차(퍼짐 정도)를 의미합니다. 평균 70점, 표준편차 15점인 시험 점수 분포를 만들어봅니다.

    loc=0, scale=1인 정규분포를 표준정규분포라고 합니다. 모든 정규분포는 표준화를 통해 표준정규분포로 변환할 수 있습니다. Z = (X - μ) / σ 공식을 사용합니다.
  tips:
  - loc=0, scale=1인 정규분포를 표준정규분포라고 합니다. 모든 정규분포는 표준화를 통해 표준정규분포로 변환할 수 있습니다. Z = (X - μ) / σ 공식을 사용합니다.
  snippet: |-
    scoreDist = stats.norm(loc=70, scale=15)
    scoreDist
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      scoreDist = stats.norm(loc=70, scale=15)
      scoreDist
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: pdf_explore
  title: 확률밀도함수 탐색
  structuredPrimary: true
  subtitle: PDF
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    확률밀도함수(Probability Density Function, PDF)는 각 값의 상대적 가능성을 나타냅니다. 주의할 점은 PDF 값 자체는 확률이 아닙니다. 연속분포에서 특정 점의 확률은 0입니다. PDF는 상대적 가능성을 보여주며, 구간의 면적이 실제 확률입니다. 정규분포에서는 평균 근처 값이 가장 높고, 평균에서 멀어질수록 PDF 값이 낮아집니다.

    PDF 곡선 아래 전체 면적은 항상 1입니다. 이것이 확률의 기본 성질입니다. 특정 구간의 면적이 해당 구간에 값이 있을 확률입니다.
  tips:
  - PDF 곡선 아래 전체 면적은 항상 1입니다. 이것이 확률의 기본 성질입니다. 특정 구간의 면적이 해당 구간에 값이 있을 확률입니다.
  snippet: |-
    pdfAt70 = scoreDist.pdf(70)
    pdfAt85 = scoreDist.pdf(85)
    pdfAt70, pdfAt85
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      pdfAt70 = scoreDist.pdf(70)
      pdfAt85 = scoreDist.pdf(85)
      pdfAt70, pdfAt85
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: cdf_explore
  title: 누적분포함수 탐색
  structuredPrimary: true
  subtitle: CDF
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    누적분포함수(Cumulative Distribution Function, CDF)는 특정 값 이하일 확률을 나타냅니다. CDF(60) = 0.25라면 60점 이하일 확률이 25%라는 뜻입니다. 합격 기준이 60점이라면, 합격률은 1 - CDF(60)으로 계산합니다. CDF는 항상 0에서 시작해서 1로 끝나며, 단조 증가합니다. S자 형태의 곡선으로 나타납니다.

    구간 확률을 계산하려면 CDF를 뺍니다. P(60 < X < 80) = CDF(80) - CDF(60)입니다. 이 방법으로 특정 점수 구간에 속할 확률을 구할 수 있습니다.
  tips:
  - 구간 확률을 계산하려면 CDF를 뺍니다. P(60 < X < 80) = CDF(80) - CDF(60)입니다. 이 방법으로 특정 점수 구간에 속할 확률을 구할 수 있습니다.
  snippet: |-
    probFail = scoreDist.cdf(60)
    probPass = 1 - probFail
    probFail, probPass
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      probFail = scoreDist.cdf(60)
      probPass = 1 - probFail
      probFail, probPass
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: ppf_explore
  title: 분위수함수 탐색
  structuredPrimary: true
  subtitle: PPF
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    분위수함수(Percent Point Function, PPF)는 CDF의 역함수입니다. 확률을 입력하면 해당 분위수를 반환합니다. 상위 10%에 들려면 몇 점이 필요한지 알고 싶을 때 사용합니다. PPF(0.9)는 하위 90% 경계, 즉 상위 10% 경계를 의미합니다. 장학금 기준이나 등급 컷오프를 계산할 때 매우 유용합니다.

    통계에서 자주 보는 ±1.96은 표준정규분포의 PPF(0.025)와 PPF(0.975) 값입니다. 95% 신뢰구간의 기준이 되는 숫자입니다.
  tips:
  - 통계에서 자주 보는 ±1.96은 표준정규분포의 PPF(0.025)와 PPF(0.975) 값입니다. 95% 신뢰구간의 기준이 되는 숫자입니다.
  snippet: |-
    top10Cutoff = scoreDist.ppf(0.9)
    top5Cutoff = scoreDist.ppf(0.95)
    top1Cutoff = scoreDist.ppf(0.99)
    top10Cutoff, top5Cutoff, top1Cutoff
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      top10Cutoff = scoreDist.ppf(0.9)
      top5Cutoff = scoreDist.ppf(0.95)
      top1Cutoff = scoreDist.ppf(0.99)
      top10Cutoff, top5Cutoff, top1Cutoff
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
