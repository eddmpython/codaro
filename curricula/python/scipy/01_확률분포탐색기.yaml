sections:
- id: load
  title: 라이브러리 로드
  structuredPrimary: true
  subtitle: scipy.stats
  goal: 라이브러리 로드에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: import 준비가 정확해야 다음 셀과 자동화 코드에서 같은 이름을 안정적으로 재사용할 수 있습니다.
  explanation: |-
    scipy는 과학 계산을 위한 Python 라이브러리입니다. scipy.stats 모듈에는 80개 이상의 확률분포와 다양한 통계 함수가 포함되어 있습니다. 정규분포, 균등분포, 지수분포, 이항분포 등 통계학에서 사용하는 거의 모든 분포를 지원합니다. 이 프로젝트에서는 가장 기본적인 정규분포를 다루며, 실제 시험 점수 분석에 적용합니다.

    scipy 설치 시 약 15-25MB의 데이터를 다운로드합니다. 처음 한 번만 설치하면 세션 동안 유지됩니다. scipy.stats는 from scipy import stats로 불러오는 것이 일반적입니다.
  tips:
  - scipy 설치 시 약 15-25MB의 데이터를 다운로드합니다. 처음 한 번만 설치하면 세션 동안 유지됩니다. scipy.stats는 from scipy import stats로
    불러오는 것이 일반적입니다.
  snippet: |-
    import scipy

    import numpy as np
    from scipy import stats
    import matplotlib.pyplot as plt
  exercise:
    prompt: 라이브러리 로드 예제에서 import한 모듈의 별칭이나 바로 이어지는 확인 호출을 바꿔 준비 상태를 확인하세요.
    starterCode: |-
      import scipy

      import numpy as np
      from scipy import stats
      import matplotlib.pyplot as plt
    hints:
    - 바꿀 지점은 수치 입력을 만드는 첫 줄과 최적화/적분/신호 처리 줄에서 찾으세요.
    - 실행 뒤 오차와 결과 범위 중 하나가 바꾼 값을 반영하는지 보세요.
  check:
    noError: 라이브러리 로드의 import 대상 모듈과 별칭이 현재 로컬 환경에서 준비되어야 합니다.
    resultCheck: 라이브러리 로드 실행 결과가 오차와 결과 범위 기준으로 바꾼 입력값을 반영해야 합니다.
- id: create_dist
  title: 정규분포 생성
  structuredPrimary: true
  subtitle: stats.norm
  goal: 정규분포 생성에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    정규분포(Normal Distribution)는 통계학에서 가장 중요한 분포입니다. 종 모양 곡선으로 유명하며, 자연현상의 많은 데이터가 이 분포를 따릅니다. 키, 몸무게, IQ, 시험 점수 등이 대표적입니다. scipy.stats.norm()으로 정규분포 객체를 생성하며, loc은 평균(중심 위치), scale은 표준편차(퍼짐 정도)를 의미합니다. 평균 70점, 표준편차 15점인 시험 점수 분포를 만들어봅니다.

    loc=0, scale=1인 정규분포를 표준정규분포라고 합니다. 모든 정규분포는 표준화를 통해 표준정규분포로 변환할 수 있습니다. Z = (X - μ) / σ 공식을 사용합니다.
  tips:
  - loc=0, scale=1인 정규분포를 표준정규분포라고 합니다. 모든 정규분포는 표준화를 통해 표준정규분포로 변환할 수 있습니다. Z = (X - μ) / σ 공식을 사용합니다.
  snippet: |-
    scoreDist = stats.norm(loc=70, scale=15)
    scoreDist
  exercise:
    prompt: 정규분포 생성 예제에서 `scoreDist` 할당값을 바꾸고 아래 표시 결과가 달라지는지 확인하세요.
    starterCode: |-
      scoreDist = stats.norm(loc=70, scale=15)
      scoreDist
    hints:
    - 바꿀 지점은 `scoreDist = ...` 오른쪽 값입니다.
    - 실행 뒤 `scoreDist` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 정규분포 생성에서 `scoreDist` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 정규분포 생성 실행 뒤 `scoreDist` 값, 출력, 또는 type() 확인이 바꾼 입력값을 반영해야 합니다.
- id: pdf_explore
  title: 확률밀도함수 탐색
  structuredPrimary: true
  subtitle: PDF
  goal: 확률밀도함수 탐색에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    확률밀도함수(Probability Density Function, PDF)는 각 값의 상대적 가능성을 나타냅니다. 주의할 점은 PDF 값 자체는 확률이 아닙니다. 연속분포에서 특정 점의 확률은 0입니다. PDF는 상대적 가능성을 보여주며, 구간의 면적이 실제 확률입니다. 정규분포에서는 평균 근처 값이 가장 높고, 평균에서 멀어질수록 PDF 값이 낮아집니다.

    PDF 곡선 아래 전체 면적은 항상 1입니다. 이것이 확률의 기본 성질입니다. 특정 구간의 면적이 해당 구간에 값이 있을 확률입니다.
  tips:
  - PDF 곡선 아래 전체 면적은 항상 1입니다. 이것이 확률의 기본 성질입니다. 특정 구간의 면적이 해당 구간에 값이 있을 확률입니다.
  snippet: |-
    pdfAt70 = scoreDist.pdf(70)
    pdfAt85 = scoreDist.pdf(85)
    pdfAt70, pdfAt85
  exercise:
    prompt: 확률밀도함수 탐색 예제에서 `pdfAt70`, `pdfAt85` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      pdfAt70 = scoreDist.pdf(70)
      pdfAt85 = scoreDist.pdf(85)
      pdfAt70, pdfAt85
    hints:
    - 바꿀 지점은 `pdfAt70 = ...` 오른쪽 값입니다.
    - 실행 뒤 `pdfAt70` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 확률밀도함수 탐색에서 `pdfAt70` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 확률밀도함수 탐색 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: cdf_explore
  title: 누적분포함수 탐색
  structuredPrimary: true
  subtitle: CDF
  goal: 누적분포함수 탐색에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    누적분포함수(Cumulative Distribution Function, CDF)는 특정 값 이하일 확률을 나타냅니다. CDF(60) = 0.25라면 60점 이하일 확률이 25%라는 뜻입니다. 합격 기준이 60점이라면, 합격률은 1 - CDF(60)으로 계산합니다. CDF는 항상 0에서 시작해서 1로 끝나며, 단조 증가합니다. S자 형태의 곡선으로 나타납니다.

    구간 확률을 계산하려면 CDF를 뺍니다. P(60 < X < 80) = CDF(80) - CDF(60)입니다. 이 방법으로 특정 점수 구간에 속할 확률을 구할 수 있습니다.
  tips:
  - 구간 확률을 계산하려면 CDF를 뺍니다. P(60 < X < 80) = CDF(80) - CDF(60)입니다. 이 방법으로 특정 점수 구간에 속할 확률을 구할 수 있습니다.
  snippet: |-
    probFail = scoreDist.cdf(60)
    probPass = 1 - probFail
    probFail, probPass
  exercise:
    prompt: 누적분포함수 탐색 예제에서 `probFail`, `probPass` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      probFail = scoreDist.cdf(60)
      probPass = 1 - probFail
      probFail, probPass
    hints:
    - 바꿀 지점은 `probFail = ...` 오른쪽 값입니다.
    - 실행 뒤 `probFail` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 누적분포함수 탐색에서 `probFail` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 누적분포함수 탐색 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: ppf_explore
  title: 분위수함수 탐색
  structuredPrimary: true
  subtitle: PPF
  goal: 분위수함수 탐색에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 변수 값 확인은 이후 계산, 조건, 출력에서 잘못된 입력을 빨리 찾게 해줍니다.
  explanation: |-
    분위수함수(Percent Point Function, PPF)는 CDF의 역함수입니다. 확률을 입력하면 해당 분위수를 반환합니다. 상위 10%에 들려면 몇 점이 필요한지 알고 싶을 때 사용합니다. PPF(0.9)는 하위 90% 경계, 즉 상위 10% 경계를 의미합니다. 장학금 기준이나 등급 컷오프를 계산할 때 매우 유용합니다.

    통계에서 자주 보는 ±1.96은 표준정규분포의 PPF(0.025)와 PPF(0.975) 값입니다. 95% 신뢰구간의 기준이 되는 숫자입니다.
  tips:
  - 통계에서 자주 보는 ±1.96은 표준정규분포의 PPF(0.025)와 PPF(0.975) 값입니다. 95% 신뢰구간의 기준이 되는 숫자입니다.
  snippet: |-
    top10Cutoff = scoreDist.ppf(0.9)
    top5Cutoff = scoreDist.ppf(0.95)
    top1Cutoff = scoreDist.ppf(0.99)
    top10Cutoff, top5Cutoff, top1Cutoff
  exercise:
    prompt: 분위수함수 탐색 예제에서 `top10Cutoff`, `top5Cutoff`, `top1Cutoff` 값 중 하나를 바꾸고 마지막 표시 결과가 맞는지 확인하세요.
    starterCode: |-
      top10Cutoff = scoreDist.ppf(0.9)
      top5Cutoff = scoreDist.ppf(0.95)
      top1Cutoff = scoreDist.ppf(0.99)
      top10Cutoff, top5Cutoff, top1Cutoff
    hints:
    - 바꿀 지점은 `top10Cutoff = ...` 오른쪽 값입니다.
    - 실행 뒤 `top10Cutoff` 값, 출력, 또는 type() 확인이 입력한 값과 맞는지 보세요.
  check:
    noError: 분위수함수 탐색에서 `top10Cutoff` 할당문의 오른쪽 값이 SyntaxError 없이 평가되어야 합니다.
    resultCheck: 분위수함수 탐색 실행 뒤 각 변수와 마지막 표시값이 바꾼 순서와 값을 반영해야 합니다.
- id: result
  title: 종합 분석 결과
  structuredPrimary: true
  subtitle: 시험 점수 리포트
  goal: 종합 분석 결과에서 최적화/적분/신호 처리 흐름을 코드로 실행하고 결과를 확인한다.
  why: 표 데이터는 컬럼, 행 수, 요약값을 함께 확인해야 분석 결과를 믿고 재사용할 수 있습니다.
  explanation: 지금까지 배운 PDF, CDF, PPF를 모두 활용하여 종합 분석 결과를 만듭니다. 실무에서는 이렇게 여러 통계량을 한 번에 계산하여 리포트를 작성합니다.
    분포의 특성을 파악하고, 의사결정에 필요한 정보를 추출하는 것이 통계 분석의 목적입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import pandas as pd

    analysisResult = pd.DataFrame({
        'Metric': ['평균', '표준편차', '60점 이상 합격률', '상위 10% 컷오프', '상위 5% 컷오프', '상위 1% 컷오프'],
        'Value': ['70점', '15점', f'{probPass:.1%}', f'{top10Cutoff:.1f}점', f'{top5Cutoff:.1f}점', f'{top1Cutoff:.1f}점']
    })
    analysisResult
  exercise:
    prompt: 종합 분석 결과 예제에서 데이터셋 이름, 컬럼, 행 값 중 하나를 바꾸고 DataFrame 결과가 어떻게 달라지는지 확인하세요.
    starterCode: |-
      import pandas as pd

      analysisResult = pd.DataFrame({
