- id: workflow_validation
  title: 실무 확률분포 리포트 검증
  structuredPrimary: true
  subtitle: 예측 → 오류 확인 → 면적 검증 → 기준 실험
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 분포 함수는 숫자가 나오기 때문에 맞아 보이기 쉽습니다. 하지만 표준편차가 0 이하이거나, 상위 비율을 0~1 범위 밖으로 넣으면 리포트 자체가 잘못됩니다. 이번 단계에서는 합격률과 상위권 컷오프를 먼저 예상하고, 잘못된 입력을 일부러 실패시킨 뒤, PDF 면적과 CDF/PPF 결과를 검증합니다. 마지막에는 합격 기준과 상위권 기준을 바꾸며 의사결정이 어떻게 달라지는지 실험합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    def validateScoreModel(meanScore, stdScore, passScore, topRate):
        if stdScore <= 0:
            raise ValueError("표준편차는 0보다 커야 합니다.")
        if not 0 < topRate < 1:
            raise ValueError("상위 비율은 0과 1 사이여야 합니다.")
        if passScore < 0 or passScore > 100:
            raise ValueError("합격 기준은 0~100점 범위 안에 있어야 합니다.")

        return stats.norm(loc=meanScore, scale=stdScore)


    try:
        validateScoreModel(meanScore=70, stdScore=0, passScore=60, topRate=0.1)
    except ValueError as exc:
        print("의도한 오류 확인:", exc)
    else:
        raise AssertionError("표준편차가 0인 분포는 통과시키면 안 됩니다.")
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      def validateScoreModel(meanScore, stdScore, passScore, topRate):
          if stdScore <= 0:
              raise ValueError("표준편차는 0보다 커야 합니다.")
          if not 0 < topRate < 1:
              raise ValueError("상위 비율은 0과 1 사이여야 합니다.")
          if passScore < 0 or passScore > 100:
              raise ValueError("합격 기준은 0~100점 범위 안에 있어야 합니다.")

          return stats.norm(loc=meanScore, scale=stdScore)


      try:
          validateScoreModel(meanScore=70, stdScore=0, passScore=60, topRate=0.1)
      except ValueError as exc:
          print("의도한 오류 확인:", exc)
      else:
          raise AssertionError("표준편차가 0인 분포는 통과시키면 안 됩니다.")
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
  check:
    noError: 오류 없이 실행
    resultCheck: 출력 또는 assert 확인
- id: practice
  title: 실습
  structuredPrimary: true
  subtitle: 확률분포 활용 프로젝트
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: |-
    지금까지 배운 정규분포의 PDF, CDF, PPF를 활용하여 실제 문제를 해결합니다. 미션1은 고객 서비스 대기시간 분석으로 지수분포를 사용합니다. 미션2는 제품 품질 관리로 정규분포를 사용합니다. 두 미션 모두 분포 생성, 확률 계산, 시각화를 포함합니다.

    각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  tips:
  - 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  snippet: |-
    import numpy as np
    from scipy import stats
    import matplotlib.pyplot as plt
    import pandas as pd

    waitDist = stats.expon(scale=5)
    xWait = np.linspace(0, 30, 200)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import numpy as np
