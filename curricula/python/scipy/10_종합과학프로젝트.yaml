    resultCheck: 출력 또는 assert 확인
- id: trend
  title: 시간 추이 분석
  structuredPrimary: true
  subtitle: 상태 변화 모니터링
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 신호를 세그먼트로 나누어 시간에 따른 특성 변화를 분석합니다. 결함이 진행되면 RMS와 첨도가 점진적으로 증가하는 경향을 보입니다. 이 추이를 모니터링하면 고장을 예측할 수 있습니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    segmentLen = 1000
    nSegments = n // segmentLen
    segmentRms = []
    segmentKurt = []

    for i in range(nSegments):
        seg = filteredSignal[i*segmentLen:(i+1)*segmentLen]
        segmentRms.append(np.sqrt(np.mean(seg**2)))
        segmentKurt.append(stats.kurtosis(seg))

    segmentTime = np.arange(nSegments) * (segmentLen / fs)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
