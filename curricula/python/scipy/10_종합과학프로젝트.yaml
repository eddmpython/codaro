- id: filter
  title: 신호 필터링
  structuredPrimary: true
  subtitle: scipy.signal
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 전력선 간섭(60Hz)을 노치 필터로 제거하고, 관심 대역 외의 고주파 노이즈를 저역통과 필터로 줄입니다. 필터 순서가 중요합니다. 먼저 노치로 특정 간섭을 제거한 후, 저역통과로 전체 대역을 정리합니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    bNotch, aNotch = signal.iirnotch(60 / (fs/2), 30)
    afterNotch = signal.filtfilt(bNotch, aNotch, rawSignal)

    sosLow = signal.butter(4, 200 / (fs/2), btype='low', output='sos')
    filteredSignal = signal.sosfiltfilt(sosLow, afterNotch)
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      bNotch, aNotch = signal.iirnotch(60 / (fs/2), 30)
      afterNotch = signal.filtfilt(bNotch, aNotch, rawSignal)

      sosLow = signal.butter(4, 200 / (fs/2), btype='low', output='sos')
      filteredSignal = signal.sosfiltfilt(sosLow, afterNotch)
    hints:
    - 기준 실행 후 값 하나를 바꿔 결과를 비교하세요.
