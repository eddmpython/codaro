- id: comparison
  title: 정상 vs 결함 비교
  structuredPrimary: true
  subtitle: 통계 검정
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 정상 상태(결함 없음)와 결함 상태의 진동 특성을 비교합니다. t-검정으로 두 상태의 RMS 값에 유의미한 차이가 있는지 확인합니다. 이런 통계 검정은 자동 이상 탐지 알고리즘의 기반이 됩니다.
