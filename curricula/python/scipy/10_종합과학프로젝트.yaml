sections:
- id: load
  title: 데이터 로드
  structuredPrimary: true
  subtitle: 진동 센서 시뮬레이션
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 산업용 기계에서 수집한 진동 센서 데이터를 분석합니다. 정상 진동(50Hz 회전 주파수), 베어링 결함 신호(120Hz), 전력선 간섭(60Hz), 랜덤 노이즈가 합성된 현실적인 센서 데이터를 생성합니다. 이런 데이터에서 결함을 감지하고 상태를 진단하는 것이 산업 현장의 핵심 과제입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import scipy

    import numpy as np
    from scipy import signal, fft, stats, optimize, integrate
    import matplotlib.pyplot as plt
    import pandas as pd

    np.random.seed(42)
    fs = 1000
    duration = 10
    t = np.linspace(0, duration, fs * duration, endpoint=False)
    n = len(t)

    rotationFreq = 50
    normalVib = 1.0 * np.sin(2 * np.pi * rotationFreq * t)
    normalVib += 0.3 * np.sin(2 * np.pi * 2 * rotationFreq * t)

    defectFreq = 120
    defectVib = 0.4 * np.sin(2 * np.pi * defectFreq * t)

    powerNoise = 0.2 * np.sin(2 * np.pi * 60 * t)
    randomNoise = 0.3 * np.random.randn(n)

    rawSignal = normalVib + defectVib + powerNoise + randomNoise
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
      import scipy

      import numpy as np
