    subtitle: 기존 라이브러리와의 차이
  - type: note
    style: info
    title: 전문 알고리즘의 보고
    content: 직접 구현하면 수백 줄이 필요한 알고리즘을 한 줄로 호출할 수 있습니다. 최적화 문제에서 minimize() 한 번이면 복잡한 경사하강법을 실행합니다. 통계검정에서
      ttest_ind() 한 번이면 t-검정 결과를 얻습니다. FORTRAN과 C로 작성된 검증된 알고리즘을 Python에서 편리하게 사용할 수 있습니다.
  - type: featureCards
    cards:
