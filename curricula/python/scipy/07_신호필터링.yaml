sections:
- id: load
  title: 데이터 로드
  structuredPrimary: true
  subtitle: 노이즈가 섞인 신호
  goal: 예제를 실행하고 핵심 동작을 직접 변형한다.
  why: 작은 실행과 검증 흐름이 실무 코드의 기본이다.
  explanation: 디지털 신호 처리(DSP)에서 필터는 특정 주파수 대역을 통과시키거나 제거합니다. 이 프로젝트에서는 5Hz 사인파에 고주파 노이즈가 섞인 신호를 생성하고, 필터링으로 원래 신호를 복원합니다. 실제 센서 데이터나 생체신호 분석에서 필수적인 기술입니다.
  tips:
  - 작게 실행하고 결과를 바로 확인하세요.
  snippet: |-
    import scipy

    import numpy as np
    from scipy import signal
    import matplotlib.pyplot as plt
    import pandas as pd

    fs = 500
    t = np.linspace(0, 1, fs)

    cleanSig = np.sin(2 * np.pi * 5 * t)
    noise = 0.5 * np.sin(2 * np.pi * 50 * t) + 0.3 * np.random.randn(len(t))
    noisySig = cleanSig + noise
  exercise:
    prompt: 예제를 실행한 뒤 값 하나를 바꿔 결과를 비교하세요.
    starterCode: |-
