meta:
  outcomeId: builtins.datetime
  status: draft
  version: 1
  note: "초안 - datetime 날짜·시간 오개념 시드. 사람이 정제 필요."

misconceptions:
  - id: builtins.datetime.strptimeFormatMismatch
    label: "문자열과 맞지 않는 형식으로 파싱"
    summary: "strptime의 형식 문자열이 실제 문자열과 달라 ValueError가 난다."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "ValueError: time data .* does not match format"
        description: "strptime 형식 불일치."
    diagnostic:
      message: "`strptime` 의 형식은 입력 문자열과 정확히 같아야 합니다. `2026-06-02` 는 `%Y-%m-%d`, `06/02/2026` 는 `%m/%d/%Y` 입니다. 구분자(- / .)와 순서를 맞추세요."
      references: ["builtins.datetime"]
    correction:
      hint: "입력 형식에 맞춰 지시자를 적으세요. `%Y-%m-%d`."
      miniExercise: |
        from datetime import datetime
        print(datetime.strptime("2026-06-02", "%Y-%m-%d"))

  - id: builtins.datetime.naiveAwareMix
    label: "naive와 aware 시간을 섞어 연산"
    summary: "시간대 정보가 있는 시각과 없는 시각을 빼서 TypeError가 난다."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "TypeError: can't subtract offset-naive and offset-aware datetimes"
        description: "naive/aware datetime 혼합 연산."
    diagnostic:
      message: "시간대가 있는(aware) 시각과 없는(naive) 시각은 바로 못 뺍니다. 둘 다 같은 종류로 맞추세요 - 보통 `datetime.now(timezone.utc)` 처럼 둘 다 aware로 만듭니다."
      references: ["builtins.datetime"]
    correction:
      hint: "양쪽을 모두 timezone-aware로 맞추세요."
      miniExercise: |
        from datetime import datetime, timezone
        a = datetime(2026, 6, 1, tzinfo=timezone.utc)
        b = datetime.now(timezone.utc)
        print((b - a).days)
