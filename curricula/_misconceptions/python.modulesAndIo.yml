meta:
  outcomeId: python.modulesAndIo
  status: draft
  version: 1
  note: "초안 — Predict-Run-Reconcile-Adapt 루프 1단계 시드. 사람이 정제 필요."

misconceptions:
  - id: python.modulesAndIo.fileNotClosed
    label: "open 후 with 미사용"
    summary: "f = open(...) 후 f.close()를 누락해 파일 핸들이 누수된다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "(^|\\n)\\s*[A-Za-z_]\\w*\\s*=\\s*open\\("
        description: "할당 방식의 open 호출."
    diagnostic:
      message: "`open()` 결과를 변수에 받아 close를 직접 호출하는 패턴은 예외가 나면 닫지 못합니다. `with` 문이 자동으로 닫아 줍니다."
      references: ["python.modulesAndIo"]
    correction:
      hint: "`with open(path, 'r', encoding='utf-8') as f:` 형태로 쓰세요. 블록을 벗어나면 자동으로 닫힙니다."
      miniExercise: |
        from pathlib import Path
        sample = Path("sample.txt")
        sample.write_text("hello", encoding="utf-8")
        with sample.open(encoding="utf-8") as f:
            content = f.read()
        sample.unlink()
        content

  - id: python.modulesAndIo.readCursorOnce
    label: "f.read()를 두 번 호출하면 같은 내용이 또 나올 거라 예측"
    summary: "같은 파일 객체에서 read()를 두 번째 호출하면 빈 문자열이 나온다."
    triggers:
      - kind: predictionMismatch
        appliesTo: prediction
        expectedField: value
        description: "두 번째 read 결과를 첫 번째와 같다고 예측."
    diagnostic:
      message: "파일 객체는 내부 커서를 가지고 있어 한 번 끝까지 읽으면 다음 read는 빈 문자열입니다. 다시 읽으려면 `f.seek(0)`."
      references: ["python.modulesAndIo"]
    correction:
      hint: "내용을 두 번 사용하려면 한 번 읽어서 변수에 담아두거나, `f.seek(0)`으로 커서를 되돌리세요."
      miniExercise: |
        from io import StringIO
        buf = StringIO("hello")
        once = buf.read()
        buf.seek(0)
        twice = buf.read()
        once, twice

  - id: python.modulesAndIo.relativeImportInScript
    label: "스크립트 직접 실행에서 상대 임포트"
    summary: "python file.py 로 실행하면서 from .util import x 를 써서 ImportError."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "ImportError.*attempted relative import"
        description: "패키지 컨텍스트 밖의 relative import."
    diagnostic:
      message: "상대 임포트(`from .x import y`)는 모듈이 패키지의 일부로 import될 때만 가능합니다. 스크립트로 직접 실행하면 `__package__`가 비어 있어 실패합니다."
      references: ["python.modulesAndIo"]
    correction:
      hint: "프로젝트 루트에서 `python -m package.module` 로 실행하거나, 절대 경로 임포트로 바꾸세요."
      miniExercise: |
        import json
        data = json.loads('{"key": "value"}')
        data
