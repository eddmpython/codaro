meta:
  outcomeId: python.advancedSyntax
  status: draft
  version: 1
  note: "초안 - 실제 코드와 에러로 관찰 가능한 오개념 시드. 사람이 정제 필요."

misconceptions:
  - id: python.advancedSyntax.comprehensionForSideEffect
    label: "부수효과만을 위해 list comprehension 사용"
    summary: "[print(x) for x in items] 처럼 결과를 버리는데 list를 만든다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "\\[\\s*print\\("
        description: "comprehension 안에 print."
    diagnostic:
      message: "리스트 comprehension은 결과 list를 메모리에 만듭니다. 부수효과만 원하면 일반 for 루프가 명확하고 메모리도 안 듭니다."
      references: ["python.advancedSyntax", "python.controlFlow"]
    correction:
      hint: "단순 반복은 `for x in items: print(x)`. 변환/필터가 있을 때만 comprehension을 쓰세요."
      miniExercise: |
        items = [1, 2, 3]
        lines = []
        for value in items:
            lines.append(f"value={value}")
        lines

  - id: python.advancedSyntax.lateBindingClosure
    label: "lambda 안의 late binding"
    summary: "[lambda: i for i in range(3)] 의 모든 lambda가 같은 i(=2)를 본다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "lambda\\s*:[^\\]\\)]*\\bfor\\s+\\w+\\s+in\\b"
        description: "comprehension 안에서 외부 변수를 닫는 lambda."
    diagnostic:
      message: "Python의 클로저는 변수를 값이 아니라 **이름**으로 캡처합니다. 루프 변수는 마지막 값으로 고정되어 모든 lambda가 같은 결과를 냅니다."
      references: ["python.advancedSyntax", "python.functions"]
    correction:
      hint: "기본 인자로 값을 고정하세요: `lambda i=i: i`. 또는 `functools.partial` 사용."
      miniExercise: |
        funcs = [lambda i=i: i for i in range(3)]
        [f() for f in funcs]
