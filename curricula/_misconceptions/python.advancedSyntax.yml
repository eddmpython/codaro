meta:
  outcomeId: python.advancedSyntax
  status: draft
  version: 1
  note: "초안 - Predict-Run-Reconcile-Adapt 루프 1단계 시드. 사람이 정제 필요."

misconceptions:
  - id: python.advancedSyntax.generatorConsumedOnce
    label: "제너레이터를 두 번 순회"
    summary: "동일 제너레이터를 두 번 for 돌리면 두 번째는 비어 있다."
    triggers:
      - kind: predictionMismatch
        appliesTo: prediction
        expectedField: value
        description: "두 번째 순회의 결과를 첫 번째와 같다고 예측."
    diagnostic:
      message: "제너레이터는 한 번 소진되면 다시 처음으로 돌아가지 않습니다. 두 번 쓰려면 list로 미리 변환하거나, 호출마다 새 제너레이터를 만드세요."
      references: ["python.advancedSyntax"]
    correction:
      hint: "한 번만 쓰면 메모리 효율, 두 번 이상이면 `list(gen)` 으로 고정하거나 generator function을 다시 호출."
      miniExercise: |
        def evens(limit):
            return (x for x in range(limit) if x % 2 == 0)
        first = list(evens(10))
        second = list(evens(10))
        first, second

  - id: python.advancedSyntax.comprehensionForSideEffect
    label: "부수효과만을 위해 list comprehension 사용"
    summary: "[print(x) for x in items] 처럼 결과를 버리는데 list를 만든다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "\\[\\s*print\\("
        description: "comprehension 안에 print."
    diagnostic:
      message: "리스트 comprehension은 결과 list를 메모리에 만듭니다. 부수효과만 원하면 일반 for 루프가 명확하고 메모리도 안 듭니다."
      references: ["python.advancedSyntax", "python.controlFlow"]
    correction:
      hint: "단순 반복은 `for x in items: print(x)`. 변환/필터가 있을 때만 comprehension을 쓰세요."
      miniExercise: |
        items = [1, 2, 3]
        lines = []
        for value in items:
            lines.append(f"value={value}")
        lines

  - id: python.advancedSyntax.lateBindingClosure
    label: "lambda 안의 late binding"
    summary: "[lambda: i for i in range(3)] 의 모든 lambda가 같은 i(=2)를 본다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "lambda\\s*:[^\\]\\)]*\\bfor\\s+\\w+\\s+in\\b"
        description: "comprehension 안에서 외부 변수를 닫는 lambda."
      - kind: predictionMismatch
        appliesTo: prediction
        expectedField: value
        description: "예측은 [0, 1, 2], 실제는 [2, 2, 2]."
    diagnostic:
      message: "Python의 클로저는 변수를 값이 아니라 **이름**으로 캡처합니다. 루프 변수는 마지막 값으로 고정되어 모든 lambda가 같은 결과를 냅니다."
      references: ["python.advancedSyntax", "python.functions"]
    correction:
      hint: "기본 인자로 값을 고정하세요: `lambda i=i: i`. 또는 `functools.partial` 사용."
      miniExercise: |
        funcs = [lambda i=i: i for i in range(3)]
        [f() for f in funcs]
