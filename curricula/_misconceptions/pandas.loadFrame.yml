meta:
  outcomeId: pandas.loadFrame
  status: draft
  version: 1
  note: "초안 - read_csv 와 데이터 로딩 단계의 흔한 함정."

misconceptions:
  - id: pandas.loadFrame.encodingFailure
    label: "한글 CSV를 UTF-8로 가정"
    summary: "Windows에서 만든 한글 CSV는 cp949 인 경우가 많은데 기본 UTF-8로 읽어 UnicodeDecodeError."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "UnicodeDecodeError.*(utf-8|0xb|0xf|0xc3|0xa0)"
        description: "UTF-8 디코딩 실패 - 한국어 환경에서 매우 흔함."
    diagnostic:
      message: "한글 데이터는 인코딩이 cp949 또는 euc-kr 인 경우가 많습니다. UnicodeDecodeError는 인코딩 불일치 신호입니다."
      references: ["pandas.loadFrame"]
    correction:
      hint: "`pd.read_csv(path, encoding='cp949')` 또는 `encoding='utf-8-sig'` (BOM 포함) 을 시도하세요."
      miniExercise: |
        import pandas as pd
        # df = pd.read_csv('data.csv', encoding='cp949')
        # 또는 try/except 로 두 encoding을 순차 시도
        sample = "name,score\\n홍길동,90"
        from io import StringIO
        df = pd.read_csv(StringIO(sample))
        df

  - id: pandas.loadFrame.indexColumnDuplicated
    label: "index_col 모르고 인덱스 컬럼이 데이터로 들어옴"
    summary: "DataFrame.shape 가 예상보다 컬럼이 1개 더 많고, 'Unnamed: 0' 같은 컬럼이 보인다."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "Unnamed:?\\s*0"
        description: "'Unnamed: 0' 컬럼 참조 - 인덱스가 데이터로 새어 들어왔다는 신호."
    diagnostic:
      message: "이전에 `to_csv()` 로 저장하면서 `index=False` 를 안 줬을 때 인덱스가 데이터 컬럼으로 남습니다. 다시 읽으면 'Unnamed: 0' 으로 나타납니다."
      references: ["pandas.loadFrame"]
    correction:
      hint: "저장할 때 `df.to_csv(path, index=False)`, 읽을 때 `pd.read_csv(path, index_col=0)` 으로 첫 컬럼을 인덱스로 지정."
      miniExercise: |
        import pandas as pd
        from io import StringIO
        sample = "name,score\\nA,90\\nB,85"
        df = pd.read_csv(StringIO(sample))
        df.columns.tolist()
