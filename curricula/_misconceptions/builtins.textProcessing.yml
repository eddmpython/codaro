meta:
  outcomeId: builtins.textProcessing
  status: draft
  version: 1
  note: "초안 — 문자열 처리(join/base64) 흔한 오개념 시드. 사람이 정제 필요."

misconceptions:
  - id: builtins.textProcessing.joinNonString
    label: "str.join 에 문자열이 아닌 항목 전달"
    summary: "'-'.join([1, 2, 3]) 처럼 숫자 리스트를 join 해서 TypeError 가 난다."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "TypeError: sequence item \\d+: expected str instance, \\w+ found"
        description: "join 대상에 비문자 항목 포함."
    diagnostic:
      message: "`str.join` 은 **문자열들만** 이어 붙입니다. 숫자가 섞여 있으면 먼저 문자열로 바꿔야 합니다. `'-'.join(str(n) for n in [1, 2, 3])`."
      references: ["builtins.textProcessing"]
    correction:
      hint: "각 항목을 `str()` 로 변환하세요. `','.join(map(str, items))`."
      miniExercise: |
        items = [1, 2, 3]
        print("-".join(str(n) for n in items))

  - id: builtins.textProcessing.base64NeedsBytes
    label: "base64 인코딩에 str 을 직접 전달"
    summary: "base64.b64encode('hi') 처럼 문자열을 넘겨 'bytes-like object is required' TypeError 가 난다."
    triggers:
      - kind: errorPattern
        appliesTo: error
        pattern: "TypeError: a bytes-like object is required, not 'str'"
        description: "bytes 가 필요한 곳에 str 전달."
    diagnostic:
      message: "`base64.b64encode` 는 **bytes** 를 받습니다. 문자열은 먼저 `.encode('utf-8')` 로 바이트로 바꾸세요. 결과를 다시 문자열로 보려면 `.decode('ascii')`."
      references: ["builtins.textProcessing"]
    correction:
      hint: "`base64.b64encode('hi'.encode('utf-8'))` 처럼 먼저 encode 하세요."
      miniExercise: |
        import base64
        encoded = base64.b64encode("hi".encode("utf-8"))
        print(encoded.decode("ascii"))
