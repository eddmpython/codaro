meta:
  outcomeId: pandas.filterSelect
  status: draft
  version: 1
  note: "초안 - loc/iloc, boolean masking, chained assignment 등 데이터 분석 핵심 오개념."

misconceptions:
  - id: pandas.filterSelect.booleanWithAnd
    label: "boolean mask에 and/or 사용"
    summary: "`df[(df.a > 0) and (df.b < 5)]` 처럼 Python and 를 써서 ValueError 또는 잘못된 결과."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "df\\s*\\[[^\\]]*\\)\\s+(and|or)\\s+\\("
        description: "boolean Series 결합에 `and`/`or` 사용."
      - kind: errorPattern
        appliesTo: error
        pattern: "ValueError.*truth value of (a|an) (Series|array) is ambiguous"
        description: "Series 의 진리값 모호 에러."
    diagnostic:
      message: "boolean Series 는 `&` (and), `|` (or), `~` (not) 로 결합합니다. `and`/`or` 는 단일 값을 기대해서 Series에 못 씁니다. 각 조건은 괄호로 감싸야 합니다."
      references: ["pandas.filterSelect"]
    correction:
      hint: "`df[(df.a > 0) & (df.b < 5)]` - 괄호 + `&`. 가독성이 떨어지면 `df.query('a > 0 and b < 5')` 도 가능."
      miniExercise: |
        import pandas as pd
        df = pd.DataFrame({"a": [1, -1, 3], "b": [4, 5, 2]})
        filtered = df[(df.a > 0) & (df.b < 5)]
        filtered

  - id: pandas.filterSelect.chainedAssignmentWarning
    label: "체인 할당으로 원본 변경 시도"
    summary: "`df[df.a > 0]['b'] = 0` 같이 chained indexing 에 할당 - SettingWithCopyWarning 또는 원본 미변경."
    triggers:
      - kind: codePattern
        appliesTo: code
        pattern: "\\[[^\\]]+\\]\\s*\\[[^\\]]+\\]\\s*="
        description: "두 개의 `[]` 인덱싱 후 할당 - chained assignment."
      - kind: errorPattern
        appliesTo: error
        pattern: "SettingWithCopyWarning"
        description: "pandas 경고 직접 잡힘."
    diagnostic:
      message: "`df[mask][col] = value` 는 임시 복사본에 할당될 수 있어 원본에 반영을 보장하지 못합니다. `.loc[mask, col] = value` 가 안전합니다."
      references: ["pandas.filterSelect"]
    correction:
      hint: "조건 + 열을 한 번의 `.loc` 로 표현하세요. `df.loc[df.a > 0, 'b'] = 0`."
      miniExercise: |
        import pandas as pd
        df = pd.DataFrame({"a": [1, -1, 3], "b": [10, 20, 30]})
        df.loc[df.a > 0, "b"] = 0
        df
