- id: matplotlib_history
  blocks:
    - type: sectionHeader
      title: "🏛️ Matplotlib의 역사"
      subtitle: "파이썬 시각화의 뿌리"

    - type: text
      content: |-
        Matplotlib은 2003년 John Hunter가 만들었습니다. 당시 그는 뇌전증 환자의 뇌파 데이터를 분석하던 신경생물학자였습니다. MATLAB의 시각화 기능을 파이썬에서 사용하고 싶어서 시작된 프로젝트입니다.

        20년이 넘는 시간 동안 과학/공학 분야의 표준 시각화 도구로 자리잡았습니다. Seaborn, Pandas의 plot 기능, 심지어 일부 다른 시각화 라이브러리도 내부적으로 Matplotlib을 기반으로 합니다.

    - type: featureCards
      cards:
        - emoji: "🔬"
          title: "과학 커뮤니티 표준"
          description: "Nature, Science 등 학술지 논문의 대부분이 Matplotlib 사용"
        - emoji: "📚"
          title: "방대한 문서와 예제"
          description: "20년간 축적된 튜토리얼, 갤러리, Stack Overflow 답변"
        - emoji: "🧬"
          title: "다른 라이브러리의 기반"
          description: "Seaborn, Pandas plot 등이 Matplotlib 위에 구축됨"
        - emoji: "🔧"
          title: "완전한 제어권"
          description: "그래프의 모든 요소를 픽셀 단위로 조정 가능"

- id: visualization_tools
  blocks:
    - type: sectionHeader
      title: "🗺️ 파이썬 시각화 생태계"
      subtitle: "다양한 도구들의 역할"

    - type: text
      content: |-
        파이썬에는 다양한 시각화 라이브러리가 있습니다. 각각 장단점이 있어서 용도에 맞게 선택하면 됩니다. Matplotlib을 먼저 배우면 다른 라이브러리를 이해하기 쉬워집니다.

    - type: table
      headers: ["라이브러리", "특징", "주요 용도"]
      rows:
        - ["Matplotlib", "정적 차트, 완전한 제어, 논문 품질", "논문, 보고서, 출판물"]
        - ["Seaborn", "통계 시각화, 예쁜 기본 스타일", "탐색적 분석, 통계 차트"]
        - ["Plotly", "인터랙티브, 웹 기반, 호버 정보", "대시보드, 웹 앱"]
        - ["Altair", "선언형 문법, 간결한 코드", "빠른 프로토타이핑"]
        - ["Bokeh", "대용량 데이터, 스트리밍", "실시간 대시보드"]
        - ["Pandas plot", "DataFrame에서 바로 시각화", "빠른 탐색"]

    - type: note
      style: info
      title: "Matplotlib이 먼저인 이유"
      content: "Seaborn은 Matplotlib 위에 만들어졌고, Pandas plot도 내부적으로 Matplotlib을 사용합니다. Matplotlib의 Figure, Axes 개념을 이해하면 다른 라이브러리도 쉽게 배울 수 있습니다."

- id: figure_axes
  blocks:
    - type: sectionHeader
      title: "🖼️ Figure와 Axes 이해하기"
      subtitle: "Matplotlib의 핵심 구조"

    - type: text
      content: |-
        Matplotlib을 제대로 사용하려면 Figure와 Axes의 관계를 이해해야 합니다.

        Figure는 전체 그림판입니다. 도화지 한 장이라고 생각하세요. Axes는 실제 차트가 그려지는 영역입니다. 하나의 Figure에 여러 개의 Axes를 배치할 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "🖼️"
          title: "Figure"
          description: "전체 그림판. 크기, 해상도, 배경색 등을 설정"
        - emoji: "📊"
          title: "Axes"
          description: "실제 차트 영역. 데이터, 축, 제목 등을 설정"
        - emoji: "📐"
          title: "Axis"
          description: "x축, y축. 눈금, 범위, 라벨 설정"
        - emoji: "🎨"
          title: "Artist"
          description: "화면에 그려지는 모든 요소 (선, 점, 텍스트 등)"

    - type: note
      style: info
      title: "pyplot vs 객체 지향"
      content: "plt.plot() 같은 pyplot 방식은 빠르게 그릴 때 편리합니다. fig, ax = plt.subplots() 같은 객체 지향 방식은 복잡한 차트를 세밀하게 제어할 때 사용합니다. 이 과정에서는 두 방식 모두 배웁니다."

