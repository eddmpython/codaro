        - ["웹 대시보드", "X", "정적 이미지만 가능"]
        - ["상호작용 필요", "X", "줌/팬/호버 미지원"]

    - type: note
      style: tip
      title: "정적 시각화의 장점"
      content: "인터랙티브 차트는 웹에서 편리하지만, 논문이나 보고서에 넣을 때는 고해상도 이미지가 필요합니다. Matplotlib은 이런 상황에 최적화되어 있습니다."

