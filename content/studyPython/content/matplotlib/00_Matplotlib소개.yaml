        - ["세밀한 커스터마이징", "O", "모든 요소 픽셀 단위 제어"]
        - ["고해상도 이미지 필요", "O", "300dpi 이상 출력 가능"]
        - ["3D 시각화", "O", "Axes3D 지원"]
