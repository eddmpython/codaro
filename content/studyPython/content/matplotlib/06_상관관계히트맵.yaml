meta:
  id: matplotlib_06
  title: 상관관계히트맵
  order: 6
  category: matplotlib
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["matplotlib", "imshow", "cmap", "colorbar", "heatmap", "correlation"]
  seo:
    title: "Matplotlib 히트맵 - 변수 간 상관관계 시각화"
    description: "Matplotlib으로 iris 데이터의 상관관계를 히트맵으로 시각화합니다. imshow, cmap, colorbar, text 사용법을 배웁니다."
    keywords: ["matplotlib", "heatmap", "imshow", "colorbar", "상관관계", "correlation"]

intro:
  emoji: "🔥"
  goal: 변수 간 상관관계를 히트맵으로 시각화합니다.
  description: 히트맵은 행렬 데이터를 색상으로 표현하는 차트입니다. 상관관계 분석에서 어떤 변수들이 관련성이 높은지 한눈에 파악할 수 있습니다. 이전에 배운 plot, hist, scatter, bar, boxplot, subplots, text 개념을 함께 활용합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: iris 데이터의 4가지 수치형 변수(꽃받침 길이/너비, 꽃잎 길이/너비) 간의 상관관계를 분석합니다. 상관계수는 -1에서 1 사이의 값으로, 1에 가까울수록 강한 양의 상관, -1에 가까울수록 강한 음의 상관을 나타냅니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: matplotlib, seaborn, numpy를 불러옵니다
    content: |-
      import matplotlib.pyplot as plt
      import seaborn as sns
      import numpy as np
  - type: tip
    content: import matplotlib.pyplot as plt는 matplotlib의 pyplot 모듈을 plt라는 짧은 이름으로 불러오는 관례입니다. seaborn은 sns로, numpy는 np로 줄여 쓰는 것이 데이터 과학 커뮤니티의 표준입니다.

- id: step1_font
  title: 1-1단계. 한글 폰트 설정
  subtitle: Pyodide 환경 폰트
  blocks:
  - type: text
    content: Pyodide(웹 브라우저) 환경에서는 시스템 폰트를 사용할 수 없어 한글이 깨집니다. CDN에서 폰트 파일을 다운로드하여 matplotlib에 등록하는 방식으로 해결합니다. Pretendard는 무료 오픈소스 폰트로, 한글과 영문 모두 깔끔하게 표시됩니다.
  - type: code
    language: python
    title: 한글 폰트 설정
    description: Pretendard 폰트를 다운로드하여 matplotlib에 등록합니다
    content: |-
      import micropip
      await micropip.install('pyodide-http')

      import pyodide_http
      pyodide_http.patch_all()

      from matplotlib import font_manager
      from js import fetch
      from pathlib import Path

      fontUrl = "https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard/dist/public/static/Pretendard-Regular.otf"
      response = await fetch(fontUrl)
      fontBuffer = await response.arrayBuffer()

      fontPath = Path("/tmp/Pretendard-Regular.otf")
      fontPath.write_bytes(fontBuffer.to_py())

      font_manager.fontManager.addfont(str(fontPath))
      plt.rcParams['font.family'] = 'Pretendard'
      plt.rcParams['axes.unicode_minus'] = False
  - type: tip
    content: Pyodide 환경에서는 fetch API로 외부 리소스를 가져옵니다. font_manager.addfont()로 폰트를 등록하고, rcParams로 기본 폰트를 설정합니다. axes.unicode_minus = False는 마이너스 기호가 깨지는 것을 방지합니다.

- id: step2_data
  title: 2단계. 데이터 로드 및 상관행렬
  subtitle: corr()
  blocks:
  - type: text
    content: iris 데이터를 불러오고 수치형 컬럼만 선택하여 상관행렬을 계산합니다. pandas의 corr() 메서드는 피어슨 상관계수를 계산합니다. 결과는 4x4 대칭 행렬로, 대각선은 항상 1입니다(자기 자신과의 상관).
  - type: code
    language: python
    title: 상관행렬 계산
    description: iris 데이터의 상관행렬을 계산합니다
    content: |-
      iris = sns.load_dataset('iris')
      numericCols = ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
      corrMatrix = iris[numericCols].corr()
      corrMatrix

- id: step3_imshow
  title: 3단계. 기본 히트맵
  subtitle: ax.imshow()
  blocks:
  - type: text
    content: imshow()는 2차원 배열을 이미지로 표시하는 함수입니다. 상관행렬을 imshow()에 전달하면 각 셀의 값에 따라 색상이 지정됩니다. 기본 컬러맵은 viridis로, 낮은 값은 보라색, 높은 값은 노란색으로 표시됩니다.
  - type: code
    language: python
    title: 기본 히트맵
    description: 상관행렬을 히트맵으로 시각화합니다
    content: |-
      figHeat, axHeat = plt.subplots(figsize=(8, 6))
      im = axHeat.imshow(corrMatrix)
      axHeat.set_title('Iris 변수 간 상관관계', fontsize=14)
      figHeat
  - type: tip
    content: ax.imshow(2D배열)로 히트맵을 그립니다. 반환값(im)은 이미지 객체로, 나중에 컬러바를 추가할 때 사용합니다. 기본적으로 배열의 값 범위에 맞춰 색상이 자동으로 매핑됩니다.

- id: step4_cmap
  title: 4단계. 컬러맵 설정
  subtitle: cmap 파라미터
  blocks:
  - type: text
    content: 컬러맵(colormap)은 수치를 색상으로 변환하는 규칙입니다. 상관관계에는 발산형(diverging) 컬러맵이 적합합니다. 'coolwarm'은 음수는 파란색, 양수는 빨간색으로 표시하여 상관관계의 방향을 직관적으로 보여줍니다.
  - type: code
    language: python
    title: 컬러맵 변경
    description: coolwarm 컬러맵으로 상관관계 방향을 표시합니다
    content: |-
      figCmap, axCmap = plt.subplots(figsize=(8, 6))
      im = axCmap.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      axCmap.set_title('Iris 변수 간 상관관계', fontsize=14)
      figCmap
  - type: tip
    content: "cmap으로 컬러맵을 지정합니다. 상관관계에 적합한 발산형 컬러맵: 'coolwarm', 'RdBu_r', 'seismic'. vmin, vmax로 색상 매핑 범위를 지정합니다. 상관계수는 -1~1이므로 vmin=-1, vmax=1로 설정합니다."

- id: step5_colorbar
  title: 5단계. 컬러바 추가
  subtitle: plt.colorbar()
  blocks:
  - type: text
    content: 컬러바는 색상과 수치의 관계를 보여주는 범례입니다. 히트맵을 해석할 때 어떤 색이 어떤 값을 나타내는지 알 수 있습니다. plt.colorbar()에 이미지 객체와 축을 전달하여 추가합니다.
  - type: code
    language: python
    title: 컬러바 추가
    description: 색상 범례를 추가합니다
    content: |-
      figColorbar, axColorbar = plt.subplots(figsize=(9, 6))
      im = axColorbar.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axColorbar, label='상관계수')
      axColorbar.set_title('Iris 변수 간 상관관계', fontsize=14)
      figColorbar
  - type: tip
    content: plt.colorbar(im, ax=ax)로 컬러바를 추가합니다. im은 imshow()의 반환값, ax는 히트맵이 그려진 축입니다. label로 컬러바 제목을 설정합니다. shrink 파라미터로 컬러바 크기를 조절할 수 있습니다.

- id: step6_ticks
  title: 6단계. 축 눈금 설정
  subtitle: set_xticks(), set_xticklabels()
  blocks:
  - type: text
    content: 히트맵의 x축과 y축에 변수명을 표시해야 어떤 변수 간의 상관관계인지 알 수 있습니다. set_xticks()로 눈금 위치를 설정하고, set_xticklabels()로 라벨을 지정합니다. 한글 라벨로 변경하면 가독성이 높아집니다.
  - type: code
    language: python
    title: 히트맵 및 컬러바
    description: 히트맵을 그리고 컬러바를 추가합니다
    content: |-
      figTicks, axTicks = plt.subplots(figsize=(9, 7))
      im = axTicks.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axTicks, label='상관계수')
      figTicks
  - type: code
    language: python
    title: 축 라벨 설정
    description: 변수명을 한글로 표시합니다
    content: |-
      labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
      axTicks.set_xticks(range(len(labelsKr)))
      axTicks.set_yticks(range(len(labelsKr)))
      axTicks.set_xticklabels(labelsKr)
      axTicks.set_yticklabels(labelsKr)

      axTicks.set_title('Iris 변수 간 상관관계', fontsize=14)
      figTicks
  - type: tip
    content: set_xticks(range(n))로 0, 1, 2, ...의 위치에 눈금을 설정합니다. set_xticklabels(리스트)로 각 눈금에 표시할 텍스트를 지정합니다. 라벨에 줄바꿈(\\n)을 사용하면 긴 라벨도 깔끔하게 표시됩니다.

- id: step7_text
  title: 7단계. 셀에 값 표시
  subtitle: ax.text()
  blocks:
  - type: text
    content: 각 셀에 상관계수 값을 직접 표시하면 정확한 수치를 파악할 수 있습니다. 이중 for 루프로 모든 셀을 순회하며 text()로 값을 추가합니다. 배경색에 따라 텍스트 색상을 조절하면 가독성이 높아집니다.
  - type: code
    language: python
    title: 히트맵 및 라벨 설정
    description: 히트맵을 그리고 축 라벨을 설정합니다
    content: |-
      figText, axText = plt.subplots(figsize=(9, 7))
      im = axText.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axText, label='상관계수')

      labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
      axText.set_xticks(range(len(labelsKr)))
      axText.set_yticks(range(len(labelsKr)))
      axText.set_xticklabels(labelsKr)
      axText.set_yticklabels(labelsKr)
      figText
  - type: code
    language: python
    title: 셀에 값 표시
    description: 각 셀에 상관계수 값을 표시합니다
    content: |-
      for i in range(len(numericCols)):
          for j in range(len(numericCols)):
              val = corrMatrix.iloc[i, j]
              textColor = 'white' if abs(val) > 0.5 else 'black'
              axText.text(j, i, f'{val:.2f}', ha='center', va='center',
                         color=textColor, fontsize=12, fontweight='bold')

      axText.set_title('Iris 변수 간 상관관계', fontsize=14)
      figText

- id: step8_annotate
  title: 8단계. 상관관계 해석
  subtitle: 패턴 분석
  blocks:
  - type: text
    content: 히트맵에서 발견한 패턴을 해석합니다. 꽃잎 길이와 너비는 0.96으로 매우 강한 양의 상관관계를 보입니다. 반면 꽃받침 너비는 다른 변수와 약한 상관(음의 상관도 있음)을 보입니다. 이런 정보는 머신러닝에서 특성 선택에 활용됩니다.
  - type: code
    language: python
    title: 히트맵 및 라벨 설정
    description: 히트맵을 그리고 축 라벨을 설정합니다
    content: |-
      figHighlight, axHighlight = plt.subplots(figsize=(9, 7))
      im = axHighlight.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axHighlight, label='상관계수')

      labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
      axHighlight.set_xticks(range(len(labelsKr)))
      axHighlight.set_yticks(range(len(labelsKr)))
      axHighlight.set_xticklabels(labelsKr)
      axHighlight.set_yticklabels(labelsKr)
      figHighlight
  - type: code
    language: python
    title: 강한 상관관계 강조
    description: 상관계수가 0.7 이상인 셀을 굵게 표시합니다
    content: |-
      for i in range(len(numericCols)):
          for j in range(len(numericCols)):
              val = corrMatrix.iloc[i, j]
              textColor = 'white' if abs(val) > 0.5 else 'black'
              fontWeight = 'bold' if abs(val) > 0.7 and i != j else 'normal'
              axHighlight.text(j, i, f'{val:.2f}', ha='center', va='center',
                              color=textColor, fontsize=11, fontweight=fontWeight)

      axHighlight.set_title('Iris 변수 간 상관관계 (강한 상관 강조)', fontsize=14)
      figHighlight

- id: step9_subplots
  title: 9단계. 상관관계 + 산점도 비교
  subtitle: 시각화 조합
  blocks:
  - type: text
    content: 히트맵에서 발견한 강한 상관관계(꽃잎 길이-너비)를 산점도로 확인합니다. 이전에 배운 산점도 기법을 활용하여 실제 데이터 포인트가 어떻게 분포하는지 봅니다.
  - type: code
    language: python
    title: Figure 및 히트맵
    description: 1x2 Figure를 만들고 히트맵을 그립니다
    content: |-
      figCombine, (axHeatCombine, axScatterCombine) = plt.subplots(1, 2, figsize=(14, 6))

      im = axHeatCombine.imshow(corrMatrix, cmap='coolwarm', vmin=-1, vmax=1)
      plt.colorbar(im, ax=axHeatCombine, label='상관계수', shrink=0.8)
      labelsKr = ['꽃받침\n길이', '꽃받침\n너비', '꽃잎\n길이', '꽃잎\n너비']
      axHeatCombine.set_xticks(range(len(labelsKr)))
      axHeatCombine.set_yticks(range(len(labelsKr)))
      axHeatCombine.set_xticklabels(labelsKr)
      axHeatCombine.set_yticklabels(labelsKr)
      figCombine
  - type: code
    language: python
    title: 히트맵 값 표시
    description: 각 셀에 상관계수를 표시합니다
    content: |-
      for i in range(4):
          for j in range(4):
              val = corrMatrix.iloc[i, j]
              textColor = 'white' if abs(val) > 0.5 else 'black'
              axHeatCombine.text(j, i, f'{val:.2f}', ha='center', va='center',
                                color=textColor, fontsize=10)
      axHeatCombine.set_title('상관관계 히트맵', fontsize=12)
      figCombine
  - type: code
    language: python
    title: 산점도 추가
    description: 강한 상관관계를 산점도로 확인합니다
    content: |-
      species = ['setosa', 'versicolor', 'virginica']
      colors = ['#E74C3C', '#27AE60', '#3498DB']
      for sp, col in zip(species, colors):
          subset = iris[iris['species'] == sp]
          axScatterCombine.scatter(subset['petal_length'], subset['petal_width'],
                                   c=col, label=sp, alpha=0.7)
      axScatterCombine.set_title('꽃잎 길이 vs 너비 (r=0.96)', fontsize=12)
      axScatterCombine.set_xlabel('꽃잎 길이 (cm)')
      axScatterCombine.set_ylabel('꽃잎 너비 (cm)')
      axScatterCombine.legend()

      plt.suptitle('상관관계 분석', fontsize=14, fontweight='bold')
      plt.tight_layout()
      figCombine

- id: step10_final
  title: 10단계. 최종 시각화
  subtitle: 완성된 히트맵
  blocks:
  - type: text
    content: 지금까지 배운 모든 요소를 종합하여 완성도 높은 상관관계 히트맵을 만듭니다. 깔끔한 스타일링과 명확한 라벨로 전문적인 분석 결과물을 완성합니다.
  - type: code
    language: python
    title: 히트맵 및 컬러바
    description: 히트맵을 그리고 컬러바를 추가합니다
    content: |-
      figFinal, axFinal = plt.subplots(figsize=(10, 8))

      im = axFinal.imshow(corrMatrix, cmap='RdBu_r', vmin=-1, vmax=1)
      cbar = plt.colorbar(im, ax=axFinal, shrink=0.8)
      cbar.set_label('피어슨 상관계수', fontsize=11)
      figFinal
  - type: code
    language: python
    title: 축 라벨 설정
    description: 변수명을 표시합니다
    content: |-
      labelsKr = ['꽃받침 길이', '꽃받침 너비', '꽃잎 길이', '꽃잎 너비']
      axFinal.set_xticks(range(len(labelsKr)))
      axFinal.set_yticks(range(len(labelsKr)))
      axFinal.set_xticklabels(labelsKr, fontsize=11)
      axFinal.set_yticklabels(labelsKr, fontsize=11)
      figFinal
  - type: code
    language: python
    title: 값 표시 및 제목
    description: 각 셀에 값을 표시하고 제목을 추가합니다
    content: |-
      for i in range(4):
          for j in range(4):
              val = corrMatrix.iloc[i, j]
              textColor = 'white' if abs(val) > 0.6 else 'black'
              axFinal.text(j, i, f'{val:.2f}', ha='center', va='center',
                          color=textColor, fontsize=13, fontweight='bold')

      axFinal.set_title('Iris 데이터셋 변수 간 상관관계 분석', fontsize=16, fontweight='bold', pad=15)
      plt.tight_layout()
      figFinal

- id: practice
  title: 실습
  subtitle: 상관관계 분석 프로젝트
  blocks:
  - type: text
    content: 지금까지 배운 내용을 활용해서 다양한 데이터의 상관관계를 분석해봅시다. imshow, cmap, colorbar, text 등 모든 개념을 종합적으로 활용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 펭귄 데이터 상관관계 히트맵"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import matplotlib.pyplot as plt
        import seaborn as sns

        penguins = sns.load_dataset('penguins').dropna()
        measureCols = ['bill_length_mm', 'bill_depth_mm', 'flipper_length_mm', 'body_mass_g']
        matrix = penguins[measureCols].corr()
    - type: code
      title: "히트맵 생성"
      content: |-
        chart, plot = plt.subplots(figsize=(10, 8))
        img = plot.imshow(matrix, cmap='coolwarm', vmin=-1, vmax=1)
        bar = plt.colorbar(img, ax=plot, shrink=0.8)
        bar.set_label('상관계수', fontsize=11)

        tags = ['부리 길이', '부리 깊이', '날개 길이', '체중']
        plot.set_xticks(range(len(tags)))
        plot.set_yticks(range(len(tags)))
        plot.set_xticklabels(tags, fontsize=11)
        plot.set_yticklabels(tags, fontsize=11)

        for i in range(4):
            for j in range(4):
                val = matrix.iloc[i, j]
                fontColor = 'white' if abs(val) > 0.5 else 'black'
                plot.text(j, i, f'{val:.2f}', ha='center', va='center',
                          color=fontColor, fontsize=12, fontweight='bold')

        plot.set_title('펭귄 신체 특성 간 상관관계', fontsize=14, fontweight='bold')
        plt.tight_layout()
        chart
  - type: expansion
    title: "미션2: tips 데이터 상관관계 + 산점도 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import matplotlib.pyplot as plt
        import seaborn as sns

        tips2 = sns.load_dataset('tips')
        valueCols = ['total_bill', 'tip', 'size']
        corrMat = tips2[valueCols].corr()

        canvas, panels = plt.subplots(1, 2, figsize=(14, 6))
    - type: code
      title: "히트맵"
      content: |-
        image = panels[0].imshow(corrMat, cmap='RdBu_r', vmin=-1, vmax=1)
        plt.colorbar(image, ax=panels[0], shrink=0.8)
        names = ['결제금액', '팁', '인원수']
        panels[0].set_xticks(range(3))
        panels[0].set_yticks(range(3))
        panels[0].set_xticklabels(names)
        panels[0].set_yticklabels(names)
        for i in range(3):
            for j in range(3):
                value = corrMat.iloc[i, j]
                txtColor = 'white' if abs(value) > 0.5 else 'black'
                panels[0].text(j, i, f'{value:.2f}', ha='center', va='center',
                               color=txtColor, fontsize=12, fontweight='bold')
        panels[0].set_title('상관관계 히트맵', fontsize=12)
    - type: code
      title: "산점도"
      content: |-
        panels[1].scatter(tips2['total_bill'], tips2['tip'],
                          alpha=0.6, c='#3498DB', edgecolors='white')
        panels[1].set_title('결제금액 vs 팁 (r=0.68)', fontsize=12)
        panels[1].set_xlabel('결제금액 ($)')
        panels[1].set_ylabel('팁 ($)')
        panels[1].grid(True, alpha=0.3)

        plt.suptitle('레스토랑 팁 데이터 상관관계 분석', fontsize=14, fontweight='bold')
        plt.tight_layout()
        canvas

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 히트맵으로 변수 간 상관관계를 분석했습니다.
  - type: list
    items:
    - "ax.imshow(2D배열) - 행렬 데이터를 히트맵으로 시각화"
    - "cmap='coolwarm' - 발산형 컬러맵으로 양/음의 상관 구분"
    - "vmin, vmax - 색상 매핑 범위 설정"
    - "plt.colorbar(im, ax) - 색상 범례 추가"
    - "set_xticks(), set_xticklabels() - 축 눈금과 라벨 설정"
    - "ax.text() - 셀에 값 표시"
    - "df.corr() - pandas 상관행렬 계산"
  - type: text
    content: 다음 시간에는 이중 축 차트로 시계열 데이터를 분석합니다.
