meta:
  id: numpy_05
  title: BMI계산기
  order: 5
  category: numpy
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["numpy", "broadcasting", "vectorization", "where", "digitize"]
  seo:
    title: "NumPy 브로드캐스팅 - BMI 계산기"
    description: "NumPy의 브로드캐스팅과 벡터 연산을 배우며 10,000명의 키/몸무게 데이터로 BMI를 계산합니다."
    keywords: ["numpy", "브로드캐스팅", "벡터화", "BMI", "broadcasting"]

intro:
  emoji: "⚖️"
  goal: 10,000명의 키/몸무게 데이터로 BMI를 계산합니다.
  description: 브로드캐스팅을 활용한 벡터 연산으로 반복문 없이 대량의 데이터를 빠르게 처리하는 방법을 배웁니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: NumPy와 pandas를 불러옵니다. pandas는 CSV 로딩용으로만 사용합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: numpy와 pandas를 불러옵니다
    content: |-
      import numpy as np
      import pandas as pd

- id: step2_data
  title: 2단계. 데이터 로드
  subtitle: 키/몸무게 데이터
  blocks:
  - type: text
    content: "10,000명의 키와 몸무게 데이터를 로드합니다. 데이터가 미국 단위로 되어 있어서 키는 인치(inch, 1인치=2.54cm), 몸무게는 파운드(pound, 1파운드=0.45kg)입니다. 나중에 우리가 익숙한 미터와 킬로그램으로 변환할 예정입니다."
  - type: code
    language: python
    title: 데이터 로드
    description: 키/몸무게 데이터를 불러옵니다
    content: |-
      url = "https://raw.githubusercontent.com"
      df = pd.read_csv(f"{url}/chandanverma07/DataSets/master/weight-height.csv")
      df.head()

- id: step3_shape
  title: 3단계. 데이터 구조 확인
  subtitle: shape
  blocks:
  - type: text
    content: 데이터의 크기를 확인합니다.
  - type: code
    language: python
    title: 데이터 크기
    description: 데이터 shape를 확인합니다
    content: |-
      df.shape

- id: step4_extract
  title: 4단계. 배열 추출
  subtitle: Height, Weight
  blocks:
  - type: text
    content: 키(인치)와 몸무게(파운드) 데이터를 NumPy 배열로 추출합니다.
  - type: code
    language: python
    title: 배열 추출
    description: 키와 몸무게를 배열로 추출합니다
    content: |-
      inch = df['Height'].values
      lbs = df['Weight'].values
      inch[:10]

- id: step5_convert_height
  title: 5단계. 키 단위 변환
  subtitle: 인치 → 미터
  blocks:
  - type: text
    content: "브로드캐스팅(Broadcasting)은 NumPy의 핵심 기능입니다. 배열에 하나의 숫자(스칼라)를 곱하면, NumPy가 자동으로 배열의 모든 요소에 그 연산을 적용합니다. inch * 0.0254 한 줄로 10,000개 값 모두가 인치에서 미터로 변환됩니다. for문을 쓸 필요가 없습니다."
  - type: code
    language: python
    title: 키 미터 변환
    description: 인치를 미터로 변환합니다
    content: |-
      meter = inch * 0.0254
      meter[:10]
  - type: tip
    content: NumPy 배열에 스칼라 값을 곱하면 모든 요소에 자동으로 연산이 적용됩니다. 이것이 브로드캐스팅의 가장 기본적인 형태입니다.

- id: step6_convert_weight
  title: 6단계. 몸무게 단위 변환
  subtitle: 파운드 → 킬로그램
  blocks:
  - type: text
    content: 몸무게를 파운드에서 킬로그램으로 변환합니다.
  - type: code
    language: python
    title: 몸무게 kg 변환
    description: 파운드를 킬로그램으로 변환합니다
    content: |-
      kg = lbs * 0.453592
      kg[:10]

- id: step7_bmi
  title: 7단계. BMI 계산
  subtitle: 벡터 연산
  blocks:
  - type: text
    content: "BMI(Body Mass Index, 체질량지수)는 비만도를 측정하는 지표입니다. 공식은 체중(kg) ÷ 키(m)²입니다. NumPy에서는 배열끼리의 연산도 요소별로 자동 적용됩니다. kg 배열과 meter 배열의 같은 위치 값들끼리 계산되어 10,000명의 BMI가 한 번에 계산됩니다. 이를 벡터 연산(vectorization)이라 합니다."
  - type: code
    language: python
    title: BMI 계산
    description: 10,000명의 BMI를 한 번에 계산합니다
    content: |-
      bmi = kg / (meter ** 2)
      bmi[:10]
  - type: tip
    content: 배열 간 연산도 요소별로 자동 적용됩니다. kg / meter ** 2는 각 사람의 BMI를 한 번에 계산합니다.

- id: step8_stats
  title: 8단계. BMI 통계
  subtitle: 기본 통계량
  blocks:
  - type: text
    content: BMI의 평균, 최소, 최대, 표준편차를 확인합니다.
  - type: code
    language: python
    title: BMI 통계
    description: BMI 통계량을 확인합니다
    content: |-
      f"평균: {np.mean(bmi):.2f}, 최소: {np.min(bmi):.2f}, 최대: {np.max(bmi):.2f}, 표준편차: {np.std(bmi):.2f}"

- id: step9_category
  title: 9단계. BMI 분류
  subtitle: 중첩 where
  blocks:
  - type: text
    content: "세계보건기구(WHO) 기준으로 BMI를 분류합니다. 18.5 미만은 저체중(Underweight), 18.5~25는 정상(Normal), 25~30은 과체중(Overweight), 30 이상은 비만(Obese)입니다. np.where를 중첩하면 4개 이상의 카테고리로 분류할 수 있습니다."
  - type: code
    language: python
    title: 체중 상태 분류
    description: BMI 기준으로 분류합니다
    content: |-
      category = np.where(bmi < 18.5, 'Underweight',
                 np.where(bmi < 25, 'Normal',
                 np.where(bmi < 30, 'Overweight', 'Obese')))
      category[:10]

- id: step10_count
  title: 10단계. 카테고리별 집계
  subtitle: np.unique()
  blocks:
  - type: text
    content: 각 카테고리별 인원수와 비율을 확인합니다.
  - type: code
    language: python
    title: 카테고리별 집계
    description: 각 분류별 인원수를 확인합니다
    content: |-
      labels, counts = np.unique(category, return_counts=True)
      pd.DataFrame({'Category': labels, 'Count': counts, 'Ratio': np.round(counts / len(bmi) * 100, 1)})

- id: step11_gender
  title: 11단계. 성별 데이터 추출
  subtitle: Gender
  blocks:
  - type: text
    content: 성별 데이터를 추출하여 남녀별 분석을 준비합니다.
  - type: code
    language: python
    title: 성별 추출
    description: 성별 데이터를 배열로 추출합니다
    content: |-
      sex = df['Gender'].values
      sex[:10]

- id: step12_gender_bmi
  title: 12단계. 성별 BMI 비교
  subtitle: 불리언 마스크
  blocks:
  - type: text
    content: "불리언 마스크를 활용해 남녀 데이터를 분리합니다. sex == 'Male'은 남성이면 True, 아니면 False인 배열을 만듭니다. 이 True/False 배열로 bmi[male]처럼 인덱싱하면 남성의 BMI만 추출됩니다. 성별에 따른 BMI 차이를 쉽게 비교할 수 있습니다."
  - type: code
    language: python
    title: 성별 BMI 비교
    description: 남녀 평균 BMI를 비교합니다
    content: |-
      male = sex == 'Male'
      female = sex == 'Female'
      m = bmi[male]
      f_ = bmi[female]
      f"남성 평균 BMI: {np.mean(m):.2f}, 여성 평균 BMI: {np.mean(f_):.2f}"

- id: step13_gender_stats
  title: 13단계. 성별 종합 통계
  subtitle: DataFrame 정리
  blocks:
  - type: text
    content: 성별에 따른 키, 몸무게, BMI 차이를 확인합니다.
  - type: code
    language: python
    title: 성별 통계
    description: 성별 키/몸무게/BMI를 비교합니다
    content: |-
      pd.DataFrame({
          'Gender': ['Male', 'Female'],
          'Height(cm)': [np.mean(meter[male]) * 100, np.mean(meter[female]) * 100],
          'Weight(kg)': [np.mean(kg[male]), np.mean(kg[female])],
          'BMI': [np.mean(m), np.mean(f_)]
      }).round(2)

- id: step14_digitize
  title: 14단계. 키 구간화
  subtitle: np.digitize()
  blocks:
  - type: text
    content: "np.digitize()는 연속적인 숫자 데이터를 구간(bin)으로 나눕니다. 예를 들어 bins=[150, 155, 160]이면 150 미만은 0, 150~155는 1, 155~160은 2, 160 이상은 3으로 분류됩니다. 키 데이터를 5cm 단위로 그룹화하면 구간별 분석이 가능해집니다."
  - type: code
    language: python
    title: 키 구간화
    description: 키를 5cm 단위로 그룹화합니다
    content: |-
      cm = meter * 100
      bins = np.arange(150, 200, 5)
      groups = np.digitize(cm, bins)
      np.unique(groups)
  - type: tip
    content: np.digitize(arr, bins)는 배열의 각 값이 bins의 어느 구간에 속하는지 인덱스로 반환합니다. 데이터를 구간별로 그룹화할 때 유용합니다.

- id: step15_ideal_weight
  title: 15단계. 이상적 체중 범위
  subtitle: BMI 18.5~25
  blocks:
  - type: text
    content: 각 사람의 이상적인 체중 범위를 계산합니다. BMI 18.5~25 기준입니다.
  - type: code
    language: python
    title: 정상 체중 비율
    description: 정상 체중 범위에 있는 사람 비율을 계산합니다
    content: |-
      lo = 18.5 * (meter ** 2)
      hi = 25 * (meter ** 2)
      ideal = (kg >= lo) & (kg <= hi)
      f"정상 체중 비율: {np.mean(ideal) * 100:.1f}%"

- id: practice
  title: 실습
  subtitle: BMI 분석
  blocks:
  - type: text
    content: 지금까지 배운 개념을 활용하여 미션을 수행해봅시다. 각 미션은 독립적으로 실행 가능합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 목표 체중 계산기"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import numpy as np
        import pandas as pd

        url = "https://raw.githubusercontent.com"
        data = pd.read_csv(f"{url}/chandanverma07/DataSets/master/weight-height.csv")
        height = data['Height'].values * 0.0254
        weight = data['Weight'].values * 0.453592
    - type: code
      title: "목표 체중 분석"
      content: |-
        bmi = weight / (height ** 2)
        goal = 22 * (height ** 2)
        diff = weight - goal
        loss = diff > 0
        gain = diff < 0
        pd.DataFrame({
            'Status': ['Needs Weight Loss', 'Needs Weight Gain', 'At Target (+/-2kg)'],
            'Count': [np.sum(loss), np.sum(gain), np.sum(np.abs(diff) <= 2)],
            'Avg Diff (kg)': [np.mean(diff[loss]).round(1),
                             np.mean(diff[gain]).round(1),
                             np.mean(diff[np.abs(diff) <= 2]).round(1)]
        })
  - type: expansion
    title: "미션2: 성별/체중상태 교차 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import numpy as np
        import pandas as pd

        src = "https://raw.githubusercontent.com"
        df = pd.read_csv(f"{src}/chandanverma07/DataSets/master/weight-height.csv")
        ht = df['Height'].values * 0.0254
        wt = df['Weight'].values * 0.453592
        sex = df['Gender'].values
    - type: code
      title: "교차 분석"
      content: |-
        bmi = wt / (ht ** 2)
        cat = np.where(bmi < 18.5, 'Underweight',
              np.where(bmi < 25, 'Normal',
              np.where(bmi < 30, 'Overweight', 'Obese')))
        rows = []
        for g in ['Male', 'Female']:
            mask1 = sex == g
            for c in ['Underweight', 'Normal', 'Overweight', 'Obese']:
                mask2 = cat == c
                n = np.sum(mask1 & mask2)
                pct = n / np.sum(mask1) * 100
                rows.append([g, c, n, round(pct, 1)])
        pd.DataFrame(rows, columns=['Gender', 'BMI Category', 'Count', 'Ratio (%)'])
