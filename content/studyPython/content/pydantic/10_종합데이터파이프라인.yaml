- id: quality
  title: 품질 보고서
  subtitle: 검증 통계
  blocks:
  - type: text
    content: 데이터 품질 검증 결과를 상세히 보고합니다. DataQualityReport는 전체 레코드 중 유효한 레코드의 비율, 오류 유형별/단계별 분포, 샘플 오류 메시지를 포함합니다. validationRate는 데이터 품질의 핵심 지표로, 이 값이 특정 임계치 이하로 떨어지면 소스 시스템에 문제가 있음을 의미합니다. 품질 보고서를 모니터링 시스템과 연동하면 데이터 품질 저하를 조기에 탐지하고 대응할 수 있습니다.
  - type: code
    language: python
    title: 품질 보고서
    description: 검증 통계
    content: |-
      class DataQualityReport(BaseModel):
          totalRecords: int
          validRecords: int
          invalidRecords: int
          validationRate: float
          errorsByField: dict[str, int]
          errorsByType: dict[str, int]
          sampleErrors: list[dict]

          @classmethod
          def fromPipeline(cls, pipelineObj: DataPipeline) -> "DataQualityReport":
              errorsByField = defaultdict(int)
              errorsByType = defaultdict(int)

              for err in pipelineObj.errors:
                  errorsByType[err.get("stage", "unknown")] += 1
                  if "field" in err:
                      errorsByField[err["field"]] += 1

              total = len(pipelineObj.rawData) + len(pipelineObj.errors)
              valid = len(pipelineObj.enrichedData)

              return cls(
                  totalRecords=total,
                  validRecords=valid,
                  invalidRecords=total - valid,
                  validationRate=round(valid / total * 100, 2) if total > 0 else 0,
                  errorsByField=dict(errorsByField),
                  errorsByType=dict(errorsByType),
                  sampleErrors=pipelineObj.errors[:5]
              )

      qualityReport = DataQualityReport.fromPipeline(pipeline)
      qualityReport.model_dump(exclude={"sampleErrors"})

- id: result
  title: 통합 파이프라인
  subtitle: 전체 실행
  blocks:
  - type: text
    content: 모든 구성 요소를 통합한 완성된 파이프라인입니다. CompletePipeline 클래스는 단일 run 메서드로 전체 ETL 과정과 집계, 리포트 생성을 수행합니다. 반환값은 처리 상태, 요약 통계, 상세 리포트, 품질 보고서를 포함하는 딕셔너리입니다. 이 패턴은 배치 작업 스케줄러, API 엔드포인트, CLI 도구 등 다양한 실행 환경에서 동일한 파이프라인 로직을 재사용할 수 있게 합니다. 실무에서는 여기에 로깅, 알림, 재시도 로직을 추가합니다.
  - type: code
    language: python
    title: 통합 파이프라인
    description: 전체 실행
    content: |-
      class CompletePipeline:
          def __init__(self):
              self.pipelineInstance = DataPipeline()

          def run(self, rawData: list[dict]) -> dict:
              self.pipelineInstance.extract(rawData)
              self.pipelineInstance.transform()

              summaries = aggregateDaily(self.pipelineInstance.enrichedData)
              reportObj = generateReport(self.pipelineInstance, summaries)
              qualityObj = DataQualityReport.fromPipeline(self.pipelineInstance)

              return {
                  "status": "completed",
                  "summary": {
                      "processed": reportObj.pipelineStats["processedCount"],
                      "successful": reportObj.pipelineStats["successCount"],
                      "failed": reportObj.pipelineStats["errorCount"],
                      "validationRate": qualityObj.validationRate
                  },
                  "report": reportObj,
                  "quality": qualityObj
              }

      completePipeline = CompletePipeline()
      finalResult = completePipeline.run(sampleData)
      finalResult["summary"]

- id: practice
  title: 실습
  subtitle: 데이터 파이프라인 확장
  blocks:
  - type: text
    content: 다양한 도메인에 맞는 데이터 파이프라인을 구축해봅니다. 각 미션은 실무에서 자주 접하는 시나리오를 다룹니다. 로그 분석 파이프라인은 서버 모니터링과 장애 탐지에, 센서 데이터 파이프라인은 IoT와 제조 시스템에 활용됩니다. 핵심은 Raw → Validated → Enriched → Aggregated의 단계별 변환과, 각 단계에서 Pydantic 모델을 활용한 타입 안전성 확보입니다.
  - type: tip
    content: 파이프라인 설계 시 각 단계의 모델을 명확히 분리하고, 변환 로직은 클래스 메서드로 캡슐화하세요. 오류는 무시하지 말고 별도로 수집하여 품질 모니터링에 활용합니다. computed_field로 파생 지표를 자동 계산하면 일관성을 유지할 수 있습니다.
  - type: expansion
    title: "미션1: 로그 분석 파이프라인 - 시스템 모니터링"
    blocks:
    - type: code
      language: python
      title: 로그 분석 파이프라인
      description: 시스템 모니터링
      content: |-
        from pydantic import BaseModel, Field, field_validator
        from typing import Optional, Literal
        from datetime import datetime
        from collections import defaultdict

        class RawLogEntry(BaseModel):
            timestamp: str
            level: str
            service: str
            message: str
            traceId: Optional[str] = None

        class ParsedLogEntry(BaseModel):
            timestamp: datetime
            level: Literal["DEBUG", "INFO", "WARN", "ERROR", "FATAL"]
            service: str
            message: str
            traceId: Optional[str] = None

            @field_validator('level', mode='before')
            @classmethod
            def normalizeLevel(cls, v):
                return v.upper()

            @field_validator('timestamp', mode='before')
            @classmethod
            def parseTs(cls, v):
                if isinstance(v, str):
                    return datetime.fromisoformat(v.replace("Z", "+00:00").replace(" ", "T"))
                return v

        class LogAnalytics(BaseModel):
            totalLogs: int
            byLevel: dict[str, int]
            byService: dict[str, int]
            errorRate: float
            timeRange: dict

        def analyzeLogs(rawLogs: list[dict]) -> LogAnalytics:
            parsed = []
            for raw in rawLogs:
                try:
                    entry = ParsedLogEntry.model_validate(raw)
                    parsed.append(entry)
                except Exception:
                    pass

            byLevel = defaultdict(int)
            byService = defaultdict(int)
            for log in parsed:
                byLevel[log.level] += 1
                byService[log.service] += 1

            errorCount = byLevel.get("ERROR", 0) + byLevel.get("FATAL", 0)
            timestamps = [log.timestamp for log in parsed]

            return LogAnalytics(
                totalLogs=len(parsed),
                byLevel=dict(byLevel),
                byService=dict(byService),
                errorRate=round(errorCount / len(parsed) * 100, 2) if parsed else 0,
                timeRange={
                    "start": min(timestamps).isoformat() if timestamps else None,
                    "end": max(timestamps).isoformat() if timestamps else None
                }
            )

        testLogs = [
            {"timestamp": "2024-03-15T10:00:00", "level": "info", "service": "api", "message": "Request received"},
            {"timestamp": "2024-03-15T10:01:00", "level": "error", "service": "db", "message": "Connection failed"},
            {"timestamp": "2024-03-15T10:02:00", "level": "info", "service": "api", "message": "Request completed"},
            {"timestamp": "2024-03-15T10:03:00", "level": "warn", "service": "cache", "message": "Cache miss"}
        ]

        logAnalyticsResult = analyzeLogs(testLogs)
        logAnalyticsResult.model_dump()
  - type: expansion
    title: "미션2: 센서 데이터 파이프라인 - IoT 대시보드"
    blocks:
    - type: code
      language: python
      title: 센서 데이터 파이프라인
      description: IoT 대시보드
      content: |-
        from pydantic import BaseModel, Field, field_validator, computed_field
        from typing import Optional, Literal
        from datetime import datetime
        from collections import defaultdict

        class SensorReading(BaseModel):
            sensorId: str
            readingType: Literal["temperature", "humidity", "pressure"]
            value: float
            unit: str
            timestamp: datetime
            quality: Literal["good", "fair", "poor"] = "good"

            @field_validator('timestamp', mode='before')
            @classmethod
            def parseTime(cls, v):
                if isinstance(v, str):
                    return datetime.fromisoformat(v)
                return v

        class SensorAlert(BaseModel):
            sensorId: str
            alertType: str
            severity: Literal["low", "medium", "high", "critical"]
            message: str
            triggeredAt: datetime
            reading: SensorReading

        class SensorDashboard(BaseModel):
            lastUpdated: datetime
            sensorCount: int
            readingCount: int
            alertCount: int
            averages: dict[str, float]
            alerts: list[SensorAlert]

        def processSensorData(readings: list[dict]) -> SensorDashboard:
            parsed = []
            sensorAlerts = []

            thresholds = {
                "temperature": {"min": -10, "max": 50},
                "humidity": {"min": 20, "max": 80},
                "pressure": {"min": 900, "max": 1100}
            }

            for raw in readings:
                try:
                    reading = SensorReading.model_validate(raw)
                    parsed.append(reading)

                    limits = thresholds.get(reading.readingType, {})
                    if reading.value < limits.get("min", float("-inf")):
                        sensorAlerts.append(SensorAlert(
                            sensorId=reading.sensorId,
                            alertType="below_threshold",
                            severity="high",
                            message=f"{reading.readingType} below minimum",
                            triggeredAt=reading.timestamp,
                            reading=reading
                        ))
                    elif reading.value > limits.get("max", float("inf")):
                        sensorAlerts.append(SensorAlert(
                            sensorId=reading.sensorId,
                            alertType="above_threshold",
                            severity="high",
                            message=f"{reading.readingType} above maximum",
                            triggeredAt=reading.timestamp,
                            reading=reading
                        ))
                except Exception:
                    pass

            averageValues = {}
            byType = defaultdict(list)
            for r in parsed:
                byType[r.readingType].append(r.value)
            for rType, values in byType.items():
                averageValues[rType] = round(sum(values) / len(values), 2)

            return SensorDashboard(
                lastUpdated=datetime.now(),
                sensorCount=len(set(r.sensorId for r in parsed)),
                readingCount=len(parsed),
                alertCount=len(sensorAlerts),
                averages=averageValues,
                alerts=sensorAlerts[:5]
            )

        testReadings = [
            {"sensorId": "S001", "readingType": "temperature", "value": 25.5, "unit": "C", "timestamp": "2024-03-15T10:00:00"},
            {"sensorId": "S002", "readingType": "humidity", "value": 85, "unit": "%", "timestamp": "2024-03-15T10:00:00"},
            {"sensorId": "S003", "readingType": "pressure", "value": 1013, "unit": "hPa", "timestamp": "2024-03-15T10:00:00"},
            {"sensorId": "S001", "readingType": "temperature", "value": 55, "unit": "C", "timestamp": "2024-03-15T10:05:00"}
        ]

        sensorDashboard = processSensorData(testReadings)
        sensorDashboardSummary = {
            "sensors": sensorDashboard.sensorCount,
            "readings": sensorDashboard.readingCount,
            "alerts": sensorDashboard.alertCount,
            "averages": sensorDashboard.averages
        }
        sensorDashboardSummary
