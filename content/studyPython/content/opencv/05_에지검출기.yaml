intro:
  emoji: "📐"
  goal: Canny, Sobel, Laplacian으로 이미지의 경계를 검출합니다.
  description: 에지(edge)는 밝기가 급변하는 경계입니다. 미분 연산으로 이러한 변화를 검출하여 객체 윤곽 추출, 특징점 검출에 활용합니다.

sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  subtitle: 그레이스케일 변환
  blocks:
  - type: text
    content: sklearn의 china 이미지를 불러옵니다. 에지 검출은 주로 그레이스케일 이미지에서 수행됩니다. 색상보다 밝기 변화를 기준으로 에지를 찾습니다.
  - type: code
    language: python
    title: 라이브러리와 이미지 로드
    description: china 이미지를 그레이스케일로 변환합니다
    content: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      china = load_sample_image('china.jpg')
      canvas = cv2.cvtColor(china, cv2.COLOR_RGB2BGR)
      gray = cv2.cvtColor(canvas, cv2.COLOR_BGR2GRAY)
      plt.figure(figsize=(10, 6))
      plt.imshow(gray, cmap='gray')
      plt.title(f'Grayscale: {gray.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 그레이스케일 출력
    description: 에지 검출 입력 이미지입니다
    content: |-
      plt.figure(figsize=(10, 6))
      plt.imshow(gray, cmap='gray')
      plt.title('Grayscale Input')
      plt.axis('off')
      plt.tight_layout()

- id: step2_canny
  title: 2단계. Canny 에지 검출
  subtitle: Canny()
  blocks:
  - type: text
    content: Canny()는 1986년 John Canny가 개발한 다단계 에지 검출 알고리즘입니다. 노이즈 제거(가우시안 블러), 그래디언트 계산(Sobel), 비최대 억제(non-maximum suppression, 에지를 얇게 만듦), 이중 임계값(hysteresis thresholding) 단계를 거칩니다. 두 개의 임계값(threshold1, threshold2)으로 에지를 결정하는데, threshold2 이상은 강한 에지, threshold1 미만은 에지 아님, 그 사이는 강한 에지와 연결된 경우에만 에지로 판단합니다.
  - type: code
    language: python
    title: Canny 기본
    description: 임계값 50, 150으로 에지를 검출합니다
    content: |-
      canny = cv2.Canny(gray, 50, 150)
      plt.figure(figsize=(10, 6))
      plt.imshow(canny, cmap='gray')
      plt.title('Canny (50, 150)')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: Canny(image, threshold1, threshold2)에서 threshold1은 약한 에지 기준, threshold2는 강한 에지 기준입니다. threshold1 미만은 에지 아님, threshold2 이상은 확실한 에지입니다.
  - type: code
    language: python
    title: 임계값 변경
    description: 임계값에 따른 에지 차이를 확인합니다
    content: |-
      cannyLow = cv2.Canny(gray, 30, 100)
      cannyHigh = cv2.Canny(gray, 100, 200)
      figCannyTest, axCannyTest = plt.subplots(1, 2, figsize=(12, 5))
      axCannyTest[0].imshow(cannyLow, cmap='gray')
      axCannyTest[0].set_title('Low Threshold (30, 100)')
      axCannyTest[0].axis('off')
      axCannyTest[1].imshow(cannyHigh, cmap='gray')
      axCannyTest[1].set_title('High Threshold (100, 200)')
      axCannyTest[1].axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: Canny 비교
    description: 세 가지 임계값 설정을 비교합니다
    content: |-
      figCanny, axCanny = plt.subplots(1, 3, figsize=(12, 4))
      axCanny[0].imshow(cannyLow, cmap='gray')
      axCanny[0].set_title('Canny (30, 100)')
      axCanny[0].axis('off')
      axCanny[1].imshow(canny, cmap='gray')
      axCanny[1].set_title('Canny (50, 150)')
      axCanny[1].axis('off')
      axCanny[2].imshow(cannyHigh, cmap='gray')
      axCanny[2].set_title('Canny (100, 200)')
      axCanny[2].axis('off')
      plt.tight_layout()

- id: step3_sobel
  title: 3단계. Sobel 에지 검출
  subtitle: Sobel()
  blocks:
  - type: text
    content: Sobel()은 그래디언트(gradient, 기울기) 기반 에지 검출입니다. 그래디언트란 밝기가 변하는 방향과 크기를 나타내는 벡터입니다. Sobel은 x방향(수평)과 y방향(수직)의 1차 미분을 각각 계산합니다. x방향 미분은 수직 에지(좌우 밝기 차이)를, y방향 미분은 수평 에지(상하 밝기 차이)를 검출합니다. 두 결과를 합성하면 모든 방향의 에지를 얻을 수 있습니다.
  - type: code
    language: python
    title: Sobel X 방향
    description: 수직 에지를 검출합니다
    content: |-
      sobelX = cv2.Sobel(gray, cv2.CV_64F, 1, 0, ksize=3)
      sobelXAbs = cv2.convertScaleAbs(sobelX)
      plt.figure(figsize=(10, 6))
      plt.imshow(sobelXAbs, cmap='gray')
      plt.title('Sobel X (Vertical Edges)')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: cv2.CV_64F는 64비트 부동소수점입니다. 미분 결과가 음수일 수 있어 CV_64F를 사용합니다. convertScaleAbs()로 절댓값을 취해 uint8로 변환합니다.
  - type: code
    language: python
    title: Sobel Y 방향
    description: 수평 에지를 검출합니다
    content: |-
      sobelY = cv2.Sobel(gray, cv2.CV_64F, 0, 1, ksize=3)
      sobelYAbs = cv2.convertScaleAbs(sobelY)
      plt.figure(figsize=(10, 6))
      plt.imshow(sobelYAbs, cmap='gray')
      plt.title('Sobel Y (Horizontal Edges)')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: Sobel 합성
    description: X와 Y를 합성합니다
    content: |-
      sobelCombined = cv2.addWeighted(sobelXAbs, 0.5, sobelYAbs, 0.5, 0)
      plt.figure(figsize=(10, 6))
      plt.imshow(sobelCombined, cmap='gray')
      plt.title('Sobel Combined')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: Sobel 비교
    description: X, Y, 합성 결과를 비교합니다
    content: |-
      figSobel, axSobel = plt.subplots(1, 3, figsize=(12, 4))
      axSobel[0].imshow(sobelXAbs, cmap='gray')
      axSobel[0].set_title('Sobel X (Vertical)')
      axSobel[0].axis('off')
      axSobel[1].imshow(sobelYAbs, cmap='gray')
      axSobel[1].set_title('Sobel Y (Horizontal)')
      axSobel[1].axis('off')
      axSobel[2].imshow(sobelCombined, cmap='gray')
      axSobel[2].set_title('Combined')
      axSobel[2].axis('off')
      plt.tight_layout()

- id: step4_laplacian
  title: 4단계. Laplacian 에지 검출
  subtitle: Laplacian()
  blocks:
  - type: text
    content: Laplacian()은 라플라시안(Laplacian) 연산자로 2차 미분을 사용합니다. 1차 미분(Sobel)이 밝기 변화의 기울기를 측정한다면, 2차 미분은 기울기의 변화율, 즉 밝기 변화가 얼마나 급격한지를 측정합니다. x와 y 방향을 동시에 계산하여 모든 방향의 에지를 한 번에 검출합니다. 다만 2차 미분은 노이즈에 매우 민감하므로, 가우시안 블러로 노이즈를 줄인 후 적용하는 것이 일반적입니다. 이를 LoG(Laplacian of Gaussian)라고 합니다.
  - type: code
    language: python
    title: Laplacian 기본
    description: 2차 미분으로 에지를 검출합니다
    content: |-
      laplacian = cv2.Laplacian(gray, cv2.CV_64F)
      laplacianAbs = cv2.convertScaleAbs(laplacian)
      plt.figure(figsize=(10, 6))
      plt.imshow(laplacianAbs, cmap='gray')
      plt.title('Laplacian')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 블러 후 Laplacian
    description: 노이즈 감소를 위해 블러를 먼저 적용합니다
    content: |-
      grayBlur = cv2.GaussianBlur(gray, (5, 5), 0)
      laplacianBlur = cv2.Laplacian(grayBlur, cv2.CV_64F)
      laplacianBlurAbs = cv2.convertScaleAbs(laplacianBlur)
      plt.figure(figsize=(10, 6))
      plt.imshow(laplacianBlurAbs, cmap='gray')
      plt.title('Laplacian (Blurred)')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: Laplacian은 노이즈에 민감합니다. GaussianBlur로 노이즈를 줄인 후 적용하면 깔끔한 에지를 얻을 수 있습니다. 이를 LoG(Laplacian of Gaussian)라고 합니다.
  - type: code
    language: python
    title: Laplacian 비교
    description: 블러 전후 결과를 비교합니다
    content: |-
      figLap, axLap = plt.subplots(1, 2, figsize=(10, 5))
      axLap[0].imshow(laplacianAbs, cmap='gray')
      axLap[0].set_title('Laplacian')
      axLap[0].axis('off')
      axLap[1].imshow(laplacianBlurAbs, cmap='gray')
      axLap[1].set_title('Laplacian (Blurred)')
      axLap[1].axis('off')
      plt.tight_layout()

- id: step5_compare
  title: 5단계. 에지 검출 비교
  subtitle: 종합 비교
  blocks:
  - type: text
    content: 세 가지 에지 검출 방법을 나란히 비교해봅시다. 각각의 특성과 용도를 파악합니다.
  - type: code
    language: python
    title: 전체 비교
    description: Canny, Sobel, Laplacian을 비교합니다
    content: |-
      figCompare, axCompare = plt.subplots(2, 2, figsize=(10, 8))
      axCompare[0, 0].imshow(gray, cmap='gray')
      axCompare[0, 0].set_title('Original')
      axCompare[0, 0].axis('off')
      axCompare[0, 1].imshow(canny, cmap='gray')
      axCompare[0, 1].set_title('Canny')
      axCompare[0, 1].axis('off')
      axCompare[1, 0].imshow(sobelCombined, cmap='gray')
      axCompare[1, 0].set_title('Sobel')
      axCompare[1, 0].axis('off')
      axCompare[1, 1].imshow(laplacianBlurAbs, cmap='gray')
      axCompare[1, 1].set_title('Laplacian')
      axCompare[1, 1].axis('off')
      plt.tight_layout()
  - type: tip
    content: Canny는 깔끔한 이진 에지, Sobel은 방향별 에지 강도, Laplacian은 전방향 에지입니다. 컨투어 검출에는 Canny가 주로 사용됩니다.

- id: step6_color
  title: 6단계. 컬러 에지
  subtitle: 원본에 에지 오버레이
  blocks:
  - type: text
    content: 검출된 에지를 원본 이미지 위에 표시할 수 있습니다. 에지를 마스크로 활용하여 특정 색상으로 표시합니다.
  - type: code
    language: python
    title: 에지 오버레이
    description: 원본에 에지를 빨간색으로 표시합니다
    content: |-
      overlay = china.copy()
      edgeMask = canny > 0
      overlay[edgeMask] = [255, 0, 0]
      plt.figure(figsize=(10, 6))
      plt.imshow(overlay)
      plt.title('Edge Overlay')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 오버레이 출력
    description: 에지가 표시된 이미지입니다
    content: |-
      figOverlay, axOverlay = plt.subplots(1, 2, figsize=(12, 5))
      axOverlay[0].imshow(china)
      axOverlay[0].set_title('Original')
      axOverlay[0].axis('off')
      axOverlay[1].imshow(overlay)
      axOverlay[1].set_title('Edge Overlay')
      axOverlay[1].axis('off')
      plt.tight_layout()

- id: practice
  title: 실습
  subtitle: 에지 검출 프로젝트
  blocks:
  - type: text
    content: flower 이미지로 에지 검출을 연습해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: flower Canny 임계값 탐색"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        flower = load_sample_image('flower.jpg')
        flowerBgr = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
        flowerGray = cv2.cvtColor(flowerBgr, cv2.COLOR_BGR2GRAY)
        plt.imshow(flower)
        plt.axis('off')
    - type: code
      title: "다양한 임계값"
      content: |-
        edges1 = cv2.Canny(flowerGray, 20, 60)
        edges2 = cv2.Canny(flowerGray, 50, 120)
        edges3 = cv2.Canny(flowerGray, 80, 180)
        figEdges, axEdges = plt.subplots(1, 3, figsize=(12, 4))
        axEdges[0].imshow(edges1, cmap='gray')
        axEdges[0].set_title('(20, 60)')
        axEdges[0].axis('off')
        axEdges[1].imshow(edges2, cmap='gray')
        axEdges[1].set_title('(50, 120)')
        axEdges[1].axis('off')
        axEdges[2].imshow(edges3, cmap='gray')
        axEdges[2].set_title('(80, 180)')
        axEdges[2].axis('off')
        plt.tight_layout()
    - type: code
      title: "비교 시각화"
      content: |-
        figFlower, axFlower = plt.subplots(2, 2, figsize=(10, 8))
        axFlower[0, 0].imshow(flower)
        axFlower[0, 0].set_title('Original')
        axFlower[0, 0].axis('off')
        axFlower[0, 1].imshow(edges1, cmap='gray')
        axFlower[0, 1].set_title('Canny (20, 60)')
        axFlower[0, 1].axis('off')
        axFlower[1, 0].imshow(edges2, cmap='gray')
        axFlower[1, 0].set_title('Canny (50, 120)')
        axFlower[1, 0].axis('off')
        axFlower[1, 1].imshow(edges3, cmap='gray')
        axFlower[1, 1].set_title('Canny (80, 180)')
        axFlower[1, 1].axis('off')
        plt.tight_layout()
  - type: expansion
    title: "미션2: 에지 강도 히트맵"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        scene = load_sample_image('china.jpg')
        sceneBgr = cv2.cvtColor(scene, cv2.COLOR_RGB2BGR)
        sceneGray = cv2.cvtColor(sceneBgr, cv2.COLOR_BGR2GRAY)
        plt.imshow(scene)
        plt.axis('off')
    - type: code
      title: "Sobel 강도 계산"
      content: |-
        gradX = cv2.Sobel(sceneGray, cv2.CV_64F, 1, 0, ksize=3)
        gradY = cv2.Sobel(sceneGray, cv2.CV_64F, 0, 1, ksize=3)
        magnitude = np.sqrt(gradX**2 + gradY**2)
        magnitude = (magnitude / magnitude.max() * 255).astype(np.uint8)
        plt.figure(figsize=(10, 6))
        plt.imshow(magnitude, cmap='hot')
        plt.title('Edge Magnitude')
        plt.axis('off')
        plt.colorbar()
        plt.tight_layout()
    - type: code
      title: "히트맵 시각화"
      content: |-
        figHeat, axHeat = plt.subplots(1, 2, figsize=(12, 5))
        axHeat[0].imshow(scene)
        axHeat[0].set_title('Original')
        axHeat[0].axis('off')
        im = axHeat[1].imshow(magnitude, cmap='hot')
        axHeat[1].set_title('Edge Magnitude')
        axHeat[1].axis('off')
        plt.colorbar(im, ax=axHeat[1], fraction=0.046, pad=0.04)
        plt.tight_layout()
