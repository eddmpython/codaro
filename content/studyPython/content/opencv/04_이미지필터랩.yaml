meta:
  id: opencv_04
  title: 이미지필터랩
  order: 4
  category: opencv
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["OpenCV", "blur", "GaussianBlur", "medianBlur", "bilateralFilter", "필터"]
  seo:
    title: "OpenCV 기초 - 이미지 필터 랩"
    description: "OpenCV로 다양한 블러링과 노이즈 제거 필터를 적용합니다."
