intro:
  emoji: "🔮"
  goal: blur, GaussianBlur, medianBlur, bilateralFilter로 이미지를 부드럽게 합니다.
  description: 다양한 블러링 기법을 비교합니다. 각 필터의 특성과 노이즈 제거 효과를 이해합니다.

sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  subtitle: sklearn 샘플 이미지
  blocks:
  - type: text
    content: sklearn에 내장된 샘플 이미지를 사용합니다. 필터링은 노이즈 제거, 이미지 부드럽게 만들기, 에지 검출 전처리 등에 사용됩니다.
  - type: code
    language: python
    title: 라이브러리와 이미지 로드
    description: sklearn에서 이미지를 불러옵니다
    content: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flowerArr = load_sample_image('flower.jpg')
      pic = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
      plt.figure(figsize=(8, 6))
      plt.imshow(flowerArr)
      plt.title(f'Original: {pic.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 원본 이미지 출력
    description: BGR을 RGB로 변환하여 출력합니다
    content: |-
      picRgb = cv2.cvtColor(pic, cv2.COLOR_BGR2RGB)
      plt.figure(figsize=(8, 6))
      plt.imshow(picRgb)
      plt.title(f'Original: {pic.shape[1]}x{pic.shape[0]}')
      plt.axis('off')
      plt.tight_layout()

- id: step2_blur
  title: 2단계. 기본 블러
  subtitle: blur()
  blocks:
  - type: text
    content: blur()는 평균 블러(mean blur)입니다. 커널(kernel)은 이미지 위를 이동하며 연산을 수행하는 작은 행렬입니다. 3x3 커널이면 9개 픽셀의 평균으로 중심 픽셀을 대체합니다. 커널이 클수록 더 많은 픽셀을 평균하므로 더 흐려집니다. 이 과정을 컨볼루션(convolution)이라고 합니다.
  - type: code
    language: python
    title: 3x3 블러
    description: 작은 커널로 약하게 블러합니다
    content: |-
      blurred3 = cv2.blur(pic, (3, 3))
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(blurred3, cv2.COLOR_BGR2RGB))
      plt.title('Blur 3x3')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 7x7 블러
    description: 큰 커널로 강하게 블러합니다
    content: |-
      blurred7 = cv2.blur(pic, (7, 7))
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(blurred7, cv2.COLOR_BGR2RGB))
      plt.title('Blur 7x7')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: blur()의 두 번째 인자 (3, 3)은 커널 크기입니다. 홀수로 지정합니다. 커널이 클수록 블러 효과가 강해집니다. 연산 시간도 증가합니다.
  - type: code
    language: python
    title: 블러 비교
    description: 커널 크기별 효과를 비교합니다
    content: |-
      figBlur, axBlur = plt.subplots(1, 3, figsize=(12, 4))
      axBlur[0].imshow(picRgb)
      axBlur[0].set_title('Original')
      axBlur[0].axis('off')
      axBlur[1].imshow(cv2.cvtColor(blurred3, cv2.COLOR_BGR2RGB))
      axBlur[1].set_title('Blur 3x3')
      axBlur[1].axis('off')
      axBlur[2].imshow(cv2.cvtColor(blurred7, cv2.COLOR_BGR2RGB))
      axBlur[2].set_title('Blur 7x7')
      axBlur[2].axis('off')
      plt.tight_layout()

- id: step3_gaussian
  title: 3단계. 가우시안 블러
  subtitle: GaussianBlur()
  blocks:
  - type: text
    content: GaussianBlur()는 가우시안(정규분포) 함수를 이용한 블러입니다. 평균 블러와 달리 중심에 가까운 픽셀에 더 큰 가중치를 부여합니다. 종 모양의 가우시안 분포처럼 중심이 높고 가장자리가 낮은 가중치를 사용하여 자연스러운 블러 효과를 만듭니다. 노이즈 제거와 에지 검출 전처리에 가장 많이 사용됩니다.
  - type: code
    language: python
    title: 가우시안 블러
    description: 5x5 가우시안 블러를 적용합니다
    content: |-
      gaussian5 = cv2.GaussianBlur(pic, (5, 5), 0)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(gaussian5, cv2.COLOR_BGR2RGB))
      plt.title('Gaussian 5x5')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 시그마 조절
    description: 시그마 값을 직접 지정합니다
    content: |-
      gaussian9 = cv2.GaussianBlur(pic, (9, 9), 2)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(gaussian9, cv2.COLOR_BGR2RGB))
      plt.title('Gaussian 9x9, σ=2')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: GaussianBlur의 세 번째 인자 sigmaX는 가우시안 분포의 표준편차입니다. 0이면 커널 크기에서 자동 계산됩니다. 값이 클수록 블러가 강해집니다.
  - type: code
    language: python
    title: 가우시안 블러 비교
    description: 커널 크기와 시그마에 따른 차이
    content: |-
      figGauss, axGauss = plt.subplots(1, 3, figsize=(12, 4))
      axGauss[0].imshow(picRgb)
      axGauss[0].set_title('Original')
      axGauss[0].axis('off')
      axGauss[1].imshow(cv2.cvtColor(gaussian5, cv2.COLOR_BGR2RGB))
      axGauss[1].set_title('Gaussian 5x5')
      axGauss[1].axis('off')
      axGauss[2].imshow(cv2.cvtColor(gaussian9, cv2.COLOR_BGR2RGB))
      axGauss[2].set_title('Gaussian 9x9, σ=2')
      axGauss[2].axis('off')
      plt.tight_layout()

- id: step4_median
  title: 4단계. 미디언 블러
  subtitle: medianBlur()
  blocks:
  - type: text
    content: medianBlur()는 커널 영역의 중앙값(median)을 사용합니다. 평균과 달리 중앙값은 극단적인 값에 영향을 받지 않습니다. salt-and-pepper 노이즈(소금-후추 잡음, 이미지에 흰점과 검은점이 무작위로 나타나는 노이즈)에 특히 효과적입니다. 커널 크기는 홀수만 가능합니다.
  - type: code
    language: python
    title: 노이즈 추가
    description: salt-and-pepper 노이즈를 생성합니다
    content: |-
      noisy = pic.copy()
      numNoise = 3000
      coords = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
      noisy[coords[:, 0], coords[:, 1]] = [255, 255, 255]
      coords2 = np.random.randint(0, min(pic.shape[:2]), (numNoise, 2))
      noisy[coords2[:, 0], coords2[:, 1]] = [0, 0, 0]
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(noisy, cv2.COLOR_BGR2RGB))
      plt.title('Noisy Image')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 미디언 블러 적용
    description: 노이즈를 제거합니다
    content: |-
      median5 = cv2.medianBlur(noisy, 5)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(median5, cv2.COLOR_BGR2RGB))
      plt.title('Median Blur')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: medianBlur()의 커널 크기는 홀수 정수 하나만 지정합니다. (5, 5)가 아닌 5로 지정합니다. 중앙값 특성상 극단값(노이즈)이 결과에 영향을 주지 않습니다.
  - type: code
    language: python
    title: 노이즈 제거 비교
    description: 원본, 노이즈, 미디언 블러 결과
    content: |-
      figMedian, axMedian = plt.subplots(1, 3, figsize=(12, 4))
      axMedian[0].imshow(picRgb)
      axMedian[0].set_title('Original')
      axMedian[0].axis('off')
      axMedian[1].imshow(cv2.cvtColor(noisy, cv2.COLOR_BGR2RGB))
      axMedian[1].set_title('Noisy')
      axMedian[1].axis('off')
      axMedian[2].imshow(cv2.cvtColor(median5, cv2.COLOR_BGR2RGB))
      axMedian[2].set_title('Median Blur')
      axMedian[2].axis('off')
      plt.tight_layout()

- id: step5_bilateral
  title: 5단계. 양방향 필터
  subtitle: bilateralFilter()
  blocks:
  - type: text
    content: bilateralFilter()는 양방향 필터(bilateral filter)로, 에지를 보존하면서 블러를 적용합니다. 일반 블러는 에지(경계)까지 흐리게 만들지만, 양방향 필터는 색상이 비슷한 영역만 블러하고 색상 차이가 큰 에지는 유지합니다. 공간적 거리(spatial distance)와 색상 차이(color difference)를 모두 고려하기 때문입니다. 피부 보정(blemish 제거하면서 얼굴 윤곽 유지)이나 카툰 스타일화에 많이 사용됩니다.
  - type: code
    language: python
    title: 양방향 필터 적용
    description: 에지를 보존하며 블러합니다
    content: |-
      bilateral = cv2.bilateralFilter(pic, 9, 75, 75)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(bilateral, cv2.COLOR_BGR2RGB))
      plt.title('Bilateral Filter')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: bilateralFilter(src, d, sigmaColor, sigmaSpace)에서 d는 필터 크기, sigmaColor는 색상 유사도 기준, sigmaSpace는 공간 거리 기준입니다. sigmaColor가 크면 더 넓은 색상 범위가 혼합됩니다.
  - type: code
    language: python
    title: 양방향 필터 비교
    description: 가우시안과 비교합니다
    content: |-
      gaussianComp = cv2.GaussianBlur(pic, (9, 9), 0)
      figBilat, axBilat = plt.subplots(1, 3, figsize=(12, 4))
      axBilat[0].imshow(picRgb)
      axBilat[0].set_title('Original')
      axBilat[0].axis('off')
      axBilat[1].imshow(cv2.cvtColor(gaussianComp, cv2.COLOR_BGR2RGB))
      axBilat[1].set_title('Gaussian')
      axBilat[1].axis('off')
      axBilat[2].imshow(cv2.cvtColor(bilateral, cv2.COLOR_BGR2RGB))
      axBilat[2].set_title('Bilateral (Edge Preserved)')
      axBilat[2].axis('off')
      plt.tight_layout()

- id: step6_compare
  title: 6단계. 필터 종합 비교
  subtitle: 4가지 필터 비교
  blocks:
  - type: text
    content: 네 가지 블러 필터를 한눈에 비교해봅시다. 각 필터의 특성과 적합한 용도를 파악합니다.
  - type: code
    language: python
    title: 전체 비교
    description: 4가지 블러 결과를 비교합니다
    content: |-
      avgBlur = cv2.blur(pic, (7, 7))
      gaussBlur = cv2.GaussianBlur(pic, (7, 7), 0)
      medBlur = cv2.medianBlur(pic, 7)
      bilatBlur = cv2.bilateralFilter(pic, 7, 75, 75)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(avgBlur, cv2.COLOR_BGR2RGB))
      plt.title('Average Blur 7x7')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 시각화
    description: 네 필터를 나란히 표시합니다
    content: |-
      figCompare, axCompare = plt.subplots(2, 2, figsize=(10, 8))
      axCompare[0, 0].imshow(cv2.cvtColor(avgBlur, cv2.COLOR_BGR2RGB))
      axCompare[0, 0].set_title('Average Blur')
      axCompare[0, 0].axis('off')
      axCompare[0, 1].imshow(cv2.cvtColor(gaussBlur, cv2.COLOR_BGR2RGB))
      axCompare[0, 1].set_title('Gaussian Blur')
      axCompare[0, 1].axis('off')
      axCompare[1, 0].imshow(cv2.cvtColor(medBlur, cv2.COLOR_BGR2RGB))
      axCompare[1, 0].set_title('Median Blur')
      axCompare[1, 0].axis('off')
      axCompare[1, 1].imshow(cv2.cvtColor(bilatBlur, cv2.COLOR_BGR2RGB))
      axCompare[1, 1].set_title('Bilateral Filter')
      axCompare[1, 1].axis('off')
      plt.tight_layout()
  - type: tip
    content: Average와 Gaussian은 일반 블러, Median은 노이즈 제거, Bilateral은 에지 보존에 적합합니다. 용도에 따라 선택하세요.

- id: practice
  title: 실습
  subtitle: 필터 프로젝트
  blocks:
  - type: text
    content: sklearn 이미지에 다양한 필터를 적용해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: flower 가우시안 블러 체인"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        flower = load_sample_image('flower.jpg')
        flowerBgr = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
        plt.imshow(flower)
        plt.axis('off')
    - type: code
      title: "연속 가우시안 블러"
      content: |-
        blur1 = cv2.GaussianBlur(flowerBgr, (5, 5), 0)
        blur2 = cv2.GaussianBlur(blur1, (5, 5), 0)
        blur3 = cv2.GaussianBlur(blur2, (5, 5), 0)
        plt.figure(figsize=(8, 6))
        plt.imshow(cv2.cvtColor(blur3, cv2.COLOR_BGR2RGB))
        plt.title('3x Blur')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "블러 체인 시각화"
      content: |-
        figChain, axChain = plt.subplots(1, 4, figsize=(14, 4))
        axChain[0].imshow(flower)
        axChain[0].set_title('Original')
        axChain[0].axis('off')
        axChain[1].imshow(cv2.cvtColor(blur1, cv2.COLOR_BGR2RGB))
        axChain[1].set_title('1x Blur')
        axChain[1].axis('off')
        axChain[2].imshow(cv2.cvtColor(blur2, cv2.COLOR_BGR2RGB))
        axChain[2].set_title('2x Blur')
        axChain[2].axis('off')
        axChain[3].imshow(cv2.cvtColor(blur3, cv2.COLOR_BGR2RGB))
        axChain[3].set_title('3x Blur')
        axChain[3].axis('off')
        plt.tight_layout()
  - type: expansion
    title: "미션2: china 노이즈 제거 비교"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        china = load_sample_image('china.jpg')
        chinaBgr = cv2.cvtColor(china, cv2.COLOR_RGB2BGR)
        plt.imshow(china)
        plt.axis('off')
    - type: code
      title: "노이즈 추가"
      content: |-
        chinaNoisy = chinaBgr.copy()
        noise = np.random.randint(-30, 30, chinaBgr.shape, dtype=np.int16)
        chinaNoisy = np.clip(chinaBgr.astype(np.int16) + noise, 0, 255).astype(np.uint8)
        plt.figure(figsize=(10, 6))
        plt.imshow(cv2.cvtColor(chinaNoisy, cv2.COLOR_BGR2RGB))
        plt.title('Noisy China')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "필터 비교"
      content: |-
        chinaGauss = cv2.GaussianBlur(chinaNoisy, (5, 5), 0)
        chinaMed = cv2.medianBlur(chinaNoisy, 5)
        chinaBilat = cv2.bilateralFilter(chinaNoisy, 9, 75, 75)
        figNoise, axNoise = plt.subplots(2, 2, figsize=(10, 8))
        axNoise[0, 0].imshow(cv2.cvtColor(chinaNoisy, cv2.COLOR_BGR2RGB))
        axNoise[0, 0].set_title('Noisy')
        axNoise[0, 0].axis('off')
        axNoise[0, 1].imshow(cv2.cvtColor(chinaGauss, cv2.COLOR_BGR2RGB))
        axNoise[0, 1].set_title('Gaussian')
        axNoise[0, 1].axis('off')
        axNoise[1, 0].imshow(cv2.cvtColor(chinaMed, cv2.COLOR_BGR2RGB))
        axNoise[1, 0].set_title('Median')
        axNoise[1, 0].axis('off')
        axNoise[1, 1].imshow(cv2.cvtColor(chinaBilat, cv2.COLOR_BGR2RGB))
        axNoise[1, 1].set_title('Bilateral')
        axNoise[1, 1].axis('off')
        plt.tight_layout()
