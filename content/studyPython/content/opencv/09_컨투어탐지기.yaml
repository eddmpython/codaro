  tags: ["OpenCV", "findContours", "drawContours", "contourArea", "컨투어"]
  seo:
    title: "OpenCV 심화 - 컨투어 탐지기"
    description: "OpenCV findContours, drawContours로 객체 윤곽을 검출하고 분석합니다."
