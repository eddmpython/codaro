  title: 기하학적변환기
  order: 3
  category: opencv
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["OpenCV", "resize", "rotate", "flip", "crop", "기하변환"]
  seo:
    title: "OpenCV 기초 - 기하학적 변환기"
    description: "OpenCV로 이미지 크기 조절, 회전, 뒤집기, 자르기를 수행합니다."
