intro:
  emoji: "📐"
  goal: resize, rotate, flip으로 이미지의 기하학적 변환을 수행합니다.
  description: 이미지 크기 조절, 회전, 뒤집기, 자르기 등 기본적인 기하학적 변환을 배웁니다. 보간법의 차이도 이해합니다.

sections:
- id: step1_load
  title: 1단계. 이미지 불러오기
  subtitle: sklearn 샘플 이미지
  blocks:
  - type: text
    content: sklearn에 내장된 샘플 이미지를 사용합니다. Pyodide 환경에서 외부 URL 접근이 제한되므로, 내장 이미지가 가장 안정적입니다.
  - type: code
    language: python
    title: 라이브러리와 이미지 로드
    description: sklearn에서 이미지를 불러옵니다
    content: |-
      import cv2
      import numpy as np
      from sklearn.datasets import load_sample_image
      import matplotlib.pyplot as plt

      flowerArr = load_sample_image('flower.jpg')
      frame = cv2.cvtColor(flowerArr, cv2.COLOR_RGB2BGR)
      plt.figure(figsize=(8, 6))
      plt.imshow(flowerArr)
      plt.title(f'Original: {frame.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: sklearn 샘플 이미지는 RGB 형식입니다. OpenCV는 BGR을 사용하므로 cvtColor()로 변환합니다. flower.jpg와 china.jpg 두 개의 샘플이 있습니다.
  - type: code
    language: python
    title: 원본 이미지 출력
    description: BGR을 RGB로 변환하여 출력합니다
    content: |-
      frameRgb = cv2.cvtColor(frame, cv2.COLOR_BGR2RGB)
      plt.figure(figsize=(8, 6))
      plt.imshow(frameRgb)
      plt.title(f'Original: {frame.shape[1]}x{frame.shape[0]}')
      plt.axis('off')
      plt.tight_layout()

- id: step2_resize
  title: 2단계. 크기 조절
  subtitle: resize()
  blocks:
  - type: text
    content: resize()는 이미지 크기를 변경합니다. 크기를 바꿀 때 새로운 픽셀 값을 계산해야 하는데, 이 계산 방법을 보간법(interpolation)이라고 합니다. 이미지를 확대하면 원래 없던 픽셀을 만들어야 하고, 축소하면 여러 픽셀을 하나로 합쳐야 합니다. 보간법에 따라 처리 속도와 화질이 달라집니다.
  - type: code
    language: python
    title: 절대 크기로 리사이즈
    description: 300x200 크기로 변환합니다
    content: |-
      resized = cv2.resize(frame, (300, 200))
      plt.figure(figsize=(6, 4))
      plt.imshow(cv2.cvtColor(resized, cv2.COLOR_BGR2RGB))
      plt.title(f'Resized: {resized.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: resize()의 dsize는 (너비, 높이) 순서입니다. shape은 (높이, 너비, 채널)이므로 순서가 반대입니다. 주의하세요.
  - type: code
    language: python
    title: 비율로 리사이즈
    description: 50%로 축소합니다
    content: |-
      scaled = cv2.resize(frame, None, fx=0.5, fy=0.5)
      plt.figure(figsize=(6, 4))
      plt.imshow(cv2.cvtColor(scaled, cv2.COLOR_BGR2RGB))
      plt.title(f'Scaled 50%: {scaled.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 보간법 비교
    description: 확대 시 보간법 차이를 확인합니다
    content: |-
      small = cv2.resize(frame, (100, 80))
      nearestUp = cv2.resize(small, (400, 320), interpolation=cv2.INTER_NEAREST)
      linearUp = cv2.resize(small, (400, 320), interpolation=cv2.INTER_LINEAR)
      cubicUp = cv2.resize(small, (400, 320), interpolation=cv2.INTER_CUBIC)
      plt.figure(figsize=(6, 4))
      plt.imshow(cv2.cvtColor(small, cv2.COLOR_BGR2RGB))
      plt.title(f'Small: {small.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: INTER_NEAREST는 빠르지만 품질이 낮습니다. INTER_LINEAR(기본값)은 속도와 품질의 균형입니다. INTER_CUBIC은 품질이 좋지만 느립니다. 축소 시에는 INTER_AREA가 권장됩니다.
  - type: code
    language: python
    title: 보간법 시각화
    description: 세 방법을 비교합니다
    content: |-
      figInterp, axInterp = plt.subplots(1, 3, figsize=(12, 4))
      axInterp[0].imshow(cv2.cvtColor(nearestUp, cv2.COLOR_BGR2RGB))
      axInterp[0].set_title('INTER_NEAREST')
      axInterp[0].axis('off')
      axInterp[1].imshow(cv2.cvtColor(linearUp, cv2.COLOR_BGR2RGB))
      axInterp[1].set_title('INTER_LINEAR')
      axInterp[1].axis('off')
      axInterp[2].imshow(cv2.cvtColor(cubicUp, cv2.COLOR_BGR2RGB))
      axInterp[2].set_title('INTER_CUBIC')
      axInterp[2].axis('off')
      plt.tight_layout()

- id: step3_rotate
  title: 3단계. 이미지 회전
  subtitle: rotate()
  blocks:
  - type: text
    content: cv2.rotate()는 90도 단위 회전을 수행합니다. 임의 각도 회전은 getRotationMatrix2D()와 warpAffine()을 사용합니다.
  - type: code
    language: python
    title: 90도 회전
    description: 시계 방향 90도 회전합니다
    content: |-
      rotatedCw = cv2.rotate(frame, cv2.ROTATE_90_CLOCKWISE)
      plt.figure(figsize=(6, 8))
      plt.imshow(cv2.cvtColor(rotatedCw, cv2.COLOR_BGR2RGB))
      plt.title(f'90° CW: {rotatedCw.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 180도 회전
    description: 180도 회전합니다
    content: |-
      rotatedHalf = cv2.rotate(frame, cv2.ROTATE_180)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(rotatedHalf, cv2.COLOR_BGR2RGB))
      plt.title(f'180°: {rotatedHalf.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 270도 회전
    description: 반시계 방향 90도와 동일합니다
    content: |-
      rotatedCcw = cv2.rotate(frame, cv2.ROTATE_90_COUNTERCLOCKWISE)
      plt.figure(figsize=(6, 8))
      plt.imshow(cv2.cvtColor(rotatedCcw, cv2.COLOR_BGR2RGB))
      plt.title(f'270° (90° CCW): {rotatedCcw.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: cv2.rotate()는 ROTATE_90_CLOCKWISE, ROTATE_180, ROTATE_90_COUNTERCLOCKWISE 세 가지 옵션만 제공합니다. 임의 각도 회전은 아핀 변환을 사용해야 합니다.
  - type: code
    language: python
    title: 회전 결과 비교
    description: 세 회전을 나란히 표시합니다
    content: |-
      figRotate, axRotate = plt.subplots(1, 3, figsize=(12, 4))
      axRotate[0].imshow(cv2.cvtColor(rotatedCw, cv2.COLOR_BGR2RGB))
      axRotate[0].set_title('90° CW')
      axRotate[0].axis('off')
      axRotate[1].imshow(cv2.cvtColor(rotatedHalf, cv2.COLOR_BGR2RGB))
      axRotate[1].set_title('180°')
      axRotate[1].axis('off')
      axRotate[2].imshow(cv2.cvtColor(rotatedCcw, cv2.COLOR_BGR2RGB))
      axRotate[2].set_title('270° (90° CCW)')
      axRotate[2].axis('off')
      plt.tight_layout()

- id: step4_flip
  title: 4단계. 이미지 뒤집기
  subtitle: flip()
  blocks:
  - type: text
    content: flip()은 이미지를 거울처럼 뒤집는 함수입니다. 수평 뒤집기(좌우 반전)는 셀카를 거울처럼 보이게 할 때, 수직 뒤집기(상하 반전)는 물에 비친 반사 효과를 만들 때 사용합니다. flipCode 파라미터로 방향을 지정합니다.
  - type: code
    language: python
    title: 수평 뒤집기
    description: 좌우를 뒤집습니다
    content: |-
      flippedH = cv2.flip(frame, 1)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(flippedH, cv2.COLOR_BGR2RGB))
      plt.title('Horizontal Flip')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 수직 뒤집기
    description: 상하를 뒤집습니다
    content: |-
      flippedV = cv2.flip(frame, 0)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(flippedV, cv2.COLOR_BGR2RGB))
      plt.title('Vertical Flip')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 양방향 뒤집기
    description: 상하좌우 모두 뒤집습니다
    content: |-
      flippedBoth = cv2.flip(frame, -1)
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(flippedBoth, cv2.COLOR_BGR2RGB))
      plt.title('Both Flip')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: flipCode가 1이면 수평(좌우), 0이면 수직(상하), -1이면 양방향 뒤집기입니다. 양방향 뒤집기는 180도 회전과 동일한 결과입니다.
  - type: code
    language: python
    title: 뒤집기 결과 비교
    description: 세 뒤집기를 나란히 표시합니다
    content: |-
      figFlip, axFlip = plt.subplots(1, 3, figsize=(12, 4))
      axFlip[0].imshow(cv2.cvtColor(flippedH, cv2.COLOR_BGR2RGB))
      axFlip[0].set_title('Horizontal Flip')
      axFlip[0].axis('off')
      axFlip[1].imshow(cv2.cvtColor(flippedV, cv2.COLOR_BGR2RGB))
      axFlip[1].set_title('Vertical Flip')
      axFlip[1].axis('off')
      axFlip[2].imshow(cv2.cvtColor(flippedBoth, cv2.COLOR_BGR2RGB))
      axFlip[2].set_title('Both')
      axFlip[2].axis('off')
      plt.tight_layout()

- id: step5_crop
  title: 5단계. 이미지 자르기
  subtitle: 배열 슬라이싱
  blocks:
  - type: text
    content: OpenCV에서 자르기는 NumPy 슬라이싱으로 수행합니다. img[y1:y2, x1:x2]로 사각형 영역을 추출합니다. y(행)가 먼저, x(열)가 나중입니다.
  - type: code
    language: python
    title: 중앙 영역 자르기
    description: 이미지 중앙 50% 영역을 추출합니다
    content: |-
      h, w = frame.shape[:2]
      y1, y2 = h // 4, h * 3 // 4
      x1, x2 = w // 4, w * 3 // 4
      cropped = frame[y1:y2, x1:x2]
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(cropped, cv2.COLOR_BGR2RGB))
      plt.title(f'Cropped: {cropped.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 자른 영역 확인
    description: 추출된 영역을 출력합니다
    content: |-
      plt.figure(figsize=(8, 6))
      plt.imshow(cv2.cvtColor(cropped, cv2.COLOR_BGR2RGB))
      plt.title(f'Cropped: {cropped.shape[1]}x{cropped.shape[0]}')
      plt.axis('off')
      plt.tight_layout()
  - type: tip
    content: 슬라이싱은 뷰를 반환합니다. 원본을 수정하지 않으려면 .copy()를 사용하세요. cropped = frame[y1:y2, x1:x2].copy()

- id: step6_combine
  title: 6단계. 변환 조합
  subtitle: 여러 변환 연결
  blocks:
  - type: text
    content: 여러 기하학적 변환을 순차적으로 적용할 수 있습니다. 자르기 → 리사이즈 → 회전 순서로 적용해봅시다.
  - type: code
    language: python
    title: 변환 조합
    description: 자르기 + 리사이즈 + 회전을 적용합니다
    content: |-
      step1 = frame[50:350, 100:400]
      step2 = cv2.resize(step1, (200, 200))
      final = cv2.rotate(step2, cv2.ROTATE_90_CLOCKWISE)
      plt.figure(figsize=(6, 6))
      plt.imshow(cv2.cvtColor(final, cv2.COLOR_BGR2RGB))
      plt.title(f'Final: {final.shape}')
      plt.axis('off')
      plt.tight_layout()
  - type: code
    language: python
    title: 최종 결과
    description: 모든 변환이 적용된 이미지입니다
    content: |-
      plt.figure(figsize=(6, 6))
      plt.imshow(cv2.cvtColor(final, cv2.COLOR_BGR2RGB))
      plt.title('Crop + Resize + Rotate')
      plt.axis('off')
      plt.tight_layout()

- id: practice
  title: 실습
  subtitle: 기하 변환 프로젝트
  blocks:
  - type: text
    content: sklearn 이미지에 다양한 기하학적 변환을 적용해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: flower 크기 조절과 뒤집기"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        flower = load_sample_image('flower.jpg')
        flowerBgr = cv2.cvtColor(flower, cv2.COLOR_RGB2BGR)
        plt.figure(figsize=(8, 6))
        plt.imshow(flower)
        plt.title(f'Flower: {flower.shape}')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "리사이즈"
      content: |-
        flowerSmall = cv2.resize(flowerBgr, (320, 213))
        plt.figure(figsize=(6, 4))
        plt.imshow(cv2.cvtColor(flowerSmall, cv2.COLOR_BGR2RGB))
        plt.title(f'Small: {flowerSmall.shape}')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "뒤집기 및 출력"
      content: |-
        flowerFlip = cv2.flip(flowerSmall, 1)
        figFlower, axFlower = plt.subplots(1, 2, figsize=(10, 4))
        axFlower[0].imshow(cv2.cvtColor(flowerSmall, cv2.COLOR_BGR2RGB))
        axFlower[0].set_title('Resized')
        axFlower[0].axis('off')
        axFlower[1].imshow(cv2.cvtColor(flowerFlip, cv2.COLOR_BGR2RGB))
        axFlower[1].set_title('Flipped')
        axFlower[1].axis('off')
        plt.tight_layout()
  - type: expansion
    title: "미션2: china 자르기와 회전 조합"
    blocks:
    - type: code
      title: "이미지 로드"
      content: |-
        import cv2
        import numpy as np
        from sklearn.datasets import load_sample_image
        import matplotlib.pyplot as plt

        china = load_sample_image('china.jpg')
        chinaBgr = cv2.cvtColor(china, cv2.COLOR_RGB2BGR)
        plt.figure(figsize=(10, 6))
        plt.imshow(china)
        plt.title(f'China: {china.shape}')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "중앙 자르기"
      content: |-
        ch, cw = chinaBgr.shape[:2]
        chinaCrop = chinaBgr[ch//4:ch*3//4, cw//4:cw*3//4]
        plt.figure(figsize=(8, 6))
        plt.imshow(cv2.cvtColor(chinaCrop, cv2.COLOR_BGR2RGB))
        plt.title(f'Cropped: {chinaCrop.shape}')
        plt.axis('off')
        plt.tight_layout()
    - type: code
      title: "회전 및 출력"
      content: |-
        chinaRot = cv2.rotate(chinaCrop, cv2.ROTATE_90_CLOCKWISE)
        chinaFinal = cv2.resize(chinaRot, (300, 400))
        plt.figure(figsize=(6, 8))
        plt.imshow(cv2.cvtColor(chinaFinal, cv2.COLOR_BGR2RGB))
        plt.title('Crop + Rotate + Resize')
        plt.axis('off')
        plt.tight_layout()
