meta:
  id: day10_2
  title: 반복문 패턴학습
  day: 10
  category: 30days
  source: 30-Days-Of-Python
  sourceUrl: https://github.com/Asabeneh/30-Days-Of-Python
  tags: []
  seo:
    title: "파이썬 반복문 for, while"
    description: "for, while 반복문으로 코드를 반복 실행하는 방법을 배웁니다."
    keywords: ['반복문', 'for', 'while', 'range']
intro:
  title: 반복문 마스터 패턴북
  emoji: 🔥
  description: 이것만 외우면 반복문 마스터! 핵심 패턴만 모았습니다.
  points:
  - '📝 for문: for 변수 in 순회객체:'
  - '🔢 range: range(시작, 끝, 스텝)'
  - '🔄 while문: while 조건:'
  - '⏹️ break: 반복 즉시 종료'
  - '⏭️ continue: 다음 반복으로 건너뛰기'
  - '📦 enumerate: 인덱스와 값 함께'
  - '🔗 zip: 여러 리스트 동시 순회'
  - '🧠 중첩반복: 반복문 안에 반복문'
  summary: 🔥 반복문은 자동화의 시작! for와 while 마스터!
sections:
- id: for_basic
  title: 1. for 기본 패턴
  subtitle: 'for 변수 in 시퀀스:'
  blocks:
  - type: code
    language: python
    title: for문 기본 구조
    description: for문은 시퀀스의 각 요소를 순서대로 접근하는 가장 기본적인 반복 패턴입니다. 리스트, 문자열, 튜플 등을 자동으로 순회합니다.
    content: |-
      for forBasicItem in [1, 2, 3]:
          print(forBasicItem)

      for forBasicChar in "hello":
          print(forBasicChar)
- id: while_basic
  title: 2. while 기본 패턴
  subtitle: 'while 조건:'
  blocks:
  - type: code
    language: python
    title: while문 기본 구조
    description: while문은 조건이 참인 동안 계속 반복하는 패턴입니다. 반복 변수를 수동으로 제어해야 합니다.
    content: |-
      whileBasicCount = 0
      while whileBasicCount < 3:
          print(whileBasicCount)
          whileBasicCount += 1
- id: break_pattern
  title: 3. break 패턴
  subtitle: 반복문 완전 종료
  blocks:
  - type: code
    language: python
    title: break - 반복문 탈출
    description: break는 반복문을 즉시 완전히 종료하는 패턴입니다. 특정 조건에서 반복을 중단하고 싶을 때 사용합니다.
    content: |-
      for breakPatternIndex in range(5):
          if breakPatternIndex == 3:
              break
          print(breakPatternIndex)

      breakPatternCount = 0
      while True:
          if breakPatternCount >= 3:
              break
          print(breakPatternCount)
          breakPatternCount += 1
- id: continue_pattern
  title: 4. continue 패턴
  subtitle: 현재 반복만 건너뛰기
  blocks:
  - type: code
    language: python
    title: continue - 다음 반복으로
    description: continue는 현재 반복을 건너뛰고 다음 반복으로 바로 넘어가는 패턴입니다. 특정 조건의 요소만 제외하고 처리할 때 사용합니다.
    content: |-
      for continuePatternIndex1 in range(5):
          if continuePatternIndex1 == 2:
              continue
          print(continuePatternIndex1)

      for continuePatternIndex2 in range(5):
          if continuePatternIndex2 % 2 == 0:
              continue
          print(continuePatternIndex2)
- id: pass_pattern
  title: 5. pass 패턴
  subtitle: 아무것도 하지 않기
  blocks:
  - type: code
    language: python
    title: pass - 빈 블록
    description: pass는 아무것도 하지 않는 패턴입니다. 문법적으로 코드가 필요하지만 실제로는 아무 작업도 하지 않을 때 사용합니다.
    content: |-
      for passPatternIndex in range(5):
          if passPatternIndex < 3:
              pass
          else:
              print(passPatternIndex)

      for passPatternItem in []:
          pass
- id: for_else_pattern
  title: 6. for-else 패턴
  subtitle: break 없이 완료시 실행
  blocks:
  - type: code
    language: python
    title: for-else - 정상 완료 감지
    description: for-else는 반복문이 break 없이 정상적으로 모든 요소를 처리했을 때 else 블록이 실행되는 패턴입니다. 검색 실패 등을 감지할 때 유용합니다.
    content: |-
      for forElsePatternIndex in [1, 2, 3]:
          if forElsePatternIndex == 5:
              break
      else:
          print("5를 찾지 못함")

      forElsePatternNumbers = [1, 2, 3, 4]
      for forElsePatternNum in forElsePatternNumbers:
          if forElsePatternNum == 5:
              print("찾았음!")
              break
      else:
          print("못 찾음")
- id: while_else_pattern
  title: 7. while-else 패턴
  subtitle: 조건이 거짓이 되면 실행
  blocks:
  - type: code
    language: python
    title: while-else - 조건 완료 감지
    description: while-else는 while 조건이 거짓이 되어 정상 종료될 때 else 블록이 실행되는 패턴입니다. break로 탈출하면 else는 실행되지 않습니다.
    content: |-
      whileElsePatternCount1 = 0
      while whileElsePatternCount1 < 3:
          print(whileElsePatternCount1)
          whileElsePatternCount1 += 1
      else:
          print("정상 완료")

      whileElsePatternCount2 = 0
      while whileElsePatternCount2 < 5:
          if whileElsePatternCount2 == 2:
              break
          whileElsePatternCount2 += 1
      else:
          print("실행 안됨")
- id: enumerate_pattern
  title: 8. enumerate 패턴
  subtitle: 인덱스와 값 동시 접근
  blocks:
  - type: code
    language: python
    title: enumerate - 인덱스 자동 생성
    description: enumerate는 시퀀스를 순회하면서 인덱스와 값을 동시에 얻는 패턴입니다. 몇 번째 요소인지 알아야 할 때 매우 유용합니다.
    content: |-
      enumeratePatternFruits = ["apple", "banana", "cherry"]
      for enumeratePatternIndex1, enumeratePatternFruit1 in enumerate(enumeratePatternFruits):
          print(f"{enumeratePatternIndex1}: {enumeratePatternFruit1}")

      for enumeratePatternIndex2, enumeratePatternFruit2 in enumerate(enumeratePatternFruits, 1):
          print(f"{enumeratePatternIndex2}번째: {enumeratePatternFruit2}")
- id: zip_pattern
  title: 9. zip 패턴
  subtitle: 여러 시퀀스 동시 순회
  blocks:
  - type: code
    language: python
    title: zip - 병렬 순회
    description: zip은 여러 시퀀스를 동시에 순회하는 패턴입니다. 같은 위치의 요소들을 묶어서 처리할 때 사용합니다.
    content: |-
      zipPatternNames = ["철수", "영희", "민수"]
      zipPatternAges = [20, 21, 22]

      for zipPatternName1, zipPatternAge1 in zip(zipPatternNames, zipPatternAges):
          print(f"{zipPatternName1}: {zipPatternAge1}살")

      zipPatternScores = [85, 90, 95]
      for zipPatternName2, zipPatternAge2, zipPatternScore in zip(zipPatternNames, zipPatternAges, zipPatternScores):
          print(f"{zipPatternName2}({zipPatternAge2}살): {zipPatternScore}점")
- id: nested_pattern
  title: 10. 중첩 반복문 패턴
  subtitle: 반복문 안의 반복문
  blocks:
  - type: code
    language: python
    title: 중첩 반복문
    description: 중첩 반복문은 반복문 안에 또 다른 반복문을 넣는 패턴입니다. 2차원 데이터나 모든 조합을 처리할 때 사용합니다.
    content: |-
      for nestedPatternRow1 in range(2):
          for nestedPatternCol1 in range(3):
              print(f"({nestedPatternRow1},{nestedPatternCol1})")

      nestedPatternMatrix = [[1, 2], [3, 4]]
      for nestedPatternRow2 in nestedPatternMatrix:
          for nestedPatternItem in nestedPatternRow2:
              print(nestedPatternItem)

      for nestedPatternRow3 in range(2, 4):
          for nestedPatternCol2 in range(1, 4):
              print(f"{nestedPatternRow3}x{nestedPatternCol2}={nestedPatternRow3*nestedPatternCol2}")
