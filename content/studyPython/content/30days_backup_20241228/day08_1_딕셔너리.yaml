sections:
- id: dict_introduction
  title: 딕셔너리 소개
  subtitle: 키-값 쌍의 강력한 데이터 구조
  blocks:
  - type: text
    content: 딕셔너리(Dictionary)는 키(key)와 값(value)의 쌍으로 데이터를 저장하는 파이썬의 핵심 데이터 타입입니다. 실제 사전처럼 단어(키)와 그 의미(값)를 연결하여 저장하며, 키를 통해 빠르게 값을 찾을 수 있습니다. 딕셔너리는 중괄호 {}를 사용하지만 집합과 달리 콜론(:)으로 키와 값을 연결합니다. 순서가 보장되고 변경 가능한 특성을 가지며, 매우 빠른 검색 속도를 제공합니다.
  - type: list
    items:
    - 키-값 쌍으로 데이터 저장
    - 순서가 있는(ordered) 컬렉션
    - 변경 가능한(mutable) 객체
    - 중괄호 {}와 콜론 : 사용
  - type: code
    language: python
    title: 딕셔너리 기본 개념
    description: "딕셔너리를 생성하고 기본 속성을 확인합니다."
    content: |-
      introPerson = {
          'name': '김파이썬',
          'age': 25,
          'city': '서울'
      }
      print('딕셔너리:', introPerson)
      print('타입:', type(introPerson))
      print('길이:', len(introPerson))

      introEmptyDict = {}
      print('빈 딕셔너리:', introEmptyDict)
      print('빈 딕셔너리 타입:', type(introEmptyDict))
  - type: tip
    content: "빈 중괄호 {}는 빈 집합이 아니라 빈 딕셔너리입니다. 빈 집합은 set()으로 만듭니다."

- id: dict_creation_literal
  title: 리터럴 방식 생성
  subtitle: 중괄호로 직접 딕셔너리 만들기
  blocks:
  - type: text
    content: 중괄호 {}를 사용한 리터럴 방식은 딕셔너리를 생성하는 가장 기본적이고 직관적인 방법입니다. 콜론(:)으로 키와 값을 연결하고 쉼표(,)로 각 쌍을 구분합니다. 키는 문자열, 숫자, 튜플 등 변경 불가능한(immutable) 타입만 사용할 수 있고, 값은 어떤 타입이든 가능합니다. 리스트나 다른 딕셔너리도 값으로 넣을 수 있습니다.
  - type: list
    items:
    - 중괄호 {}와 콜론(:) 사용
    - 키는 불변 타입만 가능 (문자열, 숫자, 튜플)
    - 값은 모든 타입 허용
    - 가장 직관적인 생성 방법
  - type: code
    language: python
    title: 리터럴 방식으로 딕셔너리 생성
    description: "중괄호와 콜론으로 딕셔너리를 만듭니다."
    content: |-
      literalStudent = {
          'name': '이영희',
          'age': 20,
          'major': '컴퓨터공학',
          'grade': 3.8,
          'isActive': True,
          'courses': ['자료구조', '알고리즘', '데이터베이스']
      }
      print('학생 정보:', literalStudent)

      literalProduct = {
          'name': '노트북',
          'price': 1500000,
          'stock': 50
      }
      print('상품 정보:', literalProduct)

- id: dict_creation_constructor
  title: dict() 생성자 함수
  subtitle: 함수를 통한 딕셔너리 생성
  blocks:
  - type: text
    content: dict() 내장 함수는 다양한 방법으로 딕셔너리를 생성할 수 있는 도구입니다. 키워드 인자를 받아 딕셔너리를 생성하거나, 튜플의 리스트를 변환할 수 있습니다. 키워드 인자로 사용할 때는 키가 유효한 Python 식별자여야 하며, 따옴표 없이 사용합니다. 빈 딕셔너리를 만들 때도 사용할 수 있습니다.
  - type: list
    items:
    - dict() 내장 함수 사용
    - 키워드 인자로 편리한 생성
    - 튜플 리스트를 딕셔너리로 변환
    - 빈 딕셔너리 생성 가능
  - type: code
    language: python
    title: dict() 함수 활용법
    description: "dict() 함수로 딕셔너리를 생성합니다."
    content: |-
      constructorPerson = dict(name='홍길동', age=30, city='부산')
      print('키워드 인자:', constructorPerson)

      constructorPairs = [('apple', 1000), ('banana', 500), ('orange', 800)]
      constructorFruits = dict(constructorPairs)
      print('튜플 리스트:', constructorFruits)

      constructorEmpty = dict()
      print('빈 딕셔너리:', constructorEmpty)

- id: dict_length_check
  title: 딕셔너리 길이 확인
  subtitle: len() 함수로 항목 개수 세기
  blocks:
  - type: text
    content: len() 함수를 사용하여 딕셔너리의 키-값 쌍 개수를 확인할 수 있습니다. 이는 데이터의 규모를 파악할 때 유용합니다. 중첩된 딕셔너리나 리스트가 값으로 있어도 각각은 하나의 키-값 쌍으로 계산됩니다. 빈 딕셔너리의 길이는 0입니다.
  - type: list
    items:
    - len() 함수로 키-값 쌍 개수 확인
    - 빈 딕셔너리는 길이가 0
    - 중첩된 구조도 하나의 쌍으로 계산
    - 데이터 규모 파악에 유용
  - type: code
    language: python
    title: 딕셔너리 길이 확인
    description: "딕셔너리의 항목 개수를 확인합니다."
    content: |-
      lengthEmpty = {}
      print('빈 딕셔너리 길이:', len(lengthEmpty))

      lengthSimple = {'name': '김파이썬', 'age': 25}
      print('간단한 딕셔너리 길이:', len(lengthSimple))

      lengthComplex = {
          'info': {'name': '이개발', 'age': 30},
          'skills': ['Python', 'JavaScript'],
          'active': True
      }
      print('복잡한 딕셔너리 길이:', len(lengthComplex))

- id: dict_access_bracket
  title: 대괄호로 값 접근
  subtitle: 기본적인 값 가져오기 방법
  blocks:
  - type: text
    content: 대괄호 []를 사용한 값 접근은 딕셔너리에서 가장 기본적이고 직접적인 방법입니다. 키를 대괄호 안에 넣으면 해당하는 값을 즉시 반환합니다. 하지만 존재하지 않는 키에 접근하면 KeyError가 발생하므로 주의해야 합니다. 중첩된 딕셔너리는 대괄호를 연속으로 사용하여 접근합니다.
  - type: list
    items:
    - 대괄호 []로 키를 사용하여 값 접근
    - 존재하지 않는 키 접근 시 KeyError 발생
    - 가장 직접적이고 빠른 방법
    - 중첩된 딕셔너리는 연속 대괄호 사용
  - type: code
    language: python
    title: 대괄호로 값 접근
    description: "대괄호를 사용하여 딕셔너리 값에 접근합니다."
    content: |-
      accessPerson = {
          'name': '김철수',
          'age': 28,
          'skills': ['Python', 'Java', 'SQL'],
          'address': {'city': '서울', 'district': '강남'}
      }

      print('이름:', accessPerson['name'])
      print('나이:', accessPerson['age'])

      print('첫 번째 기술:', accessPerson['skills'][0])
      print('마지막 기술:', accessPerson['skills'][-1])

      print('도시:', accessPerson['address']['city'])
      print('구:', accessPerson['address']['district'])
  - type: tip
    content: "존재하지 않는 키에 접근하면 KeyError가 발생합니다. 안전하게 접근하려면 get() 메서드를 사용하세요."

- id: dict_access_get
  title: get() 메서드
  subtitle: 안전한 값 접근과 기본값 설정
  blocks:
  - type: text
    content: get() 메서드는 딕셔너리에서 값을 안전하게 가져오는 방법입니다. 존재하지 않는 키에 접근해도 KeyError가 발생하지 않고 None을 반환합니다. 두 번째 인자로 기본값을 지정하면 키가 없을 때 그 값을 반환합니다. 외부 데이터를 처리하거나 선택적 필드가 있을 때 매우 유용합니다.
  - type: list
    items:
    - get(key) - 안전한 값 접근
    - 존재하지 않는 키는 None 반환
    - get(key, default) - 기본값 설정 가능
    - KeyError 방지에 필수
  - type: code
    language: python
    title: get() 메서드 활용
    description: "get() 메서드로 안전하게 값에 접근합니다."
    content: |-
      getPerson = {
          'name': '이영희',
          'age': 25,
          'city': '부산'
      }

      print('이름:', getPerson.get('name'))
      print('나이:', getPerson.get('age'))

      print('직업:', getPerson.get('job'))
      print('직업 (기본값):', getPerson.get('job', '미등록'))

      print('급여 (기본값):', getPerson.get('salary', 0))
      print('이메일 (기본값):', getPerson.get('email', '없음'))

- id: dict_add_items
  title: 항목 추가하기
  subtitle: 새로운 키-값 쌍 추가
  blocks:
  - type: text
    content: 딕셔너리는 변경 가능한(mutable) 객체이므로 언제든지 새로운 키-값 쌍을 추가할 수 있습니다. 대괄호 표기법으로 새로운 키에 값을 할당하면 자동으로 항목이 추가됩니다. 이미 존재하는 키에 값을 할당하면 기존 값이 새 값으로 덮어쓰기됩니다.
  - type: list
    items:
    - 대괄호 []로 새 키에 값 할당
    - 기존 키에 새 값 할당 시 덮어쓰기
    - 원본 딕셔너리가 직접 변경됨
    - 동적 데이터 구성에 필수적
  - type: code
    language: python
    title: 새 항목 추가
    description: "딕셔너리에 새로운 항목을 추가합니다."
    content: |-
      addPerson = {'name': '홍길동', 'age': 30}
      print('초기:', addPerson)

      addPerson['city'] = '서울'
      print('city 추가:', addPerson)

      addPerson['job'] = '개발자'
      print('job 추가:', addPerson)

      addPerson['age'] = 31
      print('age 수정:', addPerson)

      print('최종 길이:', len(addPerson))

- id: dict_update_method
  title: update() 메서드
  subtitle: 여러 값 한번에 업데이트
  blocks:
  - type: text
    content: update() 메서드는 다른 딕셔너리나 키워드 인자를 받아 현재 딕셔너리에 병합하는 기능입니다. 새로운 키는 추가하고 기존 키는 덮어씁니다. 여러 값을 한 번에 수정해야 할 때 매우 효율적입니다. 두 딕셔너리를 합칠 때도 사용합니다.
  - type: list
    items:
    - update(dict) - 다른 딕셔너리로 업데이트
    - update(**kwargs) - 키워드 인자로 업데이트
    - 기존 키는 덮어쓰고 새 키는 추가
    - 여러 항목 일괄 처리에 유용
  - type: code
    language: python
    title: update() 메서드 활용
    description: "update()로 여러 항목을 한 번에 업데이트합니다."
    content: |-
      updatePerson = {'name': '김철수', 'age': 25}
      print('업데이트 전:', updatePerson)

      updateAdditional = {'city': '서울', 'job': '학생'}
      updatePerson.update(updateAdditional)
      print('딕셔너리로 업데이트:', updatePerson)

      updatePerson.update(age=26, major='컴퓨터공학')
      print('키워드로 업데이트:', updatePerson)

      print('최종 길이:', len(updatePerson))

- id: dict_remove_pop
  title: pop() 메서드
  subtitle: 항목 제거하고 값 반환받기
  blocks:
  - type: text
    content: pop() 메서드는 지정된 키의 항목을 딕셔너리에서 제거하고 그 값을 반환합니다. 제거된 값을 변수에 저장하여 추가 처리를 할 수 있습니다. 존재하지 않는 키에 대해서는 두 번째 인자로 기본값을 제공할 수 있어 안전한 제거가 가능합니다.
  - type: list
    items:
    - pop(key) - 키 제거하고 값 반환
    - pop(key, default) - 기본값으로 안전한 제거
    - 존재하지 않는 키에 기본값 없으면 KeyError
    - 제거된 값을 활용 가능
  - type: code
    language: python
    title: pop() 메서드 사용
    description: "pop()으로 항목을 제거하고 값을 받습니다."
    content: |-
      popPerson = {
          'name': '이영희',
          'age': 28,
          'city': '부산',
          'job': '디자이너'
      }
      print('제거 전:', popPerson)

      popRemovedAge = popPerson.pop('age')
      print('제거된 나이:', popRemovedAge)
      print('나이 제거 후:', popPerson)

      popSalary = popPerson.pop('salary', 0)
      print('급여 (없으면 0):', popSalary)

      print('최종:', popPerson)

- id: dict_remove_popitem
  title: popitem() 메서드
  subtitle: 마지막 항목 제거하기
  blocks:
  - type: text
    content: popitem() 메서드는 딕셔너리에서 마지막에 추가된 키-값 쌍을 제거하고 (키, 값) 튜플로 반환합니다. 삽입 순서가 보장되므로 정확히 마지막 항목을 제거합니다. 빈 딕셔너리에서 호출하면 KeyError가 발생합니다.
  - type: list
    items:
    - 마지막 삽입된 항목을 제거
    - (키, 값) 튜플로 반환
    - 빈 딕셔너리에서는 KeyError 발생
    - 순서대로 항목 처리에 유용
  - type: code
    language: python
    title: popitem() 메서드 사용
    description: "popitem()으로 마지막 항목을 제거합니다."
    content: |-
      popitemPerson = {'name': '홍길동', 'age': 35, 'city': '서울'}
      print('초기:', popitemPerson)

      popitemPerson['job'] = '교사'
      popitemPerson['hobby'] = '독서'
      print('추가 후:', popitemPerson)

      popitemLast = popitemPerson.popitem()
      print('제거된 항목:', popitemLast)
      print('제거 후:', popitemPerson)

      popitemAnother = popitemPerson.popitem()
      print('또 제거된 항목:', popitemAnother)
      print('최종:', popitemPerson)

- id: dict_remove_del
  title: del 키워드로 제거
  subtitle: 특정 키나 전체 딕셔너리 삭제
  blocks:
  - type: text
    content: del 키워드는 딕셔너리에서 특정 키의 항목을 삭제하거나 딕셔너리 전체를 메모리에서 제거할 수 있습니다. pop()과 달리 제거된 값을 반환하지 않습니다. 존재하지 않는 키에 접근하면 KeyError가 발생합니다. 딕셔너리 전체를 삭제하면 해당 변수에 더 이상 접근할 수 없습니다.
  - type: list
    items:
    - del dict[key] - 특정 키 삭제
    - del dict - 딕셔너리 전체 삭제
    - 제거된 값을 반환하지 않음
    - 존재하지 않는 키는 KeyError 발생
  - type: code
    language: python
    title: del 키워드 사용
    description: "del로 딕셔너리 항목이나 전체를 삭제합니다."
    content: |-
      delPerson = {
          'name': '김철수',
          'age': 30,
          'city': '대전',
          'job': '엔지니어'
      }
      print('삭제 전:', delPerson)

      del delPerson['city']
      print('city 삭제:', delPerson)

      del delPerson['job']
      print('job 삭제:', delPerson)

      print('남은 항목 수:', len(delPerson))

      delTemp = {'temp': 'data'}
      del delTemp
      print('delTemp 삭제됨')

- id: dict_clear_method
  title: clear() 메서드
  subtitle: 모든 항목 제거하여 빈 딕셔너리로
  blocks:
  - type: text
    content: clear() 메서드는 딕셔너리의 모든 항목을 제거하여 빈 딕셔너리로 만듭니다. del과는 달리 딕셔너리 객체 자체는 유지되므로 변수를 계속 사용할 수 있습니다. 데이터를 완전히 리셋하고 재사용해야 하는 상황에서 유용합니다.
  - type: list
    items:
    - 모든 키-값 쌍 제거
    - 빈 딕셔너리로 초기화
    - 딕셔너리 객체는 유지됨
    - 재사용을 위한 완전 리셋
  - type: code
    language: python
    title: clear() 메서드 사용
    description: "clear()로 딕셔너리의 모든 항목을 제거합니다."
    content: |-
      clearPerson = {'name': '이영희', 'age': 27, 'city': '인천'}
      print('초기:', clearPerson)
      print('초기 길이:', len(clearPerson))

      clearPerson.clear()
      print('clear() 후:', clearPerson)
      print('clear() 후 길이:', len(clearPerson))
      print('타입:', type(clearPerson))

      clearPerson['newName'] = '박개발'
      print('재사용:', clearPerson)

- id: dict_keys_method
  title: keys() 메서드
  subtitle: 모든 키 가져오기
  blocks:
  - type: text
    content: keys() 메서드는 딕셔너리의 모든 키를 dict_keys 객체로 반환합니다. list()로 변환하여 일반 리스트로 만들 수 있습니다. 키 목록을 확인하거나 키가 있는지 확인할 때 유용합니다.
  - type: list
    items:
    - keys() 메서드로 모든 키 추출
    - dict_keys 객체로 반환
    - list()로 리스트 변환 가능
    - in 연산자로 키 존재 확인
  - type: code
    language: python
    title: keys() 메서드 사용
    description: "keys()로 딕셔너리의 모든 키를 가져옵니다."
    content: |-
      keysPerson = {
          'name': '홍길동',
          'age': 32,
          'city': '서울',
          'job': '개발자'
      }

      keysResult = keysPerson.keys()
      print('키 객체:', keysResult)
      print('타입:', type(keysResult))

      keysResultList = list(keysResult)
      print('키 리스트:', keysResultList)

      print('키 개수:', len(keysResult))
      print('age 키 존재:', 'age' in keysResult)
      print('salary 키 존재:', 'salary' in keysResult)

- id: dict_values_method
  title: values() 메서드
  subtitle: 모든 값 가져오기
  blocks:
  - type: text
    content: values() 메서드는 딕셔너리의 모든 값을 dict_values 객체로 반환합니다. 키와 무관하게 순수한 값들만 필요할 때 사용합니다. 숫자 값들의 합계나 평균을 계산할 때 유용합니다.
  - type: list
    items:
    - values() 메서드로 모든 값 추출
    - dict_values 객체로 반환
    - 통계 계산에 유용
    - sum(), max(), min() 등과 결합 가능
  - type: code
    language: python
    title: values() 메서드 사용
    description: "values()로 딕셔너리의 모든 값을 가져옵니다."
    content: |-
      valuesPrices = {
          'apple': 1000,
          'banana': 500,
          'orange': 800,
          'grape': 2000
      }

      valuesResult = valuesPrices.values()
      print('값 객체:', valuesResult)
      print('타입:', type(valuesResult))

      valuesResultList = list(valuesResult)
      print('값 리스트:', valuesResultList)

      print('총 가격:', sum(valuesResult))
      print('최고 가격:', max(valuesResult))
      print('최저 가격:', min(valuesResult))

- id: dict_items_method
  title: items() 메서드
  subtitle: 모든 키-값 쌍 가져오기
  blocks:
  - type: text
    content: items() 메서드는 딕셔너리의 모든 키-값 쌍을 (키, 값) 튜플의 형태로 dict_items 객체로 반환합니다. 키와 값을 함께 처리해야 할 때 매우 유용합니다. list()로 변환하면 튜플들의 리스트가 됩니다.
  - type: list
    items:
    - items() 메서드로 키-값 쌍 추출
    - (키, 값) 튜플들의 dict_items 객체
    - 키와 값을 함께 처리할 때 유용
    - list()로 리스트 변환 가능
  - type: code
    language: python
    title: items() 메서드 사용
    description: "items()로 딕셔너리의 키-값 쌍을 가져옵니다."
    content: |-
      itemsPerson = {
          'name': '김파이썬',
          'age': 25,
          'city': '서울'
      }

      itemsResult = itemsPerson.items()
      print('아이템 객체:', itemsResult)
      print('타입:', type(itemsResult))

      itemsResultList = list(itemsResult)
      print('아이템 리스트:', itemsResultList)

      print('첫 번째 항목:', itemsResultList[0])
      print('첫 번째 키:', itemsResultList[0][0])
      print('첫 번째 값:', itemsResultList[0][1])

- id: dict_membership_test
  title: 멤버십 테스트
  subtitle: in과 not in 연산자
  blocks:
  - type: text
    content: 딕셔너리에서 특정 키가 존재하는지 확인하는 멤버십 테스트는 매우 중요합니다. in과 not in 연산자를 사용하여 키의 존재 여부를 True/False로 확인할 수 있습니다. 이는 KeyError를 방지하고 안전한 코드를 작성하는 데 필수적입니다. 딕셔너리의 멤버십 테스트는 키에 대해서만 작동합니다.
  - type: list
    items:
    - in 연산자로 키 존재 확인
    - not in 연산자로 키 부재 확인
    - True/False 불린 값 반환
    - 값이 아닌 키에 대해서만 동작
  - type: code
    language: python
    title: 멤버십 테스트
    description: "in 연산자로 키의 존재 여부를 확인합니다."
    content: |-
      memberPerson = {
          'name': '이영희',
          'age': 28,
          'city': '부산'
      }

      print('name 키 존재:', 'name' in memberPerson)
      print('job 키 존재:', 'job' in memberPerson)

      print('salary 키 없음:', 'salary' not in memberPerson)
      print('age 키 없음:', 'age' not in memberPerson)

      memberHasEmail = 'email' in memberPerson
      print('이메일 키 존재:', memberHasEmail)

      memberEmail = memberPerson.get('email', '없음')
      print('이메일 값:', memberEmail)

- id: dict_copy_method
  title: 딕셔너리 복사
  subtitle: copy() 메서드와 dict() 사용
  blocks:
  - type: text
    content: 딕셔너리를 복사하는 방법은 여러 가지가 있습니다. copy() 메서드나 dict() 함수를 사용하면 얕은 복사(shallow copy)가 이루어집니다. 얕은 복사는 최상위 레벨만 복사하고, 내부의 중첩된 객체는 같은 참조를 공유합니다. 단순 대입(=)은 복사가 아니라 같은 객체를 참조하게 됩니다.
  - type: list
    items:
    - copy() 메서드로 얕은 복사
    - dict()로도 복사 가능
    - 단순 대입은 같은 객체 참조
    - 중첩된 객체는 참조 공유
  - type: code
    language: python
    title: 딕셔너리 복사
    description: "딕셔너리를 복사하는 방법을 알아봅니다."
    content: |-
      copyOriginal = {'name': '홍길동', 'age': 30, 'city': '서울'}

      copyCopied1 = copyOriginal.copy()
      copyCopied2 = dict(copyOriginal)

      copyCopied1['age'] = 31
      print('원본:', copyOriginal)
      print('복사본1:', copyCopied1)
      print('복사본2:', copyCopied2)

      copyReference = copyOriginal
      copyReference['city'] = '부산'
      print('원본 (참조 수정 후):', copyOriginal)

- id: practice
  title: 8일차 복습
  subtitle: 딕셔너리 기초 미션
  blocks:
  - type: text
    content: 8일차에서 배운 딕셔너리 개념을 복습하는 미션입니다. 딕셔너리 생성, 값 접근, 항목 추가/수정/제거 등을 종합적으로 연습해봅시다.
  - type: expansion
    title: "미션1: 딕셔너리 생성과 접근"
    code: |-
      student = {
          'name': '김철수',
          'age': 20,
          'major': '컴퓨터공학',
          'gpa': 3.8
      }
      print('학생 정보:', student)
      print('이름:', student['name'])
      print('학점:', student.get('gpa'))
      print('전화번호:', student.get('phone', '없음'))
  - type: expansion
    title: "미션2: 항목 추가와 수정"
    code: |-
      product = {'name': '노트북', 'price': 1500000}
      print('초기:', product)
      product['stock'] = 50
      product['category'] = '전자기기'
      print('추가 후:', product)
      product['price'] = 1400000
      print('가격 수정:', product)
  - type: expansion
    title: "미션3: update() 메서드"
    code: |-
      person = {'name': '이영희'}
      print('초기:', person)
      person.update({'age': 25, 'city': '서울'})
      print('딕셔너리로 업데이트:', person)
      person.update(job='디자이너', hobby='그림')
      print('키워드로 업데이트:', person)
  - type: expansion
    title: "미션4: 항목 제거"
    code: |-
      data = {'a': 1, 'b': 2, 'c': 3, 'd': 4}
      print('초기:', data)
      removedB = data.pop('b')
      print('pop b:', removedB, '남은:', data)
      lastItem = data.popitem()
      print('popitem:', lastItem, '남은:', data)
      del data['a']
      print('del a 후:', data)
  - type: expansion
    title: "미션5: keys(), values(), items()"
    code: |-
      scores = {'국어': 90, '영어': 85, '수학': 95}
      print('키:', list(scores.keys()))
      print('값:', list(scores.values()))
      print('아이템:', list(scores.items()))
      print('합계:', sum(scores.values()))
      print('평균:', sum(scores.values()) / len(scores))
  - type: expansion
    title: "미션6: 멤버십 테스트와 get()"
    code: |-
      config = {'debug': True, 'port': 8080}
      print('debug 존재:', 'debug' in config)
      print('host 존재:', 'host' in config)
      host = config.get('host', 'localhost')
      print('host 값:', host)
      timeout = config.get('timeout', 30)
      print('timeout 값:', timeout)
  - type: expansion
    title: "미션7: 딕셔너리 복사"
    code: |-
      original = {'x': 10, 'y': 20}
      copied = original.copy()
      copied['z'] = 30
      print('원본:', original)
      print('복사본:', copied)
      print('원본 길이:', len(original))
      print('복사본 길이:', len(copied))
