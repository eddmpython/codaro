sections:
- id: step01_empty_class
  title: '1단계: 빈 클래스 만들기'
  subtitle: 클래스의 첫걸음
  blocks:
  - type: code
    language: python
    title: 가장 간단한 클래스 정의하기
    description: 클래스는 'class 클래스명:' 형태로 정의합니다. 클래스명은 대문자로 시작하는 PascalCase를 사용하는 것이 관례입니다. 빈 클래스라도 pass 키워드를 사용해야 합니다.
    content: "# 가장 간단한 빈 클래스\nclass Dog:\n    pass\n\n# 클래스명은 PascalCase 사용\nclass MyFirstClass:\n    pass\n\nclass BankAccount:\n    pass\n\n# 클래스가 정의되었는지 확인\nprint(Dog)  # <class '__main__.Dog'>\nprint(type(Dog))  # <type 'type'>\n\nprint(\"✅ 클래스 정의 완료!\")"
- id: step02_create_object
  title: '2단계: 객체 생성하기'
  subtitle: 클래스로부터 인스턴스 만들기
  blocks:
  - type: code
    language: python
    title: 클래스로 객체(인스턴스) 생성하기
    description: 클래스명()을 호출하면 그 클래스의 인스턴스(객체)가 생성됩니다. 하나의 클래스로 여러 개의 서로 다른 객체를 만들 수 있습니다. 각 객체는 메모리상에서 독립적인 공간을 차지합니다.
    content: "class Dog:\n    pass\n\n# 객체(인스턴스) 생성\ndog1 = Dog()\ndog2 = Dog() \ndog3 = Dog()\n\n# 각각 다른 객체임을 확인\nprint(f\"dog1: {dog1}\")  # <__main__.Dog object at 0x...>\nprint(f\"dog2: {dog2}\")  # <__main__.Dog object at 0x...>\nprint(f\"dog3: {dog3}\")  # <__main__.Dog object at 0x...>\n\n# 메모리 주소 확인 (모두 다름)\nprint(f\"dog1 주소: {id(dog1)}\")\nprint(f\"dog2 주소: {id(dog2)}\")\nprint(f\"dog3 주소: {id(dog3)}\")\n\n# 타입 확인\nprint(f\"dog1의 타입: {type(dog1)}\")  # <class '__main__.Dog'>\n\nprint(\"✅ 독립적인 3개의 Dog 객체 생성 완료!\")"
- id: step03_class_attribute
  title: '3단계: 클래스 속성 추가하기'
  subtitle: 모든 인스턴스가 공유하는 속성
  blocks:
  - type: code
    language: python
    title: 클래스 속성 정의하고 사용하기
    description: 클래스 속성은 클래스 정의 안에 직접 변수를 선언하여 만듭니다. 모든 인스턴스가 동일한 값을 공유하며, 클래스명.속성명 또는 인스턴스.속성명으로 접근할 수 있습니다.
    content: "class Dog:\n    # 클래스 속성 (모든 인스턴스가 공유)\n    species = \"Canis lupus\"  # 종\n    legs = 4                 # 다리 개수\n    has_tail = True         # 꼬리 유무\n\n# 객체 생성\ndog1 = Dog()\ndog2 = Dog()\n\n# 클래스 속성 접근 방법 1: 클래스명으로 접근\nprint(f\"개의 종: {Dog.species}\")\nprint(f\"다리 개수: {Dog.legs}\")\n\n# 클래스 속성 접근 방법 2: 인스턴스로 접근 \nprint(f\"dog1의 종: {dog1.species}\")\nprint(f\"dog2의 종: {dog2.species}\")\n\n# 모든 인스턴스가 같은 값을 공유함\nprint(f\"dog1과 dog2의 species 같나? {dog1.species == dog2.species}\")\n\n# 클래스 속성 변경 (모든 인스턴스에 영향)\nDog.legs = 3\nprint(f\"변경 후 dog1 다리: {dog1.legs}\")  # 3\nprint(f\"변경 후 dog2 다리: {dog2.legs}\")  # 3\n\nprint(\"✅ 클래스 속성 공유 확인 완료!\")"
- id: step04_init_basic
  title: '4단계: __init__ 메서드 기초'
  subtitle: 객체 생성자 만들기
  blocks:
  - type: code
    language: python
    title: __init__ 생성자 메서드 정의하기
    description: __init__은 객체가 생성될 때 자동으로 호출되는 특별한 메서드입니다. 생성자라고 부르며, 객체의 초기 상태를 설정하는 역할을 합니다. self는 생성되는 인스턴스 자신을 가리킵니다.
    content: "class Dog:\n    def __init__(self):\n        \"\"\"생성자 메서드: 객체 생성 시 자동 호출됨\"\"\"\n        print(\"\U0001F415 새로운 강아지가 태어났습니다!\")\n        print(\"__init__ 메서드가 자동으로 실행되었습니다\")\n\n# 객체 생성 시 __init__이 자동 호출됨\nprint(\"=== 첫 번째 강아지 생성 ===\")\ndog1 = Dog()  # __init__ 자동 호출\n\nprint(\"\\n=== 두 번째 강아지 생성 ===\") \ndog2 = Dog()  # __init__ 자동 호출\n\nprint(\"\\n=== 세 번째 강아지 생성 ===\")\ndog3 = Dog()  # __init__ 자동 호출\n\nprint(\"\\n✅ 총 3마리의 강아지가 생성되었습니다!\")\nprint(\"각 객체 생성 시마다 __init__이 자동으로 실행되었습니다.\")"
- id: step05_self_parameter
  title: '5단계: self 매개변수 이해하기'
  subtitle: self가 무엇인지 완전히 파악하기
  blocks:
  - type: code
    language: python
    title: self 매개변수의 정체 알아보기
    description: self는 현재 생성되는(또는 메서드를 호출하는) 인스턴스 자기 자신을 가리키는 매개변수입니다. 메서드 호출 시 파이썬이 자동으로 첫 번째 인자로 전달하며, 이를 통해 인스턴스의 속성과 메서드에 접근할 수 있습니다.
    content: "class Dog:\n    def __init__(self):\n        print(f\"self의 정체: {self}\")\n        print(f\"self의 타입: {type(self)}\")\n        print(f\"self의 ID: {id(self)}\")\n        print(\"---\")\n\n# 객체 생성하면서 self 확인\nprint(\"=== 첫 번째 강아지 ===\")\ndog1 = Dog()\nprint(f\"dog1 객체: {dog1}\")\nprint(f\"dog1의 ID: {id(dog1)}\")\nprint(f\"self와 dog1이 같은가? {id(dog1)}\")  \n\nprint(\"\\n=== 두 번째 강아지 ===\")\ndog2 = Dog()\nprint(f\"dog2 객체: {dog2}\")\nprint(f\"dog2의 ID: {id(dog2)}\")\n\nprint(\"\\n=== 결론 ===\")\nprint(\"✅ self는 현재 생성되는 인스턴스 자기 자신입니다!\")\nprint(\"✅ dog1을 만들 때의 self = dog1\")\nprint(\"✅ dog2를 만들 때의 self = dog2\")\nprint(\"✅ 각각 다른 객체이므로 self도 다릅니다!\")"
- id: step06_instance_attribute
  title: '6단계: 인스턴스 속성 만들기'
  subtitle: 각 객체가 개별적으로 가지는 속성
  blocks:
  - type: code
    language: python
    title: self를 이용해 인스턴스 속성 정의하기
    description: 인스턴스 속성은 self.속성명 = 값 형태로 정의합니다. 각 객체마다 독립적인 값을 가지며, 생성자에서 초기값을 설정할 수 있습니다. 클래스 속성과 달리 객체마다 다른 값을 가질 수 있습니다.
    content: "class Dog:\n    def __init__(self):\n        # 인스턴스 속성 정의 (각 객체마다 개별)\n        self.name = \"이름없음\"\n        self.age = 0\n        self.color = \"갈색\"\n        self.is_hungry = True\n        \n        print(f\"\U0001F415 강아지가 태어났습니다!\")\n        print(f\"  이름: {self.name}\")\n        print(f\"  나이: {self.age}살\")\n        print(f\"  색깔: {self.color}\")\n        print(f\"  배고픔: {self.is_hungry}\")\n\n# 첫 번째 강아지 생성\nprint(\"=== 첫 번째 강아지 ===\")\ndog1 = Dog()\n\n# 두 번째 강아지 생성  \nprint(\"\\n=== 두 번째 강아지 ===\")\ndog2 = Dog()\n\n# 속성에 접근해보기\nprint(\"\\n=== 속성 접근 ===\")\nprint(f\"dog1 이름: {dog1.name}\")\nprint(f\"dog1 나이: {dog1.age}\")\nprint(f\"dog2 이름: {dog2.name}\")\nprint(f\"dog2 나이: {dog2.age}\")\n\n# 각 객체의 속성을 다르게 변경\ndog1.name = \"멍멍이\"\ndog1.age = 3\ndog2.name = \"바둑이\"  \ndog2.age = 5\n\nprint(\"\\n=== 변경 후 ===\")\nprint(f\"dog1: {dog1.name}, {dog1.age}살\")\nprint(f\"dog2: {dog2.name}, {dog2.age}살\")\nprint(\"✅ 각 객체가 독립적인 속성을 가집니다!\")"
- id: step07_init_parameters
  title: '7단계: __init__에 매개변수 추가하기'
  subtitle: 객체 생성 시 값 전달받기
  blocks:
  - type: code
    language: python
    title: 생성자에 매개변수로 초기값 받기
    description: __init__ 메서드에 매개변수를 추가하면 객체 생성 시 값을 전달받을 수 있습니다. 이를 통해 각 객체마다 다른 초기값을 설정할 수 있어 더욱 유연한 객체 생성이 가능합니다.
    content: "class Dog:\n    def __init__(self, name, age, color):\n        \"\"\"매개변수를 받는 생성자\"\"\"\n        print(f\"\U0001F415 {name} 강아지를 생성합니다...\")\n        \n        # 매개변수로 받은 값으로 인스턴스 속성 초기화\n        self.name = name\n        self.age = age  \n        self.color = color\n        self.is_hungry = True  # 기본값\n        \n        print(f\"✅ {self.name} 생성 완료!\")\n        print(f\"  나이: {self.age}살\")\n        print(f\"  색깔: {self.color}\")\n\n# 매개변수를 전달하며 객체 생성\nprint(\"=== 다양한 강아지들 생성 ===\")\ndog1 = Dog(\"멍멍이\", 3, \"갈색\")\nprint()\n\ndog2 = Dog(\"바둑이\", 5, \"흰색\") \nprint()\n\ndog3 = Dog(\"초코\", 1, \"검은색\")\nprint()\n\n# 각 객체의 속성 확인\nprint(\"=== 생성된 강아지들 정보 ===\")\ndogs = [dog1, dog2, dog3]\nfor i, dog in enumerate(dogs, 1):\n    print(f\"{i}. 이름: {dog.name}, 나이: {dog.age}살, 색깔: {dog.color}\")\n\nprint(\"\\n✅ 매개변수로 다양한 강아지들을 생성했습니다!\")"
- id: step08_instance_method
  title: '8단계: 인스턴스 메서드 만들기'
  subtitle: 객체가 할 수 있는 행동 정의하기
  blocks:
  - type: code
    language: python
    title: 객체의 행동을 메서드로 정의하기
    description: 인스턴스 메서드는 객체가 수행할 수 있는 행동이나 기능을 정의합니다. 첫 번째 매개변수로 반드시 self를 받아야 하며, 이를 통해 인스턴스의 속성에 접근하고 조작할 수 있습니다.
    content: "class Dog:\n    def __init__(self, name, age):\n        self.name = name\n        self.age = age\n        self.energy = 100  # 에너지 (0~100)\n        self.happiness = 50  # 행복도 (0~100)\n    \n    def bark(self):\n        \"\"\"짖기 메서드\"\"\"\n        print(f\"\U0001F415 {self.name}: 멍멍!\")\n        self.energy -= 5  # 짖으면 에너지 소모\n        return \"멍멍!\"\n    \n    def eat(self):\n        \"\"\"먹기 메서드\"\"\" \n        print(f\"\U0001F356 {self.name}이(가) 맛있게 먹고 있습니다\")\n        self.energy += 20  # 먹으면 에너지 회복\n        self.happiness += 10  # 행복도 증가\n        \n        # 최대값 제한\n        if self.energy > 100:\n            self.energy = 100\n        if self.happiness > 100:\n            self.happiness = 100\n    \n    def sleep(self):\n        \"\"\"잠자기 메서드\"\"\"\n        print(f\"\U0001F634 {self.name}이(가) 잠을 자고 있습니다...\")\n        self.energy = 100  # 에너지 완전 회복\n        print(f\"\U0001F4A4 {self.name}이(가) 개운하게 일어났습니다!\")\n    \n    def show_status(self):\n        \"\"\"상태 확인 메서드\"\"\"\
      \n        print(f\"\U0001F4CA {self.name}의 현재 상태\")\n        print(f\"  \U0001F50B 에너지: {self.energy}/100\")\n        print(f\"  \U0001F60A 행복도: {self.happiness}/100\")\n\n# 강아지 생성\ndog = Dog(\"멍멍이\", 3)\n\n# 메서드 호출해보기\nprint(\"=== 강아지와 놀아보기 ===\")\ndog.show_status()\nprint()\n\ndog.bark()\ndog.bark()\nprint()\n\ndog.show_status()\nprint()\n\ndog.eat()\nprint()\n\ndog.show_status()\nprint()\n\ndog.sleep()\nprint()\n\ndog.show_status()\n\nprint(\"\\n✅ 메서드를 통해 객체의 상태가 변경되었습니다!\")"
- id: step09_method_parameters
  title: '9단계: 메서드에 매개변수 추가하기'
  subtitle: 메서드에 값 전달하기
  blocks:
  - type: code
    language: python
    title: 메서드에 매개변수를 추가하여 유연하게 만들기
    description: 메서드에 매개변수를 추가하면 호출할 때마다 다른 값을 전달할 수 있습니다. self 다음에 원하는 매개변수들을 정의하고, 메서드 호출 시 해당 값들을 전달합니다.
    content: "class BankAccount:\n    def __init__(self, owner, initial_balance):\n        self.owner = owner\n        self.balance = initial_balance\n        self.transaction_history = []\n    \n    def deposit(self, amount):\n        \"\"\"입금 메서드 - amount 매개변수\"\"\"\n        if amount <= 0:\n            print(\"❌ 입금액은 0보다 커야 합니다\")\n            return False\n        \n        self.balance += amount\n        self.transaction_history.append(f\"입금: +{amount:,}원\")\n        print(f\"\U0001F4B0 {amount:,}원이 입금되었습니다\")\n        print(f\"\U0001F4B3 현재 잔액: {self.balance:,}원\")\n        return True\n    \n    def withdraw(self, amount):\n        \"\"\"출금 메서드 - amount 매개변수\"\"\"\n        if amount <= 0:\n            print(\"❌ 출금액은 0보다 커야 합니다\")\n            return False\n        \n        if amount > self.balance:\n            print(f\"❌ 잔액 부족! 현재 잔액: {self.balance:,}원\")\n            return False\n        \n        self.balance -= amount\n        self.transaction_history.append(f\"출금: -{amount:,}원\"\
      )\n        print(f\"\U0001F4B8 {amount:,}원이 출금되었습니다\")\n        print(f\"\U0001F4B3 현재 잔액: {self.balance:,}원\")\n        return True\n    \n    def transfer(self, target_account, amount):\n        \"\"\"이체 메서드 - 두 개의 매개변수\"\"\"\n        print(f\"\U0001F504 {self.owner} → {target_account.owner} 이체 시작\")\n        \n        if self.withdraw(amount):  # 내 계좌에서 출금\n            target_account.deposit(amount)  # 상대 계좌에 입금\n            print(f\"✅ 이체 완료!\")\n        else:\n            print(\"❌ 이체 실패!\")\n    \n    def show_info(self):\n        \"\"\"계좌 정보 출력\"\"\"\n        print(f\"\\n\U0001F464 계좌주: {self.owner}\")\n        print(f\"\U0001F4B0 잔액: {self.balance:,}원\") \n        print(f\"\U0001F4DC 최근 거래내역:\")\n        for transaction in self.transaction_history[-3:]:  # 최근 3건\n            print(f\"  - {transaction}\")\n\n# 계좌 생성\naccount1 = BankAccount(\"김철수\", 100000)\naccount2 = BankAccount(\"이영희\", 50000)\n\n# 매개변수와 함께 메서드 호출\nprint(\"=== 은행 거래 시뮬레이션 ===\")\naccount1.show_info()\naccount2.show_info()\n\
      \nprint(\"\\n=== 거래 시작 ===\")\naccount1.deposit(30000)    # 매개변수: 30000\naccount1.withdraw(20000)   # 매개변수: 20000\naccount1.transfer(account2, 25000)  # 매개변수: account2, 25000\n\nprint(\"\\n=== 거래 후 상태 ===\")\naccount1.show_info()\naccount2.show_info()\n\nprint(\"\\n✅ 매개변수를 통해 다양한 값으로 메서드를 호출했습니다!\")"
- id: step10_str_method
  title: '10단계: __str__ 메서드 만들기'
  subtitle: 객체를 문자열로 표현하기
  blocks:
  - type: code
    language: python
    title: __str__ 특별 메서드로 객체 표현하기
    description: __str__ 메서드는 객체를 print() 할 때나 str() 함수로 변환할 때 호출되는 특별한 메서드입니다. 이 메서드를 정의하면 객체를 사람이 읽기 쉬운 형태로 표현할 수 있습니다.
    content: "class Person:\n    def __init__(self, name, age, job):\n        self.name = name\n        self.age = age\n        self.job = job\n    \n    def __str__(self):\n        \"\"\"객체를 문자열로 표현하는 특별 메서드\"\"\"\n        return f\"Person(이름: {self.name}, 나이: {self.age}세, 직업: {self.job})\"\n\nclass Book:\n    def __init__(self, title, author, price):\n        self.title = title\n        self.author = author  \n        self.price = price\n    \n    def __str__(self):\n        \"\"\"책 정보를 보기 좋게 표현\"\"\"\n        return f\"\U0001F4DA '{self.title}' - {self.author} 저 (₩{self.price:,})\"\n\n# __str__ 없는 클래스와 비교\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n    # __str__ 메서드 없음\n\n# 객체 생성\nperson = Person(\"김철수\", 30, \"개발자\")\nbook = Book(\"파이썬 완전정복\", \"홍길동\", 25000)\nanimal = Animal(\"고양이\")\n\nprint(\"=== __str__ 메서드 효과 비교 ===\")\n\n# __str__ 있는 경우 (보기 좋게 출력)\nprint(\"\U0001F4CB __str__ 정의된 객체들:\")\nprint(person)  # __str__ 메서드 호출\nprint(book)    # __str__ 메서드\
      \ 호출\n\nprint(\"\\n\U0001F4CB __str__ 없는 객체:\")\nprint(animal)  # 기본 표현: <__main__.Animal object at 0x...>\n\nprint(\"\\n=== str() 함수와 함께 사용 ===\")\nperson_str = str(person)\nprint(f\"문자열 변환: {person_str}\")\n\nprint(\"\\n=== f-string에서 자동 호출 ===\")\nprint(f\"소개: 안녕하세요, {person}입니다!\")\nprint(f\"추천도서: {book}를 읽어보세요!\")\n\nprint(\"\\n✅ __str__ 메서드로 객체를 보기 좋게 표현했습니다!\")"
- id: step11_property_basic
  title: '11단계: @property 기초'
  subtitle: 메서드를 속성처럼 사용하기
  blocks:
  - type: code
    language: python
    title: '@property 데코레이터로 계산된 속성 만들기'
    description: '@property 데코레이터를 사용하면 메서드를 속성처럼 접근할 수 있습니다. 값을 계산해서 반환하거나, 다른 속성들을 조합한 가상의 속성을 만들 때 유용합니다. 괄호 없이 속성처럼 접근할 수 있습니다.'
    content: "class Rectangle:\n    def __init__(self, width, height):\n        self.width = width\n        self.height = height\n    \n    @property\n    def area(self):\n        \"\"\"넓이를 계산하는 프로퍼티\"\"\"\n        return self.width * self.height\n    \n    @property \n    def perimeter(self):\n        \"\"\"둘레를 계산하는 프로퍼티\"\"\"\n        return 2 * (self.width + self.height)\n    \n    @property\n    def diagonal(self):\n        \"\"\"대각선 길이를 계산하는 프로퍼티\"\"\"\n        return (self.width ** 2 + self.height ** 2) ** 0.5\n    \n    def __str__(self):\n        return f\"Rectangle({self.width} x {self.height})\"\n\nclass Person:\n    def __init__(self, first_name, last_name, birth_year):\n        self.first_name = first_name\n        self.last_name = last_name\n        self.birth_year = birth_year\n    \n    @property\n    def full_name(self):\n        \"\"\"전체 이름을 반환하는 프로퍼티\"\"\"\n        return f\"{self.first_name} {self.last_name}\"\n    \n    @property\n    def age(self):\n        \"\"\"현재\
      \ 나이를 계산하는 프로퍼티\"\"\"\n        from datetime import datetime\n        current_year = datetime.now().year\n        return current_year - self.birth_year\n\n# 사각형 테스트\nprint(\"=== 사각형 프로퍼티 테스트 ===\")\nrect = Rectangle(5, 3)\nprint(f\"사각형: {rect}\")\n\n# 프로퍼티 접근 (메서드지만 속성처럼 사용)\nprint(f\"넓이: {rect.area}\")        # 괄호 없이 접근\nprint(f\"둘레: {rect.perimeter}\")   # 메서드()가 아닌 속성처럼\nprint(f\"대각선: {rect.diagonal:.2f}\")\n\n# 기본 속성 변경하면 프로퍼티도 자동 변경\nrect.width = 10\nrect.height = 4\nprint(f\"\\n변경 후 - 사각형: {rect}\")\nprint(f\"변경 후 넓이: {rect.area}\")\nprint(f\"변경 후 둘레: {rect.perimeter}\")\n\n# 사람 테스트  \nprint(\"\\n=== 사람 프로퍼티 테스트 ===\")\nperson = Person(\"김\", \"철수\", 1990)\nprint(f\"이름: {person.first_name} {person.last_name}\")\nprint(f\"전체 이름: {person.full_name}\")  # 프로퍼티로 접근\nprint(f\"출생년도: {person.birth_year}년\")\nprint(f\"나이: {person.age}세\")  # 계산된 프로퍼티\n\nprint(\"\\n✅ @property로 계산된 속성들을 만들었습니다!\")\nprint(\"✅ 메서드지만 속성처럼 간편하게 접근할 수 있습니다!\")"
- id: step12_property_setter
  title: '12단계: @property setter 만들기'
  subtitle: 속성값 설정 시 유효성 검증하기
  blocks:
  - type: code
    language: python
    title: '@속성명.setter로 속성 설정 제어하기'
    description: '@property와 함께 @속성명.setter를 사용하면 속성값이 설정될 때 유효성 검증이나 추가 로직을 수행할 수 있습니다. 잘못된 값이 설정되는 것을 방지하고 데이터 무결성을 보장할 수 있습니다.'
    content: "class Temperature:\n    def __init__(self, celsius=0):\n        self._celsius = 0  # 내부 저장용 (_private)\n        self.celsius = celsius  # setter를 통해 설정\n    \n    @property\n    def celsius(self):\n        \"\"\"섭씨온도 getter\"\"\"\n        return self._celsius\n    \n    @celsius.setter\n    def celsius(self, value):\n        \"\"\"섭씨온도 setter - 유효성 검증\"\"\"\n        if value < -273.15:\n            raise ValueError(\"절대영도(-273.15°C) 이하는 불가능합니다!\")\n        if value > 1000:\n            raise ValueError(\"1000°C 이상은 너무 뜨겁습니다!\")\n        \n        self._celsius = value\n        print(f\"\U0001F321️ 온도가 {value}°C로 설정되었습니다\")\n    \n    @property\n    def fahrenheit(self):\n        \"\"\"화씨온도 getter (계산)\"\"\"\n        return self._celsius * 9/5 + 32\n    \n    @fahrenheit.setter  \n    def fahrenheit(self, value):\n        \"\"\"화씨온도 setter - 섭씨로 변환하여 저장\"\"\"\n        celsius_value = (value - 32) * 5/9\n        self.celsius = celsius_value  # celsius setter 호출\n    \n    def\
      \ __str__(self):\n        return f\"\U0001F321️ {self.celsius}°C ({self.fahrenheit:.1f}°F)\"\n\nclass Circle:\n    def __init__(self, radius):\n        self._radius = 0\n        self.radius = radius  # setter 호출\n    \n    @property\n    def radius(self):\n        \"\"\"반지름 getter\"\"\"\n        return self._radius\n    \n    @radius.setter\n    def radius(self, value):\n        \"\"\"반지름 setter - 유효성 검증\"\"\"\n        if value <= 0:\n            raise ValueError(\"반지름은 0보다 커야 합니다!\")\n        \n        self._radius = value\n        print(f\"\U0001F535 원의 반지름이 {value}로 설정되었습니다\")\n    \n    @property\n    def area(self):\n        \"\"\"넓이 계산\"\"\"\n        return 3.14159 * self._radius ** 2\n    \n    @property\n    def circumference(self):\n        \"\"\"둘레 계산\"\"\"\n        return 2 * 3.14159 * self._radius\n\n# 온도 테스트\nprint(\"=== 온도 setter 테스트 ===\")\ntemp = Temperature(25)\nprint(temp)\n\n# 정상 값 설정\ntemp.celsius = 100\nprint(f\"물의 끓는점: {temp}\")\n\ntemp.fahrenheit = 32  # 화씨 32도\
      \ = 섭씨 0도\nprint(f\"물의 어는점: {temp}\")\n\nprint(\"\\n=== 잘못된 값 테스트 ===\")\ntry:\n    temp.celsius = -300  # 절대영도 이하\nexcept ValueError as e:\n    print(f\"❌ 오류: {e}\")\n\ntry:\n    circle = Circle(-5)  # 음수 반지름\nexcept ValueError as e:\n    print(f\"❌ 오류: {e}\")\n\n# 원 테스트\nprint(\"\\n=== 원 setter 테스트 ===\")\ncircle = Circle(5)\nprint(f\"넓이: {circle.area:.2f}\")\nprint(f\"둘레: {circle.circumference:.2f}\")\n\n# 반지름 변경\ncircle.radius = 10\nprint(f\"변경 후 넓이: {circle.area:.2f}\")\n\nprint(\"\\n✅ setter를 통해 유효성 검증을 수행했습니다!\")\nprint(\"✅ 잘못된 값 설정을 방지할 수 있습니다!\")"
- id: step13_classmethod
  title: '13단계: @classmethod 만들기'
  subtitle: 클래스 전체와 관련된 메서드
  blocks:
  - type: code
    language: python
    title: '@classmethod로 클래스 레벨 메서드 만들기'
    description: 클래스 메서드는 @classmethod 데코레이터를 사용하며, 첫 번째 매개변수로 cls(클래스 자체)를 받습니다. 인스턴스를 생성하지 않고도 호출할 수 있으며, 주로 대안 생성자나 클래스 전체에 관련된 작업에 사용합니다.
    content: "class Person:\n    # 클래스 속성\n    population = 0\n    \n    def __init__(self, name, age):\n        self.name = name\n        self.age = age\n        Person.population += 1  # 인구 증가\n        print(f\"\U0001F464 {name}님이 등록되었습니다 (총 인구: {Person.population}명)\")\n    \n    @classmethod\n    def get_population(cls):\n        \"\"\"현재 인구 수 조회 - 클래스 메서드\"\"\"\n        return cls.population\n    \n    @classmethod\n    def from_birth_year(cls, name, birth_year):\n        \"\"\"출생년도로 객체 생성 - 대안 생성자\"\"\"\n        from datetime import datetime\n        current_year = datetime.now().year\n        age = current_year - birth_year\n        return cls(name, age)  # 클래스 생성자 호출\n    \n    @classmethod\n    def from_string(cls, person_string):\n        \"\"\"문자열로 객체 생성 - 대안 생성자\"\"\"\n        # \"이름-나이\" 형식의 문자열 파싱\n        name, age = person_string.split('-')\n        return cls(name.strip(), int(age.strip()))\n    \n    @classmethod\n    def reset_population(cls):\n        \"\"\"인구 수 초기화\"\
      \"\"\n        cls.population = 0\n        print(\"\U0001F504 인구 수가 초기화되었습니다\")\n    \n    def __str__(self):\n        return f\"Person({self.name}, {self.age}세)\"\n\nclass BankAccount:\n    # 클래스 속성\n    bank_name = \"파이썬 은행\"\n    interest_rate = 0.02\n    total_accounts = 0\n    \n    def __init__(self, owner, balance):\n        self.owner = owner\n        self.balance = balance\n        BankAccount.total_accounts += 1\n    \n    @classmethod\n    def get_bank_info(cls):\n        \"\"\"은행 정보 조회\"\"\"\n        return f\"\U0001F3E6 {cls.bank_name} (금리: {cls.interest_rate*100}%, 총 계좌: {cls.total_accounts}개)\"\n    \n    @classmethod\n    def set_interest_rate(cls, new_rate):\n        \"\"\"전체 은행 금리 변경\"\"\"\n        old_rate = cls.interest_rate\n        cls.interest_rate = new_rate\n        print(f\"\U0001F4B9 금리 변경: {old_rate*100}% → {new_rate*100}%\")\n    \n    @classmethod\n    def create_vip_account(cls, owner, initial_deposit):\n        \"\"\"VIP 계좌 생성 - 대안 생성자\"\"\"\n       \
      \ account = cls(owner, initial_deposit)\n        account.account_type = \"VIP\"\n        account.vip_benefits = [\"수수료 면제\", \"우대 금리\", \"전용 상담사\"]\n        print(f\"⭐ VIP 계좌가 생성되었습니다: {owner}\")\n        return account\n\n# Person 클래스 테스트\nprint(\"=== Person 클래스 메서드 테스트 ===\")\n\n# 인스턴스 생성 없이 클래스 메서드 호출\nprint(f\"초기 인구: {Person.get_population()}명\")\n\n# 일반 생성자로 객체 생성\nperson1 = Person(\"김철수\", 30)\nperson2 = Person(\"이영희\", 25)\n\n# 클래스 메서드로 인구 조회\nprint(f\"현재 인구: {Person.get_population()}명\")\n\n# 대안 생성자 사용\nprint(\"\\n=== 대안 생성자 테스트 ===\")\nperson3 = Person.from_birth_year(\"박민수\", 1995)  # 출생년도로 생성\nperson4 = Person.from_string(\"최지은 - 28\")       # 문자열로 생성\n\nprint(f\"최종 인구: {Person.get_population()}명\")\n\n# 은행 계좌 테스트\nprint(\"\\n=== BankAccount 클래스 메서드 테스트 ===\")\nprint(BankAccount.get_bank_info())\n\naccount1 = BankAccount(\"김철수\", 100000)\naccount2 = BankAccount(\"이영희\", 200000)\n\nprint(BankAccount.get_bank_info())\n\n# 금리 변경\nBankAccount.set_interest_rate(0.025)\n\n# VIP\
      \ 계좌 생성\nvip_account = BankAccount.create_vip_account(\"박부자\", 1000000)\nprint(f\"VIP 혜택: {vip_account.vip_benefits}\")\n\nprint(\"\\n✅ 클래스 메서드로 클래스 레벨 작업을 수행했습니다!\")"
- id: step14_staticmethod
  title: '14단계: @staticmethod 만들기'
  subtitle: 독립적인 유틸리티 함수
  blocks:
  - type: code
    language: python
    title: '@staticmethod로 독립적인 함수 만들기'
    description: 정적 메서드는 @staticmethod 데코레이터를 사용하며, self나 cls 매개변수를 받지 않습니다. 클래스나 인스턴스 상태에 의존하지 않는 독립적인 유틸리티 함수로 사용됩니다. 클래스와 논리적으로 관련은 있지만 독립적으로 동작합니다.
    content: "class MathUtils:\n    \"\"\"수학 유틸리티 클래스\"\"\"\n    \n    @staticmethod\n    def add(a, b):\n        \"\"\"덧셈 - 정적 메서드\"\"\"\n        return a + b\n    \n    @staticmethod\n    def multiply(a, b):\n        \"\"\"곱셈 - 정적 메서드\"\"\"\n        return a * b\n    \n    @staticmethod\n    def is_prime(number):\n        \"\"\"소수 판별 - 정적 메서드\"\"\"\n        if number < 2:\n            return False\n        for i in range(2, int(number ** 0.5) + 1):\n            if number % i == 0:\n                return False\n        return True\n    \n    @staticmethod\n    def factorial(n):\n        \"\"\"팩토리얼 계산 - 정적 메서드\"\"\"\n        if n <= 1:\n            return 1\n        return n * MathUtils.factorial(n - 1)\n    \n    @staticmethod\n    def fibonacci(n):\n        \"\"\"피보나치 수열 - 정적 메서드\"\"\"\n        if n <= 1:\n            return n\n        return MathUtils.fibonacci(n-1) + MathUtils.fibonacci(n-2)\n\nclass StringUtils:\n    \"\"\"문자열 유틸리티 클래스\"\"\"\n    \n    @staticmethod\n    def reverse_string(text):\n\
      \        \"\"\"문자열 뒤집기\"\"\"\n        return text[::-1]\n    \n    @staticmethod\n    def count_vowels(text):\n        \"\"\"모음 개수 세기\"\"\"\n        vowels = 'aeiouAEIOU'\n        return sum(1 for char in text if char in vowels)\n    \n    @staticmethod\n    def is_palindrome(text):\n        \"\"\"회문 검사\"\"\"\n        cleaned = ''.join(char.lower() for char in text if char.isalnum())\n        return cleaned == cleaned[::-1]\n    \n    @staticmethod\n    def capitalize_words(text):\n        \"\"\"각 단어의 첫 글자를 대문자로\"\"\"\n        return ' '.join(word.capitalize() for word in text.split())\n\nclass DateUtils:\n    \"\"\"날짜 유틸리티 클래스\"\"\"\n    \n    @staticmethod\n    def is_leap_year(year):\n        \"\"\"윤년 판별\"\"\"\n        return year % 4 == 0 and (year % 100 != 0 or year % 400 == 0)\n    \n    @staticmethod\n    def days_in_month(year, month):\n        \"\"\"해당 년월의 일수\"\"\"\n        days_per_month = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]\n        if month == 2 and DateUtils.is_leap_year(year):\n\
      \            return 29\n        return days_per_month[month - 1]\n    \n    @staticmethod\n    def format_date(year, month, day):\n        \"\"\"날짜 포맷팅\"\"\"\n        return f\"{year:04d}-{month:02d}-{day:02d}\"\n\n# 정적 메서드 테스트 (인스턴스 생성 없이 사용)\nprint(\"=== MathUtils 정적 메서드 테스트 ===\")\nprint(f\"5 + 3 = {MathUtils.add(5, 3)}\")\nprint(f\"4 * 7 = {MathUtils.multiply(4, 7)}\")\nprint(f\"17은 소수인가? {MathUtils.is_prime(17)}\")\nprint(f\"5! = {MathUtils.factorial(5)}\")\nprint(f\"피보나치(10) = {MathUtils.fibonacci(10)}\")\n\nprint(\"\\n=== StringUtils 정적 메서드 테스트 ===\")\ntext = \"Hello World\"\nprint(f\"원문: {text}\")\nprint(f\"뒤집기: {StringUtils.reverse_string(text)}\")\nprint(f\"모음 개수: {StringUtils.count_vowels(text)}\")\nprint(f\"회문인가? {StringUtils.is_palindrome('A man a plan a canal Panama')}\")\nprint(f\"단어 첫글자 대문자: {StringUtils.capitalize_words('hello python world')}\")\n\nprint(\"\\n=== DateUtils 정적 메서드 테스트 ===\")\nyear = 2024\nprint(f\"{year}년은 윤년인가? {DateUtils.is_leap_year(year)}\")\nprint(f\"\
      {year}년 2월 일수: {DateUtils.days_in_month(year, 2)}일\")\nprint(f\"날짜 포맷: {DateUtils.format_date(2024, 3, 15)}\")\n\nprint(\"\\n=== 클래스명으로 직접 호출 ===\")\n# 인스턴스 생성 없이 바로 사용 가능\nresult1 = MathUtils.add(10, 20)\nresult2 = StringUtils.reverse_string(\"Python\")\nresult3 = DateUtils.is_leap_year(2000)\n\nprint(f\"계산 결과: {result1}\")\nprint(f\"문자열 결과: {result2}\")\nprint(f\"날짜 결과: {result3}\")\n\nprint(\"\\n✅ 정적 메서드는 클래스/인스턴스와 독립적으로 동작합니다!\")\nprint(\"✅ 유틸리티 함수들을 클래스로 묶어 체계적으로 관리할 수 있습니다!\")"
- id: step15_inheritance_basic
  title: '15단계: 상속 기초'
  subtitle: 부모 클래스로부터 물려받기
  blocks:
  - type: code
    language: python
    title: 상속으로 코드 재사용하기
    description: '상속은 기존 클래스(부모/상위 클래스)의 속성과 메서드를 새로운 클래스(자식/하위 클래스)가 물려받는 기능입니다. class 자식클래스(부모클래스): 형태로 정의하며, 코드 재사용성과 계층 구조를 만들 수 있습니다.'
    content: "# 부모 클래스 정의\nclass Animal:\n    def __init__(self, name, species):\n        self.name = name\n        self.species = species\n        self.is_alive = True\n        print(f\"\U0001F43E {species} '{name}'이(가) 태어났습니다\")\n    \n    def eat(self):\n        print(f\"\U0001F37D️ {self.name}이(가) 먹고 있습니다\")\n    \n    def sleep(self):\n        print(f\"\U0001F634 {self.name}이(가) 잠을 자고 있습니다\")\n    \n    def make_sound(self):\n        print(f\"\U0001F50A {self.name}이(가) 소리를 냅니다\")\n    \n    def __str__(self):\n        return f\"{self.species} {self.name}\"\n\n# 자식 클래스 1: Dog (Animal을 상속)\nclass Dog(Animal):\n    def __init__(self, name, breed):\n        # 부모 클래스의 __init__ 호출\n        super().__init__(name, \"개\")\n        self.breed = breed  # 자식 클래스만의 속성\n        print(f\"\U0001F415 {breed} 품종입니다\")\n    \n    def make_sound(self):\n        \"\"\"부모 메서드 오버라이딩\"\"\"\n        print(f\"\U0001F415 {self.name}: 멍멍!\")\n    \n    def fetch(self):\n        \"\"\"자식 클래스만의 메서드\"\"\"\n     \
      \   print(f\"\U0001F3BE {self.name}이(가) 공을 가져옵니다\")\n\n# 자식 클래스 2: Cat (Animal을 상속)\nclass Cat(Animal):\n    def __init__(self, name, color):\n        super().__init__(name, \"고양이\")\n        self.color = color\n        print(f\"\U0001F431 {color} 색깔입니다\")\n    \n    def make_sound(self):\n        \"\"\"부모 메서드 오버라이딩\"\"\"\n        print(f\"\U0001F431 {self.name}: 야옹~\")\n    \n    def climb(self):\n        \"\"\"자식 클래스만의 메서드\"\"\"\n        print(f\"\U0001F333 {self.name}이(가) 나무를 탑니다\")\n\n# 자식 클래스 3: Bird (Animal을 상속)\nclass Bird(Animal):\n    def __init__(self, name, can_fly=True):\n        super().__init__(name, \"새\")\n        self.can_fly = can_fly\n        print(f\"\U0001F426 비행 가능: {can_fly}\")\n    \n    def make_sound(self):\n        \"\"\"부모 메서드 오버라이딩\"\"\"\n        print(f\"\U0001F426 {self.name}: 짹짹!\")\n    \n    def fly(self):\n        \"\"\"자식 클래스만의 메서드\"\"\"\n        if self.can_fly:\n            print(f\"\U0001FAB6 {self.name}이(가) 하늘을 날고 있습니다\")\n        else:\n   \
      \         print(f\"❌ {self.name}은(는) 날 수 없습니다\")\n\nprint(\"=== 상속 테스트 ===\")\n\n# 각 클래스의 객체 생성\ndog = Dog(\"멍멍이\", \"골든리트리버\")\ncat = Cat(\"야옹이\", \"검은색\")\nbird = Bird(\"짹짹이\", True)\n\nprint(\"\\n=== 상속받은 메서드 사용 ===\")\n# 모든 동물이 부모 클래스의 메서드를 사용할 수 있음\nanimals = [dog, cat, bird]\n\nfor animal in animals:\n    print(f\"\\n--- {animal} ---\")\n    animal.eat()     # 부모 클래스의 메서드\n    animal.sleep()   # 부모 클래스의 메서드\n    animal.make_sound()  # 각자 오버라이딩한 메서드\n\nprint(\"\\n=== 자식 클래스만의 메서드 ===\")\ndog.fetch()     # Dog만의 메서드\ncat.climb()     # Cat만의 메서드\nbird.fly()      # Bird만의 메서드\n\nprint(\"\\n=== isinstance() 확인 ===\")\nprint(f\"dog는 Dog 인스턴스인가? {isinstance(dog, Dog)}\")\nprint(f\"dog는 Animal 인스턴스인가? {isinstance(dog, Animal)}\")\nprint(f\"cat는 Dog 인스턴스인가? {isinstance(cat, Dog)}\")\nprint(f\"cat는 Animal 인스턴스인가? {isinstance(cat, Animal)}\")\n\nprint(\"\\n✅ 상속을 통해 코드를 재사용하고 계층 구조를 만들었습니다!\")\nprint(\"✅ 각 자식 클래스는 부모의 기능을 물려받으면서 고유한 기능도 가집니다!\")"
- id: step16_super_method
  title: '16단계: super() 메서드 활용'
  subtitle: 부모 클래스 메서드 호출하기
  blocks:
  - type: code
    language: python
    title: super()로 부모 클래스 기능 확장하기
    description: super() 함수는 자식 클래스에서 부모 클래스의 메서드를 호출할 때 사용합니다. 부모의 기능을 완전히 대체하지 않고 확장하거나, 부모의 초기화를 먼저 수행한 후 추가 작업을 할 때 유용합니다.
    content: "class Vehicle:\n    def __init__(self, brand, model, year):\n        self.brand = brand\n        self.model = model  \n        self.year = year\n        self.is_running = False\n        print(f\"\U0001F697 {year} {brand} {model} 차량이 생성되었습니다\")\n    \n    def start(self):\n        if not self.is_running:\n            self.is_running = True\n            print(f\"\U0001F525 {self.brand} {self.model} 시동이 켜졌습니다\")\n        else:\n            print(f\"⚠️ 이미 시동이 켜져 있습니다\")\n    \n    def stop(self):\n        if self.is_running:\n            self.is_running = False\n            print(f\"\U0001F6D1 {self.brand} {self.model} 시동이 꺼졌습니다\")\n        else:\n            print(f\"⚠️ 이미 시동이 꺼져 있습니다\")\n    \n    def get_info(self):\n        status = \"운행중\" if self.is_running else \"정지\"\n        return f\"{self.year} {self.brand} {self.model} (상태: {status})\"\n\nclass Car(Vehicle):\n    def __init__(self, brand, model, year, fuel_type):\n        # super()로 부모 클래스 초기화\n        super().__init__(brand,\
      \ model, year)\n        self.fuel_type = fuel_type\n        self.fuel = 100  # 연료량 (%)\n        print(f\"⛽ 연료 타입: {fuel_type}\")\n    \n    def start(self):\n        \"\"\"부모의 start 메서드를 확장\"\"\"\n        if self.fuel <= 0:\n            print(f\"⛽ 연료가 없어 시동을 걸 수 없습니다\")\n            return\n        \n        # 부모 클래스의 start 메서드 호출\n        super().start()\n        \n        # 자식 클래스만의 추가 로직\n        if self.is_running:\n            print(f\"\U0001F697 {self.fuel_type} 엔진이 작동중입니다\")\n    \n    def drive(self, distance):\n        if not self.is_running:\n            print(f\"❌ 먼저 시동을 켜주세요\")\n            return\n        \n        fuel_needed = distance * 0.1  # 거리당 연료 소모\n        if self.fuel < fuel_needed:\n            print(f\"⛽ 연료 부족! 현재: {self.fuel}%, 필요: {fuel_needed}%\")\n            return\n        \n        self.fuel -= fuel_needed\n        print(f\"\U0001F697 {distance}km 운행 완료. 남은 연료: {self.fuel:.1f}%\")\n\nclass ElectricCar(Car):\n    def __init__(self, brand, model, year,\
      \ battery_capacity):\n        # super()로 부모(Car) 초기화, fuel_type은 '전기'로 설정\n        super().__init__(brand, model, year, \"전기\")\n        self.battery_capacity = battery_capacity\n        self.charge_level = 100  # 배터리 충전량 (%)\n        print(f\"\U0001F50B 배터리 용량: {battery_capacity}kWh\")\n    \n    def start(self):\n        \"\"\"부모의 start 메서드를 다시 확장\"\"\"\n        if self.charge_level <= 0:\n            print(f\"\U0001F50B 배터리가 없어 시동을 걸 수 없습니다\")\n            return\n        \n        # Vehicle의 start 메서드 호출 (Car의 start는 건너뛰기)\n        Vehicle.start(self)  # 또는 super(Car, self).start()\n        \n        if self.is_running:\n            print(f\"⚡ 전기 모터가 작동중입니다 (배터리: {self.charge_level}%)\")\n    \n    def charge(self, amount):\n        \"\"\"전기차만의 메서드\"\"\"\n        old_charge = self.charge_level\n        self.charge_level = min(100, self.charge_level + amount)\n        print(f\"\U0001F50C 충전 완료: {old_charge}% → {self.charge_level}%\")\n    \n    def get_info(self):\n        \"\"\"\
      부모의 get_info 메서드 확장\"\"\"\n        # 부모의 정보 가져오기\n        base_info = super().get_info()\n        # 전기차 특화 정보 추가\n        return f\"{base_info}, 배터리: {self.charge_level}%, 용량: {self.battery_capacity}kWh\"\n\nprint(\"=== super() 메서드 활용 테스트 ===\")\n\n# 일반 자동차\nprint(\"\\n--- 일반 자동차 ---\")\ncar = Car(\"현대\", \"소나타\", 2023, \"가솔린\")\nprint(car.get_info())\ncar.start()\ncar.drive(50)\ncar.stop()\n\n# 전기 자동차\nprint(\"\\n--- 전기 자동차 ---\")\ntesla = ElectricCar(\"Tesla\", \"Model 3\", 2024, 75)\nprint(tesla.get_info())\ntesla.start()\ntesla.drive(100)\ntesla.charge(20)\ntesla.stop()\n\nprint(\"\\n=== 메서드 해상도 순서 (MRO) ===\")\nprint(f\"ElectricCar MRO: {ElectricCar.__mro__}\")\n\nprint(\"\\n✅ super()를 통해 부모 클래스의 기능을 확장했습니다!\")\nprint(\"✅ 코드 중복 없이 기존 기능을 재사용하면서 새로운 기능을 추가했습니다!\")"
- id: step17_polymorphism
  title: '17단계: 다형성 이해하기'
  subtitle: 같은 인터페이스, 다른 동작
  blocks:
  - type: code
    language: python
    title: 다형성으로 유연한 코드 작성하기
    description: 다형성(Polymorphism)은 같은 메서드 이름으로 서로 다른 동작을 수행하는 객체지향의 핵심 개념입니다. 동일한 인터페이스를 가진 다양한 객체들을 하나의 방식으로 다룰 수 있어 코드의 유연성과 확장성을 크게 향상시킵니다.
    content: "# 공통 부모 클래스\nclass Shape:\n    def __init__(self, name):\n        self.name = name\n    \n    def area(self):\n        \"\"\"하위 클래스에서 반드시 구현해야 하는 메서드\"\"\"\n        raise NotImplementedError(\"하위 클래스에서 구현해야 합니다\")\n    \n    def perimeter(self):\n        \"\"\"하위 클래스에서 반드시 구현해야 하는 메서드\"\"\"\n        raise NotImplementedError(\"하위 클래스에서 구현해야 합니다\")\n    \n    def describe(self):\n        \"\"\"공통 메서드\"\"\"\n        print(f\"\U0001F4D0 이것은 {self.name}입니다\")\n\n# 다양한 도형 클래스들 (다형성 구현)\nclass Rectangle(Shape):\n    def __init__(self, width, height):\n        super().__init__(\"직사각형\")\n        self.width = width\n        self.height = height\n    \n    def area(self):\n        return self.width * self.height\n    \n    def perimeter(self):\n        return 2 * (self.width + self.height)\n\nclass Circle(Shape):\n    def __init__(self, radius):\n        super().__init__(\"원\")\n        self.radius = radius\n    \n    def area(self):\n        return 3.14159 * self.radius ** 2\n    \n\
      \    def perimeter(self):\n        return 2 * 3.14159 * self.radius\n\nclass Triangle(Shape):\n    def __init__(self, base, height, side1, side2):\n        super().__init__(\"삼각형\")\n        self.base = base\n        self.height = height\n        self.side1 = side1\n        self.side2 = side2\n    \n    def area(self):\n        return 0.5 * self.base * self.height\n    \n    def perimeter(self):\n        return self.base + self.side1 + self.side2\n\n# 동물 클래스들로 다형성 구현\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n    \n    def speak(self):\n        raise NotImplementedError(\"하위 클래스에서 구현해야 합니다\")\n    \n    def move(self):\n        raise NotImplementedError(\"하위 클래스에서 구현해야 합니다\")\n\nclass Dog(Animal):\n    def speak(self):\n        return f\"{self.name}: 멍멍!\"\n    \n    def move(self):\n        return f\"{self.name}이(가) 뛰어다닙니다 \U0001F3C3‍♂️\"\n\nclass Cat(Animal):\n    def speak(self):\n        return f\"{self.name}: 야옹~\"\n    \n    def move(self):\n   \
      \     return f\"{self.name}이(가) 살금살금 걸어갑니다 \U0001F43E\"\n\nclass Bird(Animal):\n    def speak(self):\n        return f\"{self.name}: 짹짹!\"\n    \n    def move(self):\n        return f\"{self.name}이(가) 하늘을 날아갑니다 \U0001F54A️\"\n\n# 다형성을 활용한 함수들\ndef calculate_total_area(shapes):\n    \"\"\"다양한 도형의 총 넓이 계산\"\"\"\n    total = 0\n    print(\"\U0001F4CA 도형별 넓이 계산:\")\n    for shape in shapes:\n        area = shape.area()  # 각 객체의 area() 메서드 호출\n        print(f\"  {shape.name}: {area:.2f}\")\n        total += area\n    return total\n\ndef make_animals_perform(animals):\n    \"\"\"다양한 동물들의 행동 실행\"\"\"\n    print(\"\U0001F3AA 동물들의 공연:\")\n    for animal in animals:\n        print(f\"  \U0001F5E3️  {animal.speak()}\")      # 각 동물의 speak() 메서드\n        print(f\"  \U0001F6B6  {animal.move()}\")       # 각 동물의 move() 메서드\n        print()\n\ndef process_shapes(shapes):\n    \"\"\"도형들을 일괄 처리\"\"\"\n    print(\"\U0001F50D 도형 정보 출력:\")\n    for shape in shapes:\n        shape.describe()  # 공통 메서드\n\
      \        print(f\"  넓이: {shape.area():.2f}\")     # 다형성\n        print(f\"  둘레: {shape.perimeter():.2f}\") # 다형성\n        print()\n\nprint(\"=== 다형성 테스트 ===\")\n\n# 다양한 도형 객체 생성\nshapes = [\n    Rectangle(5, 3),\n    Circle(4),\n    Triangle(6, 4, 5, 5)\n]\n\n# 다형성 활용 - 같은 인터페이스로 다른 객체들 처리\ntotal_area = calculate_total_area(shapes)\nprint(f\"\U0001F3C6 총 넓이: {total_area:.2f}\")\n\nprint(\"\\n\" + \"=\"*50)\nprocess_shapes(shapes)\n\n# 동물 다형성 테스트\nanimals = [\n    Dog(\"멍멍이\"),\n    Cat(\"야옹이\"), \n    Bird(\"짹짹이\")\n]\n\nmake_animals_perform(animals)\n\nprint(\"=== 다형성의 장점 ===\")\nprint(\"✅ 같은 메서드명으로 다양한 객체를 일관되게 처리\")\nprint(\"✅ 새로운 클래스 추가 시 기존 코드 수정 불필요\")\nprint(\"✅ 코드의 유연성과 확장성 향상\")\nprint(\"✅ 런타임에 적절한 메서드 자동 선택\")"
- id: step18_final_project
  title: '18단계: 종합 실습 프로젝트'
  subtitle: 모든 개념을 활용한 완전체 프로젝트
  blocks:
  - type: code
    language: python
    title: 도서관 관리 시스템 - 클래스 마스터 프로젝트
    description: 지금까지 배운 모든 클래스 개념을 종합하여 실제 도서관 관리 시스템을 구현합니다. 상속, 다형성, 프로퍼티, 클래스/정적 메서드, 특별 메서드 등 모든 기능을 실전에서 활용해보는 완전체 프로젝트입니다.
    content: "from datetime import datetime, timedelta\nimport uuid\n\n# 기본 클래스 - 도서관 아이템\nclass LibraryItem:\n    \"\"\"도서관 아이템 기본 클래스\"\"\"\n    total_items = 0\n    \n    def __init__(self, title, author, item_id=None):\n        self.title = title\n        self.author = author\n        self.item_id = item_id or str(uuid.uuid4())[:8]\n        self.is_borrowed = False\n        self.borrowed_date = None\n        self.borrower = None\n        LibraryItem.total_items += 1\n        print(f\"\U0001F4DA '{title}' 도서관에 등록되었습니다 (ID: {self.item_id})\")\n    \n    @property\n    def is_available(self):\n        \"\"\"대출 가능 여부\"\"\"\n        return not self.is_borrowed\n    \n    @property\n    def days_borrowed(self):\n        \"\"\"대출 기간 (일수)\"\"\"\n        if not self.is_borrowed:\n            return 0\n        return (datetime.now() - self.borrowed_date).days\n    \n    def borrow(self, borrower_name):\n        \"\"\"대출 메서드\"\"\"\n        if self.is_borrowed:\n            print(f\"❌ '{self.title}'은(는)\
      \ 이미 대출중입니다\")\n            return False\n        \n        self.is_borrowed = True\n        self.borrowed_date = datetime.now()\n        self.borrower = borrower_name\n        print(f\"✅ '{self.title}' 대출 완료 - 대출자: {borrower_name}\")\n        return True\n    \n    def return_item(self):\n        \"\"\"반납 메서드\"\"\"\n        if not self.is_borrowed:\n            print(f\"❌ '{self.title}'은(는) 대출되지 않은 상태입니다\")\n            return False\n        \n        days = self.days_borrowed\n        borrower = self.borrower\n        \n        self.is_borrowed = False\n        self.borrowed_date = None\n        self.borrower = None\n        \n        print(f\"\U0001F4DA '{self.title}' 반납 완료 - {borrower}님이 {days}일간 대출\")\n        return True\n    \n    @classmethod\n    def get_total_items(cls):\n        \"\"\"전체 아이템 수 조회\"\"\"\n        return cls.total_items\n    \n    @staticmethod\n    def is_valid_isbn(isbn):\n        \"\"\"ISBN 유효성 검증\"\"\"\n        if not isinstance(isbn, str):\n          \
      \  return False\n        isbn = isbn.replace('-', '').replace(' ', '')\n        return len(isbn) in [10, 13] and isbn.isdigit()\n    \n    def __str__(self):\n        status = \"대출중\" if self.is_borrowed else \"대출가능\"\n        return f\"[{self.item_id}] {self.title} - {self.author} ({status})\"\n    \n    def __repr__(self):\n        return f\"LibraryItem('{self.title}', '{self.author}')\"\n\n# 도서 클래스 (상속)\nclass Book(LibraryItem):\n    def __init__(self, title, author, isbn, pages, genre):\n        super().__init__(title, author)\n        if not self.is_valid_isbn(isbn):\n            raise ValueError(\"유효하지 않은 ISBN입니다\")\n        self.isbn = isbn\n        self.pages = pages\n        self.genre = genre\n        self.reading_time = self._calculate_reading_time()\n    \n    def _calculate_reading_time(self):\n        \"\"\"예상 독서 시간 계산 (분당 200단어 기준)\"\"\"\n        words_per_page = 250\n        words_per_minute = 200\n        total_words = self.pages * words_per_page\n        return total_words\
      \ // words_per_minute\n    \n    @property\n    def reading_hours(self):\n        \"\"\"독서 시간을 시간 단위로 반환\"\"\"\n        return self.reading_time / 60\n    \n    def get_info(self):\n        \"\"\"도서 상세 정보\"\"\"\n        return {\n            'title': self.title,\n            'author': self.author,\n            'isbn': self.isbn,\n            'pages': self.pages,\n            'genre': self.genre,\n            'reading_time': f\"{self.reading_hours:.1f}시간\",\n            'available': self.is_available\n        }\n\n# DVD 클래스 (상속)  \nclass DVD(LibraryItem):\n    def __init__(self, title, director, duration, rating):\n        super().__init__(title, director)\n        self.director = director\n        self.duration = duration  # 분 단위\n        self.rating = rating\n    \n    @property\n    def duration_hours(self):\n        \"\"\"상영시간을 시간:분 형식으로 반환\"\"\"\n        hours = self.duration // 60\n        minutes = self.duration % 60\n        return f\"{hours}:{minutes:02d}\"\n    \n    def get_info(self):\n\
      \        \"\"\"DVD 상세 정보\"\"\"\n        return {\n            'title': self.title,\n            'director': self.director,\n            'duration': self.duration_hours,\n            'rating': self.rating,\n            'available': self.is_available\n        }\n\n# 회원 클래스\nclass Member:\n    def __init__(self, name, member_id, email):\n        self.name = name\n        self.member_id = member_id\n        self.email = email\n        self.borrowed_items = []\n        self.borrowing_history = []\n        self.join_date = datetime.now()\n    \n    @property\n    def borrowed_count(self):\n        \"\"\"현재 대출 중인 아이템 수\"\"\"\n        return len(self.borrowed_items)\n    \n    def can_borrow(self, max_items=3):\n        \"\"\"대출 가능 여부 확인\"\"\"\n        return self.borrowed_count < max_items\n    \n    def borrow_item(self, item):\n        \"\"\"아이템 대출\"\"\"\n        if not self.can_borrow():\n            print(f\"❌ {self.name}님은 대출 한도를 초과했습니다\")\n            return False\n        \n      \
      \  if item.borrow(self.name):\n            self.borrowed_items.append(item)\n            self.borrowing_history.append({\n                'item': item,\n                'borrowed_date': datetime.now(),\n                'returned_date': None\n            })\n            return True\n        return False\n    \n    def return_item(self, item):\n        \"\"\"아이템 반납\"\"\"\n        if item not in self.borrowed_items:\n            print(f\"❌ {self.name}님이 대출하지 않은 아이템입니다\")\n            return False\n        \n        if item.return_item():\n            self.borrowed_items.remove(item)\n            # 대출 기록 업데이트\n            for record in self.borrowing_history:\n                if record['item'] == item and record['returned_date'] is None:\nrecord['returned_date'] = datetime.now()\nbreak\n            return True\n        return False\n    \n    def get_borrowing_status(self):\n        \"\"\"대출 현황 조회\"\"\"\n        print(f\"\U0001F464 {self.name}님의 대출 현황\")\n        print(f\"\U0001F4E7 이메일:\
      \ {self.email}\")\n        print(f\"\U0001F4C5 가입일: {self.join_date.strftime('%Y-%m-%d')}\")\n        print(f\"\U0001F4DA 현재 대출: {self.borrowed_count}/3\")\n        \n        if self.borrowed_items:\n            print(\"\U0001F4CB 대출 중인 아이템:\")\n            for item in self.borrowed_items:\n                days = item.days_borrowed\n                print(f\"  - {item.title} ({days}일째)\")\n        else:\n            print(\"\U0001F4CB 현재 대출 중인 아이템이 없습니다\")\n\n# 도서관 관리 시스템\nclass Library:\n    def __init__(self, name):\n        self.name = name\n        self.items = []\n        self.members = []\n        print(f\"\U0001F3DB️ {name} 도서관이 개관했습니다!\")\n    \n    def add_item(self, item):\n        \"\"\"아이템 추가\"\"\"\n        self.items.append(item)\n    \n    def add_member(self, member):\n        \"\"\"회원 추가\"\"\"\n        self.members.append(member)\n        print(f\"\U0001F44B {member.name}님이 회원가입했습니다!\")\n    \n    def search_items(self, keyword, item_type=None):\n        \"\"\"아이템 검색\"\
      \"\"\n        results = []\n        for item in self.items:\n            if item_type and not isinstance(item, item_type):\n                continue\n            if (keyword.lower() in item.title.lower() or \n                keyword.lower() in item.author.lower()):\n                results.append(item)\n        return results\n    \n    def get_available_items(self):\n        \"\"\"대출 가능한 아이템 목록\"\"\"\n        return [item for item in self.items if item.is_available]\n    \n    def get_borrowed_items(self):\n        \"\"\"대출 중인 아이템 목록\"\"\"\n        return [item for item in self.items if item.is_borrowed]\n    \n    def generate_report(self):\n        \"\"\"도서관 현황 보고서\"\"\"\n        total = len(self.items)\n        available = len(self.get_available_items())\n        borrowed = len(self.get_borrowed_items())\n        \n        print(f\"\U0001F3DB️ {self.name} 현황 보고서\")\n        print(f\"{'='*40}\")\n        print(f\"\U0001F4DA 총 아이템 수: {total}\")\n        print(f\"✅ 대출 가능: {available}\"\
      )\n        print(f\"\U0001F4D6 대출 중: {borrowed}\")\n        print(f\"\U0001F465 총 회원 수: {len(self.members)}\")\n        print(f\"\U0001F4C8 대출률: {(borrowed/total*100):.1f}%\" if total > 0 else \"0%\")\n\n# 시스템 사용 예제\nprint(\"=== \U0001F3DB️ 도서관 관리 시스템 시작 ===\")\n\n# 도서관 생성\nlibrary = Library(\"파이썬 중앙도서관\")\n\n# 도서 추가\nbook1 = Book(\"파이썬 완전정복\", \"김코딩\", \"978-1234567890\", 450, \"프로그래밍\")\nbook2 = Book(\"데이터 사이언스 입문\", \"이데이터\", \"978-0987654321\", 320, \"데이터분석\")\ndvd1 = DVD(\"파이썬의 역사\", \"박감독\", 120, \"전체관람가\")\n\nlibrary.add_item(book1)\nlibrary.add_item(book2)\nlibrary.add_item(dvd1)\n\n# 회원 가입\nmember1 = Member(\"김철수\", \"M001\", \"chulsu@email.com\")\nmember2 = Member(\"이영희\", \"M002\", \"younghee@email.com\")\n\nlibrary.add_member(member1)\nlibrary.add_member(member2)\n\n# 대출/반납 시뮬레이션\nprint(\"\U0001F3DB️ 대출/반납 테스트 ===\")\nmember1.borrow_item(book1)\nmember1.borrow_item(dvd1)\nmember2.borrow_item(book2)\n\n# 현황 조회\nmember1.get_borrowing_status()\nlibrary.generate_report()\n\n\
      # 반납\nprint(\"\U0001F3DB️ 반납 테스트 ===\")\nmember1.return_item(book1)\n\n# 최종 현황\nlibrary.generate_report()\n\nprint(\"\U0001F389 도서관 관리 시스템 완성!\")\nprint(\"✅ 모든 클래스 개념을 실전에서 활용했습니다!\")"
