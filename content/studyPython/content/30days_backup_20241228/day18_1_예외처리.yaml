    code: |-
      def revReadNumber(value):
          try:
              revNum = int(value)
          except ValueError:
              print("변환 실패")
              return None
          else:
              print("변환 성공")
              return revNum
          finally:
              print("처리 완료")

      revReadNumber("123")
      revReadNumber("abc")
