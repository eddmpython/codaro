      class InvalidScoreError(Exception):
          pass

      def revSetScore(score):
          if not 0 <= score <= 100:
              raise InvalidScoreError(f"점수는 0-100 사이: {score}")
          return score

      try:
          revSetScore(150)
      except InvalidScoreError as e:
          print(e)
  - type: expansion
    title: "미션7: 종합 예제"
    code: |-
      def revCalculate(expr):
          try:
              revA, revOp, revB = expr.split()
              revA, revB = float(revA), float(revB)
              if revOp == "+":
                  return revA + revB
              elif revOp == "-":
                  return revA - revB
              elif revOp == "*":
                  return revA * revB
              elif revOp == "/":
                  return revA / revB
              else:
                  raise ValueError(f"알 수 없는 연산자: {revOp}")
          except ZeroDivisionError:
              return "0으로 나눌 수 없음"
          except ValueError as e:
              return f"오류: {e}"

      print(revCalculate("10 + 5"))
      print(revCalculate("10 / 0"))
      print(revCalculate("abc"))
