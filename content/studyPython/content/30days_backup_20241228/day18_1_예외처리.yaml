      def pracSafeInt(value, default=0):
          try:
              return int(value)
          except (ValueError, TypeError):
              return default

      print(pracSafeInt("123"))
      print(pracSafeInt("hello"))
      print(pracSafeInt(None, -1))

      def pracSafeDivide(a, b, default=None):
          try:
              return a / b
          except ZeroDivisionError:
              return default

      print(pracSafeDivide(10, 2))
      print(pracSafeDivide(10, 0, 0))

      def pracSafeGet(lst, index, default=None):
          try:
              return lst[index]
          except (IndexError, TypeError):
              return default

      pracNumbers = [1, 2, 3]
      print(pracSafeGet(pracNumbers, 1))
      print(pracSafeGet(pracNumbers, 10, -1))

