      def revProcessData(data, index, key):
          try:
              revItem = data[index]
              return revItem[key]
          except (IndexError, KeyError, TypeError) as e:
              return f"오류: {type(e).__name__}"

      revData = [{"name": "Alice"}]
      print(revProcessData(revData, 0, "name"))
      print(revProcessData(revData, 5, "name"))
