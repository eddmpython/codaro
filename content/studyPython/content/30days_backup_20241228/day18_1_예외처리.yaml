      def revValidateAge(age):
          if not isinstance(age, int):
              raise TypeError("나이는 정수여야 합니다")
          if age < 0:
              raise ValueError("나이는 음수일 수 없습니다")
          return age

      try:
          revValidateAge(-5)
      except (TypeError, ValueError) as e:
          print(f"오류: {e}")
