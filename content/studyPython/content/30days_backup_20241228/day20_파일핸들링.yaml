  - type: expansion
    title: "미션10: 종합 실습 - 학생 성적 관리"
    code: |-
      mission10Students = [
          {'name': '김철수', 'scores': [85, 90, 88]},
          {'name': '이영희', 'scores': [92, 88, 95]},
          {'name': '박민수', 'scores': [78, 85, 80]}
      ]

      for mission10Student in mission10Students:
          mission10Avg = sum(mission10Student['scores']) / len(mission10Student['scores'])
          mission10Student['average'] = mission10Avg

      with open('students.json', 'w', encoding='utf-8') as mission10File:
          json.dump(mission10Students, mission10File, ensure_ascii=False, indent=2)

