          print(f"평균 점수: {sum(mission4Loaded['scores']) / len(mission4Loaded['scores'])}")
  - type: expansion
    title: "미션5: CSV와 리스트 컴프리헨션"
    code: |-
      mission5Rows = [['이름', '나이', '도시'], ['Alice', 25, 'Seoul'], ['Bob', 30, 'Busan']]
      with open('data.csv', 'w', newline='', encoding='utf-8') as mission5WriteFile:
          mission5Writer = csv.writer(mission5WriteFile)
          mission5Writer.writerows(mission5Rows)

      with open('data.csv', 'r', encoding='utf-8') as mission5ReadFile:
