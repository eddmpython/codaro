    content: 20일차에서 배운 파일 핸들링을 복습하는 미션입니다. 파일 읽기, 쓰기, JSON/CSV 처리를 연습하고, 이전에 배운 문자열, 리스트, 딕셔너리, 조건문, 반복문 등을 활용해봅시다.
  - type: expansion
    title: "미션1: 파일 읽기와 문자열 처리"
    code: |-
      with open('example.txt', 'r', encoding='utf-8') as mission1File:
          mission1Content = mission1File.read()
          print(mission1Content)
          print(f"글자 수: {len(mission1Content)}")
          print(f"대문자 변환: {mission1Content.upper()}")
  - type: expansion
    title: "미션2: 파일 쓰기와 리스트"
    code: |-
      mission2Lines = ['첫 번째 줄\n', '두 번째 줄\n', '세 번째 줄\n']
      with open('output.txt', 'w', encoding='utf-8') as mission2File:
          mission2File.writelines(mission2Lines)
      print("파일 저장 완료")
  - type: expansion
    title: "미션3: 줄 단위 처리와 반복문"
    code: |-
      with open('input.txt', 'r', encoding='utf-8') as mission3File:
          for mission3Num, mission3Line in enumerate(mission3File, 1):
              print(f"{mission3Num}: {mission3Line.strip()}")
