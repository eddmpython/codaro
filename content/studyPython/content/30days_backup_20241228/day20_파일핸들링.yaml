      mission4Data = {'name': '홍길동', 'scores': [85, 90, 95], 'city': '서울'}
      with open('data.json', 'w', encoding='utf-8') as mission4WriteFile:
          json.dump(mission4Data, mission4WriteFile, ensure_ascii=False, indent=2)

      with open('data.json', 'r', encoding='utf-8') as mission4ReadFile:
          mission4Loaded = json.load(mission4ReadFile)
