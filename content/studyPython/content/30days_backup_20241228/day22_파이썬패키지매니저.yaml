sections:
- id: package_manager_intro
  title: 패키지 매니저 소개
  subtitle: 파이썬 패키지 관리 도구들
  blocks:
  - type: text
    content: 패키지 매니저는 파이썬 패키지(라이브러리)를 설치, 업데이트, 제거하는 도구입니다. 패키지란 다른 개발자들이 만들어둔 유용한 코드 모음으로, 이를 활용하면 처음부터 모든 것을 만들 필요가 없어집니다. 패키지 매니저는 이러한 패키지들을 쉽게 찾고 설치할 수 있도록 도와주는 도구입니다. 마치 앱스토어에서 앱을 다운로드하듯이, 파이썬 패키지를 명령어 하나로 설치할 수 있습니다. 이를 통해 개발 효율성을 크게 향상시킬 수 있습니다.
  - type: list
    items:
    - 패키지 설치 및 제거
    - 의존성 자동 관리
    - 버전 제어
    - 가상 환경 지원
  - type: code
    language: bash
    title: 패키지 매니저 기본 개념
    description: 패키지 설치의 기본 개념입니다.
    content: |-
      pip install requests

      python -c "import requests; r = requests.get('https://api.github.com'); print(r.status_code)"
  - type: tip
    content: "PyPI(Python Package Index)에는 40만개 이상의 패키지가 등록되어 있습니다."

- id: pip_basics
  title: pip 기본 사용법
  subtitle: 가장 기본적인 파이썬 패키지 매니저
  blocks:
  - type: text
    content: pip는 파이썬에 기본 포함된 패키지 매니저로, PyPI(Python Package Index)에서 패키지를 설치하고 관리합니다. PyPI는 40만 개 이상의 파이썬 패키지가 등록된 중앙 저장소로, pip 명령어 하나면 이 모든 패키지를 사용할 수 있습니다. pip는 Package Installer for Python의 약자로, 파이썬을 설치하면 자동으로 함께 설치되어 별도 설치가 필요 없습니다. 가장 기본적이고 널리 사용되는 도구입니다.
  - type: list
    items:
    - "pip install - 패키지 설치"
    - "pip uninstall - 패키지 제거"
    - "pip list - 설치된 패키지 목록"
    - "pip show - 패키지 정보 확인"
  - type: code
    language: bash
    title: pip 기본 명령어
    description: pip의 주요 명령어들입니다.
    content: |-
      pip install numpy

      pip install numpy==1.21.0

      pip install numpy>=1.20.0

      pip uninstall numpy

      pip list

      pip show numpy

      pip install --upgrade numpy

- id: pip_advanced
  title: pip 고급 기능
  subtitle: requirements.txt와 가상환경
  blocks:
  - type: text
    content: requirements.txt는 프로젝트에 필요한 모든 패키지 목록을 저장하는 텍스트 파일입니다. 이 파일 하나만 있으면 다른 컴퓨터에서도 동일한 환경을 쉽게 재현할 수 있습니다. 팀원들과 협업할 때나 서버에 프로젝트를 배포할 때 매우 유용합니다. 가상환경과 함께 사용하면 프로젝트별로 독립적인 패키지 환경을 만들 수 있어, 서로 다른 프로젝트 간 패키지 버전 충돌을 방지할 수 있습니다.
  - type: list
    items:
    - 의존성 파일 관리
    - 버전 고정
    - 환경 재현성
    - 팀 협업 지원
  - type: code
    language: bash
    title: requirements.txt와 가상환경
    description: 의존성 관리와 가상환경 활용입니다.
    content: |-
      python -m venv myenv

      myenv\Scripts\activate

      source myenv/bin/activate

      pip freeze > requirements.txt

      pip install -r requirements.txt

      deactivate
  - type: tip
    content: "가상환경을 사용하면 프로젝트별로 독립적인 패키지 환경을 유지할 수 있습니다."

- id: uv_manager
  title: uv
  subtitle: 초고속 파이썬 패키지 매니저
  blocks:
  - type: text
    content: uv는 Rust 프로그래밍 언어로 작성된 초고속 파이썬 패키지 매니저입니다. Rust는 C++처럼 빠른 성능을 제공하는 언어로, uv는 이를 활용해 pip보다 10-100배 빠른 속도를 자랑합니다. 2024년에 Astral 팀이 개발한 최신 도구로, 패키지 설치뿐만 아니라 가상환경 생성과 프로젝트 관리까지 통합적으로 지원합니다. 특히 대규모 프로젝트에서 수십 개의 패키지를 설치할 때 속도 차이가 극명하게 드러납니다.
  - type: list
    items:
    - 초고속 패키지 설치
    - pip 호환 인터페이스
    - 통합 가상환경 관리
    - 현대적인 해결 알고리즘
  - type: code
    language: bash
    title: uv 설치 및 사용법
    description: OS별 uv 설치 방법입니다.
    content: |-
      powershell -c "irm https://astral.sh/uv/install.ps1 | iex"

      curl -LsSf https://astral.sh/uv/install.sh | sh

      pip install uv

      uv pip install requests

      uv venv
      .venv\Scripts\activate
      source .venv/bin/activate

- id: poetry_manager
  title: Poetry
  subtitle: 현대적인 파이썬 패키지 관리
  blocks:
  - type: text
    content: Poetry는 현대적인 파이썬 패키지 관리 도구로, 의존성 관리와 빌드를 통합적으로 처리합니다. pyproject.toml 파일은 파이썬 프로젝트의 모든 설정을 하나의 파일에 담는 표준 형식으로, Poetry는 이를 사용하여 체계적인 프로젝트 관리를 제공합니다. Poetry는 자동으로 의존성 충돌을 해결하고, poetry.lock 파일로 정확한 버전을 고정하여 어디서나 동일한 환경을 보장합니다. 특히 자신만의 패키지를 만들어 PyPI에 배포할 때 매우 편리합니다.
  - type: list
    items:
    - 통합 의존성 관리
    - 가상환경 자동 생성
    - 패키지 빌드 및 배포
    - 의존성 잠금 파일
  - type: code
    language: bash
    title: Poetry 설치 및 사용법
    description: OS별 Poetry 설치 방법입니다.
    content: |-
      pip install poetry

      poetry new my-project

      poetry add requests

      poetry add pytest --group dev

      poetry install

      poetry shell

- id: conda_manager
  title: Conda
  subtitle: 데이터 사이언스용 패키지 매니저
  blocks:
  - type: text
    content: Conda는 Anaconda 배포판에 포함된 패키지 매니저로, 데이터 사이언스 분야에서 널리 사용됩니다. pip와 달리 파이썬 패키지뿐만 아니라 R, C++, Java 등 다양한 언어의 패키지를 함께 관리할 수 있습니다. 특히 NumPy, SciPy 같은 과학 계산 라이브러리는 컴파일된 C 코드를 포함하는데, Conda는 이를 바이너리 형태로 제공하여 설치가 훨씬 쉽고 빠릅니다. 데이터 분석, 머신러닝 분야에서 많이 사용됩니다.
  - type: list
    items:
    - 다중 언어 패키지 지원
    - 강력한 환경 관리
    - 바이너리 패키지 배포
    - 과학 계산 패키지 특화
  - type: code
    language: bash
    title: Conda 사용법
    description: Conda 기본 사용법입니다.
    content: |-
      conda create -n myenv python=3.11

      conda activate myenv

      conda install numpy pandas

      conda list

      conda deactivate

      conda env export > environment.yml
  - type: tip
    content: "Miniconda는 Anaconda의 경량 버전으로 필요한 패키지만 설치할 수 있습니다."

- id: package_manager_comparison
  title: 패키지 매니저 비교
  subtitle: 상황별 최적의 도구 선택
  blocks:
  - type: text
    content: 패키지 매니저는 하나가 아니라 여러 개가 있으며, 각각 장단점이 다릅니다. 프로젝트 특성과 요구사항에 따라 적절한 도구를 선택하는 것이 중요합니다. 간단한 스크립트는 pip만으로 충분하지만, 대규모 프로젝트는 Poetry나 uv가 더 적합합니다. 데이터 사이언스 작업을 한다면 Conda가 편리하고, 속도가 중요하다면 uv를 선택하세요. 각 도구의 장단점을 이해하고 상황에 맞게 활용하는 것이 전문 개발자의 자세입니다.
  - type: list
    items:
    - "pip - 기본, 간단한 프로젝트"
    - "uv - 속도가 중요한 경우"
    - "Poetry - 현대적인 프로젝트 관리"
    - "Conda - 데이터 사이언스/ML"
  - type: code
    language: bash
    title: 상황별 패키지 매니저 선택
    description: 상황별 추천 패키지 매니저입니다.
    content: |-
      pip install requests

      uv pip install requests

      poetry add requests

      conda install requests

- id: creating_packages
  title: 나만의 패키지 만들기
  subtitle: 사용자 정의 파이썬 패키지 생성
  blocks:
  - type: text
    content: 파이썬 패키지는 관련된 모듈(.py 파일)들을 하나의 폴더로 구성한 것입니다. __init__.py 파일을 폴더 안에 두면 파이썬이 해당 폴더를 패키지로 인식합니다. 이 파일은 비어있어도 되지만, 패키지 초기화 코드를 넣을 수도 있습니다. 패키지를 만들면 코드를 논리적으로 그룹화하여 관리하기 쉽고, 다른 프로젝트에서도 재사용할 수 있습니다. 나중에는 PyPI에 배포하여 다른 개발자들도 사용할 수 있게 만들 수도 있습니다.
  - type: list
    items:
    - __init__.py 파일 필수
    - 모듈들의 논리적 그룹화
    - 네임스페이스 제공
    - 재사용 가능한 구조
  - type: code
    language: python
    title: 패키지 생성 예제
    description: 간단한 수학 계산 패키지 만들기입니다.
    content: |-
      def add(a, b):
          return a + b

      def multiply(a, b):
          return a * b

      from mymath import add, multiply
      result = add(5, 3)
      print(result)

- id: popular_packages
  title: 분야별 인기 패키지
  subtitle: 자주 사용되는 유용한 파이썬 패키지들
  blocks:
  - type: text
    content: 파이썬 생태계에는 각 분야별로 검증된 인기 패키지들이 존재합니다. 웹 개발에는 Django와 FastAPI, 데이터 분석에는 Pandas와 NumPy, 머신러닝에는 scikit-learn과 TensorFlow가 있습니다. 이러한 패키지들은 수년간 전 세계 개발자들이 사용하며 검증되었고, 문서화도 잘 되어있어 배우기 쉽습니다. 처음부터 모든 것을 만들지 말고, 이미 만들어진 훌륭한 도구들을 활용하는 것이 현명한 개발 방식입니다. 프로젝트 목적에 맞는 패키지를 선택하여 활용하세요.
  - type: list
    items:
    - 웹 개발 - django, flask, fastapi
    - 데이터 분석 - pandas, numpy, matplotlib
    - 머신러닝 - scikit-learn, tensorflow, pytorch
    - 웹 스크래핑 - requests, beautifulsoup4, selenium
  - type: code
    language: bash
    title: 분야별 인기 패키지
    description: 각 분야별 주요 패키지들입니다.
    content: |-
      pip install django flask fastapi nicegui

      pip install pandas numpy matplotlib seaborn plotly

      pip install scikit-learn tensorflow pytorch

      pip install requests beautifulsoup4 selenium

      pip install sqlalchemy pymongo redis

      pip install pytest black flake8 mypy

- id: practice
  title: 22일차 복습
  subtitle: 패키지 매니저 미션
  blocks:
  - type: text
    content: 22일차에서 배운 패키지 매니저를 복습하는 미션입니다.
  - type: expansion
    title: "미션1: pip 기본 명령어"
    code: |-
      pip install requests
      pip show requests
      pip list
      pip uninstall requests
  - type: expansion
    title: "미션2: 가상환경 생성"
    code: |-
      python -m venv myproject
      myproject\Scripts\activate
      pip install pandas numpy
      pip freeze > requirements.txt
  - type: expansion
    title: "미션3: requirements.txt 사용"
    code: |-
      pip install -r requirements.txt
      pip list
  - type: expansion
    title: "미션4: uv 사용하기"
    code: |-
      pip install uv
      uv venv
      uv pip install requests pandas
  - type: expansion
    title: "미션5: Poetry 프로젝트"
    code: |-
      pip install poetry
      poetry new myapp
      cd myapp
      poetry add requests
  - type: expansion
    title: "미션6: 패키지 구조 만들기"
    code: |-
      myutils/
        __init__.py
        helpers.py
        validators.py
  - type: expansion
    title: "미션7: 패키지 import"
    code: |-
      from myutils import helpers
      from myutils.validators import validateEmail
