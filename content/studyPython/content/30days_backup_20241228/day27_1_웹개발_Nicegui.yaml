sections:
- id: import_section
  title: 모듈 불러오기
  subtitle: NiceGUI 라이브러리 준비
  blocks:
  - type: text
    content: NiceGUI는 Python만으로 웹 애플리케이션을 만들 수 있는 라이브러리입니다. 이 파일에서 사용할 모든 import를 최상단에 작성합니다. day13 모듈에서 배운 import 문법을 사용하여 필요한 라이브러리를 불러옵니다. from 키워드는 모듈에서 특정 요소만 가져올 때 사용하며, as는 별칭을 지정할 때 사용합니다.
  - type: list
    items:
    - "from nicegui import ui - NiceGUI UI 컴포넌트 가져오기"
    - 파일 최상단에 import 섹션 하나만 작성
    - 이후 섹션에서는 import 사용 금지
    - 한 곳에서 모든 의존성 관리
  - type: code
    language: python
    title: 필요한 모듈 불러오기
    description: NiceGUI에서 사용할 ui 모듈을 불러옵니다.
    content: |-
      from nicegui import ui
  - type: tip
    content: "pip install nicegui 명령으로 먼저 설치하세요."

- id: nicegui_intro
  title: NiceGUI 소개
  subtitle: Python만으로 웹앱 만들기
  blocks:
  - type: text
    content: NiceGUI는 Python만으로 현대적인 웹 애플리케이션을 만들 수 있는 프레임워크입니다. 프레임워크는 애플리케이션을 만들기 위한 뼈대와 규칙을 제공하는 도구를 의미합니다. FastAPI는 빠른 웹 서버를 만드는 Python 프레임워크이고, Vue.js는 사용자 인터페이스를 만드는 JavaScript 프레임워크입니다. NiceGUI는 이 두 기술을 Python 코드 하나로 사용할 수 있게 합니다. HTML, CSS, JavaScript를 몰라도 웹 애플리케이션을 만들 수 있어 배우기 쉽고 생산성이 높습니다.
  - type: list
    items:
    - Python만으로 프론트엔드와 백엔드 구현
    - FastAPI 기반의 빠른 성능
    - Vue.js 기반의 현대적인 UI
    - 실시간 상호작용 지원
  - type: code
    language: python
    title: NiceGUI 첫 시작
    description: 간단한 인사 메시지와 버튼을 만듭니다.
    content: |-
      firstLabel = ui.label('Hello, NiceGUI!')
      firstButton = ui.button('클릭하세요', on_click=lambda: ui.notify('클릭됨!'))

      ui.run()
  - type: tip
    content: "ui.run()을 실행하면 http://localhost:8080 에서 웹앱이 열립니다."

- id: basic_components
  title: 기본 컴포넌트
  subtitle: 입력과 출력 요소들
  blocks:
  - type: text
    content: NiceGUI는 다양한 UI 컴포넌트를 제공합니다. 컴포넌트는 Component의 한글 발음으로, 웹 페이지를 구성하는 각각의 부품을 의미합니다. 레고 블록처럼 여러 컴포넌트를 조합하여 완전한 웹 애플리케이션을 만들 수 있습니다. ui.label()은 텍스트를 화면에 표시하고, ui.input()은 사용자로부터 텍스트를 입력받으며, ui.button()은 클릭할 수 있는 버튼을 만듭니다. 각 컴포넌트는 value 속성으로 현재 값에 접근할 수 있습니다.
  - type: list
    items:
    - "ui.label() - 텍스트 표시"
    - "ui.input() - 텍스트 입력"
    - "ui.button() - 버튼"
    - "ui.checkbox(), ui.switch() - 선택 요소"
  - type: code
    language: python
    title: 입력과 버튼
    description: 사용자 입력을 받아 처리하는 간단한 예제입니다.
    content: |-
      componentInput = ui.input('이름', placeholder='이름을 입력하세요')

      def greetUser():
          if componentInput.value:
              ui.notify(f'안녕하세요, {componentInput.value}님!')
          else:
              ui.notify('이름을 입력해주세요')

      greetButton = ui.button('인사하기', on_click=greetUser)

      ui.run()

- id: layout
  title: 레이아웃
  subtitle: 요소 배치하기
  blocks:
  - type: text
    content: 레이아웃은 Layout의 한글 발음으로, 화면에서 요소들을 배치하는 구조를 의미합니다. ui.row()는 요소들을 가로로 나란히 배치하고, ui.column()은 세로로 쌓아서 배치합니다. ui.card()는 테두리와 그림자가 있는 카드 모양 컨테이너를 만듭니다. with 문은 day21 클래스에서 배운 컨텍스트 매니저 문법으로, 블록 안의 요소들이 자동으로 해당 컨테이너에 포함됩니다. classes() 메서드는 CSS 스타일을 적용하는데, Tailwind CSS 클래스명을 문자열로 전달합니다.
  - type: list
    items:
    - "ui.row() - 가로 배치"
    - "ui.column() - 세로 배치"
    - "ui.card() - 카드 컨테이너"
    - ".classes() - CSS 클래스 적용"
  - type: code
    language: python
    title: 레이아웃 구성
    description: row와 column으로 요소를 배치합니다.
    content: |-
      with ui.row().classes('gap-4'):
          with ui.card().classes('p-4'):
              layoutLabel1 = ui.label('카드 1').classes('text-lg font-bold')
              layoutButton1 = ui.button('버튼 1')

          with ui.card().classes('p-4'):
              layoutLabel2 = ui.label('카드 2').classes('text-lg font-bold')
              layoutButton2 = ui.button('버튼 2')

      ui.run()

- id: interactive_widgets
  title: 상호작용 위젯
  subtitle: 실시간 값 연동
  blocks:
  - type: text
    content: 위젯은 Widget의 한글 발음으로, 사용자와 상호작용하는 UI 요소를 의미합니다. ui.slider()는 마우스로 드래그하여 값을 조절하는 슬라이더를 만들고, ui.number()는 숫자를 직접 입력하거나 화살표로 조절할 수 있는 입력 필드를 만듭니다. bind_value() 메서드는 두 위젯의 값을 양방향으로 연동시켜서, 한쪽이 변경되면 다른 쪽도 자동으로 변경되게 합니다. on_value_change()는 값이 변경될 때마다 지정한 함수를 자동으로 실행합니다.
  - type: list
    items:
    - "ui.slider() - 슬라이더"
    - "ui.number() - 숫자 입력"
    - "ui.color_input() - 색상 선택"
    - "bind_value() - 값 연동"
  - type: code
    language: python
    title: 슬라이더와 값 연동
    description: 슬라이더와 숫자 입력을 실시간으로 연동합니다.
    content: |-
      widgetNumber = ui.number('값', value=50, min=0, max=100)
      widgetSlider = ui.slider(min=0, max=100, value=50)
      widgetSlider.bind_value(widgetNumber, 'value')

      widgetResult = ui.label()

      def updateWidget():
          widgetResult.text = f'현재 값: {widgetNumber.value}'

      widgetNumber.on_value_change(updateWidget)
      updateWidget()

      ui.run()

- id: charts_tables
  title: 차트와 테이블
  subtitle: 데이터 시각화
  blocks:
  - type: text
    content: 데이터 시각화는 숫자 데이터를 차트나 그래프로 보여주어 이해하기 쉽게 만드는 것입니다. ui.echart()는 ECharts라는 강력한 차트 라이브러리를 사용하여 막대 차트, 선 차트, 원 차트 등을 만듭니다. 차트 옵션은 day08에서 배운 딕셔너리로 전달하며, xAxis는 가로축, yAxis는 세로축, series는 실제 데이터를 의미합니다. ui.table()은 day08 딕셔너리 리스트를 표 형태로 보여주며, columns는 열 정의, rows는 실제 데이터를 담은 딕셔너리 리스트입니다.
  - type: list
    items:
    - "ui.echart() - ECharts 차트"
    - "ui.table() - 데이터 테이블"
    - 실시간 데이터 업데이트 지원
    - 다양한 차트 타입 지원
  - type: code
    language: python
    title: 차트와 테이블
    description: 간단한 차트와 테이블을 만듭니다.
    content: |-
      chartOptions = {
          'xAxis': {'type': 'category', 'data': ['1월', '2월', '3월', '4월', '5월']},
          'yAxis': {'type': 'value'},
          'series': [{'type': 'bar', 'data': [100, 150, 200, 180, 250]}]
      }
      chartDisplay = ui.echart(chartOptions).classes('h-64 w-full')

      tableColumns = [
          {'name': 'name', 'label': '이름', 'field': 'name'},
          {'name': 'age', 'label': '나이', 'field': 'age'}
      ]
      tableRows = [
          {'name': '김철수', 'age': 25},
          {'name': '이영희', 'age': 30}
      ]
      tableDisplay = ui.table(columns=tableColumns, rows=tableRows)

      ui.run()

- id: pages_routing
  title: 페이지와 라우팅
  subtitle: 멀티 페이지 앱
  blocks:
  - type: text
    content: 라우팅은 Routing의 한글 발음으로, URL 경로에 따라 다른 페이지를 보여주는 기능입니다. @ui.page는 day11에서 배운 데코레이터 문법으로, 함수를 웹 페이지로 변환합니다. '/'는 루트 경로로 웹사이트의 메인 페이지를 의미하고, '/about'처럼 경로를 지정하면 해당 URL로 접근할 수 있는 페이지가 생성됩니다. ui.navigate.to()는 프로그램에서 다른 페이지로 이동하는 함수입니다. 이렇게 하면 여러 페이지를 가진 완전한 웹 애플리케이션을 만들 수 있습니다.
  - type: list
    items:
    - "@ui.page('/') - 홈 페이지"
    - "@ui.page('/about') - 소개 페이지"
    - "ui.navigate.to() - 페이지 이동"
    - 동적 라우팅 지원
  - type: code
    language: python
    title: 멀티 페이지 앱
    description: 여러 페이지를 가진 웹앱을 만듭니다.
    content: |-
      @ui.page('/')
      def pageHome():
          homeLabel = ui.label('홈 페이지').classes('text-2xl font-bold')
          homeButton = ui.button('소개 페이지로', on_click=lambda: ui.navigate.to('/about'))

      @ui.page('/about')
      def pageAbout():
          aboutLabel = ui.label('소개 페이지').classes('text-2xl font-bold')
          aboutButton = ui.button('홈으로', on_click=lambda: ui.navigate.to('/'))

      ui.run()

- id: dialogs_notifications
  title: 다이얼로그와 알림
  subtitle: 사용자 피드백
  blocks:
  - type: text
    content: 피드백은 Feedback의 한글 발음으로, 사용자의 행동에 대한 응답을 보여주는 것을 의미합니다. ui.notify()는 화면 모서리에 짧게 나타났다 사라지는 알림 메시지를 표시하며, type 매개변수로 메시지 종류를 지정합니다. ui.dialog()는 화면 중앙에 나타나는 팝업창을 만드는데, 중요한 메시지나 추가 입력을 받을 때 사용합니다. dialog.open()은 다이얼로그를 열고, dialog.close()는 닫는 메서드입니다. 이런 피드백 요소들은 사용자 경험을 향상시키는 중요한 역할을 합니다.
  - type: list
    items:
    - "ui.notify() - 알림 메시지"
    - "ui.dialog() - 다이얼로그"
    - "type='positive' - 성공 알림"
    - "type='negative' - 오류 알림"
  - type: code
    language: python
    title: 알림과 다이얼로그
    description: 다양한 알림과 다이얼로그를 표시합니다.
    content: |-
      def showNotifyMessages():
          ui.notify('정보 알림', type='info')
          ui.notify('성공!', type='positive')
          ui.notify('경고!', type='warning')

      notifyButton = ui.button('알림 표시', on_click=showNotifyMessages)

      with ui.dialog() as dialogBox:
          with ui.card():
              dialogLabel = ui.label('다이얼로그 내용')
              dialogCloseBtn = ui.button('닫기', on_click=dialogBox.close)

      dialogOpenBtn = ui.button('다이얼로그 열기', on_click=dialogBox.open)

      ui.run()

- id: practical_app
  title: 실전 웹앱
  subtitle: 간단한 할일 앱
  blocks:
  - type: text
    content: 지금까지 배운 NiceGUI 기능들을 모두 활용하여 실제로 사용할 수 있는 할일 관리 웹 애플리케이션을 만들어봅니다. day05에서 배운 리스트로 할일 목록을 관리하고, day08 딕셔너리로 각 할일의 정보를 저장합니다. day11 함수로 기능을 분리하고, day09 조건문으로 완료 상태를 체크합니다. ui.checkbox()는 체크박스를 만들고, enumerate()는 day10에서 배운 인덱스와 값을 동시에 가져오는 함수입니다. clear() 메서드로 컨테이너를 비우고 다시 그려서 실시간으로 UI를 업데이트합니다.
  - type: list
    items:
    - 할일 추가/삭제 기능
    - 완료 표시 기능
    - 실시간 UI 업데이트
    - 깔끔한 레이아웃
  - type: code
    language: python
    title: 할일 관리 앱
    description: 간단한 할일 관리 웹앱입니다.
    content: |-
      appTodos = []
      appContainer = None

      def addTodoItem():
          if appInput.value:
              appTodos.append({'text': appInput.value, 'done': False})
              appInput.value = ''
              renderTodoList()

      def toggleTodoStatus(index):
          appTodos[index]['done'] = not appTodos[index]['done']
          renderTodoList()

      def deleteTodoItem(index):
          appTodos.pop(index)
          renderTodoList()

      def renderTodoList():
          appContainer.clear()
          with appContainer:
              for i, todo in enumerate(appTodos):
                  with ui.row().classes('items-center gap-2'):
                      todoCheck = ui.checkbox(value=todo['done'], on_change=lambda _, idx=i: toggleTodoStatus(idx))
                      styleText = 'line-through text-gray-400' if todo['done'] else ''
                      todoLabel = ui.label(todo['text']).classes(styleText)
                      todoDelBtn = ui.button('삭제', on_click=lambda _, idx=i: deleteTodoItem(idx)).classes('bg-red-500')

      appTitle = ui.label('할일 관리').classes('text-2xl font-bold')
      with ui.row().classes('gap-2'):
          appInput = ui.input('할일 입력')
          appAddBtn = ui.button('추가', on_click=addTodoItem)

      appContainer = ui.column()
      renderTodoList()

      ui.run()

- id: practice
  title: 27일차 복습
  subtitle: NiceGUI 미션
  blocks:
  - type: text
    content: 27일차에서 배운 NiceGUI를 복습하는 미션입니다. 각 미션을 통해 모듈 불러오기, 기본 컴포넌트, 레이아웃, 위젯, 테이블, 페이지 라우팅까지 모든 내용을 종합적으로 연습합니다.
  - type: expansion
    title: "미션1: 모듈과 기본 앱"
    code: |-
      from nicegui import ui

      mission1Label = ui.label('Hello World!')
      ui.run()
  - type: expansion
    title: "미션2: 버튼 클릭 이벤트"
    code: |-
      mission2Button = ui.button('클릭', on_click=lambda: ui.notify('클릭됨!'))
      ui.run()
  - type: expansion
    title: "미션3: 입력 처리"
    code: |-
      mission3Input = ui.input('이름')
      mission3Button = ui.button('확인', on_click=lambda: ui.notify(f'안녕, {mission3Input.value}!'))
      ui.run()
  - type: expansion
    title: "미션4: 카드 레이아웃"
    code: |-
      with ui.card().classes('p-4'):
          mission4Title = ui.label('카드 제목').classes('font-bold')
          mission4Content = ui.label('카드 내용')
      ui.run()
  - type: expansion
    title: "미션5: 슬라이더 위젯"
    code: |-
      mission5Label = ui.label('값: 50')
      mission5Slider = ui.slider(min=0, max=100, value=50, on_change=lambda e: mission5Label.set_text(f'값: {e.value}'))
      ui.run()
  - type: expansion
    title: "미션6: 데이터 테이블"
    code: |-
      mission6Columns = [{'name': 'name', 'label': '이름', 'field': 'name'}]
      mission6Rows = [{'name': 'Alice'}, {'name': 'Bob'}]
      mission6Table = ui.table(columns=mission6Columns, rows=mission6Rows)
      ui.run()
  - type: expansion
    title: "미션7: 멀티 페이지 라우팅"
    code: |-
      @ui.page('/')
      def mission7Home():
          mission7HomeLabel = ui.label('홈')
          mission7Link = ui.link('소개', '/about')

      @ui.page('/about')
      def mission7About():
          mission7AboutLabel = ui.label('소개')

      ui.run()
  - type: expansion
    title: "미션8: 종합 프로젝트 - 간단한 계산기"
    code: |-
      calcNum1 = ui.number('첫 번째 숫자', value=0)
      calcNum2 = ui.number('두 번째 숫자', value=0)
      calcResult = ui.label('결과: 0')

      def calculateSum():
          total = calcNum1.value + calcNum2.value
          calcResult.text = f'결과: {total}'

      calcButton = ui.button('더하기', on_click=calculateSum)
      ui.run()
