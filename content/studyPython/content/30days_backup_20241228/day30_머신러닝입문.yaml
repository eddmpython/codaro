sections:
- id: imports
  title: 라이브러리 준비
  subtitle: 머신러닝 모듈 불러오기
  blocks:
  - type: text
    content: 머신러닝을 시작하기 전에 필요한 라이브러리를 불러옵니다. scikit-learn은 머신러닝 알고리즘을 제공하는 가장 유명한 파이썬 라이브러리입니다. pandas와 numpy는 데이터 처리에, sklearn의 다양한 모듈은 학습과 평가에 사용됩니다. 모든 import를 한 곳에 모아두면 나중에 어떤 라이브러리를 사용하는지 쉽게 확인할 수 있습니다.
  - type: list
    items:
    - "pandas - 데이터프레임 처리"
    - "numpy - 배열과 수치 계산"
    - "sklearn - 머신러닝 알고리즘"
    - "train_test_split - 데이터 분리"
  - type: code
    language: python
    title: 모듈 불러오기
    description: 머신러닝에 필요한 모든 라이브러리를 불러옵니다.
    content: |-
      import pandas as pd
      import numpy as np
      from sklearn.linear_model import LinearRegression
      from sklearn.model_selection import train_test_split
      from sklearn.metrics import mean_squared_error, r2_score, mean_absolute_error, accuracy_score
      from sklearn.tree import DecisionTreeClassifier
      from sklearn.ensemble import RandomForestRegressor
  - type: tip
    content: "pip install scikit-learn pandas numpy로 설치하세요."

- id: ml_intro
  title: 머신러닝이란
  subtitle: 데이터에서 패턴 찾기
  blocks:
  - type: text
    content: 머신러닝은 컴퓨터가 데이터에서 패턴을 찾아 예측하는 기술입니다. Machine은 기계, Learning은 학습이라는 뜻으로, 기계가 스스로 학습한다는 의미입니다. 사람이 시험 공부하듯 데이터를 반복해서 보며 규칙을 스스로 찾아냅니다. 예를 들어 공부시간과 성적 데이터를 많이 보여주면, 컴퓨터는 공부시간이 늘어나면 성적도 올라간다는 패턴을 발견하고 새로운 학생의 성적을 예측할 수 있게 됩니다.
  - type: list
    items:
    - 데이터에서 자동으로 패턴 학습
    - 학습한 패턴으로 미래 값 예측
    - 데이터 분류와 그룹핑
    - 인공지능의 핵심 기술

- id: data_prepare
  title: 데이터 준비
  subtitle: 학습용 데이터 만들기
  blocks:
  - type: text
    content: 머신러닝의 첫 단계는 데이터 준비입니다. X는 입력 데이터로 Feature(특성)이라고 부르며, 예측에 사용할 정보들입니다. y는 예측할 목표값으로 Target(타겟)이라고 부릅니다. 학생의 출석률과 공부시간을 X로, 수학점수를 y로 하여 모델을 학습시키면, 새로운 학생의 출석률과 공부시간으로 성적을 예측할 수 있습니다. 데이터는 반드시 숫자 형태여야 하며, 빠진 값(결측치)이 있으면 처리해야 합니다.
  - type: list
    items:
    - "X - 입력 데이터, 특성(Feature)"
    - "y - 예측 목표, 타겟(Target)"
    - 모든 데이터는 숫자로 변환 필수
    - 결측치와 이상치 처리 필요
  - type: code
    language: python
    title: 학생 데이터 생성
    description: 출석률과 공부시간으로 수학점수를 예측할 데이터를 만듭니다.
    content: |-
      np.random.seed(42)

      prepareStudents = pd.DataFrame({
          'attendanceRate': np.round(np.random.normal(88, 8, 20), 1),
          'studyHours': np.round(np.random.normal(5, 2, 20), 1),
          'mathScore': np.round(np.random.normal(78, 12, 20), 1)
      })

      prepareStudents['attendanceRate'] = np.clip(prepareStudents['attendanceRate'], 0, 100)
      prepareStudents['studyHours'] = np.clip(prepareStudents['studyHours'], 1, 10)
      prepareStudents['mathScore'] = np.clip(prepareStudents['mathScore'], 0, 100)

      print(prepareStudents.head())

- id: linear_regression
  title: 선형회귀
  subtitle: 수치 예측하기
  blocks:
  - type: text
    content: 선형회귀는 가장 기본적인 머신러닝 알고리즘입니다. Linear는 선형, Regression은 회귀라는 뜻으로, 데이터를 직선으로 표현하여 예측합니다. y = ax + b 같은 일차 방정식을 생각하면 됩니다. fit() 메서드로 데이터를 학습시키면 모델이 최적의 기울기(coef_)와 절편(intercept_)을 찾아냅니다. 그 후 predict()로 새로운 데이터의 결과를 예측할 수 있습니다. 연속적인 숫자를 예측할 때 사용합니다.
  - type: list
    items:
    - "LinearRegression() - 선형회귀 모델 생성"
    - "fit() - 데이터로 모델 학습"
    - "predict() - 새 데이터 예측"
    - "coef_, intercept_ - 기울기와 절편"
  - type: code
    language: python
    title: 출석률로 점수 예측
    description: 출석률을 기반으로 수학 점수를 예측하는 모델을 만듭니다.
    content: |-
      np.random.seed(42)
      lrStudents = pd.DataFrame({
          'attendanceRate': np.round(np.random.normal(88, 8, 20), 1),
          'mathScore': np.round(np.random.normal(78, 12, 20), 1)
      })

      lrX = lrStudents[['attendanceRate']]
      lrY = lrStudents['mathScore']

      lrModel = LinearRegression()
      lrModel.fit(lrX, lrY)

      print(f"기울기: {lrModel.coef_[0]:.2f}")
      print(f"절편: {lrModel.intercept_:.2f}")

      lrPredictions = lrModel.predict(lrX)
      print(f"\n예측 결과 (처음 5명):")
      for i in range(5):
          print(f"  출석률 {lrX.iloc[i,0]:.1f}% -> 예상 {lrPredictions[i]:.1f}점")

- id: train_test_split
  title: 데이터 분리
  subtitle: 훈련용과 테스트용
  blocks:
  - type: text
    content: 데이터를 훈련용과 테스트용으로 나눕니다. Train은 훈련, Test는 테스트라는 뜻입니다. 전체 데이터로 학습하면 학습 데이터에만 잘 맞는 과적합이 발생할 수 있습니다. 시험에 나온 문제만 외운 것과 비슷합니다. 그래서 80%는 학습에 사용하고 20%는 숨겨두었다가 나중에 평가용으로 사용합니다. random_state는 난수 시드값으로, 같은 값을 쓰면 항상 같은 방식으로 분리됩니다.
  - type: list
    items:
    - "train_test_split() - 자동으로 데이터 분리"
    - "test_size - 테스트 비율 (보통 0.2)"
    - "random_state - 재현 가능한 분리"
    - 과적합 방지로 모델 신뢰성 향상
  - type: code
    language: python
    title: 훈련 테스트 분리
    description: 데이터를 80대20으로 나누어 모델을 평가합니다.
    content: |-
      np.random.seed(42)
      splitStudents = pd.DataFrame({
          'attendanceRate': np.round(np.random.normal(88, 8, 50), 1),
          'studyHours': np.round(np.random.normal(5, 2, 50), 1),
          'mathScore': np.round(np.random.normal(78, 12, 50), 1)
      })

      splitX = splitStudents[['attendanceRate', 'studyHours']]
      splitY = splitStudents['mathScore']

      splitXTrain, splitXTest, splitYTrain, splitYTest = train_test_split(splitX, splitY, test_size=0.2, random_state=42)

      print(f"훈련 데이터: {len(splitXTrain)}개")
      print(f"테스트 데이터: {len(splitXTest)}개")

      splitModel = LinearRegression()
      splitModel.fit(splitXTrain, splitYTrain)

      splitPredictions = splitModel.predict(splitXTest)
      splitR2 = r2_score(splitYTest, splitPredictions)
      print(f"R² 점수: {splitR2:.3f}")

- id: classification
  title: 분류 문제
  subtitle: 그룹 나누기
  blocks:
  - type: text
    content: 분류는 데이터를 미리 정해진 그룹으로 나누는 문제입니다. Classification은 분류라는 뜻으로, 회귀가 연속적인 숫자를 예측하는 것과 달리 분류는 카테고리를 예측합니다. A등급인지 B등급인지, 합격인지 불합격인지처럼 정해진 그룹 중 하나를 선택합니다. DecisionTreeClassifier는 의사결정나무라는 알고리즘으로, 질문을 반복하며 데이터를 분류합니다. accuracy_score로 얼마나 정확하게 분류했는지 측정합니다.
  - type: list
    items:
    - "DecisionTreeClassifier - 의사결정트리 분류"
    - "accuracy_score - 분류 정확도 계산"
    - 범주형 타겟 사용 (A, B, C 등)
    - 여러 클래스 동시 분류 가능
  - type: code
    language: python
    title: 성적 등급 분류
    description: 학생을 점수에 따라 A B C 등급으로 분류합니다.
    content: |-
      np.random.seed(42)
      clfStudents = pd.DataFrame({
          'attendanceRate': np.round(np.random.normal(88, 8, 50), 1),
          'studyHours': np.round(np.random.normal(5, 2, 50), 1),
          'mathScore': np.round(np.random.normal(78, 12, 50), 1)
      })

      def getGrade(score):
          if score >= 85:
              return 'A'
          elif score >= 70:
              return 'B'
          return 'C'

      clfStudents['grade'] = clfStudents['mathScore'].apply(getGrade)

      clfX = clfStudents[['attendanceRate', 'studyHours']]
      clfY = clfStudents['grade']

      clfXTrain, clfXTest, clfYTrain, clfYTest = train_test_split(clfX, clfY, test_size=0.2, random_state=42)

      clfModel = DecisionTreeClassifier(random_state=42, max_depth=3)
      clfModel.fit(clfXTrain, clfYTrain)

      clfPredictions = clfModel.predict(clfXTest)
      clfAccuracy = accuracy_score(clfYTest, clfPredictions)
      print(f"분류 정확도: {clfAccuracy:.1%}")

- id: model_evaluation
  title: 모델 평가
  subtitle: 성능 측정하기
  blocks:
  - type: text
    content: 모델의 성능을 객관적으로 평가해야 합니다. MSE는 Mean Squared Error로 평균제곱오차를 뜻하며, 예측값과 실제값의 차이를 제곱하여 평균낸 값입니다. MAE는 Mean Absolute Error로 절대값의 평균입니다. R²는 결정계수로 모델이 데이터를 얼마나 잘 설명하는지를 나타내며, 1에 가까울수록 좋습니다. 이런 지표들로 모델의 성능을 정량적으로 측정하고 비교할 수 있습니다.
  - type: list
    items:
    - "MSE - 평균제곱오차 (작을수록 우수)"
    - "MAE - 평균절대오차 (작을수록 우수)"
    - "R² - 결정계수 (1에 가까울수록 우수)"
    - "accuracy - 분류 정확도"
  - type: code
    language: python
    title: 모델 성능 평가
    description: 다양한 지표로 모델의 성능을 평가합니다.
    content: |-
      np.random.seed(42)
      evalX = np.random.rand(100, 2) * 10
      evalY = 3 * evalX[:, 0] + 2 * evalX[:, 1] + np.random.randn(100) * 2

      evalXTrain, evalXTest, evalYTrain, evalYTest = train_test_split(evalX, evalY, test_size=0.2, random_state=42)

      evalModel = LinearRegression()
      evalModel.fit(evalXTrain, evalYTrain)
      evalPredictions = evalModel.predict(evalXTest)

      evalMse = mean_squared_error(evalYTest, evalPredictions)
      evalMae = mean_absolute_error(evalYTest, evalPredictions)
      evalR2 = r2_score(evalYTest, evalPredictions)

      print(f"MSE (평균제곱오차): {evalMse:.2f}")
      print(f"MAE (평균절대오차): {evalMae:.2f}")
      print(f"R² (결정계수): {evalR2:.3f}")

- id: feature_importance
  title: 특성 중요도
  subtitle: 중요한 요소 찾기
  blocks:
  - type: text
    content: 어떤 특성이 예측에 가장 큰 영향을 미치는지 분석합니다. Feature Importance는 특성 중요도라는 뜻으로, 각 입력 변수가 예측에 얼마나 기여하는지를 수치로 나타냅니다. RandomForestRegressor는 여러 개의 의사결정나무를 결합한 앙상블 알고리즘으로, 특성 중요도를 자동으로 계산해줍니다. 중요도 합계는 항상 1이며, 중요하지 않은 특성을 제거하면 모델 성능을 개선할 수 있습니다.
  - type: list
    items:
    - "RandomForestRegressor - 랜덤포레스트 회귀"
    - "feature_importances_ - 중요도 속성"
    - 중요도 합계는 항상 1
    - 불필요한 특성 제거로 성능 개선
  - type: code
    language: python
    title: 특성 중요도 분석
    description: 어떤 요소가 성적 예측에 중요한지 확인합니다.
    content: |-
      np.random.seed(42)
      impX = np.column_stack([
          np.random.normal(88, 8, 100),
          np.random.normal(5, 2, 100),
          np.random.randint(18, 23, 100)
      ])
      impY = 0.5 * impX[:, 0] + 0.3 * impX[:, 1] + 0.2 * impX[:, 2] + np.random.randn(100) * 5

      impModel = RandomForestRegressor(n_estimators=100, random_state=42)
      impModel.fit(impX, impY)

      impFeatures = ['출석률', '공부시간', '나이']
      impImportances = impModel.feature_importances_

      print("특성 중요도:")
      for name, imp in zip(impFeatures, impImportances):
          impBar = '█' * int(imp * 20)
          print(f"  {name}: {imp:.3f} {impBar}")

- id: practical_example
  title: 실전 예측
  subtitle: 새 데이터로 예측하기
  blocks:
  - type: text
    content: 학습한 모델로 새로운 데이터의 결과를 예측합니다. 이것이 머신러닝의 핵심 목적입니다. 과거 데이터로 패턴을 학습한 후, 아직 결과를 모르는 새로운 데이터에 대해 결과를 예측할 수 있습니다. 실제 서비스에서는 신규 고객의 구매 확률, 내일 날씨, 주가 예측 등 다양한 분야에 활용됩니다. 학습 데이터와 비슷한 형태의 새 데이터를 준비하고 predict() 메서드를 호출하면 됩니다.
  - type: list
    items:
    - 새 데이터는 학습 데이터와 같은 형태
    - 학습된 모델로 predict() 호출
    - 예측 결과를 실제 의사결정에 활용
    - 모델 성능을 지속적으로 모니터링
  - type: code
    language: python
    title: 새 학생 점수 예측
    description: 새로운 학생의 정보로 성적을 예측합니다.
    content: |-
      np.random.seed(42)
      practStudents = pd.DataFrame({
          'attendanceRate': np.round(np.random.normal(88, 8, 50), 1),
          'studyHours': np.round(np.random.normal(5, 2, 50), 1),
          'mathScore': np.round(np.random.normal(78, 12, 50), 1)
      })

      practX = practStudents[['attendanceRate', 'studyHours']]
      practY = practStudents['mathScore']

      practModel = LinearRegression()
      practModel.fit(practX, practY)

      practNewStudents = pd.DataFrame({
          'attendanceRate': [95, 75, 85],
          'studyHours': [8, 3, 6]
      })

      practPredictions = practModel.predict(practNewStudents)

      print("새 학생 예측 결과:")
      for i, pred in enumerate(practPredictions):
          practAtt = practNewStudents.iloc[i]['attendanceRate']
          practHours = practNewStudents.iloc[i]['studyHours']
          print(f"  출석률 {practAtt}%, 공부 {practHours}시간 -> 예상 {pred:.1f}점")

- id: practice
  title: 30일차 복습
  subtitle: 머신러닝 미션
  blocks:
  - type: text
    content: 30일차에서 배운 머신러닝을 복습하는 미션입니다.
  - type: expansion
    title: "미션1: 데이터 준비"
    code: |-
      import numpy as np

      np.random.seed(42)
      X = np.random.rand(20, 1) * 10
      y = 2 * X.flatten() + 3 + np.random.randn(20)
      print(f"X shape: {X.shape}, y shape: {y.shape}")
  - type: expansion
    title: "미션2: 선형회귀"
    code: |-
      import numpy as np
      from sklearn.linear_model import LinearRegression

      X = np.array([[1], [2], [3], [4], [5]])
      y = np.array([2, 4, 6, 8, 10])

      model = LinearRegression()
      model.fit(X, y)
      print(f"기울기: {model.coef_[0]}")
  - type: expansion
    title: "미션3: 예측하기"
