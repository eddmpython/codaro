sections:
- id: hello_world_basic
  title: Hello World
  subtitle: 첫 번째 파이썬 프로그램
  blocks:
  - type: text
    content: print() 함수는 파이썬에서 가장 먼저 배우는 함수이자 가장 많이 사용하는 함수입니다. 괄호 안에 넣은 내용을 화면(콘솔)에 출력하며, 문자열은 반드시 따옴표로 감싸야 합니다. 큰따옴표("")와 작은따옴표('') 모두 사용 가능하며, 파이썬은 두 따옴표를 동일하게 취급합니다. 프로그래밍을 처음 배울 때 "Hello, World!"를 출력하는 것은 오랜 전통이며, 이를 통해 개발 환경이 제대로 설정되었는지 확인할 수 있습니다.
  - type: list
    items:
    - 텍스트를 화면에 표시
    - 따옴표 안의 내용을 그대로 출력
    - 프로그래밍의 첫 걸음
  - type: code
    language: python
    title: 기본 Hello World
    description: print()는 괄호 안의 내용을 화면에 출력하는 함수입니다. 문자열은 반드시 따옴표로 감싸야 하며, 큰따옴표("")와 작은따옴표('') 모두 사용 가능합니다. 파이썬은 두 따옴표를 동일하게 취급하므로 취향에 따라 선택하면 됩니다. 단, 시작과 끝 따옴표는 같은 종류여야 합니다.
    content: |-
      print("Hello, World!")
      print('Hello, World!')
  - type: tip
    content: "marimo 환경에서는 마지막 줄의 값이 자동으로 출력됩니다. 예를 들어 \"Hello, World!\"만 입력해도 결과를 볼 수 있습니다. 하지만 print()를 사용하면 여러 값을 순서대로 출력할 수 있어 더 유용합니다."
- id: hello_world_korean
  title: 한글 출력
  subtitle: 파이썬으로 한글 출력하기
  blocks:
  - type: text
    content: 파이썬 3은 유니코드를 완벽하게 지원하여 한글, 일본어, 중국어, 이모지 등 전 세계 모든 문자를 별도 설정 없이 바로 사용할 수 있습니다. 이는 파이썬 2에서 한글 사용 시 인코딩 선언이 필요했던 것과 대조적입니다. UTF-8 인코딩이 기본으로 설정되어 있어, 변수명이나 출력 내용에 한글을 자유롭게 사용할 수 있습니다. 이러한 특성 덕분에 파이썬은 비영어권 사용자들에게도 친숙한 프로그래밍 언어가 되었습니다.
  - type: list
    items:
    - UTF-8 인코딩 기본 지원
    - 한글, 중국어, 일본어 등 모든 언어 지원
    - 특별한 설정 없이 바로 사용 가능
  - type: code
    language: python
    title: 한글 출력 예시
    description: 파이썬 3은 기본적으로 UTF-8 인코딩을 사용하므로 한글, 일본어, 중국어, 이모지 등 모든 유니코드 문자를 별도 설정 없이 바로 사용할 수 있습니다. 예전 파이썬 2에서는 한글 사용 시 인코딩 선언이 필요했지만, 파이썬 3에서는 그냥 한글을 입력하면 됩니다.
    content: |-
      print("안녕하세요!")
      print("파이썬을 배워봅시다")
      print("한글도 잘 나와요")
- id: multiple_lines
  title: 여러 줄 출력
  subtitle: 한 번에 여러 줄 출력하기
  blocks:
  - type: text
    content: 프로그램에서 여러 줄의 텍스트를 출력하는 방법은 두 가지가 있습니다. 첫 번째는 print() 함수를 여러 번 호출하는 것으로, 각 print()는 자동으로 줄바꿈을 포함합니다. 두 번째는 이스케이프 시퀀스 \n(역슬래시+n)을 사용하는 것으로, 문자열 안에서 줄바꿈 위치를 지정할 수 있습니다. \n은 화면에는 보이지 않지만 그 위치에서 줄을 바꾸는 특수한 역할을 합니다. 상황에 따라 적절한 방법을 선택하면 됩니다.
  - type: list
    items:
    - print() 함수를 여러 번 호출
    - \n (줄바꿈 문자) 사용
    - 각 줄이 순서대로 출력
  - type: code
    language: python
    title: 여러 줄 출력 예시
    description: print()를 여러 번 호출하면 각각 새로운 줄에 출력됩니다. 또는 문자열 안에 \n(역슬래시+n)을 넣으면 그 위치에서 줄바꿈이 일어납니다. \n은 이스케이프 시퀀스라고 부르며, 화면에는 보이지 않지만 줄을 바꾸는 특수한 역할을 합니다. 두 방법 중 상황에 맞는 것을 선택하면 됩니다.
    content: |-
      print("첫 번째 줄")
      print("두 번째 줄")
      print("세 번째 줄")

      print("첫 번째 줄\n두 번째 줄\n세 번째 줄")
- id: multiple_values
  title: 여러 값 출력
  subtitle: 한 번에 여러 개의 값 출력하기
  blocks:
  - type: text
    content: print() 함수는 쉼표(,)로 구분하여 여러 값을 한 번에 출력할 수 있습니다. 이때 각 값 사이에는 자동으로 공백이 삽입됩니다. 문자열과 숫자 등 서로 다른 데이터 타입도 함께 출력할 수 있어 매우 편리합니다. 이 방식은 문자열 연결(+) 연산자를 사용하는 것보다 간편하며, 타입 변환을 신경 쓰지 않아도 됩니다. sep 매개변수를 사용하면 공백 대신 다른 구분자를 지정할 수도 있습니다.
  - type: list
    items:
    - 쉼표(,)로 값들을 구분
    - 자동으로 공백이 삽입됨
    - 다양한 데이터 타입 혼합 가능
  - type: code
    language: python
    title: 여러 값 출력 예시
    description: print() 함수에 쉼표(,)로 구분하여 여러 값을 전달하면, 각 값 사이에 자동으로 공백이 삽입되어 출력됩니다. 문자열, 숫자 등 서로 다른 타입의 값도 함께 출력할 수 있습니다. 이 방식은 문자열 연결(+)보다 편리하고, 타입 변환을 신경 쓰지 않아도 됩니다.
    content: |-
      print("Hello", "World", "Python")
      print("나이:", 25, "살")
      print("점수:", 95, "점", "합격!")
- id: addition
  title: 더하기 연산
  subtitle: 숫자와 문자열 더하기
  blocks:
  - type: text
    content: 더하기(+) 연산자는 피연산자의 타입에 따라 다르게 동작합니다. 숫자끼리 더하면 수학적 덧셈이 수행되고, 문자열끼리 더하면 두 문자열이 연결(concatenation)됩니다. 이를 연산자 오버로딩이라고 하며, 파이썬의 유연성을 보여주는 특징입니다. 단, 숫자와 문자열을 직접 더하면 타입 에러가 발생합니다. 이 경우 str() 함수로 숫자를 문자열로 변환하거나, print()의 쉼표 구분 방식을 사용해야 합니다.
  - type: list
    items:
    - 숫자 + 숫자 = 수학적 덧셈
    - 문자열 + 문자열 = 문자열 연결
    - 가장 기본적인 연산자
  - type: code
    language: python
    title: 더하기 연산 예시
    description: + 연산자는 피연산자의 타입에 따라 다르게 동작합니다. 숫자끼리 더하면 수학적 덧셈이 수행되고, 문자열끼리 더하면 두 문자열이 연결(concatenation)됩니다. 단, 숫자와 문자열을 직접 더하면 에러가 발생합니다. 이 경우 str() 함수로 숫자를 문자열로 변환하거나, print()의 쉼표 구분 방식을 사용해야 합니다.
    content: |-
      print(3 + 2)
      print("Hello" + "World")
      print("Python" + "3")
- id: subtraction
  title: 빼기 연산
  subtitle: 숫자 빼기 계산
  blocks:
  - type: text
    content: 빼기(-) 연산자는 왼쪽 피연산자에서 오른쪽 피연산자를 빼는 수학적 뺄셈을 수행합니다. 결과가 음수가 될 수도 있으며, 이는 완전히 정상적인 동작입니다. 정수(int)끼리 빼면 결과도 정수이고, 실수(float)가 포함되면 결과도 실수가 됩니다. 더하기 연산자와 달리, 빼기 연산자는 문자열에 사용할 수 없습니다. 문자열에서 특정 부분을 제거하려면 replace() 메서드를 사용해야 합니다.
  - type: list
    items:
    - 수학의 뺄셈과 동일
    - 음수 결과도 가능
    - 정수와 실수 모두 사용 가능
  - type: code
    language: python
    title: 빼기 연산 예시
    description: "빼기(-) 연산자는 두 숫자의 차이를 계산합니다. 왼쪽 피연산자에서 오른쪽 피연산자를 뺍니다. 결과가 음수가 될 수도 있으며, 정수(int)끼리 빼면 정수, 실수(float)가 포함되면 결과도 실수가 됩니다. 문자열에는 빼기 연산자를 사용할 수 없습니다."
    content: |-
      print(5 - 3)
      print(10 - 15)
      print(3.5 - 1.2)
- id: multiplication
  title: 곱하기 연산
  subtitle: 숫자와 문자열 곱하기
  blocks:
  - type: text
    content: 곱하기(*) 연산자도 피연산자의 타입에 따라 다르게 동작합니다. 숫자끼리 곱하면 수학적 곱셈이 수행됩니다. 문자열과 정수를 곱하면 해당 문자열이 정수만큼 반복되는데, 이 기능은 구분선이나 패턴을 만들 때 매우 유용합니다. 예를 들어 "=" * 50은 50개의 등호로 이루어진 구분선을 만듭니다. 단, 문자열끼리는 곱할 수 없고, 문자열과 실수(float)도 곱할 수 없습니다.
  - type: list
    items:
    - 숫자 * 숫자 = 수학적 곱셈
    - 문자열 * 숫자 = 문자열 반복
    - 매우 유용한 연산자
  - type: code
    language: python
    title: 곱하기 연산 예시
    description: "곱하기(*) 연산자도 피연산자 타입에 따라 다르게 동작합니다. 숫자끼리 곱하면 수학적 곱셈이 수행됩니다. 문자열과 정수를 곱하면 해당 문자열이 정수만큼 반복됩니다. 이 기능은 구분선을 만들 때 매우 유용합니다. 문자열끼리는 곱할 수 없고, 문자열과 실수도 곱할 수 없습니다."
    content: |-
      print(3 * 4)
      print("Hi" * 3)
      print("=" * 10)
- id: division
  title: 나누기 연산
  subtitle: 일반 나누기와 정수 나누기
  blocks:
  - type: text
    content: 파이썬에는 세 가지 나누기 관련 연산자가 있습니다. 일반 나누기(/)는 결과가 항상 실수(float)로 반환됩니다. 정수 나누기(//)는 소수점 이하를 버린 몫만 반환하며, floor division이라고도 합니다. 나머지 연산자(%)는 나눗셈의 나머지를 반환합니다. 이 세 연산자를 조합하면 몫과 나머지를 모두 구할 수 있어, 시간 변환이나 자릿수 분리 등에 유용합니다. 0으로 나누면 ZeroDivisionError가 발생합니다.
  - type: list
    items:
    - '/ : 일반 나누기 (실수 결과)'
    - '// : 정수 나누기 (몫만)'
    - '% : 나머지 연산자'
  - type: code
    language: python
    title: 나누기 연산 예시
    description: / 연산자는 일반 나누기로, 결과가 항상 실수(float)입니다. 7/2는 3.5가 됩니다. // 연산자는 정수 나누기(floor division)로, 소수점 이하를 버린 몫만 반환합니다. 7//2는 3이 됩니다. % 연산자는 나머지(modulo)를 반환합니다. 7%2는 1이 됩니다. 이 세 연산자를 조합하면 몫과 나머지를 모두 구할 수 있습니다.
    content: |-
      print(7 / 2)
      print(7 // 2)
      print(7 % 2)
- id: exponentiation
  title: 거듭제곱 연산
  subtitle: 제곱과 거듭제곱 계산
  blocks:
  - type: text
    content: 거듭제곱(**) 연산자는 지수 계산을 수행합니다. a**b는 a를 b번 곱한 값으로, 수학에서 a^b 또는 a의 b제곱으로 표기하는 것과 같습니다. 2**3은 2×2×2=8이고, 5**2는 5×5=25입니다. 0이 아닌 모든 수의 0제곱은 1이며, 음수 지수도 가능합니다. 예를 들어 2**-1은 0.5(1/2)가 됩니다. 제곱근을 구할 때도 사용할 수 있는데, 9**0.5는 3(9의 제곱근)입니다.
  - type: list
    items:
    - '** 기호 사용'
    - 제곱, 세제곱 등 계산
    - 수학의 지수 표현
  - type: code
    language: python
    title: 거듭제곱 연산 예시
    description: "거듭제곱(**) 연산자는 지수를 계산합니다. a**b는 a를 b번 곱한 값입니다. 2**3은 2×2×2=8, 5**2는 5×5=25입니다. 수학에서 2³, 5²로 표기하는 것과 같습니다. 참고로 0이 아닌 어떤 수의 0제곱은 항상 1입니다. 음수 지수도 가능하며, 2**-1은 0.5(1/2)가 됩니다."
    content: |-
      print(2 ** 3)
      print(5 ** 2)
      print(10 ** 0)
- id: data_types_numbers
  title: 숫자 데이터 타입
  subtitle: 정수와 실수 구분하기
  blocks:
  - type: text
    content: 파이썬은 숫자를 정수(int)와 실수(float)로 구분합니다. 정수는 소수점이 없는 숫자(1, 100, -5)이고, 실수는 소수점이 있는 숫자(3.14, 2.0, -1.5)입니다. 흥미롭게도 2.0처럼 소수점 이하가 0이어도 소수점이 있으면 실수입니다. 파이썬은 정수와 실수를 연산할 때 자동으로 실수로 변환합니다. 예를 들어 3 + 2.0은 5.0이 됩니다.
  - type: list
    items:
    - 'int: 정수 (1, 2, 100, -5)'
    - 'float: 실수 (3.14, 2.5, -1.2)'
    - 자동 타입 변환 지원
  - type: code
    language: python
    title: 숫자 타입 예시
    description: 소수점이 없는 숫자는 정수(int), 소수점이 있는 숫자는 실수(float)입니다. 2.0처럼 소수점 이하가 0이어도 소수점이 있으면 실수입니다. 파이썬은 정수와 실수를 연산할 때 자동으로 실수로 변환합니다.
    content: |-
      print(10)
      print(3.14)
      print(-5)
      print(2.0)
- id: data_types_strings
  title: 문자열 데이터 타입
  subtitle: 텍스트 데이터 다루기
  blocks:
  - type: text
    content: 문자열(str)은 텍스트 데이터를 저장하는 타입으로, 따옴표로 감싸서 생성합니다. 큰따옴표("")와 작은따옴표('') 모두 사용 가능하며, 파이썬은 이 둘을 동일하게 취급합니다. 문자열 안에 따옴표를 포함해야 할 때는 다른 종류의 따옴표로 감싸면 됩니다. 예를 들어 "I'm happy"처럼 작은따옴표를 포함할 때는 큰따옴표로, 'He said "Hi"'처럼 큰따옴표를 포함할 때는 작은따옴표로 감쌉니다. 또는 역슬래시(\)로 이스케이프할 수도 있습니다.
  - type: list
    items:
    - 작은따옴표 또는 큰따옴표 사용
    - 한글, 영어, 숫자, 특수문자 포함
    - 문자열 안에 따옴표 사용 가능
  - type: code
    language: python
    title: 문자열 생성 방법
    description: 문자열(str)은 따옴표로 감싼 텍스트입니다. 큰따옴표("")와 작은따옴표('') 모두 사용 가능합니다. 문자열 안에 따옴표를 포함해야 할 때는 다른 종류의 따옴표로 감싸면 됩니다.
    content: |-
      print("Hello")
      print('Python')
      print("I'm happy")
      print('He said "Hi"')
- id: data_types_boolean
  title: 불린 데이터 타입
  subtitle: 참과 거짓 표현하기
  blocks:
  - type: text
    content: 불린(bool)은 참(True)과 거짓(False) 두 가지 값만 가질 수 있는 데이터 타입입니다. 주의할 점은 반드시 첫 글자가 대문자여야 합니다. true나 FALSE는 에러가 발생합니다. 불린은 주로 조건문(if문)에서 사용되며, 비교 연산(3 > 2)의 결과도 불린입니다. 숫자로 변환하면 True는 1, False는 0이 됩니다. 반대로 숫자를 불린으로 변환하면 0만 False이고 나머지 모든 숫자는 True가 됩니다.
  - type: list
    items:
    - 'True: 참 (첫 글자 대문자)'
    - 'False: 거짓 (첫 글자 대문자)'
    - 조건문에서 주로 사용
  - type: code
    language: python
    title: 불린 값 사용
    description: bool(불린) 타입은 True와 False 두 가지 값만 가집니다. 주의할 점은 반드시 첫 글자가 대문자여야 합니다. true나 FALSE는 에러가 발생합니다. 불린은 조건문(if문)에서 주로 사용됩니다.
    content: |-
      print(True)
      print(False)
      print(3 > 2)
      print(5 < 3)
- id: variables_basic
  title: 변수 기초
  subtitle: 데이터를 저장하는 상자
  blocks:
  - type: text
    content: 변수는 데이터를 저장하는 이름표(또는 상자)입니다. 등호(=)를 사용해 변수에 값을 할당하며, 이를 대입 또는 할당이라고 합니다. name = "김철수"는 "김철수"라는 문자열을 name이라는 변수에 저장한다는 의미입니다. 이후 name을 사용하면 저장된 값을 가져옵니다. 변수를 사용하면 같은 값을 여러 번 입력하지 않아도 되고, 값을 한 곳에서만 변경하면 되므로 유지보수가 쉬워집니다.
  - type: list
    items:
    - 데이터를 메모리에 저장
    - 의미있는 이름으로 관리
    - 언제든지 값 변경 가능
  - type: code
    language: python
    title: 변수 만들고 사용하기
    description: 변수는 값을 저장하는 이름표입니다. 등호(=)를 사용해 변수에 값을 할당합니다. name = "김철수"는 "김철수"라는 문자열을 name이라는 변수에 저장한다는 의미입니다. 이후 name을 사용하면 저장된 값 "김철수"를 가져옵니다. 변수를 사용하면 같은 값을 여러 번 입력하지 않아도 되고, 값을 쉽게 변경할 수 있습니다.
    content: |-
      name = "김철수"
      age = 20
      print(name)
      print(age)
- id: variables_naming
  title: 변수 이름 규칙
  subtitle: 올바른 변수명 만들기
  blocks:
  - type: text
    content: 파이썬에서 변수명을 정할 때는 몇 가지 규칙을 지켜야 합니다. 변수명은 영문자, 숫자, 밑줄(_)만 사용할 수 있으며, 반드시 문자나 밑줄로 시작해야 합니다. 숫자로 시작하면 안 됩니다(2name은 불가). if, for, class 같은 파이썬 예약어는 변수명으로 사용할 수 없습니다. 파이썬은 대소문자를 구분하므로 name과 Name은 다른 변수입니다. 의미 있는 이름을 사용하면 코드를 이해하기 쉬워집니다.
  - type: list
    items:
    - 영문자, 숫자, 밑줄(_)만 사용
    - 숫자로 시작하면 안됨
    - 예약어(if, for 등) 사용 금지
    - 대소문자 구분함
  - type: code
    language: python
    title: 올바른 변수명 예시
    description: 변수명은 영문자, 숫자, 밑줄(_)만 사용할 수 있습니다. 반드시 문자나 밑줄로 시작해야 하며, 숫자로 시작하면 안 됩니다(2name은 불가). if, for, class 같은 파이썬 예약어는 변수명으로 사용할 수 없습니다. name과 Name은 다른 변수입니다(대소문자 구분). 의미 있는 이름을 사용하면 코드를 이해하기 쉬워집니다.
    content: |-
      studentName = "김철수"
      age = 20
      totalScore = 95
- id: comments_single
  title: 한 줄 주석
  subtitle: 코드에 설명 추가하기
  blocks:
  - type: text
    content: 주석은 코드에 설명을 추가하는 방법으로, 파이썬이 실행하지 않습니다. 해시(#) 기호 뒤의 내용은 그 줄의 끝까지 주석으로 처리됩니다. 주석은 코드의 동작을 설명하거나 메모를 남길 때 사용합니다. 코드 앞에 #을 붙여 전체 줄을 주석으로 만들거나, 코드 뒤에 #을 붙여 인라인 주석을 작성할 수 있습니다. 좋은 주석은 코드가 "무엇을" 하는지보다 "왜" 그렇게 동작하는지 설명합니다.
  - type: list
    items:
    - '# 기호로 시작'
    - 해당 줄의 끝까지 주석
    - 코드 설명이나 메모 작성
  - type: code
    language: python
    title: 한 줄 주석 사용법
    description: '#(해시) 기호 뒤의 내용은 주석으로 처리되어 파이썬이 실행하지 않습니다. 주석은 코드의 동작을 설명하거나 메모를 남길 때 사용합니다. 코드 앞에 #을 붙여 전체 줄을 주석으로 만들거나, 코드 뒤에 #을 붙여 인라인 주석을 작성할 수 있습니다. 좋은 주석은 코드가 "왜" 그렇게 동작하는지 설명합니다.'
    content: |-
      print("Hello")

      name = "김철수"
- id: comments_multi
  title: 여러 줄 주석
  subtitle: 긴 설명을 위한 주석
  blocks:
  - type: text
    content: 여러 줄에 걸친 설명이 필요할 때는 세 개의 따옴표(""" 또는 ''')를 사용합니다. 엄밀히 말하면 이것은 문자열이지만, 변수에 할당하지 않으면 실행 결과에 영향을 주지 않아 주석과 같은 효과를 냅니다. 함수나 클래스의 맨 앞에 작성하면 docstring이 되어 help() 함수로 조회할 수 있는 문서가 됩니다. 긴 설명이나 임시로 코드 블록을 비활성화할 때 유용합니다.
  - type: list
    items:
    - 트리플 따옴표 사용 (큰따옴표 또는 작은따옴표 3개)
    - 여러 줄에 걸친 설명 가능
    - 함수나 클래스 설명에 주로 사용
  - type: code
    language: python
    title: 여러 줄 주석 사용법
    description: 세 개의 따옴표(""" 또는 ''')로 감싸면 여러 줄에 걸친 문자열을 만들 수 있습니다. 이를 주석처럼 사용할 수 있습니다. 엄밀히 말하면 이것은 문자열이지만, 변수에 할당하지 않으면 실행 결과에 영향을 주지 않아 주석과 같은 효과를 냅니다. 함수나 클래스의 맨 앞에 쓰면 docstring이 되어 문서화에 활용됩니다.
    content: |-
      """
      이것은 여러 줄 주석입니다.
      프로그램에 대한 자세한 설명을
      여러 줄에 걸쳐 작성할 수 있습니다.
      """

      print("Hello, World!")

- id: mission
  title: 실습 미션
  subtitle: 배운 내용을 활용해보세요
  blocks:
  - type: text
    content: 오늘 배운 print(), 연산자, 데이터 타입, 변수, 주석을 활용하는 미션입니다.
  - type: expansion
    title: "미션1: 자기소개 프로그램 만들기"
    code: |-
      name = "홍길동"
      age = 25
      job = "개발자"
      print("이름:", name)
      print("나이:", age, "살")
      print("직업:", job)
  - type: expansion
    title: "미션2: 사칙연산 계산기"
    code: |-
      a = 15
      b = 4
      print("더하기:", a + b)
      print("빼기:", a - b)
      print("곱하기:", a * b)
      print("나누기:", a / b)
      print("몫:", a // b)
      print("나머지:", a % b)
  - type: expansion
    title: "미션3: 원의 넓이 계산"
    code: |-
      radius = 5
      pi = 3.14159
      area = pi * radius ** 2
      print("반지름:", radius)
      print("원의 넓이:", area)
  - type: expansion
    title: "미션4: 문자열 반복으로 패턴 만들기"
    code: |-
      print("*" * 10)
      print("*" * 5)
      print("*" * 10)
      print("=" * 20)
