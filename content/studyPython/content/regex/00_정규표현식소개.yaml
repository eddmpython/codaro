          description: "정규표현식 퍼즐 게임으로 재미있게 학습"

- id: common_mistakes
  blocks:
    - type: sectionHeader
      title: "⚠️ 흔한 실수"
      subtitle: "초보자가 자주 하는 실수들"

    - type: table
      headers: ["실수", "문제", "해결"]
      rows:
        - ["특수문자 이스케이프 안 함", ". 이 모든 문자 매칭", "\\. 으로 이스케이프"]
        - ["탐욕적 매칭", ".* 가 너무 많이 매칭", ".*? 비탐욕적 사용"]
        - ["플래그 미사용", "대소문자 구분으로 놓침", "re.IGNORECASE 사용"]
        - ["그룹 번호 혼동", "\\1, \\2 순서 틀림", "(?P<name>) 이름 사용"]
        - ["패턴 검증 안 함", "예상치 못한 매칭", "regex101에서 테스트"]

    - type: note
      style: warning
      title: "처음엔 어렵습니다"
      content: "정규표현식은 암호처럼 보일 수 있습니다. 하지만 10개 프로젝트를 따라하다 보면 자연스럽게 익숙해집니다. 포기하지 마세요!"

