meta:
  id: regex_06
  title: 날짜형식변환
  order: 6
  category: regex
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["날짜", "형식 변환", "compile", "복잡한 패턴", "정규화"]
  seo:
    title: "정규표현식 중급 - 날짜 형식 변환"
    description: "정규표현식으로 다양한 날짜 형식을 YYYY-MM-DD로 통일합니다. re.compile, 복잡한 패턴 조합을 배웁니다."
    keywords: ["정규표현식", "regex", "날짜 파싱", "re.compile", "형식 변환"]

intro:
  emoji: "📅"
  goal: 10가지 날짜 형식을 YYYY-MM-DD로 통일합니다.
  description: 실무에서 가장 골치아픈 작업 중 하나가 날짜 형식 통일입니다. 여러 패턴을 조합하고 re.compile로 최적화하는 방법을 배웁니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: 정규표현식 모듈
    content: |-
      import re

- id: step2_date_formats
  title: 2단계. 다양한 날짜 형식 확인
  subtitle: 실제 데이터의 혼란
  blocks:
  - type: text
    content: 실제 데이터에서는 날짜가 온갖 형식으로 저장되어 있습니다. 미국식(MM/DD/YYYY), 유럽식(DD.MM.YYYY), 아시아식(YYYY-MM-DD), 한국어(2024년 1월 1일), 영문 월명(Jan 1, 2024) 등 다양한 형식이 혼재합니다. 이런 데이터를 분석하거나 DB에 저장하려면 반드시 형식을 통일해야 합니다.
  - type: code
    language: python
    title: 날짜 샘플 데이터
    description: 10가지 다른 형식의 날짜
    content: |-
      mixedDates = """
      생년월일: 1990-12-25
      입사일: 2020/03/15
      계약일: 12.05.2023
      만료일: 25-12-2025
      등록일: Dec 25, 2024
      방문일: 2024년 11월 30일
      신청일: 15/08/2023
      발행일: 2023-7-9
      갱신일: 2024.1.5
      종료일: 31 Dec 2025
      """
      mixedDates
  - type: text
    content: "YYYY-MM-DD, YYYY/MM/DD, DD.MM.YYYY, 영문 월 등 10가지 형식이 섞여 있습니다. ISO 8601 표준인 YYYY-MM-DD 형식으로 통일하면 정렬, 비교, 저장이 모두 쉬워집니다. 하나씩 패턴을 만들어 변환해봅시다."

- id: step3_pattern1_yyyymmdd
  title: 3단계. YYYY-MM-DD 형식 처리
  subtitle: 가장 표준적인 형식
  blocks:
  - type: text
    content: 먼저 이미 표준 형식인 YYYY-MM-DD 날짜들을 찾습니다. 변환이 필요 없는 데이터를 먼저 확인하면 어떤 형식들을 추가로 처리해야 하는지 파악할 수 있습니다. 수량자 {1,2}를 사용하면 한 자리 월/일도 매칭할 수 있습니다.
  - type: code
    language: python
    title: YYYY-MM-DD 패턴
    description: 하이픈으로 구분된 날짜
    content: |-
      pattern = r"\d{4}-\d{1,2}-\d{1,2}"

      matches = re.findall(pattern, mixedDates)
      matches
  - type: note
    style: tip
    title: 수량자 사용 이유
    content: |-
      **패턴: \\d{1,2}**
      - `\d{2}` : 정확히 2자리 (01, 02, 12만 매칭)
      - `\d{1,2}` : 1~2자리 (1, 9, 01, 12 모두 매칭)

      실제 데이터는 선행 0이 없을 수 있으므로 {1,2} 사용!

- id: step4_pattern2_slash
  title: 4단계. 슬래시(/) 형식 처리
  subtitle: YYYY/MM/DD 변환
  blocks:
  - type: text
    content: 슬래시로 구분된 날짜를 하이픈으로 변환합니다. YYYY/MM/DD 형식은 연도가 앞에 있어 순서는 같고 구분자만 바꾸면 됩니다. 그룹 캡처 후 동일한 순서로 재조합하되 구분자를 하이픈으로 변경합니다.
  - type: code
    language: python
    title: 슬래시 형식 변환
    description: YYYY/MM/DD → YYYY-MM-DD
    content: |-
      pattern = r"(\d{4})/(\d{1,2})/(\d{1,2})"
      replacement = r"\1-\2-\3"

      result = re.sub(pattern, replacement, "입사일: 2020/03/15")
      result
  - type: text
    content: "2020/03/15 → 2020-03-15 로 변환되었습니다!"

- id: step5_pattern3_dotdmy
  title: 5단계. DD.MM.YYYY 형식 처리
  subtitle: 유럽식 날짜 순서 변경
  blocks:
  - type: text
    content: 유럽에서 많이 쓰는 DD.MM.YYYY 형식은 일-월-년 순서입니다. YYYY-MM-DD로 변환하려면 그룹의 순서를 역순으로 바꿔야 합니다. 치환 문자열에서 \\3-\\2-\\1처럼 그룹 순서를 바꿔 참조하면 됩니다.
  - type: code
    language: python
    title: DD.MM.YYYY → YYYY-MM-DD
    description: 일/월/년 순서를 년-월-일로 변경
    content: |-
      pattern = r"(\d{1,2})\.(\d{1,2})\.(\d{4})"
      replacement = r"\3-\2-\1"

      result = re.sub(pattern, replacement, "계약일: 12.05.2023")
      result
  - type: note
    style: tip
    title: "그룹 순서 바꾸기"
    content: |-
      - 원본: `(\d{1,2})\.(\d{1,2})\.(\d{4})` → 그룹 1, 2, 3
      - 치환: `\3-\2-\1` → 그룹 3, 2, 1 순서로 재배치

      날짜 순서를 바꿀 때 매우 유용합니다!

- id: step6_multiple_patterns
  title: 6단계. 여러 패턴 한 번에 처리
  subtitle: 순차적 치환
  blocks:
  - type: text
    content: 모든 패턴을 함수로 만들어 순차적으로 적용합니다.
  - type: code
    language: python
    title: 날짜 정규화 함수
    description: 여러 형식을 YYYY-MM-DD로 변환
    content: |-
      def normalizeDates(text):
          text = re.sub(r"(\d{4})/(\d{1,2})/(\d{1,2})", r"\1-\2-\3", text)

          text = re.sub(r"(\d{1,2})\.(\d{1,2})\.(\d{4})", r"\3-\2-\1", text)

          text = re.sub(r"(\d{1,2})-(\d{1,2})-(\d{4})", r"\3-\2-\1", text)

          text = re.sub(r"(\d{4})\.(\d{1,2})\.(\d{1,2})", r"\1-\2-\3", text)

          text = re.sub(r"(\d{1,2})/(\d{1,2})/(\d{4})", r"\3-\2-\1", text)

          return text

      result = normalizeDates(mixedDates)
      result[:300]

- id: step7_compile_pattern
  title: 7단계. re.compile로 최적화
  subtitle: 패턴 재사용
  blocks:
  - type: text
    content: 같은 패턴을 여러 번 사용할 때는 re.compile로 미리 컴파일하면 성능이 향상됩니다.
  - type: code
    language: python
    title: 패턴 컴파일
    description: 자주 쓰는 패턴을 미리 컴파일
    content: |-
      slashPattern = re.compile(r"(\d{4})/(\d{1,2})/(\d{1,2})")
      dotPattern = re.compile(r"(\d{1,2})\.(\d{1,2})\.(\d{4})")

      text = "입사: 2020/03/15, 계약: 12.05.2023"

      text = slashPattern.sub(r"\1-\2-\3", text)
      text = dotPattern.sub(r"\3-\2-\1", text)
      text
  - type: note
    style: tip
    title: "re.compile() 사용 이유"
    content: |-
      **re.compile(패턴)**:
      - 패턴을 미리 컴파일하여 Pattern 객체 생성
      - 같은 패턴을 여러 번 사용할 때 성능 향상 (30~50% 빠름)
      - `.sub()`, `.findall()`, `.search()` 등 메서드 사용

      ```python
      pattern = re.compile(r"\d+")
      pattern.findall(text)
      pattern.sub("X", text)
      ```

- id: step8_month_names
  title: 8단계. 영문 월 이름 처리
  subtitle: Dec → 12 변환
  blocks:
  - type: text
    content: "\"Dec 25, 2024\" 같은 영문 날짜를 숫자로 변환합니다."
  - type: code
    language: python
    title: 월 이름 매핑
    description: 영문 월을 숫자로 변환하는 딕셔너리
    content: |-
      monthMap = {
          "Jan": "01", "Feb": "02", "Mar": "03", "Apr": "04",
          "May": "05", "Jun": "06", "Jul": "07", "Aug": "08",
          "Sep": "09", "Oct": "10", "Nov": "11", "Dec": "12"
      }
  - type: code
    language: python
    title: 영문 날짜 변환
    description: Dec 25, 2024 → 2024-12-25
    content: |-
      def convertEnglishDate(match):
          month = match.group(1)
          day = match.group(2)
          year = match.group(3)
          return f"{year}-{monthMap[month]}-{day.zfill(2)}"

      pattern = re.compile(r"(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) (\d{1,2}), (\d{4})")

      result = pattern.sub(convertEnglishDate, "등록일: Dec 25, 2024")
      result
  - type: note
    style: tip
    title: "함수를 치환 인자로 사용"
    content: |-
      `re.sub(패턴, 함수, 텍스트)`:
      - 두 번째 인자로 문자열 대신 함수 전달 가능
      - 함수는 Match 객체를 받아 치환할 문자열 반환
      - 복잡한 변환 로직 구현 가능

- id: step9_complete_converter
  title: 9단계. 완성된 날짜 변환기
  subtitle: 모든 형식 처리
  blocks:
  - type: text
    content: 배운 모든 패턴을 합쳐 완성된 변환기를 만듭니다.
  - type: code
    language: python
    title: 완전한 날짜 변환 함수
    description: 모든 날짜 형식을 YYYY-MM-DD로 통일
    content: |-
      def convertAllDates(text):
          text = re.sub(r"(\d{4})/(\d{1,2})/(\d{1,2})", r"\1-\2-\3", text)
          text = re.sub(r"(\d{1,2})\.(\d{1,2})\.(\d{4})", r"\3-\2-\1", text)
          text = re.sub(r"(\d{1,2})-(\d{1,2})-(\d{4})", r"\3-\2-\1", text)
          text = re.sub(r"(\d{4})\.(\d{1,2})\.(\d{1,2})", r"\1-\2-\3", text)
          text = re.sub(r"(\d{1,2})/(\d{1,2})/(\d{4})", r"\3-\2-\1", text)

          def convertMonth(match):
              monthMap = {"Jan":"01","Feb":"02","Mar":"03","Apr":"04","May":"05","Jun":"06","Jul":"07","Aug":"08","Sep":"09","Oct":"10","Nov":"11","Dec":"12"}
              return f"{match.group(3)}-{monthMap[match.group(1)]}-{match.group(2).zfill(2)}"

          text = re.sub(r"(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) (\d{1,2}), (\d{4})", convertMonth, text)

          text = re.sub(r"(\d{4})년 (\d{1,2})월 (\d{1,2})일", r"\1-\2-\3", text)

          return text

      result = convertAllDates(mixedDates)
      result

- id: step10_extract_dates
  title: 10단계. 날짜만 추출
  subtitle: 최종 결과 확인
  blocks:
  - type: text
    content: 변환된 텍스트에서 표준 형식의 날짜만 추출합니다.
  - type: code
    language: python
    title: 표준 날짜 추출
    description: YYYY-MM-DD 형식 날짜만 찾기
    content: |-
      converted = convertAllDates(mixedDates)
      standardDates = re.findall(r"\d{4}-\d{1,2}-\d{1,2}", converted)
      standardDates
  - type: text
    content: "모든 날짜가 YYYY-MM-DD 형식으로 통일되었습니다!"

- id: practice
  title: 실습
  subtitle: 날짜 변환 프로젝트
  blocks:
  - type: text
    content: 데이터 정제 담당자가 되어 다양한 형식의 데이터를 통일합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 12시간제를 24시간제로 변환"
    blocks:
    - type: code
      title: "시간 변환 함수"
      content: |-
        import re

        text = """
        회의: 2:30 PM
        점심: 12:00 PM
        기상: 7:15 AM
        취침: 11:45 PM
        """

        def convert(match):
            h = int(match.group(1))
            m = match.group(2)
            p = match.group(3)
            if p == "PM" and h != 12:
                h += 12
            elif p == "AM" and h == 12:
                h = 0
            return f"{h:02d}:{m}"

        pat = re.compile(r"(\d{1,2}):(\d{2}) (AM|PM)")
        result = pat.sub(convert, text)
        result
  - type: expansion
    title: "미션2: 날짜 형식 통일"
    blocks:
    - type: code
      title: "날짜 변환 함수"
      content: |-
        import re

        raw = """
        생년월일: 1990/12/25
        입사일: 12.05.2023
        방문일: 2024년 11월 30일
        """

        def normalize(text):
            text = re.sub(r"(\d{4})/(\d{1,2})/(\d{1,2})", r"\1-\2-\3", text)
            text = re.sub(r"(\d{1,2})\.(\d{1,2})\.(\d{4})", r"\3-\2-\1", text)
            text = re.sub(r"(\d{4})년 (\d{1,2})월 (\d{1,2})일", r"\1-\2-\3", text)
            return text

        normalize(raw)
    - type: code
      title: "표준 날짜 추출"
      content: |-
        out = normalize(raw)
        dates = re.findall(r"\d{4}-\d{1,2}-\d{1,2}", out)
        dates

- id: summary
  title: 정리
  subtitle: 여섯 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 re.compile과 함수 치환을 배웠습니다. 다양한 날짜 형식을 통일된 형식으로 변환할 수 있습니다.
  - type: list
    items:
    - "re.compile() - 패턴 미리 컴파일"
    - "re.sub(패턴, 함수) - 함수로 치환"
    - "\\d{1,2} - 1~2자리 숫자"
    - "\\3-\\2-\\1 - 그룹 순서 변경"
  - type: text
    content: 다음 프로젝트에서는 개인정보를 자동으로 마스킹하는 방법을 배웁니다!
