meta:
  id: regex_02
  title: 전화번호형식통일
  order: 2
  category: regex
  difficulty: "⭐"
  badge: 입문
  tags: ["전화번호", "그룹", "sub", "치환", "형식 변환", "JSONPlaceholder"]
  seo:
    title: "정규표현식 입문 - 전화번호 형식 통일"
    description: "정규표현식으로 다양한 전화번호 형식을 통일합니다. 그룹 캡처, re.sub, 형식 변환을 배웁니다."
    keywords: ["정규표현식", "regex", "전화번호", "re.sub", "그룹 캡처", "형식 변환"]

intro:
  emoji: "📱"
  goal: 다양한 형식의 전화번호를 010-XXXX-XXXX 형태로 통일합니다.
  description: 이전 프로젝트에서 배운 패턴 매칭에 이어, 이번엔 텍스트 치환을 배웁니다. 그룹 캡처로 원하는 부분만 추출하고, re.sub로 형식을 변환합니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: 이전 프로젝트와 동일하게 re 모듈과 데이터 로드 모듈을 불러옵니다. 이번 프로젝트에서는 단순 추출이 아닌 텍스트 치환을 배우게 됩니다. re.sub() 함수를 사용하면 패턴과 일치하는 부분을 원하는 형식으로 변환할 수 있어, 데이터 정제 작업에 핵심적으로 사용됩니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: 정규표현식과 데이터 로드를 위한 모듈
    content: |-
      import re
      import json
      from pyodide.http import open_url

- id: step2_load
  title: 2단계. 데이터 불러오기
  subtitle: JSONPlaceholder API
  blocks:
  - type: text
    content: 이전 프로젝트에서 사용한 동일한 사용자 데이터를 가져옵니다. JSONPlaceholder의 사용자 데이터에는 다양한 형식의 전화번호가 포함되어 있어 형식 통일 실습에 적합합니다. 실무에서도 고객 데이터, 영업 리드 등에서 이런 형식 불일치 문제를 자주 만나게 됩니다.
  - type: code
    language: python
    title: 데이터 로드
    description: 사용자 데이터를 가져옵니다
    content: |-
      usersData = json.loads(
          open_url("https://jsonplaceholder.typicode.com/users").read()
      )

- id: step3_explore
  title: 3단계. 전화번호 형식 탐색
  subtitle: 다양한 형식 확인
  blocks:
  - type: text
    content: 실제 데이터에는 전화번호가 여러 형식으로 저장되어 있습니다. 하이픈으로 구분된 형식, 마침표로 구분된 형식, 괄호가 포함된 형식, 확장번호가 붙은 형식 등 다양합니다. 정규표현식으로 이런 모든 형식을 하나로 통일하려면 먼저 어떤 패턴들이 있는지 파악해야 합니다.
  - type: code
    language: python
    title: 전화번호 샘플 확인
    description: 첫 5명의 전화번호를 확인합니다
    content: |-
      phones = [user['phone'] for user in usersData[:5]]
      phones
  - type: text
    content: |-
      확인된 형식들:
      - `1-770-736-8031 x56442` (하이픈 + 확장번호)
      - `010.692.6593 x09125` (마침표 + 확장번호)
      - `(254)954-1289` (괄호 + 하이픈)
      - `(775)976-6794 x41206` (괄호 + 확장번호)

      우리의 목표: 모두 `010-XXXX-XXXX` 형식으로 통일

- id: step4_pattern_with_groups
  title: 4단계. 그룹으로 패턴 만들기
  subtitle: ( ) 로 부분 캡처
  blocks:
  - type: text
    content: 전화번호의 각 부분을 그룹으로 나누어 캡처합니다. 그룹은 소괄호 ( )로 만들며, 캡처된 내용은 나중에 치환할 때 재사용할 수 있습니다. 예를 들어 첫 번째 그룹은 \1, 두 번째 그룹은 \2로 참조합니다. 이 기능이 정규표현식을 단순 검색에서 강력한 변환 도구로 만들어줍니다.
  - type: code
    language: python
    title: 테스트 텍스트 준비
    description: 다양한 전화번호 형식을 테스트합니다
    content: |-
      testText = """
      1-770-736-8031 x56442
      010.692.6593 x09125
      (254)954-1289
      (775)976-6794 x41206
      """
  - type: code
    language: python
    title: 그룹 패턴 작성
    description: 전화번호를 3개 그룹으로 나눕니다
    content: |-
      pattern = r"[\(]?(\d{3})[\)\-\.]?[\s\-\.]?(\d{3,4})[\-\.](\d{4})"

      matches = re.findall(pattern, testText)
      matches
  - type: note
    style: tip
    title: 패턴 해석
    content: |-
      **패턴: [\\(]?(\\d{3})[\\)\\-\\.]?**
      - `[\(]?` : 괄호 ( 가 있을 수도 없을 수도 (? = 0 또는 1개)
      - `(\d{3})` : **그룹 1** - 숫자 정확히 3개
      - `[\)\-\.]?` : 괄호 ), 하이픈, 마침표 중 하나가 0 또는 1개
      - `(\d{3,4})` : **그룹 2** - 숫자 3~4개
      - `[\-\.]` : 하이픈 또는 마침표
      - `(\d{4})` : **그룹 3** - 숫자 정확히 4개

      확장번호(x56442)는 무시됩니다.
  - type: text
    content: "findall은 패턴에 그룹이 있으면 전체 매칭이 아닌 그룹만 튜플로 반환합니다. 예를 들어 ('770', '736', '8031')처럼 각 그룹의 내용만 추출됩니다. 이 특성을 이용하면 복잡한 텍스트에서 원하는 부분만 정확하게 추출할 수 있습니다."

- id: step5_format_conversion
  title: 5단계. re.sub로 형식 변환
  subtitle: 치환과 그룹 참조
  blocks:
  - type: text
    content: re.sub는 패턴과 일치하는 부분을 다른 텍스트로 치환합니다. 치환 문자열에서 그룹을 참조할 때는 \\1, \\2, \\3을 사용합니다. 이 기능을 활용하면 원본 텍스트의 일부를 유지하면서 형식만 변경할 수 있어, 데이터 정규화 작업에 매우 유용합니다.
  - type: code
    language: python
    title: 형식 통일
    description: 모든 전화번호를 010-XXXX-XXXX 형식으로 변환
    content: |-
      pattern = r"[\(]?(\d{3})[\)\-\.]?[\s\-\.]?(\d{3,4})[\-\.](\d{4})"
      replacement = r"\1-\2-\3"

      cleanedText = re.sub(pattern, replacement, testText)
      cleanedText
  - type: note
    style: tip
    title: "re.sub(패턴, 치환문자열, 텍스트)"
    content: |-
      - 패턴과 일치하는 모든 부분을 치환문자열로 교체합니다
      - `\1`, `\2`, `\3` : 각각 그룹 1, 2, 3을 참조
      - `r"\1-\2-\3"` → 첫번째그룹-두번째그룹-세번째그룹
  - type: text
    content: 모든 전화번호가 통일된 형식으로 변환되었습니다. 하이픈, 마침표, 괄호 등 다양한 구분자가 모두 하이픈으로 통일되었고, 숫자는 그대로 유지되었습니다. 이처럼 그룹 캡처와 re.sub를 조합하면 복잡한 형식 변환도 간단하게 처리할 수 있습니다.

- id: step6_clean_extension
  title: 6단계. 확장번호 제거
  subtitle: 추가 정제
  blocks:
  - type: text
    content: 확장번호(x56442 같은 부분)도 함께 제거하면 더 깔끔합니다. 공백 + x + 숫자 패턴을 찾아서 빈 문자열로 치환하면 됩니다. re.sub의 치환 문자열을 빈 문자열("")로 지정하면 매칭된 부분이 삭제되는 효과를 얻을 수 있습니다.
  - type: code
    language: python
    title: 확장번호 제거
    description: 공백 + x + 숫자 패턴을 제거합니다
    content: |-
      extPattern = r"\s+x\d+"

      finalText = re.sub(extPattern, "", cleanedText)
      finalText
  - type: note
    style: tip
    title: 여러 단계 치환
    content: 복잡한 텍스트 정제는 여러 단계로 나누는 것이 좋습니다. 한 번에 하나의 작업만 수행하면 디버깅이 쉽습니다.

- id: step7_apply_to_data
  title: 7단계. 실제 데이터에 적용
  subtitle: 모든 사용자 전화번호 정제
  blocks:
  - type: text
    content: 배운 패턴을 실제 사용자 데이터에 적용하여 모든 전화번호를 통일된 형식으로 변환합니다. 반복 사용할 코드는 함수로 만들어두면 재사용하기 편리합니다. 함수화하면 여러 단계의 정제 과정을 하나로 묶어서 관리할 수 있고, 다른 데이터셋에도 쉽게 적용할 수 있습니다.
  - type: code
    language: python
    title: 함수로 만들기
    description: 전화번호 정제 함수를 정의합니다
    content: |-
      def cleanPhone(phone):
          pattern = r"[\(]?(\d{3})[\)\-\.]?[\s\-\.]?(\d{3,4})[\-\.](\d{4})"
          cleaned = re.sub(pattern, r"\1-\2-\3", phone)
          cleaned = re.sub(r"\s+x\d+", "", cleaned)
          return cleaned
  - type: code
    language: python
    title: 전체 데이터 정제
    description: 모든 사용자의 전화번호를 변환합니다
    content: |-
      cleanedPhones = [cleanPhone(user['phone']) for user in usersData]
      cleanedPhones[:5]
  - type: text
    content: 완벽하게 통일된 형식으로 변환되었습니다. 10명 모두의 전화번호가 일관된 XXX-XXXX-XXXX 형식으로 정리되었습니다. 이런 데이터 정규화는 데이터베이스 저장, 검색, 분석의 기초가 됩니다.

- id: step8_result
  title: 8단계. 결과 확인
  subtitle: 변환 전후 비교
  blocks:
  - type: text
    content: 원본과 변환된 전화번호를 나란히 비교해봅시다. 변환 전후를 비교하면 정규표현식이 얼마나 다양한 형식을 처리했는지 한눈에 확인할 수 있습니다. 이런 비교 출력은 데이터 정제 작업의 검증에도 유용합니다.
  - type: code
    language: python
    title: 변환 전후 비교
    description: 원본과 정제된 전화번호를 함께 출력합니다
    content: |-
      comparison = [
          {"원본": user['phone'], "변환": cleanPhone(user['phone'])}
          for user in usersData[:5]
      ]
      comparison
  - type: text
    content: |-
      **배운 핵심 개념:**
      - `\d{n}` : 숫자 정확히 n개
      - `\d{n,m}` : 숫자 n~m개
      - `( )` : 그룹으로 캡처
      - `\1, \2, \3` : 그룹 참조
      - `re.sub()` : 패턴 치환

- id: practice
  title: 실습
  subtitle: 전화번호 정제 프로젝트
  blocks:
  - type: text
    content: 데이터 정제 담당자가 되어 다양한 형식의 데이터를 통일합니다. 미션1에서는 날짜 형식을 변환하고, 미션2에서는 JSONPlaceholder의 전화번호를 정제합니다. 그룹 캡처와 re.sub를 활용해 형식 변환을 연습합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 날짜 형식 변환"
    blocks:
    - type: code
      title: "YYYY/MM/DD → YYYY-MM-DD 변환"
      content: |-
        import re

        text = """
        생년월일: 1990/12/25
        입사일: 2020/03/15
        계약일: 2023/07/01
        """

        pattern = r"(\d{4})/(\d{2})/(\d{2})"
        result = re.sub(pattern, r"\1-\2-\3", text)
        result
  - type: expansion
    title: "미션2: JSONPlaceholder 전화번호 정제"
    blocks:
    - type: code
      title: "데이터 로드 및 정제 함수"
      content: |-
        import re
        import json
        from pyodide.http import open_url

        data = json.loads(
            open_url("https://jsonplaceholder.typicode.com/users").read()
        )

        def clean(phone):
            pat = r"[\(]?(\d{3})[\)\-\.]?[\s\-\.]?(\d{3,4})[\-\.](\d{4})"
            out = re.sub(pat, r"\1-\2-\3", phone)
            out = re.sub(r"\s+x\d+", "", out)
            return out

        clean(data[0]['phone'])
    - type: code
      title: "전화번호 변환 비교"
      content: |-
        compare = [
            {"원본": u['phone'], "변환": clean(u['phone'])}
            for u in data[:5]
        ]
        compare

- id: summary
  title: 정리
  subtitle: 두 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 그룹 캡처와 re.sub()를 배웠습니다. 패턴의 일부를 소괄호로 캡처하고, 치환 문자열에서 \\1, \\2 등으로 재사용할 수 있습니다. 이 기법은 전화번호, 날짜, 주민번호, 계좌번호 등 형식이 있는 모든 데이터의 정규화에 활용됩니다.
  - type: list
    items:
    - "\\d{n} - 숫자 정확히 n개"
    - "\\d{n,m} - 숫자 n~m개"
    - "( ) - 그룹으로 캡처"
    - "\\1, \\2, \\3 - 그룹 참조"
    - "re.sub() - 패턴 치환"
  - type: text
    content: 다음 프로젝트에서는 URL을 프로토콜, 도메인, 경로로 분해하는 방법을 배웁니다!
