meta:
  id: polars_05
  title: 음악스트리밍분석
  order: 5
  category: polars
  difficulty: "⭐⭐"
  badge: 기초
  dataUrl: https://raw.githubusercontent.com/datasciencedojo/datasets/master/spotify_songs.csv
  tags: ["spotify", "str.contains", "over", "rank", "window"]
  seo:
    title: "Polars 문자열 처리와 윈도우 함수 - 아티스트별 인기 순위 분석"
    description: "Spotify 차트 데이터로 문자열 포함(str.contains), 소문자 변환(str.to_lowercase), 윈도우 함수(over, rank)를 배웁니다."
    keywords: ["polars str.contains", "polars over", "polars rank", "윈도우 함수", "spotify 분석"]

intro:
  emoji: "🎵"
  goal: Spotify 차트 데이터에서 "아티스트별 인기도 순위"를 분석합니다.
  description: 문자열 처리와 윈도우 함수를 배웁니다. str.contains로 특정 키워드를 찾고, over + rank로 그룹 내 순위를 계산합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: Spotify 차트 데이터
  blocks:
  - type: text
    content: Spotify 음악 스트리밍 데이터를 분석합니다. 수천 개의 트랙에 대한 정보가 담겨 있으며, 곡명, 아티스트, 장르, 인기도(popularity) 등의 정보를 포함합니다. 이번 프로젝트에서는 문자열 처리(str.contains, str.to_lowercase)와 윈도우 함수(over, rank)를 배웁니다. over()는 그룹별 계산을 하되 원본 행을 유지하는 강력한 기능이고, rank()는 순위를 매기는 함수입니다. 이 두 개를 조합하면 "아티스트별로 가장 인기 있는 곡"처럼 그룹 내 순위를 구할 수 있습니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: Spotify 차트 데이터
    content: |-
      import polars as pl

      spotifyUrl = "https://raw.githubusercontent.com/datasciencedojo/datasets/master/spotify_songs.csv"
      spotify = pl.read_csv(spotifyUrl)
      spotify.shape
  - type: tip
    content: "이 데이터셋은 수만 개의 곡 정보를 포함하고 있어 대용량 데이터 처리 연습에 적합합니다. Polars는 이런 규모의 데이터도 빠르게 필터링하고 그룹화할 수 있습니다."

- id: step2_head
  title: 2단계. 미리보기
  subtitle: 데이터 구조 파악
  blocks:
  - type: text
    content: track_name(곡명), track_artist(아티스트), track_popularity(인기도), playlist_genre(장르) 등이 있습니다. track_popularity는 0~100 사이의 값으로, 높을수록 최근에 많이 재생된 인기곡입니다. 이 데이터는 실제 Spotify 차트 데이터를 기반으로 합니다.
  - type: code
    language: python
    title: 미리보기
    description: 데이터가 어떻게 생겼는지
    content: |-
      spotify.select("track_name", "track_artist", "track_popularity", "playlist_genre").head()

- id: step3_filter
  title: 3단계. 인기도 필터링
  subtitle: 복습 - filter
  blocks:
  - type: text
    content: 인기도 80 이상인 곡만 필터링합니다. 이전에 배운 filter를 복습하며, 비교 연산자(>=)를 사용해 조건을 만듭니다. 80점 이상이면 상위 약 20%에 해당하는 인기곡입니다.
  - type: code
    language: python
    title: 인기도 80 이상
    description: 복습 - filter
    content: |-
      spotify.filter(pl.col("track_popularity") >= 80).select("track_name", "track_artist", "track_popularity")

- id: step4_groupby
  title: 4단계. 아티스트별 평균 인기도
  subtitle: 복습 - group_by + mean
  blocks:
  - type: text
    content: 아티스트별 평균 인기도를 계산합니다. 이전에 배운 group_by와 mean을 복습하며, sort로 내림차순 정렬하면 가장 인기 있는 아티스트 순으로 볼 수 있습니다. 꾸준히 높은 인기도를 유지하는 아티스트가 상위에 위치합니다.
  - type: code
    language: python
    title: 아티스트별 평균 인기도
    description: 복습 - group_by
    content: |-
      spotify.group_by("track_artist").agg(
          pl.col("track_popularity").mean().alias("avgPopularity")
      ).sort("avgPopularity", descending=True).head(10)

- id: step5_str_contains
  title: 5단계. 문자열 포함 검색
  subtitle: str.contains
  blocks:
  - type: text
    content: 데이터 분석에서 문자열 검색은 매우 자주 사용됩니다. "Love"라는 단어가 들어간 곡만 찾고 싶을 때 str.contains()를 사용합니다. str은 문자열(string) 관련 메서드에 접근하는 accessor이고, contains()는 "포함하다"의 의미입니다. pl.col("track_name").str.contains("Love")는 track_name 컬럼에서 "Love"가 포함된 행은 True, 아니면 False를 반환합니다. filter()와 함께 사용하면 True인 행만 선택됩니다.
  - type: code
    language: python
    title: Love가 포함된 곡
    description: str.contains 사용
    content: |-
      spotify.filter(
          pl.col("track_name").str.contains("Love")
      ).select("track_name", "track_artist", "track_popularity").head(10)
  - type: tip
    content: "str.contains(\"키워드\")는 해당 키워드가 포함된 행을 찾습니다. \"Love Story\"처럼 단어 전체가 아니라 일부만 일치해도 찾습니다. 정규표현식(regex)도 지원하여 복잡한 패턴 검색이 가능합니다. 대소문자를 구분하므로 주의하세요."

- id: step6_str_lowercase
  title: 6단계. 소문자 변환
  subtitle: str.to_lowercase
  blocks:
  - type: text
    content: 대소문자 구분 없이 검색하려면 소문자로 변환 후 비교합니다. "Love", "LOVE", "love"를 모두 찾으려면 먼저 str.to_lowercase()로 소문자로 통일한 뒤 str.contains("love")를 적용합니다.
  - type: note
    style: tip
    title: 문자열 처리 팁
    content: "str.to_lowercase()는 모든 문자를 소문자로 변환합니다. 대소문자 구분 없는 검색에 유용합니다."
  - type: code
    language: python
    title: 대소문자 구분 없이 검색
    description: love, Love, LOVE 모두 찾기
    content: |-
      spotify.filter(
          pl.col("track_name").str.to_lowercase().str.contains("love")
      ).select("track_name", "track_artist", "track_popularity").head(10)

- id: step7_genre_filter
  title: 7단계. 장르별 필터링
  subtitle: 문자열 조건 조합
  blocks:
  - type: text
    content: pop 장르에서 dance가 포함된 곡을 찾습니다. 장르 조건과 문자열 조건을 &(AND)로 연결하여 복합 필터를 만듭니다. 이렇게 여러 조건을 조합하면 원하는 데이터를 정확하게 추출할 수 있습니다.
  - type: code
    language: python
    title: pop 장르 + dance 키워드
    description: 조건 조합
    content: |-
      spotify.filter(
          (pl.col("playlist_genre") == "pop") &
          (pl.col("track_name").str.to_lowercase().str.contains("dance"))
      ).select("track_name", "track_artist", "track_popularity")

- id: step8_over
  title: 8단계. 윈도우 함수 소개
  subtitle: over()
  blocks:
  - type: text
    content: over()는 이번 프로젝트의 핵심 개념입니다. group_by()는 그룹별 통계를 계산하지만 행 수가 줄어듭니다(그룹 개수만큼만 남음). 하지만 때로는 "그룹별 평균을 계산하되, 원본 데이터는 그대로 유지"하고 싶을 때가 있습니다. over()는 이 문제를 해결합니다. pl.col("값").mean().over("그룹")은 그룹별 평균을 계산한 후 그 값을 해당 그룹의 모든 행에 붙여줍니다. SQL의 윈도우 함수(Window Function)와 동일한 개념으로, 매우 강력한 기능입니다.
  - type: code
    language: python
    title: 장르별 평균 인기도 (행 유지)
    description: over로 그룹별 평균 추가
    content: |-
      spotify.select(
          "track_name",
          "playlist_genre",
          "track_popularity",
          pl.col("track_popularity").mean().over("playlist_genre").alias("genreAvg")
      ).head(10)
  - type: tip
    content: "over(\"그룹\")은 그룹별 계산을 하되 행 수를 유지합니다. group_by()는 그룹 개수만큼 행이 줄지만, over()는 원본 행 수 그대로 유지하면서 각 행에 그룹 통계를 추가합니다. \"개별 값과 그룹 평균을 동시에 보고 싶을 때\" 필수적인 기능입니다."

- id: step9_over_vs_groupby
  title: 9단계. over vs group_by 비교
  subtitle: 차이점 이해
  blocks:
  - type: text
    content: group_by는 그룹 수만큼 행이 줄어들고, over는 원본 행 수를 유지합니다. 아래 코드에서 group_by 결과는 장르 수(6개 정도)만큼의 행이 되지만, over를 사용한 이전 예제에서는 수만 개의 원본 행이 그대로 유지됩니다.
  - type: code
    language: python
    title: group_by 결과
    description: 행이 줄어듦
    content: |-
      spotify.group_by("playlist_genre").agg(
          pl.col("track_popularity").mean().alias("genreAvg")
      )

- id: step10_rank
  title: 10단계. 순위 계산
  subtitle: rank()
  blocks:
  - type: text
    content: rank()는 값에 순위를 매기는 함수입니다. 인기도가 높은 곡부터 1위, 2위, 3위... 순으로 번호를 매기는 것입니다. method="ordinal"은 같은 값이어도 다른 순위를 부여하는 방식입니다(동점 처리 안 함). descending=True는 내림차순 정렬로, 큰 값이 1위가 됩니다. 인기도가 100인 곡이 1위, 99인 곡이 2위가 되는 식입니다. 이 함수는 다음 단계에서 over()와 조합하여 더욱 강력해집니다.
  - type: code
    language: python
    title: 전체 인기도 순위
    description: rank 사용
    content: |-
      spotify.select(
          "track_name",
          "track_artist",
          "track_popularity",
          pl.col("track_popularity").rank(method="ordinal", descending=True).alias("overallRank")
      ).sort("overallRank").head(10)
  - type: tip
    content: "rank()는 순위를 매깁니다. method=\"ordinal\"은 동점도 다른 순위, \"dense\"는 동점은 같은 순위지만 다음 순위가 연속, \"min\"은 동점은 같은 순위이고 다음 순위는 건너뛰기입니다. descending=True는 큰 값이 상위 순위(1위)가 됩니다."

- id: step11_rank_over
  title: 11단계. 그룹 내 순위
  subtitle: rank + over 조합
  blocks:
  - type: text
    content: 드디어 rank()와 over()를 조합합니다. pl.col("값").rank().over("그룹")은 "각 그룹 내에서의 순위"를 매깁니다. 예를 들어 아티스트별로 곡에 순위를 매기면, "아티스트 A의 1위 곡, 2위 곡", "아티스트 B의 1위 곡, 2위 곡"을 구할 수 있습니다. 이것은 "각 아티스트의 대표곡(1위 곡)만 추출"하는 등 실전에서 매우 유용한 기법입니다. Polars와 SQL의 가장 강력한 기능 중 하나입니다.
  - type: code
    language: python
    title: 아티스트별 곡 순위
    description: 그룹 내 순위 계산
    content: |-
      spotify.select(
          "track_name",
          "track_artist",
          "track_popularity",
          pl.col("track_popularity").rank(method="ordinal", descending=True).over("track_artist").alias("artistRank")
      ).filter(pl.col("artistRank") == 1).sort("track_popularity", descending=True).head(10)
  - type: tip
    content: "rank().over(\"그룹\")은 그룹별로 독립적인 순위를 매깁니다. 아티스트별, 장르별, 연도별 TOP N을 구할 때 필수입니다. filter(artistRank == 1)로 각 그룹의 1위만 추출하는 패턴은 실전에서 매우 자주 사용됩니다."

- id: step12_genre_rank
  title: 12단계. 장르별 TOP 3
  subtitle: 실전 활용
  blocks:
  - type: text
    content: 각 장르에서 인기도 TOP 3 곡을 뽑습니다. rank().over("playlist_genre")로 장르별 순위를 계산한 뒤 filter로 3위 이하만 선택하면 각 장르의 대표곡을 추출할 수 있습니다.
  - type: code
    language: python
    title: 장르별 TOP 3
    description: over + rank 실전
    content: |-
      spotify.select(
          "track_name",
          "track_artist",
          "playlist_genre",
          "track_popularity",
          pl.col("track_popularity").rank(method="ordinal", descending=True).over("playlist_genre").alias("genreRank")
      ).filter(pl.col("genreRank") <= 3).sort("playlist_genre", "genreRank")

- id: step13_complex
  title: 13단계. 종합 분석
  subtitle: 모든 개념 조합
  blocks:
  - type: text
    content: love가 포함된 곡 중 장르별 인기도 1위를 찾습니다. 먼저 filter로 "love"가 포함된 곡을 추출하고, rank().over()로 그 중에서 장르별 순위를 계산합니다. str.contains, over, rank를 모두 조합하는 고급 기법입니다.
  - type: code
    language: python
    title: Love 곡 중 장르별 1위
    description: 종합 분석
    content: |-
      spotify.filter(
          pl.col("track_name").str.to_lowercase().str.contains("love")
      ).select(
          "track_name",
          "track_artist",
          "playlist_genre",
          "track_popularity",
          pl.col("track_popularity").rank(method="ordinal", descending=True).over("playlist_genre").alias("genreRank")
      ).filter(pl.col("genreRank") == 1).sort("track_popularity", descending=True)

- id: practice
  title: 실습
  subtitle: 음악 스트리밍 분석 프로젝트
  blocks:
  - type: text
    content: 배운 모든 내용을 활용해서 분석해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 아티스트별 최고 인기곡과 평균 인기도 비교"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        musicUrl = "https://raw.githubusercontent.com/datasciencedojo/datasets/master/spotify_songs.csv"
        tracks = pl.read_csv(musicUrl)
    - type: code
      title: "아티스트별 분석"
      content: |-
        artistTop = tracks.select(
            "track_name",
            "track_artist",
            "track_popularity",
            pl.col("track_popularity").rank(method="ordinal", descending=True).over("track_artist").alias("artistRank"),
            pl.col("track_popularity").mean().over("track_artist").round(1).alias("artistAvg")
        ).filter(pl.col("artistRank") == 1).sort("track_popularity", descending=True).head(15)
        artistTop
  - type: expansion
    title: "미션2: 장르별 인기도 분포와 평균 이상 곡 비율"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        chartUrl = "https://raw.githubusercontent.com/datasciencedojo/datasets/master/spotify_songs.csv"
        songs = pl.read_csv(chartUrl)
    - type: code
      title: "장르별 분석"
      content: |-
        genreDistribution = songs.select(
            "playlist_genre",
            "track_popularity",
            pl.col("track_popularity").mean().over("playlist_genre").alias("genreAvg")
        ).with_columns(
            (pl.col("track_popularity") >= pl.col("genreAvg")).cast(pl.Int32).alias("aboveAvg")
        ).group_by("playlist_genre").agg(
            pl.col("track_popularity").count().alias("totalCount"),
            pl.col("aboveAvg").sum().alias("aboveAvgCount"),
            pl.col("track_popularity").mean().round(1).alias("avgPopularity")
        ).with_columns(
            (pl.col("aboveAvgCount") * 100 / pl.col("totalCount")).round(1).alias("aboveAvgRatio")
        )
        genreDistribution

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 문자열 처리와 윈도우 함수를 배웠습니다.
  - type: list
    items:
    - "pl.col(\"컬럼\").str.contains(\"키워드\") - 문자열 포함 검색"
    - "pl.col(\"컬럼\").str.to_lowercase() - 소문자 변환"
    - "pl.col(\"값\").mean().over(\"그룹\") - 그룹별 계산 (행 유지)"
    - "pl.col(\"값\").rank().over(\"그룹\") - 그룹 내 순위"
  - type: text
    content: 다음 시간에는 부동산 데이터로 조건부 변환(when-then)과 조인을 배웁니다.
