meta:
  id: "09"
  title: "다중 상속과 MRO"
  day: 9
  category: "advancedPython"
  tags: ["multiple inheritance", "MRO", "super", "mixin"]
  seo:
    title: "파이썬 다중 상속과 MRO - 메서드 해석 순서 완벽 이해"
    description: "다중 상속의 동작 원리와 MRO를 이해합니다. C3 선형화, super() 심화, Mixin 패턴, 상속 vs 합성."
    keywords: ["다중상속", "MRO", "super", "mixin", "C3 linearization"]

intro:
  emoji: "🔀"
  points:
  - "다중 상속의 작동 원리"
  - "MRO(Method Resolution Order) 이해"
  - "다이아몬드 문제와 해결책"
  - "Mixin 패턴으로 기능 조합"

sections:
- id: "multiple_inheritance"
  title: "다중 상속 기초"
  subtitle: "여러 부모 클래스"
  blocks:
  - type: "text"
    content: "파이썬은 다중 상속을 지원합니다. 클래스 정의 시 여러 부모 클래스를 쉼표로 구분하여 지정합니다. 자식 클래스는 모든 부모 클래스의 속성과 메서드를 상속받습니다. 같은 이름의 메서드가 여러 부모에 있으면 MRO에 따라 첫 번째 발견된 것이 사용됩니다. 다중 상속은 강력하지만 복잡성을 증가시킬 수 있습니다. 올바르게 사용하면 코드 재사용성을 높이고 유연한 설계가 가능합니다."
  - type: "list"
    items:
    - "class Child(Parent1, Parent2, ...)"
    - "모든 부모의 속성/메서드 상속"
    - "메서드 충돌 시 MRO로 해결"
    - "왼쪽에서 오른쪽으로 검색"
  - type: "code"
    language: "python"
    title: "기본 다중 상속"
    description: "여러 부모 클래스를 상속받습니다."
    content: |-
      class Flyable:
          def fly(self):
              return "Flying"

      class Swimmable:
          def swim(self):
              return "Swimming"

      class Duck(Flyable, Swimmable):
          def quack(self):
              return "Quack!"

      duck = Duck()
      duck.fly(), duck.swim(), duck.quack()
  - type: "code"
    language: "python"
    title: "메서드 충돌"
    description: "같은 이름의 메서드가 있을 때 순서가 중요합니다."
    content: |-
      class A:
          def greet(self):
              return "Hello from A"

      class B:
          def greet(self):
              return "Hello from B"

      class C(A, B):
          pass

      class D(B, A):
          pass

      C().greet(), D().greet()
  - type: "code"
    language: "python"
    title: "__init__ 처리"
    description: "다중 상속에서 초기화를 처리합니다."
    content: |-
      class Engine:
          def __init__(self):
              self.engineType = "V8"

      class Wheels:
          def __init__(self):
              self.wheelCount = 4

      class Car(Engine, Wheels):
          def __init__(self):
              Engine.__init__(self)
              Wheels.__init__(self)

      car = Car()
      car.engineType, car.wheelCount
  - type: "tip"
    content: "다중 상속에서 super()를 사용하면 MRO를 따라 모든 부모가 올바르게 초기화됩니다."

- id: "mro_algorithm"
  title: "MRO 알고리즘"
  subtitle: "C3 선형화"
  blocks:
  - type: "text"
    content: "MRO(Method Resolution Order)는 메서드를 찾는 순서입니다. 파이썬은 C3 선형화 알고리즘을 사용합니다. C3는 단조성(부모-자식 순서 유지)과 지역 우선(왼쪽 부모 우선)을 보장합니다. 클래스.__mro__ 또는 클래스.mro()로 MRO를 확인할 수 있습니다. MRO는 클래스 정의 시 계산되며, 유효하지 않은 상속 구조는 TypeError를 발생시킵니다. super()는 MRO의 다음 클래스를 호출합니다."
  - type: "list"
    items:
    - "C3 선형화 알고리즘"
    - "단조성: 부모는 자식 뒤에"
    - "지역 우선: 왼쪽 부모가 우선"
    - "클래스.__mro__로 확인"
  - type: "code"
    language: "python"
    title: "MRO 확인"
    description: "__mro__로 메서드 해석 순서를 확인합니다."
    content: |-
      class A:
          pass

      class B(A):
          pass

      class C(A):
          pass

      class D(B, C):
          pass

      [cls.__name__ for cls in D.__mro__]
  - type: "code"
    language: "python"
    title: "복잡한 MRO"
    description: "더 복잡한 상속 구조의 MRO입니다."
    content: |-
      class A:
          def method(self):
              return "A"

      class B(A):
          def method(self):
              return "B"

      class C(A):
          def method(self):
              return "C"

      class D(B, C):
          pass

      class E(C, B):
          pass

      [cls.__name__ for cls in D.__mro__], [cls.__name__ for cls in E.__mro__]
  - type: "code"
    language: "python"
    title: "mro() 메서드"
    description: "mro() 메서드도 같은 결과를 반환합니다."
    content: |-
      class X:
          pass

      class Y(X):
          pass

      class Z(X):
          pass

      class W(Y, Z):
          pass

      W.mro()
  - type: "tip"
    content: "MRO가 유효하지 않으면 'Cannot create a consistent method resolution order' 에러가 발생합니다."

- id: "diamond_problem"
  title: "다이아몬드 문제"
  subtitle: "공통 조상 처리"
  blocks:
  - type: "text"
    content: "다이아몬드 문제는 두 부모가 같은 조상을 가질 때 발생합니다. 조상의 메서드가 두 번 호출될 수 있는 문제입니다. 파이썬의 MRO와 super()는 이 문제를 해결합니다. C3 선형화는 각 클래스가 MRO에서 한 번만 나타나도록 보장합니다. super()를 사용하면 MRO를 따라 각 클래스의 메서드가 한 번씩만 호출됩니다. 협력적 다중 상속(cooperative multiple inheritance)이라고 합니다."
  - type: "list"
    items:
    - "두 부모가 같은 조상 상속"
    - "조상 메서드 중복 호출 위험"
    - "C3 MRO로 한 번만 등장"
    - "super()로 협력적 호출"
  - type: "code"
    language: "python"
    title: "다이아몬드 구조"
    description: "공통 조상을 가진 다중 상속입니다."
    content: |-
      class A:
          def __init__(self):
              self.value = "A"

      class B(A):
          def __init__(self):
              super().__init__()
              self.value += "B"

      class C(A):
          def __init__(self):
              super().__init__()
              self.value += "C"

      class D(B, C):
          def __init__(self):
              super().__init__()
              self.value += "D"

      D().value
  - type: "code"
    language: "python"
    title: "super() 호출 순서"
    description: "MRO를 따라 순서대로 호출됩니다."
    content: |-
      class Root:
          def show(self):
              return ["Root"]

      class Left(Root):
          def show(self):
              return super().show() + ["Left"]

      class Right(Root):
          def show(self):
              return super().show() + ["Right"]

      class Child(Left, Right):
          def show(self):
              return super().show() + ["Child"]

      Child().show()
  - type: "code"
    language: "python"
    title: "super() 없이 직접 호출"
    description: "직접 호출하면 중복이 발생할 수 있습니다."
    content: |-
      class Base:
          def __init__(self):
              self.count = 0

          def increment(self):
              self.count += 1

      class Left2(Base):
          def __init__(self):
              Base.__init__(self)
              self.increment()

      class Right2(Base):
          def __init__(self):
              Base.__init__(self)
              self.increment()

      class Child2(Left2, Right2):
          def __init__(self):
              Left2.__init__(self)
              Right2.__init__(self)

      Child2().count
  - type: "tip"
    content: "다중 상속에서는 항상 super()를 사용하고, 모든 클래스가 super()를 호출하도록 설계하세요."

- id: "super_function"
  title: "super() 심화"
  subtitle: "협력적 상속"
  blocks:
  - type: "text"
    content: "super()는 MRO에서 현재 클래스 다음의 클래스를 반환합니다. super(Type, obj)처럼 인자를 지정할 수도 있습니다. 메서드 내에서 super()를 호출하면 자동으로 현재 클래스와 인스턴스가 사용됩니다. super()는 프록시 객체를 반환하며, 이 프록시가 MRO의 다음 클래스의 메서드를 호출합니다. 협력적 다중 상속에서는 모든 클래스가 super()를 호출해야 체인이 완성됩니다."
  - type: "list"
    items:
    - "super(): 현재 클래스 기준 MRO 다음"
    - "super(Type, obj): 명시적 지정"
    - "프록시 객체 반환"
    - "모든 클래스가 super() 호출 필요"
  - type: "code"
    language: "python"
    title: "super() 기본"
    description: "super()의 기본 동작입니다."
    content: |-
      class Parent:
          def greet(self):
              return "Hello from Parent"

      class Child(Parent):
          def greet(self):
              parentGreet = super().greet()
              return f"{parentGreet} and Child"

      Child().greet()
  - type: "code"
    language: "python"
    title: "super()와 MRO"
    description: "super()가 MRO를 따라가는 것을 확인합니다."
    content: |-
      class A:
          def method(self):
              return ["A"]

      class B(A):
          def method(self):
              return super().method() + ["B"]

      class C(A):
          def method(self):
              return super().method() + ["C"]

      class D(B, C):
          def method(self):
              return super().method() + ["D"]

      D().method(), [c.__name__ for c in D.__mro__]
  - type: "code"
    language: "python"
    title: "인자 전달"
    description: "*args, **kwargs로 인자를 전달합니다."
    content: |-
      class Base:
          def __init__(self, value, **kwargs):
              super().__init__(**kwargs)
              self.value = value

      class Extra:
          def __init__(self, extra, **kwargs):
              super().__init__(**kwargs)
              self.extra = extra

      class Combined(Base, Extra):
          def __init__(self, value, extra, name, **kwargs):
              super().__init__(value=value, extra=extra, **kwargs)
              self.name = name

      combined = Combined(value=10, extra="data", name="test")
      combined.value, combined.extra, combined.name
  - type: "tip"
    content: "super()와 **kwargs 패턴을 사용하면 다중 상속에서 인자를 안전하게 전달할 수 있습니다."

- id: "mixin_pattern"
  title: "Mixin 패턴"
  subtitle: "기능 조합"
  blocks:
  - type: "text"
    content: "Mixin은 독립적인 기능을 제공하는 작은 클래스입니다. 단독으로 사용하지 않고 다른 클래스와 조합합니다. Mixin은 보통 특정 기능만 추가하고 인스턴스 상태는 최소화합니다. 이름에 Mixin 접미사를 붙여 용도를 명확히 합니다. 여러 Mixin을 조합해 다양한 기능을 가진 클래스를 만들 수 있습니다. Mixin은 is-a 관계보다 has-a 기능에 가깝습니다."
  - type: "list"
    items:
    - "독립적인 기능 단위"
    - "단독 사용하지 않음"
    - "여러 Mixin 조합 가능"
    - "이름에 Mixin 접미사 권장"
  - type: "code"
    language: "python"
    title: "기본 Mixin"
    description: "기능을 추가하는 Mixin입니다."
    content: |-
      class JSONMixin:
          def toJSON(self):
              import json
              return json.dumps(self.__dict__)

      class XMLMixin:
          def toXML(self):
              attrs = " ".join(f'{k}="{v}"' for k, v in self.__dict__.items())
              return f"<object {attrs}/>"

      class Data(JSONMixin, XMLMixin):
          def __init__(self, name, value):
              self.name = name
              self.value = value

      data = Data("test", 42)
      data.toJSON(), data.toXML()
  - type: "code"
    language: "python"
    title: "로깅 Mixin"
    description: "로깅 기능을 추가하는 Mixin입니다."
    content: |-
      class LoggingMixin:
          def __init__(self, *args, **kwargs):
              super().__init__(*args, **kwargs)
              self._logs = []

          def log(self, message):
              self._logs.append(message)

          def getLogs(self):
              return self._logs

      class Service:
          def __init__(self, name):
              self.name = name

      class LoggedService(LoggingMixin, Service):
          def process(self):
              self.log(f"{self.name} processing")
              return "done"

      svc = LoggedService("API")
      svc.process()
      svc.getLogs()
  - type: "code"
    language: "python"
    title: "비교 Mixin"
    description: "비교 연산을 추가하는 Mixin입니다."
    content: |-
      class ComparableMixin:
          def __eq__(self, other):
              return self.value == other.value

          def __lt__(self, other):
              return self.value < other.value

          def __le__(self, other):
              return self.value <= other.value

          def __gt__(self, other):
              return self.value > other.value

          def __ge__(self, other):
              return self.value >= other.value

      class Score(ComparableMixin):
          def __init__(self, value):
              self.value = value

      s1 = Score(85)
      s2 = Score(90)
      s1 < s2, s1 > s2, s1 == Score(85)
  - type: "tip"
    content: "Mixin은 오른쪽에, 주요 부모 클래스는 왼쪽에 배치하는 것이 관례입니다."

- id: "composition"
  title: "상속 vs 합성"
  subtitle: "언제 무엇을 사용할지"
  blocks:
  - type: "text"
    content: "상속보다 합성을 선호하라(Favor composition over inheritance)는 유명한 설계 원칙입니다. 상속은 is-a 관계를 표현하고, 합성은 has-a 관계를 표현합니다. 상속은 부모의 구현에 강하게 결합되어 변경에 취약합니다. 합성은 객체를 멤버로 포함하여 느슨한 결합을 유지합니다. 상속이 적합한 경우: 명확한 is-a 관계, 부모 인터페이스 재사용. 합성이 적합한 경우: 구현 재사용, 유연한 조합이 필요할 때."
  - type: "list"
    items:
    - "상속: is-a 관계, 인터페이스 공유"
    - "합성: has-a 관계, 구현 재사용"
    - "상속: 강한 결합"
    - "합성: 느슨한 결합, 유연함"
  - type: "code"
    language: "python"
    title: "상속 방식"
    description: "상속으로 기능을 확장합니다."
    content: |-
      class Engine:
          def start(self):
              return "Engine started"

      class Car(Engine):
          def drive(self):
              return f"{self.start()} -> Driving"

      Car().drive()
  - type: "code"
    language: "python"
    title: "합성 방식"
    description: "합성으로 기능을 조합합니다."
    content: |-
      class Engine2:
          def start(self):
              return "Engine started"

      class Car2:
          def __init__(self):
              self.engine = Engine2()

          def drive(self):
              return f"{self.engine.start()} -> Driving"

      Car2().drive()
  - type: "code"
    language: "python"
    title: "합성의 유연성"
    description: "합성은 런타임에 교체가 가능합니다."
    content: |-
      class GasEngine:
          def start(self):
              return "Gas engine started"

      class ElectricEngine:
          def start(self):
              return "Electric engine started"

      class FlexibleCar:
          def __init__(self, engine):
              self.engine = engine

          def drive(self):
              return f"{self.engine.start()} -> Driving"

      gasCar = FlexibleCar(GasEngine())
      electricCar = FlexibleCar(ElectricEngine())
      gasCar.drive(), electricCar.drive()
  - type: "tip"
    content: "변하지 않는 is-a 관계에는 상속을, 변할 수 있는 기능 조합에는 합성을 사용하세요."

- id: "practice"
  title: "종합 복습"
  subtitle: "다중 상속과 MRO 마스터하기"
  blocks:
  - type: "text"
    content: "Day 9에서 배운 다중 상속과 MRO를 난이도별로 복습합니다. 파이썬의 다중 상속은 C3 선형화 알고리즘으로 MRO(Method Resolution Order)를 결정하여 다이아몬드 문제를 해결합니다. super()는 MRO를 따라 다음 클래스를 호출하므로 협력적 다중 상속이 가능합니다. 🟢 기본 문제로 MRO 확인과 super() 기본 사용법을 익히고, 🟡 응용 문제로 Mixin 패턴과 협력적 super() 체인을 연습하세요. 🔴 심화 문제에서는 복잡한 상속 구조, 인터페이스 분리, 합성 vs 상속 판단 등을 다룹니다. 다중 상속은 강력하지만 남용하면 복잡해지므로 Mixin 패턴 위주로 사용하는 것이 권장됩니다."

  - type: "expansion"
    title: "🟢 기본1: 기본 다중 상속"
    code: |-
      class A:
          def methodA(self):
              return "A"

      class B:
          def methodB(self):
              return "B"

      class C(A, B):
          pass

      obj = C()
      obj.methodA(), obj.methodB()

  - type: "expansion"
    title: "🟢 기본2: MRO 확인"
    code: |-
      class X:
          pass

      class Y(X):
          pass

      class Z(X):
          pass

      class W(Y, Z):
          pass

      [cls.__name__ for cls in W.__mro__]

  - type: "expansion"
    title: "🟢 기본3: 메서드 우선순위"
    code: |-
      class First:
          def speak(self):
              return "First"

      class Second:
          def speak(self):
              return "Second"

      class Child(First, Second):
          pass

      Child().speak()

  - type: "expansion"
    title: "🟢 기본4: super() 기본"
    code: |-
      class Parent:
          def greet(self):
              return "Parent"

      class Child(Parent):
          def greet(self):
              return super().greet() + " -> Child"

      Child().greet()

  - type: "expansion"
    title: "🟢 기본5: Mixin 기본"
    code: |-
      class PrintMixin:
          def show(self):
              return str(self.__dict__)

      class Data(PrintMixin):
