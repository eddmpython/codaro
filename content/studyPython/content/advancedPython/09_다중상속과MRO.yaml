      def addLogging(cls):
          originalInit = cls.__init__

          def newInit(self, *args, **kwargs):
              self._logs = []
              originalInit(self, *args, **kwargs)

          def log(self, msg):
              self._logs.append(msg)

          def getLogs(self):
              return self._logs

          cls.__init__ = newInit
          cls.log = log
          cls.getLogs = getLogs
          return cls

      @addLogging
      class Service:
          def __init__(self, name):
              self.name = name

          def run(self):
              self.log(f"{self.name} running")

