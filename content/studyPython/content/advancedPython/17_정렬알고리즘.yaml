      def quickSort3Way(arr, lo=0, hi=None):
          if hi is None:
              hi = len(arr) - 1
          if lo >= hi:
              return arr
          lt, gt = lo, hi
          pivot = arr[lo]
          i = lo + 1
          while i <= gt:
              if arr[i] < pivot:
                  arr[lt], arr[i] = arr[i], arr[lt]
                  lt += 1
                  i += 1
              elif arr[i] > pivot:
                  arr[gt], arr[i] = arr[i], arr[gt]
                  gt -= 1
              else:
                  i += 1
          quickSort3Way(arr, lo, lt - 1)
          quickSort3Way(arr, gt + 1, hi)
          return arr

