      def externalMergeSort(chunks):
          import heapq
          heap = []
          for i, chunk in enumerate(chunks):
              if chunk:
                  heapq.heappush(heap, (chunk[0], i, 0))
          result = []
          while heap:
              val, chunkIdx, elemIdx = heapq.heappop(heap)
              result.append(val)
              if elemIdx + 1 < len(chunks[chunkIdx]):
                  nextVal = chunks[chunkIdx][elemIdx + 1]
                  heapq.heappush(heap, (nextVal, chunkIdx, elemIdx + 1))
          return result

      chunks = [[1, 4, 7], [2, 5, 8], [3, 6, 9]]
      externalMergeSort(chunks)

