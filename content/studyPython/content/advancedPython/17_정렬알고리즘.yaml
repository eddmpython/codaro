      def radixSort(arr):
          if not arr:
              return arr
          maxVal = max(arr)
          exp = 1
          while maxVal // exp > 0:
              arr = countingSortByDigit(arr, exp)
              exp *= 10
          return arr

      def countingSortByDigit(arr, exp):
          n = len(arr)
          output = [0] * n
          count = [0] * 10
          for x in arr:
              idx = (x // exp) % 10
              count[idx] += 1
          for i in range(1, 10):
              count[i] += count[i-1]
          for i in range(n-1, -1, -1):
              idx = (arr[i] // exp) % 10
              output[count[idx]-1] = arr[i]
              count[idx] -= 1
          return output

      radixSort([170, 45, 75, 90, 802, 24, 2, 66])

