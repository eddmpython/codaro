      def newtonRaphson(f, df, x0, tol=1e-10):
          x = x0
          for _ in range(100):
              fx = f(x)
              dfx = df(x)
              if abs(dfx) < 1e-15:
                  break
              xNew = x - fx / dfx
              if abs(xNew - x) < tol:
                  return xNew
              x = xNew
          return x

      cubeRoot2 = newtonRaphson(lambda x: x ** 3 - 2, lambda x: 3 * x ** 2, 1.0)
      ex14Result = round(cubeRoot2, 10)
