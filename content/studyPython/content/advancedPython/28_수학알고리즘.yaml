      def catalanDP(n):
          if n <= 1:
              return 1
          dp = [0] * (n + 1)
          dp[0] = dp[1] = 1
          for i in range(2, n + 1):
              for j in range(i):
                  dp[i] += dp[j] * dp[i - 1 - j]
          return dp[n]

      def catalanFormula(n):
          from math import comb
          return comb(2 * n, n) // (n + 1)

      ex16Result = {
          "dp": [catalanDP(i) for i in range(10)],
          "formula": [catalanFormula(i) for i in range(10)]
      }
      ex16Result
  - type: "expansion"
    title: "고급17: 확장 유클리드"
    code: |-
      def extGcd(a, b):
          if a == 0:
              return b, 0, 1
          gcd, x1, y1 = extGcd(b % a, a)
          x = y1 - (b // a) * x1
          y = x1
          return gcd, x, y

      def modInverse(a, m):
          gcd, x, _ = extGcd(a, m)
          if gcd != 1:
              return None
          return (x % m + m) % m

      ex17A, ex17B = 35, 15
      ex17Gcd, ex17X, ex17Y = extGcd(ex17A, ex17B)
      ex17Inv = modInverse(3, 11)
      ex17Result = {
          "gcd": ex17Gcd,
          "coeffs": (ex17X, ex17Y),
          "verify": ex17A * ex17X + ex17B * ex17Y,
          "modInverse": ex17Inv,
          "verifyInv": (3 * ex17Inv) % 11 if ex17Inv else None
      }
      ex17Result
  - type: "expansion"
    title: "고급18: 중국인의 나머지 정리"
    code: |-
      def crt(remainders, moduli):
          from functools import reduce

          def extGcdCrt(a, b):
              if a == 0:
                  return b, 0, 1
              gcd, x1, y1 = extGcdCrt(b % a, a)
              return gcd, y1 - (b // a) * x1, x1

          M = reduce(lambda x, y: x * y, moduli)
          result = 0
          for ri, mi in zip(remainders, moduli):
              Mi = M // mi
              _, x, _ = extGcdCrt(Mi, mi)
