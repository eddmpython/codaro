      import math

      def dist(p1, p2):
          return math.sqrt((p2[0] - p1[0]) ** 2 + (p2[1] - p1[1]) ** 2)

      def triArea(p1, p2, p3):
          return abs((p1[0] * (p2[1] - p3[1]) + p2[0] * (p3[1] - p1[1]) + p3[0] * (p1[1] - p2[1])) / 2)

      distVal = dist((0, 0), (3, 4))
      triVal = triArea((0, 0), (4, 0), (2, 3))
      geoResult = (distVal, triVal)
      geoResult

- id: "practice"
