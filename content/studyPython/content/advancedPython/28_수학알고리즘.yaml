      def det(matrix):
          n = len(matrix)
          if n == 1:
              return matrix[0][0]
          if n == 2:
              return matrix[0][0] * matrix[1][1] - matrix[0][1] * matrix[1][0]
          result = 0
          for c in range(n):
              minor = [[matrix[i][j] for j in range(n) if j != c] for i in range(1, n)]
              result += ((-1) ** c) * matrix[0][c] * det(minor)
          return result

      ex11Mat = [[1, 2, 3], [4, 5, 6], [7, 8, 10]]
