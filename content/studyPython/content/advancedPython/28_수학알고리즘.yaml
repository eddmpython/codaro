      def crossProd(o, a, b):
          return (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0])

      def convexHull(points):
          points = sorted(set(points))
          if len(points) <= 1:
              return points
          lower = []
          for p in points:
              while len(lower) >= 2 and crossProd(lower[-2], lower[-1], p) <= 0:
                  lower.pop()
              lower.append(p)
          upper = []
          for p in reversed(points):
              while len(upper) >= 2 and crossProd(upper[-2], upper[-1], p) <= 0:
                  upper.pop()
              upper.append(p)
          return lower[:-1] + upper[:-1]

      ex15Points = [(0, 3), (1, 1), (2, 2), (4, 4), (0, 0), (3, 1), (3, 3)]
      ex15Result = convexHull(ex15Points)
      ex15Result
  - type: "expansion"
