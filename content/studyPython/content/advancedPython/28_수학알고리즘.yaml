      def toBase(num, base):
          if num == 0:
              return "0"
          digits = "0123456789ABCDEF"
          result = []
          while num:
              result.append(digits[num % base])
              num //= base
          return ''.join(reversed(result))

      ex3Bin = toBase(255, 2)
