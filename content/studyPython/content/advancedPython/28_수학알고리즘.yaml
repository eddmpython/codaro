- id: "prime"
  title: "소수 알고리즘"
  subtitle: "소수 판별과 생성"
  blocks:
  - type: "text"
    content: "소수 판별은 √n까지만 확인하면 됩니다. 에라토스테네스의 체로 범위 내 모든 소수를 구합니다."
  - type: "code"
    language: "python"
    title: "소수 판별"
    description: "기본 소수 판별 O(√n)"
    content: |-
      def isPrime(n):
          if n < 2:
              return False
          if n == 2:
              return True
          if n % 2 == 0:
              return False
          for i in range(3, int(n ** 0.5) + 1, 2):
              if n % i == 0:
                  return False
          return True

      primeCheck = [isPrime(n) for n in [1, 2, 17, 20, 97]]
      primeResult = primeCheck
      primeResult
  - type: "code"
    language: "python"
    title: "에라토스테네스의 체"
    description: "범위 내 모든 소수 생성"
    content: |-
      def sieve(limit):
          if limit < 2:
              return []
          isPrime = [True] * (limit + 1)
          isPrime[0] = isPrime[1] = False
          for i in range(2, int(limit ** 0.5) + 1):
              if isPrime[i]:
                  for j in range(i * i, limit + 1, i):
                      isPrime[j] = False
          return [i for i in range(limit + 1) if isPrime[i]]

      sieveResult = sieve(50)
      sieveResult
  - type: "code"
    language: "python"
    title: "소인수분해"
    description: "소인수 리스트 반환"
    content: |-
      def primeFactors(n):
          factors = []
          d = 2
          while d * d <= n:
              while n % d == 0:
                  factors.append(d)
                  n //= d
              d += 1
          if n > 1:
              factors.append(n)
          return factors

      pfResult = primeFactors(360)
      pfResult

- id: "gcd_lcm"
  title: "GCD와 LCM"
  subtitle: "유클리드 알고리즘"
  blocks:
  - type: "text"
    content: "유클리드 알고리즘: gcd(a, b) = gcd(b, a % b), b가 0이면 a 반환."
  - type: "code"
    language: "python"
    title: "GCD와 LCM"
    description: "최대공약수와 최소공배수"
    content: |-
      def gcd(a, b):
          while b:
              a, b = b, a % b
          return a

      def lcm(a, b):
          return a * b // gcd(a, b)

      gcdVal = gcd(48, 18)
      lcmVal = lcm(12, 18)
      glResult = (gcdVal, lcmVal)
      glResult
  - type: "code"
    language: "python"
    title: "확장 유클리드"
    description: "ax + by = gcd(a,b) 해 구하기"
    content: |-
      def extGcd(a, b):
          if a == 0:
              return b, 0, 1
          g, x1, y1 = extGcd(b % a, a)
          x = y1 - (b // a) * x1
          y = x1
          return g, x, y

      def modInverse(a, m):
          g, x, _ = extGcd(a % m, m)
          if g != 1:
              return None
          return (x % m + m) % m

      egResult = extGcd(35, 15)
      miResult = modInverse(3, 11)
      extResult = (egResult, miResult)
      extResult

- id: "combinatorics"
  title: "조합론"
  subtitle: "순열, 조합, 이항계수"
  blocks:
  - type: "text"
    content: "nPr = n!/(n-r)!, nCr = n!/r!(n-r)!"
  - type: "code"
    language: "python"
    title: "팩토리얼과 조합"
    description: "기본 조합 계산"
    content: |-
      def factorial(n):
          if n <= 1:
              return 1
          result = 1
          for i in range(2, n + 1):
              result *= i
          return result

      def perm(n, r):
          return factorial(n) // factorial(n - r)

      def comb(n, r):
          return factorial(n) // (factorial(r) * factorial(n - r))

      factVal = factorial(10)
      permVal = perm(5, 3)
      combVal = comb(10, 3)
      combResult = (factVal, permVal, combVal)
      combResult
  - type: "code"
    language: "python"
    title: "조합 생성"
    description: "실제 조합 리스트 생성"
    content: |-
      def genPerms(arr):
          if len(arr) <= 1:
              return [arr]
          perms = []
          for i in range(len(arr)):
              rest = arr[:i] + arr[i + 1:]
              for p in genPerms(rest):
                  perms.append([arr[i]] + p)
          return perms

      def genCombs(arr, r):
          if r == 0:
              return [[]]
          if len(arr) < r:
              return []
          if len(arr) == r:
              return [arr]
          withFirst = [[arr[0]] + c for c in genCombs(arr[1:], r - 1)]
          withoutFirst = genCombs(arr[1:], r)
          return withFirst + withoutFirst

      permsResult = genPerms([1, 2, 3])
      combsResult = genCombs([1, 2, 3, 4], 2)
      genResult = (len(permsResult), combsResult)
      genResult

- id: "modular"
  title: "모듈러 연산"
  subtitle: "빠른 거듭제곱"
  blocks:
  - type: "text"
    content: "큰 수의 거듭제곱을 효율적으로 계산. O(log n)."
  - type: "code"
    language: "python"
    title: "모듈러 거듭제곱"
    description: "분할 정복으로 빠른 계산"
    content: |-
      def modPow(base, exp, mod):
          result = 1
          base = base % mod
          while exp > 0:
              if exp % 2 == 1:
                  result = (result * base) % mod
              exp = exp >> 1
              base = (base * base) % mod
          return result

      MOD = 1000000007
      mpResult = modPow(2, 100, MOD)
      mpResult
  - type: "code"
    language: "python"
    title: "모듈러 조합"
    description: "큰 수에서 nCr mod p"
    content: |-
      def nCrMod(n, r, mod):
          if r > n:
              return 0
          if r == 0 or r == n:
              return 1
          num = 1
          den = 1
          for i in range(r):
              num = (num * (n - i)) % mod
              den = (den * (i + 1)) % mod
          return (num * modPow(den, mod - 2, mod)) % mod

      MOD = 1000000007
      ncrResult = nCrMod(1000, 500, MOD)
      ncrResult

- id: "matrix"
  title: "행렬 연산"
  subtitle: "행렬 곱셈과 거듭제곱"
  blocks:
  - type: "text"
    content: "행렬 거듭제곱으로 피보나치를 O(log n)에 계산합니다."
  - type: "code"
    language: "python"
    title: "행렬 곱셈"
    description: "기본 행렬 곱셈"
    content: |-
      def matMul(a, b):
          rows = len(a)
          cols = len(b[0])
          inner = len(b)
          result = [[0] * cols for _ in range(rows)]
          for i in range(rows):
              for j in range(cols):
                  for k in range(inner):
                      result[i][j] += a[i][k] * b[k][j]
          return result

      matA = [[1, 2], [3, 4]]
      matB = [[5, 6], [7, 8]]
      matMulResult = matMul(matA, matB)
      matMulResult
  - type: "code"
    language: "python"
    title: "행렬 거듭제곱"
    description: "피보나치 O(log n)"
    content: |-
      def matPow(matrix, n):
          size = len(matrix)
          result = [[1 if i == j else 0 for j in range(size)] for i in range(size)]
          base = [row[:] for row in matrix]
          while n > 0:
              if n % 2 == 1:
                  result = matMul(result, base)
              base = matMul(base, base)
              n //= 2
          return result

      def fibMatrix(n):
          if n <= 1:
              return n
          base = [[1, 1], [1, 0]]
          result = matPow(base, n - 1)
          return result[0][0]

      fib50 = fibMatrix(50)
      fibMatResult = fib50
      fibMatResult

