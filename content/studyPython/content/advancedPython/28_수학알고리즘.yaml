    title: "고급19: FFT 곱셈"
    code: |-
      import cmath

      def fft(a, invert=False):
          n = len(a)
          if n == 1:
              return a
          even = fft(a[0::2], invert)
          odd = fft(a[1::2], invert)
          ang = 2 * cmath.pi / n * (-1 if invert else 1)
          w, wn = 1, cmath.exp(complex(0, ang))
          result = [0] * n
          for i in range(n // 2):
              result[i] = even[i] + w * odd[i]
              result[i + n // 2] = even[i] - w * odd[i]
              if invert:
                  result[i] /= 2
                  result[i + n // 2] /= 2
              w *= wn
          return result

      def polyMul(a, b):
          n = 1
          while n < len(a) + len(b):
              n *= 2
          a = a + [0] * (n - len(a))
          b = b + [0] * (n - len(b))
          fa, fb = fft(a), fft(b)
          fc = [fa[i] * fb[i] for i in range(n)]
          c = fft(fc, invert=True)
          return [round(x.real) for x in c]

      ex19A = [1, 2, 3]
      ex19B = [1, 2]
      ex19Result = polyMul(ex19A, ex19B)
      ex19Result
