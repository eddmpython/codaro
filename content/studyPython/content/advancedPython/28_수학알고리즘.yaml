      def simpson(f, a, b, n=1000):
          if n % 2 == 1:
              n += 1
          h = (b - a) / n
          result = f(a) + f(b)
          for i in range(1, n):
              x = a + i * h
              result += 4 * f(x) if i % 2 == 1 else 2 * f(x)
          return result * h / 3

      ex13Result = round(simpson(lambda x: x ** 2, 0, 1), 6)
      ex13Result
