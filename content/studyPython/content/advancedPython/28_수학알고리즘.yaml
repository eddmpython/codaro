      def eulerPhi(n):
          result = n
          p = 2
          while p * p <= n:
              if n % p == 0:
                  while n % p == 0:
                      n //= p
                  result -= result // p
              p += 1
          if n > 1:
              result -= result // n
          return result

      ex6Result = eulerPhi(36)
      ex6Result
  - type: "expansion"
    title: "중급7: 중국인의 나머지 정리"
    code: |-
      def extGcdCrt(a, b):
          if a == 0:
              return b, 0, 1
          g, x1, y1 = extGcdCrt(b % a, a)
          return g, y1 - (b // a) * x1, x1

      def crt(rems, mods):
          total = 0
          prod = 1
          for m in mods:
              prod *= m
          for r, m in zip(rems, mods):
              p = prod // m
              _, inv, _ = extGcdCrt(p, m)
              total += r * inv * p
          return total % prod

      ex7Result = crt([2, 3, 2], [3, 5, 7])
      ex7Result
  - type: "expansion"
    title: "중급8: 밀러-라빈 소수 판정"
    code: |-
      import random

      def millerRabin(n, k=10):
          if n < 2:
              return False
          if n == 2 or n == 3:
              return True
          if n % 2 == 0:
              return False
          r, d = 0, n - 1
          while d % 2 == 0:
              r += 1
              d //= 2
          for _ in range(k):
              a = random.randint(2, n - 2)
              x = pow(a, d, n)
              if x == 1 or x == n - 1:
                  continue
              for _ in range(r - 1):
                  x = pow(x, 2, n)
                  if x == n - 1:
                      break
              else:
                  return False
          return True

      ex8Result = [(n, millerRabin(n)) for n in [7919, 7920, 104729]]
      ex8Result
  - type: "expansion"
