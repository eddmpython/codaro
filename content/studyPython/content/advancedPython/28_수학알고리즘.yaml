      def lagrange(points, x):
          n = len(points)
          result = 0
          for i in range(n):
              xi, yi = points[i]
              term = yi
              for j in range(n):
                  if i != j:
                      xj = points[j][0]
                      term *= (x - xj) / (xi - xj)
              result += term
          return result

      ex12Points = [(1, 1), (2, 4), (3, 9)]
