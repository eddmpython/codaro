      def sqrtNewton(n, eps=1e-10):
          if n < 0:
              return None
          if n == 0:
              return 0
          x = n
          while True:
              nextX = (x + n / x) / 2
              if abs(x - nextX) < eps:
                  return nextX
              x = nextX

      ex4Result = round(sqrtNewton(2), 10)
