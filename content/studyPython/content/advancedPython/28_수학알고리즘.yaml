      def eulerPhi(n):
          result = n
          p = 2
          while p * p <= n:
              if n % p == 0:
                  while n % p == 0:
                      n //= p
                  result -= result // p
              p += 1
          if n > 1:
              result -= result // n
          return result

      def phiSieve(limit):
          phi = list(range(limit + 1))
          for i in range(2, limit + 1):
              if phi[i] == i:
                  for j in range(i, limit + 1, i):
                      phi[j] -= phi[j] // i
          return phi

      ex20Single = [eulerPhi(n) for n in [1, 6, 12, 36]]
      ex20Sieve = phiSieve(20)
      ex20Result = {
          "single": ex20Single,
          "sieve": ex20Sieve[1:]
      }
      ex20Result
