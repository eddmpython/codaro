    code: |-
      from collections import namedtuple, defaultdict, Counter

      Transaction = namedtuple('Transaction', 'user item amount')

      transactions = [
          Transaction('alice', 'book', 15),
          Transaction('bob', 'book', 15),
          Transaction('alice', 'pen', 5),
          Transaction('alice', 'book', 15),
      ]

      itemCounts = Counter(t.item for t in transactions)
      userTotals = defaultdict(float)
      for t in transactions:
          userTotals[t.user] += t.amount

      itemCounts.most_common(), dict(userTotals)
