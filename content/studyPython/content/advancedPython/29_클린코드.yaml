  - type: "expansion"
    title: "고급11: 빌더 패턴"
    code: |-
      class QueryBuilder:
          def __init__(self):
              self._table = None
              self._cols = []
              self._conds = []
              self._limit = None

          def select(self, *cols):
              self._cols = list(cols) if cols else ["*"]
              return self

          def fromTable(self, table):
              self._table = table
              return self

          def where(self, cond):
              self._conds.append(cond)
              return self

          def limit(self, n):
              self._limit = n
              return self

          def build(self):
              q = f"SELECT {', '.join(self._cols)} FROM {self._table}"
              if self._conds:
                  q += " WHERE " + " AND ".join(self._conds)
              if self._limit:
                  q += f" LIMIT {self._limit}"
              return q

      ex11Query = (QueryBuilder()
                   .select("id", "name")
                   .fromTable("users")
                   .where("active = 1")
                   .limit(10)
                   .build())
      ex11Result = ex11Query
      ex11Result
  - type: "expansion"
    title: "고급12: 커맨드 패턴"
    code: |-
      from abc import ABC, abstractmethod

      class Command(ABC):
          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def undo(self):
              pass

      class TextDoc:
          def __init__(self):
              self.content = ""

          def append(self, text):
              self.content += text

          def removeLast(self, length):
              self.content = self.content[:-length]

      class AppendCmd(Command):
          def __init__(self, doc, text):
              self.doc = doc
              self.text = text

          def execute(self):
              self.doc.append(self.text)

          def undo(self):
              self.doc.removeLast(len(self.text))

      class TextEditor:
          def __init__(self):
              self.doc = TextDoc()
              self.history = []

          def append(self, text):
              cmd = AppendCmd(self.doc, text)
              cmd.execute()
              self.history.append(cmd)

          def undo(self):
              if self.history:
                  self.history.pop().undo()

          def getContent(self):
              return self.doc.content

      editor = TextEditor()
      editor.append("Hello ")
      editor.append("World")
      before = editor.getContent()
      editor.undo()
      after = editor.getContent()
      ex12Result = (before, after)
      ex12Result
  - type: "expansion"
    title: "고급13: 옵저버 패턴"
    code: |-
      from abc import ABC, abstractmethod

      class Observer(ABC):
          @abstractmethod
          def onEvent(self, event):
              pass

      class EventEmitter:
          def __init__(self):
              self._observers = {}

          def subscribe(self, evtType, observer):
              if evtType not in self._observers:
                  self._observers[evtType] = []
              self._observers[evtType].append(observer)

          def emit(self, evtType, data):
              for obs in self._observers.get(evtType, []):
                  obs.onEvent(data)

      class LogObserver(Observer):
          def __init__(self):
              self.logs = []

          def onEvent(self, event):
              self.logs.append(f"Logged: {event}")

      emitter = EventEmitter()
      logObs = LogObserver()
      emitter.subscribe("user.created", logObs)
      emitter.emit("user.created", {"id": 1, "name": "Alice"})
      ex13Result = logObs.logs
      ex13Result
  - type: "expansion"
    title: "고급14: 책임 연쇄 패턴"
    code: |-
      from abc import ABC, abstractmethod

      class Handler(ABC):
          def __init__(self):
              self._next = None

          def setNext(self, handler):
              self._next = handler
              return handler

          def handle(self, req):
              result = self.process(req)
              if result is None and self._next:
                  return self._next.handle(req)
              return result

          @abstractmethod
          def process(self, req):
              pass

      class AuthHandler(Handler):
          def process(self, req):
              if not req.get("token"):
                  return {"error": "Not authenticated"}
              return None

      class AuthzHandler(Handler):
          def process(self, req):
              if req.get("role") != "admin":
                  return {"error": "Not authorized"}
              return None

      class DataHandler(Handler):
          def process(self, req):
              return {"success": True, "data": req.get("data")}

      auth = AuthHandler()
