  blocks:
  - type: "text"
    content: "Day 29에서 배운 클린 코드 원칙을 난이도별로 복습합니다. 명확한 변수명과 함수명은 코드의 의도를 드러내고, 단일 책임 원칙은 유지보수성을 높입니다. SOLID 원칙과 DRY, KISS는 좋은 설계의 기초이며, 리팩토링은 기술 부채를 줄이는 핵심 활동입니다. 🟢 기본 문제로 변수명 개선, 매직 넘버 제거 등 기초 리팩토링을 연습하고, 🟡 응용 문제로 함수 분리, 클래스 추출을 수행합니다. 🔴 심화 문제에서는 레거시 코드를 SOLID 원칙에 맞게 전면 리팩토링해봅니다. 클린 코드는 읽기 쉽고, 테스트하기 쉽고, 변경하기 쉬운 코드를 만드는 기술입니다."
