      def sumPrices(items):
          return sum(item["price"] for item in items)

      def applyBulkDisc(total, threshold=100, rate=0.1):
          return total * (1 - rate) if total > threshold else total

      def addSalesTax(total, rate=0.1):
          return total * (1 + rate)

      def processOrderClean(order):
          subtotal = sumPrices(order["items"])
          afterDisc = applyBulkDisc(subtotal)
          return addSalesTax(afterDisc)

      ex2Order = {"items": [{"price": 50}, {"price": 60}]}
      ex2Result = processOrderClean(ex2Order)
