      from abc import ABC, abstractmethod

      class FileComponent(ABC):
          @abstractmethod
          def getSize(self):
              pass

          @abstractmethod
          def getName(self):
              pass

      class File(FileComponent):
          def __init__(self, name, size):
              self._name = name
              self._size = size

          def getSize(self):
              return self._size

          def getName(self):
              return self._name

      class Folder(FileComponent):
          def __init__(self, name):
              self._name = name
              self._children = []

          def add(self, component):
              self._children.append(component)
              return self

          def getSize(self):
              return sum(child.getSize() for child in self._children)

          def getName(self):
              return self._name

          def getCount(self):
              total = len(self._children)
              for child in self._children:
                  if isinstance(child, Folder):
                      total += child.getCount()
              return total

      root = Folder("root")
      docs = Folder("docs")
      docs.add(File("readme.txt", 100))
      docs.add(File("guide.pdf", 500))

      src = Folder("src")
      src.add(File("main.py", 200))
      src.add(File("utils.py", 150))

      root.add(docs).add(src).add(File("config.json", 50))

      ex20Result = {
          "root_size": root.getSize(),
          "docs_size": docs.getSize(),
          "item_count": root.getCount()
      }
      ex20Result
