      from abc import ABC, abstractmethod

      class DataSource(ABC):
          @abstractmethod
          def writeData(self, data):
              pass

          @abstractmethod
          def readData(self):
              pass

      class BaseDataSource(DataSource):
          def __init__(self):
              self._data = ""

          def writeData(self, data):
              self._data = data

          def readData(self):
              return self._data

      class DataSourceDecorator(DataSource):
          def __init__(self, source):
              self._wrapped = source

          def writeData(self, data):
              self._wrapped.writeData(data)

          def readData(self):
              return self._wrapped.readData()

      class EncryptionDecorator(DataSourceDecorator):
          def writeData(self, data):
              encrypted = "".join(chr(ord(c) + 1) for c in data)
              self._wrapped.writeData(encrypted)

          def readData(self):
              encrypted = self._wrapped.readData()
              return "".join(chr(ord(c) - 1) for c in encrypted)

