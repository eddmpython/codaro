      from abc import ABC, abstractmethod

      class OrderState(ABC):
          @abstractmethod
          def next(self, order):
              pass

          @abstractmethod
          def prev(self, order):
              pass

          @abstractmethod
          def getName(self):
              pass

      class PendingState(OrderState):
          def next(self, order):
              order.setState(ProcessingState())

          def prev(self, order):
              pass

          def getName(self):
              return "PENDING"

      class ProcessingState(OrderState):
          def next(self, order):
              order.setState(ShippedState())

          def prev(self, order):
              order.setState(PendingState())

          def getName(self):
              return "PROCESSING"

      class ShippedState(OrderState):
          def next(self, order):
              order.setState(DeliveredState())

          def prev(self, order):
              order.setState(ProcessingState())

          def getName(self):
              return "SHIPPED"

      class DeliveredState(OrderState):
          def next(self, order):
              pass

          def prev(self, order):
              pass

          def getName(self):
              return "DELIVERED"

      class Order:
          def __init__(self):
              self._state = PendingState()

          def setState(self, state):
              self._state = state

          def next(self):
              self._state.next(self)

          def prev(self):
              self._state.prev(self)

          def getStatus(self):
              return self._state.getName()

      order = Order()
      states = [order.getStatus()]
      order.next()
      states.append(order.getStatus())
      order.next()
      states.append(order.getStatus())
      ex17Result = states
      ex17Result
