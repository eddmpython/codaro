- id: "naming"
  title: "명명법"
  subtitle: "의미 있고 명확한 이름"
  blocks:
  - type: "text"
    content: "변수명만 보고도 용도를 알 수 있어야 합니다. 매직 넘버를 상수로, 불리언은 is/has/can 접두사로."
  - type: "code"
    language: "python"
    title: "변수 명명법"
    description: "좋은 변수명 vs 나쁜 변수명"
    content: |-
      badData = [1, 2, 3]
      userAges = [25, 30, 35]

      x = 86400
      SECONDS_PER_DAY = 86400

      flag = True
      isUserLoggedIn = True
      hasPermission = False
      canEdit = True

      namingResult = {
          "bad": "d, x, flag",
          "good": "userAges, SECONDS_PER_DAY, isLoggedIn"
      }
      namingResult
  - type: "code"
    language: "python"
    title: "함수와 클래스 명명"
    description: "동사로 시작하는 함수명"
    content: |-
      def proc():
          pass

      def validateEmail(email):
          return "@" in email

      def fetchActiveUserCount():
          return 100

      class Mgr:
          pass

      class UserAccountManager:
          pass

      classNaming = {
          "bad_func": "proc, getX",
          "good_func": "validateEmail, fetchUserCount",
          "bad_class": "Mgr",
          "good_class": "UserAccountManager"
      }
      classNaming

- id: "function_design"
  title: "함수 설계"
  subtitle: "단일 책임과 작은 함수"
  blocks:
  - type: "text"
    content: "함수는 한 가지 일만 해야 합니다. 큰 함수는 작은 함수로 분리합니다."
  - type: "code"
    language: "python"
    title: "함수 분리"
    description: "큰 함수를 작은 함수로"
    content: |-
      def normalizeEmail(email):
          return email.lower().strip()

      def normalizeName(name):
          return name.strip().title()

      def isAdultAge(age):
          return isinstance(age, int) and age >= 18

      def processUser(user):
          if user.get("email"):
              user["email"] = normalizeEmail(user["email"])
          if user.get("name"):
              user["name"] = normalizeName(user["name"])
          if user.get("age"):
              user["isAdult"] = isAdultAge(user["age"])
          return user

      testUser = {"email": "  TEST@EMAIL.COM  ", "name": "  john doe  ", "age": 25}
      processedResult = processUser(testUser.copy())
      processedResult
  - type: "code"
    language: "python"
    title: "매개변수 줄이기"
    description: "객체로 그룹화"
    content: |-
      class ReportConfig:
          def __init__(self):
              self.includeStats = True
              self.formatType = "html"
              self.sendEmail = False

      class UserInfo:
          def __init__(self, userId, name, email):
              self.userId = userId
              self.name = name
              self.email = email

      def createReport(user, config):
          return {"user": user.name, "format": config.formatType}

      cfg = ReportConfig()
      cfg.formatType = "pdf"
      userInfo = UserInfo("1", "Alice", "alice@test.com")
      paramResult = createReport(userInfo, cfg)
      paramResult

- id: "conditionals"
  title: "조건문 단순화"
  subtitle: "중첩을 평탄화하기"
  blocks:
  - type: "text"
    content: "조기 반환(guard clause)으로 중첩을 줄입니다. 전략 패턴으로 if-else 체인을 제거합니다."
  - type: "code"
    language: "python"
    title: "가드 클로즈"
    description: "조기 반환으로 중첩 제거"
    content: |-
      def isValidUserBad(user):
          if user is not None:
              if user.get("email") is not None:
                  if "@" in user["email"]:
                      if user.get("age") is not None:
                          if user["age"] >= 18:
                              return True
          return False

      def isValidUser(user):
          if not user:
              return False
          if not user.get("email") or "@" not in user["email"]:
              return False
          if not user.get("age") or user["age"] < 18:
              return False
          return True

      testValid = {"email": "test@test.com", "age": 25}
      testInvalid = {"email": "invalid", "age": 15}
      validResult = (isValidUser(testValid), isValidUser(testInvalid))
      validResult
  - type: "code"
    language: "python"
    title: "전략 패턴"
    description: "딕셔너리로 조건문 대체"
    content: |-
      def getDiscountBad(userType):
          if userType == "premium":
              return 0.2
          elif userType == "gold":
              return 0.15
          elif userType == "silver":
              return 0.1
          return 0

      DISCOUNT_RATES = {
          "premium": 0.2,
          "gold": 0.15,
          "silver": 0.1,
          "bronze": 0.05
      }

      def getDiscount(userType):
          return DISCOUNT_RATES.get(userType, 0)

      discountResult = [getDiscount(t) for t in ["premium", "gold", "basic"]]
      discountResult

- id: "error_handling"
  title: "에러 처리"
  subtitle: "의미 있는 예외 처리"
  blocks:
  - type: "text"
    content: "커스텀 예외로 에러 정보를 명확히. Result 패턴으로 예외 대신 반환값 사용."
  - type: "code"
    language: "python"
    title: "커스텀 예외"
    description: "의미 있는 예외 클래스"
    content: |-
      class UserNotFoundError(Exception):
          def __init__(self, userId):
              self.userId = userId
              super().__init__(f"User not found: {userId}")

      class InvalidEmailError(Exception):
          def __init__(self, email):
              self.email = email
              super().__init__(f"Invalid email: {email}")

      def findUser(userId, users):
          user = users.get(userId)
          if not user:
              raise UserNotFoundError(userId)
          return user

      users = {"user1": {"name": "Alice"}}
      errorResult = []
      try:
          findUser("user1", users)
          errorResult.append("found")
      except UserNotFoundError as e:
          errorResult.append(str(e))
      errorResult
  - type: "code"
    language: "python"
    title: "Result 패턴"
    description: "예외 대신 Result 객체"
    content: |-
      class Result:
          def __init__(self, success, value=None, error=None):
              self.success = success
              self.value = value
              self.error = error

          @staticmethod
          def ok(value):
              return Result(True, value=value)

          @staticmethod
          def fail(error):
              return Result(False, error=error)

      def divideNums(a, b):
          if b == 0:
              return Result.fail("Division by zero")
          return Result.ok(a / b)

      divOk = divideNums(10, 2)
      divErr = divideNums(10, 0)
      resultVal = (divOk.value, divErr.error)
      resultVal

- id: "structure"
  title: "코드 구조화"
  subtitle: "의존성 주입과 모듈화"
  blocks:
  - type: "text"
    content: "의존성 주입으로 테스트 용이성 확보. 리포지토리 패턴으로 데이터 접근 추상화."
  - type: "code"
    language: "python"
    title: "의존성 주입"
    description: "서비스 클래스에 의존성 주입"
    content: |-
      class EmailService:
          def send(self, to, subject, body):
              return f"Sent to {to}: {subject}"

      class NotificationService:
          def __init__(self, emailSvc):
              self.emailSvc = emailSvc

          def notifyByEmail(self, to, subject, body):
              return self.emailSvc.send(to, subject, body)

      emailSvc = EmailService()
      notifySvc = NotificationService(emailSvc)
      notifyResult = notifySvc.notifyByEmail("user@test.com", "Hello", "Welcome!")
      notifyResult
  - type: "code"
    language: "python"
    title: "리포지토리 패턴"
    description: "데이터 접근 추상화"
    content: |-
      from abc import ABC, abstractmethod

      class DataRepository(ABC):
          @abstractmethod
          def find(self, id):
              pass

          @abstractmethod
          def save(self, entity):
              pass

      class InMemoryRepo(DataRepository):
          def __init__(self):
              self.data = {}

          def find(self, id):
              return self.data.get(id)

          def save(self, entity):
              self.data[entity["id"]] = entity
              return entity

      class UserSvc:
          def __init__(self, repo):
              self.repo = repo

          def getUser(self, userId):
              return self.repo.find(userId)

          def createUser(self, user):
              return self.repo.save(user)

      repo = InMemoryRepo()
      svc = UserSvc(repo)
      svc.createUser({"id": "1", "name": "Alice"})
      foundUser = svc.getUser("1")
      foundUser

- id: "refactoring"
  title: "리팩토링 기법"
  subtitle: "코드 품질 개선"
  blocks:
  - type: "text"
    content: "함수 추출, 클래스 분리로 단일 책임 원칙 적용."
  - type: "code"
    language: "python"
    title: "함수 추출"
    description: "복잡한 함수를 분해"
    content: |-
      def calculateSubtotal(items):
          return sum(item["price"] * item["qty"] for item in items)

      def applyDiscount(amount, percent):
          return amount * (1 - percent / 100)

      def addTax(amount, rate=0.1):
          return amount * (1 + rate)

      def calculateOrderTotal(order):
          subtotal = calculateSubtotal(order["items"])
          afterDisc = applyDiscount(subtotal, order.get("discountPct", 0))
          total = addTax(afterDisc)
          return total

      testOrder = {
          "items": [{"price": 100, "qty": 2}, {"price": 50, "qty": 1}],
          "discountPct": 10
      }
      orderTotal = calculateOrderTotal(testOrder)
      orderTotal

- id: "practice"
  title: "종합 연습"
