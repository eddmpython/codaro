sections:
- id: "observer_pattern"
  title: "옵저버 패턴"
  subtitle: "상태 변화 통지"
  blocks:
  - type: "text"
    content: "객체 상태 변화를 다른 객체에 통지하는 패턴"
  - type: "code"
    language: "python"
    title: "기본 옵저버 패턴"
    description: "Subject와 Observer를 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class Observer(ABC):
          @abstractmethod
          def update(self, message):
              pass

      class Subject:
          def __init__(self):
              self._observers = []

          def attach(self, observer):
              self._observers.append(observer)

          def detach(self, observer):
              self._observers.remove(observer)

          def notify(self, message):
              for observer in self._observers:
                  observer.update(message)

      class EmailSubscriber(Observer):
          def __init__(self, name):
              self.name = name
              self.messages = []

          def update(self, message):
              self.messages.append(message)

      class SMSSubscriber(Observer):
          def __init__(self, phone):
              self.phone = phone
              self.messages = []

          def update(self, message):
              self.messages.append(f"SMS: {message}")

      newsPublisher = Subject()
      emailSub = EmailSubscriber("Alice")
      smsSub = SMSSubscriber("123-456")
      newsPublisher.attach(emailSub)
      newsPublisher.attach(smsSub)
      newsPublisher.notify("Breaking News!")
      observerResult = (emailSub.messages, smsSub.messages)
      observerResult
  - type: "code"
    language: "python"
    title: "이벤트 이미터"
    description: "이벤트 기반 옵저버 패턴입니다."
    content: |-
      class EventEmitter:
          def __init__(self):
              self._events = {}

          def on(self, event, callback):
              if event not in self._events:
                  self._events[event] = []
              self._events[event].append(callback)

          def off(self, event, callback):
              if event in self._events:
                  self._events[event].remove(callback)

          def emit(self, event, *args):
              results = []
              if event in self._events:
                  for callback in self._events[event]:
                      results.append(callback(*args))
              return results

      emitter = EventEmitter()
      clickResults = []
      hoverResults = []
      emitter.on("click", lambda x, y: clickResults.append(f"Clicked at ({x}, {y})"))
      emitter.on("hover", lambda x, y: hoverResults.append(f"Hovered at ({x}, {y})"))
      emitter.emit("click", 100, 200)
      emitter.emit("hover", 50, 75)
      emitterResult = (clickResults, hoverResults)
      emitterResult

- id: "strategy_pattern"
  title: "전략 패턴"
  subtitle: "알고리즘 캡슐화"
  blocks:
  - type: "text"
    content: "알고리즘을 캡슐화하여 교체 가능하게 하는 패턴"
  - type: "code"
    language: "python"
    title: "결제 전략"
    description: "다양한 결제 방식을 전략으로 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class PaymentStrategy(ABC):
          @abstractmethod
          def pay(self, amount):
              pass

      class CreditCardPayment(PaymentStrategy):
          def __init__(self, cardNumber):
              self.cardNumber = cardNumber

          def pay(self, amount):
              return f"Paid ${amount} with card ending {self.cardNumber[-4:]}"

      class PayPalPayment(PaymentStrategy):
          def __init__(self, email):
              self.email = email

          def pay(self, amount):
              return f"Paid ${amount} via PayPal ({self.email})"

      class CryptoPayment(PaymentStrategy):
          def __init__(self, wallet):
              self.wallet = wallet

          def pay(self, amount):
              return f"Paid ${amount} in crypto to {self.wallet[:8]}..."

      class ShoppingCart:
          def __init__(self):
              self.items = []
              self.paymentStrategy = None

          def addItem(self, item, price):
              self.items.append((item, price))

          def setPaymentStrategy(self, strategy):
              self.paymentStrategy = strategy

          def checkout(self):
              total = sum(price for _, price in self.items)
              return self.paymentStrategy.pay(total)

      cart = ShoppingCart()
      cart.addItem("Book", 20)
      cart.addItem("Pen", 5)
      cart.setPaymentStrategy(CreditCardPayment("1234567890123456"))
      payResult1 = cart.checkout()
      cart.setPaymentStrategy(PayPalPayment("user@email.com"))
      payResult2 = cart.checkout()
      strategyResult = (payResult1, payResult2)
      strategyResult
  - type: "code"
    language: "python"
    title: "정렬 전략"
    description: "다양한 정렬 알고리즘을 전략으로 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class SortStrategy(ABC):
          @abstractmethod
          def sort(self, data):
              pass

      class BubbleSort(SortStrategy):
          def sort(self, data):
              arr = data.copy()
              n = len(arr)
              for i in range(n):
                  for j in range(0, n - i - 1):
                      if arr[j] > arr[j + 1]:
                          arr[j], arr[j + 1] = arr[j + 1], arr[j]
              return arr

      class QuickSortStrategy(SortStrategy):
          def sort(self, data):
              if len(data) <= 1:
                  return data
              pivot = data[len(data) // 2]
              left = [x for x in data if x < pivot]
              middle = [x for x in data if x == pivot]
              right = [x for x in data if x > pivot]
              return self.sort(left) + middle + self.sort(right)

      class Sorter:
          def __init__(self, strategy):
              self.strategy = strategy

          def setStrategy(self, strategy):
              self.strategy = strategy

          def sort(self, data):
              return self.strategy.sort(data)

      testData = [64, 34, 25, 12, 22, 11, 90]
      sorter = Sorter(BubbleSort())
      bubbleResult = sorter.sort(testData)
      sorter.setStrategy(QuickSortStrategy())
      quickResult = sorter.sort(testData)
      sortResult = (bubbleResult, quickResult)
      sortResult

- id: "command_pattern"
  title: "커맨드 패턴"
  subtitle: "요청 캡슐화"
  blocks:
  - type: "text"
    content: "요청을 객체로 캡슐화하여 매개변수화하는 패턴"
  - type: "code"
    language: "python"
    title: "조명 제어 커맨드"
    description: "커맨드 패턴으로 조명을 제어합니다."
    content: |-
      from abc import ABC, abstractmethod

      class Command(ABC):
          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def undo(self):
              pass

      class Light:
          def __init__(self):
              self.isOn = False

          def turnOn(self):
              self.isOn = True
              return "Light is ON"

          def turnOff(self):
              self.isOn = False
              return "Light is OFF"

      class LightOnCommand(Command):
          def __init__(self, light):
              self.light = light

          def execute(self):
              return self.light.turnOn()

          def undo(self):
              return self.light.turnOff()

      class LightOffCommand(Command):
          def __init__(self, light):
              self.light = light

          def execute(self):
              return self.light.turnOff()

          def undo(self):
              return self.light.turnOn()

      class RemoteControl:
          def __init__(self):
              self.history = []

          def submit(self, command):
              result = command.execute()
              self.history.append(command)
              return result

          def undoLast(self):
              if self.history:
                  return self.history.pop().undo()
              return "Nothing to undo"

      light = Light()
      remote = RemoteControl()
      cmdResult1 = remote.submit(LightOnCommand(light))
      cmdResult2 = remote.submit(LightOffCommand(light))
      cmdResult3 = remote.undoLast()
      commandResult = (cmdResult1, cmdResult2, cmdResult3, light.isOn)
      commandResult
  - type: "code"
    language: "python"
    title: "텍스트 에디터 커맨드"
    description: "Undo/Redo 기능을 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class TextCommand(ABC):
          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def undo(self):
              pass

      class TextEditor:
          def __init__(self):
              self.content = ""

          def write(self, text):
              self.content += text

          def delete(self, count):
              deleted = self.content[-count:]
              self.content = self.content[:-count]
              return deleted

          def getContent(self):
              return self.content

      class WriteCommand(TextCommand):
          def __init__(self, editor, text):
              self.editor = editor
              self.text = text

          def execute(self):
              self.editor.write(self.text)

          def undo(self):
              self.editor.delete(len(self.text))

      class DeleteCommand(TextCommand):
          def __init__(self, editor, count):
              self.editor = editor
              self.count = count
              self.deleted = ""

          def execute(self):
              self.deleted = self.editor.delete(self.count)

          def undo(self):
              self.editor.write(self.deleted)

      class CommandManager:
          def __init__(self):
              self.undoStack = []
              self.redoStack = []

          def execute(self, command):
              command.execute()
              self.undoStack.append(command)
              self.redoStack.clear()

          def undo(self):
              if self.undoStack:
                  command = self.undoStack.pop()
                  command.undo()
                  self.redoStack.append(command)

          def redo(self):
              if self.redoStack:
                  command = self.redoStack.pop()
                  command.execute()
                  self.undoStack.append(command)

      textEditor = TextEditor()
      cmdManager = CommandManager()
      cmdManager.execute(WriteCommand(textEditor, "Hello "))
      cmdManager.execute(WriteCommand(textEditor, "World"))
      contentAfterWrite = textEditor.getContent()
      cmdManager.undo()
      contentAfterUndo = textEditor.getContent()
      cmdManager.redo()
      contentAfterRedo = textEditor.getContent()
      textCmdResult = (contentAfterWrite, contentAfterUndo, contentAfterRedo)
      textCmdResult

- id: "state_pattern"
  title: "상태 패턴"
  subtitle: "상태에 따른 행동 변경"
  blocks:
  - type: "text"
    content: "객체의 상태에 따라 행동을 변경하는 패턴"
  - type: "code"
    language: "python"
    title: "자판기 상태"
    description: "자판기의 상태 변화를 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class State(ABC):
          @abstractmethod
          def insertCoin(self):
              pass

          @abstractmethod
          def ejectCoin(self):
              pass

          @abstractmethod
          def dispense(self):
              pass

      class NoCoinState(State):
          def __init__(self, machine):
              self.machine = machine

          def insertCoin(self):
              self.machine.setState(self.machine.hasCoinState)
              return "Coin inserted"

          def ejectCoin(self):
              return "No coin to eject"

          def dispense(self):
              return "Insert coin first"

      class HasCoinState(State):
          def __init__(self, machine):
              self.machine = machine

          def insertCoin(self):
              return "Coin already inserted"

          def ejectCoin(self):
              self.machine.setState(self.machine.noCoinState)
              return "Coin ejected"

          def dispense(self):
              self.machine.setState(self.machine.noCoinState)
              return "Item dispensed"

      class VendingMachine:
          def __init__(self):
              self.noCoinState = NoCoinState(self)
              self.hasCoinState = HasCoinState(self)
              self.state = self.noCoinState

          def setState(self, state):
              self.state = state

          def insertCoin(self):
              return self.state.insertCoin()

          def ejectCoin(self):
              return self.state.ejectCoin()

          def dispense(self):
              return self.state.dispense()

      vendingMachine = VendingMachine()
      vmResult1 = vendingMachine.dispense()
      vmResult2 = vendingMachine.insertCoin()
      vmResult3 = vendingMachine.dispense()
      stateResult = (vmResult1, vmResult2, vmResult3)
      stateResult
  - type: "code"
    language: "python"
    title: "주문 상태"
    description: "주문의 상태 전이를 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class OrderState(ABC):
          @abstractmethod
          def next(self, order):
              pass

          @abstractmethod
          def prev(self, order):
              pass

          @abstractmethod
          def getStatus(self):
              pass

      class PendingState(OrderState):
          def next(self, order):
              order.setState(ProcessingState())

          def prev(self, order):
              pass

          def getStatus(self):
              return "Pending"

      class ProcessingState(OrderState):
          def next(self, order):
              order.setState(ShippedState())

          def prev(self, order):
              order.setState(PendingState())

          def getStatus(self):
              return "Processing"

      class ShippedState(OrderState):
          def next(self, order):
              order.setState(DeliveredState())

          def prev(self, order):
              order.setState(ProcessingState())

          def getStatus(self):
              return "Shipped"

      class DeliveredState(OrderState):
          def next(self, order):
              pass

          def prev(self, order):
              pass

          def getStatus(self):
              return "Delivered"

      class Order:
          def __init__(self):
              self.state = PendingState()

          def setState(self, state):
              self.state = state

          def nextState(self):
              self.state.next(self)

          def prevState(self):
              self.state.prev(self)

          def getStatus(self):
              return self.state.getStatus()

      order = Order()
      orderStatus1 = order.getStatus()
      order.nextState()
      orderStatus2 = order.getStatus()
      order.nextState()
      orderStatus3 = order.getStatus()
      order.prevState()
      orderStatus4 = order.getStatus()
      orderResult = (orderStatus1, orderStatus2, orderStatus3, orderStatus4)
      orderResult

- id: "template_method_pattern"
  title: "템플릿 메서드 패턴"
  subtitle: "알고리즘 골격 정의"
  blocks:
  - type: "text"
    content: "알고리즘 골격을 정의하고 일부 단계를 서브클래스에 위임"
  - type: "code"
    language: "python"
    title: "데이터 마이너"
    description: "데이터 처리 템플릿을 구현합니다."
    content: |-
      from abc import ABC, abstractmethod

      class DataMiner(ABC):
          def mine(self, path):
              file = self.openFile(path)
              rawData = self.extractData(file)
              data = self.parseData(rawData)
              analysis = self.analyzeData(data)
              return self.sendReport(analysis)

          @abstractmethod
          def openFile(self, path):
              pass

          @abstractmethod
          def extractData(self, file):
              pass

          def parseData(self, rawData):
              return rawData.split(",")

          def analyzeData(self, data):
              return f"Analyzed {len(data)} items"

          def sendReport(self, analysis):
              return f"Report: {analysis}"

      class PDFMiner(DataMiner):
          def openFile(self, path):
              return f"PDF:{path}"

          def extractData(self, file):
              return "pdf,data,extracted"

      class CSVMiner(DataMiner):
          def openFile(self, path):
              return f"CSV:{path}"

          def extractData(self, file):
              return "csv,data,extracted,more"

      pdfMiner = PDFMiner()
      csvMiner = CSVMiner()
      pdfReport = pdfMiner.mine("doc.pdf")
      csvReport = csvMiner.mine("data.csv")
      templateResult = (pdfReport, csvReport)
      templateResult
  - type: "code"
    language: "python"
    title: "게임 AI"
    description: "게임 AI의 턴 처리 템플릿입니다."
    content: |-
      from abc import ABC, abstractmethod

      class GameAI(ABC):
          def turn(self):
              resources = self.collectResources()
              units = self.buildUnits(resources)
              structures = self.buildStructures(resources)
              attack = self.attack(units)
              return {"resources": resources, "units": units, "structures": structures, "attack": attack}

          def collectResources(self):
              return 100

          @abstractmethod
          def buildUnits(self, resources):
              pass

          @abstractmethod
          def buildStructures(self, resources):
              pass

          def attack(self, units):
              return f"Attacking with {units}"

      class OrcsAI(GameAI):
          def buildUnits(self, resources):
              return f"Built {resources // 10} Orcs"

          def buildStructures(self, resources):
              return "Built Barracks"

      class MonstersAI(GameAI):
          def collectResources(self):
              return 50

          def buildUnits(self, resources):
              return f"Spawned {resources // 5} Monsters"

          def buildStructures(self, resources):
              return "Built Lair"

      orcsAI = OrcsAI()
      monstersAI = MonstersAI()
      orcsTurn = orcsAI.turn()
      monstersTurn = monstersAI.turn()
      gameResult = (orcsTurn["units"], monstersTurn["units"])
      gameResult

- id: "chain_of_responsibility"
  title: "책임 연쇄 패턴"
  subtitle: "핸들러 체인"
  blocks:
  - type: "text"
    content: "요청을 처리할 수 있는 핸들러를 연쇄적으로 연결"
  - type: "code"
    language: "python"
    title: "인증 핸들러 체인"
    description: "인증 및 권한 검사 체인입니다."
    content: |-
      from abc import ABC, abstractmethod

      class Handler(ABC):
          def __init__(self):
              self._next = None

          def setNext(self, handler):
              self._next = handler
              return handler

          @abstractmethod
          def handle(self, request):
              pass

      class AuthHandler(Handler):
          def handle(self, request):
              if request.get("authenticated"):
                  if self._next:
                      return self._next.handle(request)
                  return "Authorized"
              return "Authentication failed"

      class RoleHandler(Handler):
          def handle(self, request):
              if request.get("role") == "admin":
                  if self._next:
                      return self._next.handle(request)
                  return "Admin access granted"
              return "Insufficient permissions"

      class LogHandler(Handler):
          def handle(self, request):
              result = f"Logged: {request.get('action')}"
              if self._next:
                  return result + " -> " + self._next.handle(request)
              return result

      authHandler = AuthHandler()
      roleHandler = RoleHandler()
      logHandler = LogHandler()
      authHandler.setNext(roleHandler).setNext(logHandler)
      chainReq1 = {"authenticated": True, "role": "admin", "action": "delete"}
      chainReq2 = {"authenticated": True, "role": "user", "action": "read"}
      chainReq3 = {"authenticated": False, "role": "admin", "action": "create"}
      chainResult1 = authHandler.handle(chainReq1)
      chainResult2 = authHandler.handle(chainReq2)
      chainResult3 = authHandler.handle(chainReq3)
      chainResult = (chainResult1, chainResult2, chainResult3)
      chainResult
  - type: "code"
    language: "python"
    title: "기술 지원 체인"
    description: "티켓 우선순위에 따른 처리 체인입니다."
    content: |-
      from abc import ABC, abstractmethod

      class SupportHandler(ABC):
          def __init__(self):
              self._next = None
              self.level = 0

          def setNext(self, handler):
              self._next = handler
              return handler

          def handle(self, ticket):
              if ticket["priority"] <= self.level:
                  return self.resolve(ticket)
              elif self._next:
                  return self._next.handle(ticket)
              return "Ticket escalated to management"

          @abstractmethod
          def resolve(self, ticket):
              pass

      class FrontDesk(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 1

          def resolve(self, ticket):
              return f"Front desk resolved: {ticket['issue']}"

      class TechSupport(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 2

          def resolve(self, ticket):
              return f"Tech support resolved: {ticket['issue']}"

      class Engineer(SupportHandler):
          def __init__(self):
              super().__init__()
              self.level = 3

          def resolve(self, ticket):
              return f"Engineer resolved: {ticket['issue']}"

      frontDesk = FrontDesk()
      techSupport = TechSupport()
      engineer = Engineer()
      frontDesk.setNext(techSupport).setNext(engineer)
      ticket1 = {"issue": "Password reset", "priority": 1}
      ticket2 = {"issue": "Software bug", "priority": 2}
      ticket3 = {"issue": "System crash", "priority": 3}
      ticket4 = {"issue": "Critical failure", "priority": 4}
      supportResult = (frontDesk.handle(ticket1), frontDesk.handle(ticket2), frontDesk.handle(ticket3), frontDesk.handle(ticket4))
      supportResult

- id: "practice"
  title: "종합 복습"
  subtitle: "행동 패턴 마스터하기"
  blocks:
  - type: "text"
    content: "Day 22에서 배운 행동 디자인 패턴을 난이도별로 복습합니다. 옵저버 패턴은 이벤트 시스템, 전략 패턴은 알고리즘 교체, 커맨드 패턴은 실행 취소/재실행에 핵심입니다. 상태 패턴은 복잡한 상태 전이를 객체로 캡슐화하고, 템플릿 메서드는 알고리즘의 골격을 정의합니다. 🟢 기본 문제로 각 패턴의 핵심 인터페이스를 구현하고, 🟡 응용 문제로 여러 패턴을 조합해봅니다. 🔴 심화 문제에서는 GUI 프레임워크, 게임 엔진 등에서 사용되는 복합 행동 패턴을 직접 설계합니다. 행동 패턴은 객체 간 책임 분배와 통신 방식을 결정하는 핵심 도구입니다."

  - type: "expansion"
    title: "🟢 기본1: 간단한 옵저버"
    code: |-
