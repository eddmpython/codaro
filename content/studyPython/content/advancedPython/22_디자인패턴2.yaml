      from abc import ABC, abstractmethod

      class TransactionCommand(ABC):
          @abstractmethod
          def execute(self):
              pass

          @abstractmethod
          def rollback(self):
              pass

      class TransferCommand(TransactionCommand):
          def __init__(self, fromAcc, toAcc, amount):
              self.fromAcc = fromAcc
              self.toAcc = toAcc
              self.amount = amount
              self.executed = False

          def execute(self):
              if self.fromAcc["balance"] >= self.amount:
                  self.fromAcc["balance"] -= self.amount
                  self.toAcc["balance"] += self.amount
                  self.executed = True
                  return True
              return False

          def rollback(self):
              if self.executed:
                  self.fromAcc["balance"] += self.amount
                  self.toAcc["balance"] -= self.amount
                  self.executed = False

      class Transaction:
          def __init__(self):
              self.commands = []

          def add(self, command):
              self.commands.append(command)

          def execute(self):
              executed = []
              for cmd in self.commands:
                  if cmd.execute():
                      executed.append(cmd)
                  else:
                      for c in reversed(executed):
                          c.rollback()
                      return False
              return True

      account1 = {"balance": 100}
      account2 = {"balance": 50}
      transaction = Transaction()
      transaction.add(TransferCommand(account1, account2, 30))
      transaction.add(TransferCommand(account2, account1, 20))
