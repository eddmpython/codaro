      class DataSource:
          def writeData(self, data):
              return data

          def readData(self):
              return ""

      class FileDataSource(DataSource):
          def __init__(self):
              self.data = ""

          def writeData(self, data):
              self.data = data
              return f"Written: {data}"

          def readData(self):
              return self.data

      class DataSourceDecorator(DataSource):
          def __init__(self, source):
              self.wrappee = source

          def writeData(self, data):
              return self.wrappee.writeData(data)

          def readData(self):
              return self.wrappee.readData()

      class EncryptionDecorator(DataSourceDecorator):
          def writeData(self, data):
              encrypted = ''.join(chr(ord(c) + 1) for c in data)
              return self.wrappee.writeData(encrypted)

          def readData(self):
              data = self.wrappee.readData()
              return ''.join(chr(ord(c) - 1) for c in data)

      class CompressionDecorator(DataSourceDecorator):
          def writeData(self, data):
              compressed = f"[compressed:{len(data)}]{data[:5]}..."
              return self.wrappee.writeData(compressed)

          def readData(self):
              return self.wrappee.readData()

      fileSource = FileDataSource()
      encrypted = EncryptionDecorator(fileSource)
      compressed = CompressionDecorator(encrypted)
      writeResult = compressed.writeData("Hello World")
      readResult = fileSource.data
      ex13Result = (writeResult, readResult)
      ex13Result

