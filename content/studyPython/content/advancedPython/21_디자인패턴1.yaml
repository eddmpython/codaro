      class Connection:
          def __init__(self, connId):
              self.connId = connId
              self.inUse = False

          def execute(self, query):
              return f"Connection {self.connId}: {query}"

      class ConnectionPool:
          _instance = None

          def __new__(cls, size=3):
              if cls._instance is None:
                  cls._instance = super().__new__(cls)
                  cls._instance.pool = [Connection(i) for i in range(size)]
              return cls._instance

          def acquire(self):
              for conn in self.pool:
                  if not conn.inUse:
                      conn.inUse = True
                      return conn
              return None

          def release(self, conn):
              conn.inUse = False

          def getStatus(self):
              available = sum(1 for c in self.pool if not c.inUse)
              return f"{available}/{len(self.pool)} available"

      connPool = ConnectionPool(3)
      conn1 = connPool.acquire()
      conn2 = connPool.acquire()
      status1 = connPool.getStatus()
      connPool.release(conn1)
      status2 = connPool.getStatus()
      ex17Result = (status1, status2)
      ex17Result

