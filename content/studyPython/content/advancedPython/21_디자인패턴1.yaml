          def __init__(self, filename):
              self.filename = filename

          def display(self):
              if self.filename not in CachedProxyImage._cache:
                  CachedProxyImage._cache[self.filename] = RealImage(self.filename)
              return CachedProxyImage._cache[self.filename].display()

