      def withRecursionLimit(maxDepth):
          def decorator(func):
              depth = 0
              def wrapper(*args, **kwargs):
                  nonlocal depth
                  if depth >= maxDepth:
                      raise RecursionError(f"Max depth {maxDepth} exceeded")
                  depth += 1
                  try:
                      return func(*args, **kwargs)
                  finally:
                      depth -= 1
              return wrapper
          return decorator

