meta:
  id: "11_glob"
  title: "glob - 파일 패턴 매칭"
  category: "builtins"
  tags: ["glob", "패턴", "와일드카드", "파일검색"]
  seo:
    title: "파이썬 glob 모듈 완전 정복"
    description: "glob 모듈로 와일드카드 패턴 매칭과 파일 검색을 배웁니다."
    keywords: ["glob", "패턴매칭", "와일드카드", "파일검색", "파이썬glob"]

intro:
  emoji: "🔎"
  points:
  - "와일드카드 패턴 매칭"
  - "재귀적 파일 검색"
  - "확장자별 필터링"
  - "메모리 효율적 탐색"

sections:
- id: "module_import"
  title: "glob 모듈 불러오기"
  subtitle: "⚠️ 가장 먼저 실행하세요"
  blocks:
  - type: "text"
    content: "glob는 파일 패턴 매칭을 위한 파이썬 표준 라이브러리입니다. 와일드카드(*, ?, [])를 사용하여 파일을 검색할 수 있습니다. Unix 스타일의 경로명 패턴 확장을 지원합니다."
  - type: "note"
    content: "이 섹션을 먼저 실행하면 아래 모든 예제에서 glob 모듈을 사용할 수 있습니다."
  - type: "code"
    language: "python"
    title: "glob 모듈 불러오기"
    description: "glob 모듈을 불러오고 정상 작동을 확인합니다."
    content: |-
      import glob
  - type: "tip"
    content: "Marimo에서는 한 번 import하면 이후 모든 셀에서 사용 가능합니다. 중복 import는 에러를 발생시킵니다."

- id: "basic_patterns"
  title: "기본 패턴"
  subtitle: "*, ?, [] 와일드카드 사용"
  blocks:
  - type: "text"
    content: "glob는 Unix 셸 스타일의 와일드카드를 지원합니다. *는 모든 문자, ?는 단일 문자, []는 문자 범위를 나타냅니다. 이를 조합하여 다양한 파일 검색 패턴을 만들 수 있습니다."
  - type: "list"
    items:
    - "*: 모든 문자 매칭"
    - "?: 단일 문자 매칭"
    - "[]: 문자 범위 매칭"
    - "glob.glob(): 패턴으로 파일 검색"
  - type: "code"
    language: "python"
    title: "모든 텍스트 파일 검색"
    description: "*.txt 패턴으로 현재 디렉토리의 모든 텍스트 파일을 찾습니다."
    content: |-
      patternPy = '*.py'
      resultFiles = glob.glob(patternPy)
      resultFiles
  - type: "code"
    language: "python"
    title: "단일 문자 매칭"
    description: "data?.csv 패턴으로 data 뒤에 한 글자가 있는 CSV 파일을 찾습니다."
    content: |-
      singleCharPattern = 'data?.csv'
      singleCharPattern
  - type: "code"
    language: "python"
    title: "숫자 범위 매칭"
    description: "file[0-9].txt 패턴으로 숫자가 포함된 파일을 찾습니다."
    content: |-
      numberPattern = 'file[0-9].txt'
      numberPattern
  - type: "tip"
    content: "Pyodide 환경에서는 가상 파일시스템만 검색됩니다. 실제 파일이 없으면 빈 리스트가 반환됩니다."

- id: "recursive_search"
  title: "재귀 검색"
  subtitle: "하위 디렉토리까지 검색"
  blocks:
  - type: "text"
    content: "**/ 패턴과 recursive=True 옵션을 사용하면 현재 디렉토리뿐만 아니라 모든 하위 디렉토리까지 검색할 수 있습니다. 대규모 프로젝트에서 특정 확장자 파일을 모두 찾을 때 유용합니다."
  - type: "list"
    items:
    - "**/: 모든 하위 디렉토리"
    - "recursive=True: 재귀 검색 활성화"
    - "**/*.ext: 모든 하위의 특정 확장자"
    - "path/**/file: 특정 경로 하위 검색"
  - type: "code"
    language: "python"
    title: "모든 파이썬 파일 검색"
    description: "**/*.py 패턴으로 모든 하위 디렉토리의 파이썬 파일을 찾습니다."
    content: |-
      recursivePattern = '**/*.py'
      allPyFiles = glob.glob(recursivePattern, recursive=True)
      allPyFiles
  - type: "code"
    language: "python"
    title: "YAML 파일 재귀 검색"
    description: "**/*.yaml 패턴으로 모든 YAML 파일을 검색합니다."
    content: |-
      yamlPattern = '**/*.yaml'
      yamlFiles = glob.glob(yamlPattern, recursive=True)
      yamlFiles
  - type: "code"
    language: "python"
    title: "테스트 파일 검색"
    description: "**/test_*.py 패턴으로 모든 테스트 파일을 찾습니다."
    content: |-
      testPattern = '**/test_*.py'
      testFiles = glob.glob(testPattern, recursive=True)
      testFiles
  - type: "tip"
    content: "재귀 검색은 파일이 많을 경우 시간이 걸릴 수 있습니다. 가능하면 검색 범위를 제한하세요."

- id: "iglob"
  title: "이터레이터 버전"
  subtitle: "메모리 효율적인 검색"
  blocks:
  - type: "text"
    content: "glob.iglob()는 glob.glob()의 이터레이터 버전입니다. 파일 목록을 한 번에 메모리에 로드하지 않고 순차적으로 처리할 수 있어 메모리 효율적입니다. 대량의 파일을 다룰 때 유용합니다."
  - type: "list"
    items:
    - "iglob(): 이터레이터 반환"
    - "list(): 이터레이터를 리스트로 변환"
    - "메모리 효율: 대용량 파일 처리"
    - "한 번만 순회: 재사용 불가"
  - type: "code"
    language: "python"
    title: "로그 파일 이터레이터"
    description: "*.log 패턴으로 iglob 이터레이터를 생성합니다."
    content: |-
      logPattern = '*.log'
      logIterator = glob.iglob(logPattern)
      logIterator
  - type: "code"
    language: "python"
    title: "이터레이터를 리스트로 변환"
    description: "iglob 이터레이터를 리스트로 변환하여 사용합니다."
    content: |-
      txtPattern = '*.txt'
      txtIterator = glob.iglob(txtPattern)
      txtList = list(txtIterator)
      txtList
  - type: "code"
    language: "python"
    title: "재귀 iglob"
    description: "**/*.json 패턴으로 재귀 검색 이터레이터를 생성합니다."
    content: |-
      jsonPattern = '**/*.json'
      jsonIter = glob.iglob(jsonPattern, recursive=True)
      jsonIter
  - type: "tip"
    content: "이터레이터는 한 번만 순회할 수 있습니다. 다시 사용하려면 새로 생성해야 합니다."

- id: "advanced_patterns"
  title: "고급 패턴"
  subtitle: "문자 범위와 복합 패턴"
  blocks:
  - type: "text"
    content: "문자 범위([a-z], [0-9])와 복합 패턴을 사용하여 더 정교한 파일 검색이 가능합니다. 특정 명명 규칙을 따르는 파일을 찾거나 정규식처럼 패턴을 조합할 수 있습니다."
  - type: "list"
    items:
    - "[a-z]: 소문자 범위"
    - "[0-9]: 숫자 범위"
    - "[A-Z]: 대문자 범위"
    - "복합 패턴: 여러 패턴 조합"
  - type: "code"
    language: "python"
    title: "소문자 시작 파일"
    description: "[a-z]*.txt 패턴으로 소문자로 시작하는 텍스트 파일을 찾습니다."
    content: |-
      lowerPattern = '[a-z]*.txt'
      lowerFiles = glob.glob(lowerPattern)
      lowerFiles
  - type: "code"
    language: "python"
    title: "두 자리 숫자 파일"
    description: "file[0-9][0-9].csv 패턴으로 두 자리 숫자가 있는 파일을 찾습니다."
    content: |-
      twoDigitPattern = 'file[0-9][0-9].csv'
      twoDigitFiles = glob.glob(twoDigitPattern)
      twoDigitFiles
  - type: "code"
    language: "python"
    title: "2020년대 로그 파일"
    description: "log_202[0-9]*.txt 패턴으로 2020년대 로그를 찾습니다."
    content: |-
      logYearPattern = 'log_202[0-9]*.txt'
      logYearFiles = glob.glob(logYearPattern)
      logYearFiles
  - type: "tip"
    content: "복잡한 패턴은 정규식보다 간단하지만 제한적입니다. 복잡한 검색은 re 모듈과 결합하세요."

- id: "practical_use"
  title: "실전 활용"
  subtitle: "실무 파일 검색 패턴"
  blocks:
  - type: "text"
    content: "glob를 실전에서 활용하는 방법을 살펴봅니다. 여러 확장자 동시 검색, 파일 개수 확인, 최신 파일 찾기 등 실무에서 자주 사용하는 패턴을 학습합니다."
  - type: "list"
    items:
    - "여러 확장자 검색"
    - "파일 개수 확인"
    - "파일명 추출"
    - "최신 파일 찾기"
  - type: "code"
    language: "python"
    title: "여러 확장자 검색"
    description: "리스트 컴프리헨션으로 여러 확장자를 동시에 검색합니다."
    content: |-
      extensions = ['*.py', '*.yaml']
      multiFiles = [f for ext in extensions for f in glob.glob(ext)]
      multiFiles
  - type: "code"
    language: "python"
    title: "이미지 파일 검색"
    description: "특정 디렉토리의 모든 이미지 파일을 검색합니다."
    content: |-
      imgExts = ['images/*.png', 'images/*.jpg']
      imgFiles = [i for ext in imgExts for i in glob.glob(ext)]
      imgFiles
  - type: "code"
    language: "python"
    title: "파일 개수 확인"
    description: "*.json 파일의 개수를 셉니다."
    content: |-
      jsonCount = len(glob.glob('*.json'))
      jsonCount
  - type: "code"
    language: "python"
    title: "파일명만 추출"
    description: "os.path.basename으로 경로에서 파일명만 추출합니다."
    content: |-
      import os
      allCsv = glob.glob('data/*.csv')
      csvNames = [os.path.basename(p) for p in allCsv]
      csvNames
  - type: "tip"
    content: "os.path, pathlib과 함께 사용하면 강력한 파일 관리 도구가 됩니다."

- id: "practice"
  title: "glob 모듈 종합 복습"
  subtitle: "파일 패턴 매칭 마스터하기"
  blocks:
  - type: "text"
    content: "glob 모듈의 다양한 기능을 활용하는 연습 문제입니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요."

  - type: "expansion"
    title: "🟢 기본1: HTML 파일 패턴"
    code: |-
      '*.html'

  - type: "expansion"
    title: "🟢 기본2: 단일 문자 매칭 패턴"
    code: |-
      'data?.txt'

  - type: "expansion"
    title: "🟢 기본3: CSS 파일 검색"
    code: |-
      cssFiles = glob.glob('*.css')
      cssFiles

  - type: "expansion"
    title: "🟢 기본4: 숫자 범위 패턴"
    code: |-
      'file[1-5].txt'

  - type: "expansion"
    title: "🟢 기본5: iglob 이터레이터"
    code: |-
      xmlIter = glob.iglob('*.xml')
      xmlIter

  - type: "expansion"
    title: "🟡 응용1: 마크다운 파일 재귀 검색"
    code: |-
      mdFiles = glob.glob('**/*.md', recursive=True)
      mdFiles

  - type: "expansion"
    title: "🟡 응용2: TypeScript 파일 검색"
    code: |-
      tsFiles = glob.glob('src/**/*.ts', recursive=True)
      tsFiles

  - type: "expansion"
    title: "🟡 응용3: 특정 문자 매칭"
    code: |-
      reportFiles = glob.glob('report[abc].pdf')
      reportFiles

  - type: "expansion"
    title: "🟡 응용4: 대문자 시작 Java 파일"
    code: |-
      javaFiles = glob.glob('[A-Z]*.java')
      javaFiles

  - type: "expansion"
    title: "🟡 응용5: iglob 재귀 검색"
    code: |-
      sqlIter = glob.iglob('**/*.sql', recursive=True)
      sqlFiles = list(sqlIter)
      sqlFiles

  - type: "expansion"
    title: "🔴 심화1: 여러 확장자 동시 검색"
    code: |-
      jsExts = ['*.js', '*.ts', '*.jsx']
      jsAllFiles = [f for e in jsExts for f in glob.glob(e)]
      jsAllFiles

  - type: "expansion"
    title: "🔴 심화2: 디렉토리 모든 파일"
    code: |-
      logsAllFiles = glob.glob('logs/*.*')
      logsAllFiles

  - type: "expansion"
    title: "🔴 심화3: 두 자리 숫자 테스트 파일"
    code: |-
      testNumFiles = glob.glob('test_[0-9][0-9].py')
      testNumFiles

  - type: "expansion"
    title: "🔴 심화4: 설정 파일 재귀 검색"
    code: |-
      configFiles = glob.glob('**/*.config.js', recursive=True)
      configFiles

  - type: "expansion"
    title: "🔴 심화5: 임시 파일 개수"
    code: |-
      tmpCount = len(glob.glob('*.tmp'))
      tmpCount

  - type: "expansion"
    title: "🔴 심화6: 이미지 파일 합치기"
    code: |-
      pngFiles = glob.glob('assets/**/*.png', recursive=True)
      jpgFiles = glob.glob('assets/**/*.jpg', recursive=True)
      imageFiles = pngFiles + jpgFiles
      imageFiles

  - type: "expansion"
    title: "🔴 심화7: 연도+월 백업 파일"
    code: |-
      monthlyBackups = glob.glob('backup_202[0-9]_[01][0-9].sql')
      monthlyBackups

  - type: "expansion"
    title: "🔴 심화8: iglob 첫 5개"
    code: |-
      testJsIter = glob.iglob('**/*.test.js', recursive=True)
      firstFiveTests = list(testJsIter)[:5]
      firstFiveTests

  - type: "expansion"
    title: "🔴 심화9: 두 문자+두 숫자 패턴"
    code: |-
      datFiles = glob.glob('[a-z][a-z][0-9][0-9].dat')
      datFiles

  - type: "expansion"
    title: "🔴 심화10: 파일명만 추출"
    code: |-
      import os
      pdfPaths = glob.glob('docs/**/*.pdf', recursive=True)
      pdfNames = [os.path.basename(p) for p in pdfPaths]
      pdfNames
