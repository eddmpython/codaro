intro:
  emoji: "🏆"
  goal: 01-09 프로젝트의 모든 개념을 종합하여 다변량 시계열 분석을 완성합니다
  description: VAR(Vector Autoregression) 모델로 여러 경제 지표를 동시에 예측합니다. 그랜저 인과성 검정, 충격반응함수 등 고급 시계열 분석 기법을 배웁니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 미국 거시경제 데이터
  blocks:
  - type: text
    content: "07 프로젝트에서 사용한 macrodata를 다시 활용합니다. 이번에는 GDP, 소비, 투자를 동시에 예측하는 다변량 모델을 구축합니다. 단변량 ARIMA는 한 변수만 분석하지만, VAR(Vector Autoregression)은 여러 변수가 서로 영향을 주고받는 관계를 모델링합니다. 경제 변수들은 상호 의존적이므로 VAR이 더 현실적인 예측을 제공합니다. 중앙은행, 투자기관에서 거시경제 예측에 VAR을 표준 도구로 사용합니다."
  - type: code
    language: python
    title: 데이터 로드
    description: 다변량 시계열
    content: |-
      import pandas as pd
      import numpy as np
      import statsmodels.api as sm
      from statsmodels.tsa.api import VAR
      from statsmodels.tsa.stattools import adfuller, grangercausalitytests
      import plotly.express as px
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots

      macro = sm.datasets.macrodata.load_pandas().data
      macro['date'] = pd.to_datetime(macro['year'].astype(int).astype(str) + '-' + (macro['quarter'].astype(int) * 3 - 2).astype(str) + '-01')
      macro = macro.set_index('date')
      macro.shape

- id: step2_select_vars
  title: 2단계. 분석 변수 선택
  subtitle: GDP, 소비, 투자
  blocks:
  - type: text
    content: "GDP(realgdp), 소비(realcons), 투자(realinv) 3개 변수를 선택합니다. 경제학에서 GDP = 소비 + 투자 + 정부지출 + 순수출(Y = C + I + G + NX)이므로 이 변수들은 밀접하게 연관되어 있습니다. 소비가 증가하면 GDP가 증가하고, GDP 증가는 다시 소비를 촉진하는 피드백 관계가 존재합니다. VAR은 이런 상호 의존성을 명시적으로 모델링하여 한 변수의 변화가 다른 변수에 미치는 영향을 추적할 수 있습니다."
  - type: code
    language: python
    title: 변수 선택
    description: 3개 시계열
    content: |-
      varData = macro[['realgdp', 'realcons', 'realinv']].copy()
      varData.columns = ['GDP', 'Consumption', 'Investment']
      varData.head()

- id: step3_viz
  title: 3단계. 시계열 시각화
  subtitle: 3개 변수 추세
  blocks:
  - type: text
    content: "3개 변수의 시계열을 함께 시각화합니다. 다변량 분석에서는 변수들이 비슷한 추세를 보이는지, 한 변수가 다른 변수보다 먼저 움직이는지(선행/후행 관계) 시각적으로 확인합니다. 예를 들어 투자가 GDP보다 먼저 하락하면 투자가 경기 선행지표일 수 있습니다. 이런 관찰은 이후 그랜저 인과성 검정으로 통계적으로 검증합니다."
  - type: code
    language: python
    title: 다변량 시계열 플롯
    description: 3개 변수 비교
    content: |-
      varFig = make_subplots(rows=3, cols=1, shared_xaxes=True,
                             subplot_titles=('GDP', 'Consumption', 'Investment'))

      varFig.add_trace(go.Scatter(x=varData.index, y=varData['GDP'], name='GDP'), row=1, col=1)
      varFig.add_trace(go.Scatter(x=varData.index, y=varData['Consumption'], name='Consumption'), row=2, col=1)
      varFig.add_trace(go.Scatter(x=varData.index, y=varData['Investment'], name='Investment'), row=3, col=1)

      varFig.update_layout(title='Multivariate Time Series', height=600, showlegend=False)
      varFig.show()

- id: step4_stationarity
  title: 4단계. 정상성 검정
  subtitle: 모든 변수 ADF
  blocks:
  - type: text
    content: "VAR 모델도 정상 시계열을 가정하므로 모든 변수에 ADF 검정을 적용합니다. GDP, 소비, 투자 같은 경제 수준 변수는 대부분 추세가 있어 비정상입니다. 모든 변수가 정상이어야 VAR을 적용할 수 있으므로, 비정상 변수가 하나라도 있으면 전체 데이터에 차분을 적용해야 합니다. 일부 변수만 정상이고 일부는 비정상인 경우, 일관성을 위해 모두 차분하는 것이 일반적입니다."
  - type: code
    language: python
    title: ADF 검정
    description: 3개 변수
    content: |-
      adfResults = []
      for col in varData.columns:
          adfTest = adfuller(varData[col])
          adfResults.append({
              'Variable': col,
              'ADF Stat': adfTest[0],
              'p-value': adfTest[1],
              'Stationary': 'Yes' if adfTest[1] < 0.05 else 'No'
          })

      adfDf = pd.DataFrame(adfResults)
      adfDf

- id: step5_diff
  title: 5단계. 차분 적용
  subtitle: 정상성 확보
  blocks:
  - type: text
    content: "모든 변수에 1차 차분을 적용하여 정상성을 확보합니다. 차분된 변수는 '변화량'을 의미합니다. GDP 차분은 전 분기 대비 GDP 증가량, 소비 차분은 소비 증가량입니다. 차분 후 ADF 검정으로 모든 변수가 정상화되었는지 확인합니다. 차분된 데이터로 VAR을 적합하면 '변화량 간의 관계'를 모델링하게 되며, 예측 후 누적합으로 원래 수준을 복원합니다."
  - type: code
    language: python
    title: 1차 차분
    description: diff() 적용
    content: |-
      varDiff = varData.diff().dropna()

      adfDiffResults = []
      for col in varDiff.columns:
          adfTest = adfuller(varDiff[col])
          adfDiffResults.append({
              'Variable': col,
              'ADF Stat': adfTest[0],
              'p-value': adfTest[1],
              'Stationary': 'Yes' if adfTest[1] < 0.05 else 'No'
          })

      adfDiffDf = pd.DataFrame(adfDiffResults)
      adfDiffDf

- id: step6_var_intro
  title: 6단계. VAR 모델 소개
  subtitle: 벡터 자기회귀
  blocks:
  - type: text
    content: "VAR(Vector Autoregression)은 여러 시계열을 동시에 모델링합니다. VAR에서 각 변수는 자신의 과거값뿐 아니라 다른 변수의 과거값에도 영향을 받습니다. 예를 들어 오늘의 GDP는 어제의 GDP, 어제의 소비, 어제의 투자 모두에 의해 결정됩니다. 이런 상호 의존성을 통해 변수 간 동적 관계를 포착할 수 있습니다. 단변량 AR 모델은 다른 변수의 영향이 없는 VAR의 특수한 경우입니다."
  - type: code
    language: python
    title: VAR 객체 생성
    description: 차분 데이터
    content: |-
      varModel = VAR(varDiff)
      varModel.select_order(maxlags=8)

- id: step7_lag_selection
  title: 7단계. 시차 선택
  subtitle: AIC, BIC 기준
  blocks:
  - type: text
    content: "AIC/BIC 기준으로 최적 시차(lag)를 선택합니다. VAR(p)에서 p는 몇 기간 전까지의 값을 사용할지 결정합니다. VAR(2)면 2기간 전까지의 GDP, 소비, 투자가 현재 값에 영향을 미친다고 가정합니다. 시차가 너무 작으면 중요한 패턴을 놓치고, 너무 크면 파라미터가 많아져 과적합됩니다. select_order()가 여러 시차에 대해 AIC/BIC를 계산하여 최적 시차를 제안합니다."
  - type: code
    language: python
    title: 시차 선택
    description: AIC/BIC
    content: |-
      lagOrder = varModel.select_order(maxlags=8)
      lagOrderDf = pd.DataFrame(lagOrder.summary().data[1:], columns=lagOrder.summary().data[0])
      lagOrderDf

- id: step8_fit
  title: 8단계. VAR 모델 적합
  subtitle: 최적 시차로 학습
  blocks:
  - type: text
    content: "AIC가 가장 낮은 시차로 VAR 모델을 적합합니다. fit() 후 summary()를 확인하면 각 변수에 대한 회귀식을 볼 수 있습니다. GDP 방정식에서 소비의 과거값 계수가 양수면 과거 소비 증가가 현재 GDP 증가에 기여한다는 의미입니다. 이런 계수 해석을 통해 변수 간 동적 관계를 파악할 수 있습니다."
  - type: code
    language: python
    title: VAR 적합
    description: 최적 시차
    content: |-
      optimalLag = lagOrder.aic
      varFit = varModel.fit(optimalLag)
      varFit.summary()

- id: step9_granger
  title: 9단계. 그랜저 인과성
  subtitle: 변수 간 인과관계
  blocks:
  - type: text
    content: "그랜저 인과성 검정은 한 변수의 과거값이 다른 변수를 예측하는 데 도움이 되는지 통계적으로 검정합니다. '소비가 GDP를 그랜저 인과한다'는 것은 GDP 예측에 소비의 과거값을 추가하면 예측이 개선된다는 의미입니다. 주의할 점은 그랜저 인과성은 진정한 인과관계가 아니라 '예측력'을 나타냅니다. 그러나 예측력은 정책 결정, 투자 전략 수립에 중요한 정보입니다."
  - type: code
    language: python
    title: 그랜저 인과성
    description: 소비 → GDP
    content: |-
      grangerTest = grangercausalitytests(varDiff[['GDP', 'Consumption']], maxlag=4, verbose=False)

      grangerResults = []
      for lag, result in grangerTest.items():
          fTest = result[0]['ssr_ftest']
          grangerResults.append({
              'Lag': lag,
              'F-stat': fTest[0],
              'p-value': fTest[1]
          })

      grangerDf = pd.DataFrame(grangerResults)
      grangerDf
  - type: tip
    content: p-value가 0.05 미만이면 첫 번째 변수(Consumption)가 두 번째 변수(GDP)를 예측하는 데 도움이 됩니다. 이를 그랜저 인과성이라 하며, 진정한 인과관계는 아니지만 예측력을 나타냅니다.

- id: step10_granger_matrix
  title: 10단계. 인과성 매트릭스
  subtitle: 모든 변수 쌍
  blocks:
  - type: text
    content: "모든 변수 쌍에 대해 그랜저 인과성을 검정하여 인과성 매트릭스를 만듭니다. 이 매트릭스를 보면 어떤 변수가 다른 변수를 예측하는 데 유용한지 한눈에 파악할 수 있습니다. 예를 들어 투자가 GDP를 그랜저 인과하지만 GDP는 투자를 그랜저 인과하지 않으면, 투자가 경기 선행지표임을 시사합니다. 양방향 인과성이 있으면 상호 피드백 관계입니다."
  - type: code
    language: python
    title: 인과성 매트릭스
    description: 모든 쌍 검정
    content: |-
      variables = ['GDP', 'Consumption', 'Investment']
      grangerMatrix = pd.DataFrame(index=variables, columns=variables)

      for target in variables:
          for predictor in variables:
              if target != predictor:
                  testData = varDiff[[target, predictor]]
                  result = grangercausalitytests(testData, maxlag=4, verbose=False)
                  pValues = [result[lag][0]['ssr_ftest'][1] for lag in result]
                  minPval = min(pValues)
                  grangerMatrix.loc[target, predictor] = f"{minPval:.4f}"
              else:
                  grangerMatrix.loc[target, predictor] = "-"

      grangerMatrix
  - type: tip
    content: 행은 타겟(예측 대상), 열은 예측자(원인 변수)입니다. 예를 들어 GDP 행의 Consumption 열 p-value가 0.05 미만이면 소비가 GDP를 예측합니다.

- id: step11_granger_heatmap
  title: 11단계. 인과성 히트맵
  subtitle: 그랜저 인과성 시각화
  blocks:
  - type: text
    content: 그랜저 인과성 매트릭스를 히트맵으로 시각화하면 변수 간 인과 관계를 직관적으로 파악할 수 있습니다. p-value가 낮을수록(진한 색) 강한 인과성을 나타냅니다.
  - type: code
    language: python
    title: 인과성 히트맵
    description: seaborn 시각화
    content: |-
      import seaborn as sns
      import matplotlib.pyplot as plt

      grangerNumeric = grangerMatrix.replace('-', np.nan).astype(float)

      heatFig, heatAx = plt.subplots(figsize=(6, 5))
      sns.heatmap(grangerNumeric, annot=True, fmt='.4f', cmap='RdYlGn_r', ax=heatAx,
                  cbar_kws={'label': 'p-value'}, vmin=0, vmax=0.1)
      heatAx.set_title('Granger Causality p-values\n(Row: Target, Column: Predictor)')
      heatAx.set_xlabel('Predictor (Cause)')
      heatAx.set_ylabel('Target (Effect)')
      heatFig
  - type: tip
    content: 빨간색(p < 0.05)은 강한 인과성, 녹색(p > 0.05)은 약한 인과성입니다. 행은 예측 대상, 열은 원인 변수입니다.

- id: step12_forecast
  title: 12단계. 다변량 예측
  subtitle: 8분기 동시 예측
  blocks:
  - type: text
    content: "VAR 모델로 3개 변수를 동시에 8분기(2년) 예측합니다. VAR 예측의 장점은 변수 간 상호작용을 반영한다는 점입니다. 예를 들어 투자 감소 예측이 GDP 예측에도 반영되어 더 현실적인 시나리오를 제공합니다. forecast()는 마지막 p기간의 실제 데이터를 기반으로 미래를 예측합니다. 다변량 예측은 정책 효과 분석, 시나리오 플래닝에 핵심 도구입니다."
  - type: code
    language: python
    title: 8분기 예측
    description: 다변량 forecast
    content: |-
      forecastSteps = 8
      varForecast = varFit.forecast(varDiff.values[-optimalLag:], steps=forecastSteps)

      forecastIdx = pd.date_range(start=varDiff.index[-1] + pd.DateOffset(months=3), periods=forecastSteps, freq='QS')

      forecastDf = pd.DataFrame(varForecast, index=forecastIdx, columns=varDiff.columns)
      forecastDf

- id: step13_cumsum
  title: 13단계. 누적 예측
  subtitle: 차분 복원
  blocks:
  - type: text
    content: "차분된 값을 예측했으므로 cumsum()으로 원래 수준으로 복원합니다. 차분 예측값은 '전 분기 대비 변화량'이므로, 마지막 실제값에 이 변화량을 순차적으로 더해 원래 수준의 GDP, 소비, 투자를 얻습니다. 이 과정을 '역차분(inverse differencing)'이라고 합니다. 복원된 예측값이 현실적인 범위에 있는지 확인해야 합니다."
  - type: code
    language: python
    title: 누적 합계
    description: 원래 수준 복원
    content: |-
      lastValues = varData.iloc[-1]

      forecastLevel = forecastDf.cumsum() + lastValues.values

      forecastLevelDf = forecastLevel.copy()
      forecastLevelDf

- id: step14_viz_forecast
  title: 14단계. 예측 시각화
  subtitle: 역사 + 미래
  blocks:
  - type: text
    content: "실제값과 예측값을 함께 시각화하여 모델의 예측 성능을 직관적으로 평가합니다. 예측선이 실제 데이터의 추세와 자연스럽게 연결되는지, 3개 변수의 상대적 움직임이 경제적으로 타당한지 확인합니다. 예를 들어 소비 예측이 증가하는데 GDP 예측이 감소하면 모델에 문제가 있을 수 있습니다. 시각화는 숫자로 보이지 않는 패턴을 발견하게 해줍니다."
  - type: code
    language: python
    title: 예측 시각화
    description: 3개 변수
    content: |-
      forecastVizFig = make_subplots(rows=3, cols=1, shared_xaxes=True,
                                      subplot_titles=('GDP Forecast', 'Consumption Forecast', 'Investment Forecast'))

      for i, col in enumerate(['GDP', 'Consumption', 'Investment']):
          forecastVizFig.add_trace(go.Scatter(x=varData.index, y=varData[col], name=f'{col} Actual', mode='lines'), row=i+1, col=1)
          forecastVizFig.add_trace(go.Scatter(x=forecastLevelDf.index, y=forecastLevelDf[col], name=f'{col} Forecast', mode='lines', line=dict(dash='dash')), row=i+1, col=1)

      forecastVizFig.update_layout(title='VAR Multivariate Forecast', height=700, showlegend=False)
      forecastVizFig.show()

- id: step15_irf
  title: 15단계. 충격반응함수
  subtitle: IRF 분석
  blocks:
  - type: text
    content: "충격반응함수(Impulse Response Function, IRF)는 한 변수에 충격이 가해졌을 때 다른 변수가 시간에 따라 어떻게 반응하는지 보여줍니다. 예를 들어 '투자가 갑자기 1단위 증가하면 GDP는 1분기 후, 2분기 후, 3분기 후에 각각 얼마나 변하는가?'를 분석합니다. IRF는 정책 효과 분석의 핵심 도구입니다. 금리 인하가 투자와 GDP에 미치는 파급 효과를 시뮬레이션할 수 있습니다."
  - type: code
    language: python
    title: IRF 계산
    description: 충격 반응
    content: |-
      irf = varFit.irf(10)

      irfData = irf.irfs

      irfDf = pd.DataFrame({
          'Period': range(11),
          'Investment → GDP': irfData[:, 0, 2],
          'Consumption → GDP': irfData[:, 0, 1],
          'GDP → GDP': irfData[:, 0, 0]
      })
      irfDf
  - type: tip
    content: irfs[t, i, j]는 시점 t에서 변수 j의 충격이 변수 i에 미치는 영향입니다. 양수면 같은 방향, 음수면 반대 방향 반응입니다.

- id: step16_irf_viz
  title: 16단계. IRF 시각화
  subtitle: 충격 전파 경로
  blocks:
  - type: text
    content: "IRF를 시각화하여 충격의 전파 경로를 확인합니다. 충격 후 반응이 점차 0으로 수렴하면 충격이 일시적이고, 지속되면 영구적 효과가 있습니다. 투자 충격이 GDP에 양의 반응을 유발하고 서서히 소멸하는 것이 일반적인 경제 패턴입니다. IRF 그래프는 경제 정책 보고서, 투자 전략 문서에서 자주 사용되는 시각화 방법입니다."
  - type: code
    language: python
    title: IRF 플롯
    description: 충격 반응
    content: |-
      irfFig = go.Figure()
      irfFig.add_trace(go.Scatter(x=irfDf['Period'], y=irfDf['Investment → GDP'], mode='lines+markers', name='Investment → GDP'))
      irfFig.add_trace(go.Scatter(x=irfDf['Period'], y=irfDf['Consumption → GDP'], mode='lines+markers', name='Consumption → GDP'))
      irfFig.add_hline(y=0, line_dash='dash', line_color='gray')
      irfFig.update_layout(title='Impulse Response Function - Effect on GDP',
                           xaxis_title='Periods', yaxis_title='Response')
      irfFig.show()

- id: step17_summary_stats
  title: 17단계. 종합 통계
  subtitle: 모든 개념 정리
  blocks:
  - type: text
    content: "01-10 프로젝트에서 배운 주요 통계량을 정리합니다. 각 분석 방법마다 핵심 지표가 다르므로, 상황에 맞는 지표를 사용해야 합니다. 회귀분석에서는 R²와 p-value, 시계열에서는 AIC와 Durbin-Watson, 분류에서는 AUC, 가설검정에서는 p-value, VAR에서는 그랜저 인과성이 중요합니다. 이 지표들의 의미와 좋은 값 기준을 정확히 이해하는 것이 데이터 분석의 기본입니다."
  - type: code
    language: python
    title: 종합 통계 정리
    description: 핵심 지표
    content: |-
      summaryStats = pd.DataFrame({
          'Project': ['01-02 OLS', '03 Dummy', '04-09 ARIMA', '05 Logit', '07 Regression', '08 t-test', '10 VAR'],
          'Key Metric': ['R²', 'dtype=int', 'AIC', 'AUC', 'DW stat', 'p-value', 'Granger'],
          'Purpose': ['설명력', '더미변수 타입', '모델 선택', '분류 성능', '자기상관', '유의성', '인과성'],
          'Good Value': ['높을수록', 'int 필수', '낮을수록', '0.7 이상', '2 근처', '0.05 미만', '0.05 미만']
      })
      summaryStats

- id: practice
  title: 실습
  subtitle: 종합 분석 프로젝트
  blocks:
  - type: text
    content: "경제 분석가가 되어 다변량 시계열 분석을 수행합니다. VAR 분석은 중앙은행, 투자은행, 경제연구소에서 실제로 사용하는 고급 분석 기법입니다. 각 미션은 데이터 로딩부터 정상성 검정, VAR 모델링, 그랜저 인과성, IRF, 예측까지 전체 과정을 독립적으로 수행합니다. 본 프로젝트에서 배운 VAR, 그랜저 인과성, IRF를 실습을 통해 숙달해봅니다."
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 인플레이션과 실업률의 상호 관계 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 전처리"
      content: |-
        import pandas as pd
        import numpy as np
        import statsmodels.api as sm
        from statsmodels.tsa.api import VAR
        from statsmodels.tsa.stattools import grangercausalitytests

        iuMacro = sm.datasets.macrodata.load_pandas().data
        iuMacro['date'] = pd.to_datetime(iuMacro['year'].astype(int).astype(str) + '-' + (iuMacro['quarter'].astype(int) * 3 - 2).astype(str) + '-01')
        iuMacro = iuMacro.set_index('date')

        iuData = iuMacro[['infl', 'unemp']].copy()
        iuData.columns = ['Inflation', 'Unemployment']
        iuDiff = iuData.diff().dropna()
        iuDiff.head()
    - type: code
      title: "그랜저 인과성 검정"
      content: |-
        grangerItoU = grangercausalitytests(iuDiff[['Unemployment', 'Inflation']], maxlag=4, verbose=False)
        grangerUtoI = grangercausalitytests(iuDiff[['Inflation', 'Unemployment']], maxlag=4, verbose=False)

        grangerDf = pd.DataFrame({
            'Direction': ['Inflation → Unemployment', 'Unemployment → Inflation'],
            'Min p-value': [
                min([grangerItoU[lag][0]['ssr_ftest'][1] for lag in grangerItoU]),
                min([grangerUtoI[lag][0]['ssr_ftest'][1] for lag in grangerUtoI])
            ]
        })
        grangerDf
    - type: code
      title: "VAR 모델 및 IRF 시각화"
      content: |-
        import plotly.graph_objects as go

        iuVar = VAR(iuDiff)
        iuFit = iuVar.fit(2)

        iuIrf = iuFit.irf(10)
        irfItoU = iuIrf.irfs[:, 1, 0]
        irfUtoI = iuIrf.irfs[:, 0, 1]

        irfFig = go.Figure()
        irfFig.add_trace(go.Scatter(x=list(range(11)), y=irfItoU, mode='lines+markers', name='Inflation → Unemployment'))
        irfFig.add_trace(go.Scatter(x=list(range(11)), y=irfUtoI, mode='lines+markers', name='Unemployment → Inflation'))
        irfFig.add_hline(y=0, line_dash='dash', line_color='gray')
        irfFig.update_layout(title='IRF: Inflation-Unemployment Relationship', xaxis_title='Periods', yaxis_title='Response')
        irfFig
  - type: expansion
    title: "미션2: 5개 변수 VAR 모델 및 예측 정확도 평가"
    blocks:
    - type: code
      title: "데이터 로드 및 분할"
      content: |-
        import pandas as pd
        import numpy as np
        import statsmodels.api as sm
        from statsmodels.tsa.api import VAR

        fiveMacro = sm.datasets.macrodata.load_pandas().data
        fiveMacro['date'] = pd.to_datetime(fiveMacro['year'].astype(int).astype(str) + '-' + (fiveMacro['quarter'].astype(int) * 3 - 2).astype(str) + '-01')
        fiveMacro = fiveMacro.set_index('date')

        fiveData = fiveMacro[['realgdp', 'realcons', 'realinv', 'cpi', 'unemp']].copy()
        fiveData.columns = ['GDP', 'Consumption', 'Investment', 'CPI', 'Unemployment']
        fiveDiff = fiveData.diff().dropna()

        trainSize = len(fiveDiff) - 8
        trainDf = fiveDiff[:trainSize]
        testDf = fiveDiff[trainSize:]
        testDf.shape
    - type: code
      title: "VAR 모델 학습 및 예측"
      content: |-
        fiveVar = VAR(trainDf)
        lagOrder = fiveVar.select_order(maxlags=8)
        optLag = lagOrder.aic

        fiveFit = fiveVar.fit(optLag)
        fiveFcast = fiveFit.forecast(trainDf.values[-optLag:], steps=8)
        fcastDf = pd.DataFrame(fiveFcast, index=testDf.index, columns=testDf.columns)
        fcastDf.head()
    - type: code
      title: "MAE 계산 및 시각화"
      content: |-
        from sklearn.metrics import mean_absolute_error
        import plotly.graph_objects as go
        from plotly.subplots import make_subplots

        maeList = []
        for col in testDf.columns:
            maeVal = mean_absolute_error(testDf[col], fcastDf[col])
            maeList.append({'Variable': col, 'MAE': maeVal})

        maeDf = pd.DataFrame(maeList)

        fiveEvalFig = make_subplots(rows=2, cols=1, subplot_titles=('GDP', 'Investment'))
        fiveEvalFig.add_trace(go.Scatter(x=testDf.index, y=testDf['GDP'], name='Actual GDP'), row=1, col=1)
        fiveEvalFig.add_trace(go.Scatter(x=fcastDf.index, y=fcastDf['GDP'], name='Forecast GDP', line=dict(dash='dash')), row=1, col=1)
        fiveEvalFig.add_trace(go.Scatter(x=testDf.index, y=testDf['Investment'], name='Actual Inv'), row=2, col=1)
        fiveEvalFig.add_trace(go.Scatter(x=fcastDf.index, y=fcastDf['Investment'], name='Forecast Inv', line=dict(dash='dash')), row=2, col=1)
        fiveEvalFig.update_layout(title='VAR Forecast vs Actual', height=500)
        fiveEvalFig

