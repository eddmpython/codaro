  seo:
    title: "statsmodels 단순선형회귀 - 광고비로 매출 예측하기"
    description: "TV 광고비로 매출을 예측하는 단순선형회귀 모델을 statsmodels로 구축합니다. OLS와 summary 해석을 배웁니다."
