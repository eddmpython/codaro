# EddmPython 콘텐츠 스키마 정의
# 모든 학습 콘텐츠는 이 스키마를 따름

# ============================================
# 메타데이터 (필수)
# ============================================
# meta:
#   id: "day02"                    # 고유 식별자
#   title: "변수와 내장함수"         # 페이지 제목
#   day: 2                         # 일차 (30days 전용)
#   category: "30days"             # 카테고리: 30days, marimo, excel
#   source: "30-Days-Of-Python"    # 원본 출처
#   sourceUrl: "https://..."       # 출처 URL
#   tags: ["변수", "함수", "기초"]   # 검색용 태그

# ============================================
# 섹션 (sections)
# ============================================
# sections:
#   - id: "section_id"             # 섹션 고유 ID
#     title: "섹션 제목"
#     subtitle: "부제목"            # 선택
#
#     blocks:                      # 콘텐츠 블록 배열
#       - type: "블록타입"
#         ...블록별 속성

# ============================================
# 블록 타입 정의
# ============================================

# 1. text - 일반 텍스트
# - type: text
#   content: |
#     마크다운 형식의 텍스트
#     **굵게**, *기울임* 지원

# 2. list - 목록
# - type: list
#   style: "bullet" | "number" | "check"  # 기본: bullet
#   items:
#     - "항목 1"
#     - "항목 2"

# 3. code - 코드 블록
# - type: code
#   language: "python"             # python, javascript, bash 등
#   title: "코드 제목"              # 선택
#   description: "코드 설명"        # 선택
#   content: |
#     print("Hello")
#   output: |                      # 선택: 실행 결과
#     Hello

# 4. note - 참고/팁/경고
# - type: note
#   style: "info" | "tip" | "warning" | "error"
#   title: "참고"                  # 선택
#   content: "참고 내용"

# 5. table - 표
# - type: table
#   headers: ["컬럼1", "컬럼2"]
#   rows:
#     - ["값1", "값2"]
#     - ["값3", "값4"]

# 6. image - 이미지
# - type: image
#   src: "이미지 경로 또는 URL"
#   alt: "대체 텍스트"
#   caption: "이미지 설명"         # 선택

# 7. video - 비디오
# - type: video
#   src: "비디오 URL"
#   platform: "youtube" | "local"  # 기본: local
#   title: "비디오 제목"           # 선택

# 8. compare - 비교
# - type: compare
#   title: "비교 제목"
#   items:
#     - label: "항목"
#       good: "좋은 예"
#       bad: "나쁜 예"

# 9. quiz - 퀴즈 (선택)
# - type: quiz
#   question: "질문"
#   options:
#     - "선택지 1"
#     - "선택지 2"
#   answer: 0                      # 정답 인덱스
#   explanation: "해설"
