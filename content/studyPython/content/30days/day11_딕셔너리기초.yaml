meta:
  id: "day11"
  title: "딕셔너리기초"
  day: 11
  category: "30days"
  tags: []
  seo:
    title: "파이썬 딕셔너리 기초 - 키-값 쌍 데이터 관리"
    description: "딕셔너리의 생성, 접근, 수정, 추가, 삭제 방법을 배웁니다."
    keywords: ['딕셔너리', 'dict', 'key', 'value', '키-값']

intro:
  emoji: "📖"
  points:
  - "키-값 쌍으로 데이터 저장"
  - "키로 빠르게 값에 접근"
  - "딕셔너리 생성과 수정"
  - "실전 데이터 구조 활용"

sections:
- id: "dict_intro"
  title: "딕셔너리란?"
  subtitle: "키로 찾는 데이터 저장소"
  blocks:
  - type: "text"
    content: "딕셔너리(Dictionary)는 키(Key)와 값(Value)을 쌍으로 저장하는 자료구조입니다. 중괄호 {}로 만들고, 키:값 형태로 데이터를 저장합니다. 실제 사전처럼 단어(키)로 뜻(값)을 찾듯이, 키를 사용하여 값을 빠르게 찾을 수 있습니다. 리스트는 인덱스(숫자)로 접근하지만, 딕셔너리는 의미있는 키(문자열, 숫자 등)로 접근합니다."
  - type: "list"
    items:
    - "중괄호 {}와 콜론 : 사용"
    - "키:값 쌍으로 저장"
    - "키로 빠른 검색 가능"
    - "실제 사전과 유사한 구조"
  - type: "code"
    language: "python"
    title: "딕셔너리 만들기"
    description: "키-값 쌍으로 딕셔너리를 만듭니다."
    content: |-
      lang = {'name': 'Python', 'type': 'Language', 'year': 1991}
      lang
  - type: "tip"
    content: "딕셔너리는 순서를 보장하지 않았지만, Python 3.7부터는 입력 순서를 유지합니다."

- id: "dict_create"
  title: "딕셔너리 생성하기"
  subtitle: "다양한 방법으로 만들기"
  blocks:
  - type: "text"
    content: "딕셔너리는 중괄호로 직접 만들거나 dict() 함수를 사용합니다. 빈 딕셔너리는 {}나 dict()로 만듭니다. 키는 문자열, 숫자, 튜플 등 변경 불가능한(immutable) 타입이어야 합니다. 값은 어떤 타입이든 가능합니다."
  - type: "list"
    items:
    - "중괄호 {'키': '값'} 형태"
    - "dict() 함수로도 생성 가능"
    - "빈 딕셔너리는 {} 또는 dict()"
    - "키는 immutable 타입만 가능"
  - type: "code"
    language: "python"
    title: "문자열 키 딕셔너리"
    description: "문자열 키로 딕셔너리를 만듭니다."
    content: |-
      person = {'name': '홍길동', 'age': 25, 'city': '서울'}
      person
  - type: "code"
    language: "python"
    title: "빈 딕셔너리"
    description: "빈 딕셔너리를 만듭니다."
    content: |-
      empty = {}
      empty
  - type: "code"
    language: "python"
    title: "숫자 키 딕셔너리"
    description: "숫자 키로 딕셔너리를 만듭니다."
    content: |-
      numbers = {1: 'one', 2: 'two', 3: 'three'}
      numbers
  - type: "code"
    language: "python"
    title: "혼합 값 딕셔너리"
    description: "여러 타입의 값을 가진 딕셔너리를 만듭니다."
    content: |-
      mixed = {'count': 10, 'active': True, 'price': 19.99}
      mixed
  - type: "tip"
    content: "리스트는 키로 사용할 수 없지만, 튜플은 가능합니다."

- id: "dict_access"
  title: "키로 값 접근하기"
  subtitle: "대괄호 [] 사용"
  blocks:
  - type: "text"
    content: "딕셔너리에서 값을 가져올 때는 대괄호 [] 안에 키를 넣습니다. dict[key] 형식으로 사용하면 그 키에 해당하는 값을 반환합니다. 존재하지 않는 키를 사용하면 에러가 발생합니다. 리스트의 인덱스 접근과 비슷하지만, 숫자 대신 키를 사용합니다."
  - type: "list"
    items:
    - "dict[키] 형식으로 접근"
    - "키에 해당하는 값 반환"
    - "없는 키는 에러 발생"
    - "리스트의 인덱싱과 유사"
  - type: "code"
    language: "python"
    title: "이름 가져오기"
    description: "키 'name'으로 값을 가져옵니다."
    content: |-
      dev = {'name': '김철수', 'age': 30, 'job': 'developer'}
      dev['name']
  - type: "code"
    language: "python"
    title: "나이 가져오기"
    description: "키 'age'로 값을 가져옵니다."
    content: |-
      worker = {'name': '김철수', 'age': 30, 'job': 'developer'}
      worker['age']
  - type: "code"
    language: "python"
    title: "직업 가져오기"
    description: "키 'job'으로 값을 가져옵니다."
    content: |-
      staff = {'name': '김철수', 'age': 30, 'job': 'developer'}
      staff['job']
  - type: "tip"
    content: "키 이름을 정확히 입력해야 합니다. 대소문자도 구분합니다."

- id: "dict_modify"
  title: "키로 값 수정하기"
  subtitle: "기존 값 변경"
  blocks:
  - type: "text"
    content: "딕셔너리의 값을 수정할 때는 접근과 동일하게 대괄호를 사용하고 새 값을 할당합니다. dict[key] = new_value 형식입니다. 리스트처럼 원본이 직접 변경됩니다. 이미 있는 키에 값을 할당하면 기존 값이 새 값으로 교체됩니다."
  - type: "list"
    items:
    - "dict[키] = 새값 형식"
    - "기존 값이 새 값으로 교체"
    - "원본 딕셔너리 직접 변경"
    - "리스트 수정과 유사"
  - type: "code"
    language: "python"
    title: "가격 수정"
    description: "키 'price'의 값을 변경합니다."
    content: |-
      laptop = {'name': '노트북', 'price': 1000000, 'stock': 5}
      laptop['price'] = 1200000
      laptop
  - type: "code"
    language: "python"
    title: "재고 수정"
    description: "키 'stock'의 값을 변경합니다."
    content: |-
      device = {'name': '노트북', 'price': 1000000, 'stock': 5}
      device['stock'] = 3
      device
  - type: "tip"
    content: "같은 키에 할당하면 값이 변경됩니다."

- id: "dict_add"
  title: "새 키-값 쌍 추가하기"
  subtitle: "없는 키에 값 할당"
  blocks:
  - type: "text"
    content: "딕셔너리에 새로운 키-값 쌍을 추가할 때도 대괄호를 사용합니다. 존재하지 않는 키에 값을 할당하면 자동으로 새 항목이 추가됩니다. dict[new_key] = value 형식입니다. 리스트의 append()처럼 별도의 메서드 없이 간단히 추가할 수 있습니다."
  - type: "list"
    items:
    - "dict[새키] = 값 형식"
    - "없는 키면 자동 추가"
    - "있는 키면 값 수정"
    - "append() 없이 간단히 추가"
  - type: "code"
    language: "python"
    title: "도시 추가"
    description: "새로운 키 'city'를 추가합니다."
    content: |-
      member = {'name': '이영희', 'age': 28}
      member['city'] = '부산'
      member
  - type: "code"
    language: "python"
    title: "직업 추가"
    description: "새로운 키 'job'을 추가합니다."
    content: |-
      user = {'name': '이영희', 'age': 28}
      user['job'] = 'designer'
      user
  - type: "tip"
    content: "없는 키에 할당하면 추가, 있는 키에 할당하면 수정됩니다."

- id: "dict_delete"
  title: "del로 키-값 삭제"
  subtitle: "항목 제거하기"
  blocks:
  - type: "text"
    content: "del 키워드를 사용하여 딕셔너리에서 특정 키-값 쌍을 삭제할 수 있습니다. del dict[key] 형식으로 사용하며, 해당 키와 값이 함께 제거됩니다. 존재하지 않는 키를 삭제하려 하면 에러가 발생합니다."
  - type: "list"
    items:
    - "del dict[키] 형식"
    - "키-값 쌍 제거"
    - "없는 키 삭제시 에러"
    - "원본 딕셔너리 직접 변경"
  - type: "code"
    language: "python"
    title: "키 'b' 삭제"
    description: "del로 키 'b'와 값을 삭제합니다."
    content: |-
      alpha = {'a': 1, 'b': 2, 'c': 3, 'd': 4}
      del alpha['b']
      alpha
  - type: "code"
    language: "python"
    title: "키 'd' 삭제"
    description: "del로 키 'd'와 값을 삭제합니다."
    content: |-
      keys = {'a': 1, 'b': 2, 'c': 3, 'd': 4}
      del keys['d']
      keys
  - type: "tip"
    content: "del은 변수 자체를 삭제할 때도 사용됩니다."

- id: "dict_membership"
  title: "in/not in 연산자"
  subtitle: "키 존재 확인"
  blocks:
  - type: "text"
    content: "in과 not in 연산자로 딕셔너리에 특정 키가 있는지 확인할 수 있습니다. key in dict 형식으로 사용하며, 키의 존재 여부를 True/False로 반환합니다. 주의할 점은 키를 확인하는 것이지 값을 확인하는 것이 아닙니다."
  - type: "list"
    items:
    - "키 in dict로 키 확인"
    - "키 not in dict로 미존재 확인"
    - "키만 확인, 값은 확인 안함"
    - "True/False 반환"
  - type: "code"
    language: "python"
    title: "키 포함 확인"
    description: "in 연산자로 키가 딕셔너리에 있는지 확인합니다."
    content: |-
      grades = {'math': 85, 'english': 90, 'science': 88}
      'math' in grades
  - type: "code"
    language: "python"
    title: "키 미포함 확인"
    description: "not in 연산자로 키가 딕셔너리에 없는지 확인합니다."
    content: |-
      scores = {'math': 85, 'english': 90, 'science': 88}
      'history' not in scores
  - type: "tip"
    content: "값의 존재를 확인하려면 values() 메서드를 사용해야 합니다(Day 12)."

- id: "dict_length"
  title: "딕셔너리 길이"
  subtitle: "len() 함수"
  blocks:
  - type: "text"
    content: "len() 함수는 딕셔너리의 키-값 쌍 개수를 반환합니다. 리스트, 튜플, 집합과 동일하게 작동합니다. 딕셔너리가 몇 개의 항목을 가지고 있는지 알 수 있습니다."
  - type: "list"
    items:
    - "len(dict)로 길이 확인"
    - "키-값 쌍의 개수 반환"
    - "빈 딕셔너리는 0"
    - "다른 자료구조와 동일"
  - type: "code"
    language: "python"
    title: "딕셔너리 길이"
    description: "len() 함수로 키-값 쌍 개수를 확인합니다."
    content: |-
      profile = {'name': '박민수', 'age': 35, 'city': '대구', 'job': 'teacher'}
      len(profile)
  - type: "code"
    language: "python"
    title: "빈 딕셔너리 길이"
    description: "빈 딕셔너리의 길이는 0입니다."
    content: |-
      blank = {}
      len(blank)
  - type: "tip"
    content: "len()은 키의 개수를 셉니다. 값의 개수가 아닙니다."

- id: "dict_multiple"
  title: "여러 키-값 접근"
  subtitle: "한 번에 여러 값 가져오기"
  blocks:
  - type: "text"
    content: "딕셔너리에서 여러 값을 가져와야 할 때는 각 키로 개별적으로 접근합니다. 리스트처럼 슬라이싱은 없지만, 필요한 키들로 값을 가져와 새 딕셔너리나 튜플로 만들 수 있습니다."
  - type: "list"
    items:
    - "각 키로 개별 접근"
    - "여러 값을 dict나 tuple로 묶기"
    - "슬라이싱은 불가능"
    - "필요한 키만 선택적 접근"
  - type: "code"
    language: "python"
    title: "기본 정보만 추출"
    description: "여러 키로 값을 가져와 새 딕셔너리를 만듭니다."
    content: |-
      full = {'name': '정지은', 'age': 27, 'city': '인천', 'job': 'engineer', 'hobby': 'reading'}
      basic = {'name': full['name'], 'age': full['age']}
      basic
  - type: "code"
    language: "python"
    title: "특정 값 추출"
    description: "필요한 키만 선택하여 값을 가져옵니다."
    content: |-
      detail = {'name': '정지은', 'age': 27, 'city': '인천', 'job': 'engineer', 'hobby': 'reading'}
      detail['city'], detail['job']
  - type: "tip"
    content: "필요한 정보만 선택하여 새 딕셔너리를 만들 수 있습니다."

- id: "dict_nested"
  title: "중첩 딕셔너리"
  subtitle: "딕셔너리 안의 딕셔너리"
  blocks:
  - type: "text"
    content: "딕셔너리의 값으로 다른 딕셔너리를 저장할 수 있습니다. 이를 중첩 딕셔너리라고 합니다. 복잡한 계층 구조의 데이터를 표현할 때 유용합니다. 중첩된 딕셔너리에 접근할 때는 대괄호를 연속으로 사용합니다."
  - type: "list"
    items:
    - "값으로 딕셔너리 저장 가능"
    - "계층 구조 데이터 표현"
    - "dict[key1][key2] 형식 접근"
    - "복잡한 데이터 구조화"
  - type: "code"
    language: "python"
    title: "중첩 딕셔너리 전체"
    description: "딕셔너리 안에 딕셔너리를 저장합니다."
    content: |-
      team = {
          'user1': {'name': '김개발', 'age': 28},
          'user2': {'name': '이디자인', 'age': 25}
      }
      team['user1']
  - type: "code"
    language: "python"
    title: "중첩 값 접근"
    description: "대괄호를 연속으로 사용하여 중첩된 값에 접근합니다."
    content: |-
      group = {
          'user1': {'name': '김개발', 'age': 28},
          'user2': {'name': '이디자인', 'age': 25}
      }
      group['user1']['name']
  - type: "tip"
    content: "중첩 딕셔너리는 JSON 데이터 구조와 유사합니다."

- id: "dict_keys_types"
  title: "다양한 키 타입"
  subtitle: "문자열, 숫자, 튜플"
  blocks:
  - type: "text"
    content: "딕셔너리의 키는 변경 불가능한(immutable) 타입이면 모두 사용 가능합니다. 문자열이 가장 많이 사용되지만, 숫자나 튜플도 키로 사용할 수 있습니다. 리스트, 딕셔너리, 집합은 변경 가능(mutable)하므로 키로 사용할 수 없습니다."
  - type: "list"
    items:
    - "문자열: 가장 일반적"
    - "숫자: 정수, 실수 모두 가능"
    - "튜플: 좌표 등에 유용"
    - "리스트/딕셔너리/집합: 불가능"
  - type: "code"
    language: "python"
    title: "문자열 키"
    description: "문자열을 키로 사용합니다."
    content: |-
      config = {'name': 'Python', 'version': '3.9'}
      config
  - type: "code"
    language: "python"
    title: "숫자 키"
    description: "숫자를 키로 사용합니다."
    content: |-
      ordinal = {1: 'first', 2: 'second', 3: 'third'}
      ordinal
  - type: "code"
    language: "python"
    title: "튜플 키"
    description: "튜플을 키로 사용합니다."
    content: |-
      coords = {(0, 0): 'origin', (10, 20): 'point1', (30, 40): 'point2'}
      coords[(0, 0)]
  - type: "tip"
    content: "튜플 키는 좌표나 날짜 같은 복합 키에 유용합니다."

- id: "practice"
  title: "Day 11 종합 복습"
  subtitle: "딕셔너리 기초 마스터하기"
  blocks:
  - type: "text"
    content: "Day 11에서 배운 딕셔너리 기초를 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: "expansion"
    title: "🟢 기본1: 딕셔너리 생성"
    code: |-
      info = {'name': 'Python', 'year': 1991}
      info

  - type: "expansion"
    title: "🟢 기본2: 값 접근"
    code: |-
      hero = {'name': '홍길동', 'age': 25}
      name = hero['name']
      name

  - type: "expansion"
    title: "🟢 기본3: 값 수정"
    code: |-
