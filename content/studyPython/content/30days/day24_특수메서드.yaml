      class Queue:
          def __init__(self):
              self.items = []

          def enqueue(self, val):
              self.items.append(val)

          def dequeue(self):
              if len(self.items) > 0:
                  return self.items.pop(0)
              return None

          def __len__(self):
              return len(self.items)

          def __getitem__(self, idx):
              return self.items[idx]

          def __str__(self):
              return 'Queue(' + str(len(self.items)) + ' items)'

      q = Queue()
      q.enqueue('first')
      q.enqueue('second')
      len(q), str(q), q[0]
