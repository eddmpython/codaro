    title: "🟡 응용1: 정렬 확인"
    code: |-
      def isSorted(arr):
          for i in range(len(arr) - 1):
              if arr[i] > arr[i + 1]:
                  return False
          return True

      ascending = [1, 2, 3, 4, 5]
      random = [1, 3, 2, 4]
      isSorted(ascending), isSorted(random)

  - type: "expansion"
    title: "🟡 응용2: 재귀 합계"
    code: |-
      def recursiveSum(n):
          if n <= 0:
              return 0
          return n + recursiveSum(n - 1)

      recursiveSum(10)

  - type: "expansion"
    title: "🟡 응용3: 이진 검색 재귀"
    code: |-
      def binarySearchRecursive(arr, target, left, right):
          if left > right:
              return -1
          mid = (left + right) // 2
          if arr[mid] == target:
              return mid
          elif arr[mid] < target:
              return binarySearchRecursive(arr, target, mid + 1, right)
          else:
              return binarySearchRecursive(arr, target, left, mid - 1)

      ordered = [1, 3, 5, 7, 9, 11, 13, 15]
      binarySearchRecursive(ordered, 7, 0, len(ordered) - 1)

  - type: "expansion"
    title: "🟡 응용4: 두 번째로 큰 값"
    code: |-
      def secondMax(arr):
          if len(arr) < 2:
              return None
          first = max(arr[0], arr[1])
          second = min(arr[0], arr[1])
          for i in range(2, len(arr)):
              if arr[i] > first:
                  second = first
                  first = arr[i]
              elif arr[i] > second:
                  second = arr[i]
          return second

      candidates = [10, 5, 20, 8, 15]
      secondMax(candidates)

  - type: "expansion"
    title: "🟡 응용5: 회문 재귀"
    code: |-
      def isPalindromeRecursive(s):
          if len(s) <= 1:
              return True
          if s[0] != s[-1]:
              return False
          return isPalindromeRecursive(s[1:-1])

      isPalindromeRecursive('racecar')

  - type: "expansion"
    title: "🔴 심화1: 병합 정렬"
    code: |-
      def merge(left, right):
          result = []
          i = 0
          j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i = i + 1
              else:
                  result.append(right[j])
                  j = j + 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result

      def mergeSort(arr):
          if len(arr) <= 1:
              return arr
          mid = len(arr) // 2
          left = mergeSort(arr[:mid])
          right = mergeSort(arr[mid:])
          return merge(left, right)

      unsortedData = [38, 27, 43, 3, 9, 82, 10]
      mergeSort(unsortedData)

  - type: "expansion"
    title: "🔴 심화2: 퀵 정렬"
    code: |-
      def quickSort(arr):
          if len(arr) <= 1:
              return arr
          pivot = arr[len(arr) // 2]
          lesser = [x for x in arr if x < pivot]
          equal = [x for x in arr if x == pivot]
          greater = [x for x in arr if x > pivot]
          return quickSort(lesser) + equal + quickSort(greater)

      randomData = [3, 6, 8, 10, 1, 2, 1]
      quickSort(randomData)

  - type: "expansion"
    title: "🔴 심화3: GCD 유클리드"
    code: |-
      def gcd(a, b):
          if b == 0:
              return a
          return gcd(b, a % b)

      gcd(48, 18)

  - type: "expansion"
    title: "🔴 심화4: 순열 생성"
    code: |-
      def permutations(arr):
          if len(arr) <= 1:
              return [arr]
          result = []
          for i in range(len(arr)):
              rest = arr[:i] + arr[i+1:]
              for p in permutations(rest):
                  result.append([arr[i]] + p)
          return result

      len(permutations([1, 2, 3]))

