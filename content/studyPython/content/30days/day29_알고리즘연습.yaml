sections:
- id: "sorting_basic"
  title: "정렬 알고리즘"
  subtitle: "데이터 정렬하기"
  blocks:
  - type: "text"
    content: "정렬은 데이터를 특정 순서로 배열하는 기본 알고리즘입니다. 버블 정렬은 인접한 요소를 비교하여 교환하고, 선택 정렬은 최솟값을 찾아 앞으로 이동시킵니다. 삽입 정렬은 각 요소를 적절한 위치에 삽입합니다. 각 알고리즘은 시간 복잡도와 공간 복잡도가 다릅니다."
  - type: "list"
    items:
    - "버블 정렬: 인접 요소 비교"
    - "선택 정렬: 최솟값 선택"
    - "삽입 정렬: 적절한 위치 삽입"
    - "시간 복잡도 이해"
  - type: "code"
    language: "python"
    title: "버블 정렬"
    description: "인접한 요소를 비교하며 정렬합니다."
    content: |-
      def bubbleSort(arr):
          n = len(arr)
          for i in range(n):
              for j in range(n - i - 1):
                  if arr[j] > arr[j + 1]:
                      arr[j], arr[j + 1] = arr[j + 1], arr[j]
          return arr

      unsorted = [64, 34, 25, 12, 22, 11, 90]
      bubbleSort(unsorted[:])
  - type: "code"
    language: "python"
    title: "선택 정렬"
    description: "최솟값을 찾아 앞으로 이동시킵니다."
    content: |-
      def selectionSort(arr):
          n = len(arr)
          for i in range(n):
              minIdx = i
              for j in range(i + 1, n):
                  if arr[j] < arr[minIdx]:
                      minIdx = j
              arr[i], arr[minIdx] = arr[minIdx], arr[i]
          return arr

      numbers = [64, 25, 12, 22, 11]
      selectionSort(numbers[:])
  - type: "code"
    language: "python"
    title: "삽입 정렬"
    description: "각 요소를 적절한 위치에 삽입합니다."
    content: |-
      def insertionSort(arr):
          for i in range(1, len(arr)):
              key = arr[i]
              j = i - 1
              while j >= 0 and arr[j] > key:
                  arr[j + 1] = arr[j]
                  j = j - 1
              arr[j + 1] = key
          return arr

      dataset = [12, 11, 13, 5, 6]
      insertionSort(dataset[:])
  - type: "tip"
    content: "정렬 알고리즘을 선택할 때는 데이터 크기와 특성을 고려해야 합니다."

- id: "searching_basic"
  title: "검색 알고리즘"
  subtitle: "데이터 찾기"
  blocks:
  - type: "text"
    content: "검색은 특정 값을 찾는 기본 알고리즘입니다. 선형 검색은 처음부터 끝까지 순차적으로 탐색하며, 이진 검색은 정렬된 배열에서 중간값과 비교하여 범위를 절반씩 줄입니다. 이진 검색은 O(log n)으로 선형 검색의 O(n)보다 훨씬 빠릅니다."
  - type: "list"
    items:
    - "선형 검색: 순차 탐색"
    - "이진 검색: 분할 정복"
    - "정렬 여부 확인 필요"
    - "시간 복잡도 차이"
  - type: "code"
    language: "python"
    title: "선형 검색"
    description: "순차적으로 값을 찾습니다."
    content: |-
      def linearSearch(arr, target):
          for i in range(len(arr)):
              if arr[i] == target:
                  return i
          return -1

      elements = [10, 23, 45, 70, 11, 15]
      linearSearch(elements, 70)
  - type: "code"
    language: "python"
    title: "이진 검색"
    description: "정렬된 배열에서 빠르게 값을 찾습니다."
    content: |-
      def binarySearch(arr, target):
          left = 0
          right = len(arr) - 1
          while left <= right:
              mid = (left + right) // 2
              if arr[mid] == target:
                  return mid
              elif arr[mid] < target:
                  left = mid + 1
              else:
                  right = mid - 1
          return -1

      sortedArr = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91]
      binarySearch(sortedArr, 23)
  - type: "code"
    language: "python"
    title: "값 존재 여부"
    description: "배열에 특정 값이 있는지 확인합니다."
    content: |-
      def contains(arr, value):
          for item in arr:
              if item == value:
                  return True
          return False

      collection = [1, 2, 3, 4, 5]
      contains(collection, 3), contains(collection, 10)
  - type: "tip"
    content: "이진 검색을 사용하려면 배열이 정렬되어 있어야 합니다."

- id: "recursion_basic"
  title: "재귀 함수 기초"
  subtitle: "함수가 자기 자신을 호출"
  blocks:
  - type: "text"
    content: "재귀는 함수가 자기 자신을 호출하는 프로그래밍 기법입니다. 기저 조건(base case)과 재귀 조건(recursive case)으로 구성되며, 기저 조건이 없으면 무한 루프에 빠집니다. 팩토리얼, 피보나치, 하노이 탑 등 많은 문제를 재귀로 해결할 수 있습니다."
  - type: "list"
    items:
    - "기저 조건: 재귀 종료"
    - "재귀 조건: 자기 호출"
    - "스택 메모리 사용"
    - "우아한 문제 해결"
  - type: "code"
    language: "python"
    title: "팩토리얼"
    description: "n! = n × (n-1)!를 재귀로 구현합니다."
    content: |-
      def factorial(n):
          if n <= 1:
              return 1
          return n * factorial(n - 1)

      factorial(5)
  - type: "code"
    language: "python"
    title: "피보나치 수열"
    description: "F(n) = F(n-1) + F(n-2)를 재귀로 구현합니다."
    content: |-
      def fibonacci(n):
          if n <= 1:
              return n
          return fibonacci(n - 1) + fibonacci(n - 2)

      fibonacci(7)
  - type: "code"
    language: "python"
    title: "거듭제곱"
    description: "x^n을 재귀로 계산합니다."
    content: |-
      def power(base, exp):
          if exp == 0:
              return 1
          return base * power(base, exp - 1)

      power(2, 10)
  - type: "tip"
    content: "재귀 함수는 반드시 기저 조건을 가져야 무한 재귀를 방지할 수 있습니다."

- id: "recursion_advanced"
  title: "재귀 심화"
  subtitle: "복잡한 재귀 문제"
  blocks:
  - type: "text"
    content: "재귀는 트리 구조, 백트래킹, 분할 정복 등 복잡한 알고리즘에 사용됩니다. 리스트 합계, 문자열 뒤집기, 이진 검색 등도 재귀로 구현할 수 있습니다. 재귀는 코드를 간결하게 만들지만 스택 오버플로우에 주의해야 합니다."
  - type: "list"
    items:
    - "리스트 재귀 처리"
    - "문자열 재귀 처리"
    - "분할 정복 전략"
    - "스택 깊이 주의"
  - type: "code"
    language: "python"
    title: "리스트 합계"
    description: "리스트의 모든 요소를 재귀로 더합니다."
    content: |-
      def sumList(lst):
          if not lst:
              return 0
          return lst[0] + sumList(lst[1:])

      values = [1, 2, 3, 4, 5]
      sumList(values)
  - type: "code"
    language: "python"
    title: "문자열 뒤집기"
    description: "문자열을 재귀로 뒤집습니다."
    content: |-
      def reverseStr(s):
          if len(s) <= 1:
              return s
          return reverseStr(s[1:]) + s[0]

      reverseStr('hello')
  - type: "code"
    language: "python"
    title: "최댓값 찾기"
    description: "리스트에서 최댓값을 재귀로 찾습니다."
    content: |-
      def findMax(lst):
          if len(lst) == 1:
              return lst[0]
          maxRest = findMax(lst[1:])
          return lst[0] if lst[0] > maxRest else maxRest

      nums = [3, 7, 2, 9, 4, 1]
      findMax(nums)
  - type: "tip"
    content: "재귀는 문제를 더 작은 부분 문제로 나누는 분할 정복 전략에 적합합니다."

- id: "algorithm_patterns"
  title: "알고리즘 패턴"
  subtitle: "자주 사용되는 패턴"
  blocks:
  - type: "text"
    content: "알고리즘 문제 해결에는 반복되는 패턴이 있습니다. 투 포인터는 양 끝에서 시작하여 중간으로 이동하며, 슬라이딩 윈도우는 고정 크기의 구간을 이동시킵니다. 이러한 패턴을 익히면 다양한 문제를 효율적으로 해결할 수 있습니다."
  - type: "list"
    items:
    - "투 포인터 기법"
    - "슬라이딩 윈도우"
    - "카운팅 기법"
    - "효율성 향상"
  - type: "code"
    language: "python"
    title: "투 포인터: 회문 검사"
    description: "양 끝에서 중간으로 이동하며 비교합니다."
    content: |-
      def isPalindrome(s):
          left = 0
          right = len(s) - 1
          while left < right:
              if s[left] != s[right]:
                  return False
              left = left + 1
              right = right - 1
          return True

      isPalindrome('radar')
  - type: "code"
    language: "python"
    title: "슬라이딩 윈도우"
    description: "고정 크기 구간의 최댓값을 찾습니다."
    content: |-
      def maxSlidingWindow(arr, k):
          if len(arr) < k:
              return []
          maxVals = []
          for i in range(len(arr) - k + 1):
              window = arr[i:i + k]
              maxVals.append(max(window))
          return maxVals

      sequence = [1, 3, 2, 5, 8, 1, 4]
      maxSlidingWindow(sequence, 3)
  - type: "code"
    language: "python"
    title: "빈도 카운팅"
    description: "요소의 등장 횟수를 셉니다."
    content: |-
      def countFrequency(arr):
          freq = {}
          for item in arr:
              if item in freq:
                  freq[item] = freq[item] + 1
              else:
                  freq[item] = 1
          return freq

      items = [1, 2, 2, 3, 3, 3, 4, 4, 4, 4]
      countFrequency(items)
  - type: "tip"
    content: "알고리즘 패턴을 익히면 새로운 문제도 빠르게 해결할 수 있습니다."

- id: "practical_problems"
  title: "실전 문제"
  subtitle: "종합 알고리즘 문제"
  blocks:
  - type: "text"
    content: "실전 알고리즘 문제는 여러 개념을 조합하여 해결합니다. 중복 제거, 최빈값 찾기, 부분 배열 합계 등은 정렬, 검색, 카운팅을 함께 사용합니다. 문제를 작은 단계로 나누고 각 단계를 구현하는 것이 중요합니다."
  - type: "list"
    items:
    - "문제 분석"
    - "단계별 구현"
    - "테스트와 검증"
    - "최적화"
  - type: "code"
    language: "python"
    title: "중복 제거"
    description: "리스트에서 중복을 제거하고 정렬합니다."
    content: |-
      def removeDuplicates(arr):
          seen = []
          for item in arr:
              if item not in seen:
                  seen.append(item)
          return sorted(seen)

      duplicated = [4, 2, 4, 1, 3, 2, 5, 3]
      removeDuplicates(duplicated)
  - type: "code"
    language: "python"
    title: "최빈값 찾기"
    description: "가장 많이 등장하는 값을 찾습니다."
    content: |-
      def findMode(arr):
          freq = {}
          for item in arr:
              freq[item] = freq.get(item, 0) + 1
          maxCount = max(freq.values())
          for key, val in freq.items():
              if val == maxCount:
                  return key
          return None

      data = [1, 2, 2, 3, 3, 3, 4, 4]
      findMode(data)
  - type: "code"
    language: "python"
    title: "연속 합계"
    description: "연속된 구간의 최대 합을 찾습니다."
    content: |-
      def maxSubarraySum(arr, k):
          if len(arr) < k:
              return 0
          maxSum = sum(arr[:k])
          currentSum = maxSum
          for i in range(k, len(arr)):
              currentSum = currentSum - arr[i - k] + arr[i]
              if currentSum > maxSum:
                  maxSum = currentSum
          return maxSum

      scores = [2, 1, 5, 1, 3, 2]
      maxSubarraySum(scores, 3)
  - type: "tip"
    content: "복잡한 문제는 작은 함수로 나누어 구현하면 이해와 디버깅이 쉬워집니다."

