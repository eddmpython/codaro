      def findPath(maze, x, y, path):
          if x < 0 or x >= len(maze) or y < 0 or y >= len(maze[0]):
              return False
          if maze[x][y] == 1:
              return False
          if x == len(maze) - 1 and y == len(maze[0]) - 1:
              path.append((x, y))
              return True
          maze[x][y] = 1
          if findPath(maze, x + 1, y, path) or findPath(maze, x, y + 1, path):
              path.append((x, y))
              return True
          maze[x][y] = 0
          return False

      grid = [[0, 0, 0], [0, 0, 0], [0, 0, 0]]
      pathResult = []
      findPath(grid, 0, 0, pathResult)
      len(pathResult)

