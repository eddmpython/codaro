      def subsetSum(arr, target):
          if target == 0:
              return True
          if not arr:
              return False
          return subsetSum(arr[1:], target - arr[0]) or subsetSum(arr[1:], target)

      setData = [3, 34, 4, 12, 5, 2]
      subsetSum(setData, 9)

