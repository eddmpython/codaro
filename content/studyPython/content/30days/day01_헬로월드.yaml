meta:
  id: day01
  title: "헬로월드"
  day: 1
  category: 30days
  tags: []
  seo:
    title: "파이썬 시작 - 헬로월드"
    description: "파이썬의 첫 시작, 헬로월드와 주석을 배웁니다."
    keywords: ['헬로월드', 'print', '주석', 'comment']

intro:
  emoji: "👋"
  points:
  - "파이썬 프로그램 실행 방법"
  - "print() 함수로 텍스트 출력하기"
  - "한 줄 주석과 여러 줄 주석"
  - "코드 작성 시 주석의 중요성"

sections:
- id: hello_world
  title: "Hello World"
  subtitle: "첫 파이썬 프로그램"
  blocks:
  - type: text
    content: "모든 프로그래밍 언어를 배울 때 가장 먼저 하는 것이 'Hello World'를 출력하는 것입니다. 이는 1970년대부터 이어져 온 전통으로, 프로그램이 제대로 실행되는지 확인하는 가장 간단한 방법입니다. 파이썬에서는 print() 함수를 사용하여 화면에 텍스트를 출력합니다."
  - type: list
    items:
    - "print() 함수로 텍스트 출력"
    - "작은따옴표 또는 큰따옴표로 문자 감싸기"
    - "프로그래밍의 전통적인 첫 단계"
  - type: code
    language: python
    title: "Hello World 출력"
    description: "print() 함수로 'Hello World'를 출력합니다."
    content: |-
      print('Hello World')
  - type: tip
    content: "작은따옴표('')와 큰따옴표(\"\")는 기능상 차이가 없습니다. 편한 것을 사용하세요."

- id: print_korean
  title: "한글 출력하기"
  subtitle: "파이썬은 모든 언어 지원"
  blocks:
  - type: text
    content: "파이썬은 유니코드(Unicode)를 지원하므로 영어뿐만 아니라 한글, 일본어, 중국어 등 모든 언어를 출력할 수 있습니다. 유니코드는 전 세계 모든 문자를 컴퓨터에서 표현할 수 있도록 만든 국제 표준입니다."
  - type: list
    items:
    - "한글, 영어, 일본어 등 모든 언어 출력 가능"
    - "유니코드 완벽 지원"
    - "이모지도 출력 가능"
  - type: code
    language: python
    title: "한글 출력"
    description: "한글도 자유롭게 출력할 수 있습니다."
    content: |-
      print('안녕하세요, 파이썬!')
  - type: tip
    content: "이모지도 출력할 수 있습니다: print('🐍 Python')"

- id: print_multiple
  title: "여러 줄 출력하기"
  subtitle: "print() 여러 번 사용"
  blocks:
  - type: text
    content: "여러 줄의 텍스트를 출력하려면 print() 함수를 여러 번 사용하면 됩니다. 각 print()는 자동으로 줄바꿈을 하므로 다음 출력은 새 줄에서 시작됩니다."
  - type: list
    items:
    - "print() 여러 번 사용하여 여러 줄 출력"
    - "각 print()는 자동으로 줄바꿈"
    - "순서대로 위에서 아래로 실행"
  - type: code
    language: python
    title: "여러 줄 출력"
    description: "print()를 여러 번 사용하여 여러 줄을 출력합니다."
    content: |-
      print('첫 번째 줄')
      print('두 번째 줄')
      print('세 번째 줄')

- id: print_newline
  title: "줄바꿈 문자"
  subtitle: "\\n으로 한 번에 여러 줄 출력"
  blocks:
  - type: text
    content: "\\n은 줄바꿈 문자로, 하나의 print() 안에서 여러 줄을 출력할 수 있게 해줍니다. \\n을 만나면 그 지점에서 줄이 바뀝니다. 백슬래시(\\)와 문자 n을 함께 써서 만듭니다."
  - type: list
    items:
    - "\\n은 줄바꿈 문자"
    - "하나의 print()로 여러 줄 출력 가능"
    - "백슬래시(\\)와 n을 함께 사용"
  - type: code
    language: python
    title: "줄바꿈 문자 사용"
    description: "\\n을 사용하여 한 번에 여러 줄을 출력합니다."
    content: |-
      print('첫 번째 줄\n두 번째 줄\n세 번째 줄')
  - type: tip
    content: "\\n을 사용하면 print() 한 번으로 여러 줄을 출력할 수 있어 편리합니다."

- id: comment_single
  title: "한 줄 주석"
  subtitle: "코드에 설명 추가하기"
  blocks:
  - type: text
    content: "주석(Comment)은 프로그램 실행에 영향을 주지 않는 메모입니다. 코드에 설명을 추가하여 나중에 다시 볼 때나 다른 사람이 볼 때 이해하기 쉽게 만듭니다. 파이썬에서 한 줄 주석은 # 기호로 시작합니다."
  - type: list
    items:
    - "#으로 시작하는 한 줄 주석"
    - "프로그램 실행에 영향 없음"
    - "코드 설명이나 메모 작성"
    - "코드의 가독성 향상"
  - type: code
    language: python
    title: "한 줄 주석 사용"
    description: "# 기호로 주석을 작성합니다."
    content: |-
      print('실행됩니다')
  - type: tip
    content: "주석은 코드를 이해하기 쉽게 만들지만, 과도한 주석은 오히려 가독성을 해칩니다."

- id: comment_multi
  title: "여러 줄 주석"
  subtitle: "긴 설명 작성하기"
  blocks:
  - type: text
    content: "여러 줄에 걸친 긴 주석을 작성할 때는 삼중 따옴표(''' 또는 \"\"\")를 사용합니다. 삼중 따옴표로 감싸진 부분은 프로그램이 무시하므로 여러 줄의 설명을 자유롭게 작성할 수 있습니다."
  - type: list
    items:
    - "삼중 따옴표(''' 또는 \"\"\")로 여러 줄 주석"
    - "긴 설명이나 문서화에 사용"
    - "프로그램 설명, 라이센스 정보 등에 활용"
  - type: code
    language: python
    title: "여러 줄 주석 사용"
    description: "삼중 따옴표로 여러 줄 주석을 작성합니다."
    content: |-
      print('주석 전')
      print('주석 후')
  - type: tip
    content: "작은따옴표 3개(''')와 큰따옴표 3개(\"\"\")는 동일하게 작동합니다."

- id: print_numbers
  title: "숫자 출력하기"
  subtitle: "따옴표 없이 숫자 출력"
  blocks:
  - type: text
    content: "숫자를 출력할 때는 따옴표가 필요 없습니다. 따옴표로 감싸면 문자로 인식되고, 따옴표 없이 쓰면 숫자로 인식됩니다. 숫자는 계산에 사용할 수 있지만, 문자는 계산할 수 없습니다."
  - type: list
    items:
    - "숫자는 따옴표 없이 출력"
    - "정수와 소수 모두 가능"
    - "따옴표로 감싸면 문자가 됨"
  - type: code
    language: python
    title: "숫자 출력"
    description: "따옴표 없이 숫자를 출력합니다."
    content: |-
      print(123)
  - type: tip
    content: "print(123)은 숫자 123을, print('123')은 문자 '123'을 출력합니다."

- id: print_calculation
  title: "계산 결과 출력하기"
  subtitle: "파이썬을 계산기처럼 사용"
  blocks:
  - type: text
    content: "print() 안에서 직접 계산을 할 수 있습니다. 파이썬은 계산 결과를 자동으로 구한 후 출력합니다. 더하기(+), 빼기(-), 곱하기(*), 나누기(/) 등 다양한 연산이 가능합니다."
  - type: list
    items:
    - "print() 안에서 직접 계산 가능"
    - "계산 결과가 자동으로 출력됨"
    - "파이썬을 계산기처럼 사용"
  - type: code
    language: python
    title: "계산 결과 출력"
    description: "print() 안에서 계산을 하고 결과를 출력합니다."
    content: |-
      print(10 + 20)

- id: marimo_expression
  title: "Marimo에서 자동 출력"
  subtitle: "print 없이 표현식만 쓰기"
  blocks:
  - type: text
    content: "Marimo 환경에서는 셀의 마지막 표현식이 자동으로 출력됩니다. 표현식(Expression)이란 값을 만들어내는 코드 조각입니다. print()를 쓰지 않아도 마지막 줄에 값을 쓰면 자동으로 화면에 보입니다."
  - type: list
    items:
    - "Marimo에서는 마지막 표현식 자동 출력"
    - "print() 없이도 값이 화면에 표시"
    - "더 간결한 코드 작성 가능"
  - type: code
    language: python
    title: "자동 출력"
    description: "마지막 줄의 값이 자동으로 출력됩니다."
    content: |-
      'Hello Marimo'

- id: practice
  title: "Day 1 종합 복습"
  subtitle: "Hello World와 주석 마스터하기"
  blocks:
  - type: text
    content: "Day 1에서 배운 print() 함수와 주석을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: expansion
    title: "🟢 기본1: Hello World 출력"
    code: |-
      print('Hello World')

  - type: expansion
    title: "🟢 기본2: 한글 출력"
    code: |-
      print('안녕하세요')

  - type: expansion
    title: "🟢 기본3: 숫자 출력"
    code: |-
      print(42)

  - type: expansion
    title: "🟢 기본4: 계산 결과"
    code: |-
      print(5 + 3)

  - type: expansion
    title: "🟢 기본5: 여러 줄 출력"
    code: |-
      print('첫째')
      print('둘째')
      print('셋째')

  - type: expansion
    title: "🟡 응용1: 줄바꿈으로 인사말"
    code: |-
      print('안녕하세요!\n저는 파이썬입니다.\n만나서 반갑습니다!')

  - type: expansion
    title: "🟡 응용2: 계산과 설명"
    code: |-
      print('10 + 20 = ')
      print(10 + 20)

  - type: expansion
    title: "🟡 응용3: 이모지와 메시지"
    code: |-
      print('🐍 Python')
      print('🔥 Hot')
      print('💯 Perfect')

  - type: expansion
    title: "🟡 응용4: 여러 계산 비교"
    code: |-
      print(10 + 5)
      print(10 - 5)
      print(10 * 5)
      print(10 / 5)

  - type: expansion
    title: "🟡 응용5: Marimo로 계산"
    code: |-
      100 + 200 + 300

  - type: expansion
    title: "🔴 심화1: 명함 만들기"
    code: |-
      print('=' * 30)
      print('이름: 홍길동')
      print('나이: 25')
      print('직업: 개발자')
      print('=' * 30)

  - type: expansion
    title: "🔴 심화2: 계산기 출력"
    code: |-
      print('=== 계산 결과 ===')
      print('덧셈: ')
      print(100 + 50)
      print('곱셈: ')
      print(100 * 2)

  - type: expansion
    title: "🔴 심화3: 패턴 만들기"
    code: |-
      print('★' * 10)
      print('☆' * 10)
      print('★' * 10)
      print('☆' * 10)

  - type: expansion
    title: "🔴 심화4: 메뉴판 출력"
    code: |-
      print('🍕 피자 - 15000원\n🍔 햄버거 - 8000원\n🍗 치킨 - 18000원')

  - type: expansion
    title: "🔴 심화5: 복합 정보 카드"
    code: |-
      print('🎓 학습 진도')
      print('Day 1 완료!')
      print('학습 시간: ')
      print(30 + 20)
      print('분')
