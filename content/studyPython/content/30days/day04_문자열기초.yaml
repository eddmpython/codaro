meta:
  id: day04
  title: "문자열 기초"
  day: 4
  category: 30days
  tags: []
  seo:
    title: "파이썬 문자열 기초 완벽 가이드"
    description: "문자열 연결, 이스케이프 문자, 여러 줄 문자열, 문자열 반복을 배웁니다."
    keywords: ['문자열', 'string', '연결', 'concat', '이스케이프']

intro:
  emoji: "📝"
  points:
  - "문자열 연결과 반복"
  - "f-string으로 간편한 포맷팅"
  - "이스케이프 문자로 특수 문자 표현하기"
  - "여러 줄 문자열 작성하기"

sections:
- id: string_concat
  title: "문자열 연결"
  subtitle: "+ 기호로 문자열 합치기"
  blocks:
  - type: text
    content: "문자열은 + 연산자로 연결할 수 있습니다. 두 개 이상의 문자열을 하나로 합칠 때 사용합니다. 숫자의 덧셈과 같은 기호지만 문자열에서는 연결의 의미입니다."
  - type: list
    items:
    - "+ 기호로 문자열 연결"
    - "여러 문자열 연결 가능"
    - "공백도 문자로 포함됨"
  - type: code
    language: python
    title: "문자열 연결"
    description: "두 문자열을 + 기호로 연결합니다."
    content: |-
      first = 'Hello'
      second = 'World'
      first + ' ' + second
  - type: tip
    content: "공백을 넣으려면 ' ' 처럼 공백 문자열을 중간에 추가합니다."

- id: string_repeat
  title: "문자열 반복"
  subtitle: "* 기호로 문자열 반복하기"
  blocks:
  - type: text
    content: "문자열에 * 연산자를 사용하면 문자열을 반복할 수 있습니다. 숫자를 곱하면 그 횟수만큼 문자열이 반복됩니다. 같은 문자를 여러 번 출력할 때 유용합니다."
  - type: list
    items:
    - "* 기호로 문자열 반복"
    - "문자열 * 숫자 형태로 사용"
    - "반복 횟수는 정수만 가능"
  - type: code
    language: python
    title: "문자열 반복"
    description: "문자열을 3번 반복합니다."
    content: |-
      word = 'Python'
      word * 3
  - type: tip
    content: "'=' * 50 처럼 사용하면 구분선을 만들 수 있습니다."

- id: string_length
  title: "문자열 길이"
  subtitle: "len() 함수로 길이 구하기"
  blocks:
  - type: text
    content: "len() 함수는 문자열의 길이를 반환합니다. 문자열에 포함된 문자의 개수를 세어줍니다. 공백과 특수문자도 모두 포함됩니다."
  - type: list
    items:
    - "len() 함수로 문자열 길이 계산"
    - "공백, 특수문자 모두 포함"
    - "결과는 정수(int)"
  - type: code
    language: python
    title: "문자열 길이"
    description: "문자열의 길이를 구합니다."
    content: |-
      text = 'Hello Python'
      len(text)

- id: fstring
  title: "f-string 포맷팅"
  subtitle: "f-string으로 간편하게 문자열 만들기"
  blocks:
  - type: text
    content: "f-string은 문자열 앞에 f를 붙여 변수를 직접 넣을 수 있는 방법입니다. + 연결이나 str() 변환 없이도 변수와 문자를 자연스럽게 조합할 수 있습니다. 중괄호 {} 안에 변수명이나 표현식을 넣으면 자동으로 문자열로 변환됩니다."
  - type: list
    items:
    - "f'...' 형식으로 사용"
    - "{변수명}으로 변수 삽입"
    - "자동으로 str() 변환"
    - "+ 연결보다 읽기 쉬움"
  - type: code
    language: python
    title: "f-string 기본"
    description: "f-string으로 변수를 문자열에 삽입합니다."
    content: |-
      name = '김철수'
      age = 25
      f'{name}님의 나이는 {age}세입니다'
  - type: tip
    content: "중괄호 {} 안에는 변수뿐만 아니라 연산식(예: {age + 1})도 넣을 수 있습니다."

- id: escape_newline
  title: "줄바꿈 문자"
  subtitle: "\\n으로 줄 바꾸기"
  blocks:
  - type: text
    content: "이스케이프 문자는 백슬래시(\\)로 시작하는 특수 문자입니다. \\n은 줄바꿈을 의미하며, 문자열 중간에 사용하면 그 지점에서 줄이 바뀝니다. 여러 줄 출력에 유용합니다."
  - type: list
    items:
    - "\\n은 줄바꿈 문자"
    - "백슬래시(\\)로 시작"
    - "문자열 중간에 삽입 가능"
  - type: code
    language: python
    title: "줄바꿈 문자"
    description: "\\n을 사용하여 줄을 바꿉니다."
    content: |-
      lines = '첫 번째 줄\n두 번째 줄\n세 번째 줄'
      print(lines)

- id: escape_tab
  title: "탭 문자"
  subtitle: "\\t로 간격 넣기"
  blocks:
  - type: text
    content: "\\t는 탭 문자로, 일정한 간격을 만듭니다. 텍스트를 정렬할 때 유용하며, 보통 4칸 또는 8칸의 공백과 같은 효과를 냅니다."
  - type: list
    items:
    - "\\t는 탭 문자"
    - "일정한 간격 생성"
    - "텍스트 정렬에 유용"
  - type: code
    language: python
    title: "탭 문자"
    description: "\\t를 사용하여 탭 간격을 만듭니다."
    content: |-
      row = '이름\t나이\t도시'
      print(row)

- id: escape_quote
  title: "따옴표 문자"
  subtitle: "\\'와 \\\"로 따옴표 넣기"
  blocks:
  - type: text
    content: "문자열 안에 따옴표를 넣으려면 백슬래시를 앞에 붙입니다. \\'는 작은따옴표, \\\"는 큰따옴표를 문자로 표현합니다. 또는 작은따옴표 문자열 안에 큰따옴표를 사용할 수도 있습니다."
  - type: list
    items:
    - "\\' 작은따옴표 문자"
    - "\\\" 큰따옴표 문자"
    - "작은따옴표 안에 큰따옴표 직접 사용 가능"
  - type: code
    language: python
    title: "따옴표 문자"
    description: "문자열 안에 따옴표를 넣습니다."
    content: |-
      quote = "It's a beautiful day"
      quote

- id: escape_backslash
  title: "백슬래시 문자"
  subtitle: "\\\\로 백슬래시 표현하기"
  blocks:
  - type: text
    content: "백슬래시 자체를 문자로 표현하려면 \\\\처럼 두 번 사용합니다. Windows 경로(C:\\Users)나 정규표현식에서 자주 사용됩니다."
  - type: list
    items:
    - "\\\\ 백슬래시 문자"
    - "두 번 사용해야 하나로 표시"
    - "파일 경로 표현에 사용"
  - type: code
    language: python
    title: "백슬래시 문자"
    description: "백슬래시를 문자로 표현합니다."
    content: |-
      path = 'C:\\\\Users\\\\Documents'
      print(path)

- id: multiline_string
  title: "여러 줄 문자열"
  subtitle: "삼중 따옴표로 여러 줄 작성"
  blocks:
  - type: text
    content: "삼중 따옴표(''' 또는 \\\"\\\"\\\")를 사용하면 여러 줄에 걸친 문자열을 쉽게 작성할 수 있습니다. 줄바꿈이 자동으로 포함되며, \\n을 사용하지 않아도 됩니다."
  - type: list
    items:
    - "삼중 따옴표로 여러 줄 문자열"
    - "줄바꿈 자동 포함"
    - "긴 텍스트 작성에 유용"
  - type: code
    language: python
    title: "여러 줄 문자열"
    description: "삼중 따옴표로 여러 줄 문자열을 작성합니다."
    content: |-
      block = '''첫 번째 줄
      두 번째 줄
      세 번째 줄'''
      print(block)

- id: raw_string
  title: "원시 문자열"
  subtitle: "r 접두사로 이스케이프 무시하기"
  blocks:
  - type: text
    content: "문자열 앞에 r을 붙이면 이스케이프 문자를 무시합니다. \\n이 줄바꿈이 아닌 문자 그대로 표시됩니다. 정규표현식이나 파일 경로 작성에 유용합니다."
  - type: list
    items:
    - "r 접두사로 원시 문자열"
    - "이스케이프 문자 무시"
    - "정규표현식, 경로 작성에 유용"
  - type: code
    language: python
    title: "원시 문자열"
    description: "r 접두사를 사용하여 이스케이프를 무시합니다."
    content: |-
      raw = r'C:\Users\Documents'
      print(raw)

- id: string_in
  title: "문자열 포함 확인"
  subtitle: "in 연산자로 부분 문자열 찾기"
  blocks:
  - type: text
    content: "in 연산자는 문자열 안에 특정 문자나 단어가 포함되어 있는지 확인합니다. 포함되어 있으면 True, 없으면 False를 반환합니다."
  - type: list
    items:
    - "in 연산자로 포함 여부 확인"
    - "결과는 True 또는 False"
    - "대소문자 구분함"
  - type: code
    language: python
    title: "문자열 포함 확인"
    description: "특정 문자가 포함되어 있는지 확인합니다."
    content: |-
      phrase = 'Python Programming'
      'Python' in phrase
  - type: tip
    content: "대소문자를 구분하므로 'python' in inCheckText는 False입니다."

- id: string_not_in
  title: "문자열 미포함 확인"
  subtitle: "not in 연산자로 확인하기"
  blocks:
  - type: text
    content: "not in 연산자는 문자열에 특정 문자나 단어가 포함되지 않았는지 확인합니다. 포함되지 않으면 True, 포함되어 있으면 False를 반환합니다."
  - type: list
    items:
    - "not in 연산자로 미포함 확인"
    - "in의 반대 결과"
    - "필터링에 유용"
  - type: code
    language: python
    title: "문자열 미포함 확인"
    description: "특정 문자가 포함되지 않았는지 확인합니다."
    content: |-
      sentence = 'Hello World'
      'Python' not in sentence

- id: practice
  title: "Day 4 종합 복습"
  subtitle: "문자열 기초 마스터하기"
  blocks:
  - type: text
    content: "Day 4에서 배운 문자열 기초를 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: expansion
    title: "🟢 기본1: 문자열 연결"
    code: |-
      first = 'Hello'
      second = 'Python'
      first + ' ' + second

  - type: expansion
    title: "🟢 기본2: 문자열 반복"
    code: |-
      star = '★'
      star * 5

  - type: expansion
    title: "🟢 기본3: 문자열 길이"
    code: |-
      word = 'Python Programming'
      len(word)

  - type: expansion
    title: "🟢 기본4: 줄바꿈 문자"
    code: |-
      text = '첫 줄\n둘째 줄'
      print(text)

  - type: expansion
    title: "🟢 기본5: in 연산자"
    code: |-
      msg = 'Python is fun'
      'fun' in msg

  - type: expansion
    title: "🟢 기본6: f-string"
    code: |-
      name = '홍길동'
      age = 30
      f'{name}님은 {age}세입니다'

  - type: expansion
    title: "🟡 응용1: 이름표 만들기"
    code: |-
      name = '홍길동'
      company = 'ABC회사'
      print('[ ' + name + ' ]\n' + company)

  - type: expansion
    title: "🟡 응용2: 메시지 포맷팅"
    code: |-
      user = '김철수'
      point = 1500
      f'{user}님, 포인트 {point}점이 적립되었습니다!'

  - type: expansion
    title: "🟡 응용3: 주소 라벨"
    code: |-
      receiver = '이영희'
      addr = '서울시 강남구'
      zipcode = '12345'
      print(receiver + '\n' + addr + '\n우편번호: ' + zipcode)

  - type: expansion
    title: "🟡 응용4: 파일 경로 확인"
    blocks:
    - type: code
      title: "경로"
      content: |-
        path = 'C:\\Users\\Documents\\file.txt'
        path

    - type: code
      title: "txt 파일 여부"
      content: |-
        path = 'C:\\Users\\Documents\\file.txt'
        '.txt' in path

    - type: code
      title: "doc 파일 여부"
      content: |-
        path = 'C:\\Users\\Documents\\file.txt'
        '.doc' in path

  - type: expansion
    title: "🟡 응용5: 반복 패턴"
    code: |-
      deco = '■' * 5 + '□' * 5
      print(deco + '\n' + deco)

  - type: expansion
    title: "🔴 심화1: 영수증 만들기"
    code: |-
      store = 'ABC마트'
      item = '사과'
      qty = 3
      price = 5000
      total = qty * price
      line = '=' * 30
      print(f'{line}\n{store}\n{line}\n{item} x {qty}\n합계: {total}원')

  - type: expansion
    title: "🔴 심화2: 테이블 헤더"
    code: |-
      col1 = 'Name'
      col2 = 'Age'
      col3 = 'City'
      header = col1 + '\t' + col2 + '\t' + col3
      divider = '-' * 40
      print(header + '\n' + divider)

  - type: expansion
    title: "🔴 심화3: URL 생성 및 검증"
    blocks:
    - type: code
      title: "URL 생성"
      content: |-
        protocol = 'https://'
        domain = 'www.example.com'
        route = '/products'
        protocol + domain + route

    - type: code
      title: "보안 여부"
      content: |-
        protocol = 'https://'
        domain = 'www.example.com'
        route = '/products'
        url = protocol + domain + route
        'https' in url

    - type: code
      title: "유효성 검증"
      content: |-
        protocol = 'https://'
        domain = 'www.example.com'
        route = '/products'
        url = protocol + domain + route
        ('http' in url) and ('.' in url)

  - type: expansion
    title: "🔴 심화4: 명함 디자인"
    code: |-
      top = '┌' + '─' * 20 + '┐'
      row1 = '│  박개발            │'
      row2 = '│  Python Developer  │'
      bottom = '└' + '─' * 20 + '┘'
      print(top + '\n' + row1 + '\n' + row2 + '\n' + bottom)

  - type: expansion
    title: "🔴 심화5: 로그 메시지"
    blocks:
    - type: code
      title: "로그 메시지"
      content: |-
        level = 'INFO'
        stamp = '14:30:25'
        msg = 'User logged in'
        '[' + level + '] ' + stamp + ' - ' + msg

    - type: code
      title: "메시지 길이"
      content: |-
        level = 'INFO'
        stamp = '14:30:25'
        msg = 'User logged in'
        log = '[' + level + '] ' + stamp + ' - ' + msg
        len(log)

    - type: code
      title: "ERROR 포함 여부"
      content: |-
        level = 'INFO'
        stamp = '14:30:25'
        msg = 'User logged in'
        log = '[' + level + '] ' + stamp + ' - ' + msg
        'ERROR' in log

    - type: code
      title: "INFO 포함 여부"
      content: |-
        level = 'INFO'
        stamp = '14:30:25'
        msg = 'User logged in'
        log = '[' + level + '] ' + stamp + ' - ' + msg
        'INFO' in log
