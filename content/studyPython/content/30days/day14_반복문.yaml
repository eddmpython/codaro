meta:
  id: "day14"
  title: "반복문"
  day: 14
  category: "30days"
  tags: []
  seo:
    title: "파이썬 반복문 - for, while로 반복 작업"
    description: "for, while, range, break, continue, else절을 배웁니다."
    keywords: ['반복문', 'for', 'while', 'range', 'break', 'continue']

intro:
  emoji: "🔁"
  points:
  - "for로 컬렉션 순회"
  - "while로 조건 반복"
  - "break, continue로 제어"
  - "중첩 반복문 활용"

sections:
- id: "for_list"
  title: "for 리스트 순회"
  subtitle: "리스트의 모든 요소 처리"
  blocks:
  - type: "text"
    content: "for문은 리스트의 요소를 하나씩 꺼내서 처리합니다. for 변수 in 리스트: 형식으로 쓰며, 리스트의 모든 요소에 대해 반복합니다. 들여쓰기로 반복할 코드 블록을 구분합니다."
  - type: "list"
    items:
    - "for 변수 in 리스트: 형식"
    - "요소를 하나씩 꺼내기"
    - "모든 요소 처리할 때까지 반복"
    - "들여쓰기로 블록 구분"
  - type: "code"
    language: "python"
    title: "리스트 순회"
    description: "리스트의 모든 요소를 순회합니다."
    content: |-
      numbers = [1, 2, 3, 4, 5]
      total = 0
      for num in numbers:
          total = total + num
      total
  - type: "code"
    language: "python"
    title: "리스트 문자열"
    description: "문자열 리스트를 순회합니다."
    content: |-
      fruits = ['apple', 'banana', 'cherry']
      joined = ''
      for fruit in fruits:
          joined = joined + fruit + ' '
      joined
  - type: "code"
    language: "python"
    title: "조건과 반복"
    description: "반복문 안에서 조건문을 사용합니다."
    content: |-
      values = [10, 25, 30, 15, 40]
      count = 0
      for val in values:
          if val >= 20:
              count = count + 1
      count
  - type: "tip"
    content: "변수명은 의미있게 짓세요. for item in items보다 for fruit in fruits가 좋습니다."

- id: "for_string"
  title: "for 문자열 순회"
  subtitle: "문자열의 각 문자 처리"
  blocks:
  - type: "text"
    content: "for문은 문자열의 각 문자를 하나씩 꺼낼 수 있습니다. 문자열도 시퀀스이므로 리스트처럼 순회할 수 있습니다. 각 문자에 대해 반복 작업을 수행합니다."
  - type: "list"
    items:
    - "문자열도 순회 가능"
    - "각 문자를 하나씩 처리"
    - "공백과 특수문자 포함"
    - "리스트와 동일한 방식"
  - type: "code"
    language: "python"
    title: "문자 세기"
    description: "특정 문자의 개수를 셉니다."
    content: |-
      msg = 'hello world'
      found = 0
      for char in msg:
          if char == 'o':
              found = found + 1
      found
  - type: "code"
    language: "python"
    title: "대문자 변환"
    description: "각 문자를 대문자로 변환하여 결합합니다."
    content: |-
      text = 'python'
      upper = ''
      for ch in text:
          upper = upper + ch.upper()
      upper
  - type: "code"
    language: "python"
    title: "모음 세기"
    description: "문자열에서 모음의 개수를 셉니다."
    content: |-
      sentence = 'hello python'
      vowels = 'aeiou'
      vowelCnt = 0
      for letter in sentence:
          if letter in vowels:
              vowelCnt = vowelCnt + 1
      vowelCnt
  - type: "tip"
    content: "문자열은 변경 불가능하므로 새 문자열을 만들어야 합니다."

- id: "for_dict"
  title: "for 딕셔너리 순회"
  subtitle: "키, 값, 아이템 순회"
  blocks:
  - type: "text"
    content: "딕셔너리는 keys(), values(), items()로 순회할 수 있습니다. 기본적으로 for문은 키를 순회하며, items()를 사용하면 키-값 쌍을 튜플로 받을 수 있습니다."
  - type: "list"
    items:
    - "기본: 키만 순회"
    - "keys(): 키 순회"
    - "values(): 값 순회"
    - "items(): 키-값 쌍 순회"
  - type: "code"
    language: "python"
    title: "키 순회"
    description: "딕셔너리의 키를 순회합니다."
    content: |-
      grades = {'math': 85, 'english': 90, 'science': 88}
      subjects = ''
      for subject in grades:
          subjects = subjects + subject + ' '
      subjects
  - type: "code"
    language: "python"
    title: "값 순회"
    description: "딕셔너리의 값을 순회합니다."
    content: |-
      marks = {'alice': 85, 'bob': 90, 'charlie': 88}
      gradeSum = 0
      for mark in marks.values():
          gradeSum = gradeSum + mark
      gradeSum
  - type: "code"
    language: "python"
    title: "키-값 순회"
    description: "items()로 키와 값을 함께 순회합니다."
    content: |-
      prices = {'apple': 1000, 'banana': 1500, 'cherry': 2000}
      expensive = ''
      for item, price in prices.items():
          if price >= 1500:
              expensive = expensive + item + ' '
      expensive
  - type: "tip"
    content: "items()를 사용하면 키와 값을 동시에 받을 수 있어 편리합니다."

- id: "range_basic"
  title: "range() 함수"
  subtitle: "숫자 시퀀스 생성"
  blocks:
  - type: "text"
    content: "range() 함수는 숫자 시퀀스를 생성합니다. range(끝), range(시작, 끝), range(시작, 끝, 간격) 형식으로 사용하며, list()로 변환하면 리스트로 볼 수 있습니다. 끝 값은 포함되지 않습니다."
  - type: "list"
    items:
    - "range(끝): 0부터 끝-1까지"
    - "range(시작, 끝): 시작부터 끝-1까지"
    - "range(시작, 끝, 간격): 간격만큼"
    - "끝 값은 미포함"
  - type: "code"
    language: "python"
    title: "range(끝)"
    description: "0부터 시작하는 범위를 생성합니다."
    content: |-
      list(range(5))
  - type: "code"
    language: "python"
    title: "range(시작, 끝)"
    description: "시작과 끝을 지정합니다."
    content: |-
      list(range(3, 8))
  - type: "code"
    language: "python"
    title: "range(시작, 끝, 간격)"
    description: "간격을 지정합니다."
    content: |-
      list(range(0, 10, 2))
  - type: "tip"
    content: "range()는 메모리 효율적입니다. 필요할 때만 값을 생성합니다."

- id: "for_range"
  title: "range()와 for"
  subtitle: "정해진 횟수만큼 반복"
  blocks:
  - type: "text"
    content: "range()와 for를 함께 사용하면 정해진 횟수만큼 반복할 수 있습니다. 인덱스를 이용한 순회나 n번 반복하는 작업에 유용합니다."
  - type: "list"
    items:
    - "for i in range(n): n번 반복"
    - "인덱스로 리스트 접근"
    - "정해진 횟수 반복"
    - "카운터 활용"
  - type: "code"
    language: "python"
    title: "n번 반복"
    description: "5번 반복하여 합계를 계산합니다."
    content: |-
      rangeSum = 0
      for i in range(1, 6):
          rangeSum = rangeSum + i
      rangeSum
  - type: "code"
    language: "python"
    title: "인덱스로 접근"
    description: "인덱스를 사용하여 리스트 요소에 접근합니다."
    content: |-
      letters = ['a', 'b', 'c', 'd']
      concat = ''
      for idx in range(len(letters)):
          concat = concat + letters[idx]
      concat
  - type: "code"
    language: "python"
    title: "구구단"
    description: "range로 구구단을 계산합니다."
    content: |-
      dan = 3
      answer = 0
      for i in range(1, 10):
          answer = dan * i
      answer
  - type: "tip"
    content: "리스트 순회시 인덱스가 필요없다면 for item in items를 사용하세요."

- id: "while_basic"
  title: "while 기본"
  subtitle: "조건이 참인 동안 반복"
  blocks:
  - type: "text"
    content: "while문은 조건이 True인 동안 계속 반복합니다. while 조건: 형식으로 쓰며, 조건이 False가 되면 반복을 멈춥니다. 무한 루프에 주의해야 합니다."
  - type: "list"
    items:
    - "while 조건: 형식"
    - "조건이 True면 계속 반복"
    - "조건이 False면 종료"
    - "무한 루프 주의"
  - type: "code"
    language: "python"
    title: "while 카운터"
    description: "카운터를 증가시키며 반복합니다."
    content: |-
      idx = 0
      acc = 0
      while idx < 5:
          acc = acc + idx
          idx = idx + 1
      acc
  - type: "code"
    language: "python"
    title: "while 조건"
    description: "특정 조건을 만족할 때까지 반복합니다."
    content: |-
      n = 1
      while n < 100:
          n = n * 2
      n
  - type: "code"
    language: "python"
    title: "while 누적"
    description: "조건을 만족하는 동안 값을 누적합니다."
    content: |-
      accumulated = 0
      i = 1
      while i <= 10:
          if i % 2 == 0:
              accumulated = accumulated + i
          i = i + 1
      accumulated
  - type: "tip"
    content: "while문에서는 조건을 변경하는 코드를 반드시 포함해야 합니다."

- id: "break_statement"
  title: "break 문"
  subtitle: "반복문 즉시 종료"
  blocks:
  - type: "text"
    content: "break는 반복문을 즉시 종료합니다. 조건을 만족하면 더 이상 반복하지 않고 빠져나올 때 사용합니다. for와 while 모두에서 사용할 수 있습니다."
  - type: "list"
    items:
    - "반복문 즉시 종료"
    - "조건 만족시 탈출"
    - "for, while 모두 사용 가능"
    - "가장 안쪽 반복문만 종료"
  - type: "code"
    language: "python"
    title: "for break"
    description: "조건을 만족하면 반복을 중단합니다."
    content: |-
      seq = [1, 2, 3, 4, 5, 6, 7, 8]
      hit = 0
      for x in seq:
          if x > 5:
              hit = x
              break
      hit
  - type: "code"
    language: "python"
    title: "while break"
    description: "while문에서 break를 사용합니다."
    content: |-
      current = 1
      while True:
          current = current * 2
          if current > 100:
              break
      current
  - type: "code"
    language: "python"
    title: "검색 중단"
    description: "원하는 값을 찾으면 즉시 중단합니다."
    content: |-
      data = ['apple', 'banana', 'cherry', 'date']
      key = 'cherry'
      loc = -1
      for i in range(len(data)):
          if data[i] == key:
              loc = i
              break
      loc
  - type: "tip"
    content: "break는 가장 가까운 반복문 하나만 종료합니다."

- id: "continue_statement"
  title: "continue 문"
  subtitle: "현재 반복 건너뛰기"
  blocks:
  - type: "text"
    content: "continue는 현재 반복을 건너뛰고 다음 반복으로 넘어갑니다. 특정 조건에서 처리를 생략하고 싶을 때 사용합니다. 반복문 자체는 종료되지 않습니다."
  - type: "list"
    items:
    - "현재 반복만 건너뛰기"
    - "다음 반복으로 이동"
    - "반복문은 계속 진행"
    - "조건부 처리 생략"
  - type: "code"
    language: "python"
    title: "continue 기본"
    description: "짝수만 건너뛰고 홀수만 처리합니다."
    content: |-
      odd = 0
      for n in range(1, 11):
          if n % 2 == 0:
              continue
          odd = odd + n
      odd
  - type: "code"
    language: "python"
    title: "특정 값 제외"
    description: "특정 값을 제외하고 처리합니다."
    content: |-
      vals = [10, 0, 20, 0, 30, 40]
      nonZero = 0
      for v in vals:
          if v == 0:
              continue
          nonZero = nonZero + v
      nonZero
  - type: "code"
    language: "python"
    title: "조건부 문자열"
    description: "조건을 만족하는 것만 결합합니다."
    content: |-
      terms = ['apple', 'a', 'banana', 'at', 'cherry']
      long = ''
      for term in terms:
          if len(term) <= 2:
              continue
          long = long + term + ' '
      long
  - type: "tip"
    content: "continue는 if-else 구조를 단순화할 때 유용합니다."

- id: "for_else"
  title: "for-else 절"
  subtitle: "정상 종료시 실행"
  blocks:
  - type: "text"
    content: "for문은 else 절을 가질 수 있습니다. 반복이 break 없이 정상적으로 완료되면 else 블록이 실행됩니다. break로 중단되면 else는 실행되지 않습니다."
  - type: "list"
    items:
    - "정상 종료시 else 실행"
    - "break시 else 건너뜀"
    - "완료 여부 판별"
    - "검색 성공/실패 처리"
  - type: "code"
    language: "python"
    title: "for-else 정상"
    description: "break 없이 정상 종료되면 else가 실행됩니다."
    content: |-
      arr1 = [1, 2, 3, 4, 5]
      for a in arr1:
          if a > 10:
              flag = 'found big'
              break
      else:
          flag = 'all small'
      flag
  - type: "code"
    language: "python"
    title: "for-else break"
    description: "break로 중단되면 else가 실행되지 않습니다."
    content: |-
      arr2 = [1, 2, 15, 4, 5]
      for b in arr2:
          if b > 10:
              msg = 'found'
              break
      else:
          msg = 'not found'
      msg
  - type: "code"
    language: "python"
    title: "검색 완료"
    description: "검색 성공 여부를 판별합니다."
    content: |-
      users = ['alice', 'bob', 'charlie']
      name = 'david'
      for user in users:
          if user == name:
              status = 'exists'
              break
      else:
          status = 'not exists'
      status
  - type: "tip"
    content: "for-else는 검색 작업에서 찾았는지 여부를 판별할 때 유용합니다."

- id: "while_else"
  title: "while-else 절"
  subtitle: "조건 거짓시 실행"
  blocks:
  - type: "text"
    content: "while문도 else 절을 가질 수 있습니다. 조건이 False가 되어 정상 종료되면 else가 실행됩니다. break로 중단되면 else는 실행되지 않습니다."
  - type: "list"
    items:
    - "조건 거짓시 else 실행"
    - "break시 else 건너뜀"
    - "정상 종료 여부 판별"
    - "for-else와 동일한 원리"
  - type: "code"
    language: "python"
    title: "while-else 정상"
    description: "조건이 거짓이 되면 else가 실행됩니다."
    content: |-
      counter = 0
      while counter < 3:
          counter = counter + 1
      else:
          completion = 'done'
      completion
  - type: "code"
    language: "python"
    title: "while-else break"
    description: "break로 중단되면 else가 실행되지 않습니다."
    content: |-
      x = 0
      while x < 10:
          x = x + 1
          if x == 5:
              outcome = 'stopped'
              break
      else:
          outcome = 'completed'
      outcome
  - type: "code"
    language: "python"
    title: "한도 초과 검사"
    description: "한도를 초과하면 중단합니다."
    content: |-
      amount = 0
      limit = 100
      while amount < 50:
          amount = amount + 15
          if amount > limit:
              check = 'over limit'
              break
      else:
          check = 'within limit'
      check
  - type: "tip"
    content: "while-else는 제한 조건 검사에 유용합니다."

- id: "nested_loop"
  title: "중첩 반복문"
  subtitle: "반복문 안의 반복문"
  blocks:
  - type: "text"
    content: "반복문 안에 다시 반복문을 넣을 수 있습니다. 이를 중첩 반복문이라고 하며, 2차원 구조나 모든 조합을 처리할 때 사용합니다. 들여쓰기 단계가 늘어납니다."
  - type: "list"
    items:
    - "반복문 안에 반복문"
    - "2차원 구조 처리"
    - "모든 조합 생성"
    - "들여쓰기 단계 증가"
  - type: "code"
    language: "python"
    title: "중첩 for"
    description: "두 리스트의 모든 조합을 만듭니다."
    content: |-
      colors = ['red', 'blue']
      sizes = ['S', 'M']
      combinations = ''
      for color in colors:
          for size in sizes:
              combinations = combinations + color + '-' + size + ' '
      combinations
  - type: "code"
    language: "python"
    title: "구구단 전체"
    description: "구구단 전체를 계산합니다."
    content: |-
      mult = 0
      for x in range(2, 4):
          for y in range(1, 4):
              mult = x * y
      mult
  - type: "code"
    language: "python"
    title: "좌표 생성"
    description: "격자 좌표를 생성합니다."
    content: |-
      coords = ''
      for r in range(2):
          for c in range(3):
              coords = coords + str(r) + ',' + str(c) + ' '
      coords
  - type: "tip"
    content: "중첩이 깊어지면 성능에 영향을 줄 수 있으니 주의하세요."

- id: "practice"
  title: "Day 14 종합 복습"
  subtitle: "반복문 마스터하기"
  blocks:
  - type: "text"
    content: "Day 14에서 배운 반복문을 난이도별로 복습합니다. 🟢 기본 미션부터 시작하여 🔴 심화 미션까지 도전해보세요. 각 미션은 독립적으로 실행 가능하므로 어떤 순서로 해도 괜찮습니다."

  - type: "expansion"
    title: "🟢 기본1: for 리스트"
    code: |-
      evens = [2, 4, 6, 8, 10]
      evenSum = 0
      for e in evens:
          evenSum = evenSum + e
      evenSum

  - type: "expansion"
    title: "🟢 기본2: range()"
    code: |-
      result = 0
      for k in range(1, 6):
          result = result + k
      result

  - type: "expansion"
    title: "🟢 기본3: while"
    code: |-
      loop = 0
      collected = 0
      while loop < 5:
          collected = collected + loop
          loop = loop + 1
      collected

  - type: "expansion"
    title: "🟢 기본4: break"
    code: |-
      arr = [1, 2, 3, 4, 5, 6]
      match = 0
      for d in arr:
          if d > 3:
              match = d
              break
      match

  - type: "expansion"
    title: "🟢 기본5: continue"
    code: |-
      even = 0
      for i in range(1, 11):
          if i % 2 == 1:
              continue
          even = even + i
      even

  - type: "expansion"
    title: "🟡 응용1: 딕셔너리 순회"
    code: |-
      stock = {'apple': 5, 'banana': 3, 'cherry': 8}
      qty = 0
      for amount in stock.values():
          qty = qty + amount
      qty

  - type: "expansion"
    title: "🟡 응용2: 문자열 필터"
    code: |-
      phrase = 'hello world'
      consonants = ''
      vowelSet = 'aeiou'
      for c in phrase:
          if c in vowelSet or c == ' ':
              continue
          consonants = consonants + c
      consonants

  - type: "expansion"
    title: "🟡 응용3: 조건부 누적"
    code: |-
      costs = [1000, 2000, 500, 3000, 1500]
      highCnt = 0
      for cost in costs:
          if cost >= 1500:
              highCnt = highCnt + 1
      highCnt

  - type: "expansion"
    title: "🟡 응용4: for-else 검색"
    code: |-
      goods = ['laptop', 'mouse', 'keyboard']
      seek = 'monitor'
      for good in goods:
          if good == seek:
              exists = True
              break
      else:
          exists = False
      exists

  - type: "expansion"
    title: "🟡 응용5: 중첩 반복"
    code: |-
      grid = [[1, 2], [3, 4], [5, 6]]
      gridSum = 0
      for line in grid:
          for cell in line:
              gridSum = gridSum + cell
      gridSum

  - type: "expansion"
    title: "🔴 심화1-1: 최대값 찾기"
    code: |-
      nums = [15, 42, 8, 23, 56, 31]
      maxVal = nums[0]
      for val in nums:
          if val > maxVal:
              maxVal = val
      maxVal

  - type: "expansion"
    title: "🔴 심화1-2: 최소값과 최대값"
    code: |-
      dataset = [15, 42, 8, 23, 56, 31]
      minVal = dataset[0]
      maxVal2 = dataset[0]
      for v in dataset:
          if v < minVal:
              minVal = v
          if v > maxVal2:
              maxVal2 = v
      minVal, maxVal2

  - type: "expansion"
    title: "🔴 심화2-1: 평균 계산"
    code: |-
      scores = [85, 90, 78, 92, 88]
      scoreSum = 0
      for s in scores:
          scoreSum = scoreSum + s
      avg = scoreSum / len(scores)
      avg

  - type: "expansion"
    title: "🔴 심화2-2: 평균 이상 개수"
    code: |-
      points = [85, 90, 78, 92, 88]
      pointSum = 0
      for p in points:
          pointSum = pointSum + p
      mean = pointSum / len(points)
      above = 0
      for p in points:
          if p >= mean:
              above = above + 1
      above

  - type: "expansion"
    title: "🔴 심화3-1: 소수 판별"
    code: |-
      num1 = 17
      isPrime = True
      if num1 < 2:
          isPrime = False
      else:
          for divisor in range(2, num1):
              if num1 % divisor == 0:
                  isPrime = False
                  break
      isPrime

  - type: "expansion"
    title: "🔴 심화3-2: 소수 목록"
    code: |-
      primeList = []
      for cand in range(2, 20):
          valid = True
          for div in range(2, cand):
              if cand % div == 0:
                  valid = False
                  break
          if valid:
              primeList.append(cand)
      primeList

  - type: "expansion"
    title: "🔴 심화4-1: 문자열 역순"
    code: |-
      src = 'python'
      rev1 = ''
      for char in src:
          rev1 = char + rev1
      rev1

  - type: "expansion"
    title: "🔴 심화4-2: 단어 역순"
    code: |-
      strs = ['hello', 'world', 'python']
      revList = []
      for s in strs:
          rev2 = ''
          for ch in s:
              rev2 = ch + rev2
          revList.append(rev2)
      revList

  - type: "expansion"
    title: "🔴 심화5-1: 패턴 생성"
    code: |-
      shape = ''
      for r in range(1, 4):
          for c in range(r):
              shape = shape + '*'
          shape = shape + '\n'
      shape

  - type: "expansion"
    title: "🔴 심화5-2: 곱셈표"
    code: |-
      table = []
      for m in range(1, 4):
          cols = []
          for p in range(1, 4):
              cols.append(m * p)
          table.append(cols)
      table
