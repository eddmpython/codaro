meta:
  id: scipy_01
  title: 확률분포탐색기
  order: 1
  category: scipy
  difficulty: "⭐"
  badge: 입문
  tags: ["scipy.stats", "정규분포", "균등분포", "확률밀도함수", "누적분포함수"]
  seo:
    title: "scipy.stats 확률분포 - 정규분포와 균등분포 시각화"
    description: "scipy.stats로 정규분포, 균등분포를 시각화하고 확률을 계산합니다. PDF, CDF, PPF 함수를 배웁니다."
    keywords: ["scipy", "stats", "정규분포", "확률분포", "PDF", "CDF"]

intro:
  emoji: "🎲"
  goal: 시험 점수 분포를 분석하여 합격률과 상위권 기준을 계산합니다.
  description: "학교에서 시험을 치르면 점수 분포가 어떻게 되는지 궁금할 때가 있습니다. 평균 70점, 표준편차 15점인 시험에서 60점 이상 합격률은 몇 %일까요? 상위 10%에 들려면 몇 점이 필요할까요? scipy.stats의 정규분포 함수로 이런 실제 문제를 해결합니다. 확률밀도함수(PDF), 누적분포함수(CDF), 분위수함수(PPF)의 개념과 사용법을 익히고, 시각화까지 완성합니다."

sections:
- id: load
  title: 라이브러리 로드
  subtitle: scipy.stats
  blocks:
  - type: text
    content: "scipy는 과학 계산을 위한 Python 라이브러리입니다. scipy.stats 모듈에는 80개 이상의 확률분포와 다양한 통계 함수가 포함되어 있습니다. 정규분포, 균등분포, 지수분포, 이항분포 등 통계학에서 사용하는 거의 모든 분포를 지원합니다. 이 프로젝트에서는 가장 기본적인 정규분포를 다루며, 실제 시험 점수 분석에 적용합니다."
  - type: code
    language: python
    title: 패키지 설치 및 import
    content: |-
      import micropip
      await micropip.install('scipy')

      import numpy as np
      from scipy import stats
      import matplotlib.pyplot as plt
  - type: tip
    content: "scipy 설치 시 약 15-25MB의 데이터를 다운로드합니다. 처음 한 번만 설치하면 세션 동안 유지됩니다. scipy.stats는 from scipy import stats로 불러오는 것이 일반적입니다."

- id: create_dist
  title: 정규분포 생성
  subtitle: stats.norm
  blocks:
  - type: text
    content: "정규분포(Normal Distribution)는 통계학에서 가장 중요한 분포입니다. 종 모양 곡선으로 유명하며, 자연현상의 많은 데이터가 이 분포를 따릅니다. 키, 몸무게, IQ, 시험 점수 등이 대표적입니다. scipy.stats.norm()으로 정규분포 객체를 생성하며, loc은 평균(중심 위치), scale은 표준편차(퍼짐 정도)를 의미합니다. 평균 70점, 표준편차 15점인 시험 점수 분포를 만들어봅니다."
  - type: code
    language: python
    title: 시험 점수 분포 생성
    content: |-
      scoreDist = stats.norm(loc=70, scale=15)
      scoreDist
  - type: tip
    content: "loc=0, scale=1인 정규분포를 표준정규분포라고 합니다. 모든 정규분포는 표준화를 통해 표준정규분포로 변환할 수 있습니다. Z = (X - μ) / σ 공식을 사용합니다."

- id: pdf_explore
  title: 확률밀도함수 탐색
  subtitle: PDF
  blocks:
  - type: text
    content: "확률밀도함수(Probability Density Function, PDF)는 각 값의 상대적 가능성을 나타냅니다. 주의할 점은 PDF 값 자체는 확률이 아닙니다. 연속분포에서 특정 점의 확률은 0입니다. PDF는 상대적 가능성을 보여주며, 구간의 면적이 실제 확률입니다. 정규분포에서는 평균 근처 값이 가장 높고, 평균에서 멀어질수록 PDF 값이 낮아집니다."
  - type: code
    language: python
    title: PDF 값 계산
    content: |-
      pdfAt70 = scoreDist.pdf(70)
      pdfAt85 = scoreDist.pdf(85)
      pdfAt70, pdfAt85
  - type: code
    language: python
    title: PDF 시각화
    content: |-
      xScore = np.linspace(20, 120, 200)
      pdfScore = scoreDist.pdf(xScore)

      figPdf, axPdf = plt.subplots(figsize=(10, 6))
      axPdf.plot(xScore, pdfScore, 'b-', linewidth=2)
      axPdf.fill_between(xScore, pdfScore, alpha=0.3)
      axPdf.axvline(x=70, color='red', linestyle='--', label='Mean (70)')
      axPdf.set_xlabel('Score')
      axPdf.set_ylabel('Probability Density')
      axPdf.set_title('Exam Score Distribution (μ=70, σ=15)')
      axPdf.legend()
      axPdf.grid(True, alpha=0.3)
      figPdf
  - type: tip
    content: "PDF 곡선 아래 전체 면적은 항상 1입니다. 이것이 확률의 기본 성질입니다. 특정 구간의 면적이 해당 구간에 값이 있을 확률입니다."

- id: cdf_explore
  title: 누적분포함수 탐색
  subtitle: CDF
  blocks:
  - type: text
    content: "누적분포함수(Cumulative Distribution Function, CDF)는 특정 값 이하일 확률을 나타냅니다. CDF(60) = 0.25라면 60점 이하일 확률이 25%라는 뜻입니다. 합격 기준이 60점이라면, 합격률은 1 - CDF(60)으로 계산합니다. CDF는 항상 0에서 시작해서 1로 끝나며, 단조 증가합니다. S자 형태의 곡선으로 나타납니다."
  - type: code
    language: python
    title: 합격률 계산
    content: |-
      probFail = scoreDist.cdf(60)
      probPass = 1 - probFail
      probFail, probPass
  - type: code
    language: python
    title: CDF 시각화
    content: |-
      cdfScore = scoreDist.cdf(xScore)

      figCdf, axCdf = plt.subplots(figsize=(10, 6))
      axCdf.plot(xScore, cdfScore, 'g-', linewidth=2)
      axCdf.axhline(y=probFail, color='red', linestyle='--', alpha=0.5)
      axCdf.axvline(x=60, color='red', linestyle='--', alpha=0.5, label=f'60점: {probFail:.1%} 불합격')
      axCdf.set_xlabel('Score')
      axCdf.set_ylabel('Cumulative Probability')
      axCdf.set_title('Exam Score CDF - Pass Rate Analysis')
      axCdf.legend()
      axCdf.grid(True, alpha=0.3)
      figCdf
  - type: tip
    content: "구간 확률을 계산하려면 CDF를 뺍니다. P(60 < X < 80) = CDF(80) - CDF(60)입니다. 이 방법으로 특정 점수 구간에 속할 확률을 구할 수 있습니다."

- id: ppf_explore
  title: 분위수함수 탐색
  subtitle: PPF
  blocks:
  - type: text
    content: "분위수함수(Percent Point Function, PPF)는 CDF의 역함수입니다. 확률을 입력하면 해당 분위수를 반환합니다. 상위 10%에 들려면 몇 점이 필요한지 알고 싶을 때 사용합니다. PPF(0.9)는 하위 90% 경계, 즉 상위 10% 경계를 의미합니다. 장학금 기준이나 등급 컷오프를 계산할 때 매우 유용합니다."
  - type: code
    language: python
    title: 상위권 기준 계산
    content: |-
      top10Cutoff = scoreDist.ppf(0.9)
      top5Cutoff = scoreDist.ppf(0.95)
      top1Cutoff = scoreDist.ppf(0.99)
      top10Cutoff, top5Cutoff, top1Cutoff
  - type: code
    language: python
    title: 등급 컷오프 시각화
    content: |-
      figPpf, axPpf = plt.subplots(figsize=(10, 6))
      axPpf.plot(xScore, pdfScore, 'b-', linewidth=2)
      axPpf.fill_between(xScore, pdfScore, where=(xScore >= top10Cutoff), alpha=0.4, color='gold', label=f'Top 10% (≥{top10Cutoff:.1f})')
      axPpf.axvline(x=top10Cutoff, color='orange', linestyle='--')
      axPpf.axvline(x=top5Cutoff, color='red', linestyle='--', label=f'Top 5% (≥{top5Cutoff:.1f})')
      axPpf.set_xlabel('Score')
      axPpf.set_ylabel('Probability Density')
      axPpf.set_title('Score Cutoffs for Top Students')
      axPpf.legend()
      axPpf.grid(True, alpha=0.3)
      figPpf
  - type: tip
    content: "통계에서 자주 보는 ±1.96은 표준정규분포의 PPF(0.025)와 PPF(0.975) 값입니다. 95% 신뢰구간의 기준이 되는 숫자입니다."

- id: result
  title: 종합 분석 결과
  subtitle: 시험 점수 리포트
  blocks:
  - type: text
    content: "지금까지 배운 PDF, CDF, PPF를 모두 활용하여 종합 분석 결과를 만듭니다. 실무에서는 이렇게 여러 통계량을 한 번에 계산하여 리포트를 작성합니다. 분포의 특성을 파악하고, 의사결정에 필요한 정보를 추출하는 것이 통계 분석의 목적입니다."
  - type: code
    language: python
    title: 분석 결과 정리
    content: |-
      import pandas as pd

      analysisResult = pd.DataFrame({
          'Metric': ['평균', '표준편차', '60점 이상 합격률', '상위 10% 컷오프', '상위 5% 컷오프', '상위 1% 컷오프'],
          'Value': ['70점', '15점', f'{probPass:.1%}', f'{top10Cutoff:.1f}점', f'{top5Cutoff:.1f}점', f'{top1Cutoff:.1f}점']
      })
      analysisResult
  - type: code
    language: python
    title: 최종 시각화
    content: |-
      figFinal, axFinal = plt.subplots(figsize=(12, 7))
      axFinal.plot(xScore, pdfScore, 'b-', linewidth=2, label='Score Distribution')
      axFinal.fill_between(xScore, pdfScore, where=(xScore >= 60), alpha=0.3, color='green', label=f'Pass (≥60): {probPass:.1%}')
      axFinal.fill_between(xScore, pdfScore, where=(xScore < 60), alpha=0.3, color='red', label=f'Fail (<60): {probFail:.1%}')
      axFinal.axvline(x=70, color='blue', linestyle='--', alpha=0.7, label='Mean (70)')
      axFinal.axvline(x=top10Cutoff, color='gold', linestyle='--', label=f'Top 10% ({top10Cutoff:.1f})')
      axFinal.set_xlabel('Score', fontsize=12)
      axFinal.set_ylabel('Probability Density', fontsize=12)
      axFinal.set_title('Complete Exam Score Analysis', fontsize=14)
      axFinal.legend(loc='upper right')
      axFinal.grid(True, alpha=0.3)
      figFinal

- id: practice
  title: 실습
  subtitle: 확률분포 활용 프로젝트
  blocks:
  - type: text
    content: "지금까지 배운 정규분포의 PDF, CDF, PPF를 활용하여 실제 문제를 해결합니다. 미션1은 고객 서비스 대기시간 분석으로 지수분포를 사용합니다. 미션2는 제품 품질 관리로 정규분포를 사용합니다. 두 미션 모두 분포 생성, 확률 계산, 시각화를 포함합니다."
  - type: tip
    content: "각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다."
  - type: expansion
    title: "미션1: 고객 대기시간 분석"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import numpy as np
        from scipy import stats
        import matplotlib.pyplot as plt
        import pandas as pd

        waitDist = stats.expon(scale=5)
        xWait = np.linspace(0, 30, 200)
    - type: code
      title: 확률 계산
      content: |-
        probUnder3 = waitDist.cdf(3)
        probOver10 = 1 - waitDist.cdf(10)
        medianWait = waitDist.ppf(0.5)

        waitStats = pd.DataFrame({
            'Metric': ['P(Wait < 3min)', 'P(Wait > 10min)', 'Median Wait'],
            'Value': [f'{probUnder3:.1%}', f'{probOver10:.1%}', f'{medianWait:.2f} min']
        })
        waitStats
    - type: code
      title: 시각화
      content: |-
        figWait, axWait = plt.subplots(figsize=(10, 6))
        axWait.plot(xWait, waitDist.pdf(xWait), 'b-', linewidth=2)
        axWait.fill_between(xWait, waitDist.pdf(xWait), where=(xWait <= 3), alpha=0.4, color='green', label=f'< 3min: {probUnder3:.1%}')
        axWait.axvline(x=medianWait, color='orange', linestyle='--', label=f'Median: {medianWait:.1f}min')
        axWait.set_xlabel('Wait Time (minutes)')
        axWait.set_ylabel('Probability Density')
        axWait.set_title('Customer Wait Time Analysis')
        axWait.legend()
        axWait.grid(True, alpha=0.3)
        figWait
  - type: expansion
    title: "미션2: 제품 품질 관리"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import numpy as np
        from scipy import stats
        import matplotlib.pyplot as plt
        import pandas as pd

        weightDist = stats.norm(loc=500, scale=5)
        xWeight = np.linspace(475, 525, 200)
    - type: code
      title: 불량률 계산
      content: |-
        lowerSpec = 490
        upperSpec = 510
        defectLow = weightDist.cdf(lowerSpec)
        defectHigh = 1 - weightDist.cdf(upperSpec)
        totalDefect = defectLow + defectHigh
        passRate = 1 - totalDefect

        qualityStats = pd.DataFrame({
            'Metric': ['Lower Defect (<490g)', 'Upper Defect (>510g)', 'Total Defect Rate', 'Pass Rate'],
            'Value': [f'{defectLow:.2%}', f'{defectHigh:.2%}', f'{totalDefect:.2%}', f'{passRate:.2%}']
        })
        qualityStats
    - type: code
      title: 시각화
      content: |-
        figQuality, axQuality = plt.subplots(figsize=(10, 6))
        pdfWeight = weightDist.pdf(xWeight)
        axQuality.plot(xWeight, pdfWeight, 'b-', linewidth=2)
        axQuality.fill_between(xWeight, pdfWeight, where=(xWeight >= lowerSpec) & (xWeight <= upperSpec), alpha=0.4, color='green', label=f'Pass: {passRate:.1%}')
        axQuality.fill_between(xWeight, pdfWeight, where=(xWeight < lowerSpec), alpha=0.4, color='red', label='Defect')
        axQuality.fill_between(xWeight, pdfWeight, where=(xWeight > upperSpec), alpha=0.4, color='red')
        axQuality.axvline(x=lowerSpec, color='red', linestyle='--')
        axQuality.axvline(x=upperSpec, color='red', linestyle='--')
        axQuality.set_xlabel('Weight (g)')
        axQuality.set_ylabel('Probability Density')
        axQuality.set_title('Product Quality Control (Spec: 490-510g)')
        axQuality.legend()
        axQuality.grid(True, alpha=0.3)
        figQuality
