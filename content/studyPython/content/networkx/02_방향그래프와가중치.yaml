    blocks:
    - type: code
      title: 물류 네트워크 생성
      content: |-
        import networkx as nx
        import matplotlib.pyplot as plt

        cost = nx.Graph()
        cost.add_edge("Factory", "Warehouse", cost=100, time=2)
        cost.add_edge("Warehouse", "Store1", cost=50, time=1)
        cost.add_edge("Warehouse", "Store2", cost=70, time=1.5)
        cost.add_edge("Factory", "Store1", cost=120, time=3)
        cost.edges(data=True)
    - type: code
      title: 총 비용 계산
      content: |-
        totalCost = sum(d['cost'] for u, v, d in cost.edges(data=True))
        totalTime = sum(d['time'] for u, v, d in cost.edges(data=True))
        totalCost, totalTime
    - type: code
      title: 물류 네트워크 시각화
      content: |-
        posCost = nx.spring_layout(cost, seed=42)
        figCost, axCost = plt.subplots(figsize=(8, 6))
        nx.draw(cost, pos=posCost, with_labels=True, node_color='lightblue',
                node_size=1200, font_size=10, ax=axCost)
        costLabels = {(u, v): f"${d['cost']}" for u, v, d in cost.edges(data=True)}
        nx.draw_networkx_edge_labels(cost, pos=posCost, edge_labels=costLabels,
