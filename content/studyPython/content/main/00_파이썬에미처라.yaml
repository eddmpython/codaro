meta:
  id: "main00"
  title: "파이썬에 미처라"
  order: 0
  category: "main"
  tags: ["파이썬", "입문", "소개"]

layout: "showcase"

intro:
  emoji: "🐍"
  title: "파이썬에 미처라"
  description: |
    파이썬은 정말 쉽고 재미있습니다!
    모든 문법을 미리 알고 시작할 필요는 없어요!
    크게 딱 5종류의 문법만 알아도 시작할 수 있습니다.

sections:
  - id: "introVideo"
    title: ""
    blocks:
      - type: video
        platform: youtube
        videoId: "NUXxaYEcL30"

  - id: "tiobeIndex"
    title: "프로그래밍 언어 순위"
    headerImage: "https://www.tiobe.com/wp-content/uploads/2021/11/logo-tiobe.svg"
    headerImageWidth: "120px"
    blocks:
      - type: tiobeIndex
        description: |
          TIOBE Index는 프로그래밍 언어의 현재 인기도를 나타내는 중요한 지표로, 매월 업데이트됩니다.
          평가는 전 세계 숙련된 엔지니어 수, 관련 교육 과정, 그리고 Google, Amazon, Wikipedia, Bing 등 20개 이상의 주요 웹사이트 검색량을 종합적으로 반영합니다.
          중요한 점은 TIOBE Index가 '최고의' 프로그래밍 언어나 '가장 많은 코드가 작성된' 언어를 의미하지 않는다는 것입니다.
          대신, 이 지표는 현재 개발 기술 트렌드를 파악하거나 새로운 소프트웨어 시스템 구축 시 어떤 언어를 채택할지 전략적인 결정을 내리는 데 유용하게 활용될 수 있습니다.

  - id: "whyPython"
    title: "파이썬이 사랑받는 이유"
    titleEmoji: "🌟"
    blocks:
      - type: featureCards
        cards:
          - emoji: "📚"
            title: "쉬운 학습"
            description: "영어와 비슷한 문법으로 프로그래밍 입문자도 쉽게 배울 수 있습니다."
            example: 'print("Hello, World!")'
          - emoji: "📦"
            title: "강력한 라이브러리"
            description: "웹 개발, 데이터 과학, AI 등 다양한 분야의 방대한 라이브러리를 제공합니다."
            example: "import pandas as pd"
          - emoji: "⚡"
            title: "높은 생산성"
            description: "간결한 문법과 빠른 개발 속도로 아이디어를 신속하게 구현할 수 있습니다."
            example: "numbers = [x*2 for x in range(5)]"
          - emoji: "🌐"
            title: "다양한 활용 분야"
            description: "웹, 데이터 분석, AI, 게임, 자동화 등 거의 모든 IT 분야에서 활용됩니다."
            example: "# 웹, AI, 데이터 분석 등 무한 가능성"
          - emoji: "🤝"
            title: "오픈소스 & 커뮤니티"
            description: "활발한 오픈소스 생태계와 커뮤니티 덕분에 문제 해결과 학습이 용이합니다."
            example: "# 함께 성장하는 파이썬 커뮤니티"
          - emoji: "📊"
            title: "데이터 분석 & 시각화"
            description: "Pandas, Matplotlib 등으로 복잡한 데이터를 손쉽게 분석하고 아름답게 시각화할 수 있습니다."
            example: "df.plot(kind='line')"
          - emoji: "🤖"
            title: "AI & 머신러닝 표준"
            description: "TensorFlow, PyTorch 등 강력한 라이브러리로 AI 및 머신러닝 개발을 선도합니다."
            example: "from sklearn.svm import SVC"

  - id: "whoUses"
    title: "어디서 쓰이고 있을까?"
    titleEmoji: "🏢"
    blocks:
      - type: featureCards
        cards:
          - emoji: "🔍"
            title: "Google"
            description: "YouTube, 검색 엔진, TensorFlow 등 핵심 서비스에 파이썬을 활용합니다."
          - emoji: "📦"
            title: "Amazon"
            description: "AWS Lambda, 추천 시스템, 물류 자동화 등에서 파이썬이 핵심 역할을 합니다."
          - emoji: "🎬"
            title: "Netflix"
            description: "추천 알고리즘, 콘텐츠 분석, CDN 최적화에 파이썬을 사용합니다."
          - emoji: "📸"
            title: "Instagram"
            description: "세계 최대 Django(파이썬 웹 프레임워크) 기반 서비스 중 하나입니다."
          - emoji: "🚀"
            title: "SpaceX"
            description: "로켓 발사 시뮬레이션과 데이터 분석에 파이썬을 활용합니다."
          - emoji: "🏦"
            title: "금융권"
            description: "JP Morgan, Goldman Sachs 등 주요 금융사에서 트레이딩 시스템과 리스크 분석에 사용합니다."

  - id: "modernTech"
    title: "현대판 파이썬 기술들"
    titleEmoji: "🧠"
    blocks:
      - type: videoCarousel
        videos:
          - type: youtube
            youtube: "T3yO0e2XQc0"
            title: "manim"
            subtitle: "Python 코드로 수학적 개념과 알고리즘을 설명하는 정교한 애니메이션을 제작하는 라이브러리"
            description: |
              Manim (Mathematical Animation Engine)은 Python을 사용하여 수학적 개념, 공식, 알고리즘 등을 설명하기 위한 고품질 애니메이션을 프로그래밍 방식으로 생성하는 강력한 오픈소스 라이브러리입니다.
              원래 3Blue1Brown YouTube 채널의 Grant Sanderson에 의해 개발되었으며, 현재는 커뮤니티 주도로 활발하게 발전하고 있습니다 (Manim Community Edition).
              Manim을 사용하면 복잡한 수학적 아이디어를 명확하고 아름다운 시각 자료로 변환하여 교육 콘텐츠나 프레젠테이션 자료를 효과적으로 만들 수 있습니다.
            url: "https://www.manim.community/"
          - type: youtube
            youtube: "L2Ya9PYNns8"
            title: "browser-use"
            subtitle: "AI가 웹 브라우저를 제어하여 온라인 작업을 자동화하는 Python 라이브러리 (Playwright 기반)"
            description: |
              Browser-use는 AI 에이전트가 웹 브라우저를 프로그래밍 방식으로 제어하여 다양한 온라인 작업을 자동화하도록 설계된 강력한 Python 라이브러리입니다.
              사용자는 자연어 작업 지시를 통해 AI 에이전트를 구동시킬 수 있으며, 이 에이전트는 Playwright를 기반으로 브라우저와 상호작용합니다.
              Browser-use는 OpenAI, Anthropic, Google, DeepSeek등 주요 LLM 공급자를 지원합니다.
            url: "https://github.com/browser-use/browser-use"
          - type: youtube
            youtube: "CY1EiYsXLK4"
            title: "marimo"
            subtitle: "Python을 위한 차세대 반응형 노트북으로, Jupyter 노트북의 단점을 개선하고 현대적인 웹 기술을 활용합니다."
            description: |
              marimo는 Python을 위한 오픈소스 반응형 노트북입니다.
              기존 Jupyter 노트북의 실행 순서에 따른 상태 불일치 문제(out-of-order execution)와 숨겨진 상태(hidden state) 문제를 해결하는 데 중점을 두고 개발되었습니다.
              노트북의 각 셀은 파일로 저장되며, 애플리케이션처럼 실행될 수 있습니다.
            url: "https://marimo.io/"
          - type: youtube
            youtube: "amCCEbJ39W8"
            title: "xlwings Lite"
            subtitle: "Excel 내부에서 WebAssembly(Wasm)를 통해 Python 코드를 실행하여 Excel 작업을 자동화하는 혁신적인 기술"
            description: |
              xlwings Lite는 Microsoft Excel 내에서 직접 Python 코드를 실행하여 스프레드시트 작업을 자동화할 수 있게 해주는 혁신적인 기술입니다.
              이는 Excel의 Office Scripts (JavaScript 기반)와 유사하게 작동하지만, WebAssembly (Wasm)를 통해 Python을 Excel 내부에서 실행할 수 있도록 지원합니다.
            url: "https://lite.xlwings.org/"
          - type: youtube
            youtube: "hSPmj7mK6ng"
            title: "dash"
            subtitle: "순수 Python으로 반응형 웹 기반 데이터 시각화 대시보드를 구축하는 분석 앱 프레임워크"
            description: |
              Dash는 Plotly에서 개발한 Python 기반 오픈소스 프레임워크로, 데이터 과학자와 분석가가 순수 Python만으로 정교한 웹 기반 분석 애플리케이션 및 대시보드를 구축할 수 있도록 지원합니다.
              HTML, CSS 또는 JavaScript에 대한 깊은 지식 없이도 인터랙티브한 사용자 인터페이스와 강력한 데이터 시각화를 구현할 수 있는 것이 큰 장점입니다.
            url: "https://dash.plotly.com/"
          - type: youtube
            youtube: "kh61wEy9GYM"
            title: "pandasAI"
            subtitle: "자연어 질문으로 Pandas 데이터프레임과 상호작용하여 데이터 분석 및 시각화를 수행하는 AI 기반 라이브러리"
            description: |
              PandasAI는 인기 있는 데이터 조작 라이브러리인 Pandas에 생성형 AI (Generative AI)의 강력한 기능을 통합한 Python 라이브러리입니다.
              사용자는 복잡한 Pandas 코드를 직접 작성하는 대신, 자연어 질문을 통해 데이터프레임에 대한 질의, 데이터 정제, 특징 공학, 데이터 시각화 등 다양한 분석 작업을 수행할 수 있습니다.
            url: "https://pandas-ai.com/"
          - type: youtube
            youtube: "8ThvEe9Ym5c"
            title: "nicegui"
            subtitle: "Python으로 웹 UI와 애플리케이션을 쉽고 빠르게 개발할 수 있는 사용자 친화적인 프레임워크"
            description: |
              NiceGUI는 Python 개발자들이 웹 개발 경험이 많지 않더라도 간편하게 웹 기반 사용자 인터페이스(UI)를 구축할 수 있도록 설계된 오픈소스 프레임워크입니다.
              HTML, CSS, JavaScript에 대한 깊은 지식 없이도 Python 코드만으로 버튼, 슬라이더, 차트, 테이블 등 다양한 UI 요소를 생성하고 상호작용을 정의할 수 있습니다.
            url: "https://nicegui.io/"

  - id: "pythonVsOthers"
    title: "파이썬 vs 다른 언어"
    titleEmoji: "⚔️"
    blocks:
      - type: compare
        leftTitle: "다른 프로그래밍 언어"
        rightTitle: "파이썬"
        leftIcon: "❌"
        rightIcon: "✅"
        leftItems:
          - "복잡한 문법과 세미콜론, 중괄호"
          - "변수 선언 시 타입을 명시해야 함"
          - "간단한 프로그램도 코드가 길어짐"
          - "컴파일 과정이 필요한 경우가 많음"
          - "환경 설정이 복잡함"
        rightItems:
          - "영어처럼 읽히는 깔끔한 문법"
          - "타입을 자동으로 추론해줌"
          - "같은 기능을 절반의 코드로 구현"
          - "작성 즉시 실행 가능"
          - "pip install 한 줄이면 라이브러리 설치 완료"

      - type: code
        language: "python"
        title: "Hello World 비교"
        code: |
          # Python - 1줄이면 충분!
          print("Hello, World!")

          # Java - 5줄 필요...
          # public class Main {
          #     public static void main(String[] args) {
          #         System.out.println("Hello, World!");
          #     }
          # }

  - id: "isItEasy"
    title: "정말로 쉽다고?"
    titleEmoji: "🤔"
    blocks:
      - type: text
        content: "파이썬은 정말 쉽고 재미있습니다! 모든 문법을 미리 알고 시작할 필요는 없어요! 크게 딱 5종류의 문법만 알아도 시작할 수 있습니다."
        align: center
        size: "20px"

      - type: video
        platform: youtube
        videoId: "priwCYZJ8h4"

  - id: "whatCanYouBuild"
    title: "파이썬으로 뭘 만들 수 있을까?"
    titleEmoji: "🛠️"
    blocks:
      - type: featureCards
        cards:
          - emoji: "🌐"
            title: "웹사이트 & API"
            description: "Django, Flask, FastAPI로 웹 서비스를 만들 수 있어요. Instagram, Pinterest도 파이썬으로 만들었습니다!"
          - emoji: "📊"
            title: "데이터 분석"
            description: "엑셀보다 강력한 Pandas로 수만 건의 데이터를 순식간에 분석하고 시각화할 수 있어요."
          - emoji: "🤖"
            title: "AI & 챗봇"
            description: "ChatGPT 같은 AI를 활용한 프로그램을 만들 수 있어요. 나만의 AI 비서도 가능!"
          - emoji: "🕹️"
            title: "게임"
            description: "Pygame으로 간단한 게임부터 복잡한 게임까지 만들 수 있어요."
          - emoji: "📱"
            title: "자동화 스크립트"
            description: "반복적인 작업을 자동화해요. 파일 정리, 이메일 발송, 웹 크롤링 등 귀찮은 일을 대신해줍니다."
          - emoji: "🔬"
            title: "과학 연구"
            description: "NASA, CERN 등에서도 데이터 분석과 시뮬레이션에 파이썬을 사용합니다."

  - id: "zenOfPython"
    title: "실제로 해보면 더 쉽습니다!!!!"
    titleEmoji: "🚀"
    blocks:
      - type: sectionTitle
        emoji: "🐍"
        title: "파이썬 철학 (The Zen of Python)"

      - type: threeColumnCards
        cards:
          - title: "The Zen of Python이란?"
            content: "파이썬 개발자들이 따르는 19가지 핵심 원칙입니다."
            points:
              - '"명시적인 것이 암시적인 것보다 낫다"'
              - '"단순한 것이 복잡한 것보다 낫다"'
              - '"가독성이 중요하다"'
              - '"아름다운 것이 추한 것보다 낫다"'
              - '"복잡한 것이 난해한 것보다 낫다"'
          - title: "실제 코드 예시"
            content: "파이썬 철학이 코드에 어떻게 반영되는지 확인해보세요."
            code: |
              numbers = [1, 2, 3, 4, 5]
              squares = [x**2 for x in numbers]
              print(squares)
            footer:
              icon: "code"
              text: "간결하면서도 명확한 파이썬 스타일"
          - title: "파이썬의 핵심 철학을 직접 확인해보세요!"
            content: "아래 코드 에디터는 Marimo라는 노트북입니다. PC와 Web에서 동작하는 대화형 코드 에디터라고 하는데요! 실제로 이 에디터에 import this 라고 입력하고 실행해보세요."
            footer:
              icon: "keyboard"
              text: "실행 방법: Ctrl + Enter 또는 Shift + Enter"

      - type: video
        url: "study/importThis.mp4"

      - type: marimoIDE

  - id: "getStarted"
    title: "지금 바로 시작하세요!"
    titleEmoji: "🎯"
    blocks:
      - type: stepCard
        steps:
          - emoji: "⚡"
            title: "10분 완성 코스"
            description: "print, 변수, 자료형, 조건문, 반복문, 함수 — 핵심 6가지만 빠르게!"
          - emoji: "🐍"
            title: "파이썬 철학 익히기"
            description: "The Zen of Python으로 파이썬다운 코드 작성법을 배워보세요."
          - emoji: "🧪"
            title: "마리모로 실습하기"
            description: "설치 없이 브라우저에서 바로 코드를 실행하고 결과를 확인하세요!"

      - type: tipCard
        icon: "rocket"
        title: "시작이 반이다!"
        content: "완벽하게 알고 시작하는 사람은 없어요. 일단 print('Hello!')를 치는 순간, 당신은 이미 프로그래머입니다. 위의 마리모 에디터에서 직접 시작해보세요!"

  - id: "resources"
    title: "유용한 파이썬 학습 자료"
    titleEmoji: "🔖"
    blocks:
      - type: resourceCards
        cards:
          - icon: "code"
            title: "30-Days-Of-Python"
            subtitle: "30일 파이썬 완성 챌린지"
            description: "단계별 가이드로 30일 동안 파이썬 프로그래밍 언어를 완전히 마스터하는 체계적인 학습 과정입니다."
            url: "https://github.com/Asabeneh/30-Days-Of-Python"
            stats:
              - icon: "star"
