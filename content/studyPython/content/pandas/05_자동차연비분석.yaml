meta:
  id: pandas_05
  title: 자동차연비분석
  order: 5
  category: pandas
  difficulty: "⭐⭐⭐⭐"
  badge: 기초
  dataUrl: https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv
  tags: ["mpg", "sort", "pivot_table", "nlargest"]
  seo:
    title: "pandas 정렬과 피벗테이블 - 자동차 연비 TOP 10 분석"
    description: "자동차 연비 데이터로 정렬(sort_values), TOP N(nlargest), 피벗테이블(pivot_table)을 배웁니다. 연도별 연비 추이 분석."
    keywords: ["pandas sort_values", "nlargest", "pivot_table", "피벗테이블", "mpg 데이터"]

intro:
  emoji: "🚗"
  goal: 자동차 연비 데이터에서 "연비 TOP 10"과 "연도별 연비 추이"를 분석합니다.
  description: 기초 과정 마무리! 정렬과 피벗테이블을 배웁니다. TOP N을 뽑거나, 행과 열을 기준으로 요약합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 자동차 연비 데이터
  blocks:
  - type: text
    content: 자동차 연비 데이터셋은 1970년대~1980년대 미국, 일본, 유럽에서 생산된 자동차 398대의 연비와 성능 정보를 담고 있습니다. mpg(miles per gallon, 갤런당 마일)는 연비를 나타내며, 숫자가 클수록 연비가 좋습니다. cylinders(실린더 수), displacement(배기량), horsepower(마력), weight(무게), acceleration(가속력), model_year(연식), origin(제조국) 등 9개의 컬럼이 있습니다. 이 데이터로 정렬(sort), TOP N 추출(nlargest), 피벗테이블(pivot_table) 등 pandas의 핵심 분석 기법을 배웁니다. 기초 과정의 마지막 프로젝트입니다!
  - type: code
    language: python
    title: 데이터 불러오기
    description: 자동차 연비 데이터
    content: |-
      import pandas as pd

      url = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
      mpg = pd.read_csv(url)
      mpg.shape

- id: step2_head
  title: 2단계. 미리보기
  subtitle: 데이터 구조 파악
  blocks:
  - type: text
    content: head()로 데이터의 구조를 파악합니다. 각 행은 하나의 자동차 모델을 나타내며, name 컬럼에는 제조사와 모델명이 포함되어 있습니다. cylinders는 엔진의 실린더 개수(4, 6, 8기통 등)로, 일반적으로 숫자가 클수록 출력은 높지만 연비는 낮습니다. horsepower는 엔진 출력을 나타내고, weight는 차량 무게로 연비에 큰 영향을 미칩니다. model_year는 70~82로 표시되며 1970~1982년을 의미합니다.
  - type: code
    language: python
    title: 미리보기
    description: 데이터가 어떻게 생겼는지
    content: |-
      mpg.head()

- id: step3_value_counts
  title: 3단계. 제조국별 개수
  subtitle: value_counts로 확인
  blocks:
  - type: text
    content: usa, japan, europe 3개 제조국이 있습니다.
  - type: code
    language: python
    title: 제조국별 개수
    description: 복습 - value_counts
    content: |-
      mpg['origin'].value_counts()

- id: step4_sort_asc
  title: 4단계. 오름차순 정렬
  subtitle: sort_values()
  blocks:
  - type: text
    content: sort_values() 메서드는 DataFrame을 특정 컬럼 기준으로 정렬합니다. 기본값은 오름차순(ascending order)으로, 작은 값부터 큰 값 순서로 정렬됩니다. 데이터의 순서를 바꾸면 최소값, 최대값, 상위/하위 데이터를 쉽게 찾을 수 있습니다. 정렬은 데이터 분석에서 매우 자주 사용되는 기본 기능입니다.
  - type: code
    language: python
    title: 연비 오름차순
    description: 연비 낮은 순
    content: |-
      mpg.sort_values('mpg').head()

  - type: tip
    content: "sort_values()는 원본을 변경하지 않고 정렬된 새 DataFrame을 반환합니다. 원본을 직접 변경하려면 inplace=True 파라미터를 추가하면 되지만, marimo 환경에서는 변수 재할당 문제가 발생할 수 있으므로 권장하지 않습니다."

- id: step5_sort_desc
  title: 5단계. 내림차순 정렬
  subtitle: ascending=False
  blocks:
  - type: text
    content: ascending=False를 추가하면 내림차순(큰 값부터)입니다.
  - type: code
    language: python
    title: 연비 내림차순
    description: 연비 높은 순
    content: |-
      mpg.sort_values('mpg', ascending=False).head()

- id: step6_nlargest
  title: 6단계. TOP N 뽑기
  subtitle: nlargest()
  blocks:
  - type: text
    content: nlargest(N, '컬럼') 메서드는 지정한 컬럼 기준으로 가장 큰 값 N개를 바로 뽑아줍니다. sort_values(..., ascending=False).head(N)과 같은 결과지만 훨씬 간결하고 의미가 명확합니다. TOP 10, TOP 100 같은 순위 분석에 매우 유용합니다.
  - type: code
    language: python
    title: 연비 TOP 10
    description: 연비 상위 10개
    content: |-
      mpg.nlargest(10, 'mpg')[['name', 'mpg', 'origin', 'model_year']]

  - type: tip
    content: "nlargest()와 반대로 nsmallest()는 가장 작은 값 N개를 뽑습니다. 예를 들어 mpg.nsmallest(10, 'mpg')는 연비가 가장 낮은 10대를 보여줍니다."

- id: step7_nsmallest
  title: 7단계. 하위 N개
  subtitle: nsmallest()
  blocks:
  - type: text
    content: nsmallest()는 하위 N개를 뽑습니다.
  - type: code
    language: python
    title: 가장 가벼운 차 5대
    description: 하위 5개
    content: |-
      mpg.nsmallest(5, 'weight')[['name', 'weight', 'mpg']]

- id: step7_5_assign_grade
  title: 7.5단계. 연비 등급 추가
  subtitle: assign + apply 복습
  blocks:
  - type: text
    content: 이전에 배운 assign()과 apply()를 복습합니다. 연비(mpg)를 기준으로 A(30 이상), B(20~30), C(20 미만) 등급을 분류하는 새로운 컬럼을 추가합니다. assign()으로 새 컬럼을 만들고, apply()로 각 값에 함수를 적용합니다. 이렇게 파생 변수를 만들면 데이터를 더 쉽게 분석할 수 있습니다.
  - type: code
    language: python
    title: 연비 등급 추가
    description: assign과 apply 활용
    content: |-
      graded = mpg.assign(
          efficiencyGrade=mpg['mpg'].apply(
              lambda x: 'A' if x >= 30 else ('B' if x >= 20 else 'C')
          )
      )
      graded[['name', 'mpg', 'efficiencyGrade']].head(10)
  - type: tip
    content: "assign()은 새 컬럼을 추가하고, apply()는 각 값에 함수를 적용합니다. lambda x: 조건문은 if-else를 한 줄로 작성하는 방법입니다. 이전 프로젝트(04번)에서 배운 개념을 여기서 다시 활용하고 있습니다."

- id: step8_groupby_year
  title: 8단계. 연도별 평균 연비
  subtitle: 시간에 따른 변화
  blocks:
  - type: text
    content: 연도(model_year)별로 그룹핑하면 시간에 따른 변화를 볼 수 있습니다.
  - type: code
    language: python
    title: 연도별 평균 연비
    description: 시간에 따른 변화
    content: |-
      mpg.groupby('model_year')['mpg'].mean()

- id: step9_groupby_origin
  title: 9단계. 제조국별 평균 연비
  subtitle: 국가 비교
  blocks:
  - type: text
    content: 일본차가 평균 30 mpg로 가장 높고, 미국차가 20 mpg로 가장 낮습니다.
  - type: code
    language: python
    title: 제조국별 평균 연비
    description: 국가 비교
    content: |-
      mpg.groupby('origin')['mpg'].mean()

- id: step10_pivot
  title: 10단계. 피벗테이블 기본
  subtitle: 행과 열로 요약
  blocks:
  - type: text
    content: pivot_table은 엑셀의 피벗테이블과 동일한 기능으로, pandas에서 가장 강력한 데이터 요약 도구 중 하나입니다. groupby가 1차원 그룹핑이라면, pivot_table은 2차원 교차 분석표를 만듭니다. index는 행 기준, columns는 열 기준, values는 계산할 값, aggfunc는 집계 함수를 지정합니다. 예를 들어 "제조국별로(행) 실린더별로(열) 평균 연비를 보고 싶다"는 요구사항을 한 줄로 해결할 수 있습니다. 결과는 제조국 3개 × 실린더 종류 수만큼의 2차원 표가 됩니다. 복잡한 다차원 데이터를 직관적인 크로스탭으로 변환할 때 필수적입니다.
  - type: code
    language: python
    title: 제조국 × 실린더
    description: 행=제조국, 열=실린더
    content: |-
      mpg.pivot_table(values='mpg', index='origin', columns='cylinders', aggfunc='mean')

  - type: tip
    content: "pivot_table의 4가지 핵심 파라미터: values(계산할 컬럼), index(행 기준), columns(열 기준), aggfunc(집계 함수). index와 columns는 리스트로 여러 개 지정 가능하며, 결과에서 NaN은 해당 조합이 없음을 의미합니다."

  - type: tip
    content: "pivot_table의 aggfunc는 'mean' 외에도 'sum', 'count', 'min', 'max', 'median', 'std' 등을 사용할 수 있습니다. 리스트로 여러 함수를 지정할 수도 있습니다. aggfunc=['mean', 'count']처럼요."

- id: step11_pivot_year
  title: 11단계. 연도 × 제조국
  subtitle: 시간 + 국가 비교
  blocks:
  - type: text
    content: pivot_table의 행과 열을 바꾸면 다른 관점의 분석이 가능합니다. 이번에는 연도를 행으로, 제조국을 열로 설정해서 시간의 흐름에 따른 국가별 연비 변화를 추적합니다. 1970년대 오일쇼크 이후 연비 향상 노력이 실제로 데이터에 반영되어 있는지 확인할 수 있습니다. 각 셀의 값은 해당 연도, 해당 국가에서 생산된 차량들의 평균 연비입니다. 이처럼 pivot_table은 시계열 비교에도 매우 유용합니다.
  - type: code
    language: python
    title: 연도 × 제조국
    description: 시간 + 국가 비교
    content: |-
      mpg.pivot_table(values='mpg', index='model_year', columns='origin', aggfunc='mean')

  - type: tip
    content: "pivot_table 결과의 NaN 처리: fill_value=0 파라미터를 추가하면 NaN을 0으로 채울 수 있습니다. margins=True를 추가하면 행과 열의 합계(All)가 자동으로 계산됩니다."

- id: step12_filter_groupby
  title: 12단계. 80년대 제조국별 연비
  subtitle: 필터링 + 그룹핑
  blocks:
  - type: text
    content: 필터링과 그룹핑을 조합하면 특정 조건의 데이터만 선택해서 그룹별 통계를 구할 수 있습니다. 80년대(model_year >= 80) 차량만 필터링한 후, 제조국별로 평균 연비를 계산합니다. 이렇게 시대별, 세그먼트별 비교가 가능합니다. 80년대에는 일본차의 연비 우위가 더욱 두드러졌는지, 미국과 유럽은 어떻게 변했는지 확인할 수 있습니다. 메서드 체이닝을 통해 여러 분석 단계를 자연스럽게 연결할 수 있습니다.
  - type: code
    language: python
    title: 80년대 제조국별 연비
    description: 필터링 + 그룹핑
    content: |-
      mpg[mpg['model_year'] >= 80].groupby('origin')['mpg'].mean()

  - type: tip
    content: "메서드 체이닝 순서 주의: 필터링 → groupby → 집계 순서를 지켜야 합니다. 순서를 바꾸면 에러가 발생하거나 의도한 결과를 얻을 수 없습니다. query()를 사용하면 더 깔끔합니다: mpg.query('model_year >= 80').groupby('origin')['mpg'].mean()"

- id: step13_complex
  title: 13단계. 6기통 이상 연비 TOP 5
  subtitle: 필터링 + 정렬
  blocks:
  - type: text
    content: 복잡한 분석 요구사항을 여러 메서드를 조합해서 해결하는 실전 예제입니다. "6기통 이상의 큰 엔진을 가진 차량 중에서도 연비가 좋은 차는 무엇인가?"라는 질문에 답합니다. 먼저 cylinders >= 6으로 필터링해서 6기통, 8기통 차량만 선택하고, nlargest(5, 'mpg')로 그 중 연비 상위 5대를 뽑습니다. 마지막으로 [['name', 'mpg', 'cylinders']]로 필요한 컬럼만 선택합니다. 이처럼 pandas의 여러 기능을 체인으로 연결하면 복잡한 조건도 한 줄로 처리할 수 있습니다.
  - type: code
    language: python
    title: 6기통 이상 연비 TOP 5
    description: 필터링 + 정렬
    content: |-
      mpg[mpg['cylinders'] >= 6].nlargest(5, 'mpg')[['name', 'mpg', 'cylinders']]

  - type: tip
    content: "복잡한 체이닝은 가독성을 위해 줄바꿈할 수 있습니다. mpg[mpg['cylinders'] >= 6]\n    .nlargest(5, 'mpg')\n    .[ ['name', 'mpg']]처럼 작성하면 각 단계가 명확해집니다. 또는 괄호로 감싸면 됩니다."

- id: practice
  title: 실습
  subtitle: 자동차 연비 분석 프로젝트
  blocks:
  - type: text
    content: 배운 모든 내용을 활용해서 분석해봅시다.
  - type: tip
    content: "각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다."
  - type: expansion
    title: "미션1: TOP N 분석 + 그룹별 agg"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv")
    - type: code
      title: "분석 수행"
      content: |-
        topHorsepower = data.nlargest(10, 'horsepower')[['name', 'horsepower', 'mpg', 'origin']]
        cylStats = data.groupby('cylinders').agg({
            'horsepower': 'mean',
            'mpg': 'mean'
        })
        (topHorsepower, cylStats)
  - type: expansion
    title: "미션2: 피벗테이블 + 복합 정렬"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        df = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv")
    - type: code
      title: "분석 수행"
      content: |-
        pivotTable = df.pivot_table(values='mpg', index='model_year', columns='origin', aggfunc='mean')
        lightCars = df.nsmallest(5, 'weight').sort_values('mpg', ascending=False)[['name', 'weight', 'mpg']]
        (pivotTable, lightCars)

- id: summary
  title: 정리
  subtitle: 기초 과정 완료!
  blocks:
  - type: text
    content: pandas 기초 과정(01~05)을 모두 완료했습니다! 데이터 불러오기부터 필터링, 그룹핑, 결측치 처리, 정렬, 피벗테이블까지 실무에서 가장 많이 사용하는 핵심 기능들을 익혔습니다. 이제 여러분은 실제 데이터를 pandas로 분석할 수 있는 기본기를 갖추었습니다.
  - type: list
    items:
    - "df.sort_values('컬럼', ascending=False) - 정렬 (오름차순/내림차순)"
    - "df.nlargest(N, '컬럼') - 상위 N개 (TOP N)"
    - "df.nsmallest(N, '컬럼') - 하위 N개 (BOTTOM N)"
    - "df.pivot_table(values, index, columns, aggfunc) - 피벗테이블 (2차원 교차 분석)"
    - "df.groupby('컬럼').mean() - 그룹별 집계 (1차원 그룹핑)"
    - "메서드 체이닝 - 필터링.그룹핑.집계를 한 줄로"
  - type: text
    content: 다음 시간부터는 중급 과정입니다. 시계열 분석, 문자열 처리, 데이터 병합 등 더 고급 기술을 배웁니다.
