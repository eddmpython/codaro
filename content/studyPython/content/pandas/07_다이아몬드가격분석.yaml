meta:
  id: pandas_07
  title: 다이아몬드가격분석
  order: 7
  category: pandas
  difficulty: "⭐⭐⭐⭐"
  badge: 중급
  dataUrl: https://raw.githubusercontent.com/mwaskom/seaborn-data/master/diamonds.csv
  tags: ["diamonds", "대용량", "category", "corr", "상관분석"]
  seo:
    title: "pandas 대용량 데이터 분석 - 5만 행 다이아몬드 데이터"
    description: "5만 행 다이아몬드 데이터로 대용량 처리를 배웁니다. 메모리 확인, 범주형 데이터, 상관관계 분석, 조건별 가격 비교를 실습합니다."
    keywords: ["pandas 대용량", "category dtype", "corr", "상관분석", "diamonds 데이터"]

intro:
  emoji: "💎"
  goal: 5만 개 다이아몬드 데이터에서 "가격을 결정하는 요인"을 분석합니다.
  description: 5만 행이 넘는 대용량 데이터를 다룹니다. 메모리 관리, 범주형 데이터 처리, 상관관계 분석을 배웁니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 53,940개 다이아몬드
  blocks:
  - type: text
    content: 이번에는 53,940개의 행을 가진 대용량 데이터를 다룹니다. 지금까지 다룬 데이터는 수백 행 정도였지만, 실무에서는 수만~수백만 행의 데이터를 다루는 경우가 많습니다. 데이터가 커지면 메모리 사용량, 처리 속도, 데이터 타입 최적화 등을 고려해야 합니다. 다이아몬드 데이터는 각 다이아몬드의 가격(price), 캐럿(carat), 컷(cut), 색상(color), 투명도(clarity) 등 10개의 속성 정보를 담고 있습니다. shape로 확인하면 (53940, 10)으로 5만 개가 넘는 행과 10개의 컬럼을 확인할 수 있습니다. 이 정도 규모부터는 데이터를 효율적으로 다루는 기술이 필요합니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: 53,940개 다이아몬드 정보입니다
    content: |-
      import pandas as pd

      url = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/diamonds.csv"
      diamonds = pd.read_csv(url)
      diamonds.shape

  - type: tip
    content: "대용량 데이터를 다룰 때는 처음부터 전체를 로드하지 말고 nrows 파라미터로 일부만 먼저 확인하는 것이 좋습니다. pd.read_csv(url, nrows=1000)처럼 사용하면 처음 1000행만 불러와서 데이터 구조를 파악할 수 있습니다. 또한 usecols로 필요한 컬럼만 선택하면 메모리를 절약할 수 있습니다."

- id: step2_sample
  title: 2단계. 샘플 확인
  subtitle: sample()로 랜덤 샘플
  blocks:
  - type: text
    content: 대용량 데이터를 다룰 때 head()의 한계가 드러납니다. head()는 항상 처음 몇 개 행만 보여주기 때문에 데이터가 정렬되어 있거나 특정 패턴으로 저장되어 있으면 전체 특성을 파악하기 어렵습니다. sample() 메서드는 무작위로 n개의 행을 선택하여 데이터 전체에 걸친 샘플을 보여줍니다. 5만 개 데이터에서 5개를 랜덤하게 추출하면 처음, 중간, 끝 구간에서 골고루 데이터를 볼 수 있어 전체 분포를 더 잘 파악할 수 있습니다. 머신러닝에서 학습/테스트 데이터를 나눌 때도 이 원리를 사용합니다.
  - type: code
    language: python
    title: 샘플 확인
    description: 대용량일 때는 sample()로 랜덤 샘플을 봅니다
    content: |-
      diamonds.sample(5)

  - type: tip
    content: "sample(n)은 무작위로 n개 행을 선택합니다. random_state=42처럼 시드를 고정하면 실행할 때마다 같은 샘플이 나와서 재현 가능합니다. frac 파라미터를 사용하면 비율로 샘플링할 수 있는데, sample(frac=0.1)은 전체의 10%를 랜덤 추출합니다. 대용량 데이터에서 빠른 프로토타이핑에 유용합니다."

- id: step3_memory
  title: 3단계. 메모리 사용량 확인
  subtitle: memory_usage()
  blocks:
  - type: text
    content: 대용량 데이터를 다룰 때는 메모리 관리가 매우 중요합니다. 컴퓨터의 RAM은 제한적이므로 데이터가 얼마나 메모리를 사용하는지 파악해야 합니다. memory_usage() 메서드는 각 컬럼이 차지하는 메모리를 바이트 단위로 보여줍니다. deep=True 파라미터는 특히 중요한데, 이것을 설정하지 않으면 문자열(object) 타입의 실제 메모리 사용량을 정확히 계산하지 못합니다. 문자열은 길이에 따라 메모리가 달라지므로 deep=True로 각 문자열의 실제 크기를 측정해야 합니다. 결과를 보면 어느 컬럼이 메모리를 많이 사용하는지 파악할 수 있어, 최적화가 필요한 부분을 찾을 수 있습니다.
  - type: code
    language: python
    title: 메모리 사용량 확인
    description: 각 컬럼별 메모리 사용량(바이트)
    content: |-
      diamonds.memory_usage(deep=True)

  - type: tip
    content: "memory_usage(deep=True)는 각 컬럼의 실제 메모리 사용량을 바이트 단위로 계산합니다. deep=False(기본값)일 때는 object 타입의 포인터 크기만 측정하지만, deep=True는 실제 데이터 크기를 측정합니다. 메모리가 부족할 때는 불필요한 컬럼 삭제, 데이터 타입 변경(int64 → int32, object → category), 청크 단위 처리 등으로 최적화할 수 있습니다."

- id: step4_total_memory
  title: 4단계. 총 메모리 계산
  subtitle: MB 단위로 변환
  blocks:
  - type: text
    content: 컬럼별 메모리를 sum()으로 합치면 전체 DataFrame의 총 메모리 사용량을 알 수 있습니다. 기본 단위인 바이트(byte)는 너무 크기 때문에 MB나 GB로 변환하면 이해하기 쉽습니다. 1024 바이트 = 1 KB, 1024 KB = 1 MB 이므로, 바이트를 1024로 두 번 나누면 MB 단위가 됩니다. 예를 들어 3,570,304 바이트는 약 3.4 MB입니다. 전체 데이터가 몇 MB인지 파악하면 현재 시스템에서 처리 가능한지, 샘플링이 필요한지, 클라우드로 옮겨야 하는지 판단할 수 있습니다.
  - type: code
    language: python
    title: 총 메모리 사용량
    description: MB 단위로 변환
    content: |-
      diamonds.memory_usage(deep=True).sum() / 1024 / 1024

  - type: tip
    content: "메모리 단위 변환은 1024 기준입니다. 1024 bytes = 1 KB, 1024 KB = 1 MB, 1024 MB = 1 GB입니다. 1000이 아니라 1024인 이유는 컴퓨터가 2진법(2^10=1024)을 사용하기 때문입니다. / 1024 / 1024 / 1024로 3번 나누면 GB 단위가 됩니다."

- id: step5_unique
  title: 5단계. 고유값 확인
  subtitle: 범주형 데이터 찾기
  blocks:
  - type: text
    content: 데이터를 분석하기 전에 어떤 컬럼이 범주형인지 파악하는 것이 중요합니다. unique() 메서드는 해당 컬럼에 어떤 고유한 값들이 있는지 보여줍니다. cut 컬럼을 확인해보면 'Fair', 'Good', 'Very Good', 'Premium', 'Ideal' 5가지 값만 존재합니다. 5만 개 행이 있지만 이 5가지 값만 반복되는 것입니다. 이런 데이터를 범주형(categorical) 데이터라고 합니다. 성별(남/여), 등급(상/중/하), 요일(월~일) 같이 제한된 값들이 반복되는 경우가 범주형입니다. 범주형 데이터를 적절히 처리하면 메모리를 크게 절약하고 처리 속도도 빨라집니다.
  - type: code
    language: python
    title: cut 컬럼의 고유값
    description: 5가지 등급만 있습니다
    content: |-
      diamonds['cut'].unique()

  - type: tip
    content: "unique()는 중복을 제거한 고유값 목록을 반환합니다. nunique()는 고유값의 개수만 반환합니다. value_counts()는 각 값이 몇 번 나타나는지 빈도를 세어줍니다. 범주형 데이터를 찾을 때는 nunique()가 작은 컬럼(대체로 10~20개 이하)을 확인하면 됩니다."

- id: step6_category
  title: 6단계. category 타입 변환
  subtitle: 메모리 절약
  blocks:
  - type: text
    content: 범주형 데이터를 object(문자열) 타입으로 저장하면 'Fair', 'Good' 같은 문자열을 5만 번 반복해서 저장합니다. 매우 비효율적입니다. astype('category')로 변환하면 pandas는 똑똑하게 처리합니다. 'Fair'=0, 'Good'=1, 'Very Good'=2, 'Premium'=3, 'Ideal'=4 같은 코드북을 한 번만 만들고, 실제 데이터는 0, 1, 2, 3, 4 같은 정수로 저장합니다. 문자열 5만 개 대신 작은 정수 5만 개 + 코드북 하나만 저장하므로 메모리가 크게 절약됩니다. 데이터가 클수록, 고유값이 적을수록 절약 효과가 큽니다. 실제로 이 데이터에서 cut, color, clarity를 category로 바꾸면 메모리가 50% 이상 줄어듭니다.
  - type: code
    language: python
    title: category 타입으로 변환
    description: object에서 category로 바꿉니다
    content: |-
      catDf = diamonds.copy()
      catDf['cut'] = catDf['cut'].astype('category')
      catDf['cut'].dtype

  - type: tip
    content: "astype('category')는 object 타입을 category 타입으로 변환합니다. category는 내부적으로 정수 코드 + 카테고리 목록으로 저장되어 메모리 효율이 높습니다. 특히 고유값이 적고 행이 많을수록 효과가 큽니다. 성별(2개), 요일(7개), 월(12개) 같은 컬럼은 반드시 category로 변환해야 합니다. 처리 속도도 빨라지고 groupby 등의 연산도 효율적입니다."

- id: step7_ordered_category
  title: 7단계. 순서 지정
  subtitle: pd.Categorical()
  blocks:
  - type: text
    content: 범주에 순서를 지정하면 정렬할 때 그 순서를 따릅니다. Fair < Good < Very Good < Premium < Ideal 순서로 품질이 좋아지므로 이 순서를 지정합니다.
  - type: code
    language: python
    title: 순서 지정하기
    description: 컷 등급 순서를 지정합니다
    content: |-
      cutOrder = ['Fair', 'Good', 'Very Good', 'Premium', 'Ideal']
      ordered = diamonds.copy()
      ordered['cut'] = pd.Categorical(ordered['cut'], categories=cutOrder, ordered=True)
      ordered.sort_values('cut').head(10)
  - type: tip
    content: pd.Categorical()은 순서가 있는 범주형 데이터를 만듭니다. categories로 순서를 지정하고 ordered=True로 순서형임을 표시합니다. 이렇게 하면 sort_values()나 비교 연산자(>, <)를 사용할 때 지정한 순서를 따릅니다.

- id: step8_corr
  title: 8단계. 상관관계 행렬
  subtitle: corr()
  blocks:
  - type: text
    content: 가격에 영향을 미치는 요인을 찾으려면 변수 간의 관계를 파악해야 합니다. 상관관계(correlation)는 두 변수가 함께 움직이는 정도를 -1에서 1 사이의 숫자로 나타냅니다. 1에 가까우면 강한 양의 상관(한 변수가 증가하면 다른 변수도 증가), -1에 가까우면 강한 음의 상관(한 변수가 증가하면 다른 변수는 감소), 0에 가까우면 상관관계가 없음을 의미합니다. corr() 메서드는 모든 수치형 컬럼 쌍의 상관계수를 행렬 형태로 계산합니다. select_dtypes(include='number')로 숫자형 컬럼만 선택한 이유는 문자열로는 상관계수를 계산할 수 없기 때문입니다. 대각선은 자기 자신과의 상관이므로 항상 1입니다.
  - type: code
    language: python
    title: 상관관계 행렬
    description: 수치형 컬럼들 사이의 상관계수
    content: |-
      diamonds.select_dtypes(include='number').corr()

  - type: tip
    content: "corr()은 피어슨 상관계수(Pearson correlation)를 계산합니다. -1에서 1 사이 값으로, 절대값이 클수록 관계가 강합니다. 해석 기준: |r| >= 0.7 강한 상관, 0.3 <= |r| < 0.7 중간 상관, |r| < 0.3 약한 상관입니다. method='spearman'으로 비선형 관계도 측정할 수 있습니다. 상관관계는 인과관계가 아님을 주의하세요!"

- id: step9_price_corr
  title: 9단계. 가격 상관관계
  subtitle: 가격과 관련된 요인
  blocks:
  - type: text
    content: carat(캐럿)이 0.92로 가장 높습니다. 캐럿이 클수록 가격이 높습니다.
  - type: code
    language: python
    title: 가격과의 상관관계만
    description: price와 다른 변수들의 상관관계
    content: |-
      diamonds.select_dtypes(include='number').corr()['price'].sort_values(ascending=False)

- id: step10_cut_price
  title: 10단계. 컷별 평균 가격
  subtitle: 심슨의 역설
  blocks:
  - type: text
    content: 의외로 Fair 컷이 가장 비쌉니다. 하지만 Fair 컷의 캐럿이 더 크기 때문입니다.
  - type: code
    language: python
    title: 컷별 평균 가격
    description: 의외로 Fair가 가장 비쌉니다?
    content: |-
      diamonds.groupby('cut')['price'].mean().sort_values(ascending=False)

- id: step11_cut_carat
  title: 11단계. 컷별 캐럿 확인
  subtitle: 역설의 원인
  blocks:
  - type: text
    content: Fair 컷이 캐럿이 더 큽니다. 캐럿을 통제하고 비교해야 공정합니다.
  - type: code
    language: python
    title: 컷별 평균 캐럿
    description: Fair 컷이 캐럿이 더 크기 때문입니다
    content: |-
      diamonds.groupby('cut')['carat'].mean().sort_values(ascending=False)

- id: step12_controlled
  title: 12단계. 통제된 비교
  subtitle: 동일 조건에서 비교
  blocks:
  - type: text
    content: 1캐럿 다이아만 비교하면 Ideal이 가장 비쌉니다.
  - type: code
    language: python
    title: 1캐럿 다이아만 비교
    description: 캐럿을 통제하면 Ideal이 가장 비쌉니다
    content: |-
      oneCarat = diamonds[(diamonds['carat'] >= 0.95) & (diamonds['carat'] <= 1.05)]
      oneCarat.groupby('cut')['price'].mean().sort_values(ascending=False)

- id: practice
  title: 실습
  subtitle: 다이아몬드 가격 분석 프로젝트
  blocks:
  - type: text
    content: 배운 내용으로 가격 결정 요인을 분석해봅시다.
  - type: tip
    content: "각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다."
  - type: expansion
    title: "미션1: 그룹별 분석 + 고가 다이아몬드 특성"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/diamonds.csv")
    - type: code
      title: "분석 수행"
      content: |-
        colorStats = data.groupby('color').agg({
            'price': 'mean',
            'carat': 'mean'
        }).sort_values('price', ascending=False)
        expensive = data[data['price'] >= 10000]
        expensiveStats = expensive[['carat', 'cut', 'color', 'clarity']].describe()
        (colorStats, expensiveStats)
  - type: expansion
    title: "미션2: 통제된 비교 + 상관분석"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import pandas as pd
        df = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/diamonds.csv")
    - type: code
      title: "분석 수행"
      content: |-
        oneCaratDf = df[(df['carat'] >= 0.95) & (df['carat'] <= 1.05)]
        clarityPrice = oneCaratDf.groupby('clarity')['price'].agg(['mean', 'std', 'count'])
        priceCorr = df.select_dtypes(include='number').corr()['price'].abs().sort_values(ascending=False).head(4)
        (clarityPrice, priceCorr)

