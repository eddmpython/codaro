meta:
  id: duckdb_00b
  title: MotherDuck소개
  order: 0.5
  category: duckdb
  badge: 소개
  source: eddmpython
  sourceUrl: https://eddmpython.com
  tags: ["MotherDuck", "DuckDB", "클라우드", "서버리스", "데이터웨어하우스", "하이브리드"]
  seo:
    title: "MotherDuck 입문 - DuckDB 기반 클라우드 데이터 웨어하우스"
    description: "MotherDuck으로 로컬과 클라우드를 넘나드는 데이터 분석을 시작하세요. DuckDB 기반의 서버리스 분석 플랫폼입니다."
    keywords: ["MotherDuck", "DuckDB", "클라우드", "서버리스", "데이터웨어하우스", "하이브리드쿼리"]

sections:
- id: intro
  blocks:
    - type: mainHeader
      emoji: "🦆☁️"
      title: "MotherDuck??"
      subtitle: "DuckDB가 클라우드를 만났다"

    - type: hero
      emoji: "🚀"
      title: "DuckDB 기반 서버리스 데이터 웨어하우스"
      subtitle: "로컬과 클라우드를 넘나드는 하이브리드 분석"
      points:
        - emoji: "☁️"
          title: "서버리스 클라우드"
        - emoji: "🔗"
          title: "로컬+클라우드 동시 쿼리"
        - emoji: "💰"
          title: "초 단위 과금"
        - emoji: "🦆"
          title: "DuckDB 100% 호환"

    - type: image
      src: "https://motherduck.com/docs/assets/images/md-diagram_v1.3-ce2f25a6d54de87545934d324514c3e7.png"

- id: what_is_motherduck
  blocks:
    - type: sectionHeader
      title: "🤔 MotherDuck이 뭔가요?"
      subtitle: "한마디로 DuckDB의 클라우드 버전"

    - type: note
      style: info
      title: "DuckDB + 클라우드 = MotherDuck"
      content: "MotherDuck은 DuckDB 엔진을 기반으로 한 서버리스 클라우드 데이터 웨어하우스입니다. 로컬에서 돌리던 DuckDB 쿼리를 그대로 클라우드에서 실행할 수 있고, 둘을 동시에 쿼리하는 하이브리드 실행도 가능합니다."

    - type: featureCards
      cards:
        - emoji: "☁️"
          title: "서버리스"
          description: "인프라 관리 불필요, SQL만 작성"
        - emoji: "🔗"
          title: "하이브리드 쿼리"
          description: "로컬과 클라우드 데이터 동시 분석"
        - emoji: "📦"
          title: "관리형 스토리지"
          description: "자동 최적화된 데이터 저장"
        - emoji: "🤝"
          title: "협업 기능"
          description: "데이터 공유 및 팀 작업 지원"

- id: dual_execution
  blocks:
    - type: sectionHeader
      title: "⚡ Dual Execution"
      subtitle: "MotherDuck만의 킬러 피처"

    - type: image
      src: "https://motherduck.com/docs/assets/ideal-img/hybrid_query.0535877.540.png"

    - type: note
      style: tip
      title: "로컬 + 클라우드 동시 실행"
      content: "로컬 DuckDB에서 ATTACH 'md:' 한 줄이면 MotherDuck에 연결됩니다. 이후 하나의 쿼리에서 로컬 데이터와 클라우드 데이터를 동시에 조인할 수 있어요. 옵티마이저가 자동으로 데이터 위치에 따라 실행을 분배합니다."

    - type: featureCards
      cards:
        - emoji: "💻"
          title: "로컬 데이터"
          description: "내 노트북의 CSV, Parquet 파일"
        - emoji: "☁️"
          title: "클라우드 데이터"
          description: "MotherDuck에 저장된 테이블"
        - emoji: "🔀"
          title: "자동 최적화"
          description: "데이터 위치에 따라 실행 계획 분배"
        - emoji: "💸"
          title: "비용 절감"
          description: "로컬 처리는 과금 없음"

- id: architecture
  blocks:
    - type: sectionHeader
      title: "🏗️ 아키텍처"
      subtitle: "단순함을 위한 설계"

    - type: note
      style: info
      title: "Scale-Up 철학"
      content: "분석에 따르면 95% 이상의 데이터베이스가 1TB 미만이고, 95% 이상의 쿼리가 10GB 미만 데이터를 다룹니다. MotherDuck은 복잡한 분산 시스템 대신 단일 노드 수직 확장(Scale-Up) 방식을 선택했습니다."

    - type: featureCards
      cards:
        - emoji: "👤"
          title: "사용자별 인스턴스"
          description: "각 사용자에게 전용 DuckDB 인스턴스"
        - emoji: "📏"
          title: "수직 확장"
          description: "필요에 따라 인스턴스 사이즈 조절"
        - emoji: "🎯"
          title: "단순한 구조"
          description: "분산 시스템의 복잡성 제거"
        - emoji: "⚡"
          title: "빠른 시작"
          description: "콜드 스타트 최소화"

- id: vs_others
  blocks:
    - type: sectionHeader
      title: "🆚 다른 서비스와 비교"
      subtitle: "언제 MotherDuck을 선택할까요?"

    - type: compare
      left:
        title: "로컬 DuckDB"
        subtitle: "내 컴퓨터에서"
        icon: "💻"
        color: "blue"
        items:
          - "설치 필요 없음 (pip)"
          - "완전 무료"
          - "데이터가 로컬에만"
          - "내 컴퓨터 성능에 의존"
          - "협업 어려움"
        infoBox: "개인 분석, 프로토타이핑"
      right:
        title: "MotherDuck"
        subtitle: "클라우드에서"
        icon: "☁️"
        color: "green"
        items:
          - "웹 브라우저로 접속"
          - "사용한 만큼 과금"
          - "클라우드 저장 + 공유"
          - "클라우드 리소스 활용"
          - "팀 협업 지원"
        infoBox: "팀 분석, 대용량 데이터"

    - type: table
      headers: ["서비스", "특징", "가격"]
      rows:
        - ["DuckDB (로컬)", "무료, 로컬 전용", "무료"]
        - ["MotherDuck", "서버리스, 하이브리드", "초 단위 과금"]
        - ["BigQuery", "페타바이트급, GCP 생태계", "쿼리당 과금"]
        - ["Snowflake", "엔터프라이즈급, 복잡한 기능", "웨어하우스 시간당"]

- id: pricing
  blocks:
    - type: sectionHeader
      title: "💰 가격 정책"
      subtitle: "사용한 만큼만 지불"

    - type: note
      style: tip
      title: "무료 플랜 있음!"
      content: "신규 가입 시 21일 무료 체험과 함께, 매월 10GB 스토리지 + 10 CU 시간이 무료로 제공됩니다. 개인 프로젝트나 학습에는 무료 플랜으로 충분합니다."

    - type: featureCards
      cards:
        - emoji: "💾"
          title: "스토리지"
          description: "저장된 압축 데이터 크기 기준"
        - emoji: "⚙️"
          title: "컴퓨팅"
          description: "초 단위 과금, 로컬 실행은 무료"
        - emoji: "🤖"
          title: "AI"
          description: "SQL Assistant, AI 함수 사용량"
        - emoji: "🆓"
          title: "무료 항목"
          description: "데이터 공유, 클론, 로컬 데이터"

    - type: note
      style: info
      title: "비용 절감 사례"
      content: "Definite는 기존 데이터 웨어하우스에서 MotherDuck으로 전환 후 70% 비용 절감을 달성했습니다. DuckDB의 효율적인 쿼리 엔진과 Scale-Up 아키텍처 덕분에 타 서비스 대비 10배 저렴한 경우도 있습니다."

- id: use_cases
  blocks:
    - type: sectionHeader
      title: "🎯 활용 사례"
      subtitle: "이런 상황에서 MotherDuck이 빛납니다"

    - type: featureCards
      cards:
        - emoji: "👥"
          title: "팀 데이터 분석"
