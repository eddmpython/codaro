        - emoji: "📊"
          title: "BI 대시보드"
          description: "Tableau, PowerBI, Hex 연동"
        - emoji: "🔄"
          title: "ETL 파이프라인"
          description: "dbt 어댑터로 데이터 변환"
        - emoji: "🤖"
          title: "AI 분석"
          description: "자연어로 SQL 쿼리 생성"
        - emoji: "📈"
          title: "스타트업 분석"
          description: "저비용으로 시작, 필요시 확장"
        - emoji: "🔗"
