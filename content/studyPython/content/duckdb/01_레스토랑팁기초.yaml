    title: "DuckDB SQL 기초 - 레스토랑 팁 데이터 필터링"
    description: "DuckDB로 SQL 기초를 배웁니다. SELECT, WHERE, 비교/논리 연산자로 레스토랑 팁 데이터를 조건별로 필터링합니다."
