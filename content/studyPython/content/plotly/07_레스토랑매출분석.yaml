  description: 막대, 박스, 히트맵 차트를 개별 분석한 뒤 make_subplots로 하나의 대시보드로 통합합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: tips.csv 로드
  blocks:
  - type: text
    content: 레스토랑 팁 데이터를 사용합니다. 244명 손님의 결제 금액, 팁, 요일, 시간 등의 정보를 담고 있습니다. 이 데이터는 1990년대 미국 레스토랑에서 수집된 실제 데이터로, 팁에 영향을 미치는 다양한 요인(성별, 흡연 여부, 요일, 시간대, 일행 수)을 분석할 수 있습니다. 레스토랑 운영자는 이런 분석을 통해 직원 배치를 최적화하고, 고객 서비스 전략을 수립하며, 매출 예측 모델을 개선할 수 있습니다. plotly.express뿐 아니라 make_subplots와 graph_objects도 import하여 고급 대시보드를 만들 준비를 합니다. 실무에서는 이처럼 여러 관점에서 데이터를 분석하고 하나의 대시보드로 통합하여 의사결정을 지원하며, 경영진이 한눈에 핵심 지표를 파악할 수 있도록 시각화합니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: 244명의 레스토랑 팁 데이터
    content: |-
      import plotly.express as px
      from plotly.subplots import make_subplots
      import plotly.graph_objects as go
      import pandas as pd

      baseUrl = "https://raw.githubusercontent.com"
      tips = pd.read_csv(f"{baseUrl}/mwaskom/seaborn-data/master/tips.csv")
      tips
  - type: tip
    content: "from plotly.subplots import make_subplots는 여러 차트를 하나의 Figure에 배치하는 기능을 제공합니다. plotly.graph_objects는 go로 줄여 쓰며, Bar, Box, Scatter 등 저수준 차트 객체를 직접 생성할 때 사용합니다. px(plotly.express)는 고수준 간편 인터페이스이고, go는 세밀한 제어가 가능한 저수준 인터페이스입니다. 복잡한 대시보드 작업 시 두 방식을 혼용합니다."

- id: step2_bar
  title: 2단계. 요일별 평균 팁 막대 그래프
  subtitle: px.bar (반복)
  blocks:
  - type: text
    content: 막대 그래프로 요일별 평균 팁을 비교합니다. 어느 요일에 팁이 많을까요? 이 질문에 답하기 위해 먼저 pandas groupby로 요일별 평균을 계산합니다. 요일 데이터는 문자열로 저장되어 있어 기본 정렬 시 알파벳 순(Fri → Sat → Sun → Thur)으로 나타나므로, astype('category')로 범주형으로 변환하고 cat.reorder_categories()로 시간 순서(목요일→금요일→토요일→일요일)를 지정합니다. 이렇게 하면 주중에서 주말로 갈수록 팁이 어떻게 변하는지 추세를 명확히 볼 수 있습니다. showlegend=False로 범례를 숨겨 차트를 깔끔하게 만들며, 요일별 색상만으로도 구분이 충분하기 때문입니다. 실무에서는 시간 순서나 크기 순서 같은 의미 있는 정렬이 필수적이며, 이를 통해 독자가 패턴과 인사이트를 빠르게 파악할 수 있습니다.
  - type: code
    language: python
    title: 요일별 평균 팁
    description: 막대 그래프로 요일별 비교
    content: |-
      tipsByDay = tips.groupby('day', as_index=False)['tip'].mean()
      dayOrder = ['Thur', 'Fri', 'Sat', 'Sun']
      tipsByDay['day'] = tipsByDay['day'].astype('category').cat.reorder_categories(dayOrder)
      tipsByDay = tipsByDay.sort_values('day')

      figBar = px.bar(
          tipsByDay,
          x='day',
          y='tip',
          color='day',
          title='요일별 평균 팁'
      )
      figBar.update_layout(showlegend=False)
      figBar
  - type: tip
    content: "astype('category').cat.reorder_categories()는 범주형 데이터의 순서를 사용자 정의하는 pandas 메서드입니다. 기본 알파벳 순서가 아닌 의미 있는 순서(시간 순서, 크기 순서 등)로 정렬할 때 사용합니다. 이후 sort_values()로 정렬하면 지정한 순서대로 나타납니다. Plotly 차트에서 x축 순서를 제어하는 가장 확실한 방법입니다."

- id: step3_box
  title: 3단계. 시간대별 팁 분포
  subtitle: px.box (반복)
  blocks:
  - type: text
    content: 박스 플롯으로 점심과 저녁의 팁 분포를 비교합니다. 평균 팁은 유사할 수 있지만, 분포의 형태는 매우 다를 수 있기 때문에 박스 플롯이 필요합니다. 박스 플롯은 평균만으로는 알 수 없는 데이터의 전체 분포 형태를 보여주며, 중앙값(median), 사분위수(Q1, Q3), 이상치를 한눈에 파악할 수 있게 합니다. 상자의 중앙선은 중앙값(50 percentile), 상자의 아래/위 경계는 25/75 percentile, 상자의 세로 길이는 사분위 범위(IQR = Q3-Q1)를 나타내며, 수염의 끝은 IQR의 1.5배 범위 내 최소·최대값, 그 밖의 점들은 이상치를 의미합니다. 점심과 저녁의 팁 분포가 어떻게 다른지, 어느 시간대가 변동성이 큰지, 극단값이 많은지를 비교할 수 있습니다. 실무에서는 평균 비교만으로 부족할 때 분포를 함께 확인하여 더 정확한 의사결정을 내리며, 특히 마케팅 전략 수립 시 고객 세그먼트별 분포 분석이 필수적입니다.
  - type: code
    language: python
    title: 시간대별 팁 분포
    description: 박스 플롯으로 분포 비교
    content: |-
      figBox = px.box(
          tips,
          x='time',
          y='tip',
          color='time',
          title='시간대별 팁 분포'
      )
      figBox.update_layout(showlegend=False)
      figBox

- id: step4_facet
  title: 4단계. 성별/흡연 여부별 분석
  subtitle: facet_col (반복)
  blocks:
  - type: text
    content: facet_col로 성별에 따라 차트를 나눠서 비교합니다. 하나의 차트에 모든 조건을 표시하면 겹쳐서 보기 어렵기 때문에 패싯으로 분리합니다. facet(패싯)은 하나의 차트를 여러 조건으로 분할하여 나란히 배치하는 기법으로, 조건 간 비교를 직관적으로 만들어줍니다. 여기서는 남성과 여성을 별도 패널로 나누고, 각 패널 내에서 흡연자·비흡연자를 색상으로 구분하여 2차원 분석(성별 × 흡연 여부)을 수행합니다. 이를 통해 "남성 흡연자", "여성 비흡연자" 같은 세분화된 그룹별 팁 패턴을 발견할 수 있습니다. height=400으로 높이를 조정하여 두 패널이 나란히 잘 보이도록 하며, 실무에서는 패싯을 활용해 연령대별, 지역별, 시간대별 등 다차원 비교 분석을 수행합니다.
  - type: code
    language: python
    title: 성별/흡연별 팁 분포
    description: facet으로 분리하여 비교
    content: |-
      figFacet = px.box(
          tips,
          x='day',
          y='tip',
          color='smoker',
          facet_col='sex',
          title='성별/흡연별 팁 분포'
      )
      figFacet.update_layout(height=400)
      figFacet

- id: step5_density_heatmap
  title: 5단계. 결제금액-팁 관계 히트맵
  subtitle: px.density_heatmap (신규)
  blocks:
  - type: text
    content: density_heatmap은 두 수치 변수의 밀도를 색상으로 표현하는 신규 차트 타입입니다. 결제 금액과 팁의 관계를 시각화하여 "결제 금액이 높으면 팁도 높은가?"라는 질문에 답합니다. 산점도는 점이 많으면 겹쳐서(overplotting) 밀도를 파악하기 어렵지만, 밀도 히트맵은 x, y 축을 격자로 나누고 각 셀에 속하는 데이터 개수를 색상 진하기로 표현하여 패턴이 명확히 드러납니다. nbinsx, nbinsy는 x축과 y축을 몇 개 구간(bin)으로 나눌지 지정하며, 구간이 많을수록 세밀하게 보이지만 너무 많으면(50개 이상) 각 셀의 데이터 개수가 적어져 노이즈가 생기고, 너무 적으면(5개 이하) 디테일이 사라지므로 10~30 사이가 적당합니다. 색이 진한 영역이 데이터가 밀집된 곳이며, 결제 금액이 높을수록 팁도 높아지는지, 선형 관계인지, 이상치는 어디에 있는지 등을 한눈에 파악할 수 있습니다. 실무에서는 수만 건 이상의 대용량 데이터에서 산점도 대신 밀도 히트맵을 사용하여 성능과 가독성을 동시에 확보합니다.
  - type: code
    language: python
    title: 결제금액-팁 밀도 히트맵
    description: 두 변수의 밀도를 색상으로 표현
    content: |-
      figHeatmap = px.density_heatmap(
          tips,
          x='total_bill',
          y='tip',
          nbinsx=20,
          nbinsy=20,
          title='결제금액-팁 관계 히트맵'
      )
      figHeatmap
  - type: tip
    content: "px.density_heatmap은 산점도처럼 두 변수의 관계를 보여주지만, 점 대신 밀도를 색상으로 표현합니다. 데이터가 많이 집중된 영역이 진하게 나타나 패턴을 파악하기 좋습니다. nbinsx, nbinsy로 구간 수를 조절하며, 10~30 사이가 적당합니다. 구간이 너무 적으면 디테일이 사라지고, 너무 많으면 각 셀의 데이터가 부족해 노이즈가 생깁니다. 실무에서는 데이터 크기에 따라 최적의 bin 수를 실험적으로 찾습니다."

- id: step6_heatmap_options
  title: 6단계. 히트맵 옵션
  subtitle: marginal, color_continuous_scale
  blocks:
  - type: text
    content: marginal_x, marginal_y로 축에 히스토그램을 추가하여 차트의 정보량을 높입니다. 2차원 밀도맵만으로는 각 변수의 전체 분포를 파악하기 어렵기 때문입니다. marginal(주변부) 히스토그램은 각 변수의 1차원 분포를 축 옆에 표시하여, 예를 들어 "결제 금액이 10~20달러에 가장 많이 분포한다"는 정보를 한눈에 볼 수 있게 합니다. 2차원 밀도와 1차원 분포를 함께 보면 전체 데이터 구조를 입체적으로 이해할 수 있습니다. color_continuous_scale은 연속형 색상 맵(팔레트)을 지정하며, Plotly는 Viridis, Plasma, Blues, Reds, Cividis, Inferno 등 다양한 팔레트를 제공합니다. Viridis는 색맹 친화적(color-blind friendly)이고 흑백 인쇄 시에도 명암 차이가 선명하게 유지되어 학술 논문과 실무 보고서에서 자주 사용됩니다. 실무에서는 데이터 성격에 따라 팔레트를 선택하며, 중립적 데이터는 Viridis, 온도나 위험도는 RdBu(빨강-파랑 양극), 양수만 있는 데이터는 Blues나 Greens를 사용합니다.
  - type: code
    language: python
    title: 히트맵 옵션 추가
    description: 축 히스토그램과 색상 팔레트
    content: |-
      figHeatmapEnhanced = px.density_heatmap(
          tips,
          x='total_bill',
          y='tip',
          nbinsx=25,
          nbinsy=25,
          marginal_x='histogram',
          marginal_y='histogram',
          color_continuous_scale='Viridis',
          title='결제금액-팁 관계 (히스토그램 포함)'
      )
      figHeatmapEnhanced
  - type: tip
    content: "marginal_x와 marginal_y는 축 옆에 추가 차트를 배치합니다. 'histogram', 'box', 'violin', 'rug' 등을 지정할 수 있으며, 각 변수의 1차원 분포를 함께 보여줍니다. color_continuous_scale은 연속형 색상 팔레트를 설정하며, Viridis(보라-노랑), Plasma(보라-핑크-노랑), Blues(파랑 계열), Reds(빨강 계열) 등이 있습니다. 실무 팁: 데이터의 성격에 따라 팔레트를 선택하세요. 중립적인 데이터는 Viridis, 온도는 RdBu(빨강-파랑), 양수만 있으면 Blues를 사용합니다."

- id: step7_make_subplots_intro
  title: 7단계. make_subplots 기초
  subtitle: from plotly.subplots import make_subplots (신규)
  blocks:
  - type: text
    content: make_subplots로 여러 차트를 하나의 그림에 배치하는 신규 개념을 배웁니다. 지금까지는 차트를 하나씩 개별적으로 만들었지만, 실무에서는 여러 관점의 분석을 한 화면에 통합한 대시보드가 필요합니다. make_subplots는 Plotly의 핵심 고급 기능으로, 여러 개별 차트를 하나의 Figure 객체로 통합하여 비교 분석을 쉽게 만들어줍니다. rows(행 개수)와 cols(열 개수)로 격자 구조를 정의하고, subplot_titles로 각 서브플롯의 제목을 리스트로 지정합니다. 차트를 추가할 때는 두 가지 방법이 있는데, (1) px로 만든 차트의 data 속성에서 trace를 추출하거나 (2) go(graph_objects)로 차트 객체를 직접 생성하여 add_trace()로 배치합니다. row와 col 파라미터로 격자 내 위치를 지정하며, Python 리스트와 달리 1부터 시작합니다(row=1, col=1이 왼쪽 위). 실무에서는 대시보드, 경영 보고서, 학술 논문 등에서 여러 분석 결과를 한 페이지에 보여줄 때 필수적으로 사용되며, 특히 의사결정자가 다양한 지표를 동시에 비교할 수 있도록 합니다.
  - type: code
    language: python
    title: 2x1 서브플롯 기초
    description: 2행 1열 구조의 서브플롯
    content: |-
      figSub = make_subplots(
          rows=2, cols=1,
          subplot_titles=['요일별 평균 팁', '시간대별 팁 분포']
      )

      for trace in figBar.data:
          figSub.add_trace(trace, row=1, col=1)

      for trace in figBox.data:
          figSub.add_trace(trace, row=2, col=1)

      figSub.update_layout(height=600, showlegend=False, title_text='팁 분석 서브플롯')
      figSub
  - type: tip
    content: "make_subplots는 여러 차트를 하나의 Figure에 배치합니다. 핵심 파라미터: rows(행 수), cols(열 수), subplot_titles(각 서브플롯 제목). 차트 추가는 add_trace()와 row, col 파라미터로 위치를 지정합니다. px 차트의 data 속성은 trace 리스트를 포함하므로 for 루프로 추출하여 추가할 수 있습니다. row와 col은 1부터 시작하며, row=1, col=1은 왼쪽 위 첫 번째 서브플롯을 의미합니다. 실무 팁: update_layout(height=...)로 전체 높이를 조정하여 각 서브플롯이 충분한 공간을 갖도록 합니다."

- id: step8_dashboard
  title: 8단계. 완성 대시보드
  subtitle: 2x2 그리드 대시보드
  blocks:
  - type: text
    content: 4개의 차트를 2x2 격자에 배치하여 팁 분석 종합 대시보드를 완성합니다. 각 차트는 다른 질문에 답하며, 함께 보면 전체 그림을 이해할 수 있습니다. make_subplots로 2행 2열 구조를 만들고, go.Bar, go.Box, go.Histogram2d 등 graph_objects를 직접 사용하여 각 서브플롯에 차트를 배치합니다. px 대신 go를 사용하는 이유는 서브플롯에 추가할 때 더 세밀한 제어가 가능하고, marker_color, name 등 개별 속성을 직접 지정할 수 있기 때문입니다. specs 파라미터는 각 셀의 차트 타입을 지정하며, 'xy'는 일반 2D 데카르트 좌표계, 'pie'는 파이 차트, 'polar'는 극좌표계를 의미합니다(여기서는 모두 'xy'). 이 대시보드는 (1) 요일별 평균 팁, (2) 시간대별 팁 분포, (3) 성별 팁 비교, (4) 결제금액-팁 관계를 한 화면에 보여주어 팁 데이터를 다각도로 이해할 수 있게 합니다. 실무에서는 이처럼 여러 관점의 분석을 하나의 대시보드로 통합하여 경영진이나 이해관계자에게 제공하며, A4 한 장에 핵심 인사이트를 요약하는 executive summary로 활용됩니다.
  - type: code
    language: python
    title: 팁 분석 대시보드
    description: 4개 차트를 하나의 대시보드로
    content: |-
      dashboard = make_subplots(
          rows=2, cols=2,
          subplot_titles=[
              '요일별 평균 팁',
              '시간대별 팁 분포',
              '성별 팁 비교',
              '결제금액-팁 관계'
          ],
          specs=[
              [{'type': 'xy'}, {'type': 'xy'}],
              [{'type': 'xy'}, {'type': 'xy'}]
          ]
      )

      tipsByDay = tips.groupby('day', as_index=False)['tip'].mean()
      dashboard.add_trace(
          go.Bar(x=tipsByDay['day'], y=tipsByDay['tip'], marker_color='steelblue'),
          row=1, col=1
      )

      for time in ['Lunch', 'Dinner']:
          timeData = tips[tips['time'] == time]['tip']
          dashboard.add_trace(
              go.Box(y=timeData, name=time),
              row=1, col=2
          )

      for sex in ['Male', 'Female']:
          sexData = tips[tips['sex'] == sex]['tip']
          dashboard.add_trace(
              go.Box(y=sexData, name=sex),
              row=2, col=1
          )

      dashboard.add_trace(
          go.Histogram2d(
              x=tips['total_bill'],
              y=tips['tip'],
              nbinsx=20,
              nbinsy=20,
              colorscale='Blues'
          ),
          row=2, col=2
      )

      dashboard.update_layout(
          height=700,
          showlegend=False,
          title_text='레스토랑 팁 분석 대시보드'
      )
      dashboard
  - type: tip
    content: "go.Bar, go.Box, go.Histogram2d는 plotly.graph_objects의 저수준 차트 객체입니다. px보다 세밀한 제어가 가능하며, make_subplots와 함께 사용할 때 유용합니다. go.Bar는 x, y 파라미터로 데이터를 받고, marker_color로 색상을 지정합니다. go.Box는 y만 지정하면 박스 플롯을 그리며, name으로 범례 이름을 설정합니다. go.Histogram2d는 px.density_heatmap과 유사하지만 colorscale 등 더 많은 옵션을 제공합니다. 실무에서는 px로 빠르게 프로토타입을 만들고, 세밀한 조정이 필요할 때 go를 사용합니다."

- id: step9_layout_polish
  title: 9단계. 레이아웃 다듬기
  subtitle: update_layout 심화 (반복)
  blocks:
  - type: text
    content: 대시보드에 배경색, 폰트, 여백 등을 추가하여 전문성과 가독성을 높입니다. 기본 스타일만으로는 브랜드 정체성을 표현하거나 프레젠테이션용으로 사용하기 어렵기 때문입니다. title을 딕셔너리 형태로 지정하여 텍스트, 가로 정렬(x=0.5, 중앙), 폰트 크기를 한번에 설정하며, 문자열 대신 딕셔너리로 전달하면 더 많은 옵션을 제어할 수 있습니다. plot_bgcolor는 차트 영역(그래프 내부)의 배경색, paper_bgcolor는 전체 캔버스(차트 외부 여백 포함)의 배경색입니다. font로 전체 폰트 패밀리(Arial, Helvetica 등)와 기본 크기를 지정하고, margin으로 상하좌우(t, b, l, r) 여백을 픽셀 단위로 조정합니다. update_xaxes와 update_yaxes는 모든 서브플롯의 축에 일괄 적용되며, showgrid=True, gridcolor='lightgray'로 격자선을 추가하면 눈금을 따라 값을 읽기 쉬워집니다. 실무에서는 회사 브랜드 컬러를 배경색에 적용하고, 공식 폰트를 사용하며, 프레젠테이션 템플릿에 맞춘 여백을 설정하여 일관성 있는 전문적인 대시보드를 제작합니다.
  - type: code
    language: python
    title: 스타일 적용
    description: 배경색, 폰트, 여백 조정
    content: |-
      dashboard.update_layout(
          title={
              'text': '레스토랑 팁 분석 대시보드',
              'x': 0.5,
              'font': {'size': 20}
          },
          plot_bgcolor='white',
          paper_bgcolor='#f8f9fa',
          font={'family': 'Arial', 'size': 12},
          margin={'t': 100, 'b': 50, 'l': 50, 'r': 50}
      )
      dashboard.update_xaxes(showgrid=True, gridcolor='lightgray')
      dashboard.update_yaxes(showgrid=True, gridcolor='lightgray')
      dashboard

- id: practice
  title: 실습
  subtitle: 팁 분석 확장 프로젝트
  blocks:
  - type: text
    content: 배운 내용으로 추가 분석 대시보드를 만들어봅시다. 이 실습에서는 density_heatmap, box plot, bar chart, make_subplots, 데이터 전처리(파생 변수 생성), 그룹별 집계 등 모든 개념을 종합적으로 활용합니다. 각 미션은 실제 레스토랑 분석 시나리오를 반영하여 구성되었으며, 완성하면 팁에 영향을 미치는 다양한 요인을 깊이 이해할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 요일별 결제금액 히트맵"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import plotly.express as px
        import pandas as pd

        billUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
        billData = pd.read_csv(billUrl)
    - type: code
      title: "차트 생성"
      content: |-
        chart = px.density_heatmap(
            billData,
            x='day',
            y='total_bill',
            nbinsy=15,
            color_continuous_scale='Reds',
            title='요일별 결제금액 분포'
        )
        chart
  - type: expansion
    title: "미션2: 흡연자/비흡연자 팁률 비교"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import plotly.express as px
        import pandas as pd

        smokerUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
        smokerDf = pd.read_csv(smokerUrl)
        smokerDf['tipRate'] = smokerDf['tip'] / smokerDf['total_bill'] * 100
    - type: code
      title: "차트 생성"
      content: |-
        canvas = px.box(
            smokerDf,
            x='smoker',
            y='tipRate',
            color='smoker',
            title='흡연 여부별 팁률 분포'
        )
        canvas.update_layout(showlegend=False, yaxis_title='팁률 (%)')
        canvas

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 여러 차트를 조합하여 분석 대시보드를 완성했습니다.
  - type: list
    items:
    - "px.bar - 막대 그래프 (반복)"
    - "px.box - 박스 플롯 (반복)"
    - "facet_col - 조건별 분리 차트 (반복)"
    - "px.density_heatmap - 밀도 히트맵 (신규)"
    - "make_subplots - 여러 차트를 한 그림에 배치 (신규)"
    - "go.Bar, go.Box, go.Histogram2d - 저수준 차트 객체 (신규)"
    - "update_layout - 레이아웃 커스터마이징 (반복)"
  - type: text
    content: 다음 시간에는 트리맵과 선버스트로 계층 구조를 시각화합니다.
