meta:
  id: plotly_05
  title: 세계인구지도
  order: 5
  category: plotly
  difficulty: "⭐⭐"
  badge: 기초
  tags: ["choropleth", "지도", "인구", "color_continuous_scale", "gapminder"]
  seo:
    title: "Plotly 코로플레스 지도 - 세계 인구 시각화"
    description: "px.choropleth로 국가별 인구 단계구분도를 만듭니다. color_continuous_scale로 색상 스케일을 조절하고 update_layout으로 레이아웃을 꾸밉니다."
    keywords: ["choropleth", "단계구분도", "세계지도", "인구 시각화", "Plotly"]

intro:
  emoji: "🗺️"
  goal: "국가별 인구를 색상으로 표현한 세계 지도(코로플레스)를 완성합니다."
  description: "px.choropleth는 지도 위에 데이터를 색상으로 표현합니다. 인구가 많을수록 진한 색, 적을수록 연한 색으로 한눈에 파악할 수 있습니다."

sections:
- id: step1_load
  title: 1단계. 데이터 준비
  subtitle: gapminder 데이터
  blocks:
  - type: text
    content: gapminder 데이터셋에는 국가별 인구(pop), 기대수명(lifeExp), GDP(gdpPercap) 등의 주요 지표가 포함되어 있어 세계 발전 현황을 분석하기에 이상적입니다. 코로플레스 지도를 그리려면 각 국가를 지리적으로 식별할 수 있는 표준 국가 코드가 필요한데, gapminder는 ISO 3166-1 alpha-3 형식의 iso_alpha 컬럼(KOR, USA, CHN 등)을 제공합니다. 이 3자리 코드는 국제 표준이므로 Plotly의 내장 지도 데이터와 자동으로 매칭되어 별도의 지리 정보 파일 없이도 세계 지도를 그릴 수 있습니다.
  - type: code
    language: python
    title: 데이터 로드
    description: gapminder 데이터 불러오기
    content: |-
      import plotly.express as px
      import pandas as pd
      df = px.data.gapminder()
      df.head()

- id: step2_filter
  title: 2단계. 최신 연도 필터링
  subtitle: 2007년 데이터만
  blocks:
  - type: text
    content: gapminder 데이터는 1952년부터 2007년까지 5년 단위로 수집된 시계열 데이터입니다. 시간에 따른 변화를 보려면 모든 연도를 사용하지만, 특정 시점의 스냅샷을 보려면 한 연도만 필터링해야 합니다. 여기서는 가장 최신 데이터인 2007년만 추출하여 현대의 세계 인구 분포를 시각화합니다. query() 메서드는 SQL과 유사한 문법으로 데이터를 필터링하는 pandas의 편리한 기능으로, df[df['year'] == 2007]과 동일한 결과를 더 읽기 쉬운 형태로 제공합니다.
  - type: code
    language: python
    title: 2007년 필터링
    description: query로 2007년 데이터만 추출
    content: |-
      df2007 = df.query('year == 2007')
      df2007.shape

- id: step3_iso_alpha
  title: 3단계. 국가 코드 확인
  subtitle: iso_alpha 컬럼
  blocks:
  - type: text
    content: 코로플레스 지도는 국가명(문자열)이 아닌 표준 국가 코드로 지리적 위치를 매칭합니다. iso_alpha 컬럼에는 ISO 3166-1 alpha-3 형식의 3자리 코드가 저장되어 있으며, KOR은 한국, USA는 미국, CHN은 중국을 의미합니다. 이 표준 코드 체계는 국제적으로 통용되며, 언어나 국가명 표기 방식과 무관하게 일관되게 작동합니다. 예를 들어 한국을 Korea, South Korea, 대한민국 등 여러 이름으로 부를 수 있지만, ISO 코드는 항상 KOR로 고정되어 있어 데이터 매칭 오류를 방지합니다.
  - type: code
    language: python
    title: 국가 코드 확인
    description: iso_alpha 컬럼 확인
    content: |-
      df2007[['country', 'iso_alpha', 'pop']].head(10)

- id: step4_basic_choropleth
  title: 4단계. 기본 코로플레스
  subtitle: px.choropleth 첫 등장
  blocks:
  - type: text
    content: 코로플레스 맵(choropleth map)은 지도 위에 데이터를 색상으로 표현하는 단계구분도입니다. 각 국가나 지역의 경계선 안을 데이터 값에 따라 다른 색상으로 채워서, 지리적 패턴을 한눈에 파악할 수 있게 해줍니다. 인구가 많은 국가는 진한 색, 적은 국가는 연한 색으로 표시되어 세계 인구 분포를 직관적으로 이해할 수 있습니다. 코로플레스는 선거 결과, 질병 확산, 경제 지표, 기후 데이터 등 지역적 차이가 중요한 모든 데이터에 활용됩니다. 뉴스와 연구 논문에서 가장 많이 사용되는 지도 시각화 방식입니다.
  - type: code
    language: python
    title: 기본 지도
    description: px.choropleth 기본 사용
    content: |-
      figChoropleth = px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop'
      )
      figChoropleth
  - type: tip
    content: px.choropleth(데이터, locations='국가코드컬럼', color='색상값컬럼')이 기본 형태입니다. locations는 ISO 3166-1 alpha-3 국가 코드(KOR, USA, CHN 등)를 담은 컬럼명을 지정합니다. locationmode 파라미터로 'ISO-3'(기본값), 'USA-states', 'country names' 등을 선택할 수 있습니다. color에 지정한 컬럼의 값에 따라 각 국가가 색상으로 채워집니다. 값이 클수록 진한 색, 작을수록 연한 색이 기본 동작입니다. Plotly는 Natural Earth 데이터를 기반으로 전 세계 국가 경계를 내장하고 있어 별도의 지리 데이터 파일(shapefile, GeoJSON)이 필요 없습니다.


- id: step5_color_scale
  title: 5단계. 색상 스케일 변경
  subtitle: color_continuous_scale 첫 등장
  blocks:
  - type: tip
    title: "color_continuous_scale이란?"
    content: "연속적인 숫자 데이터의 색상 팔레트를 지정합니다. 'Viridis', 'Plasma', 'Blues', 'Reds', 'YlOrRd' 등이 있습니다. 인구처럼 값의 범위가 큰 데이터에 유용합니다."
  - type: code
    language: python
    title: 색상 스케일 적용
    description: YlOrRd(노랑-주황-빨강) 스케일
    content: |-
      px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          color_continuous_scale='YlOrRd'
      )


- id: step6_hover
  title: 6단계. 호버 정보 추가
  subtitle: hover_name으로 국가명 표시
  blocks:
  - type: text
    content: 지도에서 각 국가에 마우스를 올렸을 때 국가 이름이 호버 툴팁에 표시되도록 hover_name 파라미터를 추가합니다. 코로플레스 지도는 색상으로 정보를 전달하지만 정확히 어느 국가인지 알기 어려울 때가 많으므로, 호버 기능은 필수적입니다. 특히 작은 국가나 비슷한 색상의 인접 국가들을 구분할 때 매우 유용하며, 사용자가 직접 탐색하며 궁금한 국가의 정보를 즉시 확인할 수 있게 해줍니다. 이는 정적인 지도와 차별화되는 인터랙티브 시각화의 핵심 장점입니다.
  - type: code
    language: python
    title: 호버 정보
    description: hover_name으로 국가명 표시
    content: |-
      px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          hover_name='country',
          color_continuous_scale='YlOrRd'
      )

- id: step7_title_labels
  title: 7단계. 제목과 라벨
  subtitle: title, labels 복습
  blocks:
  - type: text
    content: 이전 프로젝트에서 배운 title과 labels 파라미터를 복습하며 지도에 제목과 한글 라벨을 추가합니다. title은 차트 상단에 표시되어 무엇을 보여주는 시각화인지 명확히 전달하고, labels는 컬럼명을 사용자 친화적인 이름으로 변환하여 가독성을 높입니다. 특히 코로플레스 지도의 색상 막대(colorbar)에도 labels가 적용되어 'pop'이 '인구'로 표시되므로, 영문에 익숙하지 않은 청중도 쉽게 이해할 수 있습니다.
  - type: code
    language: python
    title: 제목과 라벨 추가
    description: title과 labels 적용
    content: |-
      px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          hover_name='country',
          color_continuous_scale='YlOrRd',
          title='2007년 세계 인구 분포',
          labels={'pop': '인구'}
      )

- id: step8_update_layout
  title: 8단계. 레이아웃 수정
  subtitle: update_layout 복습
  blocks:
  - type: text
    content: update_layout() 메서드를 사용하여 지도의 시각적 스타일을 세밀하게 조정합니다. geo=dict()를 통해 지도 전용 설정을 제어하며, showframe은 지도 테두리 표시 여부, showcoastlines는 해안선 표시 여부, projection_type은 지도 투영법을 지정합니다. margin=dict()로 차트 여백을 조절하여 지도가 화면을 최대한 활용하도록 만들 수 있습니다. 이런 레이아웃 최적화는 특히 발표나 보고서에서 제한된 공간을 효율적으로 사용하는 데 중요합니다.
  - type: code
    language: python
    title: 레이아웃 수정
    description: 지도 투영법과 여백 조절
    content: |-
      figLayout = px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          hover_name='country',
          color_continuous_scale='YlOrRd',
          title='2007년 세계 인구 분포',
          labels={'pop': '인구'}
      )
      figLayout.update_layout(
          geo=dict(
              showframe=False,
              showcoastlines=True,
              projection_type='natural earth'
          ),
          margin=dict(l=0, r=0, t=50, b=0)
      )
      figLayout

- id: step9_projection
  title: 9단계. 다양한 투영법
  subtitle: projection_type 옵션
  blocks:
  - type: text
    content: 지도 투영법(projection)을 변경하면 같은 데이터도 완전히 다른 느낌으로 보여줄 수 있습니다. 'equirectangular'는 직사각형 형태로 전통적인 세계지도 느낌을 주고, 'orthographic'는 지구본처럼 둥근 모양으로 3D 느낌을 강조하며, 'natural earth'는 곡선이 자연스러운 타협안입니다. 각 투영법은 면적, 거리, 각도 중 일부를 왜곡하는 대신 다른 요소를 정확히 보존하므로, 전달하려는 메시지에 따라 적절한 투영법을 선택하는 것이 중요합니다. 예를 들어 극지방을 강조하려면 'orthographic'가, 대륙 간 비교에는 'natural earth'가 적합합니다.
  - type: code
    language: python
    title: 지구본 스타일
    description: orthographic 투영법
    content: |-
      figGlobe = px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          hover_name='country',
          color_continuous_scale='Plasma',
          title='지구본 스타일 세계 인구'
      )
      figGlobe.update_layout(
          geo=dict(
              showframe=False,
              projection_type='orthographic'
          )
      )
      figGlobe

- id: step10_final
  title: 10단계. 최종 결과물
  subtitle: 완성된 세계 인구 지도
  blocks:
  - type: text
    content: |-
      지금까지 단계별로 배운 모든 요소(iso_alpha 매칭, color_continuous_scale, hover_name, hover_data, labels, geo 설정, colorbar 포맷)를 종합하여 전문적인 수준의 코로플레스 맵을 완성합니다. hover_data에 대륙, 기대수명, GDP까지 추가하여 마우스 오버만으로 국가의 종합적인 정보를 파악할 수 있게 하고, coloraxis_colorbar의 tickformat으로 인구를 '.2s' 형식(예: 1.2B)으로 간결하게 표시합니다. 이렇게 세심하게 스타일링된 지도는 보고서나 프레젠테이션에서 높은 완성도를 보여줍니다.
  - type: code
    language: python
    title: 완성된 코로플레스 맵
    description: 모든 스타일링 적용
    content: |-
      figFinal = px.choropleth(
          df2007,
          locations='iso_alpha',
          color='pop',
          hover_name='country',
          hover_data=['continent', 'lifeExp', 'gdpPercap'],
          color_continuous_scale='YlOrRd',
          title='2007년 세계 인구 분포',
          labels={
              'pop': '인구',
              'continent': '대륙',
              'lifeExp': '기대수명',
              'gdpPercap': '1인당 GDP'
          }
      )
      figFinal.update_layout(
          geo=dict(
              showframe=False,
              showcoastlines=True,
              coastlinecolor='Gray',
              projection_type='natural earth'
          ),
          margin=dict(l=0, r=0, t=50, b=0),
          coloraxis_colorbar=dict(
              title='인구',
              tickformat='.2s'
          )
      )
      figFinal

- id: practice
  title: 실습
  subtitle: 세계 지도 프로젝트
  blocks:
  - type: text
    content: 지금까지 배운 코로플레스 기법을 활용하여 다양한 주제의 세계 지도를 만들어봅시다. 대륙별 색상 분류, 기대수명 분포, GDP 로그 스케일, 특정 지역 확대 등 각 미션은 서로 다른 데이터 변환과 시각화 옵션을 조합하여 실무에서 자주 마주치는 다양한 분석 상황을 연습할 수 있도록 설계되었습니다. 각 지도는 다른 인사이트를 전달하며, 어떤 변수를 어떻게 시각화하느냐에 따라 메시지가 완전히 달라진다는 것을 체험할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 대륙별 색상으로 세계 지도"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import plotly.express as px
        import pandas as pd

        world = px.data.gapminder()
        world2007 = world.query('year == 2007')
    - type: code
      title: "차트 생성"
      content: |-
        chart = px.choropleth(
            world2007,
            locations='iso_alpha',
            color='continent',
            hover_name='country',
            title='2007년 대륙별 국가 분포'
        )
        chart.update_layout(geo=dict(showframe=False))
        chart
  - type: expansion
    title: "미션2: 아시아만 확대한 인구 지도"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import plotly.express as px
        import pandas as pd

        gapMap = px.data.gapminder()
        asiaMap = gapMap.query('year == 2007 and continent == "Asia"')
    - type: code
      title: "차트 생성"
      content: |-
        canvas = px.choropleth(
            asiaMap,
            locations='iso_alpha',
            color='pop',
            hover_name='country',
            color_continuous_scale='Reds',
            title='2007년 아시아 인구 분포'
        )
        canvas.update_layout(
            geo=dict(
                showframe=False,
                scope='asia',
                projection_type='natural earth'
            ),
            margin=dict(l=0, r=0, t=50, b=0)
        )
        canvas

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 코로플레스 지도를 배웠습니다.
  - type: list
    items:
    - "px.choropleth() - 국가별 색상 지도"
    - "locations='iso_alpha' - 3자리 국가 코드로 식별"
    - "color_continuous_scale - 연속 색상 팔레트"
    - "update_layout(geo=dict(...)) - 지도 투영법, 해안선 설정"
    - "projection_type - 'natural earth', 'orthographic' 등"
  - type: text
    content: 다음 시간에는 애니메이션으로 시간에 따른 세계 변화를 표현합니다.
