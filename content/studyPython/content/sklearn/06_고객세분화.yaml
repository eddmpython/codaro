meta:
  id: sklearn_06
  title: 고객세분화
  order: 6
  category: sklearn
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["클러스터링", "KMeans", "엘보우", "실루엣", "세분화"]
  seo:
    title: "scikit-learn 클러스터링 - K-Means 고객 세분화"
    description: "K-Means로 고객을 군집화합니다. 엘보우 방법과 실루엣 점수로 최적 K를 찾습니다."
    keywords: ["scikit-learn", "KMeans", "클러스터링", "엘보우", "실루엣"]

intro:
  emoji: "👥"
  goal: K-Means 클러스터링으로 고객을 세분화합니다.
  description: 비지도 학습의 대표 알고리즘인 K-Means를 배웁니다. 엘보우 방법과 실루엣 점수로 최적의 군집 수를 찾고, PCA로 결과를 시각화합니다. 이전 프로젝트의 StandardScaler, PCA를 복습하고 클러스터링을 새로 배웁니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: 클러스터링에 필요한 라이브러리를 불러옵니다. KMeans와 실루엣 점수를 추가로 임포트합니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: sklearn 클러스터링 모듈 임포트
    content: |-
      from sklearn.datasets import make_blobs, make_moons
      from sklearn.preprocessing import StandardScaler
      from sklearn.cluster import KMeans
      from sklearn.metrics import silhouette_score
      from sklearn.decomposition import PCA
      import pandas as pd
      import numpy as np
      import matplotlib.pyplot as plt

- id: step2_data
  title: 2단계. 합성 데이터 생성
  subtitle: make_blobs
  blocks:
  - type: text
    content: make_blobs()로 군집이 있는 합성 데이터를 생성합니다. 실제 고객 데이터 대신 학습용으로 사용합니다. 4개의 군집, 각 군집당 200개 샘플을 생성합니다.
  - type: code
    language: python
    title: 데이터 생성
    description: 4개 군집의 합성 데이터
    content: |-
      X, yTrue = make_blobs(n_samples=800, centers=4, cluster_std=1.0, random_state=42)
      X.shape
  - type: code
    language: python
    title: 데이터 시각화
    description: 원래 군집 확인
    content: |-
      fig, ax = plt.subplots(figsize=(8, 6))
      scatter = ax.scatter(X[:, 0], X[:, 1], c=yTrue, cmap='viridis', alpha=0.6)
      ax.set_xlabel('Feature 1')
      ax.set_ylabel('Feature 2')
      ax.set_title('Original Clusters (Ground Truth)')
      plt.colorbar(scatter, ax=ax)
      fig
  - type: tip
    content: make_blobs는 중심점(centers)과 표준편차(cluster_std)를 지정하여 군집 데이터를 생성합니다. yTrue는 실제 군집 레이블이지만, 클러스터링은 레이블 없이 학습하는 비지도 학습입니다.

- id: step3_scale
  title: 3단계. 스케일링
  subtitle: StandardScaler
  blocks:
  - type: text
    content: K-Means는 유클리드 거리를 사용하므로 스케일링이 중요합니다. 특성 간 스케일이 다르면 거리 계산이 왜곡됩니다.
  - type: code
    language: python
    title: 스케일링
    description: 표준화 적용
    content: |-
      scaler = StandardScaler()
      xSc = scaler.fit_transform(X)

- id: step4_kmeans
  title: 4단계. K-Means 기본
  subtitle: n_clusters=4
  blocks:
  - type: text
    content: K-Means는 K개의 군집 중심(centroid)을 찾아 데이터를 가장 가까운 중심에 할당합니다. n_clusters로 군집 수를 지정합니다. 실제로는 최적 K를 모르므로 여러 값을 시도해야 합니다.
  - type: code
    language: python
    title: K-Means 학습
    description: 4개 군집으로 클러스터링
    content: |-
      kmeans = KMeans(n_clusters=4, random_state=42, n_init=10)
      labels = kmeans.fit_predict(xSc)
      labels[:20]
  - type: tip
    content: fit_predict()는 fit()과 predict()를 한 번에 수행합니다. n_init=10은 서로 다른 초기화로 10번 실행하여 가장 좋은 결과를 선택합니다.

- id: step5_visualize
  title: 5단계. 결과 시각화
  subtitle: 군집과 중심점
  blocks:
  - type: text
    content: 클러스터링 결과를 시각화합니다. 군집 중심(centroid)도 함께 표시합니다.
  - type: code
    language: python
    title: 군집 시각화
    description: 클러스터링 결과와 중심점
    content: |-
      fig, ax = plt.subplots(figsize=(8, 6))
      scatter = ax.scatter(xSc[:, 0], xSc[:, 1], c=labels, cmap='viridis', alpha=0.6)
      centers = kmeans.cluster_centers_
      ax.scatter(centers[:, 0], centers[:, 1], c='red', marker='X', s=200, label='Centroids')
      ax.set_xlabel('Feature 1')
      ax.set_ylabel('Feature 2')
      ax.set_title('K-Means Clustering Result')
      ax.legend()
      fig

- id: step6_inertia
  title: 6단계. Inertia
  subtitle: 군집 내 거리 합
  blocks:
  - type: text
    content: Inertia는 각 데이터 포인트와 해당 군집 중심 사이 거리의 제곱합입니다. 값이 작을수록 군집이 촘촘합니다. K가 증가하면 inertia는 항상 감소합니다.
  - type: code
    language: python
    title: Inertia 확인
    description: 군집 내 거리 합
    content: |-
      inertia = kmeans.inertia_
      f"Inertia: {inertia:.2f}"
  - type: tip
    content: Inertia = Σ(각 점과 군집 중심 사이 거리²). K=n이면 inertia=0이 됩니다. 따라서 inertia만으로 최적 K를 정하면 안 됩니다.

- id: step7_elbow
  title: 7단계. 엘보우 방법
  subtitle: 최적 K 찾기
  blocks:
  - type: text
    content: 엘보우 방법은 K를 1부터 증가시키며 inertia를 그래프로 그립니다. 급격히 감소하다가 완만해지는 지점(팔꿈치)이 최적 K입니다.
  - type: code
    language: python
    title: 엘보우 그래프
    description: K별 inertia 변화
    content: |-
      inertias = []
      kRange = range(1, 11)

      for k in kRange:
          km = KMeans(n_clusters=k, random_state=42, n_init=10)
          km.fit(xSc)
          inertias.append(km.inertia_)

      fig, ax = plt.subplots(figsize=(8, 5))
      ax.plot(kRange, inertias, 'bo-')
      ax.set_xlabel('Number of Clusters (K)')
      ax.set_ylabel('Inertia')
      ax.set_title('Elbow Method')
      fig
  - type: tip
    content: 그래프에서 "팔꿈치" 모양이 나타나는 지점을 찾습니다. 이 예시에서는 K=4 근처에서 기울기가 완만해집니다. 명확하지 않을 때는 실루엣 점수를 함께 사용합니다.

- id: step8_silhouette
  title: 8단계. 실루엣 점수
  subtitle: 군집 품질 평가
  blocks:
  - type: text
    content: 실루엣 점수는 군집이 얼마나 잘 분리되어 있는지 측정합니다. -1~1 사이 값으로, 1에 가까울수록 군집이 잘 나뉘어 있습니다. 0은 군집 경계에 있음, 음수는 잘못된 군집을 의미합니다.
  - type: code
    language: python
    title: 실루엣 점수 계산
    description: K=4일 때 실루엣
    content: |-
      silScore = silhouette_score(xSc, labels)
      f"실루엣 점수: {silScore:.4f}"
  - type: code
    language: python
    title: K별 실루엣 비교
    description: 최적 K 찾기
    content: |-
      silScores = []
      kRange2 = range(2, 11)

      for k in kRange2:
          km = KMeans(n_clusters=k, random_state=42, n_init=10)
          pred = km.fit_predict(xSc)
          silScores.append(silhouette_score(xSc, pred))

      fig, ax = plt.subplots(figsize=(8, 5))
      ax.plot(kRange2, silScores, 'go-')
      ax.set_xlabel('Number of Clusters (K)')
      ax.set_ylabel('Silhouette Score')
      ax.set_title('Silhouette Score by K')
      fig
  - type: tip
    content: 실루엣 점수가 가장 높은 K를 선택합니다. 엘보우와 실루엣이 다른 K를 제안하면, 도메인 지식과 함께 판단합니다.

- id: step9_optimal
  title: 9단계. 최적 K 선택
  subtitle: 종합 분석
  blocks:
  - type: text
    content: 엘보우와 실루엣 결과를 종합하여 최적 K를 선택합니다. 두 방법이 같은 K를 제안하면 더 신뢰할 수 있습니다.
  - type: code
    language: python
    title: 최적 K 결과
    description: K별 성능 요약
    content: |-
      resultDf = pd.DataFrame({
          'K': list(kRange2),
          'Silhouette': silScores,
          'Inertia': inertias[1:]
      })
      resultDf
  - type: code
    language: python
    title: 최적 K
    description: 실루엣 기준 최적값
    content: |-
      optimalK = kRange2[np.argmax(silScores)]
      f"최적 K: {optimalK}"

- id: step10_moons
  title: 10단계. 비선형 데이터
  subtitle: make_moons
  blocks:
  - type: text
    content: K-Means는 구형 군집에 적합합니다. 초승달 모양처럼 비선형 군집에는 잘 작동하지 않습니다. DBSCAN 같은 다른 알고리즘이 필요합니다.
  - type: code
    language: python
    title: 비선형 데이터 생성
    description: 초승달 모양 군집
    content: |-
      xMoon, yMoon = make_moons(n_samples=500, noise=0.1, random_state=42)
      scMoon = StandardScaler()
      xMoonSc = scMoon.fit_transform(xMoon)

      kmMoon = KMeans(n_clusters=2, random_state=42, n_init=10)
      moonLabels = kmMoon.fit_predict(xMoonSc)

      fig, axes = plt.subplots(1, 2, figsize=(12, 5))
      axes[0].scatter(xMoon[:, 0], xMoon[:, 1], c=yMoon, cmap='viridis', alpha=0.6)
      axes[0].set_title('Ground Truth')
      axes[1].scatter(xMoon[:, 0], xMoon[:, 1], c=moonLabels, cmap='viridis', alpha=0.6)
      axes[1].set_title('K-Means Result')
      fig
  - type: tip
    content: K-Means는 군집 중심(centroid)을 기준으로 하므로 볼록한(convex) 군집에만 잘 작동합니다. 복잡한 형태의 군집에는 DBSCAN, Spectral Clustering 등을 사용합니다.

- id: step11_pca
  title: 11단계. 고차원 클러스터링
  subtitle: PCA로 시각화
  blocks:
  - type: text
    content: 실제 데이터는 고차원인 경우가 많습니다. 클러스터링 결과를 PCA로 2차원에 투영하여 시각화합니다.
  - type: code
    language: python
    title: 고차원 데이터 클러스터링
    description: 5차원 데이터 생성 및 PCA 시각화
    content: |-
      xHigh, yHigh = make_blobs(n_samples=500, n_features=5, centers=3, random_state=42)
      scHigh = StandardScaler()
      xHighSc = scHigh.fit_transform(xHigh)

      kmHigh = KMeans(n_clusters=3, random_state=42, n_init=10)
      highLabels = kmHigh.fit_predict(xHighSc)

      pca = PCA(n_components=2)
      xHighPca = pca.fit_transform(xHighSc)

      fig, ax = plt.subplots(figsize=(8, 6))
      scatter = ax.scatter(xHighPca[:, 0], xHighPca[:, 1], c=highLabels, cmap='viridis', alpha=0.6)
      ax.set_xlabel('PC1')
      ax.set_ylabel('PC2')
      ax.set_title('5D Data Clustered, Visualized in 2D')
      plt.colorbar(scatter, ax=ax)
      fig

- id: step12_summary
  title: 12단계. 정리
  subtitle: 클러스터링 완료
  blocks:
  - type: text
    content: 이번 프로젝트에서는 K-Means 클러스터링으로 데이터를 군집화하는 방법을 배웠습니다. 엘보우 방법과 실루엣 점수로 최적 K를 찾고, PCA로 결과를 시각화했습니다. 비지도 학습의 핵심 개념을 익혔습니다.
  - type: code
    language: python
    title: 최종 요약
    description: 주요 결과 정리
    content: |-
      summary = pd.DataFrame({
          'Item': ['Algorithm', 'Optimal K', 'Silhouette', 'Method'],
          'Value': ['K-Means', str(optimalK), f'{max(silScores):.4f}', 'Elbow + Silhouette']
      })
      summary

- id: practice
  title: 실습
  subtitle: 고객 세분화 프로젝트
  blocks:
  - type: text
    content: 마케팅 분석가가 되어 고객 세분화 시스템을 구축합니다. 각 미션은 데이터 생성부터 클러스터링, 평가까지 전 과정을 독립적으로 수행합니다. make_blobs, StandardScaler, KMeans, silhouette_score, PCA를 모두 활용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 군집 수(centers) 변화에 따른 최적 K 분석"
    code: |-
      from sklearn.datasets import make_blobs
      from sklearn.preprocessing import StandardScaler
      from sklearn.cluster import KMeans
      from sklearn.metrics import silhouette_score
      import pandas as pd

      results = []
      centersList = [3, 5, 7]

      for c in centersList:
          xData, yData = make_blobs(n_samples=600, centers=c, cluster_std=1.0, random_state=42)
          sc = StandardScaler()
          xSc = sc.fit_transform(xData)

          silScores = []
          for k in range(2, 10):
              km = KMeans(n_clusters=k, random_state=42, n_init=10)
              pred = km.fit_predict(xSc)
              silScores.append(silhouette_score(xSc, pred))

          optK = range(2, 10)[silScores.index(max(silScores))]
          results.append({'True Centers': c, 'Optimal K': optK, 'Best Silhouette': max(silScores)})

      pd.DataFrame(results)
  - type: expansion
    title: "미션2: 노이즈(cluster_std) 변화에 따른 군집 품질"
    code: |-
      from sklearn.datasets import make_blobs
      from sklearn.preprocessing import StandardScaler
      from sklearn.cluster import KMeans
      from sklearn.metrics import silhouette_score
      import pandas as pd

      stdList = [0.5, 1.0, 2.0, 3.0]
      results = []

      for std in stdList:
          xNoise, yNoise = make_blobs(n_samples=400, centers=4, cluster_std=std, random_state=42)
          sc = StandardScaler()
          xNoiseSc = sc.fit_transform(xNoise)

          km = KMeans(n_clusters=4, random_state=42, n_init=10)
          pred = km.fit_predict(xNoiseSc)
          sil = silhouette_score(xNoiseSc, pred)

          results.append({'cluster_std': std, 'Silhouette': sil, 'Inertia': km.inertia_})

      pd.DataFrame(results)
