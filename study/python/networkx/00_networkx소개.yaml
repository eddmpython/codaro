intro:
  emoji: "🕸️"
  goal: NetworkX가 무엇이고 어떤 문제를 해결하는지 알아봅니다.
  description: NetworkX는 그래프(네트워크) 구조를 생성하고 분석하는 파이썬 라이브러리입니다. 소셜 네트워크, 교통망, 웹 링크, 분자 구조 등 연결된 데이터를 다룹니다. 노드(점)와 엣지(선)로 구성된 네트워크의 특성을 분석합니다.

sections:
- id: what_is_networkx
  title: NetworkX란?
  subtitle: 그래프 분석 라이브러리
  blocks:
  - type: text
    content: "NetworkX는 복잡한 네트워크를 쉽게 다루는 파이썬 라이브러리입니다. 2002년 Los Alamos National Laboratory에서 Aric Hagberg, Dan Schult, Pieter Swart에 의해 개발되었으며, 현재 네트워크 과학 연구와 실무에서 가장 널리 사용되는 그래프 분석 도구입니다. 사회과학, 생물학, 물리학, 컴퓨터 과학 등 다양한 분야에서 네트워크 데이터를 분석할 때 표준처럼 사용됩니다."
  - type: text
    content: "그래프(Graph)는 수학과 컴퓨터 과학에서 연결 구조를 표현하는 추상적 모델입니다. 노드(Node, 또는 정점 Vertex)는 사람, 장소, 개념 등 분석 대상이 되는 개체를 나타내고, 엣지(Edge, 또는 간선)는 친구 관계, 도로 연결, 하이퍼링크 등 개체 간의 관계를 나타냅니다. 이런 추상화 덕분에 전혀 다른 도메인의 문제들을 동일한 수학적 프레임워크로 분석할 수 있습니다."
  - type: tip
    content: "그래프 이론은 1736년 수학자 레온하르트 오일러가 '쾨니히스베르크 다리 문제'를 해결하면서 탄생했습니다. 당시 프로이센의 쾨니히스베르크(현재 러시아 칼리닌그라드) 도시에는 7개의 다리가 있었는데, 모든 다리를 정확히 한 번씩만 건너서 도시를 산책할 수 있는지가 문제였습니다. 오일러는 이것이 불가능함을 증명하면서 그래프 이론의 기초를 세웠습니다."

- id: graph_types
  title: 그래프의 종류
  subtitle: 무방향, 방향, 가중치
  blocks:
  - type: text
    content: "**무방향 그래프(Undirected Graph)**는 엣지에 방향이 없는 그래프입니다. A와 B가 연결되어 있으면 B에서 A로도, A에서 B로도 이동할 수 있습니다. 페이스북 친구 관계가 대표적인 예시입니다. 내가 누군가의 친구면 그 사람도 내 친구이기 때문입니다. 양방향 도로, 동료 관계, 공저자 관계 등도 무방향 그래프로 모델링합니다."
  - type: text
    content: "**방향 그래프(Directed Graph, DiGraph)**는 엣지에 방향이 있는 그래프입니다. A→B 연결이 있다고 해서 B→A 연결이 자동으로 존재하지 않습니다. 트위터나 인스타그램의 팔로우 관계가 대표적입니다. 내가 연예인을 팔로우한다고 해서 연예인이 나를 팔로우하지는 않습니다. 웹 페이지 링크, 논문 인용, 이메일 발송 등도 방향 그래프로 모델링합니다."
  - type: text
    content: "**가중치 그래프(Weighted Graph)**는 엣지에 가중치(숫자 값)가 부여된 그래프입니다. 단순히 연결 여부만 표현하는 것이 아니라 연결의 강도, 비용, 거리 등을 함께 표현합니다. 도시 간 도로망에서 거리나 소요 시간, 소셜 네트워크에서 상호작용 빈도, 전자상거래에서 고객 간 유사도 점수 등이 가중치가 됩니다. 최단 경로를 찾을 때 가중치가 중요한 역할을 합니다."
  - type: tip
    content: "NetworkX는 4가지 기본 그래프 클래스를 제공합니다. Graph는 무방향 그래프, DiGraph는 방향 그래프입니다. MultiGraph와 MultiDiGraph는 같은 노드 쌍 사이에 여러 개의 엣지를 허용하는 다중 그래프입니다. 예를 들어 서울-부산 사이에 KTX, 고속버스, 비행기 등 여러 경로가 있을 때 MultiGraph를 사용합니다."

- id: real_world_networks
  title: 실제 네트워크 예시
  subtitle: 어디서 사용될까?
  blocks:
  - type: text
    content: "**소셜 네트워크**는 사람들 간의 관계를 분석하는 대표적인 네트워크입니다. 페이스북의 친구 관계, 트위터/인스타그램의 팔로우 관계, 링크드인의 비즈니스 연결, 카카오톡의 친구 목록 등이 여기에 해당합니다. 네트워크 분석을 통해 가장 영향력 있는 인플루언서를 찾거나, 비슷한 관심사를 가진 사용자 그룹(커뮤니티)을 탐지하거나, 친구 추천 알고리즘을 만들 수 있습니다."
  - type: text
    content: "**교통 네트워크**는 물리적인 이동 경로를 분석합니다. 도로망에서 노드는 교차로, 엣지는 도로가 됩니다. 지하철 노선도에서 노드는 역, 엣지는 노선입니다. 항공 네트워크에서 노드는 공항, 엣지는 항공편입니다. 네비게이션의 최단 경로 안내, 물류 최적화, 교통 혼잡 구간 분석 등에 활용됩니다. 배달 앱이 여러 주문을 효율적으로 처리하는 경로를 찾는 것도 네트워크 분석입니다."
  - type: text
    content: "**생물학 네트워크**는 생명 현상의 복잡한 상호작용을 분석합니다. 단백질-단백질 상호작용 네트워크(PPI)에서는 단백질이 노드, 물리적 결합이 엣지입니다. 유전자 조절 네트워크에서는 유전자가 노드, 조절 관계가 엣지입니다. 뇌의 신경망에서는 뉴런이 노드, 시냅스가 엣지입니다. 이를 통해 질병의 핵심 유전자를 발견하거나, 신약 타겟을 선정하거나, 뇌 기능을 이해합니다."
  - type: text
    content: "**정보 네트워크**는 디지털 정보의 연결 구조를 분석합니다. 월드와이드웹(WWW)에서 노드는 웹 페이지, 엣지는 하이퍼링크입니다. 구글의 PageRank 알고리즘은 웹 그래프 분석으로 탄생했습니다. 학술 논문 인용 네트워크에서는 논문이 노드, 인용 관계가 엣지가 되어 영향력 있는 논문을 찾습니다. 위키피디아 문서 연결을 분석하면 지식의 구조를 이해할 수 있습니다."

- id: key_concepts
  title: 핵심 개념 미리보기
  subtitle: 이 카테고리에서 배울 내용
  blocks:
  - type: text
    content: "**그래프 생성과 탐색**에서는 NetworkX의 기본 사용법을 배웁니다. nx.Graph()로 빈 그래프를 생성하고, add_node()와 add_edge()로 노드와 엣지를 추가합니다. nodes(), edges(), neighbors() 등의 메서드로 그래프 구조를 탐색하고, 노드/엣지에 속성(attribute)을 부여하는 방법도 익힙니다. 이것이 모든 네트워크 분석의 기초가 됩니다."
  - type: text
    content: "**경로 탐색**에서는 두 노드 사이의 연결 관계를 분석합니다. shortest_path()로 최단 경로를 찾고, shortest_path_length()로 거리(홉 수)를 계산합니다. has_path()로 연결 여부를 확인하고, all_simple_paths()로 가능한 모든 경로를 열거합니다. 가중치 그래프에서는 다익스트라(Dijkstra) 알고리즘을 사용해 실제 최단 거리를 구합니다."
  - type: text
    content: "**중심성 분석(Centrality)**에서는 네트워크에서 중요한 노드를 찾는 다양한 방법을 배웁니다. 연결 중심성(Degree)은 연결 수가 많은 노드, 매개 중심성(Betweenness)은 다른 노드들을 연결하는 다리 역할을 하는 노드, 근접 중심성(Closeness)은 다른 노드들과 평균적으로 가까운 노드, 고유벡터 중심성(Eigenvector)은 영향력 있는 노드들과 연결된 노드를 찾습니다."
  - type: text
    content: "**클러스터링과 커뮤니티**에서는 네트워크 내의 군집 구조를 분석합니다. 클러스터링 계수(Clustering Coefficient)는 노드 주변의 삼각형 밀도를 측정합니다. 내 친구들끼리도 서로 친구인지를 나타냅니다. 커뮤니티 탐지(Community Detection)는 네트워크를 의미 있는 그룹으로 분할합니다. 모듈성(Modularity) 최적화, 레이블 전파 등의 알고리즘을 사용합니다."
  - type: text
    content: "**그래프 알고리즘**에서는 컴퓨터 과학의 고전적인 그래프 알고리즘을 실습합니다. BFS(너비 우선 탐색)와 DFS(깊이 우선 탐색)는 그래프 순회의 기본입니다. 최소 신장 트리(MST)는 모든 노드를 최소 비용으로 연결합니다. 위상 정렬(Topological Sort)은 선후관계가 있는 작업의 순서를 정합니다."
  - type: text
    content: "**시각화**에서는 matplotlib과 연동하여 네트워크를 그림으로 표현합니다. nx.draw()로 기본 시각화를 하고, spring_layout, circular_layout 등 다양한 레이아웃 알고리즘으로 노드 배치를 결정합니다. 노드 크기를 중심성에 비례하게 하거나, 커뮤니티별로 다른 색상을 지정하는 등 의미 있는 시각화를 만듭니다."

- id: networkx_features
  title: NetworkX 특징
  subtitle: 왜 NetworkX인가?
  blocks:
  - type: text
    content: "**순수 파이썬으로 작성**되어 별도의 컴파일이나 C 확장 설치 없이 어디서든 실행됩니다. pip install networkx 한 줄로 설치가 끝납니다. 특히 Pyodide(브라우저에서 실행되는 파이썬)에서도 완벽하게 동작하기 때문에, 이 강의처럼 웹 브라우저에서 직접 네트워크 분석을 실습할 수 있습니다. 서버 설치 없이 클라이언트 측에서 모든 연산이 가능합니다."
  - type: text
    content: "**수백 개의 알고리즘이 내장**되어 있어 대부분의 네트워크 분석을 직접 구현할 필요가 없습니다. 최단 경로(다익스트라, 벨만-포드, A*), 중심성(연결, 매개, 근접, 고유벡터, PageRank), 커뮤니티 탐지(모듈성, 레이블 전파), 그래프 매칭, 네트워크 플로우, 이분 그래프, 평면 그래프 등 네트워크 과학의 거의 모든 알고리즘을 함수 한 줄로 호출할 수 있습니다."
  - type: text
    content: "**유연한 데이터 모델**을 제공합니다. 노드는 해시 가능한(hashable) 모든 파이썬 객체가 될 수 있습니다. 정수, 문자열, 튜플은 물론이고 사용자 정의 객체도 노드로 사용할 수 있습니다. 노드와 엣지에 딕셔너리 형태로 속성을 자유롭게 추가할 수 있어서, 사람 노드에 나이/성별/직업 속성을 부여하거나 도로 엣지에 거리/제한속도/차선수 속성을 부여할 수 있습니다."
  - type: text
    content: "**유명한 네트워크 데이터셋이 내장**되어 있어 바로 실습을 시작할 수 있습니다. karate_club_graph()는 Wayne Zachary가 1970년대에 수집한 가라테 클럽 회원 34명의 소셜 네트워크로, 네트워크 과학에서 가장 유명한 데이터입니다. les_miserables_graph()는 빅토르 위고의 소설 레미제라블 등장인물 77명의 관계를 담고 있습니다. florentine_families_graph()는 15세기 피렌체 명문 가문들의 결혼 관계입니다."
  - type: tip
    content: "대규모 그래프(수백만 개 이상의 노드)를 다룰 때는 C로 작성된 igraph나 graph-tool이 더 빠릅니다. 하지만 NetworkX는 API가 직관적이고 문서가 풍부해서 프로토타이핑, 교육, 중소규모 분석에 최적입니다. 실무에서도 데이터 크기가 적당하다면 NetworkX로 충분합니다."

- id: learning_path
  title: 학습 순서
  subtitle: 10개 프로젝트 로드맵
  blocks:
  - type: text
    content: "**입문 단계 (프로젝트 01-02)**에서는 NetworkX의 기본기를 다집니다. 첫 번째 프로젝트에서는 빈 그래프를 생성하고 노드와 엣지를 추가하는 방법, 그래프 정보를 조회하는 방법, matplotlib으로 시각화하는 방법을 배웁니다. 두 번째 프로젝트에서는 방향 그래프(DiGraph)와 가중치 그래프를 다루며, 엣지에 속성을 부여하고 활용하는 방법을 익힙니다."
  - type: text
    content: "**기초 단계 (프로젝트 03-05)**에서는 네트워크 분석의 핵심 개념을 배웁니다. 세 번째 프로젝트에서는 최단 경로를 찾는 다양한 알고리즘을 실습합니다. 네 번째 프로젝트에서는 중심성(Centrality) 지표들을 계산하고 비교하여 네트워크에서 중요한 노드를 찾습니다. 다섯 번째 프로젝트에서는 실제 소셜 네트워크 데이터(가라테 클럽)를 분석하며 배운 개념들을 종합합니다."
  - type: text
    content: "**중급 단계 (프로젝트 06-08)**에서는 네트워크의 구조적 특성을 깊이 분석합니다. 여섯 번째 프로젝트에서는 연결성(Connectivity)을 분석하여 네트워크가 얼마나 견고한지 평가합니다. 일곱 번째 프로젝트에서는 커뮤니티 탐지(Community Detection) 알고리즘으로 네트워크 내의 그룹을 발견합니다. 여덟 번째 프로젝트에서는 BFS, DFS, 최소 신장 트리 등 고전적인 그래프 알고리즘을 실습합니다."
  - type: text
    content: "**심화 단계 (프로젝트 09-10)**에서는 고급 주제를 다루고 모든 개념을 통합합니다. 아홉 번째 프로젝트에서는 랜덤 그래프 모델을 배웁니다. Erdős-Rényi 모델은 무작위 연결, Barabási-Albert 모델은 허브가 있는 척도 없는 네트워크, Watts-Strogatz 모델은 작은 세상 네트워크를 생성합니다. 열 번째 프로젝트에서는 실전 데이터로 종합 네트워크 분석 프로젝트를 수행합니다."
  - type: tip
    content: "각 프로젝트는 독립적으로 실행할 수 있지만, 순서대로 진행하면 개념이 점진적으로 쌓여서 더 효과적입니다. 앞선 프로젝트에서 배운 개념은 뒤 프로젝트에서 반복 사용되므로, 자연스럽게 복습과 심화가 이루어집니다."

- id: no_data_needed
  title: 데이터셋 불필요
  subtitle: 그래프 직접 생성
  blocks:
  - type: text
    content: "이 카테고리는 외부 CSV나 JSON 파일을 다운로드할 필요가 없습니다. NetworkX는 그래프를 직접 생성하는 함수들과 유명한 네트워크 데이터셋을 내장하고 있어서, 별도의 데이터 로딩 과정 없이 바로 네트워크 분석을 시작할 수 있습니다. 데이터 전처리에 시간을 쓰지 않고 네트워크 분석 개념 자체에 집중할 수 있는 것이 장점입니다."
  - type: text
    content: "**그래프 생성 함수**들은 특정 구조를 가진 그래프를 한 줄로 만들어줍니다. complete_graph(n)은 n개 노드가 모두 서로 연결된 완전 그래프를 생성합니다. path_graph(n)은 일렬로 연결된 경로 그래프, cycle_graph(n)은 원형으로 연결된 순환 그래프, star_graph(n)은 중심 노드에서 n개 노드가 뻗어나가는 별 그래프를 생성합니다. grid_2d_graph(m, n)은 m×n 격자 그래프를 만듭니다."
  - type: text
    content: "**내장 네트워크 데이터셋**은 실제 연구에 사용된 유명한 네트워크들입니다. karate_club_graph()는 1977년 Wayne Zachary가 수집한 대학 가라테 클럽 회원 34명의 친분 관계로, 네트워크 과학 논문에서 가장 많이 인용되는 데이터입니다. les_miserables_graph()는 소설 레미제라블에서 같은 장에 등장하는 인물 77명의 공동 출현 네트워크입니다. florentine_families_graph()는 15세기 피렌체의 15개 명문 가문 간 결혼 및 사업 관계입니다."
  - type: text
    content: "**랜덤 그래프 생성 함수**들은 특정 확률 모델에 따라 그래프를 생성합니다. erdos_renyi_graph(n, p)는 n개 노드 중 각 노드 쌍이 확률 p로 연결되는 가장 기본적인 랜덤 그래프입니다. barabasi_albert_graph(n, m)은 '부익부' 현상으로 허브가 생기는 척도 없는 네트워크를 생성합니다. watts_strogatz_graph(n, k, p)는 높은 클러스터링과 짧은 평균 경로를 가진 '작은 세상' 네트워크를 생성합니다."
  - type: tip
    content: "데이터 로딩 코드 없이 바로 분석을 시작할 수 있어서 학습에 집중할 수 있습니다. 나중에 실전 프로젝트에서 외부 데이터를 사용할 때는 nx.from_pandas_edgelist()나 nx.read_edgelist() 등으로 데이터프레임이나 파일에서 그래프를 생성할 수 있습니다."
