meta:
  id: altair_01
  title: 자동차연비탐색
  order: 1
  category: altair
  difficulty: "⭐"
  badge: 입문
  tags: ["mpg", "scatter", "point", "기초"]
  seo:
    title: "Altair 산점도 - 마력과 연비 관계 분석"
    description: "mpg 데이터로 마력과 연비의 관계를 산점도로 시각화합니다. mark_point, encode, 데이터 타입 지정법을 배웁니다."
    keywords: ["altair", "mark_point", "산점도", "mpg", "연비분석"]

intro:
  emoji: "🚗"
  goal: 마력과 연비의 관계를 산점도로 시각화합니다.
  description: Altair로 첫 번째 시각화를 만듭니다. 데이터 로드, 마크 선택, 인코딩의 기본 흐름을 익힙니다.

sections:
- id: step1_import
  title: 1단계. 데이터 불러오기
  subtitle: seaborn-data
  blocks:
  - type: text
    content: |-
      GitHub에서 mpg 데이터를 불러옵니다. mpg는 자동차의 연비(mpg), 마력(horsepower), 생산국(origin) 등 정보가 담긴 데이터입니다.

      pandas는 데이터 분석을 위한 도구이고, read_csv()는 CSV 파일을 읽어오는 함수입니다. 괄호 안에 URL을 넣으면 인터넷에서 직접 데이터를 가져옵니다.

      Altair는 시각화 라이브러리로, 데이터를 차트로 만들어줍니다.
  - type: code
    language: python
    title: 라이브러리와 데이터 불러오기
    description: altair와 mpg 데이터를 불러옵니다
    content: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')

      mpgUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
      mpg = pd.read_csv(mpgUrl)
  - type: tip
    content: |-
      import는 "가져오다"라는 뜻으로, 다른 사람이 만든 도구를 가져와서 사용하겠다는 의미입니다. as alt는 "altair를 alt라는 짧은 이름으로 부르겠다"는 뜻입니다.

      warnings.filterwarnings()는 불필요한 경고 메시지를 숨기는 코드입니다. 차트 기능에는 영향이 없으니 신경 쓰지 않아도 됩니다.

- id: step2_explore
  title: 2단계. 데이터 확인
  subtitle: 컬럼 구조 파악
  blocks:
  - type: text
    content: |-
      어떤 컬럼(열, 항목)이 있는지 확인합니다. 컬럼은 데이터의 종류를 나타냅니다.

      name(차량명), mpg(연비), horsepower(마력), origin(생산국) 등이 있습니다. head()는 데이터의 처음 5줄을 보여주는 함수로, 점(.)으로 연결하여 사용합니다.

      마력과 연비의 관계를 분석해보겠습니다.
  - type: code
    language: python
    title: 데이터 미리보기
    description: 처음 5행을 확인합니다
    content: |-
      mpg.head()

- id: step3_first_scatter
  title: 3단계. 첫 번째 산점도
  subtitle: mark_point, encode
  blocks:
  - type: text
    content: |-
      Altair의 기본 구조는 Chart(데이터).mark_종류().encode(인코딩)입니다. 이 문장을 세 부분으로 나누어 이해해봅시다.

      첫째, Chart(데이터)는 차트 객체를 만듭니다. 괄호 안에 시각화할 데이터를 넣습니다.

      둘째, mark_point()는 "점으로 그리겠다"는 의미입니다. 점 대신 선, 막대 등 다른 모양도 가능합니다.

      셋째, encode()는 "인코딩한다", 즉 "어떤 데이터를 어디에 표시할지 지정한다"는 뜻입니다. x축과 y축에 어떤 컬럼을 매핑할지 지정합니다.
  - type: code
    language: python
    title: 기본 산점도
    description: 마력(x축)과 연비(y축)를 점으로 표현합니다
    content: |-
      alt.Chart(mpg).mark_point().encode(
          x='horsepower',
          y='mpg'
      )
  - type: tip
    content: |-
      점(.)으로 여러 함수를 연결하는 것을 "메서드 체이닝"이라고 합니다. Chart()로 차트를 만들고, mark_point()로 점으로 그리겠다고 하고, encode()로 어떤 데이터를 x, y축에 넣을지 지정하는 과정이 연결된 것입니다.

      encode() 괄호 안에서 x='horsepower'는 "x축에 horsepower 컬럼을 사용하겠다"는 뜻입니다. 등호(=)는 "할당한다"는 의미입니다.

- id: step4_datatype
  title: 4단계. 데이터 타입 지정
  subtitle: ":Q, :N"
  blocks:
  - type: text
    content: |-
      Altair는 컬럼명 뒤에 콜론(:)과 타입 약어를 붙여 데이터 타입을 명시합니다. 'horsepower:Q'처럼 작은따옴표 안에 컬럼명과 타입을 함께 씁니다.

      :Q는 Quantitative(수량형)의 약자로, 숫자를 의미합니다. 마력, 연비 같은 연속적인 숫자 데이터에 사용합니다.

      :N은 Nominal(명목형)의 약자로, 카테고리를 의미합니다. 생산국, 색상 같은 그룹 이름에 사용합니다.

      타입을 명시하면 Altair가 적절한 축 스케일과 범례를 자동으로 설정해줍니다.
  - type: code
    language: python
    title: 데이터 타입 명시
    description: x, y에 :Q를 붙여 수량형임을 명시합니다
    content: |-
      alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q'
      )
  - type: tip
    content: ":Q(수량형)는 연속적인 숫자, :N(명목형)는 카테고리, :O(순서형)는 순서가 있는 카테고리, :T(시계열)는 날짜/시간을 의미합니다."

- id: step5_color
  title: 5단계. 색상 인코딩
  subtitle: color로 그룹 구분
  blocks:
  - type: text
    content: |-
      color에 origin(생산국)을 지정하면 usa, europe, japan 자동차를 색상으로 구분할 수 있습니다.

      origin은 숫자가 아니라 그룹 이름(카테고리)이므로 :N(명목형)을 붙입니다.

      encode() 괄호 안에 x, y 외에 color도 추가할 수 있습니다. 쉼표(,)로 구분하여 여러 인코딩을 나열합니다.
  - type: code
    language: python
    title: 생산국별 색상 구분
    description: color='origin:N'으로 생산국별 색상을 지정합니다
    content: |-
      figColor = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N'
      )
      figColor
  - type: tip
    content: |-
      figColor = 이라는 부분은 변수에 값을 저장하는 것입니다. 등호(=) 왼쪽이 변수명, 오른쪽이 저장할 값입니다.

      마지막 줄의 figColor는 저장한 차트를 화면에 표시하라는 의미입니다. 변수명만 쓰면 그 변수에 담긴 내용이 출력됩니다.

- id: step6_tooltip
  title: 6단계. 툴팁 추가
  subtitle: tooltip으로 상세정보
  blocks:
  - type: text
    content: |-
      점 위에 마우스를 올리면 상세 정보를 보여주는 툴팁을 추가합니다.

      tooltip에 보여줄 컬럼들을 리스트로 지정합니다. 리스트는 대괄호 [ ] 안에 여러 항목을 쉼표로 구분하여 나열한 것입니다.

      tooltip=['name', 'horsepower']처럼 작은따옴표로 감싼 컬럼명을 나열하면, 해당 컬럼들의 값이 툴팁에 표시됩니다.
  - type: code
    language: python
    title: 툴팁 추가
    description: 마우스 호버 시 차량명, 마력, 연비를 표시합니다
    content: |-
      figTooltip = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N',
          tooltip=['name', 'horsepower', 'mpg', 'origin']
      )
      figTooltip
  - type: tip
    content: |-
      Marimo 환경에서는 다른 셀에서 같은 변수명을 재사용할 수 없습니다. 따라서 각 셀마다 다른 변수명(figColor, figTooltip, figScatter 등)을 사용해야 합니다.

      같은 셀 안에서는 fig = ... 후 fig.update() 같은 방식으로 같은 변수를 계속 사용할 수 있지만, 다른 셀에서는 새로운 변수명이 필요합니다.

- id: step7_final
  title: 7단계. 최종 결과물
  subtitle: 완성된 산점도
  blocks:
  - type: text
    content: |-
      지금까지 배운 내용을 종합하여 마력-연비 산점도를 완성합니다.

      Chart()로 차트 객체를 만들고, mark_point()로 점을 그리고, encode()로 x축(마력), y축(연비), 색상(생산국), 툴팁을 모두 지정했습니다.

      이 차트로 미국, 유럽, 일본 자동차의 마력과 연비 관계를 한눈에 비교할 수 있습니다. 마력이 높을수록 연비가 낮아지는 경향이 보입니다.
  - type: code
    language: python
    title: 마력-연비 산점도 완성
    description: 모든 요소를 포함한 최종 시각화입니다
    content: |-
      figScatter = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N',
          tooltip=['name', 'horsepower', 'mpg', 'origin']
      )
      figScatter

- id: practice
  title: 실습
  subtitle: mpg 데이터 시각화 프로젝트
  blocks:
  - type: text
    content: |-
      mpg 데이터로 다양한 산점도를 만들어봅시다. 이 섹션에서 배운 내용을 정리하면 다음과 같습니다.

      Chart()로 차트를 만들고, mark_point()로 점을 그리고, encode()로 축과 색상을 지정하는 기본 흐름을 배웠습니다. :Q는 숫자 데이터, :N은 카테고리 데이터에 사용합니다.

      color로 그룹을 색상으로 구분하고, tooltip으로 마우스 호버 시 상세 정보를 표시할 수 있습니다. 각 미션에서 이 개념들을 모두 활용해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 배기량과 마력의 관계"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        carUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
        car = pd.read_csv(carUrl)
    - type: code
      title: "차트 생성"
      content: |-
        figDisp = alt.Chart(car).mark_point().encode(
            x='displacement:Q',
            y='horsepower:Q',
            color='origin:N',
            tooltip=['name', 'displacement', 'horsepower']
        )
        figDisp
  - type: expansion
    title: "미션2: 무게와 연비의 관계"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        autoUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
        auto = pd.read_csv(autoUrl)
    - type: code
      title: "차트 생성"
      content: |-
        figWeight = alt.Chart(auto).mark_point().encode(
            x='weight:Q',
            y='mpg:Q',
            color='origin:N',
            tooltip=['name', 'weight', 'mpg', 'origin']
        )
        figWeight

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Altair로 첫 산점도를 완성했습니다.
  - type: list
    items:
    - "alt.Chart(data) - 차트 객체 생성"
    - "mark_point() - 점(산점도) 마크 선택"
    - "encode(x, y) - 축에 컬럼 매핑"
    - ":Q - 수량형(Quantitative) 데이터 타입"
    - ":N - 명목형(Nominal) 데이터 타입"
    - "color='컬럼:N' - 색상으로 그룹 구분"
    - "tooltip=[...] - 호버 시 상세정보 표시"
  - type: text
    content: 다음 시간에는 붓꽃 데이터로 circle 마크와 size, shape 인코딩을 배웁니다.
