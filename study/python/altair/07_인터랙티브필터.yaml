meta:
  id: altair_07
  title: 인터랙티브필터
  order: 7
  category: altair
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["selection", "when", "bind", "interactive", "mpg"]
  seo:
    title: "Altair 인터랙티브 - 선택과 필터링"
    description: "Altair로 인터랙티브 차트를 만듭니다. selection, when/then, bind로 동적 필터링을 배웁니다."
    keywords: ["altair interactive", "selection", "when then", "binding"]

intro:
  emoji: "🎮"
  goal: 마우스 클릭과 드래그로 데이터를 동적으로 필터링하는 인터랙티브 차트를 만듭니다.
  description: selection_interval, selection_point, when().then().otherwise(), bind로 인터랙션을 구현합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: seaborn-data
  blocks:
  - type: text
    content: |-
      GitHub에서 mpg(Miles Per Gallon, 연비) 데이터를 불러옵니다. 1970-1980년대 자동차들의 연비 정보가 담긴 데이터입니다.

      horsepower는 마력(엔진 힘), mpg는 연비(갤런당 주행거리), origin은 생산국(usa, europe, japan)을 나타냅니다. 이 데이터로 사용자가 클릭하고 드래그해서 조작할 수 있는 인터랙티브 차트를 만들어봅니다.

      인터랙티브는 "상호작용하는"이라는 뜻으로, 마우스로 차트를 조작하면 차트가 반응하는 것을 의미합니다.
  - type: code
    language: python
    title: mpg 데이터 불러오기
    description: pandas로 CSV 로드
    content: |-
      import altair as alt
      import pandas as pd
      import warnings
      warnings.filterwarnings('ignore', message='.*is_pandas_dataframe.*')

      mpgUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
      mpg = pd.read_csv(mpgUrl)
      mpg.head()

- id: step2_basic_chart
  title: 2단계. 기본 차트
  subtitle: 인터랙션 없는 상태
  blocks:
  - type: text
    content: |-
      먼저 인터랙션이 없는 기본 산점도를 만들어 비교 기준을 마련합니다. 나중에 이 차트에 인터랙션을 추가할 것입니다.

      마력(x축)과 연비(y축)의 관계를 점으로 표시하고, 생산국(origin)마다 다른 색상을 부여합니다. 일반적으로 마력이 높을수록 연비는 낮아지는 경향을 볼 수 있습니다.

      properties()로 차트 크기를 지정합니다. width는 가로 길이, height는 세로 길이입니다.
  - type: code
    language: python
    title: 기본 산점도
    description: 인터랙션 전
    content: |-
      chartBasic = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N'
      ).properties(
          width=500,
          height=300
      )
      chartBasic

- id: step3_interval_selection
  title: 3단계. 영역 선택
  subtitle: selection_interval
  blocks:
  - type: text
    content: |-
      이제 차트에 인터랙션을 추가합니다. selection_interval()은 "마우스 드래그로 사각형 영역을 선택할 수 있게 하라"는 명령입니다.

      interval은 "구간"이라는 뜻으로, 차트에서 특정 구간을 드래그해서 선택할 수 있습니다. 이것을 브러싱(brushing, 붓질하듯 영역을 칠한다)이라고 부릅니다.

      brush 변수에 선택 기능을 저장한 뒤, add_params(brush)로 차트에 추가하면 드래그 기능이 활성화됩니다.
  - type: code
    language: python
    title: 브러싱 선택
    description: 드래그로 영역 선택
    content: |-
      brush = alt.selection_interval()

      chartBrush = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(brush).then('origin:N').otherwise(alt.value('lightgray'))
      ).add_params(brush).properties(
          width=500,
          height=300,
          title='드래그로 영역 선택하기'
      )
      chartBrush
  - type: tip
    content: |-
      alt.when().then().otherwise()는 조건문입니다. "만약 ~이면 이렇게 하고, 아니면 저렇게 하라"는 뜻입니다.

      when(brush)는 "brush로 선택되었으면", then('origin:N')은 "생산국 색상을 표시하고", otherwise(alt.value('lightgray'))는 "아니면 회색으로 표시하라"입니다.

      결과적으로 드래그한 영역의 점만 색상이 유지되고, 나머지는 모두 회색으로 바뀌어 선택된 부분이 강조됩니다.

- id: step4_point_selection
  title: 4단계. 클릭 선택
  subtitle: selection_point
  blocks:
  - type: text
    content: |-
      앞에서는 드래그로 영역을 선택했습니다. 이번에는 클릭으로 항목을 선택하는 방법을 배웁니다.

      selection_point()는 "마우스 클릭으로 개별 항목을 선택하게 하라"는 명령입니다. point는 "점"이라는 뜻입니다.

      fields=['origin'] 파라미터는 "origin(생산국) 필드 기준으로 선택하라"는 의미입니다. 범례에서 'usa'를 클릭하면 usa 자동차만 선택되고, 'japan'을 클릭하면 일본 자동차만 선택됩니다.
  - type: code
    language: python
    title: 클릭 선택
    description: 범례 클릭으로 필터
    content: |-
      click = alt.selection_point(fields=['origin'])

      chartClick = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(click).then('origin:N').otherwise(alt.value('lightgray')),
          opacity=alt.when(click).then(alt.value(1)).otherwise(alt.value(0.2))
      ).add_params(click).properties(
          width=500,
          height=300,
          title='범례 클릭으로 생산국 선택'
      )
      chartClick
  - type: tip
    content: |-
      opacity도 when().then().otherwise()로 조절합니다. 선택된 점은 불투명, 나머지는 반투명으로 표시됩니다.

- id: step5_conditional
  title: 5단계. 조건부 스타일링
  subtitle: 다중 속성 변경
  blocks:
  - type: text
    content: |-
      when().then().otherwise()는 색상뿐만 아니라 크기(size), 투명도(opacity) 등 여러 속성에 동시에 적용할 수 있습니다.

      opacity는 "불투명도"를 의미합니다. 값이 1이면 완전히 불투명(진하게), 0이면 완전히 투명(안 보임), 0.3이면 반투명(흐릿하게) 표시됩니다.

      이 코드는 선택된 영역의 점을 크게(size=100), 진하게(opacity=1) 만들고, 선택되지 않은 점은 작게(size=30), 흐릿하게(opacity=0.3) 만들어 대비를 극대화합니다.
  - type: code
    language: python
    title: 다중 조건부 스타일
    description: 색상+크기+투명도
    content: |-
      brushStyle = alt.selection_interval()

      chartCondition = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color=alt.when(brushStyle).then('origin:N').otherwise(alt.value('lightgray')),
          size=alt.when(brushStyle).then(alt.value(100)).otherwise(alt.value(30)),
          opacity=alt.when(brushStyle).then(alt.value(1)).otherwise(alt.value(0.3))
      ).add_params(brushStyle).properties(
          width=500,
          height=300,
          title='선택 영역 강조'
      )
      chartCondition

- id: step6_slider
  title: 6단계. 슬라이더 바인딩
  subtitle: binding_range
  blocks:
  - type: text
    content: |-
      지금까지는 마우스로 직접 차트를 클릭하거나 드래그했습니다. 이번에는 슬라이더라는 UI 위젯을 만들어봅니다.

      binding_range()는 "범위(range) 슬라이더를 만들어 연결(binding)하라"는 뜻입니다. min은 최솟값, max는 최댓값, step은 한 칸의 간격, name은 슬라이더 옆에 표시될 이름입니다.

      alt.param()으로 파라미터를 만듭니다. name은 파라미터 이름, value는 초기값(50), bind는 어떤 위젯과 연결할지 지정합니다. alt.datum.horsepower >= selectHp는 "각 데이터의 마력이 슬라이더 값 이상인가?"를 검사합니다.
  - type: code
    language: python
    title: 슬라이더 필터
    description: 마력 범위 조절
    content: |-
      sliderHp = alt.binding_range(min=0, max=200, step=10, name='최소 마력: ')
      selectHp = alt.param(name='minHorsepower', value=50, bind=sliderHp)

      chartSlider = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N',
          opacity=alt.when(
              alt.datum.horsepower >= selectHp
          ).then(alt.value(1)).otherwise(alt.value(0.1))
      ).add_params(selectHp).properties(
          width=500,
          height=300,
          title='슬라이더로 마력 필터링'
      )
      chartSlider
  - type: tip
    content: |-
      alt.datum은 "각각의 데이터"를 의미합니다. alt.datum.horsepower는 "각 데이터 행의 horsepower 값"을 가리킵니다.

      >= 기호는 "크거나 같다"는 의미입니다. alt.datum.horsepower >= selectHp는 "이 데이터의 마력이 슬라이더 값 이상인가?"를 묻는 조건식입니다. 참이면 opacity=1(진하게), 거짓이면 opacity=0.1(거의 투명)로 표시됩니다.

- id: step7_dropdown
  title: 7단계. 드롭다운 바인딩
  subtitle: binding_select
  blocks:
  - type: text
    content: |-
      슬라이더는 숫자 범위를 조절하는 위젯이었습니다. 이번에는 카테고리를 선택하는 드롭다운 메뉴를 만들어봅니다.

      binding_select()는 "선택(select) 메뉴를 만들어 연결(binding)하라"는 뜻입니다. options는 선택지 목록, labels는 화면에 표시될 이름, name은 드롭다운 이름입니다.

      [None] + origins는 리스트 합치기입니다. None(전체)을 첫 번째 항목으로 추가하고, 그 뒤에 usa, europe, japan을 붙입니다. | 기호는 "또는"이라는 뜻으로, (조건1) | (조건2)는 "조건1이거나 조건2이면"을 의미합니다.
  - type: code
    language: python
    title: 드롭다운 필터
    description: 생산국 선택
    content: |-
      origins = ['usa', 'europe', 'japan']
      dropdown = alt.binding_select(options=[None] + origins, labels=['전체'] + origins, name='생산국: ')
      selectOrigin = alt.param(name='selectedOrigin', bind=dropdown)

      chartDropdown = alt.Chart(mpg).mark_point().encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N',
          opacity=alt.when(
              (selectOrigin == None) | (alt.datum.origin == selectOrigin)
          ).then(alt.value(1)).otherwise(alt.value(0.1))
      ).add_params(selectOrigin).properties(
          width=500,
          height=300,
          title='드롭다운으로 생산국 필터링'
      )
      chartDropdown

- id: step8_combined
  title: 8단계. 복합 인터랙션
  subtitle: 여러 컨트롤 조합
  blocks:
  - type: text
    content: |-
      지금까지 배운 슬라이더와 드롭다운을 하나의 차트에 동시에 적용해봅니다. 두 가지 조건을 모두 만족하는 데이터만 강조됩니다.

      & 기호는 "그리고"라는 뜻입니다. (조건1) & (조건2)는 "조건1이면서 동시에 조건2도 만족해야"를 의미합니다. 앞에서 배운 | (또는)와 반대입니다.

      이 코드는 "드롭다운에서 선택한 생산국이면서, 동시에 슬라이더 값 이상의 마력을 가진" 자동차만 opacity=0.8로 진하게 표시하고, 나머지는 opacity=0.1로 거의 투명하게 만듭니다.
  - type: code
    language: python
    title: 복합 필터
    description: 슬라이더 + 드롭다운
    content: |-
      originList = ['usa', 'europe', 'japan']
      dropdownCombined = alt.binding_select(options=[None] + originList, labels=['전체'] + originList, name='생산국: ')
      paramOrigin = alt.param(name='originFilter', bind=dropdownCombined)

      sliderCombined = alt.binding_range(min=0, max=200, step=10, name='최소 마력: ')
      paramHp = alt.param(name='hpFilter', value=0, bind=sliderCombined)

      chartCombined = alt.Chart(mpg).mark_point(size=60).encode(
          x='horsepower:Q',
          y='mpg:Q',
          color='origin:N',
          opacity=alt.when(
              ((paramOrigin == None) | (alt.datum.origin == paramOrigin)) &
              (alt.datum.horsepower >= paramHp)
          ).then(alt.value(0.8)).otherwise(alt.value(0.1))
      ).add_params(paramOrigin, paramHp).properties(
          width=500,
          height=300,
          title='복합 필터 대시보드'
      )
      chartCombined

- id: step9_final
  title: 9단계. 최종 결과물
  subtitle: 인터랙티브 대시보드
  blocks:
  - type: text
    content: |-
      이제 지금까지 배운 모든 인터랙션 기능을 하나로 합쳐봅니다. 브러싱(드래그), 드롭다운, 슬라이더가 모두 포함된 대시보드입니다.

      세 가지 파라미터(brushFinal, paramOriginFinal, paramHpFinal)를 add_params()에 쉼표로 구분해서 모두 추가합니다.

      사용자는 드롭다운으로 생산국을 고르고, 슬라이더로 최소 마력을 조절하고, 마우스로 차트를 드래그해서 원하는 데이터를 찾을 수 있습니다. 세 가지 필터가 동시에 작동합니다.
  - type: code
    language: python
    title: 최종 인터랙티브 차트
    description: 프로젝트 완성!
    content: |-
      originsFinal = ['usa', 'europe', 'japan']
      dropdownFinal = alt.binding_select(options=[None] + originsFinal, labels=['전체'] + originsFinal, name='생산국: ')
      paramOriginFinal = alt.param(name='originFinal', bind=dropdownFinal)

      sliderFinal = alt.binding_range(min=0, max=200, step=10, name='최소 마력: ')
      paramHpFinal = alt.param(name='hpFinal', value=0, bind=sliderFinal)

      brushFinal = alt.selection_interval()

      chartFinal = alt.Chart(mpg).mark_circle(size=80).encode(
          x=alt.X('horsepower:Q', title='마력'),
          y=alt.Y('mpg:Q', title='연비 (MPG)'),
          color=alt.when(brushFinal).then('origin:N').otherwise(alt.value('lightgray')),
          opacity=alt.when(
              ((paramOriginFinal == None) | (alt.datum.origin == paramOriginFinal)) &
              (alt.datum.horsepower >= paramHpFinal)
          ).then(alt.value(0.8)).otherwise(alt.value(0.1)),
          tooltip=['name', 'origin', 'horsepower', 'mpg', 'cylinders']
      ).add_params(
          brushFinal,
          paramOriginFinal,
          paramHpFinal
      ).properties(
          width=550,
          height=350,
          title='자동차 연비 인터랙티브 대시보드'
      )
      chartFinal
  - type: text
    content: |-
      드롭다운으로 생산국을 선택하고, 슬라이더로 마력 범위를 조절하고, 마우스 드래그로 영역을 선택할 수 있습니다.

      세 가지 필터가 동시에 적용되어 데이터를 탐색합니다.

- id: practice
  title: 실습
  subtitle: 인터랙티브 차트 프로젝트
  blocks:
  - type: text
    content: |-
      이 프로젝트에서 배운 내용을 정리하면: selection_interval()로 드래그 선택, selection_point()로 클릭 선택, when().then().otherwise()로 조건부 스타일, binding_range()로 슬라이더, binding_select()로 드롭다운, alt.datum으로 데이터 접근, & (그리고)와 | (또는) 연산자입니다.

      이제 배운 개념들을 조합해 새로운 인터랙티브 차트를 만들어봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 실린더 수 드롭다운 필터"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        carUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
        car = pd.read_csv(carUrl)
        kinds = [3, 4, 5, 6, 8]
        selectCyl = alt.binding_select(options=[None] + kinds, labels=['전체'] + [str(c) for c in kinds], name='실린더: ')
        filterCyl = alt.param(name='cylFilter', bind=selectCyl)
    - type: code
      title: "차트 생성"
      content: |-
        figCyl = alt.Chart(car).mark_point().encode(
            x='horsepower:Q',
            y='mpg:Q',
            color='origin:N',
            opacity=alt.when(
                (filterCyl == None) | (alt.datum.cylinders == filterCyl)
            ).then(alt.value(1)).otherwise(alt.value(0.1))
        ).add_params(filterCyl).properties(width=500, height=300, title='실린더 수 필터')
        figCyl
  - type: expansion
    title: "미션2: 연비 범위 슬라이더"
    blocks:
    - type: code
      title: "데이터 준비"
      content: |-
        import altair as alt
        import pandas as pd
        autoUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master/mpg.csv"
        auto = pd.read_csv(autoUrl)
        rangeBar = alt.binding_range(min=0, max=50, step=5, name='최소 연비: ')
        filterMpg = alt.param(name='mpgFilter', value=10, bind=rangeBar)
    - type: code
      title: "차트 생성"
      content: |-
        figMpg = alt.Chart(auto).mark_circle(size=60).encode(
            x='weight:Q',
            y='mpg:Q',
            color='origin:N',
            opacity=alt.when(alt.datum.mpg >= filterMpg).then(alt.value(0.8)).otherwise(alt.value(0.1))
        ).add_params(filterMpg).properties(width=500, height=300, title='연비 기준 필터')
        figMpg

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Altair로 인터랙티브 차트를 마스터했습니다!
  - type: list
    items:
    - "selection_interval() - 드래그로 영역 선택 (브러싱)"
    - "selection_point(fields=[...]) - 클릭으로 항목 선택"
    - "add_params() - 선택 파라미터를 차트에 연결"
    - "alt.when(selection).then().otherwise() - 조건부 인코딩"
    - "binding_range() - 슬라이더 위젯"
    - "binding_select() - 드롭다운 위젯"
    - "alt.datum.컬럼명 - 데이터 값 접근"
  - type: text
    content: 다음 프로젝트에서는 여러 차트를 연결하는 다중 뷰 연동을 배웁니다.
