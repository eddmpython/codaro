  goal: 월별 항공 승객 수를 시계열 분석으로 예측합니다.
  description: 1949년부터 1960년까지 12년간의 월별 승객 데이터로 추세와 계절성을 파악하고 ARIMA로 미래 수요를 예측합니다. 항공사의 용량 계획과 인력 배치에 활용할 수 있습니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 항공 승객 시계열 데이터
  blocks:
  - type: text
    content: "AirPassengers 데이터셋은 1949년 1월부터 1960년 12월까지 144개월간의 국제 항공 승객 수(월별, 천 명 단위)를 담고 있습니다. 시계열 분석의 대표적인 벤치마크 데이터로, 장기적인 상승 추세(항공 산업 성장)와 연간 계절성(여름 성수기)이 명확히 나타납니다. 이 데이터로 시계열 분해, ARIMA 모델링, 미래 예측을 학습하면 항공사 용량 계획, 인력 배치, 가격 책정 등 실무에 적용할 수 있습니다."
  - type: code
    language: python
    title: 데이터 불러오기
    description: 시계열 CSV 로드
    content: |-
      import pandas as pd
      import numpy as np
      import statsmodels.api as sm
      from statsmodels.tsa.seasonal import seasonal_decompose
      from statsmodels.tsa.arima.model import ARIMA

      url = "https://raw.githubusercontent.com/jbrownlee/Datasets/master/airline-passengers.csv"
      airData = pd.read_csv(url)
      airData.shape
  - type: tip
    content: 시계열 분석을 위해 여러 모듈을 import 합니다. seasonal_decompose는 시계열을 추세/계절/잔차로 분해, plot_acf/plot_pacf는 자기상관 그래프, ARIMA는 시계열 예측 모델입니다. 한 번에 필요한 모듈을 모두 불러오면 나중에 편리합니다.

- id: step2_head
  title: 2단계. 데이터 미리보기
  subtitle: 컬럼 구조 확인
  blocks:
  - type: text
    content: "Month 컬럼은 '1949-01' 형태의 날짜 문자열이고, Passengers는 해당 월의 승객 수(천 명 단위)입니다. 시계열 분석을 위해서는 Month를 datetime 타입(날짜 자료형)으로 변환하고 DataFrame의 인덱스로 설정해야 합니다. pandas는 datetime 인덱스를 인식하면 resample()(시간 단위 집계), shift()(시차 이동), rolling()(이동평균) 등 시계열 전용 기능을 자동으로 활성화합니다."
  - type: code
    language: python
    title: 처음 5행 확인
    description: Month와 Passengers
    content: |-
      airData.head()

- id: step3_datetime
  title: 3단계. 날짜 인덱스 설정
  subtitle: datetime 변환
  blocks:
  - type: text
    content: "to_datetime()으로 Month 컬럼을 날짜 타입으로 변환하고 인덱스로 설정합니다. 날짜 인덱스 설정은 시계열 분석의 필수 전처리 단계입니다. 인덱스가 날짜로 설정되면 plot(), resample()(집계), shift()(시차 이동), rolling()(이동평균) 등 pandas의 시계열 전용 함수들을 사용할 수 있으며, 날짜 기반 슬라이싱(예: df['1950':'1955'])도 가능해집니다. 02 프로젝트에서 배운 set_index() 개념을 날짜에 적용합니다."
  - type: code
    language: python
    title: 날짜 인덱스 설정
    description: Month를 datetime 인덱스로
    content: |-
      airDataWithDate = airData.copy()
      airDataWithDate['Month'] = pd.to_datetime(airDataWithDate['Month'])
      airIndexed = airDataWithDate.set_index('Month')
      airIndexed.head()
  - type: tip
    content: to_datetime()은 문자열('1949-01')을 datetime 타입(날짜 자료형)으로 변환하는 pandas 함수입니다. datetime 타입은 연산과 정렬이 가능한 특수한 날짜 형식으로, '1949-01', '1949/01/01', 'Jan 1949' 등 다양한 형식을 자동으로 인식합니다. set_index()는 특정 컬럼을 DataFrame의 인덱스(행 이름)로 설정하는 메서드로, 02 프로젝트에서 배운 개념입니다. 날짜를 인덱스로 하면 resample()(집계), shift()(이동), rolling()(이동평균) 같은 시계열 전용 기능을 사용할 수 있습니다. ()는 함수나 메서드를 호출하는 기호입니다.

- id: step4_plot
  title: 4단계. 시계열 플롯
  subtitle: 전체 추세 확인
  blocks:
  - type: text
    content: 시계열 데이터를 시각화하면 전체 패턴을 한눈에 파악할 수 있으며, 이는 모델 선택의 중요한 근거가 됩니다. 시계열 그래프는 X축이 시간, Y축이 관측값인 선 그래프로, 이 데이터에서는 승객 수가 시간에 따라 지속적으로 증가하는 추세(trend)와 매년 여름(6~8월)에 정점을 찍는 계절 패턴(seasonality)이 명확히 보입니다. 추세는 장기적인 증가/감소 경향을, 계절성은 일정 주기로 반복되는 패턴을 의미합니다. 예를 들어 1949년 평균 승객은 약 120명이었지만 1960년에는 약 400명으로 3배 이상 증가했고, 매년 7월에 가장 많은 승객이 이용합니다. 이런 패턴을 파악하면 ARIMA 모델의 파라미터(p, d, q)를 결정하고 계절성 처리 여부를 판단할 수 있습니다.
  - type: code
    language: python
    title: 시계열 플롯
    description: 월별 승객 수 추이
    content: |-
      import plotly.express as px

      timeseriesFig = px.line(airIndexed, x=airIndexed.index, y='Passengers',
                              title='Monthly Airline Passengers (1949-1960)',
                              labels={'x': 'Date', 'Passengers': 'Number of Passengers'})
      timeseriesFig.update_xaxes(title_text='Date')
      timeseriesFig.update_yaxes(title_text='Passengers')
      timeseriesFig.show()
  - type: tip
    content: plotly.express의 px.line()은 선 그래프를 그리며, x에 날짜 인덱스를 지정하면 자동으로 날짜 형식으로 표시됩니다. update_xaxes()와 update_yaxes()로 축 제목을 설정하고, plotly 그래프는 마우스로 드래그하여 특정 기간을 확대할 수 있어 계절 패턴을 자세히 분석할 수 있습니다. 예를 들어 1950년대 후반 구간만 확대하면 여름 성수기와 겨울 비수기의 차이를 정확히 확인할 수 있습니다.

- id: step5_decompose
  title: 5단계. 시계열 분해
  subtitle: 추세 + 계절성 + 잔차
  blocks:
  - type: text
    content: "seasonal_decompose()는 시계열을 추세(Trend), 계절성(Seasonal), 잔차(Residual) 3개 성분으로 분해하는 함수입니다. 추세는 장기적인 증가/감소 패턴으로 전반적인 방향성을 보여주고, 계절성은 일정 주기로 반복되는 패턴(예: 매년 여름 증가), 잔차는 추세와 계절성으로 설명되지 않는 불규칙한 변동(랜덤 노이즈)입니다. model='multiplicative'는 시계열이 곱셈 관계(Y = Trend × Seasonal × Residual)를 따른다는 뜻으로, 승객 수가 증가할수록 계절 변동의 크기도 커지는 경우에 사용합니다. 반대로 계절 변동이 일정하면 'additive'(덧셈 모델)를 사용합니다. 분해 결과를 보면 추세 성분은 꾸준히 상승하고, 계절 성분은 매년 같은 패턴을 반복하며, 잔차는 거의 랜덤하게 분포하여 모델이 데이터를 잘 설명함을 알 수 있습니다."
  - type: code
    language: python
    title: 시계열 분해
    description: 추세, 계절성, 잔차 분리
    content: |-
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots

      decomposition = seasonal_decompose(airIndexed['Passengers'], model='multiplicative', period=12)

      decompFig = make_subplots(rows=4, cols=1, subplot_titles=['Original', 'Trend', 'Seasonal', 'Residual'])
      decompFig.add_trace(go.Scatter(x=airIndexed.index, y=airIndexed['Passengers'], mode='lines', name='Original'), row=1, col=1)
      decompFig.add_trace(go.Scatter(x=airIndexed.index, y=decomposition.trend, mode='lines', name='Trend'), row=2, col=1)
      decompFig.add_trace(go.Scatter(x=airIndexed.index, y=decomposition.seasonal, mode='lines', name='Seasonal'), row=3, col=1)
      decompFig.add_trace(go.Scatter(x=airIndexed.index, y=decomposition.resid, mode='lines', name='Residual'), row=4, col=1)
      decompFig.update_layout(height=900, showlegend=False, title_text='Time Series Decomposition')
      decompFig.show()
  - type: tip
    content: period=12는 계절 주기를 12개월로 설정하며, 월별 데이터는 12, 분기별은 4, 주별은 52를 사용합니다. make_subplots(rows=4, cols=1)은 4개 그래프를 세로로 배치하고, add_trace()로 각 행에 그래프를 추가합니다. row=1, col=1은 첫 번째 행, row=2, col=1은 두 번째 행을 의미합니다. height=900으로 전체 높이를 조정하여 각 그래프가 충분한 공간을 가지도록 하며, 마우스로 특정 구간을 확대하면 계절 패턴의 세부 사항을 분석할 수 있습니다.

- id: step6_stationarity
  title: 6단계. 정상성 확인
  subtitle: ADF 검정
  blocks:
  - type: text
    content: "ARIMA 모델은 정상성(stationarity)을 가정하며, 이는 시계열 분석의 가장 중요한 전제 조건입니다. 정상 시계열(stationary time series)은 (1) 평균이 시간에 따라 일정하고, (2) 분산이 시간에 따라 일정하며, (3) 공분산이 시차에만 의존하고 시간에 독립적인 특성을 가집니다. ADF(Augmented Dickey-Fuller) 검정은 단위근(unit root)이 있는지 확인하는 통계 검정으로, 귀무가설은 '비정상 시계열'입니다. p-value가 0.05보다 작으면 귀무가설을 기각하여 정상 시계열로 판단하고, 0.05 이상이면 비정상으로 차분(differencing)이 필요합니다. 예를 들어 이 항공 데이터는 추세가 있어 비정상이므로 1차 차분으로 추세를 제거하여 정상화해야 합니다. 정상성이 중요한 이유는 비정상 시계열은 과거 패턴이 미래에 반복되지 않아 예측이 불가능하기 때문입니다."
  - type: code
    language: python
    title: ADF 검정
    description: 정상성 테스트
    content: |-
      from statsmodels.tsa.stattools import adfuller

      adfResult = adfuller(airIndexed['Passengers'])
      f"ADF Statistic: {adfResult[0]:.4f}"
      f"p-value: {adfResult[1]:.4f}"
      f"정상성: {'정상' if adfResult[1] < 0.05 else '비정상'}"
  - type: tip
    content: adfuller()는 ADF 검정을 수행합니다. 반환값은 튜플로, [0]은 검정 통계량, [1]은 p-value입니다. p-value < 0.05면 정상 시계열, >= 0.05면 비정상 시계열입니다. 비정상이면 차분을 적용하여 정상화해야 합니다.

- id: step7_diff
  title: 7단계. 차분으로 정상화
  subtitle: 1차 차분 적용
  blocks:
  - type: text
    content: 차분(differencing)은 현재 값에서 이전 값을 뺀 것으로, 시계열의 추세를 제거하여 정상성을 만드는 가장 간단하고 효과적인 방법입니다. diff() 함수는 각 시점에서 바로 전 시점의 값을 빼며, 예를 들어 [112, 118, 132]는 [NaN, 6, 14]가 됩니다. 1차 차분은 선형 추세를, 2차 차분(diff().diff())은 곡선 추세를 제거합니다. dropna()는 첫 번째 결측값(NaN)을 제거하여 분석 가능한 데이터로 만듭니다. 차분 후 ADF 검정을 다시 수행하여 p-value가 0.05 이하로 떨어지면 정상 시계열로 변환된 것이며, 이제 ARIMA 모델을 적용할 수 있습니다. 차분 횟수는 ARIMA의 d 파라미터가 되어, 1차 차분이면 d=1입니다.
  - type: code
    language: python
    title: 1차 차분
    description: 정상 시계열로 변환
    content: |-
      import plotly.express as px

      airDiff = airIndexed['Passengers'].diff().dropna()

      diffDf = pd.DataFrame({'Date': airDiff.index, 'Differenced': airDiff.values})
      diffFig = px.line(diffDf, x='Date', y='Differenced',
                        title='First Difference',
                        labels={'Differenced': 'Differenced Passengers'})
      diffFig.show()

      adfDiff = adfuller(airDiff)
      f"차분 후 p-value: {adfDiff[1]:.4f}"
  - type: tip
    content: diff()는 현재 값에서 이전 값을 빼는 연산(차분, differencing)을 수행하는 pandas 메서드입니다. 예를 들어 승객 수가 [112, 118, 132]이면 diff() 결과는 [NaN, 6, 14]가 되며, 첫 번째 값은 이전 값이 없어 NaN(Not a Number, 결측값)이 됩니다. dropna()는 NaN을 제거하는 메서드로, 분석 가능한 데이터만 남깁니다. 차분은 추세(장기적 증가/감소)를 제거하는 가장 간단하고 효과적인 방법으로, ARIMA 모델의 d(차분 차수) 파라미터와 직접 연결됩니다. -(빼기)는 수학 연산자이며, .method()는 객체의 메서드를 호출하는 문법입니다.

- id: step8_acf_pacf
  title: 8단계. ACF와 PACF 플롯
  subtitle: ARIMA 파라미터 선택
  blocks:
  - type: text
    content: ACF(AutoCorrelation Function, 자기상관함수)는 시계열이 과거 자신과 얼마나 상관이 있는지 시차(lag)별로 측정하는 도구입니다. 시차(lag)는 시간 간격으로, lag=1은 1개월 전, lag=12는 12개월(1년) 전 값과의 상관관계를 의미합니다. PACF(Partial ACF, 부분 자기상관함수)는 중간 시차의 영향을 제거한 순수한 직접 상관관계를 보여줍니다. ARIMA(p,d,q) 모델에서 p(자기회귀 차수)는 PACF 그래프에서 유의미한 막대 개수로, q(이동평균 차수)는 ACF 그래프에서 유의미한 막대 개수로 결정합니다. 파란 영역(신뢰구간)을 벗어나는 막대는 통계적으로 유의미한 상관이 있다는 뜻으로, 해당 시차를 모델에 포함해야 합니다. 예를 들어 PACF에서 lag 1, 2가 영역을 벗어나면 p=2를 사용합니다.
  - type: code
    language: python
    title: ACF와 PACF
    description: ARIMA 차수 결정
    content: |-
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots
      from statsmodels.tsa.stattools import acf, pacf

      acfVals = acf(airDiff, nlags=40)
      pacfVals = pacf(airDiff, nlags=40)

      acfFig = make_subplots(rows=1, cols=2, subplot_titles=('ACF', 'PACF'))

      acfFig.add_trace(go.Bar(x=list(range(len(acfVals))), y=acfVals, name='ACF'), row=1, col=1)
      acfFig.add_hline(y=1.96/np.sqrt(len(airDiff)), line_dash='dash', line_color='blue', row=1, col=1)
      acfFig.add_hline(y=-1.96/np.sqrt(len(airDiff)), line_dash='dash', line_color='blue', row=1, col=1)

      acfFig.add_trace(go.Bar(x=list(range(len(pacfVals))), y=pacfVals, name='PACF'), row=1, col=2)
      acfFig.add_hline(y=1.96/np.sqrt(len(airDiff)), line_dash='dash', line_color='blue', row=1, col=2)
      acfFig.add_hline(y=-1.96/np.sqrt(len(airDiff)), line_dash='dash', line_color='blue', row=1, col=2)

      acfFig.update_xaxes(title_text='Lag', row=1, col=1)
      acfFig.update_xaxes(title_text='Lag', row=1, col=2)
      acfFig.update_yaxes(title_text='Correlation', row=1, col=1)
      acfFig.update_yaxes(title_text='Correlation', row=1, col=2)

      acfFig.show()
  - type: tip
    content: ACF(AutoCorrelation Function)는 시차 k만큼 떨어진 값들의 상관계수(-1~1)를 계산하는 함수입니다. 예를 들어 ACF(lag=1)은 이번 달과 지난달의 상관관계를 측정합니다. PACF(Partial ACF)는 중간 시차(lag 1, 2, ... k-1)의 간접 영향을 제거하고 lag k의 순수한 직접 영향만 측정합니다. lags=40은 40개 시차(40개월 전)까지 확인하며, 숫자가 크면 장기 패턴을 볼 수 있지만 데이터가 부족하면 신뢰도가 낮아집니다. ARIMA(p,d,q)에서 p(AR 차수)는 PACF가 신뢰구간을 벗어나는 지점, q(MA 차수)는 ACF가 신뢰구간을 벗어나는 지점을 보고 결정합니다. plot_acf()와 plot_pacf()는 matplotlib 기반 그래프를 그리는 statsmodels 함수입니다.

- id: step9_arima_model
  title: 9단계. ARIMA 모델 학습
  subtitle: (p, d, q) 파라미터 설정
  blocks:
  - type: text
    content: ARIMA(p, d, q) 모델을 구축합니다. ARIMA는 AutoRegressive Integrated Moving Average의 약자로, 시계열 예측의 대표적인 모델입니다. p는 AR(AutoRegressive, 자기회귀) 차수로 과거 p개 시점의 값을 사용하며, d는 차분(Differencing) 차수로 추세 제거를 위해 몇 번 차분했는지, q는 MA(Moving Average, 이동평균) 차수로 과거 q개 시점의 예측 오차를 사용합니다. 예를 들어 ARIMA(1,1,1)은 1차 차분 후 1개월 전 값과 1개월 전 오차를 사용한다는 뜻입니다. ACF/PACF 플롯을 보고 p=1, q=1로 시작하고, d=1은 7단계에서 1차 차분을 적용했기 때문입니다. order=(p,d,q)는 튜플(값의 묶음)로 파라미터를 전달하며, 01, 02, 03 프로젝트에서 배운 fit() 개념을 시계열에 적용합니다.
  - type: code
    language: python
    title: ARIMA 모델 학습
    description: (1, 1, 1) 파라미터
    content: |-
      arimaModel = ARIMA(airIndexed['Passengers'], order=(1, 1, 1))
      arimaFit = arimaModel.fit()
      arimaFit.summary()
  - type: tip
    content: ARIMA(data, order=(p,d,q))로 시계열 모델을 정의합니다. order는 튜플(tuple, 괄호로 묶인 값의 순서쌍)로 (p, d, q) 순서를 지켜야 합니다. 튜플은 리스트[]와 비슷하지만 ()를 사용하며 값 수정이 불가능합니다. fit()으로 최대우도추정법(Maximum Likelihood Estimation)으로 계수를 학습하고, summary()로 통계량을 확인하는 방법은 01 프로젝트의 OLS().fit()과 사용법이 같습니다. AIC(Akaike Information Criterion)는 모델 복잡도를 고려한 성능 지표로, 값이 낮을수록 좋은 모델이며, 여러 (p,d,q) 조합을 비교할 때 사용합니다.

- id: step10_predict
  title: 10단계. 미래 예측
  subtitle: 12개월 예측
  blocks:
  - type: text
    content: "학습된 ARIMA 모델로 데이터에 없는 미래 12개월을 예측합니다. forecast(steps=12)는 마지막 날짜(1960년 12월) 이후 1961년 1월~12월의 예측값을 반환합니다. 01-03 프로젝트의 predict()는 기존 데이터에 대한 예측(in-sample)이고, forecast()는 미래에 대한 예측(out-of-sample)이라는 차이가 있습니다. 예측값은 점 추정치이며, 실제 시계열 분석에서는 신뢰구간도 함께 확인하여 예측의 불확실성을 고려합니다."
  - type: code
    language: python
    title: 12개월 예측
    description: 미래 수요 예측
    content: |-
      forecastResult = arimaFit.forecast(steps=12)
      forecastResult
  - type: tip
    content: forecast(steps=12)는 미래 12개 시점(12개월)을 예측하는 ARIMA 메서드입니다. steps는 예측할 기간 개수를 의미하며, 시계열에서는 steps 파라미터를, 일반 회귀에서는 newdata를 사용한다는 차이가 있습니다. forecast()는 예측값을 Series(1차원 배열)로 반환하며, 마지막 날짜부터 자동으로 날짜 인덱스를 생성합니다. 예를 들어 데이터가 1960년 12월까지면 1961년 1월~12월의 예측값을 반환합니다. 01-03 프로젝트의 predict()는 기존 데이터에 대한 예측, forecast()는 미래에 대한 예측이라는 차이가 있습니다.

- id: step11_visualize
  title: 11단계. 예측 결과 시각화
  subtitle: 실제 vs 예측
  blocks:
  - type: text
    content: "원본 데이터(파란색)와 미래 예측값(빨간 점선)을 한 그래프에 그려서 모델 성능을 시각적으로 확인합니다. 좋은 모델은 예측값이 기존 추세와 계절 패턴을 자연스럽게 이어가야 합니다. 01, 02 프로젝트에서 배운 plotly 시각화 기법을 시계열에 적용하며, 여러 trace를 겹쳐서 비교 분석이 가능합니다. 이 그래프는 경영진이나 고객에게 예측 결과를 설명할 때 매우 효과적입니다."
  - type: code
    language: python
    title: 예측 시각화
    description: 원본 + 예측 그래프
    content: |-
      import plotly.graph_objects as go

      forecastFig = go.Figure()

      forecastFig.add_trace(go.Scatter(x=airIndexed.index, y=airIndexed['Passengers'],
                                        mode='lines', name='Actual', line=dict(color='blue')))

      forecastFig.add_trace(go.Scatter(x=forecastResult.index, y=forecastResult,
                                        mode='lines', name='Forecast',
                                        line=dict(color='red', dash='dash')))

      forecastFig.update_layout(title='ARIMA Forecast',
                                xaxis_title='Date',
                                yaxis_title='Passengers')

      forecastFig.show()

- id: step12_residual
  title: 12단계. 잔차 분석
  subtitle: 모델 진단
  blocks:
  - type: text
    content: "ARIMA 모델의 잔차(실제값 - 예측값)를 확인하여 모델 적합성을 진단합니다. 좋은 모델의 잔차는 (1) 0 주변에서 랜덤하게 변동하고, (2) 특정 패턴이나 추세가 없으며, (3) 정규분포에 가깝게 분포해야 합니다. 잔차에 패턴이 보이면 모델이 포착하지 못한 정보가 있다는 뜻으로, 파라미터 조정이나 SARIMA 같은 다른 모델이 필요합니다. 02 프로젝트에서 배운 잔차 분석 개념을 시계열에 적용합니다."
  - type: code
    language: python
    title: 잔차 플롯
    description: 모델 진단
    content: |-
      import plotly.graph_objects as go
      from plotly.subplots import make_subplots

      residuals = arimaFit.resid

      residFig = make_subplots(rows=1, cols=2, subplot_titles=('Residuals', 'Residual Distribution'))

      residFig.add_trace(go.Scatter(x=residuals.index, y=residuals, mode='lines', name='Residuals'), row=1, col=1)
      residFig.add_hline(y=0, line_dash='dash', line_color='red', row=1, col=1)

      residFig.add_trace(go.Histogram(x=residuals, nbinsx=30, name='Distribution'), row=1, col=2)

      residFig.update_xaxes(title_text='Date', row=1, col=1)
      residFig.update_xaxes(title_text='Residuals', row=1, col=2)
      residFig.update_yaxes(title_text='Residuals', row=1, col=1)
      residFig.update_yaxes(title_text='Frequency', row=1, col=2)

      residFig.show()
  - type: tip
    content: arimaFit.resid는 잔차(실제값 - 예측값)입니다. 02 프로젝트의 model.resid와 같습니다. plot(kind='hist')는 히스토그램을 그립니다. 잔차가 정규분포를 따르고 0 중심이면 모델이 잘 맞는 것입니다.

- id: step13_auto_arima
  title: 13단계. 최적 파라미터 찾기
  subtitle: 그리드 서치
  blocks:
  - type: text
    content: "여러 (p, d, q) 조합을 시도하여 AIC가 가장 낮은 모델을 찾습니다. AIC(Akaike Information Criterion)는 모델의 예측 성능과 복잡도(파라미터 수)를 동시에 고려하는 지표로, 값이 낮을수록 좋은 모델입니다. for 반복문으로 p=0~2, d=0~1, q=0~2의 모든 조합(18개)을 테스트하고, AIC가 최소인 조합을 선택합니다. 일부 조합은 수렴하지 않아 에러가 발생할 수 있으므로 try-except로 처리합니다. 실무에서는 pmdarima의 auto_arima() 함수로 자동화할 수 있습니다."
  - type: code
    language: python
    title: 최적 ARIMA 파라미터
    description: AIC 기준 선택
    content: |-
      bestAic = float('inf')
      bestOrder = None

      for p in range(0, 3):
          for d in range(0, 2):
              for q in range(0, 3):
                  try:
                      model = ARIMA(airIndexed['Passengers'], order=(p, d, q))
                      fit = model.fit()
                      if fit.aic < bestAic:
                          bestAic = fit.aic
                          bestOrder = (p, d, q)
                  except:
                      continue

      f"최적 파라미터: {bestOrder}"
      f"AIC: {bestAic:.2f}"
  - type: tip
    content: float('inf')는 무한대를 의미합니다. 비교 시작값으로 사용하여 첫 번째 값보다 작은 값을 찾습니다. try-except는 에러 처리로, 일부 파라미터 조합은 학습에 실패할 수 있습니다. continue는 에러 발생 시 다음 반복으로 넘어갑니다.

- id: step14_seasonal_arima
  title: 14단계. SARIMA 소개
  subtitle: 계절성 고려
  blocks:
  - type: text
    content: "SARIMA(Seasonal ARIMA)는 계절성을 명시적으로 모델링하는 ARIMA의 확장 버전입니다. SARIMA(p,d,q)(P,D,Q,s)에서 소문자(p,d,q)는 일반 파라미터, 대문자(P,D,Q)는 계절 파라미터, s는 계절 주기(월별=12, 분기별=4)입니다. 예를 들어 SARIMA(1,1,1)(1,1,1,12)는 12개월 계절성을 고려한 모델입니다. ARIMA보다 계절 패턴이 강한 데이터(예: 항공, 소매, 에너지)에서 예측 정확도가 크게 향상되며, AIC로 두 모델을 비교할 수 있습니다."
  - type: code
    language: python
    title: SARIMA 예시
    description: 계절성 포함 모델
    content: |-
      from statsmodels.tsa.statespace.sarimax import SARIMAX

      sarimaModel = SARIMAX(airIndexed['Passengers'],
                            order=(1, 1, 1),
                            seasonal_order=(1, 1, 1, 12))
      sarimaFit = sarimaModel.fit()
      f"SARIMA AIC: {sarimaFit.aic:.2f}"
  - type: tip
    content: SARIMAX는 SARIMA의 확장판으로 외생변수(X)도 포함할 수 있습니다. seasonal_order=(P, D, Q, s)는 계절 파라미터입니다. s=12는 12개월 주기, s=4는 4분기 주기입니다. SARIMA가 ARIMA보다 AIC가 낮으면 계절성이 중요하다는 뜻입니다.

- id: practice
  title: 실습
  subtitle: 항공 수요 분석 프로젝트
  blocks:
  - type: text
    content: 항공사 수요 분석가가 되어 승객 수요를 예측하고 용량 계획을 수립합니다. 각 미션은 데이터 로딩부터 시계열 분해, ARIMA 모델링, 예측까지 전체 과정을 독립적으로 수행합니다. 01-03 프로젝트의 회귀 기법과 이번 프로젝트의 시계열 분석을 모두 활용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 로그 변환 ARIMA 모델 구축 및 원본 비교"
    blocks:
    - type: code
      title: "데이터 로드 및 로그 변환"
      content: |-
        import pandas as pd
        import numpy as np
        from statsmodels.tsa.arima.model import ARIMA

        logUrl = "https://raw.githubusercontent.com/jbrownlee/Datasets/master/airline-passengers.csv"
        logData = pd.read_csv(logUrl)
        logData['Month'] = pd.to_datetime(logData['Month'])
        logData = logData.set_index('Month')
        logData['LogPassengers'] = np.log(logData['Passengers'])
        logData.head()
    - type: code
      title: "원본 vs 로그 ARIMA 모델 학습"
      content: |-
        origModel = ARIMA(logData['Passengers'], order=(1, 1, 1))
        origFit = origModel.fit()

        logModel = ARIMA(logData['LogPassengers'], order=(1, 1, 1))
        logFit = logModel.fit()

        aicDf = pd.DataFrame({
            'Model': ['원본 Passengers', 'log(Passengers)'],
            'AIC': [origFit.aic, logFit.aic]
        })
        aicDf
    - type: code
      title: "예측 비교 시각화"
      content: |-
        import plotly.graph_objects as go

        origFcast = origFit.forecast(steps=12)
        logFcast = np.exp(logFit.forecast(steps=12))

        logFig = go.Figure()
        logFig.add_trace(go.Scatter(x=logData.index, y=logData['Passengers'], mode='lines', name='Historical'))
        logFig.add_trace(go.Scatter(x=origFcast.index, y=origFcast, mode='lines+markers', name='원본 예측', line=dict(dash='dash')))
        logFig.add_trace(go.Scatter(x=logFcast.index, y=logFcast, mode='lines+markers', name='로그 예측', line=dict(dash='dot')))
        logFig.update_layout(title='ARIMA: 원본 vs 로그 변환 예측 비교', xaxis_title='Date', yaxis_title='Passengers')
        logFig
  - type: expansion
    title: "미션2: 계절성 분해 및 월별 패턴 종합 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 계절 분해"
      content: |-
        import pandas as pd
        import numpy as np
        from statsmodels.tsa.seasonal import seasonal_decompose

        sznUrl = "https://raw.githubusercontent.com/jbrownlee/Datasets/master/airline-passengers.csv"
        sznData = pd.read_csv(sznUrl)
        sznData['Month'] = pd.to_datetime(sznData['Month'])
        sznData = sznData.set_index('Month')

        sznDecomp = seasonal_decompose(sznData['Passengers'], model='multiplicative', period=12)
        sznDecomp.trend.dropna().head()
    - type: code
      title: "계절성 강도 분석"
      content: |-
        sznStd = sznDecomp.seasonal.std()
        trendStd = sznDecomp.trend.dropna().std()

        strengthDf = pd.DataFrame({
            'Component': ['계절성', '추세'],
            '표준편차': [sznStd, trendStd],
            '계절성 비율': [sznStd / trendStd, 1.0]
        })
        strengthDf
    - type: code
      title: "월별 패턴 시각화"
      content: |-
        import plotly.express as px

        monthAvg = sznData.groupby(sznData.index.month)['Passengers'].mean()
        monthAvg.index = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']

        monthDf = pd.DataFrame({'Month': monthAvg.index, 'Avg Passengers': monthAvg.values})

        sznFig = px.bar(monthDf, x='Month', y='Avg Passengers',
                        title='월별 평균 승객 수 (1949-1960)',
                        color='Avg Passengers', color_continuous_scale='Blues')
        sznFig

- id: summary
  title: 정리
  subtitle: 네 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 1949-1960년 항공 승객 데이터로 시계열 분석을 수행했습니다. seasonal_decompose()로 추세와 계절성을 분리하고, ARIMA(1,1,1) 모델로 미래 12개월을 예측했으며, ACF/PACF로 최적 파라미터를 선택했습니다. 잔차 분석으로 모델 적합성을 확인하고, SARIMA로 계절성을 명시적으로 다루는 방법도 배웠습니다. 이제 항공사 용량 계획, 스케줄 최적화, 인력 배치에 시계열 예측을 활용할 수 있습니다.
  - type: list
    items:
    - "시계열 분해 - 추세, 계절성, 잔차로 분리"
    - "ADF 검정 - 정상성 확인"
    - "차분 - 비정상 시계열을 정상화"
    - "ACF/PACF - ARIMA 파라미터 선택"
    - "ARIMA(p,d,q) - 시계열 예측 모델"
    - "forecast() - 미래 값 예측"
    - "AIC - 모델 선택 기준"
    - "SARIMA - 계절성 명시적 처리"
  - type: text
    content: 다음 프로젝트에서는 소매 매출 데이터로 외생변수를 포함한 시계열 회귀를 배웁니다. 날씨, 프로모션 같은 외부 요인으로 매출을 예측해봅니다.
