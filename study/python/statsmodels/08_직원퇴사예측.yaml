    description: "t-test, ANOVA로 퇴사 요인을 분석합니다. 가설 검정과 로지스틱 회귀로 HR 데이터를 분석합니다."
    keywords: ["statsmodels", "가설검정", "t-test", "ANOVA", "직원이탈", "HR분석", "퇴사예측"]

intro:
  emoji: "👔"
  goal: 가설 검정으로 퇴사 요인을 분석하고 퇴사 확률을 예측합니다
  description: IBM HR Analytics 데이터로 어떤 요인이 직원 퇴사에 영향을 미치는지 통계적으로 검증합니다. t-test, ANOVA로 그룹 간 차이를 검정하고, 로지스틱 회귀로 퇴사 확률을 예측합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: IBM HR Analytics 데이터
  blocks:
  - type: text
    content: "IBM HR Analytics 데이터셋은 1,470명 직원의 35개 특성과 퇴사 여부(Attrition)를 담고 있습니다. 나이, 급여, 근속연수, 만족도, 출장빈도, 초과근무 여부 등 HR 분석에 필요한 풍부한 변수가 포함됩니다. 이 데이터로 어떤 요인이 퇴사에 영향을 미치는지 분석하면, 기업은 핵심 인재 유지 전략을 수립하고 채용 비용을 절감할 수 있습니다. 평균 채용 비용이 연봉의 30-50%에 달하므로 퇴사 예방은 큰 비용 절감 효과가 있습니다."
  - type: code
    language: python
    title: 데이터 불러오기
    description: CSV 파일 로드
    content: |-
      import pandas as pd
      import numpy as np
      import statsmodels.api as sm
      from scipy import stats
      import plotly.express as px
      import plotly.graph_objects as go

      url = "https://raw.githubusercontent.com/IBM/employee-attrition-aif360/master/data/emp_attrition.csv"
      hrData = pd.read_csv(url)
      hrData.shape

- id: step2_explore
  title: 2단계. 데이터 탐색
  subtitle: 컬럼 구조 확인
  blocks:
  - type: text
    content: "Age(나이), MonthlyIncome(월급), YearsAtCompany(근속연수), JobSatisfaction(직무만족도), Attrition(퇴사여부) 등 35개 컬럼을 확인합니다. HR 데이터는 수치형(나이, 급여)과 범주형(부서, 직급)이 섞여 있어 각각 다른 분석 방법이 필요합니다. 컬럼명이 영어로 되어 있지만 직관적인 이름이라 의미를 파악하기 쉽습니다. 데이터 탐색 단계에서 각 변수의 타입과 의미를 정확히 파악하는 것이 분석의 기초입니다."
  - type: code
    language: python
    title: 컬럼 확인
    description: 변수 목록
    content: |-
      hrData.columns.tolist()

- id: step3_attrition_rate
  title: 3단계. 퇴사율 확인
  subtitle: 전체 퇴사 비율
  blocks:
  - type: text
    content: "전체 직원 중 몇 퍼센트가 퇴사했는지 확인합니다. 퇴사율은 HR의 핵심 지표로, 산업 평균과 비교하여 우리 회사의 인재 관리 수준을 판단할 수 있습니다. 일반적으로 15% 이상이면 높은 편입니다. Attrition이 Yes/No 문자열이므로 통계 분석을 위해 0/1 숫자로 변환합니다. 이런 이진 변환은 로지스틱 회귀와 t-test 수행에 필수적인 전처리 단계입니다."
  - type: code
    language: python
    title: 퇴사율 계산
    description: Attrition 분포
    content: |-
      hrData['AttritionBinary'] = (hrData['Attrition'] == 'Yes').astype(int)
      attritionRate = hrData['AttritionBinary'].mean()
      f"퇴사율: {attritionRate:.1%}"
  - type: tip
    content: mean()으로 0/1 변수의 평균을 구하면 1의 비율, 즉 퇴사율이 됩니다. 05 프로젝트에서 배운 이탈률 계산과 동일한 원리입니다.

- id: step4_hypothesis_intro
  title: 4단계. 가설 검정 소개
  subtitle: 통계적 유의성 판단
  blocks:
  - type: text
    content: "가설 검정은 두 그룹 간 차이가 우연인지 실제인지 통계적으로 판단하는 방법입니다. 예를 들어 퇴사자 평균 급여가 재직자보다 낮다면, 이 차이가 표본의 우연한 변동인지 실제 모집단에서도 존재하는 차이인지 검정합니다. p-value가 0.05 미만이면 '우연일 확률이 5% 미만'이므로 차이가 유의미하다고 결론짓습니다. 가설 검정은 HR 의사결정에 통계적 근거를 제공합니다."
  - type: code
    language: python
    title: 퇴사자/재직자 분리
    description: 두 그룹 생성
    content: |-
      attritionYes = hrData[hrData['AttritionBinary'] == 1]
      attritionNo = hrData[hrData['AttritionBinary'] == 0]
      f"퇴사자: {len(attritionYes)}명, 재직자: {len(attritionNo)}명"
  - type: tip
    content: 불리언 인덱싱으로 조건에 맞는 행만 선택합니다. hrData[조건]은 조건이 True인 행만 반환합니다. 01-07 프로젝트에서 배운 데이터 필터링 기법입니다.

- id: step5_ttest_income
  title: 5단계. t-test 급여 비교
  subtitle: 퇴사자 vs 재직자 급여
  blocks:
  - type: text
    content: "독립표본 t-test로 퇴사자와 재직자의 평균 급여를 비교합니다. t-test의 귀무가설(H0)은 '두 그룹의 평균이 같다'입니다. 검정 결과 p-value가 0.05 미만이면 귀무가설을 기각하고, '급여 차이가 통계적으로 유의미하다'고 결론짓습니다. 급여가 낮은 직원이 더 많이 퇴사한다면, 급여 인상이나 복지 개선이 퇴사 방지 전략이 될 수 있습니다."
  - type: code
    language: python
    title: 급여 t-test
    description: 두 그룹 평균 비교
    content: |-
      incomeYes = attritionYes['MonthlyIncome']
      incomeNo = attritionNo['MonthlyIncome']

      tStatIncome, pValueIncome = stats.ttest_ind(incomeYes, incomeNo)
      f"t-statistic: {tStatIncome:.3f}, p-value: {pValueIncome:.4f}"
  - type: tip
    content: stats.ttest_ind()는 독립표본 t-test를 수행합니다. ind는 independent(독립)의 약자입니다. 두 그룹이 서로 독립적일 때 사용합니다. 동일한 사람의 전후 비교는 paired t-test(ttest_rel)를 사용합니다.

- id: step6_ttest_interpret
  title: 6단계. t-test 결과 해석
  subtitle: 급여 차이 확인
  blocks:
  - type: text
    content: "p-value와 함께 실제 평균 차이도 확인해야 합니다. 표본이 크면 작은 차이도 통계적으로 유의미하게 나올 수 있지만, 실제 비즈니스 의미가 없을 수 있습니다. 예를 들어 퇴사자가 재직자보다 월급이 1만원 낮고 p-value가 0.01이어도, 이 차이로 퇴사를 설명하기는 어렵습니다. 통계적 유의성(p-value)과 실질적 유의성(효과 크기)을 함께 고려해야 의미 있는 결론을 얻습니다."
  - type: code
    language: python
    title: 평균 급여 비교
    description: 실제 차이 확인
    content: |-
      meanIncomeYes = incomeYes.mean()
      meanIncomeNo = incomeNo.mean()

      incomeDf = pd.DataFrame({
          '그룹': ['퇴사자', '재직자'],
          '평균급여': [meanIncomeYes, meanIncomeNo],
          '인원수': [len(incomeYes), len(incomeNo)]
      })
      incomeDf
  - type: tip
    content: 퇴사자의 평균 급여가 재직자보다 낮다면, 급여 불만족이 퇴사 요인일 수 있습니다. 하지만 상관관계가 인과관계를 의미하지는 않습니다.

- id: step7_ttest_age
  title: 7단계. t-test 나이 비교
  subtitle: 연령대별 퇴사 패턴
  blocks:
  - type: text
    content: "퇴사자와 재직자의 평균 나이를 비교합니다. 일반적으로 젊은 직원은 경력 개발, 더 좋은 기회 탐색 등의 이유로 이직률이 높습니다. 반면 경력이 쌓인 직원은 안정성을 선호하여 퇴사율이 낮을 수 있습니다. t-test 결과가 유의미하다면 연령대별 맞춤 인재 관리 전략이 필요합니다. 예를 들어 젊은 직원에게는 성장 기회를, 경력 직원에게는 안정성을 강조하는 접근이 효과적일 수 있습니다."
  - type: code
    language: python
    title: 나이 t-test
    description: 연령 비교
    content: |-
      ageYes = attritionYes['Age']
      ageNo = attritionNo['Age']

      tStatAge, pValueAge = stats.ttest_ind(ageYes, ageNo)

      ageDf = pd.DataFrame({
          '그룹': ['퇴사자', '재직자'],
          '평균나이': [ageYes.mean(), ageNo.mean()],
          't-stat': [tStatAge, '-'],
          'p-value': [f"{pValueAge:.4f}", '-']
      })
      ageDf

- id: step8_ttest_years
  title: 8단계. t-test 근속연수 비교
  subtitle: 재직 기간 분석
  blocks:
  - type: text
    content: "근속연수(YearsAtCompany)가 퇴사에 영향을 미치는지 검정합니다. 신입 직원은 조직 적응 실패, 기대와 현실의 괴리 등으로 퇴사율이 높은 경향이 있습니다. 반면 장기 근속자는 회사에 대한 충성도가 높고 퇴직금 등의 이유로 퇴사를 꺼릴 수 있습니다. 근속연수와 퇴사의 관계를 파악하면 온보딩 프로그램 강화, 신입 멘토링 제도 등 적절한 시기에 개입하는 전략을 수립할 수 있습니다."
  - type: code
    language: python
    title: 근속연수 t-test
    description: 재직 기간 비교
    content: |-
      yearsYes = attritionYes['YearsAtCompany']
      yearsNo = attritionNo['YearsAtCompany']

      tStatYears, pValueYears = stats.ttest_ind(yearsYes, yearsNo)

      yearsDf = pd.DataFrame({
          '그룹': ['퇴사자', '재직자'],
          '평균근속연수': [yearsYes.mean(), yearsNo.mean()],
          't-stat': [tStatYears, '-'],
          'p-value': [f"{pValueYears:.4f}", '-']
      })
      yearsDf

- id: step9_multiple_ttest
  title: 9단계. 여러 변수 t-test
  subtitle: 종합 비교
  blocks:
  - type: text
    content: "여러 수치형 변수에 대해 한번에 t-test를 수행하여 퇴사와 가장 관련 있는 요인을 찾습니다. 나이, 급여, 근속연수, 총 경력, 출퇴근 거리, 이전 직장 수 등을 비교합니다. p-value로 정렬하면 퇴사자와 재직자 간 차이가 가장 큰 변수가 무엇인지 한눈에 파악할 수 있습니다. 이는 로지스틱 회귀 모델에 어떤 변수를 넣을지 결정하는 근거가 됩니다."
  - type: code
    language: python
    title: 다중 t-test
    description: 주요 변수 비교
    content: |-
      numericVars = ['Age', 'MonthlyIncome', 'YearsAtCompany', 'TotalWorkingYears',
                     'DistanceFromHome', 'NumCompaniesWorked', 'YearsInCurrentRole']

      ttestResults = []
      for var in numericVars:
          yesVals = attritionYes[var].dropna()
          noVals = attritionNo[var].dropna()
          tStat, pVal = stats.ttest_ind(yesVals, noVals)
          ttestResults.append({
              'Variable': var,
              'Mean_Yes': yesVals.mean(),
              'Mean_No': noVals.mean(),
              'Difference': yesVals.mean() - noVals.mean(),
              'p-value': pVal,
              'Significant': 'Yes' if pVal < 0.05 else 'No'
          })

      ttestDf = pd.DataFrame(ttestResults).sort_values('p-value')
      ttestDf
  - type: tip
    content: p-value가 낮은 순서로 정렬하면 퇴사와 가장 관련 있는 변수를 찾을 수 있습니다. Significant가 Yes인 변수는 퇴사자와 재직자 간 차이가 통계적으로 유의미합니다.

- id: step10_ttest_viz
  title: 10단계. t-test 결과 시각화
  subtitle: 변수별 차이 비교
  blocks:
  - type: text
    content: 여러 변수의 t-test 결과를 막대 그래프로 시각화하면 어떤 요인이 퇴사에 가장 큰 영향을 미치는지 직관적으로 파악할 수 있습니다. 유의미한 변수(p < 0.05)와 그렇지 않은 변수를 색상으로 구분합니다.
  - type: code
    language: python
    title: t-test 결과 막대그래프
    description: Altair 시각화
    content: |-
      import altair as alt

      ttestViz = alt.Chart(ttestDf).mark_bar().encode(
          x=alt.X('Variable:N', sort='-y', title='Variable'),
          y=alt.Y('Difference:Q', title='Mean Difference (Yes - No)'),
          color=alt.Color('Significant:N', scale=alt.Scale(domain=['Yes', 'No'], range=['#e74c3c', '#95a5a6'])),
          tooltip=['Variable', 'Mean_Yes', 'Mean_No', 'Difference', 'p-value']
      ).properties(width=500, height=300, title='Mean Difference by Variable (Attrition Yes vs No)')
      ttestViz
  - type: tip
    content: 빨간색은 통계적으로 유의미한 차이(p < 0.05), 회색은 유의미하지 않은 차이입니다. 막대가 길수록 퇴사자와 재직자 간 차이가 큽니다.

- id: step11_anova_intro
  title: 11단계. ANOVA 소개
  subtitle: 3개 이상 그룹 비교
  blocks:
  - type: text
    content: "t-test는 2개 그룹만 비교할 수 있습니다. 3개 이상 그룹을 비교하려면 ANOVA(Analysis of Variance, 분산분석)를 사용합니다. 직무만족도는 1(매우 낮음)에서 4(매우 높음)까지 4단계로 측정되므로 ANOVA가 적합합니다. ANOVA는 '모든 그룹의 평균이 같다'는 귀무가설을 검정하며, p-value가 0.05 미만이면 최소 한 그룹은 다른 그룹과 유의미하게 다르다고 결론짓습니다."
  - type: code
    language: python
    title: 직무만족도별 그룹화
    description: 4개 그룹 생성
    content: |-
      satisfactionGroups = hrData.groupby('JobSatisfaction')['AttritionBinary'].agg(['mean', 'count'])
      satisfactionGroups.columns = ['퇴사율', '인원수']
      satisfactionGroups
  - type: tip
    content: JobSatisfaction은 1(낮음)에서 4(높음)까지 4단계입니다. groupby().agg()로 각 그룹의 통계량을 계산합니다. 02 프로젝트에서 배운 집계 함수 활용입니다.

- id: step12_anova_test
  title: 12단계. ANOVA 검정
  subtitle: 만족도별 퇴사율 차이
  blocks:
  - type: text
    content: "One-way ANOVA로 직무만족도 4개 그룹 간 퇴사율 차이를 검정합니다. F-statistic은 그룹 간 분산을 그룹 내 분산으로 나눈 값으로, 클수록 그룹 간 차이가 뚜렷합니다. 만족도 1인 그룹의 퇴사율이 만족도 4인 그룹보다 높다면, 직무 만족도 개선이 퇴사 방지에 효과적이라는 통계적 근거가 됩니다. ANOVA 결과가 유의미하면 어떤 그룹 간에 차이가 있는지 사후검정으로 추가 분석할 수 있습니다."
  - type: code
    language: python
    title: ANOVA 수행
    description: 4개 그룹 비교
    content: |-
      group1 = hrData[hrData['JobSatisfaction'] == 1]['AttritionBinary']
      group2 = hrData[hrData['JobSatisfaction'] == 2]['AttritionBinary']
      group3 = hrData[hrData['JobSatisfaction'] == 3]['AttritionBinary']
      group4 = hrData[hrData['JobSatisfaction'] == 4]['AttritionBinary']

      fStat, pValueAnova = stats.f_oneway(group1, group2, group3, group4)
      f"F-statistic: {fStat:.3f}, p-value: {pValueAnova:.4f}"
  - type: tip
    content: stats.f_oneway()는 One-way ANOVA를 수행합니다. F-statistic은 그룹 간 분산과 그룹 내 분산의 비율입니다. F값이 클수록 그룹 간 차이가 큽니다.

- id: step13_anova_boxplot
  title: 13단계. ANOVA Boxplot 시각화
  subtitle: 만족도별 급여 분포
  blocks:
  - type: text
    content: Boxplot은 ANOVA 분석에 적합한 시각화로, 각 그룹의 중앙값, 사분위수, 이상치를 한눈에 보여줍니다. 직무만족도별 급여 분포를 비교하면 어떤 그룹이 급여가 낮은지 파악할 수 있습니다.
  - type: code
    language: python
    title: 만족도별 급여 Boxplot
    description: seaborn 시각화
    content: |-
      import seaborn as sns
      import matplotlib.pyplot as plt

      boxFig, boxAx = plt.subplots(figsize=(8, 5))
      sns.boxplot(data=hrData, x='JobSatisfaction', y='MonthlyIncome', hue='Attrition', ax=boxAx, palette=['#2ecc71', '#e74c3c'])
      boxAx.set_xlabel('Job Satisfaction (1=Low, 4=High)')
      boxAx.set_ylabel('Monthly Income')
      boxAx.set_title('Monthly Income by Job Satisfaction and Attrition')
      boxFig
  - type: tip
    content: 녹색은 재직자, 빨간색은 퇴사자입니다. 박스 안의 선은 중앙값, 박스 상하는 25%-75% 범위입니다. 퇴사자의 급여가 전반적으로 낮다면 급여 불만족이 퇴사 원인일 수 있습니다.

- id: step14_anova_viz
  title: 14단계. ANOVA 시각화
  subtitle: 만족도별 퇴사율 비교
  blocks:
  - type: text
    content: "직무만족도별 퇴사율을 막대그래프로 시각화합니다. 시각화는 통계 검정 결과를 직관적으로 이해하게 해주며, 경영진에게 보고할 때 설득력을 높입니다. 막대 높이가 일정하지 않고 만족도가 낮을수록 퇴사율이 높은 패턴이 보인다면, 직무 만족도 개선의 필요성을 시각적으로 증명할 수 있습니다. 숫자와 그래프를 함께 제시하면 분석 결과의 신뢰성이 높아집니다."
  - type: code
    language: python
    title: 퇴사율 막대그래프
    description: 만족도별 비교
    content: |-
      satisfactionDf = hrData.groupby('JobSatisfaction')['AttritionBinary'].mean().reset_index()
      satisfactionDf.columns = ['JobSatisfaction', 'AttritionRate']

      satisfactionFig = px.bar(satisfactionDf, x='JobSatisfaction', y='AttritionRate',
                               title='Job Satisfaction vs Attrition Rate',
                               labels={'JobSatisfaction': 'Job Satisfaction (1-4)', 'AttritionRate': 'Attrition Rate'},
                               color='AttritionRate',
                               color_continuous_scale='Reds')
      satisfactionFig.show()

- id: step15_logit_model
  title: 15단계. 로지스틱 회귀
  subtitle: 퇴사 확률 예측
  blocks:
  - type: text
    content: "로지스틱 회귀로 여러 요인을 동시에 고려하여 퇴사 확률을 예측합니다. t-test는 한 번에 하나의 변수만 분석하지만, 로지스틱 회귀는 나이, 급여, 근속연수 등 여러 변수의 영향을 동시에 분석합니다. 이렇게 하면 '다른 조건이 같을 때' 각 변수가 퇴사에 미치는 순수한 영향력을 파악할 수 있습니다. 예를 들어 급여가 낮아서 퇴사하는지, 근속연수가 짧아서 퇴사하는지 구분할 수 있습니다."
  - type: code
    language: python
    title: Logit 모델 구축
    description: 다중 로지스틱 회귀
    content: |-
      XLogit = hrData[['Age', 'MonthlyIncome', 'YearsAtCompany', 'DistanceFromHome', 'NumCompaniesWorked']].copy()
      XLogit = sm.add_constant(XLogit)
      yLogit = hrData['AttritionBinary']

      logitModel = sm.Logit(yLogit, XLogit).fit(disp=0)
      logitModel.summary()

- id: step16_odds_ratio
  title: 16단계. 승산비 계산
  subtitle: 변수별 영향력
  blocks:
  - type: text
    content: "승산비(Odds Ratio)로 각 변수의 영향력을 해석합니다. 승산비는 로지스틱 회귀 계수를 exp() 함수로 변환한 값으로, 해당 변수가 1 증가할 때 퇴사 '승산'이 몇 배로 바뀌는지 나타냅니다. 승산비가 1.1이면 10% 증가, 0.9이면 10% 감소입니다. 예를 들어 DistanceFromHome의 승산비가 1.05면 출퇴근 거리가 1km 증가할 때마다 퇴사 승산이 5% 증가한다는 의미입니다."
  - type: code
    language: python
    title: 승산비 계산
    description: exp(계수)
    content: |-
      oddsRatio = np.exp(logitModel.params)
      pvals = logitModel.pvalues

      orDf = pd.DataFrame({
          'Variable': oddsRatio.index,
          'Odds Ratio': oddsRatio.values,
          'p-value': pvals.values,
          'Significant': ['Yes' if p < 0.05 else 'No' for p in pvals.values]
      })
      orDf
  - type: tip
    content: Odds Ratio가 1.1이면 해당 변수가 1 증가할 때 퇴사 확률이 10% 증가합니다. 0.9이면 10% 감소합니다. 05 프로젝트의 승산비 해석과 동일합니다.

- id: step17_prediction
  title: 17단계. 퇴사 확률 예측
  subtitle: 개인별 리스크 점수
  blocks:
  - type: text
    content: "predict()로 각 직원의 퇴사 확률을 계산합니다. 확률이 30% 이상인 직원을 고위험군으로 분류하면, HR 팀이 선제적으로 면담을 진행하거나 맞춤형 복지를 제공할 수 있습니다. 모든 직원에게 동일한 자원을 투입하는 것보다, 퇴사 위험이 높은 직원에게 집중 관리하는 것이 비용 대비 효과적입니다. 이런 예측 기반 HR 관리를 People Analytics라고 합니다."
  - type: code
    language: python
    title: 퇴사 확률 계산
    description: 전체 직원 예측
    content: |-
      hrData['AttritionProb'] = logitModel.predict(XLogit)

      highRisk = hrData[hrData['AttritionProb'] > 0.3][['Age', 'MonthlyIncome', 'YearsAtCompany', 'AttritionProb', 'AttritionBinary']]
      f"고위험군 직원 수: {len(highRisk)}명"
      highRisk.head(10)

- id: step18_roc_auc
  title: 18단계. 모델 평가
  subtitle: ROC-AUC 계산
  blocks:
  - type: text
    content: "ROC-AUC로 모델 성능을 평가합니다. AUC(Area Under Curve)는 모델이 퇴사자와 재직자를 얼마나 잘 구분하는지 나타내며, 0.5는 무작위 추측, 1.0은 완벽한 분류입니다. 실무에서는 AUC 0.7 이상이면 사용 가능한 수준으로 봅니다. ROC 곡선이 대각선(무작위 기준선)에서 멀리 위쪽으로 휘어질수록 좋은 모델입니다. 모델 성능이 낮다면 더 많은 변수를 추가하거나 다른 알고리즘을 시도해볼 수 있습니다."
  - type: code
    language: python
    title: ROC-AUC 계산
    description: 모델 성능
    content: |-
      from sklearn.metrics import roc_auc_score, roc_curve

      aucScore = roc_auc_score(yLogit, hrData['AttritionProb'])
      f"AUC: {aucScore:.3f}"

      fpr, tpr, thresholds = roc_curve(yLogit, hrData['AttritionProb'])

      rocFig = go.Figure()
      rocFig.add_trace(go.Scatter(x=fpr, y=tpr, mode='lines', name=f'ROC (AUC={aucScore:.3f})'))
      rocFig.add_trace(go.Scatter(x=[0, 1], y=[0, 1], mode='lines', name='Random', line=dict(dash='dash')))
      rocFig.update_layout(title='ROC Curve - Attrition Prediction',
                           xaxis_title='False Positive Rate',
                           yaxis_title='True Positive Rate')
      rocFig.show()

- id: practice
  title: 실습
  subtitle: HR 분석 프로젝트
  blocks:
  - type: text
    content: "HR 분석가가 되어 직원 퇴사 요인을 분석합니다. 실제 HR 분석에서는 여러 가설을 검정하고, 유의미한 변수를 조합하여 예측 모델을 만듭니다. 각 미션은 데이터 로딩부터 가설 검정, 로지스틱 회귀까지 전체 과정을 독립적으로 수행합니다. 본 프로젝트에서 배운 t-test, ANOVA, 승산비 해석을 실습을 통해 체화해봅니다."
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: WorkLifeBalance와 OverTime의 퇴사 영향 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 전처리"
      content: |-
        import pandas as pd
        import numpy as np
        import statsmodels.api as sm
        from scipy import stats

        wlbUrl = "https://raw.githubusercontent.com/IBM/employee-attrition-aif360/master/data/emp_attrition.csv"
        wlbData = pd.read_csv(wlbUrl)
        wlbData['AttritionBinary'] = (wlbData['Attrition'] == 'Yes').astype(int)
        wlbData.shape
    - type: code
      title: "OverTime t-test 분석"
      content: |-
        otYes = wlbData[wlbData['OverTime'] == 'Yes']['AttritionBinary']
        otNo = wlbData[wlbData['OverTime'] == 'No']['AttritionBinary']
        otStat, otPval = stats.ttest_ind(otYes, otNo)

        otDf = pd.DataFrame({
            'OverTime': ['Yes', 'No'],
            'AttritionRate': [otYes.mean(), otNo.mean()],
            'Count': [len(otYes), len(otNo)],
            'p-value': [f"{otPval:.4f}", '-']
        })
        otDf
    - type: code
      title: "WorkLifeBalance ANOVA + Logit"
      content: |-
        wlbGroups = [wlbData[wlbData['WorkLifeBalance'] == i]['AttritionBinary'] for i in [1, 2, 3, 4]]
        fStat, wlbPval = stats.f_oneway(*wlbGroups)

        wlbData['OverTimeBinary'] = (wlbData['OverTime'] == 'Yes').astype(int)
        wlbX = sm.add_constant(wlbData[['OverTimeBinary', 'WorkLifeBalance', 'MonthlyIncome']])
        wlbY = wlbData['AttritionBinary']
        wlbModel = sm.Logit(wlbY, wlbX).fit(disp=0)

        orDf = pd.DataFrame({
            'Variable': wlbModel.params.index,
            'OddsRatio': np.exp(wlbModel.params),
            'pvalue': wlbModel.pvalues
        })
        orDf
  - type: expansion
    title: "미션2: 부서별 퇴사율 분석 및 고위험 부서 식별"
    blocks:
    - type: code
      title: "데이터 로드 및 부서별 집계"
      content: |-
        import pandas as pd
        import numpy as np
        import statsmodels.api as sm
        from scipy import stats

        deptUrl = "https://raw.githubusercontent.com/IBM/employee-attrition-aif360/master/data/emp_attrition.csv"
        deptData = pd.read_csv(deptUrl)
        deptData['AttritionBinary'] = (deptData['Attrition'] == 'Yes').astype(int)

        deptAgg = deptData.groupby('Department')['AttritionBinary'].agg(['mean', 'count']).reset_index()
        deptAgg.columns = ['Department', 'AttritionRate', 'Count']
        deptAgg.sort_values('AttritionRate', ascending=False)
    - type: code
      title: "ANOVA 검정 및 시각화"
      content: |-
        import plotly.express as px

        deptGroups = [deptData[deptData['Department'] == dept]['AttritionBinary'] for dept in deptData['Department'].unique()]
        deptFstat, deptPval = stats.f_oneway(*deptGroups)

        deptFig = px.bar(deptAgg, x='Department', y='AttritionRate',
                         title='Attrition Rate by Department',
                         color='AttritionRate', color_continuous_scale='Reds', text='Count')
        deptFig.update_traces(texttemplate='n=%{text}', textposition='outside')
        deptFig
    - type: code
      title: "부서 더미변수 Logit 모델"
      content: |-
        deptDummies = pd.get_dummies(deptData['Department'], drop_first=True, dtype=int)
        deptX = sm.add_constant(pd.concat([deptDummies, deptData[['MonthlyIncome', 'YearsAtCompany']]], axis=1))
        deptY = deptData['AttritionBinary']
        deptModel = sm.Logit(deptY, deptX).fit(disp=0)

        deptOrDf = pd.DataFrame({
            'Variable': deptModel.params.index,
            'OddsRatio': np.exp(deptModel.params),
            'pvalue': deptModel.pvalues
        })
        deptOrDf

- id: summary
  title: 정리
  subtitle: 여덟 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 IBM HR 데이터로 직원 퇴사 요인을 분석했습니다. t-test로 퇴사자와 재직자의 급여, 나이, 근속연수 차이를 검정하고, ANOVA로 직무만족도별 퇴사율을 비교했습니다. 로지스틱 회귀로 퇴사 확률을 예측하고, 고위험군 직원을 식별했습니다. 이제 HR 분석, 인재 유지 전략, 채용 계획에 통계적 근거를 제공할 수 있습니다.
  - type: list
    items:
    - "t-test - 두 그룹 평균 비교"
    - "ANOVA - 3개 이상 그룹 비교"
    - "p-value가 0.05 미만이면 통계적으로 유의미"
    - "F-statistic - 그룹 간/내 분산 비율"
    - "Logit + 승산비 - 퇴사 확률과 영향력"
    - "ROC-AUC - 분류 모델 성능 평가"
  - type: text
    content: 다음 프로젝트에서는 자전거 수요 데이터로 ARIMA 시계열 분석을 배웁니다. ACF, PACF로 파라미터를 선택하고 미래 수요를 예측해봅니다.
