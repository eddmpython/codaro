  - type: "code"
    language: "python"
    title: "__slots__ 활용"
    description: "__dict__ 생략으로 메모리 절약"
    content: |-
      class RegularPt:
          def __init__(self, x, y):
              self.x = x
              self.y = y

      class SlottedPt:
          __slots__ = ['x', 'y']
          def __init__(self, x, y):
              self.x = x
              self.y = y

      regPt = RegularPt(1, 2)
      slotPt = SlottedPt(1, 2)
      regHasDict = hasattr(regPt, '__dict__')
      slotHasDict = hasattr(slotPt, '__dict__')
      slotResult = (regHasDict, slotHasDict)
      slotResult

- id: "builtin_func"
  title: "내장 함수 활용"
