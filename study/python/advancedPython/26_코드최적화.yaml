    title: "검색 성능 비교"
    description: "List vs Set vs Dict"
    content: |-
      dsTestList = list(range(10000))
      dsTestSet = set(dsTestList)
      dsTestDict = {i: i for i in dsTestList}

      dsTarget = 9999
      dsListIn = dsTarget in dsTestList
      dsSetIn = dsTarget in dsTestSet
      dsDictIn = dsTarget in dsTestDict
      dsResult = (dsListIn, dsSetIn, dsDictIn)
      dsResult
  - type: "code"
    language: "python"
    title: "Deque 활용"
    description: "큐 연산 O(1) 보장"
    content: |-
      from collections import deque

      def useListQueue(n):
          q = []
          for i in range(n):
              q.append(i)
          result = []
          while q:
              result.append(q.pop(0))
          return len(result)

      def useDequeQueue(n):
          q = deque()
          for i in range(n):
              q.append(i)
          result = []
          while q:
              result.append(q.popleft())
          return len(result)

      dqListLen = useListQueue(1000)
      dqDequeLen = useDequeQueue(1000)
      dqResult = (dqListLen, dqDequeLen)
      dqResult

