- id: "time_complexity"
  title: "시간 복잡도 개선"
  subtitle: "O(n²)에서 O(n)으로"
  blocks:
  - type: "text"
    content: "Set을 활용하면 in 연산이 O(1)이 되어 전체 복잡도가 개선됩니다."
  - type: "code"
    language: "python"
    title: "중복 찾기 최적화"
    description: "Set 활용 O(n) 달성"
    content: |-
      def findDupSlow(nums):
          dups = []
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] == nums[j] and nums[i] not in dups:
                      dups.append(nums[i])
          return dups

      def findDupFast(nums):
          seen = set()
          dups = set()
          for num in nums:
              if num in seen:
                  dups.add(num)
              seen.add(num)
          return list(dups)

      tcNums = [1, 2, 3, 2, 4, 3, 5]
      tcSlow = findDupSlow(tcNums)
      tcFast = findDupFast(tcNums)
      tcResult = (tcSlow, tcFast)
      tcResult
  - type: "code"
    language: "python"
    title: "Two Sum 최적화"
    description: "해시맵으로 보수 찾기"
    content: |-
      def twoSumSlow(nums, target):
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] + nums[j] == target:
                      return [i, j]
          return []

      def twoSumFast(nums, target):
          numMap = {}
          for i, num in enumerate(nums):
              comp = target - num
              if comp in numMap:
                  return [numMap[comp], i]
              numMap[num] = i
          return []

      tsArr = [2, 7, 11, 15]
      tsSlow = twoSumSlow(tsArr, 9)
      tsFast = twoSumFast(tsArr, 9)
      tsResult = (tsSlow, tsFast)
      tsResult

- id: "data_structure"
  title: "자료구조 선택"
  subtitle: "적절한 자료구조로 성능 향상"
