      def useListMem(n):
          return [i ** 2 for i in range(n)]

      def useGenMem(n):
          return (i ** 2 for i in range(n))

      memList = useListMem(10)
      memGen = useGenMem(10)
      memListSum = sum(memList)
      memGenSum = sum(memGen)
      memResult = (memListSum, memGenSum)
