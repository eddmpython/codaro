      def topKSlow(arr, k):
          return sorted(arr, reverse=True)[:k]

      import heapq
      def topKFast(arr, k):
          return heapq.nlargest(k, arr)

      def topKHeap(arr, k):
          heap = arr[:k]
          heapq.heapify(heap)
          for num in arr[k:]:
              if num > heap[0]:
                  heapq.heapreplace(heap, num)
          return sorted(heap, reverse=True)

      ex20Arr = [3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5]
      ex20Slow = topKSlow(ex20Arr, 3)
      ex20Fast = topKFast(ex20Arr, 3)
      ex20Heap = topKHeap(ex20Arr, 3)
      ex20Result = (ex20Slow, ex20Fast, ex20Heap)
