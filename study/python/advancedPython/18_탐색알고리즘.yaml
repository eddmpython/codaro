      from collections import deque

      def wordLadderLength(beginWord, endWord, wordList):
          wordSet = set(wordList)
          if endWord not in wordSet:
              return 0
          queueWord = deque([(beginWord, 1)])
          visitedWord = {beginWord}
          while queueWord:
              word, length = queueWord.popleft()
              if word == endWord:
                  return length
              for i in range(len(word)):
                  for c in 'abcdefghijklmnopqrstuvwxyz':
                      newWord = word[:i] + c + word[i+1:]
                      if newWord in wordSet and newWord not in visitedWord:
                          visitedWord.add(newWord)
                          queueWord.append((newWord, length + 1))
          return 0

      ex18Words = ['hot', 'dot', 'dog', 'lot', 'log', 'cog']
      f"hit → cog 변환 횟수: {wordLadderLength('hit', 'cog', ex18Words)}"

