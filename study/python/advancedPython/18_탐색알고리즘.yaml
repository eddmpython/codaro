      from collections import deque

      def isBipartiteGraph(graph):
          colorMap = {}
          for start in graph:
              if start in colorMap:
                  continue
              queueBi = deque([start])
              colorMap[start] = 0
              while queueBi:
                  nodeBi = queueBi.popleft()
                  for neighbor in graph[nodeBi]:
                      if neighbor not in colorMap:
                          colorMap[neighbor] = 1 - colorMap[nodeBi]
                          queueBi.append(neighbor)
                      elif colorMap[neighbor] == colorMap[nodeBi]:
                          return False
          return True

      ex13Bipartite = {'A': ['B', 'D'], 'B': ['A', 'C'], 'C': ['B', 'D'], 'D': ['A', 'C']}
      ex13NonBipartite = {'A': ['B', 'C'], 'B': ['A', 'C'], 'C': ['A', 'B']}
      f"이분: {isBipartiteGraph(ex13Bipartite)}, 비이분: {isBipartiteGraph(ex13NonBipartite)}"

