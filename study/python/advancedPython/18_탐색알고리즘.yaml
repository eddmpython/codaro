    code: |-
      def kruskalMst(nodes, edges):
          parentMst = {n: n for n in nodes}
          def find(x):
              if parentMst[x] != x:
                  parentMst[x] = find(parentMst[x])
              return parentMst[x]
          def union(a, b):
              pa, pb = find(a), find(b)
              if pa != pb:
                  parentMst[pa] = pb
                  return True
              return False
          mstEdges = []
          for weight, u, v in sorted(edges):
              if union(u, v):
                  mstEdges.append((u, v, weight))
          return mstEdges

      ex14Vertices = ['A', 'B', 'C', 'D']
      ex14Edges = [(1, 'A', 'B'), (3, 'A', 'C'), (2, 'B', 'C'), (4, 'B', 'D'), (5, 'C', 'D')]
      f"MST: {kruskalMst(ex14Vertices, ex14Edges)}"

