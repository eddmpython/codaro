      def countConnectedComponents(n, edges):
          graphComp = {i: [] for i in range(n)}
          for a, b in edges:
              graphComp[a].append(b)
              graphComp[b].append(a)
          visitedComp = set()
          componentCount = 0
          def dfsComp(node):
              visitedComp.add(node)
              for neighbor in graphComp[node]:
                  if neighbor not in visitedComp:
                      dfsComp(neighbor)
          for node in range(n):
              if node not in visitedComp:
                  dfsComp(node)
                  componentCount += 1
          return componentCount

      ex12Edges = [(0, 1), (1, 2), (3, 4)]
      f"연결 요소 개수: {countConnectedComponents(5, ex12Edges)}"

