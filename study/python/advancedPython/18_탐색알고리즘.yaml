      from collections import deque

      def topologicalSortKahn(graph):
          inDegree = {node: 0 for node in graph}
          for node in graph:
              for neighbor in graph[node]:
                  inDegree[neighbor] = inDegree.get(neighbor, 0) + 1
          queueTopo = deque([node for node in inDegree if inDegree[node] == 0])
          topoResult = []
          while queueTopo:
              nodeTopo = queueTopo.popleft()
              topoResult.append(nodeTopo)
              for neighbor in graph[nodeTopo]:
                  inDegree[neighbor] -= 1
                  if inDegree[neighbor] == 0:
                      queueTopo.append(neighbor)
          return topoResult if len(topoResult) == len(graph) else []

      ex10Tasks = {'A': ['B', 'C'], 'B': ['D'], 'C': ['D'], 'D': ['E'], 'E': []}
      f"작업 순서: {topologicalSortKahn(ex10Tasks)}"

