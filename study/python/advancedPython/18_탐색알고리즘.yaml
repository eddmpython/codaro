      def canPartitionEqual(nums):
          total = sum(nums)
          if total % 2 != 0:
              return False
          target = total // 2
          possibleSums = {0}
          for num in nums:
              possibleSums = possibleSums | {x + num for x in possibleSums if x + num <= target}
          return target in possibleSums

      ex16Cases = [[1, 5, 11, 5], [1, 2, 3, 5]]
      ex16Results = [(arr, canPartitionEqual(arr)) for arr in ex16Cases]
      f"균등 분할 가능: {ex16Results}"

