      import bisect

      class KthSmallestTracker:
          def __init__(self, k):
              self.k = k
              self.data = []

          def add(self, val):
              bisect.insort(self.data, val)
              return self.data[self.k - 1] if len(self.data) >= self.k else None

      ex7Tracker = KthSmallestTracker(3)
      ex7Results = [ex7Tracker.add(x) for x in [5, 2, 8, 1, 9, 3]]
      f"3번째 최솟값 변화: {ex7Results}"

