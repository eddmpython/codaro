    code: |-
      def hasCycleDfs(graph):
          visitedCycle = set()
          recStackCycle = set()
          def dfs(node):
              visitedCycle.add(node)
              recStackCycle.add(node)
              for neighbor in graph.get(node, []):
                  if neighbor not in visitedCycle:
                      if dfs(neighbor):
                          return True
                  elif neighbor in recStackCycle:
                      return True
              recStackCycle.remove(node)
              return False
          for node in graph:
              if node not in visitedCycle:
                  if dfs(node):
                      return True
          return False

      cycleGraph = {'A': ['B'], 'B': ['C'], 'C': ['A']}
      noCycleGraph = {'A': ['B'], 'B': ['C'], 'C': []}
      f"사이클 있음: {hasCycleDfs(cycleGraph)}, 없음: {hasCycleDfs(noCycleGraph)}"

