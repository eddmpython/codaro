      import heapq

      def dijkstraShortestPath(graph, start):
          distancesDij = {node: float('inf') for node in graph}
          distancesDij[start] = 0
          heapDij = [(0, start)]
          while heapDij:
              dist, nodeDij = heapq.heappop(heapDij)
              if dist > distancesDij[nodeDij]:
                  continue
              for neighbor, weight in graph[nodeDij]:
                  newDist = dist + weight
                  if newDist < distancesDij[neighbor]:
                      distancesDij[neighbor] = newDist
                      heapq.heappush(heapDij, (newDist, neighbor))
          return distancesDij

      ex15Graph = {
          'A': [('B', 1), ('C', 4)],
          'B': [('C', 2), ('D', 5)],
          'C': [('D', 1)],
          'D': []
      }
      f"A에서 각 노드까지: {dijkstraShortestPath(ex15Graph, 'A')}"

