    code: |-
      from collections import deque

      def gridBfsDistance(grid, start, end):
          rows, cols = len(grid), len(grid[0])
          directions = [(0, 1), (1, 0), (0, -1), (-1, 0)]
          visitedGrid = {start}
          queueGrid = deque([(start, 0)])
          while queueGrid:
              (r, c), dist = queueGrid.popleft()
              if (r, c) == end:
                  return dist
              for dr, dc in directions:
                  nr, nc = r + dr, c + dc
                  if 0 <= nr < rows and 0 <= nc < cols:
                      if (nr, nc) not in visitedGrid and grid[nr][nc] == 0:
                          visitedGrid.add((nr, nc))
                          queueGrid.append(((nr, nc), dist + 1))
          return -1

      ex9Maze = [[0, 0, 0, 0], [1, 1, 0, 1], [0, 0, 0, 0], [0, 1, 1, 0]]
      f"(0,0)에서 (3,3)까지 거리: {gridBfsDistance(ex9Maze, (0, 0), (3, 3))}"

