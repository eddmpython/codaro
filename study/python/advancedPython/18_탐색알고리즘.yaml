      def sqrtBinary(n, precision=0.0001):
          lo, hi = 0, n
          while hi - lo > precision:
              mid = (lo + hi) / 2
              if mid * mid < n:
                  lo = mid
              else:
                  hi = mid
          return (lo + hi) / 2

      ex2Result = sqrtBinary(2)
      f"√2 ≈ {ex2Result:.6f}"

