      def isConnected(graph, node1, node2):
          visitedConn = set()
          stackConn = [node1]
          while stackConn:
              nodeConn = stackConn.pop()
              if nodeConn == node2:
                  return True
              if nodeConn not in visitedConn:
                  visitedConn.add(nodeConn)
                  stackConn.extend(graph.get(nodeConn, []))
          return False

