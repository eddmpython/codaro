      def searchRotatedArray(arr, target):
          lo, hi = 0, len(arr) - 1
          while lo <= hi:
              mid = (lo + hi) // 2
              if arr[mid] == target:
                  return mid
              if arr[lo] <= arr[mid]:
                  if arr[lo] <= target < arr[mid]:
                      hi = mid - 1
                  else:
                      lo = mid + 1
              else:
                  if arr[mid] < target <= arr[hi]:
                      lo = mid + 1
                  else:
                      hi = mid - 1
          return -1

      ex6Rotated = [4, 5, 6, 7, 0, 1, 2]
      f"5의 위치: {searchRotatedArray(ex6Rotated, 5)}, 1의 위치: {searchRotatedArray(ex6Rotated, 1)}"

