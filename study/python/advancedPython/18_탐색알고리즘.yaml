      def canFinishTasks(tasks, workers, maxTime):
          workersNeeded = 0
          currentTime = 0
          for task in tasks:
              if task > maxTime:
                  return False
              if currentTime + task > maxTime:
                  workersNeeded += 1
                  currentTime = task
              else:
                  currentTime += task
          return workersNeeded + 1 <= workers

      def minMaxTimeRequired(tasks, workers):
          lo, hi = max(tasks), sum(tasks)
          while lo < hi:
              mid = (lo + hi) // 2
              if canFinishTasks(tasks, workers, mid):
                  hi = mid
              else:
                  lo = mid + 1
          return lo

      ex11Tasks = [7, 2, 5, 10, 8]
      f"2명이 처리할 때 최소 최대시간: {minMaxTimeRequired(ex11Tasks, 2)}"

