      from collections import deque

      def graphMaxDepth(graph, start):
          visitedDepth = {start}
          queueDepth = deque([(start, 0)])
          maxDepth = 0
          while queueDepth:
              nodeDepth, depth = queueDepth.popleft()
              maxDepth = max(maxDepth, depth)
              for neighbor in graph.get(nodeDepth, []):
                  if neighbor not in visitedDepth:
                      visitedDepth.add(neighbor)
                      queueDepth.append((neighbor, depth + 1))
          return maxDepth

      ex8Tree = {'A': ['B', 'C'], 'B': ['D', 'E'], 'C': ['F'], 'D': [], 'E': ['G'], 'F': [], 'G': []}
      f"트리 깊이: {graphMaxDepth(ex8Tree, 'A')}"

