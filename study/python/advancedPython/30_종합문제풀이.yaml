        code: |
          from functools import reduce
          from collections import defaultdict

          class DataProcessor:
              def __init__(self):
                  self.transformers = []

              def addTransform(self, func):
                  self.transformers.append(func)
                  return self

              def process(self, data):
                  return reduce(lambda d, f: f(d), self.transformers, data)

          class AnalyticsEngine:
              def __init__(self):
                  self.processor = DataProcessor()
                  self.cache = {}
                  self.observers = []

              def subscribe(self, callback):
                  self.observers.append(callback)

              def notify(self, event, data):
                  for obs in self.observers:
                      obs(event, data)

              def configure(self, *transforms):
                  for t in transforms:
                      self.processor.addTransform(t)
                  return self

              def analyze(self, data, cacheKey=None):
                  if cacheKey and cacheKey in self.cache:
                      self.notify("cache_hit", cacheKey)
                      return self.cache[cacheKey]

                  self.notify("processing", len(data))
                  result = self.processor.process(data)

                  if cacheKey:
                      self.cache[cacheKey] = result

                  self.notify("completed", result)
                  return result

          class StatCollector:
              def __init__(self):
                  self.stats = defaultdict(list)

              def __call__(self, event, data):
                  self.stats[event].append(data)

          ex20Data = [
              {"product": "A", "sales": 100, "region": "East"},
              {"product": "B", "sales": 150, "region": "West"},
              {"product": "A", "sales": 200, "region": "West"},
              {"product": "C", "sales": 80, "region": "East"},
              {"product": "B", "sales": 120, "region": "East"}
          ]

          ex20Collector = StatCollector()

          ex20Engine = (AnalyticsEngine()
              .configure(
                  lambda d: [x for x in d if x["sales"] >= 100],
                  lambda d: sorted(d, key=lambda x: x["sales"], reverse=True),
                  lambda d: {"items": d, "total": sum(x["sales"] for x in d),
                            "avg": sum(x["sales"] for x in d) / len(d) if d else 0}
              ))

          ex20Engine.subscribe(ex20Collector)
          ex20Analysis = ex20Engine.analyze(ex20Data, cacheKey="sales_report")
          ex20Cached = ex20Engine.analyze(ex20Data, cacheKey="sales_report")
          ex20Final = {
              "analysis": ex20Analysis,
              "events": dict(ex20Collector.stats)
          }
          ex20Final
