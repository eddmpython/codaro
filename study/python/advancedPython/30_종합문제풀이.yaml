          class QueryDSL:
              def __init__(self):
                  self.data = []

              def load(self, data):
                  self.data = data
                  return self

              def execute(self, query):
                  selectMatch = re.match(r'SELECT\s+(.+?)\s+FROM\s+data', query, re.I)
                  whereMatch = re.search(r'WHERE\s+(.+?)(?:\s+ORDER|\s*$)', query, re.I)
                  orderMatch = re.search(r'ORDER\s+BY\s+(\w+)(?:\s+(ASC|DESC))?', query, re.I)

                  result = list(self.data)

                  if whereMatch:
                      condition = whereMatch.group(1).strip()
                      result = self.applyWhere(result, condition)

                  if orderMatch:
                      field = orderMatch.group(1)
                      desc = orderMatch.group(2) and orderMatch.group(2).upper() == "DESC"
                      result = sorted(result, key=lambda x: x.get(field, 0), reverse=desc)

                  if selectMatch:
                      fields = [f.strip() for f in selectMatch.group(1).split(",")]
                      if fields != ["*"]:
                          result = [{f: r.get(f) for f in fields} for r in result]

                  return result

              def applyWhere(self, data, condition):
                  gtMatch = re.match(r'(\w+)\s*>\s*(\d+)', condition)
                  eqMatch = re.match(r'(\w+)\s*=\s*["\'](.+)["\']', condition)

                  if gtMatch:
                      field, value = gtMatch.groups()
                      return [r for r in data if r.get(field, 0) > int(value)]
                  if eqMatch:
                      field, value = eqMatch.groups()
                      return [r for r in data if r.get(field) == value]
                  return data

