          from collections import defaultdict
          import heapq

          class CachedGraph:
              def __init__(self):
                  self.graph = defaultdict(list)
                  self.pathCache = {}

              def addEdge(self, src, dest, weight):
                  self.graph[src].append((dest, weight))
                  self.graph[dest].append((src, weight))
                  self.pathCache.clear()

              def dijkstra(self, start, end):
                  cacheKey = (start, end)
                  if cacheKey in self.pathCache:
                      return self.pathCache[cacheKey]

                  distances = {start: 0}
                  previous = {start: None}
                  pq = [(0, start)]
                  visited = set()

                  while pq:
                      dist, node = heapq.heappop(pq)
                      if node in visited:
                          continue
                      visited.add(node)

                      if node == end:
                          break

                      for neighbor, weight in self.graph[node]:
                          if neighbor in visited:
                              continue
                          newDist = dist + weight
                          if neighbor not in distances or newDist < distances[neighbor]:
                              distances[neighbor] = newDist
                              previous[neighbor] = node
                              heapq.heappush(pq, (newDist, neighbor))

                  path = []
                  current = end
                  while current is not None:
                      path.append(current)
                      current = previous.get(current)
                  path.reverse()

                  result = {"distance": distances.get(end, float('inf')), "path": path}
                  self.pathCache[cacheKey] = result
                  return result

