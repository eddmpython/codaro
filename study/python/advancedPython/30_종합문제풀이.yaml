                  if not self.queue:
                      return None
                  task = heapq.heappop(self.queue)
                  task.startTime = self.currentTime
                  self.currentTime += task.duration
                  task.endTime = self.currentTime
                  self.completed.append(task)
                  return task

              def runAll(self):
                  while self.queue:
                      self.runNext()
                  return self.getReport()

              def getReport(self):
                  return [{
