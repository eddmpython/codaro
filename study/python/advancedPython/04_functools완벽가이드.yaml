    code: |-
      from functools import wraps

      def conditionalCache(condition):
          def decorator(func):
              cache = {}
              @wraps(func)
              def wrapper(*args):
                  if condition(*args):
                      if args not in cache:
                          cache[args] = func(*args)
                      return cache[args]
                  return func(*args)
              wrapper.cache = cache
              return wrapper
          return decorator

      @conditionalCache(lambda x: x > 0)
      def compute(x):
          return x ** 2

      compute(5), compute(-5), compute.cache

