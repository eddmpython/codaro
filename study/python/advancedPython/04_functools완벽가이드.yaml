  seo:
    title: "파이썬 functools 완벽 가이드 - partial, lru_cache, singledispatch"
    description: "functools 모듈의 핵심 함수들을 마스터합니다. partial, wraps, lru_cache, singledispatch, total_ordering 완벽 이해."
