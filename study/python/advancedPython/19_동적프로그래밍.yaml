      def maxProfitCooldown(prices):
          if len(prices) < 2:
              return 0
          hold = -prices[0]
          sold = 0
          rest = 0
          for price in prices[1:]:
              prevHold = hold
              prevSold = sold
              hold = max(prevHold, rest - price)
              sold = prevHold + price
              rest = max(rest, prevSold)
          return max(sold, rest)

      stockPrices = [1, 2, 3, 0, 2]
      ex18Result = maxProfitCooldown(stockPrices)
      f"최대 이익: {ex18Result}"

