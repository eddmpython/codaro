      def minPalindromeCut(s):
          n = len(s)
          isPalin = [[False] * n for _ in range(n)]
          for i in range(n):
              isPalin[i][i] = True
          for length in range(2, n + 1):
              for i in range(n - length + 1):
                  j = i + length - 1
                  if length == 2:
                      isPalin[i][j] = s[i] == s[j]
                  else:
                      isPalin[i][j] = s[i] == s[j] and isPalin[i + 1][j - 1]
          cuts = [0] * n
          for i in range(n):
              if isPalin[0][i]:
                  cuts[i] = 0
              else:
                  cuts[i] = float('inf')
                  for j in range(i):
                      if isPalin[j + 1][i] and cuts[j] + 1 < cuts[i]:
                          cuts[i] = cuts[j] + 1
          return cuts[n - 1]

      palinText = "aab"
      ex15Result = minPalindromeCut(palinText)
      f"최소 분할: {ex15Result}"

