    code: |-
      import bisect

      def maxEnvelopes(envelopes):
          if not envelopes:
              return 0
          sortedEnv = sorted(envelopes, key=lambda x: (x[0], -x[1]))
          heights = [e[1] for e in sortedEnv]
          lis = []
          for h in heights:
              pos = bisect.bisect_left(lis, h)
              if pos == len(lis):
                  lis.append(h)
              else:
                  lis[pos] = h
          return len(lis)

      envList = [[5, 4], [6, 4], [6, 7], [2, 3]]
      ex16Result = maxEnvelopes(envList)
      f"최대 봉투: {ex16Result}"

