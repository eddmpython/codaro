      def canPartition(nums):
          total = sum(nums)
          if total % 2 != 0:
              return False
          target = total // 2
          dp = [False] * (target + 1)
          dp[0] = True
          for num in nums:
              for t in range(target, num - 1, -1):
                  dp[t] = dp[t] or dp[t - num]
          return dp[target]

      partNums = [1, 5, 11, 5]
      ex19Result = canPartition(partNums)
      f"균등 분할 가능: {ex19Result}"

