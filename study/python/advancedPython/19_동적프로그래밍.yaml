      def wordBreak(s, wordDict):
          wordSet = set(wordDict)
          dp = [False] * (len(s) + 1)
          dp[0] = True
          for i in range(1, len(s) + 1):
              for j in range(i):
                  if dp[j] and s[j:i] in wordSet:
                      dp[i] = True
                      break
          return dp[len(s)]

      wbText = "leetcode"
      wbDict = ["leet", "code"]
      ex8Result = wordBreak(wbText, wbDict)
      f"분리 가능: {ex8Result}"

