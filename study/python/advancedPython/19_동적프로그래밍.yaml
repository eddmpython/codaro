      def knapsack1D(capacity, weights, values):
          dp = [0] * (capacity + 1)
          for i in range(len(weights)):
              for w in range(capacity, weights[i] - 1, -1):
                  dp[w] = max(dp[w], dp[w - weights[i]] + values[i])
          return dp[capacity]

      optWeights = [1, 2, 3, 4]
      optValues = [2, 4, 4, 5]
      ex9Result = knapsack1D(5, optWeights, optValues)
      f"최대 가치: {ex9Result}"

