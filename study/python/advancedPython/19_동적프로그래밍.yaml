      def countWays(coins, amount):
          dp = [0] * (amount + 1)
          dp[0] = 1
          for coin in coins:
              for amt in range(coin, amount + 1):
                  dp[amt] += dp[amt - coin]
          return dp[amount]

      denomSet = [1, 2, 5]
      ex5Result = countWays(denomSet, 10)
      f"10원 만드는 경우의 수: {ex5Result}"

