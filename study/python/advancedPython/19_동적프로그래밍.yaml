    code: |-
      class NumMatrix:
          def __init__(self, matrix):
              if not matrix:
                  return
              rows, cols = len(matrix), len(matrix[0])
              self.prefix = [[0] * (cols + 1) for _ in range(rows + 1)]
              for i in range(1, rows + 1):
                  for j in range(1, cols + 1):
                      self.prefix[i][j] = matrix[i - 1][j - 1] + self.prefix[i - 1][j] + self.prefix[i][j - 1] - self.prefix[i - 1][j - 1]

          def sumRegion(self, r1, c1, r2, c2):
              return self.prefix[r2 + 1][c2 + 1] - self.prefix[r1][c2 + 1] - self.prefix[r2 + 1][c1] + self.prefix[r1][c1]

      rangeMatrix = [[3, 0, 1, 4, 2], [5, 6, 3, 2, 1], [1, 2, 0, 1, 5], [4, 1, 0, 1, 7], [1, 0, 3, 0, 5]]
      numMat = NumMatrix(rangeMatrix)
      ex17Result = numMat.sumRegion(2, 1, 4, 3)
      f"범위 합: {ex17Result}"

