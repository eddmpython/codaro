      def minimumTotal(triangle):
          n = len(triangle)
          dp = triangle[-1][:]
          for row in range(n - 2, -1, -1):
              for col in range(row + 1):
                  dp[col] = triangle[row][col] + min(dp[col], dp[col + 1])
          return dp[0]

      triGrid = [[2], [3, 4], [6, 5, 7], [4, 1, 8, 3]]
      ex20Result = minimumTotal(triGrid)
      f"최소 경로 합: {ex20Result}"
