      def uniquePaths(m, n):
          dp = [[1] * n for _ in range(m)]
          for i in range(1, m):
              for j in range(1, n):
                  dp[i][j] = dp[i - 1][j] + dp[i][j - 1]
          return dp[m - 1][n - 1]

      ex3Result = uniquePaths(3, 7)
      f"3x7 고유 경로: {ex3Result}"

