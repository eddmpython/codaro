      def nQueens(n):
          def canPlace(queens, row, col):
              for r, c in enumerate(queens):
                  if c == col or abs(r - row) == abs(c - col):
                      return False
              return True

          def solve(row, queens):
              if row == n:
                  return 1
              count = 0
              for col in range(n):
                  if canPlace(queens, row, col):
                      count += solve(row + 1, queens + [col])
              return count

          return solve(0, [])

