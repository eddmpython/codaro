      def fibIterative(n):
          if n <= 1:
              return n
          prev, curr = 0, 1
          for _ in range(2, n + 1):
              prev, curr = curr, prev + curr
          return curr

      def factIterative(n):
          result = 1
          for i in range(2, n + 1):
              result *= i
          return result

      fibIterative(50), factIterative(20)
