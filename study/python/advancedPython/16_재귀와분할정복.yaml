      def parseNested(s):
          def parse(idx):
              result = []
              while idx < len(s):
                  if s[idx] == '[':
                      inner, idx = parse(idx + 1)
                      result.append(inner)
                  elif s[idx] == ']':
                      return result, idx + 1
                  elif s[idx].isdigit():
                      result.append(int(s[idx]))
                      idx += 1
                  else:
                      idx += 1
              return result, idx
          return parse(0)[0]

