      from functools import lru_cache

      def canPartition(nums):
          total = sum(nums)
          if total % 2 != 0:
              return False
          target = total // 2

          @lru_cache(maxsize=None)
          def dp(idx, remain):
              if remain == 0:
                  return True
              if idx >= len(nums) or remain < 0:
                  return False
              return dp(idx + 1, remain - nums[idx]) or dp(idx + 1, remain)

          return dp(0, target)

      canPartition([1, 5, 11, 5])

