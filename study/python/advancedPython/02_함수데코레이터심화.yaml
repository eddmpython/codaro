  - type: "expansion"
    title: "🟢 기본5: 메서드 데코레이터"
    code: |-
      def doubleReturn(func):
          def wrapper(self, *args, **kwargs):
              return func(self, *args, **kwargs) * 2
          return wrapper

      class Multiplier:
          @doubleReturn
          def getValue(self, x):
              return x

      m = Multiplier()
      m.getValue(5)

  - type: "expansion"
    title: "🟡 응용1: 호출 횟수 추적"
    code: |-
      def trackCalls(func):
          def wrapper(*args, **kwargs):
              wrapper.calls += 1
              return func(*args, **kwargs)
          wrapper.calls = 0
          return wrapper

      @trackCalls
      def addTwo(x):
          return x + 2

      addTwo(1)
      addTwo(2)
      addTwo(3)
      addTwo.calls

  - type: "expansion"
    title: "🟡 응용2: 결과 캐싱"
    code: |-
      def memoize(func):
          cache = {}
          def wrapper(*args):
              if args not in cache:
                  cache[args] = func(*args)
              return cache[args]
          wrapper.cache = cache
          return wrapper

      @memoize
      def fibonacci(n):
          if n < 2:
              return n
          return fibonacci(n - 1) + fibonacci(n - 2)

      fibonacci(10), len(fibonacci.cache)

  - type: "expansion"
    title: "🟡 응용3: 타입 검증"
    code: |-
      def validateTypes(*types):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  for arg, expected in zip(args, types):
                      if not isinstance(arg, expected):
                          raise TypeError(f"Expected {expected.__name__}")
                  return func(*args, **kwargs)
              return wrapper
          return decorator

      @validateTypes(int, int)
      def addInts(a, b):
          return a + b

      addInts(3, 5)

  - type: "expansion"
    title: "🟡 응용4: 재시도 데코레이터"
    code: |-
      def retry(maxAttempts):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  for attempt in range(maxAttempts):
                      try:
                          return func(*args, **kwargs)
                      except Exception:
                          if attempt == maxAttempts - 1:
                              raise
                  return None
              return wrapper
          return decorator

      counter = {"val": 0}

      @retry(3)
      def flakyFunc():
          counter["val"] += 1
          if counter["val"] < 3:
              raise ValueError("Not ready")
          return "Success"

      flakyFunc(), counter["val"]

  - type: "expansion"
    title: "🟡 응용5: 클래스 데코레이터"
    code: |-
      def addTimestamp(cls):
          import time
          originalInit = cls.__init__
          def newInit(self, *args, **kwargs):
              originalInit(self, *args, **kwargs)
              self.createdAt = time.time()
          cls.__init__ = newInit
          return cls

      @addTimestamp
      class Event:
          def __init__(self, name):
              self.name = name

      e = Event("test")
      e.name, hasattr(e, "createdAt")

  - type: "expansion"
    title: "🔴 심화1: 선택적 인자 데코레이터"
    code: |-
      from functools import wraps

      def optionalArgs(decorator):
          @wraps(decorator)
          def newDecorator(*args, **kwargs):
              if len(args) == 1 and callable(args[0]):
                  return decorator()(args[0])
              return decorator(*args, **kwargs)
          return newDecorator

      @optionalArgs
      def repeatN(n=2):
          def decorator(func):
              @wraps(func)
              def wrapper(*args, **kwargs):
                  return [func(*args, **kwargs) for _ in range(n)]
              return wrapper
          return decorator

      @repeatN
      def sayHi():
          return "Hi"

      @repeatN(3)
      def sayBye():
          return "Bye"

      sayHi(), sayBye()

  - type: "expansion"
    title: "🔴 심화2: 데코레이터 체인 분석"
    code: |-
      log = []

      def decoA(func):
          def wrapper(*args, **kwargs):
              log.append("A-before")
              result = func(*args, **kwargs)
              log.append("A-after")
              return result
          return wrapper

      def decoB(func):
          def wrapper(*args, **kwargs):
              log.append("B-before")
              result = func(*args, **kwargs)
              log.append("B-after")
              return result
          return wrapper

      def decoC(func):
          def wrapper(*args, **kwargs):
              log.append("C-before")
              result = func(*args, **kwargs)
              log.append("C-after")
              return result
          return wrapper

      @decoA
      @decoB
      @decoC
      def process():
          log.append("process")
          return "done"

      process()
      log

  - type: "expansion"
    title: "🔴 심화3: 조건부 데코레이터"
    code: |-
      def conditionalDecorator(condition, decorator):
          def wrapper(func):
              if condition:
                  return decorator(func)
              return func
          return wrapper

      def doubler(func):
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs) * 2
          return wrapper

      enabled = True

      @conditionalDecorator(enabled, doubler)
      def getVal():
          return 5

      getVal()

  - type: "expansion"
    title: "🔴 심화4: 클래스 기반 데코레이터"
    code: |-
      class CallCounter:
          def __init__(self, func):
              self.func = func
              self.count = 0

          def __call__(self, *args, **kwargs):
              self.count += 1
              return self.func(*args, **kwargs)

      @CallCounter
      def greetUser(name):
          return f"Hello, {name}"

      greetUser("Alice")
      greetUser("Bob")
      greetUser.count

  - type: "expansion"
    title: "🔴 심화5: 디스크립터 데코레이터"
    code: |-
      class LazyProperty:
          def __init__(self, func):
              self.func = func
              self.attrName = None

          def __set_name__(self, owner, name):
              self.attrName = name

          def __get__(self, obj, objtype=None):
              if obj is None:
                  return self
              value = self.func(obj)
              setattr(obj, self.attrName, value)
              return value

      class Circle:
          def __init__(self, radius):
              self.radius = radius

          @LazyProperty
          def area(self):
              return 3.14159 * self.radius ** 2

      c = Circle(5)
      c.area, c.__dict__

  - type: "expansion"
    title: "🔴 심화6: 인자 변환 데코레이터"
    code: |-
      def transformArgs(*transformers):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  newArgs = [t(a) for t, a in zip(transformers, args)]
                  return func(*newArgs, **kwargs)
              return wrapper
          return decorator

      @transformArgs(str.upper, int)
      def display(name, age):
          return f"{name} is {age} years old"

      display("alice", "25")

  - type: "expansion"
    title: "🔴 심화7: 반환값 검증"
    code: |-
      def ensureType(expectedType):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = func(*args, **kwargs)
                  if not isinstance(result, expectedType):
                      raise TypeError(f"Expected {expectedType.__name__}")
                  return result
              return wrapper
          return decorator

      @ensureType(int)
      def computeAge(birthYear, currentYear):
          return currentYear - birthYear

      computeAge(1990, 2024)

  - type: "expansion"
    title: "🔴 심화8: 다중 상태 데코레이터"
    code: |-
      def stateful():
          state = {"initialized": False, "callCount": 0}
          def decorator(func):
              def wrapper(*args, **kwargs):
                  if not state["initialized"]:
                      state["initialized"] = True
                  state["callCount"] += 1
                  return func(*args, **kwargs), state.copy()
              return wrapper
          return decorator

      @stateful()
      def doWork():
          return "working"

      doWork()
      doWork()

  - type: "expansion"
    title: "🔴 심화9: 데코레이터 합성"
    code: |-
      def composeDecorators(*decorators):
          def decorator(func):
              for deco in reversed(decorators):
                  func = deco(func)
              return func
          return decorator

      def addX(func):
          def wrapper(*a, **kw):
              return func(*a, **kw) + "X"
          return wrapper

      def addY(func):
          def wrapper(*a, **kw):
              return func(*a, **kw) + "Y"
          return wrapper

      @composeDecorators(addX, addY)
      def base():
          return "O"

      base()

  - type: "expansion"
    title: "🔴 심화10: 메타데이터 완전 보존"
    code: |-
      from functools import wraps, WRAPPER_ASSIGNMENTS, WRAPPER_UPDATES

      def fullWrap(func):
          @wraps(func, assigned=WRAPPER_ASSIGNMENTS + ('__dict__',), updated=WRAPPER_UPDATES)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      def annotated():
          """Docstring here"""
          return 1

      annotated.customAttr = "custom"

      @fullWrap
      def annotatedCopy():
          """Docstring here"""
          return 1

      annotatedCopy.customAttr = "custom"

      annotatedCopy.__name__, hasattr(annotatedCopy, "__wrapped__")
