      class Trampoline:
          def __init__(self, fn):
              self.fn = fn

          @staticmethod
          def done(value):
              return {"done": True, "value": value}

          @staticmethod
          def more(fn):
              return {"done": False, "fn": fn}

          @staticmethod
          def run(result):
              while not result["done"]:
                  result = result["fn"]()
              return result["value"]

