    description: "여러 문자열의 공통 접두사"
    content: |-
      def longestCommonPrefix(strs):
          if not strs:
              return ""
          shortest = min(strs, key=len)
          for i, char in enumerate(shortest):
              for s in strs:
                  if s[i] != char:
                      return shortest[:i]
          return shortest

      lcpStrs = ["flower", "flow", "flight"]
      lcpResult = longestCommonPrefix(lcpStrs)
      lcpResult
  - type: "code"
    language: "python"
    title: "팰린드롬 검사"
    description: "앞뒤가 같은 문자열"
    content: |-
      def isPalindrome(s):
          cleaned = ''.join(c.lower() for c in s if c.isalnum())
          return cleaned == cleaned[::-1]

      def longestPalindrome(s):
          if len(s) < 2:
              return s
          start = maxLen = 0
          def expand(left, right):
              while left >= 0 and right < len(s) and s[left] == s[right]:
                  left -= 1
                  right += 1
              return right - left - 1
          for i in range(len(s)):
              len1 = expand(i, i)
              len2 = expand(i, i + 1)
              currLen = max(len1, len2)
              if currLen > maxLen:
                  maxLen = currLen
                  start = i - (currLen - 1) // 2
          return s[start:start + maxLen]

      palTest = "A man a plan a canal Panama"
      palIs = isPalindrome(palTest)
      palLongest = longestPalindrome("babad")
      palResult = (palIs, palLongest)
      palResult

