      def minWindow(s, t):
          from collections import Counter
          if not s or not t:
              return ""
          tCount = Counter(t)
          required = len(tCount)
          formed = 0
          winCounts = {}
          left = right = 0
          minLen = float('inf')
          minLeft = 0
          while right < len(s):
              char = s[right]
              winCounts[char] = winCounts.get(char, 0) + 1
              if char in tCount and winCounts[char] == tCount[char]:
                  formed += 1
              while formed == required:
                  if right - left + 1 < minLen:
                      minLen = right - left + 1
                      minLeft = left
                  lChar = s[left]
                  winCounts[lChar] -= 1
                  if lChar in tCount and winCounts[lChar] < tCount[lChar]:
                      formed -= 1
                  left += 1
              right += 1
          return "" if minLen == float('inf') else s[minLeft:minLeft + minLen]

