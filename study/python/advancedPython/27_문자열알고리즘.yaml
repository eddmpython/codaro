      def palindromePartition(s):
          n = len(s)
          result = []

          def isPalin(sub):
              return sub == sub[::-1]

          def backtrack(start, path):
              if start == n:
                  result.append(path[:])
                  return
              for end in range(start + 1, n + 1):
                  if isPalin(s[start:end]):
                      path.append(s[start:end])
                      backtrack(end, path)
                      path.pop()

          backtrack(0, [])
          return result

      ex19Str = "aab"
      ex19Result = palindromePartition(ex19Str)
      ex19Result
