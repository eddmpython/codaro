      def encode(s):
          if not s:
              return ""
          result = []
          i = 0
          while i < len(s):
              char = s[i]
              count = 1
              while i + count < len(s) and s[i + count] == char:
                  count += 1
              if count > 1:
                  result.append(f"{count}{char}")
              else:
                  result.append(char)
              i += count
          return ''.join(result)

      def decode(s):
          result = []
          i = 0
          while i < len(s):
              if s[i].isdigit():
                  count = int(s[i])
                  result.append(s[i + 1] * count)
                  i += 2
              else:
                  result.append(s[i])
                  i += 1
          return ''.join(result)

