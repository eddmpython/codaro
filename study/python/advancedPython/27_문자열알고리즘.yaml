      def longestRepeating(s):
          n = len(s)

          def check(length):
              seen = set()
              for i in range(n - length + 1):
                  sub = s[i:i+length]
                  if sub in seen:
                      return sub
                  seen.add(sub)
              return None

          left, right = 1, n
          result = ""
          while left <= right:
              mid = (left + right) // 2
              found = check(mid)
              if found:
                  result = found
                  left = mid + 1
              else:
                  right = mid - 1
          return result

