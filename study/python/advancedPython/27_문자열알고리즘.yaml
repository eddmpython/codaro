  subtitle: "기본 문자열 패턴 매칭"
  blocks:
  - type: "text"
    content: "가장 단순한 방법은 모든 위치에서 패턴을 비교하는 것입니다. O(nm) 시간복잡도."
  - type: "code"
    language: "python"
    title: "브루트 포스 검색"
    description: "모든 위치에서 패턴 비교"
    content: |-
      def bfSearch(text, pattern):
          textLen = len(text)
          patLen = len(pattern)
          positions = []
          for i in range(textLen - patLen + 1):
              match = True
              for j in range(patLen):
                  if text[i + j] != pattern[j]:
                      match = False
                      break
              if match:
                  positions.append(i)
          return positions

      bfText = "AABAACAADAABAAABAA"
      bfPattern = "AABA"
      bfResult = bfSearch(bfText, bfPattern)
      bfResult
  - type: "code"
    language: "python"
    title: "내장 함수 활용"
    description: "find 메서드로 간단하게"
    content: |-
      def findAll(text, pattern):
          positions = []
          start = 0
          while True:
              pos = text.find(pattern, start)
              if pos == -1:
                  break
              positions.append(pos)
              start = pos + 1
          return positions

      faText = "abababab"
      faPattern = "aba"
      faResult = findAll(faText, faPattern)
      faResult

- id: "kmp"
  title: "KMP 알고리즘"
  subtitle: "O(n+m) 패턴 매칭"
  blocks:
  - type: "text"
    content: "실패 함수(LPS)를 이용해 불필요한 비교를 건너뜁니다."
  - type: "code"
    language: "python"
    title: "LPS 배열 계산"
    description: "실패 함수 구하기"
    content: |-
      def computeLps(pattern):
          patLen = len(pattern)
          lps = [0] * patLen
          length = 0
          i = 1
          while i < patLen:
              if pattern[i] == pattern[length]:
                  length += 1
                  lps[i] = length
                  i += 1
              else:
                  if length != 0:
                      length = lps[length - 1]
                  else:
                      lps[i] = 0
                      i += 1
          return lps

      lpsPattern = "AABAACAAB"
      lpsResult = computeLps(lpsPattern)
      lpsResult
  - type: "code"
    language: "python"
    title: "KMP 검색"
    description: "LPS 활용 패턴 매칭"
    content: |-
      def kmpSearch(text, pattern):
          textLen = len(text)
          patLen = len(pattern)
          lps = [0] * patLen
          length = 0
          i = 1
          while i < patLen:
              if pattern[i] == pattern[length]:
                  length += 1
                  lps[i] = length
                  i += 1
              elif length != 0:
                  length = lps[length - 1]
              else:
                  lps[i] = 0
                  i += 1
          positions = []
          i = j = 0
          while i < textLen:
              if pattern[j] == text[i]:
                  i += 1
                  j += 1
              if j == patLen:
                  positions.append(i - j)
                  j = lps[j - 1]
              elif i < textLen and pattern[j] != text[i]:
                  j = lps[j - 1] if j != 0 else 0
                  if j == 0 and pattern[0] != text[i]:
                      i += 1
          return positions

      kmpText = "ABABDABACDABABCABAB"
      kmpPattern = "ABABCABAB"
      kmpResult = kmpSearch(kmpText, kmpPattern)
      kmpResult

- id: "rabin_karp"
  title: "Rabin-Karp 알고리즘"
  subtitle: "해시 기반 패턴 매칭"
  blocks:
  - type: "text"
    content: "롤링 해시로 O(n+m) 평균 시간복잡도. 다중 패턴 검색에 유리."
  - type: "code"
    language: "python"
    title: "Rabin-Karp 검색"
    description: "롤링 해시 활용"
    content: |-
      def rabinKarp(text, pattern, prime=101):
          textLen = len(text)
          patLen = len(pattern)
          base = 256
          patHash = textHash = 0
          h = 1
          positions = []
          for i in range(patLen - 1):
              h = (h * base) % prime
          for i in range(patLen):
              patHash = (base * patHash + ord(pattern[i])) % prime
              textHash = (base * textHash + ord(text[i])) % prime
          for i in range(textLen - patLen + 1):
              if patHash == textHash:
                  if text[i:i + patLen] == pattern:
                      positions.append(i)
              if i < textLen - patLen:
                  textHash = (base * (textHash - ord(text[i]) * h) + ord(text[i + patLen])) % prime
                  if textHash < 0:
                      textHash += prime
          return positions

      rkText = "GEEKS FOR GEEKS"
      rkPattern = "GEEK"
      rkResult = rabinKarp(rkText, rkPattern)
      rkResult

- id: "trie"
  title: "Trie 자료구조"
  subtitle: "접두사 트리"
  blocks:
  - type: "text"
    content: "문자열 삽입/검색 O(m). 자동완성, 사전 검색에 활용."
  - type: "code"
    language: "python"
    title: "Trie 구현"
    description: "기본 Trie 클래스"
    content: |-
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.isEnd = False

      class Trie:
          def __init__(self):
              self.root = TrieNode()

          def insert(self, word):
              node = self.root
              for char in word:
                  if char not in node.children:
                      node.children[char] = TrieNode()
                  node = node.children[char]
              node.isEnd = True

          def search(self, word):
              node = self.root
              for char in word:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return node.isEnd

          def startsWith(self, prefix):
              node = self.root
              for char in prefix:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return True

      trie = Trie()
      trieWords = ["apple", "app", "banana"]
      for w in trieWords:
          trie.insert(w)
      trieSearch = trie.search("app")
      triePrefix = trie.startsWith("ban")
      trieMiss = trie.search("ap")
      trieResult = (trieSearch, triePrefix, trieMiss)
      trieResult
  - type: "code"
    language: "python"
    title: "자동완성"
    description: "접두사로 단어 추천"
    content: |-
      class AutoTrie:
          def __init__(self):
              self.root = {}

          def insert(self, word):
              node = self.root
              for char in word:
                  if char not in node:
                      node[char] = {}
                  node = node[char]
              node['$'] = True

          def autocomplete(self, prefix):
              node = self.root
              for char in prefix:
                  if char not in node:
                      return []
                  node = node[char]
              results = []
              self._dfs(node, prefix, results)
              return results

          def _dfs(self, node, prefix, results):
              if '$' in node:
                  results.append(prefix)
              for char, child in node.items():
                  if char != '$':
                      self._dfs(child, prefix + char, results)

      autoTrie = AutoTrie()
      autoWords = ["car", "card", "care", "careful"]
      for w in autoWords:
          autoTrie.insert(w)
      autoResult = autoTrie.autocomplete("car")
      autoResult

- id: "string_processing"
  title: "문자열 처리"
  subtitle: "실용적인 문자열 알고리즘"
