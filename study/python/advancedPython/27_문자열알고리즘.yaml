      def rabinKarp(text, pattern):
          if not pattern or len(pattern) > len(text):
              return []
          BASE = 256
          MOD = 101
          m, n = len(pattern), len(text)
          patHash = 0
          textHash = 0
          h = pow(BASE, m - 1, MOD)
          for i in range(m):
              patHash = (BASE * patHash + ord(pattern[i])) % MOD
              textHash = (BASE * textHash + ord(text[i])) % MOD
          result = []
          for i in range(n - m + 1):
              if patHash == textHash and text[i:i+m] == pattern:
                  result.append(i)
              if i < n - m:
                  textHash = (BASE * (textHash - ord(text[i]) * h) + ord(text[i + m])) % MOD
                  textHash = (textHash + MOD) % MOD
          return result

