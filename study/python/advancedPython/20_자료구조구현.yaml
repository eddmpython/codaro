      class BloomFilter:
          def __init__(self, size, hashCount):
              self.size = size
              self.hashCount = hashCount
              self.bitArray = [False] * size

          def _hashes(self, item):
              hashes = []
              for i in range(self.hashCount):
                  h = hash(str(item) + str(i)) % self.size
                  hashes.append(h)
              return hashes

