      def buildSuffixArray(text):
          suffixes = [(text[i:], i) for i in range(len(text))]
          suffixes.sort()
          return [idx for _, idx in suffixes]

      def searchPattern(text, pattern, sa):
          left, right = 0, len(sa) - 1
          while left <= right:
              mid = (left + right) // 2
              suffix = text[sa[mid]:]
              if suffix.startswith(pattern):
                  return sa[mid]
              if suffix < pattern:
                  left = mid + 1
              else:
                  right = mid - 1
          return -1

      saText = "banana"
      suffixArr = buildSuffixArray(saText)
      ex19Search = searchPattern(saText, "ana", suffixArr)
      ex19Result = (suffixArr, ex19Search)
      ex19Result

