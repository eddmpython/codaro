sections:
- id: "stack"
  title: "스택 구현"
  subtitle: "LIFO 구조"
  blocks:
  - type: "text"
    content: "스택은 후입선출(LIFO) 구조입니다. push로 삽입하고 pop으로 제거합니다. 함수 호출 스택, 괄호 검사, Undo 기능 등에 사용됩니다. O(1) 시간에 삽입/삭제가 가능합니다."
  - type: "list"
    items:
    - "후입선출(LIFO) 구조"
    - "push, pop, peek 연산"
    - "시간 복잡도: O(1)"
    - "함수 호출, 괄호 검사에 활용"
  - type: "code"
    language: "python"
    title: "기본 스택"
    description: "리스트 기반 스택을 구현합니다."
    content: |-
      class Stack:
          def __init__(self):
              self.items = []

          def push(self, item):
              self.items.append(item)

          def pop(self):
              if not self.isEmpty():
                  return self.items.pop()
              return None

          def peek(self):
              if not self.isEmpty():
                  return self.items[-1]
              return None

          def isEmpty(self):
              return len(self.items) == 0

          def size(self):
              return len(self.items)

      stk = Stack()
      stk.push(10)
      stk.push(20)
      stk.push(30)
      stkPeek = stk.peek()
      stkPop = stk.pop()
      stkSize = stk.size()
      (stkPeek, stkPop, stkSize)
  - type: "code"
    language: "python"
    title: "최소값 스택"
    description: "O(1)에 최소값을 반환하는 스택입니다."
    content: |-
      class MinStack:
          def __init__(self):
              self.data = []
              self.minVals = []

          def push(self, val):
              self.data.append(val)
              if not self.minVals or val <= self.minVals[-1]:
                  self.minVals.append(val)

          def pop(self):
              if self.data:
                  popped = self.data.pop()
                  if popped == self.minVals[-1]:
                      self.minVals.pop()
                  return popped
              return None

          def getMin(self):
              return self.minVals[-1] if self.minVals else None

      minStk = MinStack()
      minStk.push(5)
      minStk.push(2)
      minStk.push(7)
      minStk.push(1)
      minStkMin = minStk.getMin()
      minStk.pop()
      minStkMinAfter = minStk.getMin()
      (minStkMin, minStkMinAfter)
  - type: "tip"
    content: "MinStack은 보조 스택을 사용해 최소값을 추적합니다."

- id: "queue"
  title: "큐 구현"
  subtitle: "FIFO 구조"
  blocks:
  - type: "text"
    content: "큐는 선입선출(FIFO) 구조입니다. enqueue로 삽입하고 dequeue로 제거합니다. BFS, 작업 스케줄링, 버퍼 등에 사용됩니다. 덱(Deque)은 양쪽 끝에서 삽입/삭제가 가능합니다."
  - type: "list"
    items:
    - "선입선출(FIFO) 구조"
    - "enqueue, dequeue, front 연산"
    - "BFS, 스케줄링에 활용"
    - "덱은 양방향 연산 지원"
  - type: "code"
    language: "python"
    title: "기본 큐"
    description: "리스트 기반 큐를 구현합니다."
    content: |-
      class Queue:
          def __init__(self):
              self.items = []

          def enqueue(self, item):
              self.items.append(item)

          def dequeue(self):
              if not self.isEmpty():
                  return self.items.pop(0)
              return None

          def front(self):
              if not self.isEmpty():
                  return self.items[0]
              return None

          def isEmpty(self):
              return len(self.items) == 0

          def size(self):
              return len(self.items)

      que = Queue()
      que.enqueue('A')
      que.enqueue('B')
      que.enqueue('C')
      queFront = que.front()
      queDeq = que.dequeue()
      queSize = que.size()
      (queFront, queDeq, queSize)
  - type: "code"
    language: "python"
    title: "덱(Deque)"
    description: "양쪽 끝에서 연산이 가능한 덱입니다."
    content: |-
      class Deque:
          def __init__(self):
              self.items = []

          def addFront(self, item):
              self.items.insert(0, item)

          def addRear(self, item):
              self.items.append(item)

          def removeFront(self):
              if self.items:
                  return self.items.pop(0)
              return None

          def removeRear(self):
              if self.items:
                  return self.items.pop()
              return None

          def peekFront(self):
              return self.items[0] if self.items else None

          def peekRear(self):
              return self.items[-1] if self.items else None

      deq = Deque()
      deq.addFront(1)
      deq.addRear(2)
      deq.addFront(0)
      deqFront = deq.peekFront()
      deqRear = deq.peekRear()
      (deqFront, deqRear)
  - type: "tip"
    content: "collections.deque는 O(1) 양방향 연산을 제공합니다."

- id: "linkedlist"
  title: "연결 리스트"
  subtitle: "노드 기반 구조"
  blocks:
  - type: "text"
    content: "연결 리스트는 노드들이 포인터로 연결된 구조입니다. 삽입/삭제가 O(1)이지만 탐색은 O(n)입니다. 단일 연결 리스트는 다음 노드만, 이중 연결 리스트는 이전/다음 노드를 모두 참조합니다."
  - type: "list"
    items:
    - "노드가 포인터로 연결"
    - "삽입/삭제: O(1)"
    - "탐색: O(n)"
    - "단일/이중 연결 리스트"
  - type: "code"
    language: "python"
    title: "단일 연결 리스트"
    description: "단일 연결 리스트를 구현합니다."
    content: |-
      class ListNode:
          def __init__(self, val):
              self.val = val
              self.next = None

      class LinkedList:
          def __init__(self):
              self.head = None

          def append(self, val):
              newNode = ListNode(val)
              if not self.head:
                  self.head = newNode
                  return
              curr = self.head
              while curr.next:
                  curr = curr.next
              curr.next = newNode

          def prepend(self, val):
              newNode = ListNode(val)
              newNode.next = self.head
              self.head = newNode

          def delete(self, val):
              if not self.head:
                  return
              if self.head.val == val:
                  self.head = self.head.next
                  return
              curr = self.head
              while curr.next and curr.next.val != val:
                  curr = curr.next
              if curr.next:
                  curr.next = curr.next.next

          def toList(self):
              result = []
              curr = self.head
              while curr:
                  result.append(curr.val)
                  curr = curr.next
              return result

      llist = LinkedList()
      llist.append(1)
      llist.append(2)
      llist.append(3)
      llist.prepend(0)
      llist.delete(2)
      llistResult = llist.toList()
      llistResult
  - type: "code"
    language: "python"
    title: "이중 연결 리스트"
    description: "이전/다음 노드를 모두 참조하는 리스트입니다."
    content: |-
      class DoublyNode:
          def __init__(self, val):
              self.val = val
              self.prev = None
              self.next = None

      class DoublyLinkedList:
          def __init__(self):
              self.head = None
              self.tail = None

          def append(self, val):
              newNode = DoublyNode(val)
              if not self.head:
                  self.head = self.tail = newNode
                  return
              self.tail.next = newNode
              newNode.prev = self.tail
              self.tail = newNode

          def prepend(self, val):
              newNode = DoublyNode(val)
              if not self.head:
                  self.head = self.tail = newNode
                  return
              newNode.next = self.head
              self.head.prev = newNode
              self.head = newNode

          def toListForward(self):
              result = []
              curr = self.head
              while curr:
                  result.append(curr.val)
                  curr = curr.next
              return result

          def toListBackward(self):
              result = []
              curr = self.tail
              while curr:
                  result.append(curr.val)
                  curr = curr.prev
              return result

      dlist = DoublyLinkedList()
      dlist.append(1)
      dlist.append(2)
      dlist.prepend(0)
      dlistFwd = dlist.toListForward()
      dlistBwd = dlist.toListBackward()
      (dlistFwd, dlistBwd)
  - type: "tip"
    content: "이중 연결 리스트는 LRU 캐시 구현에 자주 사용됩니다."

- id: "binarytree"
  title: "이진 트리"
  subtitle: "트리 구조의 기본"
  blocks:
  - type: "text"
    content: "이진 트리는 각 노드가 최대 2개의 자식을 가지는 구조입니다. 전위/중위/후위 순회로 트리를 탐색합니다. 이진 탐색 트리(BST)는 왼쪽 < 부모 < 오른쪽 규칙을 따릅니다. BST에서 탐색/삽입은 평균 O(log n)입니다."
  - type: "list"
    items:
    - "각 노드 최대 2개 자식"
    - "전위/중위/후위 순회"
    - "BST: 왼쪽 < 부모 < 오른쪽"
    - "탐색/삽입: O(log n) 평균"
  - type: "code"
    language: "python"
    title: "이진 트리 순회"
    description: "전위/중위/후위 순회를 구현합니다."
    content: |-
      class TreeNode:
          def __init__(self, val):
              self.val = val
              self.left = None
              self.right = None

      class BinaryTree:
          def __init__(self):
              self.root = None

          def inorder(self, node, result):
              if node:
                  self.inorder(node.left, result)
                  result.append(node.val)
                  self.inorder(node.right, result)
              return result

          def preorder(self, node, result):
              if node:
                  result.append(node.val)
                  self.preorder(node.left, result)
                  self.preorder(node.right, result)
              return result

          def postorder(self, node, result):
              if node:
                  self.postorder(node.left, result)
                  self.postorder(node.right, result)
                  result.append(node.val)
              return result

      btree = BinaryTree()
      btree.root = TreeNode(1)
      btree.root.left = TreeNode(2)
      btree.root.right = TreeNode(3)
      btree.root.left.left = TreeNode(4)
      btree.root.left.right = TreeNode(5)
      btInorder = btree.inorder(btree.root, [])
      btPreorder = btree.preorder(btree.root, [])
      btPostorder = btree.postorder(btree.root, [])
      (btInorder, btPreorder, btPostorder)
  - type: "code"
    language: "python"
    title: "이진 탐색 트리"
    description: "BST의 삽입과 탐색을 구현합니다."
    content: |-
      class BSTNode:
          def __init__(self, val):
              self.val = val
              self.left = None
              self.right = None

      class BST:
          def __init__(self):
              self.root = None

          def insert(self, val):
              if not self.root:
                  self.root = BSTNode(val)
                  return
              self._insertRec(self.root, val)

          def _insertRec(self, node, val):
              if val < node.val:
                  if node.left:
                      self._insertRec(node.left, val)
                  else:
                      node.left = BSTNode(val)
              else:
                  if node.right:
                      self._insertRec(node.right, val)
                  else:
                      node.right = BSTNode(val)

          def search(self, val):
              return self._searchRec(self.root, val)

          def _searchRec(self, node, val):
              if not node or node.val == val:
                  return node is not None
              if val < node.val:
                  return self._searchRec(node.left, val)
              return self._searchRec(node.right, val)

          def inorderList(self):
              result = []
              self._inorderRec(self.root, result)
              return result

          def _inorderRec(self, node, result):
              if node:
                  self._inorderRec(node.left, result)
                  result.append(node.val)
                  self._inorderRec(node.right, result)

      bst = BST()
      for v in [5, 3, 7, 1, 4, 6, 8]:
          bst.insert(v)
      bstInorder = bst.inorderList()
      bstSearch = bst.search(4)
      (bstInorder, bstSearch)
  - type: "tip"
    content: "BST의 중위 순회는 정렬된 순서로 값을 반환합니다."

- id: "heap"
  title: "힙 구현"
  subtitle: "우선순위 기반 구조"
  blocks:
  - type: "text"
    content: "힙은 완전 이진 트리 기반의 우선순위 구조입니다. 최소 힙은 부모가 자식보다 작고, 최대 힙은 부모가 자식보다 큽니다. 삽입과 삭제는 O(log n), 최솟값/최댓값 조회는 O(1)입니다. 우선순위 큐, 힙 정렬에 사용됩니다."
  - type: "list"
    items:
    - "완전 이진 트리 기반"
    - "최소 힙: 부모 <= 자식"
    - "삽입/삭제: O(log n)"
    - "최솟값/최댓값 조회: O(1)"
  - type: "code"
    language: "python"
    title: "최소 힙"
    description: "최소 힙을 구현합니다."
    content: |-
      class MinHeap:
          def __init__(self):
              self.heap = []

          def parent(self, i):
              return (i - 1) // 2

          def leftChild(self, i):
              return 2 * i + 1

          def rightChild(self, i):
              return 2 * i + 2

          def swap(self, i, j):
              self.heap[i], self.heap[j] = self.heap[j], self.heap[i]

          def insert(self, val):
              self.heap.append(val)
              self._heapifyUp(len(self.heap) - 1)

          def _heapifyUp(self, i):
              while i > 0 and self.heap[self.parent(i)] > self.heap[i]:
                  self.swap(i, self.parent(i))
                  i = self.parent(i)

          def extractMin(self):
              if not self.heap:
                  return None
              if len(self.heap) == 1:
                  return self.heap.pop()
              minVal = self.heap[0]
              self.heap[0] = self.heap.pop()
              self._heapifyDown(0)
              return minVal

          def _heapifyDown(self, i):
              smallest = i
              left = self.leftChild(i)
              right = self.rightChild(i)
              if left < len(self.heap) and self.heap[left] < self.heap[smallest]:
                  smallest = left
              if right < len(self.heap) and self.heap[right] < self.heap[smallest]:
                  smallest = right
              if smallest != i:
                  self.swap(i, smallest)
                  self._heapifyDown(smallest)

          def peek(self):
              return self.heap[0] if self.heap else None

      minHeap = MinHeap()
      for val in [5, 3, 8, 1, 2, 9]:
          minHeap.insert(val)
      heapMin = minHeap.peek()
      heapExtract = minHeap.extractMin()
      heapMinAfter = minHeap.peek()
      (heapMin, heapExtract, heapMinAfter)
  - type: "code"
    language: "python"
    title: "최대 힙"
    description: "최대 힙을 구현합니다."
    content: |-
      class MaxHeap:
          def __init__(self):
              self.heap = []

          def parent(self, i):
              return (i - 1) // 2

          def leftChild(self, i):
              return 2 * i + 1

          def rightChild(self, i):
              return 2 * i + 2

          def swap(self, i, j):
              self.heap[i], self.heap[j] = self.heap[j], self.heap[i]

          def insert(self, val):
              self.heap.append(val)
              self._heapifyUp(len(self.heap) - 1)

          def _heapifyUp(self, i):
              while i > 0 and self.heap[self.parent(i)] < self.heap[i]:
                  self.swap(i, self.parent(i))
                  i = self.parent(i)

          def extractMax(self):
              if not self.heap:
                  return None
              if len(self.heap) == 1:
                  return self.heap.pop()
              maxVal = self.heap[0]
              self.heap[0] = self.heap.pop()
              self._heapifyDown(0)
              return maxVal

          def _heapifyDown(self, i):
              largest = i
              left = self.leftChild(i)
              right = self.rightChild(i)
              if left < len(self.heap) and self.heap[left] > self.heap[largest]:
                  largest = left
              if right < len(self.heap) and self.heap[right] > self.heap[largest]:
                  largest = right
              if largest != i:
                  self.swap(i, largest)
                  self._heapifyDown(largest)

          def peek(self):
              return self.heap[0] if self.heap else None

      maxHeap = MaxHeap()
      for val in [5, 3, 8, 1, 2, 9]:
          maxHeap.insert(val)
      heapMax = maxHeap.peek()
      heapExtractMax = maxHeap.extractMax()
      heapMaxAfter = maxHeap.peek()
      (heapMax, heapExtractMax, heapMaxAfter)
  - type: "tip"
    content: "파이썬 heapq 모듈은 최소 힙을 제공합니다. 최대 힙은 값을 음수로 변환하여 사용합니다."

- id: "hashtable"
  title: "해시 테이블"
  subtitle: "키-값 저장소"
  blocks:
  - type: "text"
    content: "해시 테이블은 키를 해시 함수로 변환하여 값을 저장합니다. 평균 O(1) 시간에 조회/삽입/삭제가 가능합니다. 충돌은 체이닝 또는 개방 주소법으로 해결합니다. LRU 캐시는 해시 테이블과 연결 리스트를 조합합니다."
  - type: "list"
    items:
    - "키를 해시 함수로 변환"
    - "평균 O(1) 조회/삽입/삭제"
    - "충돌 해결: 체이닝, 개방 주소법"
    - "파이썬 dict가 해시 테이블"
  - type: "code"
    language: "python"
    title: "체이닝 해시 테이블"
    description: "체이닝 방식으로 충돌을 해결합니다."
    content: |-
      class HashTable:
          def __init__(self, size=10):
              self.size = size
              self.buckets = [[] for _ in range(size)]

          def _hash(self, key):
              return hash(key) % self.size

          def put(self, key, value):
              idx = self._hash(key)
              for i, (k, v) in enumerate(self.buckets[idx]):
                  if k == key:
                      self.buckets[idx][i] = (key, value)
                      return
              self.buckets[idx].append((key, value))

          def get(self, key):
              idx = self._hash(key)
              for k, v in self.buckets[idx]:
                  if k == key:
                      return v
              return None

          def remove(self, key):
              idx = self._hash(key)
              for i, (k, v) in enumerate(self.buckets[idx]):
                  if k == key:
                      del self.buckets[idx][i]
                      return True
              return False

      htable = HashTable()
      htable.put("name", "Alice")
      htable.put("age", 30)
      htable.put("city", "Seoul")
      htGet1 = htable.get("name")
      htGet2 = htable.get("age")
      htable.remove("age")
      htGet3 = htable.get("age")
      (htGet1, htGet2, htGet3)
  - type: "code"
    language: "python"
    title: "LRU 캐시"
    description: "최근 사용 항목을 유지하는 캐시입니다."
    content: |-
      class LRUCache:
          def __init__(self, capacity):
              self.capacity = capacity
              self.cache = {}
              self.order = []

          def get(self, key):
              if key in self.cache:
                  self.order.remove(key)
                  self.order.append(key)
                  return self.cache[key]
              return -1

          def put(self, key, value):
              if key in self.cache:
                  self.order.remove(key)
              elif len(self.cache) >= self.capacity:
                  oldest = self.order.pop(0)
                  del self.cache[oldest]
              self.cache[key] = value
              self.order.append(key)

      lru = LRUCache(2)
      lru.put(1, 1)
      lru.put(2, 2)
      lruGet1 = lru.get(1)
      lru.put(3, 3)
      lruGet2 = lru.get(2)
      lru.put(4, 4)
      lruGet3 = lru.get(1)
      lruGet4 = lru.get(3)
      (lruGet1, lruGet2, lruGet3, lruGet4)
