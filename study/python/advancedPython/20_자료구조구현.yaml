      class TreeMapNode:
          def __init__(self, key, val):
              self.key = key
              self.val = val
              self.left = None
              self.right = None

      class TreeMap:
          def __init__(self):
              self.root = None

          def put(self, key, val):
              self.root = self._put(self.root, key, val)

          def _put(self, node, key, val):
              if not node:
                  return TreeMapNode(key, val)
              if key < node.key:
                  node.left = self._put(node.left, key, val)
              elif key > node.key:
                  node.right = self._put(node.right, key, val)
              else:
                  node.val = val
              return node

          def get(self, key):
              node = self.root
              while node:
                  if key < node.key:
                      node = node.left
                  elif key > node.key:
                      node = node.right
                  else:
                      return node.val
              return None

          def keys(self):
              result = []
              self._inorder(self.root, result)
              return result

          def _inorder(self, node, result):
              if node:
                  self._inorder(node.left, result)
                  result.append(node.key)
                  self._inorder(node.right, result)

      tmap = TreeMap()
      tmap.put(3, "three")
      tmap.put(1, "one")
      tmap.put(2, "two")
      tmap.put(5, "five")
      ex20Get = tmap.get(2)
      ex20Keys = tmap.keys()
      ex20Result = (ex20Get, ex20Keys)
