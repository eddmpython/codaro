      class CircularQueue:
          def __init__(self, k):
              self.size = k
              self.queue = [None] * k
              self.head = 0
              self.tail = 0
              self.count = 0

          def enQueue(self, value):
              if self.isFull():
                  return False
              self.queue[self.tail] = value
              self.tail = (self.tail + 1) % self.size
              self.count += 1
              return True

          def deQueue(self):
              if self.isEmpty():
                  return False
              self.head = (self.head + 1) % self.size
              self.count -= 1
              return True

          def Front(self):
              return self.queue[self.head] if not self.isEmpty() else -1

          def Rear(self):
              return self.queue[(self.tail - 1) % self.size] if not self.isEmpty() else -1

          def isEmpty(self):
              return self.count == 0

          def isFull(self):
              return self.count == self.size

