      import random

      class SkipNode:
          def __init__(self, val, level):
              self.val = val
              self.forward = [None] * (level + 1)

      class SkipList:
          def __init__(self, maxLevel=4, p=0.5):
              self.maxLevel = maxLevel
              self.p = p
              self.header = SkipNode(-1, maxLevel)
              self.level = 0

          def randomLevel(self):
              lvl = 0
              while random.random() < self.p and lvl < self.maxLevel:
                  lvl += 1
              return lvl

          def insert(self, val):
              update = [None] * (self.maxLevel + 1)
              current = self.header
              for i in range(self.level, -1, -1):
                  while current.forward[i] and current.forward[i].val < val:
                      current = current.forward[i]
                  update[i] = current
              lvl = self.randomLevel()
              if lvl > self.level:
                  for i in range(self.level + 1, lvl + 1):
                      update[i] = self.header
                  self.level = lvl
              newNode = SkipNode(val, lvl)
              for i in range(lvl + 1):
                  newNode.forward[i] = update[i].forward[i]
                  update[i].forward[i] = newNode

          def search(self, val):
              current = self.header
              for i in range(self.level, -1, -1):
                  while current.forward[i] and current.forward[i].val < val:
                      current = current.forward[i]
              current = current.forward[0]
              return current and current.val == val

