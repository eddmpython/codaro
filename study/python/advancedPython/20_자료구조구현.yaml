      class DLLNode:
          def __init__(self, key=0, val=0):
              self.key = key
              self.val = val
              self.prev = None
              self.next = None

      class LRUCacheDLL:
          def __init__(self, capacity):
              self.capacity = capacity
              self.cache = {}
              self.head = DLLNode()
              self.tail = DLLNode()
              self.head.next = self.tail
              self.tail.prev = self.head

          def _remove(self, node):
              node.prev.next = node.next
              node.next.prev = node.prev

          def _addToFront(self, node):
              node.next = self.head.next
              node.prev = self.head
              self.head.next.prev = node
              self.head.next = node

          def get(self, key):
              if key in self.cache:
                  node = self.cache[key]
                  self._remove(node)
                  self._addToFront(node)
                  return node.val
              return -1

          def put(self, key, value):
              if key in self.cache:
                  self._remove(self.cache[key])
              node = DLLNode(key, value)
              self.cache[key] = node
              self._addToFront(node)
              if len(self.cache) > self.capacity:
                  lruNode = self.tail.prev
                  self._remove(lruNode)
                  del self.cache[lruNode.key]

      lruDLL = LRUCacheDLL(2)
      lruDLL.put(1, 1)
      lruDLL.put(2, 2)
      ex18Get1 = lruDLL.get(1)
      lruDLL.put(3, 3)
      ex18Get2 = lruDLL.get(2)
      ex18Result = (ex18Get1, ex18Get2)
