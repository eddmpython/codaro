meta:
  id: regex_01
  title: 이메일주소추출
  order: 1
  category: regex
  difficulty: "⭐"
  badge: 입문
  tags: ["이메일", "findall", "문자 클래스", "기본 패턴", "JSONPlaceholder"]
  seo:
    title: "정규표현식 입문 - 이메일 주소 추출"
    description: "정규표현식으로 텍스트에서 이메일 주소를 추출합니다. 기본 패턴, 문자 클래스, findall 사용법을 배웁니다."
    keywords: ["정규표현식", "regex", "이메일 추출", "re.findall", "패턴 매칭"]

intro:
  emoji: "📧"
  goal: JSONPlaceholder 사용자 데이터에서 모든 이메일 주소를 추출합니다.
  description: 정규표현식의 첫 프로젝트입니다. 기본 패턴과 문자 클래스로 이메일을 찾아내는 방법을 배웁니다. 웹 데이터 정제의 기초를 다집니다.

sections:
- id: step1_import
  title: 1단계. 라이브러리 불러오기
  subtitle: import
  blocks:
  - type: text
    content: 정규표현식을 사용하려면 Python 내장 모듈인 re를 불러와야 합니다. re는 Python 설치 시 기본으로 포함되어 있어 별도 설치가 필요 없습니다. 정규표현식은 텍스트 패턴 매칭의 표준 도구로, 이메일, 전화번호, URL 등 특정 형식의 문자열을 찾거나 변환할 때 필수적으로 사용됩니다.
  - type: code
    language: python
    title: 라이브러리 불러오기
    description: re 모듈과 데이터 로드를 위한 모듈을 불러옵니다
    content: |-
      import re
      import json
      from pyodide.http import open_url
  - type: note
    style: tip
    title: re 모듈이란?
    content: re는 regular expression의 약자로, Python의 정규표현식 모듈입니다. 패턴 매칭, 검색, 치환 등의 기능을 제공합니다.

- id: step2_load
  title: 2단계. 데이터 불러오기
  subtitle: open_url, JSON 파싱
  blocks:
  - type: text
    content: JSONPlaceholder API에서 사용자 데이터를 가져옵니다. 이 API는 개발자들이 테스트 목적으로 사용하는 무료 서비스로, 10명의 가상 사용자 정보를 제공합니다. 각 사용자 데이터에는 이름, 이메일, 주소, 회사 정보 등이 포함되어 있어 정규표현식 학습에 적합한 실습 데이터입니다.
  - type: code
    language: python
    title: 데이터 로드
    description: JSONPlaceholder에서 사용자 데이터를 가져옵니다
    content: |-
      usersData = json.loads(
          open_url("https://jsonplaceholder.typicode.com/users").read()
      )
      usersData[:2]
  - type: note
    style: tip
    title: JSONPlaceholder란?
    content: JSONPlaceholder는 무료 REST API로, 테스트와 학습용 데이터를 제공합니다. CORS가 활성화되어 있어 pyodide 환경에서도 문제없이 사용할 수 있습니다.

- id: step3_explore
  title: 3단계. 이메일 형식 탐색
  subtitle: 데이터 구조 파악
  blocks:
  - type: text
    content: 정규표현식 패턴을 만들기 전에 어떤 이메일 형식이 있는지 먼저 확인해야 합니다. 패턴을 알아야 패턴을 만들 수 있기 때문입니다. 실무에서도 데이터를 먼저 탐색하고 공통된 규칙을 파악한 후에 정규표현식을 작성하는 것이 일반적인 워크플로우입니다. 이메일의 경우 사용자명@도메인.최상위도메인 형태가 기본이지만, 세부적인 변형이 많습니다.
  - type: code
    language: python
    title: 이메일 샘플 확인
    description: 첫 5명의 이메일 주소를 확인합니다
    content: |-
      emails = [user['email'] for user in usersData[:5]]
      emails
  - type: text
    content: |-
      확인된 이메일 형식:
      - Sincere@april.biz
      - Shanna@melissa.tv
      - Nathan@yesenia.net
      - Julianne.OConner@kory.org
      - Lucio_Hettinger@annie.ca

      공통 패턴: **단어@단어.단어** 형식입니다. 단어 부분에는 문자, 숫자, 마침표(.), 언더스코어(_)가 올 수 있습니다.

- id: step4_pattern_basic
  title: 4단계. 기본 패턴 만들기
  subtitle: 간단한 이메일 패턴
  blocks:
  - type: text
    content: 가장 간단한 이메일 패턴부터 시작합니다. 복잡한 패턴을 처음부터 만들려고 하면 실수하기 쉬우므로, 단순한 패턴에서 시작해서 점진적으로 개선하는 것이 좋습니다. 먼저 단어@단어.단어 형식을 정규표현식으로 표현해봅시다. 여기서 단어란 영문자, 숫자, 언더스코어를 의미합니다.
  - type: code
    language: python
    title: 기본 패턴 테스트
    description: 간단한 이메일 패턴으로 추출 시도
    content: |-
      testText = "Contact: john@test.com and admin@site.org"
      pattern = r"\w+@\w+\.\w+"
      re.findall(pattern, testText)
  - type: note
    style: tip
    title: 패턴 해석
    content: |-
      **패턴: \\w+@\\w+\\.\\w+**
      - `\w+` : 단어 문자(문자, 숫자, _)가 1개 이상
      - `@` : @ 기호 그대로
      - `\w+` : 단어 문자 1개 이상
      - `\.` : 마침표 (\ 로 이스케이프 필요)
      - `\w+` : 단어 문자 1개 이상
  - type: text
    content: 기본 패턴으로 간단한 이메일을 성공적으로 추출했습니다. 하지만 실제 데이터에는 Julianne.OConner@kory.org처럼 아이디에 마침표가 포함된 경우나, Lucio_Hettinger@annie.ca처럼 다양한 형태가 있습니다. 현재 패턴으로는 이런 복잡한 형식을 놓칠 수 있으므로 개선이 필요합니다.

- id: step5_pattern_improved
  title: 5단계. 패턴 개선하기
  subtitle: 마침표와 언더스코어 처리
  blocks:
  - type: text
    content: "실제 이메일 주소에는 다양한 문자가 포함될 수 있습니다. Julianne.OConner@kory.org처럼 아이디에 마침표가 포함되거나, Lucio_Hettinger@annie.ca처럼 언더스코어가 사용되기도 합니다. 문자 클래스 [...]를 사용하면 여러 문자 중 하나를 매칭할 수 있어, 이런 다양한 형식을 한 번에 처리할 수 있습니다."
  - type: code
    language: python
    title: 개선된 패턴
    description: 마침표, 언더스코어를 포함한 패턴
    content: |-
      pattern = r"[\w.]+@[\w.]+\.\w+"

      testText = "Contact: Julianne.OConner@kory.org and Lucio_Hettinger@annie.ca"
      re.findall(pattern, testText)
  - type: note
    style: tip
    title: 패턴 해석
    content: |-
      **패턴: [\\w.]+@[\\w.]+\\.\\w+**
      - `[\w.]+` : 단어 문자 또는 마침표가 1개 이상 ([ ] 는 문자 클래스)
      - `@` : @ 기호
      - `[\w.]+` : 도메인 부분 (서브도메인 포함 가능)
      - `\.` : 마침표
      - `\w+` : 최상위 도메인 (com, org, net 등)

- id: step6_extract_all
  title: 6단계. 모든 이메일 추출
  subtitle: re.findall로 전체 추출
  blocks:
  - type: text
    content: 이제 실제 사용자 데이터에서 모든 이메일을 추출합니다. JSON 데이터를 문자열로 변환하면 모든 필드의 값이 하나의 텍스트에 담기게 됩니다. re.findall() 함수는 이 텍스트에서 패턴과 일치하는 모든 부분을 찾아 리스트로 반환합니다. 이 방식은 데이터 구조를 몰라도 원하는 형식의 문자열을 추출할 수 있어 매우 유용합니다.
  - type: code
    language: python
    title: 전체 텍스트로 변환
    description: 사용자 데이터를 하나의 문자열로 합칩니다
    content: |-
      allText = json.dumps(usersData)
      allText[:200]
  - type: code
    language: python
    title: 이메일 추출
    description: findall로 모든 이메일을 찾습니다
    content: |-
      pattern = r"[\w.]+@[\w.]+\.\w+"
      extractedEmails = re.findall(pattern, allText)
      extractedEmails
  - type: note
    style: tip
    title: re.findall() 사용법
    content: "re.findall(패턴, 텍스트)는 패턴과 일치하는 모든 문자열을 리스트로 반환합니다. 가장 많이 사용하는 정규표현식 함수입니다."

- id: step7_result
  title: 7단계. 결과 확인
  subtitle: 추출된 이메일 분석
  blocks:
  - type: text
    content: 추출한 이메일 주소들을 확인하고 간단한 통계를 내봅시다. 이메일에서 @ 뒤의 도메인 부분을 분리하면 어떤 도메인이 많이 사용되는지 분석할 수 있습니다. 이런 도메인별 분류는 마케팅 분석, 사용자 분포 파악, 스팸 필터링 등 다양한 실무에서 활용됩니다.
  - type: code
    language: python
    title: 이메일 개수 확인
    description: 총 몇 개의 이메일이 추출되었는지 확인합니다
    content: |-
      f"총 {len(extractedEmails)}개의 이메일 주소를 찾았습니다"
  - type: code
    language: python
    title: 도메인별 분류
    description: 이메일 도메인별로 개수를 세어봅니다
    content: |-
      domains = [email.split('@')[1] for email in extractedEmails]
      domainCount = {}
      for domain in domains:
          domainCount[domain] = domainCount.get(domain, 0) + 1
      domainCount
  - type: text
    content: 정규표현식으로 비정형 텍스트에서 구조화된 정보를 추출했습니다. JSON 구조를 파싱하지 않고도 패턴만으로 원하는 데이터를 찾아낸 것입니다. 이것이 정규표현식의 첫 번째 강력함입니다. 웹 크롤링, 로그 분석, 데이터 정제 등 다양한 분야에서 이 기법이 활용됩니다.

- id: practice
  title: 실습
  subtitle: 이메일 추출 프로젝트
  blocks:
  - type: text
    content: 정규표현식 개발자가 되어 이메일 추출 도구를 만들어봅시다. 미션1에서는 회사 연락처에서 특정 도메인(.com)의 이메일만 필터링하고, 미션2에서는 JSONPlaceholder API에서 실제 데이터를 가져와 도메인별 통계를 분석합니다. 각 미션은 import문부터 시작하여 독립적으로 실행할 수 있습니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 회사 이메일 추출 및 .com 필터링"
    blocks:
    - type: code
      title: "이메일 추출"
      content: |-
        import re

        text = """
        회사 연락처:
        대표: ceo@company.com
        고객센터: support@help.net
        영업팀: sales@company.com
        개발팀: dev@tech.io
        마케팅: marketing@company.com
        """

        emails = re.findall(r"[\w.]+@[\w.]+\.\w+", text)
        emails
    - type: code
      title: ".com 도메인 필터링"
      content: |-
        filtered = [e for e in emails if e.endswith('.com')]
        filtered
  - type: expansion
    title: "미션2: JSONPlaceholder 이메일 추출 및 도메인 통계"
    blocks:
    - type: code
      title: "데이터 로드 및 이메일 추출"
      content: |-
        import re
        import json
        from pyodide.http import open_url

        data = json.loads(
            open_url("https://jsonplaceholder.typicode.com/users").read()
        )
        raw = json.dumps(data)
        found = re.findall(r"[\w.]+@[\w.]+\.\w+", raw)
        found
    - type: code
      title: "도메인별 통계"
      content: |-
        domains = [e.split('@')[1] for e in found]
        stats = {}
        for d in domains:
            stats[d] = stats.get(d, 0) + 1
        stats

- id: summary
  title: 정리
  subtitle: 첫 번째 프로젝트 완료!
  blocks:
  - type: text
    content: 이번 프로젝트에서는 정규표현식의 기본을 배웠습니다. re.findall()로 패턴과 일치하는 모든 문자열을 추출하는 방법을 익혔고, 문자 클래스를 사용해 다양한 이메일 형식을 처리하는 패턴을 만들었습니다. 이 기법은 이메일뿐 아니라 전화번호, URL, 날짜 등 형식이 있는 모든 데이터 추출에 응용할 수 있습니다.
  - type: list
    items:
    - "\\w - 단어 문자 (문자, 숫자, _)"
    - "+ - 1개 이상 반복"
    - "[\\w.] - 문자 클래스 (단어 문자 또는 마침표)"
    - "\\. - 마침표 리터럴 (이스케이프 필수)"
    - "re.findall() - 모든 매칭 결과를 리스트로 반환"
  - type: text
    content: 다음 프로젝트에서는 전화번호 형식을 통일하는 방법을 배웁니다!
