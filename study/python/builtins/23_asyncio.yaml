      import asyncio

      async def processBatch(batchId, items):
          await asyncio.sleep(len(items) * 0.01)
          return {"batch": batchId, "processed": len(items)}

      async def batchProcessor():
          allItems = list(range(1, 16))
          batchSize = 5

          batches = [allItems[i:i+batchSize] for i in range(0, len(allItems), batchSize)]
          tasks = [processBatch(i, batch) for i, batch in enumerate(batches)]

          batchResults = await asyncio.gather(*tasks)
          return batchResults

      batchOutput = await batchProcessor()
