      import asyncio

      async def fetchEndpoint(name, delay, shouldFail=False):
          await asyncio.sleep(delay)
          if shouldFail:
              raise ValueError(f"{name} failed")
          return {"endpoint": name, "data": f"{name} data"}

      async def aggregateApis():
          endpoints = [
              fetchEndpoint("users", 0.08),
              fetchEndpoint("products", 0.06),
              fetchEndpoint("orders", 0.10),
              fetchEndpoint("analytics", 0.05, shouldFail=True)
          ]

          results = await asyncio.gather(*endpoints, return_exceptions=True)

          successful = [r for r in results if isinstance(r, dict)]
          failed = [r for r in results if isinstance(r, Exception)]

          return {
              "successful": len(successful),
              "failed": len(failed),
              "data": successful
          }

      aggregation = await aggregateApis()
      aggregation
