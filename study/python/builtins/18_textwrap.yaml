meta:
  title: "textwrap - 텍스트 래핑과 포맷팅"
  description: "텍스트 래핑, 들여쓰기, 축약 등 텍스트 포맷팅 기능을 제공하는 textwrap 모듈"
  keywords: ["textwrap", "wrap", "fill", "dedent", "indent", "shorten"]

intro:
  - type: "content"
    title: "textwrap 모듈이란?"
    content: |-
      textwrap 모듈은 텍스트를 특정 너비로 래핑하거나 들여쓰기를 조정하는 기능을 제공합니다.
      터미널 출력, 문서 생성, 코드 포맷팅 등에서 유용하게 사용됩니다.

sections:
  - name: "module_import"
    title: "⚠️ textwrap 모듈 임포트"
    blocks:
      - type: "content"
        title: "표준 라이브러리 임포트"
        content: |-
          textwrap는 Python 표준 라이브러리이므로 별도 설치 없이 사용할 수 있습니다.

      - type: "code"
        language: "python"
        title: "textwrap 임포트"
        description: "textwrap 모듈을 임포트합니다."
        content: |-
          import textwrap

  - name: "basic_wrapping"
    title: "기본 텍스트 래핑"
    blocks:
      - type: "content"
        title: "wrap()과 fill() 함수"
        content: |-
          wrap()는 텍스트를 리스트로 반환하고, fill()은 하나의 문자열로 반환합니다.

      - type: "code"
        language: "python"
        title: "wrap() - 리스트로 래핑"
        description: "긴 텍스트를 지정된 너비로 나누어 리스트로 반환합니다."
        content: |-
          longText = "Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation."
          wrappedLines = textwrap.wrap(longText, width=40)
          wrappedLines

      - type: "tip"
        title: "wrap() 반환값"
        content: "wrap()는 각 줄을 요소로 하는 리스트를 반환합니다."

      - type: "code"
        language: "python"
        title: "fill() - 문자열로 래핑"
        description: "긴 텍스트를 지정된 너비로 래핑하여 하나의 문자열로 반환합니다."
        content: |-
          longText = "Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation."
          filledText = textwrap.fill(longText, width=40)
          filledText

      - type: "tip"
        title: "fill()과 wrap()의 차이"
        content: "fill()은 wrap()의 결과를 개행문자로 join한 것과 같습니다."

      - type: "code"
        language: "python"
        title: "너비 조정"
        description: "다양한 너비로 텍스트를 래핑합니다."
        content: |-
          text = "The quick brown fox jumps over the lazy dog. This is a sample sentence for testing text wrapping."

          width30 = textwrap.fill(text, width=30)
          width50 = textwrap.fill(text, width=50)
          width70 = textwrap.fill(text, width=70)

          {
              "width_30": width30,
              "width_50": width50,
              "width_70": width70
          }

  - name: "text_dedenting"
    title: "들여쓰기 제거"
    blocks:
      - type: "content"
        title: "dedent() 함수"
        content: |-
          dedent()는 모든 줄에서 공통 선행 공백을 제거합니다.
          주로 함수 내 docstring이나 여러 줄 문자열에서 사용됩니다.

      - type: "code"
        language: "python"
        title: "기본 dedent"
        description: "들여쓰기된 텍스트에서 공통 공백을 제거합니다."
        content: |-
          indentedText = """
              Hello World
              This is indented
              All lines have common spacing
          """
          dedentedText = textwrap.dedent(indentedText)
          dedentedText

      - type: "tip"
        title: "dedent 사용 시기"
        content: "코드 내에서 여러 줄 문자열을 깔끔하게 작성할 때 유용합니다."

      - type: "code"
        language: "python"
        title: "함수 내 문자열 정리"
        description: "함수 내에서 들여쓰기된 문자열을 정리합니다."
        content: |-
          def getMessage():
              message = """
                  Welcome to our application!
                  Please follow these steps:
                  1. Login
                  2. Select a project
                  3. Start working
              """
              return textwrap.dedent(message).strip()

          cleanMessage = getMessage()
          cleanMessage

      - type: "code"
        language: "python"
        title: "부분 들여쓰기 처리"
        description: "공통 들여쓰기만 제거됩니다."
        content: |-
          mixedIndent = """
              First level
                  Second level
                      Third level
              Back to first
          """
          result = textwrap.dedent(mixedIndent)
          result

  - name: "text_indenting"
    title: "들여쓰기 추가"
    blocks:
      - type: "content"
        title: "indent() 함수"
        content: |-
          indent()는 각 줄의 시작 부분에 지정된 문자열을 추가합니다.

      - type: "code"
        language: "python"
        title: "기본 indent"
        description: "모든 줄에 들여쓰기를 추가합니다."
        content: |-
          text = "Line 1\nLine 2\nLine 3"
          indentedText = textwrap.indent(text, "    ")
          indentedText

      - type: "tip"
        title: "prefix 문자열"
        content: "공백뿐만 아니라 다른 문자열도 prefix로 사용할 수 있습니다."

      - type: "code"
        language: "python"
        title: "커스텀 prefix"
        description: "다양한 prefix를 사용하여 들여쓰기합니다."
        content: |-
          codeLines = "def hello():\n    print('Hello')\n    return True"

          commentStyle = textwrap.indent(codeLines, "# ")
          bulletStyle = textwrap.indent(codeLines, "  - ")

          {
              "comment": commentStyle,
              "bullet": bulletStyle
          }

      - type: "code"
        language: "python"
        title: "조건부 들여쓰기"
        description: "predicate 함수로 특정 줄만 들여쓰기합니다."
        content: |-
          text = "Header\nContent line 1\nContent line 2\nFooter"

          def notHeader(line):
              return not line.startswith("Header")

          result = textwrap.indent(text, "    ", predicate=notHeader)
          result

      - type: "tip"
        title: "predicate 활용"
        content: "predicate로 빈 줄 제외, 특정 패턴 제외 등을 구현할 수 있습니다."

  - name: "text_shortening"
    title: "텍스트 축약"
    blocks:
      - type: "content"
        title: "shorten() 함수"
        content: |-
          shorten()은 텍스트를 지정된 너비로 축약하고 말줄임표를 추가합니다.

      - type: "code"
        language: "python"
        title: "기본 shorten"
        description: "긴 텍스트를 축약합니다."
        content: |-
          longText = "This is a very long text that needs to be shortened for display purposes."
          shortText = textwrap.shorten(longText, width=30)
          shortText

      - type: "tip"
        title: "placeholder"
        content: "기본 placeholder는 '[...]'이며, 변경할 수 있습니다."

      - type: "code"
        language: "python"
        title: "커스텀 placeholder"
        description: "말줄임표를 커스터마이즈합니다."
        content: |-
          text = "Python is a powerful and versatile programming language used worldwide."

          defaultShort = textwrap.shorten(text, width=40)
          customShort = textwrap.shorten(text, width=40, placeholder="...")
          emojiShort = textwrap.shorten(text, width=40, placeholder=" 👉")

          {
              "default": defaultShort,
              "custom": customShort,
              "emoji": emojiShort
          }

      - type: "code"
        language: "python"
        title: "공백 처리"
        description: "shorten()은 단어 경계에서 잘라냅니다."
        content: |-
          sentence = "The quick brown fox jumps over the lazy dog"

          results = {
              f"width_{w}": textwrap.shorten(sentence, width=w)
              for w in [20, 30, 40]
          }
          results

  - name: "textwrapper_class"
    title: "TextWrapper 클래스"
    blocks:
      - type: "content"
        title: "고급 래핑 제어"
        content: |-
          TextWrapper 클래스를 사용하면 래핑 동작을 세밀하게 제어할 수 있습니다.

      - type: "code"
        language: "python"
        title: "TextWrapper 기본 사용"
        description: "TextWrapper 인스턴스를 생성하고 사용합니다."
        content: |-
          wrapper = textwrap.TextWrapper(width=40)
          text = "Python is a high-level programming language. It emphasizes code readability."
          wrappedText = wrapper.fill(text)
          wrappedText

      - type: "code"
        language: "python"
        title: "들여쓰기 옵션"
        description: "초기 들여쓰기와 후속 들여쓰기를 설정합니다."
        content: |-
          wrapper = textwrap.TextWrapper(
              width=50,
              initial_indent="  * ",
              subsequent_indent="    "
          )

          text = "This is a bullet point with a long text that will wrap to multiple lines."
          result = wrapper.fill(text)
          result

      - type: "tip"
        title: "initial_indent vs subsequent_indent"
        content: "initial_indent는 첫 줄에만, subsequent_indent는 나머지 줄에 적용됩니다."

      - type: "code"
        language: "python"
        title: "긴 단어 처리"
        description: "break_long_words와 break_on_hyphens 옵션을 사용합니다."
        content: |-
          longWord = "supercalifragilisticexpialidocious"
          text = f"The word {longWord} is very long."

          wrapper1 = textwrap.TextWrapper(width=20, break_long_words=True)
          wrapper2 = textwrap.TextWrapper(width=20, break_long_words=False)

          {
              "break_true": wrapper1.fill(text),
              "break_false": wrapper2.fill(text)
          }

      - type: "code"
        language: "python"
        title: "공백 처리 옵션"
        description: "다양한 공백 처리 옵션을 설정합니다."
        content: |-
          text = "Text with    multiple   spaces   and\n\nnewlines."

          wrapper = textwrap.TextWrapper(
              width=40,
              drop_whitespace=True,
              replace_whitespace=True,
              expand_tabs=True,
              tabsize=4
          )

          result = wrapper.fill(text)
          result

      - type: "tip"
        title: "공백 옵션"
        content: "drop_whitespace는 줄 끝 공백, replace_whitespace는 연속 공백을 처리합니다."

      - type: "code"
        language: "python"
        title: "최대 줄 수 제한"
        description: "max_lines로 출력 줄 수를 제한합니다."
        content: |-
          longText = " ".join(["Line content here."] * 20)

          wrapper = textwrap.TextWrapper(
              width=40,
              max_lines=3,
              placeholder=" [Read more...]"
          )

          result = wrapper.fill(longText)
          result

  - name: "practical"
    title: "실전 활용 예제"
    blocks:
      - type: "content"
        title: "실무 시나리오"
        content: |-
          textwrap를 활용한 실전 텍스트 포맷팅 예제를 다룹니다.

      - type: "code"
        language: "python"
        title: "터미널 출력 포맷팅"
        description: "터미널에 표시할 도움말 메시지를 포맷팅합니다."
        content: |-
          def formatHelpMessage(command, description, width=70):
              wrapper = textwrap.TextWrapper(
                  width=width,
                  initial_indent=f"  {command:<15} ",
                  subsequent_indent=" " * 17
              )
              return wrapper.fill(description)

          commands = [
              ("start", "Start the application server with default configuration"),
              ("stop", "Stop the running application server gracefully"),
              ("restart", "Restart the application server by stopping and starting it again")
          ]

          helpText = "\n".join([
              formatHelpMessage(cmd, desc)
              for cmd, desc in commands
          ])

          helpText

      - type: "code"
        language: "python"
        title: "코드 블록 포맷팅"
        description: "코드 블록에 들여쓰기와 테두리를 추가합니다."
        content: |-
          def formatCodeBlock(code, language="python"):
              dedentedCode = textwrap.dedent(code).strip()
              indentedCode = textwrap.indent(dedentedCode, "    ")

              header = f"```{language}"
              footer = "```"

              return f"{header}\n{indentedCode}\n{footer}"

          sampleCode = """
              def factorial(n):
                  if n <= 1:
                      return 1
                  return n * factorial(n - 1)
          """

          formatted = formatCodeBlock(sampleCode)
          formatted

      - type: "code"
        language: "python"
        title: "이메일 본문 포맷팅"
        description: "이메일 본문을 보기 좋게 포맷팅합니다."
        content: |-
          def formatEmailBody(greeting, body, signature, width=60):
              wrapper = textwrap.TextWrapper(width=width)

              parts = [
                  greeting,
                  "",
                  wrapper.fill(body),
                  "",
                  signature
              ]

              return "\n".join(parts)

          email = formatEmailBody(
              greeting="Dear Customer,",
              body="We are pleased to inform you that your order has been processed and will be shipped within 2-3 business days. You will receive a tracking number once the package is dispatched.",
              signature="Best regards,\nCustomer Service Team"
          )

          email

      - type: "code"
        language: "python"
        title: "로그 메시지 포맷팅"
        description: "로그 메시지에 타임스탬프와 레벨을 추가합니다."
        content: |-
          from datetime import datetime

          def formatLogMessage(level, message, width=80):
              timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
              prefix = f"[{timestamp}] {level:<7} "

              wrapper = textwrap.TextWrapper(
                  width=width,
                  initial_indent=prefix,
                  subsequent_indent=" " * len(prefix)
              )

              return wrapper.fill(message)

          logs = [
              formatLogMessage("INFO", "Application started successfully"),
              formatLogMessage("WARNING", "Database connection pool is running low on available connections"),
              formatLogMessage("ERROR", "Failed to process request due to invalid input data format")
          ]

          "\n".join(logs)

      - type: "code"
        language: "python"
        title: "마크다운 리스트 포맷팅"
        description: "마크다운 형식의 리스트를 생성합니다."
        content: |-
          def formatMarkdownList(items, ordered=False, width=70):
              formatted = []

              for i, item in enumerate(items, 1):
                  prefix = f"{i}. " if ordered else "- "
                  wrapper = textwrap.TextWrapper(
                      width=width,
                      initial_indent=prefix,
                      subsequent_indent="  " if not ordered else "   "
                  )
                  formatted.append(wrapper.fill(item))

              return "\n".join(formatted)

          tasks = [
              "Review and update the project documentation with latest API changes",
              "Implement unit tests for the new authentication module",
              "Deploy the application to staging environment for QA testing"
          ]

          unordered = formatMarkdownList(tasks, ordered=False)
          ordered = formatMarkdownList(tasks, ordered=True)

          {
              "unordered": unordered,
              "ordered": ordered
          }

      - type: "code"
        language: "python"
        title: "다단계 들여쓰기"
        description: "계층 구조를 표현하는 텍스트를 포맷팅합니다."
        content: |-
          def formatHierarchy(items, level=0):
              indent = "  " * level
              result = []

              for item in items:
                  if isinstance(item, dict):
                      for key, value in item.items():
                          result.append(f"{indent}- {key}")
                          if isinstance(value, list):
                              result.extend(formatHierarchy(value, level + 1))
                  else:
                      result.append(f"{indent}- {item}")

              return result

          structure = [
              {"Project Root": [
                  {"src": ["main.py", "utils.py", "config.py"]},
                  {"tests": ["test_main.py", "test_utils.py"]},
                  "README.md"
              ]}
          ]

          hierarchy = "\n".join(formatHierarchy(structure))
          hierarchy

  - name: "practice"
    title: "연습 문제"
    blocks:
      - type: "expansion"
        title: "🟢 기본 래핑"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "텍스트를 30자 너비로 래핑하세요"
            content: |-
              text = "Python textwrap module provides convenient functions for formatting text."
              result = textwrap.fill(text, width=30)
              result

      - type: "expansion"
        title: "🟢 들여쓰기 제거"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "들여쓰기된 텍스트에서 공통 공백을 제거하세요"
            content: |-
              text = """
                  Hello
                  World
                  Python
              """
              result = textwrap.dedent(text).strip()
              result

      - type: "expansion"
        title: "🟢 들여쓰기 추가"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "각 줄에 4칸 들여쓰기를 추가하세요"
            content: |-
              text = "Line 1\nLine 2\nLine 3"
              result = textwrap.indent(text, "    ")
              result

      - type: "expansion"
        title: "🟢 텍스트 축약"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "텍스트를 25자로 축약하세요"
            content: |-
              text = "This is a long sentence that needs to be shortened."
              result = textwrap.shorten(text, width=25)
              result

      - type: "expansion"
        title: "🟢 리스트로 래핑"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "텍스트를 40자 너비로 래핑하여 리스트로 반환하세요"
            content: |-
              text = "The quick brown fox jumps over the lazy dog. This is a test sentence."
              result = textwrap.wrap(text, width=40)
              result

      - type: "expansion"
        title: "🟡 초기 들여쓰기"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "첫 줄에만 '> '를 추가하고 나머지는 '  '로 들여쓰기하세요"
            content: |-
              wrapper = textwrap.TextWrapper(
                  width=40,
                  initial_indent="> ",
                  subsequent_indent="  "
              )
              text = "This is a quoted text that will span multiple lines when wrapped."
              result = wrapper.fill(text)
              result

      - type: "expansion"
        title: "🟡 커스텀 placeholder"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "텍스트를 30자로 축약하고 '...'를 사용하세요"
            content: |-
              text = "Python is a powerful programming language used for many applications."
              result = textwrap.shorten(text, width=30, placeholder="...")
              result

      - type: "expansion"
        title: "🟡 조건부 들여쓰기"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "빈 줄이 아닌 줄에만 '  '를 추가하세요"
            content: |-
              text = "Line 1\n\nLine 2\nLine 3"
              result = textwrap.indent(text, "  ", predicate=lambda line: line.strip())
              result

      - type: "expansion"
        title: "🟡 긴 단어 처리"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "너비 15에서 긴 단어를 강제로 분리하세요"
            content: |-
              wrapper = textwrap.TextWrapper(width=15, break_long_words=True)
              text = "supercalifragilisticexpialidocious"
              result = wrapper.fill(text)
              result

      - type: "expansion"
        title: "🟡 최대 줄 수 제한"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "최대 2줄로 제한하고 '...'로 표시하세요"
            content: |-
              wrapper = textwrap.TextWrapper(width=30, max_lines=2, placeholder="...")
              text = "This is a very long text that will be limited to only two lines with a placeholder at the end."
              result = wrapper.fill(text)
              result

      - type: "expansion"
        title: "🔴 도움말 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "명령어와 설명을 정렬된 도움말 형식으로 포맷팅하세요"
            content: |-
              def formatHelp(cmd, desc):
                  wrapper = textwrap.TextWrapper(
                      width=60,
                      initial_indent=f"  {cmd:<12} ",
                      subsequent_indent=" " * 14
                  )
                  return wrapper.fill(desc)

              result = formatHelp("install", "Install packages from the package manager with automatic dependency resolution")
              result

      - type: "expansion"
        title: "🔴 코드 주석 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "긴 주석을 여러 줄로 나누고 각 줄에 '# '를 추가하세요"
            content: |-
              comment = "This function performs complex calculations using advanced algorithms to optimize performance"

              wrapper = textwrap.TextWrapper(
                  width=50,
                  initial_indent="# ",
                  subsequent_indent="# "
              )

              result = wrapper.fill(comment)
              result

      - type: "expansion"
        title: "🔴 번호 있는 리스트"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "아이템을 번호 있는 리스트로 포맷팅하세요"
            content: |-
              items = [
                  "Install required dependencies",
                  "Configure environment variables",
                  "Run database migrations"
              ]

              formatted = []
              for i, item in enumerate(items, 1):
                  wrapper = textwrap.TextWrapper(
                      width=40,
                      initial_indent=f"{i}. ",
                      subsequent_indent="   "
                  )
                  formatted.append(wrapper.fill(item))

              result = "\n".join(formatted)
              result

      - type: "expansion"
        title: "🔴 단락 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "여러 단락을 각각 래핑하고 빈 줄로 구분하세요"
            content: |-
              paragraphs = [
                  "First paragraph with some long text that needs wrapping.",
                  "Second paragraph also with long text that should be formatted nicely."
              ]

              wrapper = textwrap.TextWrapper(width=35)
              formatted = [wrapper.fill(p) for p in paragraphs]
              result = "\n\n".join(formatted)
              result

      - type: "expansion"
        title: "🔴 인용문 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "인용문을 '| '로 시작하는 형식으로 포맷팅하세요"
            content: |-
              quote = "The only way to do great work is to love what you do. If you haven't found it yet, keep looking."

              wrapper = textwrap.TextWrapper(
                  width=45,
                  initial_indent="| ",
                  subsequent_indent="| "
              )

              result = wrapper.fill(quote)
              result

      - type: "expansion"
        title: "🔴 다단계 리스트"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "중첩된 리스트를 계층적으로 들여쓰기하세요"
            content: |-
              mainItem = "Main topic"
              subItems = ["Subtopic 1", "Subtopic 2"]

              lines = [mainItem]
              for item in subItems:
                  lines.append(textwrap.indent(f"- {item}", "  "))

              result = "\n".join(lines)
              result

      - type: "expansion"
        title: "🔴 테이블 셀 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "긴 텍스트를 테이블 셀 너비에 맞게 래핑하세요"
            content: |-
              cellContent = "This is a very long cell content that needs to fit in a table"

              wrapper = textwrap.TextWrapper(width=20)
              lines = wrapper.wrap(cellContent)

              rows = [f"| {line:<20} |" for line in lines]
              result = "\n".join(rows)
              result

      - type: "expansion"
        title: "🔴 로그 레벨 포맷팅"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "로그 메시지에 레벨과 타임스탬프를 추가하여 포맷팅하세요"
            content: |-
              level = "ERROR"
              message = "Failed to connect to database server after multiple retry attempts"

              prefix = f"[{level}] "
              wrapper = textwrap.TextWrapper(
                  width=60,
                  initial_indent=prefix,
                  subsequent_indent=" " * len(prefix)
              )

              result = wrapper.fill(message)
              result

      - type: "expansion"
        title: "🔴 설명이 있는 옵션"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "명령줄 옵션과 설명을 정렬하여 포맷팅하세요"
            content: |-
              option = "--verbose"
              description = "Enable verbose output mode to display detailed information about the process"

              wrapper = textwrap.TextWrapper(
                  width=70,
                  initial_indent=f"  {option:<15} ",
                  subsequent_indent=" " * 17
              )

              result = wrapper.fill(description)
              result

      - type: "expansion"
        title: "🔴 여러 줄 docstring"
        blocks:
          - type: "code"
            language: "python"
            title: "문제"
            description: "함수 docstring을 정리하고 포맷팅하세요"
            content: |-
              docstring = """
                  Calculate the factorial of a number.

                  This function uses recursion to compute the factorial.
                  Returns None for negative numbers.
              """

              cleaned = textwrap.dedent(docstring).strip()
              result = cleaned
              result
