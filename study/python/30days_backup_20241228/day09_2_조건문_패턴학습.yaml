meta:
  id: day09_2
  title: 조건문 패턴학습
  day: 9
  category: 30days
  source: 30-Days-Of-Python
  sourceUrl: https://github.com/Asabeneh/30-Days-Of-Python
  tags: []
  seo:
    title: "파이썬 조건문 if - 분기 처리"
    description: "if, elif, else로 조건에 따라 다른 코드를 실행하는 방법."
    keywords: ['조건문', 'if', 'elif', 'else']
intro:
  title: 조건문 마스터 패턴북
  emoji: 🔥
  description: 이것만 외우면 조건문 마스터! 핵심 패턴만 모았습니다.
  points:
  - '📝 if문: if 조건:'
  - '🔄 else문: if-else'
  - '📊 elif문: if-elif-else'
  - '🧠 중첩: if 안에 if'
  - '⚡ 삼항연산자: 참 if 조건 else 거짓'
  - '🔍 비교: ==, !=, >, <, >=, <='
  - '🧠 논리: and, or, not'
  - '📦 멤버십: in, not in'
  summary: 🔥 조건문은 프로그램의 분기점! 논리적 사고의 시작!
sections:
- id: if_basic
  title: 1. if 기본 패턴
  subtitle: 'if 조건:'
  blocks:
  - type: code
    language: python
    title: 기본 if문
    description: if문은 조건이 참일 때만 코드를 실행하는 가장 기본적인 조건문 패턴입니다. 조건이 거짓이면 아무것도 실행되지 않습니다.
    content: |-
      ifBasicAge = 25
      if ifBasicAge >= 18:
          print("성인입니다")

      if 5 > 3:
          print("참입니다")
- id: if_else
  title: 2. if-else 패턴
  subtitle: 'if 조건: else:'
  blocks:
  - type: code
    language: python
    title: if-else 분기
    description: if-else는 조건에 따라 두 가지 중 하나를 반드시 실행하는 패턴입니다. 조건이 참이면 if 블록을, 거짓이면 else 블록을 실행합니다.
    content: |-
      ifElseAge = 17
      if ifElseAge >= 18:
          print("성인")
      else:
          print("미성년자")

      ifElseNumber = 7
      if ifElseNumber % 2 == 0:
          print("짝수")
      else:
          print("홀수")
- id: if_elif_else
  title: 3. if-elif-else 패턴
  subtitle: 다중 조건 분기
  blocks:
  - type: code
    language: python
    title: 다중 조건문
    description: if-elif-else는 여러 조건을 순차적으로 검사하여 첫 번째로 참인 조건의 블록만 실행하는 패턴입니다. 위에서 아래로 순서대로 검사합니다.
    content: |-
      ifElifScore = 85
      if ifElifScore >= 90:
          ifElifGrade = "A"
      elif ifElifScore >= 80:
          ifElifGrade = "B"
      elif ifElifScore >= 70:
          ifElifGrade = "C"
      else:
          ifElifGrade = "F"

      print(f"등급: {ifElifGrade}")
- id: ternary
  title: 4. 삼항 연산자 패턴
  subtitle: 값1 if 조건 else 값2
  blocks:
  - type: code
    language: python
    title: 조건부 표현식
    description: 삼항 연산자는 if-else를 한 줄로 표현하는 패턴입니다. 조건이 참이면 첫 번째 값을, 거짓이면 두 번째 값을 반환하며 주로 변수 할당에 사용됩니다.
    content: |-
      ternaryAge = 20
      ternaryStatus = "성인" if ternaryAge >= 18 else "미성년자"
      print(ternaryStatus)

      ternaryA, ternaryB = 10, 5
      ternaryMax = ternaryA if ternaryA > ternaryB else ternaryB
      print(ternaryMax)
- id: logical_operators
  title: 5. 논리 연산자 패턴
  subtitle: and, or, not
  blocks:
  - type: code
    language: python
    title: 논리 연산자
    description: 논리 연산자는 여러 조건을 조합하는 패턴입니다. and는 모든 조건이 참, or는 하나라도 참, not은 조건을 반대로 만듭니다.
    content: |-
      logicalAge = 25
      logicalHasLicense = True
      if logicalAge >= 18 and logicalHasLicense:
          print("운전 가능")

      logicalDay = "토요일"
      if logicalDay == "토요일" or logicalDay == "일요일":
          print("주말")

      logicalIsLoggedIn = False
      if not logicalIsLoggedIn:
          print("로그인 필요")
- id: membership
  title: 6. 멤버십 연산자 패턴
  subtitle: in, not in
  blocks:
  - type: code
    language: python
    title: 포함 여부 확인
    description: 멤버십 연산자는 특정 값이 시퀀스에 포함되어 있는지 확인하는 패턴입니다. in은 포함 여부를, not in은 미포함 여부를 확인합니다.
    content: |-
      membershipFruits = ["apple", "banana", "orange"]
      if "apple" in membershipFruits:
          print("사과 있음")

      if "grape" not in membershipFruits:
          print("포도 없음")

      membershipGrade = "A"
      if membershipGrade in ["A", "B", "C"]:
          print("합격")
- id: comparison
  title: 7. 비교 연산자 패턴
  subtitle: '> < >= <= == !='
  blocks:
  - type: code
    language: python
    title: 값 비교
    description: 비교 연산자는 두 값을 비교하는 패턴입니다. 크기 비교(>, <, >=, <=)와 동등 비교(==, !=)가 있으며, 숫자와 문자열 모두에 사용할 수 있습니다.
    content: |-
      comparisonAge = 25
      if comparisonAge > 18:
          print("성인")
      if comparisonAge >= 25:
          print("25세 이상")
      if comparisonAge == 25:
          print("정확히 25세")
      if comparisonAge != 20:
          print("20세 아님")

      comparisonScore = 85
      if 80 <= comparisonScore < 90:
          print("B등급")
- id: nested
  title: 8. 중첩 조건문 패턴
  subtitle: 조건 안의 조건
  blocks:
  - type: code
    language: python
    title: 중첩 if문
    description: 중첩 조건문은 조건문 안에 또 다른 조건문을 넣는 패턴입니다. 복잡한 논리를 단계적으로 처리할 때 사용하며, 들여쓰기에 주의해야 합니다.
    content: |-
      nestedAge = 25
      nestedHasLicense = True

      if nestedAge >= 18:
          if nestedHasLicense:
              print("운전 가능")
          else:
              print("면허 필요")
      else:
          print("나이 부족")

      nestedScore = 88
      if nestedScore >= 80:
          if nestedScore >= 90:
              print("A등급")
          else:
              print("B등급")
- id: short_circuit
  title: 9. 단축 평가 패턴
  subtitle: 효율적인 조건 검사
  blocks:
  - type: code
    language: python
    title: 단축 평가
    description: 단축 평가는 논리 연산자의 특성을 이용한 효율적인 조건 검사 패턴입니다. and는 첫 번째 거짓에서, or는 첫 번째 참에서 평가를 중단합니다.
    content: |-
      shortCircuitX = 5
      if shortCircuitX > 0 and shortCircuitX < 10:
          print("1~9 사이")

      shortCircuitName = ""
      shortCircuitDisplay = shortCircuitName or "Guest"
      print(shortCircuitDisplay)

      shortCircuitData = None
      if shortCircuitData and len(shortCircuitData) > 0:
          print("데이터 있음")
- id: match_case
  title: 10. match-case 패턴
  subtitle: 패턴 매칭 (Python 3.10+)
  blocks:
  - type: code
    language: python
    title: 패턴 매칭
    description: match-case는 Python 3.10부터 추가된 패턴 매칭 기능입니다. 여러 값을 매칭하거나 복잡한 패턴을 처리할 때 if-elif보다 더 명확하고 강력합니다.
    content: |-
      matchStatus = 404
      match matchStatus:
          case 200:
              print("성공")
          case 404:
              print("페이지 없음")
          case 500:
              print("서버 오류")
          case _:
              print("알 수 없는 상태")

      matchDay = "saturday"
      match matchDay:
          case "saturday" | "sunday":
              print("주말")
          case _:
              print("평일")
