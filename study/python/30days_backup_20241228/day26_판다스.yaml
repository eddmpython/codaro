sections:
- id: import_section
  title: import 섹션
  subtitle: 필요한 모듈 import
  blocks:
  - type: text
    content: 판다스 데이터 분석에 필요한 모듈을 import합니다. pandas는 데이터 분석용 라이브러리이고, numpy는 수치 계산용 라이브러리입니다. import는 day13에서 배운 개념으로, 외부 모듈의 기능을 사용하기 위해 불러오는 명령입니다. 관례적으로 pandas는 pd로, numpy는 np로 짧게 alias를 붙여서 사용합니다. 모든 import는 파일 최상단에 한 번만 작성하며, 이후 섹션에서는 import 없이 바로 pd, np를 사용합니다.
  - type: list
    items:
    - import pandas as pd - 데이터 분석 라이브러리
    - import numpy as np - 수치 계산 라이브러리
    - 파일 최상단에 모든 import 작성
    - 이후 섹션에서 import 재사용 금지
    - pandas와 numpy는 pip install로 설치
  - type: code
    language: python
    title: import 섹션
    description: 판다스 분석에 필요한 모듈을 import합니다.
    content: |-
      import pandas as pd
      import numpy as np

- id: pandas_intro
  title: Pandas 소개
  subtitle: Python 데이터 분석의 핵심 라이브러리
  blocks:
  - type: text
    content: Pandas는 Python에서 가장 인기 있는 데이터 분석 라이브러리입니다. pandas는 panel data의 약자로, 다차원 데이터를 다루기 위해 만들어졌습니다. Excel처럼 표(table) 형태의 데이터를 다루는 강력한 도구입니다. DataFrame은 행과 열로 구성된 2차원 표 자료구조이며, 각 열은 Series라는 1차원 자료구조입니다. CSV 파일을 읽어서 DataFrame으로 만들거나, 딕셔너리로 직접 DataFrame을 생성할 수 있습니다. 데이터 분석의 80%는 데이터 정제와 변환 작업이므로 pandas는 필수 도구입니다.
  - type: list
    items:
    - DataFrame과 Series 자료구조 제공
    - CSV, Excel, JSON 등 다양한 파일 형식 지원
    - 데이터 정제, 변환, 병합 기능
    - 강력한 그룹핑과 집계 연산
    - 딕셔너리로 DataFrame 생성
  - type: code
    language: python
    title: Pandas 시작하기
    description: 딕셔너리로 DataFrame을 생성합니다.
    content: |-
      introDataFrame = pd.DataFrame({
          'name': ['학생01', '학생02', '학생03', '학생04', '학생05'],
          'age': [20, 21, 19, 22, 20],
          'department': ['컴공', '경영', '수학', '컴공', '물리'],
          'mathScore': [85, 78, 92, 88, 76],
          'englishScore': [90, 85, 88, 92, 80]
      })

      print(introDataFrame)
  - type: tip
    content: "pip install pandas numpy로 필요한 패키지를 설치하세요."

- id: dataframe_info
  title: DataFrame 기본 정보
  subtitle: 데이터 구조 파악하기
  blocks:
  - type: text
    content: DataFrame의 기본 정보를 확인하는 것은 데이터 분석의 첫 번째 단계입니다. shape 속성은 (행 개수, 열 개수) 튜플을 반환하며, shape는 '모양'이라는 뜻입니다. columns 속성은 모든 컬럼 이름을 Index 객체로 반환하고, tolist()로 리스트로 변환할 수 있습니다. dtypes는 data types의 약자로, 각 컬럼의 데이터 타입(int64, float64, object 등)을 보여줍니다. 데이터를 분석하기 전에 반드시 구조를 파악해야 적절한 분석 방법을 선택할 수 있습니다.
  - type: list
    items:
    - "shape - 행과 열의 개수 튜플"
    - "columns - 컬럼 이름 Index 객체"
    - "dtypes - 각 컬럼의 데이터 타입"
    - "tolist() - Index를 리스트로 변환"
    - 데이터 구조 파악이 첫 단계
  - type: code
    language: python
    title: DataFrame 기본 정보 확인
    description: shape, columns, dtypes로 DataFrame 구조를 파악합니다.
    content: |-
      infoDataFrame = pd.DataFrame({
          'name': ['학생01', '학생02', '학생03'],
          'age': [20, 21, 19],
          'score': [85, 90, 78]
      })

      print(f"크기: {infoDataFrame.shape}")
      print(f"컬럼: {infoDataFrame.columns.tolist()}")
      print(f"데이터 타입:\n{infoDataFrame.dtypes}")

- id: dataframe_preview
  title: 데이터 미리보기
  subtitle: head, tail, describe
  blocks:
  - type: text
    content: head()와 tail()로 데이터를 미리 확인하고, describe()로 기본 통계를 파악합니다. head는 '머리'라는 뜻으로 데이터의 앞부분을, tail은 '꼬리'라는 뜻으로 데이터의 뒷부분을 보여줍니다. describe()는 '설명하다'라는 뜻으로, 평균, 표준편차, 최솟값, 최댓값, 분위수 등 수치형 데이터의 기술통계를 한눈에 보여줍니다. value_counts()는 범주형 데이터(문자열)의 각 값이 몇 번 나타나는지 세어줍니다. 데이터를 처음 받으면 head()로 구조를 확인하고 describe()로 통계적 특성을 파악하는 것이 일반적입니다.
  - type: list
    items:
    - "head(n) - 처음 n개 행 확인"
    - "tail(n) - 마지막 n개 행 확인"
    - "describe() - 수치형 데이터 기술통계"
    - "value_counts() - 범주형 데이터 빈도"
    - "round() - 소수점 자릿수 조정"
  - type: code
    language: python
    title: 데이터 미리보기와 통계
    description: head, tail, describe로 데이터를 탐색합니다.
    content: |-
      previewDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D', 'E'],
          'dept': ['컴공', '경영', '컴공', '수학', '컴공'],
          'score': [85, 90, 78, 92, 88]
      })

      print(previewDataFrame.head(3))
      print(previewDataFrame.describe().round(1))
      print(previewDataFrame['dept'].value_counts())

- id: series_basics
  title: Series 기초
  subtitle: 1차원 데이터 다루기
  blocks:
  - type: text
    content: Series는 DataFrame의 각 컬럼으로, 인덱스를 가진 1차원 배열입니다. series는 '계열, 시리즈'라는 뜻으로, 순서가 있는 데이터의 나열을 의미합니다. DataFrame에서 df['컬럼명']으로 하나의 컬럼을 선택하면 Series 객체가 반환됩니다. Series는 리스트와 비슷하지만 인덱스를 가지고 있어서 더 강력하며, mean(), median(), std() 같은 통계 함수를 바로 사용할 수 있습니다. day25에서 배운 statistics 모듈과 유사한 기능을 제공하지만, Series 메서드로 더 간편하게 사용합니다.
  - type: list
    items:
    - "mean() - 평균"
    - "median() - 중앙값"
    - "max(), min() - 최댓값, 최솟값"
    - "std() - 표준편차"
    - DataFrame 컬럼이 Series 객체
  - type: code
    language: python
    title: Series 통계 함수
    description: Series에서 기본 통계를 계산합니다.
    content: |-
      seriesDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D', 'E'],
          'mathScore': [85, 90, 78, 92, 88]
      })

      seriesMathScores = seriesDataFrame['mathScore']

      print(f"평균: {seriesMathScores.mean():.1f}")
      print(f"중앙값: {seriesMathScores.median():.1f}")
      print(f"최댓값: {seriesMathScores.max()}")
      print(f"최솟값: {seriesMathScores.min()}")
      print(f"표준편차: {seriesMathScores.std():.2f}")

- id: data_selection
  title: 데이터 선택
  subtitle: 컬럼과 행 선택하기
  blocks:
  - type: text
    content: DataFrame에서 원하는 컬럼이나 행을 선택하는 방법입니다. iloc는 integer location의 약자로 0부터 시작하는 정수 인덱스로 선택하며, loc는 label location의 약자로 라벨(이름)로 선택합니다. df['컬럼명']은 하나의 컬럼을 Series로 반환하고, df[['컬럼1', '컬럼2']]는 여러 컬럼을 DataFrame으로 반환합니다. 대괄호가 하나면 Series, 대괄호가 두 개(리스트)면 DataFrame이 반환되는 것을 기억해야 합니다. iloc[0]은 첫 번째 행 전체를, loc[0, '컬럼명']은 특정 위치의 값을 반환합니다.
  - type: list
    items:
    - "df['column'] - 단일 컬럼 Series 선택"
    - "df[['col1', 'col2']] - 여러 컬럼 DataFrame 선택"
    - "df.iloc[0] - 정수 인덱스로 행 선택"
    - "df.loc[0, 'column'] - 라벨로 특정 값 선택"
    - iloc는 위치, loc는 라벨 기반
  - type: code
    language: python
    title: 데이터 선택 방법
    description: 컬럼과 행을 선택하는 다양한 방법입니다.
    content: |-
      selectDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C'],
          'mathScore': [85, 90, 78],
          'engScore': [88, 92, 85]
      })

      selectNames = selectDataFrame['name']
      print(selectNames)

      selectSubset = selectDataFrame[['name', 'mathScore']]
      print(selectSubset)

      selectFirstRow = selectDataFrame.iloc[0]
      print(selectFirstRow)

      selectSpecificValue = selectDataFrame.loc[0, 'name']
      print(selectSpecificValue)

- id: filtering
  title: 데이터 필터링
  subtitle: 조건에 맞는 데이터 찾기
  blocks:
  - type: text
    content: 조건을 사용해서 원하는 데이터만 선택할 수 있습니다. filtering은 '걸러내다'라는 뜻으로, 특정 조건을 만족하는 행만 추출하는 것입니다. df[조건]의 형태로 사용하며, 조건은 True/False를 반환하는 불린 Series입니다. AND 조건은 &(ampersand) 연산자, OR 조건은 |(vertical bar) 연산자를 사용합니다. 파이썬의 and, or 키워드가 아니라 &, |를 사용해야 하며, 각 조건을 반드시 괄호로 감싸야 합니다. 이는 연산자 우선순위 때문입니다.
  - type: list
    items:
    - "df[조건] - 조건을 만족하는 행만 선택"
    - "AND(&) 조건 - 둘 다 만족"
    - "OR(|) 조건 - 하나만 만족"
    - 각 조건은 괄호로 감싸기
    - and/or가 아닌 &/| 사용
  - type: code
    language: python
    title: 조건 필터링
    description: 조건을 사용해서 데이터를 필터링합니다.
    content: |-
      filterDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D'],
          'department': ['컴공', '경영', '컴공', '수학'],
          'mathScore': [85, 78, 92, 88]
      })

      filterCsStudents = filterDataFrame[filterDataFrame['department'] == '컴공']
      print(filterCsStudents)

      filterHighScore = filterDataFrame[filterDataFrame['mathScore'] >= 85]
      print(filterHighScore)

      filterCsHighScore = filterDataFrame[
          (filterDataFrame['department'] == '컴공') &
          (filterDataFrame['mathScore'] >= 85)
      ]
      print(filterCsHighScore)
  - type: tip
    content: "복합 조건에서 각 조건은 반드시 괄호로 감싸야 합니다."

- id: sorting
  title: 데이터 정렬
  subtitle: 원하는 순서로 나열하기
  blocks:
  - type: text
    content: sort_values()로 데이터를 정렬할 수 있습니다. sort는 '분류하다, 정렬하다'라는 뜻이고, values는 '값들'을 의미합니다. ascending 파라미터는 '오름차순'이라는 뜻으로, True면 작은 값부터(오름차순), False면 큰 값부터(내림차순) 정렬합니다. 여러 컬럼을 기준으로 정렬할 때는 리스트로 컬럼명을 전달하며, ascending도 리스트로 각 컬럼의 정렬 방향을 지정할 수 있습니다. 정렬해도 원본 DataFrame은 변하지 않으며, 정렬된 새 DataFrame이 반환됩니다.
  - type: list
    items:
    - "sort_values('컬럼명') - 해당 컬럼 기준 정렬"
    - "ascending=True - 오름차순(기본값)"
    - "ascending=False - 내림차순"
    - 여러 컬럼 기준 정렬 가능
    - 원본은 변하지 않음
  - type: code
    language: python
    title: 데이터 정렬
    description: 점수 순으로 데이터를 정렬합니다.
    content: |-
      sortDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D'],
          'department': ['컴공', '경영', '컴공', '수학'],
          'mathScore': [85, 78, 92, 88]
      })

      sortDesc = sortDataFrame.sort_values('mathScore', ascending=False)
      print(sortDesc)

      sortMulti = sortDataFrame.sort_values(
          ['department', 'mathScore'],
          ascending=[True, False]
      )
      print(sortMulti)

- id: groupby
  title: 그룹핑과 집계
  subtitle: groupby로 그룹별 분석
  blocks:
  - type: text
    content: groupby()로 데이터를 그룹화하고 집계 함수를 적용하여 그룹별 통계를 계산합니다. groupby는 '~로 그룹화하다'라는 뜻으로, 특정 컬럼의 값이 같은 행들을 하나의 그룹으로 묶습니다. SQL의 GROUP BY와 같은 개념입니다. 그룹화 후 mean(), sum(), count() 같은 집계 함수를 적용하면 각 그룹별 통계를 계산할 수 있습니다. agg() 함수는 aggregation(집계)의 약자로, 여러 집계 함수를 한 번에 적용할 수 있습니다. 학과별 평균 점수, 부서별 매출 합계 같은 그룹별 분석에 필수적인 기능입니다.
  - type: list
    items:
    - "groupby('컬럼명') - 해당 컬럼으로 그룹화"
    - "mean(), sum(), count() - 집계 함수"
    - "agg(['함수1', '함수2']) - 여러 집계 함수"
    - SQL의 GROUP BY와 동일 개념
    - 그룹별 통계 분석에 필수
  - type: code
    language: python
    title: 그룹별 통계
    description: 학과별로 그룹화하여 평균을 계산합니다.
    content: |-
      groupDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D', 'E'],
          'department': ['컴공', '경영', '컴공', '수학', '컴공'],
          'mathScore': [85, 78, 92, 88, 90]
      })

      groupDeptMean = groupDataFrame.groupby('department')['mathScore'].mean()
      print(groupDeptMean)

      groupDeptStats = groupDataFrame.groupby('department')['mathScore'].agg(['count', 'mean', 'max'])
      print(groupDeptStats.round(1))

- id: missing_data
  title: 결측치 처리
  subtitle: 빠진 데이터 다루기
  blocks:
  - type: text
    content: 결측치(Missing Data)는 데이터 분석에서 자주 발생하는 빠진 값입니다. pandas에서는 NaN(Not a Number)으로 표현되며, numpy의 np.nan을 사용합니다. isnull()은 각 셀이 결측치인지 True/False로 반환하고, sum()과 함께 사용하면 각 컬럼의 결측치 개수를 셀 수 있습니다. fillna()는 fill na(결측치 채우기)의 약자로, 결측치를 특정 값으로 대체합니다. dropna()는 drop na(결측치 제거)의 약자로, 결측치가 있는 행을 삭제합니다. 평균값이나 중앙값으로 대체하거나, 앞뒤 값으로 채우거나, 삭제하는 등 다양한 방법이 있습니다.
  - type: list
    items:
    - "isnull() - 결측치 True/False 반환"
    - "dropna() - 결측치 있는 행 삭제"
    - "fillna(값) - 결측치를 특정 값으로 대체"
    - 평균값이나 중앙값으로 대체 가능
    - np.nan으로 결측치 표현
  - type: code
    language: python
    title: 결측치 처리
    description: 결측치를 확인하고 처리합니다.
    content: |-
      missingDataFrame = pd.DataFrame({
          'name': ['학생01', '학생02', '학생03'],
          'mathScore': [85, np.nan, 92],
          'englishScore': [90, 85, np.nan]
      })

      print(missingDataFrame.isnull().sum())

      missingMeanFilled = missingDataFrame.fillna(missingDataFrame.mean(numeric_only=True))
      print(missingMeanFilled)

      missingDropped = missingDataFrame.dropna()
      print(missingDropped)

- id: file_io
  title: 파일 읽기/쓰기
  subtitle: CSV, Excel 파일 다루기
  blocks:
  - type: text
    content: Pandas는 CSV, Excel, JSON 등 다양한 파일 형식을 지원합니다. CSV는 Comma-Separated Values의 약자로, 쉼표로 구분된 텍스트 파일 형식입니다. read_csv()는 CSV 파일을 읽어서 DataFrame으로 만들고, to_csv()는 DataFrame을 CSV 파일로 저장합니다. encoding은 문자 인코딩 방식을 지정하며, 한글이 포함된 경우 'utf-8-sig'를 사용하면 Excel에서도 한글이 깨지지 않습니다. index=False는 DataFrame의 인덱스(행 번호)를 파일에 저장하지 않겠다는 의미입니다. 데이터 분석 결과를 파일로 저장하거나 외부 데이터를 불러올 때 필수적인 기능입니다.
  - type: list
    items:
    - "read_csv('파일명') - CSV 파일 읽기"
    - "to_csv('파일명') - CSV 파일 저장"
    - "encoding='utf-8-sig' - 한글 인코딩"
    - "index=False - 인덱스 저장 안 함"
    - CSV는 쉼표로 구분된 텍스트 파일
  - type: code
    language: python
    title: 파일 읽기/쓰기
    description: CSV 파일을 저장하고 읽습니다.
    content: |-
      fileDataFrame = pd.DataFrame({
          'name': ['학생01', '학생02', '학생03'],
          'score': [85, 90, 78]
      })

      fileDataFrame.to_csv('students.csv', index=False, encoding='utf-8-sig')

      fileLoaded = pd.read_csv('students.csv', encoding='utf-8-sig')
      print(fileLoaded)

- id: practical_example
  title: 실전 데이터 분석
  subtitle: 종합 분석 예제
  blocks:
  - type: text
    content: 지금까지 배운 Pandas 기법을 활용하여 데이터를 종합적으로 분석하는 예제입니다. 새로운 컬럼을 추가하고, 평균을 계산하고, 순위를 매기고, 그룹별 통계를 내는 전체 과정을 수행합니다. mean(axis=1)은 axis(축)가 1이면 행 방향(가로)으로 평균을 계산한다는 뜻입니다. rank()는 순위를 매기는 함수로, ascending=False면 큰 값이 1등입니다. 실제 데이터 분석은 이렇게 여러 기법을 조합하여 인사이트를 도출하는 과정입니다. 데이터 분석가는 pandas를 마스터하면 대부분의 데이터 처리 작업을 수행할 수 있습니다.
  - type: list
    items:
    - 새 컬럼 추가 및 계산
    - 그룹별 통계 계산
    - 순위 매기기
    - 여러 기법 조합 활용
    - 데이터 분석의 전체 흐름
  - type: code
    language: python
    title: 종합 분석 예제
    description: 학생 데이터를 종합 분석합니다.
    content: |-
      practicalDataFrame = pd.DataFrame({
          'name': ['A', 'B', 'C', 'D', 'E'],
          'department': ['컴공', '경영', '컴공', '수학', '컴공'],
          'mathScore': [85, 78, 92, 88, 90],
          'englishScore': [88, 85, 95, 90, 92]
      })

      practicalDataFrame['avgScore'] = practicalDataFrame[['mathScore', 'englishScore']].mean(axis=1)
      practicalDataFrame['rank'] = practicalDataFrame['avgScore'].rank(ascending=False, method='min')

      print(practicalDataFrame.sort_values('rank'))

      practicalFinalStats = practicalDataFrame.groupby('department')['avgScore'].agg(['mean', 'max'])
      print(practicalFinalStats.round(1))

