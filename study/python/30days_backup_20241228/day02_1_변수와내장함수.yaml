meta:
  id: day02_1
  title: 변수와내장함수
  day: 2
  category: 30days
  source: 30-Days-Of-Python
  sourceUrl: https://github.com/Asabeneh/30-Days-Of-Python
  tags: []
  seo:
    title: "파이썬 변수와 내장함수 - 데이터 저장하기"
    description: "변수에 데이터를 저장하고 내장함수를 사용하는 방법을 배웁니다."
    keywords: ['변수', '내장함수', 'type', 'len', 'input']
intro:
  emoji: "📦"
  points:
  - 변수의 개념과 선언 방법
  - 올바른 변수 명명 규칙
  - 다중 변수 할당 기법
  - 파이썬 내장 함수 소개
  - print() 함수 완전 정복
  - len(), type(), input() 함수 활용
  - 데이터 타입 변환 (Type Casting)
  - 문자열과 숫자 간 변환
