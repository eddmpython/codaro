  - type: code
    language: python
    title: 미션3 - 리스트와 튜플
    description: 여러 학생의 점수를 리스트로 관리하고 통계를 냅니다.
    content: |-
      mission3Scores = [85, 90, 78, 92, 88]
      mission3HighScores = [s for s in mission3Scores if s >= 85]
      mission3Stats = (min(mission3Scores), max(mission3Scores), sum(mission3Scores) / len(mission3Scores))
      mission3Min, mission3Max, mission3Avg = mission3Stats

      print(f"우수 점수: {mission3HighScores}")
      print(f"통계: 최소 {mission3Min}, 최대 {mission3Max}, 평균 {mission3Avg:.1f}")
  - type: code
    language: python
    title: 미션4 - 집합과 딕셔너리
    description: 수강생 명단을 집합으로 관리하고 학생 정보를 딕셔너리로 저장합니다.
    content: |-
      mission4ClassA = {"김철수", "이영희", "박민수"}
      mission4ClassB = {"이영희", "최수진", "김철수"}
      mission4Common = mission4ClassA & mission4ClassB
      mission4Only = mission4ClassA - mission4ClassB

      mission4Student = {"name": "김철수", "age": 25, "score": 85}
      mission4Student.update({"major": "컴퓨터공학", "grade": "A"})
      mission4Phone = mission4Student.get("phone", "미등록")

      print(f"공통 수강: {mission4Common}")
      print(f"A반만 수강: {mission4Only}")
      print(f"{mission4Student['name']}: {mission4Student['grade']}등급, 연락처 {mission4Phone}")
  - type: code
    language: python
    title: 미션5 - 조건문과 반복문
    description: 여러 학생의 점수를 등급으로 변환하고 합격자를 찾습니다.
    content: |-
      mission5Students = [
          ("김철수", 85),
          ("이영희", 92),
          ("박민수", 78),
          ("최수진", 88)
      ]

      for i, (name, score) in enumerate(mission5Students):
          if score >= 90:
              grade = "A"
          elif score >= 80:
              grade = "B"
          else:
              grade = "C"
          print(f"{i+1}. {name}: {score}점 ({grade}등급)")

      mission5PassCount = 0
      mission5Index = 0
      while mission5Index < len(mission5Students):
          if mission5Students[mission5Index][1] >= 80:
              mission5PassCount += 1
          mission5Index += 1
      print(f"합격자: {mission5PassCount}명")
  - type: code
    language: python
    title: 미션6 - 함수 종합
    description: 학생 성적을 분석하는 함수를 만들어서 재사용합니다.
    content: |-
      def mission6AnalyzeStudent(name, score, bonus=0):
          mission6Total = score + bonus
          if mission6Total >= 90:
              mission6Grade = "A"
          elif mission6Total >= 80:
              mission6Grade = "B"
          elif mission6Total >= 70:
              mission6Grade = "C"
          else:
              mission6Grade = "F"
          mission6Pass = mission6Total >= 80
          return mission6Total, mission6Grade, mission6Pass

      mission6Students = [
          ("김철수", 85, 5),
          ("이영희", 92, 0),
          ("박민수", 78, 10)
      ]

      for name, score, bonus in mission6Students:
          total, grade, passed = mission6AnalyzeStudent(name, score, bonus)
          status = "합격" if passed else "불합격"
          print(f"{name}: {total}점 ({grade}등급) - {status}")
