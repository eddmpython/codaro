  tags: []
  seo:
    title: "파이썬 연산자 - 사칙연산과 비교"
    description: "파이썬 연산자를 배웁니다. 산술, 비교, 논리연산자 사용법."
    keywords: ['연산자', '사칙연산', '비교연산', '논리연산']
