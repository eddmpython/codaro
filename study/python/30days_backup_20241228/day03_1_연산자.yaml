  emoji: "🧮"
  points:
  - 불린(Boolean) 데이터 타입의 이해
  - 할당 연산자와 복합 할당 연산자
  - 기본 산술 연산자 (덧셈, 뺄셈, 곱셈, 나눗셈)
  - 고급 산술 연산자 (나머지, 정수 나눗셈, 거듭제곱)
