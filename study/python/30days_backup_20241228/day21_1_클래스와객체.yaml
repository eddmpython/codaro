      class Product:
          discount = 0.1

          def __init__(self, name, price):
              self.name = name
              self._price = price

          @property
          def price(self):
              return self._price

          @property
          def discountedPrice(self):
              return self._price * (1 - Product.discount)

          @classmethod
          def setDiscount(cls, rate):
              cls.discount = rate

