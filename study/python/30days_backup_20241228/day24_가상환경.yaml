sections:
- id: virtual_environment_intro
  title: 가상환경 소개
  subtitle: 독립적인 파이썬 환경 만들기
  blocks:
  - type: text
    content: 가상환경(Virtual Environment)은 독립적이고 격리된 파이썬 환경을 만들어주는 도구입니다. virtual은 영어로 '가상의'라는 뜻이며, environment는 '환경'을 의미합니다. 실제 컴퓨터에 여러 개의 독립된 파이썬 작업공간을 만드는 것과 같습니다. 프로젝트A는 Django 2.0을 쓰고 프로젝트B는 Django 3.0을 쓸 때, 가상환경이 없다면 버전 충돌이 발생합니다. 가상환경을 사용하면 각 프로젝트가 자신만의 패키지 버전을 독립적으로 관리할 수 있어서 이런 충돌을 완전히 방지합니다. 마치 각 프로젝트가 자신만의 독립된 파이썬 설치본을 가진 것처럼 동작합니다.
  - type: list
    items:
    - 독립적인 파이썬 환경 생성
    - 패키지 의존성 충돌 방지
    - 프로젝트별 패키지 버전 관리
    - 시스템 파이썬 보호
    - 협업 시 환경 재현 용이
  - type: code
    language: bash
    title: 가상환경 도구 확인
    description: venv와 virtualenv를 확인합니다.
    content: |-
      pip install virtualenv

      virtualenv --version

      python -m venv --help
  - type: tip
    content: "Python 3.3부터 venv 모듈이 내장되어 있어 별도 설치 없이 사용 가능합니다."

- id: creating_virtual_environment
  title: 가상환경 생성
  subtitle: 새로운 가상환경 만들기
  blocks:
  - type: text
    content: venv 모듈을 사용하여 프로젝트별 독립적인 가상환경을 생성할 수 있습니다. python -m venv는 '파이썬을 모듈 모드로 실행하여 venv를 실행하라'는 명령입니다. 가상환경은 프로젝트 폴더 내에 생성하는 것이 일반적입니다. 가상환경을 생성하면 Scripts(Windows) 또는 bin(Mac/Linux) 폴더에 파이썬 실행파일과 pip 등이 복사됩니다. 관례적으로 venv, env, .venv 같은 이름을 사용하며, 점(.)으로 시작하면 숨김 폴더가 됩니다.
  - type: list
    items:
    - python -m venv 환경이름
    - 프로젝트 폴더 내에 생성
    - venv, env, .venv 등의 이름 사용
    - Scripts/bin 폴더 자동 생성
    - 독립된 site-packages 폴더 생성
  - type: code
    language: bash
    title: 가상환경 생성
    description: venv로 가상환경을 생성합니다.
    content: |-
      mkdir myproject
      cd myproject

      python -m venv venv

      python -m venv .venv

      virtualenv venv

- id: activating_virtual_environment
  title: 가상환경 활성화
  subtitle: 가상환경 시작하고 사용하기
  blocks:
  - type: text
    content: 가상환경을 사용하려면 먼저 활성화(activate)해야 합니다. activate는 영어로 '활성화하다'라는 뜻으로, 가상환경을 작동 상태로 만드는 것입니다. 운영체제에 따라 활성화 명령어가 다릅니다. Windows는 Scripts 폴더의 activate를 실행하고, Mac/Linux는 source 명령으로 bin/activate를 실행합니다. 활성화되면 터미널 프롬프트 앞에 (venv) 같은 환경 이름이 표시되어 현재 가상환경이 활성화되었음을 알려줍니다. which python(Windows는 where python)으로 현재 사용 중인 파이썬 경로를 확인할 수 있습니다.
  - type: list
    items:
    - "Windows: venv\\Scripts\\activate"
    - "Mac/Linux: source venv/bin/activate"
    - 프롬프트에 (venv) 표시
    - which python으로 경로 확인
    - PATH 환경변수가 가상환경으로 변경됨
  - type: code
    language: bash
    title: 가상환경 활성화
    description: OS별 활성화 방법입니다.
    content: |-
      venv\Scripts\activate

      source venv/bin/activate

      which python

      pip freeze
  - type: tip
    content: "PowerShell에서는 venv\\Scripts\\Activate.ps1을 사용합니다."

- id: working_with_packages
  title: 패키지 관리
  subtitle: 가상환경에서 패키지 설치 및 관리
  blocks:
  - type: text
    content: 가상환경이 활성화된 상태에서 pip으로 패키지를 설치하면 해당 가상환경에만 설치됩니다. requirements.txt는 requirements(필수 조건)와 txt(텍스트 파일)의 합성어로, 프로젝트 실행에 필요한 패키지 목록을 저장하는 파일입니다. pip freeze는 현재 설치된 모든 패키지와 버전을 출력하는 명령으로, freeze(얼리다)는 '현재 상태를 고정한다'는 의미입니다. 이 파일을 다른 개발자나 배포 환경에 전달하면 동일한 환경을 재현할 수 있습니다. pip install -r requirements.txt로 파일에 기록된 모든 패키지를 한 번에 설치할 수 있습니다.
  - type: list
    items:
    - pip install 패키지명
    - pip freeze로 설치된 패키지 확인
    - requirements.txt로 의존성 저장
    - pip install -r로 일괄 설치
    - pip show로 패키지 정보 확인
  - type: code
    language: bash
    title: 패키지 설치 및 관리
    description: 가상환경에서 패키지를 관리합니다.
    content: |-
      pip install flask

      pip freeze

      pip freeze > requirements.txt

      pip install -r requirements.txt

      pip show flask

      pip install --upgrade flask

- id: deactivating_virtual_environment
  title: 가상환경 비활성화
  subtitle: 가상환경 종료하기
  blocks:
  - type: text
    content: 작업이 끝나면 deactivate 명령으로 가상환경을 비활성화합니다. deactivate는 영어로 '비활성화하다'라는 뜻으로, activate의 반대 명령입니다. 비활성화하면 PATH 환경변수가 원래대로 돌아가서 시스템에 설치된 기본 파이썬을 사용하게 됩니다. 터미널 프롬프트에서 (venv) 표시가 사라지며, which python으로 확인하면 시스템 파이썬 경로가 표시됩니다. 가상환경 폴더 자체는 삭제되지 않고 그대로 유지되므로 언제든지 다시 활성화할 수 있습니다.
  - type: list
    items:
    - deactivate 명령어 사용
    - 프롬프트에서 (venv) 사라짐
    - 시스템 Python으로 복귀
    - 가상환경 폴더는 유지됨
    - 언제든지 재활성화 가능
  - type: code
    language: bash
    title: 가상환경 비활성화
    description: 가상환경을 종료합니다.
    content: |-
      deactivate

      which python

      pip freeze

- id: best_practices
  title: 가상환경 모범 사례
  subtitle: 효과적인 가상환경 사용법
  blocks:
  - type: text
    content: 가상환경을 효과적으로 사용하기 위한 모범 사례입니다. .gitignore는 Git 버전 관리 시스템에서 추적하지 않을 파일 목록을 지정하는 파일입니다. 가상환경 폴더는 용량이 크고 각 환경마다 다르므로 Git에 올리지 않습니다. 대신 requirements.txt만 공유하여 다른 개발자가 동일한 환경을 재현할 수 있게 합니다. __pycache__와 *.pyc는 파이썬이 자동 생성하는 캐시 파일로, 이것도 Git에 올리지 않는 것이 좋습니다. 프로젝트마다 별도 가상환경을 만들면 패키지 충돌을 완벽하게 방지할 수 있습니다.
  - type: list
    items:
    - venv 폴더를 .gitignore에 추가
    - requirements.txt로 의존성 관리
    - 프로젝트마다 별도 가상환경 생성
    - __pycache__ 폴더도 제외
    - 명확한 폴더 구조 유지
  - type: code
    language: bash
    title: 프로젝트 구조와 .gitignore
    description: 권장 프로젝트 구조입니다.
    content: |-
      myproject/
      ├── venv/
      ├── src/
      │   └── main.py
      ├── requirements.txt
      ├── .gitignore
      └── README.md

      echo "venv/" >> .gitignore
      echo "__pycache__/" >> .gitignore
      echo "*.pyc" >> .gitignore

- id: project_setup_example
  title: 프로젝트 초기화 예제
  subtitle: 새 프로젝트 설정하기
  blocks:
  - type: text
    content: 새로운 파이썬 프로젝트를 시작할 때 가상환경을 설정하는 전체 과정입니다. 프로젝트 폴더를 만들고, 가상환경을 생성하고, 활성화한 후 필요한 패키지를 설치합니다. 패키지 설치가 완료되면 pip freeze로 현재 환경을 requirements.txt에 기록합니다. .gitignore 파일을 만들어서 가상환경 폴더를 Git 추적에서 제외하고, 간단한 메인 파일을 작성하여 프로젝트 골격을 완성합니다. 이 과정을 따르면 협업이 용이하고 배포가 쉬운 프로젝트 구조를 만들 수 있습니다.
  - type: list
    items:
    - 프로젝트 폴더 생성
    - 가상환경 생성 및 활성화
    - 필요한 패키지 설치
    - requirements.txt 생성
    - .gitignore 설정
  - type: code
    language: bash
    title: 프로젝트 초기화 전체 과정
    description: 새 프로젝트 설정 과정입니다.
    content: |-
      mkdir mywebapp
      cd mywebapp

      python -m venv venv
      venv\Scripts\activate

      pip install flask requests

      pip freeze > requirements.txt

      echo "venv/" > .gitignore
      echo "from flask import Flask" > app.py

- id: practice
  title: 24일차 복습
  subtitle: 가상환경 미션
  blocks:
  - type: text
    content: 24일차에서 배운 가상환경을 복습하는 미션입니다.
  - type: expansion
    title: "미션1: 가상환경 생성"
    code: |-
      mkdir practice
      cd practice
      python -m venv venv
  - type: expansion
    title: "미션2: 가상환경 활성화"
    code: |-
      venv\Scripts\activate
      source venv/bin/activate
  - type: expansion
    title: "미션3: 패키지 설치"
    code: |-
      pip install requests pandas
      pip freeze
  - type: expansion
    title: "미션4: requirements.txt 생성"
    code: |-
      pip freeze > requirements.txt
      cat requirements.txt
  - type: expansion
    title: "미션5: 새 환경에서 복제"
    code: |-
      deactivate
      python -m venv newenv
      newenv\Scripts\activate
      pip install -r requirements.txt
  - type: expansion
    title: "미션6: .gitignore 설정"
    code: |-
      echo "venv/" > .gitignore
      echo "__pycache__/" >> .gitignore
  - type: expansion
    title: "미션7: 가상환경 비활성화"
    code: |-
      deactivate
      which python
