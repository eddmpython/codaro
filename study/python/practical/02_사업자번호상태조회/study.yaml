  localUsage:
    title: "💻 로컬에서 활용하기"
    description: "엑셀 파일에서 사업자번호를 읽어 조회하는 스크립트"
    code: |-
      import pandas as pd
      import requests
      import json

      API_KEY = "발급받은_서비스키"
      API_URL = f"https://api.odcloud.kr/api/nts-businessman/v1/status?serviceKey={API_KEY}&returnType=JSON"

      df = pd.read_excel("거래처목록.xlsx")
      bizNos = df["사업자번호"].astype(str).str.replace(r"[^\d]", "", regex=True).tolist()

      results = []
      for i in range(0, len(bizNos), 100):
          batch = bizNos[i:i+100]
          response = requests.post(API_URL, data=json.dumps({"b_no": batch}), headers={"Content-Type": "application/json"})
          results.extend(response.json()["data"])

      resultDf = pd.DataFrame(results)
      resultDf.to_excel("조회결과.xlsx", index=False)
    tip: "12줄이면 끝! 거래처목록.xlsx의 '사업자번호' 열을 읽어서 조회하고 결과를 저장합니다."

