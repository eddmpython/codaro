  localUsage:
    title: "💻 로컬에서 활용하기"
    description: "웹앱이 아닌 내 컴퓨터에서 사용하는 방법"
    code: |-
      import pandas as pd
      from glob import glob

      excelFiles = glob("data/*.xlsx")
      dfList = [pd.read_excel(f) for f in excelFiles]
      result = pd.concat(dfList, ignore_index=True)
      result.to_excel("merged.xlsx", index=False)
    tip: "6줄이면 끝입니다. data 폴더에 엑셀 파일들을 넣고 실행하면 merged.xlsx가 생성됩니다."

