      subtitle: "SciPy로 해결하는 문제들"

    - type: featureCards
      cards:
        - emoji: "💰"
          title: "투자 포트폴리오 최적화"
          description: "위험 대비 수익 최대화 자산 배분"
        - emoji: "🧪"
