- id: projects_preview
  blocks:
    - type: sectionHeader
      title: "🗺️ 앞으로 배울 내용"
      subtitle: "10개 프로젝트로 마스터하기"

    - type: table
      headers: ["단계", "프로젝트", "배울 내용", "실용 가치"]
      rows:
        - ["입문", "확률분포 탐색기", "norm, uniform, 확률밀도함수", "통계 기초 이해"]
        - ["입문", "A/B 테스트 분석", "ttest_ind, p-value 해석", "마케팅 의사결정"]
        - ["기초", "데이터 보간기", "interp1d, 스플라인", "결측값 처리"]
        - ["기초", "곡선 피팅 마스터", "curve_fit, 비선형 회귀", "성장률 모델링"]
        - ["기초", "정규성 검정기", "shapiro, normaltest", "분석 전제 확인"]
        - ["중급", "포트폴리오 최적화", "minimize, 제약조건", "투자 전략"]
        - ["중급", "신호 필터링", "butter, filtfilt", "센서 데이터 정제"]
        - ["중급", "수치 적분기", "quad, 면적 계산", "물리량 계산"]
        - ["심화", "스펙트럼 분석기", "fft, spectrogram", "주파수 분석"]
        - ["심화", "종합 과학 프로젝트", "모든 모듈 통합", "실전 문제 해결"]

    - type: note
      style: info
      title: "프로젝트 기반 학습"
      content: |-
        각 프로젝트는 실제 문제를 해결합니다. A/B 테스트로 마케팅 결정을 내리고, 포트폴리오 최적화로 투자 전략을 수립하고, 신호 필터링으로 센서 데이터를 정제합니다. 10개 프로젝트를 완료하면 과학/공학 계산의 핵심 도구를 모두 다룰 수 있게 됩니다.

- id: pyodide_note
  blocks:
    - type: sectionHeader
      title: "⚠️ Pyodide 환경 참고사항"
      subtitle: "브라우저에서 실행 시 주의점"

    - type: note
      style: warning
      title: "제한사항"
      content: |-
        SciPy는 Pyodide에서 완벽히 지원됩니다. 다만 초기 로딩 시 약 15-25MB를 다운로드하므로 처음 실행 시 시간이 걸릴 수 있습니다. scipy.sparse의 일부 기능은 제한될 수 있습니다. 대부분의 optimize, stats, interpolate, signal 기능은 정상 작동합니다.

    - type: featureCards
      cards:
        - emoji: "✅"
          title: "정상 작동"
          description: "optimize, stats, interpolate, signal, integrate"
        - emoji: "⚠️"
          title: "주의 필요"
          description: "sparse 일부 기능, 대용량 연산"
        - emoji: "📦"
          title: "설치 방법"
          description: "await micropip.install('scipy')"

- id: installation
  blocks:
    - type: sectionHeader
      title: "📦 설치 및 시작"
      subtitle: "pyodide 환경에서 바로 사용"

    - type: note
      style: info
      title: "브라우저에서 바로 실행"
      content: |-
        이 강의는 marimo pyodide 환경에서 실행됩니다. 별도 설치 없이 브라우저에서 바로 코드를 실행할 수 있습니다. micropip.install()로 scipy를 불러오면 모든 준비가 끝납니다. 로컬 환경에서는 pip install scipy로 설치하면 됩니다.

    - type: featureCards
      cards:
        - emoji: "🌐"
          title: "pyodide 환경"
          description: "브라우저에서 Python 실행"
        - emoji: "📦"
          title: "micropip 설치"
          description: "await micropip.install('scipy')"
        - emoji: "🚀"
          title: "바로 시작"
          description: "from scipy import optimize, stats"

- id: resources
  blocks:
    - type: sectionHeader
      title: "📚 참고 자료"
      subtitle: "더 깊이 공부하고 싶다면"

    - type: links
      items:
