  seo:
    title: "SciPy 입문 - Python 과학 계산의 핵심"
    description: "SciPy로 최적화, 통계검정, 신호처리, 보간법을 시작하세요. NumPy를 확장한 고급 과학 계산 라이브러리입니다."
    keywords: ["scipy", "과학계산", "최적화", "통계검정", "보간", "신호처리"]

sections:
- id: intro
  blocks:
    - type: mainHeader
      emoji: "🔬"
      title: "SciPy??"
      subtitle: "Python 과학 계산의 핵심 라이브러리"

    - type: hero
      emoji: "⚗️"
      title: "NumPy를 확장한 고급 과학 도구"
      subtitle: "수학, 과학, 공학 문제를 해결하는 알고리즘 모음"
      points:
        - emoji: "📈"
          title: "최적화"
        - emoji: "📊"
          title: "통계 검정"
        - emoji: "🔊"
          title: "신호 처리"
        - emoji: "📐"
          title: "수치 적분"

- id: what_is_scipy
  blocks:
    - type: sectionHeader
      title: "🤔 SciPy가 뭔가요?"
      subtitle: "과학 계산을 위한 스위스 군용 칼"

    - type: note
      style: info
      title: "NumPy vs SciPy"
      content: |-
        NumPy는 배열 연산의 기초입니다. 행렬 곱셈, 인덱싱, 기본 통계는 NumPy로 충분합니다. SciPy는 NumPy 위에 구축된 고급 알고리즘 모음입니다. 최적화, 적분, 보간, 신호처리, 통계검정 등 전문적인 과학 계산 기능을 제공합니다. NumPy가 기초 수학이라면, SciPy는 응용 수학입니다.

    - type: featureCards
      cards:
        - emoji: "🎯"
          title: "scipy.optimize"
          description: "함수 최소화, 방정식 풀이, 곡선 피팅"
        - emoji: "📊"
          title: "scipy.stats"
          description: "확률분포, 가설검정, 기술통계"
        - emoji: "🔊"
          title: "scipy.signal"
          description: "필터 설계, FFT, 스펙트럼 분석"
        - emoji: "📐"
          title: "scipy.integrate"
          description: "수치적분, 미분방정식"

- id: why_scipy
  blocks:
    - type: sectionHeader
      title: "🌟 왜 SciPy가 필요한가요?"
      subtitle: "기존 라이브러리와의 차이"

    - type: note
      style: info
      title: "전문 알고리즘의 보고"
      content: |-
        직접 구현하면 수백 줄이 필요한 알고리즘을 한 줄로 호출할 수 있습니다. 최적화 문제에서 minimize() 한 번이면 복잡한 경사하강법을 실행합니다. 통계검정에서 ttest_ind() 한 번이면 t-검정 결과를 얻습니다. FORTRAN과 C로 작성된 검증된 알고리즘을 Python에서 편리하게 사용할 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "⚡"
          title: "검증된 알고리즘"
          description: "수십 년간 검증된 수치해석 코드"
        - emoji: "🚀"
          title: "최적화된 성능"
          description: "C/FORTRAN 기반 고속 연산"
        - emoji: "📚"
          title: "풍부한 문서"
          description: "상세한 API 문서와 예제"
        - emoji: "🔧"
          title: "NumPy 호환"
          description: "ndarray 기반 일관된 인터페이스"

- id: scipy_modules
  blocks:
    - type: sectionHeader
      title: "📦 SciPy 주요 모듈"
      subtitle: "어떤 기능이 있나요?"

    - type: table
      headers: ["모듈", "기능", "대표 함수"]
      rows:
        - ["scipy.optimize", "최적화, 방정식", "minimize, curve_fit, root"]
        - ["scipy.stats", "통계, 확률분포", "ttest_ind, norm, describe"]
        - ["scipy.interpolate", "보간법", "interp1d, griddata"]
        - ["scipy.integrate", "적분, 미분방정식", "quad, odeint"]
        - ["scipy.signal", "신호처리", "butter, filtfilt, spectrogram"]
        - ["scipy.linalg", "선형대수", "solve, eig, svd"]
        - ["scipy.sparse", "희소행렬", "csr_matrix, linalg.spsolve"]
        - ["scipy.spatial", "공간 알고리즘", "distance, KDTree"]

    - type: note
      style: tip
      title: "모듈별 import"
      content: |-
        SciPy는 모듈별로 import합니다. from scipy import optimize처럼 필요한 모듈만 불러옵니다. scipy 전체를 import하면 느리고 메모리를 많이 사용합니다. 각 모듈은 독립적이므로 필요한 것만 선택적으로 사용하세요.

