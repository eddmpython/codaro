      class VotingSystem:
          def __init__(self):
              self.votes = {}

          def vote(self, candidate):
              self.votes[candidate] = self.votes.get(candidate, 0) + 1

          def getWinner(self):
              if not self.votes:
                  return None
              maxVotes = max(self.votes.values())
              for candidate, count in self.votes.items():
                  if count == maxVotes:
                      return candidate

