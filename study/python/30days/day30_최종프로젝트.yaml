    language: "python"
    title: "단어 빈도 분석기"
    description: "텍스트에서 단어 빈도를 분석합니다."
    content: |-
      def analyzeWords(text):
          words = text.lower().split()
          frequency = {}
          for word in words:
              cleaned = word.strip('.,!?')
              if cleaned:
                  frequency[cleaned] = frequency.get(cleaned, 0) + 1
          return frequency

      sampleText = 'hello world hello python world'
      analyzeWords(sampleText)
  - type: "code"
    language: "python"
    title: "최빈 단어 찾기"
    description: "가장 많이 등장하는 단어를 찾습니다."
    content: |-
      def findTopWords(text, n):
          words = text.lower().split()
          freq = {}
          for word in words:
              freq[word] = freq.get(word, 0) + 1
          sorted_items = sorted(freq.items(), key=lambda x: x[1], reverse=True)
          return sorted_items[:n]

      document = 'python is great python is powerful python is easy'
      findTopWords(document, 2)
  - type: "code"
    language: "python"
    title: "문장 통계"
    description: "텍스트의 통계 정보를 계산합니다."
    content: |-
      def textStats(text):
          sentences = text.split('.')
          words = text.split()
          chars = len(text)
          return len(sentences) - 1, len(words), chars

      passage = 'This is a test. Python is amazing. I love coding.'
      textStats(passage)
  - type: "tip"
    content: "텍스트 처리는 웹 크롤링, 데이터 분석, 자연어 처리의 기초입니다."

- id: "data_management"
