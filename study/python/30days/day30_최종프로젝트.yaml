      def evaluate(expression):
          tokens = expression.split()
          stack = []
          for token in tokens:
              if token in ['+', '-', '*', '/']:
                  b = stack.pop()
                  a = stack.pop()
                  if token == '+':
                      stack.append(a + b)
                  elif token == '-':
                      stack.append(a - b)
                  elif token == '*':
                      stack.append(a * b)
                  elif token == '/':
                      stack.append(a / b)
              else:
                  stack.append(float(token))
          return stack[0]

      evaluate('3 4 + 2 *')

