    title: "은행 계좌"
    description: "입금과 출금이 가능한 계좌를 만듭니다."
    content: |-
      class BankAccount:
          def __init__(self, owner, balance=0):
              self.owner = owner
              self.balance = balance

          def deposit(self, amount):
              if amount > 0:
                  self.balance = self.balance + amount
                  return True
              return False

          def withdraw(self, amount):
              if 0 < amount <= self.balance:
                  self.balance = self.balance - amount
                  return True
              return False

      account = BankAccount('Alice', 1000)
      account.deposit(500)
      account.withdraw(300)
      account.balance
  - type: "code"
    language: "python"
    title: "도서관 시스템"
    description: "책 대출과 반납을 관리합니다."
    content: |-
      class Library:
          def __init__(self):
              self.books = {}
              self.borrowed = {}

          def addBook(self, title, copies):
              self.books[title] = copies

          def borrow(self, user, title):
              if self.books.get(title, 0) > 0:
                  self.books[title] = self.books[title] - 1
                  if user not in self.borrowed:
                      self.borrowed[user] = []
                  self.borrowed[user].append(title)
                  return True
              return False

          def returnBook(self, user, title):
              if user in self.borrowed and title in self.borrowed[user]:
                  self.borrowed[user].remove(title)
                  self.books[title] = self.books[title] + 1
                  return True
              return False

      lib = Library()
      lib.addBook('Python Guide', 3)
      lib.borrow('Bob', 'Python Guide')
      lib.books['Python Guide']
  - type: "code"
    language: "python"
    title: "쇼핑 카트"
    description: "장바구니에 상품을 추가하고 계산합니다."
    content: |-
      class ShoppingCart:
          def __init__(self):
              self.items = {}

          def add(self, item, price, quantity=1):
              if item in self.items:
                  self.items[item]['quantity'] = self.items[item]['quantity'] + quantity
              else:
                  self.items[item] = {'price': price, 'quantity': quantity}

          def getTotal(self):
              total = 0
              for item in self.items.values():
                  total = total + item['price'] * item['quantity']
              return total

      cart = ShoppingCart()
      cart.add('apple', 1.5, 3)
      cart.add('banana', 0.8, 5)
      cart.getTotal()
  - type: "tip"
    content: "클래스는 관련된 데이터와 기능을 하나로 묶어 관리합니다."

