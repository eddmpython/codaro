      def playRPS(player1, player2):
          wins = {
              'rock': 'scissors',
              'scissors': 'paper',
              'paper': 'rock'
          }
          if player1 == player2:
              return 'draw'
          elif wins[player1] == player2:
              return 'player1'
          else:
              return 'player2'

