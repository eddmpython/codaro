    language: "python"
    title: "CSV 읽기"
    description: "CSV 형식의 데이터를 파싱합니다."
    content: |-
      def parseCSV(content):
          lines = content.strip().split('\n')
          header = lines[0].split(',')
          data = []
          for line in lines[1:]:
              values = line.split(',')
              row = dict(zip(header, values))
              data.append(row)
          return data

      csvContent = 'name,age\nAlice,25\nBob,30'
      parseCSV(csvContent)
  - type: "code"
    language: "python"
    title: "로그 생성"
    description: "로그 메시지를 생성합니다."
    content: |-
      import time

      def createLog(level, message):
          timestamp = time.strftime('%Y-%m-%d %H:%M:%S')
          return f'[{timestamp}] {level}: {message}'

      createLog('INFO', 'Application started')
  - type: "code"
    language: "python"
    title: "설정 파일 파싱"
    description: "key=value 형식의 설정을 파싱합니다."
    content: |-
      def parseConfig(text):
          config = {}
          for line in text.strip().split('\n'):
              if '=' in line:
                  key, value = line.split('=', 1)
                  config[key.strip()] = value.strip()
          return config

      configText = 'host=localhost\nport=8080\ndebug=true'
      parseConfig(configText)
  - type: "tip"
