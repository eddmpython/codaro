    - "세트로 중복 제거"
    - "클래스로 구조화"
  - type: "code"
    language: "python"
    title: "학생 성적 관리"
    description: "학생들의 성적을 관리합니다."
    content: |-
      class GradeBook:
          def __init__(self):
              self.students = {}

          def addScore(self, name, score):
              if name not in self.students:
                  self.students[name] = []
              self.students[name].append(score)

          def getAverage(self, name):
              if name in self.students:
                  scores = self.students[name]
                  return sum(scores) / len(scores)
              return 0

      gb = GradeBook()
      gb.addScore('Alice', 90)
      gb.addScore('Alice', 85)
      gb.getAverage('Alice')
  - type: "code"
    language: "python"
    title: "재고 관리 시스템"
    description: "물품의 재고를 관리합니다."
    content: |-
      class Inventory:
          def __init__(self):
              self.items = {}

          def add(self, item, quantity):
              self.items[item] = self.items.get(item, 0) + quantity

          def remove(self, item, quantity):
              if item in self.items:
                  self.items[item] = max(0, self.items[item] - quantity)

          def check(self, item):
              return self.items.get(item, 0)

      inv = Inventory()
      inv.add('apple', 10)
      inv.remove('apple', 3)
      inv.check('apple')
  - type: "code"
    language: "python"
    title: "연락처 관리"
    description: "연락처를 저장하고 검색합니다."
    content: |-
      class ContactBook:
          def __init__(self):
              self.contacts = {}

          def add(self, name, phone):
              self.contacts[name] = phone

          def find(self, name):
              return self.contacts.get(name, 'Not found')

          def delete(self, name):
              if name in self.contacts:
                  del self.contacts[name]
                  return True
              return False

      cb = ContactBook()
      cb.add('John', '123-4567')
      cb.find('John')
  - type: "tip"
    content: "적절한 자료구조를 선택하면 프로그램의 효율성이 크게 향상됩니다."

