  - id: "step3Usage"
    title: "3단계: 실제 사용해보기"
    blocks:
      - type: sectionHeader
        emoji: "🚀"
        title: "3단계: 실제 사용해보기"
        subtitle: "이제 설치된 xlwings Lite를 실제로 사용해보겠습니다!"
        color: "cyan"

      - type: stepCard
        stepNumber: "STEP 3-1"
        title: "Hello World 샘플 실행하기"
        description: "Excel 우상단의 xlwings Lite 버튼을 클릭해서 편집기를 열고, 미리 작성된 Hello World 샘플을 실행해보겠습니다!"
        imageUrl: "python/excel/xlwingslite실행1.png"
        tips:
          - "📊 Excel 우상단의 'xlwings Lite' 버튼을 클릭하세요"
          - "📝 우측에 편집기가 열리고 미리 작성된 샘플코드가 보입니다"
          - "🔘 'hello_world' 버튼을 클릭하세요"
          - "⚡ A1 셀에 'Hello World!'가 자동으로 입력됩니다"
          - "드랍다운으로 다른 함수도 실행해보세요!"
        color: "green"

      - type: stepCard
        stepNumber: "STEP 3-2"
        title: "UDF로 Excel 함수 만들기"
        description: "Python으로 만든 함수를 Excel에서 일반 함수처럼 사용해보겠습니다. hello 함수를 만들어서 Excel 셀에서 직접 호출해보세요!"
        imageUrl: "python/excel/xlwingslite실행2.png"
        tips:
          - "🔧 UDF(User Defined Function): Python으로 만든 사용자 정의 함수"
          - "📝 편집기에서 hello 함수 코드를 확인하세요"
          - "📊 Excel 셀에 '=hello(\"이름\")' 형태로 입력할 수 있어요"
          - "⚡ Python 함수가 Excel 내장 함수처럼 동작합니다!"
        color: "green"

      - type: warning
        title: "💡 UDF란 무엇인가요?"
        description: |
          UDF(User Defined Function)는 사용자가 직접 만든 함수를 Excel에서 사용할 수 있게 해주는 기능입니다.

          • Python으로 복잡한 계산 로직을 작성
          • Excel에서 =함수명() 형태로 간편하게 호출
          • 반복되는 계산 작업을 함수로 만들어 재사용
          • VBA 대신 Python으로 Excel 기능 확장
        warningType: "info"

  - id: "step4Technical"
    title: "4단계: 기술적 이해"
    blocks:
      - type: sectionHeader
        emoji: "🔧"
        title: "4단계: 기술적 이해"
        subtitle: "xlwings Lite가 어떻게 작동하는지 더 깊이 알아보세요!"
        color: "indigo"

      - type: info
        title: "🤔 WASM과 Pyodide가 뭔가요?"
        htmlContent: |
          <p class="mb-4">xlwings Lite는 최신 웹 기술을 사용해서 Excel 내부에서 Python을 실행합니다.</p>
          <ul class="space-y-3 mb-4">
            <li>🔧 <strong>WebAssembly (WASM):</strong> 브라우저에서 네이티브 수준의 성능으로 다양한 언어를 실행하는 기술</li>
            <li>🐍 <strong>Pyodide:</strong> CPython을 WebAssembly로 컴파일한 Python 배포판. 브라우저에서 완전한 Python 환경을 제공</li>
            <li>📱 <strong>Office.js:</strong> Excel 내부에 웹브라우저를 임베드하는 Microsoft의 애드인 플랫폼</li>
            <li>🔗 <strong>연결 구조:</strong> Python(Pyodide) ↔ JavaScript ↔ Office.js ↔ Excel</li>
          </ul>
          <div class="bg-gray-100 p-4 rounded-lg">
            <p class="font-bold text-indigo-600">Excel이 내부적으로 웹브라우저를 실행하고, 그 브라우저에서 Python이 동작합니다!</p>
          </div>
        color: "indigo"

      - type: warning
        title: "🤷‍♂️ Excel과 Python이 어떻게 통신하나요?"
        htmlContent: |
          핵심 동작 원리를 쉽게 설명드릴게요!<br/><br/>
          1️⃣ Excel 내부에 브라우저 창이 열립니다 (Office.js 애드인)<br/>
          2️⃣ 브라우저에서 Pyodide가 Python 환경을 제공합니다<br/>
          3️⃣ Python 코드가 JavaScript API를 통해 Excel과 통신합니다<br/>
          4️⃣ 모든 작업이 로컬 컴퓨터에서 실행됩니다 (클라우드 X)<br/><br/>
          📊 결과: Python 코드로 Excel 셀 읽기/쓰기, 시트 추가, 서식 변경 등이 가능!<br/>
          🔒 보안: 데이터가 외부로 전송되지 않아 완전히 안전합니다.
        warningType: "info"

  - id: "limitations"
    title: "xlwings Lite 제약사항"
    blocks:
      - type: sectionHeader
        emoji: "⚠️"
        title: "xlwings Lite 제약사항"
        subtitle: "사용하기 전에 알아두면 좋은 제한사항들"
        color: "yellow"

      - type: warning
        title: "📋 시스템 요구사항"
        htmlContent: |
          • Excel 365 또는 Excel 2021 이상 버전 필수<br>
          • Excel 2019, 2016 등 구버전에서는 작동하지 않음<br>
          • 최신 웹브라우저 필요 (Internet Explorer 불가)<br>
          • 초기 로딩 시 인터넷 연결 필요
        warningType: "warning"

      - type: warning
        title: "🔧 기능 제한사항"
        htmlContent: |
          <strong>💻 WebAssembly 환경 제약:</strong><br>
          • 일부 Python 패키지는 WASM에서 지원되지 않음 (PyTorch, TensorFlow 등)<br>
          • 네이티브 바이너리 의존성이 있는 패키지는 제한적<br>
          • 메모리 사용량이 브라우저 제한을 받음<br><br>
          <strong>🌐 웹 환경 보안 제약:</strong><br>
          • 로컬 파일 시스템에 직접 접근 불가<br>
          • 데이터베이스 직접 연결 불가 (웹 API를 통해서만 가능)<br>
          • CORS가 설정된 웹 API만 호출 가능<br><br>
          <strong>📊 Excel 호환성:</strong><br>
          • VBA 매크로와는 별개의 환경<br>
          • Office.js API 범위 내에서만 Excel 제어 가능<br>
          • 일부 고급 Excel 기능은 아직 미지원
        warningType: "info"

