      - type: info
        title: "🚀 xlwings Lite 핵심 정리"
        htmlContent: |
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-gradient-to-br from-cyan-50 to-blue-50 p-6 rounded-xl border border-cyan-200">
              <h4 class="font-bold text-cyan-700 mb-4 text-lg flex items-center">
                <span class="mr-2">💡</span>
                간단히 말하면?
              </h4>
              <p class="text-gray-700 leading-relaxed">
                Excel에 Python 편집기가 내장된 것처럼 사용할 수 있는 무료 도구입니다.
                <strong>Python 설치 없이</strong> 브라우저에서 바로 Python 코드를 작성하고 실행할 수 있어요!
              </p>
            </div>
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 p-6 rounded-xl border border-green-200">
              <h4 class="font-bold text-green-700 mb-4 text-lg flex items-center">
                <span class="mr-2">⚡</span>
                어떻게 작동하나요?
              </h4>
              <p class="text-gray-700 leading-relaxed">
                WASM(WebAssembly) 기술로 브라우저에서 Python을 실행합니다.
                Office.js API를 통해 Excel과 직접 통신하여 <strong>셀 읽기/쓰기, 차트 생성, 데이터 분석</strong> 등이 가능해요!
              </p>
