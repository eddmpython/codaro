meta:
  id: polars_03
  title: 게임판매분석
  order: 3
  category: polars
  difficulty: "⭐⭐"
  badge: 기초
  dataUrl: https://raw.githubusercontent.com/raghav-19/Video-Games-Sales-Data-Analysis/master/vgsales.csv
  tags: ["vgsales", "select", "filter", "group_by", "agg", "alias", "head"]
  seo:
    title: "Polars 다중 그룹 집계 - 게임 판매 분석"
    description: "Polars로 비디오 게임 판매 데이터를 분석합니다. 다중 열 선택, 복합 조건 필터, agg로 여러 집계 한번에, 다중 그룹 group_by를 실습합니다."
    keywords: ["polars group_by", "polars agg", "polars alias", "다중 그룹", "게임 판매"]

intro:
  emoji: "🎮"
  goal: 플랫폼과 장르별로 게임 판매량을 분석하고 시각화합니다.
  description: 다중 열 선택, 복합 조건 필터, 다중 그룹 집계를 배웁니다. 이전에 배운 select, filter, group_by를 복습하면서 새로운 기능을 추가합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: 비디오 게임 판매 데이터
  blocks:
  - type: text
    content: VGChartz에서 수집한 비디오 게임 판매 데이터입니다. 1980년대부터 2020년까지 16,000개 이상의 게임 판매 기록이 담겨 있으며, 플랫폼(게임기), 장르, 퍼블리셔, 연도, 지역별 판매량 등 다양한 정보를 포함합니다. 이 데이터로 다중 컬럼 선택, 복합 조건 필터링, 다중 그룹 집계 등 중급 기술을 배웁니다. 실제 비즈니스 분석에서 자주 사용하는 패턴들입니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: Polars로 CSV 읽기
    content: |-
      import polars as pl

      url = "https://raw.githubusercontent.com/raghav-19/Video-Games-Sales-Data-Analysis/master/vgsales.csv"
      games = pl.read_csv(url)
      games.shape
  - type: tip
    content: "shape는 (행 수, 열 수)를 반환합니다. 이 데이터는 16,000개 이상의 게임 기록이 있어 대용량 데이터 분석 연습에 적합합니다. Polars는 이런 규모의 데이터도 빠르게 처리합니다."

- id: step2_schema
  title: 2단계. 데이터 구조 확인
  subtitle: 컬럼과 타입
  blocks:
  - type: text
    content: Platform은 게임기, Genre는 장르, NA_Sales/EU_Sales/JP_Sales/Global_Sales는 지역별 판매량(백만 단위)입니다. 예를 들어 Global_Sales가 10이면 1000만 장이 판매된 것입니다. 이 데이터셋에는 16,000개 이상의 게임이 포함되어 있어 다양한 분석이 가능합니다.
  - type: code
    language: python
    title: 스키마 확인
    description: 컬럼과 데이터 타입
    content: |-
      games.schema

- id: step3_head
  title: 3단계. 미리보기
  subtitle: 상위 데이터 확인
  blocks:
  - type: text
    content: head()로 상위 N개 행을 확인합니다. 데이터가 Rank(순위) 순으로 정렬되어 있어 가장 많이 팔린 게임들이 상위에 위치합니다. Wii Sports, Super Mario Bros 등 역대급 히트작들을 볼 수 있습니다.
  - type: code
    language: python
    title: 상위 5개
    description: head로 미리보기
    content: |-
      games.head(5)
  - type: tip
    content: head(N)은 상위 N개 행만 보여줍니다. 괄호 안의 숫자를 바꿔서 원하는 개수를 볼 수 있습니다.

- id: step4_select_multi
  title: 4단계. 다중 열 선택
  subtitle: 여러 컬럼 한번에
  blocks:
  - type: text
    content: 이전 프로젝트에서는 pl.col()을 하나씩 나열했지만, 더 간결한 방법이 있습니다. pl.col("컬럼1", "컬럼2", "컬럼3")처럼 쉼표로 구분하여 여러 컬럼을 한 번에 선택할 수 있습니다. 이는 Polars의 강력한 기능으로, 코드가 짧아지고 가독성이 좋아집니다. 분석에 필요한 핵심 컬럼만 골라서 보면 데이터를 이해하기 쉽습니다.
  - type: code
    language: python
    title: 다중 열 선택
    description: 이름, 플랫폼, 장르, 글로벌 판매량
    content: |-
      games.select(
          pl.col("Name", "Platform", "Genre", "Global_Sales")
      ).head(10)
  - type: tip
    content: "pl.col(\"A\", \"B\", \"C\")는 여러 컬럼을 한 번에 선택하는 축약 문법입니다. pl.col(\"A\"), pl.col(\"B\"), pl.col(\"C\")를 나열한 것과 동일하지만 훨씬 간결합니다. 컬럼이 많을 때 매우 유용합니다."

- id: step5_filter_basic
  title: 5단계. 기본 필터링
  subtitle: 조건에 맞는 행 선택
  blocks:
  - type: text
    content: 특정 플랫폼 게임만 골라봅시다. filter() 함수에 조건을 전달하면 해당 조건을 만족하는 행만 선택됩니다. PS4는 PlayStation 4의 약자로, 2013년 출시된 소니의 게임기입니다.
  - type: code
    language: python
    title: PS4 게임만
    description: filter로 조건 필터링
    content: |-
      games.filter(
          pl.col("Platform") == "PS4"
      ).head(10)

- id: step6_filter_logic
  title: 6단계. 복합 조건 필터
  subtitle: 논리 연산자 &, |
  blocks:
  - type: text
    content: 실전에서는 하나의 조건만으로는 부족한 경우가 많습니다. "PS4 게임 중에서 액션 장르만"처럼 여러 조건을 동시에 만족하는 데이터를 찾아야 할 때가 있습니다. &(AND)는 모든 조건을 만족해야 하고, |(OR)은 하나라도 만족하면 됩니다. Python의 연산자 우선순위 때문에 각 조건을 괄호로 감싸야 합니다. 이것은 Polars와 pandas 공통입니다.
  - type: code
    language: python
    title: PS4 액션 게임
    description: 두 조건을 모두 만족
    content: |-
      games.filter(
          (pl.col("Platform") == "PS4") & (pl.col("Genre") == "Action")
      ).head(10)
  - type: tip
    content: "& 는 AND(모두 만족), | 는 OR(하나라도 만족)입니다. Python의 and/or이 아닌 &/|를 사용하며, 각 조건을 반드시 괄호()로 감싸야 합니다. (조건1) & (조건2) & (조건3)처럼 여러 조건을 연결할 수 있습니다."

- id: step7_filter_or
  title: 7단계. OR 조건
  subtitle: 여러 값 중 하나
  blocks:
  - type: text
    content: 여러 플랫폼을 한번에 필터링해봅시다. OR 연산자(|)를 사용하면 여러 조건 중 하나라도 만족하는 행을 선택합니다. PS4와 XOne(Xbox One)은 같은 세대의 경쟁 게임기로, 비교 분석에 자주 사용됩니다.
  - type: code
    language: python
    title: PS4 또는 XOne
    description: 하나라도 만족하면 선택
    content: |-
      games.filter(
          (pl.col("Platform") == "PS4") | (pl.col("Platform") == "XOne")
      ).head(10)

- id: step8_groupby_basic
  title: 8단계. 기본 그룹 집계
  subtitle: 플랫폼별 판매량
  blocks:
  - type: text
    content: 플랫폼별로 총 판매량을 계산합니다. group_by는 같은 값을 가진 행들을 그룹으로 묶고, agg는 그룹별로 집계 함수를 적용합니다. sum()은 그룹 내 모든 값을 더하여 총합을 계산합니다.
  - type: code
    language: python
    title: 플랫폼별 총 판매량
    description: group_by + agg
    content: |-
      games.group_by("Platform").agg(
          pl.col("Global_Sales").sum()
      ).sort("Global_Sales", descending=True).head(10)

- id: step9_alias
  title: 9단계. 별칭 붙이기
  subtitle: alias로 컬럼명 변경
  blocks:
  - type: text
    content: 집계 결과에 의미 있는 이름을 붙이려면 alias()를 사용합니다. alias()를 사용하지 않으면 컬럼명이 "Global_Sales"로 유지되어 원본인지 합계인지 구분하기 어렵습니다. "totalSales"처럼 명확한 이름을 붙이면 결과를 이해하기 쉽습니다.
  - type: code
    language: python
    title: 별칭 사용
    description: alias로 컬럼명 지정
    content: |-
      games.group_by("Platform").agg(
          pl.col("Global_Sales").sum().alias("totalSales")
      ).sort("totalSales", descending=True).head(10)
  - type: tip
    content: alias("새이름")은 집계 결과 컬럼에 원하는 이름을 붙입니다. 나중에 시각화할 때 더 읽기 쉬운 이름을 쓸 수 있습니다.

- id: step10_agg_multi
  title: 10단계. 여러 집계 한번에
  subtitle: agg에 리스트 전달
  blocks:
  - type: text
    content: agg()에 여러 집계를 리스트로 전달하면 한번에 여러 통계를 구할 수 있습니다. sum(총합), mean(평균), count(개수) 등 다양한 집계 함수를 조합하면 데이터의 여러 측면을 동시에 파악할 수 있습니다. 각 집계에 alias()로 이름을 붙여 구분합니다.
  - type: code
    language: python
    title: 여러 통계 한번에
    description: 합계, 평균, 개수
    content: |-
      games.group_by("Platform").agg([
          pl.col("Global_Sales").sum().alias("totalSales"),
          pl.col("Global_Sales").mean().alias("avgSales"),
          pl.col("Name").count().alias("gameCount")
      ]).sort("totalSales", descending=True).head(10)
  - type: tip
    content: agg([...]) 안에 여러 집계를 나열합니다. 각 집계에 alias를 붙여서 결과를 구분하세요.

- id: step11_multi_group
  title: 11단계. 다중 그룹
  subtitle: 플랫폼 + 장르
  blocks:
  - type: text
    content: 이제 이 프로젝트의 핵심 개념인 다중 그룹 집계를 배웁니다. group_by(["컬럼1", "컬럼2"])처럼 리스트로 여러 컬럼을 전달하면, 그 조합별로 그룹을 만듭니다. 예를 들어 "PS2의 Action", "PS2의 Sports", "Xbox의 Action" 등 플랫폼과 장르의 모든 조합이 각각의 그룹이 됩니다. 이렇게 하면 "어떤 플랫폼에서 어떤 장르가 잘 팔렸는지" 같은 세밀한 분석이 가능합니다. 실제 비즈니스에서 매우 자주 사용하는 기법입니다.
  - type: code
    language: python
    title: 플랫폼 + 장르별 집계
    description: 다중 그룹으로 세분화
    content: |-
      platformGenre = games.group_by(["Platform", "Genre"]).agg([
          pl.col("Global_Sales").sum().alias("totalSales"),
          pl.col("Name").count().alias("gameCount")
      ]).sort("totalSales", descending=True)
      platformGenre.head(15)
  - type: tip
    content: "group_by([\"A\", \"B\"])는 A와 B 컬럼의 모든 조합별로 그룹을 만듭니다. [\"연도\", \"지역\", \"카테고리\"]처럼 3개 이상도 가능합니다. 다차원 분석의 핵심 기법으로, SQL의 GROUP BY 여러 컬럼과 동일한 개념입니다."

- id: step12_genre_analysis
  title: 12단계. 장르별 분석
  subtitle: 인기 장르 찾기
  blocks:
  - type: text
    content: 장르별 판매량을 분석해서 어떤 장르가 인기 있는지 확인합니다. Action, Sports, Shooter 등 장르별로 그룹화하여 총 판매량과 게임 수를 계산합니다. 어떤 장르가 가장 많이 팔렸고, 어떤 장르에 게임이 가장 많은지 비교할 수 있습니다.
  - type: code
    language: python
    title: 장르별 총 판매량
    description: 인기 장르 TOP 10
    content: |-
      genreSales = games.group_by("Genre").agg([
          pl.col("Global_Sales").sum().alias("totalSales"),
          pl.col("Name").count().alias("gameCount")
      ]).sort("totalSales", descending=True)
      genreSales

- id: step13_top_platform_genre
  title: 13단계. TOP 조합 분석
  subtitle: 가장 성공한 플랫폼+장르
  blocks:
  - type: text
    content: 플랫폼과 장르 조합 중 가장 판매량이 높은 조합을 찾습니다. 예를 들어 "PS2의 Action 게임"이 얼마나 팔렸는지 알 수 있습니다. 이런 다차원 분석은 마케팅 전략 수립에 중요한 인사이트를 제공합니다.
  - type: code
    language: python
    title: TOP 10 플랫폼+장르 조합
    description: 다중 그룹 상위 10개
    content: |-
      topCombo = games.group_by(["Platform", "Genre"]).agg(
          pl.col("Global_Sales").sum().alias("totalSales")
      ).sort("totalSales", descending=True).head(10)
      topCombo

- id: step14_pivot_analysis
  title: 14단계. 피벗 분석
  subtitle: 플랫폼 x 장르 매트릭스
  blocks:
  - type: text
    content: 주요 플랫폼과 장르의 판매량을 피벗 테이블로 확인합니다. is_in()으로 상위 플랫폼만 필터링한 후 다중 그룹 집계를 수행합니다. 이렇게 하면 핵심 데이터에 집중하여 분석할 수 있습니다.
  - type: code
    language: python
    title: 플랫폼 x 장르 피벗
    description: 상위 플랫폼/장르 조합
    content: |-
      topPlatforms = ["PS2", "X360", "PS3", "Wii", "DS", "PS4"]
      heatData = games.filter(
          pl.col("Platform").is_in(topPlatforms)
      ).group_by(["Platform", "Genre"]).agg(
          pl.col("Global_Sales").sum().alias("totalSales")
      )
      heatData.sort("totalSales", descending=True).head(20)

- id: practice
  title: 실습
  subtitle: 게임 판매 분석 프로젝트
  blocks:
  - type: text
    content: 게임 분석가가 되어 판매 데이터를 분석해봅시다. 다중 열 선택, 복합 조건 필터, 다중 그룹 집계를 모두 활용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 2010년 이후 액션/스포츠 게임의 퍼블리셔별 판매량"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        vgUrl = "https://raw.githubusercontent.com/raghav-19/Video-Games-Sales-Data-Analysis/master/vgsales.csv"
        vgSales = pl.read_csv(vgUrl)
    - type: code
      title: "필터링 및 집계"
      content: |-
        pubStats = vgSales.filter(
            (pl.col("Year") >= 2010) &
            ((pl.col("Genre") == "Action") | (pl.col("Genre") == "Sports"))
        ).group_by("Publisher").agg(
            pl.col("Global_Sales").sum().alias("totalSales"),
            pl.col("Name").count().alias("gameCount")
        ).sort("totalSales", descending=True).head(10)
        pubStats
  - type: expansion
    title: "미션2: 플랫폼별 지역 판매 비중 분석"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        salesUrl = "https://raw.githubusercontent.com/raghav-19/Video-Games-Sales-Data-Analysis/master/vgsales.csv"
        gameSales = pl.read_csv(salesUrl)
    - type: code
      title: "플랫폼별 지역 판매 집계"
      content: |-
        regionStats = gameSales.group_by("Platform").agg([
            pl.col("NA_Sales").sum().alias("naSales"),
            pl.col("EU_Sales").sum().alias("euSales"),
            pl.col("JP_Sales").sum().alias("jpSales"),
            pl.col("Global_Sales").sum().alias("globalSales")
        ]).with_columns(
            (pl.col("naSales") / pl.col("globalSales") * 100).round(1).alias("naRatio"),
            (pl.col("jpSales") / pl.col("globalSales") * 100).round(1).alias("jpRatio")
        ).sort("globalSales", descending=True).head(10)
        regionStats

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 다중 그룹 집계와 복합 조건 필터를 마스터했습니다.
  - type: list
    items:
    - 'pl.col("a", "b", "c") - 다중 열 선택'
    - "(조건1) & (조건2) - AND 조건"
    - "(조건1) | (조건2) - OR 조건"
    - '.alias("이름") - 결과 컬럼에 별칭 붙이기'
    - 'group_by(["컬럼1", "컬럼2"]) - 다중 그룹'
    - "agg([집계1, 집계2]) - 여러 집계 한번에"
    - "head(N) - 상위 N개 행만"
  - type: text
    content: 다음 시간에는 주식 데이터로 윈도우 함수(rolling_mean, shift, cum_sum)를 배웁니다.
