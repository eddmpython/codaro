meta:
  id: polars_04
  title: 주식데이터분석
  order: 4
  category: polars
  difficulty: "⭐⭐"
  badge: 기초
  dataUrl: https://raw.githubusercontent.com/plotly/datasets/master/finance-charts-apple.csv
  tags: ["주식", "이동평균", "수익률", "rolling", "shift", "cum_sum"]
  seo:
    title: "Polars 주식 데이터 분석 - 일일 수익률과 이동평균 계산"
    description: "기술주 시세 데이터로 일일 수익률과 이동평균을 계산합니다. cast, shift, rolling_mean, cum_sum 등 윈도우 함수를 배웁니다."
    keywords: ["Polars", "주식 분석", "이동평균", "수익률", "rolling_mean", "shift", "cum_sum"]

intro:
  emoji: "📈"
  goal: 주식 시세 데이터에서 일일 수익률과 20일 이동평균을 계산합니다.
  description: 기술주 데이터로 금융 분석의 기초를 배웁니다. shift로 전일 종가를 참조하고, rolling_mean으로 이동평균을 계산하며, cum_sum으로 누적 수익률을 구합니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: Apple 주식 시세 데이터
  blocks:
  - type: text
    content: Apple 주식의 일별 시세 데이터를 분석합니다. 주식 데이터는 시계열(time series) 데이터의 대표적인 예로, 날짜 순서가 중요합니다. 이번 프로젝트에서는 윈도우 함수(window function)를 배웁니다. 윈도우 함수는 이전 행이나 다음 행을 참조하여 계산하는 강력한 기능으로, shift(이전 값 참조), rolling_mean(이동평균), cum_sum(누적합계) 등이 있습니다. 주식 분석의 핵심 지표들을 직접 계산해봅니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: Apple 주식 일별 시세
    content: |-
      import polars as pl

      url = "https://raw.githubusercontent.com/plotly/datasets/master/finance-charts-apple.csv"
      df = pl.read_csv(url)
      df.shape
  - type: tip
    content: "주식 데이터는 시계열 분석의 대표적인 예입니다. Polars는 시계열 데이터 처리에 특화되어 있어 이동평균, 수익률 계산 등이 매우 빠릅니다. pandas보다 10배 이상 빠른 성능을 보입니다."

- id: step2_head
  title: 2단계. 데이터 미리보기
  subtitle: 구조 파악
  blocks:
  - type: text
    content: Date, AAPL.Open, AAPL.High, AAPL.Low, AAPL.Close, AAPL.Volume 등의 컬럼이 있습니다. AAPL은 Apple의 주식 티커(코드)이며, Open(시가), High(고가), Low(저가), Close(종가), Volume(거래량)은 주식 데이터의 기본 구성 요소입니다.
  - type: code
    language: python
    title: 미리보기
    description: 처음 5행
    content: |-
      df.head()

- id: step3_select
  title: 3단계. 필요한 컬럼 선택
  subtitle: 날짜와 종가만
  blocks:
  - type: text
    content: 분석에 필요한 날짜(Date)와 종가(AAPL.Close)만 선택합니다. 종가는 하루 중 마지막 거래 가격으로, 주식 분석에서 가장 많이 사용되는 지표입니다. alias()로 컬럼명을 간단하게 바꾸면 이후 코드가 깔끔해집니다.
  - type: code
    language: python
    title: 컬럼 선택 및 이름 변경
    description: date, close 컬럼만 사용
    content: |-
      base = df.select([
          pl.col("Date").alias("date"),
          pl.col("AAPL.Close").alias("close")
      ])
      base.head()

- id: step4_datetime
  title: 4단계. 날짜 타입 변환
  subtitle: 문자열을 날짜로
  blocks:
  - type: text
    content: date 컬럼이 문자열이면 날짜 함수를 사용할 수 없습니다. str.to_date()로 Date 타입으로 변환해야 dt.year(), dt.month() 같은 날짜 함수를 사용할 수 있습니다. "%Y-%m-%d"는 연도-월-일 형식을 의미합니다.
  - type: code
    language: python
    title: 날짜 타입 변환
    description: 문자열에서 Date 타입으로
    content: |-
      dated = base.with_columns(
          pl.col("date").str.to_date("%Y-%m-%d")
      )
      dated.head()

- id: step5_dt
  title: 5단계. 날짜 정보 추출
  subtitle: 연도, 월 추출
  blocks:
  - type: text
    content: dt.year(), dt.month()로 날짜에서 연도와 월을 추출합니다. 연도와 월 컬럼을 추가하면 월별/연도별 그룹 분석이 가능해집니다. 이전 프로젝트에서 배운 dt accessor를 다시 한번 복습합니다.
  - type: code
    language: python
    title: 연도, 월 추출
    description: dt accessor 사용
    content: |-
      withYearMonth = dated.with_columns([
          pl.col("date").dt.year().alias("year"),
          pl.col("date").dt.month().alias("month")
      ])
      withYearMonth.head()

- id: step6_cast
  title: 6단계. 타입 변환
  subtitle: cast()로 형변환
  blocks:
  - type: text
    content: close 컬럼이 Float64인지 확인합니다. 계산을 위해 명시적으로 Float64로 변환하면 타입 불일치로 인한 오류를 예방할 수 있습니다. cast()는 데이터 타입을 변환하는 함수입니다.
  - type: note
    style: tip
    title: cast() 핵심
    content: "cast(pl.Float64)는 컬럼 타입을 Float64로 변환합니다. 수치 계산 전에 타입을 맞춰두면 오류를 방지할 수 있습니다."
  - type: code
    language: python
    title: 타입 확인 및 변환
    description: Float64로 명시적 변환
    content: |-
      casted = withYearMonth.with_columns(
          pl.col("close").cast(pl.Float64)
      )
      casted.schema

- id: step7_shift
  title: 7단계. 전일 종가 계산
  subtitle: shift()로 이전 값 참조
  blocks:
  - type: text
    content: 주식 수익률을 계산하려면 "오늘 가격"과 "어제 가격"을 비교해야 합니다. 하지만 한 행에는 오늘 가격만 있고 어제 가격은 없습니다. shift() 함수는 이 문제를 해결합니다. shift(1)은 전체 컬럼을 한 행 아래로 밀어서, 각 행에서 이전 행의 값을 참조할 수 있게 만듭니다. 첫 번째 행은 이전 값이 없으므로 null이 됩니다. 이것은 시계열 분석의 핵심 기법입니다.
  - type: code
    language: python
    title: 전일 종가 추가
    description: shift(1)로 전일 값 참조
    content: |-
      withPrev = casted.with_columns(
          pl.col("close").shift(1).alias("prevClose")
      )
      withPrev.head(10)
  - type: tip
    content: "shift(1)은 모든 값을 한 행 아래로 이동시킵니다. shift(2)는 2행 아래로, shift(-1)은 한 행 위로(다음 값 참조) 이동합니다. 시계열 데이터에서 전일/전월/전년 값을 참조할 때 필수적인 함수입니다. pandas의 shift()와 동일하지만 Polars가 훨씬 빠릅니다."

- id: step8_return
  title: 8단계. 일일 수익률 계산
  subtitle: (오늘 - 어제) / 어제
  blocks:
  - type: text
    content: 일일 수익률 = (당일 종가 - 전일 종가) / 전일 종가로 계산합니다. 100을 곱해 백분율로 표시하면 "2.5%"처럼 직관적으로 이해할 수 있습니다. 이 공식은 주식 분석의 가장 기본적인 지표입니다.
  - type: code
    language: python
    title: 일일 수익률
    description: 전일 대비 변화율
    content: |-
      withReturn = withPrev.with_columns(
          ((pl.col("close") - pl.col("prevClose")) / pl.col("prevClose") * 100).alias("dailyReturn")
      )
      withReturn.head(10)

- id: step9_rolling
  title: 9단계. 20일 이동평균
  subtitle: rolling_mean()
  blocks:
  - type: text
    content: 주식 가격은 매일 오르내리며 변동이 심합니다. 전체적인 추세를 보려면 단기 변동을 완화해야 하는데, 이때 사용하는 것이 이동평균(moving average)입니다. rolling_mean(window_size=20)은 현재 행을 포함한 최근 20개 값의 평균을 계산합니다. 예를 들어 5번째 행의 이동평균은 1~5번째 행의 평균이고, 30번째 행의 이동평균은 11~30번째 행의 평균입니다. 주식에서는 20일(약 1개월) 이동평균이 대표적이며, 골든크로스/데드크로스 등의 매매 신호로 활용됩니다.
  - type: code
    language: python
    title: 20일 이동평균
    description: 단기 변동 완화
    content: |-
      withMa = withReturn.with_columns(
          pl.col("close").rolling_mean(window_size=20).alias("ma20")
      )
      withMa.tail(10)
  - type: tip
    content: "rolling_mean(window_size=N)은 현재 포함 최근 N개 값의 평균입니다. 주식 분석에서는 5일(단기), 20일(중기), 60일(장기), 120일(초장기) 이동평균을 주로 사용합니다. window_size를 바꿔서 다양한 기간의 이동평균을 계산할 수 있습니다."

- id: step10_cumsum
  title: 10단계. 누적 수익률
  subtitle: cum_sum()
  blocks:
  - type: text
    content: 일일 수익률은 하루하루의 변화율이지만, 전체 기간 동안 얼마나 수익이 났는지 보려면 누적 수익률이 필요합니다. cum_sum()은 cumulative sum(누적 합계)의 약자로, 처음부터 현재까지의 값을 모두 더합니다. 예를 들어 1일차 +2%, 2일차 +1%, 3일차 -0.5%라면 누적 수익률은 2%, 3%, 2.5%가 됩니다. 이를 그래프로 그리면 투자 수익 추이를 한눈에 볼 수 있습니다.
  - type: code
    language: python
    title: 누적 수익률
    description: 일일 수익률 누적 합계
    content: |-
      final = withMa.with_columns(
          pl.col("dailyReturn").cum_sum().alias("cumReturn")
      )
      final.tail(10)
  - type: tip
    content: "cum_sum()은 누적 합계를 계산합니다. 첫 행부터 현재 행까지 모든 값을 더한 결과를 반환합니다. cum_max()(누적 최대), cum_min()(누적 최소), cum_prod()(누적 곱) 등 다양한 누적 함수가 있습니다. 시계열 분석의 필수 함수입니다."

- id: step11_result
  title: 11단계. 결과물 - 최종 데이터
  subtitle: 종가 + 이동평균 + 수익률
  blocks:
  - type: text
    content: 모든 분석 결과를 포함한 최종 데이터프레임입니다. drop_nulls()로 null 값이 있는 행(첫 번째 행 등)을 제거하고, select로 핵심 컬럼만 선택하여 깔끔한 결과를 만듭니다.
  - type: code
    language: python
    title: 최종 분석 결과
    description: 주가와 분석 지표
    content: |-
      final.drop_nulls().select(["date", "close", "ma20", "dailyReturn", "cumReturn"])

- id: practice
  title: 실습
  subtitle: 주식 분석 프로젝트
  blocks:
  - type: text
    content: 배운 내용으로 주식 분석을 해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 이동평균선과 골든크로스 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 전처리"
      content: |-
        import polars as pl

        aaplUrl = "https://raw.githubusercontent.com/plotly/datasets/master/finance-charts-apple.csv"
        aaplBase = pl.read_csv(aaplUrl).select([
            pl.col("Date").str.to_date("%Y-%m-%d").alias("date"),
            pl.col("AAPL.Close").alias("close")
        ])
    - type: code
      title: "이동평균 계산"
      content: |-
        maAnalysis = aaplBase.with_columns([
            pl.col("close").rolling_mean(window_size=5).alias("ma5"),
            pl.col("close").rolling_mean(window_size=20).alias("ma20"),
            pl.col("close").rolling_mean(window_size=60).alias("ma60")
        ]).drop_nulls()
        maAnalysis.tail(10)
  - type: expansion
    title: "미션2: 월별 수익률과 변동성 분석"
    blocks:
    - type: code
      title: "데이터 로드 및 전처리"
      content: |-
        import polars as pl

        financeUrl = "https://raw.githubusercontent.com/plotly/datasets/master/finance-charts-apple.csv"
        priceData = pl.read_csv(financeUrl).select([
            pl.col("Date").str.to_date("%Y-%m-%d").alias("date"),
            pl.col("AAPL.Close").alias("close")
        ]).with_columns([
            pl.col("date").dt.year().alias("year"),
            pl.col("date").dt.month().alias("month"),
            pl.col("close").shift(1).alias("prevClose")
        ]).with_columns(
            ((pl.col("close") - pl.col("prevClose")) / pl.col("prevClose") * 100).alias("dailyReturn")
        )
    - type: code
      title: "월별 집계"
      content: |-
        monthlyVolatility = priceData.drop_nulls().group_by(["year", "month"]).agg([
            pl.col("close").mean().round(2).alias("avgClose"),
            pl.col("dailyReturn").mean().round(2).alias("avgReturn"),
            pl.col("dailyReturn").std().round(2).alias("volatility")
        ]).sort(["year", "month"])
        monthlyVolatility

- id: summary
  title: 정리
  blocks:
  - type: text
    content: Polars로 주식 데이터 분석 기초를 배웠습니다.
  - type: list
    items:
    - "read_csv() - 데이터 로드"
    - "with_columns() - 새 컬럼 추가"
    - "cast() - 타입 변환"
    - "dt.year(), dt.month() - 날짜 정보 추출"
    - "shift(1) - 이전 값 참조"
    - "rolling_mean() - 이동평균 계산"
    - "cum_sum() - 누적 합계"
  - type: text
    content: 다음 시간에는 음악 스트리밍 데이터로 문자열 처리와 순위 계산을 배웁니다.
