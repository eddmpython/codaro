meta:
  id: polars_07
  title: 스포츠통계분석
  order: 7
  category: polars
  difficulty: "⭐⭐⭐"
  badge: 중급
  dataUrl: https://raw.githubusercontent.com/rashida048/Datasets/master/fifa.csv
  tags: ["FIFA", "exclude", "concat", "pivot", "능력치분석"]
  seo:
    title: "Polars 피벗과 결합 - FIFA 선수 능력치 분석"
    description: "FIFA 선수 데이터로 포지션별 능력치를 비교합니다. exclude로 열 제외, concat으로 결합, pivot으로 피벗 테이블을 만듭니다."
    keywords: ["polars pivot", "polars concat", "polars exclude", "FIFA 데이터", "선수 능력치"]

intro:
  emoji: "⚽"
  goal: FIFA 선수 데이터에서 "포지션별 능력치"를 비교하는 피벗 테이블을 만듭니다.
  description: 스포츠 데이터 분석의 핵심! 특정 열을 제외하고, 데이터를 결합하고, 피벗 테이블로 요약합니다. exclude, concat, pivot을 익힙니다.

sections:
- id: step1_load
  title: 1단계. 데이터 불러오기
  subtitle: FIFA 선수 데이터
  blocks:
  - type: text
    content: FIFA 게임의 선수 능력치 데이터를 불러옵니다. 이 데이터는 18,000명 이상의 실제 축구 선수들의 게임 내 능력치를 포함하고 있으며, 이름(Name), 포지션(Position), 종합능력치(Overall), 속도(Pace), 슈팅(Shooting), 패스(Passing), 드리블(Dribbling), 수비(Defending), 피지컬(Physical) 등 다양한 스탯이 포함됩니다. EA Sports의 FIFA 게임은 실제 선수 데이터를 기반으로 하므로 스포츠 데이터 분석의 훌륭한 연습 소재입니다. Polars의 빠른 CSV 읽기 성능으로 대용량 선수 데이터도 순식간에 로드할 수 있습니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: FIFA 선수 데이터 로드
    content: |-
      import polars as pl

      url = "https://raw.githubusercontent.com/rashida048/Datasets/master/fifa.csv"
      df = pl.read_csv(url)
      df.shape
  - type: tip
    content: FIFA 데이터는 실제 스포츠 분석에서 자주 사용되는 구조를 가지고 있습니다. 선수(Entity), 포지션(Category), 능력치(Metrics)의 조합으로 구성되어 있어, 실무 스포츠 데이터 분석과 동일한 패턴을 연습할 수 있습니다.

- id: step2_schema
  title: 2단계. 스키마 확인
  subtitle: 컬럼과 타입 파악
  blocks:
  - type: text
    content: DataFrame의 스키마를 확인하여 어떤 컬럼이 있고 각각의 데이터 타입이 무엇인지 파악합니다. FIFA 데이터는 선수 정보(Name, Nationality, Club), 포지션 정보(Position), 능력치(Overall, Pace, Shooting 등), 신체 정보(Height, Weight) 등 다양한 카테고리의 컬럼을 포함합니다. 스키마 확인은 데이터 분석의 첫 단계로, 어떤 분석이 가능한지 계획을 세우는 데 필수적입니다. Polars는 정수는 Int64, 실수는 Float64, 문자열은 Utf8로 명확하게 타입을 구분합니다.
  - type: code
    language: python
    title: 스키마 확인
    description: 컬럼과 데이터 타입
    content: |-
      df.schema
  - type: tip
    content: .schema는 컬럼명과 타입의 딕셔너리를 반환합니다. .columns로 컬럼명 리스트만 확인하거나, .dtypes로 타입 리스트만 확인할 수도 있습니다. 대용량 데이터에서는 .head()보다 .schema를 먼저 확인하는 것이 효율적입니다.

- id: step3_head
  title: 3단계. 미리보기
  subtitle: 상위 데이터 확인
  blocks:
  - type: text
    content: 실제 데이터가 어떻게 생겼는지 확인합니다. head() 메서드는 상위 5개 행을 반환하여 데이터의 구조와 값을 빠르게 파악할 수 있게 해줍니다. 스키마만으로는 알 수 없는 실제 값의 형태, 범위, 패턴을 확인할 수 있습니다.
  - type: code
    language: python
    title: 미리보기
    description: 상위 5개 확인
    content: |-
      df.head()
  - type: tip
    content: head(n)으로 상위 n개 행을 볼 수 있습니다. tail(n)은 하위 n개 행을 반환합니다. 기본값은 5입니다. sample(n)으로 무작위 샘플링도 가능합니다.

- id: step4_select_basic
  title: 4단계. 필요한 열 선택
  subtitle: 분석에 필요한 열만
  blocks:
  - type: text
    content: 분석에 필요한 핵심 컬럼만 선택하여 작업 효율을 높입니다. FIFA 데이터는 100개 이상의 컬럼을 포함하지만, 포지션별 능력치 비교에는 Name, Position과 6개 핵심 능력치만 있으면 충분합니다. 불필요한 컬럼을 제거하면 메모리 사용량이 줄어들고 연산 속도가 빨라집니다. select()는 여러 컬럼을 리스트로 전달받아 새로운 DataFrame을 반환합니다.
  - type: code
    language: python
    title: 열 선택
    description: 포지션과 능력치
    content: |-
      stats = df.select([
          pl.col("Name"),
          pl.col("Position"),
          pl.col("Overall"),
          pl.col("Pace"),
          pl.col("Shooting"),
          pl.col("Passing"),
          pl.col("Dribbling"),
          pl.col("Defending"),
          pl.col("Physical")
      ])
      stats.head()
  - type: tip
    content: select()는 원본 DataFrame을 변경하지 않고 새로운 DataFrame을 반환합니다. marimo 환경에서는 새 변수명(stats)에 할당하여 사용합니다. pl.col("컬럼명")은 컬럼을 선택하는 표현식입니다.

- id: step5_exclude
  title: 5단계. 특정 열 제외하기
  subtitle: pl.all().exclude()
  blocks:
  - type: text
    content: 선택할 컬럼이 많고 제외할 컬럼이 적을 때는 exclude()가 더 효율적입니다. pl.all()은 모든 컬럼을 선택하는 표현식이고, exclude()는 특정 컬럼을 제외합니다. FIFA 데이터의 경우 ID, Photo, Flag, Club Logo처럼 분석에 불필요한 메타데이터나 URL 컬럼을 제거할 때 유용합니다. 특히 컬럼이 100개 이상인 경우 필요한 컬럼을 일일이 나열하는 것보다 제외할 컬럼만 지정하는 것이 훨씬 간결합니다.
  - type: code
    language: python
    title: 열 제외
    description: 불필요한 열 제외
    content: |-
      df.select(
          pl.all().exclude(["ID", "Photo", "Flag", "Club Logo"])
      ).head()
  - type: tip
    content: pl.all().exclude([열 목록])은 지정한 열만 제외하고 나머지 전부를 선택합니다. 열이 많을 때 유용하며, pandas의 df.drop(columns=[...])과 유사하지만 Polars는 select 내에서 표현식으로 처리합니다. 정규표현식으로 패턴 매칭도 가능합니다.

- id: step6_filter_position
  title: 6단계. 포지션 필터링
  subtitle: 주요 포지션만
  blocks:
  - type: text
    content: FIFA에는 27개 이상의 포지션이 있지만, 핵심 분석을 위해 대표적인 4개 포지션만 선택합니다. ST(Striker, 공격수)는 득점, CM(Central Midfielder, 중앙 미드필더)은 패스와 조율, CB(Center Back, 중앙 수비수)는 수비, GK(Goalkeeper, 골키퍼)는 골문 방어를 담당합니다. is_in() 메서드는 SQL의 IN 연산자와 동일하며, 지정한 값 목록에 포함되는 행만 필터링합니다. 이렇게 포지션을 제한하면 각 포지션의 특성이 명확히 드러납니다.
  - type: code
    language: python
    title: 포지션 필터
    description: 4개 포지션만 선택
    content: |-
      positions = ["ST", "CM", "CB", "GK"]
      filtered = stats.filter(pl.col("Position").is_in(positions))
      filtered.shape
  - type: tip
    content: is_in([값 목록])은 여러 값 중 하나와 일치하는 행을 선택합니다. pandas의 df[df['col'].isin([...])]과 동일합니다. 반대로 is_not_in()으로 제외할 수도 있습니다.

- id: step7_groupby
  title: 7단계. 포지션별 평균 능력치
  subtitle: group_by + agg
  blocks:
  - type: text
    content: 각 포지션별로 능력치 평균을 계산하여 포지션 특성을 파악합니다. group_by("Position")은 Position 값이 같은 행들을 그룹으로 묶고, agg()는 각 그룹에 집계 함수를 적용합니다. 예를 들어 ST(공격수)는 Shooting과 Pace가 높고, CB(수비수)는 Defending과 Physical이 높으며, GK(골키퍼)는 다른 능력치보다 골키핑 능력치가 중요합니다. 이렇게 그룹별 평균을 비교하면 각 포지션이 요구하는 핵심 능력을 명확히 알 수 있습니다.
  - type: code
    language: python
    title: 포지션별 평균
    description: 그룹별 집계
    content: |-
      positionStats = filtered.group_by("Position").agg([
          pl.col("Overall").mean().alias("avgOverall"),
          pl.col("Pace").mean().alias("avgPace"),
          pl.col("Shooting").mean().alias("avgShooting"),
          pl.col("Passing").mean().alias("avgPassing"),
          pl.col("Dribbling").mean().alias("avgDribbling"),
          pl.col("Defending").mean().alias("avgDefending"),
          pl.col("Physical").mean().alias("avgPhysical")
      ])
      positionStats
  - type: tip
    content: group_by().agg()는 Polars의 핵심 패턴입니다. agg() 안에 여러 집계 표현식을 리스트로 전달하면 한 번에 여러 통계를 계산할 수 있습니다. pandas의 groupby().agg()와 유사하지만 Polars가 훨씬 빠릅니다.

- id: step8_with_columns
  title: 8단계. 등급 컬럼 추가
  subtitle: with_columns
  blocks:
  - type: text
    content: Overall 점수에 따라 등급을 부여합니다. when-then-otherwise 구문으로 85점 이상 Elite, 75점 이상 Good, 65점 이상 Average, 그 외는 Developing으로 분류합니다. 이렇게 연속형 변수를 범주형으로 변환하면 등급별 분석이 가능해집니다.
  - type: code
    language: python
    title: 등급 컬럼 추가
    description: when-then 조건
    content: |-
      graded = stats.with_columns(
          pl.when(pl.col("Overall") >= 85).then(pl.lit("Elite"))
          .when(pl.col("Overall") >= 75).then(pl.lit("Good"))
          .when(pl.col("Overall") >= 65).then(pl.lit("Average"))
          .otherwise(pl.lit("Developing"))
          .alias("Grade")
      )
      graded.head(10)

- id: step9_concat_intro
  title: 9단계. 데이터 결합
  subtitle: pl.concat
  blocks:
  - type: text
    content: 여러 DataFrame을 하나로 결합하는 연습을 합니다. 공격수(ST)와 수비수(CB) 데이터를 각각 추출한 뒤 수직으로 합쳐봅니다. 실무에서는 여러 파일에서 읽어온 데이터나, 서로 다른 조건으로 필터링한 데이터를 다시 합칠 때 concat을 사용합니다. concat은 여러 DataFrame을 행 방향(수직)으로 쌓는 기능으로, SQL의 UNION ALL과 유사합니다.
  - type: code
    language: python
    title: 데이터 분리
    description: 공격수와 수비수 추출
    content: |-
      strikers = stats.filter(pl.col("Position") == "ST").head(5)
      defenders = stats.filter(pl.col("Position") == "CB").head(5)
      strikers.shape, defenders.shape
  - type: tip
    content: 실무에서는 월별 데이터 파일을 각각 읽어온 후 concat으로 통합하는 경우가 많습니다. 예를 들어 2024년 1월~12월 파일을 각각 읽고 pl.concat()으로 연간 데이터를 만듭니다.

- id: step10_concat
  title: 10단계. 수직 결합
  subtitle: concat으로 합치기
  blocks:
  - type: text
    content: pl.concat()은 여러 DataFrame을 수직으로 쌓아 하나의 DataFrame으로 만듭니다. 리스트로 전달된 DataFrame들의 행을 순서대로 이어붙이며, 모든 DataFrame의 컬럼 구조가 동일해야 합니다. how 파라미터로 동작 방식을 제어할 수 있으며, 기본값 'vertical'은 행을 쌓고, 'horizontal'은 열을 옆으로 붙입니다. concat은 pandas의 pd.concat()과 유사하지만 Polars가 더 빠릅니다.
  - type: code
    language: python
    title: 수직 결합
    description: 두 데이터프레임 합치기
    content: |-
      combined = pl.concat([strikers, defenders])
      combined
  - type: tip
    content: pl.concat([df1, df2, df3, ...])는 여러 DataFrame을 한 번에 결합할 수 있습니다. how='vertical'이 기본값이며, 컬럼이 다르면 에러가 발생합니다. how='diagonal'로 컬럼이 다른 DataFrame도 결합 가능하며, 없는 컬럼은 null로 채워집니다.

- id: step11_pivot_prep
  title: 11단계. 피벗 준비
  subtitle: 데이터 구조 변환
  blocks:
  - type: text
    content: 피벗 테이블을 만들기 위해 포지션별 능력치 평균 데이터를 준비합니다.
  - type: code
    language: python
    title: 피벗용 데이터
    description: 포지션-능력치-값 형태
    content: |-
      pivotData = filtered.group_by("Position").agg([
          pl.col("Pace").mean().round(1).alias("Pace"),
          pl.col("Shooting").mean().round(1).alias("Shooting"),
          pl.col("Passing").mean().round(1).alias("Passing"),
          pl.col("Dribbling").mean().round(1).alias("Dribbling"),
          pl.col("Defending").mean().round(1).alias("Defending"),
          pl.col("Physical").mean().round(1).alias("Physical")
      ])
      pivotData

- id: step12_unpivot
  title: 12단계. 언피벗
  subtitle: 넓은 형태를 긴 형태로
  blocks:
  - type: text
    content: 피벗(pivot)을 이해하려면 먼저 언피벗(unpivot)을 알아야 합니다. 언피벗은 넓은 형태(wide format)의 데이터를 긴 형태(long format)로 변환하는 작업입니다. 여러 컬럼에 흩어져 있던 값들을 하나의 변수(variable)와 값(value) 컬럼으로 모읍니다. Pace, Shooting, Passing 등 6개 능력치 컬럼을 Stat(능력치명)과 Value(값) 2개 컬럼으로 변환하면, 포지션 × 능력치 조합이 각각 하나의 행이 됩니다. 이는 데이터 시각화나 피벗 테이블 생성에 유용한 형태입니다.
  - type: code
    language: python
    title: 언피벗
    description: 능력치를 행으로 변환
    content: |-
      longData = pivotData.unpivot(
          index="Position",
          variable_name="Stat",
          value_name="Value"
      )
      longData.head(12)
  - type: tip
    content: unpivot(index=고정할컬럼, variable_name=변수명컬럼, value_name=값컬럼)은 여러 컬럼을 하나로 모읍니다. pandas의 melt()와 동일한 기능입니다. index에 지정하지 않은 모든 컬럼이 변환 대상이 됩니다.

- id: step13_pivot
  title: 13단계. 피벗 테이블
  subtitle: 긴 형태를 넓게
  blocks:
  - type: text
    content: 이제 피벗(pivot)으로 긴 형태를 다시 넓은 형태로 변환합니다. 피벗은 특정 컬럼의 고유값들을 새로운 컬럼으로 만들어 데이터를 재구조화합니다. Position의 고유값(ST, CM, CB, GK)이 새로운 컬럼이 되고, Stat(능력치명)이 행 인덱스가 되어, 각 포지션별 능력치를 한눈에 비교할 수 있는 테이블이 완성됩니다. 이는 엑셀의 피벗 테이블, pandas의 pivot_table()과 동일한 개념으로, 스포츠 데이터 분석에서 매우 유용합니다.
  - type: code
    language: python
    title: 피벗 테이블
    description: 행열 전환
    content: |-
      pivotTable = longData.pivot(
          on="Position",
          index="Stat",
          values="Value"
      )
      pivotTable
  - type: tip
    content: pivot(on=열이될컬럼, index=행이될컬럼, values=값컬럼)으로 피벗 테이블을 만듭니다. on에 지정한 컬럼의 고유값들이 새 컬럼이 됩니다. aggregate_function 파라미터로 집계 함수(mean, sum 등)를 지정할 수 있습니다.

- id: step14_viz
  title: 14단계. 결과물 - 포지션별 능력치 비교
  subtitle: 피벗 테이블 결과
  blocks:
  - type: text
    content: 최종 결과물인 피벗 테이블이 완성되었습니다. 이 테이블은 포지션(ST, CM, CB, GK)을 열로, 능력치(Pace, Shooting, Passing, Dribbling, Defending, Physical)를 행으로 배치하여, 각 포지션이 어떤 능력에 특화되어 있는지 한눈에 비교할 수 있습니다. 예를 들어 ST는 Shooting이 높고 Defending이 낮으며, CB는 그 반대입니다. 이러한 인사이트는 축구 게임 전략 수립, 선수 영입 결정, 포메이션 설계 등 실무 스포츠 분석에 직접 활용됩니다.
  - type: code
    language: python
    title: 포지션별 능력치 비교표
    description: 피벗 테이블 출력
    content: |-
      pivotTable
  - type: tip
    content: 피벗 테이블은 데이터를 요약하고 비교하는 가장 효과적인 방법입니다. 실무에서는 이 테이블을 그래프(히트맵, 레이더 차트 등)로 시각화하면 더욱 직관적인 인사이트를 얻을 수 있습니다.

- id: practice
  title: 실습
  subtitle: FIFA 데이터 분석 프로젝트
  blocks:
  - type: text
    content: 스포츠 데이터 분석가가 되어 배운 모든 개념을 종합적으로 활용해봅시다. exclude로 불필요한 컬럼 제거, concat으로 여러 포지션 데이터 결합, pivot으로 비교 테이블 생성, group_by로 심층 집계를 모두 사용합니다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: 공격 포지션 능력치 분석과 concat 결합"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        fifaUrl = "https://raw.githubusercontent.com/rashida048/Datasets/master/fifa.csv"
        fifaRaw = pl.read_csv(fifaUrl)
    - type: code
      title: "포지션별 데이터 추출 및 결합"
      content: |-
        lw = fifaRaw.filter(pl.col("Position") == "LW").head(5)
        rw = fifaRaw.filter(pl.col("Position") == "RW").head(5)
        cam = fifaRaw.filter(pl.col("Position") == "CAM").head(5)
        attackers = pl.concat([lw, rw, cam])
    - type: code
      title: "포지션별 능력치 집계"
      content: |-
        attackerStats = attackers.group_by("Position").agg([
            pl.col("Pace").mean().round(1).alias("avgPace"),
            pl.col("Shooting").mean().round(1).alias("avgShooting"),
            pl.col("Dribbling").mean().round(1).alias("avgDribbling")
        ])
        attackerStats
  - type: expansion
    title: "미션2: 등급별 포지션 분포 피벗 테이블"
    blocks:
    - type: code
      title: "데이터 로드"
      content: |-
        import polars as pl

        playerUrl = "https://raw.githubusercontent.com/rashida048/Datasets/master/fifa.csv"
        playerRaw = pl.read_csv(playerUrl)
    - type: code
      title: "등급 부여"
      content: |-
        playerGraded = playerRaw.with_columns(
            pl.when(pl.col("Overall") >= 85).then(pl.lit("Elite"))
            .when(pl.col("Overall") >= 75).then(pl.lit("Good"))
            .when(pl.col("Overall") >= 65).then(pl.lit("Average"))
            .otherwise(pl.lit("Developing"))
            .alias("Grade")
        ).filter(pl.col("Position").is_in(["ST", "CM", "CB", "GK"]))
    - type: code
      title: "피벗 테이블 생성"
      content: |-
        gradePivot = playerGraded.group_by(["Position", "Grade"]).agg(
            pl.len().alias("Count")
        ).pivot(on="Grade", index="Position", values="Count").fill_null(0)
        gradePivot

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 스포츠 데이터 분석의 핵심 기법을 마스터했습니다. exclude, concat, pivot은 실무에서 매우 자주 사용되는 필수 기능입니다.
  - type: list
    items:
    - "pl.all().exclude([열]) - 특정 열 제외하고 나머지 전부 선택, 컬럼이 많을 때 효율적"
    - "pl.concat([df1, df2, ...]) - 여러 DataFrame 수직 결합, how='vertical'/'horizontal'/'diagonal'"
    - "unpivot(index, variable_name, value_name) - 넓은 형태를 긴 형태로, pandas melt()와 동일"
    - "pivot(on, index, values) - 긴 형태를 넓게, 피벗 테이블 생성으로 비교 분석"
    - "group_by().agg() - 포지션별 평균 능력치 계산, 그룹별 집계"
    - "is_in([값 목록]) - 여러 조건 필터링, SQL IN과 동일"
  - type: text
    content: 다음 시간에는 소셜미디어 데이터로 over, rolling, unpivot을 활용한 복잡한 표현식 체이닝을 배웁니다.
