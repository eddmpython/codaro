    title: "Seaborn 입문 - 통계 시각화의 강력한 도구"
    description: "Seaborn으로 아름다운 통계 차트를 만들어보세요. Matplotlib 위에 구축된 고수준 인터페이스로 탐색적 데이터 분석을 빠르게 수행합니다."
    keywords: ["Seaborn", "통계 시각화", "EDA", "hue", "palette", "Matplotlib"]

sections:
- id: intro
  blocks:
    - type: mainHeader
      emoji: "🎨"
      title: "Seaborn"
      subtitle: "통계 시각화의 강력한 도구"

    - type: hero
      emoji: "📊"
      title: "아름다운 통계 차트"
      subtitle: "한 줄 코드로 복잡한 분석 시각화"
      points:
        - emoji: "🎯"
          title: "통계 시각화에 최적화"
        - emoji: "🖌️"
          title: "아름다운 기본 스타일"
        - emoji: "🔗"
          title: "Matplotlib 완벽 호환"
        - emoji: "⚡"
          title: "빠른 탐색적 분석"

- id: seaborn_history
  blocks:
    - type: sectionHeader
      title: "🏛️ Seaborn의 탄생"
      subtitle: "Matplotlib의 아름다운 확장"

    - type: text
      content: |-
        Seaborn은 2012년 Michael Waskom이 만들었습니다. 당시 그는 뉴욕대학교에서 신경과학을 연구하던 대학원생이었습니다. 실험 데이터를 분석하면서 Matplotlib의 복잡한 코드에 불편함을 느꼈고, 더 쉽고 아름다운 시각화 도구를 만들고 싶었습니다.

        Seaborn은 Matplotlib 위에 구축되어 있어서 모든 Matplotlib 기능을 그대로 사용할 수 있습니다. 하지만 통계적 시각화에 특화된 고수준 인터페이스를 제공하여, 복잡한 차트를 한 줄로 그릴 수 있게 해줍니다.

    - type: featureCards
      cards:
        - emoji: "🔬"
          title: "연구자가 만든 도구"
          description: "실제 데이터 분석 경험에서 탄생한 실용적인 라이브러리"
        - emoji: "📈"
          title: "통계 시각화 전문"
          description: "분포, 관계, 범주형 비교 등 통계 분석에 최적화"
        - emoji: "🎨"
          title: "과학적 색상 팔레트"
          description: "색맹 친화적이고 인쇄에도 적합한 색상 체계"
        - emoji: "📚"
          title: "활발한 커뮤니티"
          description: "지속적인 업데이트와 풍부한 문서"

- id: why_seaborn
  blocks:
    - type: sectionHeader
      title: "🤔 왜 Seaborn인가?"
      subtitle: "Matplotlib과의 차이점"

    - type: text
      content: |-
        Matplotlib은 모든 것을 할 수 있지만, 그만큼 코드가 길어집니다. Seaborn은 자주 사용하는 통계 시각화 패턴을 함수로 제공하여 코드를 획기적으로 줄여줍니다.

        예를 들어 그룹별 박스플롯을 그리려면 Matplotlib에서는 데이터를 수동으로 분리하고 반복문을 돌려야 하지만, Seaborn에서는 hue 파라미터 하나로 해결됩니다.

    - type: compare
      left:
        title: "Matplotlib"
        subtitle: "저수준 제어"
        icon: "🔧"
        color: "blue"
        items:
          - "모든 요소 직접 제어"
          - "코드가 길어질 수 있음"
          - "데이터 전처리 필요"
          - "범례 수동 설정"
          - "색상 직접 지정"
        infoBox: "세밀한 커스터마이징에 적합"
      right:
        title: "Seaborn"
        subtitle: "고수준 인터페이스"
        icon: "🎨"
        color: "green"
        items:
          - "통계 시각화 한 줄 완성"
          - "아름다운 기본 스타일"
          - "DataFrame 직접 사용"
          - "범례 자동 생성"
          - "팔레트 자동 적용"
        infoBox: "빠른 탐색적 분석에 적합"

- id: semantic_mapping
  blocks:
    - type: sectionHeader
      title: "🎯 시맨틱 매핑"
      subtitle: "Seaborn의 핵심 철학"

    - type: text
      content: |-
        Seaborn의 가장 강력한 기능은 시맨틱 매핑(Semantic Mapping)입니다. 데이터의 변수를 시각적 속성에 자동으로 연결해줍니다.

        hue는 색상, style은 선/마커 스타일, size는 크기, col과 row는 패널 분할을 담당합니다. 이 파라미터들을 조합하면 한 차트에서 5개 이상의 변수를 동시에 표현할 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "🎨"
          title: "hue (색상)"
          description: "범주형 변수를 색상으로 구분. 가장 많이 사용되는 파라미터"
        - emoji: "✏️"
          title: "style (스타일)"
          description: "선 스타일이나 마커 모양으로 추가 변수 표현"
        - emoji: "📏"
          title: "size (크기)"
          description: "점이나 선의 크기로 연속형 변수 표현"
        - emoji: "📊"
          title: "col, row (패널)"
          description: "데이터를 분할하여 여러 패널로 비교"

    - type: note
      style: tip
      title: "다차원 데이터 시각화"
      content: "x, y, hue, style, size, col, row를 조합하면 최대 7개 변수를 하나의 그림에 표현할 수 있습니다. Matplotlib으로 같은 결과를 얻으려면 수십 줄의 코드가 필요합니다."

- id: chart_categories
  blocks:
    - type: sectionHeader
      title: "📊 차트 유형별 분류"
      subtitle: "목적에 맞는 함수 선택"

    - type: text
      content: |-
        Seaborn은 차트를 목적에 따라 5가지 범주로 분류합니다. 각 범주에는 Figure-level 함수(다중 패널 지원)와 Axes-level 함수(단일 차트)가 있습니다.

        Figure-level 함수는 relplot, displot, catplot처럼 plot으로 끝나고, 자체 Figure를 생성합니다. Axes-level 함수는 기존 Matplotlib Axes에 그릴 수 있어 더 유연합니다.

    - type: table
      headers: ["범주", "Figure-level", "Axes-level 함수들"]
      rows:
        - ["관계형", "relplot()", "scatterplot(), lineplot()"]
        - ["분포형", "displot()", "histplot(), kdeplot(), rugplot()"]
        - ["범주형", "catplot()", "stripplot(), swarmplot(), boxplot(), violinplot(), barplot(), countplot(), pointplot()"]
        - ["회귀형", "lmplot()", "regplot(), residplot()"]
        - ["행렬형", "-", "heatmap(), clustermap()"]

    - type: note
      style: info
      title: "Figure-level vs Axes-level"
      content: "Figure-level 함수는 col, row 파라미터로 다중 패널을 쉽게 만들 수 있습니다. Axes-level 함수는 ax 파라미터로 기존 서브플롯에 그릴 수 있어 Matplotlib과 조합하기 좋습니다."

- id: relational
  blocks:
    - type: sectionHeader
      title: "🔗 관계형 차트"
      subtitle: "두 연속 변수의 관계"

    - type: text
      content: |-
        관계형 차트는 두 연속 변수 사이의 관계를 보여줍니다. scatterplot은 산점도로 개별 데이터 포인트를 표시하고, lineplot은 선 그래프로 추세를 보여줍니다.

        relplot은 Figure-level 함수로, kind 파라미터로 scatter와 line 중 선택할 수 있고, col과 row로 다중 패널을 만들 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "⚫"
          title: "scatterplot()"
          description: "산점도. 두 연속 변수의 관계를 점으로 표시"
        - emoji: "📈"
          title: "lineplot()"
          description: "선 그래프. 시계열이나 연속적 관계 표현"
        - emoji: "🔲"
          title: "relplot()"
          description: "Figure-level. col/row로 다중 패널 지원"

- id: distribution
  blocks:
    - type: sectionHeader
      title: "📊 분포형 차트"
      subtitle: "데이터 분포 탐색"

    - type: text
      content: |-
        분포형 차트는 단일 변수 또는 두 변수의 분포를 보여줍니다. histplot은 히스토그램, kdeplot은 커널 밀도 추정으로 부드러운 분포 곡선을 그립니다.

        displot은 Figure-level 함수로, kind 파라미터로 hist, kde, ecdf 중 선택할 수 있습니다. multiple 파라미터로 여러 그룹의 분포를 겹쳐서(layer), 쌓아서(stack), 채워서(fill) 표현할 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "📊"
          title: "histplot()"
          description: "히스토그램. 구간별 빈도를 막대로 표시"
        - emoji: "〰️"
          title: "kdeplot()"
          description: "커널 밀도. 부드러운 분포 곡선"
        - emoji: "📈"
          title: "displot()"
          description: "Figure-level. 다중 패널 분포 비교"

- id: categorical
  blocks:
    - type: sectionHeader
      title: "📋 범주형 차트"
      subtitle: "그룹별 비교 분석"

    - type: text
      content: |-
        범주형 차트는 카테고리별로 데이터를 비교합니다. stripplot과 swarmplot은 개별 데이터 포인트를 보여주고, boxplot과 violinplot은 분포를 요약합니다. barplot은 평균값과 신뢰구간을, countplot은 빈도를 표시합니다.

        catplot은 Figure-level 함수로, kind 파라미터로 모든 범주형 차트를 선택할 수 있습니다.

    - type: table
      headers: ["함수", "용도", "특징"]
      rows:
        - ["stripplot()", "개별 점 표시", "점이 겹칠 수 있음"]
        - ["swarmplot()", "개별 점 표시", "점이 겹치지 않게 배치"]
        - ["boxplot()", "분포 요약", "중앙값, 사분위수, 이상치"]
        - ["violinplot()", "분포 모양", "KDE + 박스플롯 결합"]
        - ["barplot()", "평균값 비교", "신뢰구간 자동 표시"]
        - ["countplot()", "빈도 비교", "카테고리별 개수"]
        - ["pointplot()", "평균 추세", "점과 선으로 연결"]

- id: regression
  blocks:
    - type: sectionHeader
      title: "📐 회귀형 차트"
      subtitle: "관계의 추세선"

    - type: text
      content: |-
        회귀형 차트는 두 변수 사이의 선형 관계를 시각화합니다. regplot은 산점도와 회귀선을 함께 그리고, 신뢰구간도 표시합니다.

        lmplot은 Figure-level 함수로, hue와 col로 그룹별 회귀선을 비교할 수 있습니다. order 파라미터로 다항 회귀도 가능합니다.

    - type: featureCards
      cards:
        - emoji: "📈"
          title: "regplot()"
          description: "산점도 + 회귀선. 신뢰구간 자동 표시"
        - emoji: "🔲"
          title: "lmplot()"
          description: "Figure-level. 그룹별 회귀선 비교"
        - emoji: "📊"
          title: "residplot()"
          description: "잔차 플롯. 회귀 모델 진단"

- id: matrix
  blocks:
    - type: sectionHeader
      title: "🔥 행렬형 차트"
      subtitle: "2D 데이터의 시각화"

    - type: text
      content: |-
        행렬형 차트는 2차원 배열 데이터를 색상으로 표현합니다. heatmap은 상관관계 행렬이나 피벗 테이블을 시각화하는 데 자주 사용됩니다.

        annot 파라미터로 각 셀에 값을 표시하고, cmap으로 색상 체계를 변경할 수 있습니다. clustermap은 계층적 군집화를 적용한 히트맵입니다.

    - type: featureCards
      cards:
        - emoji: "🔥"
          title: "heatmap()"
          description: "색상으로 값의 크기 표현. 상관관계 분석에 필수"
        - emoji: "🌳"
          title: "clustermap()"
          description: "계층적 군집화 + 히트맵. 패턴 발견에 유용"

- id: multiplot
  blocks:
    - type: sectionHeader
      title: "🔲 다변량 차트"
      subtitle: "여러 변수를 한눈에"

    - type: text
      content: |-
        다변량 차트는 여러 변수의 관계를 한 그림에 표현합니다. pairplot은 모든 변수 쌍의 산점도를 격자로 보여주고, jointplot은 두 변수의 결합 분포와 주변 분포를 함께 표시합니다.

        FacetGrid는 조건부로 데이터를 분할하여 여러 패널에 같은 유형의 차트를 그립니다. 직접 map 메서드를 사용하여 커스텀 시각화를 만들 수 있습니다.

    - type: featureCards
      cards:
        - emoji: "🔲"
          title: "pairplot()"
          description: "모든 변수 쌍 비교. EDA 시작점으로 최적"
        - emoji: "🎯"
          title: "jointplot()"
          description: "두 변수의 결합 분포 + 주변 분포"
        - emoji: "📊"
          title: "FacetGrid"
          description: "조건부 다중 패널. 커스텀 시각화 구성"

- id: styling
  blocks:
    - type: sectionHeader
      title: "🎨 스타일링 시스템"
      subtitle: "아름다운 차트 만들기"

    - type: text
      content: |-
        Seaborn은 강력한 스타일링 시스템을 제공합니다. set_theme()으로 전체 테마를, set_style()로 배경 스타일을, set_palette()로 색상 팔레트를 설정합니다.

        context 파라미터는 출력 목적에 따라 폰트와 선 크기를 조절합니다. paper, notebook, talk, poster 순으로 크기가 커집니다.

    - type: table
      headers: ["함수", "설정 대상", "옵션 예시"]
      rows:
        - ["set_theme()", "전체 테마", "style, palette, context 한번에"]
        - ["set_style()", "배경 스타일", "white, dark, whitegrid, darkgrid, ticks"]
        - ["set_palette()", "색상 팔레트", "deep, muted, bright, pastel, dark, colorblind"]
        - ["set_context()", "출력 크기", "paper, notebook, talk, poster"]

    - type: note
      style: tip
      title: "색맹 친화적 팔레트"
      content: "colorblind 팔레트는 색각 이상이 있는 사람도 구분할 수 있는 색상으로 구성되어 있습니다. 발표나 출판물에서는 이 팔레트를 권장합니다."

- id: projects_preview
  blocks:
    - type: sectionHeader
      title: "🗺️ 10개 프로젝트 미리보기"
      subtitle: "이 순서대로 배웁니다"

    - type: table
      headers: ["단계", "프로젝트", "배울 내용"]
      rows:
        - ["입문", "01 붓꽃품종산점도", "scatterplot, hue, palette"]
        - ["입문", "02 팁데이터분포탐색", "histplot, stripplot, multiple"]
        - ["기초", "03 펭귄체중분포비교", "boxplot, violinplot, hue"]
        - ["기초", "04 광고비판매액회귀", "regplot, ci, scatter"]
        - ["기초", "05 타이타닉생존분석", "barplot, countplot, catplot, col"]
        - ["중급", "06 항공편승객시계열", "heatmap, lineplot, annot"]
        - ["중급", "07 세계기대수명분석", "relplot, size, col"]
        - ["중급", "08 다이아몬드가격분석", "displot, kdeplot, multiple"]
        - ["심화", "09 자동차연비종합분석", "pairplot, jointplot, lmplot"]
        - ["심화", "10 종합EDA리포트", "모든 개념 종합, FacetGrid, set_theme"]

    - type: note
      style: info
      title: "프로젝트 기반 학습"
      content: "각 프로젝트는 완성된 분석 결과물을 만듭니다. 개념을 배우면서 실제 데이터로 EDA를 수행합니다."

- id: datasets
  blocks:
    - type: sectionHeader
      title: "📦 내장 데이터셋"
      subtitle: "학습에 최적화된 데이터"

    - type: text
      content: |-
        Seaborn은 학습과 예제를 위한 내장 데이터셋을 제공합니다. sns.load_dataset() 함수로 간편하게 불러올 수 있습니다. 이 데이터셋들은 GitHub에서 자동으로 다운로드됩니다.

        이 과정에서는 iris(붓꽃), tips(팁), penguins(펭귄), titanic(타이타닉), flights(항공편), diamonds(다이아몬드), mpg(자동차 연비) 데이터를 사용합니다.

    - type: table
      headers: ["데이터셋", "행 수", "주요 변수", "분석 주제"]
      rows:
        - ["iris", "150", "꽃잎/꽃받침 길이, 품종", "분류, 산점도"]
        - ["tips", "244", "결제금액, 팁, 요일, 시간", "회귀, 범주 비교"]
        - ["penguins", "344", "종, 섬, 부리, 체중", "분포 비교, 다변량"]
        - ["titanic", "891", "생존, 클래스, 성별, 나이", "생존 분석, 범주"]
        - ["flights", "144", "연도, 월, 승객 수", "시계열, 히트맵"]
        - ["diamonds", "53940", "캐럿, 컷, 색상, 가격", "대용량, 분포"]
        - ["mpg", "398", "연비, 실린더, 마력, 원산지", "회귀, 다변량"]

