    keywords: ["DuckDB LAG", "LEAD", "이동평균", "QUALIFY", "윈도우 함수 고급"]

intro:
  emoji: "📊"
  goal: 타이타닉 데이터로 LAG/LEAD, 이동 평균, QUALIFY를 마스터합니다.
  description: 고급 윈도우 함수로 이전/다음 행 비교, 이동 평균 계산, 윈도우 결과 필터링을 배웁니다. LAG/LEAD는 시계열 분석의 핵심이며, QUALIFY는 DuckDB의 강력한 확장 기능입니다.

sections:
- id: step1_load
  title: 1단계. 데이터 준비
  subtitle: titanic 데이터 로드
  blocks:
  - type: text
    content: 타이타닉 승객 데이터를 불러옵니다. 이번 프로젝트에서는 LAG/LEAD로 행 간 비교, 이동 평균으로 추세 분석, QUALIFY로 윈도우 필터링을 배웁니다. 891명의 승객 데이터로 나이, 요금 등의 패턴을 분석합니다. 고급 윈도우 함수는 시계열 데이터 분석, 추세 예측, 이상치 탐지 등 실무에서 필수적인 기능입니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: titanic 데이터를 DuckDB로 변환
    content: |-
      import pandas as pd
      import duckdb

      baseUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master"
      dfTitanic = pd.read_csv(f"{baseUrl}/titanic.csv")
      titanic = duckdb.from_df(dfTitanic)

      duckdb.sql("SELECT * FROM titanic LIMIT 5").show()

- id: step2_lag_intro
  title: 2단계. LAG - 이전 값 가져오기
  subtitle: 행 간 비교의 시작
  blocks:
  - type: text
    content: LAG(column, n)은 현재 행에서 n행 이전의 값을 가져오는 함수입니다. n=1이면 바로 직전 행, n=2이면 2행 전 값을 반환합니다. 현재 값과 이전 값을 비교하여 증감, 차이, 변화율 등을 계산할 수 있습니다. 예를 들어 매출이 전월 대비 얼마나 증가했는지, 주가가 전일 대비 얼마나 변동했는지 분석할 때 LAG가 필수적입니다. 시계열 데이터의 추세 분석, 변화 탐지에 핵심 기능입니다.
  - type: code
    language: python
    title: LAG 기본 사용
    description: 이전 행의 fare 가져오기
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age) AS prevFare,
              ROUND(fare - LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age), 2) AS fareDiff
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 10
      """).show()
  - type: tip
    content: "LAG(col, 1)은 직전 행, LAG(col, 2)는 2행 전 값을 가져옵니다. PARTITION BY를 사용하면 그룹별로 독립적으로 이전 값을 찾습니다. 첫 번째 행은 이전 값이 없으므로 NULL이 반환됩니다. NULL 대신 기본값을 지정하려면 LAG(col, 1, 0) 형태로 세 번째 인자를 추가합니다."

- id: step3_lead_intro
  title: 3단계. LEAD - 다음 값 가져오기
  subtitle: 미래 값 참조
  blocks:
  - type: text
    content: LEAD(column, n)은 LAG와 반대로 현재 행에서 n행 다음의 값을 가져옵니다. LAG가 과거를 본다면 LEAD는 미래를 봅니다. 현재 상태와 다음 상태를 비교하거나, 구간을 계산할 때 유용합니다. 예를 들어 "다음 고객의 구매 금액과 비교", "현재 이벤트와 다음 이벤트 사이의 시간 계산" 등에 활용됩니다. LAG와 LEAD를 함께 사용하면 전후 맥락을 모두 분석할 수 있습니다.
  - type: code
    language: python
    title: LEAD 사용
    description: 다음 행의 fare 가져오기
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              LEAD(fare, 1) OVER(PARTITION BY pclass ORDER BY age) AS nextFare,
              LEAD(fare, 2) OVER(PARTITION BY pclass ORDER BY age) AS next2Fare
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 10
      """).show()
  - type: tip
    content: "LEAD(col, 1)은 다음 행, LEAD(col, 2)는 2행 후 값을 반환합니다. 마지막 행은 다음 값이 없으므로 NULL입니다. LAG와 LEAD를 동시에 사용하면 전후 값을 모두 확인하여 구간 분석이 가능합니다."

- id: step4_lag_lead_compare
  title: 4단계. LAG와 LEAD 동시 사용
  subtitle: 전후 맥락 분석
  blocks:
  - type: text
    content: LAG와 LEAD를 동시에 사용하면 현재 값을 중심으로 전후 값을 모두 비교할 수 있습니다. 이는 "현재 값이 전후 평균보다 높은가?", "이전 값과 다음 값 사이의 어디에 위치하는가?" 같은 맥락 기반 분석을 가능하게 합니다. 이동 구간, 피크 탐지, 이상치 감지 등 고급 분석 패턴의 기초가 됩니다.
  - type: code
    language: python
    title: 전후 비교 분석
    description: 이전/현재/다음 값 비교
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age) AS prevFare,
              LEAD(fare, 1) OVER(PARTITION BY pclass ORDER BY age) AS nextFare,
              ROUND((COALESCE(LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age), fare) +
                     COALESCE(LEAD(fare, 1) OVER(PARTITION BY pclass ORDER BY age), fare)) / 2.0, 2) AS avgAround
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 12
      """).show()

- id: step5_moving_avg_intro
  title: 5단계. 이동 평균 기초
  subtitle: ROWS BETWEEN으로 윈도우 프레임 지정
  blocks:
  - type: text
    content: 이동 평균(Moving Average)은 일정 범위의 값들의 평균을 구하는 기법입니다. ROWS BETWEEN ... AND ... 구문으로 윈도우 프레임(범위)을 지정합니다. 예를 들어 ROWS BETWEEN 2 PRECEDING AND CURRENT ROW는 "이전 2개 행 + 현재 행" 총 3개 행의 평균을 계산합니다. 이동 평균은 노이즈를 제거하고 추세를 파악하는 데 매우 유용합니다. 주가 분석의 이동평균선, 매출 추세, 트래픽 패턴 등에 널리 사용됩니다.
  - type: code
    language: python
    title: 3개 행 이동 평균
    description: ROWS BETWEEN 사용
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              ROUND(AVG(fare) OVER(
                  PARTITION BY pclass
                  ORDER BY age
                  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
              ), 2) AS movingAvg3
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 12
      """).show()
  - type: tip
    content: "ROWS BETWEEN 2 PRECEDING AND CURRENT ROW는 현재 행 포함 최근 3행을 의미합니다. PRECEDING은 '이전', CURRENT ROW는 '현재 행'입니다. 2 PRECEDING은 2행 전부터 시작하므로 총 3행(2행 전, 1행 전, 현재)이 범위에 포함됩니다. 숫자를 바꾸면 윈도우 크기를 조절할 수 있습니다."

- id: step6_moving_avg_variants
  title: 6단계. 다양한 이동 평균
  subtitle: 윈도우 크기 변경
  blocks:
  - type: text
    content: 윈도우 프레임의 크기를 조절하여 다양한 이동 평균을 계산할 수 있습니다. 작은 윈도우(3개)는 최근 변화에 민감하고, 큰 윈도우(5개 이상)는 장기 추세를 보여줍니다. 실무에서는 여러 크기의 이동 평균을 함께 사용하여 단기/중기/장기 추세를 동시에 분석합니다. 주식 시장의 5일/20일/60일 이동평균선이 대표적인 예입니다.
  - type: code
    language: python
    title: 3개 vs 5개 이동 평균
    description: 윈도우 크기 비교
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              ROUND(AVG(fare) OVER(
                  PARTITION BY pclass
                  ORDER BY age
                  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
              ), 2) AS movingAvg3,
              ROUND(AVG(fare) OVER(
                  PARTITION BY pclass
                  ORDER BY age
                  ROWS BETWEEN 4 PRECEDING AND CURRENT ROW
              ), 2) AS movingAvg5
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 12
      """).show()

- id: step7_qualify_intro
  title: 7단계. QUALIFY 기본
  subtitle: 윈도우 결과 필터링
  blocks:
  - type: text
    content: QUALIFY는 DuckDB의 강력한 확장 기능으로, 윈도우 함수 결과를 직접 필터링할 수 있습니다. WHERE는 윈도우 함수 전에 실행되고 HAVING은 GROUP BY에만 사용되지만, QUALIFY는 윈도우 함수 실행 후 필터링합니다. 서브쿼리 없이 깔끔하게 "순위 3위 이하", "누적 합계 100 이상" 같은 조건을 적용할 수 있습니다. 코드가 간결해지고 가독성이 크게 향상됩니다.
  - type: code
    language: python
    title: QUALIFY로 Top 2 추출
    description: 서브쿼리 없이 필터링
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              age,
              fare,
              ROW_NUMBER() OVER(PARTITION BY pclass, sex ORDER BY fare DESC) AS rn
          FROM titanic
          WHERE age IS NOT NULL
          QUALIFY ROW_NUMBER() OVER(PARTITION BY pclass, sex ORDER BY fare DESC) <= 2
          ORDER BY pclass, sex, fare DESC
      """).show()
  - type: tip
    content: "QUALIFY는 HAVING처럼 동작하지만 윈도우 함수에 적용됩니다. 윈도우 함수를 WHERE에서 사용할 수 없는 제약을 우회하는 강력한 기능입니다. 서브쿼리 패턴(FROM (SELECT ... ROW_NUMBER) WHERE rn <= 2)을 QUALIFY 한 줄로 대체할 수 있어 코드가 매우 깔끔해집니다."

- id: step8_qualify_advanced
  title: 8단계. QUALIFY 고급 활용
  subtitle: 복잡한 조건 필터링
  blocks:
  - type: text
    content: QUALIFY는 AND, OR 등 복잡한 조건도 사용할 수 있습니다. 여러 윈도우 함수 결과를 조합하여 "순위 3위 이하이면서 평균 이상" 같은 조건을 표현할 수 있습니다. 실무에서는 이런 복합 조건으로 정교한 필터링을 수행합니다.
  - type: code
    language: python
    title: 복합 조건 QUALIFY
    description: 생존자 중 요금 상위 3명
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              sex,
              age,
              fare,
              RANK() OVER(PARTITION BY pclass ORDER BY fare DESC) AS fareRank
          FROM titanic
          WHERE survived = 1 AND age IS NOT NULL
          QUALIFY RANK() OVER(PARTITION BY pclass ORDER BY fare DESC) <= 3
          ORDER BY pclass, fareRank
      """).show()

- id: step9_cumsum_moving
  title: 9단계. 누적 vs 이동 합계
  subtitle: UNBOUNDED vs BOUNDED
  blocks:
  - type: text
    content: 윈도우 프레임은 UNBOUNDED PRECEDING(처음부터)과 n PRECEDING(n개 전부터) 두 가지 방식이 있습니다. UNBOUNDED PRECEDING을 사용하면 누적 합계, n PRECEDING을 사용하면 이동 합계가 됩니다. 누적은 계속 증가하지만, 이동은 일정 범위만 합산하므로 증감을 반복합니다. 용도에 맞게 선택하면 됩니다.
  - type: code
    language: python
    title: 누적 합계 vs 이동 합계
    description: UNBOUNDED vs 2 PRECEDING
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              ROUND(SUM(fare) OVER(
                  PARTITION BY pclass ORDER BY age
                  ROWS UNBOUNDED PRECEDING
              ), 2) AS cumSum,
              ROUND(SUM(fare) OVER(
                  PARTITION BY pclass ORDER BY age
                  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
              ), 2) AS movingSum3
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          ORDER BY pclass, age
          LIMIT 10
      """).show()
  - type: tip
    content: "ROWS UNBOUNDED PRECEDING은 '처음부터 현재까지 전부'를 의미하며 누적 합계가 됩니다. ROWS BETWEEN 2 PRECEDING AND CURRENT ROW는 '최근 3개'만 합산하므로 이동 합계가 됩니다. 누적은 계속 증가하지만 이동은 범위가 고정되어 증감을 반복합니다."

- id: step10_window_alias
  title: 10단계. WINDOW 절로 재사용
  subtitle: 윈도우 정의 간소화
  blocks:
  - type: text
    content: 같은 OVER 절을 여러 번 반복하면 코드가 길어집니다. WINDOW 절로 윈도우 정의에 이름을 붙이면 재사용할 수 있습니다. 코드가 간결해지고 수정도 쉬워집니다. 실무에서 복잡한 쿼리를 작성할 때 가독성 향상에 큰 도움이 됩니다.
  - type: code
    language: python
    title: WINDOW 절 사용
    description: 윈도우 재사용
    content: |-
      duckdb.sql("""
          SELECT
              pclass,
              age,
              fare,
              LAG(fare, 1) OVER w AS prevFare,
              ROUND(AVG(fare) OVER(
                  PARTITION BY pclass ORDER BY age
                  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
              ), 2) AS movingAvg,
              CASE
                  WHEN fare > LAG(fare, 1) OVER w THEN '상승'
                  WHEN fare < LAG(fare, 1) OVER w THEN '하락'
                  ELSE '유지'
              END AS trend
          FROM titanic
          WHERE age IS NOT NULL AND fare > 0
          WINDOW w AS (PARTITION BY pclass ORDER BY age)
          ORDER BY pclass, age
          LIMIT 12
      """).show()
  - type: tip
    content: "WINDOW w AS (...)로 정의한 후 OVER w 형태로 재사용합니다. 같은 윈도우를 여러 곳에서 사용할 때 코드 중복을 줄이고 수정을 쉽게 만듭니다. 윈도우 정의가 복잡할수록 WINDOW 절의 효과가 큽니다."

- id: step11_final
  title: 11단계. 최종 종합 분석
  subtitle: 모든 개념 결합
  blocks:
  - type: text
    content: LAG, LEAD, 이동 평균, QUALIFY를 모두 활용한 종합 분석입니다. CTE와 윈도우 함수를 결합하여 복잡한 분석 파이프라인을 구축합니다. 실무에서 이런 패턴으로 시계열 데이터를 분석하고 추세를 예측합니다.
  - type: code
    language: python
    title: 고급 윈도우 종합
    description: LAG + LEAD + 이동평균 + QUALIFY
    content: |-
      duckdb.sql("""
          WITH rankedPassengers AS (
              SELECT
                  pclass,
                  sex,
                  age,
                  fare,
                  embarked,
                  ROW_NUMBER() OVER(PARTITION BY pclass ORDER BY fare DESC) AS rn,
                  LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY fare DESC) AS higherFare,
                  LEAD(fare, 1) OVER(PARTITION BY pclass ORDER BY fare DESC) AS lowerFare,
                  ROUND(AVG(fare) OVER(
                      PARTITION BY pclass ORDER BY fare DESC
                      ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING
                  ), 2) AS movingAvg3
              FROM titanic
              WHERE survived = 1 AND age IS NOT NULL
          )
          SELECT
              pclass,
              sex,
              age,
              fare,
              higherFare,
              lowerFare,
              movingAvg3,
              ROUND(fare - COALESCE(lowerFare, fare), 2) AS diffFromLower
          FROM rankedPassengers
          WHERE rn <= 5
          ORDER BY pclass, rn
      """).show()

- id: practice
  title: 실습
  subtitle: 고급 윈도우 함수 프로젝트
  blocks:
  - type: text
    content: 고급 윈도우 함수를 종합 활용하여 타이타닉 데이터를 심층 분석해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: LAG로 클래스별 나이순 요금 변화 분석 + 이동평균"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
        tbl1 = duckdb.from_df(data)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                pclass,
                sex,
                age,
                fare,
                LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age) AS prevFare,
                ROUND(fare - LAG(fare, 1) OVER(PARTITION BY pclass ORDER BY age), 2) AS fareDiff,
                ROUND(AVG(fare) OVER(
                    PARTITION BY pclass ORDER BY age
                    ROWS BETWEEN 4 PRECEDING AND CURRENT ROW
                ), 2) AS movAvg5
            FROM tbl1
            WHERE age IS NOT NULL AND fare > 0
            ORDER BY pclass, age
            LIMIT 20
        """)
  - type: expansion
    title: "미션2: QUALIFY로 탑승지별 요금 상위 3명 + LEAD로 다음 요금 비교"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        frame = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/titanic.csv")
        tbl2 = duckdb.from_df(frame)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            SELECT
                embarked,
                pclass,
                age,
                fare,
                LEAD(fare, 1) OVER(PARTITION BY embarked ORDER BY fare DESC) AS nextLowerFare,
                RANK() OVER(PARTITION BY embarked ORDER BY fare DESC) AS rk
            FROM tbl2
            WHERE embarked IS NOT NULL AND age IS NOT NULL AND fare > 0
            QUALIFY RANK() OVER(PARTITION BY embarked ORDER BY fare DESC) <= 3
            ORDER BY embarked, rk
        """)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: 고급 윈도우 함수를 완벽히 마스터했습니다!
  - type: list
    items:
    - "LAG(col, n) - n행 이전 값 가져오기"
    - "LEAD(col, n) - n행 다음 값 가져오기"
    - "ROWS BETWEEN ... AND ... - 윈도우 프레임 지정"
    - "이동 평균 - ROWS BETWEEN n PRECEDING AND CURRENT ROW"
    - "누적 합계 - ROWS UNBOUNDED PRECEDING"
    - "QUALIFY - 윈도우 함수 결과 직접 필터링"
    - "WINDOW 절 - 윈도우 정의 재사용"
