meta:
  id: duckdb_06
  title: CTE단계별분석
  order: 6
  category: duckdb
  difficulty: "⭐⭐⭐"
  badge: 중급
  tags: ["CTE", "WITH", "INNER JOIN", "tips", "titanic", "가독성"]
  seo:
    title: "DuckDB CTE 완벽 가이드 - WITH 절로 단계별 분석"
    description: "CTE(Common Table Expression)로 복잡한 쿼리를 단계별로 구조화합니다. WITH 절, 다중 CTE, JOIN 조합을 마스터합니다."
    keywords: ["DuckDB CTE", "WITH 절", "Common Table Expression", "SQL 가독성", "쿼리 구조화"]

intro:
  emoji: "🔗"
  goal: CTE로 복잡한 쿼리를 가독성 높게 구조화하고 tips+titanic 데이터를 분석합니다.
  description: CTE(Common Table Expression)는 쿼리를 논리적 단계로 나누어 가독성을 높입니다. 서브쿼리보다 읽기 쉽고, 재사용 가능하며, 디버깅이 용이합니다. WITH 절로 임시 결과에 이름을 붙이고 여러 CTE를 연결하는 방법을 배웁니다.

sections:
- id: step1_load
  title: 1단계. 데이터 준비
  subtitle: tips + titanic
  blocks:
  - type: text
    content: 이번 프로젝트에서는 두 데이터셋을 불러와 CTE(Common Table Expression) 활용법을 학습합니다. tips 데이터는 레스토랑 팁 정보 244건, titanic 데이터는 타이타닉 승객 정보 891건을 담고 있습니다. DuckDB는 pandas DataFrame을 바로 SQL로 쿼리할 수 있어 데이터 분석이 매우 편리합니다. duckdb.from_df()로 DataFrame을 DuckDB 테이블로 변환하면 즉시 SQL 문법을 사용할 수 있습니다.
  - type: code
    language: python
    title: 데이터 불러오기
    description: 두 데이터셋 로드
    content: |-
      import pandas as pd
      import duckdb

      baseUrl = "https://raw.githubusercontent.com/mwaskom/seaborn-data/master"
      dfTips = pd.read_csv(f"{baseUrl}/tips.csv")
      dfTitanic = pd.read_csv(f"{baseUrl}/titanic.csv")
      tips = duckdb.from_df(dfTips)
      titanic = duckdb.from_df(dfTitanic)

      duckdb.sql("SELECT * FROM tips LIMIT 3").show()
      duckdb.sql("SELECT * FROM titanic LIMIT 3").show()

- id: step2_cte_intro
  title: 2단계. CTE란?
  subtitle: WITH 절 소개
  blocks:
  - type: text
    content: CTE(Common Table Expression)는 WITH 절로 시작하는 임시 결과 집합입니다. 복잡한 쿼리를 읽기 쉽게 만드는 핵심 도구로, 마치 요리할 때 재료를 미리 준비해두는 것과 같습니다. 서브쿼리는 괄호 안에 중첩되어 읽기 어렵지만, CTE는 위에서 아래로 단계별로 흐름이 명확합니다. 예를 들어 "팁이 5달러 이상인 데이터"를 highTips라는 이름으로 정의하면, 이후 쿼리에서 highTips를 일반 테이블처럼 사용할 수 있습니다. 디버깅할 때도 CTE 각 단계를 개별적으로 실행해볼 수 있어 문제를 찾기 쉽습니다.
  - type: code
    language: python
    title: CTE 기본 구조
    description: WITH name AS (SELECT ...)
    content: |-
      duckdb.sql("""
          WITH highTips AS (
              SELECT *
              FROM tips
              WHERE tip > 5
          )
          SELECT day, COUNT(*) AS cnt, ROUND(AVG(tip), 2) AS avgTip
          FROM highTips
          GROUP BY day
          ORDER BY avgTip DESC
      """).show()
  - type: tip
    content: "WITH name AS (SELECT ...)는 서브쿼리에 이름을 붙입니다. 이후 쿼리에서 name을 일반 테이블처럼 사용할 수 있습니다. 서브쿼리는 SELECT * FROM (SELECT ...) nested 형태로 괄호 속 괄호가 중첩되어 복잡하지만, CTE는 위에서 아래로 읽는 순서대로 작성되어 가독성이 훨씬 좋습니다. 실무에서는 3단계 이상 중첩되는 복잡한 쿼리에서 CTE를 필수적으로 사용합니다."

- id: step3_cte_benefits
  title: 3단계. CTE의 장점
  subtitle: 왜 CTE를 사용하나?
  blocks:
  - type: text
    content: "CTE는 다음 3가지 이유로 서브쿼리보다 훨씬 우수합니다. 첫째, 가독성입니다. 서브쿼리는 안쪽부터 읽어야 하지만 CTE는 위에서 아래로 자연스럽게 읽힙니다. 둘째, 재사용성입니다. 같은 서브쿼리를 여러 번 작성할 필요 없이 CTE를 한 번 정의하면 여러 곳에서 참조할 수 있습니다. 셋째, 디버깅 용이성입니다. 복잡한 쿼리가 에러를 내면 어디가 문제인지 찾기 어렵지만, CTE는 각 단계를 개별적으로 실행해서 중간 결과를 확인할 수 있습니다. 실무에서 팀원들과 협업할 때 CTE로 작성된 쿼리가 훨씬 이해하기 쉽고 유지보수가 편합니다."
  - type: code
    language: python
    title: 서브쿼리 vs CTE 비교
    description: 가독성 차이 확인
    content: |-
      duckdb.sql("""
          WITH highTips AS (
              SELECT * FROM tips WHERE tip > 5
          )
          SELECT day, COUNT(*) AS highTipCount
          FROM highTips
          GROUP BY day
      """).show()
  - type: tip
    content: "CTE를 사용하면 복잡한 쿼리를 논리적 단계로 나눌 수 있습니다. 예를 들어 '필터링 → 집계 → 정렬' 순서를 각각 CTE로 만들면 각 단계의 의도가 명확해집니다. 서브쿼리로 작성하면 중첩이 깊어져 어디서 무엇을 하는지 파악하기 어렵습니다."

- id: step4_multi_cte
  title: 4단계. 여러 CTE 연결
  subtitle: 콤마로 구분
  blocks:
  - type: text
    content: 한 번의 쿼리에서 여러 CTE를 콤마(,)로 구분하여 정의할 수 있습니다. 각 CTE는 독립적인 분석 단계를 나타내며, 마지막 SELECT에서 이들을 UNION이나 JOIN으로 결합합니다. 예를 들어 "요일별 통계"와 "시간대별 통계"를 각각 별도의 CTE로 만든 후, UNION ALL로 세로로 합쳐서 한 번에 비교할 수 있습니다. 이렇게 하면 같은 형식의 여러 집계 결과를 효율적으로 얻을 수 있습니다.
  - type: code
    language: python
    title: 요일별 + 시간대별 통계
    description: 두 개의 CTE 정의
    content: |-
      duckdb.sql("""
          WITH
          daySummary AS (
              SELECT day, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
              FROM tips
              GROUP BY day
          ),
          timeSummary AS (
              SELECT time, COUNT(*) AS cnt, SUM(total_bill) AS totalSales
              FROM tips
              GROUP BY time
          )
          SELECT 'day' AS category, day AS name, cnt, ROUND(totalSales, 2) AS sales FROM daySummary
          UNION ALL
          SELECT 'time' AS category, time AS name, cnt, ROUND(totalSales, 2) AS sales FROM timeSummary
          ORDER BY category, sales DESC
      """).show()
  - type: tip
    content: "WITH a AS (...), b AS (...)처럼 콤마로 여러 CTE를 정의합니다. 각 CTE는 독립적으로 실행되며, 최종 SELECT에서 원하는 CTE를 사용합니다."

- id: step5_cte_chain
  title: 5단계. CTE 체이닝
  subtitle: 이전 CTE 참조하기
  blocks:
  - type: text
    content: 앞에서 정의한 CTE를 다음 CTE에서 참조할 수 있습니다. 이를 CTE 체이닝(chaining)이라고 하며, 복잡한 분석을 단계별로 쪼개는 핵심 기법입니다. 마치 레고 블록을 쌓듯이 step1 결과를 step2에서 사용하고, step2 결과를 step3에서 사용하는 방식입니다. 예를 들어 "집계 → 비율 계산 → 순위 매기기" 3단계를 각각 CTE로 분리하면 각 단계가 무엇을 하는지 명확해지고, 중간 결과도 쉽게 확인할 수 있습니다. 실무에서 10단계 이상의 복잡한 분석도 CTE 체이닝으로 관리 가능합니다.
  - type: code
    language: python
    title: 3단계 CTE 체이닝
    description: step1 → step2 → step3 순차 참조
    content: |-
      duckdb.sql("""
          WITH
          step1 AS (
              SELECT day, sex, COUNT(*) AS cnt, SUM(tip) AS totalTip
              FROM tips
              GROUP BY day, sex
          ),
          step2 AS (
              SELECT day, sex, cnt, totalTip,
                     ROUND(totalTip / cnt, 2) AS avgTip
              FROM step1
          ),
          step3 AS (
              SELECT *,
                     RANK() OVER(PARTITION BY day ORDER BY avgTip DESC) AS tipRank
              FROM step2
          )
          SELECT day, sex, cnt, ROUND(totalTip, 2) AS totalTip, avgTip, tipRank
          FROM step3
          WHERE tipRank = 1
          ORDER BY avgTip DESC
      """).show()
  - type: tip
    content: "CTE 체이닝의 장점: 각 단계를 개별적으로 실행해서 중간 결과를 확인할 수 있습니다. 복잡한 쿼리를 디버깅할 때 매우 유용합니다."

- id: step6_join_intro
  title: 6단계. INNER JOIN 기본
  subtitle: 두 테이블 합치기
  blocks:
  - type: text
    content: INNER JOIN은 두 테이블을 공통 키(key)로 연결하여 합치는 연산입니다. 양쪽 테이블에 모두 존재하는 행만 결과에 포함되므로 교집합 개념과 같습니다. 예를 들어 "요일별 평균 결제금액" 테이블과 "요일별 평균 팁" 테이블을 요일(day) 컬럼으로 JOIN하면, 같은 요일의 두 통계를 나란히 비교할 수 있습니다. CTE와 함께 사용하면 각 집계를 별도 CTE로 만들고 JOIN으로 결합하여 복잡한 비교 분석이 가능합니다. LEFT JOIN, RIGHT JOIN도 있지만 INNER JOIN이 가장 기본이고 많이 사용됩니다.
  - type: code
    language: python
    title: 요일별 평균 결합
    description: 두 CTE를 JOIN
    content: |-
      duckdb.sql("""
          WITH
          daySummary AS (
              SELECT day, ROUND(AVG(total_bill), 2) AS avgBill
              FROM tips
              GROUP BY day
          ),
          dayTipSummary AS (
              SELECT day, ROUND(AVG(tip), 2) AS avgTip
              FROM tips
              GROUP BY day
          )
          SELECT d.day, d.avgBill, t.avgTip,
                 ROUND(t.avgTip / d.avgBill * 100, 1) AS tipPercent
          FROM daySummary d
          INNER JOIN dayTipSummary t ON d.day = t.day
          ORDER BY tipPercent DESC
      """).show()
  - type: tip
    content: "INNER JOIN ... ON 조건은 조건을 만족하는 행만 결합합니다. 한쪽에만 있는 데이터는 결과에서 제외됩니다. 예를 들어 d.day = t.day 조건은 '요일이 같은' 행끼리만 연결합니다. 테이블 별칭(d, t)을 사용하면 컬럼명이 겹칠 때 어느 테이블의 컬럼인지 명확하게 구분할 수 있습니다."

- id: step7_tips_analysis
  title: 7단계. Tips 성별 비교 분석
  subtitle: CTE + JOIN 실전
  blocks:
  - type: text
    content: 남성과 여성의 요일별 팁 패턴을 비교하는 실전 분석입니다. 각 성별의 통계를 별도 CTE로 만든 후 JOIN으로 합쳐 나란히 비교합니다. 이렇게 하면 "남성은 어느 요일에 팁을 많이 주는가?", "여성과 비교하면 어떤 차이가 있는가?"를 한눈에 파악할 수 있습니다. 두 그룹을 따로 집계한 후 합치는 패턴은 A/B 테스트, 실험군/대조군 비교 등 실무에서 매우 자주 사용됩니다.
  - type: code
    language: python
    title: 성별 팁 패턴 비교
    description: 남성 CTE + 여성 CTE
    content: |-
      duckdb.sql("""
          WITH
          maleStats AS (
              SELECT day,
                     COUNT(*) AS maleCnt,
                     ROUND(AVG(tip), 2) AS maleAvgTip
              FROM tips
              WHERE sex = 'Male'
              GROUP BY day
          ),
          femaleStats AS (
              SELECT day,
                     COUNT(*) AS femaleCnt,
                     ROUND(AVG(tip), 2) AS femaleAvgTip
              FROM tips
              WHERE sex = 'Female'
              GROUP BY day
          )
          SELECT m.day,
                 m.maleCnt, m.maleAvgTip,
                 f.femaleCnt, f.femaleAvgTip,
                 ROUND(m.maleAvgTip - f.femaleAvgTip, 2) AS tipDiff
          FROM maleStats m
          INNER JOIN femaleStats f ON m.day = f.day
          ORDER BY tipDiff DESC
      """).show()
  - type: tip
    content: "WHERE 절로 필터링한 후 GROUP BY로 집계하는 패턴을 각 성별마다 별도 CTE로 만들었습니다. 이렇게 하면 남성/여성 통계를 독립적으로 계산한 후 JOIN으로 병합하여 차이(tipDiff)를 쉽게 계산할 수 있습니다. 한 쿼리에서 CASE WHEN으로 처리할 수도 있지만, CTE로 나누면 각 그룹의 중간 결과를 명확하게 볼 수 있어 디버깅과 검증이 훨씬 쉽습니다."

- id: step8_titanic_survival
  title: 8단계. Titanic 생존율 분석
  subtitle: 클래스별 생존 통계
  blocks:
  - type: text
    content: 타이타닉 데이터로 객실 등급(pclass)별 생존자와 사망자를 분석합니다. 전체 승객 수와 생존자 수를 각각 별도 CTE로 만든 후 JOIN하여 생존율을 계산하는 패턴입니다. 이 방식은 "전체 중 일부"를 분석할 때 매우 유용합니다. 예를 들어 전체 주문 중 완료된 주문, 전체 회원 중 활성 회원 등을 비율로 분석할 때 동일한 구조를 사용할 수 있습니다. CTE 덕분에 전체 집계와 조건부 집계를 명확히 분리하여 계산할 수 있습니다.
  - type: code
    language: python
    title: 클래스별 생존율
    description: 전체 vs 생존자 CTE
    content: |-
      duckdb.sql("""
          WITH
          totalByClass AS (
              SELECT pclass, COUNT(*) AS total
              FROM titanic
              GROUP BY pclass
          ),
          survivedByClass AS (
              SELECT pclass, COUNT(*) AS survived
              FROM titanic
              WHERE survived = 1
              GROUP BY pclass
          )
          SELECT t.pclass,
                 t.total,
                 s.survived,
                 t.total - s.survived AS died,
                 ROUND(s.survived * 100.0 / t.total, 1) AS survivalRate
          FROM totalByClass t
          INNER JOIN survivedByClass s ON t.pclass = s.pclass
          ORDER BY t.pclass
      """).show()
  - type: tip
    content: "두 CTE를 pclass로 JOIN하여 등급별 생존율을 계산했습니다. survived = 1 조건으로 생존자만 세고, 전체에서 생존자를 빼면 사망자 수가 됩니다. 100.0을 곱해 소수점을 유지한 후 나누는 것이 정확한 비율 계산 패턴입니다. 정수 나누기(/)는 소수점이 잘릴 수 있으므로 주의해야 합니다."

- id: step9_complex_analysis
  title: 9단계. Titanic 복합 분석
  subtitle: 클래스-성별 생존율
  blocks:
  - type: text
    content: 객실 등급과 성별을 동시에 고려한 복합 생존율 분석입니다. CTE 체이닝으로 "집계 → 비율 계산 → 순위 매기기" 3단계를 명확히 분리합니다. 첫 번째 CTE는 pclass와 sex로 그룹화하여 기본 집계를 수행하고, 두 번째 CTE는 생존율을 계산하며, 세 번째 CTE는 전체 순위를 매깁니다. 이렇게 단계를 나누면 각 단계의 로직이 단순해지고, 중간 결과를 확인하며 검증할 수 있습니다. 복잡한 비즈니스 로직을 CTE 체이닝으로 구조화하는 것이 실무의 핵심 패턴입니다.
  - type: code
    language: python
    title: 클래스-성별 종합 분석
    description: 다단계 CTE 체이닝
    content: |-
      duckdb.sql("""
          WITH
          groupStats AS (
              SELECT pclass, sex,
                     COUNT(*) AS total,
                     SUM(survived) AS survived
              FROM titanic
              GROUP BY pclass, sex
          ),
          groupRates AS (
              SELECT pclass, sex, total, survived,
                     ROUND(survived * 100.0 / total, 1) AS survivalRate
              FROM groupStats
          ),
          ranked AS (
              SELECT *,
                     RANK() OVER(ORDER BY survivalRate DESC) AS overallRank
              FROM groupRates
          )
          SELECT pclass, sex, total, survived, survivalRate, overallRank
          FROM ranked
          ORDER BY overallRank
      """).show()
  - type: tip
    content: "3단계 CTE 체이닝의 장점은 각 단계를 독립적으로 테스트할 수 있다는 것입니다. groupStats만 실행해보고, 그 다음 groupRates를 추가하고, 마지막으로 ranked를 추가하는 식으로 점진적으로 쿼리를 완성할 수 있습니다. 한 번에 복잡한 쿼리를 작성하면 에러가 나도 어디가 문제인지 찾기 어렵지만, CTE로 나누면 어느 단계에서 문제가 생겼는지 쉽게 파악할 수 있습니다."

- id: step10_cte_join_combo
  title: 10단계. CTE와 JOIN 종합
  subtitle: 모든 개념 결합
  blocks:
  - type: text
    content: CTE, 윈도우 함수, JOIN, CASE WHEN을 모두 활용한 종합 분석입니다. 요일+시간대별 팁 통계를 계산하고, 이를 요일 전체 평균과 비교하여 "평균 이상인지 이하인지" 판단합니다. 첫 번째 CTE는 요일+시간대로 집계하고, 두 번째 CTE는 요일별 평균을 계산한 후, JOIN으로 두 결과를 결합하여 비교합니다. 이런 패턴은 "개별 값 vs 그룹 평균" 비교에 자주 사용되며, 예를 들어 개인 성과 vs 팀 평균, 지점 매출 vs 전체 평균 등을 분석할 때 유용합니다.
  - type: code
    language: python
    title: 요일+시간대 종합 분석
    description: CTE 체이닝 + JOIN
    content: |-
      duckdb.sql("""
          WITH
          tipStats AS (
              SELECT day, time,
                     COUNT(*) AS cnt,
                     ROUND(AVG(tip), 2) AS avgTip
              FROM tips
              GROUP BY day, time
          ),
          dayAvg AS (
              SELECT day, ROUND(AVG(avgTip), 2) AS dayAvgTip
              FROM tipStats
              GROUP BY day
          )
          SELECT t.day, t.time, t.cnt, t.avgTip,
                 d.dayAvgTip,
                 CASE
                     WHEN t.avgTip > d.dayAvgTip THEN '평균 이상'
                     ELSE '평균 이하'
                 END AS comparison
          FROM tipStats t
          INNER JOIN dayAvg d ON t.day = d.day
          ORDER BY t.day, t.time
      """).show()
  - type: tip
    content: "CASE WHEN을 사용해 조건부 분류를 수행했습니다. t.avgTip > d.dayAvgTip 조건으로 '평균 이상'과 '평균 이하'를 구분합니다. 이렇게 숫자를 범주로 변환하면 데이터를 이해하기 쉽고, 시각화나 보고서 작성 시에도 유용합니다. CTE + JOIN + CASE의 조합은 실무에서 가장 자주 사용하는 분석 패턴 중 하나입니다."

- id: step11_final
  title: 11단계. 최종 결과물
  subtitle: CTE 실전 패턴
  blocks:
  - type: text
    content: CTE를 활용한 실전 분석 패턴을 완성했습니다! 복잡한 쿼리를 논리적 단계로 나누어 가독성과 유지보수성을 크게 높였습니다. 이제 단일 CTE, 다중 CTE, CTE 체이닝, CTE+JOIN 모든 패턴을 활용할 수 있습니다. 실무에서는 이런 패턴들을 조합하여 10단계 이상의 복잡한 분석 파이프라인도 구축할 수 있습니다. CTE는 SQL 가독성을 높이는 가장 강력한 도구이며, 팀 협업과 코드 리뷰에서 필수적입니다.
  - type: code
    language: python
    title: CTE 패턴 요약
    description: 배운 패턴 정리
    content: |-
      duckdb.sql("""
          SELECT
              'WITH name AS (...)' AS pattern,
              '단일 CTE' AS usage,
              '서브쿼리에 이름 부여' AS benefit
          UNION ALL
          SELECT
              'WITH a AS (...), b AS (...)',
              '다중 CTE',
              '여러 단계 정의'
          UNION ALL
          SELECT
              'CTE1 → CTE2 → CTE3',
              'CTE 체이닝',
              '단계별 분석 + 디버깅 용이'
          UNION ALL
          SELECT
              'CTE + INNER JOIN',
              'CTE 결합',
              '복잡한 집계 결과 비교'
      """).show()

- id: practice
  title: 실습
  subtitle: CTE 종합 프로젝트
  blocks:
  - type: text
    content: CTE 패턴을 종합 활용하여 복잡한 분석 쿼리를 작성해봅시다.
  - type: tip
    content: 각 미션은 import문부터 시작하지만, 위 연습 예제를 실행했다면 이미 라이브러리가 로딩되었으므로 import문은 제거해도 됩니다.
  - type: expansion
    title: "미션1: Tips 흡연자/비흡연자별 평균 팁과 건수"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        data = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl1 = duckdb.from_df(data)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            WITH
            base AS (
                SELECT
                    smoker,
                    COUNT(*) AS cnt,
                    ROUND(AVG(tip), 2) AS avgTip,
                    ROUND(AVG(total_bill), 2) AS avgBill
                FROM tbl1
                GROUP BY smoker
            ),
            result AS (
                SELECT
                    smoker,
                    cnt,
                    avgTip,
                    avgBill,
                    ROUND(avgTip / avgBill * 100, 1) AS tipPct
                FROM base
            )
            SELECT * FROM result
            ORDER BY tipPct DESC
        """)
  - type: expansion
    title: "미션2: Tips 점심/저녁 매출 비교"
    blocks:
    - type: code
      title: 데이터 로드
      content: |-
        import pandas as pd
        import duckdb
        frame = pd.read_csv("https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv")
        tbl2 = duckdb.from_df(frame)
    - type: code
      title: 쿼리 실행
      content: |-
        duckdb.sql("""
            WITH
            lunch AS (
                SELECT
                    day,
                    COUNT(*) AS lunchCnt,
                    ROUND(SUM(total_bill), 2) AS lunchSum
                FROM tbl2
                WHERE time = 'Lunch'
                GROUP BY day
            ),
            dinner AS (
                SELECT
                    day,
                    COUNT(*) AS dinnerCnt,
                    ROUND(SUM(total_bill), 2) AS dinnerSum
                FROM tbl2
                WHERE time = 'Dinner'
                GROUP BY day
            )
            SELECT
                l.day,
                l.lunchCnt,
                l.lunchSum,
                d.dinnerCnt,
                d.dinnerSum,
                ROUND(d.dinnerSum - l.lunchSum, 2) AS diff
            FROM lunch l
            INNER JOIN dinner d ON l.day = d.day
            ORDER BY diff DESC
        """)

- id: summary
  title: 정리
  blocks:
  - type: text
    content: CTE(Common Table Expression)를 완벽하게 마스터했습니다!
  - type: list
    items:
    - "WITH name AS (SELECT ...) - CTE 기본 구조"
    - "다중 CTE - WITH a AS (...), b AS (...) 콤마로 구분"
    - "CTE 체이닝 - 이전 CTE를 다음 CTE에서 참조"
    - "CTE + INNER JOIN - 두 CTE 결과를 결합"
    - "가독성 - 서브쿼리보다 읽기 쉬운 구조"
    - "디버깅 - 각 CTE를 개별 실행 가능"
  - type: text
    content: 다음 시간에는 윈도우 함수로 순위와 누적 합계를 계산하는 방법을 배웁니다!
