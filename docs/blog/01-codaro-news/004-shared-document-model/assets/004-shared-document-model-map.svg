<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Codaro shared document model</title>
  <desc id="desc">A product flow where chat, curriculum, editor, and automation share one document model.</desc>
  <rect width="1200" height="630" rx="36" fill="#fafafa"/>
  <rect x="72" y="70" width="1056" height="490" rx="30" fill="#ffffff" stroke="#e4e4e7" stroke-width="2"/>
  <text x="118" y="150" fill="#18181b" font-size="50" font-family="Segoe UI, Arial" font-weight="700">One Document Model</text>
  <text x="118" y="196" fill="#52525b" font-size="24" font-family="Segoe UI, Arial">Learning cells, editor code, and automation recipes stay in one flow.</text>
  <g font-family="Segoe UI, Arial">
    <rect x="118" y="270" width="184" height="116" rx="20" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="2"/>
    <text x="150" y="324" fill="#18181b" font-size="27" font-weight="700">Chat</text>
    <text x="150" y="358" fill="#52525b" font-size="18">set goal</text>
    <rect x="342" y="270" width="184" height="116" rx="20" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="374" y="324" fill="#155e75" font-size="27" font-weight="700">Learn</text>
    <text x="374" y="358" fill="#0e7490" font-size="18">YAML to cells</text>
    <rect x="566" y="270" width="184" height="116" rx="20" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="598" y="324" fill="#3730a3" font-size="27" font-weight="700">Run</text>
    <text x="598" y="358" fill="#4338ca" font-size="18">Python cells</text>
    <rect x="790" y="270" width="184" height="116" rx="20" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text x="822" y="324" fill="#14532d" font-size="27" font-weight="700">Automate</text>
    <text x="822" y="358" fill="#166534" font-size="18">dry-run tasks</text>
    <path d="M310 328h24" stroke="#71717a" stroke-width="5" stroke-linecap="round"/>
    <path d="M534 328h24" stroke="#71717a" stroke-width="5" stroke-linecap="round"/>
    <path d="M758 328h24" stroke="#71717a" stroke-width="5" stroke-linecap="round"/>
  </g>
  <rect x="220" y="445" width="760" height="58" rx="18" fill="#18181b"/>
  <text x="317" y="482" fill="#fafafa" font-size="23" font-family="Segoe UI, Arial"># %% cells · YAML curriculum · percent-format recipe · task boundary</text>
</svg>
